<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" fill="none">
  <defs>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6b8fff"/>
      <stop offset="100%" stop-color="#9b7cff"/>
    </linearGradient>
    <filter id="bloom">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Shield icon -->
  <g transform="translate(10, 8)" filter="url(#bloom)">
    <path d="M32 4 L58 16 V38 C58 52 46 62 32 66 C18 62 6 52 6 38 V16 Z"
          stroke="url(#glow)" stroke-width="2.5" fill="none" opacity="0.9"/>
    <path d="M32 20 L24 36 H40 L32 52" stroke="#6b8fff" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Neural dots -->
    <circle cx="22" cy="28" r="2" fill="#6b8fff" opacity="0.6"/>
    <circle cx="42" cy="28" r="2" fill="#9b7cff" opacity="0.6"/>
    <circle cx="32" cy="44" r="2" fill="#6b8fff" opacity="0.6"/>
    <line x1="22" y1="28" x2="32" y2="20" stroke="#6b8fff" stroke-width="0.8" opacity="0.3"/>
    <line x1="42" y1="28" x2="32" y2="20" stroke="#9b7cff" stroke-width="0.8" opacity="0.3"/>
    <line x1="32" y1="44" x2="24" y2="36" stroke="#6b8fff" stroke-width="0.8" opacity="0.3"/>
  </g>

  <!-- HuGR text -->
  <text x="78" y="52" font-family="Inter, system-ui, sans-serif" font-size="42"
        font-weight="700" letter-spacing="3" fill="url(#glow)">HuGR</text>

  <!-- Separator -->
  <line x1="222" y1="22" x2="222" y2="58" stroke="#4a5268" stroke-width="1" opacity="0.5"/>

  <!-- Subtitle -->
  <text x="236" y="38" font-family="Inter, system-ui, sans-serif" font-size="13"
        font-weight="400" fill="#e0e4ed" letter-spacing="0.5" opacity="0.8">Human Guardrail</text>
  <text x="236" y="56" font-family="Inter, system-ui, sans-serif" font-size="11"
        font-weight="300" fill="#8b92a8" letter-spacing="0.3">Engineering Intelligence</text>
</svg>
