name: Brain CI

on:
  push:
    branches: [main]
    paths: ['brain/**', '.github/workflows/ci-brain.yml', 'pyproject.toml']
  pull_request:
    paths: ['brain/**', 'pyproject.toml']

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check brain/

      - name: Format check
        run: ruff format --check brain/

  brain-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e brain/[all]
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          set +e
          pytest brain/tests/ -v --tb=short 2>&1 | tee test_output.txt
          EXIT_CODE=$?
          if [ $EXIT_CODE -eq 0 ]; then
            exit 0
          elif [ $EXIT_CODE -eq 134 ] && grep -q "passed" test_output.txt && ! grep -q "failed" test_output.txt; then
            echo "::warning::All tests passed but onnxruntime crashed during cleanup (exit 134) — known issue on Python 3.12"
            exit 0
          else
            exit $EXIT_CODE
          fi
