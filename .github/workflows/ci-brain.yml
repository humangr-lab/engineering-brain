name: Brain CI

on:
  push:
    branches: [main]
    paths: ['brain/**', '.github/workflows/ci-brain.yml', 'pyproject.toml']
  pull_request:
    paths: ['brain/**', 'pyproject.toml']

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check brain/

      - name: Format check
        run: ruff format --check brain/

  brain-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e brain/[all]
          pip install pytest pytest-cov

      - name: Run tests
        run: pytest brain/tests/ -v --tb=short
