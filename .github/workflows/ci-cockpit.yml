name: Cockpit CI

on:
  push:
    branches: [main]
    paths: ['cockpit/**', '.github/workflows/ci-cockpit.yml']
  pull_request:
    paths: ['cockpit/**']

jobs:
  cockpit-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e brain/
          pip install -e "cockpit/[dev]"

      - name: Run Python tests
        run: pytest cockpit/tests/ -v --tb=short

  cockpit-js:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and test
        working-directory: cockpit
        run: |
          npm ci
          npx vitest run
