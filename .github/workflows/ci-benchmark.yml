name: Benchmark CI

on:
  pull_request:
    paths:
      - 'brain/**'
      - '!brain/benchmarks/reports/**'

jobs:
  benchmark-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e brain/[all]
          pip install matplotlib jinja2

      - name: Run benchmark (Brain + Naive RAG)
        run: |
          cd brain
          python -m benchmarks run --systems brain,naive_rag --no-report

      - name: Check for regression
        run: |
          cd brain
          if [ -f benchmarks/reports/baseline.json ]; then
            python -m benchmarks compare benchmarks/reports/baseline.json benchmarks/reports/latest.json
          else
            echo "No baseline found — first run, saving as baseline."
            cp benchmarks/reports/latest.json benchmarks/reports/baseline.json
          fi

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: brain/benchmarks/reports/latest.json
          retention-days: 30
