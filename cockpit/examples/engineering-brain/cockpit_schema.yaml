details:
  seeds:
    t: Seed Knowledge Files
    tp: Knowledge Source
    d: 158 expert-curated YAML files across 6 engineering domains. Each rule carries mandatory WHY (mechanism) and HOW (actionable
      steps).
    m:
      Files: '158'
      Domains: '6'
      Nodes: ~1,800
      Quality: Expert-curated
  mining:
    t: Code Pattern Miner
    tp: Knowledge Source
    d: AST-based extraction of recurring code patterns from Python source files. Detects error handling, API conventions,
      import clusters.
    m:
      Engine: Python AST
      Patterns: 5 types
      Threshold: \u22653
      Output: L4 Findings
  ontol:
    t: External Ontologies
    tp: Knowledge Source
    d: SKOS-based alignment connecting internal taxonomy to Wikidata, DBpedia, and Schema.org.
    m:
      Standard: SKOS (W3C)
      Ontologies: '3'
      Relations: 4 types
      Coverage: Expanding
  obslog:
    t: Observation Log
    tp: Knowledge Source
    d: Append-only event log recording every query, reinforcement, deprecation, and contradiction.
    m:
      Events: All interactions
      Format: Append-only
      Consumers: 6 modules
      Retention: Permanent
  l0:
    t: 'L0: Axioms'
    tp: Cortical Layer
    d: Foundational truths that never decay. Mathematical identities, logical laws, scientific principles. The bedrock of
      all reasoning chains.
    m:
      Decay: Never
      Confidence: '1.0'
      Examples: SOLID, CAP
      Role: Anchor
  l1:
    t: 'L1: Principles'
    tp: Cortical Layer
    d: Engineering principles grounded by axioms. "Prefer composition over inheritance." Connected via GROUNDS edges.
    m:
      Grounded By: L0
      Edge: GROUNDS
      Decay: Very slow
      Role: Guidance
  l2:
    t: 'L2: Patterns'
    tp: Cortical Layer
    d: Recurring solutions promoted from rules. Design patterns, architectural patterns, anti-patterns.
    m:
      From: L1 Principles
      Edge: INFORMS
      Promotion: From L3
      Role: Solutions
  l3:
    t: 'L3: Rules'
    tp: Cortical Layer
    d: Specific, actionable constraints. "Always validate JWT server-side." Crystallized from evidence.
    m:
      Instantiates: L2
      Edge: INSTANTIATES
      Count: ~800
      Role: Constraints
  l4:
    t: 'L4: Evidence'
    tp: Cortical Layer
    d: Observations from code analysis, feedback, and automated extraction. Raw signal for learning.
    m:
      Sources: Mining + feedback
      Lifecycle: Crystallize or decay
      Threshold: 5 reinforcements
  l5:
    t: 'L5: Context'
    tp: Cortical Layer
    d: Temporal, ephemeral knowledge. Current project context. Decays fastest but most immediately relevant.
    m:
      Decay: Fast (Hawkes)
      Scope: Per-session
      Updates: Real-time
  erg:
    t: Epistemic Reasoning Graph
    tp: Reasoning Engine
    d: The core differentiator. Multi-chain reasoning entirely via graph traversal \u2014 zero LLM calls. Subjective Logic
      opinion fusion, Dempster-Shafer synthesis, contradiction detection, gap analysis.
    m:
      LLM Calls: '0'
      Fusion: Dempster-Shafer
      Templates: '12'
      Profiles: '7'
  scorer:
    t: Multi-Signal Scorer
    tp: Retrieval
    d: '7 weighted signals: tech match, domain match, severity, reinforcement, recency (Hawkes), confidence, vector similarity.
      Weights optimized by Thompson Sampling.'
    m:
      Signals: '7'
      Weights: Adaptive
      Calibration: Bayesian
  router:
    t: Query Router
    tp: Retrieval
    d: 'Multi-branch retrieval: graph + vector + taxonomy. Merges via Reciprocal Rank Fusion. Token-budget aware.'
    m:
      Branches: '3'
      Fusion: RRF
      Budget: Token-aware
  taxon:
    t: Taxonomy DAG
    tp: Retrieval
    d: Faceted polyhierarchic DAG. 5 facets, SKOS alignment, ~200 tags with aliases.
    m:
      Facets: '5'
      Tags: ~200
      Structure: DAG
  embed:
    t: Embedder
    tp: Retrieval
    d: 'Dual embedding: HAKE hierarchy-aware + standard semantic. Powers search and reasoning.'
    m:
      Models: HAKE + Semantic
      Dims: '1024'
  cryst:
    t: Crystallizer
    tp: Learning
    d: Transforms L4 evidence into L3 rules. Embedding cosine similarity (0.75) for semantic matching.
    m:
      Input: L4
      Output: L3
      Threshold: '0.75'
  promot:
    t: Promoter
    tp: Learning
    d: Promotes knowledge upward. Bayesian Beta priors per domain \u2014 high-survival domains get faster promotion.
    m:
      Transitions: L4\u2192L3\u2192L2\u2192L1
      Policy: Per-domain Beta
  xlay:
    t: Cross-Layer Inferrer
    tp: Learning
    d: Discovers missing cross-layer edges via embedding similarity. Replaces 71 hardcoded pairs.
    m:
      Replaces: 71 pairs
      Threshold: '0.70'
  linkp:
    t: Link Predictor
    tp: Learning
    d: HAKE-enhanced prediction across 22 edge types with type-constraint matrix.
    m:
      Edge Types: '22'
      Threshold: '0.80'
  adapt:
    t: Adaptive Weights
    tp: Learning
    d: Thompson Sampling on scoring weights. Each has Beta(\u03b1,\u03b2) posterior updated from feedback.
    m:
      Method: Thompson Sampling
      Weights: '6'
  trust:
    t: Trust Engine
    tp: Reasoning
    d: EigenTrust propagation of source credibility through the graph.
    m:
      Algorithm: EigenTrust
      Sources: 9 types
  eladder:
    t: Epistemic Ladder (E0-E5)
    tp: Epistemic
    d: 'Classifies every knowledge node by maturity: E0 (Rumor) through E5 (Axiom). L0 nodes are always E5. Promotion requires
      meeting evidence thresholds; demotion resets to E0.'
    m:
      Levels: E0-E5
      Classification: Auto
      Promotion: One-step
      Demotion: To E0
      Flag: BRAIN_EPISTEMIC_LADDER
  bedge:
    t: Bayesian Edge Manager
    tp: Epistemic
    d: Every edge carries a Beta distribution (\u03b1,\u03b2) expressing confidence the relationship is valid. Positive feedback
      increments \u03b1; negative increments \u03b2. Edges decay toward prior without reinforcement.
    m:
      Model: Beta(\u03b1,\u03b2)
      Confidence: \u03b1/(\u03b1+\u03b2)
      Decay: Per-edge-type
      Profiles: 15 types
      Flag: BRAIN_BAYESIAN_EDGES
  pdecay:
    t: Predictive Decay Engine
    tp: Epistemic
    d: Forecasts WHEN knowledge becomes stale instead of reacting after the fact. 11 knowledge-type profiles from 1 day (task
      context) to \u221e (axioms).
    m:
      Profiles: 11 types
      Stale Threshold: '0.3'
      Forecast: Days until stale
      Proactive: 'Yes'
      Flag: BRAIN_PREDICTIVE_DECAY
  ctensor:
    t: Contradiction Tensor
    tp: Epistemic
    d: Promotes conflicts from scalar K-factor to structured tensors with per-source evidence tracking and typed resolution
      (auto/cbf/murphy/demotion/scope_split).
    m:
      Strategies: '5'
      Types: 4 conflict types
      Evidence: Per-source
      ID: CT-{hash}
      Flag: BRAIN_CONTRADICTION_TENSOR
  dstcomb:
    t: DST Evidence Combiner
    tp: Epistemic
    d: 'Adaptive Dempster-Shafer combination: auto-selects strategy based on conflict level. Low conflict \u2192 CBF, medium
      \u2192 Murphy, high \u2192 cautious conjunction.'
    m:
      Strategies: 3 (auto-select)
      CBF Threshold: K<0.3
      Murphy Range: 0.3\u2264K<0.7
      Cautious: K\u22650.7
      Flag: BRAIN_DST_EVIDENCE
  llm:
    t: LLM Agents
    tp: Consumer
    d: Claude, GPT, Gemini query the Brain for epistemic-scored engineering knowledge.
    m:
      Models: Claude \u00b7 GPT \u00b7 Gemini
      Output: Epistemic-scored
  mcp:
    t: MCP Server
    tp: Consumer
    d: '9 tools: query, reason, remember, recall, verify, forget, status, observe_outcome, promotion_outcome.'
    m:
      Tools: '9'
      Protocol: MCP
  cicd:
    t: CI/CD Pipeline
    tp: Consumer
    d: Severity-based gating on pull requests. Living coding standard.
    m:
      Gate: Severity-based
      Rules: Auto-enforced
  ide:
    t: IDE Integration
    tp: Consumer
    d: Real-time context-aware engineering knowledge inside the editor.
    m:
      Delivery: Real-time
      Context: Stack-aware
  packv2:
    t: Pack Manager v2 (Scalable)
    tp: Retrieval
    d: 'O(log N) knowledge pack creation via vector-first ANN retrieval, multi-query decomposition, and Reciprocal Rank Fusion.
      Replaces v1 full-scan O(N) with a 6-step pipeline: context extraction \u2192 sub-query decompose (max 5) \u2192 vector
      ANN (4 Qdrant collections) + graph filtered \u2192 RRF merge \u2192 7-signal score O(K) \u2192 graph expand \u2192 vertical
      completeness (filtered) \u2192 Pack. Feature-flagged via BRAIN_PACK_V2_ENABLED. Falls back gracefully to graph-only
      when vector adapter is None. Reuses 9 existing modules \u2014 zero reimplementation.'
    m:
      Complexity: O(log N)
      Collections: 4 Qdrant
      Sub-queries: 3\u20135
      Scoring: 7-signal
      Max Nodes: 80 default
      Feature Flag: BRAIN_PACK_V2_ENABLED
      Reused Modules: '9'
      Fallback: graph-only
  klib:
    t: Knowledge Library
    tp: System Module
    d: Full browsable library of the Engineering Brain knowledge graph. 1,975 nodes across 6 cortical layers, 22 edge types,
      5 taxonomy facets, and 158 seed sources.
    m:
      Nodes: 1,975
      Layers: '6'
      Edge Types: '22'
      Seeds: '158'
      Facets: '5'
      Tags: ~200
