<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ontology Map Toolkit -- Performance Benchmark</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0c10;
      color: #e0e4ec;
      overflow: hidden;
    }
    #canvas-container {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
    }
    #overlay {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
      pointer-events: none;
    }
    .panel {
      margin: 16px;
      padding: 16px 20px;
      background: rgba(10, 12, 18, 0.92);
      border: 1px solid rgba(155, 124, 255, 0.15);
      border-radius: 10px;
      backdrop-filter: blur(8px);
      pointer-events: auto;
      max-width: 480px;
    }
    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #9b7cff;
    }
    .subtitle {
      font-size: 12px;
      color: #8899bb;
      margin-bottom: 12px;
    }
    .config-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px 16px;
      font-size: 12px;
      margin-bottom: 12px;
    }
    .config-grid .label { color: #8899bb; }
    .config-grid .value { color: #e0e4ec; font-weight: 500; text-align: right; }
    .status {
      font-size: 13px;
      font-weight: 500;
      padding: 8px 12px;
      border-radius: 6px;
      text-align: center;
    }
    .status.warmup { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
    .status.measuring { background: rgba(52, 211, 153, 0.15); color: #34d399; }
    .status.done { background: rgba(107, 143, 255, 0.15); color: #6b8fff; }
    .status.error { background: rgba(239, 68, 68, 0.15); color: #ef4444; }

    .results {
      margin-top: 12px;
      display: none;
    }
    .results.show { display: block; }
    .results h2 {
      font-size: 13px;
      font-weight: 600;
      color: #6b8fff;
      margin-bottom: 8px;
    }
    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
    .result-cell {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 6px;
      padding: 8px;
      text-align: center;
    }
    .result-cell .val {
      font-size: 20px;
      font-weight: 700;
      color: #e0e4ec;
    }
    .result-cell .val.good { color: #34d399; }
    .result-cell .val.warn { color: #f59e0b; }
    .result-cell .val.bad { color: #ef4444; }
    .result-cell .lbl {
      font-size: 10px;
      color: #8899bb;
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .json-output {
      margin-top: 12px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 6px;
      padding: 8px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 10px;
      color: #8899bb;
      max-height: 200px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .target-check {
      margin-top: 8px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
    }
    .target-check.pass { background: rgba(52, 211, 153, 0.15); color: #34d399; }
    .target-check.fail { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
  </style>
</head>
<body>

<div id="canvas-container"></div>

<div id="overlay">
  <div class="panel">
    <h1>Performance Benchmark</h1>
    <div class="subtitle">Ontology Map Toolkit -- INV-OT-009</div>
    <div class="config-grid" id="configGrid"></div>
    <div class="status warmup" id="status">Initializing...</div>

    <div class="results" id="results">
      <h2>Results</h2>
      <div class="result-grid" id="resultGrid"></div>
      <div class="target-check" id="targetCheck"></div>
      <div class="json-output" id="jsonOutput"></div>
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/",
    "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/",
    "three/webgpu": "./js/stubs/webgpu.js"
  }
}
</script>

<script type="module">
import * as T from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { mkObj } from './js/scene/shapes.js';
import { setPalette, matFactory } from './js/scene/materials.js';
import { createInstancedScene, batchUpdatePositions } from './js/scene/instanced-renderer.js';

// ═══════════════════════════════════════════════════════════════════════
// URL PARAMS
// ═══════════════════════════════════════════════════════════════════════
const params = new URLSearchParams(window.location.search);
const CFG = {
  nodes:     parseInt(params.get('nodes') || '1000', 10),
  edges:     parseInt(params.get('edges') || '0', 10) || 0, // 0 = auto 3x
  duration:  parseInt(params.get('duration') || '10000', 10),
  stabilize: parseInt(params.get('stabilize') || '5000', 10),
  instanced: params.get('instanced') !== 'false', // default true
  worker:    params.get('worker') !== 'false',     // default true
  lod:       params.get('lod') === 'true',
};
if (CFG.edges === 0) CFG.edges = CFG.nodes * 3;

// ═══════════════════════════════════════════════════════════════════════
// SYNTHETIC GRAPH GENERATOR
// ═══════════════════════════════════════════════════════════════════════
const ALL_SHAPES = [
  'warehouse','factory','satellite','terminal','monument','pillars',
  'gear','gate','database','hourglass','brain','dyson_book','gauge',
  'hub','tree','sphere','prism','stairs','nexus','graph','dial',
  'vault','screens','rack','conveyor','monitor',
];
const GROUPS = ['module','layer','source','consumer','infra'];

function generateSyntheticGraph(N, M) {
  const nodes = [];
  const edges = [];

  for (let i = 0; i < N; i++) {
    const r = Math.sqrt(Math.random()) * 50;
    const theta = Math.random() * Math.PI * 2;
    nodes.push({
      id: `n${i}`,
      label: `Node ${i}`,
      g: GROUPS[i % GROUPS.length],
      sh: ALL_SHAPES[i % ALL_SHAPES.length],
      x: r * Math.cos(theta),
      z: r * Math.sin(theta),
      _inferredSize: 0.8 + Math.random() * 0.4,
      properties: {
        x: r * Math.cos(theta),
        z: r * Math.sin(theta),
        y: (Math.random() - 0.5) * 10,
        loc: Math.floor(Math.random() * 500) + 10,
      },
    });
  }

  const edgeSet = new Set();
  const types = ['IMPORTS','CALLS','DEPENDS_ON','CONTAINS'];
  const colors = ['green','blue','purple','cyan','white'];
  while (edges.length < M && edges.length < N * (N - 1) / 2) {
    const a = Math.floor(Math.random() * N);
    const b = Math.floor(Math.random() * N);
    if (a === b) continue;
    const key = `${Math.min(a, b)}-${Math.max(a, b)}`;
    if (edgeSet.has(key)) continue;
    edgeSet.add(key);
    edges.push({
      f: `n${a}`,
      t: `n${b}`,
      c: colors[Math.floor(Math.random() * colors.length)],
      type: types[Math.floor(Math.random() * types.length)],
    });
  }

  return { nodes, edges };
}

// ═══════════════════════════════════════════════════════════════════════
// THREE.JS SETUP (mirrors engine.js)
// ═══════════════════════════════════════════════════════════════════════
const container = document.getElementById('canvas-container');
const W = innerWidth, H = innerHeight;

const scene = new T.Scene();
scene.background = new T.Color(0x0a0c10);
scene.fog = new T.FogExp2(0x080a0e, 0.005);

// Lights
scene.add(new T.AmbientLight(0xf0ece8, 0.35));
const dLight = new T.DirectionalLight(0xfff8f0, 0.6);
dLight.position.set(8, 15, 10);
scene.add(dLight);
scene.add(new T.HemisphereLight(0xf0ece8, 0x000000, 0.25));

// Camera (orthographic, same as engine.js)
const FRUSTUM = 14;
const asp = W / H;
const cam = new T.OrthographicCamera(-FRUSTUM * asp, FRUSTUM * asp, FRUSTUM, -FRUSTUM, 0.1, 200);
cam.position.set(12, 18, 12);
cam.lookAt(0, 0, 0);

// Renderer
const ren = new T.WebGLRenderer({ antialias: true });
ren.setSize(W, H);
ren.setPixelRatio(Math.min(devicePixelRatio, 1.5));
ren.shadowMap.enabled = false;
ren.toneMapping = T.ACESFilmicToneMapping;
ren.toneMappingExposure = 1.1;
container.appendChild(ren.domElement);

// Environment map
const pmremGen = new T.PMREMGenerator(ren);
scene.environment = pmremGen.fromScene(new RoomEnvironment(), 0.04).texture;
pmremGen.dispose();

// Controls
const ctrl = new OrbitControls(cam, ren.domElement);
ctrl.enableDamping = true;
ctrl.dampingFactor = 0.06;

// Post-processing
const composer = new EffectComposer(ren);
composer.addPass(new RenderPass(scene, cam));

// Reduce bloom resolution for large scenes
const bloomDiv = CFG.nodes > 500 ? 8 : 4;
const bloomPass = new UnrealBloomPass(
  new T.Vector2(Math.floor(W / bloomDiv), Math.floor(H / bloomDiv)),
  0.15, 0.3, 0.94,
);
composer.addPass(bloomPass);
composer.addPass(new OutputPass());

// ═══════════════════════════════════════════════════════════════════════
// CONFIG DISPLAY
// ═══════════════════════════════════════════════════════════════════════
const configGrid = document.getElementById('configGrid');
const configPairs = [
  ['Nodes', CFG.nodes.toLocaleString()],
  ['Edges', CFG.edges.toLocaleString()],
  ['Instanced', CFG.instanced ? 'ON' : 'OFF'],
  ['Worker', CFG.worker ? 'ON' : 'OFF'],
  ['Duration', `${CFG.duration / 1000}s`],
  ['Stabilize', `${CFG.stabilize / 1000}s`],
  ['Pixel Ratio', Math.min(devicePixelRatio, 1.5).toFixed(1)],
  ['Resolution', `${Math.floor(W * Math.min(devicePixelRatio, 1.5))}x${Math.floor(H * Math.min(devicePixelRatio, 1.5))}`],
];
configGrid.innerHTML = configPairs.map(([l, v]) =>
  `<span class="label">${l}</span><span class="value">${v}</span>`
).join('');

// ═══════════════════════════════════════════════════════════════════════
// SCENE CONSTRUCTION
// ═══════════════════════════════════════════════════════════════════════
const statusEl = document.getElementById('status');

function setStatus(text, cls) {
  statusEl.textContent = text;
  statusEl.className = `status ${cls}`;
}

setStatus('Generating synthetic graph...', 'warmup');

const graphData = generateSyntheticGraph(CFG.nodes, CFG.edges);
let instancedScene = null;
let nodeOrder = graphData.nodes.map(n => n.id);

if (CFG.instanced) {
  // ── Instanced path ──────────────────────────────────────────────
  setStatus(`Building instanced scene (${CFG.nodes} nodes, ${ALL_SHAPES.length} shape types)...`, 'warmup');
  instancedScene = createInstancedScene(graphData.nodes, graphData.edges, scene);
} else {
  // ── Legacy per-Group path ───────────────────────────────────────
  setStatus(`Building Groups scene (${CFG.nodes} nodes)...`, 'warmup');
  const mainGroup = new T.Group();
  scene.add(mainGroup);

  graphData.nodes.forEach(n => {
    const g = new T.Group();
    const inferredSize = n._inferredSize || 1.0;
    const s = Math.max(1.5, inferredSize * 1.8 + 0.4);
    setPalette(n.sh, n.g);
    const obj = mkObj(n.sh, s, matFactory);
    obj.position.y = s * 0.38;
    g.add(obj);

    const baseY = n._inferredSize != null ? n._inferredSize * 0.5 + 0.5 : 1.0;
    g.position.set(n.x, baseY, n.z);
    mainGroup.add(g);
  });
}

// ═══════════════════════════════════════════════════════════════════════
// FORCE LAYOUT (Worker or main thread)
// ═══════════════════════════════════════════════════════════════════════
let forceWorker = null;
let workerReady = false;

if (CFG.worker) {
  try {
    forceWorker = new Worker('./js/workers/force-layout.js');
    forceWorker.onmessage = (e) => {
      const msg = e.data;
      if (msg.type === 'ready') {
        workerReady = true;
      } else if (msg.type === 'positions' && instancedScene) {
        batchUpdatePositions(instancedScene, nodeOrder, msg.data);
      } else if (msg.type === 'converged') {
        // Layout converged, stop ticking
      }
    };
    forceWorker.onerror = (err) => {
      console.warn('Worker error, falling back to no-layout:', err);
      forceWorker = null;
    };
    forceWorker.postMessage({
      type: 'init',
      nodes: graphData.nodes,
      edges: graphData.edges,
      config: {
        alpha: 0.3,
        alphaDecay: 0.02,
        velocityDecay: 0.4,
        chargeStrength: -80,
        linkDistance: 12,
        ticksPerMessage: 3,
      },
    });
  } catch (err) {
    console.warn('Worker creation failed:', err);
    forceWorker = null;
  }
}

// ═══════════════════════════════════════════════════════════════════════
// BENCHMARK MEASUREMENT
// ═══════════════════════════════════════════════════════════════════════
function runBenchmark(durationMs, stabilizeMs) {
  return new Promise((resolve) => {
    const frameTimes = [];
    let lastTime = 0;
    let measuring = false;
    let startTime = 0;
    const warmupEnd = performance.now() + stabilizeMs;

    function tick(now) {
      // Update controls
      ctrl.update();

      // Tick worker if available
      if (forceWorker && workerReady) {
        forceWorker.postMessage({ type: 'tick' });
      }

      // Render
      composer.render();

      if (!measuring && now >= warmupEnd) {
        measuring = true;
        startTime = now;
        lastTime = now;
        ren.info.reset();
        setStatus('Measuring...', 'measuring');
      }

      if (measuring) {
        if (lastTime > 0 && lastTime !== now) {
          frameTimes.push(now - lastTime);
        }
        lastTime = now;

        if (now - startTime >= durationMs) {
          const sorted = [...frameTimes].sort((a, b) => a - b);
          const toFps = (ms) => ms > 0 ? 1000 / ms : 0;

          resolve({
            frames: frameTimes.length,
            fps_p50: toFps(sorted[Math.floor(sorted.length * 0.50)]),
            fps_p95: toFps(sorted[Math.floor(sorted.length * 0.95)]),
            fps_min: toFps(sorted[sorted.length - 1]),
            memory_mb: performance.memory
              ? Math.round(performance.memory.usedJSHeapSize / 1048576)
              : null,
            draw_calls: ren.info.render.calls,
            triangles: ren.info.render.triangles,
          });
          return;
        }
      } else {
        const elapsed = now - (warmupEnd - stabilizeMs);
        const pct = Math.min(100, Math.floor((elapsed / stabilizeMs) * 100));
        setStatus(`Stabilizing... ${pct}%`, 'warmup');
      }

      requestAnimationFrame(tick);
    }

    requestAnimationFrame(tick);
  });
}

// ═══════════════════════════════════════════════════════════════════════
// RUN
// ═══════════════════════════════════════════════════════════════════════
async function main() {
  try {
    setStatus('Stabilizing...', 'warmup');
    const results = await runBenchmark(CFG.duration, CFG.stabilize);

    setStatus('Benchmark complete', 'done');

    // Build full report
    const report = {
      timestamp: new Date().toISOString(),
      config: {
        nodes: CFG.nodes,
        edges: CFG.edges,
        instanced: CFG.instanced,
        worker: CFG.worker,
        lod: CFG.lod,
        pixel_ratio: Math.min(devicePixelRatio, 1.5),
        resolution: [
          Math.floor(W * Math.min(devicePixelRatio, 1.5)),
          Math.floor(H * Math.min(devicePixelRatio, 1.5)),
        ],
        user_agent: navigator.userAgent,
      },
      results,
    };

    // Expose for Puppeteer/Playwright
    window.__BENCHMARK_RESULT__ = report;

    // Display results
    const resultsEl = document.getElementById('results');
    const resultGrid = document.getElementById('resultGrid');
    const jsonOutput = document.getElementById('jsonOutput');
    const targetCheck = document.getElementById('targetCheck');
    resultsEl.classList.add('show');

    const fpsClass = (v) => v >= 55 ? 'good' : v >= 30 ? 'warn' : 'bad';

    const cells = [
      { val: results.fps_p50.toFixed(1), lbl: 'FPS p50', cls: fpsClass(results.fps_p50) },
      { val: results.fps_p95.toFixed(1), lbl: 'FPS p95', cls: fpsClass(results.fps_p95) },
      { val: results.fps_min.toFixed(1), lbl: 'FPS min', cls: fpsClass(results.fps_min) },
      { val: results.memory_mb != null ? `${results.memory_mb}` : 'N/A', lbl: 'Heap MB', cls: '' },
      { val: results.draw_calls.toLocaleString(), lbl: 'Draw Calls', cls: results.draw_calls < 200 ? 'good' : 'bad' },
      { val: results.triangles.toLocaleString(), lbl: 'Triangles', cls: '' },
    ];

    resultGrid.innerHTML = cells.map(c =>
      `<div class="result-cell"><div class="val ${c.cls}">${c.val}</div><div class="lbl">${c.lbl}</div></div>`
    ).join('');

    // Target check: INV-OT-009 (10K nodes @ 60fps, draw calls < 200)
    const meetsTarget = results.fps_p50 >= 60 && results.draw_calls < 200;
    const drawCallOk = results.draw_calls < 200;
    targetCheck.className = `target-check ${meetsTarget ? 'pass' : 'fail'}`;
    targetCheck.innerHTML = meetsTarget
      ? `PASS -- INV-OT-009: ${CFG.nodes} nodes @ ${results.fps_p50.toFixed(1)} fps, ${results.draw_calls} draw calls`
      : `${drawCallOk ? 'PARTIAL' : 'FAIL'} -- FPS p50: ${results.fps_p50.toFixed(1)} (target: 60), Draw calls: ${results.draw_calls} (target: <200)`;

    jsonOutput.textContent = JSON.stringify(report, null, 2);
    console.log('[Benchmark] Result:', JSON.stringify(report, null, 2));

    // Stop worker
    if (forceWorker) {
      forceWorker.postMessage({ type: 'stop' });
    }

  } catch (err) {
    setStatus(`Error: ${err.message}`, 'error');
    console.error('[Benchmark]', err);
  }
}

main();
</script>
</body>
</html>
