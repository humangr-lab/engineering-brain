<!DOCTYPE html>
<html>
<head><title>Debug</title>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/",
    "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/",
    "three/webgpu": "./js/stubs/webgpu.js",
    "3d-force-graph": "https://esm.sh/3d-force-graph@1.73.0?external=three",
    "d3-force-3d": "https://esm.sh/d3-force-3d@3"
  }
}
</script>
</head>
<body style="background:#111;color:#0f0;font-family:monospace;padding:20px;white-space:pre-wrap;">
<div id="sc" style="position:fixed;inset:0;z-index:-1"></div>
<div id="log" style="position:relative;z-index:10"></div>
<script type="module">
const el = document.getElementById('log');
function log(msg) { el.textContent += msg + '\n'; }

window.onerror = (msg, src, line, col, err) => {
  log('GLOBAL ERROR: ' + msg + ' at ' + src + ':' + line);
  if (err && err.stack) log('  ' + err.stack);
};
window.addEventListener('unhandledrejection', (e) => {
  log('UNHANDLED PROMISE: ' + (e.reason?.message || e.reason));
  if (e.reason?.stack) log('  ' + e.reason.stack);
});

async function test() {
  log('=== Module Import Test ===\n');

  const tests = [
    ['three', () => import('three')],
    ['ParametricGeometry', () => import('three/addons/geometries/ParametricGeometry.js')],
    ['CSS2DRenderer', () => import('three/addons/renderers/CSS2DRenderer.js')],
    ['EffectComposer', () => import('three/addons/postprocessing/EffectComposer.js')],
    ['OutputPass', () => import('three/addons/postprocessing/OutputPass.js')],
    ['SMAAPass', () => import('three/addons/postprocessing/SMAAPass.js')],
    ['RoomEnvironment', () => import('three/addons/environments/RoomEnvironment.js')],
    ['config.js', () => import('./js/config.js')],
    ['state.js', () => import('./js/state.js')],
    ['schema.js', () => import('./js/schema.js')],
    ['sysmap.js', () => import('./js/data/sysmap.js')],
    ['materials.js', () => import('./js/scene/materials.js')],
    ['shapes.js', () => import('./js/scene/shapes.js')],
    ['engine.js', () => import('./js/scene/engine.js')],
    ['platforms.js', () => import('./js/scene/platforms.js')],
    ['connections.js', () => import('./js/scene/connections.js')],
    ['labels.js', () => import('./js/scene/labels.js')],
    ['layout.js', () => import('./js/scene/layout.js')],
    ['interaction.js', () => import('./js/scene/interaction.js')],
    ['animation.js', () => import('./js/scene/animation.js')],
    ['submaps.js', () => import('./js/scene/submaps.js')],
    ['theme.js', () => import('./js/theme.js')],
    ['search.js', () => import('./js/search.js')],
    ['filters.js', () => import('./js/klib/filters.js')],
    ['list.js', () => import('./js/klib/list.js')],
    ['detail.js', () => import('./js/klib/detail.js')],
    ['force-graph.js', () => import('./js/klib/force-graph.js')],
    ['klib.js', () => import('./js/klib/klib.js')],
    ['detail-panel.js', () => import('./js/panels/detail-panel.js')],
    ['stats-bar.js', () => import('./js/panels/stats-bar.js')],
    ['tour.js', () => import('./js/tour.js')],
    ['api.js', () => import('./js/api.js')],
  ];

  for (const [name, fn] of tests) {
    try {
      await fn();
      log('OK  ' + name);
    } catch(e) {
      log('FAIL ' + name + ': ' + e.message);
      if (e.stack) log('     ' + e.stack.split('\n').slice(0,3).join('\n     '));
      log('\n--- STOPPED ---');
      return;
    }
  }

  log('\n=== All imports OK ===\n');
  log('Now testing boot sequence...\n');

  try {
    const { initEngine, scene } = await import('./js/scene/engine.js');
    const container = document.getElementById('sc');
    log('Calling initEngine...');
    initEngine(container);
    log('initEngine OK, scene=' + (scene ? 'yes' : 'no'));
  } catch(e) {
    log('initEngine FAIL: ' + e.message);
    if (e.stack) log('  ' + e.stack.split('\n').slice(0,5).join('\n  '));
    return;
  }

  try {
    const { setPalette, matFactory } = await import('./js/scene/materials.js');
    log('setPalette("brain","module")...');
    setPalette('brain', 'module');
    log('palette = ' + JSON.stringify(matFactory.palette));
    log('matFactory.dark() = ' + matFactory.dark());
    log('matFactory OK');
  } catch(e) {
    log('matFactory FAIL: ' + e.message);
    return;
  }

  try {
    const { mkObj } = await import('./js/scene/shapes.js');
    const { matFactory, setPalette } = await import('./js/scene/materials.js');
    log('Testing mkObj("brain", 2.2, matFactory)...');
    setPalette('brain', 'module');
    const obj = mkObj('brain', 2.2, matFactory);
    log('brain OK, children=' + obj.children.length);

    log('Testing mkObj("dyson_book", 2.2, matFactory)...');
    setPalette('dyson_book', 'module');
    const obj2 = mkObj('dyson_book', 2.2, matFactory);
    log('dyson_book OK, children=' + obj2.children.length);
  } catch(e) {
    log('mkObj FAIL: ' + e.message);
    if (e.stack) log('  ' + e.stack.split('\n').slice(0,5).join('\n  '));
    return;
  }

  log('\n=== All tests passed. Full app.js boot next... ===');
}

test();
</script>
</body>
</html>
