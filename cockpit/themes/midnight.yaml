# ============================================================================
# MIDNIGHT — Dark Theme (Primary)
# Ontology Map Toolkit Design System
# ============================================================================
# All color values in OKLCH: oklch(Lightness% Chroma Hue)
# See docs/design/design_system.md for rationale and migration guide.
# ============================================================================

name: midnight
mode: dark

# ── Colors ──────────────────────────────────────────────────────────────────

colors:

  # Background surfaces — deep navy-violet, 5% L increments
  surface:
    surface-0: "oklch(13% 0.02 260)"     # deepest background (canvas, body)
    surface-1: "oklch(18% 0.02 260)"     # card / panel background
    surface-2: "oklch(23% 0.02 260)"     # hover states
    surface-3: "oklch(28% 0.02 260)"     # active / selected states

  # Text hierarchy — high to low emphasis
  # All exceed WCAG AA 4.5:1 contrast on surface-0
  text:
    primary:   "oklch(92% 0.02 260)"     # main body text, headings (~12:1 on surface-0)
    secondary: "oklch(70% 0.02 260)"     # descriptions, meta text (~5.5:1 on surface-0)
    tertiary:  "oklch(50% 0.02 260)"     # muted, captions, hints (~4.5:1 on surface-0)

  # Named accent colors — semantic aliases for the categorical palette
  accent:
    red:    "oklch(65% 0.15 0)"          # errors, critical severity
    orange: "oklch(65% 0.15 45)"         # warnings, high severity
    amber:  "oklch(65% 0.15 90)"         # caution, time-related
    green:  "oklch(65% 0.15 135)"        # success, source nodes
    teal:   "oklch(65% 0.15 180)"        # info, consumer nodes
    blue:   "oklch(65% 0.15 225)"        # links, layer nodes
    indigo: "oklch(65% 0.15 270)"        # tertiary accent
    purple: "oklch(65% 0.15 315)"        # module nodes, hero elements

  # Border colors
  border:
    default:  "oklch(25% 0.01 260)"      # subtle dividers
    emphasis: "oklch(35% 0.02 260)"      # important borders, focus rings

  # Categorical palette — 8 colors for data visualization and node types
  # L=65%, C=0.15, hues at 45-degree intervals
  # Minimum hue separation = 45 deg => DeltaE > 30 between all pairs
  categorical:
    - "oklch(65% 0.15 0)"               # [0] red
    - "oklch(65% 0.15 45)"              # [1] orange
    - "oklch(65% 0.15 90)"              # [2] amber
    - "oklch(65% 0.15 135)"             # [3] green
    - "oklch(65% 0.15 180)"             # [4] teal
    - "oklch(65% 0.15 225)"             # [5] blue
    - "oklch(65% 0.15 270)"             # [6] indigo
    - "oklch(65% 0.15 315)"             # [7] purple

  # Semantic status colors (derived from accents, adjusted for readability)
  status:
    success:  "oklch(75% 0.15 150)"      # confirmation, passed
    warning:  "oklch(75% 0.15 80)"       # caution, attention
    error:    "oklch(70% 0.18 25)"       # failure, blocking
    info:     "oklch(70% 0.12 250)"      # neutral information

  # Severity badge colors (text on dark badges)
  severity:
    critical-bg:   "oklch(25% 0.06 15)"
    critical-text: "oklch(80% 0.08 20)"
    high-bg:       "oklch(25% 0.06 75)"
    high-text:     "oklch(82% 0.14 85)"
    medium-bg:     "oklch(22% 0.04 250)"
    medium-text:   "oklch(76% 0.08 250)"
    low-bg:        "oklch(22% 0.04 165)"
    low-text:      "oklch(84% 0.10 165)"
    info-bg:       "oklch(22% 0.04 295)"
    info-text:     "oklch(80% 0.08 295)"

# ── Spacing ─────────────────────────────────────────────────────────────────
# Strict 4px grid. All layout spacing uses these tokens.

spacing:
  space-1:  "4px"
  space-2:  "8px"
  space-3:  "12px"
  space-4:  "16px"
  space-5:  "20px"
  space-6:  "24px"
  space-8:  "32px"
  space-10: "40px"
  space-12: "48px"
  space-16: "64px"

# ── Typography ──────────────────────────────────────────────────────────────
# Modular scale 1.25, max 2 families + 3 weights (INV-OT-030)

typography:
  font-family: "'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif"
  font-mono:   "'JetBrains Mono', 'SF Mono', 'Cascadia Code', 'Fira Code', monospace"

  # Size scale (font-size / line-height)
  text-xs:   "10px"
  text-sm:   "12px"
  text-base: "14px"
  text-lg:   "16px"
  text-xl:   "20px"
  text-2xl:  "24px"

  line-height-xs:   "14px"
  line-height-sm:   "16px"
  line-height-base: "20px"
  line-height-lg:   "22px"
  line-height-xl:   "28px"
  line-height-2xl:  "32px"

  # Weights
  font-regular:  400
  font-medium:   500
  font-semibold: 600

  # Letter spacing
  tracking-tight:  "-0.02em"
  tracking-normal: "0"
  tracking-wide:   "0.05em"
  tracking-widest: "0.1em"

# ── Border Radii ────────────────────────────────────────────────────────────

radii:
  radius-sm:   "4px"        # badges, small elements
  radius-md:   "8px"        # cards, inputs, buttons
  radius-lg:   "12px"       # modals, overlays, large panels
  radius-full: "9999px"     # pills, circles, toggles

# ── Shadows ─────────────────────────────────────────────────────────────────
# OKLCH-based, subtle layered shadows

shadows:
  shadow-sm:   "0 1px 2px oklch(0% 0 0 / 0.05)"
  shadow-md:   "0 4px 6px oklch(0% 0 0 / 0.07), 0 2px 4px oklch(0% 0 0 / 0.06)"
  shadow-lg:   "0 10px 15px oklch(0% 0 0 / 0.1), 0 4px 6px oklch(0% 0 0 / 0.05)"
  shadow-glow: "0 0 20px oklch(65% 0.15 260 / 0.15)"

# ── Motion ──────────────────────────────────────────────────────────────────
# INV-OT-029: no animation > 1s, hover < 100ms, drill-down < 400ms

motion:
  # Durations
  duration-fast:      "100ms"
  duration-normal:    "200ms"
  duration-slow:      "400ms"
  duration-cinematic: "800ms"

  # Easing curves
  ease-default: "cubic-bezier(0.2, 0, 0, 1)"
  ease-in:      "cubic-bezier(0.4, 0, 1, 1)"
  ease-out:     "cubic-bezier(0, 0, 0.2, 1)"
  ease-spring:  "cubic-bezier(0.34, 1.56, 0.64, 1)"

  # Stagger
  stagger-appear: "30ms"

# ── 3D Materials ────────────────────────────────────────────────────────────
# INV-OT-028: emissive <= 0.3, roughness >= 0.4, metalness <= 0.4

materials:
  # Metalness (higher = more mirror-like)
  metalness-high: 0.30
  metalness-mid:  0.25
  metalness-low:  0.18

  # Roughness (higher = more diffuse)
  roughness-high: 0.70
  roughness-mid:  0.55
  roughness-low:  0.45

  # Emissive intensity (glow)
  emissive-max:  0.25
  emissive-glow: 0.20
  emissive-soft: 0.10

  # Scene lighting
  ambient-intensity:     0.40
  directional-intensity: 0.70
  directional-color:     "oklch(95% 0.01 260)"

  # Neon group colors (for glowing connection lines)
  neon-source:   "oklch(75% 0.15 135)"   # green
  neon-layer:    "oklch(65% 0.15 225)"   # blue
  neon-module:   "oklch(65% 0.15 315)"   # purple
  neon-consumer: "oklch(80% 0.12 180)"   # teal/cyan

  # Connection line colors (dark mode)
  connection-green:  "oklch(75% 0.15 150)"
  connection-blue:   "oklch(66% 0.14 240)"
  connection-purple: "oklch(63% 0.16 300)"
  connection-cyan:   "oklch(80% 0.10 185)"
  connection-muted:  "oklch(60% 0.03 250)"

  # Tone mapping
  tone-mapping: "ACESFilmic"

  # Bloom post-processing
  bloom-threshold: 0.80
  bloom-strength:  0.30
  bloom-radius:    0.40
