# ============================================================================
# DAYLIGHT — Light Theme
# Ontology Map Toolkit Design System
# ============================================================================
# All color values in OKLCH: oklch(Lightness% Chroma Hue)
# See docs/design/design_system.md for rationale and migration guide.
# ============================================================================

name: daylight
mode: light

# ── Colors ──────────────────────────────────────────────────────────────────

colors:

  # Background surfaces — bright with subtle blue-violet tint, descending L
  surface:
    surface-0: "oklch(98% 0.01 260)"     # brightest background (canvas, body)
    surface-1: "oklch(95% 0.01 260)"     # card / panel background
    surface-2: "oklch(91% 0.012 260)"    # hover states
    surface-3: "oklch(87% 0.015 260)"    # active / selected states

  # Text hierarchy — dark on light
  # All exceed WCAG AA 4.5:1 contrast on surface-0
  text:
    primary:   "oklch(15% 0.02 260)"     # main body text, headings (~14:1 on surface-0)
    secondary: "oklch(40% 0.02 260)"     # descriptions, meta text (~6:1 on surface-0)
    tertiary:  "oklch(60% 0.01 260)"     # muted, captions, hints (~4.5:1 on surface-0)

  # Named accent colors — darker than dark-mode to maintain contrast on light bg
  accent:
    red:    "oklch(55% 0.15 0)"          # errors, critical severity
    orange: "oklch(55% 0.15 45)"         # warnings, high severity
    amber:  "oklch(55% 0.15 90)"         # caution, time-related
    green:  "oklch(55% 0.15 135)"        # success, source nodes
    teal:   "oklch(55% 0.15 180)"        # info, consumer nodes
    blue:   "oklch(55% 0.15 225)"        # links, layer nodes
    indigo: "oklch(55% 0.15 270)"        # tertiary accent
    purple: "oklch(55% 0.15 315)"        # module nodes, hero elements

  # Border colors
  border:
    default:  "oklch(85% 0.01 260)"      # subtle dividers
    emphasis: "oklch(75% 0.02 260)"      # important borders, focus rings

  # Categorical palette — 8 colors for data visualization and node types
  # L=55%, C=0.15, hues at 45-degree intervals
  # Minimum hue separation = 45 deg => DeltaE > 30 between all pairs
  categorical:
    - "oklch(55% 0.15 0)"               # [0] red
    - "oklch(55% 0.15 45)"              # [1] orange
    - "oklch(55% 0.15 90)"              # [2] amber
    - "oklch(55% 0.15 135)"             # [3] green
    - "oklch(55% 0.15 180)"             # [4] teal
    - "oklch(55% 0.15 225)"             # [5] blue
    - "oklch(55% 0.15 270)"             # [6] indigo
    - "oklch(55% 0.15 315)"             # [7] purple

  # Semantic status colors (adjusted for light backgrounds)
  status:
    success:  "oklch(45% 0.15 150)"      # confirmation, passed
    warning:  "oklch(50% 0.15 80)"       # caution, attention
    error:    "oklch(48% 0.18 25)"       # failure, blocking
    info:     "oklch(50% 0.12 250)"      # neutral information

  # Severity badge colors (text on light badges)
  severity:
    critical-bg:   "oklch(93% 0.04 15)"
    critical-text: "oklch(45% 0.14 20)"
    high-bg:       "oklch(93% 0.04 75)"
    high-text:     "oklch(48% 0.14 85)"
    medium-bg:     "oklch(93% 0.03 250)"
    medium-text:   "oklch(45% 0.10 250)"
    low-bg:        "oklch(93% 0.03 165)"
    low-text:      "oklch(40% 0.10 165)"
    info-bg:       "oklch(93% 0.03 295)"
    info-text:     "oklch(45% 0.10 295)"

# ── Spacing ─────────────────────────────────────────────────────────────────
# Same 4px grid as midnight — spacing is theme-independent

spacing:
  space-1:  "4px"
  space-2:  "8px"
  space-3:  "12px"
  space-4:  "16px"
  space-5:  "20px"
  space-6:  "24px"
  space-8:  "32px"
  space-10: "40px"
  space-12: "48px"
  space-16: "64px"

# ── Typography ──────────────────────────────────────────────────────────────
# Same families, scale, and weights as midnight (INV-OT-030)

typography:
  font-family: "'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif"
  font-mono:   "'JetBrains Mono', 'SF Mono', 'Cascadia Code', 'Fira Code', monospace"

  # Size scale (font-size / line-height)
  text-xs:   "10px"
  text-sm:   "12px"
  text-base: "14px"
  text-lg:   "16px"
  text-xl:   "20px"
  text-2xl:  "24px"

  line-height-xs:   "14px"
  line-height-sm:   "16px"
  line-height-base: "20px"
  line-height-lg:   "22px"
  line-height-xl:   "28px"
  line-height-2xl:  "32px"

  # Weights
  font-regular:  400
  font-medium:   500
  font-semibold: 600

  # Letter spacing
  tracking-tight:  "-0.02em"
  tracking-normal: "0"
  tracking-wide:   "0.05em"
  tracking-widest: "0.1em"

# ── Border Radii ────────────────────────────────────────────────────────────

radii:
  radius-sm:   "4px"
  radius-md:   "8px"
  radius-lg:   "12px"
  radius-full: "9999px"

# ── Shadows ─────────────────────────────────────────────────────────────────
# Lighter shadows for light mode — slightly more spread to compensate
# for reduced contrast against bright backgrounds

shadows:
  shadow-sm:   "0 1px 3px oklch(0% 0 0 / 0.04), 0 1px 2px oklch(0% 0 0 / 0.03)"
  shadow-md:   "0 4px 8px oklch(0% 0 0 / 0.06), 0 2px 4px oklch(0% 0 0 / 0.04)"
  shadow-lg:   "0 12px 20px oklch(0% 0 0 / 0.08), 0 4px 8px oklch(0% 0 0 / 0.04)"
  shadow-glow: "0 0 24px oklch(55% 0.15 260 / 0.12)"

# ── Motion ──────────────────────────────────────────────────────────────────
# Same timing as midnight — motion is theme-independent

motion:
  # Durations
  duration-fast:      "100ms"
  duration-normal:    "200ms"
  duration-slow:      "400ms"
  duration-cinematic: "800ms"

  # Easing curves
  ease-default: "cubic-bezier(0.2, 0, 0, 1)"
  ease-in:      "cubic-bezier(0.4, 0, 1, 1)"
  ease-out:     "cubic-bezier(0, 0, 0.2, 1)"
  ease-spring:  "cubic-bezier(0.34, 1.56, 0.64, 1)"

  # Stagger
  stagger-appear: "30ms"

# ── 3D Materials ────────────────────────────────────────────────────────────
# Light mode: higher roughness (more diffuse), lower metalness (less glare),
# lower emissive (less glow needed against bright backgrounds)
# INV-OT-028: emissive <= 0.3, roughness >= 0.4, metalness <= 0.4

materials:
  # Metalness (reduced for light mode — less mirror reflection)
  metalness-high: 0.20
  metalness-mid:  0.15
  metalness-low:  0.10

  # Roughness (increased for light mode — softer, more matte appearance)
  roughness-high: 0.80
  roughness-mid:  0.65
  roughness-low:  0.55

  # Emissive intensity (reduced — bright scene needs less glow)
  emissive-max:  0.15
  emissive-glow: 0.10
  emissive-soft: 0.05

  # Scene lighting (brighter ambient, softer directional)
  ambient-intensity:     0.55
  directional-intensity: 0.60
  directional-color:     "oklch(98% 0.005 260)"

  # Neon group colors (darker for light backgrounds)
  neon-source:   "oklch(50% 0.18 135)"   # dark green
  neon-layer:    "oklch(48% 0.18 225)"   # dark blue
  neon-module:   "oklch(48% 0.18 315)"   # dark purple
  neon-consumer: "oklch(50% 0.15 180)"   # dark teal

  # Connection line colors (light mode — darker for visibility)
  connection-green:  "oklch(42% 0.15 150)"
  connection-blue:   "oklch(40% 0.14 240)"
  connection-purple: "oklch(40% 0.16 300)"
  connection-cyan:   "oklch(42% 0.12 185)"
  connection-muted:  "oklch(50% 0.03 250)"

  # Tone mapping (same algorithm, lighter scene)
  tone-mapping: "ACESFilmic"

  # Bloom post-processing (subtle in light mode)
  bloom-threshold: 0.90
  bloom-strength:  0.15
  bloom-radius:    0.30
