<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <rect width="128" height="128" rx="16" fill="#0f172a"/>
  <g transform="translate(64,64)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="40" fill="none" stroke="#1e293b" stroke-width="1.5"/>
    <!-- Edges -->
    <line x1="0" y1="-30" x2="-26" y2="15" stroke="#64c8b4" stroke-width="1.5" opacity="0.5"/>
    <line x1="0" y1="-30" x2="26" y2="15" stroke="#64c8b4" stroke-width="1.5" opacity="0.5"/>
    <line x1="-26" y1="15" x2="26" y2="15" stroke="#64c8b4" stroke-width="1.5" opacity="0.5"/>
    <line x1="0" y1="-30" x2="0" y2="0" stroke="#64c8b4" stroke-width="1.5" opacity="0.4"/>
    <line x1="-26" y1="15" x2="0" y2="0" stroke="#64c8b4" stroke-width="1.5" opacity="0.4"/>
    <line x1="26" y1="15" x2="0" y2="0" stroke="#64c8b4" stroke-width="1.5" opacity="0.4"/>
    <!-- Center node -->
    <circle cx="0" cy="0" r="7" fill="#64c8b4"/>
    <!-- Outer nodes -->
    <circle cx="0" cy="-30" r="6" fill="#b482ff"/>
    <circle cx="-26" cy="15" r="6" fill="#64b4ff"/>
    <circle cx="26" cy="15" r="6" fill="#78dc8c"/>
    <!-- Small satellite nodes -->
    <circle cx="-15" cy="-32" r="3" fill="#ffb464" opacity="0.8"/>
    <circle cx="15" cy="-32" r="3" fill="#ff8cc8" opacity="0.8"/>
    <circle cx="-36" cy="-5" r="3" fill="#8cc8ff" opacity="0.8"/>
    <circle cx="36" cy="-5" r="3" fill="#dca0ff" opacity="0.8"/>
    <!-- Satellite edges -->
    <line x1="-15" y1="-32" x2="0" y2="-30" stroke="#ffb464" stroke-width="1" opacity="0.3"/>
    <line x1="15" y1="-32" x2="0" y2="-30" stroke="#ff8cc8" stroke-width="1" opacity="0.3"/>
    <line x1="-36" y1="-5" x2="-26" y2="15" stroke="#8cc8ff" stroke-width="1" opacity="0.3"/>
    <line x1="36" y1="-5" x2="26" y2="15" stroke="#dca0ff" stroke-width="1" opacity="0.3"/>
  </g>
</svg>
