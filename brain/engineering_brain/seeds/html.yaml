layer: rules
technology: HTML
domain: ui
knowledge:
- id: CR-HTML-SEM-001
  text: Use semantic HTML elements (header, main, nav, article, section, footer) not div soup.
  why: Semantic elements communicate meaning to screen readers, search engines, and developers. A <nav> says 'navigation'
    — a <div class='nav'> says nothing to assistive technology.
  how_to_do_right: header for site/section headers. nav for navigation links. main for primary content (one per page). article
    for self-contained content. section for thematic grouping. footer for metadata.
  severity: high
  technologies:
    lang: [html]
  domains:
    domain: [architecture, ui, quality]
    concern: [frontend, accessibility]
  example_good: "<header><h1>My App</h1></header>\n<nav><a href=\"/\">Home</a> <a href=\"/about\">About</a></nav>\n<main>\n\
    \  <article><h2>Post Title</h2><p>Content...</p></article>\n</main>\n<footer><p>&copy; 2026</p></footer>\n"
  example_bad: '<div class="header"><div class="title">My App</div></div>

    <div class="nav"><div class="link">Home</div></div>

    <div class="content"><div class="post">Content...</div></div>

    '
  when_applies: Projects using HTML document structure
  when_not_applies: headless services, APIs, CLIs, or backend-only systems. projects not using HTML
  sources: ["https://developer.mozilla.org/en-US/docs/Web/HTML/Element#content_sectioning"]
- id: CR-HTML-SEM-002
  text: Heading levels (h1-h6) must be sequential — never skip levels.
  why: Screen readers use headings for navigation. Skipping h2→h4 creates a confusing outline. Search engines use heading
    hierarchy for content structure.
  how_to_do_right: One h1 per page (main title). h2 for sections. h3 for subsections. Never use heading elements for visual
    styling — use CSS instead.
  severity: medium
  technologies:
    lang: [html]
  domains:
    domain: [architecture, ui, quality]
    concern: [frontend, accessibility]
  when_applies: Projects using HTML document structure
  when_not_applies: headless services, APIs, CLIs, or backend-only systems. projects not using HTML
  example_good: |
    <h1>My App</h1>
    <h2>Features</h2>
    <h3>Performance</h3>
    <h3>Security</h3>
    <h2>Pricing</h2>
  example_bad: |
    <h1>My App</h1>
    <h4>Features</h4>  <!-- Skipped h2 and h3! -->
    <h2>Pricing</h2>
  sources: ["https://developer.mozilla.org/en-US/docs/Web/HTML/Element/heading_elements"]
- id: CR-HTML-FORM-001
  text: Every form must have an action attribute and method (GET or POST).
  why: Without action, the form submits to the current URL (may cause unintended behavior). Without method, it defaults to
    GET (query params visible in URL — bad for sensitive data).
  how_to_do_right: Always specify action='/api/endpoint' and method='POST' for data submission. Use GET only for search/filter
    forms where URL sharing is desired.
  severity: high
  technologies:
    lang: [html, python]
    framework: [flask, fastapi]
  domains:
    domain: [architecture, ui, api]
    concern: [frontend]
  example_good: "<form action=\"/api/login\" method=\"POST\">\n  <label for=\"email\">Email</label>\n  <input type=\"email\"\
    \ id=\"email\" name=\"email\" required>\n  <button type=\"submit\">Login</button>\n</form>\n"
  example_bad: "<form>  <!-- No action, no method — submits GET to current URL -->\n  <input type=\"text\" name=\"password\"\
    >  <!-- Password in GET params! -->\n  <button>Submit</button>\n</form>\n"
  when_applies: Projects using HTML document structure, Flask web applications, or FastAPI async web services
  when_not_applies: headless services, APIs, CLIs, or backend-only systems
  sources: ["https://developer.mozilla.org/en-US/docs/Web/HTML/Element/form"]
- id: CR-HTML-FORM-002
  text: Form inputs must use correct type attributes (email, password, number, tel, url).
  why: Input types enable browser validation (email format, number ranges), mobile keyboard optimization (numeric pad for
    tel), and autofill (password managers).
  how_to_do_right: email for emails, password for secrets, number with min/max for quantities, tel for phones, url for URLs.
    Add pattern attribute for custom validation.
  severity: high
  technologies:
    lang: [html]
  domains:
    domain: [architecture, ui, security]
    concern: [frontend]
  example_good: '<input type="email" name="email" required>

    <input type="password" name="password" minlength="8" required>

    <input type="number" name="quantity" min="1" max="100">

    '
  example_bad: '<input type="text" name="email">  <!-- No email validation -->

    <input type="text" name="password">  <!-- Visible, no autofill -->

    '
  when_applies: Projects using HTML document structure
  when_not_applies: headless services, APIs, CLIs, or backend-only systems. projects not using HTML
  sources: ["https://developer.mozilla.org/en-US/docs/Web/HTML/Element/input#input_types"]
- id: CR-HTML-FORM-003
  text: Submit buttons must be type='submit' inside forms, not just onclick handlers.
  why: type='submit' enables Enter-key submission, form validation API, and proper accessibility. onclick-only buttons bypass
    form validation and break keyboard navigation.
  how_to_do_right: Use <button type='submit'>. If you need JS handling, use form.addEventListener('submit', handler) which
    still runs validation.
  severity: medium
  technologies:
    lang: [html, javascript]
  domains:
    domain: [architecture, ui, quality]
    concern: [frontend, accessibility]
  when_applies: Projects using HTML document structure or JavaScript/TypeScript projects
  when_not_applies: headless services, APIs, CLIs, or backend-only systems. projects not using HTML or JavaScript
  example_good: |
    <form id="search-form">
      <input type="text" name="q" required>
      <button type="submit">Search</button>
    </form>
  example_bad: |
    <form id="search-form">
      <input type="text" name="q">
      <div onclick="submitForm()">Search</div>
      <!-- Not focusable, no Enter-key submit, no validation -->
    </form>
  sources: ["https://developer.mozilla.org/en-US/docs/Web/HTML/Element/button"]
- id: CR-HTML-A11Y-001
  text: Images must have alt attributes — decorative images use alt='' (empty).
  why: Screen readers read alt text aloud. Without alt, they read the filename ('IMG_20260215_143022.jpg'). Missing alt is
    an accessibility violation (WCAG 2.1 Level A).
  how_to_do_right: 'Informative images: alt=''Description of content''. Decorative images: alt='''' (empty, not missing).
    Complex images: use aria-describedby with longer description.'
  severity: high
  technologies:
    lang: [html]
  domains:
    domain: [architecture, ui, quality]
    concern: [frontend, accessibility]
  example_good: '<img src="chart.png" alt="Revenue grew 40% in Q4 2025">

    <img src="decorative-border.svg" alt="">  <!-- Decorative -->

    '
  example_bad: '<img src="chart.png">  <!-- Missing alt — screen reader says filename -->

    '
  when_applies: Projects using HTML document structure
  when_not_applies: headless services, APIs, CLIs, or backend-only systems. projects not using HTML
  sources: ["https://www.w3.org/WAI/tutorials/images/", "https://developer.mozilla.org/en-US/docs/Web/HTML/Element/img#accessibility"]
- id: CR-HTML-A11Y-002
  text: Interactive elements must be focusable and keyboard-operable.
  why: Users who can't use a mouse (motor disabilities, power users) navigate with Tab/Enter/Space. Non-focusable clickable
    divs are invisible to keyboard users.
  how_to_do_right: Use <button> for actions, <a> for navigation. If you must use a div, add role='button' tabindex='0' and
    keydown handler for Enter/Space.
  severity: high
  technologies:
    lang: [html, javascript]
  domains:
    domain: [architecture, ui, quality]
    concern: [frontend, accessibility]
  example_good: '<button onclick="doAction()">Click me</button>

    '
  example_bad: '<div onclick="doAction()">Click me</div>  <!-- Not focusable, no keyboard -->

    '
  when_applies: Projects using HTML document structure or JavaScript/TypeScript projects
  when_not_applies: headless services, APIs, CLIs, or backend-only systems. projects not using HTML or JavaScript
  sources: ["https://www.w3.org/WAI/ARIA/apg/practices/keyboard-interface/"]
- id: CR-HTML-A11Y-003
  text: ARIA roles and attributes should supplement, not replace, semantic HTML.
  why: ARIA is a patch for when HTML semantics are insufficient. Using role='button' on a <div> when <button> exists is extra
    work with worse behavior (no Enter/Space handling).
  how_to_do_right: First try semantic HTML (button, nav, dialog). Add ARIA only when no semantic element fits. aria-label
    for non-visible labels. aria-live for dynamic content.
  severity: medium
  technologies:
    lang: [html]
  domains:
    domain: [architecture, ui, quality]
    concern: [frontend, accessibility]
  when_applies: Projects using HTML document structure
  when_not_applies: headless services, APIs, CLIs, or backend-only systems. projects not using HTML
  example_good: |
    <nav aria-label="Main navigation">
      <a href="/">Home</a>
      <a href="/about">About</a>
    </nav>
    <!-- aria-label supplements semantic <nav> element -->
  example_bad: |
    <div role="navigation" tabindex="0">
      <span role="link" onclick="goHome()">Home</span>
    </div>
    <!-- Reinventing <nav> and <a> with ARIA — worse behavior -->
  sources: ["https://www.w3.org/WAI/ARIA/apg/practices/landmark-regions/"]
- id: CR-HTML-META-001
  text: HTML documents must have lang attribute, charset, and viewport meta tags.
  why: lang enables correct screen reader pronunciation and browser translation. charset prevents encoding errors. viewport
    enables responsive design on mobile.
  how_to_do_right: 'Always include: <html lang=''en''>, <meta charset=''UTF-8''>, <meta name=''viewport'' content=''width=device-width,
    initial-scale=1.0''>.'
  severity: high
  technologies:
    lang: [html]
  domains:
    domain: [architecture, ui, quality]
    concern: [frontend, accessibility]
  example_good: "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n  <meta charset=\"UTF-8\">\n  <meta name=\"viewport\" content=\"\
    width=device-width, initial-scale=1.0\">\n  <title>Page Title</title>\n</head>\n"
  example_bad: |
    <html>  <!-- No lang attribute -->
    <head>
      <!-- No charset, no viewport — broken on mobile -->
    </head>
  when_applies: Projects using HTML document structure
  when_not_applies: headless services, APIs, CLIs, or backend-only systems. projects not using HTML
  sources: ["https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta", "https://developer.mozilla.org/en-US/docs/Web/HTML/Viewport_meta_tag"]
- id: CR-HTML-META-002
  text: Every page must have a descriptive <title> element.
  why: Title appears in browser tabs, bookmarks, search results, and screen reader announcements. 'Untitled' or missing title
    = confusing for all users.
  how_to_do_right: 'Format: ''Page Name — Site Name''. Be specific: ''Login — MyApp'' not ''Page''. Dynamic pages should update
    title (document.title in SPA).'
  severity: medium
  technologies:
    lang: [html]
  domains:
    domain: [architecture, ui, quality]
    concern: [frontend, accessibility]
  when_applies: Projects using HTML document structure
  when_not_applies: headless services, APIs, CLIs, or backend-only systems. projects not using HTML
  example_good: |
    <title>Login — MyApp</title>
    <!-- Specific, descriptive, shows in browser tab and bookmarks -->
  example_bad: |
    <title>Page</title>
    <!-- Or worse: no <title> element at all -->
  sources: ["https://developer.mozilla.org/en-US/docs/Web/HTML/Element/title"]
- id: CR-HTML-SCRIPT-001
  text: Scripts should use defer or be placed before </body> — never blocking in <head>.
  why: Scripts in <head> without defer block HTML parsing. The browser stops rendering until the script downloads and executes.
    Users see a blank page.
  how_to_do_right: Use <script defer src='app.js'> in head (downloads parallel, executes after parse). Or place scripts before
    </body>. Use async only for independent analytics scripts.
  severity: high
  technologies:
    lang: [html, javascript]
  domains:
    domain: [architecture, ui, performance]
    concern: [frontend]
  example_good: "<head>\n  <script defer src=\"app.js\"></script>\n</head>\n"
  example_bad: "<head>\n  <script src=\"app.js\"></script>  <!-- Blocks rendering! -->\n</head>\n"
  when_applies: Projects using HTML document structure or JavaScript/TypeScript projects
  when_not_applies: headless services, APIs, CLIs, or backend-only systems. projects not using HTML or JavaScript
  sources: ["https://developer.mozilla.org/en-US/docs/Web/HTML/Element/script#defer"]
- id: CR-HTML-SCRIPT-002
  text: External scripts and stylesheets should use integrity attributes (SRI) for CDN resources.
  why: CDN compromise can inject malicious code. Subresource Integrity (SRI) ensures the browser only executes scripts matching
    a known hash.
  how_to_do_right: Add integrity='sha384-...' and crossorigin='anonymous' to CDN script/link tags. Generate hashes with srihash.org
    or openssl.
  severity: high
  technologies:
    lang: [html]
  domains:
    domain: [security, architecture, ui]
    concern: [frontend]
  example_good: "<script src=\"https://cdn.example.com/lib.js\"\n        integrity=\"sha384-oqVuAfXRKap7fdgcCY5uykM6+R9GqQ8K/uxT...\"\
    \n        crossorigin=\"anonymous\"></script>\n"
  when_applies: Projects using HTML document structure
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities. projects
    not using HTML
  example_bad: |
    <script src="https://cdn.example.com/lib.js"></script>
    <!-- No integrity check — CDN compromise injects malicious code -->
  sources: ["https://developer.mozilla.org/en-US/docs/Web/Security/Subresource_Integrity"]
- id: CR-HTML-LINK-001
  text: External links should use rel='noopener noreferrer' with target='_blank'.
  why: Without noopener, the opened page can access window.opener and redirect your page (tabnabbing attack). noreferrer prevents
    leaking the referrer URL.
  how_to_do_right: Always pair target='_blank' with rel='noopener noreferrer'. For internal navigation, prefer same-tab (no
    target).
  severity: high
  technologies:
    lang: [html]
  domains:
    domain: [security, architecture, ui]
    concern: [frontend]
  example_good: '<a href="https://external.com" target="_blank" rel="noopener noreferrer">External</a>

    '
  example_bad: |
    <a href="https://external.com" target="_blank">External</a>
    <!-- No rel — opened page can access window.opener (tabnabbing) -->
  when_applies: Projects using HTML document structure
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities. projects
    not using HTML
  sources: ["https://developer.mozilla.org/en-US/docs/Web/HTML/Attributes/rel/noopener"]
- id: CR-HTML-DATA-001
  text: Use data-* attributes for JavaScript hooks — not classes or IDs.
  why: CSS classes should describe appearance, not behavior. Using .btn-submit for JS targeting means renaming the class for
    styling breaks the JS.
  how_to_do_right: data-action='submit' for JS hooks. Classes for styling only. IDs for unique landmark elements. This separates
    concerns cleanly.
  severity: medium
  technologies:
    lang: [html, javascript, css]
  domains:
    domain: [architecture, ui]
    concern: [frontend]
  example_good: '<button class="btn primary" data-action="submit">Submit</button>

    <!-- JS: document.querySelector(''[data-action="submit"]'') -->

    <!-- CSS: .btn.primary { ... } -->

    '
  example_bad: '<button class="btn primary js-submit" id="submitBtn">Submit</button>

    <!-- Mixed concerns: class for styling AND JS targeting -->

    '
  when_applies: Projects using HTML document structure, JavaScript/TypeScript projects, or CSS styling and layout
  when_not_applies: headless services, APIs, CLIs, or backend-only systems
  sources: ["https://developer.mozilla.org/en-US/docs/Learn_web_development/Howto/Solve_HTML_problems/Use_data_attributes"]
