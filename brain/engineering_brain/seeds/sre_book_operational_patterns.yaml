layer: rules
technology: SRE
domain: operations
knowledge:
- id: CR-SRE-OPS-001
  text: Change management must track ALL changes to production — code deployments, config changes, infrastructure modifications, DNS updates, certificate rotations, and feature flag toggles. The first question
    during any incident is "what changed?" — and the answer must be available in seconds, not hours.
  why: 'Google''s troubleshooting process (Chapter 12) starts with "what changed recently?" because changes are the #1 cause of incidents. But many organizations only track code deployments, missing: configuration
    changes (someone changed a timeout from 5s to 500ms — typo), infrastructure changes (new firewall rule blocking traffic), DNS changes (TTL changed, CNAME updated), certificate changes (new cert missing
    a SAN), feature flag changes (flag enabled for all users instead of 1%), and dependency updates (a library auto-updated overnight). Without a unified change log, correlating incidents with changes requires
    manual investigation across multiple systems — adding minutes to MTTR. Google maintains a unified change log that records every production change with: what changed, who changed it, when, and the previous
    value.

    '
  how_to_do_right: '1. Create a unified change log: every change to production is recorded in one place. Code deployments, configs, infrastructure, DNS, certs, flags — all of it.

    2. Include in every change entry: what changed (diff), who changed it, when (timestamp), why (ticket/PR reference), and the previous value (for rollback).

    3. Show recent changes on monitoring dashboards: Grafana annotations marking deployments, config changes, and infrastructure changes.

    4. Include recent changes in alert context: "Alert: error rate spike. Recent changes: deployment at 14:32, config change at 14:35."

    5. Require approval for production changes: code review for code, approval for configs, audit trail for infrastructure.

    6. Search change log during incidents: "What changed in the last 2 hours?" should be a one-command query.

    '
  example_good: "# Unified change log — every production change in one place\nimport datetime\n\ndef log_change(change_type: str, description: str, author: str,\n               previous_value: str, new_value: str, ticket: str):\n    entry = {\n        \"timestamp\": datetime.datetime.utcnow().isoformat(),\n        \"type\": change_type,  # deploy, config, infra, dns, flag\n        \"description\": description,\n        \"author\": author,\n        \"previous_value\": previous_value,\n        \"new_value\": new_value,\n        \"ticket\": ticket,\n    }\n    change_log.append(entry)\n    grafana.create_annotation(entry)  # Visible on dashboards\n\n# Query: 'What changed in the last 2 hours?'\nrecent = change_log.query(since=now() - timedelta(hours=2))\n"
  example_bad: "# Only tracking code deployments — missing 5 other change categories\n# deploy_log: [\"v1.2.3 deployed at 14:32\"]\n#\n# Not tracked:\n# - Config change at 14:35 (timeout changed from 5s to 500ms — typo)\n# - DNS change at 14:38 (TTL changed accidentally)\n# - Feature flag at 14:40 (enabled for 100% instead of 1%)\n# - Firewall rule at 14:42 (blocked traffic from EU)\n#\n# Incident at 14:45 — 'What changed?' takes 30 min to investigate\n"
  when_applies: "When managing any production environment where code, config, infrastructure, DNS, or feature flags can change."
  severity: high
  technologies:
    lang: [general]
    platform: [kubernetes, terraform]
  domains:
    domain: [operations, reliability]
    concern: [change_management]
  sources:
  - url: https://sre.google/sre-book/effective-troubleshooting/
    title: 'Google SRE Book — Chapter 12: Effective Troubleshooting'
  validation_status: cross_checked
- id: CR-SRE-OPS-002
  text: On-call handoff must include a written summary of current state — active incidents, ongoing issues, recent changes, and known risks. A verbal "everything is fine" handoff misses context that the
    outgoing on-call forgot to mention.
  why: 'Google''s on-call practices (Chapter 11) mandate structured handoffs because human memory is unreliable, especially after a 12-hour on-call shift. The failure mode: outgoing on-call says "everything
    is quiet." Incoming on-call takes over. 30 minutes later, an alert fires for the same issue that the outgoing on-call was monitoring for the last 2 hours but forgot to mention. The incoming on-call
    starts from scratch, wasting 30+ minutes of MTTD. Google''s handoff format: current alerts (active and recently resolved), ongoing issues (being monitored but not alerting), recent changes (deployments
    and configs in the last 24 hours), upcoming risks (scheduled maintenances, known fragile areas), and escalation contacts (who to call for which system).

    '
  how_to_do_right: '1. Use a written handoff template: active alerts, ongoing issues, recent changes, upcoming risks, escalation contacts.

    2. Handoff document is in a shared location (wiki, Slack channel): both on-calls and the team can reference it.

    3. Outgoing on-call writes the handoff 30 minutes before the shift ends — not during the last 5 minutes.

    4. Incoming on-call reads and acknowledges the handoff. Ask clarifying questions before the outgoing on-call is off.

    5. Include links to relevant dashboards, runbooks, and recent incident channels.

    6. For multi-day issues: maintain a running status document that persists across handoffs.

    '
  example_good: "# Written on-call handoff template\n# Date: 2026-02-27 18:00 UTC\n# Outgoing: alice@company.com\n# Incoming: bob@company.com\n#\n# ACTIVE ALERTS:\n# - None currently firing\n#\n# ONGOING ISSUES:\n# - DB replica lag intermittent (monitoring, not alerting) since 14:00\n# - Payment service latency elevated after deploy at 16:30\n#\n# RECENT CHANGES (last 24h):\n# - payment-service v2.3.1 deployed at 16:30 (JIRA-4521)\n# - Redis config: maxmemory changed from 4GB to 8GB at 10:00\n#\n# UPCOMING RISKS:\n# - Scheduled DB maintenance tomorrow 06:00-08:00 UTC\n# - Marketing campaign launch expected to 2x traffic at 12:00\n#\n# ESCALATION: DB issues -> @db-oncall, Payment -> @payments-lead\n"
  example_bad: "# Verbal handoff — context lost\n# Alice to Bob: 'Everything is pretty quiet, should be fine.'\n# (Forgot to mention: DB replica lag, recent payment deploy, scheduled maintenance)\n# 30 minutes later: payment alert fires\n# Bob starts from scratch — wastes 30 min diagnosing known issue\n"
  when_applies: "When handing off on-call responsibility between engineers at shift boundaries."
  severity: medium
  technologies:
    lang: [general]
    platform: [pagerduty]
  domains:
    domain: [operations, reliability]
    concern: [on_call]
  sources:
  - url: https://sre.google/sre-book/being-on-call/
    title: 'Google SRE Book — Chapter 11: Being On-Call'
  validation_status: cross_checked
- id: CR-SRE-OPS-003
  text: Alert fatigue is a systemic failure — if the on-call ignores alerts because most are noise, you don't have a monitoring system, you have a notification system. Every alert must be actionable, and
    every non-actionable alert must be eliminated.
  why: 'Google''s alerting philosophy (Chapters 6, 10) mandates that every alert leads to immediate human action — or it shouldn''t be an alert. The alert fatigue spiral: too many alerts → on-call starts
    ignoring low-priority alerts → on-call misses important alert buried in noise → incident duration increases → more reactive alerts are added to "catch issues earlier" → even more alerts → more noise
    → more ignoring → more missed incidents. Google''s metric: if more than 50% of on-call alerts do not result in human action (investigate, remediate, escalate), the alerting system needs an overhaul.
    Google''s approach: alerts must require human intelligence (not automation), must be urgent (needs action within minutes, not hours), and must be novel (not a repeat of a known issue).

    '
  how_to_do_right: '1. Every alert must have a clear action: "Check X, if Y then do Z." If there''s no action, it''s not an alert — it''s a log.

    2. Measure signal-to-noise ratio: what percentage of alerts result in human action? Target > 80%. Below 50% = overhaul needed.

    3. Review alerts monthly: which alerts fired most? Were they actionable? If an alert fires 10 times and is dismissed 8 times, fix or remove it.

    4. Use severity levels: PAGE for immediate action (service down), TICKET for next-business-day action (disk trending full), LOG for information only.

    5. Suppress duplicate alerts: if the same alert fires 10 times in 5 minutes, send it once. Group related alerts into a single notification.

    6. Every alert must have a runbook link: the on-call clicks the link and follows the procedure. No guesswork at 3 AM.

    '
  example_good: "# Every alert must be actionable with a linked runbook\n- alert: DiskSpaceLow\n  expr: node_filesystem_avail_bytes / node_filesystem_size_bytes < 0.1\n  for: 10m\n  labels:\n    severity: ticket       # Next business day, not a page\n  annotations:\n    summary: \"Disk <10% free on {{ $labels.instance }}\"\n    runbook: \"https://runbooks.company.com/disk-space-low\"\n    action: \"Check log rotation, clean old data, expand volume\"\n\n# Monthly review: signal-to-noise ratio\n# Target: >80% of alerts result in human action\n# This month: 45 alerts fired, 38 resulted in action = 84% (healthy)\n"
  example_bad: "# Alert fatigue spiral — too many non-actionable alerts\n- alert: HighCPU\n  expr: cpu_usage > 0.6  # 60% CPU — fires constantly, always dismissed\n- alert: HighMemory\n  expr: memory_usage > 0.7  # 70% memory — fires constantly, dismissed\n- alert: SlowQuery\n  expr: query_time > 0.1  # 100ms — fires 50x/day, always 'normal'\n# On-call ignores all alerts -> misses the real one -> outage\n"
  when_applies: "When any on-call rotation has a signal-to-noise ratio below 80% or engineers report ignoring alerts."
  severity: high
  technologies:
    lang: [general]
    platform: [pagerduty, prometheus]
  domains:
    domain: [observability, operations, reliability]
    concern: [monitoring, alerting]
  sources:
  - url: https://sre.google/sre-book/monitoring-distributed-systems/
    title: 'Google SRE Book — Chapter 6: Monitoring Distributed Systems'
  validation_status: cross_checked
- id: CR-SRE-OPS-004
  text: Capacity planning must account for organic growth AND step changes. Organic growth is predictable (5% monthly traffic increase). Step changes are sudden (product launch doubles traffic, viral event
    10x traffic, seasonal peak 3x traffic). Planning for only organic growth misses the events that actually cause outages.
  why: 'Google''s capacity planning (Chapters 18, 21, 27) distinguishes between two growth patterns. Organic growth: predictable, gradual, modelable from historical data. If traffic grew 5% per month for
    12 months, it will likely grow 5% next month. Step changes: unpredictable, sudden, driven by external events. A marketing campaign, a product launch, a viral social media post, Black Friday, or a competitor''s
    outage driving traffic to you. Most capacity planning models only account for organic growth, creating a false sense of security. Google plans for both: organic growth baseline PLUS headroom for expected
    step changes (known launches) PLUS emergency capacity for unexpected step changes (viral events).

    '
  how_to_do_right: '1. Model organic growth: plot traffic over 6-12 months, extrapolate the trend. This gives you the baseline projection.

    2. Identify known step changes: product launches, marketing campaigns, seasonal events. Estimate their traffic impact.

    3. Add contingency for unknown step changes: maintain 30-50% headroom above projected organic growth for unexpected spikes.

    4. Pre-provision for known events: if Black Friday historically doubles traffic, add capacity 2 weeks before.

    5. Have an emergency scaling plan: "if traffic exceeds 3x baseline, here''s how to add capacity in 30 minutes."

    6. Review after every step change: how accurate was the prediction? What would have happened without the extra capacity?

    '
  example_good: "# Capacity planning: organic growth + step changes + contingency\ndef capacity_plan(current_rps: float, growth_rate: float,\n                  known_events: list, contingency_pct: float = 0.3):\n    # Organic growth projection\n    organic_6mo = current_rps * (1 + growth_rate) ** 6\n\n    # Known step changes (product launches, campaigns)\n    step_multiplier = max(e[\"traffic_multiplier\"] for e in known_events)\n    peak_projected = organic_6mo * step_multiplier\n\n    # Contingency for unknown step changes\n    capacity_target = peak_projected * (1 + contingency_pct)\n\n    return {\n        \"organic_6mo\": organic_6mo,\n        \"peak_projected\": peak_projected,\n        \"capacity_target\": capacity_target,  # Provision this much\n    }\n\n# Example: 1000 RPS, 5% monthly growth, Black Friday 2x\n# organic_6mo=1340, peak=2680, target=3484 (with 30% contingency)\n"
  example_bad: "# Only planning for organic growth — Black Friday crashes the system\ncapacity = current_rps * 1.05 ** 6  # 5% monthly growth only\n# current: 1000 RPS, projected: 1340 RPS\n# Provision for 1340 RPS\n# Black Friday: 2x traffic = 2000 RPS\n# System overloaded at 1340 -> cascading failure -> complete outage\n# 'We didn't plan for Black Friday' — it happens EVERY YEAR\n"
  when_applies: "When planning infrastructure capacity for any service that experiences both gradual growth and sudden traffic spikes."
  severity: high
  technologies:
    lang: [general]
    platform: [cloud, kubernetes]
  domains:
    domain: [operations, reliability, planning]
    concern: [capacity]
  sources:
  - url: https://sre.google/sre-book/handling-overload/
    title: 'Google SRE Book — Chapter 21: Handling Overload'
  validation_status: cross_checked
- id: CR-SRE-OPS-005
  text: Dependency mapping must be maintained and up-to-date — you must know what your service depends on, what depends on your service, and the criticality of each dependency. A dependency that you forgot
    about will be the one that causes your next outage.
  why: 'Google''s troubleshooting (Chapter 12) and cascading failure (Chapter 22) chapters emphasize dependency awareness because unknown dependencies create unknown failure modes. The common failure: service
    A starts failing. The on-call checks service A''s code — looks fine. Checks the database — healthy. Checks the cache — healthy. After 30 minutes, discovers that service A depends on a DNS resolver that
    nobody knew about, and the resolver is overloaded. With a maintained dependency map: on-call immediately sees all dependencies, checks each one, finds the DNS resolver issue in 2 minutes. Google maintains
    dependency maps automatically using service mesh telemetry (Envoy sidecar captures all outbound calls), supplemented by manual documentation for non-network dependencies (cron jobs, file systems, shared
    volumes).

    '
  how_to_do_right: '1. Maintain a dependency map for every service: upstream dependencies (what it depends on), downstream dependencies (what depends on it), and criticality (essential, important, optional).

    2. Auto-discover dependencies: use service mesh telemetry (Istio, Linkerd) or distributed tracing (OpenTelemetry) to detect actual runtime dependencies.

    3. Include non-network dependencies: DNS resolvers, NTP servers, certificate authorities, secrets managers, package registries.

    4. Review dependency maps quarterly: are dependencies still accurate? Have new dependencies been added? Have old ones been removed?

    5. Include dependency health in dashboards: show the status of each dependency alongside your service''s status.

    6. Calculate blast radius: if dependency X fails, which of YOUR features are affected? Document this for each dependency.

    '
  example_good: "# Dependency map with criticality classification\nservice_dependencies:\n  order_service:\n    essential:   # Service cannot function without these\n      - payment_service: {timeout: 5s, fallback: none}\n      - inventory_service: {timeout: 3s, fallback: none}\n    important:   # Degraded without these\n      - recommendation_engine: {timeout: 2s, fallback: empty_list}\n    optional:    # Nice to have\n      - analytics_service: {timeout: 1s, fallback: skip}\n    hidden:      # Non-network dependencies\n      - dns_resolver: {type: infrastructure}\n      - ntp_server: {type: infrastructure}\n      - secrets_manager: {type: infrastructure}\n\n# Auto-discovered from service mesh telemetry + manual additions\n"
  example_bad: "# No dependency map — unknown dependencies cause outages\n# order_service depends on:\n#   - payment_service (known)\n#   - inventory_service (known)\n#   - dns_resolver (UNKNOWN — nobody documented it)\n#\n# DNS resolver overloaded -> order_service fails\n# On-call checks code (fine), DB (healthy), cache (healthy)\n# 30 minutes later: discovers the DNS resolver dependency\n"
  when_applies: "When operating any service in production, especially during incident response and troubleshooting."
  severity: high
  technologies:
    lang: [general]
    platform: [opentelemetry, istio]
  domains:
    domain: [architecture, operations, reliability, security]
    concern: [supply_chain, dependencies]
  sources:
  - url: https://sre.google/sre-book/effective-troubleshooting/
    title: 'Google SRE Book — Chapter 12: Effective Troubleshooting'
  validation_status: cross_checked
- id: CR-SRE-OPS-006
  text: Capacity leaks must be detected before they cause outages — a service that uses 1% more memory each day will OOM-kill in 100 days. A database that grows 1GB/day will fill its 500GB disk in 500 days.
    These are not failures — they're timers counting down to failures.
  why: 'Google''s monitoring (Chapter 6) and capacity planning practices treat gradual resource consumption as a category of problem distinct from acute failures. Acute failures are detected immediately
    (error rate spikes, latency increases). Capacity leaks are invisible in real-time monitoring — everything looks healthy today. But: a memory leak adds 10MB per hour → in 4 days, the process OOM-kills.
    A log file grows 100MB per day → in 30 days, the disk is full. Database connections leak at 1 per hour → in 4 days, the connection pool is exhausted. Google uses trend-based alerting for capacity leaks:
    "at the current growth rate, this resource will be exhausted in N days." This provides advance warning — days to weeks — before the actual failure.

    '
  how_to_do_right: '1. Track resource usage trends: memory, disk, connections, file descriptors, thread counts. Not just current value — the rate of change.

    2. Alert on trend projections: "at current growth rate, disk will be full in 7 days." This gives time to investigate and fix.

    3. Memory leaks: compare RSS immediately after restart with RSS after 24 hours. Growing RSS without growing traffic = leak.

    4. Connection leaks: monitor connection pool active vs total. If active grows while total stays constant, connections are not being returned.

    5. Disk growth: separate data growth (expected, plan for it) from log/temp growth (unexpected, investigate and fix).

    6. Set resource budgets: each service declares its expected resource consumption. Exceeding the budget by 20% triggers investigation.

    '
  example_good: "# Trend-based alerting: predict exhaustion before it happens\n- alert: DiskWillFillIn7Days\n  expr: |\n    predict_linear(\n      node_filesystem_avail_bytes{mountpoint=\"/data\"}[24h], 7*24*3600\n    ) < 0\n  for: 1h\n  labels:\n    severity: warning\n  annotations:\n    summary: \"Disk /data will be full in ~7 days at current growth rate\"\n\n# Memory leak detection: RSS growing under stable load\n- alert: MemoryLeakSuspected\n  expr: |\n    deriv(process_resident_memory_bytes[6h]) > 1048576\n  for: 2h\n  annotations:\n    summary: \"RSS growing >1MB/hour — possible memory leak\"\n"
  example_bad: "# Only alerting on current value — no trend detection\n- alert: DiskFull\n  expr: node_filesystem_avail_bytes < 1073741824  # Alert at <1GB\n  # By the time this fires, there are minutes until full\n  # A disk growing 100MB/day should have been caught 7 days ago\n  # No alert for memory leaks (10MB/hour) until OOM-kill\n"
  when_applies: "When monitoring any resource with a finite capacity — disk, memory, connections, file descriptors, or thread counts."
  severity: high
  technologies:
    lang: [general]
    platform: [grafana, prometheus]
  domains:
    domain: [observability, operations, reliability, planning]
    concern: [monitoring, capacity]
  sources:
  - url: https://sre.google/sre-book/monitoring-distributed-systems/
    title: 'Google SRE Book — Chapter 6: Monitoring Distributed Systems'
  validation_status: cross_checked
- id: CR-SRE-OPS-007
  text: Maintenance windows must be automated and gated — a human typing commands during a maintenance window introduces human error at the worst possible time. Script the entire procedure, test it in staging,
    and run the same script in production with approval gates.
  why: 'Google''s automation chapter (Chapter 7) identifies maintenance windows as high-risk operations because they combine: time pressure (must complete within the window), complexity (multiple steps
    across multiple systems), and fatigue (often scheduled during off-hours). Human operators under these conditions make mistakes: copy-pasting the wrong command, running a staging command in production,
    skipping a step, or executing steps out of order. Google''s approach: automate the entire maintenance procedure into a script, test the script in staging, and run the identical script in production.
    Each step has a verification check. If any step fails, the script pauses and alerts the operator. The script can be run again (idempotent) if interrupted.

    '
  how_to_do_right: '1. Script the entire procedure: no manual commands during maintenance. The script handles everything.

    2. Include verification after each step: "step 3: drain node → verify: 0 active connections → proceed to step 4."

    3. Test in staging first: run the exact same script in staging. If it works in staging, it should work in production.

    4. Make the script idempotent: if interrupted and rerun, it should skip completed steps and resume from where it stopped.

    5. Include rollback in the script: if step 5 fails, the script automatically reverts steps 4, 3, 2, 1 in reverse order.

    6. Require approval gates for destructive steps: "About to delete old replicas. Confirm? [y/N]." One confirmation per destructive action.

    '
  example_good: "#!/bin/bash\n# Automated maintenance script — idempotent, gated, verified\nset -euo pipefail\n\nSTEP=1\necho \"Step $STEP: Drain node-1\"\nkubectl drain node-1 --ignore-daemonsets --timeout=300s\necho \"Verify: 0 pods on node-1\"\n[ $(kubectl get pods --field-selector spec.nodeName=node-1 --no-headers | wc -l) -eq 0 ] || exit 1\n\nSTEP=2\necho \"Step $STEP: Apply OS update\"\nssh node-1 'sudo apt-get update && sudo apt-get upgrade -y'\necho \"Verify: kernel version\"\nssh node-1 'uname -r' | grep -q '6.1' || exit 1\n\nSTEP=3\necho \"Step $STEP: Uncordon node-1\"\nkubectl uncordon node-1\necho \"Verify: node Ready\"\nkubectl get node node-1 | grep -q 'Ready' || exit 1\n\necho \"Maintenance complete — all steps verified\"\n"
  example_bad: "# Manual maintenance — human typing commands at 2 AM\n# Engineer SSHs into production\n# Runs commands from memory (no script)\n# Accidentally runs staging command in production (copy-paste error)\n# Skips verification step (tired, it's 2 AM)\n# Forgets to uncordon the node (node stays drained)\n# No rollback procedure documented\n"
  when_applies: "When performing any scheduled maintenance on production infrastructure — node upgrades, database migrations, certificate rotations."
  severity: medium
  technologies:
    lang: [general]
    platform: [ansible, kubernetes]
  domains:
    domain: [operations, reliability]
    concern: [maintenance, automation]
  sources:
  - url: https://sre.google/sre-book/automation-at-google/
    title: 'Google SRE Book — Chapter 7: The Evolution of Automation at Google'
  validation_status: cross_checked
