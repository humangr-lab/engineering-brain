- id: CR-SRE-DATA-004
  text: Application-level bugs are the primary cause of data corruption — not hardware failures or database bugs. Your application can write perfectly well-formed SQL that produces logically corrupt data.
    Validate data semantics, not just syntax.
  why: 'Google found that the vast majority of data corruption incidents were caused by application bugs, not infrastructure failures. Examples: a bug that sets all user balances to zero (valid SQL, corrupt
    data), a race condition that allows double-spending (valid transactions, inconsistent state), a migration script that converts timestamps incorrectly (valid data, wrong values), an off-by-one error
    that shifts all records by one row (valid writes, wrong associations). Database constraints (foreign keys, unique indexes, NOT NULL) catch syntactic corruption but not semantic corruption. A balance
    of -$1,000,000 is syntactically valid but semantically corrupt. Google addresses this with application-level validation: business rule checks on write (balance cannot be negative), periodic data audits
    (aggregate checks: total balances should equal total deposits minus withdrawals), and anomaly detection (sudden changes in data distributions).

    '
  how_to_do_right: '1. Implement application-level data validation: business rules that the database cannot enforce (balance >= 0, dates are logical, references exist).

    2. Run periodic data integrity audits: check aggregates (sum of parts = whole), check referential integrity at application level, check for orphaned records.

    3. Use transactions for multi-step operations. A transfer (debit + credit) that crashes between the two steps creates inconsistency.

    4. Log all data mutations with before/after values. If corruption is discovered, the log enables identification of the corrupting operation.

    5. Implement data versioning or audit trails for critical tables. Track WHO changed WHAT and WHEN.

    6. Set up anomaly detection on key metrics: if the number of users drops by 50% in one hour, something is wrong — even if no errors were reported.

    '
  example_good: "from decimal import Decimal\nfrom datetime import datetime\nimport logging\n\nlogger = logging.getLogger(__name__)\n\nclass AccountService:\n    def transfer(self, from_id: str, to_id: str, amount: Decimal):\n        \"\"\"Transfer with application-level semantic validation.\"\"\"\n        # Application-level validation — DB constraints can't enforce this\n        if amount <= 0:\n            raise ValueError('Transfer amount must be positive')\n\n        with self.db.transaction() as tx:\n            from_balance = tx.query('SELECT balance FROM accounts WHERE id = %s FOR UPDATE', (from_id,))\n            if from_balance < amount:\n                raise ValueError(f'Insufficient balance: {from_balance} < {amount}')\n\n            # Log before/after for audit trail\n            logger.info('transfer', extra={\n                'from_id': from_id, 'to_id': to_id, 'amount': str(amount),\n                'from_balance_before': str(from_balance),\n            })\n\n            tx.execute('UPDATE accounts SET balance = balance - %s WHERE id = %s', (amount, from_id))\n            tx.execute('UPDATE accounts SET balance = balance + %s WHERE id = %s', (amount, to_id))\n\n    def run_integrity_audit(self):\n        \"\"\"Periodic data integrity check.\"\"\"\n        total_balances = self.db.query('SELECT SUM(balance) FROM accounts')[0]\n        total_deposits = self.db.query('SELECT SUM(amount) FROM deposits')[0]\n        total_withdrawals = self.db.query('SELECT SUM(amount) FROM withdrawals')[0]\n        expected = total_deposits - total_withdrawals\n        if abs(total_balances - expected) > Decimal('0.01'):\n            self.alert(f'Balance mismatch: {total_balances} vs expected {expected}')\n"
  example_bad: "def transfer(from_id, to_id, amount):\n    # No semantic validation — negative transfers allowed\n    # No transaction — crash between queries creates inconsistency\n    db.execute('UPDATE accounts SET balance = balance - %s WHERE id = %s', (amount, from_id))\n    # If crash happens HERE, money vanishes\n    db.execute('UPDATE accounts SET balance = balance + %s WHERE id = %s', (amount, to_id))\n    # No audit log — if corruption occurs, no way to trace it\n    # No balance check — account can go negative\n    # No periodic integrity audit\n"
  when_applies: "When building any application that writes to a database, especially financial systems, e-commerce, or user data management."
  severity: critical
  technologies:
    lang: [general, go, java, python]
    platform: [mysql, postgresql]
