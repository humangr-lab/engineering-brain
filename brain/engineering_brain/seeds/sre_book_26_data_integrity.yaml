knowledge:
- id: CR-SRE-DATA-001
  text: Data loss is permanent and unrecoverable — unlike latency or availability problems, lost data cannot be fixed by restarting servers or adding capacity. Data integrity must be designed as a first-class
    requirement, not an afterthought.
  why: 'Google''s Chapter 26 on Data Integrity opens with a stark comparison: availability problems are transient (the system comes back up), latency problems are transient (the system speeds up), but data
    loss is permanent. If a user''s email is deleted, no amount of server restarts will bring it back. Google treats data integrity as a fundamentally different category from availability — you can have
    100% availability and still suffer catastrophic data loss (the system is up, serving corrupted data). Google''s data protection strategy is built on this insight: every system must answer "What happens
    when data is corrupted or lost?" BEFORE it goes to production, not after the first incident.

    '
  how_to_do_right: '1. Classify data by criticality: user data (irreplaceable), derived data (recomputable from source), cached data (re-fetchable). Protection effort should match criticality.

    2. Irreplaceable data needs: multi-region replication, point-in-time recovery, soft-delete (recoverable for N days), and data validation.

    3. Validate data on write (reject corrupt data) AND on read (detect corruption in storage). Silent corruption is the worst failure mode.

    4. Test data recovery BEFORE you need it. Restore from backup monthly and verify the restored data is correct and complete.

    5. Implement write-ahead logging (WAL) for any operation that modifies state. If the process crashes mid-write, the WAL enables recovery.

    6. Distinguish between data "loss" (gone forever) and data "unavailability" (exists but unreachable). Design for both.

    '
  example_good: "import hashlib\nimport json\nfrom datetime import datetime\n\nclass DataIntegrityManager:\n    def write_with_validation(self, record: dict) -> bool:\n        \"\"\"Write data with checksum and WAL entry.\"\"\"\n        checksum = hashlib.sha256(json.dumps(record, sort_keys=True).encode()).hexdigest()\n        record['_checksum'] = checksum\n        record['_written_at'] = datetime.utcnow().isoformat()\n        # Write-ahead log entry first\n        self.wal.append({'op': 'write', 'record': record, 'ts': record['_written_at']})\n        # Then persist to database\n        self.db.insert(record)\n        # Verify read-back matches\n        stored = self.db.get(record['id'])\n        assert stored['_checksum'] == checksum, 'Data integrity violation on write'\n        return True\n\n    def classify_data(self, dataset: str) -> str:\n        CRITICAL = {'user_data', 'payments', 'medical_records'}\n        DERIVED = {'analytics', 'reports', 'aggregates'}\n        if dataset in CRITICAL:\n            return 'irreplaceable'  # Multi-region replication + PITR\n        elif dataset in DERIVED:\n            return 'recomputable'   # Single backup sufficient\n        return 'cached'             # Re-fetchable, no backup needed\n"
  example_bad: "def save_user_data(user_id, data):\n    # No validation, no checksums, no WAL\n    db.execute('UPDATE users SET data = %s WHERE id = %s', (json.dumps(data), user_id))\n    # No read-back verification\n    # No data classification — treats all data the same\n    # If this corrupts data, we'll never know until a user complains\n    return True\n"
  when_applies: "When designing any system that stores user data or state that cannot be recomputed from other sources."
  severity: critical
  technologies:
    lang: [general]
    platform: [cloud, mysql, postgresql]
  domains:
