- id: CR-SRE-DATA-003
  text: Backups that are never tested are not backups — they are hope. Google's rule — restore from backup regularly and verify the restored data is correct. Discovery that your backups are corrupt during
    a real data loss event is the worst possible outcome.
  why: 'Google mandates regular backup restoration testing because they discovered (the hard way) that backups can be silently corrupt for months. Common backup failures: the backup job runs but writes
    to a full disk (0 bytes backed up, no alert), the backup completes but the format is incompatible with the current schema (migration happened, backup is unrestorable), the backup is encrypted and the
    decryption key was rotated (backup is unreadable), the backup contains data from before a migration (missing columns, wrong types). ALL of these look like successful backups in the monitoring dashboard.
    Only a restore test reveals the truth. Google''s policy: backup restoration is not optional, it is not a nice-to-have, and it is not "something we''ll do when we have time." It is a scheduled, recurring,
    verified operation.

    '
  how_to_do_right: '1. Test backup restoration monthly. This is non-negotiable. Put it on the calendar.

    2. Restore to a separate environment (not production) and run validation queries: row counts, checksums, recent data presence.

    3. Track restoration time: if RTO is 4 hours and restoration takes 6 hours, you do NOT meet your RTO.

    4. Test restoration from the OLDEST backup too: can you restore data from 30 days ago? 90 days ago?

    5. After schema changes: immediately test that existing backups can be restored with the new schema.

    6. After encryption key rotation: immediately test that existing backups can still be decrypted.

    '
  example_good: "import subprocess\nfrom datetime import datetime\n\nclass BackupRestoreTest:\n    \"\"\"Monthly backup restoration verification.\"\"\"\n\n    def run_monthly_restore_test(self):\n        backup = self.get_latest_backup()\n        start = datetime.utcnow()\n\n        # Restore to isolated environment\n        temp_db = self.restore_to_temp_env(backup)\n\n        restore_time = (datetime.utcnow() - start).total_seconds()\n        if restore_time > self.rto_seconds:\n            self.alert(f'Restore took {restore_time}s, RTO is {self.rto_seconds}s')\n\n        # Validate restored data\n        assert temp_db.query('SELECT COUNT(*) FROM users')[0] > 0, 'Users table empty after restore'\n        assert temp_db.query('SELECT MAX(created_at) FROM orders')[0] > self.rpo_threshold, \\\n            'Restored data older than RPO allows'\n\n        # Test oldest backup too\n        oldest_backup = self.get_oldest_backup()\n        old_db = self.restore_to_temp_env(oldest_backup)\n        assert old_db.query('SELECT COUNT(*) FROM users')[0] > 0\n\n        self.record_test_result(restore_time=restore_time, rows_verified=True)\n        temp_db.destroy()\n        old_db.destroy()\n"
  example_bad: "# 'Backups are running' — but never tested\nclass BackupManager:\n    def schedule_backup(self):\n        # Backup job runs nightly\n        subprocess.run(['pg_dump', 'mydb', '-f', '/backups/nightly.sql'])\n        # No verification that the file is non-empty\n        # No restoration test\n        # No RPO/RTO tracking\n        # Schema was migrated 3 months ago — backup format may be incompatible\n        # Encryption key was rotated — backup may be unreadable\n        # We'll find out when we actually need the backup\n"
  when_applies: "When your system has any form of backup strategy — monthly restore testing is mandatory to verify backups actually work."
  severity: critical
