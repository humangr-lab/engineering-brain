  validation_status: cross_checked
- id: CR-SRE-DATA-002
  text: Defense in depth for data integrity — no single mechanism is sufficient. You need 1) soft delete, 2) backups, 3) replication, 4) validation, and 5) recovery testing. Each layer catches failures
    that the others miss.
  why: 'Google''s data integrity strategy is explicitly layered because each protection mechanism has blind spots. Replication protects against hardware failure but propagates corruption (if the primary
    is corrupt, replicas are too). Backups protect against corruption but have a recovery time window (data between last backup and failure is lost). Soft delete protects against accidental deletion but
    not against corruption or storage failure. Validation detects corruption but doesn''t prevent it. Recovery testing verifies that backups work but doesn''t protect data between tests. Google uses ALL
    of these simultaneously because the combination covers failure modes that any individual mechanism misses. The most dangerous false confidence: "We have replication, so we''re safe." Replication protects
    against ONE failure mode (hardware failure of one replica). It does not protect against: bugs that corrupt data (replicated corruption), accidental bulk deletion (replicated deletion), security breaches
    (replicated attacker''s changes).

    '
  how_to_do_right: '1. Layer 1 — Soft delete: deleted data is marked, not removed. Recoverable for 30-90 days. Protects against accidental deletion.

    2. Layer 2 — Backups: full backup daily, incremental every hour. Stored in a different region/account. Protects against corruption.

    3. Layer 3 — Replication: synchronous replication across 2-3 replicas. Protects against hardware failure.

    4. Layer 4 — Validation: checksums on read/write, periodic full-table scans comparing replicas. Detects corruption.

    5. Layer 5 — Recovery testing: monthly restore from backup, verify data completeness and correctness. Verifies that layers 1-4 actually work.

    6. Document the Recovery Point Objective (RPO: max data loss) and Recovery Time Objective (RTO: max recovery time) for each dataset.

    '
  example_good: "class DataProtectionStack:\n    \"\"\"Defense in depth: 5 layers of data protection.\"\"\"\n\n    def delete_user(self, user_id: str):\n        # Layer 1: Soft delete (recoverable for 90 days)\n        self.db.execute(\n            'UPDATE users SET deleted_at = NOW(), status = %s WHERE id = %s',\n            ('soft_deleted', user_id)\n        )\n        # Hard delete scheduled via cron after 90 days\n\n    def setup_backup_schedule(self):\n        # Layer 2: Backups in different region/account\n        return {\n            'full_backup': 'daily at 02:00 UTC to s3://backup-us-west-2/',\n            'incremental': 'hourly to s3://backup-us-west-2/incremental/',\n            'cross_account': True,\n        }\n\n    def setup_replication(self):\n        # Layer 3: Synchronous replication\n        return {'mode': 'synchronous', 'replicas': 3, 'regions': ['us-east-1', 'us-west-2', 'eu-west-1']}\n\n    def validate_checksums(self):\n        # Layer 4: Periodic validation\n        for table in self.critical_tables:\n            primary_checksum = self.db.primary.checksum(table)\n            replica_checksum = self.db.replica.checksum(table)\n            if primary_checksum != replica_checksum:\n                self.alert(f'Checksum mismatch on {table}')\n\n    def test_restore(self):\n        # Layer 5: Monthly restore test\n        backup = self.get_latest_backup()\n        restored_db = self.restore_to_temp(backup)\n        assert restored_db.row_count('users') > 0, 'Restore produced empty table'\n"
  example_bad: "class DataProtection:\n    def delete_user(self, user_id: str):\n        # No soft delete — permanent immediately\n        self.db.execute('DELETE FROM users WHERE id = %s', (user_id,))\n\n    # Replication is our only protection\n    # 'We have 3 replicas, so we're safe'\n    # But replication propagates corruption and accidental deletes!\n    # No backups, no validation, no restore testing\n"
  when_applies: "When architecting data protection for any production system, especially those storing irreplaceable user data."
  severity: critical
  technologies:
    lang: [general]
