layer: rules
technology: Vue
domain: frontend
knowledge:
- id: CR-VUE-COMP-001
  text: Use ref for primitives and reactive for objects — never use reactive for primitives or reassign a reactive object.
  why: reactive() only works with objects — it silently fails with primitives, returning a non-reactive value. Reassigning
    a reactive object (state = newObj) breaks reactivity because components hold a reference to the old proxy. ref() wraps
    any value in a .value accessor that is always reactive.
  how_to_do_right: Use ref() for strings, numbers, booleans, and any value you might reassign. Use reactive() for objects
    you only mutate in place. Destructuring reactive objects also breaks reactivity — use toRefs() to preserve it.
  severity: critical
  technologies:
    lang: [typescript]
    framework: [frontend, vue]
  domains:
    domain: [architecture]
    concern: [frontend, state_management]
  example_good: 'import { ref, reactive, toRefs } from ''vue'';


    // ref for primitives and reassignable values

    const count = ref(0);

    const name = ref(''Alice'');

    count.value++; // Reactive

    name.value = ''Bob''; // Reactive — reassignment works


    // reactive for objects you mutate in place

    const form = reactive({ email: '''', password: '''' });

    form.email = ''alice@example.com''; // Reactive — mutation works


    // toRefs for destructuring reactive objects

    const { email, password } = toRefs(form); // Still reactive!

    '
  example_bad: 'import { reactive } from ''vue'';


    // WRONG: reactive with primitive — NOT reactive

    const count = reactive(0); // Returns plain 0, no reactivity


    // WRONG: reassigning reactive — breaks all bindings

    let state = reactive({ items: [] });

    state = reactive({ items: [1, 2, 3] }); // Components still watch old object!


    // WRONG: destructuring reactive — loses reactivity

    const { email } = reactive({ email: '''' });

    // email is now a plain string, not reactive

    '
  when_applies: Any project using Vue.js applications or TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using Vue or TypeScript
  sources: ["https://vuejs.org/api/reactivity-core.html#ref", "https://vuejs.org/api/reactivity-core.html#reactive"]
- id: CR-VUE-COMP-002
  text: Use computed for cached derived values — never use a method or watch for values that derive from reactive state.
  why: Methods re-execute on every render, even if inputs haven't changed. watch creates imperative side effects that are
    harder to reason about. computed() caches the result and only re-evaluates when its reactive dependencies change — O(1)
    access after first computation.
  how_to_do_right: 'Use computed() for any derived value: filtered lists, formatted dates, conditional flags. computed() is
    read-only by default — use writable computed for two-way derived values. Keep computed functions pure (no side effects).'
  severity: high
  technologies:
    lang: [typescript]
    framework: [frontend, vue]
  domains:
    domain: [architecture, performance]
    concern: [frontend]
  example_good: "import { ref, computed } from 'vue';\n\nconst items = ref<Item[]>([]);\nconst searchQuery = ref('');\n\n\
    // Cached — only recalculates when items or searchQuery change\nconst filteredItems = computed(() =>\n  items.value.filter(item\
    \ =>\n    item.name.toLowerCase().includes(searchQuery.value.toLowerCase())\n  )\n);\n\n// In template: {{ filteredItems\
    \ }} — always up-to-date, cached\n"
  example_bad: "// Method — recalculates on EVERY re-render, even if items didn't change\nfunction getFilteredItems() {\n\
    \  return items.value.filter(item =>\n    item.name.toLowerCase().includes(searchQuery.value.toLowerCase())\n  );\n}\n\
    // Template: {{ getFilteredItems() }} — expensive on every render\n"
  when_applies: Projects using Vue.js applications or TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using Vue or TypeScript
  sources: ["https://vuejs.org/guide/essentials/computed.html"]
- id: CR-VUE-COMP-003
  text: Use watch for side effects triggered by reactive changes — not for deriving values (use computed instead).
  why: watch runs imperative code when reactive state changes — it's the right tool for API calls, localStorage sync, analytics
    tracking, and DOM manipulation. Using it for derived values duplicates what computed does, without caching, and introduces
    timing bugs.
  how_to_do_right: 'Use watch() with explicit source for specific deps. Use watchEffect() for auto-tracked deps. Always handle
    cleanup with the onCleanup parameter. Prefer { immediate: true } over duplicating initial logic.'
  severity: high
  technologies:
    lang: [typescript]
    framework: [frontend, vue]
  domains:
    domain: [architecture]
    concern: [frontend, state_management]
  example_good: "import { ref, watch } from 'vue';\n\nconst searchQuery = ref('');\n\n// Side effect: fetch data when query\
    \ changes (with debounce and cleanup)\nwatch(searchQuery, async (newQuery, _oldQuery, onCleanup) => {\n  const controller\
    \ = new AbortController();\n  onCleanup(() => controller.abort()); // Cancel previous request\n\n  if (newQuery.length\
    \ < 2) return;\n\n  const results = await fetch(`/api/search?q=${newQuery}`, {\n    signal: controller.signal,\n  }).then(r\
    \ => r.json());\n\n  searchResults.value = results;\n}, { immediate: false });\n"
  example_bad: "// WRONG: Using watch to derive a value — use computed instead!\nconst fullName = ref('');\nwatch([firstName,\
    \ lastName], ([f, l]) => {\n  fullName.value = `${f} ${l}`; // This should be a computed()\n});\n\n// WRONG: No cleanup\
    \ — stale requests overwrite fresh results\nwatch(query, async (q) => {\n  const data = await fetch(`/api/search?q=${q}`);\n\
    \  results.value = data; // If user types fast, old response overwrites new\n});\n"
  when_applies: Projects using Vue.js applications or TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using Vue or TypeScript
  sources: ["https://vuejs.org/guide/essentials/watchers.html"]
- id: CR-VUE-COMP-004
  text: Use provide/inject for dependency injection — not prop drilling through many component layers.
  why: Passing props through 5+ component layers pollutes intermediate components with props they don't use. provide/inject
    lets ancestor components make values available to any descendant, regardless of depth — like React Context but with Vue
    reactivity.
  how_to_do_right: Use InjectionKey<T> for type-safe injection. Provide reactive values (ref/computed) — not raw values —
    so consumers stay reactive. Always provide a default value or throw a clear error when inject fails.
  severity: medium
  technologies:
    lang: [typescript]
    framework: [frontend, vue]
  domains:
    domain: [architecture]
    concern: [frontend]
  example_good: '// keys.ts — typed injection keys

    import type { InjectionKey, Ref } from ''vue'';


    export const ThemeKey: InjectionKey<Ref<''light'' | ''dark''>> = Symbol(''theme'');


    // Parent.vue

    import { provide, ref } from ''vue'';

    import { ThemeKey } from ''./keys'';


    const theme = ref<''light'' | ''dark''>(''light'');

    provide(ThemeKey, theme); // Reactive — consumers update automatically


    // DeepChild.vue (any depth)

    import { inject } from ''vue'';

    import { ThemeKey } from ''./keys'';


    const theme = inject(ThemeKey);

    if (!theme) throw new Error(''ThemeKey not provided — wrap in ThemeProvider'');

    // theme is Ref<''light'' | ''dark''> — fully typed

    '
  example_bad: "// Prop drilling through 4 layers\n<GrandParent :theme=\"theme\">\n  <Parent :theme=\"theme\">      <!-- Only\
    \ passes through -->\n    <Child :theme=\"theme\">      <!-- Only passes through -->\n      <DeepChild :theme=\"theme\"\
    \ /> <!-- Actually uses it -->\n"
  when_applies: Projects using Vue.js applications or TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using Vue or TypeScript
  sources: ["https://vuejs.org/guide/components/provide-inject.html"]
- id: CR-VUE-COMP-005
  text: Extract reusable stateful logic into composables — named use* functions that return reactive state.
  why: Duplicating reactive logic (fetch + loading + error, form validation, timers) across components leads to inconsistency
    and missed edge cases. Composables encapsulate logic once, are independently testable, and compose together cleanly.
  how_to_do_right: Name composables use*. Return refs/computed (not raw values) so consumers stay reactive. Handle cleanup
    in onUnmounted. Accept reactive inputs (refs or getters) for reusability. Keep composables focused — one concern per composable.
  severity: high
  technologies:
    lang: [typescript]
    framework: [frontend, vue]
  domains:
    domain: [architecture]
    concern: [frontend]
  example_good: "// composables/useFetch.ts\nimport { ref, watchEffect, type Ref } from 'vue';\n\nexport function useFetch<T>(url:\
    \ Ref<string> | (() => string)) {\n  const data = ref<T | null>(null);\n  const error = ref<Error | null>(null);\n  const\
    \ loading = ref(true);\n\n  watchEffect(async (onCleanup) => {\n    const controller = new AbortController();\n    onCleanup(()\
    \ => controller.abort());\n\n    loading.value = true;\n    error.value = null;\n    try {\n      const urlValue = typeof\
    \ url === 'function' ? url() : url.value;\n      const res = await fetch(urlValue, { signal: controller.signal });\n \
    \     data.value = await res.json();\n    } catch (e) {\n      if (e instanceof Error && e.name !== 'AbortError') error.value\
    \ = e;\n    } finally {\n      loading.value = false;\n    }\n  });\n\n  return { data, error, loading };\n}\n\n// Component\
    \ usage\nconst { data: users, loading } = useFetch<User[]>(() => `/api/users?page=${page.value}`);\n"
  example_bad: "// Logic duplicated in every component\nconst data = ref(null);\nconst loading = ref(true);\nconst error =\
    \ ref(null);\nonMounted(async () => {\n  try { data.value = await fetch(url).then(r => r.json()); }\n  catch (e) { error.value\
    \ = e; }\n  finally { loading.value = false; }\n});\n// Copy-pasted everywhere — no cleanup, no abort, inconsistent error\
    \ handling\n"
  when_applies: Projects using Vue.js applications or TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using Vue or TypeScript
  sources: ["https://vuejs.org/guide/reusability/composables.html"]
- id: CR-VUE-PINIA-001
  text: Use Pinia with setup syntax for stores — it provides better TypeScript inference and composable-like patterns.
  why: Options syntax requires separate state/getters/actions sections and has weaker TypeScript inference for getters. Setup
    syntax uses ref/computed/function — identical to composables — with full type inference and better IDE support.
  how_to_do_right: Use defineStore with a setup function (second argument is a function, not an object). Return refs as state,
    computed as getters, functions as actions. Use storeToRefs() to destructure without losing reactivity.
  severity: medium
  technologies:
    lang: [typescript]
    framework: [frontend, vue]
    library: [pinia]
  domains:
    domain: [architecture]
    concern: [frontend, state_management]
  example_good: "// stores/useCartStore.ts\nimport { defineStore } from 'pinia';\nimport { ref, computed } from 'vue';\n\n\
    export const useCartStore = defineStore('cart', () => {\n  // State\n  const items = ref<CartItem[]>([]);\n\n  // Getters\
    \ (computed)\n  const totalPrice = computed(() =>\n    items.value.reduce((sum, item) => sum + item.price * item.qty,\
    \ 0)\n  );\n  const itemCount = computed(() =>\n    items.value.reduce((sum, item) => sum + item.qty, 0)\n  );\n\n  //\
    \ Actions (functions)\n  async function addItem(productId: string) {\n    const product = await fetchProduct(productId);\n\
    \    const existing = items.value.find(i => i.id === productId);\n    if (existing) existing.qty++;\n    else items.value.push({\
    \ ...product, qty: 1 });\n  }\n\n  function removeItem(productId: string) {\n    items.value = items.value.filter(i =>\
    \ i.id !== productId);\n  }\n\n  return { items, totalPrice, itemCount, addItem, removeItem };\n});\n\n// Component usage\
    \ — storeToRefs preserves reactivity\nconst store = useCartStore();\nconst { items, totalPrice } = storeToRefs(store);\n\
    const { addItem } = store; // Actions don't need storeToRefs\n"
  example_bad: "// Options syntax — weaker TypeScript, verbose\nexport const useCartStore = defineStore('cart', {\n  state:\
    \ () => ({ items: [] as CartItem[] }),\n  getters: {\n    totalPrice: (state) => state.items.reduce(/*...*/), // 'this'\
    \ typing issues\n  },\n  actions: {\n    addItem(productId: string) { /* ... */ },\n  },\n});\n"
  when_applies: Projects using Vue.js applications, Pinia, or TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools
  sources: ["https://pinia.vuejs.org/core-concepts/#setup-stores"]
- id: CR-VUE-NUXT-001
  text: Use useFetch/useAsyncData for SSR-safe data fetching in Nuxt 3 — never use raw fetch in setup.
  why: 'Raw fetch in setup() runs on both server and client during hydration — causing double data fetching and hydration
    mismatches. useFetch handles SSR deduplication automatically: fetches on server, serializes result, skips refetch on client
    hydration.'
  how_to_do_right: Use useFetch() for simple URL-based fetching. Use useAsyncData() for complex logic (multiple calls, transformations).
    Use $fetch in event handlers (client-only contexts). Use lazy option for non-blocking fetches.
  severity: critical
  technologies:
    lang: [typescript]
    framework: [frontend, vue, nuxt]
  domains:
    domain: [architecture]
    concern: [frontend, data-fetching, ssr]
  example_good: "<script setup lang=\"ts\">\n// SSR-safe — fetches on server, hydrates on client without refetching\nconst\
    \ { data: posts, pending, error, refresh } = await useFetch('/api/posts', {\n  transform: (data) => data.map(postMapper),\
    \ // Transform before caching\n  watch: [page], // Refetch when page changes\n});\n\n// Complex multi-fetch — still SSR-safe\n\
    const { data: dashboard } = await useAsyncData('dashboard', async () => {\n  const [stats, recent] = await Promise.all([\n\
    \    $fetch('/api/stats'),\n    $fetch('/api/recent'),\n  ]);\n  return { stats, recent };\n});\n</script>\n"
  example_bad: "<script setup lang=\"ts\">\n// WRONG: Raw fetch — runs on BOTH server and client\nconst posts = ref([]);\n\
    onMounted(async () => {\n  posts.value = await fetch('/api/posts').then(r => r.json());\n});\n// No SSR data — client\
    \ sees empty page until fetch completes\n// Hydration mismatch if server rendered different content\n</script>\n"
  when_applies: Any project using Vue.js applications, Nuxt, or TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools
  sources: ["https://nuxt.com/docs/api/composables/use-fetch"]
- id: CR-VUE-NUXT-002
  text: Use Nuxt server routes (/server/api/) for BFF (Backend For Frontend) logic — not external API routes.
  why: Calling external APIs directly from the client exposes API keys, creates CORS issues, and adds latency. Nuxt server
    routes run on the server (Nitro engine), can access environment variables securely, and act as a proxy that keeps secrets
    server-side.
  how_to_do_right: Create files in server/api/ or server/routes/. Use defineEventHandler. Access env vars with useRuntimeConfig.
    Validate input with zod. Return typed responses.
  severity: high
  technologies:
    lang: [typescript]
    framework: [frontend, vue, nuxt]
  domains:
    domain: [architecture, api, security]
    concern: [frontend]
  example_good: "// server/api/products/[id].get.ts — secure BFF route\nimport { z } from 'zod';\n\nexport default defineEventHandler(async\
    \ (event) => {\n  const id = getRouterParam(event, 'id');\n  const validated = z.string().uuid().safeParse(id);\n  if\
    \ (!validated.success) {\n    throw createError({ statusCode: 400, message: 'Invalid product ID' });\n  }\n\n  const config\
    \ = useRuntimeConfig(); // Access API_SECRET securely\n  const product = await $fetch(`https://api.vendor.com/products/${id}`,\
    \ {\n    headers: { Authorization: `Bearer ${config.apiSecret}` },\n  });\n\n  return product; // API key never exposed\
    \ to client\n});\n"
  example_bad: "// WRONG: Calling external API from client — exposes API key\n<script setup>\nconst { data } = await useFetch('https://api.vendor.com/products/123',\
    \ {\n  headers: { Authorization: `Bearer ${apiKey}` }, // API key in client bundle!\n});\n</script>\n"
  when_applies: Projects using Vue.js applications, Nuxt, or TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools
  sources: ["https://nuxt.com/docs/guide/directory-structure/server"]
- id: CR-VUE-SFC-001
  text: Always use <script setup> syntax — it reduces boilerplate, improves performance, and has better TypeScript support.
  why: <script setup> compiles more efficiently (variables are directly available in template without return object), auto-infers
    component name, and provides defineProps/defineEmits with pure type-level declarations that don't bloat runtime code.
  how_to_do_right: Use <script setup lang='ts'>. Use defineProps<T>() for typed props. Use defineEmits<T>() for typed events.
    Use defineExpose() to limit what refs can access. Use defineOptions() for component name/inheritAttrs.
  severity: high
  technologies:
    lang: [typescript]
    framework: [frontend, vue]
  domains:
    domain: [architecture]
    concern: [frontend, component-design]
  example_good: "<script setup lang=\"ts\">\ninterface Props {\n  title: string;\n  count?: number;\n  variant?: 'primary'\
    \ | 'secondary';\n}\n\nconst props = withDefaults(defineProps<Props>(), {\n  count: 0,\n  variant: 'primary',\n});\n\n\
    const emit = defineEmits<{\n  (e: 'update', value: number): void;\n  (e: 'close'): void;\n}>();\n\n// Directly available\
    \ in template — no return needed\nconst doubled = computed(() => props.count * 2);\n</script>\n"
  example_bad: "<script lang=\"ts\">\nimport { defineComponent, computed } from 'vue';\n\nexport default defineComponent({\n\
    \  props: { title: String, count: { type: Number, default: 0 } },\n  emits: ['update', 'close'],\n  setup(props, { emit\
    \ }) {\n    const doubled = computed(() => props.count * 2);\n    return { doubled }; // Must manually return everything\
    \ for template\n  },\n});\n</script>\n"
  when_applies: Projects using Vue.js applications or TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using Vue or TypeScript
  sources: ["https://vuejs.org/api/sfc-script-setup.html"]
- id: CR-VUE-PERF-001
  text: Use shallowRef/shallowReactive for large collections that change by replacement, not deep mutation.
  why: Vue's default reactivity deeply proxies every nested property. For arrays with 10,000+ items or deeply nested objects,
    this creates thousands of Proxy objects that consume memory and slow down reads. shallowRef only tracks .value replacement,
    not deep mutations.
  how_to_do_right: Use shallowRef for large arrays/objects replaced wholesale (API responses, paginated lists). Use triggerRef()
    if you need to force a shallow update after mutation. Profile with Vue DevTools to identify reactivity overhead.
  severity: high
  technologies:
    lang: [typescript]
    framework: [frontend, vue]
  domains:
    domain: [architecture, performance]
    concern: [frontend]
  example_good: "import { shallowRef, triggerRef } from 'vue';\n\n// Large dataset — only trigger on replacement, not deep\
    \ mutation\nconst items = shallowRef<Item[]>([]);\n\n// Replace entire array — reactive\nasync function fetchPage(page:\
    \ number) {\n  items.value = await $fetch(`/api/items?page=${page}`); // Triggers update\n}\n\n// Sort in place — need\
    \ triggerRef for shallow\nfunction sortItems() {\n  items.value.sort((a, b) => a.name.localeCompare(b.name));\n  triggerRef(items);\
    \ // Manually trigger update\n}\n"
  example_bad: 'import { ref } from ''vue'';


    // Deep reactivity on 10,000 items — slow initial proxy creation

    const items = ref<Item[]>([]); // Every item and sub-property proxied

    items.value = await fetchLargeDataset(); // 10,000 Proxy objects created

    '
  when_applies: Projects using Vue.js applications or TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using Vue or TypeScript
  sources: ["https://vuejs.org/api/reactivity-advanced.html#shallowref"]
- id: CR-VUE-TRANS-001
  text: Use Vue Transition component with CSS classes for enter/leave animations — not manual JavaScript animations.
  why: Manual JS animations (requestAnimationFrame, DOM manipulation) fight against Vue's reactivity and virtual DOM. The
    Transition component integrates with Vue's rendering lifecycle, applies CSS classes at the right time, and uses CSS transforms
    that are GPU-accelerated.
  how_to_do_right: 'Use <Transition> for single elements, <TransitionGroup> for lists. Define CSS classes: *-enter-active,
    *-leave-active, *-enter-from, *-leave-to. Use appear prop for initial render animations. Prefer CSS transitions/animations
    over JS hooks.'
  severity: medium
  technologies:
    lang: [css]
    framework: [frontend, vue]
  domains:
    domain: [architecture]
    concern: [frontend, animation, ux]
  example_good: "<template>\n  <Transition name=\"fade\" appear>\n    <div v-if=\"show\" class=\"modal\">\n      <slot />\n\
    \    </div>\n  </Transition>\n</template>\n\n<style scoped>\n.fade-enter-active,\n.fade-leave-active {\n  transition:\
    \ opacity 0.3s ease;\n}\n.fade-enter-from,\n.fade-leave-to {\n  opacity: 0;\n}\n</style>\n"
  example_bad: "// Manual JS animation — fights Vue's rendering\nwatch(show, (val) => {\n  const el = document.querySelector('.modal');\n\
    \  if (val) {\n    el.style.opacity = '0';\n    requestAnimationFrame(() => { el.style.opacity = '1'; });\n  } else {\n\
    \    el.style.opacity = '0';\n    setTimeout(() => el.remove(), 300); // Removes from DOM — Vue confusion!\n  }\n});\n"
  when_applies: Projects using Vue.js applications or CSS styling and layout
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using Vue or CSS
  sources: ["https://vuejs.org/guide/built-ins/transition.html"]
- id: CR-VUE-TP-001
  text: Use Teleport to render modals and tooltips at the document body — not inside deeply nested components.
  why: 'Modals rendered inside a component with overflow: hidden or position: relative get clipped or positioned incorrectly.
    CSS z-index stacking contexts from parent elements interfere with modal layering. Teleport renders at body level, escaping
    all parent CSS constraints.'
  how_to_do_right: Use <Teleport to='body'> for modals, dropdowns, and tooltips. Use :disabled prop to conditionally disable
    teleporting (useful for SSR). Keep the component logic in place — only the DOM rendering moves.
  severity: medium
  technologies:
    framework: [frontend, vue]
  domains:
    domain: [architecture, ui]
    concern: [frontend, component-design]
  example_good: "<template>\n  <button @click=\"showModal = true\">Open</button>\n\n  <Teleport to=\"body\">\n    <div v-if=\"\
    showModal\" class=\"modal-overlay\" @click.self=\"showModal = false\">\n      <div class=\"modal-content\" role=\"dialog\"\
    \ aria-modal=\"true\">\n        <h2>{{ title }}</h2>\n        <slot />\n        <button @click=\"showModal = false\">Close</button>\n\
    \      </div>\n    </div>\n  </Teleport>\n</template>\n<!-- Renders at body level — no parent overflow/z-index issues\
    \ -->\n"
  example_bad: "<template>\n  <!-- Modal inside component with overflow:hidden — gets clipped -->\n  <div class=\"card\" style=\"\
    overflow: hidden;\">\n    <div v-if=\"showModal\" class=\"modal-overlay\">\n      <!-- Clipped by parent overflow:hidden!\
    \ Not visible outside card -->\n    </div>\n  </div>\n</template>\n"
  when_applies: Projects using Vue.js applications
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using Vue
  sources: ["https://vuejs.org/guide/built-ins/teleport.html"]
- id: CR-VUE-TS-001
  text: Use typed slots with defineSlots and typed provide/inject with InjectionKey for full type safety.
  why: Untyped slots accept any content — consumers don't know what props the slot provides. Untyped inject returns unknown,
    requiring unsafe assertions. TypeScript integration for slots and injection ensures consumers pass correct content and
    receive correct types.
  how_to_do_right: Use defineSlots<T>() in script setup for slot type declarations. Use InjectionKey<T> from vue for typed
    provide/inject. Use generic components with <script setup generic='T'> for reusable typed patterns.
  severity: medium
  technologies:
    lang: [typescript]
    framework: [frontend, vue]
  domains:
    domain: [architecture, quality]
    concern: [frontend, type_safety]
  example_good: "<!-- TypedList.vue — generic component with typed slots -->\n<script setup lang=\"ts\" generic=\"T extends\
    \ { id: string }\">\ndefineProps<{\n  items: T[];\n}>();\n\ndefineSlots<{\n  default(props: { item: T; index: number }):\
    \ any;\n  empty(): any;\n}>();\n</script>\n\n<template>\n  <ul v-if=\"items.length\">\n    <li v-for=\"(item, index) in\
    \ items\" :key=\"item.id\">\n      <slot :item=\"item\" :index=\"index\" />\n    </li>\n  </ul>\n  <slot v-else name=\"\
    empty\" />\n</template>\n\n<!-- Usage — fully typed slot props -->\n<TypedList :items=\"users\">\n  <template #default=\"\
    { item }\">\n    {{ item.name }} <!-- TypeScript knows item is User -->\n  </template>\n</TypedList>\n"
  example_bad: "<!-- Untyped slots — consumer doesn't know available props -->\n<script setup>\ndefineProps({ items: Array\
    \ });\n</script>\n<template>\n  <li v-for=\"item in items\"><slot :item=\"item\" /></li>\n</template>\n<!-- Usage: <MyList\
    \ :items=\"users\"><template #default=\"{ item }\">\n  {{ item.naem }} <!-- Typo not caught — item is any -->\n</template></MyList>\
    \ -->\n"
  when_applies: Projects using Vue.js applications or TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using Vue or TypeScript
  sources: ["https://vuejs.org/guide/typescript/composition-api.html"]
- id: CR-VUE-MODEL-001
  text: Use defineModel() for two-way binding on custom components — it replaces the manual modelValue + update:modelValue
    pattern.
  why: Manually implementing v-model with a prop (modelValue) + an emit (update:modelValue) is boilerplate-heavy and error-prone
    — typos in the event name silently break binding. defineModel() handles both sides automatically with full type safety.
  how_to_do_right: Use defineModel<T>() in script setup. It returns a ref that is automatically synced with the parent's v-model.
    Use named models for multiple v-model bindings (defineModel<T>('title')). Always type the model for compile-time safety.
  severity: high
  technologies:
    lang: [typescript]
    framework: [frontend, vue]
  domains:
    domain: [architecture]
    concern: [frontend, component-design, forms]
  example_good: "<!-- RatingInput.vue -->\n<script setup lang=\"ts\">\nconst rating = defineModel<number>({ required: true\
    \ });\n</script>\n\n<template>\n  <div class=\"rating\">\n    <button v-for=\"n in 5\" :key=\"n\" @click=\"rating = n\"\
    \n      :class=\"{ active: n <= (rating ?? 0) }\">\n      ★\n    </button>\n  </div>\n</template>\n\n<!-- Parent — clean\
    \ v-model binding -->\n<RatingInput v-model=\"userRating\" />\n"
  example_bad: "<!-- Manual v-model implementation — verbose and error-prone -->\n<script setup>\nconst props = defineProps({\
    \ modelValue: Number });\nconst emit = defineEmits(['update:modelValue']);\n// Must manually sync — easy to forget emit\n\
    function setRating(n) {\n  emit('update:modelValue', n); // Typo here silently breaks binding\n}\n</script>\n"
  when_applies: Projects using Vue.js applications or TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using Vue or TypeScript
  sources: ["https://vuejs.org/api/sfc-script-setup.html#definemodel"]
- id: CR-VUE-MODEL-002
  text: Use v-bind in CSS for reactive styles — avoid inline :style bindings for values that come from reactive state.
  why: Inline :style bindings mix logic and presentation, making components harder to read and maintain. CSS v-bind() accesses
    reactive state directly from <style scoped>, keeping styles in CSS where they belong and enabling CSS-level optimizations.
  how_to_do_right: Use v-bind() in <style> blocks to reference script setup variables. Works with refs, computed, and props.
    Combine with CSS custom properties for theming. Scoped styles ensure no leaking.
  severity: medium
  technologies:
    lang: [css]
    framework: [frontend, vue]
  domains:
    domain: [architecture]
    concern: [frontend, styling]
  example_good: "<script setup lang=\"ts\">\nconst props = defineProps<{ color: string; size: number }>();\nconst borderRadius\
    \ = computed(() => `${props.size / 4}px`);\n</script>\n\n<template>\n  <div class=\"badge\">{{ label }}</div>\n</template>\n\
    \n<style scoped>\n.badge {\n  background-color: v-bind('props.color'); /* Reactive! */\n  border-radius: v-bind(borderRadius);\
    \     /* From computed */\n  padding: 4px 8px;\n}\n</style>\n"
  example_bad: "<!-- Inline styles — mixes logic and presentation -->\n<template>\n  <div\n    :style=\"{\n      backgroundColor:\
    \ color,\n      borderRadius: size / 4 + 'px',\n      padding: '4px 8px'\n    }\"\n    class=\"badge\"\n  >\n    {{ label\
    \ }}\n  </div>\n</template>\n<!-- Style logic scattered between template and CSS file -->\n"
  when_applies: Projects using Vue.js applications or CSS styling and layout
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using Vue or CSS
  sources: ["https://vuejs.org/api/sfc-css-features.html#v-bind-in-css"]
- id: CR-VUE-ERR-001
  text: Use onErrorCaptured and app.config.errorHandler for global error handling — not try/catch in every component.
  why: Uncaught errors in Vue components crash the entire component tree silently — the user sees a blank screen with no feedback.
    onErrorCaptured catches errors from child components, and app.config.errorHandler catches everything globally, enabling
    error reporting and fallback UI.
  how_to_do_right: Set app.config.errorHandler for global error reporting (Sentry, LogRocket). Use onErrorCaptured in parent
    components for local error boundaries. Return false from onErrorCaptured to stop propagation. Show user-friendly error
    UI.
  severity: high
  technologies:
    lang: [typescript]
    framework: [frontend, vue]
  domains:
    domain: [architecture, reliability]
    concern: [frontend, error_handling]
  example_good: "// main.ts — global error handler\nconst app = createApp(App);\napp.config.errorHandler = (err, instance,\
    \ info) => {\n  Sentry.captureException(err, { extra: { info, component: instance?.$options.name } });\n  console.error(`[Vue\
    \ Error] ${info}:`, err);\n};\n\n// ErrorBoundary.vue — local error boundary\n<script setup lang=\"ts\">\nconst error\
    \ = ref<Error | null>(null);\nonErrorCaptured((err: Error) => {\n  error.value = err;\n  return false; // Stop propagation\
    \ — handled here\n});\n</script>\n\n<template>\n  <div v-if=\"error\" class=\"error-fallback\">\n    <p>Something went\
    \ wrong: {{ error.message }}</p>\n    <button @click=\"error = null\">Retry</button>\n  </div>\n  <slot v-else />\n</template>\n\
    \n<!-- Usage -->\n<ErrorBoundary>\n  <RiskyComponent />\n</ErrorBoundary>\n"
  example_bad: "// No error handling — component crashes silently\n<script setup>\nonMounted(async () => {\n  const data =\
    \ await fetch('/api/data').then(r => r.json());\n  // If this throws — blank screen, no error message, no reporting\n\
    });\n</script>\n"
  when_applies: Projects using Vue.js applications or TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using Vue or TypeScript
  sources: ["https://vuejs.org/api/composition-api-lifecycle.html#onerrorcaptured"]
- id: CR-VUE-WATCH-001
  text: Use watchEffect for auto-tracked dependencies — use watch only when you need the old value or explicit dependency
    control.
  why: watch requires manually listing dependencies — forget one and you get stale data. watchEffect automatically tracks
    every reactive reference accessed inside it, reducing bugs from missing dependencies. It's Vue's equivalent of React's
    'exhaustive deps' but built into the runtime.
  how_to_do_right: Use watchEffect when you don't need the old value and want auto-tracking. Use watch when you need (newVal,
    oldVal) comparison, explicit deps, or lazy execution (watch is lazy by default, watchEffect runs immediately). Use watchPostEffect
    for DOM-dependent side effects.
  severity: medium
  technologies:
    lang: [typescript]
    framework: [frontend, vue]
  domains:
    domain: [architecture]
    concern: [frontend, state_management]
  example_good: "<script setup lang=\"ts\">\nconst userId = ref('');\nconst includeArchived = ref(false);\nconst data = ref<User\
    \ | null>(null);\n\n// watchEffect — auto-tracks both userId AND includeArchived\nwatchEffect(async (onCleanup) => {\n\
    \  if (!userId.value) return;\n  const controller = new AbortController();\n  onCleanup(() => controller.abort());\n\n\
    \  const result = await fetch(\n    `/api/users/${userId.value}?archived=${includeArchived.value}`,\n    { signal: controller.signal\
    \ }\n  ).then(r => r.json());\n\n  data.value = result;\n});\n// Adding new reactive deps automatically triggers re-fetch\
    \ — no manual dep list\n</script>\n"
  example_bad: "// watch with manual deps — forgot includeArchived!\nwatch([userId], async ([newId]) => {\n  if (!newId) return;\n\
    \  data.value = await fetch(`/api/users/${newId}?archived=${includeArchived.value}`)\n    .then(r => r.json());\n});\n\
    // includeArchived changes → no refetch! Stale data shown.\n"
  when_applies: Projects using Vue.js applications or TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using Vue or TypeScript
  sources: ["https://vuejs.org/guide/essentials/watchers.html#watcheffect"]
- id: CR-VUE-PINIA-002
  text: Use Pinia store composition to share logic between stores — call one store inside another.
  why: In Vuex, cross-store access required rootGetters and string-based paths, which were brittle and untyped. Pinia stores
    are regular composables — you can import and use one store inside another with full type safety and no special syntax.
  how_to_do_right: Import and call the other store's hook inside your store's setup function. Access state, getters, and actions
    directly. Avoid circular dependencies — if store A needs B and B needs A, extract the shared logic into a composable.
  severity: medium
  technologies:
    lang: [typescript]
    framework: [frontend, vue]
    library: [pinia]
  domains:
    domain: [architecture]
    concern: [frontend, state_management]
  example_good: "// stores/useAuthStore.ts\nexport const useAuthStore = defineStore('auth', () => {\n  const user = ref<User\
    \ | null>(null);\n  const isAuthenticated = computed(() => user.value !== null);\n  return { user, isAuthenticated };\n\
    });\n\n// stores/useCartStore.ts — uses auth store\nexport const useCartStore = defineStore('cart', () => {\n  const authStore\
    \ = useAuthStore(); // Compose stores\n\n  const items = ref<CartItem[]>([]);\n  const total = computed(() => items.value.reduce((s,\
    \ i) => s + i.price, 0));\n\n  async function checkout() {\n    if (!authStore.isAuthenticated) {\n      throw new Error('Must\
    \ be logged in to checkout');\n    }\n    await api.checkout(items.value, authStore.user!.id);\n    items.value = [];\n\
    \  }\n\n  return { items, total, checkout };\n});\n"
  example_bad: "// Vuex — string-based cross-module access, no type safety\nconst cartModule = {\n  actions: {\n    checkout({\
    \ rootGetters, state }) {\n      const user = rootGetters['auth/currentUser']; // String path — typo = runtime error\n\
    \      if (!user) throw new Error('Not authenticated');\n      // No autocomplete, no type checking\n    }\n  }\n};\n"
  when_applies: Projects using Vue.js applications, Pinia, or TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools
  sources: ["https://pinia.vuejs.org/cookbook/composing-stores.html"]
