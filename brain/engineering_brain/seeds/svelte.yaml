- id: CR-SVL-010
  text: Use named slots for composable component layouts. Prefer slot-based composition over deeply nested prop passing for
    UI components.
  why: Passing HTML content as string props is fragile, loses reactivity, and prevents component composition. Named slots
    let parent components inject different content into predefined areas of a child component, creating flexible layouts.
    Slots maintain full reactivity and component semantics — the injected content has access to the parent's scope.
  how_to_do_right: '1. Use default <slot /> for main content area.

    2. Use named slots <slot name="header" /> for specific content areas.

    3. Use slot props for exposing child data to parent: <slot item={item} />.

    4. Provide fallback content: <slot name="footer">Default footer</slot>.

    5. Check if a slot was provided with $$slots.name.

    '
  severity: medium
  technologies:
    lang: [javascript]
    framework: [frontend, svelte]
  domains:
    domain: [architecture]
    concern: [frontend]
  example_good: "<!-- Card.svelte — composable layout component -->\n<div class=\"card\">\n  {#if $$slots.header}\n    <div\
    \ class=\"card-header\">\n      <slot name=\"header\" />\n    </div>\n  {/if}\n\n  <div class=\"card-body\">\n    <slot\
    \ />  <!-- Default slot for main content -->\n  </div>\n\n  <div class=\"card-footer\">\n    <slot name=\"footer\">\n\
    \      <p class=\"text-muted\">No additional info</p>\n    </slot>\n  </div>\n</div>\n\n<!-- DataList.svelte — slot props\
    \ for custom rendering -->\n<script>\n  export let items = [];\n</script>\n\n{#each items as item (item.id)}\n  <slot\
    \ {item} index={items.indexOf(item)}>\n    <!-- Fallback: default rendering -->\n    <div>{item.name}</div>\n  </slot>\n\
    {/each}\n\n<!-- Usage — flexible composition -->\n<Card>\n  <svelte:fragment slot=\"header\">\n    <h2>Order #{order.id}</h2>\n\
    \    <Badge status={order.status} />\n  </svelte:fragment>\n\n  <OrderDetails {order} />\n\n  <svelte:fragment slot=\"\
    footer\">\n    <Button on:click={cancelOrder}>Cancel</Button>\n    <Button primary on:click={confirmOrder}>Confirm</Button>\n\
    \  </svelte:fragment>\n</Card>\n\n<DataList items={users} let:item let:index>\n  <UserRow user={item} position={index\
    \ + 1} />\n</DataList>\n"
  example_bad: "<!-- Wrong: Content as string props — no reactivity, no composition -->\n<Card\n  title=\"Order #123\"\n \
    \ body=\"<p>Order details here</p>\"\n  footer=\"<button>Cancel</button>\"\n/>\n<!-- HTML strings: no event handling,\
    \ no reactivity, XSS risk -->\n"
  when_applies: Projects using Svelte/SvelteKit applications or JavaScript/TypeScript projects
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using Svelte or JavaScript
  sources: ["https://svelte.dev/docs/svelte/snippet"]
- id: CR-SVL-011
  text: Use dynamic imports and lazy loading for code splitting in SvelteKit. Load heavy components only when needed to minimize
    initial bundle size.
  why: Svelte compiles to the smallest framework output of any major framework (~2KB runtime). But importing a heavy charting
    library at the top level adds it to every page's bundle. Dynamic imports tell the bundler to split the code — the component
    is loaded only when needed, keeping initial page loads fast.
  how_to_do_right: '1. Use import() for heavy components: const Chart = (await import(''./Chart.svelte'')).default.

    2. Use SvelteKit''s route-based code splitting (automatic per +page.svelte).

    3. Use {#await} blocks to show loading state during dynamic imports.

    4. Preload on hover with data-sveltekit-preload-data for faster navigation.

    5. Measure bundle size with vite-plugin-visualizer.

    '
  severity: medium
  technologies:
    lang: [javascript]
    framework: [frontend, svelte]
    library: [sveltekit]
  domains:
    domain: [architecture, performance]
    concern: [frontend]
  example_good: "<script>\n  let showChart = false;\n  let ChartComponent;\n\n  async function loadChart() {\n    showChart\
    \ = true;\n    // Only loads the chart library when user clicks \"Show Chart\"\n    const module = await import('$lib/components/HeavyChart.svelte');\n\
    \    ChartComponent = module.default;\n  }\n</script>\n\n<button on:click={loadChart}>Show Chart</button>\n\n{#if showChart}\n\
    \  {#if ChartComponent}\n    <svelte:component this={ChartComponent} data={chartData} />\n  {:else}\n    <p>Loading chart...</p>\n\
    \  {/if}\n{/if}\n\n<!-- SvelteKit: automatic route-based splitting -->\n<!-- routes/dashboard/+page.svelte — only loaded\
    \ when visiting /dashboard -->\n<!-- routes/settings/+page.svelte — only loaded when visiting /settings -->\n\n<!-- Preload\
    \ on hover for instant navigation -->\n<a href=\"/dashboard\" data-sveltekit-preload-data=\"hover\">Dashboard</a>\n"
  example_bad: "<!-- Wrong: Heavy library imported at top level — in every page's bundle -->\n<script>\n  import HeavyChart\
    \ from '$lib/components/HeavyChart.svelte';\n  // chart.js (200KB) loaded on EVERY page, even if chart is never shown\n\
    </script>\n\n{#if showChart}\n  <HeavyChart data={chartData} />\n{/if}\n"
  when_applies: Projects using Svelte/SvelteKit applications, SvelteKit, or JavaScript/TypeScript projects
  when_not_applies: server-rendered pages, APIs, CLI tools
  sources: ["https://svelte.dev/docs/kit/performance"]
- id: CR-SVL-012
  text: Use SvelteKit adapters to deploy to the correct target platform. Choose the adapter based on your hosting environment.
  why: 'SvelteKit generates a universal intermediate output that needs an adapter to target a specific platform. Using the
    wrong adapter produces incorrect output: Node adapter on Cloudflare fails, Vercel adapter on a VPS produces Edge functions
    instead of a standalone server. Each adapter optimizes for its platform''s capabilities (edge functions, streaming, caching).'
  how_to_do_right: '1. Use adapter-node for traditional Node.js servers (VPS, Docker, AWS EC2).

    2. Use adapter-vercel for Vercel (automatic edge + serverless functions).

    3. Use adapter-cloudflare for Cloudflare Workers/Pages (edge computing).

    4. Use adapter-static for fully static sites (no server-side rendering).

    5. Configure the adapter in svelte.config.js and test builds locally.

    '
  severity: medium
  technologies:
    framework: [frontend, svelte]
    library: [sveltekit]
  domains:
    domain: [architecture, operations, deployment]
    concern: [frontend]
  example_good: "// svelte.config.js — Node adapter for Docker deployment\nimport adapter from '@sveltejs/adapter-node';\n\
    \nexport default {\n  kit: {\n    adapter: adapter({\n      out: 'build',\n      precompress: true,  // Generate .gz and\
    \ .br files\n      envPrefix: 'APP_',\n    }),\n  },\n};\n\n// Dockerfile\n// FROM node:20-slim\n// COPY build ./build\n\
    // COPY package.json .\n// ENV PORT=3000\n// CMD [\"node\", \"build\"]\n\n// svelte.config.js — Cloudflare adapter for\
    \ edge deployment\nimport adapter from '@sveltejs/adapter-cloudflare';\n\nexport default {\n  kit: {\n    adapter: adapter({\n\
    \      routes: {\n        include: ['/*'],\n        exclude: ['<all>'],\n      },\n    }),\n  },\n};\n"
  example_bad: "// Wrong: Auto adapter in production — unpredictable behavior\nimport adapter from '@sveltejs/adapter-auto';\n\
    \nexport default {\n  kit: {\n    adapter: adapter(),\n    // adapter-auto detects the platform at build time\n    //\
    \ Works in CI? What platform does it detect?\n    // Different builds on different machines = different output\n  },\n\
    };\n"
  when_applies: Projects using Svelte/SvelteKit applications or SvelteKit
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using Svelte or SvelteKit
  sources: ["https://svelte.dev/docs/kit/adapters"]
