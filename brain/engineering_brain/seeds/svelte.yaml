layer: rules
technology: Svelte
domain: frontend
knowledge:
- id: CR-SVL-001
  text: Use reactive declarations ($:) for derived values that depend on component state. Never compute derived values inside
    event handlers or template expressions.
  why: Computing derived values in event handlers requires manually tracking which values changed and recalculating — error-prone
    and creates stale data. Computing in template expressions runs on every render regardless of whether dependencies changed.
    Reactive declarations ($:) automatically recompute only when their dependencies change, providing correctness with optimal
    performance.
  how_to_do_right: '1. Use $: for any value that depends on reactive state.

    2. Keep reactive declarations close to the state they depend on.

    3. Use $: for complex computations to avoid template-level logic.

    4. Chain reactive declarations — Svelte topologically sorts them.

    5. Avoid side effects in reactive declarations — use $: { } blocks for those.

    '
  severity: high
  technologies:
    lang: [javascript]
    framework: [frontend, svelte]
  domains:
    domain: [architecture, performance]
    concern: [frontend]
  example_good: "<script>\n  let items = [];\n  let filter = 'all';\n  let searchQuery = '';\n\n  // Reactive declarations\
    \ — recompute only when dependencies change\n  $: filteredItems = items.filter(item => {\n    if (filter === 'active')\
    \ return !item.completed;\n    if (filter === 'completed') return item.completed;\n    return true;\n  });\n\n  $: searchResults\
    \ = filteredItems.filter(item =>\n    item.name.toLowerCase().includes(searchQuery.toLowerCase())\n  );\n\n  $: totalCount\
    \ = items.length;\n  $: activeCount = items.filter(i => !i.completed).length;\n  $: completedCount = totalCount - activeCount;\n\
    \n  // Side effect in reactive block\n  $: if (searchResults.length === 0 && searchQuery.length > 0) {\n    console.log('No\
    \ results for:', searchQuery);\n  }\n</script>\n\n<input bind:value={searchQuery} placeholder=\"Search...\" />\n<p>{activeCount}\
    \ active, {completedCount} completed</p>\n{#each searchResults as item (item.id)}\n  <TodoItem {item} />\n{/each}\n"
  example_bad: "<script>\n  let items = [];\n  let filter = 'all';\n\n  // Wrong: Derived value computed in template — runs\
    \ every render\n</script>\n\n<!-- Filtering runs on EVERY render, not just when items/filter change -->\n{#each items.filter(i\
    \ => filter === 'all' ? true : filter === 'active' ? !i.completed : i.completed) as item}\n  <div>{item.name}</div>\n\
    {/each}\n\n<!-- Count computed in template — duplicated and inefficient -->\n<p>{items.filter(i => !i.completed).length}\
    \ active</p>\n<p>{items.filter(i => i.completed).length} completed</p>\n"
  when_applies: Projects using Svelte/SvelteKit applications or JavaScript/TypeScript projects
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using Svelte or JavaScript
  sources: ["https://svelte.dev/docs/svelte/$state"]
- id: CR-SVL-002
  text: Use Svelte stores (writable, readable, derived) for shared state across components. Never pass state through deep
    prop drilling.
  why: Passing state through 5 levels of components (App -> Layout -> Sidebar -> Menu -> MenuItem) creates tight coupling
    — every intermediate component must accept and forward props it does not use. When the state shape changes, every component
    in the chain must be updated. Stores provide direct access from any component, with automatic subscription cleanup.
  how_to_do_right: '1. Use writable() for state that can be updated from multiple components.

    2. Use readable() for state derived from external sources (timers, websockets).

    3. Use derived() for computed state based on other stores.

    4. Use $ prefix for auto-subscription in components ($storeName).

    5. Create custom stores with subscribe/set methods for complex logic.

    '
  severity: high
  technologies:
    lang: [javascript]
    framework: [frontend, svelte]
  domains:
    domain: [architecture]
    concern: [frontend]
  example_good: "// stores/cart.js — shared store\nimport { writable, derived } from 'svelte/store';\n\nexport const cartItems\
    \ = writable([]);\n\nexport const cartTotal = derived(cartItems, ($items) =>\n  $items.reduce((sum, item) => sum + item.price\
    \ * item.quantity, 0)\n);\n\nexport const cartCount = derived(cartItems, ($items) =>\n  $items.reduce((sum, item) => sum\
    \ + item.quantity, 0)\n);\n\n// Custom store with encapsulated logic\nfunction createCart() {\n  const { subscribe, set,\
    \ update } = writable([]);\n\n  return {\n    subscribe,\n    addItem: (product) => update(items => {\n      const existing\
    \ = items.find(i => i.id === product.id);\n      if (existing) {\n        return items.map(i => i.id === product.id\n\
    \          ? { ...i, quantity: i.quantity + 1 }\n          : i\n        );\n      }\n      return [...items, { ...product,\
    \ quantity: 1 }];\n    }),\n    removeItem: (id) => update(items => items.filter(i => i.id !== id)),\n    clear: () =>\
    \ set([]),\n  };\n}\n\nexport const cart = createCart();\n\n// Any component — direct access, no prop drilling\n// CartIcon.svelte\n\
    <script>\n  import { cartCount } from '../stores/cart';\n</script>\n<span class=\"badge\">{$cartCount}</span>\n"
  example_bad: "<!-- Wrong: Prop drilling through 4 levels -->\n<!-- App.svelte -->\n<Layout cartCount={cartItems.length}\
    \ onAddToCart={handleAdd}>\n  <!-- Layout.svelte — doesn't use cart, just passes through -->\n  <Sidebar cartCount={cartCount}\
    \ onAddToCart={onAddToCart}>\n    <!-- Sidebar.svelte — doesn't use cart, just passes through -->\n    <CartIcon cartCount={cartCount}\
    \ />\n  </Sidebar>\n</Layout>\n"
  when_applies: Projects using Svelte/SvelteKit applications or JavaScript/TypeScript projects
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using Svelte or JavaScript
  sources: ["https://svelte.dev/docs/svelte/stores"]
- id: CR-SVL-003
  text: Always use keyed each blocks ({#each items as item (item.id)}) when rendering lists of components that have internal
    state or transitions.
  why: Without a key, Svelte reuses DOM elements by index — when an item is removed from the middle of a list, all subsequent
    items shift and their internal state (input values, animation state, scroll position) is transferred to the wrong item.
    Keys tell Svelte to match elements by identity, not position, ensuring correct updates and animations.
  how_to_do_right: '1. Always provide a unique key: {#each items as item (item.id)}.

    2. Use a stable identifier (database ID, UUID) — never use array index.

    3. Keyed each blocks are required when: items have state, items have transitions, items can be reordered.

    4. For simple static lists without state, keying is optional but still recommended.

    5. Keys must be unique within the each block — duplicates cause bugs.

    '
  severity: high
  technologies:
    lang: [javascript]
    framework: [frontend, svelte]
  domains:
    domain: [architecture, performance]
    concern: [frontend]
  example_good: "<script>\n  let todos = [\n    { id: 1, text: 'Learn Svelte', done: false },\n    { id: 2, text: 'Build app',\
    \ done: false },\n    { id: 3, text: 'Deploy', done: false },\n  ];\n\n  function removeTodo(id) {\n    todos = todos.filter(t\
    \ => t.id !== id);\n  }\n</script>\n\n<!-- Keyed: each component tracks its own item correctly -->\n{#each todos as todo\
    \ (todo.id)}\n  <div transition:slide>\n    <input type=\"checkbox\" bind:checked={todo.done} />\n    <span>{todo.text}</span>\n\
    \    <button on:click={() => removeTodo(todo.id)}>Delete</button>\n  </div>\n{/each}\n<!-- Removing item 2: item 3's checkbox\
    \ state is preserved correctly -->\n"
  example_bad: "<!-- Wrong: No key — removing middle item corrupts state -->\n{#each todos as todo}\n  <div transition:slide>\n\
    \    <input type=\"checkbox\" bind:checked={todo.done} />\n    <span>{todo.text}</span>\n    <button on:click={() => removeTodo(todo.id)}>Delete</button>\n\
    \  </div>\n{/each}\n<!-- Removing item 2 (\"Build app\"):\n     - Item 3 (\"Deploy\") inherits item 2's checkbox state\n\
    \     - Transition animates the wrong element\n     - Last element is removed from DOM, not the deleted one -->\n"
  when_applies: Projects using Svelte/SvelteKit applications or JavaScript/TypeScript projects
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using Svelte or JavaScript
  sources: ["https://svelte.dev/docs/svelte/each#Keyed-each-blocks"]
- id: CR-SVL-004
  text: Use createEventDispatcher for child-to-parent communication. Use context API (setContext/getContext) for deeply nested
    component communication.
  why: 'Using bind: for parent-child communication creates two-way data flow that makes state changes unpredictable — any
    child can modify parent state at any time. Event dispatching provides clear, one-way communication: child emits an event,
    parent decides how to handle it. Context API avoids prop drilling for deeply nested components.'
  how_to_do_right: '1. Use createEventDispatcher for child-to-parent events (button clicks, form submissions).

    2. Use setContext/getContext for shared data in nested component trees.

    3. Context is set during component initialization — not reactive by default.

    4. For reactive context, pass a store as the context value.

    5. Use bind: only for form elements (bind:value, bind:checked) — not for component communication.

    '
  severity: medium
  technologies:
    lang: [javascript]
    framework: [frontend, svelte]
  domains:
    domain: [architecture]
    concern: [frontend]
  example_good: "<!-- Child: TodoItem.svelte — dispatches events up -->\n<script>\n  import { createEventDispatcher } from\
    \ 'svelte';\n  export let todo;\n  const dispatch = createEventDispatcher();\n</script>\n\n<div>\n  <input\n    type=\"\
    checkbox\"\n    checked={todo.done}\n    on:change={() => dispatch('toggle', { id: todo.id })}\n  />\n  <span>{todo.text}</span>\n\
    \  <button on:click={() => dispatch('delete', { id: todo.id })}>X</button>\n</div>\n\n<!-- Parent: TodoList.svelte — handles\
    \ events -->\n<script>\n  let todos = [...];\n  function handleToggle(event) {\n    const { id } = event.detail;\n   \
    \ todos = todos.map(t => t.id === id ? { ...t, done: !t.done } : t);\n  }\n  function handleDelete(event) {\n    todos\
    \ = todos.filter(t => t.id !== event.detail.id);\n  }\n</script>\n\n{#each todos as todo (todo.id)}\n  <TodoItem {todo}\
    \ on:toggle={handleToggle} on:delete={handleDelete} />\n{/each}\n\n<!-- Context for deep nesting -->\n<!-- ThemeProvider.svelte\
    \ -->\n<script>\n  import { setContext } from 'svelte';\n  import { writable } from 'svelte/store';\n  const theme = writable('light');\n\
    \  setContext('theme', theme);  // Reactive store as context\n</script>\n<slot />\n\n<!-- DeepChild.svelte — access context\
    \ directly -->\n<script>\n  import { getContext } from 'svelte';\n  const theme = getContext('theme');\n</script>\n<div\
    \ class={$theme}>Content</div>\n"
  example_bad: "<!-- Wrong: Two-way bind for communication — unpredictable state -->\n<!-- Parent -->\n<TodoItem bind:done={todos[i].done}\
    \ bind:text={todos[i].text} />\n<!-- Any child can modify parent state at any time\n     Multiple children can cause conflicting\
    \ updates\n     No audit trail of what changed and why -->\n"
  when_applies: Projects using Svelte/SvelteKit applications or JavaScript/TypeScript projects
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using Svelte or JavaScript
  sources: ["https://svelte.dev/docs/svelte/legacy-createEventDispatcher", "https://svelte.dev/docs/svelte/context"]
- id: CR-SVL-005
  text: Use SvelteKit's load functions for server-side data fetching. Never fetch data in onMount for content that should
    be available on initial page load.
  why: Fetching in onMount runs only on the client — the user sees a loading spinner, then content flashes in. Search engines
    see empty pages. The initial HTML has no content. SvelteKit load functions run on the server during SSR and on the client
    during navigation, providing instant content, SEO, and no layout shift.
  how_to_do_right: '1. Use +page.server.ts load function for data that needs server-side access (DB, secrets).

    2. Use +page.ts load function for data that can be fetched from both server and client.

    3. Return data from load — it becomes the `data` prop in the page component.

    4. Use depends() for revalidation and invalidate() to trigger refetch.

    5. Reserve onMount for client-only operations (DOM manipulation, client libraries).

    '
  severity: high
  technologies:
    lang: [typescript]
    framework: [frontend, svelte]
    library: [sveltekit]
  domains:
    domain: [architecture, performance]
    concern: [frontend]
  example_good: "// routes/products/+page.server.ts — runs on server\nimport type { PageServerLoad } from './$types';\n\n\
    export const load: PageServerLoad = async ({ fetch, url }) => {\n  const page = Number(url.searchParams.get('page') ??\
    \ '1');\n  const response = await fetch(`/api/products?page=${page}`);\n  const { products, totalPages } = await response.json();\n\
    \n  return {\n    products,\n    totalPages,\n    currentPage: page,\n  };\n};\n\n// routes/products/+page.svelte\n<script\
    \ lang=\"ts\">\n  import type { PageData } from './$types';\n  export let data: PageData;\n</script>\n\n<!-- Content available\
    \ on first render — no spinner, good SEO -->\n<h1>Products</h1>\n{#each data.products as product (product.id)}\n  <ProductCard\
    \ {product} />\n{/each}\n<Pagination totalPages={data.totalPages} current={data.currentPage} />\n"
  example_bad: "<!-- Wrong: Client-side fetch in onMount — loading flash, no SEO -->\n<script>\n  import { onMount } from\
    \ 'svelte';\n  let products = [];\n  let loading = true;\n\n  onMount(async () => {\n    // Runs ONLY on client — server\
    \ HTML is empty\n    const res = await fetch('/api/products');\n    products = await res.json();\n    loading = false;\n\
    \  });\n</script>\n\n{#if loading}\n  <Spinner />  <!-- User sees spinner, search engine sees spinner -->\n{:else}\n \
    \ {#each products as product}\n    <ProductCard {product} />\n  {/each}\n{/if}\n"
  when_applies: Projects using Svelte/SvelteKit applications, SvelteKit, or TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools
  sources: ["https://svelte.dev/docs/kit/load"]
- id: CR-SVL-006
  text: Use SvelteKit form actions for mutations (create, update, delete) with progressive enhancement. Forms work without
    JavaScript.
  why: Using fetch() for form submissions breaks when JavaScript fails to load (slow networks, ad blockers, corporate proxies).
    SvelteKit form actions use standard HTML form behavior as the baseline — the form works without JavaScript. When JavaScript
    is available, use:enhance upgrades the form with client-side submission, optimistic UI, and no page reload.
  how_to_do_right: '1. Define form actions in +page.server.ts (default action or named actions).

    2. Use <form method="POST" use:enhance> for progressive enhancement.

    3. Validate input server-side in the action — never trust client validation alone.

    4. Return form data and errors using fail() for validation errors.

    5. Use action parameter for named actions: formaction="?/delete".

    '
  severity: high
  technologies:
    lang: [typescript]
    framework: [frontend, svelte]
    library: [sveltekit]
  domains:
    domain: [architecture]
    concern: [frontend]
  example_good: "// routes/todos/+page.server.ts\nimport { fail } from '@sveltejs/kit';\nimport type { Actions } from './$types';\n\
    \nexport const actions: Actions = {\n  create: async ({ request }) => {\n    const data = await request.formData();\n\
    \    const text = data.get('text')?.toString()?.trim();\n\n    if (!text || text.length < 1) {\n      return fail(422,\
    \ { text, error: 'Todo text is required' });\n    }\n    if (text.length > 200) {\n      return fail(422, { text, error:\
    \ 'Todo must be under 200 characters' });\n    }\n\n    await db.todos.create({ text });\n    return { success: true };\n\
    \  },\n\n  delete: async ({ request }) => {\n    const data = await request.formData();\n    const id = data.get('id')?.toString();\n\
    \    await db.todos.delete({ where: { id } });\n    return { success: true };\n  },\n};\n\n// routes/todos/+page.svelte\n\
    <script>\n  import { enhance } from '$app/forms';\n  export let form; // Server-returned form data (errors, values)\n\
    </script>\n\n<!-- Works WITHOUT JavaScript — progressive enhancement -->\n<form method=\"POST\" action=\"?/create\" use:enhance>\n\
    \  <input name=\"text\" value={form?.text ?? ''} />\n  {#if form?.error}\n    <p class=\"error\">{form.error}</p>\n  {/if}\n\
    \  <button type=\"submit\">Add Todo</button>\n</form>\n"
  example_bad: "<!-- Wrong: Client-only form — broken without JavaScript -->\n<script>\n  async function handleSubmit() {\n\
    \    // If JS fails to load, button does nothing\n    await fetch('/api/todos', {\n      method: 'POST',\n      body:\
    \ JSON.stringify({ text }),\n    });\n  }\n</script>\n\n<button on:click={handleSubmit}>Add Todo</button>\n<!-- No <form>\
    \ element — screen readers can't identify the form\n     No progressive enhancement — broken without JS\n     No server-side\
    \ validation — client validation easily bypassed -->\n"
  when_applies: Projects using Svelte/SvelteKit applications, SvelteKit, or TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools
  sources: ["https://svelte.dev/docs/kit/form-actions"]
- id: CR-SVL-007
  text: 'Use SvelteKit hooks (handle, handleError, handleFetch) for server-side cross-cutting concerns: authentication, logging,
    and error tracking.'
  why: Without server hooks, authentication checks must be duplicated in every load function and form action. If one load
    function forgets the check, the page is unprotected. Server hooks intercept every request, enabling centralized authentication,
    logging, error tracking, and request modification before any route handler executes.
  how_to_do_right: '1. Use handle hook in hooks.server.ts for authentication and request transformation.

    2. Set event.locals for passing auth data to load functions.

    3. Use handleError for centralized error tracking (Sentry, Datadog).

    4. Use handleFetch to modify outgoing fetches (add auth headers to API calls).

    5. Chain multiple hooks with sequence().

    '
  severity: high
  technologies:
    lang: [typescript]
    framework: [frontend, svelte]
    library: [sveltekit]
  domains:
    domain: [architecture, security]
    concern: [frontend]
  example_good: "// src/hooks.server.ts\nimport type { Handle, HandleServerError } from '@sveltejs/kit';\nimport { sequence\
    \ } from '@sveltejs/kit/hooks';\n\nconst authHandle: Handle = async ({ event, resolve }) => {\n  const sessionToken =\
    \ event.cookies.get('session');\n\n  if (sessionToken) {\n    const user = await verifySession(sessionToken);\n    if\
    \ (user) {\n      event.locals.user = user;\n    }\n  }\n\n  // Protect /dashboard routes\n  if (event.url.pathname.startsWith('/dashboard')\
    \ && !event.locals.user) {\n    return new Response(null, {\n      status: 303,\n      headers: { location: '/login' },\n\
    \    });\n  }\n\n  return resolve(event);\n};\n\nconst loggingHandle: Handle = async ({ event, resolve }) => {\n  const\
    \ start = performance.now();\n  const response = await resolve(event);\n  const duration = Math.round(performance.now()\
    \ - start);\n  console.log(`${event.request.method} ${event.url.pathname} ${response.status} ${duration}ms`);\n  return\
    \ response;\n};\n\nexport const handle = sequence(authHandle, loggingHandle);\n\nexport const handleError: HandleServerError\
    \ = async ({ error, event }) => {\n  const id = crypto.randomUUID();\n  console.error(`Error ${id}:`, error);\n  // Report\
    \ to error tracking service\n  await Sentry.captureException(error, { extra: { id, path: event.url.pathname } });\n  return\
    \ { message: 'An unexpected error occurred', id };\n};\n"
  example_bad: "// Wrong: Auth check duplicated in every load function\n// routes/dashboard/+page.server.ts\nexport const\
    \ load = async ({ cookies }) => {\n  const session = cookies.get('session');\n  if (!session) redirect(303, '/login');\
    \ // Duplicated in every protected route\n  const user = await verifySession(session); // Same logic in 20 files\n  if\
    \ (!user) redirect(303, '/login');\n  return { user };\n};\n"
  when_applies: Projects using Svelte/SvelteKit applications, SvelteKit, or TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools
  sources: ["https://svelte.dev/docs/kit/hooks"]
- id: CR-SVL-008
  text: Use Svelte's built-in transitions and animations instead of CSS animation libraries. They are compiled away when unused
    and tie into Svelte's reactivity system.
  why: CSS animation libraries (animate.css, framer-motion) add 20-50KB to the bundle and require manual cleanup when elements
    are removed. Svelte's built-in transitions are compiled — unused transitions are tree-shaken. They automatically handle
    intro/outro animations during {#if} and {#each} blocks, with proper cleanup and accessibility (respects prefers-reduced-motion).
  how_to_do_right: '1. Use transition: for enter + exit animations (fly, fade, slide, scale).

    2. Use in: and out: for separate enter/exit animations.

    3. Use animate: for list reordering animations (flip).

    4. Create custom transitions for complex animations.

    5. Use |local modifier to limit transitions to direct block changes.

    '
  severity: medium
  technologies:
    lang: [css]
    framework: [frontend, svelte]
  domains:
    domain: [architecture, performance]
    concern: [frontend]
  example_good: "<script>\n  import { fly, fade, slide, flip } from 'svelte/transition';\n  import { quintOut } from 'svelte/easing';\n\
    \n  let items = [];\n  let showModal = false;\n</script>\n\n<!-- List with add/remove animations + reorder animation -->\n\
    {#each items as item (item.id)}\n  <div\n    in:fly={{ y: 20, duration: 300 }}\n    out:fade={{ duration: 200 }}\n   \
    \ animate:flip={{ duration: 300, easing: quintOut }}\n  >\n    {item.name}\n  </div>\n{/each}\n\n<!-- Modal with enter/exit\
    \ transitions -->\n{#if showModal}\n  <div class=\"backdrop\" transition:fade={{ duration: 200 }}>\n    <div class=\"\
    modal\" transition:fly={{ y: -50, duration: 300 }}>\n      <h2>Confirm Action</h2>\n      <button on:click={() => showModal\
    \ = false}>Close</button>\n    </div>\n  </div>\n{/if}\n\n<!-- Custom transition -->\n<script>\n  function typewriter(node,\
    \ { speed = 30 }) {\n    const text = node.textContent;\n    const duration = text.length * speed;\n    return {\n   \
    \   duration,\n      tick: t => {\n        const i = Math.trunc(text.length * t);\n        node.textContent = text.slice(0,\
    \ i);\n      },\n    };\n  }\n</script>\n{#if visible}\n  <p transition:typewriter>Hello, world!</p>\n{/if}\n"
  example_bad: "<!-- Wrong: External library for simple animations -->\n<script>\n  import { motion } from 'some-animation-library';\
    \ // +40KB bundle\n  // Manual cleanup needed when component destroyed\n  // Doesn't integrate with Svelte's {#if} blocks\n\
    </script>\n\n<!-- Wrong: CSS classes for enter/exit — no exit animation -->\n<div class={visible ? 'fade-in' : 'fade-out'}>\n\
    \  <!-- 'fade-out' class set, but element immediately removed — no exit animation -->\n</div>\n"
  when_applies: Projects using Svelte/SvelteKit applications or CSS styling and layout
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using Svelte or CSS
  sources: ["https://svelte.dev/docs/svelte/transition"]
- id: CR-SVL-009
  text: Use Svelte actions for reusable DOM behaviors that need direct element access. Actions are the Svelte equivalent of
    custom directives.
  why: Repeating DOM manipulation logic (click outside, long press, tooltip positioning, intersection observer) in every component
    that needs it creates duplication and bugs. Actions encapsulate DOM behavior in reusable functions that automatically
    clean up when the element is destroyed. They compose cleanly with Svelte's declarative syntax.
  how_to_do_right: '1. Create action functions that receive the node and optional parameters.

    2. Return an object with update() and destroy() methods for lifecycle management.

    3. Use use:actionName on elements to apply the action.

    4. Pass parameters: use:actionName={params}.

    5. Clean up event listeners and observers in destroy().

    '
  severity: medium
  technologies:
    lang: [javascript]
    framework: [frontend, svelte]
  domains:
    domain: [architecture]
    concern: [frontend]
  example_good: "// actions/clickOutside.js\nexport function clickOutside(node, callback) {\n  function handleClick(event)\
    \ {\n    if (!node.contains(event.target) && !event.defaultPrevented) {\n      callback();\n    }\n  }\n\n  document.addEventListener('click',\
    \ handleClick, true);\n\n  return {\n    destroy() {\n      document.removeEventListener('click', handleClick, true);\n\
    \    },\n  };\n}\n\n// actions/lazyLoad.js\nexport function lazyLoad(node, src) {\n  const observer = new IntersectionObserver(\n\
    \    (entries) => {\n      if (entries[0].isIntersecting) {\n        node.src = src;\n        observer.unobserve(node);\n\
    \      }\n    },\n    { rootMargin: '200px' },\n  );\n\n  observer.observe(node);\n\n  return {\n    update(newSrc) {\
    \ src = newSrc; },\n    destroy() { observer.unobserve(node); },\n  };\n}\n\n<!-- Usage — clean, declarative -->\n<div\
    \ use:clickOutside={() => showDropdown = false}>\n  <Dropdown />\n</div>\n\n<img use:lazyLoad={imageUrl} alt=\"Product\"\
    \ />\n"
  example_bad: "<!-- Wrong: DOM manipulation in onMount — duplicated across components -->\n<script>\n  import { onMount,\
    \ onDestroy } from 'svelte';\n\n  let dropdownRef;\n\n  function handleClick(e) {\n    if (dropdownRef && !dropdownRef.contains(e.target))\
    \ {\n      showDropdown = false;\n    }\n  }\n\n  onMount(() => document.addEventListener('click', handleClick));\n  onDestroy(()\
    \ => document.removeEventListener('click', handleClick));\n  // Same 10 lines copied into every component that needs click-outside\n\
    </script>\n"
