layer: rules
domain: code_quality
knowledge:
- id: DOCS-001
  text: >
    Write Architecture Decision Records (ADRs) for every significant architectural decision
    using the Nygard format: Title, Status, Context, Decision, Consequences. An ADR is
    significant if reversing the decision costs >1 sprint of engineering work, or if it
    affects more than one team. Write ADRs BEFORE implementing, not as post-hoc documentation.
  why: >
    Without ADRs, teams repeatedly re-debate settled decisions. A new engineer joins and asks
    "why are we using PostgreSQL instead of MongoDB?" — without an ADR, the team spends 2 hours
    re-litigating the decision, often reaching a different conclusion because the original
    context (specific query patterns, team expertise, client requirements) isn't documented.
    Amazon's architecture review process requires ADRs for all significant decisions. Martin
    Fowler's team at ThoughtWorks documented that projects with ADRs reduced re-work from
    architecture churn by 40%. ADRs written after implementation are opinions, not decisions —
    they lack the context of alternatives considered and the constraints that existed at decision time.
  how_to_do_right: |
    1. Create ADRs in docs/adr/ with format: NNNN-title-in-kebab-case.md
    2. Use strict Nygard format — no extra sections unless team-agreed:
       # ADR-NNNN: [Short imperative title]
       Status: [Proposed | Accepted | Deprecated | Superseded by ADR-XXXX]
       Context: What is the problem? What constraints exist? What alternatives were considered?
       Decision: What was decided? One clear, unambiguous statement.
       Consequences: What becomes easier? What becomes harder? What is now required?
    3. Link related ADRs: "Superseded by ADR-0012" or "Builds on ADR-0003".
    4. Status "Proposed" = under review. Merge when team agrees → "Accepted".
    5. Never delete ADRs — supersede them. History of decisions is as valuable as current decisions.
    6. Review ADRs during onboarding: new engineers must read all Accepted ADRs for their service.
  severity: high
  technologies:
    lang: [python, javascript, typescript, go]
    framework: []
  domains:
    domain: [code_quality, documentation]
    concern: [architecture_decisions, team_communication]
  example_good: |
    # docs/adr/0003-use-postgresql-over-mongodb.md

    # ADR-0003: Use PostgreSQL as Primary Data Store

    Status: Accepted

    ## Context

    We need a primary data store for the Veritas claims system. The data model includes:
    - Claims with complex relationships (evidence, sources, verdicts)
    - Need for ACID transactions (claim + evidence must be atomic)
    - Audit trail requirements (all changes must be traceable)
    - Team has 5 engineers, 4 with SQL experience, 1 with MongoDB experience

    Alternatives considered:
    1. MongoDB: Flexible schema, good for document-like claims
    2. PostgreSQL: ACID, JSON support (JSONB), familiar to team
    3. CockroachDB: Distributed, but operational complexity high for team size

    ## Decision

    Use PostgreSQL 15+ with SQLAlchemy 2.0 as the primary data store.

    ## Consequences

    Positive:
    - ACID transactions allow atomic claim + evidence inserts
    - JSONB support handles variable claim metadata without schema migration
    - Team expertise: 4/5 engineers productive immediately
    - Rich ecosystem: pgvector, PostGIS if needed later

    Negative:
    - Horizontal write scaling requires Citus or application-level sharding
    - No native multi-document transactions across collections (not needed here)

    Required:
    - ADR-0004: Connection pooling strategy (PgBouncer vs application pools)
    - Regular VACUUM schedule for high-write tables
  example_bad: |
    # README.md — buried at bottom under "Technical choices"
    "We use PostgreSQL because it's reliable."
    # Why is this bad:
    # - No alternatives considered — was MongoDB evaluated? Why rejected?
    # - No constraints documented — what drove the decision?
    # - No consequences — what do we give up? What do we gain?
    # - Can't be superseded or evolved — just text to be edited in place
    # - New engineer reads it, still doesn't know WHY
  when_applies: >
    Any decision involving: database/datastore selection, API protocol choice, authentication
    mechanism, message queue choice, deployment strategy, major refactoring approach, or
    any cross-team architectural contract.
  sources:
    - "https://adr.github.io/"
    - "https://www.cognitect.com/blog/2011/11/15/documenting-architecture-decisions"
    - "https://aws.amazon.com/blogs/architecture/master-architecture-decision-records-adrs-best-practices-for-effective-decision-making/"

- id: DOCS-002
  text: >
    Write Google-style docstrings for all public functions, classes, and modules.
    Private functions (_prefixed) need docstrings only when the logic is non-obvious.
    Required sections: Args, Returns, Raises. Optional: Examples, Notes.
    Docstrings are contracts — if a docstring says "raises ValueError", that must
    be tested.
  why: >
    Google-style docstrings generate readable HTML documentation via Sphinx/Napoleon and
    are parsed by IDEs for inline documentation. NumPy-style is acceptable for numerical
    code (arrays, matrices) but requires more vertical space, creating noise in application
    code. Without docstrings on public APIs, downstream teams make wrong assumptions about
    types, raise behavior, and edge cases. A function that silently returns None on 404
    (instead of raising a documented exception) causes bugs in every caller. The docstring
    as contract means tests MUST cover every documented Raises clause — uncovered raises
    indicate either untested behavior or inaccurate documentation.
  how_to_do_right: |
    1. Every public function gets: one-line summary, Args, Returns, Raises.
    2. First line: imperative mood, 72-char limit, no "This function..." prefix.
    3. Args section: param name, type hint, description, default if any.
    4. Returns: type, description of what is returned under what condition.
    5. Raises: list every exception the function can raise, with trigger condition.
    6. Examples section: add when usage isn't obvious from the signature.
    7. Enforce with ruff (D rules) or pydocstyle in CI.
  severity: medium
  technologies:
    lang: [python]
    framework: []
  domains:
    domain: [code_quality, documentation]
    concern: [docstrings, api_contracts]
  example_good: |
    async def create_claim(
        session: AsyncSession,
        text: str,
        source_url: str,
        author_id: int,
    ) -> Claim:
        """Create a new claim and persist it to the database.

        Validates the claim text length and source URL format before
        inserting. The claim is created in PENDING status.

        Args:
            session: Active SQLAlchemy async session.
            text: Claim text, must be 10-2000 characters.
            source_url: URL where the claim was made. Must be HTTPS.
            author_id: ID of the user submitting the claim.

        Returns:
            Newly created Claim object with id, created_at, and status populated.

        Raises:
            ValueError: If text length is outside [10, 2000] or source_url
                is not a valid HTTPS URL.
            IntegrityError: If author_id does not reference an existing user.

        Examples:
            >>> claim = await create_claim(session, "Earth is round", "https://nasa.gov/...", 42)
            >>> assert claim.status == ClaimStatus.PENDING
        """
        if not 10 <= len(text) <= 2000:
            raise ValueError(f"Claim text must be 10-2000 chars, got {len(text)}")
        if not source_url.startswith("https://"):
            raise ValueError(f"source_url must be HTTPS, got: {source_url}")
        claim = Claim(text=text, source_url=source_url, author_id=author_id)
        session.add(claim)
        await session.flush()
        return claim
  example_bad: |
    async def create_claim(session, text, source_url, author_id):
        # Creates a claim
        # Returns the claim
        if len(text) < 10:
            raise ValueError("too short")
        claim = Claim(text=text, source_url=source_url, author_id=author_id)
        session.add(claim)
        await session.flush()
        return claim
    # Missing: type hints, full validation contract, what "too short" means
    # Missing: IntegrityError documentation — callers won't handle it
    # IDE shows no help when calling create_claim(...)
  when_applies: >
    All public Python functions, classes, and modules. "Public" means any code that
    another module, service, or developer may call. Private helpers need docstrings
    only when logic is non-obvious (complex algorithms, non-obvious side effects).
  sources:
    - "https://google.github.io/styleguide/pyguide.html#383-functions-and-methods"
    - "https://sphinxcontrib-napoleon.readthedocs.io/en/latest/example_google.html"

- id: DOCS-003
  text: >
    Generate API documentation from code using OpenAPI/Swagger auto-generation (FastAPI's
    built-in or apispec for Flask). Never write API docs manually — they go stale immediately.
    Every endpoint must have: summary, description, all request parameters documented,
    response schema with examples, and all error responses with codes and meanings.
  why: >
    Manually written API docs drift from implementation within weeks. A single endpoint
    rename or parameter type change creates inconsistency between docs and behavior.
    FastAPI generates accurate OpenAPI docs from Pydantic models and Python type hints —
    they can't drift because they're generated from the same types that enforce the
    behavior. Missing error documentation is a major integration pain point: clients
    implement for the happy path only, then encounter undocumented 422 (validation
    failure) or 409 (conflict) responses in production and have no idea how to handle them.
    Stripe's API docs are the gold standard: every error code is documented with example
    request, example response, and handling guidance.
  how_to_do_right: |
    1. In FastAPI: use Pydantic response models — they appear in OpenAPI schema automatically.
    2. Document all error responses explicitly:
       @app.post("/orders", responses={409: {"model": ConflictError}, 422: {"model": ValidationError}})
    3. Add response_model_exclude_unset=True to avoid showing optional fields as required.
    4. Use response_description parameter for non-obvious returns.
    5. Add request_body examples using Field(example=...) in Pydantic models.
    6. Publish docs at /docs (Swagger UI) and /redoc (ReDoc) — both enabled by default.
    7. Export OpenAPI schema in CI: python -c "import json; ..." — diff to catch changes.
  severity: medium
  technologies:
    lang: [python]
    framework: [fastapi, pydantic]
  domains:
    domain: [code_quality, documentation]
    concern: [api_documentation, openapi]
  example_good: |
    from fastapi import FastAPI, status
    from pydantic import BaseModel, Field

    class OrderRequest(BaseModel):
        product_id: int = Field(..., example=42, description="Product to order")
        quantity: int = Field(..., ge=1, le=100, example=3)

        class Config:
            schema_extra = {
                "example": {"product_id": 42, "quantity": 3}
            }

    class OrderResponse(BaseModel):
        order_id: str = Field(..., example="ord_abc123")
        status: str = Field(..., example="confirmed")
        total_cents: int = Field(..., example=2997)

    class ConflictError(BaseModel):
        detail: str = Field(..., example="Insufficient inventory for product 42")

    @app.post(
        "/api/orders",
        response_model=OrderResponse,
        status_code=status.HTTP_201_CREATED,
        summary="Place a new order",
        description="Creates an order for the specified product. "
                    "Inventory is reserved atomically. Returns 409 if insufficient stock.",
        responses={
            409: {
                "model": ConflictError,
                "description": "Insufficient inventory or product unavailable",
            },
            422: {
                "description": "Request validation failed — check quantity range [1-100]",
            },
        },
    )
    async def create_order(req: OrderRequest) -> OrderResponse:
        ...
  example_bad: |
    @app.post("/api/orders")
    async def create_order(req: dict):  # No type hints — nothing in OpenAPI docs
        """Create order."""  # No parameters documented
        # Returns something
        # May raise 409 (undocumented — clients crash when they hit this)
        pass
  when_applies: >
    All FastAPI/Flask/Django REST endpoints exposed to external clients or other
    teams. Internal-only APIs (called only by same-team code) need at minimum
    the happy path and error responses documented.
  sources:
    - "https://fastapi.tiangolo.com/tutorial/response-model/"
    - "https://spec.openapis.org/oas/v3.1.0"

- id: DOCS-004
  text: >
    Structure README files with these mandatory sections in order: What (one-paragraph
    description), Why (why this exists, problem it solves), Quick Start (working in <5
    commands), API Reference or Usage, Contributing, License. A README that only describes
    what to do without explaining why the project exists will not be adopted.
  why: >
    Projects fail to get adoption not because the code is bad but because the README doesn't
    answer the first question every engineer asks: "Why would I use this instead of X?"
    Simon Sinek's "Start With Why" framework applied to technical documentation doubles
    adoption. GitHub's internal study of open source projects found that projects with a
    clear "Why" section had 3x higher adoption than equivalent projects without it. Quick
    Start sections that work in 5 commands (no undocumented prerequisites) reduce the
    "time to first working example" from hours to minutes. Every minute of friction in
    setup is a potential user lost.
  how_to_do_right: |
    1. What: One paragraph, no jargon, explains what the project does to someone unfamiliar.
    2. Why: 2-3 sentences: what problem it solves and why existing solutions are insufficient.
    3. Quick Start: Must work on a clean machine with documented prerequisites:
       - List exact versions: "Python 3.11+" not "Python 3+"
       - Every prerequisite explicitly listed (Docker, redis, etc.)
       - Final command shows actual output so reader can verify it worked
    4. API Reference: auto-link to /docs or generated Sphinx docs.
    5. Contributing: how to run tests, code style requirements, PR process.
    6. Keep Quick Start under 10 commands — if more are needed, split into sections.
    7. Test Quick Start quarterly: have a new team member run it from scratch.
  severity: medium
  technologies:
    lang: [python, javascript, typescript, go]
    framework: []
  domains:
    domain: [code_quality, documentation]
    concern: [readme, onboarding]
  example_good: |
    # veritas-sdk

    ## What
    Python SDK for the Veritas claim verification API. Verifies factual claims
    against a knowledge base, returning a confidence score and supporting evidence.

    ## Why
    Existing fact-checking tools require manual review. Veritas provides
    automated claim scoring with source attribution, enabling high-throughput
    verification pipelines without human bottlenecks.

    ## Quick Start

    **Prerequisites:** Python 3.11+, pip, an API key from https://veritas.example.com

    ```bash
    pip install veritas-sdk
    export VERITAS_API_KEY="your-key-here"
    python -c "
    from veritas import Client
    result = Client().verify('The Earth is 4.5 billion years old')
    print(result.score, result.verdict)
    "
    # Expected output: 0.97 SUPPORTED
    ```

    ## API Reference
    Full documentation: https://veritas.example.com/docs/sdk

    ## Contributing
    Run tests: `pytest tests/ -v`
    Code style: `ruff check src/` (must pass before PR)
  example_bad: |
    # veritas-sdk

    A SDK for veritas.

    ## Installation
    pip install veritas-sdk

    ## Usage
    See docs.

    ## License
    MIT
    # This README answers: "what package name to install"
    # It does not answer: "what does it do?", "why should I use it?",
    # "does it work?", "how do I run it?"
  when_applies: >
    Every public repository, internal library, and service. A README is the contract
    between the code and its users — it must be accurate and complete before the first
    version is released.
  sources:
    - "https://docs.github.com/en/repositories/managing-your-repositorys-settings-and-features/customizing-your-repository/about-readmes"
    - "https://www.makeareadme.com/"

- id: DOCS-005
  text: >
    Maintain a CHANGELOG.md following Keep a Changelog format (keepachangelog.com).
    Every version has: Added, Changed, Deprecated, Removed, Fixed, Security sections.
    Use [Unreleased] section for work in progress. Generate entries from Conventional
    Commits automatically. Never write changelogs manually — they will be incomplete.
  why: >
    Package consumers need to understand what changed between versions to assess upgrade
    risk. A CHANGELOG that says "various improvements and bug fixes" forces consumers
    to read the entire git diff to assess upgrade risk. This kills adoption of newer
    versions — teams stay on old versions indefinitely to avoid risk, accumulating
    security debt. The Keep a Changelog format is the community standard: GitHub,
    npm, and PyPI all recommend it. Conventional Commits (feat:, fix:, breaking:)
    enable automatic CHANGELOG generation via tools like git-cliff or conventional-changelog,
    eliminating the manual maintenance burden.
  how_to_do_right: |
    1. Create CHANGELOG.md at repo root with [Unreleased] section at top.
    2. On every merged PR: add one line to the appropriate section under [Unreleased].
    3. On release: rename [Unreleased] to [X.Y.Z] — YYYY-MM-DD, add new [Unreleased].
    4. Use git-cliff or conventional-changelog to auto-generate from commit messages.
    5. Breaking changes: document in [Changed] with migration path.
    6. Security fixes: ALWAYS document in [Security] — users must know to upgrade.
    7. Link each version header to the GitHub comparison: [1.2.0]: https://github.com/.../compare/v1.1.0...v1.2.0
  severity: medium
  technologies:
    lang: [python, javascript, typescript, go]
    framework: []
  domains:
    domain: [code_quality, documentation]
    concern: [changelog, release_management]
  example_good: |
    # CHANGELOG.md

    All notable changes to this project will be documented in this file.
    The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
    and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

    ## [Unreleased]

    ### Added
    - Streaming response support for `/api/claims/batch` endpoint

    ## [2.1.0] — 2025-11-14

    ### Added
    - DataLoader for N+1-free evidence fetching (reduces DB queries by 80% for batch ops)
    - `Client.verify_batch()` method for processing up to 100 claims in one API call

    ### Changed
    - `Claim.confidence_score` now returns float in [0.0, 1.0] instead of [0, 100]
      **Migration:** divide existing stored values by 100.

    ### Fixed
    - Memory leak in websocket connection pool when subscriptions were abandoned
    - Incorrect p99 calculation in `/health/metrics` endpoint

    ### Security
    - Updated cryptography dependency to 41.0.5 (CVE-2023-49083 fix)

    [Unreleased]: https://github.com/example/veritas-sdk/compare/v2.1.0...HEAD
    [2.1.0]: https://github.com/example/veritas-sdk/compare/v2.0.0...v2.1.0
  example_bad: |
    # CHANGELOG

    ## 2.1.0
    - Bug fixes and improvements
    - Performance improvements
    - Security updates (no CVE listed — users don't know if they must upgrade)
    # Users cannot:
    # - Assess upgrade risk (what broke? what changed?)
    # - Identify breaking changes (no migration path)
    # - Know if security update applies to them (no CVE, no affected versions)
  when_applies: >
    Every library, SDK, and API service. Changelogs are mandatory for any software
    with external consumers. Even internal libraries benefit from changelogs when used
    by multiple teams.
  sources:
    - "https://keepachangelog.com/en/1.1.0/"
    - "https://www.conventionalcommits.org/en/v1.0.0/"

- id: DOCS-006
  text: >
    Build documentation as code: source docs in the repo, auto-generate on every push,
    publish to docs.yourdomain.com. Use MkDocs Material for application docs,
    Sphinx for Python library docs. Documentation that isn't in the repo doesn't
    exist — wiki pages, Confluence pages, and email threads are not documentation.
  why: >
    Documentation outside the repo decouples from code changes. When code is reviewed
    in a PR, documentation changes in Confluence are not part of the review —
    they get missed, go stale, or never happen. Docs-as-code enables: documentation
    PRs to be reviewed with code changes, automated link checking and code example
    validation, versioned docs per release, and deployment to a searchable static site.
    Spotify migrated their internal documentation from Confluence to docs-as-code and
    reported that documentation staleness dropped by 70% because engineers updated
    docs in the same PR as code changes.
  how_to_do_right: |
    1. Create docs/ directory with mkdocs.yml or docs/conf.py for Sphinx.
    2. MkDocs setup: pip install mkdocs-material mkdocs-autorefs
       mkdocs.yml: theme: material, plugins: [search, autorefs, mkdocstrings]
    3. In CI (GitHub Actions):
       - on: [push, pull_request]
       - run: mkdocs build --strict  # --strict fails on broken links
       - on release: mkdocs gh-deploy
    4. Add link checker to CI: linkcheckmd or mkdocs --strict catches broken internal links.
    5. Add code example tests: use doctest or pytest-codeblocks to run code in docs.
    6. Structure: Getting Started, How-To Guides, API Reference, Explanation (why).
  severity: medium
  technologies:
    lang: [python]
    framework: [mkdocs, sphinx]
  domains:
    domain: [code_quality, documentation]
    concern: [docs_as_code, ci_cd]
  example_good: |
    # mkdocs.yml
    site_name: Veritas SDK
    site_url: https://veritas-sdk.example.com

    theme:
      name: material
      features:
        - navigation.tabs
        - search.highlight

    plugins:
      - search
      - mkdocstrings:
          handlers:
            python:
              options:
                docstring_style: google
                show_source: true

    nav:
      - Getting Started: index.md
      - How-To Guides:
          - Verify Claims: guides/verify-claims.md
          - Batch Processing: guides/batch.md
      - API Reference: api/
      - Changelog: changelog.md

    # .github/workflows/docs.yml
    # name: Deploy Docs
    # on:
    #   push:
    #     branches: [main]
    # jobs:
    #   deploy:
    #     steps:
    #       - uses: actions/checkout@v4
    #       - run: pip install mkdocs-material mkdocstrings[python]
    #       - run: mkdocs build --strict  # Fails on broken links
    #       - run: mkdocs gh-deploy --force
  example_bad: |
    # Documentation approach: Confluence wiki
    # Updated manually after code is merged
    # Not linked to code versions
    # No CI validation — broken links accumulate
    # Requires Confluence access (not available to open source contributors)
    # Result after 6 months:
    # - 40% of links broken (service renamed, moved)
    # - API docs describe v1.3 behavior, code is at v2.1
    # - Getting Started guide references Python 3.8 (EOL)
  when_applies: >
    All public-facing libraries and services. Internal services benefit from docs-as-code
    for runbooks and architecture docs. Any documentation that must remain accurate
    over time should be in the repository.
  sources:
    - "https://www.mkdocs.org/"
    - "https://www.writethedocs.org/guide/docs-as-code/"

- id: DOCS-007
  text: >
    Write runbooks for every alert and on-call scenario. Runbook structure: trigger
    (what alert fires), symptoms (what the user sees), diagnosis (step-by-step
    commands to identify root cause), resolution (step-by-step fix), escalation
    (when and who to escalate to). A runbook that says "investigate the logs" without
    specifying which logs, what to look for, and what commands to run is useless at 3am.
  why: >
    At 3am with a P0 alert, a junior engineer on their first on-call rotation is not
    going to figure out which Redis cluster is the one to restart, what namespace the
    Kubernetes pods are in, or which Grafana dashboard shows the relevant metrics.
    This is not a failure of the engineer — it's a failure of the documentation.
    Google's SRE Book devotes an entire chapter to runbooks as a core reliability
    practice. PagerDuty's incident analysis found that mean time to resolution (MTTR)
    decreases by 65% when runbooks are available compared to tribal knowledge.
    Runbooks must be kept accurate: link them from alerts, review quarterly, test them
    in GameDays.
  how_to_do_right: |
    1. Create one runbook per alert: docs/runbooks/alert-name.md
    2. Mandatory sections in order:
       - Trigger: exact alert name and condition ("Payment service error rate > 1% for 5min")
       - User Impact: "Users cannot complete checkout"
       - Diagnosis commands: copy-pasteable, with expected output and what to look for
       - Resolution steps: numbered, specific ("kubectl rollout restart deployment/payment -n production")
       - Post-resolution validation: how to confirm the fix worked
       - Escalation: "If unresolved after 30min, page: payment-team-lead"
    3. Link runbook URL in alert annotation: runbook_url: "https://..."
    4. Test runbooks: every GameDay must use runbooks — update if anything is unclear.
    5. Auto-detect staleness: link checker for external URLs, quarterly review schedule.
  severity: high
  technologies:
    lang: [python, go]
    framework: []
  domains:
    domain: [code_quality, reliability]
    concern: [runbooks, incident_response]
  example_good: |
    # docs/runbooks/payment-service-high-error-rate.md

    # Runbook: Payment Service High Error Rate

    ## Trigger
    Alert: `PaymentErrorRateHigh`
    Condition: `error_rate{service="payment"} > 0.01` for 5 minutes
    Severity: P1

    ## User Impact
    Users cannot complete checkout. Orders are not being created. Revenue impact: ~$50k/min.

    ## Diagnosis

    **Step 1: Check service health**
    ```bash
    kubectl get pods -n production -l app=payment -o wide
    # Expected: All pods Running. If CrashLoopBackOff → see Resolution: Pod Crashes
    ```

    **Step 2: Check recent errors**
    ```bash
    kubectl logs -n production -l app=payment --since=10m | grep ERROR | head -50
    # Look for: "database connection refused", "Redis timeout", "upstream 503"
    ```

    **Step 3: Check database connectivity**
    ```bash
    kubectl exec -n production deploy/payment -- nc -zv postgres-primary.internal 5432
    # Expected: succeeded. If failed → escalate to DBA on-call immediately
    ```

    **Step 4: Check upstream payment provider status**
    Open: https://status.stripe.com
    If Stripe is down: errors are expected, no action needed — alert will self-resolve.

    ## Resolution

    **If Pod Crashes:**
    ```bash
    kubectl describe pod -n production $(kubectl get pods -n production -l app=payment \
      -o jsonpath='{.items[0].metadata.name}')
    # OOMKilled → increase memory limit in deployment.yaml, redeploy
    kubectl set resources deployment/payment -n production --limits=memory=2Gi
    ```

    **If Database Connection Refused:**
    → Escalate immediately to DBA on-call: @dba-oncall on Slack

    ## Escalation
    - After 15 min unresolved: page payment-team-lead (ID: USR-042 in PagerDuty)
    - After 30 min unresolved: page VP Engineering
  example_bad: |
    # Runbook: Payment Errors

    1. Check the logs
    2. Restart the service if needed
    3. Escalate to the team

    # This is not a runbook — it's a checklist that provides no information.
    # "Check the logs" — which logs? What to look for? What command?
    # "Restart the service if needed" — how to restart? When is restart appropriate?
    # "Escalate to the team" — who? How? What's their contact?
  when_applies: >
    Every PagerDuty/OpsGenie alert must have a linked runbook. Services without
    runbooks are not production-ready. Runbooks must be reviewed and tested
    during quarterly GameDays.
  sources:
    - "https://sre.google/sre-book/on-call/"
    - "https://response.pagerduty.com/oncall/alerting_principles/"

- id: DOCS-008
  text: >
    Use C4 model diagrams (Context, Containers, Components, Code) for architecture
    documentation. Create diagrams as code using Mermaid or PlantUML (not PowerPoint
    or draw.io) so they can be reviewed in PRs, version-controlled, and auto-rendered
    in GitHub/GitLab.
  why: >
    Diagrams in PowerPoint or draw.io are not version-controlled, not diff-able, and
    get out of sync with code. The C4 model provides four consistent levels of detail
    that answer different questions: Context (what problem does this solve?), Containers
    (what runs where?), Components (what's inside each container?), Code (class/module
    level). Simon Brown's research at InfoQ shows that teams using C4 model significantly
    reduce architecture miscommunication. Mermaid diagrams render natively in GitHub
    Markdown, are diff-able in PRs, and can be validated by linters — a diagram that
    shows a removed service will be noticed in code review.
  how_to_do_right: |
    1. Create docs/architecture/ with one diagram per C4 level.
    2. Use Mermaid for GitHub rendering (supported in .md files directly).
    3. C4 Level 1 (Context): show system + external users/systems, no internals.
    4. C4 Level 2 (Container): show deployable units (API, DB, queue) and protocols.
    5. C4 Level 3 (Component): show modules inside one container.
    6. Update diagrams in the same PR as architectural changes — reviewers can see the change.
    7. Link diagrams from README and ADRs.
  severity: medium
  technologies:
    lang: [python, javascript, typescript, go]
    framework: [mermaid, plantuml]
  domains:
    domain: [code_quality, documentation]
    concern: [architecture_diagrams, c4_model]
  example_good: |
    <!-- docs/architecture/c4-context.md -->
    # System Context Diagram (C4 Level 1)

    ```mermaid
    C4Context
        title System Context — Veritas Claim Verification

        Person(user, "Analyst", "Submits claims for verification")
        System(veritas, "Veritas", "Automated claim verification system")
        System_Ext(newsapi, "News API", "Provides news articles for evidence")
        System_Ext(wikidata, "Wikidata", "Structured knowledge base")
        Rel(user, veritas, "Submits claims via", "HTTPS/REST")
        Rel(veritas, newsapi, "Fetches evidence from", "HTTPS")
        Rel(veritas, wikidata, "Queries facts from", "SPARQL/HTTPS")
    ```

    <!-- docs/architecture/c4-container.md -->
    # Container Diagram (C4 Level 2)

    ```mermaid
    C4Container
        title Container Diagram — Veritas System

        Person(user, "Analyst")
        System_Boundary(veritas, "Veritas") {
            Container(api, "FastAPI", "Python 3.11", "REST API, OpenAPI docs")
            ContainerDb(pg, "PostgreSQL 15", "Database", "Claims, evidence, verdicts")
            Container(worker, "Celery Worker", "Python", "Async verification jobs")
            ContainerDb(redis, "Redis", "Cache/Queue", "Job queue, result cache")
        }
        Rel(user, api, "HTTPS/443")
        Rel(api, pg, "SQLAlchemy/5432")
        Rel(api, redis, "Enqueue job/6379")
        Rel(worker, redis, "Dequeue/6379")
        Rel(worker, pg, "Write results/5432")
    ```
  example_bad: |
    # Architecture documented in:
    # - PowerPoint file: docs/architecture-v3-FINAL-v2.pptx (unversioned)
    # - Confluence page last updated 14 months ago
    # - Whiteboard photo in Slack channel (not searchable)

    # Problems:
    # - Can't diff — no way to see what changed between versions
    # - Not linked from code — engineers don't know it exists
    # - Out of date — "payment-service-v1" was renamed 6 months ago
    # - Can't be validated — dead links not detected
  when_applies: >
    Any service with more than one deployable component. C4 diagrams are mandatory
    for services used by other teams, and strongly recommended for any production service.
    Update diagrams whenever a container or major component is added, removed, or changed.
  sources:
    - "https://c4model.com/"
    - "https://mermaid.js.org/syntax/c4.html"

- id: DOCS-009
  text: >
    Create and maintain onboarding documentation structured as a Day-1 guide: prerequisites
    setup (exact commands, no assumptions), local development environment, running tests,
    where to ask for help, architecture overview, and the 5 most important things to know.
    Test the Day-1 guide with each new hire — a guide that hasn't been validated by an
    actual new hire is fiction.
  why: >
    The cost of poor onboarding is measured in weeks of reduced productivity per engineer.
    Stripe's engineering blog documented that every extra hour spent by a new engineer
    on environment setup reduces their first-month output by 0.5%. For a team hiring 10
    engineers per year, poor onboarding with 3 days of setup friction represents 30
    engineer-days of lost productivity annually. More importantly, a confusing first
    experience signals to new engineers that the team doesn't value their time, increasing
    early attrition. The "5 most important things to know" section prevents the most
    common first-week mistakes without overwhelming new hires with everything at once.
  how_to_do_right: |
    1. Create docs/onboarding/day-1.md with exact commands, not "install Python 3.11".
    2. Exact prerequisites with versions:
       - Python 3.11.8 (use pyenv: pyenv install 3.11.8 && pyenv local 3.11.8)
       - Docker Desktop 4.20+ (link to download)
       - Specific IDE extensions recommended
    3. Run the guide yourself after writing it on a clean machine.
    4. Every new hire must be asked: "What was unclear? What was wrong?" — update immediately.
    5. "5 most important things" section: gotchas, common mistakes, most-asked questions.
    6. Link to: ADR directory, architecture diagrams, team channels, escalation contacts.
    7. Keep a "last verified by" date at the top — stale guides are worse than no guide.
  severity: medium
  technologies:
    lang: [python, javascript, typescript, go]
    framework: []
  domains:
    domain: [code_quality, documentation]
    concern: [onboarding, developer_experience]
  example_good: |
    # docs/onboarding/day-1.md
    # Last verified: 2025-11-01 by @alice (new hire)

    # Day 1 Guide — Veritas Engineering

    ## Prerequisites (do these before anything else)

    1. **Python 3.11.8** via pyenv:
       ```bash
       brew install pyenv
       pyenv install 3.11.8
       echo 'export PYENV_ROOT="$HOME/.pyenv"' >> ~/.zshrc
       echo 'eval "$(pyenv init -)"' >> ~/.zshrc
       source ~/.zshrc
       pyenv global 3.11.8
       python --version  # Must show: Python 3.11.8
       ```

    2. **Docker Desktop 4.20+**: https://www.docker.com/products/docker-desktop/
       Verify: `docker --version` → Docker version 24.x+

    ## Environment Setup (10 minutes)
    ```bash
    git clone https://github.com/example/veritas.git && cd veritas
    cp .env.example .env  # Ask @bob for the TEST_API_KEY value
    docker compose up -d  # Starts postgres, redis (takes ~60s first time)
    pip install -e ".[dev]"
    pytest tests/unit/ -q  # Must show: 147 passed in <30s
    ```

    ## 5 Most Important Things to Know
    1. **NEVER commit .env** — it's gitignored but double-check before pushing
    2. **Use `lg-start` not `start`** — `start` is legacy, runs without guardrails
    3. **ADRs live in docs/adr/** — read them before asking "why do we use X?"
    4. **Test names matter** — tests must describe what they test: `test_create_claim_raises_on_invalid_url`
    5. **p99 > 500ms triggers a PagerDuty alert** — run load tests before merging DB query changes
  example_bad: |
    # ONBOARDING.md (last updated 18 months ago)
    1. Install Python and Docker
    2. Clone the repo
    3. Set up your environment (ask the team for details)
    4. Run the tests
    # "Ask the team" is not documentation
    # "Install Python" — which version? With which tool?
    # Step 3 requires tribal knowledge that is the entire point of the guide
  when_applies: >
    Every team with more than 2 engineers, and any project expecting new contributors.
    Must be updated within one week of any infrastructure or tooling change that
    affects the setup process.
  sources:
    - "https://google.github.io/eng-practices/review/"
    - "https://stripe.com/blog/engineering-practices"

- id: DOCS-010
  text: >
    Detect documentation staleness automatically in CI: run a link checker (lychee or
    linkcheckmd) on every PR, validate code examples with pytest-codeblocks or doctest,
    and add a "last reviewed" date field to all runbooks and architectural docs. Stale
    documentation with broken code examples is worse than no documentation — it misleads.
  why: >
    Documentation rots silently. A code example that worked in Python 3.9 silently fails
    in Python 3.11 due to deprecation changes. Internal links break when services are
    renamed. External links die when vendors change their doc URLs. The average enterprise
    documentation page has a half-life of 18 months — 50% of links are broken after 18
    months. Unlike code, documentation has no unit tests to catch regressions. CI-based
    staleness detection converts documentation from a manual process to an automated one:
    broken link → failed CI → PR blocked → fix before merge. pytest-codeblocks runs
    code examples in documentation as actual tests — if the example breaks, the test fails.
  how_to_do_right: |
    1. Add lychee to CI:
       - name: Check links
         uses: lycheeverse/lychee-action@v1
         with:
           args: --verbose --no-progress './docs/**/*.md' './README.md'
    2. Run pytest-codeblocks for code examples:
       pytest --codeblocks docs/  # Runs all ```python blocks as tests
    3. Add "last_reviewed" frontmatter to runbooks and ADRs:
       ---
       last_reviewed: 2025-11-01
       reviewed_by: alice
       ---
    4. CI check: warn if last_reviewed > 180 days ago.
    5. Mark external links with rel="nofollow" and archive important ones in web.archive.org.
  severity: medium
  technologies:
    lang: [python]
    framework: [mkdocs, sphinx, pytest]
  domains:
    domain: [code_quality, documentation]
    concern: [staleness_detection, ci_cd]
  example_good: |
    # .github/workflows/docs-check.yml
    name: Documentation Check

    on: [push, pull_request]

    jobs:
      link-check:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4
          - name: Check links
            uses: lycheeverse/lychee-action@v1
            with:
              args: >
                --verbose
                --no-progress
                --exclude 'localhost'
                --exclude 'example.com'
                './docs/**/*.md'
                './README.md'
                './CHANGELOG.md'
            env:
              GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      code-examples:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4
          - uses: actions/setup-python@v5
            with: {python-version: '3.11'}
          - run: pip install pytest pytest-codeblocks ".[dev]"
          - run: pytest --codeblocks docs/ -v  # Runs all ```python``` blocks in docs

      staleness-check:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4
          - name: Check last_reviewed dates
            run: |
              python scripts/check_doc_staleness.py --threshold-days 180 docs/runbooks/ docs/adr/
              # Exits non-zero if any doc has last_reviewed > 180 days ago
  example_bad: |
    # No CI checks on documentation
    # Code example in docs/guides/authentication.md:
    # ```python
    # from veritas.auth import APIKey  # Module was deleted 3 months ago
    # key = APIKey.from_env()  # ImportError
    # ```
    # Link in README:
    # [API Docs](https://old-docs.example.com/v1/)  # 404 since migration
    # Result: new engineers spend 2h debugging before asking for help
    # "Why didn't the docs say that?"
  when_applies: >
    All projects with documentation. Link checking is low-cost and high-value —
    add it to CI from the first commit. Code example testing is mandatory for any
    project with a public API or SDK.
  sources:
    - "https://github.com/lycheeverse/lychee"
    - "https://github.com/nschloe/pytest-codeblocks"
