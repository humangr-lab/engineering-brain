layer: rules
technology: htmx
domain: frontend
knowledge:
- id: CR-HTX-001
  text: Use hx-get, hx-post, hx-put, hx-delete on any HTML element to make HTTP requests. Return rendered HTML fragments from
    the server, not JSON.
  why: htmx extends HTML's capability to make HTTP requests from any element, not just links and forms. The server returns
    HTML fragments that htmx swaps into the DOM. This eliminates the need for a JavaScript framework, JSON serialization/deserialization,
    and client-side templating. The server is the single source of truth for rendering — no state synchronization bugs.
  how_to_do_right: '1. Use hx-get/post/put/delete attributes on any element that triggers a server call.

    2. Server endpoints return rendered HTML fragments, not JSON.

    3. Use hx-target to specify which element receives the HTML response.

    4. Use hx-swap to control how the HTML is inserted (innerHTML, outerHTML, beforeend, etc.).

    5. Return only the changed fragment — not the entire page.

    '
  severity: critical
  technologies:
    lang: [html]
    library: [htmx]
  domains:
    domain: [architecture]
    concern: [frontend, backend]
  example_good: "<!-- Client: Button that loads search results -->\n<div id=\"search-results\">\n  <input type=\"search\"\n\
    \         name=\"q\"\n         hx-get=\"/search\"\n         hx-target=\"#search-results\"\n         hx-trigger=\"input\
    \ changed delay:500ms\"\n         hx-indicator=\"#spinner\"\n         placeholder=\"Search products...\">\n  <span id=\"\
    spinner\" class=\"htmx-indicator\">Loading...</span>\n</div>\n\n<!-- Delete button — removes the row -->\n<tr id=\"todo-42\"\
    >\n  <td>Buy groceries</td>\n  <td>\n    <button hx-delete=\"/todos/42\"\n            hx-target=\"#todo-42\"\n       \
    \     hx-swap=\"outerHTML\"\n            hx-confirm=\"Are you sure?\">\n      Delete\n    </button>\n  </td>\n</tr>\n\n\
    # Server (Python/Flask example): Return HTML fragment\n@app.get(\"/search\")\ndef search():\n    q = request.args.get(\"\
    q\", \"\")\n    products = Product.query.filter(Product.name.ilike(f\"%{q}%\")).limit(20)\n    return render_template(\"\
    partials/product_list.html\", products=products)\n\n# partials/product_list.html — just the fragment, no layout\n{% for\
    \ product in products %}\n<div class=\"product-card\">\n  <h3>{{ product.name }}</h3>\n  <p>${{ product.price }}</p>\n\
    </div>\n{% endfor %}\n"
  example_bad: "<!-- Wrong: Returning JSON and processing client-side -->\n<button onclick=\"\n  fetch('/api/search?q=' +\
    \ document.getElementById('q').value)\n    .then(r => r.json())\n    .then(data => {\n      // Now you're writing a framework\n\
    \      document.getElementById('results').innerHTML =\n        data.map(p => `<div>${p.name}</div>`).join('');\n    })\n\
    \">Search</button>\n<!-- This is what htmx eliminates — no JS needed, server renders HTML -->\n"
  when_applies: Any project using htmx or HTML document structure
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using htmx or HTML
  sources: ["https://htmx.org/docs/#ajax"]
- id: CR-HTX-002
  text: Use hx-target to specify exactly where the response HTML should be placed. Default is the triggering element itself
    — always be explicit for clarity.
  why: Without hx-target, the response replaces the innerHTML of the element that made the request. This is rarely what you
    want — clicking a button should update a results container, not replace the button itself. Implicit targeting causes confusing
    behavior when elements disappear after requests. Explicit targeting makes the data flow visible in the HTML.
  how_to_do_right: '1. Always specify hx-target with a CSS selector for the container to update.

    2. Use #id selectors for precise targeting.

    3. Use closest, find, next, previous for relative targeting.

    4. Use hx-target="this" explicitly when you want to replace the triggering element.

    5. Use hx-select to extract a specific part of the response.

    '
  severity: high
  technologies:
    lang: [html]
    library: [htmx]
  domains:
    domain: [architecture]
    concern: [frontend]
  example_good: "<!-- Explicit target: results go into the list container -->\n<form hx-post=\"/todos\"\n      hx-target=\"\
    #todo-list\"\n      hx-swap=\"beforeend\"\n      hx-on::after-request=\"this.reset()\">\n  <input name=\"text\" placeholder=\"\
    New todo\" required>\n  <button type=\"submit\">Add</button>\n</form>\n<ul id=\"todo-list\">\n  <!-- New todos are appended\
    \ here -->\n</ul>\n\n<!-- Relative targeting with closest -->\n<div class=\"notification\" id=\"notif-1\">\n  <p>You have\
    \ a new message</p>\n  <button hx-delete=\"/notifications/1\"\n          hx-target=\"closest .notification\"\n       \
    \   hx-swap=\"outerHTML\">\n    Dismiss\n  </button>\n</div>\n\n<!-- hx-select: extract specific part of full page response\
    \ -->\n<button hx-get=\"/dashboard\"\n        hx-target=\"#stats-panel\"\n        hx-select=\"#stats-panel\">\n  Refresh\
    \ Stats\n</button>\n<!-- Server returns full /dashboard page, htmx extracts only #stats-panel -->\n"
  example_bad: "<!-- Wrong: No hx-target — button replaces itself with the response -->\n<button hx-post=\"/todos\"\n    \
    \    hx-swap=\"innerHTML\">\n  Add Todo\n</button>\n<!-- After clicking: the button disappears, replaced by the new todo\
    \ HTML -->\n<!-- User can't add another todo because the button is gone -->\n"
  when_applies: Projects using htmx or HTML document structure
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using htmx or HTML
  sources: ["https://htmx.org/docs/#targets"]
- id: CR-HTX-003
  text: 'Use hx-swap to control HOW response HTML is inserted: innerHTML (default), outerHTML, beforeend, afterbegin, beforebegin,
    afterend, delete, none.'
  why: Default innerHTML replaces the children of the target — wrong for appending to lists or replacing an entire element.
    Using outerHTML when you meant innerHTML destroys the target container. Using innerHTML when you meant beforeend replaces
    the list instead of adding to it. The swap strategy determines the DOM mutation — choosing wrong creates jarring UI updates.
  how_to_do_right: '1. innerHTML (default): Replace children of target — for updating a container''s content.

    2. outerHTML: Replace the target element itself — for replacing a row or card.

    3. beforeend: Append inside target — for adding items to a list.

    4. afterbegin: Prepend inside target — for newest-first feeds.

    5. delete: Remove the target — for deletion confirmations.

    6. none: Don''t swap — for fire-and-forget requests with side effects.

    '
  severity: high
  technologies:
    lang: [html]
    library: [htmx]
  domains:
    domain: [architecture]
    concern: [frontend]
  example_good: "<!-- beforeend: Append new items to existing list -->\n<form hx-post=\"/comments\"\n      hx-target=\"#comment-list\"\
    \n      hx-swap=\"beforeend settle:300ms\"\n      hx-on::after-request=\"this.reset()\">\n  <textarea name=\"body\"></textarea>\n\
    \  <button type=\"submit\">Post Comment</button>\n</form>\n<div id=\"comment-list\">\n  <!-- Existing comments stay, new\
    \ ones appended -->\n</div>\n\n<!-- outerHTML: Replace entire row with updated version -->\n<tr id=\"order-42\" hx-get=\"\
    /orders/42\"\n    hx-trigger=\"every 5s\"\n    hx-swap=\"outerHTML\">\n  <td>Order #42</td>\n  <td>Processing</td>\n</tr>\n\
    <!-- Server returns the full <tr> with updated status -->\n\n<!-- delete: Remove element after successful deletion -->\n\
    <li id=\"item-7\">\n  Item 7\n  <button hx-delete=\"/items/7\"\n          hx-target=\"closest li\"\n          hx-swap=\"\
    outerHTML swap:500ms\"\n          hx-confirm=\"Delete this item?\">\n    Remove\n  </button>\n</li>\n\n<!-- none: Fire-and-forget\
    \ (e.g., analytics, mark as read) -->\n<div hx-post=\"/notifications/mark-read\"\n     hx-trigger=\"intersect once\"\n\
    \     hx-swap=\"none\">\n  Notification content\n</div>\n"
  example_bad: "<!-- Wrong: innerHTML replaces entire list with single new item -->\n<form hx-post=\"/comments\"\n      hx-target=\"\
    #comment-list\"\n      hx-swap=\"innerHTML\">\n  <!-- Submitting replaces ALL existing comments with just the new one\
    \ -->\n</form>\n"
  when_applies: Projects using htmx or HTML document structure
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using htmx or HTML
  sources: ["https://htmx.org/docs/#swapping"]
- id: CR-HTX-004
  text: Use hx-trigger to control WHEN requests fire. Leverage modifiers like delay, changed, throttle, and event filters
    for precise control.
  why: 'Default hx-trigger depends on element type: click for buttons/links, submit for forms, change for inputs. But many
    patterns need custom triggers: debounced search (delay), infinite scroll (intersect), polling (every), keyboard shortcuts
    (keyup with filter). Without proper triggers, you either fire too many requests (overwhelming the server) or miss user
    intentions.'
  how_to_do_right: '1. Use delay: for debouncing (search input: delay:500ms).

    2. Use changed for only firing when value actually changes.

    3. Use throttle: for limiting request rate (scroll events).

    4. Use every:Ns for polling (live dashboards).

    5. Use intersect for lazy loading and infinite scroll.

    6. Combine modifiers: hx-trigger="keyup changed delay:500ms".

    '
  severity: high
  technologies:
    lang: [html]
    library: [htmx]
  domains:
    domain: [architecture, performance]
    concern: [frontend]
  example_good: "<!-- Active search: debounced, only on change -->\n<input type=\"search\"\n       name=\"q\"\n       hx-get=\"\
    /search\"\n       hx-target=\"#results\"\n       hx-trigger=\"input changed delay:500ms, search\"\n       placeholder=\"\
    Search...\">\n<!-- Fires 500ms after user stops typing, only if value changed -->\n<!-- Also fires on 'search' event (when\
    \ user clears the field) -->\n\n<!-- Infinite scroll: load more when sentinel becomes visible -->\n<div id=\"feed\">\n\
    \  <!-- Existing items -->\n</div>\n<div hx-get=\"/feed?page=2\"\n     hx-trigger=\"intersect once threshold:0.5\"\n \
    \    hx-target=\"#feed\"\n     hx-swap=\"beforeend\"\n     hx-indicator=\"#loading\">\n  <span id=\"loading\" class=\"\
    htmx-indicator\">Loading more...</span>\n</div>\n<!-- Loads next page when element is 50% visible, only once -->\n\n<!--\
    \ Live dashboard: poll every 5 seconds, stop when element removed -->\n<div id=\"live-stats\"\n     hx-get=\"/stats\"\n\
    \     hx-trigger=\"every 5s\"\n     hx-swap=\"innerHTML\">\n  <!-- Stats refresh every 5 seconds -->\n</div>\n\n<!-- Keyboard\
    \ shortcut: Ctrl+S to save -->\n<form hx-post=\"/save\"\n      hx-trigger=\"submit, keydown[ctrlKey&&key=='s'] from:body\"\
    >\n  <textarea name=\"content\"></textarea>\n  <button type=\"submit\">Save</button>\n</form>\n"
  example_bad: "<!-- Wrong: Search fires on every keystroke — 10 requests per second -->\n<input type=\"search\"\n       hx-get=\"\
    /search\"\n       hx-target=\"#results\"\n       hx-trigger=\"keyup\">\n<!-- Typing \"hello\" fires 5 requests: h, he,\
    \ hel, hell, hello -->\n<!-- Server overwhelmed, results flash rapidly, wasted bandwidth -->\n"
  when_applies: Projects using htmx or HTML document structure
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using htmx or HTML
  sources: ["https://htmx.org/docs/#triggers"]
- id: CR-HTX-005
  text: Return HTML fragments from server endpoints, not full pages. Use template partials/includes to keep server rendering
    DRY.
  why: Returning the entire page HTML for every htmx request wastes bandwidth and requires hx-select to extract the relevant
    fragment — fragile and slow. Returning just the changed fragment is faster, uses less bandwidth, and makes the server-side
    code clearer. Template partials keep the fragment rendering DRY between full page loads and htmx requests.
  how_to_do_right: '1. Create partial templates for every htmx-targetable fragment.

    2. Full page renders include the partial: {% include ''partials/todo_list.html'' %}.

    3. htmx endpoints render only the partial.

    4. Use the HX-Request header to detect htmx requests and return fragments.

    5. Keep fragments self-contained — they should work without knowing the surrounding page.

    '
  severity: high
  technologies:
    lang: [html, python, ruby, go]
    library: [htmx]
  domains:
    domain: [architecture]
    concern: [frontend, backend]
  example_good: "# Server: Detect htmx request and return appropriate response\n\n# Python/Flask\n@app.get(\"/todos\")\ndef\
    \ todo_list():\n    todos = Todo.query.all()\n    if request.headers.get(\"HX-Request\"):\n        # htmx request: return\
    \ only the list fragment\n        return render_template(\"partials/todo_list.html\", todos=todos)\n    else:\n      \
    \  # Full page request: return complete page with layout\n        return render_template(\"pages/todos.html\", todos=todos)\n\
    \n# partials/todo_list.html — reusable fragment\n{% for todo in todos %}\n<li id=\"todo-{{ todo.id }}\" class=\"{{ 'done'\
    \ if todo.done }}\">\n  <input type=\"checkbox\"\n         hx-patch=\"/todos/{{ todo.id }}/toggle\"\n         hx-target=\"\
    #todo-{{ todo.id }}\"\n         hx-swap=\"outerHTML\"\n         {{ 'checked' if todo.done }}>\n  {{ todo.text }}\n</li>\n\
    {% endfor %}\n\n# pages/todos.html — includes the same partial\n{% extends \"layout.html\" %}\n{% block content %}\n<h1>Todos</h1>\n\
    <ul id=\"todo-list\">\n  {% include \"partials/todo_list.html\" %}\n</ul>\n{% endblock %}\n"
  example_bad: "# Wrong: Returning full page for htmx request\n@app.get(\"/todos\")\ndef todo_list():\n    todos = Todo.query.all()\n\
    \    return render_template(\"pages/todos.html\", todos=todos)\n    # Returns 50KB full page HTML for a 2KB list update\n\
    \    # htmx must use hx-select=\"#todo-list\" to extract fragment — fragile\n"
  when_applies: Projects using htmx, HTML document structure, Python codebases, or Ruby/Rails projects
  when_not_applies: server-rendered pages, APIs, CLI tools
  sources: ["https://htmx.org/essays/hypermedia-apis-vs-data-apis/", "https://htmx.org/docs/#requests"]
- id: CR-HTX-006
  text: Use hx-swap-oob (out-of-band swaps) to update multiple parts of the page from a single response. Mark elements with
    hx-swap-oob='true' or hx-swap-oob='swap-strategy'.
  why: 'A single action often needs to update multiple UI elements: adding a todo updates the list AND the counter AND the
    empty-state message. Without OOB swaps, you need separate htmx requests for each update or complex JavaScript. OOB swaps
    let the server return one response that updates multiple parts of the page simultaneously.'
  how_to_do_right: '1. Include elements with hx-swap-oob="true" in the response — they update matching IDs anywhere on the
    page.

    2. The main response goes to hx-target as normal.

    3. OOB elements are identified by id and swapped by outerHTML by default.

    4. Use hx-swap-oob="innerHTML" to replace only the content of the matching element.

    5. Keep OOB swaps to 2-3 elements — more indicates you need a full page refresh.

    '
  severity: medium
  technologies:
    lang: [html]
    library: [htmx]
  domains:
    domain: [architecture]
    concern: [frontend]
  example_good: "<!-- Client: Form adds todo to list -->\n<span id=\"todo-count\">3 items</span>\n<form hx-post=\"/todos\"\
    \n      hx-target=\"#todo-list\"\n      hx-swap=\"beforeend\">\n  <input name=\"text\" required>\n  <button type=\"submit\"\
    >Add</button>\n</form>\n<ul id=\"todo-list\">\n  <!-- Existing todos -->\n</ul>\n\n# Server: Response updates list AND\
    \ counter simultaneously\n@app.post(\"/todos\")\ndef create_todo():\n    todo = Todo.create(text=request.form[\"text\"\
    ])\n    count = Todo.query.count()\n    return f\"\"\"\n      <li id=\"todo-{todo.id}\">\n        <span>{todo.text}</span>\n\
    \        <button hx-delete=\"/todos/{todo.id}\"\n                hx-target=\"closest li\"\n                hx-swap=\"\
    outerHTML\">Delete</button>\n      </li>\n\n      <!-- OOB: Also update the counter -->\n      <span id=\"todo-count\"\
    \ hx-swap-oob=\"true\">\n        {count} items\n      </span>\n    \"\"\"\n# Main response appends to #todo-list\n# OOB\
    \ element updates #todo-count simultaneously\n"
  example_bad: "<!-- Wrong: Separate request just to update counter -->\n<form hx-post=\"/todos\"\n      hx-target=\"#todo-list\"\
    \n      hx-swap=\"beforeend\">\n  <input name=\"text\">\n  <button type=\"submit\">Add</button>\n</form>\n<!-- After adding,\
    \ counter still shows old value -->\n<!-- Must add another htmx request just for the counter: -->\n<span hx-get=\"/todos/count\"\
    \ hx-trigger=\"htmx:afterRequest from:form\">\n  3 items\n</span>\n<!-- Two HTTP requests for one action — wasteful and\
    \ complex -->\n"
  when_applies: Projects using htmx or HTML document structure
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using htmx or HTML
  sources: ["https://htmx.org/docs/#oob_swaps"]
- id: CR-HTX-007
  text: Use the HX-Trigger response header to emit events from the server that client-side JavaScript or other htmx elements
    can listen for.
  why: 'Some actions need to trigger UI updates that htmx alone cannot handle: showing toast notifications, closing modals,
    playing sounds, updating charts. HX-Trigger lets the server emit custom events that htmx elements or JavaScript event
    listeners can respond to, bridging the gap between server-driven and client-side behavior.'
  how_to_do_right: '1. Set HX-Trigger response header with event name(s).

    2. Use JSON format for event data: HX-Trigger: {"showToast": {"message": "Saved!"}}.

    3. Listen with hx-trigger="showToast from:body" on htmx elements.

    4. Listen with document.body.addEventListener("showToast", ...) in JavaScript.

    5. Use HX-Trigger-After-Settle for events that should fire after DOM update.

    '
  severity: medium
  technologies:
    lang: [html, javascript]
    library: [htmx]
  domains:
    domain: [architecture]
    concern: [frontend]
  example_good: "# Server: Emit events via response header\n@app.post(\"/todos\")\ndef create_todo():\n    todo = Todo.create(text=request.form[\"\
    text\"])\n    response = make_response(render_template(\"partials/todo.html\", todo=todo))\n    response.headers[\"HX-Trigger\"\
    ] = json.dumps({\n        \"showToast\": {\"message\": f\"Todo '{todo.text}' created!\", \"type\": \"success\"},\n   \
    \     \"todosChanged\": {\"count\": Todo.query.count()},\n    })\n    return response\n\n<!-- Client: htmx element listens\
    \ for server event -->\n<span id=\"todo-count\"\n      hx-get=\"/todos/count\"\n      hx-trigger=\"todosChanged from:body\"\
    \n      hx-swap=\"innerHTML\">\n  3 items\n</span>\n<!-- Automatically refreshes count when server emits todosChanged\
    \ -->\n\n<!-- Client: JavaScript listens for toast event -->\n<script>\n  document.body.addEventListener('showToast',\
    \ (event) => {\n    const { message, type } = event.detail;\n    // Show toast notification using your preferred library\n\
    \    showNotification(message, type);\n  });\n</script>\n"
  example_bad: "<!-- Wrong: Client-side polling to check for changes -->\n<span id=\"todo-count\"\n      hx-get=\"/todos/count\"\
    \n      hx-trigger=\"every 2s\">\n  3 items\n</span>\n<!-- Polls every 2 seconds even when nothing changed — wasteful\
    \ -->\n<!-- No toast notification — user doesn't know if action succeeded -->\n"
  when_applies: Projects using htmx, HTML document structure, or JavaScript/TypeScript projects
  when_not_applies: server-rendered pages, APIs, CLI tools
  sources: ["https://htmx.org/docs/#response-headers"]
- id: CR-HTX-008
  text: Use htmx for server-driven interactivity. Do NOT use htmx for complex client-side state management, real-time collaboration,
    or offline-capable applications.
  why: 'htmx excels at server-driven CRUD applications where the server is the source of truth. It replaces 90% of the JavaScript
    needed for traditional web apps. But it is the wrong tool for: collaborative editors (need real-time conflict resolution),
    offline apps (need client-side state), complex dashboards (need client-side computed state), or drag-and-drop interfaces
    (need instant client feedback).'
  how_to_do_right: '1. USE htmx for: CRUD apps, admin panels, content sites, forms, dashboards with server data.

    2. DO NOT USE htmx for: real-time collaborative editing, offline-first apps, complex drag-and-drop, rich text editors.

    3. Combine htmx with Alpine.js for lightweight client-side interactivity (dropdowns, tabs, modals).

    4. Use htmx for the 80% that is server-driven, sprinkle JavaScript for the 20% that needs client state.

    5. Measure: if more than 30% of interactions need client-side state, consider React/Vue/Svelte.

    '
  severity: medium
  technologies:
    lang: [html, javascript]
    library: [htmx]
  domains:
    domain: [architecture]
    concern: [frontend]
  example_good: "<!-- Good: Server-driven CRUD with htmx + Alpine.js for UI state -->\n\n<!-- htmx: Server-driven data operations\
    \ -->\n<form hx-post=\"/contacts\"\n      hx-target=\"#contact-list\"\n      hx-swap=\"beforeend\"\n      @submit=\"open\
    \ = false\">\n  <input name=\"name\" required>\n  <input name=\"email\" type=\"email\" required>\n  <button type=\"submit\"\
    >Add Contact</button>\n</form>\n\n<!-- Alpine.js: Client-side UI state (modal, dropdown) -->\n<div x-data=\"{ open: false\
    \ }\">\n  <button @click=\"open = !open\">Filter</button>\n  <div x-show=\"open\" @click.outside=\"open = false\">\n \
    \   <a hx-get=\"/contacts?status=active\" hx-target=\"#contact-list\">Active</a>\n    <a hx-get=\"/contacts?status=archived\"\
    \ hx-target=\"#contact-list\">Archived</a>\n  </div>\n</div>\n\n<!-- Search with debounce + loading indicator -->\n<input\
    \ type=\"search\"\n       hx-get=\"/contacts/search\"\n       hx-target=\"#contact-list\"\n       hx-trigger=\"input changed\
    \ delay:300ms\"\n       hx-indicator=\"#search-spinner\">\n"
  example_bad: "<!-- Wrong: Using htmx for complex client-side state -->\n<!-- Real-time collaborative editor — needs client-side\
    \ CRDT/OT -->\n<textarea hx-patch=\"/documents/1\"\n          hx-trigger=\"input changed delay:100ms\">\n  <!-- Every\
    \ keystroke triggers a server request\n       Two users typing simultaneously: lost updates, conflicts\n       No offline\
    \ support — stops working without network -->\n</textarea>\n"
  when_applies: Projects using htmx, HTML document structure, or JavaScript/TypeScript projects
  when_not_applies: server-rendered pages, APIs, CLI tools
  sources: ["https://htmx.org/essays/when-to-use-hypermedia/", "https://htmx.org/essays/hypermedia-driven-applications/"]
- id: CR-HTX-009
  text: Use hx-indicator to show loading states during requests. Always provide visual feedback for operations that take more
    than 100ms.
  why: Without loading indicators, users have no feedback that their click was registered. They click again, triggering duplicate
    requests. Or they navigate away, thinking the page is broken. htmx's indicator system shows/hides elements based on request
    state — no JavaScript needed. The htmx-indicator class uses CSS opacity transitions for smooth appearance.
  how_to_do_right: '1. Add class="htmx-indicator" to loading elements — htmx controls their visibility.

    2. Use hx-indicator to point to a specific indicator element.

    3. Add CSS for .htmx-indicator: opacity:0 by default, opacity:1 when .htmx-request present.

    4. Use hx-disabled-elt to disable buttons during requests (prevent double-submit).

    5. Combine indicator with hx-swap="none" for fire-and-forget with loading feedback.

    '
  severity: medium
  technologies:
    lang: [html, css]
    library: [htmx]
  domains:
    domain: [architecture]
    concern: [frontend]
  example_good: "<!-- CSS: htmx indicator styles -->\n<style>\n  .htmx-indicator { opacity: 0; transition: opacity 200ms ease-in;\
    \ }\n  .htmx-request .htmx-indicator { opacity: 1; }\n  .htmx-request.htmx-indicator { opacity: 1; }\n</style>\n\n<!--\
    \ Form with loading indicator + disabled button -->\n<form hx-post=\"/orders\"\n      hx-target=\"#order-result\"\n  \
    \    hx-indicator=\"#order-spinner\"\n      hx-disabled-elt=\"button[type='submit']\">\n  <input name=\"product_id\" type=\"\
    hidden\" value=\"42\">\n  <input name=\"quantity\" type=\"number\" value=\"1\" min=\"1\">\n  <button type=\"submit\">\n\
    \    Place Order\n    <span id=\"order-spinner\" class=\"htmx-indicator\">\n      <img src=\"/spinner.svg\" width=\"16\"\
    \ height=\"16\" alt=\"Loading\">\n    </span>\n  </button>\n</form>\n<!-- During request: button disabled, spinner visible\
    \ -->\n<!-- After response: button re-enabled, spinner hidden -->\n\n<!-- Inline indicator on the requesting element -->\n\
    <button hx-delete=\"/items/42\"\n        hx-target=\"closest tr\"\n        hx-swap=\"outerHTML swap:300ms\"\n        class=\"\
    delete-btn\">\n  <span class=\"label\">Delete</span>\n  <span class=\"htmx-indicator\">Deleting...</span>\n</button>\n"
  example_bad: "<!-- Wrong: No loading feedback -->\n<button hx-post=\"/orders\">Place Order</button>\n<!-- User clicks, nothing\
    \ happens for 2 seconds\n     User clicks 3 more times — 4 orders created\n     No feedback that anything is happening\
    \ -->\n"
  when_applies: Projects using htmx, HTML document structure, or CSS styling and layout
  when_not_applies: server-rendered pages, APIs, CLI tools
  sources: ["https://htmx.org/docs/#indicators"]
- id: CR-HTX-010
  text: Use hx-boost on navigation links to upgrade full-page links to htmx-powered AJAX navigation with automatic history
    management.
  why: Standard links cause full page reloads — the browser re-downloads CSS, JS, fonts, and re-renders the entire page. hx-boost
    intercepts link clicks and form submissions, fetches the new page via AJAX, swaps the body content, and updates the URL
    — providing SPA-like navigation speed with zero JavaScript. The browser back button still works correctly.
  how_to_do_right: '1. Add hx-boost="true" to a container to boost all links and forms within it.

    2. Typically add to <body> or <main> for site-wide boosting.

    3. htmx automatically manages browser history (pushState).

    4. Use hx-push-url="false" on specific elements to prevent URL changes.

    5. Server must return full HTML pages for boosted requests — htmx extracts the body.

    '
  severity: medium
  technologies:
    lang: [html]
    library: [htmx]
  domains:
    domain: [architecture, performance]
    concern: [frontend]
  example_good: "<!-- Boost all navigation in the body -->\n<body hx-boost=\"true\">\n  <nav>\n    <!-- These links now use\
    \ AJAX navigation — no full page reload -->\n    <a href=\"/\">Home</a>\n    <a href=\"/products\">Products</a>\n    <a\
    \ href=\"/about\">About</a>\n  </nav>\n\n  <main id=\"content\">\n    <!-- Page content swapped here on navigation -->\n\
    \    <h1>Welcome</h1>\n    <p>Click any link — instant navigation, no page reload.</p>\n  </main>\n\n  <!-- Forms are\
    \ also boosted — AJAX submission by default -->\n  <form method=\"post\" action=\"/search\">\n    <input name=\"q\" placeholder=\"\
    Search\">\n    <button type=\"submit\">Search</button>\n  </form>\n</body>\n\n<!-- Opt out specific links -->\n<a href=\"\
    /downloads/report.pdf\" hx-boost=\"false\">Download PDF</a>\n<a href=\"https://external-site.com\" hx-boost=\"false\"\
    >External Link</a>\n"
  example_bad: "<!-- Wrong: No boosting — every click is a full page reload -->\n<nav>\n  <a href=\"/\">Home</a>         \
    \ <!-- Full reload: re-download CSS, JS, fonts -->\n  <a href=\"/products\">Products</a>  <!-- Full reload: 500ms+ per\
    \ navigation -->\n  <a href=\"/about\">About</a>    <!-- Full reload: layout flash, lost scroll -->\n</nav>\n<!-- User\
    \ experiences: white flash, layout shift, lost scroll position\n     Server re-renders entire page including unchanged\
    \ header/footer\n     Browser re-parses all CSS and JS on every navigation -->\n"
  when_applies: Projects using htmx or HTML document structure
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using htmx or HTML
  sources: ["https://htmx.org/docs/#boosting"]
