layer: rules
technology: Spring Boot
domain: backend
knowledge:
- id: CR-SPB-001
  text: Always use constructor injection over field injection with @Autowired. Constructor injection makes dependencies explicit
    and enables immutability.
  why: Field injection via @Autowired hides class dependencies, makes unit testing require reflection or Spring context, prevents
    final fields, and allows creation of objects in invalid states. Constructor injection fails at compile time if a dependency
    is missing — field injection fails at runtime.
  how_to_do_right: '1. Declare dependencies as final fields.

    2. Create a single constructor with all dependencies as parameters.

    3. With a single constructor, @Autowired is implicit (Spring 4.3+).

    4. Use @RequiredArgsConstructor from Lombok to reduce boilerplate.

    5. If constructor has >5 parameters, the class has too many responsibilities — refactor.

    '
  severity: critical
  technologies:
    lang: [java]
    framework: [spring_boot]
  domains:
    domain: [architecture]
    concern: [backend]
  example_good: "// Correct: Constructor injection — testable, immutable\n@Service\npublic class OrderService {\n    private\
    \ final OrderRepository orderRepository;\n    private final PaymentGateway paymentGateway;\n    private final EventPublisher\
    \ eventPublisher;\n\n    // Single constructor — @Autowired implicit\n    public OrderService(OrderRepository orderRepository,\n\
    \                        PaymentGateway paymentGateway,\n                        EventPublisher eventPublisher) {\n  \
    \      this.orderRepository = orderRepository;\n        this.paymentGateway = paymentGateway;\n        this.eventPublisher\
    \ = eventPublisher;\n    }\n}\n\n// Unit test: no Spring context needed\n@Test\nvoid testPlaceOrder() {\n    var service\
    \ = new OrderService(\n        mock(OrderRepository.class),\n        mock(PaymentGateway.class),\n        mock(EventPublisher.class)\n\
    \    );\n}\n"
  example_bad: "// Wrong: Field injection — hidden dependencies, untestable without Spring\n@Service\npublic class OrderService\
    \ {\n    @Autowired\n    private OrderRepository orderRepository;  // Not final, mutable\n    @Autowired\n    private\
    \ PaymentGateway paymentGateway;\n\n    // Can be constructed without dependencies — invalid state\n    // Unit tests\
    \ require @SpringBootTest or reflection hacks\n}\n"
  when_applies: Any project using Spring Boot Java services or Java/JVM applications
  when_not_applies: small scripts under 100 lines, single-purpose utilities. projects not using Spring Boot or Java
  sources: ["https://docs.spring.io/spring-framework/reference/core/beans/dependencies/factory-collaborators.html#beans-constructor-injection"]
- id: CR-SPB-002
  text: Use @Bean methods in @Configuration classes for complex wiring. Reserve @Component scanning for simple, unambiguous
    beans.
  why: Component scanning (@Service, @Repository, @Component) works well for straightforward beans but becomes problematic
    when you need conditional creation, custom initialization, third-party class registration, or multiple beans of the same
    type. @Bean methods give full control and make the wiring explicit and debuggable.
  how_to_do_right: '1. Use @Component/@Service/@Repository for your own simple services.

    2. Use @Bean for third-party classes, conditional beans, and complex initialization.

    3. Use @Profile for environment-specific beans (dev, staging, prod).

    4. Use @ConditionalOnProperty for feature-flag-driven beans.

    5. Group related @Bean definitions in focused @Configuration classes.

    '
  severity: high
  technologies:
    lang: [java]
    framework: [spring_boot]
  domains:
    domain: [architecture]
    concern: [backend]
  example_good: "@Configuration\npublic class HttpClientConfig {\n\n    @Bean\n    @Profile(\"production\")\n    public RestClient\
    \ productionRestClient() {\n        return RestClient.builder()\n            .baseUrl(\"https://api.payment.com\")\n \
    \           .requestInterceptor(new RetryInterceptor(3))\n            .defaultHeader(\"X-Api-Key\", apiKey)\n        \
    \    .build();\n    }\n\n    @Bean\n    @Profile(\"test\")\n    public RestClient testRestClient() {\n        return RestClient.builder()\n\
    \            .baseUrl(\"http://localhost:8089/mock\")\n            .build();\n    }\n}\n"
  example_bad: "// Wrong: Component scanning for third-party integration\n@Component\npublic class PaymentClient {\n    //\
    \ How is this configured? What URL? What timeout?\n    // Can't swap for test double without @Primary hacks\n    private\
    \ final RestTemplate restTemplate = new RestTemplate();\n\n    public PaymentResult charge(BigDecimal amount) {\n    \
    \    return restTemplate.postForObject(\"/charge\", amount, PaymentResult.class);\n    }\n}\n"
  when_applies: Projects using Spring Boot Java services or Java/JVM applications
  when_not_applies: small scripts under 100 lines, single-purpose utilities. projects not using Spring Boot or Java
  sources: ["https://docs.spring.io/spring-framework/reference/core/beans/java/bean-annotation.html"]
- id: CR-SPB-003
  text: Circular dependencies are a design flaw. Never fix them with @Lazy — restructure by extracting shared logic into a
    new service.
  why: Circular dependencies (A depends on B, B depends on A) indicate a violation of the single responsibility principle.
    Using @Lazy or setter injection to break the cycle hides the design problem, creates fragile initialization order, and
    results in NullPointerException at runtime when the lazy proxy is accessed during construction.
  how_to_do_right: '1. Identify the shared functionality that creates the cycle.

    2. Extract it into a new service that both classes depend on (dependency inversion).

    3. Use domain events (ApplicationEventPublisher) to decouple notification flows.

    4. Consider if one service should contain the other (merge them).

    5. Draw the dependency graph — if it has cycles, the design is wrong.

    '
  severity: high
  technologies:
    lang: [java]
    framework: [spring_boot]
  domains:
    domain: [architecture]
    concern: [backend]
  example_good: "// Correct: Extract shared logic to break cycle\n// Before: OrderService -> InventoryService -> OrderService\
    \ (circular)\n// After: Extract StockValidator\n\n@Service\npublic class StockValidator {\n    private final InventoryRepository\
    \ inventoryRepository;\n    public StockValidator(InventoryRepository repo) { this.inventoryRepository = repo; }\n   \
    \ public boolean hasStock(String sku, int qty) { /* ... */ }\n}\n\n@Service\npublic class OrderService {\n    private\
    \ final StockValidator stockValidator;  // No cycle\n    // ...\n}\n\n@Service\npublic class InventoryService {\n    private\
    \ final StockValidator stockValidator;  // No cycle\n    // ...\n}\n"
  example_bad: "// Wrong: @Lazy hides the design problem\n@Service\npublic class OrderService {\n    @Lazy  // Band-aid —\
    \ proxy may NPE during construction\n    @Autowired\n    private InventoryService inventoryService;\n}\n\n@Service\npublic\
    \ class InventoryService {\n    @Lazy\n    @Autowired\n    private OrderService orderService;  // Circular dependency\
    \ still exists\n}\n"
  when_applies: Projects using Spring Boot Java services or Java/JVM applications
  when_not_applies: small scripts under 100 lines, single-purpose utilities. projects not using Spring Boot or Java
  sources: ["https://docs.spring.io/spring-framework/reference/core/beans/dependencies/factory-collaborators.html#beans-dependency-resolution"]
- id: CR-SPB-004
  text: Prevent N+1 queries in JPA by using @EntityGraph or JOIN FETCH in JPQL. Never rely on lazy loading for collections
    accessed in loops.
  why: JPA defaults to LAZY loading for @OneToMany and @ManyToMany. Iterating over a collection of entities and accessing
    their lazy associations triggers one SQL query per entity. A page of 50 orders with items and products generates 1 + 50
    + 50*N queries instead of 2-3 queries with proper fetching.
  how_to_do_right: '1. Use @EntityGraph on repository methods for declarative eager fetching.

    2. Use JOIN FETCH in @Query JPQL for complex multi-level fetching.

    3. Use Hibernate''s @BatchSize as a fallback for batch lazy loading.

    4. Profile with spring.jpa.show-sql=true or Hibernate Statistics.

    5. For read-only queries, add @QueryHints(@QueryHint(name = HINT_FETCH_SIZE, value = "50")).

    '
  severity: critical
  technologies:
    lang: [java]
    framework: [spring_boot]
    library: [jpa, hibernate]
  domains:
    domain: [architecture, performance]
    concern: [backend, data, database]
  example_good: "// Correct: @EntityGraph — declarative eager loading\npublic interface OrderRepository extends JpaRepository<Order,\
    \ Long> {\n\n    @EntityGraph(attributePaths = {\"customer\", \"items\", \"items.product\"})\n    List<Order> findByStatus(OrderStatus\
    \ status);\n\n    // Or with JOIN FETCH for complex queries\n    @Query(\"\"\"\n        SELECT o FROM Order o\n      \
    \  JOIN FETCH o.customer c\n        JOIN FETCH o.items i\n        JOIN FETCH i.product p\n        WHERE o.status = :status\n\
    \        AND o.createdAt > :since\n        \"\"\")\n    List<Order> findRecentByStatus(\n        @Param(\"status\") OrderStatus\
    \ status,\n        @Param(\"since\") LocalDateTime since\n    );\n}\n"
  example_bad: "// Wrong: N+1 — 1 query for orders + N for customers + N*M for items\nList<Order> orders = orderRepository.findByStatus(OrderStatus.PENDING);\n\
    for (Order order : orders) {\n    log.info(\"Customer: {}\", order.getCustomer().getName()); // +1 query\n    for (OrderItem\
    \ item : order.getItems()) {                // +1 query\n        log.info(\"Product: {}\", item.getProduct().getName());\
    \ // +1 query\n    }\n}\n"
  when_applies: Any project using Spring Boot Java services, JPA, or Hibernate
  when_not_applies: low-traffic internal tools, admin dashboards, or batch jobs where latency is irrelevant
  sources: ["https://docs.jboss.org/hibernate/orm/current/userguide/html_single/Hibernate_User_Guide.html#fetching"]
- id: CR-SPB-005
  text: Understand @Transactional propagation levels. Default REQUIRED joins existing transactions — use REQUIRES_NEW for
    independent operations that must commit regardless of caller outcome.
  why: Using the wrong propagation level causes silent data corruption. REQUIRED (default) joins the caller's transaction
    — if the caller rolls back, your audit log disappears. REQUIRES_NEW suspends the caller's transaction and creates a new
    one — the audit log persists even if the caller fails. Using REQUIRES_NEW carelessly creates deadlocks when both transactions
    lock the same rows.
  how_to_do_right: '1. Use REQUIRED (default) for operations that should succeed or fail together.

    2. Use REQUIRES_NEW for audit logs, notifications, and metrics that must persist on failure.

    3. Use SUPPORTS for read-only operations that work with or without a transaction.

    4. Never call a @Transactional method from within the same class (proxy bypass).

    5. Set readOnly=true on read operations for connection pool optimization.

    '
  severity: high
  technologies:
    lang: [java]
    framework: [spring_boot]
    library: [jpa, hibernate]
  domains:
    domain: [architecture]
    concern: [backend, data, database]
  example_good: "@Service\npublic class OrderService {\n    private final AuditService auditService;\n\n    @Transactional\
    \  // REQUIRED (default) — all-or-nothing with caller\n    public Order placeOrder(OrderRequest request) {\n        Order\
    \ order = createOrder(request);\n        inventoryService.reserve(order);   // Same transaction\n        paymentService.charge(order);\
    \      // Same transaction\n        auditService.logOrderPlaced(order); // REQUIRES_NEW — persists even if above rolls\
    \ back\n        return order;\n    }\n}\n\n@Service\npublic class AuditService {\n    @Transactional(propagation = Propagation.REQUIRES_NEW)\n\
    \    public void logOrderPlaced(Order order) {\n        // Independent transaction — committed even if caller rolls back\n\
    \        auditRepository.save(new AuditEntry(\"ORDER_PLACED\", order.getId()));\n    }\n}\n"
  example_bad: "@Service\npublic class OrderService {\n    // Wrong: Calling @Transactional from same class — proxy is bypassed\n\
    \    @Transactional\n    public void processOrder(OrderRequest request) {\n        createOrder(request);\n        this.logAudit(request);\
    \  // NOT transactional — same-class call!\n    }\n\n    @Transactional(propagation = Propagation.REQUIRES_NEW)\n    public\
    \ void logAudit(OrderRequest request) {\n        // This runs WITHOUT a new transaction because Spring proxy is bypassed\n\
    \    }\n}\n"
  when_applies: Projects using Spring Boot Java services, JPA, or Hibernate
  when_not_applies: stateless microservices with no data persistence, pure computation modules
  sources: ["https://docs.spring.io/spring-framework/reference/data-access/transaction/declarative/annotations.html"]
- id: CR-SPB-006
  text: Tune HikariCP connection pool based on workload. Default maximumPoolSize of 10 is insufficient for production but
    overly large pools are worse.
  why: 'Each database connection consumes ~10MB of RAM on the database server. Setting maximumPoolSize=100 on 5 application
    instances = 500 connections consuming 5GB of RAM and causing contention on the database. Too few connections starve the
    application. The formula is: connections = (core_count * 2) + disk_spindle_count, typically 10-20 per instance.'
  how_to_do_right: '1. Set maximumPoolSize = (2 * CPU cores) + effective_spindle_count (usually 10-20).

    2. Set minimumIdle to half of maximumPoolSize for stable workloads.

    3. Set connectionTimeout to 30s (fail fast, don''t queue forever).

    4. Set maxLifetime to 5 minutes less than database''s wait_timeout.

    5. Monitor with HikariCP metrics exposed via Micrometer/Actuator.

    '
  severity: high
  technologies:
    lang: [java]
    framework: [spring_boot]
    library: [hikaricp]
    platform: [postgresql]
  domains:
    domain: [architecture, performance]
    concern: [backend, data, database]
  example_good: "# application.yml — tuned for 4-core server\nspring:\n  datasource:\n    hikari:\n      maximum-pool-size:\
    \ 10         # (2*4) + 2 spindles\n      minimum-idle: 5               # Half of max for stable workload\n      connection-timeout:\
    \ 30000     # 30s — fail fast\n      idle-timeout: 600000          # 10 min idle before eviction\n      max-lifetime:\
    \ 1800000         # 30 min — less than DB wait_timeout\n      leak-detection-threshold: 10000  # Warn if connection held\
    \ >10s\n\n# Monitor via Actuator\nmanagement:\n  endpoints:\n    web:\n      exposure:\n        include: health,metrics\n\
    \  metrics:\n    tags:\n      application: ${spring.application.name}\n"
  example_bad: "# Wrong: Oversized pool causing database contention\nspring:\n  datasource:\n    hikari:\n      maximum-pool-size:\
    \ 100  # 5 instances = 500 connections\n      minimum-idle: 100       # All connections always open\n      # No connectionTimeout\
    \ — threads wait forever for a connection\n      # No maxLifetime — stale connections cause random failures\n      # No\
    \ leak detection — leaked connections never returned\n"
  when_applies: Projects using Spring Boot Java services, HikariCP, or PostgreSQL databases
  when_not_applies: stateless microservices with no data persistence, pure computation modules
  sources: ["https://github.com/brettwooldridge/HikariCP/wiki/About-Pool-Sizing"]
- id: CR-SPB-007
  text: Use Flyway or Liquibase for versioned schema migrations. Never use spring.jpa.hibernate.ddl-auto=update in production.
  why: ddl-auto=update applies destructive schema changes without review or rollback capability. It can silently drop columns
    when renaming fields, create wrong index types, and cannot handle data migrations. Flyway/Liquibase provide versioned,
    reviewable, idempotent migrations with rollback scripts.
  how_to_do_right: '1. Add Flyway dependency — Spring Boot auto-configures it.

    2. Place SQL migrations in src/main/resources/db/migration/ with naming V1__description.sql.

    3. Use ddl-auto=validate in production to verify schema matches JPA entities.

    4. Create migration for every schema change — never modify existing migrations.

    5. Test migrations against a production-like database copy before deploying.

    '
  severity: critical
  technologies:
    lang: [java]
    framework: [spring_boot]
    library: [flyway]
    platform: [postgresql]
  domains:
    domain: [architecture, operations, deployment]
    concern: [backend, data, database]
  example_good: "# application-production.yml\nspring:\n  jpa:\n    hibernate:\n      ddl-auto: validate  # Verify schema\
    \ matches entities — fail on mismatch\n  flyway:\n    enabled: true\n    locations: classpath:db/migration\n    baseline-on-migrate:\
    \ true\n\n-- src/main/resources/db/migration/V1__create_orders.sql\nCREATE TABLE orders (\n    id BIGSERIAL PRIMARY KEY,\n\
    \    customer_id BIGINT NOT NULL REFERENCES customers(id),\n    status VARCHAR(20) NOT NULL DEFAULT 'PENDING',\n    total\
    \ DECIMAL(12,2) NOT NULL,\n    created_at TIMESTAMP NOT NULL DEFAULT NOW()\n);\nCREATE INDEX idx_orders_customer ON orders(customer_id);\n\
    CREATE INDEX idx_orders_status ON orders(status);\n\n-- V2__add_order_tracking.sql\nALTER TABLE orders ADD COLUMN tracking_number\
    \ VARCHAR(50);\n"
  example_bad: "# WRONG: ddl-auto=update in production\nspring:\n  jpa:\n    hibernate:\n      ddl-auto: update  # Applies\
    \ unreviewed schema changes on startup\n# Consequences:\n# 1. Renaming a field creates new column, old column stays with\
    \ data\n# 2. Removing a field does NOT drop the column (Hibernate never drops)\n# 3. No migration history — cannot rollback\n\
    # 4. No data migration support\n# 5. May lock tables during ALTER on large datasets\n"
  when_applies: Any project using Spring Boot Java services, Flyway, or PostgreSQL databases
  when_not_applies: stateless microservices with no data persistence, pure computation modules
  sources: ["https://documentation.red-gate.com/fd/why-database-migrations-184127574.html"]
- id: CR-SPB-008
  text: Configure Spring Security's filter chain explicitly. Never disable CSRF for session-based apps or use permitAll()
    on sensitive endpoints.
  why: The default SecurityFilterChain denies all requests, forcing you to configure explicitly. Overly permissive configuration
    (permitAll on /api/**) silently exposes internal endpoints. Disabling CSRF for session-based apps allows cross-site form
    submissions that transfer money or change passwords using the victim's authenticated session.
  how_to_do_right: '1. Define SecurityFilterChain as a @Bean with explicit rules.

    2. Use requestMatchers with specific paths — never broad wildcards.

    3. Disable CSRF only for stateless token-based APIs (JWT, API keys).

    4. Keep CSRF enabled for session-based web applications.

    5. Use method security (@PreAuthorize) for fine-grained authorization.

    '
  severity: critical
  technologies:
    lang: [java]
    framework: [spring_boot, spring_security]
  domains:
    domain: [architecture, security]
    concern: [backend]
  example_good: "@Configuration\n@EnableMethodSecurity\npublic class SecurityConfig {\n\n    @Bean\n    public SecurityFilterChain\
    \ filterChain(HttpSecurity http) throws Exception {\n        return http\n            .authorizeHttpRequests(auth -> auth\n\
    \                .requestMatchers(\"/api/public/**\").permitAll()\n                .requestMatchers(\"/api/admin/**\"\
    ).hasRole(\"ADMIN\")\n                .requestMatchers(\"/api/users/**\").hasAnyRole(\"USER\", \"ADMIN\")\n          \
    \      .requestMatchers(\"/actuator/health\").permitAll()\n                .anyRequest().authenticated()\n           \
    \ )\n            .oauth2ResourceServer(oauth2 -> oauth2.jwt(Customizer.withDefaults()))\n            .csrf(csrf -> csrf.disable())\
    \  // OK: Stateless JWT — no sessions\n            .sessionManagement(s -> s.sessionCreationPolicy(STATELESS))\n     \
    \       .build();\n    }\n}\n"
  example_bad: "@Configuration\npublic class SecurityConfig {\n    @Bean\n    public SecurityFilterChain filterChain(HttpSecurity\
    \ http) throws Exception {\n        return http\n            .authorizeHttpRequests(auth -> auth\n                .anyRequest().permitAll()\
    \  // Everything public!\n            )\n            .csrf(csrf -> csrf.disable())  // CSRF off for session app\n    \
    \        .build();\n    }\n}\n"
  when_applies: Any project using Spring Boot Java services or Spring Security
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities. projects
    not using Spring Boot or Spring Security
  sources: ["https://docs.spring.io/spring-security/reference/servlet/configuration/java.html"]
- id: CR-SPB-009
  text: Configure CORS globally in SecurityFilterChain, not per-controller with @CrossOrigin. Define explicit origins, methods,
    and headers.
  why: Per-controller @CrossOrigin is inconsistent — one forgotten annotation exposes an endpoint. Misconfigured CORS with
    allowedOrigins('*') combined with allowCredentials(true) allows any website to make authenticated requests. Spring Security
    processes CORS before authentication — misconfigured CORS can bypass your security chain.
  how_to_do_right: '1. Define CORS in SecurityFilterChain with CorsConfigurationSource @Bean.

    2. List explicit origins — never use * with credentials.

    3. List explicit methods and headers — not *.

    4. Set maxAge for preflight caching (3600 = 1 hour).

    5. Enable CORS in the security chain with .cors(Customizer.withDefaults()).

    '
  severity: high
  technologies:
    lang: [java]
    framework: [spring_boot, spring_security]
  domains:
    domain: [architecture, security]
    concern: [backend]
  example_good: "@Bean\npublic CorsConfigurationSource corsConfigurationSource() {\n    CorsConfiguration config = new CorsConfiguration();\n\
    \    config.setAllowedOrigins(List.of(\n        \"https://app.example.com\",\n        \"https://admin.example.com\"\n\
    \    ));\n    config.setAllowedMethods(List.of(\"GET\", \"POST\", \"PUT\", \"DELETE\"));\n    config.setAllowedHeaders(List.of(\"\
    Authorization\", \"Content-Type\"));\n    config.setAllowCredentials(true);\n    config.setMaxAge(3600L);\n\n    UrlBasedCorsConfigurationSource\
    \ source = new UrlBasedCorsConfigurationSource();\n    source.registerCorsConfiguration(\"/api/**\", config);\n    return\
    \ source;\n}\n\n@Bean\npublic SecurityFilterChain filterChain(HttpSecurity http) throws Exception {\n    return http\n\
    \        .cors(Customizer.withDefaults())  // Uses the CorsConfigurationSource bean\n        .authorizeHttpRequests(/*\
    \ ... */)\n        .build();\n}\n"
  example_bad: "// Wrong: Per-controller — inconsistent, easy to forget\n@CrossOrigin(origins = \"*\")  // All origins + credentials\
    \ = security hole\n@RestController\npublic class PaymentController {\n    @PostMapping(\"/api/payments\")\n    public\
    \ void processPayment(@RequestBody PaymentRequest req) {\n        // Any website can call this endpoint with user's cookies\n\
    \    }\n}\n"
  when_applies: Projects using Spring Boot Java services or Spring Security
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities. projects
    not using Spring Boot or Spring Security
  sources: ["https://docs.spring.io/spring-security/reference/servlet/integrations/cors.html"]
- id: CR-SPB-010
  text: Use @PreAuthorize with SpEL expressions for method-level security instead of role checks in business code.
  why: Embedding role checks in business logic (if user.hasRole('ADMIN')) scatters authorization across the codebase, is impossible
    to audit, and violates separation of concerns. @PreAuthorize keeps authorization declarative, testable, and auditable
    in one place. Missing a role check in one method creates a privilege escalation vulnerability.
  how_to_do_right: '1. Enable method security with @EnableMethodSecurity on config class.

    2. Use @PreAuthorize("hasRole(''ADMIN'')") on service methods.

    3. Use @PreAuthorize("#userId == authentication.principal.id") for ownership checks.

    4. Create custom security expressions for complex rules.

    5. Test with @WithMockUser in unit tests.

    '
  severity: high
  technologies:
    lang: [java]
    framework: [spring_boot, spring_security]
  domains:
    domain: [architecture, security]
    concern: [backend]
  example_good: "@Service\npublic class UserService {\n\n    @PreAuthorize(\"hasRole('ADMIN')\")\n    public void deleteUser(Long\
    \ userId) {\n        userRepository.deleteById(userId);\n    }\n\n    @PreAuthorize(\"#userId == authentication.principal.id\
    \ or hasRole('ADMIN')\")\n    public UserProfile getProfile(Long userId) {\n        return userRepository.findById(userId)\n\
    \            .map(UserProfile::fromEntity)\n            .orElseThrow(() -> new NotFoundException(\"User not found\"));\n\
    \    }\n\n    @PreAuthorize(\"@subscriptionChecker.hasFeature(authentication, 'EXPORT')\")\n    public byte[] exportData(Long\
    \ userId) {\n        // Custom security expression bean\n        return dataExportService.export(userId);\n    }\n}\n"
  example_bad: "// Wrong: Role checks scattered in business logic\n@Service\npublic class UserService {\n    public void deleteUser(Long\
    \ userId, Authentication auth) {\n        // Scattered, easy to forget, hard to audit\n        if (!auth.getAuthorities().contains(new\
    \ SimpleGrantedAuthority(\"ROLE_ADMIN\"))) {\n            throw new AccessDeniedException(\"Not admin\");\n        }\n\
    \        userRepository.deleteById(userId);\n    }\n}\n"
  when_applies: Projects using Spring Boot Java services or Spring Security
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities. projects
    not using Spring Boot or Spring Security
  sources: ["https://docs.spring.io/spring-security/reference/servlet/authorization/method-security.html"]
- id: CR-SPB-011
  text: Use WebClient for non-blocking HTTP calls in reactive stacks. Never use RestTemplate in WebFlux — it blocks the event
    loop thread.
  why: WebFlux uses a small number of event loop threads (typically CPU count). A blocking RestTemplate call in a WebFlux
    handler ties up an event loop thread for the entire duration of the HTTP call. With 4 event loop threads and 4 simultaneous
    blocking calls, the entire server is unresponsive. WebClient is non-blocking — the thread is released during the network
    wait.
  how_to_do_right: '1. Use WebClient.Builder (auto-configured in Spring Boot) for all HTTP calls.

    2. Return Mono<T> or Flux<T> from service methods — do not block with .block().

    3. Use .timeout() to prevent hanging connections.

    4. Use .retryWhen() for transient failure handling.

    5. If you must call blocking code, wrap it with Mono.fromCallable().subscribeOn(Schedulers.boundedElastic()).

    '
  severity: critical
  technologies:
    lang: [java]
    framework: [spring_boot]
    library: [webflux, project reactor]
  domains:
    domain: [architecture, performance]
    concern: [backend]
  example_good: "@Service\npublic class PaymentService {\n    private final WebClient webClient;\n\n    public PaymentService(WebClient.Builder\
    \ builder) {\n        this.webClient = builder\n            .baseUrl(\"https://api.stripe.com\")\n            .defaultHeader(\"\
    Authorization\", \"Bearer \" + apiKey)\n            .build();\n    }\n\n    public Mono<PaymentResult> charge(PaymentRequest\
    \ request) {\n        return webClient.post()\n            .uri(\"/v1/charges\")\n            .bodyValue(request)\n  \
    \          .retrieve()\n            .bodyToMono(PaymentResult.class)\n            .timeout(Duration.ofSeconds(10))\n \
    \           .retryWhen(Retry.backoff(3, Duration.ofMillis(500)));\n    }\n}\n"
  example_bad: "// WRONG: Blocking HTTP call in WebFlux — kills event loop\n@RestController\npublic class PaymentController\
    \ {\n    private final RestTemplate restTemplate = new RestTemplate(); // Blocking!\n\n    @PostMapping(\"/api/charge\"\
    )\n    public Mono<PaymentResult> charge(@RequestBody PaymentRequest req) {\n        // Blocks event loop thread for entire\
    \ HTTP roundtrip\n        PaymentResult result = restTemplate.postForObject(\n            \"https://api.stripe.com/v1/charges\"\
    , req, PaymentResult.class\n        );\n        return Mono.just(result);\n    }\n}\n"
  when_applies: Any project using Spring Boot Java services, WebFlux, or Project Reactor
  when_not_applies: low-traffic internal tools, admin dashboards, or batch jobs where latency is irrelevant
  sources: ["https://docs.spring.io/spring-framework/reference/web/webflux-webclient.html"]
- id: CR-SPB-012
  text: Implement custom health indicators for all critical dependencies. Actuator's /health endpoint is your production lifeline.
  why: The default /health endpoint only checks the database. If Redis is down, Kafka is unreachable, or a downstream API
    is returning errors, the load balancer still routes traffic to a broken instance. Custom health indicators tell the orchestrator
    exactly which instances are healthy and which should be drained.
  how_to_do_right: '1. Implement HealthIndicator for every external dependency (Redis, Kafka, APIs).

    2. Return Health.up().withDetail() for success with metadata.

    3. Return Health.down().withException() for failures with diagnostics.

    4. Configure groups: liveness (is app running) vs readiness (can app serve traffic).

    5. Wire /actuator/health/readiness to Kubernetes readiness probe.

    '
  severity: high
  technologies:
    lang: [java]
    framework: [spring_boot]
    library: [spring actuator]
  domains:
    domain: [architecture, operations, deployment, observability]
    concern: [backend]
  example_good: "@Component\npublic class PaymentGatewayHealthIndicator implements HealthIndicator {\n\n    private final\
    \ WebClient client;\n\n    @Override\n    public Health health() {\n        try {\n            var response = client.get()\n\
    \                .uri(\"/health\")\n                .retrieve()\n                .toBodilessEntity()\n               \
    \ .block(Duration.ofSeconds(3));\n\n            if (response != null && response.getStatusCode().is2xxSuccessful()) {\n\
    \                return Health.up()\n                    .withDetail(\"status\", \"reachable\")\n                    .withDetail(\"\
    latency_ms\", latency)\n                    .build();\n            }\n            return Health.down().withDetail(\"status\"\
    , response.getStatusCode()).build();\n        } catch (Exception e) {\n            return Health.down().withException(e).build();\n\
    \        }\n    }\n}\n\n# application.yml\nmanagement:\n  endpoint:\n    health:\n      show-details: always\n      group:\n\
    \        readiness:\n          include: db, paymentGateway, redis\n        liveness:\n          include: ping\n"
  example_bad: "# Wrong: No custom health indicators — load balancer sends traffic to broken instances\n# application.yml\n\
    management:\n  endpoint:\n    health:\n      show-details: never  # Can't even debug in production\n# Result: /health\
    \ returns UP even when Redis is down and payment API is unreachable\n# Kubernetes keeps routing traffic → 50% of requests\
    \ fail\n"
  when_applies: Projects using Spring Boot Java services or Spring Actuator
  when_not_applies: projects not using Spring Boot or Spring Actuator
  sources: ["https://docs.spring.io/spring-boot/reference/actuator/endpoints.html#actuator.endpoints.health"]
- id: CR-SPB-013
  text: Expose Micrometer metrics via Prometheus endpoint. Instrument custom business metrics (order count, payment latency)
    alongside JVM metrics.
  why: JVM metrics (heap, GC, threads) tell you the application is running but not if it is working correctly. Without business
    metrics, you discover that orders stopped processing only when customers complain. Micrometer + Prometheus + Grafana provides
    real-time visibility into business health with alerting.
  how_to_do_right: '1. Include micrometer-registry-prometheus dependency (auto-configured).

    2. Inject MeterRegistry to create custom counters, gauges, and timers.

    3. Use @Timed on methods for automatic latency histograms.

    4. Create meaningful metric names: business.orders.placed, business.payments.failed.

    5. Add tags for dimensionality: region, customer_tier, payment_method.

    '
  severity: medium
  technologies:
    lang: [java]
    framework: [spring_boot]
    library: [micrometer]
    platform: [prometheus]
  domains:
    domain: [architecture, observability]
    concern: [backend]
  example_good: "@Service\npublic class OrderService {\n    private final Counter ordersPlaced;\n    private final Counter\
    \ ordersFailed;\n    private final Timer orderProcessingTime;\n\n    public OrderService(MeterRegistry registry) {\n \
    \       this.ordersPlaced = Counter.builder(\"business.orders.placed\")\n            .description(\"Total orders successfully\
    \ placed\")\n            .tag(\"region\", region)\n            .register(registry);\n        this.ordersFailed = Counter.builder(\"\
    business.orders.failed\")\n            .description(\"Total orders that failed\")\n            .register(registry);\n\
    \        this.orderProcessingTime = Timer.builder(\"business.orders.processing_time\")\n            .description(\"Time\
    \ to process an order end-to-end\")\n            .publishPercentiles(0.5, 0.95, 0.99)\n            .register(registry);\n\
    \    }\n\n    public Order placeOrder(OrderRequest request) {\n        return orderProcessingTime.record(() -> {\n   \
    \         try {\n                Order order = processOrder(request);\n                ordersPlaced.increment();\n   \
    \             return order;\n            } catch (Exception e) {\n                ordersFailed.increment();\n        \
    \        throw e;\n            }\n        });\n    }\n}\n"
  example_bad: "// Wrong: No business metrics — flying blind in production\n@Service\npublic class OrderService {\n    public\
    \ Order placeOrder(OrderRequest request) {\n        // No instrumentation — you only know it broke when customer calls\n\
    \        return processOrder(request);\n    }\n}\n// JVM metrics say heap is 60% and GC is fine\n// Meanwhile, 0 orders\
    \ processed in the last hour — nobody knows\n"
  when_applies: Projects using Spring Boot Java services, Micrometer, or Prometheus metrics collection
  when_not_applies: throwaway prototypes, local dev scripts
  sources: ["https://docs.micrometer.io/micrometer/reference/concepts.html"]
- id: CR-SPB-014
  text: Use Spring profiles to manage environment-specific configuration. Never use conditionals on environment names in business
    code.
  why: 'Scattering if (env == ''production'') checks in code creates untestable branching, is easily missed during code review,
    and inevitably leads to dev-only code running in production. Profiles provide clean separation: the same code runs in
    all environments, only the configuration changes.'
  how_to_do_right: '1. Use application-{profile}.yml for environment-specific properties.

    2. Use @Profile on @Configuration classes for environment-specific beans.

    3. Activate profiles via SPRING_PROFILES_ACTIVE environment variable.

    4. Use ''default'' profile for development settings.

    5. Never read spring.profiles.active in business code.

    '
  severity: medium
  technologies:
    lang: [java]
    framework: [spring_boot]
  domains:
    domain: [architecture, operations, deployment]
    concern: [backend]
  example_good: "# application.yml (default — development)\napp:\n  cache:\n    ttl: 60s\n  feature-flags:\n    new-checkout:\
    \ true\n\n# application-production.yml\napp:\n  cache:\n    ttl: 3600s\n  feature-flags:\n    new-checkout: false\n\n\
    // Bean configuration — profile-driven, no conditionals\n@Configuration\n@Profile(\"production\")\npublic class ProductionCacheConfig\
    \ {\n    @Bean\n    public CacheManager cacheManager() {\n        return new RedisCacheManager(/* production Redis */);\n\
    \    }\n}\n\n@Configuration\n@Profile(\"!production\")\npublic class DevCacheConfig {\n    @Bean\n    public CacheManager\
    \ cacheManager() {\n        return new ConcurrentMapCacheManager();\n    }\n}\n"
  example_bad: "// Wrong: Environment conditionals in business code\n@Service\npublic class NotificationService {\n    @Value(\"\
    ${spring.profiles.active}\")\n    private String activeProfile;\n\n    public void sendNotification(User user, String\
    \ message) {\n        if (\"production\".equals(activeProfile)) {\n            smsGateway.send(user.getPhone(), message);\n\
    \        } else {\n            log.info(\"Would send SMS to {}: {}\", user.getPhone(), message);\n            // Dev forgot\
    \ to update this when adding staging environment\n            // Staging silently drops all notifications\n        }\n\
    \    }\n}\n"
  when_applies: Projects using Spring Boot Java services or Java/JVM applications
  when_not_applies: projects not using Spring Boot or Java
  sources: ["https://docs.spring.io/spring-boot/reference/features/profiles.html"]
