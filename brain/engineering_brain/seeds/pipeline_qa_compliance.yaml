layer: rules
domain: sacada
knowledge:
- id: PQC-001
  text: "RF compliance verification methodology — verify EVERY requirement (RF) in the spec has corresponding code, tests, and acceptance criteria. A spec without traceability is fiction."
  why: >
    Requirements that are written but never verified against code are wishful thinking. In pipeline development,
    the spec defines what must exist (RFs), and the code implements it. But without a systematic method to verify
    that EACH RF maps to specific code and tests, requirements silently fall through the cracks. In audits of
    real pipeline runs, 20-30% of RFs had no corresponding implementation — not because developers forgot, but
    because there was no systematic verification step. The RF compliance check catches this before QA or users do.
  how_to_do_right: >
    1. Extract ALL RFs from the specification into a checklist.

    2. For EACH RF, identify the specific file(s) and function(s) that implement it.

    3. For EACH RF, identify the specific test(s) that verify it.

    4. If an RF has no implementation, mark it as a GAP (not as "done later").

    5. If an RF has implementation but no test, mark it as UNTESTED.

    6. Report: total RFs, implemented, tested, gaps, untested. Target: 100% implementation, 100% tested.

    7. This check MUST be automated — manual RF checking does not scale and gets skipped under pressure.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition]
  example_good: |
    # RF Compliance Check for Sprint S00:
    # Spec defines 14 RFs:
    # RF-S00-001: Models must inherit from BaseModel → src/veritas/core/models.py:Claim ✓
    # RF-S00-002: Claims must have source tracking → src/veritas/core/models.py:Claim.source ✓
    # RF-S00-003: All models must be serializable → tests/test_models.py:test_serialization ✓
    # ...
    # RF-S00-014: Enum values must be documented → src/veritas/core/models.py:ClaimStatus ✓

    # Result: 14/14 RFs implemented, 14/14 tested, 0 gaps
    compliance = verify_rf_compliance(sprint_id="S00", spec=spec, codebase=codebase)
    assert compliance.total == 14
    assert compliance.implemented == 14
    assert compliance.tested == 14
    assert compliance.gaps == 0
  example_bad: |
    # Developer reads spec, implements "the important parts":
    # RF-S00-001 through RF-S00-010: implemented
    # RF-S00-011 through RF-S00-014: "I'll do these later"
    # No tracking of which RFs are done
    # QA asks "are all requirements implemented?"
    # Developer: "Yes" (from memory, not from verification)
    # 4 RFs silently missing in production
  when_applies: At the end of every sprint, before QA review. Also used as a gate check (G-BRAIN gate) before promoting work from development to testing.
  sources: ["https://www.iso.org/standard/74528.html"]

- id: PQC-002
  text: "Invariant enforcement verification — every invariant (INV) defined in the spec must have runtime enforcement AND a test that proves the enforcement works. An unenforced invariant is a suggestion."
  why: >
    Invariants are the most critical part of a specification because they define what must ALWAYS be true. Unlike
    requirements (which define what the system does), invariants define what the system must NEVER violate. But
    an invariant that exists only in documentation and is not enforced in code will be violated — it is just a
    matter of time. Runtime enforcement (assertions, validators, guards) plus tests that prove the enforcement
    works are the only way to guarantee invariants hold.
  how_to_do_right: >
    1. Extract ALL invariants from the specification.

    2. For EACH invariant, identify the enforcement mechanism in code (assert, validator, guard, constraint).

    3. For EACH invariant, write a test that TRIES to violate it and verifies the enforcement catches it.

    4. Invariants on data models should use Pydantic validators or SQLAlchemy constraints.

    5. Invariants on business logic should use guard functions called at the entry point.

    6. Invariants that cross service boundaries should be enforced on BOTH sides (defense in depth).

    7. An invariant without a violation test is untested — you do not know if the enforcement works.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition]
  example_good: |
    # INV-001: "Coverage >= 90% line + 70% mutation (per pack)"
    # Enforcement: gate_runner.py checks coverage before promotion
    # Test: proves the enforcement works

    def test_invariant_coverage_enforcement():
        """Prove INV-001 is enforced: low coverage blocks promotion."""
        result = run_gate(
            gate_id="G0",
            sprint_id="S00",
            coverage={"line": 85, "mutation": 65},  # Below thresholds
        )
        assert result.verdict == "FAIL"
        assert "coverage" in result.reason.lower()

    def test_invariant_coverage_passes():
        """Prove INV-001 accepts valid coverage."""
        result = run_gate(
            gate_id="G0",
            sprint_id="S00",
            coverage={"line": 95, "mutation": 75},  # Above thresholds
        )
        assert result.verdict == "PASS"
  example_bad: |
    # INV-001 exists in the spec document
    # No enforcement in code
    # Coverage is 60% but nobody checks
    # Sprint is promoted to production
    # Bug found 3 weeks later that 90% coverage would have caught
  when_applies: During QA review of every sprint. Every invariant in the spec must have verified enforcement before the sprint is considered complete.
  sources: ["https://martinfowler.com/articles/contracts.html"]

- id: PQC-003
  text: "Edge case coverage assessment — for EVERY function handling external input, verify edge cases are tested: empty, null, max, min, boundary, unicode, concurrent, timeout."
  why: >
    Edge cases are where bugs hide. A function that works for normal inputs but crashes on empty string, None,
    maxint, or Unicode characters is a function that works in development and fails in production. Production
    traffic is adversarial — users send empty forms, bots send malformed data, network issues cause timeouts,
    and concurrent requests hit race conditions. If your tests only cover the happy path, you are testing the
    one scenario that production rarely sees.
  how_to_do_right: >
    1. For EVERY function that handles external input, test these edge cases:
       - Empty: "", [], {}, 0, None
       - Boundary: min value, max value, exactly at limit
       - Type: wrong type, unicode, special characters, very long strings
       - Concurrency: simultaneous calls, race conditions
       - Timing: timeout, slow response, no response
       - State: first call, repeated call, call after error

    2. Use property-based testing (Hypothesis) for complex input domains.

    3. Prioritize edge cases based on impact: security > data corruption > crash > degraded behavior.

    4. Document which edge cases are tested and which are explicitly out of scope.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition]
  example_good: |
    import pytest
    from hypothesis import given, strategies as st

    class TestClaimValidation:
        def test_empty_text(self):
            with pytest.raises(ValueError, match="text cannot be empty"):
                Claim(text="", source="test")

        def test_none_text(self):
            with pytest.raises(TypeError):
                Claim(text=None, source="test")

        def test_max_length_text(self):
            long_text = "a" * 100_000
            claim = Claim(text=long_text, source="test")
            assert len(claim.text) <= 10_000  # Truncated

        def test_unicode_text(self):
            claim = Claim(text="Claim with emojis and CJK", source="test")
            assert claim.text is not None

        @given(st.text(min_size=1, max_size=10000))
        def test_arbitrary_text(self, text):
            claim = Claim(text=text, source="test")
            assert isinstance(claim.text, str)
  example_bad: |
    def test_claim_creation():
        claim = Claim(text="The earth is round", source="NASA")
        assert claim.text == "The earth is round"
        # Only happy path tested
        # What happens with empty text? None? 1MB of text? Unicode?
  when_applies: During QA review of every function that handles external input (API endpoints, form handlers, file parsers, message consumers, LLM response handlers).
  sources: ["https://hypothesis.readthedocs.io/en/latest/"]

- id: PQC-004
  text: "Security requirement verification — verify ALL security requirements (authentication, authorization, input validation, output encoding, secrets management) before declaring a feature complete."
  why: >
    Security vulnerabilities are the most expensive bugs to fix after deployment. A missing authentication check
    means anyone can access the endpoint. A missing authorization check means any authenticated user can access
    any other user's data. Missing input validation enables injection attacks. Missing output encoding enables XSS.
    These are not edge cases — they are fundamental requirements that must be verified for every feature. Security
    is not something you add later; it must be verified at each QA checkpoint.
  how_to_do_right: >
    1. Verify authentication: every endpoint that should be protected requires a valid token/session.

    2. Verify authorization: users can only access their own resources (test with user A accessing user B's data).

    3. Verify input validation: malformed input returns 4xx, not 5xx or successful response.

    4. Verify output encoding: user-generated content is escaped before rendering.

    5. Verify secrets management: no hardcoded secrets, all secrets from env vars or vault.

    6. Verify rate limiting: endpoints have appropriate rate limits.

    7. Verify audit logging: security-sensitive operations are logged with actor identity.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition]
  example_good: |
    class TestSecurityRequirements:
        def test_unauthenticated_access_blocked(self):
            response = client.get("/api/claims/123")  # No auth header
            assert response.status_code == 401

        def test_user_cannot_access_other_users_data(self):
            response = client.get(
                "/api/claims/123",
                headers={"Authorization": f"Bearer {user_b_token}"},
            )
            assert response.status_code == 403  # user_b cannot access user_a's claim

        def test_sql_injection_blocked(self):
            response = client.get("/api/claims?search='; DROP TABLE claims;--")
            assert response.status_code in (400, 422)  # Rejected, not executed

        def test_no_hardcoded_secrets(self):
            """Scan codebase for hardcoded secrets."""
            import subprocess
            result = subprocess.run(
                ["grep", "-r", "sk-", "src/", "--include=*.py"],
                capture_output=True, text=True,
            )
            assert result.stdout == "", f"Found hardcoded secrets: {result.stdout}"
  example_bad: |
    # "Security will be added in the security sprint"
    # Feature shipped without authentication
    # 3 weeks later, security sprint is deprioritized
    # 6 months later, endpoint is still publicly accessible
  when_applies: During QA review of every feature that handles user data, exposes an API endpoint, or processes external input. Security verification is not optional.
  sources: ["https://owasp.org/www-project-application-security-verification-standard/"]

- id: PQC-005
  text: "Omission detection — actively look for what is MISSING, not just what is wrong. The most dangerous bugs are features that were never implemented, not features that were implemented incorrectly."
  why: >
    Code review and QA naturally focus on what exists — is this code correct? But the most impactful bugs are
    things that do not exist at all. A missing error handler means errors crash the app. A missing rate limiter
    means the API can be DDoSed. A missing index means queries are slow. A missing rollback means failed deploys
    are unrecoverable. Omission detection requires a different mindset: instead of "is this right?" ask "what is
    missing?" Use the spec, architecture docs, and checklists to systematically find gaps.
  how_to_do_right: >
    1. Use a checklist of common omissions for each type of code:
       - API endpoint: auth, validation, error handling, rate limiting, logging, metrics, docs
       - Database model: migration, index, constraint, audit fields, soft delete
       - Background job: retry, timeout, dead letter queue, idempotency, monitoring

    2. Compare code against the specification — every RF and INV should be traceable.

    3. Look for asymmetry: if there is a create, is there a delete? If there is a write, is there a read?

    4. Check for cleanup: resources opened (files, connections, transactions) must be closed.

    5. Check for observability: can you tell from logs/metrics if this code is working correctly in production?
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition]
  example_good: |
    # Omission Checklist for API endpoint /api/claims/{id}:
    # [x] Authentication: @require_auth decorator
    # [x] Authorization: verify_ownership(claim, current_user)
    # [x] Input validation: Pydantic model validates claim_id format
    # [x] Error handling: try/except with proper HTTP status codes
    # [x] Rate limiting: @rate_limit(100, per="minute")
    # [ ] Logging: MISSING — no structured log for claim access
    # [ ] Metrics: MISSING — no latency/success/failure counters
    # [x] Documentation: OpenAPI schema generated from Pydantic model

    # Findings: 2 omissions (logging, metrics) — must be added before promotion
  example_bad: |
    # QA reviews the endpoint code:
    # "Code looks correct, all functions work, tests pass"
    # Never asks: "What is missing?"
    # Result: endpoint works but has no logging, no metrics, no rate limiting
    # Discovered 3 months later during an incident
  when_applies: During every QA review and code review. Omission detection is a separate pass from correctness checking — you need both.
  sources: ["https://martinfowler.com/bliki/BeckDesignRules.html"]

- id: PQC-006
  text: "Deterministic checking — separate checks that can be automated (linting, type checking, coverage) from checks that require human judgment (architecture, UX, naming). Automate everything automatable."
  why: >
    Human attention is expensive and unreliable. If a reviewer spends time checking indentation, import ordering,
    or type errors, they have less attention for the things that actually require human judgment (architecture
    decisions, naming clarity, edge case identification). Automate all deterministic checks so that human reviewers
    can focus on what only humans can do. A CI pipeline that enforces formatting, linting, type checking, and
    coverage means the reviewer only sees code that already passes the mechanical checks.
  how_to_do_right: >
    1. Categorize all checks into DETERMINISTIC (can be automated) and JUDGMENTAL (requires human).

    2. Automate ALL deterministic checks in CI: linting (ruff), type checking (mypy), formatting (black), coverage (pytest-cov), security scanning (bandit).

    3. Make CI checks blocking — fail the build if any automated check fails.

    4. Document what the human reviewer should focus on: architecture fit, naming clarity, edge cases, business logic correctness.

    5. Review the automated checks periodically — add new rules for patterns you keep catching manually.

    6. Never ask a human to check something a computer can check.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition]
  example_good: |
    # CI pipeline (automated — runs on every PR):
    # 1. ruff check src/ → formatting and linting
    # 2. mypy src/ --strict → type checking
    # 3. pytest --cov=src --cov-fail-under=90 → coverage
    # 4. bandit -r src/ → security scanning
    # 5. python scripts/check_separation.py → architecture boundary

    # Human review checklist (only after CI passes):
    # [ ] Does the architecture fit the existing patterns?
    # [ ] Are names clear and descriptive?
    # [ ] Are edge cases handled?
    # [ ] Is the business logic correct per the spec?
    # [ ] Are there any omissions?
  example_bad: |
    # PR review comment: "Please fix the indentation on line 47"
    # PR review comment: "This import is unused"
    # PR review comment: "Missing type hint on return value"
    # Reviewer spent 30 minutes on things ruff/mypy would catch in 2 seconds
    # No time left to review actual logic
  when_applies: When setting up QA processes, CI pipelines, and code review guidelines. Revisit periodically to move more checks from human to automated.
  sources: ["https://martinfowler.com/articles/practical-test-pyramid.html"]

- id: PQC-007
  text: "Spec-code traceability matrix — maintain a living document that maps every spec requirement to its implementation file, function, and test. Update it with every sprint."
  why: >
    Without traceability, you cannot answer basic questions: "Is RF-005 implemented?" "Which code implements
    INV-003?" "Which tests verify EDGE-007?" In large projects, these questions arise constantly — during QA,
    during audits, during debugging, and during onboarding. A traceability matrix makes these questions O(1)
    lookups instead of O(n) codebase searches. It also makes it impossible for requirements to be silently
    dropped — every RF without a corresponding row in the matrix is a visible gap.
  how_to_do_right: >
    1. Create a table with columns: Requirement ID, Description, Implementation File(s), Function(s), Test File(s), Status.

    2. Populate it during or immediately after each sprint.

    3. Status values: IMPLEMENTED + TESTED, IMPLEMENTED (no test), GAP (not implemented), N/A.

    4. Store it in a machine-readable format (YAML, CSV) so it can be validated automatically.

    5. Add a CI check that verifies: all referenced files exist, all referenced functions exist.

    6. Review the matrix during sprint planning to identify gaps from previous sprints.

    7. Keep it in version control — it is a living document that evolves with the code.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition]
  example_good: |
    # traceability/S00_matrix.yaml
    requirements:
      - id: RF-S00-001
        description: "Models must inherit from BaseModel"
        implementation:
          file: src/veritas/core/models.py
          function: Claim
        test:
          file: tests/test_models.py
          function: test_claim_is_basemodel
        status: IMPLEMENTED_AND_TESTED

      - id: RF-S00-002
        description: "Claims must have source tracking"
        implementation:
          file: src/veritas/core/models.py
          function: Claim.source
        test:
          file: tests/test_models.py
          function: test_claim_has_source
        status: IMPLEMENTED_AND_TESTED

      - id: INV-S00-001
        description: "All models serializable"
        implementation:
          file: src/veritas/core/models.py
          function: Claim.model_dump
        test:
          file: tests/test_models.py
          function: test_claim_serialization
        status: IMPLEMENTED_AND_TESTED
  example_bad: |
    # "Which requirements are implemented?"
    # Developer: "I think all of them... let me check... (searches codebase for 30 minutes)"
    # QA: "Is INV-003 enforced?"
    # Developer: "What's INV-003?" (goes to spec, reads it, searches code, not sure)
    # No traceability matrix → every question requires manual investigation
  when_applies: At the end of every sprint and during every QA review. The matrix should be updated as part of the Definition of Done for each sprint.
  sources: ["https://www.iso.org/standard/74528.html"]

- id: PQC-008
  text: "Acceptance criteria verification — every user story or feature must have explicit, testable acceptance criteria written BEFORE implementation. Verify each criterion with a concrete test."
  why: >
    Without acceptance criteria, "done" is subjective. One developer thinks "done" means the happy path works.
    Another thinks it means all edge cases are handled. The product owner thinks it means the UX is polished.
    Acceptance criteria eliminate this ambiguity by defining exactly what "done" means in testable terms. They also
    prevent scope creep — if it is not in the acceptance criteria, it is not in scope for this sprint. Writing
    criteria BEFORE implementation ensures they are objective, not reverse-engineered from what was built.
  how_to_do_right: >
    1. Write acceptance criteria BEFORE implementation, in Given/When/Then format.

    2. Each criterion must be testable — if you cannot write a test for it, it is too vague.

    3. Include both positive (happy path) and negative (error) criteria.

    4. Include performance criteria where relevant (response time, throughput).

    5. Review criteria with stakeholders before implementation starts.

    6. For each criterion, write a corresponding test (automated or manual test plan).

    7. A feature is "done" when ALL acceptance criteria tests pass.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition]
  example_good: |
    # User Story: As a user, I can verify a claim
    # Acceptance Criteria:
    # AC-1: Given a valid claim text, When I submit it, Then I receive a verification result within 5 seconds
    # AC-2: Given an empty claim text, When I submit it, Then I receive a 422 error with a clear message
    # AC-3: Given the LLM is unavailable, When I submit a claim, Then I receive a 503 with retry-after header
    # AC-4: Given a claim that was already verified, When I submit it again, Then I receive the cached result

    def test_ac1_valid_claim_verified():
        start = time.time()
        response = client.post("/verify", json={"text": "Earth orbits the Sun"})
        assert response.status_code == 200
        assert time.time() - start < 5

    def test_ac2_empty_claim_rejected():
        response = client.post("/verify", json={"text": ""})
        assert response.status_code == 422

    def test_ac3_llm_unavailable_returns_503():
        with patch("llm.call", side_effect=TimeoutError):
            response = client.post("/verify", json={"text": "test"})
            assert response.status_code == 503
            assert "retry-after" in response.headers
  example_bad: |
    # User Story: As a user, I can verify a claim
    # Acceptance Criteria: "It should work"
    # Developer implements happy path only
    # QA: "What happens with empty input?"
    # Developer: "That wasn't in the requirements"
    # Product: "Obviously it should handle errors"
    # 3 rounds of rework
  when_applies: Before starting implementation of any feature or user story. Acceptance criteria are part of the Definition of Ready (a story is not ready for implementation without them).
  sources: ["https://www.agilealliance.org/glossary/acceptance-criteria/"]

- id: PQC-009
  text: "Non-functional requirement testing — test performance, scalability, reliability, and security as first-class requirements, not afterthoughts. NFRs violated in production are the most expensive bugs."
  why: >
    Non-functional requirements (NFRs) — performance, scalability, reliability, security — are usually specified
    loosely ("the system should be fast") and tested never. But NFR violations in production are the most expensive
    bugs: a slow API loses users, a system that does not scale loses revenue, an unreliable service loses trust.
    NFRs must be as specific and testable as functional requirements: "P99 latency < 200ms under 100 concurrent
    requests" is testable. "The system should be fast" is not.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition]
  how_to_do_right: >
    1. Define NFRs with specific, measurable targets: latency (p50, p95, p99), throughput (req/sec), error rate (%), availability (%).

    2. Write automated performance tests that verify these targets.

    3. Run performance tests in CI on every merge to main (catch regressions early).

    4. Use realistic data volumes (not 10 rows — use 100K+ rows).

    5. Test under concurrent load (not just sequential requests).

    6. Track NFR metrics over time — a 5% regression per week becomes 50x in a year.

    7. Set alerts on NFR violations in production.
  example_good: |
    import pytest
    import asyncio
    import time

    @pytest.mark.performance
    def test_claim_verification_latency():
        """P99 latency must be < 500ms for claim verification."""
        latencies = []
        for _ in range(100):
            start = time.monotonic()
            response = client.post("/verify", json={"text": "Test claim"})
            latencies.append(time.monotonic() - start)
            assert response.status_code == 200

        p99 = sorted(latencies)[98]  # 99th percentile
        assert p99 < 0.5, f"P99 latency {p99:.3f}s exceeds 500ms SLO"

    @pytest.mark.performance
    async def test_concurrent_requests():
        """System must handle 50 concurrent verifications."""
        tasks = [verify_claim(f"Claim {i}") for i in range(50)]
        results = await asyncio.gather(*tasks)
        errors = [r for r in results if r.status_code != 200]
        assert len(errors) == 0, f"{len(errors)} requests failed under load"
  example_bad: |
    # "We'll do performance testing before launch"
    # Launch is moved up 2 weeks
    # Performance testing is cut from scope
    # Production: P99 latency is 12 seconds
    # Users leave before results load
  when_applies: During QA review of every feature that has performance, scalability, or reliability implications. NFR tests should run in CI alongside functional tests.
  sources: ["https://sre.google/sre-book/service-level-objectives/"]

- id: PQC-010
  text: "API contract testing — verify that API producers and consumers agree on the exact schema. A producer that changes a field type from string to int breaks every consumer silently."
  why: >
    In distributed systems, APIs are the contracts between services. When a producer changes its API without
    updating consumers, the result is silent failures: the consumer parses a string where it expects an int,
    gets None for a renamed field, or crashes on a new required field. Contract testing verifies that both sides
    agree on the schema. It catches breaking changes before they reach production, where they cause cascading
    failures across services.
  how_to_do_right: >
    1. Define API schemas explicitly using OpenAPI, JSON Schema, or Pydantic models.

    2. Generate client code from schemas (or validate responses against schemas at the boundary).

    3. Write contract tests: producer tests that the response matches the schema, consumer tests that the client can parse the response.

    4. When changing an API, check all consumers BEFORE deploying the producer change.

    5. Use schema versioning for breaking changes (v1/claims vs v2/claims).

    6. Never remove or rename a field without deprecation (add new field, migrate consumers, remove old field).
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition]
  example_good: |
    from pydantic import BaseModel
    from fastapi.testclient import TestClient

    class ClaimResponse(BaseModel):
        id: str
        text: str
        verdict: str
        confidence: float
        sources: list[str]

    def test_api_contract_claim_response():
        """Verify API response matches the contract schema."""
        response = client.get("/api/claims/123")
        assert response.status_code == 200
        # Pydantic validates ALL fields exist with correct types:
        parsed = ClaimResponse.model_validate(response.json())
        assert 0 <= parsed.confidence <= 1
        assert parsed.verdict in ("TRUE", "FALSE", "UNCERTAIN")

    def test_api_contract_backward_compatible():
        """Verify old clients can still parse the response."""
        response = client.get("/api/claims/123")
        data = response.json()
        # Old client expects these fields — they must still exist:
        assert "id" in data
        assert "text" in data
        assert "verdict" in data
  example_bad: |
    # Producer changes: confidence from float to dict {"score": 0.8, "model": "gpt-4"}
    # No contract test catches this
    # Consumer: confidence = response["confidence"] * 100
    # TypeError: unsupported operand type(s) for *: 'dict' and 'int'
    # Discovered at 3 AM by the on-call engineer
  when_applies: Every API boundary between services, between frontend and backend, and between your service and third-party APIs. Also applies to message queue schemas and event schemas.
  sources: ["https://martinfowler.com/articles/consumer-driven-contracts.html", "https://docs.pact.io/"]

- id: PQC-011
  text: "Data validation testing — verify that ALL data entering the system is validated at the boundary. Invalid data that enters the system corrupts everything it touches downstream."
  why: >
    Data validation is the immune system of your application. Invalid data that passes the boundary layer will
    corrupt the database, produce wrong business logic results, and generate confusing errors deep in the stack.
    The boundary is the cheapest place to catch invalid data — you have the full context of the request, and you
    can return a clear error message to the caller. Once invalid data enters the system, it becomes progressively
    harder to identify and fix.
  how_to_do_right: >
    1. Define validation rules for EVERY field in EVERY input model.

    2. Use Pydantic validators (field_validator, model_validator) for complex validation.

    3. Test EACH validation rule independently with a test that sends invalid data and verifies rejection.

    4. Test combinations of invalid data (multiple fields invalid simultaneously).

    5. Validate at the boundary (API endpoint, message consumer, file parser), not deep in business logic.

    6. Return actionable error messages: which field is invalid, what was expected, what was received.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition]
  example_good: |
    import pytest

    class TestClaimInputValidation:
        def test_text_required(self):
            response = client.post("/verify", json={"source": "test"})
            assert response.status_code == 422
            assert "text" in response.json()["detail"][0]["loc"]

        def test_text_min_length(self):
            response = client.post("/verify", json={"text": "ab", "source": "test"})
            assert response.status_code == 422

        def test_text_max_length(self):
            response = client.post("/verify", json={"text": "a" * 100001, "source": "test"})
            assert response.status_code == 422

        def test_source_must_be_url_or_known_source(self):
            response = client.post("/verify", json={"text": "claim", "source": ""})
            assert response.status_code == 422

        def test_multiple_validation_errors_returned(self):
            response = client.post("/verify", json={})
            errors = response.json()["detail"]
            assert len(errors) >= 2  # Both text and source are missing
  example_bad: |
    @app.post("/verify")
    async def verify(data: dict):  # No Pydantic model, no validation
        text = data.get("text", "")  # Empty string if missing — silent bug
        result = await process(text)  # Processes empty string, returns garbage
        return result  # 200 OK with wrong data
  when_applies: Every API endpoint, message consumer, file parser, and form handler. Data validation tests should be as thorough as business logic tests.
  sources: ["https://cheatsheetseries.owasp.org/cheatsheets/Input_Validation_Cheat_Sheet.html"]

- id: PQC-012
  text: "Error handling coverage — test that every error path returns an appropriate response. An untested error handler is likely broken — error handlers have the least test coverage and the most bugs."
  why: >
    Error handlers are the least tested code in most applications because developers focus on the happy path.
    But error handlers run in production more often than you think — network timeouts, database errors, malformed
    input, and race conditions happen constantly. An error handler that swallows the exception, returns 200 with
    empty data, or crashes with an unhandled exception is worse than no error handler at all because it hides the
    problem. Every error path must be tested with the same rigor as the happy path.
  how_to_do_right: >
    1. For every try/except block, write a test that triggers the except path.

    2. Verify the correct HTTP status code is returned (4xx for client errors, 5xx for server errors).

    3. Verify the error response body contains actionable information.

    4. Verify the error is logged with appropriate context (request_id, user_id, error details).

    5. Verify error metrics are emitted (error counter, error type distribution).

    6. Test cascading failures: what happens when error handler itself throws?

    7. Never use bare except — always catch specific exceptions.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition]
  example_good: |
    import pytest
    from unittest.mock import patch

    class TestErrorHandling:
        def test_database_error_returns_500(self):
            with patch("db.query", side_effect=ConnectionError("DB down")):
                response = client.get("/claims/123")
                assert response.status_code == 500
                assert "database" in response.json()["detail"].lower()

        def test_timeout_error_returns_504(self):
            with patch("llm.call", side_effect=TimeoutError("LLM timeout")):
                response = client.post("/verify", json={"text": "test"})
                assert response.status_code == 504

        def test_not_found_returns_404(self):
            response = client.get("/claims/nonexistent-id")
            assert response.status_code == 404

        def test_rate_limit_returns_429(self):
            for _ in range(101):  # Exceed rate limit
                client.get("/claims/123")
            response = client.get("/claims/123")
            assert response.status_code == 429
            assert "retry-after" in response.headers
  example_bad: |
    @app.get("/claims/{claim_id}")
    async def get_claim(claim_id: str):
        try:
            return await db.get_claim(claim_id)
        except Exception:
            pass  # Swallowed! Returns None → FastAPI returns 200 with null body

    # Or worse:
    @app.get("/claims/{claim_id}")
    async def get_claim(claim_id: str):
        return await db.get_claim(claim_id)  # No error handling at all
        # Database down → unhandled exception → generic 500 with no context
  when_applies: During QA review of every function that has error handling. Test every except block, every error return path, and every fallback mechanism.
  sources: ["https://docs.python.org/3/howto/logging.html"]

- id: PQC-013
  text: "State transition testing — for any system with states (FSM, workflow, pipeline stages), test EVERY valid transition AND verify that invalid transitions are blocked."
  why: >
    State machines are powerful because they make valid behavior explicit. But a state machine that allows invalid
    transitions is worse than no state machine at all — it gives false confidence. In pipeline systems, a claim
    that goes from PENDING to VERIFIED without passing through REVIEW violates the workflow. A sprint that goes
    from SPEC to DONE without QA skips quality gates. Testing every valid transition ensures the happy paths work.
    Testing that invalid transitions are blocked ensures the guardrails work.
  how_to_do_right: >
    1. Draw the state diagram with ALL valid transitions.

    2. Write a test for EACH valid transition (N transitions = N tests).

    3. Write tests for EACH invalid transition (state A → state C should be blocked).

    4. Test the initial state: new objects must start in the correct initial state.

    5. Test terminal states: objects in terminal states must reject all transitions.

    6. Test concurrent transitions: two simultaneous transitions on the same object must not corrupt state.

    7. Verify state transitions are logged for audit trail.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition]
  example_good: |
    import pytest

    class TestClaimStateMachine:
        # Valid transitions
        def test_pending_to_review(self):
            claim = Claim(status=ClaimStatus.PENDING)
            claim.transition_to(ClaimStatus.IN_REVIEW)
            assert claim.status == ClaimStatus.IN_REVIEW

        def test_review_to_verified(self):
            claim = Claim(status=ClaimStatus.IN_REVIEW)
            claim.transition_to(ClaimStatus.VERIFIED)
            assert claim.status == ClaimStatus.VERIFIED

        # Invalid transitions
        def test_pending_to_verified_blocked(self):
            claim = Claim(status=ClaimStatus.PENDING)
            with pytest.raises(InvalidTransitionError):
                claim.transition_to(ClaimStatus.VERIFIED)  # Must go through REVIEW

        def test_terminal_state_rejects_all(self):
            claim = Claim(status=ClaimStatus.ARCHIVED)
            for status in ClaimStatus:
                if status != ClaimStatus.ARCHIVED:
                    with pytest.raises(InvalidTransitionError):
                        claim.transition_to(status)
  example_bad: |
    # State is just a string field with no validation:
    claim.status = "verified"  # Can be set to anything at any time
    claim.status = "banana"    # No validation, no error
    # State machine exists in documentation but not in code
  when_applies: "Any system with defined states: FSMs, workflow engines, pipeline stages, order processing, claim verification status, user account lifecycle."
  sources: ["https://martinfowler.com/bliki/FiniteStateMachine.html"]

- id: PQC-014
  text: "Permission model testing — test that EVERY role can do what it should and CANNOT do what it should not. A permission model that only tests positive cases is broken."
  why: >
    Permission models are defined as a matrix: roles vs operations. But most testing only covers the positive cases
    ("admin can create users"). The dangerous gaps are in the negative cases ("viewer cannot delete users"). If you
    only test that authorized users CAN do things, you never verify that unauthorized users CANNOT. This is the
    root cause of most authorization vulnerabilities — the permission check exists in theory but has a bug that
    allows escalation.
  how_to_do_right: >
    1. Define the full permission matrix: all roles x all operations.

    2. For EACH cell in the matrix, write a test:
       - If ALLOWED: test that the operation succeeds with that role.
       - If DENIED: test that the operation returns 403 with that role.

    3. Test role escalation: can a user change their own role?

    4. Test permission inheritance: if admin can do X, can super-admin do X?

    5. Test with no role: unauthenticated requests must be rejected.

    6. Test resource-level permissions: user A can only edit their own resources.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition]
  example_good: |
    import pytest

    PERMISSION_MATRIX = {
        # (role, operation): expected_status
        ("admin", "create_user"): 201,
        ("admin", "delete_user"): 200,
        ("admin", "view_claims"): 200,
        ("viewer", "create_user"): 403,  # DENIED
        ("viewer", "delete_user"): 403,  # DENIED
        ("viewer", "view_claims"): 200,
        ("anonymous", "create_user"): 401,  # UNAUTHENTICATED
        ("anonymous", "delete_user"): 401,
        ("anonymous", "view_claims"): 401,
    }

    @pytest.mark.parametrize("role,operation,expected_status", [
        (*k, v) for k, v in PERMISSION_MATRIX.items()
    ])
    def test_permission_matrix(role, operation, expected_status):
        token = get_token_for_role(role) if role != "anonymous" else None
        response = execute_operation(operation, token=token)
        assert response.status_code == expected_status, (
            f"Role {role} performing {operation}: "
            f"expected {expected_status}, got {response.status_code}"
        )
  example_bad: |
    def test_admin_can_create_user():
        response = client.post("/users", headers=admin_headers, json=user_data)
        assert response.status_code == 201
        # Only positive test — never checks that viewer CANNOT create users

    # Viewer sends the same request → 201 Created
    # Permission bug undetected because negative case was never tested
  when_applies: Every system with role-based access control (RBAC), attribute-based access control (ABAC), or any permission model. Must be tested comprehensively before production.
  sources: ["https://cheatsheetseries.owasp.org/cheatsheets/Authorization_Cheat_Sheet.html"]

- id: PQC-015
  text: "Audit trail verification — verify that ALL security-sensitive and business-critical operations produce audit records with WHO, WHAT, WHEN, and the BEFORE/AFTER state."
  why: >
    Audit trails are not just a compliance requirement — they are a debugging lifeline. When something goes wrong
    in production, the first question is "who changed what, and when?" Without audit trails, this question requires
    manual log spelunking across multiple services. With proper audit trails, it is a single query. The most common
    audit trail failures are: (1) logging the action but not who did it, (2) logging the new state but not the old
    state (what changed?), (3) not logging at all for "internal" operations (which are the most dangerous).
  how_to_do_right: >
    1. Define which operations are audit-worthy: data modifications, permission changes, authentication events, configuration changes.

    2. For each audit-worthy operation, capture: actor (who), action (what), timestamp (when), resource (on what), before_state, after_state.

    3. Write tests that verify audit records are created for each operation.

    4. Verify audit records cannot be modified or deleted (append-only).

    5. Verify audit records include enough context to reconstruct what happened.

    6. Test that failed operations also create audit records (failed login attempts, denied access).
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition]
  example_good: |
    def test_claim_update_creates_audit_record():
        # Arrange
        claim = create_claim(text="Original text", user=admin)

        # Act
        client.patch(
            f"/claims/{claim.id}",
            json={"text": "Updated text"},
            headers=admin_headers,
        )

        # Assert audit record
        audit = get_audit_records(resource_id=claim.id)
        assert len(audit) == 2  # create + update
        update_record = audit[1]
        assert update_record.actor == admin.id
        assert update_record.action == "claim.update"
        assert update_record.before_state["text"] == "Original text"
        assert update_record.after_state["text"] == "Updated text"
        assert update_record.timestamp is not None

    def test_failed_login_creates_audit_record():
        client.post("/auth/login", json={"email": "admin@test.com", "password": "wrong"})
        audit = get_audit_records(action="auth.login_failed")
        assert len(audit) >= 1
  example_bad: |
    @app.patch("/claims/{claim_id}")
    async def update_claim(claim_id: str, data: ClaimUpdate):
        claim = await db.get_claim(claim_id)
        claim.text = data.text
        await db.save(claim)
        return claim
        # No audit record — who changed this? When? What was the old value?
  when_applies: Every data modification, permission change, authentication event, and configuration change. Audit trail completeness should be verified during every QA review.
  sources: ["https://cheatsheetseries.owasp.org/cheatsheets/Logging_Cheat_Sheet.html"]

- id: PQC-016
  text: "Data retention compliance — verify that data is retained for the required period and deleted after. Both premature deletion and indefinite retention are compliance violations."
  why: >
    Data retention is a legal and regulatory requirement (GDPR, CCPA, HIPAA). Retaining data too long exposes you
    to data breach liability. Deleting data too soon violates audit requirements. The most common failure is
    indefinite retention — data is never deleted because nobody implements the deletion mechanism. The second most
    common failure is inconsistent retention — user data is deleted from the primary database but not from backups,
    logs, or analytics databases.
  how_to_do_right: >
    1. Define retention periods for each data category (user data, logs, audit records, analytics).

    2. Implement automated deletion mechanisms (cron jobs, TTL on database records).

    3. Test that data is actually deleted after the retention period (not just marked as deleted).

    4. Verify deletion is consistent across all storage systems (primary DB, backups, cache, logs, analytics).

    5. Implement and test "right to deletion" (GDPR Article 17) for user-requested deletion.

    6. Audit retention compliance periodically — verify no data exists past its retention period.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition]
  example_good: |
    import pytest
    from datetime import datetime, timedelta
    from unittest.mock import patch

    def test_user_data_deleted_after_retention_period():
        """User data must be deleted after 90 days of account deletion."""
        user = create_user(email="test@example.com")
        delete_user(user.id)

        # Simulate 91 days passing
        with patch("datetime.datetime") as mock_dt:
            mock_dt.now.return_value = datetime.now() + timedelta(days=91)
            run_retention_cleanup()

        # Verify data is gone from ALL storage:
        assert db.get_user(user.id) is None
        assert cache.get(f"user:{user.id}") is None
        assert search_index.get(user.id) is None

    def test_right_to_deletion():
        """Users can request immediate deletion of their data."""
        user = create_user(email="test@example.com")
        response = client.delete(f"/users/{user.id}", headers=user_headers)
        assert response.status_code == 200
        assert db.get_user(user.id) is None
  example_bad: |
    # No retention policy defined
    # User accounts table has 5 million rows, including users who left 3 years ago
    # Their data is still in the database, still in backups, still in analytics
    # GDPR audit: "You retained personal data for 3 years with no legal basis"
  when_applies: Any system that stores personal data (user accounts, usage logs, analytics). Retention testing should be part of compliance verification before launch and during periodic audits.
  sources: ["https://gdpr-info.eu/art-17-gdpr/", "https://www.planalto.gov.br/ccivil_03/_ato2015-2018/2018/lei/l13709.htm"]

- id: PQC-017
  text: "Accessibility compliance — verify that UI components meet WCAG 2.1 AA standards. Accessibility is not a nice-to-have; it is a legal requirement in many jurisdictions."
  why: >
    Accessibility affects 15-20% of users (visual impairments, motor disabilities, cognitive differences). In many
    jurisdictions (ADA in US, EAA in EU), inaccessible software is a legal liability. Beyond compliance, accessible
    design improves UX for all users — keyboard navigation, clear contrast, semantic HTML, and descriptive labels
    benefit everyone. The cost of retrofitting accessibility is 10-100x higher than building it in from the start.
  how_to_do_right: >
    1. Use semantic HTML elements (button, nav, main, article) not generic div/span for everything.

    2. All images must have alt text. Decorative images use alt="".

    3. All form inputs must have associated labels (not just placeholder text).

    4. Color contrast must meet WCAG 2.1 AA: 4.5:1 for normal text, 3:1 for large text.

    5. All functionality must be accessible via keyboard (no mouse-only interactions).

    6. Use ARIA attributes correctly where semantic HTML is insufficient.

    7. Run automated accessibility tests (axe-core, lighthouse) in CI.

    8. Perform manual testing with screen reader (VoiceOver, NVDA) for critical flows.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition]
  example_good: |
    # Automated accessibility test with axe-core:
    from playwright.sync_api import sync_playwright
    from axe_playwright_python import Axe

    def test_homepage_accessibility():
        with sync_playwright() as p:
            browser = p.chromium.launch()
            page = browser.new_page()
            page.goto("http://localhost:3000")

            axe = Axe()
            results = axe.run(page)

            violations = results["violations"]
            assert len(violations) == 0, (
                f"Accessibility violations: "
                + "\n".join(f"- {v['id']}: {v['description']}" for v in violations)
            )

    # Manual checklist:
    # [x] Tab through all interactive elements in order
    # [x] Screen reader announces all content meaningfully
    # [x] Color is not the only means of conveying information
    # [x] Focus indicators are visible
  example_bad: |
    # <div onclick="submit()">Submit</div>
    # Not a button — no keyboard access, no screen reader announcement
    # <img src="chart.png">
    # No alt text — screen reader says "image"
    # <input placeholder="Email">
    # No label — screen reader says "edit text"
  when_applies: Every UI component and page. Accessibility tests should run in CI alongside functional tests. Manual screen reader testing for critical user flows before launch.
  sources: ["https://www.w3.org/WAI/WCAG21/quickref/"]

- id: PQC-018
  text: "Performance SLO verification — define and test Service Level Objectives before launch, not after the first incident. SLOs without automated verification are just wishes."
  why: >
    A Service Level Objective (SLO) defines the minimum acceptable performance: "99.9% of requests complete in
    under 500ms." Without SLOs, performance degradation goes unnoticed until users complain. Without automated
    SLO verification, SLOs are just numbers in a document that nobody checks. The cost of defining and testing
    SLOs before launch is hours. The cost of discovering performance issues in production is days of incident
    response, user churn, and reputation damage.
  how_to_do_right: >
    1. Define SLOs for EVERY critical path: latency (p50, p95, p99), availability (%), error rate (%).

    2. Write automated tests that verify SLOs under realistic load.

    3. Run SLO verification tests in CI with every merge to main.

    4. Set up monitoring dashboards that show SLO compliance in real time.

    5. Set up alerts that fire when SLO burn rate indicates the SLO will be violated within the error budget window.

    6. Review SLOs quarterly — adjust based on actual usage patterns and business requirements.

    7. Use error budgets to balance reliability with feature velocity.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition]
  example_good: |
    # SLO Definition:
    # - Availability: 99.9% (43.8 min downtime/month budget)
    # - Latency: p99 < 500ms for /verify endpoint
    # - Error rate: < 0.1% for all endpoints

    import pytest
    import time

    @pytest.mark.slo
    def test_slo_latency_p99():
        """SLO: p99 latency < 500ms for claim verification."""
        latencies = []
        for _ in range(1000):
            start = time.monotonic()
            response = client.post("/verify", json={"text": f"Test claim"})
            latencies.append(time.monotonic() - start)

        p99 = sorted(latencies)[989]
        assert p99 < 0.5, f"SLO VIOLATION: p99={p99:.3f}s > 500ms"

    @pytest.mark.slo
    def test_slo_error_rate():
        """SLO: error rate < 0.1% for all endpoints."""
        total = 1000
        errors = 0
        for _ in range(total):
            response = client.post("/verify", json={"text": "Test"})
            if response.status_code >= 500:
                errors += 1

        error_rate = errors / total
        assert error_rate < 0.001, f"SLO VIOLATION: error_rate={error_rate:.4f} > 0.1%"
  example_bad: |
    # "What are our SLOs?"
    # "We don't have formal SLOs yet"
    # "How do we know if performance is acceptable?"
    # "Users will tell us"
    # Users told them — by leaving
  when_applies: Before launching any production service. SLO tests should be maintained and run regularly, not just before launch. Review SLOs quarterly.
  sources: ["https://sre.google/sre-book/service-level-objectives/"]
