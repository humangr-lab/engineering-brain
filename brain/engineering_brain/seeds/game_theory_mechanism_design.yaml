- id: FIN-GAME-012
  text: "Sybil resistance prevents a single actor from gaining disproportionate influence by creating multiple identities. Proof-of-stake (1 token = 1 vote) resists Sybils but enables plutocracy. Quadratic voting (cost = votes^2) balances intensity of preference with equality. Proof-of-personhood (biometrics, social vouching) is the strongest Sybil resistance but hardest to implement. For prediction markets: quadratic funding for public goods, position limits per identity."
  why: >
    Without Sybil resistance, every voting, staking, and governance mechanism is trivially
    attackable. A single actor creates N accounts and gets N votes instead of 1. In
    prediction markets, Sybil attacks enable wash trading, manipulation of governance
    votes, and circumvention of position limits. Quadratic voting (Buterin, Hitzig,
    Weyl 2018) is a breakthrough: the cost to buy k votes is k^2 dollars, meaning
    buying 10 votes costs 100 while 10 people buying 1 vote each costs only 10 total.
    This naturally penalizes concentrated influence while rewarding broad support.
    Gitcoin Grants has distributed $50M+ using quadratic funding, demonstrating the
    practical viability of these mechanisms.
  how_to_do_right: |
    1. Proof-of-Stake (1 token = 1 vote):
       - Pro: Sybil-resistant (creating accounts doesn't create tokens)
       - Con: Plutocratic (wealthy control governance)
       - Use when: capital at risk aligns incentives (market making, staking)
    2. Quadratic Voting/Funding:
       - Cost of k votes = k^2 (in credits/tokens)
       - Optimal for public goods: matches preferences with intensity
       - Implementation: each identity gets equal credit allocation per period
       - Sybil vulnerability: if identity is cheap, split into sqrt(k) identities
    3. Proof-of-Personhood:
       - Worldcoin (iris scan), BrightID (social graph), Gitcoin Passport (composite)
       - Strongest resistance but privacy concerns and accessibility issues
       - Use as a complement, not replacement, for other mechanisms
    4. Position limits (prediction markets):
       - Max position per verified identity (e.g., $100K per market)
       - KYC-linked accounts for high limits
       - Monitor for coordinated positions across related markets
    5. Quadratic Funding formula:
       - Match = (sum(sqrt(c_i)))^2 - sum(c_i) where c_i = individual contributions
       - Many small contributions get MORE matching than few large ones
    6. Defense in depth:
       - Combine: KYC + rate limiting + position limits + behavioral analysis
       - No single mechanism is sufficient — layer multiple defenses
  severity: critical
  technologies:
    lang: [python]
    framework: [numpy]
  domains:
    domain: [prediction_markets, game_theory, fintech]
    concern: [security, domain_specific]
  example_good: |
    import numpy as np
    from dataclasses import dataclass

    @dataclass
    class QuadraticVote:
        voter_id: str
        option: str
        votes: int
        cost: float  # votes^2

    class QuadraticVoting:
        """
        Quadratic voting: cost of k votes = k^2.
        Balances preference intensity with equality.
        """

        def __init__(self, options: list[str], credits_per_voter: int = 100):
            self.options = options
            self.credits = credits_per_voter
            self.votes: list[QuadraticVote] = []

        def cast_vote(self, voter_id: str, option: str, num_votes: int) -> dict:
            cost = num_votes ** 2
            if cost > self.credits:
                max_votes = int(np.sqrt(self.credits))
                return {"error": f"Cost {cost} exceeds budget {self.credits}. Max votes: {max_votes}"}

            self.votes.append(QuadraticVote(
                voter_id=voter_id, option=option, votes=num_votes, cost=cost
            ))
            return {"status": "accepted", "cost": cost, "remaining_credits": self.credits - cost}

        def tally(self) -> dict:
            results = {opt: 0 for opt in self.options}
            for vote in self.votes:
                results[vote.option] += vote.votes

            winner = max(results, key=results.get)
            return {"results": results, "winner": winner}

    class QuadraticFunding:
        """
        Quadratic funding for public goods (Buterin-Hitzig-Weyl).
        Match = (sum(sqrt(c_i)))^2 - sum(c_i)
        """

        def __init__(self, matching_pool: float):
            self.pool = matching_pool
            self.projects: dict[str, list[float]] = {}

        def contribute(self, project: str, amount: float):
            self.projects.setdefault(project, []).append(amount)

        def calculate_matches(self) -> dict:
            raw_matches = {}
            for project, contributions in self.projects.items():
                sqrt_sum = sum(np.sqrt(c) for c in contributions)
                qf_amount = sqrt_sum ** 2
                direct_sum = sum(contributions)
                raw_matches[project] = max(0, qf_amount - direct_sum)

            # Normalize to matching pool
            total_raw = sum(raw_matches.values())
            if total_raw == 0:
                return {p: 0 for p in self.projects}

            return {
                project: {
                    "contributions": sum(self.projects[project]),
                    "num_contributors": len(self.projects[project]),
                    "qf_match": round(match / total_raw * self.pool, 2),
                    "total": round(sum(self.projects[project]) + match / total_raw * self.pool, 2),
                }
                for project, match in raw_matches.items()
            }

    # Example: Quadratic Voting
    qv = QuadraticVoting(options=["proposal_A", "proposal_B", "proposal_C"], credits_per_voter=100)
    qv.cast_vote("alice", "proposal_A", 5)   # cost = 25
    qv.cast_vote("bob", "proposal_A", 3)     # cost = 9
    qv.cast_vote("carol", "proposal_B", 10)  # cost = 100 (all credits!)
    qv.cast_vote("dave", "proposal_B", 2)    # cost = 4

    tally = qv.tally()
    print(f"Results: {tally['results']}")
    # proposal_A: 8 votes (2 people), proposal_B: 12 votes
    # Carol's intense preference (10 votes = 100 credits) dominates
    # But if Carol splits into 10 Sybils: 10 * 1 vote = 10 cost, saves 90 credits!
    # → Need proof-of-personhood to prevent Sybil splitting

    # Example: Quadratic Funding
    qf = QuadraticFunding(matching_pool=10_000)
    # Project A: many small contributions
    for _ in range(100):
        qf.contribute("open_source_tool", 10)  # 100 people * $10 = $1000
    # Project B: one large contribution
    qf.contribute("whale_project", 1000)  # 1 person * $1000 = $1000

    matches = qf.calculate_matches()
    print(f"\nOpen source: {matches['open_source_tool']}")
    print(f"Whale project: {matches['whale_project']}")
    # Open source gets MUCH more matching: (100*sqrt(10))^2 >> (sqrt(1000))^2
    # This is the key insight: broad support > concentrated wealth
  example_bad: |
    # WRONG: One-account-one-vote without Sybil resistance
    def simple_vote(votes: dict[str, str]) -> str:
        from collections import Counter
        return Counter(votes.values()).most_common(1)[0][0]

    # Attacker creates 1000 accounts, votes 1000 times
    # Legitimate 500 users are outvoted
    # Without identity verification, democracy degrades to Sybil attack
  when_applies: "Designing voting systems, governance mechanisms, quadratic funding for public goods, prediction market position limits, or any multi-agent system where Sybil attacks are a threat."
  sources:
    - "https://vitalik.eth.limo/general/2021/08/16/voting3.html"
    - "https://en.wikipedia.org/wiki/Game_theory"

- id: FIN-GAME-013
  text: "Collusion resistance prevents groups of agents from coordinating to extract value at the expense of the mechanism or other participants. Anti-collusion mechanisms include commit-reveal schemes (hide votes until all submitted), MACI (Minimal Anti-Collusion Infrastructure using ZK proofs), and encrypted voting. For prediction markets: sealed-bid batch auctions, anonymous trading, and randomized resolution committees prevent coordinated manipulation."
  why: >
    Collusion is the Achilles' heel of many otherwise-secure mechanisms. VCG auctions,
    while DSIC, are vulnerable to bidder rings (colluding bidders submit low bids, split
    savings). Prediction market oracles can be attacked by reporter cartels. On-chain
    governance is vulnerable to vote buying. Buterin's MACI (Minimal Anti-Collusion
    Infrastructure) uses ZK proofs to make it impossible to PROVE how you voted, thereby
    making vote buying unenforceable — you can take the bribe and vote honestly, and the
    briber can't verify. This is a breakthrough in anti-collusion mechanism design.
    Gitcoin Grants implemented MACI for their quadratic funding rounds to prevent
    coordinated Sybil attacks on matching funds.
  how_to_do_right: |
    1. Commit-reveal schemes:
       - Phase 1 (commit): agents submit hash(answer || salt)
       - Phase 2 (reveal): agents reveal answer + salt
       - If reveal doesn't match commit: forfeit stake
       - Prevents copying others' answers (can't see answers during commit phase)
    2. MACI (Minimal Anti-Collusion Infrastructure):
       - Voters encrypt their votes with coordinator's public key
       - Coordinator decrypts, tallies, publishes result with ZK proof
       - Voters can change their vote secretly (makes bribery unenforceable)
       - Briber can't verify the bribed voter actually voted as instructed
    3. Anonymous trading (prediction markets):
       - Use mixing/shuffling to hide trader identity
       - Ring signatures or ZK proofs for anonymous order submission
       - Prevents cartels from verifying member compliance
    4. Randomized committees:
       - Select oracle reporters randomly from large pool
       - Identity revealed only after resolution
       - Collusion requires bribing the unknown — much harder
    5. Sealed-bid batch auctions:
       - Collect all orders in encrypted form
       - Decrypt and match simultaneously
       - No one can see others' orders before submitting their own
    6. Economic deterrents:
       - Whistleblower bounty: 10-30% of colluder's losses go to the reporter
       - Correlation penalty: if two accounts consistently agree, reduce their weight
  severity: high
  technologies:
    lang: [python]
    framework: [hashlib, numpy]
  domains:
    domain: [prediction_markets, game_theory, fintech]
    concern: [security, domain_specific]
  example_good: |
    import hashlib
    import secrets
    import time
    from dataclasses import dataclass, field

    @dataclass
    class Commitment:
        agent_id: str
        commit_hash: str
        commit_time: float
        revealed: bool = False
        reveal_value: str = ""
        reveal_salt: str = ""

    class CommitRevealScheme:
        """
        Two-phase commit-reveal to prevent collusion by hiding votes.
        Phase 1: Submit hash(vote || salt) — can't see others' votes
        Phase 2: Reveal vote + salt — must match commit or forfeit
        """

        def __init__(self, commit_deadline: float, reveal_deadline: float):
            self.commit_deadline = commit_deadline
            self.reveal_deadline = reveal_deadline
            self.commitments: dict[str, Commitment] = {}
            self.stakes: dict[str, float] = {}

        def commit(self, agent_id: str, value: str, stake: float) -> dict:
            """Phase 1: Submit blinded commitment."""
            now = time.time()
            if now > self.commit_deadline:
                return {"error": "Commit phase ended"}

            # Generate random salt
            salt = secrets.token_hex(16)

            # Compute commitment hash
            commit_hash = hashlib.sha256(f"{value}||{salt}".encode()).hexdigest()

            self.commitments[agent_id] = Commitment(
                agent_id=agent_id,
                commit_hash=commit_hash,
                commit_time=now,
            )
            self.stakes[agent_id] = stake

            return {
                "status": "committed",
                "hash": commit_hash,
                "salt": salt,  # Agent must save this for reveal phase!
                "note": "SAVE YOUR SALT! You need it to reveal.",
            }

        def reveal(self, agent_id: str, value: str, salt: str) -> dict:
            """Phase 2: Reveal the committed value."""
            now = time.time()
            if now < self.commit_deadline:
                return {"error": "Commit phase still active — cannot reveal yet"}
            if now > self.reveal_deadline:
                return {"error": "Reveal phase ended — stake forfeited"}

            if agent_id not in self.commitments:
                return {"error": "No commitment found"}

            # Verify hash matches
            expected_hash = hashlib.sha256(f"{value}||{salt}".encode()).hexdigest()
            commitment = self.commitments[agent_id]

            if expected_hash != commitment.commit_hash:
                return {
                    "error": "Hash mismatch! Value/salt doesn't match commitment.",
                    "penalty": f"Stake of {self.stakes[agent_id]} forfeited",
                }

            commitment.revealed = True
            commitment.reveal_value = value
            commitment.reveal_salt = salt

            return {"status": "revealed", "value": value}

        def tally(self) -> dict:
            """Count revealed votes. Unrevealed commitments forfeit stakes."""
            revealed = [c for c in self.commitments.values() if c.revealed]
            unrevealed = [c for c in self.commitments.values() if not c.revealed]

            from collections import Counter
            vote_counts = Counter(c.reveal_value for c in revealed)
            forfeited = sum(self.stakes.get(c.agent_id, 0) for c in unrevealed)

            return {
                "results": dict(vote_counts),
                "total_revealed": len(revealed),
                "total_unrevealed": len(unrevealed),
                "forfeited_stakes": forfeited,
                "winner": vote_counts.most_common(1)[0][0] if vote_counts else None,
            }

    class CorrelationDetector:
        """Detect potential collusion from voting/trading patterns."""

        def __init__(self, threshold: float = 0.9):
            self.threshold = threshold
            self.history: dict[str, list[str]] = {}  # agent -> list of past votes

        def record_vote(self, agent_id: str, vote: str):
            self.history.setdefault(agent_id, []).append(vote)

        def detect_collusion_pairs(self) -> list[tuple]:
            """Find pairs of agents with suspiciously correlated voting."""
            agents = list(self.history.keys())
            suspicious = []

            for i in range(len(agents)):
                for j in range(i + 1, len(agents)):
                    a, b = agents[i], agents[j]
                    votes_a = self.history[a]
                    votes_b = self.history[b]

                    min_len = min(len(votes_a), len(votes_b))
                    if min_len < 5:
                        continue

                    agreement = sum(
                        1 for va, vb in zip(votes_a[-min_len:], votes_b[-min_len:]) if va == vb
                    ) / min_len

                    if agreement > self.threshold:
                        suspicious.append((a, b, round(agreement, 3)))

            return suspicious

    # Example: commit-reveal oracle resolution
    now = time.time()
    cr = CommitRevealScheme(
        commit_deadline=now + 3600,   # 1 hour to commit
        reveal_deadline=now + 7200,   # 1 hour to reveal
    )

    # Reporters commit (can't see each other's answers)
    c1 = cr.commit("reporter_1", "YES", stake=100)
    c2 = cr.commit("reporter_2", "YES", stake=150)
    c3 = cr.commit("reporter_3", "NO",  stake=100)

    print(f"Reporter 1 hash: {c1['hash'][:16]}...")
    print(f"Reporter 2 hash: {c2['hash'][:16]}...")
    # Hashes reveal NOTHING about the actual vote — collusion requires trust

    # Simulate passing commit deadline
    cr.commit_deadline = now - 1

    # Reveal phase
    cr.reveal("reporter_1", "YES", c1["salt"])
    cr.reveal("reporter_2", "YES", c2["salt"])
    cr.reveal("reporter_3", "NO",  c3["salt"])

    result = cr.tally()
    print(f"Result: {result['results']}, Winner: {result['winner']}")
