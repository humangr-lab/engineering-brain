- id: FIN-GAME-009
  text: "Aumann's Agreement Theorem (1976) states that two rational agents with common priors CANNOT agree to disagree if their posteriors are common knowledge. If they publicly announce their beliefs and update, they must converge. Practical implication: persistent disagreement implies either different priors, different information, or irrationality. Prediction markets operationalize this through trading — prices converge as information becomes common knowledge."
  why: >
    Aumann's theorem is philosophically foundational for prediction markets: it proves
    that trade should eventually cease if all information is public and agents are rational.
    In practice, trade continues because of asymmetric information, heterogeneous priors,
    and bounded rationality. This has deep implications for mechanism design: a prediction
    market that achieves "no-trade" equilibrium has successfully aggregated all available
    information into the price. The theorem also explains why you should take persistent
    disagreement seriously — if a prediction market price stays at 0.60 despite your
    belief of 0.90, either you have private information others don't, or you're wrong.
    Common knowledge games (coordinated attacks, Schelling points) are practical
    applications of this theory.
  how_to_do_right: |
    1. Understand the conditions for agreement:
       - Common priors: both agents start with the same prior probability
       - Bayesian updating: both use Bayes' rule to update on evidence
       - Common knowledge: both know each other's posteriors (and know that they know, etc.)
    2. Model belief convergence:
       - Agent A observes signal s_A, updates: P(H|s_A)
       - Agent B observes signal s_B, updates: P(H|s_B)
       - They share posteriors: A updates on B's posterior, B updates on A's posterior
       - After k rounds: beliefs converge to the same value
    3. Apply to prediction markets:
       - Trade is a form of belief announcement
       - Market price converges to common knowledge posterior
       - Persistent volume at the same price = genuine disagreement (interesting!)
    4. Detect information asymmetry:
       - If market price ≠ your estimate by > 10%, investigate what you might be missing
       - The market may have information you don't (or vice versa)
    5. Schelling points (common knowledge coordination):
       - When agents must coordinate without communication, they choose "focal points"
       - Design: make the desired equilibrium the most salient option
       - Example: oracle resolves to "what most people would say" = Schelling point
    6. For oracle design:
       - Truth is the Schelling point if honestly reporting is the most natural action
       - Augur's dispute resolution works because "truth" is the focal point
  severity: medium
  technologies:
    lang: [python]
    framework: [numpy]
  domains:
    domain: [prediction_markets, game_theory]
    concern: [domain_specific]
  example_good: |
    import numpy as np

    class AumannConvergence:
        """
        Simulate Aumann-style belief convergence between two Bayesian agents.
        Demonstrates that rational agents with common priors converge to agreement.
        """

        def __init__(self, prior: float = 0.5):
            self.prior = prior

        def bayesian_update(self, prior: float, signal: float, signal_quality: float) -> float:
            """
            Update belief using Bayes' rule.
            prior: current belief P(H)
            signal: 1 if positive signal, 0 if negative
            signal_quality: P(positive_signal | H) = P(negative_signal | not H)
            """
            if signal == 1:
                likelihood_ratio = signal_quality / (1 - signal_quality)
            else:
                likelihood_ratio = (1 - signal_quality) / signal_quality

            odds = (prior / (1 - prior)) * likelihood_ratio
            return odds / (1 + odds)

        def simulate_convergence(
            self,
            signal_A: list[float],
            signal_B: list[float],
            quality_A: float = 0.7,
            quality_B: float = 0.8,
            max_rounds: int = 20,
        ) -> dict:
            """
            Simulate two agents observing private signals, then sharing posteriors.
            """
            # Phase 1: Private updating
            belief_A = self.prior
            for s in signal_A:
                belief_A = self.bayesian_update(belief_A, s, quality_A)

            belief_B = self.prior
            for s in signal_B:
                belief_B = self.bayesian_update(belief_B, s, quality_B)

            history = [{"round": 0, "belief_A": belief_A, "belief_B": belief_B,
                        "disagreement": abs(belief_A - belief_B)}]

            # Phase 2: Share posteriors and converge
            for r in range(1, max_rounds + 1):
                # A treats B's announcement as a signal about B's information
                # Simplified: weighted average (rational agents converge faster in practice)
                avg = (belief_A + belief_B) / 2
                # Each agent moves toward the average, weighted by relative confidence
                belief_A = belief_A * 0.4 + avg * 0.6
                belief_B = belief_B * 0.4 + avg * 0.6

                history.append({
                    "round": r,
                    "belief_A": round(belief_A, 6),
                    "belief_B": round(belief_B, 6),
                    "disagreement": round(abs(belief_A - belief_B), 8),
                })

                if abs(belief_A - belief_B) < 1e-6:
                    break

            return {
                "converged": abs(belief_A - belief_B) < 1e-6,
                "rounds_to_converge": len(history) - 1,
                "final_belief": round((belief_A + belief_B) / 2, 6),
                "history": history,
            }

    # Example: two analysts with different private signals about an event
    sim = AumannConvergence(prior=0.5)

    # Agent A sees 3 positive, 1 negative signal
    # Agent B sees 2 positive, 2 negative signals
    result = sim.simulate_convergence(
        signal_A=[1, 1, 1, 0],
        signal_B=[1, 1, 0, 0],
        quality_A=0.7,
        quality_B=0.8,
    )

    print(f"Converged: {result['converged']} in {result['rounds_to_converge']} rounds")
    print(f"Final agreed belief: {result['final_belief']}")
    for h in result["history"][:5]:
        print(f"  Round {h['round']}: A={h['belief_A']:.4f}, B={h['belief_B']:.4f}, "
              f"gap={h['disagreement']:.6f}")
  example_bad: |
    # WRONG: Ignoring the market's opinion when your estimate disagrees
    class OverconfidentTrader:
        def should_trade(self, my_belief, market_price):
            if abs(my_belief - market_price) > 0.1:
                return True  # "The market is wrong, I'm right!"
                # Aumann says: if the disagreement is genuine, WHY does the market disagree?
                # Maybe they have information you don't.
                # Correct: investigate the source of disagreement before trading.

    # In practice: the market is right more often than any individual.
    # Consistently betting against the market without understanding why it disagrees
    # is a recipe for losses. The Efficient Market Hypothesis is an Aumann consequence.
  when_applies: "Understanding prediction market efficiency, designing oracle dispute resolution, modeling information aggregation, or evaluating when disagreement signals new information vs. noise."
  sources:
    - "https://en.wikipedia.org/wiki/Game_theory"

- id: FIN-GAME-010
  text: "The VCG (Vickrey-Clarke-Groves) mechanism generalizes Vickrey auctions to multi-item settings. Each agent reports their valuation for all bundles. The allocation maximizes total reported welfare. Payment for agent i = social welfare of others without i minus social welfare of others with i (Clarke pivot rule). VCG is DSIC, efficient, and individually rational, but not budget-balanced."
  why: >
    VCG is the only known mechanism that simultaneously achieves dominant strategy
    incentive compatibility (DSIC) AND efficiency for general allocation problems.
    Google's ad auction (GSP, later transitioning to VCG) generates $200B+ annually.
    Spectrum auctions (FCC) use VCG variants to allocate billions of dollars in radio
    frequencies. For prediction markets, VCG can be used for batch clearing: collect all
    orders in a time window, compute welfare-maximizing allocation, charge VCG prices.
    The main limitation is budget balance: VCG can require the auctioneer to subsidize
    the mechanism. The Myerson-Satterthwaite theorem proves you CANNOT have DSIC +
    efficiency + budget balance simultaneously — VCG sacrifices budget balance.
  how_to_do_right: |
    1. Collect valuations:
       - Each agent i reports v_i(S) for each bundle S of items
       - DSIC: truth-telling is dominant, so reported = true values
    2. Compute efficient allocation:
       - Solve: max sum_i v_i(S_i) subject to feasibility constraints
       - This is NP-hard in general (combinatorial auction)
       - For simple cases (single item, unit-demand): polynomial time
    3. Compute VCG payments (Clarke pivot rule):
       - For each agent i:
         payment_i = [max welfare without i] - [welfare of others with i present]
       - payment_i = V_{-i}(optimal_{-i}) - sum_{j≠i} v_j(optimal_all)
    4. Verify properties:
       - DSIC: each agent's payment is independent of their own report
       - Efficiency: maximizes total welfare
       - IR: utility = value - payment >= 0 (because payment <= value)
       - NOT budget balanced: sum of payments can be negative (auctioneer subsidizes)
    5. For combinatorial auctions:
       - Use approximate allocation (greedy, LP relaxation)
       - Approximate VCG payments may break IC — use with caution
    6. For prediction market batch clearing:
       - Agents submit limit orders (buy/sell at price)
       - VCG allocation = welfare-maximizing match
       - VCG price often equals uniform clearing price for simple markets
  severity: high
  technologies:
    lang: [python]
    framework: [numpy, scipy]
  domains:
    domain: [prediction_markets, game_theory, fintech]
    concern: [domain_specific]
  example_good: |
    import numpy as np
    from itertools import combinations

    class VCGMechanism:
        """
        Vickrey-Clarke-Groves mechanism for multi-item allocation.
        DSIC + Efficient + IR (but not budget balanced).
        """

        def __init__(self, items: list[str]):
            self.items = items
            self.valuations: dict[str, dict[frozenset, float]] = {}

        def report_valuation(self, agent_id: str, bundle_values: dict[frozenset, float]):
            """Agent reports value for each bundle of items."""
            self.valuations[agent_id] = bundle_values

        def _max_welfare(self, agents: list[str]) -> tuple[dict, float]:
            """
            Find welfare-maximizing allocation for given agents.
            Returns (allocation: agent->bundle, total_welfare).
            Brute-force for small instances.
            """
            if not agents:
                return {}, 0.0

            best_alloc = {}
            best_welfare = 0.0

            # For simplicity: each item goes to at most one agent
            # Try all possible assignments
            n_items = len(self.items)
            n_agents = len(agents)

            # Generate all partitions of items among agents
            def allocate(item_idx, current_alloc, remaining_items):
                nonlocal best_alloc, best_welfare

                if item_idx == n_items:
                    welfare = 0
                    for agent in agents:
                        bundle = frozenset(current_alloc.get(agent, []))
                        welfare += self.valuations[agent].get(bundle, 0)
                    if welfare > best_welfare:
                        best_welfare = welfare
                        best_alloc = {a: frozenset(items) for a, items in current_alloc.items() if items}
                    return

                item = self.items[item_idx]
                # Assign to each agent or no one
                for agent in agents + [None]:
                    if agent:
                        alloc = {a: list(items) for a, items in current_alloc.items()}
                        alloc.setdefault(agent, []).append(item)
                        allocate(item_idx + 1, alloc, remaining_items)
                    else:
                        allocate(item_idx + 1, current_alloc, remaining_items)

            allocate(0, {}, set(self.items))
            return best_alloc, best_welfare

        def run(self) -> dict:
            """Execute VCG mechanism. Returns allocation and payments."""
            agents = list(self.valuations.keys())

            # Step 1: Find efficient allocation (all agents)
            allocation, total_welfare = self._max_welfare(agents)

            # Step 2: Compute VCG payments
            payments = {}
            for agent in agents:
                # Welfare of others under optimal allocation
                others_welfare_with = sum(
                    self.valuations[a].get(allocation.get(a, frozenset()), 0)
                    for a in agents if a != agent
                )

                # Welfare of others under optimal allocation WITHOUT this agent
                other_agents = [a for a in agents if a != agent]
                _, welfare_without = self._max_welfare(other_agents)

                # VCG payment = externality imposed on others
                payments[agent] = round(welfare_without - others_welfare_with, 4)

            # Step 3: Compute utilities
            utilities = {}
            for agent in agents:
                value = self.valuations[agent].get(allocation.get(agent, frozenset()), 0)
                utilities[agent] = round(value - payments[agent], 4)

            revenue = sum(payments.values())

            return {
                "allocation": {a: list(b) for a, b in allocation.items()},
                "payments": payments,
                "utilities": utilities,
                "total_welfare": round(total_welfare, 4),
                "revenue": round(revenue, 4),
                "is_budget_balanced": revenue >= 0,
            }

    # Example: 2 items (A, B), 3 bidders
    vcg = VCGMechanism(items=["slot_A", "slot_B"])

    # Alice values: A=$10, B=$5, {A,B}=$12
    vcg.report_valuation("Alice", {
        frozenset(["slot_A"]): 10,
        frozenset(["slot_B"]): 5,
        frozenset(["slot_A", "slot_B"]): 12,
    })

    # Bob values: A=$8, B=$7, {A,B}=$13
    vcg.report_valuation("Bob", {
        frozenset(["slot_A"]): 8,
        frozenset(["slot_B"]): 7,
        frozenset(["slot_A", "slot_B"]): 13,
    })

    # Carol values: A=$6, B=$9, {A,B}=$11
    vcg.report_valuation("Carol", {
        frozenset(["slot_A"]): 6,
        frozenset(["slot_B"]): 9,
        frozenset(["slot_A", "slot_B"]): 11,
    })

    result = vcg.run()
    print(f"Allocation: {result['allocation']}")
    print(f"Payments: {result['payments']}")
    print(f"Revenue: ${result['revenue']}")
    print(f"Budget balanced: {result['is_budget_balanced']}")
  example_bad: |
    # WRONG: Using first-price batch clearing instead of VCG
    def first_price_batch(bids):
        # Sort by bid, allocate to highest, charge their bid
        sorted_bids = sorted(bids.items(), key=lambda x: x[1], reverse=True)
        winner = sorted_bids[0]
        return winner[0], winner[1]  # Pays own bid!

    # Problem: Not DSIC — bidders shade down
    # Alice values at $10 but bids $7 (shading strategy)
    # Bob values at $8 but bids $6 (also shading)
    # Alice wins at $7, but if she'd bid truthfully ($10), same outcome
    # Worse: sometimes Bob wins with $6 bid when Alice values more — INEFFICIENT
  when_applies: "Designing combinatorial auctions, ad slot allocation, spectrum auctions, prediction market batch clearing, or any multi-item allocation where efficiency and truthfulness matter."
  sources:
    - "https://en.wikipedia.org/wiki/Mechanism_design"
    - "https://en.wikipedia.org/wiki/Vickrey_auction"

- id: FIN-GAME-011
  text: "The oracle problem in prediction markets and blockchain is fundamentally a game theory problem: how to incentivize truthful reporting of real-world events on-chain. Truth-telling is a Schelling point equilibrium when: (1) reporters stake collateral, (2) consensus determines the 'truth', and (3) dissenters lose their stake. Augur, UMA, and Kleros use variants of this Schelling point mechanism. Failure modes: bribing, 51% attacks on reporter stake, and ambiguous resolution criteria."
  why: >
    The oracle problem is THE critical unsolved challenge for prediction markets and
    smart contracts. Without a reliable oracle, prediction markets can't resolve, DeFi
    protocols can't know external prices, and insurance contracts can't verify claims.
    Augur's REP token mechanism lost $1M+ in the 2020 US election due to ambiguous
    resolution criteria and whale manipulation. UMA's optimistic oracle has been attacked
    via last-minute large stakes that override legitimate reporters. The game theory
    is delicate: you need truth-telling to be the dominant strategy, but the mechanism
    must also handle ties, ambiguity, abstentions, and Sybil attacks. Any oracle design
    must be analyzed as a game and stress-tested against rational adversaries.
  how_to_do_right: |
    1. Schelling point mechanism:
       - Reporters independently submit answers + stake collateral
       - Majority answer = "truth"
       - Majority keeps stake; minority loses stake to majority
       - Truth-telling is focal because: "what would most people say?"
    2. Staking requirements:
       - Minimum stake > expected profit from lying
       - Stake should be proportional to market size (larger markets = higher stakes)
       - Lock-up period: 7-30 days (prevents stake-and-run)
    3. Dispute resolution:
       - Round 1: small panel of reporters (N=5-15)
       - Round 2: larger panel (N=50-100) if Round 1 is disputed
       - Final: token-holder vote (full decentralization, very expensive to attack)
       - Each round doubles the stake required
    4. Handle ambiguity:
       - Explicit resolution criteria written BEFORE market opens
       - "Invalid/ambiguous" must be a valid resolution option
       - Precedent system: how were similar markets resolved?
    5. Attack mitigation:
       - Bribery: make it unprofitable (cost of bribing > potential gain)
       - 51% attack: require supermajority (67%) for resolution
       - Last-minute attacks: freeze new stakes 24h before resolution
    6. Optimistic oracle (UMA model):
       - Assume first report is correct; only dispute if wrong
       - Much cheaper (fewer participants needed) but vulnerable to censorship
  severity: critical
  technologies:
    lang: [python]
    framework: [numpy]
  domains:
    domain: [prediction_markets, game_theory, fintech]
    concern: [security, domain_specific]
  example_good: |
    from dataclasses import dataclass, field
    from collections import Counter
    from enum import Enum

    class Resolution(str, Enum):
        YES = "yes"
        NO = "no"
        INVALID = "invalid"

    @dataclass
    class OracleReport:
        reporter_id: str
        answer: Resolution
        stake: float
        timestamp: float

    @dataclass
    class DisputeRound:
        round_num: int
        min_stake: float
        supermajority_threshold: float  # e.g., 0.67
        reports: list[OracleReport] = field(default_factory=list)

    class SchellingPointOracle:
        """
        Schelling-point oracle with escalating dispute rounds.
        Truth-telling is the dominant strategy when it's the focal point.
        """

        def __init__(
            self,
            base_stake: float = 100.0,
            escalation_factor: float = 2.0,
            supermajority: float = 0.67,
            max_rounds: int = 3,
        ):
            self.base_stake = base_stake
            self.escalation = escalation_factor
            self.supermajority = supermajority
            self.max_rounds = max_rounds
            self.rounds: list[DisputeRound] = []

        def create_round(self) -> DisputeRound:
            round_num = len(self.rounds)
            min_stake = self.base_stake * (self.escalation ** round_num)
            round = DisputeRound(
                round_num=round_num,
                min_stake=min_stake,
                supermajority_threshold=self.supermajority,
            )
            self.rounds.append(round)
            return round

        def submit_report(self, round_idx: int, reporter: str, answer: Resolution, stake: float) -> dict:
            round = self.rounds[round_idx]
            if stake < round.min_stake:
                return {"error": f"Stake {stake} below minimum {round.min_stake}"}

            report = OracleReport(reporter_id=reporter, answer=answer, stake=stake, timestamp=0)
            round.reports.append(report)
            return {"status": "accepted", "round": round_idx, "stake": stake}

        def resolve_round(self, round_idx: int) -> dict:
            """Resolve a dispute round. Returns outcome and rewards/penalties."""
            round = self.rounds[round_idx]
            if len(round.reports) < 3:
                return {"error": "Insufficient reports (minimum 3)"}

            # Stake-weighted vote
            vote_weights: dict[Resolution, float] = {}
            for report in round.reports:
                vote_weights[report.answer] = vote_weights.get(report.answer, 0) + report.stake

            total_stake = sum(vote_weights.values())
            winner = max(vote_weights, key=vote_weights.get)
            winner_pct = vote_weights[winner] / total_stake

            # Check supermajority
            if winner_pct < round.supermajority_threshold:
                return {
                    "status": "no_consensus",
                    "winner": winner.value,
                    "support_pct": round(winner_pct * 100, 1),
                    "action": "escalate_to_next_round",
                }

            # Distribute stakes: losers pay winners proportionally
            winner_stakes = sum(r.stake for r in round.reports if r.answer == winner)
            loser_stakes = sum(r.stake for r in round.reports if r.answer != winner)

            rewards = {}
            penalties = {}
            for report in round.reports:
                if report.answer == winner:
                    # Winner gets proportional share of loser stakes
                    share = report.stake / winner_stakes
                    rewards[report.reporter_id] = round(report.stake + share * loser_stakes, 2)
                else:
                    penalties[report.reporter_id] = round(-report.stake, 2)

            return {
                "status": "resolved",
                "outcome": winner.value,
                "support_pct": round(winner_pct * 100, 1),
                "rewards": rewards,
                "penalties": penalties,
                "total_redistributed": round(loser_stakes, 2),
            }

    # Example: resolve "Did team X win the game?"
    oracle = SchellingPointOracle(base_stake=100, escalation_factor=2.0, supermajority=0.67)

    # Round 1: 5 reporters
    r0 = oracle.create_round()
    oracle.submit_report(0, "alice", Resolution.YES, 150)
    oracle.submit_report(0, "bob", Resolution.YES, 200)
    oracle.submit_report(0, "carol", Resolution.YES, 100)
    oracle.submit_report(0, "dave", Resolution.NO, 120)
    oracle.submit_report(0, "eve", Resolution.NO, 80)

    result = oracle.resolve_round(0)
    print(f"Outcome: {result['outcome']}, Support: {result['support_pct']}%")
    print(f"Rewards: {result.get('rewards', {})}")
    print(f"Penalties: {result.get('penalties', {})}")
    # YES wins with ~69% stake-weighted support (supermajority met)
    # Alice, Bob, Carol share Dave+Eve's $200 proportionally
