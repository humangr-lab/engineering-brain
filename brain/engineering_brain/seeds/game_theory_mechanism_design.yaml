- id: FIN-GAME-001
  text: "A Nash Equilibrium (NE) is a strategy profile where no player can improve their payoff by unilaterally changing strategy. Nash's theorem guarantees existence in mixed strategies for finite games, but finding NE is PPAD-complete (harder than NP in some senses). For 2-player zero-sum games, use linear programming (Minimax theorem). For general games, use support enumeration or Lemke-Howson algorithm."
  why: >
    Nash Equilibrium is the foundational solution concept for any multi-agent system:
    prediction markets (traders as players), auction design (bidders as players), and
    mechanism design (participants as players). If your system's incentive structure
    doesn't have a desirable NE, rational agents will exploit it. The 2012 London Olympics
    badminton scandal showed what happens when the NE of a tournament format incentivizes
    losing. For prediction markets, the NE of a properly designed market IS truthful
    reporting — but proving this requires showing that no deviation is profitable.
    Computing NE is hard in general, but many mechanism design problems can be solved
    with dominant strategies, which are much easier to verify.
  how_to_do_right: |
    1. For 2-player zero-sum games (e.g., market maker vs informed trader):
       - Formulate as linear program: max min_y x^T * A * y
       - Use scipy.optimize.linprog — O(n^3) polynomial time
    2. For 2-player general games:
       - Use support enumeration: try all possible support sets
       - For each support pair, solve linear system for mixing probabilities
       - Verify no player wants to expand support (no profitable deviation)
       - nashpy library implements this in Python
    3. For N-player games:
       - Exact computation is PPAD-complete — avoid for N > 3
       - Use heuristic methods: fictitious play, replicator dynamics
       - For mechanism design: aim for dominant strategy IC (no NE computation needed)
    4. Verify equilibrium:
       - For each player i, for each strategy s not in support:
         E[payoff(s)] <= E[payoff(equilibrium_strategy)]
       - If any deviation is profitable by > epsilon, it's not an epsilon-NE
    5. Multiple equilibria: use refinements (subgame perfect, trembling hand) to select
    6. For online/repeated settings: use no-regret algorithms (multiplicative weights)
  severity: high
  technologies:
    lang: [python]
    framework: [numpy, scipy, nashpy]
  domains:
    domain: [fintech, prediction_markets, game_theory]
    concern: [domain_specific]
  example_good: |
    import numpy as np
    import nashpy as nash

    class NashEquilibriumSolver:
        """Compute Nash Equilibria for 2-player games."""

        @staticmethod
        def solve_2player(payoff_A: np.ndarray, payoff_B: np.ndarray) -> list[tuple]:
            """
            Find all Nash Equilibria using support enumeration.
            payoff_A: row player's payoff matrix (m x n)
            payoff_B: column player's payoff matrix (m x n)
            Returns list of (mixed_strategy_A, mixed_strategy_B)
            """
            game = nash.Game(payoff_A, payoff_B)
            equilibria = list(game.support_enumeration())
            return equilibria

        @staticmethod
        def solve_zero_sum(payoff: np.ndarray) -> dict:
            """
            Solve 2-player zero-sum game via minimax (linear programming).
            payoff: row player's payoff matrix (column player gets -payoff)
            """
            from scipy.optimize import linprog

            m, n = payoff.shape

            # Row player maximizes minimum expected payoff
            # max v s.t. A^T @ x >= v*1, x >= 0, sum(x) = 1
            c = np.zeros(m + 1)
            c[-1] = -1  # maximize v (minimize -v)

            # A^T @ x >= v => -A^T @ x + v <= 0
            A_ub = np.hstack([-payoff.T, np.ones((n, 1))])
            b_ub = np.zeros(n)

            # sum(x) = 1
            A_eq = np.ones((1, m + 1))
            A_eq[0, -1] = 0
            b_eq = np.array([1.0])

            bounds = [(0, None)] * m + [(None, None)]

            result = linprog(c, A_ub=A_ub, b_ub=b_ub, A_eq=A_eq, b_eq=b_eq, bounds=bounds)

            if result.success:
                strategy = result.x[:m]
                value = -result.fun
                return {
                    "row_strategy": np.round(strategy, 6),
                    "game_value": round(value, 6),
                }
            raise ValueError("LP failed to find minimax solution")

        @staticmethod
        def verify_equilibrium(
            payoff_A: np.ndarray, payoff_B: np.ndarray,
            strategy_A: np.ndarray, strategy_B: np.ndarray,
            epsilon: float = 1e-6,
        ) -> dict:
            """Verify a strategy profile is an epsilon-Nash Equilibrium."""
            # Expected payoff for player A
            current_A = strategy_A @ payoff_A @ strategy_B

            # Check all pure strategy deviations for A
            max_deviation_A = 0.0
            for i in range(len(strategy_A)):
                pure_i = np.zeros_like(strategy_A)
                pure_i[i] = 1.0
                deviation_payoff = pure_i @ payoff_A @ strategy_B
                max_deviation_A = max(max_deviation_A, deviation_payoff - current_A)

            # Same for player B
            current_B = strategy_A @ payoff_B @ strategy_B
            max_deviation_B = 0.0
            for j in range(payoff_B.shape[1]):
                pure_j = np.zeros(payoff_B.shape[1])
                pure_j[j] = 1.0
                deviation_payoff = strategy_A @ payoff_B @ pure_j
                max_deviation_B = max(max_deviation_B, deviation_payoff - current_B)

            is_ne = max_deviation_A <= epsilon and max_deviation_B <= epsilon
            return {
                "is_nash_equilibrium": is_ne,
                "max_deviation_A": round(max_deviation_A, 8),
                "max_deviation_B": round(max_deviation_B, 8),
                "epsilon": epsilon,
            }

    # Prisoner's Dilemma
    A = np.array([[3, 0], [5, 1]])  # row payoffs
    B = np.array([[3, 5], [0, 1]])  # col payoffs

    solver = NashEquilibriumSolver()
    equilibria = solver.solve_2player(A, B)
    print(f"Found {len(equilibria)} NE(s)")
    for eq in equilibria:
        print(f"  Player 1: {eq[0]}, Player 2: {eq[1]}")
    # NE: (Defect, Defect) = ([0, 1], [0, 1])

    # Rock-Paper-Scissors (zero-sum)
    rps = np.array([[0, -1, 1], [1, 0, -1], [-1, 1, 0]])
    result = solver.solve_zero_sum(rps)
    print(f"RPS strategy: {result['row_strategy']}, value: {result['game_value']}")
    # [0.333, 0.333, 0.333], value = 0 (uniform mixing)
  example_bad: |
    # WRONG: Assuming pure strategy NE always exists
    def find_pure_ne(payoff_A, payoff_B):
        m, n = payoff_A.shape
        for i in range(m):
            for j in range(n):
                if (payoff_A[i, j] == max(payoff_A[:, j]) and
                    payoff_B[i, j] == max(payoff_B[i, :])):
                    return (i, j)
        return None  # Returns None for Matching Pennies, RPS, etc.

    # Many important games only have MIXED strategy NE
    # Matching Pennies: no pure NE, but mixed NE = (0.5, 0.5)
    # If your mechanism only checks pure strategies, you'll miss equilibria
    # and incorrectly conclude the game has no solution
  when_applies: "Analyzing incentive structures in prediction markets, auction design, multi-agent systems, or verifying that a mechanism's equilibrium is desirable."
  sources:
    - "https://en.wikipedia.org/wiki/Game_theory"
    - "https://en.wikipedia.org/wiki/Nash_equilibrium"

- id: FIN-GAME-002
  text: "Mechanism design is 'reverse game theory': design the rules of a game so that self-interested agents produce a desired outcome in equilibrium. The Revelation Principle states that any mechanism can be replaced by a direct, truthful mechanism. Incentive Compatibility (IC) means truth-telling is a best response. Individual Rationality (IR) means agents prefer participating to opting out."
  why: >
    Mechanism design is the theoretical foundation for prediction markets, auctions,
    voting systems, and oracle protocols. Without IC, agents have incentive to lie —
    prediction markets where traders can profit from strategic misreporting are useless
    for information aggregation. Without IR, agents won't participate — an oracle that
    penalizes honest reporters too harshly will have no reporters. The Revelation Principle
    dramatically simplifies mechanism design: instead of analyzing all possible indirect
    mechanisms (sealed bids, ascending auctions, etc.), you only need to check if the
    direct mechanism is IC. Myerson won the 2007 Nobel Prize for this framework.
  how_to_do_right: |
    1. Define the design space:
       - Types: what private information do agents have? (valuations, beliefs, signals)
       - Outcomes: what are the possible allocations? (winner, price, probability)
       - Payoffs: u_i(outcome, payment, type_i)
    2. Design the mechanism:
       - Allocation rule: who gets what as a function of reported types
       - Payment rule: how much each agent pays/receives
    3. Verify Incentive Compatibility:
       - DSIC (Dominant Strategy): truth-telling is optimal regardless of others' strategies
       - BIC (Bayesian): truth-telling is optimal given beliefs about others' types
       - DSIC is stronger and preferred when achievable
    4. Verify Individual Rationality:
       - Ex-post IR: u_i(participate) >= u_i(opt-out) for all outcomes (strongest)
       - Interim IR: E[u_i(participate)] >= u_i(opt-out) (expected)
    5. Check budget balance:
       - Weak BB: mechanism doesn't lose money in expectation
       - Strong BB: mechanism doesn't lose money for any type profile
    6. Apply the Revelation Principle:
       - Transform any indirect mechanism to a direct one
       - Check IC in the direct mechanism (much simpler)
    7. Impossibility constraints (Myerson-Satterthwaite):
       - Cannot simultaneously achieve DSIC + IR + efficiency + budget balance
       - Must sacrifice one — choose which based on your priority
  severity: critical
  technologies:
    lang: [python]
    framework: [numpy, scipy]
  domains:
    domain: [prediction_markets, game_theory, fintech]
    concern: [domain_specific]
  example_good: |
    import numpy as np
    from dataclasses import dataclass

    @dataclass
    class MechanismResult:
        allocation: dict[str, float]   # agent -> probability of getting the item
        payments: dict[str, float]     # agent -> payment
        is_ic: bool                    # incentive compatible?
        is_ir: bool                    # individually rational?
        is_efficient: bool             # maximizes social welfare?
        revenue: float                 # mechanism designer's revenue

    class ICChecker:
        """Verify Incentive Compatibility of a direct mechanism."""

        def __init__(self, allocation_fn, payment_fn, type_space: np.ndarray):
            """
            allocation_fn(reported_type, all_reports) -> probability
            payment_fn(reported_type, all_reports) -> payment
            type_space: array of possible types (e.g., [0, 0.1, ..., 1.0])
            """
            self.alloc = allocation_fn
            self.pay = payment_fn
            self.types = type_space

        def check_dsic(self, num_other_agents: int = 1) -> dict:
            """
            Check if truth-telling is dominant for every possible report by others.
            For simplicity, checks one agent against all possible opponent types.
            """
            violations = []

            for true_type in self.types:
                for other_type in self.types:
                    reports = [other_type]

                    # Utility from truth-telling
                    truthful_alloc = self.alloc(true_type, [true_type] + reports)
                    truthful_pay = self.pay(true_type, [true_type] + reports)
                    truthful_utility = true_type * truthful_alloc - truthful_pay

                    # Check all possible lies
                    for lie in self.types:
                        if abs(lie - true_type) < 1e-10:
                            continue
                        lie_alloc = self.alloc(lie, [lie] + reports)
                        lie_pay = self.pay(lie, [lie] + reports)
                        lie_utility = true_type * lie_alloc - lie_pay

                        if lie_utility > truthful_utility + 1e-8:
                            violations.append({
                                "true_type": true_type,
                                "lie": lie,
                                "other": other_type,
                                "gain": round(lie_utility - truthful_utility, 6),
                            })

            return {
                "is_dsic": len(violations) == 0,
                "num_violations": len(violations),
                "worst_violation": max((v["gain"] for v in violations), default=0),
                "example_violation": violations[0] if violations else None,
            }

    # Example: Second-price auction (Vickrey) — should be DSIC
    def vickrey_alloc(my_bid, all_bids):
        return 1.0 if my_bid >= max(all_bids) else 0.0

    def vickrey_pay(my_bid, all_bids):
        if my_bid >= max(all_bids):
            other_bids = [b for b in all_bids if b != my_bid]
            return max(other_bids) if other_bids else 0.0
        return 0.0

    types = np.linspace(0, 1, 11)
    checker = ICChecker(vickrey_alloc, vickrey_pay, types)
    result = checker.check_dsic()
    print(f"Vickrey DSIC: {result['is_dsic']}")  # True

    # Contrast: First-price auction — NOT DSIC
    def first_price_alloc(my_bid, all_bids):
        return 1.0 if my_bid >= max(all_bids) else 0.0

    def first_price_pay(my_bid, all_bids):
        return my_bid if my_bid >= max(all_bids) else 0.0

    checker_fp = ICChecker(first_price_alloc, first_price_pay, types)
    result_fp = checker_fp.check_dsic()
    print(f"First-price DSIC: {result_fp['is_dsic']}")  # False!
    print(f"Violation: bidder with value {result_fp['example_violation']['true_type']} "
          f"profits by bidding {result_fp['example_violation']['lie']}")
  example_bad: |
    # WRONG: Designing a mechanism without checking IC — agents will game it
    class NaivePredictionMarket:
        def __init__(self):
            self.reports = []

        def report(self, agent_id, probability):
            self.reports.append(probability)

        def resolve(self, true_outcome):
            # Reward = how close you were
            for r in self.reports:
                reward = 1 - abs(r - true_outcome)
                # NOT incentive compatible! Agents should report the median of others,
                # not their true belief. If everyone else reports 0.7 and I believe 0.3,
                # I should report 0.7 to minimize |r - outcome| in expectation.
                # Need a proper scoring rule (Brier, logarithmic) for IC.
  when_applies: "Designing prediction markets, auctions, oracle protocols, voting systems, or any system where self-interested agents report private information."
  sources:
    - "https://en.wikipedia.org/wiki/Mechanism_design"
    - "https://en.wikipedia.org/wiki/Game_theory"

- id: FIN-GAME-003
  text: "A Vickrey (second-price sealed-bid) auction is DSIC: bidding your true valuation is a dominant strategy because you pay the second-highest bid, not your own. The winner is the highest bidder, paying the second-highest bid. This eliminates the bid-shading incentive of first-price auctions. Revenue equivalence theorem: all standard auctions yield the same expected revenue with risk-neutral bidders."
  why: >
    The Vickrey auction is the gold standard for truthful mechanisms and the foundation
    for VCG (Vickrey-Clarke-Groves) used in Google's ad auctions, spectrum auctions, and
    prediction market settlements. The key insight: because you pay someone else's bid
    (not yours), your bid only affects whether you WIN, not how much you PAY. Therefore,
    bidding your true value maximizes your probability of winning exactly when it's
    profitable. Google's switch from first-price to second-price ad auctions increased
    advertiser participation by making bidding simpler (no need for complex bid-shading
    strategies). Revenue equivalence means the auctioneer doesn't lose revenue by using
    the simpler, truthful format.
  how_to_do_right: |
    1. Sealed-bid collection:
       - All bids submitted simultaneously (no sequential visibility)
       - Bids are binding commitments
       - Use commitment schemes (hash-then-reveal) for blockchain implementations
    2. Winner determination:
       - Winner = argmax(bids)
       - Handle ties: random selection, or priority by submission time
    3. Payment rule:
       - Winner pays second-highest bid
       - Non-winners pay nothing
    4. For multi-item: use VCG generalization
       - Payment_i = V(N\{i}) - V_{-i}(N) where V is social welfare
    5. Implementation considerations:
       - Collusion vulnerability: winner can collude with second-highest to lower payment
       - Shill bidding: auctioneer adds fake bids to raise second price
       - Mitigation: reserve price >= seller's value
    6. For prediction markets:
       - Batch auctions with second-price semantics reduce gaming
       - Call auctions at market open/close use Vickrey-like clearing
  severity: high
  technologies:
    lang: [python]
    framework: [pydantic]
  domains:
    domain: [prediction_markets, game_theory, fintech]
    concern: [domain_specific]
  example_good: |
    from dataclasses import dataclass

    @dataclass
    class VickreyBid:
        bidder_id: str
        value: float      # true valuation (in DSIC, should equal bid)
        bid: float         # submitted bid

    @dataclass
    class AuctionResult:
        winner: str
        winning_bid: float
        payment: float     # second-highest bid
        profit: float      # value - payment for winner
        is_efficient: bool  # highest-value bidder won?

    class VickreyAuction:
        """Second-price sealed-bid auction (DSIC)."""

        def __init__(self, reserve_price: float = 0.0):
            self.reserve = reserve_price
            self.bids: list[VickreyBid] = []

        def submit_bid(self, bidder_id: str, bid: float, true_value: float):
            """Submit a sealed bid. In DSIC, rational agents set bid = true_value."""
            self.bids.append(VickreyBid(bidder_id=bidder_id, value=true_value, bid=bid))

        def run(self) -> AuctionResult | None:
            """Execute the auction."""
            # Filter bids above reserve
            valid_bids = [b for b in self.bids if b.bid >= self.reserve]
            if not valid_bids:
                return None

            # Sort by bid descending
            sorted_bids = sorted(valid_bids, key=lambda b: b.bid, reverse=True)
            winner = sorted_bids[0]

            # Payment = second-highest bid (or reserve if only one bidder)
            if len(sorted_bids) >= 2:
                payment = sorted_bids[1].bid
            else:
                payment = self.reserve

            # Check efficiency: did highest-VALUE bidder win?
            highest_value = max(self.bids, key=lambda b: b.value)
            is_efficient = winner.bidder_id == highest_value.bidder_id

            return AuctionResult(
                winner=winner.bidder_id,
                winning_bid=winner.bid,
                payment=round(payment, 4),
                profit=round(winner.value - payment, 4),
                is_efficient=is_efficient,
            )

        def prove_dsic(self) -> dict:
            """
            Demonstrate that truthful bidding is dominant.
            For each bidder: check that bid=value beats all alternatives.
            """
            proofs = {}
            for bidder in self.bids:
                # Case 1: Bid higher than value
                # Risk: win and pay > value (negative profit)
                overbid_risk = any(
                    b.bid > bidder.value and b.bid < bidder.bid
                    for b in self.bids if b.bidder_id != bidder.bidder_id
                )

                # Case 2: Bid lower than value
                # Risk: lose auction you should have won (missed profit)
                underbid_risk = any(
                    b.bid > bidder.bid and b.bid < bidder.value
                    for b in self.bids if b.bidder_id != bidder.bidder_id
                )

                proofs[bidder.bidder_id] = {
                    "truthful_bid": bidder.value,
                    "actual_bid": bidder.bid,
                    "is_truthful": abs(bidder.bid - bidder.value) < 1e-8,
                    "overbid_could_lose_money": overbid_risk,
                    "underbid_could_miss_profit": underbid_risk,
                }
            return proofs

    # Example: 4 bidders for a painting
    auction = VickreyAuction(reserve_price=50.0)
    auction.submit_bid("Alice", bid=100, true_value=100)    # truthful
    auction.submit_bid("Bob",   bid=80,  true_value=80)     # truthful
    auction.submit_bid("Carol", bid=120, true_value=90)     # overbids!
    auction.submit_bid("Dave",  bid=60,  true_value=95)     # underbids!

    result = auction.run()
    print(f"Winner: {result.winner}, Payment: ${result.payment}")
    # Carol wins with bid=120, pays second-highest=100
    # But Carol's value is only 90! Profit = 90 - 100 = -$10 (LOSS from overbidding)
    # If Carol bid truthfully (90), she'd lose to Alice (100) — better outcome!

    proofs = auction.prove_dsic()
    print(f"Carol overbid risk: {proofs['Carol']['overbid_could_lose_money']}")  # True
    print(f"Dave underbid risk: {proofs['Dave']['underbid_could_miss_profit']}")  # True
  example_bad: |
    # WRONG: First-price auction with naive bidding
    class FirstPriceAuction:
        def run(self, bids: dict[str, float]) -> tuple:
            winner = max(bids, key=bids.get)
            return winner, bids[winner]  # Pays OWN bid!

    # With first-price, rational bidders shade down: bid = value - epsilon
    # But how much to shade? Depends on others' strategies — game-theoretically complex
    # BNE shading for uniform[0,1]: bid = (n-1)/n * value
    # Alice (value=100) should bid ~75 with 4 bidders
    # Much harder to implement correctly than Vickrey
  when_applies: "Designing auctions for ad slots, spectrum, prediction market batch clearing, or any allocation where truthful bidding simplifies participation."
  sources:
    - "https://en.wikipedia.org/wiki/Mechanism_design"
    - "https://en.wikipedia.org/wiki/Vickrey_auction"

- id: FIN-GAME-004
  text: "English (ascending), Dutch (descending), sealed first-price, and sealed second-price (Vickrey) auctions are the four canonical formats. Under Revenue Equivalence (risk-neutral, IPV), all yield the same expected revenue. In practice: English and Vickrey are strategically equivalent (dominant strategy = bid true value); Dutch and first-price are strategically equivalent (bid-shading required). English auctions reveal more information and can reduce the winner's curse."
  why: >
    Choosing the right auction format affects participation, revenue, and strategic
    complexity. eBay uses ascending (English) because it's intuitive and drives emotional
    bidding. Dutch flower auctions are fast (one price, done) — critical when selling
    perishable goods. Google switched from second-price to first-price for display ads
    in 2019, fundamentally changing advertiser bidding strategies. For prediction markets,
    batch auctions (similar to call auctions) combine features of sealed-bid and
    continuous markets. Understanding the equivalences lets you choose the simplest format
    that achieves your goals.
  how_to_do_right: |
    1. Choose English (ascending) when:
       - You want maximum participation (familiar format)
       - Common values component exists (reduces winner's curse through price revelation)
       - Time is not a constraint
       - Implementation: start at reserve, accept bids, close after X seconds of no new bid
    2. Choose Dutch (descending) when:
       - Speed is critical (single round, instant allocation)
       - Perishable/time-sensitive goods
       - Implementation: start high, decrease by tick every T seconds, first bid wins
    3. Choose Vickrey (sealed second-price) when:
       - Truthful bidding is important (DSIC)
       - You want algorithmic simplicity (no bid-shading optimization)
       - Vulnerability to collusion is acceptable
    4. Choose first-price sealed when:
       - You want to minimize collusion risk (winner pays own bid)
       - Bidders are risk-averse (first-price yields MORE revenue than Vickrey with risk aversion)
    5. Revenue Equivalence conditions (when all are equivalent):
       - Risk-neutral bidders
       - Independent Private Values (IPV)
       - Same reserve price
       - When conditions fail, ranking changes — calibrate with your data
    6. For prediction markets:
       - Continuous double auction (CDA) = concurrent English auctions for buy and sell
       - Frequent Batch Auction (FBA) = repeated sealed-bid with uniform clearing price
  severity: medium
  technologies:
    lang: [python]
    framework: [numpy]
  domains:
    domain: [prediction_markets, game_theory, fintech]
    concern: [domain_specific]
  example_good: |
    import numpy as np
    from abc import ABC, abstractmethod
    from dataclasses import dataclass

    @dataclass
    class AuctionOutcome:
        winner: str | None
        price: float
        format_name: str
        num_bids_observed: int

    class Auction(ABC):
        @abstractmethod
        def run(self, valuations: dict[str, float]) -> AuctionOutcome:
            pass

    class EnglishAuction(Auction):
        """Ascending price auction. Dominant strategy: bid up to true value."""

        def __init__(self, reserve: float = 0, increment: float = 1.0):
            self.reserve = reserve
            self.increment = increment

        def run(self, valuations: dict[str, float]) -> AuctionOutcome:
            # Simulate: price rises, bidders drop out when price > their value
            sorted_vals = sorted(valuations.items(), key=lambda x: x[1], reverse=True)
            if not sorted_vals or sorted_vals[0][1] < self.reserve:
                return AuctionOutcome(None, 0, "english", 0)

            # Winner = highest value, price = second-highest value (or reserve)
            winner = sorted_vals[0][0]
            price = max(sorted_vals[1][1] if len(sorted_vals) > 1 else self.reserve, self.reserve)
            return AuctionOutcome(winner, price, "english", len(sorted_vals))

    class DutchAuction(Auction):
        """Descending price auction. Equivalent to first-price sealed-bid."""

        def __init__(self, start_price: float = 1000, decrement: float = 1.0):
            self.start = start_price
            self.decrement = decrement

        def run(self, valuations: dict[str, float]) -> AuctionOutcome:
            # Each bidder has a threshold (< value due to shading)
            # With uniform valuations and n bidders: threshold = (n-1)/n * value
            n = len(valuations)
            thresholds = {k: v * (n - 1) / n for k, v in valuations.items()}  # BNE shading

            # First bidder to reach their threshold wins
            winner = max(thresholds, key=thresholds.get)
            price = thresholds[winner]
            return AuctionOutcome(winner, round(price, 2), "dutch", 1)

    class FrequentBatchAuction(Auction):
        """Batch auction with uniform clearing price — for prediction markets."""

        def __init__(self, batch_interval_sec: float = 1.0):
            self.interval = batch_interval_sec

        def run(self, valuations: dict[str, float]) -> AuctionOutcome:
            # All bids collected, uniform price set at market-clearing level
            # For single item: clearing price = second-highest bid (like Vickrey)
            sorted_vals = sorted(valuations.values(), reverse=True)
            if len(sorted_vals) < 2:
                return AuctionOutcome(None, 0, "batch", len(sorted_vals))

            winner = max(valuations, key=valuations.get)
            clearing_price = sorted_vals[1]  # uniform price
            return AuctionOutcome(winner, clearing_price, "batch", len(sorted_vals))

    # Revenue equivalence demonstration
    np.random.seed(42)
    n_trials = 10_000
    n_bidders = 5

    revenues = {"english": [], "dutch": [], "batch": []}
    english = EnglishAuction()
    dutch = DutchAuction(start_price=100)
    batch = FrequentBatchAuction()

    for _ in range(n_trials):
        vals = {f"b{i}": np.random.uniform(0, 100) for i in range(n_bidders)}
        revenues["english"].append(english.run(vals).price)
        revenues["dutch"].append(dutch.run(vals).price)
        revenues["batch"].append(batch.run(vals).price)

    for fmt, rev in revenues.items():
        print(f"{fmt:8s}: avg revenue = ${np.mean(rev):.2f}")
    # All ~$66.67 (= 100 * (n-1)/(n+1) for uniform[0,100] with 5 bidders)
