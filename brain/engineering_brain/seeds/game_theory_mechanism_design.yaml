- id: FIN-GAME-007
  text: "Market manipulation is a game-theoretic phenomenon where manipulators exploit market structure for profit. Wash trading inflates volume at zero cost. Spoofing places orders intended to cancel (layering). Pump-and-dump accumulates, promotes, then dumps. The Hunt brothers' 1980 silver squeeze demonstrated corner/squeeze manipulation. Detection requires modeling the manipulator's strategy space and identifying dominated strategies that only make sense if manipulation is the goal."
  why: >
    Market manipulation is not just illegal — it destroys market integrity and drives
    away legitimate participants. The SEC estimated $1.2B in losses from pump-and-dump
    schemes in crypto in 2021 alone. For prediction markets, manipulation is especially
    pernicious because it corrupts the information aggregation function: if someone can
    move the price to 0.90 for a 0.50 event, the market loses its value as a forecasting
    tool. Game-theoretically, manipulation is profitable when the cost of moving the
    price (market impact) is less than the benefit from correlated positions, insurance
    payoffs, or reputation effects. Detection algorithms must model rational manipulator
    behavior to distinguish it from legitimate trading.
  how_to_do_right: |
    1. Wash trading detection:
       - Track entity-level volume (not account-level)
       - Flag: buy and sell from same entity within T seconds at similar prices
       - Flag: volume from entity > 30% of market volume
       - Metric: entity_wash_ratio = self_trades / total_trades
    2. Spoofing/layering detection:
       - Track order lifetime: median < 100ms is suspicious
       - Track cancel rate: > 90% cancellation rate for size > 10x average
       - Pattern: large order placed, small trade occurs on opposite side, large order cancelled
    3. Pump-and-dump detection:
       - Volume spike (> 5x average) + price increase (> 20%) + social media mention
       - Followed by: insider sells within 24-72 hours
       - Track: accumulation phase (steady buying, 1-7 days before the spike)
    4. Corner/squeeze detection:
       - Single entity accumulates > X% of float/open interest
       - Short interest > 100% of float (physical settlement markets)
       - Position concentration reporting (CFTC large trader reports)
    5. Game-theoretic detection principle:
       - A trade that loses money in isolation but profits from a correlated position
         is a manipulation signal
       - Example: losing $10K moving prediction market price, profiting $100K on insurance
    6. Penalties must exceed expected profit:
       - Expected_penalty > P(detection) * penalty_amount
       - If penalty = 2x profit and detection = 50%, expected penalty > expected profit
  severity: critical
  technologies:
    lang: [python]
    framework: [pandas, numpy, networkx]
  domains:
    domain: [prediction_markets, fintech, trading]
    concern: [security, domain_specific]
  example_good: |
    import numpy as np
    import pandas as pd
    from collections import defaultdict
    from dataclasses import dataclass

    @dataclass
    class ManipulationAlert:
        alert_type: str         # wash_trading, spoofing, pump_and_dump, corner
        severity: str           # low, medium, high, critical
        entity_id: str
        evidence: dict
        confidence: float       # 0-1

    class ManipulationDetector:
        """Multi-strategy market manipulation detection."""

        def __init__(self):
            self.alerts: list[ManipulationAlert] = []

        def detect_wash_trading(self, trades: pd.DataFrame, entity_col: str = "entity_id") -> list[ManipulationAlert]:
            """Detect wash trading from trade data."""
            alerts = []
            for entity in trades[entity_col].unique():
                entity_trades = trades[trades[entity_col] == entity]

                # Check for self-trading patterns
                buys = entity_trades[entity_trades["side"] == "buy"]
                sells = entity_trades[entity_trades["side"] == "sell"]

                if len(buys) == 0 or len(sells) == 0:
                    continue

                # Time-proximity matching
                wash_count = 0
                for _, buy in buys.iterrows():
                    matching_sells = sells[
                        (abs(sells["timestamp"] - buy["timestamp"]) < 5.0) &  # within 5 seconds
                        (abs(sells["price"] - buy["price"]) / buy["price"] < 0.001)  # within 0.1%
                    ]
                    wash_count += len(matching_sells)

                wash_ratio = wash_count / len(entity_trades)

                if wash_ratio > 0.3:
                    alert = ManipulationAlert(
                        alert_type="wash_trading",
                        severity="critical" if wash_ratio > 0.7 else "high",
                        entity_id=entity,
                        evidence={
                            "wash_count": wash_count,
                            "total_trades": len(entity_trades),
                            "wash_ratio": round(wash_ratio, 3),
                        },
                        confidence=min(0.95, wash_ratio * 1.2),
                    )
                    alerts.append(alert)

            self.alerts.extend(alerts)
            return alerts

        def detect_spoofing(self, orders: pd.DataFrame) -> list[ManipulationAlert]:
            """Detect spoofing from order lifecycle data."""
            alerts = []

            for entity in orders["entity_id"].unique():
                entity_orders = orders[orders["entity_id"] == entity]

                cancelled = entity_orders[entity_orders["status"] == "cancelled"]
                filled = entity_orders[entity_orders["status"] == "filled"]

                if len(entity_orders) < 10:
                    continue

                cancel_rate = len(cancelled) / len(entity_orders)
                avg_lifetime_ms = cancelled["lifetime_ms"].mean() if len(cancelled) > 0 else 999

                # Spoofing signature: high cancel rate + short lifetime + large size
                if cancel_rate > 0.9 and avg_lifetime_ms < 200:
                    large_cancelled = cancelled[cancelled["quantity"] > cancelled["quantity"].median() * 5]
                    if len(large_cancelled) > 5:
                        alert = ManipulationAlert(
                            alert_type="spoofing",
                            severity="high",
                            entity_id=entity,
                            evidence={
                                "cancel_rate": round(cancel_rate, 3),
                                "avg_lifetime_ms": round(avg_lifetime_ms, 1),
                                "large_cancel_count": len(large_cancelled),
                            },
                            confidence=0.8,
                        )
                        alerts.append(alert)

            self.alerts.extend(alerts)
            return alerts

    # Example
    np.random.seed(42)
    trades = pd.DataFrame({
        "entity_id": ["alice"] * 20 + ["bob"] * 10,
        "side": (["buy", "sell"] * 10) + (["buy"] * 7 + ["sell"] * 3),
        "price": np.random.uniform(0.59, 0.61, 30),
        "quantity": np.random.randint(10, 100, 30),
        "timestamp": np.sort(np.random.uniform(0, 10, 30)),
    })

    detector = ManipulationDetector()
    wash_alerts = detector.detect_wash_trading(trades)
    for alert in wash_alerts:
        print(f"ALERT: {alert.alert_type} - {alert.entity_id} "
              f"(ratio={alert.evidence['wash_ratio']}, severity={alert.severity})")
  example_bad: |
    # WRONG: Only checking volume without entity-level analysis
    def naive_manipulation_check(volume_today, avg_volume):
        if volume_today > 5 * avg_volume:
            return "suspicious"
        return "ok"

    # Volume spikes also happen on legitimate news events
    # A manipulator using 50 accounts with normal individual volume passes this check
    # Need entity-level aggregation, timing analysis, and behavioral patterns
  when_applies: "Building exchange surveillance systems, prediction market monitoring, or any trading platform that needs to detect and prevent market manipulation."
  sources:
    - "https://en.wikipedia.org/wiki/Game_theory"
    - "https://en.wikipedia.org/wiki/Market_microstructure"

- id: FIN-GAME-008
  text: "Signaling games (Spence 1973) model situations where informed agents take costly actions to credibly convey private information. A signal is credible only if it's differentially costly: it must cost more for low-quality types to mimic high-quality types. Cheap talk (costless signals) is uninformative in equilibrium unless interests are sufficiently aligned (Crawford-Sobel). Prediction markets are a signaling mechanism where the cost of the signal is the trading loss from wrong beliefs."
  why: >
    Signaling theory explains why some information mechanisms work and others fail.
    Education as a signal (Spence's model) works because it's harder for less-able
    workers to complete, even if education doesn't increase productivity. In prediction
    markets, a trader who bets $10,000 at 80% is sending a costly signal of their belief —
    if they're wrong, they lose $8,000. This is why prediction market prices are
    informative: the signal (money at risk) is differentially costly for those with
    wrong beliefs. Cheap talk (social media predictions, pundit forecasts) is nearly
    costless and therefore uninformative — pundits face no penalty for wrong predictions.
    Understanding signaling theory is crucial for designing information elicitation
    mechanisms and evaluating their credibility.
  how_to_do_right: |
    1. Identify the signaling structure:
       - Sender: who has private information? (trader, worker, firm)
       - Signal: what costly action reveals information? (bet size, education, spending)
       - Receiver: who updates beliefs based on the signal? (market, employer, investor)
    2. Verify single-crossing condition:
       - Cost of signal must be lower for high-quality types
       - dc/d_quality < 0 (higher quality => lower cost of signaling quality)
       - If violated: pooling equilibrium (no information conveyed)
    3. Compute separating equilibrium:
       - High type chooses signal level s* such that low type won't mimic:
         u_low(mimic) = value_high - cost_low(s*) <= u_low(no_signal) = value_low
         => cost_low(s*) >= value_high - value_low
    4. For prediction markets as signals:
       - Signal strength = dollars at risk * (1 - probability)
       - More informative: larger bets, more extreme prices
       - Track: who puts money where their mouth is
    5. Cheap talk settings:
       - Only informative when sender/receiver interests are aligned
       - Crawford-Sobel: with N types, at most N distinct messages in equilibrium
       - Social media forecasts are cheap talk — weight by track record, not confidence
    6. Design implications:
       - Make signals costly to produce for liars (skin in the game)
       - Report signal cost alongside the signal (bet size, not just price)
       - Aggregate costly signals (bets) more heavily than cheap talk (opinions)
  severity: medium
  technologies:
    lang: [python]
    framework: [numpy, scipy]
  domains:
    domain: [prediction_markets, game_theory]
    concern: [domain_specific]
  example_good: |
    import numpy as np
    from dataclasses import dataclass

    @dataclass
    class Signal:
        sender_id: str
        reported_probability: float
        dollars_at_risk: float
        signal_cost: float          # expected loss if wrong
        credibility_score: float    # higher = more credible

    class SignalCredibilityAnalyzer:
        """Evaluate signal credibility using costly signaling theory."""

        def __init__(self, cheap_talk_discount: float = 0.1):
            self.cheap_talk_discount = cheap_talk_discount

        def compute_signal_cost(self, bet_size: float, probability: float) -> float:
            """
            Expected cost of being wrong = bet_size * P(wrong).
            Higher cost = more credible signal.
            """
            p_wrong = 1 - probability if probability > 0.5 else probability
            return bet_size * p_wrong

        def credibility_score(
            self,
            bet_size: float,
            probability: float,
            track_record: float = 0.5,  # historical Brier score [0, 1]
            is_costly: bool = True,
        ) -> Signal:
            """
            Compute credibility of a prediction signal.
            Costly signals (bets) are weighted much higher than cheap talk.
            """
            signal_cost = self.compute_signal_cost(bet_size, probability)

            # Base credibility from cost (logarithmic — diminishing returns)
            if is_costly and signal_cost > 0:
                cost_credibility = min(1.0, np.log1p(signal_cost) / np.log1p(10000))
            else:
                cost_credibility = self.cheap_talk_discount

            # Track record modifier
            record_modifier = 0.5 + track_record  # [0.5, 1.5]

            credibility = min(1.0, cost_credibility * record_modifier)

            return Signal(
                sender_id="",
                reported_probability=probability,
                dollars_at_risk=bet_size,
                signal_cost=round(signal_cost, 2),
                credibility_score=round(credibility, 4),
            )

        def aggregate_signals(self, signals: list[Signal]) -> float:
            """
            Aggregate predictions weighted by credibility (costly signaling weight).
            Returns credibility-weighted average probability.
            """
            if not signals:
                return 0.5

            total_weight = sum(s.credibility_score for s in signals)
            if total_weight == 0:
                return np.mean([s.reported_probability for s in signals])

            weighted_prob = sum(
                s.reported_probability * s.credibility_score for s in signals
            ) / total_weight

            return round(weighted_prob, 4)

    # Example: comparing costly bet vs cheap talk
    analyzer = SignalCredibilityAnalyzer(cheap_talk_discount=0.1)

    # Trader bets $5000 at 80%
    costly = analyzer.credibility_score(bet_size=5000, probability=0.80, track_record=0.7, is_costly=True)
    print(f"Costly bet: credibility={costly.credibility_score}, cost=${costly.signal_cost}")
    # credibility ~ 0.85, cost = $1000

    # Pundit tweets "80% chance" (no money at risk)
    cheap = analyzer.credibility_score(bet_size=0, probability=0.80, track_record=0.4, is_costly=False)
    print(f"Cheap talk: credibility={cheap.credibility_score}, cost=${cheap.signal_cost}")
    # credibility ~ 0.09, cost = $0

    # Aggregate: costly signal dominates
    signals = [costly, cheap]
    agg = analyzer.aggregate_signals(signals)
    print(f"Aggregated probability: {agg}")  # ~0.80 (dominated by costly signal)
  example_bad: |
    # WRONG: Weighting all predictions equally regardless of cost
    def naive_aggregate(predictions):
        return np.mean(predictions)

    # Pundit says 20%, trader bets $50K at 80%
    result = naive_aggregate([0.20, 0.80])  # = 0.50
    # Should weight the $50K bet much more heavily!
    # The pundit's cheap talk is essentially noise — near zero information value
    # Proper weighting: ~0.78 (bet dominates)
  when_applies: "Designing information aggregation systems, evaluating forecast credibility, building reputation systems, or understanding why prediction markets outperform polls."
