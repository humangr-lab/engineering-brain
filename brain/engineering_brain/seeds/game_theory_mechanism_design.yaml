    - "https://en.wikipedia.org/wiki/Game_theory"

- id: FIN-GAME-006
  text: "A proper scoring rule incentivizes truthful probability reporting: the reporter maximizes expected score by reporting their true belief. Strictly proper rules have a UNIQUE maximum at the true belief. The Brier score S(p, o) = 1 - (p - o)^2 and logarithmic score S(p, o) = o*ln(p) + (1-o)*ln(1-p) are the two most common strictly proper rules. Logarithmic scoring is used in LMSR prediction markets."
  why: >
    Scoring rules are the theoretical backbone of prediction markets, forecasting
    tournaments, and oracle protocols. If your scoring rule is not strictly proper,
    forecasters have incentive to report something OTHER than their true belief.
    The Good Judgment Project (which outperformed CIA analysts by 30%) used Brier scoring.
    Metaculus uses logarithmic scoring. The logarithmic rule has the advantage of being
    "local" — your score depends only on the probability you assigned to the outcome
    that occurred, making it suitable for multi-outcome markets. Brier scoring is bounded
    [0, 1] which is easier to interpret but penalizes extreme confidence less than
    logarithmic scoring. For prediction market AMMs, logarithmic scoring directly
    corresponds to the LMSR cost function.
  how_to_do_right: |
    1. Brier score (quadratic):
       - S(p, o) = 1 - sum((p_i - o_i)^2) for multi-class
       - Range: [0, 1], higher is better
       - Symmetric around 0.5, gentle penalty for miscalibration
    2. Logarithmic score:
       - S(p, o) = sum(o_i * ln(p_i))
       - Range: (-inf, 0], higher is better
       - Harsh penalty for confident wrong predictions (ln(0.01) = -4.6)
       - Clip probabilities: use max(p, epsilon) to avoid -inf
    3. Verify strict properness:
       - For any belief q, E_q[S(p)] is maximized at p = q
       - Equivalently: d/dp E_q[S(p)] = 0 at p = q and d^2/dp^2 < 0
    4. Choose based on use case:
       - Brier: bounded, interpretable, good for calibration assessment
       - Logarithmic: unbounded, used in LMSR, better discrimination at extremes
       - Spherical: normalized, useful for multi-class with many outcomes
    5. For prediction markets:
       - Cost of moving price from p to p' = integral of scoring rule from p to p'
       - LMSR = market using logarithmic scoring rule
    6. Aggregate forecasts:
       - Geometric mean of probabilities (logarithmic pooling) if using log score
       - Linear mean (arithmetic pooling) if using Brier score
  severity: high
  technologies:
    lang: [python]
    framework: [numpy]
  domains:
    domain: [prediction_markets, game_theory]
    concern: [domain_specific]
  example_good: |
    import numpy as np

    class ScoringRules:
        """Strictly proper scoring rules for probability evaluation."""

        @staticmethod
        def brier_score(predicted: np.ndarray, outcome: np.ndarray) -> float:
            """
            Brier score. Higher = better. Range [0, 1].
            predicted: probability vector (sums to 1)
            outcome: one-hot vector of actual outcome
            """
            return float(1.0 - np.sum((predicted - outcome) ** 2))

        @staticmethod
        def log_score(predicted: np.ndarray, outcome: np.ndarray, epsilon: float = 1e-8) -> float:
            """
            Logarithmic score. Higher = better. Range (-inf, 0].
            Clips probabilities to avoid -inf.
            """
            clipped = np.clip(predicted, epsilon, 1.0)
            return float(np.sum(outcome * np.log(clipped)))

        @staticmethod
        def verify_properness(
            scoring_fn, true_belief: np.ndarray, n_alternatives: int = 100
        ) -> dict:
            """
            Numerically verify that a scoring rule is proper.
            Score should be maximized when report = true_belief.
            """
            # Expected score when reporting truthfully
            outcomes = np.eye(len(true_belief))
            truthful_expected = sum(
                true_belief[i] * scoring_fn(true_belief, outcomes[i])
                for i in range(len(true_belief))
            )

            # Try random alternative reports
            best_deviation_gain = 0.0
            worst_alternative = None

            for _ in range(n_alternatives):
                alt = np.random.dirichlet(np.ones(len(true_belief)))
                alt_expected = sum(
                    true_belief[i] * scoring_fn(alt, outcomes[i])
                    for i in range(len(true_belief))
                )
                gain = alt_expected - truthful_expected
                if gain > best_deviation_gain:
                    best_deviation_gain = gain
                    worst_alternative = alt

            return {
                "is_proper": best_deviation_gain < 1e-6,
                "truthful_expected_score": round(truthful_expected, 6),
                "max_deviation_gain": round(best_deviation_gain, 8),
                "worst_alternative": worst_alternative,
            }

    sr = ScoringRules()

    # Binary prediction: we believe P(rain) = 0.7
    pred = np.array([0.7, 0.3])
    rain = np.array([1, 0])
    no_rain = np.array([0, 1])

    print(f"Brier (rain):    {sr.brier_score(pred, rain):.4f}")    # 0.82
    print(f"Brier (no rain): {sr.brier_score(pred, no_rain):.4f}") # 0.58
    print(f"Log (rain):      {sr.log_score(pred, rain):.4f}")      # -0.357
    print(f"Log (no rain):   {sr.log_score(pred, no_rain):.4f}")   # -1.204

    # Verify Brier is proper
    true_belief = np.array([0.7, 0.3])
    result = sr.verify_properness(sr.brier_score, true_belief)
    print(f"Brier is proper: {result['is_proper']}, max gain from lying: {result['max_deviation_gain']}")

    # Verify log score is proper
    result_log = sr.verify_properness(sr.log_score, true_belief)
    print(f"Log is proper: {result_log['is_proper']}")

    # Compare: extreme confidence
    confident = np.array([0.99, 0.01])
    wrong_outcome = np.array([0, 1])
    print(f"\nOverconfident and wrong:")
    print(f"  Brier:  {sr.brier_score(confident, wrong_outcome):.4f}")  # 0.0202 (mild)
    print(f"  Log:    {sr.log_score(confident, wrong_outcome):.4f}")    # -4.605 (severe!)
  example_bad: |
    # WRONG: Using an IMPROPER scoring rule — agents have incentive to lie
    def absolute_error_score(predicted_prob, outcome):
        return -abs(predicted_prob - outcome)

    # This is NOT strictly proper! With belief p=0.7:
    # E[score(report=0.7)] = 0.7*(-0.3) + 0.3*(-0.7) = -0.42
    # E[score(report=1.0)] = 0.7*(-0.0) + 0.3*(-1.0) = -0.30  <- HIGHER!
    # Agent should report 1.0 (not their true 0.7) to maximize score
    # All agents converge to extreme reports (0 or 1) regardless of true beliefs
  when_applies: "Evaluating forecast quality, designing prediction market payoffs, building oracle protocols, or any system that needs to elicit truthful probability estimates."
  sources:
