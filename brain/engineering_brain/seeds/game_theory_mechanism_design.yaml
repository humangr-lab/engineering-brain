- id: FIN-GAME-005
  text: "Prediction markets aggregate information via market prices. Hanson's Market Scoring Rule (MSR) combines a scoring rule with a market maker: the market maker always offers to trade using a proper scoring rule, guaranteeing liquidity and bounded loss. LMSR (Logarithmic MSR) is the standard: cost C(q) = b*ln(sum(exp(q_i/b))), with market maker max loss = b*ln(N). Prices sum to 1.0 automatically."
  why: >
    Prediction markets are the most accurate known method for aggregating distributed
    information — outperforming polls, expert panels, and statistical models in studies
    by IARPA, Google, and the Good Judgment Project. Hanson's key insight was combining
    proper scoring rules (which incentivize truthful reporting) with a market maker (which
    provides liquidity). Without the MSR, prediction markets either have no liquidity
    (nobody wants to be the first trader) or have incoherent prices (probabilities don't
    sum to 1). The LMSR specifically guarantees: (1) always-available liquidity, (2)
    bounded loss for the market maker, (3) prices that are coherent probabilities, and
    (4) information aggregation as a natural equilibrium. This is why Polymarket,
    Metaculus, and Manifold all use LMSR variants.
  how_to_do_right: |
    1. LMSR cost function: C(q) = b * ln(sum(exp(q_i / b)))
       - q_i = outstanding shares of outcome i
       - b = liquidity parameter (higher = more liquidity, more market maker risk)
    2. Use log-sum-exp trick: C(q) = b * (max_s + ln(sum(exp(s_i - max_s))))
       where s_i = q_i / b (prevents overflow for large q values)
    3. Prices: p_i = exp(q_i / b) / sum(exp(q_j / b)) — always sum to 1.0
    4. Cost of buying delta_i shares of outcome i:
       - cost = C(q + delta_i * e_i) - C(q)
       - e_i is unit vector for outcome i
    5. Set b based on acceptable market maker loss:
       - max_loss = b * ln(N) where N = number of outcomes
       - For binary market with $1000 max loss: b = 1000 / ln(2) = 1443
    6. Information aggregation properties:
       - Traders who believe p_true != p_market profit by trading toward p_true
       - Market price converges to weighted average of traders' beliefs
       - Weights are proportional to wealth (budget-weighted)
    7. Edge case: near 0 or 1, LMSR requires large trades to move price
       - This is a feature (stability) not a bug
  severity: critical
  technologies:
    lang: [python]
    framework: [numpy]
  domains:
    domain: [prediction_markets, game_theory, fintech]
    concern: [domain_specific]
  example_good: |
    import math
    from decimal import Decimal, getcontext

    getcontext().prec = 28

    class HansonLMSR:
        """
        Logarithmic Market Scoring Rule — the canonical prediction market AMM.
        Provides: guaranteed liquidity, bounded loss, coherent probabilities.
        """

        def __init__(self, b: float, num_outcomes: int):
            """
            b: liquidity parameter. Max market maker loss = b * ln(num_outcomes).
            num_outcomes: number of mutually exclusive outcomes.
            """
            self.b = b
            self.n = num_outcomes
            self.q = [0.0] * num_outcomes  # outstanding shares per outcome
            self.max_loss = b * math.log(num_outcomes)

        def _cost(self, quantities: list[float]) -> float:
            """Log-sum-exp cost function with numerical stability."""
            scaled = [qi / self.b for qi in quantities]
            max_s = max(scaled)
            return self.b * (max_s + math.log(sum(math.exp(s - max_s) for s in scaled)))

        def prices(self) -> list[float]:
            """Current probability for each outcome. Always sums to 1.0."""
            scaled = [qi / self.b for qi in self.q]
            max_s = max(scaled)
            exps = [math.exp(s - max_s) for s in scaled]
            total = sum(exps)
            return [round(e / total, 8) for e in exps]

        def cost_to_buy(self, outcome: int, shares: float) -> Decimal:
            """Cost in $ to buy `shares` shares of `outcome`."""
            q_after = list(self.q)
            q_after[outcome] += shares
            cost = self._cost(q_after) - self._cost(self.q)
            return Decimal(str(round(cost, 10)))

        def buy(self, outcome: int, shares: float) -> dict:
            """Execute a buy trade. Returns trade details."""
            cost = self.cost_to_buy(outcome, shares)
            prices_before = self.prices()
            self.q[outcome] += shares
            prices_after = self.prices()

            return {
                "cost": float(cost),
                "shares": shares,
                "outcome": outcome,
                "price_before": prices_before[outcome],
                "price_after": prices_after[outcome],
                "price_impact": prices_after[outcome] - prices_before[outcome],
                "all_prices": prices_after,
                "prices_sum": round(sum(prices_after), 8),  # should be 1.0
            }

        def market_maker_pnl(self, resolved_outcome: int) -> float:
            """P&L for market maker when outcome resolves."""
            total_revenue = self._cost(self.q) - self._cost([0.0] * self.n)
            # Pay out 1 per share of winning outcome
            payout = self.q[resolved_outcome]
            return round(total_revenue - payout, 4)

    # Example: Binary market on "Will it rain tomorrow?"
    market = HansonLMSR(b=100, num_outcomes=2)
    print(f"Initial prices: {market.prices()}")  # [0.5, 0.5]
    print(f"Max market maker loss: ${market.max_loss:.2f}")  # $69.31

    # Trader buys 50 shares of YES (outcome 0)
    trade1 = market.buy(outcome=0, shares=50)
    print(f"Cost: ${trade1['cost']:.2f}, Price moved: {trade1['price_before']:.3f} -> {trade1['price_after']:.3f}")
    # Cost: ~$28.80, Price: 0.500 -> 0.622

    # Another trader buys 30 shares of NO (outcome 1)
    trade2 = market.buy(outcome=1, shares=30)
    print(f"Cost: ${trade2['cost']:.2f}, Prices: {trade2['all_prices']}")
    print(f"Prices sum: {trade2['prices_sum']}")  # Always 1.0

    # Resolution: it rained (outcome 0 wins)
    pnl = market.market_maker_pnl(resolved_outcome=0)
    print(f"Market maker P&L: ${pnl:.2f}")  # Between -$69.31 and +infinity
  example_bad: |
    # WRONG: Simple order book without AMM — no guaranteed liquidity
    class NaivePredictionMarket:
        def __init__(self):
