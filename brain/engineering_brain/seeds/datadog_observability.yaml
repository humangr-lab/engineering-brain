layer: rules
technology: Datadog
domain: observability
knowledge:
- id: CR-DD-001
  text: Use auto-instrumentation for distributed tracing — do not manually instrument every function.
  why: Manual instrumentation is error-prone and incomplete. Developers forget to add spans, mis-label them, or skip error
    recording. Auto-instrumentation via dd-trace captures HTTP requests, database queries, cache calls, and message queue
    operations automatically — with correct timing, error states, and span relationships.
  how_to_do_right: Install dd-trace for your language (ddtrace for Python, dd-trace-js for Node). Enable auto-instrumentation
    at application startup (ddtrace-run or import ddtrace.auto). Add manual spans ONLY for business-logic operations not covered
    by auto-instrumentation (e.g. 'process_payment', 'calculate_risk_score'). Tag custom spans with business context.
  severity: critical
  technologies:
    lang: [python, java, go]
    library: [node, js]
    platform: [datadog]
  domains:
    domain: [observability, operations, performance]
  example_good: "# Python — auto-instrumentation catches frameworks, DB, cache\n# Launch: ddtrace-run python app.py\n# OR\
    \ in code:\nfrom ddtrace import tracer, patch_all\npatch_all()  # Auto-instruments: Flask, Django, SQLAlchemy, Redis,\
    \ requests, etc.\n\n# Manual span ONLY for business logic\n@tracer.wrap(service=\"payment\", resource=\"process_payment\"\
    )\ndef process_payment(order_id: str, amount: float) -> PaymentResult:\n    # Auto-instrumented: DB queries, HTTP calls\
    \ to payment gateway\n    # Manual span adds business context\n    span = tracer.current_span()\n    span.set_tag(\"order.id\"\
    , order_id)\n    span.set_tag(\"payment.amount\", amount)\n    span.set_tag(\"payment.currency\", \"USD\")\n\n    result\
    \ = payment_gateway.charge(amount)  # Auto-traced HTTP call\n    span.set_tag(\"payment.status\", result.status)\n   \
    \ return result\n"
  example_bad: "# No auto-instrumentation — manual spans on every function\nfrom ddtrace import tracer\n\ndef process_payment(order_id,\
    \ amount):\n    with tracer.trace(\"process_payment\"):  # Manual\n        with tracer.trace(\"db.query\"):     # Manual\
    \ — ddtrace does this automatically\n            order = db.get(order_id)\n        with tracer.trace(\"http.request\"\
    ):  # Manual — ddtrace does this automatically\n            result = requests.post(url, json=data)\n    # Forgot to add\
    \ spans for cache calls — invisible in traces\n    # Forgot to set error tags — failures show as successes\n"
  when_applies: Any project using Datadog, Python codebases, Node.js, or Java/JVM applications
  when_not_applies: throwaway prototypes, local dev scripts
  sources: ["https://docs.datadoghq.com/tracing/trace_collection/automatic_instrumentation/dd_libraries/python/"]
- id: CR-DD-002
  text: Tag traces with business context — not just technical metadata.
  why: Technical spans (HTTP 500, query took 2s) tell you WHAT failed. Business tags (customer_tier=enterprise, order_value=50000,
    feature_flag=new_checkout) tell you WHO is affected and the business IMPACT. Without business context, P0 incidents are
    treated the same as low-impact issues.
  how_to_do_right: 'Add business-relevant tags to root spans: customer ID, customer tier, order value, feature flags, environment.
    Use Datadog''s unified service tagging (env, service, version). Create monitors based on business tags (e.g. alert if
    enterprise customer error rate > 1%). Use tags for filtering in dashboards and notebooks.'
  severity: high
  technologies:
    platform: [datadog, opentelemetry]
  domains:
    domain: [observability, operations]
  example_good: "from ddtrace import tracer\n\n@app.middleware(\"http\")\nasync def business_context_middleware(request, call_next):\n\
    \    span = tracer.current_span()\n    if span:\n        # Business context — enables impact-based alerting\n        span.set_tag(\"\
    customer.id\", request.state.customer_id)\n        span.set_tag(\"customer.tier\", request.state.tier)  # free/pro/enterprise\n\
    \        span.set_tag(\"feature.checkout_v2\", request.state.flags.get(\"checkout_v2\"))\n\n    response = await call_next(request)\n\
    \n    if span:\n        span.set_tag(\"http.status_code\", response.status_code)\n        if response.status_code >= 500:\n\
    \            span.set_tag(\"error.impact\", f\"tier={request.state.tier}\")\n    return response\n\n# Datadog monitor:\
    \ alert if enterprise error rate > 1%\n# Query: avg(last_5m):sum:trace.http.request.errors{customer.tier:enterprise}\n\
    #        / sum:trace.http.request.hits{customer.tier:enterprise} > 0.01\n"
  example_bad: "# Only technical tags — no business context\n@app.route(\"/orders\", methods=[\"POST\"])\ndef create_order():\n\
    \    # No tags — in Datadog, this is just \"POST /orders\"\n    # When it fails: \"POST /orders has 5% error rate\"\n\
    \    # But who is affected? $100 order or $100K order? Free or enterprise?\n    order = create_order_in_db(request.json)\n\
    \    return jsonify(order)\n"
  when_applies: Projects using Datadog or OpenTelemetry
  when_not_applies: throwaway prototypes, local dev scripts. projects not using Datadog or OpenTelemetry
  sources: ["https://docs.datadoghq.com/getting_started/tagging/unified_service_tagging/"]
- id: CR-DD-003
  text: Use Datadog's service map to verify service dependencies — not just documentation.
  why: Architecture diagrams go stale within weeks. The service map is auto-generated from actual trace data — it shows REAL
    dependencies, REAL call patterns, and REAL error rates. When a service has an unexpected dependency, it appears on the
    map, revealing coupling that documentation missed.
  how_to_do_right: Ensure all services have unified service tagging (DD_ENV, DD_SERVICE, DD_VERSION). Review the service map
    weekly for unexpected dependencies. Use the map to plan incident blast radius. Drill into edges (service-to-service connections)
    to see error rates and latency. Compare service map across environments (staging vs production).
  severity: medium
  technologies:
    platform: [datadog]
  domains:
    domain: [observability, architecture, operations]
  example_good: "# Unified service tagging — required for accurate service map\n# docker-compose.yml\nservices:\n  orders-api:\n\
    \    environment:\n      DD_ENV: production\n      DD_SERVICE: orders-api\n      DD_VERSION: \"2.4.1\"\n    labels:\n\
    \      com.datadoghq.tags.env: production\n      com.datadoghq.tags.service: orders-api\n      com.datadoghq.tags.version:\
    \ \"2.4.1\"\n\n# Kubernetes — via admission controller\napiVersion: apps/v1\nkind: Deployment\nmetadata:\n  labels:\n\
    \    tags.datadoghq.com/env: production\n    tags.datadoghq.com/service: orders-api\n    tags.datadoghq.com/version: \"\
    2.4.1\"\n\n# Result: Datadog auto-generates service map showing:\n# orders-api → postgresql, orders-api → redis, orders-api\
    \ → payment-service\n"
  example_bad: "# No service tagging — Datadog shows \"unnamed-service\" or merges services\nservices:\n  orders-api:\n  \
    \  environment:\n      # No DD_SERVICE — Datadog guesses from container name\n      # No DD_ENV — production and staging\
    \ traces mixed together\n      # No DD_VERSION — can't compare v2.3 vs v2.4 error rates\n      SOME_VAR: value\n"
  when_applies: Projects using Datadog
  when_not_applies: throwaway prototypes, local dev scripts. projects not using Datadog
  sources: ["https://docs.datadoghq.com/service_catalog/navigating/service_map/"]
- id: CR-DD-004
  text: Use DogStatsD for custom application metrics — not Datadog API direct calls.
  why: The Datadog API has rate limits and adds latency to your application (HTTP call per metric submission). DogStatsD is
    a UDP-based local agent that batches and forwards metrics asynchronously — zero latency impact on your application, no
    rate limits, and works even if the network is down (fire-and-forget).
  how_to_do_right: 'Install the Datadog Agent on each host/pod (it includes DogStatsD). Use the DogStatsD client library (datadog
    for Python, hot-shots for Node). Send metrics with meaningful tags. Use appropriate metric types: counters for events,
    gauges for current values, histograms for distributions.'
  severity: high
  technologies:
    lang: [python]
    library: [dogstatsd, node, js]
    platform: [datadog]
  domains:
    domain: [observability, performance]
  example_good: "from datadog import DogStatsd\n\nstatsd = DogStatsd(host=\"localhost\", port=8125)\n\ndef process_order(order):\n\
    \    start = time.time()\n    try:\n        result = _process(order)\n\n        # Counter — track events\n        statsd.increment(\"\
    orders.processed\", tags=[\n            f\"status:success\",\n            f\"tier:{order.customer_tier}\",\n         \
    \   f\"region:{order.region}\",\n        ])\n\n        # Histogram — track latency distribution\n        duration = time.time()\
    \ - start\n        statsd.histogram(\"orders.processing_time\", duration, tags=[\n            f\"tier:{order.customer_tier}\"\
    ,\n        ])\n\n        # Gauge — track current state\n        statsd.gauge(\"orders.queue_depth\", get_queue_depth())\n\
    \n        return result\n    except Exception as e:\n        statsd.increment(\"orders.processed\", tags=[\"status:error\"\
    , f\"error:{type(e).__name__}\"])\n        raise\n"
  example_bad: "import requests\n\ndef process_order(order):\n    result = _process(order)\n    # Direct API call — adds latency\
    \ to every request\n    requests.post(\"https://api.datadoghq.com/api/v1/series\", json={\n        \"series\": [{\"metric\"\
    : \"orders.processed\", \"points\": [[time.time(), 1]]}]\n    }, headers={\"DD-API-KEY\": os.getenv(\"DD_API_KEY\")})\n\
    \    # Problems: 50-200ms added per request, rate limited, fails if network is down\n"
  when_applies: Projects using Datadog, DogStatsD, Python codebases, or Node.js
  when_not_applies: throwaway prototypes, local dev scripts
  sources: ["https://docs.datadoghq.com/developers/dogstatsd/"]
- id: CR-DD-005
  text: Define SLOs (Service Level Objectives) with error budgets — not just monitors on arbitrary thresholds.
  why: 'Monitors with arbitrary thresholds (error rate > 5%) create alert fatigue — the threshold is either too sensitive
    (constant alerts) or too lenient (misses real problems). SLOs with error budgets give you a principled framework: 99.9%
    SLO means you have a 0.1% error budget per 30 days. Burn rate alerts fire only when you''re consuming budget too fast.'
  how_to_do_right: 'Define SLOs per critical user journey (not per service). Use monitor-based or metric-based SLOs in Datadog.
    Set burn rate alerts: fast burn (14x in 1h) for paging, slow burn (2x in 6h) for tickets. Display SLO dashboards for stakeholders.
    Review SLO attainment monthly. Adjust targets based on business needs, not engineering pride.'
  severity: high
  technologies:
    library: [sre]
    platform: [datadog]
  domains:
    domain: [observability, operations, reliability]
  example_good: "# Datadog SLO — metric-based for checkout flow\n# Terraform configuration\nresource \"datadog_service_level_objective\"\
    \ \"checkout_availability\" {\n  name        = \"Checkout Flow Availability\"\n  type        = \"metric\"\n  description\
    \ = \"99.9% of checkout requests succeed within 2s\"\n\n  query {\n    numerator   = \"sum:trace.http.request.hits{service:checkout,http.status_code:200}.as_count()\"\
    \n    denominator = \"sum:trace.http.request.hits{service:checkout}.as_count()\"\n  }\n\n  thresholds {\n    timeframe\
    \ = \"30d\"\n    target    = 99.9       # 0.1% error budget = ~43 minutes/month\n    warning   = 99.95\n  }\n\n  tags\
    \ = [\"team:payments\", \"tier:critical\"]\n}\n\n# Burn rate alert — pages only when budget is burning too fast\nresource\
    \ \"datadog_monitor\" \"checkout_slo_burn_rate\" {\n  name    = \"Checkout SLO Fast Burn Rate\"\n  type    = \"slo alert\"\
    \n  query   = \"burn_rate(\\\"${datadog_service_level_objective.checkout_availability.id}\\\").over(\\\"1h\\\").long_window(\\\
    \"1h\\\") > 14\"\n  message = \"Checkout SLO burning 14x budget — page on-call\"\n}\n"
  example_bad: "# Arbitrary threshold monitor — alert fatigue\nresource \"datadog_monitor\" \"checkout_errors\" {\n  name\
    \  = \"Checkout Error Rate High\"\n  query = \"avg(last_5m):sum:errors{service:checkout} / sum:requests{service:checkout}\
    \ > 0.05\"\n  # 5% threshold — too high? too low? Based on what?\n  # Fires at 3 AM for a 6-minute spike that affected\
    \ 2 users\n  # On-call: \"Is this real? Should I wake up?\" Every. Single. Night.\n}\n"
  when_applies: Projects using Datadog or SRE
  when_not_applies: throwaway prototypes, local dev scripts. projects not using Datadog or SRE
  sources: ["https://docs.datadoghq.com/service_management/service_level_objectives/", "https://sre.google/sre-book/service-level-objectives/"]
- id: CR-DD-006
  text: Correlate logs with traces using trace_id — every log line must be linked to its distributed trace.
  why: Without log-to-trace correlation, debugging requires manually matching timestamps across log streams and trace views.
    With correlation, clicking a trace shows ALL related logs from ALL services, and clicking a log line jumps directly to
    the trace — reducing MTTR from hours to minutes.
  how_to_do_right: Enable Datadog log injection in your tracing library (DD_LOGS_INJECTION=true for ddtrace). Use structured
    logging (JSON) with dd.trace_id and dd.span_id fields. Configure log pipelines in Datadog to extract trace_id for correlation.
    Verify correlation works in the Datadog UI — logs tab should appear in trace details.
  severity: high
  technologies:
    lang: [python, java]
    library: [node, js]
    platform: [datadog]
  domains:
    domain: [observability, operations]
  example_good: "# Python — automatic log injection with ddtrace\nimport logging\nimport json_log_formatter\n\n# Enable trace\
    \ ID injection into log records\n# Set DD_LOGS_INJECTION=true (env var) OR:\nfrom ddtrace import patch\npatch(logging=True)\n\
    \n# Structured JSON logging — trace_id injected automatically\nformatter = json_log_formatter.JSONFormatter()\nhandler\
    \ = logging.StreamHandler()\nhandler.setFormatter(formatter)\nlogger = logging.getLogger(\"orders\")\nlogger.addHandler(handler)\n\
    \ndef process_order(order_id: str):\n    # This log line automatically includes dd.trace_id and dd.span_id\n    logger.info(\"\
    Processing order\", extra={\n        \"order_id\": order_id,\n        \"amount\": 99.99,\n    })\n    # In Datadog: click\
    \ trace → see this log line\n    # Click log line → jump to full trace\n\n# Output: {\"message\": \"Processing order\"\
    , \"order_id\": \"abc123\",\n#          \"dd.trace_id\": \"1234567890\", \"dd.span_id\": \"9876543210\"}\n"
  example_bad: "# Plain text logging — no trace correlation\nimport logging\nlogging.basicConfig(format='%(asctime)s %(message)s')\n\
    \ndef process_order(order_id):\n    logging.info(f\"Processing order {order_id}\")\n    # Output: \"2026-02-17 10:30:00\
    \ Processing order abc123\"\n    # In Datadog: this log is an island — no link to trace\n    # Debugging: manually search\
    \ traces for same timestamp ± 5 seconds\n"
  when_applies: Projects using Datadog, Python codebases, Node.js, or Java/JVM applications
  when_not_applies: throwaway prototypes, local dev scripts
  sources: ["https://docs.datadoghq.com/tracing/other_telemetry/connect_logs_and_traces/python/"]
- id: CR-DD-007
  text: Use log patterns to group similar logs — do not create unique log messages with variable data in the message body.
  why: If your log message is 'Order {order_id} failed with error {error}', every message is unique and Datadog cannot group
    them. You end up with millions of individual log entries instead of pattern groups like 'Order * failed with error *'
    (seen 15,000 times today). Without patterns, you miss trends and anomalies.
  how_to_do_right: Use parameterized log messages — variables go in structured fields, not the message string. Enable Datadog
    Log Patterns to auto-cluster similar messages. Create log-based metrics from patterns (count of 'order failed' per hour).
    Set up anomaly detection on log pattern volumes.
  severity: medium
  technologies:
    lang: [python]
    library: [node, js]
    platform: [datadog]
  domains:
    domain: [observability, operations]
  example_good: "import structlog\n\nlogger = structlog.get_logger()\n\ndef process_order(order_id: str, customer_id: str):\n\
    \    try:\n        result = _process(order_id)\n        # Static message + structured fields — Datadog groups these\n\
    \        logger.info(\"order.processed\",\n            order_id=order_id,\n            customer_id=customer_id,\n    \
    \        duration_ms=result.duration_ms,\n        )\n    except PaymentError as e:\n        # Static message — all payment\
    \ errors group together\n        logger.error(\"order.payment_failed\",\n            order_id=order_id,\n            error_type=type(e).__name__,\n\
    \            error_detail=str(e),\n        )\n\n# Datadog Log Patterns sees:\n# \"order.processed\" — 50,000 today (normal)\n\
    # \"order.payment_failed\" — 500 today (3x normal — investigate!)\n"
  example_bad: '# Dynamic message — every log entry is unique

    logging.info(f"Order {order_id} for customer {customer_id} processed in {duration}ms")

    logging.error(f"Order {order_id} failed: {str(e)}")

    # Datadog Log Patterns: 50,000 unique messages — no grouping possible

    # Cannot create metrics, cannot detect anomalies

    '
  when_applies: Projects using Datadog, Python codebases, or Node.js
  when_not_applies: throwaway prototypes, local dev scripts
  sources: ["https://docs.datadoghq.com/logs/explorer/analytics/patterns/"]
- id: CR-DD-008
  text: Deploy the Datadog Agent as a DaemonSet in Kubernetes — one agent per node, not per pod.
  why: Running the agent as a sidecar in every pod wastes resources (CPU, memory multiplied by pod count) and creates agent
    sprawl. A DaemonSet runs exactly one agent per node, collecting metrics, logs, and traces from ALL pods on that node via
    the local network — efficient and centrally managed.
  how_to_do_right: Deploy the Datadog Agent via Helm chart (datadog/datadog) or Datadog Operator. Use DaemonSet with hostPort
    for DogStatsD (8125/UDP). Enable container log collection (DD_LOGS_ENABLED=true). Configure APM port (8126/TCP). Set resource
    limits. Use Cluster Agent for Kubernetes metrics and event collection.
  severity: high
  technologies:
    platform: [datadog, kubernetes, helm]
  domains:
    domain: [observability, infrastructure]
  example_good: "# Helm values.yaml — Datadog Agent as DaemonSet\ndatadog:\n  apiKey: <encrypted-secret>\n  site: datadoghq.com\n\
    \  logs:\n    enabled: true\n    containerCollectAll: true   # Collect logs from all containers\n  apm:\n    portEnabled:\
    \ true           # Port 8126 for traces\n    enabled: true\n  processAgent:\n    processCollection: true     # Live process\
    \ monitoring\n  dogstatsd:\n    useHostPort: true           # DogStatsD on host network\n    port: 8125\n\nclusterAgent:\n\
    \  enabled: true                 # Centralized Kubernetes metrics\n  metricsProvider:\n    enabled: true             \
    \  # HPA based on Datadog metrics\n\nagents:\n  containers:\n    agent:\n      resources:\n        requests:\n       \
    \   cpu: 200m\n          memory: 256Mi\n        limits:\n          cpu: 500m\n          memory: 512Mi\n\n# Install: helm\
    \ install datadog datadog/datadog -f values.yaml\n"
  example_bad: "# Agent as sidecar in every pod — resource waste\nspec:\n  containers:\n    - name: app\n      image: my-app:latest\n\
    \    - name: datadog-agent   # Sidecar — one per pod!\n      image: datadog/agent:latest\n      # 100 pods × 256Mi = 25.6\
    \ GB of memory just for agents\n      # 100 pods × 200m CPU = 20 CPU cores just for agents\n"
  when_applies: Projects using Datadog, Kubernetes-orchestrated deployments, or Helm chart deployments
  when_not_applies: throwaway prototypes, local dev scripts
  sources: ["https://docs.datadoghq.com/containers/kubernetes/installation/"]
- id: CR-DD-009
  text: Use Datadog dashboards with template variables — one dashboard per service, not one per environment.
  why: Creating separate dashboards for staging, production, US-East, US-West leads to dashboard sprawl. Template variables
    let you build one dashboard and switch between environments, regions, and versions with a dropdown — same layout, same
    alerts, different data. Changes to the dashboard apply everywhere.
  how_to_do_right: Add template variables for env, region, version, and customer_tier. Use $env.value in all widget queries.
    Create dashboard annotations for deployments. Include SLO widgets alongside operational metrics. Use Datadog's notebook
    feature for incident investigations (shareable, time-locked).
  severity: medium
  technologies:
    platform: [datadog]
  domains:
    domain: [observability, operations]
  example_good: "# Terraform — dashboard with template variables\nresource \"datadog_dashboard\" \"orders_service\" {\n  title\
    \       = \"Orders Service Overview\"\n  layout_type = \"ordered\"\n\n  template_variable {\n    name    = \"env\"\n \
    \   prefix  = \"env\"\n    default = \"production\"\n  }\n  template_variable {\n    name    = \"region\"\n    prefix\
    \  = \"region\"\n    default = \"*\"\n  }\n\n  widget {\n    timeseries_definition {\n      title = \"Request Rate\"\n\
    \      request {\n        q = \"sum:trace.http.request.hits{service:orders,$env,$region}.as_rate()\"\n        display_type\
    \ = \"bars\"\n      }\n    }\n  }\n\n  widget {\n    query_value_definition {\n      title = \"Error Rate\"\n      request\
    \ {\n        q = \"sum:trace.http.request.errors{service:orders,$env,$region}.as_rate() / sum:trace.http.request.hits{service:orders,$env,$region}.as_rate()\
    \ * 100\"\n      }\n      precision = 2\n    }\n  }\n}\n"
  example_bad: '# Separate dashboards per environment — 12 dashboards to maintain

    resource "datadog_dashboard" "orders_prod_us_east" { ... }

    resource "datadog_dashboard" "orders_prod_us_west" { ... }

    resource "datadog_dashboard" "orders_staging_us_east" { ... }

    resource "datadog_dashboard" "orders_dev" { ... }

    # Update widget? Do it 12 times. Miss one? Stale dashboard misleads on-call.

    '
  when_applies: Projects using Datadog
  when_not_applies: throwaway prototypes, local dev scripts. projects not using Datadog
  sources: ["https://docs.datadoghq.com/dashboards/template_variables/"]
- id: CR-DD-010
  text: Set up composite monitors and escalation policies — single-metric alerts cause alert fatigue.
  why: A CPU spike alone is not an incident — it might be a batch job. High error rate alone is not an incident — it might
    be a bad client. But CPU spike AND high error rate AND increased latency together IS an incident. Composite monitors combine
    signals to reduce false positives from ~50/week to ~2/week.
  how_to_do_right: 'Create base monitors for individual signals (CPU, error rate, latency, queue depth). Create composite
    monitors that trigger only when multiple base monitors fire simultaneously. Set escalation policies: warning → Slack,
    critical → PagerDuty page. Include runbook links in alert messages. Use scheduled downtime for maintenance windows.'
  severity: high
  technologies:
    library: [slack]
    platform: [datadog, pagerduty]
  domains:
    domain: [observability, operations, reliability]
  example_good: "# Base monitors (don't page — just track signals)\nresource \"datadog_monitor\" \"orders_error_rate\" {\n\
    \  name    = \"[Base] Orders Error Rate > 5%\"\n  type    = \"query alert\"\n  query   = \"avg(last_5m):sum:trace.http.request.errors{service:orders}\
    \ / sum:trace.http.request.hits{service:orders} > 0.05\"\n  notify_no_data = false\n  # No notification — this is a building\
    \ block\n}\n\nresource \"datadog_monitor\" \"orders_latency\" {\n  name    = \"[Base] Orders P99 Latency > 2s\"\n  type\
    \    = \"query alert\"\n  query   = \"avg(last_5m):trace.http.request.duration.by.service.99p{service:orders} > 2\"\n\
    \  notify_no_data = false\n}\n\n# Composite monitor — pages ONLY when both fire\nresource \"datadog_monitor\" \"orders_degraded\"\
    \ {\n  name    = \"[Composite] Orders Service Degraded\"\n  type    = \"composite\"\n  query   = \"${datadog_monitor.orders_error_rate.id}\
    \ && ${datadog_monitor.orders_latency.id}\"\n  message = <<-EOT\n    Orders service degraded — high errors AND high latency.\n\
    \    Runbook: https://wiki.internal/runbooks/orders-degraded\n    @pagerduty-orders-oncall\n  EOT\n}\n"
  example_bad: "# Single-metric alert — fires for every CPU spike\nresource \"datadog_monitor\" \"orders_cpu\" {\n  name \
    \   = \"Orders CPU High\"\n  query   = \"avg(last_5m):avg:system.cpu.user{service:orders} > 80\"\n  message = \"@pagerduty-oncall\
    \ CPU is high!\"\n  # Fires during: batch jobs, deployments, load tests, garbage collection\n  # On-call: woken up 3x/week\
    \ for non-incidents → starts ignoring alerts\n"
  when_applies: Projects using Datadog, PagerDuty, or Slack
  when_not_applies: throwaway prototypes, local dev scripts
  sources: ["https://docs.datadoghq.com/monitors/types/composite/"]
- id: CR-DD-011
  text: Use Synthetic Monitoring for critical user flows — do not rely solely on real user data to detect outages.
  why: Real User Monitoring (RUM) only detects problems when users are actively using the feature. At 3 AM with zero traffic,
    a database failover breaks the checkout flow — but RUM shows nothing because nobody is checking out. Synthetic tests run
    24/7 and detect the problem immediately.
  how_to_do_right: Create synthetic browser tests for critical flows (login, checkout, search). Run API tests every 1-5 minutes
    from multiple locations. Set up multi-step tests that simulate real user journeys. Alert on synthetic failures with low
    latency. Use private locations for internal-only services.
  severity: medium
  technologies:
    library: [selenium]
    platform: [datadog]
  domains:
    domain: [observability, reliability, testing]
  example_good: "# Datadog Synthetic — API test for checkout flow\nresource \"datadog_synthetics_test\" \"checkout_api\" {\n\
    \  name      = \"Checkout API Health\"\n  type      = \"api\"\n  subtype   = \"multi\"\n  status    = \"live\"\n  locations\
    \ = [\"aws:us-east-1\", \"aws:eu-west-1\", \"aws:ap-southeast-1\"]\n\n  # Step 1: Create cart\n  api_step {\n    name\
    \    = \"Create Cart\"\n    subtype = \"http\"\n    request_definition {\n      method = \"POST\"\n      url    = \"https://api.myapp.com/carts\"\
    \n      body   = jsonencode({ items = [{ id = \"test-product\", qty = 1 }] })\n    }\n    assertion { type = \"statusCode\"\
    ; operator = \"is\"; target = \"201\" }\n    assertion { type = \"responseTime\"; operator = \"lessThan\"; target = \"\
    2000\" }\n    extract_variable { name = \"CART_ID\"; type = \"http_body\"; field = \"$.id\" }\n  }\n\n  # Step 2: Checkout\n\
    \  api_step {\n    name    = \"Submit Checkout\"\n    subtype = \"http\"\n    request_definition {\n      method = \"\
    POST\"\n      url    = \"https://api.myapp.com/carts/{{ CART_ID }}/checkout\"\n    }\n    assertion { type = \"statusCode\"\
    ; operator = \"is\"; target = \"200\" }\n  }\n\n  options_list {\n    tick_every = 300  # Every 5 minutes\n    min_failure_duration\
    \ = 60\n    min_location_failed  = 2\n  }\n\n  message = \"Checkout flow failing from {{ location }}. @pagerduty-oncall\"\
    \n}\n"
  example_bad: '# No synthetic tests — rely on users to report outages

    # 3 AM: database failover breaks checkout

    # 7 AM: first user tries to checkout, gets 500 error

    # 7:15 AM: user emails support

    # 8 AM: support escalates to engineering

    # 8:30 AM: engineer starts investigating

    # MTTR: 5.5 hours (could have been 5 minutes with synthetics)

    '
  when_applies: Projects using Datadog or Selenium
  when_not_applies: throwaway prototypes, local dev scripts. projects not using Datadog or Selenium
  sources: ["https://docs.datadoghq.com/synthetics/"]
- id: CR-DD-012
  text: Use Datadog's integration library for infrastructure monitoring — do not build custom checks for standard software.
  why: Datadog has 700+ pre-built integrations (PostgreSQL, Redis, Nginx, Kubernetes, AWS, etc.) that collect hundreds of
    metrics, pre-built dashboards, and recommended monitors. Building custom checks duplicates this work, misses important
    metrics, and breaks when the monitored software changes its metrics format.
  how_to_do_right: Enable integrations via the Datadog Agent conf.d directory or Kubernetes annotations. Use auto-discovery
    for containerized services. Customize integration configs only when needed (e.g. adding custom tags, changing collection
    interval). Use integration dashboards as a starting point, then customize. Build custom checks ONLY for proprietary internal
    services.
  severity: medium
  technologies:
    platform: [datadog, postgresql, redis, nginx, kubernetes]
  domains:
    domain: [observability, infrastructure, operations]
  example_good: "# Kubernetes — auto-discovery annotations for PostgreSQL\napiVersion: apps/v1\nkind: Deployment\nmetadata:\n\
    \  name: postgresql\nspec:\n  template:\n    metadata:\n      annotations:\n        # Datadog auto-discovers and monitors\
    \ PostgreSQL\n        ad.datadoghq.com/postgresql.checks: |\n          {\n            \"postgres\": {\n              \"\
    instances\": [{\n                \"host\": \"%%host%%\",\n                \"port\": 5432,\n                \"username\"\
    : \"datadog\",\n                \"password\": \"ENC[datadog_password]\",\n                \"dbname\": \"orders\",\n  \
    \              \"collect_activity_metrics\": true,\n                \"collect_database_size_metrics\": true,\n       \
    \         \"tags\": [\"env:production\", \"team:orders\"]\n              }]\n            }\n          }\n\n# Result: 50+\
    \ PostgreSQL metrics (connections, locks, replication lag,\n# query duration, buffer cache hit ratio) + pre-built dashboard\n"
  example_bad: "# Custom check for PostgreSQL — reinventing the wheel\n# custom_checks.d/pg_check.py\nimport psycopg2\n\n\
    class PostgresCheck:\n    def check(self):\n        conn = psycopg2.connect(...)\n        cur = conn.cursor()\n      \
    \  cur.execute(\"SELECT count(*) FROM pg_stat_activity\")\n        connections = cur.fetchone()[0]\n        self.gauge(\"\
    custom.postgres.connections\", connections)\n        # Missing: locks, replication lag, cache hit ratio, dead tuples,\n\
    \        # index usage, query duration, bloat, WAL size, checkpoints...\n        # The integration tracks ALL of these.\
    \ This tracks 1.\n"
  when_applies: Projects using Datadog, PostgreSQL databases, Redis cache/pub-sub systems, or Nginx reverse proxy/load balancer
  when_not_applies: throwaway prototypes, local dev scripts
  sources: ["https://docs.datadoghq.com/integrations/"]
