layer: rules
technology: MongoDB
domain: database
knowledge:
- id: CR-MDB-SCH-001
  text: Embed documents for one-to-few relationships where the child data is always accessed with the parent — embedding eliminates
    joins and gives you single-document atomicity.
  why: 'MongoDB has no JOINs at the storage engine level. A $lookup (the aggregation join) is a separate collection scan per
    parent document — O(N * M) for N parents and M children without proper indexes. Embedding stores related data in a single
    document, which is read in a single I/O operation. MongoDB guarantees atomicity for single-document writes, so embedded
    updates are atomic without transactions. The rule of thumb: if you always read the child with the parent, embed it. If
    you query the child independently, reference it.'
  how_to_do_right: 'Embed when: (1) the child has a 1:1 or 1:few relationship with the parent, (2) the embedded data is bounded
    in size (not growing unboundedly), (3) the embedded data is always queried together with the parent. Keep documents under
    16MB (MongoDB hard limit). For arrays, keep them under ~1000 elements for write performance. Use $elemMatch for querying
    inside embedded arrays.'
  severity: critical
  technologies:
    platform: [mongodb]
  domains:
    domain: [architecture]
    concern: [data, database, schema_design]
  example_good: "// Embedded: user with addresses (1:few, always fetched together)\n{\n  \"_id\": ObjectId(\"...\"),\n  \"\
    name\": \"Jane Doe\",\n  \"email\": \"jane@example.com\",\n  \"addresses\": [\n    {\n      \"type\": \"home\",\n    \
    \  \"street\": \"123 Main St\",\n      \"city\": \"Portland\",\n      \"state\": \"OR\",\n      \"zip\": \"97201\"\n \
    \   },\n    {\n      \"type\": \"work\",\n      \"street\": \"456 Oak Ave\",\n      \"city\": \"Portland\",\n      \"\
    state\": \"OR\",\n      \"zip\": \"97204\"\n    }\n  ]\n}\n\n// Single read fetches user + all addresses\ndb.users.findOne({\
    \ _id: userId })\n\n// Atomic update to add address (no transaction needed)\ndb.users.updateOne(\n  { _id: userId },\n\
    \  { $push: { addresses: { type: \"shipping\", street: \"789 Pine Rd\", city: \"Portland\", state: \"OR\", zip: \"97210\"\
    \ } } }\n)\n"
  example_bad: "// Separate collections for 1:few — requires $lookup (slow)\n// users collection\n{ \"_id\": ObjectId(\"user1\"\
    ), \"name\": \"Jane Doe\" }\n\n// addresses collection\n{ \"_id\": ObjectId(\"addr1\"), \"userId\": ObjectId(\"user1\"\
    ), \"street\": \"123 Main St\" }\n{ \"_id\": ObjectId(\"addr2\"), \"userId\": ObjectId(\"user1\"), \"street\": \"456 Oak\
    \ Ave\" }\n\n// Must use $lookup to get user with addresses\ndb.users.aggregate([\n  { $match: { _id: userId } },\n  {\
    \ $lookup: { from: \"addresses\", localField: \"_id\", foreignField: \"userId\", as: \"addresses\" } }\n])\n// Two collection\
    \ scans, no atomicity guarantee for writes\n"
  when_applies: Any project using MongoDB document stores
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using MongoDB
  sources: ["https://www.mongodb.com/docs/manual/core/data-model-design/#embedded-data-models"]
- id: CR-MDB-SCH-002
  text: Use references for one-to-many and many-to-many relationships where child documents are large, queried independently,
    or grow unboundedly.
  why: Embedding a large or growing array causes the document to be relocated on disk every time it grows past its allocated
    space — triggering a full document rewrite. A blog post with 10,000 comments embedded would be a 5MB+ document read entirely
    for every access (even to check the title). MongoDB's 16MB document limit is a hard cap. Unbounded array growth (comments,
    events, log entries) will eventually hit that limit and crash your application. References keep parent documents small
    and fast, with child documents in their own collection that can be independently indexed, sharded, and paginated.
  how_to_do_right: Store the parent's _id in the child document (child-referencing). Create an index on the reference field
    in the child collection. Use $lookup only when you need both parent and children. For many-to-many, create a junction
    collection or store an array of IDs in the document with fewer relationships. Keep reference arrays bounded — if a user
    can belong to 5 groups, store group_ids in the user; if a group can have 50,000 members, store group_id in each user.
  severity: critical
  technologies:
    platform: [mongodb]
  domains:
    domain: [architecture]
    concern: [data, database, schema_design]
  example_good: "// Referenced: blog post with comments (1:many, unbounded)\n\n// posts collection — small, fast to read\n\
    {\n  \"_id\": ObjectId(\"post1\"),\n  \"title\": \"MongoDB Schema Design\",\n  \"body\": \"...\",\n  \"author_id\": ObjectId(\"\
    user1\"),\n  \"comment_count\": 4283  // Denormalized count for display\n}\n\n// comments collection — independently queryable\n\
    {\n  \"_id\": ObjectId(\"comment1\"),\n  \"post_id\": ObjectId(\"post1\"),  // Reference to parent\n  \"author_id\": ObjectId(\"\
    user2\"),\n  \"text\": \"Great article!\",\n  \"created_at\": ISODate(\"2026-02-15\")\n}\n\n// Index on post_id for fast\
    \ lookups\ndb.comments.createIndex({ post_id: 1, created_at: -1 })\n\n// Paginated comments — impossible with embedding\n\
    db.comments\n  .find({ post_id: ObjectId(\"post1\") })\n  .sort({ created_at: -1 })\n  .skip(20).limit(10)\n"
  example_bad: "// Embedded unbounded array — will hit 16MB limit\n{\n  \"_id\": ObjectId(\"post1\"),\n  \"title\": \"MongoDB\
    \ Schema Design\",\n  \"comments\": [\n    // 4,283 embedded comments = ~5MB per document read\n    { \"author\": \"user2\"\
    , \"text\": \"Great article!\", \"created_at\": \"...\" },\n    // ... 4,282 more ...\n  ]\n}\n\n// Every read loads ALL\
    \ comments even if you only need the title\n// Cannot paginate comments within the embedded array efficiently\n// Document\
    \ grows with every comment → frequent relocations on disk\n// At 16MB limit, post stops accepting comments → application\
    \ crash\n"
  when_applies: Any project using MongoDB document stores
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using MongoDB
  sources: ["https://www.mongodb.com/docs/manual/core/data-model-design/#normalized-data-models"]
- id: CR-MDB-SCH-003
  text: Never allow unbounded array growth in documents — arrays that grow without limit cause document relocations, hit the
    16MB limit, and degrade write performance.
  why: 'MongoDB stores each document as a contiguous BSON blob. When a $push grows an array beyond the document''s allocated
    space, MongoDB must: (1) allocate new space, (2) copy the entire document, (3) update the index. For a 2MB document, every
    array push triggers a 2MB copy. With frequent pushes (event logging, activity tracking), this creates massive I/O amplification.
    The 16MB BSON document size limit is a hard boundary — exceeding it causes an unrecoverable write error. The pattern of
    ''add to array forever'' is the number one MongoDB anti-pattern.'
  how_to_do_right: 'For unbounded collections (events, logs, comments), use a separate collection with a reference. For bounded-but-large
    arrays, use the bucket pattern: group events into time-bucketed documents (e.g., one document per hour with up to 60 entries).
    Cap arrays with $slice to keep only the most recent N entries. Use document padding factor (no longer manual in WiredTiger,
    but keeping documents a consistent size helps).'
  severity: critical
  technologies:
    platform: [mongodb]
  domains:
    domain: [architecture]
    concern: [data, database, schema_design, anti-pattern]
  example_good: "// Bucket pattern: group events into time-bounded documents\n{\n  \"_id\": ObjectId(\"...\"),\n  \"sensor_id\"\
    : \"temp-001\",\n  \"bucket_start\": ISODate(\"2026-02-15T14:00:00Z\"),\n  \"bucket_end\": ISODate(\"2026-02-15T15:00:00Z\"\
    ),\n  \"count\": 47,\n  \"readings\": [\n    { \"ts\": ISODate(\"2026-02-15T14:00:12Z\"), \"value\": 22.5 },\n    { \"\
    ts\": ISODate(\"2026-02-15T14:01:08Z\"), \"value\": 22.7 },\n    // ... up to 60 entries per bucket (bounded)\n  ],\n\
    \  \"sum\": 1057.3,  // Pre-aggregated for fast queries\n  \"min\": 21.8,\n  \"max\": 23.4\n}\n\n// Create new bucket\
    \ when current one is full\ndb.readings.updateOne(\n  { sensor_id: \"temp-001\", count: { $lt: 60 }, bucket_end: { $gte:\
    \ now } },\n  { $push: { readings: { ts: now, value: 22.9 } }, $inc: { count: 1, sum: 22.9 }, $min: { min: 22.9 }, $max:\
    \ { max: 22.9 } },\n  { upsert: true }\n)\n"
  example_bad: "// Unbounded array — grows forever\n{\n  \"_id\": ObjectId(\"sensor1\"),\n  \"sensor_id\": \"temp-001\",\n\
    \  \"readings\": [\n    // After 1 year of data at 1/minute: 525,600 entries\n    // Document size: ~25MB → EXCEEDS 16MB\
    \ LIMIT\n    { \"ts\": \"2026-01-01T00:00:00Z\", \"value\": 22.5 },\n    { \"ts\": \"2026-01-01T00:01:00Z\", \"value\"\
    : 22.6 },\n    // ... 525,598 more ...\n  ]\n}\n// After ~200K entries: BSONObjectTooLarge exception\n// Even before limit:\
    \ every $push copies the entire multi-MB document\n"
  when_applies: Any project using MongoDB document stores
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using MongoDB
  sources: ["https://www.mongodb.com/docs/manual/tutorial/model-referenced-one-to-many-relationships-between-documents/"]
- id: CR-MDB-SCH-004
  text: Use schema validation with JSON Schema to enforce document structure — MongoDB's flexibility is a feature, not a license
    to store anything anywhere.
  why: Without schema validation, different application versions, developers, or import scripts can insert documents with
    missing fields, wrong types, or invalid structures. A field that should be a number gets stored as a string in one document.
    A required field is missing in 5% of documents. These inconsistencies surface as runtime errors, incorrect aggregation
    results, and data corruption. Schema validation catches these issues at write time with clear error messages rather than
    at read time with confusing bugs. It is MongoDB's equivalent of PostgreSQL's column constraints.
  how_to_do_right: Apply schema validation when creating collections using collMod or during createCollection. Set validationLevel
    to 'strict' (validates all inserts and updates) or 'moderate' (only validates inserts and updates to documents that already
    match). Set validationAction to 'error' (reject invalid) or 'warn' (log but allow). Use JSON Schema format with required
    fields, type checks, enum values, and pattern matching.
  severity: high
  technologies:
    platform: [mongodb]
  domains:
    domain: [architecture]
    concern: [data, database, schema_design, data-quality]
  example_good: "// Create collection with JSON Schema validation\ndb.createCollection(\"orders\", {\n  validator: {\n   \
    \ $jsonSchema: {\n      bsonType: \"object\",\n      required: [\"customer_id\", \"status\", \"items\", \"created_at\"\
    ],\n      properties: {\n        customer_id: {\n          bsonType: \"objectId\",\n          description: \"must be an\
    \ objectId and is required\"\n        },\n        status: {\n          enum: [\"pending\", \"processing\", \"shipped\"\
    , \"delivered\", \"cancelled\"],\n          description: \"must be a valid status\"\n        },\n        items: {\n  \
    \        bsonType: \"array\",\n          minItems: 1,\n          items: {\n            bsonType: \"object\",\n       \
    \     required: [\"product_id\", \"quantity\", \"price\"],\n            properties: {\n              quantity: { bsonType:\
    \ \"int\", minimum: 1 },\n              price: { bsonType: \"decimal\", minimum: 0 }\n            }\n          }\n   \
    \     },\n        created_at: { bsonType: \"date\" }\n      }\n    }\n  },\n  validationLevel: \"strict\",\n  validationAction:\
    \ \"error\"\n})\n\n// Invalid insert is rejected with clear error\n// db.orders.insertOne({ status: \"invalid\" })\n//\
    \ → Document failed validation\n"
  example_bad: '// No schema validation — anything goes

    db.orders.insertOne({ status: "pending", total: 42.50 })

    db.orders.insertOne({ stat: "pnding", total: "forty" })

    db.orders.insertOne({ })  // Empty document accepted


    // Months later, aggregation fails:

    db.orders.aggregate([{ $group: { _id: "$status", sum: { $sum: "$total" } } }])

    // "pnding" creates a separate group

    // "forty" is ignored by $sum (not a number)

    // Empty documents create null group

    // Result is silently wrong — no error thrown

    '
  when_applies: Projects using MongoDB document stores
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using MongoDB
  sources: ["https://www.mongodb.com/docs/manual/core/schema-validation/"]
- id: CR-MDB-IDX-001
  text: Order compound index fields by equality, sort, range (ESR rule) — the field order in a compound index determines which
    queries it can efficiently serve.
  why: 'MongoDB compound indexes use a B-tree that sorts by the first field, then by the second within each first-field value,
    and so on. A query {status: ''active'', created_at: {$gte: date}} with index {status: 1, created_at: 1} first narrows
    to ''active'' (equality) then scans the date range (already sorted). Reversing the order ({created_at: 1, status: 1})
    forces MongoDB to scan a range of dates, then check status for each — reading far more index entries. For queries with
    equality, sort, and range, the optimal order is: equality fields first, sort fields second, range fields last.'
  how_to_do_right: 'Apply the ESR rule: Equality fields first (= exact match), then Sort fields (matching query''s sort order),
    then Range fields ($gt, $lt, $gte, $lte, $in). Use explain(''executionStats'') to verify. Check totalKeysExamined vs nReturned
    — ideally they should be equal (no wasted index scans). The index {a: 1, b: 1, c: 1} can serve queries on {a}, {a, b},
    and {a, b, c} — but NOT {b}, {c}, or {b, c} (left-prefix rule).'
  severity: critical
  technologies:
    platform: [mongodb]
  domains:
    domain: [architecture, performance]
    concern: [data, database]
  example_good: "// Query: find active orders for a customer, sorted by date, in a price range\ndb.orders.find({\n  status:\
    \ \"active\",       // Equality\n  customer_id: \"cust123\", // Equality\n  total: { $gte: 100 }   // Range\n}).sort({\
    \ created_at: -1 })  // Sort\n\n// ESR-optimized compound index\ndb.orders.createIndex({\n  status: 1,        // E: equality\n\
    \  customer_id: 1,   // E: equality\n  created_at: -1,   // S: sort\n  total: 1          // R: range\n})\n\n// Verify\
    \ with explain\ndb.orders.find({...}).sort({...}).explain(\"executionStats\")\n// totalKeysExamined: 47, nReturned: 47\
    \ — perfect index usage\n"
  example_bad: '// Range field first — forces scan over entire date range

    db.orders.createIndex({ total: 1, status: 1, customer_id: 1, created_at: -1 })

    // MongoDB scans all index entries where total >= 100

    // Then filters by status and customer_id for EACH entry

    // totalKeysExamined: 250000, nReturned: 47 — 5300x overhead


    // Sort field not in index — in-memory sort

    db.orders.createIndex({ status: 1, customer_id: 1, total: 1 })

    // created_at is not in this index → in-memory sort

    // For large result sets: "Sort exceeded memory limit" error

    '
  when_applies: Any project using MongoDB document stores
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using MongoDB
  sources: ["https://www.mongodb.com/docs/manual/core/indexes/index-types/index-compound/#std-label-index-type-compound"]
- id: CR-MDB-IDX-002
  text: Create partial indexes to reduce index size and write overhead — only index documents matching a filter expression.
  why: 'If 95% of your orders have status ''completed'' and you only query ''pending'' orders, a full index on {status: 1,
    created_at: 1} wastes 95% of its storage on entries you never search. MongoDB''s partial indexes (partialFilterExpression)
    index only documents matching a condition. The resulting index is smaller, faster to build, faster to traverse, and causes
    less write overhead (completed orders do not trigger index updates). This is the MongoDB equivalent of PostgreSQL''s partial
    indexes.'
  how_to_do_right: Define partialFilterExpression with the condition your queries always include. Your queries MUST include
    the partial filter condition for the index to be used. Combine with compound indexes and TTL indexes. Use for active/pending/flagged
    subsets of large collections. Monitor index size with db.collection.stats() to verify the reduction.
  severity: high
  technologies:
    platform: [mongodb]
  domains:
    domain: [architecture, performance]
    concern: [data, database]
  example_good: "// Partial index — only indexes pending orders (5% of collection)\ndb.orders.createIndex(\n  { customer_id:\
    \ 1, created_at: -1 },\n  { partialFilterExpression: { status: \"pending\" } }\n)\n\n// Query includes the filter condition\
    \ — index is used\ndb.orders.find({\n  status: \"pending\",\n  customer_id: \"cust123\"\n}).sort({ created_at: -1 })\n\
    // Uses partial index — 50MB vs 1.2GB full index\n\n// TTL index only on non-archived documents\ndb.sessions.createIndex(\n\
    \  { last_active: 1 },\n  { expireAfterSeconds: 3600, partialFilterExpression: { archived: { $ne: true } } }\n)\n"
  example_bad: "// Full index on status — 95% of entries never queried\ndb.orders.createIndex({ status: 1, customer_id: 1,\
    \ created_at: -1 })\n// Index size: 1.2GB (indexes all 10M orders)\n// Every INSERT (even completed orders) updates this\
    \ index\n\n// Partial index without including filter in query — index not used\ndb.orders.createIndex(\n  { customer_id:\
    \ 1 },\n  { partialFilterExpression: { status: \"pending\" } }\n)\n// This query does NOT include status — index is IGNORED\n\
    db.orders.find({ customer_id: \"cust123\" })\n// Falls back to COLLSCAN or another index\n"
  when_applies: Projects using MongoDB document stores
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using MongoDB
  sources: ["https://www.mongodb.com/docs/manual/core/indexes/index-types/index-partial/"]
- id: CR-MDB-AGG-001
  text: Place $match and $project stages as early as possible in the aggregation pipeline — every document that enters a later
    stage costs memory and CPU.
  why: MongoDB's aggregation pipeline processes stages sequentially. Each stage passes its output to the next. Without early
    filtering, a pipeline on a 10M-document collection passes all 10M documents through every stage. A $match at the beginning
    can reduce this to 1000 documents using an index. A $project after $match reduces each document from 50 fields to 3 fields.
    Without these, later stages ($group, $sort, $lookup) process unnecessary data, exceeding the 100MB per-stage memory limit
    and spilling to disk. Early filtering is the single most impactful aggregation optimization.
  how_to_do_right: 'Structure pipelines as: $match (filter early, uses indexes) → $project/$addFields (reduce document size)
    → $sort (on indexed fields if possible) → $group → $lookup (expensive, do last). Verify with explain(''executionStats''):
    check if the first $match uses an index (IXSCAN not COLLSCAN). If a pipeline exceeds 100MB per stage, add {allowDiskUse:
    true} but treat it as a signal to optimize, not a permanent fix.'
  severity: critical
  technologies:
    platform: [mongodb]
  domains:
    domain: [architecture, performance]
    concern: [data, database]
  example_good: "// Optimized pipeline: filter → project → group → sort\ndb.orders.aggregate([\n  // Stage 1: $match FIRST\
    \ — uses index, reduces 10M → 5000 docs\n  { $match: {\n    status: \"completed\",\n    created_at: { $gte: ISODate(\"\
    2026-01-01\"), $lt: ISODate(\"2026-02-01\") }\n  }},\n\n  // Stage 2: $project — reduce from 50 fields to 3 (less memory)\n\
    \  { $project: { customer_id: 1, total: 1, category: 1 } },\n\n  // Stage 3: $group — aggregates 5000 lightweight documents\n\
    \  { $group: {\n    _id: { customer: \"$customer_id\", category: \"$category\" },\n    total_spent: { $sum: \"$total\"\
    \ },\n    order_count: { $sum: 1 }\n  }},\n\n  // Stage 4: $sort — on the small grouped result\n  { $sort: { total_spent:\
    \ -1 } },\n\n  { $limit: 100 }\n])\n\n// Supporting index for the $match stage\ndb.orders.createIndex({ status: 1, created_at:\
    \ 1 })\n"
  example_bad: "// $group BEFORE $match — processes ALL 10M documents\ndb.orders.aggregate([\n  { $group: {\n    _id: \"$customer_id\"\
    ,\n    total: { $sum: \"$total\" },\n    orders: { $push: \"$$ROOT\" }  // 10M full documents in memory!\n  }},\n  { $match:\
    \ { total: { $gte: 1000 } } }  // Filter AFTER grouping\n])\n// Memory: 10M documents × 2KB avg = 20GB → exceeds memory\
    \ limit\n// allowDiskUse = true → completes in 45 minutes instead of 2 seconds\n"
  when_applies: Any project using MongoDB document stores
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using MongoDB
  sources: ["https://www.mongodb.com/docs/manual/core/aggregation-pipeline-optimization/"]
- id: CR-MDB-REP-001
  text: Always deploy replica sets with at least 3 members — a single MongoDB instance is a single point of failure with no
    automatic recovery.
  why: 'A standalone MongoDB instance means any hardware failure, kernel panic, or disk corruption results in complete downtime
    until manual intervention. With a 3-member replica set, if the primary fails, a secondary is elected as the new primary
    within 10-12 seconds — automatic, no human intervention. The third member provides the majority needed for elections (2
    of 3 must agree). A 2-member set cannot elect a new primary if one goes down (no majority from 1 of 2). Write concern:
    majority ensures writes are acknowledged by 2+ members before confirming, surviving any single-node failure.'
  how_to_do_right: Deploy a 3-member replica set across different failure domains (different hosts, racks, or availability
    zones). Set write concern to 'majority' for all production writes. Use read preference 'secondaryPreferred' for read-heavy
    analytics. Set priority 0 on members you never want as primary (e.g., analytics replicas). Monitor replication lag with
    rs.status() — lag > 10 seconds indicates the secondary cannot keep up.
  severity: critical
  technologies:
    platform: [mongodb]
  domains:
    domain: [architecture, reliability, operations]
    concern: [data, database]
  example_good: "// Connection string with replica set and majority write concern\nconst uri = \"mongodb://node1:27017,node2:27017,node3:27017/mydb\"\
    \n  + \"?replicaSet=rs0&w=majority&readPreference=secondaryPreferred\";\n\n// MongoDB shell: initiate replica set\nrs.initiate({\n\
    \  _id: \"rs0\",\n  members: [\n    { _id: 0, host: \"node1:27017\", priority: 2 },  // Preferred primary\n    { _id:\
    \ 1, host: \"node2:27017\", priority: 1 },\n    { _id: 2, host: \"node3:27017\", priority: 1 }\n  ]\n})\n\n// Application-level\
    \ write concern for critical operations\ndb.financial_transactions.insertOne(\n  { amount: 1000, from: \"acc1\", to: \"\
    acc2\" },\n  { writeConcern: { w: \"majority\", j: true, wtimeout: 5000 } }\n)\n// w:majority — acknowledged by 2+ nodes\n\
    // j:true — written to journal (survives crash)\n"
  example_bad: "// Standalone instance — no redundancy\nconst uri = \"mongodb://single-host:27017/mydb\";\n// Hardware failure\
    \ = complete downtime\n// Disk corruption = potential data loss\n// No automatic failover — requires manual intervention\n\
    \n// 2-member replica set — cannot elect primary\nrs.initiate({\n  _id: \"rs0\",\n  members: [\n    { _id: 0, host: \"\
    node1:27017\" },\n    { _id: 1, host: \"node2:27017\" }\n  ]\n})\n// If node1 (primary) goes down, node2 alone cannot\
    \ form majority\n// Result: NO primary, cluster is READ-ONLY until node1 returns\n\n// Write concern: 0 — fire and forget\n\
    db.orders.insertOne(doc, { writeConcern: { w: 0 } })\n// Write might be lost if primary crashes before replication\n"
  when_applies: Any project using MongoDB document stores
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using MongoDB
  sources: ["https://www.mongodb.com/docs/manual/replication/"]
- id: CR-MDB-SH-001
  text: Choose shard keys with high cardinality and even write distribution — a bad shard key causes hotspots that negate
    all sharding benefits.
  why: Sharding distributes documents across multiple servers (shards) based on the shard key value. A low-cardinality key
    (e.g., status with 5 values) creates at most 5 chunks — all writes to one status go to one shard. A monotonically increasing
    key (e.g., ObjectId, timestamp) routes all new inserts to the shard owning the highest range — the 'hot shard' problem.
    The other shards sit idle while one shard is overwhelmed. A good shard key distributes both reads and writes evenly. You
    CANNOT change the shard key after sharding a collection (MongoDB 5.0+ allows resharding, but it is a heavy migration).
  how_to_do_right: 'Choose a shard key with: (1) high cardinality (millions of distinct values), (2) even distribution (no
    single value dominates), (3) query isolation (queries include the shard key, hitting one shard). Common patterns: hashed
    shard key for even write distribution, compound shard key {tenant_id: 1, _id: 1} for multi-tenant. Use sh.status() to
    verify chunk distribution. Test with real data volumes before production — simulate with mongos explain.'
  severity: critical
  technologies:
    platform: [mongodb]
  domains:
    domain: [architecture, performance]
    concern: [data, database, scalability]
  example_good: '// Hashed shard key — even write distribution across all shards

    sh.shardCollection("mydb.events", { event_id: "hashed" })

    // Pros: perfectly even write distribution

    // Cons: range queries on event_id hit all shards (scatter-gather)


    // Compound shard key — query isolation + distribution

    sh.shardCollection("mydb.orders", { customer_id: 1, order_id: 1 })

    // customer_id provides query isolation (most queries filter by customer)

    // order_id adds cardinality (many orders per customer)

    // Queries with customer_id hit ONE shard (targeted query)


    // Zone sharding for geographic data

    sh.addShardTag("shard-us-east", "US")

    sh.addShardTag("shard-eu-west", "EU")

    sh.addTagRange("mydb.users", { region: "US" }, { region: "US\xff" }, "US")

    sh.addTagRange("mydb.users", { region: "EU" }, { region: "EU\xff" }, "EU")

    '
  example_bad: '// Monotonically increasing shard key — all writes hit one shard

    sh.shardCollection("mydb.events", { _id: 1 })

    // New ObjectIds always increase → newest chunk always on the same shard

    // One shard handles 100% of writes, others are idle

    // Effectively a single-server write throughput with sharding overhead


    // Low cardinality shard key — uneven distribution

    sh.shardCollection("mydb.orders", { status: 1 })

    // 5 distinct values = 5 chunks maximum

    // "pending" has 80% of documents → one shard has 80% of data


    // Shard key not in queries — scatter-gather everywhere

    sh.shardCollection("mydb.orders", { created_at: "hashed" })

    // All queries filter by customer_id, NOT created_at

    // Every query hits ALL shards → worse than no sharding

    '
  when_applies: Any project using MongoDB document stores
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using MongoDB
  sources: ["https://www.mongodb.com/docs/manual/core/sharding-shard-key/"]
- id: CR-MDB-SH-002
  text: Use change streams for real-time change data capture (CDC) — they provide an ordered, resumable stream of document-level
    changes without tailing the oplog directly.
  why: 'Tailing the oplog directly is fragile: it requires understanding the internal oplog format, handling rollovers, and
    managing the cursor position across restarts. Change streams provide a clean API that abstracts the oplog, with resumeAfter
    tokens for exactly-once processing and support for filtering specific operations (insert, update, delete, replace). They
    work across replica sets and sharded clusters, with ordering guarantees per shard. Change streams are the foundation for
    event-driven architectures, real-time sync to search engines, and cache invalidation.'
  how_to_do_right: Open a change stream with watch() on a collection, database, or entire deployment. Store the resume token
    after processing each event — on restart, pass it to resumeAfter to avoid missing or duplicating events. Use pipeline
    stages to filter events (e.g., only inserts, only updates to specific fields). For sharded clusters, change streams merge
    events from all shards with a global ordering guarantee.
  severity: high
  technologies:
    platform: [mongodb]
  domains:
    domain: [architecture]
    concern: [data, database, event-driven, integration]
  example_good: "// Change stream with resume token persistence\nconst pipeline = [\n  { $match: {\n    operationType: { $in:\
    \ [\"insert\", \"update\"] },\n    \"fullDocument.status\": \"published\"\n  }}\n];\n\n// Resume from last processed token\
    \ (stored in another collection)\nconst lastToken = db.change_stream_tokens.findOne({ _id: \"orders_sync\" });\nconst\
    \ options = lastToken ? { resumeAfter: lastToken.token } : {};\n\nconst changeStream = db.orders.watch(pipeline, {\n \
    \ ...options,\n  fullDocument: \"updateLookup\"  // Include full document on updates\n});\n\nchangeStream.on(\"change\"\
    , async (event) => {\n  // Process the change\n  await syncToElasticsearch(event.fullDocument);\n\n  // Persist resume\
    \ token — enables exactly-once on restart\n  await db.change_stream_tokens.updateOne(\n    { _id: \"orders_sync\" },\n\
    \    { $set: { token: event._id, updated: new Date() } },\n    { upsert: true }\n  );\n});\n"
  example_bad: "// Tailing oplog directly — fragile and undocumented format\nconst oplog = db.getSiblingDB(\"local\").oplog.rs;\n\
    const cursor = oplog.find({\n  ts: { $gt: Timestamp(Date.now() / 1000, 0) },\n  ns: \"mydb.orders\"\n}).addOption(DBQuery.Option.tailable).addOption(DBQuery.Option.awaitData);\n\
    // Internal format changes between MongoDB versions\n// No resume token — losing cursor position = missing events\n//\
    \ Does not work across sharded clusters\n\n// Change stream without persisting resume token\nconst stream = db.orders.watch();\n\
    stream.on(\"change\", (event) => {\n  processEvent(event);\n  // No resume token saved — restart = events lost or duplicated\n\
    });\n"
  when_applies: Projects using MongoDB document stores
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using MongoDB
  sources: ["https://www.mongodb.com/docs/manual/changeStreams/"]
- id: CR-MDB-IDX-003
  text: Use TTL indexes to auto-expire documents after a specified duration — they eliminate the need for manual cleanup cron
    jobs and prevent collections from growing unboundedly.
  why: Without TTL indexes, expired data (sessions, temporary tokens, event logs) accumulates until you run a manual deletion
    script. Manual deletion requires a query that scans millions of documents, creates write load, and is fragile (cron fails
    = data never cleaned). TTL indexes tell MongoDB's background thread to automatically delete documents when a date field
    exceeds the TTL. The background thread runs every 60 seconds, finding and removing expired documents without application
    involvement. This keeps collections at steady state size and eliminates an entire class of operational maintenance.
  how_to_do_right: Create a TTL index on a date-type field with expireAfterSeconds. The field MUST be a Date or array of Dates
    (not a number). The background thread runs every 60 seconds so deletion is not instantaneous — do not rely on it for sub-minute
    precision. Use partialFilterExpression to TTL only specific documents. You can change the TTL with collMod without recreating
    the index. Only one TTL index is allowed per collection.
  severity: high
  technologies:
    platform: [mongodb]
  domains:
    domain: [architecture, operations]
    concern: [data, database, data-lifecycle]
  example_good: "// TTL index — auto-delete sessions after 1 hour\ndb.sessions.createIndex(\n  { last_active: 1 },\n  { expireAfterSeconds:\
    \ 3600 }  // 1 hour after last_active\n)\n\n// TTL with partial filter — only expire non-premium sessions\ndb.sessions.createIndex(\n\
    \  { last_active: 1 },\n  {\n    expireAfterSeconds: 3600,\n    partialFilterExpression: { is_premium: { $ne: true } }\n\
    \  }\n)\n\n// Change TTL without recreating index\ndb.runCommand({\n  collMod: \"sessions\",\n  index: { keyPattern: {\
    \ last_active: 1 }, expireAfterSeconds: 7200 }\n})\n"
  example_bad: "// Manual cleanup cron — fragile and creates load\n// Cron job: db.sessions.deleteMany({ last_active: { $lt:\
    \ hourAgo } })\n// Scans millions of documents, creates write load\n// Cron fails silently → collection grows to 500M\
    \ documents\n\n// TTL on non-date field — silently does nothing\ndb.sessions.createIndex(\n  { expires_at: 1 },\n  { expireAfterSeconds:\
    \ 0 }\n)\n// If expires_at is a Unix timestamp (number), NOT a Date:\n// TTL index does nothing — documents never expire\n\
    // Must be: expires_at: new Date(Date.now() + 3600000)\n"
  when_applies: Projects using MongoDB document stores
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using MongoDB
  sources: ["https://www.mongodb.com/docs/manual/core/indexes/index-types/index-ttl/"]
- id: CR-MDB-AGG-002
  text: Use $lookup with let/pipeline for filtered joins between collections — the basic $lookup performs an unfiltered join
    that can return millions of matching documents per parent.
  why: Basic $lookup joins ALL matching documents from the foreign collection. For a user with 50,000 orders, $lookup brings
    all 50,000 orders into the pipeline stage — consuming 100MB+ of memory per user. The pipeline form of $lookup allows you
    to filter, project, sort, and limit within the join — fetching only the 10 most recent orders per user (0.02MB vs 100MB).
    For aggregation pipelines joining large collections, the difference between basic and pipeline $lookup is the difference
    between running out of memory and completing in milliseconds.
  how_to_do_right: 'Use the pipeline form: $lookup with let (pass parent fields into the subpipeline) and pipeline (filter/project/limit
    within the join). Place $match as the first stage in the sub-pipeline to use indexes on the foreign collection. Limit
    results with $limit in the sub-pipeline. For 1:1 joins, add $limit: 1 and $unwind immediately after $lookup.'
  severity: high
  technologies:
    platform: [mongodb]
  domains:
    domain: [architecture, performance]
    concern: [data, database]
  example_good: "// Pipeline $lookup — filtered, limited join\ndb.users.aggregate([\n  { $match: { status: \"active\" } },\n\
    \  {\n    $lookup: {\n      from: \"orders\",\n      let: { userId: \"$_id\" },\n      pipeline: [\n        { $match:\
    \ {\n          $expr: { $eq: [\"$customer_id\", \"$$userId\"] },\n          status: { $ne: \"cancelled\" }\n        }},\n\
    \        { $sort: { created_at: -1 } },\n        { $limit: 5 },\n        { $project: { _id: 1, total: 1, created_at: 1,\
    \ status: 1 } }\n      ],\n      as: \"recent_orders\"\n    }\n  }\n])\n// Per user: fetches only 5 recent non-cancelled\
    \ orders (4 fields each)\n// Memory: ~1KB per user vs ~100MB with basic $lookup\n"
  example_bad: "// Basic $lookup — fetches ALL matching orders per user\ndb.users.aggregate([\n  { $match: { status: \"active\"\
    \ } },\n  {\n    $lookup: {\n      from: \"orders\",\n      localField: \"_id\",\n      foreignField: \"customer_id\"\
    ,\n      as: \"orders\"\n    }\n  }\n])\n// User with 50,000 orders: all 50K documents loaded into memory\n// 1000 active\
    \ users × 50K orders = 50M documents in pipeline\n// ERROR: \"Exceeded memory limit for $lookup stage\"\n"
  when_applies: Projects using MongoDB document stores
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using MongoDB
  sources: ["https://www.mongodb.com/docs/manual/reference/operator/aggregation/lookup/#syntax"]
- id: CR-MDB-IDX-004
  text: Use wildcard indexes for dynamic field names in JSONB-like documents — they index all fields (or a subset) matching
    a pattern without knowing field names at index creation time.
  why: 'MongoDB documents can have dynamic field names (user-defined attributes, localized content, plugin metadata). Without
    wildcard indexes, you must create individual indexes for every possible field name — impossible when field names are dynamic.
    A query on metadata.custom_field_xyz without an index falls back to COLLSCAN. Wildcard indexes ($**) automatically index
    all fields under a path, enabling filtered queries on any field. The trade-off: wildcard indexes are larger than targeted
    indexes and do not support compound queries (cannot combine two wildcard-indexed fields in one query).'
  how_to_do_right: Use wildcardProjection to limit which fields are indexed (reduces size). Create wildcard indexes on the
    specific sub-document containing dynamic fields, not on the entire document. Combine with regular indexes for known query
    patterns. Wildcard indexes support equality, range, and $exists queries. They do NOT support sort operations or compound
    queries across multiple wildcard-indexed fields.
  severity: medium
  technologies:
    platform: [mongodb]
  domains:
    domain: [architecture, performance]
    concern: [data, database, schema_design]
  example_good: "// Wildcard index on dynamic attributes sub-document\ndb.products.createIndex(\n  { \"attributes.$**\": 1\
    \ },\n  { wildcardProjection: { \"attributes.color\": 1, \"attributes.size\": 1, \"attributes.material\": 1 } }\n)\n\n\
    // Queries on any attribute field use the index\ndb.products.find({ \"attributes.color\": \"red\" })     // Uses wildcard\
    \ index\ndb.products.find({ \"attributes.material\": \"wood\" })  // Uses wildcard index\ndb.products.find({ \"attributes.custom_field\"\
    : \"x\" }) // Also uses it if not excluded\n\n// Full wildcard on entire metadata sub-document\ndb.products.createIndex({\
    \ \"metadata.$**\": 1 })\n"
  example_bad: '// Individual indexes for every possible dynamic field — impractical

    db.products.createIndex({ "attributes.color": 1 })

    db.products.createIndex({ "attributes.size": 1 })

    db.products.createIndex({ "attributes.material": 1 })

    // 500 possible attributes = 500 indexes

    // Each insert updates all 500 indexes — catastrophic write performance


    // Wildcard index on entire document — too broad

    db.products.createIndex({ "$**": 1 })

    // Indexes EVERY field in EVERY document — massive index

    // name, price, category all indexed via wildcard when they should have targeted indexes

    '
  when_applies: Projects using MongoDB document stores
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using MongoDB
  sources: ["https://www.mongodb.com/docs/manual/core/indexes/index-types/index-wildcard/"]
- id: CR-MDB-PERF-001
  text: Denormalize read-heavy data intentionally — in MongoDB, the read/write ratio determines when embedding duplicate data
    is the correct trade-off.
  why: 'MongoDB has no server-side JOINs at the storage layer. Every $lookup is a separate collection scan. For a product
    page that displays product name, category name, and seller name from three collections, that is 2 $lookups per page load
    — each adding 1-5ms of latency. If this page is loaded 10,000 times/day but the category name changes once/month, embedding
    the category name in the product document eliminates a $lookup on every read. The trade-off is clear: 10,000 faster reads
    vs 1 extra write/month when the category name changes. Denormalization is not dirty — it is the correct modeling strategy
    for read-heavy access patterns in document databases.'
  how_to_do_right: Identify your read/write ratio per data combination. For ratios >100:1 (read-heavy), embed the frequently-read
    data. For ratios <10:1, use references. Update denormalized data asynchronously using change streams or application-level
    events. Accept eventual consistency for denormalized copies. Document which fields are denormalized and their source of
    truth. Use schema validation to ensure denormalized fields match the expected type.
  severity: high
  technologies:
    platform: [mongodb]
  domains:
    domain: [architecture, performance]
    concern: [data, database, schema_design]
  example_good: "// Denormalized: product embeds category name (read 10K/day, category changes 1/month)\n{\n  \"_id\": ObjectId(\"\
    ...\"),\n  \"name\": \"Wireless Headphones\",\n  \"category_id\": ObjectId(\"cat_001\"),\n  \"category_name\": \"Electronics\"\
    ,     // Denormalized from categories collection\n  \"seller_id\": ObjectId(\"seller_001\"),\n  \"seller_name\": \"TechStore\"\
    ,          // Denormalized from sellers collection\n  \"price\": 79.99\n}\n\n// Product page: single read, no $lookup\n\
    db.products.findOne({ _id: productId })\n// Returns all display data in one document, one network round trip\n\n// Update\
    \ denormalized data when source changes (rare)\n// When category name changes:\ndb.products.updateMany(\n  { category_id:\
    \ ObjectId(\"cat_001\") },\n  { $set: { category_name: \"Consumer Electronics\" } }\n)\n"
  example_bad: "// Fully normalized — 3 collections, 2 $lookups per page load\ndb.products.aggregate([\n  { $match: { _id:\
    \ productId } },\n  { $lookup: { from: \"categories\", localField: \"category_id\", foreignField: \"_id\", as: \"cat\"\
    \ } },\n  { $lookup: { from: \"sellers\", localField: \"seller_id\", foreignField: \"_id\", as: \"seller\" } },\n  { $unwind:\
    \ \"$cat\" },\n  { $unwind: \"$seller\" }\n])\n// 3 collection reads for every product page view\n// 10K views/day × 3\
    \ reads = 30K reads vs 10K with denormalization\n"
  when_applies: Projects using MongoDB document stores
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using MongoDB
  sources: ["https://www.mongodb.com/docs/manual/core/data-model-design/"]
