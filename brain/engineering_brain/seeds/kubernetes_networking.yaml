layer: rules
technology: Kubernetes
domain: networking
knowledge:
- id: CR-K8S-NET-001
  text: Choose the correct Service type for each use case — ClusterIP for internal, LoadBalancer for external, never NodePort
    in production.
  why: NodePort exposes a static port (30000-32767) on every node — it bypasses cloud load balancers, has no TLS termination,
    and exposes your infrastructure directly. In production you need health-checked, TLS-terminated, auto-scaling load balancers.
    ClusterIP is the default for service-to-service communication. ExternalName is for aliasing external DNS without a proxy.
  how_to_do_right: 'Internal services: ClusterIP (default). External HTTP/HTTPS: Ingress/Gateway API backed by a single LoadBalancer.
    External TCP/UDP: LoadBalancer Service with cloud provider annotations. Cross-cluster DNS aliasing: ExternalName. Never
    expose NodePort to the internet. Use service.beta.kubernetes.io/aws-load-balancer-* annotations for NLB/ALB tuning.'
  severity: high
  technologies:
    platform: [kubernetes]
  domains:
    domain: [infrastructure, security]
    concern: [networking]
  example_good: "# Internal service\napiVersion: v1\nkind: Service\nmetadata:\n  name: user-service\nspec:\n  type: ClusterIP\n\
    \  selector:\n    app: user-service\n  ports:\n    - port: 80\n      targetPort: 8080\n---\n# External via Ingress (not\
    \ direct LoadBalancer per service)\napiVersion: networking.k8s.io/v1\nkind: Ingress\nmetadata:\n  name: api-ingress\n\
    spec:\n  rules:\n    - host: api.example.com\n      http:\n        paths:\n          - path: /users\n            pathType:\
    \ Prefix\n            backend:\n              service:\n                name: user-service\n                port:\n  \
    \                number: 80\n"
  example_bad: "apiVersion: v1\nkind: Service\nmetadata:\n  name: user-service\nspec:\n  type: NodePort     # Exposed on all\
    \ nodes on random port\n  selector:           # No TLS, no health checks\n    app: user-service\n  ports:\n    - port:\
    \ 80\n      nodePort: 30080  # Hardcoded port — conflicts across services\n"
  when_applies: Projects using Kubernetes-orchestrated deployments
  when_not_applies: single-host applications, monoliths without service communication. projects not using Kubernetes
  sources: ["https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types"]
- id: CR-K8S-NET-002
  text: 'Use headless Services (clusterIP: None) for StatefulSets and peer-to-peer discovery.'
  why: A regular ClusterIP Service creates a virtual IP and load-balances across pods — but databases and consensus systems
    need to address individual pods by name (e.g., postgres-0, postgres-1). Headless Services return all pod IPs in DNS A
    records, allowing direct pod-to-pod communication and stable DNS names like pod-0.service.namespace.svc.cluster.local.
  how_to_do_right: 'Set clusterIP: None on the Service. Use it as the serviceName in your StatefulSet. Clients can resolve
    individual pods via pod-name.service-name.namespace.svc.cluster.local. For leader election, resolve all pods and pick
    the first one. Combine with publishNotReadyAddresses: true if you need DNS for pods not yet ready.'
  severity: medium
  technologies:
    platform: [kubernetes]
  domains:
    domain: [infrastructure, architecture]
    concern: [networking]
  example_good: "apiVersion: v1\nkind: Service\nmetadata:\n  name: postgres\nspec:\n  clusterIP: None      # Headless\n  selector:\n\
    \    app: postgres\n  ports:\n    - port: 5432\n---\n# Now pod-0 is reachable at: postgres-0.postgres.default.svc.cluster.local\n"
  example_bad: "apiVersion: v1\nkind: Service\nmetadata:\n  name: postgres\nspec:\n  type: ClusterIP       # Regular service\n\
    \  selector:\n    app: postgres\n  ports:\n    - port: 5432\n  # Cannot address individual StatefulSet pods by name\n"
  when_applies: Projects using Kubernetes-orchestrated deployments
  when_not_applies: single-host applications, monoliths without service communication. projects not using Kubernetes
  sources: ["https://kubernetes.io/docs/concepts/services-networking/service/#headless-services"]
- id: CR-K8S-NET-003
  text: Always configure TLS termination on Ingress and redirect HTTP to HTTPS.
  why: Without TLS, traffic between clients and the Ingress controller is in plaintext — passwords, tokens, and PII are visible
    to anyone on the network path. Many Ingress controllers do NOT redirect HTTP to HTTPS by default — users hitting http://
    see your site unencrypted. TLS certificates are free with cert-manager + Let's Encrypt.
  how_to_do_right: 'Use cert-manager with ClusterIssuer for automatic Let''s Encrypt certificates. Configure Ingress TLS section
    with the cert Secret name. Add the controller-specific annotation for HTTP-to-HTTPS redirect (e.g., nginx.ingress.kubernetes.io/ssl-redirect:
    ''true''). Set HSTS headers. Test with curl -I http://yourdomain.com and verify 301 to HTTPS.'
  severity: critical
  technologies:
    platform: [kubernetes, certmanager]
  domains:
    domain: [infrastructure, security]
    concern: [networking]
  example_good: "apiVersion: networking.k8s.io/v1\nkind: Ingress\nmetadata:\n  name: api-ingress\n  annotations:\n    cert-manager.io/cluster-issuer:\
    \ letsencrypt-prod\n    nginx.ingress.kubernetes.io/ssl-redirect: \"true\"\n    nginx.ingress.kubernetes.io/force-ssl-redirect:\
    \ \"true\"\nspec:\n  ingressClassName: nginx\n  tls:\n    - hosts:\n        - api.example.com\n      secretName: api-tls\n\
    \  rules:\n    - host: api.example.com\n      http:\n        paths:\n          - path: /\n            pathType: Prefix\n\
    \            backend:\n              service:\n                name: api\n                port:\n                  number:\
    \ 80\n"
  example_bad: "apiVersion: networking.k8s.io/v1\nkind: Ingress\nmetadata:\n  name: api-ingress\nspec:\n  rules:\n    - host:\
    \ api.example.com\n      http:\n        paths:\n          - path: /\n            pathType: Prefix\n            backend:\n\
    \              service:\n                name: api\n                port:\n                  number: 80\n  # No TLS —\
    \ all traffic in plaintext\n  # No redirect — HTTP users stay on HTTP\n"
  when_applies: Any project using Kubernetes-orchestrated deployments or cert-manager
  when_not_applies: single-host applications, monoliths without service communication. projects not using Kubernetes or cert-manager
  sources:
    - "https://cert-manager.io/docs/usage/ingress/"
    - "https://kubernetes.io/docs/concepts/services-networking/ingress/#tls"
- id: CR-K8S-NET-004
  text: Always specify ingressClassName — do not rely on default Ingress controller selection.
  why: Clusters often have multiple Ingress controllers (nginx for public, Traefik for internal). Without ingressClassName,
    the Ingress is processed by whatever controller is set as default — or by ALL controllers, causing duplicate routes and
    conflicting configurations. This is a frequent source of 'it works in staging but not production' bugs.
  how_to_do_right: Always set spec.ingressClassName explicitly. List available classes with 'kubectl get ingressclass'. Standardize
    class names across environments (e.g., nginx-public, nginx-internal). If migrating from the deprecated kubernetes.io/ingress.class
    annotation, set both during transition.
  severity: medium
  technologies:
    platform: [kubernetes, nginx, traefik]
  domains:
    domain: [infrastructure]
    concern: [networking]
  example_good: "apiVersion: networking.k8s.io/v1\nkind: Ingress\nspec:\n  ingressClassName: nginx-public    # Explicit class\n\
    \  rules:\n    - host: api.example.com\n"
  example_bad: "apiVersion: networking.k8s.io/v1\nkind: Ingress\nmetadata:\n  annotations:\n    kubernetes.io/ingress.class:\
    \ nginx  # Deprecated annotation\nspec:\n  rules:\n    - host: api.example.com\n  # No ingressClassName — relies on deprecated\
    \ annotation or default class\n"
  when_applies: Projects using Kubernetes-orchestrated deployments, nginx, or Traefik
  when_not_applies: single-host applications, monoliths without service communication
  sources: ["https://kubernetes.io/docs/concepts/services-networking/ingress/#ingress-class"]
- id: CR-K8S-NET-005
  text: Adopt Gateway API (HTTPRoute, GRPCRoute) for new projects — Ingress is being superseded.
  why: 'Ingress has fundamental limitations: no support for header-based routing, traffic splitting, or TCP/UDP routing without
    controller-specific annotations. Every controller implements different annotations, making Ingress configs non-portable.
    Gateway API is the official successor with role-oriented design (infra admin manages Gateway, developers manage HTTPRoutes),
    native traffic splitting, and cross-controller compatibility.'
  how_to_do_right: Install Gateway API CRDs. Create a GatewayClass and Gateway resource (infra team). Create HTTPRoute resources
    (app teams) that reference the Gateway. Use traffic splitting for canary deployments. Use GRPCRoute for gRPC services.
    Use TLSRoute for non-HTTP TLS passthrough. Check controller support at gateway-api.sigs.k8s.io.
  severity: medium
  technologies:
    library: [gateway api]
    platform: [kubernetes]
  domains:
    domain: [infrastructure, architecture]
    concern: [networking]
  example_good: "apiVersion: gateway.networking.k8s.io/v1\nkind: HTTPRoute\nmetadata:\n  name: api-route\nspec:\n  parentRefs:\n\
    \    - name: main-gateway\n      namespace: gateway-infra\n  hostnames:\n    - api.example.com\n  rules:\n    - matches:\n\
    \        - path:\n            type: PathPrefix\n            value: /v2\n      backendRefs:\n        - name: api-v2\n \
    \         port: 80\n          weight: 90\n        - name: api-v3\n          port: 80\n          weight: 10    # 10% canary\
    \ traffic\n"
  example_bad: "# Controller-specific annotations for traffic splitting\napiVersion: networking.k8s.io/v1\nkind: Ingress\n\
    metadata:\n  annotations:\n    nginx.ingress.kubernetes.io/canary: \"true\"\n    nginx.ingress.kubernetes.io/canary-weight:\
    \ \"10\"\n# Non-portable, nginx-only, hard to audit\n"
  when_applies: Projects using Kubernetes-orchestrated deployments or Gateway API
  when_not_applies: single-host applications, monoliths without service communication. projects not using Kubernetes or Gateway
    API
  sources: ["https://gateway-api.sigs.k8s.io/"]
- id: CR-K8S-NET-006
  text: Apply a default-deny NetworkPolicy to every namespace and explicitly allow only required traffic.
  why: 'By default, Kubernetes allows ALL pod-to-pod traffic across ALL namespaces — any compromised pod can communicate with
    every other pod in the cluster. This is the #1 lateral movement vector in Kubernetes attacks. A default-deny policy stops
    all traffic, then explicit allow rules open only what''s needed — zero-trust networking.'
  how_to_do_right: Apply a default-deny policy for both ingress and egress in every namespace. Then create targeted allow
    policies for each service. Label your namespaces for cross-namespace policies. Test with 'kubectl exec' from one pod to
    another. Use a CNI that supports NetworkPolicies (Calico, Cilium — NOT Flannel alone).
  severity: critical
  technologies:
    library: [calico, cilium]
    platform: [kubernetes]
  domains:
    domain: [infrastructure, security]
    concern: [networking]
  example_good: "# Step 1: Default deny ALL traffic in namespace\napiVersion: networking.k8s.io/v1\nkind: NetworkPolicy\n\
    metadata:\n  name: default-deny-all\n  namespace: production\nspec:\n  podSelector: {}     # Applies to ALL pods\n  policyTypes:\n\
    \    - Ingress\n    - Egress\n---\n# Step 2: Allow specific traffic\napiVersion: networking.k8s.io/v1\nkind: NetworkPolicy\n\
    metadata:\n  name: allow-api-to-db\n  namespace: production\nspec:\n  podSelector:\n    matchLabels:\n      app: postgres\n\
    \  policyTypes:\n    - Ingress\n  ingress:\n    - from:\n        - podSelector:\n            matchLabels:\n          \
    \    app: api\n      ports:\n        - port: 5432\n          protocol: TCP\n"
  example_bad: '# No NetworkPolicies at all — any pod can talk to any pod

    # across all namespaces. Compromised frontend pod

    # can directly access the database.

    '
  when_applies: Any project using Kubernetes-orchestrated deployments, Calico, or Cilium
  when_not_applies: single-host applications, monoliths without service communication
  sources: ["https://kubernetes.io/docs/concepts/services-networking/network-policies/"]
- id: CR-K8S-NET-007
  text: NetworkPolicies must include egress rules — not just ingress.
  why: 'Most teams only apply ingress policies (who can talk TO my pod) but forget egress (who my pod can talk TO). A compromised
    pod with unrestricted egress can: exfiltrate data to external IPs, communicate with command-and-control servers, mine
    cryptocurrency, or attack other services. Egress policies are your last line of defense against data exfiltration.'
  how_to_do_right: 'After default-deny, allow egress only to required destinations: kube-dns (port 53), specific services,
    and specific external CIDRs. Allow DNS first (or nothing works). Use namespaceSelector for cross-namespace egress. For
    external APIs, use egress to specific CIDR blocks or use a service mesh for fine-grained egress control.'
  severity: high
  technologies:
    library: [calico, cilium]
    platform: [kubernetes]
  domains:
    domain: [infrastructure, security]
    concern: [networking]
  example_good: "apiVersion: networking.k8s.io/v1\nkind: NetworkPolicy\nmetadata:\n  name: api-egress\n  namespace: production\n\
    spec:\n  podSelector:\n    matchLabels:\n      app: api\n  policyTypes:\n    - Egress\n  egress:\n    - to:\n        -\
    \ namespaceSelector: {}\n          podSelector:\n            matchLabels:\n              k8s-app: kube-dns\n      ports:\n\
    \        - port: 53\n          protocol: UDP\n    - to:\n        - podSelector:\n            matchLabels:\n          \
    \    app: postgres\n      ports:\n        - port: 5432\n    - to:\n        - ipBlock:\n            cidr: 203.0.113.0/24\
    \  # External API CIDR\n      ports:\n        - port: 443\n"
  example_bad: "# Only ingress policies — egress is wide open\n# Compromised pod can freely exfiltrate data\napiVersion: networking.k8s.io/v1\n\
    kind: NetworkPolicy\nspec:\n  podSelector:\n    matchLabels:\n      app: api\n  policyTypes:\n    - Ingress     # Only\
    \ ingress — no egress restriction\n"
  when_applies: Projects using Kubernetes-orchestrated deployments, Calico, or Cilium
  when_not_applies: single-host applications, monoliths without service communication
  sources: ["https://kubernetes.io/docs/concepts/services-networking/network-policies/#default-policies"]
- id: CR-K8S-NET-008
  text: Use fully-qualified DNS names in cross-namespace communication — never rely on short names.
  why: Short DNS names (e.g., 'postgres') only resolve within the same namespace. Across namespaces, you need 'postgres.database.svc.cluster.local'.
    If a service with the same short name exists in the calling namespace, it shadows the intended target — a silent misconfiguration
    that's extremely hard to debug. FQDN makes intent explicit.
  how_to_do_right: Always use <service>.<namespace>.svc.cluster.local for cross-namespace calls. Within the same namespace,
    <service> or <service>.<namespace> is acceptable. Set ndots to 2 in pod DNS config to reduce DNS lookup chains. For external
    services, use ExternalName Services to provide a stable internal alias.
  severity: medium
  technologies:
    library: [coredns]
    platform: [kubernetes]
  domains:
    domain: [infrastructure]
    concern: [networking]
  example_good: "# Cross-namespace: always use FQDN\nenv:\n  - name: DATABASE_URL\n    value: \"postgres://postgres.database.svc.cluster.local:5432/mydb\"\
    \n  - name: CACHE_URL\n    value: \"redis://redis.cache.svc.cluster.local:6379\"\n---\n# Reduce DNS lookup overhead\n\
    spec:\n  dnsConfig:\n    options:\n      - name: ndots\n        value: \"2\"\n"
  example_bad: "env:\n  - name: DATABASE_URL\n    value: \"postgres://postgres:5432/mydb\"\n    # Works only in same namespace\n\
    \    # Silently connects to wrong service if same name exists locally\n"
  when_applies: Projects using Kubernetes-orchestrated deployments or CoreDNS
  when_not_applies: single-host applications, monoliths without service communication. projects not using Kubernetes or CoreDNS
  sources: ["https://kubernetes.io/docs/concepts/services-networking/dns-pod-service/"]
- id: CR-K8S-NET-009
  text: Enable mutual TLS (mTLS) via service mesh for all service-to-service communication.
  why: 'Without mTLS, traffic between pods is plaintext — any pod with network access can sniff credentials, tokens, and PII
    from other services. NetworkPolicies control WHO can connect but not whether the connection is encrypted. mTLS ensures:
    encryption in transit, mutual authentication (both sides verify identity), and cryptographic service identity (no IP spoofing).'
  how_to_do_right: Use Istio's PeerAuthentication with STRICT mode for mTLS enforcement. Start with PERMISSIVE mode during
    migration (accepts both plain and mTLS). Use Linkerd for simpler deployments with automatic mTLS. Verify with 'istioctl
    x describe pod' or check the lock icon in Kiali. Exclude legacy services that cannot support mTLS with policy exceptions.
  severity: high
  technologies:
    platform: [kubernetes, service_mesh, istio, linkerd]
  domains:
    domain: [infrastructure, security]
    concern: [networking]
  example_good: "# Istio: Enable strict mTLS for entire namespace\napiVersion: security.istio.io/v1beta1\nkind: PeerAuthentication\n\
    metadata:\n  name: default\n  namespace: production\nspec:\n  mtls:\n    mode: STRICT\n---\n# Istio: Destination rule\
    \ for mTLS\napiVersion: networking.istio.io/v1beta1\nkind: DestinationRule\nmetadata:\n  name: default\n  namespace: production\n\
    spec:\n  host: \"*.production.svc.cluster.local\"\n  trafficPolicy:\n    tls:\n      mode: ISTIO_MUTUAL\n"
  example_bad: "# No service mesh — all internal traffic is plaintext\n# Compromised pod sniffs credentials between api and\
    \ auth-service\n# Or using Istio in PERMISSIVE mode permanently:\napiVersion: security.istio.io/v1beta1\nkind: PeerAuthentication\n\
    spec:\n  mtls:\n    mode: PERMISSIVE   # Allows plaintext — defeats the purpose\n"
  when_applies: Projects using Kubernetes-orchestrated deployments, Istio service mesh, or Linkerd service mesh
  when_not_applies: single-host applications, monoliths without service communication
  sources: ["https://istio.io/latest/docs/concepts/security/#mutual-tls-authentication"]
- id: CR-K8S-NET-010
  text: Use Istio VirtualService for advanced traffic management — canary, fault injection, retries.
  why: Kubernetes Services only support round-robin load balancing with no traffic shaping. For canary deployments, A/B testing,
    fault injection, circuit breaking, and retry policies, you need a service mesh. Without traffic management, you cannot
    safely roll out changes to a percentage of traffic or test resilience under failure conditions.
  how_to_do_right: 'Use VirtualService for traffic routing: weight-based splitting for canary, header-based for A/B, fault
    injection for chaos testing. Use DestinationRule for circuit breaking, connection pool settings, and outlier detection.
    Start with retries and timeouts before adding complex routing. Monitor with Kiali and Grafana dashboards.'
  severity: medium
  technologies:
    platform: [kubernetes, service_mesh, istio]
  domains:
    domain: [infrastructure, architecture]
    concern: [networking]
  example_good: "apiVersion: networking.istio.io/v1beta1\nkind: VirtualService\nmetadata:\n  name: api\nspec:\n  hosts:\n\
    \    - api.production.svc.cluster.local\n  http:\n    - route:\n        - destination:\n            host: api.production.svc.cluster.local\n\
    \            subset: stable\n          weight: 95\n        - destination:\n            host: api.production.svc.cluster.local\n\
    \            subset: canary\n          weight: 5\n      retries:\n        attempts: 3\n        perTryTimeout: 2s\n   \
    \     retryOn: 5xx,reset,connect-failure\n      timeout: 10s\n"
  example_bad: '# No traffic management — all-or-nothing deployments

    # Cannot test new version with 5% of traffic

    # Cannot inject faults for resilience testing

    # Manual retry logic in every service

    '
  when_applies: Projects using Kubernetes-orchestrated deployments or Istio service mesh
  when_not_applies: single-host applications, monoliths without service communication. projects not using Kubernetes or Istio
  sources: ["https://istio.io/latest/docs/concepts/traffic-management/"]
- id: CR-K8S-NET-011
  text: Use IPVS mode for kube-proxy in clusters with more than 1000 Services.
  why: Default iptables mode creates O(n) iptables rules per Service — with 5000 Services, rule evaluation takes milliseconds
    per packet and rule updates take seconds, causing connection drops during Service changes. IPVS uses kernel hash tables
    for O(1) lookups regardless of Service count, and supports multiple load-balancing algorithms (rr, lc, sh).
  how_to_do_right: Set kube-proxy mode to ipvs in KubeProxyConfiguration. Ensure ipvs kernel modules are loaded (ip_vs, ip_vs_rr,
    ip_vs_wrr, ip_vs_sh). Use 'ipvsadm -Ln' to verify rules. For small clusters (<500 Services), iptables mode is fine. Monitor
    kube-proxy sync latency metrics.
  severity: medium
  technologies:
    platform: [kubernetes]
  domains:
    domain: [infrastructure, performance]
    concern: [networking]
  example_good: "# kube-proxy ConfigMap\napiVersion: kubeproxy.config.k8s.io/v1alpha1\nkind: KubeProxyConfiguration\nmode:\
    \ ipvs\nipvs:\n  scheduler: rr              # round-robin\n  strictARP: true            # Required for MetalLB\n  syncPeriod:\
    \ 30s\n"
  example_bad: '# Default iptables mode with 5000+ Services

    apiVersion: kubeproxy.config.k8s.io/v1alpha1

    kind: KubeProxyConfiguration

    mode: iptables    # O(n) rules — slow at scale

    # 5000 Services = 25000+ iptables rules, seconds to sync

    '
  when_applies: Projects using Kubernetes-orchestrated deployments
  when_not_applies: single-host applications, monoliths without service communication. projects not using Kubernetes
  sources: ["https://kubernetes.io/docs/reference/networking/virtual-ips/#proxy-mode-ipvs"]
- id: CR-K8S-NET-012
  text: Choose your CNI plugin based on features needed — Cilium for eBPF and observability, Calico for mature NetworkPolicy
    support.
  why: The CNI plugin determines your cluster's networking capabilities, performance ceiling, and security features. Flannel
    is simple but has no NetworkPolicy support — your security policies are silently ignored. Calico provides excellent NetworkPolicy
    support and is battle-tested. Cilium uses eBPF for kernel-level networking with superior observability, L7 policies, and
    transparent encryption.
  how_to_do_right: 'For production with NetworkPolicy needs: Calico (mature) or Cilium (modern). For development/simple clusters:
    Flannel with Calico for policy-only mode. For observability-first: Cilium with Hubble. Benchmark your CNI under load before
    committing. Verify NetworkPolicy support with ''kubectl apply'' a deny-all policy and test connectivity.'
  severity: high
  technologies:
    library: [calico, cilium, flannel]
    platform: [kubernetes]
  domains:
    domain: [infrastructure, architecture]
    concern: [networking]
  example_good: "# Cilium Helm values for production\n# helm install cilium cilium/cilium --namespace kube-system\nhubble:\n\
    \  enabled: true\n  relay:\n    enabled: true\n  ui:\n    enabled: true\nencryption:\n  enabled: true\n  type: wireguard\n\
    policyEnforcementMode: default   # Enforce NetworkPolicies\nkubeProxyReplacement: true       # eBPF replaces kube-proxy\n"
  example_bad: "# Using Flannel in production with NetworkPolicies\n# Flannel does NOT enforce NetworkPolicies — they're silently\
    \ ignored\n# Your \"default deny\" policy does nothing:\napiVersion: networking.k8s.io/v1\nkind: NetworkPolicy\nmetadata:\n\
    \  name: default-deny\nspec:\n  podSelector: {}\n  policyTypes: [Ingress]\n  # With Flannel: DOES NOTHING. All traffic\
    \ still allowed.\n"
  when_applies: Projects using Kubernetes-orchestrated deployments, Calico, Cilium, or Flannel
  when_not_applies: single-host applications, monoliths without service communication
  sources:
    - "https://docs.cilium.io/en/stable/overview/intro/"
    - "https://docs.tigera.io/calico/latest/about/"
- id: CR-K8S-NET-013
  text: Use session affinity only when absolutely required — prefer stateless design.
  why: Session affinity (sticky sessions) pins a client to a specific pod based on client IP. This creates uneven load distribution,
    makes rolling updates risky (pinned users lose sessions), and breaks horizontal scaling. If one pod is slow, pinned users
    are stuck with it. Stateless design with external session storage (Redis) is always better.
  how_to_do_right: 'If you must use session affinity: set service.spec.sessionAffinity=ClientIP and sessionAffinityConfig.clientIP.timeoutSeconds
    (default 10800s is too long, use 300-1800s). Better: externalize session state to Redis/Memcached and keep services stateless.
    If using Ingress, configure session affinity at the Ingress level with cookie-based affinity instead of IP-based.'
  severity: medium
  technologies:
    platform: [kubernetes]
  domains:
    domain: [infrastructure, architecture]
    concern: [networking]
  example_good: "# Best: stateless service with Redis session store\napiVersion: v1\nkind: Service\nmetadata:\n  name: api\n\
    spec:\n  selector:\n    app: api\n  ports:\n    - port: 80\n  # No session affinity — state is in Redis\n---\n# If you\
    \ MUST have affinity:\napiVersion: v1\nkind: Service\nspec:\n  sessionAffinity: ClientIP\n  sessionAffinityConfig:\n \
    \   clientIP:\n      timeoutSeconds: 600   # 10 minutes, not 3 hours\n"
  example_bad: "apiVersion: v1\nkind: Service\nspec:\n  sessionAffinity: ClientIP\n  # Default timeout: 10800s (3 hours!)\n\
    \  # Users pinned to one pod for 3 hours\n  # Uneven load, broken scaling, rolling update issues\n"
  when_applies: Projects using Kubernetes-orchestrated deployments
  when_not_applies: single-host applications, monoliths without service communication. projects not using Kubernetes
  sources: ["https://kubernetes.io/docs/reference/networking/virtual-ips/#session-affinity"]
- id: CR-K8S-NET-014
  text: Use external-dns to automatically manage DNS records for Ingress and Service resources.
  why: Manually managing DNS records for every Ingress and LoadBalancer Service is error-prone and slow — developers deploy
    a new service, then wait hours for a ticket to create the DNS record. Stale records pointing to deleted services cause
    mysterious outages. External-dns watches Kubernetes resources and automatically creates/updates/deletes DNS records in
    Route53, CloudDNS, or other providers.
  how_to_do_right: Deploy external-dns with annotations-based filtering (external-dns.alpha.kubernetes.io/hostname). Set policy
    to 'sync' (manages lifecycle including deletion) or 'upsert-only' (safer, never deletes). Use txt-prefix for ownership
    tracking. Limit to specific namespaces with --namespace flag. Use IRSA/Workload Identity for cloud credentials.
  severity: medium
  technologies:
    library: [external-dns]
    platform: [kubernetes, aws, route53]
  domains:
    domain: [infrastructure, operations, devops]
    concern: [networking]
  example_good: "# Ingress with external-dns annotation\napiVersion: networking.k8s.io/v1\nkind: Ingress\nmetadata:\n  name:\
    \ api\n  annotations:\n    external-dns.alpha.kubernetes.io/hostname: api.example.com\n    external-dns.alpha.kubernetes.io/ttl:\
    \ \"300\"\nspec:\n  ingressClassName: nginx\n  rules:\n    - host: api.example.com\n---\n# external-dns Helm values\n\
    # policy: sync\n# txtPrefix: \"k8s-\"\n# domainFilters: [\"example.com\"]\n# provider: aws\n"
  example_bad: '# Manual DNS management:

    # 1. Deploy Ingress

    # 2. kubectl get ingress — copy IP

    # 3. Login to Route53 console

    # 4. Create A record manually

    # 5. Forget to delete when service is removed

    # 6. Old DNS points to dead IP — mystery outage

    '
  when_applies: Projects using Kubernetes-orchestrated deployments, external-dns, or Route53
  when_not_applies: single-host applications, monoliths without service communication
  sources: ["https://kubernetes-sigs.github.io/external-dns/latest/"]
- id: CR-K8S-NET-015
  text: Configure rate limiting on Ingress to protect backends from traffic spikes and abuse.
  why: Without rate limiting, a single client can overwhelm your backend with requests — whether intentional (DDoS) or accidental
    (misconfigured retry loop). Rate limiting at the Ingress level is more efficient than application-level limiting because
    rejected requests never reach your pods, saving CPU and memory for legitimate traffic.
  how_to_do_right: 'For nginx Ingress: use annotations for per-IP rate limiting (nginx.ingress.kubernetes.io/limit-rps). For
    Istio: use EnvoyFilter or AuthorizationPolicy with external rate limiting. For Gateway API: use BackendTrafficPolicy with
    rate limiting. Set reasonable defaults (50-100 rps per IP for APIs). Return 429 with Retry-After header. Exclude health
    check endpoints from rate limits.'
  severity: high
  technologies:
    platform: [kubernetes, nginx]
  domains:
    domain: [infrastructure, security]
    concern: [networking]
  example_good: "apiVersion: networking.k8s.io/v1\nkind: Ingress\nmetadata:\n  name: api\n  annotations:\n    nginx.ingress.kubernetes.io/limit-rps:\
    \ \"50\"\n    nginx.ingress.kubernetes.io/limit-burst-multiplier: \"5\"\n    nginx.ingress.kubernetes.io/limit-connections:\
    \ \"10\"\n    nginx.ingress.kubernetes.io/limit-whitelist: \"10.0.0.0/8\"\nspec:\n  rules:\n    - host: api.example.com\n"
  example_bad: "apiVersion: networking.k8s.io/v1\nkind: Ingress\nmetadata:\n  name: api\n  # No rate limiting annotations\n\
    spec:\n  rules:\n    - host: api.example.com\n  # Any client can send unlimited requests\n  # Single misconfigured retry\
    \ loop can bring down the service\n"
  when_applies: Projects using Kubernetes-orchestrated deployments or nginx
  when_not_applies: single-host applications, monoliths without service communication. projects not using Kubernetes or nginx
  sources: ["https://kubernetes.github.io/ingress-nginx/user-guide/nginx-configuration/annotations/#rate-limiting"]
- id: CR-K8S-NET-016
  text: 'Use internalTrafficPolicy: Local to keep latency-sensitive traffic within the same node.'
  why: By default, Services route traffic to any pod in the cluster — a request from node-A may go to a pod on node-B in a
    different availability zone, adding 1-5ms of cross-AZ latency and incurring data transfer costs. For latency-sensitive
    services (caches, sidecar proxies), routing to a local pod eliminates this overhead entirely.
  how_to_do_right: 'Set service.spec.internalTrafficPolicy=Local for latency-critical services like Redis caches and metrics
    collectors. Ensure you have enough replicas (DaemonSet or sufficient Deployment replicas) so every node has a local pod.
    If no local pod exists, traffic is dropped — use this only with DaemonSets or well-spread Deployments. Combine with externalTrafficPolicy:
    Local for LoadBalancer Services to preserve client IP.'
  severity: medium
  technologies:
    platform: [kubernetes]
  domains:
    domain: [infrastructure, performance]
    concern: [networking]
  example_good: "apiVersion: v1\nkind: Service\nmetadata:\n  name: redis-cache\nspec:\n  type: ClusterIP\n  internalTrafficPolicy:\
    \ Local    # Route to local node only\n  selector:\n    app: redis-cache\n  ports:\n    - port: 6379\n---\n# Ensure Redis\
    \ runs on every node\napiVersion: apps/v1\nkind: DaemonSet\nmetadata:\n  name: redis-cache\n"
  example_bad: "apiVersion: v1\nkind: Service\nmetadata:\n  name: redis-cache\nspec:\n  # Default: internalTrafficPolicy:\
    \ Cluster\n  # Cache request from node-A goes to pod on node-C\n  # Cross-AZ latency + data transfer cost for a cache\
    \ hit\n"
  when_applies: Projects using Kubernetes-orchestrated deployments
  when_not_applies: single-host applications, monoliths without service communication. projects not using Kubernetes
  sources: ["https://kubernetes.io/docs/concepts/services-networking/service-traffic-policy/"]
