layer: rules
technology: Elasticsearch
domain: search
knowledge:
- id: CR-ES-IDX-001
  text: Define explicit mappings before indexing data — dynamic mapping guesses types and often gets them wrong, creating
    fields you cannot search or aggregate correctly.
  why: Dynamic mapping infers field types from the first document indexed. If the first value for a 'price' field is '10'
    (string), Elasticsearch maps it as text — breaking all numeric aggregations and range queries for that field forever (you
    cannot change a field's type without reindexing). A 'status' field auto-mapped as text gets analyzed (split into tokens,
    lowercased) instead of being a keyword — searches for 'IN_PROGRESS' match 'in' and 'progress' separately. Once a mapping
    is created, it is immutable for that index. Fixing it requires creating a new index with correct mappings and reindexing
    all data.
  how_to_do_right: 'Create an index template with explicit mappings before indexing any data. Set dynamic: ''strict'' to reject
    documents with unmapped fields (safest), or dynamic: ''runtime'' to allow unmapped fields as runtime fields without persisting
    bad mappings. Use ''keyword'' for exact-match fields (status, id, email). Use ''text'' with appropriate analyzers for
    full-text search fields. Use multi-fields for fields needing both exact and full-text search.'
  severity: critical
  technologies:
    platform: [elasticsearch]
  domains:
    domain: [architecture]
    concern: [search, data, database, schema_design]
  example_good: "# Explicit mapping with strict mode\nPUT /products\n{\n  \"settings\": {\n    \"number_of_shards\": 3,\n\
    \    \"number_of_replicas\": 1\n  },\n  \"mappings\": {\n    \"dynamic\": \"strict\",\n    \"properties\": {\n      \"\
    name\": {\n        \"type\": \"text\",\n        \"analyzer\": \"standard\",\n        \"fields\": {\n          \"keyword\"\
    : { \"type\": \"keyword\" }\n        }\n      },\n      \"sku\": { \"type\": \"keyword\" },\n      \"price\": { \"type\"\
    : \"scaled_float\", \"scaling_factor\": 100 },\n      \"category\": { \"type\": \"keyword\" },\n      \"description\"\
    : { \"type\": \"text\", \"analyzer\": \"english\" },\n      \"created_at\": { \"type\": \"date\" },\n      \"in_stock\"\
    : { \"type\": \"boolean\" },\n      \"tags\": { \"type\": \"keyword\" },\n      \"location\": { \"type\": \"geo_point\"\
    \ }\n    }\n  }\n}\n"
  example_bad: '# No mapping — dynamic mapping guesses everything

    POST /products/_doc

    { "name": "Widget", "price": "10.99", "sku": "ABC-123", "in_stock": "true" }


    # Results:

    # price → mapped as "text" (string "10.99") — range queries broken

    # sku → mapped as "text" (analyzed: "abc", "123") — exact search broken

    # in_stock → mapped as "text" (not boolean) — filtering broken

    # name → mapped as "text" only — no keyword field for sorting/aggregation


    # Cannot fix without reindex:

    # PUT /products/_mapping { "properties": { "price": { "type": "float" } } }

    # → ERROR: mapper [price] cannot be changed from type [text] to [float]

    '
  when_applies: Any project using Elasticsearch search clusters
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using Elasticsearch
  sources: ["https://www.elastic.co/guide/en/elasticsearch/reference/current/explicit-mapping.html"]
- id: CR-ES-IDX-002
  text: Use custom analyzers for language-specific full-text search — the default standard analyzer does not handle stemming,
    synonyms, or stop words for any specific language.
  why: The standard analyzer tokenizes on whitespace and punctuation, lowercases tokens, but performs no stemming or stop
    word removal. A search for 'running' will not match 'ran' or 'runs'. A search for 'the best database' wastes index space
    on 'the' and ranks documents with more occurrences of 'the' higher. Language analyzers (english, german, portuguese) apply
    stemming (running→run), stop word removal, and language-specific normalization. Custom analyzers allow you to chain tokenizers,
    token filters (stemming, synonyms, phonetic), and char filters (HTML stripping) for your specific use case.
  how_to_do_right: 'Use built-in language analyzers for single-language content: ''english'', ''portuguese'', ''german'',
    etc. For multi-language content, use the ''icu_analyzer'' or detect language per document and use per-language fields.
    Create custom analyzers for domain-specific needs: synonym filters (NY→New York), custom stop words, phonetic matching
    (soundex/metaphone). Test analyzers with the _analyze API before deploying.'
  severity: high
  technologies:
    platform: [elasticsearch]
  domains:
    domain: [architecture]
    concern: [search, text-processing]
  example_good: "# Custom analyzer with synonyms and stemming\nPUT /articles\n{\n  \"settings\": {\n    \"analysis\": {\n\
    \      \"filter\": {\n        \"english_stemmer\": { \"type\": \"stemmer\", \"language\": \"english\" },\n        \"english_stop\"\
    : { \"type\": \"stop\", \"stopwords\": \"_english_\" },\n        \"domain_synonyms\": {\n          \"type\": \"synonym\"\
    ,\n          \"synonyms\": [\n            \"k8s, kubernetes\",\n            \"pg, postgres, postgresql\",\n          \
    \  \"js, javascript\"\n          ]\n        }\n      },\n      \"analyzer\": {\n        \"article_analyzer\": {\n    \
    \      \"type\": \"custom\",\n          \"tokenizer\": \"standard\",\n          \"filter\": [\n            \"lowercase\"\
    ,\n            \"english_stop\",\n            \"domain_synonyms\",\n            \"english_stemmer\"\n          ]\n   \
    \     }\n      }\n    }\n  },\n  \"mappings\": {\n    \"properties\": {\n      \"title\": { \"type\": \"text\", \"analyzer\"\
    : \"article_analyzer\" },\n      \"body\": { \"type\": \"text\", \"analyzer\": \"article_analyzer\" }\n    }\n  }\n}\n\
    \n# Test the analyzer\nPOST /articles/_analyze\n{ \"analyzer\": \"article_analyzer\", \"text\": \"Running PostgreSQL on\
    \ k8s\" }\n# Tokens: [\"run\", \"postgres\", \"postgresql\", \"pg\", \"kubernetes\", \"k8s\"]\n"
  example_bad: '# Standard analyzer for English content — no stemming

    PUT /articles

    { "mappings": { "properties": { "body": { "type": "text" } } } }


    # Search for "running" does NOT match "ran" or "runs"

    # Search for "PostgreSQL" does NOT match "postgres" or "pg"

    # "the" and "a" waste index space and distort relevance scoring

    '
  when_applies: Projects using Elasticsearch search clusters
  when_not_applies: projects not using Elasticsearch
  sources: ["https://www.elastic.co/guide/en/elasticsearch/reference/current/analysis-custom-analyzer.html"]
- id: CR-ES-IDX-003
  text: Use index templates for consistent settings across time-based indices — every new index inherits the correct mappings,
    shards, replicas, and lifecycle policy.
  why: 'Time-based data (logs, metrics, events) typically uses one index per time period (daily, weekly). Without templates,
    each new index gets default settings: 1 shard, dynamic mapping, no lifecycle policy. You must manually create each index
    with the right configuration — and one missed day means an index with wrong settings that is expensive to fix. Index templates
    automatically apply settings, mappings, and ILM policies to any new index matching a pattern. Component templates allow
    reusing mapping fragments across multiple index templates.'
  how_to_do_right: 'Create a composable index template with: (1) index pattern matching your naming convention (logs-*), (2)
    explicit mappings for known fields, (3) shard/replica configuration, (4) ILM policy for lifecycle management. Use component
    templates for shared mappings (e.g., @timestamp, host, message). Set priority to control which template wins when patterns
    overlap.'
  severity: high
  technologies:
    platform: [elasticsearch]
  domains:
    domain: [architecture, operations]
    concern: [search, data, time_series]
  example_good: "# Component template for common fields\nPUT /_component_template/base-mappings\n{\n  \"template\": {\n  \
    \  \"mappings\": {\n      \"properties\": {\n        \"@timestamp\": { \"type\": \"date\" },\n        \"host\": { \"type\"\
    : \"keyword\" },\n        \"message\": { \"type\": \"text\" },\n        \"level\": { \"type\": \"keyword\" }\n      }\n\
    \    }\n  }\n}\n\n# Index template for application logs\nPUT /_index_template/app-logs\n{\n  \"index_patterns\": [\"logs-app-*\"\
    ],\n  \"priority\": 200,\n  \"composed_of\": [\"base-mappings\"],\n  \"template\": {\n    \"settings\": {\n      \"number_of_shards\"\
    : 3,\n      \"number_of_replicas\": 1,\n      \"index.lifecycle.name\": \"logs-policy\",\n      \"index.lifecycle.rollover_alias\"\
    : \"logs-app-write\"\n    },\n    \"mappings\": {\n      \"dynamic\": \"runtime\",\n      \"properties\": {\n        \"\
    request_id\": { \"type\": \"keyword\" },\n        \"duration_ms\": { \"type\": \"integer\" },\n        \"status_code\"\
    : { \"type\": \"short\" }\n      }\n    }\n  }\n}\n# Every new index matching \"logs-app-*\" gets these settings automatically\n"
  example_bad: '# No template — manually creating each daily index

    PUT /logs-app-2026-02-15

    { "settings": { "number_of_shards": 3 }, "mappings": { ... } }

    PUT /logs-app-2026-02-16

    { "settings": { "number_of_shards": 3 }, "mappings": { ... } }

    # Miss a day → default settings (1 shard, dynamic mapping)

    # 365 manual index creations per year

    '
  when_applies: Projects using Elasticsearch search clusters
  when_not_applies: projects not using Elasticsearch
  sources: ["https://www.elastic.co/guide/en/elasticsearch/reference/current/index-templates.html"]
- id: CR-ES-SRCH-001
  text: Use bool queries with filter context for exact matching and query context for relevance scoring — filter context skips
    scoring and is cacheable, making it 2-10x faster.
  why: Elasticsearch distinguishes between query context (does this document match AND how well?) and filter context (does
    this document match, yes/no?). Query context computes relevance scores using BM25 — expensive per document. Filter context
    returns a simple yes/no bitmap and caches the result for reuse. Putting exact-match conditions (status, date range, category)
    in filter instead of must makes them cacheable across queries and avoids unnecessary scoring computation. A typical search
    combines full-text relevance (query context) with exact filters (filter context).
  how_to_do_right: 'Use ''filter'' for exact conditions that do not need scoring: term, range, exists, ids. Use ''must'' for
    conditions that should affect relevance scoring: match, multi_match. Use ''should'' with minimum_should_match for optional
    boosting. Use ''must_not'' for exclusions (also filter context, no scoring). Structure: must=relevance, filter=exact,
    should=boost, must_not=exclude.'
  severity: high
  technologies:
    platform: [elasticsearch]
  domains:
    domain: [architecture, performance]
    concern: [search]
  example_good: "# Optimized bool query: filter for exact, must for relevance\nGET /products/_search\n{\n  \"query\": {\n\
    \    \"bool\": {\n      \"must\": [\n        {\n          \"multi_match\": {\n            \"query\": \"wireless noise\
    \ cancelling\",\n            \"fields\": [\"name^3\", \"description\"],\n            \"type\": \"best_fields\"\n     \
    \     }\n        }\n      ],\n      \"filter\": [\n        { \"term\": { \"category\": \"headphones\" } },\n        {\
    \ \"range\": { \"price\": { \"gte\": 50, \"lte\": 300 } } },\n        { \"term\": { \"in_stock\": true } }\n      ],\n\
    \      \"should\": [\n        { \"term\": { \"brand\": { \"value\": \"Sony\", \"boost\": 2.0 } } }\n      ],\n      \"\
    must_not\": [\n        { \"term\": { \"condition\": \"refurbished\" } }\n      ]\n    }\n  }\n}\n# Filter clauses are\
    \ cached and skip scoring = fast\n# Must clause computes BM25 relevance = ranked results\n# Should clause boosts Sony\
    \ products without requiring it\n"
  example_bad: "# All conditions in must — needless scoring for exact matches\nGET /products/_search\n{\n  \"query\": {\n\
    \    \"bool\": {\n      \"must\": [\n        { \"match\": { \"name\": \"wireless noise cancelling\" } },\n        { \"\
    term\": { \"category\": \"headphones\" } },\n        { \"range\": { \"price\": { \"gte\": 50, \"lte\": 300 } } },\n  \
    \      { \"term\": { \"in_stock\": true } }\n      ]\n    }\n  }\n}\n# category, price, in_stock are computed with BM25\
    \ scoring — pointless\n# These exact conditions are NOT cached — recomputed every query\n# 2-10x slower than using filter\
    \ context\n"
  when_applies: Projects using Elasticsearch search clusters
  when_not_applies: low-traffic internal tools, admin dashboards, or batch jobs where latency is irrelevant. projects not
    using Elasticsearch
  sources: ["https://www.elastic.co/guide/en/elasticsearch/reference/current/query-filter-context.html"]
- id: CR-ES-SRCH-002
  text: Use aggregations for analytics instead of fetching all documents and computing in application code — Elasticsearch
    distributes computation across shards.
  why: Fetching 1M documents to compute a histogram in application code transfers gigabytes of data over the network and processes
    everything in a single thread. Elasticsearch aggregations compute the result distributed across all shards in parallel,
    returning only the final aggregated result (kilobytes, not gigabytes). For 100M documents across 10 shards, each shard
    computes its local aggregation on 10M documents in parallel, then the coordinating node merges 10 partial results. Network
    transfer is reduced by 99.99%, and computation is parallelized 10x.
  how_to_do_right: 'Use bucket aggregations (terms, date_histogram, range) for grouping. Use metric aggregations (sum, avg,
    min, max, percentiles) for statistics. Use pipeline aggregations (derivative, moving_avg, bucket_sort) for computed metrics.
    Set size: 0 when you only need aggregation results (no documents). Use composite aggregation for paginating through large
    aggregation results.'
  severity: high
  technologies:
    platform: [elasticsearch]
  domains:
    domain: [architecture, performance]
    concern: [search, data, analytics]
  example_good: "# Sales analytics — computed entirely in Elasticsearch\nGET /orders/_search\n{\n  \"size\": 0,\n  \"query\"\
    : { \"range\": { \"created_at\": { \"gte\": \"2026-01-01\" } } },\n  \"aggs\": {\n    \"sales_by_category\": {\n     \
    \ \"terms\": { \"field\": \"category\", \"size\": 20 },\n      \"aggs\": {\n        \"total_revenue\": { \"sum\": { \"\
    field\": \"total\" } },\n        \"avg_order_value\": { \"avg\": { \"field\": \"total\" } },\n        \"monthly_trend\"\
    : {\n          \"date_histogram\": {\n            \"field\": \"created_at\",\n            \"calendar_interval\": \"month\"\
    \n          },\n          \"aggs\": {\n            \"revenue\": { \"sum\": { \"field\": \"total\" } }\n          }\n \
    \       }\n      }\n    },\n    \"price_distribution\": {\n      \"histogram\": { \"field\": \"total\", \"interval\":\
    \ 50 }\n    },\n    \"percentile_values\": {\n      \"percentiles\": { \"field\": \"total\", \"percents\": [50, 90, 95,\
    \ 99] }\n    }\n  }\n}\n# Returns: category breakdown, monthly trends, price distribution, percentiles\n# Network: ~2KB\
    \ response instead of fetching millions of documents\n"
  example_bad: '# Fetching all documents for client-side analytics

    GET /orders/_search

    { "size": 10000, "query": { "match_all": {} } }

    # Then in application code:

    # categories = defaultdict(list)

    # for doc in results: categories[doc.category].append(doc.total)

    # ...compute stats manually


    # Problems:

    # - size 10000 max per request (need scroll for more)

    # - 10M documents × 500 bytes = 5GB transferred

    # - Single-threaded computation vs distributed

    # - 5 minutes vs 200ms

    '
  when_applies: Projects using Elasticsearch search clusters
  when_not_applies: projects not using Elasticsearch
  sources: ["https://www.elastic.co/guide/en/elasticsearch/reference/current/search-aggregations.html"]
- id: CR-ES-PERF-001
  text: Size shards between 10GB and 50GB — too many small shards waste cluster overhead, too few large shards cause slow
    searches and unbalanced allocation.
  why: 'Each shard is a Lucene index with its own memory overhead: file descriptors, segment metadata, thread pools, and heap.
    A cluster with 10,000 tiny shards (100MB each) uses 10,000x the overhead of one shard, consuming most of the heap for
    bookkeeping rather than caching. Conversely, a single 500GB shard makes searches slow (one thread processes the entire
    shard), replication slow (500GB to copy), and makes the cluster inflexible (cannot split data across nodes). The sweet
    spot is 10-50GB per shard with ~20 shards per GB of heap on data nodes.'
  how_to_do_right: 'Calculate shard count: total_data_size / target_shard_size. For a 300GB dataset with 30GB target shards:
    10 primary shards. Set number_of_shards at index creation (cannot change later without reindex). For time-based indices,
    calculate daily data volume and choose rollover conditions accordingly. Use the _cat/shards API to monitor shard sizes.
    If shards are too small, use ILM rollover or reduce shard count. If too large, increase shard count in the next index.'
  severity: high
  technologies:
    platform: [elasticsearch]
  domains:
    domain: [architecture, operations, performance]
    concern: [search]
  example_good: "# Calculate optimal shard count for a dataset\n# Total data: 450GB, Target shard size: 30GB\n# Primary shards:\
    \ 450 / 30 = 15\n\nPUT /large-dataset\n{\n  \"settings\": {\n    \"number_of_shards\": 15,\n    \"number_of_replicas\"\
    : 1\n  }\n}\n\n# For time-based indices with ILM rollover\nPUT /_ilm/policy/logs-policy\n{\n  \"policy\": {\n    \"phases\"\
    : {\n      \"hot\": {\n        \"actions\": {\n          \"rollover\": {\n            \"max_primary_shard_size\": \"30gb\"\
    ,\n            \"max_age\": \"7d\"\n          }\n        }\n      },\n      \"warm\": {\n        \"min_age\": \"30d\"\
    ,\n        \"actions\": {\n          \"shrink\": { \"number_of_shards\": 1 },\n          \"forcemerge\": { \"max_num_segments\"\
    : 1 }\n        }\n      },\n      \"delete\": { \"min_age\": \"90d\", \"actions\": { \"delete\": {} } }\n    }\n  }\n\
    }\n# Shards rollover at 30GB or 7 days (whichever first)\n"
  example_bad: '# Too many small shards — excessive overhead

    PUT /logs-2026-02-15

    { "settings": { "number_of_shards": 50 } }

    # Daily data: 2GB / 50 shards = 40MB per shard

    # After 90 days: 4500 shards at 40MB each

    # Cluster heap spent on shard bookkeeping, not caching


    # Too few large shards — unbalanced and slow

    PUT /products

    { "settings": { "number_of_shards": 1 } }

    # 500GB in one shard — searches use one thread

    # Replication copies 500GB in one shot

    # Cannot distribute across nodes

    '
  when_applies: Projects using Elasticsearch search clusters
  when_not_applies: projects not using Elasticsearch
  sources: ["https://www.elastic.co/guide/en/elasticsearch/reference/current/size-your-shards.html"]
- id: CR-ES-PERF-002
  text: Use index lifecycle management (ILM) to automate hot-warm-cold-frozen data tiers — store recent data on fast storage
    and age it to cheaper storage automatically.
  why: 'Search indices accumulate data continuously. Without lifecycle management, 90-day-old log data sits on expensive SSD
    alongside today''s data, consuming premium storage for data that is rarely queried. ILM automates the progression: hot
    tier (SSDs, recent data, full replicas) → warm tier (HDDs, read-only, fewer replicas) → cold tier (frozen/searchable snapshots,
    minimal resources) → delete. A typical 1TB/day logging cluster saves 60-80% on storage costs by tiering. The transition
    is seamless — queries transparently access data across tiers.'
  how_to_do_right: Define ILM policies with rollover conditions (size or age), and transitions between tiers based on data
    age. Assign node roles (hot, warm, cold) using node.roles configuration. Use searchable snapshots for the frozen tier
    (data on S3/GCS, cached on local disk). Monitor with _ilm/explain to verify policies are advancing indices through tiers.
  severity: high
  technologies:
    platform: [elasticsearch]
  domains:
    domain: [architecture, operations]
    concern: [search, cost-optimization]
  example_good: "# ILM policy: hot → warm → cold → delete\nPUT /_ilm/policy/observability-policy\n{\n  \"policy\": {\n   \
    \ \"phases\": {\n      \"hot\": {\n        \"actions\": {\n          \"rollover\": {\n            \"max_primary_shard_size\"\
    : \"30gb\",\n            \"max_age\": \"1d\"\n          },\n          \"set_priority\": { \"priority\": 100 }\n      \
    \  }\n      },\n      \"warm\": {\n        \"min_age\": \"7d\",\n        \"actions\": {\n          \"shrink\": { \"number_of_shards\"\
    : 1 },\n          \"forcemerge\": { \"max_num_segments\": 1 },\n          \"allocate\": { \"number_of_replicas\": 0 },\n\
    \          \"set_priority\": { \"priority\": 50 }\n        }\n      },\n      \"cold\": {\n        \"min_age\": \"30d\"\
    ,\n        \"actions\": {\n          \"searchable_snapshot\": { \"snapshot_repository\": \"s3-repo\" },\n          \"\
    set_priority\": { \"priority\": 0 }\n        }\n      },\n      \"delete\": {\n        \"min_age\": \"90d\",\n       \
    \ \"actions\": { \"delete\": {} }\n      }\n    }\n  }\n}\n\n# Node configuration (elasticsearch.yml)\n# Hot nodes: node.roles:\
    \ [data_hot, ingest]\n# Warm nodes: node.roles: [data_warm]\n# Cold nodes: node.roles: [data_cold, data_frozen]\n"
  example_bad: '# No ILM — all data on hot tier forever

    # 1TB/day × 90 days = 90TB on expensive SSD

    # Cost: $18,000/month for SSD storage

    # With ILM: $4,000/month (hot: 7TB SSD, warm: 23TB HDD, cold: 60TB S3)


    # Manual deletion instead of ILM

    # Cron job: DELETE /logs-$(date -d ''-90 days'' +%Y-%m-%d)

    # Fragile: cron fails → storage fills → cluster crashes

    # No warm tier — queries on old data hit expensive hot nodes

    '
  when_applies: Projects using Elasticsearch search clusters
  when_not_applies: projects not using Elasticsearch
  sources: ["https://www.elastic.co/guide/en/elasticsearch/reference/current/tune-for-search-speed.html"]
- id: CR-ES-OPS-001
  text: Use index aliases for zero-downtime reindexing and managing write/read targets — aliases abstract the physical index
    name from application code.
  why: Changing an index's mapping or settings requires creating a new index and reindexing data. Without aliases, this means
    changing your application code to point to the new index name — requiring a deployment and causing downtime. Aliases provide
    a stable name that can be atomically swapped between indices. Your application always uses 'products' (alias) while you
    reindex from 'products-v1' to 'products-v2' in the background. A single atomic alias swap cuts over all traffic with zero
    downtime. Aliases also enable filtering (filtered aliases) and write/read splitting.
  how_to_do_right: 'Always point your application at aliases, never at physical index names. Use the _aliases API for atomic
    swaps. For reindexing: create new index, _reindex from old to new, atomic alias swap (remove old, add new in one API call).
    For write splitting: use is_write_index on time-based indices. For filtered access: create aliases with filter for multi-tenant
    data.'
  severity: high
  technologies:
    platform: [elasticsearch]
  domains:
    domain: [architecture, operations]
    concern: [search]
  example_good: "# Initial setup — application uses alias \"products\"\nPUT /products-v1\n{ \"mappings\": { \"properties\"\
    : { \"name\": { \"type\": \"text\" } } } }\nPOST /_aliases\n{ \"actions\": [{ \"add\": { \"index\": \"products-v1\", \"\
    alias\": \"products\" } }] }\n\n# Application code always references \"products\" alias\n# GET /products/_search { \"\
    query\": { \"match\": { \"name\": \"widget\" } } }\n\n# Zero-downtime reindex when mapping changes\nPUT /products-v2\n\
    { \"mappings\": { \"properties\": { \"name\": { \"type\": \"text\", \"analyzer\": \"english\" } } } }\n\nPOST /_reindex\n\
    { \"source\": { \"index\": \"products-v1\" }, \"dest\": { \"index\": \"products-v2\" } }\n\n# Atomic swap — zero downtime,\
    \ no application changes\nPOST /_aliases\n{\n  \"actions\": [\n    { \"remove\": { \"index\": \"products-v1\", \"alias\"\
    : \"products\" } },\n    { \"add\": { \"index\": \"products-v2\", \"alias\": \"products\" } }\n  ]\n}\n# Application instantly\
    \ uses products-v2 without code change\n"
  example_bad: '# Application hardcodes physical index name

    GET /products-v1/_search { ... }

    # Reindex to products-v2 requires:

    # 1. Deploy application code change (products-v1 → products-v2)

    # 2. During deployment: some instances query v1, some v2 → inconsistent results

    # 3. If reindex fails midway: rollback requires another deployment


    # Non-atomic swap — brief period with no valid index

    POST /_aliases

    { "actions": [{ "remove": { "index": "products-v1", "alias": "products" } }] }

    # 50ms gap — queries to "products" fail with index_not_found

    POST /_aliases

    { "actions": [{ "add": { "index": "products-v2", "alias": "products" } }] }

    '
  when_applies: Projects using Elasticsearch search clusters
  when_not_applies: projects not using Elasticsearch
  sources: ["https://www.elastic.co/guide/en/elasticsearch/reference/current/data-tiers.html"]
- id: CR-ES-OPS-002
  text: Separate master, data, and ingest node roles in production clusters — running all roles on every node creates resource
    contention and cluster instability.
  why: The master node manages cluster state (shard allocation, index creation, mapping updates). Data nodes store shards
    and execute searches/indexing. Ingest nodes run pipelines (parsing, enrichment). When all roles run on the same node,
    a heavy search query can starve the master of CPU, causing it to miss heartbeats and trigger a master election. A master
    election freezes ALL cluster operations for 10-30 seconds. In a 3-node cluster where every node is master-eligible and
    handles data, this happens regularly under load. Dedicated master nodes (3 small instances) provide stable cluster management
    regardless of data node load.
  how_to_do_right: 'Deploy 3 dedicated master nodes (2-4 CPU, 4-8GB RAM — they do not need much). Deploy data nodes sized
    for your workload (hot: SSD + high RAM, warm: HDD + moderate RAM). Deploy 1-2 ingest nodes if using ingest pipelines.
    Set node.roles explicitly in elasticsearch.yml. For small clusters (<5 nodes), combine data and ingest roles but always
    have 3 dedicated masters.'
  severity: high
  technologies:
    platform: [elasticsearch]
  domains:
    domain: [architecture, operations, reliability]
    concern: [search]
  example_good: '# elasticsearch.yml — Master node (3 dedicated instances)

    node.roles: [master]

    # Small instance: 2 vCPU, 4GB RAM, 50GB SSD

    # Handles cluster state, shard allocation, no data queries


    # elasticsearch.yml — Hot data node

    node.roles: [data_hot, ingest]

    # Large instance: 16 vCPU, 64GB RAM, 2TB NVMe SSD

    # Handles indexing + search for recent data


    # elasticsearch.yml — Warm data node

    node.roles: [data_warm]

    # Medium instance: 8 vCPU, 32GB RAM, 8TB HDD

    # Read-only older data, cheaper storage


    # Cluster sizing for 2TB/day ingestion:

    # 3 × master (small)

    # 6 × hot data (large, NVMe)

    # 4 × warm data (medium, HDD)

    # 2 × ingest (medium, for heavy pipeline processing)

    '
  example_bad: '# All roles on every node

    node.roles: [master, data, ingest]

    # Heavy search query consumes all CPU on node-1

    # node-1 is also master → misses heartbeat → master election

    # 30 seconds of frozen cluster operations

    # Indexing pipeline backs up → ingestion lag → data loss


    # Only 2 master-eligible nodes

    node.roles: [master, data]  # on both node-1 and node-2

    # If one node goes down: no majority (1 of 2) → no master election

    # Cluster goes RED — no writes, no shard allocation

    '
  when_applies: Projects using Elasticsearch search clusters
  when_not_applies: projects not using Elasticsearch
  sources: ["https://www.elastic.co/guide/en/elasticsearch/reference/current/snapshots-take-snapshot.html"]
- id: CR-ES-SRCH-003
  text: Use search_after for deep pagination instead of from/size — from/size requires the coordinating node to collect and
    sort from + size results from every shard.
  why: 'The from/size pagination mechanism requires each shard to return from + size documents to the coordinating node, which
    merges and sorts all of them. For from=10000, size=10 with 5 shards: each shard returns 10,010 documents (50,050 total),
    the coordinator sorts 50,050 documents, and returns 10. At from=100,000, each shard returns 100,010 documents — memory
    blows up and performance degrades quadratically. Elasticsearch enforces a default limit of from + size <= 10,000 (index.max_result_window).
    search_after uses a cursor-based approach: it passes the sort values of the last document and each shard only returns
    documents after that point — constant memory regardless of depth.'
  how_to_do_right: Use from/size for the first 10 pages (up to ~1000 results). Switch to search_after for deeper pagination.
    Use a unique tiebreaker in the sort (e.g., _id or a timestamp + id combo) to ensure consistent ordering. Store the sort
    values of the last document from each response and pass them as search_after in the next request. For real-time data,
    use Point In Time (PIT) with search_after to get a consistent snapshot.
  severity: high
  technologies:
    platform: [elasticsearch]
  domains:
    domain: [architecture, performance]
    concern: [search]
  example_good: "# First page — normal from/size\nGET /products/_search\n{\n  \"size\": 20,\n  \"sort\": [\n    { \"created_at\"\
    : \"desc\" },\n    { \"_id\": \"asc\" }\n  ],\n  \"query\": { \"match\": { \"name\": \"widget\" } }\n}\n# Response includes\
    \ sort values for last hit:\n# \"sort\": [1708000000000, \"abc123\"]\n\n# Next page — search_after with last hit's sort\
    \ values\nGET /products/_search\n{\n  \"size\": 20,\n  \"sort\": [\n    { \"created_at\": \"desc\" },\n    { \"_id\":\
    \ \"asc\" }\n  ],\n  \"query\": { \"match\": { \"name\": \"widget\" } },\n  \"search_after\": [1708000000000, \"abc123\"\
    ]\n}\n# Each shard only returns documents AFTER this point\n# Constant memory regardless of page depth\n\n# Point In Time\
    \ for consistent pagination\nPOST /products/_pit?keep_alive=5m\n# Returns: { \"id\": \"pit_id_...\" }\nGET /_search\n\
    {\n  \"size\": 20,\n  \"pit\": { \"id\": \"pit_id_...\", \"keep_alive\": \"5m\" },\n  \"sort\": [{ \"created_at\": \"\
    desc\" }, { \"_id\": \"asc\" }],\n  \"search_after\": [1708000000000, \"abc123\"]\n}\n"
  example_bad: '# Deep pagination with from/size — quadratic memory

    GET /products/_search

    { "from": 10000, "size": 20 }

    # Each of 5 shards returns 10,020 documents = 50,100 total

    # Coordinator sorts 50,100 documents to return 20


    GET /products/_search

    { "from": 100000, "size": 20 }

    # ERROR: "Result window is too large, from + size must be less than or equal to 10000"


    # Increasing max_result_window — treats the symptom, not the cause

    PUT /products/_settings

    { "index.max_result_window": 1000000 }

    # Now from=999980 works but requires 5M documents in memory

    # OOM crash on coordinating node

    '
  when_applies: Projects using Elasticsearch search clusters
  when_not_applies: low-traffic internal tools, admin dashboards, or batch jobs where latency is irrelevant. projects not using Elasticsearch
  sources: ["https://www.elastic.co/guide/en/elasticsearch/reference/current/search-analyzer.html"]
- id: CR-ES-IDX-004
  text: Use the reindex API for zero-downtime schema migrations — combine with aliases to switch traffic atomically after
    reindexing completes.
  why: 'Elasticsearch mappings are immutable: you cannot change a field''s type, add analyzers to existing fields, or change
    tokenization. The only way to change a mapping is to create a new index with the correct mapping and copy all documents
    from the old index. The _reindex API handles this server-side, supporting transforms (script to modify documents), throttling
    (slices/requests_per_second to limit cluster impact), and cross-cluster reindexing. Without reindex, changing a mapping
    requires dumping all data to an external system and re-importing — hours of downtime and data transfer.'
  how_to_do_right: Create the new index with the correct mapping. Use _reindex with wait_for_completion=false for large indices
    (returns a task ID). Monitor progress with _tasks API. Use slices=auto for parallel reindexing. Apply alias swap atomically
    after reindex completes. For ongoing writes during reindex, use a write alias pointing to the old index, then swap both
    read and write aliases atomically.
  severity: high
  technologies:
    platform: [elasticsearch]
  domains:
    domain: [architecture, operations]
    concern: [search]
  example_good: "# Step 1: Create new index with updated mapping\nPUT /products-v2\n{\n  \"mappings\": {\n    \"properties\"\
    : {\n      \"name\": { \"type\": \"text\", \"analyzer\": \"english\" },\n      \"price\": { \"type\": \"scaled_float\"\
    , \"scaling_factor\": 100 }\n    }\n  }\n}\n\n# Step 2: Reindex asynchronously with parallel slicing\nPOST /_reindex?wait_for_completion=false\n\
    {\n  \"source\": { \"index\": \"products-v1\" },\n  \"dest\": { \"index\": \"products-v2\" },\n  \"script\": {\n    \"\
    source\": \"ctx._source.price = ctx._source.remove('price_cents') / 100.0\"\n  }\n}\n# Returns: { \"task\": \"node-1:12345\"\
    \ }\n\n# Step 3: Monitor progress\nGET /_tasks/node-1:12345\n# Shows: created, updated, deleted, batches, version_conflicts\n\
    \n# Step 4: Atomic alias swap (zero downtime)\nPOST /_aliases\n{\n  \"actions\": [\n    { \"remove\": { \"index\": \"\
    products-v1\", \"alias\": \"products\" } },\n    { \"add\": { \"index\": \"products-v2\", \"alias\": \"products\" } }\n\
    \  ]\n}\n"
  example_bad: '# Trying to change mapping in-place

    PUT /products/_mapping

    { "properties": { "price": { "type": "float" } } }

    # ERROR: mapper [price] cannot be changed from type [keyword] to [float]


    # Deleting and recreating index — downtime + data loss

    DELETE /products

    PUT /products

    { "mappings": { "properties": { "price": { "type": "float" } } } }

    # All data gone! Must re-import from source of truth

    '
  when_applies: Projects using Elasticsearch search clusters
  when_not_applies: projects not using Elasticsearch
  sources: ["https://www.elastic.co/guide/en/elasticsearch/reference/current/indices-aliases.html"]
- id: CR-ES-SRCH-004
  text: Use highlighting to show matching context in search results — it returns the matching text fragments with the search
    terms emphasized, improving user experience significantly.
  why: 'Returning full documents without highlighting forces users to scan the entire text to find why a document matched.
    Highlighting extracts the relevant fragments containing the matched terms and wraps them in tags (default: <em>). This
    is the difference between a useful search experience (like Google) and a frustrating one (dump of full documents). Elasticsearch
    supports three highlighters: unified (default, recommended), plain (fast, basic), and fvh (fast vector highlighter, requires
    term_vector stored). Highlighting uses the same analysis chain as the query, ensuring consistent tokenization.'
  how_to_do_right: 'Add a highlight section to your search request specifying which fields to highlight. Use fragment_size
    to control snippet length (default: 100 chars). Use number_of_fragments to control how many snippets per field (default:
    5). Use pre_tags/post_tags for custom markup. For large text fields, use type: fvh with term_vector: with_positions_offsets
    for faster highlighting.'
  severity: medium
  technologies:
    platform: [elasticsearch]
  domains:
    domain: [architecture]
    concern: [search, user-experience]
  example_good: "# Search with highlighting\nGET /articles/_search\n{\n  \"query\": {\n    \"multi_match\": {\n      \"query\"\
    : \"distributed database consensus\",\n      \"fields\": [\"title^3\", \"body\"]\n    }\n  },\n  \"highlight\": {\n  \
    \  \"fields\": {\n      \"title\": { \"number_of_fragments\": 0 },\n      \"body\": {\n        \"fragment_size\": 150,\n\
    \        \"number_of_fragments\": 3,\n        \"pre_tags\": [\"<mark>\"],\n        \"post_tags\": [\"</mark>\"]\n    \
    \  }\n    }\n  },\n  \"_source\": [\"title\", \"author\", \"date\"]\n}\n\n# Response includes highlighted fragments:\n\
    # \"highlight\": {\n#   \"title\": [\"Introduction to <mark>Distributed</mark> <mark>Database</mark> Systems\"],\n#  \
    \ \"body\": [\n#     \"...achieving <mark>consensus</mark> in a <mark>distributed</mark> system requires...\",\n#    \
    \ \"...the <mark>database</mark> must handle partition tolerance while...\"\n#   ]\n# }\n"
  example_bad: '# No highlighting — user must scan full documents

    GET /articles/_search

    { "query": { "match": { "body": "distributed consensus" } } }

    # Returns full 5KB body text per result

    # User has no idea WHERE in the text the match occurred

    # Must Ctrl+F in each result — defeats the purpose of search

    '
  when_applies: Projects using Elasticsearch search clusters
  when_not_applies: projects not using Elasticsearch
  sources: ["https://www.elastic.co/guide/en/elasticsearch/reference/current/highlighting.html"]
- id: CR-ES-PERF-003
  text: Use circuit breakers to prevent out-of-memory crashes — Elasticsearch's circuit breakers reject requests before they
    consume too much heap, preventing cascading node failures.
  why: A single expensive aggregation or bulk request can consume all available heap memory, triggering a JVM OutOfMemoryError
    that crashes the node. In a cluster, one crashing node shifts its shards to remaining nodes, increasing their load and
    potentially triggering more OOM crashes — a cascading failure. Circuit breakers monitor memory usage and reject requests
    that would exceed thresholds BEFORE allocating the memory. The default circuit breakers protect fielddata (95% of heap),
    request (60%), total (95%), and in-flight (100%). Properly configured, they convert potential crashes into clean rejections
    with error messages the application can handle.
  how_to_do_right: Keep the default circuit breaker settings unless you have specific reasons to change them. Set JVM heap
    to 50% of RAM (max 32GB for compressed oops). Monitor circuit breaker trips with _nodes/stats/breaker. If request breaker
    trips frequently, optimize your queries (reduce aggregation cardinality, use composite aggregation). If fielddata breaker
    trips, avoid using text fields for aggregations — use keyword subfield.
  severity: high
  technologies:
    platform: [elasticsearch]
  domains:
    domain: [architecture, reliability, operations]
    concern: [search]
  example_good: "# JVM heap configuration (50% of RAM, max 32GB)\n# jvm.options:\n# -Xms16g\n# -Xmx16g\n\n# Monitor circuit\
    \ breaker status\nGET /_nodes/stats/breaker\n# Shows: limit_size_in_bytes, estimated_size_in_bytes, tripped (count)\n\n\
    # Handle circuit breaker rejection in application code\nfrom elasticsearch import Elasticsearch, ConnectionError\n\nes\
    \ = Elasticsearch()\n\ntry:\n    result = es.search(index=\"large-index\", body=complex_query)\nexcept ConnectionError\
    \ as e:\n    if \"circuit_breaking_exception\" in str(e):\n        # Reduce query scope and retry\n        result = es.search(index=\"\
    large-index\", body=simpler_query)\n    else:\n        raise\n\n# Fielddata circuit breaker — avoid text aggregations\n\
    # Good: aggregate on keyword field\nGET /logs/_search\n{ \"aggs\": { \"by_host\": { \"terms\": { \"field\": \"hostname.keyword\"\
    \ } } } }\n"
  example_bad: '# Heap too large — no compressed ordinary object pointers

    # -Xms48g -Xmx48g

    # Above 32GB: JVM disables compressed oops

    # Effective memory: LESS than 32GB heap due to 64-bit pointers


    # Aggregating on text field — triggers fielddata loading

    GET /logs/_search

    { "aggs": { "by_host": { "terms": { "field": "hostname" } } } }

    # hostname is text field → loads ALL unique values into heap

    # 10M unique hostnames × 50 bytes = 500MB fielddata

    # Circuit breaker trips → query rejected


    # Disabling circuit breakers — guaranteed OOM

    PUT /_cluster/settings

    { "transient": { "indices.breaker.total.limit": "100%" } }

    # One expensive query → OOM → node crash → cascading failure

    '
  when_applies: Projects using Elasticsearch search clusters
  when_not_applies: projects not using Elasticsearch
  sources: ["https://www.elastic.co/guide/en/elasticsearch/reference/current/tune-for-indexing-speed.html"]
- id: CR-ES-OPS-003
  text: Use snapshot and restore for Elasticsearch backup — Elasticsearch has no built-in replication to external systems,
    and filesystem-level copies of data directories produce corrupt backups.
  why: 'Elasticsearch stores data across multiple files per shard (segments, translog, state files) that are constantly being
    modified by merges and flushes. Copying the data directory while Elasticsearch is running produces inconsistent files
    — a corrupt backup that cannot be restored. The snapshot API creates a consistent, point-in-time backup by leveraging
    Lucene''s immutable segment model: it records which segments exist at snapshot time and copies them to a snapshot repository
    (S3, GCS, Azure Blob, shared filesystem). Incremental snapshots only copy new segments since the last snapshot — a 1TB
    cluster with 50GB of daily changes takes minutes to snapshot incrementally.'
  how_to_do_right: Register a snapshot repository (S3 recommended for cloud, shared NFS for on-premises). Use SLM (Snapshot
    Lifecycle Management) to automate daily snapshots with retention. Test restore regularly — a backup you have never restored
    is not a backup. Use partial restore to recover specific indices without restoring the entire cluster. Monitor snapshot
    progress with _snapshot/_status.
  severity: critical
  technologies:
    platform: [elasticsearch]
  domains:
    domain: [architecture, operations, reliability]
    concern: [search]
  example_good: "# Register S3 snapshot repository\nPUT /_snapshot/s3-backups\n{\n  \"type\": \"s3\",\n  \"settings\": {\n\
    \    \"bucket\": \"es-backups\",\n    \"region\": \"us-east-1\",\n    \"compress\": true,\n    \"max_snapshot_bytes_per_sec\"\
    : \"500mb\"\n  }\n}\n\n# Create SLM policy — daily snapshots with 30-day retention\nPUT /_slm/policy/daily-snapshots\n\
    {\n  \"schedule\": \"0 30 2 * * ?\",\n  \"name\": \"<daily-snap-{now/d}>\",\n  \"repository\": \"s3-backups\",\n  \"config\"\
    : {\n    \"indices\": [\"*\"],\n    \"ignore_unavailable\": true,\n    \"include_global_state\": false\n  },\n  \"retention\"\
    : {\n    \"expire_after\": \"30d\",\n    \"min_count\": 7,\n    \"max_count\": 30\n  }\n}\n\n# Restore specific index\
    \ from snapshot\nPOST /_snapshot/s3-backups/daily-snap-2026.02.15/_restore\n{\n  \"indices\": \"products\",\n  \"rename_pattern\"\
    : \"(.+)\",\n  \"rename_replacement\": \"restored_$1\"\n}\n"
  example_bad: '# Filesystem copy while Elasticsearch is running — CORRUPT backup

    cp -r /var/lib/elasticsearch/data /backup/

    # Segments being merged during copy → inconsistent files

    # Translog partially written → data loss on restore

    # Shard state files from different points in time → corruption


    # No backup at all — relying on replicas

    # Replicas protect against node failure, NOT against:

    # - Accidental index deletion (DELETE /products — replicated instantly)

    # - Mapping corruption (bad mapping propagated to all replicas)

    # - Cluster-wide issues (version upgrade failure)

    '
  when_applies: Any project using Elasticsearch search clusters
  when_not_applies: projects not using Elasticsearch
  sources: ["https://www.elastic.co/guide/en/elasticsearch/reference/current/index-lifecycle-management.html"]
- id: CR-ES-FC-001
  text: Use fuzzy matching and deduplication queries to detect duplicate claims with minor textual variations — typos, rephrasing,
    and different word order should match the same underlying claim.
  why: Fact-checking systems receive the same claim in many textual variations. "The earth is warming by 1.5C" and "Earth warming
    by 1.5 degrees Celsius" and "the earth is warmed by 1.5°C" are the same claim but differ textually. Without deduplication,
    each variation is treated as a new claim — wasting verification effort, creating inconsistent verdicts for the same claim,
    and confusing users who see conflicting results. Elasticsearch's fuzzy matching (fuzziness parameter), n-gram analyzers,
    and more_like_this queries can detect these near-duplicates at query time. Combined with a deduplication pipeline at ingestion,
    this ensures each unique claim is verified once.
  how_to_do_right: '1. Use a custom analyzer with edge n-grams (min 3, max 15) for partial matching at index time.

    2. At query time, use multi_match with fuzziness=AUTO for typo tolerance (edit distance 1-2).

    3. Use more_like_this query to find semantically similar existing claims before creating a new one.

    4. Normalize claim text before comparison: lowercase, strip punctuation, expand abbreviations.

    5. Set a similarity threshold (e.g., score > 0.85) to flag potential duplicates for human review.

    6. Store a canonical_claim_id on duplicate entries pointing to the original verified claim.

    '
  severity: high
  technologies:
    platform: [elasticsearch]
    lang: [python]
  domains:
    domain: [architecture]
    concern: [search, fact_checking, deduplication]
  example_good: "# Custom analyzer for fuzzy claim matching\nPUT /claims\n{\n  \"settings\": {\n    \"analysis\": {\n      \"\
    filter\": {\n        \"claim_ngram\": { \"type\": \"edge_ngram\", \"min_gram\": 3, \"max_gram\": 15 }\n      },\n      \"\
    analyzer\": {\n        \"claim_analyzer\": {\n          \"type\": \"custom\",\n          \"tokenizer\": \"standard\",\n  \
    \        \"filter\": [\"lowercase\", \"asciifolding\", \"claim_ngram\"]\n        }\n      }\n    }\n  },\n  \"mappings\":\
    \ {\n    \"properties\": {\n      \"text\": {\n        \"type\": \"text\",\n        \"analyzer\": \"claim_analyzer\",\n  \
    \      \"fields\": {\n          \"exact\": { \"type\": \"keyword\" },\n          \"standard\": { \"type\": \"text\", \"analyzer\"\
    : \"standard\" }\n        }\n      },\n      \"canonical_claim_id\": { \"type\": \"keyword\" },\n      \"verdict\": { \"\
    type\": \"keyword\" }\n    }\n  }\n}\n\n# Deduplication query: find existing claims similar to a new submission\nGET /claims/_search\n\
    {\n  \"query\": {\n    \"more_like_this\": {\n      \"fields\": [\"text.standard\"],\n      \"like\": \"The earth is warming\
    \ by 1.5 degrees Celsius\",\n      \"min_term_freq\": 1,\n      \"min_doc_freq\": 1,\n      \"minimum_should_match\": \"\
    30%\"\n    }\n  },\n  \"min_score\": 5.0\n}\n"
  example_bad: "# No deduplication — every variation is a new claim\nPOST /claims/_doc\n{ \"text\": \"The earth is warming by\
    \ 1.5C\" }  # Verdict: supported\nPOST /claims/_doc\n{ \"text\": \"Earth warming by 1.5 degrees\" }  # Verified again from\
    \ scratch\nPOST /claims/_doc\n{ \"text\": \"the earth is warmed by 1.5°C\" }  # Verified a third time\n# 3x verification\
    \ effort for the same claim\n# If verdicts differ: user confusion\n"
  when_applies: Fact-checking systems, claim verification platforms, content deduplication
  when_not_applies: projects not using Elasticsearch, non-text-matching use cases
  sources: ["https://www.elastic.co/guide/en/elasticsearch/reference/current/query-dsl-mlt-query.html"]
  sources: ["https://www.elastic.co/guide/en/elasticsearch/reference/current/explicit-mapping.html"]
- id: CR-ES-FC-002
  text: Use dense vector search with kNN for semantic claim matching — embedding-based similarity captures meaning beyond lexical
    overlap, matching claims with different words but identical meaning.
  why: Fuzzy text matching catches typos and minor variations but misses semantic equivalence. "Global temperatures increased
    by 1.5 degrees" and "Worldwide average heat rose by 1.5C since the pre-industrial era" express the same claim with completely
    different vocabulary. Elasticsearch 8.0+ supports dense_vector fields with kNN (k-nearest neighbors) search. By embedding
    claims using a sentence transformer model and indexing the vectors, you can find semantically similar claims regardless
    of vocabulary. This is essential for cross-lingual matching (same claim in English and Portuguese) and for connecting related
    claims that are not exact duplicates but share the same evidence base.
  how_to_do_right: '1. Use a sentence embedding model (e5-large, BGE, or multilingual-e5) to embed claim text.

    2. Index embeddings as dense_vector with HNSW similarity search.

    3. Combine vector search (semantic) with text search (lexical) using a hybrid query for best recall.

    4. Use cosine similarity with a threshold (e.g., > 0.85) to flag potential matches.

    5. Cache embeddings to avoid re-computing for frequently checked claims.

    6. Re-index periodically as embedding models improve.

    '
  severity: high
  technologies:
    platform: [elasticsearch]
    lang: [python]
  domains:
    domain: [architecture]
    concern: [search, fact_checking, embeddings, semantic_search]
  example_good: "# Index mapping with dense vector for semantic search\nPUT /claims\n{\n  \"mappings\": {\n    \"properties\"\
    : {\n      \"text\": { \"type\": \"text\", \"analyzer\": \"english\" },\n      \"text_embedding\": {\n        \"type\":\
    \ \"dense_vector\",\n        \"dims\": 1024,\n        \"index\": true,\n        \"similarity\": \"cosine\"\n      },\n  \
    \    \"verdict\": { \"type\": \"keyword\" },\n      \"language\": { \"type\": \"keyword\" }\n    }\n  }\n}\n\n# Hybrid query:\
    \ semantic + lexical for best recall\nGET /claims/_search\n{\n  \"knn\": {\n    \"field\": \"text_embedding\",\n    \"query_vector\"\
    : [0.12, -0.34, ...],\n    \"k\": 10,\n    \"num_candidates\": 100\n  },\n  \"query\": {\n    \"match\": {\n      \"text\"\
    : \"global temperatures increased by 1.5 degrees\"\n    }\n  },\n  \"rank\": {\n    \"rrf\": {}  # Reciprocal Rank Fusion\
    \ combines kNN + BM25\n  }\n}\n# Finds both lexically similar AND semantically similar claims\n# RRF merges rankings from\
    \ both approaches\n"
  example_bad: "# Text-only search — misses semantic equivalence\nGET /claims/_search\n{\n  \"query\": { \"match\": { \"text\"\
    : \"global temperatures increased\" } }\n}\n# Misses: \"worldwide average heat rose\" (different words, same meaning)\n#\
    \ Misses: \"aumento da temperatura global\" (Portuguese, same claim)\n# Only matches claims with overlapping vocabulary\n"
  when_applies: Fact-checking platforms, claim deduplication, multi-lingual search
  when_not_applies: projects not using Elasticsearch 8.0+, exact-match-only use cases
  sources: ["https://www.elastic.co/guide/en/elasticsearch/reference/current/knn-search.html"]
  sources: ["https://www.elastic.co/guide/en/elasticsearch/reference/current/index-templates.html"]
- id: CR-ES-FC-003
  text: Configure multi-lingual analyzers (PT-BR + EN) for claim search in bilingual systems — use per-language fields or language
    detection to apply the correct stemming and stop word rules.
  why: A fact-checking platform serving both Portuguese and English users must handle claims in both languages. The English analyzer
    stems "running" to "run" but would mangle Portuguese words. The Brazilian Portuguese analyzer handles "temperaturas" → "temperatur"
    correctly but breaks English text. Using the wrong analyzer for a language produces poor search results — false negatives
    (missing relevant results) and false positives (matching unrelated words). Elasticsearch supports per-field analyzers and
    multi-fields, allowing the same text to be analyzed with multiple language-specific analyzers simultaneously.
  how_to_do_right: '1. Use multi-fields with language-specific analyzers: text.en (english analyzer), text.pt (brazilian analyzer).

    2. Detect language at ingestion time and store in a language field.

    3. At query time, boost the field matching the detected query language.

    4. For cross-lingual search, query all language fields with reduced boost on non-primary language.

    5. Use ICU analysis plugin for Unicode normalization (accents, diacritics).

    6. Maintain language-specific synonym files (abbreviations, domain terms).

    '
  severity: medium
  technologies:
    platform: [elasticsearch]
    lang: [python]
  domains:
    domain: [architecture]
    concern: [search, fact_checking, multilingual, i18n]
  example_good: "# Multi-lingual mapping with per-language analyzers\nPUT /claims\n{\n  \"settings\": {\n    \"analysis\": {\n\
    \      \"filter\": {\n        \"pt_br_stop\": { \"type\": \"stop\", \"stopwords\": \"_brazilian_\" },\n        \"pt_br_stemmer\"\
    : { \"type\": \"stemmer\", \"language\": \"brazilian\" }\n      },\n      \"analyzer\": {\n        \"pt_br_analyzer\": {\n\
    \          \"type\": \"custom\",\n          \"tokenizer\": \"standard\",\n          \"filter\": [\"lowercase\", \"pt_br_stop\"\
    , \"pt_br_stemmer\"]\n        }\n      }\n    }\n  },\n  \"mappings\": {\n    \"properties\": {\n      \"text\": {\n    \
    \    \"type\": \"text\",\n        \"fields\": {\n          \"en\": { \"type\": \"text\", \"analyzer\": \"english\" },\n  \
    \        \"pt\": { \"type\": \"text\", \"analyzer\": \"pt_br_analyzer\" },\n          \"keyword\": { \"type\": \"keyword\"\
    \ }\n        }\n      },\n      \"language\": { \"type\": \"keyword\" }\n    }\n  }\n}\n\n# Query: boost the detected language\
    \ field\nGET /claims/_search\n{\n  \"query\": {\n    \"bool\": {\n      \"should\": [\n        { \"match\": { \"text.pt\"\
    : { \"query\": \"aquecimento global de 1.5 graus\", \"boost\": 2.0 } } },\n        { \"match\": { \"text.en\": { \"query\"\
    : \"aquecimento global de 1.5 graus\", \"boost\": 0.5 } } }\n      ]\n    }\n  }\n}\n"
  example_bad: "# Single analyzer for both languages\nPUT /claims\n{ \"mappings\": { \"properties\": { \"text\": { \"type\":\
    \ \"text\" } } } }\n# Default standard analyzer: no stemming for either language\n# \"temperaturas\" does not match \"temperatura\"\
    \n# \"running\" does not match \"ran\"\n# Portuguese stop words (\"de\", \"do\", \"na\") waste index space\n"
  when_applies: Multi-lingual search systems, bilingual fact-checking platforms (PT-BR + EN)
  when_not_applies: single-language systems, projects not using Elasticsearch
  sources: ["https://www.elastic.co/guide/en/elasticsearch/reference/current/analysis-lang-analyzer.html"]
  sources: ["https://www.elastic.co/guide/en/elasticsearch/reference/current/mapping-types.html"]
- id: CR-ES-FC-004
  text: Implement claim similarity scoring using Elasticsearch script_score to combine multiple signals — text similarity, temporal
    proximity, source overlap, and entity overlap for comprehensive claim matching.
  why: Simple text matching (BM25) or even vector similarity alone is insufficient for accurate claim matching. Two claims may
    share vocabulary but refer to different events (same topic, different time). Two claims may be about the same event but
    use different numbers (one accurate, one outdated). Combining multiple signals — text similarity (BM25), semantic similarity
    (vector cosine), temporal proximity (claims about the same time period), entity overlap (same people/organizations mentioned),
    and source overlap (citing the same evidence) — produces far more accurate matching than any single signal. Elasticsearch's
    script_score function allows custom scoring that combines these signals with tunable weights.
  how_to_do_right: '1. Compute multiple similarity signals: BM25 (text), cosine (embedding), temporal distance, entity jaccard.

    2. Use function_score or script_score to combine signals with weights tuned on labeled data.

    3. Apply time decay: claims about events from the same week score higher than claims months apart.

    4. Extract named entities (people, organizations, numbers) and boost matches sharing entities.

    5. Return the component scores alongside the final score for explainability.

    6. Tune weights on a labeled dataset of known duplicate/non-duplicate claim pairs.

    '
  severity: medium
  technologies:
    platform: [elasticsearch]
    lang: [python]
  domains:
    domain: [architecture]
    concern: [search, fact_checking, scoring, relevance]
  example_good: "# Combined similarity scoring with function_score\nGET /claims/_search\n{\n  \"query\": {\n    \"function_score\"\
    : {\n      \"query\": {\n        \"bool\": {\n          \"must\": [\n            { \"match\": { \"text\": { \"query\": \"\
    global temperature rose 1.5 degrees\", \"boost\": 1.0 } } }\n          ],\n          \"filter\": [\n            { \"range\"\
    : { \"published_at\": { \"gte\": \"now-90d\" } } }\n          ]\n        }\n      },\n      \"functions\": [\n        {\n\
    \          \"exp\": {\n            \"published_at\": {\n              \"origin\": \"now\",\n              \"scale\": \"30d\"\
    ,\n              \"decay\": 0.5\n            }\n          },\n          \"weight\": 2.0\n        },\n        {\n          \"\
    script_score\": {\n            \"script\": {\n              \"source\": \"cosineSimilarity(params.query_vector, 'text_embedding')\
    \ + 1.0\",\n              \"params\": { \"query_vector\": [0.12, -0.34] }\n            }\n          },\n          \"weight\"\
    : 3.0\n        }\n      ],\n      \"score_mode\": \"sum\",\n      \"boost_mode\": \"replace\"\n    }\n  },\n  \"_source\"\
    : [\"text\", \"verdict\", \"published_at\"],\n  \"explain\": true\n}\n# Returns claims ranked by combined: BM25 + temporal\
    \ proximity + semantic similarity\n# 'explain: true' shows per-signal scores for debugging\n"
  example_bad: "# Single signal scoring — misses important dimensions\nGET /claims/_search\n{ \"query\": { \"match\": { \"text\"\
    : \"global temperature rose\" } } }\n# Only BM25 text similarity\n# Matches a claim from 2015 about a different temperature\
    \ milestone\n# Misses a recent claim with different wording but same meaning\n# No temporal relevance, no entity matching,\
    \ no semantic similarity\n"
  when_applies: Fact-checking platforms, claim matching and deduplication systems
  when_not_applies: simple keyword search, projects not using Elasticsearch
  sources: ["https://www.elastic.co/guide/en/elasticsearch/reference/current/query-dsl-percolate-query.html", "https://www.elastic.co/guide/en/elasticsearch/reference/current/query-dsl-bool-query.html"]
- id: CR-ES-FUZZY-001
  text: Use fuzzy matching with controlled edit distance for claim search — set fuzziness AUTO for user-facing search and
    specify exact edit distances for programmatic matching to avoid expensive cross-term fuzzy explosions.
  why: 'Elasticsearch fuzzy matching expands a query term into all terms within the specified Levenshtein edit distance. fuzziness:2
    on a 10-character term generates hundreds of candidate terms. On a 100M-document index, an unbounded fuzzy query can consume
    GBs of memory and time out. fuzziness: AUTO adjusts edit distance by term length: 0-2 chars = 0 (exact), 3-5 chars = 1,
    6+ chars = 2. For fact-checking, fuzzy matching on claim text recovers from typos and minor spelling variations without
    full edit-distance explosion.'
  how_to_do_right: 'Use match query with fuzziness: AUTO for user search boxes. Use prefix_length: 2 to prevent fuzzy matching
    on the first 2 characters (avoids expensive cross-root expansions). For programmatic exact matching, use match_phrase
    instead of fuzzy. Combine fuzzy on title/summary with exact match on claims.id for efficient deduplication. Monitor via
    _profile API to check fuzzy expansion counts.'
  severity: medium
  technologies:
    platform: [elasticsearch]
  domains:
    domain: [architecture]
    concern: [search, fact_checking]
  example_good: "# User search box — fuzzy with AUTO and prefix_length guard\nGET /claims/_search\n{\n  \"query\": {\n    \"\
    match\": {\n      \"text\": {\n        \"query\": \"temperture rise\",\n        \"fuzziness\": \"AUTO\",\n        \"prefix_length\"\
    : 2,\n        \"max_expansions\": 50\n      }\n    }\n  }\n}\n# 'temperture' (typo) → matches 'temperature' (edit distance\
    \ 1)\n# prefix_length: 2 → 'te' must match exactly, limits expansion\n# max_expansions: 50 → caps candidate term count\n"
  example_bad: "# Unbounded fuzzy on long terms — memory explosion\nGET /claims/_search\n{\n  \"query\": {\n    \"match\": {\n\
    \      \"text\": {\n        \"query\": \"anthropogenic climate change attribution\",\n        \"fuzziness\": 2  # 10+ char\
    \ terms with fuzziness 2\n        # Generates thousands of candidate terms\n        # Can timeout on large indexes\n \
    \     }\n    }\n  }\n}\n"
  when_applies: Elasticsearch projects with user-facing search boxes or claim text matching
  when_not_applies: exact-match-only queries, non-Elasticsearch search systems
  sources: ["https://www.elastic.co/guide/en/elasticsearch/reference/current/common-options.html#fuzziness"]
- id: CR-ES-DEDUP-001
  text: Use document fingerprinting (SimHash or MinHash) stored as Elasticsearch keyword fields for near-duplicate claim detection
    — do not rely solely on BM25 similarity for deduplication.
  why: 'BM25 scores vary with document length and term frequency — two near-identical claims with slightly different wording
    may score below the similarity threshold while two dissimilar claims about the same topic may score above it. SimHash
    produces a compact 64-bit hash where the Hamming distance between two hashes correlates with document similarity. Claims
    with Hamming distance <= 3 are near-duplicates with high precision. Storing SimHash as a keyword field in Elasticsearch
    enables fast bitwise comparison. For a corpus of 1M claims, SimHash deduplication runs in O(N) vs. O(N²) for pairwise
    BM25 comparison.'
  how_to_do_right: 'Compute SimHash on claim text before indexing (simhash Python library). Store as a keyword field: simhash_64bit.
    At query time, compute the query SimHash and use a terms query to find stored hashes within Hamming distance 3 (requires
    banding: split 64-bit hash into 4 16-bit bands, store each band separately). Use Elasticsearch''s percolate query to
    pre-register deduplication rules. Combine SimHash with tf-idf threshold as defense-in-depth.'
  severity: medium
  technologies:
    platform: [elasticsearch]
    lang: [python]
    library: [simhash]
  domains:
    domain: [architecture]
    concern: [search, fact_checking, data-quality]
  example_good: "from simhash import Simhash\nimport re\n\ndef compute_claim_simhash(text: str) -> int:\n    \"\"\"Normalize\
    \ and compute SimHash for claim deduplication.\"\"\"\n    # Normalize: lowercase, remove punctuation, tokenize\n    tokens\
    \ = re.findall(r'\\w+', text.lower())\n    # Use 3-gram features for better sensitivity\n    features = [' '.join(tokens[i:i+3])\
    \ for i in range(len(tokens) - 2)]\n    return Simhash(features).value\n\n# Store in Elasticsearch\ndoc = {\n    'text':\
    \ claim.text,\n    'simhash': compute_claim_simhash(claim.text),\n    # Store 4 bands of 16 bits each for LSH banding\n\
    \    'simhash_band_0': (compute_claim_simhash(claim.text) >> 48) & 0xFFFF,\n    'simhash_band_1': (compute_claim_simhash(claim.text)\
    \ >> 32) & 0xFFFF,\n    'simhash_band_2': (compute_claim_simhash(claim.text) >> 16) & 0xFFFF,\n    'simhash_band_3': compute_claim_simhash(claim.text)\
    \ & 0xFFFF,\n}\n\n# Query: find claims with same bands (candidates for deduplication)\nGET /claims/_search\n{\n  \"query\"\
    : { \"terms\": { \"simhash_band_0\": [band_0_value] } }\n}\n"
  example_bad: "# BM25-only deduplication — unreliable thresholds\nGET /claims/_search\n{\n  \"query\": {\n    \"more_like_this\"\
    : {\n      \"fields\": [\"text\"],\n      \"like\": \"Global temperatures have risen by 1.5 degrees since 1850\",\n   \
    \   \"min_term_freq\": 1,\n      \"max_query_terms\": 12\n    }\n  }\n}\n# BM25 score threshold is document-length dependent\n\
    # Short claims score differently than long claims at same similarity\n# Cannot distinguish near-duplicate from topically-similar\n"
  when_applies: Claim deduplication systems, fact-checking platforms ingesting news feeds with duplicate detection
  when_not_applies: simple keyword search, non-deduplication use cases
  sources: ["https://www.elastic.co/guide/en/elasticsearch/reference/current/query-dsl-percolate-query.html", "https://leons.im/posts/a-python-implementation-of-simhash-algorithm/"]
- id: CR-ES-SCROLL-001
  text: Use the Point In Time (PIT) API with search_after for paginating large result sets — the Scroll API is deprecated
    for real-time pagination and holds open memory-expensive search contexts.
  why: 'The Scroll API opens a search context pinned to an index state, consuming heap memory per scroll context. With 10,000
    concurrent users paginating through results, 10,000 scroll contexts each consuming 5-50MB = 50-500GB heap usage. Scroll
    is deprecated for real-time pagination as of Elasticsearch 7.10. The Point In Time API (PIT) creates a lightweight snapshot
    ID that enables stateless pagination using search_after — the client holds the sort values, not the server. PIT + search_after
    is O(1) server memory vs O(N_contexts) for Scroll.'
  how_to_do_right: 'Open a PIT: POST /claims/_pit?keep_alive=1m. Use search with pit.id and sort + search_after for subsequent
    pages. Pass the last hit''s sort values as search_after for the next page. Close PIT when done: DELETE /_pit. Set keep_alive
    to the minimum needed (1-5 minutes for pagination). For batch export jobs (not user-facing), Scroll is still acceptable.'
  severity: high
  technologies:
    platform: [elasticsearch]
    lang: [python]
  domains:
    domain: [architecture, performance]
    concern: [search, data, pagination]
  example_good: "from elasticsearch import Elasticsearch\n\nes = Elasticsearch(['http://localhost:9200'])\n\ndef paginate_claims(query:\
    \ dict, page_size: int = 100):\n    # 1. Open a Point In Time\n    pit = es.open_point_in_time(index='claims', keep_alive='2m')\n\
    \    pit_id = pit['id']\n    search_after = None\n    try:\n        while True:\n            body = {\n                'query':\
    \ query,\n                'size': page_size,\n                'sort': [{'published_at': 'desc'}, {'_id': 'asc'}],  # Stable\
    \ sort\n                'pit': {'id': pit_id, 'keep_alive': '2m'},\n            }\n            if search_after:\n      \
    \          body['search_after'] = search_after\n\n            resp = es.search(body=body)\n            hits = resp['hits']['hits']\n\
    \            if not hits:\n                break\n            yield from [h['_source'] for h in hits]\n            search_after\
    \ = hits[-1]['sort']  # Last hit's sort values\n            pit_id = resp.get('pit_id', pit_id)  # PIT may be refreshed\n\
    \    finally:\n        es.close_point_in_time(body={'id': pit_id})  # Always close\n"
  example_bad: "# Deprecated Scroll API — holds server memory per context\ndef export_all_claims(es: Elasticsearch):\n    resp\
    \ = es.search(index='claims', scroll='5m', body={'query': {'match_all': {}}, 'size': 1000})\n    scroll_id = resp['_scroll_id']\n\
    \    while True:\n        hits = resp['hits']['hits']\n        if not hits:\n            break\n        yield from [h['_source']\
    \ for h in hits]\n        resp = es.scroll(scroll_id=scroll_id, scroll='5m')\n    # Each user gets a server-held context\
    \ for 5 minutes\n    # 10,000 users × 5-50MB = 50-500GB heap consumed\n"
  when_applies: Any Elasticsearch project with deep pagination of search results
  when_not_applies: single-page queries, batch export jobs (Scroll still acceptable), non-Elasticsearch systems
  sources: ["https://www.elastic.co/guide/en/elasticsearch/reference/current/paginate-search-results.html"]
- id: CR-ES-ILM-001
  text: Use Index Lifecycle Management (ILM) to automate index transitions across hot-warm-cold-frozen tiers — without ILM,
    indexes grow indefinitely and consume expensive hot storage.
  why: 'Elasticsearch indexes written today will still exist in 5 years without cleanup. 100GB/day × 365 days = 36TB in a year.
    ILM automatically: (1) rolls over the hot index when it exceeds a size threshold (e.g., 50GB), (2) moves rolled-over indexes
    to warm tier (half the IOP cost) after 7 days, (3) moves to cold tier (object storage tier) after 30 days, (4) deletes
    after 365 days. This keeps hot tier small (fast and expensive) and cold tier large (slow and cheap). For a fact-checking
    system, recent claims (< 7 days) need hot-tier latency; historical claims can tolerate 100ms warm-tier lookup.'
  how_to_do_right: 'Create an ILM policy with phases: hot (rollover at 50GB or 1 day), warm (shrink to 1 shard, force merge
    to 1 segment), cold (freeze, move to searchable snapshot), delete (after retention period). Apply via index template so
    new indexes inherit the policy automatically. Use data streams for append-only data (logs, events) — ILM integrates natively.
    Monitor via GET /_ilm/policy/<name>.'
  severity: high
  technologies:
    platform: [elasticsearch]
  domains:
    domain: [architecture, operations]
    concern: [search, data, database, storage, cost]
  example_good: "# 1. Create ILM policy\nPUT /_ilm/policy/claims-lifecycle\n{\n  \"policy\": {\n    \"phases\": {\n      \"\
    hot\": {\n        \"min_age\": \"0ms\",\n        \"actions\": {\n          \"rollover\": {\n            \"max_primary_shard_size\"\
    : \"50GB\",\n            \"max_age\": \"1d\"\n          }\n        }\n      },\n      \"warm\": {\n        \"min_age\"\
    : \"7d\",\n        \"actions\": {\n          \"shrink\": { \"number_of_shards\": 1 },\n          \"forcemerge\": { \"max_num_segments\"\
    : 1 }\n        }\n      },\n      \"cold\": {\n        \"min_age\": \"30d\",\n        \"actions\": { \"freeze\": {} }\n\
    \      },\n      \"delete\": {\n        \"min_age\": \"365d\",\n        \"actions\": { \"delete\": {} }\n      }\n    }\n\
    \  }\n}\n\n# 2. Apply via index template (applies to all new claims-* indexes)\nPUT /_index_template/claims-template\n\
    {\n  \"index_patterns\": [\"claims-*\"],\n  \"template\": {\n    \"settings\": {\n      \"index.lifecycle.name\": \"claims-lifecycle\"\
    ,\n      \"index.lifecycle.rollover_alias\": \"claims\"\n    }\n  }\n}\n"
  example_bad: "# No ILM — indexes grow forever\n# Index created 2 years ago: claims-2022-01-01 (300GB)\n# Index created 1\
    \ year ago: claims-2023-01-01 (250GB)\n# Today's index: claims-2024-01-01 (growing)\n# Total: 1.5TB on hot-tier storage\n\
    # Old data queried in 0.1% of requests but consuming 90% of storage\n# Manual cleanup required: 40 hours of engineer time,\
    \ data loss risk\n"
  when_applies: Any Elasticsearch deployment with data that grows over time (logs, events, fact-checks)
  when_not_applies: static datasets, in-memory Elasticsearch for tests, non-Elasticsearch storage
  sources: ["https://www.elastic.co/guide/en/elasticsearch/reference/current/index-lifecycle-management.html"]
