layer: rules
technology: Cloud
domain: networking
knowledge:
- id: CR-CNET-001
  text: Configure dual VPN tunnels with BGP for site-to-site connectivity — a single tunnel is a single point of failure.
  why: 'A single VPN tunnel means: tunnel maintenance = downtime, BGP flap = downtime, cloud-side endpoint failure = downtime.
    All cloud providers provision two tunnel endpoints by default, but many organizations only configure one. Dual tunnels
    with BGP provide automatic failover in seconds — without BGP, failover requires manual route changes.'
  how_to_do_right: Configure both tunnels provided by the cloud (AWS gives 2 per VPN connection, GCP gives 2 per HA VPN, Azure
    gives 2 per VPN gateway). Use BGP (not static routes) for automatic failover. Set BGP ASN consistently. Configure both
    tunnels as active-active (not active-passive). Monitor both tunnels — if one is down, fix immediately (you have lost redundancy).
  severity: high
  technologies:
    platform: [aws, gcp, azure, cloud]
  domains:
    domain: [infrastructure, reliability]
    concern: [networking]
  example_good: "# AWS VPN with both tunnels configured and BGP enabled\naws ec2 create-vpn-connection \\\n  --type ipsec.1\
    \ \\\n  --customer-gateway-id cgw-xxx \\\n  --vpn-gateway-id vgw-xxx \\\n  --options '{\n    \"StaticRoutesOnly\": false,\n\
    \    \"TunnelOptions\": [\n      {\n        \"TunnelInsideCidr\": \"169.254.10.0/30\",\n        \"PreSharedKey\": \"tunnel1-secret-key-here\"\
    \n      },\n      {\n        \"TunnelInsideCidr\": \"169.254.10.4/30\",\n        \"PreSharedKey\": \"tunnel2-secret-key-here\"\
    \n      }\n    ]\n  }'\n\n# On-premises router: configure BGP on BOTH tunnels\n# Tunnel 1: BGP neighbor 169.254.10.1 (AWS\
    \ side)\n# Tunnel 2: BGP neighbor 169.254.10.5 (AWS side)\n# Both tunnels active — traffic load-balanced\n"
  example_bad: "# Only one tunnel configured (ignoring the second)\n# Router config:\ninterface tunnel0\n  ip address 169.254.10.2\
    \ 255.255.255.252\n  tunnel source GigabitEthernet0/0\n  tunnel destination 52.x.x.x   # Only tunnel 1\n# Tunnel 1 goes\
    \ down for maintenance → total outage\n# AWS says \"we warned you — configure both tunnels\"\n"
  when_applies: Projects using AWS cloud infrastructure, Google Cloud Platform services, Microsoft Azure services, or Cloud
  when_not_applies: single-host applications, monoliths without service communication
  sources: ["https://docs.aws.amazon.com/vpn/latest/s2svpn/VPNTunnels.html"]
- id: CR-CNET-002
  text: Provision dedicated interconnects at two physically diverse locations — a single interconnect location is a single
    point of failure.
  why: 'A single interconnect location (colocation facility) means: fiber cut at that facility = total loss of dedicated connectivity.
    Natural disasters, power outages, and construction accidents can take out an entire colocation. Two diverse locations
    ensure that losing one does not affect connectivity. VPN serves as a third backup path over the internet.'
  how_to_do_right: Provision connections at two different colocation facilities (different buildings, different power grids).
    Use BGP with appropriate AS-PATH prepending for active-active or active-passive failover. Use LAG (Link Aggregation Group)
    at each location for additional bandwidth and resilience. Test failover by shutting down one location quarterly.
  severity: critical
  technologies:
    platform: [aws, gcp, azure, cloud]
  domains:
    domain: [infrastructure, reliability]
    concern: [networking]
  example_good: "# AWS Direct Connect — dual diverse locations\n# Location 1: Equinix DC2 (Ashburn, VA)\naws directconnect\
    \ create-connection \\\n  --location EqDC2 \\\n  --bandwidth 10Gbps \\\n  --connection-name \"primary-dc\"\n\n# Location\
    \ 2: CoreSite NY1 (New York, NY)\naws directconnect create-connection \\\n  --location CS-NY1 \\\n  --bandwidth 10Gbps\
    \ \\\n  --connection-name \"secondary-dc\"\n\n# LAG at each location for additional resilience\naws directconnect create-lag\
    \ \\\n  --location EqDC2 \\\n  --number-of-connections 2 \\\n  --connections-bandwidth 10Gbps \\\n  --lag-name \"primary-lag\"\
    \n\n# VPN as tertiary backup (over internet)\naws ec2 create-vpn-connection --type ipsec.1 ...\n"
  example_bad: "# Single location, single connection\naws directconnect create-connection \\\n  --location EqDC2 \\\n  --bandwidth\
    \ 10Gbps \\\n  --connection-name \"only-dc\"\n# Backhoe cuts fiber at Equinix DC2 → 100% traffic loss\n# No VPN backup\
    \ → complete outage until fiber repaired\n# Repair time: 4-48 hours depending on severity\n"
  when_applies: Any project using AWS cloud infrastructure, Google Cloud Platform services, Microsoft Azure services, or Cloud
  when_not_applies: single-host applications, monoliths without service communication
  sources: ["https://docs.aws.amazon.com/directconnect/latest/UserGuide/getting_started.html"]
- id: CR-CNET-003
  text: Use a Transit Gateway (hub-and-spoke) for multi-VPC connectivity — do not create full-mesh VPC peering.
  why: VPC peering is point-to-point. With N VPCs, full mesh requires N*(N-1)/2 peerings (10 VPCs = 45 peerings). Peering
    is non-transitive — VPC A peered with B and B peered with C does NOT mean A can reach C. Transit Gateway acts as a central
    hub — every VPC connects once, routing handles the rest. Adding a new VPC requires one attachment, not N-1 peerings.
  how_to_do_right: Create one Transit Gateway per region. Attach all VPCs to it. Use route tables to control which VPCs can
    communicate (segmentation). Attach VPN and Direct Connect to the same TGW for on-premises access. Use inter-region TGW
    peering for multi-region. Monitor TGW bandwidth and route table size.
  severity: high
  technologies:
    platform: [aws, gcp, azure, cloud]
  domains:
    domain: [infrastructure, architecture]
    concern: [networking]
  example_good: "# Create Transit Gateway (hub)\naws ec2 create-transit-gateway \\\n  --description \"Regional hub\" \\\n\
    \  --options '{\n    \"DefaultRouteTableAssociation\": \"enable\",\n    \"DefaultRouteTablePropagation\": \"enable\",\n\
    \    \"DnsSupport\": \"enable\"\n  }'\n\n# Attach VPCs (spoke)\naws ec2 create-transit-gateway-vpc-attachment \\\n  --transit-gateway-id\
    \ tgw-xxx \\\n  --vpc-id vpc-prod \\\n  --subnet-ids subnet-prod-az1 subnet-prod-az2\n\naws ec2 create-transit-gateway-vpc-attachment\
    \ \\\n  --transit-gateway-id tgw-xxx \\\n  --vpc-id vpc-staging \\\n  --subnet-ids subnet-staging-az1 subnet-staging-az2\n\
    \n# Segmentation: separate route tables for prod and non-prod\n# Prod VPCs can reach shared-services but not dev\n# Dev\
    \ VPCs can reach shared-services but not prod\n"
  example_bad: '# Full-mesh VPC peering for 8 VPCs = 28 peerings

    aws ec2 create-vpc-peering-connection --vpc-id vpc-1 --peer-vpc-id vpc-2

    aws ec2 create-vpc-peering-connection --vpc-id vpc-1 --peer-vpc-id vpc-3

    # ... 26 more peering connections

    # Adding VPC 9 = 8 more peerings

    # No transit routing — each peering is a separate management object

    # Route tables become unmanageable

    '
  when_applies: Projects using AWS cloud infrastructure, Google Cloud Platform services, Microsoft Azure services, or Cloud
  when_not_applies: single-host applications, monoliths without service communication
  sources: ["https://docs.aws.amazon.com/vpc/latest/tgw/what-is-transit-gateway.html"]
- id: CR-CNET-004
  text: Use a service mesh (Istio/Linkerd) for microservice communication when you need mTLS, traffic management, and observability
    — do not add a mesh for simple architectures.
  why: 'Service meshes add significant complexity: sidecar proxies consume CPU/memory, debugging network issues requires understanding
    the mesh layer, and upgrades can be disruptive. For < 10 services, direct service-to-service calls with a library-based
    approach (gRPC + health checks) is simpler and sufficient. For > 10 services needing mTLS, canary deployments, and cross-service
    observability, a mesh pays for itself.'
  how_to_do_right: Choose Istio for full-featured (traffic management, security, observability) or Linkerd for lightweight
    (simpler, lower overhead, easier to operate). Enable mTLS in strict mode. Use VirtualServices for canary deployments.
    Use ServiceEntries for external service access control. Start with observability features before adding traffic management.
  severity: medium
  technologies:
    platform: [service_mesh, istio, linkerd, kubernetes]
  domains:
    domain: [infrastructure, architecture]
    concern: [networking]
  example_good: "# Istio — canary deployment with traffic splitting\napiVersion: networking.istio.io/v1alpha3\nkind: VirtualService\n\
    metadata:\n  name: my-api\nspec:\n  hosts: [my-api]\n  http:\n    - route:\n        - destination:\n            host:\
    \ my-api\n            subset: v1\n          weight: 95\n        - destination:\n            host: my-api\n           \
    \ subset: v2\n          weight: 5  # 5% canary traffic\n      retries:\n        attempts: 3\n        perTryTimeout: 2s\n\
    \n# mTLS enforced between all services\napiVersion: security.istio.io/v1beta1\nkind: PeerAuthentication\nmetadata:\n \
    \ name: default\n  namespace: production\nspec:\n  mtls:\n    mode: STRICT\n"
  example_bad: '# Service mesh for 3 microservices

    # Istio installed → 6 sidecar proxies (one per pod)

    # Each sidecar: 100MB RAM, 0.1 CPU

    # Total overhead: 600MB RAM, 0.6 CPU for 3 services

    # More resources for mesh than for actual services

    # Team spends more time debugging Envoy than business logic

    '
  when_applies: Projects using Istio service mesh, Linkerd service mesh, or Kubernetes-orchestrated deployments
  when_not_applies: single-host applications, monoliths without service communication
  sources:
    - "https://istio.io/latest/docs/concepts/what-is-istio/"
    - "https://linkerd.io/2/overview/"
- id: CR-CNET-005
  text: Implement BeyondCorp-style zero-trust access — replace VPNs with identity-aware proxies for internal application access.
  why: VPNs grant network-level access — once connected, a user can reach any resource on the network. A compromised VPN credential
    or device gives an attacker full internal network access. Identity-aware proxies (IAP) grant application-level access
    — each request is authenticated, authorized, and logged. Users access specific applications, not networks.
  how_to_do_right: Use GCP Identity-Aware Proxy, Azure AD Application Proxy, or AWS Verified Access. Configure per-application
    access policies based on user identity, device posture, and context. Remove VPN requirements for web applications. Keep
    VPN only for non-HTTP protocols (SSH, database access) with just-in-time access. Log all access decisions.
  severity: high
  technologies:
    platform: [gcp, azure, aws, cloud]
  domains:
    domain: [infrastructure, security]
    concern: [networking]
  example_good: "# GCP Identity-Aware Proxy — application-level access\n# Enable IAP on a Cloud Run service\ngcloud iap web\
    \ enable \\\n  --resource-type=cloud-run \\\n  --service=internal-dashboard\n\n# Grant access to specific users/groups\n\
    gcloud iap web add-iam-policy-binding \\\n  --resource-type=cloud-run \\\n  --service=internal-dashboard \\\n  --member=\"\
    group:engineering@company.com\" \\\n  --role=\"roles/iap.httpsResourceAccessor\"\n\n# Access policy with device posture\
    \ check\n# Only allow from managed devices with latest OS\naccessPolicies:\n  - levels:\n      - basic:\n          conditions:\n\
    \            - devicePolicy:\n                requireScreenlock: true\n                osConstraints:\n              \
    \    - osType: DESKTOP_CHROME_OS\n                    minimumVersion: \"latest\"\n"
  example_bad: '# VPN for all internal app access

    # User connects to VPN → full network access

    # User''s laptop has malware → malware now on internal network

    # Compromised VPN credential = full internal access

    # No per-application authorization

    # No device posture check

    # No audit trail per application (only VPN connection logs)

    '
  when_applies: Projects using Google Cloud Platform services, Microsoft Azure services, AWS cloud infrastructure, or Cloud
  when_not_applies: single-host applications, monoliths without service communication
  sources: ["https://cloud.google.com/beyondcorp"]
- id: CR-CNET-006
  text: Use DNS health checks with failover routing for multi-region applications — static DNS records do not detect failures.
  why: 'Static DNS records point to a fixed IP. When that IP becomes unreachable (region failure, instance crash), DNS continues
    serving it — users get connection timeouts until someone manually updates DNS (MTTR: 30-60 minutes minimum). Health-checked
    DNS automatically removes unhealthy endpoints and routes traffic to healthy ones (MTTR: 30-60 seconds).'
  how_to_do_right: 'Create health checks for each endpoint (HTTP, HTTPS, or TCP). Configure failover routing: primary → secondary.
    Use weighted routing for load distribution across regions. Use geolocation/latency routing to send users to the nearest
    healthy region. Set low TTLs (60s) on failover records so DNS changes propagate quickly.'
  severity: high
  technologies:
    platform: [aws, gcp, azure, cloud]
  domains:
    domain: [infrastructure, reliability]
    concern: [networking]
  example_good: "# Route53 health check + failover routing\n# Health check — verifies endpoint is alive\naws route53 create-health-check\
    \ --caller-reference $(date +%s) \\\n  --health-check-config '{\n    \"IPAddress\": \"52.x.x.x\",\n    \"Port\": 443,\n\
    \    \"Type\": \"HTTPS\",\n    \"ResourcePath\": \"/health\",\n    \"FailureThreshold\": 3,\n    \"RequestInterval\":\
    \ 10\n  }'\n\n# Primary record (us-east-1) with health check\naws route53 change-resource-record-sets --hosted-zone-id\
    \ $ZONE_ID \\\n  --change-batch '{\n    \"Changes\": [{\n      \"Action\": \"CREATE\",\n      \"ResourceRecordSet\": {\n\
    \        \"Name\": \"api.example.com\",\n        \"Type\": \"A\",\n        \"SetIdentifier\": \"primary\",\n        \"\
    Failover\": \"PRIMARY\",\n        \"TTL\": 60,\n        \"HealthCheckId\": \"'$HC_ID'\",\n        \"ResourceRecords\"\
    : [{\"Value\": \"52.x.x.x\"}]\n      }\n    }]\n  }'\n"
  example_bad: '# Static A record — no health check, no failover

    api.example.com.  300  IN  A  52.x.x.x

    # us-east-1 goes down → DNS still points to dead IP

    # Users timeout for 5 minutes → someone pages on-call

    # On-call manually updates DNS → 10 more minutes

    # TTL 300 → clients cache old IP for 5 more minutes

    # Total outage: 20+ minutes (vs 30-60 seconds with health checks)

    '
  when_applies: Projects using AWS cloud infrastructure, Google Cloud Platform services, Microsoft Azure services, or Cloud
  when_not_applies: single-host applications, monoliths without service communication
  sources: ["https://docs.aws.amazon.com/Route53/latest/DeveloperGuide/dns-failover.html"]
- id: CR-CNET-007
  text: Use external-dns for Kubernetes to automatically manage DNS records — manual DNS updates for service endpoints drift
    and break.
  why: In Kubernetes, service IPs and load balancer IPs change on redeployment, scaling, and cluster migration. Manual DNS
    updates for each change are slow, error-prone, and create drift. external-dns watches Kubernetes Ingress/Service resources
    and automatically creates/updates/deletes DNS records. Zero human intervention, zero drift.
  how_to_do_right: Deploy external-dns with your DNS provider (Route53, Cloud DNS, Azure DNS, Cloudflare). Annotate Ingress
    or Service resources with the desired hostname. Use txt-owner-id to prevent conflicts between clusters. Use policy=sync
    to delete stale records. Limit external-dns to specific namespaces or annotation filters for safety.
  severity: medium
  technologies:
    platform: [kubernetes, aws, gcp, azure]
  domains:
    domain: [infrastructure, operations, devops]
    concern: [networking]
  example_good: "# external-dns deployment (Helm)\nhelm install external-dns external-dns/external-dns \\\n  --set provider=aws\
    \ \\\n  --set policy=sync \\\n  --set txtOwnerId=my-cluster \\\n  --set domainFilters[0]=example.com\n\n# Ingress with\
    \ automatic DNS\napiVersion: networking.k8s.io/v1\nkind: Ingress\nmetadata:\n  name: my-api\n  annotations:\n    external-dns.alpha.kubernetes.io/hostname:\
    \ api.example.com\n    external-dns.alpha.kubernetes.io/ttl: \"60\"\nspec:\n  rules:\n    - host: api.example.com\n  \
    \    http:\n        paths:\n          - path: /\n            pathType: Prefix\n            backend:\n              service:\n\
    \                name: my-api\n                port: { number: 80 }\n# DNS record created/updated automatically\n"
  example_bad: '# Manual DNS updates in Route53 console

    # 1. Deploy new service → get load balancer IP

    # 2. Log into Route53 → update A record

    # 3. Forget to update staging DNS

    # 4. Redeploy → new load balancer IP → old DNS still points to dead IP

    # 5. On-call at 2am trying to figure out why staging is down

    '
  when_applies: Projects using Kubernetes-orchestrated deployments, AWS cloud infrastructure, Google Cloud Platform services,
    or Microsoft Azure services
  when_not_applies: single-host applications, monoliths without service communication
  sources: ["https://kubernetes-sigs.github.io/external-dns/latest/"]
- id: CR-CNET-008
  text: Configure CDN cache behaviors per content type — do not apply a single cache policy to all content.
  why: 'A single cache policy means either: static assets (JS, CSS, images) have short TTLs and are not cached effectively
    (slow, expensive), or dynamic content (API responses, HTML) has long TTLs and serves stale data (incorrect, dangerous).
    Different content types need different caching strategies — images for months, HTML for minutes, APIs for seconds or not
    at all.'
  how_to_do_right: 'Create separate cache behaviors by path pattern. Static assets (/static/*, /images/*): long TTL (30 days),
    immutable if content-hashed. HTML: short TTL (60s) or stale-while-revalidate. API responses: no-cache or very short TTL
    (5s) with vary headers. Use versioned URLs for static assets to enable aggressive caching.'
  severity: high
  technologies:
    library: [aws cloudfront, gcp cloud cdn, azure cdn]
  domains:
    domain: [infrastructure, performance]
    concern: [networking]
  example_good: "# CloudFront — different cache behaviors per content type\nResources:\n  Distribution:\n    Type: AWS::CloudFront::Distribution\n\
    \    Properties:\n      DistributionConfig:\n        CacheBehaviors:\n          # Static assets — cache for 30 days\n\
    \          - PathPattern: \"/static/*\"\n            ViewerProtocolPolicy: https-only\n            CachePolicyId: !Ref\
    \ LongCachePolicy  # TTL: 30 days\n            Compress: true\n\n          # API responses — no cache\n          - PathPattern:\
    \ \"/api/*\"\n            ViewerProtocolPolicy: https-only\n            CachePolicyId: !Ref NoCachePolicy  # TTL: 0\n\
    \            OriginRequestPolicyId: !Ref AllHeadersPolicy\n\n        # Default — HTML, short cache\n        DefaultCacheBehavior:\n\
    \          CachePolicyId: !Ref ShortCachePolicy  # TTL: 60s\n          Compress: true\n\n# Content-hashed URLs enable\
    \ aggressive caching\n# /static/app.a1b2c3d4.js → cache forever (hash changes on update)\n"
  example_bad: "# Single cache policy for everything — 24 hour TTL\nCacheBehaviors: []  # No specific behaviors\nDefaultCacheBehavior:\n\
    \  DefaultTTL: 86400  # 24 hours for EVERYTHING\n# API responses cached for 24 hours → stale data everywhere\n# User changes\
    \ password → CDN serves old session for 24 hours\n# Static assets evicted too early → unnecessary origin hits\n"
  when_applies: Projects using AWS CloudFront, GCP Cloud CDN, or Azure CDN
  when_not_applies: single-host applications, monoliths without service communication
  sources: ["https://docs.aws.amazon.com/AmazonCloudFront/latest/DeveloperGuide/ConfiguringCaching.html"]
- id: CR-CNET-009
  text: Use CDN origin shield to reduce origin load — without it, every edge location hits your origin independently.
  why: A CDN like CloudFront has 400+ edge locations. On a cache miss, each edge location makes a separate request to your
    origin. For a viral piece of content, you can get 400 simultaneous requests to your origin — called a thundering herd.
    Origin shield adds an intermediate cache layer so the origin receives at most 1 request per unique URL per TTL cycle.
  how_to_do_right: 'Enable origin shield on your CDN distribution. Choose the origin shield region closest to your origin.
    This is especially important for: large file downloads (video, software), cache-busting events (deploy, purge), and viral
    content. Monitor origin shield hit ratio — should be > 90%.'
  severity: medium
  technologies:
    library: [aws cloudfront, gcp cloud cdn]
  domains:
    domain: [infrastructure, performance]
    concern: [networking]
  example_good: "# CloudFront with Origin Shield enabled\naws cloudfront create-distribution \\\n  --distribution-config '{\n\
    \    \"Origins\": {\n      \"Items\": [{\n        \"Id\": \"my-origin\",\n        \"DomainName\": \"origin.example.com\"\
    ,\n        \"OriginShield\": {\n          \"Enabled\": true,\n          \"OriginShieldRegion\": \"us-east-1\"\n      \
    \  }\n      }]\n    }\n  }'\n\n# Result:\n# Without origin shield: 400 edge locations × cache miss = 400 origin requests\n\
    # With origin shield: 400 edge locations → 1 origin shield → 1 origin request\n# Origin load reduced by 99%+\n"
  example_bad: '# No origin shield — thundering herd on cache miss

    # Deploy new version → invalidate all cached assets

    # 400 edge locations simultaneously request /app.js from origin

    # Origin CPU spikes to 100%, responds slowly, some requests timeout

    # CDN caches the timeout response → users see errors

    '
  when_applies: Projects using AWS CloudFront or GCP Cloud CDN
  when_not_applies: single-host applications, monoliths without service communication. projects not using AWS CloudFront or
    GCP Cloud CDN
  sources: ["https://docs.aws.amazon.com/AmazonCloudFront/latest/DeveloperGuide/origin-shield.html"]
- id: CR-CNET-010
  text: Use L7 (application) load balancers for HTTP/HTTPS traffic and L4 (network) load balancers for TCP/UDP — do not use
    L7 for everything.
  why: L7 load balancers (ALB, GCLB) inspect HTTP headers, support path-based routing, WebSocket upgrades, and TLS termination.
    But they add latency (1-5ms) and have connection limits. L4 load balancers (NLB, TCP/UDP LB) pass raw TCP/UDP packets
    — lower latency (~100us), higher throughput (millions of connections), and support non-HTTP protocols. Using L7 for database
    proxying or UDP gaming traffic adds unnecessary overhead and may break protocols.
  how_to_do_right: 'Use L7 (ALB/GCLB) for: HTTP APIs, web applications, gRPC, WebSocket. Use L4 (NLB/TCP LB) for: database
    connections, MQTT, gaming, custom protocols, extreme throughput. Use both for different listeners on the same service.
    Always enable cross-zone load balancing. Configure health checks appropriate to the protocol.'
  severity: medium
  technologies:
    platform: [aws, gcp, azure, cloud]
  domains:
    domain: [infrastructure, performance]
    concern: [networking]
  example_good: "# L7 ALB for HTTP API — path-based routing, TLS termination\naws elbv2 create-load-balancer \\\n  --name\
    \ api-alb \\\n  --type application \\\n  --subnets subnet-az1 subnet-az2\n\n# Path-based routing\naws elbv2 create-rule\
    \ \\\n  --listener-arn $LISTENER_ARN \\\n  --conditions '[{\"Field\":\"path-pattern\",\"Values\":[\"/api/v2/*\"]}]' \\\
    \n  --actions '[{\"Type\":\"forward\",\"TargetGroupArn\":\"'$TG_V2'\"}]'\n\n# L4 NLB for database proxy — low latency,\
    \ high throughput\naws elbv2 create-load-balancer \\\n  --name db-proxy-nlb \\\n  --type network \\\n  --subnets subnet-az1\
    \ subnet-az2\n# Latency: ~100 microseconds (vs 1-5ms for ALB)\n"
  example_bad: '# ALB for everything including database proxying

    aws elbv2 create-load-balancer --name db-alb --type application

    # ALB adds 1-5ms latency to every DB query

    # 1000 queries/request × 2ms = 2 SECONDS of added latency

    # ALB interprets TCP as HTTP → protocol errors

    # Connection pooling broken by HTTP keepalive timeouts

    '
  when_applies: Projects using AWS cloud infrastructure, Google Cloud Platform services, Microsoft Azure services, or Cloud
  when_not_applies: single-host applications, monoliths without service communication
  sources: ["https://docs.aws.amazon.com/elasticloadbalancing/latest/userguide/what-is-load-balancing.html"]
- id: CR-CNET-011
  text: Configure API Gateway throttling and usage plans — an unprotected API Gateway will be abused and rack up massive bills.
  why: API Gateway charges per request. Without throttling, a single bad actor (or buggy client) can send millions of requests
    per second — costing thousands of dollars and DDoSing your backend. Usage plans with rate limits protect both your wallet
    and your backend services. API keys without rate limits are not security — they are tracking.
  how_to_do_right: Set account-level throttle (safety net). Create usage plans with rate limits per API key/consumer. Set
    burst limits for traffic spikes. Implement per-method throttling (expensive operations get lower limits). Cache GET responses
    at the gateway level. Enable WAF for bot protection. Monitor 429 (Too Many Requests) responses.
  severity: high
  technologies:
    platform: [aws, gcp, azure, cloud]
  domains:
    domain: [infrastructure, security, operations]
    concern: [networking, cost]
  example_good: "# AWS API Gateway — usage plan with throttling\naws apigateway create-usage-plan \\\n  --name \"standard-tier\"\
    \ \\\n  --throttle '{\"rateLimit\": 100, \"burstLimit\": 200}' \\\n  --quota '{\"limit\": 100000, \"period\": \"MONTH\"\
    }'\n\n# Per-method throttling\naws apigateway update-method \\\n  --rest-api-id $API_ID \\\n  --resource-id $RESOURCE_ID\
    \ \\\n  --http-method POST \\\n  --patch-operations '[{\n    \"op\": \"replace\",\n    \"path\": \"/throttling/rateLimit\"\
    ,\n    \"value\": \"10\"\n  }]'\n\n# API key + usage plan association\naws apigateway create-usage-plan-key \\\n  --usage-plan-id\
    \ $PLAN_ID \\\n  --key-id $API_KEY_ID \\\n  --key-type \"API_KEY\"\n\n# Enable response caching (GET only)\naws apigateway\
    \ update-stage \\\n  --rest-api-id $API_ID \\\n  --stage-name prod \\\n  --patch-operations '[{\n    \"op\": \"replace\"\
    ,\n    \"path\": \"/cacheClusterEnabled\",\n    \"value\": \"true\"\n  }]'\n"
  example_bad: '# API Gateway with no throttling

    aws apigateway create-rest-api --name my-api

    # Bot discovers API → 10M requests/hour

    # Cost: $35 per million requests × 10 = $350/hour

    # Backend overwhelmed, legitimate users see 503s

    # AWS bill at end of month: $25,000

    '
  when_applies: Projects using AWS cloud infrastructure, Google Cloud Platform services, Microsoft Azure services, or Cloud
  when_not_applies: single-host applications, monoliths without service communication
  sources: ["https://docs.aws.amazon.com/apigateway/latest/developerguide/api-gateway-request-throttling.html"]
- id: CR-CNET-012
  text: Use VPC endpoints / Private Link for accessing cloud services — do not send internal traffic over the public internet.
  why: 'By default, calling AWS S3, GCP Cloud Storage, or Azure Blob from a VPC goes over the public internet — even if both
    resources are in the same cloud. This means: traffic exits your VPC, traverses the internet, and returns. It adds latency,
    costs money (NAT Gateway charges $0.045/GB on AWS), and exposes data in transit to internet-level threats.'
  how_to_do_right: Create VPC endpoints (AWS) / Private Service Connect (GCP) / Private Endpoints (Azure) for all cloud services
    accessed from your VPC. Use gateway endpoints (free) for S3 and DynamoDB on AWS. Use interface endpoints for other services.
    Update route tables to prefer endpoints over internet. Monitor endpoint traffic with flow logs.
  severity: high
  technologies:
    platform: [aws, gcp, azure, cloud]
  domains:
    domain: [infrastructure, security, operations]
    concern: [networking, cost]
  example_good: "# AWS VPC Endpoint for S3 (gateway type — FREE)\naws ec2 create-vpc-endpoint \\\n  --vpc-id vpc-xxx \\\n\
    \  --service-name com.amazonaws.us-east-1.s3 \\\n  --route-table-ids rtb-xxx \\\n  --vpc-endpoint-type Gateway\n\n# AWS\
    \ VPC Endpoint for Secrets Manager (interface type)\naws ec2 create-vpc-endpoint \\\n  --vpc-id vpc-xxx \\\n  --service-name\
    \ com.amazonaws.us-east-1.secretsmanager \\\n  --subnet-ids subnet-az1 subnet-az2 \\\n  --security-group-ids sg-xxx \\\
    \n  --vpc-endpoint-type Interface \\\n  --private-dns-enabled\n\n# GCP Private Service Connect for Cloud Storage\ngcloud\
    \ compute forwarding-rules create storage-psc \\\n  --region=us-central1 \\\n  --network=my-vpc \\\n  --address=storage-psc-ip\
    \ \\\n  --target-google-apis-bundle=all-apis\n"
  example_bad: '# No VPC endpoints — S3 traffic goes over internet

    # EC2 instance in private subnet → NAT Gateway → Internet → S3

    # Cost: $0.045/GB NAT Gateway + $0.09/GB data transfer

    # 10TB/month S3 access: $1,350/month in unnecessary transfer costs

    # Plus: traffic visible on the public internet

    '
  when_applies: Projects using AWS cloud infrastructure, Google Cloud Platform services, Microsoft Azure services, or Cloud
  when_not_applies: single-host applications, monoliths without service communication
  sources: ["https://docs.aws.amazon.com/vpc/latest/privatelink/concepts.html"]
- id: CR-CNET-013
  text: Deploy a Web Application Firewall (WAF) in front of all public-facing HTTP endpoints — network firewalls do not inspect
    HTTP payloads.
  why: Network firewalls (security groups, NACLs) operate at L3/L4 — they see IP addresses and ports, not HTTP content. SQL
    injection, XSS, path traversal, and bot attacks are in the HTTP payload, invisible to network firewalls. A WAF inspects
    HTTP requests and blocks attacks before they reach your application. Without WAF, your application code is the last line
    of defense.
  how_to_do_right: Deploy AWS WAF / GCP Cloud Armor / Azure WAF in front of ALBs, CloudFront, API Gateway. Start with managed
    rule sets (OWASP Top 10, known bad IPs, bot detection). Add custom rules for application-specific patterns. Set rate-based
    rules for DDoS protection. Log all blocked requests for analysis. Test WAF rules in count mode before blocking.
  severity: critical
  technologies:
    platform: [aws, gcp, azure, cloud]
  domains:
    domain: [infrastructure, security]
    concern: [networking]
  example_good: "# AWS WAF with managed rules\naws wafv2 create-web-acl \\\n  --name production-waf \\\n  --scope REGIONAL\
    \ \\\n  --default-action '{\"Allow\": {}}' \\\n  --rules '[\n    {\n      \"Name\": \"AWS-AWSManagedRulesCommonRuleSet\"\
    ,\n      \"Priority\": 1,\n      \"OverrideAction\": {\"None\": {}},\n      \"Statement\": {\n        \"ManagedRuleGroupStatement\"\
    : {\n          \"VendorName\": \"AWS\",\n          \"Name\": \"AWSManagedRulesCommonRuleSet\"\n        }\n      },\n \
    \     \"VisibilityConfig\": {\n        \"CloudWatchMetricsEnabled\": true,\n        \"MetricName\": \"common-rules\",\n\
    \        \"SampledRequestsEnabled\": true\n      }\n    },\n    {\n      \"Name\": \"RateLimit\",\n      \"Priority\"\
    : 2,\n      \"Action\": {\"Block\": {}},\n      \"Statement\": {\n        \"RateBasedStatement\": {\n          \"Limit\"\
    : 2000,\n          \"AggregateKeyType\": \"IP\"\n        }\n      }\n    }\n  ]'\n"
  example_bad: "# No WAF — security group only\naws ec2 authorize-security-group-ingress \\\n  --group-id sg-xxx \\\n  --protocol\
    \ tcp \\\n  --port 443 \\\n  --cidr 0.0.0.0/0\n# SQL injection: passes through (SG doesn't inspect HTTP)\n# XSS: passes\
    \ through\n# Path traversal: passes through\n# Bot scraping: passes through\n# DDoS: 10K requests/sec from one IP? SG\
    \ doesn't care\n"
  when_applies: Any project using AWS cloud infrastructure, Google Cloud Platform services, Microsoft Azure services, or Cloud
  when_not_applies: single-host applications, monoliths without service communication
  sources: ["https://docs.aws.amazon.com/waf/latest/developerguide/what-is-aws-waf.html"]
- id: CR-CNET-014
  text: Enable VPC Flow Logs for network traffic analysis and security forensics — without them, you are blind to network-level
    attacks.
  why: 'Without flow logs, you cannot answer: ''Which IP was accessing the database?'', ''Was there unusual traffic before
    the breach?'', ''Why did latency spike at 3am?''. Flow logs capture metadata (source, destination, port, bytes, action)
    for every network flow. They are essential for: security incident investigation, compliance audits, network troubleshooting,
    and anomaly detection.'
  how_to_do_right: 'Enable flow logs at the VPC level (captures all subnets). Send to a centralized log store (CloudWatch
    Logs, S3, BigQuery). Set appropriate sampling (100% for security, 10% for cost optimization). Create alerts for: unusual
    outbound traffic, traffic to known bad IPs, denied flows from unexpected sources. Retain for compliance period (typically
    90-365 days).'
  severity: high
  technologies:
    platform: [aws, gcp, azure, cloud]
  domains:
    domain: [infrastructure, security]
    concern: [networking]
  example_good: "# AWS VPC Flow Logs — all traffic, sent to S3\naws ec2 create-flow-logs \\\n  --resource-type VPC \\\n  --resource-ids\
    \ vpc-xxx \\\n  --traffic-type ALL \\\n  --log-destination-type s3 \\\n  --log-destination \"arn:aws:s3:::flow-logs-bucket/vpc-xxx/\"\
    \ \\\n  --max-aggregation-interval 60 \\\n  --log-format '${version} ${account-id} ${interface-id} ${srcaddr} ${dstaddr}\
    \ ${srcport} ${dstport} ${protocol} ${packets} ${bytes} ${start} ${end} ${action} ${log-status}'\n\n# GCP VPC Flow Logs\
    \ — per subnet\ngcloud compute networks subnets update my-subnet \\\n  --region=us-central1 \\\n  --enable-flow-logs \\\
    \n  --logging-aggregation-interval=interval-5-sec \\\n  --logging-flow-sampling=0.5 \\\n  --logging-metadata=include-all\n\
    \n# Alert: unusual outbound data transfer > 10GB/hour\n"
  example_bad: '# No flow logs enabled

    # Security incident: "database was exfiltrated 3 weeks ago"

    # Investigation: "we have no network logs from that period"

    # Cannot determine: what data was accessed, from where, or how much

    # Compliance audit: "show us your network monitoring" → fail

    '
  when_applies: Projects using AWS cloud infrastructure, Google Cloud Platform services, Microsoft Azure services, or Cloud
  when_not_applies: single-host applications, monoliths without service communication
  sources: ["https://docs.aws.amazon.com/vpc/latest/userguide/flow-logs.html"]
- id: CR-CNET-015
  text: Configure load balancer idle timeouts and WebSocket support explicitly — default timeouts kill long-lived connections.
  why: Default idle timeouts on load balancers are typically 60 seconds. WebSocket connections, long-polling, and server-sent
    events (SSE) often idle longer than this. The load balancer silently drops the connection — the client sees a disconnect,
    the server sees a broken pipe. Both sides think the other crashed. This causes reconnection storms, lost messages, and
    user-visible errors.
  how_to_do_right: Increase idle timeout to match your longest expected idle period (300s-3600s for WebSocket). Enable WebSocket
    support on the load balancer (ALB supports it natively). Implement application-level ping/pong to keep connections alive
    below the idle timeout. Use sticky sessions (cookie-based) if your WebSocket backend requires it.
  severity: high
  technologies:
    platform: [aws, gcp, azure, cloud]
  domains:
    domain: [infrastructure, reliability]
    concern: [networking]
  example_good: "# ALB with extended idle timeout for WebSocket\naws elbv2 modify-load-balancer-attributes \\\n  --load-balancer-arn\
    \ $ALB_ARN \\\n  --attributes '[\n    {\"Key\": \"idle_timeout.timeout_seconds\", \"Value\": \"3600\"}\n  ]'\n\n# Target\
    \ group with WebSocket stickiness\naws elbv2 modify-target-group-attributes \\\n  --target-group-arn $TG_ARN \\\n  --attributes\
    \ '[\n    {\"Key\": \"stickiness.enabled\", \"Value\": \"true\"},\n    {\"Key\": \"stickiness.type\", \"Value\": \"app_cookie\"\
    },\n    {\"Key\": \"stickiness.app_cookie.cookie_name\", \"Value\": \"WSID\"}\n  ]'\n\n# Application-level keepalive (ping\
    \ every 30 seconds)\nasync def websocket_handler(ws):\n    async def send_ping():\n        while True:\n            await\
    \ asyncio.sleep(30)\n            await ws.ping()\n    ping_task = asyncio.create_task(send_ping())\n    # ... handle messages\n"
  example_bad: '# Default idle timeout (60 seconds) with WebSocket

    # Chat application: user reads for 2 minutes without sending

    # At 60 seconds: ALB drops connection silently

    # Client: "Connection lost, reconnecting..."

    # Server: broken pipe exception, session cleanup

    # 1000 users × reconnect every 60s = constant reconnection storm

    '
  when_applies: Projects using AWS cloud infrastructure, Google Cloud Platform services, Microsoft Azure services, or Cloud
  when_not_applies: single-host applications, monoliths without service communication
  sources: ["https://docs.aws.amazon.com/elasticloadbalancing/latest/application/application-load-balancers.html#connection-idle-timeout"]
- id: CR-CNET-016
  text: Use private DNS zones for internal service discovery — do not hardcode IPs or use public DNS for internal traffic.
  why: Hardcoded IPs break when services move, scale, or failover. Public DNS for internal names leaks internal architecture
    to the internet and adds unnecessary external DNS resolution latency. Private DNS zones resolve names only within your
    VPC — they are invisible from the internet, resolve faster (no external hops), and automatically update with service endpoints.
  how_to_do_right: Create a private DNS zone (e.g., internal.example.com) associated with your VPCs. Create records for internal
    services (db.internal.example.com, cache.internal.example.com). Use CNAME records pointing to cloud resource DNS names
    for auto-updating. Associate the zone with all VPCs that need resolution. Use conditional forwarding for on-premises resolution.
  severity: medium
  technologies:
    platform: [aws, gcp, azure, cloud]
  domains:
    domain: [infrastructure, architecture]
    concern: [networking]
  example_good: "# AWS Route53 Private Hosted Zone\naws route53 create-hosted-zone \\\n  --name internal.example.com \\\n\
    \  --caller-reference $(date +%s) \\\n  --hosted-zone-config '{\"PrivateZone\": true}' \\\n  --vpc '{\"VPCRegion\": \"\
    us-east-1\", \"VPCId\": \"vpc-xxx\"}'\n\n# Internal service records\naws route53 change-resource-record-sets --hosted-zone-id\
    \ $ZONE_ID \\\n  --change-batch '{\n    \"Changes\": [\n      {\n        \"Action\": \"CREATE\",\n        \"ResourceRecordSet\"\
    : {\n          \"Name\": \"db.internal.example.com\",\n          \"Type\": \"CNAME\",\n          \"TTL\": 60,\n      \
    \    \"ResourceRecords\": [{\"Value\": \"mydb.xxxxx.us-east-1.rds.amazonaws.com\"}]\n        }\n      },\n      {\n  \
    \      \"Action\": \"CREATE\",\n        \"ResourceRecordSet\": {\n          \"Name\": \"cache.internal.example.com\",\n\
    \          \"Type\": \"CNAME\",\n          \"TTL\": 60,\n          \"ResourceRecords\": [{\"Value\": \"my-redis.xxxxx.ng.0001.use1.cache.amazonaws.com\"\
    }]\n        }\n      }\n    ]\n  }'\n\n# Application config — uses DNS names, not IPs\nDATABASE_HOST=db.internal.example.com\n\
    CACHE_HOST=cache.internal.example.com\n"
  example_bad: '# Hardcoded IPs in application config

    DATABASE_HOST=10.0.1.45

    CACHE_HOST=10.0.2.67

    # DB failover → IP changes → application broken

    # Need to redeploy every service to update IPs

    # No way to know what 10.0.1.45 is without checking console

    '
  when_applies: Projects using AWS cloud infrastructure, Google Cloud Platform services, Microsoft Azure services, or Cloud
  when_not_applies: single-host applications, monoliths without service communication
  sources: ["https://docs.aws.amazon.com/Route53/latest/DeveloperGuide/hosted-zones-private.html"]
