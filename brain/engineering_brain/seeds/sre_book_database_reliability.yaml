layer: rules
technology: SRE
domain: databases
knowledge:
- id: CR-SRE-DB-001
  text: 'Database connection pools must be sized based on Little''s Law: pool_size = avg_concurrent_queries × avg_query_duration. A pool too small causes connection wait timeouts. A pool too large wastes
    database resources and can overwhelm the database with too many concurrent queries.'
  why: 'Google''s capacity management applies queuing theory to database connections. Each database connection consumes memory (~5-10MB in PostgreSQL), a process/thread, and kernel resources. With 10 application
    instances each opening 50 connections, the database handles 500 concurrent connections — each consuming resources even when idle. The common mistake: setting pool size to "a big number" (200) "just
    in case." Result: 10 instances × 200 = 2000 connections. PostgreSQL default max_connections = 100. Connection refused. The correct approach: measure avg_concurrent_queries (say 5 per instance) × avg_query_duration
    (say 50ms). Pool size = 5 × 0.05 = 0.25, so minimum 1 — but add headroom for bursts: 2-3× = 10-15 connections per instance. With 10 instances: 100-150 total.

    '
  how_to_do_right: '1. Measure actual concurrent query load per instance: instrument connection pool metrics (active, idle, waiting).

    2. Apply Little''s Law: pool_size = arrival_rate × service_time × safety_factor (2-3x).

    3. Set both min and max pool size: min = steady state, max = burst handling. Don''t set min = max (wastes idle connections).

    4. Configure connection timeout (how long to wait for a connection from the pool): 5-10 seconds. Fail fast, don''t queue forever.

    5. Enable connection validation: test connections before use (SELECT 1). Stale connections from network issues cause errors.

    6. Use PgBouncer or ProxySQL for connection pooling at the database level — application pools × instances can still overwhelm the database.

    '
  example_good: "# Calculated connection pool with Little's Law\nimport psycopg2.pool\n\ndef create_pool(avg_concurrent_queries: int = 5, avg_query_ms: float = 50,\n                safety_factor: float = 2.5) -> psycopg2.pool.ThreadedConnectionPool:\n    min_conns = max(1, avg_concurrent_queries)\n    max_conns = int(avg_concurrent_queries * safety_factor)\n    pool = psycopg2.pool.ThreadedConnectionPool(\n        minconn=min_conns,   # steady-state\n        maxconn=max_conns,   # burst handling\n    )\n    return pool\n\n# 5 concurrent queries * 2.5x = 12 connections per instance\n# 10 instances * 12 = 120 total -> set max_connections = 150\npool = create_pool(avg_concurrent_queries=5)\n"
  example_bad: "# Arbitrary pool size — wastes resources or causes failures\nimport psycopg2.pool\n\npool = psycopg2.pool.ThreadedConnectionPool(\n    minconn=200,  # 200 idle connections per instance\n    maxconn=200,  # 10 instances * 200 = 2000 connections\n)\n# PostgreSQL default max_connections = 100 -> connection refused!\n# Each idle connection: ~10MB of PostgreSQL memory wasted\n"
  when_applies: "When configuring database connection pools in any application that connects to PostgreSQL, MySQL, or similar relational databases."
  severity: high
  technologies:
    lang: [general]
    platform: [mysql, postgresql]
  domains:
    domain: [databases, performance, reliability]
    concern: [relational, throughput, connection_pooling, capacity]
  sources:
  - url: https://sre.google/sre-book/handling-overload/
    title: 'Google SRE Book — Chapter 21: Handling Overload'
  validation_status: cross_checked
- id: CR-SRE-DB-002
  text: Database migrations must be backward-compatible — every migration must work with both the old and new application version running simultaneously. This means no renaming columns, no dropping columns
    in use, and no changing column types without a multi-step migration.
  why: 'Google''s release engineering (Chapter 8) and safe deployment practices require that database changes support rolling deployments. During a deployment, both old and new application versions run
    simultaneously (rolling update, blue-green, canary). If a migration renames column "name" to "full_name", old application instances reading "name" will fail with "column not found." The safe approach
    is expand-and-contract: Step 1 (expand): add new column, dual-write to both. Step 2 (migrate): backfill old data to new column. Step 3 (contract): remove old column after all application instances use
    the new one. Each step is a separate deployment, each backward-compatible.

    '
  how_to_do_right: '1. Never rename columns in a single migration. Instead: add new column → dual-write → backfill → drop old column (3 separate migrations).

    2. Never drop columns that are still referenced by running application code. Drop only after all instances use the new schema.

    3. Never change column types in place. Instead: add new column with new type → migrate data → switch reads → drop old column.

    4. Add new columns as nullable or with defaults. NOT NULL without a default breaks inserts from old application versions.

    5. Test migrations against production-size data: a migration that takes 5 seconds on a dev database may lock a production table for 5 hours.

    6. Always have a rollback plan: every migration should have a corresponding reverse migration tested before deployment.

    '
  example_good: "# Safe migration: expand-and-contract (3 steps)\n# Step 1: Add new column (backward compatible)\nALTER TABLE users ADD COLUMN full_name TEXT DEFAULT NULL;\n-- Old code still works (reads 'name', ignores 'full_name')\n\n# Step 2: Dual-write + backfill (deploy new code)\n-- New code writes to BOTH columns:\n-- UPDATE users SET name = 'Alice', full_name = 'Alice' WHERE id = 1;\n-- Backfill: UPDATE users SET full_name = name WHERE full_name IS NULL;\n\n# Step 3: Drop old column (after ALL instances use new column)\nALTER TABLE users DROP COLUMN name;\n-- Only after verifying zero reads of 'name' column\n"
  example_bad: "# Unsafe migration: rename column in single step\nALTER TABLE users RENAME COLUMN name TO full_name;\n-- During rolling deployment:\n-- Old instances (v1): SELECT name FROM users -> ERROR: column 'name' does not exist\n-- New instances (v2): SELECT full_name FROM users -> works\n-- Result: partial outage during entire deployment window\n"
  when_applies: "When running database schema migrations in production where rolling deployments mean old and new application versions coexist."
  severity: high
  technologies:
    lang: [general]
    framework: [orm, sqlalchemy]
    platform: [mysql, postgresql]
  domains:
    domain: [databases, deployment, reliability]
    concern: [relational, database_migrations]
  sources:
  - url: https://sre.google/sre-book/release-engineering/
    title: 'Google SRE Book — Chapter 8: Release Engineering'
  validation_status: cross_checked
- id: CR-SRE-DB-003
  text: Database queries must have explicit timeouts — a query without a timeout can hold a connection indefinitely, block other queries waiting for locks, and eventually exhaust the connection pool. Set
    statement_timeout at the session or query level, not just at the application level.
  why: 'Google''s overload management (Chapter 21) treats unbounded operations as the root cause of cascading failures. A query without a timeout that hits a missing index does a full table scan — 10 minutes
    on a large table. During those 10 minutes: the connection is occupied (pool size -1), any locks held block other queries, the database CPU is consumed (potentially affecting all other queries), and
    the application thread is blocked (consuming a thread pool slot). If multiple such queries run concurrently, the connection pool is exhausted within minutes, and the entire service becomes unavailable
    — all because of one bad query.

    '
  how_to_do_right: '1. Set statement_timeout at the database level: PostgreSQL `SET statement_timeout = ''30s''`. This catches all runaway queries.

    2. Set query-level timeouts for known-expensive queries: reduce timeout for simple lookups (5s), increase for reports (60s).

    3. Application-level timeout should be shorter than database timeout: if app timeout is 10s and DB timeout is 30s, the app returns an error but the query continues consuming DB resources for 20s. Set
    DB timeout ≤ app timeout.

    4. Log slow queries: PostgreSQL log_min_duration_statement = 1000 (1 second). Review weekly for missing indexes and optimization opportunities.

    5. Use EXPLAIN ANALYZE before deploying new queries to production. Catch full table scans before they hit production traffic.

    6. Set idle_in_transaction_session_timeout to kill sessions that open a transaction and never commit (connection leak pattern).

    '
  example_good: "# Explicit query timeouts at both DB and application level\nimport psycopg2\n\ndef get_connection(timeout_ms: int = 30000) -> psycopg2.connection:\n    conn = psycopg2.connect(dsn='postgres://localhost/mydb')\n    with conn.cursor() as cur:\n        cur.execute(f\"SET statement_timeout = '{timeout_ms}'\")\n        cur.execute(\"SET idle_in_transaction_session_timeout = '60000'\")\n    return conn\n\n# Per-query timeout for known-fast lookups\ndef get_user(conn, user_id: int) -> dict:\n    with conn.cursor() as cur:\n        cur.execute(\"SET LOCAL statement_timeout = '5000'\")  # 5s for simple lookup\n        cur.execute(\"SELECT * FROM users WHERE id = %s\", (user_id,))\n        return cur.fetchone()\n\n# Log slow queries: SET log_min_duration_statement = 1000;\n"
  example_bad: "# No query timeout — unbounded queries hold connections forever\nimport psycopg2\n\nconn = psycopg2.connect('postgres://localhost/mydb')\ncur = conn.cursor()\ncur.execute('SELECT * FROM orders WHERE status = %s', ('pending',))\n# Missing index -> full table scan on 100M rows -> 10 minutes\n# Connection held for 10 minutes, locks held, pool slot consumed\n# Multiple concurrent requests -> pool exhaustion -> total outage\n"
  when_applies: "When executing any database queries in production, especially in services with connection pools and concurrent request handling."
  severity: high
  technologies:
    lang: [general]
    platform: [mysql, postgresql]
  domains:
    domain: [databases, performance, reliability]
    concern: [relational, fault_tolerance, timeout]
