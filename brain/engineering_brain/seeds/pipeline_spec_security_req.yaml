layer: rules
domain: sacada
knowledge:
- id: PSS-001
  text: Security requirements must be ELICITED, not assumed — every endpoint needs explicit threat modeling before a single line of code is written
  why: 'Teams that skip security elicitation discover vulnerabilities in production. The cost of fixing a security flaw found in production is 30-100x higher than one found during requirements. Real example: a fintech startup built an entire payment API (47 endpoints) without a single security requirement documented. During a penetration test 3 weeks before launch, 23 critical vulnerabilities were found. The fix required 6 weeks of rework, a full redesign of the auth system, and a 2-month launch delay. Every vulnerability could have been prevented if someone had asked "what can go wrong?" before writing code.'
  how_to_do_right: |
    1. Before implementing any endpoint, write a Security Requirements Document (SRD).
    2. For each endpoint, answer: Who can access it? What data does it expose? What happens if input is malicious?
    3. Use STRIDE (Spoofing, Tampering, Repudiation, Information Disclosure, DoS, Elevation of Privilege) per endpoint.
    4. Map data flows and identify trust boundaries — every boundary needs explicit protection.
    5. Document assumptions explicitly: "We assume the API gateway validates JWT tokens before traffic reaches this service."
    6. Review SRD with at least one security-minded engineer before implementation starts.
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, security]
    concern: [meta_cognition]
  example_good: |
    # Security Requirements Document - /api/v1/payments
    # Threat Model (STRIDE):
    #   Spoofing: JWT required, issued by Clerk, verified per-request
    #   Tampering: Request body signed with HMAC-SHA256, idempotency key required
    #   Repudiation: Every payment logged with actor_id, timestamp, IP, request_id
    #   Info Disclosure: Response never includes full card number, only last 4 digits
    #   DoS: Rate limit 10 req/min per user, 100 req/min per IP
    #   EoP: Only users with role=admin can issue refunds > R$1000
    @app.post("/api/v1/payments")
    async def create_payment(req: PaymentRequest, user: User = Depends(get_current_user)):
        ...
  example_bad: |
    # No security requirements documented
    # No threat model
    # "We'll add security later"
    @app.post("/api/v1/payments")
    async def create_payment(req: dict):  # no auth, no validation, no audit
        amount = req["amount"]
        return await process_payment(amount)
  when_applies: During spec writing, before implementation of any new endpoint or service
  sources: ["https://cheatsheetseries.owasp.org/cheatsheets/Threat_Modeling_Cheat_Sheet.html"]

- id: PSS-002
  text: Apply STRIDE threat modeling to EVERY endpoint — Spoofing, Tampering, Repudiation, Information Disclosure, Denial of Service, Elevation of Privilege
  why: 'STRIDE is the industry-standard threat classification that ensures no category of threat is overlooked. Without a systematic framework, teams focus on what they know (usually authentication) and miss entire categories (usually repudiation and information disclosure). Real example: a team secured authentication perfectly but never considered repudiation. When a dispute arose about whether a user authorized a R$50,000 transfer, there were no audit logs to prove it. The company absorbed the loss.'
  how_to_do_right: |
    1. For each endpoint, create a 6-row table: one row per STRIDE category.
    2. Spoofing: How do we verify the caller is who they claim to be?
    3. Tampering: How do we detect if the request or data was modified in transit?
    4. Repudiation: Can the actor deny they performed this action? How do we prove it?
    5. Information Disclosure: What sensitive data could leak through responses, errors, or logs?
    6. Denial of Service: What happens if this endpoint receives 10,000 requests per second?
    7. Elevation of Privilege: Can a regular user trick this endpoint into performing admin actions?
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, security]
    concern: [meta_cognition]
  example_good: |
    # STRIDE Analysis for POST /api/v1/users/{id}/role
    # S: JWT + Clerk verification, user_id from token not URL
    # T: Role value validated against enum, no arbitrary strings
    # R: Role change logged with before/after, actor, timestamp, reason
    # I: Response returns only new role, not full user object
    # D: Rate limited to 5 role changes per hour per admin
    # E: Only super_admin can assign admin role; admin cannot self-promote
  example_bad: |
    # POST /api/v1/users/{id}/role
    # Auth: yes (JWT)
    # That's it. No other threats considered.
    @app.post("/api/v1/users/{user_id}/role")
    async def update_role(user_id: str, body: dict):
        return await db.update_user_role(user_id, body["role"])
  when_applies: During threat modeling sessions, security review of new endpoints, spec reviews
  sources: ["https://learn.microsoft.com/en-us/azure/security/develop/threat-modeling-tool-threats"]

- id: PSS-003
  text: Authentication requirements must specify the EXACT mechanism — "requires authentication" is not a requirement, it is a wish
  why: 'Vague authentication requirements lead to inconsistent implementations across a codebase. One endpoint uses session cookies, another uses API keys, a third uses JWT but forgets to verify expiration. Real example: a SaaS product had "requires authentication" in every spec. Six months later, an audit found 4 different auth mechanisms across 12 services. Two services accepted expired tokens. One service checked the token signature but not the audience claim, allowing tokens from the staging environment to work in production.'
  how_to_do_right: |
    1. Specify the exact auth mechanism: JWT (with issuer, audience, algorithm), OAuth2 (grant type), API Key (rotation policy).
    2. Specify token validation: signature verification, expiration check, audience/issuer validation, revocation check.
    3. Specify what happens on auth failure: 401 with generic message, no information leakage.
    4. Specify session management: token lifetime, refresh mechanism, concurrent session limit.
    5. Specify credential storage: bcrypt cost factor, pepper usage, key derivation function.
    6. Create a shared auth middleware/dependency that all endpoints MUST use — no per-endpoint auth code.
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, security]
    concern: [meta_cognition]
  example_good: |
    # Auth Requirement: JWT via Clerk
    # - Algorithm: RS256
    # - Issuer: https://clerk.myapp.com
    # - Audience: myapp-api
    # - Expiration: 15 minutes (access), 7 days (refresh)
    # - Validation: signature + exp + iss + aud + nbf
    # - Revocation: check Clerk revocation list on every request
    # - Failure: HTTP 401, body: {"error": "unauthorized"}, no token details in response

    from app.auth import require_auth  # shared middleware

    @app.get("/api/v1/profile")
    async def get_profile(user: AuthenticatedUser = Depends(require_auth)):
        return user.profile
  example_bad: |
    # Requirement: "Must be authenticated"
    # Implementation: everyone does their own thing
    @app.get("/api/v1/profile")
    async def get_profile(token: str = Header(None)):
        if token:
            user = jwt.decode(token, SECRET, algorithms=["HS256"])  # HS256 with shared secret!
            return get_user(user["id"])
        return {"error": "unauthorized"}
  when_applies: During spec writing for any endpoint requiring authentication, architecture reviews
  sources: ["https://cheatsheetseries.owasp.org/cheatsheets/Authentication_Cheat_Sheet.html"]

- id: PSS-004
  text: Authorization model must be designed UP FRONT — bolting RBAC or ABAC onto an existing system always leaves gaps
  why: 'Authorization is the most common source of critical security vulnerabilities (OWASP #1: Broken Access Control). When authorization is added incrementally, each developer implements their own checks, leading to inconsistencies. Real example: a healthcare platform had 200 endpoints. Authorization was added "as needed" by different developers. A security audit found that 34 endpoints had no authorization checks at all, 12 endpoints checked roles but not resource ownership (any doctor could see any patient), and 8 endpoints had IDOR vulnerabilities (changing user_id in URL exposed other users data).'
  how_to_do_right: |
    1. Define the authorization model BEFORE writing endpoints: RBAC, ABAC, ReBAC, or hybrid.
    2. Document every role and its exact permissions in a permission matrix.
    3. Implement authorization as middleware/decorator, not inline code.
    4. Always check resource ownership: user can only access their own resources unless explicitly authorized.
    5. Test authorization for every endpoint: unauthenticated, wrong role, right role wrong resource, admin.
    6. Use deny-by-default: if no rule explicitly allows access, deny it.
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, security]
    concern: [meta_cognition]
  example_good: |
    # Authorization Matrix
    # Resource: /api/v1/claims/{id}
    # | Role       | GET (own) | GET (any) | PUT (own) | PUT (any) | DELETE |
    # |------------|-----------|-----------|-----------|-----------|--------|
    # | viewer     | yes       | no        | no        | no        | no     |
    # | analyst    | yes       | yes       | yes       | no        | no     |
    # | admin      | yes       | yes       | yes       | yes       | yes    |

    @app.get("/api/v1/claims/{claim_id}")
    @require_permission("claims:read")
    async def get_claim(claim_id: str, user: AuthUser = Depends(require_auth)):
        claim = await claim_service.get(claim_id)
        if not user.can_access(claim):  # ownership check
            raise HTTPException(403, "Access denied")
        return claim
  example_bad: |
    @app.get("/api/v1/claims/{claim_id}")
    async def get_claim(claim_id: str, user = Depends(get_user)):
        # Only checks if user is logged in, not if they OWN this claim
        return await db.get_claim(claim_id)  # IDOR: any user can see any claim
  when_applies: During system architecture, spec writing for new resources, security reviews
  sources: ["https://cheatsheetseries.owasp.org/cheatsheets/Authorization_Cheat_Sheet.html", "https://owasp.org/Top10/A01_2021-Broken_Access_Control/"]

- id: PSS-005
  text: Input validation requirements must define WHAT is valid, not just that validation is needed — specify types, ranges, patterns, and maximums for every field
  why: 'Input validation is the first line of defense against injection, overflow, and logic bugs. When specs say "validate input" without specifying what valid means, developers either skip it or implement inconsistent checks. Real example: a form had "validate email" as a requirement. Developer A used a regex that rejected valid emails with + signs. Developer B used a regex that accepted "admin@localhost" (no TLD). Developer C used no validation at all because "the frontend validates it." An attacker submitted a 10MB string as the email field and crashed the service with an OOM error.'
  how_to_do_right: |
    1. For every field, specify: type, min/max length, allowed characters/pattern, required/optional.
    2. Define business validation rules: CPF must pass check digit, CNPJ must be active in Receita Federal.
    3. Specify maximum payload size for every endpoint (e.g., 1MB for JSON, 10MB for file upload).
    4. Use Pydantic models with Field() constraints — they are the spec AND the implementation.
    5. Validate at the boundary (API layer), not deep inside business logic.
    6. Return specific validation errors: which field, what constraint, what was received.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, security]
    concern: [meta_cognition]
  example_good: |
    from pydantic import BaseModel, Field, field_validator

    class CreateUserRequest(BaseModel):
        name: str = Field(min_length=2, max_length=100, pattern=r"^[\w\s\-']+$")
        email: str = Field(max_length=254)  # RFC 5321
        cpf: str = Field(pattern=r"^\d{11}$")
        birth_date: date = Field(le=date.today() - timedelta(days=365*18))  # must be 18+

        @field_validator("cpf")
        @classmethod
        def validate_cpf_checksum(cls, v: str) -> str:
            if not cpf_checksum_valid(v):
                raise ValueError("Invalid CPF check digits")
            return v
  example_bad: |
    @app.post("/api/v1/users")
    async def create_user(body: dict):  # no validation at all
        name = body.get("name", "")
        email = body["email"]  # KeyError if missing
        # No length check, no format check, no business rules
        return await db.create_user(name=name, email=email)
  when_applies: During spec writing for any endpoint accepting user input, data model design
  sources: ["https://cheatsheetseries.owasp.org/cheatsheets/Input_Validation_Cheat_Sheet.html", "https://docs.pydantic.dev/latest/concepts/validators/"]

- id: PSS-006
  text: Output encoding requirements prevent information leakage — specify exactly what each endpoint returns and what it MUST NOT return
  why: 'APIs that return full database objects leak sensitive data. Developers select * and serialize the entire row, including internal IDs, password hashes, creation timestamps, soft-delete flags, and internal notes. Real example: a user profile endpoint returned the full user object from the database. This included: password_hash, last_login_ip, failed_login_count, internal_admin_notes, and a is_fraudulent boolean flag. An attacker used the is_fraudulent field to identify which accounts had been flagged, then sold "verified clean" accounts on the dark web.'
  how_to_do_right: |
    1. Define explicit response schemas for every endpoint — never return raw database objects.
    2. Use Pydantic response_model to enforce output shape at the framework level.
    3. Create separate response models for different audiences: UserPublic vs UserAdmin.
    4. Never include: password hashes, internal IDs (use UUIDs), IP addresses, internal flags, admin notes.
    5. Scrub PII from error messages and logs.
    6. Review every new field added to a response model — is this safe for the client to see?
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, security]
    concern: [meta_cognition]
  example_good: |
    class UserPublicResponse(BaseModel):
        """What external clients see — minimal, safe."""
        id: UUID
        name: str
        avatar_url: str | None

    class UserAdminResponse(UserPublicResponse):
        """What admins see — more detail, still no secrets."""
        email: str
        created_at: datetime
        role: str
        is_active: bool

    @app.get("/api/v1/users/{id}", response_model=UserPublicResponse)
    async def get_user(id: UUID):
        user = await db.get_user(id)
        return UserPublicResponse.model_validate(user)  # strips extra fields
  example_bad: |
    @app.get("/api/v1/users/{id}")
    async def get_user(id: str):
        user = await db.get_user(id)
        return user.__dict__  # leaks password_hash, internal_notes, everything
  when_applies: During API design, response schema reviews, security audits
  sources: ["https://cheatsheetseries.owasp.org/cheatsheets/REST_Security_Cheat_Sheet.html"]

- id: PSS-007
  text: Session management requirements must define lifetime, storage, rotation, and invalidation — "use sessions" is 10% of the requirement
  why: 'Session management vulnerabilities (fixation, hijacking, replay) are consistently in the OWASP Top 10. When specs only say "use sessions," critical decisions about lifetime, storage, and invalidation are left to individual developers. Real example: a banking app used JWT tokens with a 24-hour expiry and no revocation mechanism. When a user reported their phone stolen, customer support could not invalidate the session. The thief had 24 hours of unrestricted access to the account. The fix required a complete redesign of the session system.'
  how_to_do_right: |
    1. Define token/session lifetime: access token (15 min), refresh token (7 days), absolute maximum (30 days).
    2. Define storage: HttpOnly + Secure + SameSite cookies for web, secure storage for mobile.
    3. Define rotation: refresh tokens must be single-use, rotate on every refresh.
    4. Define invalidation: logout must revoke all tokens, admin must be able to force-logout any user.
    5. Define concurrent session policy: max 3 active sessions, oldest session terminated on new login.
    6. Define idle timeout: session expires after 30 minutes of inactivity.
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, security]
    concern: [meta_cognition]
  example_good: |
    # Session Management Requirements
    # - Access token: JWT, RS256, 15-minute expiry, contains user_id + role
    # - Refresh token: opaque, stored in DB, 7-day expiry, single-use
    # - Rotation: new refresh token issued on every refresh; old one invalidated
    # - Revocation: logout endpoint invalidates all refresh tokens for user
    # - Concurrent sessions: max 5; oldest terminated on 6th login
    # - Idle timeout: 30 minutes (tracked server-side via last_activity_at)
    # - Cookie flags: HttpOnly, Secure, SameSite=Strict, Path=/api

    async def refresh_token(refresh: str):
        stored = await db.get_refresh_token(refresh)
        if stored.used:
            await db.revoke_all_tokens(stored.user_id)  # token reuse = breach
            raise HTTPException(401, "Session compromised")
        await db.mark_used(stored.id)
        return issue_new_tokens(stored.user_id)
  example_bad: |
    # "Use JWT for authentication"
    # - No expiry defined (tokens last forever)
    # - No refresh mechanism
    # - No revocation
    # - Token stored in localStorage (XSS vulnerable)
    token = jwt.encode({"user_id": user.id}, SECRET, algorithm="HS256")
    return {"token": token}  # no expiry, no rotation, no revocation
  when_applies: During auth system design, session management reviews, security architecture
  sources: ["https://cheatsheetseries.owasp.org/cheatsheets/Session_Management_Cheat_Sheet.html"]

- id: PSS-008
  text: Cryptographic requirements must specify algorithms, key lengths, and rotation policies — never "encrypt the data" without specifying HOW
  why: 'Cryptography is easy to get wrong and hard to detect when wrong. When specs say "encrypt sensitive data," developers use whatever they find first — often deprecated algorithms (MD5, SHA1, DES), hardcoded keys, or ECB mode. The system "works" but provides no actual security. Real example: a health records system "encrypted" patient data using AES-ECB with a hardcoded key stored in the source code. ECB mode preserved data patterns (identical plaintext blocks produced identical ciphertext blocks), and the key was in every developer laptop and the Git history. The encryption was security theater.'
  how_to_do_right: |
    1. Specify algorithms explicitly: AES-256-GCM for encryption at rest, TLS 1.3 for in transit.
    2. Specify key management: AWS KMS / Vault for key storage, never in source code or env vars.
    3. Specify key rotation: annual rotation for encryption keys, 90-day for API keys.
    4. Specify hashing: bcrypt (cost 12+) for passwords, SHA-256 for integrity checks.
    5. Specify what NOT to use: MD5, SHA1, DES, 3DES, AES-ECB, RSA with PKCS1v1.5 padding.
    6. Use established libraries (cryptography, PyNaCl) — never implement crypto from scratch.
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, security]
    concern: [meta_cognition]
  example_good: |
    # Cryptographic Requirements
    # At rest: AES-256-GCM via AWS KMS (key ID in env, not source)
    # In transit: TLS 1.3 only (1.2 deprecated, 1.1/1.0 disabled)
    # Passwords: bcrypt, cost factor 12, with application-level pepper
    # API keys: 256-bit random, hashed with SHA-256 before storage
    # Key rotation: KMS keys rotate annually; API keys rotate every 90 days
    # Prohibited: MD5, SHA1, DES, 3DES, AES-ECB, RC4

    import bcrypt
    from cryptography.fernet import Fernet  # uses AES-CBC-128 with HMAC

    def hash_password(password: str) -> str:
        return bcrypt.hashpw(
            (password + PEPPER).encode(),
            bcrypt.gensalt(rounds=12)
        ).decode()
  example_bad: |
    import hashlib

    def hash_password(password: str) -> str:
        return hashlib.md5(password.encode()).hexdigest()  # MD5, no salt, no pepper

    SECRET_KEY = "my-super-secret-key-123"  # hardcoded in source
    encrypted = aes_ecb_encrypt(data, SECRET_KEY)  # ECB mode, static key
  when_applies: During security architecture, data protection design, compliance reviews
  sources: ["https://cheatsheetseries.owasp.org/cheatsheets/Cryptographic_Storage_Cheat_Sheet.html"]

- id: PSS-009
  text: Audit logging requirements must define WHAT events, WHAT fields, and WHERE logs go — compliance depends on completeness, not on having "some logging"
  why: 'Audit logs are the forensic trail for security incidents, compliance audits, and dispute resolution. When specs say "add logging," developers log what they find convenient — usually debug info, rarely security events. Real example: after a data breach, incident responders asked for logs of who accessed the compromised records in the past 30 days. The logs only contained "User X logged in at time Y." There was no record of which records were accessed, which endpoints were called, or what data was exported. The forensic investigation was impossible, and the company could not demonstrate LGPD compliance.'
  how_to_do_right: |
    1. Define auditable events: authentication (success/failure), authorization (denied), data access (read PII), data modification (create/update/delete), admin actions, configuration changes.
    2. Define required fields per event: timestamp (ISO 8601 UTC), actor_id, action, resource_type, resource_id, result (success/failure), ip_address, request_id, user_agent.
    3. Define what MUST NOT be logged: passwords, tokens, credit card numbers, full CPF/CNPJ.
    4. Define retention: 90 days hot (searchable), 1 year cold (archived), 5 years for financial.
    5. Define immutability: audit logs must be append-only, not editable or deletable by application code.
    6. Define alerting: failed auth > 5/min triggers alert, admin action on own account triggers alert.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, security]
    concern: [meta_cognition]
  example_good: |
    import structlog

    audit_log = structlog.get_logger("audit")

    @app.delete("/api/v1/claims/{claim_id}")
    async def delete_claim(claim_id: UUID, user: AuthUser = Depends(require_auth)):
        claim = await claim_service.get(claim_id)
        await claim_service.soft_delete(claim_id, actor=user.id)
        audit_log.info(
            "claim.deleted",
            actor_id=str(user.id),
            resource_type="claim",
            resource_id=str(claim_id),
            result="success",
            ip=request.client.host,
            request_id=request.state.request_id,
        )
  example_bad: |
    @app.delete("/api/v1/claims/{claim_id}")
    async def delete_claim(claim_id: str):
        await db.delete("claims", claim_id)
        print(f"Deleted claim {claim_id}")  # no actor, no structure, goes to stdout, lost
  when_applies: During spec writing for any state-changing endpoint, compliance reviews, incident response planning
  sources: ["https://cheatsheetseries.owasp.org/cheatsheets/Logging_Cheat_Sheet.html"]

- id: PSS-010
  text: Rate limiting requirements must specify limits PER identity (user, IP, API key) and per endpoint — a global rate limit protects infrastructure but not against account-level abuse
  why: 'Without per-identity rate limits, attackers can brute-force passwords, enumerate users, scrape data, or cause denial of service for specific accounts. Global rate limits (e.g., 1000 req/s total) only prevent infrastructure overload, not targeted abuse. Real example: a login endpoint had a global rate limit of 500 req/s. An attacker running at 100 req/s (well under the limit) brute-forced 3,000 user passwords over a weekend. No alert triggered because the global limit was never exceeded.'
  how_to_do_right: |
    1. Define per-user limits: 60 req/min for reads, 10 req/min for writes, 5 req/min for auth.
    2. Define per-IP limits: 300 req/min for authenticated, 30 req/min for unauthenticated.
    3. Define per-endpoint limits: login=5/min/IP, password-reset=3/hour/email, export=1/hour/user.
    4. Define burst allowance: token bucket with 10 burst, sliding window for sustained load.
    5. Define response on limit: HTTP 429 with Retry-After header, no information about limit values.
    6. Define escalation: 3 consecutive 429s triggers temporary ban (15 minutes).
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, security]
    concern: [meta_cognition]
  example_good: |
    from fastapi_limiter import RateLimiter

    # Per-endpoint, per-identity rate limits
    @app.post("/api/v1/auth/login", dependencies=[Depends(RateLimiter(times=5, minutes=1, key="ip"))])
    async def login(creds: LoginRequest):
        ...

    @app.get("/api/v1/claims", dependencies=[Depends(RateLimiter(times=60, minutes=1, key="user_id"))])
    async def list_claims(user: AuthUser = Depends(require_auth)):
        ...

    @app.post("/api/v1/export", dependencies=[Depends(RateLimiter(times=1, hours=1, key="user_id"))])
    async def export_data(user: AuthUser = Depends(require_auth)):
        ...
  example_bad: |
    # Only global rate limit, no per-user or per-endpoint limits
    app = FastAPI()
    # "We have a WAF with 1000 req/s limit" — does not prevent per-account abuse
    @app.post("/api/v1/auth/login")
    async def login(creds: dict):
        ...  # no rate limit, brute-force away
  when_applies: During API design, security requirements elicitation, load testing planning
  sources: ["https://cheatsheetseries.owasp.org/cheatsheets/Denial_of_Service_Cheat_Sheet.html"]

- id: PSS-011
  text: Data classification requirements must label every field as public, internal, confidential, or restricted BEFORE implementation — you cannot protect what you have not classified
  why: 'Without data classification, developers treat all data the same — either over-protecting public data (wasting effort) or under-protecting sensitive data (creating breaches). Real example: a SaaS platform stored user preferences (theme, language) and payment data (card numbers, billing addresses) in the same database table with the same access controls. A junior developer building a "user preferences" feature inadvertently created an API that returned the entire user row, including payment data. The classification was never done, so nobody noticed the payment fields were exposed.'
  how_to_do_right: |
    1. Classify every field in every model: PUBLIC (name, avatar), INTERNAL (email, phone), CONFIDENTIAL (CPF, address), RESTRICTED (password_hash, payment tokens).
    2. Map classification to access controls: PUBLIC=anyone, INTERNAL=authenticated, CONFIDENTIAL=owner+admin, RESTRICTED=system-only.
    3. Map classification to logging rules: PUBLIC=log freely, INTERNAL=log with care, CONFIDENTIAL=mask in logs, RESTRICTED=never log.
    4. Map classification to encryption: PUBLIC=none, INTERNAL=TLS, CONFIDENTIAL=TLS+at-rest, RESTRICTED=TLS+at-rest+field-level.
    5. Document classification in the data model (Pydantic model comments or metadata).
    6. Review classification when adding new fields — default to CONFIDENTIAL if unsure.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, security]
    concern: [meta_cognition]
  example_good: |
    from enum import Enum

    class DataClass(str, Enum):
        PUBLIC = "public"          # Safe for anyone
        INTERNAL = "internal"      # Authenticated users
        CONFIDENTIAL = "confidential"  # Owner + admin only
        RESTRICTED = "restricted"  # System only, never in API responses

    class UserModel(BaseModel):
        id: UUID                   # PUBLIC
        name: str                  # PUBLIC
        email: str                 # INTERNAL
        cpf: str                   # CONFIDENTIAL
        password_hash: str         # RESTRICTED — never returned in any API
        payment_token: str         # RESTRICTED — never returned in any API

        class Config:
            json_schema_extra = {
                "data_classification": {
                    "id": "public", "name": "public",
                    "email": "internal", "cpf": "confidential",
                    "password_hash": "restricted", "payment_token": "restricted",
                }
            }
  example_bad: |
    class User(BaseModel):
        id: int
        name: str
        email: str
        cpf: str
        password_hash: str
        card_number: str
        # No classification, all fields treated the same
        # Developer returns User.dict() in API — leaks everything
  when_applies: During data model design, API response design, compliance reviews
  sources: ["https://owasp.org/www-project-data-classification/"]

- id: PSS-012
  text: PII handling requirements must define collection purpose, retention period, access controls, and deletion process — LGPD/GDPR require purpose limitation and data minimization
  why: 'LGPD (Brazil) and GDPR (EU) impose specific obligations on personal data handling. "We store user data" is not a requirement — it is a liability without purpose limitation, retention, and deletion. Real example: a company collected user birth dates "for future birthday promotions" but never built the feature. Three years later, a data subject access request revealed they had 2 million birth dates with no legal basis for processing. The DPA fined them for violating the purpose limitation principle. The fix was deleting all birth dates, but they had already been backed up to 14 systems with no deletion propagation mechanism.'
  how_to_do_right: |
    1. For every PII field, document: purpose (why collected), legal basis (LGPD Art. 7), retention period.
    2. Implement data minimization: collect only what is necessary for the stated purpose.
    3. Implement right to deletion: DELETE /api/v1/users/{id}/data must cascade to all systems (DB, cache, backups, logs, analytics).
    4. Implement right to access: GET /api/v1/users/{id}/data must return ALL stored PII in machine-readable format.
    5. Implement consent management: record when consent was given, for what purpose, and allow withdrawal.
    6. PII must be maskable in logs: CPF=***.456.***-** , email=g***@example.com.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, security]
    concern: [meta_cognition]
  example_good: |
    # PII Registry
    # | Field      | Purpose          | Legal Basis     | Retention | Deletion Cascade          |
    # |------------|------------------|-----------------|-----------|---------------------------|
    # | name       | Account display  | Contract (Art 7.V) | Account life + 30 days | DB, cache, search index |
    # | email      | Communication    | Contract (Art 7.V) | Account life + 30 days | DB, cache, mailing list |
    # | cpf        | Tax compliance   | Legal obligation (Art 7.II) | 5 years after last tx | DB, tax reports         |
    # | birth_date | NOT COLLECTED    | N/A             | N/A       | N/A                       |

    @app.delete("/api/v1/users/{user_id}/data")
    async def delete_user_data(user_id: UUID, user: AuthUser = Depends(require_auth)):
        await user_service.anonymize(user_id)      # DB
        await cache.delete(f"user:{user_id}")       # Cache
        await search_index.delete(user_id)          # Search
        await mailing.unsubscribe(user.email)       # Mailing
        audit_log.info("pii.deleted", actor_id=str(user.id), subject_id=str(user_id))
  example_bad: |
    # "We store user data in PostgreSQL"
    # No purpose documented
    # No retention policy
    # No deletion mechanism
    # DELETE endpoint just soft-deletes the row — PII remains in DB, cache, backups forever
  when_applies: During data model design, compliance reviews, privacy impact assessments
  sources: ["https://www.planalto.gov.br/ccivil_03/_ato2015-2018/2018/lei/l13709.htm", "https://gdpr-info.eu/"]

- id: PSS-013
  text: Compliance requirements must be SPECIFIC to jurisdiction and regulation — "be compliant" is meaningless without naming LGPD articles, GDPR chapters, or SOC 2 controls
  why: 'Different regulations have different requirements, timelines, and penalties. A spec that says "comply with data protection laws" gives developers no actionable guidance. Real example: a startup expanding from Brazil to Europe assumed LGPD compliance meant GDPR compliance. They were wrong. GDPR requires a Data Protection Officer (DPO), LGPD does not (for small companies). GDPR mandates 72-hour breach notification, LGPD says "reasonable time." GDPR allows transfers only to adequate countries, LGPD uses standard contractual clauses. Their "compliant" system violated 8 GDPR requirements.'
  how_to_do_right: |
    1. Name specific regulations: LGPD (Lei 13.709/2018), GDPR (EU 2016/679), PCI-DSS v4.0, SOC 2 Type II.
    2. Map requirements to specific articles: LGPD Art. 7 (legal bases), Art. 18 (data subject rights), Art. 46 (security measures).
    3. Define the compliance scope: which data, which systems, which users.
    4. Define breach notification requirements: who to notify, within what time, what to include.
    5. Define data processing agreements: DPA for each third-party processor (cloud, analytics, payments).
    6. Schedule periodic compliance reviews: quarterly for critical systems, annually for others.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, security]
    concern: [meta_cognition]
  example_good: |
    # Compliance Requirements
    # LGPD (Lei 13.709/2018):
    #   Art. 7: Legal bases documented per PII field (see PII Registry)
    #   Art. 18: Data subject rights implemented:
    #     - GET /api/v1/users/{id}/data (access, Art. 18.II)
    #     - DELETE /api/v1/users/{id}/data (deletion, Art. 18.VI)
    #     - GET /api/v1/users/{id}/data/export (portability, Art. 18.V)
    #   Art. 46: Security measures:
    #     - Encryption at rest (AES-256-GCM)
    #     - Encryption in transit (TLS 1.3)
    #     - Access logging (audit trail, 5-year retention)
    #   Art. 48: Breach notification: ANPD within 72 hours, affected users within 5 business days
    # PCI-DSS v4.0 (if processing payments):
    #   Req 3: Protect stored account data (tokenization via Stripe)
    #   Req 6: Develop secure systems (SAST, DAST, dependency scanning)
  example_bad: |
    # Requirements:
    # - "Be LGPD compliant"
    # - "Follow best practices"
    # - "Ensure data security"
    # Result: developers have no idea what to implement
  when_applies: During spec writing, compliance reviews, expansion to new jurisdictions
  sources: ["https://gdpr-info.eu/", "https://www.planalto.gov.br/ccivil_03/_ato2015-2018/2018/lei/l13709.htm"]

- id: PSS-014
  text: API security requirements must cover authentication, rate limiting, CORS, input size limits, and error handling AS A UNIFIED SECURITY LAYER — not scattered across individual endpoints
  why: 'API security must be systematic, not ad-hoc. When security controls are implemented per-endpoint, some endpoints get all controls and others get none. Real example: a team had 78 endpoints. Authentication was applied to 72 (6 were "temporary" public). Rate limiting was on 15 (the ones that had performance issues). CORS was configured globally but with AllowOrigin=* (defeating the purpose). Input size limits were on 3 endpoints (the file upload ones). Error handling was inconsistent — some endpoints returned stack traces in production. An audit revealed that the 6 unauthenticated endpoints could access the same database as authenticated ones.'
  how_to_do_right: |
    1. Implement security as middleware layers, not per-endpoint code:
       - Layer 1: CORS (strict origin whitelist)
       - Layer 2: Rate limiting (per-IP, per-user)
       - Layer 3: Authentication (JWT verification)
       - Layer 4: Input validation (size limits, content-type)
       - Layer 5: Error handling (generic errors, no stack traces)
    2. Default-secure: all endpoints require auth, rate limiting, and validation. Opt OUT explicitly for public endpoints.
    3. CORS: whitelist specific origins, never use * in production.
    4. Global request size limit: 1MB default, explicit override for file upload endpoints.
    5. Error responses: generic messages for clients, detailed logs for developers. Never expose internals.
    6. Security headers: X-Content-Type-Options, X-Frame-Options, Strict-Transport-Security.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, security]
    concern: [meta_cognition]
  example_good: |
    from fastapi import FastAPI
    from fastapi.middleware.cors import CORSMiddleware

    app = FastAPI()

    # Layer 1: CORS — strict whitelist
    app.add_middleware(CORSMiddleware, allow_origins=["https://app.mysite.com"], allow_methods=["GET", "POST", "PUT", "DELETE"], allow_credentials=True)

    # Layer 2: Rate limiting — global default
    app.add_middleware(RateLimitMiddleware, default_limit="60/minute")

    # Layer 3: Auth — all routes require auth by default
    app.add_middleware(AuthMiddleware, exclude=["/health", "/api/v1/auth/login"])

    # Layer 4: Size limit — 1MB default
    app.add_middleware(RequestSizeLimitMiddleware, max_bytes=1_048_576)

    # Layer 5: Error handling — no stack traces
    @app.exception_handler(Exception)
    async def generic_handler(request, exc):
        logger.error("unhandled_error", exc_info=exc, request_id=request.state.request_id)
        return JSONResponse(status_code=500, content={"error": "internal_error", "request_id": request.state.request_id})
  example_bad: |
    app = FastAPI()
    app.add_middleware(CORSMiddleware, allow_origins=["*"])  # allows any origin
    # No rate limiting
    # No global auth — each endpoint does (or forgets) its own
    # No size limit
    # Errors return full stack traces
  when_applies: During API architecture, middleware setup, security reviews
  sources: ["https://cheatsheetseries.owasp.org/cheatsheets/REST_Security_Cheat_Sheet.html", "https://owasp.org/Top10/"]

- id: PSS-015
  text: Infrastructure security requirements must define network segmentation, secrets management, and least-privilege access BEFORE deployment — infrastructure misconfigurations are the #1 cause of cloud breaches
  why: 'Infrastructure security misconfigurations cause more breaches than application vulnerabilities. When specs focus only on application code and ignore infrastructure, the most secure application runs on an insecure foundation. Real example: a company built a perfectly secure API with encryption, auth, and audit logging. But the database had a public IP with the default password. The S3 bucket with user documents was publicly readable. The Redis instance had no authentication. All three were exploited within 72 hours of deployment. The application security was irrelevant because the infrastructure was wide open.'
  how_to_do_right: |
    1. Define network segmentation: public subnet (load balancer only), private subnet (app servers), isolated subnet (databases).
    2. Define secrets management: use AWS Secrets Manager / Vault, never env vars for production secrets, automatic rotation.
    3. Define least-privilege IAM: each service has its own IAM role with minimal permissions. No shared credentials.
    4. Define database access: no public IPs, VPC-only access, TLS required, unique credentials per service.
    5. Define monitoring: CloudTrail/audit logs for all infrastructure changes, alerts on security group modifications.
    6. Define hardening: no default passwords, no unnecessary open ports, auto-patching for OS and dependencies.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, security]
    concern: [meta_cognition]
  example_good: |
    # Infrastructure Security Requirements
    # Network:
    #   - Load balancer: public subnet, ports 443 only
    #   - App servers: private subnet, port 8000, accessible only from LB security group
    #   - Database: isolated subnet, port 5432, accessible only from app security group
    #   - Redis: isolated subnet, port 6379, accessible only from app security group, AUTH required
    # Secrets:
    #   - All secrets in AWS Secrets Manager, rotated every 90 days
    #   - No secrets in env vars, source code, or Docker images
    #   - Each service has unique DB credentials with minimal permissions
    # IAM:
    #   - App server role: read Secrets Manager, write CloudWatch, read/write S3 (specific bucket)
    #   - No wildcard (*) permissions
    #   - No cross-account access without explicit trust policy
  example_bad: |
    # "Deploy to AWS"
    # - Database on public subnet with default password
    # - Redis with no authentication
    # - S3 bucket with public read access
    # - Single IAM user with AdministratorAccess for all services
    # - Secrets in .env file baked into Docker image
  when_applies: During infrastructure design, deployment planning, cloud migration
  sources: ["https://cheatsheetseries.owasp.org/cheatsheets/Infrastructure_as_Code_Security_Cheat_Sheet.html"]
