    # Good: Form fields all aligned to the same left edge, labels above each field.
    # Bad: Labels randomly indented, fields different widths, checkboxes misaligned — the eye zigzags instead of flowing down.
  example_bad: |-
    # Anti-pattern: Violating Gestalt Principle of Continuity
    # Result: Misaligned elements feel \'sloppy\'
    # Result: users scan inefficiently
