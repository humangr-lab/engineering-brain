    - css
    - html
  how_to_do_right: >-
    1. Left-align form labels consistently (don't mix left and right alignment). 2. Use consistent column grids (12-column
    for desktop, 4-column for mobile). 3. Align elements to a baseline grid for vertical rhythm. 4. Timelines and process
    flows should use smooth lines connecting steps. 5. Navigation items should be evenly spaced. 6. Text paragraphs should
    have consistent line-height and spacing.
