layer: principles
domain: ui
knowledge:
- id: P-UX-VISIBILITY
  name: Visibility of System Status
  why: >-
    Users need continuous feedback about what is happening. Without it, they assume the system is broken, click repeatedly
    (causing duplicate actions), or abandon the task entirely. A 2-second delay without feedback feels like 10 seconds. Studies
    show 40% of users abandon a page that appears frozen for more than 3 seconds.
  how_to_apply: >-
    1. Show a loading spinner or progress bar for any operation >300ms. 2. Confirm successful actions with a visual indicator
    (checkmark, toast, color change). 3. Display upload progress with percentage and estimated time. 4. Show save status (Saved/Saving.../Unsaved
    changes). 5. Indicate network status (online/offline/reconnecting). 6. Use skeleton screens for initial page loads to
    show structure before content.
  mental_model: >-
    Elevator floor indicator — you always know where you are and where you're going, even though you can't see through the
    walls.
  domains:
    domain:
    - architecture
    - ui
    - mobile
    concern:
    - frontend
    - web
  violation_consequence: >-
    Users double-click submit buttons, abandon long operations, call support asking 'is it working?', lose trust in the product.
  teaching_example: >-
    Gmail shows 'Sending...' then 'Message sent' with undo link. Slack shows typing indicators. GitHub shows build status
    badges. Figma shows 'Saved to cloud' constantly.
  when_applies: Any system involving user-facing interfaces (web, mobile, or desktop), web applications with HTTP endpoints
  when_not_applies: headless services, APIs, CLIs, or backend-only systems
  sources:
  - https://www.nngroup.com/articles/ten-usability-heuristics/
  text: >-
    Visibility of System Status: Elevator floor indicator — you always know where you are and where you're going, even though
    you can't see through the walls.
  severity: medium
  technologies:
    lang:
    - javascript
    - css
    - html
  how_to_do_right: >-
    1. Show a loading spinner or progress bar for any operation >300ms. 2. Confirm successful actions with a visual indicator
    (checkmark, toast, color change). 3. Display upload progress with percentage and estimated time. 4. Show save status (Saved/Saving.../Unsaved
    changes). 5. Indicate network status (online/offline/reconnecting). 6. Use skeleton screens for initial page loads to
    show structure before content.
  example_good: |-
    # Gmail shows 'Sending.' then 'Message sent' with undo link.
    # Slack shows typing indicators.
    # GitHub shows build status badges.
    # Figma shows 'Saved to cloud' constantly.
  example_bad: |-
    # Anti-pattern: Violating Visibility of System Status
    # Result: Users double-click submit buttons
    # Result: abandon long operations
- id: P-UX-MATCH
  name: Match Between System and Real World
  why: >-
    Users bring mental models from their domain and daily life. When your interface uses technical jargon, unfamiliar icons,
    or illogical orderings, users must translate between their world and yours — this translation is cognitive load that directly
    reduces task completion rates. Studies show domain-appropriate language reduces errors by 50%.
  how_to_apply: >-
    1. Use domain language, not developer language (say 'Send' not 'Submit POST request'). 2. Order elements logically by
    user's mental model (address fields: street → city → state → zip, not alphabetical). 3. Use familiar metaphors (shopping
    cart, folder, trash). 4. Calendar pickers for dates, not text fields. 5. Show currency in user's locale format. 6. Use
    real-world units (GB not bytes, hours not milliseconds).
  mental_model: >-
    Tourist guide — speaks the visitor's language and references landmarks they recognize, never uses local slang without
    explanation.
  domains:
    domain:
    - architecture
    - ui
    concern:
    - frontend
    - content
    - localization
  violation_consequence: >-
    Users misunderstand options, select wrong values, need training for simple tasks, feel the product 'wasn't built for people
    like them'.
  teaching_example: >-
    E-commerce: 'Add to Cart' (real world) vs 'Enqueue Item' (developer world). Medical app: 'Blood Pressure' (domain language)
    vs 'SBP/DBP' (abbreviations).
  when_applies: Any system involving user-facing interfaces (web, mobile, or desktop)
  when_not_applies: headless services, APIs, CLIs, or backend-only systems
  sources:
  - https://www.nngroup.com/articles/match-system-real-world/
  text: >-
    Match Between System and Real World: Tourist guide — speaks the visitor's language and references landmarks they recognize,
    never uses local slang without explanation.
  severity: medium
  technologies:
    lang:
    - javascript
    - css
    - html
  how_to_do_right: >-
    1. Use domain language, not developer language (say 'Send' not 'Submit POST request'). 2. Order elements logically by
    user's mental model (address fields: street → city → state → zip, not alphabetical). 3. Use familiar metaphors (shopping
    cart, folder, trash). 4. Calendar pickers for dates, not text fields. 5. Show currency in user's locale format. 6. Use
    real-world units (GB not bytes, hours not milliseconds).
  example_good: |-
    # E-commerce: 'Add to Cart' (real world) vs 'Enqueue Item' (developer world).
    # Medical app: 'Blood Pressure' (domain language) vs 'SBP/DBP' (abbreviations).
  example_bad: |-
    # Anti-pattern: Violating Match Between System and Real World
    # Result: Users misunderstand options
    # Result: select wrong values
- id: P-UX-CONTROL
  name: User Control and Freedom
  why: >-
    Users frequently make mistakes or change their minds. If the system traps them in a flow with no way out, they feel anxious
    and helpless. Every irreversible action without an exit creates a moment of fear. Undo support reduces user errors' impact
    by 80% because users explore more confidently when they know they can reverse actions.
  how_to_apply: >-
    1. Provide undo/redo for all destructive actions (Gmail's 'Undo send', Google Docs undo). 2. Add clearly visible Cancel
    buttons on every dialog and form. 3. Allow users to go back in multi-step wizards. 4. Provide 'Emergency exits' — close,
    escape, back button always work. 5. Don't auto-navigate users away from their current task. 6. For truly irreversible
    actions, use soft-delete with a grace period.
  mental_model: Emergency exit in a building — always visible, always works, no matter how deep into the building you are.
  domains:
    domain:
    - architecture
    - ui
    concern:
    - frontend
    - forms
    - navigation
  violation_consequence: >-
    Users feel trapped, avoid using features ('I'm afraid I'll break something'), call support for simple reversals, lose
    data when they accidentally trigger actions.
  teaching_example: >-
    Gmail's 'Undo Send' (30-second window). Slack's 'Edit/Delete message'. macOS Trash (soft-delete before permanent). GitHub's
    branch protection (prevents accidental force-push).
  when_applies: Any system involving user-facing interfaces (web, mobile, or desktop)
  when_not_applies: headless services, APIs, CLIs, or backend-only systems
  sources:
  - https://www.nngroup.com/articles/user-control-and-freedom/
  text: >-
    User Control and Freedom: Emergency exit in a building — always visible, always works, no matter how deep into the building
    you are.
  severity: medium
  technologies:
    lang:
    - javascript
    - css
    - html
  how_to_do_right: >-
    1. Provide undo/redo for all destructive actions (Gmail's 'Undo send', Google Docs undo). 2. Add clearly visible Cancel
    buttons on every dialog and form. 3. Allow users to go back in multi-step wizards. 4. Provide 'Emergency exits' — close,
    escape, back button always work. 5. Don't auto-navigate users away from their current task. 6. For truly irreversible
    actions, use soft-delete with a grace period.
  example_good: |-
    # Gmail's 'Undo Send' (30-second window).
    # Slack's 'Edit/Delete message'.
    # macOS Trash (soft-delete before permanent).
    # GitHub's branch protection (prevents accidental force-push).
  example_bad: |-
    # Anti-pattern: Violating User Control and Freedom
    # Result: Users feel trapped
    # Result: avoid using features (\'I\'m afraid I\'ll break something\')
- id: P-UX-CONSISTENCY
  name: Consistency and Standards
  why: >-
    Every inconsistency is a decision the user must make: 'Does this blue button mean the same as that blue button?' Internal
    inconsistency creates confusion; violating platform conventions creates a learning curve. Users spend 90% of their time
    on other apps — your app should work like the apps they already know. Studies show consistent interfaces are learned 30%
    faster.
  how_to_apply: >-
    1. Follow platform conventions (iOS back-swipe, Android back button, web underlined links). 2. Use the same word for the
    same action everywhere (don't mix 'Delete'/'Remove'/'Discard'). 3. Same visual style for same interaction type (all primary
    actions are same color). 4. Consistent placement (navigation always in same place, actions always bottom-right). 5. Follow
    a design system (tokens, components, patterns). 6. Same keyboard shortcuts across all views.
  mental_model: Traffic signals — red always means stop everywhere in the world. Drivers don't have to relearn the rules in
    each city.
  domains:
    domain:
    - architecture
    - ui
    concern:
    - frontend
    - design_system
    - branding
  violation_consequence: >-
    Users hesitate before every click, make errors by assuming consistency where there is none, need retraining for each section
    of the app.
  teaching_example: >-
    Bad: 'Save' button is blue on page A, green on page B. Good: All primary actions are always the same blue, always in the
    bottom-right corner.
  when_applies: Any system involving user-facing interfaces (web, mobile, or desktop)
  when_not_applies: headless services, APIs, CLIs, or backend-only systems
  sources:
  - https://www.nngroup.com/articles/consistency-and-standards/
  text: 'Consistency and Standards: Traffic signals — red always means stop everywhere in the world.'
  severity: medium
  technologies:
    lang:
    - javascript
    - css
    - html
  how_to_do_right: >-
    1. Follow platform conventions (iOS back-swipe, Android back button, web underlined links). 2. Use the same word for the
    same action everywhere (don't mix 'Delete'/'Remove'/'Discard'). 3. Same visual style for same interaction type (all primary
    actions are same color). 4. Consistent placement (navigation always in same place, actions always bottom-right). 5. Follow
    a design system (tokens, components, patterns). 6. Same keyboard shortcuts across all views.
  example_good: |-
    # Bad: 'Save' button is blue on page A, green on page B.
    # Good: All primary actions are always the same blue, always in the bottom-right corner.
  example_bad: |-
    # Anti-pattern: Violating Consistency and Standards
    # Result: Users hesitate before every click
    # Result: make errors by assuming consistency where there is none
- id: P-UX-ERROR-PREVENTION
  name: Error Prevention
  why: >-
    The best error message is no error at all. Preventing errors is always cheaper than recovering from them — both for the
    user (lost time, frustration) and for the system (support tickets, data corruption). Confirmation dialogs for destructive
    actions prevent 90% of accidental deletions. Smart defaults reduce form errors by 50%.
  how_to_apply: >-
    1. Disable buttons when action is invalid (gray out Submit until form is valid). 2. Use confirmation dialogs for destructive
    actions ('Delete 47 items? This cannot be undone'). 3. Set smart defaults (country from IP, timezone from browser, date
    to today). 4. Constrain input (date picker instead of text field, dropdown instead of free text). 5. Show consequences
    before action ('This will notify 1,247 users'). 6. Prevent double-submit by disabling button after first click.
  mental_model: Childproof cap on medicine — the design itself prevents dangerous mistakes, rather than relying on a warning
    label.
  domains:
    domain:
    - architecture
    - ui
    concern:
    - frontend
    - forms
    - data_integrity
  violation_consequence: >-
    Users accidentally delete data, submit malformed input, trigger expensive operations by mistake, blame the product for
    'letting me do that'.
  teaching_example: >-
    GitHub: Type repo name to confirm deletion. AWS: Type 'delete' to confirm resource destruction. Gmail: 'Did you mean to
    attach a file?' when you mention 'attachment' but didn't attach anything.
  when_applies: Any system involving user-facing interfaces (web, mobile, or desktop)
  when_not_applies: headless services, APIs, CLIs, or backend-only systems
  sources:
  - https://www.nngroup.com/articles/slips/
  text: >-
    Error Prevention: Childproof cap on medicine — the design itself prevents dangerous mistakes, rather than relying on a
    warning label.
  severity: high
  technologies:
    lang:
    - javascript
    - css
    - html
  how_to_do_right: >-
    1. Disable buttons when action is invalid (gray out Submit until form is valid). 2. Use confirmation dialogs for destructive
    actions ('Delete 47 items? This cannot be undone'). 3. Set smart defaults (country from IP, timezone from browser, date
    to today). 4. Constrain input (date picker instead of text field, dropdown instead of free text). 5. Show consequences
    before action ('This will notify 1,247 users'). 6. Prevent double-submit by disabling button after first click.
  example_good: |-
    # GitHub: Type repo name to confirm deletion.
    # AWS: Type 'delete' to confirm resource destruction.
    # Gmail: 'Did you mean to attach a file?' when you mention 'attachment' but didn't attach anything.
  example_bad: |-
    # Anti-pattern: Violating Error Prevention
    # Result: Users accidentally delete data
    # Result: submit malformed input
- id: P-UX-RECOGNITION
  name: Recognition Rather Than Recall
  why: >-
    Human working memory holds only 3-5 items reliably. Requiring users to remember information from one screen to use on
    another screen doubles cognitive load and error rate. Recognition (seeing and selecting) is fundamentally easier than
    recall (remembering and typing). Search with autocomplete reduces error rates by 70% compared to manual entry.
  how_to_apply: >-
    1. Show recently used items at the top of lists. 2. Use autocomplete for search and form fields. 3. Display breadcrumbs
    so users know where they are. 4. Show labels on icons (not icon-only buttons). 5. Pre-fill forms with last-used values.
    6. Use visual previews (thumbnails, previews) instead of file names. 7. Show command palette with searchable commands
    (Cmd+K).
  mental_model: >-
    Multiple-choice exam vs fill-in-the-blank — recognition is always easier than recall, which is why interfaces should present
    options, not demand memory.
  domains:
    domain:
    - architecture
    - ui
    concern:
    - frontend
    - search
    - navigation
  violation_consequence: Users forget field formats, can't find features they used before, make data entry errors from misremembered
    values.
  teaching_example: >-
    VS Code: Cmd+K command palette shows all actions with fuzzy search. Figma: Recently used colors in the color picker. Google:
    Search suggestions show likely queries.
  when_applies: Any system involving user-facing interfaces (web, mobile, or desktop)
  when_not_applies: headless services, APIs, CLIs, or backend-only systems
  sources:
  - https://www.nngroup.com/articles/recognition-and-recall/
  text: >-
    Recognition Rather Than Recall: Multiple-choice exam vs fill-in-the-blank — recognition is always easier than recall,
    which is why interfaces should present options, not demand memory.
  severity: medium
  technologies:
    lang:
    - javascript
    - css
    - html
  how_to_do_right: >-
    1. Show recently used items at the top of lists. 2. Use autocomplete for search and form fields. 3. Display breadcrumbs
    so users know where they are. 4. Show labels on icons (not icon-only buttons). 5. Pre-fill forms with last-used values.
    6. Use visual previews (thumbnails, previews) instead of file names. 7. Show command palette with searchable commands
    (Cmd+K).
  example_good: |-
    # VS Code: Cmd+K command palette shows all actions with fuzzy search.
    # Figma: Recently used colors in the color picker.
    # Google: Search suggestions show likely queries.
  example_bad: |-
    # Anti-pattern: Violating Recognition Rather Than Recall
    # Result: Users forget field formats
    # Result: can\'t find features they used before
- id: P-UX-FLEXIBILITY
  name: Flexibility and Efficiency of Use
  why: >-
    Novice and expert users have radically different needs. A system designed only for novices frustrates experts (too many
    clicks, too many confirmations). A system designed only for experts is inaccessible to novices. The best interfaces serve
    both through progressive complexity — simple by default, powerful when needed. Power users who are 20% of users often
    generate 80% of usage.
  how_to_apply: >-
    1. Keyboard shortcuts for frequent actions (Ctrl+S to save, Ctrl+K for search). 2. Allow customization (rearrangeable
    dashboard, saved filters). 3. Support both click and type workflows (mouse + keyboard navigation). 4. Provide bulk operations
    for power users (select all, batch edit). 5. Remember user preferences (last-used settings, view mode). 6. Offer macro/automation
    features for repetitive tasks.
  mental_model: Car with automatic AND manual mode — beginners drive in auto, experts shift gears for control.
  domains:
    domain:
    - architecture
    - ui
    - quality
    concern:
    - frontend
    - productivity
    - accessibility
  violation_consequence: >-
    Power users leave for tools with shortcuts, novices are overwhelmed by exposed complexity, both groups feel the product
    is 'not for them'.
  teaching_example: >-
    Slack: Type /command for power features, click buttons for simple actions. Notion: Markdown shortcuts for fast formatting,
    toolbar buttons for discovery. Git: Simple 'git push' for basic use, flags and options for power users.
  when_applies: >-
    Any system involving user-facing interfaces (web, mobile, or desktop), interfaces that must be usable by people with disabilities
  when_not_applies: headless services, APIs, CLIs, or backend-only systems
  sources:
  - https://www.nngroup.com/articles/flexibility-efficiency-heuristic/
  text: >-
    Flexibility and Efficiency of Use: Car with automatic AND manual mode — beginners drive in auto, experts shift gears for
    control.
  severity: medium
  technologies:
    lang:
    - javascript
    - css
    - html
  how_to_do_right: >-
    1. Keyboard shortcuts for frequent actions (Ctrl+S to save, Ctrl+K for search). 2. Allow customization (rearrangeable
    dashboard, saved filters). 3. Support both click and type workflows (mouse + keyboard navigation). 4. Provide bulk operations
    for power users (select all, batch edit). 5. Remember user preferences (last-used settings, view mode). 6. Offer macro/automation
    features for repetitive tasks.
  example_good: |-
    # Slack: Type /command for power features, click buttons for simple actions.
    # Notion: Markdown shortcuts for fast formatting, toolbar buttons for discovery.
    # Git: Simple 'git push' for basic use, flags and options for power users.
  example_bad: |-
    # Anti-pattern: Violating Flexibility and Efficiency of Use
    # Result: Power users leave for tools with shortcuts
    # Result: novices are overwhelmed by exposed complexity
- id: P-UX-AESTHETIC
  name: Aesthetic and Minimalist Design
  why: >-
    Every extra element on screen competes for attention with the element that matters. Visual noise increases time-to-target
    and error rate. Studies show that removing 50% of words from a page improves usability by 58%. Aesthetic design is perceived
    as more usable even when it isn't — this is the Aesthetic-Usability Effect. Signal-to-noise ratio is the core metric.
  how_to_apply: >-
    1. Show only what the user needs for the current task (progressive disclosure). 2. Prioritize content over chrome (minimize
    borders, backgrounds, decorations). 3. Use whitespace as a design element (breathing room, not wasted space). 4. Remove
    words until meaning changes (then add the last word back). 5. One primary action per screen (one blue button, everything
    else secondary). 6. Hide advanced options behind 'More' or 'Advanced' expandable sections.
  mental_model: >-
    Sculpture — you don't add marble, you remove everything that isn't the statue. The interface is done not when there's
    nothing more to add, but when there's nothing left to remove.
  domains:
    domain:
    - architecture
    - ui
    concern:
    - frontend
    - content
    - design_system
  violation_consequence: >-
    Users can't find the action they need, feel overwhelmed, take longer to complete tasks, perceive the product as 'complicated'.
  teaching_example: >-
    Google homepage: One input field, two buttons. Apple product pages: Generous whitespace, one message per section. Stripe's
    dashboard: Clean tables, progressive disclosure for details.
  when_applies: Any system involving user-facing interfaces (web, mobile, or desktop)
  when_not_applies: headless services, APIs, CLIs, or backend-only systems
  sources:
  - https://www.nngroup.com/articles/aesthetic-minimalist-design/
  text: 'Aesthetic and Minimalist Design: Sculpture — you don''t add marble, you remove everything that isn''t the statue.'
  severity: low
  technologies:
    lang:
    - javascript
    - css
    - html
  how_to_do_right: >-
    1. Show only what the user needs for the current task (progressive disclosure). 2. Prioritize content over chrome (minimize
    borders, backgrounds, decorations). 3. Use whitespace as a design element (breathing room, not wasted space). 4. Remove
    words until meaning changes (then add the last word back). 5. One primary action per screen (one blue button, everything
    else secondary). 6. Hide advanced options behind 'More' or 'Advanced' expandable sections.
  example_good: |-
    # Google homepage: One input field, two buttons.
    # Apple product pages: Generous whitespace, one message per section.
    # Stripe's dashboard: Clean tables, progressive disclosure for details.
  example_bad: |-
    # Anti-pattern: Violating Aesthetic and Minimalist Design
    # Result: Users can\'t find the action they need
    # Result: feel overwhelmed
- id: P-UX-ERROR-RECOVERY
  name: Help Users Recognize, Diagnose, and Recover from Errors
  why: >-
    Error messages are the last line of defense between the user and failure. A cryptic error ('Error 500') leaves the user
    helpless. An actionable error ('Your session expired — click here to log in again') guides them to recovery. Studies show
    that actionable error messages reduce support tickets by 50% and increase task completion by 47%.
  how_to_apply: >-
    1. Say WHAT went wrong in plain language (not error codes). 2. Say WHY it went wrong (not technical details). 3. Say HOW
    to fix it (specific next step). 4. Use inline validation — show errors next to the field, not in a banner. 5. Preserve
    user input after errors (don't clear the form). 6. Provide direct links to resolution (retry button, settings page, support
    contact). 7. Log technical details for developers separately.
  mental_model: >-
    GPS rerouting — doesn't say 'Route calculation error #4491'. Says 'Road ahead is closed. Turn right in 200m for an alternative
    route.'
  domains:
    domain:
    - architecture
    - ui
    - reliability
    concern:
    - frontend
    - error_handling
    - forms
  violation_consequence: >-
    Users screenshot errors and send to support, abandon tasks, blame themselves ('I must have done something wrong'), lose
    trust in the product.
  teaching_example: >-
    Stripe: 'Your card was declined. Try a different card or contact your bank.' GitHub: 'Merge conflict in file.py — resolve
    it by editing the file and removing the conflict markers.'
  when_applies: Any system involving user-facing interfaces (web, mobile, or desktop)
  when_not_applies: headless services, APIs, CLIs, or backend-only systems
  sources:
  - https://www.nngroup.com/articles/error-message-guidelines/
  text: 'Help Users Recognize, Diagnose, and Recover from Errors: GPS rerouting — doesn''t say ''Route calculation error #4491''.'
  severity: medium
  technologies:
    lang:
    - javascript
    - css
    - html
  how_to_do_right: >-
    1. Say WHAT went wrong in plain language (not error codes). 2. Say WHY it went wrong (not technical details). 3. Say HOW
    to fix it (specific next step). 4. Use inline validation — show errors next to the field, not in a banner. 5. Preserve
    user input after errors (don't clear the form). 6. Provide direct links to resolution (retry button, settings page, support
    contact). 7. Log technical details for developers separately.
  example_good: |-
    # Stripe: 'Your card was declined.
    # Try a different card or contact your bank.' GitHub: 'Merge conflict in file.py — resolve it by editing the file and removing the conflict markers.'.
  example_bad: |-
    # Anti-pattern: Violating Help Users Recognize, Diagnose, and Recover from Errors
    # Result: Users screenshot errors and send to support
    # Result: abandon tasks
- id: P-UX-HELP
  name: Help and Documentation
  why: >-
    Even the most intuitive interface needs help for complex or infrequent tasks. But help should be contextual and immediate,
    not buried in a 200-page manual. Contextual tooltips that appear at the point of need are 80% more effective than documentation
    pages. Onboarding flows that demonstrate by doing reduce time-to-first-value by 60%.
  how_to_apply: >-
    1. Provide contextual tooltips on hover for complex fields. 2. Add question-mark icons next to non-obvious options. 3.
    Build interactive onboarding for first-time users (guided tours, not manuals). 4. Show keyboard shortcuts in tooltips
    ('Save (Ctrl+S)'). 5. Offer in-app search for help content. 6. Include examples inside form placeholders. 7. Provide empty-state
    guidance ('No items yet. Click + to create your first one').
  mental_model: >-
    IKEA assembly — instructions appear step by step as you need them, with pictures, not as a textbook to study before starting.
  domains:
    domain:
    - architecture
    - ui
    - quality
    concern:
    - frontend
    - onboarding
    - documentation
  violation_consequence: >-
    Users don't discover features, underuse the product, require training sessions, write angry reviews about 'steep learning
    curve'.
  teaching_example: >-
    Notion: Interactive walkthrough on first visit. Slack: Slackbot guides setup step by step. Figma: In-canvas tips that
    teach features as you encounter them.
  when_applies: Any system involving user-facing interfaces (web, mobile, or desktop)
  when_not_applies: headless services, APIs, CLIs, or backend-only systems
  sources:
  - https://www.nngroup.com/articles/help-and-documentation/
  text: >-
    Help and Documentation: IKEA assembly — instructions appear step by step as you need them, with pictures, not as a textbook
    to study before starting.
  severity: medium
  technologies:
    lang:
    - javascript
    - css
    - html
  how_to_do_right: >-
    1. Provide contextual tooltips on hover for complex fields. 2. Add question-mark icons next to non-obvious options. 3.
    Build interactive onboarding for first-time users (guided tours, not manuals). 4. Show keyboard shortcuts in tooltips
    ('Save (Ctrl+S)'). 5. Offer in-app search for help content. 6. Include examples inside form placeholders. 7. Provide empty-state
    guidance ('No items yet. Click + to create your first one').
  example_good: |-
    # Notion: Interactive walkthrough on first visit.
    # Slack: Slackbot guides setup step by step.
    # Figma: In-canvas tips that teach features as you encounter them.
  example_bad: |-
    # Anti-pattern: Violating Help and Documentation
    # Result: Users don\'t discover features
    # Result: underuse the product
- id: P-UX-FITTS
  name: Fitts's Law
  why: >-
    The time to reach a target is a function of the distance to the target divided by the size of the target. Small, far-away
    buttons are hard to click. Large, nearby buttons are easy. This is not opinion — it is a mathematically proven model (ID
    = log2(2D/W)). Mobile interfaces where the thumb-zone matters make this even more critical. A 44px touch target vs a 24px
    one can mean the difference between 2% and 15% misclick rates.
  how_to_apply: >-
    1. Make primary actions large and prominent (minimum 44x44px on mobile, 32x32px on desktop). 2. Place frequent actions
    in easy-to-reach zones (bottom of mobile screen for thumb, top-left for mouse). 3. Use full-width buttons on mobile. 4.
    Reduce distance between related actions (edit button near the item it edits). 5. Edge and corner targets are infinitely
    large (use them — dock at bottom, menu at top edge). 6. Destructive actions should be small and far from primary actions.
  mental_model: >-
    Dartboard — the bullseye is small and hard to hit. If the bullseye were the size of the whole board, everyone would hit
    it every time.
  domains:
    domain:
    - architecture
    - ui
    - mobile
    concern:
    - frontend
    - interaction_design
  violation_consequence: Users misclick, activate wrong actions, need multiple attempts, experience frustration on touch devices.
  teaching_example: >-
    iOS: Bottom tab bar is in the thumb zone. Android: FAB (floating action button) is large and prominent. Bad: Tiny 'x'
    close buttons on modal corners.
  when_applies: >-
    Any system involving user-facing interfaces (web, mobile, or desktop), mobile applications (iOS, Android, cross-platform)
  when_not_applies: headless services, APIs, CLIs, or backend-only systems
  sources:
  - https://lawsofux.com/fittss-law/
  text: 'Fitts''s Law: Dartboard — the bullseye is small and hard to hit.'
  severity: medium
  technologies:
    lang:
    - javascript
    - css
    - html
  how_to_do_right: >-
    1. Make primary actions large and prominent (minimum 44x44px on mobile, 32x32px on desktop). 2. Place frequent actions
    in easy-to-reach zones (bottom of mobile screen for thumb, top-left for mouse). 3. Use full-width buttons on mobile. 4.
    Reduce distance between related actions (edit button near the item it edits). 5. Edge and corner targets are infinitely
    large (use them — dock at bottom, menu at top edge). 6. Destructive actions should be small and far from primary actions.
  example_good: |-
    # iOS: Bottom tab bar is in the thumb zone.
    # Android: FAB (floating action button) is large and prominent.
    # Bad: Tiny 'x' close buttons on modal corners.
  example_bad: |-
    # Anti-pattern: Violating Fitts's Law
    # Result: Users misclick
    # Result: activate wrong actions
- id: P-UX-HICKS
  name: Hick's Law
  why: >-
    Decision time increases logarithmically with the number of choices: RT = a + b·log2(n). Presenting 20 options at once
    forces the user to evaluate each one against the others. This is why restaurant menus with 200 items feel overwhelming
    but menus with 10 curated items feel effortless. In e-commerce, reducing choices from 24 to 6 jams increased purchases
    from 3% to 30% (Iyengar & Lepper, 2000).
  how_to_apply: >-
    1. Limit top-level navigation to 5-7 items maximum. 2. Group related options into categories (progressive disclosure).
    3. Highlight recommended/default options. 4. Use smart defaults to pre-select the most common choice. 5. Remove rarely
    used options to settings. 6. Order options by frequency of use, not alphabetically. 7. Use stepped decisions (choose category,
    then choose item) instead of flat lists.
  mental_model: >-
    Netflix homepage — doesn't show you all 15,000 titles at once. Shows 6 in a row, organized by category, with one 'Top
    Pick' highlighted.
  domains:
    domain:
    - architecture
    - ui
    concern:
    - frontend
    - navigation
    - information_architecture
  violation_consequence: >-
    Decision paralysis — users stare at the screen, don't choose, leave. Slower task completion. Increased errors from hasty
    choices.
  teaching_example: >-
    Bad: Settings page with 50 toggles in one list. Good: Settings grouped into General / Notifications / Privacy / Account
    with 5-8 items each.
  when_applies: Any system involving user-facing interfaces (web, mobile, or desktop)
  when_not_applies: headless services, APIs, CLIs, or backend-only systems
  sources:
  - https://lawsofux.com/hicks-law/
  text: 'Hick''s Law: Netflix homepage — doesn''t show you all 15,000 titles at once.'
  severity: medium
  technologies:
    lang:
    - javascript
    - css
    - html
  how_to_do_right: >-
    1. Limit top-level navigation to 5-7 items maximum. 2. Group related options into categories (progressive disclosure).
    3. Highlight recommended/default options. 4. Use smart defaults to pre-select the most common choice. 5. Remove rarely
    used options to settings. 6. Order options by frequency of use, not alphabetically. 7. Use stepped decisions (choose category,
    then choose item) instead of flat lists.
  example_good: |-
    # Bad: Settings page with 50 toggles in one list.
    # Good: Settings grouped into General / Notifications / Privacy / Account with 5-8 items each.
  example_bad: |-
    # Anti-pattern: Violating Hick's Law
    # Result: Decision paralysis — users stare at the screen
    # Result: don\'t choose
- id: P-UX-MILLER
  name: Miller's Law (7 Plus or Minus 2)
  why: >-
    Working memory can hold approximately 7 (plus or minus 2) chunks of information simultaneously. More recent research suggests
    the number is closer to 4 for unrelated items. This means phone numbers with 10 digits are hard to remember but 3 chunks
    (555-867-5309) are manageable. Any UI that requires holding more than 4-5 items in working memory at once will cause errors.
  how_to_apply: >-
    1. Chunk information into groups of 3-5 (phone numbers, credit card numbers, IP addresses). 2. Limit menu items to 5-7
    per group. 3. Break long forms into multi-step wizards (3-5 fields per step). 4. Group navigation into logical clusters.
    5. Use formatting to create visual chunks (spaces, dividers, headers). 6. Don't require users to remember information
    from screen A to use on screen B.
  mental_model: Zip code — 5 digits as one chunk is manageable. 10 random digits without grouping is not.
  domains:
    domain:
    - architecture
    - ui
    concern:
    - frontend
    - information_architecture
    - forms
  violation_consequence: Users forget items, make errors in data entry, feel overwhelmed, need to switch between tabs to copy
    information.
  teaching_example: >-
    Credit card input: 4242 4242 4242 4242 (4 chunks of 4) vs 4242424242424242 (one 16-digit nightmare). Step wizard: Shipping
    → Payment → Review instead of one giant form.
  when_applies: Any system involving user-facing interfaces (web, mobile, or desktop)
  when_not_applies: headless services, APIs, CLIs, or backend-only systems
  sources:
  - https://lawsofux.com/millers-law/
  text: 'Miller''s Law (7 Plus or Minus 2): Zip code — 5 digits as one chunk is manageable.'
  severity: medium
  technologies:
    lang:
    - javascript
    - css
    - html
  how_to_do_right: >-
    1. Chunk information into groups of 3-5 (phone numbers, credit card numbers, IP addresses). 2. Limit menu items to 5-7
    per group. 3. Break long forms into multi-step wizards (3-5 fields per step). 4. Group navigation into logical clusters.
    5. Use formatting to create visual chunks (spaces, dividers, headers). 6. Don't require users to remember information
    from screen A to use on screen B.
  example_good: |-
    # Credit card input: 4242 4242 4242 4242 (4 chunks of 4) vs 4242424242424242 (one 16-digit nightmare).
    # Step wizard: Shipping → Payment → Review instead of one giant form.
  example_bad: |-
    # Anti-pattern: Violating Miller's Law (7 Plus or Minus 2)
    # Result: Users forget items
    # Result: make errors in data entry
- id: P-UX-GESTALT-PROXIMITY
  name: Gestalt Principle of Proximity
  why: >-
    Elements that are close together are perceived as belonging to the same group. This is automatic and pre-conscious — the
    brain groups before the user thinks about it. This means spacing is not decorative, it is semantic. Wrong spacing creates
    false groupings that mislead users. A label that is equidistant between two fields is ambiguous — it must be clearly closer
    to its field.
  how_to_apply: >-
    1. Group related form fields together with less space between them than between groups. 2. Place labels close to their
    fields (top-aligned or left-aligned, never floating between two fields). 3. Use consistent spacing scale (4px, 8px, 16px,
    24px, 32px). 4. Separate unrelated sections with more whitespace (2-3x the spacing within groups). 5. In tables, keep
    cell padding uniform but use stronger dividers between logical sections.
  mental_model: >-
    Grocery store aisles — cereal is near breakfast items, not near cleaning products. Physical proximity signals conceptual
    relationship.
  domains:
    domain:
    - architecture
    - ui
    concern:
    - frontend
    - layout
    - design_system
  violation_consequence: >-
    Users associate labels with wrong fields, submit incorrect form data, perceive unrelated items as connected, miss important
    information.
  teaching_example: >-
    Form: Name label → 4px gap → Name input → 24px gap → Email label → 4px gap → Email input. Bad: Name label → 16px → Name
    input → 16px → Email label (ambiguous — which field does the label belong to?).
  when_applies: Any system involving user-facing interfaces (web, mobile, or desktop)
  when_not_applies: headless services, APIs, CLIs, or backend-only systems
  sources:
  - https://lawsofux.com/law-of-proximity/
  text: 'Gestalt Principle of Proximity: Grocery store aisles — cereal is near breakfast items, not near cleaning products.'
  severity: low
  technologies:
    lang:
    - javascript
    - css
    - html
  how_to_do_right: >-
    1. Group related form fields together with less space between them than between groups. 2. Place labels close to their
    fields (top-aligned or left-aligned, never floating between two fields). 3. Use consistent spacing scale (4px, 8px, 16px,
    24px, 32px). 4. Separate unrelated sections with more whitespace (2-3x the spacing within groups). 5. In tables, keep
    cell padding uniform but use stronger dividers between logical sections.
  example_good: |-
    # Form: Name label → 4px gap → Name input → 24px gap → Email label → 4px gap → Email input.
    # Bad: Name label → 16px → Name input → 16px → Email label (ambiguous — which field does the label belong to?).
  example_bad: |-
    # Anti-pattern: Violating Gestalt Principle of Proximity
    # Result: Users associate labels with wrong fields
    # Result: submit incorrect form data
- id: P-UX-GESTALT-SIMILARITY
  name: Gestalt Principle of Similarity
  why: >-
    Elements that look similar are perceived as having similar function. If all clickable elements are blue and underlined,
    users know what is clickable. If some clickable elements are blue, some are green, and some look like plain text, users
    cannot predict what is interactive. Visual consistency is not just aesthetic — it is functional communication. Breaking
    similarity breaks expectations and creates errors.
  how_to_apply: >-
    1. All primary actions share the same visual style (color, size, shape). 2. All links look the same (color + underline
    or distinct style). 3. All disabled states look the same (grayed out, no pointer cursor). 4. Use consistent iconography
    (same icon set, same size, same stroke width). 5. Interactive elements look different from decorative elements. 6. Status
    indicators use consistent color coding (green=good, yellow=warning, red=error).
  mental_model: >-
    Traffic signs — all stop signs are red octagons, all yield signs are yellow triangles. You can identify the meaning from
    shape and color before reading the text.
  domains:
    domain:
    - architecture
    - ui
    concern:
    - frontend
    - design_system
    - interaction_design
  violation_consequence: Users click non-interactive elements, miss interactive elements, inconsistent mental model, longer
    learning curve.
  teaching_example: >-
    Good: All buttons are rounded, filled, with consistent padding. Links are always blue + underlined. Bad: Some buttons
    are outlined, some are text-only, some are filled — user can't predict which elements are clickable.
  when_applies: Any system involving user-facing interfaces (web, mobile, or desktop)
  when_not_applies: headless services, APIs, CLIs, or backend-only systems
  sources:
  - https://lawsofux.com/law-of-similarity/
  text: 'Gestalt Principle of Similarity: Traffic signs — all stop signs are red octagons, all yield signs are yellow triangles.'
  severity: low
  technologies:
    lang:
    - javascript
    - css
    - html
  how_to_do_right: >-
    1. All primary actions share the same visual style (color, size, shape). 2. All links look the same (color + underline
    or distinct style). 3. All disabled states look the same (grayed out, no pointer cursor). 4. Use consistent iconography
    (same icon set, same size, same stroke width). 5. Interactive elements look different from decorative elements. 6. Status
    indicators use consistent color coding (green=good, yellow=warning, red=error).
  example_good: |-
    # Good: All buttons are rounded, filled, with consistent padding.
    # Links are always blue + underlined.
    # Bad: Some buttons are outlined, some are text-only, some are filled — user can't predict which elements are clickable.
  example_bad: |-
    # Anti-pattern: Violating Gestalt Principle of Similarity
    # Result: Users click non-interactive elements
    # Result: miss interactive elements
- id: P-UX-GESTALT-CLOSURE
  name: Gestalt Principle of Closure
  why: >-
    The brain fills in missing information to perceive complete shapes. This allows interfaces to suggest structure without
    drawing every border. Loading skeleton screens exploit closure — gray rectangles suggest content is coming. Progress indicators
    with gaps (step 1 ● — step 2 ○ — step 3 ○) are understood as a sequence because the brain closes the pattern. Using closure
    reduces visual clutter while maintaining perceived structure.
  how_to_apply: >-
    1. Use skeleton screens during loading (gray shapes where content will appear). 2. Use step indicators with dots/lines
    for multi-step processes. 3. Cards don't always need full borders — shadow or background color implies boundaries. 4.
    Tables can use alternating row colors instead of grid lines. 5. Use ellipsis (...) to indicate truncated content that
    continues. 6. Partially visible items at list edges imply scrollability.
  mental_model: A circle drawn with a gap — you still see a circle, not an arc. The brain completes the shape automatically.
  domains:
    domain:
    - architecture
    - ui
    concern:
    - frontend
    - layout
    - loading_states
  violation_consequence: >-
    Without closure cues, users don't understand content structure, don't realize lists scroll, don't perceive loading states
    as temporary.
  teaching_example: >-
    Skeleton screen: Gray rectangles shaped like text lines + circles shaped like avatars = user knows a user list is loading.
    Step wizard: ●—○—○ clearly shows 3 steps, current position, and remaining work.
  when_applies: Any system involving user-facing interfaces (web, mobile, or desktop)
  when_not_applies: headless services, APIs, CLIs, or backend-only systems
  sources:
  - https://lawsofux.com/law-of-closure/
  text: 'Gestalt Principle of Closure: A circle drawn with a gap — you still see a circle, not an arc.'
  severity: low
  technologies:
    lang:
    - javascript
    - css
    - html
  how_to_do_right: >-
    1. Use skeleton screens during loading (gray shapes where content will appear). 2. Use step indicators with dots/lines
    for multi-step processes. 3. Cards don't always need full borders — shadow or background color implies boundaries. 4.
    Tables can use alternating row colors instead of grid lines. 5. Use ellipsis (...) to indicate truncated content that
    continues. 6. Partially visible items at list edges imply scrollability.
  example_good: |-
    # Skeleton screen: Gray rectangles shaped like text lines + circles shaped like avatars = user knows a user list is loading.
    # Step wizard: ●—○—○ clearly shows 3 steps, current position, and remaining work.
  example_bad: |-
    # Anti-pattern: Violating Gestalt Principle of Closure
    # Result: Without closure cues
    # Result: users don\'t understand content structure
- id: P-UX-GESTALT-CONTINUITY
  name: Gestalt Principle of Continuity
  why: >-
    The eye follows the smoothest path. Elements arranged in a line or curve are perceived as related and part of a sequence.
    Interrupting a visual flow (misaligned elements, broken lines, inconsistent spacing) creates jarring discontinuity that
    disrupts scanning. This is why consistent vertical alignment in forms and consistent horizontal rhythm in grids matters
    — the eye should flow without interruption.
  how_to_apply: >-
    1. Left-align form labels consistently (don't mix left and right alignment). 2. Use consistent column grids (12-column
    for desktop, 4-column for mobile). 3. Align elements to a baseline grid for vertical rhythm. 4. Timelines and process
    flows should use smooth lines connecting steps. 5. Navigation items should be evenly spaced. 6. Text paragraphs should
    have consistent line-height and spacing.
  mental_model: >-
    Road lane markings — even dashed lines are perceived as a continuous lane because the eye follows the smoothest path through
    the gaps.
  domains:
    domain:
    - architecture
    - ui
    concern:
    - frontend
    - layout
    - typography
  violation_consequence: Misaligned elements feel 'sloppy', users scan inefficiently, visual hierarchy breaks, professional
    perception drops.
  teaching_example: >-
    Good: Form fields all aligned to the same left edge, labels above each field. Bad: Labels randomly indented, fields different
    widths, checkboxes misaligned — the eye zigzags instead of flowing down.
  when_applies: Any system involving user-facing interfaces (web, mobile, or desktop)
  when_not_applies: headless services, APIs, CLIs, or backend-only systems
  sources:
  - https://lawsofux.com/law-of-common-region/
  text: >-
    Gestalt Principle of Continuity: Road lane markings — even dashed lines are perceived as a continuous lane because the
    eye follows the smoothest path through the gaps.
  severity: low
  technologies:
