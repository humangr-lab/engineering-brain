    severity: high
    technologies:
      lang: [javascript, react, css]
    domains:
      domain: [usability, axiom]
      concern: [foundational, principle]
    example_good: |
      <!-- Consistent placement matches mental model -->
      <dialog>
        <button class="cancel">Cancel</button>
        <button class="confirm">Save</button>
      </dialog>
    example_bad: |
      <!-- Inconsistent: Save is sometimes left, sometimes right -->
      <dialog>
        <button>Save</button>
        <button>Cancel</button>
      </dialog>
    when_applies: "User interfaces, API design, developer experience, documentation."
    sources: ["https://www.nngroup.com/articles/mental-models/"]

