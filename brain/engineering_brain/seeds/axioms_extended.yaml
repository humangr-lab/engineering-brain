  - id: AX-DIST-001
    statement: 'In a distributed system, exactly-once delivery is impossible — systems must be designed for at-least-once with idempotency.'
    domain: distributed
    formal_notation: '¬∃ protocol P: guarantees(P, exactly_once); use(at_least_once ∧ idempotent)'
    text: 'In a distributed system, exactly-once delivery is impossible — systems must be designed for at-least-once with idempotency.'
    why: "This axiom is foundational because violating it leads to subtle, hard-to-diagnose failures that compound over time in distributed systems."
    how_to_do_right: |
      1. Understand the axiom and its formal basis in distributed
      2. Audit existing code for violations of this axiom
      3. Add automated checks (linters, type checkers, tests) that enforce it
      4. Document the axiom in your team engineering principles
      5. Review new code changes against this axiom during code review
    severity: high
    technologies:
      lang: [python, java, go]
    domains:
      domain: [distributed, axiom]
      concern: [foundational, principle]
    example_good: |
      # Idempotent with dedup key
      @app.post("/api/orders")
      def create_order(req, idempotency_key: str):
          if cache.get(idempotency_key):
              return cached_response  # Safe to retry
    example_bad: |
      # Non-idempotent: retry creates duplicate
      @app.post("/api/orders")
      def create_order(req):
          db.insert(order)  # Retry = duplicate order
    when_applies: "Microservice communication, message queues, remote procedure calls."
    sources: ["https://dl.acm.org/doi/10.1145/3477132.3483552"]

