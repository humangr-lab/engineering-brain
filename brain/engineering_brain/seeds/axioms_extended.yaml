  - id: AX-ABSTR-001
    statement: 'All abstractions leak — at some point, the underlying reality must be understood to debug, optimize, or extend.'
    domain: architecture
    formal_notation: '∀ abstraction a, ∃ scenario s: leak(a, s) ∧ requires(understanding(impl(a)))'
    text: 'All abstractions leak — at some point, the underlying reality must be understood to debug, optimize, or extend.'
    why: "This axiom is foundational because violating it leads to subtle, hard-to-diagnose failures that compound over time in architecture systems."
