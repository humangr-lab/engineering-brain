  - id: AX-REL-001
    statement: 'Everything fails eventually — systems must be designed for graceful degradation, not perfection.'
    domain: reliability
    formal_notation: '∀ component(c), ∃ t: fails(c, t); design_for(degradation) ¬ design_for(perfection)'
    text: 'Everything fails eventually — systems must be designed for graceful degradation, not perfection.'
    why: "This axiom is foundational because violating it leads to subtle, hard-to-diagnose failures that compound over time in reliability systems."
    how_to_do_right: |
      1. Understand the axiom and its formal basis in reliability
      2. Audit existing code for violations of this axiom
      3. Add automated checks (linters, type checkers, tests) that enforce it
      4. Document the axiom in your team engineering principles
      5. Review new code changes against this axiom during code review
    severity: high
    technologies:
      lang: [python, go]
    domains:
      domain: [reliability, axiom]
      concern: [foundational, principle]
    example_good: |
      def get_data(primary, fallback):
          try:
              return primary.fetch()
          except ServiceDown:
              return fallback.fetch()  # Graceful degradation
    example_bad: |
      def get_data(primary):
          return primary.fetch()  # No fallback
          # Primary down = total system failure
    when_applies: "Production services, SLA-bound systems, user-facing applications."
    sources: ["https://sre.google/sre-book/embracing-risk/"]

