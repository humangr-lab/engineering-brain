  - id: AX-COST-001
    statement: 'Marginal cost per operation approaches zero but aggregate cost grows super-linearly with scale — O(1) unit costs create O(N log N) or O(N²) system costs due to coordination overhead.'
    domain: efficiency
    formal_notation: 'unit_cost → ε as N → ∞; total_cost = N × unit_cost + coordination(N) where coordination ∈ Ω(N log N)'
    text: 'Marginal cost per operation approaches zero but aggregate cost grows super-linearly with scale — O(1) unit costs create O(N log N) or O(N²) system costs due to coordination overhead.'
    why: "This axiom is foundational because violating it leads to subtle, hard-to-diagnose failures that compound over time in efficiency systems."
    how_to_do_right: |
      1. Understand the axiom and its formal basis in efficiency
      2. Audit existing code for violations of this axiom
      3. Add automated checks (linters, type checkers, tests) that enforce it
      4. Document the axiom in your team engineering principles
      5. Review new code changes against this axiom during code review
    severity: high
    technologies:
      lang: [python]
    domains:
      domain: [efficiency, axiom]
      concern: [foundational, principle]
    example_good: |
      unit_cost = compute_cost / num_operations
      total_cost = unit_cost * N + coordination(N)
      log_metrics(unit=unit_cost, total=total_cost)
    example_bad: |
      unit_cost = compute_cost / num_operations
      # Ignore coordination overhead
      # Total grows O(N^2) unnoticed
    when_applies: "Cost optimization, resource allocation, capacity planning."
    sources: ["https://sre.google/sre-book/service-level-objectives/"]

