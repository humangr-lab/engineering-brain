  - id: AX-TEST-001
    statement: 'A test that cannot fail provides zero information — tests must be falsifiable to have value.'
    domain: testing
    formal_notation: '∀ test(t), ∃ input(x): t(x) = FAIL ∨ t is trivial'
    text: 'A test that cannot fail provides zero information — tests must be falsifiable to have value.'
