  - id: AX-DB-001
    statement: 'Reads and writes have fundamentally different scaling characteristics — read replicas scale horizontally, writes require consensus.'
    domain: database
    formal_notation: 'scale(read) = O(N_replicas); scale(write) = O(consensus(N))'
    text: 'Reads and writes have fundamentally different scaling characteristics — read replicas scale horizontally, writes require consensus.'
    why: "This axiom is foundational because violating it leads to subtle, hard-to-diagnose failures that compound over time in database systems."
    how_to_do_right: |
      1. Understand the axiom and its formal basis in database
      2. Audit existing code for violations of this axiom
      3. Add automated checks (linters, type checkers, tests) that enforce it
      4. Document the axiom in your team engineering principles
      5. Review new code changes against this axiom during code review
    severity: high
    technologies:
      lang: [python, sql, postgresql]
    domains:
      domain: [database, axiom]
      concern: [foundational, principle]
    example_good: |
      # Read replica for queries, primary for writes
      read_db = create_engine(READ_REPLICA_URL)
      write_db = create_engine(PRIMARY_URL)
    example_bad: |
      # All queries hit primary, no scaling
      db = create_engine(PRIMARY_URL)
      # Reads and writes compete for same resources
    when_applies: "Schema design, query optimization, data access patterns, migrations."
    sources: ["https://martinfowler.com/articles/patterns-of-distributed-systems/replicated-log.html"]

