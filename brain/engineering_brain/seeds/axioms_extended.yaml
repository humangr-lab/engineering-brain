  - id: AX-UX-001
    statement: 'Users form mental models — interfaces that violate mental models cause errors, regardless of technical correctness.'
    domain: usability
    formal_notation: 'error_rate ∝ |mental_model(user) - behavior(system)|'
    text: 'Users form mental models — interfaces that violate mental models cause errors, regardless of technical correctness.'
    why: "This axiom is foundational because violating it leads to subtle, hard-to-diagnose failures that compound over time in usability systems."
    how_to_do_right: |
