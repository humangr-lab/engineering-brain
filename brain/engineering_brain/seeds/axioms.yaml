- id: AX-STATE-002
  statement: Every state transition must be atomic — partial updates create invalid intermediate states.
  domain: state_management
  formal_notation: transition(S₁ → S₂) is atomic ∨ S remains S₁
  text: "Every state transition must be atomic — partial updates create invalid intermediate states."
  why: "This axiom is foundational because violating it leads to subtle, hard-to-diagnose failures that compound over time in state_management systems."
  how_to_do_right: |
    1. Understand the axiom and its formal basis in state_management
    2. Audit existing code for violations of this axiom
    3. Add automated checks (linters, type checkers, tests) that enforce it
    4. Document the axiom in your team engineering principles
    5. Review new code changes against this axiom during code review
  severity: high
  technologies:
    lang: [python, javascript, react]
  domains:
    domain: [state_management, axiom]
    concern: [foundational, principle]
  example_good: |
    # Atomic state update
    new_state = {**old_state, "count": old_state["count"] + 1}
    set_state(new_state)  # Single update, consistent
  example_bad: |
    state["count"] += 1  # Step 1
    state["total"] = calc(state["count"])  # Step 2
    # Crash between steps = inconsistent state
  when_applies: "State transitions, form handling, game state, real-time UI updates."

  sources:
