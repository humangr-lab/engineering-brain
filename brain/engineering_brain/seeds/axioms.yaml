- id: AX-SEC-001
  statement: Security boundaries must be enforced at the system boundary, not at internal layers — trust nothing from outside.
  domain: security
  formal_notation: ∀ input ∈ external, validate(input) before process(input)
  text: "Security boundaries must be enforced at the system boundary, not at internal layers — trust nothing from outside."
