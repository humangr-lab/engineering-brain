- id: AX-COMM-001
  statement: Interfaces are contracts — changing an interface breaks all consumers unless versioned.
  domain: api_design
  formal_notation: change(interface) ⟹ ∀ consumer(c), update(c) ∨ break(c)
  text: "Interfaces are contracts — changing an interface breaks all consumers unless versioned."
  why: "This axiom is foundational because violating it leads to subtle, hard-to-diagnose failures that compound over time in api_design systems."
  how_to_do_right: |
    1. Understand the axiom and its formal basis in api_design
    2. Audit existing code for violations of this axiom
    3. Add automated checks (linters, type checkers, tests) that enforce it
    4. Document the axiom in your team engineering principles
    5. Review new code changes against this axiom during code review
  severity: high
  technologies:
    lang: [python, typescript]
  domains:
    domain: [api_design, axiom]
    concern: [foundational, principle]
  example_good: |
    # Versioned API: v1 remains stable
    @app.get("/api/v1/users/{id}")
    def get_user(id: int): ...
    
    @app.get("/api/v2/users/{id}")  # New version
    def get_user_v2(id: int): ...
  example_bad: |
    # Unversioned: changing response breaks all consumers
    @app.get("/api/users/{id}")
    def get_user(id: int):
        return {"name": user.name}  # Was {"username": ...}
  when_applies: "Public APIs, library interfaces, service contracts, versioned endpoints."

  sources:
  - https://martinfowler.com/articles/consumerDrivenContracts.html
- id: AX-COMM-002
  statement: Network calls can fail, be slow, or return unexpected data — every remote call needs timeout, retry, and validation.
  domain: distributed
  formal_notation: remote_call(x) ∈ {success(v), timeout, error(e), unexpected(v')}
  text: "Network calls can fail, be slow, or return unexpected data — every remote call needs timeout, retry, and validation."
  why: "This axiom is foundational because violating it leads to subtle, hard-to-diagnose failures that compound over time in distributed systems."
  how_to_do_right: |
    1. Understand the axiom and its formal basis in distributed
