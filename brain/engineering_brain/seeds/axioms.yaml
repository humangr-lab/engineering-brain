- id: AX-CORRECT-002
  statement: Every error must be handled explicitly — silenced errors create invisible failure modes.
  domain: error_handling
  formal_notation: ∀ error(e), handle(e) ∨ propagate(e); ¬(silence(e))
  text: "Every error must be handled explicitly — silenced errors create invisible failure modes."
  why: "This axiom is foundational because violating it leads to subtle, hard-to-diagnose failures that compound over time in error_handling systems."
