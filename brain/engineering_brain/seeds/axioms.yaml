- id: AX-TYPE-001
  statement: A function's type signature is a contract — inputs and outputs must match at every call site.
  domain: type_theory
  formal_notation: 'f: A → B ⟹ ∀a∈A, f(a) ∈ B'
  text: "A function's type signature is a contract — inputs and outputs must match at every call site."
  why: "This axiom is foundational because violating it leads to subtle, hard-to-diagnose failures that compound over time in type_theory systems."
  how_to_do_right: |
    1. Understand the axiom and its formal basis in type_theory
    2. Audit existing code for violations of this axiom
    3. Add automated checks (linters, type checkers, tests) that enforce it
    4. Document the axiom in your team engineering principles
    5. Review new code changes against this axiom during code review
  severity: high
  technologies:
    lang: [python, typescript, rust]
  domains:
    domain: [type_theory, axiom]
    concern: [foundational, principle]
  example_good: |
    def greet(name: str) -> str:
        return f"Hello, {name}"
    
    result: str = greet("Alice")  # Type-safe
  example_bad: |
    def greet(name):
        return "Hello, " + name  # No types, crashes on int
    
    result = greet(42)  # Runtime error
  when_applies: "All code with function signatures, variable declarations, and API boundaries."

  sources:
  - https://en.wikipedia.org/wiki/Type_theory
