- id: AX-CORRECT-001
  statement: Code that is never tested is code that doesn't work — the absence of evidence of bugs is not evidence of absence.
  domain: testing
  formal_notation: ¬tested(f) ⟹ ¬verified(f)
  text: "Code that is never tested is code that doesn't work — the absence of evidence of bugs is not evidence of absence."
  why: "This axiom is foundational because violating it leads to subtle, hard-to-diagnose failures that compound over time in testing systems."
  how_to_do_right: |
    1. Understand the axiom and its formal basis in testing
    2. Audit existing code for violations of this axiom
    3. Add automated checks (linters, type checkers, tests) that enforce it
    4. Document the axiom in your team engineering principles
    5. Review new code changes against this axiom during code review
  severity: high
  technologies:
    lang: [python, javascript]
  domains:
    domain: [testing, axiom]
    concern: [foundational, principle]
  example_good: |
