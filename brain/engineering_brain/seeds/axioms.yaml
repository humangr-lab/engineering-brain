- id: AX-CORRECT-003
  statement: A function with side effects is not referentially transparent — side effects must be documented and controlled.
  domain: functional
  formal_notation: pure(f) ⟺ f(x) = f(x) ∧ no_side_effects(f)
  text: "A function with side effects is not referentially transparent — side effects must be documented and controlled."
  why: "This axiom is foundational because violating it leads to subtle, hard-to-diagnose failures that compound over time in functional systems."
  how_to_do_right: |
    1. Understand the axiom and its formal basis in functional
    2. Audit existing code for violations of this axiom
    3. Add automated checks (linters, type checkers, tests) that enforce it
    4. Document the axiom in your team engineering principles
    5. Review new code changes against this axiom during code review
  severity: high
  technologies:
    lang: [python, haskell]
  domains:
    domain: [functional, axiom]
    concern: [foundational, principle]
  example_good: |
    def add(a: int, b: int) -> int:
        return a + b  # Pure: no side effects
    
    assert add(2, 3) == add(2, 3)  # Referentially transparent
  example_bad: |
    total = 0
    def add_to_total(x):
        global total
        total += x  # Side effect: modifies global
        return total  # Not referentially transparent
  when_applies: "Pure computations, data transformations, business logic without side effects."

  sources:
  - https://wiki.haskell.org/Referential_transparency
- id: AX-ARCH-001
  statement: Coupling between modules should be minimized — changes in one module should not cascade to unrelated modules.
  domain: architecture
  formal_notation: '∀ modules M₁,M₂: change(M₁) → ¬change(M₂) unless dep(M₁,M₂)'
  text: "Coupling between modules should be minimized — changes in one module should not cascade to unrelated modules."
  why: "This axiom is foundational because violating it leads to subtle, hard-to-diagnose failures that compound over time in architecture systems."
  how_to_do_right: |
    1. Understand the axiom and its formal basis in architecture
    2. Audit existing code for violations of this axiom
    3. Add automated checks (linters, type checkers, tests) that enforce it
    4. Document the axiom in your team engineering principles
    5. Review new code changes against this axiom during code review
  severity: high
  technologies:
    lang: [python, java, typescript]
  domains:
    domain: [architecture, axiom]
    concern: [foundational, principle]
  example_good: |
    # Low coupling: modules communicate via interfaces
    class OrderService:
        def __init__(self, repo: OrderRepository):
            self.repo = repo  # Depends on abstraction
  example_bad: |
    # High coupling: direct dependency on implementation
    class OrderService:
        def __init__(self):
            self.db = PostgresDB()  # Hardcoded, untestable
  when_applies: "Module design, dependency management, system decomposition."

  sources:
