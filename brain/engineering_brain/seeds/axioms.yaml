- id: AX-STATE-001
  statement: Shared mutable state is the root cause of race conditions, stale reads, and inconsistent behavior.
  domain: concurrency
  formal_notation: ∀ shared_mut(s), ∃ execution_order(e₁,e₂) → inconsistent(s)
  text: "Shared mutable state is the root cause of race conditions, stale reads, and inconsistent behavior."
  why: "This axiom is foundational because violating it leads to subtle, hard-to-diagnose failures that compound over time in concurrency systems."
  how_to_do_right: |
    1. Understand the axiom and its formal basis in concurrency
    2. Audit existing code for violations of this axiom
    3. Add automated checks (linters, type checkers, tests) that enforce it
    4. Document the axiom in your team engineering principles
    5. Review new code changes against this axiom during code review
  severity: high
  technologies:
    lang: [python, java, go]
  domains:
    domain: [concurrency, axiom]
    concern: [foundational, principle]
  example_good: |
    from threading import Lock
    
    lock = Lock()
    with lock:
        shared_counter += 1  # Synchronized access
  example_bad: |
    # No synchronization
    shared_counter += 1  # Race condition
    # Two threads read 5, both write 6, lost update
  when_applies: "Any code with shared mutable state, multi-threading, or parallel execution."

  sources:
