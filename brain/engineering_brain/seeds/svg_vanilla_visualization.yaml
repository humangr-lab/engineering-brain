layer: rules
domain: general
knowledge:
- id: SVG-001
  text: >
    Always set viewBox on the <svg> element and never set fixed pixel width/height on the element
    itself (use CSS width: 100% instead). viewBox="0 0 800 600" defines the internal coordinate
    system independently of the rendered size — this is the foundation of resolution-independent SVG.
  why: >
    An SVG without viewBox is not scalable: it renders at its hardcoded pixel dimensions and
    cannot be resized without distortion. A fixed width="800" on the SVG element breaks
    responsive layouts on mobile. The viewBox defines a user-coordinate system that the browser
    maps to any rendered size — enabling the same SVG to render crisply at 200px or 4000px.
    This is the #1 SVG mistake made by developers unfamiliar with the spec.
  how_to_do_right: |
    1. Define viewBox as "minX minY width height": viewBox="0 0 800 600"
    2. Set CSS: svg { width: 100%; height: auto; } — never inline width/height in pixels.
    3. preserveAspectRatio defaults to "xMidYMid meet" — this centers and fits content.
       For data visualizations that must fill the container: preserveAspectRatio="none".
    4. When computing positions programmatically, work in viewBox coordinates (0–800),
       not CSS pixels — let the browser handle the mapping.
    5. Use getBoundingClientRect() to get the rendered size; use getScreenCTM() to convert
       mouse event coordinates to SVG viewBox coordinates.
  severity: high
  technologies:
    lang: [javascript, typescript, html, css]
  domains:
    domain: [svg, visualization, frontend]
    concern: [responsive_svg, coordinate_system, viewBox]
  example_good: |
    <!-- Responsive SVG: scales to any container size -->
    <svg
      viewBox="0 0 800 600"
      xmlns="http://www.w3.org/2000/svg"
      role="img"
      aria-labelledby="chart-title"
      style="width: 100%; height: auto; display: block;"
    >
      <title id="chart-title">Network topology diagram</title>
      <!-- All positions in viewBox coords (0–800 x, 0–600 y) -->
      <circle cx="400" cy="300" r="50" fill="#005fcc" />
    </svg>

    // Convert mouse click to SVG coordinates
    function svgPoint(svgEl: SVGSVGElement, clientX: number, clientY: number) {
      const pt = svgEl.createSVGPoint();
      pt.x = clientX;
      pt.y = clientY;
      return pt.matrixTransform(svgEl.getScreenCTM()!.inverse());
    }
  example_bad: |
    <!-- Fixed size — breaks responsive layouts, not scalable -->
    <svg width="800" height="600">
      <!-- No viewBox: this SVG is always 800×600 CSS pixels -->
      <!-- On a 375px mobile viewport, it overflows and requires scrolling -->
      <circle cx="400" cy="300" r="50" />
    </svg>
  when_applies: Every SVG element embedded in a web page, especially data visualizations and diagrams
  sources:
    - "https://developer.mozilla.org/en-US/docs/Web/SVG/Attribute/viewBox"
    - "https://www.w3.org/TR/SVG11/coords.html#ViewBoxAttribute"

- id: SVG-002
  text: >
    SVG path command reference: M/m (moveTo), L/l (lineTo), C/c (cubic bezier),
    Q/q (quadratic bezier), A/a (arc), Z/z (closePath). Use uppercase for absolute
    coordinates, lowercase for relative. Choose commands based on the shape: C for
    smooth curves, Q for simpler curves, A for circles/sectors.
  why: >
    Choosing the wrong path command produces incorrect shapes or unnecessarily complex path data.
    A developer who uses L (straight lines) to approximate curves creates jagged polygons.
    A developer who uses C (cubic) for a simple arc creates 6 control points where 3 would
    suffice with A. Each command has an optimal use case; misuse increases path length,
    reduces editability, and can introduce rendering artifacts on some SVG engines.
  how_to_do_right: |
    1. M x y — Move the "pen" to (x,y) without drawing. Start every path with M.
    2. L x y — Draw a straight line to (x,y).
    3. H x — Horizontal line to x. V y — Vertical line to y.
    4. C cx1 cy1 cx2 cy2 x y — Cubic bezier: 2 control points (cx1,cy1) and (cx2,cy2), endpoint (x,y).
    5. Q cx cy x y — Quadratic bezier: 1 control point (cx,cy), endpoint (x,y).
    6. A rx ry x-rot large-arc-flag sweep-flag x y — Arc: ellipse radii, rotation, flags, endpoint.
    7. Z — Close path (draw line back to the last M point).
    Rule: Use Q when you need a simple curve with one control point.
    Use C when you need precise control over the curve's tangent at both endpoints.
    Use A for arcs, circles, and pie/donut chart segments.
  severity: medium
  technologies:
    lang: [javascript, typescript, svg]
  domains:
    domain: [svg, visualization]
    concern: [path_commands, bezier_curves, shape_drawing]
  example_good: |
    // Pie chart segment using A (arc) — correct approach
    function describeArc(cx: number, cy: number, r: number, startAngle: number, endAngle: number): string {
      const toRad = (deg: number) => (deg - 90) * (Math.PI / 180);
      const x1 = cx + r * Math.cos(toRad(startAngle));
      const y1 = cy + r * Math.sin(toRad(startAngle));
      const x2 = cx + r * Math.cos(toRad(endAngle));
      const y2 = cy + r * Math.sin(toRad(endAngle));
      const largeArc = endAngle - startAngle > 180 ? 1 : 0;
      return `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2} Z`;
    }

    // Edge between two nodes using C (cubic bezier) — smooth curve
    function edgePath(x1: number, y1: number, x2: number, y2: number): string {
      const midX = (x1 + x2) / 2;
      // Control points: pull 80px toward vertical midpoint for smooth S-curve
      return `M ${x1} ${y1} C ${midX} ${y1} ${midX} ${y2} ${x2} ${y2}`;
    }
  example_bad: |
    // Approximating a circle with many L commands — jagged and inaccurate
    function badCircle(cx: number, cy: number, r: number, points = 16): string {
      const angles = Array.from({ length: points }, (_, i) => (i / points) * 2 * Math.PI);
      const coords = angles.map(a => `${cx + r * Math.cos(a)},${cy + r * Math.sin(a)}`);
      return `M ${coords[0]} L ${coords.slice(1).join(' L ')} Z`;
      // 32 numbers instead of using <circle> or A commands — bloated and wrong shape
    }
  when_applies: Any time SVG paths are generated programmatically for charts, diagrams, or illustrations
  sources:
    - "https://developer.mozilla.org/en-US/docs/Web/SVG/Tutorials/SVG_from_scratch/Paths"
    - "https://www.smashingmagazine.com/2025/06/decoding-svg-path-element-curve-arc-commands/"

- id: SVG-003
  text: >
    Draw cubic bezier edges between nodes using C command with horizontal control points
    (for left-right graphs) or vertical control points (for top-bottom trees).
    The control point horizontal offset should be 40–60% of the horizontal distance
    between nodes for natural-looking curves.
  why: >
    Graph visualizations (node-link diagrams, org charts, flow graphs) require curved edges
    to distinguish overlapping paths. Straight lines (L command) cross through nodes and
    create visual confusion when many edges overlap. A cubic bezier with well-chosen
    control points creates a smooth S-curve that separates parallel edges visually.
    The 40–60% rule produces curves that feel natural — matching how designers hand-draw
    flow diagrams.
  how_to_do_right: |
    1. For left-right directed graphs:
       Control point 1: (x1 + offset, y1)  — pull right from source
       Control point 2: (x2 - offset, y2)  — pull left from target
       where offset = 0.5 * abs(x2 - x1)
    2. For top-down trees:
       Control point 1: (x1, y1 + offset)
       Control point 2: (x2, y2 - offset)
       where offset = 0.5 * abs(y2 - y1)
    3. For self-loops: use Q or C with a control point 60px above the node center.
    4. Add an arrowhead using SVG <marker> element — do not draw triangle manually.
    5. On node position change, recompute only edges connected to that node (not all edges).
  severity: medium
  technologies:
    lang: [javascript, typescript, svg]
  domains:
    domain: [svg, graph_visualization, frontend]
    concern: [edge_drawing, bezier_curves, graph_layout]
  example_good: |
    // Reusable edge path function for directed graph
    interface NodePos { x: number; y: number; }

    function cubicEdgePath(source: NodePos, target: NodePos): string {
      const dx = target.x - source.x;
      const offset = Math.abs(dx) * 0.5; // 50% of horizontal distance
      const cp1x = source.x + offset;
      const cp2x = target.x - offset;
      return `M ${source.x} ${source.y} C ${cp1x} ${source.y} ${cp2x} ${target.y} ${target.x} ${target.y}`;
    }

    // SVG arrowhead marker — define once, reuse on every edge
    const svgDefs = `
      <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7"
                refX="10" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#555" />
        </marker>
      </defs>
    `;

    // Edge element
    function createEdge(svgEl: SVGSVGElement, source: NodePos, target: NodePos) {
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', cubicEdgePath(source, target));
      path.setAttribute('fill', 'none');
      path.setAttribute('stroke', '#555');
      path.setAttribute('stroke-width', '2');
      path.setAttribute('marker-end', 'url(#arrowhead)');
      svgEl.appendChild(path);
      return path;
    }
  example_bad: |
    // Straight lines for edges — confusing when paths cross
    function badEdge(source: NodePos, target: NodePos): string {
      return `M ${source.x} ${source.y} L ${target.x} ${target.y}`;
      // All edges are straight — overlapping edges are indistinguishable
      // Dense graphs become completely unreadable
    }
  when_applies: Graph, tree, flowchart, and network diagram visualizations in SVG
  sources:
    - "https://developer.mozilla.org/en-US/docs/Web/SVG/Element/marker"
    - "https://www.joshwcomeau.com/svg/interactive-guide-to-paths/"

- id: SVG-004
  text: >
    Implement SVG pan and zoom using a transform matrix on a wrapper <g> element.
    Never modify viewBox for pan/zoom interaction — it reflows all coordinate calculations.
    Apply transforms as matrix(a,b,c,d,e,f) for sub-pixel precision.
  why: >
    Modifying the viewBox attribute on every mouse move triggers SVG re-rendering and
    coordinate recalculation in the browser — this causes jank at 60fps. Applying a CSS
    transform or SVG transform matrix on a container <g> element is GPU-composited and
    runs off the main thread. Matrix transform is also more precise than translate(x,y) scale(s)
    because it avoids floating-point accumulation errors across many small incremental updates.
  how_to_do_right: |
    1. Wrap all content in: <g id="viewport">...</g>
    2. Store transform as a DOMMatrix object.
    3. On pan (mousemove): matrix.e += dx; matrix.f += dy
    4. On zoom (wheel): scale around cursor point by:
       a. Translate to cursor point
       b. Scale
       c. Translate back
    5. Apply with: g.setAttribute('transform', `matrix(${m.a},${m.b},${m.c},${m.d},${m.e},${m.f})`)
    6. Set cursor: 'grab' on the SVG, 'grabbing' while panning.
    7. Clamp scale between 0.1 and 10 to prevent disorientation.
  severity: medium
  technologies:
    lang: [javascript, typescript, svg]
  domains:
    domain: [svg, visualization, interaction]
    concern: [pan_zoom, transform_matrix, performance]
  example_good: |
    class SVGPanZoom {
      private svg: SVGSVGElement;
      private viewport: SVGGElement;
      private matrix: DOMMatrix;
      private isPanning = false;
      private lastPan = { x: 0, y: 0 };

      constructor(svgEl: SVGSVGElement, viewportEl: SVGGElement) {
        this.svg = svgEl;
        this.viewport = viewportEl;
        this.matrix = new DOMMatrix();
        this.bindEvents();
      }

      private applyMatrix() {
        const { a, b, c, d, e, f } = this.matrix;
        this.viewport.setAttribute('transform', `matrix(${a},${b},${c},${d},${e},${f})`);
      }

      private zoom(scaleFactor: number, originX: number, originY: number) {
        const scale = Math.max(0.1, Math.min(10, this.matrix.a * scaleFactor));
        const actualFactor = scale / this.matrix.a;
        // Zoom toward cursor point
        this.matrix.e = originX - actualFactor * (originX - this.matrix.e);
        this.matrix.f = originY - actualFactor * (originY - this.matrix.f);
        this.matrix.a = this.matrix.d = scale;
        this.applyMatrix();
      }

      private bindEvents() {
        this.svg.addEventListener('wheel', (e) => {
          e.preventDefault();
          const factor = e.deltaY < 0 ? 1.1 : 0.9;
          this.zoom(factor, e.clientX, e.clientY);
        }, { passive: false });

        this.svg.addEventListener('mousedown', (e) => {
          this.isPanning = true;
          this.lastPan = { x: e.clientX, y: e.clientY };
          this.svg.style.cursor = 'grabbing';
        });

        this.svg.addEventListener('mousemove', (e) => {
          if (!this.isPanning) return;
          this.matrix.e += e.clientX - this.lastPan.x;
          this.matrix.f += e.clientY - this.lastPan.y;
          this.lastPan = { x: e.clientX, y: e.clientY };
          this.applyMatrix();
        });

        this.svg.addEventListener('mouseup', () => {
          this.isPanning = false;
          this.svg.style.cursor = 'grab';
        });
      }
    }
  example_bad: |
    // Modifying viewBox on every mouse move — causes reflow jank
    svg.addEventListener('mousemove', (e) => {
      const [vx, vy, vw, vh] = svg.viewBox.baseVal;
      svg.viewBox.baseVal.x = vx - e.movementX;
      svg.viewBox.baseVal.y = vy - e.movementY;
      // Triggers full SVG coordinate system recalculation on every pixel moved
    });
  when_applies: Any SVG with interactive pan/zoom — graph editors, maps, diagram viewers
  sources:
    - "https://developer.mozilla.org/en-US/docs/Web/API/DOMMatrix"
    - "https://github.com/bumbu/svg-pan-zoom"

- id: SVG-005
  text: >
    Create SVG elements dynamically with document.createElementNS('http://www.w3.org/2000/svg', tagName).
    Never use document.createElement for SVG elements — it creates HTML elements in the wrong
    namespace and SVG attributes will not render.
  why: >
    SVG is an XML vocabulary with its own namespace (http://www.w3.org/2000/svg).
    document.createElement('circle') creates an HTMLElement, not an SVGCircleElement.
    The browser treats it as an unknown HTML element and ignores SVG-specific attributes
    like cx, cy, r, fill. The element appears in the DOM but is invisible — a debugging
    nightmare. This is the most common vanilla SVG mistake and the fix is a single
    namespace string.
  how_to_do_right: |
    1. Always use: document.createElementNS('http://www.w3.org/2000/svg', tagName)
    2. Define SVG_NS as a module-level constant to avoid typos:
       const SVG_NS = 'http://www.w3.org/2000/svg';
    3. For setting attributes: use el.setAttribute('cx', '100') — not el.cx = 100.
    4. For xlink:href (legacy): use setAttributeNS(XLINK_NS, 'href', url).
    5. Prefer textContent over innerHTML for SVG text nodes.
    6. When cloning SVG elements: use el.cloneNode(true) — works cross-namespace.
  severity: critical
  technologies:
    lang: [javascript, typescript]
  domains:
    domain: [svg, frontend]
    concern: [dom_api, svg_namespace, element_creation]
  example_good: |
    const SVG_NS = 'http://www.w3.org/2000/svg';

    function createSVGElement<T extends keyof SVGElementTagNameMap>(tag: T): SVGElementTagNameMap[T] {
      return document.createElementNS(SVG_NS, tag) as SVGElementTagNameMap[T];
    }

    function buildGraph(svgEl: SVGSVGElement, nodes: Array<{id: string; x: number; y: number; label: string}>) {
      const g = createSVGElement('g');
      g.setAttribute('class', 'nodes');

      for (const node of nodes) {
        const group = createSVGElement('g');
        group.setAttribute('data-id', node.id);
        group.setAttribute('transform', `translate(${node.x},${node.y})`);

        const circle = createSVGElement('circle');
        circle.setAttribute('r', '30');
        circle.setAttribute('fill', '#005fcc');

        const text = createSVGElement('text');
        text.setAttribute('text-anchor', 'middle');
        text.setAttribute('dominant-baseline', 'central');
        text.setAttribute('fill', '#fff');
        text.textContent = node.label;

        group.appendChild(circle);
        group.appendChild(text);
        g.appendChild(group);
      }

      svgEl.appendChild(g);
    }
  example_bad: |
    // Wrong namespace — element is created but invisible
    function createNode(x: number, y: number) {
      const circle = document.createElement('circle'); // HTMLElement, not SVGCircleElement
      circle.setAttribute('cx', String(x)); // Attribute set but has no SVG effect
      circle.setAttribute('cy', String(y));
      circle.setAttribute('r', '30');
      circle.setAttribute('fill', 'blue');
      document.querySelector('svg')!.appendChild(circle);
      // Result: nothing renders — circle is in DOM as an unknown HTML element
    }
  when_applies: Any time SVG elements are created programmatically with vanilla JavaScript
  sources:
    - "https://developer.mozilla.org/en-US/docs/Web/API/Document/createElementNS"
    - "https://webhint.io/docs/user-guide/hints/hint-create-element-svg/"

- id: SVG-006
  text: >
    Optimize SVG rendering performance by batching DOM writes with requestAnimationFrame,
    grouping elements that share transforms under a single <g>, and avoiding per-frame
    attribute updates on more than 200 elements.
  why: >
    Updating 1,000 SVG circle positions individually (1,000 setAttribute calls) in a mouse
    handler fires 1,000 DOM mutations that each trigger style recalculation. This causes
    frame drops from 60fps to under 10fps. Batching all updates in a single rAF callback
    reduces recalculations to 1 per frame. Grouping elements under a shared <g transform>
    means moving 100 nodes requires 1 matrix attribute update, not 100 cx/cy updates.
  how_to_do_right: |
    1. Buffer all position changes in a JavaScript object (not the DOM).
    2. Schedule a single rAF callback to flush all changes to the DOM.
    3. Cancel pending rAF before scheduling a new one (avoid double-render).
    4. Group related elements under a <g> — transform the group, not each child.
    5. If element count >500, consider Canvas for the background and SVG for
       interactive foreground elements only (hybrid approach).
    6. Use SVG <use> to reuse complex path shapes (define once, stamp many times).
  severity: high
  technologies:
    lang: [javascript, typescript, svg]
  domains:
    domain: [svg, performance, visualization]
    concern: [rendering_performance, dom_batching, animation]
  example_good: |
    class NodeRenderer {
      private pendingUpdates = new Map<string, { x: number; y: number }>();
      private rafId: number | null = null;
      private nodeElements = new Map<string, SVGGElement>();

      updatePosition(nodeId: string, x: number, y: number) {
        this.pendingUpdates.set(nodeId, { x, y }); // Buffer — don't touch DOM yet
        this.scheduleFlush();
      }

      private scheduleFlush() {
        if (this.rafId !== null) return; // Already scheduled
        this.rafId = requestAnimationFrame(() => {
          this.flush();
          this.rafId = null;
        });
      }

      private flush() {
        for (const [id, pos] of this.pendingUpdates) {
          const el = this.nodeElements.get(id);
          if (el) {
            el.setAttribute('transform', `translate(${pos.x},${pos.y})`); // 1 DOM write per node
          }
        }
        this.pendingUpdates.clear();
      }
    }
  example_bad: |
    // Updating DOM on every mousemove event — causes jank
    svg.addEventListener('mousemove', (e) => {
      selectedNodes.forEach(node => {
        const el = document.getElementById(node.id)!;
        // 1 DOM write per node per mouse event — 60 events/sec * 100 nodes = 6,000 DOM writes/sec
        el.setAttribute('cx', String(e.clientX + node.offsetX));
        el.setAttribute('cy', String(e.clientY + node.offsetY));
      });
    });
  when_applies: SVG visualizations with >50 animated or user-interactive elements
  sources:
    - "https://developer.mozilla.org/en-US/docs/Web/API/window/requestAnimationFrame"
    - "https://web.dev/rendering-performance/"

- id: SVG-007
  text: >
    Handle SVG events with addEventListener on specific elements or the SVG root with
    event delegation. Use pointer-events: none on decorative elements that should not
    capture mouse events. Use pointer-events: all to enable events on filled-none elements.
  why: >
    SVG elements by default capture pointer events only on their visual fill/stroke area.
    A circle with fill="none" will NOT capture click events in the center — only on its
    stroke. This surprises developers who expect click areas to match bounding boxes.
    Conversely, decorative background elements (grid lines, labels) can accidentally
    capture events, blocking the interactive elements beneath them.
  how_to_do_right: |
    1. Interactive nodes: set pointer-events="all" to capture clicks on fill AND stroke.
    2. Labels, decorative lines, backgrounds: set pointer-events="none".
    3. Use event delegation on the SVG root for many similar elements:
       svg.addEventListener('click', e => { const id = e.target.closest('[data-id]')?.dataset.id; })
    4. For drag, use: pointerdown/pointermove/pointerup (not mousedown) + setPointerCapture.
       setPointerCapture ensures mousemove continues even if cursor leaves the element.
    5. Touch events: SVG supports touch via pointermove — no separate touch handler needed.
    6. Hover: use CSS :hover on SVG elements — performant and animation-friendly.
  severity: medium
  technologies:
    lang: [javascript, typescript, svg, css]
  domains:
    domain: [svg, interaction, frontend]
    concern: [event_handling, pointer_events, drag]
  example_good: |
    // Node drag with setPointerCapture — works even when cursor leaves element
    function makeDraggable(nodeEl: SVGGElement, onMove: (x: number, y: number) => void) {
      let startPos = { x: 0, y: 0 };
      let startClient = { x: 0, y: 0 };

      nodeEl.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        nodeEl.setPointerCapture(e.pointerId); // Capture so pointermove fires globally
        const t = new DOMMatrix(nodeEl.getAttribute('transform') ?? '');
        startPos = { x: t.e, y: t.f };
        startClient = { x: e.clientX, y: e.clientY };
      });

      nodeEl.addEventListener('pointermove', (e) => {
        if (!nodeEl.hasPointerCapture(e.pointerId)) return;
        onMove(startPos.x + e.clientX - startClient.x, startPos.y + e.clientY - startClient.y);
      });

      nodeEl.addEventListener('pointerup', (e) => {
        nodeEl.releasePointerCapture(e.pointerId);
      });
    }

    // Event delegation on SVG root
    svgEl.addEventListener('click', (e) => {
      const node = (e.target as Element).closest('[data-node-id]');
      if (node) selectNode(node.getAttribute('data-node-id')!);
    });
  example_bad: |
    // Using mousedown — pointer leaves element during fast drag → drag stops
    nodeEl.addEventListener('mousedown', (e) => {
      const onMove = (e: MouseEvent) => { /* Move logic */ };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', () => document.removeEventListener('mousemove', onMove), { once: true });
      // Fragile: if onMove throws or events get out of sync, listeners leak forever
    });
  when_applies: Any interactive SVG with clickable, hoverable, or draggable elements
  sources:
    - "https://developer.mozilla.org/en-US/docs/Web/API/Element/setPointerCapture"
    - "https://developer.mozilla.org/en-US/docs/Web/CSS/pointer-events"

- id: SVG-008
  text: >
    Implement SVG text using <text> element with text-anchor and dominant-baseline attributes
    for alignment. For multi-line text or HTML content inside SVG, use <foreignObject>.
    Never manually calculate text centering with getBBox() for layout-critical text.
  why: >
    SVG text positioning is notoriously tricky: unlike HTML, SVG text x/y is the baseline
    position by default. Developers who forget dominant-baseline end up with text
    appearing 30% below where they intended. foreignObject allows full HTML rendering
    inside SVG — essential for markdown, links, or complex formatting. Manually using
    getBBox() for centering introduces a layout reflow per text element, killing performance.
  how_to_do_right: |
    1. Horizontal alignment: text-anchor="start|middle|end" (maps to left|center|right).
    2. Vertical alignment: dominant-baseline="auto|middle|central|hanging".
       "central" aligns to visual center (most useful for node labels).
    3. For HTML content inside SVG: <foreignObject x="..." y="..." width="..." height="...">
       <div xmlns="http://www.w3.org/1999/xhtml">...</div></foreignObject>
    4. foreignObject does not scale to fit — always specify explicit width/height.
    5. For dynamic text, use a <text> element per label; update textContent only.
    6. Font loading: SVG text respects CSS @font-face — no special SVG handling required.
  severity: medium
  technologies:
    lang: [javascript, typescript, svg, html]
  domains:
    domain: [svg, visualization, frontend]
    concern: [svg_text, foreignObject, text_alignment]
  example_good: |
    // Centered node label using text-anchor + dominant-baseline
    function createNodeLabel(cx: number, cy: number, text: string): SVGTextElement {
      const SVG_NS = 'http://www.w3.org/2000/svg';
      const el = document.createElementNS(SVG_NS, 'text');
      el.setAttribute('x', String(cx));
      el.setAttribute('y', String(cy));
      el.setAttribute('text-anchor', 'middle');
      el.setAttribute('dominant-baseline', 'central'); // Perfect vertical centering
      el.setAttribute('fill', '#ffffff');
      el.setAttribute('font-size', '14');
      el.setAttribute('pointer-events', 'none'); // Label doesn't block node clicks
      el.textContent = text;
      return el;
    }

    // HTML content inside SVG using foreignObject
    function createHTMLLabel(x: number, y: number, width: number, html: string): SVGForeignObjectElement {
      const SVG_NS = 'http://www.w3.org/2000/svg';
      const fo = document.createElementNS(SVG_NS, 'foreignObject');
      fo.setAttribute('x', String(x - width / 2));
      fo.setAttribute('y', String(y - 20));
      fo.setAttribute('width', String(width));
      fo.setAttribute('height', '40');
      fo.innerHTML = `<div xmlns="http://www.w3.org/1999/xhtml"
        style="height:100%;display:flex;align-items:center;justify-content:center;
               font-size:12px;overflow:hidden;text-overflow:ellipsis;">${html}</div>`;
      return fo;
    }
  example_bad: |
    // Using getBBox for centering — expensive and async-unsafe
    function badCenterText(container: SVGGElement, text: string) {
      const textEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      textEl.textContent = text;
      container.appendChild(textEl);
      const bbox = textEl.getBBox(); // Forces synchronous layout calculation — expensive
      textEl.setAttribute('x', String(-bbox.width / 2));
      textEl.setAttribute('y', String(bbox.height / 4)); // Wrong — still not properly centered
    }
  when_applies: Any SVG element that displays text labels, tooltips, or embedded HTML content
  sources:
    - "https://developer.mozilla.org/en-US/docs/Web/SVG/Element/text"
    - "https://developer.mozilla.org/en-US/docs/Web/SVG/Element/foreignObject"

- id: SVG-009
  text: >
    Animate SVG with CSS @keyframes or Web Animations API on transform and opacity only.
    Use stroke-dasharray + stroke-dashoffset for "drawing" path animations.
    Always add will-change: transform only immediately before animation, remove after.
  why: >
    CSS animations on SVG transform and opacity are GPU-composited — they run on the
    compositor thread and do not block the main thread. Animating SVG-specific attributes
    like cx, cy, fill, or stroke-width through CSS causes the browser to re-run the
    SVG layout algorithm on every frame. The stroke-dasharray trick is the canonical
    way to animate paths "drawing themselves" and is widely supported since 2013.
    will-change: transform creates a new compositing layer — too many layers cause
    memory pressure and the "too many GPU layers" performance problem.
  how_to_do_right: |
    1. Use CSS transitions/keyframes for opacity and transform only.
    2. Path drawing animation:
       Set stroke-dasharray = pathLength (from path.getTotalLength())
       Set stroke-dashoffset = pathLength (hidden)
       Animate stroke-dashoffset to 0 (fully drawn)
    3. Apply will-change only during active animation:
       el.style.willChange = 'transform'; // Before animation starts
       el.addEventListener('transitionend', () => el.style.willChange = ''); // After
    4. For complex multi-step animations, use Web Animations API (el.animate()) —
       it supports precise playback control (pause, reverse, currentTime).
    5. Respect prefers-reduced-motion: skip animation or use instant snap.
  severity: medium
  technologies:
    lang: [css, javascript, typescript, svg]
  domains:
    domain: [svg, animation, performance]
    concern: [css_animation, stroke_dasharray, will_change]
  example_good: |
    // Path drawing animation — "draw" SVG path over 2 seconds
    function animatePathDraw(pathEl: SVGPathElement) {
      const length = pathEl.getTotalLength();
      pathEl.style.strokeDasharray = String(length);
      pathEl.style.strokeDashoffset = String(length); // Start: hidden

      // Animate to fully drawn
      const animation = pathEl.animate(
        [
          { strokeDashoffset: length },
          { strokeDashoffset: 0 },
        ],
        {
          duration: 2000,
          easing: 'ease-in-out',
          fill: 'forwards',
        }
      );

      // Respect reduced-motion
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
        animation.finish(); // Skip to end instantly
      }

      return animation;
    }

    /* CSS: only animate compositor-friendly properties */
    /*
    .node-enter {
      animation: nodeAppear 300ms ease-out forwards;
    }
    @keyframes nodeAppear {
      from { opacity: 0; transform: scale(0.5); }
      to   { opacity: 1; transform: scale(1); }
    }
    */
  example_bad: |
    /* Animating SVG presentation attributes — forces layout recalc each frame */
    @keyframes badMove {
      from { cx: 0; cy: 0; }  /* SVG geometry attributes: not compositor-composited */
      to   { cx: 100; cy: 100; }
    }

    // Even in JS: setAttribute on cx/cy per frame — triggers full SVG layout
    function badAnimate(circleEl: SVGCircleElement, targetX: number) {
      requestAnimationFrame(function step() {
        const current = parseFloat(circleEl.getAttribute('cx') ?? '0');
        if (current < targetX) {
          circleEl.setAttribute('cx', String(current + 2)); // Layout thrash every frame
          requestAnimationFrame(step);
        }
      });
    }
  when_applies: SVG elements with transitions, entry/exit animations, or data-driven path animations
  sources:
    - "https://developer.mozilla.org/en-US/docs/Web/SVG/Attribute/stroke-dasharray"
    - "https://developer.mozilla.org/en-US/docs/Web/API/Element/animate"

- id: SVG-010
  text: >
    Make SVG accessible: add role="img" and aria-labelledby referencing a <title> element
    for informative SVGs. Add aria-hidden="true" for decorative SVGs.
    Interactive SVG elements (clickable nodes) need role="button" and tabindex="0".
  why: >
    96% of tested websites have accessibility failures (WebAIM 2024). SVG without ARIA
    roles is announced by screen readers as "image" with no description, or is skipped
    entirely. An interactive node diagram with clickable nodes is unusable by keyboard-only
    users unless each node has role="button", tabindex, and a keyboard event handler.
    Decorative SVGs (background patterns, icons) that lack aria-hidden="true" pollute the
    screen reader's reading flow with meaningless "image" announcements.
  how_to_do_right: |
    1. Informative SVG (chart, diagram): role="img" on <svg>, <title id="X"> for name,
       <desc id="Y"> for description, aria-labelledby="X Y".
    2. Decorative SVG (background, icon next to text): aria-hidden="true" on <svg>.
    3. Interactive nodes (clickable): role="button", tabindex="0", aria-label="Node: [name]",
       keyboard handler for Enter and Space keys.
    4. Charts: provide a data table alternative via <details> below the SVG.
    5. Colors for data: don't use color alone — add patterns, labels, or shapes.
  severity: high
  technologies:
    lang: [javascript, typescript, svg, html]
  domains:
    domain: [svg, accessibility]
    concern: [aria, keyboard_navigation, screen_reader]
  example_good: |
    <!-- Informative SVG diagram -->
    <svg
      viewBox="0 0 800 600"
      role="img"
      aria-labelledby="diagram-title diagram-desc"
    >
      <title id="diagram-title">System architecture diagram</title>
      <desc id="diagram-desc">
        Three-tier architecture: frontend React app connects to FastAPI backend,
        which connects to PostgreSQL database.
      </desc>
      <!-- Decorative connection line -->
      <line x1="100" y1="300" x2="400" y2="300" aria-hidden="true" />
      <!-- Accessible interactive node -->
      <g
        role="button"
        tabindex="0"
        aria-label="Frontend React app — click to view details"
        data-node-id="frontend"
        onkeydown="if(event.key==='Enter'||event.key===' ')this.click()"
      >
        <circle cx="100" cy="300" r="50" fill="#005fcc" />
        <text x="100" y="300" text-anchor="middle" dominant-baseline="central" fill="#fff">React</text>
      </g>
    </svg>
  example_bad: |
    <!-- SVG with no role, no title, no ARIA — screen reader says "image" -->
    <svg viewBox="0 0 800 600">
      <!-- No title, no desc, no role -->
      <circle cx="100" cy="300" r="50" onclick="selectNode('frontend')" />
      <!-- onclick is set but: no keyboard access, no role, not focusable -->
      <!-- Keyboard user cannot interact with this at all -->
    </svg>
  when_applies: Every SVG embedded in a public-facing web page, especially interactive data visualizations
  sources:
    - "https://www.tpgi.com/using-aria-enhance-svg-accessibility/"
    - "https://www.w3.org/wiki/SVG_Accessibility/ARIA_roles_for_charts"
    - "https://developer.mozilla.org/en-US/docs/Web/Accessibility/ARIA/Reference/Attributes/aria-label"

- id: SVG-011
  text: >
    Use SVG for interactive diagrams, graphs, and illustrations where accessibility and
    interactivity matter. Use Canvas for high-performance rasterized rendering (>5,000
    elements, particle systems, real-time pixel manipulation). Never use SVG for video
    effects or dynamic image filters.
  why: >
    SVG is DOM-based: every element is a node accessible to JavaScript, CSS, and screen
    readers. Canvas is a raster surface: once drawn, pixel data has no semantic meaning
    and is inaccessible. The decision threshold is roughly 1,000–5,000 elements: below
    this, SVG performs fine; above this, Canvas's direct GPU rasterization is 10–100x
    faster. Hybrid: use Canvas for the background rendering pass, SVG overlay for interactive
    labels and selection handles. This gives Canvas performance with SVG accessibility.
  how_to_do_right: |
    Choose SVG when:
    - Elements must be individually interactive (click, hover, keyboard)
    - Content must be accessible to screen readers
    - Element count <2,000
    - Content must scale/zoom without pixelation
    - CSS styling, animations, transitions needed per element

    Choose Canvas when:
    - Element count >5,000 (particle systems, large graphs)
    - Per-pixel operations needed (image filters, heat maps)
    - High-frequency rendering (60fps game-like simulations)
    - Raster output needed (export to PNG)

    Hybrid: Canvas background + SVG overlay for interactive elements.
  severity: high
  technologies:
    lang: [javascript, typescript]
  domains:
    domain: [svg, canvas, performance, visualization]
    concern: [technology_selection, rendering_strategy]
  example_good: |
    // Decision function with explicit rationale
    function chooseRenderer(elementCount: number, needsA11y: boolean, needsInteractivity: boolean) {
      if (needsA11y || needsInteractivity) {
        if (elementCount < 2000) return 'svg'; // SVG: accessible + interactive
        return 'hybrid'; // Canvas background + SVG interactive overlay
      }
      if (elementCount > 5000) return 'canvas'; // Canvas: raw performance
      return 'svg'; // Default to SVG: better DX and debugging
    }

    // Hybrid implementation pattern
    function createHybridVisualization(container: HTMLElement) {
      // Canvas layer: render 10,000 background elements
      const canvas = document.createElement('canvas');
      canvas.style.cssText = 'position:absolute;top:0;left:0;pointer-events:none;';
      container.appendChild(canvas);

      // SVG layer: interactive + accessible foreground
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.style.cssText = 'position:absolute;top:0;left:0;';
      svg.setAttribute('viewBox', `0 0 ${container.clientWidth} ${container.clientHeight}`);
      container.appendChild(svg);
    }
  example_bad: |
    // Using Canvas for a simple 20-node interactive diagram — no accessibility, hard to debug
    const canvas = document.querySelector('canvas')!;
    const ctx = canvas.getContext('2d')!;
    const nodes = [{ x: 100, y: 200, label: 'Database' }, ...]; // 20 nodes

    canvas.addEventListener('click', (e) => {
      // Must manually hit-test every node on click — O(n) loop
      for (const node of nodes) {
        const dist = Math.hypot(e.offsetX - node.x, e.offsetY - node.y);
        if (dist < 30) selectNode(node);
      }
      // Screen reader sees nothing — entire diagram is inaccessible
    });
  when_applies: When choosing between SVG and Canvas for any web visualization
  sources:
    - "https://css-tricks.com/when-to-use-svg-vs-when-to-use-canvas/"
    - "https://www.jointjs.com/blog/svg-versus-canvas"

- id: SVG-012
  text: >
    Implement Fullscreen API for SVG visualizations with document.documentElement.requestFullscreen().
    Update the SVG viewBox to match window.innerWidth/innerHeight in fullscreen.
    Handle fullscreenchange event to restore original viewBox on exit.
  why: >
    Large diagrams (org charts, network graphs) need fullscreen for usability. The
    Fullscreen API is well-supported (all modern browsers). The critical mistake is
    forgetting to update the SVG viewBox in fullscreen mode — the SVG keeps its original
    small viewBox and renders with huge whitespace. Equally, forgetting to restore on
    exit leaves the visualization broken after fullscreen.
  how_to_do_right: |
    1. Store original viewBox before entering fullscreen.
    2. Enter: call requestFullscreen() on the SVG container div (not the SVG itself).
    3. In fullscreenchange handler: if entering, update viewBox to screen dimensions;
       if exiting, restore original viewBox.
    4. Match viewBox aspect ratio to screen aspect ratio or use preserveAspectRatio="xMidYMid meet".
    5. Add keyboard shortcut: F key to toggle fullscreen; Escape already exits by browser default.
    6. Show a fullscreen button in the SVG UI — many users don't know the shortcut.
  severity: low
  technologies:
    lang: [javascript, typescript, svg]
  domains:
    domain: [svg, ux, visualization]
    concern: [fullscreen_api, viewport_management]
  example_good: |
    class SVGFullscreen {
      private svgEl: SVGSVGElement;
      private container: HTMLElement;
      private originalViewBox: string;

      constructor(container: HTMLElement, svgEl: SVGSVGElement) {
        this.container = container;
        this.svgEl = svgEl;
        this.originalViewBox = svgEl.getAttribute('viewBox') ?? '0 0 800 600';
        document.addEventListener('fullscreenchange', () => this.onFullscreenChange());
      }

      async toggle() {
        if (document.fullscreenElement) {
          await document.exitFullscreen();
        } else {
          await this.container.requestFullscreen();
        }
      }

      private onFullscreenChange() {
        if (document.fullscreenElement === this.container) {
          // Entering fullscreen — expand viewBox to fill screen
          this.svgEl.setAttribute('viewBox', `0 0 ${window.innerWidth} ${window.innerHeight}`);
        } else {
          // Exiting fullscreen — restore original viewBox
          this.svgEl.setAttribute('viewBox', this.originalViewBox);
        }
      }
    }
  example_bad: |
    // Fullscreen on SVG element itself — less reliable cross-browser
    // Plus: no viewBox update → diagram renders at original small size in fullscreen
    async function enterFullscreen(svgEl: SVGSVGElement) {
      await svgEl.requestFullscreen();
      // Forgot to update viewBox — SVG is now displayed tiny in fullscreen
      // User sees 800x600 content on a 2560x1440 screen with grey borders
    }
  when_applies: SVG visualizations with complex diagrams that benefit from full-screen viewing
  sources:
    - "https://developer.mozilla.org/en-US/docs/Web/API/Element/requestFullscreen"
    - "https://developer.mozilla.org/en-US/docs/Web/API/Document/fullscreenchange_event"

- id: SVG-013
  text: >
    Generate D3-scale color palettes for SVG data visualization without importing D3.
    Use interpolateViridis or categorical palettes by implementing the math directly.
    Perceptually uniform scales (Viridis, Cividis) for continuous data; categorical
    palettes for discrete groups.
  why: >
    D3 is 580KB gzipped — importing it just for color scales is over-engineering.
    The Viridis palette math is simple enough to inline. More importantly, using
    rainbow/jet color maps for continuous data is misleading: they create artificial
    perceptual boundaries where none exist in the data. Perceptually uniform palettes
    (Viridis, Cividis) map equal data increments to equal perceived color distances.
    Using the same hue for all data points but varying saturation/lightness fails
    colorblind users (8% of males are red-green colorblind).
  how_to_do_right: |
    1. Continuous sequential data: use Viridis (blue-green-yellow) or Cividis (blue-yellow, colorblind-safe).
    2. Categorical (up to 10 groups): use hand-picked palette with 4.5:1 contrast on white.
    3. Diverging data (negative-zero-positive): use RdBu (red-white-blue).
    4. Never use a rainbow/spectral palette for continuous data.
    5. Always provide a legend with enough text labels to be meaningful without color.
    6. Test with a colorblind simulator (e.g., https://www.toptal.com/designers/colorfilter).
  severity: medium
  technologies:
    lang: [javascript, typescript]
  domains:
    domain: [svg, data_visualization, accessibility]
    concern: [color_scales, colorblind_accessibility, data_mapping]
  example_good: |
    // Viridis palette — 11 control points, interpolate between them
    const VIRIDIS_STOPS = [
      [68, 1, 84], [72, 35, 116], [64, 67, 135], [52, 94, 141],
      [41, 120, 142], [32, 144, 140], [34, 167, 132], [68, 190, 112],
      [121, 209, 81], [189, 222, 38], [253, 231, 37],
    ];

    function viridis(t: number): string {
      // t in [0, 1]
      const i = Math.min(VIRIDIS_STOPS.length - 2, Math.floor(t * (VIRIDIS_STOPS.length - 1)));
      const frac = t * (VIRIDIS_STOPS.length - 1) - i;
      const [r1, g1, b1] = VIRIDIS_STOPS[i];
      const [r2, g2, b2] = VIRIDIS_STOPS[i + 1];
      const r = Math.round(r1 + (r2 - r1) * frac);
      const g = Math.round(g1 + (g2 - g1) * frac);
      const b = Math.round(b1 + (b2 - b1) * frac);
      return `rgb(${r},${g},${b})`;
    }

    // Categorical palette — colorblind-safe (Wong, 2011)
    const WONG_PALETTE = [
      '#E69F00', '#56B4E9', '#009E73', '#F0E442',
      '#0072B2', '#D55E00', '#CC79A7', '#000000',
    ];

    function categoricalColor(index: number): string {
      return WONG_PALETTE[index % WONG_PALETTE.length];
    }
  example_bad: |
    // Rainbow colormap — perceptually misleading
    function rainbowColor(t: number): string {
      // Creates artificial "bands" at hue transitions (red/yellow/green/cyan/blue)
      // These bands look like meaningful data boundaries but are pure artifcat
      const hue = (1 - t) * 240;
      return `hsl(${hue}, 100%, 50%)`;
      // Also completely fails for 8% of male users with red-green colorblindness
    }
  when_applies: Any SVG chart, heatmap, choropleth, or graph that encodes data with color
  sources:
    - "https://bids.github.io/colormap/"
    - "https://www.nature.com/articles/nmeth.1618"
    - "https://developer.mozilla.org/en-US/docs/Web/SVG/Element/linearGradient"
