layer: rules
domain: sacada
knowledge:
- id: PQR-001
  text: "Surgical rework methodology — fix ONLY what is broken, touch NOTHING that works. Rework that modifies working code introduces regressions and doubles the QA effort."
  why: >
    The natural instinct during rework is to "improve things while you're in there." This is the single biggest
    source of regressions during rework cycles. When you fix a bug AND refactor the surrounding code, any new
    failure could be from either change. The QA team now has to re-verify not just the fix but the entire modified
    area. Surgical rework — changing ONLY the failing code and nothing else — minimizes risk, minimizes QA effort,
    and makes it trivially easy to verify the fix. If you see improvements to make, note them for a separate PR.
  how_to_do_right: >
    1. Read the finding. Identify the EXACT code that needs to change.

    2. Before changing anything, write a test that reproduces the finding (test should FAIL).

    3. Make the MINIMUM change needed to fix the finding (test should now PASS).

    4. Verify that NO other tests broke (regression check).

    5. If you see other issues while fixing, note them in a separate ticket — do NOT fix them now.

    6. The diff should be as small as possible. If your rework diff is larger than the original code, something is wrong.

    7. Review your own diff before submitting: "Did I change anything that was not required by the finding?"
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition]
  example_good: |
    # Finding: PQB-003 — N+1 query in get_claims_with_sources()
    # File: src/services/claims.py:47

    # BEFORE (buggy):
    async def get_claims_with_sources(session, limit=100):
        claims = await session.execute(select(Claim).limit(limit))
        for claim in claims.scalars():
            sources = await session.execute(
                select(Source).where(Source.claim_id == claim.id)
            )
            claim.sources = sources.scalars().all()
        return claims

    # AFTER (fixed — ONLY the query, nothing else):
    async def get_claims_with_sources(session, limit=100):
        claims = await session.execute(
            select(Claim).options(selectinload(Claim.sources)).limit(limit)
        )
        return claims.scalars().all()

    # Diff: 4 lines changed. No other files touched.
    # Regression test: all existing tests pass.
  example_bad: |
    # Finding: N+1 query in get_claims_with_sources()
    # Developer "while I'm here" also:
    # - Renamed the function to fetch_claims_with_related
    # - Changed the return type from list to generator
    # - Added logging throughout the module
    # - Reformatted the entire file with black
    # Diff: 200 lines changed across 5 files
    # QA: "I need to re-verify the entire claims module"
    # New bug introduced: the generator return type breaks 3 callers
  when_applies: During every rework cycle after QA findings. The rework should be as small and focused as possible. Resist the urge to improve "while you're in there."
  sources: ["https://martinfowler.com/bliki/Refactoring.html"]

- id: PQR-002
  text: "SBAR format for findings — every QA finding must follow Situation/Background/Assessment/Recommendation. Vague findings like 'this looks wrong' are unactionable."
  why: >
    QA findings are communication artifacts. Their purpose is to enable a developer to understand and fix the
    issue WITHOUT asking follow-up questions. A finding that says "the pagination seems wrong" forces the developer
    to reproduce the issue, figure out what is wrong, and guess what the expected behavior should be. An SBAR
    finding says: "Page 1 returns items 11-20 (Situation), pagination uses page*per_page instead of (page-1)*per_page
    (Background), first 10 items are never returned (Assessment), change offset calculation in list_items()
    (Recommendation)." The developer can fix this in 2 minutes.
  how_to_do_right: >
    1. SITUATION: What is happening? What did you observe? (Concrete, reproducible.)

    2. BACKGROUND: What should be happening? What is the spec/requirement?

    3. ASSESSMENT: What is the root cause? Why is the current behavior wrong?

    4. RECOMMENDATION: What specific change would fix it? (File, function, line if possible.)

    5. Include reproduction steps: exact input, expected output, actual output.

    6. Include severity: P0 (blocks release), P1 (must fix), P2 (should fix), P3 (nice to fix).

    7. Include evidence: test output, log snippet, screenshot, or code reference.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition]
  example_good: |
    # FINDING: PQB-018-S05-001
    # Severity: P1

    # SITUATION:
    # GET /api/claims?page=1&per_page=10 returns items 11-20 instead of 1-10.
    # First 10 items (IDs 1-10) are never returned in any page.

    # BACKGROUND:
    # RF-S05-003 requires offset-based pagination starting from page 1.
    # Expected: page 1 → items 1-10, page 2 → items 11-20.

    # ASSESSMENT:
    # Root cause: src/api/claims.py:47 uses `offset = page * per_page`
    # Should be: `offset = (page - 1) * per_page`
    # page=1, per_page=10 → offset=10 (skips first 10 items)

    # RECOMMENDATION:
    # Change line 47 in src/api/claims.py from:
    #   offset = page * per_page
    # To:
    #   offset = (page - 1) * per_page
    # Add test: test_page_one_returns_first_items()
  example_bad: |
    # FINDING: "Pagination looks wrong"
    # (No file reference, no expected behavior, no root cause, no fix suggestion)
    # Developer: "Wrong how? Which endpoint? What input? What output? What's expected?"
    # 3 rounds of back-and-forth before the fix can start
  when_applies: Every QA finding, code review comment, and bug report. SBAR format ensures findings are actionable without follow-up questions.
  sources: ["https://sre.google/sre-book/effective-troubleshooting/"]

- id: PQR-003
  text: "Priority classification (P0-P3) — classify every finding by impact and urgency. Fixing P3 issues before P0 issues is the most expensive time allocation mistake in engineering."
  why: >
    Not all bugs are equal. A P0 (data corruption, security breach, total outage) must be fixed immediately
    regardless of what else is in progress. A P3 (cosmetic, naming convention, minor UX inconsistency) can wait
    for the next sprint. Without explicit priority classification, developers tend to fix the easiest or most
    interesting bugs first, which are often the lowest priority. Priority classification ensures the team's effort
    is allocated to maximum impact. The classification must be explicit and agreed-upon, not left to individual
    judgment.
  how_to_do_right: >
    1. P0 (Critical): Data corruption, security vulnerability, total outage, data loss. Fix IMMEDIATELY — drop everything.

    2. P1 (High): Major feature broken, performance degradation > 50%, significant user impact. Fix within current sprint.

    3. P2 (Medium): Feature partially broken, edge case failures, minor performance issue. Fix within next sprint.

    4. P3 (Low): Cosmetic, naming, documentation, code style. Fix when convenient.

    5. Classify at triage time, not fix time. The priority should not change based on developer preference.

    6. Track priority distribution: if > 20% of findings are P0, the codebase has systemic quality issues.

    7. Never deprioritize a P0 or P1 without explicit stakeholder approval.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition]
  example_good: |
    # Sprint S05 QA Findings — Classified:
    #
    # P0 (Fix NOW):
    # - SQL injection in search endpoint (PQB-004-S05-001)
    # - Hardcoded API key in source (PQB-012-S05-001)
    #
    # P1 (Fix this sprint):
    # - N+1 query in claims list (PQB-003-S05-001) — 3s response time
    # - Missing auth on admin endpoint (PQB-007-S05-001)
    #
    # P2 (Fix next sprint):
    # - Pagination off-by-one (PQB-018-S05-001) — first page starts at item 2
    # - Cache not invalidated on update (PQB-019-S05-001)
    #
    # P3 (Backlog):
    # - Variable naming inconsistency in utils.py
    # - Missing docstring on 3 internal functions
    #
    # Fix order: SQL injection → hardcoded key → auth → N+1 → pagination → cache
  example_bad: |
    # Developer looks at findings list, picks the easiest:
    # 1. Fix variable naming (P3) — 2 minutes
    # 2. Fix missing docstring (P3) — 5 minutes
    # 3. Fix pagination off-by-one (P2) — 15 minutes
    # "Great, 3 findings fixed!"
    # Meanwhile: SQL injection and hardcoded API key still in production
  when_applies: At triage of every set of QA findings. Priority classification is a team activity (QA + dev + product), not a solo decision. Re-triage if new findings change the priority landscape.
  sources: ["https://sre.google/sre-book/managing-incidents/"]

- id: PQR-004
  text: "Scope limitation — review the DIFF, not the codebase. Rework review must verify the fix, not re-review the entire module. Expanding rework scope is the #1 cause of infinite rework loops."
  why: >
    When QA reviews a rework, the temptation is to re-review the entire file or module. This inevitably surfaces
    new findings that were not in scope, which triggers more rework, which triggers more review, which surfaces
    more findings. This is the infinite rework loop — it can continue for weeks without converging. The fix is
    strict scope limitation: the rework review ONLY verifies that (a) the specific finding is fixed, and (b) the
    fix did not introduce regressions. Any new findings discovered during rework review go into a NEW ticket for
    the next cycle.
  how_to_do_right: >
    1. Rework review scope = the diff from the rework commit, nothing more.

    2. For each finding in the rework: (a) verify the fix addresses the finding, (b) run existing tests to check for regressions.

    3. If you discover NEW issues during rework review, create SEPARATE findings for the next cycle.

    4. Do NOT block the rework for issues that were not in the original findings.

    5. Use a rework review checklist: finding ID, fix verified (yes/no), regression check (pass/fail).

    6. Track rework cycles: if a sprint has > 3 rework cycles, escalate — the process is not converging.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition]
  example_good: |
    # Rework Review for Sprint S05, Cycle 2:
    # Scope: 3 findings from Cycle 1

    # Finding PQB-003-S05-001 (N+1 query):
    # - Fix: Added selectinload to get_claims_with_sources()
    # - Diff: 4 lines in src/services/claims.py
    # - Fix verified: ✓ (query count reduced from 101 to 2)
    # - Regression check: ✓ (all 47 existing tests pass)
    # VERDICT: FIXED

    # Finding PQB-018-S05-001 (Pagination off-by-one):
    # - Fix: Changed offset = page * per_page → (page - 1) * per_page
    # - Diff: 1 line in src/api/claims.py
    # - Fix verified: ✓ (page 1 now returns items 1-10)
    # - Regression check: ✓ (all tests pass)
    # VERDICT: FIXED

    # New observation during review: logging could be improved in claims.py
    # → Created as separate P3 finding for next cycle. NOT blocking this rework.

    # Rework Cycle 2 RESULT: 3/3 findings fixed, 0 regressions, PROMOTE.
  example_bad: |
    # Rework review for 3 findings:
    # Reviewer: "Finding 1 is fixed, but while reviewing I noticed..."
    # → 5 new findings added to rework
    # Cycle 3: 5 findings fixed, but "while reviewing..."
    # → 3 more findings
    # Cycle 4, 5, 6... sprint takes 3 weeks instead of 3 days
    # Root cause: scope was never limited to the original findings
  when_applies: During every rework review cycle. Strict scope limitation is the only way to ensure rework converges. New findings go to a new ticket, never to the current rework.
  sources: ["https://google.github.io/eng-practices/review/developer/small-cls.html"]

- id: PQR-005
  text: "Regression test requirement — every fix MUST include a test that reproduces the original bug. A fix without a regression test is a temporary fix — the bug will return."
  why: >
    Regression tests serve two purposes: (1) they verify the fix actually works (not just "the code looks right"),
    and (2) they prevent the bug from being reintroduced in the future. Without a regression test, a future
    refactor can silently reintroduce the exact same bug, and nobody will catch it until a user reports it again.
    The regression test is the proof that the fix works and the guarantee that it stays fixed. A fix without a
    regression test is like a lock without a key — it provides security today but not tomorrow.
  how_to_do_right: >
    1. Before writing the fix, write a test that reproduces the bug (test should FAIL).

    2. Write the fix (test should now PASS).

    3. Name the test descriptively: test_regression_PQB_003_n_plus_one_claims() — include the finding ID.

    4. The test must exercise the EXACT condition that triggered the bug.

    5. Include a comment explaining what bug the test prevents.

    6. Add the test to the main test suite so it runs in CI on every PR.

    7. Never delete regression tests — they are the immune system against known bugs.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition]
  example_good: |
    def test_regression_PQB_018_pagination_offset():
        """
        Regression test for PQB-018: Pagination off-by-one error.
        Bug: page 1 used offset=page*per_page=10, skipping first 10 items.
        Fix: offset=(page-1)*per_page=0 for page 1.
        """
        # Create exactly 15 items
        items = [create_item(f"item_{i}") for i in range(15)]

        # Page 1 must return items 0-9
        response = client.get("/items?page=1&per_page=10")
        page_1_ids = [i["id"] for i in response.json()["items"]]
        assert len(page_1_ids) == 10
        assert items[0].id in page_1_ids  # First item must be on page 1

        # Page 2 must return items 10-14
        response = client.get("/items?page=2&per_page=10")
        page_2_ids = [i["id"] for i in response.json()["items"]]
        assert len(page_2_ids) == 5
        assert items[14].id in page_2_ids  # Last item must be on page 2

        # No overlap between pages
        assert set(page_1_ids).isdisjoint(set(page_2_ids))
  example_bad: |
    # Fix applied: changed offset calculation
    # No test written
    # 3 months later: developer refactors pagination
    # Accidentally reintroduces the same offset bug
    # Nobody catches it because there is no regression test
    # Users report: "I can't find my old claims"
  when_applies: Every bug fix, every rework, every patch. The regression test is a mandatory part of the fix — a fix without a test is not complete.
  sources: ["https://martinfowler.com/articles/practical-test-pyramid.html"]

- id: PQR-006
  text: "Rework verification protocol — after applying a fix, verify it in THREE ways: (1) the specific test passes, (2) all existing tests pass, (3) manual smoke test of the affected feature."
  why: >
    A fix that passes its own test but breaks other tests is a net negative — you fixed one bug and introduced
    another. A fix that passes all tests but breaks the UI or UX is invisible to automated testing. The three-layer
    verification protocol catches all categories of regression: (1) the specific test proves the fix works, (2)
    the full test suite proves no regressions, (3) the manual smoke test catches issues that tests cannot
    (visual bugs, UX issues, performance degradation).
  how_to_do_right: >
    1. Run the specific regression test: pytest tests/test_regression_PQB_018.py -v → PASS.

    2. Run the full test suite for the affected module: pytest tests/test_claims.py -v → ALL PASS.

    3. Run the full E2E test suite: pytest tests/test_e2e_*.py -v → ALL PASS.

    4. Perform a manual smoke test: exercise the affected feature through the UI or API.

    5. If any step fails, the fix is NOT complete — investigate and fix before proceeding.

    6. Record the verification results in the rework report.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition]
  example_good: |
    # Rework Verification for PQB-018 (Pagination fix):

    # Step 1: Specific regression test
    # $ pytest tests/test_regression_PQB_018.py -v
    # test_regression_PQB_018_pagination_offset PASSED
    # ✓ Fix works

    # Step 2: Module test suite
    # $ pytest tests/test_claims.py tests/test_api_claims.py -v
    # 23 passed, 0 failed
    # ✓ No regressions in claims module

    # Step 3: E2E test suite
    # $ pytest tests/test_e2e_*.py -v
    # 115 passed, 0 failed
    # ✓ No regressions in full system

    # Step 4: Manual smoke test
    # GET /api/claims?page=1&per_page=10 → returns items 1-10 ✓
    # GET /api/claims?page=2&per_page=10 → returns items 11-20 ✓
    # GET /api/claims?page=999 → returns empty list ✓
    # ✓ Feature works end-to-end

    # VERDICT: Fix VERIFIED. Ready for promotion.
  example_bad: |
    # Developer runs the regression test: PASS
    # Developer: "Fix is verified!"
    # Skips module tests and E2E tests
    # In production: the fix broke the claims export feature
    # (which was not covered by the regression test)
  when_applies: After every rework fix. All three verification steps are mandatory. A fix that is not fully verified is not ready for promotion.
  sources: ["https://martinfowler.com/articles/practical-test-pyramid.html"]

- id: PQR-007
  text: "Fix-forward vs rollback decision — if the fix is simple and well-understood, fix forward. If the fix is complex or risky, rollback first and fix in a safe environment."
  why: >
    When a bug is found in production, the instinct is to fix it immediately (fix forward). But complex fixes
    under time pressure are the leading cause of making things worse — you introduce a new bug while fixing the
    old one, now there are two bugs in production. The decision framework is simple: if the fix is a one-line
    change that you are confident about, fix forward. If the fix requires understanding a complex interaction,
    touching multiple files, or you are not 100% sure of the root cause, rollback first to stop the bleeding,
    then fix carefully in a safe environment.
  how_to_do_right: >
    1. FIX FORWARD when: (a) root cause is clear, (b) fix is < 5 lines, (c) you have a regression test, (d) fix can be deployed in < 30 minutes.

    2. ROLLBACK when: (a) root cause is unclear, (b) fix requires changes to multiple files, (c) data corruption is ongoing, (d) user impact is high and growing.

    3. After rollback: investigate in a calm environment, write a proper fix with tests, deploy after verification.

    4. Never fix forward under panic — panic leads to bad decisions that make things worse.

    5. Document the decision: "We chose to rollback/fix-forward because [reason]."

    6. Post-incident: review the decision and whether it was correct. Learn from it.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition]
  example_good: |
    # Incident: Claims endpoint returning 500 errors
    # Root cause analysis (5 minutes):
    #   - New deploy at 14:00 changed pagination offset calculation
    #   - Error: offset = page * per_page (should be (page-1) * per_page)
    #   - Single line change, clear root cause

    # DECISION: FIX FORWARD
    # Reason: Root cause is clear, fix is 1 line, regression test exists
    # Timeline:
    # 14:05 — Root cause identified
    # 14:10 — Fix applied + regression test verified
    # 14:15 — Deployed to production
    # 14:16 — 500 errors stopped
    # Total downtime: 16 minutes

    # ALTERNATIVE SCENARIO: Complex multi-service bug
    # DECISION: ROLLBACK
    # Reason: Root cause unclear, involves 3 services, data consistency at risk
    # Timeline:
    # 14:05 — Symptoms identified, root cause unclear
    # 14:10 — Rollback to previous version
    # 14:11 — Errors stopped, service healthy
    # 14:30 — Root cause investigation begins (calmly)
    # Next day — Proper fix deployed after thorough testing
  example_bad: |
    # Incident: Claims endpoint returning wrong data
    # Developer: "I think it's the cache... let me try clearing it..."
    # → Clears cache, still broken
    # "Maybe it's the database... let me run a migration..."
    # → Migration makes it worse, now data is corrupted
    # "Let me revert the migration... hmm, no rollback script..."
    # 3 hours of escalating damage because fix-forward was chosen
    # when rollback was the right call
  when_applies: Every production incident that requires a code change. The fix-forward vs rollback decision should be made explicitly within the first 10 minutes of the incident.
  sources: ["https://martinfowler.com/bliki/BlueGreenDeployment.html"]

- id: PQR-008
  text: "Root cause vs symptom distinction — fix the ROOT CAUSE, not the symptom. Adding a null check where data should never be null hides the real bug upstream."
  why: >
    Symptom fixes are the most insidious form of technical debt. They make the immediate problem go away while
    leaving the underlying bug in place. The bug then manifests in a different way, requiring another symptom fix.
    Over time, the codebase accumulates dozens of null checks, try/except blocks, and default values that exist
    solely to work around bugs that were never properly fixed. Each symptom fix adds complexity and makes the
    real bug harder to find. The root cause fix is almost always simpler and more robust than the symptom fix.
  how_to_do_right: >
    1. When you find a bug, ask "WHY is this happening?" at least 3 times (5-Whys technique).

    2. The first answer is usually the symptom. Keep asking until you reach the root cause.

    3. A null check is a symptom fix if the data should never be null — the root cause is upstream.

    4. A try/except is a symptom fix if the exception should never be thrown — the root cause is in the caller.

    5. A default value is a symptom fix if the value should always be provided — the root cause is in the data source.

    6. Fix the root cause. If a temporary symptom fix is needed for production stability, add a TODO with a tracking ticket.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition]
  example_good: |
    # Bug: NoneType error in format_claim_date()
    # Symptom fix: if claim.created_at is None: return "N/A"
    # But WHY is created_at None?

    # 5-Whys:
    # 1. Why is created_at None? → Claim was created without setting created_at
    # 2. Why wasn't it set? → create_claim() doesn't set it
    # 3. Why doesn't create_claim() set it? → It relies on the caller to set it
    # 4. Why does the caller not set it? → Some code paths skip the timestamp
    # ROOT CAUSE: create_claim() should set created_at automatically

    # Root cause fix (in models.py):
    class Claim(BaseModel):
        created_at: datetime = Field(default_factory=lambda: datetime.now(timezone.utc))
        # Now it's IMPOSSIBLE to create a Claim without created_at

    # NOT this (symptom fix):
    def format_claim_date(claim):
        if claim.created_at is None:  # Hides the real bug
            return "N/A"
        return claim.created_at.strftime("%Y-%m-%d")
  example_bad: |
    # Bug: KeyError on state["work_packages"] in exec_node
    # Symptom fix:
    def exec_node(state):
        wps = state.get("work_packages", [])  # Default to empty list
        if not wps:
            return state  # Silently skip execution
        # ...

    # Root cause: spec_node failed silently and didn't set work_packages
    # The symptom fix means exec_node runs with no work packages
    # The pipeline "succeeds" but produces nothing
    # Nobody knows why
  when_applies: Every bug fix. Before writing the fix, ask "Is this the root cause or a symptom?" If it's a symptom, trace upstream to find the root cause. Only fix the root cause.
  sources: ["https://sre.google/sre-book/effective-troubleshooting/"]

- id: PQR-009
  text: "Rework size estimation — estimate the rework effort BEFORE starting. If the rework is larger than the original implementation, something is wrong with the finding or the code."
  why: >
    Rework should be smaller than original implementation because you are fixing specific issues, not building
    new features. If the estimated rework is larger than the original code, it signals one of two problems:
    (1) the finding is actually a redesign request disguised as a bug, or (2) the original code has such deep
    issues that surgical rework is not possible and a rewrite is needed. Both of these need to be escalated
    before the developer spends days on what was expected to be hours.
  how_to_do_right: >
    1. Read all findings and estimate the rework effort for each (hours, not days).

    2. If any single finding requires > 4 hours of rework, flag it for review.

    3. If total rework > 50% of original implementation time, escalate before starting.

    4. Track actual rework time vs estimate to calibrate future estimates.

    5. If a finding requires architectural changes, it is NOT a rework — it is a new work item.

    6. If a finding requires changing files not in the original sprint, it is NOT a rework — it is a cross-sprint dependency.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition]
  example_good: |
    # Sprint S05 Rework Estimation:
    # Original implementation: 8 hours
    # Findings: 5

    # PQB-018 (Pagination off-by-one): 15 min (1 line change + 1 test)
    # PQB-003 (N+1 query): 30 min (add selectinload + 1 test)
    # PQB-012 (Hardcoded secret): 20 min (move to env var + update .env.example)
    # PQB-019 (Cache invalidation): 45 min (add cache.delete + 2 tests)
    # PQC-005 (Missing logging): 30 min (add structured logging to 3 functions)

    # Total estimate: 2.3 hours (29% of original — reasonable)
    # PROCEED with rework.

    # If estimate was 10 hours (125% of original):
    # ESCALATE — findings may indicate fundamental design issues
  example_bad: |
    # Developer starts rework without estimating
    # Finding 1: "Add error handling" — 30 min
    # Finding 2: "Refactor to use repository pattern" — 2 days (!)
    # Finding 3: "Add comprehensive test coverage" — 1 day
    # Developer spends 3.5 days on "rework" that is actually a redesign
    # Nobody realized this was not a quick fix until day 2
  when_applies: Before starting any rework cycle. Estimate first, then proceed or escalate. Track estimates vs actuals to improve future estimation.
  sources: ["https://www.agilealliance.org/glossary/relative-estimation/"]

- id: PQR-010
  text: "Test coverage for fix — every fix must include tests that cover the EXACT condition that was broken. A fix without targeted tests is a fix that will break again."
  why: >
    General test coverage (line coverage, branch coverage) does not guarantee that a specific bug is tested. You
    can have 95% line coverage and still have no test for the exact condition that caused the bug. Targeted test
    coverage means writing a test that exercises the EXACT input that triggered the bug, verifies the EXACT output
    that was wrong, and confirms the fix produces the EXACT correct output. This is different from general edge case
    testing — it is forensic testing based on a specific failure.
  how_to_do_right: >
    1. Identify the EXACT input that triggered the bug (from the finding, logs, or reproduction steps).

    2. Write a test that uses that exact input.

    3. Verify the test FAILS before the fix (to confirm it reproduces the bug).

    4. Apply the fix and verify the test PASSES.

    5. Add boundary tests around the fix: what about input that is slightly different?

    6. Include the finding ID in the test name for traceability.

    7. Run the full test suite to verify no regressions.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition]
  example_good: |
    def test_fix_PQB_016_timezone_naive_claim():
        """
        Fix for PQB-016: Claims created with naive datetime caused
        incorrect display for non-UTC users.

        Exact trigger: create_claim() used datetime.now() (naive)
        Expected: datetime.now(timezone.utc) (aware)
        """
        # Exact input that triggered the bug:
        claim = create_claim(text="Test claim")

        # Verify the exact condition that was broken:
        assert claim.created_at.tzinfo is not None, "created_at must be timezone-aware"
        assert claim.created_at.tzinfo == timezone.utc, "created_at must be UTC"

        # Boundary: verify display conversion works
        local_time = format_claim_date(claim, user_tz="America/New_York")
        assert "EST" in local_time or "EDT" in local_time

    def test_fix_PQB_016_existing_claims_compatible():
        """Existing claims with naive datetimes must still be displayable."""
        # Simulate legacy claim with naive datetime:
        legacy_claim = Claim(text="old", created_at=datetime(2025, 1, 1))
        # Must not crash:
        result = format_claim_date(legacy_claim, user_tz="UTC")
        assert isinstance(result, str)
  example_bad: |
    def test_claim_has_created_at():
        claim = create_claim(text="Test")
        assert claim.created_at is not None
        # This test passes BEFORE the fix too!
        # It does not test the actual bug (naive vs aware datetime)
        # The fix could be reverted and this test would still pass
  when_applies: Every bug fix. The test must reproduce the exact bug condition. A test that passes both before and after the fix is not a valid regression test.
  sources: ["https://martinfowler.com/articles/practical-test-pyramid.html"]

- id: PQR-011
  text: "Documentation of fix — every non-trivial fix must include a brief explanation of what was wrong and why the fix is correct. Code changes without context are indistinguishable from bugs."
  why: >
    Six months from now, a developer will see your fix and wonder: "Why is this offset (page-1)*per_page instead
    of page*per_page? Is this a bug or intentional?" Without documentation, they might "fix" your fix back to the
    buggy version. A brief comment explaining the reasoning preserves the knowledge: "Offset must be (page-1)*per_page
    because page is 1-indexed. See PQB-018." This comment costs 10 seconds to write and saves hours of future
    confusion. It also serves as a trace from code to finding for audit purposes.
  how_to_do_right: >
    1. Add a brief inline comment explaining the fix and referencing the finding ID.

    2. In the commit message, explain WHAT was wrong and WHY the fix is correct.

    3. If the fix is non-obvious, add a docstring or extended comment explaining the reasoning.

    4. Link to the finding/ticket for full context.

    5. If the fix changes behavior, update any relevant documentation (API docs, README, CHANGELOG).

    6. Keep the documentation proportional to the complexity — a one-line fix needs a one-line comment, not a paragraph.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition]
  example_good: |
    # In the code:
    def list_items(page: int = 1, per_page: int = 10):
        # Fix PQB-018: page is 1-indexed, so offset for page 1 must be 0.
        # Previous: page * per_page (wrong: page 1 → offset 10, skipping first items)
        offset = (page - 1) * per_page
        return db.get_items(offset=offset, limit=per_page)

    # In the commit message:
    # fix: correct pagination offset calculation (PQB-018)
    #
    # Page parameter is 1-indexed but offset was calculated as page*per_page,
    # causing page 1 to skip the first per_page items. Changed to
    # (page-1)*per_page so page 1 starts at offset 0.
    #
    # Regression test: test_regression_PQB_018_pagination_offset
  example_bad: |
    # The fix with no documentation:
    def list_items(page: int = 1, per_page: int = 10):
        offset = (page - 1) * per_page  # Why (page-1)? Is this right?
        return db.get_items(offset=offset, limit=per_page)

    # 6 months later, developer "simplifies" it:
    # offset = page * per_page  # This looks cleaner
    # Reintroduces the exact same bug
  when_applies: Every non-trivial fix. Inline comments for code-level fixes, commit messages for all fixes, extended documentation for complex or non-obvious fixes.
  sources: ["https://google.github.io/styleguide/pyguide.html#38-comments-and-docstrings"]

- id: PQR-012
  text: "Monitoring after fix — after deploying a fix, monitor the affected metrics for at least 24 hours. A fix that works in testing but fails in production under real load is not a fix."
  why: >
    The test environment is a simplified model of production. It has less data, less traffic, fewer concurrent
    users, and no real-world edge cases. A fix that passes all tests might still fail in production because of
    factors that tests cannot replicate: real data distributions, actual traffic patterns, third-party service
    behavior, and time-dependent conditions. Monitoring for 24 hours after deployment catches these production-only
    failures before they become chronic problems. The 24-hour window covers a full daily cycle of usage patterns.
  how_to_do_right: >
    1. Before deploying, identify the metrics that the fix should improve (error rate, latency, success rate).

    2. Record the baseline values of these metrics.

    3. Deploy the fix.

    4. Monitor the metrics for 24 hours. Compare against baseline.

    5. If metrics improve: fix is working. Document the improvement.

    6. If metrics do not improve or worsen: investigate. The fix might not address the real problem, or it might introduce a new issue.

    7. Set up temporary alerts for the affected metrics with tighter thresholds during the monitoring period.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition]
  example_good: |
    # Fix deployed: PQB-003 (N+1 query in claims list)
    # Monitoring plan:
    # Metric 1: p99 latency of GET /api/claims
    #   Baseline: 3.2s (N+1 query)
    #   Expected: < 200ms (single query with join)
    # Metric 2: Database query count per request
    #   Baseline: 101 queries per request
    #   Expected: 2-3 queries per request

    # 1 hour post-deploy:
    # p99 latency: 150ms ✓ (95% improvement)
    # Query count: 2 per request ✓

    # 24 hours post-deploy:
    # p99 latency: 180ms ✓ (stable, slightly higher at peak hours)
    # Query count: 2 per request ✓ (consistent)
    # Error rate: 0.01% ✓ (same as baseline, no regressions)

    # VERDICT: Fix confirmed working in production. Close the finding.
  example_bad: |
    # Fix deployed at 5 PM Friday
    # Developer: "Tests pass, deployed, I'm done for the week"
    # Saturday 2 AM: fix causes memory leak under sustained load
    # Sunday 8 AM: OOM kill, service down for 2 hours
    # Monday: "When did this start?" — nobody was monitoring
  when_applies: After every production deployment, especially for bug fixes. Monitor for at least 24 hours to cover a full daily usage cycle. Set temporary alerts for affected metrics.
  sources: ["https://sre.google/sre-book/monitoring-distributed-systems/"]

- id: PQR-013
  text: "Communication protocol — notify stakeholders BEFORE deploying a fix (what will change), AFTER deploying (it is live), and with RESULTS (did it work). Silent fixes erode team trust."
  why: >
    Fixes affect more people than just the developer: QA needs to verify, product needs to communicate to users,
    ops needs to monitor, support needs to know what changed. A silent fix (deployed without notification) creates
    confusion: "Did the fix go out?" "Is it safe to verify now?" "Why are the metrics changing?" "Was that
    intentional?" Three brief messages (before, after, results) keep everyone informed and enable parallel work.
    The before-message gives QA time to prepare verification. The after-message triggers monitoring. The results
    message closes the loop.
  how_to_do_right: >
    1. BEFORE deployment: "[FIX] Deploying fix for PQB-018 (pagination offset). Expected: page 1 will now return first 10 items. Risk: low (1 line change). ETA: 10 minutes."

    2. AFTER deployment: "[DEPLOYED] Fix PQB-018 is live in production. Monitoring metrics. Please verify if you see issues."

    3. RESULTS (24h later): "[VERIFIED] Fix PQB-018 confirmed working. p99 latency improved from 3.2s to 150ms. Error rate unchanged. Closing finding."

    4. If the fix causes issues: "[ROLLBACK] Fix PQB-018 rolled back due to [issue]. Investigating."

    5. Use a dedicated channel (Slack, Teams) for deployment notifications.

    6. Tag relevant people: QA lead, product owner, on-call engineer.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition]
  example_good: |
    # Slack channel: #deployments

    # 14:00 — BEFORE:
    # @qa-team @on-call
    # [FIX] Deploying fix for PQB-003 (N+1 query in claims list)
    # Change: Added eager loading in get_claims_with_sources()
    # Expected impact: p99 latency drops from 3.2s to <200ms
    # Risk: Low — single file change, 47 existing tests pass
    # ETA: 5 minutes

    # 14:05 — AFTER:
    # [DEPLOYED] Fix PQB-003 is live.
    # Monitoring: Grafana dashboard [link]
    # Initial metrics: p99 = 150ms (was 3.2s) ✓

    # Next day 14:00 — RESULTS:
    # [VERIFIED] Fix PQB-003 confirmed working for 24h.
    # p99 latency: 150-180ms (was 3.2s) — 95% improvement
    # Error rate: 0.01% (unchanged)
    # DB query count: 2/request (was 101/request)
    # Closing PQB-003. Great work team!
  example_bad: |
    # Developer deploys fix at 3 PM
    # Nobody notified
    # QA at 4 PM: "Did the fix go out? I want to verify"
    # Developer (on another task): "Oh yeah, I deployed it an hour ago"
    # Product at 5 PM: "Users are reporting changes — was something deployed?"
    # Ops at 6 PM: "I see metric changes — is this expected or an incident?"
  when_applies: Every production deployment, no matter how small. The three-message protocol takes 5 minutes total and saves hours of confusion.
  sources: ["https://sre.google/sre-book/managing-incidents/"]

- id: PQR-014
  text: "Escalation criteria — escalate to a senior engineer or architect when: root cause is unclear after 30 minutes, fix requires changing the public API, fix touches more than 3 files, or the same bug has recurred."
  why: >
    Some bugs exceed the scope of a single developer's rework cycle. Continuing to investigate alone past the
    point of diminishing returns wastes time and risks making things worse. Clear escalation criteria remove the
    ego factor ("I should be able to figure this out") and replace it with a systematic process. Escalating
    early is not a sign of weakness — it is a sign of professional maturity. A senior engineer who has seen the
    pattern before can often identify the root cause in 5 minutes that would take a junior developer 5 hours.
  how_to_do_right: >
    1. ESCALATE if root cause is unclear after 30 minutes of investigation.

    2. ESCALATE if the fix requires changing a public API (breaking change).

    3. ESCALATE if the fix requires changes to > 3 files (cross-cutting concern).

    4. ESCALATE if the same bug has recurred (the previous fix was a symptom fix).

    5. ESCALATE if the fix requires database migration in production.

    6. When escalating, provide: what you know, what you have tried, what you think the issue might be.

    7. Track escalation frequency — frequent escalation on the same area indicates a systemic design issue.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition]
  example_good: |
    # Escalation example:

    # TO: @senior-engineer
    # SUBJECT: Escalation — recurring auth failure in claims API

    # SITUATION:
    # Claims API returns 401 intermittently for authenticated users.
    # This is the 3rd occurrence (previously fixed in PQB-007 and PQR-014).

    # WHAT I KNOW:
    # - JWT token is valid (verified manually with jwt.io)
    # - Error occurs only under high load (> 100 concurrent requests)
    # - No errors in auth middleware logs

    # WHAT I TRIED:
    # - Verified token expiration logic (correct)
    # - Added debug logging to auth middleware (no errors caught)
    # - Tested with single request (always works)

    # HYPOTHESIS:
    # Possible race condition in token verification under concurrent requests.
    # Need someone with deeper knowledge of the auth middleware to investigate.

    # IMPACT: ~2% of authenticated requests fail, increasing with load.
  example_bad: |
    # Developer spends 6 hours on a bug that a senior would solve in 15 minutes
    # Developer: "I didn't want to bother anyone"
    # 6 hours of developer time wasted
    # Meanwhile, users are experiencing the bug in production
    # Senior engineer: "Oh, that's the known race condition in the token cache.
    #                   It's a one-line fix. I've seen this pattern 3 times."
  when_applies: During any rework or debugging session. The 30-minute rule is a guideline — adjust based on the severity of the issue. P0 issues should be escalated immediately, not after 30 minutes.
  sources: ["https://sre.google/sre-book/managing-incidents/"]

- id: PQR-015
  text: "Rework review protocol — rework review is a focused verification, not a full re-review. Check: (1) finding addressed, (2) regression test included, (3) no scope creep, (4) no regressions."
  why: >
    Rework review is different from initial code review. Initial code review evaluates architecture, design, naming,
    test coverage, and correctness across the entire implementation. Rework review evaluates ONE thing: did the
    rework fix the finding without breaking anything else? If the rework review expands to re-evaluate the entire
    implementation, it becomes a second code review that produces new findings, triggering more rework, creating
    an infinite loop. The rework review protocol keeps the review focused and ensures convergence.
  how_to_do_right: >
    1. For each finding in the rework cycle, verify:
       a. Is the finding addressed? (Read the fix, compare with the finding.)
       b. Is there a regression test? (Test that would have caught the original bug.)
       c. Is the fix scoped? (Only changes related to the finding, no bonus improvements.)
       d. Do all existing tests pass? (No regressions.)

    2. If ALL four checks pass for ALL findings: APPROVE and PROMOTE.

    3. If a check fails: RETURN with specific feedback on which check failed and why.

    4. If NEW issues are discovered: create SEPARATE findings, do NOT add to current rework cycle.

    5. Maximum 3 rework cycles per sprint. If not converging after 3 cycles, escalate.

    6. Track rework cycle count per sprint — it is a quality metric for the team.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition]
  example_good: |
    # Rework Review Checklist — Sprint S05, Cycle 2
    # Reviewer: QA Master

    # Finding PQB-003 (N+1 query):
    # [x] Finding addressed: selectinload added, query count reduced from 101 to 2
    # [x] Regression test: test_regression_PQB_003_no_n_plus_one added
    # [x] Scoped: Only claims.py modified, 4 lines changed
    # [x] No regressions: 47/47 tests pass
    # VERDICT: ✓ FIXED

    # Finding PQB-018 (Pagination offset):
    # [x] Finding addressed: offset calculation corrected
    # [x] Regression test: test_regression_PQB_018_pagination_offset added
    # [x] Scoped: Only api/claims.py modified, 1 line changed
    # [x] No regressions: 47/47 tests pass
    # VERDICT: ✓ FIXED

    # Overall: 2/2 findings fixed, 0 regressions
    # New observation: logging could be improved (NOT blocking — created as P3 for next cycle)
    # DECISION: APPROVE AND PROMOTE
  example_bad: |
    # Rework review:
    # Reviewer: "Finding 1 is fixed, but I noticed the error messages could be better"
    # → New finding added to rework
    # "Finding 2 is fixed, but the function could be split into smaller functions"
    # → New finding added to rework
    # "Also, the naming convention is inconsistent with other modules"
    # → New finding added
    # Result: 3 new findings from a review of 2 fixes
    # Cycle 3 will produce more findings, cycle 4 more...
    # Sprint is stuck in rework for 2 weeks
  when_applies: During every rework review. The four-check protocol is mandatory. New findings go to separate tickets. Maximum 3 cycles before escalation.
  sources: ["https://google.github.io/eng-practices/review/reviewer/"]
