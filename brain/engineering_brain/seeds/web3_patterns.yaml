layer: patterns
technology: Web3
domain: blockchain
knowledge:
- id: PT-W3-WALLET-001
  text: Use viem + wagmi for Ethereum wallet integration — they provide type-safe, tree-shakeable React hooks with built-in
    WalletConnect v2 support.
  why: ethers.js is a monolithic 120KB+ library with poor tree-shaking — most apps use 10% of it but ship 100%. viem is 35KB
    tree-shaken, fully type-safe with TypeScript, and 10x faster for ABI encoding. wagmi wraps viem with React hooks that
    handle wallet state, reconnection, chain switching, and error boundaries. Migration from ethers.js to viem/wagmi eliminates
    entire categories of runtime type errors.
  how_to_do_right: 'Install wagmi + viem + @tanstack/react-query. Configure wagmi with WagmiProvider and supported chains.
    Use hooks: useAccount, useConnect, useWriteContract, useReadContract. viem''s strict typing catches ABI mismatches at
    compile time.'
  severity: high
  technologies:
    framework: [frontend, react]
    library: [viem, walletconnect]
    platform: [tools, wagmi]
  domains:
    domain: [architecture, blockchain]
    concern: [frontend]
  example_good: "// wagmi v2 + viem — type-safe, tree-shakeable\nimport { useAccount, useConnect, useWriteContract } from\
    \ \"wagmi\";\nimport { parseAbi, parseEther } from \"viem\";\n\nconst abi = parseAbi([\n    \"function deposit(uint256\
    \ amount) payable\",\n    \"event Deposit(address indexed user, uint256 amount)\",\n]);\n\nfunction DepositButton() {\n\
    \    const { address, isConnected } = useAccount();\n    const { writeContract, isPending } = useWriteContract();\n\n\
    \    return (\n        <button\n            disabled={!isConnected || isPending}\n            onClick={() => writeContract({\n\
    \                address: VAULT_ADDRESS,\n                abi,\n                functionName: \"deposit\",     // Type-checked\
    \ against ABI\n                args: [parseEther(\"1.0\")],   // Type-checked args\n                value: parseEther(\"\
    1.0\"),\n            })}\n        >\n            {isPending ? \"Confirming...\" : \"Deposit 1 ETH\"}\n        </button>\n\
    \    );\n}\n"
  example_bad: '// ethers.js v5 — no type safety, 120KB+ bundle

    import { ethers } from "ethers"; // Ships entire library

    const provider = new ethers.providers.Web3Provider(window.ethereum);

    const contract = new ethers.Contract(address, abi, signer);

    // contract.deposit(amount) — no compile-time type checking

    // Wrong function name or args → runtime error in production

    '
  sources: ["https://wagmi.sh/react/getting-started", "https://viem.sh/docs/introduction"]
  when_applies: "When integrating Ethereum wallet connectivity into a React frontend application"
- id: PT-W3-WALLET-002
  text: Implement EIP-1193 provider detection with multi-wallet support — never assume window.ethereum is MetaMask.
  why: window.ethereum is a shared namespace. Multiple wallet extensions (MetaMask, Coinbase Wallet, Rabby, Phantom) compete
    for it, overwriting each other. Assuming window.ethereum is MetaMask breaks for users with other wallets. EIP-6963 (Multi
    Injected Provider Discovery) is the modern standard for discovering all installed wallets without conflicts.
  how_to_do_right: Use wagmi's built-in connector system which supports EIP-6963 automatically. Or manually implement EIP-6963
    event listening (eip6963:announceProvider). Present all detected wallets to the user for selection. Include WalletConnect
    as a fallback for mobile and hardware wallets.
  severity: medium
  technologies:
    framework: [frontend, react]
    library: [walletconnect]
    platform: [tools, wagmi]
  domains:
    domain: [architecture, blockchain]
    concern: [frontend]
  example_good: "// wagmi config — auto-discovers all EIP-6963 wallets\nimport { createConfig, http } from \"wagmi\";\nimport\
    \ { mainnet, arbitrum, optimism } from \"wagmi/chains\";\nimport { injected, walletConnect } from \"wagmi/connectors\"\
    ;\n\nexport const config = createConfig({\n    chains: [mainnet, arbitrum, optimism],\n    connectors: [\n        injected(),\
    \  // Auto-discovers ALL EIP-6963 wallets\n        walletConnect({\n            projectId: process.env.NEXT_PUBLIC_WC_PROJECT_ID,\n\
    \        }),\n    ],\n    transports: {\n        [mainnet.id]: http(\"https://eth-mainnet.g.alchemy.com/v2/KEY\"),\n \
    \       [arbitrum.id]: http(\"https://arb-mainnet.g.alchemy.com/v2/KEY\"),\n        [optimism.id]: http(\"https://opt-mainnet.g.alchemy.com/v2/KEY\"\
    ),\n    },\n});\n"
  example_bad: "// Assuming MetaMask only — breaks for all other wallets\nif (!window.ethereum) {\n    alert(\"Please install\
    \ MetaMask!\"); // Alienates 60% of wallet users\n}\nconst provider = window.ethereum; // Could be Coinbase, Rabby, etc.\n"
  sources: ["https://eips.ethereum.org/EIPS/eip-6963", "https://eips.ethereum.org/EIPS/eip-1193"]
  when_applies: "When handling wallet discovery and multi-wallet support via EIP-6963"
- id: PT-W3-TOKEN-001
  text: Implement EIP-2612 permit for ERC-20 tokens — eliminates the separate approve transaction, improving UX and reducing
    gas.
  why: 'The standard ERC-20 approve/transferFrom pattern requires TWO transactions: first approve (user pays gas), then transferFrom
    (contract calls). With EIP-2612 permit, the user signs an off-chain message (free) that grants approval, and the contract
    can call permit + transferFrom in a single transaction. This saves users one transaction (~$5-20 in gas) and simplifies
    the UX flow from 2 clicks to 1.'
  how_to_do_right: Inherit ERC20Permit from OpenZeppelin. On the frontend, use signTypedData (EIP-712) to get the permit signature.
    Pass (v, r, s, deadline, amount) to the contract which calls token.permit() before transferFrom. Always include a deadline
    to prevent replay.
  severity: medium
  technologies:
    lang: [solidity]
    library: [viem]
    platform: [tools, openzeppelin]
  domains:
    domain: [architecture, blockchain]
    concern: [tokens, defi]
  example_good: "// Contract side — accept permit + deposit in one tx\nfunction depositWithPermit(\n    uint256 amount,\n\
    \    uint256 deadline,\n    uint8 v, bytes32 r, bytes32 s\n) external {\n    // Permit: approve this contract to spend\
    \ user's tokens (gasless for user)\n    token.permit(msg.sender, address(this), amount, deadline, v, r, s);\n    // Transfer:\
    \ pull tokens from user\n    token.transferFrom(msg.sender, address(this), amount);\n    // One transaction instead of\
    \ two!\n}\n\n// Frontend — sign permit off-chain (free)\nconst signature = await walletClient.signTypedData({\n    domain:\
    \ { name: \"USDC\", version: \"2\", chainId: 1, verifyingContract: usdcAddress },\n    types: { Permit: [\n        { name:\
    \ \"owner\", type: \"address\" },\n        { name: \"spender\", type: \"address\" },\n        { name: \"value\", type:\
    \ \"uint256\" },\n        { name: \"nonce\", type: \"uint256\" },\n        { name: \"deadline\", type: \"uint256\" },\n\
    \    ]},\n    primaryType: \"Permit\",\n    message: { owner: userAddress, spender: vaultAddress, value: amount, nonce,\
    \ deadline },\n});\n"
  example_bad: '// Legacy: TWO transactions required

    // Tx 1: User approves (pays gas, waits for confirmation)

    await token.approve(vaultAddress, amount); // $5-20 gas

    // Tx 2: User deposits (pays gas again)

    await vault.deposit(amount); // Another $5-20 gas

    // Total: 2 transactions, 2 gas payments, poor UX

    '
  sources: ["https://eips.ethereum.org/EIPS/eip-2612"]
  when_applies: "When implementing ERC-20 token interactions with gasless approval via EIP-2612 permits"
- id: PT-W3-TOKEN-002
  text: Use ERC-1155 for mixed fungible/non-fungible token collections — it supports batch operations and reduces deployment
    costs vs separate ERC-20 + ERC-721.
  why: 'A game with 50 item types needs 50 ERC-20 contracts OR 1 ERC-1155 contract. ERC-1155 supports batch transfers (send
    10 different items in one transaction), mixed fungibility (gold coins as fungible + unique sword as non-fungible), and
    a single approval for all token IDs. Deployment cost: 50 ERC-20s = ~$5000 vs 1 ERC-1155 = ~$100.'
  how_to_do_right: Use ERC-1155 when you have multiple token types from the same project. Implement uri() function with token
    ID substitution for metadata. Use safeBatchTransferFrom for multi-item transfers. For single unique assets (1/1 art),
    ERC-721 is still preferred for marketplace compatibility.
  severity: medium
  technologies:
    lang: [solidity]
    platform: [tools, openzeppelin]
  domains:
    domain: [architecture, blockchain]
    concern: [tokens, nft]
  example_good: "import \"@openzeppelin/contracts/token/ERC1155/ERC1155.sol\";\n\ncontract GameItems is ERC1155 {\n    uint256\
    \ public constant GOLD = 0;         // Fungible: many units\n    uint256 public constant SILVER = 1;        // Fungible:\
    \ many units\n    uint256 public constant DRAGON_SWORD = 2;  // Non-fungible: quantity 1\n    uint256 public constant\
    \ SHIELD = 3;        // Semi-fungible: limited edition\n\n    constructor() ERC1155(\"https://api.game.com/items/{id}.json\"\
    ) {\n        _mint(msg.sender, GOLD, 1_000_000, \"\");\n        _mint(msg.sender, SILVER, 5_000_000, \"\");\n        _mint(msg.sender,\
    \ DRAGON_SWORD, 1, \"\");  // Unique\n        _mint(msg.sender, SHIELD, 100, \"\");       // Limited\n    }\n\n    //\
    \ Batch transfer — 1 transaction for multiple items\n    // safeBatchTransferFrom(from, to, [GOLD, SILVER, SHIELD], [100,\
    \ 500, 1], \"\")\n}\n"
  example_bad: '// Deploying separate contracts per token type — expensive and fragmented

    contract Gold is ERC20 { }     // Deploy #1: ~$100

    contract Silver is ERC20 { }   // Deploy #2: ~$100

    contract Sword is ERC721 { }   // Deploy #3: ~$150

    contract Shield is ERC721 { }  // Deploy #4: ~$150

    // 4 deployments, 4 approvals needed, no batch transfers

    '
  sources: ["https://eips.ethereum.org/EIPS/eip-1155", "https://docs.openzeppelin.com/contracts/5.x/erc1155"]
  when_applies: "When building multi-token systems using ERC-1155 for fungible and non-fungible assets"
- id: PT-W3-VAULT-001
  text: Use ERC-4626 for yield-bearing token vaults — it standardizes deposit/withdraw/redeem, enabling composability across
    DeFi protocols.
  why: Before ERC-4626, every yield protocol had a different interface (Yearn yTokens, Compound cTokens, Aave aTokens). Integrating
    each required custom code. ERC-4626 standardizes the vault interface so any protocol can integrate any vault with the
    same code. This composability is critical for yield aggregators, portfolio managers, and lending protocols that need to
    treat all yield sources uniformly.
  how_to_do_right: Inherit ERC4626 from OpenZeppelin. Override totalAssets() to return the vault's current asset value. Handle
    rounding correctly — round DOWN for user-facing calculations (deposit, redeem) and UP for protocol-facing calculations
    (withdraw, mint). Implement maxDeposit/maxWithdraw limits.
  severity: medium
  technologies:
    lang: [solidity]
    library: [defi]
    platform: [tools, openzeppelin]
  domains:
    domain: [architecture, blockchain]
    concern: [defi, tokens]
  example_good: "import \"@openzeppelin/contracts/token/ERC20/extensions/ERC4626.sol\";\n\ncontract YieldVault is ERC4626\
    \ {\n    constructor(IERC20 asset_)\n        ERC4626(asset_)\n        ERC20(\"Yield Vault Token\", \"yvTOKEN\")\n    {}\n\
    \n    // Total assets under management (includes yield)\n    function totalAssets() public view override returns (uint256)\
    \ {\n        return asset.balanceOf(address(this)) + _pendingYield();\n    }\n\n    // Standard interface — any DeFi protocol\
    \ can integrate\n    // vault.deposit(assets, receiver) → mint shares\n    // vault.withdraw(assets, receiver, owner)\
    \ → burn shares\n    // vault.convertToShares(assets) → preview conversion\n    // vault.convertToAssets(shares) → preview\
    \ conversion\n}\n"
  example_bad: "// Custom vault interface — every integrator needs custom code\ncontract CustomVault {\n    function stake(uint256\
    \ amount) external { }     // Non-standard\n    function unstake(uint256 shares) external { }    // Non-standard\n   \
    \ function getSharePrice() external view { }       // Non-standard\n    // Every protocol that wants to use this vault\
    \ needs custom adapter\n}\n"
  sources: ["https://eips.ethereum.org/EIPS/eip-4626", "https://docs.openzeppelin.com/contracts/5.x/erc4626"]
  when_applies: "When integrating with DeFi yield vaults using the ERC-4626 tokenized vault standard"
- id: PT-W3-DEFI-001
  text: Use Chainlink price feeds with staleness checks and fallback mechanisms — never rely on a single oracle source for
    critical financial calculations.
  why: 'Oracle manipulation is the #1 DeFi exploit vector. Single-source oracles can be manipulated (flash loans), stale (Chainlink
    feed temporarily paused), or compromised. The LUNA crash showed that even major oracles can lag during extreme volatility.
    Lending protocols using stale prices liquidated users at wrong values, losing $100M+.'
  how_to_do_right: Use Chainlink as primary oracle with staleness threshold (e.g., 1 hour). Implement a secondary oracle (Uniswap
    V3 TWAP) as fallback. Compare both sources — if they diverge more than 5%, pause operations. Check roundId is increasing
    (prevents replaying old data). Use heartbeat checks for each feed.
  severity: critical
  technologies:
    lang: [solidity]
    platform: [oracle, chainlink, defi, uniswap]
  domains:
    domain: [architecture, blockchain, security]
    concern: [defi]
  example_good: "import \"@chainlink/contracts/src/v0.8/interfaces/AggregatorV3Interface.sol\";\n\ncontract PriceOracle {\n\
    \    AggregatorV3Interface public immutable primaryFeed;\n    AggregatorV3Interface public immutable secondaryFeed;\n\
    \    uint256 public constant MAX_STALENESS = 3600; // 1 hour\n    uint256 public constant MAX_DEVIATION = 500;  // 5%\
    \ in basis points\n\n    function getPrice() public view returns (uint256) {\n        // Primary: Chainlink\n        (uint80\
    \ roundId, int256 price, , uint256 updatedAt, uint80 answeredInRound)\n            = primaryFeed.latestRoundData();\n\
    \        require(price > 0, \"Invalid price\");\n        require(updatedAt > block.timestamp - MAX_STALENESS, \"Stale\
    \ price\");\n        require(answeredInRound >= roundId, \"Stale round\");\n\n        // Secondary: verify deviation\n\
    \        (, int256 secondaryPrice, , uint256 secUpdatedAt, )\n            = secondaryFeed.latestRoundData();\n       \
    \ if (secUpdatedAt > block.timestamp - MAX_STALENESS) {\n            uint256 deviation = _calcDeviation(price, secondaryPrice);\n\
    \            require(deviation < MAX_DEVIATION, \"Price deviation too high\");\n        }\n\n        return uint256(price);\n\
    \    }\n}\n"
  example_bad: "function getPrice() public view returns (uint256) {\n    (, int256 price, , , ) = feed.latestRoundData();\n\
    \    return uint256(price); // No staleness check, no fallback, no deviation check\n    // Stale price during market crash\
    \ → wrong liquidation → $100M+ loss\n}\n"
  sources: ["https://docs.chain.link/data-feeds/using-data-feeds"]
  when_applies: "When consuming off-chain price data on-chain via Chainlink oracles"
- id: PT-W3-DEFI-002
  text: Implement flash loan protection for price-dependent operations — ensure prices cannot be manipulated within a single
    transaction.
  why: 'Flash loans allow borrowing unlimited capital with zero collateral within a single transaction. An attacker can: borrow
    $100M, manipulate a DEX pool price, trigger your protocol''s price-dependent logic, and repay — all atomically. Any contract
    using spot prices from AMMs is vulnerable. Losses from flash loan attacks exceed $1B across DeFi.'
  how_to_do_right: Use TWAPs (Time-Weighted Average Prices) over 30+ minute windows — flash loans can only manipulate spot
    prices, not time-weighted averages. Use Chainlink oracle feeds which are off-chain and immune to flash loan manipulation.
    Implement per-block price manipulation checks. Never use getReserves() from a single DEX pool as a price source.
  severity: critical
  technologies:
    lang: [solidity]
    library: [defi]
    platform: [defi, uniswap]
  domains:
    domain: [architecture, blockchain, security]
    concern: [defi]
  example_good: "// Uniswap V3 TWAP — resistant to flash loan manipulation\nimport \"@uniswap/v3-core/contracts/interfaces/IUniswapV3Pool.sol\"\
    ;\n\nfunction getTWAP(address pool, uint32 twapInterval) internal view returns (uint256) {\n    require(twapInterval >=\
    \ 1800, \"TWAP window too short\"); // 30 min minimum\n    uint32[] memory secondsAgos = new uint32[](2);\n    secondsAgos[0]\
    \ = twapInterval;\n    secondsAgos[1] = 0;\n\n    (int56[] memory tickCumulatives, ) = IUniswapV3Pool(pool).observe(secondsAgos);\n\
    \    int56 tickDiff = tickCumulatives[1] - tickCumulatives[0];\n    int24 avgTick = int24(tickDiff / int56(int32(twapInterval)));\n\
    \n    return OracleLibrary.getQuoteAtTick(avgTick, 1e18, token0, token1);\n}\n"
  example_bad: "// VULNERABLE: spot price from AMM — manipulable via flash loan\nfunction getPrice(address pair) internal\
    \ view returns (uint256) {\n    (uint112 r0, uint112 r1, ) = IUniswapV2Pair(pair).getReserves();\n    return (uint256(r1)\
    \ * 1e18) / uint256(r0);\n    // Attacker: flash loan → swap to move reserves → call this → profit\n}\n"
  sources: ["https://ethereum.org/en/developers/docs/mev/", "https://docs.uniswap.org/concepts/protocol/oracle"]
  when_applies: "When protecting DeFi protocols from oracle manipulation and MEV sandwich attacks"
- id: PT-W3-INDEX-001
  text: Use TheGraph or dedicated indexers for querying historical blockchain data — never scan blocks from the frontend.
  why: Querying blockchain events by scanning blocks from a frontend is O(n) in the number of blocks — for Ethereum that is
    19M+ blocks. A single getLogs call for 'all Transfer events' takes minutes and costs hundreds of RPC credits. TheGraph
    pre-indexes events into a queryable GraphQL database, returning results in milliseconds. Without indexing, your dApp is
    unusable for any historical data.
  how_to_do_right: Define a subgraph schema mapping events to entities. Deploy to TheGraph's hosted or decentralized network.
    Query via GraphQL from the frontend. Use pagination and filtering. For real-time updates, combine indexer queries with
    direct RPC event subscriptions.
  severity: high
  technologies:
    lang: [graphql]
    library: [thegraph]
    platform: [ethereum]
  domains:
    domain: [architecture, blockchain]
    concern: [indexing, frontend]
  example_good: "// schema.graphql — define entities\ntype Transfer @entity {\n    id: ID!\n    from: Bytes!\n    to: Bytes!\n\
    \    value: BigInt!\n    timestamp: BigInt!\n    blockNumber: BigInt!\n}\n\n// mapping.ts — handle events\nexport function\
    \ handleTransfer(event: TransferEvent): void {\n    let transfer = new Transfer(event.transaction.hash.toHex());\n   \
    \ transfer.from = event.params.from;\n    transfer.to = event.params.to;\n    transfer.value = event.params.value;\n \
    \   transfer.timestamp = event.block.timestamp;\n    transfer.blockNumber = event.block.number;\n    transfer.save();\n\
    }\n\n// Frontend — millisecond queries\nconst { data } = useQuery(gql`\n    query RecentTransfers($user: Bytes!) {\n \
    \       transfers(where: { from: $user }, orderBy: timestamp, orderDirection: desc, first: 50) {\n            id, to,\
    \ value, timestamp\n        }\n    }\n`, { variables: { user: address } });\n"
  example_bad: "// Scanning blocks from frontend — catastrophically slow\nconst events = [];\nfor (let block = 0; block <\
    \ 19_000_000; block++) {\n    const logs = await provider.getLogs({ fromBlock: block, toBlock: block, address: token });\n\
    \    events.push(...logs);\n}\n// Takes hours, costs thousands of RPC calls, crashes browser\n"
  sources: ["https://thegraph.com/docs/en/developing/creating-a-subgraph/"]
  when_applies: "When indexing blockchain events for efficient off-chain querying via The Graph"
- id: PT-W3-STORAGE-001
  text: Use IPFS with pinning services for mutable metadata and Arweave for permanent storage — understand the persistence
    guarantees of each.
  why: IPFS is content-addressed but NOT persistent by default — data is garbage collected when no node pins it. 'Uploaded
    to IPFS' means nothing without pinning. Pinning services (Pinata, web3.storage) guarantee persistence for a monthly fee.
    Arweave stores data permanently for a one-time payment. NFT metadata stored on unpinned IPFS disappears when the creator
    stops paying — this has happened to thousands of NFT collections.
  how_to_do_right: 'For NFT metadata: use Arweave for permanent storage or IPFS + Pinata/web3.storage with paid pinning plan.
    Use CIDv1 (base32) not CIDv0 (base58). Store the IPFS CID on-chain (immutable reference). For mutable data, use IPNS or
    ENS content records. Verify CID integrity before storing on-chain.'
  severity: high
  technologies:
    library: [arweave, pinata]
    platform: [storage, ipfs]
  domains:
    domain: [architecture, blockchain, infrastructure]
    concern: [storage, nft]
  example_good: "// Upload to IPFS via Pinata — guaranteed pinning\nimport PinataSDK from \"@pinata/sdk\";\nconst pinata =\
    \ new PinataSDK({ pinataJwt: process.env.PINATA_JWT });\n\nasync function uploadNFTMetadata(name, description, imageFile)\
    \ {\n    // 1. Upload image to IPFS (pinned)\n    const imageResult = await pinata.upload.file(imageFile);\n    const\
    \ imageCID = imageResult.IpfsHash; // CIDv1\n\n    // 2. Create metadata JSON (ERC-721 standard)\n    const metadata =\
    \ {\n        name,\n        description,\n        image: `ipfs://${imageCID}`,\n        attributes: [{ trait_type: \"\
    Rarity\", value: \"Legendary\" }],\n    };\n\n    // 3. Upload metadata to IPFS (pinned)\n    const metaResult = await\
    \ pinata.upload.json(metadata);\n    return `ipfs://${metaResult.IpfsHash}`;\n}\n\n// 4. Store CID on-chain — immutable\
    \ reference\nawait nft.setTokenURI(tokenId, `ipfs://${metadataCID}`);\n"
  example_bad: '// Uploading to IPFS without pinning — data WILL disappear

    const { cid } = await ipfs.add(metadata);

    // No pinning service — local node only

    // When your node goes offline → metadata gone → NFT images broken


    // Even worse: centralized URL that can change or go down

    await nft.setTokenURI(tokenId, "https://myserver.com/nft/123.json");

    // Server goes down → all NFT metadata lost

    '
  sources: ["https://docs.ipfs.tech/concepts/persistence/", "https://docs.pinata.cloud/introduction"]
  when_applies: "When storing files on IPFS with persistence guarantees via pinning services"
- id: PT-W3-GAS-001
  text: Use EIP-1559 fee parameters correctly — set maxFeePerGas as your absolute maximum and maxPriorityFeePerGas as the
    miner tip.
  why: 'EIP-1559 replaced the single gasPrice with a two-part fee: baseFee (burned, set by protocol) + priorityFee (tip to
    validators). Setting maxFeePerGas too low means transactions fail during base fee spikes. Setting maxPriorityFeePerGas
    too low means transactions are deprioritized. The actual fee paid is min(maxFeePerGas, baseFee + maxPriorityFeePerGas)
    — excess maxFeePerGas is refunded.'
  how_to_do_right: Set maxFeePerGas to 2x current baseFee (handles sudden spikes). Set maxPriorityFeePerGas based on current
    network congestion (1-5 gwei typical, higher for time-sensitive transactions). Monitor pending transactions and re-submit
    with higher fees if stuck.
  severity: medium
  technologies:
    library: [viem]
    platform: [ethereum]
  domains:
    domain: [architecture, blockchain]
    concern: [gas_optimization]
  example_good: "// viem — proper EIP-1559 fee estimation\nimport { createPublicClient, http, parseGwei } from \"viem\";\n\
    import { mainnet } from \"viem/chains\";\n\nconst client = createPublicClient({ chain: mainnet, transport: http() });\n\
    \nasync function sendTransaction(request) {\n    // Get current base fee\n    const block = await client.getBlock();\n\
    \    const baseFee = block.baseFeePerGas;\n\n    // maxFeePerGas = 2x baseFee (handles fee spike between blocks)\n   \
    \ // maxPriorityFeePerGas = tip to validator (1-5 gwei typical)\n    const maxPriorityFeePerGas = parseGwei(\"2\");\n\
    \    const maxFeePerGas = baseFee * 2n + maxPriorityFeePerGas;\n\n    return walletClient.sendTransaction({\n        ...request,\n\
    \        maxFeePerGas,\n        maxPriorityFeePerGas,\n        // Actual cost: min(maxFeePerGas, baseFee + priorityFee)\n\
    \        // Overpayment is refunded — setting high max is safe\n    });\n}\n"
  example_bad: "// Legacy gasPrice — overpays or underpays\nconst tx = await wallet.sendTransaction({\n    gasPrice: parseGwei(\"\
    30\"), // Fixed price — no EIP-1559 benefits\n    // If baseFee is 10 gwei, you tip 20 gwei extra (wasted)\n    // If\
    \ baseFee is 50 gwei, your transaction fails\n});\n"
  sources: ["https://eips.ethereum.org/EIPS/eip-1559", "https://ethereum.org/en/developers/docs/gas/"]
  when_applies: "When optimizing transaction gas costs using EIP-1559 fee estimation"
- id: PT-W3-GAS-002
  text: Use Multicall3 to batch multiple read calls into a single RPC request — reduces latency and RPC costs.
  why: A typical DeFi dashboard reads 20+ on-chain values (balances, prices, allowances, pool states). Each read is a separate
    RPC call with network round-trip latency. 20 calls x 100ms = 2 seconds of loading. Multicall3 batches all reads into a
    single eth_call, returning all results in one round trip (~100ms total). This is 20x faster and uses 1/20th the RPC credits.
  how_to_do_right: Use viem's multicall function or call Multicall3 contract directly. Batch related reads together. Handle
    individual call failures gracefully (Multicall3 returns success/failure per call). Set reasonable batch sizes (100-200
    calls per multicall) to avoid exceeding gas limits on the eth_call.
  severity: medium
  technologies:
    library: [viem]
    platform: [ethereum]
  domains:
    domain: [architecture, blockchain, performance]
    concern: [frontend]
  example_good: "import { createPublicClient, http } from \"viem\";\nimport { mainnet } from \"viem/chains\";\n\nconst client\
    \ = createPublicClient({ chain: mainnet, transport: http() });\n\n// Batch 5 reads into 1 RPC call — 100ms instead of\
    \ 500ms\nconst results = await client.multicall({\n    contracts: [\n        { address: tokenA, abi: erc20Abi, functionName:\
    \ \"balanceOf\", args: [user] },\n        { address: tokenB, abi: erc20Abi, functionName: \"balanceOf\", args: [user]\
    \ },\n        { address: tokenA, abi: erc20Abi, functionName: \"allowance\", args: [user, vault] },\n        { address:\
    \ vault,  abi: vaultAbi, functionName: \"totalAssets\" },\n        { address: vault,  abi: vaultAbi, functionName: \"\
    convertToShares\", args: [1000n] },\n    ],\n    allowFailure: true, // Individual calls can fail without breaking batch\n\
    });\n\n// Each result: { result: value, status: \"success\" | \"failure\" }\nconst [balA, balB, allowance, totalAssets,\
    \ sharePrice] = results;\n"
  example_bad: '// Sequential reads — 5 round trips, 5x latency, 5x RPC credits

    const balA = await tokenA.read.balanceOf([user]);

    const balB = await tokenB.read.balanceOf([user]);

    const allowance = await tokenA.read.allowance([user, vault]);

    const totalAssets = await vault.read.totalAssets();

    const sharePrice = await vault.read.convertToShares([1000n]);

    '
  sources: ["https://www.multicall3.com/", "https://viem.sh/docs/contract/multicall"]
  when_applies: "When batching multiple contract calls to save gas and reduce round trips"
- id: PT-W3-MEV-001
  text: Use Flashbots Protect or MEV-aware RPCs for transactions vulnerable to sandwich attacks — especially DEX swaps and
    large transfers.
  why: 'Every transaction in the public mempool is visible to MEV bots before it''s mined. A DEX swap for $10,000 will be
    sandwiched: bot buys before your swap (raising price), your swap executes at worse price, bot sells after (profiting the
    difference). Users lose 1-5% per swap to MEV extraction. Flashbots Protect sends transactions to a private mempool, invisible
    to sandwich bots.'
  how_to_do_right: Use Flashbots Protect RPC (https://rpc.flashbots.net) for swap transactions. Set appropriate slippage tolerance
    (0.5-1% for major pairs). Use MEV-Share for transactions that can share MEV with users. For programmatic MEV protection,
    use Flashbots bundles.
  severity: high
  technologies:
    library: [flashbots, defi]
    platform: [ethereum]
  domains:
    domain: [architecture, blockchain, security]
    concern: [defi]
  example_good: "// Use Flashbots Protect RPC — private mempool, no sandwich attacks\nimport { createWalletClient, http }\
    \ from \"viem\";\nimport { mainnet } from \"viem/chains\";\n\nconst protectedClient = createWalletClient({\n    chain:\
    \ mainnet,\n    transport: http(\"https://rpc.flashbots.net\"), // Private mempool\n});\n\n// Swap goes directly to block\
    \ builders — invisible to sandwich bots\nawait protectedClient.sendTransaction({\n    to: routerAddress,\n    data: swapCalldata,\n\
    \    maxFeePerGas,\n    maxPriorityFeePerGas,\n});\n\n// Also: set tight slippage in the swap itself\n// amountOutMinimum\
    \ = expectedAmount * 0.995 (0.5% slippage max)\n"
  example_bad: "// Public mempool — sandwich bots see your swap immediately\nconst publicClient = createWalletClient({\n \
    \   chain: mainnet,\n    transport: http(\"https://eth-mainnet.g.alchemy.com/v2/KEY\"), // Public\n});\n// $10,000 swap\
    \ visible in mempool → sandwiched → lose $100-500\n"
  sources: ["https://docs.flashbots.net/flashbots-protect/overview"]
  when_applies: "When protecting transactions from frontrunning and sandwich attacks via Flashbots"
- id: PT-W3-AA-001
  text: Use ERC-4337 Account Abstraction for smart accounts — enables social recovery, session keys, gas sponsorship, and
    batched transactions.
  why: 'Traditional EOAs (Externally Owned Accounts) have critical UX problems: lose private key = lose everything, every
    action requires ETH for gas, no transaction batching, no spending limits. ERC-4337 smart accounts solve all of these:
    social recovery (trusted contacts restore access), session keys (approve a dApp for limited time/amount), Paymasters sponsor
    gas (users don''t need ETH), and batch multiple operations in one UserOperation.'
  how_to_do_right: Use an ERC-4337 SDK (Pimlico, ZeroDev, Alchemy Account Kit). Deploy smart accounts as proxies for upgradeability.
    Implement session keys for seamless dApp interaction. Use Paymasters for gas sponsorship. Design recovery mechanisms with
    multiple guardians.
  severity: medium
  technologies:
    library: [erc-4337]
    platform: [ethereum]
  domains:
    domain: [architecture, blockchain, security]
    concern: [frontend]
  example_good: "// Using Pimlico + permissionless.js for ERC-4337\nimport { createSmartAccountClient } from \"permissionless\"\
    ;\nimport { createPimlicoClient } from \"permissionless/clients/pimlico\";\n\n// 1. Create smart account (social recovery\
    \ enabled)\nconst smartAccount = await signerToSafeSmartAccount(publicClient, {\n    signer: localSigner,\n    safeVersion:\
    \ \"1.4.1\",\n    entryPoint: ENTRYPOINT_ADDRESS_V07,\n});\n\n// 2. Create client with Paymaster (sponsor gas for users)\n\
    const smartAccountClient = createSmartAccountClient({\n    account: smartAccount,\n    entryPoint: ENTRYPOINT_ADDRESS_V07,\n\
    \    chain: mainnet,\n    bundlerTransport: http(bundlerUrl),\n    middleware: {\n        gasPrice: async () => (await\
    \ pimlicoClient.getUserOperationGasPrice()).fast,\n        sponsorUserOperation: pimlicoClient.sponsorUserOperation, //\
    \ Gas sponsored!\n    },\n});\n\n// 3. Batch multiple operations in one UserOperation\nconst txHash = await smartAccountClient.sendTransactions({\n\
    \    transactions: [\n        { to: tokenA, data: approveCalldata, value: 0n },\n        { to: vault, data: depositCalldata,\
    \ value: 0n },\n        { to: staking, data: stakeCalldata, value: 0n },\n    ],\n    // All 3 operations execute atomically\
    \ — 1 signature, gas sponsored\n});\n"
  example_bad: '// Traditional EOA — 3 separate transactions, user pays gas each time

    await token.approve(vault, amount);  // Tx 1: user signs + pays gas

    await vault.deposit(amount);          // Tx 2: user signs + pays gas

    await staking.stake(amount);          // Tx 3: user signs + pays gas

    // If user loses private key: all funds lost forever, no recovery

    '
  sources: ["https://eips.ethereum.org/EIPS/eip-4337", "https://ethereum.org/en/roadmap/account-abstraction/"]
  when_applies: "When implementing smart contract wallets with account abstraction (EIP-4337)"
- id: PT-W3-CID-001
  text: Use CIDv1 (base32) for all new IPFS content identifiers — CIDv0 (base58 Qm-prefix) is legacy and incompatible with
    subdomains.
  why: CIDv1 is self-describing (contains codec, hash function, length metadata), case-insensitive (works in DNS subdomains),
    and forward-compatible with new hash functions. CIDv0 (Qm...) is case-sensitive, limited to SHA-256/dag-pb, and cannot
    be used as DNS subdomain labels (which must be case-insensitive). IPFS gateways are migrating to subdomain-based URLs
    (bafyabc.ipfs.dweb.link) which require CIDv1.
  how_to_do_right: Configure your IPFS client to output CIDv1 by default (--cid-version=1). Convert existing CIDv0 to CIDv1
    when storing new references. Use base32 encoding for URL compatibility. Verify CIDs match expected content before on-chain
    storage.
  severity: low
  technologies:
    platform: [storage, ipfs]
  domains:
    domain: [architecture, blockchain, infrastructure]
    concern: [storage]
  example_good: '// CIDv1 (base32) — self-describing, DNS-compatible

    const cid = "bafybeigdyrzt5sfp7udm7hu76uh7y26nf3efuylqabf3oclgtqy55fbzdi";

    const gatewayUrl = `https://${cid}.ipfs.dweb.link/metadata.json`;

    // Works as subdomain — case-insensitive, future-proof


    // Force CIDv1 in upload

    const result = await ipfs.add(content, { cidVersion: 1 });

    '
  example_bad: '// CIDv0 (base58) — legacy, case-sensitive, no subdomain support

    const cid = "QmYwAPJzv5CZsnA625s3Xf2nemtYgPpHdWEz79ojWnPbdG";

    // Cannot be used as DNS subdomain (mixed case)

    // Limited to SHA-256 + dag-pb codec — not future-proof

    '
  sources: ["https://docs.ipfs.tech/concepts/content-addressing/#cid-versions"]
  when_applies: "When working with content-addressed storage and CID-based data integrity on IPFS"
- id: PT-W3-SETTLE-001
  text: Implement on-chain settlement as a two-phase commit — lock user funds during the settlement computation phase, then
    release in a single atomic settlement transaction to prevent double-withdrawal and partial settlement.
  why: 'Prediction market settlement is a complex multi-step process: (1) oracle reports outcome, (2) winners are computed,
    (3) collateral is distributed. If settlement is not atomic, a user could withdraw between step 2 and 3, receiving collateral
    twice. Two-phase commit: Phase 1 locks the market (no withdrawals), Phase 2 settles all positions atomically. This pattern
    is used by Polymarket and GMX for their settlement mechanisms. Attempting settlement without a lock means race conditions
    between settlement and withdrawal that can drain the contract.'
  how_to_do_right: 'Use a MarketState enum: ACTIVE → RESOLVING → SETTLED. Only allow withdrawals when state == SETTLED. Implement
    batchSettle() that processes all position holders in a loop within the same transaction. Use CALL IN TRANSACTIONS (Solidity)
    or Multicall3 for batch payments. Add reentrancy guard to the settlement function. Store settlement results in a mapping
    for users to claim rather than pushing to all addresses.'
  severity: critical
  technologies:
    lang: [solidity]
    library: [openzeppelin]
    platform: [ethereum]
  domains:
    domain: [architecture, blockchain]
    concern: [prediction_markets, defi]
  example_good: "enum MarketState { ACTIVE, RESOLVING, SETTLED }\n\ncontract PredictionMarket is ReentrancyGuard {\n    MarketState public state;\n\
    \    mapping(address => uint256) public claimable;  // Pull pattern: user claims\n\n    // Phase 1: Lock market for settlement\n\
    \    function initiateSettlement(uint8 winningOutcome) external onlyOracle {\n        require(state == MarketState.ACTIVE);\n\
    \        state = MarketState.RESOLVING;  // No more deposits/withdrawals\n        winningIndex = winningOutcome;\n    }\n\
    \n    // Phase 2: Compute and store claims (batch, gas-safe)\n    function computeClaims(address[] calldata winners, uint256[]\
    \ calldata amounts) external onlySettler {\n        require(state == MarketState.RESOLVING);\n        for (uint i = 0;\
    \ i < winners.length;) {\n            claimable[winners[i]] += amounts[i];  // Store for pull\n            unchecked { ++i;\
    \ }\n        }\n    }\n\n    // Users pull their own winnings (pull > push: no out-of-gas from single batch push)\n   \
    \ function claim() external nonReentrant {\n        require(state == MarketState.SETTLED);\n        uint256 amount = claimable[msg.sender];\n\
    \        require(amount > 0, \"Nothing to claim\");\n        claimable[msg.sender] = 0;\n        USDC.transfer(msg.sender,\
    \ amount);\n    }\n}\n"
  example_bad: "contract NaiveMarket {\n    // No state machine — withdrawal race condition\n    function withdraw() external\
    \ {\n        // Called while settlement is being computed — double withdrawal!\n        uint256 amount = calculateWinnings(msg.sender);\n\
    \        USDC.transfer(msg.sender, amount);\n    }\n\n    function settle() external onlyOwner {\n        // If someone calls\
    \ withdraw() between iterations: double pay\n        for (uint i = 0; i < winners.length; i++) {\n            uint256 amount\
    \ = calculateWinnings(winners[i]);\n            USDC.transfer(winners[i], amount); // Push pattern: can fail (gas, receiver\
    \ revert)\n        }\n    }\n}\n"
  when_applies: On-chain prediction market settlement, DeFi protocol state transitions, any multi-step financial settlement
    on Ethereum
  when_not_applies: simple token transfers, non-financial smart contracts
  sources: ["https://docs.openzeppelin.com/contracts/5.x/api/utils#ReentrancyGuard", "https://fravoll.github.io/solidity-patterns/pull_over_push.html"]
- id: PT-W3-ESCROW-001
  text: Use a time-locked escrow with dispute resolution for peer-to-peer prediction market trades — escrow holds collateral
    atomically while preventing either party from withdrawing during a pending trade.
  why: 'Without escrow, peer-to-peer trades require trust: Buyer sends payment first (seller might not deliver), or Seller
    delivers first (buyer might not pay). A smart contract escrow holds collateral from both parties during the trade period.
    Neither can withdraw until: (1) both confirm completion, or (2) the dispute window expires, or (3) an arbitrator resolves
    the dispute. This pattern is used by OpenSea for conditional NFT sales and by prediction market protocols for conditional
    OTC trades. The time-lock prevents indefinite escrow holds where one party is unresponsive.'
  how_to_do_right: 'Create an Escrow contract per trade (using CREATE2 for deterministic addresses). Include: buyer address,
    seller address, collateral amount, delivery deadline, dispute window, arbitrator. Use a Disputed state to pause withdrawal
    while arbitration is pending. Implement automatic release when deadline passes without dispute (optimistic default). Store
    minimum state on-chain; store trade details off-chain (IPFS) with on-chain hash.'
  severity: high
  technologies:
    lang: [solidity]
    platform: [ethereum, polygon]
  domains:
    domain: [architecture, blockchain]
    concern: [prediction_markets, defi]
  example_good: "enum EscrowState { PENDING, COMPLETE, DISPUTED, REFUNDED }\n\ncontract TradeEscrow is ReentrancyGuard {\n\
    \    address public immutable buyer;\n    address public immutable seller;\n    address public immutable arbitrator;\n  \
    \  address public immutable token;\n    uint256 public immutable amount;\n    uint256 public immutable deadline;     //\
    \ Auto-release after deadline\n    EscrowState public state;\n\n    constructor(\n        address _buyer, address _seller,\
    \ address _arbitrator,\n        address _token, uint256 _amount, uint256 _deadline\n    ) {\n        buyer = _buyer; seller\
    \ = _seller; arbitrator = _arbitrator;\n        token = _token; amount = _amount; deadline = _deadline;\n        IERC20(token).transferFrom(buyer,\
    \ address(this), amount); // Lock immediately\n    }\n\n    function confirmDelivery() external {\n        require(msg.sender\
    \ == buyer && state == EscrowState.PENDING);\n        state = EscrowState.COMPLETE;\n        IERC20(token).transfer(seller,\
    \ amount);\n    }\n\n    function dispute() external {\n        require(msg.sender == buyer || msg.sender == seller);\n\
    \        require(state == EscrowState.PENDING && block.timestamp < deadline);\n        state = EscrowState.DISPUTED;\n\
    \    }\n\n    function releaseAfterDeadline() external nonReentrant {\n        require(block.timestamp > deadline && state\
    \ == EscrowState.PENDING);\n        state = EscrowState.COMPLETE;\n        IERC20(token).transfer(seller, amount); // Optimistic\
    \ release\n    }\n\n    function resolve(bool buyerWins) external {\n        require(msg.sender == arbitrator && state\
    \ == EscrowState.DISPUTED);\n        address winner = buyerWins ? buyer : seller;\n        state = EscrowState.COMPLETE;\n\
    \        IERC20(token).transfer(winner, amount);\n    }\n}\n"
  example_bad: "// Trust-based trade — no escrow\nasync function executeTrade(seller, buyer, amount) {\n    // Step 1: buyer\
    \ pays off-chain → seller might not deliver\n    await usdc.transfer(seller, amount); // Buyer trusts seller\n    // Step\
    \ 2: seller delivers → buyer might not pay\n    await positionToken.transfer(buyer, shares); // Seller trusts buyer\n\
    \    // Either party can rug: take payment and not deliver\n}\n"
  when_applies: Peer-to-peer conditional trades on Ethereum, any trustless trade requiring delivery confirmation
  when_not_applies: centralized exchange settlement, non-blockchain trading systems
  sources: ["https://solidity-by-example.org/app/escrow/", "https://docs.gnosis.io/conditionaltokens/"]
- id: PT-W3-MULTISIG-001
  text: Use Safe (formerly Gnosis Safe) multi-sig for protocol treasury and admin operations — never store protocol funds
    or upgrade authority in a single EOA.
  why: 'Single-key wallets (EOA) controlling millions in protocol funds or upgrade authority are the #1 operational risk in
    DeFi. Private key loss = permanent loss; private key compromise = total loss with no recovery. Safe multisig requires
    M-of-N signatures to execute any transaction, preventing: single point of failure, insider attacks (requires M colluders
    vs 1), and phishing (attacker must compromise M separate keys). The Ronin Bridge $625M hack exploited 5 of 9 validator
    keys — a 6-of-9 threshold would have required one more compromised key. Safe has secured $100B+ in assets since 2018.'
  how_to_do_right: 'Deploy Safe with 3-of-5 or 4-of-7 threshold for treasury (quorum >= 50%). Use hardware wallets (Ledger,
    Trezor) for Safe signers. Use timelock (OpenZeppelin TimelockController) for contract upgrades — 48-hour minimum delay
    before execution. Separate treasury Safe from operations Safe (different signers, different thresholds). Use Safe modules
    for recurring payments. Store Safe address as the owner/admin in all protocol contracts.'
  severity: critical
  technologies:
    lang: [solidity]
    library: [safe, openzeppelin]
    platform: [ethereum, polygon]
  domains:
    domain: [architecture, blockchain, security]
    concern: [prediction_markets, defi, operations]
  example_good: "// Protocol contracts owned by Safe multisig + timelock\nimport \"@openzeppelin/contracts/governance/TimelockController.sol\"\
    ;\n\n// Deployment: Safe (3-of-5) → TimelockController (48h delay) → Protocol\n// Any upgrade requires:\n// 1. 3 Safe signers\
    \ approve the tx\n// 2. Safe submits to TimelockController (starts 48h delay)\n// 3. Community has 48h to notice and react\n\
    // 4. After 48h, anyone can execute\n\n// Set Safe as owner of protocol contract\ncontract PredictionMarketFactory is Ownable\
    \ {\n    constructor(address safeMultisig) {\n        _transferOwnership(safeMultisig); // Safe is the owner\n    }\n\
    }\n\n// Safe wallet address: 0x... (3-of-5 multisig)\n// Signers: Alice (Ledger), Bob (Ledger), Carol (Trezor), Dave (Ledger),\
    \ Eve (Ledger)\n// Threshold: 3 signatures required\n"
  example_bad: "// Single EOA as admin — catastrophic risk\ncontract PredictionMarket is Ownable {\n    // owner = deployer's\
    \ hot wallet\n    // If private key is:\n    //   - Lost: protocol frozen forever\n    //   - Compromised: all funds drained,\
    \ contracts maliciously upgraded\n    //   - Phished: one signature = game over\n    function upgradeOracle(address newOracle)\
    \ external onlyOwner { }\n    function withdraw(uint256 amount) external onlyOwner { }\n}\n"
  when_applies: Any protocol managing >$10K in funds or with upgrade authority on Ethereum
  when_not_applies: personal wallets, test environments, contracts with no admin functions
  sources: ["https://docs.safe.global/getting-started/readme", "https://docs.openzeppelin.com/contracts/5.x/api/governance#TimelockController"]
- id: PT-W3-APPROVE-001
  text: Use ERC-20 increaseAllowance and decreaseAllowance instead of approve — the ERC-20 approve function has a known race
    condition that allows an allowance to be double-spent if changed while a transaction is pending.
  why: 'The ERC-20 approve race condition: Alice approves Bob for 100 USDC. Alice wants to change it to 50 USDC. Bob sees
    Alice''s change transaction in the mempool, front-runs it by spending the original 100 USDC allowance. Alice''s change
    transaction then executes, setting allowance back to 50 USDC. Bob spends the 50 USDC again. Bob spent 150 USDC total when
    Alice intended to allow 50. increaseAllowance/decreaseAllowance are delta-based and immune to this race condition. Use
    safe approve patterns: set to 0 first, then set to desired amount.'
  how_to_do_right: 'For new integrations: use ERC-20 Permit (EIP-2612) for off-chain approvals. When using legacy ERC-20
    tokens: call approve(spender, 0) first, then approve(spender, amount) — some tokens (USDT) require this. Use increaseAllowance/decreaseAllowance
    when adjusting existing allowances. In contracts that consume allowances, always clear the allowance after use to prevent
    future exploitation. Use OpenZeppelin SafeERC20 wrapper for safe transfers and approvals.'
  severity: medium
  technologies:
    lang: [solidity, typescript]
    library: [openzeppelin, viem]
    platform: [ethereum]
  domains:
    domain: [architecture, blockchain, security]
    concern: [tokens, defi]
  example_good: "import \"@openzeppelin/contracts/token/ERC20/utils/SafeERC20.sol\";\nusing SafeERC20 for IERC20;\n\n// Correct:\
    \ Use safeIncreaseAllowance or safeApprove with 0 reset\nfunction updateSpenderAllowance(IERC20 token, address spender,\
    \ uint256 newAmount) external {\n    // Reset to 0 first (required by some tokens like USDT)\n    token.safeApprove(spender,\
    \ 0);\n    token.safeApprove(spender, newAmount);\n}\n\n// Even better: use permit (EIP-2612) — no approve tx at all\n//\
    \ See PT-W3-TOKEN-001 for permit pattern\n\n// Frontend: check existing allowance before requesting approve\nconst allowance\
    \ = await tokenContract.read.allowance([userAddress, spenderAddress]);\nif (allowance < requiredAmount) {\n    await tokenContract.write.approve([spenderAddress,\
    \ maxUint256]); // One-time infinite approval\n}\n"
  example_bad: "// Race condition: changing existing allowance\nawait token.approve(spender, 0);  // OK: reset\nawait token.approve(spender,\
    \ 100); // OK: set\n// ... time passes ...\nawait token.approve(spender, 50); // RACE CONDITION: spender sees mempool,\n\
    //                                   // front-runs to spend 100, then spends 50 = 150 total\n// Instead: use increaseAllowance/decreaseAllowance\n\
    \nawait token.decreaseAllowance(spender, 50); // Atomic delta: 100 → 50, no race condition\n"
  when_applies: Any ERC-20 token approval management in DeFi protocols or prediction markets
  when_not_applies: non-token contracts, read-only operations
  sources: ["https://docs.openzeppelin.com/contracts/5.x/api/token/erc20#IERC20", "https://eips.ethereum.org/EIPS/eip-20#methods"]
- id: PT-W3-EVENTS-001
  text: Emit comprehensive blockchain events for every state change — events are the only gas-efficient way to provide a
    queryable history of on-chain activity for off-chain systems.
  why: 'Smart contract storage is expensive ($20,000 gas per SSTORE). Storing historical records on-chain is economically
    prohibitive. Events (logs) cost 375 gas base + 8 gas per byte — orders of magnitude cheaper than storage. Events are
    permanent, immutable, and queryable via eth_getLogs or TheGraph. A prediction market without events is blind to its own
    history: no trade history, no position tracking, no audit trail. Indexed parameters (up to 3 per event) enable efficient
    filtering: find all trades by a specific user without scanning all events.'
  how_to_do_right: 'Emit events after every state-changing operation. Index parameters used for filtering (user addresses,
    market IDs, token IDs). Include both old and new values for critical state changes. Emit events even for internal operations
    that affect user balances. Design event schemas for TheGraph indexability. Use consistent naming: PastTense (OrderPlaced,
    PositionOpened, MarketSettled, WinningsClaimed).'
  severity: high
  technologies:
    lang: [solidity]
    library: [thegraph]
    platform: [ethereum]
  domains:
    domain: [architecture, blockchain]
    concern: [indexing, prediction_markets, observability]
  example_good: "// Comprehensive events for full prediction market activity\nevent MarketCreated(\n    bytes32 indexed conditionId,\n\
    \    address indexed creator,\n    string question,\n    uint256 deadline,\n    uint256 timestamp\n);\n\nevent OrderPlaced(\n\
    \    bytes32 indexed conditionId,\n    address indexed trader,\n    uint8 indexed outcome,    // Indexed: filter by YES/NO\n\
    \    uint256 amount,\n    uint256 price,\n    bytes32 orderId,\n    uint256 timestamp\n);\n\nevent MarketSettled(\n   \
    \ bytes32 indexed conditionId,\n    uint8 winningOutcome,\n    uint256 totalPayout,\n    uint256 timestamp\n);\n\nevent\
    \ WinningsClaimed(\n    bytes32 indexed conditionId,\n    address indexed claimant,\n    uint256 amount\n);\n\n// Emit\
    \ every state change\nfunction placeOrder(bytes32 conditionId, uint8 outcome, uint256 amount, uint256 price) external {\n\
    \    bytes32 orderId = keccak256(abi.encodePacked(msg.sender, conditionId, block.timestamp, amount));\n    _recordOrder(orderId,\
    \ conditionId, outcome, amount, price);\n    emit OrderPlaced(conditionId, msg.sender, outcome, amount, price, orderId,\
    \ block.timestamp);\n}\n"
  example_bad: "// No events — off-chain systems are blind\ncontract NaivePredictionMarket {\n    function placeOrder(bytes32\
    \ conditionId, uint8 outcome, uint256 amount) external {\n        orders[msg.sender].push(Order(conditionId, outcome, amount));\n\
    \        // No event — TheGraph cannot index this\n        // Frontend must simulate every transaction to find user's orders\n\
    \        // Trade history: impossible without events\n    }\n}\n"
  when_applies: Any Solidity contract that needs off-chain queryable history (prediction markets, DeFi, NFTs)
  when_not_applies: pure computation contracts with no state changes, testing utilities
  sources: ["https://docs.soliditylang.org/en/latest/abi-spec.html#events", "https://thegraph.com/docs/en/developing/creating-a-subgraph/"]
- id: PT-W3-GASRELAY-001
  text: Use meta-transactions (ERC-2771) with a trusted forwarder to enable gasless interactions — users sign off-chain,
    relayers submit on-chain and pay gas, recovered via smart contract fee logic.
  why: 'Requiring users to hold ETH for gas is the #1 onboarding barrier in Web3. New users on prediction markets must: (1)
    acquire ETH, (2) acquire USDC, (3) bridge if using L2, (4) finally place a prediction. Meta-transactions (ERC-2771) allow
    users to sign intents off-chain for free; relayers submit on-chain and pay gas. The contract verifies the original signer
    from the forwarded calldata (msgSender() instead of msg.sender). Protocols recover relayer costs via spread, fees, or
    gas tank deposits. This is the pattern used by OpenSea (Seaport), Biconomy, and Polymarket for gasless trades.'
  how_to_do_right: 'Inherit ERC2771Context from OpenZeppelin. Replace msg.sender with _msgSender() throughout the contract.
    Register a trusted forwarder (Biconomy Forwarder or deploy your own MinimalForwarder). On the frontend, use Biconomy SDK
    or Gelato to submit meta-transactions. Validate the domain separator matches your contract. Never trust the forwarder unconditionally — set it at deploy time and make it immutable.'
  severity: medium
  technologies:
    lang: [solidity, typescript]
    library: [openzeppelin, biconomy]
    platform: [ethereum, polygon]
  domains:
    domain: [architecture, blockchain]
    concern: [frontend, prediction_markets, defi]
  example_good: "import \"@openzeppelin/contracts/metatx/ERC2771Context.sol\";\n\ncontract GaslessMarket is ERC2771Context {\n\
    \    constructor(address trustedForwarder)\n        ERC2771Context(trustedForwarder) {}  // Immutable — set once\n\n  \
    \  function placePrediction(bytes32 marketId, uint8 outcome, uint256 amount) external {\n        address user = _msgSender();\
    \ // Returns original signer, not the relayer!\n        _deductBalance(user, amount);\n        emit PredictionPlaced(marketId,\
    \ user, outcome, amount);\n        // User pays no ETH — relayer paid gas, protocol reimburses from spread\n    }\n}\n\
    \n// Frontend: Biconomy SDK — user signs, Biconomy submits + pays gas\nimport { BiconomySmartAccountV2, createSmartAccountClient\
    \ } from '@biconomy/account';\nconst smartAccount = await createSmartAccountClient({\n    signer,\n    biconomyPaymasterApiKey: PAYMASTER_API_KEY,\n\
    });\nconst txResponse = await smartAccount.sendTransaction({\n    to: marketAddress,\n    data: encodeFunctionData({ abi,\
    \ functionName: 'placePrediction', args: [marketId, 0, amount] }),\n});\n// User paid $0 in gas\n"
  example_bad: "// Requires ETH for gas — onboarding barrier\ncontract PredictionMarket {\n    function placePrediction(bytes32\
    \ marketId, uint8 outcome, uint256 amount) external {\n        // msg.sender must have ETH for gas\n        // New user\
    \ flow: get ETH → bridge → approve USDC → THEN predict\n        // Abandonment rate: >70% at gas acquisition step\n  \
    \      _deductBalance(msg.sender, amount);\n    }\n}\n"
  when_applies: Prediction markets and DeFi protocols targeting mainstream users who may not hold ETH for gas
  when_not_applies: protocols where all users already hold ETH, internal tooling
  sources: ["https://eips.ethereum.org/EIPS/eip-2771", "https://docs.biconomy.io/", "https://docs.openzeppelin.com/contracts/5.x/api/metatx"]
- id: PT-W3-IPFS-001
  text: Use IPFS with Pinata or web3.storage for decentralized market metadata storage — store only the CID on-chain, keeping
    storage costs minimal while providing tamper-proof content addressing.
  why: 'On-chain string storage for market descriptions costs 20,000+ gas per 32 bytes. A 500-byte market description costs
    300,000+ gas ($6-60 at typical gas prices). IPFS content addressing stores the data off-chain while the CID (content ID)
    stored on-chain provides cryptographic proof of exact content — anyone can verify the description has not been tampered
    with. Without pinning services, IPFS content disappears when nodes stop hosting it. Pinata and web3.storage guarantee
    persistence via paid pinning plans.'
  how_to_do_right: 'Upload market metadata JSON to IPFS via Pinata. Store only the CID (32 bytes as bytes32) on-chain in the
    contract event/storage. Use CIDv1 (base32, DNS-compatible). Use a gateway URL for frontend display (https://ipfs.io/ipfs/{CID}).
    Pin to multiple services as redundancy (Pinata + web3.storage). For mutable metadata (market status), use IPNS or store
    a mutable pointer in the contract that points to the current IPFS CID.'
  severity: medium
  technologies:
    lang: [typescript, solidity]
    library: [pinata, ipfs]
    platform: [storage, ipfs, ethereum]
  domains:
    domain: [architecture, blockchain, infrastructure]
    concern: [storage, prediction_markets]
  example_good: "import PinataSDK from '@pinata/sdk';\n\nconst pinata = new PinataSDK({ pinataJwt: process.env.PINATA_JWT\
    \ });\n\nasync function createMarket(question: string, description: string, deadline: number) {\n    // 1. Upload metadata\
    \ to IPFS (pinned)\n    const metadata = {\n        question,\n        description,\n        deadline,\n        created_at:\
    \ Date.now(),\n        version: '1.0',\n    };\n    const result = await pinata.upload.json(metadata);\n    const cid\
    \ = result.IpfsHash; // CIDv1: bafybeig...\n\n    // 2. Store only CID on-chain (32 bytes → ~30K gas vs 300K+ for full\
    \ text)\n    const cidBytes32 = ethers.utils.formatBytes32String(cid.slice(0, 31)); // Truncate for bytes32\n    await\
    \ marketContract.write.createMarket([cidBytes32, deadline]);\n\n    // 3. Frontend resolves CID to metadata\n    const\
    \ url = `https://ipfs.io/ipfs/${cid}`;\n    return { cid, url };\n}\n"
  example_bad: "// Storing full description on-chain — expensive\ncontract MarketFactory {\n    function createMarket(\n \
    \       string calldata question,    // 200 chars = 200 bytes = 1.6M gas (6 slots × 20K)\n        string calldata description\
    \ // 500 chars = 500 bytes = 3.2M gas\n    ) external {\n        // Total: ~5M gas = $100-500 per market creation\n  \
    \      markets.push(Market(question, description, block.timestamp));\n    }\n}\n"
  when_applies: Prediction markets and NFT projects requiring off-chain metadata storage with on-chain integrity proof
  when_not_applies: purely on-chain data, internal system state
  sources: ["https://docs.pinata.cloud/introduction", "https://docs.ipfs.tech/concepts/persistence/"]
- id: PT-W3-HARDHAT-001
  text: Use Hardhat with Foundry for smart contract testing — Hardhat handles JavaScript integration tests and forking, Foundry
    handles Solidity unit tests, fuzz tests, and invariant tests. Both are necessary for production-grade coverage.
  why: 'Foundry (Solidity-native) runs fuzz tests in seconds (1000 random inputs per property) and invariant tests (properties
    that must hold across any sequence of calls). Hardhat (JavaScript) enables integration tests that simulate full user flows
    (connect wallet, approve, deposit, trade, claim). Neither alone is sufficient: Foundry lacks real browser wallet simulation;
    Hardhat lacks fuzz testing. The combination catches both invariant violations (Foundry) and integration bugs (Hardhat).
    Fork tests (both tools support) allow testing against mainnet state without deploying.'
  how_to_do_right: 'Use Foundry for: unit tests (Test.sol), fuzz tests (testFuzz_), invariant tests (invariant_), fork tests
    (vm.createFork). Use Hardhat for: deployment scripts, integration tests with ethers.js, gas reporting, contract verification.
    Use hardhat-foundry plugin to run both test suites from one command. Achieve 100% branch coverage in unit tests, supplement
    with fuzz tests for edge cases.'
  severity: high
  technologies:
    lang: [solidity, typescript]
    platform: [tools, foundry, hardhat]
  domains:
    domain: [architecture, blockchain, testing]
    concern: [prediction_markets, defi]
  example_good: "// Foundry: fuzz + invariant tests\n// test/PredictionMarket.t.sol\ncontract PredictionMarketTest is Test {\n\
    \    PredictionMarket public market;\n    uint256 public totalDeposited;\n\n    function setUp() public {\n        market\
    \ = new PredictionMarket(address(usdc));\n    }\n\n    // Fuzz: random amounts, never overflow\n    function testFuzz_deposit(uint256\
    \ amount) public {\n        amount = bound(amount, 1, 1e12); // 1 to 1M USDC (6 decimals)\n        deal(address(usdc),\
    \ user, amount);\n        vm.prank(user);\n        market.deposit(amount);\n        assertEq(market.balanceOf(user), amount);\n\
    \    }\n\n    // Invariant: market solvency — always holds\n    function invariant_solvency() public {\n        assertGe(\n\
    \            usdc.balanceOf(address(market)),\n            market.totalLiabilities(),  // Market always has >= liabilities\n\
    \            'Insolvency: market cannot cover all withdrawals'\n        );\n    }\n}\n\n# Run all tests\nforge test -vvv\
    \  # Foundry\nnpx hardhat test  # Hardhat integration tests\n"
  example_bad: "// Only Hardhat unit tests — no fuzz, no invariants\ndescribe('PredictionMarket', () => {\n    it('deposit\
    \ 100 USDC', async () => {\n        await market.deposit(100);\n        expect(await market.balanceOf(user)).to.equal(100);\n\
    \    });\n    // Tests specific amounts — misses edge cases\n    // No fuzz: what about 0? type(uint256).max? Odd numbers?\n\
    \    // No invariant: insolvency can happen without a test catching it\n});\n"
  when_applies: Any Solidity smart contract project targeting production deployment
  when_not_applies: throwaway scripts, personal wallet contracts with no value at risk
  sources: ["https://book.getfoundry.sh/", "https://hardhat.org/docs", "https://hardhat.org/hardhat-runner/plugins/nomicfoundation-hardhat-foundry"]
