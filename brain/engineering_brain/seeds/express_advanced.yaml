layer: rules
technology: Express
domain: backend
knowledge:
- id: CR-EXP-001
  text: Always use 4-parameter error-handling middleware as the LAST middleware in the chain. Never let unhandled promise
    rejections crash the process.
  why: Express identifies error-handling middleware by its 4-parameter signature (err, req, res, next). Without it, errors
    propagate to Express's default handler which sends an HTML error page with stack traces — leaking internal implementation
    details to attackers. Unhandled promise rejections in async route handlers crash the Node.js process entirely.
  how_to_do_right: '1. Define a global error handler with (err, req, res, next) signature.

    2. Place it AFTER all routes and middleware.

    3. Use express-async-errors or wrap async handlers to catch promise rejections.

    4. Log the full error server-side, return sanitized error to client.

    5. Return structured JSON errors, not HTML.

    '
  severity: critical
  technologies:
    framework: [backend, express]
    library: [node, js]
  domains:
    domain: [architecture, security]
    concern: [backend]
  example_good: "// Wrap async handlers automatically\nrequire('express-async-errors');\n\n// Custom error classes\nclass\
    \ AppError extends Error {\n  constructor(statusCode, message, type = 'error') {\n    super(message);\n    this.statusCode\
    \ = statusCode;\n    this.type = type;\n  }\n}\n\nclass NotFoundError extends AppError {\n  constructor(resource) {\n\
    \    super(404, `${resource} not found`, 'not_found');\n  }\n}\n\n// Routes — throw freely, errors are caught\napp.get('/users/:id',\
    \ async (req, res) => {\n  const user = await User.findById(req.params.id);\n  if (!user) throw new NotFoundError('User');\n\
    \  res.json(user);\n});\n\n// Global error handler — LAST middleware\napp.use((err, req, res, next) => {\n  const statusCode\
    \ = err.statusCode || 500;\n  const type = err.type || 'internal_error';\n\n  // Log full error server-side\n  logger.error({\
    \ err, requestId: req.id, path: req.path });\n\n  // Return sanitized error to client\n  res.status(statusCode).json({\n\
    \    type,\n    message: statusCode === 500 ? 'Internal server error' : err.message,\n    requestId: req.id,\n  });\n\
    });\n"
  example_bad: "// Wrong: No error handler — Express sends HTML with stack trace\napp.get('/users/:id', async (req, res) =>\
    \ {\n  const user = await User.findById(req.params.id);\n  // If findById throws, Express default handler sends:\n  //\
    \ <pre>Error: connection refused\\n    at Object... </pre>\n  // Stack trace exposed to attacker\n  res.json(user);\n\
    });\n\n// Wrong: Async error not caught — process crashes\napp.get('/data', async (req, res) => {\n  const data = await\
    \ fetchExternalAPI(); // Throws — unhandled rejection\n  res.json(data);\n  // UnhandledPromiseRejection → process.exit(1)\
    \ → all requests fail\n});\n"
  when_applies: Any project using Express.js/Node.js servers or Node.js
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities. projects
    not using Express or Node.js
  sources: ["https://expressjs.com/en/guide/error-handling.html"]
- id: CR-EXP-002
  text: Middleware execution order is critical. Apply security middleware (helmet, CORS) before routing, and error middleware
    after all routes.
  why: Express processes middleware in the order registered. Helmet after routes means security headers are missing on error
    responses. CORS after authentication means preflight OPTIONS requests fail. Logging after routes means failed requests
    are not logged. Every middleware must be in its correct position in the chain.
  how_to_do_right: '1. First: Request ID, logging (morgan).

    2. Second: Security (helmet, CORS, rate limiting).

    3. Third: Body parsing (express.json, express.urlencoded).

    4. Fourth: Authentication middleware.

    5. Fifth: Routes.

    6. Last: 404 handler, then error handler.

    '
  severity: high
  technologies:
    framework: [backend, express]
    library: [node, js]
  domains:
    domain: [architecture, security]
    concern: [backend]
  example_good: "const express = require('express');\nconst helmet = require('helmet');\nconst cors = require('cors');\nconst\
    \ morgan = require('morgan');\nconst { rateLimit } = require('express-rate-limit');\n\nconst app = express();\n\n// 1.\
    \ Request ID + logging\napp.use(assignRequestId);\napp.use(morgan('combined'));\n\n// 2. Security headers + CORS\napp.use(helmet());\n\
    app.use(cors({\n  origin: ['https://app.example.com'],\n  credentials: true,\n  methods: ['GET', 'POST', 'PUT', 'DELETE'],\n\
    }));\napp.use(rateLimit({ windowMs: 60_000, max: 100 }));\n\n// 3. Body parsing\napp.use(express.json({ limit: '1mb' }));\n\
    app.use(express.urlencoded({ extended: true }));\n\n// 4. Authentication (optional — applies to protected routes)\napp.use('/api',\
    \ authenticateToken);\n\n// 5. Routes\napp.use('/api/users', usersRouter);\napp.use('/api/orders', ordersRouter);\n\n\
    // 6. 404 handler\napp.use((req, res) => {\n  res.status(404).json({ type: 'not_found', message: 'Route not found' });\n\
    });\n\n// 7. Error handler — ALWAYS last\napp.use(globalErrorHandler);\n"
  example_bad: 'const app = express();

    app.use(''/api'', usersRouter);        // Routes before CORS — preflight fails

    app.use(cors());                      // CORS after routes

    app.use(helmet());                    // Security headers after routes

    app.use(express.json());              // Body parsing after routes — req.body undefined

    app.use(globalErrorHandler);          // Error handler in the middle

    app.use(''/api'', ordersRouter);        // Routes after error handler — errors skip it

    '
  when_applies: Projects using Express.js/Node.js servers or Node.js
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities. projects
    not using Express or Node.js
  sources: ["https://expressjs.com/en/guide/writing-middleware.html", "https://expressjs.com/en/guide/using-middleware.html"]
- id: CR-EXP-003
  text: Separate routes into modular router files organized by domain. Keep controllers thin and delegate business logic to
    service modules.
  why: A single app.js with 100 routes and inline business logic is unmaintainable, untestable, and creates merge conflicts.
    Router separation enables team members to work on different domains simultaneously. Service separation enables unit testing
    business logic without HTTP context and reusing logic across routes, CLI commands, and background jobs.
  how_to_do_right: '1. Create one router file per domain: routes/users.js, routes/orders.js.

    2. Create service modules for business logic: services/userService.js.

    3. Controllers: parse request, call service, format response (5-10 lines).

    4. Services: business logic, database access, external API calls.

    5. Mount routers in app.js with prefixes: app.use(''/api/users'', usersRouter).

    '
  severity: high
  technologies:
    framework: [backend, express]
    library: [node, js]
  domains:
    domain: [architecture]
    concern: [backend]
  example_good: "// routes/orders.js — thin routing layer\nconst router = require('express').Router();\nconst orderService\
    \ = require('../services/orderService');\nconst { validateBody } = require('../middleware/validate');\nconst { createOrderSchema\
    \ } = require('../schemas/order');\n\nrouter.post('/', validateBody(createOrderSchema), async (req, res) => {\n  const\
    \ order = await orderService.create(req.body, req.user);\n  res.status(201).json(order);\n});\n\nrouter.get('/:id', async\
    \ (req, res) => {\n  const order = await orderService.findById(req.params.id, req.user);\n  res.json(order);\n});\n\n\
    module.exports = router;\n\n// services/orderService.js — business logic\nconst Order = require('../models/order');\n\
    const paymentService = require('./paymentService');\n\nasync function create(data, user) {\n  const order = await Order.create({\
    \ ...data, userId: user.id });\n  await paymentService.authorize(order);\n  await inventoryService.reserve(order.items);\n\
    \  return order;\n}\n\nmodule.exports = { create, findById };\n"
  example_bad: "// Wrong: Everything in one file — unmaintainable\nconst app = express();\n\napp.post('/api/orders', async\
    \ (req, res) => {\n  // 50 lines of business logic inline\n  const { items, shippingAddress } = req.body;\n  for (const\
    \ item of items) {\n    const product = await Product.findById(item.productId);\n    if (product.stock < item.quantity)\
    \ {\n      return res.status(400).json({ error: 'Out of stock' });\n    }\n  }\n  const order = new Order({ items, userId:\
    \ req.user.id });\n  await order.save();\n  await stripe.charges.create({ amount: order.total });\n  // ... 30 more lines\n\
    });\n\n// 100 more inline route handlers in the same file\n"
  when_applies: Projects using Express.js/Node.js servers or Node.js
  when_not_applies: small scripts under 100 lines, single-purpose utilities. projects not using Express or Node.js
  sources: ["https://expressjs.com/en/guide/routing.html"]
- id: CR-EXP-004
  text: Use a custom AppError hierarchy with HTTP status codes. Throw business errors from services, catch in the global error
    handler.
  why: 'Using generic Error or returning error objects from services creates inconsistent error handling. Some routes return
    JSON errors, others throw, others return null. A custom error hierarchy with HTTP status codes enables uniform error handling:
    services throw meaningful errors, the global handler catches and formats them consistently.'
  how_to_do_right: '1. Create AppError base class with statusCode, type, and isOperational flag.

    2. Create specific subclasses: NotFoundError, ValidationError, ConflictError.

    3. Throw from services, never from controllers.

    4. Global error handler checks isOperational to distinguish expected from unexpected errors.

    5. Log unexpected errors with full stack trace, return generic message to client.

    '
  severity: high
  technologies:
    framework: [backend, express]
    library: [node, js]
  domains:
    domain: [architecture]
    concern: [backend]
  example_good: "// errors.js — error hierarchy\nclass AppError extends Error {\n  constructor(statusCode, message, type =\
    \ 'error') {\n    super(message);\n    this.statusCode = statusCode;\n    this.type = type;\n    this.isOperational =\
    \ true; // Expected error — don't crash\n  }\n}\n\nclass NotFoundError extends AppError {\n  constructor(resource, id)\
    \ {\n    super(404, `${resource} with id '${id}' not found`, 'not_found');\n  }\n}\n\nclass ValidationError extends AppError\
    \ {\n  constructor(message, details = []) {\n    super(422, message, 'validation_error');\n    this.details = details;\n\
    \  }\n}\n\nclass ConflictError extends AppError {\n  constructor(message) {\n    super(409, message, 'conflict');\n  }\n\
    }\n\n// service — throws business errors\nasync function findById(id) {\n  const order = await Order.findById(id);\n \
    \ if (!order) throw new NotFoundError('Order', id);\n  return order;\n}\n\n// Global handler — uniform response format\n\
    app.use((err, req, res, next) => {\n  if (err.isOperational) {\n    return res.status(err.statusCode).json({\n      type:\
    \ err.type,\n      message: err.message,\n      details: err.details,\n    });\n  }\n  // Unexpected error — log and return\
    \ generic message\n  logger.error({ err, requestId: req.id });\n  res.status(500).json({ type: 'internal_error', message:\
    \ 'Something went wrong' });\n});\n"
  example_bad: "// Wrong: Inconsistent error handling\nasync function findById(id) {\n  const order = await Order.findById(id);\n\
    \  if (!order) return null; // Caller must check for null — easy to forget\n}\n\napp.get('/orders/:id', async (req, res)\
    \ => {\n  const order = await findById(req.params.id);\n  if (!order) return res.status(404).send('not found'); // Plain\
    \ text, not JSON\n  res.json(order);\n});\n\napp.get('/users/:id', async (req, res) => {\n  const user = await findUserById(req.params.id);\n\
    \  if (!user) return res.json({ error: 'User not found' }); // 200 with error!\n  res.json(user);\n});\n"
  when_applies: Projects using Express.js/Node.js servers or Node.js
  when_not_applies: small scripts under 100 lines, single-purpose utilities. projects not using Express or Node.js
  sources: ["https://expressjs.com/en/guide/error-handling.html"]
- id: CR-EXP-005
  text: 'Implement graceful shutdown: handle SIGTERM, stop accepting new connections, finish in-flight requests, close database
    connections, then exit.'
  why: Without graceful shutdown, SIGTERM (from Docker stop, Kubernetes pod termination, or process manager) kills the process
    instantly. In-flight requests get TCP RST (connection reset), database transactions are left open, and file handles leak.
    Users see 502 errors during deployments. Graceful shutdown gives in-flight requests time to complete.
  how_to_do_right: '1. Listen for SIGTERM and SIGINT signals.

    2. Call server.close() to stop accepting new connections.

    3. Wait for in-flight requests to complete (with timeout).

    4. Close database pools and external connections.

    5. Exit with process.exit(0).

    '
  severity: high
  technologies:
    framework: [backend, express]
    library: [node, js]
  domains:
    domain: [architecture, operations, deployment]
    concern: [backend]
  example_good: "const server = app.listen(3000, () => {\n  logger.info('Server started on port 3000');\n});\n\nasync function\
    \ gracefulShutdown(signal) {\n  logger.info(`${signal} received — starting graceful shutdown`);\n\n  // 1. Stop accepting\
    \ new connections\n  server.close(async () => {\n    logger.info('HTTP server closed — no new connections');\n\n    try\
    \ {\n      // 2. Close database connections\n      await mongoose.connection.close();\n      logger.info('Database connections\
    \ closed');\n\n      // 3. Close Redis connection\n      await redisClient.quit();\n      logger.info('Redis connection\
    \ closed');\n\n      // 4. Exit cleanly\n      process.exit(0);\n    } catch (err) {\n      logger.error('Error during\
    \ shutdown', err);\n      process.exit(1);\n    }\n  });\n\n  // 5. Force shutdown after timeout\n  setTimeout(() => {\n\
    \    logger.error('Graceful shutdown timed out — forcing exit');\n    process.exit(1);\n  }, 30_000); // 30 second timeout\n\
    }\n\nprocess.on('SIGTERM', () => gracefulShutdown('SIGTERM'));\nprocess.on('SIGINT', () => gracefulShutdown('SIGINT'));\n"
  example_bad: '// Wrong: No shutdown handling

    app.listen(3000);

    // SIGTERM → instant kill

    // In-flight requests get connection reset

    // Database transactions left uncommitted

    // Docker healthcheck fails, triggers more restarts

    '
  when_applies: Projects using Express.js/Node.js servers or Node.js
  when_not_applies: projects not using Express or Node.js
  sources: ["https://expressjs.com/en/advanced/best-practice-performance.html"]
- id: CR-EXP-006
  text: Enable gzip/brotli compression with the compression middleware. Set proper Cache-Control headers for static and dynamic
    responses.
  why: Without compression, a 500KB JSON API response takes 4x longer to transfer than the 125KB compressed version. Without
    Cache-Control, browsers re-fetch unchanged resources on every navigation. Compression reduces bandwidth by 60-80% for
    text content. Proper caching reduces server load by 50-90% for cacheable responses.
  how_to_do_right: '1. Use compression middleware for dynamic responses (threshold: 1KB).

    2. Set Cache-Control: no-store for authenticated/personalized responses.

    3. Set Cache-Control: public, max-age=31536000, immutable for fingerprinted static assets.

    4. Use ETags for conditional requests on dynamic content.

    5. Use Brotli (accept-encoding: br) for better compression ratio than gzip.

    '
  severity: medium
  technologies:
    framework: [backend, express]
    library: [node, js]
  domains:
    domain: [architecture, performance]
    concern: [backend]
  example_good: "const compression = require('compression');\n\n// Enable compression for responses > 1KB\napp.use(compression({\n\
    \  threshold: 1024,\n  filter: (req, res) => {\n    if (req.headers['x-no-compression']) return false;\n    return compression.filter(req,\
    \ res);\n  },\n}));\n\n// Static assets with long cache + fingerprinting\napp.use('/static', express.static('public',\
    \ {\n  maxAge: '1y',\n  immutable: true, // Fingerprinted files never change\n  etag: true,\n}));\n\n// API responses\
    \ — cache where appropriate\napp.get('/api/products', async (req, res) => {\n  const products = await productService.findAll();\n\
    \  res.set('Cache-Control', 'public, max-age=60, s-maxage=300');\n  res.set('ETag', computeETag(products));\n  res.json(products);\n\
    });\n\n// Authenticated responses — never cache\napp.get('/api/profile', authenticate, async (req, res) => {\n  const\
    \ profile = await userService.getProfile(req.user.id);\n  res.set('Cache-Control', 'no-store');\n  res.json(profile);\n\
    });\n"
  example_bad: "// Wrong: No compression, no caching\napp.use(express.static('public')); // No cache headers — re-fetched\
    \ every time\napp.get('/api/products', async (req, res) => {\n  const products = await productService.findAll(); // 500KB\
    \ JSON uncompressed\n  res.json(products); // No Cache-Control — CDN/browser can't cache\n});\n"
  when_applies: Projects using Express.js/Node.js servers or Node.js
  when_not_applies: low-traffic internal tools, admin dashboards, or batch jobs where latency is irrelevant. projects not
    using Express or Node.js
  sources: ["https://expressjs.com/en/advanced/best-practice-performance.html"]
- id: CR-EXP-007
  text: Use the cluster module to utilize all CPU cores. A single Node.js process uses only one core — cluster creates one
    worker per core.
  why: Node.js runs JavaScript on a single thread. On an 8-core server, one Express process uses 12.5% of available CPU. Under
    load, the single core is saturated while 7 cores are idle. The cluster module forks one worker process per CPU core, and
    the master distributes incoming connections using round-robin, utilizing all available CPU capacity.
  how_to_do_right: '1. Use cluster module or PM2 to fork workers = CPU count.

    2. Master process handles signal forwarding and worker respawning.

    3. Use sticky sessions if using in-memory sessions (or better: use Redis sessions).

    4. Share nothing between workers — use Redis for shared state.

    5. Use PM2 in production for zero-downtime reloads: pm2 start app.js -i max.

    '
  severity: high
  technologies:
    framework: [backend, express]
    library: [node, js]
  domains:
    domain: [architecture, performance, operations, deployment]
    concern: [backend]
  example_good: "// cluster.js — production entry point\nconst cluster = require('cluster');\nconst os = require('os');\n\n\
    if (cluster.isPrimary) {\n  const numCPUs = os.cpus().length;\n  console.log(`Primary ${process.pid} starting ${numCPUs}\
    \ workers`);\n\n  for (let i = 0; i < numCPUs; i++) {\n    cluster.fork();\n  }\n\n  cluster.on('exit', (worker, code)\
    \ => {\n    console.error(`Worker ${worker.process.pid} died (code: ${code})`);\n    // Respawn crashed workers\n    if\
    \ (code !== 0) {\n      console.log('Starting replacement worker');\n      cluster.fork();\n    }\n  });\n\n  // Graceful\
    \ shutdown: signal all workers\n  process.on('SIGTERM', () => {\n    for (const id in cluster.workers) {\n      cluster.workers[id].send('shutdown');\n\
    \    }\n  });\n} else {\n  // Worker: run Express app\n  require('./app');\n  console.log(`Worker ${process.pid} started`);\n\
    }\n\n// Or simply use PM2:\n// pm2 start app.js -i max --name \"api\"\n"
  example_bad: '// Wrong: Single process — 1 CPU core used out of 8

    const app = require(''./app'');

    app.listen(3000);

    // 8-core server running at 12.5% capacity

    // Under load: 1 core at 100%, 7 cores idle

    '
  when_applies: Projects using Express.js/Node.js servers or Node.js
  when_not_applies: low-traffic internal tools, admin dashboards, or batch jobs where latency is irrelevant. projects not
    using Express or Node.js
  sources: ["https://nodejs.org/api/cluster.html"]
- id: CR-EXP-008
  text: Apply per-route rate limiting with express-rate-limit. Use stricter limits on authentication endpoints and more lenient
    limits on read-only endpoints.
  why: A single global rate limit either blocks legitimate API usage or fails to protect sensitive endpoints. Login endpoints
    need strict limits (5/minute) to prevent brute force. Search endpoints need moderate limits (60/minute). Health checks
    need no limits. Per-route configuration provides proportional protection.
  how_to_do_right: '1. Set a default global limit (100 req/min) as baseline.

    2. Apply stricter limits on auth endpoints (5 req/min).

    3. Apply moderate limits on write endpoints (30 req/min).

    4. Skip rate limiting on health checks and internal endpoints.

    5. Store rate limit state in Redis for distributed deployments.

    '
  severity: high
  technologies:
    framework: [backend, express]
    library: [node, js]
  domains:
    domain: [architecture, security]
    concern: [backend]
  example_good: "const rateLimit = require('express-rate-limit');\nconst RedisStore = require('rate-limit-redis');\n\n// Default:\
    \ 100 requests per minute\nconst defaultLimiter = rateLimit({\n  windowMs: 60_000,\n  max: 100,\n  standardHeaders: true,\n\
    \  legacyHeaders: false,\n  store: new RedisStore({ sendCommand: (...args) => redisClient.sendCommand(args) }),\n});\n\
    \n// Strict: 5 attempts per minute for auth\nconst authLimiter = rateLimit({\n  windowMs: 60_000,\n  max: 5,\n  message:\
    \ { type: 'rate_limited', message: 'Too many attempts. Try again in 1 minute.' },\n  store: new RedisStore({ sendCommand:\
    \ (...args) => redisClient.sendCommand(args) }),\n});\n\n// Apply\napp.use(defaultLimiter);                          //\
    \ Global default\napp.use('/api/auth/login', authLimiter);           // Strict on login\napp.use('/api/auth/forgot-password',\
    \ authLimiter); // Strict on password reset\n"
  example_bad: "// Wrong: No rate limiting at all\napp.post('/api/auth/login', async (req, res) => {\n  // Attacker tries\
    \ 10,000 passwords per minute — no protection\n  const user = await authenticate(req.body);\n  res.json({ token: generateToken(user)\
    \ });\n});\n\n// Also wrong: Same limit everywhere\napp.use(rateLimit({ windowMs: 60_000, max: 1000 }));\n// Login endpoint\
    \ allows 1000 attempts per minute — brute force succeeds\n"
  when_applies: Projects using Express.js/Node.js servers or Node.js
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities. projects
    not using Express or Node.js
  sources: ["https://expressjs.com/en/advanced/best-practice-security.html"]
- id: CR-EXP-009
  text: Validate all input with a schema validation library (Zod, Joi, or express-validator). Never trust req.body, req.params,
    or req.query.
  why: 'Without input validation, any JSON payload is accepted. An attacker can send unexpected types (number instead of string),
    extra fields (isAdmin: true), or malformed data (negative prices, SQL in strings). Express does not validate anything
    by default — it passes raw parsed JSON directly to your handler. Schema validation rejects invalid input before it reaches
    business logic.'
  how_to_do_right: '1. Define Zod/Joi schemas for every endpoint''s body, params, and query.

    2. Create a reusable validation middleware that validates and returns 422 on failure.

    3. Use .strip() or equivalent to remove unexpected fields (defense in depth).

    4. Validate path parameters (UUID format, numeric IDs).

    5. Validate query parameters (page numbers, sort fields from allowlist).

    '
  severity: critical
  technologies:
    framework: [backend, express]
    library: [node, js, zod]
  domains:
    domain: [architecture, security]
    concern: [backend]
  example_good: "const { z } = require('zod');\n\n// Schema definitions\nconst createOrderSchema = z.object({\n  body: z.object({\n\
    \    items: z.array(z.object({\n      productId: z.string().uuid(),\n      quantity: z.number().int().min(1).max(100),\n\
    \    })).min(1).max(50),\n    shippingAddressId: z.string().uuid(),\n    notes: z.string().max(500).optional(),\n  }),\n\
    });\n\n// Reusable validation middleware\nfunction validate(schema) {\n  return (req, res, next) => {\n    const result\
    \ = schema.safeParse({\n      body: req.body,\n      params: req.params,\n      query: req.query,\n    });\n    if (!result.success)\
    \ {\n      return res.status(422).json({\n        type: 'validation_error',\n        errors: result.error.issues.map(i\
    \ => ({\n          path: i.path.join('.'),\n          message: i.message,\n        })),\n      });\n    }\n    // Replace\
    \ req.body with validated (and stripped) data\n    req.body = result.data.body;\n    next();\n  };\n}\n\nrouter.post('/orders',\
    \ validate(createOrderSchema), async (req, res) => {\n  // req.body is validated and stripped of extra fields\n  const\
    \ order = await orderService.create(req.body, req.user);\n  res.status(201).json(order);\n});\n"
  example_bad: "// Wrong: No validation — accepts any payload\nrouter.post('/orders', async (req, res) => {\n  const { items,\
    \ notes } = req.body; // Could be anything\n  // items = \"not an array\" — crash\n  // items = [{ productId: \"'; DROP\
    \ TABLE products; --\", quantity: -999 }]\n  const order = await Order.create({ items, notes, userId: req.user.id });\n\
    \  res.json(order);\n});\n"
  when_applies: Any project using Express.js/Node.js servers, Node.js, or Zod
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities
  sources: ["https://zod.dev/", "https://expressjs.com/en/guide/error-handling.html"]
- id: CR-EXP-010
  text: Use Helmet to set security headers. Configure Content-Security-Policy, HSTS, and X-Content-Type-Options for defense-in-depth.
  why: Security headers are the browser's last line of defense. Without Content-Security-Policy, XSS attacks execute arbitrary
    JavaScript. Without HSTS, MITM attackers can downgrade HTTPS to HTTP. Without X-Content-Type-Options, browsers sniff response
    content types and may execute uploaded files as JavaScript. Helmet sets 11 security headers with one middleware call.
  how_to_do_right: '1. Use helmet() with default settings — it enables 11 security headers.

    2. Customize Content-Security-Policy for your frontend''s needs.

    3. Enable HSTS with max-age of 1 year and includeSubDomains.

    4. Set referrer-policy to same-origin or strict-origin-when-cross-origin.

    5. Test headers with securityheaders.com.

    '
  severity: high
  technologies:
    framework: [backend, express]
    library: [node, js]
  domains:
    domain: [architecture, security]
    concern: [backend]
  example_good: "const helmet = require('helmet');\n\napp.use(helmet({\n  contentSecurityPolicy: {\n    directives: {\n  \
    \    defaultSrc: [\"'self'\"],\n      scriptSrc: [\"'self'\", 'https://cdn.example.com'],\n      styleSrc: [\"'self'\"\
    , \"'unsafe-inline'\", 'https://fonts.googleapis.com'],\n      imgSrc: [\"'self'\", 'data:', 'https://images.example.com'],\n\
    \      fontSrc: [\"'self'\", 'https://fonts.gstatic.com'],\n      connectSrc: [\"'self'\", 'https://api.example.com'],\n\
    \      frameSrc: [\"'none'\"],\n      objectSrc: [\"'none'\"],\n    },\n  },\n  hsts: {\n    maxAge: 31536000,       \
    \ // 1 year\n    includeSubDomains: true,\n    preload: true,\n  },\n  referrerPolicy: { policy: 'strict-origin-when-cross-origin'\
    \ },\n}));\n\n// Result: 11 security headers on every response\n// X-Content-Type-Options: nosniff\n// X-Frame-Options:\
    \ SAMEORIGIN\n// Strict-Transport-Security: max-age=31536000; includeSubDomains; preload\n// Content-Security-Policy:\
    \ default-src 'self'; ...\n"
  example_bad: "// Wrong: No security headers — browser protections disabled\nconst app = express();\n// No helmet — responses\
    \ have zero security headers\n// XSS scripts execute freely\n// Clickjacking via iframe possible\n// MITM can downgrade\
    \ HTTPS\n\n// Also wrong: Disabling everything\napp.use(helmet({\n  contentSecurityPolicy: false,  // XSS protection disabled\n\
    \  hsts: false,                   // HTTPS not enforced\n  frameguard: false,             // Clickjacking possible\n}));\n"
  when_applies: Projects using Express.js/Node.js servers or Node.js
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities. projects
    not using Express or Node.js
  sources: ["https://helmetjs.github.io/", "https://expressjs.com/en/advanced/best-practice-security.html"]
- id: CR-EXP-011
  text: Never concatenate user input into SQL queries. Always use parameterized queries with placeholders, regardless of the
    database driver.
  why: SQL injection allows attackers to bypass authentication, extract all data, modify records, and in some cases execute
    operating system commands. Express does not provide any SQL protection — you must use parameterized queries explicitly.
    A single injectable query can compromise the entire database.
  how_to_do_right: '1. Use parameterized queries with ? or $1 placeholders.

    2. Use an ORM (Sequelize, Prisma, Knex) that parameterizes by default.

    3. Validate and sanitize input before using in queries.

    4. Never build dynamic table or column names from user input.

    5. Run static analysis (eslint-plugin-security) to catch injection patterns.

    '
  severity: critical
  technologies:
    framework: [backend, express]
    library: [node, js]
    platform: [postgresql, mysql]
  domains:
    domain: [architecture, security]
    concern: [backend]
  example_good: "// Correct: Parameterized query with pg driver\nconst { Pool } = require('pg');\nconst pool = new Pool();\n\
    \nasync function findUser(email) {\n  const result = await pool.query(\n    'SELECT * FROM users WHERE email = $1',\n\
    \    [email]  // Parameterized — safely escaped\n  );\n  return result.rows[0];\n}\n\n// Correct: Knex query builder\n\
    const knex = require('knex')(config);\n\nasync function searchProducts(query, minPrice) {\n  return knex('products')\n\
    \    .where('name', 'ilike', `%${query}%`)  // Parameterized by Knex\n    .andWhere('price', '>=', minPrice)\n    .orderBy('price',\
    \ 'asc');\n}\n\n// Correct: Prisma ORM\nasync function findByEmail(email) {\n  return prisma.user.findUnique({\n    where:\
    \ { email },  // Always parameterized\n  });\n}\n"
  example_bad: "// CRITICAL SQL INJECTION\nasync function findUser(email) {\n  // Attacker sends: email = \"' OR '1'='1\"\n\
    \  const result = await pool.query(\n    `SELECT * FROM users WHERE email = '${email}'`\n  );\n  // Executed: SELECT *\
    \ FROM users WHERE email = '' OR '1'='1'\n  // Returns ALL users — authentication bypassed\n  return result.rows[0];\n\
    }\n\n// Also wrong: Template literal\nasync function searchProducts(query) {\n  return pool.query(`SELECT * FROM products\
    \ WHERE name LIKE '%${query}%'`);\n  // query = \"'; DROP TABLE products; --\"\n}\n"
  when_applies: Any project using Express.js/Node.js servers, Node.js, PostgreSQL databases, or MySQL/MariaDB databases
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities
  sources: ["https://cheatsheetseries.owasp.org/cheatsheets/SQL_Injection_Prevention_Cheat_Sheet.html"]
- id: CR-EXP-012
  text: 'Set secure cookie options: httpOnly, secure, sameSite, and appropriate maxAge. Never store sensitive data in client-accessible
    cookies.'
  why: Without httpOnly, JavaScript can read session cookies — XSS attacks steal sessions. Without secure, cookies are sent
    over HTTP — MITM attacks steal sessions. Without sameSite, cookies are sent with cross-origin requests — CSRF attacks
    hijack sessions. Every missing flag opens a different attack vector.
  how_to_do_right: '1. Set httpOnly: true — prevents JavaScript access to cookies.

    2. Set secure: true — cookies only sent over HTTPS.

    3. Set sameSite: ''strict'' or ''lax'' — prevents CSRF.

    4. Set appropriate maxAge — session cookies expire with browser close.

    5. Use signed cookies (cookie-parser with secret) to detect tampering.

    '
  severity: high
  technologies:
    framework: [backend, express]
    library: [node, js]
  domains:
    domain: [architecture, security]
    concern: [backend]
  example_good: "const session = require('express-session');\nconst RedisStore = require('connect-redis').default;\n\napp.use(session({\n\
    \  store: new RedisStore({ client: redisClient }),\n  secret: process.env.SESSION_SECRET,\n  name: '__Host-sid',     \
    \         // Cookie prefix for extra security\n  resave: false,\n  saveUninitialized: false,\n  cookie: {\n    httpOnly:\
    \ true,               // Cannot be read by JavaScript\n    secure: true,                 // Only sent over HTTPS\n   \
    \ sameSite: 'strict',           // Not sent with cross-origin requests\n    maxAge: 24 * 60 * 60 * 1000, // 24 hours\n\
    \    domain: 'example.com',\n    path: '/',\n  },\n}));\n\n// Set custom cookies with same security options\nres.cookie('preferences',\
    \ value, {\n  httpOnly: true,\n  secure: true,\n  sameSite: 'strict',\n  maxAge: 30 * 24 * 60 * 60 * 1000, // 30 days\n\
    \  signed: true,\n});\n"
  example_bad: "// Wrong: Insecure cookie defaults\napp.use(session({\n  secret: 'keyboard cat',         // Weak, hardcoded\
    \ secret\n  cookie: {},                      // No flags set:\n  // httpOnly: false — XSS steals cookie\n  // secure:\
    \ false — sent over HTTP — MITM steals cookie\n  // sameSite: undefined — CSRF attacks possible\n}));\n\n// Wrong: Sensitive\
    \ data in client-accessible cookie\nres.cookie('userData', JSON.stringify({\n  id: user.id,\n  role: 'admin',      //\
    \ Client can modify to 'superadmin'\n  email: user.email,  // PII exposed\n}));\n"
  when_applies: Projects using Express.js/Node.js servers or Node.js
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities. projects
    not using Express or Node.js
  sources: ["https://expressjs.com/en/advanced/best-practice-security.html", "https://cheatsheetseries.owasp.org/cheatsheets/Session_Management_Cheat_Sheet.html"]
