- id: CR-FL-016
  text: Use FFI (dart:ffi) for direct C/C++ calls when performance-critical native code is needed
  why: 'MethodChannel has serialization overhead (~1ms per call) because data is encoded as a platform message and decoded
    on the other side. For performance-critical operations called hundreds of times per second (image processing, audio manipulation,
    cryptography, ML inference), this overhead accumulates. dart:ffi provides zero-copy function calls directly to C/C++ libraries,
    with no serialization and no async boundary. The downside is complexity: FFI requires manual memory management and C interop
    knowledge. Use it only when MethodChannel is measurably too slow.

    '
  how_to_do_right: '1. Use ffigen package to auto-generate Dart bindings from C headers

    2. Handle memory allocation/deallocation explicitly (malloc/free)

    3. Use NativeFinalizer for automatic cleanup when Dart object is GC''d

    4. Test FFI code on both iOS and Android — ABI differences exist

    5. Bundle .so (Android) and .framework (iOS) in the correct directories

    6. Benchmark MethodChannel vs FFI — only switch if overhead is measurable

    '
  severity: medium
  technologies:
    lang: [dart, c]
    framework: [mobile, flutter]
    library: [ffi]
  domains:
    domain: [architecture, mobile, performance]
    concern: [native-integration]
  example_good: "// Auto-generated bindings from ffigen\n// pubspec.yaml: ffigen config points to native/include/crypto.h\n\
    import 'dart:ffi';\nimport 'package:ffi/ffi.dart';\n\n// Load native library\nfinal DynamicLibrary _nativeLib = Platform.isAndroid\n\
    \    ? DynamicLibrary.open('libcrypto_native.so')\n    : DynamicLibrary.process();\n\n// Typedef for C function: int hash_data(const\
    \ char* input, char* output, int outLen)\ntypedef HashDataNative = Int32 Function(Pointer<Utf8>, Pointer<Utf8>, Int32);\n\
    typedef HashDataDart = int Function(Pointer<Utf8>, Pointer<Utf8>, int);\n\nfinal _hashData = _nativeLib.lookupFunction<HashDataNative,\
    \ HashDataDart>('hash_data');\n\nString hashData(String input) {\n  final inputPtr = input.toNativeUtf8();\n  final outputPtr\
    \ = calloc<Uint8>(65); // SHA-256 = 64 hex chars + null\n\n  try {\n    final result = _hashData(inputPtr, outputPtr.cast(),\
    \ 65);\n    if (result != 0) throw Exception('Hash failed: $result');\n    return outputPtr.cast<Utf8>().toDartString();\n\
    \  } finally {\n    calloc.free(inputPtr); // MUST free — no GC for native memory\n    calloc.free(outputPtr);\n  }\n\
    }\n"
  example_bad: "// Using MethodChannel for high-frequency calls — 1ms overhead each\nFuture<String> hashData(String input)\
    \ async {\n  // If called 100 times/second: 100ms overhead from serialization alone\n  return await MethodChannel('crypto')\n\
    \      .invokeMethod<String>('hash', {'input': input}) ?? '';\n}\n\n// FFI without memory management — native memory leak\n\
    String hashData(String input) {\n  final inputPtr = input.toNativeUtf8();\n  final outputPtr = calloc<Uint8>(65);\n  _hashData(inputPtr,\
    \ outputPtr.cast(), 65);\n  return outputPtr.cast<Utf8>().toDartString();\n  // inputPtr and outputPtr NEVER freed — memory\
    \ leak grows with each call\n}\n"
  when_applies: Projects using Flutter cross-platform apps, Dart/Flutter applications, C, or FFI
  when_not_applies: web-only applications, backend services, desktop applications
  sources: ["https://dart.dev/effective-dart/style"]
- id: CR-FL-017
  text: Use integration_test package with Patrol for reliable end-to-end testing on real devices
  why: 'Widget tests run in a test environment that doesn''t match real device behavior: no platform channels, no native views,
    no keyboard, no system dialogs (permissions, biometrics, share sheet). Integration tests run on a real device/emulator
    catching these platform-specific issues. The Patrol package extends integration_test with native automation (tapping system
    permission dialogs, interacting with notifications), custom finders, and better error reporting. Without integration tests,
    teams ship apps that crash on first launch because a permission dialog wasn''t handled.

    '
  how_to_do_right: '1. Use integration_test for test framework

    2. Use Patrol for native interaction (permission dialogs, notifications)

    3. Test critical user flows only: signup, login, primary action, payment

    4. Use retry logic for flaky platform interactions (camera preview, network)

    5. Run on CI with Firebase Test Lab or AWS Device Farm

    6. Keep integration tests under 5 minutes total — they''re slow

    '
  severity: medium
  technologies:
    lang: [dart]
    framework: [mobile, flutter]
    library: [patrol]
  domains:
    domain: [architecture, mobile, testing]
  example_good: "// integration_test/checkout_test.dart\nimport 'package:patrol/patrol.dart';\n\nvoid main() {\n  patrolTest(\n\
    \    'complete checkout with biometric auth',\n    ($) async {\n      // Launch app\n      await $.pumpWidgetAndSettle(const\
    \ MyApp());\n\n      // Navigate to product\n      await $(#productCard).at(0).tap();\n      await $(#addToCartButton).tap();\n\
    \n      // Navigate to cart\n      await $(#cartTab).tap();\n      expect($(#cartItemCount).text, '1');\n\n      // Proceed\
    \ to checkout\n      await $(#checkoutButton).tap();\n\n      // Handle native biometric dialog (Patrol feature)\n   \
    \   await $.native.tap(NativeSelector(text: 'Use Face ID'));\n\n      // Verify success\n      await $.pumpAndSettle();\n\
    \      expect($(#orderConfirmation), findsOneWidget);\n    },\n  );\n}\n"
  example_bad: "// Widget test pretending to be integration test\ntestWidgets('checkout', (tester) async {\n  await tester.pumpWidget(MyApp());\n\
    \  await tester.tap(find.byKey(Key('checkout')));\n  await tester.pumpAndSettle();\n  // Cannot test: biometric dialog,\
    \ payment sheet, system permission\n  // Passes in test, crashes on real device\n});\n\n// Integration test without Patrol\
    \ — cannot interact with native dialogs\n// Permission dialog appears → test hangs → timeout → flaky failure\n"
  when_applies: Projects using Flutter cross-platform apps, Dart/Flutter applications, or Patrol
  when_not_applies: web-only applications, backend services, desktop applications
  sources: ["https://docs.flutter.dev/packages-and-plugins/developing-packages"]
- id: CR-FL-018
  text: Structure Flutter projects with feature-first architecture and strict layer separation
  why: 'Flutter projects grow from 10 to 500+ files quickly. Without structure, developers create files wherever convenient,
    leading to circular imports, untestable code, and features scattered across directories. Feature-first structure groups
    all code for a feature (UI, state, data, domain) in one directory. Layer separation (presentation, domain, data) within
    each feature prevents UI code from directly calling APIs and domain logic from depending on UI frameworks. This enables:
    independent feature testing, parallel team development, and feature-level lazy loading.

    '
  how_to_do_right: '1. Top-level: lib/features/, lib/core/, lib/shared/

    2. Each feature: presentation/ (widgets, pages), domain/ (models, use cases), data/ (repos, DTOs)

    3. core/ for app-wide config: routing, theme, DI, constants

    4. shared/ for reusable widgets: design system, utils, extensions

    5. Import rules: domain never imports presentation, data imports domain only

    6. Use analysis_options.yaml custom lint rules or import_sorter for enforcement

    '
  severity: medium
  technologies:
    lang: [dart]
    framework: [mobile, flutter]
  domains:
    domain: [architecture, mobile]
  example_good: '// lib/

    //   app.dart                        # MaterialApp, router, providers

    //   core/

    //     router/app_router.dart         # GoRouter config

    //     theme/app_theme.dart           # ThemeData

    //     di/injection.dart              # Riverpod overrides for DI

    //   features/

    //     auth/

    //       presentation/

    //         login_screen.dart

    //         widgets/login_form.dart

    //       domain/

    //         models/user.dart

    //         repositories/auth_repository.dart  # abstract interface

    //       data/

    //         auth_repository_impl.dart          # concrete implementation

    //         dtos/login_request.dart

    //       auth.dart                            # barrel export

    //     cart/

    //       presentation/

    //       domain/

    //       data/

    //       cart.dart

    //   shared/

    //     widgets/app_button.dart

    //     extensions/context_extensions.dart


    // features/auth/auth.dart — barrel export (public API)

    export ''presentation/login_screen.dart'';

    export ''domain/models/user.dart'';

    // NOT exporting data layer — implementation detail


    // Import rules enforced:

    // domain/ never imports presentation/ or data/

    // presentation/ imports domain/ but never data/

    // data/ imports domain/ for interfaces

    '
  example_bad: '// Organized by type — impossible to find related code

    // lib/

    //   screens/

    //     login_screen.dart      ← where is its state?

    //     cart_screen.dart

    //     profile_screen.dart

    //   models/

    //     user.dart              ← where is the screen that uses this?

    //     product.dart

    //   services/

    //     auth_service.dart      ← called directly from UI

    //     cart_service.dart

    //   widgets/

    //     login_form.dart

    //     cart_item.dart


    // login_screen.dart imports auth_service directly — no abstraction

    import ''../services/auth_service.dart'';

    // Untestable: can''t mock auth_service without DI

    // Circular risk: services/ imports models/ imports services/

    '
  when_applies: Projects using Flutter cross-platform apps or Dart/Flutter applications
  when_not_applies: web-only applications, backend services, desktop applications. projects not using Flutter or Dart
  sources: ["https://docs.flutter.dev/testing/integration-tests"]
