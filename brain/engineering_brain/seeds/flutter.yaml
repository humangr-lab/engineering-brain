  when_not_applies: web-only applications, backend services, desktop applications. projects not using Flutter or Dart
  sources: ["https://docs.flutter.dev/ui/animations"]
- id: CR-FL-013
  text: Use InheritedWidget (or InheritedModel) for efficient O(1) data propagation through the widget tree
  why: 'Passing data through constructor parameters (prop drilling) becomes unmaintainable past 3 levels deep. InheritedWidget
    provides O(1) lookup to any descendant widget without passing through intermediaries. Unlike Context in React, InheritedWidget
    only rebuilds dependents that actually called dependOnInheritedWidgetOfExactType — non-dependent descendants are skipped.
    InheritedModel further optimizes by allowing aspect-based dependency: a widget can depend on only the "name" aspect and
    not rebuild when "email" changes. This is the foundation that Provider, Riverpod, and Theme use internally.

    '
  how_to_do_right: '1. Use InheritedWidget for truly static configuration (theme, locale, feature flags)

    2. Use InheritedModel when different descendants need different aspects of the same data

    3. Override updateShouldNotify to prevent unnecessary rebuilds

    4. Provide a static .of(context) method for ergonomic access

    5. For mutable state, wrap InheritedWidget with a StatefulWidget that triggers rebuilds

    6. In most cases, use Riverpod/Provider instead — they wrap InheritedWidget with better DX

    '
  severity: medium
  technologies:
    lang: [dart]
    framework: [mobile, flutter]
  domains:
    domain: [architecture, mobile]
  example_good: "// Feature flags — truly global, changes once per session\nclass FeatureFlags extends InheritedWidget {\n\
    \  const FeatureFlags({\n    super.key,\n    required this.flags,\n    required super.child,\n  });\n\n  final Map<String,\
    \ bool> flags;\n\n  bool isEnabled(String flag) => flags[flag] ?? false;\n\n  static FeatureFlags of(BuildContext context)\
    \ {\n    return context.dependOnInheritedWidgetOfExactType<FeatureFlags>()!;\n  }\n\n  @override\n  bool updateShouldNotify(FeatureFlags\
    \ oldWidget) {\n    // Only notify if flags actually changed — deep equality\n    return !mapEquals(flags, oldWidget.flags);\n\
    \  }\n}\n\n// Usage — O(1) lookup, no prop drilling\nclass SettingsScreen extends StatelessWidget {\n  @override\n  Widget\
    \ build(BuildContext context) {\n    final flags = FeatureFlags.of(context);\n    return Column(\n      children: [\n\
    \        if (flags.isEnabled('dark_mode')) const DarkModeToggle(),\n        if (flags.isEnabled('biometric_auth')) const\
    \ BiometricSettings(),\n      ],\n    );\n  }\n}\n\n// App root — flags set once, propagated to entire tree\nFeatureFlags(\n\
    \  flags: {'dark_mode': true, 'biometric_auth': false},\n  child: const MaterialApp(home: HomeScreen()),\n)\n"
  example_bad: "// Prop drilling through 5 levels\nclass App extends StatelessWidget {\n  final flags = {'dark_mode': true};\n\
    \  @override\n  Widget build(BuildContext context) {\n    return Home(flags: flags); // level 1\n  }\n}\nclass Home extends\
    \ StatelessWidget {\n  final Map<String, bool> flags;\n  Home({required this.flags});\n  @override\n  Widget build(BuildContext\
    \ context) {\n    return Shell(flags: flags); // level 2 — doesn't use flags\n  }\n}\nclass Shell extends StatelessWidget\
    \ {\n  final Map<String, bool> flags;\n  Shell({required this.flags});\n  @override\n  Widget build(BuildContext context)\
    \ {\n    return Settings(flags: flags); // level 3 — still just passing through\n  }\n}\n// ... continues for 2 more levels\
    \ before flags is actually used\n"
