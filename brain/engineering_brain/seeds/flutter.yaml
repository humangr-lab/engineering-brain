- id: CR-FL-012
  text: Use golden tests for pixel-perfect visual regression detection across platforms
  why: 'Golden tests compare a widget''s rendered output against a saved screenshot (the "golden" file). Any pixel difference
    fails the test, catching visual regressions like padding changes, font size modifications, color shifts, and layout breakage
    that widget tests with find/expect cannot detect. Without golden tests, a one-line CSS equivalent change can break the
    visual design across the app without any test failing. Golden tests are especially critical for design system components
    used across dozens of screens.

    '
  how_to_do_right: '1. Create golden tests for design system components (buttons, cards, inputs)

    2. Test multiple states: default, hovered, pressed, disabled, error, loading

    3. Test multiple sizes: mobile, tablet, different font scales

    4. Update goldens intentionally: flutter test --update-goldens

    5. Review golden diffs in PR like you review code changes

    6. Use Alchemist package for organized golden test generation

    '
  severity: medium
  technologies:
    lang: [dart]
    framework: [mobile, flutter]
  domains:
    domain: [architecture, mobile, testing]
  example_good: "import 'package:alchemist/alchemist.dart';\n\nvoid main() {\n  goldenTest(\n    'AppButton renders correctly\
    \ in all states',\n    fileName: 'app_button',\n    builder: () => GoldenTestGroup(\n      children: [\n        GoldenTestScenario(\n\
    \          name: 'default',\n          child: const AppButton(label: 'Submit'),\n        ),\n        GoldenTestScenario(\n\
    \          name: 'disabled',\n          child: const AppButton(label: 'Submit', enabled: false),\n        ),\n       \
    \ GoldenTestScenario(\n          name: 'loading',\n          child: const AppButton(label: 'Submit', loading: true),\n\
    \        ),\n        GoldenTestScenario(\n          name: 'error',\n          child: const AppButton(\n            label:\
    \ 'Submit',\n            error: 'Network error',\n          ),\n        ),\n      ],\n    ),\n  );\n}\n\n// Run: flutter\
    \ test --update-goldens (to create/update reference images)\n// Run: flutter test (to compare against reference images)\n\
    // CI: fail PR if goldens changed without --update-goldens commit\n"
  example_bad: "// No golden tests — visual regressions shipped silently\n// Someone changes EdgeInsets.all(16) to EdgeInsets.all(8)\n\
    // All widget tests pass — they don't check pixels\n// Production: entire app looks cramped, no test caught it\n\n// Manual\
    \ golden test — no organization, single state\ntestWidgets('golden', (tester) async {\n  await tester.pumpWidget(MaterialApp(home:\
    \ AppButton(label: 'Test')));\n  await expectLater(\n    find.byType(AppButton),\n    matchesGoldenFile('button.png'),\
    \ // only tests default state\n  );\n  // Missing: disabled, loading, error, dark mode, large font\n});\n"
