  when_not_applies: web-only applications, backend services, desktop applications. projects not using Flutter or Dart
  sources: ["https://docs.flutter.dev/platform-integration/platform-channels"]
- id: CR-FL-009
  text: Use GoRouter for declarative routing with deep linking, guards, and type-safe path parameters
  why: 'Navigator 1.0 (push/pop) works for simple apps but breaks down with deep linking, conditional redirects (auth guards),
    and browser back button on Flutter Web. GoRouter provides URL-based routing where the navigation state is derived from
    the URL, enabling proper deep linking out of the box, declarative redirect rules, and type-safe path/query parameters.
    Without GoRouter, teams spend weeks implementing deep linking manually, only to discover edge cases (notification deep
    link while unauthenticated) that require rewriting the navigation architecture.

    '
  how_to_do_right: '1. Define all routes in a single GoRouter configuration

    2. Use redirect for auth guards — check auth state before navigation

    3. Use pathParameters for required IDs, queryParameters for optional filters

    4. Use StatefulShellRoute for bottom navigation with preserved state

    5. Use go() for declarative navigation, push() only for modal/dialog overlays

    6. Configure errorBuilder for 404 handling

    '
  severity: high
  technologies:
    lang: [dart]
    framework: [mobile, flutter]
    library: [gorouter]
  domains:
    domain: [architecture, mobile]
    concern: [frontend, navigation]
  example_good: "// router.dart — declarative routing with guards\nfinal router = GoRouter(\n  initialLocation: '/',\n  redirect:\
    \ (context, state) {\n    final isLoggedIn = ref.read(authProvider).isLoggedIn;\n    final isAuthRoute = state.matchedLocation.startsWith('/auth');\n\
    \n    if (!isLoggedIn && !isAuthRoute) return '/auth/login';\n    if (isLoggedIn && isAuthRoute) return '/';\n    return\
    \ null; // no redirect\n  },\n  routes: [\n    StatefulShellRoute.indexedStack(\n      builder: (context, state, child)\
    \ => ScaffoldWithNavBar(child: child),\n      branches: [\n        StatefulShellBranch(routes: [\n          GoRoute(\n\
    \            path: '/',\n            builder: (context, state) => const HomeScreen(),\n          ),\n        ]),\n   \
    \     StatefulShellBranch(routes: [\n          GoRoute(\n            path: '/profile/:userId',\n            builder: (context,\
    \ state) {\n              final userId = state.pathParameters['userId']!;\n              return ProfileScreen(userId:\
    \ userId);\n            },\n          ),\n        ]),\n      ],\n    ),\n    GoRoute(\n      path: '/auth/login',\n  \
    \    builder: (context, state) => const LoginScreen(),\n    ),\n  ],\n  errorBuilder: (context, state) => NotFoundScreen(\n\
    \    path: state.matchedLocation,\n  ),\n);\n\n// Deep link: myapp://profile/abc123 → ProfileScreen(userId: 'abc123')\n"
  example_bad: "// Navigator 1.0 — imperative, no deep linking, no guards\nNavigator.push(\n  context,\n  MaterialPageRoute(builder:\
    \ (_) => ProfileScreen(userId: id)),\n);\n\n// Auth check scattered across every screen\nclass ProfileScreen extends StatefulWidget\
    \ {\n  @override\n  void initState() {\n    if (!isLoggedIn) {\n      // Race condition: build() runs before this redirect\n\
    \      Navigator.pushReplacement(context, MaterialPageRoute(\n        builder: (_) => LoginScreen(),\n      ));\n    }\n\
    \  }\n}\n\n// Deep link handling — manual and fragile\n// No URL parsing, no type-safe parameters, no 404 handling\n"
