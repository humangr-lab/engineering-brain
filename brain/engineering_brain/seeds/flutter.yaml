- id: CR-FL-015
  text: Implement deep links with proper handling for both cold start and warm start scenarios
  why: 'Deep links arrive in two distinct scenarios: cold start (app not running, link launches app) and warm start (app in
    background, link brings it to foreground). Many implementations only handle one scenario, causing links to silently fail
    in the other. On iOS, universal links require an apple-app-site-association file hosted on your domain. On Android, app
    links require an assetlinks.json and intent-filter in AndroidManifest.xml. Missing either means the OS opens the URL in
    the browser instead of the app, with no error message.

    '
  how_to_do_right: '1. Use app_links package for cross-platform deep link handling

    2. Handle both getInitialLink() (cold start) and linkStream (warm start)

    3. Host apple-app-site-association at https://yourdomain.com/.well-known/

    4. Host assetlinks.json at https://yourdomain.com/.well-known/

    5. Verify with: npx uri-scheme validate (or adb shell am start for Android)

    6. Queue deep link if auth required — handle after login completes

    '
  severity: high
  technologies:
    lang: [dart]
    framework: [mobile, flutter]
  domains:
    domain: [architecture, mobile]
    concern: [frontend, navigation]
  example_good: "// deep_link_service.dart — handles both cold and warm start\nimport 'package:app_links/app_links.dart';\n\
    \nclass DeepLinkService {\n  final AppLinks _appLinks = AppLinks();\n  final GoRouter _router;\n  String? _pendingDeepLink;\
    \ // queue if auth required\n\n  DeepLinkService(this._router);\n\n  Future<void> initialize() async {\n    // Cold start\
    \ — app launched via deep link\n    final initialLink = await _appLinks.getInitialLink();\n    if (initialLink != null)\
    \ {\n      _handleDeepLink(initialLink);\n    }\n\n    // Warm start — link received while app is running\n    _appLinks.uriLinkStream.listen(_handleDeepLink);\n\
    \  }\n\n  void _handleDeepLink(Uri uri) {\n    final path = uri.path;\n    final params = uri.queryParameters;\n\n   \
    \ // Queue if auth required\n    if (_requiresAuth(path) && !_isLoggedIn()) {\n      _pendingDeepLink = uri.toString();\n\
    \      _router.go('/auth/login');\n      return;\n    }\n\n    _router.go(path, extra: params);\n  }\n\n  // Call after\
    \ successful login\n  void processPendingDeepLink() {\n    if (_pendingDeepLink != null) {\n      _handleDeepLink(Uri.parse(_pendingDeepLink!));\n\
    \      _pendingDeepLink = null;\n    }\n  }\n}\n"
  example_bad: "// Only handles cold start — warm start links silently ignored\nvoid main() async {\n  final initialLink =\
    \ await getInitialLink();\n  if (initialLink != null) {\n    navigateTo(initialLink);\n  }\n  // No stream listener —\
    \ app in background misses all deep links\n}\n\n// No auth queueing — deep link to /profile while logged out shows error\n\
    void _handleLink(String link) {\n  router.go(link); // crashes if route requires auth\n}\n\n// No assetlinks.json/apple-app-site-association\n\
    // Result: OS opens browser instead of app — user thinks app doesn't support links\n"
