- id: CR-FL-010
  text: Use MethodChannel for structured native calls and EventChannel for continuous native data streams
  why: 'Flutter cannot directly access platform APIs (camera, Bluetooth, sensors, biometrics). MethodChannel provides request-response
    communication (call a native method, get a result). EventChannel provides stream-based communication (continuous sensor
    data, Bluetooth scan results). Using MethodChannel for continuous data creates polling overhead and missed events. Using
    EventChannel for one-shot calls adds unnecessary stream management complexity. Choosing the wrong channel type is the
    #1 cause of platform integration bugs: data loss from polling gaps and memory leaks from unmanaged streams.

    '
  how_to_do_right: '1. MethodChannel for one-shot operations: getBatteryLevel, checkPermission, authenticate

    2. EventChannel for streams: accelerometer data, Bluetooth scan, location updates

    3. Always specify exact codec types to avoid serialization ambiguity

    4. Handle PlatformException on Dart side for native errors

    5. Cancel EventChannel streams in dispose() to prevent native memory leaks

    6. Use Pigeon package for generated type-safe bindings (replaces manual channels)

    '
  severity: medium
  technologies:
    lang: [dart]
    framework: [mobile, flutter]
  domains:
    domain: [architecture, mobile]
    concern: [native-integration]
  example_good: "// Dart side — MethodChannel for one-shot + EventChannel for stream\nclass BatteryService {\n  static const\
    \ _method = MethodChannel('com.app/battery');\n  static const _event = EventChannel('com.app/battery_stream');\n\n  //\
    \ One-shot: get current level\n  Future<int> getBatteryLevel() async {\n    try {\n      final level = await _method.invokeMethod<int>('getBatteryLevel');\n\
    \      return level ?? 0;\n    } on PlatformException catch (e) {\n      throw BatteryException('Failed to get level:\
    \ ${e.message}');\n    }\n  }\n\n  // Stream: continuous battery monitoring\n  Stream<int> get batteryStream {\n    return\
    \ _event\n        .receiveBroadcastStream()\n        .map((event) => event as int)\n        .handleError((error) {\n \
    \     throw BatteryException('Stream error: $error');\n    });\n  }\n}\n\n// Widget consuming the stream\nclass BatteryIndicator\
    \ extends StatefulWidget {\n  @override\n  State<BatteryIndicator> createState() => _BatteryIndicatorState();\n}\n\nclass\
    \ _BatteryIndicatorState extends State<BatteryIndicator> {\n  late final StreamSubscription<int> _subscription;\n  int\
    \ _level = 0;\n\n  @override\n  void initState() {\n    super.initState();\n    _subscription = BatteryService().batteryStream.listen(\n\
    \      (level) => setState(() => _level = level),\n    );\n  }\n\n  @override\n  void dispose() {\n    _subscription.cancel();\
    \ // MUST cancel to prevent native leak\n    super.dispose();\n  }\n\n  @override\n  Widget build(BuildContext context)\
    \ => Text('Battery: $_level%');\n}\n"
  example_bad: "// Polling with MethodChannel instead of EventChannel — misses updates\nclass BatteryIndicator extends StatefulWidget\
    \ {\n  @override\n  void initState() {\n    super.initState();\n    // Polling every 5 seconds — wastes battery, misses\
    \ rapid changes\n    Timer.periodic(Duration(seconds: 5), (_) async {\n      final level = await MethodChannel('com.app/battery')\n\
    \          .invokeMethod('getBatteryLevel');\n      setState(() => _level = level);\n    });\n  }\n  // No dispose — timer\
    \ runs forever, even after widget removed\n}\n\n// No error handling — crashes on native failure\nfinal level = await\
    \ MethodChannel('com.app/battery')\n    .invokeMethod('getBatteryLevel');\n// PlatformException crashes the app if native\
    \ side throws\n"
