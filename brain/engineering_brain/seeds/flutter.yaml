layer: rules
technology: Flutter
domain: mobile
knowledge:
- id: CR-FL-001
  text: Understand that everything is a widget — compose small, single-purpose widgets instead of building monolithic build
    methods
  why: 'Flutter''s declarative UI rebuilds the widget tree on every state change. A monolithic build() method with 200+ lines
    means Flutter must diff the entire subtree even when only a small part changed. Breaking into small widgets enables Flutter''s
    element reuse optimization: unchanged subtrees are skipped entirely during rebuild. Additionally, large build methods
    are untestable (can''t widget-test a section), unreviewable, and make hot reload slower because the entire method is recompiled.
    Teams that ship monolithic widgets consistently report 2-3x longer feature development time due to merge conflicts and
    cognitive load.

    '
  how_to_do_right: '1. Each widget should have ONE responsibility (display a card, handle input, show a list)

    2. Extract sections of build() into separate widget classes, not helper methods

    3. Widget classes enable const constructors and element reuse — methods don''t

    4. Keep build() under 30 lines — if longer, extract a child widget

    5. Use composition (child widgets) not inheritance (extending complex widgets)

    6. Name widgets by what they display, not how: UserAvatar not CircleImage

    '
  severity: critical
  technologies:
    lang: [dart]
    framework: [mobile, flutter]
  domains:
    domain: [architecture, mobile]
  example_good: "// Small, composable widgets — each independently testable\nclass ProductCard extends StatelessWidget {\n\
    \  const ProductCard({super.key, required this.product});\n  final Product product;\n\n  @override\n  Widget build(BuildContext\
    \ context) {\n    return Card(\n      child: Column(\n        children: [\n          ProductImage(url: product.imageUrl),\
    \       // extracted widget\n          ProductInfo(name: product.name, price: product.price),\n          AddToCartButton(productId:\
    \ product.id),    // extracted widget\n        ],\n      ),\n    );\n  }\n}\n\n// Independently testable, const-constructable\n\
    class ProductImage extends StatelessWidget {\n  const ProductImage({super.key, required this.url});\n  final String url;\n\
    \n  @override\n  Widget build(BuildContext context) {\n    return CachedNetworkImage(\n      imageUrl: url,\n      placeholder:\
    \ (_, __) => const ShimmerPlaceholder(),\n      errorWidget: (_, __, ___) => const Icon(Icons.broken_image),\n    );\n\
    \  }\n}\n"
  example_bad: "// Monolithic widget — 200 lines, untestable, slow rebuild\nclass ProductCard extends StatefulWidget {\n \
    \ @override\n  Widget build(BuildContext context) {\n    return Card(\n      child: Column(\n        children: [\n   \
    \       // 40 lines of image handling inline\n          Container(\n            height: 200,\n            child: Stack(\n\
    \              children: [\n                Image.network(product.imageUrl),\n                // ... error handling, loading\
    \ state, gradient overlay ...\n              ],\n            ),\n          ),\n          // 30 lines of product info inline\n\
    \          Padding(\n            padding: EdgeInsets.all(16),\n            child: Column(\n              children: [\n\
    \                // ... name, price, rating, description ...\n              ],\n            ),\n          ),\n       \
    \   // 30 lines of button with animation inline\n          // ... AnimatedContainer, GestureDetector, Hero ...\n     \
    \   ],\n      ),\n    );\n    // 200+ lines — any state change rebuilds everything\n  }\n}\n"
  when_applies: Any project using Flutter cross-platform apps or Dart/Flutter applications
  when_not_applies: web-only applications, backend services, desktop applications. projects not using Flutter or Dart
  sources: ["https://docs.flutter.dev/ui/widgets", "https://docs.flutter.dev/perf/best-practices"]
- id: CR-FL-002
  text: Choose StatelessWidget by default — only use StatefulWidget when the widget owns local mutable state
  why: 'StatefulWidget creates a State object that persists across rebuilds, adding memory overhead and lifecycle complexity
    (initState, dispose, didUpdateWidget, didChangeDependencies). Using StatefulWidget when state is managed externally (via
    Riverpod, BLoC, or parent) wastes memory and creates bugs where dispose() cleanup is forgotten (timer leaks, stream subscription
    leaks, controller leaks). StatelessWidget is simpler, lighter, and signals to code reviewers that no local mutation happens.

    '
  how_to_do_right: "1. Default to StatelessWidget for ALL new widgets\n2. Use StatefulWidget ONLY for: animation controllers,\
    \ text editing controllers,\n   scroll controllers, focus nodes, or truly local ephemeral state (expanded/collapsed)\n\
    3. For app/feature state, use Riverpod/BLoC — never StatefulWidget\n4. If StatefulWidget is needed, ALWAYS dispose controllers\
    \ in dispose()\n5. Use flutter_hooks (useTextEditingController, useAnimationController) to simplify lifecycle\n6. Consider\
    \ ConsumerWidget (Riverpod) instead of StatelessWidget for reactive state\n"
  severity: high
  technologies:
    lang: [dart]
    framework: [mobile, flutter]
  domains:
    domain: [architecture, mobile]
  example_good: "// StatelessWidget — state managed externally via Riverpod\nclass UserProfile extends ConsumerWidget {\n\
    \  const UserProfile({super.key});\n\n  @override\n  Widget build(BuildContext context, WidgetRef ref) {\n    final user\
    \ = ref.watch(userProvider);\n    return user.when(\n      data: (user) => Text(user.name),\n      loading: () => const\
    \ CircularProgressIndicator(),\n      error: (e, _) => Text('Error: $e'),\n    );\n  }\n}\n\n// StatefulWidget — owns\
    \ TextEditingController (needs dispose)\nclass SearchBar extends StatefulWidget {\n  const SearchBar({super.key, required\
    \ this.onSearch});\n  final ValueChanged<String> onSearch;\n\n  @override\n  State<SearchBar> createState() => _SearchBarState();\n\
    }\n\nclass _SearchBarState extends State<SearchBar> {\n  late final TextEditingController _controller;\n\n  @override\n\
    \  void initState() {\n    super.initState();\n    _controller = TextEditingController();\n  }\n\n  @override\n  void\
    \ dispose() {\n    _controller.dispose(); // MUST dispose to prevent memory leak\n    super.dispose();\n  }\n\n  @override\n\
    \  Widget build(BuildContext context) {\n    return TextField(\n      controller: _controller,\n      onSubmitted: widget.onSearch,\n\
    \    );\n  }\n}\n"
  example_bad: "// StatefulWidget for no reason — state is in Riverpod\nclass UserProfile extends StatefulWidget {\n  @override\n\
    \  State<UserProfile> createState() => _UserProfileState();\n}\n\nclass _UserProfileState extends State<UserProfile> {\n\
    \  User? user; // duplicating Riverpod state locally\n\n  @override\n  void initState() {\n    super.initState();\n  \
    \  _loadUser(); // manual loading instead of reactive watch\n  }\n\n  void _loadUser() async {\n    user = await userRepo.getUser();\n\
    \    setState(() {}); // manual setState instead of Riverpod\n  }\n\n  @override\n  Widget build(BuildContext context)\
    \ {\n    return user != null ? Text(user!.name) : CircularProgressIndicator();\n  }\n  // No dispose() — if _loadUser\
    \ had a StreamSubscription, it would leak\n}\n"
  when_applies: Projects using Flutter cross-platform apps or Dart/Flutter applications
  when_not_applies: web-only applications, backend services, desktop applications. projects not using Flutter or Dart
  sources: ["https://docs.flutter.dev/data-and-backend/state-mgmt/intro"]
- id: CR-FL-003
  text: Use Keys correctly — GlobalKey for preserving state across tree moves, ValueKey for list items, never rely on default
    keys
  why: 'Flutter uses keys to match old widgets with new widgets during rebuild. Without explicit keys, Flutter matches by
    position: if you reorder a list, Flutter sees "position 0 changed" and rebuilds instead of recognizing the item moved.
    This causes visible state loss (text fields cleared, animations reset, checkboxes unchecked) and wasteful rebuilds. GlobalKey
    is expensive (globally unique, prevents garbage collection of State) and should only be used when State must survive parent
    changes. ValueKey is lightweight and correct for lists.

    '
  how_to_do_right: '1. ValueKey for list items: ValueKey(item.id) — stable identifier

    2. ObjectKey when items don''t have unique IDs but are unique by reference

    3. GlobalKey ONLY when accessing State from outside (FormState, NavigatorState)

    4. Never use index as key for reorderable/filterable lists

    5. UniqueKey forces rebuild — use only when you WANT to reset state

    6. If widget is const and never moves in tree, default key is fine

    '
  severity: high
  technologies:
    lang: [dart]
    framework: [mobile, flutter]
  domains:
    domain: [architecture, mobile]
  example_good: "// List items with ValueKey — reorder without state loss\nclass TodoList extends StatelessWidget {\n  const\
    \ TodoList({super.key, required this.todos});\n  final List<Todo> todos;\n\n  @override\n  Widget build(BuildContext context)\
    \ {\n    return ReorderableListView(\n      children: [\n        for (final todo in todos)\n          TodoItem(\n    \
    \        key: ValueKey(todo.id), // stable ID, survives reorder\n            todo: todo,\n          ),\n      ],\n   \
    \   onReorder: (oldIndex, newIndex) {\n        // TodoItem state (checkbox, expansion) preserved during reorder\n    \
    \  },\n    );\n  }\n}\n\n// GlobalKey — accessing FormState from parent\nclass CheckoutForm extends StatelessWidget {\n\
    \  // Expensive but necessary — need to call formKey.currentState!.validate()\n  final formKey = GlobalKey<FormState>();\n\
    \n  @override\n  Widget build(BuildContext context) {\n    return Form(\n      key: formKey,\n      child: Column(\n \
    \       children: [\n          TextFormField(validator: (v) => v!.isEmpty ? 'Required' : null),\n          ElevatedButton(\n\
    \            onPressed: () {\n              if (formKey.currentState!.validate()) {\n                formKey.currentState!.save();\n\
    \              }\n            },\n            child: const Text('Submit'),\n          ),\n        ],\n      ),\n    );\n\
    \  }\n}\n"
  example_bad: "// No keys in reorderable list — state lost on reorder\nReorderableListView(\n  children: [\n    for (var\
    \ i = 0; i < todos.length; i++)\n      TodoItem(\n        key: ValueKey(i), // INDEX as key — WRONG for reorderable lists\n\
    \        todo: todos[i],   // reorder swaps data but keeps State at position\n      ),\n  ],\n  onReorder: (oldIndex,\
    \ newIndex) {\n    // Checkbox state stays at old position — visual corruption\n  },\n);\n\n// GlobalKey everywhere —\
    \ memory leak, prevents GC\nclass MyApp extends StatelessWidget {\n  final headerKey = GlobalKey();  // unnecessary —\
    \ never accessed externally\n  final bodyKey = GlobalKey();    // unnecessary\n  final footerKey = GlobalKey();  // unnecessary\n\
    \n  @override\n  Widget build(BuildContext context) {\n    return Column(\n      children: [\n        Header(key: headerKey),\
    \   // waste of GlobalKey\n        Body(key: bodyKey),\n        Footer(key: footerKey),\n      ],\n    );\n  }\n}\n"
  when_applies: Projects using Flutter cross-platform apps or Dart/Flutter applications
  when_not_applies: web-only applications, backend services, desktop applications. projects not using Flutter or Dart
  sources: ["https://docs.flutter.dev/cookbook/navigation/named-routes", "https://pub.dev/packages/go_router"]
- id: CR-FL-004
  text: Use Riverpod for type-safe, testable, compile-time-checked state management with auto-dispose
  why: 'Riverpod provides compile-time safety (no runtime ProviderNotFoundException), automatic disposal when no widget is
    listening, dependency injection without BuildContext, and cacheable async state with built-in loading/error handling.
    Compared to Provider, Riverpod doesn''t require BuildContext for reads (usable in non-widget code), catches missing providers
    at compile time, and supports overrides for testing without any setup. Compared to BLoC, Riverpod requires 60-70% less
    boilerplate for equivalent functionality while maintaining the same testability.

    '
  how_to_do_right: '1. Use @riverpod annotation (code generation) for type safety

    2. AsyncNotifierProvider for server state (API calls with caching)

    3. NotifierProvider for client state (form state, UI toggles)

    4. Use ref.watch() in build, ref.read() in callbacks

    5. Use autoDispose (default with @riverpod) to prevent memory leaks

    6. Override providers in tests for isolated, deterministic testing

    '
  severity: high
  technologies:
    lang: [dart]
    framework: [mobile, flutter]
    library: [riverpod]
  domains:
    domain: [architecture, mobile]
    concern: [state_management]
  example_good: "// providers/user_provider.dart — generated with @riverpod\nimport 'package:riverpod_annotation/riverpod_annotation.dart';\n\
    \npart 'user_provider.g.dart';\n\n@riverpod\nclass UserNotifier extends _$UserNotifier {\n  @override\n  FutureOr<User>\
    \ build(String userId) async {\n    // Auto-disposes when no widget watches this provider\n    // Auto-caches: second\
    \ watch with same userId returns cached value\n    return ref.watch(userRepositoryProvider).getUser(userId);\n  }\n\n\
    \  Future<void> updateName(String name) async {\n    state = const AsyncLoading();\n    state = await AsyncValue.guard(\n\
    \      () => ref.read(userRepositoryProvider).updateName(name),\n    );\n  }\n}\n\n// screens/profile_screen.dart — consuming\
    \ provider\nclass ProfileScreen extends ConsumerWidget {\n  const ProfileScreen({super.key, required this.userId});\n\
    \  final String userId;\n\n  @override\n  Widget build(BuildContext context, WidgetRef ref) {\n    final userAsync = ref.watch(userNotifierProvider(userId));\n\
    \n    return userAsync.when(\n      data: (user) => Column(\n        children: [\n          Text(user.name),\n       \
    \   ElevatedButton(\n            // ref.read in callbacks, not ref.watch\n            onPressed: () => ref.read(userNotifierProvider(userId).notifier)\n\
    \              .updateName('New Name'),\n            child: const Text('Update'),\n          ),\n        ],\n      ),\n\
    \      loading: () => const CircularProgressIndicator(),\n      error: (e, st) => Text('Error: $e'),\n    );\n  }\n}\n\
    \n// test — override provider with no setup\ntestWidgets('shows user name', (tester) async {\n  await tester.pumpWidget(\n\
    \    ProviderScope(\n      overrides: [\n        userNotifierProvider('123').overrideWith(\n          () => FakeUserNotifier(),\n\
    \        ),\n      ],\n      child: const MaterialApp(home: ProfileScreen(userId: '123')),\n    ),\n  );\n  expect(find.text('Test\
    \ User'), findsOneWidget);\n});\n"
  example_bad: "// Provider (predecessor) — runtime errors, context-dependent\nclass UserProvider extends ChangeNotifier {\n\
    \  User? _user;\n  bool _loading = false;\n  String? _error;\n\n  // Manual loading/error state management\n  Future<void>\
    \ loadUser(String id) async {\n    _loading = true;\n    notifyListeners();\n    try {\n      _user = await repo.getUser(id);\n\
    \    } catch (e) {\n      _error = e.toString();\n    }\n    _loading = false;\n    notifyListeners();\n  }\n}\n\n// Runtime\
    \ crash if provider not found in ancestor tree\nfinal user = context.read<UserProvider>(); // ProviderNotFoundException\
    \ at runtime\n\n// Cannot use outside widgets — need BuildContext\n// Cannot test without full widget tree setup\n"
  when_applies: Projects using Flutter cross-platform apps, Riverpod, or Dart/Flutter applications
  when_not_applies: web-only applications, backend services, desktop applications
  sources: ["https://docs.flutter.dev/perf/best-practices"]
- id: CR-FL-005
  text: Use BLoC pattern with Cubits for simpler use cases and full BLoCs for complex event-driven state
  why: 'BLoC (Business Logic Component) separates business logic from UI via streams. Cubit is a simplified BLoC that uses
    methods instead of events — appropriate for 80% of use cases. Full BLoC (with events) is needed when you require event
    transformation (debounce, throttle, switchMap), event replay, or undo/redo capabilities. Using full BLoC for simple CRUD
    operations adds unnecessary boilerplate (Event class, mapEventToState). Using Cubit for complex workflows misses the benefits
    of event sourcing and transformation.

    '
  how_to_do_right: '1. Cubit for CRUD, form state, simple toggles (80% of cases)

    2. Full BLoC for search (debounce), real-time data (stream transform), undo/redo

    3. One BLoC/Cubit per feature, not per screen

    4. Emit new state objects, never mutate existing state

    5. Use sealed classes for state (Dart 3) — exhaustive pattern matching

    6. Use BlocObserver for global logging/analytics

    '
  severity: medium
  technologies:
    lang: [dart]
    framework: [mobile, flutter]
    library: [bloc]
  domains:
    domain: [architecture, mobile]
    concern: [state_management]
  example_good: "// Cubit for simple CRUD — no events needed\n// cubit/counter_cubit.dart\nclass CounterCubit extends Cubit<int>\
    \ {\n  CounterCubit() : super(0);\n\n  void increment() => emit(state + 1);\n  void decrement() => emit(state - 1);\n\
    }\n\n// Full BLoC for search with debounce — events enable transformation\n// State with sealed classes (Dart 3)\nsealed\
    \ class SearchState {}\nclass SearchInitial extends SearchState {}\nclass SearchLoading extends SearchState {}\nclass\
    \ SearchResults extends SearchState {\n  final List<Product> products;\n  SearchResults(this.products);\n}\nclass SearchError\
    \ extends SearchState {\n  final String message;\n  SearchError(this.message);\n}\n\n// Events\nsealed class SearchEvent\
    \ {}\nclass SearchQueryChanged extends SearchEvent {\n  final String query;\n  SearchQueryChanged(this.query);\n}\n\n\
    // BLoC with event transformer (debounce)\nclass SearchBloc extends Bloc<SearchEvent, SearchState> {\n  SearchBloc(this._repo)\
    \ : super(SearchInitial()) {\n    on<SearchQueryChanged>(\n      _onQueryChanged,\n      transformer: debounce(const Duration(milliseconds:\
    \ 300)),\n    );\n  }\n\n  final SearchRepository _repo;\n\n  Future<void> _onQueryChanged(\n    SearchQueryChanged event,\n\
    \    Emitter<SearchState> emit,\n  ) async {\n    if (event.query.isEmpty) return emit(SearchInitial());\n    emit(SearchLoading());\n\
    \    try {\n      final results = await _repo.search(event.query);\n      emit(SearchResults(results));\n    } catch (e)\
    \ {\n      emit(SearchError(e.toString()));\n    }\n  }\n}\n\n// Widget — exhaustive matching\nBlocBuilder<SearchBloc,\
    \ SearchState>(\n  builder: (context, state) => switch (state) {\n    SearchInitial() => const Text('Enter a search term'),\n\
    \    SearchLoading() => const CircularProgressIndicator(),\n    SearchResults(:final products) => ListView.builder(\n\
    \      itemCount: products.length,\n      itemBuilder: (_, i) => ProductTile(products[i]),\n    ),\n    SearchError(:final\
    \ message) => Text('Error: $message'),\n  },\n)\n"
  example_bad: "// Full BLoC for simple counter — massive over-engineering\nsealed class CounterEvent {}\nclass IncrementPressed\
    \ extends CounterEvent {}\nclass DecrementPressed extends CounterEvent {}\n\nclass CounterBloc extends Bloc<CounterEvent,\
    \ int> {\n  CounterBloc() : super(0) {\n    on<IncrementPressed>((event, emit) => emit(state + 1));\n    on<DecrementPressed>((event,\
    \ emit) => emit(state - 1));\n  }\n}\n// 15 lines for what Cubit does in 5\n\n// Mutable state — BLoC anti-pattern\nclass\
    \ BadBloc extends Bloc<Event, MyState> {\n  Future<void> _onLoad(LoadEvent event, Emitter emit) async {\n    state.isLoading\
    \ = true; // WRONG: mutating existing state\n    emit(state);            // same object reference — BlocBuilder won't\
    \ rebuild\n  }\n}\n"
  when_applies: Projects using Flutter cross-platform apps, BLoC, or Dart/Flutter applications
  when_not_applies: web-only applications, backend services, desktop applications
  sources: ["https://docs.flutter.dev/testing/overview"]
- id: CR-FL-006
  text: Use const constructors aggressively — they prevent widget rebuilds entirely when parent rebuilds
  why: 'When Flutter rebuilds a parent widget, it walks the child tree calling build() on each child. A const widget is a
    compile-time constant: Flutter can skip the entire subtree because it''s guaranteed unchanged. In a list of 100 items
    where the header and footer are const, Flutter skips diffing 2 subtrees per rebuild. In deep widget trees (10+ levels),
    const propagation can reduce rebuild work by 40-60%. Without const, every parent setState triggers needless rebuild of
    static children like icons, labels, and dividers.

    '
  how_to_do_right: '1. Mark widget constructors as const when all fields are final and compile-time known

    2. Use const for literals: const EdgeInsets.all(16), const Icon(Icons.home)

    3. Use const for static children in build methods: const SizedBox(height: 16)

    4. Enable the prefer_const_constructors lint rule

    5. Enable the prefer_const_literals_to_create_immutables lint rule

    6. Use Flutter DevTools "Track Widget Rebuilds" to verify const is working

    '
  severity: high
  technologies:
    lang: [dart]
    framework: [mobile, flutter]
  domains:
    domain: [architecture, mobile, performance]
  example_good: "// All static elements are const — zero rebuild cost\nclass SettingsScreen extends StatelessWidget {\n  const\
    \ SettingsScreen({super.key}); // const constructor\n\n  @override\n  Widget build(BuildContext context) {\n    return\
    \ const Column( // const: entire subtree skipped if parent rebuilds\n      children: [\n        _SettingsHeader(),   \
    \     // const widget\n        SizedBox(height: 16),     // const\n        _ThemeToggle(),           // const (stateless,\
    \ no dynamic data)\n        Divider(),                // const\n        _NotificationToggle(),\n        SizedBox(height:\
    \ 32),\n        _LogoutButton(),\n      ],\n    );\n  }\n}\n\nclass _SettingsHeader extends StatelessWidget {\n  const\
    \ _SettingsHeader(); // const — no key param to keep it const-eligible\n\n  @override\n  Widget build(BuildContext context)\
    \ {\n    return const Padding(\n      padding: EdgeInsets.all(16), // const EdgeInsets\n      child: Text(\n        'Settings',\n\
    \        style: TextStyle(fontSize: 24, fontWeight: FontWeight.bold),\n      ),\n    );\n  }\n}\n"
  example_bad: "// No const anywhere — rebuilds entire tree on every setState\nclass SettingsScreen extends StatelessWidget\
    \ {\n  @override\n  Widget build(BuildContext context) {\n    return Column(         // not const — children array recreated\n\
    \      children: [\n        Padding(           // not const — recreated every build\n          padding: EdgeInsets.all(16),\
    \ // new EdgeInsets object every build\n          child: Text(\n            'Settings',\n            style: TextStyle(fontSize:\
    \ 24), // new TextStyle every build\n          ),\n        ),\n        SizedBox(height: 16), // not const — new object\
    \ every build\n        Icon(Icons.settings), // not const\n        Divider(),            // not const\n      ],\n    );\n\
    \  }\n}\n"
  when_applies: Projects using Flutter cross-platform apps or Dart/Flutter applications
  when_not_applies: web-only applications, backend services, desktop applications. projects not using Flutter or Dart
  sources: ["https://docs.flutter.dev/data-and-backend/networking"]
- id: CR-FL-007
  text: Use RepaintBoundary to isolate expensive paint operations and ListView.builder for lazy list construction
  why: 'Flutter''s rendering pipeline has three phases: layout, paint, and composite. Paint is the most expensive for complex
    widgets (shadows, gradients, clip paths, images). Without RepaintBoundary, repainting a small animated icon repaints the
    entire parent subtree. RepaintBoundary creates a separate compositing layer so only the bounded area repaints. For lists,
    ListView() (without .builder) instantiates ALL children upfront. ListView.builder lazily builds only visible items plus
    a buffer, reducing memory from O(n) to O(visible). A 10,000-item list with ListView uses 10,000 widget objects; ListView.builder
    uses ~20.

    '
  how_to_do_right: '1. Wrap animations, progress indicators, and timers in RepaintBoundary

    2. Wrap custom painters (CustomPaint) in RepaintBoundary

    3. Use ListView.builder (not ListView) for any list >20 items

    4. Use SliverList.builder in CustomScrollView for complex scroll layouts

    5. Set cacheExtent on scrollable for preloading (default 250px)

    6. Profile with Flutter DevTools "Highlight Repaints" overlay

    '
  severity: high
  technologies:
    lang: [dart]
    framework: [mobile, flutter]
  domains:
    domain: [architecture, mobile, performance]
  example_good: "class DashboardScreen extends StatelessWidget {\n  const DashboardScreen({super.key, required this.items});\n\
    \  final List<DashboardItem> items;\n\n  @override\n  Widget build(BuildContext context) {\n    return Column(\n     \
    \ children: [\n        // RepaintBoundary: animation repaints only this subtree\n        const RepaintBoundary(\n    \
    \      child: AnimatedPulseIndicator(), // repaints 60fps\n        ),\n        const SizedBox(height: 16),\n        Expanded(\n\
    \          // ListView.builder: only visible items are built\n          child: ListView.builder(\n            itemCount:\
    \ items.length,\n            cacheExtent: 500, // pre-build 500px above/below viewport\n            itemBuilder: (context,\
    \ index) {\n              return DashboardCard(\n                key: ValueKey(items[index].id),\n                item:\
    \ items[index],\n              );\n            },\n          ),\n        ),\n      ],\n    );\n  }\n}\n\n// Complex scroll\
    \ layout with Slivers\nCustomScrollView(\n  slivers: [\n    const SliverAppBar(title: Text('Feed'), floating: true),\n\
    \    SliverList.builder(\n      itemCount: posts.length,\n      itemBuilder: (context, index) => PostCard(post: posts[index]),\n\
    \    ),\n  ],\n)\n"
  example_bad: "class DashboardScreen extends StatelessWidget {\n  @override\n  Widget build(BuildContext context) {\n   \
    \ return Column(\n      children: [\n        // No RepaintBoundary — animation repaints entire Column\n        AnimatedPulseIndicator(),\n\
    \        // ListView without .builder — ALL 10,000 items built at once\n        Expanded(\n          child: ListView(\n\
    \            children: items.map((item) => DashboardCard(item: item)).toList(),\n            // 10,000 DashboardCard widgets\
    \ in memory simultaneously\n            // Initial build takes 2+ seconds on mid-range devices\n          ),\n       \
    \ ),\n      ],\n    );\n  }\n}\n"
  when_applies: Projects using Flutter cross-platform apps or Dart/Flutter applications
  when_not_applies: web-only applications, backend services, desktop applications. projects not using Flutter or Dart
  sources: ["https://docs.flutter.dev/perf/rendering-performance"]
- id: CR-FL-008
  text: Use Isolates for heavy computation to keep the UI thread at 60fps
  why: 'Flutter runs UI on a single thread (the main isolate). Any computation taking >16ms blocks the UI thread, causing
    frame drops. Dart Isolates run on separate OS threads with their own memory heap, enabling true parallelism. JSON parsing
    of large payloads (>100KB), image processing, encryption, database queries, and sorting/filtering large datasets must
    all run in isolates. The compute() function is a convenience wrapper for one-shot isolate tasks. Without isolates, apps
    stutter visibly during data processing, leading users to perceive the app as "laggy" even though the logic is correct.

    '
  how_to_do_right: '1. Use compute() for one-shot heavy work (JSON parse, image resize)

    2. Use Isolate.spawn for long-running background work (file processing)

    3. Data passed to isolates must be serializable (no closures, no UI objects)

    4. Use SendPort/ReceivePort for two-way communication with long-lived isolates

    5. Consider flutter_isolate package for isolates that need Flutter bindings

    6. Profile with DevTools Timeline to find >16ms frame blockers

    '
  severity: high
  technologies:
    lang: [dart]
    framework: [mobile, flutter]
  domains:
    domain: [architecture, mobile, performance]
  example_good: "import 'dart:convert';\nimport 'dart:isolate';\nimport 'package:flutter/foundation.dart';\n\n// compute()\
    \ for one-shot JSON parsing\nFuture<List<Product>> parseProducts(String jsonString) async {\n  return compute(_parseProductsIsolate,\
    \ jsonString);\n}\n\n// Top-level function (required for compute)\nList<Product> _parseProductsIsolate(String jsonString)\
    \ {\n  final List<dynamic> data = json.decode(jsonString);\n  return data.map((e) => Product.fromJson(e)).toList();\n\
    }\n\n// Long-running isolate for image processing\nclass ImageProcessor {\n  late final Isolate _isolate;\n  late final\
    \ SendPort _sendPort;\n\n  Future<void> start() async {\n    final receivePort = ReceivePort();\n    _isolate = await\
    \ Isolate.spawn(\n      _processLoop,\n      receivePort.sendPort,\n    );\n    _sendPort = await receivePort.first;\n\
    \  }\n\n  Future<Uint8List> resize(Uint8List image, int width) async {\n    final response = ReceivePort();\n    _sendPort.send([image,\
    \ width, response.sendPort]);\n    return await response.first as Uint8List;\n  }\n\n  void dispose() => _isolate.kill();\n\
    }\n\nstatic void _processLoop(SendPort mainPort) {\n  final port = ReceivePort();\n  mainPort.send(port.sendPort);\n \
    \ port.listen((message) {\n    final [Uint8List image, int width, SendPort reply] = message;\n    final result = _resizeImage(image,\
    \ width); // CPU-intensive\n    reply.send(result);\n  });\n}\n"
  example_bad: "// Parsing 5MB JSON on main thread — UI freezes for 500ms+\nFuture<void> loadProducts() async {\n  final response\
    \ = await http.get(Uri.parse(url));\n  // This blocks the UI thread for 200-500ms on large payloads\n  final List<dynamic>\
    \ data = json.decode(response.body);\n  final products = data.map((e) => Product.fromJson(e)).toList();\n  setState(()\
    \ => _products = products);\n  // User sees frozen UI, taps unresponsive buttons\n}\n\n// Image manipulation on main thread\
    \ — dropped frames\nFuture<void> processImage(File file) async {\n  final bytes = await file.readAsBytes(); // IO is async,\
    \ OK\n  final resized = resizeSync(bytes, 800); // CPU-bound, blocks UI thread\n  setState(() => _image = resized);\n\
    }\n"
