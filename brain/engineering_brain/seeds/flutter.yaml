  when_not_applies: web-only applications, backend services, desktop applications. projects not using Flutter or Dart
  sources: ["https://docs.flutter.dev/data-and-backend/serialization/json"]
- id: CR-FL-014
  text: Cache network images with CachedNetworkImage and use DevTools Performance overlay to find rendering bottlenecks
  why: 'Image.network() re-downloads images every time the widget rebuilds and provides no disk caching. In a social feed
    with 50 posts, scrolling back and forth re-downloads all images, consuming bandwidth and battery. CachedNetworkImage caches
    to disk (1GB default) and memory, supports placeholder/error widgets, and handles progressive loading. Without profiling
    via DevTools, teams guess at performance problems. The Performance overlay shows exactly which frames are slow (>16ms)
    and whether the bottleneck is in the raster thread (GPU) or UI thread (CPU).

    '
  how_to_do_right: '1. Use CachedNetworkImage for ALL network images

    2. Set maxHeight/maxWidth to avoid decoding full-resolution images

    3. Use placeholder for shimmer/skeleton loading states

    4. Use errorWidget for broken image fallback

    5. Configure cache manager per category (avatars: 7 days, feed: 1 day)

    6. Use DevTools Performance overlay in debug mode for every screen

    '
  severity: medium
  technologies:
    lang: [dart]
    framework: [mobile, flutter]
  domains:
    domain: [architecture, mobile, performance]
  example_good: "import 'package:cached_network_image/cached_network_image.dart';\nimport 'package:flutter_cache_manager/flutter_cache_manager.dart';\n\
    \n// Custom cache manager for different image types\nclass AvatarCacheManager extends CacheManager {\n  static const key\
    \ = 'avatarCache';\n  static AvatarCacheManager? _instance;\n\n  factory AvatarCacheManager() {\n    _instance ??= AvatarCacheManager._(Config(\n\
    \      key,\n      stalePeriod: const Duration(days: 7),\n      maxNrOfCacheObjects: 200,\n    ));\n    return _instance!;\n\
    \  }\n  AvatarCacheManager._(super.config);\n}\n\nclass UserAvatar extends StatelessWidget {\n  const UserAvatar({super.key,\
    \ required this.url, this.size = 48});\n  final String url;\n  final double size;\n\n  @override\n  Widget build(BuildContext\
    \ context) {\n    return ClipOval(\n      child: CachedNetworkImage(\n        imageUrl: url,\n        cacheManager: AvatarCacheManager(),\n\
    \        width: size,\n        height: size,\n        fit: BoxFit.cover,\n        memCacheWidth: (size * MediaQuery.devicePixelRatioOf(context)).toInt(),\n\
    \        placeholder: (_, __) => const ShimmerCircle(),\n        errorWidget: (_, __, ___) => const Icon(Icons.person),\n\
    \      ),\n    );\n  }\n}\n"
  example_bad: "// Image.network — re-downloads every rebuild, no cache\nclass UserAvatar extends StatelessWidget {\n  @override\n\
    \  Widget build(BuildContext context) {\n    return ClipOval(\n      child: Image.network(\n        url,\n        width:\
    \ 48,\n        height: 48,\n        fit: BoxFit.cover,\n        // Downloads full 2000x2000 image for a 48px avatar\n\
    \        // No placeholder — blank space during load\n        // No error widget — crashes on 404\n        // No disk\
    \ cache — re-downloads on every scroll\n      ),\n    );\n  }\n}\n"
