  when_not_applies: web-only applications, backend services, desktop applications. projects not using Flutter or Dart
  sources: ["https://docs.flutter.dev/deployment/flavors"]
- id: CR-FL-011
  text: Use widget tests as the primary testing strategy — they are fast, reliable, and test real rendering
  why: 'Flutter widget tests run a real rendering pipeline in a test environment (~100ms per test vs ~10s for integration
    tests). They verify layout, gestures, animations, and state transitions without a device or emulator. Unit tests miss
    rendering bugs (overflow, missing widgets). Integration tests are slow and flaky. Widget tests hit the sweet spot: they
    catch real rendering issues at unit test speed. Teams that rely only on unit tests ship overflow errors, missing error
    states, and broken gestures. Teams that rely only on integration tests have 30-minute CI pipelines.

    '
  how_to_do_right: '1. Widget tests for ALL user-facing components (80% of test suite)

    2. Unit tests for pure business logic (models, utils, algorithms)

    3. Integration tests for critical E2E flows only (login, payment)

    4. Use pumpWidget + pumpAndSettle for animations

    5. Find widgets by type, text, or semantics — never by key alone

    6. Use mockito/mocktail for dependency injection in widget tests

    '
  severity: high
  technologies:
    lang: [dart]
    framework: [mobile, flutter]
  domains:
    domain: [architecture, mobile, testing]
  example_good: "// Widget test — verifies rendering, interaction, and state\nimport 'package:flutter_test/flutter_test.dart';\n\
    import 'package:mocktail/mocktail.dart';\n\nclass MockCartRepository extends Mock implements CartRepository {}\n\nvoid\
    \ main() {\n  late MockCartRepository mockRepo;\n\n  setUp(() {\n    mockRepo = MockCartRepository();\n  });\n\n  testWidgets('ProductCard\
    \ shows price and handles add to cart',\n      (tester) async {\n    when(() => mockRepo.addItem(any())).thenAnswer((_)\
    \ async => true);\n\n    await tester.pumpWidget(\n      ProviderScope(\n        overrides: [\n          cartRepositoryProvider.overrideWithValue(mockRepo),\n\
    \        ],\n        child: const MaterialApp(\n          home: Scaffold(\n            body: ProductCard(\n          \
    \    product: Product(id: '1', name: 'Widget', price: 9.99),\n            ),\n          ),\n        ),\n      ),\n   \
    \ );\n\n    // Verify rendering\n    expect(find.text('Widget'), findsOneWidget);\n    expect(find.text('\\$9.99'), findsOneWidget);\n\
    \n    // Verify interaction\n    await tester.tap(find.text('Add to Cart'));\n    await tester.pumpAndSettle();\n\n  \
    \  verify(() => mockRepo.addItem('1')).called(1);\n\n    // Verify success feedback\n    expect(find.text('Added!'), findsOneWidget);\n\
    \  });\n\n  testWidgets('shows error state on add failure', (tester) async {\n    when(() => mockRepo.addItem(any())).thenThrow(Exception('Network\
    \ error'));\n\n    await tester.pumpWidget(/* same setup */);\n    await tester.tap(find.text('Add to Cart'));\n    await\
    \ tester.pumpAndSettle();\n\n    expect(find.text('Failed to add item'), findsOneWidget);\n  });\n}\n"
  example_bad: "// Only snapshot/golden tests — catches nothing about behavior\ntestWidgets('renders', (tester) async {\n\
    \  await tester.pumpWidget(MaterialApp(home: ProductCard(product: mock)));\n  // No assertions about content, interaction,\
    \ or state\n  expect(find.byType(ProductCard), findsOneWidget); // always passes\n});\n\n// Unit test for what should\
    \ be a widget test\ntest('cart state updates', () {\n  final cubit = CartCubit();\n  cubit.addItem('1');\n  expect(cubit.state.items,\
    \ hasLength(1));\n  // Misses: does the button show? does the count badge update?\n  // Does the animation play? Does\
    \ the error state render?\n});\n"
