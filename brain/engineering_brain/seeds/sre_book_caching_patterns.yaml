layer: rules
technology: SRE
domain: caching
knowledge:
- id: CR-SRE-CACHE-001
  text: Cache invalidation strategy must be chosen before the cache is built — write-through, write-behind, or TTL-based expiration.
    Each has different consistency, performance, and complexity tradeoffs. There is no "just add a cache" — every cache introduces
    a consistency problem.
  why: 'Google''s caching practices (derived from Chapters 20-22 on load management and cascading failures) treat cache consistency
    as a first-class design concern. Write-through: every write updates both the database and the cache atomically — strong
    consistency but write latency increases. Write-behind (write-back): writes update the cache, which asynchronously flushes
    to the database — fast writes but data loss risk if cache crashes before flush. TTL-based: data is cached for a fixed
    duration and refreshes on expiry — simple but serves stale data for up to TTL duration. The worst pattern: no strategy
    at all — data is cached indefinitely, invalidated ad-hoc when someone notices it''s stale, and bugs appear as "the data
    is wrong sometimes."

    '
  how_to_do_right: '1. Choose a strategy BEFORE building the cache: write-through for consistency-critical data, TTL-based
    for read-heavy data that tolerates staleness.

    2. Write-through: update DB, then update cache, in the same transaction boundary. If cache update fails, invalidate the
    cache key.

    3. TTL-based: set TTL based on data change frequency. User profiles (1 hour), product prices (5 minutes), real-time data
    (30 seconds).

    4. Use cache-aside (lazy loading): read from cache, on miss → read from DB → write to cache. Most common and simplest
    pattern.

    5. NEVER update the cache without updating the database. The database is the source of truth, the cache is a performance
    optimization.

    6. Monitor cache consistency: periodically sample cached values and compare with database. Any mismatch indicates a cache
    invalidation bug.

    '
  example_good: "import redis\nimport json\nfrom typing import Optional\n\nclass CacheAsideWithWriteThrough:\n    def __init__(self, db, cache: redis.Redis):\n        self.db = db\n        self.cache = cache\n\n    def get_product(self, product_id: str) -> dict:\n        \"\"\"Cache-aside: read from cache, on miss → DB → cache.\"\"\"\n        cached = self.cache.get(f'product:{product_id}')\n        if cached:\n            return json.loads(cached)\n        product = self.db.query('SELECT * FROM products WHERE id = %s', (product_id,))\n        if product:\n            self.cache.setex(f'product:{product_id}', 300, json.dumps(product))  # TTL: 5 min\n        return product\n\n    def update_product(self, product_id: str, data: dict):\n        \"\"\"Write-through: update DB first, then invalidate cache.\"\"\"\n        self.db.execute('UPDATE products SET data = %s WHERE id = %s', (json.dumps(data), product_id))\n        self.cache.delete(f'product:{product_id}')  # Invalidate, don't update\n        # Next read will repopulate from DB (cache-aside)\n\n    def monitor_consistency(self):\n        \"\"\"Periodic check: sample cached values vs DB.\"\"\"\n        for key in self.cache.scan_iter('product:*', count=100):\n            product_id = key.decode().split(':')[1]\n            cached = json.loads(self.cache.get(key))\n            db_val = self.db.query('SELECT * FROM products WHERE id = %s', (product_id,))\n            if cached != db_val:\n                self.alert(f'Cache inconsistency for product {product_id}')\n"
  example_bad: "class NaiveCache:\n    def get_product(self, product_id):\n        cached = cache.get(f'product:{product_id}')\n        if cached:\n            return json.loads(cached)\n        product = db.query('SELECT * FROM products WHERE id = %s', (product_id,))\n        cache.set(f'product:{product_id}', json.dumps(product))  # No TTL! Cached forever.\n        return product\n\n    def update_product(self, product_id, data):\n        # Updates DB but forgets to invalidate cache\n        db.execute('UPDATE products SET data = %s WHERE id = %s', (json.dumps(data), product_id))\n        # Cache still serves old data indefinitely\n        # No consistency monitoring — stale data served silently\n"
  when_applies: "When adding a cache to any data path — choose an invalidation strategy (write-through, TTL, cache-aside) before building the cache."
  severity: high
  technologies:
    lang: [general]
    platform: [redis]
  domains:
    domain: [architecture, performance, reliability]
    concern: [caching, data_integrity, consistency]
  sources:
  - url: https://sre.google/sre-book/addressing-cascading-failures/
    title: 'Google SRE Book — Chapter 22: Addressing Cascading Failures'
  validation_status: cross_checked
- id: CR-SRE-CACHE-002
  text: Cache stampede (thundering herd on cache expiry) can take down your database — when a popular cache key expires, hundreds
    of concurrent requests all miss the cache simultaneously and hit the database, causing a load spike that can cascade into
    an outage.
  why: 'Google''s cascading failures chapter (Chapter 22) identifies cache stampede as a common trigger for cascading failures.
    Scenario: a cache key holding popular data (e.g., front page content) expires. 500 concurrent requests arrive within 100ms.
    All 500 miss the cache. All 500 query the database. The database, sized for 50 QPS (because the cache handles the other
    450), receives 500 queries simultaneously. The database becomes overloaded. Queries slow down. The cache remains empty
    (queries haven''t returned yet). More requests arrive and also miss the cache. The database falls further behind. Eventually
    the database becomes unresponsive, and the cascading failure propagates upstream.

    '
  how_to_do_right: '1. Cache locking (single-flight): when a cache miss occurs, only ONE request queries the database. Other
    requests wait for the first request to populate the cache.

    2. Probabilistic early expiration: refresh the cache BEFORE it expires. Each access has a random chance of triggering
    a background refresh when the TTL is within 10% of expiry.

    3. Background refresh: a separate process refreshes popular keys before they expire. The cache never actually expires
    for hot keys.

    4. Stale-while-revalidate: return the stale cached value immediately while refreshing in the background. The user sees
    slightly stale data but no latency spike.

    5. Rate-limit database queries on cache miss: even with stampede protection, cap the number of concurrent cache-miss queries
    to the database.

    6. Monitor cache hit rate and database QPS together: a sudden drop in cache hit rate correlates with a spike in database
    QPS — this is the stampede signal.

    '
  example_good: "import threading\nimport time\nimport random\n\nclass StampedeProtectedCache:\n    def __init__(self, cache, db):\n        self.cache = cache\n        self.db = db\n        self._locks = {}  # Per-key locks for single-flight\n\n    def get(self, key: str) -> dict:\n        \"\"\"Single-flight cache miss: only one request queries DB.\"\"\"\n        cached = self.cache.get(key)\n        if cached:\n            # Probabilistic early refresh: 10% chance when TTL < 10% remaining\n            ttl = self.cache.ttl(key)\n            if ttl < 30 and random.random() < 0.1:  # Last 30s of 300s TTL\n                threading.Thread(target=self._refresh, args=(key,), daemon=True).start()\n            return cached\n\n        # Cache miss: only one request goes to DB\n        lock = self._locks.setdefault(key, threading.Lock())\n        if lock.acquire(timeout=5):\n            try:\n                # Double-check: another thread may have populated while we waited\n                cached = self.cache.get(key)\n                if cached:\n                    return cached\n                return self._refresh(key)\n            finally:\n                lock.release()\n        else:\n            # Lock timeout: return stale data if available\n            stale = self.cache.get(f'stale:{key}')\n            return stale if stale else None\n\n    def _refresh(self, key: str) -> dict:\n        value = self.db.query(key)\n        self.cache.setex(key, 300, value)\n        self.cache.setex(f'stale:{key}', 600, value)  # Stale copy for fallback\n        return value\n"
  example_bad: "class NaiveCache:\n    def get(self, key):\n        cached = self.cache.get(key)\n        if cached:\n            return cached\n        # 500 concurrent requests all miss the cache simultaneously\n        # All 500 query the database\n        value = self.db.query(key)  # DB receives 500x normal load\n        self.cache.set(key, value, ttl=300)\n        return value\n        # DB overloaded → queries slow → cache stays empty → more misses\n        # Cascading failure from a single cache expiry\n"
  when_applies: "When a popular cache key can expire while many concurrent requests need it — implement single-flight, probabilistic refresh, or stale-while-revalidate."
  severity: high
  technologies:
    lang: [general]
    platform: [redis]
  domains:
    domain: [performance, reliability]
    concern: [caching, fault_tolerance, circuit_breaker]
  sources:
  - url: https://sre.google/sre-book/addressing-cascading-failures/
    title: 'Google SRE Book — Chapter 22: Addressing Cascading Failures'
