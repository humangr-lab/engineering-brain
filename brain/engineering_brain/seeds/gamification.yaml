layer: rules
domain: gamification
knowledge:
- id: GAM-001
  text: "Octalysis framework models gamification through 8 Core Drives: Epic Meaning, Accomplishment, Empowerment, Ownership, Social Influence, Scarcity, Unpredictability, and Avoidance. Every gamification feature must map to at least one Core Drive to be effective."
  why: >
    Without mapping features to Core Drives, teams build shallow gamification (badges and points only)
    that relies solely on Core Drive 2 (Accomplishment). Duolingo's 2023 retention crisis showed that
    streak-only mechanics (CD6 Scarcity + CD8 Avoidance) without balancing CD3 Empowerment caused
    a 15% churn spike when users lost long streaks and felt punished rather than motivated.
  how_to_do_right: |
    1. Audit every gamification feature against all 8 Core Drives
    2. Ensure at least 3 different Core Drives are active in any user session
    3. Balance White Hat drives (CD1 Epic Meaning, CD2 Accomplishment, CD3 Empowerment) for long-term motivation
    4. Use Black Hat drives (CD6 Scarcity, CD7 Unpredictability, CD8 Avoidance) sparingly for urgency
    5. Score each feature 0-10 on each Core Drive axis; aim for total Octalysis score >= 200
    6. Re-audit quarterly as features evolve
  severity: high
  technologies:
    lang: [python, javascript]
    framework: [fastapi, react]
  domains:
    domain: [gamification, architecture]
    concern: [domain_specific, decision_making]
  example_good: |
    CORE_DRIVES = {
        "epic_meaning": 1, "accomplishment": 2, "empowerment": 3,
        "ownership": 4, "social_influence": 5, "scarcity": 6,
        "unpredictability": 7, "avoidance": 8,
    }

    class GamificationFeature:
        def __init__(self, name: str, drives: dict[str, int]):
            self.name = name
            self.drives = drives  # Core Drive -> score (0-10)
            active = [d for d, s in drives.items() if s > 0]
            if len(active) < 2:
                raise ValueError(f"Feature '{name}' activates only {len(active)} drives; need >= 2")
            total = sum(drives.values())
            if total < 20:
                raise ValueError(f"Octalysis score {total} too low; aim >= 20 per feature")

    # Prediction accuracy badge: Accomplishment + Social + Ownership
    badge = GamificationFeature("accuracy_badge", {
        "accomplishment": 8, "social_influence": 6, "ownership": 4,
    })
  example_bad: |
    # WRONG: No Core Drive mapping — just points with no psychological model
    class NaiveGamification:
        def award_points(self, user_id, amount):
            self.db.execute("UPDATE users SET points = points + ? WHERE id = ?", (amount, user_id))
            # No mapping to motivation drivers, no balance check, no retention analysis
  when_applies: Designing any gamification system, adding engagement features to Forekast prediction markets
  sources: ["https://yukaichou.com/gamification-examples/octalysis-gamification-framework/"]

- id: GAM-002
  text: "Achievement tiers and progression systems must follow a power curve where each tier requires 2-3x the effort of the previous tier, with distinct visual and functional rewards at each boundary to sustain motivation."
  why: >
    Linear progression (each level costs the same XP) causes boredom after level 5-10 because the
    challenge feels static. Exponential progression that is too steep (4x+ per tier) causes 80%+
    dropout at mid-tiers. Stack Overflow's badge system saw a 40% increase in sustained contributions
    when they introduced tiered badges (bronze/silver/gold) with roughly 3x effort multipliers,
    compared to their original flat badge system.
  how_to_do_right: |
    1. Define 5-7 tiers (e.g., Novice, Apprentice, Journeyman, Expert, Master, Grandmaster, Legend)
    2. Set base XP for tier 1 (e.g., 100 XP), multiply by 2-3x per tier
    3. Provide unique visual rewards at each tier boundary (badge color, profile border, title)
    4. Unlock functional rewards at key tiers (e.g., tier 3 unlocks market creation, tier 5 unlocks moderation)
    5. Display progress bar showing percentage to next tier (never hide progress)
    6. Add "prestige" or "season" resets for players who reach max tier
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [gamification, ui]
    concern: [domain_specific]
  example_good: |
    from dataclasses import dataclass
    from enum import IntEnum

    class Tier(IntEnum):
        NOVICE = 1
        APPRENTICE = 2
        JOURNEYMAN = 3
        EXPERT = 4
        MASTER = 5
        GRANDMASTER = 6

    TIER_XP_THRESHOLDS = {
        Tier.NOVICE: 0,
        Tier.APPRENTICE: 100,
        Tier.JOURNEYMAN: 300,    # 3x
        Tier.EXPERT: 750,         # 2.5x
        Tier.MASTER: 1800,        # 2.4x
        Tier.GRANDMASTER: 4500,   # 2.5x
    }

    def get_tier(xp: int) -> Tier:
        current = Tier.NOVICE
        for tier, threshold in TIER_XP_THRESHOLDS.items():
            if xp >= threshold:
                current = tier
        return current

    def progress_to_next(xp: int) -> float:
        """Returns 0.0-1.0 progress toward next tier."""
        current = get_tier(xp)
        if current == Tier.GRANDMASTER:
            return 1.0
        next_tier = Tier(current + 1)
        current_threshold = TIER_XP_THRESHOLDS[current]
        next_threshold = TIER_XP_THRESHOLDS[next_tier]
        return (xp - current_threshold) / (next_threshold - current_threshold)
  example_bad: |
    # WRONG: Linear progression — every level costs 100 XP, no escalation
    def get_level(xp: int) -> int:
        return xp // 100  # Level 1 = 100 XP, Level 50 = 5000 XP — feels trivial at high levels
  when_applies: Designing user progression, XP systems, tier unlocks in Forekast
  sources: ["https://yukaichou.com/gamification-examples/octalysis-gamification-framework/"]

- id: GAM-003
  text: "ELO/Glicko-2 rating systems for prediction accuracy must use K-factor decay (high K for new users, low K for established ones), a rating period of 15-30 resolved markets, and rating deviation (RD) to express confidence in the rating."
  why: >
    Using a fixed K-factor (e.g., K=32 always) causes two problems: new users take 50+ markets to
    reach their true rating (too slow), and established users see wild swings from single bad
    predictions (too volatile). Chess.com saw a 25% improvement in rating accuracy after switching
    from fixed-K ELO to Glicko-2 with adaptive K. For prediction markets, RD (rating deviation)
    is critical because a user with 10 predictions and 1500 rating is very different from a user
    with 500 predictions and 1500 rating.
  how_to_do_right: |
    1. Use Glicko-2 over plain ELO (accounts for rating deviation and volatility)
    2. Set initial rating to 1500, initial RD to 350, initial volatility to 0.06
    3. K-factor equivalent: K=40 for first 30 markets, K=20 for 30-100, K=10 for 100+
    4. Rating period = 15 resolved markets (batch update, not per-market)
    5. Display rating with confidence: "1650 +/- 120" (rating +/- 2*RD)
    6. Decay RD upward if user is inactive >30 days (increases uncertainty)
    7. Never let RD drop below 30 (always some uncertainty)
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [gamification, prediction_markets]
    concern: [domain_specific]
  example_good: |
    import math
    from dataclasses import dataclass, field

    @dataclass
    class PlayerRating:
        rating: float = 1500.0
        rd: float = 350.0         # Rating deviation
        volatility: float = 0.06
        markets_resolved: int = 0

        @property
        def display(self) -> str:
            confidence = round(2 * self.rd)
            return f"{round(self.rating)} +/- {confidence}"

        @property
        def k_factor(self) -> float:
            if self.markets_resolved < 30:
                return 40.0
            elif self.markets_resolved < 100:
                return 20.0
            return 10.0

        def decay_if_inactive(self, days_inactive: int) -> None:
            """Increase RD if user hasn't been active."""
            if days_inactive > 30:
                periods = days_inactive / 30
                self.rd = min(350.0, math.sqrt(self.rd**2 + periods * self.volatility**2 * 100))
  example_bad: |
    # WRONG: Fixed K-factor ELO with no deviation tracking
    def update_elo(rating: float, outcome: float, expected: float) -> float:
        return rating + 32 * (outcome - expected)  # K=32 always, no RD, no volatility
  when_applies: Building prediction accuracy leaderboards, ranking forecasters, matchmaking in tournaments
  sources: ["https://www.glicko.net/glicko/glicko2.pdf"]

- id: GAM-004
  text: "Brier score (mean of (forecast - outcome)^2) is the standard calibration metric for prediction markets. Score ranges from 0 (perfect) to 1 (worst). Always decompose into calibration + resolution + uncertainty components for actionable feedback."
  why: >
    Using raw accuracy (% correct) for binary predictions is misleading: a forecaster who says 90%
    for everything scores 90% accuracy in a world where 90% of things happen, but their Brier score
    of 0.09 reveals poor calibration. Metaculus and Good Judgment Project both use Brier scores as
    primary metrics. Without decomposition, users know they are poorly calibrated but not whether
    the problem is discrimination (telling events apart) or calibration (matching probabilities).
  how_to_do_right: |
    1. Compute Brier score: BS = (1/N) * sum((forecast_i - outcome_i)^2) for each resolved market
    2. Outcome is 0 or 1 (binary); forecast is the user's probability estimate (0.0 to 1.0)
    3. Decompose: BS = Reliability - Resolution + Uncertainty
    4. Reliability (calibration): group forecasts into 10 bins (0-10%, 10-20%, ...), measure deviation
    5. Resolution (discrimination): how much forecasts differ from base rate
    6. Uncertainty: base rate * (1 - base rate), constant for a given dataset
    7. Display all 3 components to users; suggest "try to be more extreme" if resolution is low
    8. Benchmark: uninformed forecaster (always 50%) gets BS = 0.25; good forecasters get < 0.15
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [gamification, prediction_markets]
    concern: [domain_specific]
  example_good: |
    import numpy as np
    from dataclasses import dataclass

    @dataclass
    class BrierDecomposition:
        brier_score: float
        reliability: float    # Lower is better (calibration error)
        resolution: float     # Higher is better (discrimination)
        uncertainty: float    # Constant for dataset

    def compute_brier(forecasts: list[float], outcomes: list[int]) -> BrierDecomposition:
        f = np.array(forecasts)
        o = np.array(outcomes)
        bs = float(np.mean((f - o) ** 2))

        # Decomposition: bin into 10 calibration buckets
        base_rate = np.mean(o)
        uncertainty = float(base_rate * (1 - base_rate))
        bins = np.digitize(f, np.linspace(0, 1, 11))
        reliability = 0.0
        resolution = 0.0
        for b in range(1, 12):
            mask = bins == b
            if mask.sum() == 0:
                continue
            n_k = mask.sum()
            f_k = f[mask].mean()
            o_k = o[mask].mean()
            reliability += n_k * (f_k - o_k) ** 2
            resolution += n_k * (o_k - base_rate) ** 2
        n = len(f)
        reliability /= n
        resolution /= n
        return BrierDecomposition(bs, reliability, resolution, uncertainty)
  example_bad: |
    # WRONG: Using accuracy instead of Brier score
    def forecaster_score(predictions, outcomes):
        correct = sum(1 for p, o in zip(predictions, outcomes) if (p > 0.5) == o)
        return correct / len(predictions)  # 90% accuracy means nothing about calibration
  when_applies: Scoring forecaster performance, building calibration dashboards, ranking prediction accuracy
  sources: ["https://www.nber.org/system/files/working_papers/w10504/w10504.pdf"]

- id: GAM-005
  text: "Tournament structures for prediction competitions must match the format to the goal: round-robin for comprehensive ranking, Swiss for efficient large-field ranking, elimination for excitement, and ladder for ongoing competition."
  why: >
    Using elimination tournaments for prediction accuracy ranking is statistically terrible: a single
    bad prediction in round 1 eliminates an otherwise excellent forecaster. Round-robin is optimal
    for ranking but O(n^2) in pairings. Swiss tournaments provide near-optimal ranking in O(n*log(n))
    rounds by pairing similarly-rated players. Kaggle competitions use leaderboard (ladder) format
    because predictions trickle in over weeks, which works for ongoing competition.
  how_to_do_right: |
    1. For ranking N forecasters in a season: Swiss system with ceil(log2(N)) rounds
    2. For daily/weekly competitions: ladder with rolling 30-day window
    3. For special events (<16 participants): round-robin with Brier score aggregation
    4. For entertainment/engagement: double-elimination bracket with consolation rounds
    5. Swiss pairing: match players with equal scores; use rating as first tiebreaker
    6. Minimum 5 rounds for Swiss to produce reliable rankings with 32+ participants
    7. Always publish tiebreaker rules before tournament starts
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [gamification, prediction_markets]
    concern: [domain_specific]
  example_good: |
    from enum import Enum
    from dataclasses import dataclass

    class TournamentFormat(Enum):
        ROUND_ROBIN = "round_robin"    # O(n^2) pairings, best for ranking
        SWISS = "swiss"                # O(n*log(n)), efficient ranking
        ELIMINATION = "elimination"    # Excitement, poor for ranking
        LADDER = "ladder"              # Ongoing, rolling window

    @dataclass
    class TournamentConfig:
        format: TournamentFormat
        max_participants: int
        rounds: int

        @classmethod
        def optimal_for_ranking(cls, n_participants: int) -> "TournamentConfig":
            import math
            if n_participants <= 16:
                return cls(TournamentFormat.ROUND_ROBIN, n_participants, n_participants - 1)
            rounds = max(5, math.ceil(math.log2(n_participants)))
            return cls(TournamentFormat.SWISS, n_participants, rounds)
  example_bad: |
    # WRONG: Single-elimination for ranking forecasters — statistically invalid
    def run_tournament(players):
        while len(players) > 1:
            winners = []
            for i in range(0, len(players), 2):
                winner = compare_single_prediction(players[i], players[i+1])
                winners.append(winner)  # One bad prediction = eliminated forever
            players = winners
  when_applies: Designing prediction tournaments, seasonal competitions, leaderboard systems in Forekast
  sources: ["https://yukaichou.com/gamification-examples/octalysis-gamification-framework/"]

- id: GAM-006
  text: "Anti-gaming protection must detect and penalize smurf accounts (experienced users creating new accounts for easy wins), sandbagging (intentionally losing to lower rating), and collusion (coordinated trading to manipulate outcomes)."
  why: >
    In prediction markets, gaming destroys market integrity and demotivates honest participants.
    Polymarket detected coordinated wash trading in 2023 where colluding accounts inflated market
    volume by $2M to earn liquidity mining rewards. On chess platforms, smurfing is so prevalent
    that Chess.com bans 50K+ accounts monthly. Without anti-gaming, top leaderboard positions get
    captured by multi-accounters, and legitimate users leave.
  how_to_do_right: |
    1. Smurf detection: flag accounts with suspiciously fast rating climb (>200 rating gain in first 10 markets)
    2. Device fingerprinting: track browser fingerprint + IP + behavioral biometrics across accounts
    3. Sandbagging detection: flag if Brier score variance is >3x the population mean (intentional swings)
    4. Collusion detection: build trade graph; flag account clusters with >80% correlated positions
    5. Implement progressive penalties: warning -> 7-day mute -> rating reset -> permanent ban
    6. Require phone verification for tournament participation
    7. Rate-limit account creation from same IP/device to 1 per 30 days
    8. Run anomaly detection batch job daily on trade patterns
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [gamification, security]
    concern: [domain_specific]
  example_good: |
    from dataclasses import dataclass
    from datetime import datetime, timedelta

    @dataclass
    class AntiGamingFlags:
        is_smurf_suspect: bool = False
        is_sandbagging_suspect: bool = False
        is_collusion_suspect: bool = False
        penalty_level: int = 0  # 0=clean, 1=warning, 2=mute, 3=reset, 4=ban

    def detect_smurf(user_id: str, rating_history: list[tuple[datetime, float]]) -> bool:
        """Flag if rating climbs >200 points in first 10 resolved markets."""
        if len(rating_history) < 10:
            return False
        initial = rating_history[0][1]
        at_10 = rating_history[9][1]
        return (at_10 - initial) > 200

    def detect_collusion(trade_graph: dict[str, list[str]], threshold: float = 0.80) -> list[set[str]]:
        """Find clusters of accounts with >80% correlated positions."""
        # Build correlation matrix from position overlap
        clusters = []
        # ... community detection algorithm (Louvain, label propagation)
        return clusters
  example_bad: |
    # WRONG: No anti-gaming — trust all accounts equally
    def register_user(email):
        user = User(email=email, rating=1500)
        db.save(user)  # No device fingerprint, no IP tracking, no smurf check
        return user
  when_applies: Any gamified prediction platform, leaderboards, tournaments, reward distribution
  sources: ["https://yukaichou.com/gamification-examples/octalysis-gamification-framework/"]

- id: GAM-007
  text: "Streak mechanics leverage loss aversion (Kahneman/Tversky) but must include streak insurance, grace periods, and freeze tokens to prevent user burnout and rage-quit when long streaks break."
  why: >
    Duolingo's streak mechanic is their single most important retention feature (reported in their 2023
    S-1 filing), but unprotected streaks cause rage-quits. Internal data showed users with 100+ day
    streaks who lost them had a 60% chance of churning permanently. Adding streak freezes (purchasable
    with in-app currency) reduced churn-after-break by 40%. In prediction markets, a "daily prediction
    streak" without protection punishes vacations and illness, which feels unfair.
  how_to_do_right: |
    1. Award streak bonuses that scale sub-linearly: day 1-7 = 1x XP, 8-30 = 1.5x, 31-100 = 2x, 100+ = 2.5x
    2. Provide 1 free streak freeze per week (user can skip 1 day without breaking streak)
    3. Allow purchasing additional freezes with in-app currency (max 2 per week)
    4. Grace period: if user misses by <2 hours past midnight, extend deadline once per month
    5. Streak repair: allow repairing a broken streak within 24 hours for a currency cost
    6. Never display "streak lost" as first screen — show it gently with recovery options
    7. Cap streak rewards to avoid making long-streak users feel trapped
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi, react]
  domains:
    domain: [gamification, ui]
    concern: [domain_specific]
  example_good: |
    from datetime import date, timedelta
    from dataclasses import dataclass

    @dataclass
    class StreakState:
        current_streak: int
        longest_streak: int
        freezes_available: int
        last_activity: date
        freeze_used_today: bool = False

        def check_streak(self, today: date) -> "StreakState":
            gap = (today - self.last_activity).days
            if gap <= 1:
                self.current_streak += 1
            elif gap == 2 and self.freezes_available > 0:
                self.freezes_available -= 1
                self.freeze_used_today = True
                self.current_streak += 1  # Freeze preserves streak
            else:
                self.current_streak = 1  # Reset, but don't show anger screen
            self.longest_streak = max(self.longest_streak, self.current_streak)
            self.last_activity = today
            return self

        @property
        def xp_multiplier(self) -> float:
            if self.current_streak <= 7:
                return 1.0
            elif self.current_streak <= 30:
                return 1.5
            elif self.current_streak <= 100:
                return 2.0
            return 2.5
  example_bad: |
    # WRONG: Unprotected streak — one miss destroys everything
    def update_streak(user, today):
        if (today - user.last_prediction).days > 1:
            user.streak = 0  # Brutal reset, no freeze, no grace period
            show_popup("YOU LOST YOUR 147-DAY STREAK!")  # Rage-quit trigger
  when_applies: Implementing daily engagement mechanics, streak systems, retention features
  sources: ["https://yukaichou.com/gamification-examples/octalysis-gamification-framework/"]

- id: GAM-008
  text: "Leaderboard design must include multiple scopes (global, friends, cohort) and time windows (daily, weekly, all-time) to prevent demotivation from unbeatable top players and provide achievable micro-goals."
  why: >
    A single global all-time leaderboard demotivates 95%+ of users who will never reach the top 100.
    Research by Landers & Landers (2014) showed that relative leaderboards (comparing to similar-skill
    peers) improved performance by 20% vs. absolute leaderboards. Weekly resets give new users a chance
    to appear on a leaderboard within their first week, which is critical for early retention — users
    who never appear on any leaderboard in week 1 have 3x higher churn.
  how_to_do_right: |
    1. Implement 3 scopes: Global (top 100), Friends (social graph), Cohort (joined same month)
    2. Implement 3 windows: Daily (resets at midnight UTC), Weekly (resets Monday), All-Time
    3. Show the user's position in all applicable leaderboards on their profile
    4. For cohort: group users by join month and show "Rank #X of Y in your class"
    5. Highlight position changes: green arrow up, red arrow down
    6. Show "X points to next rank" for positions outside top 10
    7. Never show exact rank if user is >1000th — show "Top 5%" instead
    8. Cache leaderboard computations with 5-minute TTL for global, 1-minute for friends
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi, react]
  domains:
    domain: [gamification, performance]
    concern: [domain_specific, caching]
  example_good: |
    from enum import Enum
    from redis import Redis

    class LeaderboardScope(Enum):
        GLOBAL = "global"
        FRIENDS = "friends"
        COHORT = "cohort"

    class LeaderboardWindow(Enum):
        DAILY = "daily"
        WEEKLY = "weekly"
        ALL_TIME = "all_time"

    class LeaderboardService:
        def __init__(self, redis: Redis):
            self.redis = redis

        def _key(self, scope: LeaderboardScope, window: LeaderboardWindow) -> str:
            return f"lb:{scope.value}:{window.value}"

        def update_score(self, user_id: str, score: float, scope: LeaderboardScope,
                         window: LeaderboardWindow) -> None:
            self.redis.zadd(self._key(scope, window), {user_id: score})

        def get_rank(self, user_id: str, scope: LeaderboardScope,
                     window: LeaderboardWindow) -> int | None:
            rank = self.redis.zrevrank(self._key(scope, window), user_id)
            return rank + 1 if rank is not None else None

        def get_display_rank(self, user_id: str, scope: LeaderboardScope,
                             window: LeaderboardWindow) -> str:
            rank = self.get_rank(user_id, scope, window)
            total = self.redis.zcard(self._key(scope, window))
            if rank is None:
                return "Unranked"
            if rank > 1000 and total > 0:
                percentile = round((1 - rank / total) * 100)
                return f"Top {percentile}%"
            return f"#{rank}"
  example_bad: |
    # WRONG: Single global all-time leaderboard — demotivates 95% of users
    def get_leaderboard():
        return db.query("SELECT * FROM users ORDER BY xp DESC LIMIT 100")
        # New users never appear; no friends/cohort; no time windows
  when_applies: Designing leaderboard systems, ranking displays, social comparison features
  sources: ["https://yukaichou.com/gamification-examples/octalysis-gamification-framework/"]

- id: GAM-009
  text: "Badge and achievement unlocking conditions must be specific, deterministic, and communicated upfront. Hidden badges are acceptable only as a small percentage (<20%) of total badges. Every badge must have a clear unlock condition that the user can work toward."
  why: >
    Vague unlock conditions ("be a great predictor") frustrate users because they cannot form a plan
    to earn the badge. Xbox Achievement research showed that achievements with clear conditions
    (e.g., "Win 10 games in a row") had 4x the completion rate of vague ones. However, 100% visible
    badges remove the joy of surprise discovery, so ~15-20% hidden badges provide Core Drive 7
    (Unpredictability) without making the system opaque.
  how_to_do_right: |
    1. Define every badge with: name, description, icon, unlock_condition (machine-readable), rarity
    2. Make 80%+ of badges visible with explicit conditions: "Resolve 50 markets with Brier < 0.15"
    3. Hidden badges (<20%) should have hint text: "Something special happens when you predict across 5 domains"
    4. Implement badge rarity tiers: Common (>50% earn), Rare (10-50%), Epic (1-10%), Legendary (<1%)
    5. Award badges immediately upon condition met — never batch or delay
    6. Send notification with celebration animation on badge unlock
    7. Store unlock conditions as code, not strings — enables automated verification
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [gamification, code_quality]
    concern: [domain_specific]
  example_good: |
    from dataclasses import dataclass
    from enum import Enum
    from typing import Callable

    class BadgeRarity(Enum):
        COMMON = "common"       # >50% of users earn
        RARE = "rare"           # 10-50%
        EPIC = "epic"           # 1-10%
        LEGENDARY = "legendary" # <1%

    @dataclass
    class BadgeDefinition:
        id: str
        name: str
        description: str
        rarity: BadgeRarity
        condition: Callable  # Machine-readable unlock condition
        hidden: bool = False
        hint: str | None = None  # For hidden badges

    def condition_sharp_shooter(user_stats: dict) -> bool:
        """Brier score < 0.10 over 100+ resolved markets."""
        return user_stats["markets_resolved"] >= 100 and user_stats["brier_score"] < 0.10

    BADGES = [
        BadgeDefinition(
            id="sharp_shooter", name="Sharp Shooter",
            description="Achieve Brier score < 0.10 over 100+ markets",
            rarity=BadgeRarity.EPIC, condition=condition_sharp_shooter,
        ),
    ]
  example_bad: |
    # WRONG: Badge with vague condition and no machine-readable check
    badges = [
        {"name": "Expert", "description": "Be really good at predicting"},  # How?
        {"name": "???", "description": "???", "hidden": True},  # No hint at all
    ]
  when_applies: Designing achievement systems, badge mechanics, user milestone tracking
  sources: ["https://yukaichou.com/gamification-examples/octalysis-gamification-framework/"]

- id: GAM-010
  text: "XP curves must match the engagement model: linear for steady grind games, logarithmic for fast-start retention, and S-curve (sigmoid) for skill-based systems where mid-game is the core experience."
  why: >
    Choosing the wrong XP curve destroys the pacing of the entire progression system. Linear curves
    make late-game trivial (level 50 feels same as level 5). Pure logarithmic curves make early
    progress feel great but mid-game stalls. Prediction markets need an S-curve because early levels
    should be fast (onboarding), mid-levels should be the main experience (where most predictions
    happen), and late-levels should feel prestigious. World of Warcraft's shift from linear to
    S-curve leveling in Cataclysm improved mid-game retention by 15%.
  how_to_do_right: |
    1. For prediction markets, use sigmoid (S-curve): xp_needed(level) = L / (1 + e^(-k*(level - mid)))
    2. Set parameters: L = max_xp_per_level (e.g., 5000), k = steepness (e.g., 0.15), mid = midpoint level
    3. First 5 levels: rapid (50-200 XP each) — onboarding and hook
    4. Levels 5-20: main experience (500-3000 XP each) — core gameplay
    5. Levels 20-30: prestige (3000-5000 XP each) — dedicated users only
    6. Playtest with 20+ users and measure median time-to-level at each tier
    7. Adjust k parameter until median time-to-mid-level is 2-3 weeks
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [gamification, architecture]
    concern: [domain_specific]
  example_good: |
    import math

    def sigmoid_xp_curve(level: int, max_xp: float = 5000.0,
                         steepness: float = 0.15, midpoint: int = 15) -> int:
        """S-curve: fast early, steep mid, plateau late."""
        raw = max_xp / (1.0 + math.exp(-steepness * (level - midpoint)))
        return max(50, round(raw))

    # Example output:
    # Level 1:   50 XP  (onboarding)
    # Level 5:  175 XP  (still fast)
    # Level 10: 756 XP  (ramping up)
    # Level 15: 2500 XP (core experience)
    # Level 20: 4244 XP (getting hard)
    # Level 25: 4825 XP (prestige)
  example_bad: |
    # WRONG: Linear XP curve — no pacing control
    def xp_for_level(level: int) -> int:
        return level * 100  # Level 1 = 100, Level 50 = 5000 — no onboarding hook, flat feeling
  when_applies: Designing XP progression, level-up systems, determining time-to-reward
  sources: ["https://yukaichou.com/gamification-examples/octalysis-gamification-framework/"]

- id: GAM-011
  text: "Daily challenge and quest systems must provide 3 difficulty tiers (easy/medium/hard) with diminishing daily returns to encourage consistent participation without enabling no-life grinding that alienates casual users."
  why: >
    Single-difficulty daily challenges either bore advanced users (too easy) or frustrate newcomers
    (too hard). Hearthstone's 3-tier daily quest system increased DAU by 18% compared to their
    original single-quest system. Diminishing returns (1st quest = 100 XP, 2nd = 75 XP, 3rd = 50 XP)
    prevent hardcore grinders from opening an insurmountable XP gap over casual players, which is
    critical for prediction market fairness where skill should be measured by accuracy, not volume.
  how_to_do_right: |
    1. Generate 3 daily quests: Easy (5 min, 100 XP), Medium (15 min, 200 XP), Hard (30 min, 400 XP)
    2. Apply diminishing returns: 1st completion = 100% XP, 2nd = 75%, 3rd = 50%, 4th+ = 25%
    3. Cap daily quest XP at 1000 to prevent grinding dominance
    4. Rotate quest types: prediction, research, social, accuracy, domain-specific
    5. Allow quest reroll once per day (re-engagement mechanic)
    6. Reset quests at midnight user-local-time (not UTC) to respect time zones
    7. Provide weekly quest that spans 3+ days for weekend-only users
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [gamification, prediction_markets]
    concern: [domain_specific]
  example_good: |
    from dataclasses import dataclass
    from enum import Enum
    import random

    class QuestDifficulty(Enum):
        EASY = ("easy", 100, 5)      # name, base_xp, est_minutes
        MEDIUM = ("medium", 200, 15)
        HARD = ("hard", 400, 30)

    DAILY_XP_CAP = 1000
    DIMINISHING = [1.0, 0.75, 0.50, 0.25]  # Per completion order

    @dataclass
    class DailyQuest:
        difficulty: QuestDifficulty
        description: str
        target: int

    def generate_daily_quests() -> list[DailyQuest]:
        return [
            DailyQuest(QuestDifficulty.EASY, "Make 3 predictions in any market", 3),
            DailyQuest(QuestDifficulty.MEDIUM, "Predict in 2 different domains", 2),
            DailyQuest(QuestDifficulty.HARD, "Achieve Brier < 0.20 on 5 resolved markets today", 5),
        ]

    def compute_quest_xp(completions_today: int, base_xp: int) -> int:
        idx = min(completions_today, len(DIMINISHING) - 1)
        return round(base_xp * DIMINISHING[idx])
  example_bad: |
    # WRONG: Unlimited daily XP with no cap or diminishing returns
    def complete_quest(user, xp):
        user.daily_xp += xp  # No cap — grinders earn 10x what casuals earn
  when_applies: Designing daily engagement loops, quest systems, retention mechanics
  sources: ["https://yukaichou.com/gamification-examples/octalysis-gamification-framework/"]

- id: GAM-012
  text: "Social proof and viral loops in prediction markets must show real-time activity feeds ('User X just predicted...'), shareable prediction cards, and referral bonuses that reward both inviter and invitee to drive organic growth."
  why: >
    Prediction markets are inherently social — seeing others' predictions creates information cascades
    that improve market efficiency. Robinhood's "X people are watching" feature increased engagement
    by 30%. Polymarket's shareable prediction cards on Twitter drove 40% of new user acquisition in
    2024. Referral programs with two-sided incentives (both get $10) have 2-3x conversion vs.
    one-sided (only inviter gets $10), per Dropbox's classic case study.
  how_to_do_right: |
    1. Activity feed: show "User X predicted Y at Z% confidence" in real-time (WebSocket)
    2. Anonymize amounts but show direction and confidence level
    3. Shareable cards: generate OG image with prediction, user handle, and current market price
    4. Include UTM parameters in shared URLs for attribution tracking
    5. Referral: both inviter and invitee get 500 XP bonus when invitee makes first prediction
    6. Cap referral bonuses at 20 per user per month to prevent abuse
    7. Add "Predict with friends" feature: create a private market visible only to friend group
    8. Never share exact portfolio positions or PnL without explicit user consent
  severity: high
  technologies:
    lang: [python, javascript]
    framework: [fastapi, react]
  domains:
    domain: [gamification, prediction_markets]
    concern: [domain_specific]
  example_good: |
    from dataclasses import dataclass
    from datetime import datetime

    @dataclass
    class ActivityEvent:
        user_display_name: str
        market_title: str
        direction: str          # "YES" or "NO"
        confidence_bucket: str  # "high" (>80%), "medium" (40-80%), "low" (<40%)
        timestamp: datetime
        # NOTE: No exact amount or position size — privacy by design

    @dataclass
    class ShareableCard:
        market_title: str
        user_prediction: str
        current_price: float
        og_image_url: str
        share_url: str  # Includes UTM: ?ref=USER_ID&utm_source=share_card

    REFERRAL_BONUS_XP = 500
    MAX_REFERRALS_PER_MONTH = 20

    def process_referral(inviter_id: str, invitee_id: str) -> tuple[int, int]:
        """Returns (inviter_bonus, invitee_bonus). Both get rewarded."""
        monthly_count = get_monthly_referral_count(inviter_id)
        if monthly_count >= MAX_REFERRALS_PER_MONTH:
            return (0, REFERRAL_BONUS_XP)  # Invitee still gets bonus
        return (REFERRAL_BONUS_XP, REFERRAL_BONUS_XP)
  example_bad: |
    # WRONG: No social features, no sharing, no referrals
    def make_prediction(user, market, amount):
        save_prediction(user, market, amount)
        # No activity feed, no shareable card, no referral tracking
        # Users predict in isolation — no viral growth
  when_applies: Adding social features, viral growth mechanics, referral programs to Forekast
  sources: ["https://yukaichou.com/gamification-examples/octalysis-gamification-framework/"]

- id: GAM-013
  text: "Notification fatigue management requires a budget system: each user has a daily notification budget (default 5), notifications are prioritized by relevance score, and users can adjust their budget. Exceeding budget silently drops low-priority notifications."
  why: >
    Unmanaged notifications cause app uninstalls. A 2023 Airship study found that apps sending >5
    push notifications per day saw 2x the uninstall rate of apps sending 2-3. Prediction markets
    generate many events (market resolved, price moved, friend predicted, badge earned) that can
    easily exceed 20 notifications per day for active users. Without budgeting, the most engaged
    users — your best customers — are the ones most likely to turn off all notifications.
  how_to_do_right: |
    1. Set default daily notification budget to 5 (configurable by user: 1-15)
    2. Assign priority scores: market_resolved = 10, badge_earned = 8, friend_activity = 5, price_move = 3
    3. When budget is exceeded, queue low-priority notifications for next day's digest email
    4. Never send more than 1 notification per 15-minute window (anti-spam)
    5. Group related notifications: "3 markets you predicted resolved" instead of 3 separate pushes
    6. Provide granular controls: per-category toggle (market, social, achievement, system)
    7. Track notification-to-open rate per user; reduce budget if open rate < 10%
    8. Send daily digest email at user's preferred time for all dropped notifications
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [gamification, ui]
    concern: [domain_specific]
  example_good: |
    from dataclasses import dataclass, field
    from datetime import datetime, timedelta
    from heapq import nlargest

    @dataclass
    class Notification:
        user_id: str
        category: str
        title: str
        body: str
        priority: int  # 1-10, higher = more important
        created_at: datetime = field(default_factory=datetime.utcnow)

    class NotificationBudgetManager:
        DEFAULT_BUDGET = 5
        MIN_INTERVAL = timedelta(minutes=15)

        def __init__(self, redis_client):
            self.redis = redis_client

        def should_send(self, notification: Notification) -> bool:
            budget = self._get_remaining_budget(notification.user_id)
            if budget <= 0:
                self._queue_for_digest(notification)
                return False
            last_sent = self._get_last_sent_time(notification.user_id)
            if last_sent and (datetime.utcnow() - last_sent) < self.MIN_INTERVAL:
                self._queue_for_digest(notification)
                return False
            self._decrement_budget(notification.user_id)
            return True

        def _get_remaining_budget(self, user_id: str) -> int:
            used = self.redis.get(f"notif_budget:{user_id}:used") or 0
            max_budget = self.redis.get(f"notif_budget:{user_id}:max") or self.DEFAULT_BUDGET
            return int(max_budget) - int(used)

        def _queue_for_digest(self, notification: Notification) -> None:
            self.redis.rpush(f"notif_digest:{notification.user_id}", notification.title)

        def _decrement_budget(self, user_id: str) -> None:
            self.redis.incr(f"notif_budget:{user_id}:used")

        def _get_last_sent_time(self, user_id: str) -> datetime | None:
            ts = self.redis.get(f"notif_last:{user_id}")
            return datetime.fromisoformat(ts) if ts else None
  example_bad: |
    # WRONG: Send every notification immediately with no budget
    def notify(user_id, message):
        push_notification(user_id, message)  # 20+ per day for active users = uninstall
  when_applies: Designing notification systems, push notification strategy, user communication
  sources: ["https://yukaichou.com/gamification-examples/octalysis-gamification-framework/"]

- id: GAM-014
  text: "Loss aversion in gamification is approximately 2x as powerful as equivalent gains (Kahneman & Tversky prospect theory). Frame gamification rewards as potential losses ('You will lose your streak') rather than potential gains ('Earn a streak bonus') for higher engagement, but use this sparingly to avoid toxic design."
  why: >
    Loss-framed notifications outperform gain-framed ones by 40-60% in click-through rate across
    multiple studies. However, overuse of loss framing creates anxiety and negative associations
    with the product. Duolingo found that loss-framed streak notifications ("Don't lose your 30-day
    streak!") had 2x the open rate of gain-framed ones ("Keep your 30-day streak going!") but also
    generated 3x more support complaints about feeling "guilted." The optimal ratio is 70% gain-framed,
    30% loss-framed.
  how_to_do_right: |
    1. Use loss framing for high-stakes moments only: streak about to break, tournament position dropping
    2. Maintain 70/30 ratio: 70% positive/gain-framed, 30% loss/urgency-framed
    3. Never combine loss framing with real money: "You'll lose $X" is manipulative
    4. For virtual currency/XP, loss framing is acceptable: "Your weekly bonus expires in 2 hours"
    5. A/B test both framings for every notification type; measure long-term retention, not just CTR
    6. Track user sentiment scores and reduce loss framing if sentiment drops below threshold
    7. Provide opt-out for urgency notifications specifically
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [gamification, culture]
    concern: [domain_specific, decision_making]
  example_good: |
    from enum import Enum

    class NotificationFrame(Enum):
        GAIN = "gain"
        LOSS = "loss"

    FRAMING_RATIO_TARGET = 0.70  # 70% gain, 30% loss

    NOTIFICATION_TEMPLATES = {
        "streak_warning": {
            NotificationFrame.GAIN: "Keep your {streak}-day streak alive! Predict now to earn {xp} XP.",
            NotificationFrame.LOSS: "Your {streak}-day streak expires in {hours}h! Don't lose it.",
        },
        "badge_progress": {
            NotificationFrame.GAIN: "You're 80% of the way to the Sharp Shooter badge!",
            NotificationFrame.LOSS: "You need just 2 more accurate predictions to not miss Sharp Shooter!",
        },
    }

    def select_frame(user_id: str, notification_type: str) -> NotificationFrame:
        """Select framing based on 70/30 ratio for this user's recent history."""
        recent_loss_ratio = get_recent_loss_frame_ratio(user_id, days=7)
        if recent_loss_ratio < 0.30:
            return NotificationFrame.LOSS
        return NotificationFrame.GAIN
  example_bad: |
    # WRONG: All notifications are loss-framed — creates anxiety
    def send_reminder(user):
        send_push(user, "You're LOSING your ranking! Your streak is about to DIE!")
        # 100% loss framing = toxic, anxious user experience
  when_applies: Writing notification copy, designing engagement nudges, A/B testing messaging
  sources: ["https://yukaichou.com/gamification-examples/octalysis-gamification-framework/"]

- id: GAM-015
  text: "Gamification reward schedules must combine fixed-ratio (predictable rewards for effort) with variable-ratio (random bonuses) to maximize both sustained engagement and dopamine-driven re-engagement, following a 70% fixed / 30% variable split."
  why: >
    Pure fixed-ratio schedules (every 10 predictions = 1 badge) become boring and predictable.
    Pure variable-ratio schedules (slot machine mechanics) are addictive but ethically problematic
    and regulated in some jurisdictions (Belgium banned loot boxes in 2018). Behavioral psychology
    research (Ferster & Skinner) shows that a blend maximizes engagement: fixed-ratio provides
    a sense of progress and fairness, while variable-ratio provides excitement and surprise.
    The 70/30 split avoids gambling-like mechanics while maintaining engagement.
  how_to_do_right: |
    1. Fixed rewards (70%): X predictions = Y XP, always and predictably
    2. Variable rewards (30%): random bonus XP (1.5x-3x multiplier) on ~every 5th action
    3. Variable rewards must have a visible probability: "Chance of bonus: ~20%"
    4. Never use variable rewards for real money or tradeable assets (gambling regulation)
    5. Implement a "pity timer": guarantee variable reward after 10 consecutive non-triggers
    6. Log all variable reward distributions for regulatory compliance
    7. Show recent variable reward winners in activity feed (social proof)
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [gamification, compliance]
    concern: [domain_specific]
  example_good: |
    import random
    from dataclasses import dataclass

    @dataclass
    class RewardResult:
        base_xp: int
        multiplier: float
        total_xp: int
        is_bonus: bool

    BONUS_CHANCE = 0.20        # 20% chance of variable reward
    BONUS_MULTIPLIER_RANGE = (1.5, 3.0)
    PITY_TIMER_MAX = 10        # Guaranteed bonus after 10 non-triggers

    def award_xp(base_xp: int, actions_since_last_bonus: int) -> RewardResult:
        """70% fixed, 30% variable reward schedule with pity timer."""
        is_bonus = False
        if actions_since_last_bonus >= PITY_TIMER_MAX:
            is_bonus = True
        elif random.random() < BONUS_CHANCE:
            is_bonus = True

        if is_bonus:
            multiplier = round(random.uniform(*BONUS_MULTIPLIER_RANGE), 1)
        else:
            multiplier = 1.0

        return RewardResult(
            base_xp=base_xp,
            multiplier=multiplier,
            total_xp=round(base_xp * multiplier),
            is_bonus=is_bonus,
        )
  example_bad: |
    # WRONG: Pure variable rewards — slot machine mechanics, legally risky
    def award_xp(user):
        roll = random.random()
        if roll > 0.95:
            user.xp += 1000  # Jackpot! No transparency, no pity timer, no compliance logging
        elif roll > 0.5:
            user.xp += 50
        else:
            user.xp += 0  # Got nothing — feels like gambling
  when_applies: Designing reward distribution, XP systems, bonus mechanics
  sources: ["https://yukaichou.com/gamification-examples/octalysis-gamification-framework/"]

- id: GAM-016
  text: "Gamification must never undermine the epistemic integrity of prediction markets. XP and rewards must incentivize accuracy and calibration, not volume or engagement farming. A user who makes 10 well-calibrated predictions must earn more than one who makes 100 random guesses."
  why: >
    If XP is awarded per prediction regardless of quality, rational users will spam low-effort
    predictions to maximize XP, destroying market signal quality. This is exactly what happened
    with early Metaculus XP systems where volume-based points encouraged "spray and pray" forecasting.
    They had to redesign rewards around Brier score in 2022. For Forekast, market integrity is the
    core product — gamification that degrades market quality is self-defeating.
  how_to_do_right: |
    1. Base XP = f(Brier score) not f(number of predictions): lower Brier = more XP
    2. Minimum quality threshold: predictions with Brier > 0.30 earn 0 XP (worse than random)
    3. Volume multiplier caps at 3x: after 3 predictions per market, no additional XP
    4. Calibration bonus: if user's 70% predictions resolve 65-75% of the time, award 500 XP bonus monthly
    5. Anti-spam: minimum 30 seconds between predictions on different markets
    6. Domain expertise bonus: reward accuracy within a specific domain, not across all domains
    7. Never award XP for simply viewing or clicking — only for substantive actions
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [gamification, prediction_markets]
    concern: [domain_specific, decision_making]
  example_good: |
    from dataclasses import dataclass

    @dataclass
    class PredictionXP:
        base_xp: int
        accuracy_multiplier: float
        calibration_bonus: int
        total: int

    def compute_prediction_xp(brier_score: float, is_calibrated: bool) -> PredictionXP:
        """XP based on accuracy, not volume."""
        if brier_score > 0.30:
            return PredictionXP(0, 0.0, 0, 0)  # Worse than random = no XP

        # Better Brier = more XP (inverse relationship)
        base = 100
        accuracy_mult = max(0.0, (0.30 - brier_score) / 0.30) * 3.0  # 0x to 3x
        calibration = 50 if is_calibrated else 0
        total = round(base * accuracy_mult) + calibration

        return PredictionXP(base, round(accuracy_mult, 2), calibration, total)

    # Brier 0.05 (excellent): 100 * 2.5 + 50 = 300 XP
    # Brier 0.15 (good):      100 * 1.5 + 50 = 200 XP
    # Brier 0.25 (mediocre):  100 * 0.5 + 0  = 50 XP
    # Brier 0.35 (bad):       0 XP — worse than random
  example_bad: |
    # WRONG: XP per prediction regardless of quality — incentivizes spam
    def on_prediction(user):
        user.xp += 10  # 100 random guesses = 1000 XP; 10 perfect predictions = 100 XP
        # Volume beats accuracy — destroys market signal quality
  when_applies: Designing XP formulas, reward distribution, any gamification touching prediction accuracy
  sources: ["https://yukaichou.com/gamification-examples/octalysis-gamification-framework/"]
