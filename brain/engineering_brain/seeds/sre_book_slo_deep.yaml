knowledge:
- id: CR-SRE-SLOD-001
  text: SLIs must measure the user experience, not the system health. CPU utilization at 90% is a system metric. "99.9% of
    requests complete in under 200ms" is a user experience metric. The database being healthy means nothing if the user is
    seeing errors.
  why: 'Google''s SLO chapter (Chapter 4) draws a sharp distinction between system metrics (CPU, memory, disk) and user experience
    metrics (availability, latency, correctness). System metrics are useful for capacity planning and debugging but are poor
    SLIs because: CPU at 90% may be perfectly fine (the service handles all requests within SLO) or CPU at 30% may be catastrophic
    (the service is routing to the wrong backend and serving errors). User experience metrics directly measure what matters:
    can the user do what they came to do? Google''s SLI categories: availability (proportion of successful requests), latency
    (proportion of requests faster than threshold), correctness (proportion of requests returning correct results), and freshness
    (proportion of data less than N seconds old).

    '
  how_to_do_right: '1. Availability SLI: successful_requests / total_requests. Define "successful" precisely: HTTP 2xx and
    3xx, not 5xx. Is 404 a success (resource doesn''t exist, correctly reported) or failure?

    2. Latency SLI: requests_under_threshold / total_requests. Use P99 or P95 as the threshold, not average. Example: "99%
    of requests complete in < 200ms."

    3. Correctness SLI: correct_responses / total_responses. Requires a definition of "correct" — which is domain-specific.

    4. Freshness SLI: for data systems, "99% of reads return data less than 60 seconds old." Measured by comparing data timestamp
    with current time.

    5. Measure SLIs at the user boundary: at the load balancer or API gateway, not inside the service. Internal metrics miss
    gateway errors, TLS issues, and routing failures.

    6. SLIs must be automatically measurable: if you need manual inspection to determine the SLI value, it''s not a real SLI.

    '
  example_good: "from prometheus_client import Counter, Histogram\n\n# SLI: user experience metrics measured at the boundary\nrequest_total = Counter('http_requests_total', 'Total requests',\n                        ['method', 'endpoint', 'status'])\nrequest_duration = Histogram('http_request_duration_seconds',\n                             'Request duration',\n                             buckets=[0.05, 0.1, 0.2, 0.5, 1.0, 2.0])\n\n# Availability SLI: successful / total\n# rate(http_requests_total{status=~\"2..|3..\"}[5m]) / rate(http_requests_total[5m])\n\n# Latency SLI: requests under threshold / total\n# histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) < 0.2\n# \"99% of requests complete in under 200ms\"\n"
  example_bad: "from prometheus_client import Gauge\n\n# System metrics — NOT user experience metrics\ncpu_usage = Gauge('cpu_usage_percent', 'CPU usage')\nmemory_usage = Gauge('memory_usage_percent', 'Memory usage')\ndisk_usage = Gauge('disk_usage_percent', 'Disk usage')\n\n# Alert: CPU > 90%\n# Problem: CPU at 90% may be fine (all requests within SLO)\n# Problem: CPU at 30% may be catastrophic (serving errors)\n# These metrics tell you nothing about user experience\n# Users don't care about CPU — they care about latency and errors\n"
  when_applies: "When defining Service Level Indicators to measure and alert on service reliability."
  severity: high
  technologies:
    lang: [general]
    platform: [grafana, prometheus]
  domains:
    domain: [observability, reliability]
    concern: [monitoring, availability, slo]
  sources:
  - url: https://sre.google/sre-book/service-level-objectives/
    title: 'Google SRE Book — Chapter 4: Service Level Objectives'
  validation_status: cross_checked
- id: CR-SRE-SLOD-002
  text: SLOs must be set based on user expectations, not system capability. If users expect 99.99% availability but your system
    can only achieve 99.9%, the SLO should reflect the realistic target — not the aspiration. And if users are happy with
    99.9%, targeting 99.99% wastes engineering effort.
  why: 'Google''s SLO chapter (Chapter 4) emphasizes that SLOs are a contract between the service and its users, not a measurement
    of system performance. Setting SLOs too high: wastes engineering effort on diminishing returns (going from 99.9% to 99.99%
    is 10x harder), constrains velocity (the error budget is tiny), and creates alert fatigue (constantly alerting on budget
    consumption). Setting SLOs too low: users expect better, leading to complaints and churn even when the SLO is met. Google''s
    approach: talk to users (or analyze usage patterns) to understand their tolerance for errors and latency. A batch processing
    system''s users tolerate 99% availability. A real-time trading system''s users need 99.99%. Set the SLO at the user''s
    tolerance level, not at the system''s maximum capability.

    '
  how_to_do_right: '1. Start with user expectations: survey users, analyze support tickets ("too slow" complaints), and study
    usage patterns (do users retry? Do they leave?).

    2. Consider the user''s alternatives: if competitors offer 99.9%, targeting 99.0% is insufficient. If there''s no alternative,
    users tolerate lower reliability.

    3. Set SLOs per user journey, not per service: "checkout completes in < 5 seconds for 99.9% of attempts" is more meaningful
    than "payment service P99 < 200ms."

    4. Start conservative (lower SLO), tighten over time: it''s much easier to tighten an SLO than to relax one. Users get
    used to the actual reliability.

    5. Different SLOs for different tiers: free users get 99.5%, enterprise users get 99.99%. This aligns engineering investment
    with business value.

    6. Review SLOs quarterly: are users happy? Are we spending too much effort on reliability? Is the error budget consistently
    unspent (SLO too easy) or exhausted (SLO too aggressive)?

    '
  example_good: "# SLO setting based on user research + competitor analysis\ndef determine_slo(service_type: str, user_research: dict) -> dict:\n    # Based on user tolerance surveys and usage patterns\n    slo_map = {\n        'checkout': {\n            'availability': 0.9999,  # Users leave on checkout errors\n            'latency_p99_ms': 2000,  # Users abandon after 3s\n            'rationale': 'High user expectation, direct revenue impact'\n        },\n        'search': {\n            'availability': 0.999,   # Users retry on search errors\n            'latency_p99_ms': 500,   # Users expect fast search\n            'rationale': 'Users tolerate occasional failures'\n        },\n        'internal_dashboard': {\n            'availability': 0.99,    # Users check once a day\n            'latency_p99_ms': 5000,  # Users tolerate slow loads\n            'rationale': 'Low frequency, internal only'\n        },\n    }\n    return slo_map.get(service_type, slo_map['search'])\n"
  example_bad: "# SLO set based on what the system can achieve, not user needs\nSLO_AVAILABILITY = 0.9999  # \"We can do four nines!\"\n\n# Problems:\n# 1. Users only need 99.9% — four nines wastes engineering effort\n# 2. Error budget is tiny: 4.3 minutes/month\n# 3. One bad deploy consumes the entire budget\n# 4. Team can't deploy for the rest of the month\n# 5. Feature velocity drops to zero\n# OR: SLO set too low (99%) when users expect 99.9%\n# Users complain despite meeting the SLO\n"
  when_applies: "When establishing SLO targets for a service and deciding the appropriate reliability level."
  severity: high
  technologies:
    lang: [general]
  domains:
    domain: [reliability]
    concern: [availability, slo]
  sources:
  - url: https://sre.google/sre-book/service-level-objectives/
    title: 'Google SRE Book — Chapter 4: Service Level Objectives'
  validation_status: cross_checked
- id: CR-SRE-SLOD-003
  text: Multi-window, multi-burn-rate alerts are the SOTA for SLO-based alerting — they eliminate false positives from brief
    spikes while catching slow-burn degradation that fixed-threshold alerts miss.
  why: 'Google''s alerting refinement (Chapter 10) evolved through multiple generations. Gen 1 (threshold alerts): "alert
    if error rate > 1%." Problem: a 2-second spike to 5% triggers a page at 3 AM for a non-issue. Gen 2 (sustained threshold):
    "alert if error rate > 1% for 5 minutes." Problem: misses a slow burn of 0.5% error rate sustained for 6 hours (consumes
    significant error budget but never crosses the 1% threshold). Gen 3 (burn-rate alerts): "alert if error budget burn rate
    > 14x." Problem: a brief spike that burns budget fast triggers an alert, but the brief duration means the total budget
    impact is minimal. Gen 4 (multi-window, multi-burn-rate): "alert if burn rate > 14x over 1 hour AND > 14x over 5 minutes."
    The long window ensures the burn is sustained; the short window ensures it''s current. This catches both fast burns and
    slow burns with minimal false positives.

    '
  how_to_do_right: '1. Fast burn alert: burn rate > 14x over a short window (5 min) AND a long window (1 hour). This catches
    acute failures that will exhaust the budget in ~6 hours.

    2. Slow burn alert: burn rate > 6x over a short window (30 min) AND a long window (6 hours). This catches gradual degradation
    that will exhaust the budget in ~5 days.

    3. Use Prometheus recording rules to pre-compute burn rates: `job:sli_error:ratio_rate5m`, `job:sli_error:ratio_rate1h`,
    `job:sli_error:ratio_rate6h`.

    4. Page for fast burns (needs immediate attention). Ticket for slow burns (needs investigation within 24 hours).

    5. The budget period is typically 30 days. At the start of each period, the budget resets.

    6. Visualize error budget on a dashboard: remaining budget over time. Product teams should see this daily.

    '
  example_good: "# Multi-window, multi-burn-rate alert rules (Prometheus)\n# Fast burn: exhausts budget in ~6 hours\n# Alert fires if burn rate > 14x over BOTH 5min AND 1h windows\n\n# Recording rules for burn rates\ngroups:\n  - name: slo_burn_rates\n    rules:\n      - record: job:sli_error:ratio_rate5m\n        expr: rate(http_requests_total{status=~\"5..\"}[5m]) / rate(http_requests_total[5m])\n      - record: job:sli_error:ratio_rate1h\n        expr: rate(http_requests_total{status=~\"5..\"}[1h]) / rate(http_requests_total[1h])\n      - record: job:sli_error:ratio_rate6h\n        expr: rate(http_requests_total{status=~\"5..\"}[6h]) / rate(http_requests_total[6h])\n\n  - name: slo_alerts\n    rules:\n      # Fast burn: page immediately\n      - alert: SLOFastBurn\n        expr: job:sli_error:ratio_rate5m > (14 * 0.001) and job:sli_error:ratio_rate1h > (14 * 0.001)\n        labels: { severity: page }\n      # Slow burn: ticket within 24h\n      - alert: SLOSlowBurn\n        expr: job:sli_error:ratio_rate30m > (6 * 0.001) and job:sli_error:ratio_rate6h > (6 * 0.001)\n        labels: { severity: ticket }\n"
  example_bad: "# Simple threshold alert — worst of all approaches\ngroups:\n  - name: alerts\n    rules:\n      - alert: HighErrorRate\n        expr: rate(http_errors_total[1m]) > 10\n        # Problems:\n        # 1. A 2-second spike to 50 errors triggers a 3 AM page\n        # 2. A slow burn of 9 errors/min for 6 hours: no alert\n        #    (9 < 10 but consumes massive error budget)\n        # 3. Threshold is absolute, not relative to traffic\n        #    10 errors at 100 QPS = 10%, at 10K QPS = 0.1%\n"
  when_applies: "When designing alerting rules for SLO-based monitoring to catch both acute and gradual reliability degradation."
  severity: high
  technologies:
    lang: [general]
    platform: [grafana, prometheus]
  domains:
    domain: [observability, reliability]
    concern: [monitoring, alerting, availability, slo]
  sources:
  - url: https://sre.google/sre-book/practical-alerting/
    title: 'Google SRE Book — Chapter 10: Practical Alerting from Time-Series Data'
  validation_status: cross_checked
- id: CR-SRE-SLOD-004
  text: Compound SLOs for systems with dependencies must account for the availability multiplication effect — if your service
    depends on 5 services each at 99.9%, your maximum achievable availability is 99.9%^5 = 99.5%. You cannot out-engineer
    your dependencies' reliability.
  why: 'Google''s SLO planning (Chapter 4) requires understanding how dependencies affect compound availability. The math:
    if each request requires ALL N dependencies to succeed, the compound availability is the product of individual availabilities.
    With 5 dependencies at 99.9%: 0.999^5 = 0.995 = 99.5%. With 10 dependencies at 99.9%: 0.999^10 = 0.990 = 99.0%. This means:
    you cannot promise 99.99% availability if any single dependency is less reliable than 99.99%. Google''s approach: identify
    the critical path (which dependencies are required for each request type), calculate compound availability, and compare
    with the desired SLO. If the compound availability is lower than the SLO, options are: improve dependency reliability,
    add redundancy (multi-provider), use caching/fallbacks to reduce dependency on slow dependencies, or lower the SLO to
    be realistic.

    '
  how_to_do_right: '1. Map dependency availability: what''s the SLO of each dependency your service relies on? If they don''t
    publish one, measure it.

    2. Calculate compound availability: product of all required dependencies'' availability. This is your ceiling.

    3. If compound availability < desired SLO: you must either improve dependency reliability or add independence (caching,
    fallbacks, redundancy).

    4. Use caching to reduce effective dependency: if you cache 95% of database reads, a database outage only affects 5% of
    read requests.

    5. Use multi-provider redundancy for critical dependencies: if DNS provider A fails, use provider B. Compound: 1 - (1-0.999)
    × (1-0.999) = 0.999999.

    6. Different user journeys have different dependency chains: "browse products" may have 3 dependencies (99.7%), "checkout"
    may have 6 dependencies (99.4%). Set SLOs per journey.

    '
  example_good: "def calculate_compound_availability(dependencies: dict[str, float]) -> dict:\n    \"\"\"Calculate maximum achievable availability given dependencies.\"\"\"\n    compound = 1.0\n    for name, avail in dependencies.items():\n        compound *= avail\n    return {\n        'dependencies': dependencies,\n        'compound_availability': round(compound, 6),\n        'max_downtime_hours_month': round((1 - compound) * 730, 1),\n        'feasible_slo': round(compound - 0.001, 4),  # Buffer\n    }\n\n# Example: checkout path\nresult = calculate_compound_availability({\n    'api_gateway': 0.9999,\n    'auth_service': 0.9995,\n    'inventory_db': 0.9990,\n    'payment_provider': 0.9990,\n    'shipping_api': 0.9990,\n})\n# compound = 0.9964 -> max SLO = 99.54%\n# Cannot promise 99.99% for checkout!\n"
  example_bad: "# Promising 99.99% availability without checking dependencies\nSLO = 0.9999  # 99.99% = 4.3 min downtime/month\n\n# But the service depends on:\n# - Database: 99.9%\n# - Payment API: 99.9%\n# - Auth service: 99.9%\n# - Cache (Redis): 99.9%\n# - Message queue: 99.9%\n# Compound: 0.999^5 = 99.5% = 3.65 hours downtime/month\n# The SLO of 99.99% is PHYSICALLY IMPOSSIBLE\n# Team is set up to fail — SLO will always be violated\n"
  when_applies: "When setting availability SLOs for a service that depends on multiple other services or external APIs."
  severity: high
  technologies:
    lang: [general]
  domains:
    domain: [architecture, reliability, security]
    concern: [availability, slo, supply_chain, dependencies]
  sources:
  - url: https://sre.google/sre-book/service-level-objectives/
    title: 'Google SRE Book — Chapter 4: Service Level Objectives'
  validation_status: cross_checked
- id: CR-SRE-SLOD-005
  text: SLAs are legally binding promises to customers; SLOs are internal reliability targets. SLOs should be stricter than
    SLAs — if your SLA promises 99.9%, your internal SLO should be 99.95%. This gives you a buffer between "SLO violated (investigate)"
    and "SLA violated (pay penalty)."
  why: 'Google distinguishes sharply between SLAs (external, contractual, with financial penalties) and SLOs (internal, operational,
    with error budget consequences). Common mistake: setting SLO = SLA. When the SLO is violated, the SLA is also violated
    simultaneously — there''s no warning period. Google''s approach: SLO is stricter than SLA. SLA: 99.9% (promise to customer).
    SLO: 99.95% (internal target). Alert: when error budget burn rate threatens the SLO. If the SLO is breached but the SLA
    is not: investigate, fix, learn — but no financial penalty. If the SLA is breached: financial penalty, customer escalation,
    postmortem. The gap between SLO and SLA is the "warning zone" that gives the team time to respond before financial consequences.

    '
  how_to_do_right: '1. Set SLO at least 2-5x stricter than SLA: if SLA = 99.9% (43 min/month downtime), set SLO = 99.95% (21
    min/month).

    2. Alert on SLO violations. The SLA should never be the alerting boundary — by then it''s too late.

    3. Track both SLO and SLA compliance on the same dashboard: remaining error budget for each.

    4. SLA penalties should be meaningful: enough to incentivize the team to maintain reliability, not so large that they
    create risk aversion.

    5. Review SLA/SLO gap: if SLO is consistently met with > 50% budget remaining, the SLO may be too conservative relative
    to the SLA.

    6. Publish SLO (not SLA) to internal consumers: other teams should build against your SLO, not your SLA.

    '
  example_good: "class SLOSLATracker:\n    def __init__(self, sla: float, slo: float):\n        assert slo > sla, 'SLO must be stricter than SLA'\n        self.sla = sla  # 99.9% — contractual promise\n        self.slo = slo  # 99.95% — internal target\n\n    def get_status(self, current_availability: float) -> dict:\n        sla_budget_remaining = current_availability - self.sla\n        slo_budget_remaining = current_availability - self.slo\n        if slo_budget_remaining < 0:\n            return {'status': 'WARNING', 'action': 'Investigate SLO breach'}\n        if sla_budget_remaining < 0:\n            return {'status': 'CRITICAL', 'action': 'SLA violated — customer penalty'}\n        return {'status': 'OK',\n                'slo_budget_pct': round(slo_budget_remaining / (1 - self.slo) * 100, 1)}\n\ntracker = SLOSLATracker(sla=0.999, slo=0.9995)\n# SLO breach = investigate (no penalty yet)\n# SLA breach = financial penalty, customer escalation\n# Gap between SLO and SLA = warning zone\n"
  example_bad: "# SLO equals SLA — no warning zone\nSLO = 0.999  # Same as SLA\nSLA = 0.999\n\n# When SLO is violated, SLA is ALSO violated simultaneously\n# No time to investigate before financial penalty hits\n# Team discovers SLA breach from customer complaint, not monitoring\n\n# OR: No SLO at all\n# Team only has SLA (contractual)\n# No internal alerting until SLA is breached\n# By then it's too late — penalty already incurred\n"
  when_applies: "When defining the relationship between internal reliability targets (SLOs) and external contractual commitments (SLAs)."
  severity: medium
  technologies:
    lang: [general]
  domains:
    domain: [reliability]
    concern: [availability, sla, slo]
  sources:
  - url: https://sre.google/sre-book/service-level-objectives/
    title: 'Google SRE Book — Chapter 4: Service Level Objectives'
  validation_status: cross_checked
- id: CR-SRE-SLOD-006
  text: Toil budget — no more than 50% of SRE time should be spent on toil (manual, repetitive operational work). If toil
    exceeds 50%, the team is an operations team wearing an SRE badge, not an engineering team improving reliability.
  why: 'Google''s toil chapter (Chapter 5) defines toil as work that is: manual, repetitive, automatable, tactical (not strategic),
    scales linearly with service growth, and has no enduring value. Google mandates that SRE teams spend at least 50% of their
    time on engineering (automation, tooling, architecture improvements) and at most 50% on toil (on-call, manual deployments,
    ticket triage). If toil exceeds 50%, the team files a "toil excess" report and either: automates the toil, redirects toil
    to the product team, or gets additional headcount. The 50% cap ensures that reliability improves over time — if all time
    is spent on operational work, the system never gets more reliable.

    '
  how_to_do_right: '1. Measure toil: track time spent on manual, repetitive operational tasks vs engineering work. Use time
    tracking or categorize on-call actions.

    2. If toil > 50%: identify the top 3 toil sources and create automation projects to eliminate them.

    3. Automate common toil: manual deployments → CI/CD, manual scaling → autoscaling, manual remediation → automated remediation.

    4. Push back on toil sources: if a product generates excessive on-call pages, require the product team to invest in reliability
    before SRE continues support.

    5. Review toil quarterly: which toil was eliminated? What new toil appeared? Is the trend improving?

    6. Distinguish good ops work (incident response, capacity planning review) from toil (manual deployment, copy-paste configuration).
    Not all ops work is toil.

    '
  example_good: "from enum import Enum\nfrom dataclasses import dataclass\n\nclass WorkType(Enum):\n    ENGINEERING = 'engineering'  # Automation, tooling, architecture\n    TOIL = 'toil'               # Manual, repetitive, automatable\n\n@dataclass\nclass ToilTracker:\n    engineering_hours: float = 0\n    toil_hours: float = 0\n\n    @property\n    def toil_percentage(self) -> float:\n        total = self.engineering_hours + self.toil_hours\n        return (self.toil_hours / total * 100) if total > 0 else 0\n\n    def check_budget(self) -> str:\n        pct = self.toil_percentage\n        if pct > 50:\n            return f'OVER BUDGET: {pct:.0f}% toil. Top 3 toil sources need automation.'\n        return f'OK: {pct:.0f}% toil, {100-pct:.0f}% engineering'\n\n# Weekly tracking\ntracker = ToilTracker(engineering_hours=22, toil_hours=18)\nprint(tracker.check_budget())  # OK: 45% toil, 55% engineering\n"
  example_bad: "# Team spending 80% on toil, 20% on engineering\n# Monday: manual deployment (2 hours)\n# Tuesday: manually restart crashed pods (1 hour)\n# Wednesday: copy-paste configuration to new environment (3 hours)\n# Thursday: manually investigate false-positive alerts (2 hours)\n# Friday: manually run database migration (2 hours)\n# Total toil: 10 hours. Engineering: 2.5 hours.\n# No time to automate anything because all time is spent on toil\n# System never gets more reliable — toil breeds more toil\n"
  when_applies: "When SRE or operations teams are spending the majority of their time on manual, repetitive tasks instead of engineering improvements."
  severity: medium
  technologies:
    lang: [general]
  domains:
    domain: [management, culture, operations, reliability]
    concern: [maintenance, toil, availability, slo]
  sources:
  - url: https://sre.google/sre-book/eliminating-toil/
    title: 'Google SRE Book — Chapter 5: Eliminating Toil'
  validation_status: cross_checked
