layer: rules
technology: SRE
domain: reliability
knowledge:
- id: CR-SRE-SLO-001
  text: Start with what users care about, not what you can measure. SLIs must reflect user-perceived service quality. Measuring server CPU when users care about page load time creates a dangerous blind
    spot.
  why: 'Google learned that server-side metrics often miss user-visible problems. A service can show green on all dashboards while users experience degraded performance due to client-side rendering issues,
    CDN cache misses, or DNS resolution failures. The SRE Book states: "Start by thinking about what your users care about, not what you can measure." Teams that start from measurable metrics (CPU, memory,
    disk I/O) build dashboards that make engineers happy but miss user pain. Teams that start from user outcomes (page loaded, transaction completed, search returned relevant results) build dashboards that
    drive business-relevant decisions. Client-side instrumentation catches problems that server-side monitoring misses entirely — including third-party script failures, slow DNS, and geographic routing
    issues.

    '
  how_to_do_right: '1. Interview users or analyze support tickets to identify what "working" means to them: fast, correct, available, fresh.

    2. Map each user need to a measurable SLI: "fast" → request latency at p95, "correct" → error rate, "fresh" → data staleness.

    3. Measure SLIs at the closest point to the user: load balancer > server > database. Prefer client-side RUM when possible.

    4. Validate that your SLIs actually correlate with user satisfaction — if SLIs are green but support tickets spike, the SLIs are wrong.

    5. Distinguish between SLIs you serve (latency, errors) and SLIs you depend on (upstream availability, DNS).

    '
  severity: critical
  technologies:
    lang: [general]
    platform: [grafana, opentelemetry, prometheus]
  domains:
    domain: [observability, reliability]
    concern: [availability, slo]
  example_good: "# Define SLIs from user perspective, not server capabilities\nSLIS = {\n    'page_load': {\n        'metric': 'page_load_time_ms',\n        'measurement_point': 'client_rum',  # Real User Monitoring\n        'user_need': 'fast',\n        'slo': 'p95 < 3000ms',\n    },\n    'transaction_success': {\n        'metric': 'checkout_success_rate',\n        'measurement_point': 'load_balancer',\n        'user_need': 'available',\n        'slo': '99.95% success rate',\n    },\n    'data_freshness': {\n        'metric': 'data_staleness_seconds',\n        'measurement_point': 'client_rum',\n        'user_need': 'fresh',\n        'slo': '< 60 seconds stale',\n    },\n}\n"
  example_bad: "# Anti-pattern: SLIs based on what is easy to measure, not what users care about\nSLIS = {\n    'cpu': {'metric': 'cpu_utilization', 'threshold': 0.8},\n    'memory': {'metric': 'memory_usage', 'threshold': 0.75},\n    'disk_io': {'metric': 'disk_iops', 'threshold': 5000},\n}\n# Users see blank pages from CDN cache misses — not detected\n# Users experience 5s page loads from DNS issues — not detected\n# All dashboards green while support tickets spike\n"
  when_applies: "When defining SLIs for a service, especially during initial SLO setup or when existing metrics fail to correlate with user satisfaction"
  sources:
  - url: https://sre.google/sre-book/service-level-objectives/
    title: 'Google SRE Book — Chapter 4: Service Level Objectives'
  validation_status: cross_checked
- id: CR-SRE-SLO-002
  text: Use percentiles, never averages, for latency SLIs. An average latency of 50ms can hide that 5% of users experience 1000ms+ latency. The average lies about user experience.
  why: 'The SRE Book gives a concrete example: a system with 50ms typical latency but 5% of requests taking 20x longer (1000ms). The average is ~97ms — "fast enough." But 5% of your users are furious. If
    you serve 10M requests/day, that is 500,000 requests with unacceptable latency. Percentiles expose the truth: p50=50ms (median, the "typical" case), p95=1000ms (the tail, where pain lives), p99=2000ms
    (the worst case you should design for). Google recommends tracking at minimum p50, p95, p99, and p99.9. Each tells a different story: p50 is your "normal" experience, p95 is your "bad day" experience,
    and p99 is your "should this user churn?" experience. Services that optimize for average latency systematically neglect their worst-served users, who are often the most valuable (complex queries = power
    users).

    '
  how_to_do_right: '1. Track latency at p50, p95, p99, and p99.9 — never just the average.

    2. Set separate SLOs for each percentile: p50 < 100ms, p99 < 500ms, p99.9 < 2000ms.

    3. Alert on p99, not p50. If median latency spikes, p99 was already terrible before you noticed.

    4. Use histograms (not summaries) in Prometheus for accurate percentile calculation across instances.

    5. Investigate p99 regularly — it often reveals garbage collection pauses, connection pool exhaustion, or specific slow queries.

    6. Never aggregate percentiles across services by averaging them — this is mathematically invalid. Use merged histograms.

    '
  severity: critical
  technologies:
    lang: [general]
    platform: [grafana, opentelemetry, prometheus]
  domains:
    domain: [observability, performance, reliability]
    concern: [availability, slo]
  example_good: "# Track percentiles, not averages, for latency SLIs\nfrom prometheus_client import Histogram\n\nREQUEST_LATENCY = Histogram(\n    'http_request_duration_seconds',\n    'Request latency in seconds',\n    buckets=[0.01, 0.025, 0.05, 0.1, 0.25, 0.5, 1.0, 2.5, 5.0, 10.0]\n)\n\n# SLOs on percentiles — each tells a different story\nLATENCY_SLOS = {\n    'p50': 0.100,   # Typical experience: < 100ms\n    'p95': 0.500,   # Bad day experience: < 500ms\n    'p99': 2.000,   # Worst acceptable: < 2s\n    'p99.9': 5.000, # Extreme tail: < 5s\n}\n# Alert on p99, not p50 — tail latency reveals real problems\n"
  example_bad: "# Anti-pattern: using average latency\nimport statistics\n\ndef report_latency(latencies: list[float]) -> float:\n    avg = statistics.mean(latencies)  # Average = 97ms, looks great!\n    return avg\n    # Hidden: 5% of requests take 1000ms+ (500K angry users/day at 10M req/day)\n    # Average hides the tail — power users with complex queries suffer most\n    # NEVER aggregate percentiles by averaging them — mathematically invalid\n"
  when_applies: "When defining latency SLIs and SLOs, or when diagnosing latency issues that affect a subset of users"
  sources:
  - url: https://sre.google/sre-book/service-level-objectives/
    title: 'Google SRE Book — Chapter 4: Service Level Objectives'
  validation_status: cross_checked
- id: CR-SRE-SLO-003
  text: Distinguish clearly between SLI, SLO, and SLA. SLI is the measurement. SLO is the target. SLA is the contract with consequences. Confusing them leads to either over-commitment or meaningless metrics.
  why: 'Google''s simple test: "What happens if the SLOs are not met?" If the answer is "a pager fires and we fix it" — that is an SLO. If the answer is "we owe the customer a refund" — that is an SLA.
    SLIs are the raw metrics (latency, error rate, throughput). SLOs are internal targets set on those metrics (p99 latency < 200ms). SLAs are external contracts that carry financial or legal consequences
    for missing targets. The critical mistake teams make: setting SLAs equal to SLOs. Your SLA should be looser than your SLO — the gap is your safety margin. If your internal SLO is 99.95% and your SLA
    is 99.95%, you have zero room for error before owing refunds. Google maintains internal SLOs significantly tighter than published SLAs.

    '
  how_to_do_right: '1. Define SLIs first: the raw metrics you will track (request success rate, latency percentiles, throughput).

    2. Set internal SLOs on those SLIs: what target values constitute "healthy" for your team.

    3. If you need an SLA, set it LOOSER than your SLO: internal SLO 99.95% → external SLA 99.9%.

    4. The gap between SLO and SLA is your safety margin — never shrink it below 2-5x the expected error budget variance.

    5. SRE should review SLAs before business/legal commits them. Many SLAs are technically impossible or ruinously expensive.

    6. Track SLI/SLO/SLA separately on dashboards: "How are we doing?" (SLI), "Should we act?" (SLO), "Are we in breach?" (SLA).

    '
  severity: critical
  technologies:
    lang: [general]
    platform: [cloud]
  domains:
    domain: [reliability]
    concern: [availability, slo]
  example_good: "# Clear separation: SLI (measurement), SLO (target), SLA (contract)\n@dataclass\nclass ServiceLevels:\n    # SLI: the raw metric\n    sli_metric: str = 'request_success_rate'\n    # SLO: internal target (tighter)\n    slo_target: float = 0.9995  # 99.95%\n    # SLA: external contract (looser = safety margin)\n    sla_target: float = 0.999   # 99.9%\n\n    @property\n    def safety_margin(self) -> float:\n        return self.slo_target - self.sla_target  # 0.05% buffer\n\n    def status(self, actual: float) -> str:\n        if actual < self.sla_target:\n            return 'SLA_BREACH: refund owed, legal consequences'\n        if actual < self.slo_target:\n            return 'SLO_BREACH: internal action needed'\n        return 'HEALTHY'\n"
  example_bad: "# Anti-pattern: SLA equals SLO — zero safety margin\nSLO = 0.9995\nSLA = 0.9995  # Same value! No buffer before financial penalties\n\ndef check(actual: float):\n    if actual < SLA:\n        trigger_refund()  # First sign of trouble = contractual violation\n    # No early warning, no time to mitigate\n    # Any minor incident immediately triggers legal consequences\n"
  when_applies: "When establishing SLI/SLO/SLA hierarchy for a service, especially when defining external customer contracts"
  sources:
  - url: https://sre.google/sre-book/service-level-objectives/
    title: 'Google SRE Book — Chapter 4: Service Level Objectives'
  validation_status: cross_checked
- id: CR-SRE-SLO-004
  text: Never set SLOs based on current performance. Anchoring to what the system happens to do today locks you into supporting a system that may require heroic unsustainable effort.
  why: 'The SRE Book explicitly warns against this common trap. If your service currently achieves 99.99% availability through heroic on-call effort and manual interventions, setting that as your SLO means
    you can never stop the heroics. It also means any infrastructure change that regresses availability (even intentionally, for efficiency) becomes an SLO breach. Google recommends setting SLOs based on
    user needs and business requirements, then engineering the system to meet those targets sustainably. If the system naturally exceeds the SLO, that surplus is the error budget — spend it on velocity.
    If the system cannot meet a user-driven SLO, that is a signal to invest in reliability, not to lower the target to match current performance.

    '
  how_to_do_right: '1. Determine SLO from user requirements and business impact, NOT from system metrics.

    2. Ask: "What is the minimum reliability that keeps users satisfied?" — not "What is our current reliability?"

    3. If current performance exceeds the SLO, celebrate the error budget — do not raise the SLO to match.

    4. If current performance is below the SLO, invest in reliability — do not lower the SLO to match.

    5. Set SLOs before building the system (for new services) or independently of current data (for existing services).

    6. Review SLOs only when user needs or business context changes — not when system performance changes.

    '
  severity: high
  technologies:
    lang: [general]
  domains:
    domain: [reliability]
    concern: [availability, slo]
  example_good: "# Set SLO from user requirements, not current performance\ndef determine_slo(user_research: dict, business_impact: dict) -> float:\n    \"\"\"SLO based on user needs, NOT on what system currently achieves.\"\"\"\n    user_tolerance = user_research['acceptable_error_rate']  # e.g., 0.001\n    business_threshold = business_impact['max_acceptable_loss_rate']  # e.g., 0.0005\n    slo = 1 - min(user_tolerance, business_threshold)\n    # Explicitly NOT looking at current system metrics\n    return slo\n\n# Current system: 99.999% — but SLO is 99.95% based on user needs\n# The surplus 0.049% is error budget — spend it on velocity!\n"
  example_bad: "# Anti-pattern: anchoring SLO to current performance\ndef set_slo_from_metrics(current_availability: float) -> float:\n    return current_availability  # 99.999% because that is what we happen to achieve\n    # This locks us into heroic effort forever\n    # Any optimization that reduces availability is now an 'SLO breach'\n    # Team cannot stop heroics without 'failing'\n"
  when_applies: "When setting SLOs for new or existing services, to avoid anchoring to current performance levels that may require unsustainable effort"
  sources:
  - url: https://sre.google/sre-book/service-level-objectives/
    title: 'Google SRE Book — Chapter 4: Service Level Objectives'
  validation_status: cross_checked
- id: CR-SRE-SLO-005
  text: Keep the number of SLOs minimal. Every SLO you add creates a constraint on the engineering team. If an SLO never drives a prioritization decision, it is dead weight — remove it.
  why: 'Google found that teams with too many SLOs (10+) suffer from "SLO fatigue" — when everything is important, nothing is. Engineers stop paying attention to any SLO because the dashboard is a wall
    of numbers. The most effective services have 3-5 SLOs covering the critical user-visible dimensions: availability (can users reach us?), latency (is it fast?), and correctness (is the answer right?).
    Each SLO should be the answer to a concrete question: "Should we drop what we are doing and fix this?" If an SLO breach would not change anyone''s behavior, it is not a useful SLO. A throughput SLO
    that only matters during batch processing windows is better expressed as a batch SLO active only during those windows, not a permanent constraint.

    '
  how_to_do_right: '1. Start with 1-3 SLOs. Add more ONLY when you discover a user-visible dimension not covered.

    2. For each proposed SLO, ask: "If this SLO is breached, what action would we take?" If no concrete action, do not add it.

    3. Cover the critical triangle: availability (are requests succeeding?), latency (are they fast enough?), correctness (are results right?).

    4. Remove SLOs that have never triggered an action in 2+ quarters.

    5. Avoid vanity SLOs (e.g., "deployment frequency > 10/week") — these are team metrics, not service level objectives.

    6. Different service tiers may have different SLO counts: a critical path API needs tight SLOs, a batch processing pipeline may need only a throughput SLO.

    '
  severity: high
  technologies:
    lang: [general]
  domains:
    domain: [observability, reliability]
    concern: [availability, slo]
  example_good: "# Minimal SLO set — each drives concrete decisions\nSERVICE_SLOS = {\n    'availability': {'target': 0.9995, 'action_on_breach': 'freeze deployments'},\n    'latency_p99': {'target_ms': 500, 'action_on_breach': 'redirect 2 engineers to perf'},\n    'correctness': {'target': 0.9999, 'action_on_breach': 'halt writes, investigate'},\n}\n# Only 3 SLOs — each one answers: 'Should we drop everything and fix this?'\n# If an SLO breach would not change behavior, it is not a useful SLO\nassert len(SERVICE_SLOS) <= 5, 'SLO fatigue: too many SLOs'\n"
  example_bad: "# Anti-pattern: too many SLOs — SLO fatigue\nSERVICE_SLOS = {\n    'availability': 0.9999,\n    'latency_p50': 50,\n    'latency_p95': 200,\n    'latency_p99': 500,\n    'throughput': 10000,\n    'error_rate_4xx': 0.01,\n    'error_rate_5xx': 0.001,\n    'cpu_utilization': 0.8,\n    'memory_utilization': 0.75,\n    'deploy_frequency': 10,\n    'mttr': 30,\n    'gc_pause_ms': 200,\n}  # 12 SLOs — engineers stop paying attention to any of them\n"
  when_applies: "When deciding how many SLOs a service needs, or when existing SLOs create fatigue because there are too many"
  sources:
  - url: https://sre.google/sre-book/service-level-objectives/
    title: 'Google SRE Book — Chapter 4: Service Level Objectives'
  validation_status: cross_checked
- id: CR-SRE-SLO-006
  text: Start with a loose SLO and tighten it over time. It is always easier to make commitments stricter than to loosen them — once users depend on a tight SLO, relaxing it feels like a regression.
  why: 'The SRE Book recommends iterating on SLOs rather than trying to get them perfect on day one. A loose initial SLO (e.g., 99.5%) gives you room to understand actual user needs, system behavior, and
    operational capacity. You can tighten to 99.9% once you have data. Going the other direction — committing to 99.99% then discovering you cannot sustain it — is painful. Users who built systems assuming
    99.99% will scream when you announce you are dropping to 99.9%. This is especially dangerous for infrastructure services where many consumers depend on the SLO for their own capacity planning. Google
    has teams that maintain internal SLOs tighter than published ones specifically to preserve the ability to publish tighter SLOs in the future without risk.

    '
  how_to_do_right: '1. Launch new services with an explicit "provisional SLO" label — communicate that it will be refined.

    2. Start at least one nine below where you think the SLO should be (if you think 99.9%, start at 99%).

    3. Collect 3-6 months of data before tightening. Look at: actual performance, user feedback, error budget consumption.

    4. When tightening, give consumers advance notice (e.g., 1 quarter) and document the change.

    5. Never loosen an SLO without executive communication — it may affect downstream SLAs.

    6. Maintain internal SLOs 2-5x tighter than external ones to create a tightening path.

    '
  severity: high
  technologies:
    lang: [general]
    platform: [cloud]
  domains:
    domain: [reliability]
    concern: [availability, slo]
  example_good: "# Start with provisional SLO, tighten with data\nclass ProvisionalSLO:\n    def __init__(self, initial_slo: float, min_data_months: int = 3):\n        self.slo = initial_slo\n        self.label = 'PROVISIONAL'\n        self.min_data_months = min_data_months\n        self.data_months = 0\n\n    def tighten(self, new_slo: float, justification: str):\n        assert new_slo > self.slo, 'Can only tighten, not loosen'\n        assert self.data_months >= self.min_data_months\n        print(f'Tightening SLO: {self.slo} -> {new_slo} ({justification})')\n        self.slo = new_slo\n        self.label = 'COMMITTED'\n\n# Start one nine below where you think it should be\nslo = ProvisionalSLO(initial_slo=0.99)  # Think 99.9%? Start at 99%\n"
  example_bad: "# Anti-pattern: committing to tight SLO on day one\nSLO = 0.9999  # Four nines promised to consumers on launch day\n# 3 months later: cannot sustain it, need to relax\n# But dependent services already built assuming 99.99%\n# Relaxing to 99.9% feels like a regression — users scream\n# We are trapped by our own premature commitment\n"
  when_applies: "When launching new services or establishing SLOs without historical performance data"
  sources:
  - url: https://sre.google/sre-book/service-level-objectives/
    title: 'Google SRE Book — Chapter 4: Service Level Objectives'
  validation_status: cross_checked
- id: CR-SRE-SLO-007
  text: Users depend on actual performance, not stated SLOs. If your service is significantly more reliable than its SLO, users will build systems that break when you regress to the stated SLO.
  why: 'Google experienced this firsthand with Chubby, their distributed lock service. Chubby was so reliable that dependent services stopped implementing graceful degradation for Chubby outages. When Chubby
    eventually had its first significant outage, the blast radius was enormous — services that should have degraded gracefully instead failed catastrophically. The SRE Book describes Google''s surprising
    solution: SRE intentionally induced planned outages in Chubby to ensure it did NOT significantly exceed its SLO. This trained dependent services to handle Chubby unavailability. The lesson is universal:
    over-reliability creates implicit dependencies that become catastrophic when violated. Running significantly above your SLO without deliberate action is creating a ticking time bomb of hidden dependencies.

    '
  how_to_do_right: '1. Monitor the gap between actual performance and SLO. If actual is > 10x better than SLO for 3+ months, act.

    2. Consider planned "brownouts" or synthetic error injection to enforce the SLO ceiling.

    3. Communicate to dependent teams: "Our SLO is 99.9%. Design for that, not for our current 99.999%."

    4. Review dependency architectures regularly — any service assuming upstream reliability above SLO is fragile.

    5. Add circuit breakers and fallbacks in dependent services for any upstream at the SLO level, not at the actual level.

    6. Log and publicize every time the service operates at SLO (not above it) to normalize that behavior.

    '
  severity: critical
  technologies:
    platform: [cloud]
  domains:
    domain: [architecture, reliability]
    concern: [availability, slo]
  example_good: "# Planned brownouts to prevent hidden over-reliability dependencies\nimport random\n\ndef inject_planned_downtime(service: str, slo: float, actual_30d: float):\n    \"\"\"If actual >> SLO for 3+ months, inject errors to enforce ceiling.\"\"\"\n    gap = actual_30d - slo\n    if gap > 0.001:  # More than 0.1% above SLO\n        synthetic_error_rate = gap * 0.5  # Close half the gap\n        print(f'{service}: injecting {synthetic_error_rate:.4%} synthetic errors')\n        print('Purpose: prevent dependent services from assuming over-reliability')\n        return synthetic_error_rate\n    return 0.0\n\n# Chubby lesson: over-reliable service → catastrophic blast radius when it finally fails\ninject_planned_downtime('lock-service', slo=0.9999, actual_30d=0.999999)\n"
  example_bad: "# Anti-pattern: letting actual performance far exceed SLO indefinitely\nSLO = 0.999  # Published SLO\nACTUAL = 0.999999  # Actual performance for 18 months\n\n# 50 dependent services built assuming 99.9999% (not the published 99.9%)\n# None implemented circuit breakers because 'it never goes down'\n# When we finally have a real outage at SLO level (99.9%):\n# ALL 50 services fail catastrophically — no graceful degradation\n"
  when_applies: "When a service significantly exceeds its SLO for extended periods, creating hidden implicit dependencies in downstream services"
  sources:
  - url: https://sre.google/sre-book/service-level-objectives/
    title: 'Google SRE Book — Chapter 4: Service Level Objectives'
  validation_status: cross_checked
- id: CR-SRE-SLO-008
  text: Choose different SLI types for different service categories. User-facing services need availability + latency. Storage services need durability + latency. Pipelines need throughput + end-to-end
    latency. One SLI template does not fit all.
  why: 'Google categorizes services and prescribes SLI types for each category because optimizing the wrong metric leads to wrong investment. A storage service optimizing for throughput while ignoring durability
    is a data loss incident waiting to happen. A user-facing API optimizing for throughput while ignoring latency is frustrating users who experience slow responses. A data pipeline optimizing for latency
    while ignoring throughput cannot process the daily batch on time. Each service category has a primary metric that, if degraded, causes the most user pain. Secondary metrics matter too but should not
    drive alerting — they should drive capacity planning.

    '
  how_to_do_right: '1. User-facing serving systems: primary SLIs = availability + latency (p50, p99). Secondary = throughput, correctness.

    2. Storage systems: primary SLIs = durability + availability. Secondary = latency, throughput.

    3. Data processing pipelines: primary SLIs = throughput + end-to-end latency (freshness). Secondary = correctness.

    4. Real-time systems: primary SLIs = latency (p99.9) + availability. Secondary = throughput.

    5. For all systems: track correctness as a health indicator even if it is not a primary SLO.

    6. Document why each SLI was chosen for each service — prevents future engineers from adding irrelevant ones.

    '
  severity: high
  technologies:
    lang: [general]
    platform: [redis, kafka]
  domains:
    domain: [observability, reliability]
    concern: [availability, slo]
  example_good: "# SLI types matched to service category\nSLI_TEMPLATES = {\n    'user_facing_api': {\n        'primary': ['availability', 'latency_p99'],\n        'secondary': ['throughput', 'correctness'],\n    },\n    'storage_system': {\n        'primary': ['durability', 'availability'],\n        'secondary': ['latency_p99', 'throughput'],\n    },\n    'data_pipeline': {\n        'primary': ['throughput', 'freshness'],\n        'secondary': ['correctness'],\n    },\n    'realtime_system': {\n        'primary': ['latency_p999', 'availability'],\n        'secondary': ['throughput'],\n    },\n}\n\ndef get_sli_template(service_category: str) -> dict:\n    return SLI_TEMPLATES[service_category]\n"
  example_bad: "# Anti-pattern: same SLI template for all service types\nUNIVERSAL_SLIS = ['availability', 'latency_p99', 'throughput']\n\ndef monitor_service(service):\n    for sli in UNIVERSAL_SLIS:\n        track(sli)\n    # Storage service optimizing throughput while ignoring durability\n    # Pipeline optimizing latency while ignoring freshness\n    # Wrong metric for wrong service = wrong investment\n"
  when_applies: "When choosing which SLIs to track for different service categories (user-facing, storage, pipeline, real-time)"
  sources:
  - url: https://sre.google/sre-book/service-level-objectives/
    title: 'Google SRE Book — Chapter 4: Service Level Objectives'
  validation_status: cross_checked
- id: CR-SRE-SLO-009
  text: SLOs are control mechanisms, not just measurement tools. An SLO that does not trigger concrete actions when breached is a vanity metric. The purpose of an SLO is to drive decisions — prioritization,
    deployment, investment.
  why: 'The SRE Book describes SLOs as operating within a control loop: measure SLI → compare to SLO → determine if action needed → take action. Without the action step, the SLO is decorative. Google uses
    SLOs to make specific decisions: Should we freeze deployments? Should we redirect engineering from features to reliability? Should we page an engineer? Should we escalate to leadership? Each SLO should
    have a written response plan: what happens at 80% budget consumed, at 50%, at 20%, at 0%. If the response plan is the same at all levels ("keep doing what we are doing"), the SLO is not driving decisions
    and should be removed or redesigned.

    '
  how_to_do_right: '1. For each SLO, write an explicit action plan: what happens when budget hits 80%, 50%, 20%, 0%.

    2. Actions must be concrete: "freeze deployments" not "pay more attention." "Redirect 2 engineers to reliability" not "investigate."

    3. Wire SLO breaches into alerting: pager for imminent breach, ticket for trending toward breach.

    4. Include SLO status in weekly planning: if budget is low, prioritize reliability work in the sprint.

    5. Track decisions driven by SLOs: "We delayed launch X because error budget was at 15%." This validates the SLO''s utility.

    6. If an SLO has not driven a decision in 6 months, either the threshold is wrong or the SLO is unnecessary.

    '
  severity: high
  technologies:
    lang: [general]
  domains:
    domain: [observability, reliability]
    concern: [availability, slo]
  example_good: "# SLOs as control mechanisms with explicit action plans\nclass SLOPolicy:\n    def __init__(self, slo: float, total_budget: int):\n        self.slo = slo\n        self.total_budget = total_budget\n\n    def action_plan(self, consumed_pct: float) -> dict:\n        if consumed_pct < 20:\n            return {'action': 'NORMAL', 'detail': 'Full velocity, monitor'}\n        elif consumed_pct < 50:\n            return {'action': 'CAUTION', 'detail': 'Extra review on deploys'}\n        elif consumed_pct < 80:\n            return {'action': 'REDIRECT', 'detail': 'Move 2 engineers to reliability'}\n        else:\n            return {'action': 'FREEZE', 'detail': 'Only rollbacks and reliability fixes'}\n\n# Each level triggers concrete actions — not vague 'pay more attention'\npolicy = SLOPolicy(slo=0.9995, total_budget=50000)\nprint(policy.action_plan(consumed_pct=75))  # REDIRECT — concrete action\n"
  example_bad: "# Anti-pattern: SLO as vanity metric with no action plan\nSLO = 0.9995\n\ndef check_slo(actual: float):\n    if actual < SLO:\n        print('SLO breached')  # And then what? Nobody knows.\n    # No action plan at any threshold\n    # Same response at 50% consumed as at 95% consumed\n    # SLO has never driven a prioritization decision in 6 months\n    # It is decorative — remove it or make it actionable\n"
  when_applies: "When SLOs exist but are not driving concrete prioritization decisions or when defining response plans for different budget consumption levels"
  sources:
  - url: https://sre.google/sre-book/service-level-objectives/
    title: 'Google SRE Book — Chapter 4: Service Level Objectives'
  validation_status: cross_checked
- id: CR-SRE-SLO-010
  text: SRE must review SLAs before business or legal commits them. Business teams often promise SLAs that are technically infeasible or economically irrational without understanding the engineering cost.
  why: 'Google found that business teams, under pressure to close deals, would commit to SLAs that required 10x the engineering investment to meet. A 99.999% availability SLA sounds like a minor improvement
    over 99.99% to a non-engineer, but it requires a fundamentally different architecture — multi-region active-active, synchronous replication, automated failover in seconds. The SRE Book positions SRE
    as the engineering check on SLA commitments. SRE quantifies what each SLA target costs in terms of infrastructure, engineering hours, and operational complexity. This prevents the business from making
    commitments that either bankrupt the engineering team or cannot be met (triggering financial penalties). The worst outcome is an SLA breach that damages customer trust and triggers contractual penalties
    simultaneously.

    '
  how_to_do_right: '1. Require SRE sign-off on all external SLAs before they are committed to customers.

    2. SRE provides a cost estimate for each SLA tier: "99.9% costs X/month, 99.99% costs 3X/month, 99.999% costs 10X/month."

    3. If business insists on an SLA SRE considers infeasible, escalate with a written risk assessment to VP level.

    4. Build SLA review into the contract approval process — not as an afterthought but as a required step.

    5. Track SLA margin (gap between actual performance and SLA) in real-time. If margin shrinks below 2x, alert.

    6. Include SLA renegotiation terms in contracts for when business requirements change.

    '
  severity: high
  technologies:
    lang: [general]
    platform: [cloud]
  domains:
    domain: [reliability]
    concern: [availability, slo]
  example_good: "# SRE reviews SLA before business commits\ndef sla_engineering_review(proposed_sla: float) -> dict:\n    cost_per_nine = {\n        0.999: 10_000,    # 99.9% — $10K/month\n        0.9999: 30_000,   # 99.99% — $30K/month (multi-region)\n        0.99999: 100_000, # 99.999% — $100K/month (active-active + sync replication)\n    }\n    closest_tier = min(cost_per_nine.keys(), key=lambda x: abs(x - proposed_sla))\n    monthly_cost = cost_per_nine[closest_tier]\n    return {\n        'proposed_sla': proposed_sla,\n        'monthly_infra_cost': monthly_cost,\n        'architecture_required': 'multi-region active-active' if proposed_sla >= 0.9999 else 'standard',\n        'sre_recommendation': 'APPROVE' if proposed_sla <= 0.9999 else 'ESCALATE_TO_VP',\n    }\n"
  example_bad: "# Anti-pattern: business commits SLA without engineering review\ndef close_deal(customer_request: str) -> str:\n    # Sales team promises 99.999% to close the deal\n    return 'SLA: 99.999% availability guaranteed'\n    # Engineering learns about it after contract is signed\n    # Requires active-active multi-region — $100K/month extra\n    # Current architecture cannot support it without 6-month rewrite\n    # SLA breach penalties start before engineering can build the infra\n"
  when_applies: "When business or sales teams propose SLA commitments to customers, before contracts are finalized"
  sources:
  - url: https://sre.google/sre-book/service-level-objectives/
    title: 'Google SRE Book — Chapter 4: Service Level Objectives'
  validation_status: cross_checked
- id: CR-SRE-SLO-011
  text: Measure SLIs from the user's perspective, not from the server's perspective. Server-side metrics miss entire classes of failures that users experience — DNS, CDN, TLS, client rendering, geographic
    routing.
  why: 'Google found that server-side monitoring misses 10-30% of user-visible failures. The server reports 200 OK but the user sees a blank page because a JavaScript bundle failed to load from the CDN.
    The server reports 50ms response time but the user in Australia experiences 2000ms because of geographic routing. The server reports zero errors but the user''s retry caused a double-charge because
    the timeout was set wrong. Client-side Real User Monitoring (RUM) captures what users actually experience, including: TLS handshake latency, DNS resolution failures, CDN cache misses, client-side rendering
    time, and third-party script failures. The gap between server-side metrics and client-side reality is where outages hide.

    '
  how_to_do_right: '1. Deploy client-side Real User Monitoring (RUM) in addition to server-side APM.

    2. Measure end-to-end latency (from user click to rendered response), not just server processing time.

    3. Track geographic distribution of latency — aggregate numbers hide regional problems.

    4. Monitor third-party dependencies (CDN, analytics scripts, payment processors) from the client side.

    5. Compare server-side metrics with client-side metrics regularly — the gap is your blind spot.

    6. Set SLOs on client-perceived metrics when possible: "95% of page loads complete in < 3 seconds" not "95% of API responses return in < 200ms."

    '
  severity: high
  technologies:
    lang: [general]
    platform: [opentelemetry]
  domains:
    domain: [observability, performance, reliability]
    concern: [availability, slo]
  example_good: "# Client-side RUM alongside server-side APM\nclass UserPerceivedMetrics:\n    \"\"\"Measure from user perspective, not server perspective.\"\"\"\n\n    def record_page_load(self, user_region: str, total_ms: float,\n                         dns_ms: float, tls_ms: float, server_ms: float,\n                         render_ms: float):\n        # End-to-end latency captures what server-side misses\n        client_overhead = total_ms - server_ms\n        print(f'Region={user_region}: total={total_ms}ms '\n              f'(server={server_ms}ms, DNS={dns_ms}ms, '\n              f'TLS={tls_ms}ms, render={render_ms}ms)')\n        # Server reports 50ms. User in Australia experiences 2000ms.\n        # RUM catches the difference.\n\n# SLO on client-perceived metric:\n# '95% of page loads complete in < 3 seconds' (not server response time)\n"
  example_bad: "# Anti-pattern: measuring only server-side latency\ndef track_request(start_time, end_time):\n    server_latency = end_time - start_time  # 50ms — looks great!\n    # But user sees:\n    # - DNS resolution: 500ms (geographic routing issue)\n    # - TLS handshake: 200ms\n    # - CDN cache miss: 1000ms (JS bundle not cached)\n    # - Client rendering: 800ms\n    # Total user experience: 2550ms (50x what server reports)\n    # Server-side monitoring is blind to 98% of the problem\n"
  when_applies: "When setting up monitoring for user-facing services, especially web applications with geographic distribution"
  sources:
  - url: https://sre.google/sre-book/service-level-objectives/
    title: 'Google SRE Book — Chapter 4: Service Level Objectives'
  validation_status: cross_checked
- id: CR-SRE-SLO-012
  text: Use tiered SLOs for services with heterogeneous workloads. A single latency SLO cannot fairly represent both interactive API calls and bulk data export operations on the same service.
  why: 'Google uses workload-class-specific SLOs because a single SLO for a mixed workload either over-constrains the cheap path or under-constrains the expensive path. An API that serves both single-item
    lookups (10ms) and complex aggregation queries (2000ms) cannot have one latency SLO. At p99 < 100ms, aggregation queries always breach. At p99 < 5000ms, lookup degradation is invisible. The solution
    is to classify requests by type and set SLOs per class: interactive lookups (p99 < 50ms), search queries (p99 < 500ms), bulk exports (p99 < 10s). Each class has its own error budget and alerting. This
    prevents bulk operations from consuming the interactive error budget and vice versa.

    '
  how_to_do_right: '1. Classify request types by expected behavior: interactive, batch, streaming, admin.

    2. Set separate SLOs for each class with appropriate targets.

    3. Tag requests with their class at the entry point (API gateway, load balancer) — not retrospectively.

    4. Dashboard each class separately. A green overall SLO can hide a red class-specific SLO.

    5. Error budgets are per-class: batch operations consuming budget should not freeze interactive deployments.

    6. Document which SLO class each API endpoint belongs to in the API documentation.

    '
  severity: medium
  technologies:
    platform: [cloud]
  domains:
    domain: [architecture, reliability]
    concern: [api_design, availability, slo]
  example_good: "# Tiered SLOs for heterogeneous workloads\nfrom enum import Enum\n\nclass RequestClass(Enum):\n    INTERACTIVE = 'interactive'  # Single-item lookups\n    SEARCH = 'search'            # Complex queries\n    BULK = 'bulk_export'          # Data export operations\n\nCLASS_SLOS = {\n    RequestClass.INTERACTIVE: {'p99_ms': 50, 'error_budget': 5000},\n    RequestClass.SEARCH: {'p99_ms': 500, 'error_budget': 10000},\n    RequestClass.BULK: {'p99_ms': 10000, 'error_budget': 50000},\n}\n\ndef classify_request(request) -> RequestClass:\n    if request.path.startswith('/export'):\n        return RequestClass.BULK\n    if request.path.startswith('/search'):\n        return RequestClass.SEARCH\n    return RequestClass.INTERACTIVE\n# Each class has its own budget — bulk does not consume interactive budget\n"
  example_bad: "# Anti-pattern: single SLO for mixed workloads\nSLO_LATENCY_P99 = 500  # ms — for ALL request types\n\n# Problem: bulk exports (10s normal) always breach the SLO\n# OR: SLO relaxed to 10s to accommodate bulk — interactive degradation invisible\n# Single SLO cannot fairly represent both 10ms lookups and 10s exports\n"
  when_applies: "When a service handles multiple request types with fundamentally different latency profiles (interactive, batch, streaming)"
  sources:
  - url: https://sre.google/sre-book/service-level-objectives/
    title: 'Google SRE Book — Chapter 4: Service Level Objectives'
  validation_status: cross_checked
- id: CR-SRE-SLO-013
  text: Measure data correctness as an SLI alongside availability and latency. A fast, available service that returns wrong answers is worse than a slow service that returns right ones.
  why: 'Google tracks correctness as a health indicator for ALL service types because incorrect results erode user trust faster than downtime. A search engine that returns irrelevant results loses users
    even if it has 100% availability and sub-millisecond latency. A financial service that calculates wrong balances causes legal liability. A recommendation engine that shows inappropriate content damages
    brand reputation. Correctness is harder to measure than availability (it requires semantic validation, not just HTTP status codes) but ignoring it means you can have perfect SLOs while your service
    is fundamentally broken. Google uses end-to-end probes with known-good inputs and expected outputs to continuously validate correctness.

    '
  how_to_do_right: '1. Define "correct" for your service: matching expected output, consistent across reads, up-to-date within N seconds.

    2. Deploy canary/golden queries with known correct answers — compare periodically.

    3. Track data freshness (staleness) as a correctness proxy: if cache is 30 minutes old, is that "correct" for your use case?

    4. For financial or legal services: implement reconciliation checks that compare output against source-of-truth.

    5. Set correctness SLOs: "99.99% of responses match the source of truth within 5 minutes of write."

    6. Alert on correctness regressions even when availability and latency are green — this is a separate failure mode.

    '
  severity: high
  technologies:
    lang: [general]
  domains:
    domain: [architecture, observability, reliability]
    concern: [data, availability, slo]
  example_good: "# Correctness SLI with canary queries and freshness tracking\nimport time\n\nGOLDEN_QUERIES = [\n    {'input': {'user_id': 'test_001'}, 'expected': {'balance': 1000.00}},\n    {'input': {'product_id': 'SKU_042'}, 'expected': {'price': 29.99}},\n]\n\ndef correctness_probe():\n    \"\"\"Run golden queries and compare to expected results.\"\"\"\n    correct = 0\n    for query in GOLDEN_QUERIES:\n        result = api_call(query['input'])\n        if result == query['expected']:\n            correct += 1\n    correctness_rate = correct / len(GOLDEN_QUERIES)\n    return correctness_rate  # SLO: 99.99% of probes match\n\ndef freshness_check(last_write_ts: float, max_staleness_s: float = 300):\n    staleness = time.time() - last_write_ts\n    return staleness <= max_staleness_s  # Is data fresh within 5 minutes?\n"
  example_bad: "# Anti-pattern: no correctness monitoring\ndef check_health():\n    # Only checks availability and latency\n    if response.status_code == 200 and response_time < 500:\n        return 'HEALTHY'\n    # Service returns 200 OK with wrong prices — undetected\n    # Service returns stale data from 3-hour-old cache — undetected\n    # Financial service calculates wrong balances — undetected until audit\n    # Perfect SLO dashboard while service is fundamentally broken\n"
  when_applies: "When monitoring service health beyond availability and latency, especially for services where incorrect results have legal or financial consequences"
  sources:
  - url: https://sre.google/sre-book/service-level-objectives/
    title: 'Google SRE Book — Chapter 4: Service Level Objectives'
  validation_status: cross_checked
- id: CR-SRE-SLO-014
  text: Avoid complex SLI aggregation formulas. The more complex the aggregation, the harder it is to understand what degraded and why. Simple, direct metrics enable faster diagnosis and clearer communication.
  why: 'The SRE Book warns that complex aggregations (weighted averages across regions, composite scores, multi-dimensional indices) obscure the signal. When a composite SLI degrades, engineers spend time
    decomposing the formula instead of fixing the problem. Google prefers simple, direct metrics that are immediately interpretable: "error rate is 2%" is actionable, "composite reliability index is 0.847"
    is not. Complex SLIs also make it harder to communicate with non-engineers. When leadership asks "why was the SLO breached?" the answer should be "error rate spiked to 5% due to a bad deployment" not
    "the weighted multi-variate index decreased because component 3 in the formula exceeded its sub-threshold." Simplicity in SLIs accelerates both diagnosis and decision-making.

    '
  how_to_do_right: '1. Each SLI should be expressible in one sentence: "percentage of requests completing successfully within 200ms."

    2. Avoid weighted averages, composite indices, or formulas that combine multiple dimensions.

    3. If you need to capture multiple dimensions, use multiple simple SLOs — not one complex one.

    4. SLIs should be directly plottable as a single time series that any engineer can interpret.

    5. Test your SLI: can a new team member understand it in 30 seconds? If not, simplify.

    6. When you feel tempted to create a complex SLI, ask: "Which simple metric would I look at first to debug a problem?" That metric is your SLI.

    '
  severity: medium
  technologies:
    lang: [general]
    platform: [prometheus]
  domains:
    domain: [observability, reliability]
    concern: [availability, slo]
  example_good: "# Simple, directly interpretable SLI\nSIMPLE_SLI = 'percentage of requests completing successfully within 200ms'\n# Expressible in one sentence\n# Directly plottable as single time series\n# Any engineer understands it in 30 seconds\n# When it degrades: 'error rate spiked to 5% due to bad deployment'\n\ndef calculate_sli(success_count: int, total_count: int) -> float:\n    return success_count / total_count if total_count > 0 else 1.0\n"
  example_bad: "# Anti-pattern: complex composite SLI\ndef composite_reliability_index(metrics: dict) -> float:\n    # Weighted multi-variate index nobody understands\n    return (\n        metrics['availability'] * 0.4 +\n        (1 - metrics['error_rate']) * 0.3 +\n        (1 - metrics['latency_p99'] / 10000) * 0.2 +\n        metrics['throughput'] / metrics['max_throughput'] * 0.1\n    )\n    # Result: 0.847 — what does this mean? Is it good?\n    # When it degrades: 'composite index decreased because component 3\n    # in the formula exceeded its sub-threshold' — not actionable\n"
  when_applies: "When designing SLI formulas and deciding between simple direct metrics versus complex weighted aggregations"
  sources:
  - url: https://sre.google/sre-book/service-level-objectives/
    title: 'Google SRE Book — Chapter 4: Service Level Objectives'
  validation_status: cross_checked
- id: CR-SRE-SLO-015
  text: Maintain a safety margin between internal SLOs and external SLAs. Your internal target should be tighter than what you promise customers — the gap is your insurance against chronic issues and unexpected
    events.
  why: 'Google maintains internal SLOs significantly tighter than published SLAs specifically to create a buffer zone. If your SLA promises 99.9% and your internal SLO is also 99.9%, every minor incident
    risks an SLA breach with financial and legal consequences. With an internal SLO of 99.95%, you have a 0.05% buffer — approximately 4 hours per year — to absorb unexpected issues before they become customer-impacting
    breaches. This safety margin also provides time to detect and mitigate problems before they reach SLA breach territory. Without it, the first sign of trouble is often a contractual violation. The margin
    should be proportional to the volatility of your service — more volatile services need larger margins.

    '
  how_to_do_right: '1. Set internal SLOs at least 2-5x tighter than external SLAs in terms of error budget.

    2. Example: SLA 99.9% (43 min downtime/month), internal SLO 99.95% (21 min/month) — 22 minute buffer.

    3. Alert on internal SLO breach (early warning), escalate on SLA trajectory (imminent customer impact).

    4. Track the margin in real-time: "We are 15 minutes from SLA breach at current error rate."

    5. If the margin is consistently consumed (SLO breached but SLA met), investigate systemic issues — the margin is covering for a problem.

    6. Review the margin annually: if SLA breach has never been close, the internal SLO may be too tight (wasting effort) or too loose (too much margin).

    '
  severity: high
  technologies:
    lang: [general]
    platform: [cloud]
  domains:
    domain: [reliability]
    concern: [availability, slo]
  example_good: "# Safety margin between internal SLO and external SLA\n@dataclass\nclass SLOSLAMargin:\n    internal_slo: float = 0.9995  # 99.95% — internal target\n    external_sla: float = 0.999   # 99.9% — customer promise\n\n    @property\n    def margin_minutes_per_month(self) -> float:\n        \"\"\"Buffer time before SLA breach.\"\"\"\n        total_minutes = 30 * 24 * 60  # ~43,200 min/month\n        slo_downtime = total_minutes * (1 - self.internal_slo)  # ~21 min\n        sla_downtime = total_minutes * (1 - self.external_sla)  # ~43 min\n        return sla_downtime - slo_downtime  # ~22 min buffer\n\n    def alert_level(self, current: float) -> str:\n        if current < self.external_sla:\n            return 'SLA_BREACH: contractual violation'\n        if current < self.internal_slo:\n            return 'SLO_BREACH: early warning — fix before SLA impact'\n        return 'HEALTHY'\n\nmargin = SLOSLAMargin()\nprint(f'Buffer: {margin.margin_minutes_per_month:.0f} minutes/month')\n"
  example_bad: "# Anti-pattern: no margin between SLO and SLA\nINTERNAL_SLO = 0.999\nEXTERNAL_SLA = 0.999  # Same value!\n\ndef check(actual: float):\n    if actual < EXTERNAL_SLA:\n        trigger_contractual_penalty()  # First sign = legal consequences\n    # Zero buffer — every minor incident risks SLA breach\n    # No time to detect and mitigate before customer impact\n"
  when_applies: "When defining the relationship between internal SLO targets and external SLA commitments to ensure adequate safety margins"
  sources:
  - url: https://sre.google/sre-book/service-level-objectives/
    title: 'Google SRE Book — Chapter 4: Service Level Objectives'
  validation_status: cross_checked
