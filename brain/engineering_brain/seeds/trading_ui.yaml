layer: rules
domain: prediction_markets
knowledge:
- id: PM-UI-001
  text: "Order form must clearly separate Buy YES and Buy NO actions with distinct colors and labels to prevent accidental trades."
  why: >
    In prediction markets, clicking the wrong side of a trade is the most common user error.
    Unlike stock trading (buy/sell), prediction markets have YES/NO which is cognitively harder.
    One Polymarket user reported losing $2,400 by accidentally buying YES when they meant NO
    because the buttons were too similar. Confirmation bias makes users skip confirmations.
  how_to_do_right: |
    1. Use green for YES and red for NO with high contrast (WCAG AA minimum 4.5:1)
    2. Label buttons explicitly: "Buy YES at $0.65" not just "Buy"
    3. Show estimated cost and potential payout BEFORE the user clicks
    4. Disable the submit button until amount > 0 and price is valid
    5. Add a 300ms debounce on submit to prevent double-clicks
  severity: high
  technologies:
    lang: [javascript, typescript]
    framework: [react]
  domains:
    domain: [prediction_markets, ui]
    concern: [domain_specific]
  example_good: |
    function OrderForm({ market }) {
      const [side, setSide] = useState<'YES' | 'NO'>('YES');
      const [amount, setAmount] = useState(0);
      const estimatedCost = amount * market.price;
      const potentialPayout = amount;

      return (
        <div className="order-form">
          <div className="side-selector">
            <button
              className={`btn-yes ${side === 'YES' ? 'active' : ''}`}
              style={{ backgroundColor: side === 'YES' ? '#22c55e' : '#e5e7eb' }}
              onClick={() => setSide('YES')}
            >
              Buy YES at ${market.yesPrice.toFixed(2)}
            </button>
            <button
              className={`btn-no ${side === 'NO' ? 'active' : ''}`}
              style={{ backgroundColor: side === 'NO' ? '#ef4444' : '#e5e7eb' }}
              onClick={() => setSide('NO')}
            >
              Buy NO at ${market.noPrice.toFixed(2)}
            </button>
          </div>
          <input type="number" min={1} value={amount} onChange={e => setAmount(+e.target.value)} />
          <div className="estimate">
            <span>Cost: ${estimatedCost.toFixed(2)}</span>
            <span>Potential payout: ${potentialPayout.toFixed(2)}</span>
          </div>
          <button disabled={amount <= 0} onClick={handleSubmit}>
            Confirm {side} — ${estimatedCost.toFixed(2)}
          </button>
        </div>
      );
    }
  example_bad: |
    // No visual distinction, no cost preview, confusing labels
    function OrderForm({ market }) {
      return (
        <div>
          <button onClick={() => buy('yes')}>Buy</button>
          <button onClick={() => buy('no')}>Sell</button>
          <input type="number" />
          <button>Submit</button>
        </div>
      );
    }
  when_applies: Any prediction market or binary options trading interface where users buy YES/NO positions
  sources: ["https://www.w3.org/TR/WCAG21/"]

- id: PM-UI-002
  text: "Order book visualization must show bid/ask depth as a stacked area chart with clear price levels and cumulative volume."
  why: >
    Traders need to see liquidity at each price level to make informed decisions. A flat table of bids/asks
    forces mental math. Depth charts show at a glance where large orders sit and where price might move.
    Without depth visualization, users place orders at prices with no liquidity and experience slippage
    of 5-15% on prediction market platforms with thin order books.
  how_to_do_right: |
    1. Use a mirrored area chart: bids (green) on left, asks (red) on right
    2. X-axis is price (0.00 to 1.00 for prediction markets), Y-axis is cumulative volume
    3. Highlight the spread (gap between best bid and best ask)
    4. Show tooltip on hover with exact price, volume at level, and cumulative volume
    5. Update in real-time via WebSocket, but batch updates every 250ms to avoid flicker
  severity: high
  technologies:
    lang: [javascript, typescript]
    framework: [react]
    library: [d3, lightweight-charts]
  domains:
    domain: [prediction_markets, ui]
    concern: [domain_specific]
  example_good: |
    function DepthChart({ bids, asks }) {
      // bids sorted descending by price, asks ascending
      const cumulativeBids = bids.reduce((acc, { price, volume }) => {
        const prev = acc.length > 0 ? acc[acc.length - 1].cumulative : 0;
        acc.push({ price, cumulative: prev + volume });
        return acc;
      }, []);

      const cumulativeAsks = asks.reduce((acc, { price, volume }) => {
        const prev = acc.length > 0 ? acc[acc.length - 1].cumulative : 0;
        acc.push({ price, cumulative: prev + volume });
        return acc;
      }, []);

      return (
        <svg width={600} height={300}>
          <AreaPath data={cumulativeBids} fill="rgba(34,197,94,0.3)" stroke="#22c55e" />
          <AreaPath data={cumulativeAsks} fill="rgba(239,68,68,0.3)" stroke="#ef4444" />
          <SpreadIndicator bestBid={bids[0]?.price} bestAsk={asks[0]?.price} />
        </svg>
      );
    }
  example_bad: |
    // Raw table with no visualization — user must mentally compute depth
    function OrderBook({ bids, asks }) {
      return (
        <table>
          {bids.map(b => <tr><td>{b.price}</td><td>{b.volume}</td></tr>)}
          {asks.map(a => <tr><td>{a.price}</td><td>{a.volume}</td></tr>)}
        </table>
      );
    }
  when_applies: Any trading interface with an order book, prediction markets with limit orders
  sources: ["https://d3js.org/"]

- id: PM-UI-003
  text: "Use TradingView's lightweight-charts library for price history charts — it handles candlesticks, time axes, and real-time updates with minimal bundle size."
  why: >
    Building a custom candlestick chart from scratch with D3 takes 2-4 weeks and produces
    inferior results. lightweight-charts is 40KB gzipped, GPU-accelerated via Canvas, handles
    time zones, crosshairs, and real-time data appending natively. D3-based charts often have
    performance issues with >10,000 data points and require manual resize handling.
  how_to_do_right: |
    1. Install lightweight-charts (npm install lightweight-charts)
    2. Use createChart() with autoSize: true for responsive behavior
    3. Add candlestick series for OHLC data or line series for simple price
    4. Use chart.timeScale().fitContent() after initial data load
    5. For real-time updates, use series.update() not series.setData() (O(1) vs O(n))
    6. Dispose chart on component unmount to prevent memory leaks
  severity: high
  technologies:
    lang: [javascript, typescript]
    framework: [react]
    library: [lightweight-charts]
  domains:
    domain: [prediction_markets, ui]
    concern: [domain_specific]
  example_good: |
    import { createChart, ColorType } from 'lightweight-charts';
    import { useRef, useEffect } from 'react';

    function PriceChart({ data, containerRef }) {
      const chartRef = useRef(null);
      const seriesRef = useRef(null);

      useEffect(() => {
        const chart = createChart(containerRef.current, {
          autoSize: true,
          layout: { background: { type: ColorType.Solid, color: '#1a1a2e' }, textColor: '#e0e0e0' },
          grid: { vertLines: { color: '#2a2a3e' }, horzLines: { color: '#2a2a3e' } },
          timeScale: { timeVisible: true, secondsVisible: false },
        });
        const series = chart.addCandlestickSeries({
          upColor: '#22c55e', downColor: '#ef4444',
          borderVisible: false, wickUpColor: '#22c55e', wickDownColor: '#ef4444',
        });
        series.setData(data);
        chart.timeScale().fitContent();
        chartRef.current = chart;
        seriesRef.current = series;

        return () => chart.remove(); // cleanup
      }, []);

      // Real-time update: O(1) append
      useEffect(() => {
        if (seriesRef.current && data.length > 0) {
          seriesRef.current.update(data[data.length - 1]);
        }
      }, [data]);

      return <div ref={containerRef} style={{ width: '100%', height: 400 }} />;
    }
  example_bad: |
    // Building candlestick chart from scratch with D3 — slow, buggy, 500+ lines
    function PriceChart({ data }) {
      useEffect(() => {
        const svg = d3.select('#chart').append('svg');
        // ... 500 lines of manual axis, candlestick rendering, resize handling
        // No GPU acceleration, janky with >5000 points
        // Memory leak: never removes SVG on re-render
      }, [data]); // Re-renders entire chart on every data change
      return <div id="chart" />;
    }
  when_applies: Any trading platform showing price history, candlestick charts, or time-series financial data
  sources: ["https://tradingview.github.io/lightweight-charts/"]

- id: PM-UI-004
  text: "Real-time price ticker must use WebSocket with automatic reconnection and show last price, change percentage, and 24h volume."
  why: >
    HTTP polling for price data wastes bandwidth and introduces 1-5 second latency.
    Users making trading decisions need sub-second price updates. If the WebSocket disconnects
    silently, users see stale prices and may trade on outdated data — a direct financial risk.
    One prediction market had a bug where stale prices displayed for 30 seconds after disconnect,
    causing users to buy at prices 10-15% off from actual market.
  how_to_do_right: |
    1. Use WebSocket with exponential backoff reconnection (1s, 2s, 4s, max 30s)
    2. Show visual indicator when connection is lost (yellow dot) or reconnecting (spinning)
    3. Display last price, 24h change %, 24h volume, and last update timestamp
    4. Flash green/red briefly on price change (200ms CSS transition)
    5. If disconnected >5 seconds, show "Price may be stale" warning
    6. On reconnect, fetch full snapshot before resuming incremental updates
  severity: critical
  technologies:
    lang: [javascript, typescript]
    framework: [react]
  domains:
    domain: [prediction_markets, ui, realtime]
    concern: [domain_specific]
  example_good: |
    function usePriceTicker(marketId: string) {
      const [price, setPrice] = useState({ last: 0, change24h: 0, volume24h: 0 });
      const [status, setStatus] = useState<'connected' | 'reconnecting' | 'stale'>('reconnecting');
      const wsRef = useRef<WebSocket | null>(null);
      const retryRef = useRef(1000);

      const connect = useCallback(() => {
        const ws = new WebSocket(`wss://api.example.com/ws/prices/${marketId}`);
        ws.onopen = () => { setStatus('connected'); retryRef.current = 1000; };
        ws.onmessage = (e) => {
          const data = JSON.parse(e.data);
          setPrice({ last: data.price, change24h: data.change_24h, volume24h: data.volume_24h });
        };
        ws.onclose = () => {
          setStatus('reconnecting');
          setTimeout(connect, retryRef.current);
          retryRef.current = Math.min(retryRef.current * 2, 30000);
        };
        wsRef.current = ws;
      }, [marketId]);

      useEffect(() => { connect(); return () => wsRef.current?.close(); }, [connect]);
      return { price, status };
    }
  example_bad: |
    // HTTP polling every 5 seconds — wasteful, laggy, no disconnect detection
    function usePriceTicker(marketId) {
      const [price, setPrice] = useState(0);
      useEffect(() => {
        const interval = setInterval(async () => {
          const res = await fetch(`/api/price/${marketId}`);
          const data = await res.json();
          setPrice(data.price); // No change %, no volume, no stale detection
        }, 5000);
        return () => clearInterval(interval);
      }, [marketId]);
      return price;
    }
  when_applies: Any real-time trading interface, prediction market ticker, or financial data dashboard
  sources: ["https://datatracker.ietf.org/doc/html/rfc6455"]

- id: PM-UI-005
  text: "Trading interfaces must be mobile-first responsive — 60%+ of prediction market users trade on mobile devices."
  why: >
    Polymarket and Kalshi report over 60% of trades originate from mobile devices.
    A desktop-only trading UI loses the majority of users. Touch targets smaller than
    44px cause mis-taps on order forms, which in trading means accidental orders.
    Complex multi-panel layouts that work on desktop become unusable on 375px screens
    without deliberate responsive design.
  how_to_do_right: |
    1. Design mobile layout first (375px), then expand to tablet (768px) and desktop (1024px+)
    2. Minimum touch target 44x44px for all interactive elements (Apple HIG standard)
    3. Stack order form, chart, and order book vertically on mobile (not side-by-side)
    4. Use bottom sheet pattern for order form on mobile (thumb-reachable)
    5. Hide advanced features (depth chart, order history) behind tabs on mobile
    6. Test on actual devices — emulators miss touch precision issues
  severity: high
  technologies:
    lang: [javascript, typescript]
    framework: [react]
  domains:
    domain: [prediction_markets, ui, mobile]
    concern: [domain_specific]
  example_good: |
    // Mobile-first layout with responsive breakpoints
    function TradingView({ market }) {
      const isMobile = useMediaQuery('(max-width: 768px)');

      if (isMobile) {
        return (
          <div className="flex flex-col h-screen">
            <PriceTicker market={market} />
            <div className="flex-1 overflow-y-auto">
              <Tabs defaultTab="chart">
                <Tab label="Chart"><PriceChart data={market.priceHistory} /></Tab>
                <Tab label="Book"><OrderBook bids={market.bids} asks={market.asks} /></Tab>
                <Tab label="Trades"><RecentTrades trades={market.trades} /></Tab>
              </Tabs>
            </div>
            <BottomSheet>
              <OrderForm market={market} /> {/* Thumb-reachable */}
            </BottomSheet>
          </div>
        );
      }

      return (
        <div className="grid grid-cols-3 gap-4 h-screen p-4">
          <div className="col-span-2"><PriceChart data={market.priceHistory} /></div>
          <div><OrderForm market={market} /><OrderBook bids={market.bids} asks={market.asks} /></div>
        </div>
      );
    }
  example_bad: |
    // Desktop-only layout — unusable on mobile
    function TradingView({ market }) {
      return (
        <div style={{ display: 'flex', width: 1400 }}> {/* Fixed width! */}
          <div style={{ width: 900 }}><PriceChart /></div>
          <div style={{ width: 250 }}><OrderBook /></div>
          <div style={{ width: 250 }}><OrderForm /></div> {/* Tiny buttons */}
        </div>
      );
    }
  when_applies: Any prediction market or trading platform targeting consumer users
  sources: ["https://react.dev/"]

- id: PM-UI-006
  text: "Portfolio view must show positions with current value, P&L (both absolute and percentage), and allow sorting by any column."
  why: >
    Traders need to quickly assess their exposure and performance. A portfolio view that only
    shows quantity without P&L forces users to manually calculate profit/loss. Without percentage
    P&L, a $50 gain on a $5,000 position looks the same as $50 on a $100 position. Sortable
    columns let users find their worst-performing positions first for risk management.
  how_to_do_right: |
    1. Show for each position: market name, side (YES/NO), quantity, avg entry price, current price, P&L ($), P&L (%), current value
    2. Color P&L green for profit, red for loss
    3. Show total portfolio value and total P&L at the top
    4. Allow sorting by any column (click header to sort)
    5. Include resolved vs active position tabs
    6. Update values in real-time via WebSocket
  severity: high
  technologies:
    lang: [javascript, typescript]
    framework: [react]
  domains:
    domain: [prediction_markets, ui]
    concern: [domain_specific]
  example_good: |
    interface Position {
      marketId: string;
      marketName: string;
      side: 'YES' | 'NO';
      quantity: number;
      avgEntryPrice: number;
      currentPrice: number;
    }

    function Portfolio({ positions }: { positions: Position[] }) {
      const [sortKey, setSortKey] = useState<keyof Position>('marketName');
      const [sortDir, setSortDir] = useState<'asc' | 'desc'>('asc');

      const enriched = positions.map(p => ({
        ...p,
        currentValue: p.quantity * p.currentPrice,
        pnl: p.quantity * (p.currentPrice - p.avgEntryPrice),
        pnlPercent: ((p.currentPrice - p.avgEntryPrice) / p.avgEntryPrice) * 100,
      }));

      const sorted = [...enriched].sort((a, b) =>
        sortDir === 'asc' ? (a[sortKey] > b[sortKey] ? 1 : -1) : (a[sortKey] < b[sortKey] ? 1 : -1)
      );

      const totalValue = enriched.reduce((s, p) => s + p.currentValue, 0);
      const totalPnl = enriched.reduce((s, p) => s + p.pnl, 0);

      return (
        <div>
          <div className="portfolio-summary">
            <span>Total: ${totalValue.toFixed(2)}</span>
            <span className={totalPnl >= 0 ? 'text-green' : 'text-red'}>
              P&L: ${totalPnl.toFixed(2)}
            </span>
          </div>
          <table>
            <thead>
              <tr>
                {['marketName', 'side', 'quantity', 'avgEntryPrice', 'currentPrice', 'pnl', 'pnlPercent'].map(col => (
                  <th key={col} onClick={() => handleSort(col)}>{col}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {sorted.map(p => (
                <tr key={p.marketId}>
                  <td>{p.marketName}</td>
                  <td>{p.side}</td>
                  <td>{p.quantity}</td>
                  <td>${p.avgEntryPrice.toFixed(2)}</td>
                  <td>${p.currentPrice.toFixed(2)}</td>
                  <td className={p.pnl >= 0 ? 'text-green' : 'text-red'}>${p.pnl.toFixed(2)}</td>
                  <td className={p.pnlPercent >= 0 ? 'text-green' : 'text-red'}>{p.pnlPercent.toFixed(1)}%</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }
  example_bad: |
    // No P&L calculation, no sorting, no summary
    function Portfolio({ positions }) {
      return (
        <ul>
          {positions.map(p => (
            <li>{p.marketName}: {p.quantity} shares</li>
          ))}
        </ul>
      );
    }
  when_applies: Any prediction market or trading platform with user positions
  sources: ["https://react.dev/"]

- id: PM-UI-007
  text: "Market cards must show the question, current YES price, 24h volume, and resolution date — these are the four critical decision factors for prediction market users."
  why: >
    Users browse markets like a feed. If the card does not immediately show the price
    (probability), volume (liquidity), and resolution date (time horizon), users must
    click into every market to evaluate it. This increases bounce rate by 40-60%.
    Polymarket's most effective design change was adding volume and resolution date
    to market cards, which increased engagement by 25%.
  how_to_do_right: |
    1. Show market question as the card title (truncate at 120 chars with tooltip)
    2. Display YES price prominently as a percentage (e.g., "65% YES")
    3. Show 24h volume in compact format ($1.2K, $45K, $1.2M)
    4. Show resolution date with relative time ("Resolves in 3 days")
    5. Use color bar showing YES/NO ratio visually
    6. Include category tag for filtering (Politics, Sports, Crypto, etc.)
  severity: high
  technologies:
    lang: [javascript, typescript]
    framework: [react]
  domains:
    domain: [prediction_markets, ui]
    concern: [domain_specific]
  example_good: |
    function MarketCard({ market }) {
      const daysUntilResolution = Math.ceil(
        (new Date(market.resolutionDate) - Date.now()) / (1000 * 60 * 60 * 24)
      );

      return (
        <div className="market-card p-4 rounded-lg border hover:shadow-md cursor-pointer">
          <span className="category-tag text-xs px-2 py-1 rounded bg-blue-100">{market.category}</span>
          <h3 className="text-lg font-semibold mt-2 line-clamp-2" title={market.question}>
            {market.question}
          </h3>
          <div className="probability-bar mt-3 h-2 rounded-full bg-gray-200">
            <div className="h-full rounded-full bg-green-500" style={{ width: `${market.yesPrice * 100}%` }} />
          </div>
          <div className="flex justify-between mt-2 text-sm">
            <span className="font-bold text-green-600">{(market.yesPrice * 100).toFixed(0)}% YES</span>
            <span className="text-gray-500">Vol: {formatVolume(market.volume24h)}</span>
          </div>
          <div className="text-xs text-gray-400 mt-1">
            Resolves {daysUntilResolution > 0 ? `in ${daysUntilResolution} days` : 'today'}
          </div>
        </div>
      );
    }
  example_bad: |
    // Missing key info, user must click to see anything useful
    function MarketCard({ market }) {
      return (
        <div className="card">
          <h3>{market.question}</h3>
          <a href={`/market/${market.id}`}>View</a>
        </div>
      );
    }
  when_applies: Any prediction market platform with a market listing or discovery page
  sources: ["https://react.dev/"]

- id: PM-UI-008
  text: "Market search must support full-text search with category filtering, and results must show relevant market metadata inline."
  why: >
    As prediction market platforms grow beyond 100 markets, users cannot browse them all.
    Without search, users only trade on markets they stumble upon. Category filters
    (Politics, Sports, Crypto, Science) reduce cognitive load. Showing metadata in
    search results prevents unnecessary clicks into irrelevant markets.
  how_to_do_right: |
    1. Implement full-text search with debounced input (300ms)
    2. Add category filter chips (multi-select) that combine with search query
    3. Show market card preview in results (question, price, volume, resolution date)
    4. Sort results by relevance, with option to sort by volume or resolution date
    5. Show "No results" state with suggestion to browse categories
    6. Index market questions, descriptions, and tags for search
  severity: high
  technologies:
    lang: [javascript, typescript]
    framework: [react]
  domains:
    domain: [prediction_markets, ui]
    concern: [domain_specific]
  example_good: |
    function MarketSearch() {
      const [query, setQuery] = useState('');
      const [categories, setCategories] = useState<string[]>([]);
      const [sortBy, setSortBy] = useState<'relevance' | 'volume' | 'resolution'>('relevance');
      const debouncedQuery = useDebounce(query, 300);

      const { data: markets, isLoading } = useQuery(
        ['markets', debouncedQuery, categories, sortBy],
        () => searchMarkets({ query: debouncedQuery, categories, sortBy }),
        { keepPreviousData: true }
      );

      return (
        <div>
          <input
            type="search"
            placeholder="Search markets..."
            value={query}
            onChange={e => setQuery(e.target.value)}
          />
          <div className="category-filters flex gap-2 mt-2">
            {CATEGORIES.map(cat => (
              <button
                key={cat}
                className={categories.includes(cat) ? 'chip-active' : 'chip'}
                onClick={() => toggleCategory(cat)}
              >
                {cat}
              </button>
            ))}
          </div>
          {isLoading ? <LoadingSpinner /> : (
            <div className="results mt-4 grid gap-3">
              {markets?.map(m => <MarketCard key={m.id} market={m} />)}
              {markets?.length === 0 && <EmptyState suggestion="Browse categories above" />}
            </div>
          )}
        </div>
      );
    }
  example_bad: |
    // No debounce, no category filter, no loading state, no empty state
    function MarketSearch() {
      const [query, setQuery] = useState('');
      const [markets, setMarkets] = useState([]);

      const handleSearch = async (e) => {
        setQuery(e.target.value);
        const res = await fetch(`/api/search?q=${e.target.value}`); // fires on every keystroke
        setMarkets(await res.json());
      };

      return (
        <div>
          <input onChange={handleSearch} />
          {markets.map(m => <div>{m.question}</div>)}
        </div>
      );
    }
  when_applies: Any prediction market platform with more than 20 active markets
  sources: ["https://react.dev/"]

- id: PM-UI-009
  text: "Notification preferences must let users configure alerts per market (price threshold, resolution, new comments) and per channel (in-app, email, push)."
  why: >
    Prediction market traders need timely alerts for price movements on their positions.
    A trader holding a YES position at $0.70 needs to know when price drops to $0.50 to
    decide whether to sell. Blast notifications with no preferences lead to notification
    fatigue and users disabling all alerts, missing critical price movements.
  how_to_do_right: |
    1. Allow per-market alerts: price above/below threshold, resolution, volume spike
    2. Allow channel selection: in-app (always on), email (opt-in), push (opt-in)
    3. Provide a global quiet hours setting (e.g., no push 11pm-7am)
    4. Show notification preview before save
    5. Include one-click "mute market" for resolved or uninteresting markets
    6. Batch low-priority notifications into a daily digest email
  severity: high
  technologies:
    lang: [javascript, typescript]
    framework: [react]
  domains:
    domain: [prediction_markets, ui]
    concern: [domain_specific]
  example_good: |
    interface NotificationPrefs {
      marketAlerts: {
        marketId: string;
        priceAbove?: number;
        priceBelow?: number;
        onResolution: boolean;
        onNewComments: boolean;
      }[];
      channels: {
        inApp: boolean;
        email: boolean;
        push: boolean;
      };
      quietHours: { start: string; end: string } | null;
    }

    function NotificationSettings({ prefs, onSave }: { prefs: NotificationPrefs; onSave: (p: NotificationPrefs) => void }) {
      return (
        <div className="notification-settings">
          <section>
            <h3>Channels</h3>
            <Toggle label="In-app notifications" checked={prefs.channels.inApp} disabled />
            <Toggle label="Email notifications" checked={prefs.channels.email} onChange={toggleEmail} />
            <Toggle label="Push notifications" checked={prefs.channels.push} onChange={togglePush} />
          </section>
          <section>
            <h3>Quiet Hours</h3>
            <TimeRangePicker value={prefs.quietHours} onChange={setQuietHours} />
          </section>
          <section>
            <h3>Market Alerts</h3>
            {prefs.marketAlerts.map(alert => (
              <MarketAlertRow key={alert.marketId} alert={alert} onChange={updateAlert} />
            ))}
          </section>
          <button onClick={() => onSave(prefs)}>Save Preferences</button>
        </div>
      );
    }
  example_bad: |
    // Binary on/off — user gets ALL notifications or NONE
    function NotificationSettings() {
      const [enabled, setEnabled] = useState(true);
      return <Toggle label="Notifications" checked={enabled} onChange={setEnabled} />;
    }
  when_applies: Any prediction market platform with user accounts and trading positions
  sources: ["https://react.dev/"]

- id: PM-UI-010
  text: "Trade confirmation modal must show all trade details (side, quantity, price, estimated cost, fees, potential payout) and require explicit confirmation before execution."
  why: >
    Accidental trades in prediction markets are irreversible on-chain and expensive to
    unwind on centralized platforms (spread cost). A single missing confirmation step
    on a DeFi prediction market led to a user accidentally placing a $10,000 order
    instead of $100 (missed a zero). The confirmation modal is the last line of defense.
  how_to_do_right: |
    1. Show all details: market question, side (YES/NO), quantity, limit price, estimated cost, fees, potential payout
    2. Highlight the total cost prominently (largest font)
    3. Show "You are buying X shares of YES at $Y" in plain language
    4. Require clicking "Confirm Trade" (not just closing the modal)
    5. Add a 1-second delay before the confirm button becomes clickable
    6. Show estimated execution time and whether the order is market or limit
  severity: critical
  technologies:
    lang: [javascript, typescript]
    framework: [react]
  domains:
    domain: [prediction_markets, ui]
    concern: [domain_specific]
  example_good: |
    function TradeConfirmationModal({ trade, onConfirm, onCancel }) {
      const [canConfirm, setCanConfirm] = useState(false);

      useEffect(() => {
        const timer = setTimeout(() => setCanConfirm(true), 1000);
        return () => clearTimeout(timer);
      }, []);

      return (
        <Modal onClose={onCancel}>
          <h2>Confirm Trade</h2>
          <p className="text-lg font-medium">
            You are buying <strong>{trade.quantity}</strong> shares of
            <strong className={trade.side === 'YES' ? 'text-green' : 'text-red'}> {trade.side}</strong>
          </p>
          <div className="trade-details mt-4 space-y-2">
            <Row label="Market" value={trade.marketQuestion} />
            <Row label="Price per share" value={`$${trade.price.toFixed(2)}`} />
            <Row label="Quantity" value={trade.quantity} />
            <Row label="Subtotal" value={`$${(trade.price * trade.quantity).toFixed(2)}`} />
            <Row label="Fees" value={`$${trade.fees.toFixed(2)}`} />
            <Divider />
            <Row label="Total Cost" value={`$${trade.totalCost.toFixed(2)}`} className="text-xl font-bold" />
            <Row label="Potential Payout" value={`$${trade.potentialPayout.toFixed(2)}`} className="text-green-600" />
          </div>
          <div className="flex gap-3 mt-6">
            <button className="btn-secondary" onClick={onCancel}>Cancel</button>
            <button
              className="btn-primary"
              disabled={!canConfirm}
              onClick={onConfirm}
            >
              {canConfirm ? 'Confirm Trade' : 'Please wait...'}
            </button>
          </div>
        </Modal>
      );
    }
  example_bad: |
    // No details, no delay, easy to accidentally confirm
    function TradeConfirmation({ onConfirm }) {
      return (
        <div>
          <p>Place trade?</p>
          <button onClick={onConfirm}>OK</button>
        </div>
      );
    }
  when_applies: Any trading interface where user funds are at risk
  sources: ["https://react.dev/"]

- id: PM-UI-011
  text: "Loading states for real-time data must use skeleton screens, not spinners — skeleton screens reduce perceived load time by 30% and prevent layout shift."
  why: >
    Spinners provide no information about what is loading and cause layout shift when
    data arrives. In a trading interface, layout shift during loading can cause users
    to click the wrong button (e.g., clicking Buy when the Order Book loads and shifts
    the UI). Skeleton screens reserve the exact space for content, preventing CLS
    (Cumulative Layout Shift) and giving users a preview of the page structure.
  how_to_do_right: |
    1. Create skeleton variants for each data component (chart skeleton, order book skeleton, etc.)
    2. Skeleton must match exact dimensions of loaded content to prevent CLS
    3. Use CSS animation (pulse or shimmer) on skeleton elements
    4. Show skeleton immediately on mount (0ms delay, not after a timeout)
    5. Transition from skeleton to content with a fade (150ms opacity transition)
    6. For charts, show axis labels and grid lines in skeleton state
  severity: high
  technologies:
    lang: [javascript, typescript]
    framework: [react]
  domains:
    domain: [prediction_markets, ui]
    concern: [domain_specific]
  example_good: |
    function OrderBookSkeleton() {
      return (
        <div className="order-book-skeleton animate-pulse">
          <div className="header flex justify-between">
            <div className="h-4 w-16 bg-gray-200 rounded" />
            <div className="h-4 w-16 bg-gray-200 rounded" />
          </div>
          {Array.from({ length: 8 }).map((_, i) => (
            <div key={i} className="flex justify-between py-1">
              <div className="h-3 w-20 bg-gray-200 rounded" />
              <div className="h-3 w-16 bg-gray-200 rounded" />
              <div className="h-3 w-20 bg-green-100 rounded" style={{ opacity: 1 - i * 0.1 }} />
            </div>
          ))}
        </div>
      );
    }

    function OrderBook({ bids, asks, isLoading }) {
      if (isLoading) return <OrderBookSkeleton />;

      return (
        <div className="order-book transition-opacity duration-150">
          {/* real order book content */}
        </div>
      );
    }
  example_bad: |
    // Spinner causes layout shift and provides no structural preview
    function OrderBook({ bids, asks, isLoading }) {
      if (isLoading) return <div className="spinner" />; // No space reserved, CLS when data loads

      return <div className="order-book">{/* content */}</div>;
    }
  when_applies: Any real-time data interface, trading dashboards, financial applications
  sources: ["https://datatracker.ietf.org/doc/html/rfc6455"]

- id: PM-UI-012
  text: "Error states for trading failures must show the specific error (insufficient funds, price moved, network error) with a clear recovery action."
  why: >
    Generic "Something went wrong" errors in a trading context cause panic. Users do not
    know if their order went through, if they were charged, or if they need to retry.
    A specific error like "Insufficient funds — you need $50 more" with a "Deposit funds"
    button resolves the issue in one click. Ambiguous errors lead to duplicate orders when
    users retry trades that actually succeeded.
  how_to_do_right: |
    1. Map API error codes to user-friendly messages with recovery actions
    2. For "insufficient funds": show shortfall amount and link to deposit
    3. For "price moved": show old vs new price and offer to retry at new price
    4. For network errors: offer retry with exponential backoff (auto-retry up to 3 times)
    5. For unknown errors: show error ID for support with "Contact support" link
    6. Never show raw error messages or stack traces to users
  severity: critical
  technologies:
    lang: [javascript, typescript]
    framework: [react]
  domains:
    domain: [prediction_markets, ui]
    concern: [domain_specific]
  example_good: |
    const TRADE_ERRORS = {
      INSUFFICIENT_FUNDS: {
        title: 'Insufficient Funds',
        getMessage: (err) => `You need $${err.shortfall.toFixed(2)} more to complete this trade.`,
        action: { label: 'Deposit Funds', href: '/deposit' },
      },
      PRICE_MOVED: {
        title: 'Price Has Changed',
        getMessage: (err) => `Price moved from $${err.oldPrice} to $${err.newPrice}.`,
        action: { label: 'Retry at New Price', onClick: (retry) => retry(err.newPrice) },
      },
      NETWORK_ERROR: {
        title: 'Connection Error',
        getMessage: () => 'Unable to reach the server. Your trade was NOT placed.',
        action: { label: 'Retry', onClick: (retry) => retry() },
      },
      UNKNOWN: {
        title: 'Trade Failed',
        getMessage: (err) => `Something unexpected happened. Error ID: ${err.errorId}`,
        action: { label: 'Contact Support', href: `/support?error=${err.errorId}` },
      },
    };

    function TradeError({ error, onRetry }) {
      const config = TRADE_ERRORS[error.code] || TRADE_ERRORS.UNKNOWN;
      return (
        <div className="trade-error p-4 border-red-200 bg-red-50 rounded-lg">
          <h3 className="text-red-800 font-semibold">{config.title}</h3>
          <p className="text-red-600 mt-1">{config.getMessage(error)}</p>
          <button className="btn-primary mt-3" onClick={() => config.action.onClick?.(onRetry) ?? window.location.href = config.action.href}>
            {config.action.label}
          </button>
        </div>
      );
    }
  example_bad: |
    // Generic error with no context and no recovery action
    function TradeError({ error }) {
      return <div className="error">Something went wrong. Try again later.</div>;
    }
  when_applies: Any trading interface where orders can fail
  sources: ["https://react.dev/"]

- id: PM-UI-013
  text: "Financial data must be accessible: use ARIA labels for screen readers, support full keyboard navigation, and never convey information through color alone."
  why: >
    8% of men have color vision deficiency. Profit/loss conveyed only by green/red
    is invisible to them. Screen reader users trading on prediction markets need to
    know their position value, P&L, and trade details through ARIA labels.
    WCAG 2.1 Level AA compliance is a legal requirement in many jurisdictions for
    financial services (ADA, EAA).
  how_to_do_right: |
    1. Add aria-label to all interactive elements: "Buy YES at 65 cents, estimated cost 32 dollars"
    2. Use icons AND color for profit/loss (up arrow + green, down arrow + red)
    3. Add aria-live="polite" to price tickers so screen readers announce updates
    4. Ensure all trading actions are keyboard-accessible (Tab, Enter, Escape)
    5. Use role="table" with proper row/column headers for portfolio and order book
    6. Test with VoiceOver (macOS) and NVDA (Windows) before release
  severity: high
  technologies:
    lang: [javascript, typescript]
    framework: [react]
  domains:
    domain: [prediction_markets, ui, compliance]
    concern: [domain_specific]
  example_good: |
    function PriceDisplay({ price, change, changePercent }) {
      const direction = change >= 0 ? 'up' : 'down';
      return (
        <div
          aria-live="polite"
          aria-label={`Current price ${price.toFixed(2)} dollars, ${direction} ${Math.abs(changePercent).toFixed(1)} percent`}
        >
          <span className="text-2xl font-bold">${price.toFixed(2)}</span>
          <span className={change >= 0 ? 'text-green-600' : 'text-red-600'}>
            {change >= 0 ? '▲' : '▼'} {/* Icon + color, not color alone */}
            {Math.abs(changePercent).toFixed(1)}%
          </span>
        </div>
      );
    }

    function OrderFormButton({ side, price, onClick }) {
      return (
        <button
          onClick={onClick}
          aria-label={`Buy ${side} at ${price.toFixed(2)} dollars per share`}
          className={`btn-trade ${side === 'YES' ? 'btn-yes' : 'btn-no'}`}
        >
          Buy {side} — ${price.toFixed(2)}
        </button>
      );
    }
  example_bad: |
    // No ARIA labels, color-only information, no keyboard support
    function PriceDisplay({ price, change }) {
      return (
        <div style={{ color: change >= 0 ? 'green' : 'red' }}>
          {price} ({change}%) {/* Color is only indicator */}
        </div>
      );
    }
  when_applies: Any financial or trading interface, especially those subject to accessibility regulations
  sources: ["https://www.w3.org/TR/WCAG21/"]

- id: PM-UI-014
  text: "Trading interfaces must offer a dark mode — traders spend hours on screens and light mode causes eye strain in low-light environments."
  why: >
    Active traders use their platform for 2-8 hours daily. Light backgrounds emit more
    blue light, causing eye strain and disrupting sleep for late-night traders.
    Every major trading platform (Bloomberg Terminal, TradingView, Binance) defaults to dark mode.
    Users who cannot switch to dark mode will migrate to platforms that offer it.
    Additionally, dark mode reduces power consumption by 30-50% on OLED screens (mobile).
  how_to_do_right: |
    1. Use CSS custom properties (--bg-primary, --text-primary) for all colors
    2. Default to system preference via prefers-color-scheme media query
    3. Allow manual toggle with preference saved to localStorage
    4. Use dark grays (#1a1a2e, #16213e) not pure black (#000) to reduce contrast glare
    5. Ensure chart colors remain readable in both modes (test green/red on dark backgrounds)
    6. Charts should use dark background by default with option to match theme
  severity: high
  technologies:
    lang: [javascript, typescript]
    framework: [react]
  domains:
    domain: [prediction_markets, ui]
    concern: [domain_specific]
  example_good: |
    // CSS custom properties for theme switching
    // :root { --bg-primary: #ffffff; --text-primary: #1a1a2e; --chart-bg: #ffffff; }
    // .dark { --bg-primary: #1a1a2e; --text-primary: #e0e0e0; --chart-bg: #16213e; }

    function useTheme() {
      const [theme, setTheme] = useState(() => {
        const saved = localStorage.getItem('theme');
        if (saved) return saved;
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      });

      useEffect(() => {
        document.documentElement.classList.toggle('dark', theme === 'dark');
        localStorage.setItem('theme', theme);
      }, [theme]);

      return { theme, toggleTheme: () => setTheme(t => t === 'dark' ? 'light' : 'dark') };
    }

    function ThemeToggle() {
      const { theme, toggleTheme } = useTheme();
      return (
        <button onClick={toggleTheme} aria-label={`Switch to ${theme === 'dark' ? 'light' : 'dark'} mode`}>
          {theme === 'dark' ? '☀️' : '🌙'}
        </button>
      );
    }
  example_bad: |
    // Hardcoded white background, no theme support
    function App() {
      return (
        <div style={{ backgroundColor: '#ffffff', color: '#000000' }}>
          {/* All colors hardcoded — impossible to add dark mode later */}
        </div>
      );
    }
  when_applies: Any trading platform or financial application used for extended periods
  sources: ["https://www.w3.org/TR/WCAG21/"]

- id: PM-UI-015
  text: "Real-time UI updates must use virtualization for long lists and debouncing for high-frequency data to maintain 60fps rendering."
  why: >
    Prediction market order books and trade histories can receive 50-100 updates per second.
    Rendering every update causes React to re-render the entire list, dropping frame rate
    to 10-15fps and making the UI feel frozen. A trade history with 10,000 entries in a
    simple <ul> consumes 500MB+ of DOM memory. Virtualization renders only visible rows
    (typically 20-30) regardless of total count.
  how_to_do_right: |
    1. Use react-window or @tanstack/react-virtual for lists with >100 items
    2. Batch WebSocket updates: collect for 100ms, then apply all at once (requestAnimationFrame)
    3. Use React.memo with custom comparator for list items (prevent re-render on unchanged rows)
    4. Debounce search/filter inputs at 300ms
    5. Use CSS transform for animations instead of layout properties (top, left, margin)
    6. Profile with React DevTools Profiler — target <16ms per render cycle
  severity: high
  technologies:
    lang: [javascript, typescript]
    framework: [react]
    library: [lightweight-charts]
  domains:
    domain: [prediction_markets, ui, performance]
    concern: [domain_specific]
  example_good: |
    import { FixedSizeList } from 'react-window';

    const TradeRow = React.memo(({ index, style, data }) => {
      const trade = data[index];
      return (
        <div style={style} className="trade-row flex justify-between">
          <span>{trade.time}</span>
          <span className={trade.side === 'buy' ? 'text-green' : 'text-red'}>
            {trade.side.toUpperCase()}
          </span>
          <span>${trade.price.toFixed(2)}</span>
          <span>{trade.quantity}</span>
        </div>
      );
    });

    function TradeHistory({ trades }) {
      return (
        <FixedSizeList
          height={400}
          itemCount={trades.length}
          itemSize={32}
          itemData={trades}
          width="100%"
        >
          {TradeRow}
        </FixedSizeList>
      );
    }

    // Batch WebSocket updates
    function useBatchedUpdates(ws) {
      const bufferRef = useRef([]);
      const [trades, setTrades] = useState([]);

      useEffect(() => {
        let rafId;
        const flush = () => {
          if (bufferRef.current.length > 0) {
            setTrades(prev => [...bufferRef.current, ...prev].slice(0, 10000));
            bufferRef.current = [];
          }
          rafId = requestAnimationFrame(flush);
        };
        rafId = requestAnimationFrame(flush);

        ws.onmessage = (e) => { bufferRef.current.push(JSON.parse(e.data)); };
        return () => cancelAnimationFrame(rafId);
      }, [ws]);

      return trades;
    }
  example_bad: |
    // No virtualization, re-renders all 10,000 rows on every update
    function TradeHistory({ trades }) {
      return (
        <ul>
          {trades.map((t, i) => (
            <li key={i}> {/* index key causes full re-render */}
              {t.time} {t.side} ${t.price} {t.quantity}
            </li>
          ))}
        </ul>
      );
    }
  when_applies: Any real-time trading interface with high-frequency data updates or long lists
  sources: ["https://react.dev/reference/react/useMemo"]
