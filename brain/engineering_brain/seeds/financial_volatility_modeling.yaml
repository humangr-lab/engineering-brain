- id: "FIN-VOL-001"
  text: "Historical volatility must be computed as the annualized standard deviation of log returns, not simple returns. Use a rolling window of 20-60 trading days. Annualize by multiplying by sqrt(252) for daily data. Using simple returns biases the estimate upward for volatile assets."
  why: >
    Log returns are additive over time and approximately normally distributed, which makes
    statistical inference valid. Simple (arithmetic) returns are not additive and overstate
    volatility for large moves. For example, a +50%/-50% round trip gives 0% simple average
    but -25% actual loss. The annualization factor sqrt(252) assumes 252 trading days per year
    and i.i.d. returns — a standard convention in equity markets. Using calendar days (365)
    or wrong annualization produces volatilities that are incomparable to market quotes (VIX,
    implied vol). This is the single most common error in volatility calculation.
  how_to_do_right: |
    1. Collect N daily closing prices P_0, P_1, ..., P_N
    2. Compute log returns: r_i = ln(P_i / P_{i-1}) for i = 1..N
    3. Compute sample standard deviation: sigma_daily = std(r_1, ..., r_N, ddof=1)
    4. Annualize: sigma_annual = sigma_daily * sqrt(252)
    5. Use rolling window of 20 days (1 month) for short-term, 60 days (3 months) for medium-term
    6. Always use ddof=1 (Bessel's correction) for sample std, not population std
    7. Handle missing data (weekends, holidays) by skipping, not interpolating zeros
    8. Verify: typical equity vol is 15-30% annual; if you get 0.15 instead of 15%, check units
  severity: critical
  technologies:
    lang: [python, numpy, pandas]
    framework: [scipy]
  domains:
    domain: [fintech, prediction_markets, risk_management]
    concern: [domain_specific, numerical_accuracy]
  example_good: |
    import numpy as np
    import pandas as pd

    def historical_volatility(prices: pd.Series, window: int = 20,
                               annualization: int = 252) -> pd.Series:
        """Rolling historical volatility using log returns.

        Args:
            prices: Daily closing prices (must be > 0).
            window: Rolling window in trading days (default 20 ~ 1 month).
            annualization: Trading days per year (252 for equities).

        Returns:
            Annualized rolling volatility as pd.Series.
        """
        if (prices <= 0).any():
            raise ValueError("Prices must be strictly positive for log returns")

        log_returns = np.log(prices / prices.shift(1))
        # ddof=1 for unbiased sample standard deviation
        rolling_std = log_returns.rolling(window=window).std(ddof=1)
        annualized_vol = rolling_std * np.sqrt(annualization)
        return annualized_vol

    # Example: AAPL-like prices
    prices = pd.Series([150.0, 152.3, 149.8, 153.1, 151.5, 155.0, 154.2,
                         156.8, 153.9, 157.2, 158.0, 155.5, 159.1, 160.3,
                         158.7, 161.0, 159.5, 162.3, 163.8, 161.2, 164.0])
    vol = historical_volatility(prices, window=20)
    print(f"20-day annualized vol: {vol.iloc[-1]:.4f}")  # ~0.18 (18%)
  example_bad: |
    import numpy as np

    # WRONG 1: Using simple returns instead of log returns
    prices = [150.0, 152.3, 149.8, 153.1, 151.5]
    simple_returns = [(prices[i] - prices[i-1]) / prices[i-1] for i in range(1, len(prices))]
    vol = np.std(simple_returns) * np.sqrt(252)  # Biased upward for volatile assets

    # WRONG 2: Using population std (ddof=0) instead of sample std (ddof=1)
    log_returns = [np.log(prices[i] / prices[i-1]) for i in range(1, len(prices))]
    vol = np.std(log_returns) * np.sqrt(252)  # Underestimates with small samples

    # WRONG 3: Using 365 instead of 252 for annualization
    vol = np.std(log_returns, ddof=1) * np.sqrt(365)  # ~20% too high

    # WRONG 4: Not handling zero/negative prices
    bad_prices = [150.0, 0.0, 153.1]  # log(0) = -inf, contaminates everything
  when_applies: "Any time you need to measure realized price variability — risk metrics, portfolio optimization, option model calibration, backtesting, comparing asset riskiness."
  sources:
    - "https://en.wikipedia.org/wiki/Volatility_(finance)"

- id: "FIN-VOL-002"
  text: "EWMA (Exponentially Weighted Moving Average) volatility uses a decay factor lambda (typically 0.94 for daily data per RiskMetrics) to weight recent observations more heavily. The recursive formula is: sigma^2_t = lambda * sigma^2_{t-1} + (1 - lambda) * r^2_{t-1}. This responds faster to market shocks than equal-weighted historical volatility."
  why: >
    Equal-weighted historical volatility treats a return from 60 days ago the same as
    yesterday's return, which is wrong — recent returns are more informative about current
    risk. EWMA solves this by exponentially decaying weights. JP Morgan's RiskMetrics (1996)
    established lambda=0.94 for daily data as the industry standard, which gives an effective
    window of about 1/(1-0.94) = 16.7 days. Lambda=0.97 is used for monthly data. EWMA is
    also the foundation for GARCH — GARCH(1,1) adds a mean-reversion term to EWMA. The
    recursive formula is O(1) per update, making it efficient for real-time risk systems.
    Choosing lambda wrong (e.g., 0.5 or 0.99) gives either too noisy or too sluggish estimates.
  how_to_do_right: |
    1. Initialize sigma^2_0 with the sample variance of the first N returns (e.g., N=20)
    2. For each new return r_t: sigma^2_t = lambda * sigma^2_{t-1} + (1 - lambda) * r^2_t
    3. Use lambda = 0.94 for daily data (RiskMetrics standard)
    4. Use lambda = 0.97 for monthly data
    5. The effective window is approximately 1 / (1 - lambda) days
    6. Annualize: sigma_annual = sigma_daily * sqrt(252)
    7. For the first estimate, use at least 20 observations for initialization
    8. Verify: EWMA should react faster to shocks than 20-day rolling vol
  severity: high
  technologies:
    lang: [python, numpy, pandas]
    framework: []
  domains:
    domain: [fintech, risk_management, prediction_markets]
    concern: [domain_specific, numerical_accuracy]
  example_good: |
    import numpy as np
    import pandas as pd

    def ewma_volatility(returns: pd.Series, lam: float = 0.94,
                         annualize: bool = True) -> pd.Series:
        """EWMA volatility (RiskMetrics methodology).

        Args:
            returns: Log returns series.
            lam: Decay factor (0.94 daily, 0.97 monthly).
            annualize: If True, multiply by sqrt(252).

        Returns:
            EWMA volatility series.
        """
        if not 0 < lam < 1:
            raise ValueError(f"Lambda must be in (0, 1), got {lam}")

        variance = np.zeros(len(returns))
        # Initialize with sample variance of first 20 observations
        init_window = min(20, len(returns))
        variance[init_window - 1] = returns.iloc[:init_window].var()

        for t in range(init_window, len(returns)):
            variance[t] = lam * variance[t - 1] + (1 - lam) * returns.iloc[t] ** 2

        vol = pd.Series(np.sqrt(variance), index=returns.index)
        if annualize:
            vol *= np.sqrt(252)
        return vol

    # Example: simulate returns and compute EWMA vol
    np.random.seed(42)
    returns = pd.Series(np.random.normal(0, 0.01, 500))  # ~1% daily vol
    # Inject a shock at day 250
    returns.iloc[250] = -0.08  # -8% crash
    vol = ewma_volatility(returns, lam=0.94)
    print(f"Pre-shock vol: {vol.iloc[249]:.4f}")   # ~0.16 (16% annualized)
    print(f"Post-shock vol: {vol.iloc[251]:.4f}")   # Spikes to ~0.25+
  example_bad: |
    import numpy as np

    # WRONG 1: Lambda outside (0,1) — diverges or collapses
    returns = [0.01, -0.02, 0.015, -0.005]
    lam = 1.05  # > 1: variance explodes to infinity
    var = 0.0001
    for r in returns:
        var = lam * var + (1 - lam) * r**2  # (1-1.05) = -0.05, negative weight!

    # WRONG 2: Initializing variance to zero
    var = 0.0  # First EWMA value = (1-lambda) * r^2, massively underestimates
    for r in returns:
        var = 0.94 * var + 0.06 * r**2  # Cold start bias persists for ~30 steps

    # WRONG 3: Forgetting to square the return
    var = 0.94 * var + 0.06 * returns[-1]  # Mixing signed returns into variance!
  when_applies: "Real-time risk monitoring, VaR calculations, any system that needs volatility estimates that respond quickly to market regime changes."
  sources:
    - "https://en.wikipedia.org/wiki/Volatility_(finance)"
    - "https://arch.readthedocs.io/en/latest/"

- id: "FIN-VOL-003"
  text: "Implied volatility is extracted from observed option prices by numerically inverting the Black-Scholes formula. There is no closed-form solution — use Newton-Raphson (converges in 3-5 iterations with vega as derivative) or Brent's method as fallback. Always bound the search to [0.001, 5.0] to prevent divergence."
  why: >
    Implied volatility (IV) is the market's forward-looking estimate of volatility and is the
    single most important input for option pricing and risk management. Unlike historical vol
    which looks backward, IV reflects current supply/demand for options. The Black-Scholes
    formula C = f(S, K, T, r, sigma) has no analytical inverse for sigma, so numerical root
    finding is required. Newton-Raphson using vega (dC/dsigma) as the derivative converges
    quadratically and is the industry standard. However, it can diverge for deep OTM options
    where vega is near zero, so Brent's method (bracketed, guaranteed convergence) should be
    the fallback. Without bounding sigma, Newton-Raphson can produce negative vol or overflow.
  how_to_do_right: |
    1. Define f(sigma) = BS_price(S, K, T, r, sigma) - market_price
    2. Initial guess: sigma_0 = sqrt(2 * |ln(S/K) + r*T| / T) (Brenner-Subrahmanyam)
    3. Newton-Raphson: sigma_{n+1} = sigma_n - f(sigma_n) / vega(sigma_n)
    4. Bound sigma to [0.001, 5.0] (500% vol) at each iteration
    5. If vega < 1e-12, switch to Brent's method to avoid division by near-zero
    6. Converge when |f(sigma)| < 1e-8 or |delta_sigma| < 1e-8
    7. Maximum 100 iterations; if not converged, return NaN (not a stale value)
    8. Validate: IV should be in [0.01, 3.0] for most listed options
  severity: critical
  technologies:
    lang: [python, numpy, scipy]
    framework: [scipy]
  domains:
    domain: [fintech, prediction_markets, derivatives]
    concern: [domain_specific, numerical_accuracy]
  example_good: |
    import numpy as np
    from scipy.stats import norm
    from scipy.optimize import brentq

    def bs_call_price(S, K, T, r, sigma):
        """Black-Scholes European call price."""
        if T <= 0 or sigma <= 0:
            return max(S - K * np.exp(-r * T), 0.0)
        d1 = (np.log(S / K) + (r + 0.5 * sigma**2) * T) / (sigma * np.sqrt(T))
        d2 = d1 - sigma * np.sqrt(T)
        return S * norm.cdf(d1) - K * np.exp(-r * T) * norm.cdf(d2)

    def bs_vega(S, K, T, r, sigma):
        """Black-Scholes vega (dC/dsigma)."""
        if T <= 0 or sigma <= 0:
            return 0.0
        d1 = (np.log(S / K) + (r + 0.5 * sigma**2) * T) / (sigma * np.sqrt(T))
        return S * np.sqrt(T) * norm.pdf(d1)

    def implied_volatility(market_price, S, K, T, r,
                            max_iter=100, tol=1e-8):
        """Implied vol via Newton-Raphson with Brent fallback."""
        if T <= 0:
            return np.nan
        intrinsic = max(S - K * np.exp(-r * T), 0.0)
        if market_price < intrinsic - tol:
            return np.nan  # Arbitrage violation

        # Brenner-Subrahmanyam initial guess
        sigma = np.sqrt(2 * abs(np.log(S / K) + r * T) / max(T, 1e-10))
        sigma = np.clip(sigma, 0.05, 3.0)

        for _ in range(max_iter):
            price = bs_call_price(S, K, T, r, sigma)
            vega = bs_vega(S, K, T, r, sigma)
            diff = price - market_price

            if abs(diff) < tol:
                return sigma

            if vega < 1e-12:
                # Fallback to Brent's method
                try:
                    return brentq(
                        lambda s: bs_call_price(S, K, T, r, s) - market_price,
                        0.001, 5.0, xtol=tol
                    )
                except ValueError:
                    return np.nan

            sigma -= diff / vega
            sigma = np.clip(sigma, 0.001, 5.0)

        return np.nan  # Did not converge

    # Example: S=100, K=105, T=0.25 (3 months), r=5%, market_price=3.50
    iv = implied_volatility(3.50, 100, 105, 0.25, 0.05)
    print(f"Implied vol: {iv:.4f}")  # ~0.25 (25%)
    # Verify round-trip
    print(f"BS price at IV: {bs_call_price(100, 105, 0.25, 0.05, iv):.4f}")  # ~3.50
  example_bad: |
    import numpy as np
    from scipy.stats import norm

    # WRONG 1: No convergence check — infinite loop possible
    sigma = 0.2
    while True:  # No max_iter!
        price = bs_call_price(100, 105, 0.25, 0.05, sigma)
        vega = bs_vega(100, 105, 0.25, 0.05, sigma)
        sigma -= (price - 3.50) / vega  # Divides by zero for deep OTM

    # WRONG 2: No bounds on sigma — Newton-Raphson diverges
    sigma = 0.2
    for _ in range(100):
        price = bs_call_price(100, 105, 0.25, 0.05, sigma)
        vega = bs_vega(100, 105, 0.25, 0.05, sigma)
        sigma -= (price - 3.50) / vega  # sigma can go negative!

    # WRONG 3: Using naive bisection on [0, 100] — painfully slow
    lo, hi = 0.0, 100.0  # 100 = 10000% vol, absurd upper bound
    for _ in range(10):  # Only 10 iterations = inaccurate
        mid = (lo + hi) / 2
        if bs_call_price(100, 105, 0.25, 0.05, mid) > 3.50:
            hi = mid
        else:
            lo = mid
  when_applies: "Pricing options, calibrating volatility surfaces, computing Greeks from market data, any system that takes option market prices as input."
  sources:
    - "https://en.wikipedia.org/wiki/Black%E2%80%93Scholes_model"
    - "https://docs.scipy.org/doc/scipy/reference/generated/scipy.stats.norm.html"

- id: "FIN-VOL-004"
  text: "The volatility smile (equity skew) shows that out-of-the-money puts have higher implied volatility than ATM options, violating Black-Scholes' constant-vol assumption. Model this with at least a quadratic function in log-moneyness: IV(k) = a + b*k + c*k^2, where k = ln(K/F). Never assume flat implied volatility across strikes."
  why: >
    Black-Scholes assumes constant volatility across all strikes and maturities, but markets
    consistently show a skew (equity) or smile (FX). Post-1987 crash, equity markets exhibit
    persistent negative skew — OTM puts trade at 5-15 vol points above ATM. This reflects
    demand for downside protection, jump risk, and fat tails. If you use a single IV for all
    strikes, you misprice OTM options by 20-50%, leading to massive hedging errors. The skew
    is not a model artifact — it represents real risk premia. SABR, SVI (Stochastic Volatility
    Inspired), and local volatility models exist to fit the smile, but even a quadratic
    approximation is far better than flat vol.
  how_to_do_right: |
    1. Collect IV data for multiple strikes at a single expiry
    2. Compute log-moneyness: k_i = ln(K_i / F), where F = S * exp(r*T) is the forward
    3. Fit quadratic: IV(k) = a + b*k + c*k^2 using least squares (minimum 5 strikes)
    4. Verify: c > 0 (smile is convex), b < 0 (equity skew is negative)
    5. Extrapolation: do NOT extrapolate beyond observed strikes — use flat wings
    6. For production, use SVI parametrization: w(k) = a + b*(rho*(k-m) + sqrt((k-m)^2 + sigma^2))
    7. Check for butterfly arbitrage: d^2C/dK^2 >= 0 (call prices must be convex in K)
    8. Typical equity skew: 25-delta put IV is 3-8 vol points above ATM
  severity: high
  technologies:
    lang: [python, numpy, scipy]
    framework: [scipy]
  domains:
    domain: [fintech, derivatives, risk_management]
    concern: [domain_specific]
  example_good: |
    import numpy as np
    from numpy.polynomial import polynomial as P

    def fit_vol_smile(strikes: np.ndarray, ivs: np.ndarray,
                       forward: float) -> tuple:
        """Fit quadratic smile in log-moneyness space.

        Args:
            strikes: Array of strike prices.
            ivs: Array of implied volatilities.
            forward: Forward price F = S * exp(r*T).

        Returns:
            Coefficients (a, b, c) for IV(k) = a + b*k + c*k^2.
        """
        if len(strikes) < 3:
            raise ValueError("Need at least 3 strikes for quadratic fit")

        log_moneyness = np.log(strikes / forward)
        # Fit polynomial: degree 2 (quadratic)
        coeffs = np.polyfit(log_moneyness, ivs, deg=2)
        c, b, a = coeffs  # np.polyfit returns highest degree first

        if c < 0:
            raise ValueError(f"Negative curvature c={c:.4f} — non-convex smile")

        return a, b, c

    def interpolate_iv(k: float, a: float, b: float, c: float) -> float:
        """Interpolate IV at log-moneyness k."""
        return a + b * k + c * k**2

    # Example: SPX options, S=5000, r=5%, T=0.25, F=5063
    forward = 5000 * np.exp(0.05 * 0.25)
    strikes = np.array([4700, 4800, 4900, 5000, 5100, 5200, 5300])
    ivs = np.array([0.22, 0.20, 0.185, 0.175, 0.17, 0.168, 0.17])

    a, b, c = fit_vol_smile(strikes, ivs, forward)
    print(f"ATM vol (a): {a:.4f}")  # ~0.175
    print(f"Skew (b): {b:.4f}")     # Negative for equity
    print(f"Curvature (c): {c:.4f}")  # Positive (smile)

    # Interpolate at K=4850
    k = np.log(4850 / forward)
    iv_4850 = interpolate_iv(k, a, b, c)
    print(f"IV at K=4850: {iv_4850:.4f}")  # ~0.192
  example_bad: |
    # WRONG: Using single ATM vol for all strikes
    atm_vol = 0.175  # SPX ATM
    # Pricing OTM put at K=4700 with ATM vol
    otm_put_price = bs_put_price(5000, 4700, 0.25, 0.05, atm_vol)
    # Actual market IV at K=4700 is ~0.22 — mispricing by ~40%!

    # WRONG: Linear interpolation in strike space (not log-moneyness)
    # This produces negative butterfly spreads = arbitrage
    strikes = [4800, 5000, 5200]
    ivs = [0.20, 0.175, 0.168]
    # Linear interp at K=4900: 0.1875 — wrong, actual ~0.185
    # Linear interp at K=5400 (extrapolation): 0.1505 — possibly negative!
  when_applies: "Option pricing, volatility surface construction, skew trading strategies, any system that prices options at multiple strikes."
  sources:
    - "https://en.wikipedia.org/wiki/Volatility_(finance)"
    - "https://www.investopedia.com/terms/g/greeks.asp"

- id: "FIN-VOL-005"
  text: "GARCH(1,1) models volatility clustering: sigma^2_t = omega + alpha * r^2_{t-1} + beta * sigma^2_{t-1}. The persistence alpha + beta must be < 1 for stationarity. Typical equity values: omega=0.000002, alpha=0.06, beta=0.93, giving persistence=0.99. Use maximum likelihood estimation with the arch library, not manual optimization."
  why: >
    Financial returns exhibit volatility clustering — large moves tend to be followed by large
    moves (of either sign). GARCH(1,1) captures this with three parameters. The unconditional
    variance is omega / (1 - alpha - beta), so persistence alpha+beta close to 1 means slow
    mean-reversion (volatility shocks are long-lived). If alpha+beta >= 1, the process is
    non-stationary (IGARCH) and unconditional variance is infinite. The arch library by Kevin
    Sheppard is the standard Python implementation — it handles MLE correctly, provides
    standard errors, and supports many GARCH variants. Manual MLE is error-prone because the
    log-likelihood surface has ridges and local optima.
  how_to_do_right: |
    1. Compute log returns: r_t = ln(P_t / P_{t-1})
    2. Demean returns: r_t = r_t - mean(r) (GARCH models zero-mean residuals)
    3. Fit GARCH(1,1) using arch library: model = arch_model(returns, vol='Garch', p=1, q=1)
    4. Check stationarity: alpha + beta < 1 (persistence)
    5. Check significance: all p-values < 0.05
    6. Compute unconditional vol: sigma_long = sqrt(omega / (1 - alpha - beta))
    7. Annualize: sigma_annual = sigma_long * sqrt(252)
    8. Typical equity: omega ~ 2e-6, alpha ~ 0.06, beta ~ 0.93
    9. If alpha + beta >= 0.9999, consider IGARCH or FIGARCH
    10. Use at least 1000 observations for reliable estimation
  severity: high
  technologies:
    lang: [python, numpy, pandas]
    framework: [arch]
  domains:
    domain: [fintech, risk_management, derivatives]
    concern: [domain_specific, numerical_accuracy]
  example_good: |
    import numpy as np
    import pandas as pd
    from arch import arch_model

    def fit_garch(returns: pd.Series, p: int = 1, q: int = 1):
        """Fit GARCH(p,q) model and return results.

        Args:
            returns: Log return series (demeaned internally by arch).
            p: GARCH lag order for variance (default 1).
            q: ARCH lag order for squared returns (default 1).

        Returns:
            Fitted arch model results.
        """
        if len(returns) < 500:
            raise ValueError(f"Need >=500 obs for reliable GARCH, got {len(returns)}")

        # Scale to percentage returns for numerical stability
        scaled = returns * 100

        model = arch_model(scaled, vol='Garch', p=p, q=q, dist='t')
        result = model.fit(disp='off')

        # Check stationarity
        alpha = result.params.get('alpha[1]', 0)
        beta = result.params.get('beta[1]', 0)
        persistence = alpha + beta

        if persistence >= 1.0:
            raise ValueError(f"Non-stationary: alpha+beta={persistence:.4f} >= 1")

        return result

    # Example with real-looking data
    np.random.seed(42)
    n = 2000
    returns = pd.Series(np.random.normal(0, 0.01, n))

    result = fit_garch(returns)
    print(result.summary())

    # Extract parameters
    omega = result.params['omega']
    alpha = result.params['alpha[1]']
    beta = result.params['beta[1]']
    persistence = alpha + beta

    # Unconditional vol (remember: returns were scaled by 100)
    long_run_var = omega / (1 - persistence)
    long_run_vol_daily = np.sqrt(long_run_var) / 100  # Scale back
    long_run_vol_annual = long_run_vol_daily * np.sqrt(252)
    print(f"Persistence: {persistence:.4f}")
    print(f"Long-run annual vol: {long_run_vol_annual:.4f}")
  example_bad: |
    import numpy as np
    from scipy.optimize import minimize

    # WRONG 1: Manual MLE without constraints — produces invalid parameters
    def neg_loglik(params, returns):
        omega, alpha, beta = params
        T = len(returns)
        sigma2 = np.zeros(T)
        sigma2[0] = np.var(returns)
        for t in range(1, T):
            sigma2[t] = omega + alpha * returns[t-1]**2 + beta * sigma2[t-1]
            # No check: sigma2[t] can go negative!
        loglik = -0.5 * np.sum(np.log(sigma2) + returns**2 / sigma2)
        return -loglik

    result = minimize(neg_loglik, [0.0001, 0.1, 0.8], args=(returns,))
    # omega might be negative, alpha+beta might be > 1
    # No standard errors, no convergence diagnostics

    # WRONG 2: Not scaling returns — numerical issues
    # Daily log returns are O(0.01), squared is O(0.0001)
    # MLE optimizer struggles with such small numbers
    model = arch_model(returns, vol='Garch', p=1, q=1)  # Should scale by 100
  when_applies: "Modeling and forecasting volatility for risk management, VaR estimation, option pricing with stochastic volatility, any application where volatility clustering matters."
  sources:
    - "https://www.investopedia.com/terms/g/garch.asp"
    - "https://arch.readthedocs.io/en/latest/"

- id: "FIN-VOL-006"
  text: "GARCH multi-step-ahead forecasts converge to the unconditional variance geometrically. The h-step forecast is: sigma^2_{t+h|t} = V_L + (alpha + beta)^{h-1} * (sigma^2_{t+1|t} - V_L), where V_L = omega / (1 - alpha - beta). Do NOT simply extrapolate the one-step forecast. Use the arch library's forecast() method with the correct horizon parameter."
  why: >
    Multi-step GARCH forecasts are needed for VaR at arbitrary horizons, option pricing over
    different maturities, and portfolio optimization. A common error is to use the one-step
    forecast for all horizons, which assumes volatility is constant — defeating the purpose of
    GARCH. The correct formula shows exponential mean-reversion: forecasts converge to the
    unconditional variance V_L at rate (alpha+beta). With typical persistence of 0.99, the
    half-life is ln(2)/ln(1/0.99) ≈ 69 days. For horizons >> 69 days, the forecast is
    effectively V_L. The arch library handles this correctly via result.forecast(horizon=h),
    but manual computation often gets the recursion wrong.
  how_to_do_right: |
    1. Fit GARCH(1,1) using arch library
    2. Use result.forecast(horizon=h) for h-step-ahead forecasts
    3. For aggregate variance over [1, h]: sum individual step forecasts
    4. Annualize aggregate vol: sigma = sqrt(sum_of_variances) * sqrt(252/h) — only if h in trading days
    5. Compute half-life: HL = ln(2) / ln(1 / (alpha + beta))
    6. For h >> HL, forecast ≈ unconditional variance (no point forecasting beyond ~3x HL)
    7. Plot the term structure: sigma(h) vs h to visualize mean reversion
    8. For VaR at horizon h, use the aggregate variance, not the terminal variance
  severity: high
  technologies:
    lang: [python, numpy, pandas]
    framework: [arch]
  domains:
    domain: [fintech, risk_management]
    concern: [domain_specific, numerical_accuracy]
  example_good: |
    import numpy as np
    import pandas as pd
    from arch import arch_model

    def garch_forecast(returns: pd.Series, horizon: int = 22) -> dict:
        """GARCH(1,1) multi-step forecast with mean-reversion analysis.

        Args:
            returns: Log returns (will be scaled internally).
            horizon: Forecast horizon in trading days.

        Returns:
            Dict with forecasts, unconditional vol, half-life.
        """
        scaled = returns * 100
        model = arch_model(scaled, vol='Garch', p=1, q=1, dist='t')
        result = model.fit(disp='off')

        omega = result.params['omega']
        alpha = result.params['alpha[1]']
        beta = result.params['beta[1]']
        persistence = alpha + beta

        # Unconditional variance (in % terms)
        V_L = omega / (1 - persistence)

        # Multi-step forecast
        forecasts = result.forecast(horizon=horizon)
        # variance forecasts for each step ahead
        var_forecasts = forecasts.variance.iloc[-1].values  # shape: (horizon,)

        # Annualized vol for each horizon
        vol_term_structure = np.sqrt(var_forecasts) / 100 * np.sqrt(252)

        # Half-life of mean reversion
        half_life = np.log(2) / np.log(1 / persistence) if persistence < 1 else np.inf

        # Aggregate vol over horizon (for VaR)
        aggregate_var = var_forecasts.sum()
        aggregate_vol = np.sqrt(aggregate_var) / 100  # In return space

        return {
            "vol_term_structure": vol_term_structure,
            "unconditional_vol_annual": np.sqrt(V_L) / 100 * np.sqrt(252),
            "half_life_days": half_life,
            "aggregate_vol_horizon": aggregate_vol,
            "persistence": persistence,
        }

    # Example
    np.random.seed(42)
    returns = pd.Series(np.random.normal(0, 0.012, 2000))
    result = garch_forecast(returns, horizon=22)
    print(f"1-day vol: {result['vol_term_structure'][0]:.4f}")
    print(f"22-day vol: {result['vol_term_structure'][-1]:.4f}")
    print(f"Unconditional: {result['unconditional_vol_annual']:.4f}")
    print(f"Half-life: {result['half_life_days']:.1f} days")
  example_bad: |
    import numpy as np
    from arch import arch_model

    # WRONG 1: Using 1-step forecast for all horizons
    result = model.fit(disp='off')
    one_step_var = result.forecast(horizon=1).variance.iloc[-1, 0]
    # Assuming vol is constant at all horizons:
    var_22day = one_step_var * 22  # Ignores mean reversion!
    # If current vol is 2x unconditional, this overestimates 22-day vol by ~15%

    # WRONG 2: Square-root-of-time scaling of GARCH forecast
    vol_1day = np.sqrt(one_step_var)
    vol_22day = vol_1day * np.sqrt(22)  # Only valid for constant vol!

    # WRONG 3: Extrapolating beyond meaningful horizon
    # With persistence = 0.99, half-life = 69 days
    # Forecasting 500 days ahead is pointless — it's just unconditional vol
    forecast_500 = result.forecast(horizon=500)  # Waste of computation
  when_applies: "VaR at multi-day horizons, option pricing across maturities, portfolio risk budgeting, any scenario requiring volatility forecasts beyond one day."
  sources:
    - "https://www.investopedia.com/terms/g/garch.asp"
    - "https://arch.readthedocs.io/en/latest/"

- id: "FIN-VOL-007"
  text: "Realized volatility from high-frequency data is more accurate than close-to-close estimators. Use the Parkinson (high-low) estimator for daily data: sigma^2_P = (1/4*ln(2)) * (ln(H/L))^2. It is 5x more efficient than close-to-close. For intraday data, use realized variance: RV = sum(r_i^2) for 5-minute returns, with a bias correction for microstructure noise."
  why: >
    Close-to-close volatility uses only 2 data points per day (open and close), discarding all
    intraday information. The Parkinson estimator (1980) uses the daily high and low — always
    available in OHLC data — and is 5.2x more efficient (lower variance for same true vol).
    For intraday data, realized variance (sum of squared returns at 5-minute intervals) is the
    gold standard, but sampling too frequently (e.g., every second) introduces microstructure
    noise (bid-ask bounce, discrete prices). The optimal sampling frequency is typically 5-15
    minutes. Below 1 minute, noise dominates signal. The Two-Scale Realized Volatility (TSRV)
    estimator corrects for this noise.
  how_to_do_right: |
    1. Parkinson estimator: sigma^2 = (1 / (4 * N * ln(2))) * sum(ln(H_i / L_i)^2)
    2. Annualize Parkinson: sigma_annual = sigma_daily * sqrt(252)
    3. For intraday: compute returns at 5-minute intervals (avoid < 1 minute)
    4. Realized variance: RV_day = sum(r_{5min}^2) for all 5-min returns in the day
    5. Realized volatility: sqrt(RV_day) is daily vol, annualize * sqrt(252)
    6. For microstructure noise correction, use TSRV or kernel-based estimators
    7. Parkinson assumes no overnight gaps — use Yang-Zhang estimator if gaps matter
    8. Verify: Parkinson vol should be 80-120% of close-to-close vol; much higher = data errors
  severity: high
  technologies:
    lang: [python, numpy, pandas]
    framework: []
  domains:
    domain: [fintech, risk_management, derivatives]
    concern: [domain_specific, numerical_accuracy]
  example_good: |
    import numpy as np
    import pandas as pd

    def parkinson_volatility(high: pd.Series, low: pd.Series,
                              window: int = 20,
                              annualize: int = 252) -> pd.Series:
        """Parkinson (high-low) volatility estimator.

        5.2x more efficient than close-to-close for continuous processes.

        Args:
            high: Daily high prices.
            low: Daily low prices.
            window: Rolling window.
            annualize: Trading days per year.

        Returns:
            Annualized Parkinson volatility.
        """
        if (low <= 0).any():
            raise ValueError("Low prices must be positive")
        if (high < low).any():
            raise ValueError("High must be >= Low")

        log_hl_sq = np.log(high / low) ** 2
        # Factor: 1 / (4 * ln(2)) ≈ 0.3607
        factor = 1 / (4 * np.log(2))
        rolling_var = factor * log_hl_sq.rolling(window=window).mean()
        vol = np.sqrt(rolling_var) * np.sqrt(annualize)
        return vol

    def realized_volatility_5min(intraday_prices: pd.Series,
                                   freq: str = '5T') -> float:
        """Realized volatility from intraday prices.

        Args:
            intraday_prices: Intraday prices at arbitrary frequency.
            freq: Resampling frequency (default 5 minutes).

        Returns:
            Daily realized volatility (not annualized).
        """
        resampled = intraday_prices.resample(freq).last().dropna()
        log_returns = np.log(resampled / resampled.shift(1)).dropna()
        rv = (log_returns ** 2).sum()
        return np.sqrt(rv)

    # Parkinson example: OHLC data
    high = pd.Series([152.5, 154.0, 153.8, 156.2, 155.1])
    low = pd.Series([149.0, 150.5, 150.2, 152.0, 151.8])
    park_vol = parkinson_volatility(high, low, window=5)
    print(f"Parkinson vol (annualized): {park_vol.iloc[-1]:.4f}")
  example_bad: |
    import numpy as np

    # WRONG 1: Using close-to-close when high/low is available
    # Wastes 80% of information
    closes = [150, 152, 151, 154, 153]
    vol = np.std(np.diff(np.log(closes))) * np.sqrt(252)

    # WRONG 2: Not handling H < L (data error)
    high = [152, 150, 154]  # Day 2: high < low below
    low = [149, 153, 151]   # Day 2: 153 > 150 — data error!
    # np.log(150/153) = negative, squared = positive, masks the error

    # WRONG 3: Realized vol at 1-second frequency — microstructure noise
    # Bid-ask bounce: price oscillates 100.01 → 100.00 → 100.01
    # This looks like high volatility but is just noise
    one_sec_returns = [0.0001, -0.0001, 0.0001, -0.0001]  # Pure noise
    rv = sum(r**2 for r in one_sec_returns)  # Overestimates true vol by 3-5x
  when_applies: "When OHLC data is available and you want better volatility estimates, high-frequency risk monitoring, intraday VaR, market microstructure research."
  sources:
    - "https://en.wikipedia.org/wiki/Volatility_(finance)"

- id: "FIN-VOL-008"
  text: "A volatility surface is a 2D function IV(K, T) over strike K and maturity T. Construct it by interpolating observed implied volatilities across both dimensions. Use SVI (Stochastic Volatility Inspired) parametrization per maturity slice, then interpolate across maturities in total variance space w(k, T) = T * IV(k, T)^2 to ensure calendar spread arbitrage-free conditions."
  why: >
    Options trade at discrete strikes and maturities, but pricing and risk management need
    IV at arbitrary (K, T) pairs. Naive 2D interpolation (e.g., bilinear in strike-maturity
    space) produces arbitrage: negative butterfly spreads (strike direction) or negative
    calendar spreads (maturity direction). The industry standard is to interpolate in total
    variance w = T * sigma^2 space because total variance must be non-decreasing in T (by
    no-arbitrage). SVI provides a parametric fit per maturity slice that satisfies smile
    convexity. Gatheral and Jacquier (2014) proved that SVI is arbitrage-free under specific
    parameter constraints.
  how_to_do_right: |
    1. Collect market IVs for all available (K, T) pairs
    2. Convert to log-moneyness: k = ln(K / F(T)) where F(T) is the forward
    3. Convert to total variance: w(k, T) = T * IV(k, T)^2
    4. For each maturity T, fit SVI: w(k) = a + b * (rho*(k-m) + sqrt((k-m)^2 + sigma^2))
    5. Constrain SVI parameters so a + b*sigma*sqrt(1-rho^2) >= 0 (no negative variance)
    6. Interpolate across maturities in total variance space using linear interpolation
    7. Verify: w(k, T1) <= w(k, T2) for T1 < T2 at every k (calendar arbitrage check)
    8. Verify: d^2w/dk^2 >= 0 at each slice (butterfly arbitrage check)
  severity: high
  technologies:
    lang: [python, numpy, scipy]
    framework: [scipy]
  domains:
    domain: [fintech, derivatives, risk_management]
    concern: [domain_specific, numerical_accuracy]
  example_good: |
    import numpy as np
    from scipy.optimize import minimize

    def svi_total_variance(k: np.ndarray, a: float, b: float,
                            rho: float, m: float, sigma: float) -> np.ndarray:
        """SVI parametrization for total variance w(k).

        w(k) = a + b * (rho * (k - m) + sqrt((k - m)^2 + sigma^2))

        Constraints:
            b >= 0, |rho| < 1, sigma > 0
            a + b * sigma * sqrt(1 - rho^2) >= 0  (non-negative variance)
        """
        return a + b * (rho * (k - m) + np.sqrt((k - m)**2 + sigma**2))

    def fit_svi_slice(log_moneyness: np.ndarray,
                       total_variance: np.ndarray) -> dict:
        """Fit SVI to one maturity slice."""
        def objective(params):
            a, b, rho, m, sigma = params
            w_model = svi_total_variance(log_moneyness, a, b, rho, m, sigma)
            return np.sum((w_model - total_variance) ** 2)

        def constraint_nonneg(params):
            a, b, rho, m, sigma = params
            return a + b * sigma * np.sqrt(1 - rho**2)

        x0 = [np.mean(total_variance), 0.1, -0.5, 0.0, 0.1]
        bounds = [(None, None), (0, None), (-0.999, 0.999), (None, None), (1e-4, None)]
        cons = [{'type': 'ineq', 'fun': constraint_nonneg}]

        result = minimize(objective, x0, bounds=bounds, constraints=cons)
        a, b, rho, m, sigma = result.x
        return {'a': a, 'b': b, 'rho': rho, 'm': m, 'sigma': sigma}

    # Example: SPX 30-day slice
    log_money = np.array([-0.10, -0.05, -0.02, 0.0, 0.02, 0.05, 0.10])
    ivs = np.array([0.24, 0.21, 0.19, 0.18, 0.175, 0.172, 0.175])
    T = 30 / 365
    total_var = T * ivs**2

    params = fit_svi_slice(log_money, total_var)
    print(f"SVI params: {params}")

    # Interpolate at arbitrary k
    k_new = np.linspace(-0.15, 0.15, 50)
    w_new = svi_total_variance(k_new, **params)
    iv_new = np.sqrt(w_new / T)
    print(f"IV at k=-0.12: {iv_new[3]:.4f}")
  example_bad: |
    import numpy as np
    from scipy.interpolate import interp2d

    # WRONG: Naive bilinear interpolation in (K, T, IV) space
    strikes = [4800, 4900, 5000, 5100, 5200]
    maturities = [0.083, 0.25, 0.5]
    # Some IV grid...
    iv_grid = [[0.22, 0.20, 0.18, 0.17, 0.17],
               [0.21, 0.19, 0.175, 0.17, 0.168],
               [0.20, 0.185, 0.17, 0.165, 0.163]]
    f = interp2d(strikes, maturities, iv_grid, kind='linear')
    # This can produce:
    # 1. Calendar spread arbitrage: w(k, T1) > w(k, T2) for T1 < T2
    # 2. Butterfly arbitrage: non-convex call prices
    # 3. Negative implied vols at extrapolation points
  when_applies: "Exotic option pricing, risk management across the entire options book, volatility trading, any system that needs implied vol at arbitrary strike-maturity pairs."
  sources:
    - "https://en.wikipedia.org/wiki/Volatility_(finance)"

- id: "FIN-VOL-009"
  text: "The CBOE VIX measures 30-day expected volatility of the S&P 500 using a model-free approach based on out-of-the-money option prices across all strikes. VIX = 100 * sqrt((2/T) * sum(delta_K_i / K_i^2 * e^(rT) * MidQuote_i) - (1/T) * (F/K_0 - 1)^2). Do NOT approximate VIX with ATM implied volatility — they can differ by 2-5 vol points."
  why: >
    VIX is the market's standard fear gauge and the basis for VIX futures and options (a >$10B
    daily notional market). It uses ALL out-of-the-money options, not just ATM, making it
    sensitive to the entire distribution including tails. ATM IV only captures the center of the
    distribution; VIX captures skew and kurtosis. The model-free approach means VIX does not
    depend on Black-Scholes — it works under any diffusion model. The formula integrates
    across strikes, weighting by 1/K^2 (lower strikes get more weight, reflecting put skew).
    Implementing VIX correctly requires: proper strike selection, handling the truncation at
    wing strikes, and the forward price correction.
  how_to_do_right: |
    1. Select two expirations bracketing 30 days (near-term T1, next-term T2)
    2. For each expiration, determine forward F from put-call parity: F = K + e^(rT) * (C - P)
    3. Select K_0 = highest strike below F
    4. Include all OTM options: puts for K < K_0, calls for K > K_0, both at K_0
    5. Stop including strikes when two consecutive zero-bid strikes are hit
    6. Compute sigma^2 = (2/T) * sum(delta_K_i / K_i^2 * e^(rT) * Q_i) - (1/T)*(F/K_0 - 1)^2
    7. Interpolate between T1 and T2 to get 30-day variance
    8. VIX = 100 * sqrt(sigma^2_30day * 365/30)
    9. delta_K_i = (K_{i+1} - K_{i-1}) / 2 for interior strikes
  severity: high
  technologies:
    lang: [python, numpy, pandas]
    framework: []
  domains:
    domain: [fintech, derivatives, risk_management]
    concern: [domain_specific]
  example_good: |
    import numpy as np

    def compute_vix_sigma2(strikes: np.ndarray, mid_quotes: np.ndarray,
                            T: float, r: float, F: float) -> float:
        """Compute VIX-style sigma^2 for one expiration.

        Args:
            strikes: Sorted OTM option strikes.
            mid_quotes: Mid-quote prices (puts for K < F, calls for K > F).
            T: Time to expiration in years.
            r: Risk-free rate.
            F: Forward price determined from put-call parity.

        Returns:
            Sigma^2 contribution for this expiration.
        """
        if len(strikes) < 3:
            raise ValueError("Need at least 3 strikes")

        K_0 = strikes[strikes <= F].max()  # Highest strike <= F

        # Compute delta_K for each strike
        N = len(strikes)
        delta_K = np.zeros(N)
        delta_K[0] = strikes[1] - strikes[0]
        delta_K[-1] = strikes[-1] - strikes[-2]
        for i in range(1, N - 1):
            delta_K[i] = (strikes[i + 1] - strikes[i - 1]) / 2

        # Main summation
        contribution = np.sum(
            (delta_K / strikes**2) * np.exp(r * T) * mid_quotes
        )

        sigma2 = (2 / T) * contribution - (1 / T) * (F / K_0 - 1)**2
        return sigma2

    def compute_vix(sigma2_near: float, T_near: float,
                     sigma2_next: float, T_next: float) -> float:
        """Interpolate near/next term to 30-day VIX.

        Args:
            sigma2_near: Near-term sigma^2.
            T_near: Near-term time to expiry (years).
            sigma2_next: Next-term sigma^2.
            T_next: Next-term time to expiry (years).

        Returns:
            VIX value (percentage points).
        """
        T_30 = 30 / 365
        N_T = 365  # Minutes in year / minutes in 30 days simplification

        # Linear interpolation in variance space
        w_near = T_near * sigma2_near * ((T_next - T_30) / (T_next - T_near))
        w_next = T_next * sigma2_next * ((T_30 - T_near) / (T_next - T_near))

        sigma2_30 = (w_near + w_next) / T_30
        vix = 100 * np.sqrt(sigma2_30)
        return vix

    # Example: simplified VIX calculation
    strikes = np.arange(4600, 5401, 25, dtype=float)  # 33 strikes
    # Simulated OTM mid-quotes (puts below F, calls above F)
    F = 5050.0
    T = 25 / 365  # 25 days to expiry
    r = 0.05
    # Generate realistic OTM option prices (decreasing away from ATM)
    mid_quotes = np.maximum(5.0 - 0.01 * np.abs(strikes - F), 0.5)
    sigma2 = compute_vix_sigma2(strikes, mid_quotes, T, r, F)
    print(f"Sigma^2: {sigma2:.6f}")
    print(f"Annualized vol: {100 * np.sqrt(sigma2):.2f}%")
  example_bad: |
    # WRONG 1: Approximating VIX with ATM implied volatility
    atm_iv = 0.18  # ATM implied vol = 18%
    vix_approx = atm_iv * 100  # 18 — actual VIX might be 20-23 due to skew

    # WRONG 2: Not using model-free formula
    # Using Black-Scholes IV average across strikes
    ivs = [0.22, 0.20, 0.18, 0.17, 0.17]
    vix_wrong = np.mean(ivs) * 100  # Simple average ignores 1/K^2 weighting

    # WRONG 3: Forgetting the (F/K_0 - 1)^2 correction
    # This term accounts for F not being exactly at a strike
    # Omitting it adds ~0.5-1.0 vol points of bias
  when_applies: "Implementing VIX-like indices, measuring market fear, volatility trading, constructing variance swaps, any system that needs a model-free expected volatility measure."
  sources:
    - "https://www.cboe.com/tradable_products/vix/"
    - "https://en.wikipedia.org/wiki/Volatility_(finance)"

- id: "FIN-VOL-010"
  text: "Volatility regime detection identifies switches between low-vol and high-vol market states. Use a Hidden Markov Model (HMM) with 2-3 states fitted to absolute or squared returns. The hmmlearn library provides GaussianHMM. Typical regimes: low-vol (sigma~10-12%), medium (15-20%), high-vol/crisis (25-50%). Change-point detection (e.g., PELT algorithm via ruptures library) is a non-parametric alternative."
  why: >
    Financial markets alternate between calm periods (low volatility, trending) and turbulent
    periods (high volatility, mean-reverting). This has massive practical implications: position
    sizing, leverage, and hedging strategies should all adapt to the current regime. A fixed
    volatility model (even GARCH) may be too slow to detect regime switches. HMMs explicitly
    model regime transitions with a probability matrix, giving both the current state estimate
    and the probability of switching. The Baum-Welch algorithm (EM) fits the model, and the
    Viterbi algorithm decodes the most likely state sequence. Two states (calm/crisis) captures
    80% of the dynamics; three states (calm/normal/crisis) is more nuanced.
  how_to_do_right: |
    1. Compute absolute log returns: |r_t| = |ln(P_t / P_{t-1})|
    2. Fit GaussianHMM with n_components=2 (or 3) using hmmlearn
    3. Use at least 2 years of daily data (500+ observations)
    4. Identify regimes by their means: lowest mean = low-vol state
    5. Extract transition matrix: P(calm→crisis), P(crisis→calm)
    6. Compute smoothed state probabilities: P(state_t | all data)
    7. Typical transition: P(calm→crisis) ~ 2-5%, P(crisis→calm) ~ 10-15%
    8. Validate: Overlay regime labels on returns — crises should align with known events
    9. For change-point detection: use ruptures.Pelt with model='rbf' and min_size=20
    10. Combine both: HMM for online filtering, change-point for post-hoc analysis
  severity: medium
  technologies:
    lang: [python, numpy, pandas]
    framework: [hmmlearn, ruptures, scikit-learn]
  domains:
    domain: [fintech, risk_management, prediction_markets]
    concern: [domain_specific]
  example_good: |
    import numpy as np
    import pandas as pd
    from hmmlearn.hmm import GaussianHMM

    def detect_volatility_regimes(returns: pd.Series,
                                    n_regimes: int = 2,
                                    n_iter: int = 100) -> dict:
        """Detect volatility regimes using Hidden Markov Model.

        Args:
            returns: Log return series.
            n_regimes: Number of regimes (2 or 3).
            n_iter: Max EM iterations.

        Returns:
            Dict with regime labels, means, transition matrix.
        """
        if len(returns) < 500:
            raise ValueError("Need >= 500 observations for reliable HMM")

        # Use absolute returns as the observable
        abs_returns = np.abs(returns.values).reshape(-1, 1)

        model = GaussianHMM(
            n_components=n_regimes,
            covariance_type='diag',
            n_iter=n_iter,
            random_state=42,
        )
        model.fit(abs_returns)

        # Decode most likely state sequence
        states = model.predict(abs_returns)

        # Sort regimes by mean (lowest = calm)
        means = model.means_.flatten()
        sorted_idx = np.argsort(means)
        label_map = {old: new for new, old in enumerate(sorted_idx)}
        states = np.array([label_map[s] for s in states])

        return {
            'states': pd.Series(states, index=returns.index),
            'regime_means': means[sorted_idx],
            'regime_vols_annual': means[sorted_idx] * np.sqrt(252),
            'transition_matrix': model.transmat_[np.ix_(sorted_idx, sorted_idx)],
            'state_probs': model.predict_proba(abs_returns)[:, sorted_idx],
        }

    # Example
    np.random.seed(42)
    # Simulate 2-regime returns
    n = 1000
    returns = pd.Series(np.where(
        np.random.rand(n) > 0.9,  # 10% crisis probability
        np.random.normal(0, 0.025, n),  # Crisis: 2.5% daily vol
        np.random.normal(0, 0.008, n),  # Calm: 0.8% daily vol
    ))

    result = detect_volatility_regimes(returns)
    print(f"Regime annualized vols: {result['regime_vols_annual']}")
    print(f"Transition matrix:\n{result['transition_matrix']}")
    print(f"Current regime: {result['states'].iloc[-1]}")
  example_bad: |
    import numpy as np

    # WRONG 1: Using a fixed threshold for regime detection
    returns = np.random.normal(0, 0.01, 1000)
    regimes = ['high' if abs(r) > 0.02 else 'low' for r in returns]
    # This classifies individual returns, not regimes
    # A regime is persistent — single large returns happen in calm markets too

    # WRONG 2: Not using absolute/squared returns
    from hmmlearn.hmm import GaussianHMM
    model = GaussianHMM(n_components=2)
    model.fit(returns.reshape(-1, 1))  # Fitting to signed returns
    # HMM will find mean-return regimes (up/down), not vol regimes

    # WRONG 3: Too many regimes without enough data
    model = GaussianHMM(n_components=5)  # 5 regimes with 500 data points
    model.fit(abs_returns)  # Overfitting — regimes won't be meaningful
  when_applies: "Dynamic position sizing, risk-on/risk-off switching, conditional hedging, market timing, any system that adapts behavior to market conditions."
  sources:
    - "https://en.wikipedia.org/wiki/Volatility_(finance)"

- id: "FIN-VOL-011"
  text: "Financial returns have fat tails (excess kurtosis 3-10 for equities, 10-50 for FX). The Normal distribution underestimates the probability of extreme events by 10-100x. Use Student-t distribution with 3-7 degrees of freedom for risk modeling. For VaR at 99%, Normal gives z=2.33 but Student-t(5) gives z=3.36 — a 44% difference in tail risk."
  why: >
    The Normal distribution assigns P(>4 sigma) = 0.003%, but empirically stock markets
    produce 4-sigma daily moves roughly once per year (0.4%), a 100x underestimate. The
    1987 crash was a 22-sigma event under Normal — probability 10^(-108}, essentially
    impossible. Under Student-t with df=4, it's unlikely but not impossible. Nassim Taleb's
    critique: risk models using Normal tails are "picking up pennies in front of a steamroller."
    Using t-distributions for VaR and expected shortfall (CVaR) gives much more realistic tail
    risk estimates. The arch library supports t-GARCH which combines volatility clustering with
    fat tails — the empirically best model for daily returns.
  how_to_do_right: |
    1. Compute sample kurtosis: excess_kurtosis = kurtosis(returns) - 3 (Normal = 0)
    2. If excess_kurtosis > 1, Student-t is necessary
    3. Estimate df by MLE: scipy.stats.t.fit(returns) — typical df = 3-7 for equities
    4. VaR_alpha = mu + sigma * t.ppf(alpha, df) — NOT norm.ppf(alpha)
    5. Expected Shortfall: ES = mu + sigma * (-t.pdf(t.ppf(alpha, df), df) / alpha) * ((df + t.ppf(alpha, df)**2) / (df - 1))
    6. For GARCH: use dist='t' in arch_model() to estimate df jointly
    7. Compare: Normal VaR(99%) = 2.33 sigma, t(5) VaR(99%) = 3.36 sigma
    8. Jarque-Bera test: p < 0.05 rejects normality (almost always rejected for financial returns)
    9. Always report which distribution you assumed for risk numbers
  severity: critical
  technologies:
    lang: [python, numpy, scipy]
    framework: [scipy, arch]
  domains:
    domain: [fintech, risk_management, prediction_markets]
    concern: [domain_specific, numerical_accuracy]
  example_good: |
    import numpy as np
    from scipy import stats

    def fat_tail_var(returns: np.ndarray, confidence: float = 0.99) -> dict:
        """Compare Normal vs Student-t VaR.

        Args:
            returns: Array of log returns.
            confidence: VaR confidence level (e.g., 0.99 for 99%).

        Returns:
            Dict with Normal and Student-t VaR and ES.
        """
        alpha = 1 - confidence
        mu = np.mean(returns)
        sigma = np.std(returns, ddof=1)

        # Sample statistics
        excess_kurt = stats.kurtosis(returns, fisher=True)  # Fisher = excess

        # Fit Student-t
        df, loc, scale = stats.t.fit(returns)

        # Normal VaR
        var_normal = -(mu + sigma * stats.norm.ppf(alpha))

        # Student-t VaR
        var_t = -(loc + scale * stats.t.ppf(alpha, df))

        # Normal Expected Shortfall (CVaR)
        es_normal = -(mu - sigma * stats.norm.pdf(stats.norm.ppf(alpha)) / alpha)

        # Student-t Expected Shortfall
        t_quantile = stats.t.ppf(alpha, df)
        es_t = -(loc + scale * (
            -stats.t.pdf(t_quantile, df) / alpha *
            (df + t_quantile**2) / (df - 1)
        ))

        return {
            'excess_kurtosis': excess_kurt,
            'fitted_df': df,
            'VaR_normal': var_normal,
            'VaR_student_t': var_t,
            'ES_normal': es_normal,
            'ES_student_t': es_t,
            'tail_underestimate_ratio': var_t / var_normal,
        }

    # Example: 5 years of daily equity returns
    np.random.seed(42)
    # Simulate fat-tailed returns (t-distributed with df=5)
    returns = stats.t.rvs(df=5, loc=0, scale=0.01, size=1260)
    result = fat_tail_var(returns, confidence=0.99)

    print(f"Excess kurtosis: {result['excess_kurtosis']:.2f}")
    print(f"Fitted df: {result['fitted_df']:.2f}")
    print(f"VaR(99%) Normal: {result['VaR_normal']:.4f}")
    print(f"VaR(99%) Student-t: {result['VaR_student_t']:.4f}")
    print(f"Tail underestimate ratio: {result['tail_underestimate_ratio']:.2f}x")
  example_bad: |
    import numpy as np
    from scipy import stats

    # WRONG 1: Using Normal for everything
    returns = np.random.standard_t(df=4, size=1000) * 0.01
    var_99 = -np.percentile(returns, 1)  # Historical VaR (OK but backwards-looking)
    var_99_normal = np.std(returns) * 2.33  # Understates by ~45%

    # WRONG 2: Not checking kurtosis before assuming Normal
    print(f"Kurtosis: {stats.kurtosis(returns):.2f}")  # Will show ~6, NOT 0
    # But proceeding with Normal anyway...

    # WRONG 3: Student-t with wrong df
    # df=30 is practically Normal — defeats the purpose
    var_t30 = stats.t.ppf(0.01, df=30)  # ≈ 2.46, barely different from 2.33
    # df=2 has infinite variance — can't compute VaR meaningfully
    var_t2 = stats.t.ppf(0.01, df=2)  # Valid quantile but variance is infinite
  when_applies: "VaR and CVaR calculation, stress testing, option pricing under fat tails, any risk model where tail events matter."
  sources:
    - "https://en.wikipedia.org/wiki/Volatility_(finance)"

- id: "FIN-VOL-012"
  text: "Correlation and covariance are time-varying and tend to spike during crises (correlation breakdown). Use DCC-GARCH (Dynamic Conditional Correlation) for time-varying correlations, not rolling-window Pearson correlation. The static correlation between stocks might be 0.3 in calm markets but 0.8 during a crash — this destroys diversification when you need it most."
  why: >
    Modern Portfolio Theory assumes constant correlations, but empirically correlations increase
    during market downturns — exactly when diversification is most needed. This is called
    "correlation breakdown" or "asymmetric correlation." A portfolio optimized with calm-market
    correlations will be much riskier in a crisis than expected. DCC-GARCH (Engle, 2002) models
    time-varying correlations by combining univariate GARCH for each asset's variance with a
    dynamic correlation structure. The arch library supports DCC estimation. Rolling-window
    correlation is a simple alternative but has a look-back bias (the window includes both
    old and new regimes). Exponentially weighted correlation is better than equal-weighted.
  how_to_do_right: |
    1. Fit univariate GARCH(1,1) to each asset's returns
    2. Standardize returns: z_t = r_t / sigma_t (GARCH-filtered)
    3. Fit DCC to standardized residuals using arch library or rmgarch (R)
    4. Extract time-varying correlation matrix R_t for each date
    5. For portfolio VaR: Sigma_t = D_t * R_t * D_t where D_t = diag(sigma_{1,t}, ..., sigma_{n,t})
    6. If DCC is unavailable, use EWMA correlation with lambda=0.94
    7. Always visualize correlation during known crisis periods (2008, 2020) to validate
    8. For portfolio optimization, use crisis-period correlations as stress scenario
    9. Never use a single correlation number for risk management — report the range
  severity: high
  technologies:
    lang: [python, numpy, pandas]
    framework: [arch, scipy]
  domains:
    domain: [fintech, risk_management, portfolio_management]
    concern: [domain_specific, numerical_accuracy]
  example_good: |
    import numpy as np
    import pandas as pd

    def ewma_correlation(returns_a: pd.Series, returns_b: pd.Series,
                          lam: float = 0.94) -> pd.Series:
        """EWMA time-varying correlation between two assets.

        Args:
            returns_a: Log returns of asset A.
            returns_b: Log returns of asset B.
            lam: Decay factor (0.94 = RiskMetrics).

        Returns:
            Time series of EWMA correlations.
        """
        n = len(returns_a)
        var_a = np.zeros(n)
        var_b = np.zeros(n)
        cov_ab = np.zeros(n)

        # Initialize with sample statistics (first 20 obs)
        init = 20
        var_a[init - 1] = returns_a.iloc[:init].var()
        var_b[init - 1] = returns_b.iloc[:init].var()
        cov_ab[init - 1] = returns_a.iloc[:init].cov(returns_b.iloc[:init])

        for t in range(init, n):
            ra, rb = returns_a.iloc[t], returns_b.iloc[t]
            var_a[t] = lam * var_a[t-1] + (1 - lam) * ra**2
            var_b[t] = lam * var_b[t-1] + (1 - lam) * rb**2
            cov_ab[t] = lam * cov_ab[t-1] + (1 - lam) * ra * rb

        # Correlation = cov / (std_a * std_b)
        corr = cov_ab / (np.sqrt(var_a) * np.sqrt(var_b) + 1e-12)
        corr = np.clip(corr, -1, 1)

        return pd.Series(corr, index=returns_a.index)

    # Example: Two stocks during calm and crisis
    np.random.seed(42)
    n = 1000
    # Calm period: low correlation
    calm_a = np.random.normal(0.0005, 0.01, 800)
    calm_b = 0.3 * calm_a + np.random.normal(0, 0.01, 800)

    # Crisis: high correlation
    crisis_common = np.random.normal(-0.005, 0.03, 200)
    crisis_a = crisis_common + np.random.normal(0, 0.005, 200)
    crisis_b = crisis_common + np.random.normal(0, 0.005, 200)

    returns_a = pd.Series(np.concatenate([calm_a, crisis_a]))
    returns_b = pd.Series(np.concatenate([calm_b, crisis_b]))

    corr = ewma_correlation(returns_a, returns_b)
    print(f"Calm correlation (day 400): {corr.iloc[400]:.3f}")    # ~0.25
    print(f"Crisis correlation (day 900): {corr.iloc[900]:.3f}")  # ~0.85
    print(f"Static correlation: {returns_a.corr(returns_b):.3f}")  # ~0.40 (misleading)
  example_bad: |
    import numpy as np
    import pandas as pd

    # WRONG 1: Using static (full-sample) correlation for risk
    corr_static = returns_a.corr(returns_b)  # 0.40
    # Portfolio vol assumes this is constant — understates crisis risk by 50%+

    # WRONG 2: Rolling window too short — noisy
    corr_5day = returns_a.rolling(5).corr(returns_b)
    # Bounces between -1 and +1 randomly — useless for risk

    # WRONG 3: Rolling window too long — too slow to adapt
    corr_252day = returns_a.rolling(252).corr(returns_b)
    # Takes a full year to reflect regime change — too late for hedging

    # WRONG 4: Covariance without scaling to correlation
    cov = returns_a.rolling(20).cov(returns_b)
    # Covariance depends on scale; cannot compare across asset pairs
  when_applies: "Portfolio optimization, multi-asset risk management, dynamic hedging, any system that combines multiple assets and needs accurate co-movement estimates."
  sources:
    - "https://en.wikipedia.org/wiki/Volatility_(finance)"
    - "https://arch.readthedocs.io/en/latest/"

- id: "FIN-VOL-013"
  text: "The square-root-of-time rule (sigma_T = sigma_1 * sqrt(T)) for scaling volatility ONLY holds under i.i.d. returns. It fails when returns have autocorrelation (trending/mean-reverting markets), volatility clustering (GARCH effects), or jumps. Overuse of this rule can underestimate risk at long horizons by 20-40%. Use GARCH multi-step forecasts or bootstrap methods instead."
  why: >
    The square-root-of-time rule comes from the property that variance of a sum of i.i.d.
    random variables equals the sum of variances: Var(sum r_i) = T * Var(r). Taking square
    roots gives sigma_T = sigma_1 * sqrt(T). However, financial returns are NOT i.i.d.:
    (1) Volatility clusters (GARCH), so high-vol periods persist — sqrt(T) underestimates.
    (2) Returns may be autocorrelated — positive autocorrelation makes sqrt(T) underestimate,
    negative autocorrelation makes it overestimate. (3) Jumps (crashes) violate the continuous
    diffusion assumption. Basel III recognized this and requires banks to use specific scaling
    factors, not just sqrt(T). For VaR at 10-day horizon, sqrt(10) = 3.16, but GARCH-based
    scaling during high-vol periods can give effective factors of 3.5-4.0.
  how_to_do_right: |
    1. Test if sqrt(T) is appropriate: check return autocorrelation and kurtosis
    2. Autocorrelation test: Ljung-Box Q-test at lags 1-10 on returns and squared returns
    3. If Q-test on squared returns is significant (p < 0.05): volatility clusters → don't use sqrt(T)
    4. Use GARCH multi-step forecast (FIN-VOL-006) for the correct horizon scaling
    5. Alternative: filtered historical simulation — resample GARCH residuals and re-aggregate
    6. For short horizons (1-5 days) and low persistence, sqrt(T) is acceptable (~5% error)
    7. For long horizons (> 20 days) with GARCH effects, sqrt(T) can err by 20-40%
    8. Always report the scaling method used alongside risk numbers
    9. Bootstrap: resample {z_t} residuals, re-apply GARCH recursion, aggregate to horizon T
  severity: high
  technologies:
    lang: [python, numpy, scipy]
    framework: [arch, scipy, statsmodels]
  domains:
    domain: [fintech, risk_management]
    concern: [domain_specific, numerical_accuracy]
  example_good: |
    import numpy as np
    import pandas as pd
    from scipy import stats
    from arch import arch_model

    def compare_scaling_methods(returns: pd.Series,
                                  horizon: int = 10) -> dict:
        """Compare sqrt(T) vs GARCH scaling.

        Args:
            returns: Daily log returns.
            horizon: Scaling horizon in trading days.

        Returns:
            Dict comparing methods.
        """
        # 1. Square-root-of-time rule (naive)
        daily_vol = returns.std(ddof=1)
        sqrt_t_vol = daily_vol * np.sqrt(horizon)

        # 2. Ljung-Box test on squared returns (test for GARCH effects)
        from statsmodels.stats.diagnostic import acorr_ljungbox
        lb_result = acorr_ljungbox(returns**2, lags=[10], return_df=True)
        lb_pvalue = lb_result['lb_pvalue'].values[0]
        has_garch = lb_pvalue < 0.05

        # 3. GARCH-based scaling
        scaled = returns * 100
        model = arch_model(scaled, vol='Garch', p=1, q=1, dist='t')
        result = model.fit(disp='off')

        forecasts = result.forecast(horizon=horizon)
        garch_var = forecasts.variance.iloc[-1].values.sum()
        garch_vol = np.sqrt(garch_var) / 100  # Scale back

        # 4. Compare
        ratio = garch_vol / sqrt_t_vol

        return {
            'daily_vol': daily_vol,
            'sqrt_t_vol': sqrt_t_vol,
            'garch_vol': garch_vol,
            'ratio_garch_to_sqrt': ratio,
            'ljung_box_pvalue': lb_pvalue,
            'has_garch_effects': has_garch,
            'recommendation': 'Use GARCH' if has_garch else 'sqrt(T) acceptable',
        }

    # Example: compare during volatile period
    np.random.seed(42)
    n = 2000
    returns = pd.Series(np.random.normal(0, 0.012, n))
    # Add volatility clustering
    for i in range(1, n):
        if abs(returns.iloc[i-1]) > 0.02:
            returns.iloc[i] *= 2.0  # Double vol after big move

    result = compare_scaling_methods(returns, horizon=10)
    print(f"Sqrt(10) vol: {result['sqrt_t_vol']:.4f}")
    print(f"GARCH vol:    {result['garch_vol']:.4f}")
    print(f"Ratio: {result['ratio_garch_to_sqrt']:.2f}x")
    print(f"GARCH effects: {result['has_garch_effects']}")
    print(f"Recommendation: {result['recommendation']}")
  example_bad: |
    import numpy as np

    # WRONG: Blindly using sqrt(T) for all horizons
    daily_vol = 0.015  # 1.5% daily

    # 10-day VaR: sqrt(10) * daily_vol = 4.74%
    var_10d = 2.33 * daily_vol * np.sqrt(10)  # 0.1107

    # 252-day VaR: sqrt(252) * daily_vol = 23.8%
    var_annual = 2.33 * daily_vol * np.sqrt(252)  # 0.5548
    # If returns are autocorrelated (trending), actual annual VaR could be 30-40%
    # If there's volatility clustering, sqrt scaling underestimates crisis VaR

    # Also wrong: scaling VaR directly
    # VaR_10 = VaR_1 * sqrt(10) — this is the same as sqrt(T) rule
    # But often presented as if it's a different/better approach
    var_1d = 0.035  # 1-day 99% VaR
    var_10d_wrong = var_1d * np.sqrt(10)  # Same assumption!
  when_applies: "Scaling VaR to multi-day horizons, regulatory risk reporting (Basel), portfolio risk budgeting, any context where daily risk numbers must be converted to longer horizons."
  sources:
    - "https://en.wikipedia.org/wiki/Volatility_(finance)"
    - "https://arch.readthedocs.io/en/latest/"
