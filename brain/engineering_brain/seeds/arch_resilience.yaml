    concern: [distributed_systems]
  example_good: "# Bounded queue with backpressure — rejects when full\nimport asyncio\n\nclass BoundedTaskQueue:\n    def\
    \ __init__(self, max_size: int = 1000):\n        self.queue: asyncio.Queue = asyncio.Queue(maxsize=max_size)\n       \
    \ self.metrics = QueueMetrics()\n\n    async def enqueue(self, task: Task) -> bool:\n        \"\"\"Returns False if queue\
    \ is full — caller must handle.\"\"\"\n        try:\n            self.queue.put_nowait(task)\n            self.metrics.record_enqueue(self.queue.qsize())\n\
    \            return True\n        except asyncio.QueueFull:\n            self.metrics.record_rejection()\n           \
    \ return False  # Backpressure signal — caller should retry or shed\n\n    async def process(self):\n        while True:\n\
    \            task = await self.queue.get()\n            await self._execute(task)\n\n# API handler with backpressure\n\
    @router.post(\"/tasks\")\nasync def submit_task(body: TaskRequest):\n    accepted = await task_queue.enqueue(Task.from_request(body))\n\
    \    if not accepted:\n        # Backpressure: tell client to slow down\n        return JSONResponse(\n            {\"\
    error\": \"Service at capacity\", \"retry_after\": 5},\n            status_code=503,\n            headers={\"Retry-After\"\
    : \"5\"},\n        )\n    return {\"status\": \"accepted\"}\n"
  example_bad: "# Unbounded queue — grows until OOM crash\nimport queue\n\ntask_queue = []  # Unbounded list used as queue\n\
