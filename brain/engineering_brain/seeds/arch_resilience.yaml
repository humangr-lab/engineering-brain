- id: CR-ARCH-RBP-001
  text: Backpressure — Signal to upstream producers that the downstream consumer cannot keep up. Use bounded queues, flow
    control, and load shedding to prevent memory exhaustion and cascade failures.
  why: 'When a producer generates messages faster than the consumer can process them, unbounded queues grow until memory is
    exhausted and the process is OOM-killed. This is the most common cause of overnight production crashes: a traffic spike
    at midnight fills a queue, consumer falls behind, memory grows linearly, OOM at 3 AM, on-call woken up. Backpressure signals
    the producer to slow down BEFORE memory is exhausted. The two strategies: push-back (reject new messages) or shed load
    (drop lowest priority messages). Both are better than crashing.'
  how_to_do_right: '1. Bounded queues: set a maximum queue size. When full, reject new items (block or return error).

    2. Flow control: producer adapts rate based on consumer acknowledgment speed (TCP-style).

    3. Load shedding: when overloaded, drop lowest-priority work to protect highest-priority.

    4. Admission control: reject requests at the gateway when backend capacity is reached.

    5. Rate limiting upstream: limit producer rate to consumer''s sustainable throughput.

    6. Monitor queue depth: growing queue = consumer falling behind = capacity problem.

    '
  severity: critical
  technologies:
    lang: [python, go]
    platform: [kafka, rabbitmq]
  domains:
