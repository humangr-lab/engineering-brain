- id: CR-ARCH-RLS-001
  text: Load Shedding — Under overload, proactively reject low-priority work to protect capacity for high-priority work. Drop
    the least important requests rather than degrading everything equally.
  why: 'When a service is overloaded, serving ALL requests slowly is worse than serving IMPORTANT requests fast and rejecting
    the rest. A checkout request that times out is a lost sale. A recommendation request that times out is invisible to the
    user. Load shedding prioritizes: checkout gets served (revenue-critical), recommendations get dropped (nice-to-have).
    Without load shedding, all requests compete equally for the same resources, and the most important requests fail alongside
    the least important ones.'
  how_to_do_right: '1. Classify requests by priority: P0 (checkout, payment), P1 (search, browse), P2 (recommendations, analytics).

    2. Measure current load: request queue depth, CPU utilization, active connections.

    3. Shedding thresholds: at 80% capacity, shed P2. At 90%, shed P1. At 95%, shed P0 (circuit breaker).

    4. Return 503 with Retry-After for shed requests — client knows it is load-related.

    5. Admission control at the gateway: reject before the request consumes backend resources.

    6. Monitor shedding rate: sustained shedding = capacity planning needed.

    '
  severity: high
  technologies:
    lang: [python, go]
    platform: [nginx, envoy]
  domains:
    domain: [reliability, performance]
    concern: [scalability]
  example_good: "# Priority-based load shedding\nfrom enum import IntEnum\n\nclass Priority(IntEnum):\n    CRITICAL = 0  \
    \ # Checkout, payment — never shed (until extreme)\n    HIGH = 1        # Search, product pages\n    MEDIUM = 2      #\
    \ Recommendations, reviews\n    LOW = 3         # Analytics, tracking, prefetch\n\nclass LoadShedder:\n    def __init__(self,\
    \ max_concurrent: int = 1000):\n        self.max_concurrent = max_concurrent\n        self.current_load = 0\n        self.shed_threshold\
    \ = {\n            Priority.LOW: 0.7,       # Shed at 70% capacity\n            Priority.MEDIUM: 0.85,   # Shed at 85%\
    \ capacity\n            Priority.HIGH: 0.95,     # Shed at 95% capacity\n            Priority.CRITICAL: 1.0,  # Shed only\
    \ at 100% (last resort)\n        }\n\n    def should_admit(self, priority: Priority) -> bool:\n        utilization = self.current_load\
    \ / self.max_concurrent\n        return utilization < self.shed_threshold[priority]\n\n# Middleware\n@app.middleware(\"\
    http\")\nasync def load_shed_middleware(request, call_next):\n    priority = classify_request_priority(request)\n    if\
    \ not load_shedder.should_admit(priority):\n        return JSONResponse(\n            {\"error\": \"Service at capacity\"\
    , \"priority\": priority.name},\n            status_code=503,\n            headers={\"Retry-After\": \"5\"},\n       \
    \ )\n    load_shedder.current_load += 1\n    try:\n        return await call_next(request)\n    finally:\n        load_shedder.current_load\
    \ -= 1\n"
  example_bad: "# No load shedding — all requests treated equally\n@app.middleware(\"http\")\nasync def no_shedding(request,\
    \ call_next):\n    # Every request is accepted, regardless of current load\n    return await call_next(request)\n\n# Under\
    \ 2x capacity:\n# - Checkout requests: 4 second response time (was 200ms) → user abandons\n# - Analytics events: 4 second\
    \ response time (was 200ms) → nobody notices\n# - Recommendation calls: 4 second response time → nobody cares\n#\n# Result:\
    \ ALL users get a bad experience equally\n# Revenue-critical checkout is as slow as non-critical analytics\n# $50K/hour\
    \ in lost revenue because we treated analytics equally with checkout\n"
  sources: ["https://sre.google/sre-book/load-balancing-frontend/"]
  when_applies: "When designing load shedding to protect critical paths under extreme traffic conditions"
- id: CR-ARCH-ROB-001
  text: Three Pillars of Observability — Metrics (quantitative trends), Logs (qualitative events), and Traces (request journey).
    Each serves a different debugging purpose. Use all three, correlated by request ID.
  why: 'Metrics tell you WHAT is wrong (error rate increased to 5%). Logs tell you WHY it is wrong (NullPointerException in
    PaymentService.charge()). Traces tell you WHERE in the call chain it is wrong (Payment Service → Stripe adapter, 14 seconds).
    Using only one pillar leaves blind spots: metrics without logs means ''something is wrong but I do not know what.'' Logs
    without traces means ''I found the error but I do not know which request triggered it.'' Correlating all three via a shared
    request_id enables: alert (metric) → investigate (trace) → root cause (log) in minutes.'
  how_to_do_right: '1. Metrics: counters (requests_total), gauges (connections_active), histograms (latency_seconds).

    2. Logs: structured JSON with request_id, timestamp, level, service, message. Never unstructured strings.

    3. Traces: OpenTelemetry spans with trace_id propagated across services.

    4. Correlation: request_id in all three — click from alert to trace to log.

    5. RED method for services: Rate (requests/sec), Errors (error rate), Duration (latency).

    6. USE method for resources: Utilization (CPU%), Saturation (queue depth), Errors.

    '
  severity: critical
  technologies:
    lang: [python]
    platform: [prometheus, grafana, jaeger, opentelemetry]
