- id: CR-ARCH-RHC-001
  text: Health Check Types — Implement liveness (am I running?), readiness (can I serve traffic?), and startup (am I initialized?)
    probes separately. Each serves a different purpose in container orchestration.
  why: 'A service can be running (process alive) but not ready (database connection pool not initialized). A service can be
    ready but temporarily unhealthy (memory pressure, long GC pause). Conflating these states causes either premature traffic
    routing (requests fail because DB is not connected) or unnecessary pod restarts (pod is just slow starting, not dead).
    Kubernetes uses three probe types: liveness (restart if failing), readiness (remove from load balancer if failing), and
    startup (give time for slow initialization). Each probe must check the right thing.'
  how_to_do_right: '1. Startup probe: checks initialization (DB migrations complete, cache warmed). Runs once at start.

    2. Readiness probe: checks if the service can handle requests (DB connected, dependent services reachable).

    3. Liveness probe: checks if the process is alive and not deadlocked. Simple: return 200 if main loop is running.

    4. Readiness probe should check dependencies (DB, Redis, downstream services).

    5. Liveness probe should NOT check dependencies — a DB failure should not restart your pod.

    6. Startup probe timeout should be generous (slow DB migrations, large caches).

    '
  severity: high
  technologies:
    lang: [python, go]
    framework: [fastapi]
    platform: [kubernetes]
  domains:
    domain: [reliability, operations, deployment, infrastructure]
  example_good: "# Three separate health check endpoints\n@router.get(\"/health/live\")\nasync def liveness():\n    \"\"\"\
    Liveness: is the process alive and not deadlocked?\n    DO NOT check external dependencies here — a DB failure\n    should\
    \ not cause pod restart (circuit breakers handle that).\"\"\"\n    return {\"status\": \"alive\"}\n\n@router.get(\"/health/ready\"\
    )\nasync def readiness():\n    \"\"\"Readiness: can this instance serve traffic?\n    Check ALL dependencies required\
    \ to handle requests.\"\"\"\n    checks = {}\n    checks[\"database\"] = await check_db_connection()\n    checks[\"redis\"\
    ] = await check_redis_connection()\n    checks[\"kafka\"] = await check_kafka_connection()\n\n    all_healthy = all(c[\"\
    healthy\"] for c in checks.values())\n    status_code = 200 if all_healthy else 503\n    return JSONResponse(\n      \
    \  {\"status\": \"ready\" if all_healthy else \"not_ready\", \"checks\": checks},\n        status_code=status_code,\n\
    \    )\n\n@router.get(\"/health/startup\")\nasync def startup():\n    \"\"\"Startup: has initialization completed?\"\"\
    \"\n    if not app.state.initialized:\n        return JSONResponse({\"status\": \"starting\"}, status_code=503)\n    return\
    \ {\"status\": \"started\"}\n\n# Kubernetes pod spec\n# livenessProbe:\n#   httpGet: { path: /health/live, port: 8080\
    \ }\n#   periodSeconds: 10\n#   failureThreshold: 3  # Restart after 3 failures (30s)\n# readinessProbe:\n#   httpGet:\
    \ { path: /health/ready, port: 8080 }\n#   periodSeconds: 5\n#   failureThreshold: 2  # Remove from LB after 2 failures\
    \ (10s)\n# startupProbe:\n#   httpGet: { path: /health/startup, port: 8080 }\n#   periodSeconds: 5\n#   failureThreshold:\
    \ 30  # Allow 150s for slow startup\n"
  example_bad: "# Single health check that does too much\n@router.get(\"/health\")\nasync def health():\n    # Liveness AND\
    \ readiness AND startup in one endpoint\n    db_ok = await check_db()         # DB down → pod restarted (wrong!)\n   \
    \ redis_ok = await check_redis()   # Redis down → pod restarted (wrong!)\n    kafka_ok = await check_kafka()   # Kafka\
    \ down → pod restarted (wrong!)\n    if not (db_ok and redis_ok and kafka_ok):\n        return {\"status\": \"unhealthy\"\
    }, 503\n    return {\"status\": \"healthy\"}\n\n# Kubernetes uses this for BOTH liveness AND readiness\n# Problem: DB\
