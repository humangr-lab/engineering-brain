- id: CR-ARCH-RFF-001
  text: Feature Flags for Safe Releases — Decouple deployment from release using feature flags. Deploy code anytime; enable
    features gradually via configuration, not code deployment.
  why: Without feature flags, deploying code IS releasing it to all users simultaneously. A bug in a new feature requires
    an emergency rollback of the entire deployment. With feature flags, code is deployed but disabled by default. The product
    manager enables it for 1% of users, monitors metrics, and gradually increases to 100%. If a problem is found at 5%, the
    flag is turned off in seconds — no deployment, no rollback, no downtime. Feature flags also enable A/B testing, beta programs,
    and kill switches for expensive features during load spikes.
  how_to_do_right: '1. Deployment: code goes to production, feature flag is OFF by default.

    2. Release: flag enabled for internal users → beta users → 10% → 50% → 100%.

    3. Kill switch: critical features have emergency OFF switch (shed feature under load).

    4. Flag types: boolean (on/off), percentage (rollout %), user segment (beta users only).

    5. Flag lifecycle: create → test → enable → promote → clean up (remove flag and dead code).

    6. Technical debt: flags left in code forever become confusing. Review and clean up quarterly.

    '
  severity: high
  technologies:
    lang: [python, typescript]
    library: [launchdarkly, unleash]
  domains:
    domain: [reliability, operations, deployment]
    concern: [product]
  example_good: "# Feature flag for gradual rollout\nfrom feature_flags import is_enabled\n\n@router.get(\"/checkout\")\n\
    async def checkout(user: AuthUser = Depends()):\n    # New checkout flow — deployed but disabled by default\n    if is_enabled(\"\
    new_checkout_flow\", user_id=user.id, default=False):\n        return await new_checkout_handler(user)\n    else:\n  \
    \      return await legacy_checkout_handler(user)\n\n# Rollout plan (no deployments needed):\n# Day 1: Enable for internal\
    \ team (user segment: \"employees\")\n# Day 2: Enable for 1% of users (percentage rollout: 1%)\n# Day 3: Monitor metrics\
    \ — error rate OK → increase to 10%\n# Day 5: 10% healthy → increase to 50%\n# Day 7: 50% healthy → enable for 100%\n\
    # Day 14: Remove flag + legacy code (cleanup)\n\n# Emergency: bug found at 10% rollout\n# → Turn OFF flag (1 click, <5\
    \ seconds)\n# → 100% of users back on legacy checkout\n# → No deployment, no rollback, no downtime\n"
  example_bad: "# No feature flags — deployment IS release\n@router.get(\"/checkout\")\nasync def checkout(user: AuthUser\
    \ = Depends()):\n    return await new_checkout_handler(user)\n    # Deployed to 100% of users instantly\n    # Bug found\
    \ at 2 AM: 15% of checkouts fail\n    # Emergency rollback: git revert → build → deploy (30 minutes)\n    # 30 minutes\
    \ of broken checkout = $45K in lost revenue\n    # With feature flag: 5 seconds to disable\n"
  sources: ["https://martinfowler.com/articles/feature-toggles.html"]
  when_applies: "When using feature flags to control graceful degradation during incidents"
- id: CR-ARCH-RCP-001
  text: Connection Pool Management — Size database connection pools based on measured concurrency, not guesses. Monitor pool
    exhaustion, wait time, and connection lifetime.
  why: 'Each database connection consumes memory on both the application server (~5MB) and the database server (~10MB). A
    pool of 100 connections across 10 pods = 1000 connections to PostgreSQL. PostgreSQL performs poorly above 200-300 connections
    (context switching overhead). An oversized pool wastes memory and degrades database performance. An undersized pool causes
    request queuing — requests wait for an available connection, increasing latency. The optimal pool size follows the formula:
    connections = (2 * CPU_cores) + effective_disk_spindles for database workloads.'
  how_to_do_right: '1. Formula: pool_size = (2 * CPU_cores) + disk_spindles. For SSD: pool_size = 2 * CPU_cores + 1.

    2. Per-pod pool: if max_connections=200 and 10 pods, each pod gets pool_size=20.

    3. Connection proxy (PgBouncer): multiplexes many application connections to fewer database connections.

    4. Monitor: pool_active (connections in use), pool_waiting (requests queuing), pool_idle (wasted connections).

    5. Timeout: max_wait = 5 seconds. If no connection available in 5s, fail fast (not block forever).

    6. Connection lifetime: max_lifetime = 30 minutes. Recycle connections to prevent stale state.

    '
  severity: high
  technologies:
    lang: [python]
    framework: [sqlalchemy]
    library: [pgbouncer]
    platform: [postgresql]
  domains:
    domain: [reliability, performance, databases]
  example_good: "# SQLAlchemy connection pool with proper configuration\nfrom sqlalchemy import create_engine\n\nengine =\
    \ create_engine(\n    DATABASE_URL,\n    pool_size=10,            # Steady-state connections per pod\n    max_overflow=5,\
    \          # Burst capacity (temporary extra connections)\n    pool_timeout=5,          # Max wait for connection (fail\
    \ fast)\n    pool_recycle=1800,       # Recycle connections every 30 minutes\n    pool_pre_ping=True,      # Test connection\
    \ before using (handles DB restarts)\n    echo_pool=\"debug\",       # Log pool events for monitoring\n)\n\n# With PgBouncer\
    \ in front of PostgreSQL:\n# 10 pods * 15 connections each = 150 connections to PgBouncer\n# PgBouncer multiplexes to\
    \ 30 real PostgreSQL connections\n# PostgreSQL sees 30 connections (well within optimal range)\n\n# Monitoring queries:\n\
    # SELECT count(*) FROM pg_stat_activity;  -- Current connections\n# PgBouncer: SHOW POOLS;  -- Active, waiting, idle per\
    \ pool\n"
  example_bad: "# Oversized pool — kills database performance\nengine = create_engine(\n    DATABASE_URL,\n    pool_size=100,\
    \     # 100 connections per pod!\n    max_overflow=50,   # Burst to 150 per pod!\n    pool_timeout=30,   # Wait 30 seconds\
    \ (user gives up at 5s)\n    # No pool_recycle — stale connections accumulate\n    # No pool_pre_ping — uses dead connections,\
    \ gets errors\n)\n# 10 pods * 150 connections = 1500 connections to PostgreSQL\n# PostgreSQL max_connections=200 (default)\
    \ → connection refused!\n# Even if raised to 1500: context switching overhead kills performance\n# DB CPU at 100% just\
    \ managing connections, not executing queries\n"
  sources: ["https://learn.microsoft.com/en-us/azure/architecture/patterns/cache-aside"]
  when_applies: "When adding caching layers to reduce load on downstream services and databases"
- id: CR-ARCH-RCA-001
  text: Capacity Planning — Measure current resource utilization, project growth, and provision headroom BEFORE you hit limits.
    Use load testing to find breaking points and plan scaling triggers.
  why: 'Reactive scaling (scale when the system crashes) means outages. Proactive capacity planning (scale before you hit
    limits) means continuous availability. Black Friday traffic is 10x normal — if you plan for 2x, you will have a 5-hour
    outage during your highest revenue period. Capacity planning requires: knowing your current baseline (CPU, memory, connections
    at normal load), knowing your ceiling (load test to find the breaking point), and knowing your growth rate (traffic doubles
    every 6 months). The buffer is the gap between current usage and the ceiling — when the buffer shrinks below 20%, it is
    time to scale.'
  how_to_do_right: '1. Baseline: measure current resource utilization at peak (not average — peaks cause outages).

    2. Ceiling: load test to find the breaking point (what traffic level causes p99 > SLO?).

    3. Buffer: ceiling - baseline = available headroom. Target: >30% buffer at peak.

    4. Growth projection: plot utilization over time, project when buffer reaches 20%.

    5. Scaling triggers: autoscale at 70% CPU (reactive). Plan capacity increases at 50% trend (proactive).

    6. Load test regularly: the ceiling changes as code changes. Re-test after major releases.

    '
  severity: high
  technologies:
    lang: [python]
    library: [k6]
    platform: [kubernetes, prometheus, grafana]
  domains:
    domain: [reliability, performance, operations]
    concern: [sre]
  example_good: '# Capacity planning dashboard (Grafana)

    #

    # Panel 1: Current vs Ceiling

    #   CPU: 45% used / 100% ceiling = 55% buffer (GREEN)

    #   Memory: 60% used / 100% ceiling = 40% buffer (GREEN)

    #   DB connections: 150 used / 200 ceiling = 25% buffer (YELLOW)

    #   Request rate: 800 rps / 1200 rps ceiling = 33% buffer (GREEN)

    #

    # Panel 2: Growth Projection

    #   At current growth rate (15% month-over-month):

    #   DB connections will hit ceiling in 3 months → ACTION: add PgBouncer

    #   CPU will hit 70% in 5 months → ACTION: plan horizontal scaling

    #

    # Panel 3: Load Test Results (last run: 2026-02-10)

    #   Breaking point: 1,200 rps (p99 > 2s SLO at 1,200 rps)

    #   Current peak: 800 rps

    #   Buffer: 400 rps (33%)

    #

    # Autoscale config:

    # apiVersion: autoscaling/v2

    # kind: HorizontalPodAutoscaler

    # spec:

    #   minReplicas: 3

    #   maxReplicas: 20

    #   metrics:

    #     - type: Resource

    #       resource:

    #         name: cpu

    #         target:

    #           type: Utilization

    #           averageUtilization: 70  # Scale at 70% CPU

    '
  example_bad: '# No capacity planning — reactive scaling (scale after crash)

    #

    # Month 1: 100 rps, 2 pods, everything fine

    # Month 3: 200 rps, 2 pods, "still fine, a little slow"

    # Month 5: 400 rps, 2 pods, "latency is high but acceptable"

    # Month 6: 600 rps, 2 pods, "we should probably scale soon"

    # Month 7: 800 rps, 2 pods, OUTAGE — connection pool exhausted

    #   3 hours of downtime while scrambling to add pods

    #   Database connections maxed out — adding pods makes it WORSE

    #   Need PgBouncer, but installing it takes 2 days

    #   Revenue loss: $150K

    #   Root cause: nobody was watching the trend line

    '
  sources: ["https://sre.google/sre-book/postmortem-culture/"]
  when_applies: "When conducting post-incident analysis and building resilience improvement plans"
- id: CR-ARCH-RTR-001
  text: Toil Elimination — Automate repetitive, manual operational work that scales linearly with service size. If humans
    do it more than twice, automate it.
  why: 'Toil is manual, repetitive, automatable work that grows linearly with service size: restarting crashed pods, rotating
    certificates, responding to the same alert with the same fix, manually running database migrations, copying logs to S3.
    Every hour spent on toil is an hour NOT spent on improving reliability, building features, or reducing future toil. Google''s
    SRE model caps toil at 50% of an engineer''s time — the other 50% goes to engineering work that permanently reduces toil.
    Without this discipline, toil grows until 100% of engineering time is spent firefighting.'
  how_to_do_right: '1. Identify toil: any manual work that is repetitive, automatable, and grows with service size.

    2. Measure toil: track hours per week spent on manual operational tasks.

    3. Prioritize automation: automate the highest-frequency toil first (biggest time savings).

    4. Self-healing: automated remediation for known issues (restart on OOM, scale on high CPU).

    5. Runbooks → code: every runbook step should eventually become an automated script.

    6. Target: <50% toil. If toil exceeds 50%, stop feature work and automate.

    '
  severity: medium
  technologies:
    lang: [python]
    platform: [kubernetes, ansible, terraform]
  domains:
    domain: [reliability, operations]
    concern: [sre, automation]
  example_good: "# Self-healing automation — replaces manual runbook\n# BEFORE (manual toil — 15 min per incident, 3x/week):\n\
    # 1. Alert fires: \"order-service high memory\"\n# 2. On-call SSH into pod, check memory usage\n# 3. Identify the leak\
    \ (always the same cache growing unbounded)\n# 4. Restart the pod\n# 5. Monitor for 5 minutes\n# 6. Close the alert\n\
    # Time: 15 min * 3/week = 45 min/week = 39 hours/year\n\n# AFTER (automated — 0 min per incident):\n# Kubernetes handles\
    \ it automatically:\napiVersion: v1\nkind: Pod\nspec:\n  containers:\n    - name: order-service\n      resources:\n  \
    \      limits:\n          memory: \"512Mi\"  # OOM-kill at 512Mi → Kubernetes restarts automatically\n      livenessProbe:\n\
    \        httpGet: { path: /health/live, port: 8080 }\n        periodSeconds: 10\n        failureThreshold: 3  # 3 failures\
    \ → automatic restart\n\n# Plus: fix the root cause (unbounded cache)\nfrom cachetools import TTLCache\ncache = TTLCache(maxsize=10000,\
    \ ttl=300)  # Bounded + TTL\n# Now: zero incidents per week, zero toil\n"
  example_bad: '# Manual toil consuming engineering time

    #

    # Every Monday:

    # - Manually check disk usage on 15 servers (30 min)

    # - Manually rotate 3 API keys (45 min — generate, update, verify)

    # - Manually run database vacuum (20 min)

    # - Manually review and acknowledge 50 alerts (60 min)

    #

    # Every incident:

    # - SSH into server, check logs, restart service (15 min)

    # - Same fix every time — nobody automates it

    #

    # Weekly toil: 3+ hours

    # Annual toil: 156 hours = 4 full work weeks

    # With 5 engineers: 780 hours/year = 20 work weeks on autopilot tasks

    # That is 5 months of engineering capacity wasted on work a script could do

    '
  sources: ["https://opentelemetry.io/docs/concepts/signals/traces/"]
  when_applies: "When instrumenting distributed systems with tracing for latency diagnosis and bottleneck detection"
- id: CR-ARCH-RDR-001
  text: Disaster Recovery Planning — Define RPO (how much data can you lose?) and RTO (how long can you be down?), then design
    backup/replication strategies to meet these targets. Test recovery regularly.
  why: 'A disaster (datacenter fire, ransomware, catastrophic bug that corrupts data) will happen — the question is when.
    Without a tested DR plan, recovery time is measured in days or weeks. Gitlab''s 2017 database incident took 18 hours to
    recover because backup restoration had never been tested (one backup method had been silently failing for months). RPO
    and RTO define the business requirement: RPO=1 hour means you can lose up to 1 hour of data (hourly backups). RTO=4 hours
    means the system must be operational within 4 hours. These targets drive the technical solution: real-time replication
    for RPO=0, hot standby for RTO=minutes.'
  how_to_do_right: '1. RPO (Recovery Point Objective): maximum acceptable data loss. RPO=0 requires synchronous replication.

    2. RTO (Recovery Time Objective): maximum acceptable downtime. RTO=minutes requires hot standby.

    3. Backup strategy: full + incremental, stored in a DIFFERENT region/provider than production.

    4. Test recovery: restore from backup monthly. If you have not tested it, it does not work.

    5. Runbook: step-by-step recovery procedure, tested by the person who will execute it at 3 AM.

    6. Multi-region: active-passive (failover) or active-active (both serve traffic). Cost increases with lower RTO.

    '
  severity: critical
  technologies:
    platform: [postgresql, aws, kubernetes, terraform]
  domains:
    domain: [reliability, operations]
    concern: [sre]
  example_good: '# DR strategy matching business requirements

    # RPO = 1 hour (can lose up to 1 hour of data)

    # RTO = 4 hours (must be operational within 4 hours)


    # Backup strategy:

    # 1. PostgreSQL WAL archiving to S3 (continuous, RPO ≈ minutes)

    # 2. Daily full backup to S3 in different region (belt + suspenders)

    # 3. S3 cross-region replication (backup survives regional outage)

    # 4. Application state is stateless (only DB needs recovery)


    # Recovery runbook (tested quarterly):

    # 1. Provision new infrastructure in DR region (Terraform, 15 min)

    # 2. Restore PostgreSQL from WAL archive (pg_basebackup + WAL replay, 2 hours)

    # 3. Update DNS to point to DR region (5 min)

    # 4. Verify application health checks pass (10 min)

    # 5. Total: ~2.5 hours (within 4-hour RTO)


    # Quarterly DR test:

    # - Actually restore from backup to a test environment

    # - Verify data integrity (row counts, checksums)

    # - Time the recovery process (must be < RTO)

    # - Document any issues and update runbook

    '
  example_bad: '# "We have backups" — never tested

    #

    # Backup config (set up 2 years ago):

    # pg_dump --format=custom mydb > /backups/daily.dump  (cron, daily)

    #

    # Disaster: ransomware encrypts all servers

    # Recovery attempt:

    # 1. Find backup: /backups/daily.dump — encrypted by ransomware

    # 2. Find off-site backup: none (backups on same server as DB)

    # 3. Find S3 backup: bucket exists but empty (cron job failed 8 months ago, nobody noticed)

    # 4. Find WAL archive: not configured

    # 5. Last viable backup: 8 months old

    # 6. 8 months of customer data, orders, and transactions: GONE

    #

    # Root cause: backup existed on paper, never tested in practice

    '
  sources: ["https://learn.microsoft.com/en-us/azure/architecture/patterns/throttling"]
  when_applies: "When designing request throttling to prevent resource exhaustion under heavy load"
