- id: CR-ARCH-RCB-001
  text: Circuit Breaker Pattern — Protect services from cascade failures by detecting repeated failures in a dependency and
    short-circuiting calls with an immediate fallback response.
  why: When a downstream service becomes slow or unresponsive, callers accumulate blocked threads/connections waiting for
    timeouts. If the caller has 100 connection pool slots and each waits 30 seconds, the caller is effectively down after
    100 requests (pool exhaustion). The circuit breaker detects the failure pattern and stops making calls entirely (OPEN
    state), returning a fallback immediately. This prevents the caller from wasting resources on a known-failing dependency
    and gives the dependency time to recover. Netflix coined the pattern after experiencing cascade failures across 100+ microservices.
  how_to_do_right: '1. CLOSED state: normal operation. Track failure count in a rolling window.

    2. OPEN state: triggered when failure threshold exceeded. All calls return fallback immediately.

    3. HALF-OPEN state: after recovery timeout, allow ONE probe call through.

    4. If probe succeeds → CLOSED. If probe fails → OPEN again.

    5. Configure per-dependency: aggressive for non-critical (3 failures → OPEN), lenient for critical (10 failures → OPEN).

    6. Meaningful fallback: cached data, default value, degraded feature — not just an error.

    7. Monitor: dashboard showing circuit state per dependency. OPEN = degraded system.

    '
  severity: critical
  technologies:
    lang: [python, java, go, typescript]
  domains:
    domain: [reliability, architecture]
    concern: [microservices, resilience]
  example_good: "# Circuit breaker with meaningful fallback and monitoring\nfrom circuitbreaker import circuit\n\nclass RecommendationClient:\n\
    \    @circuit(\n        failure_threshold=5,        # 5 failures in window → OPEN\n        recovery_timeout=30,      \
    \   # Try again after 30 seconds\n        expected_exception=(httpx.TimeoutException, httpx.HTTPStatusError),\n    )\n\
    \    def get_recommendations(self, user_id: str) -> list[Product]:\n        response = httpx.get(\n            f\"{self.base_url}/recommendations/{user_id}\"\
    ,\n            timeout=httpx.Timeout(connect=1.0, read=3.0),\n        )\n        response.raise_for_status()\n       \
    \ return [Product(**p) for p in response.json()]\n\n    def get_recommendations_safe(self, user_id: str) -> list[Product]:\n\
    \        try:\n            return self.get_recommendations(user_id)\n        except CircuitBreakerError:\n           \
    \ # Circuit OPEN — return cached recommendations (not an error page)\n            cached = self.cache.get(f\"recs:{user_id}\"\
    )\n            if cached:\n                return cached\n            # No cache — return popular items (generic fallback)\n\
    \            return self.get_popular_items()\n\n    def health_status(self) -> dict:\n        state = self.get_recommendations._circuit_breaker.state\n\
    \        return {\"recommendation_service\": state.name}\n        # Dashboard shows: CLOSED (green), HALF_OPEN (yellow),\
    \ OPEN (red)\n"
  example_bad: "# No circuit breaker — caller blocks until timeout, cascades failure\nclass RecommendationClient:\n    def\
    \ get_recommendations(self, user_id: str) -> list[Product]:\n        # No circuit breaker, no timeout configuration\n\
    \        response = requests.get(f\"{self.base_url}/recommendations/{user_id}\")\n        return response.json()\n\n#\
    \ Scenario: recommendation service is slow (30s response time)\n# Request 1: blocks for 30 seconds (timeout)\n# Request\
    \ 2-100: all block for 30 seconds each\n# Connection pool exhausted → THIS service is now down\n# Services calling THIS\
    \ service also start blocking\n# Within 5 minutes: entire system cascade failure\n"
  sources: ["https://martinfowler.com/bliki/CircuitBreaker.html"]
  when_applies: "When protecting services from cascade failures caused by slow or unresponsive downstream dependencies"
- id: CR-ARCH-RCB-002
  text: Bulkhead Isolation — Partition resources (thread pools, connection pools, memory) by dependency or criticality so
    that a failure in one partition does not exhaust resources shared by others.
  why: 'Without bulkheads, all service calls share the same connection pool. If the Payment Service becomes slow and consumes
    all 100 connections from the shared pool, the Inventory Service (which is perfectly healthy) cannot be reached because
    no connections are available. Bulkhead isolation gives each dependency its own resource pool: 30 connections for Payment,
    30 for Inventory, 30 for Notifications, 10 reserve. Payment can exhaust its 30 connections without affecting Inventory
    at all. Named after ship bulkheads that contain flooding to one compartment.'
  how_to_do_right: '1. Thread pool isolation: each dependency gets its own thread pool (Hystrix-style).

    2. Semaphore isolation: lighter weight — limits concurrent calls per dependency.

    3. Connection pool isolation: separate HTTP client per dependency with its own pool size.

    4. Partition by criticality: critical path (checkout) gets more resources than non-critical (recommendations).

    5. Queue-based bulkhead: bounded queue per partition — reject when full (shed load).

    6. Monitor: track pool utilization per partition. >80% utilization = capacity alert.

    '
  severity: high
  technologies:
    lang: [python, java, go]
  domains:
    domain: [reliability, architecture]
    concern: [microservices, resilience]
  example_good: "# Bulkhead: separate HTTP clients with dedicated connection pools\nclass ServiceClients:\n    def __init__(self):\n\
    \        # Critical path — larger pool, longer timeouts\n        self.payment_client = httpx.AsyncClient(\n          \
    \  base_url=\"http://payment-service\",\n            limits=httpx.Limits(max_connections=30, max_keepalive_connections=10),\n\
    \            timeout=httpx.Timeout(connect=2.0, read=10.0),\n        )\n        # Critical path — medium pool\n      \
    \  self.inventory_client = httpx.AsyncClient(\n            base_url=\"http://inventory-service\",\n            limits=httpx.Limits(max_connections=20,\
    \ max_keepalive_connections=5),\n            timeout=httpx.Timeout(connect=1.0, read=5.0),\n        )\n        # Non-critical\
    \ — small pool, short timeouts\n        self.recommendation_client = httpx.AsyncClient(\n            base_url=\"http://recommendation-service\"\
    ,\n            limits=httpx.Limits(max_connections=5, max_keepalive_connections=2),\n            timeout=httpx.Timeout(connect=0.5,\
    \ read=2.0),\n        )\n        # If recommendation service exhausts its 5 connections,\n        # payment and inventory\
    \ are completely unaffected\n\n    async def close(self):\n        await self.payment_client.aclose()\n        await self.inventory_client.aclose()\n\
    \        await self.recommendation_client.aclose()\n"
  example_bad: "# Shared connection pool — one slow service affects all\n# Single HTTP client for everything\nclient = httpx.AsyncClient(\n\
    \    limits=httpx.Limits(max_connections=50),\n)\n\nasync def checkout(order):\n    # All calls share the same 50-connection\
    \ pool\n    payment = await client.post(\"http://payment-service/charge\", ...)   # 40 connections (slow)\n    inventory\
    \ = await client.post(\"http://inventory-service/reserve\", ...)  # Blocked — pool exhausted!\n    notification = await\
    \ client.post(\"http://notification-service/send\", ...)  # Blocked!\n    # Payment service is slow → consumes all 50\
    \ connections\n    # Inventory and Notification are healthy but unreachable\n    # Checkout is completely broken even\
    \ though only Payment is degraded\n"
  sources: ["https://learn.microsoft.com/en-us/azure/architecture/patterns/circuit-breaker"]
  when_applies: "When configuring circuit breaker thresholds and monitoring across multiple service dependencies"
- id: CR-ARCH-RTO-001
  text: Timeout Budget (Deadline Propagation) — Propagate a total request deadline across the call chain, subtracting elapsed
    time at each hop. Inner calls cannot exceed the remaining budget.
  why: 'Without deadline propagation, each service sets its own timeout independently. Gateway: 30s, Service A: 10s, Service
    B: 10s, Service C: 10s. If Service B takes 9.9 seconds, Service C gets the full 10 seconds — total: 29.8 seconds. The
    user waited almost 30 seconds. With deadline propagation, the gateway sets a 5-second total deadline. Service A receives
    5s, uses 1s, propagates 4s to B. B uses 2s, propagates 2s to C. If C cannot complete in 2s, it fails fast. Total maximum:
    5 seconds. The user gets a response or an error quickly.'
  how_to_do_right: '1. Set a total deadline at the entry point (API Gateway or first service in chain).

    2. Propagate deadline via headers: `X-Request-Deadline: 2026-02-17T12:00:05Z` or `grpc-timeout`.

    3. Each service: remaining = deadline - now(). If remaining <= 0, return error immediately.

    4. Each service: set downstream timeout = min(own_timeout, remaining_budget).

    5. Use context.WithDeadline (Go), CancellationToken (.NET), or custom middleware (Python).

    6. Separate connect timeout (1s) from read timeout (varies by budget).

    '
  severity: high
  technologies:
    lang: [python, go, java]
    platform: [grpc]
  domains:
    domain: [reliability, architecture, performance]
    concern: [microservices]
  example_good: "# Deadline propagation middleware\nfrom datetime import datetime, timedelta\n\nclass DeadlinePropagation:\n\
    \    \"\"\"Middleware that propagates request deadlines across services.\"\"\"\n\n    async def __call__(self, request,\
    \ call_next):\n        # Read deadline from upstream\n        deadline_header = request.headers.get(\"X-Request-Deadline\"\
    )\n        if deadline_header:\n            deadline = datetime.fromisoformat(deadline_header)\n        else:\n      \
    \      # Entry point: set initial deadline (5 seconds from now)\n            deadline = datetime.utcnow() + timedelta(seconds=5)\n\
    \n        remaining = (deadline - datetime.utcnow()).total_seconds()\n        if remaining <= 0:\n            return JSONResponse({\"\
    error\": \"deadline exceeded\"}, status_code=504)\n\n        # Store in request context for downstream calls\n       \
    \ request.state.deadline = deadline\n        request.state.remaining_budget = remaining\n\n        return await call_next(request)\n\
    \n# Downstream call respects remaining budget\nasync def call_inventory(request, sku: str):\n    remaining = request.state.remaining_budget\n\
    \    response = await httpx.get(\n        f\"http://inventory/{sku}\",\n        timeout=httpx.Timeout(connect=1.0, read=min(5.0,\
    \ remaining - 0.5)),\n        headers={\"X-Request-Deadline\": request.state.deadline.isoformat()},\n    )\n    return\
    \ response.json()\n"
  example_bad: '# Independent timeouts — no deadline propagation

    # Gateway: timeout = 30s

    # Service A: timeout to B = 10s

    # Service B: timeout to C = 10s

    # Service C: timeout to D = 10s

    #

    # Worst case: A waits 10s for B, B waits 10s for C, C waits 10s for D

    # Total: 30 seconds — user sees spinning wheel for 30 seconds

    # Each service thinks "10 seconds is reasonable" in isolation

    # But the CHAIN of 10s + 10s + 10s is not reasonable for the user

    #

    # With deadline propagation: total budget = 5s

    # A uses 1s, propagates 4s → B uses 2s, propagates 2s → C must finish in 2s

    '
  sources: ["https://learn.microsoft.com/en-us/azure/architecture/patterns/retry"]
  when_applies: "When designing timeout strategies for services that call multiple external dependencies"
- id: CR-ARCH-RRL-001
  text: Rate Limiting — Protect services from traffic spikes by limiting the number of requests per time window. Use token
    bucket for smooth rate with burst capacity, sliding window for strict rate enforcement.
  why: Without rate limiting, a single misbehaving client (or DDoS attack) can overwhelm a service, causing latency spikes
    and outages for all clients. Rate limiting ensures fair resource allocation and protects backend services from overload.
    At the API Gateway level, it prevents abuse. At the service level, it prevents cascade failures. Distributed rate limiting
    (via Redis) ensures consistent limits across multiple service instances. The 429 (Too Many Requests) response with Retry-After
    header tells clients exactly when to retry.
  how_to_do_right: '1. Token bucket: allows bursts up to bucket size, refills at steady rate. Best for APIs with variable
    traffic.

    2. Sliding window: strict count per time window. Best for fixed-rate quotas.

    3. Distributed rate limiting: use Redis INCR with TTL for consistent limits across instances.

    4. Tiered limits: free tier (100/hour), paid tier (10000/hour), enterprise (unlimited).

    5. Return 429 with Retry-After header — tell clients when to retry.

    6. Client-side: implement exponential backoff with jitter (do not retry immediately).

    7. Distinguish rate types: per-user, per-API-key, per-IP, global.

    '
  severity: critical
  technologies:
    lang: [python, go]
    platform: [redis, nginx]
  domains:
    domain: [reliability, security, architecture, api]
  example_good: "# Distributed rate limiter using Redis sliding window\nimport redis\nimport time\n\nclass SlidingWindowRateLimiter:\n\
    \    def __init__(self, redis_client: redis.Redis, limit: int, window_seconds: int):\n        self.redis = redis_client\n\
    \        self.limit = limit\n        self.window = window_seconds\n\n    def is_allowed(self, key: str) -> tuple[bool,\
    \ dict]:\n        now = time.time()\n        window_start = now - self.window\n        pipe = self.redis.pipeline()\n\
    \        # Remove expired entries\n        pipe.zremrangebyscore(key, 0, window_start)\n        # Count requests in current\
    \ window\n        pipe.zcard(key)\n        # Add current request\n        pipe.zadd(key, {str(now): now})\n        # Set\
    \ TTL for cleanup\n        pipe.expire(key, self.window)\n        _, count, _, _ = pipe.execute()\n\n        if count\
    \ >= self.limit:\n            retry_after = self.window - (now - window_start)\n            return False, {\"Retry-After\"\
    : str(int(retry_after))}\n        return True, {\"X-RateLimit-Remaining\": str(self.limit - count - 1)}\n\n# Usage in\
    \ middleware\n@app.middleware(\"http\")\nasync def rate_limit_middleware(request, call_next):\n    key = f\"ratelimit:{request.client.host}\"\
    \n    allowed, headers = limiter.is_allowed(key)\n    if not allowed:\n        return JSONResponse({\"error\": \"Too many\
    \ requests\"}, status_code=429, headers=headers)\n    response = await call_next(request)\n    response.headers.update(headers)\n\
    \    return response\n"
  example_bad: "# No rate limiting — one client can bring down the entire service\n@app.route(\"/api/search\")\ndef search(query:\
    \ str):\n    # No rate limit — a bot can send 10,000 requests/second\n    results = expensive_search(query)  # Each query\
    \ takes 500ms of CPU\n    return results\n    # 10,000 * 500ms = 5,000 seconds of CPU per second\n    # Service overwhelmed\
    \ → all users see 503 errors\n    # Cascades to database → database connection pool exhausted\n    # Cascades to dependent\
    \ services → full system outage\n"
  sources: ["https://learn.microsoft.com/en-us/azure/architecture/patterns/rate-limiting-pattern"]
  when_applies: "When protecting services from traffic spikes, abuse, or resource exhaustion with rate limiting"
- id: CR-ARCH-RGD-001
  text: Graceful Degradation — When a dependency fails, reduce functionality rather than failing completely. Disable non-critical
    features, return cached data, and maintain core user experience.
  why: Users prefer a degraded experience over no experience. When the Recommendation Service is down, showing an empty recommendation
    section is better than returning a 500 error for the entire product page. When the Payment Service is slow, allowing users
    to browse and add to cart (while showing 'checkout temporarily unavailable') retains users who would otherwise leave.
    Netflix's graceful degradation strategy keeps streaming running even when personalization, ratings, and social features
    are down — because the core value is watching content, not browsing recommendations.
  how_to_do_right: '1. Classify features by criticality: critical (checkout), important (search), nice-to-have (recommendations).

    2. Feature flags: toggle non-critical features off when their dependencies fail.

    3. Cached fallbacks: return last-known-good data when fresh data is unavailable.

    4. Static defaults: show popular items when personalization is down.

    5. Partial responses: return what you have, mark missing sections as unavailable.

    6. Priority queuing: under load, serve critical requests first, shed non-critical.

    7. Communicate degradation: show banners like "Some features are temporarily limited."

    '
  severity: critical
  technologies:
    lang: [python, java, typescript, go]
  domains:
    domain: [reliability, architecture]
    concern: [frontend, ux, resilience]
  example_good: "# Product page with graceful degradation\nasync def get_product_page(product_id: str) -> ProductPage:\n \
    \   # Critical: product details (fail = return 404)\n    product = await product_service.get(product_id)  # No fallback\
    \ — critical\n\n    # Important: pricing (fallback = show \"contact for price\")\n    try:\n        price = await pricing_service.get_price(product_id)\n\
    \    except (CircuitBreakerError, TimeoutError):\n        price = PriceFallback(display=\"Contact for price\", available=False)\n\
    \n    # Nice-to-have: recommendations (fallback = popular items)\n    try:\n        recommendations = await recommendation_service.get(product_id)\n\
    \    except (CircuitBreakerError, TimeoutError):\n        recommendations = await cache.get(f\"popular_items\")  # Cached\
    \ fallback\n\n    # Nice-to-have: reviews (fallback = hide section)\n    try:\n        reviews = await review_service.get(product_id)\n\
    \    except (CircuitBreakerError, TimeoutError):\n        reviews = None  # Section not shown — degraded but functional\n\
    \n    return ProductPage(\n        product=product,\n        price=price,\n        recommendations=recommendations or\
    \ [],\n        reviews=reviews,\n        degraded_features=_list_degraded(price, recommendations, reviews),\n    )\n"
  example_bad: "# All-or-nothing — one failure kills the entire page\nasync def get_product_page(product_id: str) -> ProductPage:\n\
    \    # If ANY of these fail, the entire product page returns 500\n    product = await product_service.get(product_id)\n\
    \    price = await pricing_service.get_price(product_id)\n    recommendations = await recommendation_service.get(product_id)\n\
    \    reviews = await review_service.get(product_id)\n    related = await related_products_service.get(product_id)\n\n\
    \    # Recommendation service is down for maintenance (15 minutes)\n    # → Every product page returns 500 for 15 minutes\n\
    \    # → Users cannot even SEE the product, let alone buy it\n    # → Revenue loss during the outage\n    return ProductPage(product,\
    \ price, recommendations, reviews, related)\n"
  sources: ["https://learn.microsoft.com/en-us/azure/architecture/patterns/bulkhead"]
  when_applies: "When designing services that must continue operating with reduced functionality during partial outages"
- id: CR-ARCH-RCE-001
  text: Chaos Engineering — Proactively inject failures into production-like environments to discover weaknesses before they
    cause real outages. Start with a steady-state hypothesis, introduce failures, observe results.
  why: Resilience patterns (circuit breakers, retries, fallbacks) are only as good as their configuration and testing. A circuit
    breaker configured with the wrong threshold does not protect you. A fallback that returns stale data from 6 months ago
    is worse than an error. Chaos engineering validates that resilience mechanisms actually work under realistic conditions.
    Netflix's Chaos Monkey randomly terminates production instances — their services must handle it gracefully. Google's DiRT
    (Disaster Recovery Testing) tests entire datacenter failures. The alternative is finding out your resilience is broken
    during a real outage at 3 AM.
  how_to_do_right: '1. Define steady state: ''order success rate > 99.5%, p99 latency < 2s''.

    2. Hypothesize: ''if we kill 1 inventory service instance, steady state is maintained''.

    3. Run experiment: kill the instance (Chaos Monkey, Litmus, Gremlin).

    4. Observe: did steady state hold? If not, what broke?

    5. Fix: improve resilience, add circuit breakers, fix configuration.

    6. Start small: single instance termination → network partition → entire AZ failure.

    7. Blast radius: start in staging, graduate to production with kill switch.

    '
  severity: high
  technologies:
    lang: [python]
    library: [litmus, gremlin]
    platform: [kubernetes]
  domains:
    domain: [reliability, testing, operations]
    concern: [sre]
  example_good: "# Chaos experiment definition (Litmus ChaosEngine)\n# experiment: kill one pod of order-service, verify steady\
    \ state\napiVersion: litmuschaos.io/v1alpha1\nkind: ChaosEngine\nmetadata:\n  name: order-service-pod-kill\nspec:\n  appinfo:\n\
    \    appns: production\n    applabel: \"app=order-service\"\n  chaosServiceAccount: litmus-admin\n  experiments:\n   \
    \ - name: pod-delete\n      spec:\n        components:\n          env:\n            - name: TOTAL_CHAOS_DURATION\n   \
    \           value: \"60\"        # Kill pod for 60 seconds\n            - name: PODS_AFFECTED_PERC\n              value:\
    \ \"33\"        # Kill 1 of 3 pods\n        probe:\n          - name: order-success-rate\n            type: promProbe\n\
    \            promProbe/inputs:\n              query: \"rate(orders_success_total[5m]) / rate(orders_total[5m])\"\n   \
    \           comparator:\n                criteria: \">=\"\n                value: \"0.995\"   # Steady state: >99.5% success\
    \ rate\n            mode: Continuous\n            runProperties:\n              probeTimeout: 5\n              interval:\
    \ 10\n\n# Expected: pod killed, traffic shifts to remaining 2 pods, success rate maintained\n# If fails: circuit breaker\
    \ misconfigured, load balancer slow to detect failure, etc.\n"
  example_bad: '# "We have resilience" — never tested in practice

    #

    # Team: "We have circuit breakers on all external calls"

    # Reality: threshold set to 100 failures (default) — never triggers

    #

    # Team: "We have fallback responses"

    # Reality: fallback returns data from a cache that expired 6 months ago

    #

    # Team: "We handle pod failures gracefully"

    # Reality: health check endpoint returns 200 even when DB is disconnected

    #

    # First real outage: 3 AM, inventory service OOM-killed

    # Circuit breaker: threshold never reached (only 50 errors before total failure)

    # Fallback: returned 6-month-old inventory data (showed in-stock items that are discontinued)

    # Health check: reported "healthy" → no automatic remediation

    # Duration: 4 hours (manual intervention required)

    # Cost: $200K in lost orders + customer trust damage

    '
  sources: ["https://learn.microsoft.com/en-us/azure/architecture/patterns/compensating-transaction"]
  when_applies: "When handling failed operations in distributed systems that lack native transaction rollback"
- id: CR-ARCH-RSR-001
  text: SLI/SLO/SLA — Define Service Level Indicators (what to measure), Service Level Objectives (target percentages), and
    Service Level Agreements (customer commitments). Use error budgets to balance reliability and velocity.
  why: Without SLOs, reliability is either 'good enough' (subjective) or '100%' (impossible and expensive). SLOs make reliability
    a measurable, achievable target. A 99.9% availability SLO means 43 minutes of downtime per month is acceptable. The error
    budget (0.1% = 43 minutes) is the amount of unreliability you can 'spend' on risky deployments, experiments, and maintenance.
    When the error budget is full, ship features fast. When the error budget is depleted, stop features and focus on reliability.
    This creates a data-driven conversation between product (features) and engineering (reliability).
  how_to_do_right: '1. SLI (indicator): what you measure. Availability: successful requests / total requests. Latency: p99
    < 500ms.

    2. SLO (objective): target percentage. 99.9% availability over 30-day rolling window.

    3. SLA (agreement): customer-facing commitment with consequences. 99.5% uptime or credits.

    4. SLO > SLA: internal target is stricter than customer promise (99.9% vs 99.5%).

    5. Error budget: 100% - SLO = budget. 99.9% SLO → 0.1% error budget → 43 min/month.

    6. Error budget policy: when depleted → freeze features, postmortems for every incident.

    7. When budget is healthy → ship faster, take more risks, run chaos experiments.

    '
  severity: critical
  technologies:
    lang: [python]
    platform: [prometheus, grafana, datadog]
  domains:
    domain: [reliability, operations, management]
    concern: [sre]
  example_good: "# SLI/SLO definitions in code (for automated alerting)\n# sre/slo_config.py\nSLOS = {\n    \"order_api_availability\"\
    : {\n        \"sli\": \"rate(http_requests_total{job='order-api',code!~'5..'}[5m]) / rate(http_requests_total{job='order-api'}[5m])\"\
    ,\n        \"target\": 0.999,        # 99.9%\n        \"window\": \"30d\",\n        \"error_budget_minutes\": 43.2,  #\
    \ 30 days * 24h * 60m * 0.001\n        \"alert_burn_rate\": 14.4, # Alert when burning 14.4x budget (1h = 1 day of budget)\n\
    \    },\n    \"order_api_latency_p99\": {\n        \"sli\": \"histogram_quantile(0.99, rate(http_request_duration_seconds_bucket{job='order-api'}[5m]))\"\
    ,\n        \"target_seconds\": 0.5,   # p99 < 500ms\n        \"window\": \"30d\",\n    },\n    \"checkout_success_rate\"\
    : {\n        \"sli\": \"rate(checkout_success_total[5m]) / rate(checkout_attempts_total[5m])\",\n        \"target\": 0.995,\
    \         # 99.5% of checkout attempts succeed\n        \"window\": \"7d\",\n    },\n}\n\n# Error budget calculation\n\
    def get_error_budget_remaining(slo_name: str) -> float:\n    \"\"\"Returns remaining error budget as percentage (0-100).\"\
    \"\"\n    slo = SLOS[slo_name]\n    actual = query_prometheus(slo[\"sli\"], slo[\"window\"])\n    budget_total = 1 - slo[\"\
    target\"]       # e.g., 0.001\n    budget_consumed = 1 - actual            # e.g., 0.0003\n    return ((budget_total -\
    \ budget_consumed) / budget_total) * 100  # e.g., 70%\n"
  example_bad: '# No SLOs — reliability is subjective

    #

    # Product manager: "The service feels slow"

    # Engineer: "It''s fine, I tested it locally"

    # VP: "I got an error yesterday, fix it"

    # Engineer: "That was a one-time thing"

    #

    # Without SLOs:

    # - No agreed-upon target (is 99% OK? 99.9%? 99.99%?)

    # - No error budget (always pressure for both features AND reliability)

    # - No data (anecdotes drive decisions)

    # - Reliability work is reactive (fix after outage) not proactive

    # - No way to answer: "should we ship this risky feature?"

    #   (Answer with SLO: "yes, we have 35 minutes of error budget remaining")

    '
  sources: ["https://sre.google/sre-book/handling-overload/"]
  when_applies: "When designing load shedding strategies to protect critical services during overload conditions"
- id: CR-ARCH-RSR-002
  text: Incident Management — Structured response to production incidents with clear roles (Incident Commander, Communication
    Lead, Subject Matter Experts) and mandatory blameless postmortems.
  why: 'Without structured incident management, production incidents are chaotic: 15 engineers troubleshooting in parallel,
    nobody coordinating, conflicting fixes applied, customers getting no updates. A structured process with clear roles reduces
    mean time to resolution (MTTR) and prevents panic-driven mistakes. Blameless postmortems prevent the same incident from
    recurring: the root cause is a system failure, not a person failure. Google''s incident management playbook reduced their
    MTTR by 40% after standardization.'
  how_to_do_right: '1. Incident Commander (IC): makes decisions, coordinates response, NOT debugging.

    2. Communication Lead: updates status page, stakeholders, and customers at regular intervals.

    3. Subject Matter Experts (SMEs): debug the issue, propose and implement fixes.

    4. Scribe: documents timeline, actions taken, and decisions in real-time.

    5. Severity levels: SEV1 (system down, revenue impact), SEV2 (degraded), SEV3 (minor, no impact).

    6. Postmortem within 48 hours: timeline, root cause, contributing factors, action items.

    7. Blameless: "the deploy process allowed a bad config" not "John pushed a bad config."

    '
