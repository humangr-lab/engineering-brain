- id: CR-ARCH-RRT-001
  text: Exponential Backoff with Jitter — When retrying failed operations, increase the wait time exponentially with randomized
    jitter to prevent thundering herd synchronization.
  why: When a service goes down and comes back up, all waiting clients retry simultaneously — a thundering herd that immediately
    brings the recovering service back down. Fixed-interval retries create synchronized waves of traffic at exact intervals
    (every 1s, every 2s). Exponential backoff spaces retries out (1s, 2s, 4s, 8s), reducing pressure. Adding random jitter
    (1.2s, 2.7s, 3.1s, 9.4s) desynchronizes clients so they do not retry at the same time. Without jitter, exponential backoff
    still creates synchronized waves — jitter is essential.
  how_to_do_right: '1. Exponential backoff: delay = base * (2 ^ attempt). Base = 1s, attempt 1-2-4-8-16s.

    2. Full jitter: delay = random(0, base * 2^attempt). Most effective desynchronization.

    3. Decorrelated jitter: delay = random(base, previous_delay * 3). Good middle ground.

    4. Maximum delay cap: do not exceed 60s (user gives up after minutes of waiting).

    5. Maximum attempts: stop after 5-10 retries. Escalate to fallback or error.

    6. Idempotent operations only: retrying a non-idempotent operation (transfer money) is dangerous.

    7. Budget-aware: respect the deadline propagation budget (do not retry if budget exhausted).

    '
  severity: high
  technologies:
    lang: [python, java, go, typescript]
  domains:
    domain: [reliability, architecture, infrastructure]
    concern: [distributed_systems, networking]
  example_good: "# Exponential backoff with full jitter\nimport random\nimport asyncio\n\nasync def retry_with_backoff(\n\
    \    func,\n    max_attempts: int = 5,\n    base_delay: float = 1.0,\n    max_delay: float = 60.0,\n    retryable_exceptions:\
    \ tuple = (TimeoutError, ConnectionError),\n):\n    for attempt in range(max_attempts):\n        try:\n            return\
    \ await func()\n        except retryable_exceptions as e:\n            if attempt == max_attempts - 1:\n             \
    \   raise  # Last attempt — propagate error\n            # Full jitter: random between 0 and exponential ceiling\n   \
    \         ceiling = min(base_delay * (2 ** attempt), max_delay)\n            delay = random.uniform(0, ceiling)\n    \
    \        logger.warning(\n                f\"Attempt {attempt + 1}/{max_attempts} failed: {e}. \"\n                f\"\
    Retrying in {delay:.1f}s\"\n            )\n            await asyncio.sleep(delay)\n\n# Usage\nresult = await retry_with_backoff(\n\
    \    lambda: inventory_client.check_stock(\"SKU-123\"),\n    max_attempts=3,\n    base_delay=0.5,\n)\n# Attempt 1: immediate\n\
    # Attempt 2: random(0, 0.5) = 0.3s delay (each client different)\n# Attempt 3: random(0, 1.0) = 0.7s delay (each client\
    \ different)\n"
  example_bad: "# Fixed interval retry — thundering herd\nasync def retry_fixed(func, max_attempts=5):\n    for attempt in\
    \ range(max_attempts):\n        try:\n            return await func()\n        except Exception:\n            await asyncio.sleep(1)\
    \  # Fixed 1-second delay\n    raise RetryExhausted()\n\n# Service goes down. 1000 clients waiting.\n# Second 0: service\
    \ comes back up\n# Second 1: ALL 1000 clients retry simultaneously → service crashes again\n# Second 2: ALL 1000 clients\
    \ retry again → service crashes again\n# Infinite crash loop — synchronized retries prevent recovery\n"
