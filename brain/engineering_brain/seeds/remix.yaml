layer: rules
technology: Remix
domain: frontend
knowledge:
- id: CR-RMX-001
  text: Use loader functions for all read operations. Loaders run on the server, have access to databases and secrets, and
    provide data to the route component via useLoaderData().
  why: 'Fetching data on the client with useEffect triggers a waterfall: the page loads, JavaScript executes, fetch fires,
    data returns, component re-renders. The user sees a loading spinner for 1-3 seconds. Loaders run on the server during
    the initial request — data is embedded in the HTML response. The page loads with data already present, providing instant
    rendering and better SEO.'
  how_to_do_right: '1. Export a loader function from each route module that needs data.

    2. Use the provided fetch or direct database access in loaders.

    3. Return data with json() helper — Remix serializes it automatically.

    4. Access data in the component with useLoaderData<typeof loader>().

    5. Use defer() with Await for non-critical data that can stream in later.

    '
  severity: critical
  technologies:
    lang: [typescript]
    framework: [frontend, remix, react]
  domains:
    domain: [architecture, performance]
    concern: [frontend]
  example_good: "// routes/products._index.tsx\nimport { json, type LoaderFunctionArgs } from '@remix-run/node';\nimport {\
    \ useLoaderData } from '@remix-run/react';\n\nexport async function loader({ request }: LoaderFunctionArgs) {\n  const\
    \ url = new URL(request.url);\n  const page = Number(url.searchParams.get('page') ?? '1');\n  const category = url.searchParams.get('category');\n\
    \n  const products = await db.product.findMany({\n    where: category ? { category } : undefined,\n    skip: (page - 1)\
    \ * 20,\n    take: 20,\n    include: { reviews: { select: { rating: true } } },\n  });\n\n  const totalCount = await db.product.count({\n\
    \    where: category ? { category } : undefined,\n  });\n\n  return json({\n    products,\n    totalPages: Math.ceil(totalCount\
    \ / 20),\n    currentPage: page,\n  });\n}\n\nexport default function Products() {\n  const { products, totalPages, currentPage\
    \ } = useLoaderData<typeof loader>();\n\n  return (\n    <div>\n      <h1>Products</h1>\n      <ProductGrid products={products}\
    \ />\n      <Pagination total={totalPages} current={currentPage} />\n    </div>\n  );\n}\n"
  example_bad: "// Wrong: Client-side data fetching — loading spinner, no SSR, no SEO\nexport default function Products()\
    \ {\n  const [products, setProducts] = useState([]);\n  const [loading, setLoading] = useState(true);\n\n  useEffect(()\
    \ => {\n    fetch('/api/products')\n      .then(res => res.json())\n      .then(data => {\n        setProducts(data);\n\
    \        setLoading(false);\n      });\n  }, []);\n\n  if (loading) return <Spinner />;  // User sees spinner, search\
    \ engine sees spinner\n  return <ProductGrid products={products} />;\n}\n"
  when_applies: Any project using Remix full-stack web apps, React component-based UIs, or TypeScript projects with static
    typing
  when_not_applies: server-rendered pages, APIs, CLI tools
  sources: ["https://remix.run/docs/en/main/route/loader"]
- id: CR-RMX-002
  text: Use action functions for all mutations (create, update, delete). Actions process form submissions and redirects —
    never mutate data in loaders or event handlers.
  why: 'Mutating data in loaders (GET requests) violates HTTP semantics — browsers retry GET requests on network failure,
    accidentally duplicating mutations. Mutating in onClick handlers with fetch() requires managing loading state, error state,
    race conditions, and revalidation manually. Actions handle all of this: form submission, validation, redirect, and automatic
    revalidation of all loaders.'
  how_to_do_right: '1. Export an action function for routes that handle mutations.

    2. Use request.formData() to read form submissions.

    3. Validate input server-side — never trust client validation.

    4. Return redirect() on success to prevent double submission.

    5. Return json with errors on validation failure for the form to display.

    '
  severity: critical
  technologies:
    lang: [typescript]
    framework: [frontend, remix, react]
  domains:
    domain: [architecture]
    concern: [frontend]
  example_good: "// routes/todos.tsx\nimport { json, redirect, type ActionFunctionArgs } from '@remix-run/node';\nimport {\
    \ useActionData, Form } from '@remix-run/react';\n\nexport async function action({ request }: ActionFunctionArgs) {\n\
    \  const formData = await request.formData();\n  const intent = formData.get('intent');\n\n  if (intent === 'create')\
    \ {\n    const text = String(formData.get('text')).trim();\n    if (!text) {\n      return json({ error: 'Todo text is\
    \ required' }, { status: 422 });\n    }\n    if (text.length > 200) {\n      return json({ error: 'Todo must be under\
    \ 200 characters' }, { status: 422 });\n    }\n    await db.todo.create({ data: { text, userId: await requireUserId(request)\
    \ } });\n    return redirect('/todos'); // Prevents double submit on refresh\n  }\n\n  if (intent === 'delete') {\n  \
    \  const id = String(formData.get('id'));\n    await db.todo.delete({ where: { id } });\n    return redirect('/todos');\n\
    \  }\n\n  return json({ error: 'Unknown intent' }, { status: 400 });\n}\n\nexport default function Todos() {\n  const\
    \ actionData = useActionData<typeof action>();\n\n  return (\n    <>\n      <Form method=\"post\">\n        <input name=\"\
    text\" />\n        <button name=\"intent\" value=\"create\">Add</button>\n        {actionData?.error && <p className=\"\
    error\">{actionData.error}</p>}\n      </Form>\n      {/* All loaders automatically revalidate after action completes\
    \ */}\n    </>\n  );\n}\n"
  example_bad: "// Wrong: Mutation in event handler — manual state management\nexport default function Todos() {\n  const\
    \ [error, setError] = useState(null);\n  const [submitting, setSubmitting] = useState(false);\n\n  async function handleSubmit(e)\
    \ {\n    e.preventDefault();\n    setSubmitting(true);\n    setError(null);\n    try {\n      await fetch('/api/todos',\
    \ { method: 'POST', body: JSON.stringify({ text }) });\n      // Must manually refetch all data, handle optimistic UI,\
    \ etc.\n      window.location.reload(); // Lazy revalidation\n    } catch (err) {\n      setError(err.message);\n    }\
    \ finally {\n      setSubmitting(false);\n    }\n  }\n  // 20 lines of state management for something action() does in\
    \ 5\n}\n"
  when_applies: Any project using Remix full-stack web apps, React component-based UIs, or TypeScript projects with static
    typing
  when_not_applies: server-rendered pages, APIs, CLI tools
  sources: ["https://remix.run/docs/en/main/route/action"]
- id: CR-RMX-003
  text: Use useFetcher for non-navigation mutations and data loading. useFetcher allows multiple simultaneous submissions
    without page navigation.
  why: The <Form> component triggers a navigation (URL change) after submission. For inline operations like toggling a checkbox,
    adding to cart, or favoriting — navigation is wrong. useFetcher submits data and loads data without changing the URL,
    enables multiple simultaneous submissions, and provides loading/idle/submitting states for each independent operation.
  how_to_do_right: '1. Use useFetcher for inline mutations (toggle, like, add-to-cart).

    2. Use fetcher.Form for form submissions that should not navigate.

    3. Use fetcher.load() for loading data into a component without navigation.

    4. Check fetcher.state (''idle'', ''submitting'', ''loading'') for UI feedback.

    5. Multiple fetchers can run simultaneously — each is independent.

    '
  severity: high
  technologies:
    lang: [typescript]
    framework: [frontend, remix, react]
  domains:
    domain: [architecture]
    concern: [frontend]
  example_good: "// TodoItem.tsx — inline toggle without navigation\nimport { useFetcher } from '@remix-run/react';\n\nfunction\
    \ TodoItem({ todo }: { todo: Todo }) {\n  const fetcher = useFetcher();\n\n  // Optimistic UI: show the toggled state\
    \ immediately\n  const optimisticDone = fetcher.formData\n    ? fetcher.formData.get('done') === 'true'\n    : todo.done;\n\
    \n  return (\n    <fetcher.Form method=\"post\" action=\"/todos\">\n      <input type=\"hidden\" name=\"intent\" value=\"\
    toggle\" />\n      <input type=\"hidden\" name=\"id\" value={todo.id} />\n      <input type=\"hidden\" name=\"done\" value={String(!todo.done)}\
    \ />\n      <button\n        type=\"submit\"\n        className={optimisticDone ? 'done' : ''}\n        disabled={fetcher.state\
    \ !== 'idle'}\n      >\n        {todo.text}\n      </button>\n    </fetcher.Form>\n  );\n}\n\n// AddToCart.tsx — multiple\
    \ simultaneous submissions\nfunction AddToCart({ productId }: { productId: string }) {\n  const fetcher = useFetcher();\n\
    \  const isAdding = fetcher.state !== 'idle';\n\n  return (\n    <fetcher.Form method=\"post\" action=\"/cart\">\n   \
    \   <input type=\"hidden\" name=\"productId\" value={productId} />\n      <button type=\"submit\" disabled={isAdding}>\n\
    \        {isAdding ? 'Adding...' : 'Add to Cart'}\n      </button>\n    </fetcher.Form>\n  );\n}\n"
  example_bad: "// Wrong: <Form> for inline operations — causes page navigation\nfunction TodoItem({ todo }) {\n  return (\n\
    \    <Form method=\"post\" action=\"/todos\">\n      {/* This navigates to /todos after submission */}\n      {/* Scroll\
    \ position lost, loading state for entire page */}\n      <input type=\"hidden\" name=\"intent\" value=\"toggle\" />\n\
    \      <button type=\"submit\">{todo.text}</button>\n    </Form>\n  );\n}\n"
  when_applies: Projects using Remix full-stack web apps, React component-based UIs, or TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools
  sources: ["https://remix.run/docs/en/main/hooks/use-fetcher"]
- id: CR-RMX-004
  text: Use nested routes with <Outlet /> for layout composition. Each route segment manages its own data loading, error handling,
    and UI.
  why: 'Without nested routes, every page must include the full layout (header, sidebar, footer) and load all data. A single
    slow database query in the sidebar blocks the entire page. Nested routes enable independent data loading: the layout loads
    nav data, the child loads page data — in parallel. Error boundaries per route prevent one failing section from crashing
    the entire page.'
  how_to_do_right: '1. Create layout routes (routes/dashboard.tsx) that render <Outlet />.

    2. Child routes (routes/dashboard.orders.tsx) render inside the Outlet.

    3. Each route has its own loader — they run in parallel.

    4. Add ErrorBoundary to each route for isolated error handling.

    5. Use pathless layout routes (_layout.tsx) for shared UI without URL segments.

    '
  severity: high
  technologies:
    lang: [typescript]
    framework: [frontend, remix, react]
  domains:
    domain: [architecture]
    concern: [frontend]
  example_good: "// routes/dashboard.tsx — layout route\nimport { Outlet, useLoaderData } from '@remix-run/react';\n\nexport\
    \ async function loader({ request }: LoaderFunctionArgs) {\n  const user = await requireUser(request);\n  const notifications\
    \ = await db.notification.count({ where: { userId: user.id, read: false } });\n  return json({ user, notifications });\n\
    }\n\nexport default function DashboardLayout() {\n  const { user, notifications } = useLoaderData<typeof loader>();\n\
    \  return (\n    <div className=\"dashboard\">\n      <Sidebar user={user} notifications={notifications} />\n      <main>\n\
    \        <Outlet />  {/* Child route renders here */}\n      </main>\n    </div>\n  );\n}\n\nexport function ErrorBoundary()\
    \ {\n  return <div>Dashboard layout error — sidebar still works</div>;\n}\n\n// routes/dashboard.orders.tsx — child route\
    \ (loads in parallel with parent)\nexport async function loader({ request }: LoaderFunctionArgs) {\n  const user = await\
    \ requireUser(request);\n  const orders = await db.order.findMany({ where: { userId: user.id } });\n  return json({ orders\
    \ });\n}\n\nexport default function Orders() {\n  const { orders } = useLoaderData<typeof loader>();\n  return <OrderList\
    \ orders={orders} />;\n}\n\nexport function ErrorBoundary() {\n  return <div>Failed to load orders — try refreshing</div>;\n\
    }\n// If orders loader fails, sidebar still renders with user data\n"
  example_bad: "// Wrong: No nested routes — every page loads everything\nexport async function loader({ request }) {\n  const\
    \ user = await requireUser(request);\n  const notifications = await db.notification.count(/*...*/);\n  const orders =\
    \ await db.order.findMany(/*...*/);     // Slow query\n  const analytics = await db.analytics.aggregate(/*...*/)  // Slow\
    \ query\n  // All 4 queries run SEQUENTIALLY — total time = sum of all\n  return json({ user, notifications, orders, analytics\
    \ });\n}\n"
  when_applies: Projects using Remix full-stack web apps, React component-based UIs, or TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools
  sources: ["https://remix.run/docs/en/main/file-conventions/routes"]
- id: CR-RMX-005
  text: Add ErrorBoundary exports to every route for graceful error handling. Use CatchBoundary or isRouteErrorResponse for
    expected HTTP errors (404, 403).
  why: 'Without error boundaries, a thrown error in any route crashes the entire page — the user sees a blank white screen.
    With error boundaries on each route, only the failing section shows an error while the rest of the page (layout, sidebar,
    header) continues working. This is the key advantage of nested routes: isolated failure domains.'
  how_to_do_right: '1. Export ErrorBoundary from every route that loads data or handles mutations.

    2. Use isRouteErrorResponse() to differentiate expected (404) from unexpected errors.

    3. Provide user-friendly error messages with recovery actions (retry, go back).

    4. Log unexpected errors to error tracking service (Sentry).

    5. The root route''s ErrorBoundary is the last resort — make it informative.

    '
  severity: high
  technologies:
    lang: [typescript]
    framework: [frontend, remix, react]
  domains:
    domain: [architecture]
    concern: [frontend]
  example_good: "// routes/products.$id.tsx\nimport { isRouteErrorResponse, useRouteError } from '@remix-run/react';\nimport\
    \ { json, type LoaderFunctionArgs } from '@remix-run/node';\n\nexport async function loader({ params }: LoaderFunctionArgs)\
    \ {\n  const product = await db.product.findUnique({ where: { id: params.id } });\n  if (!product) {\n    throw json(\n\
    \      { message: `Product \"${params.id}\" not found` },\n      { status: 404 },\n    );\n  }\n  return json({ product\
    \ });\n}\n\nexport function ErrorBoundary() {\n  const error = useRouteError();\n\n  if (isRouteErrorResponse(error))\
    \ {\n    if (error.status === 404) {\n      return (\n        <div className=\"error-page\">\n          <h1>Product Not\
    \ Found</h1>\n          <p>{error.data.message}</p>\n          <Link to=\"/products\">Browse all products</Link>\n   \
    \     </div>\n      );\n    }\n    if (error.status === 403) {\n      return (\n        <div className=\"error-page\"\
    >\n          <h1>Access Denied</h1>\n          <p>You don't have permission to view this product.</p>\n          <Link\
    \ to=\"/\">Go home</Link>\n        </div>\n      );\n    }\n  }\n\n  // Unexpected error\n  return (\n    <div className=\"\
    error-page\">\n      <h1>Something went wrong</h1>\n      <p>We're looking into it. Please try again.</p>\n      <button\
    \ onClick={() => window.location.reload()}>Retry</button>\n    </div>\n  );\n}\n"
  example_bad: "// Wrong: No error boundary — entire page crashes on error\nexport async function loader({ params }) {\n \
    \ const product = await db.product.findUnique({ where: { id: params.id } });\n  // If product is null, accessing product.name\
    \ throws\n  return json({ product });\n}\n\nexport default function Product() {\n  const { product } = useLoaderData();\n\
    \  return <h1>{product.name}</h1>;  // Crashes if product is null\n  // User sees: \"Application Error\" with no context\
    \ or recovery\n}\n"
  when_applies: Projects using Remix full-stack web apps, React component-based UIs, or TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools
  sources: ["https://remix.run/docs/en/main/route/error-boundary"]
- id: CR-RMX-006
  text: Implement optimistic UI with useFetcher and useNavigation. Show immediate feedback while mutations are pending to
    eliminate perceived latency.
  why: Without optimistic UI, every user action requires waiting for the server response — clicking 'Like' shows a spinner
    for 200-500ms. With optimistic UI, the UI updates immediately to show the expected result, then reconciles with the server
    response. The user perceives zero latency while the system maintains data consistency.
  how_to_do_right: '1. Read fetcher.formData to determine the optimistic state.

    2. Show the expected result immediately while fetcher.state is ''submitting''.

    3. If the action returns an error, the optimistic state is automatically reverted.

    4. Use useNavigation for page-level pending states (pending links, form submissions).

    5. Combine with useFetcher for component-level optimistic updates.

    '
  severity: medium
  technologies:
    lang: [typescript]
    framework: [frontend, remix, react]
  domains:
    domain: [architecture, performance]
    concern: [frontend]
  example_good: "// FavoriteButton.tsx — optimistic toggle\nfunction FavoriteButton({ productId, isFavorite }: Props) {\n\
    \  const fetcher = useFetcher();\n\n  // Optimistic: use the submitted value while pending\n  const optimisticFavorite\
    \ = fetcher.formData\n    ? fetcher.formData.get('favorite') === 'true'\n    : isFavorite;\n\n  return (\n    <fetcher.Form\
    \ method=\"post\" action=\"/favorites\">\n      <input type=\"hidden\" name=\"productId\" value={productId} />\n     \
    \ <input type=\"hidden\" name=\"favorite\" value={String(!isFavorite)} />\n      <button\n        type=\"submit\"\n  \
    \      aria-label={optimisticFavorite ? 'Remove from favorites' : 'Add to favorites'}\n        className={optimisticFavorite\
    \ ? 'active' : ''}\n      >\n        {optimisticFavorite ? '★' : '☆'}\n      </button>\n    </fetcher.Form>\n  );\n  //\
    \ Click: star immediately fills (optimistic)\n  // Server confirms: no change needed\n  // Server fails: star automatically\
    \ reverts to original state\n}\n\n// Navigation pending state\nfunction NavLink({ to, children }: { to: string; children:\
    \ React.ReactNode }) {\n  const navigation = useNavigation();\n  const isNavigating = navigation.state === 'loading' &&\
    \ navigation.location.pathname === to;\n\n  return (\n    <Link to={to} className={isNavigating ? 'loading' : ''}>\n \
    \     {children}\n      {isNavigating && <Spinner size=\"sm\" />}\n    </Link>\n  );\n}\n"
  example_bad: "// Wrong: No optimistic UI — user sees spinner on every action\nfunction FavoriteButton({ productId, isFavorite\
    \ }) {\n  const [loading, setLoading] = useState(false);\n  const [fav, setFav] = useState(isFavorite);\n\n  async function\
    \ toggle() {\n    setLoading(true);\n    const res = await fetch('/api/favorites', {\n      method: 'POST',\n      body:\
    \ JSON.stringify({ productId, favorite: !fav }),\n    });\n    if (res.ok) setFav(!fav);\n    setLoading(false);\n  }\n\
    \n  return (\n    <button onClick={toggle} disabled={loading}>\n      {loading ? <Spinner /> : fav ? '★' : '☆'}\n    \
    \  {/* User sees spinner for 200-500ms on every click */}\n    </button>\n  );\n}\n"
  when_applies: Projects using Remix full-stack web apps, React component-based UIs, or TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools
  sources: ["https://remix.run/docs/en/main/discussion/pending-ui"]
- id: CR-RMX-007
  text: Use <Form> components instead of <form> for all mutations. Remix's Form provides automatic serialization, pending
    state, and revalidation.
  why: Standard HTML <form> causes a full page reload on submission. Remix's <Form> intercepts the submission, sends it via
    fetch, waits for the action response, then revalidates all loaders on the page — without a page reload. If JavaScript
    fails, it falls back to standard HTML form behavior. This is progressive enhancement at its best.
  how_to_do_right: '1. Import Form from @remix-run/react instead of using <form>.

    2. Use method="post" for mutations (never use GET for mutations).

    3. Use action prop to target a different route''s action if needed.

    4. Use useNavigation() to show pending state during submission.

    5. Without JavaScript, Form falls back to standard HTML form submission — it still works.

    '
  severity: high
  technologies:
    lang: [typescript]
    framework: [frontend, remix, react]
  domains:
    domain: [architecture]
    concern: [frontend]
  example_good: "// routes/contact.tsx\nimport { Form, useNavigation, useActionData } from '@remix-run/react';\nimport { json,\
    \ redirect, type ActionFunctionArgs } from '@remix-run/node';\n\nexport async function action({ request }: ActionFunctionArgs)\
    \ {\n  const formData = await request.formData();\n  const email = String(formData.get('email'));\n  const message = String(formData.get('message'));\n\
    \n  const errors: Record<string, string> = {};\n  if (!email.includes('@')) errors.email = 'Invalid email address';\n\
    \  if (message.length < 10) errors.message = 'Message must be at least 10 characters';\n\n  if (Object.keys(errors).length\
    \ > 0) {\n    return json({ errors }, { status: 422 });\n  }\n\n  await sendContactEmail({ email, message });\n  return\
    \ redirect('/contact/success');\n}\n\nexport default function Contact() {\n  const actionData = useActionData<typeof action>();\n\
    \  const navigation = useNavigation();\n  const isSubmitting = navigation.state === 'submitting';\n\n  return (\n    <Form\
    \ method=\"post\">\n      <div>\n        <label htmlFor=\"email\">Email</label>\n        <input id=\"email\" name=\"email\"\
    \ type=\"email\" required />\n        {actionData?.errors?.email && <p className=\"error\">{actionData.errors.email}</p>}\n\
    \      </div>\n      <div>\n        <label htmlFor=\"message\">Message</label>\n        <textarea id=\"message\" name=\"\
    message\" required minLength={10} />\n        {actionData?.errors?.message && <p className=\"error\">{actionData.errors.message}</p>}\n\
    \      </div>\n      <button type=\"submit\" disabled={isSubmitting}>\n        {isSubmitting ? 'Sending...' : 'Send Message'}\n\
    \      </button>\n    </Form>\n  );\n  // With JS: submits via fetch, no page reload, shows pending state\n  // Without\
    \ JS: submits as standard form, full page reload, still works\n}\n"
  example_bad: "// Wrong: Standard form — full page reload\n<form method=\"post\" action=\"/contact\">\n  <input name=\"email\"\
    \ type=\"email\" />\n  <button type=\"submit\">Send</button>\n</form>\n{/* Full page reload on every submission\n    No\
    \ pending state — user clicks multiple times\n    No inline error display — errors shown on new page */}\n"
  when_applies: Projects using Remix full-stack web apps, React component-based UIs, or TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools
  sources: ["https://remix.run/docs/en/main/components/form"]
- id: CR-RMX-008
  text: Use meta exports for per-route metadata (title, description, Open Graph). Never set metadata globally — each route
    knows its own content.
  why: Global metadata in root.tsx means every page has the same title and description — terrible for SEO and social sharing.
    Per-route meta functions receive the loader data and parent meta, enabling dynamic titles like 'iPhone 15 Pro - Products'
    and descriptions based on actual content. Search engines and social platforms use this metadata for rankings and previews.
  how_to_do_right: '1. Export a meta function from each route that needs custom metadata.

    2. Use loader data in meta for dynamic titles and descriptions.

    3. Set Open Graph tags for social sharing previews.

    4. Use matches parameter to merge with parent meta.

    5. Set canonical URL for routes with search params or pagination.

    '
  severity: medium
  technologies:
    lang: [typescript]
    framework: [frontend, remix, react]
  domains:
    domain: [architecture]
    concern: [frontend]
  example_good: "// routes/products.$id.tsx\nimport type { MetaFunction } from '@remix-run/node';\n\nexport const meta: MetaFunction<typeof\
    \ loader> = ({ data, params }) => {\n  if (!data?.product) {\n    return [\n      { title: 'Product Not Found' },\n  \
    \    { name: 'robots', content: 'noindex' },\n    ];\n  }\n\n  const { product } = data;\n  return [\n    { title: `${product.name}\
    \ — MyStore` },\n    { name: 'description', content: product.description.slice(0, 160) },\n    { property: 'og:title',\
    \ content: product.name },\n    { property: 'og:description', content: product.description.slice(0, 160) },\n    { property:\
    \ 'og:image', content: product.imageUrl },\n    { property: 'og:type', content: 'product' },\n    { property: 'og:url',\
    \ content: `https://mystore.com/products/${params.id}` },\n    { name: 'twitter:card', content: 'summary_large_image'\
    \ },\n  ];\n};\n"
  example_bad: "// Wrong: Static metadata in root — same for every page\n// root.tsx\nexport const meta = () => [\n  { title:\
    \ 'MyStore' },\n  { name: 'description', content: 'Welcome to MyStore' },\n];\n// Every page: title=\"MyStore\", description=\"\
    Welcome to MyStore\"\n// Product page: no product name in title, no product image in OG\n"
  when_applies: Projects using Remix full-stack web apps, React component-based UIs, or TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools
  sources: ["https://remix.run/docs/en/main/route/meta"]
- id: CR-RMX-009
  text: Set Cache-Control headers in loaders for cacheable responses. Use stale-while-revalidate for content that can tolerate
    brief staleness.
  why: 'Without cache headers, every page load hits your server and database. A product listing page viewed by 10,000 users
    generates 10,000 identical database queries. Cache-Control: public, max-age=60, stale-while-revalidate=300 means the CDN
    serves cached responses for 60 seconds, and for up to 5 minutes after that while revalidating in the background — reducing
    server load by 99%.'
  how_to_do_right: '1. Set Cache-Control headers in loader responses for public content.

    2. Use public for unauthenticated content (CDN can cache).

    3. Use private for authenticated content (only browser caches).

    4. Use stale-while-revalidate for content that tolerates brief staleness.

    5. Never cache personalized or authenticated responses publicly.

    '
  severity: high
  technologies:
    lang: [typescript]
    framework: [frontend, remix]
  domains:
    domain: [architecture, performance]
    concern: [frontend]
  example_good: "// routes/products._index.tsx — public cacheable content\nexport async function loader() {\n  const products\
    \ = await db.product.findMany({ take: 50 });\n  return json(\n    { products },\n    {\n      headers: {\n        'Cache-Control':\
    \ 'public, max-age=60, s-maxage=300, stale-while-revalidate=600',\n        // Browser: cache 60s, CDN: cache 300s, serve\
    \ stale up to 600s while revalidating\n      },\n    },\n  );\n}\n\n// routes/dashboard.tsx — authenticated, private cache\
    \ only\nexport async function loader({ request }: LoaderFunctionArgs) {\n  const user = await requireUser(request);\n\
    \  const data = await getUserDashboard(user.id);\n  return json(\n    { data },\n    {\n      headers: {\n        'Cache-Control':\
    \ 'private, max-age=10, no-transform',\n        // Browser only: cache 10s, CDN must not cache\n      },\n    },\n  );\n\
    }\n\n// routes/products.$id.tsx — long cache for immutable product data\nexport async function loader({ params }: LoaderFunctionArgs)\
    \ {\n  const product = await db.product.findUnique({ where: { id: params.id } });\n  if (!product) throw json(null, {\
    \ status: 404 });\n  return json(\n    { product },\n    {\n      headers: {\n        'Cache-Control': 'public, max-age=3600,\
    \ stale-while-revalidate=86400',\n        'ETag': `\"product-${product.id}-${product.updatedAt.getTime()}\"`,\n      },\n\
    \    },\n  );\n}\n"
  example_bad: "// Wrong: No cache headers — every request hits the database\nexport async function loader() {\n  const products\
    \ = await db.product.findMany(); // Runs on EVERY request\n  return json({ products });\n  // 10,000 users = 10,000 identical\
    \ DB queries per minute\n}\n"
  when_applies: Projects using Remix full-stack web apps or TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using Remix or TypeScript
  sources: ["https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Cache-Control"]
- id: CR-RMX-010
  text: Use defer() with <Await> and <Suspense> for streaming non-critical data. Critical data loads immediately, non-critical
    streams in without blocking the page.
  why: A dashboard page needs user info (critical, 50ms) and analytics data (non-critical, 2000ms). Without defer, the page
    waits 2050ms for both. With defer, the page renders in 50ms with user info, and analytics stream in when ready. The user
    sees useful content immediately while expensive queries complete in the background.
  how_to_do_right: '1. Use defer() to return a mix of resolved and unresolved promises.

    2. Wrap streamed data in <Suspense> with <Await> from Remix.

    3. Provide meaningful fallback UI in Suspense (skeleton, spinner).

    4. Critical data (above the fold) should be resolved, not deferred.

    5. Use errorElement on <Await> for error handling of deferred data.

    '
  severity: medium
  technologies:
    lang: [typescript]
    framework: [frontend, remix, react]
  domains:
    domain: [architecture, performance]
    concern: [frontend]
  example_good: "// routes/dashboard.tsx\nimport { defer, type LoaderFunctionArgs } from '@remix-run/node';\nimport { Await,\
    \ useLoaderData } from '@remix-run/react';\nimport { Suspense } from 'react';\n\nexport async function loader({ request\
    \ }: LoaderFunctionArgs) {\n  const user = await requireUser(request);\n\n  // Critical data: resolve immediately (50ms)\n\
    \  const profile = await db.user.findUnique({ where: { id: user.id } });\n\n  // Non-critical data: defer (don't await\
    \ — pass the promise)\n  const analyticsPromise = db.analytics.aggregate({\n    where: { userId: user.id },\n    // Complex\
    \ query: 2000ms\n  });\n\n  const recentActivityPromise = db.activity.findMany({\n    where: { userId: user.id },\n  \
    \  take: 20,\n    orderBy: { createdAt: 'desc' },\n    // 500ms\n  });\n\n  return defer({\n    profile,             \
    \             // Resolved — available immediately\n    analytics: analyticsPromise,       // Deferred — streams when ready\n\
    \    recentActivity: recentActivityPromise, // Deferred — streams when ready\n  });\n}\n\nexport default function Dashboard()\
    \ {\n  const { profile, analytics, recentActivity } = useLoaderData<typeof loader>();\n\n  return (\n    <div>\n     \
    \ {/* Renders immediately — no waiting */}\n      <h1>Welcome, {profile.name}</h1>\n\n      {/* Streams in when ready\
    \ — shows skeleton while loading */}\n      <Suspense fallback={<AnalyticsSkeleton />}>\n        <Await resolve={analytics}\
    \ errorElement={<p>Failed to load analytics</p>}>\n          {(data) => <AnalyticsPanel data={data} />}\n        </Await>\n\
    \      </Suspense>\n\n      <Suspense fallback={<ActivitySkeleton />}>\n        <Await resolve={recentActivity}>\n   \
    \       {(activities) => <ActivityFeed activities={activities} />}\n        </Await>\n      </Suspense>\n    </div>\n\
    \  );\n}\n"
  example_bad: "// Wrong: All data awaited — page blocked until slowest query completes\nexport async function loader({ request\
    \ }) {\n  const user = await requireUser(request);\n  const profile = await db.user.findUnique(/*...*/);     // 50ms\n\
    \  const analytics = await db.analytics.aggregate(/*...*/); // 2000ms — BLOCKS\n  const activity = await db.activity.findMany(/*...*/);\
    \    // 500ms — BLOCKS\n  // Total: 2550ms before user sees ANYTHING\n  return json({ profile, analytics, activity });\n\
    }\n"
  when_applies: Projects using Remix full-stack web apps, React component-based UIs, or TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools
  sources: ["https://remix.run/docs/en/main/guides/streaming"]
