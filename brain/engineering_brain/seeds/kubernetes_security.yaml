layer: rules
technology: Kubernetes
domain: security
knowledge:
- id: CR-K8S-SEC-001
  text: Every workload must use a dedicated ServiceAccount — never use the default ServiceAccount.
  why: The default ServiceAccount in each namespace is shared by all pods that don't specify one. If RBAC grants any permissions
    to default, every pod in that namespace inherits those permissions — a compromised web frontend gets the same access as
    the database admin pod. Dedicated ServiceAccounts enable fine-grained RBAC per workload and make audit logs meaningful.
  how_to_do_right: 'Create a ServiceAccount for each Deployment/StatefulSet. Set automountServiceAccountToken: false on the
    ServiceAccount and only enable it on pods that need API access. Bind Roles to ServiceAccounts (not users/groups) for workload
    permissions. Name ServiceAccounts after the workload: sa-api-gateway, sa-batch-processor. Audit unused ServiceAccounts
    quarterly.'
  severity: critical
  technologies:
    platform: [kubernetes]
  domains:
    domain: [security]
  example_good: "apiVersion: v1\nkind: ServiceAccount\nmetadata:\n  name: sa-api-gateway\n  namespace: production\nautomountServiceAccountToken:\
    \ false\n---\napiVersion: apps/v1\nkind: Deployment\nspec:\n  template:\n    spec:\n      serviceAccountName: sa-api-gateway\n\
    \      automountServiceAccountToken: false  # Only enable if needed\n"
  example_bad: "apiVersion: apps/v1\nkind: Deployment\nspec:\n  template:\n    spec:\n      # No serviceAccountName — uses\
    \ default ServiceAccount\n      # All pods share same permissions\n      # kubectl exec into any pod = same API access\n"
  when_applies: Any project using Kubernetes-orchestrated deployments
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities. projects not using Kubernetes
  sources: ["https://kubernetes.io/docs/tasks/configure-pod-container/configure-service-account/"]
- id: CR-K8S-SEC-002
  text: Use Roles for namespace-scoped access, ClusterRoles only for truly cluster-wide needs.
  why: 'ClusterRoles apply across ALL namespaces — granting ''list pods'' via ClusterRole means the principal can list pods
    in production, staging, kube-system, and every secret namespace. A Role is scoped to a single namespace, following the
    principle of least privilege. Over-granting with ClusterRoles is the #1 RBAC misconfiguration in Kubernetes security audits.'
  how_to_do_right: 'Use Role + RoleBinding for namespace-scoped access (most application workloads). Use ClusterRole + ClusterRoleBinding
    only for: cluster-wide resources (nodes, namespaces, PVs), admission webhooks, and cluster operators. Use ClusterRole
    + RoleBinding to reuse a ClusterRole definition in specific namespaces without granting cluster-wide access. Audit with
    ''kubectl auth can-i --list --as=system:serviceaccount:ns:sa''.'
  severity: high
  technologies:
    platform: [kubernetes]
  domains:
    domain: [security]
  example_good: "# Namespace-scoped Role — only in production namespace\napiVersion: rbac.authorization.k8s.io/v1\nkind: Role\n\
    metadata:\n  name: pod-reader\n  namespace: production\nrules:\n  - apiGroups: [\"\"]\n    resources: [\"pods\", \"pods/log\"\
    ]\n    verbs: [\"get\", \"list\", \"watch\"]\n---\napiVersion: rbac.authorization.k8s.io/v1\nkind: RoleBinding\nmetadata:\n\
    \  name: api-pod-reader\n  namespace: production\nsubjects:\n  - kind: ServiceAccount\n    name: sa-api-gateway\n    namespace:\
    \ production\nroleRef:\n  kind: Role\n  name: pod-reader\n  apiGroup: rbac.authorization.k8s.io\n"
  example_bad: "# ClusterRole for what should be namespace-scoped\napiVersion: rbac.authorization.k8s.io/v1\nkind: ClusterRole\n\
    metadata:\n  name: pod-reader\nrules:\n  - apiGroups: [\"\"]\n    resources: [\"pods\"]\n    verbs: [\"get\", \"list\"\
    , \"watch\"]  # In ALL namespaces!\n---\napiVersion: rbac.authorization.k8s.io/v1\nkind: ClusterRoleBinding\nmetadata:\n\
    \  name: api-pod-reader\nsubjects:\n  - kind: ServiceAccount\n    name: sa-api-gateway\n    namespace: production\nroleRef:\n\
    \  kind: ClusterRole\n  name: pod-reader\n  # api-gateway can now list pods in kube-system, production, etc.\n"
  when_applies: Projects using Kubernetes-orchestrated deployments
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities. projects not using Kubernetes
  sources: ["https://kubernetes.io/docs/reference/access-authn-authz/rbac/"]
- id: CR-K8S-SEC-003
  text: Never use wildcards in RBAC rules — always enumerate specific resources and verbs.
  why: 'Wildcard rules (resources: [''*''], verbs: [''*'']) grant far more than intended — including access to Secrets, exec
    into pods, and create privileged pods. As new resource types are added to the cluster (CRDs, new API groups), wildcard
    rules automatically grant access to them. This violates least privilege and makes RBAC auditing meaningless.'
  how_to_do_right: 'List every resource and verb explicitly. Common verbs: get, list, watch (read-only), create, update, patch
    (write), delete. Use resourceNames to restrict to specific named resources when possible. Review RBAC rules with ''kubectl
    auth can-i'' and tools like rbac-lookup, rakkess, or kubectl-who-can. Deny ''escalate'', ''bind'', and ''impersonate''
    verbs to non-admin roles.'
  severity: critical
  technologies:
    platform: [kubernetes]
  domains:
    domain: [security]
  example_good: "apiVersion: rbac.authorization.k8s.io/v1\nkind: Role\nrules:\n  - apiGroups: [\"\"]\n    resources: [\"pods\"\
    , \"services\", \"configmaps\"]\n    verbs: [\"get\", \"list\", \"watch\"]\n  - apiGroups: [\"apps\"]\n    resources:\
    \ [\"deployments\"]\n    verbs: [\"get\", \"list\", \"watch\", \"update\", \"patch\"]\n    # Explicit resources and verbs\
    \ — auditable\n"
  example_bad: "apiVersion: rbac.authorization.k8s.io/v1\nkind: ClusterRole\nrules:\n  - apiGroups: [\"*\"]\n    resources:\
    \ [\"*\"]\n    verbs: [\"*\"]\n    # God mode — full cluster admin\n    # Includes: secrets, exec, create privileged pods\n"
  when_applies: Any project using Kubernetes-orchestrated deployments
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities. projects not using Kubernetes
  sources: ["https://kubernetes.io/docs/reference/access-authn-authz/rbac/#role-and-clusterrole"]
- id: CR-K8S-SEC-004
  text: Enforce Pod Security Standards at namespace level — Restricted for production, Baseline for staging.
  why: Without Pod Security enforcement, any pod can run as root, mount the host filesystem, use host networking, and escape
    the container. Pod Security Admission (PSA) replaces the deprecated PodSecurityPolicy and enforces security profiles at
    the namespace level. The Restricted profile blocks all common container escape techniques. Running without it means any
    developer mistake or supply chain compromise gives full node access.
  how_to_do_right: Label namespaces with pod-security.kubernetes.io/enforce, warn, and audit. Use 'restricted' for production,
    'baseline' for staging, 'privileged' only for kube-system and monitoring (with justification). Start with 'warn' mode
    to identify violations without blocking, then switch to 'enforce'. Test with 'kubectl label --dry-run=server ns <namespace>
    pod-security.kubernetes.io/enforce=restricted'.
  severity: critical
  technologies:
    platform: [kubernetes]
  domains:
    domain: [security]
  example_good: "apiVersion: v1\nkind: Namespace\nmetadata:\n  name: production\n  labels:\n    pod-security.kubernetes.io/enforce:\
    \ restricted\n    pod-security.kubernetes.io/enforce-version: latest\n    pod-security.kubernetes.io/warn: restricted\n\
    \    pod-security.kubernetes.io/audit: restricted\n"
  example_bad: "apiVersion: v1\nkind: Namespace\nmetadata:\n  name: production\n  # No pod-security labels — anything goes\n\
    \  # Pods can: run as root, mount host filesystem, use host network\n  # One compromised container = full node access\n"
  when_applies: Any project using Kubernetes-orchestrated deployments
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities. projects not using Kubernetes
  sources: ["https://kubernetes.io/docs/concepts/security/pod-security-standards/"]
- id: CR-K8S-SEC-005
  text: All containers must run as non-root with read-only root filesystem and all capabilities dropped.
  why: Running as root inside a container means root on the host in many configurations (especially without user namespaces).
    A writable root filesystem allows attackers to modify binaries, plant backdoors, and persist across container restarts.
    Linux capabilities like NET_RAW, SYS_ADMIN, and SYS_PTRACE enable container escapes and network attacks. Drop ALL and
    add back only what's needed.
  how_to_do_right: 'Set runAsNonRoot: true, readOnlyRootFilesystem: true, allowPrivilegeEscalation: false, and capabilities:
    drop: [''ALL''] on every container. Use emptyDir for /tmp and other writable paths. Add back specific capabilities only
    with documented justification (NET_BIND_SERVICE for port <1024). Set runAsUser/runAsGroup to specific non-root UIDs. Set
    seccompProfile to RuntimeDefault.'
  severity: critical
  technologies:
    platform: [kubernetes]
  domains:
    domain: [security]
  example_good: "spec:\n  securityContext:\n    runAsNonRoot: true\n    runAsUser: 65534\n    runAsGroup: 65534\n    fsGroup:\
    \ 65534\n    seccompProfile:\n      type: RuntimeDefault\n  containers:\n    - name: api\n      securityContext:\n   \
    \     allowPrivilegeEscalation: false\n        readOnlyRootFilesystem: true\n        capabilities:\n          drop: [\"\
    ALL\"]\n      volumeMounts:\n        - name: tmp\n          mountPath: /tmp\n  volumes:\n    - name: tmp\n      emptyDir:\n\
    \        sizeLimit: 100Mi\n"
  example_bad: "spec:\n  containers:\n    - name: api\n      # No securityContext — runs as root, writable filesystem,\n \
    \     # all capabilities available\n      securityContext:\n        privileged: true     # Full host access — never do\
    \ this\n        # Or even:\n        capabilities:\n          add: [\"SYS_ADMIN\"]  # Container escape vector\n"
  when_applies: Any project using Kubernetes-orchestrated deployments
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities. projects not using Kubernetes
  sources: ["https://kubernetes.io/docs/concepts/security/pod-security-standards/#restricted"]
- id: CR-K8S-SEC-006
  text: 'Use seccompProfile: RuntimeDefault on all pods to restrict available system calls.'
  why: Containers share the host kernel and can make any of ~300+ Linux syscalls by default. Many of these (mount, unshare,
    ptrace, reboot) are never needed by application containers but enable container escapes and privilege escalation. The
    RuntimeDefault seccomp profile blocks the most dangerous syscalls while allowing normal application behavior. Without
    it, a vulnerability in your app can be chained with a kernel exploit.
  how_to_do_right: 'Set seccompProfile: type: RuntimeDefault at the pod level (applies to all containers). For containers
    that need specific blocked syscalls (e.g., Chrome needs clone3), create a custom seccomp profile and load it via LocalhostProfile.
    Test with ''strace'' to verify your app doesn''t need blocked syscalls. Pod Security Restricted profile requires seccomp.'
  severity: high
  technologies:
    platform: [kubernetes]
  domains:
    domain: [security]
  example_good: "spec:\n  securityContext:\n    seccompProfile:\n      type: RuntimeDefault    # Blocks dangerous syscalls\n\
    \  containers:\n    - name: api\n      securityContext:\n        seccompProfile:\n          type: RuntimeDefault\n"
  example_bad: "spec:\n  # No seccompProfile — all 300+ syscalls available\n  # Attacker can use: unshare (namespace escape),\n\
    \  # mount (filesystem access), ptrace (process injection)\n  containers:\n    - name: api\n      securityContext:\n \
    \       seccompProfile:\n          type: Unconfined    # Explicitly allows everything\n"
  when_applies: Projects using Kubernetes-orchestrated deployments
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities. projects not using Kubernetes
  sources: ["https://kubernetes.io/docs/tutorials/security/seccomp/"]
- id: CR-K8S-SEC-007
  text: Use admission webhooks (OPA/Gatekeeper or Kyverno) to enforce policies beyond RBAC and PSA.
  why: 'RBAC controls WHO can create resources. PSA controls basic pod security. But neither can enforce: naming conventions,
    required labels, image registries, resource limits, anti-affinity rules, or organization-specific policies. Admission
    webhooks intercept API requests before persistence and can validate or mutate them. Without them, developers can deploy
    anything that RBAC allows — even if it violates your standards.'
  how_to_do_right: 'Choose Kyverno for Kubernetes-native policy (YAML-based, easier to learn) or OPA/Gatekeeper for Rego-based
    policy (more powerful, steeper learning curve). Start with audit mode (warn but don''t block). Essential policies: require
    labels, enforce image registry, require resource limits, deny privileged pods, require network policies. Use policy exceptions
    for system workloads.'
  severity: high
  technologies:
    platform: [kubernetes, opa, kyverno]
  domains:
    domain: [security]
  example_good: "# Kyverno: Require trusted image registry\napiVersion: kyverno.io/v1\nkind: ClusterPolicy\nmetadata:\n  name:\
    \ require-trusted-registry\nspec:\n  validationFailureAction: Enforce\n  background: true\n  rules:\n    - name: validate-image-registry\n\
    \      match:\n        any:\n          - resources:\n              kinds: [\"Pod\"]\n      validate:\n        message:\
    \ \"Images must be from trusted registries\"\n        pattern:\n          spec:\n            containers:\n           \
    \   - image: \"registry.example.com/*\"\n---\n# Kyverno: Require resource limits\napiVersion: kyverno.io/v1\nkind: ClusterPolicy\n\
    metadata:\n  name: require-resource-limits\nspec:\n  validationFailureAction: Enforce\n  rules:\n    - name: check-limits\n\
    \      match:\n        any:\n          - resources:\n              kinds: [\"Pod\"]\n      validate:\n        message:\
    \ \"All containers must have CPU and memory limits\"\n        pattern:\n          spec:\n            containers:\n   \
    \           - resources:\n                  limits:\n                    cpu: \"?*\"\n                    memory: \"?*\"\
    \n"
  example_bad: '# No admission policies — developers can:

    # - Pull images from any registry (including Docker Hub public)

    # - Deploy without resource limits (starve other workloads)

    # - Skip required labels (break monitoring and billing)

    # - Use latest tags (irreproducible deployments)

    '
  when_applies: Projects using Kubernetes-orchestrated deployments, OPA, or Kyverno
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities
  sources: ["https://kyverno.io/docs/introduction/", "https://open-policy-agent.github.io/gatekeeper/website/docs/"]
- id: CR-K8S-SEC-008
  text: Use OPA/Gatekeeper ConstraintTemplates for complex policies requiring Rego logic.
  why: Kyverno handles 80% of policies with YAML patterns, but complex policies (cross-resource validation, conditional logic
    based on cluster state, arithmetic constraints) require a policy language. OPA's Rego language is purpose-built for authorization
    decisions and can express any policy. Gatekeeper bridges OPA and Kubernetes with ConstraintTemplates (reusable policy
    definitions) and Constraints (instances with parameters).
  how_to_do_right: 'Create ConstraintTemplates for reusable policy patterns. Create Constraints to instantiate templates with
    parameters. Use ''enforcementAction: dryrun'' during rollout. Test Rego policies with ''opa test'' and ''gator test''.
    Use the Gatekeeper library for common policies (k8s-require-labels, k8s-allowed-repos). Monitor violations with Gatekeeper
    audit.'
  severity: medium
  technologies:
    library: [gatekeeper]
    platform: [kubernetes, opa]
  domains:
    domain: [security, architecture]
  example_good: "# ConstraintTemplate: enforce max replicas per namespace\napiVersion: templates.gatekeeper.sh/v1\nkind: ConstraintTemplate\n\
    metadata:\n  name: k8smaxreplicas\nspec:\n  crd:\n    spec:\n      names:\n        kind: K8sMaxReplicas\n      validation:\n\
    \        openAPIV3Schema:\n          type: object\n          properties:\n            max:\n              type: integer\n\
    \  targets:\n    - target: admission.k8s.gatekeeper.sh\n      rego: |\n        package k8smaxreplicas\n        violation[{\"\
    msg\": msg}] {\n          input.review.object.spec.replicas > input.parameters.max\n          msg := sprintf(\"Replicas\
    \ %d exceeds max %d\", [input.review.object.spec.replicas, input.parameters.max])\n        }\n---\napiVersion: constraints.gatekeeper.sh/v1beta1\n\
    kind: K8sMaxReplicas\nmetadata:\n  name: max-replicas-dev\nspec:\n  enforcementAction: deny\n  match:\n    kinds:\n  \
    \    - apiGroups: [\"apps\"]\n        kinds: [\"Deployment\"]\n    namespaces: [\"development\"]\n  parameters:\n    max:\
    \ 5\n"
  example_bad: '# Trying to express complex logic in Kyverno YAML patterns

    # leads to unreadable, unmaintainable policies

    # Or worse: no policy at all

    '
  when_applies: Projects using Kubernetes-orchestrated deployments, OPA, or Gatekeeper
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities
  sources: ["https://open-policy-agent.github.io/gatekeeper/website/docs/howto/"]
- id: CR-K8S-SEC-009
  text: Scan all container images for vulnerabilities and sign them before deployment.
  why: Container images are the primary attack surface — a single vulnerable library (Log4Shell, OpenSSL heartbleed) in a
    base image compromises every pod using it. Supply chain attacks inject malicious code into popular images. Without scanning,
    you deploy known CVEs. Without signing, you cannot verify image authenticity — a compromised registry serves malicious
    images that look legitimate.
  how_to_do_right: Integrate Trivy or Grype into CI/CD to scan images before push. Block images with Critical/High CVEs from
    deployment via admission webhook. Sign images with cosign (Sigstore) in CI/CD. Verify signatures at admission with Kyverno's
    image verification or Connaisseur. Use distroless or scratch base images to minimize attack surface. Scan running images
    periodically for newly discovered CVEs.
  severity: critical
  technologies:
    library: [cosign, sigstore]
    platform: [kubernetes, trivy]
  domains:
    domain: [security]
  example_good: "# CI/CD: Scan and sign\n# trivy image --severity CRITICAL,HIGH --exit-code 1 myapp:v1.2.3\n# cosign sign\
    \ --key cosign.key registry.example.com/myapp:v1.2.3\n\n# Kyverno: Verify image signatures\napiVersion: kyverno.io/v1\n\
    kind: ClusterPolicy\nmetadata:\n  name: verify-image-signature\nspec:\n  validationFailureAction: Enforce\n  rules:\n\
    \    - name: verify-cosign\n      match:\n        any:\n          - resources:\n              kinds: [\"Pod\"]\n     \
    \ verifyImages:\n        - imageReferences:\n            - \"registry.example.com/*\"\n          attestors:\n        \
    \    - entries:\n                - keyless:\n                    subject: \"https://github.com/myorg/*\"\n           \
    \         issuer: \"https://token.actions.githubusercontent.com\"\n"
  example_bad: "# No image scanning — deploying images with known CVEs\n# No image signing — trusting any image from the registry\n\
    containers:\n  - image: random-user/myapp:latest\n    # Pulled from public Docker Hub, unscanned, unsigned\n    # Could\
    \ contain cryptominer, backdoor, or vulnerable libraries\n"
  when_applies: Any project using Kubernetes-orchestrated deployments, Trivy, cosign, or Sigstore
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities
  sources: ["https://aquasecurity.github.io/trivy/", "https://docs.sigstore.dev/cosign/signing/signing_with_containers/"]
- id: CR-K8S-SEC-010
  text: Restrict pod-to-pod communication with default-deny NetworkPolicies per namespace.
  why: By default, every pod can communicate with every other pod in the cluster — including across namespaces. A compromised
    pod in a development namespace can reach production databases. NetworkPolicies are the Kubernetes firewall — default-deny
    blocks all traffic, then explicit allow rules open only necessary paths. This is the foundation of zero-trust networking
    in Kubernetes.
  how_to_do_right: Apply default-deny for both ingress and egress in every non-system namespace. Create allow policies per
    service pair. Always allow DNS (port 53 UDP to kube-dns). Use namespace labels for cross-namespace policies. Test policies
    with netshoot container. Verify your CNI supports NetworkPolicies (Calico, Cilium — NOT Flannel alone). Monitor denied
    connections in CNI logs.
  severity: critical
  technologies:
    library: [calico, cilium]
    platform: [kubernetes]
  domains:
    domain: [security, infrastructure]
    concern: [networking]
  example_good: "# Default deny ALL traffic\napiVersion: networking.k8s.io/v1\nkind: NetworkPolicy\nmetadata:\n  name: default-deny\n\
    \  namespace: production\nspec:\n  podSelector: {}\n  policyTypes: [Ingress, Egress]\n---\n# Allow DNS for all pods\n\
    apiVersion: networking.k8s.io/v1\nkind: NetworkPolicy\nmetadata:\n  name: allow-dns\n  namespace: production\nspec:\n\
    \  podSelector: {}\n  policyTypes: [Egress]\n  egress:\n    - to:\n        - namespaceSelector:\n            matchLabels:\n\
    \              kubernetes.io/metadata.name: kube-system\n          podSelector:\n            matchLabels:\n          \
    \    k8s-app: kube-dns\n      ports:\n        - port: 53\n          protocol: UDP\n        - port: 53\n          protocol:\
    \ TCP\n"
  example_bad: '# No NetworkPolicies — flat network

    # compromised pod in dev namespace → reaches production DB

    # lateral movement is trivial

    '
  when_applies: Any project using Kubernetes-orchestrated deployments, Calico, or Cilium
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities
  sources: ["https://kubernetes.io/docs/concepts/services-networking/network-policies/"]
- id: CR-K8S-SEC-011
  text: Use Vault sidecar injector or CSI secrets driver for runtime secret injection — not environment variables.
  why: Secrets in environment variables are visible in /proc/1/environ inside the container, in 'kubectl describe pod', in
    crash dumps, and in logging middleware that captures env. They cannot be rotated without restarting the pod. Vault sidecar
    or CSI driver mounts secrets as files, supports dynamic secrets (auto-rotated database credentials), and provides audit
    logging of every secret access.
  how_to_do_right: Use Vault Agent Injector (sidecar) for Vault users — annotate pods and secrets are mounted as files. Use
    Secrets Store CSI Driver for cloud provider secrets (AWS Secrets Manager, GCP Secret Manager, Azure Key Vault) — mount
    secrets as volumes. Both support auto-rotation. For application code, read secrets from files, not env vars. Implement
    secret rotation without pod restart.
  severity: high
  technologies:
    library: [csi]
    platform: [kubernetes, vault]
  domains:
    domain: [security]
  example_good: "# Vault Agent Injector — secrets as files\napiVersion: apps/v1\nkind: Deployment\nspec:\n  template:\n  \
    \  metadata:\n      annotations:\n        vault.hashicorp.com/agent-inject: \"true\"\n        vault.hashicorp.com/role:\
    \ \"api-gateway\"\n        vault.hashicorp.com/agent-inject-secret-db: \"secret/data/production/db\"\n        vault.hashicorp.com/agent-inject-template-db:\
    \ |\n          {{- with secret \"secret/data/production/db\" -}}\n          postgresql://{{ .Data.data.username }}:{{\
    \ .Data.data.password }}@postgres:5432/mydb\n          {{- end }}\n    spec:\n      serviceAccountName: sa-api-gateway\n\
    \      containers:\n        - name: api\n          # Reads secret from /vault/secrets/db\n"
  example_bad: "containers:\n  - name: api\n    env:\n      - name: DB_PASSWORD\n        valueFrom:\n          secretKeyRef:\n\
    \            name: db-credentials\n            key: password\n    # Password visible in: kubectl describe pod, /proc/1/environ,\n\
    \    # crash dumps, logging middleware. No rotation without restart.\n"
  when_applies: Projects using Kubernetes-orchestrated deployments, HashiCorp Vault secrets management, or CSI
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities
  sources: ["https://developer.hashicorp.com/vault/docs/platform/k8s/injector", "https://secrets-store-csi-driver.sigs.k8s.io/"]
- id: CR-K8S-SEC-012
  text: Implement SBOM generation and SLSA provenance for all container images in the build pipeline.
  why: 'Without knowing what''s inside your images (SBOM) and how they were built (provenance), you cannot: assess exposure
    to new CVEs, verify build integrity, comply with supply chain security regulations, or detect tampered images. The SolarWinds
    and Log4Shell incidents showed that supply chain visibility is critical — you need to know every dependency in every deployed
    image.'
  how_to_do_right: Generate SBOM with Syft or Trivy during CI/CD. Attach SBOM to image as an OCI artifact with cosign attach.
    Generate SLSA provenance attestation (build metadata, source, builder identity). Store attestations in-toto format. Verify
    SBOM and provenance at admission with Kyverno or cosign verify-attestation. Scan SBOMs against vulnerability databases
    continuously.
  severity: high
  technologies:
    library: [syft, cosign, slsa]
    platform: [kubernetes]
  domains:
    domain: [security]
  example_good: "# CI/CD pipeline\n# 1. Build image\n# docker build -t registry.example.com/api:v1.2.3 .\n\n# 2. Generate\
    \ SBOM\n# syft registry.example.com/api:v1.2.3 -o spdx-json > sbom.json\n\n# 3. Sign image\n# cosign sign registry.example.com/api:v1.2.3\n\
    \n# 4. Attach SBOM\n# cosign attach sbom --sbom sbom.json registry.example.com/api:v1.2.3\n\n# 5. Create attestation\n\
    # cosign attest --predicate provenance.json registry.example.com/api:v1.2.3\n\n# Kyverno: Require SBOM attestation\napiVersion:\
    \ kyverno.io/v1\nkind: ClusterPolicy\nmetadata:\n  name: require-sbom\nspec:\n  validationFailureAction: Enforce\n  rules:\n\
    \    - name: check-sbom\n      match:\n        any:\n          - resources:\n              kinds: [\"Pod\"]\n      verifyImages:\n\
    \        - imageReferences: [\"registry.example.com/*\"]\n          attestations:\n            - predicateType: https://spdx.dev/Document\n\
    \              conditions:\n                - all:\n                    - key: \"{{ packages[].name }}\"\n           \
    \           operator: NotEquals\n                      value: \"\"\n"
  example_bad: '# No SBOM — "what''s in our images?" -> "no idea"

    # No provenance — "how was this image built?" -> "no idea"

    # New CVE announced — takes days to figure out if we''re affected

    # Tampered image in registry — no way to detect

    '
  when_applies: Projects using Kubernetes-orchestrated deployments, Syft, cosign, or SLSA
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities
  sources: ["https://slsa.dev/spec/v1.0/", "https://github.com/anchore/syft"]
- id: CR-K8S-SEC-013
  text: Enable Kubernetes audit logging with a policy that captures security-relevant events.
  why: Without audit logging, you have no visibility into WHO did WHAT in your cluster — if a secret is accessed, a pod is
    exec'd into, or RBAC is modified, there's no record. During incident response, audit logs are the primary forensic evidence.
    Many compliance frameworks (SOC2, PCI DSS, HIPAA) require audit logging. Kubernetes API audit logging captures every API
    request with user identity, verb, resource, and response status.
  how_to_do_right: 'Create an audit policy that: logs Metadata for all requests, logs RequestResponse for secrets/RBAC/exec,
    omits repetitive reads (watch, list) at lower levels. Send audit logs to a webhook backend (Fluentd/Fluent Bit -> SIEM)
    or log file with rotation. Alert on: secret access, RBAC changes, exec into pods, pod creation in kube-system. Retain
    audit logs for at least 90 days.'
  severity: high
  technologies:
    platform: [kubernetes]
  domains:
    domain: [security, observability]
  example_good: "# Audit policy\napiVersion: audit.k8s.io/v1\nkind: Policy\nrules:\n  # Log full request/response for sensitive\
    \ operations\n  - level: RequestResponse\n    resources:\n      - group: \"\"\n        resources: [\"secrets\", \"serviceaccounts\"\
    ]\n      - group: \"rbac.authorization.k8s.io\"\n        resources: [\"roles\", \"rolebindings\", \"clusterroles\", \"\
    clusterrolebindings\"]\n  # Log exec into pods\n  - level: RequestResponse\n    resources:\n      - group: \"\"\n    \
    \    resources: [\"pods/exec\", \"pods/attach\", \"pods/portforward\"]\n  # Log metadata for everything else\n  - level:\
    \ Metadata\n    omitStages: [\"RequestReceived\"]\n  # Skip noisy read-only requests\n  - level: None\n    users: [\"\
    system:kube-proxy\"]\n    verbs: [\"watch\"]\n"
  example_bad: '# No audit policy — no visibility into cluster operations

    # Incident response: "who accessed this secret?" -> unknown

    # Compliance audit: "show your access logs" -> none exist

    '
  when_applies: Projects using Kubernetes-orchestrated deployments
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities. projects not using Kubernetes
  sources: ["https://kubernetes.io/docs/tasks/debug/debug-cluster/audit/"]
- id: CR-K8S-SEC-014
  text: Disable automountServiceAccountToken for pods that do not need Kubernetes API access.
  why: By default, every pod gets a service account token mounted at /var/run/secrets/kubernetes.io/serviceaccount/token.
    This token grants API access with whatever RBAC permissions the service account has. Most application pods (web servers,
    workers, databases) never call the Kubernetes API — yet they carry a token that an attacker can use for lateral movement
    after container compromise.
  how_to_do_right: 'Set automountServiceAccountToken: false on the ServiceAccount and on the pod spec. Only enable it for
    pods that genuinely need API access (operators, controllers, monitoring agents). When enabled, use projected volume with
    short expiry and audience binding instead of the default long-lived token. Audit pods with mounted tokens: ''kubectl get
    pods -A -o json | jq select(.spec.automountServiceAccountToken != false)''.'
  severity: high
  technologies:
    platform: [kubernetes]
  domains:
    domain: [security]
  example_good: "apiVersion: v1\nkind: ServiceAccount\nmetadata:\n  name: sa-web-frontend\nautomountServiceAccountToken: false\
    \  # No token by default\n---\napiVersion: apps/v1\nkind: Deployment\nspec:\n  template:\n    spec:\n      serviceAccountName:\
    \ sa-web-frontend\n      automountServiceAccountToken: false\n      containers:\n        - name: frontend\n          #\
    \ No Kubernetes API token — reduced attack surface\n"
  example_bad: "apiVersion: apps/v1\nkind: Deployment\nspec:\n  template:\n    spec:\n      # Uses default SA with token auto-mounted\n\
    \      # Web frontend doesn't need API access but gets a token\n      # Attacker uses token for: kubectl get secrets,\
    \ pods, etc.\n"
  when_applies: Projects using Kubernetes-orchestrated deployments
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities. projects not using Kubernetes
  sources: ["https://kubernetes.io/docs/tasks/configure-pod-container/configure-service-account/#opt-out-of-api-credential-automounting"]
- id: CR-K8S-SEC-015
  text: Deploy runtime security monitoring (Falco or Tetragon) to detect anomalous container behavior.
  why: 'Admission policies prevent bad configurations, but they cannot detect runtime attacks — a legitimate container making
    unexpected syscalls, establishing suspicious network connections, or reading sensitive files after compromise. Runtime
    security tools use eBPF to monitor kernel events in real-time and alert on: shell spawned in container, sensitive file
    read, unexpected network connection, privilege escalation, cryptominer signatures.'
  how_to_do_right: 'Deploy Falco as a DaemonSet for syscall monitoring and event alerting. Or use Tetragon (Cilium) for eBPF-based
    runtime enforcement (can kill processes, not just alert). Define custom rules for your workloads. Alert on: shell in container,
    package manager execution, sensitive file access (/etc/shadow, /etc/passwd, /proc/self/environ), unexpected outbound connections.
    Forward alerts to SIEM.'
  severity: high
  technologies:
    library: [tetragon]
    platform: [kubernetes, falco]
  domains:
    domain: [security, observability]
  example_good: "# Falco custom rule — alert on shell in container\n# /etc/falco/rules.d/custom-rules.yaml\n# - rule: Shell\
    \ Spawned in Container\n#   desc: Detect shell execution inside container\n#   condition: >\n#     container.id != host\n\
    #     and proc.name in (bash, sh, zsh, dash, ash)\n#     and spawned_process\n#   output: \"Shell spawned in container\
    \ (user=%user.name container=%container.name)\"\n#   priority: WARNING\n\n# Deploy Falco as DaemonSet\n# helm install\
    \ falco falcosecurity/falco \\\n#   --set driver.kind=modern_ebpf \\\n#   --set falcosidekick.enabled=true \\\n#   --set\
    \ falcosidekick.config.slack.webhookurl=https://...\napiVersion: apps/v1\nkind: DaemonSet\nmetadata:\n  name: falco\n\
    \  namespace: falco\nspec:\n  template:\n    spec:\n      tolerations:\n        - operator: Exists\n      priorityClassName:\
    \ system-node-critical\n"
  example_bad: '# No runtime security — attacks go undetected

    # Compromised container mines crypto for weeks

    # Attacker reads secrets from filesystem — no alert

    # Reverse shell established — nobody knows

    '
  when_applies: Projects using Kubernetes-orchestrated deployments, Falco, or Tetragon
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities
  sources: ["https://falco.org/docs/", "https://tetragon.io/docs/overview/"]
- id: CR-K8S-SEC-016
  text: Use workload identity (IRSA, GKE Workload Identity, Azure AD) instead of static cloud credentials.
  why: Static cloud credentials (AWS access keys, GCP service account JSON) in Secrets or env vars are long-lived, shared,
    and impossible to scope per-pod. If leaked, they grant access until manually rotated. Workload identity federation maps
    Kubernetes ServiceAccounts to cloud IAM roles — pods get short-lived, automatically-rotated tokens scoped to their specific
    workload. No static credentials to leak.
  how_to_do_right: 'For AWS: Enable IRSA (IAM Roles for Service Accounts) on EKS, annotate ServiceAccount with eks.amazonaws.com/role-arn.
    For GKE: Enable Workload Identity, annotate SA with iam.gke.io/gcp-service-account. For Azure: Enable Azure AD Workload
    Identity, create federated credential. Pods get short-lived tokens automatically — no secrets to manage.'
  severity: critical
  technologies:
    platform: [kubernetes, aws, gcp, azure]
  domains:
    domain: [security]
  example_good: "# AWS EKS: IAM Roles for Service Accounts (IRSA)\napiVersion: v1\nkind: ServiceAccount\nmetadata:\n  name:\
    \ sa-s3-writer\n  namespace: production\n  annotations:\n    eks.amazonaws.com/role-arn: arn:aws:iam::123456789:role/s3-writer\n\
    ---\n# Pod automatically gets short-lived AWS credentials\n# No static keys, auto-rotated, scoped to IAM role\napiVersion:\
    \ apps/v1\nkind: Deployment\nspec:\n  template:\n    spec:\n      serviceAccountName: sa-s3-writer\n"
  example_bad: "# Static AWS credentials in Secret\napiVersion: v1\nkind: Secret\ndata:\n  AWS_ACCESS_KEY_ID: QUtJQS4uLg==\n\
    \  AWS_SECRET_ACCESS_KEY: c2VjcmV0...\n# Long-lived, not auto-rotated, not scoped per-workload\n# If leaked: full access\
    \ until manually revoked\n"
  when_applies: Any project using Kubernetes-orchestrated deployments, AWS cloud infrastructure, Google Cloud Platform services,
    or Microsoft Azure services
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities
  sources: ["https://docs.aws.amazon.com/eks/latest/userguide/iam-roles-for-service-accounts.html"]
- id: CR-K8S-SEC-017
  text: Enable encryption in transit for all internal cluster traffic using WireGuard or mTLS.
  why: Pod-to-pod traffic traverses the node network in plaintext by default. In shared or cloud environments, other tenants
    or compromised nodes can sniff this traffic. Even with NetworkPolicies (which control access, not encryption), traffic
    content is readable. Encryption in transit ensures confidentiality even if the network is compromised.
  how_to_do_right: Use Cilium with WireGuard encryption (transparent, no application changes, kernel-level, high performance).
    Or use Istio/Linkerd mTLS (application-level, adds identity). WireGuard is simpler (no sidecars) but provides node-level
    encryption. mTLS provides pod-level identity and fine-grained policies. Choose based on threat model and existing infrastructure.
  severity: high
  technologies:
    library: [cilium]
    platform: [kubernetes, vpn, wireguard, service_mesh, istio]
  domains:
    domain: [security, infrastructure]
    concern: [networking]
  example_good: "# Cilium with WireGuard — transparent encryption\n# helm install cilium cilium/cilium --set encryption.enabled=true\
    \ --set encryption.type=wireguard\nencryption:\n  enabled: true\n  type: wireguard\n  # All pod-to-pod traffic is encrypted\
    \ at kernel level\n  # Zero application changes required\n  # ~5% CPU overhead\n"
  example_bad: '# Default: all pod-to-pod traffic is plaintext

    # Compromised node can sniff: database queries, API tokens,

    # internal service credentials, PII, business data

    '
  when_applies: Projects using Kubernetes-orchestrated deployments, Cilium, WireGuard, or Istio service mesh
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities
  sources: ["https://docs.cilium.io/en/stable/security/network/encryption-wireguard/"]
- id: CR-K8S-SEC-018
  text: Use image pull secrets scoped per namespace — never use global pull secrets or embed credentials in node config.
  why: Global pull secrets (configured at node/kubelet level) grant every pod in the cluster access to your private registry
    — if any pod is compromised, the attacker can pull any image including internal tools and proprietary code. Embedding
    credentials in node configurations (docker config.json) persists them on disk and is not visible in Kubernetes audit logs.
  how_to_do_right: Create image pull Secrets per namespace. Reference them in ServiceAccounts (imagePullSecrets) so all pods
    in that namespace can pull. Use external-secrets-operator to sync registry credentials from Vault. For cloud registries,
    use workload identity (ECR token helper, GCR credential helper) instead of static passwords. Rotate registry credentials
    regularly.
  severity: medium
  technologies:
    platform: [kubernetes]
  domains:
    domain: [security]
  example_good: "# Pull secret per namespace\napiVersion: v1\nkind: Secret\nmetadata:\n  name: registry-credentials\n  namespace:\
    \ production\ntype: kubernetes.io/dockerconfigjson\ndata:\n  .dockerconfigjson: <base64-encoded-docker-config>\n---\n\
    apiVersion: v1\nkind: ServiceAccount\nmetadata:\n  name: sa-api\n  namespace: production\nimagePullSecrets:\n  - name:\
    \ registry-credentials\n"
  example_bad: '# Global pull secret on every node

    # /var/lib/kubelet/config.json contains registry credentials

    # Every pod on every node can pull from private registry

    # Not visible in Kubernetes audit logs

    # Cannot scope per-namespace

    '
  when_applies: Projects using Kubernetes-orchestrated deployments
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities. projects not using Kubernetes
  sources: ["https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/"]
