layer: rules
technology: React
domain: frontend
knowledge: [{id: "CR-REACT-HOOKS-001", text: 'Only call hooks at the top level — never inside conditions, loops, or nested
      functions.', why: "React tracks hooks by call order per component. Conditional hook calls shift the order on re-renders,\
      \ causing useState to return the wrong state, useEffect to attach the wrong cleanup, and silent data corruption that\
      \ is nearly impossible to debug.", how_to_do_right: "Always call hooks unconditionally at the top of the component or\
      \ custom hook. Move the condition inside the hook's logic, not around the hook call. Use the eslint-plugin-react-hooks\
      \ rule 'rules-of-hooks' as enforcer.", severity: critical, technologies: {lang: [typescript], framework: [frontend,
        react]}, domains: {domain: [architecture], concern: [frontend, state_management]}, example_good: "function UserProfile({\
      \ userId }: { userId: string | null }) {\n  // Hook always called — condition is inside the effect\n  useEffect(() =>\
      \ {\n    if (!userId) return;\n    fetchUser(userId).then(setUser);\n  }, [userId]);\n\n  const [user, setUser] = useState<User\
      \ | null>(null);\n\n  if (!userId) return <LoginPrompt />;\n  return <Profile user={user} />;\n}\n", example_bad: "function\
      \ UserProfile({ userId }: { userId: string | null }) {\n  // WRONG: Conditional hook — breaks on re-render when userId\
      \ changes\n  if (userId) {\n    const [user, setUser] = useState<User | null>(null);\n    useEffect(() => { fetchUser(userId).then(setUser);\
      \ }, [userId]);\n  }\n  return <LoginPrompt />;\n}\n", when_applies: "Any project using React component-based UIs or\
      \ TypeScript projects with static typing", when_not_applies: "server-rendered pages, APIs, CLI tools. projects not using\
      \ React or TypeScript", sources: ["https://react.dev/reference/rules/rules-of-hooks"]}, {id: "CR-REACT-HOOKS-002", text: "Always\
      \ provide exhaustive dependency arrays in useEffect and useMemo — use the ESLint rule to enforce.", why: "Missing dependencies\
      \ cause stale closures — your effect reads the initial value of a variable forever, never seeing updates. This creates\
      \ bugs where the UI shows stale data, event handlers fire with wrong values, and API calls use outdated parameters.",
    how_to_do_right: "Include every reactive value used inside the effect. If a dependency changes too often, refactor: use\
      \ useRef for mutable values, use functional setState updates, or extract the logic into a useReducer.", severity: critical,
    technologies: {lang: [typescript], framework: [frontend, react]}, domains: {domain: [architecture], concern: [frontend,
        state_management]}, example_good: "function SearchResults({ query, page }: Props) {\n  const [results, setResults]\
      \ = useState<Item[]>([]);\n\n  useEffect(() => {\n    const controller = new AbortController();\n    fetchResults(query,\
      \ page, { signal: controller.signal })\n      .then(setResults)\n      .catch(err => { if (!controller.signal.aborted)\
      \ throw err; });\n    return () => controller.abort(); // Cleanup!\n  }, [query, page]); // All deps listed\n\n  return\
      \ <ResultList items={results} />;\n}\n", example_bad: "function SearchResults({ query, page }: Props) {\n  const [results,\
      \ setResults] = useState<Item[]>([]);\n\n  useEffect(() => {\n    fetchResults(query, page).then(setResults);\n  },\
      \ [query]); // Missing 'page' — results don't update when page changes!\n\n  return <ResultList items={results} />;\n\
      }\n", when_applies: "Any project using React component-based UIs or TypeScript projects with static typing", when_not_applies: "server-rendered\
      \ pages, APIs, CLI tools. projects not using React or TypeScript", sources: ["https://react.dev/reference/react/useEffect"]},
  {id: "CR-REACT-HOOKS-003", text: "Use useRef to hold the latest value when you need fresh data in async callbacks without\
      \ triggering re-renders.", why: "Closures in useEffect and event handlers capture the value at render time. Long-running\
      \ async operations (debounced handlers, timers, WebSocket callbacks) read the stale captured value, not the current\
      \ one. useRef.current always points to the latest value.", how_to_do_right: "Create a ref with useRef. Update it in\
      \ a useEffect (or useLayoutEffect for synchronous needs). Read ref.current in async callbacks. This avoids the stale\
      \ closure trap without adding the value to dependency arrays.", severity: high, technologies: {lang: [typescript], framework: [
        frontend, react]}, domains: {domain: [architecture], concern: [frontend, async]}, example_good: "function Chat({ onMessage\
      \ }: { onMessage: (msg: string) => void }) {\n  const onMessageRef = useRef(onMessage);\n  useEffect(() => { onMessageRef.current\
      \ = onMessage; });\n\n  useEffect(() => {\n    const ws = new WebSocket('/ws');\n    ws.onmessage = (e) => {\n     \
      \ onMessageRef.current(e.data); // Always calls latest handler\n    };\n    return () => ws.close();\n  }, []); // No\
      \ dependency on onMessage — stable effect\n}\n", example_bad: "function Chat({ onMessage }: { onMessage: (msg: string)\
      \ => void }) {\n  useEffect(() => {\n    const ws = new WebSocket('/ws');\n    ws.onmessage = (e) => {\n      onMessage(e.data);\
      \ // Stale — captures initial onMessage forever\n    };\n    return () => ws.close();\n  }, []); // Missing onMessage\
      \ dep — adding it would reconnect on every render\n}\n", when_applies: "Projects using React component-based UIs or\
      \ TypeScript projects with static typing", when_not_applies: "server-rendered pages, APIs, CLI tools. projects not using\
      \ React or TypeScript", sources: ["https://react.dev/reference/react/useRef"]}, {id: "CR-REACT-HOOKS-004", text: "Always\
      \ return a cleanup function from useEffect when creating subscriptions, timers, or event listeners.", why: "Without\
      \ cleanup, effects stack up on every re-render: multiple WebSocket connections, duplicate event listeners, runaway intervals.\
      \ This causes memory leaks, duplicate API calls, and state updates on unmounted components.", how_to_do_right: "Return\
      \ a function that cleans up the resource. Use AbortController for fetch. Call clearInterval/clearTimeout. Call removeEventListener\
      \ or unsubscribe. The cleanup runs before the next effect and on unmount.", severity: critical, technologies: {lang: [
        typescript], framework: [frontend, react]}, domains: {domain: [architecture, performance], concern: [frontend, memory]},
    example_good: "function useInterval(callback: () => void, delay: number | null) {\n  const savedCallback = useRef(callback);\n\
      \  useEffect(() => { savedCallback.current = callback; });\n\n  useEffect(() => {\n    if (delay === null) return;\n\
      \    const id = setInterval(() => savedCallback.current(), delay);\n    return () => clearInterval(id); // Cleanup on\
      \ delay change or unmount\n  }, [delay]);\n}\n", example_bad: "function PollComponent() {\n  useEffect(() => {\n   \
      \ // Creates new interval on EVERY render — stacks up!\n    setInterval(() => fetchData(), 5000);\n    // No cleanup\
      \ — intervals keep running after unmount\n  });\n}\n", when_applies: "Any project using React component-based UIs or\
      \ TypeScript projects with static typing", when_not_applies: "server-rendered pages, APIs, CLI tools. projects not using\
      \ React or TypeScript", sources: ["https://react.dev/reference/react/useEffect#connecting-to-an-external-system"]},
  {id: "CR-REACT-STATE-001", text: "Use useReducer for complex state with multiple sub-values or state transitions that depend\
      \ on previous state.", why: "Multiple related useState calls lead to impossible states (loading=true + error='something')\
      \ and scattered update logic. useReducer centralizes transitions, makes states explicit, and is easier to test — each\
      \ action is a pure function.", how_to_do_right: "Define a discriminated union for actions. Define the state type explicitly.\
      \ Write a pure reducer. Dispatch actions instead of calling multiple setters. Use the reducer pattern for forms, wizards,\
      \ and data fetching.", severity: high, technologies: {lang: [typescript], framework: [frontend, react]}, domains: {
      domain: [architecture], concern: [frontend, state_management]}, example_good: "type State =\n  | { status: 'idle' }\n\
      \  | { status: 'loading' }\n  | { status: 'success'; data: User[] }\n  | { status: 'error'; error: string };\n\ntype\
      \ Action =\n  | { type: 'FETCH' }\n  | { type: 'SUCCESS'; data: User[] }\n  | { type: 'ERROR'; error: string };\n\n\
      function reducer(state: State, action: Action): State {\n  switch (action.type) {\n    case 'FETCH': return { status:\
      \ 'loading' };\n    case 'SUCCESS': return { status: 'success', data: action.data };\n    case 'ERROR': return { status:\
      \ 'error', error: action.error };\n  }\n}\n\nconst [state, dispatch] = useReducer(reducer, { status: 'idle' });\n",
    example_bad: "// Multiple booleans — impossible states representable\nconst [loading, setLoading] = useState(false);\n\
      const [error, setError] = useState<string | null>(null);\nconst [data, setData] = useState<User[] | null>(null);\n//\
      \ Can be: loading=true, error=\"fail\", data=[...] — makes no sense\n", when_applies: "Projects using React component-based\
      \ UIs or TypeScript projects with static typing", when_not_applies: "server-rendered pages, APIs, CLI tools. projects\
      \ not using React or TypeScript", sources: ["https://react.dev/reference/react/useReducer"]}, {id: "CR-REACT-STATE-002",
    text: "Use Context for low-frequency global state only — theme, locale, auth. Use Zustand or Jotai for high-frequency\
      \ state.", why: "Every Context value change re-renders ALL consumers, even if they only use part of the context. For\
      \ frequently updated state (form fields, real-time data, animations), Context causes cascade re-renders that destroy\
      \ performance.", how_to_do_right: "Split Context into small, focused providers (ThemeContext, AuthContext). For state\
      \ updated more than once per second, use Zustand (flux pattern) or Jotai (atomic state). Both support selective subscriptions\
      \ with zero re-render waste.", severity: high, technologies: {framework: [frontend, react, state, zustand], library: [
        jotai]}, domains: {domain: [architecture, performance], concern: [frontend, state_management]}, example_good: "//\
      \ Zustand — only re-renders when selected slice changes\nimport { create } from 'zustand';\n\nconst useStore = create<Store>((set)\
      \ => ({\n  count: 0,\n  user: null,\n  increment: () => set((s) => ({ count: s.count + 1 })),\n}));\n\n// Only re-renders\
      \ when count changes — user changes don't affect this\nfunction Counter() {\n  const count = useStore((s) => s.count);\n\
      \  return <span>{count}</span>;\n}\n", example_bad: "// Context — ALL consumers re-render on ANY change\nconst AppContext\
      \ = createContext<{ count: number; user: User | null }>(...);\n\n// This re-renders when count changes even though it\
      \ only uses user!\nfunction UserBadge() {\n  const { user } = useContext(AppContext);\n  return <span>{user?.name}</span>;\n\
      }\n", when_applies: "Projects using React component-based UIs, Zustand, or Jotai", when_not_applies: "server-rendered\
      \ pages, APIs, CLI tools", sources: ["https://react.dev/learn/scaling-up-with-reducer-and-context"]}, {id: "CR-REACT-PERF-001",
    text: Use React.memo only for components with expensive renders that receive the same props frequently., why: "React.memo\
      \ adds overhead: it shallow-compares all props on every render. For simple components, the comparison is more expensive\
      \ than re-rendering. Premature memoization wastes memory and adds complexity without measurable benefit.", how_to_do_right: "Profile\
      \ first — use React DevTools Profiler to identify slow renders. Apply memo to components that: (1) render often with\
      \ same props, (2) have expensive render logic, (3) are deep in the tree. Always pass stable references (useCallback/useMemo)\
      \ to memoized children.", severity: medium, technologies: {lang: [typescript], framework: [frontend, react]}, domains: {
      domain: [architecture, performance], concern: [frontend]}, example_good: "// Expensive list item — memoize because parent\
      \ re-renders on scroll\nconst ExpensiveRow = React.memo(function ExpensiveRow({\n  item,\n  onSelect,\n}: {\n  item:\
      \ DataItem;\n  onSelect: (id: string) => void;\n}) {\n  const processed = heavyComputation(item); // Expensive\n  return\
      \ <tr onClick={() => onSelect(item.id)}>{/* ... */}</tr>;\n});\n\n// Parent uses useCallback for stable reference\n\
      const handleSelect = useCallback((id: string) => {\n  setSelected(id);\n}, []);\n", example_bad: "// Memoizing a trivial\
      \ component — overhead > savings\nconst Label = React.memo(({ text }: { text: string }) => (\n  <span>{text}</span>\n\
      ));\n\n// Passing new object every render — memo is useless\n<ExpensiveRow item={item} style={{ color: 'red' }} />\n\
      // style={} creates new object → memo always re-renders\n", when_applies: "Projects using React component-based UIs\
      \ or TypeScript projects with static typing", when_not_applies: "server-rendered pages, APIs, CLI tools. projects not\
      \ using React or TypeScript", sources: ["https://react.dev/reference/react/memo"]}, {id: "CR-REACT-PERF-002", text: Use
      React.lazy and Suspense for code splitting — load components only when they are needed., why: "Bundling everything into\
      \ one file means users download the settings page, admin dashboard, and rarely-used modals on first load. Code splitting\
      \ with lazy() creates separate chunks that load on demand, reducing initial bundle by 30-70%.", how_to_do_right: "Use\
      \ React.lazy() for route-level splitting. Wrap lazy components in Suspense with meaningful loading UI. Preload critical\
      \ routes on hover/focus. Use named exports with a re-export wrapper.", severity: high, technologies: {lang: [typescript],
      framework: [frontend, react]}, domains: {domain: [architecture, performance], concern: [frontend]}, example_good: "import\
      \ { lazy, Suspense } from 'react';\n\n// Route-level code splitting\nconst Dashboard = lazy(() => import('./pages/Dashboard'));\n\
      const Settings = lazy(() => import('./pages/Settings'));\n\nfunction App() {\n  return (\n    <Suspense fallback={<PageSkeleton\
      \ />}>\n      <Routes>\n        <Route path=\"/\" element={<Home />} />\n        <Route path=\"/dashboard\" element={<Dashboard\
      \ />} />\n        <Route path=\"/settings\" element={<Settings />} />\n      </Routes>\n    </Suspense>\n  );\n}\n",
    example_bad: "// Everything in one bundle — 500KB initial load\nimport Dashboard from './pages/Dashboard';\nimport Settings\
      \ from './pages/Settings';\nimport AdminPanel from './pages/AdminPanel';\n// User loads ALL pages even if they only\
      \ visit Home\n", when_applies: "Projects using React component-based UIs or TypeScript projects with static typing",
    when_not_applies: "server-rendered pages, APIs, CLI tools. projects not using React or TypeScript", sources: ["https://react.dev/reference/react/lazy"]},
  {id: "CR-REACT-PERF-003", text: "Use virtualization (react-window or @tanstack/virtual) for lists longer than 100 items.",
    why: "Rendering 1,000 DOM nodes for a list creates 1,000 real elements in the browser. Each one participates in layout,\
      \ paint, and memory. Scroll performance drops below 30fps, and initial render takes seconds. Virtualization renders\
      \ only visible items (~20).", how_to_do_right: "Use react-window for simple fixed/variable-size lists. Use @tanstack/virtual\
      \ for complex layouts. Measure the container height. Provide accurate item sizes. Use overscan for smooth scrolling.",
    severity: high, technologies: {lang: [typescript], framework: [frontend, react]}, domains: {domain: [architecture, performance],
      concern: [frontend]}, example_good: "import { FixedSizeList } from 'react-window';\n\nfunction UserList({ users }: {\
      \ users: User[] }) {\n  return (\n    <FixedSizeList\n      height={600}\n      width=\"100%\"\n      itemCount={users.length}\n\
      \      itemSize={50}\n      overscanCount={5}\n    >\n      {({ index, style }) => (\n        <div style={style}>\n\
      \          <UserRow user={users[index]} />\n        </div>\n      )}\n    </FixedSizeList>\n  );\n}\n", example_bad: "//\
      \ Renders ALL 10,000 users — browser freezes\nfunction UserList({ users }: { users: User[] }) {\n  return (\n    <div\
      \ style={{ height: 600, overflow: 'auto' }}>\n      {users.map(user => <UserRow key={user.id} user={user} />)}\n   \
      \ </div>\n  );\n}\n", when_applies: "Projects using React component-based UIs or TypeScript projects with static typing",
    when_not_applies: "server-rendered pages, APIs, CLI tools. projects not using React or TypeScript", sources: ["https://react.dev/learn/rendering-lists#keeping-list-items-in-order-with-key"]},
  {id: "CR-REACT-ERR-001", text: Use granular error boundaries per feature — not a single boundary at the app root., why: "A\
      \ single root error boundary means any error in any component crashes the entire app. Users see a full-page error when\
      \ only the chat widget broke. Granular boundaries isolate failures — the rest of the app keeps working.", how_to_do_right: "Place\
      \ error boundaries around independent features: sidebar, main content, modals, widgets. Provide retry buttons in fallback\
      \ UI. Log errors via componentDidCatch. Use react-error-boundary for function component friendliness.", severity: high,
    technologies: {lang: [typescript], framework: [frontend, react]}, domains: {domain: [architecture, reliability], concern: [
        frontend, error_handling]}, example_good: "import { ErrorBoundary } from 'react-error-boundary';\n\nfunction Dashboard()\
      \ {\n  return (\n    <div className=\"grid\">\n      <ErrorBoundary fallback={<WidgetError name=\"Chart\" />}>\n   \
      \     <ChartWidget />\n      </ErrorBoundary>\n      <ErrorBoundary fallback={<WidgetError name=\"Activity\" />}>\n\
      \        <ActivityFeed />\n      </ErrorBoundary>\n      <ErrorBoundary fallback={<WidgetError name=\"Stats\" />}>\n\
      \        <StatsPanel />\n      </ErrorBoundary>\n    </div>\n  );\n}\n\nfunction WidgetError({ name }: { name: string\
      \ }) {\n  return (\n    <div className=\"error-widget\">\n      <p>{name} failed to load</p>\n      <button onClick={()\
      \ => window.location.reload()}>Retry</button>\n    </div>\n  );\n}\n", example_bad: "// Single boundary — entire app\
      \ crashes if any widget fails\nfunction App() {\n  return (\n    <ErrorBoundary fallback={<FullPageError />}>\n    \
      \  <Header />\n      <Dashboard />\n      <Footer />\n    </ErrorBoundary>\n  );\n}\n", when_applies: "Projects using\
      \ React component-based UIs or TypeScript projects with static typing", when_not_applies: "server-rendered pages, APIs,\
      \ CLI tools. projects not using React or TypeScript", sources: ["https://react.dev/reference/react/Component#catching-rendering-errors-with-an-error-boundary"]},
  {id: "CR-REACT-RSC-001", text: "Default to Server Components — only add 'use client' when the component needs browser APIs,\
      \ state, or effects.", why: "Server Components send zero JavaScript to the browser — only the rendered HTML. Client\
      \ Components ship their full code. Adding 'use client' unnecessarily to data-fetching or layout components bloats the\
      \ bundle and slows Time to Interactive.", how_to_do_right: "Keep data fetching, heavy imports, and static rendering\
      \ in Server Components. Push 'use client' to the smallest leaf components that need interactivity. Pass server-fetched\
      \ data as serializable props to client components.", severity: high, technologies: {lang: [typescript], framework: [
        frontend, react], library: [next, js]}, domains: {domain: [architecture, performance], concern: [frontend]}, example_good: "//\
      \ Server Component — zero client JS, direct DB access\nasync function ProductPage({ id }: { id: string }) {\n  const\
      \ product = await db.product.findUnique({ where: { id } });\n  return (\n    <div>\n      <h1>{product.name}</h1>\n\
      \      <p>{product.description}</p>\n      <AddToCartButton productId={id} /> {/* Only this is client */}\n    </div>\n\
      \  );\n}\n\n// Client Component — minimal, only for interactivity\n'use client';\nfunction AddToCartButton({ productId\
      \ }: { productId: string }) {\n  const [adding, setAdding] = useState(false);\n  return <button onClick={() => addToCart(productId)}>Add\
      \ to Cart</button>;\n}\n", example_bad: "'use client'; // WRONG: Entire page is client — ships all JS\nfunction ProductPage({\
      \ id }: { id: string }) {\n  const [product, setProduct] = useState(null);\n  useEffect(() => {\n    fetch(`/api/products/${id}`).then(r\
      \ => r.json()).then(setProduct);\n  }, [id]);\n  return <div>{product?.name}</div>;\n}\n", when_applies: "Projects using\
      \ React component-based UIs, Next.js SSR/SSG applications, or TypeScript projects with static typing", when_not_applies: "server-rendered\
      \ pages, APIs, CLI tools", sources: ["https://react.dev/reference/rsc/server-components"]}, {id: "CR-REACT-PAT-001",
    text: "Extract reusable stateful logic into custom hooks — not utility functions, not HOCs, not render props.", why: "Duplicated\
      \ useState/useEffect blocks across components lead to inconsistent behavior and missed edge cases (forgetting cleanup,\
      \ missing deps). Custom hooks encapsulate the logic once, test it once, and reuse safely everywhere.", how_to_do_right: "Name\
      \ custom hooks use*. Return only what consumers need (not internal state). Handle loading, error, and cleanup internally.\
      \ Type the return value explicitly. Test hooks in isolation with renderHook.", severity: high, technologies: {lang: [
        typescript], framework: [frontend, react]}, domains: {domain: [architecture], concern: [frontend]}, example_good: "function\
      \ useDebounce<T>(value: T, delay: number): T {\n  const [debounced, setDebounced] = useState(value);\n\n  useEffect(()\
      \ => {\n    const timer = setTimeout(() => setDebounced(value), delay);\n    return () => clearTimeout(timer); // Proper\
      \ cleanup\n  }, [value, delay]);\n\n  return debounced;\n}\n\n// Used in any component — consistent behavior, tested\
      \ once\nfunction Search() {\n  const [query, setQuery] = useState('');\n  const debouncedQuery = useDebounce(query,\
      \ 300);\n  // Fetch triggered only after 300ms pause\n}\n", example_bad: "// Duplicated debounce logic in every component\n\
      function Search() {\n  const [query, setQuery] = useState('');\n  const [debouncedQuery, setDebouncedQuery] = useState('');\n\
      \  useEffect(() => {\n    const t = setTimeout(() => setDebouncedQuery(query), 300);\n    return () => clearTimeout(t);\n\
      \  }, [query]); // Copy-pasted everywhere — inconsistent delay, missed cleanup\n}\n", when_applies: "Projects using\
      \ React component-based UIs or TypeScript projects with static typing", when_not_applies: "server-rendered pages, APIs,\
      \ CLI tools. projects not using React or TypeScript", sources: ["https://react.dev/learn/reusing-logic-with-custom-hooks"]},
  {id: "CR-REACT-PAT-002", text: Use compound components with Context for complex UI components that share implicit state.,
    why: "Passing everything via props creates 'prop drilling' and rigid APIs. Compound components let consumers compose children\
      \ freely while sharing state implicitly through Context — like how HTML's <select> and <option> work together.", how_to_do_right: "Create\
      \ a parent component with Context provider. Create child components that consume the context. Export as Parent.Child\
      \ for clear API. Validate that children are used within the parent.", severity: medium, technologies: {lang: [typescript],
      framework: [frontend, react]}, domains: {domain: [architecture], concern: [frontend, "component-design"]}, example_good: "const\
      \ TabsContext = createContext<{\n  activeTab: string;\n  setActiveTab: (id: string) => void;\n} | null>(null);\n\nfunction\
      \ Tabs({ defaultTab, children }: PropsWithChildren<{ defaultTab: string }>) {\n  const [activeTab, setActiveTab] = useState(defaultTab);\n\
      \  return (\n    <TabsContext.Provider value={{ activeTab, setActiveTab }}>\n      <div role=\"tablist\">{children}</div>\n\
      \    </TabsContext.Provider>\n  );\n}\n\nTabs.Tab = function Tab({ id, children }: { id: string; children: ReactNode\
      \ }) {\n  const ctx = useContext(TabsContext);\n  if (!ctx) throw new Error('Tab must be used within Tabs');\n  return\
      \ (\n    <button role=\"tab\" aria-selected={ctx.activeTab === id}\n      onClick={() => ctx.setActiveTab(id)}>{children}</button>\n\
      \  );\n};\n\n// Usage: <Tabs defaultTab=\"a\"><Tabs.Tab id=\"a\">A</Tabs.Tab></Tabs>\n", example_bad: "// Rigid prop-based\
      \ API — hard to extend, hard to customize\n<Tabs\n  tabs={[{ id: 'a', label: 'A' }, { id: 'b', label: 'B' }]}\n  activeTab={active}\n\
      \  onTabChange={setActive}\n  renderTabContent={(id) => <div>Content for {id}</div>}\n/>\n", when_applies: "Projects\
      \ using React component-based UIs or TypeScript projects with static typing", when_not_applies: "server-rendered pages,\
      \ APIs, CLI tools. projects not using React or TypeScript", sources: ["https://react.dev/learn/passing-data-deeply-with-context"]},
  {id: "CR-REACT-CONC-001", text: "Use useTransition to mark non-urgent updates so the UI stays responsive during expensive\
      \ re-renders.", why: "Without useTransition, typing in a search input that triggers a heavy filter/render blocks the\
      \ main thread — the input visibly lags. useTransition tells React to keep the input responsive and defer the expensive\
      \ update, maintaining 60fps.", how_to_do_right: "Wrap the expensive setState in startTransition. Show isPending state\
      \ for loading indicators. Use for search filters, tab switching, large list updates. Do not wrap urgent updates (typing,\
      \ clicking) in transitions.", severity: medium, technologies: {lang: [typescript], framework: [frontend, react]}, domains: {
      domain: [architecture, performance], concern: [frontend]}, example_good: "function FilterableList({ items }: { items:\
      \ Item[] }) {\n  const [query, setQuery] = useState('');\n  const [filteredItems, setFilteredItems] = useState(items);\n\
      \  const [isPending, startTransition] = useTransition();\n\n  function handleChange(e: ChangeEvent<HTMLInputElement>)\
      \ {\n    setQuery(e.target.value); // Urgent — update input immediately\n    startTransition(() => {\n      // Non-urgent\
      \ — can be interrupted\n      setFilteredItems(items.filter(i => i.name.includes(e.target.value)));\n    });\n  }\n\n\
      \  return (\n    <>\n      <input value={query} onChange={handleChange} />\n      {isPending && <Spinner />}\n     \
      \ <List items={filteredItems} />\n    </>\n  );\n}\n", example_bad: "function FilterableList({ items }: { items: Item[]\
      \ }) {\n  const [query, setQuery] = useState('');\n\n  // Both updates are urgent — input lags while filtering 10k items\n\
      \  function handleChange(e: ChangeEvent<HTMLInputElement>) {\n    setQuery(e.target.value);\n    // Expensive filter\
      \ blocks the input from updating\n  }\n\n  const filtered = items.filter(i => i.name.includes(query)); // Runs every\
      \ render\n  return <><input value={query} onChange={handleChange} /><List items={filtered} /></>;\n}\n", when_applies: "Projects\
      \ using React component-based UIs or TypeScript projects with static typing", when_not_applies: "server-rendered pages,\
      \ APIs, CLI tools. projects not using React or TypeScript", sources: ["https://react.dev/reference/react/useTransition"]},
  {id: "CR-REACT-KEY-001", text: 'Never use array index as key for lists that can be reordered, filtered, or have items added/removed.',
    why: "React uses keys to match elements across renders. With index keys, reordering/removing items makes React reuse the\
      \ wrong DOM nodes — input values appear in wrong rows, animations break, and components keep stale state from the previous\
      \ item at that index.", how_to_do_right: "Use stable unique IDs from data (database ID, UUID). If no ID exists, generate\
      \ one when the item is created (not during render). Only use index as key for truly static, never-reordered lists.",
    severity: critical, technologies: {lang: [typescript], framework: [frontend, react]}, domains: {domain: [architecture],
      concern: [frontend, rendering]}, example_good: "function TodoList({ todos }: { todos: Todo[] }) {\n  return (\n    <ul>\n\
      \      {todos.map(todo => (\n        <li key={todo.id}> {/* Stable ID — survives reorder */}\n          <input\n   \
      \         type=\"checkbox\"\n            checked={todo.done}\n            onChange={() => toggle(todo.id)}\n       \
      \   />\n          {todo.text}\n        </li>\n      ))}\n    </ul>\n  );\n}\n", example_bad: "function TodoList({ todos\
      \ }: { todos: Todo[] }) {\n  return (\n    <ul>\n      {todos.map((todo, index) => (\n        <li key={index}> {/* Index\
      \ key — reorder breaks checkbox state */}\n          <input type=\"checkbox\" checked={todo.done} />\n          {todo.text}\n\
      \        </li>\n      ))}\n    </ul>\n  );\n}\n", when_applies: "Any project using React component-based UIs or TypeScript\
      \ projects with static typing", when_not_applies: "server-rendered pages, APIs, CLI tools. projects not using React\
      \ or TypeScript", sources: ["https://react.dev/learn/rendering-lists#keeping-list-items-in-order-with-key"]}, {id: "CR-REACT-REF-001",
    text: "Use useImperativeHandle to limit the API exposed by forwarded refs — never expose the entire DOM node.", why: "Exposing\
      \ the full DOM ref lets consumers call any DOM method (remove, innerHTML, style mutations) — breaking the component's\
      \ internal invariants. useImperativeHandle creates a controlled API, like a public interface for the component's imperative\
      \ actions.", how_to_do_right: "Use forwardRef + useImperativeHandle. Only expose methods the consumer needs (focus,\
      \ scrollTo, reset). Type the ref handle explicitly. Document the available methods.", severity: medium, technologies: {
      lang: [typescript], framework: [frontend, react]}, domains: {domain: [architecture], concern: [frontend, "component-design"]},
    example_good: "interface InputHandle {\n  focus: () => void;\n  reset: () => void;\n}\n\nconst FancyInput = forwardRef<InputHandle,\
      \ InputProps>((props, ref) => {\n  const inputRef = useRef<HTMLInputElement>(null);\n\n  useImperativeHandle(ref, ()\
      \ => ({\n    focus: () => inputRef.current?.focus(),\n    reset: () => { if (inputRef.current) inputRef.current.value\
      \ = ''; },\n  }));\n\n  return <input ref={inputRef} {...props} />;\n});\n\n// Consumer can only focus() and reset()\
      \ — no DOM mutation\nconst ref = useRef<InputHandle>(null);\nref.current?.focus();\n", example_bad: "// Exposes ENTIRE\
      \ DOM node — consumer can do anything\nconst FancyInput = forwardRef<HTMLInputElement, InputProps>((props, ref) => {\n\
      \  return <input ref={ref} {...props} />;\n});\n\n// Consumer can break the component:\nref.current?.remove(); // Removes\
      \ the input from DOM!\nref.current!.innerHTML = '<script>alert(\"xss\")</script>';\n", when_applies: "Projects using\
      \ React component-based UIs or TypeScript projects with static typing", when_not_applies: "server-rendered pages, APIs,\
      \ CLI tools. projects not using React or TypeScript", sources: ["https://react.dev/reference/react/useImperativeHandle"]},
  {id: "CR-REACT-MEMO-001", text: Only use useMemo for genuinely expensive computations — not for every object or array creation.,
    why: "useMemo itself has overhead: it stores the previous value, compares dependencies, and adds complexity. For cheap\
      \ operations (creating an object, filtering a small array), the memoization cost exceeds the computation cost. Premature\
      \ useMemo clutters code and wastes memory.", how_to_do_right: "Profile first — if a computation takes less than 1ms,\
      \ skip useMemo. Use useMemo for: sorting/filtering large arrays (1000+ items), expensive regex/parsing, creating complex\
      \ derived objects. Never use useMemo to 'fix' dependency warnings — fix the actual dependency.", severity: medium, technologies: {
      lang: [typescript], framework: [frontend, react]}, domains: {domain: [architecture, performance], concern: [frontend]},
    example_good: "function ProductList({ products, filters }: Props) {\n  // WORTH memoizing — filters 10,000 products with\
      \ complex logic\n  const filtered = useMemo(() =>\n    products\n      .filter(p => matchesFilters(p, filters))\n  \
      \    .sort((a, b) => a.price - b.price),\n    [products, filters]\n  );\n\n  // NOT worth memoizing — trivial computation\n\
      \  const isEmpty = filtered.length === 0; // Don't wrap this in useMemo\n  return isEmpty ? <EmptyState /> : <Grid items={filtered}\
      \ />;\n}\n", example_bad: "function ProductList({ products }: Props) {\n  // Pointless useMemo — object creation is\
      \ trivial\n  const style = useMemo(() => ({ color: 'red', fontSize: 14 }), []);\n  // Pointless useMemo — simple check\n\
      \  const hasProducts = useMemo(() => products.length > 0, [products]);\n  // Adds complexity and memory overhead for\
      \ zero benefit\n}\n", when_applies: "Projects using React component-based UIs or TypeScript projects with static typing",
    when_not_applies: "server-rendered pages, APIs, CLI tools. projects not using React or TypeScript", sources: ["https://react.dev/reference/react/useMemo"]},
  {id: "CR-REACT-MEMO-002", text: "Use useCallback only when passing callbacks to memoized children — not on every function\
      \ declaration.", why: "useCallback prevents function recreation on re-render, but this only matters if the function\
      \ is passed as a prop to React.memo children. Without a memoized consumer, useCallback does nothing useful — the parent\
      \ re-renders anyway, creating the same closures.", how_to_do_right: "Use useCallback when: (1) passing to React.memo\
      \ children, (2) passing to useEffect dependencies, (3) passing to context values. Don't use for: event handlers on plain\
      \ HTML elements, functions used only inside the component.", severity: medium, technologies: {lang: [typescript], framework: [
        frontend, react]}, domains: {domain: [architecture, performance], concern: [frontend]}, example_good: "// Parent with\
      \ memoized child — useCallback prevents child re-render\nconst ExpensiveChild = React.memo(({ onClick }: { onClick:\
      \ () => void }) => {\n  return <HeavyComponent onClick={onClick} />;\n});\n\nfunction Parent() {\n  const [count, setCount]\
      \ = useState(0);\n\n  // Stable reference — ExpensiveChild won't re-render when count changes\n  const handleClick =\
      \ useCallback(() => {\n    console.log('clicked');\n  }, []);\n\n  return (\n    <>\n      <span>{count}</span>\n  \
      \    <ExpensiveChild onClick={handleClick} />\n    </>\n  );\n}\n", example_bad: "function Form() {\n  // Pointless\
      \ useCallback — <button> is not memoized\n  const handleSubmit = useCallback(() => {\n    submitForm();\n  }, []);\n\
      \  // <button> always re-renders with parent anyway\n  return <button onClick={handleSubmit}>Submit</button>;\n}\n",
    when_applies: "Projects using React component-based UIs or TypeScript projects with static typing", when_not_applies: "server-rendered\
      \ pages, APIs, CLI tools. projects not using React or TypeScript", sources: ["https://react.dev/reference/react/useCallback"]},
  {id: "CR-REACT-SUSPENSE-001", text: "Use Suspense boundaries to show loading states for async operations — place them at\
      \ meaningful UI boundaries.", why: "Without Suspense, every async component needs its own loading state (useState +\
      \ useEffect + isLoading). Suspense centralizes loading UI at layout boundaries, supports streaming SSR, and works with\
      \ React.lazy, Server Components, and data fetching libraries.", how_to_do_right: "Place Suspense at route boundaries\
      \ for page-level loading. Place Suspense around independent widgets for granular loading. Use fallback prop for skeleton\
      \ UIs. Nest Suspense for progressive loading (header loads before content).", severity: high, technologies: {lang: [
        typescript], framework: [frontend, react]}, domains: {domain: [architecture], concern: [frontend, ux, async]}, example_good: "function\
      \ ProductPage({ id }: { id: string }) {\n  return (\n    <div>\n      {/* Header loads immediately */}\n      <ProductHeader\
      \ id={id} />\n\n      {/* Reviews load independently — don't block product info */}\n      <Suspense fallback={<ReviewsSkeleton\
      \ />}>\n        <ProductReviews id={id} />\n      </Suspense>\n\n      {/* Recommendations load last */}\n      <Suspense\
      \ fallback={<RecommendationsSkeleton />}>\n        <Recommendations id={id} />\n      </Suspense>\n    </div>\n  );\n\
      }\n", example_bad: "// Single Suspense wrapping everything — all-or-nothing loading\nfunction ProductPage({ id }: {\
      \ id: string }) {\n  return (\n    <Suspense fallback={<FullPageSpinner />}>\n      {/* User sees spinner until ALL\
      \ data loads */}\n      <ProductHeader id={id} />\n      <ProductReviews id={id} /> {/* Slow API */}\n      <Recommendations\
      \ id={id} /> {/* Another slow API */}\n    </Suspense>\n  );\n}\n", when_applies: "Projects using React component-based\
      \ UIs or TypeScript projects with static typing", when_not_applies: "server-rendered pages, APIs, CLI tools. projects\
      \ not using React or TypeScript", sources: ["https://react.dev/reference/react/Suspense"]}, {id: "CR-REACT-FORM-001",
    text: "Use controlled inputs (value + onChange) for form state that drives UI — use uncontrolled inputs (useRef) only\
      \ for simple one-shot forms.", why: "Uncontrolled inputs store state in the DOM — React doesn't know the current value\
      \ until form submission. This makes validation, conditional rendering, computed fields, and multi-step forms impossible.\
      \ Controlled inputs keep React as the source of truth.", how_to_do_right: "Use useState + value + onChange for inputs\
      \ that affect other UI (search filters, calculators, dynamic forms). Use useRef + defaultValue for simple forms where\
      \ you only need the value on submit (login, contact). Never mix controlled and uncontrolled for the same input.", severity: high,
    technologies: {lang: [typescript], framework: [frontend, react]}, domains: {domain: [architecture], concern: [frontend,
        forms]}, example_good: "// Controlled — React owns the state, enables live validation + derived values\nfunction PaymentForm()\
      \ {\n  const [amount, setAmount] = useState('');\n  const [currency, setCurrency] = useState('USD');\n\n  const formattedAmount\
      \ = new Intl.NumberFormat('en', {\n    style: 'currency', currency,\n  }).format(Number(amount) || 0);\n\n  const isValid\
      \ = Number(amount) > 0;\n\n  return (\n    <form>\n      <input\n        type=\"number\"\n        value={amount}\n \
      \       onChange={e => setAmount(e.target.value)}\n      />\n      <span>{formattedAmount}</span> {/* Live preview */}\n\
      \      <button disabled={!isValid}>Pay</button> {/* Live validation */}\n    </form>\n  );\n}\n", example_bad: "// Mixing\
      \ controlled and uncontrolled — React warning + bugs\nfunction BrokenForm() {\n  const [name, setName] = useState(undefined);\
      \ // Starts uncontrolled (undefined)\n  return (\n    <input\n      value={name} // undefined → uncontrolled, then \"\
      Alice\" → controlled\n      onChange={e => setName(e.target.value)}\n    />\n  );\n  // React warning: \"A component\
      \ is changing an uncontrolled input to controlled\"\n}\n", when_applies: "Projects using React component-based UIs or\
      \ TypeScript projects with static typing", when_not_applies: "server-rendered pages, APIs, CLI tools. projects not using\
      \ React or TypeScript", sources: ["https://react.dev/learn/sharing-state-between-components#controlled-and-uncontrolled-components"]}]
