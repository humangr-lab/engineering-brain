- id: CR-SRE-ANTI-010
  text: The "toil acceptance" antipattern — treating repetitive manual work as normal instead of automating it. If an engineer
    does the same manual task more than 3 times, the fourth time should be writing automation. Manual work scales linearly;
    automation scales logarithmically.
  why: 'Google''s Chapter 5 on Eliminating Toil defines toil as manual, repetitive, automatable, tactical, and lacking enduring
    value. The danger is normalization: teams gradually accept increasing toil ("we''ve always done it this way") until engineers
    spend 80% of their time on manual operations and 20% on engineering — the exact opposite of Google''s target ratio. Toil
    compounds: as the system grows, manual work grows proportionally. 10 servers need 10 minutes of daily maintenance; 100
    servers need 100 minutes; 1000 servers need a full-time engineer doing nothing but manual work. Automation breaks this
    scaling: a script that handles daily maintenance for 10 servers handles it for 1000 servers in the same time. Google treats
    toil reduction as a core engineering deliverable, not a nice-to-have.

    '
  how_to_do_right: '1. Track toil explicitly: what manual tasks are performed, how often, and how long they take. Report toil
    hours monthly.

    2. The "rule of three": the first time you do a task manually, note it. The second time, document it. The third time,
    automate it.

    3. Automation must be maintained: an automation script that breaks after 6 months is technical debt, not a solution.

    4. Prioritize toil reduction by (frequency × time per occurrence × number of people affected). Automate the most expensive
    toil first.

    5. If toil exceeds 50% of an engineer''s time, this is an emergency. Dedicate resources to automation until the ratio
    is restored.

    6. Make toil reduction visible: track "toil hours saved" per quarter. Celebrate successful automation.

    '
  example_good: "import time\nfrom dataclasses import dataclass\nfrom typing import List\n\n@dataclass\nclass ToilEntry:\n    task: str\n    frequency_per_month: int\n    minutes_per_occurrence: int\n    people_affected: int\n    automated: bool = False\n\n    @property\n    def monthly_cost_hours(self) -> float:\n        if self.automated:\n            return 0\n        return (self.frequency_per_month * self.minutes_per_occurrence * self.people_affected) / 60\n\nclass ToilTracker:\n    def __init__(self):\n        self.entries: List[ToilEntry] = []\n\n    def add(self, entry: ToilEntry):\n        self.entries.append(entry)\n\n    def prioritize_automation(self) -> List[ToilEntry]:\n        \"\"\"Sort by monthly cost — automate most expensive first.\"\"\"\n        manual = [e for e in self.entries if not e.automated]\n        return sorted(manual, key=lambda e: e.monthly_cost_hours, reverse=True)\n\n    def report(self) -> dict:\n        total_hours = sum(e.monthly_cost_hours for e in self.entries)\n        return {\n            'total_toil_hours_per_month': total_hours,\n            'top_automation_target': self.prioritize_automation()[0].task if self.prioritize_automation() else None,\n            'status': 'EMERGENCY' if total_hours > 80 else 'OK',  # 50% of engineer's time\n        }\n"
  example_bad: "# Toil accepted as normal — 'we've always done it this way'\n# Manual tasks performed weekly:\n# 1. SSH into each server, check disk space (30 min)\n# 2. Manually rotate log files (20 min)\n# 3. Copy certificates to new servers (15 min)\n# 4. Run database cleanup query (10 min)\n# 5. Generate weekly report from 3 dashboards (45 min)\n# Total: 2 hours/week, 8 hours/month — but nobody tracks it\n# Engineer spends 80% on toil, 20% on engineering\n# This is the exact opposite of Google's target ratio\n"
  when_applies: "When any manual, repetitive task is performed more than twice — the third time should be spent writing automation instead."
  severity: high
  technologies:
    lang: [general, python]
    platform: [ansible, terraform]
  domains:
    domain: [operations, reliability]
    concern: [maintenance, automation, toil]
  sources:
