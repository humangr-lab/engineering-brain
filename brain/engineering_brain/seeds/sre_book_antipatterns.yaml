- id: CR-SRE-ANTI-009
  text: The "N+0 capacity" antipattern — running at 100% capacity utilization with no headroom. The first failure (server
    crash, traffic spike, dependency slowdown) causes a cascade because there is no spare capacity to absorb the load shift.
  why: 'Google''s cascading failure chapter (Chapter 22) uses capacity planning as the first line of defense. Running at 100%
    utilization means every server is at maximum load. When one server fails, its load shifts to the remaining servers — which
    are already at maximum. They can''t absorb additional load, so they also fail. A system running at 80% utilization can
    absorb a 25% load increase (from losing 1 of 5 servers) without any server exceeding capacity. A system running at 100%
    utilization cannot absorb ANY additional load. Google provisions for N-2 capacity at the failure domain level: the system
    must handle peak traffic even after losing the two largest failure domains (racks, AZs). This typically means operating
    at 50-70% utilization during peak — which seems wasteful until the first failure.

    '
  how_to_do_right: '1. Target steady-state utilization at 50-70% of capacity. The remaining 30-50% is not waste — it is insurance.

    2. Set alarms at 70% utilization. At 70%, you have time to add capacity. At 90%, you don''t.

    3. Load test to determine actual capacity limits, not theoretical maximums. Actual limits are usually 20-30% lower.

    4. Account for traffic growth: if traffic grows 5% per month and you''re at 70% utilization, you have ~6 months before
    capacity is critical.

    5. Autoscaling helps but has limits: it takes minutes to add capacity, and during those minutes, existing servers must
    absorb the load.

    6. Plan capacity for peak + failure: can you handle Black Friday traffic with one AZ down? If not, you''re under-provisioned.

    '
  example_good: "class CapacityMonitor:\n    def __init__(self, total_capacity_qps: int, target_utilization: float = 0.7):\n        self.total_capacity = total_capacity_qps\n        self.target_utilization = target_utilization\n\n    def check_headroom(self, current_qps: int) -> dict:\n        utilization = current_qps / self.total_capacity\n        months_until_critical = None\n        if self.growth_rate_per_month > 0:\n            headroom_qps = self.total_capacity - current_qps\n            months_until_critical = headroom_qps / (current_qps * self.growth_rate_per_month)\n\n        return {\n            'utilization_pct': utilization * 100,\n            'status': 'OK' if utilization < 0.7 else 'WARNING' if utilization < 0.9 else 'CRITICAL',\n            'months_until_critical': months_until_critical,\n            'can_survive_failure': utilization < 0.7,  # 30% headroom absorbs 1-of-3 AZ failure\n        }\n\nmonitor = CapacityMonitor(total_capacity_qps=10000)\nresult = monitor.check_headroom(current_qps=5500)\n# utilization: 55%, status: OK, can_survive_failure: True\n"
  example_bad: "# Running at 100% utilization — no headroom for failures\ntotal_servers = 5\ncurrent_load = 5  # Each server at 100%\n# Server 3 crashes → load redistributes to 4 servers\n# Each server now at 125% → they start failing too\n# Server 2 crashes → load on 3 servers at 167% → cascade\n# System down within minutes of first failure\n# $0 savings from 'efficient' provisioning, hours of downtime\n"
  when_applies: "When provisioning capacity for any production system — target 50-70% utilization to maintain headroom for failures and traffic spikes."
  severity: critical
  technologies:
    lang: [general]
    platform: [aws, azure, gcp, kubernetes]
