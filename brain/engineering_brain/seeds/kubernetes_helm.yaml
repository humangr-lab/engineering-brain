layer: rules
technology: Kubernetes
domain: devops
knowledge:
- id: CR-K8S-HELM-001
  text: Helm charts must follow the standard directory structure with proper Chart.yaml metadata and dependency management.
  why: Non-standard chart structures break 'helm lint', 'helm package', and artifact hub publishing. Missing Chart.yaml fields
    (appVersion, description, maintainers) make charts undiscoverable and unauditable. Poor dependency management leads to
    charts pulling incompatible sub-chart versions, causing mysterious deployment failures. Following the standard ensures
    tooling compatibility and team productivity.
  how_to_do_right: 'Use ''helm create'' to scaffold, then customize. Chart.yaml must have: apiVersion v2, name, version (chart
    version, semver), appVersion (application version), description, type (application/library), maintainers, and dependencies.
    Keep templates in templates/, helpers in _helpers.tpl, tests in templates/tests/. Use .helmignore to exclude .git, CI
    files, and docs from packages.'
  severity: medium
  technologies:
    platform: [kubernetes, helm]
  domains:
    domain: [operations, devops]
  example_good: "# Chart.yaml\napiVersion: v2\nname: api-gateway\nversion: 1.2.3              # Chart version (semver)\nappVersion:\
    \ \"2.5.0\"         # App version (quoted string)\ndescription: \"API Gateway service with rate limiting and auth\"\n\
    type: application\nmaintainers:\n  - name: Platform Team\n    email: platform@example.com\ndependencies:\n  - name: redis\n\
    \    version: \"18.x.x\"\n    repository: https://charts.bitnami.com/bitnami\n    condition: redis.enabled\n\n# Directory\
    \ structure:\n# api-gateway/\n# ├── Chart.yaml\n# ├── Chart.lock\n# ├── values.yaml\n# ├── values.schema.json      # JSON\
    \ Schema for values validation\n# ├── templates/\n# │   ├── _helpers.tpl\n# │   ├── deployment.yaml\n# │   ├── service.yaml\n\
    # │   ├── ingress.yaml\n# │   ├── hpa.yaml\n# │   ├── pdb.yaml\n# │   └── tests/\n# │       └── test-connection.yaml\n\
    # └── .helmignore\n"
  example_bad: '# Chart.yaml — missing critical fields

    apiVersion: v2

    name: my-chart

    version: 1.0.0

    # No appVersion — what version of the app is this?

    # No description — what does this chart do?

    # No maintainers — who do I contact?

    # No dependencies — sub-charts pulled manually

    '
  when_applies: Projects using Kubernetes-orchestrated deployments or Helm chart deployments
  when_not_applies: local development only, throwaway experiments. projects not using Kubernetes or Helm
  sources: ["https://helm.sh/docs/topics/charts/"]
- id: CR-K8S-HELM-002
  text: Define all configurable values in values.yaml with sensible defaults — never hardcode values in templates.
  why: Hardcoded values in templates cannot be overridden per environment — you end up with separate charts for staging and
    production, or worse, manual edits to templates. values.yaml is the single configuration surface that users interact with.
    Sensible defaults mean the chart works out of the box for development while remaining customizable for production. Missing
    defaults force users to discover required values through trial and error.
  how_to_do_right: 'Document every value with comments in values.yaml. Group values logically (replicaCount, image, resources,
    service, ingress, autoscaling). Provide production-ready defaults for resource requests/limits. Use ''false'' defaults
    for optional features (ingress.enabled: false). Never require environment-specific values in defaults — use null/empty
    and document as required. Validate with values.schema.json.'
  severity: high
  technologies:
    platform: [kubernetes, helm]
  domains:
    domain: [operations, devops]
  example_good: "# values.yaml — well-structured with defaults\nreplicaCount: 2\n\nimage:\n  repository: registry.example.com/api\n\
    \  tag: \"\"                   # Defaults to Chart.appVersion\n  pullPolicy: IfNotPresent\n\nresources:\n  requests:\n\
    \    cpu: 250m\n    memory: 256Mi\n  limits:\n    cpu: 1000m\n    memory: 512Mi\n\nservice:\n  type: ClusterIP\n  port:\
    \ 80\n\ningress:\n  enabled: false            # Optional, disabled by default\n  className: nginx\n  hosts:\n    - host:\
    \ chart-example.local\n      paths:\n        - path: /\n          pathType: Prefix\n  tls: []\n\nautoscaling:\n  enabled:\
    \ false\n  minReplicas: 2\n  maxReplicas: 10\n  targetCPUUtilization: 70\n\npodDisruptionBudget:\n  enabled: true\n  maxUnavailable:\
    \ 1\n"
  example_bad: '# Hardcoded values in template

    # deployment.yaml:

    # replicas: 3                          # Can''t override

    # image: myapp:v1.2.3                  # Can''t change image

    # resources:

    #   limits:

    #     cpu: 2                            # Same for all environments

    #     memory: 4Gi


    # Or: values.yaml without defaults

    # image:

    #   repository:      # Required but no default — fails on first install

    #   tag:             # Required but no documentation

    '
  when_applies: Projects using Kubernetes-orchestrated deployments or Helm chart deployments
  when_not_applies: local development only, throwaway experiments. projects not using Kubernetes or Helm
  sources: ["https://helm.sh/docs/chart_best_practices/values/"]
- id: CR-K8S-HELM-003
  text: Use named templates in _helpers.tpl for reusable logic — use 'include' with 'nindent', never 'template'.
  why: Duplicating label selectors, annotations, and name patterns across templates leads to inconsistencies and maintenance
    burden — a label change in one template but not another breaks Service-to-Deployment binding. Named templates (define/include)
    centralize this logic. The 'template' function cannot be piped (no nindent), while 'include' returns a string that can
    be piped through nindent for proper YAML indentation.
  how_to_do_right: 'Define standard helpers: chart name, fullname, labels, selectorLabels, serviceAccountName, image. Use
    ''{{ include "mychart.fullname" . }}'' not ''{{ template "mychart.fullname" . }}''. Always use ''| nindent N'' for proper
    indentation in YAML. Use ''toYaml'' for values that are already YAML objects (resources, nodeSelector). Test with ''helm
    template'' to verify output.'
  severity: medium
  technologies:
    platform: [kubernetes, helm]
  domains:
    domain: [operations, devops]
  example_good: "# _helpers.tpl\n{{- define \"mychart.name\" -}}\n{{- default .Chart.Name .Values.nameOverride | trunc 63\
    \ | trimSuffix \"-\" }}\n{{- end }}\n\n{{- define \"mychart.fullname\" -}}\n{{- if .Values.fullnameOverride }}\n{{- .Values.fullnameOverride\
    \ | trunc 63 | trimSuffix \"-\" }}\n{{- else }}\n{{- $name := default .Chart.Name .Values.nameOverride }}\n{{- printf\
    \ \"%s-%s\" .Release.Name $name | trunc 63 | trimSuffix \"-\" }}\n{{- end }}\n{{- end }}\n\n{{- define \"mychart.labels\"\
    \ -}}\napp.kubernetes.io/name: {{ include \"mychart.name\" . }}\napp.kubernetes.io/instance: {{ .Release.Name }}\napp.kubernetes.io/version:\
    \ {{ .Chart.AppVersion | quote }}\napp.kubernetes.io/managed-by: {{ .Release.Service }}\nhelm.sh/chart: {{ printf \"%s-%s\"\
    \ .Chart.Name .Chart.Version | replace \"+\" \"_\" }}\n{{- end }}\n\n# deployment.yaml — using include with nindent\n\
    metadata:\n  labels:\n    {{- include \"mychart.labels\" . | nindent 4 }}\n  # resources from values\n  resources:\n \
    \   {{- toYaml .Values.resources | nindent 10 }}\n"
  example_bad: "# Using 'template' instead of 'include' — can't pipe/nindent\nmetadata:\n  labels:\n    {{ template \"mychart.labels\"\
    \ . }}\n    # Indentation is wrong — template output starts at column 0\n\n# Duplicated labels in every template\n# deployment.yaml:\
    \ app: myapp, version: v1\n# service.yaml: app: myapp  # forgot version — selector mismatch!\n"
  when_applies: Projects using Kubernetes-orchestrated deployments or Helm chart deployments
  when_not_applies: local development only, throwaway experiments. projects not using Kubernetes or Helm
  sources: ["https://helm.sh/docs/chart_template_guide/named_templates/"]
- id: CR-K8S-HELM-004
  text: Use 'with' blocks for nested values and 'range' for lists — always handle nil/missing values.
  why: Accessing nested values without checking existence causes nil pointer errors that only appear when specific values
    are omitted. The 'with' block changes scope and provides implicit nil checking. The 'range' block iterates lists and maps.
    Without proper nil handling, a chart that works with all values specified fails cryptically when optional sections are
    omitted — common when users provide minimal value overrides.
  how_to_do_right: Use 'if' for conditional blocks that should be entirely omitted when empty. Use 'with' for accessing nested
    values (changes . scope, nil-safe). Use 'range' for iterating lists (with $root := . for accessing global scope). Use
    'default' for fallback values. Use 'required' for values that must be provided. Test with minimal values.yaml to catch
    nil errors.
  severity: medium
  technologies:
    platform: [kubernetes, helm]
  domains:
    domain: [operations, devops]
  example_good: "# Conditional ingress with proper nil handling\n{{- if .Values.ingress.enabled -}}\napiVersion: networking.k8s.io/v1\n\
    kind: Ingress\nmetadata:\n  name: {{ include \"mychart.fullname\" . }}\n  {{- with .Values.ingress.annotations }}\n  annotations:\n\
    \    {{- toYaml . | nindent 4 }}\n  {{- end }}\nspec:\n  {{- with .Values.ingress.className }}\n  ingressClassName: {{\
    \ . }}\n  {{- end }}\n  {{- if .Values.ingress.tls }}\n  tls:\n    {{- range .Values.ingress.tls }}\n    - hosts:\n  \
    \      {{- range .hosts }}\n        - {{ . | quote }}\n        {{- end }}\n      secretName: {{ .secretName }}\n    {{-\
    \ end }}\n  {{- end }}\n  rules:\n    {{- range .Values.ingress.hosts }}\n    - host: {{ .host | quote }}\n      http:\n\
    \        paths:\n          {{- range .paths }}\n          - path: {{ .path }}\n            pathType: {{ .pathType | default\
    \ \"Prefix\" }}\n            backend:\n              service:\n                name: {{ include \"mychart.fullname\" $\
    \ }}\n                port:\n                  number: {{ $.Values.service.port }}\n          {{- end }}\n    {{- end\
    \ }}\n{{- end }}\n"
  example_bad: "# No nil checking — fails when ingress values are omitted\napiVersion: networking.k8s.io/v1\nkind: Ingress\n\
    spec:\n  ingressClassName: {{ .Values.ingress.className }}\n  # Error: nil pointer when ingress.className is not set\n\
    \  rules:\n    - host: {{ .Values.ingress.host }}\n      # Error: nil pointer when ingress.host is not set\n"
  when_applies: Projects using Kubernetes-orchestrated deployments or Helm chart deployments
  when_not_applies: local development only, throwaway experiments. projects not using Kubernetes or Helm
  sources: ["https://helm.sh/docs/chart_template_guide/control_structures/"]
- id: CR-K8S-HELM-005
  text: Provide a values.schema.json for input validation and use 'required' in templates for mandatory values.
  why: Without validation, users discover invalid values only after deployment failure — wrong types (string where integer
    expected), missing required values (blank image repository), invalid combinations (HPA enabled without resource limits).
    JSON Schema validates values BEFORE template rendering, giving clear error messages. The 'required' template function
    catches values that must be user-provided (not defaultable).
  how_to_do_right: Create values.schema.json with JSON Schema for all user-facing values. Define types, required fields, enum
    values, patterns, and min/max. Use 'helm lint' and 'helm install --dry-run' to test validation. In templates, use '{{
    required "image.repository is required" .Values.image.repository }}' for values that have no sensible default. Use values.schema.json
    in CI to validate per-environment value files.
  severity: medium
  technologies:
    platform: [kubernetes, helm]
  domains:
    domain: [operations, devops]
  example_good: "# values.schema.json\n{\n  \"$schema\": \"https://json-schema.org/draft/2020-12/schema\",\n  \"type\": \"\
    object\",\n  \"required\": [\"image\"],\n  \"properties\": {\n    \"replicaCount\": {\n      \"type\": \"integer\",\n\
    \      \"minimum\": 1,\n      \"maximum\": 50\n    },\n    \"image\": {\n      \"type\": \"object\",\n      \"required\"\
    : [\"repository\"],\n      \"properties\": {\n        \"repository\": {\n          \"type\": \"string\",\n          \"\
    pattern\": \"^[a-z0-9./-]+$\"\n        },\n        \"tag\": {\n          \"type\": \"string\"\n        },\n        \"\
    pullPolicy\": {\n          \"type\": \"string\",\n          \"enum\": [\"Always\", \"IfNotPresent\", \"Never\"]\n    \
    \    }\n      }\n    },\n    \"resources\": {\n      \"type\": \"object\",\n      \"properties\": {\n        \"requests\"\
    : {\n          \"type\": \"object\",\n          \"properties\": {\n            \"cpu\": {\"type\": \"string\"},\n    \
    \        \"memory\": {\"type\": \"string\"}\n          }\n        }\n      }\n    }\n  }\n}\n"
  example_bad: '# No schema validation

    # User provides: replicaCount: "three"

    # Template renders: replicas: three

    # Kubernetes rejects YAML — error message mentions line 15 of rendered template

    # User has no idea what went wrong

    '
  when_applies: Projects using Kubernetes-orchestrated deployments or Helm chart deployments
  when_not_applies: local development only, throwaway experiments. projects not using Kubernetes or Helm
  sources: ["https://helm.sh/docs/topics/charts/#schema-files"]
- id: CR-K8S-HELM-006
  text: Use Helm hooks for pre/post-install tasks (migrations, health checks) with proper weights and deletion policies.
  why: 'Running database migrations as part of the main Deployment is dangerous — if the migration fails, the Deployment restarts
    the migration pod indefinitely, and rolling back the Deployment doesn''t roll back the migration. Helm hooks run as separate
    Jobs with clear lifecycle: pre-install (before any resources), post-install (after resources exist), pre-upgrade (before
    updates). They have weights for ordering and deletion policies for cleanup.'
  how_to_do_right: Use pre-upgrade hooks for database migrations (run before new code deploys). Set hook-weight for ordering
    (lower runs first). Set hook-delete-policy to before-hook-creation (delete previous hook job before creating new one).
    Set Job backoffLimit=0 for non-idempotent operations (migrations). Use post-install hooks for health verification. Always
    test hook failure scenarios.
  severity: high
  technologies:
    platform: [kubernetes, helm]
  domains:
    domain: [operations, devops]
  example_good: "# Database migration as pre-upgrade hook\napiVersion: batch/v1\nkind: Job\nmetadata:\n  name: {{ include\
    \ \"mychart.fullname\" . }}-migrate\n  annotations:\n    \"helm.sh/hook\": pre-upgrade,pre-install\n    \"helm.sh/hook-weight\"\
    : \"-5\"           # Run before other hooks\n    \"helm.sh/hook-delete-policy\": before-hook-creation,hook-succeeded\n\
    spec:\n  backoffLimit: 0                          # Don't retry migrations\n  activeDeadlineSeconds: 300             \
    \  # 5 minute timeout\n  ttlSecondsAfterFinished: 3600\n  template:\n    spec:\n      restartPolicy: Never\n      containers:\n\
    \        - name: migrate\n          image: \"{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion\
    \ }}\"\n          command: ['python', 'manage.py', 'migrate', '--noinput']\n          env:\n            - name: DATABASE_URL\n\
    \              valueFrom:\n                secretKeyRef:\n                  name: db-credentials\n                  key:\
    \ url\n"
  example_bad: "# Migration in init container — retries on failure\ninitContainers:\n  - name: migrate\n    command: ['python',\
    \ 'manage.py', 'migrate']\n    # If migration fails:\n    # - Init container retries (default backoff)\n    # - Could\
    \ re-apply partial migration\n    # - Blocks deployment indefinitely\n    # - Rolling back Deployment doesn't rollback\
    \ migration\n"
  when_applies: Projects using Kubernetes-orchestrated deployments or Helm chart deployments
  when_not_applies: local development only, throwaway experiments. projects not using Kubernetes or Helm
  sources: ["https://helm.sh/docs/topics/charts_hooks/"]
- id: CR-K8S-HELM-007
  text: Validate charts with helm lint, helm template, kubeconform, and helm test in CI.
  why: Helm template rendering errors only appear at install time — a missing closing brace, wrong indentation, or invalid
    YAML causes deployment failure in production. helm lint catches syntax errors. helm template renders without deploying
    (catches template logic errors). kubeconform validates rendered YAML against Kubernetes schemas (catches invalid resource
    specs). helm test verifies the deployed release works.
  how_to_do_right: 'CI pipeline: (1) helm lint --strict (syntax + best practices), (2) helm template + kubeconform (valid
    K8s resources), (3) helm install on kind/k3s + helm test (end-to-end). Test with multiple value files (minimal, staging,
    production). Use chart-testing (ct) for PR-based chart testing. Pin kubeconform schemas to your target K8s version.'
  severity: high
  technologies:
    library: [kubeconform]
    platform: [kubernetes, helm]
  domains:
    domain: [operations, devops, testing]
  example_good: "# CI pipeline for Helm chart validation\n# Step 1: Lint\n# helm lint ./charts/api --strict\n\n# Step 2: Template\
    \ + validate\n# helm template test ./charts/api -f values-production.yaml | \\\n#   kubeconform -strict -kubernetes-version\
    \ 1.29.0\n\n# Step 3: Install and test on ephemeral cluster\n# kind create cluster\n# helm install test ./charts/api -f\
    \ values-test.yaml --wait\n# helm test test\n\n# Helm test template\napiVersion: v1\nkind: Pod\nmetadata:\n  name: {{\
    \ include \"mychart.fullname\" . }}-test\n  annotations:\n    \"helm.sh/hook\": test\n    \"helm.sh/hook-delete-policy\"\
    : before-hook-creation,hook-succeeded\nspec:\n  restartPolicy: Never\n  containers:\n    - name: test\n      image: busybox:1.36\n\
    \      command: ['sh', '-c']\n      args:\n        - |\n          wget -qO- http://{{ include \"mychart.fullname\" . }}:{{\
    \ .Values.service.port }}/healthz\n          if [ $? -ne 0 ]; then exit 1; fi\n"
  example_bad: '# No CI validation — chart tested only by deploying to staging

    # Missing closing brace discovered in production deploy

    # Invalid resource spec discovered after 20-minute rollout

    # No automated tests — manual curl after every deploy

    '
  when_applies: Projects using Kubernetes-orchestrated deployments, Helm chart deployments, or kubeconform
  when_not_applies: local development only, throwaway experiments
  sources: ["https://helm.sh/docs/helm/helm_lint/", "https://helm.sh/docs/helm/helm_test/"]
- id: CR-K8S-HELM-008
  text: Always use --atomic for production upgrades and test rollback procedures regularly.
  why: Without --atomic, a failed upgrade leaves the release in a broken state — some resources updated, some not, the release
    marked as FAILED. The next upgrade may fail because Helm cannot reconcile the partial state. --atomic automatically rolls
    back on failure, keeping the release in the last-known-good state. Without tested rollback procedures, your only recovery
    option during an incident is forward-fixing under pressure.
  how_to_do_right: 'Use ''helm upgrade --atomic --timeout 10m'' for all production upgrades. This rolls back automatically
    if any resource fails to become ready within the timeout. Set --timeout based on your slowest container startup time.
    Test rollback monthly: ''helm rollback <release> <revision>''. Keep release history: ''helm history <release>''. Use ''helm
    diff upgrade'' before applying to see what will change.'
  severity: high
  technologies:
    platform: [kubernetes, helm]
  domains:
    domain: [operations, devops, reliability]
  example_good: "# Production upgrade with safety\n# 1. Preview changes\n# helm diff upgrade api ./charts/api -f values-production.yaml\n\
    \n# 2. Upgrade with atomic rollback\n# helm upgrade api ./charts/api \\\n#   -f values-production.yaml \\\n#   --atomic\
    \ \\\n#   --timeout 10m \\\n#   --wait \\\n#   --cleanup-on-fail\n\n# 3. Verify\n# helm status api\n# helm test api\n\n\
    # Rollback if needed\n# helm history api\n# helm rollback api 5    # Rollback to revision 5\n#\n# Revision history stored,\
    \ atomic prevents partial upgrades\napiVersion: v1\nkind: ConfigMap\nmetadata:\n  name: release-notes\n"
  example_bad: '# Upgrade without safety net

    # helm upgrade api ./charts/api -f values.yaml

    # No --atomic: partial failure leaves broken state

    # No --timeout: waits forever if pod doesn''t start

    # No --wait: returns before pods are ready

    # Next upgrade fails: "release in FAILED state"

    '
  when_applies: Projects using Kubernetes-orchestrated deployments or Helm chart deployments
  when_not_applies: local development only, throwaway experiments. projects not using Kubernetes or Helm
  sources: ["https://helm.sh/docs/helm/helm_upgrade/"]
- id: CR-K8S-HELM-009
  text: Use Helm for reusable application packaging and Kustomize for environment-specific overlays — or combine both.
  why: Helm excels at parameterized, reusable charts (install Redis with values X). Kustomize excels at environment-specific
    patches (add labels, change replicas for production). Using Helm for environment patches leads to complex values files.
    Using Kustomize for reusable packages leads to duplicated base manifests. The hybrid approach uses Helm for the chart
    and Kustomize for environment overlays.
  how_to_do_right: 'Use Helm for: third-party software (Redis, PostgreSQL, monitoring), reusable internal charts (microservice
    template), charts published to a registry. Use Kustomize for: environment-specific patches (namespace, labels, resource
    limits), simple internal manifests, GitOps with ArgoCD/Flux. Combine: ''helm template'' output as Kustomize base, or ArgoCD
    Helm + Kustomize integration.'
  severity: medium
  technologies:
    platform: [kubernetes, helm, kustomize]
  domains:
    domain: [operations, devops]
  example_good: '# Hybrid approach: Helm chart + Kustomize overlays

    # base/kustomization.yaml

    # apiVersion: kustomize.config.k8s.io/v1beta1

    # kind: Kustomization

    # helmCharts:

    #   - name: api

    #     repo: https://charts.example.com

    #     version: 1.2.3

    #     valuesFile: values-base.yaml


    # overlays/production/kustomization.yaml

    # apiVersion: kustomize.config.k8s.io/v1beta1

    # kind: Kustomization

    # resources:

    #   - ../../base

    # patches:

    #   - target:

    #       kind: Deployment

    #       name: api

    #     patch: |

    #       - op: replace

    #         path: /spec/replicas

    #         value: 5

    # namespace: production

    # commonLabels:

    #   environment: production

    apiVersion: kustomize.config.k8s.io/v1beta1

    kind: Kustomization

    '
  example_bad: '# Helm-only: one values file per environment

    # values-dev.yaml, values-staging.yaml, values-production.yaml

    # 90% identical, drift between environments inevitable

    #

    # Kustomize-only: copy-paste manifests for each service

    # base/api-a/deployment.yaml — duplicated for every microservice

    # base/api-b/deployment.yaml — same template, different name

    '
  when_applies: Projects using Kubernetes-orchestrated deployments, Helm chart deployments, or Kustomize
  when_not_applies: local development only, throwaway experiments
  sources: ["https://helm.sh/docs/helm/helm_install/", "https://kubernetes.io/docs/concepts/extend-kubernetes/compute-storage-net/"]
- id: CR-K8S-HELM-010
  text: Store Helm charts in OCI-compatible registries alongside container images — not separate chart repositories.
  why: Traditional Helm chart repositories (ChartMuseum, GitHub Pages) require separate infrastructure, authentication, and
    backup. OCI registries (ECR, ACR, GCR, Harbor, GHCR) already host your container images — storing charts alongside images
    in the same registry simplifies infrastructure, uses the same authentication, and enables co-located versioning (app image
    v1.2.3 and chart v1.2.3 in the same registry).
  how_to_do_right: Use 'helm push' to publish charts to OCI registry. Use 'helm pull oci://' to download. Reference OCI charts
    in Chart.yaml dependencies. Configure registry authentication with 'helm registry login'. Use CI/CD to automatically push
    charts on release. Tag charts with the same version as the application for traceability.
  severity: medium
  technologies:
    platform: [kubernetes, helm, oci]
  domains:
    domain: [operations, devops]
  example_good: "# Push chart to OCI registry\n# helm package ./charts/api\n# helm push api-1.2.3.tgz oci://registry.example.com/charts\n\
    \n# Pull chart from OCI registry\n# helm pull oci://registry.example.com/charts/api --version 1.2.3\n\n# Install from\
    \ OCI registry\n# helm install api oci://registry.example.com/charts/api --version 1.2.3\n\n# Chart.yaml dependency from\
    \ OCI\ndependencies:\n  - name: redis\n    version: \"18.5.0\"\n    repository: oci://registry.example.com/charts\n"
  example_bad: "# Separate ChartMuseum deployment\n# - Extra infrastructure to maintain\n# - Separate authentication from\
    \ image registry\n# - Separate backup strategy\n# - Chart version != image version (drift)\ndependencies:\n  - name: redis\n\
    \    repository: https://chartmuseum.internal.example.com\n    # ChartMuseum goes down = can't deploy\n"
  when_applies: Projects using Kubernetes-orchestrated deployments, Helm chart deployments, or OCI
  when_not_applies: local development only, throwaway experiments
  sources: ["https://helm.sh/docs/topics/registries/"]
- id: CR-K8S-HELM-011
  text: Use separate values files per environment and validate them in CI — never edit production values manually.
  why: 'A single values.yaml for all environments forces the chart to be identical everywhere, or requires complex if/else
    in templates. Separate values files (values-staging.yaml, values-production.yaml) make differences explicit and auditable.
    Manual editing of production values bypasses review processes and is the #1 cause of production misconfigurations. CI
    validation catches errors before they reach production.'
  how_to_do_right: 'Create: values.yaml (defaults), values-staging.yaml (overrides for staging), values-production.yaml (overrides
    for production). In CI: validate all value files with ''helm lint -f values-<env>.yaml'' and ''helm template -f values-<env>.yaml
    | kubeconform''. Store values files in git with pull request reviews. Use sealed-secrets or external-secrets for sensitive
    values — never commit passwords.'
  severity: high
  technologies:
    platform: [kubernetes, helm]
  domains:
    domain: [operations, devops]
  example_good: "# values.yaml (defaults — used for development)\nreplicaCount: 1\nresources:\n  requests:\n    cpu: 100m\n\
    \    memory: 128Mi\n\n# values-staging.yaml (staging overrides)\nreplicaCount: 2\nresources:\n  requests:\n    cpu: 250m\n\
    \    memory: 256Mi\ningress:\n  enabled: true\n  hosts:\n    - host: api.staging.example.com\n\n# values-production.yaml\
    \ (production overrides)\nreplicaCount: 5\nresources:\n  requests:\n    cpu: 500m\n    memory: 512Mi\n  limits:\n    cpu:\
    \ 2000m\n    memory: 1Gi\ningress:\n  enabled: true\n  hosts:\n    - host: api.example.com\n  tls:\n    - secretName:\
    \ api-tls\n      hosts:\n        - api.example.com\nautoscaling:\n  enabled: true\n  minReplicas: 5\n  maxReplicas: 20\n\
    \n# CI: helm template test ./charts/api -f values-production.yaml | kubeconform\n"
  example_bad: '# One values.yaml for all environments

    # "Just change replicaCount before deploying to production"

    # Forgot to change it back after production deploy

    # Development now runs with 20 replicas

    '
  when_applies: Projects using Kubernetes-orchestrated deployments or Helm chart deployments
  when_not_applies: local development only, throwaway experiments. projects not using Kubernetes or Helm
  sources: ["https://helm.sh/docs/chart_best_practices/values/#consider-how-users-will-use-your-values"]
- id: CR-K8S-HELM-012
  text: Pin dependency versions in Chart.yaml and commit Chart.lock for reproducible builds.
  why: 'Unpinned dependencies (version: ''*'' or ''>=1.0.0'') resolve to the latest version at build time — a new sub-chart
    release can change your deployment behavior without any change to your chart''s code. Chart.lock pins exact resolved versions,
    ensuring every installation uses identical sub-chart versions. Without it, ''it works on my machine'' because you built
    with redis-18.5.0 but CI builds with redis-18.6.0.'
  how_to_do_right: 'Pin major version: ''version: 18.x.x'' (allows patches). Run ''helm dependency update'' to generate Chart.lock.
    Commit both Chart.yaml and Chart.lock to git. Use ''helm dependency build'' in CI (uses lock file). Update dependencies
    explicitly with ''helm dependency update'' and review changes. Use ''condition'' to make dependencies optional.'
  severity: medium
  technologies:
    platform: [kubernetes, helm]
  domains:
    domain: [operations, devops]
  example_good: "# Chart.yaml — pinned major version\ndependencies:\n  - name: redis\n    version: \"18.x.x\"         # Allows\
    \ 18.5.0 -> 18.6.0 (patches)\n    repository: oci://registry.example.com/charts\n    condition: redis.enabled\n  - name:\
    \ postgresql\n    version: \"13.x.x\"\n    repository: oci://registry.example.com/charts\n    condition: postgresql.enabled\n\
    \n# Chart.lock — exact versions (committed to git)\n# dependencies:\n#   - name: redis\n#     repository: oci://registry.example.com/charts\n\
    #     version: 18.5.3\n#   - name: postgresql\n#     repository: oci://registry.example.com/charts\n#     version: 13.2.1\n\
    # digest: sha256:abc123...\n# generated: \"2026-02-17T10:00:00Z\"\n"
  example_bad: "dependencies:\n  - name: redis\n    version: \"*\"              # Any version — unpredictable\n    repository:\
    \ https://charts.bitnami.com/bitnami\n# No Chart.lock committed\n# Today: redis 18.5.0, tomorrow: redis 19.0.0 (breaking\
    \ changes)\n"
  when_applies: Projects using Kubernetes-orchestrated deployments or Helm chart deployments
  when_not_applies: local development only, throwaway experiments. projects not using Kubernetes or Helm
  sources: ["https://helm.sh/docs/topics/charts/#chart-dependencies"]
- id: CR-K8S-HELM-013
  text: Use library charts for shared templates across multiple application charts — avoid copy-paste.
  why: 'When multiple microservices use the same Helm chart patterns (same Deployment structure, same monitoring setup, same
    security contexts), copy-pasting templates creates maintenance burden — a security fix must be applied to 20 charts individually.
    Library charts (type: library) provide reusable named templates that application charts can import. Change the library
    once, update all applications.'
  how_to_do_right: 'Create a library chart (type: library in Chart.yaml) with shared templates: standard Deployment, Service,
    Ingress, HPA, PDB, ServiceAccount, NetworkPolicy. Application charts depend on the library and use ''{{ include "library.deployment"
    . }}''. Version the library chart and pin in applications. Test the library with unit tests (helm-unittest). Document
    available templates.'
  severity: medium
  technologies:
    platform: [kubernetes, helm]
  domains:
    domain: [operations, devops, architecture]
  example_good: "# Library chart — Chart.yaml\napiVersion: v2\nname: microservice-library\nversion: 2.0.0\ntype: library \
    \    # Cannot be installed directly\n\n# Library template — templates/_deployment.tpl\n# {{- define \"library.deployment\"\
    \ -}}\n# apiVersion: apps/v1\n# kind: Deployment\n# metadata:\n#   name: {{ include \"library.fullname\" . }}\n#   labels:\
    \ {{ include \"library.labels\" . | nindent 4 }}\n# spec:\n#   replicas: {{ .Values.replicaCount }}\n#   template:\n#\
    \     spec:\n#       securityContext:\n#         runAsNonRoot: true\n#       containers:\n#         - name: {{ .Chart.Name\
    \ }}\n#           securityContext:\n#             readOnlyRootFilesystem: true\n#             capabilities:\n#       \
    \        drop: [\"ALL\"]\n# {{- end }}\n\n# Application chart — depends on library\n# Chart.yaml:\n# dependencies:\n#\
    \   - name: microservice-library\n#     version: \"2.x.x\"\n#     repository: oci://registry.example.com/charts\n#\n#\
    \ templates/deployment.yaml:\n# {{ include \"library.deployment\" . }}\napiVersion: v2\nname: api-gateway\ndependencies:\n\
    \  - name: microservice-library\n    version: \"2.x.x\"\n    repository: oci://registry.example.com/charts\n"
  example_bad: '# Copy-pasted Deployment template in 20 charts

    # Security fix needed: add seccompProfile to all pods

    # Must update 20 charts individually

    # 3 charts missed — discovered in security audit 2 months later

    '
  when_applies: Projects using Kubernetes-orchestrated deployments or Helm chart deployments
  when_not_applies: local development only, throwaway experiments. projects not using Kubernetes or Helm
  sources: ["https://helm.sh/docs/topics/library_charts/"]
- id: CR-K8S-HELM-014
  text: Sign Helm charts with provenance files and verify signatures before installation.
  why: 'Without chart signing, a compromised chart repository or CI pipeline can inject malicious templates — the chart looks
    identical but contains a backdoor (privileged container, exfiltration sidecar). Helm provenance files (Chart.yaml.prov)
    use PGP signatures to verify: the chart was published by a trusted source, the chart contents have not been tampered with,
    and the chart version matches the signature.'
  how_to_do_right: Sign charts during CI/CD with 'helm package --sign --key <name> --keyring <keyring>'. Store the .prov file
    alongside the chart. Verify on install with 'helm install --verify'. For OCI registries, use cosign to sign chart artifacts.
    Distribute public keys to all clusters. Enforce signature verification via admission webhook (Kyverno or OPA).
  severity: high
  technologies:
    library: [cosign]
    platform: [kubernetes, helm]
  domains:
    domain: [operations, devops, security]
  example_good: "# Sign chart during CI\n# helm package ./charts/api --sign \\\n#   --key \"Platform Team\" \\\n#   --keyring\
    \ ~/.gnupg/pubring.gpg\n\n# Verify on install\n# helm install api ./api-1.2.3.tgz --verify \\\n#   --keyring /etc/helm/pubring.gpg\n\
    \n# OCI + cosign\n# helm push api-1.2.3.tgz oci://registry.example.com/charts\n# cosign sign oci://registry.example.com/charts/api:1.2.3\n\
    # cosign verify oci://registry.example.com/charts/api:1.2.3\n\n# Kyverno: Require chart signature\n# apiVersion: kyverno.io/v1\n\
    # kind: ClusterPolicy\n# spec:\n#   rules:\n#     - name: verify-helm-chart\n#       ...\napiVersion: v1\nkind: ConfigMap\n\
    metadata:\n  name: helm-signing-policy\n"
  example_bad: '# No chart signing — trusting chart repository blindly

    # helm install api https://charts.unknown-source.com/api

    # Chart could contain: privileged pods, crypto miners,

    # data exfiltration sidecars, RBAC escalation

    '
  when_applies: Projects using Kubernetes-orchestrated deployments, Helm chart deployments, or cosign
  when_not_applies: local development only, throwaway experiments
  sources: ["https://helm.sh/docs/topics/provenance/"]
