      lang: [python]
    domains:
      domain: [ai_engineering, ai_engineering]
      concern: [pattern, best_practice]
    when_applies: "Apply human-in-the-loop (HITL) whenever the AI makes decisions with significant real-world
consequences: medical diagnoses, financial approvals, content moderation escalations, legal
document review, ."

