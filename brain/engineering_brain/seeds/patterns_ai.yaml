  # === Fallback Patterns ===
  - id: PAT-AI-FALLBACK-CHAIN
    name: "Fallback Chain Pattern"
    category: ai_engineering
    intent: "Cascade through progressively cheaper or more reliable models/methods when the primary model fails, is too slow, or returns low-confidence results."
    when_to_use: |
      Use a fallback chain in any production system that depends on external LLM APIs, which
      are inherently unreliable (rate limits, outages, latency spikes). The chain defines a
      priority-ordered list of providers: for example, Claude Opus -> GPT-4o -> Claude Haiku ->
      local Llama 3 -> cached response -> static fallback. Each tier has acceptance criteria
      (confidence threshold, latency budget, format validation). This pattern is essential for
      maintaining SLAs: if your primary provider has 99.5% uptime and your fallback also has
      99.5%, the combined system achieves 99.9975% availability. Beyond reliability, fallback
      chains enable cost optimization (route easy queries to cheap models, escalate hard ones)
      and latency optimization (fast model first, slow model only if fast model's confidence
      is low). The pattern is also the right approach for graceful degradation during model
      migrations. In 2025-2026, multi-provider routing is standard in frameworks like LiteLLM,
      OpenRouter, and custom gateway layers.
    when_not_to_use: |
      Single-provider, non-critical internal tools where downtime is acceptable. Tasks where
      the fallback model would produce dangerously wrong answers (better to fail explicitly
      than serve a bad result from an inferior model). When all models in the chain require
      the same API key and share the same failure mode.
    languages: [Python]
    example_good: |
      import time
      import logging
      from dataclasses import dataclass

      logger = logging.getLogger(__name__)

      @dataclass
      class ModelConfig:
          name: str
          call_fn: callable
          timeout_s: float = 30.0
          min_confidence: float = 0.0

      class FallbackChain:
          def __init__(self, models: list[ModelConfig]):
              self.models = models

          def generate(self, prompt: str) -> dict:
              errors = []
              for model in self.models:
                  try:
                      start = time.monotonic()
                      result = model.call_fn(prompt, timeout=model.timeout_s)
                      elapsed = time.monotonic() - start
                      if result.get("confidence", 1.0) < model.min_confidence:
                          logger.warning("%s low confidence (%.2f), trying next", model.name, result["confidence"])
                          continue
                      logger.info("Served by %s in %.1fs", model.name, elapsed)
                      return {**result, "model": model.name, "latency_s": elapsed}
                  except Exception as e:
                      errors.append({"model": model.name, "error": str(e)})
                      logger.warning("%s failed: %s, trying next", model.name, e)
              # All models failed
              logger.error("All models failed: %s", errors)
              return {"error": "All models in fallback chain failed", "details": errors}

      chain = FallbackChain([
          ModelConfig("claude-opus", call_claude, timeout_s=45, min_confidence=0.7),
          ModelConfig("gpt-4o", call_openai, timeout_s=30, min_confidence=0.5),
          ModelConfig("claude-haiku", call_claude_haiku, timeout_s=10),
          ModelConfig("cached-response", lookup_cache, timeout_s=1),
      ])
    example_bad: |
      from openai import OpenAI

      client = OpenAI()

      def generate(prompt: str) -> str:
          # BAD: Single provider, no fallback, no timeout, no retry
          response = client.chat.completions.create(
              model="gpt-4o",
              messages=[{"role": "user", "content": prompt}],
          )
          return response.choices[0].message.content
          # OpenAI has an outage -> your entire application is down
          # Rate limited at 3am -> overnight batch job fails completely
          # Model returns garbage -> no quality check, served to user
          # No latency tracking -> cannot detect degradation
          # "We're sorry, our AI is temporarily unavailable" is your SLA
    text: "Fallback Chain Pattern -- Cascade through progressively cheaper or more reliable models/methods when the primary model fails, is too slow, or returns low-confidence results."
    why: "Cascade through progressively cheaper or more reliable models/methods when the primary model fails, is too slow, or returns low-confidence results."
    how_to_do_right: |
      1. Identify where fallback chain pattern applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
    severity: high
    technologies:
      lang: [python]
    domains:
      domain: [ai_engineering, ai_engineering]
      concern: [pattern, best_practice]
    when_applies: "Use a fallback chain in any production system that depends on external LLM APIs, which
are inherently unreliable (rate limits, outages, latency spikes)."

    related_principles: [P-AI-FALLBACK, P-ERR-FAIL-FAST, P-ERR-ACTIONABLE]
