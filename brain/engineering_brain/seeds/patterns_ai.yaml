    technologies:
      lang: [python]
    domains:
      domain: [ai_engineering, ai_engineering]
      concern: [pattern, best_practice]
    when_applies: "Use A/B testing when deciding between model versions (GPT-4o vs Claude Opus), prompt
strategies (zero-shot vs few-shot vs CoT), RAG configurations (chunk sizes, top-k values,
reranker models), or any ."

