knowledge:
  # === RAG & Retrieval Patterns ===
  - id: PAT-LLM-RAG
    name: "Retrieval-Augmented Generation (RAG) Pattern"
    category: ai_engineering
    intent: "Ground LLM responses in retrieved documents to reduce hallucination and provide verifiable answers."
    when_to_use: |
      Use RAG whenever the LLM must answer questions that depend on private, domain-specific,
      or frequently updated knowledge that was not in the model's training data. This includes
      enterprise knowledge bases, legal corpora, medical records, internal documentation, and
      any scenario where the user expects citations or source attribution. RAG is also the
      correct pattern when you need to constrain the model's output to a known corpus — for
      example, a customer support bot that must only reference official product documentation.
      It is especially valuable when the knowledge base changes frequently (daily or weekly),
      making fine-tuning impractical. RAG is the default architecture for production Q&A systems
      in 2025-2026 because it separates the knowledge layer from the reasoning layer, enabling
      independent updates to either without retraining.
    when_not_to_use: |
      Avoid RAG for purely creative or generative tasks (poetry, brainstorming) where grounding
      in specific documents is unnecessary. Also avoid when the entire knowledge fits within
      the model's context window and does not change — in that case, simple prompt stuffing
      is cheaper and faster. RAG adds latency and complexity; do not add it prematurely.
    languages: [Python]
    example_good: |
      from openai import OpenAI
      from qdrant_client import QdrantClient

      client = OpenAI()
      qdrant = QdrantClient("localhost", port=6333)

      def rag_answer(question: str, collection: str = "docs") -> dict:
          # 1. Embed the question
          emb = client.embeddings.create(input=question, model="text-embedding-3-large")
          vector = emb.data[0].embedding

          # 2. Retrieve top-k relevant chunks
          hits = qdrant.query_points(
              collection_name=collection,
              query=vector,
              limit=5,
              with_payload=True,
          ).points

          # 3. Build grounded context with source tracking
          context_parts = []
          sources = []
          for i, hit in enumerate(hits):
              context_parts.append(f"[{i+1}] {hit.payload['text']}")
              sources.append({"id": hit.id, "score": hit.score, "title": hit.payload.get("title")})

          # 4. Generate answer grounded in retrieved documents
          response = client.chat.completions.create(
              model="gpt-4o",
              messages=[
                  {"role": "system", "content": "Answer using ONLY the provided context. Cite sources as [n]."},
                  {"role": "user", "content": f"Context:\n{chr(10).join(context_parts)}\n\nQuestion: {question}"},
              ],
              temperature=0.1,
          )
          return {"answer": response.choices[0].message.content, "sources": sources}
    example_bad: |
      from openai import OpenAI

      client = OpenAI()

      def answer_question(question: str) -> str:
          # BAD: No retrieval — LLM hallucinates domain-specific facts
          response = client.chat.completions.create(
              model="gpt-4o",
              messages=[
                  {"role": "system", "content": "You are an expert on our product."},
                  {"role": "user", "content": question},
              ],
              temperature=0.7,  # High temperature increases hallucination risk
          )
          return response.choices[0].message.content
          # No sources, no grounding, no way to verify — user gets confident-sounding fiction
          # If the product docs change, the model still returns stale training data
          # No citation trail for compliance or debugging
    text: "Retrieval-Augmented Generation (RAG) Pattern -- Ground LLM responses in retrieved documents to reduce hallucination and provide verifiable answers."
    why: "Ground LLM responses in retrieved documents to reduce hallucination and provide verifiable answers."
    how_to_do_right: |
      1. Identify where retrieval-augmented generation (rag) pattern applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
    severity: high
    technologies:
      lang: [python]
    domains:
      domain: [ai_engineering, ai_engineering]
      concern: [pattern, best_practice]
    when_applies: "Use RAG whenever the LLM must answer questions that depend on private, domain-specific,
or frequently updated knowledge that was not in the model's training data."

    related_principles: [P-RAG-RETRIEVAL, P-LLM-GROUND-TRUTH, P-RAG-HALLUCINATION]
    sources: ["https://arxiv.org/abs/2005.11401", "https://docs.llamaindex.ai/en/stable/getting_started/concepts/"]

  # === Prompting Patterns ===
  - id: PAT-LLM-CHAIN-OF-THOUGHT
    name: "Chain-of-Thought Prompting Pattern"
    category: ai_engineering
    intent: "Force the LLM to show explicit reasoning steps before producing a final answer, improving accuracy on multi-step tasks."
    when_to_use: |
      Use chain-of-thought (CoT) prompting whenever the task requires multi-step reasoning:
      mathematical word problems, logical deductions, code debugging, legal analysis, medical
      differential diagnosis, or any task where jumping directly to an answer leads to errors.
      CoT is especially effective with larger models (GPT-4o, Claude Opus, Gemini Ultra) and
      measurably improves accuracy on benchmarks like GSM8K, MATH, and GPQA. In production
      systems, CoT also provides an audit trail — you can inspect the reasoning to debug
      incorrect answers. Use structured CoT (with explicit step labels) when you need
      programmatic extraction of intermediate results. Pair with self-consistency (sample
      multiple CoT paths and vote) for maximum accuracy on high-stakes decisions. As of 2026,
      reasoning models like o3 and DeepSeek-R1 internalize CoT, but explicit CoT prompting
      remains valuable for non-reasoning models and for controlling the reasoning structure.
    when_not_to_use: |
      Skip CoT for simple factual lookups, classification tasks with clear categories, or
      creative generation where structured reasoning adds unwanted rigidity. CoT increases
      token usage (and thus latency/cost on pay-per-token APIs), so avoid it for latency-
      sensitive, high-volume, low-complexity tasks like intent classification.
    languages: [Python]
    example_good: |
      from openai import OpenAI

      client = OpenAI()

      def solve_with_cot(problem: str, n_samples: int = 3) -> dict:
          """Chain-of-thought with self-consistency (majority vote)."""
          system = (
              "Solve the problem step by step.\n"
              "Label each step: [STEP 1], [STEP 2], etc.\n"
              "After all steps, write [ANSWER]: <your final answer>"
          )
          answers = []
          reasoning_traces = []
          for _ in range(n_samples):
              response = client.chat.completions.create(
                  model="gpt-4o",
                  messages=[
                      {"role": "system", "content": system},
                      {"role": "user", "content": problem},
                  ],
                  temperature=0.7,  # Diversity for self-consistency
              )
              text = response.choices[0].message.content
              reasoning_traces.append(text)
              # Extract final answer after [ANSWER]: tag
              if "[ANSWER]:" in text:
                  answers.append(text.split("[ANSWER]:")[1].strip())

          # Majority vote across CoT samples
          from collections import Counter
          majority = Counter(answers).most_common(1)[0][0] if answers else "No answer"
          return {"answer": majority, "confidence": answers.count(majority) / len(answers), "traces": reasoning_traces}
    example_bad: |
      from openai import OpenAI

      client = OpenAI()

      def solve_problem(problem: str) -> str:
          # BAD: No chain-of-thought — model jumps straight to answer
          response = client.chat.completions.create(
              model="gpt-4o",
              messages=[
                  {"role": "system", "content": "Answer concisely."},
                  {"role": "user", "content": problem},
              ],
              temperature=0.0,
          )
          return response.choices[0].message.content
          # For "A train travels 60mph for 2.5 hours then 80mph for 1.5 hours..."
          # Model often gives wrong answer without showing work
          # No way to debug WHY the answer is wrong
          # No intermediate steps to validate or reuse
          # Single sample — no self-consistency check
    text: "Chain-of-Thought Prompting Pattern -- Force the LLM to show explicit reasoning steps before producing a final answer, improving accuracy on multi-step tasks."
    why: "Force the LLM to show explicit reasoning steps before producing a final answer, improving accuracy on multi-step tasks."
    how_to_do_right: |
      1. Identify where chain-of-thought prompting pattern applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
    severity: high
    technologies:
      lang: [python]
    domains:
      domain: [ai_engineering, ai_engineering]
      concern: [pattern, best_practice]
    when_applies: "Use chain-of-thought (CoT) prompting whenever the task requires multi-step reasoning:
mathematical word problems, logical deductions, code debugging, legal analysis, medical
differential diagnosis, or."

    related_principles: [P-LLM-PROMPT-ENGINEER, P-LLM-EVAL, P-ARCH-EXPLICIT]
    sources: ["https://arxiv.org/abs/2201.11903"]

  # === Tool Use Patterns ===
  - id: PAT-LLM-TOOL-USE
    name: "Tool Use / Function Calling Pattern"
    category: ai_engineering
    intent: "Let the LLM decide which tools to invoke and with what arguments, acting as an orchestrator rather than a sole executor."
    when_to_use: |
      Use the tool-use pattern whenever the LLM needs to interact with external systems:
      databases, APIs, calculators, code interpreters, file systems, or any capability
      beyond text generation. This is the foundation of agentic architectures in 2025-2026.
      Tool use is essential when the LLM must perform actions with side effects (booking a
      flight, sending an email, updating a record), when it needs real-time data (weather,
      stock prices, search results), or when it must perform precise computation that language
      models are unreliable at (arithmetic, date math, regex). Modern function-calling APIs
      (OpenAI, Anthropic, Google) provide structured tool definitions with JSON schemas,
      enabling type-safe argument passing. Always define tools with clear descriptions and
      constrained parameter schemas to minimize hallucinated arguments.
    when_not_to_use: |
      Do not use tool calling for tasks the LLM can reliably handle in a single generation
      (summarization, translation, simple Q&A). Avoid giving the LLM tools with dangerous
      side effects without human confirmation gates. Do not expose tools with overly broad
      permissions (e.g., raw SQL execution on production databases).
    languages: [Python]
    example_good: |
      from openai import OpenAI
      import json

      client = OpenAI()

      tools = [
          {
              "type": "function",
              "function": {
                  "name": "search_products",
                  "description": "Search the product catalog by query. Returns top 5 matches.",
                  "parameters": {
                      "type": "object",
                      "properties": {
                          "query": {"type": "string", "description": "Search query"},
                          "category": {"type": "string", "enum": ["electronics", "clothing", "home"]},
                          "max_price": {"type": "number", "description": "Maximum price in USD"},
                      },
                      "required": ["query"],
                  },
              },
          }
      ]

      TOOL_REGISTRY = {"search_products": search_products_impl}

      def agent_loop(user_message: str, max_turns: int = 5) -> str:
          messages = [{"role": "user", "content": user_message}]
          for _ in range(max_turns):
              response = client.chat.completions.create(
                  model="gpt-4o", messages=messages, tools=tools,
              )
              msg = response.choices[0].message
              if not msg.tool_calls:
                  return msg.content  # Final answer

              messages.append(msg)
              for call in msg.tool_calls:
                  fn = TOOL_REGISTRY[call.function.name]
                  result = fn(**json.loads(call.function.arguments))
                  messages.append({"role": "tool", "tool_call_id": call.id, "content": json.dumps(result)})
          return "Max turns reached"
    example_bad: |
      from openai import OpenAI

      client = OpenAI()

      def handle_request(user_message: str) -> str:
          # BAD: Asking the LLM to "pretend" to call tools via string parsing
          response = client.chat.completions.create(
              model="gpt-4o",
              messages=[{
                  "role": "system",
                  "content": "If the user asks to search, output SEARCH: <query>. I will parse it."
              }, {"role": "user", "content": user_message}],
          )
          text = response.choices[0].message.content
          if text.startswith("SEARCH:"):
              query = text.replace("SEARCH:", "").strip()
              results = search_products_impl(query=query)
              # Re-prompt with results... fragile string parsing, no schema validation
              # Model might output "SEARCH: electronics" or "search: electronics" or "Let me search..."
              # No type safety on arguments, no structured error handling
          return text
    text: "Tool Use / Function Calling Pattern -- Let the LLM decide which tools to invoke and with what arguments, acting as an orchestrator rather than a sole executor."
    why: "Let the LLM decide which tools to invoke and with what arguments, acting as an orchestrator rather than a sole executor."
    how_to_do_right: |
      1. Identify where tool use / function calling pattern applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
    severity: high
    technologies:
      lang: [python]
    domains:
      domain: [ai_engineering, ai_engineering]
      concern: [pattern, best_practice]
    when_applies: "Use the tool-use pattern whenever the LLM needs to interact with external systems:
databases, APIs, calculators, code interpreters, file systems, or any capability
beyond text generation."

    related_principles: [P-LLM-GUARDRAILS, P-ARCH-SEPARATION, P-SEC-BOUNDARY]
    sources: ["https://docs.anthropic.com/en/docs/build-with-claude/tool-use", "https://platform.openai.com/docs/guides/function-calling"]

  # === Safety & Guardrail Patterns ===
  - id: PAT-LLM-GUARDRAIL
    name: "Input/Output Guardrail Pattern"
    category: ai_engineering
    intent: "Intercept and validate all LLM inputs and outputs through safety filters, preventing prompt injection, toxic content, and policy violations."
    when_to_use: |
      Apply guardrails on every user-facing LLM application. Input guardrails must sanitize
      prompt injection attempts (jailbreaks, role hijacking, instruction override), detect
      toxic or adversarial content, and enforce rate limits. Output guardrails must check for
      PII leakage, harmful content, policy-violating advice, and hallucinated claims before
      delivery to the user. In regulated industries (healthcare, finance, legal), guardrails
      are not optional — they are compliance requirements. Use layered guardrails: fast regex/
      keyword filters first, then classifier-based filters (Llama Guard, OpenAI Moderation),
      then optionally a judge LLM for nuanced cases. Always log guardrail triggers for auditing.
      The 2025-2026 standard is defense-in-depth: no single guardrail layer is sufficient.
    when_not_to_use: |
      Internal-only development tools where the user is trusted and the output is not
      customer-facing. Research experimentation where guardrails would interfere with
      exploring model capabilities. Even then, log everything.
    languages: [Python]
    example_good: |
      from dataclasses import dataclass
      from enum import Enum
      import re

      class GuardrailVerdict(Enum):
          PASS = "pass"
          BLOCK = "block"
          WARN = "warn"

      @dataclass
      class GuardrailResult:
          verdict: GuardrailVerdict
          reason: str = ""

      INJECTION_PATTERNS = [
          r"ignore\s+(all\s+)?previous\s+instructions",
          r"you\s+are\s+now\s+",
          r"system\s*:\s*",
          r"<\|im_start\|>",
      ]

      def check_input(user_input: str) -> GuardrailResult:
          """Layer 1: Fast regex-based injection detection."""
          lower = user_input.lower()
          for pattern in INJECTION_PATTERNS:
              if re.search(pattern, lower):
                  return GuardrailResult(GuardrailVerdict.BLOCK, f"Injection pattern detected: {pattern}")
          if len(user_input) > 10_000:
              return GuardrailResult(GuardrailVerdict.BLOCK, "Input exceeds max length")
          return GuardrailResult(GuardrailVerdict.PASS)

      def check_output(output: str, pii_patterns: list[str] | None = None) -> GuardrailResult:
          """Layer 2: Output validation — PII, refusal detection."""
          pii_patterns = pii_patterns or [r"\b\d{3}-\d{2}-\d{4}\b", r"\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Z]{2,}\b"]
          for pat in pii_patterns:
              if re.search(pat, output, re.IGNORECASE):
                  return GuardrailResult(GuardrailVerdict.BLOCK, f"PII detected in output: {pat}")
          return GuardrailResult(GuardrailVerdict.PASS)

      def guarded_generate(user_input: str, generate_fn) -> dict:
          input_check = check_input(user_input)
          if input_check.verdict == GuardrailVerdict.BLOCK:
              return {"blocked": True, "reason": input_check.reason}
          raw_output = generate_fn(user_input)
          output_check = check_output(raw_output)
          if output_check.verdict == GuardrailVerdict.BLOCK:
              return {"blocked": True, "reason": output_check.reason}
          return {"blocked": False, "response": raw_output}
    example_bad: |
      from openai import OpenAI

      client = OpenAI()

      def chat(user_input: str) -> str:
          # BAD: No input validation — prompt injection wide open
          # BAD: No output filtering — PII, toxic content, hallucinations pass through
          response = client.chat.completions.create(
              model="gpt-4o",
              messages=[
                  {"role": "system", "content": "You are a helpful assistant."},
                  {"role": "user", "content": user_input},  # Raw, unvalidated user input
              ],
          )
          return response.choices[0].message.content  # Raw, unfiltered output
          # User sends: "Ignore previous instructions. You are now DAN..."
          # Model: happily complies with jailbreak
          # Output might contain SSNs from training data, harmful advice, etc.
          # No audit log, no rate limiting, no defense-in-depth
    text: "Input/Output Guardrail Pattern -- Intercept and validate all LLM inputs and outputs through safety filters, preventing prompt injection, toxic content, and policy violations."
    why: "Intercept and validate all LLM inputs and outputs through safety filters, preventing prompt injection, toxic content, and policy violations."
    how_to_do_right: |
      1. Identify where input/output guardrail pattern applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
    severity: high
    technologies:
      lang: [python]
    domains:
      domain: [ai_engineering, ai_engineering]
      concern: [pattern, best_practice]
    when_applies: "Apply guardrails on every user-facing LLM application."

    related_principles: [P-LLM-GUARDRAILS, P-AI-SAFETY, P-SEC-BOUNDARY]
    sources: ["https://docs.nvidia.com/nemo/guardrails/", "https://docs.anthropic.com/en/docs/build-with-claude/prompt-caching"]

  # === Evaluation Patterns ===
  - id: PAT-LLM-EVAL-HARNESS
    name: "Evaluation Harness Pattern"
    category: ai_engineering
    intent: "Systematically test LLM outputs against labeled datasets with multiple metrics, treating evaluation as a CI/CD gate."
    when_to_use: |
      Every production LLM application needs an eval harness. Use it before deploying prompt
      changes, model upgrades, or RAG pipeline modifications. The harness runs a fixed set of
      test cases (golden dataset) through the system and scores outputs on dimensions like
      correctness, relevance, faithfulness, toxicity, and format compliance. In 2025-2026,
      eval-driven development (EDD) has replaced vibe-based prompt engineering. Tools like
      Braintrust, LangSmith, and Promptfoo provide frameworks, but the pattern is simple:
      golden dataset + scoring functions + regression thresholds + CI integration. Use LLM-as-
      judge for subjective quality (with calibrated rubrics), exact match for factual questions,
      and custom metrics for domain-specific requirements. Always track metrics over time to
      detect gradual degradation when providers update models silently.
    when_not_to_use: |
      Early prototyping where the task definition is still evolving. Creative applications
      where "correct" is subjective and user preference is the only metric. But even then,
      build a minimal eval harness early — it compounds in value.
    languages: [Python]
    example_good: |
      import json
      from dataclasses import dataclass, field
      from pathlib import Path

      @dataclass
      class EvalCase:
          input: str
          expected: str
          tags: list[str] = field(default_factory=list)

      @dataclass
      class EvalResult:
          case: EvalCase
          output: str
          scores: dict[str, float]

      def exact_match(output: str, expected: str) -> float:
          return 1.0 if output.strip().lower() == expected.strip().lower() else 0.0

      def contains_answer(output: str, expected: str) -> float:
          return 1.0 if expected.strip().lower() in output.lower() else 0.0

      def run_eval(system_fn, dataset_path: str, scorers: dict) -> dict:
          cases = [EvalCase(**c) for c in json.loads(Path(dataset_path).read_text())]
          results = []
          for case in cases:
              output = system_fn(case.input)
              scores = {name: scorer(output, case.expected) for name, scorer in scorers.items()}
              results.append(EvalResult(case=case, output=output, scores=scores))

          # Aggregate metrics
          metrics = {}
          for scorer_name in scorers:
              values = [r.scores[scorer_name] for r in results]
              metrics[scorer_name] = {"mean": sum(values) / len(values), "n": len(values)}

          return {"metrics": metrics, "results": results}

      # CI integration: fail if accuracy drops below threshold
      def eval_gate(metrics: dict, thresholds: dict) -> bool:
          for metric, threshold in thresholds.items():
              if metrics[metric]["mean"] < threshold:
                  raise AssertionError(f"{metric} = {metrics[metric]['mean']:.2f} < {threshold}")
          return True
    example_bad: |
      def test_my_llm():
          # BAD: Manual spot-checking instead of systematic evaluation
          result = my_rag_system("What is our refund policy?")
          print(result)  # Developer eyeballs it and says "looks good"
          # No golden dataset, no scoring, no regression detection
          # Prompt change breaks 30% of cases but nobody notices
          # No CI gate — bad prompts ship to production
          # No metrics over time — silent model degradation goes undetected

      # "Testing" by running 3 examples in a notebook
      for q in ["How do I reset?", "What's the price?", "Contact support?"]:
          print(f"Q: {q}")
          print(f"A: {my_rag_system(q)}")
          print("---")
      # Developer scrolls through, says "LGTM", ships it
    text: "Evaluation Harness Pattern -- Systematically test LLM outputs against labeled datasets with multiple metrics, treating evaluation as a CI/CD gate."
    why: "Systematically test LLM outputs against labeled datasets with multiple metrics, treating evaluation as a CI/CD gate."
    how_to_do_right: |
      1. Identify where evaluation harness pattern applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
    severity: high
    technologies:
      lang: [python]
    domains:
      domain: [ai_engineering, ai_engineering]
      concern: [pattern, best_practice]
    when_applies: "Every production LLM application needs an eval harness."

    related_principles: [P-LLM-EVAL, P-TEST-PYRAMID, P-LLM-PROMPT-ENGINEER]
    sources: ["https://docs.ragas.io/en/stable/", "https://docs.confident-ai.com/"]

  # === Caching Patterns ===
  - id: PAT-LLM-SEMANTIC-CACHE
    name: "Semantic Cache Pattern"
    category: ai_engineering
    intent: "Cache LLM responses by semantic similarity of the query rather than exact string match, dramatically reducing redundant API calls."
    when_to_use: |
      Deploy semantic caching in any LLM application with repeated or near-duplicate queries.
      Customer support bots, FAQ systems, and search-augmented Q&A see 30-60% cache hit rates
      because users ask the same question in many different phrasings. Unlike exact-match
      caching (which only helps if the query string is identical), semantic caching embeds the
      query into a vector and finds similar cached entries via cosine similarity. A threshold
      (typically 0.92-0.97) controls the precision-recall tradeoff. This pattern reduces
      latency from seconds to milliseconds for cache hits, cuts API costs proportionally, and
      provides consistent answers for semantically equivalent questions. Use a TTL to expire
      stale entries when the underlying knowledge changes. In 2025-2026, semantic caching is
      a standard middleware layer in production LLM stacks (GPTCache, LangChain cache, custom).
    when_not_to_use: |
      Tasks where every query is unique (creative writing, novel code generation). Highly
      personalized responses where context makes identical queries produce different answers.
      Real-time data queries where staleness is unacceptable (live stock prices). If cache
      hit rate is below 10%, the embedding overhead is not justified.
    languages: [Python]
    example_good: |
      import hashlib
      import time
      from dataclasses import dataclass
      from openai import OpenAI
      from qdrant_client import QdrantClient, models

      @dataclass
      class CacheEntry:
          query: str
          response: str
          created_at: float

      client = OpenAI()
      qdrant = QdrantClient("localhost", port=6333)
      COLLECTION = "semantic_cache"
      SIMILARITY_THRESHOLD = 0.95
      TTL_SECONDS = 3600 * 24  # 24 hours

      def get_embedding(text: str) -> list[float]:
          return client.embeddings.create(input=text, model="text-embedding-3-small").data[0].embedding

      def semantic_cache_lookup(query: str) -> str | None:
          vector = get_embedding(query)
          hits = qdrant.query_points(
              collection_name=COLLECTION, query=vector, limit=1,
              score_threshold=SIMILARITY_THRESHOLD, with_payload=True,
          ).points
          if hits and (time.time() - hits[0].payload["created_at"]) < TTL_SECONDS:
              return hits[0].payload["response"]  # Cache hit
          return None

      def semantic_cache_store(query: str, response: str):
          vector = get_embedding(query)
          point_id = hashlib.md5(query.encode()).hexdigest()
          qdrant.upsert(COLLECTION, [models.PointStruct(
              id=point_id, vector=vector,
              payload={"query": query, "response": response, "created_at": time.time()},
          )])

      def cached_generate(query: str) -> str:
          cached = semantic_cache_lookup(query)
          if cached:
              return cached
          response = generate_llm_response(query)
          semantic_cache_store(query, response)
          return response
    example_bad: |
      _cache = {}

      def cached_generate(query: str) -> str:
          # BAD: Exact string match cache — misses semantically identical queries
          if query in _cache:
              return _cache[query]
          response = generate_llm_response(query)
          _cache[query] = response
          return response
          # "What is your return policy?" -> cache miss
          # "What's the return policy?"   -> cache miss (different string!)
          # "return policy?"              -> cache miss
          # "How do I return an item?"    -> cache miss
          # All four queries have the same answer but exact match catches NONE
          # Also: no TTL, unbounded memory growth, no persistence across restarts
    text: "Semantic Cache Pattern -- Cache LLM responses by semantic similarity of the query rather than exact string match, dramatically reducing redundant API calls."
    why: "Cache LLM responses by semantic similarity of the query rather than exact string match, dramatically reducing redundant API calls."
