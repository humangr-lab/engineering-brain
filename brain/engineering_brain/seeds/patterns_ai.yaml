  # === A/B Testing Patterns ===
  - id: PAT-AI-AB-TEST
    name: "A/B Testing for AI Pattern"
    category: ai_engineering
    intent: "Compare AI model variants or prompt versions under controlled conditions with statistical rigor, using real user traffic."
    when_to_use: |
      Use A/B testing when deciding between model versions (GPT-4o vs Claude Opus), prompt
      strategies (zero-shot vs few-shot vs CoT), RAG configurations (chunk sizes, top-k values,
      reranker models), or any system parameter that affects output quality. Unlike offline
      evals, A/B tests measure real user satisfaction through engagement metrics (click-through,
      task completion, thumbs-up rate, time-on-task). This is critical because offline eval
      scores often do not correlate perfectly with user preference. Run A/B tests for model
      migrations: before switching from GPT-4o to a cheaper model, prove that quality does not
      regress on real traffic. Use proper randomization (hash user ID, not random per-request)
      to ensure consistent experience. Require statistical significance (p < 0.05 or Bayesian
      credible intervals) before declaring a winner. In 2025-2026, most LLM platforms provide
      built-in A/B testing or integrate with feature flag systems (LaunchDarkly, Statsig).
    when_not_to_use: |
      When you have fewer than ~1000 daily interactions per variant (insufficient power). When
      the quality difference is obvious from offline evals (do not waste user traffic to confirm
      what you already know). Safety-critical applications where the B variant might cause harm.
    languages: [Python]
    example_good: |
      import hashlib
      import time
      from dataclasses import dataclass, field

      @dataclass
      class Variant:
          name: str
          handler: callable
          weight: float = 0.5

      @dataclass
      class ExperimentMetrics:
          impressions: int = 0
          positive_feedback: int = 0
          total_latency_ms: float = 0.0

      class ABExperiment:
          def __init__(self, name: str, variants: list[Variant]):
              self.name = name
              self.variants = variants
              self.metrics: dict[str, ExperimentMetrics] = {v.name: ExperimentMetrics() for v in variants}

          def assign_variant(self, user_id: str) -> Variant:
              """Deterministic assignment: same user always gets same variant."""
              hash_val = int(hashlib.sha256(f"{self.name}:{user_id}".encode()).hexdigest(), 16)
              bucket = (hash_val % 100) / 100.0
              cumulative = 0.0
              for variant in self.variants:
                  cumulative += variant.weight
                  if bucket < cumulative:
                      return variant
              return self.variants[-1]

          def run(self, user_id: str, input_data: dict) -> dict:
              variant = self.assign_variant(user_id)
              start = time.monotonic()
              result = variant.handler(input_data)
              elapsed_ms = (time.monotonic() - start) * 1000
              m = self.metrics[variant.name]
              m.impressions += 1
              m.total_latency_ms += elapsed_ms
              return {"variant": variant.name, "result": result, "latency_ms": elapsed_ms}

          def record_feedback(self, user_id: str, positive: bool):
              variant = self.assign_variant(user_id)
              if positive:
                  self.metrics[variant.name].positive_feedback += 1
    example_bad: |
      import random

      def generate_response(user_id: str, query: str) -> str:
          # BAD: Random per-request assignment — same user gets different variants
          if random.random() < 0.5:
              return model_a(query)
          else:
              return model_b(query)
          # User gets inconsistent experience across requests
          # Cannot track which variant a user saw when they give feedback
          # No metrics collection — how do you know which is better?
          # No statistical significance check — decision is based on vibes
          # No experiment naming or isolation — concurrent experiments interfere
          # "We tried the new model for a week and it felt better" is not evidence
    text: "A/B Testing for AI Pattern -- Compare AI model variants or prompt versions under controlled conditions with statistical rigor, using real user traffic."
    why: "Compare AI model variants or prompt versions under controlled conditions with statistical rigor, using real user traffic."
    how_to_do_right: |
      1. Identify where a/b testing for ai pattern applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
