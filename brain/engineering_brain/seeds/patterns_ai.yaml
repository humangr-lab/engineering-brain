  # === ML Operations Patterns ===
  - id: PAT-ML-FEATURE-STORE
    name: "Feature Store Pattern"
    category: ai_engineering
    intent: "Centralize feature computation, storage, and serving to ensure consistency between training and inference while eliminating redundant computation."
    when_to_use: |
      Use a feature store when multiple models or teams consume the same features, when
      training-serving skew is a risk, or when feature computation is expensive and should
      be precomputed. The feature store provides a single source of truth for feature
      definitions, ensuring that the feature "user_30d_purchase_count" is computed identically
      whether it is being used for offline training or real-time inference. This eliminates the
      most common source of ML bugs: training-serving skew, where features are computed
      differently in the training pipeline (batch SQL) vs the serving path (real-time Python).
      Feature stores also enable feature reuse across teams — the fraud team and the
      recommendation team can share user behavioral features without duplicating ETL pipelines.
      In 2025-2026, Feast (open-source), Tecton, and Databricks Feature Store are the standard
      options. Even a simple implementation (feature registry + offline/online store + consistent
      transformation code) provides enormous value.
    when_not_to_use: |
      Single-model projects with trivial features (raw columns from a single table). Prototyping
      phase where features are still being explored and definitions change daily. When all features
      are computed in real-time from the request itself (no historical aggregations needed).
    languages: [Python]
    example_good: |
      from dataclasses import dataclass, field
      from datetime import datetime, timedelta
      import logging

      logger = logging.getLogger(__name__)

      @dataclass
      class FeatureDefinition:
          name: str
          entity: str  # e.g., "user", "product"
          dtype: str
          description: str
          ttl: timedelta = timedelta(hours=24)
          tags: list[str] = field(default_factory=list)

      class FeatureStore:
          def __init__(self, offline_store, online_store):
              self.offline = offline_store  # For training: Parquet, BigQuery, etc.
              self.online = online_store    # For serving: Redis, DynamoDB, etc.
              self.registry: dict[str, FeatureDefinition] = {}

          def register(self, feature: FeatureDefinition):
              self.registry[feature.name] = feature
              logger.info("Registered feature: %s (entity=%s)", feature.name, feature.entity)

          def materialize(self, feature_name: str, start: datetime, end: datetime):
              """Compute features offline and push to online store."""
              defn = self.registry[feature_name]
              # Same transformation code for offline and online — no skew
              batch_data = self.offline.compute(defn, start, end)
              self.online.push(feature_name, batch_data)
              logger.info("Materialized %s: %d rows", feature_name, len(batch_data))

          def get_online(self, feature_names: list[str], entity_id: str) -> dict:
              """Low-latency feature retrieval for serving."""
              result = {}
              for name in feature_names:
                  defn = self.registry[name]
                  value = self.online.get(name, entity_id)
                  if value is None:
                      logger.warning("Feature %s missing for entity %s", name, entity_id)
                  result[name] = value
              return result

          def get_training_data(self, feature_names: list[str], entity_ids: list[str],
                                timestamps: list[datetime]) -> list[dict]:
              """Point-in-time correct feature retrieval for training."""
              return self.offline.get_historical(feature_names, entity_ids, timestamps)

      # Register features once, use everywhere
      store = FeatureStore(offline_store=BigQueryStore(), online_store=RedisStore())
      store.register(FeatureDefinition(
          name="user_30d_purchase_count", entity="user", dtype="int64",
          description="Number of purchases in last 30 days",
          tags=["fraud", "recommendation"],
      ))
    example_bad: |
      # BAD: Features computed differently in training vs serving

      # training_pipeline.py — batch SQL
      def get_training_features(user_ids):
          query = """
              SELECT user_id, COUNT(*) as purchase_count
              FROM purchases
              WHERE purchase_date >= DATE_SUB(CURRENT_DATE(), INTERVAL 30 DAY)
              GROUP BY user_id
          """  # Uses calendar days, inclusive of today
          return db.execute(query)

      # serving.py — real-time Python
      def get_serving_features(user_id):
          cutoff = datetime.utcnow() - timedelta(days=30)
          purchases = db.query(Purchase).filter(
              Purchase.user_id == user_id,
              Purchase.created_at > cutoff,  # Uses UTC timestamps, exclusive of cutoff
          ).count()
          return {"purchase_count": purchases}
          # TRAINING-SERVING SKEW: SQL uses DATE (calendar day), Python uses datetime (UTC)
          # The "same" feature is subtly different — model performance degrades silently
          # No feature registry — each team recomputes independently
          # No point-in-time correctness — training data has future leakage
    text: "Feature Store Pattern -- Centralize feature computation, storage, and serving to ensure consistency between training and inference while eliminating redundant computation."
    why: "Centralize feature computation, storage, and serving to ensure consistency between training and inference while eliminating redundant computation."
    how_to_do_right: |
      1. Identify where feature store pattern applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
