  # === Human-in-the-Loop Patterns ===
  - id: PAT-AI-HUMAN-IN-LOOP
    name: "Human-in-the-Loop Pattern"
    category: ai_engineering
    intent: "Route high-stakes or low-confidence AI decisions to human reviewers, balancing automation speed with human judgment."
    when_to_use: |
      Apply human-in-the-loop (HITL) whenever the AI makes decisions with significant real-world
      consequences: medical diagnoses, financial approvals, content moderation escalations, legal
      document review, hiring decisions, or any domain where errors carry legal or ethical risk.
      Also use HITL when the model's confidence is below a calibrated threshold — this creates a
      natural triage system where easy cases are automated and hard cases get human attention. In
      2025-2026, the best HITL systems use active learning: human decisions on borderline cases
      feed back into the model, gradually expanding the automation boundary. Design the handoff
      interface so humans see the model's reasoning (chain-of-thought, retrieved evidence,
      confidence score) alongside the raw input — this makes review faster and more accurate.
      Track human override rates as a key metric: if humans override > 30% of routed cases,
      the routing threshold needs adjustment.
    when_not_to_use: |
      Low-stakes, high-volume tasks where human review would be a bottleneck (auto-complete,
      spam filtering at scale, image tagging). Tasks where the model consistently outperforms
      human reviewers (some pattern recognition tasks). When there is no qualified human
      reviewer available within the latency SLA.
    languages: [Python]
    example_good: |
      from dataclasses import dataclass
      from enum import Enum
      import logging

      logger = logging.getLogger(__name__)

      class Decision(Enum):
          APPROVE = "approve"
          REJECT = "reject"
          ESCALATE = "escalate"

      @dataclass
      class ReviewItem:
          id: str
          input_data: dict
          ai_decision: Decision
          ai_confidence: float
          ai_reasoning: str
          human_decision: Decision | None = None

      CONFIDENCE_THRESHOLD = 0.85
      REVIEW_QUEUE = []  # In production: persistent queue (Redis, SQS, database)

      def classify_with_hitl(item_id: str, input_data: dict) -> Decision:
          ai_result = run_ai_classifier(input_data)

          if ai_result.confidence >= CONFIDENCE_THRESHOLD:
              logger.info("Auto-decided %s: %s (conf=%.2f)", item_id, ai_result.decision, ai_result.confidence)
              return ai_result.decision

          # Below threshold -> escalate to human
          review_item = ReviewItem(
              id=item_id, input_data=input_data,
              ai_decision=ai_result.decision, ai_confidence=ai_result.confidence,
              ai_reasoning=ai_result.reasoning,
          )
          REVIEW_QUEUE.append(review_item)
          logger.info("Escalated %s to human review (conf=%.2f)", item_id, ai_result.confidence)
          return Decision.ESCALATE

      def human_review_callback(item_id: str, human_decision: Decision):
          """Called when human completes review — feeds back into training data."""
          record_feedback(item_id, human_decision)  # Active learning loop
          logger.info("Human reviewed %s: %s", item_id, human_decision)
    example_bad: |
      def classify(input_data: dict) -> str:
          # BAD: Fully autonomous high-stakes decision, no escalation path
          result = run_ai_classifier(input_data)
          execute_decision(result.decision)  # Immediately acts on AI output
          return result.decision
          # No confidence check — equally trusts 51% and 99% confidence
          # No human review queue — mistakes are discovered by angry customers
          # No feedback loop — model never improves from corrections
          # No audit trail — cannot explain why a decision was made
          # For a loan approval system, this means automatic rejections
          # with no recourse and no way to detect systematic bias
    text: "Human-in-the-Loop Pattern -- Route high-stakes or low-confidence AI decisions to human reviewers, balancing automation speed with human judgment."
    why: "Route high-stakes or low-confidence AI decisions to human reviewers, balancing automation speed with human judgment."
