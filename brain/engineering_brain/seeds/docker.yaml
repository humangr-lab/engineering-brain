layer: rules
technology: Docker
domain: devops
knowledge:
- id: CR-DOCKER-001
  text: Dockerfile must use specific base image tags, never 'latest'.
  why: '''latest'' is a moving target — a new base image version can break your build tomorrow. Pinned tags make builds reproducible
    and auditable.'
  how_to_do_right: 'Use versioned tags: python:3.13-slim, node:20-alpine. Pin to patch version for production. Use slim/alpine
    variants to reduce attack surface.'
  severity: high
  technologies:
    library: [dockerfile]
    platform: [docker]
  domains:
    domain: [operations, devops, security]
  example_good: 'FROM python:3.13-slim

    '
  example_bad: 'FROM python:latest  # Could break any day

    FROM python          # Same — defaults to latest

    '
  when_applies: Projects using containerized applications or Dockerfile
  when_not_applies: local development only, throwaway experiments. projects not using Docker or Dockerfile
  sources: ["https://docs.docker.com/engine/reference/builder/#from"]
- id: CR-DOCKER-002
  text: Dockerfile should use multi-stage builds to separate build and runtime.
  why: Single-stage builds include compilers, dev dependencies, and build artifacts in the final image — larger attack surface,
    larger image, slower pulls.
  how_to_do_right: 'Stage 1: install build deps, compile, run tests. Stage 2: copy only artifacts into a clean slim image.
    Final image has only runtime dependencies.'
  severity: medium
  technologies:
    library: [dockerfile]
    platform: [docker]
  domains:
    domain: [operations, devops, performance, security]
  example_good: '# Build stage

    FROM python:3.13 AS builder

    COPY requirements.txt .

    RUN pip install --user -r requirements.txt

    COPY . .


    # Runtime stage

    FROM python:3.13-slim

    COPY --from=builder /root/.local /root/.local

    COPY --from=builder /app /app

    CMD ["python", "app.py"]

    '
  example_bad: |
    FROM python:3.13
    COPY requirements.txt .
    RUN pip install -r requirements.txt
    COPY . .
    CMD ["python", "app.py"]
    # Final image includes gcc, build headers, pip cache — 900MB+
  when_applies: Projects using containerized applications or Dockerfile
  when_not_applies: local development only, throwaway experiments. projects not using Docker or Dockerfile
  sources: ["https://docs.docker.com/build/building/multi-stage/"]
- id: CR-DOCKER-003
  text: Never run containers as root — use USER directive.
  why: Root in container = root on host (in many configs). A container escape with root = full host compromise.
  how_to_do_right: Create a non-root user in Dockerfile. Set USER before CMD. Use numeric UID for Kubernetes compatibility.
  severity: critical
  technologies:
    library: [dockerfile]
    platform: [docker]
  domains:
    domain: [operations, devops, security]
  example_good: 'RUN adduser --disabled-password --gecos '''' appuser

    USER appuser

    CMD ["python", "app.py"]

    '
  example_bad: '# Runs as root by default — security risk

    CMD ["python", "app.py"]

    '
  when_applies: Any project using containerized applications or Dockerfile
  when_not_applies: local development only, throwaway experiments. projects not using Docker or Dockerfile
  sources: ["https://docs.docker.com/engine/reference/builder/#user"]
- id: CR-DOCKER-004
  text: Use .dockerignore to exclude unnecessary files from build context.
  why: Without .dockerignore, Docker sends the entire directory to the daemon — including .git (huge), node_modules, .env
    (secrets!), and test data.
  how_to_do_right: 'Create .dockerignore with: .git, .env, __pycache__, node_modules, .venv, *.pyc, out/, docs/, tests/. Mirror
    your .gitignore + add .git itself.'
  severity: high
  technologies:
    platform: [docker]
  domains:
    domain: [operations, devops, security, performance]
  example_good: |
    # .dockerignore
    .git
    .env
    __pycache__
    node_modules
    .venv
    *.pyc
    tests/
  example_bad: |
    # No .dockerignore — entire directory sent to Docker daemon
    # .git (100MB+), node_modules (500MB+), .env (secrets!) all included
  when_applies: Projects using containerized applications
  when_not_applies: local development only, throwaway experiments. projects not using Docker
  sources: ["https://docs.docker.com/engine/reference/builder/#dockerignore-file"]
- id: CR-DOCKER-005
  text: COPY requirements first, then source code — leverage Docker layer caching.
  why: Docker caches each layer. If you COPY everything then install deps, changing one source file invalidates the entire
    pip install cache.
  how_to_do_right: COPY requirements.txt first, RUN pip install, THEN COPY source. Dependencies only reinstall when requirements.txt
    changes.
  severity: medium
  technologies:
    lang: [python]
    library: [dockerfile]
    platform: [docker]
  domains:
    domain: [operations, devops, performance]
  example_good: 'COPY requirements.txt .

    RUN pip install --no-cache-dir -r requirements.txt

    COPY . .

    '
  example_bad: 'COPY . .  # Any source change invalidates pip install cache

    RUN pip install -r requirements.txt

    '
  when_applies: Projects using containerized applications, Dockerfile, or Python codebases
  when_not_applies: local development only, throwaway experiments
  sources: ["https://docs.docker.com/build/cache/"]
- id: CR-COMPOSE-001
  text: docker-compose services must define health checks for dependent services.
  why: depends_on only waits for container start, not service readiness. Your app starts before PostgreSQL accepts connections
    → crash on first query.
  how_to_do_right: 'Add healthcheck to each service. Use depends_on with condition: service_healthy. Test the actual service
    (pg_isready, redis-cli ping).'
  severity: high
  technologies:
    library: [docker-compose]
    platform: [docker]
  domains:
    domain: [operations, devops, reliability]
  example_good: "services:\n  db:\n    image: postgres:15\n    healthcheck:\n      test: [\"CMD-SHELL\", \"pg_isready -U postgres\"\
    ]\n      interval: 5s\n      timeout: 5s\n      retries: 5\n  app:\n    depends_on:\n      db:\n        condition: service_healthy\n"
  example_bad: "services:\n  app:\n    depends_on:\n      - db  # Only waits for container start, not readiness\n"
  when_applies: Projects using containerized applications or docker-compose
  when_not_applies: local development only, throwaway experiments. projects not using Docker or docker-compose
  sources: ["https://docs.docker.com/reference/compose-file/services/#healthcheck"]
- id: CR-COMPOSE-002
  text: docker-compose must not hardcode ports that conflict with host services.
  why: Hardcoded ports (5432, 6379, 3000) often conflict with locally-running services. The compose file works on your machine
    but fails on mine.
  how_to_do_right: Use non-standard host ports (e.g., 15432:5432) or make ports configurable via .env. Document expected ports
    in README.
  severity: medium
  technologies:
    library: [docker-compose]
    platform: [docker]
  domains:
    domain: [operations, devops]
  example_good: "services:\n  redis:\n    ports:\n      - \"${REDIS_PORT:-16379}:6379\"\n"
  example_bad: "services:\n  redis:\n    ports:\n      - \"6379:6379\"  # Conflicts if Redis is running locally\n"
  when_applies: Projects using containerized applications or docker-compose
  when_not_applies: local development only, throwaway experiments. projects not using Docker or docker-compose
  sources: ["https://docs.docker.com/reference/compose-file/services/#ports"]
- id: CR-COMPOSE-003
  text: Secrets and credentials must use env_file or Docker secrets, never hardcoded in docker-compose.yml.
  why: docker-compose.yml is committed to git. Hardcoded passwords in compose = leaked credentials.
  how_to_do_right: 'Use env_file: .env (which is gitignored). Or use Docker secrets for production. Reference variables with
    ${VAR_NAME}.'
  severity: critical
  technologies:
    library: [docker-compose]
    platform: [docker]
  domains:
    domain: [operations, devops, security]
  example_good: "services:\n  db:\n    environment:\n      POSTGRES_PASSWORD: ${DB_PASSWORD}\n    env_file: .env\n"
  example_bad: "services:\n  db:\n    environment:\n      POSTGRES_PASSWORD: \"mysecretpassword\"  # In git!\n"
  when_applies: Any project using containerized applications or docker-compose
  when_not_applies: local development only, throwaway experiments. projects not using Docker or docker-compose
  sources: ["https://docs.docker.com/compose/use-secrets/"]
- id: CR-COMPOSE-004
  text: docker-compose volumes for data must be named volumes, not bind mounts to random paths.
  why: Bind mounts to ./data or /tmp are fragile — they depend on host directory structure and permissions. Named volumes
    are managed by Docker, portable, and easy to backup.
  how_to_do_right: Define named volumes at top level. Reference in services. Use bind mounts only for development source code
    mounting.
  severity: medium
  technologies:
    library: [docker-compose]
    platform: [docker]
  domains:
    domain: [operations, devops, architecture]
    concern: [data, database]
  example_good: "volumes:\n  postgres_data:\n  redis_data:\nservices:\n  db:\n    volumes:\n      - postgres_data:/var/lib/postgresql/data\n"
  example_bad: "services:\n  db:\n    volumes:\n      - ./data/postgres:/var/lib/postgresql/data  # Host-dependent\n"
  when_applies: Projects using containerized applications or docker-compose
  when_not_applies: local development only, throwaway experiments. projects not using Docker or docker-compose
  sources: ["https://docs.docker.com/reference/compose-file/services/#volumes"]
- id: CR-COMPOSE-005
  text: docker-compose services should define restart policies.
  why: 'Without restart policy, a crashed container stays down. With restart: unless-stopped, services auto-recover from transient
    failures.'
  how_to_do_right: 'Use restart: unless-stopped for production services. Use restart: ''no'' for one-shot tasks (migrations,
    seeds).'
  severity: medium
  technologies:
    library: [docker-compose]
    platform: [docker]
  domains:
    domain: [operations, devops, reliability]
  example_good: |
    services:
      app:
        restart: unless-stopped
      migration:
        restart: "no"  # One-shot task — should not restart
  example_bad: |
    services:
      app:
        # No restart policy — container stays down after crash
  when_applies: Projects using containerized applications or docker-compose
  when_not_applies: local development only, throwaway experiments. projects not using Docker or docker-compose
  sources: ["https://docs.docker.com/reference/compose-file/services/#restart"]
- id: CR-DOCKER-NET-001
  text: Services that don't need external access should not expose ports to the host.
  why: Every exposed port is an attack surface. Internal services (Redis cache, internal queues) only need to be reachable
    from other containers, not from the host.
  how_to_do_right: Use Docker's internal networking (services reach each other by name). Only expose ports for services that
    need host/external access.
  severity: high
  technologies:
    library: [docker-compose]
    platform: [docker]
  domains:
    domain: [operations, devops, security]
  example_good: "services:\n  redis:\n    # No 'ports:' — only reachable from other containers\n    expose:\n      - \"6379\"\
    \n  app:\n    ports:\n      - \"8080:8080\"  # Only app needs external access\n"
  example_bad: "services:\n  redis:\n    ports:\n      - \"6379:6379\"  # Exposed to host — unnecessary\n"
  when_applies: Projects using containerized applications or docker-compose
  when_not_applies: local development only, throwaway experiments. projects not using Docker or docker-compose
  sources: ["https://docs.docker.com/network/"]
- id: CR-DOCKER-RT-001
  text: Container health checks should test the actual service, not just process existence.
  why: A running process doesn't mean a working service. Python process alive but Flask not accepting connections = false
    healthy.
  how_to_do_right: 'Health check should make an actual request: curl localhost:5000/health, redis-cli ping, pg_isready. Timeout
    < interval.'
  severity: high
  technologies:
    platform: [docker]
  domains:
    domain: [operations, devops, reliability]
  example_good: |
    HEALTHCHECK --interval=30s --timeout=5s --retries=3 \
      CMD curl -f http://localhost:5000/health || exit 1
  example_bad: |
    HEALTHCHECK CMD ps aux | grep python
    # Process exists but Flask may not be accepting connections
  when_applies: Projects using containerized applications
  when_not_applies: local development only, throwaway experiments. projects not using Docker
  sources: ["https://docs.docker.com/reference/dockerfile/#healthcheck"]
- id: CR-DOCKER-RT-002
  text: Containers must handle SIGTERM gracefully for zero-downtime deployments.
  why: Docker sends SIGTERM before SIGKILL. If your app doesn't handle SIGTERM, in-flight requests are dropped and connections
    aren't cleaned up.
  how_to_do_right: Handle SIGTERM in your application. Finish in-flight requests. Close database connections. Flush logs.
    Then exit cleanly.
  severity: medium
  technologies:
    lang: [python]
    platform: [docker]
  domains:
    domain: [operations, devops, reliability]
  example_good: |
    import signal, sys

    def handle_sigterm(signum, frame):
        print("SIGTERM received, shutting down...")
        server.shutdown()
        sys.exit(0)

    signal.signal(signal.SIGTERM, handle_sigterm)
  example_bad: |
    # No SIGTERM handler — Docker sends SIGKILL after timeout
    # In-flight requests dropped, DB connections left open
    if __name__ == "__main__":
        app.run()
  when_applies: Projects using containerized applications or Python codebases
  when_not_applies: local development only, throwaway experiments. projects not using Docker or Python
  sources: ["https://docs.docker.com/engine/containers/start-containers-automatically/#use-a-process-manager"]
- id: CR-DOCKER-RT-003
  text: Container logs must go to stdout/stderr, not files inside the container.
  why: Logs to files inside containers are lost when the container is removed. Docker captures stdout/stderr and makes them
    available via 'docker logs' and logging drivers.
  how_to_do_right: Configure your application to log to stdout. Use Docker logging drivers (json-file, fluentd, etc.) for
    persistence and aggregation.
  severity: medium
  technologies:
    lang: [python]
    platform: [docker]
  domains:
    domain: [operations, devops, observability]
  example_good: |
    import logging
    import sys

    logging.basicConfig(stream=sys.stdout, level=logging.INFO)
    logger = logging.getLogger(__name__)
    logger.info("App started on port 5000")
  example_bad: |
    logging.basicConfig(filename="/app/logs/app.log")
    # Logs lost when container is removed
    # 'docker logs' shows nothing
  when_applies: Projects using containerized applications or Python codebases
  when_not_applies: local development only, throwaway experiments. projects not using Docker or Python
  sources: ["https://docs.docker.com/engine/logging/"]
