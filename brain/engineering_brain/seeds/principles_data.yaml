- id: P-DB-CONNECTION-POOL
  name: Connection Pools Must Be Sized for the Workload, Not the Machine
  why: |
    Database connections are expensive resources. Each PostgreSQL connection consumes roughly 5-10 MB of
    RAM for the backend process, plus kernel resources for the socket and process. A MySQL connection is
    lighter but still allocates thread stack memory and per-connection buffers. When an application opens
    more connections than the database can efficiently handle, performance degrades non-linearly: context
    switching between hundreds of backend processes consumes more CPU than the actual queries, and lock
    contention on shared data structures (buffer pool, WAL, catalog caches) causes throughput to collapse.
    The counterintuitive result, demonstrated repeatedly in benchmarks, is that a PostgreSQL instance
    handling 10,000 transactions per second with 20 connections will handle fewer transactions per second
    with 200 connections. More connections does not mean more throughput — it means more contention.
    Connection pooling (PgBouncer, ProxySQL, application-level pools like HikariCP) solves this by
    multiplexing many application threads over a small number of database connections. The pool size
    should be determined by the database's optimal concurrency, not by the number of application threads
    or the amount of RAM on the application server. The formula is roughly: optimal connections =
    (CPU cores * 2) + effective_spindle_count, where effective_spindle_count is 1 for SSD. For a
    4-core database server on SSD, that is approximately 9 connections. Even for large workloads, going
    above 50-100 connections per database instance rarely helps and often hurts. Teams that set pool
    size to 200 "because the app server has 200 threads" are sizing for the wrong variable and will
    experience connection starvation, timeout cascades, and degraded throughput under load.
  how_to_apply: |
    1. Start with the formula: pool_size = (database_CPU_cores * 2) + number_of_disks. For a typical
    cloud database instance with 4 vCPUs and SSD storage, this gives a pool size of approximately 9.
    Round up to 10-15 to accommodate burst traffic, but resist the urge to set it to 100+.
    2. Use an external connection pooler (PgBouncer for PostgreSQL, ProxySQL for MySQL) in front of the
    database, especially when multiple application instances share a single database. This allows 20
    application instances each with 10 local connections to multiplex over 15-20 actual database
    connections, rather than opening 200 connections total.
    3. Configure connection timeouts aggressively. A connection checkout timeout of 3-5 seconds ensures
    that when the pool is exhausted, requests fail fast rather than queueing indefinitely. Pair this
    with circuit breakers in the application to shed load gracefully.
    4. Monitor pool utilization metrics: active connections, idle connections, wait time for connection
    checkout, and timeout/rejection counts. Alert when pool utilization exceeds 80% sustained — this is
    a leading indicator of capacity problems.
    5. Set connection max lifetime (maxLifetime in HikariCP, server_lifetime in PgBouncer) to 15-30
    minutes to ensure connections are recycled regularly. This prevents issues with stale connections
    after database failovers, network blips, or server-side timeout enforcement.
    6. Load test with realistic concurrency to validate your pool size. Gradually increase concurrent
    users while monitoring database CPU, query latency, and pool wait times. The optimal pool size is
    the point where adding more connections stops improving throughput.
  mental_model: >-
    A highway with too many lanes actually causes more accidents and slower traffic — the optimal number of database connections
    is smaller than you think.
  domains:
    domain:
    - database
    - performance
    - architecture
    concern:
    - infrastructure
    - optimization
  violation_consequence: >-
    Oversized pools cause connection starvation at the database level, where hundreds of connections compete for CPU and memory,
    increasing latency for all queries. Undersized pools cause application-level timeouts as threads wait for available connections.
    Both failure modes manifest as intermittent slowness that is difficult to diagnose without pool metrics.
  teaching_example: >-
    A team scaled their web tier from 5 to 50 instances during a traffic spike. Each instance had a pool of 20 connections,
    totaling 1,000 database connections. PostgreSQL CPU hit 100% from context switching alone, p99 latency went from 50ms
    to 12 seconds, and the database effectively stopped serving queries. Reducing pool size to 5 per instance (250 total)
    with PgBouncer restored normal performance.
  when_applies: >-
    Any application using a connection pool to a relational database, especially in multi-instance deployments where total
    connection count can grow unexpectedly.
  when_not_applies: >-
    Serverless functions with per-invocation connections (use a managed proxy like RDS Proxy instead), or embedded databases
    (SQLite) where connection pooling is unnecessary.
  sources:
  - https://www.postgresql.org/docs/current/runtime-config-connection.html
  - https://www.pgbouncer.org/
  text: >-
    Connection Pools Must Be Sized for the Workload, Not the Machine: A highway with too many lanes actually causes more accidents
    and slower traffic — the optimal number of database connections is smaller than you think.
  severity: high
  technologies:
    lang:
    - python
  how_to_do_right: |-
    1. Start with the formula: pool_size = (database_CPU_cores * 2) + number_of_disks. For a typical
    cloud database instance with 4 vCPUs and SSD storage, this gives a pool size of approximately 9.
    Round up to 10-15 to accommodate burst traffic, but resist the urge to set it to 100+.
    2. Use an external connection pooler (PgBouncer for PostgreSQL, ProxySQL for MySQL) in front of the
    database, especially when multiple application instances share a single database. This allows 20
    application instances each with 10 local connections to multiplex over 15-20 actual database
    connections, rather than opening 200 connections total.
    3. Configure connection timeouts aggressively. A connection checkout timeout of 3-5 seconds ensures
    that when the pool is exhausted, requests fail fast rather than queueing indefinitely. Pair this
    with circuit breakers in the application to shed load gracefully.
    4. Monitor pool utilization metrics: active connections, idle connections, wait time for connection
    checkout, and timeout/rejection counts. Alert when pool utilization exceeds 80% sustained — this is
    a leading indicator of capacity problems.
    5. Set connection max lifetime (maxLifetime in HikariCP, server_lifetime in PgBouncer) to 15-30
    minutes to ensure connections are recycled regularly. This prevents issues with stale connections
    after database failovers, network blips, or server-side timeout enforcement.
    6. Load test with realistic concurrency to validate your pool size. Gradually increase concurrent
    users while monitoring database CPU, query latency, and pool wait times. The optimal pool size is
    the point where adding more connections stops improving throughput.
  example_good: |-
    # A team scaled their web tier from 5 to 50 instances during a traffic spike.
    # Each instance had a pool of 20 connections, totaling 1,000 database connections.
    # PostgreSQL CPU hit 100% from context switching alone, p99 latency went from 50ms to 12 seconds, and the database effectively stopped serving queries.
    # Reducing pool size to 5 per instance (250 total) with PgBouncer restored normal performance.
