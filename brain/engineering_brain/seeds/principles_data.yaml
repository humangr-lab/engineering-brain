- id: P-DATA-PARTITION
  name: Partition Data by Access Pattern, Not by Size Alone
  why: |
    Partitioning is the practice of dividing a large dataset into smaller, independently manageable
    segments. The purpose is to reduce the amount of data that must be scanned, loaded, or locked for
    any single operation. However, the partitioning key must align with how the data is actually
    accessed, not just how large the dataset is. The most common mistake is partitioning by primary key
    hash for even distribution, when queries almost always filter by date range or tenant ID. A
    hash-partitioned table distributes data evenly across partitions, but a query for "all orders in
    January 2026" must scan every partition because order dates are randomly distributed across hash
    buckets. The same data partitioned by month would scan exactly one partition. In data lakes, this
    manifests as the choice between partitioning by date (good for time-series queries), by tenant
    (good for multi-tenant isolation), or by both (good for both, at the cost of more partitions).
    Partition pruning — the query engine's ability to skip irrelevant partitions entirely — is the
    primary performance benefit. If your partition key does not appear in your WHERE clauses, the
    engine cannot prune, and partitioning provides zero query performance benefit while adding
    management overhead. Over-partitioning is equally harmful: thousands of tiny partitions create
    metadata overhead, small file problems in data lakes (many small Parquet files are slower to scan
    than fewer large ones), and increased planning time in the query optimizer. The sweet spot is
    partitions that align with query predicates and are large enough to be efficient (100 MB to 1 GB
    for columnar formats). This requires understanding your access patterns before choosing a
    partitioning strategy — which means analyzing actual queries, not guessing.
  how_to_apply: |
    1. Analyze your top 20 queries and identify which columns appear most frequently in WHERE clauses,
    JOIN conditions, and GROUP BY clauses. These columns are your partition key candidates. If 80% of
    queries filter by date, date is your primary partition key.
    2. Choose a partition granularity that produces partitions in the 100 MB to 1 GB range for columnar
    formats (Parquet, ORC). If daily partitions are 50 MB, use weekly or monthly partitions instead.
    If daily partitions are 10 GB, add a secondary partition key (e.g., region or tenant) to subdivide.
    3. For multi-tenant systems, consider tenant-based partitioning or a composite key (tenant + date).
    This enables partition pruning for tenant-scoped queries and simplifies data isolation for GDPR
    deletion requests — you can drop an entire tenant's partitions rather than scanning the whole dataset.
    4. In relational databases, use declarative partitioning (PostgreSQL 12+, MySQL 8.0+) with
    range partitioning for time-series data and list partitioning for categorical data (region, status).
    Verify with EXPLAIN that the query planner is actually pruning partitions.
    5. Implement automated partition lifecycle management. Create future partitions ahead of time (so
    INSERT into next month's data does not fail), archive or drop old partitions based on retention
    policy, and compact small partitions periodically.
    6. Monitor partition skew — the ratio between the largest and smallest partitions. Skew greater than
    10:1 suggests the partition key is not evenly distributed and hot partitions will become bottlenecks.
    Rebalance by choosing a more granular or composite partition key.
  mental_model: >-
    Filing cabinets organized by what you look up most often — if you always search by date, organize by date, not alphabetically.
  domains:
    domain:
    - data_engineering
    - database
    - performance
    concern:
    - data_modeling
    - optimization
  violation_consequence: >-
    Wrong partition key means queries scan all partitions instead of one (no pruning benefit). Over-partitioning creates thousands
    of tiny files that are slower to scan than a single large file. Under-partitioning creates partitions too large to fit
    in memory, causing spill-to-disk and degraded performance.
  teaching_example: >-
    A team partitioned their 500 GB events table by user_id hash for even distribution. But 95% of their dashboard queries
    filtered by event_date. Every query scanned all 256 hash partitions. Re-partitioning by month reduced query scan volume
    by 95% and dashboard load time from 45 seconds to 2 seconds.
  when_applies: >-
    Any dataset larger than 10 GB, any table with more than 50 million rows, any data lake with growing partitions, or any
    multi-tenant system requiring data isolation.
  when_not_applies: >-
    Small tables where full scans are fast enough, or workloads with unpredictable access patterns where no single partition
    key benefits the majority of queries.
  sources:
  - https://www.postgresql.org/docs/current/ddl-partitioning.html
