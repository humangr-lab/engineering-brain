- id: P-SEARCH-INDEX
  name: Search Indexes Are Read-Optimized Projections, Not Source-of-Truth
  why: |
    A search index (Elasticsearch, Solr, Meilisearch, Typesense) is a denormalized, inverted data
    structure optimized for full-text queries, faceted navigation, and fuzzy matching. It is not a
    database. This distinction matters because it determines how you architect data flow, handle
    failures, and reason about consistency. The source of truth is always the primary datastore
    (PostgreSQL, MongoDB, your event log). The search index is a derived, eventually consistent
    projection of that data, optimized for read patterns that the primary store handles poorly. When
    you treat the search index as source-of-truth, you inherit a set of problems it was never designed
    to handle: Elasticsearch has no real transactions, no referential integrity, no ACID guarantees.
    Documents can be partially updated, shards can become inconsistent, and deletes are soft (marked
    as deleted but not physically removed until a segment merge). If the index becomes corrupted or
    loses data — which happens during split-brain scenarios, disk failures, or botched upgrades — you
    must be able to rebuild it entirely from the source-of-truth datastore. This rebuild capability is
    not optional; it is the disaster recovery plan for your search infrastructure. Designing the index
    as a projection also enables schema flexibility: you can re-index with a new mapping, new analyzers,
    or new field types without touching the source data. A blue-green reindexing strategy (build the
    new index alongside the old one, switch the alias when complete) enables zero-downtime search
    schema migrations. If the search index were the source of truth, you could never rebuild it, never
    change the schema without data migration, and never recover from corruption.
  how_to_apply: |
    1. Establish a unidirectional data flow: source database -> sync mechanism (CDC, queue, batch job)
    -> search index. The search index never writes back to the source database. This flow is the
    architectural invariant that must be preserved in all designs.
    2. Implement a full reindex capability that can rebuild the search index from scratch using only the
    source-of-truth datastore. This process should be automated, runnable on demand, and tested
    quarterly. Measure reindex duration — it defines your recovery time if the index is corrupted.
    3. Use index aliases (Elasticsearch) or collection aliases (Solr) for zero-downtime reindexing.
    Build the new index with the alias new_products_v2, verify it, then atomically swap the alias
    products from the old index to the new one. The old index remains available for rollback.
    4. Store only the fields needed for search and display in the index. Do not replicate the entire
    database row. A product search index needs title, description, price, category, and image URL —
    not the full product specification, audit log, or internal metadata. Fetch additional details
    from the source database when the user clicks through.
    5. Design the sync mechanism to handle failures gracefully. If a sync message is lost, the index
    and source diverge silently. Implement periodic reconciliation: compare document counts, sample
    random documents, and verify that source and index agree. Alert on divergence.
    6. Version your index mappings and store them in source control alongside your database migrations.
    An index mapping change is a schema change and should go through the same review, testing, and
    deployment process as a database migration.
  mental_model: >-
    A search index is like a book's index at the back — it helps you find things fast, but the actual content lives in the
    chapters. If the index is wrong, you reprint it from the chapters.
  domains:
    domain:
    - search
    - architecture
    - data_engineering
    concern:
    - infrastructure
    - data_modeling
  violation_consequence: >-
    Treating the search index as source-of-truth means corruption or data loss is unrecoverable — there is nothing to rebuild
    from. Schema changes require complex data migrations instead of simple reindexing. Inconsistencies between the index and
    the actual data cause users to see search results for items that no longer exist, prices that are wrong, or content that
    has been redacted.
  teaching_example: >-
    A startup used Elasticsearch as their primary product database. During a cluster upgrade, a split-brain scenario caused
    two shards to diverge. 15% of product documents had conflicting data — different prices on different replicas. Because
    there was no source-of-truth database to rebuild from, they spent two weeks manually reconciling documents. A team that
    treated ES as a projection would have simply reindexed from PostgreSQL in 30 minutes.
  when_applies: >-
    Any system that uses a search engine alongside a primary database — e-commerce search, document search, log analytics,
    content discovery, or any application with full-text search capabilities.
  when_not_applies: >-
    Systems where the search engine is genuinely the only datastore (e.g., a log analytics platform where logs are ingested
    directly into Elasticsearch and no other copy exists by design).
  sources:
  - https://www.elastic.co/guide/en/elasticsearch/reference/current/indices.html
