- id: P-DB-INDEX
  name: Index Strategy Follows Query Patterns, Not Table Structure
  why: |
    Indexes are not decorations you add to every column — they are data structures that trade write
    performance and storage for read performance on specific access patterns. Every index must pay for
    itself: each INSERT, UPDATE, and DELETE must update every index on the table, which means unnecessary
    indexes slow down writes without speeding up any reads. The most common mistake is creating indexes
    based on table structure rather than query patterns. A developer sees a foreign key column and adds
    an index without checking whether any query actually filters or joins on that column. Conversely,
    composite queries that filter on (status, created_at) go unoptimized because neither column alone
    has an index, and the developer does not realize that a composite index on (status, created_at) would
    serve the query from the index alone. Index column order matters profoundly: a composite index on
    (A, B, C) can serve queries filtering on A, on (A, B), or on (A, B, C), but not on B alone or
    (B, C). This is the leftmost prefix rule, and violating it means the index exists but is never used.
    Partial indexes — indexes that only include rows matching a WHERE clause — are underutilized.
    If 95% of your queries filter for status='active', a partial index on active rows is smaller, faster
    to scan, and faster to maintain than a full index. Similarly, covering indexes that include all
    columns needed by a query eliminate table lookups entirely, turning a random I/O operation into a
    sequential index scan. The right indexing strategy can improve query performance by 100x. The wrong
    strategy wastes disk, slows writes, and provides zero read benefit.
  how_to_apply: |
    1. Start by collecting the top 20 queries by frequency and latency from your slow query log or APM
    tool. These are the queries your indexes must serve. Do not guess — measure actual production traffic.
    2. For each query, run EXPLAIN ANALYZE (PostgreSQL) or EXPLAIN FORMAT=JSON (MySQL) to see the current
    execution plan. Look for sequential scans on large tables, nested loop joins without index support,
    and sort operations that spill to disk.
    3. Design composite indexes with the leftmost prefix rule in mind. Place equality filters first
    (status = 'active'), then range filters (created_at > '2025-01-01'), then sort columns. This order
    maximizes the portion of the index the query engine can use.
    4. Consider covering indexes for your highest-frequency queries. If a query only needs (id, name,
    status), an index on (status, name) INCLUDE (id) can serve the entire query from the index without
    touching the table heap.
    5. Use partial indexes for queries that consistently filter on a subset of rows. An index on
    (user_id) WHERE deleted_at IS NULL is smaller and faster than a full index on (user_id) when 30%
    of rows are soft-deleted.
    6. Review and drop unused indexes quarterly. Use pg_stat_user_indexes (PostgreSQL) or
    sys.dm_db_index_usage_stats (SQL Server) to identify indexes with zero scans. Each unused index is
    pure overhead on every write operation.
  mental_model: >-
    Indexes are like book indexes — you create entries for topics readers actually look up, not for every word on every page.
  domains:
    domain:
    - database
    - performance
    concern:
    - data_modeling
    - optimization
  violation_consequence: >-
    Over-indexing slows writes by 2-5x and wastes storage. Under-indexing forces full table scans on millions of rows, turning
    sub-millisecond queries into multi-second operations. Mis-ordered composite indexes give a false sense of coverage while
    the query planner ignores them entirely.
  teaching_example: >-
    A SaaS team had 12 indexes on their events table but queries filtering by (tenant_id, event_type, created_at) still did
    full scans. None of the 12 indexes had tenant_id as the leftmost column. Adding one composite index on (tenant_id, event_type,
    created_at) dropped p99 latency from 4.2s to 8ms.
  when_applies: >-
    Any relational or document database where query performance matters — which is virtually every production system with
    more than trivial data volumes.
  when_not_applies: >-
    Tiny tables (under 10K rows) where full scans are faster than index lookups, or write-only append logs where no reads
    occur.
  sources:
  - https://www.postgresql.org/docs/current/indexes.html
  - https://use-the-index-luke.com/
  text: >-
    Index Strategy Follows Query Patterns, Not Table Structure: Indexes are like book indexes — you create entries for topics
    readers actually look up, not for every word on every page.
  severity: medium
  technologies:
    lang:
    - python
    - sql
  how_to_do_right: |-
    1. Start by collecting the top 20 queries by frequency and latency from your slow query log or APM
    tool. These are the queries your indexes must serve. Do not guess — measure actual production traffic.
