    # Result: turning a 5-minute rollback into a multi-hour data recovery operation. In the worst case
- id: P-DB-BACKUP
  name: Backups That Are Never Tested Are Not Backups
  why: |
    A backup is not a file sitting on a disk — it is the proven ability to restore your system to a
    known good state within a defined time window. The distinction is critical because untested backups
    fail in ways that are invisible until the moment you need them most. Common failure modes include:
    backup files that are corrupted because the backup process did not flush WAL/binlog before copying,
    backups that are incomplete because a new table was added after the backup script was written,
    backups stored on the same physical disk as the database (fire destroys both), backups encrypted
    with a key that nobody can locate, and backups that technically restore but take 18 hours when your
    Recovery Time Objective (RTO) is 1 hour. Each of these failures is undetectable without periodic
    restore testing. The industry standard is to define two metrics: Recovery Point Objective (RPO) —
    how much data loss is acceptable — and Recovery Time Objective (RTO) — how long a full outage is
    acceptable. Your backup strategy must satisfy both. Continuous WAL archiving with a 1-minute RPO is
    useless if the restore process takes 24 hours and your RTO is 4 hours. Point-in-time recovery (PITR)
    is essential for any system where data matters, because it lets you restore to the moment before a
    destructive operation (accidental DELETE, corrupted migration, ransomware encryption). Without PITR,
    you can only restore to the last full backup, which might be hours or days old. Teams that treat
    backups as a checkbox item — "yes, we have backups" — discover the hard way that having backups and
    being able to restore are entirely different things.
  how_to_apply: |
    1. Define RPO and RTO for every database in your system. Write these numbers down in your runbook
    and get stakeholder sign-off. A payment database might need RPO=0 (synchronous replication) and
    RTO=15 minutes, while an analytics database might tolerate RPO=24 hours and RTO=48 hours.
    2. Implement automated backup verification that runs at least weekly. This means: restore the backup
    to a separate instance, run a set of validation queries (row counts, checksum of critical tables,
    schema comparison), and alert if any check fails. The restore test must be fully automated — no
    human intervention.
    3. Store backups in at least two geographic regions, on storage that is independent of the primary
    database infrastructure. If your database is on AWS us-east-1, your backup should be on us-west-2
    or in a different cloud provider entirely. Test cross-region restore latency to ensure it meets RTO.
    4. Enable point-in-time recovery (PITR) for all production databases. For PostgreSQL, this means
    continuous WAL archiving to S3/GCS. For MySQL, this means binlog shipping. Verify that you can
    restore to an arbitrary timestamp within your retention window.
    5. Encrypt backups at rest and in transit, and store encryption keys separately from the backups
    themselves. Document the key location and rotation procedure. Test that you can decrypt and restore
    using the documented key retrieval process.
    6. Conduct a full disaster recovery drill quarterly. Simulate a complete database loss and restore
    from backups under time pressure. Measure actual RTO and compare against your target. Document gaps
    and fix them before the next drill.
  mental_model: >-
    A fire extinguisher that has never been inspected might be empty — the only way to know your backup works is to use it
    before you need it.
  domains:
    domain:
    - database
    - operations
    - reliability
    concern:
    - disaster_recovery
  violation_consequence: >-
    When data loss occurs — and it will — untested backups fail to restore, turning a recoverable incident into a catastrophic
    one. Teams discover missing tables, corrupted files, or expired encryption keys during the worst possible moment: a production
    outage with stakeholders watching.
  teaching_example: >-
    A fintech startup ran nightly pg_dump backups for two years without testing restores. When a developer accidentally ran
    DELETE FROM transactions without a WHERE clause, they discovered the backup files were empty — the pg_dump cron job had
    been silently failing for 3 months due to a password rotation. Two years of transaction history were unrecoverable.
  when_applies: >-
    Every production database, every staging database with realistic data, and any system where data loss would have business,
    legal, or reputational consequences.
  when_not_applies: >-
    Ephemeral development databases that are recreated from migrations and seed data, or caches that can be rebuilt from source-of-truth
    systems.
  sources:
  - https://www.postgresql.org/docs/current/continuous-archiving.html
  text: >-
    Backups That Are Never Tested Are Not Backups: A fire extinguisher that has never been inspected might be empty — the
    only way to know your backup works is to use it before you need it.
  severity: critical
  technologies:
    lang:
    - python
    - sql
  how_to_do_right: |-
    1. Define RPO and RTO for every database in your system. Write these numbers down in your runbook
    and get stakeholder sign-off. A payment database might need RPO=0 (synchronous replication) and
