    # Result: Oversized pools cause connection starvation at the database level
    # Result: where hundreds of connections compete for CPU and memory
- id: P-DATA-IMMUTABLE
  name: Immutable Data Structures Prevent Entire Categories of Bugs
  why: |
    Mutable shared state is the root cause of the most difficult bugs in software: race conditions,
    stale reads, phantom updates, and lost writes. When two threads, two microservices, or two pipeline
    stages can modify the same data structure, the number of possible interleavings grows combinatorially,
    making the system impossible to reason about and nearly impossible to test exhaustively. Immutability
    eliminates these bugs by construction, not by convention. An immutable record cannot be modified after
    creation — any "change" produces a new record, leaving the original intact. This means every
    reference to the original record sees the same data, regardless of concurrency. In data engineering,
    immutability manifests as append-only event logs, immutable data lake partitions, and versioned
    datasets. Instead of updating a customer record in place, you append a new version with a timestamp.
    This gives you a complete audit trail for free, makes time-travel queries trivial, and eliminates
    the possibility of partial updates corrupting the record. The Lambda Architecture and its successors
    are built on this insight: the raw data layer is append-only and immutable; transformations produce
    new immutable datasets. When a transformation has a bug, you fix the code and re-run it against the
    immutable input — the original data is never corrupted. In application code, immutable data
    structures (frozen dataclasses, persistent data structures, Clojure-style maps) enable fearless
    concurrency because no synchronization is needed for read access. The performance overhead of
    creating new objects instead of mutating existing ones is negligible with modern garbage collectors
    and structural sharing, and the debugging time saved is enormous.
  how_to_apply: |
    1. Default to immutable in your data models. In Python, use frozen=True on dataclasses and
    Pydantic models. In TypeScript, use Readonly<T> and Object.freeze(). In Java, use record classes.
    Only make fields mutable when you have a measured performance reason to do so.
    2. Design data pipelines as append-only transformations. Raw data lands in an immutable staging
    area (S3 partitions, immutable Kafka topics). Each processing stage reads from immutable input and
    writes to new immutable output. Never modify source data in place.
    3. Use event sourcing or CDC for state that must evolve over time. Instead of UPDATE customer SET
    address = '...', emit an AddressChanged event. The current state is derived by replaying events.
    This gives you a complete audit trail and the ability to reconstruct state at any point in time.
    4. When mutation is genuinely necessary (e.g., hot caches, in-memory aggregations), isolate it
    behind a clear API boundary. Use copy-on-write semantics so callers receive their own snapshot.
    Document which components own mutable state and which only read it.
    5. Version your datasets. Instead of overwriting yesterday's aggregation with today's, write to a
    new partition or path (e.g., /data/aggregated/dt=2026-02-26/). This enables rollback, comparison
    between versions, and debugging of pipeline regressions.
  mental_model: >-
    A signed contract in a filing cabinet — once signed, nobody can alter the original. Amendments are new documents that
    reference the original.
  domains:
    domain:
    - data_engineering
    - architecture
    concern:
    - data_modeling
    - concurrency
  violation_consequence: >-
    Mutable shared state leads to race conditions that manifest as intermittent, unreproducible bugs. In data pipelines, in-place
    mutation means a bug in one stage permanently corrupts the source data, requiring restoration from backups. Without versioning,
    there is no way to compare what the data looked like before and after a problematic transformation.
  teaching_example: >-
    A data team's ETL job updated dimension tables in place. A bug in the currency conversion logic overwrote correct USD
    values with incorrect EUR conversions. Because the original data was mutated, they could not identify which rows were
    affected. With an append-only approach, they could have simply re-run the pipeline from the last known-good version of
    the immutable source.
  when_applies: >-
    Data pipelines, event-driven systems, concurrent applications, any system where audit trails or time-travel queries are
    valuable.
  when_not_applies: >-
    Tight inner loops with extreme performance requirements where object allocation overhead is measurable, or embedded systems
    with hard memory constraints.
  sources:
  - https://martinfowler.com/bliki/ValueObject.html
