- id: P-DATA-SCHEMA-EVOLUTION
  name: Schemas Evolve — Consumers Must Tolerate Additions Gracefully
  why: |
    In any system with more than one service, data schemas (API payloads, message queue events, file
    formats) are shared contracts between producers and consumers. Schemas will evolve — new fields are
    added, optional fields become required, enums gain new values. The question is whether this evolution
    breaks consumers or not. Backward compatibility means new data can be read by old consumers.
    Forward compatibility means old data can be read by new consumers. Full compatibility (both) is the
    gold standard for schema evolution. The most common violation is a consumer that fails when it
    encounters an unknown field. A JSON deserializer configured with "fail on unknown properties" will
    throw an exception the moment the producer adds a new field, even if the consumer does not need that
    field. This creates invisible coupling: the producer cannot evolve without coordinating with every
    consumer, which in a microservices architecture means every deployment becomes a distributed
    coordination problem. Schema registries (Confluent Schema Registry, AWS Glue Schema Registry)
    enforce compatibility rules automatically. When a producer attempts to register a schema version
    that breaks backward compatibility — such as removing a field or changing a type — the registry
    rejects it. This shifts the compatibility check from runtime (production outage) to build time
    (CI failure). Avro, Protobuf, and JSON Schema all support schema evolution natively, with
    well-defined rules for which changes are backward-compatible and which are not. Using raw JSON
    without a schema registry means compatibility is enforced by convention alone — and convention
    breaks at 3 AM when a developer adds a field without checking downstream consumers.
  how_to_apply: |
    1. Use a schema definition language (Protobuf, Avro, JSON Schema) for all inter-service
    communication. Define schemas explicitly rather than inferring them from code. Store schemas in a
    version-controlled repository that both producers and consumers reference.
    2. Configure consumers to ignore unknown fields. In Jackson (Java), set
    DeserializationFeature.FAIL_ON_UNKNOWN_PROPERTIES to false. In Pydantic (Python), set
    model_config = ConfigDict(extra='ignore'). This single setting prevents the most common
    schema evolution failure.
    3. Never remove fields or change field types in a non-major version. Instead, deprecate the old
    field (add a @deprecated annotation or schema comment), add the new field alongside it, and give
    consumers a migration window measured in months, not days.
    4. Use a schema registry for event-driven systems. Configure it to enforce backward compatibility
    by default. Integrate schema compatibility checks into your CI pipeline so that incompatible changes
    are caught before merge, not after deployment.
    5. For file-based data exchange (Parquet, CSV, JSON Lines), include a schema version field in every
    file or partition. Consumers check the version and select the appropriate deserialization logic.
    This enables gradual migration without big-bang cutover.
    6. Test schema evolution explicitly in your integration test suite. Produce a message with the new
    schema version and verify that consumers running the old code can process it without errors. This
    catches compatibility regressions before they reach production.
  mental_model: >-
    A power outlet that accepts both two-prong and three-prong plugs — new appliances get grounding, but old ones still work.
  domains:
    domain:
    - data_engineering
    - architecture
    - api
    concern:
    - data_modeling
    - integration
  violation_consequence: >-
    A producer adding a single new field to an event causes deserialization failures in every consumer that does not tolerate
    unknown fields. In a microservices architecture with 15 consumers of a shared event, this means 15 teams must deploy fixes
    simultaneously — or the producer cannot deploy at all.
  teaching_example: >-
    A team added a 'metadata' field to their OrderCreated event. Three downstream services crashed because their Avro consumers
    were configured with strict schema matching. The incident required a coordinated rollback of the producer, a schema compatibility
    policy was adopted the following week, and all consumers were reconfigured to tolerate additions.
  when_applies: >-
    Any system where data is shared between independently deployed components — microservices, data pipelines, event-driven
    architectures, public APIs.
  when_not_applies: >-
    Monolithic applications where the producer and consumer are in the same deployment unit and change atomically, or throwaway
    prototypes with a single developer.
  sources:
  - https://martinfowler.com/articles/schemaVersioning.html
  text: >-
    Schemas Evolve — Consumers Must Tolerate Additions Gracefully: A power outlet that accepts both two-prong and three-prong
    plugs — new appliances get grounding, but old ones still work.
  severity: high
  technologies:
    lang:
    - python
  how_to_do_right: |-
    1. Use a schema definition language (Protobuf, Avro, JSON Schema) for all inter-service
    communication. Define schemas explicitly rather than inferring them from code. Store schemas in a
    version-controlled repository that both producers and consumers reference.
    2. Configure consumers to ignore unknown fields. In Jackson (Java), set
    DeserializationFeature.FAIL_ON_UNKNOWN_PROPERTIES to false. In Pydantic (Python), set
    model_config = ConfigDict(extra='ignore'). This single setting prevents the most common
    schema evolution failure.
    3. Never remove fields or change field types in a non-major version. Instead, deprecate the old
    field (add a @deprecated annotation or schema comment), add the new field alongside it, and give
    consumers a migration window measured in months, not days.
    4. Use a schema registry for event-driven systems. Configure it to enforce backward compatibility
    by default. Integrate schema compatibility checks into your CI pipeline so that incompatible changes
    are caught before merge, not after deployment.
    5. For file-based data exchange (Parquet, CSV, JSON Lines), include a schema version field in every
    file or partition. Consumers check the version and select the appropriate deserialization logic.
    This enables gradual migration without big-bang cutover.
    6. Test schema evolution explicitly in your integration test suite. Produce a message with the new
    schema version and verify that consumers running the old code can process it without errors. This
