    10:1 suggests the partition key is not evenly distributed and hot partitions will become bottlenecks.
    Rebalance by choosing a more granular or composite partition key.
  example_good: |-
    # A team partitioned their 500 GB events table by user_id hash for even distribution.
    # But 95% of their dashboard queries filtered by event_date.
    # Every query scanned all 256 hash partitions.
    # Re-partitioning by month reduced query scan volume by 95% and dashboard load time from 45 seconds to 2 seconds.
  example_bad: |-
    # Anti-pattern: Violating Partition Data by Access Pattern, Not by Size Alone
    # Result: Wrong partition key means queries scan all partitions instead of one (no pruning benefit). Over-partitioning creates thousands of tiny files that are slower to scan than a single large file. Under-partitioning creates partitions too large to fit in memory
    # Result: causing spill-to-disk and degraded performance.
- id: P-CACHE-INVALIDATE
  name: Cache Invalidation Is One of the Two Hard Problems — Be Explicit About TTL and Eviction
  why: |
    Phil Karlton's famous quote — "There are only two hard things in Computer Science: cache invalidation
    and naming things" — endures because cache invalidation genuinely is one of the most error-prone
    areas in system design. A cache exists to serve stale data fast. The fundamental tension is that
    "stale" and "fast" are in direct opposition: the longer you cache, the faster you serve but the
    staler the data becomes. Every caching decision is a bet on how long data will remain valid, and
    every bet is wrong some percentage of the time. The failure modes are subtle and severe. A cache
    that never expires serves stale data indefinitely — users see old prices, old inventory counts,
    old permissions. A cache that expires too aggressively provides no performance benefit because every
    request hits the origin. A cache that is invalidated on write but not on delete serves phantom
    records. A cache that is invalidated per-key but not when related data changes serves inconsistent
    aggregations (the order total does not match the sum of line items because the line items were
    invalidated but the order total was not). The root cause of most caching bugs is implicit
    invalidation — developers assume the cache will "figure it out" without explicitly defining when
    and how each cached value becomes invalid. Explicit TTLs, explicit eviction triggers, and explicit
    cache key design prevent these assumptions from becoming production incidents. Every cached value
    must have a defined answer to three questions: when does it expire? what events invalidate it? and
    what is the acceptable staleness window? If you cannot answer all three, you should not cache that
    value.
  how_to_apply: |
    1. Define an explicit TTL for every cached value. Do not use "cache forever" as a default. Start
    with conservative TTLs (60 seconds for frequently changing data, 5 minutes for semi-static data,
    1 hour for configuration) and adjust based on cache hit rates and staleness complaints.
    2. Document the invalidation strategy for each cache key pattern. Write down what events should
    invalidate each cache: database writes, API calls, external webhook notifications, scheduled
    refreshes. Store this documentation alongside the caching code, not in a separate wiki.
    3. Use cache-aside (lazy loading) as the default pattern: check cache, if miss then load from
    source, store in cache, return. This is the simplest pattern and handles cold starts gracefully.
    Only use write-through or write-behind when you have specific latency requirements that cache-aside
    cannot meet.
    4. Design cache keys to be invalidatable. If you cache user profiles under key user:{id}, you can
    invalidate a single user. If you cache search results under key search:{query_hash}, you cannot
    invalidate results that contain a specific product that just changed. Think about invalidation
    granularity when designing keys.
    5. Implement cache stampede protection. When a popular cache key expires and 1,000 concurrent
    requests all miss simultaneously, they all hit the origin database. Use request coalescing
    (singleflight), probabilistic early expiration (jitter), or a lock-based refresh mechanism to
    ensure only one request refreshes the cache.
    6. Monitor cache hit rate, miss rate, eviction rate, and staleness (time since last refresh). Alert
    when hit rate drops below 80% (cache is not helping) or when eviction rate spikes (cache is too
    small). A cache with a 50% hit rate is adding complexity without sufficient benefit.
  mental_model: >-
    A newspaper vending machine — it serves yesterday's paper until someone loads today's edition. If nobody loads it, customers
    get stale news indefinitely.
  domains:
    domain:
    - caching
    - architecture
    - performance
    concern:
    - infrastructure
    - optimization
  violation_consequence: >-
    Implicit or missing invalidation leads to stale data served to users — outdated prices, revoked permissions still granting
    access, deleted content still visible. Cache stampedes under high traffic cause origin database overload at the worst
    possible moment. Unbounded caches consume memory until the process is OOM-killed.
  teaching_example: >-
    An e-commerce site cached product prices with no TTL. A flash sale changed prices in the database, but the cache continued
    serving the old prices for 4 hours until a deploy flushed the cache. Customers who purchased during those 4 hours were
    charged the wrong price, requiring manual refunds and a public apology.
  when_applies: >-
    Any system that caches data — in-memory caches (Redis, Memcached), CDN caches, browser caches, application-level memoization,
    or HTTP response caches.
  when_not_applies: >-
    Immutable data that genuinely never changes (cryptographic hashes, historical records), where caching indefinitely is
    correct by definition.
  sources:
  - https://martinfowler.com/bliki/TwoHardThings.html
  - https://redis.io/docs/latest/develop/use/client-side-caching/
