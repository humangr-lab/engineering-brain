- id: P-DB-MIGRATION
  name: Schema Migrations Must Be Backward-Compatible and Reversible
  why: |
    In any system with more than one deployment per month, the database schema and the application code
    are not deployed atomically. There is always a window — seconds to minutes in blue-green deployments,
    hours to days in staged rollouts — where the old application code runs against the new schema, or
    the new application code runs against the old schema. If a migration renames a column, the old code
    that references the original column name breaks immediately. If a migration adds a NOT NULL column
    without a default, every INSERT from the old code fails. This is the fundamental reason migrations
    must be backward-compatible: both the old and new application versions must work against the migrated
    schema. The expand-contract pattern addresses this systematically. In the expand phase, you add the
    new column (nullable, with a default) alongside the old one, and write to both. In the contract
    phase — after all application instances are running the new code — you drop the old column. Each
    phase is independently safe because neither breaks the running application. Reversibility is equally
    critical. A migration that drops a column or changes a column type cannot be rolled back without
    data loss. Every migration should have a tested down migration that restores the previous schema
    state. Teams that skip down migrations discover the gap at 2 AM during an incident when rolling
    back the application deployment does not roll back the schema, leaving the system in an inconsistent
    state. The cost of writing and testing down migrations is trivial compared to the cost of a
    production incident with no rollback path.
  how_to_apply: |
    1. Adopt the expand-contract pattern for all breaking schema changes. Never rename a column in one
    step. Instead: add the new column, backfill data, update application code to write to both columns,
    deploy, then remove the old column in a subsequent migration.
    2. Every migration must have a corresponding down migration that is tested in CI. Run the up
    migration, verify the schema, run the down migration, verify the schema returns to its original
    state. Automate this as part of your migration test suite.
    3. Never add NOT NULL columns without a DEFAULT value. The old application code that does not know
    about the new column will INSERT rows without it, causing constraint violations. Add the column as
    nullable or with a default, then enforce NOT NULL in a later migration after all code paths populate it.
    4. Use advisory locks or migration locking mechanisms to prevent concurrent migrations. Two developers
    running migrations simultaneously can produce an inconsistent schema state that neither migration's
    down path can cleanly reverse.
    5. For large tables (millions of rows), use online DDL tools (pt-online-schema-change for MySQL,
    pg_repack for PostgreSQL) to avoid holding locks that block reads and writes for minutes or hours.
    Test migration duration on a production-sized dataset before running in production.
    6. Maintain a migration runbook that documents the expected duration, rollback procedure, and
    verification queries for each migration. Review this runbook before deploying to production.
  mental_model: >-
    Renovating a house while people live in it — you build the new room before tearing down the old one, and you always keep
    a path back to the original floor plan.
  domains:
    domain:
    - database
    - devops
    concern:
    - data_modeling
    - deployment
  violation_consequence: >-
    Non-backward-compatible migrations cause immediate outages during deployment windows when old code meets new schema. Irreversible
    migrations eliminate the rollback option during incidents, turning a 5-minute rollback into a multi-hour data recovery
    operation. In the worst case, dropped columns mean permanent data loss.
  teaching_example: >-
    A team renamed 'username' to 'display_name' in one migration. During the rolling deployment, the old application pods
    (still referencing 'username') threw 500 errors for 12 minutes until all pods were updated. A backward-compatible approach
    — add display_name, backfill, deploy new code, drop username — would have caused zero downtime.
  when_applies: >-
    Any system with a relational database that evolves over time, especially systems with rolling deployments, blue-green
    deployments, or multiple services sharing a database.
  when_not_applies: >-
    Greenfield prototypes with no production traffic where you can drop and recreate the database freely, or schemaless stores
    where the application handles schema evolution.
  sources:
  - https://martinfowler.com/articles/evodb.html
  text: >-
    Schema Migrations Must Be Backward-Compatible and Reversible: Renovating a house while people live in it — you build the
    new room before tearing down the old one, and you always keep a path back to the original floor plan.
  severity: critical
  technologies:
    lang:
    - python
    - sql
  how_to_do_right: |-
    1. Adopt the expand-contract pattern for all breaking schema changes. Never rename a column in one
    step. Instead: add the new column, backfill data, update application code to write to both columns,
    deploy, then remove the old column in a subsequent migration.
    2. Every migration must have a corresponding down migration that is tested in CI. Run the up
    migration, verify the schema, run the down migration, verify the schema returns to its original
    state. Automate this as part of your migration test suite.
    3. Never add NOT NULL columns without a DEFAULT value. The old application code that does not know
    about the new column will INSERT rows without it, causing constraint violations. Add the column as
    nullable or with a default, then enforce NOT NULL in a later migration after all code paths populate it.
    4. Use advisory locks or migration locking mechanisms to prevent concurrent migrations. Two developers
