- id: P-DB-NORMALIZE
  name: Normalize Until It Hurts, Denormalize Until It Works
  why: |
    Normalization exists to eliminate data redundancy and update anomalies. When you store a customer's
    address in both the orders table and the customers table, a single address change requires updating
    every row in orders that references that customer. Miss one and you have inconsistent data — shipping
    labels go to the old address while invoices go to the new one. This is not a theoretical concern:
    update anomalies are among the top five root causes of data quality incidents in production systems.
    Third Normal Form (3NF) guarantees that every non-key attribute depends on the key, the whole key,
    and nothing but the key, which eliminates transitive dependencies and ensures a single source of truth
    for every fact. However, normalization comes at a cost: joins. A fully normalized OLTP schema for an
    e-commerce system might require six or seven joins to assemble a single order summary. For read-heavy
    dashboards or analytics queries, those joins become the bottleneck. Denormalization — strategically
    duplicating data into materialized views, summary tables, or flattened columns — trades write
    complexity for read performance. The critical mistake teams make is denormalizing prematurely, before
    measuring actual query performance with proper indexes. The second critical mistake is denormalizing
    without documenting which query pattern each denormalization serves. Six months later, nobody
    remembers why the orders table has 47 columns, and any schema change requires modifying both the
    normalized source and every denormalized copy. The discipline is to start normalized, measure under
    realistic load, and denormalize surgically — one query pattern at a time — with explicit documentation
    linking each denormalization to the access pattern that justified it.
  how_to_apply: |
    1. Start with Third Normal Form (3NF) for all OLTP workloads. Every table should represent a single
    entity, every column should depend on the primary key alone, and foreign keys should reference
    canonical tables. Do not skip this step even if you anticipate high read traffic.
    2. Identify read-heavy access patterns by analyzing slow query logs, EXPLAIN plans, and application
    profiling data. Rank queries by frequency multiplied by latency. Focus on the top five queries that
    account for the majority of database load.
    3. Before denormalizing, exhaust indexing options. Composite indexes, covering indexes, and partial
    indexes often eliminate the need for denormalization entirely. A covering index that serves a
    dashboard query from the index alone is cheaper than maintaining a denormalized table.
    4. When a query genuinely requires denormalization, choose the lightest-weight approach first:
    materialized views with scheduled refresh, computed columns, or database-level generated columns.
    Only create separate denormalized tables when these lighter approaches are insufficient.
    5. Document every denormalization in a decision record that includes the specific query it optimizes,
    the measured performance improvement, and the refresh/sync mechanism. Store this alongside your
    migration files so future developers can trace why each denormalized structure exists.
    6. Implement consistency checks — either triggers, CDC pipelines, or scheduled reconciliation jobs —
    to detect when denormalized copies drift from the normalized source. Alert on drift before users
    discover it.
  mental_model: >-
    A library catalog (normalized) vs. photocopying pages into every reading room (denormalized) — the catalog is always correct,
    but sometimes you need local copies for speed.
  domains:
    domain:
    - database
    - architecture
    concern:
    - data_modeling
  violation_consequence: >-
    Premature denormalization leads to update anomalies, inconsistent data across tables, and schema rigidity. Teams spend
    more time synchronizing redundant columns than they saved on joins. Worse, subtle inconsistencies erode trust in the data
    — analysts stop believing reports, and engineers add defensive checks everywhere.
  teaching_example: >-
    An e-commerce team denormalized product prices into the orders table for fast reporting. When a price correction was applied
    to the products table, historical orders still showed the old price, but new orders showed the corrected one. The finance
    team flagged a $200K discrepancy in quarterly revenue reports.
  when_applies: >-
    Any relational database design, especially OLTP systems where data integrity matters and read/write ratios vary across
    use cases.
  when_not_applies: >-
    Append-only analytics stores (data lakes, columnar warehouses) where data arrives pre-joined and immutability eliminates
    update anomalies.
  sources:
  - https://www.postgresql.org/docs/current/ddl-basics.html
  - https://martinfowler.com/bliki/DataModel.html
