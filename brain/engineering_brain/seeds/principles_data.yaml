- id: P-SEARCH-FACETED
  name: Faceted Navigation Requires Pre-Computed Aggregations — Don't Compute at Query Time
  why: |
    Faceted navigation is the UI pattern where search results include counts for each category, price
    range, brand, rating, and other attributes — allowing users to progressively narrow results. It is
    the primary navigation mechanism for e-commerce, job boards, real estate sites, and any system with
    structured, filterable content. The performance challenge is that computing facet counts requires
    aggregating over the entire result set for each facet dimension simultaneously. A product search
    with 10 facets (category, brand, price range, rating, color, size, material, availability, seller,
    shipping speed) requires 10 aggregation queries over potentially millions of matching documents —
    all within the latency budget of a single page load (typically 200-500ms). Naive implementations
    compute these aggregations at query time using the search engine's aggregation framework. This works
    at small scale but degrades as data and traffic grow: each aggregation must scan every matching
    document, count distinct values, and return sorted buckets. For a query matching 500,000 documents
    with 10 facets, that is 5 million document-facet evaluations per search request. At 100 searches
    per second, that is 500 million evaluations per second — far beyond what a single search cluster
    can handle with acceptable latency. The solution is pre-computation. Facet counts for common
    queries can be computed in batch or incrementally (using CDC), cached in Redis or a dedicated
    aggregation store, and served directly without touching the search engine. For dynamic facets
    (counts that depend on the current filter selection), a hybrid approach works: pre-compute facets
    for broad queries (category pages, homepage) and compute dynamically only for narrow, long-tail
    queries where the result set is small enough to aggregate quickly. This is the same principle as
    materialized views in databases: trade write-time computation for read-time speed.
  how_to_apply: |
    1. Identify your top 50 faceted queries by traffic volume. These are typically category landing
    pages, homepage search, and popular filter combinations. These queries account for 80-90% of faceted
    navigation traffic and are the candidates for pre-computation.
    2. Build a facet pre-computation pipeline that runs on a schedule (every 5-15 minutes) or is
    triggered by CDC events from the product/content database. This pipeline computes facet counts for
    the top queries and stores them in a fast key-value store (Redis) keyed by query fingerprint.
    3. For dynamic facets (counts that change based on the user's current filter selections), use the
    search engine's native aggregation but limit the scope. Apply all user-selected filters first to
    reduce the result set, then compute aggregations only on the filtered set. A query matching 500
    documents aggregates in milliseconds; a query matching 500,000 does not.
    4. Implement approximate counts for high-cardinality facets. Instead of exact counts per brand
    across millions of products, use HyperLogLog or sampling-based approximations. Users do not notice
    the difference between "1,234 results" and "~1,200 results," but the computation cost differs by
    orders of magnitude.
    5. Cache facet results at the HTTP layer (CDN, reverse proxy) for anonymous/non-personalized
    queries. A category page's facet counts are identical for all users and change infrequently —
    serving them from a CDN edge cache eliminates the computation entirely for repeat visitors.
    6. Monitor facet computation latency as a separate metric from search result latency. Alert when
    facet computation exceeds 100ms (it is often the slowest component of a search response). Profile
    which facets are most expensive and consider pre-computing or caching them individually.
  mental_model: >-
    A grocery store with aisle signs showing product counts (pre-computed when shelves are stocked) vs. a store clerk who
    counts items in every aisle each time a customer asks — the sign is instant, the clerk is a bottleneck.
  domains:
    domain:
    - search
    - performance
    - architecture
    concern:
    - optimization
    - user_experience
  violation_consequence: >-
    Computing all facets at query time causes search latency to spike as the dataset grows. A category page that loads in
    200ms with 10,000 products takes 3 seconds with 1 million products because aggregations scale linearly with result set
    size. Users abandon slow-loading pages, conversion rate drops, and the search team is pressured to reduce the number of
    facets rather than fix the architecture.
  teaching_example: >-
    An e-commerce site with 2 million products computed 12 facets at query time using Elasticsearch aggregations. Category
    pages took 2.8 seconds to load. They pre-computed facets for the top 200 category queries (covering 85% of traffic) into
    Redis, computed dynamically for the remaining 15%, and added CDN caching for anonymous users. Page load dropped to 180ms,
    and Elasticsearch cluster CPU dropped from 78% to 35%.
  when_applies: >-
    Any search-driven interface with faceted navigation, especially with datasets exceeding 100,000 documents or traffic exceeding
    50 queries per second per facet dimension.
  when_not_applies: >-
    Simple search interfaces without faceted navigation, or small datasets (under 10,000 documents) where real-time aggregation
    completes in single-digit milliseconds.
