    # When traffic increased, the query cache thrashed constantly — every INSERT invalidated dozens of cached SELECT results, and the mutex contention on the query cache itself became the primary bottleneck.
    # Disabling the query cache and implementing application-level caching with Redis reduced p99 latency by 70%.
