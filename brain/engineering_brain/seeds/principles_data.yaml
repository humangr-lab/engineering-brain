    # Result: A producer adding a single new field to an event causes deserialization failures in every consumer that does not tolerate unknown fields. In a microservices architecture with 15 consumers of a shared event
    # Result: this means 15 teams must deploy fixes simultaneously — or the producer cannot deploy at all.
- id: P-DATA-CDC
  name: Capture Changes at the Source, Not by Polling
  why: |
    Change Data Capture (CDC) reads the database's transaction log (WAL in PostgreSQL, binlog in MySQL,
    oplog in MongoDB) to capture every INSERT, UPDATE, and DELETE as it happens. This is fundamentally
    different from polling, where a separate process periodically queries the database for rows with a
    modified_at timestamp newer than the last check. Polling has four critical problems that CDC solves.
    First, polling misses deletes entirely unless you implement soft deletes, because a deleted row is
    no longer in the table to be queried. Second, polling misses rapid changes: if a row is updated
    three times between two poll intervals, only the final state is captured — the intermediate states
    are lost. Third, polling adds load to the source database, because every poll cycle executes a query
    that scans for recent changes, consuming CPU and I/O that could serve production traffic. On large
    tables, this query can be expensive even with an index on modified_at. Fourth, polling introduces
    latency proportional to the poll interval: if you poll every 5 minutes, changes are up to 5 minutes
    stale. Reducing the interval increases database load. CDC eliminates all four problems. It captures
    every change (including deletes), preserves intermediate states, adds negligible load to the database
    (reading the transaction log is a sequential read operation, not a query), and delivers changes with
    sub-second latency. Tools like Debezium, Maxwell, and AWS DMS make CDC operationally accessible.
    The log-based approach also naturally produces an ordered stream of events, which is the foundation
    for event-driven architectures, real-time analytics, and materialized view maintenance.
  how_to_apply: |
    1. Enable logical replication or binlog on your source database. For PostgreSQL, set
    wal_level=logical in postgresql.conf. For MySQL, enable binlog_format=ROW. These are prerequisites
    for any CDC tool and have minimal performance impact.
    2. Deploy a CDC connector (Debezium is the industry standard for open-source). Configure it to
    capture changes from the specific tables you need, not the entire database. Each table becomes a
    topic or stream of change events containing the before and after state of each row.
    3. Route CDC events through a durable message broker (Kafka, Pulsar, Kinesis). Do not connect CDC
    directly to consumers — the broker provides backpressure handling, replay capability, and
    decoupling between the capture rate and the consumption rate.
    4. Handle schema evolution in CDC events by using a schema registry. Debezium integrates with
    Confluent Schema Registry to version the schema of each table's change events, ensuring consumers
    can handle schema changes gracefully.
    5. Implement idempotent consumers. CDC guarantees at-least-once delivery, which means consumers may
    see the same change event more than once during connector restarts or rebalances. Use the event's
    LSN (Log Sequence Number) or transaction ID as a deduplication key.
    6. Monitor CDC lag — the difference between when a change occurred in the database and when it was
    delivered to consumers. Alert if lag exceeds your latency SLA. Common causes of lag include
    connector misconfiguration, broker backpressure, and large transactions that produce millions of
    change events at once.
  mental_model: >-
    A security camera (CDC) that records everything continuously vs. a guard (polling) who checks the building every 5 minutes
    and misses what happens in between.
  domains:
    domain:
    - data_engineering
    - database
    concern:
    - data_modeling
    - integration
    - streaming
  violation_consequence: >-
    Polling-based synchronization misses deletes (causing phantom records in downstream systems), loses intermediate states
    (causing incorrect aggregations), adds sustained load to production databases (degrading user-facing performance), and
    introduces latency that compounds across multiple pipeline stages.
  teaching_example: >-
    A team used a 5-minute polling job to sync orders from PostgreSQL to Elasticsearch. They could not figure out why deleted
    orders still appeared in search results. The polling query only looked for modified_at > last_poll, which never catches
    hard deletes. Switching to Debezium CDC captured delete events and removed stale records from the search index automatically.
  when_applies: >-
    Any system that needs to replicate data changes from a database to another system — search indexes, caches, analytics
    warehouses, event buses, or materialized views.
  when_not_applies: >-
    Systems where the application layer already produces events for every state change (event sourcing), making CDC redundant,
    or batch analytics where daily full snapshots are acceptable.
  sources:
  - https://debezium.io/documentation/reference/stable/
  text: 'Capture Changes at the Source, Not by Polling: A security camera (CDC) that records everything continuously vs.'
  severity: high
