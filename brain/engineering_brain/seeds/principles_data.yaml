    pure overhead on every write operation.
  example_good: |-
    # A SaaS team had 12 indexes on their events table but queries filtering by (tenant_id, event_type, created_at) still did full scans.
    # None of the 12 indexes had tenant_id as the leftmost column.
    # Adding one composite index on (tenant_id, event_type, created_at) dropped p99 latency from 4.2s to 8ms.
  example_bad: |-
    # Anti-pattern: Violating Index Strategy Follows Query Patterns, Not Table Structure
    # Result: Over-indexing slows writes by 2-5x and wastes storage. Under-indexing forces full table scans on millions of rows
