- id: P-CACHE-ASIDE
  name: The Application Decides What to Cache, Not the Database
  why: |
    The cache-aside pattern (also called lazy loading) places caching decisions in the application layer
    rather than relying on the database's internal buffer pool or query cache. This is the correct
    default because the application has information the database does not: which data is accessed
    frequently, which queries are latency-sensitive, which data can tolerate staleness, and which
    data must always be fresh. A database query cache (MySQL's query cache, now deprecated for good
    reason) caches indiscriminately — it caches the result of every SELECT, regardless of whether it
    will ever be executed again. A single write to any table mentioned in a cached query invalidates
    the entire cached result, causing thundering herd problems on write-heavy workloads. Application-
    level caching is surgical: you cache the product catalog (read 10,000 times per second, updated
    once per day) but not the shopping cart (read once per session, updated frequently). This selectivity
    is impossible at the database layer because the database does not know which data is business-
    critical and which is ephemeral. The cache-aside pattern also enables tiered caching: L1 in-process
    cache (nanosecond access, small), L2 distributed cache like Redis (sub-millisecond access, large),
    L3 database (millisecond access, source of truth). Each tier has different TTL and eviction policies
    tuned to the access pattern. The application orchestrates lookups across tiers, falling through from
    L1 to L2 to L3 as needed. This architecture delivers single-digit millisecond response times for
    hot data while maintaining correct behavior for cache misses. The key insight is that caching is a
    business decision, not an infrastructure decision — what to cache, how long to cache it, and when
    to invalidate it all depend on business context that only the application possesses.
  how_to_apply: |
    1. Implement cache-aside at the repository or service layer, not at the database driver level.
    The service layer knows the business context — which operations are read-heavy, which data is
    latency-sensitive, and what staleness is acceptable. Wrap data access methods with a check-cache-
    then-fetch pattern.
    2. Use a consistent cache key naming convention that includes entity type, identifier, and version:
    e.g., product:v2:{product_id}. Include a version segment so you can bust all caches of a type by
    incrementing the version when the serialization format changes.
    3. Implement write-through for data where stale reads are unacceptable (e.g., user permissions,
    account balances). On every write, update both the database and the cache atomically. For data
    where brief staleness is acceptable (e.g., product listings, leaderboards), use TTL-based
    expiration and let the next read repopulate the cache.
    4. Design for cache-miss scenarios from day one. Every code path must work correctly with an empty
    cache — the cache is an optimization, not a dependency. If the cache is down, the system should be
    slower but not broken. Test this by disabling the cache in your integration test suite.
    5. Separate hot and cold data into different cache namespaces or instances. A product catalog
    (hot, read-heavy) should not share eviction pressure with session tokens (cold, write-heavy).
    Different TTLs, different maxmemory policies, potentially different Redis instances.
    6. Log cache hits and misses with enough context to debug issues. Include the cache key, TTL
    remaining, and whether the miss was due to expiration, eviction, or first access. This telemetry
    is essential for tuning cache sizes and TTLs.
  mental_model: >-
    A chef decides what to prep ahead (mise en place) based on what dishes sell most — the refrigerator does not decide for
    them.
  domains:
    domain:
    - caching
    - architecture
    concern:
    - infrastructure
    - design
  violation_consequence: >-
    Database-level caching (query cache, transparent cache) caches indiscriminately, wasting memory on rarely-accessed data
    while evicting frequently-accessed data. Write-heavy tables invalidate the query cache constantly, making it a net negative
    for performance. Without application-level control, there is no way to differentiate business-critical hot data from ephemeral
    cold data.
  teaching_example: >-
    A team relied on MySQL's query cache for performance. When traffic increased, the query cache thrashed constantly — every
    INSERT invalidated dozens of cached SELECT results, and the mutex contention on the query cache itself became the primary
    bottleneck. Disabling the query cache and implementing application-level caching with Redis reduced p99 latency by 70%.
  when_applies: >-
    Any application where read latency matters and the data access pattern has identifiable hot spots — which describes virtually
    every web application, API service, and data-serving system.
  when_not_applies: Batch processing pipelines where every record is accessed exactly once, or write-heavy workloads with
    no repeat reads.
  sources:
  - https://docs.aws.amazon.com/whitepapers/latest/database-caching-strategies-using-redis/caching-patterns.html
  text: >-
