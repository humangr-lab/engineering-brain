    target: <10%). These metrics define the current quality baseline.
    3. Build a relevance feedback loop: use click data to train a learning-to-rank model (LambdaMART,
    XGBoost with pairwise loss) that re-ranks results based on features like BM25 score, click
    popularity, recency, and user personalization signals. Start simple — even a basic popularity
    boost based on click counts improves relevance measurably.
    4. Implement A/B testing infrastructure for search. Route 50% of traffic to the current algorithm
