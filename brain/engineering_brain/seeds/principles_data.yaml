    # Result: transparent cache) caches indiscriminately
- id: P-CACHE-CONSISTENCY
  name: Stale Cache Is a Feature, Not a Bug — Define Acceptable Staleness
  why: |
    Every cache serves stale data by design. This is not a defect — it is the entire point. A cache
    trades freshness for speed, and the engineering question is not "how do we make the cache perfectly
    fresh" (that is called "not caching") but "what is the acceptable staleness for each data type, and
    how do we enforce it?" Different data has wildly different staleness tolerances. A user's display
    name can be 5 minutes stale with no business impact. A product price during a flash sale cannot be
    1 second stale without financial impact. An authentication token's revocation status cannot be stale
    at all without security impact. Treating all cached data with the same consistency model is either
    wasteful (refreshing everything constantly) or dangerous (caching everything with long TTLs). Strong
    consistency in a distributed cache is achievable but expensive: it requires either synchronous cache
    invalidation on every write (adding latency to the write path) or versioned reads with conditional
    fetches (adding complexity to the read path). Most data does not need this. The engineering
    discipline is to classify each cached data type into a staleness tier and enforce the corresponding
    consistency model. Tier 1 (seconds): authentication, permissions, inventory counts — use event-
    driven invalidation or very short TTLs. Tier 2 (minutes): user profiles, product details — use
    moderate TTLs with write-through on critical updates. Tier 3 (hours/days): static content, reference
    data, configuration — use long TTLs with manual invalidation on deploy. By making staleness explicit
    and intentional, you can optimize each tier independently and explain the system's consistency
    guarantees to stakeholders in concrete terms rather than hand-waving about "eventual consistency."
  how_to_apply: |
    1. Classify every cached data type into a staleness tier. Create a table with columns: data type,
    staleness tolerance, TTL, invalidation trigger, business impact of stale data. This table is a
    first-class artifact in your system design documentation, not an afterthought.
    2. For Tier 1 data (seconds of acceptable staleness), use event-driven invalidation. When a
    permission is revoked, publish an event that invalidates the cached permission within seconds. Use
    Redis pub/sub, Kafka, or database triggers to propagate invalidation signals.
    3. For Tier 2 data (minutes of acceptable staleness), use TTL-based expiration with jitter. Set
    TTL to 3-5 minutes and add random jitter of +/- 30 seconds to prevent cache stampedes when many
    keys expire simultaneously.
    4. For Tier 3 data (hours/days), use long TTLs and invalidate manually or on deploy. Configuration
    data that changes once per release does not need sub-minute freshness. Cache it for 24 hours and
    bust the cache during deployment.
    5. Implement stale-while-revalidate for data where availability matters more than freshness. Serve
    the stale cached value immediately while asynchronously refreshing from the source. This eliminates
    cache-miss latency spikes for non-critical data. HTTP's Cache-Control: stale-while-revalidate
    header implements this at the CDN/browser layer.
    6. Monitor and alert on actual staleness, not just TTL configuration. Measure the time between a
    database write and the corresponding cache update. If Tier 1 data is consistently 30 seconds stale
    when the target is 5 seconds, the invalidation mechanism needs attention.
  mental_model: >-
    A weather forecast is always slightly wrong, but knowing it is 1-hour-old weather is much more useful than waiting for
    a live satellite feed that takes 30 seconds to load.
  domains:
    domain:
    - caching
    - architecture
    - reliability
    concern:
    - consistency
    - infrastructure
  violation_consequence: >-
    Treating all cached data uniformly leads to either over-caching (stale auth tokens granting revoked access — security
    incident) or under-caching (refreshing static configuration every second — wasted resources and origin overload). Without
    explicit staleness tiers, every caching bug becomes a surprise because nobody defined what 'correct' means.
  teaching_example: >-
    A social platform cached both user auth tokens (Tier 1) and profile photos (Tier 3) with the same 10-minute TTL. When
    a user was banned, their auth token remained valid for up to 10 minutes, allowing continued posting. Meanwhile, profile
    photo cache misses every 10 minutes added unnecessary load to the image CDN. Splitting into tiers (5-second TTL for auth,
    24-hour TTL for photos) fixed both issues.
  when_applies: >-
    Any system with a caching layer that serves multiple data types with different freshness requirements — which includes
    virtually all web applications and API services.
  when_not_applies: >-
    Systems where all data has identical freshness requirements, or systems with a single cached data type where one TTL suffices.
  sources:
  - https://redis.io/docs/latest/develop/use/client-side-caching/
  text: >-
    Stale Cache Is a Feature, Not a Bug — Define Acceptable Staleness: A weather forecast is always slightly wrong, but knowing
    it is 1-hour-old weather is much more useful than waiting for a live satellite feed that takes 30 seconds to load.
  severity: critical
  technologies:
    lang:
    - python
    - sql
  how_to_do_right: |-
    1. Classify every cached data type into a staleness tier. Create a table with columns: data type,
