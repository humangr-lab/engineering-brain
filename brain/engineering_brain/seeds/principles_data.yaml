- id: P-SEARCH-RELEVANCE
  name: Relevance Is Subjective — Measure It with User Behavior, Not Internal Metrics
  why: |
    Search relevance is the degree to which search results satisfy the user's information need. Unlike
    database queries that return objectively correct result sets, search queries return ranked lists
    where "correct" depends entirely on what the user intended — and the user's intent is ambiguous.
    A search for "apple" might mean the fruit, the company, or the record label, and the "relevant"
    results differ for each interpretation. Traditional information retrieval metrics (precision, recall,
    F1, nDCG) are necessary but insufficient because they measure relevance against human-judged labels,
    which are expensive to create and quickly become stale as content changes. The critical insight is
    that user behavior is the most scalable and accurate signal of relevance. Click-through rate (CTR)
    measures whether users find results promising enough to click. Click-through rate on position 1
    versus position 2 reveals whether the ranking is correct. Time-to-first-click measures whether
    users need to scan many results before finding what they want. Return-to-SERP rate (the user clicks
    a result, returns to the search page, and clicks a different result) signals that the first result
    was not satisfying. Zero-result rate measures queries where the system returned nothing — often
    because of overly strict matching or missing synonyms. These behavioral signals can be collected at
    scale, require no manual labeling, and reflect actual user satisfaction rather than expert judgment.
    A/B testing different ranking algorithms against behavioral metrics is the only reliable way to
    improve search relevance over time. Teams that rely on internal metrics ("our BM25 score is high")
    without connecting them to user behavior are optimizing a proxy that may not correlate with actual
    user satisfaction.
  how_to_apply: |
    1. Instrument search result pages to capture click-through events with position data. For every
    search query, log which results were shown (with rank positions) and which were clicked. This
    creates the behavioral signal dataset that all subsequent relevance work depends on.
    2. Compute and dashboard the five key search health metrics: zero-result rate (target: <5%),
    click-through rate on first result (target: >30%), mean reciprocal rank (target: >0.5), return-
    to-SERP rate (target: <20%), and search exit rate (user leaves the site from the search page,
    target: <10%). These metrics define the current quality baseline.
    3. Build a relevance feedback loop: use click data to train a learning-to-rank model (LambdaMART,
    XGBoost with pairwise loss) that re-ranks results based on features like BM25 score, click
    popularity, recency, and user personalization signals. Start simple — even a basic popularity
    boost based on click counts improves relevance measurably.
    4. Implement A/B testing infrastructure for search. Route 50% of traffic to the current algorithm
    and 50% to the candidate. Compare behavioral metrics with statistical significance (minimum
    detectable effect, sample size calculation). Never deploy a ranking change without A/B validation.
    5. Create a query taxonomy that classifies searches by intent: navigational (looking for a specific
    item), informational (browsing a category), and transactional (ready to purchase/act). Each intent
    type has different relevance criteria and different optimal ranking strategies.
    6. Establish a quarterly relevance review cadence. Sample 100 queries weighted by frequency,
    manually judge the top 10 results for each, compute nDCG@10, and compare against the previous
    quarter. This catches gradual relevance degradation that behavioral metrics might miss.
  mental_model: >-
    A librarian who recommends books based on what readers actually finish, not what the publisher's catalog says is important.
  domains:
    domain:
    - search
    - analytics
    concern:
    - relevance
    - user_experience
  violation_consequence: >-
    Optimizing internal metrics (BM25 score, recall) without behavioral validation leads to technically impressive but user-hostile
    search results. Users abandon the search feature, adopt workarounds (browsing instead of searching, using Google with
    site: prefix), and the search team loses credibility.
  teaching_example: >-
    A documentation site optimized search for exact keyword matching, achieving 95% precision in lab tests. But users searching
    for 'how to deploy' found API reference pages about the deploy() method, not the deployment guide. Click-through data
    showed a 67% return-to-SERP rate — users were not finding what they needed. Adding intent classification and behavioral
    re-ranking dropped the return rate to 12%.
  when_applies: >-
    Any system with a search feature used by humans — e-commerce, documentation, internal knowledge bases, content platforms,
    or any application where finding the right information is a core user need.
  when_not_applies: >-
    Programmatic queries where the result set is deterministic and correctness is binary (SQL queries, exact-match lookups,
    API filtering endpoints).
  sources:
  - https://www.elastic.co/guide/en/elasticsearch/reference/current/query-dsl-function-score-query.html
  text: >-
    Relevance Is Subjective — Measure It with User Behavior, Not Internal Metrics: A librarian who recommends books based
