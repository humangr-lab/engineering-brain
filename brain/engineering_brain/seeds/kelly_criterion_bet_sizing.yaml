- id: FIN-KELLY-001
  text: "The Kelly criterion determines the optimal fraction of bankroll to wager: f* = (b*p - q) / b, where p = probability of winning, q = 1 - p, and b = net odds (profit per unit wagered). Equivalently, f* = p - q/b. Kelly maximizes the expected logarithm of wealth (geometric growth rate), which is the correct objective for long-term compounding. The derivation comes from maximizing E[log(W)] = p*log(1 + f*b) + q*log(1 - f) with respect to f."
  why: >
    The Kelly criterion is the mathematically provable optimal strategy for long-term wealth growth
    when the edge and odds are known. John Larry Kelly Jr. derived it at Bell Labs in 1956, and
    Edward Thorp applied it to blackjack and then to the stock market. The key insight is that
    maximizing expected value (arithmetic mean) is the WRONG objective for repeated betting —
    you should maximize expected log-wealth (geometric mean) because wealth compounds
    multiplicatively, not additively. A strategy that maximizes EV can go bankrupt because it
    ignores the variance drag: E[log(W)] = log(E[W]) - Var(log(W))/2. Kelly exactly balances
    the tradeoff between growth and risk. Any fraction f > f* has lower expected log-growth
    than f*, and any f > 2*f* has NEGATIVE expected log-growth — you lose money long-term
    despite having a positive edge.
  how_to_do_right: |
    1. Estimate win probability p from data (at least 100 observations for reliability)
    2. Determine net odds b: for a $1 bet, b is the profit if you win
    3. Compute q = 1 - p
    4. Kelly fraction: f* = (b*p - q) / b = p - q/b
    5. If f* <= 0, there is no edge — do NOT bet
    6. If f* > 0 but close to 0, the edge is small — size carefully
    7. Verify: E[log(1 + f*b)] * p + E[log(1 - f*)] * q > 0 (growth rate is positive)
    8. In practice, use fractional Kelly (f*/2 or f*/3) because p and b are estimated, not known
    9. Maximum bet should never exceed 25% of bankroll regardless of Kelly output
  severity: critical
  technologies:
    lang: [python]
    framework: [numpy, scipy]
  domains:
    domain: [prediction_markets, fintech, mathematics]
    concern: [domain_specific, risk_management]
  example_good: |
    import numpy as np

    def kelly_criterion(p, b):
        """Compute the Kelly fraction for a binary bet.

        Args:
            p: probability of winning (0 < p < 1)
            b: net odds — profit per $1 wagered on win (e.g., b=1 for even money)
        Returns:
            f_star: optimal fraction of bankroll to bet
        """
        if not 0 < p < 1:
            raise ValueError(f"p must be in (0, 1), got {p}")
        if b <= 0:
            raise ValueError(f"b must be positive, got {b}")

        q = 1 - p
        f_star = (b * p - q) / b

        # Expected log-growth rate per bet
        if f_star > 0:
            growth = p * np.log(1 + f_star * b) + q * np.log(1 - f_star)
        else:
            growth = 0.0

        print(f"Kelly Analysis:")
        print(f"  Win prob (p):     {p:.4f}")
        print(f"  Net odds (b):     {b:.4f}")
        print(f"  Edge (bp - q):    {b*p - q:.4f}")
        print(f"  Full Kelly f*:    {f_star:.4f} ({f_star:.2%})")
        print(f"  Growth rate:      {growth:.6f} per bet")
        print(f"  Doubling time:    {np.log(2)/growth:.0f} bets" if growth > 0 else "  No edge")
        return f_star

    # Example 1: Coin flip with slight edge (55% win, even money)
    f1 = kelly_criterion(p=0.55, b=1.0)
    # f* = (1*0.55 - 0.45) / 1 = 0.10 = 10%

    # Example 2: Prediction market with 60% edge and 2:1 odds
    f2 = kelly_criterion(p=0.60, b=2.0)
    # f* = (2*0.60 - 0.40) / 2 = 0.40 = 40%

    # Example 3: Horse race with 20% win probability and 6:1 odds
    f3 = kelly_criterion(p=0.20, b=6.0)
    # f* = (6*0.20 - 0.80) / 6 = 0.0667 = 6.67%

    # Example 4: No edge — should NOT bet
    f4 = kelly_criterion(p=0.40, b=1.0)
    # f* = (1*0.40 - 0.60) / 1 = -0.20 → negative → no bet
  example_bad: |
    import numpy as np

    # WRONG: Using expected value instead of Kelly
    p, b = 0.55, 1.0
    ev = p * b - (1 - p)  # EV = 0.10 per dollar
    # "EV is positive, so bet everything!" — WRONG!
    bet_fraction = 1.0  # Betting 100% of bankroll
    # After one loss (45% chance), bankroll = $0. Game over.
    # Kelly says bet 10%, not 100%

    # Also wrong: Kelly without checking for edge
    p, b = 0.30, 1.0
    f = (b * p - (1-p)) / b  # f* = -0.40 — NEGATIVE
    bet = abs(f) * bankroll  # Taking absolute value of negative Kelly — disastrous!
    # Negative f* means the edge is against you — should NOT bet at all
  when_applies: Any repeated betting scenario where you have an estimated edge — prediction markets, sports betting, trading
  sources:
    - "https://en.wikipedia.org/wiki/Kelly_criterion"
    - "https://www.edwardothorp.com/wp-content/uploads/2016/11/TheKellyCriterionAndTheStockMarket.pdf"

- id: FIN-KELLY-002
  text: "Full Kelly has optimal long-term growth but extreme short-term volatility: ~33% probability of a 50%+ drawdown before doubling. Half-Kelly (f = f*/2) sacrifices only 25% of growth rate but reduces variance by 75%. Quarter-Kelly (f = f*/4) is even safer. The growth rate as a function of fraction f is a parabola: G(f) = p*log(1 + f*b) + q*log(1 - f), with maximum at f* and G(0) = G(2*f*) = 0. Any f > 2*f* produces negative growth."
  why: >
    Full Kelly is theoretically optimal but practically dangerous. The variance of log-wealth
    under full Kelly is extremely high: Var[log(W_n)] = n * p * q * (log((1+f*b)/(1-f*)))^2.
    For p=0.55, b=1 (f*=10%), after 100 bets the standard deviation of log-wealth is ~0.67,
    meaning you could easily be at 50% of your starting wealth or 200%. Edward Thorp, who
    literally wrote the book on Kelly, uses half-Kelly in practice because: (1) p and b are
    estimated with error, and estimation error systematically causes overbetting because Kelly
    is concave; (2) the psychological pain of a 50% drawdown causes most traders to abandon
    even a winning strategy; (3) the 25% reduction in growth rate from half-Kelly is barely
    noticeable over years but the 75% variance reduction is immediately felt. The growth function
    G(f) is a parabola that crosses zero at f = 0 and f = 2*f*, so any bet size above 2*f*
    guarantees negative growth — you go bankrupt despite having a genuine edge.
  how_to_do_right: |
    1. Compute full Kelly f* = (b*p - q) / b
    2. Apply fractional Kelly: f_actual = fraction * f* where fraction in {0.25, 0.33, 0.50}
    3. Default to half-Kelly (fraction = 0.50) unless you have extraordinary confidence in p and b
    4. Compare growth rates: G(f*/2) = 0.75 * G(f*) approximately
    5. Compare drawdown probability: P(50% DD | full Kelly) ≈ 0.33, P(50% DD | half Kelly) ≈ 0.11
    6. Never exceed full Kelly — the growth function is negative beyond 2*f*
    7. For noisy p estimates (SE > 0.05), use quarter-Kelly or smaller
    8. Plot G(f) from 0 to 2*f* to visualize the penalty of over/under-betting
    9. Adjust fraction based on confidence: more data → closer to full Kelly
  severity: critical
  technologies:
    lang: [python]
    framework: [numpy, matplotlib]
  domains:
    domain: [prediction_markets, fintech, mathematics]
    concern: [risk_management, domain_specific]
  example_good: |
    import numpy as np

    def fractional_kelly_analysis(p, b, fractions=None, n_bets=1000, n_sims=10_000, seed=42):
        """Compare full Kelly vs fractional Kelly via simulation.

        Demonstrates the growth-variance tradeoff.
        """
        if fractions is None:
            fractions = [0.25, 0.50, 1.0, 1.5, 2.0]

        rng = np.random.default_rng(seed)
        q = 1 - p
        f_star = (b * p - q) / b

        print(f"Kelly Analysis: p={p}, b={b}, f*={f_star:.4f}")
        print(f"{'Fraction':>10s} {'f':>8s} {'G(f)':>10s} {'Median':>10s} {'P(50%DD)':>10s} {'P(ruin)':>10s}")
        print("-" * 62)

        for frac in fractions:
            f = f_star * frac
            if f >= 1.0:
                print(f"{frac:>10.2f} {f:>8.4f} {'RUIN':>10s} {'$0':>10s} {'100%':>10s} {'100%':>10s}")
                continue
            if f <= 0:
                print(f"{frac:>10.2f} {f:>8.4f} {'NO BET':>10s}")
                continue

            # Theoretical growth rate
            g = p * np.log(1 + f * b) + q * np.log(1 - f)

            # Simulate n_sims paths of n_bets
            outcomes = rng.binomial(1, p, size=(n_sims, n_bets))
            log_returns = np.where(outcomes, np.log(1 + f * b), np.log(1 - f))
            cum_log_wealth = np.cumsum(log_returns, axis=1)

            # Final wealth (starting at 1.0)
            final_wealth = np.exp(cum_log_wealth[:, -1])
            median_wealth = np.median(final_wealth)

            # Maximum drawdown per path
            cum_wealth = np.exp(cum_log_wealth)
            running_max = np.maximum.accumulate(cum_wealth, axis=1)
            drawdowns = 1 - cum_wealth / running_max
            max_dd = np.max(drawdowns, axis=1)

            p_50dd = np.mean(max_dd >= 0.50)
            p_ruin = np.mean(final_wealth < 0.01)  # Effectively ruined

            print(f"{frac:>10.2f} {f:>8.4f} {g:>10.6f} ${median_wealth:>8.2f} {p_50dd:>10.2%} {p_ruin:>10.2%}")

    fractional_kelly_analysis(p=0.55, b=1.0)
    # Fraction     f       G(f)     Median   P(50%DD)   P(ruin)
    #   0.25   0.0250   0.000304   $1.35      0.5%      0.0%
    #   0.50   0.0500   0.000574   $1.77      4.2%      0.0%
    #   1.00   0.1000   0.000736   $2.09     33.1%      0.0%
    #   1.50   0.1500   0.000574   $1.77     65.4%      0.1%
    #   2.00   0.2000   0.000000   $1.00     88.7%      5.2%
  example_bad: |
    import numpy as np

    # WRONG: Using full Kelly without considering estimation uncertainty
    p_estimated = 0.60  # Estimated from only 20 trades — very noisy!
    b = 1.0
    f_star = (b * p_estimated - 0.40) / b  # 0.20 = 20% of bankroll per bet

    # With only 20 trades, SE(p) = sqrt(0.6*0.4/20) = 0.11
    # True p could easily be 0.49 (no edge!) or 0.71 (massive edge)
    # Full Kelly on uncertain p systematically OVERBETS because Kelly is concave
    # Should use quarter-Kelly (5%) with this level of uncertainty
  when_applies: Sizing bets in prediction markets, deciding leverage for trading strategies, bankroll management
  sources:
    - "https://en.wikipedia.org/wiki/Kelly_criterion"
    - "https://www.investopedia.com/articles/trading/04/091504.asp"

- id: FIN-KELLY-003
  text: "Multi-outcome Kelly generalizes to prediction markets with 3+ mutually exclusive outcomes. For n outcomes with probabilities p_i and market prices q_i, the Kelly fraction for outcome i is f_i = max(0, p_i/q_i - 1) / (b_i), where b_i = 1/q_i - 1 is the implied odds. Only bet on outcomes where your estimated probability exceeds the market probability (p_i > q_i). The total fraction bet must sum to less than 1 (never risk entire bankroll)."
  why: >
    Prediction markets often have multiple outcomes (e.g., multiple candidates in an election,
    multiple teams in a tournament). The binary Kelly formula does not apply directly because
    the outcomes are not independent bets — exactly one outcome wins and the rest lose. The
    multi-outcome generalization requires solving a constrained optimization: maximize
    E[log(W)] = sum_i(p_i * log(W_i)) subject to W_i = 1 - sum(f_j) + f_i / q_i for the
    winning outcome. This can be solved numerically using scipy.optimize. A common simplification
    for mutually exclusive markets: if you only bet on one outcome (the one with highest edge),
    you can use the binary Kelly formula with that outcome's effective odds. Betting on multiple
    outcomes in the same market requires careful accounting to avoid implicit overleverage.
  how_to_do_right: |
    1. List all outcomes with estimated probabilities p_i and market prices q_i
    2. Compute edge for each: edge_i = p_i - q_i (only bet where edge_i > 0)
    3. For single-outcome bets: f_i = (b_i * p_i - q_i_complement) / b_i where b_i = 1/q_i - 1
    4. For multiple bets in same market: solve numerically:
       maximize sum(p_i * log(1 - total_bet + f_i * (1/q_i)))
       subject to: f_i >= 0, sum(f_i) < 1
    5. Use scipy.optimize.minimize with method='SLSQP'
    6. Apply fractional Kelly (f*/2) to all positions
    7. Verify: total amount wagered (sum of f_i) should be well below 100% of bankroll
    8. If edges are small (< 3%), consider not betting due to transaction costs and market fees
  severity: high
  technologies:
    lang: [python]
    framework: [numpy, scipy]
  domains:
    domain: [prediction_markets, fintech, mathematics]
    concern: [domain_specific, risk_management]
  example_good: |
    import numpy as np
    from scipy.optimize import minimize

    def multi_outcome_kelly(probs, market_prices, fractional=0.5):
        """Compute Kelly fractions for a multi-outcome prediction market.

        Args:
            probs: your estimated probabilities for each outcome (sum to 1)
            market_prices: current market prices (sum to ~1, may have overround)
            fractional: Kelly fraction multiplier (0.5 = half Kelly)
        """
        n = len(probs)
        assert len(market_prices) == n
        assert abs(sum(probs) - 1.0) < 0.01, "Probabilities must sum to 1"

        # Edge analysis
        print("Edge Analysis:")
        for i in range(n):
            edge = probs[i] - market_prices[i]
            implied_odds = 1 / market_prices[i] - 1 if market_prices[i] > 0 else float('inf')
            print(f"  Outcome {i}: p={probs[i]:.3f}, mkt={market_prices[i]:.3f}, "
                  f"edge={edge:+.3f}, odds={implied_odds:.2f}:1")

        # Maximize expected log-wealth
        def neg_expected_log_wealth(f):
            total_bet = np.sum(f)
            if total_bet >= 1.0:
                return 1e10
            log_wealth = 0.0
            for i in range(n):
                # If outcome i wins: wealth = 1 - total_bet + f_i / q_i
                w_i = 1 - total_bet + f[i] / market_prices[i]
                if w_i <= 0:
                    return 1e10
                log_wealth += probs[i] * np.log(w_i)
            return -log_wealth

        # Constraints: f_i >= 0, sum(f_i) < 1
        bounds = [(0, 0.5)] * n  # Cap each bet at 50% of bankroll
        constraints = {'type': 'ineq', 'fun': lambda f: 0.99 - np.sum(f)}

        result = minimize(neg_expected_log_wealth, x0=np.zeros(n),
                         method='SLSQP', bounds=bounds, constraints=constraints)

        f_full = result.x
        f_actual = f_full * fractional

        print(f"\nKelly Fractions (fractional={fractional}):")
        total_bet = 0
        for i in range(n):
            if f_actual[i] > 0.001:
                payout = f_actual[i] / market_prices[i]
                print(f"  Outcome {i}: bet {f_actual[i]:.4f} ({f_actual[i]:.2%}), "
                      f"payout if win: {payout:.4f}")
                total_bet += f_actual[i]
        print(f"  Total wagered: {total_bet:.4f} ({total_bet:.2%})")
        print(f"  Reserve (unbetted): {1-total_bet:.4f} ({1-total_bet:.2%})")

        growth = -neg_expected_log_wealth(f_actual)
        print(f"  Expected growth: {growth:.6f} per market resolution")
        return f_actual

    # Example: 3-candidate election
    # Your model says 45/35/20, market says 40/40/20
    my_probs = np.array([0.45, 0.35, 0.20])
    market = np.array([0.40, 0.40, 0.20])
    multi_outcome_kelly(my_probs, market)
  example_bad: |
    import numpy as np

    # WRONG: Treating multi-outcome bets as independent binary bets
    probs = [0.45, 0.35, 0.20]
    market = [0.40, 0.40, 0.20]

    # Independently computing Kelly for each outcome — WRONG!
    for i in range(3):
        p, q_mkt = probs[i], market[i]
        b = 1 / q_mkt - 1
        f = (b * p - (1-p)) / b
        print(f"Outcome {i}: bet {f:.2%}")
    # This ignores that EXACTLY ONE outcome wins!
    # Sum of independent Kelly fractions can exceed 100% — guaranteed ruin
  when_applies: Prediction markets with multiple outcomes, multi-candidate elections, tournament betting
  sources:
    - "https://en.wikipedia.org/wiki/Kelly_criterion"
    - "https://www.edwardothorp.com/wp-content/uploads/2016/11/TheKellyCriterionAndTheStockMarket.pdf"

- id: FIN-KELLY-004
  text: "Simultaneous Kelly handles multiple independent bets placed at the same time. For n independent bets with edge e_i, odds b_i, and Kelly fraction f_i, the joint Kelly allocations are NOT simply the individual f_i values — they must be reduced because total exposure is correlated with bankroll. The exact solution requires maximizing E[log(W)] = sum over 2^n outcome combinations. For large n with small f_i, the independent Kelly fractions are approximately correct."
  why: >
    Prediction market traders and sports bettors frequently have multiple simultaneous bets open.
    If you compute Kelly independently for each bet and sum the fractions, you can easily exceed
    100% of bankroll. Even if each individual bet is well-sized, the combined portfolio can have
    extreme outcomes: with 10 independent bets at 10% Kelly each, there is a scenario where all
    10 lose simultaneously (probability ~0.3^10 for p=0.55, so very rare, but the 100% loss is
    catastrophic). The correct approach is to maximize the expected log of the JOINT wealth
    across all possible outcome combinations. For n bets, there are 2^n combinations, which is
    tractable for n < 20 but requires approximation for larger n. In practice, the total Kelly
    allocation across all simultaneous bets should be capped at 50-70% of bankroll maximum.
  how_to_do_right: |
    1. List all independent bets with (p_i, b_i) for each
    2. Compute individual Kelly fractions: f_i* = (b_i * p_i - q_i) / b_i
    3. For few bets (n <= 15): enumerate all 2^n outcomes, maximize E[log(W)]
    4. For many bets: use individual f_i* but apply a scaling factor:
       scale = min(1, max_exposure / sum(f_i*)) where max_exposure = 0.50
    5. Each f_i_actual = f_i* * scale * fractional_kelly
    6. Verify: total allocation = sum(f_i_actual) < 0.50 (50% max exposure)
    7. Worst case: if all bets lose, remaining bankroll = 1 - sum(f_i_actual) > 0.50
    8. Apply fractional Kelly (0.5x) to the simultaneous Kelly solution for extra safety
    9. Reassess allocations as bets resolve — freed capital can be redeployed
  severity: high
  technologies:
    lang: [python]
    framework: [numpy, scipy]
  domains:
    domain: [prediction_markets, fintech, mathematics]
    concern: [domain_specific, risk_management]
  example_good: |
    import numpy as np
    from itertools import product
    from scipy.optimize import minimize

    def simultaneous_kelly(bets, max_total_exposure=0.50, fractional=0.5):
        """Compute Kelly fractions for multiple simultaneous independent bets.

        Args:
            bets: list of (p, b) tuples — probability and net odds per bet
            max_total_exposure: maximum fraction of bankroll at risk
            fractional: Kelly fraction multiplier
        """
        n = len(bets)
        print(f"Simultaneous Kelly: {n} independent bets")

        if n > 15:
            # Approximation: independent Kelly with scaling
            f_ind = []
            for p, b in bets:
                q = 1 - p
                f = max(0, (b * p - q) / b)
                f_ind.append(f)
            total = sum(f_ind)
            scale = min(1.0, max_total_exposure / total) if total > 0 else 0
            f_actual = [f * scale * fractional for f in f_ind]
            return np.array(f_actual)

        # Exact solution: enumerate 2^n outcomes
        def neg_expected_log_wealth(f_vec):
            log_wealth = 0.0
            for outcome in product([0, 1], repeat=n):
                prob = 1.0
                wealth = 1.0
                for i, (win, (p, b)) in enumerate(zip(outcome, bets)):
                    if win:
                        prob *= p
                        wealth += f_vec[i] * b
                    else:
                        prob *= (1 - p)
                        wealth -= f_vec[i]
                if wealth <= 0:
                    return 1e10
                log_wealth += prob * np.log(wealth)
            return -log_wealth

        bounds = [(0, 0.25)] * n  # Each bet capped at 25%
        constraints = {'type': 'ineq', 'fun': lambda f: max_total_exposure - np.sum(f)}
        x0 = np.array([0.01] * n)

        result = minimize(neg_expected_log_wealth, x0, method='SLSQP',
                         bounds=bounds, constraints=constraints)

        f_full = result.x
        f_actual = f_full * fractional

        print(f"{'Bet':>5s} {'p':>6s} {'b':>6s} {'f_full':>8s} {'f_half':>8s}")
        for i, (p, b) in enumerate(bets):
            f_ind = max(0, (b * p - (1-p)) / b)
            print(f"{i:>5d} {p:>6.3f} {b:>6.2f} {f_full[i]:>8.4f} {f_actual[i]:>8.4f} "
                  f"(indep: {f_ind:.4f})")
        print(f"Total exposure (half-Kelly): {np.sum(f_actual):.4f}")
        print(f"Worst case (all lose):       {1 - np.sum(f_actual):.4f} remaining")

        return f_actual

    # 5 simultaneous prediction market bets
    bets = [
        (0.60, 1.5),  # 60% win prob, 1.5:1 odds
        (0.55, 1.0),  # 55% win prob, even money
        (0.70, 0.8),  # 70% win prob, 0.8:1 odds
        (0.52, 2.0),  # 52% win prob, 2:1 odds
        (0.65, 1.2),  # 65% win prob, 1.2:1 odds
    ]
    simultaneous_kelly(bets)
  example_bad: |
    import numpy as np

    # WRONG: Summing independent Kelly fractions — can exceed 100%
    bets = [(0.60, 2.0), (0.55, 1.5), (0.70, 1.0), (0.65, 1.2)]
    total_bet = 0
    for p, b in bets:
        f = (b * p - (1-p)) / b
        total_bet += f
        print(f"Bet: {f:.2%}")
    print(f"Total: {total_bet:.2%}")
    # Total could be 70-80% — if all 4 lose, you lose 70-80% of bankroll in one round!
    # Simultaneous Kelly would cap total exposure and reduce each fraction
  when_applies: Multiple simultaneous bets in prediction markets, multi-strategy portfolio allocation, diversified trading
  sources:
    - "https://en.wikipedia.org/wiki/Kelly_criterion"
    - "https://www.edwardothorp.com/wp-content/uploads/2016/11/TheKellyCriterionAndTheStockMarket.pdf"

- id: FIN-KELLY-005
  text: "Overbetting beyond Kelly guarantees ruin in the long run. At f = 2*f*, the expected log-growth rate is exactly zero (break-even). At f > 2*f*, expected log-growth is NEGATIVE — you lose money despite having a positive edge. The ruin probability increases sharply with f: P(ruin) is approximately (q/(p*b^2))^(W0/(f-f*)) for large initial wealth W0. Even at full Kelly, the probability of losing 50% before doubling is approximately 1/3."
  why: >
    Overbetting is the most common cause of ruin among traders and bettors who actually have a
    genuine edge. The mathematics is unforgiving: the growth function G(f) = p*log(1+fb) + q*log(1-f)
    is a concave parabola with maximum at f* and zeros at f=0 and f=2f*. Between f* and 2f*,
    growth is positive but declining — you grow slower than optimal. Beyond 2f*, growth is
    negative — your bankroll shrinks on average despite winning more than you lose. This is the
    "variance drain" effect: multiplicative losses are more damaging than the corresponding gains
    are beneficial. A 50% loss requires a 100% gain to recover. At f = 3*f*, the expected growth
    rate is roughly -G(f*), meaning you lose wealth at the same rate you would gain it at optimal.
    This is why professional bettors (Thorp, Pabrai, Buffett) all advocate for conservative sizing.
  how_to_do_right: |
    1. Always compute f* = (bp - q) / b before placing a bet
    2. Hard cap: NEVER bet more than f* (full Kelly is already aggressive)
    3. Default to half-Kelly (f*/2) — growth sacrifice is only 25%
    4. If using estimated p with SE > 0.05: use quarter-Kelly (f*/4)
    5. Absolute maximum bet: 25% of bankroll regardless of Kelly output
    6. Monitor cumulative bet sizes: if sum of active bets > 50% of bankroll, reduce all positions
    7. After a losing streak: do NOT increase bet size (see anti-martingale property)
    8. Simulate before risking real money: run 10,000 paths to see drawdown distribution
    9. If unsure about p or b, DON'T BET — expected value of uncertain Kelly bets is negative
  severity: critical
  technologies:
    lang: [python]
    framework: [numpy]
  domains:
    domain: [prediction_markets, fintech, mathematics]
    concern: [risk_management, domain_specific]
  example_good: |
    import numpy as np

    def demonstrate_overbetting(p=0.55, b=1.0, n_bets=500, n_sims=5_000, seed=42):
        """Show that overbetting destroys wealth despite positive edge."""
        rng = np.random.default_rng(seed)
        q = 1 - p
        f_star = (b * p - q) / b

        fractions = {
            "Half Kelly (f*/2)": f_star * 0.5,
            "Full Kelly (f*)":   f_star,
            "1.5x Kelly":        f_star * 1.5,
            "2x Kelly":          f_star * 2.0,
            "3x Kelly":          f_star * 3.0,
        }

        print(f"p={p}, b={b}, f*={f_star:.4f}")
        print(f"\n{'Strategy':25s} {'f':>8s} {'G(f)':>10s} {'Median W':>10s} {'Mean W':>10s} {'P(ruin)':>8s}")
        print("-" * 75)

        for name, f in fractions.items():
            if f >= 1.0:
                print(f"{name:25s} {f:>8.4f} {'BUST':>10s} {'$0':>10s} {'$0':>10s} {'100%':>8s}")
                continue

            # Theoretical growth rate
            g = p * np.log(1 + f * b) + q * np.log(1 - f)

            # Simulate
            wins = rng.binomial(1, p, size=(n_sims, n_bets))
            log_ret = np.where(wins, np.log(1 + f * b), np.log(1 - f))
            cum_log = np.cumsum(log_ret, axis=1)
            final_wealth = np.exp(cum_log[:, -1]) * 1000  # Start with $1000

            median_w = np.median(final_wealth)
            mean_w = np.mean(final_wealth)
            p_ruin = np.mean(final_wealth < 10)  # Less than $10 = ruined

            print(f"{name:25s} {f:>8.4f} {g:>10.6f} ${median_w:>8.0f} ${mean_w:>8.0f} {p_ruin:>8.2%}")

    demonstrate_overbetting()
    # Half Kelly:    Positive growth, low ruin
    # Full Kelly:    Optimal growth, moderate drawdowns
    # 1.5x Kelly:    Same growth as half-Kelly but MUCH more volatile
    # 2x Kelly:      ZERO expected growth — random walk!
    # 3x Kelly:      NEGATIVE growth — goes to zero!
  example_bad: |
