            if bankroll <= 0:
                print("BANKRUPT!")
                break
    # Fixed sizing doesn't adapt — after winning to $15K you're underbetting (6.7%),
    # and after losing to $3K you're overbetting (33%). Kelly would adjust dynamically.
  when_applies: Managing an active prediction market portfolio, trading bankroll, repeated betting
  sources:
    - "https://en.wikipedia.org/wiki/Kelly_criterion"
    - "https://www.investopedia.com/articles/trading/04/091504.asp"

- id: FIN-KELLY-010
  text: "Kelly and mean-variance optimization agree when returns are normally distributed, but diverge for non-normal returns. Mean-variance maximizes E[r_p] - (gamma/2)*Var(r_p); Kelly maximizes E[log(1 + r_p)] which approximately equals E[r_p] - (1/2)*Var(r_p) for small returns, implying gamma=1. For fat-tailed returns (financial data), Kelly is more conservative than gamma=1 mean-variance because log(1+r) penalizes large losses more than the quadratic variance penalty."
  why: >
    Mean-variance (Markowitz) and Kelly (log-optimal growth) are the two most important portfolio
    optimization frameworks. Understanding when they agree and disagree is essential. For small
    returns (|r| < 10%), the second-order Taylor expansion gives E[log(1+r)] ≈ E[r] - Var(r)/2,
    which is exactly mean-variance with gamma=1. But for large returns or fat-tailed distributions,
    the higher-order terms matter: log(1+r) approaches -infinity as r → -1 (total loss), providing
    infinite penalty for ruin that quadratic variance does not. This makes Kelly more conservative
    for tail risk. In practice, most quant funds use mean-variance with gamma > 1 (gamma = 2-5),
    which is equivalent to fractional Kelly (half-Kelly ≈ gamma=2). The key insight: if you are
    using mean-variance with gamma=2, you are implicitly using half-Kelly. Risk aversion and
    Kelly fraction are two sides of the same coin.
  how_to_do_right: |
    1. Recognize the equivalence: Kelly ≈ mean-variance with gamma = 1 for small returns
    2. Fractional Kelly = mean-variance with gamma = 1/fraction (half-Kelly → gamma = 2)
    3. For normal returns: both give identical portfolios when gamma = 1
    4. For fat-tailed returns: Kelly is more conservative (penalizes large losses more)
    5. Use mean-variance machinery (quadratic programming) to implement Kelly efficiently
    6. Apply Ledoit-Wolf covariance shrinkage for both methods
    7. Backtest both: compare Sharpe, max drawdown, and terminal wealth
    8. In practice, gamma = 2-3 (half to third Kelly) is the sweet spot for most investors
    9. The choice between Kelly and mean-variance is really a choice of risk aversion parameter
  severity: medium
  technologies:
    lang: [python]
    framework: [numpy, scipy]
  domains:
    domain: [fintech, mathematics]
    concern: [domain_specific, risk_management]
  example_good: |
    import numpy as np
    from scipy.linalg import inv

    def compare_kelly_mv(mu, sigma_matrix, rf=0.04, gammas=None):
        """Compare Kelly and mean-variance portfolios for different risk aversions.

        Shows that Kelly is mean-variance with gamma=1.
        """
        if gammas is None:
            gammas = [0.5, 1.0, 2.0, 3.0, 5.0]

        n_assets = len(mu)
        mu_excess = mu - rf
        sigma_inv = inv(sigma_matrix)

        print(f"{'gamma':>6s} {'Kelly frac':>12s} {'w_stocks':>10s} {'w_bonds':>10s} "
              f"{'w_gold':>10s} {'Return':>8s} {'Vol':>8s} {'Sharpe':>8s} {'Leverage':>10s}")
        print("-" * 95)

        for gamma in gammas:
            # Mean-variance: w = (1/gamma) * Sigma^{-1} * mu_excess
            w = (1 / gamma) * sigma_inv @ mu_excess
            kelly_frac = 1 / gamma

            port_ret = w @ mu
            port_vol = np.sqrt(w @ sigma_matrix @ w)
            sharpe = (port_ret - rf) / port_vol if port_vol > 0 else 0
            leverage = np.sum(np.abs(w))

            growth = port_ret - 0.5 * port_vol**2

            label = ""
            if gamma == 1.0:
                label = " ← KELLY"
            elif gamma == 2.0:
                label = " ← Half Kelly"

            print(f"{gamma:>6.1f} {kelly_frac:>12.2f} {w[0]:>10.4f} {w[1]:>10.4f} "
                  f"{w[2]:>10.4f} {port_ret:>8.2%} {port_vol:>8.2%} {sharpe:>8.3f} {leverage:>9.2f}x{label}")

    # S&P 500-like parameters
    mu = np.array([0.10, 0.05, 0.07])
    vols = np.array([0.16, 0.05, 0.14])
    corr = np.array([
        [1.0, -0.1, 0.05],
        [-0.1, 1.0, 0.10],
        [0.05, 0.10, 1.0],
    ])
    sigma_matrix = np.outer(vols, vols) * corr

    compare_kelly_mv(mu, sigma_matrix)
    # gamma=1.0 is KELLY (most aggressive)
    # gamma=2.0 is HALF KELLY (standard practice)
    # gamma=5.0 is FIFTH KELLY (very conservative)
    # All have the same Sharpe ratio! Only leverage differs.
  example_bad: |
    import numpy as np

    # WRONG: Treating Kelly and mean-variance as completely different methods
    # "Kelly says 2x leverage, mean-variance says 1x — they disagree!"
    mu_excess = 0.06  # Excess return
    sigma = 0.16      # Volatility

    kelly_leverage = mu_excess / sigma**2  # 2.34x
    mv_leverage = mu_excess / (2 * sigma**2)  # 1.17x

    # They don't "disagree" — mean-variance with gamma=2 IS half-Kelly!
    # The user just chose different risk aversion parameters
    print(f"Kelly: {kelly_leverage:.2f}x, MV: {mv_leverage:.2f}x — they disagree!")
    # WRONG interpretation: gamma=2 mean-variance is exactly half-Kelly by construction
  when_applies: Portfolio optimization, choosing between Kelly and mean-variance frameworks, setting risk aversion parameters
  sources:
    - "https://en.wikipedia.org/wiki/Kelly_criterion"
    - "https://en.wikipedia.org/wiki/Modern_portfolio_theory"

- id: FIN-KELLY-011
  text: "Kelly is an anti-martingale strategy: after winning, increase bet size (your bankroll grew); after losing, decrease bet size (your bankroll shrunk). This is the opposite of the martingale (doubling down after losses). Anti-martingale strategies converge to the growth-optimal allocation; martingale strategies guarantee ruin. The psychological difficulty is that Kelly 'feels wrong' — reducing bets after losses feels like giving up, and increasing after wins feels like greed."
  why: >
    The anti-martingale property is the most psychologically difficult aspect of Kelly for most
    bettors and traders. After 5 consecutive losses, your bankroll is down significantly, and
    Kelly says to bet LESS — while your emotions scream to bet MORE to recover. The martingale
    (doubling after losses) feels intuitive: "I'm due for a win, so I should bet bigger." But
    the math is unequivocal: martingale guarantees ruin (requires infinite bankroll to work),
    while anti-martingale converges to the growth-optimal path. The proof is simple: with a
    multiplicative bankroll (W_{n+1} = W_n * (1 + f*r_n)), constant-fraction betting means
    log(W_n) = log(W_0) + sum(log(1 + f*r_i)). By the LLN, this converges to n * E[log(1+f*r)],
    which is maximized at f = f* (Kelly). Martingale betting has W → 0 with probability 1 for
    any bounded bankroll. The practical insight: if your strategy stops feeling uncomfortable
    during drawdowns, you are probably overbetting.
  how_to_do_right: |
    1. Always bet a fraction of CURRENT bankroll, not initial bankroll
    2. After a loss: bankroll shrinks → bet size automatically decreases
    3. After a win: bankroll grows → bet size automatically increases
    4. Never deviate from fractional betting to "chase losses" (that is martingale)
    5. Never "take profits" by reducing bet size after wins (that reduces growth)
    6. Accept that drawdowns are normal: even with an edge, losing streaks of 5-10 are expected
    7. Pre-commit to the strategy: write down rules BEFORE starting, follow mechanically
    8. Track emotional state: if you feel the urge to increase after losses, STOP and re-read Kelly theory
    9. Use automated position sizing to remove human emotion from the loop
    10. Compare anti-martingale vs martingale via simulation to build conviction
  severity: high
  technologies:
    lang: [python]
    framework: [numpy]
  domains:
    domain: [prediction_markets, fintech, mathematics]
    concern: [domain_specific, risk_management]
  example_good: |
    import numpy as np

    def compare_strategies(p=0.55, b=1.0, n_bets=200, n_sims=10_000, seed=42):
        """Compare anti-martingale (Kelly) vs martingale vs fixed sizing."""
        rng = np.random.default_rng(seed)
        q = 1 - p
        f_star = (b * p - q) / b  # Kelly fraction

        strategies = {}

        for name, size_fn in [
            ("Kelly (anti-martingale)", lambda W, _: f_star * W),
            ("Half Kelly",             lambda W, _: 0.5 * f_star * W),
            ("Martingale (2x losses)", lambda W, streak: min(W, 100 * (2 ** streak))),
            ("Fixed $100",             lambda W, _: min(W, 100)),
        ]:
            final_wealths = []
            ruin_count = 0

            for sim in range(n_sims):
                W = 1000.0  # Starting bankroll
                losing_streak = 0

                for bet_idx in range(n_bets):
                    if W < 1.0:  # Effectively ruined
                        ruin_count += 1
                        break

                    bet = size_fn(W, losing_streak)
                    bet = max(0, min(bet, W))  # Can't bet more than you have

                    if rng.random() < p:
                        W += bet * b
                        losing_streak = 0
                    else:
                        W -= bet
                        losing_streak += 1

                final_wealths.append(W)

            median_w = np.median(final_wealths)
            mean_w = np.mean(final_wealths)
            p_ruin = ruin_count / n_sims

            strategies[name] = {
                "median": median_w,
                "mean": mean_w,
                "p_ruin": p_ruin,
            }

        print(f"Strategy Comparison (p={p}, b={b}, {n_bets} bets, {n_sims} simulations)")
        print(f"{'Strategy':30s} {'Median W':>10s} {'Mean W':>10s} {'P(ruin)':>10s}")
        print("-" * 65)
        for name, stats in strategies.items():
            print(f"{name:30s} ${stats['median']:>8.0f} ${stats['mean']:>8.0f} {stats['p_ruin']:>10.2%}")

    compare_strategies()
    # Kelly:         Highest median wealth, moderate ruin risk
    # Half Kelly:    Slightly lower median, much lower ruin risk
    # Martingale:    $0 in most simulations — RUINED
    # Fixed $100:    Low growth, never ruins but underperforms Kelly
  example_bad: |
    import numpy as np

    # WRONG: Martingale strategy — doubling after losses
    bankroll = 10000
    base_bet = 100
    bet = base_bet
    rng = np.random.default_rng(42)

    for i in range(100):
        if bankroll < bet:
            print(f"BANKRUPT at bet {i}!")
            break
        if rng.random() < 0.55:
            bankroll += bet
            bet = base_bet  # Reset after win
        else:
            bankroll -= bet
            bet *= 2  # DOUBLE after loss — this is the martingale death spiral
            # After 7 consecutive losses: bet = $12,800 — larger than initial bankroll!

    # Martingale: feels safe because you "always recover" — until you don't
    # Kelly: feels scary because you bet less after losses — but you SURVIVE
  when_applies: Understanding the fundamental principle behind Kelly sizing, resisting the temptation to chase losses
  sources:
    - "https://en.wikipedia.org/wiki/Kelly_criterion"
    - "https://en.wikipedia.org/wiki/Martingale_(betting_system)"
