- id: FIN-KELLY-006
  text: "Kelly for prediction markets: a contract priced at q can be bought for $q and pays $1 if the event occurs. If your estimated probability is p > q, the Kelly fraction is f* = (p - q) / (1 - q). If p < q, you should sell (short) the contract; the short Kelly is f* = (q - p) / q. The edge e = p - q, and the odds b = (1 - q) / q for long positions. Always account for market fees (typically 2-10%) which reduce the effective odds."
  why: >
    Prediction market contracts have a specific structure that simplifies Kelly calculations.
    A contract at price q = $0.40 has implied probability 40% and pays $1.00 if the event occurs.
    Buying it costs $0.40 and profits $0.60 if correct (b = 0.60/0.40 = 1.5:1) or loses $0.40
    if wrong. If your model says p = 0.55, the Kelly fraction is f* = (0.55 - 0.40) / (1 - 0.40)
    = 0.25, meaning bet 25% of bankroll (buy 0.25 * bankroll / 0.40 contracts). Market fees
    (Polymarket charges ~2%, Kalshi charges 2-7%) reduce the effective payout and must be
    included. At 5% fee, the payout becomes $0.95 instead of $1.00, and the effective odds drop
    from 1.5:1 to (0.95 - 0.40)/0.40 = 1.375:1. This small fee reduction can turn a marginal
    bet into a negative-EV bet.
  how_to_do_right: |
    1. Get market price q (e.g., $0.40 for a Yes contract)
    2. Estimate your probability p using your model
    3. If p > q (long): f* = (p - q) / (1 - q)
    4. If p < q (short): f* = (q - p) / q (bet fraction for selling the contract)
    5. Account for fees: effective_payout = 1 - fee_rate (e.g., 0.98 for 2% fee)
    6. Adjusted odds: b_adj = (effective_payout - q) / q for long
    7. Recompute Kelly with adjusted odds: f*_adj = (b_adj * p - q_complement) / b_adj
    8. Apply half-Kelly: f_actual = f*_adj / 2
    9. Position size: n_contracts = f_actual * bankroll / q
    10. Only bet if edge > 2 * SE(p) — require statistical significance
  severity: high
  technologies:
    lang: [python]
    framework: [numpy]
  domains:
    domain: [prediction_markets, fintech]
    concern: [domain_specific, risk_management]
  example_good: |
    import numpy as np

    def prediction_market_kelly(p, q, bankroll, fee_rate=0.02, fractional=0.5):
        """Compute Kelly bet size for a prediction market contract.

        Args:
            p: your estimated probability of the event
            q: current market price of Yes contract ($0-$1)
            bankroll: total available capital
            fee_rate: market fee as a fraction (e.g., 0.02 = 2%)
            fractional: Kelly fraction (0.5 = half Kelly)
        """
        direction = "LONG" if p > q else "SHORT" if p < q else "NO BET"

        if direction == "LONG":
            effective_payout = 1 - fee_rate
            gross_profit = effective_payout - q  # Profit per contract if win
            b = gross_profit / q                 # Net odds
            f_full = (b * p - (1 - p)) / b
        elif direction == "SHORT":
            effective_payout = q - fee_rate * q   # Receive q, pay fee
            b = effective_payout / (1 - q)        # Odds for short
            p_short = 1 - p                       # Probability of event NOT occurring
            f_full = (b * p_short - p) / b
        else:
            print("No edge — do not bet")
            return 0, 0

        f_actual = max(0, f_full * fractional)

        if f_actual <= 0:
            print(f"Edge ({p-q:+.4f}) insufficient after fees — do not bet")
            return 0, 0

        # Position sizing
        if direction == "LONG":
            cost_per_contract = q
        else:
            cost_per_contract = 1 - q  # Margin for short position

        n_contracts = f_actual * bankroll / cost_per_contract
        total_cost = n_contracts * cost_per_contract

        # Expected value
        if direction == "LONG":
            ev = n_contracts * (p * gross_profit - (1-p) * q)
        else:
            ev = n_contracts * ((1-p) * effective_payout - p * (1-q))

        print(f"Prediction Market Kelly ({direction}):")
        print(f"  Your prob:      {p:.4f}")
        print(f"  Market price:   {q:.4f}")
        print(f"  Edge:           {abs(p-q):+.4f}")
        print(f"  Fee rate:       {fee_rate:.2%}")
        print(f"  Net odds:       {b:.4f}")
        print(f"  Full Kelly:     {f_full:.4f}")
        print(f"  Half Kelly:     {f_actual:.4f}")
        print(f"  Contracts:      {n_contracts:.1f}")
        print(f"  Total cost:     ${total_cost:,.2f}")
        print(f"  Expected value: ${ev:,.2f}")
        print(f"  Max loss:       ${total_cost:,.2f}")
        print(f"  Max profit:     ${n_contracts * gross_profit:,.2f}" if direction == "LONG" else "")
        return f_actual, n_contracts

    # Example 1: You think event has 55% prob, market says 40% — strong buy
    prediction_market_kelly(p=0.55, q=0.40, bankroll=10_000)

    # Example 2: You think event has 30% prob, market says 50% — short
    print()
    prediction_market_kelly(p=0.30, q=0.50, bankroll=10_000)

    # Example 3: Edge too small after fees
    print()
    prediction_market_kelly(p=0.42, q=0.40, bankroll=10_000, fee_rate=0.05)
  example_bad: |
    import numpy as np

    # WRONG: Ignoring fees and using wrong Kelly formula for prediction markets
    p, q = 0.55, 0.40
    bankroll = 10000

    # Wrong: using binary Kelly without converting market price to odds
    f = p - (1 - p)  # 0.10 — this is Kelly for even-money bets!
    # For q=0.40, odds are 1.5:1, so correct Kelly is 0.25

    # Wrong: ignoring 5% fee
    n_contracts = f * bankroll / q  # Wrong fraction AND no fee adjustment
    # With 5% fee, a 2% edge (p=0.42, q=0.40) becomes NEGATIVE EV
  when_applies: Sizing bets on prediction market platforms (Polymarket, Kalshi, Metaculus)
  sources:
    - "https://en.wikipedia.org/wiki/Kelly_criterion"
    - "https://www.investopedia.com/articles/trading/04/091504.asp"

- id: FIN-KELLY-007
  text: "Kelly with estimation error requires shrinkage because the Kelly fraction is a concave function of edge, so estimation error causes systematic overbetting. If p is estimated with standard error SE(p), Bayesian Kelly uses the posterior distribution of p to compute the optimal fraction, which is always smaller than the plug-in Kelly using point estimate p_hat. A practical heuristic: Kelly_adjusted = f* * max(0, 1 - 2*(SE/edge)^2)."
  why: >
    In practice, the true probability p is never known — it is estimated from data, models, or
    expert judgment. Because Kelly is a concave function of p (G(f) is a parabola), Jensen's
    inequality guarantees that E[Kelly(p_hat)] > Kelly(E[p_hat]) when p_hat has estimation error.
    This means that using the point estimate p_hat in the Kelly formula systematically OVERBETS.
    The overbet is proportional to Var(p_hat) / edge^2. For a small edge (e.g., 3%) with
    moderate uncertainty (SE = 5%), the overbet factor can be 2x or more. Bayesian Kelly integrates
    over the posterior distribution of p, naturally producing smaller fractions for uncertain
    estimates. The practical heuristic Kelly_adjusted = f* * max(0, 1 - 2*(SE/edge)^2) captures
    the first-order correction. If SE > edge / sqrt(2), this goes to zero — meaning you should
    not bet at all because you cannot distinguish your edge from noise.
  how_to_do_right: |
    1. Estimate p from data and compute SE(p) = sqrt(p*(1-p)/n) for n observations
    2. Compute edge = p - q_market
    3. If SE > edge / sqrt(2): do NOT bet — insufficient confidence in edge
    4. Heuristic adjustment: f_adj = f* * max(0, 1 - 2*(SE/edge)^2)
    5. For Bayesian Kelly: integrate Kelly over posterior of p:
       f_bayesian = integral(Kelly(p) * posterior(p) dp)
    6. With Beta posterior (conjugate prior for Bernoulli):
       posterior ~ Beta(alpha + wins, beta + losses) with weakly informative prior Beta(1,1)
    7. Sample from posterior and compute average Kelly: f_bayesian = mean(Kelly(p_sample))
    8. Use at least 100 observations before betting with any Kelly formula
    9. Re-estimate p and SE after every 50 new observations
  severity: high
  technologies:
    lang: [python]
    framework: [numpy, scipy]
  domains:
    domain: [prediction_markets, fintech, mathematics]
    concern: [domain_specific, risk_management]
  example_good: |
    import numpy as np
    from scipy.stats import beta as beta_dist

    def bayesian_kelly(wins, losses, b, prior_alpha=1, prior_beta=1,
                       n_samples=50_000, fractional=0.5, seed=42):
        """Bayesian Kelly using Beta posterior for win probability.

        Args:
            wins: number of wins observed
            losses: number of losses observed
            b: net odds (profit per unit wagered)
            prior_alpha, prior_beta: Beta prior parameters
            n_samples: number of posterior samples
            fractional: Kelly fraction multiplier
        """
        rng = np.random.default_rng(seed)
        n = wins + losses
        p_hat = wins / n if n > 0 else 0.5

        # Posterior: Beta(alpha + wins, beta + losses)
        alpha_post = prior_alpha + wins
        beta_post = prior_beta + losses

        # Standard error of p estimate
        se_p = np.sqrt(p_hat * (1 - p_hat) / n) if n > 0 else 0.5

        # Point estimate Kelly
        f_point = max(0, (b * p_hat - (1 - p_hat)) / b)

        # Bayesian Kelly: average Kelly over posterior samples
        p_samples = beta_dist.rvs(alpha_post, beta_post, size=n_samples, random_state=seed)
        kelly_samples = np.maximum(0, (b * p_samples - (1 - p_samples)) / b)
        f_bayesian = np.mean(kelly_samples)

        # Heuristic adjustment
        edge = b * p_hat - (1 - p_hat)
        if edge > 0 and se_p > 0:
            adjustment = max(0, 1 - 2 * (se_p / (edge/b))**2)
        else:
            adjustment = 0
        f_heuristic = f_point * adjustment

        f_actual = f_bayesian * fractional

        print(f"Bayesian Kelly Analysis (n={n}, wins={wins}, losses={losses}):")
        print(f"  p_hat:            {p_hat:.4f} (SE: {se_p:.4f})")
        print(f"  Posterior:         Beta({alpha_post}, {beta_post})")
        print(f"  95% CI for p:     [{beta_dist.ppf(0.025, alpha_post, beta_post):.4f}, "
              f"{beta_dist.ppf(0.975, alpha_post, beta_post):.4f}]")
        print(f"  Point Kelly:      {f_point:.4f}")
        print(f"  Bayesian Kelly:   {f_bayesian:.4f} ({(f_bayesian/f_point - 1)*100:+.1f}% vs point)" if f_point > 0 else "")
        print(f"  Heuristic Kelly:  {f_heuristic:.4f}")
        print(f"  Final (half):     {f_actual:.4f}")

        # Probability of having NO edge (p < break-even)
        p_breakeven = 1 / (1 + b)
        p_no_edge = beta_dist.cdf(p_breakeven, alpha_post, beta_post)
        print(f"  P(no edge):       {p_no_edge:.2%}")
        if p_no_edge > 0.10:
            print(f"  WARNING: {p_no_edge:.0%} chance you have NO edge — consider not betting")

        return f_actual

    # Example 1: Strong evidence (200 trades, 55% win rate)
    bayesian_kelly(wins=110, losses=90, b=1.0)

    # Example 2: Weak evidence (20 trades, 60% win rate)
    print()
    bayesian_kelly(wins=12, losses=8, b=1.0)
    # Bayesian Kelly is much smaller due to wide posterior
  example_bad: |
    import numpy as np

    # WRONG: Using point estimate Kelly with very few observations
    wins, losses = 6, 4  # Only 10 trades!
    p = wins / (wins + losses)  # 0.60
    b = 1.0
    f = (b * p - 0.4) / b  # 0.20 — aggressive 20% bet

    # SE = sqrt(0.6*0.4/10) = 0.155 — massive uncertainty!
    # 95% CI for p: [0.30, 0.90] — could easily have NO edge
    # Bayesian Kelly with n=10 would give f ≈ 0.05-0.08, not 0.20
    # Using point estimate Kelly with n=10 is 2-3x overbetting
  when_applies: Sizing bets when the win probability is estimated from limited data, early-stage trading strategies
  sources:
    - "https://en.wikipedia.org/wiki/Kelly_criterion"
    - "https://en.wikipedia.org/wiki/Bayesian_inference"

- id: FIN-KELLY-008
  text: "The growth-optimal portfolio maximizes E[log(W)] = E[log(1 + r_p)] where r_p is the portfolio return. For continuous returns with mean vector mu and covariance matrix Sigma, the Kelly portfolio is w* = Sigma^{-1} * (mu - r_f * 1) — the inverse-covariance-weighted excess returns. This is equivalent to mean-variance optimization with risk aversion parameter gamma = 1. The Kelly portfolio is typically MORE leveraged than conventional portfolios."
  why: >
    The growth-optimal portfolio is the multi-asset generalization of Kelly, derived by Thorp and
    Latane in the 1960s. It maximizes the long-term geometric growth rate of wealth. The solution
    w* = Sigma^{-1} * (mu - r_f) is strikingly simple: it inverts the covariance matrix and
    multiplies by excess returns. This naturally tilts toward assets with high Sharpe ratio and
    low correlation. The total leverage (sum of |w_i|) can exceed 1.0 — the Kelly portfolio
    naturally uses leverage when the Sharpe ratio warrants it. For a single asset with excess
    return mu-r_f and volatility sigma, the Kelly leverage is (mu-r_f)/sigma^2, which for the
    S&P 500 (mu-rf ~= 7%, sigma ~= 16%) gives ~2.7x leverage. In practice, estimation error in
    mu is massive (takes ~50 years to estimate mu with 1% precision), so the Kelly portfolio
    must be regularized or fractional-Kelly applied.
  how_to_do_right: |
    1. Estimate expected excess returns: mu_excess = mu - r_f
    2. Estimate covariance matrix Sigma (use Ledoit-Wolf shrinkage for stability)
    3. Kelly weights: w* = Sigma^{-1} @ mu_excess
    4. Total leverage: L = sum(|w_i|); Kelly typically gives L > 1
    5. Apply fractional Kelly: w_actual = fraction * w* (use fraction = 0.25-0.50)
    6. Cap individual position leverage at 2-3x
    7. Cap total portfolio leverage at 2x for equities, 5x for fixed income
    8. Regularize: Sigma estimation error dominates for large n; use shrinkage
    9. Re-estimate monthly; mu requires MUCH more data than Sigma for stability
    10. Compare with mean-variance (gamma=1 is Kelly, higher gamma is more conservative)
  severity: high
  technologies:
    lang: [python]
    framework: [numpy, scipy]
  domains:
    domain: [fintech, mathematics]
    concern: [domain_specific, risk_management]
  example_good: |
    import numpy as np
    from scipy.linalg import inv

    def growth_optimal_portfolio(mu, sigma_matrix, rf=0.04, fractional=0.5):
        """Compute the growth-optimal (Kelly) portfolio weights.

        Args:
            mu: expected annual returns for each asset
            sigma_matrix: annual covariance matrix
            rf: risk-free rate
            fractional: Kelly fraction (0.5 = half-Kelly)
        """
        n_assets = len(mu)
        mu_excess = mu - rf

        # Kelly portfolio: Sigma^{-1} @ mu_excess
        sigma_inv = inv(sigma_matrix)
        w_kelly = sigma_inv @ mu_excess
        w_actual = w_kelly * fractional

        # Portfolio statistics
        port_return = w_actual @ mu
        port_vol = np.sqrt(w_actual @ sigma_matrix @ w_actual)
        sharpe = (port_return - rf) / port_vol
        leverage = np.sum(np.abs(w_actual))

        # Growth rate: E[log(1 + r_p)] ≈ mu_p - 0.5 * sigma_p^2
        growth_rate = port_return - 0.5 * port_vol**2

        print(f"Growth-Optimal Portfolio ({fractional:.0%} Kelly):")
        print(f"  {'Asset':>10s} {'mu':>8s} {'Kelly w':>10s} {'Actual w':>10s}")
        for i in range(n_assets):
            print(f"  {'Asset ' + str(i):>10s} {mu[i]:>8.2%} {w_kelly[i]:>10.4f} {w_actual[i]:>10.4f}")
        print(f"\n  Expected return: {port_return:.2%}")
        print(f"  Volatility:      {port_vol:.2%}")
        print(f"  Sharpe ratio:    {sharpe:.3f}")
        print(f"  Growth rate:     {growth_rate:.2%}")
        print(f"  Total leverage:  {leverage:.2f}x")

        return w_actual

    # 3-asset example: Stocks, Bonds, Gold
    mu = np.array([0.10, 0.05, 0.07])  # Expected annual returns
    vols = np.array([0.16, 0.05, 0.14])
    corr = np.array([
        [1.0, -0.1, 0.05],
        [-0.1, 1.0, 0.10],
        [0.05, 0.10, 1.0],
    ])
    sigma_matrix = np.outer(vols, vols) * corr

    w_full = growth_optimal_portfolio(mu, sigma_matrix, rf=0.04, fractional=1.0)
    print()
    w_half = growth_optimal_portfolio(mu, sigma_matrix, rf=0.04, fractional=0.5)
  example_bad: |
    import numpy as np

    # WRONG: Using Kelly without covariance matrix (ignoring correlations)
    mu = np.array([0.10, 0.05, 0.07])
    rf = 0.04
    vols = np.array([0.16, 0.05, 0.14])

    # Naive: treat each asset independently
    kelly_weights = (mu - rf) / vols**2  # [2.34, 4.00, 1.53]
    # Total leverage = 7.87x — INSANE for a stock/bond/gold portfolio
    # Ignoring correlations leads to overallocation and excessive leverage
    # Correct full-Kelly leverage is ~3-4x; half-Kelly is ~1.5-2x
  when_applies: Multi-asset portfolio optimization, leverage decisions, comparing Kelly with mean-variance
  sources:
    - "https://en.wikipedia.org/wiki/Kelly_criterion"
    - "https://www.edwardothorp.com/wp-content/uploads/2016/11/TheKellyCriterionAndTheStockMarket.pdf"

- id: FIN-KELLY-009
  text: "Practical bankroll management requires rebalancing Kelly positions as your bankroll changes and as estimates of p and b evolve. After a win, Kelly increases position size (anti-martingale); after a loss, it decreases. Rebalance frequency matters: daily rebalancing maximizes theoretical growth but incurs transaction costs. A practical rule: rebalance when actual allocation deviates more than 20% from target Kelly fraction, or weekly, whichever comes first."
  why: >
    Kelly is a dynamic strategy — the dollar bet size changes with the bankroll. If your bankroll
    grows from $10,000 to $15,000, a 10% Kelly bet grows from $1,000 to $1,500. This is the
    anti-martingale property: you bet MORE after winning and LESS after losing, which is the
    opposite of the gambler's fallacy-driven martingale strategy. This automatic position sizing
    is what produces the geometric growth rate. However, if you do not rebalance, your actual
    allocation drifts from the target. After a big win on one bet, that position becomes over-
    weighted relative to Kelly. Continuous rebalancing is impractical due to transaction costs
    (prediction market fees, slippage). The 20% deviation threshold balances tracking error against
    cost: tighter thresholds improve growth but increase fees, wider thresholds save fees but
    introduce drag from suboptimal sizing.
  how_to_do_right: |
    1. Start with Kelly fractions computed from current estimates of p and b
    2. Position size in dollars = Kelly_fraction * current_bankroll
    3. After each bet resolves: update bankroll, recompute dollar position sizes
    4. Rebalance trigger: |actual_fraction - target_fraction| / target_fraction > 0.20
    5. Or rebalance on a fixed schedule (weekly for active markets)
    6. Include transaction costs in the rebalance decision:
       only rebalance if expected_growth_gain > transaction_cost
    7. Update p and b estimates periodically (every 50-100 new observations)
    8. Keep a separate reserve (10-20% of bankroll) not allocated to any bet — insurance
    9. Track and log all bet sizes, outcomes, and bankroll changes for post-hoc analysis
    10. Set hard stop-loss: if bankroll drops below 50% of initial, pause and re-evaluate strategy
  severity: medium
  technologies:
    lang: [python]
    framework: [numpy, pandas]
  domains:
    domain: [prediction_markets, fintech]
    concern: [domain_specific, risk_management]
  example_good: |
    import numpy as np

    class KellyBankroll:
        """Manages a bankroll with Kelly-sized bets and rebalancing."""

        def __init__(self, initial_bankroll, reserve_fraction=0.10):
            self.bankroll = initial_bankroll
            self.initial = initial_bankroll
            self.reserve = reserve_fraction
            self.history = [initial_bankroll]
            self.bets_log = []

        def available_capital(self):
            return self.bankroll * (1 - self.reserve)

        def kelly_bet_size(self, p, b, fractional=0.5):
            """Compute bet size in dollars."""
            q = 1 - p
            f_star = max(0, (b * p - q) / b)
            f_actual = f_star * fractional
            return f_actual * self.available_capital()

        def place_bet(self, amount, p, b, outcome, market_name=""):
            """Record a bet outcome and update bankroll."""
            if outcome:
                pnl = amount * b
            else:
                pnl = -amount

            self.bankroll += pnl
            self.history.append(self.bankroll)
            self.bets_log.append({
                "market": market_name,
                "amount": amount,
                "p": p,
                "b": b,
                "outcome": outcome,
                "pnl": pnl,
                "bankroll": self.bankroll,
            })
            return pnl

        def should_rebalance(self, current_allocation, target_fraction, threshold=0.20):
            """Check if rebalancing is needed."""
            actual_fraction = current_allocation / self.available_capital()
            deviation = abs(actual_fraction - target_fraction) / target_fraction
            return deviation > threshold

        def report(self):
            """Print bankroll status."""
            n_bets = len(self.bets_log)
            wins = sum(1 for b in self.bets_log if b["outcome"])
            peak = max(self.history)
            drawdown = (peak - self.bankroll) / peak

            print(f"Bankroll Report:")
            print(f"  Initial:     ${self.initial:,.2f}")
            print(f"  Current:     ${self.bankroll:,.2f} ({self.bankroll/self.initial - 1:+.2%})")
            print(f"  Peak:        ${peak:,.2f}")
            print(f"  Drawdown:    {drawdown:.2%}")
            print(f"  Bets:        {n_bets} ({wins}W/{n_bets-wins}L)")
            print(f"  Available:   ${self.available_capital():,.2f}")

    # Simulation
    rng = np.random.default_rng(42)
    bm = KellyBankroll(10_000)

    for i in range(100):
        p, b = 0.55, 1.0
        bet_size = bm.kelly_bet_size(p, b, fractional=0.5)
        outcome = rng.random() < p
        bm.place_bet(bet_size, p, b, outcome, f"Bet_{i}")

    bm.report()
  example_bad: |
