layer: rules
technology: SRE
domain: deployment
knowledge:
- id: CR-SRE-PROD-001
  text: Production Readiness Review (PRR) is a gate that evaluates whether a service is READY for production support — covering
    monitoring, capacity, failure modes, and operational procedures. No service should go live without passing this review.
  why: 'Google''s SRE Engagement Model (Chapters 28-32) describes the Production Readiness Review as the formal process by
    which SRE evaluates a service before accepting on-call responsibility. The PRR covers: monitoring (are SLIs defined and
    alerting configured?), capacity planning (can the service handle projected traffic with N-1 redundancy?), failure modes
    (what happens when each dependency fails?), operational procedures (are runbooks written for common incidents?), security
    (has the service passed security review?), and testing (is there adequate test coverage including load tests?). Without
    a PRR, SRE accepts responsibility for a service without understanding its failure modes — and the first on-call shift
    becomes a discovery exercise at the worst possible time.

    '
  how_to_do_right: '1. Define a PRR checklist covering: SLOs defined, alerting configured, runbooks written, load tested,
    security reviewed, dependencies documented.

    2. Conduct the PRR BEFORE the service goes live, not after the first outage.

    3. The PRR should identify gaps, not block launches. "You need to add database failover before SRE takes on-call" is actionable.

    4. PRR findings should be tracked as action items with owners and deadlines — same as postmortem action items.

    5. Re-run the PRR when significant changes are made: new dependencies, new traffic patterns, new failure modes.

    6. Make PRR templates available to all teams. Self-service PRR for simple services, facilitated PRR for complex ones.

    '
  example_good: "from dataclasses import dataclass, field\nfrom typing import List, Optional\n\n@dataclass\nclass ProductionReadinessReview:\n    service_name: str\n    slos_defined: bool = False\n    alerting_configured: bool = False\n    runbooks_written: bool = False\n    load_tested: bool = False\n    security_reviewed: bool = False\n    dependencies_documented: bool = False\n    failure_modes_documented: bool = False\n    findings: List[str] = field(default_factory=list)\n\n    def is_ready(self) -> bool:\n        return all([\n            self.slos_defined, self.alerting_configured,\n            self.runbooks_written, self.load_tested,\n            self.security_reviewed, self.dependencies_documented,\n            self.failure_modes_documented,\n        ])\n\n    def get_action_items(self) -> List[str]:\n        items = []\n        if not self.slos_defined:\n            items.append('Define SLIs and SLOs before go-live')\n        if not self.failure_modes_documented:\n            items.append('Document failure modes for each dependency')\n        items.extend(self.findings)\n        return items\n\nprr = ProductionReadinessReview(service_name='payment-service')\nprr.slos_defined = True\nprr.alerting_configured = True\nif not prr.is_ready():\n    print(f'Blocked: {prr.get_action_items()}')\n"
  example_bad: "# No PRR — SRE accepts on-call for a service they've never reviewed\ndef go_live(service_name: str):\n    deploy(service_name)\n    add_to_oncall_rotation(service_name)\n    # First on-call shift becomes a discovery exercise:\n    # - What are the SLOs? Unknown.\n    # - Where are the runbooks? Don't exist.\n    # - What are the dependencies? Let's find out at 3 AM.\n"
  when_applies: "Before any service transitions to production or before SRE accepts on-call responsibility for a new service."
  severity: high
  technologies:
    lang: [general]
    platform: [cloud, kubernetes]
  domains:
    domain: [operations, deployment, reliability]
  sources:
  - url: https://sre.google/sre-book/accelerating-sre-on-call/
    title: 'Google SRE Book — Chapter 28: Accelerating SREs to On-Call and Beyond'
  validation_status: cross_checked
- id: CR-SRE-PROD-002
  text: Document failure modes BEFORE they happen. For every dependency your service has, answer — what happens when it is
    unavailable, slow, or returns corrupt data? If you cannot answer this for every dependency, your service is not production-ready.
  why: 'Google''s production readiness process requires explicit failure mode documentation because implicit assumptions about
    failure handling are almost always wrong. Engineers assume "if the cache is down, we fall through to the database" — but
    they never tested this path, and the database cannot handle the full load without the cache. They assume "if the auth
    service is slow, we timeout and retry" — but the retry creates a thundering herd that makes the auth service even slower.
    Google requires a Failure Mode Analysis document that lists every dependency and explicitly states: what happens when
    it is completely unavailable, what happens when it is slow (50%, 200%, 500% of normal latency), and what happens when
    it returns incorrect data. For each scenario, the document specifies the expected system behavior and the mitigation strategy.

    '
  how_to_do_right: '1. List every dependency: databases, caches, APIs, message queues, DNS, auth services, CDN, payment gateways.

    2. For each dependency, document three scenarios: complete unavailability, high latency (2x, 5x, 10x normal), and corrupt/incorrect
    responses.

    3. For each scenario, specify: expected system behavior (degrade, fail fast, serve cached), detection method (alert, prober,
    metric), and recovery action (automatic or manual).

    4. Test each failure scenario. If you documented "falls back to cache" but never tested it, it probably doesn''t work.

    5. Include transitive dependencies: your service depends on A, which depends on B. What happens when B fails?

    6. Review failure mode documentation quarterly and after every dependency change.

    '
  example_good: "from dataclasses import dataclass\nfrom typing import Dict, List\nfrom enum import Enum\n\nclass FailureScenario(Enum):\n    UNAVAILABLE = 'completely_unavailable'\n    HIGH_LATENCY = 'high_latency'\n    CORRUPT_DATA = 'corrupt_responses'\n\n@dataclass\nclass DependencyFailureMode:\n    dependency: str\n    scenario: FailureScenario\n    expected_behavior: str\n    detection_method: str\n    recovery_action: str\n    tested: bool = False\n\nFAILURE_MODES: List[DependencyFailureMode] = [\n    DependencyFailureMode(\n        dependency='PostgreSQL primary',\n        scenario=FailureScenario.UNAVAILABLE,\n        expected_behavior='Serve read-only from replica, reject writes with 503',\n        detection_method='Health check fails, alert fires within 60s',\n        recovery_action='Automatic failover to replica within 30s',\n        tested=True,\n    ),\n    DependencyFailureMode(\n        dependency='Redis cache',\n        scenario=FailureScenario.HIGH_LATENCY,\n        expected_behavior='Bypass cache after 50ms timeout, serve from DB directly',\n        detection_method='Cache latency metric > 50ms triggers alert',\n        recovery_action='Circuit breaker opens automatically; manual restart if persists',\n        tested=True,\n    ),\n    DependencyFailureMode(\n        dependency='Auth service',\n        scenario=FailureScenario.UNAVAILABLE,\n        expected_behavior='Return 503 for authenticated endpoints, serve public endpoints normally',\n        detection_method='Auth health check probe, error rate alert',\n        recovery_action='No retry (prevents thundering herd), escalate after 5 min',\n        tested=True,\n    ),\n]\n"
  example_bad: "# No failure mode documentation\n# Implicit assumption: 'If the cache is down, we fall through to the database'\n# Reality: The database can't handle full load without the cache\n# Implicit assumption: 'If auth is slow, we timeout and retry'\n# Reality: Retries create thundering herd that makes auth even slower\n# No explicit documentation = every failure discovered for the first time during an incident\n"
  when_applies: "When building any service with external dependencies — every dependency's failure modes must be documented and tested before production."
  severity: high
  technologies:
    lang: [general]
    platform: [cloud, kubernetes]
  domains:
    domain: [architecture, operations, deployment, reliability]
    concern: [resilience]
  sources:
  - url: https://sre.google/sre-book/evolving-sre-engagement-model/
    title: 'Google SRE Book — Chapter 32: The Evolving SRE Engagement Model'
  validation_status: cross_checked
- id: CR-SRE-PROD-003
  text: SRE engagement with development teams should start early (at design time) — not after the service is built. Retrofitting
    reliability into a service that was designed without it is 10x more expensive than designing it in from the start.
  why: 'Google''s Chapter 32 describes the evolution of SRE engagement from a "handoff" model (dev builds, SRE operates) to
    a "continuous engagement" model (SRE advises during design, reviews during development, and supports in production). Early
    engagement prevents the most expensive reliability problems: a service designed without proper error handling requires
    architectural changes to add it. A service designed without monitoring requires instrumentation of every code path. A
    service designed without graceful degradation requires a complete rethinking of the failure strategy. Google found that
    every $1 spent on reliability during design saved $10 during development and $100 during production. The most expensive
    reliability investment is AFTER the first major outage — when the service must be redesigned under time pressure.

    '
  how_to_do_right: '1. Include an SRE (or reliability-focused engineer) in design reviews for any new service or major feature.

    2. Design reviews should explicitly address: SLOs, monitoring, failure modes, capacity planning, and rollback strategy.

    3. Create reliability requirements alongside functional requirements: "The service MUST degrade gracefully when the database
    is unavailable."

    4. Build monitoring and alerting INTO the service from day one — not as a post-launch addition.

    5. Design for operability: structured logging, health check endpoints, admin APIs, configuration without restarts.

    6. Conduct a mini-PRR at the end of the design phase: "Based on this design, what are the top 3 reliability risks?"

    '
  example_good: "# Design review includes reliability requirements from day one\nclass ServiceDesignDoc:\n    def __init__(self, name: str):\n        self.name = name\n        # Reliability requirements alongside functional requirements\n        self.reliability_requirements = [\n            'Service MUST degrade gracefully when database is unavailable',\n            'Service MUST respond within 500ms at P99 under peak load',\n            'Service MUST support zero-downtime deployments',\n        ]\n        self.slos = {'availability': 0.999, 'latency_p99_ms': 500}\n        self.monitoring = {\n            'sli_metrics': ['request_count', 'error_count', 'latency_histogram'],\n            'alerting': ['error_rate > 1%', 'p99_latency > 500ms'],\n        }\n        self.failure_modes = {}  # Filled during design review\n        self.rollback_strategy = 'feature_flag + blue_green_deployment'\n\n    def mini_prr(self) -> list:\n        \"\"\"End-of-design-phase reliability review.\"\"\"\n        risks = []\n        if not self.failure_modes:\n            risks.append('No failure modes documented')\n        if not self.monitoring.get('alerting'):\n            risks.append('No alerting configured')\n        return risks\n"
  example_bad: "# SRE engagement starts AFTER the service is built and in production\n# Dev team builds the service without considering:\n# - Monitoring (added post-launch after first outage)\n# - Graceful degradation (requires architectural redesign)\n# - Error handling (scattered try/except added reactively)\n# - Capacity planning (discovered limits during Black Friday)\n# Cost: $1 during design → $10 during development → $100 in production\n"
  when_applies: "At the start of any new service or major feature design — SRE engagement during design prevents costly retrofitting."
  severity: high
  technologies:
    lang: [general]
  domains:
    domain: [architecture, operations, deployment, reliability]
  sources:
  - url: https://sre.google/sre-book/evolving-sre-engagement-model/
    title: 'Google SRE Book — Chapter 32: The Evolving SRE Engagement Model'
  validation_status: cross_checked
- id: CR-SRE-PROD-004
  text: Runbooks are mandatory for every alert. When an alert fires, the on-call engineer must have a documented procedure
    — what to check, what to try, when to escalate. Alerts without runbooks are noise that wastes the most expensive resource
    in your organization — human attention.
  why: 'Google requires a runbook entry for every alerting rule. The runbook is linked directly from the alert notification
    so the on-call engineer sees the procedure immediately. Without a runbook, every alert requires the engineer to investigate
    from scratch: what does this metric mean? What are the normal values? What services are affected? Who should I call? This
    investigation time extends MTTR by 15-30 minutes per incident. With a runbook, the engineer reads: "This alert fires when
    P99 latency exceeds 500ms. Check: 1) Database query latency (dashboard X). 2) If DB latency is normal, check cache hit
    rate (dashboard Y). 3) If cache hit rate dropped, restart cache (command Z). 4) If none of the above, escalate to team-lead."
    This transforms incident response from detective work to procedure execution.

    '
  how_to_do_right: '1. Every alert MUST link to a runbook. No exceptions. If you cannot write a runbook for an alert, the
    alert should not exist.

    2. Runbook format: Symptom → Check 1 (expected vs actual) → Action 1 → Check 2 → Action 2 → Escalation.

    3. Include the EXACT commands to run, not "check the database." Engineers under stress at 3 AM need copy-paste commands.

    4. Include "known false positive" section: conditions under which this alert fires but no action is needed.

    5. Update the runbook after every incident: "We discovered that Step 3 doesn''t work when X. Added Step 3a."

    6. Review all runbooks quarterly: remove obsolete ones, update stale commands, verify escalation contacts are current.

    '
  example_good: "# Runbook linked directly from alert notification\nALERT_RUNBOOKS = {\n    'high_p99_latency': {\n        'description': 'P99 latency exceeds 500ms for > 5 minutes',\n        'steps': [\n            {'check': 'Database query latency', 'dashboard': 'https://grafana/d/db-latency',\n             'expected': '< 100ms', 'if_abnormal': 'Check slow query log: SELECT * FROM pg_stat_activity'},\n            {'check': 'Cache hit rate', 'dashboard': 'https://grafana/d/cache-stats',\n             'expected': '> 95%', 'if_abnormal': 'Restart cache: kubectl rollout restart deploy/redis'},\n            {'check': 'Connection pool utilization', 'dashboard': 'https://grafana/d/pool',\n             'expected': '< 80%', 'if_abnormal': 'Scale horizontally: kubectl scale deploy/api --replicas=10'},\n        ],\n        'escalation': 'If none of the above resolves, escalate to #sre-oncall-escalation',\n        'known_false_positives': [\n            'During daily ETL job (02:00-02:30 UTC) — latency spike is expected',\n        ],\n    },\n}\n\ndef on_alert(alert_name: str):\n    runbook = ALERT_RUNBOOKS.get(alert_name)\n    if not runbook:\n        raise ValueError(f'No runbook for alert {alert_name} — alert should not exist')\n    return runbook\n"
  example_bad: "# Alert fires at 3 AM with no runbook\n# On-call engineer sees: 'CRITICAL: high_p99_latency'\n# Questions without answers:\n# - What does this metric mean?\n# - What are normal values?\n# - What services are affected?\n# - Who should I call?\n# Engineer spends 30 minutes investigating from scratch\n# Meanwhile, users are experiencing degraded service\n"
  when_applies: "When configuring any alerting rule — every alert must have a linked runbook with exact commands and escalation procedures."
  severity: high
  technologies:
    lang: [general]
    platform: [pagerduty]
  domains:
    domain: [operations, deployment, reliability]
    concern: [on_call]
  sources:
  - url: https://sre.google/sre-book/accelerating-sre-on-call/
