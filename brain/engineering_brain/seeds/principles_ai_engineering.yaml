    incorrect output. For each feature, define: what happens when the output is wrong? How does the
    user discover the error? How does the system recover? If the answer to any of these is "nothing"
    or "they can't," redesign the feature.
    2. Implement hallucination detection as a first-class pipeline stage. Use retrieval-based
    verification (does the response match the source documents?), multi-sample consistency (do
