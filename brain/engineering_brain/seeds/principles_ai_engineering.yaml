- id: P-AI-SAFETY
  name: AI Safety Boundaries Must Be Enforced at the System Level, Not the Prompt Level
  why: |
    System prompts are suggestions, not constraints. They operate within the same probabilistic generation
    process as user inputs, meaning they can be overridden, ignored, or circumvented by sufficiently
    creative adversarial inputs. Prompt injection — where user input manipulates the model into ignoring
    its system prompt — is not a theoretical concern; it is a daily reality in production LLM applications.
    Every major model has been jailbroken through prompt injection, from simple "ignore previous instructions"
    attacks to sophisticated multi-turn manipulation. Relying on the system prompt for safety is equivalent
    to relying on a polite sign that says "do not enter" instead of a locked door. The fundamental problem
    is that system prompts and user inputs occupy the same attention space — the model cannot reliably
    distinguish between instructions it should follow and instructions it should reject. True safety
    boundaries must be enforced architecturally: input classifiers that detect and block malicious inputs
    before they reach the model, output validators that filter harmful content regardless of how it was
    generated, tool-use permissions that restrict what actions the model can take, and rate limiting that
    prevents abuse at scale. The 2025-2026 landscape includes sophisticated attack vectors — indirect
    prompt injection (hidden instructions in retrieved documents), multi-modal injection (instructions
    embedded in images), and slow-burn attacks (gradually shifting model behavior over a conversation).
    Each of these bypasses prompt-level defenses entirely. Only system-level enforcement provides
    reliable protection.
  how_to_apply: |
    1. Implement input classification before the LLM processes any user input. Use a dedicated classifier
    model (not the same LLM) to detect prompt injection attempts, toxicity, and out-of-scope requests.
    Block or sanitize flagged inputs before they enter the prompt. This is your first line of defense
    and it operates independently of the system prompt.
    2. Enforce tool-use permissions at the application layer, not in the prompt. If the LLM can call
    tools (APIs, databases, file systems), implement an allowlist of permitted operations with parameter
    validation. The prompt can say "only use the search tool," but the application layer must enforce it
    by rejecting unauthorized tool calls regardless of what the model requests.
    3. Implement output filtering as a separate, independent pipeline stage. Run safety classifiers on
    every LLM output. Check for PII leakage, harmful content, and policy violations. This layer catches
    failures that slip past both input classification and the system prompt.
    4. Use architectural isolation for sensitive operations. If the system handles multiple users, ensure
    one user's context cannot leak into another's through shared state or cache. Implement per-request
    context boundaries, not per-session. Treat every request as potentially adversarial.
    5. Implement defense in depth with independent layers. Each safety layer should operate independently
    so that the failure of one layer does not compromise the system. Input classification, system prompt,
    output filtering, and tool permissions should all enforce the same boundaries redundantly.
  mental_model: >-
    A system prompt is a lock on a screen door — it signals intent but provides no real security. System-level enforcement
    is the deadbolt on a steel door.
  domains:
    domain:
    - ai
    - security
    - architecture
    concern:
    - safety
    - llm
    - production
  violation_consequence: >-
    Prompt-level safety fails against adversarial users. A single successful jailbreak can expose system prompts (revealing
    business logic), generate harmful content at scale, exfiltrate RAG context containing PII, or trigger unauthorized tool
    calls. The damage scales with the system's capabilities.
  teaching_example: >-
    A company deploys an AI assistant with strict system prompt safety instructions. An adversary discovers that base64-encoding
    malicious instructions bypasses the safety prompt. The model decodes and follows the encoded instructions, producing harmful
    content. A system-level input classifier would have caught the encoded payload.
  when_applies: >-
    Every production AI system, especially those exposed to untrusted users, handling sensitive data, or capable of taking
    actions (tool use, API calls, data modification).
  when_not_applies: >-
    Internal research tools used exclusively by trusted team members in controlled environments where adversarial inputs are
    not a concern.
  sources:
  - https://owasp.org/www-project-top-10-for-large-language-model-applications/
  text: >-
    AI Safety Boundaries Must Be Enforced at the System Level, Not the Prompt Level: A system prompt is a lock on a screen
    door — it signals intent but provides no real security.
  severity: critical
  technologies:
    lang:
    - python
  how_to_do_right: |-
    1. Implement input classification before the LLM processes any user input. Use a dedicated classifier
    model (not the same LLM) to detect prompt injection attempts, toxicity, and out-of-scope requests.
    Block or sanitize flagged inputs before they enter the prompt. This is your first line of defense
    and it operates independently of the system prompt.
    2. Enforce tool-use permissions at the application layer, not in the prompt. If the LLM can call
    tools (APIs, databases, file systems), implement an allowlist of permitted operations with parameter
    validation. The prompt can say "only use the search tool," but the application layer must enforce it
    by rejecting unauthorized tool calls regardless of what the model requests.
    3. Implement output filtering as a separate, independent pipeline stage. Run safety classifiers on
    every LLM output. Check for PII leakage, harmful content, and policy violations. This layer catches
    failures that slip past both input classification and the system prompt.
    4. Use architectural isolation for sensitive operations. If the system handles multiple users, ensure
    one user's context cannot leak into another's through shared state or cache. Implement per-request
    context boundaries, not per-session. Treat every request as potentially adversarial.
    5. Implement defense in depth with independent layers. Each safety layer should operate independently
    so that the failure of one layer does not compromise the system. Input classification, system prompt,
    output filtering, and tool permissions should all enforce the same boundaries redundantly.
  example_good: |-
    # A company deploys an AI assistant with strict system prompt safety instructions.
    # An adversary discovers that base64-encoding malicious instructions bypasses the safety prompt.
    # The model decodes and follows the encoded instructions, producing harmful content.
    # A system-level input classifier would have caught the encoded payload.
  example_bad: |-
    # Anti-pattern: Violating AI Safety Boundaries Must Be Enforced at the System Level, Not the Prompt Level
