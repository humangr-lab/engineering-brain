- id: P-AI-FALLBACK
  name: Every AI-Powered Feature Needs a Non-AI Fallback Path
  why: |
    LLM APIs go down. Models get deprecated with 30 days notice. Rate limits throttle during peak hours.
    Responses take 30 seconds instead of 3. Safety filters trigger on legitimate inputs. Context windows
    get exceeded. None of these are edge cases — they are normal operating conditions for LLM-powered
    systems. If your feature has no fallback when the AI component fails, your feature is unavailable.
    This is the same principle as graceful degradation in distributed systems, applied to AI. A search
    feature that uses LLM-powered query expansion should fall back to keyword search when the LLM is
    unavailable. A content moderation system that uses LLM classification should fall back to rule-based
    filtering. A recommendation system that uses LLM reasoning should fall back to collaborative
    filtering. The fallback does not need to be as good as the AI-powered version — it needs to be
    functional. Users tolerate reduced quality far better than they tolerate broken features. The design
    implication is significant: every AI-powered feature must be designed as an enhancement layer on top
    of a functional baseline, not as the sole implementation path. This constraint actually improves
    architecture by enforcing clean separation between the AI component and the feature logic. It also
    provides a natural A/B testing framework — you can measure the lift that the AI component provides
    over the baseline fallback. Without this separation, you are building a system with a single point
    of failure that is statistically less reliable than traditional software components, since LLM APIs
    have higher latency variance, more failure modes, and less predictable behavior than deterministic
    services.
  how_to_apply: |
    1. Design every AI-powered feature as a two-layer system: a functional baseline and an AI enhancement
    layer. The baseline must work independently of any LLM. Build and test the baseline first, then add
    the AI layer on top. The feature entry point should route to the AI path by default and fall back to
    the baseline on failure.
    2. Implement circuit breakers around every LLM call. When error rates exceed a threshold (e.g., 3
    failures in 60 seconds), trip the circuit and route all traffic to the fallback path. This prevents
    cascading failures where slow LLM responses cause timeout chains through your system.
    3. Set aggressive timeouts on LLM calls. A 30-second LLM response is worse than a 0.1-second
    fallback response for most user-facing features. Define a latency budget per feature (e.g., 5
    seconds for auto-complete, 15 seconds for document analysis) and trigger the fallback when the
    budget is exceeded.
    4. Test the fallback path as rigorously as the primary path. Include fallback testing in your CI/CD
    pipeline. Periodically force-trigger fallbacks in production (chaos engineering style) to verify they
    work correctly. A fallback that has not been exercised in months may have silently broken.
    5. Monitor fallback activation rates. A sudden increase in fallback activations indicates an upstream
    problem (LLM API degradation, prompt regression causing safety filter triggers, model performance
    change). Track fallback rates per feature and alert on anomalies.
  mental_model: >-
    The AI is the elevator — fast and convenient. The fallback is the stairs — slower but always works. Never build a building
    with only an elevator.
  domains:
    domain:
    - ai
    - architecture
    - reliability
    concern:
    - llm
    - resilience
    - production
  violation_consequence: >-
    Without fallbacks, LLM API outages become product outages. A 15-minute provider degradation becomes a 15-minute incident
    for every user. Rate limiting during peak hours becomes feature unavailability during the time users need it most. The
    business learns the hard way that a 99.9% SLA on the LLM API does not translate to 99.9% availability for AI-powered features.
  teaching_example: >-
    A support ticket routing system uses an LLM to classify and prioritize incoming tickets. During an API outage, all new
    tickets go unrouted for 4 hours. Critical P0 tickets from enterprise customers sit in an unprocessed queue. A simple keyword-based
    classifier fallback would have routed tickets with 70% accuracy — imperfect but functional.
  when_applies: >-
    Every production AI-powered feature, especially in customer-facing products, critical business workflows, and systems
    with SLA commitments.
  when_not_applies: >-
    Features where the AI IS the product and there is no meaningful non-AI alternative — for example, a conversational AI
    assistant where the fallback would be 'feature unavailable.' Even then, implement graceful error handling.
  sources:
  - https://sre.google/sre-book/handling-overload/
  text: 'Every AI-Powered Feature Needs a Non-AI Fallback Path: The AI is the elevator — fast and convenient.'
  severity: high
  technologies:
    lang:
    - python
  how_to_do_right: |-
    1. Design every AI-powered feature as a two-layer system: a functional baseline and an AI enhancement
    layer. The baseline must work independently of any LLM. Build and test the baseline first, then add
    the AI layer on top. The feature entry point should route to the AI path by default and fall back to
    the baseline on failure.
    2. Implement circuit breakers around every LLM call. When error rates exceed a threshold (e.g., 3
    failures in 60 seconds), trip the circuit and route all traffic to the fallback path. This prevents
    cascading failures where slow LLM responses cause timeout chains through your system.
    3. Set aggressive timeouts on LLM calls. A 30-second LLM response is worse than a 0.1-second
    fallback response for most user-facing features. Define a latency budget per feature (e.g., 5
    seconds for auto-complete, 15 seconds for document analysis) and trigger the fallback when the
    budget is exceeded.
    4. Test the fallback path as rigorously as the primary path. Include fallback testing in your CI/CD
    pipeline. Periodically force-trigger fallbacks in production (chaos engineering style) to verify they
    work correctly. A fallback that has not been exercised in months may have silently broken.
    5. Monitor fallback activation rates. A sudden increase in fallback activations indicates an upstream
    problem (LLM API degradation, prompt regression causing safety filter triggers, model performance
    change). Track fallback rates per feature and alert on anomalies.
  example_good: |-
    # A support ticket routing system uses an LLM to classify and prioritize incoming tickets.
    # During an API outage, all new tickets go unrouted for 4 hours.
    # Critical P0 tickets from enterprise customers sit in an unprocessed queue.
    # A simple keyword-based classifier fallback would have routed tickets with 70% accuracy — imperfect but functional.
  example_bad: |-
    # Anti-pattern: Violating Every AI-Powered Feature Needs a Non-AI Fallback Path
    # Result: Without fallbacks
    # Result: LLM API outages become product outages. A 15-minute provider degradation becomes a 15-minute incident for every user. Rate limiting during peak hours becomes feature unavailability during the time users need it most. The business learns the hard way that a 99.9% SLA on the LLM API does not translate to 99.9% availability for AI-powered features.
- id: P-ML-VERSIONING
  name: Models, Data, and Code Must Be Versioned Together — Reproducibility Is Non-Negotiable
  why: |
    A machine learning system is a function of three inputs: the model architecture and hyperparameters,
    the training data, and the code that connects them. Changing any one of these inputs changes the
    output. Yet most teams version only the code. The model weights live in a shared drive. The training
    data lives in a database snapshot that gets overwritten. The preprocessing pipeline has undocumented
    dependencies on system packages. When a production model starts misbehaving, the team cannot
    reconstruct the environment that produced the last known good version. This is not a theoretical
    concern — it is the most common operational failure in ML systems. The fix is conceptually simple
    but requires discipline: every training run must be associated with a specific, immutable snapshot
    of the code, the data, and the configuration. Given these three inputs, anyone should be able to
    reproduce the exact same model weights (within floating-point tolerance). The 2025-2026 MLOps
    ecosystem provides mature tooling: DVC (Data Version Control) for data versioning, MLflow and
    Weights & Biases for experiment tracking, container registries for environment reproducibility,
    and model registries for model versioning. But tooling is not enough — the team must enforce the
    discipline that no model is deployed without a reproducible training lineage. This lineage is
    critical for debugging (which data caused this behavior?), compliance (can you explain why the
    model made this decision?), and incident response (can you roll back to the previous version?).
    Without versioning, ML systems accumulate technical debt exponentially because every untracked
    change compounds uncertainty about system behavior.
  how_to_apply: |
    1. Use a model registry (MLflow, Weights & Biases, Vertex AI Model Registry) as the single source
    of truth for all deployed models. Every model artifact must be registered with its training lineage:
    the git commit hash, the data version hash, the hyperparameter configuration, and the evaluation
    metrics. No model reaches production without a complete lineage record.
    2. Version training data alongside code. Use DVC or a similar tool to track data changes with the
    same granularity as code changes. Every data modification (new samples, label corrections, feature
    additions) gets a version that can be referenced in training runs. Store data versions as immutable
    snapshots, not as diffs on a mutable dataset.
    3. Containerize training environments. The training pipeline should run in a Docker container with
    pinned dependency versions. No "works on my machine" — the container IS the machine. Store container
    images in a registry alongside the model artifacts.
    4. Implement automated lineage tracking in your training pipeline. When a training run starts,
    automatically capture: git commit hash, data version, container image tag, hyperparameters,
    random seeds, hardware specs (GPU type, driver version), and all environment variables. When the
    run completes, attach evaluation metrics. This happens automatically, not manually.
    5. Enforce deployment gates that require complete lineage. The deployment pipeline should reject any
    model artifact that lacks a complete reproducibility record. This is a hard gate, not a soft
    warning. If you cannot reproduce it, you cannot deploy it.
  mental_model: >-
    A model without versioned lineage is like a medical test result without the lab methodology — the number is meaningless
    without knowing how it was produced.
  domains:
    domain:
    - ai
    - operations
    - devops
    concern:
    - mlops
    - reproducibility
    - versioning
  violation_consequence: >-
    Without versioning, model rollbacks are impossible — you cannot redeploy a previous version because you cannot reconstruct
    it. Debugging is guesswork — when the model behaves unexpectedly, you do not know if the cause is a code change, a data
    change, or an environment change. Compliance audits fail because you cannot explain the model's decision-making basis.
  teaching_example: >-
    A team trains a fraud detection model. Six months later, the model's false positive rate doubles. The team wants to roll
    back but discovers the training data was overwritten, the preprocessing code was modified in three undocumented hotfixes,
    and the Python environment has different package versions. They cannot reproduce the original model and must retrain from
    scratch.
  when_applies: >-
    Every ML system in production, especially in regulated industries (finance, healthcare, legal) where model explainability
    and auditability are required.
  when_not_applies: >-
    Early-stage research experimentation where the goal is rapid iteration and reproducibility is not yet a priority. Once
    a model approaches production, versioning becomes mandatory.
  sources:
  - https://mlflow.org/docs/latest/tracking.html
