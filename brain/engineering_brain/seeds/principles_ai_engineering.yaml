    # Over three months, click-through drops to 7%.
    # Infrastructure monitoring shows 100% uptime, sub-100ms latency, zero errors.
    # The team only investigates when a product manager notices declining engagement metrics.
  example_bad: |-
    # Anti-pattern: Violating Model Performance Degrades Silently — Monitor Prediction Quality, Not Just Uptime
    # Result: Silent model degradation continues for weeks or months before someone notices. By the time the degradation is detected (usually through customer complaints or business metric drops)
    # Result: significant damage has accumulated: wrong predictions have been made
- id: P-ML-BIAS
  name: Bias in Training Data Becomes Bias in Production Decisions — Audit Continuously
  why: |
    Machine learning models learn patterns from data. If the data contains biases — and real-world data
    almost always does — the model learns and amplifies those biases. A hiring model trained on historical
    hiring decisions learns to discriminate against the same groups that were historically discriminated
    against. A loan approval model trained on historical approvals learns to deny loans to the same
    demographics that were historically denied. A healthcare model trained on historically unequal
    treatment data learns to under-prioritize the same populations that were historically under-served.
    This is not a hypothetical concern — it is a documented, repeated failure pattern. Amazon's hiring
    tool discriminated against women. COMPAS recidivism scores discriminated against Black defendants.
    Healthcare algorithms discriminated against Black patients. In each case, the bias was invisible
    during development because the model was accurately reproducing the patterns in its training data.
    The model was "correct" by its metrics but harmful in its impact. Bias auditing is not a one-time
    checklist item during model development. Data distributions change, user populations shift, and new
    biases emerge over time. A model that was fair at deployment can become unfair as the world changes.
    The 2025-2026 fairness tooling ecosystem (Fairlearn, AI Fairness 360, What-If Tool) provides
    metrics and visualization, but the core requirement is organizational: someone must be responsible
    for defining protected attributes, selecting fairness metrics, setting thresholds, and reviewing
    results regularly. Technical tooling without organizational accountability is audit theater.
  how_to_apply: |
    1. Define protected attributes and fairness metrics before training. Identify the demographic
    dimensions that must be monitored (gender, race, age, geography, disability status, etc.) based
    on your domain, legal requirements, and ethical commitments. Select appropriate fairness metrics
    (demographic parity, equalized odds, calibration across groups) and set minimum thresholds.
    2. Audit training data for representation bias before training. Measure the distribution of
    protected attributes in your dataset. Identify under-represented groups. Check for label bias
    (are labels assigned fairly across groups?). Check for feature bias (do features encode protected
    attributes indirectly?). Document findings and mitigation strategies.
    3. Evaluate model fairness during training, not just after deployment. Include fairness metrics
    in your evaluation suite alongside accuracy metrics. Train multiple model variants and select
    the one that meets both accuracy and fairness thresholds. Use bias mitigation techniques
    (resampling, reweighting, adversarial debiasing) when baseline models fail fairness checks.
    4. Implement continuous fairness monitoring in production. Track prediction outcomes disaggregated
    by protected attributes. Alert when outcome disparities exceed thresholds. This catches concept
    drift that affects some groups more than others, which is invisible in aggregate metrics.
    5. Establish a regular audit cadence with cross-functional review. Include data scientists, domain
    experts, legal counsel, and affected community representatives. Review monitoring dashboards,
    investigate anomalies, and update fairness thresholds based on evolving understanding and
    regulatory requirements.
  mental_model: >-
    A model is a mirror of its training data — if the data reflects societal bias, the model reflects and amplifies it. Auditing
    is holding that mirror up to the light.
  domains:
    domain:
    - ai
    - security
    - compliance
    concern:
    - mlops
    - fairness
    - ethics
  violation_consequence: >-
    Biased models cause real-world harm to real people — denied loans, rejected applications, incorrect medical prioritization,
    unfair sentencing recommendations. Beyond the human cost, bias incidents create legal liability (EU AI Act, US anti-discrimination
    law), reputational damage, and loss of user trust that is extremely difficult to rebuild.
  teaching_example: >-
    A healthcare resource allocation model is trained on historical utilization data. The data reflects that Black patients
    historically received less care (due to systemic barriers). The model learns that Black patients 'need' less care and
    allocates fewer resources to them, perpetuating the disparity. The model achieves high accuracy on historical data while
    encoding and amplifying the exact bias it should prevent.
  when_applies: >-
    Every ML system that makes decisions about or affecting people. The audit intensity should scale with the impact — a movie
    recommendation system needs lighter auditing than a criminal justice risk assessment.
  when_not_applies: >-
    Models operating on purely physical or mechanical systems (predictive maintenance, weather forecasting) where protected
    attributes are not relevant to the prediction.
  sources:
  - https://arxiv.org/abs/1901.10002
  text: >-
    Bias in Training Data Becomes Bias in Production Decisions — Audit Continuously: A model is a mirror of its training data
    — if the data reflects societal bias, the model reflects and amplifies it.
  severity: high
  technologies:
    lang:
    - python
  how_to_do_right: |-
    1. Define protected attributes and fairness metrics before training. Identify the demographic
    dimensions that must be monitored (gender, race, age, geography, disability status, etc.) based
    on your domain, legal requirements, and ethical commitments. Select appropriate fairness metrics
    (demographic parity, equalized odds, calibration across groups) and set minimum thresholds.
    2. Audit training data for representation bias before training. Measure the distribution of
    protected attributes in your dataset. Identify under-represented groups. Check for label bias
    (are labels assigned fairly across groups?). Check for feature bias (do features encode protected
    attributes indirectly?). Document findings and mitigation strategies.
    3. Evaluate model fairness during training, not just after deployment. Include fairness metrics
    in your evaluation suite alongside accuracy metrics. Train multiple model variants and select
    the one that meets both accuracy and fairness thresholds. Use bias mitigation techniques
    (resampling, reweighting, adversarial debiasing) when baseline models fail fairness checks.
    4. Implement continuous fairness monitoring in production. Track prediction outcomes disaggregated
    by protected attributes. Alert when outcome disparities exceed thresholds. This catches concept
    drift that affects some groups more than others, which is invisible in aggregate metrics.
    5. Establish a regular audit cadence with cross-functional review. Include data scientists, domain
    experts, legal counsel, and affected community representatives. Review monitoring dashboards,
    investigate anomalies, and update fairness thresholds based on evolving understanding and
    regulatory requirements.
  example_good: |-
