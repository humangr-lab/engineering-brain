- id: P-RAG-HALLUCINATION
  name: Hallucinations Are a Feature of the Architecture, Not a Bug to Patch — Design Around Them
  why: |
    Hallucination is not a defect in a specific model that will be fixed in the next version. It is an
    emergent property of how autoregressive language models work: they predict the next token based on
    statistical patterns, and when the pattern leads to plausible-sounding but factually wrong text, the
    model follows the pattern. Every LLM hallucinates. GPT-4, Claude, Gemini — all of them. The rate
    varies, but it never reaches zero. Teams that treat hallucination as a bug to be fixed ("we just
    need a better prompt" or "the next model will solve it") build fragile systems that fail silently.
    Teams that treat hallucination as a known architectural constraint build robust systems with
    detection, mitigation, and recovery mechanisms. The distinction is critical. In traditional software,
    you can eliminate categories of bugs (null pointer exceptions, type errors) through language and
    tooling choices. In LLM systems, you cannot eliminate hallucination — you can only reduce its
    frequency and limit its impact. This means your architecture must assume the LLM will hallucinate
    and design accordingly: verify before trusting, attribute before citing, and provide escape hatches
    when confidence is low. The 2025-2026 research on hallucination detection has produced practical
    tools (SelfCheckGPT, ChainPoll, HHEM) and techniques (multi-sample consistency, retrieval-based
    verification, claim decomposition), but these are mitigation layers, not cures. The architecture
    must embed these layers structurally, not bolt them on as afterthoughts.
  how_to_apply: |
    1. Design every LLM-powered feature with the assumption that the model will sometimes produce
    incorrect output. For each feature, define: what happens when the output is wrong? How does the
    user discover the error? How does the system recover? If the answer to any of these is "nothing"
    or "they can't," redesign the feature.
    2. Implement hallucination detection as a first-class pipeline stage. Use retrieval-based
    verification (does the response match the source documents?), multi-sample consistency (do
    multiple generations agree?), and confidence scoring. For high-stakes outputs, use claim
    decomposition to verify individual factual claims independently.
    3. Communicate uncertainty to users. Display confidence indicators alongside LLM outputs. Use
    language that signals uncertainty ("Based on available information..." rather than "The answer
    is..."). Show source citations so users can verify claims independently.
    4. Implement human-in-the-loop for high-stakes decisions. Never let an LLM make irreversible
    decisions without human review. For content generation, implement editorial review workflows.
    For data extraction, implement verification queues. The human is the ultimate hallucination
    detector.
    5. Build a hallucination monitoring pipeline. Track hallucination rates over time, across query
    types, and across model versions. Set alerts when hallucination rates spike. Use detected
    hallucinations to improve your retrieval pipeline, prompt design, and evaluation datasets.
  mental_model: >-
    Hallucination is to LLMs what floating-point imprecision is to numerical computing — you cannot eliminate it, but you
    can design systems that are robust to it.
  domains:
    domain:
    - ai
    - architecture
    - reliability
    concern:
    - llm
    - hallucination
    - safety
  violation_consequence: >-
    Treating hallucination as a bug leads to a cycle of prompt patches that reduce one hallucination type while introducing
    others. The system appears to improve in testing but fails unpredictably in production. Users lose trust not because hallucinations
    occur, but because the system presents them with the same confidence as correct answers.
  teaching_example: >-
    A medical information chatbot adds 'always verify with your doctor' to its system prompt and considers hallucination handled.
    When the model confidently states an incorrect drug interaction, the disclaimer is buried at the bottom of a detailed,
    authoritative-sounding response that the user trusts.
  when_applies: >-
    Every system that uses LLM-generated text as output or as input to downstream decisions. The mitigation intensity should
    scale with the stakes — a casual chatbot needs less than a legal document generator.
  when_not_applies: >-
    Systems where hallucination is desirable — creative writing, brainstorming, ideation tools where novel combinations are
    the point.
  sources:
  - https://arxiv.org/abs/2311.05232
  text: >-
    Hallucinations Are a Feature of the Architecture, Not a Bug to Patch — Design Around Them: Hallucination is to LLMs what
    floating-point imprecision is to numerical computing — you cannot eliminate it, but you can design systems that are robust
    to it.
