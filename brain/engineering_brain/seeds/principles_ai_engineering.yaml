- id: P-RAG-CHUNK
  name: Chunk Size Determines Retrieval Quality — Optimize for Semantic Coherence, Not Character Count
  why: |
    Chunking is the most underestimated decision in RAG pipeline design. The way you split documents
    into chunks determines the upper bound of what your retrieval system can achieve. Too large, and
    chunks contain multiple unrelated topics — the embedding becomes a blurred average that matches
    poorly against specific queries. Too small, and chunks lose context — a sentence fragment about
    "the treatment" is meaningless without knowing what treatment is being discussed. Character count
    or token count is the wrong optimization target. The correct target is semantic coherence: each
    chunk should contain exactly one complete idea, concept, or fact, with enough surrounding context
    to be self-contained. In 2025-2026, the state of the art has moved beyond naive fixed-size
    chunking. Semantic chunking (splitting at topic boundaries detected by embedding similarity),
    hierarchical chunking (parent-child relationships between summary and detail chunks), and
    document-structure-aware chunking (respecting headings, paragraphs, code blocks, and tables) all
    produce significantly better retrieval quality. Late chunking approaches that embed the full
    document first and then split preserve cross-chunk context. The key insight is that chunking
    strategy should be tailored to the document type and query pattern. Technical documentation
    benefits from heading-aware chunking. Legal documents benefit from clause-level chunking. Code
    benefits from function-level chunking. A one-size-fits-all approach guarantees mediocre results
    across all document types. The chunking decision propagates through the entire pipeline — it
    affects embedding quality, retrieval precision, context window utilization, and ultimately
    generation quality.
  how_to_apply: |
    1. Analyze your document corpus before choosing a chunking strategy. Identify document types
    (prose, technical docs, code, tables, FAQs), their structure (headings, sections, paragraphs),
    and the types of queries users will ask. Different document types demand different chunking
    approaches.
    2. Use structure-aware chunking as the default. Split on document structure (headings, sections,
    paragraphs) rather than arbitrary character counts. For Markdown, split on heading boundaries.
    For code, split on function or class boundaries. For PDFs, split on section breaks. Preserve
    metadata (title, section heading, page number) with each chunk.
    3. Implement chunk overlap or contextual headers to prevent information loss at boundaries.
    Prepend each chunk with its parent heading hierarchy (e.g., "Chapter 3 > Section 3.2 > Subsection
    on Error Handling") so the chunk is self-contained even without its neighbors.
    4. Evaluate chunking quality empirically. Create a retrieval evaluation dataset with queries and
    their expected source chunks. Measure retrieval precision and recall across different chunking
    strategies. The best strategy is the one where relevant chunks rank highest for their target
    queries.
    5. Consider hierarchical chunking for complex documents. Create summary chunks at the section
    level and detail chunks at the paragraph level. Retrieve at the summary level first, then
    expand to detail chunks. This enables both broad and narrow retrieval.
  mental_model: >-
    Chunking is like cutting a puzzle into pieces — cut along the natural boundaries and the pieces make sense; cut randomly
    and each piece is meaningless.
  domains:
    domain:
    - ai
    - data
    - architecture
    concern:
    - rag
    - search
    - retrieval
  violation_consequence: >-
    Poor chunking creates a ceiling on retrieval quality that no amount of embedding model improvement or reranking can overcome.
    Chunks that mix topics produce noisy retrieval. Chunks that are too small lose context and produce fragmented, incoherent
    generation. Both failure modes manifest as hallucination.
  teaching_example: >-
    A team chunks their 500-page product manual into fixed 512-token segments. A chunk boundary falls in the middle of a troubleshooting
    procedure, splitting the problem description from its solution. When a user asks how to fix error X, the retriever finds
    the problem chunk but not the solution chunk.
  when_applies: Every RAG system. Chunking quality should be evaluated and optimized for any system that retrieves text for
    LLM context.
  when_not_applies: >-
    Systems that pass entire documents to the LLM without retrieval, or systems where the context is always a single short
    record (e.g., a database row).
  sources:
  - https://docs.llamaindex.ai/en/stable/module_guides/loading/node_parsers/
  text: >-
    Chunk Size Determines Retrieval Quality — Optimize for Semantic Coherence, Not Character Count: Chunking is like cutting
    a puzzle into pieces — cut along the natural boundaries and the pieces make sense; cut randomly and each piece is meaningless.
  severity: medium
  technologies:
    lang:
    - python
  how_to_do_right: |-
    1. Analyze your document corpus before choosing a chunking strategy. Identify document types
    (prose, technical docs, code, tables, FAQs), their structure (headings, sections, paragraphs),
    and the types of queries users will ask. Different document types demand different chunking
    approaches.
    2. Use structure-aware chunking as the default. Split on document structure (headings, sections,
    paragraphs) rather than arbitrary character counts. For Markdown, split on heading boundaries.
    For code, split on function or class boundaries. For PDFs, split on section breaks. Preserve
    metadata (title, section heading, page number) with each chunk.
    3. Implement chunk overlap or contextual headers to prevent information loss at boundaries.
    Prepend each chunk with its parent heading hierarchy (e.g., "Chapter 3 > Section 3.2 > Subsection
    on Error Handling") so the chunk is self-contained even without its neighbors.
    4. Evaluate chunking quality empirically. Create a retrieval evaluation dataset with queries and
    their expected source chunks. Measure retrieval precision and recall across different chunking
    strategies. The best strategy is the one where relevant chunks rank highest for their target
    queries.
    5. Consider hierarchical chunking for complex documents. Create summary chunks at the section
    level and detail chunks at the paragraph level. Retrieve at the summary level first, then
    expand to detail chunks. This enables both broad and narrow retrieval.
  example_good: |-
    # A team chunks their 500-page product manual into fixed 512-token segments.
    # A chunk boundary falls in the middle of a troubleshooting procedure, splitting the problem description from its solution.
    # When a user asks how to fix error X, the retriever finds the problem chunk but not the solution chunk.
  example_bad: |-
    # Anti-pattern: Violating Chunk Size Determines Retrieval Quality — Optimize for Semantic Coherence, Not Character Count
    # Result: Poor chunking creates a ceiling on retrieval quality that no amount of embedding model improvement or reranking can overcome. Chunks that mix topics produce noisy retrieval. Chunks that are too small lose context and produce fragmented
    # Result: incoherent generation. Both failure modes manifest as hallucination.
- id: P-RAG-RETRIEVAL
  name: Retrieval Quality Bounds Generation Quality — Garbage In, Hallucination Out
  why: |
    In a RAG system, the retrieval step is the bottleneck. The LLM can only generate answers from the
    context it receives. If the retriever returns irrelevant documents, the LLM will either hallucinate
    an answer from parametric knowledge (ignoring the useless context) or, worse, synthesize a plausible
    but incorrect answer by misinterpreting irrelevant passages. This means that retrieval quality sets
    an absolute upper bound on system quality. A perfect LLM with a mediocre retriever produces mediocre
    results. A good retriever with a decent LLM produces good results. Yet most teams invest 90% of
    their effort in prompt engineering and model selection while treating retrieval as a solved problem —
    "just use cosine similarity on embeddings." In practice, retrieval in production RAG systems requires
    multiple stages: query understanding (rewriting, expansion, decomposition), hybrid search (combining
    dense embeddings with sparse keyword matching via BM25), reranking (using cross-encoder models to
    re-score retrieved candidates), and filtering (metadata-based, recency-based, permission-based).
    Each stage meaningfully improves precision. The 2025-2026 frontier includes learned sparse
    representations (SPLADE), multi-vector retrieval (ColBERT), and query-adaptive retrieval strategies
    that select different search approaches based on query type. Teams that invest in retrieval
    infrastructure consistently outperform teams that invest in better prompts or larger models.
    The retrieval pipeline is where your competitive advantage lives — prompts and models are
    commoditized, but your retrieval quality over your specific corpus is not.
  how_to_apply: |
    1. Implement hybrid search combining dense (embedding) and sparse (BM25/TF-IDF) retrieval. Dense
    search excels at semantic similarity; sparse search excels at exact keyword matching. Combine scores
    using Reciprocal Rank Fusion (RRF) or learned weights. Most vector databases (Qdrant, Weaviate)
    support hybrid search natively.
    2. Add a reranking stage after initial retrieval. Retrieve a broad set (top-50 to top-100) with
    fast approximate search, then rerank with a cross-encoder model (Cohere Rerank, bge-reranker,
    or a custom model) to get the true top-5 to top-10. Cross-encoders are 10-100x more accurate
    than bi-encoder similarity but too slow for first-stage retrieval.
    3. Implement query transformation before retrieval. Rewrite user queries to be more search-friendly
    (remove conversational fluff, expand abbreviations). For complex questions, decompose into
    sub-queries and retrieve for each independently. Use HyDE (Hypothetical Document Embedding) for
    queries where the user vocabulary differs from the document vocabulary.
    4. Build a retrieval evaluation pipeline separate from the end-to-end evaluation. Measure retrieval
    precision@k, recall@k, MRR (Mean Reciprocal Rank), and nDCG. Create a labeled dataset of queries
    and their relevant documents. Optimize retrieval metrics independently before evaluating generation.
    5. Implement metadata filtering and access control at the retrieval level. Filter by document
    recency, source authority, user permissions, and domain relevance before the LLM sees any context.
    Stale or unauthorized documents in the context cause both quality and security issues.
  mental_model: >-
    The retriever is the LLM's research assistant — a lazy assistant who grabs random papers produces worse answers than a
    diligent one who finds exactly the right sources.
  domains:
    domain:
    - ai
    - data
    - architecture
    concern:
    - rag
    - search
    - retrieval
  violation_consequence: >-
    Poor retrieval causes two failure modes: (1) the LLM ignores irrelevant context and hallucinates from parametric knowledge,
    or (2) the LLM faithfully synthesizes from wrong documents, producing confidently incorrect answers with citations to
    irrelevant sources. Both destroy user trust.
  teaching_example: >-
    A customer support RAG bot retrieves documentation for product v2 when the user asks about product v3. The LLM generates
    a detailed answer based on outdated v2 docs. The answer is wrong for v3, but it includes citations to real documents,
    making the error harder for the user to detect.
  when_applies: >-
    Every RAG system. If you are building retrieval-augmented generation, retrieval quality is your primary engineering concern.
  when_not_applies: >-
    Systems that do not use retrieval — pure prompt-based applications, or systems where the full context is always provided
    (e.g., code review of a single file).
  sources:
  - https://arxiv.org/abs/2312.10997
  text: >-
    Retrieval Quality Bounds Generation Quality — Garbage In, Hallucination Out: The retriever is the LLM's research assistant
    — a lazy assistant who grabs random papers produces worse answers than a diligent one who finds exactly the right sources.
  severity: high
