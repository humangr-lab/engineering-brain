- id: P-ML-REPRODUCIBILITY
  name: If You Can't Reproduce a Training Run, You Can't Debug It
  why: |
    Debugging a machine learning model is fundamentally different from debugging traditional software.
    When a function returns the wrong value, you can step through the code, inspect variables, and
    identify the logic error. When a model makes wrong predictions, the "logic" is millions of learned
    parameters shaped by the interaction of data, architecture, hyperparameters, initialization, and
    optimization dynamics. The only way to debug effectively is to reproduce the training run — isolate
    variables, change one thing at a time, and observe the effect. If you cannot reproduce the original
    run, you cannot establish a baseline. If you cannot establish a baseline, you cannot determine whether
    a change helped or hurt. You are reduced to guessing. Reproducibility in ML is harder than in
    traditional software because of non-determinism: random initialization, data shuffling, GPU floating-
    point non-determinism, and parallel execution order all introduce variability. Achieving exact
    reproducibility requires explicit effort: fixed random seeds, deterministic algorithms, controlled
    data ordering, and pinned dependencies. Even approximate reproducibility (results within a small
    tolerance) requires tracking all inputs to the training process. The cost of non-reproducibility
    compounds over time. Early in a project, you can retrain quickly. As models grow larger and datasets
    grow bigger, a single training run can take days or weeks and cost thousands of dollars. Discovering
    that you cannot reproduce a result after investing that level of resources is a catastrophic waste.
    The 2025-2026 ML engineering consensus is clear: reproducibility is not a nice-to-have, it is the
    foundation on which all other ML engineering practices are built.
  how_to_apply: |
    1. Fix and record all random seeds at every level: Python random, NumPy, PyTorch/TensorFlow,
    CUDA. Set environment variables for deterministic CUDA operations (CUBLAS_WORKSPACE_CONFIG,
    PYTHONHASHSEED). Accept the small performance penalty of deterministic algorithms in exchange for
    reproducibility. Document which seeds were used for every training run.
    2. Pin all dependencies exactly, not approximately. Use lockfiles (pip freeze, poetry.lock, conda
    lock) that specify exact versions including transitive dependencies. A minor version bump in a
    preprocessing library can change data handling behavior and invalidate reproducibility.
    3. Version the complete training configuration as a single artifact. Capture model architecture,
    hyperparameters, optimizer settings, learning rate schedule, data augmentation parameters, and all
    preprocessing steps in a structured config file (YAML, JSON, or Hydra). This config, combined with
    the code version and data version, should be sufficient to reproduce the training run.
    4. Implement automated reproducibility verification. After every training run, save the model
    checkpoint. Periodically, re-run training from the saved config and verify that the resulting model
    matches the original within a specified tolerance. This catches environmental changes (hardware
    differences, library updates) that silently break reproducibility.
    5. Document and track hardware specifications. GPU model, driver version, CUDA version, and number
    of GPUs all affect training results. When moving between machines or cloud instances, verify that
    the hardware configuration matches. If it cannot match exactly, document the expected variance.
  mental_model: >-
    A training run is a scientific experiment — without a documented protocol that produces the same result, it is an anecdote,
    not evidence.
  domains:
    domain:
    - ai
    - operations
    - testing
    concern:
    - mlops
    - reproducibility
    - debugging
  violation_consequence: >-
    Non-reproducible training means that debugging is guesswork, benchmarking is unreliable, and model comparisons are meaningless.
    When a model behaves unexpectedly in production, the team cannot retrain and compare against the production version. When
    a researcher claims a 2% accuracy improvement, nobody can verify whether it is real or within the noise of non-deterministic
    training.
  teaching_example: >-
    A team trains a model that achieves 92% accuracy. They optimize hyperparameters and achieve 94%. They submit the result
    for review. The reviewer asks them to retrain for verification. The retrained model achieves only 91%. The 94% result
    was an artifact of a lucky random seed, but without reproducibility controls, the team cannot distinguish luck from genuine
    improvement.
  when_applies: >-
    Every ML training pipeline, from prototype to production. The level of rigor scales — research prototypes need seed tracking,
    production systems need full environment reproducibility.
  when_not_applies: >-
    Inference-only systems that use pre-trained models without any fine-tuning. However, even inference pipelines should have
    reproducible preprocessing.
  sources:
  - https://arxiv.org/abs/2003.12206
  text: >-
    If You Can't Reproduce a Training Run, You Can't Debug It: A training run is a scientific experiment — without a documented
    protocol that produces the same result, it is an anecdote, not evidence.
  severity: high
  technologies:
    lang:
    - python
  how_to_do_right: |-
    1. Fix and record all random seeds at every level: Python random, NumPy, PyTorch/TensorFlow,
    CUDA. Set environment variables for deterministic CUDA operations (CUBLAS_WORKSPACE_CONFIG,
    PYTHONHASHSEED). Accept the small performance penalty of deterministic algorithms in exchange for
    reproducibility. Document which seeds were used for every training run.
    2. Pin all dependencies exactly, not approximately. Use lockfiles (pip freeze, poetry.lock, conda
    lock) that specify exact versions including transitive dependencies. A minor version bump in a
    preprocessing library can change data handling behavior and invalidate reproducibility.
    3. Version the complete training configuration as a single artifact. Capture model architecture,
    hyperparameters, optimizer settings, learning rate schedule, data augmentation parameters, and all
    preprocessing steps in a structured config file (YAML, JSON, or Hydra). This config, combined with
    the code version and data version, should be sufficient to reproduce the training run.
    4. Implement automated reproducibility verification. After every training run, save the model
    checkpoint. Periodically, re-run training from the saved config and verify that the resulting model
    matches the original within a specified tolerance. This catches environmental changes (hardware
    differences, library updates) that silently break reproducibility.
    5. Document and track hardware specifications. GPU model, driver version, CUDA version, and number
    of GPUs all affect training results. When moving between machines or cloud instances, verify that
    the hardware configuration matches. If it cannot match exactly, document the expected variance.
  example_good: |-
    # A team trains a model that achieves 92% accuracy.
    # They optimize hyperparameters and achieve 94%.
    # They submit the result for review.
    # The reviewer asks them to retrain for verification.
  example_bad: |-
    # Anti-pattern: Violating If You Can't Reproduce a Training Run, You Can't Debug It
    # Result: Non-reproducible training means that debugging is guesswork
    # Result: benchmarking is unreliable
- id: P-ML-FEATURE-STORE
  name: Feature Computation Should Happen Once and Be Shared — Compute/Serve Skew Is a Silent Killer
  why: |
    The most insidious bug in ML systems is training/serving skew — the difference between how features
    are computed during training and how they are computed during inference. This skew causes model
    performance to degrade in production compared to offline evaluation, and it is extremely difficult
    to diagnose because the model is technically working correctly given its inputs; the inputs are
    just wrong. The root cause is almost always duplicated feature computation logic. The training
    pipeline computes features in a batch job using Python and pandas. The serving pipeline computes
    the same features in a real-time service using Java or Go. The two implementations look the same
    but differ in subtle ways: floating-point precision, null handling, timestamp parsing, aggregation
    windows, or edge case behavior. These differences are invisible in unit tests because each
    implementation is correct in isolation — they just compute slightly different things. A feature
    store solves this by computing features once and making them available to both training and serving
    through a unified API. The same feature values used during training are retrieved during inference,
    eliminating skew by construction. The 2025-2026 feature store ecosystem (Feast, Tecton, Hopsworks,
    Databricks Feature Store) has matured significantly, offering both batch and real-time feature
    serving, point-in-time correct joins for training data, and feature versioning. Beyond eliminating
    skew, feature stores provide significant engineering benefits: feature reuse across models (compute
    once, use everywhere), feature discovery (teams find and reuse each other's features instead of
    recomputing), and feature lineage (tracing which data sources contribute to which features). The
    productivity gains from feature sharing across an organization often exceed the gains from
    eliminating skew.
  how_to_apply: |
    1. Catalog all features used across your ML models. For each feature, document: the source data,
    the computation logic, the update frequency, and which models consume it. Identify features that
    are computed by multiple teams or in multiple code paths — these are the highest-priority candidates
    for centralization.
    2. Implement a feature store as the single source of truth for feature computation. Choose between
    a managed service (Tecton, Databricks) or open-source (Feast, Hopsworks) based on your scale and
    infrastructure. Migrate the highest-risk features first — those with complex computation logic or
    those shared across multiple models.
    3. Define feature transformations once in the feature store and generate both batch (training) and
    online (serving) computation from the same definition. This is the core skew-elimination mechanism.
    The feature store framework handles the complexity of materializing features for different access
    patterns while ensuring consistent computation.
    4. Implement point-in-time correct feature retrieval for training data. When creating training
    datasets, features must be joined at the timestamp of the training example, not at the current
    timestamp. Without point-in-time correctness, training data leaks future information, producing
    artificially high offline metrics that do not translate to production performance.
    5. Monitor feature quality and freshness in production. Track feature staleness (how old is the
    latest value?), null rates (are features missing more often than expected?), and distribution
    shifts (are feature value distributions changing?). Alert on anomalies because stale or missing
    features degrade model performance silently.
    6. Establish feature ownership and governance. Each feature should have an owner responsible for
    its correctness, freshness, and documentation. Implement a feature approval workflow for new
    features to prevent proliferation of redundant or poorly defined features.
  mental_model: >-
    A feature store is like a shared kitchen prep station — ingredients are prepared once to a consistent standard, and every
    chef uses the same prep instead of chopping their own.
  domains:
    domain:
    - ai
    - data
    - architecture
    concern:
    - mlops
    - feature_engineering
    - production
  violation_consequence: >-
    Training/serving skew causes models to perform worse in production than in offline evaluation, but the degradation is
    subtle and hard to diagnose. Teams waste weeks debugging model quality issues that turn out to be feature computation
    inconsistencies. Without a feature store, each new model reinvents feature computation, creating duplicated logic, wasted
    compute, and increasing skew risk.
  teaching_example: >-
    A fraud detection model uses a feature 'average_transaction_amount_30d' computed with pandas in the training pipeline
    and with a SQL query in the serving pipeline. The pandas code handles nulls by imputing zeros; the SQL query excludes
    nulls. The training model sees different values than the serving model. The offline accuracy is 95%; the production accuracy
    is 89%. The team spends three weeks investigating model architecture before discovering the skew.
  when_applies: >-
    Any ML system with more than a handful of features, especially when features are shared across models, computed from complex
    logic, or used in both batch and real-time contexts.
  when_not_applies: >-
    Simple models with a small number of raw features that require no transformation, or pure LLM applications that do not
    use traditional ML features.
  sources:
  - https://feast.dev/blog/what-is-a-feature-store/
