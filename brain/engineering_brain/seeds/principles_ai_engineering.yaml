    # The data reflects that Black patients historically received less care (due to systemic barriers).
    # The model learns that Black patients 'need' less care and allocates fewer resources to them, perpetuating the disparity.
    # The model achieves high accuracy on historical data while encoding and amplifying the exact bias it should prevent.
