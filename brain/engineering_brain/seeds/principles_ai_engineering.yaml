- id: P-ML-MONITORING
  name: Model Performance Degrades Silently — Monitor Prediction Quality, Not Just Uptime
  why: |
    Traditional software either works or it does not. An API endpoint returns 200 or 500. A function
    returns the correct value or throws an exception. ML models fail differently: they continue to
    return predictions with HTTP 200, but the predictions become increasingly wrong. This silent
    degradation — called model drift — is caused by changes in the real-world data distribution that
    diverge from the training data distribution. Customer behavior changes, market conditions shift,
    new product categories appear, fraud patterns evolve. The model was trained on a world that no
    longer exists, but it keeps making predictions as if nothing changed. Standard infrastructure
    monitoring (uptime, latency, error rate, CPU usage) tells you nothing about prediction quality.
    A model serving endpoint can be perfectly healthy by all infrastructure metrics while producing
    predictions that are 50% less accurate than at deployment time. The only way to detect drift is
    to monitor prediction quality directly: track accuracy metrics against delayed ground truth,
    monitor input feature distributions for shifts, track prediction distribution for changes, and
    alert on statistical tests that detect distribution divergence. The 2025-2026 ML monitoring
    landscape includes tools like Evidently AI, NannyML, WhyLabs, and Arize that specialize in
    drift detection, but the fundamental requirement is that you must define what "model is working
    correctly" means in terms of measurable metrics and continuously verify those metrics in
    production.
  how_to_apply: |
    1. Define prediction quality metrics that align with business value and track them continuously.
    For classification: precision, recall, F1 by class. For regression: MAE, RMSE, prediction intervals.
    For ranking: nDCG, MRR. Set up dashboards that show these metrics over time windows (hourly, daily,
    weekly) and alert when they degrade beyond thresholds.
    2. Monitor input feature distributions for data drift. For each input feature, track statistical
    properties (mean, variance, distribution shape) and compare against the training distribution. Use
    statistical tests (KS test, PSI, Jensen-Shannon divergence) to detect significant shifts. Alert when
    drift is detected because it predicts upcoming model performance degradation.
    3. Monitor prediction distributions for concept drift. If a binary classifier suddenly predicts 90%
    positive when the training distribution was 50/50, something has changed. Track prediction confidence
    distributions and class balance over time. Sudden shifts indicate either data quality issues or
    genuine concept drift.
    4. Implement delayed ground truth collection. For many ML tasks, the true label becomes available
    after a delay (a customer churns or does not, a transaction is fraudulent or legitimate). Build
    pipelines that collect ground truth, join it with predictions, and compute real accuracy metrics.
    This is the only way to measure actual model performance, not proxy metrics.
    5. Set up automated retraining triggers. When monitoring detects significant drift or quality
    degradation, automatically trigger a retraining pipeline with fresh data. Validate the retrained
    model against the current model before deployment. If the retrained model is better, promote it;
    if not, investigate the root cause.
  mental_model: >-
    A model in production is like a car alignment — it is perfect when you leave the shop, but road conditions gradually push
    it out of alignment. You need regular checks, not just initial setup.
  domains:
    domain:
    - ai
    - operations
    - observability
    concern:
    - mlops
    - monitoring
    - production
  violation_consequence: >-
    Silent model degradation continues for weeks or months before someone notices. By the time the degradation is detected
    (usually through customer complaints or business metric drops), significant damage has accumulated: wrong predictions
    have been made, incorrect actions have been taken, and user trust has eroded. Retroactive analysis is expensive because
    you must identify when the degradation started and what decisions were affected.
  teaching_example: >-
    An e-commerce recommendation model is deployed with 12% click-through rate. Over three months, click-through drops to
    7%. Infrastructure monitoring shows 100% uptime, sub-100ms latency, zero errors. The team only investigates when a product
    manager notices declining engagement metrics. The root cause: a new product category was added that the model has never
    seen.
  when_applies: >-
    Every ML model in production. The monitoring intensity should scale with business impact — a recommendation model needs
    lighter monitoring than a fraud detection model.
  when_not_applies: >-
    Models in development or experimentation that are not making production decisions. Once a model influences real outcomes,
    monitoring is required.
  sources:
  - https://arxiv.org/abs/2011.03395
  text: >-
    Model Performance Degrades Silently — Monitor Prediction Quality, Not Just Uptime: A model in production is like a car
    alignment — it is perfect when you leave the shop, but road conditions gradually push it out of alignment.
  severity: high
  technologies:
    lang:
    - python
    ops:
    - logging
    - monitoring
  how_to_do_right: |-
