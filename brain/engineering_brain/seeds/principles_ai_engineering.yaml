    # Result: generate harmful content at scale
- id: P-AI-COST
  name: LLM Costs Scale with Usage, Not Users — Budget Per-Request, Not Per-Month
  why: |
    Traditional SaaS cost models scale with users: more seats means more revenue and roughly proportional
    infrastructure costs. LLM-powered applications break this model entirely. A single power user can
    generate costs equivalent to thousands of casual users. One complex agentic workflow with multiple
    LLM calls, large contexts, and iterative refinement can cost more than a month of API access for a
    typical user. This fundamental shift from user-proportional to usage-proportional costs catches teams
    off guard. Monthly budget estimates based on projected user counts are meaningless when a single
    viral query or an automated integration can burn through the entire budget in hours. The correct
    mental model is per-request cost accounting. Every LLM call has a calculable cost based on input
    tokens, output tokens, and model pricing. Every feature should have a cost budget per request, and
    the system should enforce these budgets at runtime. This is not about being cheap — it is about
    predictability and control. Without per-request cost awareness, you cannot price your product
    correctly, you cannot detect cost anomalies (a runaway agent loop can accumulate thousands of dollars
    in minutes), and you cannot make informed architecture decisions (when is caching worth it? when
    should you use a smaller model?). The 2025-2026 ecosystem provides tools for cost tracking
    (Langfuse, Helicone, LiteLLM proxy) but the cost-aware mindset must be built into the architecture
    from day one, not bolted on after the first surprising invoice.
  how_to_apply: |
    1. Instrument every LLM call with cost tracking from the start. Record input tokens, output tokens,
    model used, and calculated cost for every request. Aggregate these into per-user, per-feature, and
    per-workflow cost metrics. Use observability tools (Langfuse, Helicone) or build lightweight custom
    tracking.
    2. Set per-request cost budgets for each feature. An auto-complete feature might budget $0.001 per
    request. A document analysis feature might budget $0.10 per request. An agentic workflow might budget
    $1.00 per run. Enforce these budgets with circuit breakers that terminate execution when the budget
    is exhausted.
    3. Implement token-aware caching aggressively. Cache LLM responses for identical or semantically
    similar inputs. Use prompt caching features offered by providers (Anthropic prompt caching, OpenAI
    cached tokens). For RAG systems, cache retrieved contexts and reuse them for similar queries.
    4. Use model routing to match request complexity to model capability. Simple classification tasks
    do not need GPT-4 or Claude Opus — use smaller, cheaper models (GPT-4o-mini, Claude Haiku, Gemini
    Flash) for routine operations and reserve frontier models for complex reasoning. Implement automatic
    routing based on query complexity estimation.
    5. Build cost anomaly detection. Alert when per-user costs spike (potential abuse), when per-feature
    costs trend upward (prompt regression increasing token usage), or when total daily costs exceed
    projections. A runaway agent loop or an unexpected traffic spike should trigger alerts, not a
    surprise invoice.
  mental_model: LLM costs are like a taxi meter, not a bus pass — you pay for every mile, and some routes cost 100x more than
    others.
  domains:
    domain:
    - ai
    - architecture
    - operations
    concern:
    - llm
    - cost
    - production
  violation_consequence: >-
    Without per-request cost awareness, a single misconfigured agent loop can accumulate thousands of dollars in hours. A
    popular feature with an expensive prompt can make the product unprofitable overnight. Pricing decisions made without cost
    data lead to either undercharging (losing money) or overcharging (losing customers).
  teaching_example: >-
    A team launches an AI writing assistant priced at $20/month. Their most active users generate $150/month in API costs
    through long document editing sessions with large contexts. The team only discovers this when the monthly API bill is
    8x their projection.
  when_applies: >-
    Every LLM-powered application that uses paid API providers or operates at scale. Even with flat-rate plans, understanding
    per-request costs informs architecture decisions.
  when_not_applies: >-
    Personal projects, research experiments, or environments with truly unlimited flat-rate LLM access where cost tracking
    provides no actionable information.
  sources:
  - https://openai.com/api/pricing/
  text: >-
    LLM Costs Scale with Usage, Not Users — Budget Per-Request, Not Per-Month: LLM costs are like a taxi meter, not a bus
    pass — you pay for every mile, and some routes cost 100x more than others.
  severity: medium
  technologies:
    lang:
    - python
    ops:
    - logging
    - monitoring
