layer: principles
domain: ai_engineering
knowledge:
- id: P-LLM-PROMPT-ENGINEER
  name: Prompts Are Code — Version, Test, and Review Them
  why: |
    Prompts are the primary interface between your application logic and the LLM's capabilities,
    yet most teams treat them as casual strings embedded in application code. This is a fundamental
    mistake. Prompts exhibit all the characteristics of production code: they have inputs and outputs,
    they can regress, they interact with other system components, and small changes can cause
    catastrophic downstream failures. Prompt drift — the gradual, untracked modification of prompts
    across development cycles — is one of the most insidious sources of quality degradation in LLM
    applications. A developer tweaks a system prompt to fix one edge case, inadvertently breaking
    three others, and nobody notices for weeks because there is no regression suite. The problem
    compounds in multi-prompt systems where chain-of-thought, tool-use instructions, and output
    formatting directives interact in non-obvious ways. Without version control, you cannot bisect
    to find which prompt change caused a quality drop. Without testing, you cannot verify that a
    prompt improvement for one use case does not degrade another. Without code review, a single
    developer can silently alter the behavior of a system that serves millions of users. The 2025-2026
    wave of prompt engineering tooling (LangSmith, Braintrust, Humanloop) exists precisely because
    the industry learned this lesson the hard way. Treating prompts as first-class versioned artifacts
    with automated evaluation pipelines is the single highest-leverage practice in LLM engineering.
  how_to_apply: |
    1. Store all prompts in dedicated files or a prompt registry, never inline in application code.
    Use a structured format (YAML, JSON, or a prompt management platform) that separates the prompt
    template from the code that invokes it. Each prompt gets a unique identifier and semantic version.
    2. Write deterministic unit tests for every prompt. Create a golden dataset of input-output pairs
    that cover normal cases, edge cases, and adversarial inputs. Run these tests on every pull request
    that modifies a prompt. Use LLM-as-judge or embedding similarity for fuzzy matching where exact
    string comparison is insufficient.
    3. Implement a prompt CI/CD pipeline. When a prompt changes, automatically run the evaluation
    suite against the new version. Compare metrics (accuracy, format compliance, latency, cost)
    against the previous version. Block deployment if any metric regresses beyond a configurable
    threshold.
    4. Require code review for all prompt changes. Prompt diffs should be as visible and reviewable
    as code diffs. Annotate prompt changes with the reasoning behind the modification and the
    evaluation results that justify it.
    5. Maintain a prompt changelog that records what changed, why, the evaluation results before
    and after, and the rollback procedure. When a production issue occurs, this changelog is the
    first place to look.
    6. Use A/B testing or canary deployments for significant prompt changes in production. Route a
    small percentage of traffic to the new prompt and compare real-world metrics before full rollout.
  mental_model: Prompts are SQL queries — you would never ship an untested, unreviewed SQL query to production.
  domains:
    domain:
    - ai
    - architecture
    concern:
    - llm
    - prompt_engineering
  violation_consequence: >-
    Prompt drift causes silent quality degradation that compounds over weeks. Edge case fixes break happy paths, system prompts
    conflict with user prompts, and output format changes cascade into parsing failures. Without versioning, root cause analysis
    becomes impossible and rollbacks are guesswork.
  teaching_example: >-
    A team ships a chatbot with an inline system prompt. Over 6 months, 14 developers each tweak the prompt for their feature.
    The prompt grows from 200 to 1,800 tokens with contradictory instructions. Response quality drops 40% but nobody can identify
    when or why because there is no prompt version history.
  when_applies: >-
    Any system where prompts are sent to LLMs in production, especially multi-prompt chains, agentic workflows, or customer-facing
    applications.
  when_not_applies: >-
    One-off exploratory prompting in notebooks, personal prototyping, or research experiments where reproducibility is not
    yet a concern.
  sources:
  - https://arxiv.org/abs/2302.11382
  text: >-
    Prompts Are Code — Version, Test, and Review Them: Prompts are SQL queries — you would never ship an untested, unreviewed
    SQL query to production.
  severity: high
  technologies:
    lang:
    - python
  how_to_do_right: |-
    1. Store all prompts in dedicated files or a prompt registry, never inline in application code.
    Use a structured format (YAML, JSON, or a prompt management platform) that separates the prompt
    template from the code that invokes it. Each prompt gets a unique identifier and semantic version.
    2. Write deterministic unit tests for every prompt. Create a golden dataset of input-output pairs
    that cover normal cases, edge cases, and adversarial inputs. Run these tests on every pull request
    that modifies a prompt. Use LLM-as-judge or embedding similarity for fuzzy matching where exact
    string comparison is insufficient.
    3. Implement a prompt CI/CD pipeline. When a prompt changes, automatically run the evaluation
    suite against the new version. Compare metrics (accuracy, format compliance, latency, cost)
    against the previous version. Block deployment if any metric regresses beyond a configurable
    threshold.
    4. Require code review for all prompt changes. Prompt diffs should be as visible and reviewable
    as code diffs. Annotate prompt changes with the reasoning behind the modification and the
    evaluation results that justify it.
    5. Maintain a prompt changelog that records what changed, why, the evaluation results before
    and after, and the rollback procedure. When a production issue occurs, this changelog is the
    first place to look.
    6. Use A/B testing or canary deployments for significant prompt changes in production. Route a
    small percentage of traffic to the new prompt and compare real-world metrics before full rollout.
  example_good: |-
    # A team ships a chatbot with an inline system prompt.
    # Over 6 months, 14 developers each tweak the prompt for their feature.
    # The prompt grows from 200 to 1,800 tokens with contradictory instructions.
    # Response quality drops 40% but nobody can identify when or why because there is no prompt version history.
  example_bad: |-
    # Anti-pattern: Violating Prompts Are Code — Version, Test, and Review Them
    # Result: Prompt drift causes silent quality degradation that compounds over weeks. Edge case fixes break happy paths
    # Result: system prompts conflict with user prompts
- id: P-LLM-GUARDRAILS
  name: LLM Outputs Must Pass Through Guardrails Before Reaching Users
  why: |
    LLMs are probabilistic systems that generate plausible-sounding text regardless of factual accuracy,
    safety, or format compliance. Every response from an LLM is a candidate, not a final answer. Without
    guardrails between the model and the user, you are deploying a system that can produce harmful content,
    leak sensitive information, hallucinate dangerous medical or legal advice, or return malformed data that
    breaks downstream consumers. The guardrail layer is not optional safety theater — it is a fundamental
    architectural component. In 2025-2026, production LLM systems routinely implement multi-layer
    guardrails: input validation (prompt injection detection, PII scrubbing), output validation (toxicity
    classifiers, factuality checkers, format validators), and semantic guardrails (topic boundaries, role
    adherence). NeMo Guardrails, Guardrails AI, LLM Guard, and similar frameworks have matured specifically
    because the industry recognized that prompt-level instructions like "do not produce harmful content"
    are unreliable. Jailbreaks evolve faster than system prompts can be patched. A well-engineered guardrail
    pipeline treats LLM output as untrusted input — the same way you treat user input from a web form. You
    parse it, validate it, sanitize it, and only then pass it to the next component. This principle extends
    to structured outputs: even when using JSON mode or function calling, the output must be validated
    against a schema before being consumed. Models can and do produce malformed JSON, missing required
    fields, or values outside expected ranges.
  how_to_apply: |
    1. Implement input guardrails before the prompt reaches the LLM. Scan for prompt injection attempts
    using classifier models or pattern matching. Strip or mask PII that should not enter the model context.
    Validate that the user query falls within the system's intended scope and reject out-of-scope requests
    with a helpful message.
    2. Implement output guardrails immediately after the LLM response. Run toxicity and safety classifiers
    (Perspective API, LLM Guard, or custom models) on every response. Validate structured outputs against
    Pydantic schemas or JSON Schema. Check for PII leakage in the response, especially when RAG context
    contains sensitive data.
    3. Add semantic guardrails that enforce topic boundaries and role adherence. If the system is a
    customer support agent, it should not provide medical advice regardless of how the user phrases their
    request. Use lightweight classifier models to detect topic drift.
    4. Implement a fallback strategy for when guardrails trigger. Never show a raw error to the user.
    Instead, provide a graceful degradation: a safe default response, a redirect to a human agent, or
    a request for clarification. Log every guardrail activation for monitoring and improvement.
    5. Version and test your guardrails with the same rigor as your prompts. Maintain an adversarial
    test suite of inputs designed to bypass guardrails. Red-team your system regularly and update
    guardrails based on findings.
  mental_model: LLM output is like water from a well — it might be clean, but you filter it before drinking.
  domains:
    domain:
    - ai
    - security
    - architecture
    concern:
    - llm
    - safety
    - production
  violation_consequence: >-
    Without guardrails, a single adversarial user can extract system prompts, generate harmful content, or cause the model
    to leak RAG context containing PII. These incidents cause reputational damage, legal liability, and user trust destruction
    that takes months to rebuild.
  teaching_example: >-
    A legal-tech startup deploys an LLM-powered contract review tool without output guardrails. The model occasionally hallucinates
    non-existent legal clauses and cites fabricated case law. A client relies on a hallucinated clause in a negotiation, resulting
    in a lawsuit against the startup.
  when_applies: >-
    Every LLM-powered system that produces output consumed by users, downstream systems, or stored in databases. No exceptions
    for internal tools — internal users can also be harmed by hallucinated outputs.
  when_not_applies: >-
    Pure research experimentation where the researcher is manually reviewing every output and no output is persisted or acted
    upon.
  sources:
  - https://docs.nvidia.com/nemo/guardrails/
  text: >-
    LLM Outputs Must Pass Through Guardrails Before Reaching Users: LLM output is like water from a well — it might be clean,
    but you filter it before drinking.
  severity: critical
  technologies:
    lang:
    - python
  how_to_do_right: |-
    1. Implement input guardrails before the prompt reaches the LLM. Scan for prompt injection attempts
    using classifier models or pattern matching. Strip or mask PII that should not enter the model context.
    Validate that the user query falls within the system's intended scope and reject out-of-scope requests
    with a helpful message.
    2. Implement output guardrails immediately after the LLM response. Run toxicity and safety classifiers
    (Perspective API, LLM Guard, or custom models) on every response. Validate structured outputs against
    Pydantic schemas or JSON Schema. Check for PII leakage in the response, especially when RAG context
    contains sensitive data.
    3. Add semantic guardrails that enforce topic boundaries and role adherence. If the system is a
    customer support agent, it should not provide medical advice regardless of how the user phrases their
    request. Use lightweight classifier models to detect topic drift.
    4. Implement a fallback strategy for when guardrails trigger. Never show a raw error to the user.
    Instead, provide a graceful degradation: a safe default response, a redirect to a human agent, or
    a request for clarification. Log every guardrail activation for monitoring and improvement.
    5. Version and test your guardrails with the same rigor as your prompts. Maintain an adversarial
    test suite of inputs designed to bypass guardrails. Red-team your system regularly and update
    guardrails based on findings.
  example_good: |-
    # A legal-tech startup deploys an LLM-powered contract review tool without output guardrails.
    # The model occasionally hallucinates non-existent legal clauses and cites fabricated case law.
    # A client relies on a hallucinated clause in a negotiation, resulting in a lawsuit against the startup.
  example_bad: |-
    # Anti-pattern: Violating LLM Outputs Must Pass Through Guardrails Before Reaching Users
    # Result: Without guardrails
    # Result: a single adversarial user can extract system prompts
- id: P-LLM-GROUND-TRUTH
  name: Ground LLM Responses in Verified Data, Not Model Knowledge Alone
  why: |
    LLMs are trained on static snapshots of internet text with a knowledge cutoff date. Their parametric
    knowledge is frozen, potentially outdated, and unverifiable at inference time. When an LLM answers a
    factual question from its training data alone, there is no way to determine whether the answer reflects
    current reality, was correct at training time but has since changed, or was never correct but appeared
    plausible in the training corpus. This is not a limitation that will be solved by larger models — it
    is an inherent property of parametric knowledge. Retrieval-Augmented Generation (RAG) addresses this
    by grounding responses in retrieved documents, but grounding goes beyond RAG. It includes citing
    sources, linking claims to evidence, providing confidence signals, and designing the system so that
    every factual assertion can be traced back to a verifiable source. Without grounding, LLM applications
    become liability generators: they produce authoritative-sounding answers that may be completely wrong,
    and users cannot distinguish correct from incorrect responses. The 2025-2026 state of the art in
    grounding includes multi-hop retrieval, source attribution (with page-level citations), claim
    decomposition for fact verification, and real-time knowledge integration via tool use. Google's
    Gemini, Anthropic's Claude, and OpenAI's GPT all now support grounded generation with citations,
    reflecting the industry consensus that ungrounded generation is unacceptable for production
    applications. The principle is simple: if the system cannot cite a source, it should say so rather
    than fabricate an answer.
  how_to_apply: |
    1. Implement a retrieval layer that supplies relevant, up-to-date context for every query. Use vector
    search (Qdrant, Pinecone, Weaviate) combined with keyword search (BM25) in a hybrid retrieval
    strategy. Ensure the retrieval corpus is regularly updated and indexed.
    2. Instruct the LLM to cite sources in its responses. Provide retrieved documents with unique
    identifiers and require the model to reference these identifiers when making factual claims. Post-
    process responses to verify that cited sources actually support the claims made.
    3. Implement a claim decomposition layer for high-stakes outputs. Break the LLM response into
    individual factual claims and verify each against the retrieved context. Flag unsupported claims
    with a confidence indicator or remove them entirely.
    4. Design explicit fallback behavior for knowledge gaps. When the retrieval system returns no
    relevant documents, the LLM should acknowledge the gap rather than falling back to parametric
    knowledge. Use phrases like "I don't have verified information on this topic" rather than
    generating plausible-sounding but unverifiable answers.
    5. Provide users with transparency mechanisms: show source documents, highlight which parts of
    the response are grounded vs. generated, and allow users to drill down into the evidence. This
    builds trust and enables users to catch errors.
  mental_model: An LLM without grounding is a confident witness with a faulty memory — it sounds certain but may be remembering
    wrong.
  domains:
    domain:
    - ai
    - architecture
    - data
    concern:
    - llm
    - rag
    - reliability
  violation_consequence: >-
    Ungrounded responses erode user trust when errors are discovered. In regulated industries (healthcare, finance, legal),
    hallucinated facts create legal liability. In knowledge management, ungrounded answers pollute the organization's knowledge
    base with fabricated information that propagates downstream.
  teaching_example: >-
    A financial advisory chatbot answers 'What is the current interest rate?' from parametric knowledge. It confidently states
    the rate from its 8-month-old training data, which is now 75 basis points higher. A user makes an investment decision
    based on stale information.
  when_applies: >-
    Any system where factual accuracy matters — customer-facing products, decision support systems, knowledge bases, content
    generation, and especially regulated industries.
  when_not_applies: >-
    Creative writing assistants, brainstorming tools, or systems where the user explicitly wants imaginative rather than factual
    output.
  sources:
  - https://arxiv.org/abs/2005.11401
  text: >-
    Ground LLM Responses in Verified Data, Not Model Knowledge Alone: An LLM without grounding is a confident witness with
    a faulty memory — it sounds certain but may be remembering wrong.
  severity: critical
  technologies:
    lang:
    - python
  how_to_do_right: |-
    1. Implement a retrieval layer that supplies relevant, up-to-date context for every query. Use vector
    search (Qdrant, Pinecone, Weaviate) combined with keyword search (BM25) in a hybrid retrieval
    strategy. Ensure the retrieval corpus is regularly updated and indexed.
    2. Instruct the LLM to cite sources in its responses. Provide retrieved documents with unique
    identifiers and require the model to reference these identifiers when making factual claims. Post-
    process responses to verify that cited sources actually support the claims made.
    3. Implement a claim decomposition layer for high-stakes outputs. Break the LLM response into
    individual factual claims and verify each against the retrieved context. Flag unsupported claims
    with a confidence indicator or remove them entirely.
    4. Design explicit fallback behavior for knowledge gaps. When the retrieval system returns no
    relevant documents, the LLM should acknowledge the gap rather than falling back to parametric
    knowledge. Use phrases like "I don't have verified information on this topic" rather than
    generating plausible-sounding but unverifiable answers.
    5. Provide users with transparency mechanisms: show source documents, highlight which parts of
    the response are grounded vs. generated, and allow users to drill down into the evidence. This
    builds trust and enables users to catch errors.
  example_good: |-
    # A financial advisory chatbot answers 'What is the current interest rate?' from parametric knowledge.
    # It confidently states the rate from its 8-month-old training data, which is now 75 basis points higher.
    # A user makes an investment decision based on stale information.
  example_bad: |-
    # Anti-pattern: Violating Ground LLM Responses in Verified Data, Not Model Knowledge Alone
    # Result: Ungrounded responses erode user trust when errors are discovered. In regulated industries (healthcare
    # Result: finance
- id: P-LLM-EVAL
  name: Evaluation Is the Bottleneck — Invest in Eval Before Scaling
  why: |
    The most common failure mode in LLM engineering is scaling a system you cannot evaluate. Teams
    build elaborate prompt chains, RAG pipelines, and agentic workflows, then discover they have no
    reliable way to measure whether the system is actually working. Without evaluation, every change
    is a leap of faith. You cannot determine if a new model version is better or worse. You cannot
    quantify the impact of a prompt change. You cannot set quality gates for deployment. You cannot
    identify regression before users do. Evaluation in LLM systems is fundamentally harder than in
    traditional software because outputs are natural language — there is no simple assertEqual(). This
    difficulty is precisely why it demands early and sustained investment. The 2025-2026 evaluation
    landscape has matured significantly: RAGAS provides RAG-specific metrics (faithfulness, relevance,
    context precision), DeepEval offers assertion-based testing for LLM outputs, Braintrust enables
    experiment tracking with human-in-the-loop scoring, and LLM-as-judge approaches (using a stronger
    model to evaluate a weaker one) have become standard practice. But tooling alone is not enough.
    You need a curated evaluation dataset that represents your actual use cases, including edge cases
    and adversarial inputs. You need defined metrics that align with user value. You need baselines to
    compare against. Teams that invest in evaluation infrastructure before building features move faster
    in the long run because every subsequent decision is data-driven rather than intuition-driven. The
    evaluation dataset is your most valuable asset — more valuable than the prompts, the model, or
    the architecture.
  how_to_apply: |
    1. Build an evaluation dataset before writing a single prompt. Collect 50-200 representative
    examples of inputs and expected outputs from your target domain. Include easy cases, hard cases,
    edge cases, and adversarial examples. This dataset is your ground truth and should be maintained
    with the same rigor as production code.
    2. Define quantitative metrics that map to user value. For a Q&A system: accuracy, faithfulness
    (does the answer match the source?), relevance (does it answer the question?), and completeness.
    For a summarization system: coverage, conciseness, and factual consistency. For a code generation
    system: functional correctness, style compliance, and security.
    3. Implement automated evaluation in CI/CD. Every prompt change, model upgrade, or pipeline
    modification triggers an evaluation run against the dataset. Use LLM-as-judge for nuanced
    assessments and deterministic checks for format compliance. Fail the build if metrics regress
    beyond thresholds.
    4. Establish human evaluation loops for calibration. Automated metrics drift without periodic
    human validation. Schedule weekly or bi-weekly human evaluation sessions where domain experts
    score a sample of outputs. Use these scores to calibrate and improve your automated metrics.
    5. Track evaluation metrics over time as a time series. Build dashboards that show quality trends
    across model versions, prompt iterations, and data changes. Detect slow degradation that individual
    evaluations might miss.
  mental_model: Eval is to LLM engineering what testing is to software engineering — you can ship without it, but you are
    flying blind.
  domains:
    domain:
    - ai
    - testing
    - architecture
    concern:
    - llm
    - evaluation
    - quality
  violation_consequence: >-
    Without evaluation, prompt changes are merged based on vibes. Model upgrades are deployed based on vendor marketing. Quality
    degrades silently until users complain. By the time you notice, the regression has been in production for weeks and root
    cause analysis is nearly impossible.
  teaching_example: >-
    A team upgrades from GPT-4 to GPT-4-turbo for cost savings without running an evaluation suite. The new model is faster
    and cheaper but produces shorter, less detailed responses. Customer satisfaction drops 15% over two weeks before anyone
    connects it to the model change.
  when_applies: >-
    Every LLM application beyond a weekend prototype. The investment scales with the stakes — a chatbot needs basic eval,
    a medical Q&A system needs extensive eval with domain expert review.
  when_not_applies: >-
    Quick prototyping where you are still exploring whether the LLM approach is viable at all. Once you decide to build, evaluation
    becomes mandatory.
  sources:
  - https://docs.ragas.io/en/stable/
  text: >-
    Evaluation Is the Bottleneck — Invest in Eval Before Scaling: Eval is to LLM engineering what testing is to software engineering
    — you can ship without it, but you are flying blind.
  severity: high
  technologies:
    lang:
    - python
  how_to_do_right: |-
    1. Build an evaluation dataset before writing a single prompt. Collect 50-200 representative
    examples of inputs and expected outputs from your target domain. Include easy cases, hard cases,
    edge cases, and adversarial examples. This dataset is your ground truth and should be maintained
    with the same rigor as production code.
    2. Define quantitative metrics that map to user value. For a Q&A system: accuracy, faithfulness
    (does the answer match the source?), relevance (does it answer the question?), and completeness.
    For a summarization system: coverage, conciseness, and factual consistency. For a code generation
    system: functional correctness, style compliance, and security.
    3. Implement automated evaluation in CI/CD. Every prompt change, model upgrade, or pipeline
    modification triggers an evaluation run against the dataset. Use LLM-as-judge for nuanced
    assessments and deterministic checks for format compliance. Fail the build if metrics regress
    beyond thresholds.
    4. Establish human evaluation loops for calibration. Automated metrics drift without periodic
    human validation. Schedule weekly or bi-weekly human evaluation sessions where domain experts
    score a sample of outputs. Use these scores to calibrate and improve your automated metrics.
    5. Track evaluation metrics over time as a time series. Build dashboards that show quality trends
    across model versions, prompt iterations, and data changes. Detect slow degradation that individual
