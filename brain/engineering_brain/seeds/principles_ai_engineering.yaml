    model used, and calculated cost for every request. Aggregate these into per-user, per-feature, and
    per-workflow cost metrics. Use observability tools (Langfuse, Helicone) or build lightweight custom
    tracking.
    2. Set per-request cost budgets for each feature. An auto-complete feature might budget $0.001 per
