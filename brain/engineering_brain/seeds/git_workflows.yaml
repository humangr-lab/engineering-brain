layer: rules
technology: General
domain: devops
knowledge:
- id: CR-GIT-001
  text: Use trunk-based development with short-lived feature branches — merge within 2 days maximum
  why: Long-lived branches diverge from main, causing painful merges, integration surprises, and delayed feedback. Google,
    Meta, and Microsoft engineering research shows that short-lived branches (< 2 days) correlate with 2-3x higher deployment
    frequency and 3x lower change failure rate. The longer a branch lives, the more likely it introduces merge conflicts and
    integration bugs.
  how_to_do_right: '1. Create a feature branch from main. Target: merge back within 1-2 days.

    2. If the feature takes more than 2 days, decompose into smaller increments behind feature flags.

    3. Keep the branch in sync: rebase on main daily to catch integration issues early.

    4. CI runs on every push to the feature branch — broken builds are fixed immediately.

    5. Use stacked PRs for larger features: base PR (data) → logic PR → API PR.

    6. Main branch is always deployable — never merge code that breaks the build.

    '
  severity: high
  technologies:
    platform: [git, github, gitlab]
  domains:
    domain: [operations, devops, quality]
    concern: [code]
  example_good: '# Trunk-based workflow: feature branch lives < 2 days

    git checkout -b feat/add-rate-limiting main


    # Day 1: Implement core rate limiter + tests

    git add src/middleware/rate_limiter.py tests/test_rate_limiter.py

    git commit -m "feat: add sliding window rate limiter with Redis backend"


    # Day 1 evening: rebase on latest main

    git fetch origin && git rebase origin/main


    # Day 2: Wire into API + integration test

    git add src/api/app.py tests/test_api_rate_limit.py

    git commit -m "feat: wire rate limiter to login endpoint (5 req/15 min)"


    # Day 2: Open PR, get review, merge

    gh pr create --title "feat: rate limit login endpoint" --body "..."

    # PR is 180 lines, reviewer approves in 30 minutes


    # Feature flag controls activation — code is merged but not active until verified

    '
  example_bad: '# Long-lived branch: diverges for 3 weeks

    git checkout -b feature/new-checkout-v2 main


    # Week 1: 1,200 lines changed, no rebase

    # Week 2: 2,400 lines changed, main has 15 new commits, conflicts growing

    # Week 3: 3,600 lines changed, massive merge conflicts


    git merge main  # 47 conflicts, 2 hours to resolve

    # Merge introduces subtle bugs because conflict resolution was rushed

    # PR is 3,600 lines — reviewer says "LGTM" without reading it

    # Deploys to production → 3 bugs found in first hour

    '
  when_applies: Projects using Git, GitHub, or GitLab
  when_not_applies: local development only, throwaway experiments
  sources: ["https://trunkbaseddevelopment.com/"]
- id: CR-GIT-002
  text: Decouple deployment from release using feature flags — merged code does not mean released feature
  why: 'Coupling merge to release forces long-lived branches (because code is not ready to be seen by users). Feature flags
    break this coupling: code can be merged, deployed, and tested in production while invisible to users. This enables continuous
    deployment, canary testing, and instant rollback without code changes.'
  how_to_do_right: '1. Wrap incomplete or risky features in feature flags before merging.

    2. Merge to main as soon as the code compiles and tests pass — flag defaults to OFF.

    3. Deploy to production with flag OFF — code is there but inactive.

    4. Turn flag ON for internal users first, then beta users, then 10%, then 100%.

    5. If issues arise at any stage, turn flag OFF — instant rollback, no deploy needed.

    6. Remove flag within 2 weeks of 100% rollout (flag debt is real).

    '
  severity: high
  technologies:
    lang: [general]
    library: [launchdarkly, unleash]
    platform: [git]
  domains:
    domain: [operations, devops, quality]
    concern: [code]
  example_good: "# Feature merged to main on Monday, released gradually through the week\n# Monday: merged + deployed, flag\
    \ OFF for all\nif feature_flags.is_enabled(\"new_checkout_flow\", user_id):\n    return render_new_checkout(cart)\nreturn\
    \ render_legacy_checkout(cart)\n\n# Tuesday: flag ON for internal team (10 users)\n# Wednesday: flag ON for beta users\
    \ (500 users), monitor error rates\n# Thursday: flag ON for 10% of production traffic\n# Friday: flag ON for 100%, after\
    \ 48 hours of clean metrics\n\n# If error rate spikes at 10%:\n# -> Turn flag OFF (takes 1 second, no deploy)\n# -> Investigate\
    \ and fix\n# -> Re-enable gradually\n\n# Week+2: Remove flag + legacy code path\n"
  example_bad: '# No feature flags — merge = release

    # "We can''t merge this to main until it''s completely done and tested"

    # Branch lives for 3 weeks

    # Finally merges → immediately visible to all users

    # Bug found → emergency hotfix deploy (45 minutes to build + deploy)

    # Users affected for 45 minutes

    '
  when_applies: Projects using Git, LaunchDarkly, Unleash, or General
  when_not_applies: local development only, throwaway experiments
  sources: ["https://martinfowler.com/articles/feature-toggles.html"]
- id: CR-GIT-003
  text: 'Use consistent branch naming: type/ticket-short-description'
  why: 'Consistent branch names enable automation (CI rules, auto-labeling, changelog generation) and human readability. When
    someone sees `fix/PROJ-123-null-pointer-cart`, they instantly know: it is a fix, it has a ticket, and it relates to cart.
    Without convention, branches like `johns-stuff`, `test2`, and `final-final-v3` make the repo unnavigable.'
  how_to_do_right: '1. Format: type/ticket-short-description (all lowercase, hyphens for spaces).

    2. Types: feat/, fix/, docs/, chore/, refactor/, test/, hotfix/.

    3. Ticket ID: JIRA/Linear ticket (PROJ-123) or GitHub issue (#123).

    4. Description: 2-4 words summarizing the change (not the implementation).

    5. Enforce via pre-push hook or CI check on branch name format.

    6. Delete branches after merge — do not accumulate hundreds of stale branches.

    '
  severity: low
  technologies:
    platform: [git, github, gitlab]
  domains:
    domain: [operations, devops]
  example_good: '# Consistent, descriptive branch names

    feat/PROJ-123-user-rate-limiting

    fix/PROJ-456-null-pointer-checkout

    docs/PROJ-789-api-versioning-guide

    chore/PROJ-012-upgrade-python-312

    refactor/PROJ-345-extract-payment-module

    test/PROJ-678-cart-edge-cases

    hotfix/PROJ-901-production-memory-leak


    # Automation enabled:

    # - CI runs extra security checks on hotfix/* branches

    # - Auto-label PRs based on branch type (feat → "feature", fix → "bugfix")

    # - Changelog groups by type: "Features", "Bug Fixes", "Documentation"


    # Branch cleanup after merge

    git branch -d feat/PROJ-123-user-rate-limiting

    git push origin --delete feat/PROJ-123-user-rate-limiting

    '
  example_bad: '# Inconsistent, cryptic branch names

    johns-branch

    test

    test2

    final-final-v3

    asdfg

    new-stuff

    fix

    wip

    # No ticket reference, no type, no description

    # Cannot automate anything based on branch name

    # "What is johns-branch? Is it safe to delete?"

    # 247 stale branches in the repo

    '
  when_applies: Projects using Git, GitHub, or GitLab
  when_not_applies: local development only, throwaway experiments
  sources: ["https://git-scm.com/book/en/v2/Git-Branching-Branching-Workflows"]
- id: CR-GIT-004
  text: 'Use Conventional Commits format: type(scope): description — enables automated changelog and versioning'
  why: Conventional Commits create a machine-readable commit history that enables automated changelog generation, semantic
    versioning, and release notes. Without structure, commit messages like 'fix stuff' or 'updates' provide zero information
    to anyone reading the history. Structured commits also help with git bisect and blame.
  how_to_do_right: '1. Format: type(scope): short description

    2. Types: feat (new feature), fix (bug fix), docs, chore, refactor, test, perf, ci, style.

    3. Scope: the module or component affected (optional but recommended).

    4. Description: imperative mood, lowercase, no period, under 72 chars.

    5. Body (optional): explain WHY, not WHAT (the diff shows what).

    6. Breaking changes: add BREAKING CHANGE: in footer or ! after type.

    7. Enforce with commitlint in pre-commit hooks.

    '
  severity: medium
  technologies:
    library: [commitlint, semantic release]
    platform: [git]
  domains:
    domain: [operations, devops]
  example_good: '# Well-structured conventional commits

    feat(auth): add rate limiting to login endpoint


    Limit login attempts to 5 per 15 minutes per IP to prevent brute force

    attacks. Uses sliding window algorithm with Redis backend.


    Closes #234


    ---


    fix(cart): handle null price in discount calculation


    The discount calculator crashed when a product had a null price (happens

    during price migration). Now treats null price as zero and logs a warning.


    ---


    feat(api)!: change pagination from offset to cursor-based


    BREAKING CHANGE: The `offset` parameter is replaced by `cursor`.

    Migration guide: docs/migration/pagination-v2.md


    ---


    chore(deps): upgrade fastapi from 0.109 to 0.110


    No breaking changes. Includes fix for CVE-2024-XXXXX.

    '
  example_bad: '# Useless commit messages

    "fix"

    "updates"

    "WIP"

    "stuff"

    "asdf"

    "Friday commit"

    "review changes"

    "more fixes"

    "final fix (for real this time)"

    # Cannot generate changelog

    # Cannot determine version bumps

    # Git blame is useless — "what did ''stuff'' change?"

    # git bisect finds the breaking commit but message says "updates"

    '
  when_applies: Projects using Git, Commitlint, or Semantic Release
  when_not_applies: local development only, throwaway experiments
  sources: ["https://www.conventionalcommits.org/en/v1.0.0/"]
- id: CR-GIT-005
  text: Make atomic commits — each commit is one logical change that compiles and passes tests
  why: Atomic commits make git bisect effective (each commit is testable), enable clean reverts (revert one change without
    unrelated damage), and create a readable project history. Mixed commits ('add feature X + fix bug Y + update docs Z')
    cannot be partially reverted and confuse anyone reading the history.
  how_to_do_right: '1. Each commit does exactly ONE thing: add a feature, fix a bug, refactor a module.

    2. Every commit compiles and passes tests — no ''WIP'' commits on main.

    3. Use `git add -p` (patch mode) to stage parts of a file when changes span multiple concerns.

    4. If you realize you are changing two things, stop and commit the first before continuing.

    5. Commit message should be expressible in one sentence — if not, the commit is not atomic.

    6. Squash WIP commits before merge (interactive rebase or squash merge).

    '
  severity: medium
  technologies:
    platform: [git]
  domains:
    domain: [operations, devops, quality]
    concern: [code]
  example_good: '# Atomic commits: each is one logical change, each passes tests

    # Commit 1: Data model

    git add src/models/notification_preferences.py

    git commit -m "feat(models): add NotificationPreferences model"


    # Commit 2: Business logic

    git add src/services/notification_service.py tests/test_notification_service.py

    git commit -m "feat(notifications): add preference update service with validation"


    # Commit 3: API endpoint

    git add src/api/routes/notifications.py tests/test_api_notifications.py

    git commit -m "feat(api): add GET/PUT endpoints for notification preferences"


    # Each commit independently compiles and passes tests

    # git bisect works: if a test fails, you know exactly which logical change broke it

    # git revert works: can revert the API without touching the model

    '
  example_bad: '# Non-atomic commit: everything in one messy commit

    git add .

    git commit -m "add notifications, fix login bug, update readme, change config"

    # If login fix introduces a bug: cannot revert without losing notifications feature

    # Git bisect points to this commit but it contains 4 unrelated changes

    # Reading history: "what exactly changed about login in this commit?"

    # Answer: have to read a 600-line diff to find the 5-line login fix

    '
  when_applies: Projects using Git
  when_not_applies: local development only, throwaway experiments. projects not using Git
  sources: ["https://git-scm.com/book/en/v2/Git-Tools-Rewriting-History"]
- id: CR-GIT-006
  text: Write commit messages that explain WHY, not WHAT — the diff already shows what changed
  why: 'The diff shows exactly what code changed. What it does not show is: why this approach was chosen, what alternative
    was considered, what bug this fixes, or what business requirement this satisfies. Six months later, ''fix null check''
    tells you nothing useful. ''fix: cart total returns NaN when promotional item has no price (affects 3% of checkouts since
    promo launch)'' tells you everything.'
  how_to_do_right: '1. Subject line (50-72 chars): what was done, in imperative mood.

    2. Body: why this change was necessary, what problem it solves, what alternatives were considered.

    3. Reference tickets/issues: ''Closes #234'' or ''Related: PROJ-567''.

    4. For bug fixes: describe the symptoms, root cause, and how the fix addresses the root cause.

    5. For features: link to the spec or RFC.

    6. If the commit is trivial (typo fix, formatting), a subject line alone is fine.

    '
  severity: medium
  technologies:
    platform: [git]
  domains:
    domain: [operations, devops, quality]
    concern: [code]
  example_good: 'fix(cart): prevent NaN total when promo item has null price


    The cart total calculation crashed with NaN when a promotional item had

    a null unit_price (set to null during price migration for free items).

    This affected ~3% of checkout sessions since the January promo launch.


    Root cause: `sum(item.price * item.qty for item in items)` propagated

    null via multiplication.


    Fix: Coalesce null prices to Decimal("0") at the model level, matching

    the business rule that null-price items are free promotional additions.


    Alternative considered: Filter null-price items in the sum. Rejected

    because it would silently exclude items from the cart display.


    Closes #234

    '
  example_bad: 'fix null check


    # Six months later:

    # Developer: "What null check? In what module? What was the bug?"

    # *reads 45-line diff*

    # Developer: "I still don''t understand why it was null in the first place"

    '
  when_applies: Projects using Git
  when_not_applies: local development only, throwaway experiments. projects not using Git
  sources: ["https://cbea.ms/git-commit/"]
- id: CR-GIT-007
  text: Use a PR template with context, changes summary, and test plan — never leave the description empty
  why: Empty PR descriptions force reviewers to reverse-engineer the intent from the diff. Templates ensure every PR has context
    (why), changes (what), and a test plan (how it was verified). This reduces review time by 40-50% because reviewers know
    what to look for and what the expected behavior is.
  how_to_do_right: '1. Create a PR template in .github/PULL_REQUEST_TEMPLATE.md.

    2. Required sections: Summary (why), Changes (what), Test Plan (how verified), Related Issues.

    3. Summary should be 2-3 sentences explaining the motivation, not restating the title.

    4. Changes should list the key modifications, not every file changed.

    5. Test plan should describe how the author verified correctness.

    6. Link related issues, specs, or ADRs for full context.

    '
  severity: medium
  technologies:
    platform: [github, gitlab, git]
  domains:
    domain: [operations, devops, quality]
    concern: [code]
  example_good: '# .github/PULL_REQUEST_TEMPLATE.md

    ## Summary

    <!-- Why this change? Link to ticket/spec -->


    ## Changes

    <!-- Key modifications (not every file, but logical changes) -->

    -

    -


    ## Test Plan

    <!-- How did you verify this works? -->

    - [ ] Unit tests pass

    - [ ] Integration tests pass

    - [ ] Manual testing: describe scenario


    ## Related

    <!-- Issues, specs, ADRs -->

    Closes #


    ---


    # Example filled-in PR:

    ## Summary

    Cart checkout fails with NaN total for ~3% of sessions since the January

    promotional campaign launch. Root cause: null price on free promo items.


    ## Changes

    - CartItem model: coalesce null price to Decimal("0")

    - Added validation test for null-price items in cart total


    ## Test Plan

    - [x] Unit test: cart with null-price item calculates correct total

    - [x] Unit test: cart with all null-price items returns Decimal("0")

    - [x] Integration: checkout flow with promo item completes successfully

    - [x] Verified fix in staging with production data sample (100 affected carts)


    ## Related

    Closes #234

    Related: ADR-0015 (promo pricing)

    '
  example_bad: '# PR title: "fix cart"

    # PR description: (empty)

    # Or: "Please review"

    # Reviewer has no context — has to read the entire diff to understand why

    # Reviewer does not know what to test or verify

    '
  when_applies: Projects using GitHub, GitLab, or Git
  when_not_applies: local development only, throwaway experiments
  sources: ["https://docs.github.com/en/repositories/configuring-branches-and-merges-in-your-repository/managing-a-branch-protection-rule/about-branch-protection-rules"]
- id: CR-GIT-008
  text: Use squash merge to main — clean history with one commit per logical change
  why: Feature branches often have WIP commits, fixup commits, and merge commits that clutter the main branch history. Squash
    merge combines all branch commits into a single, clean commit on main. This makes git log, git bisect, and git revert
    on main dramatically more useful. The detailed branch history is preserved in the PR for anyone who needs it.
  how_to_do_right: '1. Configure repository to squash merge by default (GitHub: Settings → Merge button).

    2. The squash commit message should be the PR title + summary (not ''Squashed commit of...'').

    3. Include PR number in the commit message for traceability (PR #123).

    4. Delete branch after merge — the PR preserves the detailed history.

    5. Exception: use merge commit for release branches where individual commits matter for changelog.

    6. Rebase merge is also acceptable if the branch has clean, atomic commits.

    '
  severity: low
  technologies:
    platform: [git, github, gitlab]
  domains:
    domain: [operations, devops]
  example_good: '# Feature branch has 7 commits (including WIP and fixups)

    # Branch commits:

    #   "WIP: start rate limiter"

    #   "add redis backend"

    #   "fix tests"

    #   "address review comments"

    #   "fix lint"

    #   "add integration test"

    #   "final cleanup"


    # Squash merge to main:

    # Single clean commit:

    feat(auth): add rate limiting to login endpoint (#234)


    Limit login attempts to 5 per 15 minutes per IP to prevent brute force

    attacks. Uses sliding window algorithm with Redis backend.


    # Main branch history is clean and meaningful

    # The 7 WIP commits are preserved in PR #234 for archaeology if needed

    '
  example_bad: '# Merge commit (no squash) — all WIP commits pollute main

    # Main branch log:

    #   "Merge branch ''feat/rate-limiting''"

    #   "final cleanup"

    #   "fix lint"

    #   "address review comments"

    #   "fix tests"

    #   "add redis backend"

    #   "WIP: start rate limiter"

    #   "Merge branch ''feat/other-feature''"

    #   ... more noise ...

    # git log main is unreadable — mix of real work and WIP noise

    # git bisect has to test WIP commits that do not even compile

    '
  when_applies: Projects using Git, GitHub, or GitLab
  when_not_applies: local development only, throwaway experiments
  sources: ["https://docs.github.com/en/repositories/configuring-branches-and-merges-in-your-repository/configuring-pull-request-merges/about-merge-methods-on-github"]
- id: CR-GIT-009
  text: Follow Semantic Versioning — MAJOR.MINOR.PATCH communicates the nature of changes to consumers
  why: 'Semantic versioning creates a contract with consumers: PATCH means safe to upgrade (bug fixes), MINOR means new features
    but backward compatible, MAJOR means breaking changes. Without SemVer, consumers cannot make informed upgrade decisions
    and either upgrade blindly (risk breaking) or never upgrade (miss fixes).'
  how_to_do_right: '1. MAJOR: Increment when making backward-incompatible changes (removed endpoint, changed response format).

    2. MINOR: Increment when adding backward-compatible features (new endpoint, new optional parameter).

    3. PATCH: Increment for backward-compatible bug fixes.

    4. Pre-release versions: 1.0.0-alpha.1, 1.0.0-beta.1, 1.0.0-rc.1.

    5. Automate version bumps from conventional commit types: feat → minor, fix → patch, BREAKING → major.

    6. Tag releases in git with annotated tags: git tag -a v1.2.3 -m "Release 1.2.3".

    '
  severity: medium
  technologies:
    library: [npm, pypi, semantic release]
    platform: [git]
  domains:
    domain: [operations, devops]
  example_good: '# Version history with clear SemVer meaning

    v1.0.0  # Initial release

    v1.0.1  # fix: null pointer in cart calculation (PATCH — safe upgrade)

    v1.0.2  # fix: rate limiter memory leak (PATCH — safe upgrade)

    v1.1.0  # feat: add notification preferences API (MINOR — new feature, backward compatible)

    v1.1.1  # fix: notification email template typo (PATCH — safe upgrade)

    v2.0.0  # feat!: change pagination to cursor-based (MAJOR — breaking change)


    # Automated with semantic-release:

    # "fix:" commit → bumps PATCH

    # "feat:" commit → bumps MINOR

    # "feat!:" or "BREAKING CHANGE:" → bumps MAJOR


    # Annotated tag

    git tag -a v1.1.0 -m "Release 1.1.0: notification preferences API"

    git push origin v1.1.0

    '
  example_bad: '# Random versioning — consumers cannot trust upgrade safety

    v1.0   # initial

    v1.1   # "some updates" — safe to upgrade? who knows

    v1.2   # "more stuff" — might break, might not

    v2.0   # "big update" — what broke? everything? nothing?

    v2.1   # actually this is the one that broke the API

    v2.2   # oh this breaks it even more

    # Consumer: "I''ll just stay on v1.0 forever"

    '
  when_applies: Projects using Git, npm, PyPI, or Semantic Release
  when_not_applies: local development only, throwaway experiments
  sources: ["https://semver.org/"]
- id: CR-GIT-010
  text: Auto-generate changelogs from conventional commits — users should know what changed without reading code
  why: Manual changelogs are always incomplete, late, or abandoned. Auto-generated changelogs from conventional commits are
    accurate, up-to-date, and free. Users, support teams, and stakeholders need to know what changed between versions to make
    upgrade decisions, troubleshoot issues, and understand new capabilities.
  how_to_do_right: '1. Use conventional commits (the format enables automation).

    2. Tool: semantic-release, standard-version, or conventional-changelog.

    3. Changelog groups: Features, Bug Fixes, Breaking Changes, Performance, Documentation.

    4. Include PR/commit links for developers who need details.

    5. Breaking changes section highlights migration steps.

    6. Generate changelog as part of the release pipeline — no manual steps.

    '
  severity: low
  technologies:
    library: [semantic release]
    platform: [git, github_actions]
  domains:
    domain: [operations, devops]
  example_good: '# Auto-generated CHANGELOG.md

    ## [1.1.0] - 2026-02-15


    ### Features

    - **notifications**: add notification preferences API ([#234](link))

    - **cart**: add real-time price updates on quantity change ([#228](link))


    ### Bug Fixes

    - **cart**: handle null price in promo items ([#230](link))

    - **auth**: fix rate limiter not resetting after window expiry ([#229](link))


    ### Breaking Changes

    None


    ---


    ## [1.0.2] - 2026-02-08


    ### Bug Fixes

    - **auth**: fix rate limiter memory leak on high traffic ([#225](link))

    '
  example_bad: '# CHANGELOG.md (manual, last updated 6 months ago)

    ## Version 1.0 (2025-08-15)

    - Initial release


    ## Version 1.1 (never written)

    # "We''ll update the changelog before the next release"

    # (narrator: they did not update the changelog)

    '
  when_applies: Projects using Git, Semantic Release, or GitHub Actions
  when_not_applies: local development only, throwaway experiments
  sources: ["https://github.com/conventional-changelog/conventional-changelog"]
- id: CR-GIT-011
  text: Rebase for clean history on personal branches, merge for shared branches — never rebase shared branches
  why: 'Rebase rewrites commit history — on a personal feature branch, this creates a clean linear history. On a shared branch
    (main, develop, release), rebase rewrites history that others have already based work on, causing divergence, duplicate
    commits, and lost work. The rule is simple: rebase YOUR work, merge OTHERS'' work.'
  how_to_do_right: '1. Personal feature branch: rebase on main daily to stay current.

    2. Shared branches (main, develop): never rebase — always merge or fast-forward.

    3. Before opening PR: rebase on latest main to resolve conflicts in your branch.

    4. If someone else has pushed to your branch: do not rebase — use merge instead.

    5. Use `git pull --rebase` for personal branches, `git pull --merge` for shared branches.

    6. Force push only to YOUR feature branch, never to shared branches.

    '
  severity: high
  technologies:
    platform: [git]
  domains:
    domain: [operations, devops]
  example_good: '# Personal feature branch: rebase on main for clean history

    git checkout feat/rate-limiting

    git fetch origin

    git rebase origin/main

    # Resolve any conflicts

    git push --force-with-lease  # safe force push to YOUR branch only


    # Shared branch (main): merge, never rebase

    git checkout main

    git merge feat/rate-limiting  # creates merge commit, preserves history


    # Configuration to make pull --rebase the default for personal branches

    git config pull.rebase true

    git config rebase.autoStash true

    '
  example_bad: '# DANGER: rebasing a shared branch

    git checkout main

    git rebase feat/some-feature  # NEVER DO THIS

    git push --force origin main  # DESTROYS OTHERS'' WORK


    # What happens:

    # - Everyone else''s branches diverge from main

    # - Anyone who pulled main before the rebase has different history

    # - Commits appear duplicated, merge conflicts everywhere

    # - Data loss if someone''s work was based on the rewritten commits

    '
  when_applies: Projects using Git
  when_not_applies: local development only, throwaway experiments. projects not using Git
  sources: ["https://git-scm.com/book/en/v2/Git-Branching-Rebasing"]
- id: CR-GIT-012
  text: Use git bisect to find the exact commit that introduced a bug — binary search is O(log n)
  why: 'Debugging by reading recent commits is O(n) and error-prone — you might miss the problematic commit. Git bisect uses
    binary search to find the exact breaking commit in O(log n) steps. For 1000 commits, that is 10 steps instead of 1000.
    It works even if you do not understand the codebase, because it simply asks: ''Does this commit work? Yes or no.'''
  how_to_do_right: '1. Start bisect: `git bisect start` → `git bisect bad` (current broken) → `git bisect good <known-good-commit>`.

    2. Git checks out the midpoint. Test it. Mark `good` or `bad`. Repeat until found.

    3. Automate with a test script: `git bisect run pytest tests/test_cart.py -x`.

    4. Prerequisite: atomic commits that compile and pass tests (otherwise bisect lands on untestable commits).

    5. When done: `git bisect reset` to return to original branch.

    6. Combine with git blame to understand WHO and WHY after finding WHICH commit.

    '
  severity: medium
  technologies:
    platform: [git]
  domains:
    domain: [operations, devops, quality]
    concern: [code]
  example_good: '# Bug: cart total is wrong since sometime last month

    # 200 commits in the last month — reading each is impractical


    # Step 1: Start bisect

    git bisect start

    git bisect bad                    # current HEAD is broken

    git bisect good v1.0.2            # last known good release


    # Step 2: Automate with test script

    git bisect run pytest tests/test_cart_total.py -x -q

    # Git binary searches through 200 commits in ~8 steps

    # Output: "abc1234 is the first bad commit"


    # Step 3: Examine the breaking commit

    git show abc1234

    # "refactor(cart): extract pricing logic"

    # Found: the refactor introduced a rounding error in discount calculation


    # Step 4: Clean up

    git bisect reset

    '
  example_bad: '# Manual debugging approach

    git log --oneline | head -200

    # "Hmm, maybe it was this commit... let me check out and test"

    git checkout abc1234 && pytest  # nope, still works

    git checkout def5678 && pytest  # nope, still works

    # ... 2 hours later, still guessing ...

    # "I give up, let me just read all the recent changes"

    # ... 3 more hours reading diffs ...

    '
  when_applies: Projects using Git
  when_not_applies: local development only, throwaway experiments. projects not using Git
  sources: ["https://git-scm.com/docs/git-bisect"]
- id: CR-GIT-013
  text: Sign commits with GPG or SSH keys for verified identity in supply chain security
  why: Git commits can be authored by anyone claiming any identity — `git config user.email ceo@company.com` makes you appear
    as the CEO in git log. In supply chain attacks, malicious commits are inserted under trusted identities. Commit signing
    cryptographically proves the commit was made by the key holder, enabling verified identity in CI/CD and audit trails.
  how_to_do_right: '1. Generate a GPG or SSH key for signing (SSH is simpler: `git config gpg.format ssh`).

    2. Configure git: `git config commit.gpgsign true` (auto-sign all commits).

    3. Upload your public key to GitHub/GitLab for ''Verified'' badge on commits.

    4. Enable branch protection: require signed commits on main/release branches.

    5. CI/CD: verify commit signatures before deploying to production.

    6. Key rotation: rotate signing keys annually, revoke immediately if compromised.

    '
  severity: medium
  technologies:
    library: [gpg]
    platform: [git, github, gitlab]
  domains:
    domain: [operations, devops, security]
  example_good: '# Setup SSH commit signing (simpler than GPG)

    git config --global gpg.format ssh

    git config --global user.signingkey ~/.ssh/id_ed25519.pub

    git config --global commit.gpgsign true


    # Every commit is now automatically signed

    git commit -m "feat: add rate limiting"

    # Shows as "Verified" on GitHub


    # Branch protection (GitHub):

    # Settings → Branches → main → Require signed commits ✓


    # Verify locally:

    git log --show-signature

    # Good "git" signature for user@example.com with ED25519 key SHA256:...

    '
  example_bad: '# No commit signing — anyone can impersonate anyone

    git config user.email "admin@company.com"

    git config user.name "System Administrator"

    git commit -m "chore: update security config"  # appears to be from admin

    # No way to verify this is actually from the system administrator

    # In a supply chain attack, malicious code appears "trusted"

    '
  when_applies: Projects using Git, GPG, GitHub, or GitLab
  when_not_applies: local development only, throwaway experiments
  sources: ["https://docs.github.com/en/authentication/managing-commit-signature-verification/about-commit-signature-verification"]
- id: CR-GIT-014
  text: Use git worktree for parallel branch work instead of stashing or cloning
  why: 'Stashing is error-prone (stash conflicts, lost stashes) and cloning wastes disk space and time. Git worktree lets
    you check out multiple branches simultaneously in different directories, sharing the same repository data. This is ideal
    for: reviewing a PR while working on a feature, or running tests on main while coding on a branch.'
  how_to_do_right: '1. Create a worktree: `git worktree add ../project-review feat/other-feature`.

    2. Each worktree is a real directory with its own working tree and index.

    3. All worktrees share the same .git objects — no duplicate clones.

    4. Remove when done: `git worktree remove ../project-review`.

    5. Use case: `../project-main` for main branch, `../project-feature` for current work.

    6. Limit: a branch can only be checked out in one worktree at a time.

    '
  severity: low
  technologies:
    platform: [git]
  domains:
    domain: [operations, devops]
  example_good: '# Scenario: Working on feature, need to review a PR on another branch

    # Current directory: ~/code/project (on feat/my-feature)


    # Create worktree for PR review

    git worktree add ../project-pr-review feat/their-feature

    cd ../project-pr-review

    # Run tests, review code, leave comments

    pytest tests/ -v


    # Switch back to your feature work — no stash, no context switch

    cd ../project

    # Your working directory is exactly as you left it


    # Clean up after review

    git worktree remove ../project-pr-review


    # List active worktrees

    git worktree list

    # /home/user/code/project           abc1234 [feat/my-feature]

    # /home/user/code/project-pr-review  def5678 [feat/their-feature]

    '
  example_bad: '# Without worktree: stash-based context switching

    git stash                          # hope I remember what''s stashed

    git checkout feat/their-feature    # switch branch

    pytest tests/                      # review

    git checkout feat/my-feature       # switch back

    git stash pop                      # pray there are no conflicts


    # Problems:

    # - Stash conflicts with working directory changes

    # - Forgot to stash: "Your local changes would be overwritten"

    # - Multiple stashes: "Which stash was for which task?"

    # - Lost stash: "I stash-popped the wrong one"

    '
  when_applies: Projects using Git
  when_not_applies: local development only, throwaway experiments. projects not using Git
  sources: ["https://git-scm.com/docs/git-worktree"]
