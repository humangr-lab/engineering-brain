layer: rules
technology: Kotlin
domain: mobile
knowledge:
- id: CR-KT-001
  text: Build Composable functions as pure transformations of state — side effects must be in LaunchedEffect, DisposableEffect,
    or rememberCoroutineScope
  why: 'Compose recomposes (re-executes) composable functions whenever their inputs change. A composable that makes an API
    call in its body will fire that call on every recomposition — potentially hundreds of times during a scroll. Side effects
    (network calls, analytics events, permission requests, sensor subscriptions) must be placed in effect handlers that Compose
    manages. LaunchedEffect ties the effect to the composable''s lifecycle. DisposableEffect provides cleanup. Without these,
    apps suffer from duplicate API calls, memory leaks from unmanaged subscriptions, and inconsistent UI state from race conditions.

    '
  how_to_do_right: '1. Composable body: ONLY read state and emit UI — no side effects

    2. LaunchedEffect(key): runs when key changes, cancels previous coroutine

    3. DisposableEffect(key): for effects needing cleanup (listeners, subscriptions)

    4. rememberCoroutineScope: for event handlers (button clicks, gestures)

    5. SideEffect: for non-suspend effects that must run after every successful recomposition

    6. derivedStateOf: for computed state that prevents unnecessary recomposition

    '
  severity: critical
  technologies:
    lang: [kotlin]
    framework: [jetpack_compose]
    platform: [mobile, android]
  domains:
    domain: [architecture, mobile]
  example_good: "@Composable\nfun UserProfileScreen(\n    userId: String,\n    viewModel: UserProfileViewModel = hiltViewModel()\n\
    ) {\n    val uiState by viewModel.uiState.collectAsStateWithLifecycle()\n\n    // LaunchedEffect: runs once when userId\
    \ changes, cancels on recomposition\n    LaunchedEffect(userId) {\n        viewModel.loadUser(userId)\n    }\n\n    //\
    \ DisposableEffect: sensor subscription with cleanup\n    DisposableEffect(Unit) {\n        val listener = SensorManager.registerListener(...)\n\
    \        onDispose {\n            SensorManager.unregisterListener(listener)\n        }\n    }\n\n    // Body is pure:\
    \ reads state, emits UI\n    when (uiState) {\n        is UiState.Loading -> CircularProgressIndicator()\n        is UiState.Success\
    \ -> UserContent(\n            user = (uiState as UiState.Success).user,\n            onEdit = viewModel::startEditing\
    \ // stable reference\n        )\n        is UiState.Error -> ErrorScreen(\n            message = (uiState as UiState.Error).message,\n\
    \            onRetry = { viewModel.loadUser(userId) }\n        )\n    }\n}\n\n// Event handler with scoped coroutine\n\
    @Composable\nfun SaveButton(onSave: suspend () -> Unit) {\n    val scope = rememberCoroutineScope()\n    Button(onClick\
    \ = { scope.launch { onSave() } }) {\n        Text(\"Save\")\n    }\n}\n"
  example_bad: "@Composable\nfun UserProfileScreen(userId: String) {\n    // Side effect in body — fires on EVERY recomposition\n\
    \    val user = runBlocking { api.getUser(userId) } // blocks main thread!\n\n    // Another side effect — analytics sent\
    \ dozens of times\n    analyticsTracker.logScreenView(\"profile\") // runs every recomposition\n\n    // No lifecycle\
    \ management — coroutine leaks if composable leaves tree\n    val scope = CoroutineScope(Dispatchers.IO)\n    scope.launch\
    \ { api.trackView(userId) } // leaked coroutine\n\n    Text(user.name)\n}\n"
  when_applies: Any project using Kotlin/Android development, Jetpack Compose, or Android
  when_not_applies: web-only applications, backend services, desktop applications
  sources: ["https://developer.android.com/develop/ui/compose/side-effects"]
- id: CR-KT-002
  text: Use remember and mutableStateOf correctly — remember survives recomposition, mutableStateOf triggers recomposition
  why: 'Compose throws away and recreates all local variables on every recomposition. Without remember, state is lost on every
    recomposition — a counter resets to 0, an expanded section collapses, a text field clears its content. mutableStateOf
    creates an observable state holder that Compose tracks: when its value changes, Compose schedules recomposition of the
    reading composable. Using a regular variable instead of mutableStateOf means changes don''t trigger UI updates. Using
    mutableStateOf without remember means the state is recreated (reset) on every recomposition. Both must be used together
    for correct behavior.

    '
  how_to_do_right: '1. remember { mutableStateOf(initial) } for local observable state

    2. rememberSaveable { mutableStateOf(initial) } for state surviving process death

    3. derivedStateOf for computed values (avoids recomposition from intermediate changes)

    4. remember(key) to recompute when key changes (like useMemo in React)

    5. Never create mutableStateOf outside remember — it resets on recomposition

    6. Use by delegation: var count by remember { mutableStateOf(0) }

    '
  severity: critical
  technologies:
    lang: [kotlin]
    framework: [jetpack_compose]
    platform: [mobile, android]
  domains:
    domain: [architecture, mobile]
    concern: [state_management]
  example_good: "@Composable\nfun ExpandableCard(title: String, content: String) {\n    // remember + mutableStateOf = state\
    \ survives recomposition and triggers UI update\n    var isExpanded by remember { mutableStateOf(false) }\n\n    // rememberSaveable\
    \ = survives process death (config change, low memory kill)\n    var userInput by rememberSaveable { mutableStateOf(\"\
    \") }\n\n    // derivedStateOf = only recomposes when result changes, not on every input change\n    val isValid by remember\
    \ {\n        derivedStateOf { userInput.length >= 3 && userInput.length <= 50 }\n    }\n\n    // remember with key = recomputes\
    \ when title changes\n    val formattedTitle = remember(title) {\n        title.uppercase().take(20) // expensive computation\
    \ cached\n    }\n\n    Column {\n        Text(formattedTitle)\n        Card(\n            modifier = Modifier.clickable\
    \ { isExpanded = !isExpanded }\n        ) {\n            Text(title)\n            AnimatedVisibility(visible = isExpanded)\
    \ {\n                Text(content)\n            }\n        }\n        OutlinedTextField(\n            value = userInput,\n\
    \            onValueChange = { userInput = it },\n            isError = !isValid,\n        )\n    }\n}\n"
  example_bad: "@Composable\nfun ExpandableCard(title: String, content: String) {\n    // No remember — resets to false on\
    \ EVERY recomposition\n    var isExpanded = mutableStateOf(false)\n    // User taps to expand → parent recomposes → isExpanded\
    \ resets → card collapses\n\n    // Regular variable — changes don't trigger recomposition\n    var count = 0 // mutating\
    \ this does NOTHING to the UI\n\n    // Expensive computation without remember — runs every recomposition\n    val formatted\
    \ = title.uppercase().take(20) // recomputes unnecessarily\n\n    Column {\n        Text(formatted)\n        Card(\n \
    \           modifier = Modifier.clickable { isExpanded.value = !isExpanded.value }\n        ) {\n            Text(title)\n\
    \            if (isExpanded.value) { // might work briefly, then resets\n                Text(content)\n            }\n\
    \        }\n        Text(\"Count: $count\") // always shows 0\n        Button(onClick = { count++ }) { // increments but\
    \ UI doesn't update\n            Text(\"Increment\")\n        }\n    }\n}\n"
  when_applies: Any project using Kotlin/Android development, Jetpack Compose, or Android
  when_not_applies: web-only applications, backend services, desktop applications
  sources: ["https://developer.android.com/topic/architecture#ui-layer"]
- id: CR-KT-003
  text: Use CompositionLocal for dependency injection of cross-cutting concerns — never for frequently changing state
  why: 'CompositionLocal provides implicit data propagation through the composition tree, similar to React Context or SwiftUI
    Environment. Compose uses it internally for Theme, LocalContext, LocalLifecycleOwner. It''s ideal for cross-cutting concerns
    that change rarely (theme, locale, analytics tracker, navigation controller). However, when a CompositionLocal value changes,
    ALL composables reading it recompose — even if they only use an unchanged subset. For frequently changing state (scroll
    position, form data, real-time counters), this causes cascading recompositions across the entire tree.

    '
  how_to_do_right: '1. CompositionLocal for: theme, analytics, navigation, feature flags, DI containers

    2. staticCompositionLocalOf for values that NEVER change after initial set

    3. compositionLocalOf for values that may change (with proper equals check)

    4. Always provide a sensible default or error message

    5. Scope provides narrowly — don''t wrap the entire app if only one screen needs it

    6. For frequently changing state: use State hoisting, ViewModel, or remember

    '
  severity: high
  technologies:
    lang: [kotlin]
    framework: [jetpack_compose]
    platform: [mobile, android]
  domains:
    domain: [architecture, mobile]
    concern: [state_management]
  example_good: "// Static: analytics tracker never changes after init\nval LocalAnalytics = staticCompositionLocalOf<AnalyticsTracker>\
    \ {\n    error(\"No AnalyticsTracker provided\")\n}\n\n// Dynamic: theme can change (light/dark toggle)\nval LocalAppTheme\
    \ = compositionLocalOf<AppTheme> { AppTheme.Light }\n\n// Provide at app root\n@Composable\nfun AppRoot() {\n    val theme\
    \ by themeViewModel.theme.collectAsStateWithLifecycle()\n    CompositionLocalProvider(\n        LocalAnalytics provides\
    \ analyticsTracker,\n        LocalAppTheme provides theme,\n    ) {\n        AppNavigation()\n    }\n}\n\n// Consume deep\
    \ in the tree — no prop drilling\n@Composable\nfun ProductCard(product: Product) {\n    val analytics = LocalAnalytics.current\
    \ // O(1) lookup\n    val theme = LocalAppTheme.current\n\n    Card(\n        colors = CardDefaults.cardColors(\n    \
    \        containerColor = theme.cardBackground\n        )\n    ) {\n        Text(product.name)\n        Button(onClick\
    \ = {\n            analytics.trackEvent(\"product_view\", mapOf(\"id\" to product.id))\n        }) {\n            Text(\"\
    View Details\")\n        }\n    }\n}\n"
  example_bad: "// CompositionLocal for frequently changing state — mass recomposition\nval LocalScrollOffset = compositionLocalOf\
    \ { 0f }\n\n@Composable\nfun ScrollingContent() {\n    var offset by remember { mutableStateOf(0f) }\n\n    CompositionLocalProvider(LocalScrollOffset\
    \ provides offset) {\n        // EVERY child recomposes on EVERY scroll pixel change\n        Header()   // recomposes\
    \ (reads LocalScrollOffset? doesn't matter, still recomposes)\n        Body()     // recomposes\n        Footer()   //\
    \ recomposes\n    }\n}\n\n// Prop drilling 5 levels deep — CompositionLocal would be better here\n@Composable\nfun App(tracker:\
    \ AnalyticsTracker) {\n    Home(tracker = tracker) // level 1 — just passing through\n}\n@Composable\nfun Home(tracker:\
    \ AnalyticsTracker) {\n    Feed(tracker = tracker) // level 2\n}\n@Composable\nfun Feed(tracker: AnalyticsTracker) {\n\
    \    PostList(tracker = tracker) // level 3\n}\n// ... tracker finally used at level 5\n"
  when_applies: Projects using Kotlin/Android development, Jetpack Compose, or Android
  when_not_applies: web-only applications, backend services, desktop applications
  sources: ["https://developer.android.com/develop/ui/compose/performance"]
- id: CR-KT-004
  text: Use MVVM with ViewModel + StateFlow + Compose, following unidirectional data flow (UDF) — events go up, state flows
    down
  why: 'Android''s ViewModel survives configuration changes (rotation, theme change, locale change) that destroy and recreate
    Activities/Fragments. StateFlow provides hot, lifecycle-aware state that Compose observes efficiently via collectAsStateWithLifecycle().
    Unidirectional data flow prevents the spaghetti state bugs of bidirectional binding: UI sends events to ViewModel, ViewModel
    updates StateFlow, Compose observes the flow and renders. Without UDF, state updates become unpredictable — two-way binding
    causes circular updates where a UI change triggers a ViewModel update which triggers a UI change.

    '
  how_to_do_right: '1. ViewModel exposes StateFlow<UiState> (sealed class/interface)

    2. ViewModel exposes event handler functions (not MutableStateFlow)

    3. Compose collects state with collectAsStateWithLifecycle() (lifecycle-aware)

    4. UI events flow UP via lambda callbacks to ViewModel

    5. State flows DOWN via StateFlow to Compose

    6. Use Hilt for ViewModel injection (@HiltViewModel + hiltViewModel())

    '
  severity: critical
  technologies:
    lang: [kotlin]
    framework: [jetpack_compose]
    platform: [mobile, android]
  domains:
    domain: [architecture, mobile]
  example_good: "// UiState — sealed interface for exhaustive when\nsealed interface ProfileUiState {\n    data object Loading\
    \ : ProfileUiState\n    data class Success(val user: User) : ProfileUiState\n    data class Error(val message: String)\
    \ : ProfileUiState\n}\n\n// ViewModel — exposes state, handles events\n@HiltViewModel\nclass ProfileViewModel @Inject\
    \ constructor(\n    private val userRepo: UserRepository,\n    savedStateHandle: SavedStateHandle, // survives process\
    \ death\n) : ViewModel() {\n\n    private val userId: String = savedStateHandle[\"userId\"]!!\n\n    private val _uiState\
    \ = MutableStateFlow<ProfileUiState>(ProfileUiState.Loading)\n    val uiState: StateFlow<ProfileUiState> = _uiState.asStateFlow()\n\
    \n    init { loadUser() }\n\n    fun loadUser() {\n        viewModelScope.launch {\n            _uiState.value = ProfileUiState.Loading\n\
    \            userRepo.getUser(userId)\n                .onSuccess { user ->\n                    _uiState.value = ProfileUiState.Success(user)\n\
    \                }\n                .onFailure { error ->\n                    _uiState.value = ProfileUiState.Error(error.message\
    \ ?: \"Unknown\")\n                }\n        }\n    }\n\n    fun updateName(name: String) {\n        viewModelScope.launch\
    \ {\n            userRepo.updateName(userId, name)\n                .onSuccess { updatedUser ->\n                    _uiState.value\
    \ = ProfileUiState.Success(updatedUser)\n                }\n        }\n    }\n}\n\n// Screen — state flows DOWN, events\
    \ flow UP\n@Composable\nfun ProfileScreen(\n    viewModel: ProfileViewModel = hiltViewModel()\n) {\n    val uiState by\
    \ viewModel.uiState.collectAsStateWithLifecycle()\n\n    when (val state = uiState) {\n        is ProfileUiState.Loading\
    \ -> LoadingIndicator()\n        is ProfileUiState.Success -> ProfileContent(\n            user = state.user,\n      \
    \      onUpdateName = viewModel::updateName, // event UP\n            onRetry = viewModel::loadUser,\n        )\n    \
    \    is ProfileUiState.Error -> ErrorContent(\n            message = state.message,\n            onRetry = viewModel::loadUser,\n\
    \        )\n    }\n}\n"
  example_bad: "// Bidirectional state — circular updates\nclass ProfileViewModel : ViewModel() {\n    val name = MutableStateFlow(\"\
    \") // exposed as mutable — anyone can write\n\n    fun onNameChanged(name: String) {\n        this.name.value = name\
    \ // ViewModel writes\n        // Compose also writes via two-way binding → infinite loop risk\n    }\n}\n\n@Composable\n\
    fun ProfileScreen(viewModel: ProfileViewModel) {\n    // MutableStateFlow exposed directly — breaks UDF\n    val name\
    \ by viewModel.name.collectAsState()\n    TextField(\n        value = name,\n        onValueChange = { viewModel.name.value\
    \ = it } // bypasses ViewModel logic\n    )\n}\n\n// No sealed state — runtime crashes on unhandled cases\nclass ProfileViewModel\
    \ : ViewModel() {\n    var user: User? = null  // nullable, no loading/error states\n    var isLoading = false   // separate\
    \ booleans = impossible states\n    var error: String? = null // isLoading=true AND error!=null ???\n}\n"
  when_applies: Any project using Kotlin/Android development, Jetpack Compose, or Android
  when_not_applies: web-only applications, backend services, desktop applications
  sources: ["https://developer.android.com/develop/ui/compose/navigation"]
- id: CR-KT-005
  text: Use Hilt for dependency injection — constructor injection for ViewModels, field injection only for Android framework
    classes
  why: 'Android''s lifecycle creates objects that the developer doesn''t control (Activities, Fragments, Services). Manual
    dependency injection requires factories, static instances, or service locators that are untestable and leak-prone. Hilt
    (built on Dagger) provides compile-time verified DI with zero reflection overhead. @HiltViewModel enables automatic ViewModel
    injection. @Inject constructor for regular classes enables pure constructor injection. Without Hilt, teams either use
    manual DI (10x more boilerplate) or Koin (runtime errors, no compile-time safety). Hilt catches missing bindings at compile
    time, not when the user taps a button in production.

    '
  how_to_do_right: '1. @HiltAndroidApp on Application class

    2. @HiltViewModel + @Inject constructor for ViewModels

    3. @Inject constructor for repositories, services, use cases

    4. @Module + @Provides for third-party classes (Retrofit, Room, OkHttp)

    5. @Singleton for app-wide singletons, @ViewModelScoped for VM-scoped dependencies

    6. Use interface + @Binds for swappable implementations (testing)

    '
  severity: high
  technologies:
    lang: [kotlin]
    library: [hilt, dagger]
    platform: [mobile, android]
  domains:
    domain: [architecture, mobile]
  example_good: "// Application\n@HiltAndroidApp\nclass MyApplication : Application()\n\n// Repository interface — swappable\
    \ for tests\ninterface UserRepository {\n    suspend fun getUser(id: String): Result<User>\n    suspend fun updateUser(user:\
    \ User): Result<User>\n}\n\n// Implementation — constructor injection\nclass DefaultUserRepository @Inject constructor(\n\
    \    private val api: UserApi,\n    private val db: UserDao,\n) : UserRepository {\n    override suspend fun getUser(id:\
    \ String): Result<User> =\n        runCatching {\n            val cached = db.getUser(id)\n            if (cached != null\
    \ && !cached.isStale()) return@runCatching cached\n            val remote = api.getUser(id)\n            db.upsert(remote)\n\
    \            remote\n        }\n}\n\n// Module — provides third-party and binds interfaces\n@Module\n@InstallIn(SingletonComponent::class)\n\
    abstract class RepositoryModule {\n    @Binds\n    @Singleton\n    abstract fun bindUserRepository(impl: DefaultUserRepository):\
    \ UserRepository\n}\n\n@Module\n@InstallIn(SingletonComponent::class)\nobject NetworkModule {\n    @Provides\n    @Singleton\n\
    \    fun provideRetrofit(): Retrofit =\n        Retrofit.Builder()\n            .baseUrl(BuildConfig.API_URL)\n      \
    \      .addConverterFactory(MoshiConverterFactory.create())\n            .build()\n\n    @Provides\n    fun provideUserApi(retrofit:\
    \ Retrofit): UserApi =\n        retrofit.create(UserApi::class.java)\n}\n\n// ViewModel — Hilt injects repository automatically\n\
    @HiltViewModel\nclass UserProfileViewModel @Inject constructor(\n    private val userRepo: UserRepository,\n) : ViewModel()\
    \ { /* ... */ }\n\n// Test — swap implementation\n@HiltAndroidTest\nclass UserProfileTest {\n    @BindValue\n    val mockRepo:\
    \ UserRepository = FakeUserRepository()\n\n    @Test\n    fun showsUserName() { /* mockRepo injected automatically */\
    \ }\n}\n"
  example_bad: "// Manual DI — boilerplate, error-prone, untestable\nclass UserProfileViewModel(\n    private val userRepo:\
    \ UserRepository\n) : ViewModel() { /* ... */ }\n\n// Factory for every ViewModel — scales terribly\nclass UserProfileViewModelFactory(\n\
    \    private val userRepo: UserRepository\n) : ViewModelProvider.Factory {\n    override fun <T : ViewModel> create(modelClass:\
    \ Class<T>): T {\n        return UserProfileViewModel(userRepo) as T\n    }\n}\n\n// Service locator — runtime errors,\
    \ no compile-time safety\nobject ServiceLocator {\n    val userRepo: UserRepository by lazy {\n        DefaultUserRepository(api,\
    \ db)\n        // Where do api and db come from? More service locator...\n    }\n}\n\n// Koin — runtime error if module\
    \ not loaded\nval userRepo: UserRepository by inject() // crashes at RUNTIME if not registered\n"
  when_applies: Projects using Kotlin/Android development, Hilt, Dagger, or Android
  when_not_applies: web-only applications, backend services, desktop applications
  sources: ["https://developer.android.com/develop/ui/compose/layouts/adaptive"]
- id: CR-KT-006
  text: Use structured concurrency with viewModelScope/lifecycleScope — never create unscoped CoroutineScope or use GlobalScope
  why: 'Kotlin coroutines are lightweight but still consume resources (memory, CPU, network connections). An unscoped coroutine
    (GlobalScope.launch) runs until completion regardless of the component''s lifecycle — if a ViewModel is cleared while
    a network call is in flight, the coroutine continues, potentially updating a state that nobody observes (wasted work)
    or crashing when accessing a destroyed context. viewModelScope cancels all coroutines when the ViewModel is cleared. lifecycleScope
    cancels when the Activity/Fragment is destroyed. Structured concurrency guarantees that child coroutines don''t outlive
    their parent.

    '
  how_to_do_right: '1. viewModelScope.launch{} for ViewModel work — auto-cancelled on ViewModel.onCleared()

    2. lifecycleScope.launch{} for Activity/Fragment — auto-cancelled on DESTROYED

    3. repeatOnLifecycle(Lifecycle.State.STARTED) for flows — collect only when visible

    4. supervisorScope for parallel tasks where one failure shouldn''t cancel siblings

    5. withContext(Dispatchers.IO) for blocking IO inside a Main-dispatched scope

    6. Never create CoroutineScope() manually unless you manage its lifecycle explicitly

    '
  severity: critical
  technologies:
    lang: [kotlin]
    platform: [mobile, android]
  domains:
    domain: [architecture, mobile, performance]
    concern: [concurrency]
  example_good: "@HiltViewModel\nclass SearchViewModel @Inject constructor(\n    private val searchRepo: SearchRepository,\n\
    ) : ViewModel() {\n\n    private val _results = MutableStateFlow<List<Product>>(emptyList())\n    val results: StateFlow<List<Product>>\
    \ = _results.asStateFlow()\n\n    private var searchJob: Job? = null\n\n    fun onSearchQueryChanged(query: String) {\n\
    \        // Cancel previous search — only latest query matters\n        searchJob?.cancel()\n        searchJob = viewModelScope.launch\
    \ {\n            delay(300) // debounce\n            val results = withContext(Dispatchers.IO) {\n                searchRepo.search(query)\
    \ // blocking IO on IO dispatcher\n            }\n            _results.value = results // safe: viewModelScope uses Dispatchers.Main\n\
    \        }\n    }\n\n    // Parallel fetch with supervisorScope — one failure doesn't cancel all\n    fun loadDashboard()\
    \ {\n        viewModelScope.launch {\n            supervisorScope {\n                val revenue = async { dashboardRepo.getRevenue()\
    \ }\n                val users = async { dashboardRepo.getUsers() }\n                val orders = async { dashboardRepo.getOrders()\
    \ }\n\n                // Each can fail independently\n                _revenue.value = revenue.await().getOrNull()\n\
    \                _users.value = users.await().getOrNull()\n                _orders.value = orders.await().getOrNull()\n\
    \            }\n        }\n    }\n}\n\n// Compose: collect with lifecycle awareness\n@Composable\nfun SearchScreen(viewModel:\
    \ SearchViewModel = hiltViewModel()) {\n    val results by viewModel.results.collectAsStateWithLifecycle()\n    // Automatically\
    \ stops collecting when composable leaves composition\n}\n"
  example_bad: "class SearchViewModel : ViewModel() {\n    fun search(query: String) {\n        // GlobalScope — runs forever,\
    \ even after ViewModel cleared\n        GlobalScope.launch {\n            val results = searchRepo.search(query)\n   \
    \         _results.value = results // updating dead state — wasted work\n        }\n    }\n\n    // Unscoped coroutine\
    \ — no lifecycle management\n    val scope = CoroutineScope(Dispatchers.IO)\n    fun load() {\n        scope.launch {\n\
    \            // Who cancels this scope? Nobody. Memory leak.\n            val data = api.fetch()\n        }\n    }\n}\n\
    \n// Blocking the main thread\nfun onButtonClick() {\n    val data = runBlocking { api.fetch() } // BLOCKS UI thread —\
    \ ANR\n}\n"
  when_applies: Any project using Kotlin/Android development or Android
  when_not_applies: web-only applications, backend services, desktop applications. projects not using Kotlin or Android
  sources: ["https://developer.android.com/develop/ui/compose/testing"]
- id: CR-KT-007
  text: Use Flow for reactive streams, StateFlow for hot state, and SharedFlow for events — understand the differences
  why: 'Kotlin provides three Flow types for different use cases. Flow (cold) only emits when collected — ideal for one-shot
    data fetches and transformations. StateFlow (hot) always has a current value and replays the latest to new collectors
    — ideal for UI state. SharedFlow (hot) doesn''t have a current value but supports replay and buffering — ideal for one-time
    events (navigation, snackbar, toast) that should not replay on configuration change. Using StateFlow for events causes
    bugs where a toast message re-shows on rotation. Using Flow for UI state causes bugs where the state is lost when the
    collector restarts.

    '
  how_to_do_right: '1. StateFlow for UI state: always has a value, replays latest to new collectors

    2. SharedFlow(replay=0) for one-time events: navigation, snackbar, error dialogs

    3. Cold Flow for data streams: database queries, network responses

    4. Use stateIn() to convert cold Flow to StateFlow with sharing

    5. Use shareIn() to convert cold Flow to SharedFlow with sharing

    6. collectAsStateWithLifecycle() in Compose — lifecycle-aware collection

    '
  severity: high
  technologies:
    lang: [kotlin]
    platform: [mobile, android]
  domains:
    domain: [architecture, mobile, performance]
    concern: [state_management, concurrency]
  example_good: "@HiltViewModel\nclass OrderViewModel @Inject constructor(\n    private val orderRepo: OrderRepository,\n\
    ) : ViewModel() {\n\n    // StateFlow for UI state — always has value, replays on config change\n    val orders: StateFlow<List<Order>>\
    \ = orderRepo.observeOrders()\n        .stateIn(\n            scope = viewModelScope,\n            started = SharingStarted.WhileSubscribed(5000),\
    \ // keep alive 5s\n            initialValue = emptyList(),\n        )\n\n    // SharedFlow for one-time events — NO replay\
    \ on config change\n    private val _events = MutableSharedFlow<UiEvent>()\n    val events: SharedFlow<UiEvent> = _events.asSharedFlow()\n\
    \n    sealed interface UiEvent {\n        data class ShowSnackbar(val message: String) : UiEvent\n        data class NavigateTo(val\
    \ route: String) : UiEvent\n    }\n\n    fun deleteOrder(orderId: String) {\n        viewModelScope.launch {\n       \
    \     orderRepo.delete(orderId)\n                .onSuccess {\n                    _events.emit(UiEvent.ShowSnackbar(\"\
    Order deleted\"))\n                }\n                .onFailure { error ->\n                    _events.emit(UiEvent.ShowSnackbar(\"\
    Failed: ${error.message}\"))\n                }\n        }\n    }\n}\n\n// Collecting events in Compose\n@Composable\n\
    fun OrderScreen(viewModel: OrderViewModel = hiltViewModel()) {\n    val orders by viewModel.orders.collectAsStateWithLifecycle()\n\
    \    val snackbarHostState = remember { SnackbarHostState() }\n\n    // Collect one-time events\n    LaunchedEffect(Unit)\
    \ {\n        viewModel.events.collect { event ->\n            when (event) {\n                is UiEvent.ShowSnackbar\
    \ ->\n                    snackbarHostState.showSnackbar(event.message)\n                is UiEvent.NavigateTo ->\n  \
    \                  navController.navigate(event.route)\n            }\n        }\n    }\n\n    Scaffold(snackbarHost =\
