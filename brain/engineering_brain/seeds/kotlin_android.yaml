- id: CR-KT-009
  text: Use SavedStateHandle in ViewModel for surviving process death — ViewModel alone only survives configuration changes
  why: 'ViewModel survives configuration changes (rotation, theme change) but NOT process death. Android kills background
    apps when memory is low. When the user returns, the Activity is recreated but the ViewModel is gone — all in-memory state
    is lost. SavedStateHandle persists data to the saved instance state bundle, surviving process death. Without SavedStateHandle,
    users lose form inputs, scroll positions, and selection state after switching to another app and back. This bug is intermittent
    (only triggers under memory pressure) making it invisible in testing but common in production.

    '
  how_to_do_right: '1. Use SavedStateHandle for: navigation args, user input, UI selections

    2. Access via SavedStateHandle.get<T>(key) and .set(key, value)

    3. Use getStateFlow() for reactive observation with Compose

    4. Only save small, serializable data (not bitmaps, not API responses)

    5. For large data: save the ID to SavedStateHandle, reload from cache/network

    6. Test with "Don''t keep activities" developer option enabled

    '
  severity: high
  technologies:
    lang: [kotlin]
    platform: [mobile, android]
  domains:
    domain: [architecture, mobile]
    concern: [lifecycle]
  example_good: "@HiltViewModel\nclass SearchViewModel @Inject constructor(\n    private val savedStateHandle: SavedStateHandle,\
    \ // survives process death\n    private val searchRepo: SearchRepository,\n) : ViewModel() {\n\n    // Saved query —\
    \ survives both config change AND process death\n    val searchQuery = savedStateHandle.getStateFlow(\"search_query\"\
    , \"\")\n\n    // Results from network — reload after process death using saved query\n    val results: StateFlow<List<Product>>\
    \ = searchQuery\n        .debounce(300)\n        .flatMapLatest { query ->\n            if (query.isBlank()) flowOf(emptyList())\n\
    \            else flow { emit(searchRepo.search(query)) }\n        }\n        .stateIn(viewModelScope, SharingStarted.Lazily,\
    \ emptyList())\n\n    fun onQueryChanged(query: String) {\n        savedStateHandle[\"search_query\"] = query // persisted\n\
    \    }\n\n    // Selected filters — survives process death\n    val selectedCategory: StateFlow<String?> =\n        savedStateHandle.getStateFlow(\"\
    category\", null)\n\n    fun onCategorySelected(category: String) {\n        savedStateHandle[\"category\"] = category\n\
    \    }\n}\n"
  example_bad: "class SearchViewModel : ViewModel() {\n    // Only survives config change — LOST on process death\n    private\
    \ val _query = MutableStateFlow(\"\")\n    val query = _query.asStateFlow()\n\n    fun onQueryChanged(query: String) {\n\
    \        _query.value = query // lost when Android kills the process\n    }\n    // User types \"shoes\" → switches to\
    \ camera → Android kills app\n    // User returns → search field is empty → frustration\n}\n"
  when_applies: Projects using Kotlin/Android development or Android
  when_not_applies: web-only applications, backend services, desktop applications. projects not using Kotlin or Android
  sources: ["https://kotlinlang.org/docs/coroutines-basics.html"]
- id: CR-KT-010
  text: Use Navigation Component with type-safe routes for single-activity architecture with Compose
  why: 'Multi-activity architecture creates heavy overhead: each Activity has its own window, lifecycle, and back stack, making
    shared state management complex and transitions slow. Navigation Component provides a single-activity architecture where
    Composable screens are swapped within one Activity, sharing ViewModel scopes, back stack, and deep link handling. Type-safe
    routes (Navigation Compose 2.8+) use Kotlin serialization for compile-time verified route arguments, eliminating the runtime
    crashes from string-based route parsing.

    '
  how_to_do_right: '1. Single Activity with NavHost as the root composable

    2. Define routes as @Serializable data classes/objects (Navigation 2.8+)

    3. Use NavBackStackEntry.toRoute<T>() for type-safe argument access

    4. Handle deep links with navDeepLink in route definition

    5. Use nested NavGraphs for feature isolation

    6. Pass ViewModel scope to NavGraph for shared state within a flow

    '
  severity: high
  technologies:
    lang: [kotlin]
    framework: [jetpack_compose]
    library: [navigation]
    platform: [mobile, android]
  domains:
    domain: [architecture, mobile]
    concern: [frontend, navigation]
  example_good: "// Type-safe routes with Kotlin serialization\n@Serializable\ndata object Home\n\n@Serializable\ndata class\
    \ Profile(val userId: String)\n\n@Serializable\ndata class Product(val productId: String, val source: String = \"browse\"\
    )\n\n// NavHost with type-safe routes\n@Composable\nfun AppNavigation() {\n    val navController = rememberNavController()\n\
    \n    NavHost(navController = navController, startDestination = Home) {\n        composable<Home> {\n            HomeScreen(\n\
    \                onNavigateToProfile = { userId ->\n                    navController.navigate(Profile(userId))\n    \
    \            },\n                onNavigateToProduct = { productId ->\n                    navController.navigate(Product(productId))\n\
    \                },\n            )\n        }\n\n        composable<Profile>(\n            deepLinks = listOf(navDeepLink\
    \ { uriPattern = \"myapp://user/{userId}\" })\n        ) { backStackEntry ->\n            val profile: Profile = backStackEntry.toRoute()\n\
    \            ProfileScreen(userId = profile.userId)\n        }\n\n        composable<Product> { backStackEntry ->\n  \
    \          val product: Product = backStackEntry.toRoute()\n            ProductScreen(\n                productId = product.productId,\n\
    \                source = product.source,\n            )\n        }\n    }\n}\n"
  example_bad: "// String-based routes — typos crash at runtime\nNavHost(navController, startDestination = \"home\") {\n \
    \   composable(\"home\") { HomeScreen() }\n    composable(\"profile/{userId}\") { backStackEntry ->\n        val userId\
    \ = backStackEntry.arguments?.getString(\"userId\")\n        // userId is nullable — can crash if route called wrong\n\
    \        ProfileScreen(userId = userId!!) // force unwrap — crash\n    }\n}\n\n// Navigation with typo — discovered at\
    \ runtime\nnavController.navigate(\"proflie/123\") // typo: \"proflie\" — no compile error\n// Runtime: \"No destination\
    \ found for route proflie/123\"\n"
  when_applies: Projects using Kotlin/Android development, Jetpack Compose, Navigation, or Android
  when_not_applies: web-only applications, backend services, desktop applications
  sources: ["https://developer.android.com/topic/libraries/architecture/room"]
- id: CR-KT-011
  text: Generate Baseline Profiles for 30-40% faster startup and smoother interactions on first launch
  why: 'Android compiles bytecode to machine code using ART. On first install, the app runs interpreted bytecode (slow) until
    the JIT compiler optimizes hot paths. Baseline Profiles provide a list of critical code paths that ART pre-compiles at
    install time, giving first-launch performance equivalent to a warmed-up app. Google reports 30-40% faster startup for
    apps with Baseline Profiles. Without them, the first 5-10 app launches are measurably slower than subsequent launches,
    directly impacting user retention metrics for new installs.

    '
  how_to_do_right: '1. Add androidx.benchmark:benchmark-macro-junit4 to test dependencies

    2. Create BaselineProfileGenerator test that exercises critical user flows

    3. Run on a real device or emulator with userdebug build

    4. Generated profile goes into src/main/baseline-prof.txt

    5. Include startup path + primary user journey (feed scroll, search, etc.)

    6. Regenerate after major code changes (new libraries, restructured navigation)

    '
  severity: high
  technologies:
    lang: [kotlin]
    platform: [mobile, android]
  domains:
    domain: [architecture, mobile, performance]
  example_good: "// benchmark/src/main/java/BaselineProfileGenerator.kt\n@RunWith(AndroidJUnit4::class)\nclass BaselineProfileGenerator\
    \ {\n\n    @get:Rule\n    val rule = BaselineProfileRule()\n\n    @Test\n    fun generateBaselineProfile() {\n       \
    \ rule.collect(\n            packageName = \"com.myapp\",\n            includeInStartupProfile = true,\n        ) {\n\
    \            // Cold start — most critical path\n            pressHome()\n            startActivityAndWait()\n\n     \
    \       // Primary user journey — scrolling feed\n            device.findObject(By.res(\"feed_list\")).apply {\n     \
    \           repeat(3) {\n                    fling(Direction.DOWN)\n                    wait(Until.scrollFinished(Direction.DOWN),\
    \ 2000)\n                }\n            }\n\n            // Search flow\n            device.findObject(By.res(\"search_button\"\
    )).click()\n            device.findObject(By.res(\"search_input\")).text = \"shoes\"\n            device.waitForIdle()\n\
    \n            // Product detail\n            device.findObject(By.res(\"product_card\")).click()\n            device.waitForIdle()\n\
    \        }\n    }\n}\n\n// app/build.gradle.kts\nandroid {\n    buildTypes {\n        release {\n            // Baseline\
    \ profiles bundled in release\n        }\n    }\n}\n\ndependencies {\n    // Automatically includes generated profile\n\
    \    implementation(\"androidx.profileinstaller:profileinstaller:1.3.1\")\n}\n"
  example_bad: "// No Baseline Profile — first 5-10 launches are 30-40% slower\n// Users install, experience slow startup,\
    \ uninstall within 24 hours\n\n// Profile that only covers startup — misses scrolling jank\nrule.collect(packageName =\
    \ \"com.myapp\") {\n    startActivityAndWait()\n    // Done — only startup optimized, feed scrolling still janky on first\
    \ use\n}\n"
  when_applies: Projects using Kotlin/Android development or Android
  when_not_applies: web-only applications, backend services, desktop applications. projects not using Kotlin or Android
