- id: CR-KT-008
  text: Use Room for structured on-device persistence with proper migrations — use DataStore for key-value preferences
  why: 'Room provides compile-time SQL verification, coroutine/Flow support, automatic DAO generation, and migration management.
    Without Room, teams use raw SQLite which has no compile-time safety (SQL typos crash at runtime), no coroutine support
    (blocking calls on main thread), and manual cursor management (memory leaks from unclosed cursors). SharedPreferences
    (replaced by DataStore) blocks the UI thread on commit(), has no type safety, and corrupts data on concurrent writes from
    multiple processes. DataStore uses protocol buffers or preferences with coroutine-safe async API.

    '
  how_to_do_right: '1. Room for structured data: entities with relationships, queries, indexes

    2. Define @Entity with proper indexes for query-heavy columns

    3. Define @Dao with suspend functions for async access

    4. Migration.migrate() for EVERY schema change — never fallbackToDestructiveMigration in prod

    5. DataStore for preferences: typed key-value pairs with coroutine API

    6. Test migrations with MigrationTestHelper

    '
  severity: high
  technologies:
    lang: [kotlin]
    library: [room, datastore]
    platform: [mobile, android]
  domains:
    domain: [architecture, mobile]
    concern: [data, persistence]
  example_good: "// Entity with proper indexes\n@Entity(\n    tableName = \"orders\",\n    indices = [\n        Index(value\
    \ = [\"user_id\"]),\n        Index(value = [\"status\", \"created_at\"]),\n    ]\n)\ndata class OrderEntity(\n    @PrimaryKey\
    \ val id: String,\n    @ColumnInfo(name = \"user_id\") val userId: String,\n    val status: OrderStatus,\n    @ColumnInfo(name\
    \ = \"created_at\") val createdAt: Long,\n    val totalCents: Int,\n)\n\n// DAO with Flow for reactive queries\n@Dao\n\
    interface OrderDao {\n    @Query(\"SELECT * FROM orders WHERE user_id = :userId ORDER BY created_at DESC\")\n    fun observeByUser(userId:\
    \ String): Flow<List<OrderEntity>>\n\n    @Insert(onConflict = OnConflictStrategy.REPLACE)\n    suspend fun upsert(orders:\
    \ List<OrderEntity>)\n\n    @Query(\"DELETE FROM orders WHERE id = :orderId\")\n    suspend fun delete(orderId: String)\n\
    }\n\n// Database with migration\n@Database(entities = [OrderEntity::class], version = 2)\nabstract class AppDatabase :\
    \ RoomDatabase() {\n    abstract fun orderDao(): OrderDao\n}\n\nval MIGRATION_1_2 = object : Migration(1, 2) {\n    override\
    \ fun migrate(db: SupportSQLiteDatabase) {\n        db.execSQL(\"ALTER TABLE orders ADD COLUMN total_cents INTEGER NOT\
    \ NULL DEFAULT 0\")\n    }\n}\n\n// DataStore for preferences (not SharedPreferences)\nval Context.settingsDataStore by\
    \ preferencesDataStore(name = \"settings\")\n\nobject PreferenceKeys {\n    val DARK_MODE = booleanPreferencesKey(\"dark_mode\"\
    )\n    val LANGUAGE = stringPreferencesKey(\"language\")\n}\n\nclass SettingsRepository @Inject constructor(\n    @ApplicationContext\
    \ private val context: Context,\n) {\n    val darkMode: Flow<Boolean> = context.settingsDataStore.data\n        .map {\
    \ it[PreferenceKeys.DARK_MODE] ?: false }\n\n    suspend fun setDarkMode(enabled: Boolean) {\n        context.settingsDataStore.edit\
    \ { it[PreferenceKeys.DARK_MODE] = enabled }\n    }\n}\n"
  example_bad: "// SharedPreferences — blocks UI thread, no type safety\nval prefs = context.getSharedPreferences(\"settings\"\
    , Context.MODE_PRIVATE)\nprefs.edit().putString(\"user\", gson.toJson(user)).commit() // blocks main thread!\n// Concurrent\
    \ writes from multiple threads corrupt the file\n\n// Raw SQLite — no compile-time safety, manual cursor management\n\
    val cursor = db.rawQuery(\"SELCT * FROM orders WHERE user_id = ?\", arrayOf(userId))\n// SQL typo \"SELCT\" only discovered\
    \ at runtime\n// If cursor not closed: memory leak + database lock\n\n// Room with destructive migration in production\
    \ — data loss\nRoom.databaseBuilder(context, AppDatabase::class.java, \"app.db\")\n    .fallbackToDestructiveMigration()\
    \ // DELETES ALL USER DATA on schema change\n    .build()\n"
