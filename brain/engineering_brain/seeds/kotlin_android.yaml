- id: CR-KT-012
  text: Annotate stable classes with @Stable or @Immutable to enable Compose smart recomposition skipping
  why: 'Compose''s compiler plugin determines whether a composable can skip recomposition based on parameter stability. If
    all parameters are "stable" (primitives, String, data classes with stable fields, or @Immutable/@Stable annotated), Compose
    can skip the composable when inputs haven''t changed. Without stability annotations on custom classes, Compose assumes
    they''re unstable and ALWAYS recomposes the composable, even when inputs are identical. In a list of 100 items, this means
    100 unnecessary recompositions on every frame during scroll, causing visible jank.

    '
  how_to_do_right: '1. @Immutable for data classes where ALL properties are val and immutable types

    2. @Stable for classes with mutable state that correctly implements equals()

    3. Use Compose compiler metrics to verify: -P plugin:...reportsDestination=...

    4. Data classes with only primitives/String are automatically stable

    5. List<T> is unstable — use kotlinx.collections.immutable.ImmutableList

    6. Check stability report regularly — new fields can break stability

    '
  severity: high
  technologies:
    lang: [kotlin]
    framework: [jetpack_compose]
    platform: [mobile, android]
  domains:
    domain: [architecture, mobile, performance]
  example_good: "import androidx.compose.runtime.Immutable\nimport androidx.compose.runtime.Stable\nimport kotlinx.collections.immutable.ImmutableList\n\
    \n// @Immutable: all fields are val, all types are stable\n@Immutable\ndata class ProductUiModel(\n    val id: String,\n\
    \    val name: String,\n    val priceCents: Int,\n    val imageUrl: String,\n    val tags: ImmutableList<String>, // ImmutableList,\
    \ not List\n)\n\n// @Stable: mutable but has correct equals/hashCode\n@Stable\nclass CartState(\n    items: ImmutableList<CartItem>\
    \ = persistentListOf(),\n) {\n    var items by mutableStateOf(items)\n}\n\n// Composable can now SKIP recomposition when\
    \ product hasn't changed\n@Composable\nfun ProductCard(product: ProductUiModel) {\n    // Compose checks: same product\
    \ reference or equals() true → skip\n    Card {\n        AsyncImage(model = product.imageUrl, contentDescription = product.name)\n\
    \        Text(product.name)\n        Text(formatPrice(product.priceCents))\n    }\n}\n\n// Verify with compiler metrics\n\
    // ./gradlew assembleRelease -P plugin:androidx.compose.compiler.plugins.kotlin:reportsDestination=build/compose_metrics\n"
  example_bad: "// Unstable: List<String> is mutable → Compose always recomposes\ndata class ProductUiModel(\n    val id:\
    \ String,\n    val name: String,\n    val tags: List<String>, // List is unstable — Compose can't trust it\n)\n\n// Compose\
    \ ALWAYS recomposes this — even when product hasn't changed\n@Composable\nfun ProductCard(product: ProductUiModel) {\n\
    \    // Recomposes on every parent recomposition because product is \"unstable\"\n    Card {\n        Text(product.name)\
    \ // 100 cards in a list = 100 wasted recompositions\n    }\n}\n\n// Interface parameter — always unstable\n@Composable\n\
    fun UserCard(user: UserInterface) {\n    // Interfaces are always unstable — Compose can't verify immutability\n    Text(user.name)\n\
    }\n"
  when_applies: Projects using Kotlin/Android development, Jetpack Compose, or Android
  when_not_applies: web-only applications, backend services, desktop applications
  sources: ["https://developer.android.com/develop/ui/compose/designsystems/material3"]
- id: CR-KT-013
  text: Use WorkManager for guaranteed background work that must survive process death — never use foreground services for
    deferrable work
  why: 'Android aggressively kills background processes and restricts background execution (Doze mode, App Standby, background
    execution limits). WorkManager is the only API that guarantees work completion across process death, device reboot, and
    Doze mode. It uses JobScheduler, AlarmManager, or BroadcastReceiver internally based on API level. Using a foreground
    service for deferrable work (sync, upload, cleanup) violates Google Play policy (Android 14+), drains battery, and shows
    a persistent notification that annoys users. WorkManager handles constraints (network, charging, idle) automatically.

    '
  how_to_do_right: '1. WorkManager for: sync, upload, periodic cleanup, background processing

    2. Define Worker/CoroutineWorker with clear input/output Data

    3. Set constraints: requiresNetworkType, requiresBatteryNotLow

    4. Use ExistingPeriodicWorkPolicy.KEEP to prevent duplicate periodic work

    5. Chain work with .then() for sequential dependencies

    6. Observe work status with workManager.getWorkInfoByIdLiveData()

    '
  severity: high
  technologies:
    lang: [kotlin]
    library: [workmanager]
    platform: [mobile, android]
  domains:
    domain: [architecture, mobile]
    concern: [lifecycle, background]
  example_good: "// Worker with constraints\nclass SyncWorker @AssistedInject constructor(\n    @Assisted context: Context,\n\
    \    @Assisted params: WorkerParameters,\n    private val syncRepo: SyncRepository,\n) : CoroutineWorker(context, params)\
    \ {\n\n    override suspend fun doWork(): Result {\n        return try {\n            val count = syncRepo.syncPendingChanges()\n\
    \            val output = workDataOf(\"synced_count\" to count)\n            Result.success(output)\n        } catch (e:\
    \ Exception) {\n            if (runAttemptCount < 3) {\n                Result.retry() // exponential backoff\n      \
    \      } else {\n                Result.failure(workDataOf(\"error\" to e.message))\n            }\n        }\n    }\n\
    }\n\n// Schedule periodic sync\nfun schedulePeriodicSync(workManager: WorkManager) {\n    val constraints = Constraints.Builder()\n\
    \        .setRequiredNetworkType(NetworkType.CONNECTED)\n        .setRequiresBatteryNotLow(true)\n        .build()\n\n\
    \    val syncRequest = PeriodicWorkRequestBuilder<SyncWorker>(\n        repeatInterval = 1, repeatIntervalTimeUnit = TimeUnit.HOURS,\n\
    \    )\n        .setConstraints(constraints)\n        .setBackoffCriteria(BackoffPolicy.EXPONENTIAL, 30, TimeUnit.SECONDS)\n\
    \        .build()\n\n    workManager.enqueueUniquePeriodicWork(\n        \"periodic_sync\",\n        ExistingPeriodicWorkPolicy.KEEP,\
    \ // don't duplicate\n        syncRequest,\n    )\n}\n\n// Chain work: compress → upload → notify\nworkManager\n    .beginWith(compressWork)\n\
    \    .then(uploadWork)\n    .then(notifyWork)\n    .enqueue()\n"
  example_bad: "// Foreground service for deferrable work — policy violation on Android 14+\nclass SyncService : Service()\
    \ {\n    override fun onStartCommand(intent: Intent?, flags: Int, startId: Int): Int {\n        // Shows persistent notification\
    \ — annoys user\n        startForeground(1, notification)\n        // Runs indefinitely — drains battery\n        CoroutineScope(Dispatchers.IO).launch\
    \ {\n            syncRepo.sync() // what if process killed mid-sync? Data lost.\n        }\n        return START_STICKY\
    \ // restarts on kill — more battery drain\n    }\n}\n\n// AlarmManager for periodic work — doesn't respect Doze\nval\
    \ alarm = context.getSystemService(AlarmManager::class.java)\nalarm.setRepeating(\n    AlarmManager.RTC_WAKEUP,\n    System.currentTimeMillis(),\n\
    \    AlarmManager.INTERVAL_HOUR,\n    pendingIntent, // Doze defers this — sync doesn't happen\n)\n"
  when_applies: Projects using Kotlin/Android development, WorkManager, or Android
  when_not_applies: web-only applications, backend services, desktop applications
  sources: ["https://developer.android.com/topic/security/best-practices"]
- id: CR-KT-014
  text: Use LeakCanary for automatic memory leak detection during development and StrictMode for main thread violations
  why: 'Memory leaks in Android cause OutOfMemoryError crashes that are the #2 crash type on Google Play (after NullPointerException).
    Common leaks: Activity referenced from a static field, Fragment retained by a ViewModel, Bitmap not recycled. These leaks
    are invisible during normal testing — the app works fine until memory pressure builds up after extended use. LeakCanary
    detects leaks in real-time during debug builds and shows the exact retain path. StrictMode detects main thread disk/network
    access that causes ANRs (Application Not Responding), which Google Play penalizes in ranking.

    '
  how_to_do_right: '1. Add LeakCanary as debugImplementation (auto-install, zero config)

    2. Fix every leak LeakCanary reports — no exceptions for "minor" leaks

    3. Enable StrictMode in Application.onCreate() for debug builds only

    4. StrictMode.ThreadPolicy: detect disk reads/writes and network on main thread

    5. StrictMode.VmPolicy: detect leaked Activities, leaked SQLite cursors

    6. Set penalty to penaltyLog() + penaltyFlashScreen() in debug, not crash

    '
  severity: high
  technologies:
    lang: [kotlin]
    library: [leakcanary]
    platform: [mobile, android]
  domains:
    domain: [architecture, mobile, performance, quality]
    concern: [debugging]
  example_good: "// build.gradle.kts — LeakCanary auto-installs in debug\ndependencies {\n    debugImplementation(\"com.squareup.leakcanary:leakcanary-android:2.14\"\
    )\n    // No config needed — LeakCanary hooks into Activity lifecycle automatically\n}\n\n// Application — StrictMode\
    \ for debug builds\n@HiltAndroidApp\nclass MyApplication : Application() {\n    override fun onCreate() {\n        super.onCreate()\n\
    \n        if (BuildConfig.DEBUG) {\n            StrictMode.setThreadPolicy(\n                StrictMode.ThreadPolicy.Builder()\n\
    \                    .detectDiskReads()       // SharedPreferences.get on main thread\n                    .detectDiskWrites()\
    \      // File write on main thread\n                    .detectNetwork()         // Network call on main thread\n   \
    \                 .penaltyLog()            // log to Logcat\n                    .penaltyFlashScreen()    // red border\
    \ flash — impossible to miss\n                    .build()\n            )\n\n            StrictMode.setVmPolicy(\n   \
    \             StrictMode.VmPolicy.Builder()\n                    .detectLeakedClosableObjects() // unclosed cursors, streams\n\
    \                    .detectActivityLeaks()          // Activity retained after finish\n                    .detectLeakedSqlLiteObjects()\
    \   // unclosed database\n                    .penaltyLog()\n                    .build()\n            )\n        }\n\
    \    }\n}\n\n// Common leak fixed: static reference to Activity\nclass MyViewModel : ViewModel() {\n    // GOOD: no Activity\
    \ reference, uses Application context\n    private val appContext = application.applicationContext\n\n    // If context\
    \ needed temporarily, use WeakReference\n}\n"
  example_bad: "// No LeakCanary — leaks discovered only when users report OOM crashes\n\n// Static reference to Activity\
    \ — guaranteed leak\nobject Analytics {\n    lateinit var activity: Activity // LEAKED: held forever\n    fun init(activity:\
    \ Activity) {\n        this.activity = activity // Activity can NEVER be garbage collected\n    }\n}\n\n// Main thread\
    \ disk access — ANR\nfun loadSettings(): Settings {\n    // StrictMode would catch this, but it's not enabled\n    val\
    \ prefs = context.getSharedPreferences(\"settings\", MODE_PRIVATE)\n    return Settings(\n        darkMode = prefs.getBoolean(\"\
    dark\", false), // disk read on main thread\n    )\n}\n"
  when_applies: Projects using Kotlin/Android development, LeakCanary, or Android
  when_not_applies: web-only applications, backend services, desktop applications
  sources: ["https://developer.android.com/develop/ui/compose/performance#stability"]
- id: CR-KT-015
  text: Use EncryptedSharedPreferences for sensitive key-value data and R8/ProGuard for code obfuscation in release builds
  why: 'SharedPreferences stores data in plaintext XML files readable by root access, ADB backup, or any app on a rooted device.
    Auth tokens, API keys, and user credentials stored in regular SharedPreferences are trivially extractable. EncryptedSharedPreferences
    (from AndroidX Security) uses AES-256 GCM encryption backed by the Android Keystore hardware module. R8 (the default code
    shrinker) removes unused code and obfuscates class/method names, making reverse engineering harder. Without R8, anyone
    can decompile the APK and read your entire source code including hardcoded secrets and API endpoints.

    '
  how_to_do_right: '1. EncryptedSharedPreferences for tokens, keys, sensitive user data

    2. R8 enabled in release build: minifyEnabled true, shrinkResources true

    3. ProGuard rules for libraries that use reflection (Retrofit, Moshi, Room)

    4. Never hardcode API keys — use BuildConfig fields or local.properties

    5. Enable Android Keystore-backed encryption (default on API 23+)

    6. Test ProGuard build on CI — reflection-based crashes only show in minified builds

    '
  severity: critical
  technologies:
    lang: [kotlin]
    platform: [mobile, android]
  domains:
    domain: [architecture, mobile, security]
  example_good: "// EncryptedSharedPreferences for sensitive data\nimport androidx.security.crypto.EncryptedSharedPreferences\n\
    import androidx.security.crypto.MasterKey\n\nclass SecureStorage @Inject constructor(\n    @ApplicationContext private\
    \ val context: Context,\n) {\n    private val masterKey = MasterKey.Builder(context)\n        .setKeyScheme(MasterKey.KeyScheme.AES256_GCM)\n\
    \        .build()\n\n    private val prefs: SharedPreferences by lazy {\n        EncryptedSharedPreferences.create(\n\
    \            context,\n            \"secure_prefs\",\n            masterKey,\n            EncryptedSharedPreferences.PrefKeyEncryptionScheme.AES256_SIV,\n\
    \            EncryptedSharedPreferences.PrefValueEncryptionScheme.AES256_GCM,\n        )\n    }\n\n    fun saveToken(token:\
    \ String) {\n        prefs.edit().putString(\"auth_token\", token).apply()\n        // Stored encrypted — unreadable even\
    \ with root access\n    }\n\n    fun getToken(): String? = prefs.getString(\"auth_token\", null)\n\n    fun clearAll()\
    \ = prefs.edit().clear().apply()\n}\n\n// build.gradle.kts — R8 enabled for release\nandroid {\n    buildTypes {\n   \
    \     release {\n            isMinifyEnabled = true\n            isShrinkResources = true\n            proguardFiles(\n\
    \                getDefaultProguardFile(\"proguard-android-optimize.txt\"),\n                \"proguard-rules.pro\"\n\
    \            )\n        }\n    }\n\n    // API key from local.properties (not in source control)\n    buildFeatures {\
    \ buildConfig = true }\n    defaultConfig {\n        buildConfigField(\n            \"String\", \"API_KEY\",\n       \
    \     \"\\\"${project.findProperty(\"api.key\") ?: \"\"}\\\"\"\n        )\n    }\n}\n"
  example_bad: "// Plaintext SharedPreferences — readable with ADB\nval prefs = context.getSharedPreferences(\"auth\", MODE_PRIVATE)\n\
    prefs.edit().putString(\"token\", authToken).apply()\n// adb shell cat /data/data/com.app/shared_prefs/auth.xml → token\
    \ visible\n\n// Hardcoded API key — extracted with: apktool d app.apk\nconst val API_KEY = \"sk-live-abc123def456\"\n\
    // Anyone can decompile APK and read this\n\n// R8 disabled — entire source readable after decompile\nrelease {\n    isMinifyEnabled\
    \ = false // all class names, method names visible\n}\n"
  when_applies: Any project using Kotlin/Android development or Android
  when_not_applies: web-only applications, backend services, desktop applications. projects not using Kotlin or Android
  sources: ["https://developer.android.com/develop/ui/compose/accessibility"]
- id: CR-KT-016
  text: Use Paging 3 library for efficient infinite scroll with caching, error handling, and placeholder support
  why: 'Loading all items from a paginated API into memory causes OOM crashes on large datasets and wastes bandwidth loading
    pages the user never scrolls to. Manual pagination implementations typically have bugs around: loading indicators (shown
    too early/late), error retry (retrying wrong page), concurrent requests (duplicate pages from rapid scroll), and cache
    invalidation (stale first page after pull-to-refresh). Paging 3 solves all these with a tested, production-grade implementation
    used in Google''s own apps. It integrates with Room for offline caching, Compose for lazy rendering, and coroutines for
    async loading.

    '
  how_to_do_right: '1. PagingSource for network-only pagination

    2. RemoteMediator for network + local Room cache (offline support)

    3. collectAsLazyPagingItems() in Compose for lifecycle-aware collection

    4. Handle LoadState.Error for retry UI

    5. Use PagingConfig with appropriate pageSize (20-30 items typical)

    6. Placeholders for known total count (shows scroll bar at correct size)

    '
  severity: medium
  technologies:
    lang: [kotlin]
    framework: [jetpack_compose]
    library: [paging]
    platform: [mobile, android]
  domains:
    domain: [architecture, mobile, performance]
    concern: [data]
  example_good: "// PagingSource — network pagination\nclass ProductPagingSource @Inject constructor(\n    private val api:\
    \ ProductApi,\n    private val query: String,\n) : PagingSource<Int, Product>() {\n\n    override suspend fun load(params:\
    \ LoadParams<Int>): LoadResult<Int, Product> {\n        val page = params.key ?: 1\n        return try {\n           \
    \ val response = api.searchProducts(query, page, params.loadSize)\n            LoadResult.Page(\n                data\
    \ = response.products,\n                prevKey = if (page == 1) null else page - 1,\n                nextKey = if (response.products.isEmpty())\
    \ null else page + 1,\n            )\n        } catch (e: Exception) {\n            LoadResult.Error(e)\n        }\n \
    \   }\n\n    override fun getRefreshKey(state: PagingState<Int, Product>): Int? {\n        return state.anchorPosition?.let\
    \ { pos ->\n            state.closestPageToPosition(pos)?.prevKey?.plus(1)\n                ?: state.closestPageToPosition(pos)?.nextKey?.minus(1)\n\
    \        }\n    }\n}\n\n// ViewModel — exposes paging flow\n@HiltViewModel\nclass SearchViewModel @Inject constructor(\n\
    \    private val api: ProductApi,\n) : ViewModel() {\n    fun getProducts(query: String): Flow<PagingData<Product>> =\
    \ Pager(\n        config = PagingConfig(pageSize = 20, prefetchDistance = 5),\n        pagingSourceFactory = { ProductPagingSource(api,\
    \ query) },\n    ).flow.cachedIn(viewModelScope)\n}\n\n// Compose — lazy paging items with loading/error states\n@Composable\n\
    fun ProductList(viewModel: SearchViewModel = hiltViewModel()) {\n    val products = viewModel.getProducts(\"shoes\").collectAsLazyPagingItems()\n\
    \n    LazyColumn {\n        items(count = products.itemCount) { index ->\n            products[index]?.let { ProductCard(it)\
    \ }\n        }\n\n        // Loading indicator at bottom\n        if (products.loadState.append is LoadState.Loading)\
    \ {\n            item { CircularProgressIndicator() }\n        }\n\n        // Error with retry\n        if (products.loadState.append\
    \ is LoadState.Error) {\n            item {\n                Button(onClick = { products.retry() }) {\n              \
    \      Text(\"Retry\")\n                }\n            }\n        }\n    }\n}\n"
  example_bad: "// Manual pagination — 5 common bugs\nclass ProductsViewModel : ViewModel() {\n    var products = mutableListOf<Product>()\n\
    \    var page = 1\n    var isLoading = false\n\n    fun loadMore() {\n        if (isLoading) return // BUG: no error retry\
    \ mechanism\n        isLoading = true\n        viewModelScope.launch {\n            val newProducts = api.getProducts(page)\n\
    \            products.addAll(newProducts) // BUG: mutable list, no Compose observation\n            page++ // BUG: increments\
    \ even on empty response → infinite requests\n            isLoading = false\n        }\n        // BUG: no error handling\
    \ — isLoading stuck true on failure\n        // BUG: pull-to-refresh doesn't reset page to 1\n    }\n}\n"
  when_applies: Projects using Kotlin/Android development, Jetpack Compose, Paging, or Android
  when_not_applies: web-only applications, backend services, desktop applications
  sources: ["https://developer.android.com/build/build-variants"]
