layer: rules
technology: IBM Cloud
domain: cloud
knowledge:
- id: CR-IBM-001
  text: Use IBM Code Engine for serverless containers — it scales to zero and builds from source without requiring a CI/CD
    pipeline.
  why: Traditional container platforms (IKS, OpenShift) require cluster management, node sizing, and scaling configuration.
    Code Engine abstracts all infrastructure — deploy a container image or source code, and it handles scaling, TLS, and routing
    automatically. It scales to zero when idle (no cost), making it ideal for event-driven and variable workloads.
  how_to_do_right: Use applications for HTTP endpoints (always listening). Use jobs for batch/scheduled work. Use build runs
    to build from source (Dockerfile or Cloud Native Buildpacks). Set min-scale=0 for cost optimization. Set min-scale=1 for
    latency-sensitive endpoints. Use subscriptions to connect to event sources (Kafka, COS, cron).
  severity: medium
  technologies:
    library: [ibm cloud, code engine]
  domains:
    domain: [operations, architecture]
    concern: [cloud, serverless]
  example_good: "# Deploy app from container image — scales to zero\nibmcloud ce app create \\\n  --name my-api \\\n  --image\
    \ icr.io/my-ns/my-api:v1.2 \\\n  --port 8080 \\\n  --min-scale 0 \\\n  --max-scale 50 \\\n  --cpu 0.5 \\\n  --memory 1G\n\
    \n# Build from source (no CI/CD needed)\nibmcloud ce build create \\\n  --name my-build \\\n  --source https://github.com/myorg/myapp\
    \ \\\n  --strategy dockerfile \\\n  --image icr.io/my-ns/my-api:latest\n\n# Job for batch processing\nibmcloud ce job\
    \ create \\\n  --name data-pipeline \\\n  --image icr.io/my-ns/pipeline:v1 \\\n  --array-indices \"1-100\" \\\n  --cpu\
    \ 2 \\\n  --memory 4G\n"
  example_bad: '# Running always-on IKS cluster for a low-traffic API

    ibmcloud ks cluster create --name my-cluster --workers 3

    # 3 worker nodes running 24/7 = ~$300/month

    # API gets 100 requests/day

    # Code Engine cost for same: ~$0.50/month

    '
  when_applies: Projects using IBM Cloud or Code Engine
  when_not_applies: local-only or on-premises deployments. projects not using IBM Cloud or Code Engine
  sources: ["https://cloud.ibm.com/docs/codeengine?topic=codeengine-about"]
- id: CR-IBM-002
  text: Use Code Engine subscriptions for event-driven triggers — do not poll for events from your application code.
  why: Polling wastes compute resources checking for events that may not exist. Code Engine subscriptions connect event sources
    (Cloud Object Storage, IBM Event Streams/Kafka, cron schedules) directly to applications or jobs. The subscription handles
    filtering, batching, and retry — your code just processes events.
  how_to_do_right: Use COS subscriptions for file-processing triggers. Use Kafka subscriptions for stream processing. Use
    cron subscriptions for scheduled tasks. Use ping subscriptions for periodic health checks. All subscriptions deliver CloudEvents-formatted
    payloads.
  severity: medium
  technologies:
    library: [ibm cloud, code engine]
  domains:
    domain: [operations, architecture]
    concern: [cloud, serverless]
  example_good: "# Trigger job when file uploaded to COS bucket\nibmcloud ce sub cos create \\\n  --name process-uploads \\\
    \n  --destination-type job \\\n  --destination data-processor \\\n  --bucket my-uploads \\\n  --event-type write \\\n\
    \  --prefix raw/\n\n# Kafka/Event Streams subscription\nibmcloud ce sub kafka create \\\n  --name order-events \\\n  --destination\
    \ my-order-handler \\\n  --broker kafka-broker.example.com:9093 \\\n  --topic orders \\\n  --consumer-group ce-handler\n\
    \n# Cron subscription (every hour)\nibmcloud ce sub cron create \\\n  --name hourly-sync \\\n  --destination sync-job\
    \ \\\n  --destination-type job \\\n  --schedule \"0 * * * *\"\n"
  example_bad: "# Polling COS bucket from application code\nwhile True:\n    objects = cos_client.list_objects(\"my-uploads\"\
    )\n    for obj in objects:\n        if obj not in processed:\n            process(obj)\n    time.sleep(60)\n# Wasting\
    \ compute checking every 60 seconds\n# Race conditions with concurrent instances\n# No retry logic, no dead-letter handling\n"
  when_applies: Projects using IBM Cloud or Code Engine
  when_not_applies: local-only or on-premises deployments. projects not using IBM Cloud or Code Engine
  sources: ["https://cloud.ibm.com/docs/codeengine?topic=codeengine-subscribing-events"]
- id: CR-IBM-003
  text: Design Cloudant documents for query patterns, not entity relationships — denormalize aggressively and use Mango queries
    with proper indexes.
  why: 'Cloudant (CouchDB-based) is a document store — there are no joins. Developers coming from SQL normalize data into
    separate documents and try to join client-side — resulting in N+1 queries and terrible performance. Denormalize: embed
    related data in the same document. Use Mango queries with explicit indexes — without an index, Mango does a full table
    scan.'
  how_to_do_right: Embed related data in one document (order + line items + customer info). Create Mango indexes for every
    query pattern. Use type fields to differentiate document types. Use MapReduce views for aggregations. Keep documents under
    1MB for performance.
  severity: high
  technologies:
    library: [ibm cloud, cloudant]
    platform: [couchdb]
  domains:
    domain: [operations, architecture]
    concern: [cloud, data, database]
  example_good: "// Denormalized order document — all data in one place\n{\n  \"_id\": \"order:2026-001\",\n  \"type\": \"\
    order\",\n  \"customer\": {\n    \"id\": \"cust-123\",\n    \"name\": \"Jane Smith\",\n    \"email\": \"jane@example.com\"\
    \n  },\n  \"items\": [\n    {\"product\": \"Widget A\", \"qty\": 2, \"price\": 19.99},\n    {\"product\": \"Widget B\"\
    , \"qty\": 1, \"price\": 49.99}\n  ],\n  \"total\": 89.97,\n  \"status\": \"shipped\",\n  \"created_at\": \"2026-02-15T10:30:00Z\"\
    \n}\n\n// Mango index for querying by status and date\nPOST /mydb/_index\n{\n  \"index\": {\"fields\": [\"type\", \"status\"\
    , \"created_at\"]},\n  \"name\": \"orders-by-status\",\n  \"type\": \"json\"\n}\n\n// Query with index\nPOST /mydb/_find\n\
    {\n  \"selector\": {\n    \"type\": \"order\",\n    \"status\": \"shipped\",\n    \"created_at\": {\"$gte\": \"2026-02-01\"\
    }\n  },\n  \"sort\": [{\"created_at\": \"desc\"}],\n  \"limit\": 50\n}\n"
  example_bad: '// Normalized documents (SQL thinking) — requires client-side joins

    {"_id": "order:001", "customer_id": "cust-123", "items": ["item:1", "item:2"]}

    {"_id": "item:1", "product": "Widget A", "qty": 2}

    {"_id": "item:2", "product": "Widget B", "qty": 1}

    {"_id": "cust-123", "name": "Jane Smith"}

    // Loading one order = 4 HTTP requests (N+1 problem)

    // No Mango index → full table scan on every query

    '
  when_applies: Projects using IBM Cloud, Cloudant, or CouchDB
  when_not_applies: local-only or on-premises deployments
  sources: ["https://cloud.ibm.com/docs/Cloudant?topic=Cloudant-creating-and-leveraging-cloudant-nosql-db-indexes"]
- id: CR-IBM-004
  text: Handle Cloudant conflicts explicitly — automatic conflict resolution silently loses data.
  why: Cloudant uses MVCC (multi-version concurrency control). When two clients update the same document simultaneously, both
    writes succeed and Cloudant creates a conflict. The winning revision is chosen deterministically (by revision hash) but
    the losing revision's data is silently discarded. If you do not detect and resolve conflicts, you lose data.
  how_to_do_right: 'Design for conflict avoidance: use document-per-event instead of update-in-place. When conflicts are unavoidable,
    check for conflicts on read using the _conflicts parameter. Implement application-level conflict resolution (merge fields,
    last-writer-wins with timestamps, etc.). Use bulk_get with conflicts=true for batch resolution.'
  severity: high
  technologies:
    library: [ibm cloud, cloudant]
    platform: [couchdb]
  domains:
    domain: [operations, architecture, reliability]
    concern: [cloud, data, database]
  example_good: "# Check for conflicts on read\nGET /mydb/order:001?conflicts=true\n\n# Response with conflicts:\n{\n  \"\
    _id\": \"order:001\",\n  \"_rev\": \"3-abc\",\n  \"status\": \"shipped\",\n  \"_conflicts\": [\"3-def\"]  # There's a\
    \ conflicting revision!\n}\n\n# Resolve: fetch conflicting revision, merge, delete loser\nconflicting = GET /mydb/order:001?rev=3-def\n\
    merged = merge_documents(current, conflicting)\nPUT /mydb/order:001  (merged document)\nDELETE /mydb/order:001?rev=3-def\
    \  # Remove conflict\n\n# Better pattern: event-sourced (no conflicts possible)\nPOST /mydb {\"type\": \"order_event\"\
    , \"order_id\": \"001\", \"action\": \"ship\", \"ts\": \"...\"}\nPOST /mydb {\"type\": \"order_event\", \"order_id\":\
    \ \"001\", \"action\": \"deliver\", \"ts\": \"...\"}\n"
  example_bad: '# Update without checking rev — conflict silently created

    PUT /mydb/order:001

    {"_id": "order:001", "status": "shipped"}

    # Another client simultaneously:

    PUT /mydb/order:001

    {"_id": "order:001", "status": "cancelled"}

    # One update silently wins, the other is lost

    # Order is "shipped" but customer thinks it''s "cancelled"

    '
  when_applies: Projects using IBM Cloud, Cloudant, or CouchDB
  when_not_applies: local-only or on-premises deployments
  sources: ["https://cloud.ibm.com/docs/Cloudant?topic=Cloudant-conflicts"]
- id: CR-IBM-005
  text: Use persistent messages in IBM MQ for data that cannot be lost — non-persistent messages are faster but lost on queue
    manager restart.
  why: Non-persistent messages are stored only in memory — queue manager crash or restart means all non-persistent messages
    are gone. Persistent messages are written to disk (logs) before acknowledgment, surviving crashes. The performance difference
    is 2-5x, but the data loss risk of non-persistent is catastrophic for financial transactions, orders, and audit events.
  how_to_do_right: 'Use persistent (MQPER_PERSISTENT) for: financial transactions, orders, audit events, any data you cannot
    re-derive. Use non-persistent (MQPER_NOT_PERSISTENT) for: metrics, heartbeats, cache invalidation, notifications that
    can be re-sent. Set DEFPSIST(YES) on queues that should default to persistent.'
  severity: critical
  technologies:
    library: [ibm cloud, ibm mq]
  domains:
    domain: [operations, architecture, messaging, reliability]
    concern: [cloud]
  example_good: '// Java — persistent message for financial transaction

    MQMessage msg = new MQMessage();

    msg.persistence = MQConstants.MQPER_PERSISTENT;

    msg.writeString(orderJson);


    MQPutMessageOptions pmo = new MQPutMessageOptions();

    pmo.options = MQConstants.MQPMO_SYNCPOINT;  // Transactional

    queue.put(msg, pmo);

    qmgr.commit();  // Message durable after commit


    // Queue default persistence

    DEFINE QLOCAL(ORDERS.IN) DEFPSIST(YES) MAXDEPTH(50000)

    '
  example_bad: '// Non-persistent for order processing — data loss risk

    MQMessage msg = new MQMessage();

    msg.persistence = MQConstants.MQPER_NOT_PERSISTENT;

    msg.writeString(orderJson);

    queue.put(msg);

    // Queue manager restarts → message gone

    // Order placed by customer, payment charged, but order never processed

    '
  when_applies: Any project using IBM Cloud or IBM MQ
  when_not_applies: local-only or on-premises deployments. projects not using IBM Cloud or IBM MQ
  sources: ["https://www.ibm.com/docs/en/ibm-mq/9.3?topic=mq-message-persistence"]
- id: CR-IBM-006
  text: Configure dead-letter queues in IBM MQ and monitor them — undeliverable messages indicate configuration or application
    errors.
  why: When a message cannot be delivered (queue full, queue deleted, message too large, expired), MQ routes it to the dead-letter
    queue (DLQ). Without a DLQ, messages are silently discarded. Without monitoring, poison messages accumulate in the DLQ
    indefinitely, hiding application bugs and data loss.
  how_to_do_right: Define a DLQ on every queue manager. Set DEADQ on the queue manager configuration. Create a DLQ handler
    process that logs, alerts, and optionally retries messages. Monitor DLQ depth with triggers or polling. Every message
    in the DLQ has a DLQ header explaining why it was dead-lettered.
  severity: high
  technologies:
    library: [ibm cloud, ibm mq]
  domains:
    domain: [operations, architecture, messaging, reliability]
    concern: [cloud]
  example_good: "* Define dead-letter queue\nDEFINE QLOCAL(SYSTEM.DEAD.LETTER.QUEUE) +\n  MAXDEPTH(100000) +\n  TRIGTYPE(DEPTH)\
    \ +\n  TRIGDPTH(1) +\n  INITQ(SYSTEM.DEFAULT.INITIATION.QUEUE) +\n  PROCESS(DLQ.HANDLER)\n\n* Set DLQ on queue manager\n\
    ALTER QMGR DEADQ(SYSTEM.DEAD.LETTER.QUEUE)\n\n* DLQ handler rules (runmqdlq)\n* Retry messages to original queue\nREASON(MQRC_Q_FULL)\
    \ ACTION(RETRY) RETRY(3) RETRYINT(300)\n* Alert on expired messages\nREASON(MQRC_MSG_EXPIRED) ACTION(FWD) FWDQ(ALERTS.QUEUE)\n\
    * Log everything else\nREASON(*) ACTION(FWD) FWDQ(DLQ.REVIEW)\n"
  example_bad: '* No DLQ configured

    ALTER QMGR DEADQ('' '')

    * Message sent to full queue → silently discarded

    * Message expired → gone forever

    * No evidence it ever existed

    '
  when_applies: Projects using IBM Cloud or IBM MQ
  when_not_applies: local-only or on-premises deployments. projects not using IBM Cloud or IBM MQ
  sources: ["https://www.ibm.com/docs/en/ibm-mq/9.3?topic=mq-dead-letter-queues"]
- id: CR-IBM-007
  text: Use IBM Event Streams schema registry for all producer/consumer contracts — schema-less Kafka messages break consumers
    without warning.
  why: 'Without a schema, producers can change message formats at any time — adding fields, removing fields, changing types.
    Consumers break silently: they parse the wrong field, get null values, or crash on deserialization. The schema registry
    enforces compatibility rules (backward, forward, full) so changes are validated before they reach consumers.'
  how_to_do_right: Register Avro or JSON schemas in the Event Streams schema registry. Configure producers to serialize with
    the schema. Configure consumers to deserialize with the schema. Set compatibility mode to BACKWARD (new schema can read
    old messages). Validate schema changes in CI/CD before deployment.
  severity: high
  technologies:
    library: [ibm cloud, event streams]
    platform: [kafka]
  domains:
    domain: [operations, architecture, messaging]
    concern: [cloud]
  example_good: "# Register schema\ncurl -X POST https://event-streams-url/artifacts \\\n  -H \"Content-Type: application/json\"\
    \ \\\n  -d '{\n    \"type\": \"AVRO\",\n    \"name\": \"order-value\",\n    \"schema\": \"{\\\"type\\\":\\\"record\\\"\
    ,\\\"name\\\":\\\"Order\\\",\\\"fields\\\":[{\\\"name\\\":\\\"orderId\\\",\\\"type\\\":\\\"string\\\"},{\\\"name\\\":\\\
    \"total\\\",\\\"type\\\":\\\"double\\\"},{\\\"name\\\":\\\"status\\\",\\\"type\\\":\\\"string\\\"}]}\"\n  }'\n\n# Python\
    \ producer with schema validation\nfrom confluent_kafka import SerializingProducer\nfrom confluent_kafka.schema_registry.avro\
    \ import AvroSerializer\n\nproducer = SerializingProducer({\n    'bootstrap.servers': bootstrap_servers,\n    'value.serializer':\
    \ AvroSerializer(schema_registry_client, schema_str)\n})\nproducer.produce('orders', value=order_dict)\n"
  example_bad: '# No schema — producer sends whatever it wants

    producer.produce(''orders'', value=json.dumps({"order_id": 123, "total": "19.99"}))

    # v2 changes: {"orderId": 123, "amount": 19.99}

    # Consumer expects "order_id" and "total" → gets None for both

    # Silent data corruption — wrong totals in reports

    '
  when_applies: Projects using IBM Cloud, Event Streams, or Apache Kafka event streaming
  when_not_applies: local-only or on-premises deployments
  sources: ["https://cloud.ibm.com/docs/EventStreams?topic=EventStreams-ES_schema_registry"]
- id: CR-IBM-008
  text: Use mirroring in Event Streams for cross-region replication and disaster recovery — do not build custom replication
    logic.
  why: Custom replication (consuming from one cluster and producing to another) is fragile — it loses ordering guarantees,
    creates offset mismatches, and requires custom monitoring. Event Streams mirroring (based on MirrorMaker 2) replicates
    topics with ordering preserved, offset translation, and automatic failover. It handles all the complexity that breaks
    custom solutions.
  how_to_do_right: Enable mirroring between source and target Event Streams instances. Configure topic patterns to replicate.
    Use geo-replication for active-passive DR. Monitor mirror lag with metrics. Test failover regularly — switch consumers
    to the target cluster and verify offset translation.
  severity: medium
  technologies:
    library: [ibm cloud, event streams]
    platform: [kafka]
  domains:
    domain: [operations, architecture, messaging]
    concern: [cloud, disaster-recovery]
  example_good: "# Enable mirroring from US-South to EU-DE\nibmcloud es mirroring-config-update \\\n  --source-cluster us-south-cluster\
    \ \\\n  --target-cluster eu-de-cluster \\\n  --topics \"orders.*,payments.*,audit.*\"\n\n# Monitor mirror lag\nibmcloud\
    \ es mirroring-active-topics \\\n  --cluster eu-de-cluster\n\n# Consumer offset translation (after failover)\n# MirrorMaker\
    \ 2 stores offset mappings automatically\n# Consumers can resume from the translated offset\n"
  example_bad: "# Custom replication — fragile, loses ordering\nconsumer = KafkaConsumer('orders', bootstrap_servers='us-south:9093')\n\
    producer = KafkaProducer(bootstrap_servers='eu-de:9093')\nfor msg in consumer:\n    producer.send('orders', msg.value)\n\
    \    consumer.commit()\n# Network blip → message lost between consume and produce\n# No offset translation → consumers\
    \ re-process or skip messages\n# Ordering not guaranteed across partitions\n"
  when_applies: Projects using IBM Cloud, Event Streams, or Apache Kafka event streaming
  when_not_applies: local-only or on-premises deployments
  sources: ["https://cloud.ibm.com/docs/EventStreams?topic=EventStreams-mirroring"]
- id: CR-IBM-009
  text: Use Watson Discovery for enterprise search over unstructured data — do not build custom RAG pipelines for common search
    patterns.
  why: 'Building a custom RAG pipeline (chunking, embedding, vector DB, retrieval, reranking) from scratch takes weeks and
    requires ongoing maintenance for: index updates, embedding model upgrades, chunk size tuning, and relevance feedback.
    Watson Discovery provides: document ingestion, NLP enrichment, natural language query, relevance training, and passage
    retrieval out of the box.'
  how_to_do_right: 'Use Discovery for: enterprise document search, FAQ systems, knowledge base search. Upload documents (PDF,
    Word, HTML, JSON). Train relevance on real user queries. Use passage retrieval for RAG integration with watsonx.ai. Use
    custom enrichments for domain-specific entity extraction. Build custom RAG only for specialized use cases where Discovery''s
    defaults do not fit.'
  severity: medium
  technologies:
    library: [ibm cloud, watson, watson discovery]
  domains:
    domain: [operations, architecture]
    concern: [cloud, ai, search]
  example_good: "from ibm_watson import DiscoveryV2\nfrom ibm_cloud_sdk_core.authenticators import IAMAuthenticator\n\nauthenticator\
    \ = IAMAuthenticator(apikey)\ndiscovery = DiscoveryV2(\n    version='2023-03-31',\n    authenticator=authenticator\n)\n\
    discovery.set_service_url(url)\n\n# Natural language query with passage retrieval\nresponse = discovery.query(\n    project_id=project_id,\n\
    \    natural_language_query=\"What is the refund policy for digital products?\",\n    passages={\n        \"enabled\"\
    : True,\n        \"max_per_document\": 3,\n        \"characters\": 500\n    },\n    count=5\n).get_result()\n\n# Use passages\
    \ for RAG context\npassages = [p[\"passage_text\"] for r in response[\"results\"]\n            for p in r.get(\"document_passages\"\
    , [])]\n"
  example_bad: '# Building custom RAG from scratch for basic document search

    chunks = chunk_documents(docs, size=512)

    embeddings = embed_all(chunks)  # Weeks of tuning chunk size

    qdrant.upload(embeddings)        # Vector DB maintenance

    results = qdrant.search(query_embedding)

    # 3 weeks later: still tuning relevance

    # 3 months later: embedding model outdated, need to re-embed

    # Watson Discovery would have been production-ready in 1 day

    '
  when_applies: Projects using IBM Cloud, Watson, or Watson Discovery
  when_not_applies: local-only or on-premises deployments
  sources: ["https://cloud.ibm.com/docs/discovery-data?topic=discovery-data-about"]
- id: CR-IBM-010
  text: Use Aspera high-speed transfer for large data uploads to IBM Cloud Object Storage — standard HTTP uploads fail for
    files over 5GB.
  why: Standard HTTP uploads to COS are limited by TCP throughput — a 1TB upload over a 1Gbps link takes ~3 hours with HTTP
    but ~15 minutes with Aspera. Aspera uses FASP protocol which eliminates TCP bottlenecks and is resilient to packet loss.
    For multi-TB datasets, the time difference is days vs hours. Also, HTTP multipart uploads fail on network interruptions
    — Aspera resumes automatically.
  how_to_do_right: 'Use Aspera for: initial data migrations, daily batch uploads > 10GB, any transfer over high-latency links.
    Use standard S3 API for: small files (< 1GB), programmatic access, streaming writes. Enable Aspera on the COS bucket.
    Use the Aspera CLI or SDK for transfers.'
  severity: medium
  technologies:
    library: [ibm cloud, cloud object storage, aspera]
  domains:
    domain: [operations, architecture, performance]
    concern: [cloud, data]
  example_good: "# Aspera high-speed transfer (10-100x faster than HTTP)\nascp -i /path/to/aspera-key \\\n  --mode=send \\\
    \n  --host=s3.us-south.cloud-object-storage.appdomain.cloud \\\n  --user=apikey:$COS_API_KEY \\\n  -d /local/large-dataset/\
    \ \\\n  /bucket-name/destination/\n\n# Python SDK — Aspera transfer manager\nfrom ibm_s3transfer.aspera.manager import\
    \ AsperaTransferManager\n\nwith AsperaTransferManager(client) as tm:\n    future = tm.upload(\n        \"large-dataset.tar.gz\"\
    ,\n        \"my-bucket\",\n        \"backups/large-dataset.tar.gz\"\n    )\n    future.result()  # Blocks until complete,\
    \ auto-resumes on failure\n\n# Standard S3 API for small files\ncos.put_object(Bucket=\"my-bucket\", Key=\"small.json\"\
    , Body=data)\n"
  example_bad: "# HTTP upload for 500GB dataset\naws s3 cp large-dataset/ s3://my-bucket/data/ --recursive \\\n  --endpoint-url\
    \ https://s3.us-south.cloud-object-storage.appdomain.cloud\n# Takes 12+ hours over standard HTTP\n# Network interruption\
    \ at hour 8 → start over\n# Aspera would complete in ~45 minutes with auto-resume\n"
  when_applies: Projects using IBM Cloud, Cloud Object Storage, or Aspera
  when_not_applies: local-only or on-premises deployments
  sources: ["https://cloud.ibm.com/docs/cloud-object-storage?topic=cloud-object-storage-aspera"]
