layer: rules
technology: Ruby on Rails
domain: backend
knowledge:
- id: CR-RAIL-001
  text: Always use includes(), preload(), or eager_load() to prevent N+1 queries. Use bullet gem in development to detect
    missing eager loads.
  why: 'ActiveRecord lazy-loads associations by default. Iterating over 100 orders and accessing order.customer triggers 100
    separate SQL queries. With nested associations (order.customer.address), the query count multiplies exponentially. N+1
    queries are the #1 cause of slow Rails pages and account for 80% of database-related performance issues.'
  how_to_do_right: '1. Use includes() for associations accessed in views — Rails chooses preload or eager_load.

    2. Use preload() when you need separate queries (useful for has_many with conditions).

    3. Use eager_load() when you need a single LEFT OUTER JOIN (for WHERE clauses on associations).

    4. Install bullet gem in development to auto-detect N+1 queries.

    5. Create scopes that include eager loading for common access patterns.

    '
  severity: critical
  technologies:
    lang: [ruby]
    framework: [rails]
    library: [activerecord]
    platform: [postgresql]
  domains:
    domain: [architecture, performance]
    concern: [backend]
  example_good: "# Correct: Eager loading — 3 queries total regardless of result count\nclass Order < ApplicationRecord\n\
    \  scope :with_details, -> {\n    includes(:customer, :shipping_address, items: :product)\n  }\nend\n\n# Controller\n\
    def index\n  @orders = Order.with_details\n                 .where(status: 'pending')\n                 .page(params[:page])\n\
    end\n\n# View — no additional queries\n<% @orders.each do |order| %>\n  <%= order.customer.name %>\n  <% order.items.each\
    \ do |item| %>\n    <%= item.product.name %>\n  <% end %>\n<% end %>\n\n# Gemfile (development)\ngem 'bullet', group:\
    \ :development\n"
  example_bad: "# Wrong: N+1 queries — 1 + N + N*M queries\ndef index\n  @orders = Order.where(status: 'pending')\nend\n\n\
    # View triggers separate query for EACH association access\n<% @orders.each do |order| %>\n  <%= order.customer.name %>\
    \          <!-- +1 query per order -->\n  <% order.items.each do |item| %>    <!-- +1 query per order -->\n    <%= item.product.name\
    \ %>          <!-- +1 query per item -->\n  <% end %>\n<% end %>\n# 100 orders with 5 items each = 1 + 100 + 100 + 500\
    \ = 701 queries\n"
  when_applies: Any project using Ruby on Rails, ActiveRecord, or PostgreSQL databases
  when_not_applies: low-traffic internal tools, admin dashboards, or batch jobs where latency is irrelevant
  sources: ["https://guides.rubyonrails.org/active_record_querying.html#eager-loading-associations"]
- id: CR-RAIL-002
  text: Use scopes for reusable query chains. Name scopes after business concepts, not SQL operations.
  why: Duplicated where/order/joins chains across controllers and views lead to inconsistent queries — one controller remembers
    to filter soft-deleted records while another does not. Scopes encapsulate query logic with meaningful names, are chainable,
    composable, and ensure consistent data access across the application.
  how_to_do_right: '1. Define scopes on the model for every common query pattern.

    2. Name after business domain: .published, .active, .overdue — not .where_status_active.

    3. Use scopes as the default_scope only for truly universal filters (multi-tenancy).

    4. Chain scopes: Order.pending.recent.with_details.

    5. Use scope with lambda for parameterized queries.

    '
  severity: high
  technologies:
    lang: [ruby]
    framework: [rails]
    library: [activerecord]
  domains:
    domain: [architecture]
    concern: [backend]
  example_good: "class Article < ApplicationRecord\n  scope :published, -> {\n    where(status: 'published').where('published_at\
    \ <= ?', Time.current)\n  }\n  scope :by_author, ->(author) { where(author: author) }\n  scope :trending, -> {\n    published\n\
    \      .where('published_at > ?', 7.days.ago)\n      .order(views_count: :desc)\n  }\n  scope :with_engagement, -> {\n\
    \    left_joins(:comments, :likes)\n      .group(:id)\n      .select('articles.*, COUNT(DISTINCT comments.id) AS comment_count,\n\
    \               COUNT(DISTINCT likes.id) AS like_count')\n  }\nend\n\n# Controller — clean, composable, consistent\ndef\
    \ index\n  @articles = Article.published.trending.with_engagement.page(params[:page])\nend\n"
  example_bad: "# Wrong: Query logic scattered across controllers\nclass ArticlesController < ApplicationController\n  def\
    \ index\n    @articles = Article.where(status: 'published')\n                       .where('published_at <= ?', Time.current)\n\
    \                       .order(views_count: :desc)\n  end\n\n  def trending\n    # Duplicated and slightly different —\
    \ forgot published_at check\n    @articles = Article.where(status: 'published')\n                       .where('published_at\
    \ > ?', 7.days.ago)\n                       .order(views_count: :desc)\n  end\nend\n"
  when_applies: Projects using Ruby on Rails or ActiveRecord
  when_not_applies: small scripts under 100 lines, single-purpose utilities. projects not using Ruby on Rails or ActiveRecord
  sources: ["https://guides.rubyonrails.org/active_record_querying.html#scopes"]
- id: CR-RAIL-003
  text: Use callbacks only for model-level concerns (timestamps, slugs, sanitization). Never put business logic in callbacks
    — use service objects instead.
  why: Callbacks run implicitly on every save/create/destroy, making control flow invisible. Business logic in callbacks cannot
    be skipped when needed, runs during tests unexpectedly, creates ordering dependencies between callbacks, and makes debugging
    require reading every callback chain. Service objects make the flow explicit and testable.
  how_to_do_right: '1. Use callbacks ONLY for: normalization (downcase email), slug generation, counter updates.

    2. Move business logic (send email, charge payment, update inventory) to service objects.

    3. Service objects take explicit dependencies and return results.

    4. If a callback has an if/unless condition, it is probably business logic.

    5. If you need to skip a callback, that is proof it should not be a callback.

    '
  severity: high
  technologies:
    lang: [ruby]
    framework: [rails]
    library: [activerecord]
  domains:
    domain: [architecture]
    concern: [backend]
  example_good: "# Model: Only model-level concerns in callbacks\nclass User < ApplicationRecord\n  before_validation :normalize_email\n\
    \  before_save :generate_slug, if: :name_changed?\n\n  private\n\n  def normalize_email\n    self.email = email&.downcase&.strip\n\
    \  end\n\n  def generate_slug\n    self.slug = name.parameterize\n  end\nend\n\n# Service object: Business logic explicit\
    \ and testable\nclass UserRegistrationService\n  def initialize(user_params, newsletter_opt_in:)\n    @user_params = user_params\n\
    \    @newsletter_opt_in = newsletter_opt_in\n  end\n\n  def call\n    user = User.new(@user_params)\n    ActiveRecord::Base.transaction\
    \ do\n      user.save!\n      create_default_settings(user)\n      subscribe_to_newsletter(user) if @newsletter_opt_in\n\
    \      send_welcome_email(user)\n    end\n    Result.success(user)\n  rescue ActiveRecord::RecordInvalid => e\n    Result.failure(e.record.errors)\n\
    \  end\nend\n"
  example_bad: "# Wrong: Business logic buried in callbacks\nclass User < ApplicationRecord\n  after_create :send_welcome_email\n\
    \  after_create :create_default_settings\n  after_create :subscribe_to_newsletter\n  after_create :notify_admin\n  after_create\
    \ :create_stripe_customer\n\n  # In tests: every User.create! triggers 5 side effects\n  # In seeds: welcome emails sent\
    \ to seed data\n  # In imports: Stripe customers created for bulk imports\nend\n"
  when_applies: Projects using Ruby on Rails or ActiveRecord
  when_not_applies: small scripts under 100 lines, single-purpose utilities. projects not using Ruby on Rails or ActiveRecord
  sources: ["https://guides.rubyonrails.org/active_record_callbacks.html"]
- id: CR-RAIL-004
  text: Use counter_cache for belongs_to associations to avoid COUNT(*) queries. Add database index on the counter column.
  why: Displaying 'Article has 42 comments' without counter_cache runs a COUNT(*) query every time the page loads. For a listing
    of 50 articles, that is 50 COUNT queries. Counter cache stores the count in a denormalized column that is updated automatically
    on create/destroy, turning 50 queries into zero.
  how_to_do_right: '1. Add counter column via migration: add_column :articles, :comments_count, :integer, default: 0.

    2. Add counter_cache: true to the belongs_to association.

    3. Reset counters after data migration: Article.reset_counters(article.id, :comments).

    4. Add database index on counter column if used for sorting.

    5. Use counter_culture gem for complex counter scenarios (conditional counts).

    '
  severity: medium
  technologies:
    lang: [ruby]
    framework: [rails]
    library: [activerecord]
  domains:
    domain: [architecture, performance]
    concern: [backend]
  example_good: "# Migration\nclass AddCommentsCountToArticles < ActiveRecord::Migration[7.1]\n  def change\n    add_column\
    \ :articles, :comments_count, :integer, default: 0, null: false\n    add_index :articles, :comments_count\n\n    # Backfill\
    \ existing counts\n    Article.find_each do |article|\n      Article.reset_counters(article.id, :comments)\n    end\n\
    \  end\nend\n\n# Model\nclass Comment < ApplicationRecord\n  belongs_to :article, counter_cache: true\nend\n\nclass Article\
    \ < ApplicationRecord\n  has_many :comments\n\n  scope :most_discussed, -> { order(comments_count: :desc) }\nend\n\n#\
    \ View — reads column, no COUNT query\n<%= article.comments_count %> comments\n"
  example_bad: "# Wrong: COUNT query for every article in the list\n<% @articles.each do |article| %>\n  <!-- Runs SELECT\
    \ COUNT(*) FROM comments WHERE article_id = ? per article -->\n  <%= article.comments.count %> comments\n<% end %>\n#\
    \ 50 articles = 50 COUNT queries on every page load\n"
  when_applies: Projects using Ruby on Rails or ActiveRecord
  when_not_applies: low-traffic internal tools, admin dashboards, or batch jobs where latency is irrelevant. projects not
    using Ruby on Rails or ActiveRecord
  sources: ["https://guides.rubyonrails.org/association_basics.html#counter-cache"]
- id: CR-RAIL-005
  text: Always use strong parameters to whitelist permitted attributes. Never pass params directly to create/update.
  why: 'Without strong parameters, an attacker can add any field to the form submission: admin=true, role=superuser, balance=999999.
    Rails will mass-assign these to the model, escalating privileges or corrupting data. Strong parameters act as a whitelist
    — only explicitly permitted fields are passed through.'
  how_to_do_right: '1. Define a private method in the controller for permitted params.

    2. Use require() for the expected root key and permit() for allowed fields.

    3. Never use params.permit! (permits everything).

    4. Use different permit lists for create vs update if needed.

    5. Nest permit calls for nested attributes: permit(address: [:street, :city]).

    '
  severity: critical
  technologies:
    lang: [ruby]
    framework: [rails]
  domains:
    domain: [architecture, security]
    concern: [backend]
  example_good: "class UsersController < ApplicationController\n  def create\n    @user = User.new(user_params)\n    if @user.save\n\
    \      redirect_to @user\n    else\n      render :new, status: :unprocessable_entity\n    end\n  end\n\n  def update\n\
    \    @user = User.find(params[:id])\n    if @user.update(user_update_params)\n      redirect_to @user\n    else\n    \
    \  render :edit, status: :unprocessable_entity\n    end\n  end\n\n  private\n\n  def user_params\n    params.require(:user).permit(:name,\
    \ :email, :password, :password_confirmation)\n  end\n\n  # Separate permit list for update — no password change here\n\
    \  def user_update_params\n    params.require(:user).permit(:name, :email, :bio, :avatar)\n  end\nend\n"
  example_bad: "# CRITICAL VULNERABILITY: Mass assignment attack\nclass UsersController < ApplicationController\n  def create\n\
    \    # Attacker sends: { user: { name: \"Hacker\", admin: true, role: \"superuser\" } }\n    @user = User.create(params[:user].permit!)\
    \  # Permits EVERYTHING\n    # User is now admin with superuser role\n  end\n\n  def update\n    @user = User.find(params[:id])\n\
    \    @user.update(params.require(:user).permit!)  # Also wrong\n  end\nend\n"
  when_applies: Any project using Ruby on Rails
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities. projects
    not using Ruby on Rails
  sources: ["https://guides.rubyonrails.org/action_controller_overview.html#strong-parameters"]
- id: CR-RAIL-006
  text: Never use string interpolation in ActiveRecord queries. Always use parameterized queries with ? placeholders or hash
    conditions.
  why: String interpolation in SQL queries allows SQL injection — the most dangerous web vulnerability. An attacker can dump
    the entire database, modify records, or execute system commands. ActiveRecord's parameterized queries automatically escape
    all user input, making injection impossible.
  how_to_do_right: '1. Use hash conditions: where(status: params[:status]).

    2. Use ? placeholders: where(''created_at > ?'', 1.week.ago).

    3. Use named placeholders: where(''name LIKE :query'', query: "%#{params[:q]}%").

    4. For IN clauses, pass arrays: where(id: [1, 2, 3]).

    5. Audit all raw SQL (find_by_sql, execute) for string interpolation.

    '
  severity: critical
  technologies:
    lang: [ruby]
    framework: [rails]
    library: [activerecord]
  domains:
    domain: [architecture, security]
    concern: [backend]
  example_good: "# Correct: Parameterized queries — safe from SQL injection\nclass ArticlesController < ApplicationController\n\
    \  def search\n    @articles = Article.where('title ILIKE ?', \"%#{params[:q]}%\")\n  end\n\n  def by_status\n    @articles\
    \ = Article.where(status: params[:status])\n  end\n\n  def recent\n    @articles = Article.where('created_at > :since',\
    \ since: params[:days].to_i.days.ago)\n  end\n\n  def by_ids\n    @articles = Article.where(id: params[:ids])  # Safe\
    \ array expansion\n  end\nend\n"
  example_bad: "# CRITICAL SQL INJECTION\nclass ArticlesController < ApplicationController\n  def search\n    # Attacker sends\
    \ q = \"'; DROP TABLE articles; --\"\n    @articles = Article.where(\"title LIKE '%#{params[:q]}%'\")\n    # Executed\
    \ SQL: SELECT * FROM articles WHERE title LIKE '%'; DROP TABLE articles; --%'\n  end\nend\n"
  when_applies: Any project using Ruby on Rails or ActiveRecord
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities. projects
    not using Ruby on Rails or ActiveRecord
  sources: ["https://guides.rubyonrails.org/security.html#sql-injection"]
- id: CR-RAIL-007
  text: Use Rails encrypted credentials for secrets management. Never store secrets in plain text config files or environment
    variable defaults in code.
  why: Plain text secrets in config/database.yml or hardcoded ENV defaults are committed to version control and visible to
    anyone with repo access. Rails credentials store secrets in an encrypted file (safe to commit) with a master key (never
    committed). This provides secure, auditable secrets management without external services.
  how_to_do_right: '1. Use rails credentials:edit to manage secrets.

    2. Access via Rails.application.credentials.dig(:aws, :access_key_id).

    3. Keep config/master.key in .gitignore (never commit).

    4. Use environment-specific credentials: rails credentials:edit --environment production.

    5. Share master key via secure channel (1Password, Vault), never Slack or email.

    '
  severity: critical
  technologies:
    lang: [ruby]
    framework: [rails]
  domains:
    domain: [architecture, security, operations, deployment]
    concern: [backend]
  example_good: "# Edit encrypted credentials\n# $ EDITOR=vim rails credentials:edit --environment production\n\n# config/credentials/production.yml.enc\
    \ (encrypted, safe to commit)\naws:\n  access_key_id: AKIA...\n  secret_access_key: wJalr...\nstripe:\n  secret_key: sk_live_...\n\
    database:\n  password: super_secret_db_password\n\n# Usage in code\nStripe.api_key = Rails.application.credentials.dig(:stripe,\
    \ :secret_key)\n\n# .gitignore\nconfig/master.key\nconfig/credentials/production.key\n"
  example_bad: "# WRONG: Plain text secrets in version control\n# config/database.yml\nproduction:\n  password: my_production_password\
    \  # Visible in git history forever\n\n# WRONG: Hardcoded fallback in code\nStripe.api_key = ENV.fetch('STRIPE_KEY', 'sk_live_REAL_KEY_HERE')\n\
    # If ENV not set, the hardcoded key is used — and it's in git\n"
  when_applies: Any project using Ruby on Rails
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities. projects
    not using Ruby on Rails
  sources: ["https://guides.rubyonrails.org/security.html#custom-credentials"]
- id: CR-RAIL-008
  text: Use Russian doll caching with fragment caching for complex views. Cache at multiple levels with proper cache key invalidation.
  why: Full-page caching is too coarse — a single change invalidates the entire page. No caching means the database is hit
    on every request. Russian doll caching nests fragment caches so that when a comment changes, only its fragment and its
    parent article fragment are invalidated — not the entire page. This gives 10-100x faster page loads with surgical invalidation.
  how_to_do_right: '1. Use cache helper in views with the model as cache key (auto-invalidation via updated_at).

    2. Nest cache blocks: page → article list → individual article → comments.

    3. Touch parent when child changes: belongs_to :article, touch: true.

    4. Use cache_version for manual invalidation when template changes.

    5. Monitor cache hit ratio with Rails.cache instrumentation.

    '
  severity: high
  technologies:
    lang: [ruby]
    framework: [rails]
    platform: [redis]
  domains:
    domain: [architecture, performance]
    concern: [backend, frontend]
  example_good: "# Model: touch parent on change\nclass Comment < ApplicationRecord\n  belongs_to :article, touch: true  #\
    \ Updates article.updated_at on comment change\nend\n\n# View: Russian doll caching\n<%# Outer cache: article list — invalidated\
    \ when ANY article changes %>\n<% cache ['v1', 'articles', @articles.maximum(:updated_at)] do %>\n  <% @articles.each\
    \ do |article| %>\n    <%# Middle cache: individual article — invalidated when article or its comments change %>\n   \
    \ <% cache article do %>\n      <h2><%= article.title %></h2>\n      <p>By <%= article.author.name %></p>\n\n      <%#\
    \ Inner cache: comments — invalidated when a comment changes %>\n      <% article.comments.each do |comment| %>\n    \
    \    <% cache comment do %>\n          <div class=\"comment\">\n            <p><%= comment.body %></p>\n            <span><%=\
    \ comment.author.name %></span>\n          </div>\n        <% end %>\n      <% end %>\n    <% end %>\n  <% end %>\n<%\
    \ end %>\n"
  example_bad: "# Wrong: No caching — full database hit on every request\n<% @articles.each do |article| %>\n  <h2><%= article.title\
    \ %></h2>\n  <p>By <%= article.author.name %></p>\n  <% article.comments.each do |comment| %>\n    <div class=\"comment\"\
    ><%= comment.body %></div>\n  <% end %>\n<% end %>\n# Every page view: 1 + N + N*M queries, full template rendering\n"
  when_applies: Projects using Ruby on Rails or Redis cache/pub-sub systems
  when_not_applies: low-traffic internal tools, admin dashboards, or batch jobs where latency is irrelevant. projects not
    using Ruby on Rails or Redis
  sources: ["https://guides.rubyonrails.org/caching_with_rails.html#russian-doll-caching"]
- id: CR-RAIL-009
  text: Use Sidekiq with Redis for background job processing. Never process emails, payments, or external API calls synchronously
    in request handlers.
  why: A synchronous email send takes 1-3 seconds. A payment API call takes 2-5 seconds. An external API timeout takes 30
    seconds. During this time, a Puma worker thread is blocked — with 5 threads, 5 concurrent slow operations block the entire
    server. Background jobs process asynchronously with automatic retries and failure handling.
  how_to_do_right: '1. Use ActiveJob with Sidekiq adapter for all async processing.

    2. Make jobs idempotent — they may run more than once on retry.

    3. Set retry count and dead-letter queue for failed jobs.

    4. Use Sidekiq::Testing.inline! in tests to run jobs synchronously.

    5. Monitor with Sidekiq web UI and alert on dead-letter queue growth.

    '
  severity: high
  technologies:
    lang: [ruby]
    framework: [rails]
    library: [sidekiq]
    platform: [redis]
  domains:
    domain: [architecture, performance]
    concern: [backend]
  example_good: "# app/jobs/order_confirmation_job.rb\nclass OrderConfirmationJob < ApplicationJob\n  queue_as :default\n\
    \  retry_on Net::SMTPError, wait: :polynomially_longer, attempts: 5\n  discard_on ActiveRecord::RecordNotFound\n\n  def\
    \ perform(order_id)\n    order = Order.find(order_id)\n    OrderMailer.confirmation(order).deliver_now\n    order.update!(confirmation_sent_at:\
    \ Time.current)\n  end\nend\n\n# Controller: enqueue and respond immediately\nclass OrdersController < ApplicationController\n\
    \  def create\n    @order = OrderService.new(order_params, current_user).call\n    OrderConfirmationJob.perform_later(@order.id)\
    \  # Async — returns immediately\n    redirect_to @order, notice: 'Order placed!'\n  end\nend\n\n# config/application.rb\n\
    config.active_job.queue_adapter = :sidekiq\n"
  example_bad: "# Wrong: Synchronous email in request handler — blocks worker for 2-3 seconds\nclass OrdersController < ApplicationController\n\
    \  def create\n    @order = Order.create!(order_params)\n    OrderMailer.confirmation(@order).deliver_now  # Blocks 2-3\
    \ seconds\n    PaymentService.charge(@order)                 # Blocks 3-5 seconds\n    NotificationService.notify_warehouse(@order)\
    \  # Blocks 1-2 seconds\n    # Total: 6-10 seconds response time\n    # If SMTP is down: 30 second timeout, user sees\
    \ error, order is in limbo\n    redirect_to @order\n  end\nend\n"
  when_applies: Projects using Ruby on Rails, Sidekiq, or Redis cache/pub-sub systems
  when_not_applies: small scripts under 100 lines, single-purpose utilities
  sources: ["https://guides.rubyonrails.org/active_job_basics.html", "https://github.com/sidekiq/sidekiq/wiki/Best-Practices"]
- id: CR-RAIL-010
  text: Use service objects for complex business operations that span multiple models. Follow the single-purpose callable
    pattern.
  why: Fat models violate single responsibility — a User model with 2000 lines that handles registration, authentication,
    billing, and notifications is unmaintainable and untestable. Fat controllers scatter business logic across request handlers.
    Service objects encapsulate complex operations with explicit inputs, outputs, and dependencies.
  how_to_do_right: '1. Create service objects in app/services/ with a single public #call method.

    2. Accept all dependencies via constructor (enables testing with doubles).

    3. Return a result object (not raise exceptions) for expected failures.

    4. Name after the business operation: PlaceOrder, TransferFunds, ImportUsers.

    5. Compose services: PlaceOrder calls ValidateInventory, ChargePayment, SendConfirmation.

    '
  severity: medium
  technologies:
    lang: [ruby]
    framework: [rails]
  domains:
    domain: [architecture]
    concern: [backend]
  example_good: "# app/services/place_order.rb\nclass PlaceOrder\n  def initialize(cart:, user:, payment_method:)\n    @cart\
    \ = cart\n    @user = user\n    @payment_method = payment_method\n  end\n\n  def call\n    ActiveRecord::Base.transaction\
    \ do\n      order = create_order\n      reserve_inventory(order)\n      charge_payment(order)\n      order\n    end\n\
    \  rescue Inventory::InsufficientStock => e\n    Result.failure(:insufficient_stock, e.message)\n  rescue Payment::DeclinedError\
    \ => e\n    Result.failure(:payment_declined, e.message)\n  end\n\n  private\n\n  def create_order\n    Order.create!(\n\
    \      user: @user,\n      items: @cart.items.map { |i| OrderItem.new(product: i.product, quantity: i.quantity) },\n \
    \     total: @cart.total\n    )\n  end\n\n  def reserve_inventory(order)\n    order.items.each { |item| InventoryService.reserve(item.product,\
    \ item.quantity) }\n  end\n\n  def charge_payment(order)\n    PaymentService.charge(@payment_method, order.total)\n  end\n\
    end\n\n# Controller: thin, delegates to service\ndef create\n  result = PlaceOrder.new(cart: current_cart, user: current_user,\
    \ payment_method: params[:payment_method]).call\n  if result.success?\n    redirect_to result.value\n  else\n    flash.now[:error]\
    \ = result.error_message\n    render :checkout\n  end\nend\n"
  example_bad: "# Wrong: 50 lines of business logic in controller\ndef create\n  order = Order.new(user: current_user)\n \
    \ cart.items.each do |item|\n    if item.product.stock < item.quantity\n      flash[:error] = \"Insufficient stock for\
    \ #{item.product.name}\"\n      return render :checkout\n    end\n    item.product.update!(stock: item.product.stock -\
    \ item.quantity)\n    order.items.build(product: item.product, quantity: item.quantity)\n  end\n  order.total = cart.total\n\
    \  order.save!\n  Stripe::Charge.create(amount: order.total_cents, source: params[:token])\n  OrderMailer.confirmation(order).deliver_now\n\
    \  redirect_to order\nend\n"
  when_applies: Projects using Ruby on Rails
  when_not_applies: small scripts under 100 lines, single-purpose utilities. projects not using Ruby on Rails
  sources: ["https://www.toptal.com/ruby-on-rails/rails-service-objects-tutorial"]
- id: CR-RAIL-011
  text: Configure database connection pool size to match your application server's thread count. Puma threads + Sidekiq threads
    must not exceed PostgreSQL max_connections.
  why: Each Puma thread and Sidekiq thread needs its own database connection. If pool size < thread count, threads wait for
    connections — causing timeout errors under load. If total connections across all processes > max_connections, PostgreSQL
    rejects new connections and the application crashes. The formula must account for all connection consumers.
  how_to_do_right: '1. Set pool = Puma max_threads (per worker) in database.yml.

    2. Total connections = (Puma workers * pool) + (Sidekiq concurrency) + overhead.

    3. Ensure total < PostgreSQL max_connections (default 100).

    4. Use PgBouncer for connection pooling in production.

    5. Monitor with: SELECT count(*) FROM pg_stat_activity.

    '
  severity: high
  technologies:
    lang: [ruby]
    framework: [rails]
    library: [puma, sidekiq]
    platform: [postgresql]
  domains:
    domain: [architecture, operations, deployment, performance]
    concern: [backend]
  example_good: "# config/database.yml\nproduction:\n  adapter: postgresql\n  pool: <%= ENV.fetch(\"RAILS_MAX_THREADS\", 5)\
    \ %>\n  # Puma: 2 workers * 5 threads = 10 connections\n  # Sidekiq: 10 concurrency = 10 connections\n  # Total: 20 connections\
    \ per server\n  # 3 servers = 60 connections < PostgreSQL max_connections (100)\n\n# config/puma.rb\nworkers ENV.fetch(\"\
    WEB_CONCURRENCY\", 2)\nthreads_count = ENV.fetch(\"RAILS_MAX_THREADS\", 5)\nthreads threads_count, threads_count\n\n#\
    \ config/sidekiq.yml\n:concurrency: 10  # Matches or is less than pool size\n\n# With PgBouncer (recommended for production):\n\
    # production:\n#   url: postgres://pgbouncer:6432/mydb\n#   prepared_statements: false  # Required for PgBouncer transaction\
    \ mode\n"
  example_bad: "# Wrong: Pool mismatch — connection timeout under load\nproduction:\n  pool: 5  # But Puma runs 20 threads\
    \ — 15 threads blocked waiting\n\n# config/puma.rb\nthreads 20, 20  # 20 threads but only 5 DB connections\n\n# Wrong:\
    \ Too many total connections\n# 4 servers * 3 workers * 20 threads = 240 > PostgreSQL max_connections (100)\n"
  when_applies: Projects using Ruby on Rails, PostgreSQL databases, Puma, or Sidekiq
  sources: ["https://devcenter.heroku.com/articles/concurrency-and-database-connections", "https://api.rubyonrails.org/classes/ActiveRecord/ConnectionAdapters/ConnectionPool.html"]
- id: CR-RAIL-012
  text: Use form objects for forms that span multiple models or have complex validation. Never use accepts_nested_attributes_for
    for complex forms.
  why: accepts_nested_attributes_for creates tightly coupled models where validation logic leaks across model boundaries,
    error messages are confusing, and the controller params structure becomes deeply nested and hard to debug. Form objects
    provide a clean boundary with explicit validation, meaningful error messages, and testable business logic.
  how_to_do_right: '1. Create a form object including ActiveModel::Model for validations.

    2. Define explicit attributes matching the form fields.

    3. Implement #save that wraps multiple model operations in a transaction.

    4. Add meaningful validations at the form level (cross-field, business rules).

    5. Use form_with model: @form in views for standard Rails form helpers.

    '
  severity: medium
  technologies:
    lang: [ruby]
    framework: [rails]
    library: [activemodel]
  domains:
    domain: [architecture]
    concern: [backend]
  example_good: "# app/forms/registration_form.rb\nclass RegistrationForm\n  include ActiveModel::Model\n  include ActiveModel::Attributes\n\
    \n  attribute :name, :string\n  attribute :email, :string\n  attribute :company_name, :string\n  attribute :plan, :string\n\
    \  attribute :terms_accepted, :boolean\n\n  validates :name, :email, :company_name, :plan, presence: true\n  validates\
    \ :email, format: { with: URI::MailTo::EMAIL_REGEXP }\n  validates :terms_accepted, acceptance: true\n  validates :plan,\
    \ inclusion: { in: %w[starter pro enterprise] }\n\n  def save\n    return false unless valid?\n\n    ActiveRecord::Base.transaction\
    \ do\n      company = Company.create!(name: company_name, plan: plan)\n      user = User.create!(name: name, email: email,\
    \ company: company, role: :admin)\n      Subscription.create!(company: company, plan: plan, trial_ends_at: 14.days.from_now)\n\
    \    end\n    true\n  rescue ActiveRecord::RecordInvalid => e\n    errors.add(:base, e.message)\n    false\n  end\nend\n\
    \n# Controller\ndef create\n  @form = RegistrationForm.new(registration_params)\n  if @form.save\n    redirect_to dashboard_path\n\
    \  else\n    render :new, status: :unprocessable_entity\n  end\nend\n"
  example_bad: "# Wrong: accepts_nested_attributes_for — tangled validations, confusing errors\nclass User < ApplicationRecord\n\
    \  has_one :company\n  accepts_nested_attributes_for :company\n  # Validation errors: \"Company name can't be blank\"\
    \ — user sees \"Company\" not \"Company name\"\n  # Params: { user: { name: \"\", company_attributes: { name: \"\", plan:\
    \ \"\" } } }\n  # Debugging: which model failed? Where is the validation?\nend\n"
  when_applies: Projects using Ruby on Rails or ActiveModel
  when_not_applies: small scripts under 100 lines, single-purpose utilities. projects not using Ruby on Rails or ActiveModel
  sources: ["https://api.rubyonrails.org/classes/ActiveModel/Model.html", "https://guides.rubyonrails.org/active_model_basics.html"]
