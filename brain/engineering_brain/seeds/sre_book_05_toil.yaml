layer: rules
technology: SRE
domain: reliability
knowledge:
- id: CR-SRE-TOIL-001
  text: Toil is not just "work I do not like." It has a precise definition — manual, repetitive, automatable, tactical, devoid
    of enduring value, and scales linearly with service size. If work does not meet ALL these criteria, it is not toil.
  why: 'Google needed a rigorous definition because without one, engineers label everything they dislike as "toil" and demand
    automation for tasks that are actually valuable engineering work. Writing a postmortem is manual and repetitive but NOT
    toil — it produces enduring value (learning). Debugging a novel production issue is tactical but NOT toil — it requires
    human judgment and is not automatable. Restarting a crashed server for the 50th time IS toil — it is manual, repetitive,
    automatable, produces no enduring value, and the need for it grows with fleet size. The distinction matters because toil
    reduction has high ROI (automation pays for itself) while automating non-toil can be wasteful or counterproductive.

    '
  how_to_do_right: '1. Apply all 6 criteria before labeling work as toil: manual, repetitive, automatable, tactical, no enduring
    value, O(n) scaling.

    2. Track toil explicitly: have each team member log what percentage of their week was toil.

    3. If a task fails even one criterion, it may be valuable work in disguise — investigate before automating.

    4. Common false-toil: postmortems (creates learning), code reviews (creates quality), capacity planning (creates strategic
    value).

    5. Common real-toil: manual deployments, certificate renewals, ticket-driven access grants, log rotation, backup verification.

    6. Revisit the classification quarterly — tasks that were once novel problem-solving become toil once the process is well-understood.

    '
  severity: high
  technologies:
    lang: [general]
  domains:
    domain: [operations, reliability]
    concern: [maintenance, automation, toil]
  example_good: "# Classify work using all 6 toil criteria before labeling\nfrom dataclasses import dataclass\n\n@dataclass\nclass ToilAssessment:\n    task: str\n    manual: bool\n    repetitive: bool\n    automatable: bool\n    tactical: bool  # Reactive, not strategic\n    no_enduring_value: bool\n    scales_linearly: bool  # O(n) with service size\n\n    @property\n    def is_toil(self) -> bool:\n        return all([self.manual, self.repetitive, self.automatable,\n                    self.tactical, self.no_enduring_value, self.scales_linearly])\n\n# Real toil: manual server restart\nrestart = ToilAssessment('restart crashed server', True, True, True, True, True, True)\nassert restart.is_toil  # True — automate this\n\n# Not toil: writing postmortems (produces enduring value)\npostmortem = ToilAssessment('write postmortem', True, True, False, True, False, False)\nassert not postmortem.is_toil  # False — do NOT automate away\n"
  example_bad: "# Anti-pattern: labeling everything disliked as 'toil'\ndef classify_work(task: str) -> str:\n    if task in ['meetings', 'code reviews', 'postmortems', 'capacity planning']:\n        return 'toil'  # Wrong! These produce enduring value\n    # Meetings are overhead, not toil\n    # Code reviews create quality\n    # Postmortems create organizational learning\n    # Automating these would be counterproductive\n"
  when_applies: "When classifying operational work to determine automation priorities and toil reduction targets"
  sources:
  - url: https://sre.google/sre-book/eliminating-toil/
    title: 'Google SRE Book — Chapter 5: Eliminating Toil'
  validation_status: cross_checked
- id: CR-SRE-TOIL-002
  text: Enforce the 50% rule — SRE teams must spend at least 50% of their time on engineering work that permanently reduces
    future toil. If toil exceeds 50%, the team is drowning and will eventually fail.
  why: 'Google mandates this as a hard organizational rule, not a suggestion. Without it, toil naturally expands to fill 100%
    of available time — every new service, feature, and user adds more operational work. Google''s data shows SRE teams average
    33% toil, with a range from 0% (highly automated teams) to 80% (teams in crisis). Teams at 80% toil cannot invest in automation,
    which means toil never decreases, which means they stay at 80% forever — a death spiral. The 50% cap creates a forcing
    function: when toil approaches 50%, the team MUST either automate, push back on new operational burden, or request headcount.
    The remaining 50%+ goes to engineering projects that produce permanent improvements — automation, self-healing, better
    monitoring — which in turn reduces future toil.

    '
  how_to_do_right: '1. Measure toil percentage weekly per team member. Use time tracking or estimation.

    2. If any individual exceeds 50% toil for 2+ sprints, treat it as a priority incident.

    3. When toil approaches 50%: identify the top 3 toil sources by time spent.

    4. Prioritize automation of the highest-time toil source — even if it takes 2 sprints to build.

    5. If the team cannot reduce toil below 50% with automation alone, escalate for headcount or service transfers.

    6. Leadership must protect the 50% engineering time — do not allow "urgent" operational requests to erode it.

    '
  severity: critical
  technologies:
    lang: [general]
  domains:
    domain: [operations, reliability]
    concern: [maintenance, toil]
  example_good: "# Enforce the 50% rule with tracking\nfrom dataclasses import dataclass\n\n@dataclass\nclass WeeklyTimeAllocation:\n    engineer: str\n    engineering_hours: float  # Automation, tooling, architecture\n    toil_hours: float         # Manual operational work\n    overhead_hours: float     # Meetings, HR, training\n\n    @property\n    def toil_pct(self) -> float:\n        total = self.engineering_hours + self.toil_hours + self.overhead_hours\n        return self.toil_hours / total * 100\n\n    def is_healthy(self) -> bool:\n        return self.toil_pct < 50\n\nweek = WeeklyTimeAllocation('alice', engineering_hours=22, toil_hours=14, overhead_hours=4)\nif not week.is_healthy():\n    print(f'ALERT: {week.engineer} at {week.toil_pct:.0f}% toil — escalate!')\n"
  example_bad: "# Anti-pattern: no toil tracking, 80% toil death spiral\ndef sre_daily_work():\n    restart_crashed_servers()      # 2 hours\n    process_access_tickets()       # 1.5 hours\n    manual_deployment()            # 1 hour\n    investigate_flaky_alerts()     # 1.5 hours\n    manual_certificate_renewal()   # 1 hour\n    # 7 hours of toil = 87.5% of 8-hour day\n    # Zero time for automation — toil never decreases\n    # Death spiral: more services → more toil → no automation → more toil\n"
  when_applies: "When measuring SRE team health and determining whether toil levels require escalation or intervention"
  sources:
  - url: https://sre.google/sre-book/eliminating-toil/
    title: 'Google SRE Book — Chapter 5: Eliminating Toil'
  validation_status: cross_checked
- id: CR-SRE-TOIL-003
  text: Toil scales linearly with service growth — if you do not automate, every new user, server, and feature adds proportional
    operational work. This means manual operations guarantee eventual team failure at scale.
  why: 'This is the most dangerous property of toil. A 10-person team managing 100 servers with manual processes can survive.
    The same team managing 10,000 servers cannot — they need 1,000 people, which no budget supports. Google operates millions
    of servers with relatively small SRE teams precisely because they automated aggressively. The math is simple: if restarting
    a crashed server takes 15 minutes of human time, and your fleet crashes 10 servers/day, that is 2.5 hours/day of toil.
    At 1,000 servers/day crash rate (same percentage at scale), that is 250 hours/day — impossible. Auto-restart (automation)
    costs engineering time once and then handles any scale. Every hour invested in toil automation is repaid infinitely at
    scale.

    '
  how_to_do_right: '1. For every manual task, estimate its time at 10x current scale. If it becomes infeasible, automate NOW
    — not when it becomes a crisis.

    2. Calculate the "break-even point" for automation: if the automation takes 40 hours to build and saves 1 hour/week, it
    pays for itself in 10 months.

    3. Prioritize automating toil that scales worst: tasks proportional to user count > server count > deployment count.

    4. Build self-service tooling: instead of SRE manually granting permissions, build a self-service portal.

    5. Design services for operability from day one: automated deployment, automated rollback, automated scaling, automated
    recovery.

    6. Track "operational cost per 1000 users" as a key metric. If this number grows, toil is winning.

    '
  severity: critical
  technologies:
    platform: [cloud, ansible, kubernetes, terraform]
  domains:
    domain: [operations, performance, reliability]
    concern: [maintenance, automation, toil, scaling]
  example_good: "# Automate with break-even calculation\ndef automation_roi(manual_hours_per_week: float, automation_build_hours: float,\n                   fleet_growth_rate: float = 0.1) -> dict:\n    \"\"\"Calculate when automation pays for itself.\"\"\"\n    break_even_weeks = automation_build_hours / manual_hours_per_week\n    # At 10x scale, manual cost = 10x. Automation cost = same.\n    cost_at_10x_manual = manual_hours_per_week * 10 * 52  # Annual at 10x\n    cost_at_10x_auto = automation_build_hours  # One-time\n    return {\n        'break_even_weeks': break_even_weeks,\n        'annual_savings_at_10x': cost_at_10x_manual - cost_at_10x_auto,\n        'verdict': 'AUTOMATE' if break_even_weeks < 52 else 'DEFER',\n    }\n\nprint(automation_roi(manual_hours_per_week=4, automation_build_hours=40))\n# Break-even in 10 weeks, saves 2040 hours/year at 10x scale\n"
  example_bad: "# Anti-pattern: manual process that does not scale\ndef restart_crashed_server(server_id: str):\n    ssh(server_id)\n    run('systemctl restart myservice')\n    verify_health(server_id)\n    # 15 minutes per restart. 10 crashes/day at current scale = 2.5 hours/day\n    # At 10x scale: 100 crashes/day = 25 hours/day (impossible)\n    # Linear scaling guarantees eventual team failure\n"
  when_applies: "When evaluating whether to automate a manual process, especially for tasks whose volume grows with service or fleet size"
  sources:
  - url: https://sre.google/sre-book/eliminating-toil/
    title: 'Google SRE Book — Chapter 5: Eliminating Toil'
  validation_status: cross_checked
- id: CR-SRE-TOIL-004
  text: Running a script manually is still toil — even if the script automates the underlying work. True automation means
    the script runs itself, triggered by conditions, with no human in the loop.
  why: 'Many teams confuse "I wrote a script" with "I automated this." If a human must detect the condition, decide to run
    the script, execute it, and verify the result, that is four manual steps wrapped around one automated step. The human
    is the bottleneck, the error source, and the scaling constraint. Google distinguishes between three levels: manual (human
    does everything), semi-automated (human triggers a script), and fully automated (system detects, acts, and verifies without
    human involvement). Semi-automated is better than manual but still toil — it still requires a human to notice the problem
    and decide to act. Only full automation eliminates the toil. Semi-automation is a valid intermediate step but should never
    be the end state.

    '
  how_to_do_right: '1. Audit your "automated" processes: if a human must trigger, monitor, or verify them, they are semi-automated
    at best.

    2. For each semi-automated task, identify what triggers the human: an alert? A ticket? A scheduled time?

    3. Replace the human trigger with a system trigger: cron job, event-driven webhook, Kubernetes operator, monitoring alert
    → auto-remediation.

    4. Add verification to the automation: after the script runs, validate the outcome and alert only on failure.

    5. Track "human touches per incident" as a metric. Target: zero for known failure modes, human involvement only for novel
    issues.

    6. Build runbooks as code: instead of documenting steps for a human to follow, encode those steps as executable automation.

    '
  severity: high
  technologies:
    lang: [python]
    platform: [ansible, kubernetes, terraform]
  domains:
    domain: [operations, reliability]
    concern: [maintenance, automation, toil]
  example_good: "# Fully automated remediation — no human in the loop\nimport subprocess\n\ndef auto_remediate_disk_full(mount_point: str, threshold: float = 0.90):\n    \"\"\"System detects, acts, and verifies without human involvement.\"\"\"\n    usage = get_disk_usage(mount_point)\n    if usage > threshold:\n        # Detect: automated monitoring\n        # Act: automated cleanup\n        cleaned = cleanup_old_logs(mount_point, days=7)\n        # Verify: automated check\n        new_usage = get_disk_usage(mount_point)\n        if new_usage < threshold:\n            log_success(f'Auto-remediated disk: {usage:.0%} -> {new_usage:.0%}')\n        else:\n            alert_human('Auto-remediation failed — manual intervention needed')\n\n# Triggered by monitoring webhook, not by a human reading an alert\n"
  example_bad: "# Anti-pattern: semi-automated — human still in the loop\ndef handle_disk_alert():\n    # Step 1: Human reads PagerDuty alert (manual trigger)\n    # Step 2: Human SSHs into server (manual decision)\n    # Step 3: Human runs cleanup script (manual execution)\n    subprocess.run(['./cleanup_logs.sh'])  # Script is 'automated'\n    # Step 4: Human verifies result (manual verification)\n    # 4 manual steps wrapping 1 automated step\n    # Human is the bottleneck, error source, and scaling constraint\n"
  when_applies: "When evaluating whether operational scripts qualify as true automation or are merely semi-automated with a human trigger"
  sources:
  - url: https://sre.google/sre-book/eliminating-toil/
    title: 'Google SRE Book — Chapter 5: Eliminating Toil'
  validation_status: cross_checked
- id: CR-SRE-TOIL-005
  text: Excessive toil causes engineer attrition and career stagnation. The best engineers leave teams where they spend 80%
    of their time on repetitive manual work. Toil is a retention and hiring problem, not just an efficiency problem.
  why: 'Google treats toil as a people problem, not just a technical one. SREs who joined to do engineering work but spend
    their days restarting servers and processing tickets become frustrated, disillusioned, and eventually leave. The loss
    is compounding: experienced engineers who leave take institutional knowledge with them, and the remaining team has even
    less capacity for automation, increasing toil further. Additionally, high-toil teams struggle to hire: top candidates
    ask "what percentage of your time is operations vs. engineering?" and choose teams with lower toil ratios. Google also
    found that toil creates confusion about SRE''s mission — if SREs only do operations, leadership questions why they are
    paid engineering salaries, which leads to organizational erosion of the SRE function.

    '
  how_to_do_right: '1. Include toil percentage in team health metrics reviewed by leadership quarterly.

    2. Set toil reduction as an explicit promotion criterion: engineers who automate toil are promoted, not just engineers
    who heroically handle it.

    3. Never praise firefighting as a virtue — praise fire prevention (automation that eliminated the need to fight fires).

    4. In hiring conversations, be transparent about current toil percentage and the plan to reduce it.

    5. Rotate toil duty so no single engineer bears disproportionate burden. Track per-person toil hours.

    6. If a team''s toil consistently exceeds 50% despite automation efforts, escalate to leadership for structural intervention
    (more headcount, service transfer, or feature freeze).

    '
  severity: high
  technologies:
    lang: [general]
  domains:
    domain: [management, culture, operations, reliability]
    concern: [maintenance, toil]
  example_good: "# Toil reduction as explicit promotion criterion\nclass EngineerReview:\n    def __init__(self, name: str):\n        self.name = name\n        self.toil_automated = []  # Toil sources eliminated\n        self.fires_fought = []    # Incidents handled heroically\n\n    def promotion_score(self) -> dict:\n        return {\n            'fire_prevention': len(self.toil_automated) * 10,  # High value\n            'firefighting': len(self.fires_fought) * 2,        # Low value\n            'message': 'Praise fire prevention, not firefighting',\n        }\n\nengineer = EngineerReview('alice')\nengineer.toil_automated.append('Automated cert renewal: 4hrs/month saved')\nengineer.toil_automated.append('Built self-service access portal: 8hrs/month saved')\nprint(engineer.promotion_score())  # Prevention valued 5x over firefighting\n"
  example_bad: "# Anti-pattern: praising heroic firefighting\ndef performance_review(engineer):\n    # 'Alice stayed up all night fixing the database!'\n    # Praised for heroics, not for preventing the issue\n    score = len(engineer.incidents_handled) * 10  # More fires = better?\n    # Engineers learn: break things, fix them heroically, get promoted\n    # No incentive to automate away the need for firefighting\n    # Best engineers leave — 80% toil, no career growth\n"
  when_applies: "When toil is causing engineer attrition or when team culture rewards firefighting over prevention and automation"
  sources:
  - url: https://sre.google/sre-book/eliminating-toil/
    title: 'Google SRE Book — Chapter 5: Eliminating Toil'
  validation_status: cross_checked
- id: CR-SRE-TOIL-006
  text: Distinguish between toil and overhead. Meetings, email, HR processes, and training are overhead — they are not production-related,
    not automatable in the toil sense, and labeling them as toil confuses the measurement.
  why: 'Google separates work into three categories: engineering (permanent improvements), toil (production-related manual
    work), and overhead (organizational necessities). Conflating toil and overhead inflates the toil metric and misdirects
    automation efforts. You cannot automate a design review meeting, but you CAN automate the deployment process that the
    meeting discusses. Teams that label overhead as toil waste time trying to eliminate necessary organizational functions
    instead of focusing on the production-related manual work that actually scales linearly. The distinction is: toil is tied
    to running production services; overhead is tied to being part of an organization. Both consume time, but only toil threatens
    to grow unboundedly with service scale.

    '
  how_to_do_right: '1. Categorize all time into three buckets: engineering (creates permanent value), toil (production manual
    work), overhead (organizational).

    2. Target: engineering > 50%, toil < 33%, overhead < 20%.

    3. Do not automate overhead — optimize it through better processes (shorter meetings, async communication).

    4. Do automate toil — the ROI is direct and scales with service growth.

    5. If overhead exceeds 25%, it is an organizational problem — escalate to management, not to the automation backlog.

    6. Track all three categories weekly. Toil and overhead creep up silently if not measured.

    '
  severity: medium
  technologies:
    lang: [general]
  domains:
    domain: [operations, reliability]
    concern: [maintenance, toil]
  example_good: "# Three-bucket time categorization\n@dataclass\nclass TimeTracking:\n    engineering: float  # Permanent improvements: automation, tooling\n    toil: float         # Production manual work: restarts, tickets\n    overhead: float     # Organizational: meetings, email, training\n\n    def is_healthy(self) -> bool:\n        total = self.engineering + self.toil + self.overhead\n        return (self.engineering / total > 0.50 and  # > 50% engineering\n                self.toil / total < 0.33 and         # < 33% toil\n                self.overhead / total < 0.20)         # < 20% overhead\n\n    def action(self) -> str:\n        total = self.engineering + self.toil + self.overhead\n        if self.overhead / total > 0.25:\n            return 'ORGANIZATIONAL_PROBLEM: reduce meetings, use async'\n        if self.toil / total > 0.33:\n            return 'AUTOMATION_NEEDED: automate top toil source'\n        return 'HEALTHY'\n"
  example_bad: "# Anti-pattern: conflating toil and overhead\ndef categorize(task: str) -> str:\n    if task in ['restart server', 'process tickets', 'meetings', 'email']:\n        return 'toil'  # Meetings are overhead, not toil!\n    # Inflated toil metric misdirects automation efforts\n    # Team tries to 'automate' meetings instead of fixing production processes\n    # Overhead needs process optimization, not automation\n"
  when_applies: "When categorizing team activities into engineering, toil, and overhead to identify correct interventions for each"
  sources:
  - url: https://sre.google/sre-book/eliminating-toil/
    title: 'Google SRE Book — Chapter 5: Eliminating Toil'
  validation_status: cross_checked
- id: CR-SRE-TOIL-007
  text: The on-call rotation sets a minimum toil floor. A 6-person rotation with primary+secondary means at least 33% of the
    team is always doing operational work. Size your team and rotation to keep this floor well below 50%.
  why: 'Google''s math: in a 6-person rotation with primary and secondary on-call, at any given time 2 out of 6 people (33%)
    are handling interrupts. In an 8-person rotation, it drops to 25% (2/8). This floor exists BEFORE any other toil — it
    is the minimum operational cost of running a service with on-call coverage. If on-call alone consumes 33%, only 17% headroom
    remains before hitting the 50% toil cap. Teams that do not account for this floor find themselves over the 50% limit before
    any tickets, deployments, or maintenance tasks are considered. The fix is either larger rotation pools (spreading on-call
    across more people) or reducing on-call burden through automation (reducing the number of pages per shift).

    '
  how_to_do_right: '1. Calculate your on-call toil floor: (on-call_positions / team_size) × 100%.

    2. Target on-call floor < 25% — this means at least an 8-person rotation for primary+secondary.

    3. If the team is too small for an 8-person rotation, share on-call with development teams or automate aggressively.

    4. Track pages per shift. If > 2 pages/shift on average, the service needs reliability investment, not more on-call engineers.

    5. Measure "on-call toil" separately from "non-on-call toil" — they have different solutions (rotation size vs. automation).

    6. On-call handoffs should include toil transfer: what repetitive tasks did this shift handle that should be automated?

    '
  severity: high
  technologies:
    lang: [general]
    platform: [pagerduty]
  domains:
    domain: [operations, reliability]
    concern: [maintenance, toil, on_call]
  example_good: "# Calculate on-call toil floor to ensure it fits under 50%\ndef oncall_toil_floor(team_size: int, oncall_positions: int = 2) -> dict:\n    \"\"\"Calculate minimum toil percentage from on-call alone.\"\"\"\n    floor_pct = (oncall_positions / team_size) * 100\n    headroom = 50 - floor_pct  # Remaining before hitting 50% cap\n    return {\n        'team_size': team_size,\n        'oncall_floor_pct': floor_pct,\n        'headroom_for_other_toil': headroom,\n        'healthy': floor_pct < 25,\n        'recommendation': f'Need >= {oncall_positions * 4} engineers for healthy rotation'\n    }\n\nprint(oncall_toil_floor(6))   # 33% floor — only 17% headroom!\nprint(oncall_toil_floor(8))   # 25% floor — 25% headroom (target)\nprint(oncall_toil_floor(10))  # 20% floor — 30% headroom (healthy)\n"
  example_bad: "# Anti-pattern: small team with high on-call floor\nTEAM_SIZE = 4\nONCALL_POSITIONS = 2  # primary + secondary\n# On-call floor = 50% — BEFORE any other toil\n# Zero headroom for tickets, deployments, or maintenance\n# Team is over 50% toil by definition, cannot invest in automation\n# Death spiral inevitable\n"
  when_applies: "When sizing on-call rotations or evaluating whether on-call burden alone pushes toil above the 50% threshold"
  sources:
  - url: https://sre.google/sre-book/eliminating-toil/
    title: 'Google SRE Book — Chapter 5: Eliminating Toil'
  validation_status: cross_checked
- id: CR-SRE-TOIL-008
  text: Engineering work is the antidote to toil. It is novel, requires human judgment, produces permanent improvements, and
    — critically — enables the team to handle larger services WITHOUT proportional headcount increases.
  why: 'The SRE Book defines engineering work as the inverse of toil in every dimension. Where toil is repetitive, engineering
    is novel. Where toil is automatable, engineering requires human judgment. Where toil scales O(n), engineering improvements
    make future work O(1) or O(log n). The key insight is the last point: engineering work is what allows Google to operate
    millions of servers with small teams. Every automation built, every self-healing system designed, every monitoring improvement
    deployed permanently reduces the human cost of running the service. This is why Google insists on the 50% engineering
    time rule — it is not a perk for engineers, it is an existential requirement for operating at Google''s scale. Without
    continuous engineering investment, toil grows until the team collapses.

    '
  how_to_do_right: '1. Define "engineering work" for your team: automation projects, reliability improvements, tooling, monitoring
    enhancements, architecture changes.

    2. Protect engineering time in the sprint — do not allow toil to eat into planned engineering work without explicit escalation.

    3. Measure engineering output: what permanent improvements were delivered this quarter? How much toil did they eliminate?

    4. Engineering work should have clear success criteria: "This automation will reduce deployment toil from 4 hours/week
    to 0."

    5. Encourage engineers to convert toil into engineering projects: "I restarted servers 20 times this month → I will build
    auto-restart this quarter."

    6. Review engineering projects against their toil reduction targets — hold teams accountable for delivering the promised
    improvements.

    '
  severity: high
  technologies:
    lang: [general, go, python]
  domains:
    domain: [operations, reliability]
    concern: [maintenance, automation, toil]
  example_good: "# Engineering work that permanently reduces future toil\nclass AutomationProject:\n    def __init__(self, name: str, build_hours: float, toil_saved_per_week: float):\n        self.name = name\n        self.build_hours = build_hours\n        self.toil_saved_per_week = toil_saved_per_week\n\n    @property\n    def annual_roi(self) -> float:\n        annual_savings = self.toil_saved_per_week * 52\n        return (annual_savings - self.build_hours) / self.build_hours\n\nprojects = [\n    AutomationProject('Auto-restart daemon', 40, 4),     # 420% ROI\n    AutomationProject('Self-service access portal', 80, 8),  # 420% ROI\n    AutomationProject('Automated canary analysis', 120, 6),  # 160% ROI\n]\n# Each project permanently reduces toil — O(1) cost for O(n) benefit\nfor p in projects:\n    print(f'{p.name}: {p.annual_roi:.0%} annual ROI')\n"
  example_bad: "# Anti-pattern: no protected engineering time\ndef daily_work():\n    # 100% reactive — no time for automation\n    while True:\n        ticket = get_next_ticket()\n        manually_handle(ticket)\n    # Never builds automation because 'too busy'\n    # Toil grows linearly with service growth\n    # Team can NEVER catch up\n"
  when_applies: "When planning sprint work and deciding how to allocate time between reactive operational tasks and proactive automation projects"
  sources:
  - url: https://sre.google/sre-book/eliminating-toil/
    title: 'Google SRE Book — Chapter 5: Eliminating Toil'
  validation_status: cross_checked
- id: CR-SRE-TOIL-009
  text: The top three sources of toil at Google are interrupts, on-call response, and release/push processes. These three
    areas have the highest ROI for automation investment because they consume the most human time.
  why: 'Google surveyed SRE teams and found these three categories consistently dominate toil budgets. Interrupts (non-urgent
    emails, chat requests, ticket queues) consume time in small increments that add up massively — a 5-minute interruption
    every 30 minutes means 17% of the day is lost to context switching alone. On-call response is the most visible toil (pages,
    incident management, post-incident cleanup). Release/push processes include building, testing, deploying, monitoring canaries,
    and rollback decisions. All three are amenable to automation: interrupts through self-service tooling, on-call through
    auto-remediation, and releases through CI/CD pipelines. Targeting these three first yields the fastest toil reduction.

    '
  how_to_do_right: '1. Measure time spent on each toil category separately. Do not lump them together.

    2. For interrupts: build self-service tools (access management, config changes, status pages) to deflect requests.

    3. For on-call: build auto-remediation for the top 5 most frequent page causes. Each automated remediation permanently
    reduces toil.

    4. For releases: build fully automated CI/CD with automated canary analysis, automated rollback, and zero-touch deployments.

    5. Set targets per category: interrupts < 10% of time, on-call < 15%, releases < 5%.

    6. Track month-over-month trends. If any category is increasing, the service is growing faster than automation.

    '
  severity: high
  technologies:
    platform: [deployment, kubernetes, pagerduty]
  domains:
    domain: [operations, reliability]
    concern: [maintenance, automation, toil]
  example_good: "# Target top 3 toil sources with automation\nTOIL_SOURCES = [\n    {'category': 'interrupts', 'hours_per_week': 8,\n     'fix': 'Build self-service portal for access/config requests'},\n    {'category': 'on_call_response', 'hours_per_week': 6,\n     'fix': 'Auto-remediate top 5 page causes'},\n    {'category': 'release_process', 'hours_per_week': 4,\n     'fix': 'Fully automated CI/CD with canary analysis'},\n]\n\nTOIL_TARGETS = {\n    'interrupts': 0.10,      # < 10% of time\n    'on_call_response': 0.15, # < 15% of time\n    'release_process': 0.05,  # < 5% of time\n}\n\nfor source in TOIL_SOURCES:\n    print(f\"{source['category']}: {source['hours_per_week']}h/week -> Fix: {source['fix']}\")\n"
  example_bad: "# Anti-pattern: toil categories lumped together\ntotal_toil_hours = 18  # 'We have 18 hours of toil'\n# No breakdown by category — cannot prioritize\n# Cannot tell if problem is interrupts, on-call, or releases\n# 'Reduce toil' is too vague to act on\n# Each category needs a different solution\n"
  when_applies: "When prioritizing toil reduction efforts and determining which automation investments will yield the highest return"
