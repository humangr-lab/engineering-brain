- id: CR-SRE-TOIL-010
  text: Beware of toil transferred from development teams. When product teams ship features without operational tooling, they
    are implicitly transferring toil to SRE. Reject services that arrive with undocumented manual operational requirements.
  why: 'Google observed a pattern where development teams build features and "throw them over the wall" to SRE for operation.
    The feature works but requires manual steps to deploy, manual monitoring to verify, manual intervention to scale, and
    manual cleanup on failure. Each such feature adds permanent toil to the SRE team. Without pushback, the SRE team''s toil
    grows with every product launch while the development team faces no consequences. The SRE Book describes a feedback mechanism:
    SRE can refuse to onboard services that do not meet operational readiness criteria. This creates incentive for development
    teams to build operability into their services — automated deployment, health checks, auto-scaling, graceful degradation
    — before handing them to SRE.

    '
  how_to_do_right: '1. Define operational readiness criteria that services must meet before SRE accepts them: automated deployment,
    monitoring, runbooks, auto-scaling.

    2. Reject services that require manual operational steps with no automation timeline.

    3. Track "toil introduced per feature launch" as a metric visible to product leadership.

    4. Require development teams to own operational toil for the first N weeks after launch (eat your own dog food).

    5. Build a production readiness review (PRR) process that evaluates operational burden before launch.

    6. If a service consistently generates high toil, SRE can hand it back to development until it meets readiness criteria.

    '
  severity: high
  technologies:
    lang: [general]
  domains:
    domain: [operations, reliability]
    concern: [maintenance, toil]
  example_good: "# Production readiness criteria to prevent toil transfer\nPRODUCTION_READINESS_CRITERIA = {\n    'automated_deployment': True,     # No manual deploy steps\n    'health_checks': True,            # Service reports own health\n    'auto_scaling': True,             # Handles load without manual intervention\n    'runbooks': True,                 # Documented operational procedures\n    'monitoring_dashboards': True,    # Golden signals instrumented\n    'graceful_degradation': True,     # Fails safely under pressure\n    'rollback_automation': True,      # One-command rollback\n}\n\ndef accept_service(service_name: str, criteria: dict) -> bool:\n    missing = [k for k, v in criteria.items() if not v]\n    if missing:\n        print(f'REJECT {service_name}: missing {missing}')\n        return False\n    return True\n\n# Track: toil introduced per feature launch\n"
  example_bad: "# Anti-pattern: accepting services without operational readiness\ndef onboard_service(service_name: str):\n    # No readiness check — just take it\n    add_to_pagerduty(service_name)\n    # Service requires:\n    # - Manual SSH deploy (2 hours each)\n    # - Manual log rotation (weekly)\n    # - Manual scaling (during traffic spikes)\n    # - No health checks (find out it is down from user complaints)\n    # Each feature adds permanent toil to SRE team\n    # Dev team has no incentive to fix — 'not their problem'\n"
  when_applies: "When onboarding new services for SRE support, or when development teams ship features with undocumented manual operational requirements"
  sources:
  - url: https://sre.google/sre-book/eliminating-toil/
    title: 'Google SRE Book — Chapter 5: Eliminating Toil'
  validation_status: cross_checked
