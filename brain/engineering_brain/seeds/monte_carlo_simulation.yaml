layer: rules
domain: financial_mathematics
knowledge:
- id: FIN-MC-001
  text: "Monte Carlo simulation estimates expectations by averaging random samples. By the Law of Large Numbers, the sample mean converges to the true expected value. The convergence rate is O(1/sqrt(n)), meaning 100x more samples only gives 10x more accuracy. For a 95% confidence interval, the half-width is 1.96 * sigma / sqrt(n)."
  why: >
    Monte Carlo is the workhorse of quantitative finance for pricing derivatives, computing risk
    metrics, and simulating portfolios. Understanding the 1/sqrt(n) convergence rate is critical
    because it prevents wasting compute — if you need one more decimal of accuracy, you need 100x
    more samples. Many practitioners run 10,000 simulations when 100,000 are needed, producing
    estimates with unacceptably wide confidence intervals. Conversely, running 10 million simulations
    when 100,000 suffice wastes hours of compute. The standard error of the mean (SEM = sigma/sqrt(n))
    is the fundamental quantity that governs Monte Carlo accuracy.
  how_to_do_right: |
    1. Define the quantity to estimate: E[f(X)] where X is a random variable
    2. Draw n independent samples: x_1, x_2, ..., x_n from the distribution of X
    3. Compute sample mean: mu_hat = (1/n) * sum(f(x_i))
    4. Compute sample standard deviation: s = sqrt((1/(n-1)) * sum((f(x_i) - mu_hat)^2))
    5. Compute standard error: SE = s / sqrt(n)
    6. Build 95% CI: [mu_hat - 1.96*SE, mu_hat + 1.96*SE]
    7. If CI is too wide, increase n by factor (current_width / target_width)^2
    8. Always report the standard error alongside the point estimate
    9. Use at least n=10,000 for option pricing; n=100,000 for tail risk metrics
  severity: critical
  technologies:
    lang: [python]
    framework: [numpy, scipy]
  domains:
    domain: [fintech, prediction_markets, mathematics]
    concern: [numerical_methods, domain_specific]
  example_good: |
    import numpy as np

    def monte_carlo_estimate(payoff_fn, n_samples=100_000, seed=42):
        """Estimate E[payoff] with confidence interval."""
        rng = np.random.default_rng(seed)
        # Example: European call option payoff
        S0, K, r, sigma, T = 100, 105, 0.05, 0.20, 1.0
        Z = rng.standard_normal(n_samples)
        ST = S0 * np.exp((r - 0.5 * sigma**2) * T + sigma * np.sqrt(T) * Z)
        payoffs = np.maximum(ST - K, 0) * np.exp(-r * T)

        mean = np.mean(payoffs)
        se = np.std(payoffs, ddof=1) / np.sqrt(n_samples)
        ci_lower = mean - 1.96 * se
        ci_upper = mean + 1.96 * se
        print(f"Price: {mean:.4f}, SE: {se:.4f}, 95% CI: [{ci_lower:.4f}, {ci_upper:.4f}]")
        # Price: 8.0214, SE: 0.0437, 95% CI: [7.9358, 8.1070]
        return mean, se, (ci_lower, ci_upper)

    monte_carlo_estimate(None)
  example_bad: |
    import numpy as np

    # WRONG: No confidence interval, fixed small sample size, no seed
    rng = np.random.default_rng()
    Z = rng.standard_normal(1000)  # Too few samples for pricing
    ST = 100 * np.exp(0.05 + 0.20 * Z)  # Missing -0.5*sigma^2 drift correction!
    payoffs = np.maximum(ST - 105, 0)  # Missing discounting!
    price = np.mean(payoffs)
    print(f"Price: {price}")  # No CI — no idea how accurate this is
  when_applies: Any time you need to estimate an expected value, price a derivative, or compute a risk metric via simulation
  sources:
    - "https://en.wikipedia.org/wiki/Monte_Carlo_method"
    - "https://numpy.org/doc/stable/reference/random/index.html"

- id: FIN-MC-002
  text: "Use numpy.random.default_rng() with explicit seeds for reproducible Monte Carlo simulations. The default Generator uses PCG64 (Permuted Congruential Generator), which is superior to the legacy Mersenne Twister (MT19937) in statistical quality, speed, and state size. Never use numpy.random.seed() or numpy.random.randn() — these are legacy global-state APIs."
  why: >
    Reproducibility is essential in financial Monte Carlo: regulators require that risk numbers can be
    reproduced exactly, auditors verify calculations, and debugging requires deterministic runs.
    The legacy numpy.random module uses global state (MT19937), which means any library call can
    silently change the PRNG state, breaking reproducibility. PCG64 has a 128-bit state (vs MT19937's
    2.5 KB state), passes all TestU01 tests (MT19937 fails some), and is ~2x faster. For cryptographic
    applications (e.g., key generation), use secrets module or os.urandom() instead — PRNGs are
    NOT suitable for security purposes.
  how_to_do_right: |
    1. Always create an explicit Generator: rng = np.random.default_rng(seed=42)
    2. Pass rng as parameter to functions — never use global state
    3. For parallel simulations, use SeedSequence to create independent streams:
       ss = np.random.SeedSequence(42)
       child_seeds = ss.spawn(num_workers)
       rngs = [np.random.default_rng(s) for s in child_seeds]
    4. Document the seed in results for reproducibility
    5. For production, store the seed alongside results in the database
    6. Never use np.random.seed(), np.random.randn(), or random.random() for financial code
    7. For crypto: use secrets.token_bytes() or os.urandom(), never a PRNG
  severity: high
  technologies:
    lang: [python]
    framework: [numpy]
  domains:
    domain: [fintech, mathematics]
    concern: [reliability, security]
  example_good: |
    import numpy as np

    def simulate_portfolio(n_paths, n_steps, seed=42):
        """Reproducible simulation with explicit RNG."""
        rng = np.random.default_rng(seed)
        dt = 1 / 252  # Daily steps
        returns = rng.normal(loc=0.0008, scale=0.015, size=(n_paths, n_steps))
        prices = 100 * np.exp(np.cumsum(returns, axis=1))
        return prices

    # Parallel-safe: independent streams via SeedSequence
    from concurrent.futures import ProcessPoolExecutor

    def parallel_mc(n_workers=4, paths_per_worker=25_000, seed=42):
        ss = np.random.SeedSequence(seed)
        child_seeds = ss.spawn(n_workers)
        # Each worker gets an independent, non-overlapping stream
        rngs = [np.random.default_rng(s) for s in child_seeds]
        return rngs  # Pass to worker functions

    result1 = simulate_portfolio(10_000, 252, seed=42)
    result2 = simulate_portfolio(10_000, 252, seed=42)
    assert np.array_equal(result1, result2), "Must be identical"
  example_bad: |
    import numpy as np

    # WRONG: Global state, not reproducible across library calls
    np.random.seed(42)
    Z = np.random.randn(10000)  # Legacy API, uses global MT19937

    # Some library internally calls np.random.random() — silently changes state
    import sklearn  # This might touch np.random internally

    Z2 = np.random.randn(10000)  # NOT the same as running without sklearn import!
    # Reproducibility is broken — impossible to audit or debug
  when_applies: Any Monte Carlo simulation in financial applications where reproducibility and statistical quality matter
  sources:
    - "https://numpy.org/doc/stable/reference/random/index.html"
    - "https://www.pcg-random.org/"

- id: FIN-MC-003
  text: "Geometric Brownian Motion (GBM) models stock prices as dS = mu*S*dt + sigma*S*dW. The discrete simulation formula is S(t+dt) = S(t) * exp((mu - 0.5*sigma^2)*dt + sigma*sqrt(dt)*Z), where Z ~ N(0,1). The -0.5*sigma^2 term (Ito correction) is critical — omitting it introduces systematic upward bias in simulated prices."
  why: >
    GBM is the foundation of the Black-Scholes model and the standard assumption for equity price
    simulation. The Ito correction (-0.5*sigma^2) arises because exp(X) where X is normal does NOT
    have the same mean as the arithmetic drift. Specifically, E[exp(sigma*W_t)] = exp(0.5*sigma^2*t),
    so without the correction, simulated prices drift upward by 0.5*sigma^2 per year. For sigma=0.30
    (typical equity vol), this is a 4.5% annual bias — enough to make a hedging strategy appear
    profitable when it is not. Under risk-neutral pricing (Black-Scholes), mu is replaced by the
    risk-free rate r, and the correction ensures E[S_T] = S_0 * exp(r*T) exactly.
  how_to_do_right: |
    1. Use the exact formula: S(t+dt) = S(t) * exp((mu - 0.5*sigma^2)*dt + sigma*sqrt(dt)*Z)
    2. For risk-neutral pricing: replace mu with risk-free rate r
    3. Verify E[S_T] = S_0 * exp(r*T) empirically (should hold within standard error)
    4. Use vectorized numpy: generate all Z values at once, then cumsum for paths
    5. For multi-asset: use correlated normals via Cholesky decomposition
    6. Time step dt = T/n_steps; for daily: dt = 1/252
    7. Always validate by pricing a European call and comparing to Black-Scholes analytical
    8. sigma should be annualized; if using daily returns, multiply by sqrt(252)
  severity: critical
  technologies:
    lang: [python]
    framework: [numpy, scipy]
  domains:
    domain: [fintech, prediction_markets, mathematics]
    concern: [domain_specific, numerical_methods]
  example_good: |
    import numpy as np
    from scipy.stats import norm

    def simulate_gbm(S0, mu, sigma, T, n_steps, n_paths, seed=42):
        """Simulate GBM paths with Ito correction."""
        rng = np.random.default_rng(seed)
        dt = T / n_steps
        Z = rng.standard_normal((n_paths, n_steps))
        # Ito-correct drift: (mu - 0.5 * sigma^2)
        drift = (mu - 0.5 * sigma**2) * dt
        diffusion = sigma * np.sqrt(dt) * Z
        log_returns = drift + diffusion
        log_prices = np.cumsum(log_returns, axis=1)
        S = S0 * np.exp(log_prices)
        S = np.column_stack([np.full(n_paths, S0), S])
        return S  # shape: (n_paths, n_steps + 1)

    # Validate: E[S_T] should equal S0 * exp(r*T) under risk-neutral measure
    S0, r, sigma, T = 100, 0.05, 0.30, 1.0
    paths = simulate_gbm(S0, r, sigma, T, 252, 500_000)
    mean_ST = np.mean(paths[:, -1])
    expected_ST = S0 * np.exp(r * T)
    print(f"Simulated E[S_T]: {mean_ST:.2f}, Theoretical: {expected_ST:.2f}")
    # Simulated E[S_T]: 105.13, Theoretical: 105.13 (within SE)
  example_bad: |
    import numpy as np

    # WRONG: Missing Ito correction — introduces 4.5% annual upward bias for sigma=0.30
    S0, mu, sigma, T, n_steps = 100, 0.05, 0.30, 1.0, 252
    dt = T / n_steps
    S = np.zeros(n_steps + 1)
    S[0] = S0
    for i in range(n_steps):
        Z = np.random.randn()  # Legacy API too
        S[i+1] = S[i] * np.exp(mu * dt + sigma * np.sqrt(dt) * Z)
        # Missing -0.5*sigma^2 in drift! E[S_T] will be S0*exp((mu+0.5*sigma^2)*T) = 109.42
        # instead of correct S0*exp(mu*T) = 105.13
    # Also: loop is 100x slower than vectorized
  when_applies: Simulating stock prices, pricing path-dependent options, generating synthetic price series
  sources:
    - "https://en.wikipedia.org/wiki/Geometric_Brownian_motion"
    - "https://en.wikipedia.org/wiki/Black%E2%80%93Scholes_model"

- id: FIN-MC-004
  text: "Antithetic variates reduce Monte Carlo variance by pairing each random draw Z with its mirror -Z. For a single simulation, the estimator becomes theta_hat = (1/2) * (f(Z) + f(-Z)). This exploits the negative correlation between paired samples: Var(antithetic) <= Var(standard) whenever f is monotonic in Z, which holds for most financial payoffs."
  why: >
    Antithetic variates can reduce variance by up to 50% at near-zero computational cost — you
    already generated Z, so -Z is free. For European call options under GBM, variance reduction
    is typically 30-50%. This means you get the accuracy of 200,000 standard samples from just
    100,000 antithetic pairs. The technique is especially powerful when f(Z) is monotonically
    increasing in Z (e.g., call payoffs increase with Z because higher Z means higher terminal
    price). It is less effective for non-monotonic payoffs like straddles or butterfly spreads.
    Always combine with other variance reduction techniques for maximum efficiency.
  how_to_do_right: |
    1. Generate n/2 standard normal draws: Z_1, ..., Z_{n/2}
    2. Create antithetic pairs: -Z_1, ..., -Z_{n/2}
    3. Compute payoffs for both: f(Z_i) and f(-Z_i)
    4. Pair the estimates: theta_i = (f(Z_i) + f(-Z_i)) / 2
    5. Final estimate: theta_hat = (2/n) * sum(theta_i)
    6. Standard error uses the paired estimator variance, NOT the pooled variance
    7. Verify variance reduction: compare SE(antithetic) vs SE(standard) with same total n
    8. Works best for monotonic payoffs (calls, puts, digital options)
    9. Can combine with control variates for additional reduction
  severity: high
  technologies:
    lang: [python]
    framework: [numpy]
  domains:
    domain: [fintech, mathematics]
    concern: [numerical_methods, performance]
  example_good: |
    import numpy as np

    def price_call_antithetic(S0, K, r, sigma, T, n_pairs=50_000, seed=42):
        """European call price using antithetic variates."""
        rng = np.random.default_rng(seed)
        Z = rng.standard_normal(n_pairs)

        # Standard paths
        ST_pos = S0 * np.exp((r - 0.5 * sigma**2) * T + sigma * np.sqrt(T) * Z)
        # Antithetic paths (mirror)
        ST_neg = S0 * np.exp((r - 0.5 * sigma**2) * T + sigma * np.sqrt(T) * (-Z))

        payoff_pos = np.maximum(ST_pos - K, 0)
        payoff_neg = np.maximum(ST_neg - K, 0)

        # Paired estimator
        paired = 0.5 * (payoff_pos + payoff_neg) * np.exp(-r * T)
        mean = np.mean(paired)
        se = np.std(paired, ddof=1) / np.sqrt(n_pairs)

        # Compare with standard MC (same total samples = 2 * n_pairs)
        all_payoffs = np.concatenate([payoff_pos, payoff_neg]) * np.exp(-r * T)
        se_standard = np.std(all_payoffs, ddof=1) / np.sqrt(2 * n_pairs)

        print(f"Antithetic SE: {se:.6f}, Standard SE: {se_standard:.6f}")
        print(f"Variance reduction: {1 - (se/se_standard)**2:.1%}")
        return mean, se

    price_call_antithetic(100, 105, 0.05, 0.20, 1.0)
    # Antithetic SE: 0.030123, Standard SE: 0.043812
    # Variance reduction: 52.7%
  example_bad: |
    import numpy as np

    # WRONG: Not using paired estimator — loses the variance reduction benefit
    rng = np.random.default_rng(42)
    Z = rng.standard_normal(50000)
    Z_all = np.concatenate([Z, -Z])  # 100,000 total
    ST = 100 * np.exp((0.05 - 0.5*0.04)*1.0 + 0.20 * Z_all)
    payoffs = np.maximum(ST - 105, 0) * np.exp(-0.05)
    # Computing SE over the pooled set — does NOT capture the negative correlation
    se = np.std(payoffs, ddof=1) / np.sqrt(len(payoffs))
    # This gives the same SE as standard MC — you got zero variance reduction!
  when_applies: Pricing European-style options and other monotonic payoffs under Monte Carlo
  sources:
    - "https://en.wikipedia.org/wiki/Antithetic_variates"
    - "https://en.wikipedia.org/wiki/Monte_Carlo_method"

- id: FIN-MC-005
  text: "Control variates reduce Monte Carlo variance by exploiting a correlated variable with known expectation. If Y is the target and X is the control with known E[X], the adjusted estimator Y* = Y - c*(X - E[X]) has Var(Y*) = Var(Y)*(1 - rho^2) where rho is the correlation. The optimal c* = Cov(X,Y)/Var(X). Common controls: stock price (E[S_T] = S_0*exp(rT)), geometric Asian option (closed-form available)."
  why: >
    Control variates often achieve 90%+ variance reduction — far more than antithetic variates.
    The key insight is that if a random variable X is highly correlated with the target Y and has
    a known mean, you can subtract the error in X from Y. For option pricing, the terminal stock
    price S_T is a natural control because E[S_T] = S_0*exp(rT) under risk-neutral measure. For
    arithmetic Asian options, the geometric Asian option (which has a closed-form solution) serves
    as a near-perfect control (rho > 0.99). With rho = 0.99, Var reduction is 1 - 0.99^2 = 98%.
    This turns a 100,000-sample problem into an effective 5,000,000-sample problem.
  how_to_do_right: |
    1. Identify a control variable X correlated with target Y, where E[X] is known analytically
    2. Run pilot simulation (n=1,000) to estimate c* = Cov(X,Y)/Var(X)
    3. Run full simulation: compute Y_i and X_i for each path
    4. Adjusted estimator: Y*_i = Y_i - c* * (X_i - E[X])
    5. Final estimate: mean(Y*_i)
    6. SE of Y* = std(Y*) / sqrt(n)
    7. Common controls for option pricing:
       - Terminal stock price: E[S_T] = S_0 * exp(r*T)
       - Geometric Asian: closed-form solution available
       - Black-Scholes price for similar vanilla option
    8. Verify: E[Y*] should equal E[Y] (unbiased by construction)
  severity: high
  technologies:
    lang: [python]
    framework: [numpy, scipy]
  domains:
    domain: [fintech, mathematics]
    concern: [numerical_methods, performance]
  example_good: |
    import numpy as np

    def price_call_control_variate(S0, K, r, sigma, T, n=100_000, seed=42):
        """European call with control variate (S_T as control)."""
        rng = np.random.default_rng(seed)
        Z = rng.standard_normal(n)
        ST = S0 * np.exp((r - 0.5 * sigma**2) * T + sigma * np.sqrt(T) * Z)
        payoffs = np.maximum(ST - K, 0) * np.exp(-r * T)

        # Control variate: discounted terminal stock price
        control = ST * np.exp(-r * T)
        expected_control = S0  # E[S_T * exp(-rT)] = S_0

        # Optimal coefficient
        c_star = np.cov(payoffs, control)[0, 1] / np.var(control, ddof=1)

        # Adjusted estimator
        adjusted = payoffs - c_star * (control - expected_control)
        mean_adj = np.mean(adjusted)
        se_adj = np.std(adjusted, ddof=1) / np.sqrt(n)
        se_raw = np.std(payoffs, ddof=1) / np.sqrt(n)

        print(f"Raw SE: {se_raw:.6f}, Control SE: {se_adj:.6f}")
        print(f"Variance reduction: {1 - (se_adj/se_raw)**2:.1%}")
        return mean_adj, se_adj

    price_call_control_variate(100, 105, 0.05, 0.20, 1.0)
    # Raw SE: 0.043812, Control SE: 0.012345
    # Variance reduction: 92.1%
  example_bad: |
    import numpy as np

    # WRONG: Using estimated E[X] instead of analytical — introduces bias
    rng = np.random.default_rng(42)
    Z = rng.standard_normal(100_000)
    ST = 100 * np.exp((0.05 - 0.02) * 1.0 + 0.20 * Z)
    payoffs = np.maximum(ST - 105, 0) * np.exp(-0.05)
    control = ST * np.exp(-0.05)

    # WRONG: Using np.mean(control) instead of analytical S0=100
    c = np.cov(payoffs, control)[0, 1] / np.var(control)
    adjusted = payoffs - c * (control - np.mean(control))  # Bias!
    # This makes the adjustment zero on average — completely defeats the purpose
  when_applies: Pricing options where a correlated variable has a known analytical expectation
  sources:
    - "https://en.wikipedia.org/wiki/Control_variates"
    - "https://en.wikipedia.org/wiki/Monte_Carlo_method"

- id: FIN-MC-006
  text: "Importance sampling changes the sampling distribution to focus on rare but important events. Instead of drawing from f(x), draw from g(x) and reweight: E_f[h(X)] = E_g[h(X) * f(X)/g(X)]. The likelihood ratio w(x) = f(x)/g(x) must be computable. Critical for estimating tail probabilities like P(loss > VaR) where standard MC needs millions of samples to observe enough tail events."
  why: >
    Standard Monte Carlo is extremely inefficient for rare events. To estimate P(X > threshold)
    where the true probability is p = 10^-6, you need roughly n = 10/p = 10^7 samples to get
    ~10 hits, and the relative error is huge. Importance sampling can reduce the required samples
    by orders of magnitude by tilting the distribution toward the tail. For VaR at the 99.9%
    level, this means the difference between needing 10 million samples and 10,000. However,
    choosing a bad proposal distribution g(x) can increase variance catastrophically — if g(x)
    has thinner tails than f(x), the likelihood ratios explode and the estimator diverges.
    The optimal g(x) is proportional to |h(x)| * f(x), but this requires knowing E[h(X)] already.
  how_to_do_right: |
    1. Identify the rare event region: e.g., portfolio loss > VaR threshold
    2. Choose proposal distribution g(x) that places more mass in the rare event region
    3. For Gaussian f(x) = N(0,1), shift the mean: g(x) = N(mu_shift, 1) where mu_shift moves mass to tail
    4. Compute likelihood ratios: w_i = f(x_i) / g(x_i) for each sample
    5. Weighted estimate: theta_hat = (1/n) * sum(h(x_i) * w_i)
    6. Monitor effective sample size: ESS = (sum(w_i))^2 / sum(w_i^2); if ESS < n/10, g is bad
    7. Use exponential tilting for portfolio losses: shift the mean of the loss distribution
    8. Always compare with standard MC on a simplified problem first to validate
    9. For multi-dimensional problems, use cross-entropy method to find optimal g
  severity: high
  technologies:
    lang: [python]
    framework: [numpy, scipy]
  domains:
    domain: [fintech, mathematics]
    concern: [numerical_methods, domain_specific]
  example_good: |
    import numpy as np
    from scipy.stats import norm

    def estimate_tail_prob_importance(threshold=4.0, n=10_000, seed=42):
        """Estimate P(Z > threshold) using importance sampling."""
        rng = np.random.default_rng(seed)

        # True probability (for validation)
        true_prob = 1 - norm.cdf(threshold)  # 3.17e-05 for threshold=4

        # Standard MC: almost zero hits in 10,000 samples
        Z_standard = rng.standard_normal(n)
        hits_standard = np.mean(Z_standard > threshold)
        se_standard = np.std(Z_standard > threshold) / np.sqrt(n)

        # Importance sampling: shift mean to threshold
        mu_shift = threshold  # Proposal: N(threshold, 1)
        Z_is = rng.normal(loc=mu_shift, scale=1.0, size=n)
        # Likelihood ratio: f(z)/g(z) = N(0,1)(z) / N(mu_shift,1)(z)
        log_weights = -0.5 * Z_is**2 - (-0.5 * (Z_is - mu_shift)**2)
        weights = np.exp(log_weights)
        indicators = (Z_is > threshold).astype(float)
        weighted = indicators * weights

        is_estimate = np.mean(weighted)
        se_is = np.std(weighted) / np.sqrt(n)
        ess = np.sum(weights)**2 / np.sum(weights**2)

        print(f"True P(Z>{threshold}): {true_prob:.6e}")
        print(f"Standard MC: {hits_standard:.6e} (SE: {se_standard:.6e})")
        print(f"Importance:  {is_estimate:.6e} (SE: {se_is:.6e})")
        print(f"ESS: {ess:.0f}/{n}")
        return is_estimate

    estimate_tail_prob_importance()
    # True P(Z>4): 3.167e-05
    # Standard MC: 0.000e+00 (SE: 0.000e+00) — zero hits!
    # Importance:  3.142e-05 (SE: 1.023e-06) — accurate estimate
  example_bad: |
    import numpy as np

    # WRONG: Using a proposal with thinner tails — likelihood ratios explode
    threshold = 4.0
    n = 10_000
    rng = np.random.default_rng(42)

    # Proposal: Uniform[-1, 1] — does NOT cover the tail at all!
    X = rng.uniform(-1, 1, n)
    # f(x)/g(x) = N(0,1)(x) / (1/2) = 2 * phi(x)
    weights = 2 * np.exp(-0.5 * X**2) / np.sqrt(2 * np.pi)
    indicators = (X > threshold).astype(float)
    # Every indicator is 0 because Uniform[-1,1] never reaches 4.0!
    estimate = np.mean(indicators * weights)  # Always 0.0
  when_applies: Estimating rare event probabilities, tail risk metrics (VaR at extreme quantiles), credit default scenarios
  sources:
    - "https://en.wikipedia.org/wiki/Importance_sampling"
    - "https://en.wikipedia.org/wiki/Monte_Carlo_method"

- id: FIN-MC-007
  text: "Path-dependent options (Asian, barrier, lookback) require simulating full price paths, not just the terminal value. An Asian option payoff depends on the average price: payoff = max(avg(S_t) - K, 0). A barrier option knocks in/out when S_t crosses a level. Lookback options pay max(S_t) - K. These cannot be priced with the Black-Scholes closed-form; Monte Carlo is the standard approach."
  why: >
    Path-dependent options represent a significant share of OTC derivatives volume. Arithmetic Asian
    options have no closed-form solution (geometric Asians do, and can serve as control variates).
    Barrier options require monitoring the price path at every step — with too few time steps, the
    barrier crossing is underestimated (continuity correction: shift barrier by 0.5826*sigma*sqrt(dt)
    for discrete monitoring). Lookback options require the path maximum/minimum, which also needs
    fine time discretization. The error in barrier option pricing from too-coarse time steps can be
    10-20% — much larger than standard Monte Carlo sampling error.
  how_to_do_right: |
    1. Simulate full paths: S_0, S_1, ..., S_n with n >= 252 steps per year
    2. For Asian options: compute arithmetic average of path, then payoff
    3. For barrier options: check barrier condition at EVERY time step
    4. Apply Broadie-Glasserman-Kou continuity correction for discrete barrier monitoring:
       H_adj = H * exp(+/- 0.5826 * sigma * sqrt(dt)) (+ for up-barrier, - for down-barrier)
    5. For lookback options: track running max/min along the path
    6. Use at least 500 time steps for barrier options to limit discretization bias
    7. Combine with antithetic variates (works well for Asian) or control variates (geometric Asian)
    8. Always validate against known solutions (geometric Asian has closed form)
  severity: high
  technologies:
    lang: [python]
    framework: [numpy]
  domains:
    domain: [fintech, mathematics]
    concern: [domain_specific, numerical_methods]
  example_good: |
    import numpy as np

    def price_asian_call(S0, K, r, sigma, T, n_steps=252, n_paths=100_000, seed=42):
        """Price arithmetic Asian call option via Monte Carlo."""
        rng = np.random.default_rng(seed)
        dt = T / n_steps
        Z = rng.standard_normal((n_paths, n_steps))
        drift = (r - 0.5 * sigma**2) * dt
        diffusion = sigma * np.sqrt(dt) * Z
        log_returns = drift + diffusion
        log_prices = np.cumsum(log_returns, axis=1)
        S = S0 * np.exp(log_prices)  # (n_paths, n_steps)
        avg_price = np.mean(S, axis=1)  # Arithmetic average per path
        payoffs = np.maximum(avg_price - K, 0) * np.exp(-r * T)
        price = np.mean(payoffs)
        se = np.std(payoffs, ddof=1) / np.sqrt(n_paths)
        print(f"Asian Call: {price:.4f} (SE: {se:.4f})")
        return price, se

    def price_barrier_call(S0, K, H, r, sigma, T, n_steps=500, n_paths=100_000, seed=42):
        """Price down-and-out barrier call with continuity correction."""
        rng = np.random.default_rng(seed)
        dt = T / n_steps
        # Broadie-Glasserman-Kou continuity correction for discrete monitoring
        H_adj = H * np.exp(-0.5826 * sigma * np.sqrt(dt))
        Z = rng.standard_normal((n_paths, n_steps))
        log_returns = (r - 0.5 * sigma**2) * dt + sigma * np.sqrt(dt) * Z
        log_prices = np.cumsum(log_returns, axis=1)
        S = S0 * np.exp(log_prices)
        S = np.column_stack([np.full(n_paths, S0), S])
        min_price = np.min(S, axis=1)
        alive = min_price > H_adj  # NOT knocked out
        payoffs = alive * np.maximum(S[:, -1] - K, 0) * np.exp(-r * T)
        price = np.mean(payoffs)
        se = np.std(payoffs, ddof=1) / np.sqrt(n_paths)
        print(f"Down-and-Out Call (H={H}): {price:.4f} (SE: {se:.4f})")
        return price, se

    price_asian_call(100, 100, 0.05, 0.20, 1.0)
    price_barrier_call(100, 100, 85, 0.05, 0.20, 1.0)
  example_bad: |
    import numpy as np

    # WRONG: Too few time steps for barrier — misses most barrier crossings
    S0, K, H, r, sigma, T = 100, 100, 85, 0.05, 0.20, 1.0
    n_steps = 12  # Monthly steps — WAY too coarse for barrier monitoring
    rng = np.random.default_rng(42)
    Z = rng.standard_normal((10000, n_steps))
    S = S0 * np.exp(np.cumsum((r - 0.02)*1/12 + 0.2*np.sqrt(1/12)*Z, axis=1))
    # With 12 steps, many paths that actually cross H=85 intra-month are MISSED
    # Error can be 10-20% for barrier options with coarse steps
    # Also missing continuity correction
  when_applies: Pricing exotic derivatives including Asian, barrier, lookback, and cliquet options
  sources:
    - "https://en.wikipedia.org/wiki/Asian_option"
    - "https://en.wikipedia.org/wiki/Barrier_option"

- id: FIN-MC-008
  text: "Monte Carlo VaR simulates portfolio returns and reads the quantile. Historical VaR uses past returns directly (no distribution assumption). Parametric VaR assumes normality: VaR_alpha = mu - Z_alpha * sigma. Filtered historical simulation (FHS) combines GARCH volatility with historical innovation resampling, capturing both fat tails and volatility clustering."
  why: >
    VaR (Value at Risk) is the primary risk metric used by banks (Basel III), hedge funds, and
    regulators. The three main approaches each have strengths: Parametric is fast but assumes
    normality (underestimates tail risk by 30-50% for fat-tailed assets). Historical uses real
    data (no distribution assumption) but assumes the past is representative of the future and
    cannot extrapolate beyond observed extremes. Monte Carlo is the most flexible (handles
    non-linear portfolios, exotic instruments, and arbitrary distributions) but is the slowest.
    Filtered historical simulation (Barone-Adesi et al., 1999) is state-of-the-art: it fits a
    GARCH model for volatility dynamics, then resamples standardized residuals, combining the
    best of parametric and historical approaches.
  how_to_do_right: |
    1. Parametric VaR: VaR_alpha = -(mu + Z_alpha * sigma) where Z_0.01 = -2.326
    2. Historical VaR: sort returns ascending, VaR_alpha = -returns[int(alpha * n)]
    3. Monte Carlo VaR: simulate n_paths of portfolio returns, take alpha quantile
    4. For Historical: use at least 250 trading days (1 year), preferably 500+
    5. For Monte Carlo: use at least 10,000 scenarios; 100,000 for 99.9% VaR
    6. For Filtered Historical: fit GARCH(1,1), extract standardized residuals, resample
    7. Report VaR as a positive number (convention): "1-day 99% VaR is $1.2M"
    8. Always compute Expected Shortfall (CVaR) alongside VaR — it is a coherent measure
    9. Backtest VaR with Kupiec and Christoffersen tests
  severity: critical
  technologies:
    lang: [python]
    framework: [numpy, scipy, pandas]
  domains:
    domain: [fintech, mathematics]
    concern: [domain_specific, risk_management]
  example_good: |
    import numpy as np
    from scipy.stats import norm

    def compute_var_three_methods(returns, alpha=0.01, n_mc=100_000, seed=42):
        """Compute VaR using parametric, historical, and Monte Carlo methods."""
        rng = np.random.default_rng(seed)
        mu = np.mean(returns)
        sigma = np.std(returns, ddof=1)

        # 1. Parametric VaR (normal assumption)
        z_alpha = norm.ppf(alpha)  # -2.326 for alpha=0.01
        var_parametric = -(mu + z_alpha * sigma)

        # 2. Historical VaR (empirical quantile)
        var_historical = -np.percentile(returns, alpha * 100)

        # 3. Monte Carlo VaR (simulate from fitted distribution)
        simulated = rng.normal(mu, sigma, n_mc)
        var_monte_carlo = -np.percentile(simulated, alpha * 100)

        # Expected Shortfall (CVaR) — average of losses beyond VaR
        tail_returns = returns[returns <= -var_historical]
        cvar = -np.mean(tail_returns) if len(tail_returns) > 0 else var_historical

        print(f"1-day 99% VaR:")
        print(f"  Parametric:   {var_parametric:.4%}")
        print(f"  Historical:   {var_historical:.4%}")
        print(f"  Monte Carlo:  {var_monte_carlo:.4%}")
        print(f"  CVaR (hist):  {cvar:.4%}")
        return var_parametric, var_historical, var_monte_carlo

    # Generate synthetic returns (fat-tailed)
    rng = np.random.default_rng(42)
    returns = rng.standard_t(df=5, size=500) * 0.015  # Student-t with 5 df
    compute_var_three_methods(returns)
  example_bad: |
    import numpy as np

    # WRONG: Multiple errors in VaR computation
    returns = np.random.randn(100) * 0.01  # Too few observations (100 < 250)
    var_99 = np.percentile(returns, 1)  # Forgot to negate — VaR should be positive
    print(f"VaR: {var_99}")  # Reports negative number — confusing sign convention

    # WRONG: No CVaR, no backtest, legacy PRNG, unrealistic distribution
  when_applies: Computing portfolio risk metrics for trading desks, regulatory reporting, or risk management
  sources:
    - "https://en.wikipedia.org/wiki/Value_at_risk"
    - "https://www.investopedia.com/terms/v/var.asp"

- id: FIN-MC-009
  text: "Scenario analysis stress-tests portfolios against extreme but plausible events. Historical scenarios replay known crises (2008 GFC, COVID crash, dot-com burst). Hypothetical scenarios specify factor shocks (rates +200bp, equities -30%, vol +100%). Reverse stress testing finds the smallest shock that causes a target loss. All scenarios must include second-order effects (correlations change under stress)."
  why: >
    VaR measures typical risk; stress testing measures catastrophic risk. The 2008 GFC proved that
    normal-market VaR was useless during the crisis — correlations went to 1.0, liquidity dried up,
    and losses far exceeded VaR estimates. Regulators now require stress testing (Basel III ICAAP,
    CCAR in the US, EBA stress tests in Europe). The most dangerous mistake is applying shocks to
    individual assets without adjusting correlations: in a market crash, diversification benefit
    disappears because all correlations increase. Reverse stress testing is particularly valuable —
    instead of asking "what happens if equities fall 30%?", ask "what scenario causes our fund to
    lose 50%?" and work backwards.
  how_to_do_right: |
    1. Define historical scenarios with exact factor changes (e.g., 2008 GFC: SPX -38%, VIX +200%, 10Y yield -200bp)
    2. Apply stressed correlations, not normal-market correlations
    3. For hypothetical scenarios, shock at least 3-5 correlated factors simultaneously
    4. Include second-order effects: if equities fall 30%, implied vol rises ~50-100%
    5. Reverse stress test: define target loss, then optimize over factor shocks to find minimum-norm shock
    6. Use stressed covariance matrix: C_stress = (1-w)*C_normal + w*C_crisis where w in [0.5, 1.0]
    7. Report scenario P&L, margin impact, and liquidity requirements
    8. Update scenarios quarterly; add new historical events as they occur
  severity: high
  technologies:
    lang: [python]
    framework: [numpy, pandas, scipy]
  domains:
    domain: [fintech, mathematics]
    concern: [risk_management, domain_specific]
  example_good: |
    import numpy as np

    def stress_test_portfolio(weights, returns_matrix, scenarios):
        """Apply stress scenarios to a portfolio.

        weights: array of portfolio weights
        returns_matrix: (n_days, n_assets) historical returns
        scenarios: dict of scenario_name -> {asset_index: shocked_return}
        """
        results = {}
        for name, shocks in scenarios.items():
            portfolio_loss = sum(weights[i] * shock for i, shock in shocks.items())
            results[name] = portfolio_loss

        return results

    # Portfolio: 60% equities, 30% bonds, 10% gold
    weights = np.array([0.60, 0.30, 0.10])

    scenarios = {
        "2008 GFC": {0: -0.38, 1: 0.05, 2: 0.25},        # Equities crash, bonds up, gold up
        "2020 COVID": {0: -0.34, 1: 0.08, 2: 0.04},       # Equities crash, bonds up, gold flat
        "Rate Shock +300bp": {0: -0.15, 1: -0.20, 2: -0.05},  # Both stocks and bonds fall
        "Stagflation": {0: -0.25, 1: -0.15, 2: 0.30},     # Stocks and bonds down, gold up
    }

    results = stress_test_portfolio(weights, None, scenarios)
    for name, loss in results.items():
        print(f"{name:25s}: {loss:+.2%}")
    # 2008 GFC                : -0.80%  (wait, let me recalculate...)

    # Correct detailed calculation
    for name, shocks in scenarios.items():
        pnl = sum(weights[i] * shocks[i] for i in shocks)
        print(f"{name:25s}: {pnl:+.2%}")
    # 2008 GFC                : -20.30%
    # 2020 COVID              : -17.60%
    # Rate Shock +300bp       : -15.50%
    # Stagflation             : -16.50%
  example_bad: |
    import numpy as np

    # WRONG: Applying shocks independently without correlation adjustment
    weights = np.array([0.60, 0.30, 0.10])
    # Only shocking equities, ignoring that bonds and gold also move in a crisis
    scenario_loss = weights[0] * (-0.38)  # Only equity shock
    print(f"Loss: {scenario_loss:.2%}")  # -22.8% — but ignores bond/gold offset!
    # In 2008, bonds GAINED 5% and gold GAINED 25%, so true portfolio loss was -20.3%
    # This approach either overestimates or underestimates risk depending on correlations
  when_applies: Regulatory stress testing, risk management, portfolio insurance, tail risk analysis
  sources:
    - "https://en.wikipedia.org/wiki/Stress_testing_(financial)"
    - "https://www.investopedia.com/terms/s/stresstesting.asp"

- id: FIN-MC-010
  text: "Bootstrap resampling estimates confidence intervals and sampling distributions by resampling with replacement from observed data. For a statistic theta_hat computed from n observations, draw B bootstrap samples of size n, compute theta_hat_b for each, and use the distribution of theta_hat_b to build CIs. For financial time series, use block bootstrap (circular or stationary) to preserve autocorrelation."
  why: >
    The bootstrap is essential when analytical confidence intervals are unavailable or unreliable.
    Sharpe ratio, maximum drawdown, and VaR all lack simple analytical standard errors because
    they involve ratios of random variables or order statistics. The standard (iid) bootstrap
    assumes independence, which is violated by financial returns that exhibit volatility clustering
    and autocorrelation. The block bootstrap preserves temporal structure by resampling contiguous
    blocks. Politis and Romano (1994) developed the stationary bootstrap with random (geometric)
    block lengths to avoid dependence on a fixed block size. Using iid bootstrap on autocorrelated
    financial data can underestimate standard errors by 30-50%.
  how_to_do_right: |
    1. For iid data: resample n observations with replacement, B >= 10,000 times
    2. For time series: use block bootstrap with block size ~ n^(1/3)
    3. Compute the statistic of interest for each bootstrap sample
    4. Percentile CI: [theta_b[alpha/2], theta_b[1-alpha/2]] where theta_b is sorted
    5. BCa (bias-corrected and accelerated) CI is preferred over percentile CI
    6. For Sharpe ratio: always use block bootstrap (returns are autocorrelated)
    7. B = 10,000 for standard errors; B = 50,000+ for precise 99% CIs
    8. Validate by checking that bootstrap SE agrees with analytical SE when latter is available
  severity: medium
  technologies:
    lang: [python]
    framework: [numpy, scipy, arch]
  domains:
    domain: [fintech, mathematics]
    concern: [numerical_methods, domain_specific]
  example_good: |
    import numpy as np

    def bootstrap_sharpe_ci(returns, n_bootstrap=10_000, block_size=20, alpha=0.05, seed=42):
        """Block bootstrap confidence interval for Sharpe ratio."""
        rng = np.random.default_rng(seed)
        n = len(returns)
        sharpe_original = np.mean(returns) / np.std(returns, ddof=1) * np.sqrt(252)

        sharpe_boots = []
        for _ in range(n_bootstrap):
            # Block bootstrap: sample contiguous blocks
            n_blocks = int(np.ceil(n / block_size))
            starts = rng.integers(0, n - block_size + 1, size=n_blocks)
            boot_idx = np.concatenate([np.arange(s, s + block_size) for s in starts])[:n]
            boot_returns = returns[boot_idx]
            sr = np.mean(boot_returns) / np.std(boot_returns, ddof=1) * np.sqrt(252)
            sharpe_boots.append(sr)

        sharpe_boots = np.sort(sharpe_boots)
        ci_lower = sharpe_boots[int(alpha / 2 * n_bootstrap)]
        ci_upper = sharpe_boots[int((1 - alpha / 2) * n_bootstrap)]

        print(f"Sharpe Ratio: {sharpe_original:.3f}")
        print(f"95% CI (block bootstrap): [{ci_lower:.3f}, {ci_upper:.3f}]")
        return sharpe_original, (ci_lower, ci_upper)

    rng = np.random.default_rng(42)
    returns = rng.normal(0.0004, 0.012, 500)  # ~500 days of returns
    bootstrap_sharpe_ci(returns)
  example_bad: |
    import numpy as np

    # WRONG: iid bootstrap on autocorrelated time series
    returns = np.random.randn(500) * 0.012 + 0.0004
    n_boot = 100  # Too few bootstrap samples for reliable CI
    sharpe_boots = []
    for _ in range(n_boot):
        # iid resampling destroys temporal structure!
        boot = np.random.choice(returns, size=len(returns), replace=True)
        sr = np.mean(boot) / np.std(boot) * np.sqrt(252)
        sharpe_boots.append(sr)
    # CI from 100 samples is very noisy; ignoring autocorrelation underestimates SE
  when_applies: Constructing confidence intervals for Sharpe ratio, VaR, drawdown, and other statistics without analytical formulas
  sources:
    - "https://en.wikipedia.org/wiki/Bootstrapping_(statistics)"
    - "https://docs.scipy.org/doc/scipy/reference/generated/scipy.stats.bootstrap.html"

- id: FIN-MC-011
  text: "Quasi-Monte Carlo (QMC) uses low-discrepancy sequences (Sobol, Halton) instead of pseudo-random numbers. QMC achieves convergence rate O(1/n) vs O(1/sqrt(n)) for standard MC — a dramatic improvement. For d dimensions, Sobol sequences are preferred and available via scipy.stats.qmc.Sobol. Always scramble Sobol sequences to enable error estimation and avoid worst-case pathological inputs."
  why: >
    QMC can be 10-1000x more efficient than standard MC for smooth integrands in moderate dimensions
    (d <= 50). The improvement comes from filling the sample space more uniformly: low-discrepancy
    sequences avoid the random clumping that wastes samples in standard MC. For a 10-dimensional
    option pricing problem, QMC with 10,000 points often beats standard MC with 1,000,000 points.
    However, QMC degrades in very high dimensions (d > 100) and for discontinuous integrands (e.g.,
    digital options). Scrambled Sobol is the gold standard: scrambling adds randomization that
    (a) enables standard error estimation and (b) breaks up pathological patterns that can occur
    with pure deterministic sequences. scipy.stats.qmc provides production-quality implementations.
  how_to_do_right: |
    1. Use scipy.stats.qmc.Sobol for generating low-discrepancy points
    2. ALWAYS scramble: Sobol(d, scramble=True, seed=42)
    3. Sample size must be a power of 2 for Sobol: n = 2^m (e.g., 1024, 4096, 65536)
    4. Transform uniform [0,1]^d to desired distribution using inverse CDF (norm.ppf for Gaussian)
    5. Estimate error via independent scrambles: run k=16 independent scrambled sequences
    6. Best for smooth, moderate-dimensional problems (d <= 50)
    7. For high d or discontinuous payoffs, fall back to standard MC with variance reduction
    8. Compare QMC vs MC: compute ratio of standard errors for same n
  severity: medium
  technologies:
    lang: [python]
    framework: [numpy, scipy]
  domains:
    domain: [fintech, mathematics]
    concern: [numerical_methods, performance]
  example_good: |
    import numpy as np
    from scipy.stats import qmc, norm

    def price_call_qmc(S0, K, r, sigma, T, m=16, seed=42):
        """Price European call using Quasi-Monte Carlo (scrambled Sobol)."""
        n = 2**m  # 65,536 samples (must be power of 2 for Sobol)
        sampler = qmc.Sobol(d=1, scramble=True, seed=seed)
        U = sampler.random(n)  # Uniform [0,1]
        Z = norm.ppf(U[:, 0])  # Transform to standard normal

        ST = S0 * np.exp((r - 0.5 * sigma**2) * T + sigma * np.sqrt(T) * Z)
        payoffs = np.maximum(ST - K, 0) * np.exp(-r * T)
        price_qmc = np.mean(payoffs)

        # Standard MC comparison with same n
        rng = np.random.default_rng(seed)
        Z_mc = rng.standard_normal(n)
        ST_mc = S0 * np.exp((r - 0.5 * sigma**2) * T + sigma * np.sqrt(T) * Z_mc)
        payoffs_mc = np.maximum(ST_mc - K, 0) * np.exp(-r * T)
        price_mc = np.mean(payoffs_mc)

        # Error estimation via multiple scrambles
        prices = []
        for s in range(16):
            sampler_s = qmc.Sobol(d=1, scramble=True, seed=seed + s)
            U_s = sampler_s.random(n)
            Z_s = norm.ppf(U_s[:, 0])
            ST_s = S0 * np.exp((r - 0.5 * sigma**2) * T + sigma * np.sqrt(T) * Z_s)
            prices.append(np.mean(np.maximum(ST_s - K, 0) * np.exp(-r * T)))

        se_qmc = np.std(prices) / np.sqrt(16)
        se_mc = np.std(payoffs_mc, ddof=1) / np.sqrt(n)

        print(f"QMC price: {price_qmc:.4f} (SE: {se_qmc:.6f})")
        print(f"MC price:  {price_mc:.4f} (SE: {se_mc:.6f})")
        print(f"QMC efficiency gain: {(se_mc/se_qmc)**2:.0f}x")
        return price_qmc

    price_call_qmc(100, 105, 0.05, 0.20, 1.0)
  example_bad: |
    import numpy as np
    from scipy.stats import qmc, norm

    # WRONG: Non-power-of-2 sample size, unscrambled, no error estimation
    sampler = qmc.Sobol(d=1, scramble=False)  # No scramble — can't estimate error!
    U = sampler.random(10000)  # 10000 is NOT a power of 2 — Sobol quality degrades
    Z = norm.ppf(U[:, 0])
    # No comparison with MC, no error bars — no way to know if QMC is actually helping
  when_applies: High-accuracy option pricing, numerical integration in moderate dimensions, portfolio simulation
  sources:
    - "https://docs.scipy.org/doc/scipy/reference/stats.qmc.html"
    - "https://en.wikipedia.org/wiki/Quasi-Monte_Carlo_method"

- id: FIN-MC-012
  text: "Convergence diagnostics for Monte Carlo: always track the running mean, running standard error, and standard error ratio (SE/mean) as a function of sample size. The estimate has converged when SE/|mean| < target_precision (typically 1% for pricing, 5% for risk). Plot SE vs 1/sqrt(n) — it should be linear. If not, the variance is infinite (heavy tails) or samples are correlated."
  why: >
    Without convergence diagnostics, you have no idea whether your Monte Carlo estimate is reliable.
    Running 100,000 simulations is meaningless if the standard error is still 20% of the mean.
    This happens with fat-tailed distributions (e.g., importance sampling with bad weights, or
    payoffs that can be extremely large). The SE/mean ratio is the coefficient of variation of the
    estimator — it directly tells you the relative precision. Plotting SE vs 1/sqrt(n) is a powerful
    diagnostic: if the relationship is linear, the CLT holds and you can extrapolate how many more
    samples you need. If it is not linear, you either have infinite variance (need to truncate or
    use a different estimator) or correlated samples (need to account for autocorrelation in SE).
  how_to_do_right: |
    1. Compute running mean and running SE at checkpoints: n = 100, 500, 1000, 5000, 10000, ...
    2. Track SE/|mean| — this is your precision metric
    3. Stop when SE/|mean| < target_precision (1% for pricing, 5% for VaR)
    4. Plot log(SE) vs log(n): slope should be -0.5 (standard MC) or -1.0 (QMC)
    5. If slope > -0.3, suspect infinite variance or correlated samples
    6. For time series: compute effective sample size ESS = n / (1 + 2*sum(autocorrelations))
    7. Use batch means: divide samples into k batches, compute SE from batch means
    8. For QMC: use multiple scrambles and compute SE from the scramble distribution
  severity: medium
  technologies:
    lang: [python]
    framework: [numpy, matplotlib]
  domains:
    domain: [fintech, mathematics]
    concern: [numerical_methods, observability]
  example_good: |
    import numpy as np

    def mc_with_diagnostics(payoff_fn, n_total=200_000, n_checkpoints=20, seed=42):
        """Run Monte Carlo with convergence diagnostics."""
        rng = np.random.default_rng(seed)
        S0, K, r, sigma, T = 100, 105, 0.05, 0.20, 1.0

        Z = rng.standard_normal(n_total)
        ST = S0 * np.exp((r - 0.5 * sigma**2) * T + sigma * np.sqrt(T) * Z)
        payoffs = np.maximum(ST - K, 0) * np.exp(-r * T)

        checkpoints = np.logspace(2, np.log10(n_total), n_checkpoints, dtype=int)
        checkpoints = np.unique(checkpoints)

        print(f"{'n':>10s} {'Mean':>10s} {'SE':>10s} {'SE/Mean':>10s}")
        print("-" * 45)

        for n in checkpoints:
            sample = payoffs[:n]
            mean = np.mean(sample)
            se = np.std(sample, ddof=1) / np.sqrt(n)
            ratio = se / abs(mean) if mean != 0 else float('inf')
            converged = "<<" if ratio < 0.01 else ""
            print(f"{n:>10d} {mean:>10.4f} {se:>10.6f} {ratio:>10.4%} {converged}")

        final_mean = np.mean(payoffs)
        final_se = np.std(payoffs, ddof=1) / np.sqrt(n_total)
        print(f"\nFinal: {final_mean:.4f} +/- {final_se:.6f} (SE/Mean: {final_se/abs(final_mean):.4%})")
        return final_mean, final_se

    mc_with_diagnostics(None)
  example_bad: |
    import numpy as np

    # WRONG: No diagnostics — just run and pray
    Z = np.random.randn(50000)
    ST = 100 * np.exp(0.03 * 1 + 0.20 * Z)  # Also wrong drift
    payoffs = np.maximum(ST - 105, 0) * np.exp(-0.05)
    print(f"Price: {np.mean(payoffs):.2f}")
    # No SE, no convergence check, no idea if 50K samples is enough
    # Could be 50% off and you would never know
  when_applies: Any Monte Carlo simulation — always include convergence diagnostics to validate results
  sources:
    - "https://en.wikipedia.org/wiki/Monte_Carlo_method"
    - "https://numpy.org/doc/stable/reference/random/index.html"

- id: FIN-MC-013
  text: "Monte Carlo for prediction markets: estimate the probability of an event by simulating the underlying process many times. P(event) = (number of simulations where event occurs) / n_total. For compound events (A AND B, A OR B), simulate the joint distribution respecting correlations. For calibration, compare simulated probabilities against market prices to find alpha (edge)."
  why: >
    Prediction markets price contracts at the probability of an outcome. Monte Carlo allows you
    to estimate probabilities for complex compound events that have no analytical formula — for
    example, "candidate A wins states X, Y, AND Z" where state outcomes are correlated. Simple
    multiplication of independent probabilities (P(A)*P(B)*P(C)) dramatically underestimates the
    probability of joint events when outcomes are positively correlated (e.g., political elections
    where states swing together). For a prediction market maker, the difference between a naive
    independent model and a correlated simulation can mean pricing a contract at $0.15 when the
    true value is $0.35 — guaranteed losses. Correlation estimation from historical data or polls
    is the most important and hardest part.
  how_to_do_right: |
    1. Define the event as a function of simulated outcomes: event(outcomes) -> bool
    2. Simulate n >= 100,000 scenarios from the joint distribution
    3. For correlated events: use Gaussian copula or vine copula to model dependence
    4. P(event) = sum(event(outcomes_i)) / n
    5. SE of probability estimate: sqrt(p*(1-p)/n) — need n >= 10/(min(p, 1-p)) for reliable estimate
    6. For very rare events (p < 0.01): use importance sampling
    7. Compare P_simulated vs P_market to find edge: alpha = P_simulated - P_market
    8. Only bet when |alpha| > 2 * SE (statistically significant edge)
    9. Use Kelly criterion to size the bet given estimated edge and uncertainty
  severity: high
  technologies:
    lang: [python]
    framework: [numpy, scipy]
  domains:
    domain: [prediction_markets, fintech, mathematics]
    concern: [domain_specific, numerical_methods]
  example_good: |
    import numpy as np
    from scipy.stats import norm

    def simulate_election(n_simulations=500_000, seed=42):
        """Simulate correlated state election outcomes for prediction market pricing."""
        rng = np.random.default_rng(seed)

        # 3 swing states: Pennsylvania, Michigan, Wisconsin
        # Base probabilities (from polls): PA=0.52, MI=0.55, WI=0.54
        base_probs = np.array([0.52, 0.55, 0.54])

        # Correlation matrix (states swing together)
        corr = np.array([
            [1.0, 0.85, 0.80],
            [0.85, 1.0, 0.82],
            [0.80, 0.82, 1.0],
        ])

        # Cholesky decomposition for correlated normals
        L = np.linalg.cholesky(corr)
        Z = rng.standard_normal((n_simulations, 3))
        correlated_Z = Z @ L.T

        # Convert to probabilities using probit model
        thresholds = norm.ppf(base_probs)  # Probit thresholds
        outcomes = (correlated_Z < thresholds).astype(int)  # 1 = candidate wins state

        # Event: candidate wins ALL 3 states (blue wall sweep)
        sweep = np.all(outcomes == 1, axis=1)
        p_sweep = np.mean(sweep)
        se = np.sqrt(p_sweep * (1 - p_sweep) / n_simulations)

        # Naive independent estimate (WRONG for comparison)
        p_naive = np.prod(base_probs)

        print(f"P(sweep all 3) - Correlated: {p_sweep:.4f} (SE: {se:.4f})")
        print(f"P(sweep all 3) - Naive indep: {p_naive:.4f}")
        print(f"Naive UNDERESTIMATES by: {(p_sweep - p_naive) / p_sweep:.1%}")

        # Market price comparison
        market_price = 0.22
        edge = p_sweep - market_price
        print(f"Market price: {market_price}, Edge: {edge:+.4f}")
        if abs(edge) > 2 * se:
            print(f"Edge is statistically significant (|edge|={abs(edge):.4f} > 2*SE={2*se:.4f})")
        return p_sweep

    simulate_election()
    # P(sweep all 3) - Correlated: 0.3812 (SE: 0.0007)
    # P(sweep all 3) - Naive indep: 0.1544
    # Naive UNDERESTIMATES by: 59.5%
  example_bad: |
    import numpy as np

    # WRONG: Assuming independence between correlated events
    p_pa, p_mi, p_wi = 0.52, 0.55, 0.54
    p_sweep = p_pa * p_mi * p_wi  # 0.1544
    # True probability with 0.80-0.85 correlation is ~0.38 — naive is 60% too low!

    # Also wrong: too few simulations for a ~15% probability
    n = 100
    outcomes = np.random.binomial(1, [p_pa, p_mi, p_wi], size=(n, 3))
    p_est = np.mean(np.all(outcomes, axis=1))
    # SE = sqrt(0.15*0.85/100) = 0.036 — relative error of 24%!
  when_applies: Pricing compound events in prediction markets, election forecasting, sports betting with correlated outcomes
  sources:
    - "https://en.wikipedia.org/wiki/Monte_Carlo_method"
    - "https://en.wikipedia.org/wiki/Copula_(probability_theory)"
