layer: patterns
technology: Cloud
domain: architecture
knowledge:
- id: CR-MCLOUD-001
  text: Design a landing zone with separate accounts/projects per environment and workload — a single account for everything
    is an anti-pattern.
  why: 'A single account means: blast radius is unlimited (one misconfiguration affects all environments), IAM is impossible
    to scope properly (dev access leaks to production), cost tracking requires per-resource tagging (which drifts), and compliance
    audits must inspect everything. Separate accounts provide hard isolation boundaries that no IAM policy can bypass.'
  how_to_do_right: Create an account/project per environment per workload (e.g., prod-api, staging-api, dev-api). Use an organization/management
    account for centralized billing and IAM. Create shared-services accounts for networking, logging, and security. Use AWS
    Organizations / GCP Folders / Azure Management Groups for hierarchy. Apply SCPs/Organization Policies for guardrails.
  severity: critical
  technologies:
    platform: [aws, gcp, azure, cloud]
  domains:
    domain: [architecture, security, operations]
    concern: [cloud]
  example_good: "# AWS Organization structure\nRoot\n├── Management (billing, IAM)\n├── Security (GuardDuty, Security Hub,\
    \ audit logs)\n├── Shared Services (Transit Gateway, DNS, CI/CD)\n├── Production\n│   ├── prod-api (account)\n│   ├──\
    \ prod-data (account)\n│   └── prod-frontend (account)\n├── Staging\n│   ├── staging-api\n│   └── staging-data\n└── Development\n\
    \    └── dev-sandbox\n\n# SCP preventing production account deletion\n{\n  \"Effect\": \"Deny\",\n  \"Action\": [\"organizations:LeaveOrganization\"\
    ],\n  \"Resource\": \"*\"\n}\n"
  example_bad: '# Everything in one account

    AWS Account: "company-main"

    ├── EC2: prod-api-1, dev-api-1, staging-api-1, test-experiment-1

    ├── RDS: prod-db, dev-db, staging-db

    └── S3: prod-data, dev-data, staging-data

    # Dev IAM role accidentally has access to prod-db

    # Junior dev runs load test against prod S3 bucket

    # Cost report: $50K/month but which team? which env?

    '
  sources: ["https://docs.aws.amazon.com/whitepapers/latest/organizing-your-aws-environment/organizing-your-aws-environment.html"]
  when_applies: "When setting up cloud account structure for organizations with multiple environments and workloads"
- id: CR-MCLOUD-002
  text: Use Terraform modules with provider-agnostic abstractions for multi-cloud — but accept that true portability has limits.
  why: 'Each cloud provider has unique services, APIs, and concepts. Trying to abstract everything into a provider-agnostic
    layer creates a lowest-common-denominator experience — you lose the best features of each cloud. Instead, abstract at
    the module boundary: common interfaces for common patterns (compute, networking, DNS) while allowing provider-specific
    implementations.'
  how_to_do_right: Create Terraform modules per concern (networking, compute, database). Use variables to inject provider-specific
    configuration. Share common patterns (naming, tagging, outputs) across providers. Use Terragrunt for DRY configuration
    across environments. Accept that some resources (BigQuery, CosmosDB, DynamoDB) are provider-specific and should not be
    abstracted.
  severity: medium
  technologies:
    platform: [terraform, pulumi, cloud]
  domains:
    domain: [architecture, operations, devops]
    concern: [cloud]
  example_good: "# Module interface — provider-agnostic\n# modules/compute/main.tf\nvariable \"name\" { type = string }\n\
    variable \"cpu\" { type = number }\nvariable \"memory_gb\" { type = number }\nvariable \"image\" { type = string }\nvariable\
    \ \"provider\" { type = string }\n\n# Provider-specific implementations\n# modules/compute/aws.tf\nresource \"aws_instance\"\
    \ \"this\" {\n  count         = var.provider == \"aws\" ? 1 : 0\n  ami           = var.image\n  instance_type = local.aws_instance_type\
    \  # Map cpu/memory to instance type\n  tags          = local.standard_tags\n}\n\n# modules/compute/gcp.tf\nresource \"\
    google_compute_instance\" \"this\" {\n  count        = var.provider == \"gcp\" ? 1 : 0\n  machine_type = \"custom-${var.cpu}-${var.memory_gb\
    \ * 1024}\"\n  boot_disk { initialize_params { image = var.image } }\n  labels       = local.standard_tags\n}\n"
  example_bad: "# Trying to abstract everything — lowest common denominator\nresource \"multi_cloud_database\" \"this\" {\n\
    \  type     = \"relational\"\n  engine   = \"postgres\"\n  provider = var.cloud\n}\n# Loses: BigQuery partitioning, CosmosDB\
    \ consistency levels,\n# Aurora Serverless v2, Spanner interleaved tables\n# You get a generic database with no cloud-specific\
    \ optimizations\n"
  sources: ["https://developer.hashicorp.com/terraform/language/modules"]
  when_applies: "When writing Terraform or Pulumi modules that must work across multiple cloud providers"
- id: CR-MCLOUD-003
  text: Use a centralized identity provider (Okta, Azure AD, Google Workspace) federated to all cloud providers — never manage
    separate user directories per cloud.
  why: 'Separate user directories per cloud means: N passwords per user (security risk), N deprovisioning processes when someone
    leaves (forgotten accounts), N MFA configurations (user fatigue), and no unified audit trail. Federation with a central
    IdP provides: single source of truth, automatic deprovisioning, unified MFA, and centralized access reviews.'
  how_to_do_right: Choose one IdP as the source of truth (Azure AD/Entra ID is most common). Configure SAML 2.0 or OIDC federation
    to each cloud provider. Map IdP groups to cloud roles/groups. Use SCIM for automatic user provisioning/deprovisioning.
    Implement break-glass local admin accounts for IdP outages (stored in a physical safe).
  severity: critical
  technologies:
    library: [azure ad]
    platform: [okta, cloud]
  domains:
    domain: [architecture, security, operations]
    concern: [cloud]
  example_good: "# Central IdP: Azure AD (Entra ID)\n# Federation to each cloud:\n\n# AWS — SAML federation via AWS IAM Identity\
    \ Center (SSO)\naws sso-admin create-permission-set \\\n  --instance-arn $SSO_ARN \\\n  --name \"ProductionReadOnly\"\
    \ \\\n  --session-duration \"PT4H\"\n\n# GCP — Workload Identity Federation\ngcloud iam workforce-pools create my-pool\
    \ \\\n  --organization=$ORG_ID \\\n  --location=global\ngcloud iam workforce-pools providers create-oidc azure-ad \\\n\
    \  --workforce-pool=my-pool \\\n  --issuer-uri=\"https://login.microsoftonline.com/$TENANT_ID/v2.0\" \\\n  --client-id=$APP_ID\n\
    \n# Result: One login, one MFA, one deprovisioning process\n"
  example_bad: '# Separate users per cloud

    # AWS IAM: john@company.com (password: P@ss1)

    # GCP: john@company.com (password: P@ss2)

    # Azure: john@company.com (password: P@ss3)

    # John leaves the company

    # IT disables Azure AD → AWS and GCP still active

    # John accesses AWS for 3 months before anyone notices

    '
  sources: ["https://learn.microsoft.com/en-us/entra/fundamentals/whatis"]
  when_applies: "When managing user identities and access control across multiple cloud providers"
- id: CR-MCLOUD-004
  text: Use dedicated interconnects (Direct Connect, ExpressRoute, Interconnect) for production workloads — VPN for dev/test
    and as a backup.
  why: 'VPN over the public internet has variable latency (20-200ms), limited throughput (1.25 Gbps max), and is affected
    by internet congestion and routing changes. Dedicated interconnects provide: consistent low latency (1-5ms), high throughput
    (10-100 Gbps), and private connectivity that does not traverse the public internet. For production workloads with SLAs,
    the difference is between reliable and unreliable.'
  how_to_do_right: Use dedicated interconnects for production (10/100 Gbps, private, SLA-backed). Use VPN as a backup path
    for redundancy. Provision dual interconnects at different locations for resilience. Use BGP for dynamic routing with failover.
    Monitor interconnect health with CloudWatch/Stackdriver/Azure Monitor.
  severity: high
  technologies:
    platform: [aws, gcp, azure, cloud]
  domains:
    domain: [architecture, infrastructure, operations]
    concern: [networking, cloud]
  example_good: "# Primary: Dedicated interconnect (low latency, high throughput)\n# AWS Direct Connect — 10 Gbps at two locations\n\
    aws directconnect create-connection \\\n  --location \"EqDC2\" \\\n  --bandwidth \"10Gbps\" \\\n  --connection-name \"\
    prod-primary\"\n\naws directconnect create-connection \\\n  --location \"EqNY5\" \\\n  --bandwidth \"10Gbps\" \\\n  --connection-name\
    \ \"prod-secondary\"\n\n# Backup: VPN over internet (automatic failover via BGP)\naws ec2 create-vpn-connection \\\n \
    \ --type \"ipsec.1\" \\\n  --customer-gateway-id $CGW_ID \\\n  --vpn-gateway-id $VGW_ID \\\n  --options '{\"StaticRoutesOnly\"\
    : false}'  # BGP for dynamic routing\n"
  example_bad: "# VPN only for production workloads\naws ec2 create-vpn-connection \\\n  --type \"ipsec.1\" \\\n  --customer-gateway-id\
    \ $CGW_ID \\\n  --vpn-gateway-id $VGW_ID\n# Latency: 20-200ms (vs 1-5ms with Direct Connect)\n# Throughput: 1.25 Gbps\
    \ (vs 10-100 Gbps)\n# 3am: internet congestion → VPN latency spikes to 500ms\n# Database replication falls behind, queries\
    \ timeout\n"
  sources: ["https://docs.aws.amazon.com/directconnect/latest/UserGuide/Welcome.html"]
  when_applies: "When designing network connectivity between on-premises and cloud or between cloud regions for production workloads"
- id: CR-MCLOUD-005
  text: Implement data residency controls at the infrastructure level — do not rely on application code to enforce data sovereignty.
  why: Application-level data residency checks are bypassable (bugs, configuration errors, new endpoints). Infrastructure-level
    controls (SCPs, Organization Policies, Azure Policies) prevent resource creation in wrong regions before any code runs.
    GDPR, LGPD, and other regulations impose fines up to 4% of global revenue for violations.
  how_to_do_right: Use SCPs (AWS) / Organization Policies (GCP) / Azure Policies to restrict resource creation to allowed
    regions. Tag all data with its residency classification. Use separate accounts/projects per data residency zone. Implement
    DLP (Data Loss Prevention) to detect data leaks across regions. Document data flows for compliance audits.
  severity: critical
  technologies:
    platform: [aws, gcp, azure, cloud]
  domains:
    domain: [architecture, compliance, operations]
    concern: [cloud]
  example_good: "# AWS SCP: Deny resource creation outside EU regions\n{\n  \"Effect\": \"Deny\",\n  \"Action\": \"*\",\n\
    \  \"Resource\": \"*\",\n  \"Condition\": {\n    \"StringNotEquals\": {\n      \"aws:RequestedRegion\": [\"eu-west-1\"\
    , \"eu-central-1\"]\n    },\n    \"ForAnyValue:StringNotLike\": {\n      \"aws:PrincipalOrgPaths\": [\"o-xxx/r-xxx/ou-xxx/ou-global/*\"\
    ]\n    }\n  }\n}\n\n# GCP Organization Policy: Restrict locations\ngcloud resource-manager org-policies set-policy \\\n\
    \  --organization=$ORG_ID \\\n  policy.yaml\n# policy.yaml:\n# constraint: constraints/gcloud.resourceLocations\n# listPolicy:\n\
    #   allowedValues: [\"europe-west1\", \"europe-west3\"]\n"
  example_bad: "# Application-level check only\ndef create_resource(region, data):\n    if region not in ALLOWED_REGIONS:\n\
    \        raise ValueError(\"Region not allowed\")\n    # But: new endpoint skips this check\n    # But: admin creates\
    \ S3 bucket in us-east-1 via console\n    # But: Lambda function copies data to us-west-2 for \"performance\"\n    # GDPR\
    \ fine: up to 4% of global revenue\n"
  sources: ["https://docs.aws.amazon.com/organizations/latest/userguide/orgs_manage_policies_scps.html"]
  when_applies: "When deploying services that handle PII or regulated data subject to GDPR, LGPD, or similar data sovereignty laws"
- id: CR-MCLOUD-006
  text: Implement FinOps practices with committed use discounts for steady-state workloads and spot/preemptible for batch
    — never pay full on-demand for predictable workloads.
  why: On-demand pricing is the most expensive option (by design — it is the convenience premium). Reserved instances/committed
    use discounts save 30-60% for predictable workloads. Spot/preemptible instances save 60-90% for fault-tolerant batch jobs.
    A company running $100K/month on-demand could save $30-60K/month with proper commitment strategy.
  how_to_do_right: Analyze 3 months of usage data. Buy 1-year reservations for steady-state base load. Use savings plans for
    flexible compute. Use spot/preemptible for batch processing, CI/CD, dev environments. Implement auto-scaling for variable
    workloads. Right-size instances quarterly. Use cost anomaly detection alerts.
  severity: high
  technologies:
    platform: [aws, gcp, azure, cloud]
  domains:
    domain: [architecture, operations]
    concern: [cost, cloud]
  example_good: "# AWS cost optimization strategy\n# 1. Reserved Instances for databases (steady state)\naws ec2 purchase-reserved-instances-offering\
    \ \\\n  --instance-count 2 \\\n  --reserved-instances-offering-id $OFFERING_ID  # 1-year, partial upfront\n\n# 2. Savings\
    \ Plans for compute (flexible)\naws savingsplans create-savings-plan \\\n  --savings-plan-offering-id $OFFERING_ID \\\n\
    \  --commitment \"10.0\"  # $/hour commitment\n\n# 3. Spot instances for batch jobs\naws ec2 request-spot-fleet \\\n \
    \ --spot-fleet-request-config '{\n    \"TargetCapacity\": 100,\n    \"SpotPrice\": \"0.05\",\n    \"LaunchSpecifications\"\
    : [...]\n  }'\n\n# 4. Cost anomaly alerts\naws ce create-anomaly-monitor \\\n  --anomaly-monitor '{\"MonitorName\":\"\
    cost-spike\",\"MonitorType\":\"DIMENSIONAL\"}'\n"
  example_bad: '# Everything on-demand, no optimization

    aws ec2 run-instances --instance-type m5.xlarge --count 10

    # Running 24/7 for 3 years at full on-demand price

    # Cost: $10,000/month

    # With 1-year reserved: $6,000/month (40% savings)

    # With 3-year reserved: $4,000/month (60% savings)

    # $72,000 wasted over 3 years

    '
  sources: ["https://docs.aws.amazon.com/savingsplans/latest/userguide/what-is-savings-plans.html"]
  when_applies: "When optimizing cloud spending for workloads with predictable or steady-state resource usage"
- id: CR-MCLOUD-007
  text: Abstract at the service boundary to avoid vendor lock-in — use containers, open standards, and adapter patterns rather
    than avoiding cloud services entirely.
  why: 'Avoiding cloud-native services entirely (using only VMs and open-source) means you lose 80% of the cloud value proposition
    — you are renting a data center. But deep integration with proprietary services (Lambda@Edge, Cosmos DB triggers, BigQuery
    ML) creates switching costs. The balance: use cloud services through abstraction layers so the business logic is portable.'
  how_to_do_right: 'Use containers (OCI standard) as the default compute unit. Use adapter/port patterns for cloud-specific
    services (define interface, implement per-cloud). Use open standards: OpenTelemetry for observability, OPA for policy,
    CNCF projects for infrastructure. Accept lock-in for: identity (pick one IdP), networking (interconnects are inherently
    locked), and managed databases (migration cost is known).'
  severity: medium
  technologies:
    platform: [cloud, docker, kubernetes]
  domains:
    domain: [architecture, operations]
    concern: [cloud]
  example_good: "# Adapter pattern — business logic is cloud-agnostic\nfrom abc import ABC, abstractmethod\n\nclass ObjectStorage(ABC):\n\
    \    @abstractmethod\n    def upload(self, key: str, data: bytes) -> str: ...\n    @abstractmethod\n    def download(self,\
    \ key: str) -> bytes: ...\n\nclass S3Storage(ObjectStorage):\n    def upload(self, key, data):\n        self.client.put_object(Bucket=self.bucket,\
    \ Key=key, Body=data)\n        return f\"s3://{self.bucket}/{key}\"\n\nclass GCSStorage(ObjectStorage):\n    def upload(self,\
    \ key, data):\n        blob = self.bucket.blob(key)\n        blob.upload_from_string(data)\n        return f\"gs://{self.bucket.name}/{key}\"\
    \n\n# Business logic uses the interface, not the implementation\ndef process_report(storage: ObjectStorage, report: bytes):\n\
    \    url = storage.upload(f\"reports/{uuid4()}.pdf\", report)\n    return url\n"
  example_bad: "# Deep coupling to AWS-specific APIs in business logic\ndef process_report(report):\n    s3 = boto3.client('s3')\n\
    \    s3.put_object(Bucket='reports', Key=f'{uuid4()}.pdf', Body=report)\n    dynamodb = boto3.resource('dynamodb')\n \
    \   dynamodb.Table('reports').put_item(Item={'id': str(uuid4())})\n    sns = boto3.client('sns')\n    sns.publish(TopicArn='arn:aws:sns:...',\
    \ Message='Report ready')\n# Migrating to GCP requires rewriting ALL business logic\n# Not just infrastructure — the core\
    \ application code\n"
  sources: ["https://12factor.net/"]
  when_applies: "When designing service boundaries that must remain portable across cloud providers"
- id: CR-MCLOUD-008
  text: Conduct Well-Architected Framework reviews quarterly — the six pillars (ops, security, reliability, performance, cost,
    sustainability) catch architectural drift.
  why: 'Architecture degrades over time: new features bypass security controls, cost-optimized resources are over-provisioned
    for convenience, reliability patterns are skipped for speed. WAF reviews catch drift before it becomes a crisis. All major
    clouds (AWS, GCP, Azure) provide free WAF tools — ignoring them is leaving free value on the table.'
  how_to_do_right: Run the cloud-specific WAF tool quarterly (AWS Well-Architected Tool, GCP Architecture Framework, Azure
    Well-Architected Review). Focus on high-risk items from each pillar. Track remediation in a backlog. Assign pillar owners
    (security → security team, cost → FinOps team). Compare results quarter-over-quarter.
  severity: medium
  technologies:
    platform: [aws, gcp, azure, cloud]
  domains:
    domain: [architecture, operations]
    concern: [cloud]
  example_good: "# Quarterly WAF review process\n## 1. Run automated assessment\naws wellarchitected create-workload \\\n\
    \  --workload-name \"MyApp Q1 2026\" \\\n  --lenses \"wellarchitected,serverless\"\n\n## 2. Answer questions per pillar\n\
    aws wellarchitected update-answer \\\n  --workload-id $WID \\\n  --lens-alias wellarchitected \\\n  --pillar-id reliability\
    \ \\\n  --question-id \"how-monitor-workload\" \\\n  --selected-choices \"choice1,choice2\"\n\n## 3. Generate improvement\
    \ plan\naws wellarchitected get-lens-review \\\n  --workload-id $WID \\\n  --lens-alias wellarchitected\n\n## 4. Track\
    \ remediation items\n# - 3 HIGH risk items → sprint backlog (fix this quarter)\n# - 7 MEDIUM risk items → next quarter\
    \ backlog\n# - 12 LOW risk items → tech debt tracker\n"
  example_bad: '# Never reviewed architecture since initial design

    # 2 years later:

    # - Security: 5 public S3 buckets nobody knows about

    # - Cost: 30 unused EC2 instances running for 18 months

    # - Reliability: single AZ deployment, no backups tested

    # - Performance: instance types from 2 generations ago

    # Total waste: ~$50K/year + one incident away from data loss

    '
  sources: ["https://docs.aws.amazon.com/wellarchitected/latest/framework/welcome.html"]
  when_applies: "When conducting periodic architecture reviews or assessing cloud infrastructure health"
- id: CR-MCLOUD-009
  text: Choose a DR strategy based on RPO/RTO requirements — pilot light for cost-sensitive, warm standby for moderate, active-active
    for zero-downtime.
  why: DR strategies have a cost/recovery tradeoff. Active-active (RPO=0, RTO~0) costs 2x but has instant failover. Warm standby
    (RPO=minutes, RTO=minutes) costs 30-50% more. Pilot light (RPO=hours, RTO=hours) costs 5-10% more. Backup/restore (RPO=daily,
    RTO=hours-days) costs least. Choosing wrong means either overpaying or unacceptable data loss during a disaster.
  how_to_do_right: Define RPO (max data loss) and RTO (max downtime) per workload with the business. Implement the cheapest
    strategy that meets requirements. Test failover quarterly — untested DR is no DR. Automate failover — manual runbooks
    fail under pressure. Document and regularly update the DR plan.
  severity: critical
  technologies:
    platform: [aws, gcp, azure, cloud]
  domains:
    domain: [architecture, reliability, operations]
    concern: [cloud]
  example_good: '# DR Strategy Matrix

    # Tier 1 (payments): Active-Active

    #   RPO: 0, RTO: < 30s, Cost: 2x

    #   Multi-region, synchronous replication, global load balancer


    # Tier 2 (API): Warm Standby

    #   RPO: 5 min, RTO: 10 min, Cost: 1.3x

    #   DR region running at 20% capacity, async replication

    #   Automated scale-up on failover


    # Tier 3 (internal tools): Pilot Light

    #   RPO: 1 hour, RTO: 2 hours, Cost: 1.1x

    #   DR region has infra provisioned but stopped

    #   DB replication active, compute starts on failover


    # Quarterly failover test

    0 2 1 */3 * /opt/scripts/dr-failover-test.sh --tier=2 --dry-run=false

    '
  example_bad: '# "We have backups" (no actual DR plan)

    # Daily backup to S3 in the same region

    # Region goes down → backups are also unavailable

    # RTO: "however long it takes to figure it out" (= days)

    # RPO: 24 hours (last backup) + corruption detection lag

    # Last failover test: never

    '
  sources: ["https://docs.aws.amazon.com/whitepapers/latest/disaster-recovery-workloads-on-aws/disaster-recovery-options-in-the-cloud.html"]
  when_applies: "When defining disaster recovery strategy and RPO/RTO targets for production workloads"
- id: CR-MCLOUD-010
  text: Use a unified observability platform across all clouds — cloud-native monitoring tools create visibility silos.
  why: CloudWatch (AWS), Cloud Monitoring (GCP), and Azure Monitor each show only their own resources. A request flowing through
    AWS API Gateway → GCP Cloud Run → Azure CosmosDB is invisible end-to-end in any single tool. Unified platforms (Datadog,
    Grafana Cloud, New Relic) correlate metrics, logs, and traces across all providers into a single pane of glass.
  how_to_do_right: Choose one observability platform as the primary. Use OpenTelemetry for instrumentation (vendor-neutral).
    Export metrics and logs from all clouds to the unified platform. Build cross-cloud dashboards and alerts. Keep cloud-native
    tools as secondary for cloud-specific deep dives. Use distributed tracing with context propagation across cloud boundaries.
  severity: high
  technologies:
    platform: [datadog, grafana, cloud]
  domains:
    domain: [architecture, observability, operations]
    concern: [cloud]
  example_good: "# OpenTelemetry — vendor-neutral instrumentation\nfrom opentelemetry import trace\nfrom opentelemetry.exporter.otlp.proto.grpc.trace_exporter\
    \ import OTLPSpanExporter\nfrom opentelemetry.sdk.trace import TracerProvider\n\n# Same instrumentation works regardless\
    \ of where it runs\nprovider = TracerProvider()\nprovider.add_span_processor(\n    BatchSpanProcessor(OTLPSpanExporter(\n\
    \        endpoint=\"https://otel-collector.monitoring:4317\"\n    ))\n)\ntrace.set_tracer_provider(provider)\ntracer =\
    \ trace.get_tracer(__name__)\n\n# Trace spans across AWS → GCP → Azure\nwith tracer.start_as_current_span(\"process-order\"\
    ) as span:\n    span.set_attribute(\"cloud.provider\", \"aws\")\n    result = call_gcp_service(trace_context)  # Context\
    \ propagated\n"
  example_bad: '# Cloud-native monitoring only — visibility silos

    # AWS: CloudWatch dashboards (cannot see GCP or Azure)

    # GCP: Cloud Monitoring (cannot see AWS or Azure)

    # Azure: Azure Monitor (cannot see AWS or GCP)

    # Incident: "API is slow" → which cloud? which service?

    # 3 teams checking 3 dashboards, no correlation

    # MTTR: 2 hours instead of 15 minutes

    '
  sources: ["https://opentelemetry.io/docs/"]
  when_applies: "When setting up monitoring and observability for services spanning multiple cloud providers"
- id: CR-MCLOUD-011
  text: Choose the right migration strategy per workload using the 6 Rs — not everything should be 'lift and shift' or 'refactor'.
  why: 'Lift-and-shift (rehost) is fast but misses cloud optimization — you run expensive VMs instead of serverless. Full
    refactoring takes months and delays migration. The 6 Rs provide a framework: Rehost for quick wins, Replatform for easy
    optimizations, Refactor for strategic apps, Repurchase for SaaS replacements, Retire for dead apps, Retain for legacy
    that cannot move.'
  how_to_do_right: Assess each workload against the 6 Rs criteria. Rehost first (weeks, immediate cost savings from DC exit).
    Replatform next (swap DB for managed service, add autoscaling). Refactor strategic apps over 6-12 months. Repurchase commodity
    apps (email → O365, CRM → Salesforce). Retire unused apps (30% of most portfolios). Retain mainframe/regulatory apps.
  severity: medium
  technologies:
    platform: [aws, gcp, azure, cloud]
  domains:
    domain: [architecture, operations]
    concern: [cloud]
  example_good: '# Workload assessment matrix

    | App          | Strategy    | Effort | Timeline | Savings |

    |-------------|------------|--------|----------|---------|

    | Web app     | Replatform | Medium | 4 weeks  | 40%     |

    | ML pipeline | Refactor   | High   | 3 months | 60%     |

    | Email       | Repurchase | Low    | 2 weeks  | 30%     |

    | Old CRM     | Retire     | None   | 1 week   | 100%    |

    | Mainframe   | Retain     | None   | N/A      | 0%      |

    | Database    | Rehost     | Low    | 1 week   | 20%     |


    # Replatform example: VM → Container

    # Before: EC2 + manually installed Nginx + app

    # After: ECS Fargate + ALB (no server management, auto-scaling)

    '
  example_bad: '# "Refactor everything" approach

    # 200 applications, each being redesigned for cloud-native

    # Timeline: 3 years

    # 18 months in: 20 apps migrated, 180 still in datacenter

    # DC lease expires in 6 months

    # Panic lift-and-shift the remaining 180 in 3 months

    '
  sources: ["https://docs.aws.amazon.com/prescriptive-guidance/latest/large-migration-guide/migration-strategies.html"]
  when_applies: "When planning a migration of on-premises workloads to the cloud"
- id: CR-MCLOUD-012
  text: Enforce mandatory tags on all cloud resources — untagged resources are invisible to cost tracking, security, and operations.
  why: 'Without tags, you cannot answer: ''Which team owns this resource?'', ''Is this production or dev?'', ''Which project
    is this billed to?'', ''When was this last reviewed?''. Cloud bills become mysterious line items nobody can explain. Security
    incidents cannot be triaged by priority. Cleanup scripts cannot identify safe-to-delete resources.'
  how_to_do_right: 'Define mandatory tags: owner, environment, project, cost-center. Enforce via SCPs/Policies that deny resource
    creation without mandatory tags. Use automation to detect and alert on untagged resources. Standardize tag values (enum,
    not free-text). Propagate tags to child resources. Audit tags quarterly.'
  severity: high
  technologies:
    platform: [aws, gcp, azure, cloud]
  domains:
    domain: [architecture, operations]
    concern: [cloud, cost]
  example_good: "# AWS SCP: Deny resource creation without mandatory tags\n{\n  \"Effect\": \"Deny\",\n  \"Action\": [\"ec2:RunInstances\"\
    , \"rds:CreateDBInstance\", \"s3:CreateBucket\"],\n  \"Resource\": \"*\",\n  \"Condition\": {\n    \"Null\": {\n     \
    \ \"aws:RequestTag/owner\": \"true\",\n      \"aws:RequestTag/environment\": \"true\",\n      \"aws:RequestTag/cost-center\"\
    : \"true\",\n      \"aws:RequestTag/project\": \"true\"\n    }\n  }\n}\n\n# Standard tag values (enum, not free-text)\n\
    tags:\n  owner: \"team-payments\"          # Team name from directory\n  environment: \"production\"        # production|staging|development\n\
    \  cost-center: \"CC-1234\"          # From finance system\n  project: \"checkout-v2\"          # From project tracker\n\
    \  data-classification: \"pii\"      # public|internal|confidential|pii\n  created-by: \"terraform\"         # terraform|console|cli\n"
  example_bad: '# No tag enforcement

    aws ec2 run-instances --instance-type m5.xlarge

    # Who owns this? Unknown

    # Is it production? Unknown

    # Can we delete it? Nobody knows

    # Monthly bill: $200/month for 2 years = $4,800 for an instance

    # that was a "quick test" someone forgot about

    '
  sources: ["https://docs.aws.amazon.com/tag-editor/latest/userguide/tagging.html"]
  when_applies: "When provisioning cloud resources that need to be tracked for cost, ownership, and compliance purposes"
- id: CR-MCLOUD-013
  text: Use a centralized secrets manager across all clouds — never store secrets in environment variables, config files,
    or code.
  why: 'Secrets in environment variables are visible in process listings, crash dumps, and container metadata endpoints. Secrets
    in config files get committed to git (accidental or intentional). Secrets in code are the most common cause of cloud breaches.
    A centralized secrets manager provides: encryption at rest, access audit logging, automatic rotation, and centralized
    revocation.'
  how_to_do_right: Use AWS Secrets Manager, GCP Secret Manager, Azure Key Vault, or HashiCorp Vault. Store all secrets (API
    keys, DB passwords, certificates) in the secrets manager. Reference secrets by ID, not value. Enable automatic rotation
    where possible. Audit secret access logs. Use the provider's native integration (IAM roles, managed identity) for authentication
    to the secrets manager itself.
  severity: critical
  technologies:
    platform: [aws, gcp, azure, vault]
  domains:
    domain: [architecture, security, operations]
    concern: [cloud]
  example_good: "# Store secret in secrets manager\naws secretsmanager create-secret \\\n  --name \"prod/db/password\" \\\n\
    \  --secret-string \"$DB_PASSWORD\" \\\n  --tags '[{\"Key\":\"environment\",\"Value\":\"production\"}]'\n\n# Application\
    \ fetches at startup — never in env vars or code\nimport boto3\n\ndef get_db_password():\n    client = boto3.client('secretsmanager')\n\
    \    response = client.get_secret_value(SecretId='prod/db/password')\n    return response['SecretString']\n\n# Automatic\
    \ rotation (Lambda rotates every 30 days)\naws secretsmanager rotate-secret \\\n  --secret-id \"prod/db/password\" \\\n\
    \  --rotation-lambda-arn $LAMBDA_ARN \\\n  --rotation-rules '{\"AutomaticallyAfterDays\": 30}'\n"
  example_bad: '# Secrets in environment variables

    export DB_PASSWORD="SuperSecret123"

    # Visible in: ps aux, /proc/PID/environ, docker inspect, ECS task def

    # Persists in: shell history, CI/CD logs, container metadata


    # Secrets in code

    db_password = "SuperSecret123"  # Committed to git

    # Every developer, CI system, and GitHub mirror has the password

    # Rotating requires code change + deployment

    '
  sources: ["https://docs.aws.amazon.com/secretsmanager/latest/userguide/intro.html"]
  when_applies: "When managing API keys, database passwords, certificates, or any sensitive credentials in cloud environments"
- id: CR-MCLOUD-014
  text: Deploy production workloads across multiple availability zones — single-AZ deployment is not highly available.
  why: 'A single AZ is a single data center (or cluster of data centers). AZ failures happen: power outages, cooling failures,
    network partitions, and natural disasters. Multi-AZ deployment means your application survives an entire AZ going offline.
    The cost is minimal (you already need multiple instances for scaling) but the availability improvement is dramatic.'
  how_to_do_right: Run at least 2 instances in 2 different AZs. Use a load balancer to distribute traffic. Enable cross-AZ
    replication for databases. Use multi-AZ storage (S3, EBS, Managed Disks are multi-AZ by default). Test AZ failure by draining
    one AZ and verifying the other handles full load.
  severity: critical
  technologies:
    platform: [aws, gcp, azure, cloud]
  domains:
    domain: [architecture, reliability, operations]
    concern: [cloud]
  example_good: "# Multi-AZ deployment\n# ECS service across 2 AZs\naws ecs create-service \\\n  --cluster my-cluster \\\n\
    \  --service-name my-api \\\n  --desired-count 4 \\\n  --network-configuration '{\n    \"awsvpcConfiguration\": {\n  \
    \    \"subnets\": [\"subnet-az1\", \"subnet-az2\"],\n      \"securityGroups\": [\"sg-xxx\"]\n    }\n  }'\n\n# RDS Multi-AZ\
    \ (automatic failover)\naws rds create-db-instance \\\n  --db-instance-identifier my-db \\\n  --multi-az \\\n  --engine\
    \ postgres\n\n# ALB distributes across AZs\naws elbv2 create-load-balancer \\\n  --name my-alb \\\n  --subnets subnet-az1\
    \ subnet-az2\n"
  example_bad: "# Single-AZ deployment\naws ecs create-service \\\n  --network-configuration '{\n    \"awsvpcConfiguration\"\
    : {\"subnets\": [\"subnet-az1-only\"]}\n  }'\n# AZ1 power outage at 2am → entire service offline\n# RTO: hours (waiting\
    \ for AZ recovery or manual migration)\n# One outage in 2024 lasted 4+ hours\n"
  sources: ["https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/Concepts.MultiAZ.html"]
  when_applies: "When deploying production services that require high availability and fault tolerance"
- id: CR-MCLOUD-015
  text: Implement zero-trust networking — do not assume internal network traffic is safe.
  why: Traditional perimeter security (VPN + firewall) assumes everything inside the network is trusted. Cloud environments
    have no clear perimeter — workloads in the same VPC can be from different teams, trust levels, and security postures.
    A compromised pod/VM can move laterally to all other resources in the network. Zero-trust verifies every request regardless
    of network location.
  how_to_do_right: Authenticate and authorize every request (mTLS between services, JWT for APIs). Use network policies/security
    groups for microsegmentation (deny by default, allow specific flows). Use identity-aware proxies (BeyondCorp, Azure AD
    Application Proxy) instead of VPNs. Log and monitor all east-west traffic. Implement least-privilege access per service.
  severity: high
  technologies:
    platform: [cloud, service_mesh, istio, kubernetes]
  domains:
    domain: [architecture, security, operations]
    concern: [cloud]
  example_good: "# Kubernetes network policy — deny all, allow specific\napiVersion: networking.k8s.io/v1\nkind: NetworkPolicy\n\
    metadata:\n  name: api-policy\nspec:\n  podSelector:\n    matchLabels:\n      app: api\n  policyTypes: [Ingress, Egress]\n\
    \  ingress:\n    - from:\n        - podSelector:\n            matchLabels:\n              app: frontend\n      ports:\n\
    \        - port: 8080\n  egress:\n    - to:\n        - podSelector:\n            matchLabels:\n              app: database\n\
    \      ports:\n        - port: 5432\n\n# Istio mTLS — automatic certificate management\napiVersion: security.istio.io/v1beta1\n\
    kind: PeerAuthentication\nmetadata:\n  name: default\nspec:\n  mtls:\n    mode: STRICT  # All traffic must be mTLS\n"
  example_bad: "# Flat network — everything can talk to everything\n# VPC with one security group allowing all internal traffic\n\
    aws ec2 authorize-security-group-ingress \\\n  --group-id sg-xxx \\\n  --source-group sg-xxx \\\n  --protocol -1  # All\
    \ traffic within VPC\n# Compromised web server → direct access to database\n# No authentication between services\n# Lateral\
    \ movement is trivial\n"
  sources: ["https://cloud.google.com/beyondcorp"]
  when_applies: "When designing network security for cloud-native or hybrid environments with inter-service communication"
- id: CR-MCLOUD-016
  text: Use GitOps for infrastructure and application deployment — the Git repository is the single source of truth for desired
    state.
  why: 'Manual deployments via console/CLI create configuration drift — the running state diverges from what is defined in
    code. GitOps ensures: every change is reviewed (PR), auditable (git log), reversible (git revert), and automatically reconciled
    (controller detects drift and fixes it). Without GitOps, you cannot answer ''who changed what, when, and why'' for infrastructure
    changes.'
  how_to_do_right: Store all infrastructure and application config in Git. Use a GitOps controller (ArgoCD, Flux) to reconcile
    desired state with actual state. Changes go through PRs — the controller applies changes, not humans. Use drift detection
    to alert when actual state diverges. Implement environment promotion via Git branches or directory structure.
  severity: medium
  technologies:
    library: [flux]
    platform: [argocd, kubernetes, cloud]
  domains:
    domain: [architecture, operations, devops]
    concern: [cloud]
  example_good: "# ArgoCD Application — Git is the source of truth\napiVersion: argoproj.io/v1alpha1\nkind: Application\n\
    metadata:\n  name: my-api\nspec:\n  source:\n    repoURL: https://github.com/myorg/k8s-manifests\n    path: apps/my-api/production\n\
    \    targetRevision: main\n  destination:\n    server: https://kubernetes.default.svc\n    namespace: production\n  syncPolicy:\n\
    \    automated:\n      prune: true       # Delete resources removed from Git\n      selfHeal: true    # Fix manual changes\
    \ (drift correction)\n    syncOptions:\n      - CreateNamespace=true\n\n# Promotion flow:\n# 1. PR to apps/my-api/staging\
    \ → auto-deployed to staging\n# 2. Verify in staging\n# 3. PR to apps/my-api/production → auto-deployed to production\n"
  example_bad: '# Manual kubectl apply from local machine

    kubectl apply -f deployment.yaml

    # Who applied this? When? What changed?

    # Someone edits in production via kubectl edit

    # Configuration drift — Git says v1.2, production runs v1.3

    # Incident → rollback → which version was actually running?

    '
  sources: ["https://argo-cd.readthedocs.io/en/stable/"]
  when_applies: "When managing infrastructure and application deployments that need audit trails, drift detection, and automated reconciliation"
