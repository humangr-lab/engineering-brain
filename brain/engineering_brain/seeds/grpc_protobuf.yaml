layer: rules
technology: gRPC
domain: api
knowledge:
- id: CR-GRPC-001
  text: Never reuse or change deleted field numbers — reserve them to prevent data corruption.
  why: Protobuf encodes fields by number, not name. If you delete field 3 (was string name) and later reuse 3 for int32 age,
    old serialized data with a string in field 3 is deserialized as an integer — silent data corruption, not an error. Reserved
    numbers prevent accidental reuse.
  how_to_do_right: When removing a field, add its number (and name) to the reserved list. Never reuse a field number even
    if the type matches. Treat field numbers as permanent allocation — like database column IDs.
  severity: critical
  technologies:
    lang: [protobuf]
    platform: [grpc]
  domains:
    domain: [architecture, api]
    concern: [backend]
  example_good: "message User {\n  reserved 3, 7;                // Numbers never to be reused\n  reserved \"middle_name\"\
    , \"ssn\"; // Names never to be reused\n\n  int32 id = 1;\n  string email = 2;\n  // field 3 was middle_name — RESERVED\n\
    \  string first_name = 4;\n  string last_name = 5;\n  // field 7 was ssn — RESERVED (removed for privacy)\n  string phone\
    \ = 8;\n}\n"
  example_bad: "// v1: field 3 was string middle_name\n// v2: field 3 reused as int32 age\nmessage User {\n  int32 id = 1;\n\
    \  string email = 2;\n  int32 age = 3;  // OLD DATA has string here — deserialized as garbage int\n  string first_name\
    \ = 4;\n}\n// Old serialized messages: field 3 = \"John\" → decoded as age = ???\n// Silent data corruption — no error,\
    \ no warning\n"
  when_applies: Any project using gRPC service communication or Protobuf
  when_not_applies: internal modules with no exposed interface, monolithic single-process apps. projects not using gRPC or
    Protobuf
  sources: ["https://protobuf.dev/programming-guides/proto3/#reserved"]
- id: CR-GRPC-002
  text: Only add optional fields for backward compatibility — never change field types or make required fields optional.
  why: 'Protobuf wire format is designed for forward/backward compatibility ONLY if you follow the rules: adding optional
    fields is safe (old code ignores unknown fields, new code has defaults). Changing types breaks deserialization. Removing
    required fields causes old code to reject new messages.'
  how_to_do_right: Add new fields as optional with sensible defaults. Use proto3 (all fields optional by default). Use oneof
    for mutually exclusive extensions. Use wrapper types (google.protobuf.StringValue) when you need to distinguish null from
    default.
  severity: critical
  technologies:
    lang: [protobuf]
    platform: [grpc]
  domains:
    domain: [architecture, api]
    concern: [backend]
  example_good: "// v1\nmessage CreateOrderRequest {\n  string product_id = 1;\n  int32 quantity = 2;\n}\n\n// v2 — backward\
    \ compatible: only added optional fields\nmessage CreateOrderRequest {\n  string product_id = 1;\n  int32 quantity = 2;\n\
    \  string coupon_code = 3;               // NEW: optional, default \"\"\n  google.protobuf.StringValue note = 4; // NEW:\
    \ nullable string\n  ShippingMethod shipping = 5;          // NEW: enum with default\n}\n\nenum ShippingMethod {\n  SHIPPING_METHOD_UNSPECIFIED\
    \ = 0;  // Default — backward compatible\n  STANDARD = 1;\n  EXPRESS = 2;\n}\n"
  example_bad: "// v1: field 2 was int32 quantity\n// v2: changed field 2 to string quantity — BREAKING\nmessage CreateOrderRequest\
    \ {\n  string product_id = 1;\n  string quantity = 2;  // Was int32 — old clients send int, decoded as gibberish string\n\
    }\n"
  when_applies: Any project using gRPC service communication or Protobuf
  when_not_applies: internal modules with no exposed interface, monolithic single-process apps. projects not using gRPC or
    Protobuf
  sources: ["https://protobuf.dev/programming-guides/proto3/#updating"]
- id: CR-GRPC-003
  text: Use well-known types (Timestamp, Duration, Any, Struct) — do not reinvent time, duration, or dynamic types.
  why: 'Custom timestamp fields (int64 unix_millis, string iso8601) are ambiguous: seconds or milliseconds? UTC or local?
    Which format? Well-known types have standardized semantics, language-specific helpers, and JSON mapping. Every Protobuf
    library knows how to handle them correctly.'
  how_to_do_right: Import google/protobuf/timestamp.proto for timestamps. Use Duration for time intervals. Use Struct/Value
    for dynamic JSON-like data. Use FieldMask for partial updates. Use Any for polymorphic messages.
  severity: medium
  technologies:
    lang: [protobuf]
    platform: [grpc]
  domains:
    domain: [architecture, api]
    concern: [backend]
  example_good: "import \"google/protobuf/timestamp.proto\";\nimport \"google/protobuf/duration.proto\";\nimport \"google/protobuf/field_mask.proto\"\
    ;\n\nmessage Event {\n  string id = 1;\n  string name = 2;\n  google.protobuf.Timestamp created_at = 3;   // Standard\
    \ timestamp\n  google.protobuf.Duration ttl = 4;            // Standard duration\n}\n\nmessage UpdateEventRequest {\n\
    \  string id = 1;\n  Event event = 2;\n  google.protobuf.FieldMask update_mask = 3;  // Partial update\n}\n\n// Generated\
    \ code: event.created_at.ToDatetime() — language-native conversion\n"
  example_bad: "message Event {\n  string id = 1;\n  string name = 2;\n  int64 created_at_millis = 3;  // Milliseconds? Seconds?\
    \ Since when? UTC?\n  int32 ttl_seconds = 4;        // What if we need sub-second precision later?\n  string updated_fields\
    \ = 5;    // Comma-separated field names? Really?\n}\n// Every consumer must know: it's milliseconds since Unix epoch,\
    \ UTC\n// No library support — manual conversion everywhere\n"
  when_applies: Projects using gRPC service communication or Protobuf
  when_not_applies: internal modules with no exposed interface, monolithic single-process apps. projects not using gRPC or
    Protobuf
  sources: ["https://protobuf.dev/reference/protobuf/google.protobuf/"]
- id: CR-GRPC-004
  text: Follow Protobuf style guide — CamelCase for messages, snake_case for fields, UPPER_CASE for enum values with 0 as
    UNSPECIFIED.
  why: 'Consistent naming enables automatic language-specific conversion: user_name in proto becomes userName in Java, user_name
    in Python, UserName in C#. Enum value 0 as UNSPECIFIED is required because proto3 uses 0 as the default — without it,
    the default value silently means something specific.'
  how_to_do_right: 'Messages: CamelCase (UserProfile). Fields: snake_case (first_name). Enums: UPPER_SNAKE_CASE with 0 = TYPE_UNSPECIFIED.
    Services: CamelCase. RPCs: CamelCase (GetUser). Use buf lint to enforce.'
  severity: medium
  technologies:
    lang: [protobuf]
    platform: [grpc]
  domains:
    domain: [architecture, api]
    concern: [backend]
  example_good: "message UserProfile {\n  string user_id = 1;\n  string display_name = 2;\n  UserRole role = 3;\n}\n\nenum\
    \ UserRole {\n  USER_ROLE_UNSPECIFIED = 0;  // Default — explicit \"not set\"\n  USER_ROLE_MEMBER = 1;\n  USER_ROLE_ADMIN\
    \ = 2;\n  USER_ROLE_OWNER = 3;\n}\n\nservice UserService {\n  rpc GetUser(GetUserRequest) returns (UserProfile);\n  rpc\
    \ ListUsers(ListUsersRequest) returns (ListUsersResponse);\n}\n"
  example_bad: "message userProfile {              // Should be CamelCase\n  string UserId = 1;               // Should be\
    \ snake_case\n  string DisplayName = 2;\n  user_role Role = 3;\n}\n\nenum user_role {                   // Should be CamelCase\n\
    \  member = 0;                       // 0 means \"member\" by default — dangerous\n  admin = 1;                      \
    \  // Should be UPPER_SNAKE_CASE\n}\n// New field defaults to member — should default to UNSPECIFIED\n"
  when_applies: Projects using gRPC service communication or Protobuf
  when_not_applies: internal modules with no exposed interface, monolithic single-process apps. projects not using gRPC or
    Protobuf
  sources: ["https://protobuf.dev/programming-guides/style/"]
- id: CR-GRPC-005
  text: Start with unary RPCs — graduate to streaming only when unary does not fit (large results, real-time, uploads).
  why: 'Streaming adds complexity: connection management, flow control, error handling mid-stream, and reconnection logic.
    Unary RPCs are simple request/response — easy to test, cache, retry, and load balance. Use streaming only when the data
    is too large, too slow, or inherently incremental.'
  how_to_do_right: 'Unary: CRUD operations, lookups, commands. Server streaming: large result sets, event feeds, file downloads.
    Client streaming: file uploads, telemetry batches. Bidirectional: chat, collaborative editing, real-time sync.'
  severity: medium
  technologies:
    platform: [grpc]
  domains:
    domain: [architecture, api]
  example_good: "service OrderService {\n  // Unary — simple CRUD (default choice)\n  rpc CreateOrder(CreateOrderRequest)\
    \ returns (Order);\n  rpc GetOrder(GetOrderRequest) returns (Order);\n\n  // Server streaming — large result set\n  rpc\
    \ ExportOrders(ExportOrdersRequest) returns (stream Order);\n\n  // Client streaming — batch telemetry\n  rpc ReportMetrics(stream\
    \ MetricPoint) returns (MetricsSummary);\n\n  // Bidirectional — real-time order tracking\n  rpc TrackOrder(stream TrackingUpdate)\
    \ returns (stream OrderStatus);\n}\n"
  example_bad: "service OrderService {\n  // Everything is bidirectional streaming — unnecessary complexity\n  rpc CreateOrder(stream\
    \ CreateOrderRequest) returns (stream Order);\n  rpc GetOrder(stream GetOrderRequest) returns (stream Order);\n  // GetOrder\
    \ is a simple lookup — why does it need streaming?\n  // Cannot be cached, harder to test, harder to load balance\n}\n"
  when_applies: Projects using gRPC service communication
  when_not_applies: internal modules with no exposed interface, monolithic single-process apps. projects not using gRPC
  sources: ["https://grpc.io/docs/what-is-grpc/core-concepts/#rpc-life-cycle"]
- id: CR-GRPC-006
  text: Use interceptors for cross-cutting concerns — logging, auth, metrics, retry — not inline resolver code.
  why: 'Without interceptors, every RPC handler contains repeated boilerplate: log start, check auth, record metrics, catch
    errors. Interceptors compose cleanly (auth -> logging -> metrics), run in defined order, and can be tested independently.'
  how_to_do_right: 'Chain interceptors in order: auth first, then logging, then metrics. Use unary interceptors for unary
    RPCs, stream interceptors for streams. Client interceptors: add auth tokens, retry with backoff, add deadline.'
  severity: high
  technologies:
    lang: [go]
    library: [node, js]
    platform: [grpc]
  domains:
    domain: [architecture, api]
    concern: [backend]
  example_good: "// Go — server interceptor chain\nfunc loggingInterceptor(\n    ctx context.Context, req interface{},\n \
    \   info *grpc.UnaryServerInfo, handler grpc.UnaryHandler,\n) (interface{}, error) {\n    start := time.Now()\n    resp,\
    \ err := handler(ctx, req)\n    log.Printf(\"method=%s duration=%s error=%v\",\n        info.FullMethod, time.Since(start),\
    \ err)\n    return resp, err\n}\n\nfunc authInterceptor(\n    ctx context.Context, req interface{},\n    info *grpc.UnaryServerInfo,\
    \ handler grpc.UnaryHandler,\n) (interface{}, error) {\n    token, err := extractToken(ctx)\n    if err != nil {\n   \
    \     return nil, status.Error(codes.Unauthenticated, \"missing token\")\n    }\n    ctx = context.WithValue(ctx, userKey,\
    \ token.UserID)\n    return handler(ctx, req)\n}\n\nserver := grpc.NewServer(\n    grpc.ChainUnaryInterceptor(authInterceptor,\
    \ loggingInterceptor),\n)\n"
  example_bad: "func (s *Server) GetUser(ctx context.Context, req *pb.GetUserRequest) (*pb.User, error) {\n    // Auth repeated\
    \ in every handler\n    token, err := extractToken(ctx)\n    if err != nil { return nil, status.Error(codes.Unauthenticated,\
    \ \"missing token\") }\n    // Logging repeated in every handler\n    log.Printf(\"GetUser called by %s\", token.UserID)\n\
    \    start := time.Now()\n    // ... actual logic ...\n    log.Printf(\"GetUser took %s\", time.Since(start))\n    //\
    \ Metrics repeated in every handler\n    metrics.RecordLatency(\"GetUser\", time.Since(start))\n    return user, nil\n\
    }\n// Same boilerplate in CreateUser, UpdateUser, DeleteUser, ListUsers...\n"
  when_applies: Projects using gRPC service communication, Go services and tools, or Node.js
  when_not_applies: internal modules with no exposed interface, monolithic single-process apps
  sources: ["https://grpc.io/docs/guides/interceptors/"]
- id: CR-GRPC-007
  text: Use gRPC status codes correctly — never return OK with error data or INTERNAL for client errors.
  why: 'Status codes drive client behavior: NOT_FOUND triggers fallback UI, UNAVAILABLE triggers retry, INVALID_ARGUMENT shows
    validation error. Returning INTERNAL for everything means clients cannot distinguish retryable from non-retryable errors.
    Returning OK with error payload breaks all middleware.'
  how_to_do_right: 'INVALID_ARGUMENT: bad input. NOT_FOUND: resource missing. ALREADY_EXISTS: duplicate. PERMISSION_DENIED:
    authz failure. UNAUTHENTICATED: authn failure. UNAVAILABLE: retry later. INTERNAL: server bug (only). DEADLINE_EXCEEDED:
    timeout.'
  severity: high
  technologies:
    platform: [grpc]
  domains:
    domain: [architecture, api]
    concern: [backend]
  example_good: "func (s *Server) GetUser(ctx context.Context, req *pb.GetUserRequest) (*pb.User, error) {\n    if req.UserId\
    \ == \"\" {\n        return nil, status.Error(codes.InvalidArgument, \"user_id is required\")\n    }\n\n    user, err\
    \ := s.db.GetUser(ctx, req.UserId)\n    if err != nil {\n        if errors.Is(err, ErrNotFound) {\n            return\
    \ nil, status.Error(codes.NotFound,\n                fmt.Sprintf(\"user %s not found\", req.UserId))\n        }\n    \
    \    // Only INTERNAL for actual server errors\n        return nil, status.Error(codes.Internal, \"failed to fetch user\"\
    )\n    }\n\n    return user, nil\n}\n"
  example_bad: "func (s *Server) GetUser(ctx context.Context, req *pb.GetUserRequest) (*pb.User, error) {\n    user, err :=\
    \ s.db.GetUser(ctx, req.UserId)\n    if err != nil {\n        return nil, status.Error(codes.Internal, err.Error())\n\
    \        // \"user not found\" returns INTERNAL — client retries pointlessly\n        // err.Error() may leak SQL details:\
    \ \"SELECT * FROM users WHERE...\"\n    }\n    return user, nil\n}\n\n// Even worse: error in payload with OK status\n\
    func (s *Server) GetUser(ctx context.Context, req *pb.GetUserRequest) (*pb.Response, error) {\n    return &pb.Response{Error:\
    \ \"not found\"}, nil  // Status OK — middleware thinks success\n}\n"
  when_applies: Projects using gRPC service communication
  when_not_applies: internal modules with no exposed interface, monolithic single-process apps. projects not using gRPC
  sources: ["https://grpc.io/docs/guides/status-codes/"]
- id: CR-GRPC-008
  text: Use google.rpc.Status with error details for rich error responses — field violations, retry info, debug info.
  why: 'A single error code and message is insufficient for complex errors: which field failed validation? How long should
    the client wait before retrying? What request ID to reference in support tickets? google.rpc error details provide structured,
    standardized metadata that clients can programmatically handle.'
  how_to_do_right: Use errdetails package. BadRequest with FieldViolation for validation errors. RetryInfo for rate limiting.
    DebugInfo for internal details (only in development). RequestInfo for tracing. Keep user-facing messages generic, details
    structured.
  severity: medium
  technologies:
    lang: [go]
    platform: [grpc]
  domains:
    domain: [architecture, api]
    concern: [backend]
  example_good: "import (\n    \"google.golang.org/genproto/googleapis/rpc/errdetails\"\n    \"google.golang.org/grpc/status\"\
    \n)\n\nfunc (s *Server) CreateUser(ctx context.Context, req *pb.CreateUserRequest) (*pb.User, error) {\n    var violations\
    \ []*errdetails.BadRequest_FieldViolation\n    if req.Email == \"\" {\n        violations = append(violations, &errdetails.BadRequest_FieldViolation{\n\
    \            Field:       \"email\",\n            Description: \"email is required\",\n        })\n    }\n    if len(req.Name)\
    \ > 100 {\n        violations = append(violations, &errdetails.BadRequest_FieldViolation{\n            Field:       \"\
    name\",\n            Description: \"name must be 100 characters or fewer\",\n        })\n    }\n    if len(violations)\
    \ > 0 {\n        st := status.New(codes.InvalidArgument, \"invalid input\")\n        st, _ = st.WithDetails(&errdetails.BadRequest{FieldViolations:\
    \ violations})\n        return nil, st.Err()\n    }\n    // ...\n}\n"
  example_bad: "func (s *Server) CreateUser(ctx context.Context, req *pb.CreateUserRequest) (*pb.User, error) {\n    if req.Email\
    \ == \"\" || len(req.Name) > 100 {\n        return nil, status.Error(codes.InvalidArgument, \"invalid input\")\n     \
    \   // Which field? What's wrong with it? Client cannot show field-level errors\n    }\n}\n"
  when_applies: Projects using gRPC service communication or Go services and tools
  when_not_applies: internal modules with no exposed interface, monolithic single-process apps. projects not using gRPC or
    Go
  sources: ["https://grpc.io/docs/guides/error/"]
- id: CR-GRPC-009
  text: Implement the standard gRPC health checking protocol — per-service health status, not just process-level.
  why: Kubernetes liveness/readiness probes, load balancers, and service meshes use the gRPC health protocol to route traffic.
    Without it, a server that cannot reach its database still receives requests and returns errors. Per-service health enables
    partial degradation — disable one service while others continue.
  how_to_do_right: 'Implement grpc.health.v1.Health service. Set per-service status: SERVING when ready, NOT_SERVING when
    degraded, UNKNOWN at startup. Use grpc-health-probe for Kubernetes probes. Update status when dependencies fail/recover.'
  severity: high
  technologies:
    platform: [grpc, kubernetes]
  domains:
    domain: [architecture, api, operations, devops, reliability]
  example_good: "import (\n    \"google.golang.org/grpc/health\"\n    healthpb \"google.golang.org/grpc/health/grpc_health_v1\"\
    \n)\n\nhealthServer := health.NewServer()\nhealthpb.RegisterHealthServer(grpcServer, healthServer)\n\n// Set service-level\
    \ health\nhealthServer.SetServingStatus(\"user.UserService\", healthpb.HealthCheckResponse_SERVING)\nhealthServer.SetServingStatus(\"\
    order.OrderService\", healthpb.HealthCheckResponse_SERVING)\n\n// When database goes down — mark dependent services NOT_SERVING\n\
    func onDBDisconnect() {\n    healthServer.SetServingStatus(\"user.UserService\",\n        healthpb.HealthCheckResponse_NOT_SERVING)\n\
    \    // order.OrderService may still work with cache\n}\n\n// Kubernetes readiness probe:\n// readinessProbe:\n//   exec:\n\
    //     command: [\"grpc-health-probe\", \"-addr=:50051\", \"-service=user.UserService\"]\n"
  example_bad: '// No health check — Kubernetes cannot detect unhealthy state

    // Pod receives traffic even when database is unreachable

    // All requests return INTERNAL error for minutes until pod restarts


    // Or: process-level only — returns SERVING even when DB is down

    healthServer.SetServingStatus("", healthpb.HealthCheckResponse_SERVING)

    // Kubernetes thinks everything is fine — routes traffic to broken instance

    '
  when_applies: Projects using gRPC service communication or Kubernetes-orchestrated deployments
  when_not_applies: internal modules with no exposed interface, monolithic single-process apps. projects not using gRPC or
    Kubernetes
  sources: ["https://grpc.io/docs/guides/health-checking/"]
- id: CR-GRPC-010
  text: Always set a deadline on every RPC call — subtract elapsed time when propagating to downstream services.
  why: Without a deadline, a slow downstream service blocks the caller forever — cascading to its callers, eventually exhausting
    connection pools and goroutines across the entire service mesh. Deadlines propagate automatically in gRPC metadata — if
    the remaining time is too short, downstream services can fail fast.
  how_to_do_right: 'Set a deadline on every outgoing RPC: context.WithTimeout. Propagate the context (gRPC handles deadline
    forwarding). Set default deadline in interceptor if none is set. Check ctx.Err() before expensive operations. Use DEADLINE_EXCEEDED
    status code.'
  severity: critical
  technologies:
    lang: [go]
    platform: [grpc]
  domains:
    domain: [architecture, api, reliability]
  example_good: "// Client: always set deadline\nctx, cancel := context.WithTimeout(context.Background(), 5*time.Second)\n\
    defer cancel()\n\nuser, err := client.GetUser(ctx, &pb.GetUserRequest{UserId: \"123\"})\nif err != nil {\n    if status.Code(err)\
    \ == codes.DeadlineExceeded {\n        log.Warn(\"GetUser timed out — returning cached data\")\n        return cachedUser,\
    \ nil\n    }\n    return nil, err\n}\n\n// Server: check remaining deadline before expensive work\nfunc (s *Server) GetUser(ctx\
    \ context.Context, req *pb.GetUserRequest) (*pb.User, error) {\n    deadline, ok := ctx.Deadline()\n    if ok && time.Until(deadline)\
    \ < 100*time.Millisecond {\n        return nil, status.Error(codes.DeadlineExceeded, \"insufficient time remaining\")\n\
    \    }\n    // Proceed with DB query — context deadline propagates to driver\n    return s.db.GetUser(ctx, req.UserId)\n\
    }\n"
  example_bad: '// No deadline — hangs forever if service is slow

    user, err := client.GetUser(context.Background(), &pb.GetUserRequest{UserId: "123"})

    // If UserService is slow, this goroutine blocks indefinitely

    // All callers of THIS service also block — cascade failure

    '
  when_applies: Any project using gRPC service communication or Go services and tools
  when_not_applies: internal modules with no exposed interface, monolithic single-process apps. projects not using gRPC or
    Go
  sources: ["https://grpc.io/docs/guides/deadlines/"]
- id: CR-GRPC-011
  text: Use client-side load balancing with health-aware routing — HTTP/2 multiplexing means server-side LB is insufficient.
  why: gRPC uses HTTP/2, which multiplexes all requests over a single TCP connection. A TCP-level load balancer (L4) sees
    one connection and sends all requests to one backend — no distribution at all. gRPC needs L7 (application-level) or client-side
    load balancing to distribute RPCs across backends.
  how_to_do_right: 'Client-side: grpc.WithDefaultServiceConfig for round-robin. Service mesh: Envoy/Linkerd handle L7 gRPC
    LB. Pick-first is the default — explicitly set round-robin. Use xDS for advanced routing (weighted, locality-aware). Periodically
    re-resolve DNS for new backends.'
  severity: high
  technologies:
    platform: [grpc, envoy, kubernetes]
  domains:
    domain: [architecture, api, operations, devops, reliability]
  example_good: "// Go — client-side round-robin load balancing\nconn, err := grpc.Dial(\n    \"dns:///user-service.default.svc.cluster.local:50051\"\
    ,\n    grpc.WithDefaultServiceConfig(`{\n        \"loadBalancingConfig\": [{\"round_robin\": {}}],\n        \"healthCheckConfig\"\
    : {\"serviceName\": \"user.UserService\"}\n    }`),\n    grpc.WithTransportCredentials(insecure.NewCredentials()),\n)\n\
    \n// With Kubernetes headless service (clusterIP: None):\n// DNS returns multiple A records — client connects to all\n\
    // round_robin distributes RPCs evenly across all pods\n\n// Alternatively: Envoy sidecar handles L7 gRPC load balancing\n\
    // transparently — application connects to localhost:50051\n"
  example_bad: "// Default pick-first — all RPCs go to ONE backend\nconn, err := grpc.Dial(\"user-service:50051\",\n    grpc.WithTransportCredentials(insecure.NewCredentials()))\n\
    // HTTP/2 multiplexes everything over 1 connection to 1 backend\n// Other backends sit idle — no load distribution\n"
  when_applies: Projects using gRPC service communication, Envoy, or Kubernetes-orchestrated deployments
  when_not_applies: internal modules with no exposed interface, monolithic single-process apps
  sources: ["https://grpc.io/docs/guides/performance/"]
- id: CR-GRPC-012
  text: Configure keepalive parameters on both client and server — cloud load balancers silently close idle connections.
  why: Cloud load balancers (AWS ALB, GCP ILB) close idle TCP connections after 60-350 seconds. Without keepalive, the client
    sends a request on a silently closed connection, gets no response, and waits until deadline — appearing as random timeouts
    under low traffic.
  how_to_do_right: 'Server: set MaxConnectionIdle, MaxConnectionAge, Time (keepalive ping interval). Client: set Time and
    Timeout for keepalive pings. Set Time lower than LB idle timeout (e.g., 30s when LB timeout is 60s). Use PermitWithoutStream
    on client for idle pings.'
  severity: high
  technologies:
    lang: [go]
    platform: [grpc]
  domains:
    domain: [architecture, api, reliability, operations, devops]
  example_good: "// Server keepalive config\nserver := grpc.NewServer(\n    grpc.KeepaliveParams(keepalive.ServerParameters{\n\
    \        MaxConnectionIdle:     5 * time.Minute,   // Close idle connections\n        MaxConnectionAge:      30 * time.Minute,\
    \  // Force reconnect (rolling restarts)\n        MaxConnectionAgeGrace: 10 * time.Second,  // Grace period for in-flight\
    \ RPCs\n        Time:                  30 * time.Second,   // Ping client every 30s\n        Timeout:               10\
    \ * time.Second,   // Wait 10s for ping ack\n    }),\n    grpc.KeepaliveEnforcementPolicy(keepalive.EnforcementPolicy{\n\
    \        MinTime:             15 * time.Second, // Min time between client pings\n        PermitWithoutStream: true, \
    \            // Allow pings on idle connections\n    }),\n)\n\n// Client keepalive config\nconn, err := grpc.Dial(target,\n\
    \    grpc.WithKeepaliveParams(keepalive.ClientParameters{\n        Time:                30 * time.Second, // Ping server\
    \ every 30s\n        Timeout:             10 * time.Second, // Wait 10s for ping ack\n        PermitWithoutStream: true,\
    \             // Ping even when no active RPCs\n    }),\n)\n"
  example_bad: '// No keepalive — idle connections killed by cloud LB

    server := grpc.NewServer()

    conn, _ := grpc.Dial(target)

    // After 60s idle: LB closes TCP connection silently

    // Next RPC: client sends to dead connection → hangs until deadline

    // Symptom: "random timeouts" under low traffic — disappear under high traffic

    '
  when_applies: Projects using gRPC service communication or Go services and tools
  when_not_applies: internal modules with no exposed interface, monolithic single-process apps. projects not using gRPC or
    Go
  sources: ["https://grpc.io/docs/guides/keepalive/"]
- id: CR-GRPC-013
  text: Use buf for schema linting, breaking change detection, and code generation — not raw protoc.
  why: protoc has no linting, no breaking change detection, and complex plugin management. buf provides a single tool for
    lint (style guide enforcement), breaking change detection (compares against git branch), and managed code generation (no
    manual plugin downloads). It catches backwards-incompatible changes before merge.
  how_to_do_right: buf lint — enforce style guide on every commit. buf breaking --against main — detect breaking changes in
    CI. buf generate — generate code for all languages. Use buf.yaml for config, buf.gen.yaml for codegen. Enable DEFAULT
    + COMMENTS lint categories.
  severity: medium
  technologies:
    lang: [protobuf]
    library: [buf]
    platform: [grpc]
  domains:
    domain: [architecture, api, quality, operations, devops]
  example_good: "# buf.yaml\nversion: v1\nbreaking:\n  use:\n    - FILE  # Detect breaking changes vs git\nlint:\n  use:\n\
    \    - DEFAULT\n    - COMMENTS  # Require comments on types/services\n  except:\n    - PACKAGE_VERSION_SUFFIX  # We don't\
    \ use versioned packages\n\n# buf.gen.yaml\nversion: v1\nplugins:\n  - plugin: buf.build/protocolbuffers/go\n    out:\
    \ gen/go\n    opt: paths=source_relative\n  - plugin: buf.build/grpc/go\n    out: gen/go\n    opt: paths=source_relative\n\
    \n# CI pipeline\n# - run: buf lint\n# - run: buf breaking --against 'origin/main'\n# - run: buf generate\n"
  example_bad: "# Manual protoc invocation — fragile, no linting, no breaking change detection\nprotoc --go_out=gen/ --go-grpc_out=gen/\
    \ \\\n  -I /usr/local/include \\\n  -I third_party/googleapis \\\n  proto/*.proto\n# No lint → inconsistent style across\
    \ team\n# No breaking check → accidentally remove field, break all clients\n# Manual plugin management → version drift\
    \ between developers\n"
  when_applies: Projects using gRPC service communication, Protobuf, or buf
  when_not_applies: internal modules with no exposed interface, monolithic single-process apps
  sources: ["https://buf.build/docs/introduction"]
- id: CR-GRPC-014
  text: Enable server reflection in development for debugging with grpcurl/grpcui — disable it in production.
  why: Server reflection exposes the full schema (all services, methods, message types) to any client without proto files.
    In development, this enables grpcurl for CLI testing and grpcui for a web GUI — invaluable for debugging. In production,
    it is an information disclosure risk — attackers enumerate your entire API surface.
  how_to_do_right: 'Enable reflection conditionally on environment variable. Use grpcurl for CLI testing (similar to curl).
    Use grpcui for web-based exploration. In production: disable reflection, require proto files for client generation. Gate
    behind feature flag.'
  severity: medium
  technologies:
    lang: [go]
    platform: [grpc]
  domains:
    domain: [architecture, api, security, testing]
  example_good: "import \"google.golang.org/grpc/reflection\"\n\nserver := grpc.NewServer(/* ... */)\npb.RegisterUserServiceServer(server,\
    \ &userServer{})\n\n// Enable reflection only in development\nif os.Getenv(\"ENABLE_GRPC_REFLECTION\") == \"true\" {\n\
    \    reflection.Register(server)\n    log.Println(\"gRPC reflection enabled — development mode\")\n}\n\n// Testing with\
    \ grpcurl:\n// grpcurl -plaintext localhost:50051 list\n// grpcurl -plaintext -d '{\"user_id\": \"123\"}' localhost:50051\
    \ user.UserService/GetUser\n\n// Testing with grpcui (web GUI):\n// grpcui -plaintext localhost:50051\n"
  example_bad: '// Reflection always enabled — schema exposed in production

    reflection.Register(server)

    // Attacker: grpcurl -plaintext api.example.com:443 list

    // → user.UserService, admin.AdminService, internal.MetricsService

    // Discovers internal services not meant for external access

    '
  when_applies: Projects using gRPC service communication or Go services and tools
  when_not_applies: internal modules with no exposed interface, monolithic single-process apps. projects not using gRPC or
    Go
  sources: ["https://grpc.io/docs/guides/reflection/"]
