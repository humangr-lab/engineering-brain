layer: rules
domain: accessibility
knowledge:
- id: CR-A11Y-CONTRAST-001
  text: 'All text must meet WCAG AA contrast ratio: 4.5:1 for normal text, 3:1 for large text (18px+ or 14px+ bold).'
  why: Low contrast text is unreadable for 8% of men with color vision deficiency, users in bright sunlight, and the 25% of
    adults over 40 with declining vision. WCAG AA compliance is a legal requirement under ADA in the US, EAA in the EU, and
    similar laws in 50+ countries. Lawsuits for accessibility failures cost $50K-$300K on average.
  how_to_do_right: '1. Check contrast with browser DevTools (Chrome Lighthouse, axe DevTools). 2. Use a contrast checker tool
    (WebAIM Contrast Checker, Stark plugin). 3. Define color tokens with contrast ratios documented (e.g., --text-primary:
    #1a1a1a on --bg-primary: #ffffff = 16.4:1). 4. Test in both light and dark mode. 5. Never use light gray text on white
    backgrounds. 6. Placeholder text must also meet contrast requirements or be supplemented by visible labels.'
  severity: critical
  technologies:
    lang: [css, html]
    framework: [frontend, react]
    library: [design systems]
  domains:
    domain: [quality, architecture, ui]
    concern: [accessibility, frontend, design_system]
  example_good: "/* Contrast-safe color tokens with ratios documented */\n:root {\n  --text-primary: #1a1a1a;    /* 16.4:1\
    \ on white — AAA */\n  --text-secondary: #4a4a4a;  /* 8.6:1 on white — AAA */\n  --text-muted: #6b6b6b;      /* 5.1:1\
    \ on white — AA */\n  --text-on-primary: #ffffff;  /* 7.2:1 on --color-primary: #1a56db */\n}\n.body-text { color: var(--text-primary);\
    \ font-size: 16px; }\n.caption { color: var(--text-muted); font-size: 14px; } /* 5.1:1 — passes AA */\n"
  example_bad: '/* FAILS: Light gray on white — 2.3:1 contrast ratio */

    .placeholder { color: #c0c0c0; } /* Invisible to low-vision users */

    .subtle-text { color: #aaaaaa; } /* 2.3:1 — fails AA AND AAA */

    .label { color: #999999; font-size: 12px; } /* Small text needs 4.5:1, this is 2.8:1 */

    '
  when_applies: Any project using CSS styling and layout, HTML document structure, React component-based UIs, or Design Systems
  when_not_applies: internal developer tools, APIs, non-user-facing systems
  sources: ["https://www.w3.org/WAI/WCAG21/Understanding/contrast-minimum.html"]
- id: CR-A11Y-ZOOM-001
  text: All content and functionality must remain usable at 200% browser zoom without horizontal scrolling or content overlap.
  why: Users with low vision use browser zoom as their primary assistive technology — it is more common than screen readers.
    WCAG 1.4.4 requires content to be readable at 200% zoom. If your layout breaks at 200%, you are excluding millions of
    users. Responsive design that works at 200% usually works on mobile too, so this is a free mobile improvement.
  how_to_do_right: 1. Use relative units (rem, em, %) for font sizes and container widths, never px for fonts. 2. Use CSS
    Grid or Flexbox with wrap behavior. 3. Test at 200% zoom in Chrome (Ctrl+= or Cmd+=). 4. Avoid fixed-width containers
    that cause horizontal scroll. 5. Use max-width not width for content areas. 6. Media queries should use em-based breakpoints,
    not px.
  severity: high
  technologies:
    lang: [css, html]
    library: [responsive design]
  domains:
    domain: [quality, architecture, ui]
    concern: [accessibility, frontend, responsive]
  example_good: '/* Relative units, flexible layout, no fixed widths */

    .container { max-width: 60rem; margin: 0 auto; padding: 0 1rem; }

    .body-text { font-size: 1rem; line-height: 1.5; }  /* Scales with zoom */

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(18rem, 1fr)); gap: 1rem; }

    /* At 200% zoom: grid collapses to fewer columns, text stays readable, no h-scroll */

    '
  example_bad: '/* BREAKS at 200% zoom: fixed px widths, no wrap */

    .container { width: 1200px; }  /* Causes horizontal scroll at 200% */

    .body-text { font-size: 14px; }  /* Doesn''t scale with browser zoom settings */

    .grid { display: flex; }  /* No wrap — content overflows at zoom */

    .col { width: 300px; }  /* Fixed — doesn''t adapt */

    '
  when_applies: Projects using CSS styling and layout, HTML document structure, or Responsive Design
  when_not_applies: internal developer tools, APIs, non-user-facing systems
  sources: ["https://www.w3.org/WAI/WCAG21/Understanding/resize-text.html"]
- id: CR-A11Y-KEYBOARD-001
  text: All interactive elements must be reachable and operable via keyboard alone (Tab, Enter, Space, Arrow keys, Escape).
  why: Motor-impaired users, screen reader users, and power users all rely on keyboard navigation. If a feature works only
    with mouse clicks, you exclude approximately 7% of the population with motor disabilities plus all keyboard-first users.
    Many mobile assistive technologies also map to keyboard equivalents. Any interactive element that is not keyboard-accessible
    is effectively invisible to these users.
  how_to_do_right: 1. Use semantic HTML elements (<button>, <a>, <input>) which have keyboard behavior built-in. 2. Never
    use <div onClick> or <span onClick> without role='button' and tabIndex={0} and onKeyDown handler for Enter+Space. 3. Test
    entire flows with keyboard only (unplug your mouse). 4. Ensure Tab order matches visual order (no tabIndex > 0). 5. Escape
    closes modals/dropdowns. 6. Arrow keys navigate within components (tabs, menus, radio groups).
  severity: critical
  technologies:
    lang: [html, javascript]
    framework: [frontend, react]
    library: [aria]
  domains:
    domain: [quality, architecture, ui]
    concern: [accessibility, frontend, interaction_design]
  example_good: "<!-- Semantic HTML — keyboard support is FREE -->\n<button onClick={handleAction}>Save</button>  <!-- Tab-focusable,\
    \ Enter/Space activate -->\n<a href=\"/settings\">Settings</a>  <!-- Tab-focusable, Enter activates -->\n\n<!-- Custom\
    \ component WITH proper keyboard support -->\n<div\n  role=\"button\" tabIndex={0}\n  onClick={handleAction}\n  onKeyDown={(e)\
    \ => {\n    if (e.key === 'Enter' || e.key === ' ') {\n      e.preventDefault();\n      handleAction();\n    }\n  }}\n\
    >\n  Custom Action\n</div>\n"
  example_bad: '<!-- BAD: Div with click handler — invisible to keyboard users -->

    <div class="btn" onClick={handleAction}>Save</div>

    <!-- Can''t Tab to it. Can''t press Enter. Screen reader says "Save" with no context. -->


    <!-- BAD: Span link — not in Tab order -->

    <span class="link" onClick={() => navigate(''/settings'')}>Settings</span>

    <!-- Looks like a link, acts like nothing for keyboard users -->

    '
  when_applies: Any project using HTML document structure, React component-based UIs, JavaScript/TypeScript projects, or ARIA
  when_not_applies: internal developer tools, APIs, non-user-facing systems
  sources: ["https://www.w3.org/WAI/WCAG21/Understanding/keyboard.html"]
- id: CR-A11Y-FOCUS-001
  text: All focusable elements must have a visible focus indicator that meets 3:1 contrast ratio against adjacent colors.
  why: 'The focus indicator is the keyboard user''s cursor — without it, they literally cannot see where they are on the page.
    Removing focus outlines (outline: none) for aesthetic reasons is the single most common accessibility violation on the
    web. The :focus-visible CSS pseudo-class solves the aesthetic concern by showing focus rings only for keyboard navigation,
    not mouse clicks.'
  how_to_do_right: '1. Never use outline: none or outline: 0 without a replacement. 2. Use :focus-visible instead of :focus
    to show rings only for keyboard users. 3. Focus ring must be 3:1 contrast against background. 4. Use a 2px solid outline
    with a 2px offset for visibility. 5. Test focus visibility in both light and dark mode. 6. Custom focus styles must be
    at least as visible as the browser default.'
  severity: critical
  technologies:
    lang: [css, html]
    framework: [frontend, react]
  domains:
    domain: [quality, architecture, ui]
    concern: [accessibility, frontend]
  example_good: "/* Show focus ring only for keyboard navigation, not mouse clicks */\n:focus-visible {\n  outline: 2px solid\
    \ var(--color-focus, #1a56db);\n  outline-offset: 2px;\n  border-radius: 2px;\n}\n\n/* Remove default ONLY when providing\
    \ a visible replacement */\nbutton:focus:not(:focus-visible) {\n  outline: none; /* Mouse clicks: no ring */\n}\nbutton:focus-visible\
    \ {\n  outline: 2px solid #1a56db; /* Keyboard: visible ring */\n  outline-offset: 2px;\n}\n"
  example_bad: '/* DEVASTATING: Removes ALL focus indicators */

    *:focus { outline: none; }  /* Keyboard users are now blind */

    button:focus { outline: 0; }  /* Same — focus is invisible */


    /* BAD: Focus ring that doesn''t contrast */

    :focus { outline: 1px dotted #ccc; }  /* Nearly invisible on white */

    '
  when_applies: Any project using CSS styling and layout, HTML document structure, or React component-based UIs
  when_not_applies: internal developer tools, APIs, non-user-facing systems
  sources: ["https://www.w3.org/WAI/WCAG22/Understanding/focus-visible.html"]
- id: CR-A11Y-SKIP-NAV-001
  text: Pages must include a 'Skip to main content' link as the first focusable element.
  why: Screen reader and keyboard users must Tab through every navigation link on every page load before reaching content.
    On a page with 30 nav links, that is 30 Tab presses before they reach the article they came to read. Skip navigation provides
    a single keypress shortcut to bypass repeated blocks. WCAG 2.4.1 requires this.
  how_to_do_right: 1. Place an anchor link as the very first element inside <body>. 2. Link target is the main content area
    (id='main-content'). 3. Hide visually but show on focus (screen reader users discover it, sighted keyboard users see it
    when they Tab). 4. Make sure the target element has tabIndex={-1} so focus actually moves to it.
  severity: high
  technologies:
    lang: [html, css]
  domains:
    domain: [quality, architecture]
    concern: [accessibility, frontend, navigation]
  example_good: "<!-- First element in body — visible only on focus -->\n<a href=\"#main-content\" class=\"skip-link\">Skip\
    \ to main content</a>\n\n<nav><!-- 20 navigation links that keyboard users can skip --></nav>\n\n<main id=\"main-content\"\
    \ tabindex=\"-1\">\n  <!-- Main page content starts here -->\n</main>\n\n<style>\n  .skip-link {\n    position: absolute;\n\
    \    left: -9999px;\n    top: auto;\n    width: 1px;\n    height: 1px;\n    overflow: hidden;\n  }\n  .skip-link:focus\
    \ {\n    position: fixed;\n    top: 0; left: 0;\n    width: auto; height: auto;\n    padding: 1rem;\n    background: #000;\
    \ color: #fff;\n    z-index: 9999;\n    font-size: 1rem;\n  }\n</style>\n"
  example_bad: "<!-- BAD: No skip link — keyboard users Tab through 30 nav items on every page -->\n<body>\n  <nav>\n    <a\
    \ href=\"/\">Home</a>\n    <a href=\"/about\">About</a>\n    <!-- ...28 more links... -->\n  </nav>\n  <main>Content</main>\
    \  <!-- Keyboard user finally arrives after 30 Tab presses -->\n</body>\n"
  when_applies: Projects using HTML document structure or CSS styling and layout
  when_not_applies: internal developer tools, APIs, non-user-facing systems. projects not using HTML or CSS
  sources: ["https://www.w3.org/WAI/WCAG21/Understanding/bypass-blocks.html"]
- id: CR-A11Y-LABELS-001
  text: Every form input must have a programmatically associated label using <label for>, aria-label, or aria-labelledby.
  why: Without a label, screen readers announce inputs as 'edit text' or 'text field' with no context. Users cannot know what
    information to enter. Placeholder text is NOT a substitute — it disappears when the user starts typing, and many screen
    readers skip placeholders. Labels are also click targets that expand the clickable area (Fitts's Law), benefiting motor-impaired
    users.
  how_to_do_right: 1. Use <label for='fieldId'> — this is the preferred method. 2. If visual label is not possible, use aria-label
    on the input. 3. For complex labels, use aria-labelledby pointing to the element containing the label text. 4. Group related
    fields with <fieldset> and <legend> (radio groups, checkboxes). 5. Never rely solely on placeholder as the label.
  severity: critical
  technologies:
    lang: [html]
    framework: [frontend, react, vue, angular]
  domains:
    domain: [quality, architecture]
    concern: [accessibility, frontend, forms]
  example_good: "<!-- Proper label association — screen reader says \"Email address, edit text\" -->\n<label for=\"email\"\
    >Email address</label>\n<input id=\"email\" type=\"email\" placeholder=\"name@example.com\" />\n\n<!-- For icon-only inputs,\
    \ use aria-label -->\n<input type=\"search\" aria-label=\"Search products\" placeholder=\"Search...\" />\n\n<!-- For radio\
    \ groups, use fieldset + legend -->\n<fieldset>\n  <legend>Shipping method</legend>\n  <label><input type=\"radio\" name=\"\
    shipping\" value=\"standard\" /> Standard (5-7 days)</label>\n  <label><input type=\"radio\" name=\"shipping\" value=\"\
    express\" /> Express (2-3 days)</label>\n</fieldset>\n"
  example_bad: '<!-- BAD: No label — screen reader says "edit text" with NO context -->

    <input type="email" placeholder="Email" />

    <!-- Placeholder disappears on focus, screen reader may ignore it -->


    <!-- BAD: Label not associated (no ''for'' attribute) -->

    <label>Email</label>

    <input id="email" type="email" />

    <!-- Label and input not programmatically connected — clicking label doesn''t focus input -->

    '
  when_applies: Any project using HTML document structure, React component-based UIs, Vue.js applications, or Angular applications
  when_not_applies: internal developer tools, APIs, non-user-facing systems
  sources: ["https://www.w3.org/WAI/tutorials/forms/labels/"]
- id: CR-A11Y-ERRORS-001
  text: Form errors must be identified in text, not solely by color, and must be programmatically associated with the invalid
    field.
  why: 8% of men are color-blind. If the only error indicator is a red border, they cannot distinguish it from a normal border.
    WCAG 1.4.1 requires that color is never the sole means of conveying information. Screen readers need aria-invalid and
    aria-describedby to announce errors — visual red borders are invisible to them. Error messages next to the field (via
    aria-describedby) are 4x more discoverable than error summaries at page top.
  how_to_do_right: 1. Set aria-invalid='true' on the invalid field. 2. Add an error message element with a unique id. 3. Link
    the error to the field with aria-describedby='error-id'. 4. Use role='alert' or aria-live='polite' for dynamic errors.
    5. Include an error icon (not just color) for visual users. 6. Error text must describe WHAT is wrong and HOW to fix it.
  severity: critical
  technologies:
    lang: [html]
    framework: [frontend, react]
    library: [aria]
  domains:
    domain: [quality, architecture, reliability]
    concern: [accessibility, frontend, forms, error_handling]
  example_good: "<div class=\"field\">\n  <label for=\"password\">Password</label>\n  <input\n    id=\"password\" type=\"\
    password\"\n    aria-invalid=\"true\"\n    aria-describedby=\"password-error password-requirements\"\n  />\n  <p id=\"\
    password-error\" class=\"error\" role=\"alert\">\n    ⚠ Password must be at least 8 characters. You entered 5.\n  </p>\n\
    \  <p id=\"password-requirements\" class=\"hint\">\n    Requirements: 8+ characters, one uppercase, one number.\n  </p>\n\
    </div>\n"
  example_bad: '<!-- BAD: Error indicated ONLY by red border — invisible to color-blind users -->

    <input type="password" style="border: 2px solid red;" />

    <!-- No error text. No aria-invalid. No explanation of what''s wrong. -->

    <!-- Screen reader says: "Password, edit text" — no indication of error. -->

    '
  when_applies: Any project using HTML document structure, React component-based UIs, or ARIA
  when_not_applies: internal developer tools, APIs, non-user-facing systems
  sources: ["https://www.w3.org/WAI/WCAG21/Understanding/error-identification.html"]
- id: CR-A11Y-ARIA-ROLES-001
  text: Use semantic HTML first; only add ARIA roles when no native HTML element provides the needed semantics.
  why: 'The first rule of ARIA is: Don''t use ARIA if you can use native HTML. <button> has built-in keyboard support, focus
    management, and screen reader semantics. Adding role=''button'' to a <div> requires you to manually implement all of that.
    ARIA used incorrectly is WORSE than no ARIA — it creates false semantics that mislead assistive technology users. 67%
    of ARIA usage on the web makes accessibility worse, not better.'
  how_to_do_right: 1. Use <button> not <div role='button'>. 2. Use <a href> not <span role='link'>. 3. Use <nav> not <div
    role='navigation'>. 4. Use <main> not <div role='main'>. 5. Reserve ARIA for custom widgets (tabs, comboboxes, tree views)
    where no native HTML exists. 6. When using ARIA, implement ALL required keyboard interactions for that role.
  severity: high
  technologies:
    lang: [html]
    framework: [frontend, react]
    library: [aria]
  domains:
    domain: [quality, architecture, ui]
    concern: [accessibility, frontend]
  example_good: "<!-- Native HTML — accessible by default, zero ARIA needed -->\n<button onClick={save}>Save</button>\n<a\
    \ href=\"/settings\">Settings</a>\n<nav><ul><li><a href=\"/\">Home</a></li></ul></nav>\n<main>Content</main>\n<input type=\"\
    checkbox\" id=\"agree\" /><label for=\"agree\">I agree</label>\n\n<!-- ARIA only when native HTML can't do it (custom\
    \ tab panel) -->\n<div role=\"tablist\">\n  <button role=\"tab\" aria-selected=\"true\" aria-controls=\"panel-1\">Tab\
    \ 1</button>\n  <button role=\"tab\" aria-selected=\"false\" aria-controls=\"panel-2\">Tab 2</button>\n</div>\n<div role=\"\
    tabpanel\" id=\"panel-1\">Content 1</div>\n"
  example_bad: "<!-- BAD: ARIA role on elements that have native equivalents -->\n<div role=\"button\" onclick=\"save()\"\
    >Save</div>\n<!-- Missing: tabIndex, onKeyDown for Enter/Space, focus styles -->\n<!-- Native <button> gives ALL of this\
    \ for free -->\n\n<div role=\"navigation\">\n  <div role=\"list\">\n    <div role=\"listitem\"><span role=\"link\" onclick=\"\
    go('/')\">Home</span></div>\n  </div>\n</div>\n<!-- 4 ARIA roles that could be: <nav><ul><li><a href=\"/\">Home</a></li></ul></nav>\
    \ -->\n"
  when_applies: Projects using HTML document structure, ARIA, or React component-based UIs
  when_not_applies: internal developer tools, APIs, non-user-facing systems
  sources: ["https://www.w3.org/TR/using-aria/"]
- id: CR-A11Y-ARIA-LIVE-001
  text: Use aria-live regions to announce dynamic content changes that occur without page reload or focus change.
  why: Screen readers only announce content that receives focus or is loaded on navigation. Dynamic updates (toast notifications,
    chat messages, live scores, form validation errors) are completely silent unless announced via aria-live regions. Without
    aria-live, a blind user would never know their form was submitted, their message was sent, or an error occurred. This
    is WCAG 4.1.3 (Status Messages).
  how_to_do_right: 1. Use aria-live='polite' for non-urgent updates (success messages, status changes) — waits for user to
    finish current task. 2. Use aria-live='assertive' for urgent updates (errors, warnings) — interrupts immediately. 3. The
    live region must EXIST in the DOM before content is injected — adding role='alert' dynamically may not be announced. 4.
    Use role='status' for status bar updates, role='alert' for important messages. 5. Keep announcements concise (screen readers
    read the entire live region content).
  severity: high
  technologies:
    lang: [html, javascript]
    framework: [frontend, react]
    library: [aria]
  domains:
    domain: [quality, architecture, ui]
    concern: [accessibility, frontend, dynamic_content]
  example_good: "<!-- Live region exists in DOM from the start — content injected later -->\n<div id=\"notifications\" aria-live=\"\
    polite\" aria-atomic=\"true\" class=\"sr-only\">\n  <!-- Toast messages injected here are announced by screen reader -->\n\
    </div>\n\n<!-- Error alert — uses assertive because it's urgent -->\n<div role=\"alert\" aria-live=\"assertive\">\n  {error\
    \ && <p>Error: {error.message}. Please try again.</p>}\n</div>\n\n<!-- Status update — polite, doesn't interrupt -->\n\
    <div role=\"status\" aria-live=\"polite\">\n  {isLoading ? 'Loading results...' : `${count} results found`}\n</div>\n"
  example_bad: "// BAD: Dynamically creating alert element — may not be announced\nfunction showError(msg) {\n  const div\
    \ = document.createElement('div');\n  div.setAttribute('role', 'alert');  // Created AND populated at same time\n  div.textContent\
    \ = msg;  // Many screen readers miss this\n  document.body.appendChild(div);\n}\n\n// BAD: No live region — toast is\
    \ visually shown but screen reader says nothing\nfunction Toast({ message }) {\n  return <div className=\"toast\">{message}</div>;\n\
    \  // Sighted users see it. Blind users hear nothing.\n}\n"
  when_applies: Projects using HTML document structure, ARIA, React component-based UIs, or JavaScript/TypeScript projects
  when_not_applies: internal developer tools, APIs, non-user-facing systems
  sources: ["https://www.w3.org/WAI/WCAG21/Understanding/status-messages.html"]
- id: CR-A11Y-ARIA-LANDMARKS-001
  text: Every page must use landmark regions (main, nav, aside, footer) to enable screen reader users to navigate by page
    structure.
  why: 'Screen readers provide shortcuts to jump between landmark regions (NVDA: D key, VoiceOver: rotor). Without landmarks,
    screen reader users must listen to every element sequentially — like reading a book one word at a time instead of by chapter.
    Proper landmarks reduce navigation time by 70% for screen reader users. WCAG 1.3.1 requires content structure to be programmatically
    determinable.'
  how_to_do_right: '1. Use <main> for primary content (exactly one per page). 2. Use <nav> for navigation blocks (label each:
    aria-label=''Primary navigation''). 3. Use <aside> for complementary content (sidebars, related links). 4. Use <footer>
    for page footer. 5. Use <header> for page header. 6. Label duplicate landmarks (two <nav> elements need distinct aria-label).
    7. Every piece of content should be inside a landmark.'
  severity: high
  technologies:
    lang: [html]
    framework: [frontend, react]
  domains:
    domain: [quality, architecture]
    concern: [accessibility, frontend, navigation, structure]
  example_good: "<body>\n  <header>\n    <nav aria-label=\"Primary navigation\">\n      <a href=\"/\">Home</a>\n      <a href=\"\
    /products\">Products</a>\n    </nav>\n  </header>\n\n  <main id=\"main-content\">\n    <h1>Products</h1>\n    <!-- Primary\
    \ page content -->\n  </main>\n\n  <aside aria-label=\"Filters\">\n    <!-- Sidebar filters -->\n  </aside>\n\n  <footer>\n\
    \    <nav aria-label=\"Footer navigation\">\n      <a href=\"/privacy\">Privacy</a>\n      <a href=\"/terms\">Terms</a>\n\
    \    </nav>\n  </footer>\n</body>\n"
  example_bad: "<!-- BAD: All divs, no landmarks — screen reader has no page structure -->\n<body>\n  <div class=\"header\"\
    >\n    <div class=\"nav\"><a href=\"/\">Home</a></div>\n  </div>\n  <div class=\"content\">\n    <div class=\"page-title\"\
    >Products</div>\n  </div>\n  <div class=\"sidebar\">Filters</div>\n  <div class=\"footer\">Privacy | Terms</div>\n</body>\n\
    <!-- Screen reader: \"link Home, link Products, Filters, Privacy, Terms\"\n     No structure. No shortcuts. No way to\
    \ jump to main content. -->\n"
  when_applies: Projects using HTML document structure or React component-based UIs
  when_not_applies: internal developer tools, APIs, non-user-facing systems. projects not using HTML or React
  sources: ["https://www.w3.org/WAI/ARIA/apd/"]
- id: CR-A11Y-COLOR-SOLE-001
  text: Never use color as the sole means of conveying information — always add a secondary indicator (icon, text, pattern).
  why: 8% of men and 0.5% of women have color vision deficiency. Red/green color blindness (deuteranopia, protanopia) is the
    most common form — red error borders and green success borders look identical. WCAG 1.4.1 explicitly requires that color
    is not the only visual means of conveying information. Adding icons or text ensures ALL users receive the message regardless
    of color perception.
  how_to_do_right: '1. Error states: red color + error icon + text label. 2. Success states: green color + checkmark icon
    + text label. 3. Charts/graphs: use patterns or shapes in addition to colors. 4. Status badges: include text (not just
    colored dots). 5. Required fields: use asterisk or text, not just red label. 6. Links within text: underline in addition
    to color difference.'
  severity: critical
  technologies:
    lang: [css, html]
    library: [svg, charts]
  domains:
    domain: [quality, architecture, ui]
    concern: [accessibility, frontend, data_visualization]
  example_good: "<!-- Error: color + icon + text — works for ALL users -->\n<div class=\"alert alert-error\" role=\"alert\"\
    >\n  <svg class=\"icon-error\" aria-hidden=\"true\"><!-- ⚠ icon --></svg>\n  <span>Error: Password must be at least 8\
    \ characters</span>\n</div>\n\n<!-- Status: color + icon + text label -->\n<span class=\"status status-active\">\n  <span\
    \ class=\"status-dot\"></span>\n  <span>Active</span>  <!-- Text backup for color-blind users -->\n</span>\n\n<!-- Chart\
    \ with patterns for color-blind users -->\n<rect fill=\"url(#pattern-stripes)\" />  <!-- Stripes for Category A -->\n\
    <rect fill=\"url(#pattern-dots)\" />     <!-- Dots for Category B -->\n"
  example_bad: '<!-- BAD: Only color differentiates error from success -->

    <input style="border-color: red;" />  <!-- Color-blind user: "is this red or green?" -->

    <input style="border-color: green;" />  <!-- Same border to a deuteranopic user -->


    <!-- BAD: Status indicated only by colored dot -->

    <span class="dot" style="background: green;"></span>  <!-- "What does this dot mean?" -->

    '
  when_applies: Any project using CSS styling and layout, HTML document structure, SVG, or Charts
  when_not_applies: internal developer tools, APIs, non-user-facing systems
  sources: ["https://www.w3.org/WAI/WCAG21/Understanding/use-of-color.html"]
- id: CR-A11Y-MOTION-001
  text: 'Respect prefers-reduced-motion: disable animations and transitions for users who request reduced motion.'
  why: 'Animations can trigger vestibular disorders (vertigo, nausea, migraines) in approximately 35% of adults over 40. The
    prefers-reduced-motion media query lets users opt out via their OS settings (macOS: Reduce Motion, Windows: Show animations
    OFF). WCAG 2.3.3 requires animation to be disableable. This is not optional — it is a medical necessity for affected users.
    Ignoring this preference causes physical discomfort.'
  how_to_do_right: '1. Wrap ALL animations/transitions in a prefers-reduced-motion check. 2. For reduced-motion users: replace
    slide/bounce with instant/opacity. 3. Never use auto-playing video or parallax without a motion preference check. 4. Provide
    a manual toggle in addition to the OS preference. 5. Loading spinners are acceptable (functional, not decorative) but
    should be minimal.'
  severity: high
  technologies:
    lang: [css, javascript]
    framework: [frontend, react]
  domains:
    domain: [quality, architecture, ui]
    concern: [accessibility, frontend, animation]
  example_good: "/* Default: animations enabled */\n.card { transition: transform 0.3s ease, opacity 0.3s ease; }\n.card:hover\
    \ { transform: translateY(-4px); }\n\n/* Respect user preference: remove motion */\n@media (prefers-reduced-motion: reduce)\
    \ {\n  .card { transition: none; }\n  .card:hover { transform: none; opacity: 0.8; } /* Opacity change instead */\n  .skeleton\
    \ { animation: none; } /* Stop pulsing skeleton */\n  .carousel { scroll-behavior: auto; } /* Instant scroll, no smooth\
    \ */\n}\n"
  example_bad: '/* BAD: No motion reduction — all users get animations regardless of preference */

    .hero { animation: bounce 2s infinite; }  /* Vertigo trigger for vestibular users */

    .page-transition { animation: slideIn 0.5s; }  /* Nausea trigger */

    .parallax { background-attachment: fixed; }  /* Motion sickness */

    /* No @media (prefers-reduced-motion) anywhere in the codebase */

    '
  when_applies: Projects using CSS styling and layout, JavaScript/TypeScript projects, or React component-based UIs
  when_not_applies: internal developer tools, APIs, non-user-facing systems
  sources: ["https://www.w3.org/WAI/WCAG21/Understanding/animation-from-interactions.html"]
- id: CR-A11Y-DARK-MODE-001
  text: Dark mode must meet the same contrast requirements as light mode — test contrast ratios in both themes.
  why: Dark mode is not just an aesthetic preference — it is an accessibility feature for users with light sensitivity (photophobia),
    migraines, and certain visual impairments. However, dark mode often introduces NEW contrast violations because designers
    test contrast only in light mode. White text on dark gray may look fine to designers but fail the 4.5:1 ratio. Every color
    pairing must be validated in BOTH modes independently.
  how_to_do_right: 1. Define semantic color tokens for both light and dark themes (not just invert colors). 2. Test all text/background
    combinations in both modes with a contrast checker. 3. Use CSS custom properties that switch based on prefers-color-scheme.
    4. Avoid pure black (#000000) backgrounds — use dark gray (#1a1a2e or similar) to reduce eye strain. 5. Ensure interactive
    elements (buttons, links) remain distinguishable in both modes. 6. Test with real users in both modes.
  severity: high
  technologies:
    lang: [css]
    framework: [frontend, react]
    library: [design tokens]
  domains:
    domain: [quality, architecture, ui]
    concern: [accessibility, frontend, design_system]
  example_good: "/* Semantic tokens — each pairing verified for AA contrast */\n:root {\n  --surface: #ffffff;\n  --text-primary:\
    \ #1a1a1a;     /* 16.4:1 on white */\n  --text-secondary: #4a4a4a;   /* 8.6:1 on white */\n  --border: #d1d5db;\n}\n@media\
    \ (prefers-color-scheme: dark) {\n  :root {\n    --surface: #1a1a2e;          /* Dark blue-gray, not pure black */\n \
    \   --text-primary: #f0f0f0;     /* 12.7:1 on #1a1a2e */\n    --text-secondary: #a0a0b0;   /* 5.3:1 on #1a1a2e — passes\
    \ AA */\n    --border: #3a3a4e;\n  }\n}\n"
  example_bad: "/* BAD: Pure inversion — contrast violations everywhere */\n@media (prefers-color-scheme: dark) {\n  body\
    \ { background: #000; color: #ccc; }\n  /* #ccc on #000 = 13.3:1 — fine for text */\n  /* But: */\n  .muted { color: #666;\
    \ } /* #666 on #000 = 3.9:1 — FAILS AA for normal text */\n  .link { color: #3366ff; } /* #3366ff on #000 = 3.5:1 — FAILS\
    \ AA */\n}\n"
  when_applies: Projects using CSS styling and layout, Design Tokens, or React component-based UIs
  when_not_applies: internal developer tools, APIs, non-user-facing systems
  sources: ["https://www.w3.org/WAI/WCAG21/Understanding/contrast-minimum.html"]
- id: CR-A11Y-ALT-TEXT-001
  text: Every meaningful image must have descriptive alt text; decorative images must have alt='' (empty) to be skipped by
    screen readers.
  why: Screen readers announce alt text as the image description. Without alt text, they read the file name ('IMG_20260115_142633.jpg')
    which is useless. With bad alt text ('image' or 'photo'), users know an image exists but not what it shows. Decorative
    images without alt='' are announced as 'image' interrupting the reading flow with irrelevant noise. WCAG 1.1.1 requires
    text alternatives for all non-text content.
  how_to_do_right: '1. Informative images: describe CONTENT and FUNCTION (''Bar chart showing revenue increased 40% from Q1
    to Q4 2025''). 2. Functional images (icons in buttons): describe the ACTION (''Search'', ''Close menu'', ''Download PDF'').
    3. Decorative images: use alt='''' (empty string, not omitted). 4. Complex images (charts, diagrams): provide long description
    via aria-describedby or link to text version. 5. Never start with ''Image of'' or ''Picture of'' — screen readers already
    say ''image''.'
  severity: critical
  technologies:
    lang: [html, markdown]
    framework: [frontend, react]
  domains:
    domain: [quality]
    concern: [accessibility, content, images]
  example_good: "<!-- Informative image — describes what user needs to know -->\n<img src=\"chart.png\" alt=\"Revenue grew\
    \ from $2M in Q1 to $2.8M in Q4 2025, a 40% increase\" />\n\n<!-- Functional image (icon button) — describes the action\
    \ -->\n<button><img src=\"search.svg\" alt=\"Search\" /></button>\n\n<!-- Decorative image — empty alt, skipped by screen\
    \ reader -->\n<img src=\"decorative-border.svg\" alt=\"\" />\n\n<!-- Complex image with extended description -->\n<figure>\n\
    \  <img src=\"architecture.png\" alt=\"System architecture overview\" aria-describedby=\"arch-desc\" />\n  <figcaption\
    \ id=\"arch-desc\">Three-tier architecture: React frontend communicates\n  via REST API with Python backend, which connects\
    \ to PostgreSQL and Redis.</figcaption>\n</figure>\n"
  example_bad: '<!-- BAD: No alt — screen reader says "IMG_20260115_142633.jpg" -->

    <img src="IMG_20260115_142633.jpg" />


    <!-- BAD: Useless alt text -->

    <img src="chart.png" alt="image" />  <!-- "Image, image" — redundant and meaningless -->

    <img src="chart.png" alt="chart" />  <!-- "Image, chart" — what does the chart show? -->


    <!-- BAD: Decorative image WITHOUT empty alt — announced as noise -->

    <img src="decorative-swirl.svg" />  <!-- "Image, decorative-swirl.svg" — distracting -->

    '
  when_applies: Any project using HTML document structure, React component-based UIs, or Markdown
  when_not_applies: internal developer tools, APIs, non-user-facing systems
  sources: ["https://www.w3.org/WAI/WCAG21/Understanding/non-text-content.html"]
- id: CR-A11Y-LANG-001
  text: Set the lang attribute on <html> and on any content in a different language.
  why: Screen readers use the lang attribute to select the correct pronunciation engine. Without lang='en', a French screen
    reader will try to pronounce English text with French phonetics, making it unintelligible. For multilingual content, lang
    attributes on individual elements ensure each passage is read with the correct pronunciation. WCAG 3.1.1 requires the
    default human language to be programmatically determinable.
  how_to_do_right: 1. Always set lang on <html> element (<html lang='en'>). 2. For content in other languages within the page,
    set lang on the containing element. 3. Use correct BCP 47 language tags (en, en-US, pt-BR, es, fr, de, zh-Hans). 4. Update
    lang when content changes dynamically (SPA route changes). 5. For mixed-language content, wrap foreign words in <span
    lang='xx'>.
  severity: high
  technologies:
    lang: [html]
    framework: [frontend, react]
  domains:
    domain: [quality]
    concern: [accessibility, localization]
  example_good: "<!DOCTYPE html>\n<html lang=\"en\">\n<head><title>My Application</title></head>\n<body>\n  <p>Welcome to\
    \ our platform.</p>\n\n  <!-- Foreign language content properly tagged -->\n  <blockquote lang=\"fr\">\n    <p>C'est la\
    \ vie.</p>\n  </blockquote>\n\n  <p>The German word <span lang=\"de\">Schadenfreude</span> has no English equivalent.</p>\n\
    </body>\n</html>\n"
  example_bad: "<!-- BAD: No lang attribute — screen reader guesses language (often wrong) -->\n<html>\n<body>\n  <p>Welcome\
    \ to our platform.</p>\n  <!-- French screen reader: \"Welcome\" pronounced as \"Vel-come\" -->\n\n  <p>C'est la vie.</p>\n\
    \  <!-- English screen reader: \"See-est la vee\" instead of proper French -->\n</body>\n</html>\n"
  when_applies: Projects using HTML document structure or React component-based UIs
  when_not_applies: internal developer tools, APIs, non-user-facing systems. projects not using HTML or React
  sources: ["https://www.w3.org/WAI/WCAG21/Understanding/language-of-page.html"]
- id: CR-A11Y-HEADINGS-001
  text: Use heading levels (h1-h6) to create a logical document outline — never skip levels and use exactly one h1 per page.
  why: Screen reader users navigate by headings more than any other method (67% use headings as primary navigation according
    to WebAIM survey). Headings create a navigable table of contents — NVDA's H key jumps between headings, and the heading
    list (Insert+F7) shows the page structure. Skipping heading levels (h1 → h3) breaks this outline. Using headings for visual
    styling instead of structure creates false landmarks.
  how_to_do_right: 1. Exactly one <h1> per page (the page title). 2. Heading levels never skip (h1 → h2 → h3, never h1 → h3).
    3. Headings describe the content that follows them. 4. Don't use headings for visual size — use CSS classes. 5. Every
    major section should have a heading. 6. Hidden headings are acceptable for screen reader structure (visually hidden class).
  severity: high
  technologies:
    lang: [html, markdown]
    framework: [frontend, react]
  domains:
    domain: [quality]
    concern: [accessibility, content, structure]
  example_good: "<h1>Product Dashboard</h1>         <!-- Page title — exactly one h1 -->\n  <h2>Sales Overview</h2>      \
    \     <!-- Major section -->\n    <h3>Monthly Revenue</h3>        <!-- Subsection -->\n    <h3>Top Products</h3>     \
    \      <!-- Subsection -->\n  <h2>Customer Analytics</h2>       <!-- Major section -->\n    <h3>Active Users</h3>    \
    \       <!-- Subsection -->\n    <h3>Churn Rate</h3>             <!-- Subsection -->\n<!-- Screen reader heading list:\
    \ clean, navigable outline -->\n"
  example_bad: '<h1>Dashboard</h1>

    <h4>Sales</h4>      <!-- Skipped h2 and h3! Broken outline -->

    <h2>Revenue</h2>    <!-- Now h2 is UNDER h4 — confusing hierarchy -->

    <h1>Analytics</h1>  <!-- Second h1! Which is the real page title? -->

    <div class="h3-style">Users</div>  <!-- Looks like heading, but isn''t one -->

    '
  when_applies: Projects using HTML document structure, React component-based UIs, or Markdown
  when_not_applies: internal developer tools, APIs, non-user-facing systems
  sources: ["https://www.w3.org/WAI/WCAG21/Understanding/info-and-relationships.html"]
