  example_bad: "# Backups exist but never tested for restoration\nbcdr:\n  backup:\n    schedule: \"nightly\"\n    location: \"same data center as primary\"  # No geo-separation\n    immutable: false  #\
    \ Ransomware can encrypt backups too\n    last_restore_test: \"never\"  # Backups may not be restorable\n  dr_plan: \"documented somewhere — not sure where\"\n  annual_test: \"skipped due to resource\
    \ constraints\"\n  # DORA Art 12: restoration must be TESTED\n  # Same-location backups: single point of failure\n  # Mutable backups: ransomware encrypts primary + backup\n"
  example_good: "# DORA BC/DR configuration — Articles 11-12\nbcdr:\n  policy:\n    approved_by: \"Board of Directors\"\n    last_review: \"2024-12-01\"\n    next_review: \"2025-12-01\"\n\n  critical_functions:\n\
    \    - function: \"Payment processing\"\n      rto: \"2 hours\"\n      rpo: \"15 minutes\"\n      backup:\n        type: \"continuous replication\"\n        primary: \"eu-west-1\"\n        secondary:\
    \ \"eu-central-1\"  # Geographically separated\n        immutable: true  # Cannot be deleted or modified\n      last_restore_test: \"2025-03-15\"\n      restore_test_result: \"success — 47 min recovery\"\
    \n\n    - function: \"Customer account access\"\n      rto: \"4 hours\"\n      rpo: \"1 hour\"\n      backup:\n        type: \"hourly snapshots\"\n        primary: \"eu-west-1\"\n        secondary:\
    \ \"eu-central-1\"\n        immutable: true\n\n  annual_test:\n    last_test: \"2024-11-20\"\n    scenario: \"Critical cloud provider outage + ransomware\"\n    participants: [\"IT\", \"Business\",\
    \ \"Compliance\", \"Board rep\"]\n    result: \"RPO/RTO met for 5/6 critical functions\"\n    remediation: \"Function 6 failover improved — retest Q1 2025\"\n"
  how_to_do_right: 1. Define RPO and RTO for each critical function based on business impact analysis. 2. Implement backup procedures with geographic separation (different availability zone or region minimum).
    3. Test restoration from backups at least semi-annually — full restore, not just backup verification. 4. Develop and document response and recovery plans for each critical function. 5. Test BC/DR plans
    annually including scenarios where a critical ICT third-party fails. 6. Ensure backup systems cannot be compromised by the same attack that hits primary (air-gapped or immutable backups). 7. Report
    test results to the management body.
  id: DORA-008
