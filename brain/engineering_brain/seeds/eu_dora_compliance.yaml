  example_bad: "# No exit strategy — complete vendor lock-in\nexit_strategy:\n  provider: \"CustomCloudVendor\"\n  plan: \"We'll figure it out if we need to leave\"\n  alternative_providers: \"none identified\"\
    \n  data_portability: \"never tested — proprietary format\"\n  transition_estimate: \"unknown\"\n  contractual_exit_clause: \"none\"\n  # Vendor goes bankrupt: critical functions offline indefinitely\n\
    \  # Proprietary data format: months to migrate, possible data loss\n  # NCA finding: 'Exit strategy not documented per Art 28(8)'\n"
  example_good: "# Exit strategy for critical cloud provider — DORA Art 28(8)\nexit_strategy:\n  provider: \"AWS\"\n  service: \"Core banking infrastructure\"\n  criticality: \"critical\"\n\n  contractual_provisions:\n\
    \    transition_assistance: \"18 months\"\n    data_portability: \"Standard formats (Parquet, PostgreSQL dump, S3-compatible)\"\n    continued_service_during_transition: true\n    data_deletion_after_exit:\
    \ \"within 90 days, certified\"\n\n  alternative_providers:\n    primary_alternative: \"Azure\"\n    secondary_alternative: \"GCP\"\n    in_house_capability: \"partial — could host non-critical functions\"\
    \n\n  transition_plan:\n    estimated_duration: \"9-12 months\"\n    estimated_cost_eur: 1_500_000\n    phases:\n      - phase: \"Data migration\"\n        duration: \"3 months\"\n        tested: true\n\
    \        last_test: \"2025-02-15\"\n      - phase: \"Application refactoring\"\n        duration: \"4 months\"\n        tested: false  # Planned for Q3 2025\n      - phase: \"Cutover and validation\"\
    \n        duration: \"2 months\"\n\n  portability_test:\n    last_test: \"2025-02-15\"\n    data_exported: \"PostgreSQL dump + S3 objects\"\n    imported_to: \"Azure Blob + Azure PostgreSQL\"\n    result:\
    \ \"success — 99.8% data integrity verified\"\n"
  how_to_do_right: '1. Document an exit strategy for every ICT provider supporting critical or important functions. 2. Include contractual provisions for: transition assistance period (minimum 12 months
    recommended), data portability in standard formats, continued service during transition, deletion/return of data after transition. 3. Identify alternative providers or in-house capability for each critical
    service. 4. Test data portability annually — export data and verify it can be imported into the alternative. 5. Estimate transition cost and timeline realistically. 6. Include exit strategy testing
    in annual BC/DR exercises. 7. Review exit strategies when provider contracts renew or significant changes occur.'
