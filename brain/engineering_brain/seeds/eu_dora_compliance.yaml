  example_bad: "# No visibility into sub-outsourcing chain\nsub_outsourcing:\n  primary_provider: \"CloudPayments Ltd\"\n  subcontractors: \"unknown\"  # Never asked\n  contractual_clause: \"none\"  # No\
    \ sub-outsourcing controls\n  # Provider moved data to non-EU subcontractor without notice\n  # Same subcontractor supports 3 of our 4 critical providers\n  # Concentration risk completely invisible\n"
  example_good: "# Sub-outsourcing management for critical ICT provider\nsub_outsourcing:\n  primary_provider: \"CloudPayments Ltd\"\n  service: \"Payment processing platform\"\n  criticality: \"critical\"\
    \n\n  contractual_controls:\n    notification_required: true  # Must notify before subcontractor change\n    objection_right: true  # Can object to changes increasing risk\n    audit_right_extends_to_subs:\
    \ true\n    termination_right_on_unapproved_sub: true\n\n  subcontracting_chain:\n    - level: 1\n      provider: \"AWS\"\n      service: \"Infrastructure hosting\"\n      location: \"EU (Ireland, Frankfurt)\"\
    \n      risk_assessment: \"completed\"\n    - level: 1\n      provider: \"DataDog\"\n      service: \"Monitoring\"\n      location: \"EU (Ireland)\"\n      risk_assessment: \"completed\"\n    - level:\
    \ 2\n      provider: \"AWS (used by DataDog)\"\n      service: \"DataDog infrastructure\"\n      location: \"EU\"\n      concentration_risk: \"flagged — same as primary infra\"\n\n  concentration_risk_assessment:\n\
    \    last_performed: \"2025-03-01\"\n    findings: \"AWS dependency at level 1 and level 2 — mitigation plan created\"\n"
  how_to_do_right: '1. Include sub-outsourcing clauses in all contracts for critical/important ICT services per Article 29. 2. Require prior notification of any subcontractor changes affecting critical
    functions. 3. Reserve the right to object to subcontractor changes that increase risk. 4. Extend audit rights to critical subcontractors (not just the primary provider). 5. Map the full subcontracting
    chain annually — ask providers for their sub-processor lists. 6. Assess concentration risk: are multiple critical providers using the same subcontractor? 7. Include subcontractor information in the
    ICT third-party register.'
