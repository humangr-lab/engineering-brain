  example_bad: "# Claiming proportionality without proper assessment\nproportionality:\n  assumption: \"We're small so most of DORA doesn't apply\"\n  documented_rationale: null  # No documented assessment\n\
    \  # Claiming micro-enterprise status despite 30 staff\n  # Skipping incident reporting because 'we're too small'\n  # NCA review: 'Inadequate proportionality assessment'\n  # Incident reporting has\
    \ NO proportionality exemption\n"
  example_good: "# Proportionality assessment — documented rationale\nproportionality:\n  entity_classification:\n    type: \"payment_institution\"\n    size: \"small\"  # 25 staff, EUR 5M turnover\n  \
    \  significant: false  # Not designated by NCA\n    micro_enterprise: false  # >10 staff, >EUR 2M\n\n  simplified_requirements:\n    - requirement: \"TLPT (Art 26-27)\"\n      applicability: \"not_required\"\
    \  # Not designated as significant\n      rationale: \"Not designated by NCA as requiring TLPT\"\n    - requirement: \"Simplified ICT risk framework (Art 16)\"\n      applicability: \"not_eligible\"\
    \  # Not a micro-enterprise\n      rationale: \"Above micro-enterprise thresholds\"\n\n  full_requirements:\n    - \"ICT risk management framework (Art 6-16)\"\n    - \"Incident reporting (Art 17-23)\"\
    \n    - \"Basic resilience testing (Art 25)\"\n    - \"Third-party risk management (Art 28-44)\"\n    - \"Information sharing (Art 45, voluntary)\"\n\n  reviewed_by: \"External compliance counsel\"\n\
    \  review_date: \"2024-10-15\"\n  next_review: \"2025-10-15\"\n"
  how_to_do_right: '1. Determine your entity classification: micro-enterprise, small, medium, or large per EU definitions. 2. Assess whether your entity is designated as ''significant'' by the NCA (triggers
    TLPT). 3. Document which proportionality simplifications you are applying and the rationale. 4. Micro-enterprises: use simplified ICT risk management (Art 16) but still need incident reporting and third-party
    management. 5. All other entities: full framework but can scale depth of controls to risk profile. 6. Have your proportionality assessment reviewed by external counsel or compliance advisor. 7. Reassess
    annually — growth may change your classification.'
