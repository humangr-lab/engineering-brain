  text: Participate in information sharing arrangements for cyber threat intelligence — Article 45 encourages financial entities to exchange threat information within trusted communities while respecting
    data protection requirements.
  when_applies: All financial entities subject to DORA, particularly those designated as significant or systemically important, and entities that have experienced or are likely targets of sophisticated
    cyber threats.
  why: Cyber attackers share tools, techniques, and zero-days freely in underground forums. Financial institutions that operate in isolation miss early warnings about sector-specific campaigns. DORA Article
    45 encourages (does not mandate) participation in information sharing arrangements. Entities that share indicators of compromise (IoCs), TTPs, and threat intelligence with peers detect attacks 60% faster
    (Ponemon Institute). Information sharing also fulfills the 'learning and evolving' requirement of Article 13. While voluntary, NCAs view active participation as a sign of mature resilience.
