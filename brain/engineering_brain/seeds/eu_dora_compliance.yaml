  text: Conduct digital operational resilience testing at multiple levels — Articles 24-27 require regular testing including vulnerability assessments, network security, and TLPT (Threat-Led Penetration
    Testing) for significant entities.
  when_applies: All DORA-regulated financial entities for basic testing; significant entities additionally require TLPT. Significance is determined by the national competent authority based on systemic
    importance, ICT risk profile, and entity size.
  why: 'DORA mandates a tiered testing program: all entities must perform basic testing (vulnerability assessments, open-source analysis, network security, performance testing) at least annually. Significant
    entities must additionally perform TLPT at least every 3 years, using external testers meeting specific qualifications. TLPT goes beyond traditional pen testing — it simulates real threat actor TTPs
    against live production systems based on threat intelligence. Entities that only perform annual vulnerability scans will not satisfy DORA''s testing requirements.'
