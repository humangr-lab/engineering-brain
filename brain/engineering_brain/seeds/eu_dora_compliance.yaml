  text: Define and test exit strategies for critical ICT third-party providers — DORA Article 28(8) requires documented transition plans to alternative providers or in-house solutions to avoid vendor lock-in.
  when_applies: All financial entities subject to DORA that rely on ICT third-party providers for critical or important functions.
  why: DORA Article 28(8) explicitly requires exit strategies for arrangements supporting critical or important functions. A critical provider failure (bankruptcy, sanctions, regulatory action, catastrophic
    outage) without an exit strategy means the financial entity cannot perform critical functions — potentially triggering systemic risk. Exit strategies must be tested, not just documented — an untested
    exit plan is a fiction. The ESAs also use exit strategy readiness as an indicator of concentration risk at the sector level.

