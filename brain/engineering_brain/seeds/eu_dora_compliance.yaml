  text: Manage the sub-outsourcing chain for all critical ICT services — DORA Article 29 requires financial entities to have visibility and control over the entire chain of subcontractors supporting critical
    functions.
  when_applies: All financial entities subject to DORA that outsource critical or important ICT functions, particularly where the primary provider relies on subcontractors for service delivery.
  why: 'Financial institutions often outsource to Provider A, who subcontracts to Provider B, who uses Provider C''s infrastructure. A failure at any level cascades upward. DORA Article 29 requires that
    contracts for critical or important functions include: the right to be informed about sub-outsourcing, the ability to object to subcontractor changes, and audit rights extending to subcontractors. Without
    sub-outsourcing visibility, a financial entity cannot assess concentration risk (what if 80% of EU banks depend on the same sub-subcontractor?) or ensure data location compliance (subcontractor in non-EU
    jurisdiction).'
