  example_bad: "# Ignoring DORA or treating it as 'just another regulation'\ndora_program:\n  status: \"not_started\"  # Application date was Jan 17, 2025\n  assumption: \"Our existing ISO 27001 covers\
    \ everything\"\n  # ISO 27001 is a framework; DORA has SPECIFIC mandatory requirements:\n  # - ICT third-party register (no ISO 27001 equivalent)\n  # - TLPT for significant entities (beyond standard\
    \ pen tests)\n  # - 4-hour initial incident notification (ISO has no such SLA)\n  # - Direct ESA oversight of critical ICT providers\n"
  example_good: "# DORA compliance program structure\ndora_program:\n  entity_type: \"credit_institution\"\n  significance: \"significant\"  # Designated by NCA\n  applicable_date: \"2025-01-17\"\n  program_office:\n\
    \    lead: \"CISO\"\n    co_lead: \"CRO\"\n    budget_eur: 2_500_000\n  workstreams:\n    - name: \"ICT Risk Management (Art 6-16)\"\n      owner: \"CISO\"\n      gap_assessment: \"completed_2024_Q3\"\
    \n      remediation_deadline: \"2024-12-31\"\n    - name: \"Incident Reporting (Art 17-23)\"\n      owner: \"SOC Lead\"\n      gap_assessment: \"completed_2024_Q3\"\n    - name: \"Resilience Testing\
    \ (Art 24-27)\"\n      owner: \"Pen Test Lead\"\n      tlpt_required: true\n    - name: \"Third-Party Risk (Art 28-44)\"\n      owner: \"Vendor Management\"\n      register_status: \"populated\"\n \
    \   - name: \"Information Sharing (Art 45)\"\n      owner: \"Threat Intel Lead\"\n  nca: \"BaFin\"  # National Competent Authority\n"
  how_to_do_right: '1. Determine if your entity is in scope: 21 entity types covered including banks, payment institutions, e-money institutions, investment firms, insurance companies, crypto-asset service
    providers. 2. Assess proportionality: micro-enterprises and entities below significance thresholds have simplified requirements. 3. Map current ICT risk management to DORA Articles 6-16 and identify
    gaps. 4. Establish a DORA program office with clear ownership (typically CISO + CRO). 5. Build or update your ICT third-party provider register (Article 28). 6. Budget for TLPT (Threat-Led Penetration
    Testing) if designated as significant.'
