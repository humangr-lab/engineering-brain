  text: Establish a comprehensive ICT risk management framework with board-level accountability — Articles 6-16 require a documented framework that is reviewed annually, with the management body bearing
    ultimate responsibility.
  when_applies: All financial entities subject to DORA, with the management body (board) of each entity bearing direct accountability regardless of entity size.
  why: DORA Article 5 places ultimate responsibility for ICT risk management on the management body (board of directors). This is not delegable to IT — the board must approve the ICT risk management framework,
    oversee its implementation, and be trained on ICT risks. Article 6 requires the framework to include strategies, policies, procedures, ICT protocols, and tools necessary to protect all information assets.
    Without board-level ownership, ICT risk management becomes an isolated IT function without budget or organizational authority to enforce controls.
