  text: Classify and report ICT-related incidents within strict timelines — Articles 17-23 require major incidents to be reported to the competent authority within 4 hours of classification, with intermediate
    and final reports following.
  when_applies: All financial entities subject to DORA that experience ICT-related incidents, including operational disruptions, cyberattacks, data breaches, and third-party service failures affecting financial
    services.
  why: DORA introduces a harmonized incident reporting regime across EU financial services. A major ICT-related incident must be reported with an initial notification within 4 hours of classification (not
    discovery — classification). An intermediate report follows within 72 hours with root cause analysis, and a final report within 1 month. Late or missing reports trigger supervisory action. The 4-hour
    SLA for initial notification is significantly tighter than most existing regimes (e.g., GDPR's 72 hours) and requires automated classification and pre-built reporting templates.
