  example_bad: "# Ad hoc incident handling — no classification matrix\nincident_process:\n  classification: \"manual — team lead decides next business day\"\n  reporting: \"email to compliance when someone\
    \ remembers\"\n  templates: \"none — written from scratch each time\"\n  timeline: \"we usually report within a week or two\"\n  # 4-hour SLA impossible without automation\n  # No pre-built templates\
    \ = scrambling during crisis\n  # Business-hours-only = overnight incidents miss deadline\n"
  example_good: "# DORA incident classification and reporting workflow\nincident_reporting:\n  classification_criteria:  # Per DORA Article 18\n    major_incident_threshold:\n      - clients_affected: \"\
    > 10% of total clients\"\n      - duration: \"> 2 hours for critical services\"\n      - geographic_spread: \"> 2 member states\"\n      - economic_impact: \"> EUR 100,000\"\n      - data_loss: \"any\
    \ personal data of >1000 subjects\"\n\n  reporting_timelines:\n    initial_notification:\n      deadline: \"4 hours after classification\"\n      content: [\"entity ID\", \"incident type\", \"detection\
    \ time\", \"classification time\",\n                \"services affected\", \"estimated impact\"]\n      submit_to: \"NCA via secure channel\"\n    intermediate_report:\n      deadline: \"72 hours after\
    \ initial notification\"\n      content: [\"root cause analysis\", \"mitigation actions\", \"recovery status\"]\n    final_report:\n      deadline: \"1 month after intermediate report\"\n      content:\
    \ [\"full RCA\", \"lessons learned\", \"remediation plan\"]\n\n  automation:\n    siem_auto_classify: true\n    template_pre_built: true\n    24x7_on_call_reporter: true\n"
  how_to_do_right: '1. Implement an incident classification matrix aligned with DORA''s criteria: duration, geographical spread, data losses, criticality of services affected, economic impact. 2. Pre-build
    report templates matching the RTS (Regulatory Technical Standard) format for initial, intermediate, and final reports. 3. Establish a 24/7 process for incident classification — cannot wait for business
    hours. 4. Automate initial classification using SIEM/SOAR rules to meet the 4-hour SLA. 5. Designate trained incident reporters with authority to submit to NCA. 6. Conduct quarterly incident reporting
    drills.'
