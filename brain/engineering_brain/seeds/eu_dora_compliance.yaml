    \ operations\"\n          country: \"IE\"\n      substitutability: \"medium\"  # Alternative providers exist\n      last_updated: \"2025-06-15\"\n"
  how_to_do_right: 1. Use the ESA-published template (ITS on the Register) for the register format. 2. Populate for ALL ICT third-party providers, not just 'major' ones — includes SaaS, APIs, managed services,
    hardware maintenance. 3. Classify each service as supporting critical/important functions or not. 4. Document the full subcontracting chain for critical services. 5. Update the register within 5 business
    days of any change (new contract, termination, amendment). 6. Automate register updates from procurement/contract management systems. 7. Conduct annual completeness audit.
