  example_bad: "# Annual vulnerability scan only — does not satisfy DORA\ntesting_program:\n  tests:\n    - type: \"vulnerability_scan\"\n      frequency: \"annual\"\n      scope: \"external perimeter only\"\
    \n  # Missing: network security, open-source analysis, scenario testing,\n  # performance testing, source code review, physical security\n  # Missing: TLPT for significant entities\n  # DORA requires\
    \ 10+ test types, not just one scan\n"
  example_good: "# DORA resilience testing program\ntesting_program:\n  basic_testing:  # All entities — Article 25\n    frequency: \"annual minimum\"\n    scope: \"all critical and important ICT systems\"\
    \n    test_types:\n      - type: \"vulnerability_assessment\"\n        frequency: \"quarterly\"\n        tools: [\"Nessus\", \"Qualys\"]\n      - type: \"network_security_testing\"\n        frequency:\
    \ \"semi-annual\"\n        external_tester: true\n      - type: \"open_source_analysis\"\n        frequency: \"continuous\"\n        tools: [\"Snyk\", \"Dependabot\"]\n      - type: \"scenario_based_testing\"\
    \n        frequency: \"annual\"\n        scenarios: [\"ransomware\", \"DDoS\", \"supply_chain_compromise\"]\n      - type: \"performance_testing\"\n        frequency: \"annual\"\n        tools: [\"\
    k6\", \"Gatling\"]\n\n  tlpt:  # Significant entities — Article 26-27\n    required: true\n    frequency: \"every 3 years minimum\"\n    framework: \"TIBER-EU\"\n    last_test: \"2024-10-01\"\n    next_test:\
    \ \"2027-10-01\"\n    external_tester_qualified: true\n    threat_intel_provider: \"separate from testing team\"\n    scope: \"live production — critical functions\"\n    nca_notified: true\n"
  how_to_do_right: '1. Establish a testing program covering all DORA Article 25 categories: vulnerability assessments, open-source analysis, network security, gap analysis, physical security, source code
    review, scenario-based tests, compatibility testing, performance testing, end-to-end testing. 2. Run basic tests at least annually on all critical ICT systems. 3. For TLPT (if designated): engage qualified
    external testers, base tests on current threat intelligence, test against live production, involve threat intelligence provider separate from testing team. 4. Remediate all critical and high findings
    within defined SLAs. 5. Report TLPT results to NCA and share lessons learned.'
