    \ \"Amazon Web Services EMEA SARL\"\n      provider_lei: \"529900XYZ123456789AB\"\n      provider_country: \"LU\"\n      service_type: \"Cloud computing — IaaS\"\n      contract_start: \"2023-01-01\"\
    \n      contract_end: \"2026-12-31\"\n      critical_function: true\n      functions_supported:\n        - \"Core banking platform hosting\"\n        - \"Payment processing infrastructure\"\n      data_locations:\
