  example_bad: "# No information sharing — operating in isolation\ninformation_sharing:\n  memberships: []  # No ISAC membership\n  automation: null  # No threat feed ingestion\n  contributions: 0  # Never\
    \ shared anything\n  # Missed 3 sector-specific phishing campaigns in 2024\n  # Detected supply chain attack 45 days after peers\n  # NCA assessment: 'immature threat intelligence capability'\n"
  example_good: "# Information sharing arrangement — DORA Article 45\ninformation_sharing:\n  memberships:\n    - organization: \"FS-ISAC\"\n      tier: \"contributing member\"\n      since: \"2023-01-15\"\
    \n      feeds_consumed: [\"alerts\", \"iocs\", \"threat-reports\"]\n      contributions_last_year: 12\n    - organization: \"National CERT\"\n      feeds_consumed: [\"sector-alerts\"]\n\n  automation:\n\
    \    stix_taxii_server: \"https://taxii.internal.example.com\"\n    auto_ingest_to_siem: true\n    ioc_types: [\"ip\", \"domain\", \"hash\", \"url\", \"email\"]\n    enrichment: \"automatic via VirusTotal\
    \ + MISP\"\n\n  data_protection:\n    anonymization: \"all PII removed before sharing\"\n    gdpr_assessment: \"completed\"\n    sharing_policy: \"docs/policies/threat-intel-sharing-policy.pdf\"\n \
    \   approved_by: \"DPO + CISO\"\n"
  how_to_do_right: '1. Join an established financial sector ISAC (FS-ISAC) or national equivalent. 2. Establish internal processes for receiving, triaging, and acting on shared intelligence. 3. Define what
    can be shared (IoCs, TTPs, anonymized incident data) and what cannot (customer data, business secrets). 4. Implement automated IoC ingestion into SIEM/SOAR from sharing feeds (STIX/TAXII). 5. Contribute
    back — sharing is bidirectional, not just consuming. 6. Ensure GDPR compliance: anonymize personal data before sharing.'
