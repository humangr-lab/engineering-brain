  text: Maintain comprehensive management of ICT third-party risk — Articles 28-44 require a documented strategy for third-party ICT risk including contractual requirements, exit strategies, and a register
    of all ICT service providers.
  when_applies: All financial entities subject to DORA that use ICT third-party services, including cloud providers, SaaS platforms, managed security services, data providers, and any outsourced ICT function.
  why: 'Financial services increasingly depend on concentrated ICT third-party providers (cloud, SaaS, data). DORA recognizes this concentration risk and mandates: pre-contractual risk assessment, specific
    mandatory contractual clauses (audit rights, data location, subcontracting controls, exit assistance), ongoing monitoring, and a complete register of all ICT third-party providers. Critical ICT providers
    (designated by ESAs) face direct EU-level oversight. Without proper third-party management, a single provider failure can cascade across the financial system.'
