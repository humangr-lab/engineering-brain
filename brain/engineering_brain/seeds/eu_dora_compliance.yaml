  - regulatory classification tools
  text: Apply the proportionality principle to scale DORA requirements to your entity type and size — micro-enterprises and non-significant entities have simplified obligations, while significant entities
    face the full regime including TLPT.
  when_applies: All financial entities subject to DORA when determining the scope and depth of their compliance program.
  why: 'DORA Article 4 establishes the proportionality principle: requirements are applied proportionate to the entity''s size and overall risk profile, the nature, scale, and complexity of its services,
    activities, and operations. Micro-enterprises (fewer than 10 staff and under EUR 2M turnover) have a simplified ICT risk management framework. Non-significant entities are exempt from TLPT. However,
    proportionality is not a blanket exemption — entities must demonstrate they have assessed which requirements are proportionate and document the rationale. Over-applying proportionality (claiming exemptions
    you do not qualify for) is a supervisory risk.'
