  text: Implement comprehensive business continuity and disaster recovery for ICT systems — DORA Articles 11-12 require tested backup, restoration, and recovery procedures with specific RPO and RTO targets
    for critical functions.
  when_applies: All financial entities subject to DORA, with requirements scaled by the criticality and importance of ICT-supported functions.
  why: 'DORA Articles 11 and 12 go beyond traditional DR by requiring: ICT business continuity policy approved by management body, impact analysis of severe disruptions, response and recovery plans for
    all critical ICT systems, annual testing of BC/DR plans with scenarios including ICT third-party failures, backup procedures that are regularly tested for restoration, and redundancy for critical infrastructure
    components. The regulation explicitly requires that backup systems are geographically separated and that restoration is tested — not just backup creation. Entities that only back up data but never test
    restoration will fail DORA compliance.'
