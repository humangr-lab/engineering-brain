  text: Conduct Threat-Led Penetration Testing aligned with TIBER-EU framework — DORA Articles 26-27 require significant entities to perform TLPT at least every three years using qualified external testers
    against live production systems.
  when_applies: Financial entities designated as significant by their national competent authority, including systemically important institutions, major payment service providers, and entities with high
    ICT risk profiles.
  why: TLPT is fundamentally different from standard penetration testing. It uses real threat intelligence to simulate actual threat actor campaigns against live production systems. TIBER-EU is the European
    framework for TLPT, and DORA explicitly references it. TLPT must be conducted by qualified external testers (not the same team that provides threat intelligence), must target critical or important functions
    in production, and results must be reported to the NCA. Entities that treat TLPT like a regular pen test (staging environment, generic scope, internal team) will not satisfy the requirement.
