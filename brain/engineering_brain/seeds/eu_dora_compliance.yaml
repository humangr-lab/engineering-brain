  text: DORA (Digital Operational Resilience Act) applies to virtually all EU financial entities from January 17, 2025 — banks, insurers, investment firms, crypto-asset service providers, and their critical
    ICT third-party providers must comply.
  when_applies: Any financial entity operating in the EU or EEA, and any ICT service provider designated as critical to the EU financial sector, including cloud providers, data centers, and software vendors.
  why: DORA (EU Regulation 2022/2554) creates a unified ICT risk management framework across the entire EU financial sector, replacing the fragmented national approaches. Non-compliance triggers supervisory
    measures including fines up to 1% of average daily worldwide turnover for up to six months, or periodic penalty payments of 0.5% of daily turnover. Critical ICT third-party providers face direct oversight
    by European Supervisory Authorities (ESAs). Organizations that assume DORA is just another checkbox exercise will face enforcement actions from their national competent authority.
