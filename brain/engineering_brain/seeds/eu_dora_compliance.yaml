  example_good: "# ICT third-party provider register — DORA Article 28(3)\nict_provider_register:\n  - provider: \"AWS\"\n    service: \"Cloud infrastructure (IaaS)\"\n    criticality: \"critical\"  # Supports\
    \ critical functions\n    contract_ref: \"MSA-2024-001\"\n    data_location: [\"eu-west-1 (Ireland)\", \"eu-central-1 (Frankfurt)\"]\n    subcontractors: [\"AWS sub-processors per DPA\"]\n    dora_clauses:\n\
    \      audit_rights: true  # Art 30(3)(e)\n      data_location_guarantee: true  # Art 30(2)(b)\n      incident_notification: \"without undue delay\"  # Art 30(2)(e)\n      exit_strategy: \"documented\"\
    \  # Art 28(8)\n      subcontracting_controls: true  # Art 30(2)(a)\n    monitoring:\n      frequency: \"continuous\"\n      last_assessment: \"2024-11-01\"\n      sla_compliance: \"99.97%\"\n    exit_plan:\n\
    \      transition_period: \"12 months\"\n      data_portability: \"tested annually\"\n      alternative_providers: [\"Azure\", \"GCP\"]\n"
  how_to_do_right: '1. Maintain a complete register of all ICT third-party service providers with contract details, criticality assessment, and data locations. 2. Assess criticality: does the provider support
    critical or important functions? 3. Ensure contracts include DORA Article 30 mandatory clauses: audit rights, data location guarantees, incident notification obligations, exit strategy, subcontracting
    controls. 4. Conduct pre-contractual due diligence including financial stability and business continuity of the provider. 5. Monitor providers continuously — not just at contract renewal. 6. Report
    the register to NCA on request.'
