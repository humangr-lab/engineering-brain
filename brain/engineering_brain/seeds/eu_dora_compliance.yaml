    \ body must approve and oversee\n  # Violates Art 13(6): must be reviewed at least annually\n"
  example_good: "# ICT Risk Management Framework — DORA Article 6-16 compliant\nict_risk_framework:\n  version: \"2.0\"\n  approved_by: \"Board of Directors\"\n  approval_date: \"2024-11-15\"\n  next_review:\
    \ \"2025-11-15\"\n\n  governance:\n    management_body_role: \"Ultimate responsibility per Art 5(2)\"\n    ciso_reports_to: \"Board Risk Committee\"\n    board_ict_training:\n      last_session: \"\
    2024-09-20\"\n      frequency: \"annual\"\n      topics: [\"cyber threats\", \"ICT third-party risk\", \"incident response\"]\n\n  risk_appetite:\n    ict_risk_tolerance: \"low\"\n    max_acceptable_downtime_critical:\
    \ \"4 hours\"\n    max_data_loss_critical: \"1 hour RPO\"\n\n  components:\n    - \"ICT asset inventory (Art 8)\"\n    - \"Protection and prevention (Art 9)\"\n    - \"Detection (Art 10)\"\n    - \"\
    Response and recovery (Art 11)\"\n    - \"Backup and restoration (Art 12)\"\n    - \"Learning and evolving (Art 13)\"\n    - \"Communication (Art 14)\"\n"
  how_to_do_right: 1. Define and document the ICT risk management framework per Article 6 requirements. 2. Get explicit board approval for the framework (documented in board minutes). 3. Assign a Chief
    Information Security Officer (or equivalent) with direct board reporting line. 4. Include ICT risk in the enterprise risk appetite statement. 5. Review and update the framework at least annually and
    after significant ICT incidents. 6. Implement mandatory ICT risk training for all board members. 7. Allocate dedicated budget for ICT resilience (not buried in general IT budget).
