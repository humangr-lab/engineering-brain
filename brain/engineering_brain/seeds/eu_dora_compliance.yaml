  example_bad: "# Standard pen test mislabeled as TLPT\ntlpt:\n  type: \"annual penetration test\"  # Not threat-led\n  provider: \"internal security team\"  # Must be external\n  environment: \"staging\"\
    \  # Must be production\n  threat_intelligence: \"none — generic OWASP scope\"\n  blue_team_aware: true  # SOC was told in advance\n  nca_reported: false  # Not reported to authority\n  # This is a\
    \ regular pen test, NOT TLPT per DORA Art 26-27\n"
  example_good: "# TLPT program — TIBER-EU aligned, DORA Art 26-27\ntlpt_program:\n  framework: \"TIBER-EU\"\n  last_test:\n    date: \"2024-10-01\"\n    threat_intel_provider: \"Mandiant\"  # Separate\
    \ from testing team\n    testing_provider: \"CrowdStrike Red Team\"  # Qualified external\n    scope:\n      critical_functions:\n        - \"Core banking platform\"\n        - \"Payment processing\"\
    \n        - \"Customer authentication\"\n      environment: \"production\"  # Not staging\n    white_team: [\"CISO\", \"Head of IT Risk\", \"Legal\"]\n    blue_team_aware: false  # SOC did not know\n\
    \    duration: \"12 weeks\"\n    findings:\n      critical: 2\n      high: 5\n      medium: 11\n    remediation_deadline: \"2025-01-15\"\n    nca_reported: true\n    nca_report_date: \"2024-11-15\"\n\
    \  next_test: \"2027-10-01\"  # Within 3-year cycle\n"
  how_to_do_right: '1. Engage a qualified TLPT provider listed with your NCA. 2. Engage a separate threat intelligence provider to develop the threat scenario. 3. Define scope covering critical or important
    functions in production. 4. Ensure the TLPT is based on current, specific threat intelligence for your entity type and region. 5. The test must be conducted against live production (not staging). 6.
    Internal ''white team'' coordinates with testers while the ''blue team'' (SOC) is unaware. 7. After test: debrief all teams, remediate findings, report results to NCA. 8. Repeat at least every 3 years.'
