  text: Maintain a register of all ICT third-party providers reportable to the national competent authority on request — this register must include contract details, criticality assessments, and service
    dependencies.
  when_applies: All financial entities subject to DORA that use any ICT third-party services. The register must be available for NCA inspection at any time.
  why: 'DORA Article 28(3) requires financial entities to maintain a register of information in relation to all contractual arrangements on the use of ICT services provided by third-party service providers.
    This is not a simple vendor list — it must include: the ICT service provider identity, the type of ICT services, the start and expiry date, the data processing locations, whether the service supports
    critical or important functions, and the subcontracting chain. The ESAs have published RTS specifying the exact template. NCAs can request this register at any time and use it to assess concentration
    risk across the sector.'
