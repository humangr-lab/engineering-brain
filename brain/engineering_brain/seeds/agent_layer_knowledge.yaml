layer: rules
domain: agent_orchestration
knowledge:

# =============================================================================
# L0 SYSTEM LAYER (ALYR-001 to ALYR-003)
# Infrastructure heartbeat, resource allocation, circuit breakers
# =============================================================================

- id: ALYR-001
  text: "Every agent in a multi-agent pipeline MUST emit periodic heartbeats, and a supervisor MUST detect dead agents within 2x the heartbeat interval and auto-restart them with last-known state."
  why: >
    In a 7-layer agent hierarchy, any agent can silently hang — waiting on an LLM call that
    never returns, stuck in an infinite retry loop, or killed by an OOM. Without heartbeats,
    the pipeline appears to be running but makes zero progress. Google's Borg (predecessor to
    Kubernetes) established the heartbeat pattern: every worker reports liveness, the master
    detects missing heartbeats within 2x the interval, and restarts the worker. In agent
    pipelines the cost of a hung agent is amplified because downstream agents are blocked,
    token budgets are wasted on idle polling, and the human operator sees no error — just
    silence. A 30-second heartbeat interval with a 60-second timeout strikes the balance
    between responsiveness and overhead for LLM-based agents.
  how_to_do_right: |
    1. Each agent writes a heartbeat to a shared store (Redis, SQLite, or in-memory dict) every N seconds.
    2. The heartbeat payload includes: agent_id, timestamp, current_task_id, status (idle/working/blocked), progress_pct.
    3. A supervisor thread checks all heartbeats every N seconds. If last_heartbeat > 2*N, declare agent dead.
    4. On dead agent detection: log the event, capture last-known state (task_id, inputs, partial outputs).
    5. Restart the agent with the captured state so it resumes, not restarts from scratch.
    6. Implement exponential backoff for agents that repeatedly die (max 3 restarts, then escalate).
    7. Expose a /health endpoint or status dict so operators can see agent liveness at a glance.
  severity: critical
  technologies:
    lang: [python]
    framework: [langgraph, crewai]
    infra: [redis]
  domains:
    domain: [agent_orchestration, reliability]
    concern: [liveness, monitoring, auto_recovery]
  example_good: |
    import time, threading, redis

    class AgentSupervisor:
        def __init__(self, redis_client: redis.Redis, heartbeat_interval: int = 30):
            self.r = redis_client
            self.interval = heartbeat_interval
            self.timeout = heartbeat_interval * 2

        def send_heartbeat(self, agent_id: str, task_id: str, progress: float):
            """Called by each agent every heartbeat_interval seconds."""
            self.r.hset(f"agent:{agent_id}", mapping={
                "last_heartbeat": time.time(),
                "task_id": task_id,
                "progress": progress,
                "status": "working",
            })
            self.r.expire(f"agent:{agent_id}", self.timeout + 10)

        def check_liveness(self) -> list[str]:
            """Returns list of dead agent IDs."""
            dead = []
            for key in self.r.scan_iter("agent:*"):
                data = self.r.hgetall(key)
                last_hb = float(data.get(b"last_heartbeat", 0))
                if time.time() - last_hb > self.timeout:
                    agent_id = key.decode().split(":")[1]
                    dead.append(agent_id)
            return dead

        def restart_agent(self, agent_id: str):
            """Restart with last-known state."""
            state = self.r.hgetall(f"agent:{agent_id}")
            task_id = state.get(b"task_id", b"").decode()
            # Re-enqueue task with resume flag
            self.r.rpush("task_queue", f"{task_id}:resume:{agent_id}")
  example_bad: |
    # No heartbeat — agent hangs silently, pipeline stuck forever
    def run_agent(task):
        result = call_llm(task.prompt)  # Hangs for 10 minutes, no timeout
        return result

    # Supervisor has no idea agent is dead
    # Human notices after 30 minutes of zero output
    # No state captured — must restart entire pipeline from scratch
  when_applies: Any multi-agent system with more than 2 agents, especially pipelines where agents run concurrently or have dependencies
  sources:
    - "https://research.google/pubs/large-scale-cluster-management-at-google-with-borg/"
    - "https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/"
    - "https://docs.crewai.com/concepts/agents"

- id: ALYR-002
  text: "Distribute token budgets top-down across all layers with explicit per-layer caps, and enforce hard limits — no single agent should consume more than its allocated share without explicit override."
  why: >
    LLM API calls are the primary cost and latency driver in agent pipelines. Without token
    budgets, a single verbose agent at L5 can consume 80% of the total budget, starving L1
    strategic planning and L3 QA review of tokens. This creates a "tragedy of the commons"
    where worker agents with long prompts crowd out higher-value reasoning at upper layers.
    OpenAI and Anthropic both enforce rate limits and per-request token caps, but these are
    per-call limits, not pipeline-level budgets. A global budget allocator ensures that
    strategic reasoning (L1: 15%), orchestration (L2-L3: 25%), execution (L4-L5: 50%), and
    specialist consultation (L6: 10%) each get their fair share. When a layer exhausts its
    budget, it must summarize context or reduce output rather than silently consuming more.
  how_to_do_right: |
    1. Define a total pipeline token budget per run (e.g., 2M tokens for a sprint).
    2. Allocate percentages per layer: L0=5%, L1=10%, L2=10%, L3=15%, L4=15%, L5=35%, L6=10%.
    3. Track token usage per agent in real-time (input_tokens + output_tokens per LLM call).
    4. When a layer reaches 80% of its budget, emit a WARNING and switch to shorter prompts.
    5. When a layer reaches 100%, BLOCK further LLM calls unless an L0/L1 override is issued.
    6. Allow explicit budget transfers: L1 can donate unused budget to L5 if strategic planning finishes early.
    7. Log budget usage per layer per run for capacity planning and optimization.
    8. Never silently exceed — always fail loudly with a BudgetExhausted error.
  severity: high
  technologies:
    lang: [python]
    framework: [langgraph, crewai]
    library: [tiktoken, anthropic]
  domains:
    domain: [agent_orchestration, resource_management]
    concern: [cost_control, fairness, capacity_planning]
  example_good: |
    from dataclasses import dataclass, field

    @dataclass
    class LayerBudget:
        layer: str
        max_tokens: int
        used_tokens: int = 0
        warning_threshold: float = 0.8

        @property
        def remaining(self) -> int:
            return self.max_tokens - self.used_tokens

        def consume(self, tokens: int) -> None:
            if self.used_tokens + tokens > self.max_tokens:
                raise BudgetExhaustedError(
                    f"Layer {self.layer}: {self.used_tokens + tokens} > {self.max_tokens}"
                )
            self.used_tokens += tokens
            if self.used_tokens / self.max_tokens >= self.warning_threshold:
                logger.warning(f"Layer {self.layer} at {self.used_tokens/self.max_tokens:.0%} budget")

    class PipelineBudgetAllocator:
        LAYER_ALLOCATIONS = {
            "L0_system": 0.05, "L1_executive": 0.10, "L2_vp": 0.10,
            "L3_master": 0.15, "L4_squad_lead": 0.15,
            "L5_worker": 0.35, "L6_specialist": 0.10,
        }

        def __init__(self, total_budget: int = 2_000_000):
            self.budgets = {
                layer: LayerBudget(layer=layer, max_tokens=int(total_budget * pct))
                for layer, pct in self.LAYER_ALLOCATIONS.items()
            }

        def consume(self, layer: str, tokens: int) -> None:
            self.budgets[layer].consume(tokens)

        def transfer(self, from_layer: str, to_layer: str, tokens: int) -> None:
            """Explicit budget transfer between layers."""
            self.budgets[from_layer].max_tokens -= tokens
            self.budgets[to_layer].max_tokens += tokens
  example_bad: |
    # No budget control — one agent consumes everything
    def run_pipeline(tasks):
        for task in tasks:
            # Each agent uses as many tokens as it wants
            result = call_llm(task.prompt)  # 50K tokens per call, no limit
            # Worker agent used 1.5M tokens, QA layer gets 0 tokens left
            # Pipeline "succeeds" but QA never ran — quality is unknown

    # Result: $400 API bill for a single run, QA skipped, bugs shipped
  when_applies: Any multi-agent pipeline using LLM APIs, especially when running multiple agents concurrently
  sources:
    - "https://platform.openai.com/docs/guides/rate-limits"
    - "https://docs.anthropic.com/en/docs/build-with-claude/rate-limits"
    - "https://langchain-ai.github.io/langgraph/concepts/low_level/#state"

- id: ALYR-003
  text: "Implement system-wide circuit breakers that trip when a downstream dependency fails repeatedly, preventing cascading failures from propagating through all 7 layers."
  why: >
    In a 7-layer agent hierarchy, a single failing dependency (LLM API down, vector DB
    unreachable, tool execution timeout) can cascade upward through every layer. L5 workers
    retry the failing call, L4 squad leads retry the failing workers, L3 masters retry the
    failing squads — creating an exponential retry storm that consumes all tokens and blocks
    the entire pipeline. The Circuit Breaker pattern (Michael Nygard, "Release It!") prevents
    this: after N consecutive failures, the breaker trips OPEN, immediately rejecting calls
    without attempting them. After a cooldown period, it moves to HALF-OPEN, allowing one
    probe call. If the probe succeeds, the breaker closes and normal operation resumes. This
    limits blast radius, preserves token budget, and gives failing dependencies time to recover.
  how_to_do_right: |
    1. Wrap every external dependency (LLM API, vector DB, tool execution) in a circuit breaker.
    2. Configure per-dependency thresholds: failure_count=5, timeout=60s, half_open_after=120s.
    3. When the breaker trips OPEN, return a cached/default response or raise CircuitOpenError.
    4. Log every state transition: CLOSED->OPEN (alert), OPEN->HALF_OPEN (recovering), HALF_OPEN->CLOSED (recovered).
    5. Expose breaker states in the L0 health dashboard so operators see which dependencies are degraded.
    6. Different breakers for different dependencies: LLM API (trip at 3 failures), Qdrant (trip at 5), tool exec (trip at 10).
    7. Never let a tripped breaker silently return empty results — always make the failure visible.
  severity: critical
  technologies:
    lang: [python]
    framework: [langgraph]
    library: [tenacity, circuitbreaker]
  domains:
    domain: [agent_orchestration, reliability]
    concern: [fault_tolerance, cascading_failure, resilience]
  example_good: |
    import time
    from enum import Enum
    from dataclasses import dataclass

    class BreakerState(Enum):
        CLOSED = "closed"
        OPEN = "open"
        HALF_OPEN = "half_open"

    @dataclass
    class CircuitBreaker:
        name: str
        failure_threshold: int = 5
        recovery_timeout: int = 120
        state: BreakerState = BreakerState.CLOSED
        failure_count: int = 0
        last_failure_time: float = 0.0

        def call(self, func, *args, **kwargs):
            if self.state == BreakerState.OPEN:
                if time.time() - self.last_failure_time > self.recovery_timeout:
                    self.state = BreakerState.HALF_OPEN
                else:
                    raise CircuitOpenError(f"Circuit {self.name} is OPEN")

            try:
                result = func(*args, **kwargs)
                if self.state == BreakerState.HALF_OPEN:
                    self.state = BreakerState.CLOSED
                    self.failure_count = 0
                return result
            except Exception as e:
                self.failure_count += 1
                self.last_failure_time = time.time()
                if self.failure_count >= self.failure_threshold:
                    self.state = BreakerState.OPEN
                raise

    # Usage: one breaker per dependency
    llm_breaker = CircuitBreaker("anthropic_api", failure_threshold=3, recovery_timeout=60)
    qdrant_breaker = CircuitBreaker("qdrant", failure_threshold=5, recovery_timeout=120)

    def safe_llm_call(prompt: str) -> str:
        return llm_breaker.call(anthropic_client.messages.create, model="claude-sonnet-4-20250514", messages=[...])
  example_bad: |
    # No circuit breaker — cascade failure
    def run_worker(task):
        for attempt in range(100):  # 100 retries!
            try:
                return call_llm(task.prompt)
            except APIError:
                time.sleep(1)  # Retry storm: 100 workers x 100 retries = 10,000 API calls

    # All 7 layers retry simultaneously
    # API rate limit hit — even healthy calls fail
    # Token budget exhausted in minutes
    # Pipeline stuck for hours until operator manually kills it
  when_applies: Any agent pipeline with external dependencies (LLM APIs, databases, tool execution)
  sources:
    - "https://martinfowler.com/bliki/CircuitBreaker.html"
    - "https://learn.microsoft.com/en-us/azure/architecture/patterns/circuit-breaker"
    - "https://pypi.org/project/circuitbreaker/"

# =============================================================================
# L1 EXECUTIVE LAYER (ALYR-004 to ALYR-006)
# Strategic priority, cross-product dependencies, vision alignment
# =============================================================================

- id: ALYR-004
  text: "Classify every incoming task as P0 (pipeline-blocking), P1 (sprint-blocking), or P2 (nice-to-have), and enforce strict preemption — a P0 task MUST interrupt any running P1/P2 work immediately."
  why: >
    Without explicit priority classification, agent pipelines suffer from "priority inversion"
    — low-priority tasks consume all available agents while critical blockers sit in a queue.
    This mirrors the Mars Pathfinder bug (1997) where a low-priority task held a mutex that
    starved a high-priority watchdog, causing system resets. In agent pipelines, a P0 task
    like "LLM API key expired" or "test suite completely broken" must preempt any ongoing P1
    work like "implement feature X." Without preemption, the pipeline continues generating
    code that will never pass gates because the underlying infrastructure is broken. The
    P0/P1/P2 classification must be enforced at L1 (Executive) because lower layers lack the
    global view to judge priority correctly.
  how_to_do_right: |
    1. Define priority levels with clear criteria:
       - P0: Blocks the entire pipeline or multiple products. Examples: API key expired, CI broken, data corruption.
       - P1: Blocks current sprint or product. Examples: failing gate, missing dependency, spec ambiguity.
       - P2: Improves quality but not blocking. Examples: refactoring, documentation, tech debt.
    2. Implement a priority queue with preemption: when a P0 arrives, pause all P1/P2 agents.
    3. Paused agents must checkpoint their state (partial outputs, current step) before yielding.
    4. P0 tasks get 100% of resources until resolved. P1 tasks share remaining resources. P2 tasks only run when idle.
    5. Log every preemption event with reason, paused tasks, and resume time.
    6. Maximum P0 duration: 4 hours. If unresolved, escalate to human operator.
    7. Only L1 (Executive) or L0 (System) can classify tasks as P0.
  severity: critical
  technologies:
    lang: [python]
    framework: [langgraph, crewai]
    infra: [redis]
  domains:
    domain: [agent_orchestration, project_management]
    concern: [prioritization, preemption, resource_allocation]
  example_good: |
    from enum import IntEnum
    from dataclasses import dataclass
    from typing import Optional
    import heapq, time

    class Priority(IntEnum):
        P0_PIPELINE_BLOCKING = 0
        P1_SPRINT_BLOCKING = 1
        P2_NICE_TO_HAVE = 2

    @dataclass(order=True)
    class PrioritizedTask:
        priority: Priority
        task_id: str
        description: str
        created_at: float

    class ExecutivePriorityQueue:
        def __init__(self):
            self._queue: list[PrioritizedTask] = []
            self._running: dict[str, PrioritizedTask] = {}

        def submit(self, task: PrioritizedTask) -> list[str]:
            """Returns list of agent_ids that should be preempted."""
            heapq.heappush(self._queue, task)
            if task.priority == Priority.P0_PIPELINE_BLOCKING:
                preempt = [
                    aid for aid, t in self._running.items()
                    if t.priority > Priority.P0_PIPELINE_BLOCKING
                ]
                return preempt
            return []

        def next_task(self) -> Optional[PrioritizedTask]:
            return heapq.heappop(self._queue) if self._queue else None

    # Usage
    queue = ExecutivePriorityQueue()
    preempted = queue.submit(PrioritizedTask(
        priority=Priority.P0_PIPELINE_BLOCKING,
        task_id="FIX-001",
        description="Anthropic API key expired — all agents blocked",
        created_at=time.time(),
    ))
    for agent_id in preempted:
        checkpoint_and_pause(agent_id)
  example_bad: |
    # FIFO queue — no priorities, P0 waits behind P2 tasks
    task_queue = []
    task_queue.append("refactor utils.py")        # P2: nice-to-have
    task_queue.append("add type hints to models")  # P2: nice-to-have
    task_queue.append("API KEY EXPIRED - ALL AGENTS BLOCKED")  # P0: critical!

    # P0 task waits 2 hours behind P2 tasks
    # All agents produce code that fails because API is down
    # 200K tokens wasted on code that will never compile
  when_applies: Any multi-agent pipeline with concurrent task execution
  sources:
    - "https://www.cs.unc.edu/~anderson/teach/comp790/papers/mars_pathfinder_long_version.html"
    - "https://docs.crewai.com/concepts/tasks"
    - "https://langchain-ai.github.io/langgraph/concepts/human_in_the_loop/"

- id: ALYR-005
  text: "Detect and resolve cross-product blocking dependencies at the executive level BEFORE sprint planning — never let two squads discover they block each other mid-sprint."
  why: >
    In a multi-product pipeline, Product A's sprint may depend on a library built in Product
    B's sprint. If this dependency is discovered mid-sprint when a worker agent tries to import
    a module that does not exist yet, the entire squad stalls, the sprint fails, and both
    teams waste tokens. This is the "integration hell" problem that DevOps solved for code
    (CI/CD) but that multi-agent systems recreate at the planning level. The L1 Executive
    layer has the global view across all products and must build a dependency graph BEFORE
    sprint planning. Topological sorting of this graph reveals blocking chains, and the
    Executive must either sequence sprints correctly or parallelize with explicit interface
    contracts (stubs/mocks) so no squad blocks another.
  how_to_do_right: |
    1. Before each planning cycle, build a cross-product dependency graph: nodes=sprints, edges=dependencies.
    2. Run topological sort to detect cycles (deadlocks) and compute execution order.
    3. For each blocking dependency: either sequence (A before B) or define an interface contract (stub).
    4. Interface contracts must specify: function signatures, input/output types, example data, delivery deadline.
    5. The dependent squad works against the stub; the providing squad delivers the real implementation.
    6. When the real implementation lands, run integration tests against the contract.
    7. If a cycle is detected (A depends on B depends on A), escalate to L1 for scope negotiation.
    8. Track dependency resolution as a first-class metric: "dependency resolution time" per sprint.
  severity: high
  technologies:
    lang: [python]
    framework: [langgraph]
    library: [networkx]
  domains:
    domain: [agent_orchestration, project_management]
    concern: [dependency_management, cross_product, sprint_planning]
  example_good: |
    import networkx as nx

    def detect_blocking_dependencies(sprints: list[dict]) -> dict:
        """Build dependency graph and detect blocking chains."""
        G = nx.DiGraph()
        for sprint in sprints:
            G.add_node(sprint["id"], product=sprint["product"])
            for dep in sprint.get("depends_on", []):
                G.add_edge(dep, sprint["id"])

        # Detect cycles (deadlocks)
        cycles = list(nx.simple_cycles(G))
        if cycles:
            raise DependencyCycleError(f"Deadlock detected: {cycles}")

        # Compute execution order
        execution_order = list(nx.topological_sort(G))

        # Find cross-product edges (the risky ones)
        cross_product = []
        for u, v in G.edges():
            if G.nodes[u]["product"] != G.nodes[v]["product"]:
                cross_product.append((u, v))

        return {
            "execution_order": execution_order,
            "cross_product_deps": cross_product,
            "critical_path": nx.dag_longest_path(G),
        }

    # Before sprint planning:
    result = detect_blocking_dependencies([
        {"id": "S05", "product": "veritas", "depends_on": []},
        {"id": "S06", "product": "veritas", "depends_on": ["S05"]},
        {"id": "CP01", "product": "cockpit", "depends_on": ["S05"]},  # Cross-product!
    ])
    # result["cross_product_deps"] = [("S05", "CP01")]
    # Action: Define interface contract for S05 output before CP01 starts
  example_bad: |
    # No dependency detection — squads discover blocking mid-sprint
    def plan_sprints(products):
        for product in products:
            plan_product_sprint(product)

    # Mid-sprint: cockpit agent tries `from veritas.core.models import Claim`
    # ImportError: module 'veritas.core.models' has no attribute 'Claim'
    # Claim model is being built in veritas S05, which hasn't finished yet
    # Cockpit squad blocked for 3 hours, 50K tokens wasted
  when_applies: Multi-product pipelines or any system where sprints/tasks have cross-team dependencies
  sources:
    - "https://networkx.org/documentation/stable/reference/algorithms/dag.html"
    - "https://martinfowler.com/articles/dependency-injection.html"
    - "https://docs.github.com/en/issues/planning-and-tracking-with-projects/understanding-fields/about-tracks-and-tracked-by-fields"

- id: ALYR-006
  text: "Every sprint output MUST trace to the product vision — if an agent cannot articulate which vision goal its work serves, the work should not be done."
  why: >
    Agent pipelines are exceptionally prone to "productive drift" — agents generate plausible,
    well-structured code that passes all automated checks but does not serve the product
    vision. This happens because LLMs are trained to be helpful and will enthusiastically
    implement whatever they are asked, even if it contradicts the overall direction. Without
    explicit vision traceability, an agent hierarchy can spend weeks building features that
    satisfy local requirements but are globally irrelevant. Amazon's "Working Backwards" process
    and Google's OKR system both enforce this principle: every unit of work must trace to a
    strategic objective. In agent pipelines, this traceability must be automated because there
    is no human in the loop for every task.
  how_to_do_right: |
    1. Define the product vision as a structured document: 5-10 goals with measurable outcomes.
    2. Every sprint spec must include a "vision_alignment" field: which goal(s) does this sprint advance?
    3. At L1, validate that every sprint has at least one vision goal mapped. Reject unmapped sprints.
    4. At L3, the Spec Master verifies that every requirement traces to a vision goal.
    5. At QA (L3), include a "vision alignment check": does the deliverable actually advance the stated goal?
    6. Track vision coverage: which goals have sprints? Which goals are neglected?
    7. If >30% of sprint work is P2 with no vision alignment, raise a strategic drift alert at L1.
    8. Review vision alignment quarterly and update goals as the product evolves.
  severity: high
  technologies:
    lang: [python]
    framework: [langgraph, crewai]
  domains:
    domain: [agent_orchestration, product_management]
    concern: [vision_alignment, strategic_planning, traceability]
  example_good: |
    from dataclasses import dataclass

    @dataclass
    class VisionGoal:
        id: str
        description: str
        measurable_outcome: str

    @dataclass
    class SprintSpec:
        sprint_id: str
        title: str
        vision_goals: list[str]  # Must reference at least one VisionGoal.id
        deliverables: list[str]

    PRODUCT_VISION = [
        VisionGoal("VG-01", "Reliable fact-checking", "95% accuracy on TruthfulQA"),
        VisionGoal("VG-02", "Sub-second verification", "<1s p99 latency"),
        VisionGoal("VG-03", "Explainable verdicts", "100% verdicts have reasoning chain"),
    ]

    def validate_vision_alignment(spec: SprintSpec, vision: list[VisionGoal]) -> bool:
        """Reject sprint specs that don't trace to any vision goal."""
        valid_ids = {g.id for g in vision}
        if not spec.vision_goals:
            raise VisionAlignmentError(f"Sprint {spec.sprint_id} has no vision goals")
        invalid = set(spec.vision_goals) - valid_ids
        if invalid:
            raise VisionAlignmentError(f"Unknown vision goals: {invalid}")
        return True

    # L1 Executive validates before sprint planning
    spec = SprintSpec("S05", "Implement Qdrant indexing", ["VG-01", "VG-02"], [...])
    validate_vision_alignment(spec, PRODUCT_VISION)  # Passes
  example_bad: |
    # No vision traceability — agents build whatever sounds reasonable
    sprint_spec = {
        "id": "S12",
        "title": "Add GraphQL subscriptions for real-time updates",
        "tasks": ["implement pubsub", "add websocket transport", "write tests"],
    }
    # Looks productive! But the product vision says nothing about real-time updates.
    # Agent spent 3 days and 500K tokens building a feature nobody asked for.
    # Passes all gates (code quality, tests, coverage) but is strategically worthless.
  when_applies: Any multi-sprint product development pipeline, especially when agents operate autonomously
  sources:
    - "https://www.amazon.science/latest-news/the-science-behind-amazons-success"
    - "https://re-work.co/blog/OKRs-google"
    - "https://docs.crewai.com/concepts/crews#crew-output"

# =============================================================================
# L2 VP LAYER (ALYR-007 to ALYR-009)
# Pipeline orchestration, capacity planning, quality calibration
# =============================================================================

- id: ALYR-007
  text: "Enforce explicit phase transition gates between Spec, Exec, and QA — no phase may start until the previous phase's gate passes, and gate criteria must be machine-checkable."
  why: >
    Without phase gates, agent pipelines exhibit "phase bleed" — execution starts before the
    spec is complete, QA reviews code that is still being written, and rework addresses
    findings against a moving target. This mirrors the "waterfall without gates" antipattern
    in traditional software, but is worse in agent systems because agents cannot exercise
    judgment about when to wait. If a spec is 70% complete when execution starts, the executor
    agent will hallucinate the missing 30%, producing code that must be entirely rewritten.
    Phase gates force completeness: spec must be 100% before exec starts, exec must pass smoke
    tests before QA starts. The gates must be machine-checkable (not "looks good to me")
    because the gatekeepers are also agents.
  how_to_do_right: |
    1. Define 3 mandatory gates: SPEC_COMPLETE, EXEC_COMPLETE, QA_COMPLETE.
    2. SPEC_COMPLETE criteria (all must pass):
       - All requirements have acceptance criteria (machine-parseable)
       - All deliverables listed with file paths
       - All dependencies resolved or stubbed
       - State machine defined for any entity with lifecycle
    3. EXEC_COMPLETE criteria:
       - All deliverable files exist and are non-empty
       - All files parse without syntax errors
       - Import graph resolves (no missing modules)
       - Smoke tests pass (at minimum: files import, classes instantiate)
    4. QA_COMPLETE criteria:
       - Test coverage >= threshold (e.g., 90%)
       - All critical findings addressed
       - No P0/P1 open findings
    5. Gate results are persisted — never re-run a passing gate unless inputs change.
    6. Gate failure produces structured output: which criterion failed, what evidence, suggested fix.
  severity: critical
  technologies:
    lang: [python]
    framework: [langgraph]
    library: [pydantic]
  domains:
    domain: [agent_orchestration, quality_assurance]
    concern: [phase_gates, workflow, quality_control]
  example_good: |
    from pydantic import BaseModel
    from enum import Enum

    class GateResult(BaseModel):
        gate_name: str
        passed: bool
        criteria: list[dict]  # {"name": str, "passed": bool, "evidence": str}
        blocking_failures: list[str]

    class Phase(Enum):
        SPEC = "spec"
        EXEC = "exec"
        QA = "qa"
        DONE = "done"

    GATE_TRANSITIONS = {
        Phase.SPEC: Phase.EXEC,
        Phase.EXEC: Phase.QA,
        Phase.QA: Phase.DONE,
    }

    def check_spec_gate(sprint_state: dict) -> GateResult:
        criteria = []
        # Check: all requirements have acceptance criteria
        for req in sprint_state["requirements"]:
            has_ac = bool(req.get("acceptance_criteria"))
            criteria.append({
                "name": f"req_{req['id']}_has_acceptance_criteria",
                "passed": has_ac,
                "evidence": req.get("acceptance_criteria", "MISSING"),
            })
        # Check: all deliverables listed
        has_deliverables = len(sprint_state.get("deliverables", [])) > 0
        criteria.append({
            "name": "has_deliverables",
            "passed": has_deliverables,
            "evidence": f"{len(sprint_state.get('deliverables', []))} deliverables listed",
        })

        failures = [c["name"] for c in criteria if not c["passed"]]
        return GateResult(
            gate_name="SPEC_COMPLETE",
            passed=len(failures) == 0,
            criteria=criteria,
            blocking_failures=failures,
        )
  example_bad: |
    # No gates — phases overlap, spec is incomplete when exec starts
    async def run_sprint(spec):
        code = await exec_agent.generate(spec)  # Spec is 60% complete
        # Exec agent hallucinated 40% of requirements
        review = await qa_agent.review(code)     # QA reviews hallucinated code
        # QA finds 47 issues, 30 of which are "not in spec"
        # Rework agent fixes against the still-incomplete spec
        # Infinite loop: fix -> new findings -> fix -> new findings
  when_applies: Any phased agent pipeline (Spec -> Exec -> QA -> Rework)
  sources:
    - "https://langchain-ai.github.io/langgraph/concepts/low_level/#conditional-edges"
    - "https://docs.pydantic.dev/latest/concepts/validators/"
    - "https://martinfowler.com/articles/continuousIntegration.html"

- id: ALYR-008
  text: "Limit concurrent squads based on available agent capacity and context window limits — running N squads when you have resources for N/2 degrades ALL squads rather than completing half well."
  why: >
    LLM-based agents are context-window-bound, not CPU-bound. Running 10 concurrent squads
    with 5 agents each requires 50 active context windows, but if only 20 can fit in memory
    or the API rate limit supports only 20 concurrent calls, all 50 agents compete for the
    same bottleneck. This creates thrashing: agents wait for API slots, contexts expire,
    partial results are evicted, and agents must re-read large contexts. The result is worse
    than running 5 squads sequentially because of the overhead of context switching and cache
    misses. Little's Law (L = lambda * W) applies: if arrival rate (squads) exceeds service
    rate (API throughput), queue length grows unboundedly and latency diverges.
  how_to_do_right: |
    1. Measure your actual throughput: max concurrent LLM calls per second at your API tier.
    2. Each squad needs ~3-5 concurrent agent slots. Divide throughput by agents-per-squad = max squads.
    3. Implement a semaphore or token bucket at L2 that gates squad creation.
    4. When a new squad is requested and all slots are full, queue it — do not degrade running squads.
    5. Monitor queue depth: if queue > 2*capacity, alert L1 to reprioritize or defer P2 work.
    6. Track per-squad completion time. If it increases >50% when adding squads, you are over capacity.
    7. Reserve 20% capacity headroom for P0 tasks that may need immediate resources.
  severity: high
  technologies:
    lang: [python]
    framework: [langgraph, crewai]
    library: [asyncio]
  domains:
    domain: [agent_orchestration, capacity_planning]
    concern: [concurrency, throughput, resource_management]
  example_good: |
    import asyncio, time
    from dataclasses import dataclass, field

    @dataclass
    class CapacityPlanner:
        max_concurrent_squads: int
        agents_per_squad: int
        _semaphore: asyncio.Semaphore = field(init=False)
        _active_squads: dict = field(default_factory=dict, init=False)

        def __post_init__(self):
            self._semaphore = asyncio.Semaphore(self.max_concurrent_squads)

        async def run_squad(self, squad_id: str, tasks: list) -> dict:
            """Only runs when capacity is available, otherwise waits."""
            async with self._semaphore:
                self._active_squads[squad_id] = {"started": time.time(), "tasks": len(tasks)}
                try:
                    result = await execute_squad(squad_id, tasks)
                    return result
                finally:
                    del self._active_squads[squad_id]

        @property
        def utilization(self) -> float:
            return len(self._active_squads) / self.max_concurrent_squads

    # Configure based on actual API capacity
    # Claude Max: ~60 req/min -> 15 concurrent agents -> 3-5 squads
    planner = CapacityPlanner(max_concurrent_squads=4, agents_per_squad=4)

    # Queue squads — only 4 run at a time, rest wait
    results = await asyncio.gather(*[
        planner.run_squad(f"squad_{i}", tasks[i])
        for i in range(10)  # 10 squads, but only 4 concurrent
    ])
  example_bad: |
    # No capacity control — all squads launched simultaneously
    async def run_all_squads(squads):
        return await asyncio.gather(*[
            run_squad(s) for s in squads  # 20 squads, 80 agents, API allows 15 concurrent
        ])
    # Result: API rate limit hit, retries everywhere, 80% of calls fail
    # Squads that would finish in 5 minutes now take 45 minutes
    # Total wall-clock time WORSE than running sequentially
  when_applies: Any multi-agent system running concurrent work streams against shared API rate limits
  sources:
    - "https://docs.anthropic.com/en/docs/build-with-claude/rate-limits"
    - "https://docs.python.org/3/library/asyncio-sync.html#asyncio.Semaphore"
    - "https://en.wikipedia.org/wiki/Little%27s_law"

- id: ALYR-009
  text: "Calibrate quality gate thresholds dynamically based on sprint maturity — early sprints should have lenient gates to encourage exploration, mature sprints should have strict gates to enforce quality."
  why: >
    A fixed quality threshold (e.g., "90% test coverage always") is wrong at both ends of the
    spectrum. In early sprints (S00-S03), the codebase is exploratory — models change shape,
    APIs evolve, and requiring 90% coverage forces agents to write tests for code that will be
    rewritten next sprint. This wastes tokens and slows exploration. In mature sprints
    (S15+), the same 90% threshold is too low — the architecture is stable, and any uncovered
    code is likely a real gap. Netflix's "paved road" approach and Google's "prober coverage"
    strategy both use graduated quality bars. The L2 VP layer should calibrate thresholds
    because it has visibility into sprint position within the product lifecycle.
  how_to_do_right: |
    1. Define maturity tiers based on sprint position:
       - Foundation (S00-S07): 70% coverage, 0 P0 findings, P1 advisory only
       - Intelligence (S08-S18): 80% coverage, 0 P0, max 3 P1
       - Hardening (S19+): 90% coverage, 0 P0, 0 P1, mutation kill rate > 70%
    2. Store thresholds in a config file, not hardcoded — allow L1 to override per sprint.
    3. Gate logic reads the sprint_id, determines maturity tier, applies appropriate thresholds.
    4. When a gate fails at a lenient threshold, log it as WARNING (not FAILURE) at higher tiers.
    5. Track the trend: if coverage decreases sprint-over-sprint, alert regardless of threshold.
    6. Never make thresholds MORE lenient as sprints progress — monotonically increasing only.
    7. Document the rationale for each threshold so future operators understand the graduation.
  severity: high
  technologies:
    lang: [python]
    framework: [langgraph]
    library: [pydantic, pytest]
  domains:
    domain: [agent_orchestration, quality_assurance]
    concern: [quality_calibration, gate_thresholds, maturity_model]
  example_good: |
    from pydantic import BaseModel

    class QualityThresholds(BaseModel):
        min_coverage: float
        max_p0_findings: int
        max_p1_findings: int
        mutation_kill_rate: float
        require_docstrings: bool

    MATURITY_TIERS = {
        "foundation": QualityThresholds(
            min_coverage=0.70, max_p0_findings=0, max_p1_findings=99,
            mutation_kill_rate=0.0, require_docstrings=False,
        ),
        "intelligence": QualityThresholds(
            min_coverage=0.80, max_p0_findings=0, max_p1_findings=3,
            mutation_kill_rate=0.50, require_docstrings=True,
        ),
        "hardening": QualityThresholds(
            min_coverage=0.90, max_p0_findings=0, max_p1_findings=0,
            mutation_kill_rate=0.70, require_docstrings=True,
        ),
    }

    def get_thresholds(sprint_id: str) -> QualityThresholds:
        num = int(sprint_id.replace("S", "").replace("CP", ""))
        if num <= 7:
            return MATURITY_TIERS["foundation"]
        elif num <= 18:
            return MATURITY_TIERS["intelligence"]
        else:
            return MATURITY_TIERS["hardening"]

    # Gate applies tier-appropriate threshold
    thresholds = get_thresholds("S03")
    assert coverage >= thresholds.min_coverage  # 70% for foundation
  example_bad: |
    # Fixed threshold for all sprints — wastes tokens or ships bugs
    COVERAGE_THRESHOLD = 0.90

    def check_gate(sprint_id, coverage):
        if coverage < COVERAGE_THRESHOLD:
            return "FAIL"
        return "PASS"

    # S00 (exploratory): Agent writes 200 tests for models that change next sprint
    # S30 (mature): 90% threshold passes but 10% uncovered is the security-critical path
    # Both cases are wrong — one wastes effort, the other misses risk
  when_applies: Any pipeline with multiple sprints spanning exploratory to mature phases
  sources:
    - "https://netflixtechblog.com/full-cycle-developers-at-netflix-a08c31f83249"
    - "https://testing.googleblog.com/2014/07/measuring-coverage-at-google.html"
    - "https://docs.pytest.org/en/stable/how-to/usage.html"

