layer: rules
technology: NestJS
domain: backend
knowledge:
- id: CR-NEST-001
  text: Organize code into feature modules. Every feature gets its own module encapsulating its controllers, providers, and
    entities.
  why: A single monolithic AppModule with 50 providers creates an unnavigable codebase where dependencies are invisible, testing
    requires bootstrapping the entire application, and circular imports are inevitable. Modules enforce boundaries — a module
    only accesses what it explicitly imports, making the dependency graph visible and testable.
  how_to_do_right: '1. Create one module per domain feature (UsersModule, OrdersModule, PaymentsModule).

    2. Export only the services that other modules need — keep internals private.

    3. Use forRoot/forAsync pattern for configurable modules (database, cache, queue).

    4. Import modules, never individual providers from other modules.

    5. Keep AppModule clean — it only imports feature modules and global config.

    '
  severity: high
  technologies:
    lang: [typescript]
    framework: [backend, nestjs]
  domains:
    domain: [architecture]
    concern: [backend]
  example_good: "// orders/orders.module.ts — encapsulated feature module\n@Module({\n  imports: [\n    TypeOrmModule.forFeature([Order,\
    \ OrderItem]),\n    PaymentsModule,  // Import the module, not individual services\n    UsersModule,\n  ],\n  controllers:\
    \ [OrdersController],\n  providers: [OrdersService, OrdersRepository],\n  exports: [OrdersService],  // Only export what\
    \ others need\n})\nexport class OrdersModule {}\n\n// app.module.ts — clean root module\n@Module({\n  imports: [\n   \
    \ ConfigModule.forRoot({ isGlobal: true }),\n    TypeOrmModule.forRootAsync({ useClass: TypeOrmConfigService }),\n   \
    \ UsersModule,\n    OrdersModule,\n    PaymentsModule,\n  ],\n})\nexport class AppModule {}\n"
  example_bad: "// Wrong: Everything in AppModule — no boundaries\n@Module({\n  imports: [TypeOrmModule.forFeature([User,\
    \ Order, Payment, Product])],\n  controllers: [UsersController, OrdersController, PaymentsController],\n  providers: [\n\
    \    UsersService, OrdersService, PaymentsService,\n    EmailService, NotificationService, CacheService,\n    // 30 more\
    \ providers... all can access each other\n  ],\n})\nexport class AppModule {}\n"
  when_applies: Projects using NestJS server-side applications or TypeScript projects with static typing
  when_not_applies: small scripts under 100 lines, single-purpose utilities. projects not using NestJS or TypeScript
  sources: ["https://docs.nestjs.com/modules"]
- id: CR-NEST-002
  text: Use constructor injection with @Injectable() providers. Never instantiate dependencies manually or use global state.
  why: Manual instantiation (new MyService()) bypasses NestJS's DI container, preventing lifecycle management, scope control,
    mocking in tests, and AOP features (interceptors, guards). Every new MyService() creates an instance with no connection
    to the container — configuration injection, request scoping, and graceful shutdown all break.
  how_to_do_right: '1. Mark all services with @Injectable() decorator.

    2. Inject via constructor parameters — NestJS resolves automatically.

    3. Use custom providers (useFactory, useValue) for third-party classes.

    4. Use REQUEST scope only when truly needed — it creates new instances per request.

    5. Use TRANSIENT scope for stateful utilities that should not be shared.

    '
  severity: high
  technologies:
    lang: [typescript]
    framework: [backend, nestjs]
  domains:
    domain: [architecture]
    concern: [backend]
  example_good: "// Correct: DI with @Injectable\n@Injectable()\nexport class OrdersService {\n  constructor(\n    private\
    \ readonly ordersRepository: OrdersRepository,\n    private readonly paymentsService: PaymentsService,\n    private readonly\
    \ eventEmitter: EventEmitter2,\n  ) {}\n\n  async createOrder(dto: CreateOrderDto): Promise<Order> {\n    const order\
    \ = await this.ordersRepository.create(dto);\n    await this.paymentsService.charge(order);\n    this.eventEmitter.emit('order.created',\
    \ order);\n    return order;\n  }\n}\n\n// Custom provider for third-party class\n@Module({\n  providers: [\n    {\n \
    \     provide: 'STRIPE_CLIENT',\n      useFactory: (config: ConfigService) =>\n        new Stripe(config.get('STRIPE_SECRET_KEY')),\n\
    \      inject: [ConfigService],\n    },\n  ],\n})\nexport class PaymentsModule {}\n"
  example_bad: "// Wrong: Manual instantiation — no DI, no lifecycle, no testing\n@Injectable()\nexport class OrdersService\
    \ {\n  private paymentsService = new PaymentsService(); // Not from container!\n  private cache = new Map();  // Global\
    \ state, not managed\n\n  async createOrder(dto: CreateOrderDto) {\n    // paymentsService has no config, no injected\
    \ dependencies\n    // Can't mock in tests without hacks\n    await this.paymentsService.charge(dto);\n  }\n}\n"
  when_applies: Projects using NestJS server-side applications or TypeScript projects with static typing
  when_not_applies: small scripts under 100 lines, single-purpose utilities. projects not using NestJS or TypeScript
  sources: ["https://docs.nestjs.com/providers"]
- id: CR-NEST-003
  text: Keep controllers thin — they handle HTTP concerns only. All business logic belongs in services.
  why: Controllers mixed with business logic cannot be reused across transport layers (HTTP, WebSocket, gRPC, CLI), cannot
    be unit tested without HTTP context, and violate single responsibility. When you add a WebSocket gateway later, you duplicate
    all business logic. Services are transport-agnostic and testable.
  how_to_do_right: '1. Controllers: Parse request, validate DTO, call service, format response.

    2. Services: All business logic, database operations, external API calls.

    3. Controller methods should be 5-10 lines maximum.

    4. Use DTOs for request validation, entities for persistence, and response DTOs for output.

    5. Never inject Repository into Controller — always go through Service.

    '
  severity: high
  technologies:
    lang: [typescript]
    framework: [backend, nestjs]
  domains:
    domain: [architecture]
    concern: [backend]
  example_good: "// Controller: thin HTTP layer\n@Controller('orders')\nexport class OrdersController {\n  constructor(private\
    \ readonly ordersService: OrdersService) {}\n\n  @Post()\n  @HttpCode(HttpStatus.CREATED)\n  async create(\n    @Body()\
    \ dto: CreateOrderDto,\n    @CurrentUser() user: User,\n  ): Promise<OrderResponseDto> {\n    const order = await this.ordersService.create(dto,\
    \ user);\n    return OrderResponseDto.fromEntity(order);\n  }\n\n  @Get(':id')\n  async findOne(@Param('id', ParseUUIDPipe)\
    \ id: string): Promise<OrderResponseDto> {\n    const order = await this.ordersService.findOneOrFail(id);\n    return\
    \ OrderResponseDto.fromEntity(order);\n  }\n}\n\n// Service: all business logic\n@Injectable()\nexport class OrdersService\
    \ {\n  async create(dto: CreateOrderDto, user: User): Promise<Order> {\n    await this.validateStock(dto.items);\n   \
    \ const order = this.ordersRepository.create({ ...dto, userId: user.id });\n    await this.paymentsService.authorize(order);\n\
    \    await this.inventoryService.reserve(order.items);\n    return this.ordersRepository.save(order);\n  }\n}\n"
  example_bad: "// Wrong: Business logic in controller — untestable, not reusable\n@Controller('orders')\nexport class OrdersController\
    \ {\n  constructor(\n    @InjectRepository(Order) private orderRepo: Repository<Order>,\n    @InjectRepository(Product)\
    \ private productRepo: Repository<Product>,\n  ) {}\n\n  @Post()\n  async create(@Body() dto: CreateOrderDto) {\n    //\
    \ 40 lines of business logic in a controller\n    for (const item of dto.items) {\n      const product = await this.productRepo.findOne(item.productId);\n\
    \      if (product.stock < item.quantity) throw new BadRequestException();\n      product.stock -= item.quantity;\n  \
    \    await this.productRepo.save(product);\n    }\n    const order = this.orderRepo.create(dto);\n    return this.orderRepo.save(order);\n\
    \  }\n}\n"
  when_applies: Projects using NestJS server-side applications or TypeScript projects with static typing
  when_not_applies: small scripts under 100 lines, single-purpose utilities. projects not using NestJS or TypeScript
  sources: ["https://docs.nestjs.com/controllers"]
- id: CR-NEST-004
  text: Use Guards for authentication and authorization, not middleware. Guards have access to the execution context and can
    be applied at controller or method level.
  why: Middleware runs before the route handler is determined — it cannot know which controller or method will execute, so
    role-based checks are impossible. Guards run after routing, have access to the ExecutionContext (handler metadata, class
    metadata), and can read custom decorators like @Roles(). Guards return true/false — clean, testable, declarative.
  how_to_do_right: '1. Implement CanActivate interface for custom guards.

    2. Use @UseGuards() at controller or method level.

    3. Bind JwtAuthGuard globally via APP_GUARD for authentication.

    4. Use @SetMetadata() and custom decorators for role metadata.

    5. Use Reflector to read metadata in the guard.

    '
  severity: high
  technologies:
    lang: [typescript]
    framework: [backend, nestjs]
  domains:
    domain: [architecture, security]
    concern: [backend]
  example_good: "// roles.decorator.ts\nexport const Roles = (...roles: Role[]) => SetMetadata('roles', roles);\n\n// roles.guard.ts\n\
    @Injectable()\nexport class RolesGuard implements CanActivate {\n  constructor(private reflector: Reflector) {}\n\n  canActivate(context:\
    \ ExecutionContext): boolean {\n    const requiredRoles = this.reflector.getAllAndOverride<Role[]>('roles', [\n      context.getHandler(),\n\
    \      context.getClass(),\n    ]);\n    if (!requiredRoles) return true; // No roles required\n    const { user } = context.switchToHttp().getRequest();\n\
    \    return requiredRoles.some((role) => user.roles?.includes(role));\n  }\n}\n\n// Controller usage\n@Controller('admin')\n\
    @UseGuards(JwtAuthGuard, RolesGuard)\nexport class AdminController {\n  @Delete('users/:id')\n  @Roles(Role.ADMIN)\n \
    \ deleteUser(@Param('id') id: string) {\n    return this.usersService.delete(id);\n  }\n}\n"
  example_bad: "// Wrong: Auth check in middleware — no access to route metadata\n@Injectable()\nexport class AuthMiddleware\
    \ implements NestMiddleware {\n  use(req: Request, res: Response, next: NextFunction) {\n    // Cannot check roles — doesn't\
    \ know which handler runs\n    if (!req.headers.authorization) {\n      throw new UnauthorizedException();\n    }\n  \
    \  // Role check impossible here — what role does this route need?\n    next();\n  }\n}\n"
  when_applies: Projects using NestJS server-side applications or TypeScript projects with static typing
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities. projects
    not using NestJS or TypeScript
  sources: ["https://docs.nestjs.com/guards"]
- id: CR-NEST-005
  text: Use Pipes for input validation and transformation. Apply ValidationPipe globally with whitelist and forbidNonWhitelisted
    options.
  why: 'Without input validation, any JSON body is accepted and passed to business logic. An attacker can inject extra fields
    (isAdmin: true, role: ''superuser'') that overwrite entity fields during save operations. forbidNonWhitelisted rejects
    requests with unexpected fields. whitelist strips extra fields as a defense-in-depth measure.'
  how_to_do_right: '1. Apply ValidationPipe globally in main.ts with whitelist and forbidNonWhitelisted.

    2. Define DTOs with class-validator decorators for every input.

    3. Use ParseIntPipe, ParseUUIDPipe for path parameters.

    4. Create custom pipes for complex transformations.

    5. Use @Transform() for sanitization (trim, lowercase).

    '
  severity: critical
  technologies:
    lang: [typescript]
    framework: [backend, nestjs]
    library: [class-validator]
  domains:
    domain: [architecture, security]
    concern: [backend]
  example_good: "// main.ts — global validation\napp.useGlobalPipes(new ValidationPipe({\n  whitelist: true,             \
    \ // Strip unknown properties\n  forbidNonWhitelisted: true,   // Reject requests with unknown properties\n  transform:\
    \ true,              // Auto-transform to DTO class instances\n  transformOptions: { enableImplicitConversion: true },\n\
    }));\n\n// create-order.dto.ts — validated input\nexport class CreateOrderDto {\n  @IsUUID()\n  customerId: string;\n\n\
    \  @IsArray()\n  @ValidateNested({ each: true })\n  @Type(() => OrderItemDto)\n  items: OrderItemDto[];\n\n  @IsOptional()\n\
    \  @IsString()\n  @MaxLength(500)\n  @Transform(({ value }) => value?.trim())\n  notes?: string;\n}\n\nexport class OrderItemDto\
    \ {\n  @IsUUID()\n  productId: string;\n\n  @IsInt()\n  @Min(1)\n  @Max(100)\n  quantity: number;\n}\n"
  example_bad: "// Wrong: No validation — accepts any payload\n@Post()\nasync create(@Body() body: any) {\n  // body = { customerId:\
    \ \"abc\", isAdmin: true, role: \"superuser\" }\n  // All fields pass through to database\n  return this.ordersRepo.save(body);\n\
    }\n"
  when_applies: Any project using NestJS server-side applications, TypeScript projects with static typing, or class-validator
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities
  sources: ["https://docs.nestjs.com/pipes"]
- id: CR-NEST-006
  text: 'Use Interceptors for cross-cutting concerns: logging, response transformation, caching, and timeout. Never mix these
    into business logic.'
  why: Cross-cutting concerns (logging, response wrapping, cache headers, timeout) duplicated in every controller method create
    maintenance nightmares. When the response format changes, every method must be updated. Interceptors operate on the Observable
    stream, enabling transformation, error mapping, and timing without touching business code.
  how_to_do_right: '1. Implement NestInterceptor for each concern.

    2. Apply globally for universal concerns (logging, timeout).

    3. Apply at controller level for feature-specific concerns (caching).

    4. Use tap() for side effects (logging), map() for transformation, catchError() for error mapping.

    5. Chain interceptors — they execute in order applied.

    '
  severity: medium
  technologies:
    lang: [typescript]
    framework: [backend, nestjs]
    library: [rxjs]
  domains:
    domain: [architecture]
    concern: [backend]
  example_good: "// logging.interceptor.ts — cross-cutting logging\n@Injectable()\nexport class LoggingInterceptor implements\
    \ NestInterceptor {\n  private readonly logger = new Logger('HTTP');\n\n  intercept(context: ExecutionContext, next: CallHandler):\
    \ Observable<any> {\n    const req = context.switchToHttp().getRequest();\n    const method = req.method;\n    const url\
    \ = req.url;\n    const now = Date.now();\n\n    return next.handle().pipe(\n      tap(() => {\n        const res = context.switchToHttp().getResponse();\n\
    \        this.logger.log(`${method} ${url} ${res.statusCode} ${Date.now() - now}ms`);\n      }),\n    );\n  }\n}\n\n//\
    \ transform.interceptor.ts — uniform response shape\n@Injectable()\nexport class TransformInterceptor<T> implements NestInterceptor<T,\
    \ ApiResponse<T>> {\n  intercept(context: ExecutionContext, next: CallHandler): Observable<ApiResponse<T>> {\n    return\
    \ next.handle().pipe(\n      map(data => ({ success: true, data, timestamp: new Date().toISOString() })),\n    );\n  }\n\
    }\n"
  example_bad: "// Wrong: Cross-cutting concerns in every controller method\n@Get()\nasync findAll() {\n  const start = Date.now();\n\
    \  try {\n    const items = await this.service.findAll();\n    this.logger.log(`GET /items ${Date.now() - start}ms`);\n\
    \    return { success: true, data: items, timestamp: new Date() };\n  } catch (error) {\n    this.logger.error(`GET /items\
    \ FAILED ${Date.now() - start}ms`);\n    return { success: false, error: error.message };\n  }\n}\n// Duplicated in every\
    \ single controller method\n"
  when_applies: Projects using NestJS server-side applications, TypeScript projects with static typing, or RxJS
  when_not_applies: small scripts under 100 lines, single-purpose utilities
  sources: ["https://docs.nestjs.com/interceptors"]
- id: CR-NEST-007
  text: 'Use TypeORM migrations for schema changes. Never use synchronize: true in production — it can drop columns and lose
    data.'
  why: 'synchronize: true compares entities to the database and applies schema changes on every startup. Renaming an entity
    field drops the old column (with data) and creates a new one. Removing a relation drops the foreign key column. There
    is no rollback. A single entity change in a merge can silently destroy production data.'
  how_to_do_right: '1. Set synchronize: false in production (only true in local development if at all).

    2. Generate migrations: npx typeorm migration:generate -d src/data-source.ts -n MigrationName.

    3. Review generated SQL before running — never blind-apply.

    4. Run migrations in CI/CD: npx typeorm migration:run.

    5. Include rollback (down method) in every migration.

    '
  severity: critical
  technologies:
    framework: [backend, nestjs]
    library: [typeorm]
    platform: [postgresql]
  domains:
    domain: [architecture]
    concern: [backend, data, database]
  example_good: "// data-source.ts\nexport const AppDataSource = new DataSource({\n  type: 'postgres',\n  synchronize: false,\
    \  // NEVER true in production\n  migrationsRun: true, // Auto-run pending migrations on startup\n  migrations: ['dist/migrations/*.js'],\n\
    });\n\n// migrations/1706123456789-AddOrderTracking.ts\nexport class AddOrderTracking1706123456789 implements MigrationInterface\
    \ {\n  async up(queryRunner: QueryRunner): Promise<void> {\n    await queryRunner.query(`\n      ALTER TABLE \"orders\"\
    \ ADD COLUMN \"tracking_number\" varchar(50)\n    `);\n    await queryRunner.query(`\n      CREATE INDEX \"IDX_orders_tracking\"\
    \ ON \"orders\" (\"tracking_number\")\n    `);\n  }\n\n  async down(queryRunner: QueryRunner): Promise<void> {\n    await\
    \ queryRunner.query(`DROP INDEX \"IDX_orders_tracking\"`);\n    await queryRunner.query(`ALTER TABLE \"orders\" DROP COLUMN\
    \ \"tracking_number\"`);\n  }\n}\n"
  example_bad: "// WRONG: synchronize: true in production\nTypeOrmModule.forRoot({\n  type: 'postgres',\n  synchronize: true,\
    \  // Drops columns on entity changes!\n  // Developer renames 'firstName' to 'first_name' in entity:\n  // TypeORM drops\
    \ firstName column (with data), creates first_name column (empty)\n})\n"
  when_applies: Any project using NestJS server-side applications, TypeORM, or PostgreSQL databases
  when_not_applies: stateless microservices with no data persistence, pure computation modules
  sources: ["https://docs.nestjs.com/techniques/database", "https://typeorm.io/migrations"]
- id: CR-NEST-008
  text: Use the repository pattern to abstract database access. Never inject TypeORM Repository directly into controllers
    or business services.
  why: Direct Repository injection couples business logic to TypeORM's API — switching databases or adding caching requires
    modifying every consumer. Custom repositories encapsulate query logic, provide meaningful method names, and can be mocked
    in unit tests without TypeORM test utilities.
  how_to_do_right: '1. Create a custom repository class extending Repository<Entity>.

    2. Register via TypeOrmModule.forFeature() and custom provider.

    3. Name methods after business operations, not database operations.

    4. Include select_related-style eager loading in repository methods.

    5. Keep raw query builders inside the repository — never expose them.

    '
  severity: medium
  technologies:
    lang: [typescript]
    framework: [backend, nestjs]
    library: [typeorm]
  domains:
    domain: [architecture]
    concern: [backend]
  example_good: "// orders.repository.ts — encapsulated data access\n@Injectable()\nexport class OrdersRepository {\n  constructor(\n\
    \    @InjectRepository(Order)\n    private readonly repo: Repository<Order>,\n  ) {}\n\n  async findWithDetails(id: string):\
    \ Promise<Order | null> {\n    return this.repo.findOne({\n      where: { id },\n      relations: ['customer', 'items',\
    \ 'items.product'],\n    });\n  }\n\n  async findPendingByCustomer(customerId: string): Promise<Order[]> {\n    return\
    \ this.repo.find({\n      where: { customerId, status: OrderStatus.PENDING },\n      order: { createdAt: 'DESC' },\n \
    \   });\n  }\n\n  async updateStatus(id: string, status: OrderStatus): Promise<void> {\n    await this.repo.update(id,\
    \ { status, updatedAt: new Date() });\n  }\n}\n\n// Service depends on abstraction\n@Injectable()\nexport class OrdersService\
    \ {\n  constructor(private readonly ordersRepo: OrdersRepository) {}\n}\n"
  example_bad: "// Wrong: Repository injected directly into service — tight coupling\n@Injectable()\nexport class OrdersService\
    \ {\n  constructor(\n    @InjectRepository(Order) private repo: Repository<Order>,\n  ) {}\n\n  async findPending(customerId:\
    \ string) {\n    // TypeORM query builder exposed in business logic\n    return this.repo.createQueryBuilder('order')\n\
    \      .leftJoinAndSelect('order.items', 'item')\n      .where('order.customerId = :id', { id: customerId })\n      .andWhere('order.status\
    \ = :status', { status: 'pending' })\n      .getMany();\n    // Same query duplicated across multiple service methods\n\
    \  }\n}\n"
  when_applies: Projects using NestJS server-side applications, TypeORM, or TypeScript projects with static typing
  when_not_applies: small scripts under 100 lines, single-purpose utilities
  sources: ["https://typeorm.io/custom-repository"]
- id: CR-NEST-009
  text: Use Bull (or BullMQ) with Redis for async job processing. Never process long-running tasks in request handlers.
  why: HTTP requests have timeouts (typically 30s). A request handler that sends emails, generates PDFs, or processes payments
    synchronously blocks the worker thread and times out under load. Users see 504 errors while the half-completed operation
    leaves the system in an inconsistent state. Background queues process reliably with retries and dead-letter handling.
  how_to_do_right: '1. Install @nestjs/bull and bull, configure Redis connection.

    2. Create a Queue for each job type (@InjectQueue).

    3. Create a Processor class with @Process() handler.

    4. Add jobs from controllers/services, return immediately.

    5. Configure retries, backoff, and dead-letter queues for reliability.

    '
  severity: high
  technologies:
    framework: [backend, nestjs]
    library: [bull]
    platform: [redis]
  domains:
    domain: [architecture, performance]
    concern: [backend]
  example_good: "// orders.module.ts\n@Module({\n  imports: [\n    BullModule.registerQueue({ name: 'orders' }),\n  ],\n})\n\
    export class OrdersModule {}\n\n// orders.service.ts — enqueue and return immediately\n@Injectable()\nexport class OrdersService\
    \ {\n  constructor(@InjectQueue('orders') private ordersQueue: Queue) {}\n\n  async createOrder(dto: CreateOrderDto):\
    \ Promise<{ orderId: string }> {\n    const order = await this.ordersRepo.save(dto);\n    // Enqueue async processing\
    \ — return immediately\n    await this.ordersQueue.add('process-order', {\n      orderId: order.id,\n    }, {\n      attempts:\
    \ 3,\n      backoff: { type: 'exponential', delay: 1000 },\n      removeOnComplete: 100,\n    });\n    return { orderId:\
    \ order.id }; // 200ms response\n  }\n}\n\n// orders.processor.ts — handles job in background\n@Processor('orders')\n\
    export class OrdersProcessor {\n  @Process('process-order')\n  async handleOrder(job: Job<{ orderId: string }>) {\n  \
    \  const order = await this.ordersRepo.findOne(job.data.orderId);\n    await this.paymentService.charge(order);     //\
    \ 3s\n    await this.emailService.sendConfirmation(order); // 2s\n    await this.inventoryService.reserve(order);    //\
    \ 1s\n  }\n}\n"
  example_bad: "// Wrong: Sync processing in request handler — 6+ second response, timeout risk\n@Post()\nasync create(@Body()\
    \ dto: CreateOrderDto) {\n  const order = await this.ordersRepo.save(dto);\n  await this.paymentService.charge(order);\
    \       // 3s — blocks\n  await this.emailService.sendConfirmation(order); // 2s — blocks\n  await this.inventoryService.reserve(order);\
    \      // 1s — blocks\n  // Total: 6+ seconds — user sees spinner, load balancer may timeout\n  // If email fails at 5s,\
    \ payment was charged but order status is inconsistent\n  return order;\n}\n"
  when_applies: Projects using NestJS server-side applications, Bull, or Redis cache/pub-sub systems
  when_not_applies: small scripts under 100 lines, single-purpose utilities
  sources: ["https://docs.nestjs.com/techniques/queues"]
- id: CR-NEST-010
  text: Use @CacheKey and @CacheTTL with CacheModule for read-heavy endpoints. Invalidate explicitly on writes — never rely
    on TTL alone for consistency.
  why: Without caching, every request hits the database. A product listing page with 100 concurrent users generates 100 identical
    queries per second. TTL-only invalidation means users see stale data for up to TTL seconds after a write. Explicit invalidation
    on writes ensures consistency while caching provides performance.
  how_to_do_right: '1. Register CacheModule with Redis store for distributed caching.

    2. Use @UseInterceptors(CacheInterceptor) on read endpoints.

    3. Inject CACHE_MANAGER and call del() on cache keys after writes.

    4. Use consistent key patterns: entity:id, entity:list:page:N.

    5. Set reasonable TTL (60-300s) as safety net even with explicit invalidation.

    '
  severity: medium
  technologies:
    lang: [typescript]
    framework: [backend, nestjs]
    platform: [redis]
  domains:
    domain: [architecture, performance]
    concern: [backend]
  example_good: "// products.service.ts\n@Injectable()\nexport class ProductsService {\n  constructor(\n    @Inject(CACHE_MANAGER)\
    \ private cacheManager: Cache,\n    private readonly productsRepo: ProductsRepository,\n  ) {}\n\n  async findAll(page:\
    \ number): Promise<Product[]> {\n    const cacheKey = `products:list:page:${page}`;\n    const cached = await this.cacheManager.get<Product[]>(cacheKey);\n\
    \    if (cached) return cached;\n\n    const products = await this.productsRepo.findPaginated(page);\n    await this.cacheManager.set(cacheKey,\
    \ products, 300); // 5 min TTL\n    return products;\n  }\n\n  async update(id: string, dto: UpdateProductDto): Promise<Product>\
    \ {\n    const product = await this.productsRepo.update(id, dto);\n    // Explicit invalidation on write\n    await this.cacheManager.del(`products:${id}`);\n\
    \    await this.cacheManager.del(`products:list:*`); // Invalidate list pages\n    return product;\n  }\n}\n"
  example_bad: "// Wrong: TTL-only caching — stale data after writes\n@Controller('products')\n@UseInterceptors(CacheInterceptor)\n\
    export class ProductsController {\n  @Get()\n  @CacheTTL(3600) // 1 hour cache — price changes invisible for 1 hour!\n\
    \  findAll() {\n    return this.productsService.findAll();\n  }\n\n  @Put(':id')\n  update(@Param('id') id: string, @Body()\
    \ dto: UpdateProductDto) {\n    // Cache not invalidated — old data served for up to 1 hour\n    return this.productsService.update(id,\
    \ dto);\n  }\n}\n"
  when_applies: Projects using NestJS server-side applications, Redis cache/pub-sub systems, or TypeScript projects with static
    typing
  when_not_applies: low-traffic internal tools, admin dashboards, or batch jobs where latency is irrelevant
  sources: ["https://docs.nestjs.com/techniques/caching"]
- id: CR-NEST-011
  text: Use @Throttle() decorator with ThrottlerModule to rate-limit endpoints. Apply different limits per endpoint based
    on sensitivity.
  why: Without rate limiting, a single client can exhaust your server resources with rapid requests. Login endpoints without
    throttling allow brute-force attacks. API endpoints without limits allow abuse and denial of service. Rate limiting is
    the first line of defense against automated attacks.
  how_to_do_right: '1. Register ThrottlerModule globally with default limits.

    2. Use @Throttle() to override limits on sensitive endpoints (login, signup).

    3. Use @SkipThrottle() on health check and public static endpoints.

    4. Store throttle state in Redis for distributed deployments.

    5. Return 429 with Retry-After header for rate-limited requests.

    '
  severity: high
  technologies:
    lang: [typescript]
    framework: [backend, nestjs]
  domains:
    domain: [architecture, security, performance]
    concern: [backend]
  example_good: "// app.module.ts — global rate limit\n@Module({\n  imports: [\n    ThrottlerModule.forRoot([{\n      name:\
    \ 'short',\n      ttl: 1000,   // 1 second window\n      limit: 5,     // 5 requests per second\n    }, {\n      name:\
    \ 'medium',\n      ttl: 60000,  // 1 minute window\n      limit: 100,   // 100 requests per minute\n    }]),\n  ],\n})\n\
    export class AppModule {}\n\n// auth.controller.ts — stricter limits on sensitive endpoints\n@Controller('auth')\nexport\
    \ class AuthController {\n  @Post('login')\n  @Throttle({ short: { limit: 3, ttl: 60000 } })  // 3 attempts per minute\n\
    \  async login(@Body() dto: LoginDto) {\n    return this.authService.login(dto);\n  }\n\n  @Post('forgot-password')\n\
    \  @Throttle({ short: { limit: 1, ttl: 60000 } })  // 1 per minute\n  async forgotPassword(@Body() dto: ForgotPasswordDto)\
    \ {\n    return this.authService.forgotPassword(dto);\n  }\n}\n"
  example_bad: "// Wrong: No rate limiting — open to abuse\n@Controller('auth')\nexport class AuthController {\n  @Post('login')\n\
    \  async login(@Body() dto: LoginDto) {\n    // No rate limit — attacker tries 1000 passwords per second\n    return this.authService.login(dto);\n\
    \  }\n}\n"
  when_applies: Projects using NestJS server-side applications or TypeScript projects with static typing
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities. projects
    not using NestJS or TypeScript
  sources: ["https://docs.nestjs.com/security/rate-limiting"]
- id: CR-NEST-012
  text: Use NestJS microservice transport layers (TCP, Redis, NATS, Kafka) for inter-service communication. Choose the transport
    based on delivery guarantees needed.
  why: HTTP between microservices adds unnecessary overhead (connection setup, headers, serialization) and lacks built-in
    retry, fan-out, and backpressure. Message brokers provide at-least-once delivery, consumer groups, dead-letter queues,
    and event fan-out that HTTP cannot. Choosing the wrong transport leads to lost messages or unbounded memory growth.
  how_to_do_right: '1. Use TCP transport for simple request-response between 2 services.

    2. Use Redis transport for lightweight pub/sub and request-response.

    3. Use NATS for high-throughput, low-latency messaging with request-response.

    4. Use Kafka for ordered, durable event streams with consumer groups.

    5. Create hybrid apps (HTTP + microservice) for services that need both.

    '
  severity: medium
  technologies:
    framework: [backend, nestjs]
    platform: [redis, kafka, nats]
  domains:
    domain: [architecture]
    concern: [backend]
  example_good: "// orders-service/main.ts — hybrid HTTP + microservice\nasync function bootstrap() {\n  const app = await\
    \ NestFactory.create(AppModule);\n\n  // Microservice transport for inter-service events\n  app.connectMicroservice<MicroserviceOptions>({\n\
    \    transport: Transport.REDIS,\n    options: { host: 'localhost', port: 6379 },\n  });\n\n  await app.startAllMicroservices();\n\
    \  await app.listen(3000);\n}\n\n// orders.controller.ts — emit event after order creation\n@Controller('orders')\nexport\
    \ class OrdersController {\n  constructor(@Inject('PAYMENTS_SERVICE') private client: ClientProxy) {}\n\n  @Post()\n \
    \ async create(@Body() dto: CreateOrderDto) {\n    const order = await this.ordersService.create(dto);\n    // Emit event\
    \ — payments service subscribes\n    this.client.emit('order_created', { orderId: order.id, total: order.total });\n \
    \   return order;\n  }\n}\n\n// payments-service/payments.controller.ts — subscribe to events\n@Controller()\nexport class\
    \ PaymentsController {\n  @EventPattern('order_created')\n  async handleOrderCreated(@Payload() data: { orderId: string;\
    \ total: number }) {\n    await this.paymentsService.processPayment(data.orderId, data.total);\n  }\n}\n"
  example_bad: "// Wrong: HTTP calls between microservices — no retry, no fan-out\n@Injectable()\nexport class OrdersService\
    \ {\n  async create(dto: CreateOrderDto) {\n    const order = await this.ordersRepo.save(dto);\n    // HTTP call — if\
    \ payments-service is down, order is created but not charged\n    // No retry, no dead-letter, no event replay\n    await\
    \ axios.post('http://payments-service:3001/process', {\n      orderId: order.id,\n    });\n    return order;\n  }\n}\n"
  when_applies: Projects using NestJS server-side applications, Redis cache/pub-sub systems, Apache Kafka event streaming,
    or NATS
  when_not_applies: small scripts under 100 lines, single-purpose utilities
  sources: ["https://docs.nestjs.com/microservices/basics"]
