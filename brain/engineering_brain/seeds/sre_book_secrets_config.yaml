layer: rules
technology: SRE
domain: security
knowledge:
- id: CR-SRE-SECRET-001
  text: Secrets must never be stored in code, environment variables, or config files committed to version control. Use a secrets
    manager (Vault, AWS Secrets Manager, GCP Secret Manager) with automatic rotation and audit logging. A secret in a git
    commit is compromised forever — even if you delete the commit, it exists in reflog and in clones.
  why: 'Google''s security practices (reflected throughout the SRE Book, particularly Chapter 27 on launches) treat secret
    exposure as a critical incident. Environment variables are better than hardcoded secrets but still problematic: they''re
    visible in /proc/PID/environ, logged by debugging tools, and included in crash dumps. Config files committed to git are
    exposed to every engineer with repo access — and to the public if the repo is ever made public. Google''s approach: secrets
    are fetched at runtime from a secrets manager, never stored locally. The application authenticates to the secrets manager
    using workload identity (not another secret). The secrets manager provides audit logging (who accessed which secret, when),
    automatic rotation, and access control (only authorized services can read specific secrets).

    '
  how_to_do_right: '1. Use a secrets manager: HashiCorp Vault, AWS Secrets Manager, GCP Secret Manager, Azure Key Vault. Never
    store secrets in code or config.

    2. Fetch secrets at runtime, not build time. The application authenticates to the secrets manager and retrieves secrets
    when it starts.

    3. Use workload identity (Kubernetes service accounts, IAM roles for service accounts) — not API keys — to authenticate
    to the secrets manager.

    4. Implement automatic rotation: database passwords, API keys, and tokens should rotate every 30-90 days without manual
    intervention.

    5. Enable audit logging: every secret access is logged with timestamp, accessor identity, and secret name. Review logs
    for unauthorized access.

    6. Scan for leaked secrets: use tools (GitGuardian, TruffleHog, gitleaks) in CI/CD to detect secrets in commits. Block
    the merge if secrets are found.

    '
  example_good: "import boto3\nimport os\n\ndef get_db_credentials() -> dict:\n    \"\"\"Fetch secrets at runtime from AWS Secrets Manager.\"\"\"\n    client = boto3.client('secretsmanager')\n    response = client.get_secret_value(SecretId='prod/database/credentials')\n    secret = json.loads(response['SecretString'])\n    return {\n        'host': secret['host'],\n        'username': secret['username'],\n        'password': secret['password'],\n    }\n    # Secrets fetched at runtime, not stored locally\n    # Access is audited, rotated automatically\n    # Application authenticates via IAM role (no API key needed)\n"
  example_bad: "# secrets.py — committed to git\nDB_PASSWORD = 'super_secret_p@ssw0rd'\nSTRIPE_KEY = 'sk_live_abc123xyz'\nAWS_SECRET = 'AKIAIOSFODNN7EXAMPLE'\n\n# OR slightly better but still bad:\nDB_PASSWORD = os.getenv('DB_PASSWORD')  # Visible in /proc/PID/environ\n# Included in crash dumps, logged by debugging tools\n# No rotation, no audit trail, no access control\n"
  when_applies: "When any application needs to access secrets such as database passwords, API keys, or encryption keys."
  severity: critical
  technologies:
    lang: [general]
    platform: [aws, gcp]
    domain: [kubernetes, vault]
  domains:
    domain: [code_quality, configuration, reliability, security, secrets]
  sources:
  - url: https://sre.google/sre-book/reliable-product-launches/
    title: 'Google SRE Book — Chapter 27: Reliable Product Launches at Scale'
  validation_status: cross_checked
- id: CR-SRE-SECRET-002
  text: Secret rotation must be zero-downtime — the system must support two valid secrets simultaneously during the rotation
    window. If rotation requires a restart or a brief outage, it won't be done regularly enough, and compromised secrets will
    remain active for months.
  why: 'Google''s operational principle for secrets: rotation must be so easy that it happens automatically. The typical rotation
    failure: a database password needs rotation. Rotating requires: update the password in the secrets manager, update the
    database, restart all application instances. This takes 30+ minutes and causes brief unavailability. Teams delay rotation
    because it''s painful. Passwords remain unchanged for years. When a compromise is detected, rotation takes hours under
    incident pressure. Google''s solution: dual-credential support. The application accepts both the old and new secret simultaneously.
    Rotation sequence: (1) generate new secret, (2) add new secret to the application (both old and new work), (3) update
    all consumers to use the new secret, (4) remove the old secret. No restarts, no downtime.

    '
  how_to_do_right: '1. Design systems to accept multiple valid credentials simultaneously: two database passwords, two API
    keys, two JWT signing keys.

    2. Rotation sequence: generate new → add new alongside old → switch consumers to new → remove old. Never remove old before
    consumers switch.

    3. Use grace periods: after generating a new secret, keep the old one valid for 24-72 hours (the "dual validity window").

    4. Automate rotation: secrets manager generates new credentials, updates the database/service, and applications fetch
    the new credential on next refresh.

    5. Set secret refresh interval in the application: check for new secrets every 5-15 minutes. This determines how quickly
    a rotation propagates.

    6. Test rotation regularly: rotate a non-production secret every week to verify the process works. If rotation fails in
    staging, it will fail in production.

    '
  example_good: "import jwt\nimport time\n\nclass DualKeyVerifier:\n    \"\"\"Accept both old and new signing keys during rotation.\"\"\"\n    def __init__(self, current_key: str, previous_key: str | None = None):\n        self.keys = [current_key]\n        if previous_key:\n            self.keys.append(previous_key)\n\n    def verify_token(self, token: str) -> dict:\n        for key in self.keys:\n            try:\n                return jwt.decode(token, key, algorithms=['HS256'])\n            except jwt.InvalidSignatureError:\n                continue\n        raise jwt.InvalidSignatureError('No valid key found')\n\n# Rotation: generate new key -> add both -> switch signers -> remove old\n# Zero downtime: both keys accepted during rotation window\n"
  example_bad: "import jwt\n\n# Single key, no dual-credential support\nSECRET_KEY = get_secret('jwt_signing_key')\n\ndef verify_token(token: str) -> dict:\n    return jwt.decode(token, SECRET_KEY, algorithms=['HS256'])\n\n# Rotation requires:\n# 1. Update secret in vault\n# 2. Restart ALL application instances simultaneously\n# 3. During restart: tokens signed with old key fail\n# 4. Users get 401 errors during rotation window\n# Result: team avoids rotation -> key unchanged for 2 years\n"
  when_applies: "When implementing secret rotation for any credential that needs to change without causing downtime."
  severity: high
  technologies:
    lang: [general]
    platform: [aws]
    domain: [vault]
  domains:
    domain: [operations, reliability, security, secrets]
  sources:
  - url: https://sre.google/sre-book/reliable-product-launches/
    title: 'Google SRE Book — Chapter 27: Reliable Product Launches at Scale'
  validation_status: cross_checked
- id: CR-SRE-SECRET-003
  text: Least privilege for service-to-service authentication — each service should have credentials that grant access to
    exactly the resources it needs, nothing more. A single "admin" credential shared across services means that compromising
    any one service compromises everything.
  why: 'Google''s security model (referenced in Chapter 27) implements the principle of least privilege for service credentials.
    The anti-pattern: all services share a single database credential with full read/write access. If any service is compromised,
    the attacker has full database access — including tables the compromised service never uses. Google''s approach: each
    service has its own credential with permissions limited to the exact tables, operations, and data it needs. The payment
    service can read/write the payments table but cannot read the users table. The analytics service can read all tables but
    cannot write to any. This containment limits the blast radius of any individual compromise.

    '
  how_to_do_right: '1. One credential per service: payment-service has its own database user, analytics-service has its own.
    No shared credentials.

    2. Minimum required permissions: if the service only reads from table X, grant SELECT on X only. Not SELECT on all tables.

    3. Use IAM roles for cloud resources: S3 bucket access, SQS queue access, DynamoDB table access — each service gets exactly
    what it needs.

    4. Audit permissions quarterly: review what each service credential can do. Remove permissions that are no longer needed.

    5. Use network-level restrictions alongside credential restrictions: the payment service can only connect to the payments
    database, not the analytics database.

    6. Implement credential usage monitoring: if the analytics service suddenly writes to the payments table, that''s an anomaly
    worth investigating.

    '
  example_good: "-- Per-service database credentials with minimum privileges\n-- Payment service: read/write only payments table\nCREATE USER payment_svc WITH PASSWORD 'rotated_secret';\nGRANT SELECT, INSERT, UPDATE ON payments TO payment_svc;\n-- Cannot read users, orders, or any other table\n\n-- Analytics service: read-only access to specific tables\nCREATE USER analytics_svc WITH PASSWORD 'rotated_secret';\nGRANT SELECT ON payments, orders, products TO analytics_svc;\n-- Cannot write to any table\n-- Cannot read users table (contains PII)\n"
  example_bad: "-- Single shared credential with full access\nCREATE USER app_user WITH PASSWORD 'shared_password' SUPERUSER;\n-- Every service uses 'app_user' to connect\n-- Payment service can read user passwords\n-- Analytics service can delete orders\n-- If ANY service is compromised, attacker has FULL access\n-- No audit trail: all queries come from 'app_user'\n"
  when_applies: "When configuring service-to-service authentication and database access credentials in a multi-service architecture."
  severity: high
  technologies:
    lang: [general]
    platform: [aws, iam, gcp, postgresql]
    domain: [kubernetes]
  domains:
    domain: [reliability, security, authentication, authorization, secrets]
  sources:
  - url: https://sre.google/sre-book/reliable-product-launches/
    title: 'Google SRE Book — Chapter 27: Reliable Product Launches at Scale'
  validation_status: cross_checked
- id: CR-SRE-SECRET-004
  text: Configuration drift detection — periodically compare actual running configuration with desired configuration (stored
    in version control). Any drift indicates either an unauthorized change or a deployment failure. Both are serious.
  why: 'Google''s release engineering (Chapter 8) mandates that running systems match their declared configuration at all
    times. Configuration drift occurs when: someone makes a manual change ("quick fix" in production), a deployment partially
    fails (3 of 5 instances updated, 2 still running old config), a configuration management tool fails silently, or an automated
    process overrides a manual change. Drift is invisible until it causes a failure — and the failure is confusing because
    the code looks correct (matching the desired config) but the running system behaves differently. Google detects drift
    by periodically scanning running systems and comparing against the version-controlled configuration.

    '
  how_to_do_right: '1. Store ALL configuration in version control. If it''s not in git, it doesn''t exist as a declared configuration.

    2. Run periodic drift detection: compare running config (kubectl get, terraform plan, consul catalog) with version-controlled
    config.

    3. Alert on drift: "Instance X running config version 2024-01-15, desired version is 2024-01-20" — investigate within
    1 hour.

    4. Treat manual changes as incidents: if someone changed a config manually, create an incident, determine why, and codify
    the change in version control.

    5. Use immutable infrastructure to prevent drift: don''t allow in-place updates. Replace instances with new ones from
    the desired config.

    6. Track drift metrics: how often does drift occur, how long until it''s detected, how long until it''s resolved. Trend
    should be improving.

    '
  example_good: "import subprocess\nimport json\nimport logging\n\nlogger = logging.getLogger(__name__)\n\ndef detect_config_drift(namespace: str = 'production') -> list[dict]:\n    \"\"\"Compare running config against desired config in git.\"\"\"\n    drifts = []\n    # Get running config\n    result = subprocess.run(\n        ['kubectl', 'get', 'configmap', '-n', namespace, '-o', 'json'],\n        capture_output=True, text=True\n    )\n    running = json.loads(result.stdout)\n    # Compare against version-controlled config\n    for cm in running['items']:\n        desired = load_from_git(cm['metadata']['name'])\n        if cm['data'] != desired:\n            drifts.append({\n                'resource': cm['metadata']['name'],\n                'type': 'configmap',\n                'running': cm['data'],\n                'desired': desired\n            })\n            logger.warning(\"Config drift detected: %s\", cm['metadata']['name'])\n    return drifts\n"
  example_bad: "# No drift detection\n# Manual changes accumulate over months:\n#   - Engineer A edited a config in production \"temporarily\"\n#   - Engineer B added an env var via kubectl set env\n#   - Engineer C changed a resource limit during an incident\n# None of these changes are in version control\n# Next deploy from git overwrites all manual changes\n# Service breaks because the manual changes were load-bearing\n# Nobody knows what the correct configuration should be\n"
  when_applies: "When operating infrastructure where running configuration may diverge from the declared desired state in version control."
  severity: medium
  technologies:
    lang: [general]
    platform: [terraform]
    domain: [kubernetes, networking]
  domains:
    domain: [code_quality, configuration, operations, deployment, monitoring, reliability, security, secrets]
  sources:
  - url: https://sre.google/sre-book/release-engineering/
    title: 'Google SRE Book — Chapter 8: Release Engineering'
  validation_status: cross_checked
- id: CR-SRE-SECRET-005
  text: Feature flags, environment variables, and configuration values must be validated at application startup — not at first
    use. If the DATABASE_URL is missing, the application should fail immediately with a clear error, not start successfully
    and crash on the first database query 30 minutes later.
  why: 'Google''s release engineering (Chapter 8) advocates fail-fast startup validation because delayed configuration errors
    are expensive to diagnose. The delayed failure pattern: application starts, passes health checks, receives traffic, runs
    for 30 minutes, then a code path that reads PAYMENT_API_KEY runs for the first time → the key is missing → crash. Now
    you have: a production incident (service down), a rollback in progress, and a confused team ("but it passed health checks!").
    The fast failure pattern: application starts, validates ALL required configuration in the first 5 seconds, finds PAYMENT_API_KEY
    is missing → refuses to start → deployment fails → old version continues serving → no production impact. The bug is caught
    before deployment completes.

    '
  how_to_do_right: '1. Validate ALL required config at startup: check that every required environment variable, config key,
    and feature flag is present and valid.

    2. Type-validate config values: DATABASE_URL must be a valid URL, PORT must be an integer 1-65535, LOG_LEVEL must be one
    of DEBUG/INFO/WARNING/ERROR.

    3. Fail with a clear error message: "FATAL: Required environment variable PAYMENT_API_KEY is not set" — not "NoneType
    has no attribute ''encode''."

    4. Use a config validation library (Pydantic Settings, dynaconf, python-decouple) that validates types and provides clear
    errors.

    5. Validate at startup, not at import time: module-level validation runs during import and can produce confusing error
    messages. Use an explicit init() function.

    6. Test with missing config: run the application without each required config value and verify it fails fast with a clear
    error message.

    '
  example_good: "from pydantic_settings import BaseSettings\nfrom pydantic import Field, AnyUrl\nfrom typing import Literal\n\nclass AppConfig(BaseSettings):\n    database_url: AnyUrl\n    redis_url: AnyUrl\n    log_level: Literal['DEBUG', 'INFO', 'WARNING', 'ERROR'] = 'INFO'\n    port: int = Field(ge=1, le=65535, default=8000)\n    payment_api_key: str = Field(min_length=10)\n\n    class Config:\n        env_file = '.env'\n\n# Validate ALL config at startup — fail fast with clear errors\ntry:\n    config = AppConfig()\nexcept ValidationError as e:\n    print(f\"FATAL: Invalid configuration:\\n{e}\")\n    sys.exit(1)\n# If PAYMENT_API_KEY is missing: clear error at startup\n# Not a NoneType crash 30 minutes later on first payment\n"
  example_bad: "import os\n\n# No validation at startup — errors surface at first use\nDATABASE_URL = os.getenv('DATABASE_URL')  # Could be None\nPAYMENT_KEY = os.getenv('PAYMENT_API_KEY')  # Could be None\nPORT = os.getenv('PORT')  # Could be string 'abc'\n\n# Application starts successfully, passes health checks\n# 30 minutes later, first payment request:\n#   PAYMENT_KEY is None -> AttributeError: 'NoneType' has no attribute 'encode'\n# Now you have a production incident that could have been caught at startup\n"
  when_applies: "When any application reads configuration from environment variables, config files, or feature flags at startup."
  severity: high
  technologies:
    lang: [general, go, java]
    domain: [python]
  domains:
    domain: [architecture, api_design, validation, code_quality, configuration, operations, deployment, reliability, security, secrets]
  sources:
  - url: https://sre.google/sre-book/release-engineering/
    title: 'Google SRE Book — Chapter 8: Release Engineering'
  validation_status: cross_checked
- id: CR-SRE-SECRET-006
  text: Sensitive data in logs is a compliance and security failure — log redaction must be applied to all log output before
    it reaches the log aggregator. PII, secrets, tokens, credit card numbers, and passwords in logs are discoverable by anyone
    with log access.
  why: 'Google''s security practices treat log data as semi-public: logs are accessed by on-call engineers, debugging tools,
    automated analysis, and sometimes third-party log aggregation services. Any sensitive data in logs is accessible to all
    these consumers. Common violations: logging the full HTTP request (which includes Authorization headers with bearer tokens),
    logging user input (which may include passwords in login endpoints), logging database queries (which may include PII in
    WHERE clauses), and logging API responses (which may include sensitive user data). Google applies log redaction at the
    source: sensitive fields are replaced with "[REDACTED]" before the log message is emitted.

    '
  how_to_do_right: '1. Identify sensitive fields: passwords, tokens, API keys, credit card numbers, SSN, email addresses,
    phone numbers, IP addresses (PII).

    2. Apply redaction at the log source: before calling logger.info(), sanitize the data. Don''t rely on log pipeline redaction
    (it can be bypassed).

    3. Use structured logging with field-level redaction: log {"user_id": 123, "email": "[REDACTED]", "action": "login"} —
    not free-text strings.

    4. Never log request/response bodies for authentication endpoints. Log only the metadata: method, path, status code, duration.

    5. Audit logs for PII: periodically scan recent logs for patterns matching email addresses, credit card numbers, tokens.
    Flag and fix any leaks.

    6. Set log retention policies: PII-containing logs should have shorter retention (30 days) than operational logs (90 days)
    per GDPR/CCPA requirements.

    '
  example_good: "import structlog\nimport re\n\nSENSITIVE_PATTERNS = [\n    (re.compile(r'Bearer\\s+[A-Za-z0-9._-]+'), 'Bearer [REDACTED]'),\n    (re.compile(r'\\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Z]{2,}\\b', re.I), '[EMAIL_REDACTED]'),\n    (re.compile(r'\\b\\d{4}[- ]?\\d{4}[- ]?\\d{4}[- ]?\\d{4}\\b'), '[CC_REDACTED]'),\n]\n\ndef redact(value: str) -> str:\n    for pattern, replacement in SENSITIVE_PATTERNS:\n        value = pattern.sub(replacement, value)\n    return value\n\nlogger = structlog.get_logger()\n\ndef log_request(method: str, path: str, status: int, duration_ms: float):\n    logger.info(\"http_request\",\n        method=method, path=path, status=status,\n        duration_ms=duration_ms)\n    # Only metadata logged — no request body, no auth headers\n"
  example_bad: "import logging\n\nlogger = logging.getLogger(__name__)\n\ndef handle_login(request):\n    logger.info(f\"Login attempt: {request.json()}\")\n    # Logs the full request body including password!\n    # {\"username\": \"alice\", \"password\": \"hunter2\"}\n\ndef handle_api_call(request):\n    logger.debug(f\"Headers: {dict(request.headers)}\")\n    # Logs Authorization: Bearer sk_live_abc123...\n    # Token is now in log files, accessible to anyone with log access\n\ndef handle_payment(user, card):\n    logger.info(f\"Processing payment for {user.email} card {card.number}\")\n    # PII + credit card number in logs — compliance violation\n"
  when_applies: "When logging any data that may contain PII, secrets, tokens, or other sensitive information."
  severity: high
  technologies:
    lang: [general, go]
    domain: [python]
  domains:
    domain: [logging, reliability, security, audit, compliance, secrets]
  sources:
  - url: https://sre.google/sre-book/monitoring-distributed-systems/
    title: 'Google SRE Book — Chapter 6: Monitoring Distributed Systems'
  validation_status: cross_checked
