- id: CR-SRE-CASCADE-002
  text: Server overload from cascading failures manifests as resource exhaustion — CPU, memory, threads, file descriptors, or downstream connections. The FIRST resource to saturate determines the failure
    mode, and it is almost never the one you expect.
  why: 'Google catalogs the specific resources that saturate during cascading failures because the failure mode depends on which resource runs out first. CPU saturation causes increased latency (requests
    queue), which causes client timeouts and retries, which increases CPU demand further. Memory saturation causes garbage collection storms (Go/Java), OOM kills, or thrashing. Thread pool exhaustion causes
    requests to queue indefinitely. File descriptor exhaustion prevents new connections. Downstream connection pool exhaustion blocks all requests waiting for a connection. Each has different symptoms and
    different mitigations. The critical insight: engineers often provision for CPU and memory but forget about threads, file descriptors, and connection pools — so these "secondary" resources saturate first,
    with confusing symptoms (the CPU and memory dashboards look fine while the service is completely unresponsive).

    '
  how_to_do_right: '1. Monitor ALL scarce resources, not just CPU and memory: thread pool utilization, file descriptors, connection pool usage, queue depth.

    2. Set alarms at 70% utilization for each resource. At 70%, you have time to react. At 90%, you don''t.

    3. Set hard limits on each resource: max threads, max connections, max queue depth. Prefer rejection over exhaustion.

    4. Profile under load: at 80% CPU, what''s the thread pool utilization? The file descriptor count? Know the cascade order.

    5. Use bulkheads: separate connection pools for different downstream services so that one slow service doesn''t exhaust all connections.

    6. In Kubernetes, set resource requests AND limits for CPU and memory. Set connection pool sizes in application config. Don''t rely on defaults.

    '
  example_good: "# Monitor ALL scarce resources with bulkheads\nimport psutil\nfrom concurrent.futures import ThreadPoolExecutor\n\nclass ResourceMonitor:\n    THRESHOLDS = {\n        \"cpu_percent\": 70,\n        \"memory_percent\": 70,\n        \"thread_pool_percent\": 70,\n        \"connection_pool_percent\": 70,\n        \"file_descriptors_percent\": 70,\n    }\n\n    def check_all(self) -> dict[str, float]:\n        return {\n            \"cpu_percent\": psutil.cpu_percent(),\n            \"memory_percent\": psutil.virtual_memory().percent,\n            \"thread_pool_percent\": self.thread_pool_usage(),\n            \"connection_pool_percent\": self.conn_pool_usage(),\n            \"file_descriptors_percent\": self.fd_usage(),\n        }\n\n    def alert_on_saturation(self):\n        for resource, value in self.check_all().items():\n            if value > self.THRESHOLDS[resource]:\n                alert(f\"{resource} at {value:.0f}% — approaching saturation\")\n\n# Bulkhead: separate connection pools per downstream\ndb_pool = ConnectionPool(max_size=20)      # DB gets 20 connections\ncache_pool = ConnectionPool(max_size=10)   # Cache gets 10\napi_pool = ConnectionPool(max_size=10)     # External API gets 10\n"
  example_bad: "# Only monitor CPU and memory — miss secondary resource exhaustion\ndef health_check():\n    cpu = psutil.cpu_percent()\n    mem = psutil.virtual_memory().percent\n    if cpu < 80 and mem < 80:\n        return \"healthy\"  # CPU and memory look fine!\n    # But: thread pool is 100% utilized → requests queue indefinitely\n    # But: file descriptors exhausted → can't accept new connections\n    # But: DB connection pool full → all requests blocked waiting\n    # Dashboard shows green while service is completely unresponsive\n"
  when_applies: When operating services where cascading failures can be triggered by exhaustion of secondary resources like thread pools, file descriptors, or connection pools that are not typically monitored.
  severity: critical
  technologies:
    lang: [general, go, java, python]
    platform: [kubernetes]
  domains:
    domain: [architecture, reliability]
    concern: [distributed_systems, fault_tolerance, circuit_breaker, resilience]
  sources:
