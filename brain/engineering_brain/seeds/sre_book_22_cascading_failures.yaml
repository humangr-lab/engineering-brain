- id: CR-SRE-CASCADE-001
  text: Cascading failures start when one component fails and its load shifts to surviving components, which then also fail under the increased load. The pattern is self-reinforcing — each failure increases
    load on survivors, causing more failures. Without circuit breakers and load shedding, a single server failure can take down the entire fleet.
  why: 'Google''s Chapter 22 on Cascading Failures describes the most dangerous failure mode in distributed systems. The sequence: a cluster of 10 servers handles 10,000 RPS (1,000 each). One server dies.
    The remaining 9 must handle 10,000 RPS (1,111 each — 11% increase). This pushes 2 servers past their capacity threshold and they crash. Now 7 servers handle 10,000 RPS (1,429 each — 43% increase from
    original). More crash. Within minutes, all servers are down, serving 0 RPS. The original failure (one server) was survivable — the cascade was not. This pattern is universal: it happens with servers,
    threads, database connections, memory, and any shared resource where failure shifts load to survivors.

    '
  how_to_do_right: '1. Provision capacity so that N-2 servers can handle peak load (not N-1 — because failures cascade).

    2. Set per-server request limits. When a server reaches its limit, it rejects new requests rather than degrading and crashing.

    3. Implement circuit breakers between services: if downstream is failing, stop sending requests and fail fast.

    4. Use load shedding: when total cluster utilization > 80%, start rejecting low-priority requests.

    5. Test cascade scenarios: kill 2 of 5 servers and verify the remaining 3 survive without cascading.

    6. Never autoscale DOWN during an incident. Removing capacity during elevated load accelerates the cascade.

    '
  example_good: "# N-2 capacity provisioning with per-server request limits\nclass ClusterCapacityPlanner:\n    def validate_capacity(self, cluster: Cluster):\n        peak_rps = cluster.peak_rps\n        n = cluster.instance_count\n        # N-2 capacity: can lose 2 instances and still serve peak\n        per_instance_capacity = peak_rps / (n - 2)\n        for instance in cluster.instances:\n            instance.max_concurrent_requests = int(per_instance_capacity * 1.1)\n            log.info(\n                f\"{instance.id}: max_concurrent={instance.max_concurrent_requests}\"\n            )\n        if n < 4:\n            log.warning(f\"Cluster {cluster.name} has < 4 instances — cannot tolerate N-2\")\n\n    def test_cascade_resilience(self, cluster: Cluster):\n        \"\"\"Kill 2 of N instances and verify survivors handle load.\"\"\"\n        victims = random.sample(cluster.instances, 2)\n        for v in victims:\n            v.stop()\n        assert cluster.is_serving_all_traffic(), \"Cascade detected!\"\n"
  example_bad: "# No per-server limits, no cascade protection\nclass Cluster:\n    def __init__(self, instances, peak_rps):\n        self.instances = instances\n        # Provisioned for exactly peak load — 0% headroom\n        # If 1 instance dies: remaining are at 110% → cascade starts\n        # No per-server request limits\n        # No circuit breakers between services\n        # One failure takes down the entire fleet in minutes\n"
  when_applies: When provisioning capacity for clustered services where the failure of one or more instances shifts load to survivors and risks triggering a cascading failure.
  severity: critical
  technologies:
    lang: [general]
    platform: [cloud, kubernetes]
  domains:
    domain: [architecture, reliability]
    concern: [distributed_systems, fault_tolerance, circuit_breaker, resilience]
  sources:
