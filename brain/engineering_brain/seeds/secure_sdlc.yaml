layer: rules
technology: General
domain: security
knowledge:
- id: SSDLC-001
  text: Adopt a Secure SDLC framework (Microsoft SDL, OWASP SAMM, or BSIMM) and measure maturity quarterly — ad-hoc
    security bolted on at the end catches only 5-15% of vulnerabilities versus 60-85% when security is embedded in every
    phase.
  why: >
    Without a structured Secure SDLC framework, security activities are ad-hoc, inconsistent, and reactive. Microsoft
    SDL (prescriptive, 12 practices) embeds security requirements, threat modeling, static analysis, and verification into
    every development phase. OWASP SAMM 2.0 (descriptive, 5 business functions, 15 practices, 3 maturity levels) lets
    you assess and incrementally improve. BSIMM 14 (data-driven, 4 domains, 12 practices, 125 activities) benchmarks
    your program against 130+ real organizations. The Ponemon 2024 Cost of a Data Breach report shows organizations with
    mature SDL programs have $1.68M lower average breach cost. SWEBOK v4.0 (released Oct 2024) added Software Security
    as a dedicated Knowledge Area, recognizing secure development as a core engineering discipline rather than an add-on.
  how_to_do_right: |
    1. Choose a framework based on org maturity: Microsoft SDL for prescriptive guidance, OWASP SAMM for self-assessment,
       BSIMM for benchmarking against industry.
    2. Conduct initial maturity assessment using OWASP SAMM toolbox or BSIMM assessment.
    3. Set quarterly improvement targets (e.g., move from SAMM Level 1 to Level 2 in Threat Assessment).
    4. Map framework practices to your SDLC phases: Requirements -> Threat Modeling, Design -> Architecture Risk Analysis,
       Implementation -> Secure Coding + SAST, Verification -> DAST + Pen Test, Release -> Security Sign-off.
    5. Track metrics: vulnerabilities found per phase, mean time to remediate, security debt backlog size.
    6. Review and recalibrate targets every quarter based on metrics.
  severity: critical
  technologies:
    platform: [any]
  domains:
    domain: [security, governance]
    concern: [sdlc, maturity]
  example_good: |
    # OWASP SAMM Assessment Score (samm-assessment.yaml)
    # Tracked in version control, reviewed quarterly
    assessment:
      date: "2025-Q4"
      business_functions:
        governance:
          strategy_and_metrics: 2.1    # Target: 2.5 by Q1-2026
          policy_and_compliance: 1.8   # Target: 2.0 by Q1-2026
          education_and_guidance: 2.3
        design:
          threat_assessment: 2.5       # Achieved target
          security_requirements: 1.5   # Gap: needs ASVS integration
          security_architecture: 2.0
        implementation:
          secure_build: 2.8            # Strong: SAST in CI/CD
          secure_deployment: 2.2
          defect_management: 1.9
        verification:
          architecture_assessment: 1.5 # Gap: no ATAM reviews yet
          requirements_testing: 2.0
          security_testing: 2.5        # DAST + annual pentest
        operations:
          incident_management: 2.0
          environment_management: 1.8
          operational_management: 2.1
      overall_score: 2.05
      target_score: 2.5
      next_review: "2026-Q1"
  example_bad: |
    # No framework, no measurement, ad-hoc security
    # "We'll add security before release"
    # Security review happens 2 days before go-live
    # No baseline, no targets, no tracking
    # Each team does security differently (or not at all)
    # Result: critical vulnerabilities found in production
    # Cost: 10x more to fix in production vs design phase
  when_applies: Any organization developing software, regardless of size or industry
  when_not_applies: Throwaway prototypes with no production deployment and no user data
  sources:
    - "https://www.microsoft.com/en-us/securityengineering/sdl/practices"
    - "https://owaspsamm.org/model/"
    - "https://www.blackduck.com/services/security-program/bsimm-maturity-model.html"
    - "https://www.computer.org/education/bodies-of-knowledge/software-engineering"

- id: SSDLC-002
  text: Derive security requirements systematically from threat models, abuse cases, and OWASP ASVS — never rely solely
    on functional requirements to capture security needs.
  why: >
    Functional requirements describe what the system should do; security requirements describe what the system must NOT
    allow. Without systematic derivation, critical requirements like "session tokens must expire after 30 minutes of
    inactivity" or "failed login attempts must be rate-limited to 5 per minute" are missed entirely. OWASP ASVS 4.0
    provides 286 concrete, testable security requirements across 14 categories. Threat models (using STRIDE, PASTA, or
    Attack Trees) surface requirements specific to your architecture. Abuse cases (misuse cases) capture attacker
    perspectives that functional requirements never consider.
  how_to_do_right: |
    1. Start with OWASP ASVS Level 2 as a baseline (recommended for most applications).
    2. Create a threat model (STRIDE per element) for each major feature or component.
    3. For each threat identified, derive a concrete, testable security requirement.
    4. Write abuse cases for critical user stories: "As an attacker, I want to..."
    5. Map requirements to ASVS categories for traceability.
    6. Include security requirements in the Definition of Done for user stories.
    7. Review and update security requirements when architecture changes.
  severity: critical
  technologies:
    platform: [any]
  domains:
    domain: [security, requirements]
    concern: [threat_modeling, requirements_engineering]
  example_good: |
    # Security requirements derived from threat model + ASVS
    # File: docs/security/auth-security-requirements.md

    ## Feature: User Authentication
    ### Threat Model: STRIDE Analysis
    | Threat           | Category    | Mitigation Requirement          | ASVS Ref |
    |------------------|-------------|--------------------------------|----------|
    | Credential stuff | Spoofing    | Rate limit: 5 attempts/min     | V2.2.1   |
    | Session hijack   | Spoofing    | Bind session to IP+UA hash     | V3.7.1   |
    | Token theft      | Tampering   | HTTP-only, Secure, SameSite    | V3.4.2   |
    | Brute force      | Spoofing    | Account lockout after 10 fails | V2.2.3   |
    | Credential leak  | Info Disc   | Argon2id with t=3,m=64MB,p=1  | V2.4.4   |

    ### Abuse Cases
    - AC-001: Attacker enumerates valid usernames via login error messages
      Requirement: Generic error "Invalid credentials" for both cases
    - AC-002: Attacker replays stolen session token from another device
      Requirement: Session bound to device fingerprint, re-auth on change

    ### Acceptance Criteria (testable)
    - [ ] Login returns HTTP 429 after 5 failed attempts within 60 seconds
    - [ ] Session cookie has HttpOnly, Secure, SameSite=Strict flags
    - [ ] Password stored as Argon2id hash (verify with hash prefix $argon2id$)
    - [ ] Error message identical for wrong username and wrong password
  example_bad: |
    # User Story: "As a user, I want to log in with email and password"
    # Acceptance Criteria:
    # - User can log in with valid credentials
    # - User sees error message with invalid credentials
    #
    # Missing: rate limiting, session security, password hashing algo,
    # brute force protection, credential enumeration prevention,
    # session binding, token expiry, MFA consideration...
    # These are discovered only after a penetration test (or breach)
  when_applies: Any application with authentication, authorization, or user data
  when_not_applies: Static sites with no user interaction or data processing
  sources:
    - "https://owasp.org/www-project-application-security-verification-standard/"
    - "https://owasp.org/www-community/Threat_Modeling"
    - "https://cheatsheetseries.owasp.org/cheatsheets/Abuse_Case_Cheat_Sheet.html"

- id: SSDLC-003
  text: Enforce secure coding standards (SEI CERT for C/C++/Java, OWASP Secure Coding Practices for web) with automated
    tooling — manual adherence alone achieves less than 40% compliance.
  why: >
    Secure coding standards codify decades of vulnerability research into actionable rules. SEI CERT standards (developed
    by 1,900+ contributors) define 300+ rules for C, C++, and Java covering memory safety, integer overflow, concurrency,
    input validation, and error handling. OWASP Secure Coding Practices checklist covers 10 categories with 80+ practices.
    Without automated enforcement, developers forget or skip rules under deadline pressure. Static analysis tools (CodeQL,
    Semgrep, SonarQube) can enforce 70-90% of these rules automatically, catching buffer overflows, SQL injection, XSS,
    and insecure deserialization at commit time rather than in production.
  how_to_do_right: |
    1. Select standards appropriate to your stack: CERT C/C++ for native, CERT Java for JVM, OWASP SCP for web.
    2. Configure SAST tools to enforce the selected standard (CodeQL with CERT queries, Semgrep with OWASP rulesets).
    3. Run in CI/CD as a blocking gate -- no merge if critical/high findings.
    4. Allow developer-level suppressions with mandatory justification comment.
    5. Track suppression rate -- >5% suppression rate signals standard is too strict or tooling has false positives.
    6. Conduct quarterly review of findings to update rules and fix false positives.
  severity: high
  technologies:
    library: [codeql, semgrep, sonarqube]
    platform: [any]
  domains:
    domain: [security, code_quality]
    concern: [secure_coding, static_analysis]
  example_good: |
    # .github/workflows/sast.yml -- Enforce CERT + OWASP standards
    name: SAST Security Gate
    on:
      pull_request:
        branches: [main]
    jobs:
      semgrep:
        runs-on: ubuntu-22.04
        steps:
          - uses: actions/checkout@v4
          - name: Run Semgrep with OWASP + CERT rules
            uses: semgrep/semgrep-action@v1
            with:
              config: >-
                p/owasp-top-ten
                p/cwe-top-25
                p/jwt
                p/sql-injection
                p/xss
              generateSarif: true
            env:
              SEMGREP_RULES: >-
                p/owasp-top-ten
                p/cwe-top-25
          - name: Upload SARIF
            uses: github/codeql-action/upload-sarif@v3
            with:
              sarif_file: semgrep.sarif

      codeql:
        runs-on: ubuntu-22.04
        permissions:
          security-events: write
        steps:
          - uses: actions/checkout@v4
          - uses: github/codeql-action/init@v3
            with:
              languages: python
              queries: security-extended
          - uses: github/codeql-action/analyze@v3
  example_bad: |
    # "We follow secure coding practices" (no tooling, no enforcement)
    # Developer writes:
    import subprocess
    def run_command(user_input):
        # CERT STR02-C / CWE-78: OS Command Injection
        result = subprocess.run(
            f"ls {user_input}",  # Unsanitized user input in shell command
            shell=True,          # shell=True enables injection
            capture_output=True
        )
        return result.stdout

    # No SAST tool catches this before merge
    # Discovered 6 months later in a penetration test
  when_applies: Any codebase in C, C++, Java, Python, JavaScript, TypeScript, Go, or Rust
  when_not_applies: Throwaway scripts with no user input and no network exposure
  sources:
    - "https://wiki.sei.cmu.edu/confluence/display/seccode/SEI+CERT+Coding+Standards"
    - "https://owasp.org/www-project-secure-coding-practices-quick-reference-guide/"
    - "https://codeql.github.com/docs/writing-codeql-queries/about-codeql-queries/"

- id: SSDLC-004
  text: Implement security gates at every CI/CD stage -- SAST at commit, SCA at build, DAST at staging, secrets scanning
    pre-commit, and license compliance at dependency resolution.
  why: >
    Each security tool type catches different vulnerability classes at different stages. SAST catches code-level flaws
    like injection and XSS at commit time when fixes are cheapest. SCA catches known CVEs in dependencies at build time
    -- 80% of modern application code is third-party. DAST catches runtime flaws like authentication bypass and CORS
    misconfigurations that SAST cannot see. Secrets scanning prevents credentials from entering version control. License
    compliance prevents legal liability from GPL-infected transitive dependencies. Without stage-appropriate gates,
    vulnerabilities pass through to production.
  how_to_do_right: |
    1. Pre-commit: secrets scanning (gitleaks, trufflehog) -- block commits with secrets.
    2. PR/commit: SAST (Semgrep, CodeQL) -- block merge on critical/high findings.
    3. Build: SCA (Dependabot, Snyk, Trivy) -- block build on critical CVEs.
    4. Build: License compliance (FOSSA, Licensee) -- block on GPL in proprietary code.
    5. Container build: Image scanning (Trivy, Grype) -- block on critical OS-level CVEs.
    6. Staging: DAST (ZAP, Burp) -- automated scan against staging environment.
    7. Production: Runtime protection (WAF, RASP) -- detect and block active attacks.
    8. Define SLAs: critical blocks deploy, high has 7-day fix window.
  severity: critical
  technologies:
    library: [semgrep, codeql, trivy, gitleaks, snyk, zap]
    platform: [github_actions, gitlab_ci]
  domains:
    domain: [security, devops]
    concern: [ci_cd, devsecops]
  example_good: |
    # .github/workflows/security-pipeline.yml
    name: Security Gates
    on:
      pull_request:
        branches: [main]
    jobs:
      secrets-scan:
        runs-on: ubuntu-22.04
        steps:
          - uses: actions/checkout@v4
            with:
              fetch-depth: 0
          - name: Gitleaks
            uses: gitleaks/gitleaks-action@v2
            env:
              GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      sast:
        runs-on: ubuntu-22.04
        steps:
          - uses: actions/checkout@v4
          - uses: semgrep/semgrep-action@v1
            with:
              config: p/owasp-top-ten

      sca:
        runs-on: ubuntu-22.04
        steps:
          - uses: actions/checkout@v4
          - name: Trivy -- scan dependencies for CVEs
            uses: aquasecurity/trivy-action@0.28.0
            with:
              scan-type: fs
              severity: CRITICAL,HIGH
              exit-code: 1

      container-scan:
        runs-on: ubuntu-22.04
        needs: [sast, sca]
        steps:
          - uses: actions/checkout@v4
          - run: docker build -t app:${{ github.sha }} .
          - uses: aquasecurity/trivy-action@0.28.0
            with:
              image-ref: app:${{ github.sha }}
              severity: CRITICAL,HIGH
              exit-code: 1

      license-check:
        runs-on: ubuntu-22.04
        steps:
          - uses: actions/checkout@v4
          - run: |
              pip install pip-licenses
              pip-licenses --fail-on "GPL;AGPL" --format=table
  example_bad: |
    # Single security scan at end of pipeline (or none at all)
    # "We run Snyk once a month manually"
    # Secrets already in git history (cannot be unrotated)
    # Critical CVEs in dependencies deployed to production
    # GPL-licensed transitive dependency in proprietary SaaS
    # DAST never runs -- CORS misconfiguration live for 8 months
  when_applies: Any project with a CI/CD pipeline deploying to staging or production
  when_not_applies: Local-only development with no deployment pipeline
  sources:
    - "https://owasp.org/www-project-devsecops-guideline/"
    - "https://docs.github.com/en/code-security/code-scanning/introduction-to-code-scanning/about-code-scanning"
    - "https://aquasecurity.github.io/trivy/latest/"

- id: SSDLC-005
  text: Conduct security-focused code reviews with a checklist targeting authentication, input validation, cryptography,
    serialization, and access control -- generic code reviews miss 60-70% of security flaws.
  why: >
    Generic code review focuses on correctness, readability, and performance. Security flaws often look like correct code
    (e.g., using MD5 for password hashing "works" but is cryptographically broken). A security-focused checklist forces
    reviewers to examine specific vulnerability categories that automated tools frequently miss -- business logic flaws,
    authorization bypass, race conditions, insecure defaults, and missing security headers.
  how_to_do_right: |
    1. Create a security review checklist covering: authentication, authorization, input validation,
       cryptography, serialization, error handling, logging, and configuration.
    2. Require at least one security-trained reviewer for PRs touching auth, payment, or data processing.
    3. Use PR templates with security checklist checkboxes.
    4. Track security findings per review to measure effectiveness.
  severity: high
  technologies:
    platform: [github, gitlab]
  domains:
    domain: [security, code_quality]
    concern: [code_review, secure_coding]
  example_good: |
    # .github/PULL_REQUEST_TEMPLATE.md
    ## Security Review Checklist
    ### Authentication & Session
    - [ ] No hardcoded credentials or API keys
    - [ ] Session tokens are cryptographically random (min 128-bit entropy)
    - [ ] Session expiry configured (idle=30min, absolute=8hr)
    - [ ] Password hashing uses Argon2id/bcrypt (NOT MD5/SHA-256)

    ### Authorization
    - [ ] Every endpoint checks authorization (not just authentication)
    - [ ] Object-level authorization prevents IDOR
    - [ ] Admin endpoints require explicit role check

    ### Input Validation
    - [ ] All user input validated (type, length, range, format)
    - [ ] SQL queries use parameterized statements
    - [ ] File uploads validate type, size, and content
    - [ ] Redirects validate destination against allowlist

    ### Cryptography
    - [ ] TLS 1.2+ enforced for all external communications
    - [ ] Encryption uses AES-256-GCM or ChaCha20-Poly1305
    - [ ] Random values use cryptographic RNG (secrets module, not random)

    ### Data Protection
    - [ ] PII/secrets not logged
    - [ ] Error responses do not expose stack traces
    - [ ] Sensitive data encrypted at rest
  example_bad: |
    # Generic PR review with no security focus:
    # Reviewer: "LGTM, code is clean and well-tested"
    #
    # Missed in the review:
    # password = hashlib.md5(password.encode()).hexdigest()
    # cursor.execute(f"SELECT * FROM users WHERE id = {user_id}")
    # response.headers['Access-Control-Allow-Origin'] = '*'
    # logging.info(f"User {email} logged in with password {password}")
  when_applies: Any team performing code reviews on applications handling user data
  when_not_applies: Solo developer projects with no code review process
  sources:
    - "https://owasp.org/www-project-code-review-guide/"
    - "https://cheatsheetseries.owasp.org/cheatsheets/Secure_Code_Review_Checklist.html"

- id: SSDLC-006
  text: Integrate penetration testing annually, establish a vulnerability disclosure policy (VDP), and consider a bug
    bounty program for internet-facing applications.
  why: >
    Penetration testing by external specialists finds architectural and business logic flaws that automated tools and
    internal reviews miss. A vulnerability disclosure policy (VDP) provides a legal safe harbor for security researchers
    to report flaws (ISO 29147). Without a VDP, researchers may disclose publicly or sell to exploit brokers. Bug bounty
    programs provide continuous testing by thousands of researchers at pay-for-results pricing. Organizations with active
    bug bounty programs find and fix critical vulnerabilities 46% faster (HackerOne 2024 report).
  how_to_do_right: |
    1. Schedule annual penetration test by qualified firm (CHECK/CREST/OSCP certified).
    2. Scope: all internet-facing assets, APIs, authentication flows, and payment processing.
    3. Remediate critical findings within 7 days, high within 30 days.
    4. Publish vulnerability disclosure policy at /.well-known/security.txt (RFC 9116).
    5. Consider bug bounty for internet-facing products (start private, expand to public).
    6. Retest after remediation to verify fixes.
  severity: high
  technologies:
    platform: [any]
  domains:
    domain: [security, compliance]
    concern: [penetration_testing, vulnerability_management]
  example_good: |
    # /.well-known/security.txt (RFC 9116)
    Contact: mailto:security@example.com
    Contact: https://example.com/security
    Encryption: https://example.com/.well-known/pgp-key.txt
    Acknowledgments: https://example.com/security/hall-of-fame
    Preferred-Languages: en
    Canonical: https://example.com/.well-known/security.txt
    Policy: https://example.com/security/vulnerability-disclosure-policy
    Expires: 2026-12-31T23:59:59.000Z

    # Bug bounty scope
    bug_bounty:
      program: private
      scope:
        in_scope: ["*.example.com", "api.example.com", "Mobile apps"]
        out_of_scope: ["Social engineering", "Physical security"]
      rewards:
        critical: "$5,000-$20,000"
        high: "$1,000-$5,000"
        medium: "$250-$1,000"
        low: "$50-$250"
  example_bad: |
    # No vulnerability disclosure policy
    # Researcher finds critical RCE, has no way to report
    # Posts on Twitter/X -> zero-day exploited within hours
    # Or: pentest done once 3 years ago, findings in a spreadsheet
    # 40% of critical findings still unpatched, no retest
  when_applies: Any internet-facing application or API
  when_not_applies: Internal-only tools with no external exposure
  sources:
    - "https://owasp.org/www-project-web-security-testing-guide/"
    - "https://www.rfc-editor.org/rfc/rfc9116"
    - "https://www.hackerone.com/resources/reporting/hacker-powered-security-report"

- id: SSDLC-007
  text: Establish a security champions program with at least one trained security advocate per development team, meeting
    monthly and receiving at least 20 hours of security training per year.
  why: >
    Central security teams cannot scale to review every PR, attend every design meeting, or answer every developer
    question. Security champions are developers embedded in product teams who serve as the first line of defense.
    BSIMM 14 data shows organizations with security champions programs have 28% fewer production vulnerabilities.
    Champions reduce the security team bottleneck and create a culture where security is everyone's responsibility.
  how_to_do_right: |
    1. Recruit 1 champion per 8-10 developers (voluntary, not forced).
    2. Provide initial training: OWASP Top 10, threat modeling, secure code review (40 hours).
    3. Ongoing training: 20 hours/year -- conferences, CTFs, certifications (CSSLP, CEH).
    4. Monthly champion meeting: share findings, discuss new attack techniques, align on priorities.
    5. Recognize contributions: security champion badge, career ladder credit, conference budget.
    6. Define responsibilities: design review, PR security review, threat model facilitation,
       security finding triage, team training sessions.
    7. Measure impact: track security findings by champions vs central team, time-to-remediation.
  severity: medium
  technologies:
    platform: [any]
  domains:
    domain: [security, governance]
    concern: [security_culture, training]
  example_good: |
    # security-champions-program.yaml
    program:
      name: "Security Champions Program"
      ratio: "1 champion per 8-10 developers"
      onboarding:
        initial_training_hours: 40
        topics:
          - "OWASP Top 10 (2021) deep dive with hands-on labs"
          - "Threat modeling workshop (STRIDE methodology)"
          - "Secure code review workshop (language-specific)"
          - "Incident response basics"
      ongoing:
        annual_training_hours: 20
        monthly_meeting: true
        activities:
          - "Quarterly CTF participation"
          - "Annual security conference attendance"
          - "Certification support (CSSLP, OSCP, CEH)"
      responsibilities:
        weekly:
          - "Review PRs for security (focus: auth, input, crypto)"
          - "Answer security questions from team members"
        monthly:
          - "Attend security champions meeting"
          - "Update team threat model if architecture changed"
      recognition:
        - "Security Champion badge on internal profile"
        - "Career ladder credit (counts toward senior promotion)"
        - "$2,000/year conference and training budget"
  example_bad: |
    # "Security is the security team's job"
    # No one on the product team understands threat modeling
    # Security team reviews PRs 2 weeks after merge (too late)
    # Developers google "how to hash password" and use first result
    # Average time to fix: 45 days (vs 12 days with champions)
  when_applies: Organizations with 3+ development teams building applications
  when_not_applies: Solo developers or very small teams (1-2 developers)
  sources:
    - "https://owasp.org/www-project-security-culture/stable/4-Security_Champions/"
    - "https://www.blackduck.com/glossary/what-is-bsimm.html"

- id: SSDLC-008
  text: Maintain and regularly exercise an incident response plan aligned with NIST SP 800-61r3 (April 2025) covering
    all six CSF 2.0 functions -- Govern, Identify, Protect, Detect, Respond, Recover.
  why: >
    NIST SP 800-61 Revision 3 (published April 2025) completely restructured incident response guidance to align with
    NIST Cybersecurity Framework 2.0. Organizations without a tested IR plan take an average of 277 days to identify
    and contain a breach (Ponemon 2024). Those with an IR plan and regular tabletop exercises reduce this to 200 days,
    saving an average of $1.49M per breach. An untested plan is nearly as bad as no plan -- 73% of organizations that
    have an IR plan have never tested it.
  how_to_do_right: |
    1. Define IR roles: Incident Commander, Communications Lead, Technical Lead, Legal, HR.
    2. Classify incidents: SEV1 (data breach), SEV2 (outage with security cause), SEV3 (blocked attack), SEV4 (vuln found).
    3. Document response procedures per severity aligned with CSF 2.0 functions.
    4. Run tabletop exercises quarterly (simulate ransomware, data breach, insider threat).
    5. Run full technical exercise annually (purple team, simulated breach).
    6. Conduct blameless post-incident review within 72 hours of every SEV1/SEV2.
    7. Update plan after every exercise and every real incident.
  severity: critical
  technologies:
    platform: [any]
  domains:
    domain: [security, operations]
    concern: [incident_response, compliance]
  example_good: |
    # incident-response-plan.yaml
    plan:
      version: "3.0"
      aligned_to: "NIST SP 800-61r3 (April 2025) + NIST CSF 2.0"
      csf_functions:
        govern:
          - "IR policy approved by CISO, reviewed annually"
          - "Third-party IR retainer (CrowdStrike/Mandiant)"
        identify:
          - "Asset inventory updated weekly (automated)"
          - "Threat intelligence feeds active (MITRE ATT&CK mapped)"
        protect:
          - "MFA enforced on all admin accounts"
          - "Backups tested monthly (restore time < 4 hours)"
        detect:
          - "SIEM with 24/7 monitoring"
          - "EDR on all endpoints"
        respond:
          - "SEV1: Activate IR team within 15 minutes"
          - "SEV1: Isolate affected systems within 1 hour"
          - "SEV1: Brief legal + communications within 2 hours"
        recover:
          - "Restore from clean backups (tested quarterly)"
          - "Blameless post-incident review within 72 hours"
      exercises:
        tabletop_quarterly:
          - "Ransomware encrypts production database"
          - "Employee laptop with source code stolen"
          - "API key leaked on GitHub"
  example_bad: |
    # "We have an incident response plan" (last updated 2021, never tested)
    # Plan says "call the security team" but no names or numbers
    # No severity classification
    # No tabletop exercises -- team panics during real incident
    # Still using 4-phase model not aligned with NIST CSF 2.0
  when_applies: Any organization handling customer data, financial data, or PII
  when_not_applies: Personal projects with no user data
  sources:
    - "https://csrc.nist.gov/pubs/sp/800/61/r3/final"
    - "https://www.nist.gov/cyberframework"

- id: SSDLC-009
  text: Map security controls to compliance frameworks (SOC 2, ISO 27001, NIST CSF 2.0, PCI DSS 4.0) with a control
    matrix -- implement controls once and map to multiple frameworks to eliminate redundant work.
  why: >
    Most organizations comply with multiple frameworks simultaneously. Without a unified control matrix, teams implement
    overlapping controls redundantly. A GRC control matrix maps each implemented control to all satisfied requirements
    across frameworks, reveals gaps, and eliminates redundant audit preparation. NIST CSF 2.0 (Feb 2024) added "Govern"
    as the sixth function and provides explicit mapping to ISO 27001:2022 and NIST SP 800-53 Rev 5.
  how_to_do_right: |
    1. Build a unified control matrix: rows are controls, columns are framework requirements.
    2. Start with NIST CSF 2.0 as the backbone (most comprehensive, maps to others).
    3. For each control: owner, evidence location, testing frequency, last tested.
    4. Identify gaps: framework requirements with no mapped control.
    5. Use a GRC tool (Vanta, Drata, Secureframe) or spreadsheet for <100 controls.
    6. Review quarterly; full audit annually.
  severity: high
  technologies:
    platform: [any]
  domains:
    domain: [security, compliance, governance]
    concern: [compliance, audit]
  example_good: |
    # control-matrix.yaml
    controls:
      - id: CTL-IAM-001
        name: "Multi-factor authentication for privileged access"
        owner: "IT Security"
        evidence: "SSO provider MFA enforcement policy + audit log"
        testing: "Quarterly (automated check via API)"
        framework_mapping:
          soc2: { criteria: "CC6.1" }
          iso27001: { control: "A.8.5" }
          nist_csf: { subcategory: "PR.AC-7" }
          pci_dss: { requirement: "8.4.2" }

      - id: CTL-LOG-001
        name: "Centralized security event logging"
        owner: "Security Operations"
        evidence: "SIEM dashboard + log ingestion metrics"
        testing: "Monthly"
        framework_mapping:
          soc2: { criteria: "CC7.2" }
          iso27001: { control: "A.8.15" }
          nist_csf: { subcategory: "DE.AE-3" }
          pci_dss: { requirement: "10.2" }

    gap_analysis:
      - framework: "PCI DSS 4.0"
        requirement: "6.4.3"
        status: "NO_CONTROL"
        target_date: "2026-03-31"
  example_bad: |
    # Separate compliance efforts per framework
    # SOC 2 audit: prepare evidence
    # ISO 27001 audit (2 months later): prepare same evidence again
    # Each audit costs $50K-$150K in preparation time
    # No unified view of control coverage
    # Gaps discovered during audit, not before
  when_applies: Organizations subject to compliance requirements (SOC 2, ISO 27001, PCI DSS, HIPAA)
  when_not_applies: Early-stage startups with no compliance obligations yet
  sources:
    - "https://www.nist.gov/cyberframework"
    - "https://www.pcisecuritystandards.org/document_library/"
    - "https://www.iso.org/standard/27001"

- id: SSDLC-010
  text: Enforce vulnerability management SLAs based on CVSS severity -- Critical (9.0-10.0) within 24h, High (7.0-8.9)
    within 7d, Medium (4.0-6.9) within 30d, Low (0.1-3.9) within 90d -- with automated tracking and escalation.
  why: >
    Without enforced SLAs, vulnerability backlogs grow indefinitely. CISA's Known Exploited Vulnerabilities (KEV) catalog
    shows that actively exploited CVEs are weaponized within 15 days of disclosure. SLA enforcement creates accountability
    and prioritizes remediation by risk. EPSS (Exploit Prediction Scoring System) should supplement CVSS to prioritize
    actually exploitable vulnerabilities.
  how_to_do_right: |
    1. Define SLAs: Critical=24h, High=7d, Medium=30d, Low=90d.
    2. Override for CISA KEV entries: any KEV = 24h regardless of CVSS.
    3. Enrich with EPSS: CVSS Medium + EPSS >0.5 -> treat as High.
    4. Automate tracking: tickets auto-created from scanner findings.
    5. Escalation: SLA breach -> team lead (1x), engineering manager (2x), VP (3x).
    6. Exception process: documented risk acceptance signed by CISO.
    7. Monthly report to leadership: new findings, remediated, SLA compliance %.
  severity: critical
  technologies:
    library: [trivy, snyk, dependabot, qualys]
    platform: [any]
  domains:
    domain: [security, operations]
    concern: [vulnerability_management, risk]
  example_good: |
    # vulnerability-management-policy.yaml
    policy:
      sla:
        critical:
          cvss_range: "9.0-10.0"
          remediation_hours: 24
          escalation:
            - { hours: 24, to: "team_lead" }
            - { hours: 48, to: "engineering_manager" }
            - { hours: 72, to: "vp_engineering" }
        high:
          cvss_range: "7.0-8.9"
          remediation_days: 7
        medium:
          cvss_range: "4.0-6.9"
          remediation_days: 30
        low:
          cvss_range: "0.1-3.9"
          remediation_days: 90
      overrides:
        cisa_kev: "Always treated as Critical (24h SLA)"
        epss_boost: "EPSS > 0.5 bumps severity by one level"
      exceptions:
        process: "Risk acceptance form signed by CISO"
        review_cadence: "Every 90 days"
        max_duration: "1 year"
  example_bad: |
    # "We track vulnerabilities in a spreadsheet"
    # Last updated 3 months ago
    # 47 critical findings, oldest is 6 months old
    # No SLA, no escalation, no accountability
    # CISA KEV entry unpatched for 90 days
  when_applies: Any organization running software with external dependencies or internet exposure
  when_not_applies: Offline systems with no network connectivity and no external dependencies
  sources:
    - "https://www.cisa.gov/known-exploited-vulnerabilities-catalog"
    - "https://www.first.org/cvss/v4.0/specification-document"
    - "https://www.first.org/epss/"

- id: SSDLC-011
  text: Implement security observability with WAF logs, authentication failure monitoring, anomaly detection, and SIEM
    integration -- you cannot respond to attacks you cannot see.
  why: >
    Security observability is the runtime counterpart to static security testing. WAF logs reveal attack patterns.
    Authentication failure spikes indicate credential stuffing. Anomaly detection catches insider threats and compromised
    accounts. Without SIEM integration, signals exist in silos -- correlation across sources turns noise into actionable
    alerts. MITRE ATT&CK mapping ensures detection coverage across the kill chain.
  how_to_do_right: |
    1. Deploy WAF on all internet-facing endpoints.
    2. Forward WAF logs, auth events, API logs, and DNS queries to SIEM.
    3. Create detection rules mapped to MITRE ATT&CK.
    4. Set up anomaly detection baselines (first 30 days).
    5. Alert routing: SEV1 -> PagerDuty, SEV2/3 -> Slack.
    6. Retain logs 90 days hot, 1 year cold.
    7. Tune alerts weekly to reduce false positive rate below 10%.
  severity: high
  technologies:
    library: [cloudflare, aws_waf, splunk, elastic, datadog]
    platform: [any]
  domains:
    domain: [security, observability]
    concern: [monitoring, detection]
  example_good: |
    # security-observability.yaml -- Detection rules mapped to MITRE ATT&CK
    detection_rules:
      - name: "Credential Stuffing Detection"
        mitre_attack: "T1110.004"
        data_sources: ["auth_logs", "waf_logs"]
        condition: |
          count(failed_login) > 10
          AND timeframe < 5m
          AND unique(username) > 5
          AND source_ip = same
        severity: high
        response: "Block IP for 1 hour, alert SOC"

      - name: "Impossible Travel"
        mitre_attack: "T1078"
        data_sources: ["auth_logs"]
        condition: |
          login_success
          AND geo_distance(prev_login, current_login) > 500km
          AND time_between < 1h
        severity: critical
        response: "Force re-authentication, alert SOC"

      - name: "Data Exfiltration via API"
        mitre_attack: "T1567"
        data_sources: ["api_logs"]
        condition: |
          response_size > 10MB
          AND endpoint NOT IN known_bulk_endpoints
          AND time NOT IN business_hours
        severity: high
        response: "Rate limit API key, alert SOC"

    log_retention:
      hot: "90 days (Elasticsearch, searchable)"
      cold: "1 year (S3/GCS, compressed)"
  example_bad: |
    # Application logs only contain "INFO User logged in"
    # No IP, no user agent, no geographic data
    # No WAF -- attacks hit application directly
    # Auth failures not monitored -- 50K brute force attempts unnoticed
    # No SIEM -- logs on individual servers, no correlation
  when_applies: Any application handling user data or financial transactions
  when_not_applies: Local development environments and offline tools
  sources:
    - "https://attack.mitre.org/techniques/enterprise/"
    - "https://www.elastic.co/security"
    - "https://docs.aws.amazon.com/waf/latest/developerguide/what-is-aws-waf.html"

- id: SSDLC-012
  text: Shift security left by embedding threat modeling in the design phase through architecture risk analysis -- fixing
    a security flaw in design costs 6x less than fixing it in production.
  why: >
    The cost multiplier for fixing defects grows exponentially across SDLC phases. A security flaw caught in design
    costs ~$500 to fix; in production ~$30,000 (NIST/IBM data). Architecture Risk Analysis examines the system design
    for inherent security weaknesses before any code is written. Threat modeling during design (STRIDE per element on
    DFD/architecture diagram) forces architects to think adversarially. Microsoft SDL requires threat modeling for every
    feature. SWEBOK v4.0 explicitly includes threat modeling in the new Software Security KA.
  how_to_do_right: |
    1. Require threat model for every new service, major feature, or architecture change.
    2. Use STRIDE per element on a Data Flow Diagram at the component level.
    3. For each threat: risk rating, mitigation strategy, residual risk.
    4. Document in version control (threat-model.md or Threagile YAML).
    5. Review threat model in design review meeting.
    6. Update threat model when architecture changes.
    7. Track mitigations as security requirements linked to tickets.
    8. Use tooling: Microsoft TMT, OWASP Threat Dragon, or Threagile (as code).
  severity: critical
  technologies:
    library: [threat_dragon, threagile, microsoft_tmt]
    platform: [any]
  domains:
    domain: [security, architecture]
    concern: [threat_modeling, design]
  example_good: |
    # threat-model.yaml (Threagile format)
    threagile_version: 1.0.0
    title: "Payment Service Threat Model"
    date: "2025-12-01"

    data_assets:
      credit_card_numbers:
        usage: "business"
        confidentiality: "strictly-confidential"
        integrity: "critical"
        availability: "critical"

    technical_assets:
      payment_api:
        type: "process"
        technologies: [python, fastapi]
        internet: true
        data_assets_processed: [credit_card_numbers]

    trust_boundaries:
      dmz:
        type: "network-cloud-security-group"
        technical_assets_inside: [payment_api]

    # STRIDE output:
    # | Element      | Threat         | Risk  | Mitigation               |
    # |--------------|----------------|-------|--------------------------|
    # | payment_api  | Spoofing       | HIGH  | mTLS + API key auth      |
    # | payment_api  | Tampering      | CRIT  | Input validation + HMAC  |
    # | credit_cards | Info Disclosure| CRIT  | AES-256-GCM field-level  |
  example_bad: |
    # Design doc: "The payment service will accept credit card numbers via REST API"
    # No threat model, no trust boundary analysis
    # Discovered in PCI DSS audit: 6 months of rework ($200K+)
  when_applies: Any new service, major feature, or architecture change
  when_not_applies: Minor UI changes with no security-relevant data flow changes
  sources:
    - "https://owasp.org/www-community/Threat_Modeling"
    - "https://threagile.io/"
    - "https://learn.microsoft.com/en-us/azure/security/develop/threat-modeling-tool"
    - "https://www.computer.org/education/bodies-of-knowledge/software-engineering"
