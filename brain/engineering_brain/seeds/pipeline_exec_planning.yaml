        o = await db.get(id)
        o.status = "cancelled"
        await db.save(o)
        return o

    # 6 months later: "What does 'r' stand for?" "Why does this not check the current status?"
    # "Why did we choose to not refund automatically?" "I don't know, whoever wrote this is gone."
  when_applies: Writing any code that will be read by other developers (which is all code)
  sources: ["https://google.github.io/styleguide/pyguide.html#38-comments-and-docstrings"]
