- id: PEP-018
  text: "Establish a performance baseline BEFORE adding features — if you don't know the current p95 latency, you can't know if your change made it worse. Measure first, then implement."
  why: >
    Performance is relative. A 200ms response time is fast if the baseline is 500ms and slow if the
    baseline is 50ms. Without a baseline, performance discussions are guesswork: "Is the new search
    fast enough?" "I think so?" With a baseline, the discussion is data-driven: "Search was 150ms
    p95 before our change, now it's 180ms. That's a 20% regression — acceptable or not?" Baselines
    also catch regressions automatically: a CI performance test that fails when latency exceeds
    baseline + 20% catches performance bugs before they reach production.
  how_to_do_right: |
    1. Before starting implementation, measure current performance:
       - API latency: p50, p95, p99 for all affected endpoints
       - Database: query time for critical queries, connection pool utilization
       - External calls: latency to each integration point
       - Memory: RSS and heap usage under load
       - Throughput: requests per second at current load
    2. Record baselines in the spec/PR description.
    3. Set performance budgets: "This feature MUST NOT increase p95 latency by more than 20%."
    4. Add performance tests to CI: load test that measures latency under realistic concurrency.
    5. After implementation: re-measure all baselines. Compare. If regression > budget, fix before merge.
    6. Track baselines over time: weekly automated performance benchmarks with trend graphs.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Performance Baseline — Order Service (before cancellation feature)
    Measured: 2026-02-20, staging environment, 100 concurrent users

    | Endpoint              | p50    | p95    | p99    | RPS  |
    |-----------------------|--------|--------|--------|------|
    | POST /orders          | 45ms   | 120ms  | 250ms  | 85   |
    | GET /orders/{id}      | 12ms   | 35ms   | 80ms   | 320  |
    | GET /orders           | 30ms   | 95ms   | 200ms  | 150  |

    Database:
    - Connection pool: 15/20 active at peak
    - Slowest query: list_orders_by_user → 45ms (with index)

    Performance budget for cancellation feature:
    - POST /orders/{id}/cancel: must be < 200ms p95
    - Existing endpoints: must not regress by > 20%

    After implementation: re-measure, compare, report in PR.
  example_bad: |
    # No baseline measured.
    # Feature implemented. "Is it fast enough?" "Feels fast to me."
    # Production: p95 latency went from 120ms to 450ms.
    # "When did this happen?" "No idea, we don't have historical data."
    # "Which change caused it?" "Could be any of the 15 PRs merged this week."
  when_applies: Before implementing any feature that could affect performance
  sources: ["https://sre.google/sre-book/service-level-objectives/"]

- id: PEP-019
  text: "Rollback strategy must be tested, not just documented — if the rollback has never been executed, it doesn't work. Practice rollbacks in staging monthly. Your production rollback will be the second time, not the first."
  why: >
    Every team has a rollback plan. Almost no team has tested it. The first time the rollback is
    attempted is during a production incident at 2 AM when the on-call engineer is stressed, sleep-
    deprived, and working from memory. Untested rollbacks fail for predictable reasons: the rollback
    script has a syntax error, the database migration backward script wasn't written, the config
    rollback reverts to an old value that's no longer valid, the feature flag doesn't actually
    disable the feature completely. Monthly rollback drills in staging catch these failures when the
    stakes are low. The most reliable rollback is the one that's been practiced 12 times.
  how_to_do_right: |
    1. Every deployment plan MUST include a tested rollback procedure.
    2. Test rollbacks in staging for every significant release:
       a. Deploy the new version
       b. Execute the rollback procedure exactly as documented
       c. Verify: system returns to previous state, no data loss, no broken references
       d. Time the rollback: it must complete within the SLA (e.g., < 5 minutes)
    3. Monthly rollback drills:
       - Pick a random recent deployment
       - Execute the rollback in staging
       - Document what worked, what didn't, what was unclear
       - Update the rollback procedure based on findings
    4. Automate rollback where possible: one-click rollback, automated health check → auto-rollback.
    5. Track rollback metrics: time to rollback, success rate, manual steps required.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Rollback Test Report — Order Cancellation Feature (Staging, 2026-02-22)

    ## Test Execution
    1. Deployed order-service v2.3.0 (with cancellation feature)
    2. Created 10 test orders, cancelled 5
    3. Executed rollback:
       a. Set FEATURE_ORDER_CANCELLATION=false → 3 seconds
       b. Verified: cancel endpoint returns 404 → PASS
       c. Redeployed order-service v2.2.0 → 45 seconds
       d. Verified: all endpoints functional → PASS
       e. Ran migration backward → 1 second
       f. Verified: cancelled_at column removed, no data loss → PASS

    ## Total rollback time: 52 seconds (target: < 5 minutes) ✓
    ## Issues found: migration backward script had a typo (fixed and re-tested)
    ## Confidence: HIGH — rollback tested and verified in staging
  example_bad: |
    # Rollback plan: "Revert the commit and redeploy"
    # Never tested. Production incident at 2 AM:
    # 1. Revert commit → merge conflict with 3 subsequent commits
    # 2. Fix merge conflict → 20 minutes
    # 3. CI/CD pipeline → 15 minutes
    # 4. Deploy → 5 minutes
    # 5. Migration backward script missing → manual SQL
    # Total: 55 minutes of downtime. Could have been 2 minutes with tested rollback.
  when_applies: Any deployment of any feature to any production environment
  sources: ["https://sre.google/sre-book/release-engineering/"]

- id: PEP-020
  text: "Documentation alongside code, not after — write the docstring before the function body, the API docs before the endpoint, the architecture decision record before the implementation. Future-you is your most important reader."
  why: >
    Documentation written after implementation is documentation that won't be written. The developer
    moves on to the next feature, the sprint ends, the deadline passes, and the code remains
    undocumented. Documentation written alongside implementation is easy because the context is fresh:
    you just decided why this function exists, what parameters it takes, and what errors it throws.
    A docstring takes 30 seconds to write during implementation and 30 minutes to reconstruct from
    code archaeology 6 months later. Architecture Decision Records (ADRs) written before implementation
    force you to articulate the "why" — which often reveals flaws in the "what."
  how_to_do_right: |
    1. Before writing a function: write the docstring first.
       - One-line summary
       - Args with types and descriptions
       - Returns with type and description
       - Raises with exception types and conditions
       - Example usage (if non-obvious)
    2. Before writing an endpoint: write the OpenAPI description first.
    3. Before making an architectural decision: write an ADR:
       - Context: what problem are we solving?
       - Decision: what did we choose?
       - Consequences: what are the trade-offs?
       - Status: proposed → accepted → deprecated
    4. Before creating a module: write the module docstring explaining purpose and usage.
    5. Code review rule: no PR is approved without docstrings on public functions and classes.
    6. Track documentation coverage: public functions with docstrings / total public functions.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Docstring written BEFORE function body
    async def cancel_order(order_id: UUID, reason: str) -> Order:
        """Cancel an existing order and trigger compensation actions.

        Transitions the order from CONFIRMED or DRAFT to CANCELLED.
        Releases inventory reservations and initiates payment refund
        if payment was already captured.

        Args:
            order_id: The UUID of the order to cancel.
            reason: Human-readable cancellation reason (stored for audit).

        Returns:
            The updated Order with status=CANCELLED.

        Raises:
            OrderNotFoundError: If no order exists with the given ID.
            InvalidTransitionError: If order is in SHIPPED or DELIVERED state.
            InventoryReleaseError: If inventory service is unavailable (order still cancelled,
                inventory release queued for retry).

        Example:
            >>> order = await cancel_order(order_id=UUID("..."), reason="Customer changed mind")
            >>> assert order.status == OrderStatus.CANCELLED
        """
        # Implementation follows...

    # ADR written BEFORE implementation
    # ADR-007: Use cursor-based pagination instead of offset-based
    # Context: Orders table grows by 10K rows/day, offset pagination slows at high page numbers
    # Decision: Cursor-based (keyset) pagination using order.id as cursor
    # Consequences: Better performance at scale, but no "jump to page N" feature
    # Status: Accepted (2026-02-20)
  example_bad: |
    # No docstring, no ADR, no API docs
