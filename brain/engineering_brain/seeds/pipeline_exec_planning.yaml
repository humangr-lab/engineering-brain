layer: rules
domain: sacada
knowledge:

# =============================================================================
# SPEC-TO-CODE METHODOLOGY (PEP-001 to PEP-004)
# =============================================================================

- id: PEP-001
  text: "Spec-to-code is not a translation — it's a discovery process. Read the spec 3 times: first for understanding, second for data model, third for gaps. Only then open your editor."
  why: >
    Developers read a spec once, skim the parts they think they understand, and start coding. The
    result: they build what they imagined the spec says, not what it actually says. Three-pass reading
    is a disciplined technique from technical writing: the first pass builds a mental model of the
    entire system; the second pass extracts concrete artifacts (entities, endpoints, states); the
    third pass hunts for inconsistencies, missing requirements, and implicit assumptions. The third
    pass is where 80% of the value is — it finds the bugs before they're written. A 2-hour spec
    review saves 2 weeks of rework. Every experienced engineer has learned this the hard way.
  how_to_do_right: |
    1. PASS 1 — Understanding (30 min): Read end-to-end without taking notes. Build a mental model.
       Ask: "Could I explain this system to a colleague in 5 minutes?"
    2. PASS 2 — Extraction (45 min): Extract artifacts into structured notes:
       - Entities (nouns): User, Order, Payment, Product
       - Operations (verbs): create, update, cancel, refund
       - States (adjectives): pending, active, expired
       - Constraints (invariants): balance >= 0, max 100 items per order
       - Integration points: payment gateway, email service, analytics
    3. PASS 3 — Gap hunting (30 min): For every artifact, ask:
       - "What's the error case?" (missing error handling)
       - "What if it fails midway?" (missing transaction/saga)
       - "Who else needs to know?" (missing events/notifications)
       - "What's the performance expectation?" (missing NFRs)
    4. Document gaps and ask PM/architect BEFORE coding. Don't assume.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Spec Review Notes — Order Service v2

    ## Pass 1 Summary
    System manages order lifecycle from cart to delivery. Integrates with
    payment and inventory services. Key flows: checkout, payment, fulfillment.

    ## Pass 2 Artifacts
    Entities: User, Order, OrderItem, Payment, Shipment, Address
    Operations: create_order, confirm_payment, ship_order, deliver, cancel, refund
    States: Order(draft, confirmed, shipped, delivered, cancelled, refunded)
    Invariants: INV-001 balance >= 0, INV-002 stock >= 0, INV-003 order total = sum(items)

    ## Pass 3 Gaps Found
    GAP-001: Spec says "cancel order" but doesn't specify: can cancelled orders be refunded?
    GAP-002: No error case for: payment timeout during checkout
    GAP-003: No NFR for: max concurrent orders per user
    GAP-004: Integration with inventory service: no retry/circuit breaker specified

    ACTION: Send GAP-001 through GAP-004 to PM before starting implementation.
  example_bad: |
    # Developer reads spec title: "Order Service"
    # Opens editor, creates models.py, starts typing Order class
    # 3 days later: "Wait, what does 'cancelled' mean? Can I refund a cancelled order?"
    # Asks PM. PM says "That's a good question, let me check."
    # 2 more days: PM responds. Developer has already implemented the wrong behavior.
    # Rework: 3 days to undo and redo.
  when_applies: Before starting implementation of any specified feature
  sources: ["https://martinfowler.com/articles/is-quality-worth-cost.html"]

- id: PEP-002
  text: "Data-first design means designing the data model before a single line of business logic — if the data model is wrong, the business logic will be a monument to workarounds."
  why: >
    The data model is the foundation of the system. Business logic, APIs, and UIs are views on top
    of data. If the data model has the wrong entities, the wrong relationships, or the wrong
    cardinalities, every layer above it compensates with workarounds. A missing join table becomes
    a JSON array stuffed in a TEXT column. A wrong cardinality (1:1 that should be 1:N) becomes
    a "we'll handle it in code" comment that creates subtle bugs. A missing status field becomes
    4 boolean columns with 16 possible states. Fixing the data model after business logic is written
    is 10x more expensive than getting it right upfront. Database migrations, API changes, test
    rewrites — all because a table was missing a column.
  how_to_do_right: |
    1. Before ANY business logic, design the data model:
       a. List all entities (from spec Pass 2 extraction)
       b. Define attributes for each entity (types, constraints, nullability)
       c. Define relationships (1:1, 1:N, N:M) with join tables where needed
       d. Define enums/status fields (from state machine analysis)
       e. Define indexes (from expected query patterns)
    2. Draw an ER diagram. Show it to the team. Get feedback.
    3. Write the migration (CREATE TABLE statements) and review it.
    4. Write seed data and verify the model supports all spec scenarios.
    5. ONLY THEN write business logic on top of the model.
    6. Use Pydantic models to define the schema in code — they serve as documentation + validation.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Data-first design: Order Service
    # Step 1: Entity-Relationship diagram (text representation)
    #
    # User 1──N Order 1──N OrderItem N──1 Product
    #                  1──1 Payment
    #                  1──N Shipment
    #                  N──1 Address (billing)
    #                  N──1 Address (shipping)

    # Step 2: Schema definition (Pydantic + SQLAlchemy)
    class Order(Base):
        __tablename__ = "orders"
        id: Mapped[UUID] = mapped_column(primary_key=True, default=uuid4)
        user_id: Mapped[UUID] = mapped_column(ForeignKey("users.id", ondelete="SET NULL"), nullable=True)
        status: Mapped[OrderStatus] = mapped_column(default=OrderStatus.DRAFT)
        total_cents: Mapped[int] = mapped_column(CheckConstraint("total_cents >= 0"))
        billing_address_id: Mapped[UUID] = mapped_column(ForeignKey("addresses.id"))
        shipping_address_id: Mapped[UUID] = mapped_column(ForeignKey("addresses.id"))
        created_at: Mapped[datetime] = mapped_column(default=func.now())
        updated_at: Mapped[datetime] = mapped_column(default=func.now(), onupdate=func.now())
        version: Mapped[int] = mapped_column(default=1)  # Optimistic locking

    # Step 3: Verify with seed data that covers all spec scenarios
    # Step 4: THEN write business logic
  example_bad: |
    # "Let's just start coding and figure out the model as we go"
    class Order:
        data = {}  # "We'll add fields later"

    # 2 weeks later: Order has 47 fields, 12 are booleans,
    # 3 are JSON blobs, and the address is a string "123 Main St, City, State, Zip"
    # Refactoring the model requires rewriting 80% of the business logic.
  when_applies: Starting implementation of any feature with persistent data
  sources: ["https://martinfowler.com/bliki/DomainDrivenDesign.html"]

- id: PEP-003
  text: "Before writing new code, inventory the existing codebase — 50% of what you need probably already exists as a utility, a base class, or a pattern in another module. Duplication is the fastest path to tech debt."
  why: >
    Large codebases accumulate reusable code organically: validation utilities, base classes, error
    handlers, middleware, database helpers, test fixtures. But developers don't know it exists because
    they didn't write it and the codebase has no catalog. The result: 5 different implementations of
    pagination, 3 different error response formats, 4 different ways to validate UUIDs. Each
    implementation has slightly different behavior, creating inconsistency for API consumers and
    maintenance burden for the team. A 30-minute codebase inventory before starting any feature
    prevents weeks of "we already have this" discoveries during code review.
  how_to_do_right: |
    1. Before writing any new code, search the codebase for existing implementations:
       - grep for the domain concept: "pagination", "error_handler", "auth"
       - Check utils/, common/, shared/, lib/ directories
       - Check base classes and mixins in models/
       - Check middleware and dependencies in api/
       - Check test fixtures and factories in tests/
    2. If a similar implementation exists:
       - USE IT if it fits your needs (even with minor modifications)
       - EXTEND IT if it's close but missing features
       - REFACTOR IT if it's in the wrong location (move to shared/)
    3. If nothing exists, write it in the appropriate shared location (not inline in your feature).
    4. Document reusable utilities in a UTILITIES.md or in-code catalog.
    5. In code review, the first question for any utility code: "Does this already exist somewhere?"
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Codebase inventory before implementing "order search"
    ## Existing utilities found:
    - src/common/pagination.py → CursorPaginator class (cursor-based, tested)
    - src/common/search.py → ElasticSearchClient with retry and fallback
    - src/common/filters.py → FilterSet base class for query parameter parsing
    - src/orders/models.py → Order model with all fields
    - tests/factories/order_factory.py → OrderFactory for test data

    ## Plan:
    - Use CursorPaginator (don't reinvent)
    - Use ElasticSearchClient (don't reinvent)
    - Extend FilterSet for order-specific filters
    - Create OrderSearchService using existing components
    - Use OrderFactory in tests

    ## Code to write: ~100 lines (service + filters + tests)
    ## Without inventory: ~500 lines (reimplemented pagination, search, filters)
  example_bad: |
    # Developer doesn't search codebase.
    # Creates: src/orders/pagination.py — 200 lines, offset-based (different from rest of API)
    # Creates: src/orders/search.py — 150 lines, no retry, no fallback (fragile)
    # Creates: src/orders/filters.py — 100 lines, different filter syntax from other endpoints
    # Code review: "We already have all of this in src/common/. Please use the existing code."
    # Developer: "But mine is slightly different!" — it shouldn't be.
  when_applies: Before writing any new feature, utility, or shared component
  sources: ["https://refactoring.guru/refactoring/when"]

- id: PEP-004
  text: "File organization is architecture — if you can't find the file for a given responsibility in under 5 seconds, the project structure is wrong. Use domain-driven directories, not technology-driven."
  why: >
    File organization is the physical manifestation of your architecture. Technology-driven structure
    (models/, controllers/, views/, services/) groups unrelated code together and scatters related
    code across directories. To understand the Order domain, you must open 4 directories. Domain-driven
    structure (orders/models.py, orders/service.py, orders/routes.py) groups related code together.
    To understand Orders, you open one directory. This matters because developers spend 60% of their
    time reading code and navigating the project. Every second of "where is this file?" compounds
    across the team. A well-organized project is a force multiplier; a poorly organized one is a
    tax on every developer, every day.
  how_to_do_right: |
    1. Use domain-driven directory structure:
       src/
         orders/
           models.py      (Order, OrderItem, OrderStatus)
           service.py     (OrderService: create, update, cancel)
           routes.py      (FastAPI router: POST /orders, GET /orders/:id)
           schemas.py     (Pydantic: CreateOrderRequest, OrderResponse)
           exceptions.py  (OrderNotFound, InsufficientStock)
           tests/
             test_service.py
             test_routes.py
         payments/
           ...
         common/          (shared utilities, base classes)
           pagination.py
           error_handlers.py
    2. Each domain directory is self-contained: you can understand a domain by reading one directory.
    3. Common/shared code goes in common/ or shared/ — never duplicated across domains.
    4. Test files mirror source files: src/orders/service.py → src/orders/tests/test_service.py.
    5. Max 10 files per directory. If more, split into subdirectories.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Domain-driven structure
    src/
      orders/
        __init__.py
        models.py           # Order, OrderItem, OrderStatus
        service.py           # Business logic
        routes.py            # API endpoints
        schemas.py           # Request/Response models
        repository.py        # Database queries
        events.py            # Domain events
        exceptions.py        # Domain-specific exceptions
        tests/
          test_service.py
          test_routes.py
          conftest.py         # Fixtures specific to orders
      payments/
        __init__.py
        models.py
        service.py
        ...
      common/
        pagination.py
        auth.py
        error_handlers.py

    # Finding "order cancellation logic": src/orders/service.py → cancel_order()
    # Time to find: 3 seconds
  example_bad: |
    # Technology-driven structure
    src/
      models/
        user.py
        order.py           # Order model far from order logic
        payment.py
      controllers/
        user_controller.py
        order_controller.py  # Order routes far from order model
        payment_controller.py
      services/
        user_service.py
        order_service.py     # Order logic far from everything else
        payment_service.py
      tests/
        test_user.py
        test_order.py        # Tests far from source

    # Finding "order cancellation logic": is it in controllers/? services/? models/?
    # Open 3 files across 3 directories. Time to find: 30+ seconds.
  when_applies: Setting up project structure for any new feature or service
  sources: ["https://martinfowler.com/bliki/PresentationDomainDataLayering.html"]

# =============================================================================
# DEPENDENCY AND IMPLEMENTATION ORDERING (PEP-005 to PEP-008)
# =============================================================================

- id: PEP-005
  text: "Implement in dependency order: data model first, then repository, then service, then API, then UI. Skipping layers creates phantom dependencies that haunt you forever."
  why: >
    Every software layer depends on the layer below it: UI depends on API, API depends on service,
    service depends on repository, repository depends on data model. Implementing in reverse order
    (UI first) creates phantom dependencies: the UI assumes an API shape that doesn't exist yet,
    the API assumes a service interface that hasn't been designed, and the service assumes a data
    model that's being invented on the fly. When the lower layers are finally implemented, they
    don't match the assumptions made by the upper layers. Result: rework. Implementing bottom-up
    ensures each layer has a stable foundation and tests can run at every step.
  how_to_do_right: |
    1. Implementation order (each step must be testable before proceeding):
       a. Data Model: CREATE TABLE, SQLAlchemy models, Alembic migration. Test: seed data works.
       b. Repository: CRUD queries, complex queries, pagination. Test: database integration tests.
       c. Service: Business logic, validation, state transitions. Test: unit tests with mock repo.
       d. API: Routes, request/response schemas, error handling. Test: API integration tests.
       e. UI: Components, forms, state management. Test: component tests, E2E tests.
    2. Each layer gets its own PR (or at least its own commit). Review is focused and manageable.
    3. Use interfaces/protocols between layers: service depends on RepositoryProtocol, not concrete Repository.
    4. Each layer's tests should pass independently of layers above it.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Implementation plan for "Order Cancellation" feature
    ## Step 1: Data Model (Day 1)
    - Add OrderStatus.CANCELLED to enum
    - Add cancelled_at, cancellation_reason to orders table
    - Migration: ALTER TABLE orders ADD COLUMN cancelled_at TIMESTAMP ...
    - Test: migration runs forward and backward

    ## Step 2: Repository (Day 1)
    - Add cancel_order() method to OrderRepository
    - Test: test_cancel_order_updates_status, test_cancel_order_already_cancelled

    ## Step 3: Service (Day 2)
    - Add cancel_order() to OrderService with business rules:
      - Guard: only CONFIRMED or DRAFT orders can be cancelled
      - Side effect: release inventory reservation
      - Side effect: trigger refund if payment captured
    - Test: test_cancel_confirmed_order, test_cancel_shipped_order_raises

    ## Step 4: API (Day 3)
    - POST /orders/{id}/cancel endpoint
    - Test: test_cancel_order_api, test_cancel_order_not_found_404
  example_bad: |
    # "Let's start with the API so the frontend team can start early"
    @app.post("/orders/{id}/cancel")
    async def cancel_order(id: UUID):
        # TODO: implement when service layer is ready
        return {"status": "cancelled"}  # Fake response

    # Frontend builds against fake response. Service layer is implemented 2 weeks later.
    # Service returns different response shape. Frontend breaks. 3 days to fix integration.
  when_applies: Planning implementation order for any multi-layer feature
  sources: ["https://martinfowler.com/bliki/DependencyInjection.html"]

- id: PEP-006
  text: "Test-first implementation is not dogma — it's risk management. Write tests for the riskiest parts first: state transitions, calculations, integrations. Save UI tests for last."
  why: >
    Test-first (TDD) is powerful but rigid TDD (every method test-first) creates friction without
    proportional value. A pragmatic approach: write tests first for the code most likely to have bugs.
    State transitions have complex guard conditions. Financial calculations have rounding and overflow
    risks. Integration code has timeout and retry edge cases. These are the highest-risk areas where
    a test catches a bug before it's written. For low-risk code (simple CRUD, pass-through functions),
    test-after is fine — the test still exists, just written in a different order. Prioritize test
    coverage where bugs are expensive, not where they're easy to find.
  how_to_do_right: |
    1. Categorize code by risk:
       - HIGH RISK (test first): state machines, calculations, security, concurrency, integrations
       - MEDIUM RISK (test alongside): business logic, validation, data transformations
       - LOW RISK (test after): simple CRUD, configuration, display formatting
    2. For HIGH RISK code: write the test first, see it fail, implement, see it pass. Classic TDD.
    3. For MEDIUM RISK code: implement and test in the same session. Commit together.
    4. For LOW RISK code: implement first, write tests before PR. Never skip tests.
    5. Target coverage: 100% for HIGH RISK, 90% for MEDIUM, 80% for LOW.
    6. Use mutation testing on HIGH RISK code to verify test quality (not just coverage).
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Risk-based test strategy for Order Service

    ## HIGH RISK — Test First
    - Order state machine transitions (6 states × N transitions = complex)
    - Order total calculation (rounding, discounts, tax, currency)
    - Payment integration (idempotency, timeout, retry)
    - Inventory reservation (concurrency, stock check)

    ## MEDIUM RISK — Test Alongside
    - Order CRUD operations
    - Input validation (Pydantic handles most, but custom validators)
    - Email notification formatting

    ## LOW RISK — Test After
    - Order list pagination (using shared CursorPaginator — already tested)
    - Order serialization (Pydantic schema — mostly automatic)
    - Logging and metrics

    Test-first example:
    def test_cancel_shipped_order_raises():
        order = Order(status=OrderStatus.SHIPPED)
        with pytest.raises(InvalidTransition):
            order_service.cancel(order)

    # Write this test BEFORE implementing cancel(). It defines the expected behavior.
  example_bad: |
    # "We'll add tests after the feature is done"
    # Feature is done. Deadline is tomorrow. Tests never get written.
    # Or: tests are written as rubber stamps — they test that the code does what it does,
    # not what it should do. 100% coverage, 0% confidence.
  when_applies: Planning testing strategy for any feature implementation
  sources: ["https://martinfowler.com/articles/practical-test-pyramid.html"]

- id: PEP-007
  text: "Incremental implementation means every commit is deployable — never be more than 4 hours of work away from a green build. Feature flags enable incremental deployment of incomplete features."
  why: >
    Large features that take days or weeks to implement create massive PRs that are unreviable,
    introduce merge conflicts with other work, and block the pipeline. Incremental implementation
    breaks the feature into small, deployable steps — each commit adds a piece of functionality,
    maintains a green build, and can be deployed to production behind a feature flag. If something
    goes wrong, the blast radius is one small change, not a 3,000-line PR. This is not just good
    practice — it's the only way to maintain velocity in a team where multiple developers work on
    the same codebase.
  how_to_do_right: |
    1. Break every feature into increments that are individually deployable:
       - Increment 1: Data model + migration (feature flag OFF, no user-facing change)
       - Increment 2: Repository + service (feature flag OFF, internal logic only)
       - Increment 3: API endpoint (feature flag ON for internal testing)
       - Increment 4: Frontend component (feature flag ON for beta users)
       - Increment 5: Remove feature flag (GA release)
    2. Each increment: < 200 lines changed, < 4 hours of work, has its own tests.
    3. Use feature flags (LaunchDarkly, Unleash, or simple env vars) to hide incomplete features.
    4. Deploy each increment to production. Yes, to production. Behind the flag.
    5. Never have a local branch that's more than 1 day old. Rebase and deploy daily.
    6. If a feature can't be broken into increments, it's too big. Split it.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Incremental implementation: "Order Cancellation" feature
    # Total estimate: 5 days. Each day = 1 deployable increment.

    # Day 1 PR: Data model changes
    git commit -m "feat(orders): add cancellation fields to order model"
    # - Migration: add cancelled_at, cancellation_reason columns
    # - Feature flag: ORDER_CANCELLATION=false (default)
    # - Tests: migration forward/backward
    # - Deployable: YES (no behavior change, flag is off)

    # Day 2 PR: Service layer
    git commit -m "feat(orders): add cancel_order service method"
    # - OrderService.cancel() with business rules
    # - Tests: state transition tests, guard tests
    # - Deployable: YES (no endpoint exposed yet)

    # Day 3 PR: API endpoint
    git commit -m "feat(orders): add POST /orders/{id}/cancel endpoint"
    # - Endpoint gated by feature flag
    # - Tests: API integration tests
    # - Deployable: YES (endpoint exists but returns 404 if flag is off)

    # Day 4 PR: Frontend + flag ON
    git commit -m "feat(orders): add cancel button to order detail page"
    # - Cancel button visible only when ORDER_CANCELLATION=true
    # - Deploy, enable flag for 10% of users (canary)

    # Day 5 PR: GA release
    git commit -m "feat(orders): enable cancellation for all users, remove flag"
  example_bad: |
    # Day 1-10: Developer works on local branch "feature/order-cancellation"
    # Day 11: Opens PR with 2,847 lines changed across 23 files
    # Day 12-13: Code review. 47 comments. Major architectural feedback.
    # Day 14: Merge conflicts with 3 other PRs that merged during the 2 weeks.
    # Day 15: Fix conflicts, re-review. Deploy. Bug in production. Rollback ALL 2,847 lines.
  when_applies: Planning implementation of any feature larger than 1 day of work
  sources: ["https://martinfowler.com/bliki/ContinuousDelivery.html", "https://martinfowler.com/bliki/FeatureToggle.html"]

- id: PEP-008
  text: "API contract first, implementation second — define the OpenAPI spec, get frontend/consumer agreement, then build. Changing an API after consumers depend on it is 10x more expensive."
  why: >
    APIs are contracts between producers and consumers. Once a consumer builds against an API, changing
    it requires coordinated releases, backward compatibility, versioning, and migration guides. An
    API change from `{ "user_name": "John" }` to `{ "username": "John" }` (removing underscore)
    breaks every consumer. Defining the API contract first (OpenAPI/Swagger spec) and getting consumer
    agreement before implementation ensures the interface is right before anyone depends on it.
    This is the principle of "design by contract" applied to distributed systems.
  how_to_do_right: |
    1. Before implementation, write the OpenAPI spec for every endpoint:
       - Request schema (with all validations)
       - Response schema (with all possible shapes: success, error, empty)
       - Status codes (200, 201, 400, 401, 404, 409, 422, 429, 500)
       - Headers (Authorization, Content-Type, Accept, Pagination)
    2. Share the spec with all consumers. Get written agreement (PR approval, Slack confirmation).
    3. Generate client SDKs from the spec (openapi-generator).
    4. Write contract tests that verify the implementation matches the spec.
    5. Version the API from day one: /api/v1/... — you WILL need v2 someday.
    6. Never break backward compatibility. Add fields, don't rename or remove.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # API Contract: POST /api/v1/orders (defined BEFORE implementation)
    openapi: "3.0.0"
    paths:
      /api/v1/orders:
        post:
          requestBody:
            content:
              application/json:
                schema:
                  type: object
                  required: [items, shipping_address_id, idempotency_key]
                  properties:
                    items:
                      type: array
                      minItems: 1
                      maxItems: 100
                    shipping_address_id:
                      type: string
                      format: uuid
                    idempotency_key:
                      type: string
                      format: uuid
          responses:
            "201":
              description: Order created
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/Order"
            "422":
              description: Validation error
            "409":
              description: Duplicate idempotency key

    # Consumer agreement: Frontend team approved on 2026-02-20 (PR #1234)
    # Contract test: test_create_order_matches_openapi_spec
  example_bad: |
    # Implementation first, spec never
    @app.post("/orders")  # No versioning
    async def create(data: dict):  # No schema
        return order.__dict__  # Exposes internal fields

    # Frontend discovers API shape by trial and error.
    # Backend changes response shape in a "refactoring" PR.
    # Frontend breaks. "You changed the API!" "It was never documented."
  when_applies: Designing any API endpoint that has external consumers
  sources: ["https://swagger.io/specification/"]

# =============================================================================
# ERROR HANDLING AND DATABASE STRATEGY (PEP-009 to PEP-012)
# =============================================================================

- id: PEP-009
  text: "Error handling strategy must be defined before the first try/except — classify errors by recoverability (transient vs permanent) and audience (user vs developer vs ops). Then handle each category consistently."
  why: >
    Without an error handling strategy, every developer invents their own approach. One returns raw
    exceptions to the API. Another swallows errors silently. A third logs everything at ERROR level,
    making real errors invisible in the noise. The result: inconsistent error responses confuse API
    consumers, silent failures corrupt data, and alert fatigue causes engineers to ignore real
    problems. An error handling strategy defines categories and handlers ONCE, then every developer
    follows the same pattern. This creates consistent API responses, meaningful logs, and actionable
    alerts.
  how_to_do_right: |
    1. Classify errors by recoverability:
       - Transient (retry will fix): network timeout, database lock, rate limit → retry with backoff
       - Permanent (retry won't fix): validation error, not found, auth failure → return error immediately
       - Unknown: log + alert + return 500 (never swallow)
    2. Classify errors by audience:
       - User-facing: sanitized message, no stack trace, actionable ("Please verify your email")
       - Developer-facing: detailed in API error response (error code, field, constraint violated)
       - Ops-facing: full context in logs (stack trace, request ID, user ID, timing)
    3. Create a global exception handler that maps exceptions to HTTP responses.
    4. Create domain-specific exceptions (OrderNotFound, InsufficientStock, PaymentDeclined).
    5. Never: catch Exception silently, return raw stack traces, log at wrong level.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Error handling strategy — implemented as FastAPI exception handlers

    # Domain exceptions (permanent errors)
    class OrderNotFound(DomainError):
        status_code = 404
        user_message = "Order not found"

    class InsufficientStock(DomainError):
        status_code = 409
        user_message = "One or more items are out of stock"

    # Global handler
    @app.exception_handler(DomainError)
    async def domain_error_handler(request, exc):
        return JSONResponse(
            status_code=exc.status_code,
            content={
                "error": exc.__class__.__name__,
                "message": exc.user_message,
                "request_id": request.state.request_id,
            },
        )

    @app.exception_handler(Exception)
    async def unhandled_error_handler(request, exc):
        logger.error("Unhandled error", exc_info=exc, extra={
            "request_id": request.state.request_id,
            "path": request.url.path,
        })
        return JSONResponse(
            status_code=500,
            content={"error": "InternalError", "message": "An unexpected error occurred"},
        )
  example_bad: |
    # No error strategy — each endpoint handles differently
    @app.post("/orders")
    async def create_order(data):
        try:
            return create(data)
        except Exception as e:
            return {"error": str(e)}  # Leaks internal details, wrong status code (200!)

    @app.get("/orders/{id}")
    async def get_order(id):
        order = db.get(id)  # No try/except — raw 500 on any error
        return order
  when_applies: Before writing the first endpoint in any service
  sources: ["https://martinfowler.com/articles/replaceThrowWithNotification.html"]

- id: PEP-010
  text: "Database schema planning is a one-way door — column types, character sets, and constraints are easy to add but painful to change. Get them right in the first migration."
  why: >
    Schema changes in production databases with millions of rows are slow, risky, and sometimes
    impossible without downtime. Changing a column from VARCHAR to TEXT is easy. Changing from TEXT
    to INT requires data transformation. Changing from INT to UUID requires rewriting every foreign
    key. Changing the character set from utf8 to utf8mb4 requires rebuilding every index. These are
    not hypothetical — they are real operations that take hours on large tables and require maintenance
    windows. The cost of getting the schema right in migration #1 is 30 minutes of thought. The cost
    of fixing it in migration #47 is days of planning, testing, and production risk.
  how_to_do_right: |
    1. Use the correct column type from day one:
       - Money: INTEGER (cents), not FLOAT or DECIMAL
       - UUIDs: UUID type (PostgreSQL), not VARCHAR(36)
       - Timestamps: TIMESTAMPTZ (with timezone), not TIMESTAMP
       - Status: ENUM or VARCHAR with CHECK constraint, not unbounded VARCHAR
       - JSON data: JSONB (indexed), not TEXT
    2. Set constraints in the first migration:
       - NOT NULL on required fields (add defaults for existing rows)
       - CHECK constraints for valid ranges (price >= 0, status IN (...))
       - UNIQUE constraints for natural keys (email, slug)
       - Foreign keys for all references (with ON DELETE strategy)
    3. Use UTF-8 (utf8mb4 in MySQL) from day one. No exceptions.
    4. Add indexes for known query patterns. Don't index everything; index what you query.
    5. Review the migration with a DBA or senior engineer before running.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # First migration — correct types from day one
    CREATE TABLE orders (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),  -- UUID, not serial int
        user_id UUID REFERENCES users(id) ON DELETE SET NULL,
        status VARCHAR(20) NOT NULL DEFAULT 'draft'
            CHECK (status IN ('draft', 'confirmed', 'shipped', 'delivered', 'cancelled')),
        total_cents INTEGER NOT NULL DEFAULT 0 CHECK (total_cents >= 0),  -- cents, not float
        currency CHAR(3) NOT NULL DEFAULT 'USD' CHECK (currency ~ '^[A-Z]{3}$'),
        shipping_address JSONB,  -- JSONB for flexible structure with indexing
        created_at TIMESTAMPTZ NOT NULL DEFAULT now(),  -- with timezone
        updated_at TIMESTAMPTZ NOT NULL DEFAULT now(),
        version INTEGER NOT NULL DEFAULT 1  -- optimistic locking
    );

    CREATE INDEX idx_orders_user_id ON orders(user_id);
    CREATE INDEX idx_orders_status ON orders(status) WHERE status NOT IN ('cancelled');
    CREATE INDEX idx_orders_created_at ON orders(created_at DESC);
  example_bad: |
    # First migration — wrong types everywhere
    CREATE TABLE orders (
        id SERIAL,  -- serial int, now every FK migration is painful
        user_id INT,  -- no FK constraint, orphans guaranteed
        status TEXT,  -- no constraint, any string accepted
        total FLOAT,  -- floating point money, rounding errors guaranteed
        currency TEXT,  -- no validation, "dollars", "USD", "$" all accepted
        address TEXT,  -- unstructured string, no indexing possible
        created_at TIMESTAMP  -- no timezone, ambiguous
    );
    -- No indexes. Queries will full-scan at 100K rows.
  when_applies: Creating the first database migration for any feature
  sources: ["https://www.postgresql.org/docs/current/ddl-constraints.html"]

- id: PEP-011
  text: "Migration planning is deployment planning — every migration must have a rollback script, estimated execution time on production data volume, and a go/no-go checklist."
  why: >
    A migration that works on a development database with 100 rows can catastrophically fail on a
    production database with 100 million rows. An ALTER TABLE that takes 50ms locally can lock a
    table for 30 minutes in production. A data backfill that completes in 2 seconds locally can
    exhaust the connection pool in production. Migration planning must account for production data
    volume, concurrent traffic, and rollback scenarios. Without a rollback script, a failed migration
    at 2 AM becomes a "figure it out while the site is down" emergency.
  how_to_do_right: |
    1. For every migration, document:
       - Forward script (the migration itself)
       - Backward script (tested rollback)
       - Estimated execution time on production data volume
       - Locking impact: which tables are locked? For how long?
       - Data impact: how many rows are affected?
    2. Test on a copy of production data (or realistic volume):
       - Time the forward migration
       - Time the backward migration
       - Verify no data loss in forward + backward cycle
    3. Go/no-go checklist:
       - [ ] Rollback script tested
       - [ ] Execution time < maintenance window (or zero-downtime)
       - [ ] No exclusive table locks on high-traffic tables
       - [ ] Application code is backward-compatible with both old and new schema
       - [ ] Monitoring dashboard ready to detect issues
    4. For risky migrations: schedule during low-traffic window, have DBA on call.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Migration Plan: Add email_verified column to users table

    ## Forward
    ALTER TABLE users ADD COLUMN email_verified BOOLEAN NOT NULL DEFAULT false;
    -- Estimated time: <1 second (default value, no data transformation)
    -- Locking: brief ACCESS EXCLUSIVE lock in PostgreSQL
    -- Data impact: 2.3M rows, all set to false

    ## Backward
    ALTER TABLE users DROP COLUMN email_verified;
    -- Estimated time: <1 second

    ## Go/No-Go Checklist
    - [x] Rollback tested on staging (0.3s forward, 0.2s backward)
    - [x] Application code handles both states (column present or absent)
    - [x] No exclusive lock on high-traffic table (users table: 50 writes/sec)
    - [x] Monitoring: Grafana dashboard for users table lock waits
    - [x] DBA reviewed: approved for non-peak deployment

    ## Risk: LOW (add column with default, no data transformation)
  example_bad: |
    # Alembic migration: add column
    # "Just run it, what could go wrong?"
    # Production: ALTER TABLE locks users table for 45 seconds.
    # During lock: all login/registration requests timeout.
    # 45 seconds × 50 requests/second = 2,250 failed requests.
    # No rollback script prepared. Manual rollback takes 20 minutes.
  when_applies: Planning any database migration for a production system
  sources: ["https://martinfowler.com/bliki/EvolutionaryDatabaseDesign.html"]

- id: PEP-012
  text: "Configuration management must be environment-aware from day one — hardcoded values become technical debt on the first deploy. Use a config hierarchy: defaults → env file → env vars → CLI args."
  why: >
    Every value that differs between environments (development, staging, production) must be
    configurable from outside the code. Database URLs, API keys, feature flags, timeouts, batch sizes,
    log levels — all of these change between environments. Hardcoding any of them means either:
    (a) maintaining separate code branches per environment (nightmare), or (b) deploying the same
    configuration everywhere (development API keys in production). A proper config hierarchy provides
    sensible defaults, allows file-based overrides for local development, environment variables for
    containers, and CLI arguments for one-off testing.
  how_to_do_right: |
    1. Define a config hierarchy (lowest to highest priority):
       a. Code defaults: sensible values for local development
       b. .env file: local overrides (git-ignored)
       c. Environment variables: container/deployment configuration
       d. CLI arguments: one-off overrides for testing
    2. Use Pydantic Settings for type-safe configuration:
       - Validates types automatically (int, bool, URL)
       - Supports all sources (env vars, .env files, secrets)
       - Provides clear error messages on missing required config
    3. Never hardcode: URLs, ports, credentials, timeouts, batch sizes, feature flags.
    4. Document every config variable in a .env.example file with descriptions.
    5. Validate config at startup: fail fast if required variables are missing.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Pydantic Settings — type-safe, environment-aware config
    from pydantic_settings import BaseSettings

    class Settings(BaseSettings):
        # Database
        database_url: str = "postgresql://localhost:5432/myapp_dev"
        db_pool_size: int = 5
        db_max_overflow: int = 10

        # Redis
        redis_url: str = "redis://localhost:6379/0"

        # API
        api_host: str = "0.0.0.0"
        api_port: int = 8000
        api_workers: int = 1

        # Feature flags
        feature_order_cancellation: bool = False
        feature_bulk_import: bool = False

        # External services
        payment_gateway_url: str = "https://sandbox.gateway.com"
        payment_gateway_timeout: int = 30

        model_config = SettingsConfigDict(
            env_file=".env",
            env_file_encoding="utf-8",
            case_sensitive=False,
        )

    # Usage: settings = Settings()  # Reads from env vars, .env, then defaults
    # Validation: if DATABASE_URL is malformed, startup fails with clear error
  example_bad: |
    # Hardcoded configuration
    DATABASE_URL = "postgresql://admin:password123@production-db.example.com:5432/myapp"
    PAYMENT_GATEWAY_URL = "https://api.production-gateway.com"  # Production URL in code
    TIMEOUT = 30  # Can't change without code deploy

    # .env file checked into git (with credentials)
    # No .env.example for other developers
    # No validation: typo in env var name → silent fallback to wrong default
  when_applies: Setting up configuration for any application or service
  sources: ["https://12factor.net/config"]

# =============================================================================
# ADVANCED PLANNING STRATEGIES (PEP-013 to PEP-016)
# =============================================================================

- id: PEP-013
  text: "Feature flag strategy is not optional — it's the mechanism that enables incremental deployment, A/B testing, emergency kill switches, and safe rollbacks without code reverts."
  why: >
    Feature flags decouple deployment from release. You can deploy code to production on Monday and
    release the feature to users on Thursday. You can enable the feature for 5% of users, measure
    impact, and roll back in seconds if metrics degrade. You can create a kill switch that disables
    a problematic feature without deploying new code. Without feature flags, every feature launch is
    a big-bang release: either it works for everyone or it breaks for everyone. With feature flags,
    feature launches are gradual, measurable, and reversible. This is the difference between "move
    fast and break things" and "move fast and fix things instantly."
  how_to_do_right: |
    1. Every new user-facing feature gets a feature flag before implementation starts.
    2. Flag naming convention: FEATURE_{DOMAIN}_{NAME} (e.g., FEATURE_ORDER_CANCELLATION).
    3. Flag types:
       - Boolean: on/off (simplest, for most features)
       - Percentage: 0-100% rollout (for gradual releases)
       - User segment: specific users/groups (for beta testing)
    4. Flag lifecycle:
       - Created: when feature development starts
       - Active: during development and rollout
       - Fully enabled: when rollout reaches 100%
       - Removed: after 2 weeks of 100% with no issues (prevent flag debt)
    5. Implementation: simple env var for boolean, LaunchDarkly/Unleash for percentage/segment.
    6. Document every flag: purpose, owner, expected removal date.
    7. Alert on flag count > 20: flag debt accumulates fast.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Feature Flag Registry
    | Flag Name                     | Type    | Owner     | Created    | Status     | Remove By  |
    |-------------------------------|---------|-----------|------------|------------|------------|
    | FEATURE_ORDER_CANCELLATION    | boolean | team-orders | 2026-02-01 | 100% rollout | 2026-03-01 |
    | FEATURE_BULK_IMPORT           | percent | team-data   | 2026-02-15 | 25% rollout  | 2026-04-01 |
    | FEATURE_NEW_SEARCH            | segment | team-search | 2026-02-20 | beta users   | 2026-03-15 |

    # Implementation
    from config import settings

    @app.post("/api/v1/orders/{id}/cancel")
    async def cancel_order(id: UUID):
        if not settings.feature_order_cancellation:
            raise HTTPException(404, "Endpoint not available")
        return await order_service.cancel(id)

    # Kill switch: set FEATURE_ORDER_CANCELLATION=false in env → instant disable
  example_bad: |
    # No feature flags
    # Deploy order cancellation to production → immediately available to all users
    # Bug discovered: cancellation doesn't refund correctly
    # Fix requires: new code → new PR → code review → deploy → 4 hours minimum
    # During those 4 hours: 200 orders cancelled without refunds

    # With flag: set FEATURE_ORDER_CANCELLATION=false → fixed in 30 seconds
  when_applies: Planning any new user-facing feature
  sources: ["https://martinfowler.com/bliki/FeatureToggle.html"]

- id: PEP-014
  text: "Code review preparation starts before writing code — create a reviewable PR by keeping changes small (<300 lines), providing context (what and why), and separating refactoring from feature work."
  why: >
    Code review quality is inversely proportional to PR size. A 50-line PR gets 10 meaningful comments.
    A 500-line PR gets "LGTM." A 2,000-line PR gets reviewed by nobody (rubber-stamped). The
    developer controls review quality by controlling PR size. But small PRs require planning: the
    feature must be broken into independently reviewable increments, refactoring must be separated
    from feature work (mixing them makes both unreviable), and each PR must include enough context
    for the reviewer to understand the "why" without a 30-minute meeting. Code review preparation is
    as important as code writing — a great PR description saves 10x its writing time in review time.
  how_to_do_right: |
    1. PR size limits:
       - Ideal: <150 lines changed (20 minutes to review)
       - Acceptable: <300 lines (45 minutes to review)
       - Max: 500 lines (beyond this, split into multiple PRs)
    2. Separate refactoring from feature work:
       - PR 1: "Refactor: extract pagination utility from order_service" (pure refactoring, no behavior change)
       - PR 2: "Feature: add order cancellation using extracted pagination" (feature only)
    3. PR description template:
       - WHAT: one sentence summary of the change
       - WHY: business context or technical motivation
       - HOW: key design decisions (if non-obvious)
       - TESTING: how to verify it works
       - SCREENSHOTS: for UI changes
    4. Self-review before submitting: read your own diff as if someone else wrote it.
    5. Mark trivial changes: "NIT: renamed variable for clarity" — don't waste reviewer's time.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # PR #1234: Add order cancellation endpoint
    ## What
    Adds POST /api/v1/orders/{id}/cancel with state machine guard and inventory release.

    ## Why
    Users currently cannot cancel orders after placing them. Support handles 50+ cancellation
    requests per day manually. This feature reduces support load by ~80%.

    ## How
    - Uses existing OrderStateMachine for transition validation (no new state machine)
    - Releases inventory reservation via InventoryService.release() (existing method)
    - Triggers refund asynchronously via PaymentService event (eventual consistency)

    ## Testing
    - 12 unit tests for service layer (state transitions, guards, side effects)
    - 4 integration tests for API endpoint (happy path, 404, 409, auth)
    - Manual test: cancel order in staging, verify inventory restored and refund initiated

    Changes: 147 lines across 4 files
    Depends on: PR #1233 (refactoring: extract inventory release method)
  example_bad: |
    # PR #1234: Order stuff
    # Description: "Updated order service"
    # Changes: 1,847 lines across 23 files
    # Includes: refactoring + new feature + bug fix + code formatting
    # Reviewer: scrolls for 30 seconds, types "LGTM", approves
    # Bug ships because the refactoring changed behavior that the feature code relied on
  when_applies: Before submitting any pull request for review
  sources: ["https://google.github.io/eng-practices/review/developer/small-cls.html"]

- id: PEP-015
  text: "Integration points mapping is the pre-flight checklist — for every external system your code touches, document: protocol, authentication, timeout, retry, circuit breaker, fallback, and contract test."
  why: >
    External integrations are the #1 source of production incidents because they are the part of
    your system you don't control. The payment gateway changes their API without notice. The email
    service has an outage. The third-party auth provider introduces rate limits. Each integration
    is a potential failure point, and each needs its own resilience strategy. Without an integration
    map, developers add integrations ad-hoc: one uses retries, another doesn't; one has a timeout,
    another blocks forever; one has a circuit breaker, another hammers a dead service. The integration
    map standardizes resilience patterns across all external dependencies.
  how_to_do_right: |
    1. Create an Integration Map for every external dependency:
       - System name and purpose
       - Protocol (REST, gRPC, AMQP, SMTP)
       - Authentication (API key, OAuth, mTLS)
       - Timeout: connect timeout + read timeout
       - Retry: strategy (exponential backoff), max retries, which errors are retryable
       - Circuit breaker: failure threshold, recovery time, half-open test
       - Fallback: what to do when the system is down (cached data, degraded mode, error to user)
       - Contract test: automated test that verifies the integration contract
       - SLA: expected uptime, response time
    2. Use a shared HTTP client with retry/circuit breaker built in (httpx + tenacity).
    3. Test each integration's failure modes: timeout, 500, 429, network unreachable.
    4. Monitor: track latency and error rate per integration. Alert on degradation.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Integration Map
    | System         | Protocol | Auth      | Timeout | Retry          | Circuit Breaker      | Fallback              |
    |----------------|----------|-----------|---------|----------------|---------------------|-----------------------|
    | Payment GW     | REST     | API Key   | 5s/30s  | 3x exp backoff | 5 failures → open 30s | Queue for retry       |
    | Email Service  | SMTP     | API Key   | 5s/10s  | 2x linear      | 10 failures → open 60s | Queue, send later    |
    | Auth Provider  | OAuth    | Client ID | 3s/5s   | 2x exp backoff | 3 failures → open 15s | Cache valid tokens    |
    | Analytics      | REST     | Bearer    | 2s/5s   | 1x             | 20 failures → open 5m | Drop analytics event  |
    | Inventory Svc  | gRPC     | mTLS      | 1s/3s   | 3x exp backoff | 5 failures → open 30s | Stale cache (5 min)   |

    # Shared client implementation
    payment_client = ResilientClient(
        base_url=settings.payment_gateway_url,
        timeout=httpx.Timeout(connect=5.0, read=30.0),
        retry=RetryConfig(max_retries=3, backoff=ExponentialBackoff()),
        circuit_breaker=CircuitBreaker(failure_threshold=5, recovery_timeout=30),
    )
  example_bad: |
    # Integration: just call it
    response = requests.post("https://api.payment.com/charge", json=data)
    # No timeout → blocks forever if payment gateway is slow
    # No retry → transient 503 causes permanent failure
    # No circuit breaker → hammers dead service with 1000 req/s
    # No fallback → user sees 500 error
    # No monitoring → nobody knows payment gateway has been down for 2 hours
  when_applies: Designing or implementing any integration with an external system
  sources: ["https://martinfowler.com/bliki/CircuitBreaker.html"]

- id: PEP-016
  text: "Deployment planning is not an afterthought — it's a specification deliverable. Specify zero-downtime strategy, rollback procedure, smoke tests, and canary criteria BEFORE writing code."
  why: >
    Deployment is the moment of truth. Every bug in the spec, every gap in testing, every assumption
    in the architecture reveals itself at deployment. A deployment plan that's created 30 minutes
    before deploy is a plan for chaos. A deployment plan created alongside the spec anticipates the
    risks: which database migrations need to run first? Which services need to deploy in order?
    What smoke tests verify the deployment worked? What metrics indicate the deployment should be
    rolled back? These questions have different answers for every feature, and the answers must be
    documented before the code is written, not after.
  how_to_do_right: |
    1. Create a Deployment Plan for every feature that involves:
       - Database migrations
       - Configuration changes (new env vars, feature flags)
       - Service deployments (which services, in what order)
       - Infrastructure changes (new queues, buckets, DNS)
    2. Deployment plan sections:
       a. Pre-deploy: migrations, config changes, infrastructure provisioning
       b. Deploy: service order, canary percentage, health check criteria
       c. Verify: smoke tests (automated), manual sanity checks, metric dashboards
       d. Rollback: trigger criteria, rollback steps, expected downtime
       e. Post-deploy: enable feature flags, notify stakeholders, monitor for 24 hours
    3. Define canary criteria: "If error rate > 1% or p95 latency > 500ms in 10 minutes, auto-rollback."
    4. Test the rollback procedure in staging BEFORE production deploy.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Deployment Plan: Order Cancellation Feature

    ## Pre-Deploy
    1. Run migration: add cancelled_at, cancellation_reason columns (tested, <1s)
    2. Set env var: FEATURE_ORDER_CANCELLATION=false (flag off)

    ## Deploy
    1. Deploy order-service v2.3.0 (contains new endpoint, flag-gated)
    2. Canary: 10% of traffic for 15 minutes
    3. Health check: GET /health returns 200, p95 latency < 200ms, error rate < 0.1%

    ## Verify
    1. Automated smoke test: POST /orders/{test_id}/cancel → 404 (flag is off, expected)
    2. Enable FEATURE_ORDER_CANCELLATION=true for internal users
    3. Manual test: cancel a test order, verify inventory released, refund initiated

    ## Rollback Criteria
    - Error rate > 1% sustained for 5 minutes → auto-rollback
    - p95 latency > 500ms sustained for 10 minutes → auto-rollback
    - Any P1 incident related to orders → manual rollback

    ## Rollback Procedure
    1. Set FEATURE_ORDER_CANCELLATION=false (instant, no deploy needed)
    2. If flag doesn't fix it: redeploy order-service v2.2.0
    3. Migration backward: DROP COLUMN cancelled_at, cancellation_reason

    ## Post-Deploy
    1. Gradual rollout: 10% → 25% → 50% → 100% over 1 week
    2. Monitor: cancellation rate, refund accuracy, support ticket volume
    3. Remove feature flag after 2 weeks at 100% with no issues
  example_bad: |
    # "Deploy plan: merge to main, it'll auto-deploy."
    # Migration locks table for 3 minutes during peak traffic. 500 errors for all users.
    # New endpoint has a bug. No feature flag to disable it.
    # Rollback: revert commit, wait for CI/CD (20 minutes), redeploy.
    # During those 20 minutes: 500 cancelled orders processed incorrectly.
  when_applies: Planning deployment of any feature with infrastructure or schema changes
  sources: ["https://martinfowler.com/bliki/BlueGreenDeployment.html", "https://sre.google/sre-book/release-engineering/"]

# =============================================================================
# MONITORING AND PERFORMANCE BASELINE (PEP-017 to PEP-020)
# =============================================================================

- id: PEP-017
  text: "Monitoring instrumentation is code, not configuration — add metrics, traces, and structured logs DURING implementation, not after. Observability is a feature, not a tax."
  why: >
    Systems without observability are black boxes in production. When something goes wrong (and it
    will), the team's only option is "look at the logs" — unstructured, high-volume, inconsistent
    logs that take hours to parse. Observability instrumented during development is precise, consistent,
    and covers the exact code paths that matter. Observability added after launch is incomplete,
    rushed, and misses the edge cases that actually fail. The cost of adding a metric during
    development is 1 line of code. The cost of adding it during a production incident is hours of
    stress, deployment, and uncertainty.
  how_to_do_right: |
    1. For every service/feature, instrument during development:
       a. Metrics (Prometheus/StatsD):
          - Request rate, latency (p50, p95, p99), error rate per endpoint
          - Business metrics: orders created/hour, payments processed/hour
          - Resource metrics: connection pool usage, queue depth, cache hit rate
       b. Traces (OpenTelemetry):
          - Span per external call (database, HTTP, queue)
          - Span per significant internal operation
          - Propagate trace IDs across services
       c. Structured logs (JSON):
          - Always include: timestamp, level, message, request_id, user_id
          - On error: add exception type, stack trace, input parameters
          - On business event: add event type, entity IDs, old/new values
    2. Create dashboards alongside the feature (not after launch).
    3. Define alerts alongside the feature: "If order creation error rate > 1%, alert P2."
    4. Test instrumentation: verify metrics appear in dashboards during integration testing.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Monitoring instrumented during development
    import structlog
    from prometheus_client import Counter, Histogram

    logger = structlog.get_logger()

    order_created = Counter("orders_created_total", "Total orders created", ["status"])
    order_latency = Histogram("order_creation_seconds", "Order creation latency")

    async def create_order(request: CreateOrderRequest) -> Order:
        with order_latency.time():  # Metric: track latency
            logger.info("order.create.started",  # Structured log
                user_id=str(request.user_id),
                item_count=len(request.items))

            try:
                order = await order_service.create(request)
                order_created.labels(status="success").inc()  # Metric: count success
                logger.info("order.create.completed",
                    order_id=str(order.id),
                    total_cents=order.total_cents)
                return order
            except InsufficientStock as e:
                order_created.labels(status="insufficient_stock").inc()
                logger.warning("order.create.insufficient_stock",
                    product_id=str(e.product_id),
                    requested=e.requested,
                    available=e.available)
                raise
