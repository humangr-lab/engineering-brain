layer: rules
domain: sacada
knowledge:

# =============================================================================
# REQUIREMENT ELICITATION HEURISTICS (PSA-001 to PSA-005)
# =============================================================================

- id: PSA-001
  text: "Start every requirement session by asking 'Who loses money if this is wrong?' — follow the money to find the real requirements hiding behind polite user stories."
  why: >
    Business stakeholders describe features in terms of what they want, not what they need. A requirement
    like "users can place orders" hides dozens of implicit requirements around payment processing,
    inventory reservation, fraud detection, and tax calculation. By asking who loses money, you surface
    the critical paths that must never fail. The finance team will tell you about reconciliation needs
    the product manager never mentioned. The compliance officer will reveal regulatory constraints that
    were assumed but never documented. Money is the universal tracer dye for hidden requirements.
  how_to_do_right: |
    1. For every feature, identify the financial stakeholder: who pays, who gets paid, who loses if it breaks.
    2. Interview the finance/ops team separately from the product team — they see different requirements.
    3. Map every monetary flow: user pays → payment processor → escrow → seller → platform fee.
    4. For each flow, ask: what if it fails midway? What if it's duplicated? What if it's reversed?
    5. Document SLAs in monetary terms: "Each minute of downtime costs $X in lost transactions."
    6. Create a "Financial Impact Matrix" mapping features to revenue/cost impact.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # RF-ORDER-001: Place Order
    Financial stakeholders: Buyer (pays), Seller (receives), Platform (earns fee)
    Financial flows:
    - Buyer → Payment Processor: charge amount + tax
    - Payment Processor → Platform Escrow: amount - processing fee
    - Platform Escrow → Seller: amount - platform fee (after delivery confirmation)
    - Platform Escrow → Platform Revenue: platform fee

    Failure modes with financial impact:
    - Double charge: Must detect via idempotency_key, auto-refund within 5 minutes
    - Partial delivery: Escrow holds funds, dispute resolution triggers
    - Chargeback: Platform absorbs if fraud detection missed it (KPI: <0.1% chargeback rate)
  example_bad: |
    # RF-ORDER-001: Place Order
    Users should be able to place orders and pay for them.
    The system processes the payment and confirms the order.

    # No financial flow mapping, no failure modes, no SLAs.
    # Developer will build happy path only. First chargeback = surprise.
  when_applies: Beginning of any requirement elicitation session
  sources: ["https://www.iiba.org/business-analysis-body-of-knowledge/"]

- id: PSA-002
  text: "Extract implicit requirements by inverting every statement — if the spec says 'users can create accounts', ask 'what about deleting accounts, suspending accounts, merging duplicate accounts?'"
  why: >
    Specs are written in the affirmative: users CAN do X. But every capability implies its inverse,
    its edge cases, and its lifecycle. Account creation implies deletion (GDPR requires it), suspension
    (fraud requires it), recovery (users forget passwords), and deduplication (users create multiple
    accounts). The inversion technique systematically surfaces the 70% of requirements that stakeholders
    assume are obvious but never document. Without inversion, developers implement creation but not
    deletion, resulting in zombie data, compliance violations, and support tickets.
  how_to_do_right: |
    1. For every "user can X" requirement, write: "user can un-X", "admin can force-X", "system auto-X on condition".
    2. For every entity creation, specify: update, soft-delete, hard-delete, archive, restore, merge, split.
    3. For every state transition, specify: the reverse transition, the cancel transition, the timeout transition.
    4. For every permission grant, specify: revocation, expiration, delegation, escalation.
    5. Create an "Inversion Checklist" and run it on every requirement before sign-off.
    6. Track coverage: count affirmative vs. inverse requirements. Ratio should be ~1:1.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # RF-ACCOUNT: Account Lifecycle (from inversion of "create account")
    RF-ACCOUNT-001: User can create account (email + password, OAuth, SSO)
    RF-ACCOUNT-002: User can delete account (GDPR Art. 17, 30-day grace period, data export first)
    RF-ACCOUNT-003: Admin can suspend account (reason required, user notified, auto-reactivate after N days)
    RF-ACCOUNT-004: User can recover account (email reset, SMS fallback, support escalation)
    RF-ACCOUNT-005: System merges duplicate accounts (same email, different OAuth providers)
    RF-ACCOUNT-006: Account auto-suspends after 365 days inactivity (notification at 30, 7, 1 day before)
  example_bad: |
    # RF-ACCOUNT-001: Create Account
    Users can create accounts with email and password.

    # No deletion, suspension, recovery, merge, or lifecycle.
    # 6 months later: GDPR audit fails, duplicate accounts proliferate,
    # support team manually deletes accounts via SQL.
  when_applies: Reviewing any specification for completeness
  sources: ["https://martinfowler.com/articles/lean-inception/write-user-stories.html"]

- id: PSA-003
  text: "Every noun in the spec is a data entity; every verb is an API endpoint — parse the spec linguistically to find missing models and endpoints before writing code."
  why: >
    Natural language specs contain the data model and API surface area in plain sight, but developers
    often jump to implementation without extracting them systematically. The nouns (User, Order, Payment,
    Invoice) become database tables. The verbs (create, approve, cancel, refund) become API endpoints.
    The adjectives (pending, active, expired) become enum states. By parsing the spec linguistically,
    you create a complete inventory of what must exist before writing a single line of code. Missing
    nouns mean missing tables. Missing verbs mean missing endpoints. Missing adjectives mean incomplete
    state machines.
  how_to_do_right: |
    1. Highlight every noun in the spec — each is a candidate data entity (model/table).
    2. Highlight every verb — each is a candidate API endpoint or service method.
    3. Highlight every adjective/state — each is a candidate enum or status field.
    4. Create a cross-reference matrix: entities × operations (CRUD + domain-specific verbs).
    5. Empty cells in the matrix are either intentionally omitted or accidentally missed — verify each.
    6. Group related entities into aggregates (DDD). The spec's paragraph structure often hints at aggregate boundaries.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Linguistic Parse of Spec Section 3.2
    Nouns (entities): User, Order, OrderItem, Product, Payment, Refund, Invoice, Address
    Verbs (endpoints): create, update, cancel, approve, ship, deliver, return, refund
    Adjectives (states): pending, confirmed, shipped, delivered, returned, refunded, cancelled

    Cross-reference matrix:
    | Entity    | create | read | update | delete | approve | cancel | refund |
    |-----------|--------|------|--------|--------|---------|--------|--------|
    | Order     | ✓      | ✓    | ✓      | soft   | ✓       | ✓      | ✓      |
    | Payment   | ✓      | ✓    | —      | —      | —       | —      | ✓      |
    | Invoice   | auto   | ✓    | —      | —      | —       | void   | credit |

    Gap found: spec mentions "refund" verb but no Refund entity — need RefundRequest model.
  example_bad: |
    # Developer reads spec, immediately opens models.py
    # Creates User and Order models based on gut feeling
    # Misses: Invoice, Refund, Address entities
    # Misses: approve, return, void operations
    # 3 sprints later: "we need an invoice model" — major refactor
  when_applies: Before starting data model design for any feature
  sources: ["https://martinfowler.com/bliki/UbiquitousLanguage.html"]

- id: PSA-004
  text: "Ask 'what happens at 3 AM on a Sunday?' for every requirement — if the answer is 'I don't know', the spec is incomplete. Systems run 24/7; specs must too."
  why: >
    Most specs are written during business hours by people who think in business hours. But production
    systems don't sleep. At 3 AM: batch jobs run, cron schedules fire, SSL certificates expire, database
    maintenance windows trigger, traffic patterns shift (different timezone users), and on-call engineers
    are groggy. The 3 AM test forces you to think about operational requirements: monitoring, alerting,
    auto-recovery, graceful degradation, and runbooks. A spec that only describes synchronous user
    interactions misses the entire operational surface area.
  how_to_do_right: |
    1. For every feature, ask: "What happens when no human is watching?"
    2. Specify automated health checks: what to check, frequency, thresholds, alert channels.
    3. Specify auto-recovery: if service X dies, what restarts it? What state is lost? What must be replayed?
    4. Specify batch operations: what runs on schedule? What if it takes longer than expected? What if it overlaps?
    5. Specify maintenance windows: can the system be updated with zero downtime? If not, what's the procedure?
    6. Create a "3 AM Runbook" section: for every alert, document diagnosis steps and fix procedures.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # 3 AM Operations for Payment Service
    ## Automated Health Checks
    - /health endpoint: checks DB, Redis, Payment Gateway connectivity (every 30s)
    - Alert if: >3 consecutive failures → PagerDuty P2
    - Alert if: p95 latency > 500ms for 5 minutes → Slack #payments-alerts

    ## Auto-Recovery
    - Service crash: Kubernetes restarts, max 3 restarts in 5 minutes, then alert P1
    - DB connection pool exhausted: auto-scale pool, alert if >80% for 10 minutes
    - Payment gateway down: circuit breaker opens, queue payments for retry, alert P1

    ## Batch Operations
    - 02:00 UTC: Reconciliation job (compares transactions vs gateway records)
    - If job exceeds 2 hours: alert, do not overlap with next run
    - If discrepancy found: create JIRA ticket, do NOT auto-fix
  example_bad: |
    # Payment Service Spec
    Users can make payments. The system charges their card and confirms.

    # No health checks, no auto-recovery, no batch jobs, no runbooks.
    # 3 AM: payment gateway goes down, no alert fires, users see 500 errors
    # for 4 hours until someone checks their phone in the morning.
  when_applies: Any specification for a system that runs in production
  sources: ["https://sre.google/sre-book/being-on-call/"]

- id: PSA-005
  text: "The best requirements come from production incidents — mine your post-mortems, support tickets, and error logs before writing a single new requirement."
  why: >
    Production incidents are the universe's way of telling you what your spec missed. Every P1 incident,
    every recurring support ticket, every error log pattern represents a requirement that was never
    written or was written ambiguously. Organizations that don't mine their incident history repeat the
    same failures in new systems. The incident database is the most valuable requirements document you
    already have — but nobody reads it during spec writing. A 30-minute review of the last 20 incidents
    will surface more real requirements than a 3-hour brainstorming session.
  how_to_do_right: |
    1. Before writing specs, review the last 50 support tickets for the domain. Categorize by root cause.
    2. Review the last 20 post-mortems. Extract the "what we should have specified" from each.
    3. Search error logs for the top 10 most frequent errors. Each is a requirement gap.
    4. Create a "Lessons from Production" section in every spec, citing specific incidents.
    5. For each incident, write the requirement that would have prevented it.
    6. Tag requirements with incident references: "RF-PAY-007 (from INC-2024-0342)".
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Lessons from Production — Payment Service v2 Spec
    ## From INC-2024-0342: Double charge on timeout
    RF-PAY-007: All payment requests MUST include an idempotency_key (UUID v4).
    The payment gateway MUST reject duplicate idempotency_keys within 24 hours.
    On timeout, the client MUST retry with the SAME idempotency_key.

    ## From TICKET-8291 (recurring, 47 occurrences): "My payment went through but order shows pending"
    RF-PAY-008: Payment confirmation MUST update order status within 5 seconds.
    If async, a reconciliation job MUST run every 60 seconds to sync states.
    Alert if any payment-order mismatch persists for >5 minutes.
  example_bad: |
    # Payment Service v2 Spec
    "We're building a new payment system from scratch."

    # No review of v1 incidents. Same bugs will be reintroduced:
    # - Double charge (happened 12 times in v1)
    # - Payment/order state desync (47 support tickets in v1)
    # - Currency rounding errors (caught by auditor in v1)
  when_applies: Starting specification for any system that has a predecessor or similar domain
  sources: ["https://sre.google/sre-book/postmortem-culture/"]

# =============================================================================
# DEPENDENCY DETECTION (PSA-006 to PSA-008)
# =============================================================================

- id: PSA-006
  text: "Draw the dependency graph BEFORE writing code — if any node has more than 5 incoming edges, it's a God Module and must be split. If any edge is bidirectional, you have a cycle that will bite you."
  why: >
    Dependency graphs reveal architectural problems that are invisible in code reviews. A module with
    6+ dependents is a single point of failure — changing it risks cascading breakage. Bidirectional
    dependencies (A imports B, B imports A) create circular imports, make testing impossible without
    mocking everything, and prevent independent deployment. The dependency graph is the skeleton of
    your architecture. If the skeleton is deformed, no amount of clean code can save the system.
    Drawing it takes 30 minutes. Not drawing it costs weeks of refactoring.
  how_to_do_right: |
    1. Before implementation, list every module/service and draw edges for "depends on" relationships.
    2. Count incoming edges (afferent coupling). If >5, split the module by responsibility.
    3. Count outgoing edges (efferent coupling). If >7, the module knows too much — introduce facades.
    4. Check for cycles. Every cycle must be broken by: extracting an interface, introducing an event, or merging modules.
    5. Identify the "stable" modules (many incoming, few outgoing) — these must change rarely and have strict APIs.
    6. Identify the "volatile" modules (few incoming, many outgoing) — these can change freely.
    7. Ensure dependency direction flows from volatile → stable (Stable Dependencies Principle).
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Dependency Graph — Order Service
    models.py (0 outgoing, 8 incoming) → STABLE, strict API, rarely changes
    order_service.py (4 outgoing, 3 incoming) → MODERATE, test with mocks
    payment_client.py (1 outgoing, 2 incoming) → STABLE adapter
    notification_service.py (2 outgoing, 1 incoming) → VOLATILE, can change freely
    utils.py (0 outgoing, 6 incoming) → STABLE, must be pure functions

    # No cycles detected. Max incoming = 8 (models.py) — acceptable for data layer.
    # Direction: notification → order_service → models ✓ (volatile → stable)
  example_bad: |
    # No dependency graph drawn.
    # 3 months later: circular import between order_service and payment_service.
    # Cannot test either in isolation. Cannot deploy independently.
    # "Quick fix": import inside function body. Now you have 47 inline imports.
  when_applies: Before starting implementation of any multi-module feature
  sources: ["https://martinfowler.com/bliki/CouplingAndCohesion.html"]

- id: PSA-007
  text: "Identify phantom dependencies — requirements that SEEM independent but share a database table, a cache key, a queue, or a deployment pipeline. These are the dependencies that break production."
  why: >
    Architecture diagrams show explicit dependencies (service A calls service B). But the most dangerous
    dependencies are implicit: two services write to the same database table, two features compete for
    the same cache key namespace, two teams deploy through the same pipeline. These phantom dependencies
    are invisible until they collide. Service A's migration breaks Service B's queries. Feature X's
    cache invalidation corrupts Feature Y's cached data. Team Alpha's deploy blocks Team Beta's hotfix.
    You must actively hunt for shared resources because they never appear in spec diagrams.
  how_to_do_right: |
    1. For every feature, list ALL shared resources: databases, tables, cache keys, queues, S3 buckets, env vars.
    2. For each shared resource, identify ALL other features that read or write to it.
    3. Document the contention: "OrderService and ReportingService both read orders table — reports use read replicas."
    4. Specify isolation strategies: separate schemas, key prefixes, dedicated queues, feature-specific buckets.
    5. Add shared resources to the dependency graph with a different color/style.
    6. Create a "Shared Resource Registry" that all teams must consult before using any shared resource.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Phantom Dependency Audit — Sprint S12
    ## Shared Resources Found:
    1. Redis key "user:{id}:session" — used by AuthService AND RateLimiter
       Risk: RateLimiter's EXPIRE command could evict active sessions
       Fix: Separate key namespaces: "auth:session:{id}" vs "rate:limit:{id}"

    2. PostgreSQL table "events" — written by OrderService, AnalyticsService, AuditService
       Risk: Schema migration by any service breaks the others
       Fix: Each service owns its table: order_events, analytics_events, audit_events

    3. SQS queue "notifications" — consumed by EmailService AND PushService
       Risk: Message consumed by wrong service (at-most-once delivery)
       Fix: Separate queues: email-notifications, push-notifications
  example_bad: |
    # Services are "independent" — no shared resources documented.
    # 2 weeks after deploy: Redis OOM because 3 services use same instance
    # with no key expiration coordination. Analytics cache evicts auth sessions.
  when_applies: Analyzing dependencies between any components sharing infrastructure
  sources: ["https://microservices.io/patterns/data/shared-database.html"]

- id: PSA-008
  text: "Temporal dependencies are the silent killers — if Feature B assumes Feature A's data already exists, document the ordering constraint. 'Eventually consistent' is not a plan; it's a prayer."
  why: >
    Modern systems are asynchronous, eventually consistent, and event-driven. This means data arrives
    out of order, events are processed with variable latency, and the state you read may be stale.
    Temporal dependencies — "B needs A's data to exist first" — are the #1 source of race conditions,
    null pointer exceptions, and data corruption. If the spec doesn't explicitly state the ordering
    requirements and what to do when ordering is violated, developers will assume synchronous execution
    in an asynchronous world. The result: intermittent failures that are impossible to reproduce locally.
  how_to_do_right: |
    1. For every data dependency, document: "X MUST exist before Y can proceed."
    2. Specify the enforcement mechanism: foreign key, event ordering, saga, distributed lock.
    3. Specify the failure mode: what happens if X doesn't exist when Y needs it? Retry? Fail? Create default?
    4. For event-driven flows, specify: ordering guarantees, deduplication, idempotency.
    5. For eventually consistent data, specify: maximum acceptable staleness, read-your-writes guarantee, conflict resolution.
    6. Draw a temporal sequence diagram showing the expected order of operations AND the failure scenarios.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Temporal Dependencies — Order Processing
    1. User.create → MUST complete before Order.create (FK constraint)
    2. Order.create → MUST complete before Payment.charge (saga step 1 → 2)
    3. Payment.charge → MUST complete before Inventory.reserve (saga step 2 → 3)
    4. Inventory.reserve → MUST complete before Order.confirm (saga step 3 → 4)

    If step 2 fails: compensate step 1 (cancel order), notify user
    If step 3 fails: compensate step 2 (refund payment), compensate step 1 (cancel order)
    Maximum end-to-end latency: 10 seconds. Alert if >10s for >1% of orders.

    Eventually consistent: Inventory count may be stale by up to 5 seconds.
    Conflict resolution: last-write-wins on inventory, optimistic locking on orders.
  example_bad: |
    # Order flow: create order, charge payment, reserve inventory, confirm.
    # "It all happens in order."
    # Reality: payment webhook arrives before order is fully saved,
    # inventory service reads stale cache, order confirmed with no stock.
  when_applies: Any feature involving multiple sequential or asynchronous operations
  sources: ["https://martinfowler.com/eaaDev/EventSourcing.html"]

# =============================================================================
# DOMAIN IMPLICATION ANALYSIS (PSA-009 to PSA-011)
# =============================================================================

- id: PSA-009
  text: "Every domain has 'tribal knowledge' that never makes it into specs — interview the person who has been there the longest and ask 'what do newcomers always get wrong?'"
  why: >
    Organizations accumulate domain knowledge in people's heads, not in documents. The senior developer
    knows that "the payment gateway returns 200 even on declined transactions — you must check the
    status field." The ops engineer knows that "the database fails over at exactly 2:47 AM UTC because
    that's when the backup cron runs." The support lead knows that "users in Brazil always enter CPF
    in the phone field." This tribal knowledge is critical for correct implementation but is never in
    any spec because everyone who knows it assumes everyone else knows it too. The only way to extract
    it is to ask explicitly.
  how_to_do_right: |
    1. Before writing specs for an existing domain, interview the 2-3 longest-tenured team members.
    2. Ask specifically: "What do newcomers always get wrong in this domain?"
    3. Ask: "What's the weirdest bug you've seen in this system?"
    4. Ask: "What would you change if you could redesign this from scratch?"
    5. Document every answer as an explicit requirement or warning in the spec.
    6. Create a "Tribal Knowledge" section in the spec. Update it as new knowledge surfaces.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Tribal Knowledge — Payment Domain (from interviews 2026-02-15)
    TK-001: Gateway X returns HTTP 200 even for declined transactions.
            MUST check response.status_code AND response.body.transaction_status.
            (Source: Senior Dev, discovered after 3-day production incident in 2024)

    TK-002: Brazilian users enter CPF (11 digits) in phone field.
            MUST validate phone format by country code, not just digit count.
            (Source: Support Lead, 200+ tickets in 2025)

    TK-003: Database failover happens at 02:47 UTC (backup cron).
            MUST NOT run batch jobs between 02:45-02:55 UTC.
            (Source: Ops Engineer, 4 incidents traced to this window)
  example_bad: |
    # Spec written by new team member without interviewing anyone.
    # Assumes payment gateway follows HTTP semantics (it doesn't).
    # Assumes phone number is always 10 digits (it isn't in Brazil).
    # Schedules batch job at 02:50 UTC (during failover window).
  when_applies: Writing specifications for any existing domain or system
  sources: ["https://martinfowler.com/bliki/DomainDrivenDesign.html"]

- id: PSA-010
  text: "Map regulatory implications BEFORE design — GDPR, PCI-DSS, SOX, HIPAA are not features to add later. They are architectural constraints that shape the entire data model."
  why: >
    Compliance requirements are not checkboxes to tick before launch. They are fundamental constraints
    that dictate how data flows, where it's stored, who can access it, and how long it lives. PCI-DSS
    means credit card numbers can never touch your application logs. GDPR means every user entity needs
    a deletion cascade. SOX means financial data needs immutable audit trails. HIPAA means health data
    needs encryption at rest AND in transit with key rotation. Retrofitting compliance into an existing
    architecture is 10-50x more expensive than designing for it upfront. It often requires rewriting
    the data layer entirely.
  how_to_do_right: |
    1. Before any data model design, identify applicable regulations: GDPR, CCPA, PCI-DSS, SOX, HIPAA, LGPD.
    2. For each regulation, extract architectural constraints:
       - Data residency: where can data physically reside?
       - Data retention: how long must data be kept? How quickly must it be deletable?
       - Access control: who can see what? What audit trail is required?
       - Encryption: at rest? In transit? Key management?
    3. Document constraints as non-functional requirements with regulation references.
    4. Design the data model WITH these constraints, not around them.
    5. Create a "Compliance Matrix" mapping entities to applicable regulations.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Compliance Matrix — User Data
    | Entity          | GDPR | LGPD | PCI-DSS | Constraints                              |
    |-----------------|------|------|---------|------------------------------------------|
    | User.email      | Art.17 | Art.18 | N/A   | Must support deletion, export, portability |
    | User.phone      | Art.17 | Art.18 | N/A   | Must support deletion                     |
    | Payment.card_no | N/A  | N/A  | Req 3   | Never store full PAN, tokenize via gateway |
    | Payment.cvv     | N/A  | N/A  | Req 3.2 | MUST NEVER store, even encrypted           |
    | AuditLog.*      | Art.17 exempt | Art.18 exempt | Req 10 | Immutable, 1-year retention |

    Architectural decisions driven by compliance:
    - Soft-delete with 30-day hard-delete cascade (GDPR Art.17)
    - Separate PII database with encryption at rest (LGPD Art.46)
    - Payment data never in application logs (PCI-DSS Req 3.4)
  example_bad: |
    # Data model designed without compliance review.
    # 6 months later:
    # - GDPR audit: "You can't delete users because 14 tables have ON DELETE RESTRICT"
    # - PCI audit: "Full card numbers are in your application logs"
    # - LGPD audit: "User data is replicated to 3 countries without consent"
    # Cost to fix: 3 months of refactoring + legal fines.
  when_applies: Any specification involving user data, payments, or health information
  sources: ["https://gdpr-info.eu/", "https://www.planalto.gov.br/ccivil_03/_ato2015-2018/2018/lei/l13709.htm"]

- id: PSA-011
  text: "Every domain has 'calendar effects' — end-of-month, quarter-close, Black Friday, tax season. Your spec must anticipate 10x-100x load spikes that happen on schedule."
  why: >
    System load is not uniform. E-commerce sees 50x traffic on Black Friday. Financial systems see 10x
    load on month-end and quarter-close. Tax systems see 100x in April. Payroll systems spike on the
    1st and 15th. These spikes are predictable but almost never specified. The system that handles 100
    requests per second on a normal day must handle 5,000 on Black Friday. If the spec doesn't call
    this out, the team will design for average load and discover the problem at the worst possible
    moment. Calendar effects are not edge cases — they are the most important performance requirements.
  how_to_do_right: |
    1. Identify the domain's calendar effects: daily peaks, weekly cycles, monthly spikes, annual events.
    2. Quantify each: "Black Friday: 50x normal traffic for 12 hours", "Month-end: 10x for 48 hours".
    3. Specify scaling strategy for each: auto-scale, pre-warm, queue overflow, graceful degradation.
    4. Define load shedding priorities: what gets slower? What returns cached data? What returns 503?
    5. Create a "Calendar Effects" section with a 12-month view of expected load variations.
    6. Include in testing: load tests must simulate peak, not average.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Calendar Effects — E-commerce Platform
    | Period          | Traffic Multiplier | Duration | Strategy              |
    |-----------------|-------------------|----------|-----------------------|
    | Normal          | 1x (baseline)     | ongoing  | Standard scaling      |
    | Weekend         | 1.5x              | Sat-Sun  | Auto-scale to 150%    |
    | Month-end       | 2x                | Last 3 days | Pre-warm instances |
    | Black Friday    | 50x               | 12 hours | Pre-scale 48h before, queue overflow, disable non-essential features |
    | Christmas week  | 20x               | 7 days   | Pre-scale, read replicas, CDN aggressive cache |

    Load shedding priority (when at capacity):
    P0 (never degrade): Checkout, Payment, Order confirmation
    P1 (queue): Search results, Recommendations
    P2 (cache): Product reviews, User profiles
    P3 (disable): Analytics tracking, A/B testing
  example_bad: |
    # NFR-PERF-001: System handles 100 requests/second.
    # No calendar effects, no spike planning, no load shedding.
    # Black Friday: 5,000 RPS hits, database connection pool exhausted,
    # checkout fails for 4 hours, $2M in lost revenue.
  when_applies: Any specification for a system with predictable traffic patterns
  sources: ["https://sre.google/sre-book/handling-overload/"]

# =============================================================================
# RF DECOMPOSITION AND COMPLETENESS (PSA-012 to PSA-015)
# =============================================================================

- id: PSA-012
  text: "Decompose requirements to the 'one test' level — if you cannot write exactly ONE test that verifies a requirement, it's either too vague or too compound. Split until testable."
  why: >
    Requirements that map to multiple tests are requirements that will be partially implemented. If
    RF-001 says "the system handles user authentication and authorization", one developer implements
    authentication, another implements authorization, and the integration between them is never tested.
    The "one test" rule forces atomic requirements: each requirement has exactly one acceptance test,
    one responsible developer, and one definition of done. This eliminates the ambiguity that causes
    "90% done" sprints where the remaining 10% takes another 90% of the time.
  how_to_do_right: |
    1. For each requirement, attempt to write ONE acceptance test. If you need multiple tests, split the requirement.
    2. Use the format: "GIVEN [context], WHEN [action], THEN [outcome]" — each requirement = one GIVEN/WHEN/THEN.
    3. If the THEN clause has AND, split: "THEN X AND Y" becomes two requirements.
    4. If the WHEN clause has OR, split: "WHEN X OR Y" becomes two requirements.
    5. Name the test alongside the requirement: RF-AUTH-001 → test_auth_001_valid_credentials_return_jwt.
    6. Track the ratio: requirements with tests / total requirements. Target: 100%.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # RF-AUTH-001: Valid credentials return JWT
    GIVEN a registered user with email "user@example.com" and password "Str0ng!Pass"
    WHEN POST /api/v1/auth/login with { email, password }
    THEN response status 200 AND body contains { access_token: JWT, expires_in: 3600 }
    Test: test_auth_001_valid_credentials_return_jwt

    # RF-AUTH-002: Invalid password returns 401
    GIVEN a registered user with email "user@example.com"
    WHEN POST /api/v1/auth/login with { email, wrong_password }
    THEN response status 401 AND body contains { error: "invalid_credentials" }
    Test: test_auth_002_invalid_password_returns_401
  example_bad: |
    # RF-AUTH-001: User Authentication
    The system should handle user authentication including login,
    logout, password reset, and session management.

    # This is 4+ requirements in one. Cannot write one test.
    # Developer implements login, skips session management.
    # Sprint review: "RF-AUTH-001 is done" — but 60% is missing.
  when_applies: Writing or reviewing any functional requirement
  sources: ["https://martinfowler.com/articles/practical-test-pyramid.html"]

- id: PSA-013
  text: "Use the INVEST checklist for every requirement — Independent, Negotiable, Valuable, Estimable, Small, Testable. If a requirement fails any criterion, it's not ready for implementation."
  why: >
    The INVEST criteria are the manufacturing quality control for requirements. Independent means no
    hidden ordering constraints. Negotiable means the team can discuss implementation approaches.
    Valuable means the stakeholder can explain why it matters. Estimable means the team can predict
    effort. Small means it fits in one sprint. Testable means there's an objective pass/fail criterion.
    Requirements that fail INVEST cause sprint failures: dependent requirements block each other,
    non-estimable requirements blow up timelines, non-testable requirements are never "done."
  how_to_do_right: |
    1. For each requirement, run the INVEST checklist explicitly:
       - Independent: Can this be implemented without waiting for another requirement?
       - Negotiable: Is the implementation approach flexible, or is it dictating HOW?
       - Valuable: Can the stakeholder explain the business value in one sentence?
       - Estimable: Can the team estimate effort to within ±50%?
       - Small: Can it be completed within one sprint (2 weeks)?
       - Testable: Is there an objective, automatable pass/fail criterion?
    2. If any criterion fails, fix it before adding to the backlog.
    3. Common fixes: split for Small, add acceptance criteria for Testable, remove dependencies for Independent.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # RF-SEARCH-001: Full-text search returns results within 200ms
    INVEST check:
    [I] Independent: Yes — no dependency on other features
    [N] Negotiable: Yes — can use Elasticsearch, PostgreSQL FTS, or Meilisearch
    [V] Valuable: "Users abandon if search takes >2 seconds" (Product Manager)
    [E] Estimable: 3-5 days (team has done search before)
    [S] Small: Yes — fits in one sprint
    [T] Testable: "GIVEN 1M products, WHEN search 'blue shirt', THEN results in <200ms p95"
    Result: READY for implementation ✓
  example_bad: |
    # RF-SEARCH-001: Implement search functionality
    INVEST check:
    [I] Independent: FAIL — depends on product catalog being migrated
    [N] Negotiable: FAIL — "must use Elasticsearch" (why?)
    [V] Valuable: FAIL — no business justification provided
    [E] Estimable: FAIL — "somewhere between 1 week and 3 months"
    [S] Small: FAIL — includes indexing, search, autocomplete, filters, facets
    [T] Testable: FAIL — no acceptance criteria
    Result: NOT READY — split, add criteria, remove dependency
  when_applies: Before any requirement enters the implementation backlog
  sources: ["https://www.agilealliance.org/glossary/invest/"]

- id: PSA-014
  text: "Spec completeness is measurable — count: functional requirements, non-functional requirements, error cases, integration contracts, state machines, data models. If any category is zero, the spec is incomplete."
  why: >
    Teams argue endlessly about whether a spec is "ready." This is because they use subjective criteria.
    Spec completeness can be measured objectively by counting artifacts in six categories. A spec with
    25 functional requirements, 0 non-functional requirements, and 0 error cases is measurably 33%
    complete (generous estimate). This metric eliminates debate, creates a shared quality bar, and
    gives the team a concrete checklist to fill before implementation begins.
  how_to_do_right: |
    1. Define six required categories: FRs, NFRs, Error Cases, Integration Contracts, State Machines, Data Models.
    2. Count items in each category. Each must have a minimum:
       - Functional Requirements: >= 1 per user-facing feature
       - Non-Functional Requirements: >= 5 (performance, security, availability, scalability, observability)
       - Error Cases: >= 1 per FR (often 3-5 per FR)
       - Integration Contracts: >= 1 per external dependency
       - State Machines: >= 1 per entity with lifecycle (order, payment, user account)
       - Data Models: >= 1 per business entity (ER diagram or schema)
    3. Calculate completeness: categories with items / 6.
    4. Block implementation if completeness < 100% (all categories must have items).
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Spec Completeness Scorecard — Order Service v2
    | Category              | Count | Minimum | Status |
    |-----------------------|-------|---------|--------|
    | Functional Reqs       | 24    | 10      | PASS   |
    | Non-Functional Reqs   | 8     | 5       | PASS   |
    | Error Cases           | 31    | 24      | PASS   |
    | Integration Contracts | 5     | 4       | PASS   |
    | State Machines        | 3     | 2       | PASS   |
    | Data Models           | 7     | 5       | PASS   |

    Completeness: 6/6 = 100% → READY for implementation
  example_bad: |
    # Spec "Completeness" — typical spec review
    "Looks good to me." "Ship it."

    Actual counts: 12 FRs, 0 NFRs, 0 error cases, 0 contracts, 0 state machines, 1 data model.
    Actual completeness: 2/6 = 33%.
    Result: team implements 12 features with no error handling, no performance targets,
    no integration contracts. Production is a surprise party.
  when_applies: Before signing off on any specification document
  sources: ["https://www.iso.org/standard/74528.html"]

- id: PSA-015
  text: "Every requirement must have a 'Definition of Done' that a machine can verify — 'it works' is not a DoD. 'Response time < 200ms at p95 under 1000 concurrent users' is."
  why: >
    Without a machine-verifiable Definition of Done, requirements are never truly done. They're
    "done-ish" — a developer says it works, a QA person eyeballs it, and everyone moves on. Then
    production reveals it doesn't work under load, doesn't handle Unicode, doesn't support the edge
    case the PM forgot to mention. Machine-verifiable DoDs (automated tests, performance benchmarks,
    contract tests) create an objective, repeatable quality gate. If the CI pipeline says it passes,
    it passes. If it doesn't, it doesn't. No arguments, no "works on my machine."
  how_to_do_right: |
    1. For every FR: write an acceptance test that a CI pipeline can run.
    2. For every NFR: define a measurable threshold with a tool that checks it.
    3. For performance: "k6 load test, 1000 VUs, p95 < 200ms, error rate < 0.1%"
    4. For security: "OWASP ZAP scan, 0 high/critical findings"
    5. For accessibility: "axe-core scan, 0 violations on WCAG 2.1 AA"
    6. Encode all DoDs in the CI pipeline. A PR cannot merge if any DoD fails.
    7. Track DoD coverage: requirements with automated DoD / total requirements. Target: 100%.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # RF-SEARCH-001: Full-text search
    Definition of Done (machine-verifiable):
    1. test_search_returns_relevant_results — pytest, asserts top-5 contain expected product
    2. test_search_performance — k6, 500 VUs, p95 < 200ms, p99 < 500ms
    3. test_search_empty_query — pytest, asserts empty query returns 400 with validation error
    4. test_search_sql_injection — OWASP ZAP, 0 SQL injection findings
    5. test_search_xss — OWASP ZAP, 0 XSS findings on search results page

    All 5 checks run in CI. PR blocked if any fails.
  example_bad: |
    # RF-SEARCH-001: Full-text search
    Definition of Done: "Search works correctly."

    # "Correctly" means different things to different people.
    # Developer: "It returns results" ✓
    # QA: "It returns RELEVANT results" — maybe?
    # PM: "It's fast" — how fast?
    # Security: "It's safe" — who checked?
  when_applies: Defining acceptance criteria for any requirement
  sources: ["https://sre.google/sre-book/service-level-objectives/"]

# =============================================================================
# STAKEHOLDER AND PRIORITY ANALYSIS (PSA-016 to PSA-018)
# =============================================================================

- id: PSA-016
  text: "Classify stakeholders by POWER and INTEREST — high-power/high-interest stakeholders define requirements, high-power/low-interest stakeholders can kill your project without warning."
  why: >
    Not all stakeholders are equal. The CEO (high power, low interest) can cancel your project in a
    meeting you weren't invited to. The security team (high power, high interest) can block your
    release at the last minute. The end user (low power, high interest) gives you the best requirements
    but can't protect the project. The compliance officer (high power, variable interest) surfaces
    requirements that override everything else. Understanding the power/interest matrix tells you
    who to interview first, whose requirements are non-negotiable, and who can surprise you at launch.
  how_to_do_right: |
    1. List every stakeholder: product, engineering, security, compliance, ops, support, finance, legal, end users.
    2. Rate each on Power (ability to block or cancel) and Interest (how much they care about this project).
    3. Create a 2x2 matrix:
       - High Power / High Interest: Manage closely, their requirements are non-negotiable.
       - High Power / Low Interest: Keep satisfied, brief them regularly, avoid surprises.
       - Low Power / High Interest: Keep informed, they provide the best domain knowledge.
       - Low Power / Low Interest: Monitor, minimal effort.
    4. Schedule interviews in priority order: HP/HI first, HP/LI second.
    5. For each HP stakeholder, document their "kill criteria" — what would make them block the project.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Stakeholder Power/Interest Matrix — Payment Refactor
    | Stakeholder       | Power | Interest | Strategy                    | Kill Criteria            |
    |-------------------|-------|----------|-----------------------------|--------------------------|
    | CTO               | High  | Low      | Monthly brief, no surprises | Budget overrun > 20%     |
    | Security Lead     | High  | High     | Weekly review, veto power   | Any PCI violation        |
    | Product Manager   | Med   | High     | Daily standup, requirements | Feature regression       |
    | Support Lead      | Low   | High     | Interview for edge cases    | (cannot block)           |
    | Finance (SOX)     | High  | Med      | Quarterly audit prep        | Audit trail incomplete   |

    Interview order: Security Lead → Finance → CTO → PM → Support
  example_bad: |
    # "We talked to the PM, spec is ready."
    # Security finds PCI violation at launch → blocked.
    # CTO discovers budget is 40% over → project paused.
    # Support discovers 3 known issues not addressed → user revolt.
  when_applies: Beginning of any project or major feature specification
  sources: ["https://www.pmi.org/learning/library/stakeholder-analysis-pivotal-practice-projects-8905"]

- id: PSA-017
  text: "Use MoSCoW prioritization with HARD LIMITS — 60% Must, 20% Should, 15% Could, 5% Won't. If Must exceeds 60%, everything is 'critical' and nothing gets prioritized."
  why: >
    When everything is a Must, nothing is a Must. Teams that label 90% of requirements as Must-Have
    face impossible sprints, constant deadline pressure, and inevitable scope cuts without clear
    criteria. The MoSCoW method with hard percentage limits forces genuine prioritization. The 60%
    Must limit means the team must choose which 40% of requirements can wait. This is painful but
    essential — it front-loads the decisions that will otherwise be made in panic during crunch time.
    The 5% Won't is equally important: explicitly stating what you will NOT do prevents scope creep.
  how_to_do_right: |
    1. Classify every requirement: Must, Should, Could, Won't.
    2. Count: if Must > 60% of total, force-rank and demote the bottom ones to Should.
    3. Must = system does not launch without this. Test: "Would we delay launch by 2 weeks for this?" If no, it's Should.
    4. Should = strongly desired, documented justification needed to skip. "90% of users need this."
    5. Could = nice to have, implement if ahead of schedule. "10% of users requested this."
    6. Won't = explicitly out of scope for this release. Document WHY to prevent re-discussion.
    7. Review with HP/HI stakeholders. Their Must requirements override team preferences.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # MoSCoW — Order Service v2 (50 requirements)
    Must (30 = 60%): Core CRUD, payment integration, basic search, auth, error handling
    Should (10 = 20%): Advanced search filters, email notifications, export to CSV
    Could (7 = 14%): Dark mode, bulk operations, advanced analytics
    Won't (3 = 6%): Mobile app, multi-currency, marketplace (deferred to v3)

    Explicitly Won't (with justification):
    - Multi-currency: requires payment gateway upgrade ($50K), deferred to Q3
    - Marketplace: requires legal review (6 months), deferred to v3
    - Mobile app: user research shows 95% desktop usage, revisit after launch
  example_bad: |
    # Priority: Everything is P0
    RF-001: Login (P0)
    RF-002: Search (P0)
    RF-003: Dark mode (P0)
    RF-004: Multi-currency (P0)
    RF-005: Mobile app (P0)

    # 100% is P0. Team tries to do everything. Ships nothing on time.
    # Emergency scope cut: randomly drops features, breaks dependencies.
  when_applies: Prioritizing requirements for any release or sprint
  sources: ["https://www.agilealliance.org/glossary/moscow/"]

- id: PSA-018
  text: "Document 'anti-requirements' explicitly — things the system MUST NOT do. 'The system must not store credit card numbers' is more valuable than 100 positive requirements."
  why: >
    Positive requirements tell developers what to build. Anti-requirements tell them what to avoid.
    Without anti-requirements, well-meaning developers will add features that violate security policies,
    compliance rules, or architectural principles. "The system must not call external APIs synchronously
    in the request path" prevents a common performance mistake. "The system must not log PII" prevents
    a common compliance violation. Anti-requirements are guardrails that prevent the team from driving
    off a cliff while looking at the road ahead. They are especially critical for junior developers
    who don't yet know what not to do.
  how_to_do_right: |
    1. Create an "Anti-Requirements" section with its own numbering: ANT-001, ANT-002, etc.
    2. For security: what data must NEVER be stored, logged, or transmitted?
    3. For performance: what operations must NEVER block the request path?
    4. For architecture: what patterns must NEVER be used (direct DB access from UI, circular dependencies)?
    5. For compliance: what regulations explicitly prohibit certain behaviors?
    6. For each anti-requirement, specify the enforcement mechanism: linter rule, test, code review checklist, runtime check.
    7. Treat anti-requirement violations as P0 bugs — they are architectural debt that compounds.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Anti-Requirements — Payment Service
    ANT-001: MUST NOT store full credit card numbers (PCI-DSS Req 3).
             Enforcement: grep -r for 16-digit patterns in CI, runtime redaction.
    ANT-002: MUST NOT log any PII (email, phone, address) in application logs.
             Enforcement: structured logging with PII-scrubber middleware.
    ANT-003: MUST NOT call payment gateway synchronously in GET endpoints.
             Enforcement: architecture test — assert no HTTP calls in GET handlers.
    ANT-004: MUST NOT use floating-point for monetary calculations.
             Enforcement: linter rule — flag float/double in files matching *payment*.
    ANT-005: MUST NOT return stack traces in API error responses.
             Enforcement: global exception handler, test that asserts no traceback in 4xx/5xx responses.
  example_bad: |
    # No anti-requirements documented.
    # Intern stores full credit card numbers in a VARCHAR column "for debugging."
    # Junior dev logs user emails at DEBUG level "for troubleshooting."
    # Senior dev calls payment gateway in a GET /order/:id endpoint "for real-time status."
    # All technically "correct" code. All violating unwritten rules.
  when_applies: Any specification, especially for security-sensitive or compliance-sensitive systems
  sources: ["https://cheatsheetseries.owasp.org/cheatsheets/Abuse_Case_Cheat_Sheet.html"]

# =============================================================================
# SPEC REVIEW AND TRACEABILITY (PSA-019 to PSA-020)
# =============================================================================

- id: PSA-019
  text: "Every requirement must trace to a business goal AND a test case — requirements without business goals are gold-plating; requirements without test cases are wishes."
  why: >
    Traceability is the connective tissue of good engineering. A requirement that cannot trace to a
    business goal ("why are we building this?") is scope creep. A requirement that cannot trace to a
    test case ("how do we know it works?") is a wish, not a requirement. Bidirectional traceability
    — goal → requirement → test — ensures that everything built serves a purpose and everything
    purposeful is verified. Without it, teams build features nobody asked for while missing features
    everybody needs. Traceability also enables impact analysis: when a business goal changes, you
    can immediately identify affected requirements and tests.
  how_to_do_right: |
    1. Maintain a Traceability Matrix: Business Goal → Requirements → Test Cases.
    2. Every requirement MUST have at least one upward link (to a business goal or user story).
    3. Every requirement MUST have at least one downward link (to a test case or acceptance criterion).
    4. Requirements with no upward link: challenge their existence. Who asked for this? Why?
    5. Requirements with no downward link: they are not requirements yet. Add acceptance criteria.
    6. Review the matrix weekly. Orphaned requirements (no links) are waste — cut or connect them.
    7. When a business goal changes, trace down to find affected requirements and tests.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Traceability Matrix — Order Service
    | Business Goal        | Requirement    | Test Case                        |
    |----------------------|----------------|----------------------------------|
    | BG-001: Reduce cart  | RF-CART-001:   | test_cart_persistence_across_     |
    |   abandonment by 20% |  Save cart     |   sessions                       |
    |                      | RF-CART-002:   | test_cart_reminder_email_sent_    |
    |                      |  Email reminder|   after_24h                      |
    | BG-002: PCI          | RF-PAY-001:    | test_card_number_not_stored      |
    |   compliance         |  Tokenize cards|                                  |
    |                      | ANT-001: No    | test_no_pan_in_logs              |
    |                      |  PAN in logs   |                                  |

    Orphan check: 0 requirements without business goal, 0 without test case.
  example_bad: |
    # 47 requirements in a Google Doc.
    # No link to business goals: "Why are we building feature X?" "Because PM said so."
    # No link to test cases: "How do we know feature X works?" "We'll test it manually."
    # 3 features were never requested by anyone. 5 features have no acceptance criteria.
    # Sprint review: "Is RF-023 done?" "I think so?" "Let's move on."
  when_applies: Maintaining any specification or requirements document
  sources: ["https://www.iso.org/standard/74528.html"]

- id: PSA-020
  text: "Spec review is not 'looks good to me' — use a structured checklist: completeness (all 6 categories), consistency (no contradictions), feasibility (team can build it), testability (every FR has a test)."
  why: >
    "LGTM" is the most dangerous phrase in software engineering. It means "I glanced at this for 30
    seconds and nothing jumped out." Structured spec reviews catch 40% more defects than unstructured
    reviews (empirical data from IEEE studies). The checklist forces the reviewer to examine specific
    dimensions: Are all categories present? Do any requirements contradict each other? Can the team
    actually build this with available technology and skills? Does every requirement have a testable
    criterion? Without a checklist, reviewers unconsciously skip the boring but critical parts.
  how_to_do_right: |
    1. Use a formal review checklist with 4 dimensions:
       a. Completeness: All 6 categories present (FRs, NFRs, errors, contracts, state machines, data models).
       b. Consistency: No two requirements contradict each other. Check NFRs vs FRs especially.
       c. Feasibility: Team has skills, technology, and time for every requirement.
       d. Testability: Every FR has at least one acceptance criterion a machine can verify.
    2. Each dimension gets a PASS/FAIL. All 4 must pass for the spec to be approved.
    3. Record review findings as spec defects. Track defect density per spec.
    4. Re-review after fixes. Do not approve with open defects.
    5. Track review effectiveness: defects found in review vs. defects found in production.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Spec Review — Order Service v2 (Reviewer: Tech Lead, 2026-02-20)
    ## Completeness: PASS
    - FRs: 24 ✓ | NFRs: 8 ✓ | Errors: 31 ✓ | Contracts: 5 ✓ | States: 3 ✓ | Models: 7 ✓

    ## Consistency: FAIL (2 issues)
    - ISSUE-1: RF-ORDER-005 says "orders are immutable after confirmation"
      but RF-ORDER-012 says "admin can edit confirmed orders." CONTRADICTION.
    - ISSUE-2: NFR-PERF-001 says "p95 < 200ms" but RF-SEARCH-003 requires
      full-text search across 10M records — feasibility concern.

    ## Feasibility: PASS (with note)
    - Note: RF-ML-001 (fraud detection) requires ML expertise. Team has none. Plan: external consultation.

    ## Testability: PASS
    - 24/24 FRs have acceptance criteria. 100% DoD coverage.

    Verdict: FIX 2 consistency issues, then re-review.
  example_bad: |
    # Spec Review
    # Reviewer: "Looks good, approve."
    # Time spent: 2 minutes on a 30-page spec.
    # Contradictions between RF-005 and RF-012 not caught.
    # Developer implements RF-005, other implements RF-012.
    # Production: orders are both immutable AND editable. Data corruption.
  when_applies: Any formal review of a specification document
  sources: ["https://ieeexplore.ieee.org/document/720574"]
