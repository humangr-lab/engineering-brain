layer: rules
technology: Bitcoin
domain: blockchain
knowledge:
- id: CR-BTC-UTXO-001
  text: Understand the UTXO model — Bitcoin has no accounts or balances, only unspent transaction outputs that are consumed
    entirely.
  why: Unlike Ethereum's account model, Bitcoin tracks value as discrete UTXOs. Each UTXO must be consumed entirely — you
    can't spend half. The remainder goes back to you as a change output. Failing to create a change output means the difference
    goes to the miner as an implicit fee. Developers from account-model blockchains frequently lose funds by forgetting change
    outputs.
  how_to_do_right: Always create a change output when the sum of inputs exceeds the desired payment + fee. Calculate fee first,
    then change = sum(inputs) - payment - fee. Use coin selection algorithms (branch-and-bound, knapsack) to minimize inputs
    and change.
  severity: critical
  technologies:
    library: [bitcoin core]
    platform: [bitcoin]
  domains:
    domain: [architecture, blockchain]
    concern: [fundamentals]
  example_good: "// Pseudocode — proper UTXO spending with change\nconst inputs = selectUTXOs(utxoSet, targetAmount + estimatedFee);\n\
    const totalInput = inputs.reduce((sum, utxo) => sum + utxo.value, 0);\nconst fee = estimateFee(inputs.length, 2); // 2\
    \ outputs: payment + change\nconst change = totalInput - targetAmount - fee;\n\nconst tx = new Transaction();\ninputs.forEach(utxo\
    \ => tx.addInput(utxo));\ntx.addOutput(recipientAddress, targetAmount); // Payment\nif (change > DUST_THRESHOLD) {\n \
    \   tx.addOutput(changeAddress, change);       // Change back to self\n}\n// If change < DUST_THRESHOLD, it's added to\
    \ fee (acceptable loss)\n"
  example_bad: '// CATASTROPHIC: no change output

    const tx = new Transaction();

    tx.addInput(utxo); // utxo.value = 1 BTC

    tx.addOutput(recipient, 0.001); // Send 0.001 BTC

    // Missing change output! 0.999 BTC goes to miner as fee!

    '
  when_applies: Any project using Bitcoin protocol/network or Bitcoin Core
  when_not_applies: traditional web2 applications, centralized systems. projects not using Bitcoin or Bitcoin Core
  sources: ["https://developer.bitcoin.org/devguide/transactions.html"]
- id: CR-BTC-UTXO-002
  text: Implement proper coin selection to minimize transaction fees and avoid creating dust outputs.
  why: Naive coin selection (largest-first or random) creates unnecessary inputs (higher fees) or tiny change outputs (dust).
    Dust outputs (below ~546 satoshis for P2PKH) are uneconomical to spend — their fee exceeds their value. Over time, a wallet
    with many dust UTXOs becomes expensive to consolidate. Bitcoin Core's branch-and-bound algorithm finds exact matches when
    possible, avoiding change entirely.
  how_to_do_right: Try exact match first (branch-and-bound). If no exact match, use lowest-larger to minimize change. Consolidate
    small UTXOs during low-fee periods. Never create outputs below dust threshold (546 sats for P2PKH, 294 sats for P2WPKH).
  severity: high
  technologies:
    library: [bitcoin core]
    platform: [bitcoin]
  domains:
    domain: [architecture, blockchain]
    concern: [gas_optimization]
  example_good: "// Branch-and-bound: try to find exact match (no change needed)\nfunction selectCoins(utxos, target, feeRate)\
    \ {\n    // Try exact match first — no change output = lower fee\n    const exactMatch = branchAndBound(utxos, target,\
    \ feeRate);\n    if (exactMatch) return { inputs: exactMatch, change: 0 };\n\n    // Fallback: lowest-larger with change\n\
    \    const sorted = utxos.sort((a, b) => a.value - b.value);\n    const selected = [];\n    let total = 0;\n    for (const\
    \ utxo of sorted) {\n        selected.push(utxo);\n        total += utxo.value;\n        const fee = estimateFee(selected.length,\
    \ 2, feeRate);\n        if (total >= target + fee + DUST_THRESHOLD) {\n            return { inputs: selected, change:\
    \ total - target - fee };\n        }\n    }\n    throw new Error(\"Insufficient funds\");\n}\n"
  example_bad: '// Naive: always use largest UTXO — wastes fee on large inputs

    const largest = utxos.sort((a, b) => b.value - a.value)[0];

    // Creates unnecessary change, doesn''t try exact match

    '
  when_applies: Projects using Bitcoin protocol/network or Bitcoin Core
  when_not_applies: traditional web2 applications, centralized systems. projects not using Bitcoin or Bitcoin Core
  sources: ["https://github.com/bitcoin/bitcoin/blob/master/src/wallet/coinselection.cpp"]
- id: CR-BTC-SCRIPT-001
  text: Use native SegWit (P2WPKH/P2WSH — bech32) or Taproot (P2TR — bech32m) for all new addresses — never legacy P2PKH.
  why: SegWit reduces transaction weight by ~40% compared to legacy P2PKH, directly reducing fees. Taproot (P2TR) adds another
    ~15% savings for single-sig and massive savings for complex scripts (multisig, timelocks). Legacy addresses waste fee
    money on every transaction. A wallet generating P2PKH addresses in 2024+ is costing users 40%+ more in fees.
  how_to_do_right: Generate bc1q (P2WPKH) addresses for single-sig wallets. Use bc1p (P2TR/Taproot) for new deployments —
    best privacy and efficiency. Use P2WSH (bc1q, longer) for multisig scripts. Never generate 1-prefix (P2PKH) or 3-prefix
    (P2SH) addresses for new applications.
  severity: high
  technologies:
    platform: [bitcoin]
  domains:
    domain: [architecture, blockchain]
    concern: [gas_optimization]
  example_good: '// Generate native SegWit (bech32) address — 40% cheaper fees

    const { p2wpkh } = require("bitcoinjs-lib").payments;

    const address = p2wpkh({ pubkey: publicKey, network }).address;

    // Result: bc1qw508d6qejxtdg4y5r3zarvary0c5xw7kv8f3t4


    // Even better: Taproot (bech32m) — best privacy + efficiency

    const { p2tr } = require("bitcoinjs-lib").payments;

    const taprootAddress = p2tr({ internalPubkey: xOnlyPubkey, network }).address;

    // Result: bc1p5cyxnuxmeuwuvkwfem96lqzszee2456kzl8wp2

    '
  example_bad: '// Legacy P2PKH — 40%+ more expensive, no privacy benefits

    const { p2pkh } = require("bitcoinjs-lib").payments;

    const address = p2pkh({ pubkey: publicKey, network }).address;

    // Result: 1A1zP1eP5QGefi2DMPTfTL5SLmv7DivfNa (legacy)

    '
  when_applies: Projects using Bitcoin protocol/network
  when_not_applies: traditional web2 applications, centralized systems. projects not using Bitcoin
  sources: ["https://github.com/bitcoin/bips/blob/master/bip-0141.mediawiki", "https://github.com/bitcoin/bips/blob/master/bip-0341.mediawiki"]
- id: CR-BTC-LN-001
  text: Implement proper Lightning invoice handling — always check amount, expiry, and payment hash before paying.
  why: 'Lightning invoices (BOLT 11) contain the payment hash, amount, expiry, and routing hints. Paying without verification
    risks: sending to wrong recipient (payment hash mismatch), overpaying (amount not checked), paying expired invoices (funds
    stuck in HTLCs for hours), or falling for invoice reuse attacks.'
  how_to_do_right: Decode the invoice, verify the amount matches expected, check expiry has reasonable time remaining, verify
    the payment hash is fresh (not reused). For receiving, generate unique invoices per payment — never reuse payment hashes.
  severity: high
  technologies:
    library: [lightning network]
    platform: [bitcoin]
  domains:
    domain: [architecture, blockchain]
    concern: [payments]
  example_good: "// Decode and verify before paying\nconst decoded = bolt11.decode(invoice);\n\n// Verify amount matches expected\n\
    if (decoded.satoshis !== expectedAmount) {\n    throw new Error(`Amount mismatch: ${decoded.satoshis} vs ${expectedAmount}`);\n\
    }\n\n// Check expiry — require at least 60 seconds remaining\nconst expiresAt = decoded.timestamp + decoded.timeExpireDate;\n\
    if (Date.now() / 1000 > expiresAt - 60) {\n    throw new Error(\"Invoice expired or expiring too soon\");\n}\n\n// Verify\
    \ payment hash is unique (prevent replay)\nif (usedPaymentHashes.has(decoded.paymentHash)) {\n    throw new Error(\"Payment\
    \ hash already used — possible replay\");\n}\n\nawait lnd.payInvoice({ paymentRequest: invoice, maxFeeSat: maxFee });\n"
  example_bad: '// DANGEROUS: paying without any verification

    await lnd.payInvoice({ paymentRequest: invoice });

    // No amount check — could be 10x expected

    // No expiry check — could be expired (funds stuck)

    // No hash check — could be replay attack

    '
  when_applies: Projects using Bitcoin protocol/network or Lightning Network
  when_not_applies: traditional web2 applications, centralized systems. projects not using Bitcoin or Lightning Network
  sources: ["https://github.com/lightning/bolts/blob/master/11-payment-encoding.md"]
- id: CR-BTC-LN-002
  text: Implement proper channel capacity management — maintain inbound and outbound liquidity for bidirectional payments.
  why: A Lightning channel has fixed capacity split between local (outbound) and remote (inbound) balance. A channel with
    100% local balance can send but not receive. A channel with 100% remote balance can receive but not send. Merchants need
    inbound liquidity to receive payments. Routing nodes need balanced channels to route in both directions.
  how_to_do_right: Open channels with adequate capacity for expected volume. Use circular rebalancing or submarine swaps to
    shift liquidity. Request inbound liquidity from LSPs (Lightning Service Providers). Monitor channel balances and rebalance
    proactively. Set fee policies that encourage natural rebalancing.
  severity: medium
  technologies:
    library: [lightning network]
    platform: [bitcoin]
  domains:
    domain: [architecture, blockchain]
    concern: [payments]
  example_good: "// Monitor channel balance and trigger rebalancing\nasync function checkChannelHealth(channels) {\n    for\
    \ (const channel of channels) {\n        const ratio = channel.localBalance / channel.capacity;\n        if (ratio < 0.2\
    \ || ratio > 0.8) {\n            // Channel is unbalanced — trigger circular rebalance\n            await circularRebalance({\n\
    \                channelId: channel.id,\n                targetRatio: 0.5,\n                maxFeePpm: 500, // Max 500\
    \ ppm fee for rebalancing\n            });\n        }\n    }\n}\n\n// Use submarine swap for on-chain ↔ Lightning liquidity\n\
    // When outbound depleted: swap on-chain BTC into Lightning\n// When inbound depleted: swap Lightning out to on-chain\n"
  example_bad: '// Opening channel and never managing liquidity

    await lnd.openChannel({ nodePubkey: peer, localFundingAmount: 1_000_000 });

    // After spending 1M sats through this channel:

    // localBalance = 0, remoteBalance = 1M — can only receive, not send

    // No rebalancing strategy — channel becomes one-directional

    '
  when_applies: Projects using Bitcoin protocol/network or Lightning Network
  when_not_applies: traditional web2 applications, centralized systems. projects not using Bitcoin or Lightning Network
  sources: ["https://lightning.engineering/posts/2023-12-28-liquidity-management/"]
- id: CR-BTC-TAPROOT-001
  text: Use Taproot (P2TR) for multisig and complex scripts — the key-path spend is indistinguishable from single-sig, providing
    superior privacy.
  why: With legacy multisig (P2SH/P2WSH), the script is revealed on-chain when spent, showing it's multisig and how many signers.
    Taproot's key-path spend using MuSig2 aggregated keys looks identical to a single-sig P2TR spend on-chain. Only if the
    key-path fails does the script-path reveal the complexity. This means 2-of-3 multisig looks the same as a single person
    paying — massive privacy improvement.
  how_to_do_right: Use MuSig2 for key aggregation — aggregate all signer public keys into a single Taproot internal key. The
    key-path spend requires all signers to produce a joint Schnorr signature. Place fallback scripts (threshold, timelock
    recovery) in the Taproot script tree. Most cooperative spends use key-path (cheap + private).
  severity: medium
  technologies:
    library: [taproot, schnorr]
    platform: [bitcoin]
  domains:
    domain: [architecture, blockchain, security]
    concern: [privacy]
  example_good: "// MuSig2 key aggregation for Taproot key-path spend\n// Cooperative case: all signers produce joint signature\n\
    // On-chain: looks identical to single-sig P2TR\n\n// Internal key = aggregate(pubkey1, pubkey2, pubkey3)\nconst { MuSig2\
    \ } = require(\"@noble/secp256k1\");\nconst aggPubkey = MuSig2.keyAgg([pk1, pk2, pk3]);\n\n// Script tree for fallback\
    \ (2-of-3 threshold)\nconst scriptTree = {\n    leaf: bitcoin.script.compile([\n        pk1, OP_CHECKSIG,\n        pk2,\
    \ OP_CHECKSIGADD,\n        pk3, OP_CHECKSIGADD,\n        OP_2, OP_NUMEQUAL,\n    ]),\n};\n\n// Create P2TR output with\
    \ key-path (MuSig2) + script-path (2-of-3)\nconst p2tr = payments.p2tr({\n    internalPubkey: aggPubkey,\n    scriptTree,\n\
    \    network,\n});\n"
  example_bad: "// Legacy multisig — reveals script structure on-chain\nconst p2sh = payments.p2sh({\n    redeem: payments.p2ms({\n\
    \        m: 2, pubkeys: [pk1, pk2, pk3], // Visible on-chain: \"2-of-3 multisig\"\n    }),\n});\n// When spent, blockchain\
    \ shows: OP_2 <pk1> <pk2> <pk3> OP_3 OP_CHECKMULTISIG\n"
  when_applies: Projects using Bitcoin protocol/network, Taproot, or Schnorr
  when_not_applies: traditional web2 applications, centralized systems
  sources: ["https://github.com/bitcoin/bips/blob/master/bip-0341.mediawiki", "https://github.com/bitcoin/bips/blob/master/bip-0327.mediawiki"]
- id: CR-BTC-PSBT-001
  text: Use PSBTs (Partially Signed Bitcoin Transactions) for multi-party signing workflows — never pass raw private keys
    between signers.
  why: PSBT (BIP-174) is the standard for coordinating transaction signing across multiple parties, devices, or steps. Without
    PSBT, you'd need to pass private keys between signers (catastrophic security failure) or build custom serialization (interoperability
    nightmare). Hardware wallets, multisig coordinators, and CoinJoin implementations all depend on PSBT.
  how_to_do_right: Create PSBT with all inputs and outputs. Each signer adds their signature to the PSBT and passes it on.
    Use combinePsbt to merge signatures from different signers. Finalize the PSBT when all required signatures are present.
    Extract the raw transaction and broadcast.
  severity: high
  technologies:
    platform: [bitcoin]
  domains:
    domain: [architecture, blockchain, security]
  example_good: "const bitcoin = require(\"bitcoinjs-lib\");\n\n// Creator: build PSBT with inputs and outputs\nconst psbt\
    \ = new bitcoin.Psbt({ network });\npsbt.addInput({\n    hash: utxo.txid,\n    index: utxo.vout,\n    witnessUtxo: { script:\
    \ utxo.script, value: utxo.value },\n});\npsbt.addOutput({ address: recipient, value: amount });\npsbt.addOutput({ address:\
    \ changeAddr, value: change });\n\n// Signer 1: signs their input\npsbt.signInput(0, signer1KeyPair);\n\n// Pass PSBT\
    \ to Signer 2 (serialized, NO private keys transmitted)\nconst psbtBase64 = psbt.toBase64();\n// ... send to signer 2\
    \ via any channel ...\n\n// Signer 2: signs their input\nconst psbt2 = bitcoin.Psbt.fromBase64(psbtBase64);\npsbt2.signInput(0,\
    \ signer2KeyPair);\n\n// Finalize and broadcast\npsbt2.finalizeAllInputs();\nconst rawTx = psbt2.extractTransaction().toHex();\n\
    await broadcast(rawTx);\n"
  example_bad: '// CATASTROPHIC: passing private keys for signing

    const signedTx = signTransaction(rawTx, signer1PrivateKey, signer2PrivateKey);

    // Private keys must NEVER leave their respective devices

    '
  when_applies: Projects using Bitcoin protocol/network
  when_not_applies: traditional web2 applications, centralized systems. projects not using Bitcoin
  sources: ["https://github.com/bitcoin/bips/blob/master/bip-0174.mediawiki"]
- id: CR-BTC-FEE-001
  text: Estimate fees based on mempool analysis and target confirmation time — never use hardcoded fee rates.
  why: Bitcoin fee rates fluctuate from 1 sat/vB (quiet) to 500+ sat/vB (congestion). A hardcoded fee rate either overpays
    (wasting money during quiet periods) or underpays (transaction stuck for hours/days during congestion). In December 2023,
    fees spiked to 600 sat/vB — hardcoded 10 sat/vB transactions waited weeks.
  how_to_do_right: Use estimatesmartfee RPC or mempool.space API for fee estimation. Implement RBF (Replace-By-Fee) to bump
    stuck transactions. Support target confirmation time selection (next block = higher fee, 6 blocks = lower). Always enable
    RBF signaling (nSequence < 0xFFFFFFFE) for fee bumping ability.
  severity: high
  technologies:
    library: [bitcoin core]
    platform: [bitcoin]
  domains:
    domain: [architecture, blockchain]
    concern: [gas_optimization]
  example_good: "// Dynamic fee estimation with confirmation target\nasync function estimateFee(targetBlocks = 3) {\n    //\
    \ Option 1: Bitcoin Core RPC\n    const estimate = await rpc.estimateSmartFee(targetBlocks);\n    const satPerVB = Math.ceil(estimate.feerate\
    \ * 100_000); // BTC/kB → sat/vB\n\n    // Option 2: Mempool.space API\n    const response = await fetch(\"https://mempool.space/api/v1/fees/recommended\"\
    );\n    const fees = await response.json();\n    // { fastestFee: 45, halfHourFee: 30, hourFee: 20, economyFee: 10 }\n\
    \n    return fees;\n}\n\n// Enable RBF signaling for fee bumping\npsbt.addInput({\n    hash: utxo.txid, index: utxo.vout,\n\
    \    sequence: 0xFFFFFFFD, // RBF enabled (< 0xFFFFFFFE)\n});\n"
  example_bad: '// Hardcoded fee — will either overpay or get stuck

    const FEE_RATE = 10; // sat/vB — works today, stuck tomorrow

    '
  when_applies: Projects using Bitcoin protocol/network or Bitcoin Core
  when_not_applies: traditional web2 applications, centralized systems. projects not using Bitcoin or Bitcoin Core
  sources: ["https://developer.bitcoin.org/reference/rpc/estimatesmartfee.html"]
- id: CR-BTC-KEY-001
  text: Use hierarchical deterministic (HD) wallets with BIP-84 (SegWit) or BIP-86 (Taproot) derivation paths — never reuse
    addresses.
  why: Address reuse destroys privacy — all transactions to/from that address are linked. HD wallets (BIP-32) generate unlimited
    addresses from a single seed, each cryptographically independent. BIP-44/49/84/86 standardize derivation paths so wallets
    can be recovered from any BIP-39 compatible software. Without HD wallets, key backup is per-address — losing one key =
    losing those funds.
  how_to_do_right: Generate a BIP-39 mnemonic (12/24 words). Derive keys using BIP-84 (m/84'/0'/0'/0/n) for SegWit or BIP-86
    (m/86'/0'/0'/0/n) for Taproot. Generate a new address for each receive. Use a gap limit of 20 for address discovery during
    recovery.
  severity: critical
  technologies:
    platform: [bitcoin]
  domains:
    domain: [architecture, blockchain, security]
  example_good: "const bip39 = require(\"bip39\");\nconst { BIP32Factory } = require(\"bip32\");\nconst bitcoin = require(\"\
    bitcoinjs-lib\");\n\n// Generate mnemonic (store securely — this IS the wallet)\nconst mnemonic = bip39.generateMnemonic(256);\
    \ // 24 words\n\n// Derive HD wallet — BIP-84 for native SegWit\nconst seed = bip39.mnemonicToSeedSync(mnemonic);\nconst\
    \ root = bip32.fromSeed(seed);\n\n// BIP-84 derivation: m/84'/0'/0'/0/index\nfunction getAddress(index) {\n    const child\
    \ = root.derivePath(`m/84'/0'/0'/0/${index}`);\n    return bitcoin.payments.p2wpkh({\n        pubkey: child.publicKey,\n\
    \        network: bitcoin.networks.bitcoin,\n    }).address;\n}\n\n// New address for each receive — never reuse\nconst\
    \ addr0 = getAddress(0); // bc1q...\nconst addr1 = getAddress(1); // bc1q... (different)\n"
  example_bad: '// Single keypair — reuse same address for everything

    const keyPair = ECPair.makeRandom();

    const address = getAddress(keyPair); // Same address forever

    // Privacy destroyed: all transactions linked

    // Key loss = total fund loss (no recovery from seed)

    '
  when_applies: Any project using Bitcoin protocol/network
  when_not_applies: traditional web2 applications, centralized systems. projects not using Bitcoin
  sources: ["https://github.com/bitcoin/bips/blob/master/bip-0084.mediawiki", "https://github.com/bitcoin/bips/blob/master/bip-0032.mediawiki"]
- id: CR-BTC-KEY-002
  text: Protect seed phrases with Shamir Secret Sharing (SLIP-39) for high-value wallets — single backup point is a single
    failure point.
  why: 'A BIP-39 seed phrase stored in one location has two catastrophic failure modes: physical loss (fire, flood, theft)
    destroys access to all funds; physical discovery by an attacker gives complete control. Shamir Secret Sharing splits the
    seed into N shares where any M are needed to reconstruct — distributing risk across multiple secure locations.'
  how_to_do_right: Use SLIP-39 to split the master secret into shares (e.g., 3-of-5). Store each share in a different secure
    location (bank safe deposit boxes, trusted family members, geographically distributed). Test recovery before funding.
    Consider multi-vendor hardware wallets for operational keys.
  severity: high
  technologies:
    platform: [bitcoin]
  domains:
    domain: [architecture, blockchain, security]
  example_good: "// SLIP-39 Shamir Secret Sharing — 3-of-5 threshold\nconst slip39 = require(\"slip39\");\n\nconst masterSecret\
    \ = generateMasterSecret(); // 32 bytes\n\n// Split into 5 shares, any 3 can reconstruct\nconst shares = slip39.generate({\n\
    \    threshold: 3,\n    shareCount: 5,\n    masterSecret,\n    passphrase: \"\", // Optional additional protection\n});\n\
    \n// Distribute shares to 5 different secure locations:\n// Share 1 → Home safe\n// Share 2 → Bank safe deposit box\n\
    // Share 3 → Trusted family member\n// Share 4 → Lawyer's safe\n// Share 5 → Geographically distant secure storage\n\n\
    // Recovery: any 3 shares reconstruct the master secret\nconst recovered = slip39.recover(\n    [shares[0], shares[2],\
    \ shares[4]], // Any 3 of 5\n    passphrase,\n);\n"
  example_bad: '// Single seed phrase written on paper in desk drawer

    // Loss: fire/flood = funds gone forever

    // Theft: anyone who finds it controls all funds

    // No redundancy, no geographic distribution

    '
  when_applies: Projects using Bitcoin protocol/network
  when_not_applies: traditional web2 applications, centralized systems. projects not using Bitcoin
  sources: ["https://github.com/satoshilabs/slips/blob/master/slip-0039.md"]
- id: CR-BTC-ORD-001
  text: Understand ordinal theory and inscription costs before building on Ordinals — each inscription is a permanent on-chain
    data commitment.
  why: Inscriptions store data directly in Bitcoin's witness data, paying full transaction fees for every byte. A 100KB image
    costs $50-500+ depending on fee rate. Unlike IPFS/Arweave, this data is immutably stored by every full node forever. Building
    a high-volume inscription service without understanding costs can result in enormous, unrecoverable expenses. Also, inscribed
    satoshis must be tracked carefully to avoid accidentally spending them as fees.
  how_to_do_right: 'Calculate inscription cost before committing: (data_size * fee_rate). Use content-type headers for proper
    rendering. Track inscribed satoshis in wallet to prevent accidental spending. Consider recursive inscriptions to reference
    existing on-chain data instead of duplicating. Use ordinals-aware wallet software (ord, Sparrow) for inscription management.'
  severity: medium
  technologies:
    library: [ordinals]
    platform: [bitcoin]
  domains:
    domain: [architecture, blockchain]
    concern: [nft]
  example_good: "// Calculate inscription cost before committing\nfunction estimateInscriptionCost(dataBytes, feeRate) {\n\
    \    // Inscription overhead: ~10 vBytes for envelope\n    // Data in witness: 1 vByte per 4 bytes of data (witness discount)\n\
    \    const witnessVBytes = Math.ceil(dataBytes / 4);\n    const totalVBytes = witnessVBytes + 10 + 68; // + input/output\
    \ overhead\n    const feeSats = totalVBytes * feeRate;\n    return {\n        feeSats,\n        feeBTC: feeSats / 1e8,\n\
    \        feeUSD: (feeSats / 1e8) * btcPrice,\n        warning: dataBytes > 50000 ? \"Large inscription — consider IPFS\"\
    \ : null,\n    };\n}\n\n// Track inscribed satoshis — never spend as fees\n// Use UTXO labels or inscription-aware wallet\n"
  example_bad: '// Inscribing 400KB image without cost check

    await inscribe(largeImage); // Could cost $2000+ at high fee rates

    // Then accidentally spending the inscribed UTXO as fees

    // Inscription lost forever — sent to miner

    '
  when_applies: Projects using Bitcoin protocol/network or Ordinals
  when_not_applies: traditional web2 applications, centralized systems. projects not using Bitcoin or Ordinals
  sources: ["https://docs.ordinals.com/inscriptions.html"]
- id: CR-BTC-RBF-001
  text: Always signal RBF (BIP-125) on transactions to enable fee bumping — stuck transactions without RBF require CPFP which
    is more expensive.
  why: Without RBF signaling, a transaction stuck in the mempool cannot be fee-bumped. The only rescue option is CPFP (Child
    Pays For Parent) which requires spending an unconfirmed output with a high enough fee to cover both transactions — significantly
    more expensive. RBF costs nothing to signal but provides essential flexibility when fee rates spike unexpectedly.
  how_to_do_right: Set nSequence to 0xFFFFFFFD or lower on at least one input (BIP-125 signal). When stuck, create a replacement
    transaction with same inputs, higher fee, and nSequence incremented. Use wallet software that supports RBF bumping. Monitor
    mempool for confirmation and bump proactively.
  severity: medium
  technologies:
    library: [bitcoin core]
    platform: [bitcoin]
  domains:
    domain: [architecture, blockchain]
    concern: [gas_optimization]
  example_good: "// Create transaction with RBF enabled\npsbt.addInput({\n    hash: utxo.txid,\n    index: utxo.vout,\n  \
    \  sequence: 0xFFFFFFFD, // RBF signal: anything < 0xFFFFFFFE\n    witnessUtxo: { script: utxo.script, value: utxo.value\
    \ },\n});\n\n// If stuck — create replacement with higher fee\nfunction bumpFee(originalPsbt, newFeeRate) {\n    const\
    \ bumped = originalPsbt.clone();\n    // Reduce change output to increase fee\n    const currentFee = totalInputs - totalOutputs;\n\
    \    const neededFee = txVSize * newFeeRate;\n    const changeReduction = neededFee - currentFee;\n    bumped.txOutputs[changeIndex].value\
    \ -= changeReduction;\n    // Sign and broadcast replacement\n    return bumped;\n}\n"
  example_bad: "// No RBF signal — transaction cannot be fee-bumped\npsbt.addInput({\n    hash: utxo.txid,\n    index: utxo.vout,\n\
    \    sequence: 0xFFFFFFFF, // Final — no replacement possible\n});\n// If fee rate spikes, this transaction waits hours/days/weeks\n"
  when_applies: Projects using Bitcoin protocol/network or Bitcoin Core
  when_not_applies: traditional web2 applications, centralized systems. projects not using Bitcoin or Bitcoin Core
  sources: ["https://github.com/bitcoin/bips/blob/master/bip-0125.mediawiki"]
- id: CR-BTC-DATA-001
  text: Use OP_RETURN for small data commitments (up to 80 bytes) — it creates provably unspendable outputs that full nodes
    can prune.
  why: OP_RETURN outputs are provably unspendable and can be pruned from the UTXO set. Before OP_RETURN, developers stored
    data in fake addresses (burning coins to P2PKH outputs that no one owns), which pollutes the UTXO set permanently and
    wastes Bitcoin. OP_RETURN is the socially acceptable way to anchor data on Bitcoin.
  how_to_do_right: 'Use a single OP_RETURN output per transaction with up to 80 bytes of data. Store hashes (SHA-256 = 32
    bytes) of larger data, with the full data off-chain. Common uses: timestamping (hash of document), anchoring (Merkle root
    of sidechain), proof-of-existence.'
  severity: medium
  technologies:
    platform: [bitcoin]
  domains:
    domain: [architecture, blockchain]
    concern: [data-anchoring]
  example_good: "const bitcoin = require(\"bitcoinjs-lib\");\nconst crypto = require(\"crypto\");\n\n// Anchor a document\
    \ hash on Bitcoin (32 bytes — well within 80 byte limit)\nconst documentHash = crypto.createHash(\"sha256\")\n    .update(documentBytes)\n\
    \    .digest();\n\nconst embed = bitcoin.payments.embed({ data: [documentHash] });\n\nconst psbt = new bitcoin.Psbt({\
    \ network });\npsbt.addInput({ /* ... */ });\npsbt.addOutput({ script: embed.output, value: 0 }); // OP_RETURN, 0 sats\n\
    psbt.addOutput({ address: changeAddr, value: change });\n"
  example_bad: '// WRONG: storing data in fake P2PKH addresses — pollutes UTXO set

    const fakeAddress = base58check.encode(documentHash.slice(0, 20));

    psbt.addOutput({ address: fakeAddress, value: 546 });

    // 546 sats PERMANENTLY locked in unspendable address

    // UTXO set pollution — every full node stores this forever

    '
  when_applies: Projects using Bitcoin protocol/network
  when_not_applies: traditional web2 applications, centralized systems. projects not using Bitcoin
  sources: ["https://developer.bitcoin.org/devguide/transactions.html#null-data"]
