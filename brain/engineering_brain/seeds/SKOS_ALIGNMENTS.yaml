# =============================================================================
# SKOS Alignments — Engineering Brain Taxonomy → External Ontologies
# =============================================================================
#
# Maps taxonomy tags to Wikidata (wd:), DBpedia (dbr:), and Schema.org (schema:).
# Tags use flat IDs as stored in the TagRegistry (e.g., "slo", not "reliability.availability.slo").
#
# Match types (W3C SKOS):
#   exact_match  — semantically identical concept
#   broad_match  — external concept is broader (hypernym)
#   narrow_match — external concept is narrower (hyponym)
#   related_match — associated concept (not hierarchical)
#
# Prefix expansion:
#   wd:   → https://www.wikidata.org/wiki/
#   dbr:  → https://dbpedia.org/resource/
#   schema: → https://schema.org/
#
# =============================================================================

