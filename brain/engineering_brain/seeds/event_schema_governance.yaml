layer: rules
domain: architecture
knowledge:
- id: EVSCH-001
  text: "Deploy a schema registry (Confluent Schema Registry, Apicurio, or AWS Glue) as the central contract authority for all event-driven communication."
  why: "Without a schema registry, a single producer deploying a breaking change silently breaks every downstream consumer. Schema registry makes contracts explicit and enforced at registration time."
  how_to_do_right: |
    1. Deploy schema registry accessible to all services
    2. Register schemas for every event type before producing
    3. Configure producers with schema-aware serializers
    4. Set compatibility mode per subject: BACKWARD for consumer-first
    5. Integrate schema validation into CI
  severity: critical
  technologies:
    lang: [python, java]
    framework: [confluent_kafka, spring_kafka]
    library: [confluent_schema_registry, apicurio]
  domains:
    domain: [architecture, governance]
    concern: [data_contracts, schema_management]
  example_good: |
    from confluent_kafka.schema_registry import SchemaRegistryClient
    from confluent_kafka.schema_registry.avro import AvroSerializer
    from confluent_kafka import SerializingProducer
    registry = SchemaRegistryClient({"url": "http://schema-registry:8081"})
    producer = SerializingProducer({
        "bootstrap.servers": "broker:9092",
        "value.serializer": AvroSerializer(registry, order_schema),
    })
    producer.produce("order-events", value=order_data)
  example_bad: |
    import json
    producer.produce("order-events", value=json.dumps({
        "orderId": "123",  # Was "order_id" — consumer breaks
    }).encode())
  when_applies: "Any event-driven architecture using message brokers where multiple services produce and consume events"
  sources:
    - "https://docs.confluent.io/platform/current/schema-registry/index.html"
    - "https://www.apicur.io/registry/docs/"

- id: EVSCH-002
  text: "Configure schema evolution rules (backward, forward, or full compatibility) per event type and enforce in CI. Never allow NONE compatibility in production."
  why: "BACKWARD allows adding fields with defaults. FORWARD allows removing fields. FULL is both. NONE means anything goes — a rename, type change, or removal is accepted without validation."
  how_to_do_right: |
    1. Default to BACKWARD compatibility
    2. Use FULL for critical events (payments, orders)
    3. Never use NONE in production
    4. Test in CI before any deployment
    5. For breaking changes: create a new topic/subject (v2)
  severity: critical
  technologies:
    lang: [python, java]
    framework: [confluent_kafka]
    library: [confluent_schema_registry, apicurio]
  domains:
    domain: [architecture, governance]
    concern: [schema_evolution, data_contracts]
  example_good: |
    # Set BACKWARD compatibility
    curl -X PUT http://schema-registry:8081/config/order-events-value       -H "Content-Type: application/vnd.schemaregistry.v1+json"       -d '{"compatibility": "BACKWARD"}'
    # CI: test compatibility before deploy
    RESULT=$(curl -s -X POST       http://schema-registry:8081/compatibility/subjects/order-events-value/versions/latest       -d "{"schema": "$(cat schemas/order.avsc | jq -Rs .)"}")
  example_bad: |
    curl -X PUT http://schema-registry:8081/config/order-events-value       -d '{"compatibility": "NONE"}'
    # Developer renames field, 15 consumers crash
  when_applies: "Any event-driven system using a schema registry where schema changes must be safe"
  sources:
    - "https://docs.confluent.io/platform/current/schema-registry/fundamentals/schema-evolution.html"
    - "https://avro.apache.org/docs/current/specification/#schema-resolution"

- id: EVSCH-003
  text: "Use AsyncAPI 3.0 specification to document all event-driven APIs — the OpenAPI equivalent for message-based architectures."
  why: "REST has OpenAPI, GraphQL has introspection. Without AsyncAPI, event contracts live in tribal knowledge. AsyncAPI enables code generation, documentation, and contract testing."
  how_to_do_right: |
    1. Write AsyncAPI spec for every event-driven service
    2. Define channels, messages, and operations
    3. Generate documentation and client code
    4. Validate in CI: asyncapi validate asyncapi.yaml
    5. Publish to central API portal
  severity: medium
  technologies:
    lang: [yaml]
    framework: [asyncapi]
    library: [asyncapi_generator, asyncapi_cli]
  domains:
    domain: [architecture, documentation]
    concern: [api_documentation, event_driven]
  example_good: |
    asyncapi: 3.0.0
    info:
      title: Order Service Events
      version: 2.1.0
    channels:
      orderCreated:
        address: order-events
        messages:
          OrderCreated:
            payload:
              type: object
              required: [order_id, customer_id, amount]
              properties:
                order_id: {type: string}
                amount: {type: number, minimum: 0}
  example_bad: |
    # Confluence page "Order Events" — last updated 8 months ago
    # Lists 3 events (we now have 7), schemas out of date
  when_applies: "Any event-driven architecture where consumers need reliable documentation"
  sources:
    - "https://www.asyncapi.com/docs"
    - "https://www.asyncapi.com/docs/tools"

- id: EVSCH-004
  text: "Adopt CloudEvents specification as the standard event envelope — provides common metadata (source, type, time, subject) for cross-service interoperability."
  why: "Without standard envelopes, every team invents their own metadata. Team A uses event_type, Team B uses type, Team C uses eventName. Cross-cutting concerns need custom logic per format."
  how_to_do_right: |
    1. Use CloudEvents SDK for your language
    2. Required: id, source, type, specversion
    3. Recommended: time, subject, datacontenttype
    4. Use structured content mode for Kafka
    5. Use type for routing and consumer filtering
  severity: medium
  technologies:
    lang: [python, java, go]
    framework: [cloudevents]
    library: [cloudevents_sdk_python]
  domains:
    domain: [architecture, interoperability]
    concern: [event_envelope, standardization]
  example_good: |
    from cloudevents.http import CloudEvent
    event = CloudEvent({
        "specversion": "1.0",
        "source": "urn:company:order-service",
        "type": "com.company.orders.created",
        "time": datetime.now(timezone.utc).isoformat(),
    }, data={"order_id": "123", "amount": 99.99})
  example_bad: |
    # Team A: {"event_type": "ORDER_CREATED", "timestamp": 1703001234}
    # Team B: {"type": "order.created", "time": "2025-12-15 10:00:00"}
    # 3 different trace ID locations, 3 different timestamp formats
  when_applies: "Any event-driven architecture with multiple teams producing events"
  sources:
    - "https://cloudevents.io/"
    - "https://github.com/cloudevents/spec/blob/main/cloudevents/spec.md"

- id: EVSCH-005
  text: "Implement explicit event versioning (header-based, topic-per-version, or upcaster chain) when breaking changes are unavoidable."
  why: "Without versioning strategy, breaking changes mean: break all consumers (big-bang) or never change (ossification). Versioning allows gradual migration."
  how_to_do_right: |
    1. Header-based: version in message headers, consumers route by version
    2. Topic-per-version: new topic for major versions (order-events-v2)
    3. Upcaster chain: transform v1->v2->v3 on-the-fly during consumption
    4. 90-day deprecation window for old versions
  severity: high
  technologies:
    lang: [python, java]
    framework: [confluent_kafka]
    library: [schema_registry, cloudevents]
  domains:
    domain: [architecture, governance]
    concern: [event_versioning, schema_evolution]
  example_good: |
    class OrderCreatedV1ToV2:
        def upcast(self, event):
            event["amount"] = float(event["amount"])
            event["currency"] = "USD"
            event["schema_version"] = 2
            return event
    chain = UpcasterChain([OrderCreatedV1ToV2(), OrderCreatedV2ToV3()])
    current = chain.upcast_to_latest(old_event)
  example_bad: |
    # Silent change: amount from string to number
    # No version indicator, no migration path
    # Consumer: KeyError at 2am
  when_applies: "Event-driven architectures where breaking schema changes are unavoidable"
  sources:
    - "https://www.eventstore.com/blog/event-versioning-guidelines"
    - "https://docs.axoniq.io/reference-guide/axon-framework/events/event-upcasting"

- id: EVSCH-006
  text: "Design DLQs with full context preservation, monitoring, and automated replay capability. A DLQ without replay tooling is a graveyard for lost data."
  why: "DLQs capture failed messages, but without replay tooling, each message requires hours of manual re-injection. Context preservation (error, source topic, retry count) enables automated diagnosis."
  how_to_do_right: |
    1. DLQ naming: {original-topic}.dlq
    2. Preserve headers: original-topic, error-message, retry-count, failed-at
    3. Retention: longer than source topic (30 days)
    4. Monitor: alert if DLQ grows >10 messages/hour
    5. Build replay tooling: read from DLQ, produce back to source
    6. Max retry: 3-5 with exponential backoff before DLQ
  severity: high
  technologies:
    lang: [python, java]
    framework: [confluent_kafka, spring_kafka]
    library: [kafka, rabbitmq, sqs]
  domains:
    domain: [architecture, reliability]
    concern: [error_handling, resilience]
  example_good: |
    def process_with_dlq(consumer, dlq_producer, msg):
        for retry in range(3):
            try:
                process_event(msg.value())
                return
            except TransientError:
                time.sleep(2 ** retry)
        dlq_producer.produce(msg.topic() + ".dlq", value=msg.value(),
            headers=[("error", str(last_error).encode()),
                     ("original-topic", msg.topic().encode())])
  example_bad: |
    except Exception:
        producer.produce("dlq", value=msg.value())
        # No context, no replay tool, 50K messages rotting
  when_applies: "Any event-driven system where message processing can fail"
  sources:
    - "https://docs.aws.amazon.com/AWSSimpleQueueService/latest/SQSDeveloperGuide/sqs-dead-letter-queues.html"
    - "https://www.confluent.io/blog/error-handling-patterns-in-kafka/"

- id: EVSCH-007
  text: "Validate event schemas in CI pipelines before deployment. Breaking changes must be caught at build time, not production runtime."
  why: "Runtime validation means breaking changes are discovered during deployment. CI-time validation catches them when the developer pushes code, hours before deployment."
  how_to_do_right: |
    1. Store schemas in repo alongside code
    2. Validate against registry compatibility API in CI
    3. For Protobuf: use buf lint and buf breaking
    4. For Avro: schema registry compatibility check
    5. Required check for PR merge — no exceptions
  severity: high
  technologies:
    lang: [yaml, bash]
    framework: [github_actions, gitlab_ci]
    library: [buf, avro_tools, schema_registry_client]
  domains:
    domain: [architecture, governance]
    concern: [ci_cd, schema_validation]
  example_good: |
    # .github/workflows/schema-validation.yml
    - name: Check backward compatibility
      run: |
        for schema in schemas/avro/*.avsc; do
          SUBJECT=$(basename "$schema" .avsc)-value
          RESULT=$(curl -s -X POST             "$REGISTRY/compatibility/subjects/$SUBJECT/versions/latest"             -d "{"schema": "$(cat $schema | jq -Rs .)"}")
          [ "$(echo $RESULT | jq -r '.is_compatible')" = "true" ] || exit 1
        done
    - name: Validate Protobuf
      run: buf lint && buf breaking --against '.git#branch=main'
  example_bad: |
    # No CI validation — breaking change discovered in production
    # Schema registry rejects at deploy time, traffic blocked
  when_applies: "Any team producing events with schema registry"
  sources:
    - "https://docs.confluent.io/platform/current/schema-registry/develop/api.html"
    - "https://buf.build/docs/breaking/overview"

- id: EVSCH-008
  text: "Choose Protobuf for strong typing and code generation, Avro for schema-embedded messages and Kafka ecosystem integration. Never mix formats on the same topic."
  why: "Protobuf: field numbers make evolution safe, 20-30% smaller than Avro, code generation in 10+ languages. Avro: self-describing, better for data lake storage, tighter Confluent integration."
  how_to_do_right: |
    1. Protobuf when: polyglot, gRPC, strict typing needed
    2. Avro when: Kafka ecosystem, data lake, dynamic schema resolution
    3. JSON Schema when: HTTP APIs, human debugging, performance not critical
    4. Never mix formats on the same topic
    5. Protobuf: use buf for linting and breaking change detection
  severity: medium
  technologies:
    lang: [python, java, go]
    framework: [grpc, confluent_kafka]
    library: [protobuf, avro, buf]
  domains:
    domain: [architecture, serialization]
    concern: [event_serialization, performance]
  example_good: |
    syntax = "proto3";
    message OrderCreated {
      string order_id = 1;
      double amount = 3;
      repeated LineItem items = 7;  // Added in v1.1 — safe
    }
    # 50 bytes serialized vs 180 bytes JSON (3.6x smaller)
  example_bad: |
    import json
    event = json.dumps({"amount": "99.99"}).encode()
    # No typing, no code generation, 3.6x larger
  when_applies: "Architecture decisions for event serialization in new event-driven systems"
  sources:
    - "https://protobuf.dev/overview/"
    - "https://avro.apache.org/docs/current/specification/"

- id: EVSCH-009
  text: "Maintain an event catalog (EventCatalog.dev or equivalent) for searchable, visual inventory of all events. Discoverability prevents duplicate event creation."
  why: "With 50+ microservices, Team A creates OrderPlaced, Team B creates order.created, Team C creates NewOrderEvent — three events for the same thing. An event catalog provides a single inventory."
  how_to_do_right: |
    1. Deploy EventCatalog.dev or custom catalog
    2. Register every event: name, schema, owner, consumers
    3. Generate visual lineage diagrams
    4. Enforce registration before production use
    5. Auto-generate from AsyncAPI specs
    6. Review quarterly for duplicates and orphans
  severity: medium
  technologies:
    lang: [typescript, markdown]
    framework: [eventcatalog, backstage]
    library: [asyncapi, schema_registry]
  domains:
    domain: [architecture, documentation, governance]
    concern: [discoverability, event_inventory]
  example_good: |
    # events/OrderCreated/index.md
    ---
    name: OrderCreated
    version: 2.1.0
    owners: [order-team]
    producers: [Order Service]
    consumers: [Fulfillment, Analytics, Fraud Detection]
    ---
    Subscribe to order-events topic, filter by type OrderCreated.
  example_bad: |
    # Slack: "Does anyone publish an order event?"
    # 3 different answers, 3 different events for same thing
  when_applies: "Organizations with multiple teams producing events where discoverability is needed"
  sources:
    - "https://www.eventcatalog.dev/docs/introduction"
    - "https://backstage.io/docs/overview/what-is-backstage"

- id: EVSCH-010
  text: "Implement consumer-driven contract testing for events using Pact — verify producers emit what consumers actually need, not just what the schema says."
  why: "Schema compatibility checks structural validity but not semantic correctness. Amount changed from cents to dollars? Schema says compatible (both numbers). Consumer charges $4,999 instead of $49.99."
  how_to_do_right: |
    1. Consumer writes contract: expected fields, types, value ranges
    2. Contract published to Pact Broker
    3. Producer CI verifies against all consumer contracts
    4. Run on every PR for both producers and consumers
  severity: high
  technologies:
    lang: [python, java]
    framework: [pytest, junit]
    library: [pact_python, pact_jvm, pactflow]
  domains:
    domain: [architecture, testing, governance]
    concern: [contract_testing, event_validation]
  example_good: |
    from pact import MessageConsumer, Provider
    pact = MessageConsumer("Fulfillment").has_pact_with(Provider("OrderService"))
    expected = {
        "order_id": pact.like("order-123"),
        "amount": pact.like(99.99),
        "currency": pact.term(generate="USD", matcher=r"^[A-Z]{3}$"),
    }
    pact.given("an order exists").expects_to_receive("OrderCreated").with_content(expected)
  example_bad: |
    # Schema says amount is number — compatible
    # Producer changed from cents (4999) to dollars (49.99)
    # Consumer charges $4,999 — discovered by customer support
  when_applies: "Event-driven architectures where consumers have expectations beyond structural schema compatibility"
  sources:
    - "https://docs.pact.io/"
    - "https://pactflow.io/blog/contract-testing-for-event-driven-systems/"
