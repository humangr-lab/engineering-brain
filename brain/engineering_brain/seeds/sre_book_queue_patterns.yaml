layer: rules
technology: SRE
domain: messaging
knowledge:
- id: CR-SRE-QUEUE-001
  text: Queue depth is a leading indicator of system overload — monitor it continuously. A growing queue means consumers are slower than producers. If queue depth doubles in the last 10 minutes, the system
    is falling behind and will eventually fail.
  why: 'Google''s overload handling (Chapter 21) and pipeline design (Chapter 25) treat queue depth as the primary capacity signal. Unlike latency (which is a lagging indicator — it increases after the
    system is already overloaded), queue depth is a leading indicator — it starts growing before latency spikes are visible. The progression: producers outpace consumers → queue grows → processing latency
    increases (each item waits longer in the queue) → end-to-end latency exceeds SLO → if unchecked, queue fills → new items are rejected or lost → system failure. Monitoring queue depth with rate-of-change
    alerts enables proactive response: scale consumers before latency is affected.

    '
  how_to_do_right: '1. Monitor queue depth continuously: current depth, rate of change (depth increasing or decreasing), and maximum depth.

    2. Alert on rate of change: "queue depth increased by 50% in the last 10 minutes" is more actionable than "queue depth is 5000."

    3. Set queue capacity limits: unbounded queues defer failure until memory is exhausted. Set maxlen and handle overflow explicitly.

    4. Calculate consumer capacity: if producers generate 1000 msgs/sec and each consumer processes 100 msgs/sec, you need at least 10 consumers.

    5. Use queue depth to trigger autoscaling: when depth exceeds threshold, add consumers. When depth returns to normal, remove consumers.

    6. Track queue age (time since oldest message was enqueued). A deep but young queue is different from a deep and old queue.

    '
  example_good: "import time\nfrom prometheus_client import Gauge, Histogram\n\nqueue_depth = Gauge('queue_depth', 'Current queue depth', ['queue_name'])\nqueue_age = Histogram('queue_oldest_msg_age_seconds', 'Age of oldest message')\n\ndef monitor_queue(queue_name: str, redis_client):\n    depth = redis_client.xlen(queue_name)\n    queue_depth.labels(queue_name=queue_name).set(depth)\n    # Alert on rate of change, not absolute value\n    oldest = redis_client.xrange(queue_name, count=1)\n    if oldest:\n        age = time.time() - int(oldest[0][0].split('-')[0]) / 1000\n        queue_age.observe(age)\n"
  example_bad: "def process_messages(queue):\n    while True:\n        msg = queue.get()  # No monitoring at all\n        process(msg)\n    # No depth tracking, no age tracking\n    # Queue could be growing for hours\n    # No alerting until consumers crash from OOM\n"
  when_applies: "When operating any production message queue or stream processing system."
  severity: high
  technologies:
    lang: [general]
    platform: [redis, streams, kafka, rabbitmq, sqs]
  domains:
    domain: [messaging, observability, reliability, planning]
    concern: [queues, monitoring, capacity]
  sources:
  - url: https://sre.google/sre-book/handling-overload/
    title: 'Google SRE Book — Chapter 21: Handling Overload'
  validation_status: cross_checked
- id: CR-SRE-QUEUE-002
  text: Dead letter queues (DLQ) are mandatory for any production queue — messages that fail processing after N retries must be moved to a DLQ for investigation, not dropped silently and not retried indefinitely.
    A missing DLQ means either data loss or infinite retry loops.
  why: 'Google''s pipeline design (Chapter 25) requires explicit handling of unprocessable messages because in any real system, some messages will be unprocessable: malformed data, missing dependencies,
    bugs in consumer code, or schema mismatches. Without a DLQ, there are two bad outcomes: the message is retried indefinitely (blocking the queue, consuming resources, and never succeeding) or the message
    is silently dropped (data loss). A DLQ provides a third option: move the message aside for investigation. The original queue continues processing. Engineers can examine DLQ messages, fix the underlying
    issue, and replay the messages back to the original queue.

    '
  how_to_do_right: '1. Configure DLQ for every production queue. Set max retry count: 3-5 retries with exponential backoff before moving to DLQ.

    2. DLQ messages must retain: original message body, original headers/metadata, failure reason, retry count, timestamp of each attempt.

    3. Monitor DLQ depth: a growing DLQ indicates a systematic processing failure (not just isolated bad messages).

    4. Alert on DLQ growth: "DLQ received 100 messages in the last hour" — this needs investigation.

    5. Build a replay mechanism: after fixing the root cause, messages from the DLQ can be re-published to the original queue for reprocessing.

    6. Set DLQ retention: keep messages for 7-30 days. After retention, archive or delete. Don''t let the DLQ grow indefinitely.

    '
  example_good: "import json\nimport logging\n\nlogger = logging.getLogger(__name__)\nMAX_RETRIES = 3\n\ndef consume_with_dlq(consumer, dlq_producer, topic):\n    for msg in consumer:\n        retries = int(msg.headers.get('retry_count', 0))\n        try:\n            process(msg.value)\n            consumer.commit()\n        except Exception as e:\n            if retries >= MAX_RETRIES:\n                dlq_producer.send(f\"{topic}.dlq\", value=msg.value,\n                    headers={**msg.headers, 'error': str(e),\n                             'original_topic': topic})\n                logger.error(\"Message moved to DLQ\", extra={\n                    \"topic\": topic, \"retries\": retries, \"error\": str(e)})\n            else:\n                # Re-enqueue with incremented retry count\n                consumer.seek(msg.offset)\n"
  example_bad: "def consume_messages(consumer):\n    for msg in consumer:\n        try:\n            process(msg.value)\n        except Exception:\n            pass  # Silently drop failed messages — data loss!\n\n# OR the other extreme:\ndef consume_messages(consumer):\n    for msg in consumer:\n        while True:\n            try:\n                process(msg.value)\n                break\n            except Exception:\n                time.sleep(1)  # Infinite retry — blocks entire queue\n"
  when_applies: "When building any message consumer that must handle processing failures gracefully."
  severity: high
  technologies:
    lang: [general]
    platform: [redis, streams, kafka, rabbitmq, sqs]
  domains:
    domain: [code_quality, messaging, reliability]
    concern: [error_handling, queues]
  sources:
