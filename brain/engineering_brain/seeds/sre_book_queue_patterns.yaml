- id: CR-SRE-QUEUE-003
  text: Consumer group rebalancing in Kafka is a stop-the-world event — all consumers in the group stop processing while partitions are reassigned. Long rebalances (caused by slow consumers, network issues,
    or too many partitions) create processing gaps that can last minutes.
  why: 'Google''s pipeline management (Chapter 25) addresses consumer coordination as a reliability concern. In Kafka consumer groups: when a consumer joins or leaves, the group coordinator triggers a rebalance.
    During rebalance, ALL consumers stop processing (not just the affected ones). The rebalance takes: 1-5 seconds for small groups, 10-60 seconds for large groups (100+ consumers, 1000+ partitions), or
    minutes if consumers are slow to respond. During this window, no messages are processed. For latency-sensitive systems, even a 5-second gap is unacceptable. Causes of unnecessary rebalances: consumer
    heartbeat timeout (consumer GC pause), consumer processing takes longer than max.poll.interval.ms, consumer crashes, or intentional scaling.

    '
  how_to_do_right: '1. Use cooperative rebalancing (Kafka 2.4+): only the affected partitions stop processing, not all partitions. Set partition.assignment.strategy=cooperative-sticky.

    2. Tune heartbeat.interval.ms (3s) and session.timeout.ms (30s): heartbeat must be significantly shorter than session timeout.

    3. Tune max.poll.interval.ms: set to the maximum time your consumer needs to process a batch. Too short = unnecessary rebalances. Too long = slow detection of stuck consumers.

    4. Use static group membership (group.instance.id): consumers that restart quickly rejoin without triggering a full rebalance.

    5. Monitor rebalance frequency and duration: frequent rebalances indicate consumer instability. Log: "Consumer group rebalanced, took 12 seconds, 50 partitions reassigned."

    6. Pre-scale consumers before traffic spikes: adding consumers during peak load triggers rebalance during the worst time.

    '
  example_good: "# Kafka consumer configuration to minimize rebalancing impact\nfrom kafka import KafkaConsumer\n\nconsumer = KafkaConsumer(\n    'orders',\n    group_id='order-processor',\n    # Cooperative rebalancing: only affected partitions stop\n    partition_assignment_strategy=['cooperative-sticky'],\n    # Static membership: quick rejoin without full rebalance\n    group_instance_id=f'order-processor-{hostname}',\n    heartbeat_interval_ms=3000,\n    session_timeout_ms=30000,\n    max_poll_interval_ms=300000,  # 5 min max processing time\n)\n"
  example_bad: "from kafka import KafkaConsumer\n\nconsumer = KafkaConsumer(\n    'orders',\n    group_id='order-processor',\n    # Default eager rebalancing: ALL consumers stop\n    # No static membership: every restart triggers full rebalance\n    session_timeout_ms=10000,  # Too short: GC pauses trigger rebalance\n    max_poll_interval_ms=30000,  # Too short: slow batches trigger rebalance\n)\n# Result: frequent stop-the-world rebalances during peak load\n"
  when_applies: "When configuring Kafka consumer groups, especially with multiple consumers or high-throughput topics."
  severity: medium
  technologies:
    lang: [general]
    platform: [kafka]
  domains:
    domain: [messaging, performance, reliability]
    concern: [queues, streaming]
