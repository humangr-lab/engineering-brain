- id: CR-SRE-QUEUE-004
  text: Message schema evolution must be backward compatible — a consumer running the old code must be able to read messages produced by the new code, and vice versa. Breaking schema changes cause consumer
    crashes during rolling deployments.
  why: 'Google''s release engineering (Chapter 8) applies to message schemas: during a rolling deployment, both old and new versions of producers and consumers run simultaneously. If the new producer sends
    a message with a new required field, the old consumer (still running during deployment) can''t deserialize it and crashes. If the new consumer expects a field that the old producer (still running) doesn''t
    send, it crashes or produces incorrect results. The deployment window — where both versions coexist — can last minutes (fast deployment) to hours (canary deployment). Schema compatibility must be maintained
    throughout this window.

    '
  how_to_do_right: '1. New fields must be optional with default values. Old consumers ignore unknown fields. New consumers use defaults when fields are missing.

    2. Never remove fields in a new version — old consumers may depend on them. Deprecate (stop writing) but keep the field in the schema.

    3. Never change field types: string→integer breaks all consumers. Add a new field with the new type instead.

    4. Use a schema registry (Confluent Schema Registry, AWS Glue) to enforce compatibility checks on publish: reject schemas that break backward compatibility.

    5. Version your schema: include a schema_version field in every message. Consumers can branch on version if needed.

    6. Test schema compatibility in CI: deserialize messages from the old schema with the new code, and vice versa. Both must work.

    '
  example_good: "# v2 schema: added optional 'priority' field with default\nfrom pydantic import BaseModel\nfrom typing import Optional\n\nclass OrderEventV2(BaseModel):\n    schema_version: int = 2\n    order_id: str\n    user_id: int\n    amount: float\n    priority: Optional[str] = \"normal\"  # New field, optional with default\n    # Old consumers ignore 'priority' (unknown field)\n    # New consumers use default when reading old messages\n"
  example_bad: "# BREAKING: renamed field, changed type, removed field\nclass OrderEventV2(BaseModel):\n    schema_version: int = 2\n    order_id: str\n    customer_id: int  # RENAMED from user_id — old consumers crash\n    amount: int       # CHANGED from float — old consumers get wrong values\n    # REMOVED currency field — old consumers crash on missing field\n"
  when_applies: "When modifying the schema of messages published to a queue during rolling deployments."
  severity: high
  technologies:
    lang: [general]
    platform: [kafka, grpc]
  domains:
    domain: [architecture, messaging, reliability]
    concern: [api_design, backward_compatibility, data, schema_evolution, queues]
  sources:
  - url: https://sre.google/sre-book/release-engineering/
    title: 'Google SRE Book — Chapter 8: Release Engineering'
  validation_status: cross_checked
- id: CR-SRE-QUEUE-005
  text: Poison messages — messages that cause the consumer to crash every time they're processed — must be detected and quarantined automatically. Without poison message detection, a single bad message
    can block an entire partition indefinitely.
  why: 'Google''s pipeline design (Chapter 25) addresses poison messages as a specific failure mode distinct from transient failures. Transient failure: database is temporarily unavailable → retry after
    backoff → eventually succeeds. Poison message: message contains malformed data that triggers a NullPointerException → retry after backoff → same exception → retry → same exception → infinite loop. The
    partition is stuck: no subsequent messages are processed because Kafka delivers in order and the offset can''t advance past the poison message. Common causes: schema change without backward compatibility,
    serialization bug, unexpected null values, data exceeding size limits, encoding issues (UTF-8 BOM, invisible characters).

    '
  how_to_do_right: '1. Track per-message retry count. After N retries (3-5), move to DLQ instead of retrying indefinitely.

    2. Differentiate retryable vs non-retryable exceptions: IOException → retry. NullPointerException → DLQ immediately (retrying won''t help).

    3. Wrap message deserialization in try/except: if deserialization fails, the message is malformed → DLQ immediately.

    4. Validate message structure before processing: check required fields are present, types are correct, values are within expected ranges.

    5. Log poison message details: message key, headers, timestamp, partition, offset, and the exception. This enables post-mortem investigation.

    6. Monitor poison message rate: more than 0.1% of messages going to DLQ indicates a systematic problem (producer bug, schema mismatch).

    '
  example_good: "import json\nimport logging\n\nlogger = logging.getLogger(__name__)\n\nclass PoisonMessageHandler:\n    def __init__(self, max_retries: int = 3):\n        self.max_retries = max_retries\n\n    def process(self, msg, dlq_producer):\n        # Step 1: Validate deserialization\n        try:\n            payload = json.loads(msg.value)\n        except json.JSONDecodeError as e:\n            # Malformed message — DLQ immediately, retry won't help\n            dlq_producer.send('dlq', value=msg.value,\n                headers={'error': f'deserialization: {e}'})\n            return\n        # Step 2: Validate structure\n        if not all(k in payload for k in ['order_id', 'amount']):\n            dlq_producer.send('dlq', value=msg.value,\n                headers={'error': 'missing_required_fields'})\n            return\n        # Step 3: Process with retry tracking\n        self._process_with_retries(payload, msg, dlq_producer)\n"
  example_bad: "def consume(consumer):\n    for msg in consumer:\n        try:\n            data = json.loads(msg.value)\n            process_order(data)\n        except Exception:\n            # Retry forever — poison message blocks the partition\n            consumer.seek(msg.offset)\n            time.sleep(1)\n            # This message will NEVER succeed\n            # All subsequent messages are stuck behind it\n"
  when_applies: "When consuming messages that may be malformed, have invalid schemas, or trigger deterministic processing errors."
  severity: high
  technologies:
    lang: [general]
    platform: [kafka, rabbitmq]
  domains:
    domain: [code_quality, messaging, reliability]
    concern: [error_handling, queues, resilience]
  sources:
  - url: https://sre.google/sre-book/data-processing-pipelines/
    title: 'Google SRE Book — Chapter 25: Data Processing Pipelines'
  validation_status: cross_checked
- id: CR-SRE-QUEUE-006
  text: Consumer lag (the difference between the latest produced offset and the latest consumed offset) is the definitive measure of consumer health. A consumer with zero lag is keeping up. A consumer with
    increasing lag is falling behind and will eventually lose data if the retention window passes.
  why: 'Google''s pipeline monitoring (Chapter 25) treats consumer lag as a primary health metric because it directly measures "how far behind is the consumer?" A consumer can appear healthy (no errors,
    processing messages) while silently falling behind — processing 900 messages/second while 1000 messages/second are produced. The lag grows by 100 messages/second. In 1 hour, the lag is 360,000 messages.
    In 1 day, it''s 8.6 million. If Kafka retention is 7 days and the consumer falls 7+ days behind, messages are deleted before they''re consumed — permanent data loss. Consumer lag monitoring catches
    this before data is lost.

    '
  how_to_do_right: '1. Monitor consumer lag per partition, not just aggregate: one lagging partition is a different problem than all partitions lagging.

    2. Alert on lag rate of change: "consumer lag increased by 50% in the last hour" is more useful than "consumer lag is 10000."

    3. Set lag thresholds relative to retention: if retention is 7 days and lag reaches 3 days, alert as critical (4 days until data loss).

    4. Investigate lag causes: slow processing (optimize consumer), insufficient consumers (add more), rebalancing (see CR-SRE-QUEUE-003), or backpressure from downstream.

    5. Use Kafka consumer lag tools: Burrow, Kafka-lag-exporter, or Confluent Control Center for real-time lag monitoring.

    6. Track processing rate (messages/second per consumer) alongside lag: if processing rate drops, lag will increase — this is the leading indicator.

    '
  example_good: "from prometheus_client import Gauge\nfrom kafka import KafkaAdminClient\n\nconsumer_lag = Gauge('kafka_consumer_lag', 'Consumer lag per partition',\n                     ['group', 'topic', 'partition'])\nprocessing_rate = Gauge('kafka_processing_rate', 'Messages/sec per consumer',\n                        ['group', 'consumer'])\n\ndef monitor_consumer_lag(admin_client, group_id, topic):\n    offsets = admin_client.list_consumer_group_offsets(group_id)\n    end_offsets = admin_client.list_offsets(topic)\n    for tp, offset in offsets.items():\n        lag = end_offsets[tp].offset - offset.offset\n        consumer_lag.labels(\n            group=group_id, topic=tp.topic, partition=tp.partition\n        ).set(lag)\n        # Alert if lag > retention threshold\n        if lag > RETENTION_MESSAGES * 0.5:\n            alert_critical(f\"Consumer lag at {lag}, risk of data loss\")\n"
  example_bad: "# No lag monitoring at all\ndef consume(consumer):\n    for msg in consumer:\n        process(msg)  # Could be falling behind by millions\n    # No visibility into whether consumer keeps up\n    # Data loss when lag exceeds Kafka retention period\n    # Nobody knows until users report missing data\n"
  when_applies: "When operating Kafka consumer groups where message processing completeness and timeliness matter."
  severity: high
  technologies:
    lang: [general]
    platform: [kafka]
  domains:
    domain: [messaging, observability, performance, reliability]
    concern: [queues, monitoring]
  sources:
  - url: https://sre.google/sre-book/data-processing-pipelines/
    title: 'Google SRE Book — Chapter 25: Data Processing Pipelines'
  validation_status: cross_checked
