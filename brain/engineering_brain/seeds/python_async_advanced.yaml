- id: PYASYNC-013
  text: "Use the producer/consumer pattern with asyncio.Queue for decoupling async pipeline stages. Use a poison pill (sentinel value) to signal end-of-stream. Use multiple consumers for parallelism. Always handle exceptions in consumers to prevent silent task death."
  why: >
    Async pipelines often have stages running at different speeds: a Kafka consumer reads 10,000
    messages/sec, a transformation stage processes 5,000/sec, and a database writer handles 1,000/sec.
    Direct coupling (await process(await read())) bottlenecks the entire pipeline to the slowest stage.
    asyncio.Queue decouples stages: each stage reads from its input queue and writes to its output
    queue. Benefits: stages run independently, bounded queues provide backpressure (fast producer
    waits when slow consumer falls behind), multiple consumers can process from the same queue for
    parallelism (3 DB writers = 3,000/sec throughput). The poison pill pattern: when the producer is
    done, it puts a sentinel value on the queue. Each consumer exits when it receives the sentinel.
    For multiple consumers, put one sentinel per consumer.
  how_to_do_right: |
    1. Use asyncio.Queue(maxsize=N) between stages — bounded for backpressure.
    2. Producer puts items with await queue.put(item) — blocks when full.
    3. Consumer gets items with await queue.get() — blocks when empty.
    4. Call queue.task_done() after processing each item — enables queue.join().
    5. Use sentinel (None or STOP = object()) to signal end-of-stream.
    6. For N consumers: put N sentinels (one per consumer).
    7. Wrap consumer body in try/except to prevent silent death on exceptions.
    8. Use queue.join() to wait until all items are processed.
  severity: high
  technologies:
    lang: [python, asyncio]
  domains:
    domain: [architecture, reliability]
    concern: [concurrency, pipeline, decoupling]
  example_good: |
    import asyncio
    from dataclasses import dataclass

    STOP = object()  # Poison pill sentinel

    @dataclass
    class RawEvent:
        id: int
        payload: str

    @dataclass
    class ProcessedEvent:
        id: int
        result: str

    async def producer(raw_queue: asyncio.Queue, num_events: int):
        """Reads events from source and puts them on the queue."""
        for i in range(num_events):
            event = RawEvent(id=i, payload=f"data_{i}")
            await raw_queue.put(event)  # Blocks if queue full (backpressure)
        # One poison pill per consumer
        for _ in range(3):  # 3 consumers
            await raw_queue.put(STOP)
        print(f"Producer done: {num_events} events produced")

    async def transformer(
        raw_queue: asyncio.Queue,
        result_queue: asyncio.Queue,
        worker_id: int,
    ):
        """Processes events — multiple instances for parallelism."""
        count = 0
        while True:
            event = await raw_queue.get()
            if event is STOP:
                raw_queue.task_done()
                break
            try:
                # Simulate processing
                await asyncio.sleep(0.001)
                processed = ProcessedEvent(id=event.id, result=event.payload.upper())
                await result_queue.put(processed)
                count += 1
            except Exception as e:
                print(f"Worker {worker_id} error processing event {event.id}: {e}")
            finally:
                raw_queue.task_done()
        print(f"Worker {worker_id} done: processed {count} events")

    async def writer(result_queue: asyncio.Queue):
        """Writes results to database/file."""
        count = 0
        while True:
            event = await result_queue.get()
            if event is STOP:
                result_queue.task_done()
                break
            # Simulate DB write
            await asyncio.sleep(0.002)
            count += 1
            result_queue.task_done()
        print(f"Writer done: wrote {count} events")

    async def main():
        raw_queue: asyncio.Queue = asyncio.Queue(maxsize=100)
        result_queue: asyncio.Queue = asyncio.Queue(maxsize=50)

        async with asyncio.TaskGroup() as tg:
            # 1 producer
            tg.create_task(producer(raw_queue, 1000))
            # 3 parallel transformers (for throughput)
            for i in range(3):
                tg.create_task(transformer(raw_queue, result_queue, i))
            # 1 writer (add more for higher DB write throughput)
            tg.create_task(writer(result_queue))

            # Wait for all raw events to be processed
            await raw_queue.join()
            # Signal writer to stop
            await result_queue.put(STOP)
            await result_queue.join()

    asyncio.run(main())
  example_bad: |
    import asyncio

    async def process_pipeline_bad(events: list):
        # BAD: Sequential processing — no concurrency between stages
        for event in events:
            raw = await read(event)           # Stage 1
            processed = await transform(raw)  # Stage 2 waits for Stage 1
            await write(processed)            # Stage 3 waits for Stage 2
        # Total time = sum of all stages — no overlap

    async def consumer_bad(queue: asyncio.Queue):
        while True:
            event = await queue.get()
            result = await process(event)  # If process() raises, consumer dies silently
            # No queue.task_done() — queue.join() waits forever
            # No exception handling — one bad event kills the consumer
            # No sentinel check — consumer loops forever after producer finishes
  when_applies: Any multi-stage async pipeline (ETL, event processing, data ingestion) where stages run at different speeds
  sources:
    - url: https://docs.python.org/3/library/asyncio-queue.html
      title: "Python Docs — asyncio.Queue"
    - url: https://docs.python.org/3/library/asyncio-queue.html#examples
      title: "Python Docs — asyncio.Queue Examples"
