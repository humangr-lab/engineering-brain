layer: rules
domain: sacada
knowledge:

# =============================================================================
# THE 5 HORSEMEN OF EDGE CASES (PSE-001 to PSE-005)
# =============================================================================

- id: PSE-001
  text: "The 5 Horsemen of edge cases are: Empty, Boundary, Concurrent, Error, and Type. Every feature must be tested against all 5. Miss one horseman and production will find it for you."
  why: >
    Edge cases are not random. They fall into exactly 5 categories that cover 95% of all production
    bugs. Empty: what happens when there's nothing? Boundary: what happens at the limits? Concurrent:
    what happens when two things happen at once? Error: what happens when something fails? Type: what
    happens when the data is unexpected? Developers who know the 5 Horsemen test systematically instead
    of hoping they thought of everything. Each horseman is a lens: hold your feature up to each lens
    and the edge cases reveal themselves. This is not theory — it's a practical checklist that has
    caught thousands of bugs before they reached production.
  how_to_do_right: |
    1. For every feature, systematically apply each horseman:
       EMPTY: What if the list is empty? The string is empty? The query returns no results? The cart has no items?
       BOUNDARY: What happens at 0, 1, max-1, max, max+1? At page 1? At the last page?
       CONCURRENT: What if two users do this simultaneously? What if the same user double-clicks?
       ERROR: What if the network fails? The database is down? The third-party API returns 500?
       TYPE: What if the input is null? A string where you expect a number? Unicode? HTML?
    2. Create test cases for each horseman per feature (5 minimum per feature).
    3. Make the 5 Horsemen a required section in every PR description.
    4. Code review: reject PRs that don't address all 5 horsemen.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # 5 Horsemen Analysis: GET /api/v1/products/search?q=...
    EMPTY: q="" → return 400 with "query required" (not empty 200)
    BOUNDARY: q="a" (1 char) → valid, return results. q="a"*1000 → truncate to 200 chars
    CONCURRENT: 1000 concurrent searches → connection pool handles, no mutex needed (read-only)
    ERROR: Elasticsearch down → fallback to PostgreSQL LIKE, warn in response headers
    TYPE: q="<script>alert(1)</script>" → sanitize, no XSS. q="🎉" → valid UTF-8, search works

    Tests: 5 test functions, one per horseman, all in test_search_edge_cases.py
  example_bad: |
    # Search feature: test_search_returns_results ← only happy path
    # No empty test, no boundary test, no concurrent test, no error test, no type test.
    # Production: user searches for "" → 500 error (NoneType has no len())
    # Production: user pastes 50KB query → OOM in Elasticsearch
    # Production: Elasticsearch restarts → 502 for 30 seconds, no fallback
  when_applies: Testing any feature or API endpoint
  sources: ["https://martinfowler.com/articles/practical-test-pyramid.html"]

- id: PSE-002
  text: "Empty is the most common edge case and the most underestimated — empty list, empty string, empty result set, empty cart, empty file, null vs empty vs undefined vs missing. Test them ALL."
  why: >
    Emptiness has at least 6 distinct flavors in software: null (no value), empty string (""), empty
    list ([]), zero (0), undefined (key doesn't exist), and missing (field omitted from request).
    Each flavor behaves differently in every language and framework. Python's `not x` is True for
    None, "", [], 0, False, and {}. JavaScript's `!x` is True for null, undefined, "", 0, NaN, and
    false. PostgreSQL treats NULL differently from empty string. This semantic minefield causes the
    single largest category of production bugs: "TypeError: NoneType has no attribute 'X'" appears
    in every error tracking system in the world, every day.
  how_to_do_right: |
    1. For every input field, define behavior for ALL 6 flavors of empty:
       - null/None: Is it valid? If yes, what does it mean? If no, return 422 with clear message.
       - Empty string "": Is it the same as null? Usually it shouldn't be. Trim whitespace first.
       - Empty list []: Is it valid? An order with zero items? A search with zero filters?
       - Zero 0: Is it valid? A $0 payment? A 0-quantity order? A 0% discount?
       - Undefined/missing: Is the field required? If optional, what's the default?
       - Whitespace-only "   ": Is it the same as empty? Almost always yes. Trim and treat as empty.
    2. Use Pydantic validators to handle each flavor explicitly.
    3. Write one test per flavor per critical field (minimum 6 tests per field).
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Empty handling for POST /api/v1/orders
    Field: customer_name
    - null → 422 "customer_name is required"
    - "" → 422 "customer_name cannot be empty"
    - "   " → 422 "customer_name cannot be blank" (after trim)
    - missing from JSON → 422 "customer_name is required"

    Field: items (list)
    - null → 422 "items is required"
    - [] → 422 "order must have at least one item"
    - missing → 422 "items is required"

    Field: discount_pct (optional)
    - null → default to 0.0
    - 0 → valid, no discount
    - missing → default to 0.0

    # Pydantic model
    class CreateOrder(BaseModel):
        customer_name: str = Field(min_length=1, strip_whitespace=True)
        items: list[OrderItem] = Field(min_length=1)
        discount_pct: float = Field(default=0.0, ge=0.0, le=50.0)
  example_bad: |
    # No explicit empty handling
    def create_order(data: dict):
        name = data["customer_name"]  # KeyError if missing
        total = sum(item.price for item in data["items"])  # TypeError if None

    # Production: 500 errors for every malformed request.
    # Error messages: "KeyError: 'customer_name'" — useless for the client.
  when_applies: Handling any user input, API request, or database result
  sources: ["https://docs.python.org/3/library/stdtypes.html#truth-value-testing"]

- id: PSE-003
  text: "Boundary proximity testing: always test n-1, n, and n+1 for every limit — if max items is 100, test 99, 100, and 101. Off-by-one errors are the cockroaches of software: always there, never truly gone."
  why: >
    Off-by-one errors account for a disproportionate number of bugs because humans think in ranges
    ("up to 100 items") while code thinks in comparisons (< vs <=). Is the limit inclusive or exclusive?
    Does pagination start at 0 or 1? Does the range include the end date? Every boundary is an
    opportunity for an off-by-one error. Testing n-1 (just below), n (exactly at), and n+1 (just above)
    for every limit catches these errors before they reach production. This is not theoretical — the
    Mars Climate Orbiter crashed because of a unit boundary error. Your pagination can too.
  how_to_do_right: |
    1. For every numeric limit in the system, create 3 tests: n-1, n, n+1.
    2. For every pagination endpoint: test page 0 (invalid?), page 1 (first), last page, last page + 1.
    3. For every string limit: test max_length - 1, max_length, max_length + 1.
    4. For every date range: test start_date == end_date, start_date > end_date, exactly 1 day range.
    5. For every collection limit: test empty, 1 item, max items, max + 1 items.
    6. Document whether limits are inclusive or exclusive in the spec AND in code comments.
    7. Use parameterized tests to cover boundary values efficiently.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Boundary tests for: max 100 items per order
    @pytest.mark.parametrize("count,expected_status", [
        (0, 422),    # Below minimum (empty)
        (1, 201),    # Minimum valid
        (99, 201),   # n-1: just below limit
        (100, 201),  # n: exactly at limit
        (101, 422),  # n+1: just above limit
        (1000, 422), # Far above limit
    ])
    def test_order_item_count_boundaries(count, expected_status):
        items = [make_item() for _ in range(count)]
        response = client.post("/orders", json={"items": items})
        assert response.status_code == expected_status

    # Pagination boundary tests
    # page=0 → 422 (invalid, pages start at 1)
    # page=1 → 200 (first page)
    # page=last → 200 (last page with items)
    # page=last+1 → 200 with empty items list (not 404)
  example_bad: |
    # Only tests: create order with 5 items → 201
    # Never tests: 0 items, 1 item, 100 items, 101 items
    # Production: user adds 101 items → 500 error (database TEXT column overflow)
    # Or worse: silently succeeds, billing calculates wrong total
  when_applies: Testing any feature with numeric limits, pagination, or size constraints
  sources: ["https://hypothesis.readthedocs.io/en/latest/details.html#boundary-values"]

- id: PSE-004
  text: "Concurrent edge cases are invisible in testing and deadly in production — double-submit, race conditions, deadlocks, and stale reads ONLY manifest under load. You must design for them, not test for them."
  why: >
    Concurrent bugs are the hardest category because they are non-deterministic: they happen in
    production under load but almost never in development or staging. A user double-clicks the
    "Submit Order" button — two requests arrive 50ms apart. A payment webhook arrives before the
    order creation completes. Two admins edit the same record simultaneously. These scenarios cannot
    be reliably reproduced with unit tests. They must be prevented by design: idempotency keys,
    optimistic locking, database serialization, and message deduplication. If you rely on testing
    to catch concurrent bugs, you will ship concurrent bugs.
  how_to_do_right: |
    1. For every write endpoint, ask: "What if this is called twice within 100ms?"
       - POST endpoints: require idempotency key, reject duplicates
       - PUT/PATCH endpoints: use optimistic locking (version field or ETag)
       - DELETE endpoints: make idempotent (deleting already-deleted returns 204, not 404)
    2. For every read-then-write pattern, ask: "What if the data changed between read and write?"
       - Use SELECT ... FOR UPDATE or compare-and-swap
    3. For every event handler, ask: "What if this event is delivered twice?"
       - Use message deduplication IDs
    4. For every background job, ask: "What if two instances run simultaneously?"
       - Use distributed locks (Redis SETNX with TTL)
    5. Load test with realistic concurrency: 50-100 concurrent users doing the same operation.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Concurrent protection for order creation
    # 1. Idempotency key prevents double-submit
    @app.post("/api/v1/orders")
    async def create_order(request: CreateOrderRequest):
        existing = await cache.get(f"idempotency:{request.idempotency_key}")
        if existing:
            return existing  # Same response, no side effects

        # 2. Optimistic locking on inventory
        for item in request.items:
            rows = await db.execute(
                "UPDATE inventory SET stock = stock - :qty, version = version + 1 "
                "WHERE product_id = :pid AND version = :ver AND stock >= :qty",
                {"qty": item.qty, "pid": item.product_id, "ver": item.version}
            )
            if rows == 0:
                raise ConcurrentModification("Inventory changed, please retry")

        # 3. Store result for idempotency
        result = OrderResponse(order_id=order.id)
        await cache.set(f"idempotency:{request.idempotency_key}", result, ttl=3600)
        return result
  example_bad: |
    # No concurrency protection
    @app.post("/api/v1/orders")
    async def create_order(request):
        stock = await db.get_stock(request.product_id)  # Read
        if stock >= request.quantity:
            await db.reduce_stock(request.product_id, request.quantity)  # Write
            # Race condition: two requests read stock=1, both proceed, stock goes to -1

    # User double-clicks → two orders created, double charge
    # No idempotency key → no deduplication
    # Support ticket: "I was charged twice for the same order"
  when_applies: Designing or reviewing any write operation in a multi-user system
  sources: ["https://jepsen.io/analyses"]

- id: PSE-005
  text: "Type edge cases go beyond null — test with wrong types (string where number expected), extreme types (very long string, negative number), and culturally unexpected types (right-to-left text, emoji, Unicode)."
  why: >
    APIs receive data from the wild internet. Users paste text from PDFs (hidden characters), enter
    names with accents (José, O'Brien, 中文名), use emoji in descriptions (🎉), and sometimes
    send JSON with a string "123" where you expect an integer 123. Backend systems that assume clean,
    typed input crash spectacularly on real-world data. Beyond basic type checking, there are cultural
    edge cases: names with apostrophes break SQL if not parameterized, right-to-left text (Arabic,
    Hebrew) breaks UI layouts, and emoji in database fields cause MySQL to throw "Incorrect string
    value" if the charset is not utf8mb4.
  how_to_do_right: |
    1. For every input field, test with:
       - Wrong type: string where number expected, object where string expected
       - Extreme values: "", "a"*10000, -1, 2^31, 2^63, float("inf"), float("nan")
       - Unicode: accented characters (é, ñ, ü), CJK characters (中文), emoji (🎉), ZWJ sequences (👨‍👩‍👧)
       - Special characters: ', ", \, <, >, &, \n, \r, \0, \t
       - RTL text: Arabic (مرحبا), Hebrew (שלום)
       - Homoglyphs: Cyrillic а vs Latin a (security: lookalike characters for phishing)
    2. Use Pydantic with strict type validation.
    3. Use property-based testing (Hypothesis) to generate random inputs.
    4. Store everything as UTF-8. No exceptions. Verify database charset.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Type edge case tests for user name field
    @pytest.mark.parametrize("name,expected", [
        ("John", 201),                    # Normal
        ("José García", 201),             # Accented characters
        ("O'Brien", 201),                 # Apostrophe
        ("中文名字", 201),                 # CJK characters
        ("🎉 Party User", 201),           # Emoji
        ("مرحبا", 201),                   # Arabic (RTL)
        (123, 422),                       # Wrong type: int
        (None, 422),                      # Null
        ("a" * 10000, 422),               # Extreme length
        ("<script>alert(1)</script>", 201),# XSS attempt — stored safely, escaped on render
        ("'; DROP TABLE users; --", 201), # SQL injection — parameterized queries handle it
    ])
    def test_user_name_type_edge_cases(name, expected):
        response = client.post("/users", json={"name": name})
        assert response.status_code == expected
  example_bad: |
    # Assumes name is always a clean ASCII string
    user.name = request.data["name"]  # No validation
    db.execute(f"INSERT INTO users (name) VALUES ('{user.name}')")  # SQL injection

    # José → stored as "Jos?" (wrong charset)
    # 🎉 → MySQL error "Incorrect string value" (utf8 not utf8mb4)
    # O'Brien → SQL error: unterminated string literal
    # <script> → XSS on admin panel
  when_applies: Validating any user input or external data
  sources: ["https://cheatsheetseries.owasp.org/cheatsheets/Input_Validation_Cheat_Sheet.html"]

# =============================================================================
# SPECIFIC EDGE CASE DOMAINS (PSE-006 to PSE-012)
# =============================================================================

- id: PSE-006
  text: "Unicode edge cases will break your system in creative ways — zero-width characters are invisible, combining characters change glyph count, and homoglyphs enable phishing. Normalize BEFORE storing."
  why: >
    Unicode has 149,186 characters across 161 scripts. Among them are zero-width spaces (U+200B) that
    are invisible but change string length, combining characters (e + ◌́ = é) that make len("é") return
    2 in some languages, homoglyphs (Cyrillic 'а' looks like Latin 'a' but has a different code point),
    and directional overrides (U+202E) that reverse text rendering. These are not theoretical concerns:
    zero-width characters in usernames bypass uniqueness checks, homoglyphs enable phishing
    (paypal.com vs pаypal.com with Cyrillic а), and combining characters break string truncation.
  how_to_do_right: |
    1. Normalize all text input to NFC (Canonical Decomposition, followed by Canonical Composition) before storing.
    2. Strip zero-width characters from user-facing fields (names, emails, URLs).
    3. For uniqueness checks: normalize → lowercase → strip diacritics → compare (confusable detection).
    4. For display length: use grapheme clusters, not code points (use the `grapheme` library in Python).
    5. For URLs and domains: apply IDNA (International Domain Names) normalization.
    6. Test with: "café" (precomposed), "café" (decomposed e + combining accent), "cαfé" (Cyrillic α).
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    import unicodedata

    def normalize_text(text: str) -> str:
        # 1. NFC normalization (canonical composition)
        text = unicodedata.normalize("NFC", text)
        # 2. Strip zero-width characters
        text = text.replace("\u200b", "").replace("\u200c", "").replace("\u200d", "").replace("\ufeff", "")
        # 3. Strip directional overrides (security risk)
        text = text.replace("\u202e", "").replace("\u202d", "")
        return text.strip()

    def check_confusable(username: str, existing_usernames: list[str]) -> bool:
        """Detect homoglyph attacks: 'pаypal' (Cyrillic а) vs 'paypal' (Latin a)"""
        from confusables import is_confusable
        for existing in existing_usernames:
            if is_confusable(username, existing):
                return True
        return False
  example_bad: |
    # Store text as-is, no normalization
    user.name = request.name  # Contains zero-width spaces

    # Uniqueness check: "John" vs "John\u200b" — different strings, "unique" usernames
    # Display: both show as "John" but DB has two records
    # len("👨‍👩‍👧") returns 5 (code points) instead of 1 (visual character)
    # Truncation: "Hello 🇧🇷"[:7] → broken flag emoji (splits surrogate pair)
  when_applies: Any system that accepts, stores, or displays text from users
  sources: ["https://unicode.org/reports/tr15/"]

- id: PSE-007
  text: "Time edge cases are a bottomless pit — midnight, DST transitions, leap seconds, leap years, timezone changes, and 'Friday the 13th' type calendar anomalies. Use a time library; never roll your own."
  why: >
    Time is the most deceptively complex domain in software. Midnight is ambiguous (beginning of today
    or end of yesterday?). DST transitions mean 2 AM happens twice or not at all. Leap years mean
    February has 29 days every 4 years except every 100 years except every 400 years. Timezone offsets
    change when governments decide to change them (often with weeks of notice). Samoa skipped
    December 30, 2011 entirely. Egypt changed DST rules 4 times in one year. Every developer who
    builds their own date handling will get it wrong. Use battle-tested libraries (Arrow, Pendulum,
    python-dateutil) and store everything in UTC.
  how_to_do_right: |
    1. Store ALL timestamps in UTC. No exceptions. Use TIMESTAMP WITH TIME ZONE in PostgreSQL.
    2. Convert to local time only at the display/API layer, never in business logic.
    3. Use a time library (Arrow, Pendulum, or dateutil), never manual timedelta arithmetic.
    4. Test with known time edge cases:
       - 2024-02-29 (leap year day)
       - 2025-02-29 (doesn't exist — how does your system handle it?)
       - 2026-03-08 02:30 US/Eastern (DST spring forward — this time doesn't exist)
       - 2026-11-01 01:30 US/Eastern (DST fall back — this time exists twice)
       - 2023-12-31 23:59:59 → 2024-01-01 00:00:00 (year boundary)
    5. For recurring events: store as RRULE (iCalendar) or Cron expression, not as fixed timestamps.
    6. For "end of day": use < start_of_next_day, not <= 23:59:59 (misses the last second).
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Time edge case handling
    from datetime import datetime, timezone
    import arrow

    # Always UTC internally
    now = datetime.now(timezone.utc)

    # Date range: "all orders today" — use half-open interval [start, end)
    start = arrow.now("UTC").floor("day")
    end = start.shift(days=1)
    orders = Order.query.filter(Order.created_at >= start, Order.created_at < end)
    # This correctly handles midnight, DST, and timezone edge cases

    # Recurring event: "every Monday at 9 AM local time"
    # Store: RRULE:FREQ=WEEKLY;BYDAY=MO + timezone=America/New_York
    # Do NOT store: [2026-03-02 14:00 UTC, 2026-03-09 13:00 UTC, ...]
    # Because UTC offset changes with DST!

    # Test: February 29
    @pytest.mark.parametrize("date_str,valid", [
        ("2024-02-29", True),   # Leap year
        ("2025-02-29", False),  # Not a leap year
        ("2000-02-29", True),   # Divisible by 400
        ("1900-02-29", False),  # Divisible by 100 but not 400
    ])
    def test_date_validation(date_str, valid): ...
  example_bad: |
    # "Today's orders" — wrong way
    orders = Order.query.filter(
        Order.created_at.between("2026-03-01 00:00:00", "2026-03-01 23:59:59")
    )
    # Misses orders at 2026-03-01 23:59:59.001 through 23:59:59.999
    # Uses string comparison instead of proper datetime
    # No timezone — is this UTC? Server local time? User's timezone?
  when_applies: Any system that works with dates, times, or recurring events
  sources: ["https://www.iana.org/time-zones", "https://docs.python.org/3/library/zoneinfo.html"]

- id: PSE-008
  text: "Pagination edge cases kill API usability — page 0 vs page 1, last page with partial results, concurrent data changes between pages, and cursor-based vs offset-based each have different failure modes."
  why: >
    Pagination seems simple until you hit the edge cases. Offset-based pagination (page=3&limit=20)
    breaks when records are inserted or deleted between pages — users see duplicates or miss records.
    Cursor-based pagination (after=abc123) handles inserts/deletes but fails when the cursor record
    is deleted. Empty pages confuse clients — should GET /items?page=999 return 404 or 200 with empty
    results? The "total count" field is expensive to compute on large tables and becomes inaccurate
    immediately after the query. Most APIs get pagination wrong, leading to infinite scrolling bugs,
    missing records, and performance issues.
  how_to_do_right: |
    1. Prefer cursor-based pagination (keyset pagination) over offset-based for large datasets.
    2. For offset-based:
       - page starts at 1 (not 0) — page=0 returns 422
       - Last page returns partial results (not padded, not 404)
       - Response includes: total_count, page, limit, has_next, has_previous
       - total_count is optional for large tables (expensive COUNT(*))
    3. For cursor-based:
       - Cursor is opaque (base64-encoded, not raw ID)
       - Deleted cursor returns results from the "nearest" position
       - Response includes: items, next_cursor (null if no more), has_more
    4. Test: empty dataset, 1 item, exactly N items (full last page), N+1 items (partial last page).
    5. Test: request page beyond last page → 200 with empty items (not 404 or 500).
    6. Document pagination strategy in API docs with examples.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Cursor-based pagination with edge case handling
    @app.get("/api/v1/products")
    async def list_products(
        limit: int = Query(default=20, ge=1, le=100),
        after: str | None = Query(default=None),  # opaque cursor
    ):
        query = Product.query.order_by(Product.id)

        if after:
            cursor_id = decode_cursor(after)  # base64 → UUID
            if not await Product.exists(cursor_id):
                # Cursor deleted — find nearest valid position
                cursor_id = await Product.find_nearest(cursor_id)
            query = query.filter(Product.id > cursor_id)

        items = await query.limit(limit + 1).all()  # Fetch one extra to check has_more
        has_more = len(items) > limit
        items = items[:limit]

        return {
            "items": items,
            "next_cursor": encode_cursor(items[-1].id) if has_more else None,
            "has_more": has_more,
        }

    # Tests:
    # test_pagination_empty_dataset → {"items": [], "next_cursor": null, "has_more": false}
    # test_pagination_one_item → {"items": [item], "next_cursor": null, "has_more": false}
    # test_pagination_exact_limit → has_more: false (no extra item fetched)
    # test_pagination_deleted_cursor → returns from nearest position
  example_bad: |
    # Offset-based with no edge case handling
    @app.get("/products")
    async def list_products(page: int = 0, limit: int = 20):
        items = await Product.query.offset(page * limit).limit(limit).all()
        return items  # No total_count, no has_more, no next page info

    # page=0: is this valid? Returns same as page=1?
    # page=999999: returns [] with 200. Client doesn't know if it's past the end or data is empty.
    # Concurrent insert: user scrolls page 1→2→3, new item inserted on page 1, item on page 2 appears again on page 3.
  when_applies: Designing or implementing any paginated API endpoint
  sources: ["https://www.citusdata.com/blog/2016/03/30/five-ways-to-paginate/"]

- id: PSE-009
  text: "API edge cases live at the boundary between your system and the world — rate limits, auth expiry mid-request, request timeout, payload too large, and content-type mismatch all need explicit handling."
  why: >
    APIs are the frontier of your system. Every request arrives from an untrusted, unreliable, and
    potentially hostile environment. Rate limits expire between the check and the call. Auth tokens
    expire mid-request (especially for long-running operations). Payloads can be 10GB if you don't
    set limits. Content-Type can be text/plain when you expect application/json. These are not
    theoretical — they are the daily reality of production APIs. Each unhandled edge case becomes a
    500 error, a security vulnerability, or a resource exhaustion attack. API edge cases must be
    designed into the middleware layer, not handled ad-hoc in each endpoint.
  how_to_do_right: |
    1. Rate limiting: return 429 with Retry-After header. Include remaining quota in response headers.
    2. Auth expiry: check token expiry BEFORE processing. For long operations, re-validate mid-operation.
    3. Request timeout: set server-side timeout (30s default). Return 504 with context. Cancel background work.
    4. Payload size: set max body size in middleware (10MB default). Return 413 with limit info.
    5. Content-Type: validate Content-Type header. Return 415 if unexpected.
    6. Accept header: respect Accept header for response format. Return 406 if not supported.
    7. Implement all of the above in middleware (not per-endpoint) for consistency.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # API edge case middleware (FastAPI)
    from starlette.middleware import Middleware
    from starlette.middleware.trustedhost import TrustedHostMiddleware

    app = FastAPI()

    # Payload size limit
    @app.middleware("http")
    async def limit_body_size(request: Request, call_next):
        if request.headers.get("content-length"):
            if int(request.headers["content-length"]) > 10 * 1024 * 1024:  # 10MB
                return JSONResponse(status_code=413, content={"error": "Payload too large", "max_bytes": 10485760})
        return await call_next(request)

    # Rate limit response
    @app.exception_handler(RateLimitExceeded)
    async def rate_limit_handler(request, exc):
        return JSONResponse(
            status_code=429,
            content={"error": "Rate limit exceeded", "retry_after": exc.retry_after},
            headers={"Retry-After": str(exc.retry_after)},
        )

    # Auth expiry check
    async def get_current_user(token: str = Depends(oauth2_scheme)):
        payload = decode_token(token)
        if payload["exp"] < time.time():
            raise HTTPException(401, "Token expired", headers={"WWW-Authenticate": "Bearer"})
        return payload
  example_bad: |
    # No middleware, each endpoint handles (or forgets to handle) edge cases
    @app.post("/upload")
    async def upload(file: UploadFile):
        content = await file.read()  # No size limit — 10GB file = OOM
        # No auth check — endpoint was forgotten in the auth middleware config
        # No rate limit — bot uploads 10,000 files per second
        # No content-type check — receives a binary as "application/json"
  when_applies: Designing or securing any API endpoint
  sources: ["https://sre.google/sre-book/handling-overload/"]

- id: PSE-010
  text: "File upload edge cases are a security and reliability minefield — validate MIME type from content (not extension), limit file size BEFORE reading into memory, and scan for malware BEFORE processing."
  why: >
    File uploads are the most exploited attack surface in web applications. An attacker renames
    malware.exe to photo.jpg — extension-based validation passes. A user uploads a 50GB file — the
    server reads it all into memory and crashes (OOM). A malicious SVG file contains embedded
    JavaScript that executes when rendered. A ZIP bomb (42.zip) is 42KB compressed but 4.5 petabytes
    decompressed. A polyglot file is both a valid JPEG and a valid PHP script. Every one of these
    is a real, documented attack vector. File upload handling must be defensive by default.
  how_to_do_right: |
    1. Validate MIME type from file content (magic bytes), not from filename extension or Content-Type header.
    2. Set max file size in the web server config (nginx: client_max_body_size). Reject BEFORE reading into memory.
    3. Use streaming uploads for large files — write to disk/S3 in chunks, never load entire file into RAM.
    4. Scan uploaded files with antivirus/malware detection (ClamAV) BEFORE making them accessible.
    5. Generate new filenames (UUID) — never use user-provided filenames (path traversal: ../../etc/passwd).
    6. Store uploads outside the web root — serve via a separate domain/CDN (prevents XSS from uploaded HTML/SVG).
    7. For images: re-encode with Pillow/sharp to strip EXIF data and embedded scripts.
    8. For ZIP files: check decompressed size before extracting (ZIP bomb protection).
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    import magic
    import uuid

    ALLOWED_TYPES = {"image/jpeg", "image/png", "image/webp"}
    MAX_SIZE = 10 * 1024 * 1024  # 10MB

    @app.post("/api/v1/upload")
    async def upload_file(file: UploadFile):
        # 1. Check size BEFORE reading (from Content-Length header)
        if file.size and file.size > MAX_SIZE:
            raise HTTPException(413, f"File too large. Max: {MAX_SIZE} bytes")

        # 2. Read first 2KB for MIME detection
        header = await file.read(2048)
        mime_type = magic.from_buffer(header, mime=True)
        if mime_type not in ALLOWED_TYPES:
            raise HTTPException(422, f"Invalid file type: {mime_type}")

        # 3. Generate safe filename (never use user's filename)
        safe_name = f"{uuid.uuid4()}.{mime_type.split('/')[-1]}"

        # 4. Stream to storage
        await file.seek(0)
        await s3.upload_fileobj(file.file, bucket="uploads", key=safe_name)

        # 5. Scan for malware (async, before making accessible)
        await malware_scanner.scan(bucket="uploads", key=safe_name)

        return {"file_id": safe_name}
  example_bad: |
    @app.post("/upload")
    async def upload(file: UploadFile):
        content = await file.read()  # OOM on large file
        filename = file.filename  # Path traversal: "../../etc/passwd"
        with open(f"/uploads/{filename}", "wb") as f:  # Writes to filesystem directly
            f.write(content)
        # No MIME validation, no size check, no malware scan, user-controlled filename
  when_applies: Any system that accepts file uploads from users
  sources: ["https://cheatsheetseries.owasp.org/cheatsheets/File_Upload_Cheat_Sheet.html"]

- id: PSE-011
  text: "Financial edge cases are unforgiving — rounding errors accumulate, floating-point is never acceptable for money, and currency conversion must specify the exact exchange rate and moment in time."
  why: >
    Money is the domain where bugs have the most direct consequences. A floating-point rounding error
    of $0.01 per transaction becomes $10,000 per million transactions. Currency conversion without
    specifying the exchange rate and timestamp creates discrepancies that are impossible to audit.
    Negative amounts in refunds, zero-amount transactions in free trials, and partial-cent calculations
    in fee splitting all need explicit handling. Financial systems must use integer cents (or the
    smallest currency unit), never floating-point, and must track every calculation with the precision
    and rules used. A financial system that uses float will eventually be wrong, and when it's wrong
    about money, lawsuits follow.
  how_to_do_right: |
    1. Store money as integers in the smallest unit: cents (USD), centavos (BRL), pence (GBP).
    2. NEVER use float/double for monetary calculations. Use Decimal with explicit rounding rules.
    3. For fee splitting: document the rounding strategy. "Platform fee: 10% of $33.33 = $3.333 → round DOWN to $3.33, seller gets $30.00."
    4. For currency conversion: store the exchange rate AND timestamp with every conversion.
    5. For refunds: handle partial refunds, over-refunds (never refund more than charged), and refund of refund.
    6. For free trials: $0.00 transactions are valid. Test that zero-amount flows work end to end.
    7. Reconciliation: sum of parts MUST equal total. If rounding makes them differ, allocate the remainder explicitly.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    from decimal import Decimal, ROUND_HALF_UP

    # Money as integer cents
    class Money:
        amount_cents: int  # NEVER float
        currency: str      # ISO 4217: "USD", "BRL"

    # Fee splitting with explicit rounding
    def split_payment(total_cents: int, platform_fee_pct: Decimal) -> tuple[int, int]:
        fee_cents = int((Decimal(total_cents) * platform_fee_pct / 100).quantize(
            Decimal("1"), rounding=ROUND_HALF_UP
        ))
        seller_cents = total_cents - fee_cents  # Seller gets remainder — no cents lost
        assert fee_cents + seller_cents == total_cents  # Conservation law
        return fee_cents, seller_cents

    # Currency conversion with audit trail
    class CurrencyConversion:
        source_amount_cents: int
        source_currency: str
        target_amount_cents: int
        target_currency: str
        exchange_rate: Decimal  # Exact rate used
        rate_timestamp: datetime  # When the rate was fetched
        rate_source: str  # "ECB", "XE", "internal"
  example_bad: |
    # Money as float
    total = 33.33
    fee = total * 0.10  # 3.3330000000000004 (floating-point imprecision)
    seller = total - fee  # 29.997 — seller loses 0.003 per transaction

    # After 1M transactions: $3,000 discrepancy. Audit fails.
    # No exchange rate stored: "We converted at some rate at some time" — unauditable.
  when_applies: Any system involving monetary calculations, payments, or financial reporting
  sources: ["https://martinfowler.com/eaaCatalog/money.html"]

- id: PSE-012
  text: "Search edge cases reveal the gap between developer expectations and user reality — users search for 'iphone 15 pro max blue 256gb' while your search only handles single keywords."
  why: >
    Search is the feature with the widest gap between user expectations and developer implementation.
    Users expect Google-quality natural language search. Developers build keyword matching. The result:
    searching "red shoes size 10" returns results for "red" OR "shoes" OR "size" OR "10" — including
    blue shoes, red hats, and size 10 wrenches. Users also make typos ("iphoen"), use synonyms
    ("sneakers" vs "trainers"), search in the wrong field ("put tracking number in search bar"),
    and search for things that don't exist ("product from competitor's catalog"). Every one of these
    is a search edge case that must be handled explicitly.
  how_to_do_right: |
    1. Test with real user queries (extract from search logs, not developer imagination).
    2. Handle multi-word queries: decide AND vs OR behavior, phrase matching, field weighting.
    3. Handle typos: implement fuzzy matching (Levenshtein distance, n-grams).
    4. Handle synonyms: maintain a synonym dictionary for the domain.
    5. Handle empty results: show "Did you mean...?" suggestions, related products, or popular items.
    6. Handle special characters in queries: parentheses, quotes, *, ?, - (search operators or literal text?).
    7. Handle very long queries: truncate or reject beyond reasonable length.
    8. Log all searches with zero results — they reveal feature gaps and UX problems.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Search edge case handling
    @app.get("/api/v1/products/search")
    async def search_products(q: str = Query(min_length=1, max_length=200)):
        # 1. Normalize: lowercase, strip extra whitespace
        query = normalize_search_query(q)

        # 2. Try exact phrase match first
        results = await search_engine.search(query, mode="phrase")

        # 3. If no results, try fuzzy match (handles typos)
        if not results:
            results = await search_engine.search(query, mode="fuzzy", fuzziness=2)

        # 4. If still no results, try synonym expansion
        if not results:
            expanded = synonym_dictionary.expand(query)
            results = await search_engine.search(expanded, mode="any")

        # 5. If still no results, return suggestions
        if not results:
            suggestions = await search_engine.suggest(query)
            return {"items": [], "suggestions": suggestions, "message": "No exact matches found"}

        # 6. Log zero-result queries for product team
        if not results:
            await analytics.log_zero_result_search(query=q, user_id=current_user.id)

        return {"items": results}
  example_bad: |
    # Simple LIKE search
    results = db.query(f"SELECT * FROM products WHERE name LIKE '%{query}%'")
    # SQL injection risk + no fuzzy matching + no synonyms + no suggestions
    # "iphone" → finds "iPhone" only if case-insensitive
    # "iphoen" → zero results, no typo correction
    # "phone case" → finds "phone" but not "case for phone"
  when_applies: Implementing or improving any search functionality
  sources: ["https://www.elastic.co/guide/en/elasticsearch/reference/current/full-text-queries.html"]

