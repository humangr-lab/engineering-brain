- id: PSE-013
  text: "Date range edge cases break reports and billing — start equals end (one day or zero?), open-ended ranges (no end date), ranges spanning DST/timezone changes, and inclusive vs exclusive end dates."
  why: >
    Date ranges are deceptively complex because humans and computers interpret them differently. "From
    March 1 to March 31" — is March 31 included? "Last 30 days" — from midnight today or from now?
    "This month" — in which timezone? A billing period from "2026-03-01 to 2026-04-01" might be 30 or
    31 days depending on inclusive/exclusive interpretation. Date range bugs cause incorrect billing
    (charging for an extra day), incorrect reports (missing or duplicating a day's data), and
    incorrect SLA calculations (counting or not counting the boundary dates). Every date range in
    the system needs an explicit half-open/closed convention documented and tested.
  how_to_do_right: |
    1. Choose a convention and use it EVERYWHERE: half-open [start, end) is recommended.
       - [start, end): start is included, end is excluded. "March 1 to April 1" = all of March.
    2. Document the convention in the API docs, database comments, and code constants.
    3. For "today": [today 00:00:00 UTC, tomorrow 00:00:00 UTC) — half-open, timezone-explicit.
    4. Test boundary dates:
       - start == end: what does it mean? Zero-length range or one-day range?
       - start > end: reject with 422, not silently return empty results
       - Range spanning DST: 2026-03-08 to 2026-03-09 in US/Eastern = 23 hours, not 24
       - Range spanning year: 2025-12-31 to 2026-01-01
    5. For open-ended ranges (no end date): use sentinel value (9999-12-31) or NULL with explicit semantics.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Date range with explicit half-open convention [start, end)
    @app.get("/api/v1/reports/sales")
    async def sales_report(
        start_date: date,  # Inclusive
        end_date: date,    # Exclusive (half-open)
    ):
        if start_date >= end_date:
            raise HTTPException(422, "start_date must be before end_date")

        # Half-open: >= start, < end
        sales = await db.query(
            "SELECT * FROM sales WHERE sale_date >= :start AND sale_date < :end",
            {"start": start_date, "end": end_date}
        )
        return {"period": f"[{start_date}, {end_date})", "total": sum(s.amount for s in sales)}

    # Tests:
    # start=2026-03-01, end=2026-04-01 → all of March (31 days)
    # start=2026-03-01, end=2026-03-01 → 422 (zero-length range)
    # start=2026-04-01, end=2026-03-01 → 422 (inverted range)
    # start=2025-12-31, end=2026-01-02 → cross-year boundary works
  example_bad: |
    # Ambiguous date range
    sales = Sales.query.filter(
        Sales.date >= start_date,
        Sales.date <= end_date  # Inclusive end — is end_date counted or not?
    )
    # "March 1 to March 31": 31 days with <=, 30 days with <
    # Different endpoints use different conventions → reports disagree
    # Billing uses <=, analytics uses <. Monthly total differs by one day of revenue.
  when_applies: Any system with date ranges for reports, billing, or filtering
  sources: ["https://www.iso.org/iso-8601-date-and-time-format.html"]

- id: PSE-014
  text: "Permission edge cases are the intersection of security and UX — what happens when permissions change mid-session, when a user has conflicting roles, or when the permission check itself fails?"
  why: >
    Permission systems are state machines that most developers treat as simple lookups. But permissions
    change in real-time: an admin revokes a user's access while they have an active session. A user
    belongs to two groups with conflicting permissions (group A grants write, group B denies write).
    The permission service is temporarily unavailable. Each scenario requires an explicit policy, not
    an assumption. The most dangerous assumption is "fail open" — when the permission check fails,
    granting access by default. This turns every permission service outage into a security incident.
  how_to_do_right: |
    1. Define policy for permission changes mid-session:
       - Immediate enforcement: check on every request (stateless JWT → database lookup)
       - Grace period: cache permissions for N minutes, accept brief inconsistency
       - Logout trigger: revoke session when permissions change (most secure)
    2. Define conflict resolution for overlapping roles:
       - Deny wins: if any role denies, access is denied (most restrictive, most secure)
       - Most specific wins: role on resource > role on group > global role
       - Explicit resolution: admin must resolve conflicts during role assignment
    3. Define failure policy: ALWAYS fail closed (deny access when permission check fails).
    4. Test: change permission during active session. Verify next request reflects the change.
    5. Test: assign conflicting roles. Verify the conflict resolution policy applies.
    6. Test: permission service down. Verify fail-closed behavior.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Permission check with fail-closed and conflict resolution
    async def check_permission(user_id: UUID, resource: str, action: str) -> bool:
        try:
            roles = await permission_service.get_user_roles(user_id)
        except PermissionServiceUnavailable:
            # FAIL CLOSED — deny access when service is down
            logger.critical("Permission service unavailable — denying access (fail-closed)")
            return False

        grants = []
        denials = []
        for role in roles:
            perm = role.get_permission(resource, action)
            if perm == "DENY":
                denials.append(role)
            elif perm == "GRANT":
                grants.append(role)

        # DENY WINS — if any role denies, access is denied
        if denials:
            logger.info(f"Access denied for {user_id} on {resource}:{action} by roles: {denials}")
            return False

        return len(grants) > 0

    # Session revocation on permission change
    @event_handler("permission.changed")
    async def on_permission_changed(user_id: UUID):
        await session_store.revoke_all(user_id)  # Force re-authentication
  example_bad: |
    # Simple permission check — no edge case handling
    async def check_permission(user_id, resource, action):
        try:
            return await permission_service.check(user_id, resource, action)
        except Exception:
            return True  # FAIL OPEN — service down = everyone is admin

    # Conflicting roles: no resolution policy. Last-checked role wins (random).
    # Mid-session revocation: JWT cached for 1 hour. Fired employee has access for 1 hour.
  when_applies: Implementing any permission or authorization system
  sources: ["https://cheatsheetseries.owasp.org/cheatsheets/Authorization_Cheat_Sheet.html"]

- id: PSE-015
  text: "Nested entity edge cases are the Russian dolls of bugs — an order with items, each with variants, each with discounts, each with taxes. Every nesting level multiplies the edge case count."
  why: >
    Nested entities create combinatorial edge case explosions. An order has items. Each item has a
    quantity, a price, and a discount. Each item may have tax rules. The order has a shipping address
    that affects tax calculation. The order has a coupon that applies to some items but not others.
    Each nesting level multiplies the possible states: 3 items × 2 discount types × 4 tax rules =
    24 combinations to test. Developers test the simple case (1 item, no discount, standard tax) and
    ship. Production discovers: negative total when discount exceeds item price, tax calculated on
    discounted amount instead of original, coupon applied twice because two items qualify.
  how_to_do_right: |
    1. Map the nesting hierarchy: Order → Items → Variants → Discounts → Taxes.
    2. For each level, identify the edge cases: empty (0 items), singular (1 item), many (max items).
    3. Test cross-level interactions:
       - Discount + Tax: is tax on original or discounted price? Document and test.
       - Coupon + Item Discount: do they stack? Is there a max combined discount?
       - Quantity × Price: overflow possible? 999,999 items × $999,999.99 = ?
    4. Use property-based testing: generate random nested structures, assert invariants hold.
    5. Calculate totals bottom-up (leaf to root) and verify with a top-down sanity check.
    6. Document the calculation order: item price → apply item discount → apply coupon → calculate tax → sum → apply order discount.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Nested entity edge case tests for order calculation
    @pytest.mark.parametrize("scenario", [
        # Edge case: empty order
        {"items": [], "expected_total": 0, "expected_error": "Order must have at least 1 item"},
        # Edge case: single item, no discount
        {"items": [{"price": 1000, "qty": 1, "discount": 0}], "expected_total": 1000},
        # Edge case: discount > item price (should cap at item price, not go negative)
        {"items": [{"price": 1000, "qty": 1, "discount": 1500}], "expected_total": 0},
        # Edge case: many items with mixed discounts and tax
        {"items": [
            {"price": 1000, "qty": 2, "discount": 100, "tax_rate": 10},  # (1000-100)*2*1.10 = 1980
            {"price": 500, "qty": 1, "discount": 0, "tax_rate": 0},      # 500
        ], "expected_total": 2480},
        # Edge case: max quantity overflow check
        {"items": [{"price": 99999999, "qty": 99999}], "expected_total": "assert_no_overflow"},
    ])
    def test_order_total_calculation(scenario): ...
  example_bad: |
    # Only test: 2 items, standard prices, no discounts
    def test_order_total():
        order = create_order(items=[
            {"price": 10.00, "qty": 1},
            {"price": 20.00, "qty": 2},
        ])
        assert order.total == 50.00

    # Never tested: discount exceeding price, tax on discounted amount,
    # coupon + discount interaction, zero-quantity items, max integer overflow
  when_applies: Implementing any feature with nested entities and calculated fields
  sources: ["https://martinfowler.com/bliki/ValueObject.html"]

- id: PSE-016
  text: "Bulk operation edge cases scale linearly with data but exponentially with complexity — a bulk import of 10,000 records must handle partial failures, rollback strategy, and progress reporting."
  why: >
    Bulk operations are single-record operations multiplied by thousands, but their failure modes are
    completely different. A single record fails validation: return 422. Ten thousand records where 47
    fail validation: return... what? All-or-nothing rollback (discard 9,953 valid records)? Partial
    success (import 9,953, report 47 errors)? Both are valid strategies, but the choice must be
    explicit. Bulk operations also need progress reporting (users stare at a spinner for 10 minutes),
    duplicate detection (the same CSV uploaded twice), and resume capability (network interrupts at
    record 5,000 — start over?).
  how_to_do_right: |
    1. Choose a failure strategy and document it:
       - All-or-nothing: validate ALL records first, import only if ALL pass. Best for financial data.
       - Partial success: import valid records, report failures. Best for user-facing imports.
       - Skip and continue: skip invalid records silently. NEVER do this — data loss.
    2. Implement progress reporting: total, processed, succeeded, failed, elapsed time, ETA.
    3. Handle duplicate detection: hash each record, check against already-imported records.
    4. Implement resume: checkpoint after every N records. On restart, skip already-imported records.
    5. Set limits: max records per import (e.g., 100,000), max file size, max concurrent imports per user.
    6. Return a detailed report: which records succeeded, which failed, why each failed.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Bulk import with partial success strategy
    @app.post("/api/v1/products/import")
    async def bulk_import(file: UploadFile, background_tasks: BackgroundTasks):
        job_id = uuid4()

        # 1. Validate file format and size
        if file.size > 50 * 1024 * 1024:
            raise HTTPException(413, "Max file size: 50MB")

        # 2. Start async processing with progress tracking
        background_tasks.add_task(process_import, job_id, file)
        return {"job_id": job_id, "status_url": f"/api/v1/imports/{job_id}"}

    async def process_import(job_id: UUID, file: UploadFile):
        results = {"total": 0, "succeeded": 0, "failed": 0, "errors": []}
        for i, row in enumerate(parse_csv(file)):
            results["total"] = i + 1
            try:
                await validate_and_insert(row)
                results["succeeded"] += 1
            except ValidationError as e:
                results["failed"] += 1
                results["errors"].append({"row": i + 1, "error": str(e)})

            # Checkpoint every 1000 records (for resume)
            if i % 1000 == 0:
                await save_checkpoint(job_id, i, results)

    # GET /api/v1/imports/{job_id} → progress report with succeeded/failed/errors
  example_bad: |
    # Bulk import: all in one synchronous request
    @app.post("/import")
    async def import_products(file: UploadFile):
        rows = parse_csv(await file.read())  # OOM on large file
        for row in rows:
            Product.create(**row)  # No validation, no error handling
        return {"imported": len(rows)}

    # No progress reporting (user sees spinner for 10 minutes)
    # No failure handling (one bad row → 500, all rows lost)
    # No resume (timeout at row 5000, must restart from row 1)
    # No duplicate detection (upload twice → double the data)
  when_applies: Implementing any bulk import, export, or batch processing feature
  sources: ["https://sre.google/sre-book/addressing-cascading-failures/"]

- id: PSE-017
  text: "Deletion edge cases are the most dangerous because they're irreversible — soft delete vs hard delete, cascade behavior, referential integrity, and the right to be forgotten (GDPR) all need explicit strategy."
  why: >
    Deletion is the only operation that destroys data. Every other operation (create, update) adds
    information. Deletion removes it, often irreversibly. The consequences of wrong deletion are
    severe: hard-deleting an order loses financial records (audit failure). Soft-deleting a user
    without cascading leaves orphaned records. Deleting a product that's in active orders breaks
    order display. Not deleting user data violates GDPR. The deletion strategy must be the most
    carefully designed part of the data model, yet it's usually an afterthought — "we'll add
    is_deleted later."
  how_to_do_right: |
    1. Define deletion strategy per entity type:
       - Soft delete (is_deleted + deleted_at): for entities with references (users, products, orders)
       - Hard delete: for ephemeral data (sessions, temp files, expired tokens)
       - Archive: for regulatory retention (financial records: soft delete + 7-year retention)
    2. For soft delete, update ALL queries to filter deleted records:
       - Default scope: WHERE deleted_at IS NULL (global query filter)
       - Admin scope: includes deleted records (for support/audit)
    3. Cascade strategy per relationship (document in Cascade Map):
       - Parent soft-deleted: children soft-deleted or orphaned (with fallback display)?
       - Parent hard-deleted: children hard-deleted (CASCADE) or blocked (RESTRICT)?
    4. GDPR right-to-erasure: schedule hard delete after retention period (30 days).
    5. Test: delete entity, verify all references handle the deletion gracefully.
    6. Test: restore soft-deleted entity, verify all relationships are intact.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Deletion strategy by entity
    | Entity  | Strategy     | Cascade                        | GDPR        | Retention |
    |---------|-------------|--------------------------------|-------------|-----------|
    | User    | Soft delete | Sessions → hard delete         | Hard delete | 30 days   |
    |         |             | Orders → anonymize (user_id=null) | after 30d |           |
    |         |             | Comments → anonymize (author="[Deleted]") |  |           |
    | Order   | Soft delete | Never hard delete (financial)  | Anonymize   | 7 years   |
    | Session | Hard delete | No cascade (leaf entity)       | N/A         | 0 days    |
    | Product | Soft delete | Order items → show "[Discontinued]" | N/A    | N/A       |

    # Soft delete implementation
    class SoftDeleteMixin:
        deleted_at: datetime | None = None

        @classmethod
        def default_scope(cls):
            return cls.query.filter(cls.deleted_at.is_(None))

        def soft_delete(self):
            self.deleted_at = datetime.now(UTC)
            self.save()
            self._cascade_soft_delete()
  example_bad: |
    # DELETE FROM users WHERE id = 123;
    # Oops — 47 orders now reference a non-existent user.
    # GET /orders/456 → 500 error: "User not found for order.user_id = 123"
    # Financial report: "Unknown user" × 847 records
    # GDPR: user data in orders, comments, and logs not deleted → violation
  when_applies: Designing deletion behavior for any entity in any system
  sources: ["https://gdpr-info.eu/art-17-gdpr/"]

- id: PSE-018
  text: "Migration edge cases determine whether your deploy is a non-event or a disaster — zero-downtime migrations, backward-compatible schema changes, data backfills, and rollback plans are required, not optional."
  why: >
    Database migrations are the riskiest part of any deployment. A schema change that locks a table
    for 30 minutes takes the entire application down. A NOT NULL column added without a default value
    fails on existing rows. A column rename breaks the old application version that's still running
    during rolling deploys. A data backfill that updates 10 million rows exhausts the connection pool.
    Every migration must be designed for zero-downtime deployment: backward-compatible, non-locking,
    and reversible. This is not optional for any system that serves users.
  how_to_do_right: |
    1. All schema changes must be backward-compatible (expand-then-contract pattern):
       - Adding column: add with DEFAULT, deploy code, backfill, then optionally add NOT NULL
       - Removing column: deploy code that ignores column, then remove column in next release
       - Renaming column: add new column, deploy code using both, backfill, remove old column
    2. No locking operations on large tables:
       - Use CREATE INDEX CONCURRENTLY (PostgreSQL) instead of CREATE INDEX
       - Add NOT NULL via CHECK constraint (non-blocking) then convert
    3. Data backfills in batches: UPDATE ... WHERE id BETWEEN $1 AND $2 LIMIT 1000
    4. Every migration must have a rollback script tested before deployment.
    5. Test migration on a copy of production data (volume and variety matter).
    6. Monitor migration progress: rows processed, elapsed time, ETA, lock waits.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Zero-downtime column rename: old_name → new_name (3-step process)

    # Migration 1: Add new column (backward compatible)
    # Old code still uses old_name, new column exists but is unused
    ALTER TABLE orders ADD COLUMN new_name VARCHAR(255);
    UPDATE orders SET new_name = old_name WHERE new_name IS NULL;  -- backfill in batches

    # Deploy: code now reads from new_name, writes to BOTH old_name and new_name

    # Migration 2: Remove old column (after all instances run new code)
    ALTER TABLE orders DROP COLUMN old_name;

    # Rollback plan for Migration 1: DROP COLUMN new_name (safe, no data loss)
    # Rollback plan for Migration 2: re-add old_name, backfill from new_name

    # Batch backfill script
    DO $$
    DECLARE
        batch_size INT := 1000;
        max_id INT;
        current_id INT := 0;
    BEGIN
        SELECT MAX(id) INTO max_id FROM orders;
        WHILE current_id < max_id LOOP
            UPDATE orders SET new_name = old_name
            WHERE id > current_id AND id <= current_id + batch_size AND new_name IS NULL;
            current_id := current_id + batch_size;
            PERFORM pg_sleep(0.1);  -- Throttle to avoid lock contention
        END LOOP;
    END $$;
  example_bad: |
    # Rename column directly
    ALTER TABLE orders RENAME COLUMN old_name TO new_name;
    # All running instances immediately break: "column old_name does not exist"
    # Rolling deploy: half the instances use old_name, half use new_name
    # Fix: emergency rollback, but rollback also breaks the new instances.
    # Result: 15 minutes of downtime, 500 errors for all users.
  when_applies: Planning any database schema change or data migration
  sources: ["https://martinfowler.com/bliki/ParallelChange.html"]
