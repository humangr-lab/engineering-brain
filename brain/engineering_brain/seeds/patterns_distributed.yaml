    technologies:
      lang: [python, java, go]
    domains:
      domain: [distributed, distributed]
      concern: [pattern, best_practice]
    when_applies: "Any message-driven system where consumers can encounter messages that are permanently unprocessable:
malformed payloads, schema mismatches, referencing entities that no longer exist, or triggering
app."

    related_principles: [P-MSG-DLQ, P-ERR-ACTIONABLE, P-MSG-BACKOFF]
