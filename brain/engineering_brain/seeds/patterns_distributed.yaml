  - id: PAT-DIST-DLQ
    name: "Dead Letter Queue Pattern"
    category: distributed
    intent: "Capture messages that cannot be processed after exhausting retries, preventing poison messages from blocking the queue while preserving them for investigation."
    when_to_use: |
      Any message-driven system where consumers can encounter messages that are permanently unprocessable:
      malformed payloads, schema mismatches, referencing entities that no longer exist, or triggering
      application bugs. Without a DLQ, a poison message blocks the entire queue (head-of-line blocking) — the
      consumer retries forever, no subsequent messages are processed, and the backlog grows until the system
      collapses. The DLQ pattern configures the broker to move a message to a separate dead letter queue after
      N failed processing attempts. Use it in every production message consumer. The DLQ serves as both a
      safety valve (keeps the main queue flowing) and an investigation tool (operators can inspect, fix, and
      replay failed messages). Pair it with alerting on DLQ depth to catch systemic issues early.
    when_not_to_use: |
      Synchronous request-response APIs where errors are returned immediately to the caller. In-memory
      queues in single-process applications where a simpler error handler suffices. Fire-and-forget
      telemetry where losing a small percentage of messages is acceptable.
    languages: [Python, Java, Go]
    example_good: |
      import json
      from dataclasses import dataclass

      @dataclass
      class DLQMessage:
          original_message: dict
          error: str
          attempts: int
          original_queue: str
          failed_at: str

      class ResilientConsumer:
          MAX_RETRIES = 3

          def __init__(self, main_queue, dlq, handler):
              self.main_queue = main_queue
              self.dlq = dlq
              self.handler = handler

          def consume(self):
              for message in self.main_queue.receive():
                  attempts = message.metadata.get("retry_count", 0)
                  try:
                      self.handler(message.body)
                      self.main_queue.ack(message)
                  except Exception as e:
                      if attempts >= self.MAX_RETRIES:
                          self._send_to_dlq(message, str(e), attempts)
                          self.main_queue.ack(message)  # Remove from main queue
                          logger.error("Message %s -> DLQ after %d attempts: %s",
                                       message.id, attempts, e)
                      else:
                          self.main_queue.nack(message, retry_count=attempts + 1)

          def _send_to_dlq(self, message, error, attempts):
              dlq_msg = DLQMessage(
                  original_message=message.body,
                  error=error,
                  attempts=attempts,
                  original_queue=self.main_queue.name,
                  failed_at=datetime.now(timezone.utc).isoformat(),
              )
              self.dlq.publish(json.dumps(asdict(dlq_msg)))
    example_bad: |
      def consume_messages(queue, handler):
          for message in queue.receive():
              try:
                  handler(message.body)
                  queue.ack(message)
              except Exception:
                  # Requeue with no retry limit — poison message retried forever
                  queue.nack(message)
                  # This message fails, gets requeued, fails again, requeued...
                  # Head-of-line blocking: no other message is processed
                  # Queue depth grows unbounded
                  # No record of WHY it failed — impossible to investigate
                  # No alerting — team discovers the problem hours later via customer complaints
    text: "Dead Letter Queue Pattern -- Capture messages that cannot be processed after exhausting retries, preventing poison messages from blocking the queue while preserving them for investigation."
    why: "Capture messages that cannot be processed after exhausting retries, preventing poison messages from blocking the queue while preserving them for investigation."
