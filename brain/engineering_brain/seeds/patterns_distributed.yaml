  # === Coordination Patterns ===
  - id: PAT-DIST-LEADER-ELECTION
    name: "Leader Election Pattern"
    category: distributed
    intent: "Ensure exactly one instance in a distributed cluster acts as the active coordinator for a given task, preventing duplicate work and split-brain scenarios."
    when_to_use: |
      Any distributed system where exactly one node must perform a coordination task at any given time:
      scheduled job execution (cron in a cluster — only one node should fire the job), shard rebalancing,
      cache warming, database migration, or acting as a write leader in a leader-follower replication setup.
      Without leader election, running 3 replicas of a service that each independently fire a daily billing
      job results in triple-charging customers. The pattern uses a consensus mechanism (ZooKeeper, etcd, Consul,
      or a database advisory lock) to elect a single leader. All other nodes become followers that monitor the
      leader's health and participate in a new election if the leader fails. Use it when the coordinated task
      must not run concurrently on multiple nodes, and when automatic failover (new election on leader crash) is
      required for availability.
    when_not_to_use: |
      Stateless services where all instances can independently handle any request — no coordination needed.
      Tasks that are idempotent and safe to run on multiple nodes simultaneously (each node running its own
      health check). Environments without a reliable consensus store.
    languages: [Python, Java, Go]
    example_good: |
      import time
      import threading

      class LeaderElection:
          """Leader election using etcd lease-based mechanism."""
          def __init__(self, etcd_client, election_key: str, node_id: str, ttl: int = 10):
              self.etcd = etcd_client
              self.key = election_key
              self.node_id = node_id
              self.ttl = ttl
              self.is_leader = False
              self.lease = None

          def campaign(self):
              """Attempt to become leader by acquiring a lease-backed key."""
              self.lease = self.etcd.lease(self.ttl)
              try:
                  # put_if_absent — only succeeds if no current leader
                  success = self.etcd.put_if_absent(
                      self.key, self.node_id, lease=self.lease
                  )
                  if success:
                      self.is_leader = True
                      self._start_keepalive()
                      logger.info("Node %s elected as leader", self.node_id)
                  else:
                      self._watch_leader()
              except Exception as e:
                  logger.error("Election failed: %s", e)
                  self.is_leader = False

          def _start_keepalive(self):
              """Refresh lease periodically to maintain leadership."""
              def keepalive():
                  while self.is_leader:
                      self.lease.refresh()
                      time.sleep(self.ttl // 3)
              threading.Thread(target=keepalive, daemon=True).start()

          def _watch_leader(self):
              """Watch for leader key deletion to trigger new election."""
              self.etcd.watch(self.key, callback=lambda e: self.campaign())
    example_bad: |
      import time
      import random

      class NaiveScheduler:
          """Every instance independently runs scheduled jobs — no coordination."""
          def run_billing_job(self):
              # All 3 replicas wake up at midnight and run billing
              # Result: customers charged 3x
              while True:
                  if self.is_midnight():
                      self.charge_all_customers()  # Runs on EVERY instance
                  time.sleep(60)

      class FileBasedLock:
          """Attempting leader election via shared filesystem — broken."""
          def try_lock(self):
              # Race condition: two nodes check, both see no lock, both write
              if not os.path.exists("/shared/leader.lock"):
                  with open("/shared/leader.lock", "w") as f:
                      f.write(self.node_id)
                  # Node crashes here — lock file persists forever (no TTL)
                  # No other node can ever become leader — permanent deadlock
                  return True
              return False
    text: "Leader Election Pattern -- Ensure exactly one instance in a distributed cluster acts as the active coordinator for a given task, preventing duplicate work and split-brain scenarios."
    why: "Ensure exactly one instance in a distributed cluster acts as the active coordinator for a given task, preventing duplicate work and split-brain scenarios."
