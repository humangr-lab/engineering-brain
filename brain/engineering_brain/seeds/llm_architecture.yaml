layer: patterns
technology: General
domain: ai
knowledge:
- id: CR-LLM-SYSPROMPT-001
  text: 'System Prompt Architecture — Structure system prompts with clear sections: role definition, constraints, output format
    specification, and few-shot examples.'
  why: 'An unstructured system prompt produces inconsistent outputs. When the LLM does not know its role, constraints, or
    expected output format, it defaults to generic assistant behavior — sometimes verbose, sometimes terse, sometimes following
    instructions, sometimes not. A well-structured system prompt acts like a function signature: it defines inputs, outputs,
    and invariants. Teams that adopted structured system prompts saw a 35% reduction in prompt-related bugs and 50% fewer
    ''the AI did something unexpected'' incidents. The model performs best when it has clear boundaries and examples to anchor
    its behavior.'
  how_to_do_right: '1. ROLE: Define who the model is and what it does (1-2 sentences). Be specific, not generic.

    2. CONSTRAINTS: Explicit rules and limitations. What it MUST NOT do is as important as what it should.

    3. OUTPUT FORMAT: Specify exact format (JSON schema, markdown structure, XML tags).

    4. EXAMPLES: 2-3 few-shot examples showing input→output pairs for the expected format.

    5. EDGE CASES: What to do when input is ambiguous, incomplete, or outside scope.

    6. Keep system prompts versioned in code (not hardcoded strings) — treat them like configuration.

    '
  severity: critical
  technologies:
    framework: [ai, langchain, llamaindex]
    library: [openai, anthropic]
  domains:
    domain: [architecture]
    concern: [ai, prompt_engineering, llm]
  example_good: "SYSTEM_PROMPT = \"\"\"\n# Role\nYou are a code review assistant for Python projects. You analyze code changes\n\
    and produce structured feedback focused on bugs, security issues, and maintainability.\n\n# Constraints\n- Only comment\
    \ on issues you are confident about (>80% certainty).\n- Never suggest style changes (formatting, naming conventions)\
    \ — those are handled by linters.\n- If the code is correct and well-written, respond with an empty findings list.\n-\
    \ Maximum 5 findings per review. Prioritize by severity.\n\n# Output Format\nRespond with valid JSON matching this schema:\n\
    {\n  \"findings\": [\n    {\n      \"severity\": \"critical|high|medium|low\",\n      \"file\": \"path/to/file.py\",\n\
    \      \"line\": 42,\n      \"issue\": \"Brief description of the problem\",\n      \"suggestion\": \"How to fix it with\
    \ code example\"\n    }\n  ],\n  \"summary\": \"One sentence overall assessment\"\n}\n\n# Examples\nInput: `def divide(a,\
    \ b): return a / b`\nOutput: {\"findings\": [{\"severity\": \"high\", \"file\": \"math_utils.py\", \"line\": 1,\n    \
    \     \"issue\": \"Division by zero not handled\",\n         \"suggestion\": \"Add `if b == 0: raise ValueError('Division\
    \ by zero')`\"}],\n         \"summary\": \"Missing zero-division guard.\"}\n\"\"\"\n"
  example_bad: '# Unstructured prompt — inconsistent behavior

    SYSTEM_PROMPT = "You are a helpful code reviewer. Review the code and give feedback."

    # Problems:

    # - No output format: sometimes returns markdown, sometimes plain text, sometimes JSON

    # - No constraints: comments on style, formatting, naming — noise

    # - No examples: model guesses what "feedback" means

    # - No severity: all issues treated equally

    # - No edge cases: on perfect code, invents issues to seem helpful

    '
  sources: ["https://platform.openai.com/docs/guides/prompt-engineering"]
  when_applies: "When designing system prompts for LLM-powered applications that need consistent behavior"
- id: CR-LLM-COT-001
  text: Chain-of-Thought Prompting — Instruct the model to reason step-by-step before producing a final answer to improve
    accuracy on complex tasks.
  why: 'LLMs are autoregressive — they predict the next token based on previous tokens. Without chain-of-thought (CoT), the
    model jumps directly to an answer, which for complex reasoning tasks (math, multi-step logic, code analysis) is often
    wrong. CoT forces the model to generate intermediate reasoning steps, which become part of the context for the final answer.
    Google showed CoT improves math problem accuracy from 17.7% to 78.7% on GSM8K. The key insight: the model is not just
    explaining its reasoning — the reasoning tokens ARE the computation. Without them, the model lacks the intermediate state
    needed for correct answers.'
  how_to_do_right: '1. Add "Think step by step" or "Let''s work through this carefully" to your prompt.

    2. For structured tasks, provide a reasoning template: "Step 1: Identify X. Step 2: Evaluate Y."

    3. Zero-shot CoT ("Think step by step") works for simple tasks. Few-shot CoT (with examples) works better for complex
    tasks.

    4. Chain-of-thought with self-consistency: generate multiple reasoning paths, take majority vote.

    5. For production: extract the final answer from the reasoning with a structured parser.

    6. CoT increases token usage (and cost). Use it selectively for tasks that need reasoning.

    '
  severity: high
  technologies:
    library: [openai, anthropic, llm]
  domains:
    domain: [architecture]
    concern: [ai, prompt_engineering, reasoning]
  example_good: '# Few-shot CoT with reasoning template

    SYSTEM_PROMPT = """

    You are a security auditor analyzing code for vulnerabilities.


    For each code snippet, follow this reasoning process:

    1. IDENTIFY: What external inputs does this code handle?

    2. TRACE: How do those inputs flow through the code?

    3. CHECK: Are there validation/sanitization steps at each boundary?

    4. VERDICT: Is the code safe or vulnerable? What specific CVE pattern matches?


    Example:

    Code: `db.execute(f"SELECT * FROM users WHERE id = {user_id}")`

    Reasoning:

    1. IDENTIFY: user_id is an external input (likely from HTTP request).

    2. TRACE: user_id flows directly into SQL string via f-string interpolation.

    3. CHECK: No parameterization, no input validation, no type checking.

    4. VERDICT: VULNERABLE — SQL Injection (CWE-89). user_id could contain '' OR 1=1 --

    Fix: Use parameterized query: db.execute("SELECT * FROM users WHERE id = ?", (user_id,))

    """

    '
  example_bad: '# No CoT — model jumps to conclusion

    SYSTEM_PROMPT = "You are a security auditor. Is this code vulnerable? Answer yes or no."

    # Result: "No" (wrong — missed the SQL injection)

    # Without reasoning steps, the model makes snap judgments on complex analysis tasks.

    # Accuracy drops from ~85% to ~55% on security vulnerability detection without CoT.

    '
  sources: ["https://arxiv.org/abs/2201.11903"]
  when_applies: "When prompting LLMs for complex reasoning tasks that require step-by-step analysis"
- id: CR-LLM-REACT-001
  text: 'ReAct Pattern — Interleave Reasoning and Acting: the model thinks about what to do, takes an action (tool call),
    observes the result, and reasons about the next step.'
  why: 'Pure reasoning (chain-of-thought) lacks access to real-world information. Pure acting (tool use without reasoning)
    lacks strategic planning — the model calls tools randomly without understanding why. ReAct combines both: the model reasons
    (''I need to find the user''s order history''), acts (calls the database query tool), observes the result (''user has
    5 orders''), and reasons again (''the most recent order is from yesterday, let me check its status''). This produces more
    accurate and grounded results than either approach alone. ReAct reduces hallucination by 30-50% compared to pure reasoning
    because the model validates its thoughts against real data.'
  how_to_do_right: '1. Define the ReAct loop: Thought → Action → Observation → Thought → ...

    2. Thought: model explains what it needs to do and why (visible in logs, not to user).

    3. Action: model calls a tool with specific parameters.

    4. Observation: tool result is fed back to the model as context.

    5. Repeat until the model has enough information to produce a final answer.

    6. Set a maximum iteration limit (5-10) to prevent infinite loops on hard problems.

    '
  severity: high
  technologies:
    framework: [ai, langchain, llamaindex]
    library: [anthropic, openai]
  domains:
    domain: [architecture]
    concern: [ai, agents, tool_use]
  example_good: "# ReAct agent with explicit thought-action-observation loop\nfrom langchain.agents import AgentExecutor,\
    \ create_react_agent\nfrom langchain.tools import tool\n\n@tool\ndef search_orders(customer_id: str, status: str = None)\
    \ -> list[dict]:\n    \"\"\"Search customer orders. Optionally filter by status (pending/shipped/delivered).\"\"\"\n \
    \   return order_db.search(customer_id=customer_id, status=status)\n\n@tool\ndef get_shipping_info(order_id: str) -> dict:\n\
    \    \"\"\"Get real-time shipping tracking information for an order.\"\"\"\n    return shipping_api.track(order_id)\n\n\
    tools = [search_orders, get_shipping_info]\n\n# System prompt guides ReAct reasoning\nREACT_PROMPT = \"\"\"\nAnswer the\
    \ user's question about their orders.\n\nYou have access to these tools:\n{tools}\n\nUse this format:\nThought: I need\
    \ to [reason about what information I need]\nAction: [tool_name]\nAction Input: [tool parameters]\nObservation: [tool\
    \ result - provided by system]\n... (repeat Thought/Action/Observation as needed)\nThought: I now have enough information\
    \ to answer.\nFinal Answer: [answer to the user's question]\n\nImportant: Always search for real data before answering.\
    \ Never guess order details.\n\"\"\"\n\nagent = create_react_agent(llm, tools, REACT_PROMPT)\nexecutor = AgentExecutor(agent=agent,\
    \ tools=tools, max_iterations=5)\n"
  example_bad: "# Pure reasoning without tools — hallucinates facts\ndef answer_order_question(question: str) -> str:\n  \
    \  response = llm.invoke(\n        f\"Answer this customer question: {question}\\n\"\n        f\"Their order history:\
    \ (you figure it out)\"\n    )\n    return response\n    # Model invents order numbers, tracking IDs, and delivery dates\n\
    \    # \"Your order #12345 was shipped on January 15 and will arrive tomorrow\"\n    # None of this is real — the model\
    \ has no access to actual order data\n"
  sources: ["https://arxiv.org/abs/2210.03629"]
  when_applies: "When building LLM agents that need to reason about and use external tools"
- id: CR-LLM-STRUCTURED-001
  text: Structured Output — Constrain LLM output to a validated schema (JSON, XML, Pydantic model) instead of parsing free-form
    text.
  why: 'Free-form LLM output is unpredictable: sometimes the model wraps JSON in markdown code blocks, sometimes it adds explanatory
    text before or after the JSON, sometimes it produces invalid JSON with trailing commas or unescaped quotes. Parsing free-form
    text with regex is fragile and fails on edge cases. Structured output (via function calling, JSON mode, or schema-constrained
    generation) guarantees the output matches your schema. A production chatbot using regex to parse LLM output had a 3% failure
    rate — 30 errors per 1000 requests. After switching to structured output, the failure rate dropped to 0.01%.'
  how_to_do_right: '1. Use the model''s native structured output (OpenAI JSON mode, Anthropic tool_use, Instructor library).

    2. Define output as a Pydantic model — get validation, type coercion, and documentation for free.

    3. Include the schema in the system prompt AND use the API''s structured output parameter.

    4. Handle validation errors gracefully: retry with the error message in context (self-healing).

    5. For complex outputs, break into smaller structured calls instead of one massive schema.

    6. Test with edge cases: empty inputs, very long inputs, non-English inputs, adversarial inputs.

    '
  severity: critical
  technologies:
    lang: [python]
    framework: [pydantic]
    library: [openai, anthropic, instructor]
  domains:
    domain: [architecture, reliability]
    concern: [ai, llm]
  example_good: "from pydantic import BaseModel, Field\nfrom instructor import from_anthropic\nimport anthropic\n\nclass CodeReviewFinding(BaseModel):\n\
    \    severity: Literal[\"critical\", \"high\", \"medium\", \"low\"]\n    file: str = Field(description=\"File path relative\
    \ to project root\")\n    line: int = Field(ge=1, description=\"Line number\")\n    issue: str = Field(max_length=200,\
    \ description=\"Brief description\")\n    suggestion: str = Field(description=\"How to fix with code example\")\n\nclass\
    \ CodeReview(BaseModel):\n    findings: list[CodeReviewFinding] = Field(default_factory=list, max_length=5)\n    summary:\
    \ str = Field(max_length=500)\n\n# Structured output — guaranteed to match schema\nclient = from_anthropic(anthropic.Anthropic())\n\
    review = client.chat.completions.create(\n    model=\"claude-opus-4-6\",\n    response_model=CodeReview,\n    messages=[\n\
    \        {\"role\": \"system\", \"content\": CODE_REVIEW_SYSTEM_PROMPT},\n        {\"role\": \"user\", \"content\": f\"\
    Review this code:\\n{code_diff}\"},\n    ],\n)\n# review.findings is a list of CodeReviewFinding objects — typed and validated\n\
    for finding in review.findings:\n    print(f\"[{finding.severity}] {finding.file}:{finding.line} — {finding.issue}\")\n"
  example_bad: "# Free-form text parsing — fragile and error-prone\nresponse = llm.invoke(f\"Review this code and list issues:\\\
    n{code_diff}\")\ntext = response.content\n\n# Attempt to parse free-form text with regex\nimport re\nfindings = []\nfor\
    \ match in re.finditer(r\"(\\w+):\\s*(.+?)(?=\\n\\w+:|$)\", text, re.DOTALL):\n    findings.append({\"severity\": match.group(1),\
    \ \"text\": match.group(2)})\n# Fails when:\n# - Model wraps output in ```json blocks\n# - Model adds \"Here are my findings:\"\
    \ before the list\n# - Model uses \"High\" vs \"HIGH\" vs \"high\" inconsistently\n# - Model uses bullet points vs numbered\
    \ list vs paragraph format\n# 3% failure rate → 30 broken reviews per 1000\n"
  sources: ["https://platform.openai.com/docs/guides/structured-outputs"]
  when_applies: "When extracting structured data from LLM outputs that downstream systems must parse reliably"
- id: CR-LLM-AGENT-001
  text: 'Single Agent with Tool Loop — Build the simplest agent architecture first: one LLM with a set of tools in a loop
    until the task is complete.'
  why: 'Multi-agent architectures add complexity (agent communication, coordination, state sharing, debugging) that is not
    needed for most tasks. A single agent with well-defined tools can handle 80% of LLM application use cases: question answering
    with RAG, data analysis, code generation, customer support. Starting with multi-agent when single-agent suffices is premature
    optimization — you get the debugging pain of distributed systems without the benefits. Anthropic, OpenAI, and LangChain
    all recommend starting with a single agent and only adding agents when you have a proven need.'
  how_to_do_right: '1. Start with ONE agent (LLM + tools + system prompt).

    2. Define tools with clear names, descriptions, and parameter schemas.

    3. The agent loop: prompt → LLM → tool call (or final answer) → observation → repeat.

    4. Set max_iterations (5-10) to prevent infinite loops.

    5. Add tools incrementally — each tool should solve a specific capability gap.

    6. Upgrade to multi-agent ONLY when: tasks require specialized personas, parallel execution, or adversarial validation.

    '
  severity: high
  technologies:
    framework: [ai, langchain, llamaindex]
    library: [anthropic, openai]
  domains:
    domain: [architecture]
    concern: [ai, agents]
  example_good: "# Single agent with focused tools — handles most use cases\nfrom langchain.agents import AgentExecutor, create_tool_calling_agent\n\
    \ntools = [\n    search_knowledge_base,   # RAG retrieval\n    query_database,          # SQL execution\n    calculate,\
    \               # Math operations\n    get_current_datetime,    # Time-aware responses\n]\n\nagent = create_tool_calling_agent(\n\
    \    llm=ChatAnthropic(model=\"claude-opus-4-6\"),\n    tools=tools,\n    prompt=SYSTEM_PROMPT,\n)\n\nexecutor = AgentExecutor(\n\
    \    agent=agent,\n    tools=tools,\n    max_iterations=10,\n    return_intermediate_steps=True,  # For debugging\n  \
    \  handle_parsing_errors=True,\n)\n\n# Handles: \"What were our Q4 revenue numbers?\" → RAG + DB query\n# Handles: \"\
    Calculate the YoY growth\" → DB query + calculate\n# Handles: \"Summarize our sales trends\" → DB query + LLM reasoning\n\
    result = executor.invoke({\"input\": user_question})\n"
  example_bad: '# Premature multi-agent for a simple Q&A task

    class ResearchAgent: ...       # Agent 1: searches knowledge base

    class AnalysisAgent: ...       # Agent 2: analyzes retrieved data

    class SynthesisAgent: ...      # Agent 3: combines analyses

    class ReviewAgent: ...         # Agent 4: reviews synthesis

    class PresentationAgent: ...   # Agent 5: formats output


    # 5 agents, 5 LLM calls, 5 system prompts to maintain

    # For the question: "What is our refund policy?"

    # Single agent: 1 RAG call + 1 LLM call = 2 seconds, $0.01

    # Multi-agent: 5 LLM calls + coordination = 15 seconds, $0.05

    # Same answer quality — 7x slower, 5x more expensive

    '
  sources: ["https://arxiv.org/abs/2308.11432"]
  when_applies: "When building autonomous LLM agents that plan, execute tools, and iterate on results"
- id: CR-LLM-MULTIAGENT-001
  text: Multi-Agent Architecture — Use multiple specialized agents when tasks require different expertise, adversarial validation,
    or parallel execution.
  why: 'Multi-agent is justified when: (1) a task requires fundamentally different skills (coding vs testing vs reviewing),
    (2) you need adversarial quality checks (generator + critic), (3) tasks can be parallelized across specialists, or (4)
    the context window cannot hold all necessary information for one agent. The key pattern is separation of concerns — each
    agent has a focused system prompt, limited tool set, and clear responsibility. CrewAI, AutoGen, and LangGraph all provide
    multi-agent frameworks. The risk is over-decomposition: more agents = more LLM calls = higher latency and cost.'
  how_to_do_right: '1. Each agent has ONE clear responsibility (coder, reviewer, tester, researcher).

    2. Define communication protocol: direct handoff, shared state, or message passing.

    3. Hierarchical: manager agent delegates to worker agents, aggregates results.

    4. Pipeline: Agent A → Agent B → Agent C (each transforms the output).

    5. Adversarial: Generator creates, Critic evaluates, Generator revises (improves quality).

    6. Keep agent count minimal: 2-4 agents for most tasks. More than 5 = probably over-engineered.

    '
  severity: high
  technologies:
    framework: [ai, crewai, autogen, langchain]
    library: [langgraph]
  domains:
    domain: [architecture]
    concern: [ai, agents]
  example_good: "# Justified multi-agent: code generation with adversarial review\nfrom crewai import Agent, Task, Crew\n\n\
    coder = Agent(\n    role=\"Senior Python Developer\",\n    goal=\"Write clean, tested, production-ready Python code\"\
    ,\n    tools=[file_writer, code_executor, documentation_search],\n)\n\nreviewer = Agent(\n    role=\"Security-Focused\
    \ Code Reviewer\",\n    goal=\"Find bugs, security issues, and edge cases in code\",\n    tools=[static_analysis, dependency_audit,\
    \ cve_search],\n)\n\ntester = Agent(\n    role=\"QA Engineer\",\n    goal=\"Write comprehensive tests and verify correctness\"\
    ,\n    tools=[test_runner, coverage_checker, mutation_tester],\n)\n\n# Pipeline: code → review → fix → test → verify\n\
    # Each agent has specialized tools and focused expertise\n# The reviewer catches issues the coder misses (adversarial)\n\
    crew = Crew(\n    agents=[coder, reviewer, tester],\n    process=Process.sequential,\n    tasks=[code_task, review_task,\
    \ test_task],\n)\n"
  example_bad: '# Unjustified multi-agent: Q&A with unnecessary decomposition

    researcher = Agent(role="Research the question")

    analyzer = Agent(role="Analyze the research")

    writer = Agent(role="Write the answer")

    editor = Agent(role="Edit the answer")

    formatter = Agent(role="Format the answer")

    # 5 agents for "What is our return policy?"

    # Each agent calls the LLM = 5 API calls, ~15 seconds

    # A single agent with RAG does this in 1 call, ~3 seconds, same quality

    '
  sources: ["https://docs.crewai.com/introduction"]
  when_applies: "When orchestrating multiple specialized LLM agents to collaborate on complex tasks"
- id: CR-LLM-REFLECTION-001
  text: Reflection Pattern — Have the agent critique its own output and iterate to improve quality before returning the final
    result.
  why: 'LLMs produce better output when given a chance to review and revise. The first draft is often good but contains subtle
    errors, missing edge cases, or suboptimal approaches. Self-reflection (or a separate critic agent) catches 30-50% of issues
    that the initial generation misses. The Reflexion paper showed that agents with self-reflection solve 20% more programming
    tasks than agents without. The key is structured reflection: the model must evaluate against specific criteria (correctness,
    completeness, edge cases), not just ''is this good?'''
  how_to_do_right: '1. Generate: produce initial output.

    2. Reflect: evaluate output against specific criteria (checklist, rubric, test cases).

    3. Revise: improve based on reflection. Include the critique in context for revision.

    4. Limit iterations: 2-3 reflection cycles. Diminishing returns after that.

    5. Use different prompts for generation and reflection (different perspectives).

    6. For code: run tests as part of reflection (ground truth, not just LLM opinion).

    '
  severity: high
  technologies:
    framework: [ai, langchain]
    library: [langgraph, anthropic, openai]
  domains:
    domain: [architecture, quality]
    concern: [ai, agents]
  example_good: "async def generate_with_reflection(task: str, max_iterations: int = 3) -> str:\n    # Step 1: Generate initial\
    \ output\n    output = await llm.invoke(f\"Complete this task:\\n{task}\")\n\n    for i in range(max_iterations):\n  \
    \      # Step 2: Structured reflection\n        critique = await llm.invoke(f\"\"\"\n        Evaluate this output against\
    \ these criteria:\n        1. CORRECTNESS: Are there factual errors or logical flaws?\n        2. COMPLETENESS: Are all\
    \ requirements addressed?\n        3. EDGE CASES: Are boundary conditions handled?\n        4. CLARITY: Is the output\
    \ clear and well-structured?\n\n        Output to evaluate:\n        {output}\n\n        Original task:\n        {task}\n\
    \n        If all criteria are satisfied, respond with \"APPROVED\".\n        Otherwise, list specific issues to fix.\n\
    \        \"\"\")\n\n        if \"APPROVED\" in critique:\n            break\n\n        # Step 3: Revise based on critique\n\
    \        output = await llm.invoke(f\"\"\"\n        Revise this output based on the following critique:\n        {critique}\n\
    \n        Original output:\n        {output}\n\n        Original task:\n        {task}\n        \"\"\")\n\n    return\
    \ output\n"
  example_bad: "# No reflection — first draft is final answer\nasync def generate(task: str) -> str:\n    return await llm.invoke(f\"\
    Complete this task:\\n{task}\")\n    # First draft often has:\n    # - Missing edge cases (30% of the time)\n    # - Subtle\
    \ logical errors (15% of the time)\n    # - Incomplete implementations (25% of the time)\n    # One reflection cycle catches\
    \ most of these\n"
  sources: ["https://arxiv.org/abs/2303.11366"]
  when_applies: "When improving LLM output quality through self-critique and iterative refinement"
- id: CR-LLM-MODELROUTE-001
  text: 'Model Routing — Classify request complexity and route to the appropriate model: fast/cheap for simple tasks, powerful/expensive
    for complex tasks.'
  why: 'Sending every request to GPT-4/Claude Opus is expensive and slow. 60-70% of requests are simple (FAQs, formatting,
    classification) and can be handled by smaller, faster models at 1/10th the cost. Model routing classifies the request
    complexity and routes accordingly: simple questions to Haiku/GPT-4o-mini (fast, cheap), complex reasoning to Opus/GPT-4
    (powerful, expensive). Anthropic reports that a well-implemented routing system reduces costs by 50-70% with less than
    2% quality degradation. The classifier itself can be a small model or a rule-based system.'
  how_to_do_right: '1. Define complexity tiers: Simple (FAQ, classification), Medium (summarization, extraction), Complex
    (reasoning, coding, analysis).

    2. Build a classifier: keyword-based rules for obvious cases, small LLM for ambiguous cases.

    3. Route: Simple → Haiku/GPT-4o-mini, Medium → Sonnet/GPT-4o, Complex → Opus/GPT-4.

    4. Monitor quality per tier: if the small model produces poor results, upgrade the tier threshold.

    5. Fallback: if the small model fails or returns low-confidence, escalate to the next tier.

    6. A/B test: compare routing quality vs always-use-best-model to validate cost savings.

    '
  severity: high
  technologies:
    framework: [ai, langchain]
    library: [anthropic, openai, litellm]
  domains:
    domain: [architecture]
    concern: [ai, cost_optimization]
  example_good: "from enum import Enum\n\nclass Complexity(Enum):\n    SIMPLE = \"simple\"      # FAQ, classification, formatting\n\
    \    MEDIUM = \"medium\"      # Summarization, extraction, translation\n    COMPLEX = \"complex\"    # Reasoning, coding,\
    \ multi-step analysis\n\nMODEL_MAP = {\n    Complexity.SIMPLE: \"claude-opus-4-6\",       # Fast, $0.25/M input\n    Complexity.MEDIUM:\
    \ \"claude-opus-4-6\",   # Balanced, $3/M input\n    Complexity.COMPLEX: \"claude-opus-4-6\",    # Powerful, $15/M input\n\
    }\n\nSIMPLE_PATTERNS = [\n    r\"what is (your|the) (name|version|status)\",\n    r\"(hi|hello|hey|thanks|thank you)\"\
    ,\n    r\"(format|convert|translate)\\s+this\",\n]\n\ndef classify_complexity(query: str) -> Complexity:\n    # Rule-based\
    \ for obvious cases\n    if any(re.match(p, query.lower()) for p in SIMPLE_PATTERNS):\n        return Complexity.SIMPLE\n\
    \    if len(query.split()) < 20:\n        return Complexity.SIMPLE\n    # Token count heuristic\n    if len(query.split())\
    \ > 200 or \"analyze\" in query.lower() or \"compare\" in query.lower():\n        return Complexity.COMPLEX\n    return\
    \ Complexity.MEDIUM\n\nasync def route_request(query: str) -> str:\n    complexity = classify_complexity(query)\n    model\
    \ = MODEL_MAP[complexity]\n    response = await llm_client.invoke(model=model, prompt=query)\n    return response\n"
  example_bad: "# Every request goes to the most expensive model\nasync def handle_request(query: str) -> str:\n    response\
    \ = await llm_client.invoke(\n        model=\"claude-opus-4-6\",  # $15/M input tokens for EVERY request\n        prompt=query,\n\
    \    )\n    return response\n    # \"Hi\" → Opus ($0.0002) vs Haiku ($0.000004) — 50x cost difference\n    # 100K requests/day:\
    \ Opus = $2,000/day vs Routed = $400/day\n"
  sources: ["https://arxiv.org/abs/2311.08692"]
  when_applies: "When routing LLM requests to different models based on task complexity or cost constraints"
- id: CR-LLM-CACHE-001
  text: Semantic Caching — Cache LLM responses using embedding similarity to serve identical or near-identical queries from
    cache instead of calling the LLM.
  why: 'LLM calls are expensive ($0.01-0.10 per call) and slow (1-10 seconds). Many applications have repeated queries: customer
    support FAQs, common data lookups, standard translations. Exact-match caching misses near-duplicates (''What is your return
    policy?'' vs ''What''s your refund policy?''). Semantic caching uses embeddings to find similar queries: if a cached query
    has cosine similarity > 0.95 with the new query, serve the cached response. This reduces costs by 30-60% for applications
    with repetitive query patterns. GPTCache and LangChain both provide semantic caching implementations.'
  how_to_do_right: '1. Embed incoming queries using the same embedding model used for your vector store.

    2. Search cache for queries with similarity > threshold (0.95 for strict, 0.90 for lenient).

    3. If cache hit: return cached response. If miss: call LLM, cache query+response.

    4. Set TTL based on data freshness requirements (1 hour for FAQs, 5 minutes for live data).

    5. Cache key = embedding vector. Cache value = LLM response + metadata (model, timestamp).

    6. Monitor cache hit rate and response quality. Low hit rate = threshold too high. Wrong answers = threshold too low.

    '
  severity: medium
  technologies:
    framework: [ai, langchain]
    library: [vector_database, qdrant, gptcache]
    platform: [redis]
  domains:
    domain: [architecture, performance]
    concern: [ai, caching, cost_optimization]
  example_good: "import numpy as np\nfrom qdrant_client import QdrantClient\n\nclass SemanticCache:\n    def __init__(self,\
    \ embedding_model, vector_store: QdrantClient, threshold: float = 0.95):\n        self.embedder = embedding_model\n  \
    \      self.store = vector_store\n        self.threshold = threshold\n        self.collection = \"llm_cache\"\n\n    async\
    \ def get_or_compute(self, query: str, llm_fn, ttl_hours: int = 24):\n        # 1. Embed the query\n        query_embedding\
    \ = self.embedder.embed(query)\n\n        # 2. Search for similar cached queries\n        results = self.store.search(\n\
    \            collection_name=self.collection,\n            query_vector=query_embedding,\n            limit=1,\n     \
    \       score_threshold=self.threshold,\n        )\n\n        if results:\n            cached = results[0]\n         \
    \   # Check TTL\n            cached_time = cached.payload[\"timestamp\"]\n            if (time.time() - cached_time) <\
    \ ttl_hours * 3600:\n                return cached.payload[\"response\"]  # Cache hit!\n\n        # 3. Cache miss — call\
    \ LLM\n        response = await llm_fn(query)\n\n        # 4. Store in cache\n        self.store.upsert(\n           \
    \ collection_name=self.collection,\n            points=[{\n                \"id\": str(uuid.uuid4()),\n              \
    \  \"vector\": query_embedding,\n                \"payload\": {\"query\": query, \"response\": response, \"timestamp\"\
    : time.time()},\n            }],\n        )\n        return response\n"
  example_bad: "# Exact-match caching — misses semantic duplicates\ncache = {}\nasync def get_response(query: str) -> str:\n\
    \    if query in cache:\n        return cache[query]\n    response = await llm.invoke(query)\n    cache[query] = response\n\
    \    return response\n# \"What is your return policy?\" → cache miss\n# \"What's your refund policy?\" → cache miss (different\
    \ string, same intent!)\n# \"Return policy please\" → cache miss\n# 3 LLM calls for the same answer. Semantic cache would\
    \ serve from cache after first.\n"
  sources: ["https://github.com/zilliztech/GPTCache"]
  when_applies: "When reducing LLM API costs and latency by caching semantically similar queries"
- id: CR-LLM-STREAM-001
  text: Streaming Responses — Stream LLM responses token-by-token to improve perceived latency, showing the first token in
    <500ms instead of waiting 5-10 seconds for the full response.
  why: LLMs generate tokens sequentially, taking 2-10 seconds for a full response. Without streaming, the user sees a loading
    spinner for the entire duration — perceived as slow. With streaming, the first token appears in 200-500ms and text flows
    continuously, creating a natural 'typing' experience. User studies show streaming reduces perceived wait time by 60-70%
    even though the total time is identical. Every major LLM chatbot (ChatGPT, Claude, Gemini) uses streaming. For programmatic
    use, streaming also reduces time-to-first-byte for downstream processing.
  how_to_do_right: '1. Use the streaming API: OpenAI stream=True, Anthropic stream(), LangChain .stream().

    2. Frontend: display tokens as they arrive using Server-Sent Events (SSE) or WebSocket.

    3. Backend: yield chunks as they arrive, do not buffer the full response.

    4. For structured output: stream the text, parse the structure after the stream completes.

    5. Handle stream interruptions gracefully: partial response is better than no response.

    6. Log the full response after streaming completes (for observability and debugging).

    '
  severity: medium
  technologies:
    lang: [python]
    framework: [fastapi, frontend, react]
    library: [openai, anthropic]
  domains:
    domain: [architecture, performance]
    concern: [ai, frontend, ux]
  example_good: "from fastapi import FastAPI\nfrom fastapi.responses import StreamingResponse\nimport anthropic\n\napp = FastAPI()\n\
    \n@app.post(\"/api/chat\")\nasync def chat(request: ChatRequest):\n    client = anthropic.Anthropic()\n\n    async def\
    \ generate():\n        with client.messages.stream(\n            model=\"claude-opus-4-6\",\n            messages=[{\"\
    role\": \"user\", \"content\": request.message}],\n            max_tokens=1024,\n        ) as stream:\n            for\
    \ text in stream.text_stream:\n                # Yield each token as an SSE event\n                yield f\"data: {json.dumps({'text':\
    \ text})}\\n\\n\"\n        yield \"data: [DONE]\\n\\n\"\n\n    return StreamingResponse(\n        generate(),\n      \
    \  media_type=\"text/event-stream\",\n        headers={\"Cache-Control\": \"no-cache\", \"X-Accel-Buffering\": \"no\"\
    },\n    )\n\n# Frontend (JavaScript):\n# const source = new EventSource(\"/api/chat\");\n# source.onmessage = (event)\
    \ => {\n#   if (event.data === \"[DONE]\") { source.close(); return; }\n#   const { text } = JSON.parse(event.data);\n\
    #   outputDiv.textContent += text;  // Append each token\n# };\n"
  example_bad: "@app.post(\"/api/chat\")\nasync def chat(request: ChatRequest):\n    # Wait for full response — user sees\
    \ spinner for 5-10 seconds\n    response = client.messages.create(\n        model=\"claude-opus-4-6\",\n        messages=[{\"\
    role\": \"user\", \"content\": request.message}],\n        max_tokens=1024,\n    )\n    return {\"response\": response.content[0].text}\n\
    \    # Time to first byte: 5-10 seconds (full generation time)\n    # User experience: loading... loading... loading...\
    \ WALL OF TEXT\n    # With streaming: first word in 300ms, smooth typewriter effect\n"
  sources: ["https://platform.openai.com/docs/api-reference/streaming"]
  when_applies: "When delivering LLM responses to users with low perceived latency through streaming"
- id: CR-LLM-CONTEXT-001
  text: Context Window Management — Prioritize and compress context to fit within model limits. Not all context is equally
    important.
  why: 'Context windows are finite (100K-200K tokens for frontier models). Naively stuffing everything into the context leads
    to: (1) hitting the token limit and truncating important information, (2) ''lost in the middle'' — models pay less attention
    to information in the middle of long contexts, (3) higher costs (you pay per token), and (4) slower responses. The solution
    is to prioritize: recent messages > system prompt > retrieved context > conversation history. A customer support bot that
    kept the full conversation history hit the context limit after 50 messages and started losing the system prompt instructions.'
  how_to_do_right: '1. Priority order: system prompt (always first) > current query > retrieved context > recent history >
    older history.

    2. Summarize old conversation turns instead of including them verbatim.

    3. Use retrieval (RAG) to pull in relevant context on demand, not in the system prompt.

    4. Token counting: use tiktoken (OpenAI) or the model''s tokenizer to count tokens accurately.

    5. Reserve buffer: leave 20-30% of context window for the model''s response.

    6. Monitor context usage: log tokens_used/tokens_available per request.

    '
  severity: high
  technologies:
    framework: [ai, langchain]
    library: [openai, anthropic, tiktoken]
  domains:
    domain: [architecture, performance]
    concern: [ai, context_management, optimization]
  example_good: "class ContextManager:\n    def __init__(self, max_tokens: int = 100000):\n        self.max_tokens = max_tokens\n\
    \        self.response_buffer = int(max_tokens * 0.2)  # 20% for response\n        self.available = max_tokens - self.response_buffer\n\
    \n    def build_context(\n        self,\n        system_prompt: str,\n        current_query: str,\n        retrieved_chunks:\
    \ list[str],\n        conversation_history: list[dict],\n    ) -> list[dict]:\n        messages = []\n        tokens_used\
    \ = 0\n\n        # Priority 1: System prompt (always included)\n        sys_tokens = count_tokens(system_prompt)\n   \
    \     messages.append({\"role\": \"system\", \"content\": system_prompt})\n        tokens_used += sys_tokens\n\n     \
    \   # Priority 2: Current query (always included)\n        query_tokens = count_tokens(current_query)\n        tokens_used\
    \ += query_tokens\n\n        # Priority 3: Retrieved context (most relevant first)\n        rag_budget = int(self.available\
    \ * 0.4)  # 40% of available for RAG\n        rag_content = []\n        for chunk in retrieved_chunks:\n            chunk_tokens\
    \ = count_tokens(chunk)\n            if tokens_used + chunk_tokens > rag_budget:\n                break\n            rag_content.append(chunk)\n\
    \            tokens_used += chunk_tokens\n\n        # Priority 4: Recent history (most recent first, summarize if needed)\n\
    \        history_budget = self.available - tokens_used\n        recent_messages = self._fit_history(conversation_history,\
    \ history_budget)\n        messages.extend(recent_messages)\n\n        # Add RAG context and current query\n        if\
    \ rag_content:\n            messages.append({\"role\": \"user\", \"content\": f\"Context:\\n{''.join(rag_content)}\\n\\\
    nQuestion: {current_query}\"})\n        else:\n            messages.append({\"role\": \"user\", \"content\": current_query})\n\
    \n        return messages\n"
  example_bad: "# Naive context stuffing — no prioritization\ndef build_context(system_prompt, query, history, rag_chunks):\n\
    \    messages = [{\"role\": \"system\", \"content\": system_prompt}]\n    # Include ALL history — even from 3 days ago\n\
    \    messages.extend(history)  # Could be 200+ messages\n    # Include ALL retrieved chunks — even irrelevant ones\n \
    \   messages.append({\"role\": \"user\", \"content\": \"\\n\".join(rag_chunks) + \"\\n\" + query})\n    return messages\n\
    \    # Problems:\n    # 1. History fills up the context window, pushing out system prompt instructions\n    # 2. \"Lost\
    \ in the middle\": model ignores RAG chunks buried between history messages\n    # 3. Token limit exceeded → truncation\
    \ → system prompt lost → model goes off-rails\n"
  sources: ["https://docs.llamaindex.ai/en/stable/"]
  when_applies: "When managing long conversations or documents that exceed LLM context window limits"
- id: CR-LLM-EVAL-001
  text: LLM Evaluation Strategy — Combine automated metrics, LLM-as-judge, and human evaluation. Never rely on a single evaluation
    method.
  why: 'Automated metrics (BLEU, ROUGE, exact match) are fast but shallow — a paraphrased correct answer scores 0 on exact
    match. LLM-as-judge provides nuanced evaluation but can be biased (self-preference, position bias, verbosity bias). Human
    evaluation is the gold standard but expensive and slow. The optimal strategy uses all three in layers: automated metrics
    for CI/CD (fast, cheap), LLM-as-judge for development (nuanced, moderate cost), human evaluation for releases (accurate,
    expensive). Teams that rely solely on LLM-as-judge discover that the judge model agrees with its own outputs 80% of the
    time — not a reliable signal.'
  how_to_do_right: '1. Layer 1 (CI/CD): Automated metrics — regex/exact match for structured output, BLEU/ROUGE for text.

    2. Layer 2 (Dev): LLM-as-judge — use a DIFFERENT model than the one being evaluated.

    3. Layer 3 (Release): Human evaluation — sample 50-100 cases, evaluate on rubric.

    4. Golden dataset: maintain 100+ curated input-output pairs as regression tests.

    5. A/B testing: compare model/prompt versions on real traffic with statistical significance.

    6. Track metrics over time: accuracy, latency, cost, user satisfaction, failure rate.

    '
  severity: critical
  technologies:
    library: [ragas, deepeval, langsmith, braintrust]
  domains:
    domain: [architecture, quality]
    concern: [ai, evaluation]
  example_good: "from deepeval import evaluate\nfrom deepeval.metrics import (\n    AnswerRelevancyMetric,\n    FaithfulnessMetric,\n\
    \    ContextualRelevancyMetric,\n)\nfrom deepeval.test_case import LLMTestCase\n\n# Layer 1: Automated metrics (run in\
    \ CI)\ndef test_output_format():\n    \"\"\"Fast check: is the output valid JSON with required fields?\"\"\"\n    response\
    \ = agent.invoke(\"What is our return policy?\")\n    data = json.loads(response)\n    assert \"answer\" in data\n   \
    \ assert \"sources\" in data\n    assert len(data[\"sources\"]) > 0\n\n# Layer 2: LLM-as-judge (run in dev/staging)\n\
    def test_rag_quality():\n    \"\"\"Evaluate RAG quality with multiple metrics.\"\"\"\n    test_case = LLMTestCase(\n \
    \       input=\"What is our return policy?\",\n        actual_output=agent.invoke(\"What is our return policy?\"),\n \
    \       expected_output=\"Items can be returned within 30 days...\",\n        retrieval_context=retrieved_chunks,\n  \
    \  )\n    metrics = [\n        AnswerRelevancyMetric(threshold=0.7),\n        FaithfulnessMetric(threshold=0.8),\n   \
    \     ContextualRelevancyMetric(threshold=0.7),\n    ]\n    evaluate([test_case], metrics)\n\n# Layer 3: Golden dataset\
    \ regression (run before release)\n# golden_dataset.json: 100+ curated test cases\ndef test_golden_dataset():\n    with\
    \ open(\"golden_dataset.json\") as f:\n        cases = json.load(f)\n    results = [evaluate_case(case) for case in cases]\n\
    \    accuracy = sum(r.passed for r in results) / len(results)\n    assert accuracy >= 0.90, f\"Golden dataset accuracy\
    \ dropped to {accuracy}\"\n"
  example_bad: "# Only vibes-based evaluation\ndef test_llm():\n    response = agent.invoke(\"What is our return policy?\"\
    )\n    print(response)  # \"Looks good to me!\"\n    # No automated checks, no metrics, no regression tests\n    # Ship\
    \ to production, discover 15% of answers are hallucinated\n"
  sources: ["https://arxiv.org/abs/2306.05685"]
  when_applies: "When evaluating LLM output quality systematically for production applications"
- id: CR-LLM-FALLBACK-001
  text: 'Fallback Chains — Define a chain of progressively degraded responses when the primary LLM fails: secondary model,
    cached response, rule-based fallback.'
  why: 'LLM APIs have outages, rate limits, and latency spikes. Without fallbacks, your application is completely down when
    the LLM provider is down. A fallback chain provides graceful degradation: try the primary model, if it fails try a secondary
    model, if that fails serve a cached response, if no cache return a rule-based response. This ensures the user always gets
    SOMETHING useful, even if degraded. A customer support chatbot without fallbacks went completely offline for 4 hours during
    an OpenAI outage. With fallback to Anthropic + cached FAQs, it could have served 80% of queries.'
  how_to_do_right: '1. Primary: best model (Opus/GPT-4) with 5-second timeout.

    2. Secondary: alternative provider (Anthropic if primary is OpenAI, vice versa) with 10-second timeout.

    3. Tertiary: cached response — semantic search for similar previously answered queries.

    4. Last resort: rule-based response or human handoff with estimated wait time.

    5. Log which fallback was used — track primary success rate to detect degradation.

    6. Circuit breaker per provider: if primary fails 5 times in 10 seconds, skip to secondary immediately.

    '
  severity: high
  technologies:
    framework: [ai, langchain]
    library: [litellm, anthropic, openai]
  domains:
    domain: [architecture, reliability]
    concern: [ai]
  example_good: "class LLMWithFallback:\n    def __init__(self):\n        self.primary = AnthropicClient(model=\"claude-opus-4-6\"\
    , timeout=5)\n        self.secondary = OpenAIClient(model=\"gpt-4o\", timeout=10)\n        self.cache = SemanticCache(threshold=0.93)\n\
    \        self.circuit_breakers = {\n            \"anthropic\": CircuitBreaker(failure_threshold=5),\n            \"openai\"\
    : CircuitBreaker(failure_threshold=5),\n        }\n\n    async def invoke(self, query: str) -> LLMResponse:\n        #\
    \ Try primary (Anthropic)\n        try:\n            result = await self.circuit_breakers[\"anthropic\"].call(\n     \
    \           self.primary.invoke, query\n            )\n            await self.cache.store(query, result)\n           \
    \ return LLMResponse(text=result, source=\"primary\")\n        except (TimeoutError, APIError, CircuitOpenError):\n  \
    \          pass\n\n        # Try secondary (OpenAI)\n        try:\n            result = await self.circuit_breakers[\"\
    openai\"].call(\n                self.secondary.invoke, query\n            )\n            return LLMResponse(text=result,\
    \ source=\"secondary\")\n        except (TimeoutError, APIError, CircuitOpenError):\n            pass\n\n        # Try\
    \ semantic cache\n        cached = await self.cache.search(query)\n        if cached:\n            return LLMResponse(text=cached,\
    \ source=\"cache\")\n\n        # Last resort: meaningful error\n        return LLMResponse(\n            text=\"I'm unable\
    \ to process your request right now. A support agent will follow up within 1 hour.\",\n            source=\"fallback\"\
    ,\n        )\n"
  example_bad: "async def invoke(query: str) -> str:\n    response = await anthropic_client.invoke(query)\n    return response.text\n\
    \    # Anthropic is down → unhandled exception → 500 error → user sees \"Internal Server Error\"\n    # No fallback, no\
    \ cache, no graceful degradation\n    # 4 hours of downtime because one API provider had issues\n"
  sources: ["https://python.langchain.com/docs/how_to/fallbacks/"]
  when_applies: "When designing LLM systems that must remain available despite provider outages or rate limits"
- id: CR-LLM-TOOLUSE-001
  text: Tool Use Architecture — Define tools with precise schemas, clear descriptions, and explicit constraints. The tool
    description is the prompt for tool selection.
  why: 'LLMs select tools based on the tool name and description — not on your system prompt. A tool named ''search'' with
    description ''Search for things'' will be misused because the model cannot distinguish when to use it versus other tools.
    A tool named ''search_product_catalog'' with description ''Search the product catalog by name, category, or SKU. Returns
    product details including price, availability, and description. Use this when the user asks about products, pricing, or
    availability.'' gives the model precise selection criteria. Poor tool descriptions are the #1 cause of agent errors —
    the model calls the wrong tool or passes wrong parameters.'
  how_to_do_right: '1. Tool name: specific verb + noun (search_products, create_order, get_user_profile).

    2. Description: what it does + when to use it + what it returns. 2-3 sentences.

    3. Parameter schemas: use Pydantic models with descriptions on every field.

    4. Constraints: specify what the tool does NOT do (e.g., ''Does NOT modify data'').

    5. Return type: document what the tool returns, including error formats.

    6. Keep tool count under 10-15 per agent. More tools = more confusion for the model.

    '
  severity: high
  technologies:
    framework: [ai, langchain, llamaindex]
    library: [anthropic, openai]
  domains:
    domain: [architecture]
    concern: [ai, agents, tool_use]
  example_good: "from langchain.tools import tool\nfrom pydantic import BaseModel, Field\n\nclass ProductSearchInput(BaseModel):\n\
    \    query: str = Field(description=\"Product name, category, or SKU to search for\")\n    category: str | None = Field(None,\
    \ description=\"Filter by category: electronics, clothing, home\")\n    max_price: float | None = Field(None, description=\"\
    Maximum price in USD\")\n    in_stock_only: bool = Field(True, description=\"Only return products currently in stock\"\
    )\n\n@tool(args_schema=ProductSearchInput)\ndef search_product_catalog(query: str, category: str = None, max_price: float\
    \ = None, in_stock_only: bool = True) -> str:\n    \"\"\"Search the product catalog by name, category, or SKU.\n\n   \
    \ Use this tool when the user asks about:\n    - Product availability or pricing\n    - Finding products by description\
    \ or category\n    - Checking if a specific item is in stock\n\n    Returns: JSON list of matching products with name,\
    \ price, availability, and description.\n    Does NOT modify any data or place orders.\n    \"\"\"\n    results = catalog_db.search(query=query,\
    \ category=category, max_price=max_price, in_stock=in_stock_only)\n    return json.dumps([r.to_dict() for r in results])\n"
  example_bad: "@tool\ndef search(query: str) -> str:\n    \"\"\"Search for things.\"\"\"\n    return catalog_db.search(query)\n\
    \    # Model doesn't know: search WHAT? products? users? orders? logs?\n    # Model doesn't know: when should I use this\
    \ vs other search tools?\n    # Model doesn't know: what format does it return?\n    # Model doesn't know: does this modify\
    \ data?\n    # Result: model calls 'search' for every question, passes wrong query formats\n"
  sources: ["https://platform.openai.com/docs/guides/function-calling"]
  when_applies: "When implementing function calling to let LLMs interact with external APIs and databases"
- id: CR-LLM-MEMORY-001
  text: Agent Memory Architecture — Implement short-term (conversation), working (current task), and long-term (persistent
    knowledge) memory for agents that operate across sessions.
  why: 'Without memory, every conversation starts from scratch. An agent that helped a user debug a database issue yesterday
    has no context today when the user says ''did that fix work?'' Short-term memory (conversation history) is the simplest
    but resets between sessions. Working memory (current task context, retrieved documents) helps with complex multi-step
    tasks. Long-term memory (persistent store of user preferences, past interactions, learned facts) enables continuity across
    sessions. The key challenge is relevance: not all past context is useful for the current task. Blindly including everything
    wastes context window tokens.'
  how_to_do_right: '1. Short-term: last N messages in the conversation (sliding window, typically 10-20 messages).

    2. Working memory: current task state, retrieved documents, tool call results. Cleared per task.

    3. Long-term: user preferences, past issue resolutions, learned facts. Stored in a vector database.

    4. Retrieval: for each new message, retrieve relevant long-term memories by semantic similarity.

    5. Summarization: periodically summarize old conversations and store the summary instead of raw messages.

    6. Forgetting: set TTL on memories. Outdated information (old preferences) should expire.

    '
  severity: medium
  technologies:
    framework: [ai, langchain]
    library: [langgraph, letta, vector_database, qdrant]
    platform: [redis]
  domains:
    domain: [architecture, performance]
    concern: [ai, agents, memory]
  example_good: "class AgentMemory:\n    def __init__(self, user_id: str, vector_store, redis):\n        self.user_id = user_id\n\
    \        self.vector_store = vector_store\n        self.redis = redis\n\n    async def build_context(self, current_message:\
    \ str) -> dict:\n        # 1. Short-term: recent conversation (from Redis, expires after session)\n        conversation\
    \ = await self.redis.lrange(f\"conv:{self.user_id}\", -20, -1)\n\n        # 2. Working memory: current task context\n\
    \        task_context = await self.redis.get(f\"task:{self.user_id}\")\n\n        # 3. Long-term: retrieve relevant past\
    \ interactions\n        relevant_memories = self.vector_store.search(\n            collection=\"user_memories\",\n   \
    \         query_vector=embed(current_message),\n            filter={\"user_id\": self.user_id},\n            limit=5,\n\
    \        )\n\n        # 4. User profile: persistent preferences\n        profile = await self.redis.hgetall(f\"profile:{self.user_id}\"\
    )\n\n        return {\n            \"conversation\": conversation,\n            \"task_context\": task_context,\n    \
    \        \"relevant_memories\": [m.payload[\"summary\"] for m in relevant_memories],\n            \"user_preferences\"\
    : profile,\n        }\n\n    async def save_interaction(self, message: str, response: str, summary: str):\n        # Save\
    \ to short-term (conversation)\n        await self.redis.rpush(f\"conv:{self.user_id}\", json.dumps({\"role\": \"user\"\
    , \"content\": message}))\n        await self.redis.rpush(f\"conv:{self.user_id}\", json.dumps({\"role\": \"assistant\"\
    , \"content\": response}))\n\n        # Save to long-term (vector store for future retrieval)\n        self.vector_store.upsert(\n\
    \            collection=\"user_memories\",\n            points=[{\"vector\": embed(summary), \"payload\": {\"user_id\"\
    : self.user_id, \"summary\": summary, \"timestamp\": time.time()}}],\n        )\n"
  example_bad: "# No memory — every session starts from scratch\nasync def chat(user_id: str, message: str) -> str:\n    return\
    \ await llm.invoke(message)\n    # User yesterday: \"I'm getting timeout errors on my PostgreSQL queries\"\n    # Agent\
    \ yesterday: \"Add connection pooling with PgBouncer\"\n    # User today: \"Did that fix work?\"\n    # Agent today: \"\
    I don't have any context about what fix you're referring to.\"\n"
  sources: ["https://arxiv.org/abs/2304.03442"]
  when_applies: "When building LLM applications that need to remember context across multiple conversation turns"
- id: CR-LLM-ROUTING-001
  text: >
    Implement multi-model routing to assign tasks to the right LLM based on task type,
    required reasoning depth, and latency requirements — route simple extraction to
    fast/cheap models, complex reasoning to frontier models, and code generation to
    code-specialist models. One-model-for-all wastes 40-60% on over-provisioning.
  why: >
    As of 2025, the LLM landscape has matured: GPT models excel at generalist tasks
    and professional writing, Claude excels at long-context analysis, code review, and
    agentic tool use, Gemini excels at multimodal and mathematical reasoning, DeepSeek
    at low-cost coding tasks. Routing simple tasks (classification, extraction,
    summarization) to a smaller model at 10x lower cost is pure efficiency.
    OpenRouter's 2025 State of AI report (100T tokens analyzed) found that intelligent
    task routing produced 5x improvement in SLO attainment and 31.6% latency reduction
    vs single-model approaches. The routing decision itself costs ~1ms and is
    deterministic.
  how_to_do_right: |
    1. Classify tasks into complexity tiers:
       - Tier 1 (simple): extraction, classification, short summarization
         → Use: gpt-4o-mini, claude-3-haiku, gemini-flash
       - Tier 2 (medium): analysis, drafting, QA
         → Use: gpt-4o, claude-3.5-sonnet, gemini-pro
       - Tier 3 (complex): multi-step reasoning, long-context analysis, agents
         → Use: claude-opus, gpt-o1, gemini-ultra
    2. Implement routing as a deterministic function, not an LLM call
    3. Set fallback: if primary model fails → secondary model (same tier)
    4. Track cost and latency per route — tune thresholds monthly
    5. For agents: Claude excels at tool use and multi-step stability
    6. For code: use specialized code models (codestral, deepseek-coder)
  severity: high
  technologies:
    framework: [ai, langchain, llamaindex]
    library: [openai, anthropic, openrouter]
  domains:
    domain: [architecture, performance]
    concern: [ai, llm, routing, cost]
  example_good: |
    from enum import Enum
    from dataclasses import dataclass

    class TaskComplexity(Enum):
        SIMPLE = "simple"
        MEDIUM = "medium"
        COMPLEX = "complex"

    @dataclass
    class RoutingDecision:
        model: str
        provider: str
        max_tokens: int
        temperature: float

    def route_task(task_type: str, context_length: int,
                   requires_tools: bool = False) -> RoutingDecision:
        """Deterministic routing — no LLM call needed."""
        if requires_tools or context_length > 50_000:
            # Agents and long context: Claude excels here
            return RoutingDecision("claude-opus-4", "anthropic", 8192, 0.1)

        if task_type in ("extraction", "classification", "short_summary"):
            # Simple tasks: fast and cheap
            return RoutingDecision("claude-3-haiku", "anthropic", 1024, 0.0)

        if task_type in ("code_review", "code_generation"):
            # Code specialist
            return RoutingDecision("claude-sonnet-4", "anthropic", 4096, 0.1)

        # Default: medium complexity
        return RoutingDecision("claude-sonnet-4", "anthropic", 4096, 0.3)
  example_bad: |
    # Using the most expensive model for everything
    async def process_any_task(task: str) -> str:
        response = await anthropic_client.messages.create(
            model="claude-opus-4",  # Most expensive — used for all tasks
            max_tokens=8192,        # Maximum — always
            messages=[{"role": "user", "content": task}]
        )
        return response.content[0].text
    # Extracting a date from a sentence uses $0.015/1K tokens
    # Could use claude-haiku at $0.00025/1K tokens (60x cheaper)
  when_applies: Any system making multiple LLM calls with varied task types
  when_not_applies: single-purpose tools with uniform task complexity, prototypes
  sources:
    - "https://openrouter.ai/state-of-ai"
    - "https://www.truefoundry.com/blog/multi-model-routing"
    - "https://arxiv.org/abs/2306.05685"
- id: CR-LLM-GUARDRAILS-001
  text: >
    Use NVIDIA NeMo Guardrails or Guardrails AI to enforce safety rails on LLM outputs
    — implement input rails (block jailbreaks, off-topic queries), output rails (detect
    hallucinations, harmful content), and retrieval rails (validate RAG context quality).
    Never ship a production LLM system without safety rails.
  why: >
    Without guardrails, LLM systems fail in predictable ways: jailbreaks extract
    unintended information, hallucinations produce confident falsehoods, prompt injection
    makes agents execute unintended actions. NeMo Guardrails uses Colang (a declarative
    language for dialog flows) to enforce conversation policies at the infrastructure
    level — the LLM cannot circumvent these rules. Guardrails AI provides Python-first
    validators that run on every output. For financial prediction markets, a guardrail
    that prevents the system from giving investment advice is not optional — it is a
    regulatory requirement. NVIDIA reports 85% reduction in jailbreak success rate with
    NeMo Guardrails deployed.
  how_to_do_right: |
    1. Install: pip install nemoguardrails
    2. Define rails in config/config.yml + rails/*.co (Colang files)
    3. Input rails: block off-topic queries, detect injection attempts
    4. Output rails: fact-check responses against retrieved context (RAG)
    5. Dialog rails: prevent the bot from making financial recommendations
    6. For Guardrails AI: define validators as Python functions and register them
    7. Test every rail with adversarial inputs before deploying
    8. Monitor rail trigger rates — high trigger rate means misconfigured rails or attack
  severity: critical
  technologies:
    framework: [ai, langchain, llamaindex, nemoguardrails]
    library: [openai, anthropic, guardrails-ai]
  domains:
    domain: [security, architecture]
    concern: [ai, safety, guardrails, llm]
  example_good: |
    # config/config.yml
    # models:
    #   - type: main
    #     engine: anthropic
    #     model: claude-sonnet-4

    # rails/topics.co (Colang)
    # define user ask financial advice
    #   "should I invest in"
    #   "will the market go up"
    #   "what stocks should I buy"
    #
    # define flow refuse financial advice
    #   user ask financial advice
    #   bot say "I can provide market information but cannot give personalized investment
    #            advice. Please consult a licensed financial advisor."
    #   stop

    # Python usage:
    from nemoguardrails import LLMRails, RailsConfig
    import asyncio

    config = RailsConfig.from_path("./config")
    rails = LLMRails(config)

    async def process_with_guardrails(user_message: str) -> str:
        response = await rails.generate_async(
            messages=[{"role": "user", "content": user_message}]
        )
        return response["content"]
  example_bad: |
    # No guardrails — direct LLM response to users
    async def chat(user_message: str) -> str:
        response = await anthropic_client.messages.create(
            model="claude-sonnet-4",
            messages=[{"role": "user", "content": user_message}]
        )
        return response.content[0].text
    # Users can jailbreak to get financial advice, harmful content
    # No fact-checking on claims about market events
    # No protection against prompt injection in RAG contexts
  when_applies: Any production LLM system with user-facing conversations
  when_not_applies: internal batch processing with no external users, purely retrieval systems
  sources:
    - "https://docs.nvidia.com/nemo/guardrails/latest/index.html"
    - "https://github.com/NVIDIA-NeMo/Guardrails"
    - "https://arxiv.org/abs/2310.10501"
- id: CR-LLM-STRUCTOUT-001
  text: >
    Use structured output (JSON mode or tool/function calling) for all LLM responses
    that feed downstream code — never parse free-text LLM output with regex or string
    matching in production. Structured outputs guarantee schema compliance at the API
    level.
  why: >
    Free-text LLM outputs fail in production: the model changes its phrasing between
    calls, adds explanatory text before the JSON, uses different key names, or omits
    optional fields. Regex-based parsing of LLM output breaks on every model upgrade.
    OpenAI's JSON mode guarantees valid JSON. Anthropic's tool_use guarantees the
    response matches the tool schema. Pydantic validators on top of structured output
    catch semantic errors (negative amounts, invalid enums). Teams that switched from
    regex parsing to structured output reported 97% reduction in output parsing errors.
  how_to_do_right: |
    1. For OpenAI: response_format={"type": "json_object"} or function calling
    2. For Anthropic: use tool_use — define the schema as a tool, call it
    3. Validate with Pydantic: parse the JSON into a Pydantic model immediately
    4. Define schemas as Pydantic models, not raw dicts
    5. For partial outputs: use instructor library (wraps OpenAI/Anthropic)
    6. Always include field descriptions in the schema — models follow them
    7. Test schema adherence with adversarial prompts
  severity: high
  technologies:
    framework: [ai, langchain, llamaindex]
    library: [openai, anthropic, instructor, pydantic]
  domains:
    domain: [architecture]
    concern: [ai, structured_output, llm, reliability]
  example_good: |
    from pydantic import BaseModel, Field
    from typing import Literal
    import anthropic
    import json

    class ClaimVerdict(BaseModel):
        verdict: Literal["supported", "refuted", "insufficient_evidence"]
        confidence: float = Field(ge=0.0, le=1.0)
        reasoning: str = Field(min_length=20)
        sources_used: list[str]

    async def verify_claim(claim: str, evidence: list[str]) -> ClaimVerdict:
        client = anthropic.Anthropic()
        response = client.messages.create(
            model="claude-sonnet-4",
            max_tokens=1024,
            tools=[{
                "name": "submit_verdict",
                "description": "Submit the final verdict on the claim",
                "input_schema": ClaimVerdict.model_json_schema()
            }],
            tool_choice={"type": "tool", "name": "submit_verdict"},
            messages=[{"role": "user", "content": f"Claim: {claim}\nEvidence: {evidence}"}]
        )
        # Guaranteed to match ClaimVerdict schema
        tool_input = response.content[0].input
        return ClaimVerdict(**tool_input)  # Pydantic validates types and ranges
  example_bad: |
    async def verify_claim(claim: str) -> dict:
        response = await client.messages.create(
            model="claude-sonnet-4",
            messages=[{"role": "user", "content": f"Verify: {claim}\nReturn JSON with verdict."}]
        )
        text = response.content[0].text
        # Fragile regex parsing — breaks when model adds "Here is the JSON:" prefix
        import re
        json_match = re.search(r'\{.*\}', text, re.DOTALL)
        if not json_match:
            raise ValueError("No JSON found in response")
        return json.loads(json_match.group())  # KeyError if model uses different field names
  when_applies: Any LLM integration where the output feeds downstream code
  when_not_applies: chat interfaces where responses are displayed directly to users without parsing
  sources:
    - "https://platform.openai.com/docs/guides/structured-outputs"
    - "https://docs.anthropic.com/en/docs/build-with-claude/tool-use"
    - "https://github.com/jxnl/instructor"
- id: CR-LLM-JUDGE-001
  text: >
    Use LLM-as-judge evaluation with inter-rater reliability validation — never deploy
    a new model or prompt version without running it against a golden test set and
    comparing against the reference model using an independent judge model. Judge
    agreement rate must exceed 85%.
  why: >
    Human evaluation is the gold standard but is expensive and slow. LLM-as-judge
    (using a frontier model to evaluate outputs of another model) enables automated
    quality measurement at scale. The critical discipline: the judge model must be
    independent of the evaluated model (don't use the same model to judge itself),
    and judge decisions must be validated against human ground truth to establish
    inter-rater reliability. Ronkon Kohavi's research shows 80% of developer intuitions
    about quality are wrong — systematic evaluation catches regressions that feel like
    improvements. For claim verification, false positive rate is the key metric.
  how_to_do_right: |
    1. Create a golden evaluation set: 100+ examples with human-labeled ground truth
    2. Define evaluation criteria as a structured rubric (not "is this good?")
    3. Use a different model as judge than the model under evaluation
    4. Judge prompt must include: criteria definition, scoring rubric, calibration examples
    5. Validate judge: compare judge scores on 50 examples with human scores
       Require >85% agreement rate before using judge in automated pipeline
    6. Track metrics per release: accuracy, precision, recall, hallucination rate
    7. Set regression thresholds: fail CI if new version is >5% worse on any metric
  severity: high
  technologies:
    framework: [ai, langchain, llamaindex]
    library: [openai, anthropic, deepeval, ragas]
  domains:
    domain: [testing, architecture]
    concern: [ai, evaluation, llm_quality]
  example_good: |
    from pydantic import BaseModel
    from typing import Literal
    import asyncio

    class JudgeScore(BaseModel):
        factual_accuracy: Literal[1, 2, 3, 4, 5]
        completeness: Literal[1, 2, 3, 4, 5]
        hallucination_detected: bool
        reasoning: str

    async def judge_response(
        question: str, model_response: str, ground_truth: str, judge_model: str
    ) -> JudgeScore:
        """Use independent judge model to score model response."""
        judge_prompt = f"""
        Evaluate this response against the ground truth.
        Question: {question}
        Model Response: {model_response}
        Ground Truth: {ground_truth}

        Score 1-5 on factual_accuracy and completeness.
        Mark hallucination_detected=true if any claim in the response is false.
        """
        # Use different model as judge
        response = await call_llm_structured(judge_model, judge_prompt, JudgeScore)
        return response

    async def run_evaluation_suite(test_cases: list, model_version: str):
        scores = await asyncio.gather(*[
            judge_response(tc.question, tc.model_response, tc.ground_truth,
                          judge_model="claude-opus-4")  # Different from tested model
            for tc in test_cases
        ])
        accuracy = sum(s.factual_accuracy >= 4 for s in scores) / len(scores)
        hallucination_rate = sum(s.hallucination_detected for s in scores) / len(scores)
        print(f"Accuracy: {accuracy:.1%}, Hallucination rate: {hallucination_rate:.1%}")
        assert hallucination_rate < 0.05, f"Hallucination rate too high: {hallucination_rate:.1%}"
  example_bad: |
    # No systematic evaluation — relying on developer intuition
    async def test_new_prompt():
        response = await llm.invoke("Is the earth flat?")
        assert "no" in response.lower()  # Only tests one case
        # No comparison against previous version
        # No hallucination rate measurement
        # No golden test set
        # Developer: "Looks good to me, ship it"
  when_applies: Any production LLM system with quality requirements
  when_not_applies: prototypes, one-off scripts, purely exploratory research
  sources:
    - "https://arxiv.org/abs/2306.05685"
    - "https://github.com/confident-ai/deepeval"
    - "https://docs.ragas.io/en/stable/"
