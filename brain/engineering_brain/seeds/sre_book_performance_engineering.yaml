- id: CR-SRE-PERF-009
  text: |
    Disk I/O performance depends on access pattern (sequential vs random) more than on hardware speed. A single spinning disk does 150 random IOPS but 200 MB/s sequential throughput — a 1300x difference. Even SSDs show 10-50x differences between random and sequential access patterns.
  why: |
    Google's data integrity chapter (Chapter 26) and the distributed systems chapters discuss storage performance in the context of reliable data handling. The fundamental physics of storage creates a massive gap between sequential and random I/O. A spinning disk must physically move the read/write head to a new location for each random access (seek time 3-10ms), limiting random IOPS to approximately 100-200 per second. But sequential reads avoid seeking, achieving 150-250 MB/s throughput — effectively thousands of equivalent IOPS. SSDs eliminate mechanical seeking but still show significant random vs sequential differences because of page alignment, write amplification, and controller queue depth effects. A typical NVMe SSD achieves 500K random read IOPS but 3-7 GB/s sequential throughput — at 4KB page size, random reads yield 2 GB/s while sequential reads yield 7 GB/s. The practical impact is enormous. A database with a B-tree index performing random lookups on spinning disks can serve 150 queries per second. The same data scanned sequentially (e.g., for analytics) reads at 200 MB/s. Many performance problems are caused by accidentally turning sequential I/O into random I/O. Examples include write-ahead logs fragmented by concurrent writers (should be single-writer sequential), database tables with random INSERT order on a clustered index (forces random page writes), and log files read by multiple consumers at different offsets simultaneously. Google designs storage-intensive systems around sequential access patterns — LSM trees instead of B-trees for write-heavy workloads, append-only data structures, and read-ahead buffers that pre-fetch sequential data.
  how_to_do_right: |
    1. Measure IOPS and throughput separately for your workload using fio or ioping — characterize whether your access pattern is random or sequential and size your storage accordingly (random-heavy workloads need high IOPS SSDs, sequential workloads can use cheaper high-throughput drives).
    2. Use append-only write patterns wherever possible — write-ahead logs, event streams, and time-series data should be sequential appends, never random inserts into the middle of a file.
    3. Enable read-ahead for sequential workloads (Linux readahead setting, typically 256KB-1MB) and disable it for random workloads where pre-fetched data will never be used.
    4. Batch small random writes into larger sequential writes using write-behind buffers — accumulate writes in memory and flush periodically as a single sequential write rather than many small random writes.
    5. Monitor I/O wait time (iowait in Linux) and disk queue depth (avgqu-sz from iostat) — high queue depth with low throughput indicates random I/O bottleneck, while high throughput with low queue depth indicates efficient sequential access.
    6. Separate sequential and random I/O onto different storage devices — put the write-ahead log (sequential) on a dedicated disk from the data files (random) to prevent seek contention between the two access patterns.
  example_good: "# PostgreSQL: separate WAL (sequential) from data (random)\n# postgresql.conf\n# data_directory = '/data/pgdata'       # SSD optimized for random IOPS\n# wal_directory = '/wal/pgwal'          # Separate SSD for sequential writes\n\n# Measure I/O pattern before sizing storage\n# fio --name=test --rw=randread --bs=4k --iodepth=32 --runtime=60\n# Result: 450K IOPS (random), 3.2 GB/s (sequential)\n\n# Application: append-only writes for event log\ndef write_event(event: dict):\n    with open('/data/events.log', 'a') as f:  # Sequential append\n        f.write(json.dumps(event) + '\\n')\n"
  example_bad: "# Random inserts into clustered index — turns sequential into random I/O\n# INSERT INTO events (id, ...) VALUES (uuid4(), ...)\n# UUID primary key forces random page writes across the B-tree\n# On spinning disk: 150 random IOPS = 150 inserts/second max\n#\n# WAL and data on same disk — seek contention\n# WAL writes (sequential) interrupted by data reads (random)\n# Both patterns degraded by fighting over the same disk head\n"
  when_applies: "When designing storage architecture for any I/O-intensive workload — databases, event logs, analytics, or file processing."
  severity: high
  technologies:
    platform: [storage, ssd, nvme, filesystem, io_patterns, linux, io_scheduler]
  domains:
    domain: [performance]
    concern: [io, disk, sequential_vs_random, iops_optimization, throughput]
  sources:
  - url: https://sre.google/sre-book/data-integrity/
    title: "Google SRE Book — Chapter 26: Data Integrity"
  validation_status: cross_checked

- id: CR-SRE-PERF-010
  text: |
    Network throughput optimization requires tuning TCP buffer sizes, disabling Nagle's algorithm for latency-sensitive RPCs, and right-sizing socket buffers. Default OS network settings are optimized for general-purpose use, not for high-throughput or low-latency service-to-service communication.
  why: |
    Google's load balancing chapters (19-20) and the broader SRE infrastructure practices recognize that network performance between services is often limited by TCP configuration, not by physical network capacity. Three critical TCP settings affect service performance. First, TCP buffer sizes (SO_SNDBUF, SO_RCVBUF) determine how much data can be in-flight before the sender must wait for acknowledgment. The bandwidth-delay product formula is buffer_size = bandwidth * round_trip_time. For a 10 Gbps link with 1ms RTT (same datacenter), optimal buffer = 10 Gbps * 1ms = 1.25 MB. The default Linux socket buffer is 128KB, which caps throughput at 128KB / 1ms = 1 Gbps — using only 10% of available bandwidth. For cross-datacenter links (50ms RTT), the mismatch is worse: 128KB / 50ms = 20 Mbps on a 10 Gbps link. Second, Nagle's algorithm (enabled by default) buffers small writes and combines them into larger TCP segments to improve bandwidth utilization. For request/response RPCs, this adds up to 40ms of latency (the delayed-ACK timer) because the small response is held waiting for more data that never comes. Disabling Nagle (TCP_NODELAY) is mandatory for RPC-heavy services. Third, TCP congestion control algorithm affects burst tolerance. Google developed BBR (Bottleneck Bandwidth and Round-trip propagation time) as a replacement for CUBIC because CUBIC reacts to packet loss (which in modern networks is caused by buffer bloat, not congestion), while BBR probes actual bandwidth, achieving 2-25x higher throughput on lossy or high-latency links.
  how_to_do_right: |
    1. Set TCP_NODELAY on all RPC sockets (gRPC, HTTP API, Redis, database connections) to disable Nagle's algorithm — the 40ms delayed-ACK penalty is unacceptable for latency-sensitive service-to-service communication.
    2. Calculate optimal TCP buffer sizes using the bandwidth-delay product formula (buffer = link_bandwidth * RTT) and set SO_SNDBUF/SO_RCVBUF accordingly — for same-datacenter (1ms RTT, 10 Gbps), use at minimum 1.25MB buffers.
    3. Enable TCP BBR congestion control (sysctl net.ipv4.tcp_congestion_control=bbr) on Linux for services communicating across datacenters or any path with non-trivial packet loss.
    4. Monitor TCP retransmission rate as a key network health metric — retransmission rate above 0.1% indicates network problems (congestion, faulty hardware, buffer overflow) that degrade throughput significantly.
    5. Use TCP keepalive with appropriate intervals (10-30 seconds for service mesh, 60-120 seconds for client connections) to detect dead connections before they cause request timeouts.
    6. Profile application-level send patterns to ensure you are not inadvertently creating many small writes — buffer application data and send in appropriately sized chunks (matching TCP MSS, typically 1460 bytes) to maximize TCP segment efficiency.
  example_good: "import socket\n\n# Disable Nagle's algorithm for RPC sockets — mandatory for low-latency\nsock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)\nsock.setsockopt(socket.IPPROTO_TCP, socket.TCP_NODELAY, 1)\n\n# Calculate optimal buffer size: bandwidth * RTT\n# 10 Gbps * 1ms = 1.25 MB\nBUFFER_SIZE = 1_310_720  # 1.25 MB for same-datacenter\nsock.setsockopt(socket.SOL_SOCKET, socket.SO_SNDBUF, BUFFER_SIZE)\nsock.setsockopt(socket.SOL_SOCKET, socket.SO_RCVBUF, BUFFER_SIZE)\n\n# Enable BBR congestion control (Linux sysctl)\n# sysctl net.ipv4.tcp_congestion_control=bbr\n# sysctl net.core.default_qdisc=fq\n"
  example_bad: "import socket\n\n# Default TCP settings — suboptimal for service-to-service\nsock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)\n# Nagle enabled (default) — 40ms delayed-ACK penalty on small RPCs\n# Default 128KB buffer on 10Gbps link with 1ms RTT:\n#   128KB / 1ms = 1 Gbps — using only 10% of available bandwidth\n# CUBIC congestion control (default) — reacts to loss, not bandwidth\n# Result: high latency RPCs, underutilized network capacity\n"
  when_applies: "When optimizing network performance for service-to-service communication, especially across datacenters or on high-bandwidth links."
  severity: high
  technologies:
    platform: [tcp, tuning, buffers, nagle, congestion_control, bbr]
  domains:
    domain: [performance]
    concern: [network, throughput, tcp_tuning, latency, tcp_nodelay, optimization, buffer_sizing]
  sources:
  - url: https://sre.google/sre-book/load-balancing-frontend/
    title: "Google SRE Book — Chapter 19: Load Balancing at the Frontend"
  - url: https://sre.google/sre-book/load-balancing-datacenter/
    title: "Google SRE Book — Chapter 20: Load Balancing in the Datacenter"
  validation_status: cross_checked

- id: CR-SRE-PERF-011
  text: |
    Cache warming strategies must be designed for cold starts — a service restart with an empty cache can receive 100% cache misses, overwhelming the backend database with a thundering herd of requests that would normally be served from cache.
  why: |
    Google's cascading failures chapter (Chapter 22) identifies cold cache thundering herds as a primary trigger for cascading outages. Consider a caching layer that achieves 95% hit rate in steady state, reducing database load from 10,000 QPS to 500 QPS. When the cache restarts (deployment, crash, scaling event), hit rate drops to 0%. All 10,000 QPS hit the database, which was provisioned for 500 QPS — a 20x overload that causes the database to time out, which causes the application to retry, which doubles the load to 40x. The database collapses, and the outage extends far beyond the cache restart. Google addresses this with multiple warming strategies. Pre-population loads hot keys into the cache before the instance starts serving traffic — using a snapshot of the previous cache contents or a pre-computed set of frequently accessed keys. Lazy warming with request coalescing ensures that when multiple requests arrive for the same uncached key simultaneously, only one request goes to the database and all waiters receive the result. Gradual traffic shifting moves traffic to a new cache instance slowly (1% then 5% then 25% then 100%) so the cache warms under controlled load rather than taking full traffic immediately. The choice between eager pre-population and lazy warming depends on whether you can predict hot keys. For user session caches, hot keys are unpredictable — lazy warming with coalescing is better. For product catalog caches, hot keys are stable — pre-population from a snapshot is better.
  how_to_do_right: |
    1. Implement request coalescing (singleflight pattern) so that concurrent cache misses for the same key result in a single backend request — all waiters share the result, preventing thundering herd on popular keys.
    2. Use gradual traffic shifting for cache instance replacements — route 1% of traffic to the new instance, let it warm for 5 minutes, then increase to 10%, 25%, 50%, 100% over 30 minutes.
    3. Pre-populate caches with hot keys on startup by replaying the top-N most frequently accessed keys from the previous instance's access log or from a periodic hot-key snapshot.
    4. Implement stale-while-revalidate semantics — serve the stale cached value immediately while refreshing in the background, so cache expiration never causes a synchronous backend request in the hot path.
    5. Set cache TTLs with jitter (e.g., base_ttl + random(0, 0.1 * base_ttl)) to prevent synchronized expiration of keys that were populated at the same time from causing periodic load spikes.
    6. Monitor cache hit rate during and after deployments specifically — alert if hit rate drops below 80% for more than 2 minutes, which indicates a warming problem that is silently overloading the backend.
  example_good: "import asyncio\nfrom functools import lru_cache\n\n# Singleflight pattern: coalesce concurrent cache misses for same key\n_in_flight = {}  # key -> Future\n\nasync def get_with_coalescing(key: str) -> dict:\n    cached = cache.get(key)\n    if cached:\n        return cached\n\n    if key in _in_flight:\n        return await _in_flight[key]  # Wait for existing fetch\n\n    future = asyncio.ensure_future(_fetch_and_cache(key))\n    _in_flight[key] = future\n    try:\n        result = await future\n        return result\n    finally:\n        del _in_flight[key]\n\n# TTL with jitter: prevent synchronized expiration\nimport random\ndef set_with_jitter(key, value, base_ttl=300):\n    jitter = random.uniform(0, base_ttl * 0.1)  # 10% jitter\n    cache.set(key, value, ttl=base_ttl + jitter)\n"
  example_bad: "# No request coalescing — thundering herd on cold start\nasync def get_product(product_id: str):\n    cached = cache.get(product_id)\n    if not cached:\n        # 1000 concurrent requests for same popular product\n        # ALL 1000 hit the database simultaneously\n        result = await db.get_product(product_id)  # DB overloaded!\n        cache.set(product_id, result, ttl=300)\n        return result\n    return cached\n\n# All TTLs expire at the same time — periodic load spikes\ncache.set(key, value, ttl=300)  # No jitter\n"
  when_applies: "When deploying, restarting, or scaling any service that relies on a cache layer to absorb database load."
  severity: high
  technologies:
    library: [caching, redis, warming, memcached, cdn]
  domains:
    domain: [performance, reliability, deployment]
    concern: [caching, cold_start, warming, thundering_herd, prevention, cache_warming]
  sources:
  - url: https://sre.google/sre-book/addressing-cascading-failures/
    title: "Google SRE Book — Chapter 22: Addressing Cascading Failures"
  validation_status: cross_checked

- id: CR-SRE-PERF-012
  text: |
    Every user-facing request must have an explicit latency budget decomposed across each component in the critical path. Without per-component budgets, teams optimize locally while the end-to-end latency exceeds the SLO because nobody owns the total.
  why: |
    Google's SLO practices (Chapter 4) and software engineering approach (Chapter 18) establish that performance targets must be decomposed into per-component budgets, analogous to how error budgets decompose reliability targets. Consider a user-facing API with a 200ms p99 SLO. The request passes through an API gateway (authentication, rate limiting), an application server (business logic), a cache lookup, a database query (on cache miss), and a response serializer. Without explicit budgets, each team optimizes independently. The gateway team considers 50ms acceptable ("it's just auth"). The application team allows 80ms ("business logic is complex"). The cache team accepts 30ms ("network round-trip"). The database allows 100ms p99 ("complex query"). The serializer takes 20ms ("large response"). Total: 280ms — 40% over the 200ms SLO, but no single component violated its own (implicit, generous) budget. Google assigns explicit latency budgets per component that sum to less than the SLO, with headroom for variance. For a 200ms SLO: gateway gets 10ms budget, application gets 50ms, cache gets 5ms, database gets 80ms (on miss), serializer gets 10ms, leaving 45ms headroom for cross-component overhead (network hops, queuing, serialization). Each team monitors their component's latency against its budget and is accountable for staying within it. The budgets are documented, measured, and reviewed quarterly. When a component needs more budget, it must be negotiated by reducing another component's budget — forcing teams to make explicit tradeoffs rather than silently consuming shared headroom.
  how_to_do_right: |
    1. Decompose the end-to-end SLO latency into per-component budgets that sum to 80% of the SLO — the remaining 20% is headroom for network overhead, queuing, serialization, and unexpected variance.
    2. Document the latency budget in a shared performance contract that every team on the critical path signs off on — the budget is not a suggestion, it is a binding SLO per component.
    3. Instrument each component boundary with latency metrics (using distributed tracing span durations) that report against the allocated budget — create dashboards showing budget consumption percentage per component.
    4. Alert when a component's p99 latency exceeds 80% of its budget for more than 10 minutes — this is an early warning that the budget is about to be violated, giving time to investigate before the end-to-end SLO is breached.
    5. Review and renegotiate budgets quarterly based on actual measurements — if one component consistently uses only 50% of its budget, reallocate the surplus to components that need more headroom.
    6. Add latency budget validation to the CI/CD pipeline — integration tests that exercise the critical path must verify that each component's contribution to end-to-end latency stays within its allocated budget under realistic load.
  example_good: "# Latency budget decomposition for 200ms SLO\nLATENCY_BUDGETS = {\n    'api_gateway':    10,   # 10ms: auth, rate limiting\n    'app_logic':      50,   # 50ms: business logic\n    'cache_lookup':    5,   # 5ms: Redis round-trip\n    'db_query':       80,   # 80ms: PostgreSQL on cache miss\n    'serialization':  10,   # 10ms: JSON serialization\n    'headroom':       45,   # 45ms: network, queuing, variance\n}  # Total: 200ms = SLO\n\n# Monitor each component against its budget\nfor component, budget_ms in LATENCY_BUDGETS.items():\n    actual_p99 = get_p99(component)\n    if actual_p99 > budget_ms * 0.8:\n        alert(f\"{component} at {actual_p99}ms — 80% of {budget_ms}ms budget\")\n\n# CI gate: integration test verifies per-component budgets\ndef test_latency_budget():\n    resp = trace_request('/api/orders/123')\n    for span in resp.spans:\n        budget = LATENCY_BUDGETS[span.name]\n        assert span.duration_ms <= budget, f\"{span.name}: {span.duration_ms}ms > {budget}ms budget\"\n"
  example_bad: "# No per-component budget — each team optimizes locally\n# Gateway team: '50ms is fine for auth'\n# App team: '80ms is fine for logic'\n# Cache team: '30ms is fine for cache'\n# DB team: '100ms is fine for queries'\n# Serializer: '20ms is fine for JSON'\n# Total: 280ms — 40% OVER the 200ms SLO\n# But no single component violated its own (implicit) budget\n# Nobody owns the end-to-end latency\n"
  when_applies: "When a user-facing request traverses multiple components and the end-to-end latency SLO must be decomposed into per-component budgets."
  severity: critical
  technologies:
    library: [architecture, api, latency_contracts]
    platform: [tracing, distributed, budgets, metrics, latency, slo]
  domains:
    domain: [performance, reliability]
    concern: [latency, budget, decomposition, critical_path, slo, per_component]
  sources:
  - url: https://sre.google/sre-book/service-level-objectives/
    title: "Google SRE Book — Chapter 4: Service Level Objectives"
  - url: https://sre.google/sre-book/software-engineering-in-sre/
    title: "Google SRE Book — Chapter 18: Software Engineering in SRE"
  validation_status: cross_checked
