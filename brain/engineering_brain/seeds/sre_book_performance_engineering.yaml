- id: CR-SRE-PERF-008
  text: |
    CPU saturation must be detected by measuring run queue depth and scheduling latency, not just CPU utilization percentage. A server at 70% CPU utilization with 20 threads in the run queue has completely different behavior than one at 70% with 2 threads queued.
  why: |
    Google's approach to overload (Chapter 21) and cascading failures (Chapter 22) reveals that CPU utilization is a misleading metric for detecting saturation. CPU utilization tells you what fraction of time the CPU was busy, but not how many threads are waiting to use it. Consider two scenarios, both showing 70% CPU utilization. Scenario A has 4 CPU cores with 4 active threads — each core is busy 70% of the time, threads run immediately when scheduled, and request latency is dominated by actual processing time. Scenario B has 4 CPU cores with 40 active threads — cores are busy 70% of the time but 36 threads are waiting in the run queue at any moment. Each thread waits an average of 9x its processing time just to be scheduled. A request that takes 10ms of CPU time takes 100ms wall-clock time because it waits 90ms in the queue. This is CPU saturation — the CPU is not at 100% utilization, but the run queue creates queuing delay that dominates latency. Google monitors run queue depth (or scheduling latency) as the primary CPU saturation signal, not utilization. The Linux kernel exposes this via /proc/schedstat and load average. When run queue depth exceeds 2x the CPU core count, latency degrades rapidly. The correct response to CPU saturation is not just "add more CPUs" — it is first to implement admission control (reject excess requests fast) and then investigate whether the CPU work is necessary (maybe you are re-parsing JSON on every request instead of caching the parsed result).
  how_to_do_right: |
    1. Monitor CPU run queue depth (Linux load average or /proc/schedstat) as your primary saturation metric — alert when run queue exceeds 2x the number of CPU cores for more than 30 seconds.
    2. Monitor scheduling latency (time between a thread becoming runnable and actually running) — this directly measures the user-visible impact of CPU saturation, unlike utilization.
    3. Implement admission control that activates when CPU saturation is detected — start rejecting low-priority requests with 503 to preserve latency for high-priority requests rather than degrading everything equally.
    4. Use CPU profiling to identify whether saturated CPU time is spent on useful work (request processing) or waste (excessive serialization, redundant computation, logging) before adding capacity.
    5. Set thread pool sizes to match available CPU cores for compute-bound work (not 10x cores) — more threads than cores just increases scheduling overhead and context switching without improving throughput.
    6. Implement request queuing with timeout — if a request waits in the queue longer than the client's timeout, drop it immediately rather than processing a request whose result will be discarded.
  example_good: "import os\n\ndef check_cpu_saturation():\n    # Monitor run queue depth (load average)\n    load_1, load_5, load_15 = os.getloadavg()\n    cpu_count = os.cpu_count()\n    run_queue_ratio = load_1 / cpu_count\n\n    RUN_QUEUE_RATIO.set(run_queue_ratio)\n\n    if run_queue_ratio > 2.0:  # 2x cores -> saturated\n        logger.warning(f\"CPU saturated: load={load_1}, cores={cpu_count}, ratio={run_queue_ratio:.1f}\")\n        # Activate admission control: reject low-priority requests\n        admission_controller.set_mode('shed_low_priority')\n\n# Thread pool sized to CPU cores for compute-bound work\nfrom concurrent.futures import ThreadPoolExecutor\nworker_pool = ThreadPoolExecutor(max_workers=os.cpu_count())  # Not 10x cores!\n"
  example_bad: "# Only monitoring CPU utilization — misses saturation\ndef check_cpu():\n    cpu_pct = psutil.cpu_percent()\n    if cpu_pct > 90:\n        alert('High CPU')  # Only fires at 90%\n    # But at 70% utilization with 40 threads queued on 4 cores,\n    # requests wait 9x their processing time in the run queue.\n    # 10ms CPU work takes 100ms wall-clock — invisible to this check.\n\n# Thread pool 10x CPU cores — increases scheduling overhead\nworker_pool = ThreadPoolExecutor(max_workers=400)  # 4 cores * 100\n"
  when_applies: "When monitoring CPU health of any production server, especially under variable load where queuing delays affect latency."
  severity: high
  technologies:
    platform: [linux, scheduler, metrics, cpu, saturation, kubernetes, resources]
  domains:
    domain: [performance]
    concern: [cpu, saturation, detection, runqueue, latency, queuing, scheduling]
  sources:
  - url: https://sre.google/sre-book/handling-overload/
    title: "Google SRE Book — Chapter 21: Handling Overload"
  - url: https://sre.google/sre-book/addressing-cascading-failures/
    title: "Google SRE Book — Chapter 22: Addressing Cascading Failures"
