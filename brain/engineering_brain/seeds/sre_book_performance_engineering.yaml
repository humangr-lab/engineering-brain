- id: CR-SRE-PERF-001
  text: |
    Tail latency (p99, p99.9) matters far more than average latency for user-facing services. A service with 50ms average but 2s p99 means 1 in 100 users waits 40x longer, and in fan-out architectures the problem compounds exponentially.
  why: |
    Google's SRE practices, described across Chapters 18 and 21, emphasize that average latency is a misleading metric that hides severe user-facing problems. Consider a service with 50ms average latency and 2000ms p99 latency. The average looks healthy, but 1% of requests are 40x slower. Now consider a typical Google search page that fans out to 100 backend services in parallel. The page latency is determined by the slowest backend response. With 100 backends each having 1% chance of a 2s response, the probability that at least one backend is slow is 1 - (0.99)^100 = 63.4%. That means nearly two-thirds of user requests hit the tail latency of at least one backend. At p99.9 with 1000 backends, the problem is even worse. This is why Google measures p50, p95, p99, and p99.9 for every RPC, not averages. The SLO is typically set on the tail (e.g., "p99 latency under 200ms for 99.9% of 10-minute windows"). Fixing the average while ignoring the tail creates an illusion of health while users suffer. The tail is often caused by garbage collection pauses, lock contention, cache misses on cold data, or background maintenance tasks that occasionally block request processing. Identifying and reducing tail latency requires different techniques than reducing average latency — you need to trace the slowest requests specifically, not sample uniformly.
  how_to_do_right: |
    1. Instrument every RPC with histogram metrics capturing p50, p90, p95, p99, and p99.9 latency — never rely on averages alone.
    2. Set SLOs on tail latency explicitly (e.g., "p99 < 200ms") and alert when the tail degrades, not just when the average increases.
    3. Trace the slowest 1% of requests specifically using distributed tracing with tail-biased sampling — random sampling misses rare slow paths.
    4. Calculate the fan-out amplification factor for your architecture — if your request touches N backends, your effective tail latency probability is 1 - (1 - p)^N where p is the per-backend tail probability.
    5. Implement hedged requests for critical paths — send a duplicate request to a second backend after a timeout threshold (e.g., p95 latency) and use whichever responds first.
    6. Profile tail latency sources separately from average latency — check GC pauses, lock contention, disk I/O stalls, and cold cache misses as distinct root causes rather than blending them into aggregate metrics.
  example_good: "from prometheus_client import Histogram\n\n# Histogram with explicit buckets for tail latency visibility\nREQUEST_LATENCY = Histogram(\n    'http_request_duration_seconds',\n    'Request latency',\n    ['endpoint'],\n    buckets=[0.01, 0.025, 0.05, 0.1, 0.25, 0.5, 1.0, 2.0, 5.0, 10.0]\n)\n\n# SLO alert on p99, not average\n# alert: P99LatencyHigh\n# expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) > 0.2\n# for: 5m\n\n# Hedged requests for critical fan-out paths\nasync def hedged_request(backends, timeout_p95=0.1):\n    primary = asyncio.create_task(backends[0].call())\n    await asyncio.sleep(timeout_p95)  # Wait p95 before hedge\n    if not primary.done():\n        hedge = asyncio.create_task(backends[1].call())\n        done, _ = await asyncio.wait({primary, hedge}, return_when=asyncio.FIRST_COMPLETED)\n        return done.pop().result()\n    return primary.result()\n"
  example_bad: "# Only tracking average latency — hides tail problems\nimport time\n\nlatencies = []\ndef track_latency(duration):\n    latencies.append(duration)\n    avg = sum(latencies) / len(latencies)\n    print(f\"Average latency: {avg:.0f}ms\")  # Shows 50ms\n    # But p99 is 2000ms — 1% of users wait 40x longer\n    # In fan-out to 100 backends: 63% of requests hit the tail\n"
  when_applies: "When measuring or optimizing latency for any user-facing service, especially those with fan-out to multiple backends."
  severity: critical
  technologies:
    platform: [metrics, histograms, tracing, distributed, grpc, latency]
  domains:
    domain: [performance, reliability]
    concern: [latency, tail_latency, p99, p999, slo]
  sources:
  - url: https://sre.google/sre-book/software-engineering-in-sre/
    title: "Google SRE Book — Chapter 18: Software Engineering in SRE"
  - url: https://sre.google/sre-book/handling-overload/
    title: "Google SRE Book — Chapter 21: Handling Overload"
  validation_status: cross_checked

- id: CR-SRE-PERF-002
  text: |
    Load tests must use realistic traffic patterns replayed from production, not synthetic uniform benchmarks. Synthetic tests with identical request sizes, uniform distribution, and no concurrency contention prove nothing about production capacity.
  why: |
    Google's Chapter 17 (Testing for Reliability) and the load balancing chapters (19-21) consistently emphasize that capacity measurements are only valid under production-realistic conditions. The most common load testing mistakes invalidate results completely. First, using an empty or tiny database — queries are fast because all indexes fit in memory, but production has terabytes of data where index lookups cause disk seeks. Second, uniform request distribution — production traffic has hot spots where 10% of keys receive 90% of reads, causing cache thrashing that uniform synthetic traffic never reveals. Third, single-client testing — real production has thousands of concurrent clients causing lock contention, connection pool exhaustion, and thread scheduling overhead that a single client cannot reproduce. Fourth, mocking all downstream dependencies — if the database is the bottleneck (as it usually is), mocking it removes the actual constraint. Google replays sampled production traffic for load tests, including the natural mix of expensive queries (aggregations, full-text searches) and cheap queries (point lookups, cached results). They test with production-scale data copies and real downstream services (or stubs with calibrated latency distributions, not just fixed delays). A load test that reports "handles 10,000 QPS" means nothing if production traffic patterns cause the system to degrade at 3,000 QPS due to hot-spot contention that the synthetic test never triggered.
  how_to_do_right: |
    1. Record production traffic patterns (request types, sizes, inter-arrival times, user session sequences) and replay them during load tests at scaled-up rates.
    2. Test against a database populated with production-scale data — at minimum, enough data that indexes do not fit entirely in memory, forcing realistic I/O patterns.
    3. Simulate concurrent clients matching production's concurrency profile — thousands of connections, not a single-threaded loop sending sequential requests.
    4. Include downstream dependencies with realistic latency distributions (not mocked to zero) — add jitter and occasional slowness to simulate real backends.
    5. Run the load test long enough (hours, not minutes) to surface memory leaks, connection pool exhaustion, log rotation interference, and GC pressure that only appears under sustained load.
    6. Measure and report p99 latency at target QPS, not maximum QPS at any latency — the capacity ceiling is the QPS where p99 latency exceeds the SLO, not where the server stops accepting connections.
  example_good: "# Realistic load test: replay production traffic patterns\nimport locust\n\nclass ProductionReplayUser(locust.HttpUser):\n    # Replay recorded production traffic mix\n    @locust.task(70)  # 70% of traffic is reads\n    def get_product(self):\n        product_id = self.pick_from_zipf_distribution()  # Hot-spot distribution\n        self.client.get(f\"/api/products/{product_id}\")\n\n    @locust.task(20)  # 20% is search (expensive)\n    def search(self):\n        query = self.pick_real_search_query()  # From production logs\n        self.client.get(f\"/api/search?q={query}\")\n\n    @locust.task(10)  # 10% is writes\n    def create_order(self):\n        self.client.post(\"/api/orders\", json=self.realistic_order())\n\n# Run for 4 hours against production-scale database\n# Report: p99 latency at target QPS, not max QPS\n"
  example_bad: "# Synthetic uniform benchmark — proves nothing about production\nimport requests\n\nfor i in range(10000):\n    requests.get(f\"http://localhost:8080/api/products/1\")  # Same product!\n    # Single client, no concurrency\n    # Empty database (all indexes in memory)\n    # No hot-spots, no expensive queries\n    # Result: '10,000 QPS!' — but production degrades at 3,000\n"
  when_applies: "When conducting load tests or capacity planning for any production service."
  severity: high
  technologies:
    library: [testing, load, replay, distributed]
    platform: [metrics, throughput]
  domains:
    domain: [performance, testing, reliability, planning]
    concern: [load_testing, methodology, capacity, measurement]
  sources:
  - url: https://sre.google/sre-book/testing-reliability/
    title: "Google SRE Book — Chapter 17: Testing for Reliability"
  validation_status: cross_checked

- id: CR-SRE-PERF-003
  text: |
    Run continuous profiling in production with low-overhead sampling, not just during incident investigations. Most performance regressions are gradual and invisible without always-on profiling that captures CPU, memory allocation, and lock contention over weeks.
  why: |
    Google's internal continuous profiling system (referenced in Chapter 18 on Software Engineering in SRE and the broader SRE culture of measurement) runs on every production server, every second, with less than 1% CPU overhead. The reason is simple — performance problems that matter most are the ones you cannot reproduce in development or staging. Production traffic patterns, data sizes, and concurrency levels create hot paths that are invisible in controlled environments. Without continuous profiling, teams only profile during incidents, which means they see the symptoms (high latency, high CPU) but lack the historical baseline to identify when and why performance changed. Google's profiler samples stack traces at 100 Hz (every 10ms) across all production servers, aggregates by function, and shows differential flamegraphs comparing this week to last week. This catches regressions like "JSON parsing went from 5% to 15% of CPU after the deploy on Tuesday" before they hit SLO thresholds. The overhead concern is a common objection, but sampling-based profilers (not instrumentation-based) have been measured at 0.5-2% CPU overhead in production, which is negligible compared to the 20-50% CPU waste from undetected performance regressions that accumulate over months. Google considers continuous profiling as essential as monitoring — you would never turn off metrics collection to save CPU, and profiling should be treated the same way.
  how_to_do_right: |
    1. Deploy a sampling-based continuous profiler (e.g., pprof, async-profiler, Pyroscope, Google Cloud Profiler) on all production instances with a default sampling rate of 100 Hz.
    2. Verify profiler overhead is below 2% CPU by comparing instance performance with and without the profiler enabled — if overhead exceeds 2%, reduce sampling frequency.
    3. Store profiles with enough retention (at minimum 30 days) to correlate performance changes with specific deployments, configuration changes, or traffic shifts.
    4. Build differential flamegraph views that compare current profiles against a baseline period (e.g., same time last week) to automatically surface functions whose CPU share has increased significantly.
    5. Set up automated regression alerts — if a function's CPU share increases by more than 2x between releases, flag it in the deployment pipeline for review before full rollout.
    6. Profile memory allocation rates (not just CPU) to catch allocation-heavy code paths that increase GC pressure and tail latency even when average CPU looks healthy.
  example_good: "# Continuous profiling with Pyroscope — always-on, low overhead\nimport pyroscope\n\npyroscope.configure(\n    application_name=\"payment-service\",\n    server_address=\"http://pyroscope:4040\",\n    sample_rate=100,  # 100 Hz sampling\n)\n\n# Weekly diff flamegraph review:\n# 'JSON parsing went from 5% to 15% of CPU after Tuesday deploy'\n# Caught before SLO degradation, fixed proactively\n\n# Go: import _ \"net/http/pprof\"  (always-on in production)\n# JVM: -XX:+FlightRecorder -XX:StartFlightRecording=duration=0\n"
  example_bad: "# Only profile during incidents — missing gradual regressions\n# Normal workflow:\n# 1. Latency is fine (no profiling running)\n# 2. 20 deploys over 2 months (each adds 3% CPU)\n# 3. Latency degrades 60% (nobody noticed gradual change)\n# 4. Incident declared, NOW start profiling\n# 5. See current state, but no baseline to compare against\n# 6. Cannot identify which deploy caused the regression\n"
  when_applies: "When operating any production service where performance regressions could accumulate gradually across deploys."
  severity: high
  technologies:
    platform: [profiling, continuous, flamegraph, sampling]
  domains:
    domain: [performance]
    concern: [latency, profiling, production, cpu, continuous, memory, allocation]
  sources:
  - url: https://sre.google/sre-book/software-engineering-in-sre/
    title: "Google SRE Book — Chapter 18: Software Engineering in SRE"
  validation_status: cross_checked

- id: CR-SRE-PERF-004
  text: |
    Performance regression detection requires automated statistical baselines, not human eyeballing of dashboards. A 5% latency regression per deploy is invisible to humans but compounds to 2x degradation after 14 deploys without automated detection.
  why: |
    Google's approach to reliability (Chapters 17 and 18) recognizes that gradual performance regressions are among the most insidious operational problems because they evade human attention. A single deploy that adds 3ms to average latency (from 100ms to 103ms) does not trigger any alert and looks identical on a dashboard. After 20 deploys, latency is 160ms — a 60% regression that nobody noticed because each step was within noise. Google combats this with automated performance benchmarks that run in CI/CD with statistical significance testing. The key insight is that performance measurements are inherently noisy — the same code produces different latency on each run due to context switching, cache state, network jitter, and garbage collection timing. Naive comparison ("this run was 5ms slower, regression!") produces excessive false positives. Instead, Google runs benchmarks multiple times (minimum 10 iterations), computes confidence intervals, and only flags a regression if the difference is statistically significant at p < 0.05 with an effect size exceeding a meaningful threshold (e.g., > 2% degradation). This approach catches real regressions while ignoring measurement noise. Without this discipline, teams either ignore benchmark results entirely (too many false alarms) or manually verify each one (too slow for continuous deployment). The automation must be in the deployment pipeline as a gate, not as a dashboard someone checks occasionally.
  how_to_do_right: |
    1. Run performance benchmarks on every commit or at minimum every release candidate — use dedicated benchmark machines with consistent hardware and minimal background load to reduce measurement variance.
    2. Execute each benchmark a minimum of 10 times and compute mean, standard deviation, and 95% confidence interval — never compare single-run results.
    3. Use a statistical test (e.g., Mann-Whitney U or bootstrap confidence intervals) to determine if the performance difference between the current and baseline version is statistically significant at p < 0.05.
    4. Set a meaningful effect size threshold (e.g., > 2% regression in p99 latency or > 5% regression in throughput) to avoid flagging statistically significant but operationally irrelevant changes.
    5. Maintain a rolling baseline from the last known-good release — update the baseline only when a release passes all performance gates, creating a ratchet that prevents gradual degradation.
    6. Integrate regression detection as a blocking gate in the deployment pipeline — a statistically significant regression above the effect threshold blocks the deploy and requires explicit override with a justification.
  example_good: "import numpy as np\nfrom scipy import stats\n\ndef detect_regression(baseline_runs: list, candidate_runs: list,\n                      threshold_pct: float = 2.0, alpha: float = 0.05):\n    \"\"\"Statistical regression detection with Mann-Whitney U test.\"\"\"\n    assert len(baseline_runs) >= 10 and len(candidate_runs) >= 10\n    stat, p_value = stats.mannwhitneyu(baseline_runs, candidate_runs,\n                                        alternative='less')\n    median_diff_pct = (\n        (np.median(candidate_runs) - np.median(baseline_runs))\n        / np.median(baseline_runs) * 100\n    )\n    is_regression = p_value < alpha and median_diff_pct > threshold_pct\n    return {\n        \"p_value\": p_value,\n        \"median_diff_pct\": median_diff_pct,\n        \"is_regression\": is_regression,\n        \"gate\": \"BLOCK\" if is_regression else \"PASS\",\n    }\n"
  example_bad: "# Single-run comparison — noise mistaken for signal\ndef check_performance(before: float, after: float):\n    if after > before * 1.01:  # 1% slower? REGRESSION!\n        return 'FAIL'\n    return 'PASS'\n# Problem: single runs have 5-10% natural variance\n# This produces constant false positives -> team ignores the gate\n# OR: no automated check at all -> 3ms per deploy * 20 deploys = 60ms regression\n"
  when_applies: "When running performance benchmarks in CI/CD pipelines to detect regressions before deployment."
  severity: high
  technologies:
    library: [testing, performance, benchmarking]
    platform: [gates, performance, metrics, statistical]
  domains:
    domain: [performance, testing, reliability, deployment]
    concern: [regression, detection, automated, statistical_significance, gates]
  sources:
  - url: https://sre.google/sre-book/testing-reliability/
    title: "Google SRE Book — Chapter 17: Testing for Reliability"
  - url: https://sre.google/sre-book/software-engineering-in-sre/
    title: "Google SRE Book — Chapter 18: Software Engineering in SRE"
  validation_status: cross_checked

- id: CR-SRE-PERF-005
  text: |
    Garbage collection pauses are the single largest source of tail latency in managed-language services. GC tuning must target maximum pause time, not throughput — a 500ms GC pause every 30 seconds destroys p99 latency even if total GC overhead is only 2%.
  why: |
    Google's handling of overload (Chapter 21) and cascading failures (Chapter 22) implicitly addresses the GC problem because GC pauses are a primary cause of the latency spikes that trigger cascading failures. Consider a Java service with 8GB heap running G1 GC with default settings. Under moderate load, young generation collections take 10-20ms (acceptable). But when the heap fills, a mixed collection or full GC can pause all request processing for 200-800ms. During that pause, all in-flight requests are delayed, health checks may fail (causing the load balancer to remove the instance), and queued requests pile up. When the GC finishes, the server faces a burst of queued requests that may trigger another GC, creating a vicious cycle. Google's approach is to tune GC for maximum pause time, not throughput. A GC configuration that uses 5% of CPU but never pauses longer than 20ms is vastly better for a latency-sensitive service than one using 2% CPU with occasional 500ms pauses. This means using concurrent collectors (G1, ZGC, Shenandoah) instead of throughput collectors, setting explicit pause time targets (-XX:MaxGCPauseMillis), sizing the young generation to keep minor GC pauses short, and monitoring GC pause distribution (not just average GC time). For critical services, Google often uses memory-efficient data structures and off-heap storage to reduce GC pressure entirely, trading code complexity for predictable latency.
  how_to_do_right: |
    1. Use a low-pause concurrent garbage collector (ZGC or Shenandoah for JVM, concurrent GC for Go) and set an explicit maximum pause time target (e.g., -XX:MaxGCPauseMillis=20 for G1).
    2. Monitor GC pause duration as a histogram, not an average — alert on p99 GC pause time exceeding your latency SLO headroom (if SLO is 200ms and processing takes 150ms, max GC pause must be under 50ms).
    3. Size the young generation large enough that minor GC frequency stays below 1 per second under peak load — frequent minor GCs compound into constant latency overhead.
    4. Avoid allocation-heavy hot paths by reusing objects, using object pools for request/response buffers, and pre-allocating collections at expected capacity instead of growing dynamically.
    5. Move large, long-lived data structures off-heap (e.g., memory-mapped files, off-heap caches like Chronicle Map or direct ByteBuffers) to reduce the GC's scanning burden.
    6. Correlate GC pause logs with latency spikes in your monitoring — enable GC logging (-Xlog:gc* for modern JVM) and overlay GC events on your latency time-series to prove or disprove GC as the tail latency source.
  example_good: "# JVM: ZGC with explicit pause target and GC logging\n# java -XX:+UseZGC -XX:MaxGCPauseMillis=10 \\\n#      -Xlog:gc*:file=gc.log:time,uptime:filecount=5,filesize=20m \\\n#      -Xmx4g -jar service.jar\n\n# Go: Monitor GC pause duration\nimport runtime\nimport runtime/debug\n\nfunc init() {\n    // Target max GC pause of 5ms\n    debug.SetGCPercent(50)  // More frequent, shorter collections\n}\n\nfunc reportGCMetrics() {\n    var stats debug.GCStats\n    debug.ReadGCStats(&stats)\n    for _, pause := range stats.Pause {\n        gcPauseHistogram.Observe(pause.Seconds())\n    }\n}\n"
  example_bad: "# Default GC settings — 500ms pauses destroy p99 latency\n# java -jar service.jar  (default G1, no pause target)\n# Under load: mixed collections pause for 200-800ms\n# During pause: ALL in-flight requests delayed\n# Health checks fail -> LB removes instance -> restart -> cold cache\n# Vicious cycle: GC pause -> queue buildup -> more GC -> longer pause\n"
  when_applies: "When running latency-sensitive services on managed-language runtimes (JVM, Go, .NET, Python) where GC pauses affect tail latency."
  severity: high
  technologies:
    library: [runtime, jvm, gc, g1, zgc, golang]
    platform: [metrics, gc]
  domains:
    domain: [performance]
    concern: [latency, tail_latency, gc_pauses, memory, gc, tuning, concurrent]
  sources:
  - url: https://sre.google/sre-book/handling-overload/
    title: "Google SRE Book — Chapter 21: Handling Overload"
  - url: https://sre.google/sre-book/addressing-cascading-failures/
    title: "Google SRE Book — Chapter 22: Addressing Cascading Failures"
  validation_status: cross_checked

- id: CR-SRE-PERF-006
  text: |
    Connection pool sizing must be calculated from measured concurrency and downstream latency, not guessed. A pool too small causes request queuing at your service; a pool too large overwhelms the downstream server with connections it cannot serve efficiently.
  why: |
    Google's load balancing chapters (19-20) and overload handling (Chapter 21) describe how connection management between services is a critical performance lever. The formula for optimal pool size is derived from Little's Law — connections_needed = requests_per_second * average_latency_seconds. If your service sends 500 requests per second to a database with 10ms average latency, you need 500 * 0.01 = 5 connections. With p99 latency of 50ms, you need headroom for bursts, so 500 * 0.05 = 25 connections covers the tail. Most teams set pool sizes by guessing (often 50 or 100 "because that seems reasonable"), creating two failure modes. Too small — when all connections are in use, new requests queue at the connection pool, adding latency that is invisible to downstream monitoring because the downstream sees normal load. The wait-for-connection time appears as application latency, not database latency, making it hard to diagnose. Too large — each connection consumes memory on both client and server (typically 5-10MB per connection in PostgreSQL). With 100 application instances each holding 100 connections, the database sees 10,000 connections, consuming 50-100GB of memory just for connection state. PostgreSQL performance degrades significantly above a few hundred active connections due to lock contention in the process-per-connection model. The solution is HikariCP's approach (or PgBouncer for PostgreSQL) — start with a small pool sized by Little's Law, measure connection wait time as a metric, and increase only when wait time exceeds a threshold.
  how_to_do_right: |
    1. Calculate initial pool size using Little's Law — pool_size = peak_rps * p99_downstream_latency_seconds, then add 20% headroom for bursts.
    2. Monitor connection pool wait time as a first-class metric — any request that waits more than 1ms for a connection indicates the pool is too small for current load.
    3. Monitor active connections at the downstream server (e.g., pg_stat_activity for PostgreSQL) — total connections from all clients should stay below the server's optimal concurrency (CPU cores * 2 for compute-bound, higher for I/O-bound workloads).
    4. Use connection pooling proxies (PgBouncer, ProxySQL, Envoy) between application instances and databases to multiplex many application-side connections onto fewer database-side connections.
    5. Set connection idle timeout aggressively (30-60 seconds) to release unused connections back to the pool during low-traffic periods instead of holding them indefinitely.
    6. Load test with pool size as a variable — measure throughput and p99 latency at pool sizes of N/2, N, 2N, and 4N to find the inflection point where increasing pool size stops helping and starts hurting.
  example_good: "# Connection pool sized by Little's Law with monitoring\nimport psycopg2.pool\n\nPEAK_RPS = 500\nP99_LATENCY_SECONDS = 0.05  # 50ms\nHEADROOM = 1.2\n\n# Little's Law: pool_size = RPS * latency\nPOOL_SIZE = int(PEAK_RPS * P99_LATENCY_SECONDS * HEADROOM)  # = 30\n\npool = psycopg2.pool.ThreadedConnectionPool(\n    minconn=5,\n    maxconn=POOL_SIZE,  # Calculated, not guessed\n)\n\n# Monitor connection wait time as a first-class metric\nCONN_WAIT = Histogram('db_connection_wait_seconds', 'Time waiting for connection')\n\ndef get_connection():\n    start = time.time()\n    conn = pool.getconn()\n    CONN_WAIT.observe(time.time() - start)  # Alert if > 1ms\n    return conn\n"
  example_bad: "# Pool size guessed at 100 — too large for the database\nimport psycopg2.pool\n\npool = psycopg2.pool.ThreadedConnectionPool(\n    minconn=10,\n    maxconn=100,  # 'Seems reasonable'\n)\n# 50 app instances * 100 connections = 5,000 connections to PostgreSQL\n# PostgreSQL degrades above ~300 active connections\n# Each connection uses 5-10MB on the DB server = 25-50GB just for connections\n# No monitoring of connection wait time — invisible queuing\n"
  when_applies: "When configuring connection pools for databases, caches, or any downstream service with a finite connection capacity."
  severity: high
  technologies:
    platform: [postgresql, connection_pooling, mysql, grpc, connection_management, http]
  domains:
    domain: [performance]
    concern: [throughput, connection_pool, sizing, tuning, latency, queuing, connection_wait]
  sources:
  - url: https://sre.google/sre-book/handling-overload/
    title: "Google SRE Book — Chapter 21: Handling Overload"
  - url: https://sre.google/sre-book/load-balancing-datacenter/
    title: "Google SRE Book — Chapter 20: Load Balancing in the Datacenter"
  validation_status: cross_checked

- id: CR-SRE-PERF-007
  text: |
    Memory leaks in production must be detected through continuous monitoring of resident set size (RSS) growth rate over hours, not by waiting for OOM kills. A leak of 1MB per hour is invisible in short tests but consumes 720MB per month and eventually kills the process.
  why: |
    Google's operational practices (Chapters 12 and 18) treat memory leaks as reliability problems, not just performance problems, because a leaked process eventually hits the memory limit and is OOM-killed, causing a service restart that drops all in-flight requests. In containerized environments, the OOM killer terminates the process with no graceful shutdown — open transactions are abandoned, connections are not cleanly closed, and downstream services see sudden connection resets. The insidious nature of memory leaks is that they are invisible in short tests. A leak of 100KB per request in a service handling 100 RPS leaks 10MB per second — catastrophic and caught immediately. But a leak of 100 bytes per unique user session in a service with 10,000 daily users leaks only 1MB per day — invisible in hourly metrics but accumulates to 30MB per month. Google's approach is to monitor the growth rate of heap size (or RSS for native code) over time, not the absolute value. A constant heap size under constant load is healthy. A linearly growing heap under constant load is a leak, regardless of the absolute size. The key metric is RSS growth rate normalized by request rate. Google also uses differential heap profiling — take a heap snapshot at time T, another at time T+1h, and diff them to find objects that were allocated but never freed. This is more effective than looking at absolute heap contents because it highlights the delta.
  how_to_do_right: |
    1. Monitor RSS (resident set size) and heap size as time-series metrics with at least 7 days of retention — a leak that grows 1MB/hour is only visible over multi-hour windows.
    2. Alert on monotonically increasing RSS under stable load — use linear regression on the RSS time-series over a 6-hour window and alert if the slope is significantly positive (p < 0.05).
    3. Implement periodic heap profiling (e.g., every 4 hours) in production for at least one canary instance, storing heap snapshots for differential analysis.
    4. Compare heap snapshots over time using differential profiling tools (pprof --diff_base, jmap + Eclipse MAT comparison, Python tracemalloc) to identify object types growing without bound.
    5. Set container memory limits with a safety margin (e.g., 80% of limit is the alert threshold) so you have time to diagnose and fix the leak before OOM kills occur.
    6. Implement a graceful restart mechanism (rolling restart every 24h or when RSS exceeds 80% of limit) as a safety net — this is not a fix for leaks but prevents OOM kills while you find the root cause.
  example_good: "import tracemalloc\nimport psutil\nimport logging\n\nlogger = logging.getLogger(__name__)\ntracemalloc.start()\n\ndef check_memory_health():\n    process = psutil.Process()\n    rss_mb = process.memory_info().rss / 1024 / 1024\n    RSS_GAUGE.set(rss_mb)\n\n    # Differential snapshot every 4 hours\n    snapshot = tracemalloc.take_snapshot()\n    top_stats = snapshot.compare_to(baseline_snapshot, 'lineno')\n    for stat in top_stats[:5]:\n        logger.info(f\"Memory growth: {stat}\")\n\n    # Alert if RSS growing linearly under stable load\n    if rss_mb > CONTAINER_LIMIT_MB * 0.8:\n        logger.warning(f\"RSS at {rss_mb}MB — approaching {CONTAINER_LIMIT_MB}MB limit\")\n        trigger_graceful_restart()  # Safety net, not a fix\n"
  example_bad: "# No memory monitoring — wait for OOM kill\n# Day 1: RSS = 200MB (normal)\n# Day 5: RSS = 250MB (leak: 10MB/day, invisible in dashboards)\n# Day 30: RSS = 500MB (approaching 512MB limit)\n# Day 31: OOM-killed! No graceful shutdown, all in-flight requests lost\n# No heap snapshot, no tracemalloc — cannot identify the leaking object\n"
  when_applies: "When operating any long-running production service where memory leaks can accumulate over hours or days."
  severity: high
  technologies:
    library: [runtime, jvm, memory, python, tracemalloc]
    platform: [metrics, memory, rss, profiling, heap]
  domains:
    domain: [performance, reliability]
    concern: [memory, leak_detection, continuous, leak_prevention, patterns, stability, oom_prevention]
