layer: rules
technology: SRE
domain: deployment
knowledge:
- id: CR-SRE-CFG-001
  text: Separate configuration from code — configuration should be deployable independently of code. A config change that
    requires a full deployment cycle (build, test, deploy) is too slow for operational needs. A code change that requires
    a config change is too fragile.
  why: 'Google''s release engineering (Chapter 8) distinguishes between code (compiled binaries, application logic) and configuration
    (parameters, feature flags, routing rules). Code changes are expensive: they require compilation, testing, packaging,
    and deployment. Configuration changes should be cheap: modify a value, validate, push. This separation enables: operational
    agility (change a timeout in seconds, not hours), safe experimentation (A/B test via config, not code), and independent
    evolution (update config without deploying code, deploy code without changing config). Google uses multiple configuration
    layers: compiled defaults (in code), deployment-time config (environment variables, ConfigMaps), runtime config (feature
    flag services, Consul), and emergency overrides (kill switches, rate limits).

    '
  how_to_do_right: '1. Configuration must not require code recompilation or redeployment. If changing a timeout requires a
    new Docker image, the architecture is wrong.

    2. Use hierarchical config: defaults in code → environment variables → config files → feature flag service. Each layer
    overrides the previous.

    3. Validate configuration at startup: check all required values are present, types are correct, ranges are valid. Fail
    fast with clear errors.

    4. Version control ALL configuration — even "temporary" overrides. Unversioned config changes are invisible during incident
    investigation.

    5. Support hot-reload for operational config (timeouts, rate limits, feature flags). Don''t require restarts for config
    changes.

    6. Separate build-time config (compile flags, optimization level) from runtime config (database URL, timeouts). They have
    different lifecycles.

    '
  example_good: "# Hierarchical config: code defaults -> env vars -> config file -> feature flags\nimport os\nfrom dataclasses import dataclass, field\n\n@dataclass\nclass AppConfig:\n    db_timeout_ms: int = 5000  # compiled default\n    cache_ttl_sec: int = 300\n    max_retries: int = 3\n\n    @classmethod\n    def from_env(cls) -> 'AppConfig':\n        return cls(\n            db_timeout_ms=int(os.getenv('DB_TIMEOUT_MS', '5000')),\n            cache_ttl_sec=int(os.getenv('CACHE_TTL_SEC', '300')),\n            max_retries=int(os.getenv('MAX_RETRIES', '3')),\n        )\n\n# Validate at startup\nconfig = AppConfig.from_env()\nassert config.db_timeout_ms > 0, 'DB_TIMEOUT_MS must be positive'\nassert config.cache_ttl_sec >= 0, 'CACHE_TTL_SEC must be non-negative'\n# Config change = env var change, no redeployment needed\n"
  example_bad: "# Config hardcoded in code — requires redeployment for any change\nDB_TIMEOUT = 5000  # hardcoded\nCACHE_TTL = 300    # hardcoded\n\ndef get_db_connection():\n    return connect('postgres://prod-db:5432/myapp',  # hardcoded URL\n                   timeout=DB_TIMEOUT)\n\n# Changing a timeout requires: code change -> PR -> build -> test -> deploy\n# Emergency: DB is overloaded, need to increase timeout NOW -> hours, not seconds\n"
  when_applies: "When designing how application parameters, feature flags, and operational knobs are managed and deployed."
  severity: high
  technologies:
    lang: [general]
    platform: [kubernetes, configmaps, networking]
  domains:
    domain: [code_quality, operations, deployment, reliability]
    concern: [configuration]
  sources:
  - url: https://sre.google/sre-book/release-engineering/
    title: 'Google SRE Book — Chapter 8: Release Engineering'
  validation_status: cross_checked
- id: CR-SRE-CFG-002
  text: Environment-specific configuration must come from the environment, not from the code. The same binary must run in
    dev, staging, and production with ZERO code changes — only config changes. If your code has `if env == "production":`
    conditionals, you are doing it wrong.
  why: 'Google''s hermetic build principle (Chapter 8) extends to configuration: the same binary is deployed everywhere, and
    only configuration differs between environments. This enables a critical property: the binary tested in staging is EXACTLY
    the binary deployed to production. If environment-specific logic is in the code (`if env == "production": use_real_database
    else: use_mock`), then the production code path is different from the staging code path — and bugs in the production path
    are not caught in staging. Google''s approach: the application reads all environment-specific values from configuration
    (environment variables, ConfigMaps, Consul) and never branches on environment name. The same code path runs everywhere;
    only the configured values differ.

    '
  how_to_do_right: '1. The application must NEVER check its own environment name. It reads config values, not environment
    labels.

    2. Use environment variables or ConfigMaps for environment-specific values: DATABASE_URL, CACHE_URL, LOG_LEVEL, FEATURE_FLAGS_URL.

    3. The same Docker image deploys to dev, staging, and production. If you have per-environment Dockerfiles, refactor.

    4. Document every environment-specific config value in a single file. This file IS the environment definition.

    5. Test with production config values in staging (use read replicas, sanitized data). The closer staging config is to
    production config, the more confidence you have.

    6. Automate environment creation from config: spinning up a new environment should be a single command that applies the
    config file.

    '
  example_good: "# Environment config from environment, not code\nimport os\n\nclass DatabaseConfig:\n    def __init__(self):\n        self.url = os.environ['DATABASE_URL']        # from env\n        self.pool_size = int(os.getenv('DB_POOL_SIZE', '10'))\n        self.ssl_mode = os.getenv('DB_SSL_MODE', 'require')\n\n# Same Docker image, different config per environment:\n# dev:    DATABASE_URL=postgres://localhost:5432/myapp_dev\n# staging: DATABASE_URL=postgres://staging-db:5432/myapp\n# prod:   DATABASE_URL=postgres://prod-db:5432/myapp\n\n# Kubernetes ConfigMap per environment\n# apiVersion: v1\n# kind: ConfigMap\n# metadata:\n#   name: app-config\n# data:\n#   DATABASE_URL: postgres://prod-db:5432/myapp\n"
  example_bad: "# Environment logic in code — different code paths per environment\nimport os\n\ndef get_database():\n    env = os.getenv('ENV', 'dev')\n    if env == 'production':\n        return connect('postgres://prod-db:5432/myapp', ssl=True)\n    elif env == 'staging':\n        return connect('postgres://staging-db:5432/myapp', ssl=True)\n    else:\n        return connect('postgres://localhost:5432/myapp', ssl=False)\n    # Production code path is different from staging/dev\n    # Bugs in the production branch are NOT caught in staging\n"
  when_applies: "When configuring database URLs, API endpoints, feature flags, or any value that differs between environments."
  severity: high
  technologies:
    lang: [general]
    platform: [docker, kubernetes, terraform]
  domains:
    domain: [architecture, code_quality, operations, deployment, reliability]
    concern: [configuration]
  sources:
  - url: https://sre.google/sre-book/release-engineering/
    title: 'Google SRE Book — Chapter 8: Release Engineering'
  validation_status: cross_checked
- id: CR-SRE-CICD-001
  text: The deployment pipeline must be fast enough to not discourage frequent deploys. If deploying takes 2 hours, engineers
    batch changes. If deploying takes 10 minutes, engineers deploy small changes. The pipeline speed determines the deployment
    culture.
  why: 'Google''s release engineering principle (Chapter 8) that "high velocity reduces risk" is undermined by slow pipelines.
    A 2-hour pipeline incentivizes batching ("let me add this other change since I''m deploying anyway"), which creates large,
    risky deployments. A 10-minute pipeline incentivizes small, frequent deployments ("I''ll deploy this one change now and
    the next one in an hour"), which are inherently safer. Google invested heavily in build and deployment speed because they
    observed a direct correlation between pipeline speed and deployment frequency, and between deployment frequency and reliability.
    The DORA metrics confirm this: elite teams deploy multiple times per day with < 15 minutes lead time.

    '
  how_to_do_right: '1. Target: < 15 minutes from commit to production for a single service. Measure and track this.

    2. Parallelize CI stages: run unit tests, linting, security scan, and build in parallel, not sequentially.

    3. Use build caching (Docker layer cache, Bazel remote cache) to avoid rebuilding unchanged components.

    4. Run only affected tests: if only service A changed, run service A''s tests, not the entire test suite.

    5. Monitor pipeline duration trends. If pipeline time increases by 10% per month, it will be 2x as long in 7 months.

    6. Treat pipeline speed as a product feature: assign an owner, track metrics, invest in improvements.

    '
  example_good: "# Fast CI pipeline with parallelism and caching\n# .github/workflows/ci.yml\nname: CI\non: [push]\njobs:\n  lint:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v4\n      - run: ruff check src/\n  test:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v4\n      - uses: actions/cache@v4\n        with:\n          path: ~/.cache/pip\n          key: pip-${{ hashFiles('requirements.txt') }}\n      - run: pip install -r requirements.txt\n      - run: pytest tests/ --tb=short  # only affected tests\n  build:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v4\n      - run: docker build --cache-from=myapp:latest -t myapp:${{ github.sha }} .\n# lint + test + build run in PARALLEL -> total ~8 minutes\n"
  example_bad: "# Slow sequential pipeline — discourages frequent deploys\nstages:\n  - lint          # 3 min\n  - unit-tests    # 10 min (full suite, no caching)\n  - build         # 8 min (no Docker cache)\n  - integration   # 15 min (all tests, not just affected)\n  - deploy        # 5 min\n# Total: 41 minutes sequential\n# Engineers batch changes -> large risky deployments\n"
  when_applies: "When designing or optimizing CI/CD pipelines to encourage frequent, small, safe deployments."
  severity: high
  technologies:
    lang: [general]
    platform: [deployment]
  domains:
    domain: [deployment, reliability]
    concern: [ci_cd]
  sources:
  - url: https://sre.google/sre-book/release-engineering/
    title: 'Google SRE Book — Chapter 8: Release Engineering'
  validation_status: cross_checked
- id: CR-SRE-CICD-002
  text: Rollback must be a single command that takes less than 5 minutes. If rollback requires manual steps, decision-making,
    or coordination, it is not a rollback mechanism — it is a recovery procedure. True rollback is instant and automatic.
  why: 'Google treats rollback speed as a primary reliability metric because MTTR is dominated by the time to decide and execute
    a rollback. The decision takes 5-30 minutes ("Is this deployment the cause? Should we rollback?"). The execution should
    take < 5 minutes — but in many organizations, rollback requires: identifying the previous version, building it (if not
    cached), deploying it (which may take 30+ minutes), and verifying the rollback worked. Google''s approach: every deployment
    records the previous version, and rolling back is a single command that redeploys the recorded version. The rollback image
    is pre-built (it was the previous deployment), so no build time is needed. Some systems go further: blue-green deployments
    keep both versions running and rollback is a traffic switch (instant).

    '
  how_to_do_right: '1. Implement one-click rollback: a single command or button that reverts to the previous version. No manual
    steps.

    2. Keep the previous version''s image available (don''t garbage collect it immediately). Store at least the last 5 versions.

    3. Target rollback time: < 5 minutes from decision to full rollback. Measure and track this.

    4. Automate rollback triggers: if error rate increases by > 5x within 10 minutes of a deployment, rollback automatically.

    5. Test rollback regularly: deploy a canary, rollback, verify. If you''ve never tested rollback, it probably doesn''t
    work.

    6. Blue-green or canary deployments make rollback instant (traffic switch) rather than a redeployment. Prefer these for
    critical services.

    '
  example_good: "# One-click rollback with version tracking\nimport subprocess\nimport json\nfrom datetime import datetime\n\ndef rollback(service: str, target_version: str = None) -> dict:\n    if target_version is None:\n        # Get previous version from deployment history\n        history = json.loads(subprocess.check_output(\n            ['kubectl', 'rollout', 'history', f'deployment/{service}', '-o', 'json']\n        ))\n        target_version = history['previous_revision']\n    # Execute rollback\n    subprocess.run(['kubectl', 'rollout', 'undo', f'deployment/{service}',\n                    f'--to-revision={target_version}'], check=True)\n    return {'service': service, 'rolled_back_to': target_version,\n            'timestamp': datetime.utcnow().isoformat()}\n\n# Auto-rollback trigger: error rate 5x increase within 10 min of deploy\n"
  example_bad: "# Manual rollback procedure — too slow during incidents\n# Step 1: Find the previous git commit SHA (check Slack? git log?)\n# Step 2: Checkout that commit locally\n# Step 3: Run the full build pipeline (20 minutes)\n# Step 4: Push the new image to registry\n# Step 5: Update the Kubernetes manifest\n# Step 6: Apply with kubectl\n# Step 7: Verify it's working\n# Total: 30-60 minutes of manual work during an outage\n"
  when_applies: "When implementing deployment systems for any production service that requires fast recovery from bad deployments."
  severity: critical
  technologies:
    lang: [general]
    platform: [deployment, kubernetes]
  domains:
    domain: [deployment, operations, reliability]
    concern: [ci_cd, change_management, rollback]
  sources:
  - url: https://sre.google/sre-book/release-engineering/
    title: 'Google SRE Book — Chapter 8: Release Engineering'
  validation_status: cross_checked
- id: CR-SRE-CICD-003
  text: Every deployment must be observable — you must know WHAT was deployed, WHEN, by WHOM, and WHAT CHANGED. Without deployment
    observability, correlating incidents with deployments is guesswork.
  why: 'Google''s troubleshooting chapter (Chapter 12) recommends "check recent changes first" as the primary diagnostic step.
    This only works if deployments are tracked and visible. Common gap: an engineer deploys at 14:32, errors start at 14:35,
    but the on-call at 2 AM doesn''t know that a deployment happened. They investigate for 30 minutes before someone mentions
    "oh, we deployed 12 hours ago." Google''s deployment systems record: the exact commit SHA deployed, the deployer''s identity,
    the timestamp, the previous version, and a diff of what changed. This information is visible on dashboards as deployment
    markers, in alerting context ("Alert: error rate spike — last deployment: 3 minutes ago by alice, commit abc123"), and
    in postmortems.

    '
  how_to_do_right: '1. Record every deployment: commit SHA, deployer, timestamp, previous version, environment.

    2. Show deployment markers on monitoring dashboards (Grafana annotations). Correlating metrics with deployments is the
    fastest diagnostic.

    3. Include deployment info in alert context: "Last deployment: 5 min ago, by alice, commit abc123."

    4. Generate deployment diffs automatically: "This deployment changes 3 files: auth.py (+45/-12), config.yaml (+2/-1),
    requirements.txt (+1)."

    5. Store deployment history for at least 90 days. Incidents may be investigated weeks after deployment.

    6. Track deployment frequency, lead time, rollback rate, and change failure rate (the four DORA metrics).

    '
  example_good: "# Record deployment metadata for observability\nimport json\nfrom datetime import datetime\n\ndef record_deployment(service: str, commit_sha: str, deployer: str,\n                      previous_sha: str) -> dict:\n    deployment = {\n        'service': service,\n        'commit_sha': commit_sha,\n        'previous_sha': previous_sha,\n        'deployer': deployer,\n        'timestamp': datetime.utcnow().isoformat(),\n        'diff_url': f'https://github.com/org/repo/compare/{previous_sha}...{commit_sha}',\n    }\n    # Store in deployment history database\n    save_deployment(deployment)\n    # Add Grafana annotation for dashboard correlation\n    create_grafana_annotation(f'Deploy {service}:{commit_sha[:8]} by {deployer}')\n    return deployment\n\n# Alert context includes: \"Last deployment: 5 min ago, commit abc123, by alice\"\n"
  example_bad: "# Deploy with no tracking — invisible to on-call\nimport subprocess\n\ndef deploy(image: str):\n    subprocess.run(['kubectl', 'set', 'image',\n                    'deployment/api', f'api={image}'])\n    print('Deployed!')  # No record of who, what, when\n# 2 AM: on-call sees error spike, spends 30 min investigating\n# before someone mentions 'oh we deployed 12 hours ago'\n"
  when_applies: "When building deployment pipelines or operating production services where correlating incidents with changes is essential."
  severity: high
  technologies:
    lang: [general]
    platform: [deployment, kubernetes, grafana]
  domains:
    domain: [deployment, observability, reliability]
    concern: [ci_cd]
  sources:
  - url: https://sre.google/sre-book/effective-troubleshooting/
    title: 'Google SRE Book — Chapter 12: Effective Troubleshooting'
  validation_status: cross_checked
- id: CR-SRE-CICD-004
  text: Infrastructure as Code (IaC) must be treated with the same rigor as application code — code review, testing, version
    control, and automated deployment. A Terraform plan that changes 50 resources without review is as dangerous as a code
    change that modifies 50 functions.
  why: 'Google''s "configuration is code" principle (Chapter 8) applies doubly to infrastructure configuration. Terraform,
    CloudFormation, and Pulumi files define the actual production infrastructure — changing them changes what''s running.
    A typo in a security group rule can expose a database to the internet. A misconfigured autoscaling policy can scale down
    to zero during peak traffic. A wrong instance type can cause OOM kills across the fleet. Yet many teams apply less rigor
    to IaC than to application code: no code review for Terraform changes, no staging environment for infrastructure, no automated
    testing of infrastructure changes. Google mandates that ALL infrastructure changes go through code review and staged rollout,
    same as application code.

    '
  how_to_do_right: '1. All infrastructure is in code (Terraform, Pulumi, CloudFormation). No ClickOps (manual console changes).

    2. Code review is mandatory for all IaC changes. Use `terraform plan` output in the PR for reviewers.

    3. Test IaC changes in a staging environment before production. Apply to staging, verify, then apply to production.

    4. Use `terraform plan` as a gate in CI: show the plan, require approval, then `terraform apply`. Never auto-apply without
    review.

    5. Track infrastructure drift: periodically compare actual state with desired state. Any drift indicates an unauthorized
    manual change.

    6. Pin provider versions in IaC. An unpinned provider version can change behavior between runs.

    '
  example_good: "# IaC with code review, staging, and drift detection\n# main.tf — pinned providers, reviewed via PR\nterraform {\n  required_providers {\n    aws = {\n      source  = \"hashicorp/aws\"\n      version = \"~> 5.30.0\"  # pinned\n    }\n  }\n}\n\nresource \"aws_security_group\" \"api\" {\n  name = \"api-sg\"\n  ingress {\n    from_port   = 443\n    to_port     = 443\n    protocol    = \"tcp\"\n    cidr_blocks = [\"10.0.0.0/8\"]  # internal only, reviewed\n  }\n}\n\n# CI pipeline:\n# 1. terraform plan -> output in PR for review\n# 2. Apply to staging first, verify\n# 3. Apply to production after approval\n# 4. Weekly drift detection: terraform plan -detailed-exitcode\n"
  example_bad: "# ClickOps + unreviewed Terraform changes\n# Engineer logs into AWS Console, clicks around\n# \"I'll just open port 22 to 0.0.0.0/0 for debugging\"\n# No code review, no staging, no audit trail\n\n# Or: auto-apply without review\n# terraform apply -auto-approve  # on every commit\n# A typo in security group exposes database to the internet\n"
  when_applies: "When managing infrastructure for any production environment using Terraform, CloudFormation, Pulumi, or similar IaC tools."
  severity: high
  technologies:
    lang: [general]
    platform: [aws, kubernetes, terraform]
  domains:
    domain: [operations, deployment, reliability]
  sources:
  - url: https://sre.google/sre-book/release-engineering/
    title: 'Google SRE Book — Chapter 8: Release Engineering'
  validation_status: cross_checked
