layer: rules
technology: SRE
domain: security
knowledge:
- id: CR-SRE-SEC-001
  text: Input validation alone is insufficient — use parameterized queries for SQL, template engines for HTML, and structured APIs for commands. Input validation tries to identify bad input (blocklist).
    Parameterized queries make bad input harmless (structural prevention). Structural prevention is always superior to input validation.
  why: 'Google''s security practices treat injection attacks (SQL injection, XSS, command injection) as structural problems, not input problems. The input validation approach: try to detect malicious input
    and reject it. Problems: blocklists are incomplete (there''s always a bypass), allowlists are too restrictive (rejecting valid input like O''Brien), and encoding variations evade validation (Unicode,
    double encoding, null bytes). The structural approach: make injection impossible by separating code from data. Parameterized SQL: the query structure is fixed at compile time, user input is ALWAYS data.
    Template engines with auto-escaping: user input is ALWAYS text, never HTML. This is defense-in-depth: validate input as a first layer, but don''t rely on it — structural prevention is the actual defense.

    '
  how_to_do_right: '1. SQL: ALWAYS use parameterized queries. cursor.execute("SELECT * FROM users WHERE id = %s", (user_id,)). NEVER string concatenation.

    2. HTML: ALWAYS use template engines with auto-escaping enabled (Jinja2 autoescape=True). NEVER raw string interpolation in HTML.

    3. Commands: NEVER pass user input to os.system() or subprocess with shell=True. Use subprocess.run(["cmd", arg]) with shell=False.

    4. URLs: validate against a strict allowlist of domains/paths. Don''t just check for "http://" prefix (SSRF via http://internal-service).

    5. File paths: use os.path.join() and verify the result is within the expected directory (path traversal prevention via os.path.commonpath).

    6. Apply input validation AS WELL (defense-in-depth), but never as the only defense. Validation catches accidental misuse; structural prevention catches intentional attacks.

    '
  example_good: "import subprocess\nfrom jinja2 import Environment, select_autoescape\n\n# SQL: parameterized query — user input is ALWAYS data\ncursor.execute(\n    \"SELECT * FROM users WHERE email = %s AND active = %s\",\n    (user_email, True)\n)\n\n# HTML: auto-escaping template engine\nenv = Environment(autoescape=select_autoescape(['html']))\ntemplate = env.from_string('<p>Hello {{ name }}</p>')\nhtml = template.render(name=user_input)  # Auto-escaped\n\n# Commands: shell=False, arguments as list\nsubprocess.run(['convert', input_file, output_file], shell=False)\n"
  example_bad: "# SQL injection — user input in query string\nquery = f\"SELECT * FROM users WHERE email = '{user_email}'\"\ncursor.execute(query)\n# user_email = \"'; DROP TABLE users; --\" -> deletes entire table\n\n# XSS — raw string interpolation in HTML\nhtml = f'<p>Hello {user_input}</p>'\n# user_input = '<script>steal(document.cookie)</script>'\n\n# Command injection — shell=True with user input\nsubprocess.run(f'convert {user_file} output.png', shell=True)\n# user_file = '; rm -rf /' -> deletes filesystem\n"
  when_applies: "When constructing SQL queries, HTML output, or system commands that include any external or user-provided input."
  severity: critical
  technologies:
    lang: [general, python, sql]
  domains:
    domain: [reliability, security]
    concern: [injection]
  sources:
  - url: https://sre.google/sre-book/reliable-product-launches/
    title: 'Google SRE Book — Chapter 27: Reliable Product Launches at Scale'
  validation_status: cross_checked
- id: CR-SRE-SEC-002
  text: CORS configuration must be explicit deny-by-default — do not use wildcard origins (*) in production. A CORS misconfiguration allows any website to make authenticated requests to your API, stealing
    user data and performing actions on their behalf.
  why: 'Google''s security launch review (Chapter 27) includes CORS verification because misconfigured CORS is one of the most common web security vulnerabilities. The danger: CORS with `Access-Control-Allow-Origin:
    *` allows ANY website to make requests to your API. If the API uses cookies for authentication, an attacker''s website can make authenticated requests on behalf of any user who visits the attacker''s
    site. Even worse: `Access-Control-Allow-Origin: *` with `Access-Control-Allow-Credentials: true` is the maximum-danger configuration (browsers actually block this specific combination, but many teams
    work around the block by dynamically reflecting the Origin header — which is equivalent and even more dangerous). Google mandates: explicit allowlist of permitted origins, no wildcards, no dynamic reflection
    of the Origin header.

    '
  how_to_do_right: '1. Default CORS policy: deny all cross-origin requests. Only add origins that are explicitly needed.

    2. Use an explicit allowlist: ["https://app.example.com", "https://admin.example.com"]. Not "*", not "*.example.com".

    3. NEVER dynamically reflect the Origin header as Access-Control-Allow-Origin. This is equivalent to * but bypasses browser safety checks.

    4. Set Access-Control-Allow-Methods to only the methods needed: ["GET", "POST"]. Not ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"].

    5. Set Access-Control-Max-Age to cache preflight responses: 3600 (1 hour) reduces preflight request overhead.

    6. Test CORS with curl: `curl -H "Origin: https://evil.com" -I https://api.example.com` — the response must NOT include `Access-Control-Allow-Origin: https://evil.com`.

    '
  example_good: "from fastapi import FastAPI\nfrom fastapi.middleware.cors import CORSMiddleware\n\napp = FastAPI()\n\n# Explicit allowlist of permitted origins\nALLOWED_ORIGINS = [\n    'https://app.example.com',\n    'https://admin.example.com',\n]\n\napp.add_middleware(\n    CORSMiddleware,\n    allow_origins=ALLOWED_ORIGINS,  # Explicit list, no wildcards\n    allow_credentials=True,\n    allow_methods=['GET', 'POST'],  # Only needed methods\n    allow_headers=['Authorization', 'Content-Type'],\n    max_age=3600,  # Cache preflight for 1 hour\n)\n"
  example_bad: "from fastapi import FastAPI\nfrom fastapi.middleware.cors import CORSMiddleware\n\napp = FastAPI()\n\napp.add_middleware(\n    CORSMiddleware,\n    allow_origins=['*'],           # ANY website can call your API\n    allow_credentials=True,        # With the user's cookies!\n    allow_methods=['*'],           # All methods including DELETE\n    allow_headers=['*'],           # All headers\n)\n# An attacker's website can now:\n# 1. Make authenticated requests to your API\n# 2. Read the responses (user data, financial info)\n# 3. Perform actions on behalf of any logged-in user\n"
  when_applies: "When configuring CORS for any web API that will be accessed from browser-based clients."
  severity: critical
  technologies:
    lang: [general]
    framework: [web, fastapi, flask]
    platform: [http]
  domains:
    domain: [reliability, security]
    concern: [web, cors]
  sources:
  - url: https://sre.google/sre-book/reliable-product-launches/
    title: 'Google SRE Book — Chapter 27: Reliable Product Launches at Scale'
  validation_status: cross_checked
- id: CR-SRE-SEC-003
  text: Authentication tokens must be short-lived (15-60 minutes) with refresh token rotation. A long-lived token (24 hours, 30 days) means that a stolen token grants access for the entire duration. Short
    tokens with refresh rotation limit the window of compromise.
  why: 'Google''s security practices mandate short-lived tokens because token theft is assumed to eventually occur (through XSS, network interception, log exposure, or device compromise). The tradeoff:
    short tokens (15 min) require more frequent refresh but limit compromise to 15 minutes. Long tokens (30 days) require less frequent refresh but a stolen token works for 30 days. Google''s solution:
    short-lived access tokens (15-60 minutes) combined with refresh tokens that are rotated on each use. When the client uses a refresh token, it receives a new access token AND a new refresh token. The
    old refresh token is invalidated. If an attacker steals a refresh token and uses it, the legitimate client''s next refresh attempt fails (old token invalidated) — alerting the system to potential compromise.

    '
  how_to_do_right: '1. Access tokens: 15-60 minutes lifetime. Stored in memory (not localStorage). Used for API authentication.

    2. Refresh tokens: 7-30 days lifetime. Stored in secure, httpOnly cookie. Used only to obtain new access tokens.

    3. Rotate refresh tokens: each refresh request returns a new refresh token and invalidates the old one. Detects token theft (two parties using the same refresh token).

    4. Include token metadata: issued_at, expires_at, scopes, user_id. Validate all fields on every request.

    5. Implement token revocation: when a user logs out or changes password, invalidate all their tokens. Use a token blocklist or version counter.

    6. Rate-limit token refresh: prevent rapid token refresh attempts (indicator of automated attack or token replay).

    '
  example_good: "import jwt\nimport time\nimport secrets\n\ndef create_token_pair(user_id: int) -> dict:\n    now = time.time()\n    access_token = jwt.encode({\n        'sub': user_id,\n        'iat': now,\n        'exp': now + 900,  # 15 minutes\n        'type': 'access'\n    }, ACCESS_SECRET, algorithm='HS256')\n    refresh_token = secrets.token_urlsafe(32)\n    # Store refresh token hash in DB with rotation tracking\n    store_refresh_token(\n        user_id=user_id,\n        token_hash=hash(refresh_token),\n        expires_at=now + 7 * 86400  # 7 days\n    )\n    return {'access_token': access_token, 'refresh_token': refresh_token}\n\ndef refresh(old_refresh_token: str) -> dict:\n    record = get_refresh_token(hash(old_refresh_token))\n    invalidate_refresh_token(record.id)  # Rotate: old token invalidated\n    return create_token_pair(record.user_id)  # New pair issued\n"
  example_bad: "import jwt\nimport time\n\ndef create_token(user_id: int) -> str:\n    return jwt.encode({\n        'sub': user_id,\n        'exp': time.time() + 30 * 86400  # 30 days!\n    }, SECRET, algorithm='HS256')\n\n# Token stolen via XSS or log exposure\n# Attacker has 30 days of access\n# No refresh rotation: stolen token works until expiry\n# No revocation mechanism: even password change doesn't help\n# User must wait 30 days for the stolen token to expire\n"
  when_applies: "When implementing authentication token management for web or API services."
  severity: high
  technologies:
    lang: [general]
  domains:
    domain: [reliability, security]
    concern: [authentication, tokens]
  sources:
  - url: https://sre.google/sre-book/reliable-product-launches/
    title: 'Google SRE Book — Chapter 27: Reliable Product Launches at Scale'
  validation_status: cross_checked
- id: CR-SRE-SEC-004
  text: Defense in depth means no single security control is the only thing standing between an attacker and sensitive data. If the firewall fails, the application auth catches the attacker. If auth is
    bypassed, the database permissions limit the blast radius. If all else fails, encryption at rest protects the data.
  why: 'Google''s security model (reflected throughout the SRE Book and BeyondCorp papers) assumes that every security control can fail. Firewalls can be misconfigured. Authentication can be bypassed. Authorization
    can have logic errors. Encryption can use weak algorithms. The defense-in-depth approach: stack multiple independent controls so that an attacker must bypass ALL of them, not just one. Google''s layers:
    network (firewall, network segmentation, mTLS), identity (authentication at every service, not just the edge), authorization (per-service, per-resource access control), data (encryption at rest and
    in transit, data classification), monitoring (detection of anomalous access patterns), and response (automated blocking, incident response).

    '
  how_to_do_right: '1. Network layer: firewall rules, network segmentation, mTLS between services. Assume the network is hostile (zero trust).

    2. Identity layer: authenticate every request, even internal. Use mTLS for service-to-service, JWT/API keys for client-to-service.

    3. Authorization layer: check permissions at every service, not just the API gateway. The gateway checks "is the user authenticated?" Each service checks "can this user do THIS action?"

    4. Data layer: encrypt at rest (AES-256), encrypt in transit (TLS 1.3), and classify data by sensitivity (PII, financial, public).

    5. Monitoring layer: log all access, detect anomalies (unusual access patterns, geographic anomalies, excessive data export).

    6. Response layer: automated blocking of suspicious activity, incident response playbooks, regular security testing (pentests, bug bounties).

    '
  example_good: "# Defense in depth: multiple independent security layers\n\n# Layer 1: Network — mTLS between services\n# istio sidecar enforces mutual TLS for all service-to-service traffic\n\n# Layer 2: Identity — authenticate every request\nfrom fastapi import Depends, Security\n\n@app.get('/api/users/{user_id}')\nasync def get_user(user_id: int,\n                   auth: Auth = Depends(verify_jwt_token),   # Layer 2\n                   perms: bool = Depends(check_permission('users:read'))):\n    # Layer 3: Authorization — check specific permissions\n    user = await db.get_user(user_id)  # DB user has SELECT-only perms (Layer 4)\n    audit_log(auth.user_id, 'read', f'users/{user_id}')  # Layer 5: Monitoring\n    return UserResponse(**user)  # Layer 6: Response model excludes password_hash\n"
  example_bad: "# Single layer: only gateway authentication\n# If gateway is bypassed (internal call, misconfigured route),\n# there is NO security at all\n\n@app.get('/api/users/{user_id}')\nasync def get_user(user_id: int):  # No auth check!\n    user = await db.get_user(user_id)  # DB has admin credentials\n    return user  # Returns ALL fields including password_hash\n    # No authorization: any authenticated user reads any user\n    # No audit: nobody knows who accessed what\n    # No encryption: data in transit over plain HTTP\n"
  when_applies: "When designing the security architecture of any system handling sensitive data or user information."
  severity: high
  technologies:
    lang: [general]
  domains:
    domain: [architecture, reliability, security]
    concern: [defense_in_depth]
  sources:
  - url: https://sre.google/sre-book/reliable-product-launches/
    title: 'Google SRE Book — Chapter 27: Reliable Product Launches at Scale'
  validation_status: cross_checked
- id: CR-SRE-SEC-005
  text: Dependency scanning must be automated and blocking — a known CVE in a production dependency must block deployment, not just generate a ticket. The time between CVE publication and exploitation is
    often less than 24 hours for critical vulnerabilities.
  why: 'Google''s supply chain security treats dependencies as attack surface because most code in a modern application is third-party: a typical Python project imports 50-200 transitive dependencies. Each
    dependency is maintained by a different team with different security practices. A vulnerability in any dependency affects your application. The Log4Shell (CVE-2021-44228) incident showed that critical
    vulnerabilities are exploited within hours of disclosure. A security scan that generates a ticket (processed in days) is too slow. Google''s approach: scan dependencies in CI/CD, block deployment if
    critical CVEs are found, auto-generate PRs to update vulnerable dependencies, and maintain a list of approved/denied dependencies.

    '
  how_to_do_right: '1. Scan dependencies in CI/CD: every pull request checks for known CVEs. Block merge if critical or high CVEs are found.

    2. Use tools: Dependabot (GitHub), Snyk, pip-audit (Python), npm audit (Node.js), govulncheck (Go).

    3. Configure severity thresholds: block on critical/high CVEs, warn on medium, log low. Don''t block on low severity — it creates alert fatigue.

    4. Auto-generate upgrade PRs: when a dependency has a security fix, automatically create a PR to upgrade. Human reviews and merges.

    5. Monitor dependency age: a dependency that hasn''t been updated in 2+ years may have unpatched vulnerabilities or be abandoned.

    6. Maintain a dependency allowlist: approved dependencies have been reviewed for security, license, and maintenance. New dependencies require approval.

    '
  example_good: "# .github/workflows/security-scan.yml\nname: Dependency Security Scan\non: [pull_request]\njobs:\n  scan:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v4\n      - name: Install dependencies\n        run: pip install pip-audit\n      - name: Audit dependencies\n        run: pip-audit -r requirements.txt --fail-on-vuln\n        # Blocks merge if critical/high CVEs found\n      - name: Check dependency age\n        run: |\n          pip list --outdated --format=json | python -c \"\n          import json, sys\n          outdated = json.load(sys.stdin)\n          old = [p for p in outdated if p['latest_version'] != p['version']]\n          if old:\n              print(f'WARNING: {len(old)} outdated packages')\n          \"\n"
  example_bad: "# requirements.txt with known vulnerable dependencies\nrequests==2.25.0  # CVE-2023-32681 (SSRF)\nurllib3==1.26.5   # CVE-2023-45803 (header injection)\ncryptography==3.4 # CVE-2023-49083 (DoS)\n\n# No automated scanning in CI\n# Security team files a ticket: \"Please update cryptography\"\n# Ticket sits in backlog for 3 months\n# Meanwhile, CVE is actively exploited in the wild\n# Time between CVE publication and exploitation: < 24 hours\n"
  when_applies: "When managing third-party dependencies in any application where security vulnerabilities could be exploited."
  severity: high
  technologies:
    lang: [general, python]
    platform: [snyk]
  domains:
    domain: [reliability, security]
    concern: [supply_chain, dependencies]
  sources:
  - url: https://sre.google/sre-book/release-engineering/
    title: 'Google SRE Book — Chapter 8: Release Engineering'
  validation_status: cross_checked
- id: CR-SRE-SEC-006
  text: Rate limiting must be applied at multiple layers — not just the API gateway. An attacker who bypasses the gateway (through a vulnerability or internal access) should still face rate limits at the
    application and database layers.
  why: 'Google''s defense-in-depth (Chapter 27) applies to rate limiting. Single-layer rate limiting at the API gateway works until: the gateway is bypassed (internal API calls, direct database access),
    the gateway rate limit is misconfigured (too high), or the attacker uses distributed sources (many IPs, each below the per-IP limit). Multi-layer rate limiting provides defense at each level: gateway
    (per-IP, per-user), application (per-user, per-operation), and database (per-connection, per-query). This ensures that even if one layer is bypassed or misconfigured, the other layers protect the system.
    Google implements rate limiting at: the edge (Google Front End), the application (per-service), and the database (per-query, enforced by the database proxy).

    '
  how_to_do_right: '1. Gateway layer: rate limit by IP address and API key. Catches external abuse.

    2. Application layer: rate limit by user ID and operation type. Catches authenticated abuse (compromised accounts, API misuse).

    3. Database layer: connection pool limits and query timeouts. Prevents any single query from consuming all database resources.

    4. Use different limits for different operations: read operations get higher limits (1000/min), write operations get lower limits (100/min).

    5. Implement adaptive rate limiting: tighten limits when the system is under load, relax when it''s healthy.

    6. Log rate limit events: which users/IPs are hitting limits? Frequent limit hits indicate either abuse or a client with a legitimate need for higher limits.

    '
  example_good: "from fastapi import FastAPI, Request, Response\nimport redis\n\napp = FastAPI()\nr = redis.Redis()\n\n# Application-layer rate limiting (per user, per operation)\nasync def rate_limit(user_id: str, operation: str,\n                     limit: int, window: int = 60) -> bool:\n    key = f'ratelimit:{operation}:{user_id}'\n    current = r.incr(key)\n    if current == 1:\n        r.expire(key, window)\n    if current > limit:\n        return False  # Rate limited\n    return True\n\n@app.post('/api/orders')\nasync def create_order(request: Request, response: Response):\n    user_id = request.state.user_id\n    if not await rate_limit(user_id, 'create_order', limit=10, window=60):\n        response.status_code = 429\n        response.headers['Retry-After'] = '60'\n        return {'error': 'Rate limited: max 10 orders/minute'}\n    # Process order\n"
  example_bad: "from fastapi import FastAPI\n\napp = FastAPI()\n\n# No rate limiting at any layer\n@app.post('/api/orders')\nasync def create_order(order: dict):\n    return process_order(order)\n\n# Attacker sends 10,000 requests/second\n# Database receives 10,000 writes/second\n# System collapses under load\n# Even if API gateway has rate limiting:\n#   - Attacker bypasses with distributed IPs\n#   - Internal services call without gateway\n#   - Compromised account has no per-user limits\n"
  when_applies: "When protecting APIs and services from abuse, ensuring fair usage, and preventing denial-of-service attacks."
  severity: high
  technologies:
    lang: [general]
    platform: [redis, load_balancer]
  domains:
    domain: [reliability, security]
    concern: [defense_in_depth, rate_limiting]
  sources:
  - url: https://sre.google/sre-book/handling-overload/
    title: 'Google SRE Book — Chapter 21: Handling Overload'
  validation_status: cross_checked
