layer: patterns
technology: General
domain: architecture
knowledge:
- {id: CR-ARCH-HEX-001, text: Hexagonal Architecture (Ports & Adapters) — The application core defines ports (interfaces)
    for all external interactions. Adapters implement those ports to connect to specific technologies., why: 'When business
    logic directly calls database drivers, HTTP clients, and message queues, it becomes impossible to test without running
    all infrastructure. Swapping PostgreSQL for DynamoDB requires rewriting service logic, not just the data layer. The hexagonal
    architecture inverts this: the core defines what it NEEDS (ports), and adapters translate between the core and the outside
    world. The dependency rule is strict: dependencies point INWARD — adapters depend on ports, never the reverse.', how_to_do_right: '1.
    Primary ports (driving): interfaces that the outside world uses to interact with the application (use cases, command handlers).

    2. Secondary ports (driven): interfaces that the application uses to interact with the outside world (repositories, event
    publishers, API clients).

    3. Primary adapters: REST controllers, CLI handlers, GraphQL resolvers — they CALL the application through primary ports.

    4. Secondary adapters: PostgresRepository, StripeClient, KafkaPublisher — the application CALLS them through secondary
    ports.

    5. Dependency rule: adapters depend on the domain, never the reverse. No framework imports in the domain layer.

    6. Testing: replace secondary adapters with in-memory fakes. Test primary ports directly without HTTP.

    ', severity: critical, technologies: {lang: [python, java, typescript, go]}, domains: {domain: [architecture], concern: [
      design, testability]}, example_good: "# domain/ports/order_repository.py — secondary port (driven)\nclass OrderRepository(Protocol):\n\
    \    def save(self, order: Order) -> None: ...\n    def find_by_id(self, order_id: str) -> Order | None: ...\n\n# domain/ports/payment_gateway.py\
    \ — secondary port (driven)\nclass PaymentGateway(Protocol):\n    def charge(self, amount: Decimal, method: PaymentMethod)\
    \ -> PaymentResult: ...\n\n# domain/use_cases/place_order.py — primary port (driving)\nclass PlaceOrderUseCase:\n    def\
    \ __init__(self, orders: OrderRepository, payments: PaymentGateway):\n        self.orders = orders\n        self.payments\
    \ = payments\n\n    def execute(self, cmd: PlaceOrderCommand) -> Order:\n        order = Order.create(cmd.customer_id,\
    \ cmd.items)\n        payment = self.payments.charge(order.total, cmd.payment_method)\n        order.confirm(payment.transaction_id)\n\
    \        self.orders.save(order)\n        return order\n\n# adapters/postgres_order_repo.py — secondary adapter\nclass\
    \ PostgresOrderRepo:\n    def save(self, order: Order) -> None:\n        self.session.add(OrderModel.from_domain(order))\n\
    \        self.session.commit()\n\n# adapters/rest/order_controller.py — primary adapter\n@router.post(\"/orders\")\ndef\
    \ create_order(body: CreateOrderRequest, use_case: PlaceOrderUseCase = Depends()):\n    order = use_case.execute(PlaceOrderCommand.from_request(body))\n\
    \    return OrderResponse.from_domain(order)\n", example_bad: "# Business logic directly coupled to infrastructure — no\
    \ ports, no adapters\nfrom sqlalchemy.orm import Session\nfrom stripe import PaymentIntent\nfrom redis import Redis\n\n\
    class OrderService:\n    def __init__(self, db: Session, cache: Redis):\n        self.db = db          # Concrete SQLAlchemy,\
    \ not a port\n        self.cache = cache    # Concrete Redis, not a port\n\n    def place_order(self, data: dict):\n \
    \       # Direct SQL — cannot test without PostgreSQL\n        self.db.execute(\"INSERT INTO orders ...\")\n        #\
    \ Direct Stripe — cannot test without Stripe API\n        PaymentIntent.create(amount=data[\"total\"])\n        # Direct\
    \ Redis — cannot test without Redis\n        self.cache.set(f\"order:{data['id']}\", json.dumps(data))\n        # To swap\
    \ PostgreSQL for DynamoDB, must rewrite this entire class\n", sources: ['https://alistair.cockburn.us/hexagonal-architecture/'],
  when_applies: When designing application architecture that separates business logic from infrastructure concerns}
- {id: CR-ARCH-HEX-002, text: 'Hexagonal Testing Strategy — Test the hexagon at each boundary: unit tests on the domain, integration
    tests on adapters, and acceptance tests through primary ports with fake secondary adapters.', why: 'The hexagonal architecture
    enables a powerful testing pyramid. Domain logic is tested with pure unit tests (no infrastructure needed, sub-millisecond).
    Adapters are tested with narrow integration tests (one real dependency at a time). End-to-end behavior is tested through
    primary ports with in-memory fakes for secondary adapters (fast, deterministic, no flakiness). This eliminates the common
    anti-pattern of ''all tests require Docker Compose'' and reduces CI time from 30 minutes to 3 minutes.', how_to_do_right: '1.
    Domain unit tests: test business rules, invariants, state transitions. Zero mocks.

    2. Adapter integration tests: test ONE adapter against ONE real dependency (testcontainers).

    3. Use case acceptance tests: call primary port with all secondary ports replaced by fakes.

    4. Fakes > mocks: fakes implement the port interface with in-memory data structures.

    5. Contract tests: verify that adapters satisfy the port''s behavioral contract.

    6. Ratio: 70% domain unit, 20% use case acceptance, 10% adapter integration.

    ', severity: high, technologies: {lang: [python, java, typescript]}, domains: {domain: [architecture, testing, quality]},
  example_good: "# 1. Domain unit test — zero infrastructure, pure logic\ndef test_order_cannot_exceed_credit_limit():\n \
    \   customer = Customer(credit_limit=Decimal(\"100\"))\n    order = Order.create(customer.id, [item(price=Decimal(\"150\"\
    ))])\n    assert order.status == OrderStatus.CREDIT_HOLD\n\n# 2. Use case acceptance test — fake adapters, real business\
    \ logic\ndef test_place_order_reserves_inventory():\n    fake_repo = InMemoryOrderRepo()\n    fake_inventory = InMemoryInventory(stock={\"\
    SKU-1\": 10})\n    use_case = PlaceOrderUseCase(orders=fake_repo, inventory=fake_inventory)\n    order = use_case.execute(PlaceOrderCommand(customer_id=\"\
    C1\", items=[...]))\n    assert fake_inventory.stock[\"SKU-1\"] == 9  # Reserved\n    assert fake_repo.find_by_id(order.id)\
    \ is not None  # Saved\n\n# 3. Adapter integration test — one real dependency\ndef test_postgres_order_repo_saves_and_loads(pg_session):\n\
    \    repo = PostgresOrderRepo(pg_session)\n    order = Order.create(\"C1\", [...])\n    repo.save(order)\n    loaded =\
    \ repo.find_by_id(order.id)\n    assert loaded.customer_id == \"C1\"\n", example_bad: "# All tests require full infrastructure\
    \ stack\n@pytest.fixture(scope=\"session\")\ndef app():\n    # Spins up PostgreSQL, Redis, Stripe mock, Kafka, S3 — 45\
    \ seconds\n    return create_full_app()\n\ndef test_order_creation(app, http_client):\n    # Tests business logic through\
    \ HTTP → coupled to transport\n    response = http_client.post(\"/orders\", json={...})\n    assert response.status_code\
    \ == 201\n    # Flaky: depends on Stripe mock, Redis connection, DB state\n    # Slow: 2 seconds per test (HTTP + DB round-trip)\n\
    \    # 500 such tests = 16 minutes CI pipeline just for order tests\n", sources: ['https://alistair.cockburn.us/hexagonal-architecture/',
    'https://martinfowler.com/bliki/TestPyramid.html'], when_applies: When writing tests for applications built with hexagonal
    or ports-and-adapters architecture}
- {id: CR-ARCH-CLN-001, text: 'Clean Architecture — Organize code in concentric layers where dependencies point inward. Entities
    at the center, use cases orchestrate them, interface adapters translate, and frameworks/drivers at the outer edge.', why: 'Clean
    Architecture makes the domain the most stable, most tested part of the system. Frameworks change (Django to FastAPI, SQLAlchemy
    to Tortoise) — the domain should not. The ''screaming architecture'' principle means the folder structure reveals the
    domain: src/orders/, src/payments/, src/inventory/ — not src/controllers/, src/models/, src/services/. When you look at
    the project structure, you should see a healthcare system or an e-commerce platform, not a web framework.', how_to_do_right: '1.
    Entities (innermost): business objects with business rules. No framework imports.

    2. Use Cases: orchestrate entities to fulfill application requirements. One use case per user action.

    3. Interface Adapters: controllers, presenters, gateways. Translate between use cases and external formats.

    4. Frameworks/Drivers (outermost): web framework, database driver, message broker. Replaceable.

    5. Dependency Rule: source code dependencies ONLY point inward. Inner layers know nothing about outer layers.

    6. Screaming architecture: organize by domain (orders/, payments/) not by technical role (models/, views/).

    ', severity: critical, technologies: {lang: [python, java, typescript, go]}, domains: {domain: [architecture], concern: [
      design, maintainability]}, example_good: "# Screaming architecture — folder structure reveals the domain\nsrc/\n  orders/\n\
    \    domain/\n      order.py              # Entity — pure business rules\n      order_item.py         # Entity\n     \
    \ discount_policy.py    # Domain service\n    use_cases/\n      place_order.py        # Use case\n      cancel_order.py\
    \       # Use case\n    adapters/\n      postgres_repo.py      # Infrastructure\n      rest_controller.py    # Presentation\n\
    \      stripe_payment.py     # Infrastructure\n  inventory/\n    domain/\n      warehouse.py\n      reservation.py\n \
    \   use_cases/\n      reserve_stock.py\n    adapters/\n      redis_cache.py\n      rest_controller.py\n\n# Domain layer\
    \ — ZERO framework imports\n# orders/domain/order.py\nclass Order:\n    def apply_discount(self, policy: DiscountPolicy)\
    \ -> None:\n        \"\"\"Pure business logic. No SQLAlchemy, no Flask, no HTTP.\"\"\"\n        self.total = policy.calculate(self.items)\n",
  example_bad: "# Technical role organization — hides the domain\nsrc/\n  models/           # What domain? Orders? Users?\
    \ Payments? All of them.\n    __init__.py     # 2000-line file with every model\n  views/            # What does this\
    \ application DO?\n    __init__.py     # 3000-line file with every route handler\n  serializers/      # Technical concern,\
    \ not domain\n    __init__.py\n  services/         # Grab bag of business logic\n    __init__.py\n  utils/           \
    \ # Where logic goes to die\n    __init__.py\n\n# Looks like a Django tutorial, not a business system\n# Cannot tell if\
    \ this is e-commerce, healthcare, or banking\n", sources: ['https://blog.cleancoder.com/uncle-bob/2012/08/13/the-clean-architecture.html'],
  when_applies: When organizing code into layers with strict dependency rules pointing inward}
- {id: CR-ARCH-CLN-002, text: 'Clean Architecture Boundary Crossing — Data crosses boundaries as simple data structures (DTOs),
    never as entities or framework objects. Each boundary has explicit input/output types.', why: 'When a SQLAlchemy model
    is returned directly from a use case to a REST controller, the domain is coupled to the ORM. Changing the database schema
    forces changes to the API response. When a FastAPI Request object is passed into a use case, the business logic depends
    on HTTP. Each boundary must have explicit input/output data structures that belong to THAT boundary. This prevents framework
    lock-in and enables independent evolution of each layer.', how_to_do_right: '1. Input DTOs: data structures entering a
    boundary (CreateOrderCommand, PlaceOrderRequest).

    2. Output DTOs: data structures leaving a boundary (OrderResponse, OrderResult).

    3. Mapping: each boundary adapter is responsible for mapping between DTOs and its native types.

    4. Never pass ORM models through use case boundaries.

    5. Never pass HTTP request objects into the domain.

    6. Each DTO validates its own invariants at construction time (Pydantic, dataclass).

    ', severity: high, technologies: {lang: [python, java, typescript]}, domains: {domain: [architecture], concern: [design,
      decoupling]}, example_good: "# Clear boundary types at each layer crossing\n# REST adapter → Use Case\n@dataclass(frozen=True)\n\
    class PlaceOrderCommand:\n    customer_id: str\n    items: list[OrderItemInput]\n    payment_method: str\n\n@dataclass(frozen=True)\n\
    class PlaceOrderResult:\n    order_id: str\n    total: Decimal\n    status: str\n\n# Controller maps HTTP → Command\n\
    @router.post(\"/orders\")\ndef create_order(body: CreateOrderRequest) -> OrderResponse:\n    command = PlaceOrderCommand(\n\
    \        customer_id=body.customer_id,\n        items=[OrderItemInput(sku=i.sku, qty=i.qty) for i in body.items],\n  \
    \      payment_method=body.payment_method,\n    )\n    result: PlaceOrderResult = use_case.execute(command)\n    return\
    \ OrderResponse(id=result.order_id, total=str(result.total))\n", example_bad: "# ORM model leaking through boundaries\n\
    @router.post(\"/orders\")\ndef create_order(body: dict):\n    # SQLAlchemy model created in controller — domain coupled\
    \ to ORM\n    order = OrderModel(customer_id=body[\"customer_id\"])\n    for item in body[\"items\"]:\n        order.items.append(OrderItemModel(sku=item[\"\
    sku\"], qty=item[\"qty\"]))\n    db.session.add(order)\n    db.session.commit()\n    # ORM model returned as API response\
    \ — schema change breaks API\n    return jsonify(order.to_dict())\n    # If database schema changes, API contract breaks\n\
    \    # If ORM is swapped, controller must be rewritten\n", sources: ['https://blog.cleancoder.com/uncle-bob/2012/08/13/the-clean-architecture.html'],
  when_applies: When passing data across architectural layer boundaries in clean architecture}
- {id: CR-ARCH-CQR-001, text: CQRS (Command Query Responsibility Segregation) — Separate the write model (commands that mutate
    state) from the read model (queries that return data). Each side can be optimized independently., why: 'In most systems,
    reads outnumber writes 10:1 or 100:1. A single model optimized for writes (normalized, 3NF) is terrible for reads (JOINs
    across 8 tables for a dashboard). A single model optimized for reads (denormalized) is terrible for writes (update anomalies,
    inconsistency). CQRS splits this: the write side uses a normalized model with strong consistency, the read side uses denormalized
    projections optimized for each query. However, CQRS adds complexity (eventual consistency, projection lag) — do NOT use
    it for simple CRUD.', how_to_do_right: '1. Command side: validate, enforce invariants, persist to write store (PostgreSQL,
    event store).

    2. Query side: read from denormalized projections (materialized views, Elasticsearch, Redis).

    3. Projection updates: domain events from command side trigger projection rebuilds.

    4. Eventual consistency: read side may be seconds behind write side — document this in SLA.

    5. When NOT to use CQRS: simple CRUD, low traffic, no complex queries, small team.

    6. Partial CQRS: separate read/write models in the same database (materialized views).

    ', severity: high, technologies: {lang: [python, java, typescript, go]}, domains: {domain: [architecture, performance],
    concern: [data, scalability]}, example_good: "# Command side — normalized, consistent, handles business rules\nclass PlaceOrderCommandHandler:\n\
    \    def handle(self, cmd: PlaceOrderCommand) -> str:\n        order = Order.create(cmd.customer_id, cmd.items)\n    \
    \    order.validate_credit_limit()\n        self.order_repo.save(order)\n        # Emit domain event for read side\n \
    \       self.event_bus.publish(OrderPlaced(\n            order_id=order.id, customer_id=order.customer_id,\n         \
    \   total=order.total, items=[i.to_dict() for i in order.items],\n        ))\n        return order.id\n\n# Query side\
    \ — denormalized, fast, optimized for specific views\nclass OrderDashboardProjection:\n    \"\"\"Builds denormalized view\
    \ from domain events — no JOINs needed.\"\"\"\n    def on_order_placed(self, event: OrderPlaced):\n        self.read_db.upsert(\"\
    order_dashboard\", {\n            \"order_id\": event.order_id,\n            \"customer_name\": self.customer_cache[event.customer_id],\n\
    \            \"total\": event.total,\n            \"item_count\": len(event.items),\n            \"status\": \"confirmed\"\
    ,\n        })\n\n# Dashboard query — single table read, sub-millisecond\ndef get_dashboard(filters: DashboardFilters)\
    \ -> list[DashboardRow]:\n    return read_db.query(\"order_dashboard\").filter(filters).limit(50).all()\n", example_bad: "#\
    \ Single model for everything — reads kill write performance\ndef get_order_dashboard(db: Session):\n    # 8-table JOIN\
    \ for a dashboard — 2.3 seconds per query\n    return db.execute(\"\"\"\n        SELECT o.id, c.name, c.email, c.tier,\n\
    \               SUM(oi.price * oi.quantity) as total,\n               COUNT(oi.id) as item_count,\n               s.tracking_number,\
    \ s.carrier,\n               p.status as payment_status\n        FROM orders o\n        JOIN customers c ON o.customer_id\
    \ = c.id\n        JOIN order_items oi ON oi.order_id = o.id\n        JOIN shipments s ON s.order_id = o.id\n        JOIN\
    \ payments p ON p.order_id = o.id\n        -- 3 more JOINs for discounts, returns, reviews\n        GROUP BY o.id, c.name,\
    \ c.email, ...\n        ORDER BY o.created_at DESC\n        LIMIT 50\n    \"\"\")\n    # This query locks rows that writers\
    \ need\n    # Writers queue behind readers — write latency spikes\n", sources: ['https://martinfowler.com/bliki/CQRS.html'],
  when_applies: When read and write workloads have significantly different performance or scaling requirements}
- {id: CR-ARCH-EVS-001, text: 'Event Sourcing — Store state as an immutable, append-only sequence of domain events rather
    than overwriting current state. The current state is derived by replaying events.', why: 'With traditional CRUD, when
    you UPDATE an order status from ''pending'' to ''shipped'', the fact that it was ever ''pending'' is lost. With event
    sourcing, every state change is an event: OrderCreated, PaymentReceived, OrderShipped. You can reconstruct state at ANY
    point in time (''what was this order''s state last Tuesday?''). This enables audit trails (who changed what when), temporal
    queries, and debugging production issues by replaying the exact sequence of events. However, event sourcing adds significant
    complexity — use it for domains where the history IS the value (financial transactions, legal records, audit-critical
    systems), not for user preferences or settings.', how_to_do_right: '1. Events are immutable, past-tense facts: OrderPlaced,
    PaymentReceived, ItemShipped.

    2. Never delete or modify events — only append new corrective events (OrderCorrected).

    3. Aggregates load by replaying their event stream from the event store.

    4. Snapshots every N events for performance (avoid replaying 1M events).

    5. Event versioning: when event schema changes, write upcasters to transform old events.

    6. Projections build read models from event streams (CQRS is natural companion).

    7. When NOT to use: simple CRUD, no audit requirements, small team unfamiliar with patterns.

    ', severity: high, technologies: {lang: [python, java, typescript, go]}, domains: {domain: [architecture], concern: [
      data, audit]}, example_good: "# Events — immutable, past-tense facts\n@dataclass(frozen=True)\nclass OrderCreated:\n\
    \    order_id: str\n    customer_id: str\n    items: list[dict]\n    timestamp: datetime\n\n@dataclass(frozen=True)\n\
    class PaymentReceived:\n    order_id: str\n    amount: Decimal\n    transaction_id: str\n    timestamp: datetime\n\n#\
    \ Aggregate — rebuilt from events\nclass Order:\n    def __init__(self, events: list[DomainEvent]):\n        self.status\
    \ = None\n        self.items = []\n        for event in events:\n            self._apply(event)\n\n    def _apply(self,\
    \ event: DomainEvent):\n        if isinstance(event, OrderCreated):\n            self.status = \"created\"\n         \
    \   self.items = event.items\n        elif isinstance(event, PaymentReceived):\n            self.status = \"paid\"\n\n\
    \    # Command — produces new events\n    def ship(self, carrier: str, tracking: str) -> list[DomainEvent]:\n        if\
    \ self.status != \"paid\":\n            raise InvalidStateError(\"Cannot ship unpaid order\")\n        return [OrderShipped(self.id,\
    \ carrier, tracking, datetime.utcnow())]\n\n# Event store — append only\nevent_store.append(order_id, new_events, expected_version=current_version)\n",
  example_bad: "# CRUD approach — history is lost\ndef ship_order(order_id: str, carrier: str, tracking: str):\n    db.execute(\n\
    \        \"UPDATE orders SET status = 'shipped', carrier = %s WHERE id = %s\",\n        (carrier, order_id)\n    )\n \
    \   # Previous status is GONE — was it 'paid'? 'pending'? 'refunded'?\n    # No audit trail — who changed it? when? what\
    \ was it before?\n    # Bug investigation: \"why is this order shipped but never paid?\"\n    # Answer: impossible to\
    \ determine from current state alone\n    # Compliance audit: \"show me all state changes for order X\"\n    # Answer:\
    \ we don't have that data\n", sources: ['https://martinfowler.com/eaaDev/EventSourcing.html'], when_applies: 'When state
    changes need full audit trails, temporal queries, or event replay capability'}
- {id: CR-ARCH-SAG-001, text: Saga Pattern — Manage distributed transactions across multiple services using a sequence of
    local transactions with compensating actions for rollback., why: 'Distributed transactions (2PC) across microservices
    are slow, fragile, and create tight coupling. When CreateOrder, ReserveInventory, and ChargePayment span three services,
    a 2PC coordinator becomes a single point of failure. Sagas replace this with a sequence of local transactions. If step
    3 fails, compensating transactions undo steps 1 and 2 (CancelOrder, ReleaseInventory). Two styles: choreography (services
    react to events, no central coordinator) and orchestration (a saga orchestrator directs the sequence).', how_to_do_right: '1.
    Choreography: each service emits events, next service reacts. Good for simple, few-step sagas.

    2. Orchestration: a saga orchestrator sends commands and handles responses. Good for complex, many-step sagas.

    3. Every step MUST have a compensating transaction (undo action).

    4. Compensating transactions must be idempotent (safe to retry on failure).

    5. Add timeouts: if a step does not complete in T seconds, trigger compensation.

    6. Persist saga state: if the orchestrator crashes, it must resume from last known state.

    7. Use a dead letter queue for steps that fail compensation (human intervention needed).

    ', severity: critical, technologies: {lang: [python, java, typescript, go]}, domains: {domain: [architecture], concern: [
      microservices, distributed_systems]}, example_good: "# Orchestration saga — central coordinator manages the sequence\n\
    class OrderSaga:\n    steps = [\n        SagaStep(\n            action=CreateOrderAction,\n            compensation=CancelOrderAction,\n\
    \        ),\n        SagaStep(\n            action=ReserveInventoryAction,\n            compensation=ReleaseInventoryAction,\n\
    \        ),\n        SagaStep(\n            action=ChargePaymentAction,\n            compensation=RefundPaymentAction,\n\
    \        ),\n    ]\n\nclass SagaOrchestrator:\n    async def execute(self, saga: OrderSaga, context: dict):\n        completed:\
    \ list[SagaStep] = []\n        for step in saga.steps:\n            try:\n                result = await step.action.execute(context)\n\
    \                context.update(result)\n                completed.append(step)\n            except StepFailure as e:\n\
    \                # Compensate in reverse order\n                for done_step in reversed(completed):\n              \
    \      await done_step.compensation.execute(context)\n                raise SagaFailed(f\"Step {step} failed: {e}\") from\
    \ e\n        return SagaCompleted(context)\n", example_bad: "# Distributed transaction without saga — partial failures\
    \ leave inconsistent state\nasync def place_order(data: dict):\n    # Step 1: Create order\n    order = await order_service.create(data)\
    \  # Succeeds\n    # Step 2: Reserve inventory\n    await inventory_service.reserve(order.items)  # Succeeds\n    # Step\
    \ 3: Charge payment\n    await payment_service.charge(order.total)  # FAILS — timeout!\n\n    # Now what?\n    # - Order\
    \ exists in order DB (inconsistent — should be cancelled)\n    # - Inventory is reserved (inconsistent — should be released)\n\
    \    # - Payment was not charged\n    # No compensating transactions defined — manual cleanup required\n    # Customer\
    \ sees \"order confirmed\" but is never charged → free goods\n", sources: ['https://microservices.io/patterns/data/saga.html'],
  when_applies: When coordinating distributed transactions across multiple services without two-phase commit}
- {id: CR-ARCH-DDD-001, text: DDD Aggregates — An aggregate is a cluster of domain objects treated as a single unit for data
    changes. The aggregate root is the only entry point. Transactions do not cross aggregate boundaries., why: 'Without aggregates,
    any object can modify any other object, and there is no clear boundary for transactional consistency. If OrderItem can
    be modified independently of Order, you can add items that exceed the credit limit. The aggregate root (Order) enforces
    all invariants for the cluster. Cross-aggregate transactions (modifying Order and Inventory in one transaction) create
    distributed consistency problems. Instead, use domain events: Order publishes OrderPlaced, Inventory subscribes and reserves
    stock in its own transaction.', how_to_do_right: '1. The aggregate root is the ONLY object accessible from outside the
    aggregate.

    2. External objects reference the aggregate root by ID, not by direct object reference.

    3. All modifications go through the aggregate root, which enforces invariants.

    4. One transaction = one aggregate. Cross-aggregate consistency via eventual consistency (events).

    5. Keep aggregates small: 1-3 entities. Large aggregates = high contention.

    6. Loading: load the ENTIRE aggregate, not individual child entities.

    ', severity: critical, technologies: {lang: [python, java, typescript]}, domains: {domain: [architecture], concern: [
      ddd, data]}, example_good: "# Order is the aggregate root — all modifications go through it\nclass Order:\n    \"\"\"\
    Aggregate root. Enforces all invariants.\"\"\"\n    id: str\n    customer_id: str  # Reference to Customer aggregate by\
    \ ID, not object\n    items: list[OrderItem]  # Internal entity — not accessible from outside\n    _max_total: Decimal\
    \ = Decimal(\"10000\")\n\n    def add_item(self, product_id: str, price: Decimal, qty: int) -> None:\n        \"\"\"Only\
    \ the root modifies the aggregate.\"\"\"\n        item = OrderItem(product_id=product_id, price=price, quantity=qty)\n\
    \        projected_total = self.total + item.line_total\n        if projected_total > self._max_total:\n            raise\
    \ OrderLimitExceeded(f\"Total {projected_total} exceeds {self._max_total}\")\n        self.items.append(item)\n\n    def\
    \ remove_item(self, product_id: str) -> None:\n        self.items = [i for i in self.items if i.product_id != product_id]\n\
    \n    @property\n    def total(self) -> Decimal:\n        return sum(item.line_total for item in self.items)\n\n# Repository\
    \ operates on entire aggregates\nclass OrderRepository(Protocol):\n    def save(self, order: Order) -> None: ...     \
    \     # Saves the whole aggregate\n    def find_by_id(self, order_id: str) -> Order | None: ...  # Loads the whole aggregate\n",
  example_bad: "# No aggregate boundary — any code can modify internals\nclass OrderItem:\n    order_id: str\n    product_id:\
    \ str\n    price: Decimal\n    quantity: int\n\n# External code directly modifies OrderItem — invariant bypassed\ndef\
    \ add_expensive_item(db: Session, order_id: str):\n    # Creates OrderItem without going through Order root\n    item\
    \ = OrderItem(order_id=order_id, product_id=\"LUXURY\", price=99999, quantity=100)\n    db.add(item)  # Bypasses Order.add_item()\
    \ — no limit check!\n    db.commit()\n    # Order total is now $9,999,900 — limit exceeded, no validation\n", sources: [
    'https://martinfowler.com/bliki/BoundedContext.html'], when_applies: When designing domain models with aggregates that
    enforce consistency boundaries}
- {id: CR-ARCH-DDD-002, text: 'DDD Value Objects — Objects defined by their attributes, not their identity. Two value objects
    with the same attributes are equal. Value objects are immutable.', why: 'When Money is represented as a raw float, you
    lose currency information, precision, and the ability to enforce business rules (cannot add USD to EUR). When Address
    is mutable, changing a customer''s address accidentally changes the address on their historical orders. Value objects
    solve both problems: they carry meaning (Money has amount + currency), enforce invariants (no negative amounts), and are
    immutable (sharing is safe). The equality semantics also simplify testing: Money(10, ''USD'') == Money(10, ''USD'') without
    comparing object IDs.', how_to_do_right: '1. Immutable: use frozen=True (Python dataclass) or final fields.

    2. Equality by value: two objects with same attributes are equal.

    3. No identity (no database primary key — embedded in parent entity).

    4. Self-validating: invariants enforced at construction time.

    5. Rich behavior: Money.add(other) returns a NEW Money, does not mutate.

    6. Replace primitive obsession: Money instead of float, EmailAddress instead of str, DateRange instead of tuple[date,
    date].

    ', severity: high, technologies: {lang: [python, java, typescript]}, domains: {domain: [architecture], concern: [ddd,
      design]}, example_good: "@dataclass(frozen=True)  # Immutable\nclass Money:\n    amount: Decimal\n    currency: str\n\
    \n    def __post_init__(self):\n        if self.amount < 0:\n            raise ValueError(\"Money cannot be negative\"\
    )\n        if self.currency not in VALID_CURRENCIES:\n            raise ValueError(f\"Invalid currency: {self.currency}\"\
    )\n\n    def add(self, other: \"Money\") -> \"Money\":\n        if self.currency != other.currency:\n            raise\
    \ CurrencyMismatch(f\"Cannot add {self.currency} to {other.currency}\")\n        return Money(amount=self.amount + other.amount,\
    \ currency=self.currency)\n\n    def multiply(self, factor: int) -> \"Money\":\n        return Money(amount=self.amount\
    \ * factor, currency=self.currency)\n\n# Usage — type-safe, self-validating, immutable\nprice = Money(Decimal(\"29.99\"\
    ), \"USD\")\ntotal = price.multiply(3)  # Returns new Money(89.97, USD)\nassert price.amount == Decimal(\"29.99\")  #\
    \ Original unchanged\n", example_bad: "# Primitive obsession — raw float for money\ndef calculate_order_total(items: list[dict])\
    \ -> float:\n    total = 0.0\n    for item in items:\n        total += item[\"price\"] * item[\"quantity\"]  # What currency?\n\
    \    return total  # 0.1 + 0.2 = 0.30000000000000004 — floating point!\n\n# Mutable \"value\" object — shared references\
    \ cause bugs\nclass Address:\n    def __init__(self, street: str, city: str):\n        self.street = street\n        self.city\
    \ = city\n\naddr = Address(\"123 Main St\", \"NYC\")\norder1.shipping_address = addr\norder2.shipping_address = addr \
    \ # Same object reference!\naddr.city = \"LA\"  # Mutates BOTH orders' addresses!\n", sources: ['https://martinfowler.com/bliki/UbiquitousLanguage.html'],
  when_applies: When modeling domain concepts that are defined by their attributes rather than identity}
- {id: CR-ARCH-DDD-003, text: Domain Events — Immutable records of something that happened in the domain. Named in past tense.
    Used to communicate between aggregates and bounded contexts., why: 'When Order.confirm() directly calls InventoryService.reserve()
    and EmailService.sendConfirmation(), Order is tightly coupled to inventory and email. Adding a new side effect (update
    analytics, notify warehouse) requires modifying Order. Domain events decouple this: Order publishes OrderConfirmed, and
    any number of subscribers react independently. This enables: adding new reactions without modifying the publisher, asynchronous
    processing, audit trails, and event-driven architectures.', how_to_do_right: '1. Past tense naming: OrderPlaced, PaymentReceived,
    InventoryReserved.

    2. Immutable: events are facts about the past — they cannot be changed.

    3. Contain enough data for subscribers to act without calling back to the publisher.

    4. Within a bounded context: in-memory event bus (synchronous or async).

    5. Across bounded contexts: message broker (Kafka, RabbitMQ, Redis Streams).

    6. Idempotent handlers: events may be delivered more than once.

    ', severity: high, technologies: {lang: [python, java, typescript, go]}, domains: {domain: [architecture], concern: [
      ddd, events]}, example_good: "# Domain event — immutable, past tense, self-contained\n@dataclass(frozen=True)\nclass\
    \ OrderPlaced:\n    order_id: str\n    customer_id: str\n    items: list[OrderItemSnapshot]\n    total: Decimal\n    occurred_at:\
    \ datetime\n\n# Aggregate publishes events\nclass Order:\n    def place(self) -> list[DomainEvent]:\n        self.status\
    \ = OrderStatus.PLACED\n        return [OrderPlaced(\n            order_id=self.id,\n            customer_id=self.customer_id,\n\
    \            items=[item.snapshot() for item in self.items],\n            total=self.total,\n            occurred_at=datetime.utcnow(),\n\
    \        )]\n\n# Subscribers react independently — adding new ones does NOT modify Order\nclass InventorySubscriber:\n\
    \    def on_order_placed(self, event: OrderPlaced):\n        for item in event.items:\n            self.inventory.reserve(item.product_id,\
    \ item.quantity)\n\nclass NotificationSubscriber:\n    def on_order_placed(self, event: OrderPlaced):\n        self.email.send(event.customer_id,\
    \ f\"Order {event.order_id} confirmed\")\n\nclass AnalyticsSubscriber:\n    def on_order_placed(self, event: OrderPlaced):\n\
    \        self.metrics.record(\"orders.placed\", amount=event.total)\n", example_bad: "# Direct coupling — Order knows\
    \ about every side effect\nclass Order:\n    def place(self, inventory_svc, email_svc, analytics_svc, warehouse_svc):\n\
    \        self.status = \"placed\"\n        # Direct calls — tightly coupled to 4 services\n        inventory_svc.reserve(self.items)\n\
    \        email_svc.send_confirmation(self.customer_id, self.id)\n        analytics_svc.record_order(self.id, self.total)\n\
    \        warehouse_svc.notify_new_order(self.id)\n        # Adding a 5th side effect = modify Order class\n        # Testing\
    \ Order requires mocking 4 services\n        # If email fails, should the order rollback? Unclear.\n", sources: ['https://martinfowler.com/eaaDev/DomainEvent.html'],
  when_applies: When capturing state changes as explicit domain events for integration or audit purposes}
- {id: CR-ARCH-DDD-004, text: 'Bounded Contexts — Explicit boundaries within which a particular domain model applies. The
    same real-world concept (e.g., ''Product'') has different representations in different contexts.', why: 'In a monolith,
    ''Product'' in the catalog context has name, description, images, SEO tags. ''Product'' in the inventory context has SKU,
    warehouse location, reorder point. ''Product'' in the billing context has price, tax category, discount eligibility. Forcing
    all three into one Product class creates a god object with 50+ fields, 30+ methods, and every team stepping on each other.
    Bounded contexts let each team define Product differently, with explicit translation (anti-corruption layer) at the boundaries.',
  how_to_do_right: '1. One ubiquitous language per bounded context — ''Product'' means different things in Catalog vs Inventory.

    2. Each context has its own models, its own database (ideally), its own team.

    3. Context Map documents relationships: Conformist, Anti-Corruption Layer, Shared Kernel, Open Host.

    4. Anti-Corruption Layer: translates between contexts — prevents one context''s model from polluting another.

    5. Shared Kernel: small, explicitly shared code — both teams must agree on changes.

    6. Communication between contexts via domain events or APIs, never shared database tables.

    ', severity: critical, technologies: {lang: [python, java, typescript, go]}, domains: {domain: [architecture], concern: [
      ddd, microservices]}, example_good: "# Catalog Context — Product has marketing attributes\n# catalog/domain/product.py\n\
    class CatalogProduct:\n    id: str\n    name: str\n    description: str\n    images: list[ImageUrl]\n    seo_tags: list[str]\n\
    \    category: Category\n\n# Inventory Context — Product has logistics attributes\n# inventory/domain/product.py\nclass\
    \ InventoryProduct:\n    sku: str\n    warehouse_id: str\n    quantity_on_hand: int\n    reorder_point: int\n    bin_location:\
    \ str\n\n# Anti-Corruption Layer — translates between contexts\n# inventory/adapters/catalog_acl.py\nclass CatalogAntiCorruptionLayer:\n\
    \    def translate_product(self, catalog_event: ProductCreated) -> InventoryProduct:\n        return InventoryProduct(\n\
    \            sku=catalog_event.sku,\n            warehouse_id=self.default_warehouse,\n            quantity_on_hand=0,\n\
    \            reorder_point=10,\n            bin_location=\"UNASSIGNED\",\n        )\n", example_bad: "# God Product class\
    \ — shared across ALL contexts\nclass Product:\n    # Catalog fields\n    name: str\n    description: str\n    images:\
    \ list[str]\n    seo_tags: list[str]\n    category: str\n    # Inventory fields\n    warehouse_id: str\n    quantity_on_hand:\
    \ int\n    reorder_point: int\n    bin_location: str\n    # Billing fields\n    price: Decimal\n    tax_category: str\n\
    \    discount_eligible: bool\n    # Shipping fields\n    weight: float\n    dimensions: str\n    hazmat_class: str | None\n\
    \    # 30+ more fields from different contexts...\n    # Every team edits this file — constant merge conflicts\n    #\
    \ 50 fields, 30 methods, nobody understands the whole class\n", sources: ['https://martinfowler.com/bliki/AnemicDomainModel.html'],
  when_applies: When defining explicit boundaries between different models of the same concept across subdomains}
- {id: CR-ARCH-EST-001, text: 'Event Storming — A collaborative workshop technique where domain experts and developers discover
    the domain by mapping domain events, commands, policies, and aggregates on a timeline.', why: 'Traditional requirements
    gathering produces documents that developers misinterpret and domain experts never read. Event Storming puts everyone
    in one room with sticky notes, mapping what HAPPENS in the business as a timeline of events. The output is a shared understanding
    of the domain, clear aggregate boundaries, identified policies (automation rules), and discovered bounded contexts. It
    bridges the gap between business knowledge and technical design. Big Picture Event Storming takes 2-4 hours and replaces
    weeks of document writing.', how_to_do_right: '1. Big Picture: domain events (orange sticky notes) placed on timeline
    by domain experts.

    2. Add commands (blue) that cause events: PlaceOrder → OrderPlaced.

    3. Add policies (lilac) that react to events: When OrderPlaced → then ReserveInventory.

    4. Add read models (green) that actors need to make decisions.

    5. Add external systems (pink) that trigger or receive events.

    6. Design Level: identify aggregates, bounded contexts, and their interactions.

    7. Participants: domain experts (mandatory), developers, UX designers, PMs.

    ', severity: medium, technologies: {lang: [general]}, domains: {domain: [architecture], concern: [ddd, requirements]},
  example_good: "# Event Storming output — translated to code architecture\n#\n# Timeline discovered in workshop:\n# CustomerRegistered\
    \ → [Policy: SendWelcomeEmail] → WelcomeEmailSent\n# OrderPlaced → [Policy: ReserveInventory] → InventoryReserved\n# InventoryReserved\
    \ → [Policy: ChargePayment] → PaymentCharged\n# PaymentCharged → [Policy: ShipOrder] → OrderShipped\n#\n# Aggregates identified:\
    \ Customer, Order, Inventory, Payment, Shipment\n# Bounded Contexts: Identity (Customer), Sales (Order), Warehouse (Inventory),\n\
    #                    Billing (Payment), Logistics (Shipment)\n#\n# Policies become saga steps or event handlers:\nclass\
    \ InventoryPolicy:\n    \"\"\"When OrderPlaced, reserve inventory.\"\"\"\n    def on_order_placed(self, event: OrderPlaced):\n\
    \        for item in event.items:\n            self.warehouse.reserve(item.sku, item.quantity)\n        self.publish(InventoryReserved(order_id=event.order_id))\n",
  example_bad: '# Requirements document — nobody reads, easy to misinterpret

    """

    REQ-001: The system shall allow users to place orders.

    REQ-002: The system shall manage inventory levels.

    REQ-003: The system shall process payments.

    REQ-004: The system shall ship orders.

    REQ-005: The system shall send email notifications.

    """

    # Problems:

    # - No clear sequence or causality (what triggers what?)

    # - No policies (WHEN should inventory be reserved?)

    # - No aggregate boundaries (what is the transactional unit?)

    # - No bounded contexts (is "product" in inventory the same as in catalog?)

    # - Developers interpret REQ-003 differently than domain experts intend

    ', sources: ['https://martinfowler.com/bliki/StranglerFigApplication.html'], when_applies: 'When discovering domain events,
    commands, and aggregates through collaborative workshops'}
- {id: CR-ARCH-ADR-001, text: 'Architecture Decision Records (ADRs) — Document every significant architecture decision with
    context, decision, consequences, and status. ADRs are immutable once accepted — supersede, never edit.', why: 'Six months
    after choosing MongoDB over PostgreSQL, a new developer asks ''why MongoDB?'' Without an ADR, the team has forgotten the
    context (schema flexibility for early prototyping, expected denormalized access patterns). The new developer proposes
    migrating to PostgreSQL, wasting weeks on a decision that was already made with good reasons. ADRs capture the WHY at
    the moment of decision when context is fresh. They prevent re-litigating settled decisions and help new team members understand
    the system''s evolution.', how_to_do_right: '1. Title: short, descriptive (ADR-001: Use PostgreSQL for primary data store).

    2. Status: proposed → accepted → deprecated → superseded.

    3. Context: what forces are at play? What problem are we solving?

    4. Decision: what did we decide and WHY?

    5. Consequences: positive AND negative. What tradeoffs did we accept?

    6. Alternatives considered: what else was evaluated and why was it rejected?

    7. Store in version control alongside code (docs/decisions/ or docs/adr/).

    8. Never edit an accepted ADR — create a new one that supersedes it.

    ', severity: high, technologies: {lang: [general]}, domains: {domain: [architecture, quality, governance], concern: [
      documentation]}, example_good: '# docs/decisions/ADR-003-use-event-sourcing-for-orders.md

    # ADR-003: Use Event Sourcing for Order Management

    # Status: Accepted

    # Date: 2026-01-15

    #

    # ## Context

    # Order disputes require full audit trail of every state change.

    # Regulatory compliance (SOX) mandates immutable transaction history.

    # Customer support needs "what was the state at time T?" queries.

    # Current CRUD model loses history on UPDATE.

    #

    # ## Decision

    # Use event sourcing for the Order aggregate. Events stored in

    # PostgreSQL with EventStoreDB as secondary store for subscriptions.

    #

    # ## Consequences

    # + Full audit trail — every state change is an event

    # + Temporal queries — reconstruct state at any point in time

    # + Natural fit with CQRS for read-heavy dashboard

    # - Increased complexity for developers unfamiliar with ES

    # - Eventual consistency for read models (acceptable: <500ms lag)

    # - Event versioning needed for schema evolution

    #

    # ## Alternatives Considered

    # 1. Audit table (trigger-based) — rejected: fragile, misses application-level context

    # 2. Change Data Capture — rejected: captures DB changes, not domain intent

    ', example_bad: '# No ADR — decisions live in Slack messages and lost meeting notes

    # Slack, 2025-06-15:

    # "hey @team let''s use MongoDB for this, any objections?"

    # "sounds good"

    # "ok cool"

    #

    # 6 months later:

    # New developer: "Why are we using MongoDB? This data is clearly relational."

    # Team: "Uh... someone decided that. Not sure why."

    # New developer spends 3 weeks building a PostgreSQL migration proposal.

    # PM: "We evaluated PostgreSQL last June and rejected it because..."

    # PM: "Actually I don''t remember why. Let''s discuss next sprint."

    # Two sprints wasted re-evaluating a settled decision.

    ', sources: ['https://adr.github.io/'], when_applies: When making significant architecture decisions that need to be documented
    and communicated to the team}
- {id: CR-ARCH-API-001, text: 'Backend for Frontend (BFF) Pattern — Create a dedicated backend service for each frontend type
    (web, mobile, IoT) rather than a single general-purpose API.', why: 'A mobile app needs compact payloads (limited bandwidth),
    aggregated data (reduce round-trips), and push-friendly formats. A web dashboard needs rich payloads with full detail,
    pagination, and sorting. A single API serving both forces compromises: either the mobile app downloads unnecessary data,
    or the web app makes too many calls. The BFF pattern gives each frontend exactly the API it needs, enabling independent
    evolution. When the mobile team needs a new endpoint, they do not block or break the web team.', how_to_do_right: '1.
    One BFF per frontend type: web-bff, mobile-bff, partner-bff.

    2. BFF aggregates calls to downstream microservices and returns optimized payloads.

    3. BFF is owned by the frontend team (they know their data needs best).

    4. Downstream services expose general-purpose APIs; BFFs compose them.

    5. Authentication/authorization at the BFF, not in downstream services.

    6. BFFs should be thin — composition and transformation, not business logic.

    ', severity: medium, technologies: {lang: [python, typescript, go, java]}, domains: {domain: [architecture, api], concern: [
      frontend]}, example_good: "# Mobile BFF — compact, aggregated responses\n# mobile-bff/routes/order_summary.py\n@router.get(\"\
    /orders/{order_id}/summary\")\nasync def order_summary(order_id: str):\n    # Aggregates 3 service calls into 1 compact\
    \ response\n    order, payment, shipment = await asyncio.gather(\n        order_service.get(order_id),\n        payment_service.get_by_order(order_id),\n\
    \        shipment_service.get_by_order(order_id),\n    )\n    return {\n        \"id\": order[\"id\"],\n        \"total\"\
    : order[\"total\"],\n        \"status\": _mobile_status(order, payment, shipment),\n        \"eta\": shipment.get(\"eta\"\
    ),  # Mobile needs this prominently\n    }\n\n# Web BFF — rich, detailed responses\n# web-bff/routes/order_detail.py\n\
    @router.get(\"/orders/{order_id}\")\nasync def order_detail(order_id: str):\n    # Web needs full detail including item\
    \ breakdown\n    return {\n        \"order\": await order_service.get_full(order_id),\n        \"payment\": await payment_service.get_full(order_id),\n\
    \        \"shipment\": await shipment_service.get_full(order_id),\n        \"timeline\": await audit_service.get_timeline(order_id),\n\
    \    }\n", example_bad: "# Single API for all clients — forced compromises\n@router.get(\"/orders/{order_id}\")\nasync\
    \ def get_order(order_id: str, detail_level: str = \"full\"):\n    order = await order_service.get(order_id)\n    if detail_level\
    \ == \"full\":\n        # Web needs this\n        order[\"items\"] = await get_items(order_id)\n        order[\"payment\"\
    ] = await get_payment(order_id)\n        order[\"timeline\"] = await get_timeline(order_id)\n    elif detail_level ==\
    \ \"summary\":\n        # Mobile needs this\n        order = {\"id\": order[\"id\"], \"total\": order[\"total\"]}\n  \
    \  elif detail_level == \"partner\":\n        # Partner API needs this\n        order = {\"id\": order[\"id\"], \"status\"\
    : order[\"status\"]}\n    # Growing switch statement — every new client adds a branch\n    # Mobile team blocked by web\
    \ team and vice versa\n    return order\n", sources: ['https://martinfowler.com/articles/richardsonMaturityModel.html'],
  when_applies: When designing backend-for-frontend patterns to serve different client platforms}
- {id: CR-ARCH-REP-001, text: 'Repository Pattern — Encapsulate data access behind a collection-like interface. The domain
    interacts with an in-memory collection abstraction, not database queries.', why: 'When services embed SQL queries directly,
    every test requires a database, every migration forces changes in business logic files, and swapping data sources (PostgreSQL
    to DynamoDB) requires rewriting service code. The repository pattern creates a clean boundary: the domain sees save(),
    find_by_id(), find_by_criteria() — collection semantics. The implementation handles SQL, ORM mapping, caching, and query
    optimization behind the interface. Testing the domain becomes trivial: inject an InMemoryRepository, no database needed.',
  how_to_do_right: '1. Define repository as a Protocol/Interface with collection-like methods.

    2. Methods operate on domain entities, not ORM models or database rows.

    3. The repository is responsible for translating between domain entities and persistence format.

    4. One repository per aggregate root (OrderRepository, not OrderItemRepository).

    5. Keep queries simple: find_by_id(), find_by_criteria(). Complex analytics go to a query service.

    6. Test with InMemoryRepository (list-backed). Integration test with real DB separately.

    ', severity: high, technologies: {lang: [python, java, typescript, go]}, domains: {domain: [architecture], concern: [
      design, persistence]}, example_good: "# Repository interface — collection semantics\nclass OrderRepository(Protocol):\n\
    \    def save(self, order: Order) -> None: ...\n    def find_by_id(self, order_id: str) -> Order | None: ...\n    def\
    \ find_by_customer(self, customer_id: str) -> list[Order]: ...\n\n# PostgreSQL implementation\nclass PostgresOrderRepository:\n\
    \    def save(self, order: Order) -> None:\n        model = OrderModel.from_domain(order)\n        self.session.merge(model)\n\
    \        self.session.commit()\n\n    def find_by_id(self, order_id: str) -> Order | None:\n        model = self.session.get(OrderModel,\
    \ order_id)\n        return model.to_domain() if model else None\n\n# In-memory implementation for tests\nclass InMemoryOrderRepository:\n\
    \    def __init__(self):\n        self.orders: dict[str, Order] = {}\n\n    def save(self, order: Order) -> None:\n  \
    \      self.orders[order.id] = order\n\n    def find_by_id(self, order_id: str) -> Order | None:\n        return self.orders.get(order_id)\n",
  example_bad: "# SQL queries scattered in service layer\nclass OrderService:\n    def get_order(self, order_id: str):\n \
    \       row = self.db.execute(\"SELECT * FROM orders WHERE id = %s\", (order_id,))\n        items = self.db.execute(\"\
    SELECT * FROM order_items WHERE order_id = %s\", (order_id,))\n        # SQL in service code — cannot test without DB\n\
    \        # Cannot swap PostgreSQL for DynamoDB without rewriting this method\n        return {\"order\": row, \"items\"\
    : items}\n\n    def get_customer_orders(self, customer_id: str):\n        return self.db.execute(\n            \"SELECT\
    \ o.*, c.name FROM orders o JOIN customers c ON ...\",\n            (customer_id,)\n        )\n        # Different query\
    \ shape — inconsistent with get_order\n        # ORM coupling and SQL spread across service methods\n", sources: ['https://martinfowler.com/eaaCatalog/repository.html'],
  when_applies: When encapsulating data access logic behind a collection-like interface for the domain layer}
- {id: CR-ARCH-SPC-001, text: 'Specification Pattern — Encapsulate business rules as composable, reusable, testable objects.
    Combine specifications with AND, OR, NOT operators to build complex criteria from simple ones.', why: 'Business rules
    like ''eligible for free shipping'' or ''premium customer'' are scattered across if-else chains in multiple service methods.
    When the rule changes, you must find and update every location. The specification pattern extracts each rule into a named,
    testable object. Specifications compose: PremiumCustomer AND OrderAbove(100) AND DomesticShipping. Each specification
    is tested independently. The composed rule reads like a business sentence. When ''premium customer'' criteria change,
    one specification is updated, and all compositions reflect the change.', how_to_do_right: '1. Each specification encapsulates
    ONE business rule with a single is_satisfied_by() method.

    2. Compose with AND (both must be true), OR (either), NOT (negation).

    3. Specifications are testable in isolation — no dependencies on databases or services.

    4. Use for: validation rules, filtering criteria, eligibility checks, authorization policies.

    5. Name specifications after business concepts: IsEligibleForDiscount, HasValidShippingAddress.

    6. Repository integration: specifications translate to WHERE clauses for efficient querying.

    ', severity: medium, technologies: {lang: [python, java, typescript]}, domains: {domain: [architecture], concern: [ddd,
      design]}, example_good: "# Composable specifications\nclass Specification(Protocol[T]):\n    def is_satisfied_by(self,\
    \ candidate: T) -> bool: ...\n\nclass And(Specification[T]):\n    def __init__(self, *specs: Specification[T]):\n    \
    \    self.specs = specs\n    def is_satisfied_by(self, candidate: T) -> bool:\n        return all(s.is_satisfied_by(candidate)\
    \ for s in self.specs)\n\nclass Or(Specification[T]):\n    def __init__(self, *specs: Specification[T]):\n        self.specs\
    \ = specs\n    def is_satisfied_by(self, candidate: T) -> bool:\n        return any(s.is_satisfied_by(candidate) for s\
    \ in self.specs)\n\n# Business rule specifications\nclass IsPremiumCustomer(Specification[Customer]):\n    def is_satisfied_by(self,\
    \ customer: Customer) -> bool:\n        return customer.tier == \"premium\"\n\nclass HasMinimumOrderValue(Specification[Order]):\n\
    \    def __init__(self, minimum: Decimal):\n        self.minimum = minimum\n    def is_satisfied_by(self, order: Order)\
    \ -> bool:\n        return order.total >= self.minimum\n\n# Composition reads like a business sentence\nfree_shipping_eligible\
    \ = And(\n    IsPremiumCustomer(),\n    HasMinimumOrderValue(Decimal(\"50\")),\n    IsDomesticShipping(),\n)\n\nif free_shipping_eligible.is_satisfied_by(context):\n\
    \    apply_free_shipping(order)\n", example_bad: "# Business rules scattered in if-else chains\ndef calculate_shipping(order,\
    \ customer):\n    if customer.tier == \"premium\" and order.total >= 50 and order.country == \"US\":\n        return Decimal(\"\
    0\")  # Free shipping\n    elif customer.tier == \"premium\" and order.total >= 100:\n        return Decimal(\"0\")  #\
    \ Also free (different rule, same code block)\n    else:\n        return Decimal(\"9.99\")\n\n# Same rule duplicated in\
    \ eligibility check\ndef show_free_shipping_badge(order, customer):\n    if customer.tier == \"premium\" and order.total\
    \ >= 50 and order.country == \"US\":\n        return True  # Duplicated logic — will they stay in sync?\n    return False\n",
  sources: ['https://martinfowler.com/articles/patterns-of-distributed-systems/'], when_applies: 'When encoding complex business
    rules as composable, reusable specification objects'}
- {id: CR-ARCH-MOD-001, text: 'Modular Monolith — Organize a monolith into well-bounded modules with explicit interfaces and
    dependency rules. Each module could become a microservice, but deployment remains as a single unit.', why: 'Microservices
    add operational complexity (networking, deployment, monitoring) that small teams cannot afford. But a traditional monolith
    becomes a big ball of mud where everything depends on everything. The modular monolith provides the best of both worlds:
    clear boundaries and encapsulation (like microservices) with simple deployment and debugging (like a monolith). Shopify
    runs a modular monolith with 300+ engineers. The key constraint: modules communicate only through defined interfaces,
    never by reaching into another module''s internals.', how_to_do_right: '1. Each module has a public API (interface) and
    private internals. Only the API is importable.

    2. Modules own their database tables — no cross-module table access (even in the same DB).

    3. Module dependency rules enforced by lint/build tools (ArchUnit, import-linter, deptry).

    4. Communication between modules via method calls on public APIs or in-process events.

    5. Each module can be extracted to a microservice later if needed (clean boundary = easy extraction).

    6. Module structure mirrors bounded contexts — one module per domain concept.

    ', severity: high, technologies: {lang: [python, java, typescript]}, domains: {domain: [architecture], concern: [design,
      pragmatism]}, example_good: "# Modular monolith — clear boundaries, single deployment\nsrc/\n  orders/\n    __init__.py\
    \        # Public API — ONLY these are importable\n    api.py             # OrderService (public interface)\n    _models.py\
    \         # Private — order entities\n    _repository.py     # Private — data access\n    _events.py         # Private\
    \ — domain events\n  inventory/\n    __init__.py        # Public API\n    api.py             # InventoryService (public\
    \ interface)\n    _models.py         # Private\n    _repository.py     # Private\n\n# orders/__init__.py — explicit public\
    \ API\nfrom orders.api import OrderService, PlaceOrderCommand, OrderResult\n__all__ = [\"OrderService\", \"PlaceOrderCommand\"\
    , \"OrderResult\"]\n\n# Lint rule (import-linter): orders can only import inventory's public API\n# [importlinter:contract:orders-inventory]\n\
    # type = forbidden\n# source_modules = orders\n# forbidden_modules = inventory._models, inventory._repository\n\n# Orders\
    \ calls Inventory through its public API\nclass OrderService:\n    def place_order(self, cmd: PlaceOrderCommand) -> OrderResult:\n\
    \        self.inventory_api.reserve(cmd.items)  # Public method call\n", example_bad: "# Big ball of mud — no module boundaries\n\
    src/\n  models.py          # ALL models from ALL domains in one file (2000 lines)\n  services.py        # ALL services\
    \ in one file (3000 lines)\n  utils.py           # Grab bag of functions from every domain\n\n# Any code can import any\
    \ model, access any table, call any function\nfrom models import Order, Product, Customer, Invoice, Shipment, Payment\n\
    # Order service directly accesses inventory tables\ndef place_order(data):\n    db.execute(\"UPDATE inventory SET stock\
    \ = stock - 1 WHERE product_id = %s\", ...)\n    # Order module reaches into Inventory's tables — no boundary\n    # Extracting\
    \ to microservice later: impossible without rewriting\n", sources: ['https://martinfowler.com/bliki/BoundedContext.html'],
  when_applies: When structuring a monolith with clear module boundaries before extracting microservices}
- {id: CR-ARCH-MKR-001, text: Plugin Architecture (Microkernel) — A minimal core system with functionality extended through
    plugins that implement well-defined extension points. New features are added without modifying the core., why: 'When every
    new feature requires modifying core files, the risk of regression is proportional to feature velocity. A plugin architecture
    keeps the core stable: new features are self-contained plugins that hook into extension points. VSCode, WordPress, Eclipse,
    and webpack all use this pattern. The core defines WHAT can be extended (extension points), and plugins define HOW. Adding
    a new payment method, export format, or notification channel is a new plugin — zero changes to the core. This is the Open-Closed
    Principle at the architecture level.', how_to_do_right: '1. Define extension points: named hooks where plugins can register
    behavior.

    2. Plugin contract: interface/protocol that all plugins must implement.

    3. Plugin discovery: auto-discover plugins via entry points, directory scanning, or configuration.

    4. Plugin isolation: a crashing plugin does not crash the core (try/except around plugin calls).

    5. Plugin lifecycle: load, initialize, execute, teardown — managed by the core.

    6. Core stability: once extension points are defined, they rarely change (backward compatible).

    ', severity: medium, technologies: {lang: [python, java, typescript]}, domains: {domain: [architecture], concern: [extensibility,
      design]}, example_good: "# Core defines extension points\nclass ExportPlugin(Protocol):\n    name: str\n    def export(self,\
    \ data: list[dict], output: IO) -> None: ...\n\nclass PluginRegistry:\n    _plugins: dict[str, ExportPlugin] = {}\n\n\
    \    @classmethod\n    def register(cls, plugin: ExportPlugin):\n        cls._plugins[plugin.name] = plugin\n\n    @classmethod\n\
    \    def get(cls, name: str) -> ExportPlugin:\n        return cls._plugins[name]\n\n    @classmethod\n    def list_plugins(cls)\
    \ -> list[str]:\n        return list(cls._plugins.keys())\n\n# Plugin: CSV export (separate file, zero core changes)\n\
    class CsvExportPlugin:\n    name = \"csv\"\n    def export(self, data: list[dict], output: IO) -> None:\n        writer\
    \ = csv.DictWriter(output, fieldnames=data[0].keys())\n        writer.writeheader()\n        writer.writerows(data)\n\n\
    PluginRegistry.register(CsvExportPlugin())\n\n# Plugin: PDF export (another file, zero core changes)\nclass PdfExportPlugin:\n\
    \    name = \"pdf\"\n    def export(self, data: list[dict], output: IO) -> None:\n        pdf = FPDF()\n        # ...\
    \ render data as PDF\n        pdf.output(output)\n\nPluginRegistry.register(PdfExportPlugin())\n\n# Core export function\
    \ — never changes\ndef export_data(format: str, data: list[dict]) -> bytes:\n    plugin = PluginRegistry.get(format)\n\
    \    buffer = BytesIO()\n    plugin.export(data, buffer)\n    return buffer.getvalue()\n", example_bad: "# Every new format\
    \ requires modifying the core export function\ndef export_data(format: str, data: list[dict]) -> bytes:\n    if format\
    \ == \"csv\":\n        # CSV logic here (50 lines)\n        pass\n    elif format == \"json\":\n        # JSON logic here\
    \ (20 lines)\n        pass\n    elif format == \"pdf\":\n        # PDF logic here (100 lines) — added last month, broke\
    \ CSV\n        pass\n    elif format == \"excel\":\n        # Excel logic here — added this week\n        pass\n    else:\n\
    \        raise ValueError(f\"Unknown format: {format}\")\n    # Every new format: modify this function, risk regression\
    \ on all formats\n    # 500-line function that nobody wants to touch\n", sources: ['https://refactoring.guru/design-patterns/abstract-factory'],
  when_applies: When introducing new architecture patterns alongside legacy code using strangler fig migration}
- {id: CR-ARCH-SFC-001, text: 'Branch by Abstraction — Introduce an abstraction layer over legacy code, implement the new
    version behind the abstraction, and switch traffic gradually. The legacy code is removed once the new implementation is
    verified.', why: 'Large-scale refactoring of a live system is risky: you cannot pause feature development for months while
    rewriting a component. Branch by Abstraction lets you refactor incrementally while the system continues to operate. Step
    1: wrap the legacy code behind an interface. Step 2: build the new implementation behind the same interface. Step 3: route
    traffic to the new implementation (feature flag, percentage rollout). Step 4: verify correctness. Step 5: remove the legacy
    code. At no point is the system broken or feature development blocked.', how_to_do_right: '1. Create an abstraction (interface/protocol)
    that wraps the legacy component.

    2. Update all callers to use the abstraction instead of the legacy code directly.

    3. Implement the new version behind the same abstraction.

    4. Feature flag: route 0% → 1% → 10% → 50% → 100% of traffic to the new implementation.

    5. Shadow mode: run both implementations, compare results, log discrepancies.

    6. Remove legacy code only after 100% traffic on new implementation for >1 week.

    ', severity: high, technologies: {lang: [python, java, typescript, go]}, domains: {domain: [architecture, quality, operations],
    concern: [refactoring, migration]}, example_good: "# Step 1: Abstraction over legacy\nclass PricingEngine(Protocol):\n\
    \    def calculate_price(self, product_id: str, customer_id: str) -> Decimal: ...\n\n# Step 2: Legacy implementation (existing\
    \ code, unchanged)\nclass LegacyPricingEngine:\n    def calculate_price(self, product_id: str, customer_id: str) -> Decimal:\n\
    \        # Complex, brittle, 2000 lines of accumulated logic\n        return self._legacy_calculation(product_id, customer_id)\n\
    \n# Step 3: New implementation (clean, tested)\nclass NewPricingEngine:\n    def calculate_price(self, product_id: str,\
    \ customer_id: str) -> Decimal:\n        rules = self.rule_engine.get_rules(product_id)\n        return rules.apply(customer_id)\n\
    \n# Step 4: Feature flag routing\nclass PricingEngineRouter:\n    def calculate_price(self, product_id: str, customer_id:\
    \ str) -> Decimal:\n        if feature_flags.is_enabled(\"new_pricing\", customer_id, rollout=10):\n            new_result\
    \ = self.new_engine.calculate_price(product_id, customer_id)\n            # Shadow mode: compare with legacy\n       \
    \     legacy_result = self.legacy_engine.calculate_price(product_id, customer_id)\n            if new_result != legacy_result:\n\
    \                logger.warning(f\"Pricing mismatch: new={new_result}, legacy={legacy_result}\")\n            return new_result\n\
    \        return self.legacy_engine.calculate_price(product_id, customer_id)\n", example_bad: '# Big-bang refactoring —
    rewrite everything, swap all at once

    # 1. Create new_pricing.py (3 months of development)

    # 2. On Friday at 5 PM: replace ALL imports from old_pricing to new_pricing

    # 3. Deploy to production

    # 4. Monday morning: 15% of prices are wrong

    # 5. Emergency rollback: revert ALL imports back to old_pricing

    # 6. 3 months of work unusable — cannot partially deploy

    # 7. No shadow mode — discrepancies discovered by customers, not engineers

    ', sources: ['https://docs.microsoft.com/en-us/azure/architecture/patterns/bulkhead'], when_applies: When replacing legacy
    components incrementally using branch-by-abstraction}
- {id: CR-ARCH-ANT-001, text: 'Distributed Monolith Anti-Pattern — A system with the complexity of microservices but the coupling
    of a monolith. Services share a database, deploy together, and fail together.', why: 'Teams adopt microservices for independent
    deployability and scalability, but end up with tightly coupled services that share databases, require synchronized deployments,
    and cascade failures. The result is the worst of both worlds: the operational complexity of distributed systems (network
    failures, service discovery, distributed tracing) PLUS the coupling of a monolith (cannot deploy or scale independently).
    A distributed monolith is more expensive and slower to develop than either a well-designed monolith or well-designed microservices.',
  how_to_do_right: '1. Each service owns its data — NO shared database tables.

    2. Services communicate via well-defined APIs or events, not shared memory/DB.

    3. Each service CAN be deployed independently (if yours cannot, you have a distributed monolith).

    4. Each service CAN be scaled independently.

    5. A failure in service A does NOT cascade to service B (circuit breakers, bulkheads).

    6. If you cannot achieve these, stay with a modular monolith — it is simpler and faster.

    ', severity: critical, technologies: {lang: [general]}, domains: {domain: [architecture], concern: [microservices, anti_patterns]},
  example_good: '# Well-designed microservices — independent, decoupled

    # Order Service: owns orders table, PostgreSQL instance

    # Inventory Service: owns inventory table, separate PostgreSQL

    # Communication: domain events via Kafka

    #

    # Order Service publishes OrderPlaced event

    # Inventory Service subscribes and reserves stock

    # If Inventory Service is down, Order Service still accepts orders

    #   (events queue in Kafka, processed when Inventory recovers)

    #

    # Deploy independently:

    #   Order Service: v2.3.1 (deployed Tuesday)

    #   Inventory Service: v1.8.0 (deployed last month)

    #   No coordination required

    ', example_bad: '# Distributed monolith — worst of both worlds

    #

    # "Microservices" that share a database:

    # Order Service → shared_db.orders table

    # Inventory Service → shared_db.orders table (reads order items!)

    # Payment Service → shared_db.orders table (updates payment_status column!)

    #

    # Problems:

    # - Schema change requires all 3 services to update simultaneously

    # - Cannot deploy independently (shared schema = coordinated deploys)

    # - Database is single point of failure for all services

    # - "Microservices" are just remote procedure calls to the same database

    # - 10x more complex than a monolith, with zero benefits

    ', sources: ['https://martinfowler.com/bliki/DesignStaminaHypothesis.html'], when_applies: When reviewing architecture
    for common anti-patterns like big ball of mud or golden hammer}
