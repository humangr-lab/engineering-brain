layer: rules
technology: WebAssembly
domain: frontend
knowledge:
- id: CR-WASM-001
  text: Use WebAssembly only for computation-heavy hot paths — not for general UI logic.
  why: 'WASM has overhead: crossing the JS-WASM boundary costs ~50-100ns per call, data must be serialized/deserialized between
    linear memory and JS objects, and WASM cannot directly access the DOM. For typical UI logic (event handlers, state management,
    rendering), JavaScript is faster because it avoids this overhead.'
  how_to_do_right: 'Profile your application first. Move to WASM only code that is: CPU-bound (image processing, crypto, physics,
    codecs), called in tight loops (thousands of iterations), or requires near-native performance. Keep UI, DOM manipulation,
    and event handling in JavaScript. Batch operations to minimize JS-WASM boundary crossings.'
  severity: high
  technologies:
    lang: [wasm, javascript, rust, c]
  domains:
    domain: [architecture, performance]
    concern: [frontend]
  example_good: "// WASM for heavy computation — image blur filter\n// Rust side (compiled to WASM)\n#[wasm_bindgen]\npub\
    \ fn gaussian_blur(pixels: &mut [u8], width: u32, height: u32, radius: u32) {\n    // Process millions of pixels — perfect\
    \ WASM use case\n    for y in 0..height {\n        for x in 0..width {\n            let idx = ((y * width + x) * 4) as\
    \ usize;\n            pixels[idx] = compute_blur(pixels, x, y, width, height, radius);\n        }\n    }\n}\n\n// JS side\
    \ — DOM and UI stay in JavaScript\nconst canvas = document.getElementById('canvas');\nconst ctx = canvas.getContext('2d');\n\
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);\n\n// One boundary crossing for millions of pixel\
    \ operations\nwasm.gaussian_blur(imageData.data, canvas.width, canvas.height, 5);\nctx.putImageData(imageData, 0, 0);\n"
  example_bad: "// WASM for simple UI logic — SLOWER than JavaScript due to overhead\n#[wasm_bindgen]\npub fn validate_email(email:\
    \ &str) -> bool {\n    // Simple regex — JS does this faster (no boundary crossing cost)\n    email.contains('@') && email.contains('.')\n\
    }\n\n// JS: called on every keystroke — 50ns overhead per call adds up\ninput.addEventListener('input', (e) => {\n   \
    \ const valid = wasm.validate_email(e.target.value); // Unnecessary overhead\n});\n"
  when_applies: Projects using WebAssembly, JavaScript/TypeScript projects, Rust systems with ownership model, or C
  when_not_applies: server-rendered pages, APIs, CLI tools
  sources: ["https://developer.mozilla.org/en-US/docs/WebAssembly/Concepts"]
- id: CR-WASM-002
  text: Minimize JS-WASM boundary crossings — batch data transfers using shared memory.
  why: Each call across the JS-WASM boundary involves copying data between JS heap and WASM linear memory. If you pass one
    pixel at a time for a 1920x1080 image, you make 2 million boundary crossings instead of one. The overhead dominates and
    WASM becomes slower than pure JS.
  how_to_do_right: 'Pass entire buffers (ArrayBuffer, Uint8Array) to WASM, not individual values. Use WASM linear memory directly
    from JS to avoid copies. Batch operations: instead of calling WASM per-item, pass the entire array and process in a loop
    inside WASM. Return results in bulk.'
  severity: high
  technologies:
    lang: [wasm, javascript, rust]
  domains:
    domain: [architecture, performance]
    concern: [frontend]
  example_good: "// Rust — process entire buffer in one call\n#[wasm_bindgen]\npub fn process_batch(data: &[f64]) -> Vec<f64>\
    \ {\n    // One boundary crossing for entire dataset\n    data.iter().map(|x| x.sqrt() * x.ln()).collect()\n}\n\n// JS\
    \ — pass typed array directly (zero-copy with wasm-bindgen)\nconst input = new Float64Array(100_000);\n// ... fill input\
    \ ...\nconst result = wasm.process_batch(input);  // One call, 100K items\n"
  example_bad: "// Rust — process one item at a time\n#[wasm_bindgen]\npub fn process_single(value: f64) -> f64 {\n    value.sqrt()\
    \ * value.ln()\n}\n\n// JS — 100,000 boundary crossings!\nconst results = [];\nfor (let i = 0; i < 100_000; i++) {\n \
    \   results.push(wasm.process_single(data[i]));  // Overhead per call\n}\n"
  when_applies: Projects using WebAssembly, JavaScript/TypeScript projects, or Rust systems with ownership model
  when_not_applies: server-rendered pages, APIs, CLI tools
  sources: ["https://developer.mozilla.org/en-US/docs/WebAssembly/JavaScript_interface/Memory"]
- id: CR-WASM-003
  text: Use streaming compilation to load WASM modules — do not block the main thread.
  why: WASM modules can be megabytes (Emscripten games, ML models). WebAssembly.compile() blocks the main thread until the
    entire module is downloaded and compiled. Streaming compilation (instantiateStreaming) compiles while downloading — the
    module is ready almost immediately after the download finishes.
  how_to_do_right: 'Always use WebAssembly.instantiateStreaming() with a fetch() response. Serve .wasm files with Content-Type:
    application/wasm (required for streaming). Cache compiled modules in IndexedDB for subsequent loads. Use a loading indicator
    — even streaming can take time for large modules.'
  severity: medium
  technologies:
    lang: [wasm, javascript]
  domains:
    domain: [architecture, performance]
    concern: [frontend]
  example_good: "// Streaming compilation — compiles while downloading\nasync function loadWasm() {\n    const { instance,\
    \ module } = await WebAssembly.instantiateStreaming(\n        fetch('/compute.wasm'),\n        importObject,\n    );\n\
    \n    // Cache compiled module for next visit\n    const cache = await caches.open('wasm-cache-v1');\n    cache.put('/compute.wasm',\
    \ new Response(await fetch('/compute.wasm')));\n\n    return instance.exports;\n}\n\n// Server must set correct Content-Type\n\
    // nginx: types { application/wasm wasm; }\n"
  example_bad: '// Blocking compilation — downloads entirely, THEN compiles

    const response = await fetch(''/compute.wasm'');

    const bytes = await response.arrayBuffer();     // Wait for full download

    const module = await WebAssembly.compile(bytes); // Block while compiling

    const instance = await WebAssembly.instantiate(module, importObject);

    // Main thread frozen for seconds on large modules

    '
  when_applies: Projects using WebAssembly or JavaScript/TypeScript projects
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using WebAssembly or JavaScript
  sources: ["https://developer.mozilla.org/en-US/docs/WebAssembly/JavaScript_interface/instantiateStreaming_static"]
- id: CR-WASM-004
  text: Use Rust with wasm-bindgen for production WASM — it produces the smallest binaries with zero runtime overhead.
  why: C/C++ via Emscripten includes a runtime (file system emulation, memory management) that inflates binaries by 100KB+.
    Go includes its garbage collector (~2MB minimum). AssemblyScript lacks mature tooling. Rust compiles to WASM with no runtime,
    no GC, and produces binaries as small as 1KB for simple functions.
  how_to_do_right: 'Use wasm-pack to build Rust WASM packages. Use wasm-bindgen for JS interop (automatic type conversions,
    DOM access via web-sys). Enable wasm-opt in release builds for size optimization. Use #[wasm_bindgen] to export functions.
    Use serde-wasm-bindgen for complex data types.'
  severity: medium
  technologies:
    lang: [rust, wasm]
    library: [wasm-bindgen, wasm-pack]
  domains:
    domain: [architecture, performance]
    concern: [frontend]
  example_good: "// Cargo.toml\n[lib]\ncrate-type = [\"cdylib\"]\n\n[dependencies]\nwasm-bindgen = \"0.2\"\nserde = { version\
    \ = \"1\", features = [\"derive\"] }\nserde-wasm-bindgen = \"0.6\"\n\n[profile.release]\nlto = true           # Link-time\
    \ optimization\nopt-level = \"z\"      # Optimize for size\nstrip = true         # Strip debug info\n\n// lib.rs\nuse\
    \ wasm_bindgen::prelude::*;\nuse serde::{Serialize, Deserialize};\n\n#[derive(Serialize, Deserialize)]\npub struct Point\
    \ { x: f64, y: f64 }\n\n#[wasm_bindgen]\npub fn convex_hull(points_js: JsValue) -> JsValue {\n    let points: Vec<Point>\
    \ = serde_wasm_bindgen::from_value(points_js).unwrap();\n    let hull = compute_hull(&points);\n    serde_wasm_bindgen::to_value(&hull).unwrap()\n\
    }\n\n// Build: wasm-pack build --target web --release\n"
  example_bad: "// Go WASM — 2MB minimum binary size (includes GC runtime)\n// main.go\npackage main\nimport \"syscall/js\"\
    \nfunc add(this js.Value, args []js.Value) interface{} {\n    return args[0].Float() + args[1].Float()\n}\nfunc main()\
    \ {\n    js.Global().Set(\"add\", js.FuncOf(add))\n    select {}  // Block forever — required for Go WASM\n}\n// GOOS=js\
    \ GOARCH=wasm go build -o main.wasm\n// Result: 2.3MB for a function that adds two numbers\n"
  when_applies: Projects using Rust systems with ownership model, WebAssembly, wasm-bindgen, or wasm-pack
  when_not_applies: server-rendered pages, APIs, CLI tools
  sources: ["https://rustwasm.github.io/docs/wasm-bindgen/", "https://rustwasm.github.io/docs/wasm-pack/"]
- id: CR-WASM-005
  text: Use AssemblyScript only for prototyping — not for production WASM where binary size and performance matter.
  why: AssemblyScript looks like TypeScript but is NOT TypeScript — it has different semantics (no union types, no closures
    over GC objects, strict null checks behave differently). Developers assume TS knowledge transfers 1:1 and get bitten by
    subtle bugs. Binaries are larger than Rust and performance is 2-5x slower for complex algorithms.
  how_to_do_right: Use AssemblyScript for quick WASM experiments and learning. For production, migrate hot paths to Rust (wasm-bindgen)
    or C (Emscripten). If staying with AssemblyScript, test extensively — AS type system is more restrictive than TS. Use
    as-bind for ergonomic JS interop.
  severity: medium
  technologies:
    lang: [wasm, typescript]
    library: [assemblyscript]
  domains:
    domain: [architecture, performance]
    concern: [frontend]
  example_good: "// AssemblyScript — quick prototype to validate WASM approach\n// assembly/index.ts\nexport function fibonacci(n:\
    \ i32): i64 {\n    if (n <= 1) return n as i64;\n    let a: i64 = 0, b: i64 = 1;\n    for (let i: i32 = 2; i <= n; i++)\
    \ {\n        const temp = a + b;\n        a = b;\n        b = temp;\n    }\n    return b;\n}\n\n// For production: rewrite\
    \ in Rust\n// #[wasm_bindgen]\n// pub fn fibonacci(n: u32) -> u64 { ... }\n// Rust binary: 200 bytes. AS binary: 2KB.\
    \ Same function.\n"
  example_bad: "// Treating AssemblyScript as TypeScript — subtle bugs\n// This TypeScript is valid but FAILS in AssemblyScript:\n\
    export function process(input: string | null): string {\n    // AS error: Union types are not supported\n    return input\
    \ ?? \"default\";\n    // AS: Nullish coalescing works differently\n}\n\n// AS: Closures over managed objects are restricted\n\
    const items: string[] = [\"a\", \"b\"];\nconst mapped = items.map((item) => item.toUpperCase());\n// May not work as expected\
    \ — AS GC handles closures differently\n"
  when_applies: Projects using AssemblyScript, WebAssembly, or TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools
  sources: ["https://www.assemblyscript.org/introduction.html"]
- id: CR-WASM-006
  text: Use WASI for server-side WASM — it provides a secure, portable runtime with capability-based sandboxing.
  why: 'Running untrusted code on servers is dangerous. Containers share the host kernel and have a large attack surface.
    WASI provides a capability-based security model: a WASM module can ONLY access resources explicitly granted to it (specific
    directories, environment variables, network). No capabilities granted = complete sandbox.'
  how_to_do_right: Compile to wasm32-wasi target. Use Wasmtime (mature, standards-compliant) or WasmEdge (optimized for edge/cloud).
    Grant only necessary capabilities (--dir for file access, --env for env vars). Use WASI for plugin systems, multi-tenant
    compute, and edge functions. Test with the same WASM binary across different hosts.
  severity: medium
  technologies:
    lang: [wasm]
    library: [wasi, wasmtime, wasmedge]
  domains:
    domain: [architecture, security, infrastructure]
    concern: [backend]
  example_good: "// Rust → WASI\n// Compile: cargo build --target wasm32-wasip1 --release\n\nuse std::fs;\n\nfn main() {\n\
    \    // Can only read files if the host grants --dir permission\n    let data = fs::read_to_string(\"/data/config.json\"\
    ).unwrap();\n    println!(\"Config: {}\", data);\n}\n\n# Run with explicit capabilities — principle of least privilege\n\
    # Only /data is accessible, not /etc, not /home, not anything else\nwasmtime run \\\n    --dir /data::/app/data \\\n \
    \   --env APP_MODE=production \\\n    --mapdir /output::/tmp/results \\\n    target/wasm32-wasip1/release/processor.wasm\n\
    \n# No --dir flag = no file system access at all (pure sandbox)\nwasmtime run processor.wasm\n"
  example_bad: '# Running untrusted code in a container — full kernel access

    docker run --rm untrusted-plugin:latest

    # Container can: access host network, read /proc, exploit kernel CVEs

    # WASI alternative: zero kernel access, only granted capabilities

    '
  when_applies: Projects using WebAssembly, WASI, Wasmtime, or WasmEdge
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities
  sources: ["https://wasi.dev/", "https://wasmtime.dev/"]
- id: CR-WASM-007
  text: Use WASM for edge computing to run the same binary on any edge provider — true write-once-run-anywhere.
  why: Edge functions on Cloudflare Workers, Fastly Compute, and Vercel Edge use different JavaScript runtimes with different
    APIs. WASM provides a single binary that runs identically everywhere — no runtime differences, no provider-specific code.
    Cold start times are sub-millisecond (vs 5-50ms for JS isolates).
  how_to_do_right: Compile your compute logic to WASM (Rust is ideal for small binaries). Use the WASI standard for I/O. Deploy
    the same .wasm binary to Cloudflare Workers, Fastly Compute, or Fermyon Spin. Keep provider-specific glue (HTTP handling)
    minimal and outside the WASM module. Test locally with Wasmtime before deploying.
  severity: medium
  technologies:
    lang: [wasm]
    library: [wasi, cloudflare workers, fastly compute]
  domains:
    domain: [architecture, infrastructure]
    concern: [frontend, backend]
  example_good: "// Rust edge function — same binary runs on any WASI-compatible edge\n// Uses spin-sdk but core logic is\
    \ provider-agnostic\nuse spin_sdk::http::{Request, Response};\nuse spin_sdk::http_component;\n\n#[http_component]\nfn\
    \ handle_request(req: Request) -> Response {\n    // Core logic — portable, no provider-specific APIs\n    let result\
    \ = process_request(req.body().unwrap_or_default());\n\n    Response::builder()\n        .status(200)\n        .header(\"\
    Content-Type\", \"application/json\")\n        .body(result)\n        .build()\n}\n\nfn process_request(body: &[u8]) ->\
    \ Vec<u8> {\n    // Pure computation — runs identically everywhere\n    let input: InputData = serde_json::from_slice(body).unwrap();\n\
    \    let output = transform(input);\n    serde_json::to_vec(&output).unwrap()\n}\n"
  example_bad: '// Provider-locked JavaScript — different on each edge platform

    // Cloudflare Workers:

    export default { fetch(request, env) { /* Cloudflare-specific API */ } }

    // Vercel Edge:

    export default function handler(request) { /* Different API */ }

    // Fastly Compute:

    addEventListener("fetch", (event) => { /* Yet another API */ })

    // Rewriting for each provider — maintenance nightmare

    '
  when_applies: Projects using WebAssembly, WASI, Cloudflare Workers, or Fastly Compute
  when_not_applies: server-rendered pages, APIs, CLI tools
  sources: ["https://webassembly.org/getting-started/developers-guide/"]
- id: CR-WASM-008
  text: Use a hybrid JS + WASM architecture — WASM for hot paths, JavaScript for everything else.
  why: 'Going all-in on WASM is counterproductive: you lose access to the rich JS ecosystem, DOM APIs, and developer tooling.
    WASM excels at computation but cannot access the network, DOM, or browser APIs directly. The hybrid approach gives you
    the best of both: JS for ergonomics, WASM for performance.'
  how_to_do_right: Profile your application to identify CPU-bound bottlenecks. Move only those bottlenecks to WASM. Keep UI
    rendering, state management, network requests, and event handling in JavaScript. Use web workers + WASM for parallel computation
    without blocking the UI thread. Lazy-load WASM modules — not every page needs them.
  severity: high
  technologies:
    lang: [wasm, javascript, rust]
    framework: [frontend, react]
  domains:
    domain: [architecture, performance]
    concern: [frontend]
  example_good: "// Hybrid architecture — React UI + WASM computation\n// React component (JavaScript)\nfunction ImageEditor()\
    \ {\n    const [image, setImage] = useState(null);\n    const wasmRef = useRef(null);\n\n    useEffect(() => {\n     \
    \   // Lazy-load WASM only when needed\n        import('./wasm/image_processor').then(mod => {\n            wasmRef.current\
    \ = mod;\n        });\n    }, []);\n\n    const applyFilter = useCallback(async (filter) => {\n        if (!wasmRef.current\
    \ || !image) return;\n        // Move heavy computation off main thread\n        const worker = new Worker('/workers/image-worker.js');\n\
    \        worker.postMessage({ image: image.data, filter });\n        worker.onmessage = (e) => setImage(e.data.result);\n\
    \    }, [image]);\n\n    // UI stays in React — clean, maintainable\n    return <Canvas image={image} onFilter={applyFilter}\
    \ />;\n}\n\n// Web Worker (image-worker.js)\nimportScripts('/wasm/image_processor.js');\nonmessage = async (e) => {\n\
    \    const wasm = await initWasm();\n    const result = wasm.apply_filter(e.data.image, e.data.filter);\n    postMessage({\
    \ result });\n};\n"
  example_bad: "// Everything in WASM — fighting the platform\n// Trying to do DOM manipulation from WASM\n#[wasm_bindgen]\n\
    pub fn render_ui() {\n    let document = web_sys::window().unwrap().document().unwrap();\n    let div = document.create_element(\"\
    div\").unwrap();\n    div.set_inner_html(\"<p>Hello</p>\");  // Painful API for simple UI\n    // 50 lines of Rust for\
    \ what React does in 3 lines of JSX\n}\n"
  when_applies: Projects using WebAssembly, JavaScript/TypeScript projects, Rust systems with ownership model, or React component-based
    UIs
  when_not_applies: server-rendered pages, APIs, CLI tools
  sources: ["https://webassembly.org/getting-started/developers-guide/", "https://developer.mozilla.org/en-US/docs/WebAssembly/Concepts"]
- id: CR-WASM-009
  text: WASM uses linear memory — you must manage memory explicitly when sharing data with JavaScript.
  why: WASM has a flat, contiguous memory buffer (linear memory) with no garbage collector. When you allocate memory in WASM
    and return a pointer to JS, JS must know the offset and length to read the data. If WASM frees or reallocates that memory
    while JS holds a reference, you get use-after-free — corrupted data or crashes.
  how_to_do_right: Use wasm-bindgen (Rust) or Emscripten helpers to handle memory automatically. If using raw WASM, export
    alloc/dealloc functions. Never hold WASM memory references across async boundaries (the buffer may be detached if memory
    grows). Copy data to JS-owned ArrayBuffer immediately after reading from WASM memory.
  severity: critical
  technologies:
    lang: [wasm, javascript, rust, c]
  domains:
    domain: [architecture, performance, security]
    concern: [frontend]
  example_good: "// Rust with wasm-bindgen — memory managed automatically\nuse wasm_bindgen::prelude::*;\n\n#[wasm_bindgen]\n\
    pub fn encrypt(data: &[u8], key: &[u8]) -> Vec<u8> {\n    // wasm-bindgen handles:\n    // 1. Copying JS Uint8Array into\
    \ WASM linear memory\n    // 2. Running the function\n    // 3. Copying the Vec<u8> result back to a JS Uint8Array\n \
    \   // 4. Freeing the WASM-side allocation\n    let mut output = data.to_vec();\n    for (i, byte) in output.iter_mut().enumerate()\
    \ {\n        *byte ^= key[i % key.len()];\n    }\n    output\n}\n\n// JS side — clean, no manual memory management\nconst\
    \ encrypted = wasm.encrypt(plaintext, key);  // Returns Uint8Array\n"
  example_bad: "// Raw WASM — manual memory management, easy to leak or corrupt\n// C side\nuint8_t* process(uint8_t* input,\
    \ int len) {\n    uint8_t* output = malloc(len);  // Who frees this?\n    // ... process ...\n    return output;  // Returning\
    \ pointer — JS must free it\n}\n\n// JS side\nconst ptr = wasm.exports.process(inputPtr, inputLen);\nconst result = new\
    \ Uint8Array(wasm.exports.memory.buffer, ptr, len);\n// BUG: If wasm.exports.memory.buffer grows (via memory.grow()),\n\
    // the ArrayBuffer is DETACHED and `result` points to freed memory!\n// Must copy immediately: const safe = new Uint8Array(result);\n\
    // Must free: wasm.exports.free(ptr);  // Often forgotten → memory leak\n"
  when_applies: Any project using WebAssembly, JavaScript/TypeScript projects, Rust systems with ownership model, or C
  when_not_applies: server-rendered pages, APIs, CLI tools
  sources: ["https://developer.mozilla.org/en-US/docs/WebAssembly/JavaScript_interface/Memory"]
- id: CR-WASM-010
  text: Use Web Workers with WASM for parallel computation — never block the main thread with heavy WASM calls.
  why: WASM runs synchronously on the calling thread. A 500ms image processing call on the main thread freezes the entire
    UI — no scrolling, no clicks, no animations. Web Workers run on separate threads, keeping the UI responsive even during
    heavy computation.
  how_to_do_right: Instantiate WASM modules inside Web Workers. Use postMessage to send data to workers and receive results.
    Use SharedArrayBuffer (when available) for zero-copy data sharing between main thread and workers. Use a worker pool for
    multiple concurrent computations. Transfer ArrayBuffers (transferable objects) instead of copying.
  severity: high
  technologies:
    lang: [wasm, javascript]
    library: [web workers]
  domains:
    domain: [architecture, performance]
    concern: [frontend]
  example_good: "// Main thread — stays responsive\nclass WasmWorkerPool {\n    constructor(workerCount = navigator.hardwareConcurrency)\
    \ {\n        this.workers = Array.from({ length: workerCount }, () =>\n            new Worker('/workers/compute-worker.js')\n\
    \        );\n        this.taskQueue = [];\n        this.available = [...this.workers];\n    }\n\n    async compute(data)\
    \ {\n        const worker = this.available.pop() ?? await this.waitForWorker();\n        return new Promise((resolve)\
    \ => {\n            worker.onmessage = (e) => {\n                this.available.push(worker);\n                resolve(e.data.result);\n\
    \            };\n            // Transfer the buffer — zero-copy\n            worker.postMessage({ data: data.buffer },\
    \ [data.buffer]);\n        });\n    }\n}\n\n// compute-worker.js\nlet wasm;\n(async () => { wasm = await initWasm(); })();\n\
    \nonmessage = (e) => {\n    const input = new Float64Array(e.data.data);\n    const result = wasm.heavy_computation(input);\n\
    \    postMessage({ result: result.buffer }, [result.buffer]);  // Transfer back\n};\n"
  example_bad: '// WASM on main thread — UI freezes during computation

    const result = wasm.process_video_frame(frameData);  // 50ms — missed frame!

    // User sees: janky video, unresponsive buttons, "page unresponsive" dialog

    '
  when_applies: Projects using WebAssembly, JavaScript/TypeScript projects, or Web Workers
  when_not_applies: server-rendered pages, APIs, CLI tools
  sources: ["https://developer.mozilla.org/en-US/docs/Web/API/Web_Workers_API/Using_web_workers"]
