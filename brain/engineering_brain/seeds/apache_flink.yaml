- id: CR-FLINK-010
  text: Use side outputs to handle exceptional events (late data, validation failures, dead letters) without branching the
    main pipeline.
  why: Without side outputs, handling exceptional events requires either dropping them silently (data loss), mixing them into
    the main output (pollutes downstream), or creating separate parallel pipelines (resource duplication). Side outputs allow
    a single operator to emit events to multiple output streams typed by OutputTag, keeping the main pipeline clean while
    capturing exceptions for separate processing. This is the Flink equivalent of Kafka's Dead Letter Topic pattern.
  how_to_do_right: 'Define OutputTag<T> for each exceptional event type. In a ProcessFunction, use ctx.output(tag, event)
    to emit to side outputs. Collect side outputs from the main result using getSideOutput(tag). Route side outputs to separate
    sinks (DLT, error log, retry queue). Use side outputs for: late events, validation failures, events requiring manual review,
    metrics/audit events.'
  severity: medium
  technologies:
    lang: [java]
    platform: [flink]
  domains:
    domain: [architecture, reliability]
    concern: [streaming]
  example_good: "// Define side output tags\nOutputTag<Event> invalidTag = new OutputTag<Event>(\"invalid-events\"){};\nOutputTag<Event>\
    \ auditTag = new OutputTag<Event>(\"audit-events\"){};\n\nSingleOutputStreamOperator<ProcessedEvent> mainStream = events\n\
    \    .keyBy(Event::getUserId)\n    .process(new ProcessFunction<Event, ProcessedEvent>() {\n        @Override\n      \
    \  public void processElement(Event event, Context ctx,\n                                   Collector<ProcessedEvent>\
    \ out) {\n            // Audit trail for all events\n            ctx.output(auditTag, event);\n\n            // Validation\n\
    \            if (!isValid(event)) {\n                ctx.output(invalidTag, event);  // Route to error sink\n        \
    \        return;\n            }\n\n            out.collect(process(event));  // Main output\n        }\n    });\n\n//\
    \ Main stream → primary sink\nmainStream.addSink(primarySink);\n\n// Invalid events → dead letter queue\nmainStream.getSideOutput(invalidTag).addSink(deadLetterSink);\n\
    \n// Audit events → audit log\nmainStream.getSideOutput(auditTag).addSink(auditSink);\n"
  example_bad: '// Filter-based branching — processes every event twice

    DataStream<Event> valid = events.filter(Event::isValid);

    DataStream<Event> invalid = events.filter(e -> !e.isValid());

    // Each event passes through the filter operator TWICE

    // Double the processing, double the network I/O


    // Or: silently drop invalid events

    events.filter(Event::isValid).map(this::process);

    // Invalid events vanish — no trace, no recovery, no alerting

    '
  when_applies: Projects using Apache Flink stream processing or Java/JVM applications
  when_not_applies: batch-only workloads, simple request-response systems. projects not using Flink or Java
  sources: ["https://nightlies.apache.org/flink/flink-docs-stable/docs/dev/datastream/side_output/"]
- id: CR-FLINK-011
  text: Monitor and resolve backpressure at the source — Flink's backpressure propagation is automatic but can cause cascading
    performance issues.
  why: 'When a downstream operator cannot keep up with its input rate (slow sink, expensive computation), Flink automatically
    propagates backpressure upstream through the network buffers. While this prevents data loss, sustained backpressure causes:
    checkpoint barriers to queue behind data records (checkpoints take longer or timeout), watermark propagation to stall
    (windows do not emit), and source lag to grow. The root cause is always the slowest operator, but the symptoms appear
    everywhere.'
  how_to_do_right: 'Use the Flink Web UI''s backpressure monitoring tab to identify the bottleneck operator (the one that
    is NOT backpressured but whose upstream IS backpressured). Common fixes: increase parallelism of the bottleneck operator,
    optimize the slow operation (async I/O for DB lookups, batch writes to sinks), increase sink throughput (more Kafka partitions,
    larger batch size). Enable unaligned checkpoints to decouple checkpoint progress from backpressure.'
  severity: high
  technologies:
    lang: [java]
    platform: [flink]
  domains:
    domain: [architecture, performance, observability]
    concern: [streaming, monitoring]
  example_good: "// Enable unaligned checkpoints to prevent checkpoint timeout during backpressure\nCheckpointConfig config\
    \ = env.getCheckpointConfig();\nconfig.enableUnalignedCheckpoints();\nconfig.setAlignedCheckpointTimeout(Duration.ofSeconds(30));\n\
    \n// Increase parallelism of bottleneck operator only\nDataStream<Result> processed = events\n    .keyBy(Event::getKey)\n\
    \    .process(new ExpensiveProcessor())\n    .setParallelism(32)     // Scale the bottleneck\n    .name(\"Expensive Processor\"\
    );\n\n// Use async I/O to unblock the processing thread\nAsyncDataStream.unorderedWait(\n    events, new AsyncDbLookup(),\
    \ 5, TimeUnit.SECONDS, 200\n);\n\n// Flink metrics to monitor:\n// - isBackPressured (per task, boolean)\n// - buffers.outPoolUsage\
    \ (>0.9 = downstream slow)\n// - buffers.inPoolUsage (>0.9 = this operator slow)\n"
  example_bad: "// Synchronous sink with no batching — creates backpressure\nprocessed.addSink(new SinkFunction<Result>()\
    \ {\n    public void invoke(Result value) {\n        // Synchronous HTTP call per event — 50ms each\n        httpClient.post(\"\
    /api/results\", value);\n    }\n});\n// Sink throughput: 20 events/sec per task\n// If input rate is 1000 events/sec →\
    \ backpressure to source\n// Watermarks stall, checkpoints timeout, consumer lag grows\n"
  when_applies: Projects using Apache Flink stream processing or Java/JVM applications
  when_not_applies: batch-only workloads, simple request-response systems. projects not using Flink or Java
  sources: ["https://nightlies.apache.org/flink/flink-docs-stable/docs/ops/monitoring/back_pressure/"]
- id: CR-FLINK-012
  text: Configure TaskManager memory segments correctly — Flink's memory model has distinct regions that must be sized independently.
  why: 'Flink divides TaskManager memory into: framework heap (Flink internals), task heap (user code), managed memory (RocksDB,
    sorting, caching), network memory (shuffle buffers), and JVM metaspace/overhead. Misconfiguring any region causes either
    OOM (region too small) or waste (region too large). The most common production issue is network buffer exhaustion during
    backpressure (causes ''Insufficient number of network buffers'' error) and managed memory starvation for RocksDB.'
  severity: high
  technologies:
    lang: [java]
    library: [yarn]
    platform: [flink, kubernetes]
  domains:
    domain: [architecture, operations, performance]
    concern: [streaming]
  example_good: '# flink-conf.yaml — production TaskManager memory config

    taskmanager.memory.process.size: 8g           # Total container memory

    taskmanager.memory.framework.heap.size: 256m  # Flink runtime overhead

    taskmanager.memory.task.heap.size: 2g         # User code heap (UDFs, objects)

    taskmanager.memory.managed.fraction: 0.4      # 40% for RocksDB/sort/cache

    taskmanager.memory.network.fraction: 0.1      # 10% for network buffers

    taskmanager.memory.network.min: 256m          # Minimum network buffers

    taskmanager.memory.network.max: 1g            # Maximum network buffers

    taskmanager.memory.jvm-overhead.fraction: 0.1 # 10% for JVM metaspace, thread stacks

    taskmanager.numberOfTaskSlots: 4              # Tasks per TaskManager


    # Key: managed memory fraction determines RocksDB performance

    # Too low → RocksDB spills to disk excessively, slow state access

    # Too high → not enough heap for user code, OOM in UDFs

    '
  example_bad: '# Default config — inadequate for stateful production jobs

    taskmanager.memory.process.size: 1g

    # 1GB total for everything: heap, managed, network, JVM

    # RocksDB state > 500MB → OOM

    # High-parallelism job → network buffer exhaustion


    # All memory to heap, nothing for managed/network

    taskmanager.memory.task.heap.size: 7g

    taskmanager.memory.managed.fraction: 0.0  # No managed memory

    # RocksDB has no cache → every state access reads from disk

    # 100x slower state reads, checkpoint timeouts

    '
  how_to_do_right: 'Start with process.size matching your container allocation. Allocate managed.fraction based on state backend:
    0.4 for RocksDB-heavy jobs, 0.1 for stateless jobs. Set network.fraction to 0.1-0.15 for shuffle-heavy jobs. Reserve task.heap
    for your UDF memory needs. Monitor memory regions in Flink metrics. Increase network.min if you see ''Insufficient number
    of network buffers'' errors.'
  when_applies: Projects using Apache Flink stream processing, Java/JVM applications, Kubernetes-orchestrated deployments,
    or YARN
  when_not_applies: batch-only workloads, simple request-response systems
  sources: ["https://nightlies.apache.org/flink/flink-docs-stable/docs/deployment/memory/mem_setup_tm/"]
