      tools, when_not_applies: "low-traffic internal tools, admin dashboards, or batch jobs where latency is irrelevant. projects\
      \ not using Go", sources: ["https://pkg.go.dev/strings#Builder"]}, {id: "CR-GO-020", text: "Pre-allocate slices with\
      \ make([]T, 0, cap) when the size is known or estimable.", why: "Append without pre-allocation starts at capacity 0\
