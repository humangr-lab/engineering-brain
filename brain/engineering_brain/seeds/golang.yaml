layer: rules
technology: Go
domain: backend
knowledge: [{id: "CR-GO-001", text: Never start a goroutine without knowing how it stops — always wire a cancellation path.,
    why: "Orphaned goroutines leak memory and file descriptors permanently. In long-running servers, this accumulates silently\
      \ until OOM kills the process — often in production at 3 AM.", how_to_do_right: "Pass a context.Context with cancel/timeout\
      \ to every goroutine. Select on ctx.Done() inside the goroutine. The caller owns the lifecycle — defer cancel() after\
      \ creating the context.", severity: critical, technologies: {lang: [go]}, domains: {domain: [architecture, performance],
      concern: [backend, concurrency]}, example_good: "func process(ctx context.Context, ch <-chan Job) error {\n    for {\n\
      \        select {\n        case <-ctx.Done():\n            return ctx.Err()\n        case job, ok := <-ch:\n       \
      \     if !ok {\n                return nil // channel closed\n            }\n            handle(job)\n        }\n  \
      \  }\n}\n\n// Caller controls lifetime\nctx, cancel := context.WithTimeout(context.Background(), 30*time.Second)\ndefer\
      \ cancel()\ngo process(ctx, jobs)\n", example_bad: "// No way to stop this goroutine — it leaks forever\ngo func() {\n\
      \    for job := range ch {\n        handle(job)\n    }\n}()\n// What if ch is never closed? Goroutine leaks.\n", when_applies: Any
      project using Go services and tools, when_not_applies: projects not using Go, sources: ["https://go.dev/blog/pipelines"]},
  {id: "CR-GO-002", text: "Use directional channel types in function signatures — chan<- for send-only, <-chan for receive-only.",
    why: "Bidirectional channels in function signatures hide intent and allow bugs: a consumer that accidentally sends or\
      \ a producer that accidentally receives. The compiler catches these at build time with directional types.", how_to_do_right: "Declare\
      \ channels as bidirectional only where created. Every function that receives a channel should specify direction: <-chan\
      \ T for consumers, chan<- T for producers.", severity: medium, technologies: {lang: [go]}, domains: {domain: [architecture,
        performance], concern: [backend, concurrency]}, example_good: "// Producer can only send\nfunc produce(out chan<-\
      \ int) {\n    for i := 0; i < 10; i++ {\n        out <- i\n    }\n    close(out)\n}\n\n// Consumer can only receive\n\
      func consume(in <-chan int) {\n    for v := range in {\n        fmt.Println(v)\n    }\n}\n\nch := make(chan int, 10)\n\
      go produce(ch)\nconsume(ch)\n", example_bad: "// Bidirectional — consumer could accidentally send\nfunc consume(ch chan\
      \ int) {\n    ch <- 999  // Bug: consumer shouldn't send — compiler won't catch this\n    for v := range ch {\n    \
      \    fmt.Println(v)\n    }\n}\n", when_applies: Projects using Go services and tools, when_not_applies: projects not
      using Go, sources: ["https://go.dev/doc/effective_go#channels"]}, {id: "CR-GO-003", text: "Use buffered channels when\
      \ the number of producers is known; use unbuffered channels for synchronization.", why: "Unbuffered channels block the\
      \ sender until a receiver is ready — this is synchronization, not queueing. Using unbuffered when you need queueing\
      \ causes goroutines to block on send, creating deadlocks or throughput bottlenecks.", how_to_do_right: "Unbuffered (make(chan\
      \ T)): 1:1 handoff, synchronization barriers. Buffered (make(chan T, n)): known producers, fan-out patterns, batch processing.\
      \ Size buffer to expected burst, not to infinity.", severity: medium, technologies: {lang: [go]}, domains: {domain: [
        architecture, performance], concern: [backend, concurrency]}, example_good: "// Buffered: 5 known workers, buffer\
      \ for all results\nresults := make(chan Result, 5)\nfor i := 0; i < 5; i++ {\n    go func(id int) {\n        results\
      \ <- doWork(id)\n    }(i)\n}\n\n// Unbuffered: synchronization — proceed only when received\ndone := make(chan struct{})\n\
      go func() {\n    cleanup()\n    close(done)\n}()\n<-done // blocks until cleanup completes\n", example_bad: "// Unbuffered\
      \ with multiple senders — they block waiting for receiver\nch := make(chan int)\nfor i := 0; i < 100; i++ {\n    go\
      \ func(v int) {\n        ch <- v  // 99 goroutines blocked waiting for single receiver\n    }(i)\n}\n", when_applies: Projects
      using Go services and tools, when_not_applies: projects not using Go, sources: ["https://go.dev/doc/effective_go#channels"]},
  {id: "CR-GO-004", text: Every select statement must include either a default case or a timeout/context cancellation case.,
    why: "A select without default or timeout blocks forever if no channel is ready. In production, this creates goroutine\
      \ leaks that only manifest under specific timing conditions — nearly impossible to reproduce in tests.", how_to_do_right: "For\
      \ non-blocking checks: add default. For blocking waits: add case <-ctx.Done() or case <-time.After(timeout). Never have\
      \ a bare select with only data channels.", severity: high, technologies: {lang: [go]}, domains: {domain: [architecture,
        performance], concern: [backend, concurrency]}, example_good: "select {\ncase msg := <-inbox:\n    process(msg)\n\
      case <-ctx.Done():\n    log.Println(\"shutting down:\", ctx.Err())\n    return\ncase <-time.After(5 * time.Second):\n\
      \    log.Println(\"no messages in 5s, checking health\")\n}\n", example_bad: "// If inbox is empty forever, this goroutine\
      \ is stuck forever\nselect {\ncase msg := <-inbox:\n    process(msg)\ncase result := <-results:\n    send(result)\n\
      }\n// No way out — goroutine leak if channels go silent\n", when_applies: Projects using Go services and tools, when_not_applies: projects
      not using Go, sources: ["https://go.dev/ref/spec#Select_statements"]}, {id: "CR-GO-005", text: Use errgroup for parallel
      operations that need error propagation and cancellation., why: "Manual goroutine + WaitGroup + error collection requires\
      \ boilerplate and is easy to get wrong: forgotten wg.Done(), races on shared error variable, no cancellation when one\
      \ task fails. errgroup handles all of this correctly.", how_to_do_right: "Use golang.org/x/sync/errgroup. Call g.Go()\
      \ for each task. First error cancels the derived context. g.Wait() returns the first error. Set g.SetLimit(n) for bounded\
      \ parallelism.", severity: high, technologies: {lang: [go]}, domains: {domain: [architecture, performance], concern: [
        backend, concurrency]}, example_good: "g, ctx := errgroup.WithContext(ctx)\ng.SetLimit(10) // max 10 concurrent\n\n\
      for _, url := range urls {\n    url := url // capture loop variable\n    g.Go(func() error {\n        return fetch(ctx,\
      \ url)\n    })\n}\n\nif err := g.Wait(); err != nil {\n    return fmt.Errorf(\"fetch failed: %w\", err)\n}\n", example_bad: "var\
      \ wg sync.WaitGroup\nvar mu sync.Mutex\nvar firstErr error\nfor _, url := range urls {\n    wg.Add(1)\n    go func(u\
      \ string) {\n        defer wg.Done()\n        if err := fetch(ctx, u); err != nil {\n            mu.Lock()\n       \
      \     if firstErr == nil { firstErr = err }\n            mu.Unlock()\n            // Other goroutines keep running even\
      \ after failure\n        }\n    }(url)\n}\nwg.Wait()\n", when_applies: Projects using Go services and tools, when_not_applies: projects
      not using Go, sources: ["https://pkg.go.dev/golang.org/x/sync/errgroup"]}, {id: "CR-GO-006", text: Always check returned
      errors — never discard with blank identifier _., why: "Unchecked errors cause silent data corruption, partial writes,\
      \ and security vulnerabilities. Go's explicit error returns exist specifically so errors cannot be ignored — discarding\
      \ them defeats the language's safety model.", how_to_do_right: "Handle every error: return it, log it, or act on it.\
      \ Use errcheck or golangci-lint to enforce. The only acceptable _ is for errors documented as impossible (e.g., strings.Builder.WriteString).",
    severity: critical, technologies: {lang: [go]}, domains: {domain: [architecture, reliability], concern: [backend]}, example_good: "f,\
      \ err := os.Open(path)\nif err != nil {\n    return fmt.Errorf(\"open config %s: %w\", path, err)\n}\ndefer f.Close()\n\
      \ndata, err := io.ReadAll(f)\nif err != nil {\n    return fmt.Errorf(\"read config %s: %w\", path, err)\n}\n", example_bad: "f,\
      \ _ := os.Open(path)       // Silently nil — next line panics\ndata, _ := io.ReadAll(f)    // Panic: nil pointer dereference\n\
      json.Unmarshal(data, &cfg)  // Error discarded — cfg is zero-value\n", when_applies: Any project using Go services and
      tools, when_not_applies: projects not using Go, sources: ["https://go.dev/doc/effective_go#errors"]}, {id: "CR-GO-007",
    text: Wrap errors with fmt.Errorf and %w to preserve the error chain for callers., why: "Bare error returns lose context:\
      \ 'file not found' without knowing which file or which step. %w wrapping builds a chain that callers can unwrap with\
      \ errors.Is/errors.As while preserving the original for logging.", how_to_do_right: "Use fmt.Errorf('context: %w', err)\
      \ at every return site. Add what YOU were doing, not what the callee did. The chain reads top-down: 'save user: open\
      \ db: connection refused'.", severity: high, technologies: {lang: [go]}, domains: {domain: [architecture, reliability],
      concern: [backend]}, example_good: "func SaveUser(u User) error {\n    conn, err := db.Connect()\n    if err != nil\
      \ {\n        return fmt.Errorf(\"save user %s: connect db: %w\", u.ID, err)\n    }\n    if err := conn.Insert(u); err\
      \ != nil {\n        return fmt.Errorf(\"save user %s: insert: %w\", u.ID, err)\n    }\n    return nil\n}\n\n// Caller\
      \ can inspect chain\nif errors.Is(err, sql.ErrConnDone) {\n    reconnect()\n}\n", example_bad: "func SaveUser(u User)\
      \ error {\n    conn, err := db.Connect()\n    if err != nil {\n        return err  // \"connection refused\" — which\
      \ connection? what operation?\n    }\n    return conn.Insert(u)  // No context at all\n}\n", when_applies: Projects
      using Go services and tools, when_not_applies: projects not using Go, sources: ["https://go.dev/blog/go1.13-errors"]},
  {id: "CR-GO-008", text: "Use sentinel errors with errors.Is for known conditions; use custom error types with errors.As\
      \ for structured error data.", why: "String comparison on error messages is fragile — any wording change breaks callers.\
      \ Sentinel errors (var ErrNotFound = errors.New(...)) give stable identity. Custom types carry structured data (which\
      \ field failed, HTTP status code) that callers can extract.", how_to_do_right: "Define sentinel errors (var ErrX = errors.New)\
      \ for conditions callers branch on. Define custom types (type ValidationError struct) when callers need data from the\
      \ error. Always check with errors.Is/errors.As, never ==.", severity: high, technologies: {lang: [go]}, domains: {domain: [
        architecture, reliability], concern: [backend]}, example_good: "// Sentinel for known condition\nvar ErrNotFound =\
      \ errors.New(\"not found\")\n\n// Custom type for structured error data\ntype ValidationError struct {\n    Field  \
      \ string\n    Message string\n}\nfunc (e *ValidationError) Error() string {\n    return fmt.Sprintf(\"validation: %s\
      \ — %s\", e.Field, e.Message)\n}\n\n// Caller inspects\nif errors.Is(err, ErrNotFound) {\n    http.Error(w, \"not found\"\
      , 404)\n}\nvar ve *ValidationError\nif errors.As(err, &ve) {\n    http.Error(w, ve.Message, 422)\n}\n", example_bad: "if\
      \ err.Error() == \"not found\" {  // Breaks when message changes\n    http.Error(w, \"not found\", 404)\n}\nif strings.Contains(err.Error(),\
      \ \"valid\") {  // Fragile substring match\n    http.Error(w, \"invalid\", 422)\n}\n", when_applies: Projects using
      Go services and tools, when_not_applies: projects not using Go, sources: ["https://go.dev/blog/go1.13-errors"]}, {id: "CR-GO-009",
    text: "Panic only for unrecoverable programmer errors — never for runtime conditions like bad input or network failures.",
    why: "panic() unwinds the stack and crashes the goroutine (or the whole process if unrecovered). In an HTTP server, a\
      \ panic in a handler kills the connection. Network errors, invalid input, and missing files are expected conditions\
      \ — they must be Result types, not panics.", how_to_do_right: "Return error for all runtime conditions. Panic only for\
      \ violated invariants: nil argument that was documented as required, impossible enum case, failed assertion in init().\
      \ Always document why a panic is acceptable.", severity: critical, technologies: {lang: [go]}, domains: {domain: [architecture,
        reliability], concern: [backend]}, example_good: "func ParseConfig(path string) (*Config, error) {\n    data, err\
      \ := os.ReadFile(path)\n    if err != nil {\n        return nil, fmt.Errorf(\"parse config: %w\", err)\n    }\n    var\
      \ cfg Config\n    if err := json.Unmarshal(data, &cfg); err != nil {\n        return nil, fmt.Errorf(\"parse config:\
      \ invalid JSON: %w\", err)\n    }\n    return &cfg, nil\n}\n", example_bad: "func ParseConfig(path string) *Config {\n\
      \    data, err := os.ReadFile(path)\n    if err != nil {\n        panic(err)  // File missing at runtime = crash, not\
      \ graceful error\n    }\n    var cfg Config\n    json.Unmarshal(data, &cfg)  // Error ignored + would panic on bad JSON\n\
      \    return &cfg\n}\n", when_applies: Any project using Go services and tools, when_not_applies: projects not using
      Go, sources: ["https://go.dev/doc/effective_go#panic"]}, {id: "CR-GO-010", text: 'Accept interfaces, return structs
      — the consumer defines the interface it needs.', why: "Returning interfaces hides the concrete type and prevents callers\
      \ from accessing methods they might need. Accepting interfaces at the consumer site means only the consumer decides\
      \ what abstraction it needs — the producer stays concrete and testable.", how_to_do_right: "Functions accept interface\
      \ parameters (io.Reader, your own small interface). Functions return concrete struct pointers. Define interfaces where\
      \ they are USED, not where they are implemented.", severity: high, technologies: {lang: [go]}, domains: {domain: [architecture],
      concern: [backend]}, example_good: "// Interface defined by consumer\ntype UserStore interface {\n    GetUser(ctx context.Context,\
      \ id string) (*User, error)\n}\n\n// Service accepts interface — testable with mocks\ntype UserService struct {\n  \
      \  store UserStore\n}\n\n// Concrete implementation returns struct\nfunc NewPostgresStore(db *sql.DB) *PostgresStore\
      \ {\n    return &PostgresStore{db: db}\n}\n", example_bad: "// Interface defined by producer — over-abstraction\ntype\
      \ Store interface {\n    GetUser(ctx context.Context, id string) (*User, error)\n    CreateUser(ctx context.Context,\
      \ u *User) error\n    DeleteUser(ctx context.Context, id string) error\n    ListUsers(ctx context.Context) ([]*User,\
      \ error)\n    // 20 more methods nobody uses all of...\n}\n\n// Returning interface hides concrete type\nfunc NewStore(db\
      \ *sql.DB) Store {\n    return &postgresStore{db: db}\n}\n", when_applies: Projects using Go services and tools, when_not_applies: "small\
      \ scripts under 100 lines, single-purpose utilities. projects not using Go", sources: ["https://go.dev/wiki/CodeReviewComments#interfaces"]},
  {id: "CR-GO-011", text: "Keep interfaces small — 1-2 methods maximum, following io.Reader/io.Writer as the gold standard.",
    why: "Large interfaces are hard to implement, hard to mock, and force implementers to provide methods they don't care\
      \ about. Small interfaces compose naturally (io.ReadWriter = io.Reader + io.Writer) and maximize the number of types\
      \ that satisfy them.", how_to_do_right: "One interface, one responsibility. If your interface has more than 3 methods,\
      \ split it. Compose small interfaces with embedding. Name single-method interfaces by the method + 'er': Reader, Writer,\
      \ Closer, Stringer.", severity: medium, technologies: {lang: [go]}, domains: {domain: [architecture], concern: [backend]},
    example_good: "type Reader interface {\n    Read(p []byte) (n int, err error)\n}\n\ntype Writer interface {\n    Write(p\
      \ []byte) (n int, err error)\n}\n\n// Composition\ntype ReadWriter interface {\n    Reader\n    Writer\n}\n\n// Easy\
      \ to mock in tests — one method\ntype TokenValidator interface {\n    Validate(token string) (Claims, error)\n}\n",
    example_bad: "type UserRepository interface {\n    Create(u *User) error\n    GetByID(id string) (*User, error)\n    GetByEmail(email\
      \ string) (*User, error)\n    Update(u *User) error\n    Delete(id string) error\n    List(page, size int) ([]*User,\
      \ error)\n    Count() (int, error)\n    Search(q string) ([]*User, error)\n    // Mock this — good luck implementing\
      \ 8 methods for a test\n}\n", when_applies: Projects using Go services and tools, when_not_applies: "small scripts under\
      \ 100 lines, single-purpose utilities. projects not using Go", sources: ["https://go.dev/wiki/CodeReviewComments#interfaces"]},
  {id: "CR-GO-012", text: Protect shared state with sync.Mutex and always defer mu.Unlock() immediately after Lock()., why: "If\
      \ any code path between Lock() and Unlock() panics or returns early, the mutex stays locked forever — deadlocking all\
      \ other goroutines. defer Unlock() guarantees release regardless of how the function exits.", how_to_do_right: "mu.Lock()\
      \ then immediately defer mu.Unlock() on the next line. Keep the critical section short. Use sync.RWMutex when reads\
      \ vastly outnumber writes.", severity: high, technologies: {lang: [go]}, domains: {domain: [architecture, performance],
      concern: [backend, concurrency]}, example_good: "type SafeCounter struct {\n    mu    sync.RWMutex\n    count map[string]int\n\
      }\n\nfunc (c *SafeCounter) Inc(key string) {\n    c.mu.Lock()\n    defer c.mu.Unlock()\n    c.count[key]++\n}\n\nfunc\
      \ (c *SafeCounter) Get(key string) int {\n    c.mu.RLock()\n    defer c.mu.RUnlock()\n    return c.count[key]\n}\n",
    example_bad: "func (c *SafeCounter) Inc(key string) {\n    c.mu.Lock()\n    c.count[key]++   // If this panics, mutex\
      \ is never unlocked\n    c.mu.Unlock()    // Skipped on panic — deadlock\n}\n", when_applies: Projects using Go services
      and tools, when_not_applies: projects not using Go, sources: ["https://go.dev/ref/spec#Mutex"]}, {id: "CR-GO-013", text: "Use\
      \ sync.Once for lazy initialization of singletons — never double-checked locking.", why: "Hand-rolled double-checked\
      \ locking (if instance == nil { lock; if instance == nil { create } }) is subtly broken in many languages due to memory\
      \ reordering. sync.Once is guaranteed correct, lock-free after first call, and idiomatic Go.", how_to_do_right: "Declare\
      \ a sync.Once and the value at package level. Call once.Do(func() { ... }) in the getter. After the first call, Do is\
      \ a no-op with zero overhead.", severity: medium, technologies: {lang: [go]}, domains: {domain: [architecture, performance],
      concern: [backend, concurrency]}, example_good: "var (\n    dbOnce sync.Once\n    dbConn *sql.DB\n)\n\nfunc GetDB()\
      \ *sql.DB {\n    dbOnce.Do(func() {\n        var err error\n        dbConn, err = sql.Open(\"postgres\", os.Getenv(\"\
      DATABASE_URL\"))\n        if err != nil {\n            log.Fatalf(\"db init: %v\", err)\n        }\n    })\n    return\
      \ dbConn\n}\n", example_bad: "var dbConn *sql.DB\nvar mu sync.Mutex\n\nfunc GetDB() *sql.DB {\n    if dbConn == nil\
      \ {   // Race condition without lock\n        mu.Lock()\n        defer mu.Unlock()\n        if dbConn == nil {\n   \
      \         dbConn, _ = sql.Open(\"postgres\", os.Getenv(\"DATABASE_URL\"))\n        }\n    }\n    return dbConn\n}\n",
    when_applies: Projects using Go services and tools, when_not_applies: projects not using Go, sources: ["https://pkg.go.dev/sync#Once"]},
  {id: "CR-GO-014", text: Always pass context.Context as the first parameter — never store it in a struct., why: "Context\
      \ is request-scoped: it carries deadlines, cancellation signals, and request-specific values. Storing it in a struct\
      \ ties the struct's lifetime to one request, causing stale cancellation, leaked goroutines, and race conditions when\
      \ the struct is reused.", how_to_do_right: "Every function that does I/O or might block takes ctx context.Context as\
      \ the first parameter. Create contexts at the top of the call chain (HTTP handler, main). Derive child contexts with\
      \ WithTimeout/WithCancel.", severity: high, technologies: {lang: [go]}, domains: {domain: [architecture, performance],
      concern: [backend, concurrency]}, example_good: "type UserService struct {\n    db *sql.DB  // No context stored\n}\n\
      \nfunc (s *UserService) GetUser(ctx context.Context, id string) (*User, error) {\n    row := s.db.QueryRowContext(ctx,\
      \ \"SELECT * FROM users WHERE id = $1\", id)\n    // ctx propagated to database driver — timeout applies\n    var u\
      \ User\n    if err := row.Scan(&u.ID, &u.Name); err != nil {\n        return nil, fmt.Errorf(\"get user %s: %w\", id,\
      \ err)\n    }\n    return &u, nil\n}\n", example_bad: "type UserService struct {\n    db  *sql.DB\n    ctx context.Context\
      \  // Stored context — stale after request ends\n}\n\nfunc (s *UserService) GetUser(id string) (*User, error) {\n  \
      \  // Using stored context — if original request was cancelled,\n    // this fails even for a new request\n    row :=\
      \ s.db.QueryRowContext(s.ctx, \"SELECT * FROM users WHERE id = $1\", id)\n    var u User\n    row.Scan(&u.ID, &u.Name)\n\
      \    return &u, nil\n}\n", when_applies: Projects using Go services and tools, when_not_applies: projects not using
      Go, sources: ["https://go.dev/blog/context"]}, {id: "CR-GO-015", text: Always set context.WithTimeout for external calls
      — never trust remote services to respond., why: "Without a timeout, a hanging external service (database, HTTP API,\
      \ DNS) blocks your goroutine forever. In a server handling requests, this exhausts the goroutine pool and takes down\
      \ the entire service — a single slow dependency cascades into total outage.", how_to_do_right: "Wrap every external\
      \ call in context.WithTimeout. Set timeouts appropriate to the operation: 1-5s for HTTP APIs, 5-30s for database queries,\
      \ 100ms for cache reads. Defer cancel() immediately.", severity: critical, technologies: {lang: [go]}, domains: {domain: [
        architecture, reliability], concern: [backend]}, example_good: "func fetchPrice(ctx context.Context, symbol string)\
      \ (float64, error) {\n    ctx, cancel := context.WithTimeout(ctx, 5*time.Second)\n    defer cancel()\n\n    req, _ :=\
      \ http.NewRequestWithContext(ctx, \"GET\",\n        fmt.Sprintf(\"https://api.prices.com/%s\", symbol), nil)\n\n   \
      \ resp, err := http.DefaultClient.Do(req)\n    if err != nil {\n        return 0, fmt.Errorf(\"fetch price %s: %w\"\
      , symbol, err)\n    }\n    defer resp.Body.Close()\n    // ...\n}\n", example_bad: "func fetchPrice(symbol string) (float64,\
      \ error) {\n    // No context, no timeout — hangs forever if API is slow\n    resp, err := http.Get(fmt.Sprintf(\"https://api.prices.com/%s\"\
      , symbol))\n    if err != nil {\n        return 0, err\n    }\n    defer resp.Body.Close()\n    // ...\n}\n", when_applies: Any
      project using Go services and tools, when_not_applies: projects not using Go, sources: ["https://go.dev/blog/context"]},
  {id: "CR-GO-016", text: "Use table-driven tests — a slice of structs with name, input, and expected output.", why: "Copy-pasted\
      \ test functions diverge over time: one gets updated, others don't. Table-driven tests centralize test logic, make adding\
      \ cases trivial (one line per case), and produce clear failure messages with the case name.", how_to_do_right: "Define\
      \ tests := []struct{ name string; input X; expected Y }. Range over tests, call t.Run(tt.name, func(t *testing.T) {\
      \ ... }). Use t.Parallel() inside each subtest for speed.", severity: medium, technologies: {lang: [go]}, domains: {
      domain: [architecture, testing], concern: [backend]}, example_good: "func TestParseAmount(t *testing.T) {\n    tests\
      \ := []struct {\n        name     string\n        input    string\n        expected int\n        wantErr  bool\n   \
      \ }{\n        {\"valid integer\", \"100\", 100, false},\n        {\"with decimals\", \"99.99\", 9999, false},\n    \
      \    {\"negative\", \"-50\", 0, true},\n        {\"empty string\", \"\", 0, true},\n        {\"overflow\", \"99999999999\"\
      , 0, true},\n    }\n\n    for _, tt := range tests {\n        t.Run(tt.name, func(t *testing.T) {\n            t.Parallel()\n\
      \            got, err := ParseAmount(tt.input)\n            if (err != nil) != tt.wantErr {\n                t.Fatalf(\"\
      ParseAmount(%q) error = %v, wantErr %v\", tt.input, err, tt.wantErr)\n            }\n            if got != tt.expected\
      \ {\n                t.Errorf(\"ParseAmount(%q) = %d, want %d\", tt.input, got, tt.expected)\n            }\n      \
      \  })\n    }\n}\n", example_bad: "func TestParseAmount100(t *testing.T) {\n    got, _ := ParseAmount(\"100\")\n    if\
      \ got != 100 { t.Fail() }\n}\nfunc TestParseAmountDecimal(t *testing.T) {\n    got, _ := ParseAmount(\"99.99\")\n  \
      \  if got != 9999 { t.Fail() }\n}\n// 5 more copy-pasted functions with slightly different logic...\n", when_applies: Projects
      using Go services and tools, when_not_applies: "exploratory prototypes, one-off scripts, or spike investigations. projects\
      \ not using Go", sources: ["https://go.dev/wiki/TableDrivenTests"]}, {id: "CR-GO-017", text: Use httptest.NewServer
      for HTTP handler testing — no real network needed., why: "Testing HTTP handlers with real servers introduces port conflicts,\
      \ network flakiness, and slow tests. httptest provides an in-process server that is fast, deterministic, and automatically\
      \ cleaned up.", how_to_do_right: "Use httptest.NewRequest + httptest.NewRecorder for unit tests (no server needed).\
      \ Use httptest.NewServer for integration tests that need a real URL. Always defer ts.Close().", severity: medium, technologies: {
      lang: [go]}, domains: {domain: [architecture, testing], concern: [backend]}, example_good: "func TestHealthHandler(t\
