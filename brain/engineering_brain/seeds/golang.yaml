      \ ~5MB total (quadratic). strings.Builder pre-allocates and appends in O(n) total.", how_to_do_right: "Create a strings.Builder.\
      \ Call b.Grow(estimatedSize) if you know the approximate size. Use b.WriteString() in the loop. Call b.String() once\
      \ at the end.", severity: medium, technologies: {lang: [go]}, domains: {domain: [architecture, performance], concern: [
        backend]}, example_good: "func joinLines(lines []string) string {\n    var b strings.Builder\n    b.Grow(len(lines)\
