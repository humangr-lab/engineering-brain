layer: rules
domain: prediction_markets
knowledge:
- id: PM-OB-001
  text: "Price-time priority matching algorithm: orders are matched first by best price (highest bid, lowest ask), then by earliest arrival time at that price level. This is the universal standard for fair order matching in all regulated exchanges."
  why: >
    Price-time priority is required by virtually every financial regulator (CFTC, SEC, FCA, CVM)
    because it ensures fairness: the best price always wins, and among equal prices, the earliest
    order wins. Deviating from this (e.g., pro-rata matching, random selection) creates incentives
    for gaming and destroys user trust. An exchange that implemented pro-rata matching saw large
    traders split orders into thousands of tiny orders to increase their allocation percentage,
    overwhelming the matching engine. Price-time priority is simple, fair, and battle-tested.
  how_to_do_right: |
    1. Sort bids descending by price, then ascending by timestamp at each price level
    2. Sort asks ascending by price, then ascending by timestamp at each price level
    3. Match: take best bid and best ask; if bid >= ask, execute at the earlier order's price
    4. Partial fills: if bid quantity > ask quantity, fill the ask completely and reduce the bid
    5. Continue matching until best bid < best ask (no more matchable orders)
    6. Timestamp must be monotonically increasing — use database sequence, not wall clock
    7. Test: 1000 random orders should produce deterministic matching results
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [prediction_markets, fintech]
    concern: [domain_specific]
  example_good: |
    from decimal import Decimal
    from dataclasses import dataclass, field
    from datetime import datetime
    from sortedcontainers import SortedList

    @dataclass(order=True)
    class Order:
        price: Decimal
        sequence: int  # Monotonic, NOT wall clock
        order_id: str = field(compare=False)
        user_id: str = field(compare=False)
        side: str = field(compare=False)  # "bid" or "ask"
        remaining: Decimal = field(compare=False)

    class PriceTimeMatcher:
        def match(self, bids: SortedList, asks: SortedList) -> list["Fill"]:
            fills = []
            while bids and asks:
                best_bid = bids[-1]   # Highest price (SortedList ascending)
                best_ask = asks[0]    # Lowest price
                if best_bid.price < best_ask.price:
                    break  # No match possible

                fill_qty = min(best_bid.remaining, best_ask.remaining)
                fill_price = best_bid.price if best_bid.sequence < best_ask.sequence else best_ask.price
                fills.append(Fill(bid=best_bid, ask=best_ask, quantity=fill_qty, price=fill_price))

                best_bid.remaining -= fill_qty
                best_ask.remaining -= fill_qty
                if best_bid.remaining == Decimal("0"):
                    bids.remove(best_bid)
                if best_ask.remaining == Decimal("0"):
                    asks.remove(best_ask)
            return fills
  example_bad: |
    # WRONG: Random matching — unfair and non-deterministic
    import random
    def match_orders(bids, asks):
        random.shuffle(bids)
        random.shuffle(asks)
        # Whoever is lucky gets matched first
  when_applies: Core matching engine implementation, order execution, exchange infrastructure
  sources: ["https://www.cftc.gov/sites/default/files/idc/groups/public/@newsroom/documents/file/federalregister112415.pdf"]

- id: PM-OB-002
  text: "Order book data structures: use a sorted container (SortedDict/red-black tree) for O(log N) insertion, deletion, and best-price lookup. Do not use a list with linear search — it becomes a bottleneck at 10,000+ orders."
  why: >
    An order book with 10,000 resting orders that uses a Python list for lookup takes O(N) = 10,000
    comparisons to find the best price, O(N) to insert, and O(N) to cancel. With a SortedDict
    (backed by a B-tree or red-black tree), all operations are O(log N) = ~14 comparisons. At
    100 orders/second, the list-based approach takes 1M comparisons/second (100ms latency) vs
    1,400 comparisons/second (<1ms) for the tree. Use the sortedcontainers library in Python —
    it's implemented in C and is faster than hand-rolled red-black trees for typical workloads.
  how_to_do_right: |
    1. Use sortedcontainers.SortedDict for price levels: key=price, value=deque of orders
    2. Each price level holds a FIFO queue (deque) of orders at that price (time priority)
    3. Best bid: sorted_bids.peekitem(-1) — O(log N)
    4. Best ask: sorted_asks.peekitem(0) — O(log N)
    5. Insert: O(log N) for price level lookup + O(1) for deque append
    6. Cancel: O(log N) for price level + O(N_at_level) for deque removal (usually N_at_level < 10)
    7. Benchmark: target <1ms for all operations up to 100,000 resting orders
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
    library: [sortedcontainers]
  domains:
    domain: [prediction_markets, fintech, performance]
    concern: [domain_specific]
  example_good: |
    from collections import deque
    from decimal import Decimal
    from sortedcontainers import SortedDict

    class OrderBookSide:
        def __init__(self, is_bid: bool):
            self.levels = SortedDict()  # price -> deque of Orders
            self.is_bid = is_bid

        def add_order(self, order: "Order"):
            if order.price not in self.levels:
                self.levels[order.price] = deque()
            self.levels[order.price].append(order)

        def best_price(self) -> Decimal | None:
            if not self.levels:
                return None
            return self.levels.keys()[-1] if self.is_bid else self.levels.keys()[0]

        def pop_best(self) -> "Order | None":
            if not self.levels:
                return None
            price = self.best_price()
            order = self.levels[price].popleft()
            if not self.levels[price]:
                del self.levels[price]
            return order

        def cancel_order(self, order: "Order") -> bool:
            if order.price in self.levels:
                try:
                    self.levels[order.price].remove(order)
                    if not self.levels[order.price]:
                        del self.levels[order.price]
                    return True
                except ValueError:
                    return False
            return False
  example_bad: |
    # WRONG: List-based order book — O(N) everything
    class SlowOrderBook:
        def __init__(self):
            self.orders = []  # unsorted list

        def best_bid(self):
            bids = [o for o in self.orders if o.side == "bid"]
            return max(bids, key=lambda o: o.price)  # O(N) scan every time
  when_applies: Order book implementation, matching engine, any system with sorted order storage
  sources: ["https://docs.python.org/3/library/collections.html#collections.deque"]

- id: PM-OB-003
  text: "Order types implementation: MARKET (fill immediately at best available price), LIMIT (place at specific price, wait for match), STOP (activate when trigger price reached), IOC (fill what you can, cancel rest), FOK (fill entirely or cancel), GTC (persist until filled or canceled)."
  why: >
    Each order type serves a different trading strategy. MARKET orders provide certainty of execution
    but not price. LIMIT orders provide price certainty but not execution. IOC and FOK are used by
    algorithms that need atomic operations. GTC allows passive strategies. STOP orders enable
    automated risk management (stop-loss). A prediction market that only supports MARKET orders
    loses algorithmic and professional traders who need more sophisticated order types. Implement
    at minimum MARKET + LIMIT + GTC; add IOC/FOK/STOP for competitive parity.
  how_to_do_right: |
    1. MARKET: Walk the book, fill at each price level until quantity is exhausted. Reject if insufficient liquidity.
    2. LIMIT: If price is marketable (bid >= best ask or ask <= best bid), fill immediately. Otherwise, place in book.
    3. IOC: Process like LIMIT, but after matching, cancel any unfilled portion (never enters book).
    4. FOK: Check if entire quantity can be filled at the limit price or better. If yes, fill; if no, cancel entirely.
    5. GTC: Place in book, persist until filled, canceled by user, or market closes.
    6. STOP: Store in a separate list. When market price crosses stop_price, convert to MARKET order and submit.
    7. All order types must produce the same audit trail: order_created, [order_triggered], fills, [order_canceled].
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [prediction_markets, fintech]
    concern: [domain_specific]
  example_good: |
    from enum import Enum
    from decimal import Decimal

    class TimeInForce(Enum):
        GTC = "good_till_canceled"
        IOC = "immediate_or_cancel"
        FOK = "fill_or_kill"

    class OrderProcessor:
        def process_order(self, order: "Order") -> "OrderResult":
            if order.order_type == OrderType.MARKET:
                return self._process_market(order)
            elif order.order_type == OrderType.LIMIT:
                return self._process_limit(order)
            elif order.order_type == OrderType.STOP:
                return self._register_stop(order)

        def _process_limit(self, order: "Order") -> "OrderResult":
            fills = self.matching_engine.match(order)
            if order.time_in_force == TimeInForce.IOC:
                if order.remaining > Decimal("0"):
                    self._cancel_remaining(order)
            elif order.time_in_force == TimeInForce.FOK:
                if order.remaining > Decimal("0"):
                    self._rollback_fills(fills)
                    return OrderResult(status="canceled", reason="FOK not fully filled")
            elif order.time_in_force == TimeInForce.GTC:
                if order.remaining > Decimal("0"):
                    self.order_book.add(order)
            return OrderResult(status="processed", fills=fills)
  example_bad: |
    # WRONG: Only market orders — no price control
    def buy(market_id, outcome, amount):
        price = get_current_price(outcome)
        execute_at(price, amount)  # What if price moved? No limit protection.
  when_applies: Trading engine implementation, order management, API endpoint design
  sources: ["https://www.cftc.gov/sites/default/files/idc/groups/public/@newsroom/documents/file/federalregister112415.pdf"]

- id: PM-OB-004
  text: "Order lifecycle states: NEW (received) -> OPEN (in book or matching) -> PARTIAL (partially filled) -> FILLED (completely filled) -> CANCELED (removed). Every state transition must be logged with timestamp and reason. Invalid transitions must be rejected."
  why: >
    Without a formal state machine, orders can end up in impossible states: an order that is both
    FILLED and CANCELED, or an order that transitions from CANCELED back to OPEN. A trading platform
    had a bug where canceled orders could be re-activated by a race condition, causing double-fills
    and $200K in erroneous payouts. The state machine prevents this: define valid transitions
    explicitly and reject anything else. Every transition is a logged, auditable event.
  how_to_do_right: |
    1. Define states as an enum: NEW, OPEN, PARTIAL, FILLED, CANCELED, REJECTED
    2. Define valid transitions as a dict: {NEW: [OPEN, REJECTED], OPEN: [PARTIAL, FILLED, CANCELED], ...}
    3. Every transition must pass through a transition function that validates and logs
    4. Rejected transitions raise an exception — never silently ignore
    5. Store state history: list of (state, timestamp, reason) tuples
    6. CANCELED is terminal — no transitions out. FILLED is terminal. REJECTED is terminal.
    7. PARTIAL can only go to FILLED or CANCELED (not back to OPEN)
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [prediction_markets, fintech]
    concern: [domain_specific]
  example_good: |
    from enum import Enum
    from datetime import datetime

    class OrderStatus(Enum):
        NEW = "new"
        OPEN = "open"
        PARTIAL = "partial"
        FILLED = "filled"
        CANCELED = "canceled"
        REJECTED = "rejected"

    VALID_TRANSITIONS = {
        OrderStatus.NEW: {OrderStatus.OPEN, OrderStatus.REJECTED},
        OrderStatus.OPEN: {OrderStatus.PARTIAL, OrderStatus.FILLED, OrderStatus.CANCELED},
        OrderStatus.PARTIAL: {OrderStatus.FILLED, OrderStatus.CANCELED},
        OrderStatus.FILLED: set(),      # Terminal
        OrderStatus.CANCELED: set(),    # Terminal
        OrderStatus.REJECTED: set(),    # Terminal
    }

    class OrderStateMachine:
        def transition(self, order: "Order", new_status: OrderStatus, reason: str):
            if new_status not in VALID_TRANSITIONS[order.status]:
                raise InvalidTransition(
                    f"Cannot transition from {order.status} to {new_status}"
                )
            order.status_history.append((order.status, new_status, datetime.utcnow(), reason))
            order.status = new_status
  example_bad: |
    # WRONG: No state machine — any transition is allowed
    def update_order(order, new_status):
        order.status = new_status  # CANCELED -> FILLED? Sure, why not!
  when_applies: Order management system, trade lifecycle, audit compliance
  sources: ["https://www.bis.org/cpmi/publ/d101a.pdf"]

- id: PM-OB-005
  text: "Partial fill handling: when an order matches against multiple resting orders or only partially fills, the remaining quantity stays in the book (for GTC) or is canceled (for IOC/FOK). Track filled_quantity and remaining_quantity separately — never derive one from the other."
  why: >
    A 100-share order that matches against a 30-share and a 40-share resting order results in 70
    shares filled and 30 remaining. If filled_quantity is derived as original - remaining, a
    concurrent modification could cause inconsistency. A crypto exchange had a bug where partial
    fills during high concurrency caused filled + remaining > original_quantity, allowing users to
    receive more shares than they paid for. Store both independently and verify the invariant:
    filled + remaining == original.
  how_to_do_right: |
    1. Store three fields: original_quantity, filled_quantity, remaining_quantity
    2. Invariant: filled_quantity + remaining_quantity == original_quantity (check after every fill)
    3. On each fill: filled_quantity += fill_amount; remaining_quantity -= fill_amount
    4. Transition to PARTIAL when filled_quantity > 0 and remaining_quantity > 0
    5. Transition to FILLED when remaining_quantity == 0
    6. Each partial fill generates a separate Fill record with its own price and quantity
    7. Average fill price = sum(fill_price * fill_qty) / total_filled_qty
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [prediction_markets, fintech]
    concern: [consistency]
  example_good: |
    from decimal import Decimal

    class Order:
        def __init__(self, quantity: Decimal):
            self.original_quantity = quantity
            self.filled_quantity = Decimal("0")
            self.remaining_quantity = quantity
            self.fills: list["Fill"] = []

        def apply_fill(self, fill_qty: Decimal, fill_price: Decimal):
            assert fill_qty <= self.remaining_quantity, "Fill exceeds remaining"
            self.filled_quantity += fill_qty
            self.remaining_quantity -= fill_qty
            self.fills.append(Fill(quantity=fill_qty, price=fill_price))

            # Invariant check
            assert self.filled_quantity + self.remaining_quantity == self.original_quantity

            if self.remaining_quantity == Decimal("0"):
                self.status = OrderStatus.FILLED
            elif self.filled_quantity > Decimal("0"):
                self.status = OrderStatus.PARTIAL

        def average_fill_price(self) -> Decimal:
            if self.filled_quantity == Decimal("0"):
                return Decimal("0")
            weighted = sum(f.quantity * f.price for f in self.fills)
            return weighted / self.filled_quantity
  example_bad: |
    # WRONG: Deriving filled from original - remaining — race condition
    class BadOrder:
        def filled_quantity(self):
            return self.original - self.remaining  # Not atomic!
  when_applies: Order fill processing, partial execution, position tracking
  sources: ["https://www.cftc.gov/sites/default/files/idc/groups/public/@newsroom/documents/file/federalregister112415.pdf"]

- id: PM-OB-006
  text: "Self-trade prevention (STP): the matching engine must never match two orders from the same user (or same account group). Self-trades are a form of wash trading that inflates volume and can be used for market manipulation or tax evasion."
  why: >
    Self-trading is illegal under most regulatory frameworks (CFTC, MiFID II, CVM) because it
    creates fake volume. Even unintentional self-trades (user places a bid, forgets, places an ask
    that matches) must be prevented. Coinbase was fined $6.5M by the CFTC in 2021 partly for
    allowing self-trading by an employee. Self-trade prevention is mandatory for any regulated or
    regulation-aspiring prediction market. Implementation is simple but must be enforced at the
    matching engine level, not the API level.
  how_to_do_right: |
    1. Check STP BEFORE every match: if incoming_order.user_id == resting_order.user_id, skip
    2. Also check account groups: users with linked accounts (same KYC identity) cannot match
    3. STP modes: CANCEL_NEWEST (cancel incoming), CANCEL_OLDEST (cancel resting), CANCEL_BOTH
    4. Default to CANCEL_NEWEST — the incoming order is canceled, resting order stays
    5. Log every STP trigger: timestamp, both order IDs, user_id, STP mode applied
    6. Monitor STP frequency per user: >10 triggers/day suggests intentional gaming
    7. Test: submit bid and ask from same user, verify they never match
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [prediction_markets, fintech, compliance]
    concern: [domain_specific]
  example_good: |
    from enum import Enum

    class STPMode(Enum):
        CANCEL_NEWEST = "cancel_newest"
        CANCEL_OLDEST = "cancel_oldest"
        CANCEL_BOTH = "cancel_both"

    class MatchingEngine:
        def __init__(self, stp_mode: STPMode = STPMode.CANCEL_NEWEST):
            self.stp_mode = stp_mode

        def try_match(self, incoming: "Order", resting: "Order") -> "Fill | None":
            # Self-trade prevention check
            if self._is_self_trade(incoming, resting):
                self._handle_stp(incoming, resting)
                return None

            # Normal matching logic
            return self._execute_match(incoming, resting)

        def _is_self_trade(self, a: "Order", b: "Order") -> bool:
            if a.user_id == b.user_id:
                return True
            if self.account_groups.get(a.user_id) == self.account_groups.get(b.user_id):
                return True
            return False

        def _handle_stp(self, incoming: "Order", resting: "Order"):
            if self.stp_mode == STPMode.CANCEL_NEWEST:
                incoming.cancel(reason="self_trade_prevention")
            elif self.stp_mode == STPMode.CANCEL_OLDEST:
                resting.cancel(reason="self_trade_prevention")
            self.audit_log.record_stp(incoming, resting, self.stp_mode)
  example_bad: |
    # WRONG: No self-trade prevention — regulatory violation
    def match(incoming, resting):
        if incoming.price >= resting.price:
            return Fill(incoming, resting)  # Same user on both sides? Don't care!
  when_applies: Matching engine implementation, regulatory compliance, wash trading prevention
  sources: ["https://www.cftc.gov/PressRoom/PressReleases/9183-26"]

- id: PM-OB-007
  text: "Every order action (create, match, partial fill, cancel, modify) must produce an immutable audit record. The audit trail must be sufficient to reconstruct the complete order book state at any point in time for regulatory review."
  why: >
    Financial regulators require exchanges to maintain complete records of all order activity for
    5-7 years. CFTC Rule 1.31 requires "all books and records required to be kept" for 5 years.
    MiFID II requires a 25-field audit trail for every order event. Beyond compliance, the audit
    trail is essential for debugging: when a user says "my order disappeared", you need to show
    exactly when, why, and by whom it was canceled. Without audit records, every user complaint
    becomes a he-said-she-said situation.
  how_to_do_right: |
    1. Record for every event: event_id, order_id, event_type, timestamp, user_id, market_id,
       side, price, quantity, filled_qty, remaining_qty, counterparty_order_id (if fill)
    2. Event types: ORDER_CREATED, ORDER_MATCHED, ORDER_PARTIALLY_FILLED, ORDER_FILLED,
       ORDER_CANCELED, ORDER_MODIFIED, ORDER_EXPIRED, ORDER_REJECTED
    3. Store in append-only table with no UPDATE/DELETE permissions
    4. Include a sequence number (monotonically increasing) for ordering
    5. Hash chain: each event includes hash(previous_event) for tamper detection
    6. Retention: 7 years minimum, encrypted at rest
    7. Export capability: generate regulatory reports in standard format (FIX protocol)
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
    library: [sqlalchemy]
  domains:
    domain: [prediction_markets, fintech, compliance]
    concern: [domain_specific]
  example_good: |
    import hashlib
    import json
    from dataclasses import dataclass, asdict
    from datetime import datetime
    from decimal import Decimal

    @dataclass(frozen=True)
    class OrderEvent:
        event_id: str
        sequence: int
        order_id: str
        event_type: str
        timestamp: datetime
        user_id: str
        market_id: str
        side: str
        price: Decimal
        quantity: Decimal
        filled_qty: Decimal
        remaining_qty: Decimal
        counterparty_order_id: str | None
        previous_hash: str

        def compute_hash(self) -> str:
            data = json.dumps(asdict(self), default=str, sort_keys=True)
            return hashlib.sha256(data.encode()).hexdigest()

    class OrderAuditLog:
        def __init__(self):
            self._last_hash = "genesis"
            self._sequence = 0

        def record(self, **kwargs) -> OrderEvent:
            self._sequence += 1
            event = OrderEvent(
                sequence=self._sequence,
                previous_hash=self._last_hash,
                **kwargs
            )
            self._last_hash = event.compute_hash()
            self._store.append(event)  # Append-only
            return event
  example_bad: |
    # WRONG: Mutable audit log — tamper-prone, non-compliant
    def log_order(order):
        db.orders.update({"order_id": order.id}, {"$set": {"status": order.status}})
        # Previous status overwritten — history lost
  when_applies: Every order operation, regulatory compliance, dispute resolution, forensic analysis
  sources: ["https://martinfowler.com/eaaDev/EventSourcing.html"]

- id: PM-OB-008
  text: "Event-sourced order replay: the order book must be reconstructable from the event log alone. Implement a replay function that processes events sequentially to produce the order book state at any point in time. Run replay verification daily."
  why: >
    Event sourcing for order books is the industry standard (LMAX, NYSE, CME all use it). If the
    in-memory order book crashes or corrupts, you can rebuild it from events in seconds. If a bug
    is discovered, you can replay events with the fix to determine the correct state. Without
    replay capability, a corrupted order book requires manual reconciliation — which is impossible
    at scale. A crypto exchange lost 3 days of trading data in 2022 because they had no replay
    capability after a database corruption.
  how_to_do_right: |
    1. Every order action is an immutable event (create, cancel, fill, modify)
    2. Replay function: given events 0..N, produce order book state at event N
    3. Snapshot every 1000 events: store full book state for faster replay
    4. Recovery: load latest snapshot + replay subsequent events
    5. Verification: replay all events from genesis, compare to current state (run nightly)
    6. If replay produces different state than live book: HALT trading and investigate
    7. Performance target: replay 100,000 events in <10 seconds
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [prediction_markets, fintech, databases]
    concern: [domain_specific]
  example_good: |
    class EventSourcedOrderBook:
        def __init__(self, market_id: str, event_store: "EventStore"):
            self.market_id = market_id
            self.event_store = event_store
            self.bids = OrderBookSide(is_bid=True)
            self.asks = OrderBookSide(is_bid=False)

        def replay_from_events(self, up_to_sequence: int | None = None) -> "OrderBook":
            """Reconstruct order book from event log."""
            book = EventSourcedOrderBook(self.market_id, self.event_store)

            # Load latest snapshot if available
            snapshot = self.event_store.get_latest_snapshot(self.market_id)
            if snapshot and (up_to_sequence is None or snapshot.sequence <= up_to_sequence):
                book.load_snapshot(snapshot)
                start_seq = snapshot.sequence + 1
            else:
                start_seq = 0

            # Replay events from snapshot
            events = self.event_store.get_events(
                self.market_id, from_sequence=start_seq, to_sequence=up_to_sequence
            )
            for event in events:
                book.apply_event(event)

            return book

        def verify_consistency(self) -> bool:
            """Replay all events and compare to current state."""
            replayed = self.replay_from_events()
            return replayed.state_hash() == self.state_hash()
  example_bad: |
    # WRONG: State-only persistence — no replay possible
    def save_order_book(book):
        db.save(book.to_dict())  # If this corrupts, all history is lost

    def load_order_book(market_id):
        return db.load(market_id)  # No way to verify correctness
  when_applies: Order book persistence, disaster recovery, state verification, debugging
  sources: ["https://martinfowler.com/eaaDev/EventSourcing.html"]

- id: PM-OB-009
  text: "Order book depth visualization: show aggregated quantity at each price level for both bids and asks. The depth chart is the primary tool traders use to assess liquidity and plan order placement."
  why: >
    Traders need to see where liquidity is concentrated to decide their order placement strategy.
    A depth chart showing 10,000 shares at $0.50 and only 100 shares at $0.51 tells the trader
    that buying >100 shares will face significant slippage above $0.51. Without depth visualization,
    traders place orders blindly and get unexpectedly bad fills. Polymarket and Kalshi both provide
    real-time depth charts. In prediction markets, depth is bounded by [0, 1] on the x-axis, making
    visualization more compact than equity markets.
  how_to_do_right: |
    1. Aggregate quantities by price level: group orders at same price, sum quantities
    2. Return top 20 price levels for each side (bids and asks)
    3. Include cumulative quantity: at each level, show total if all orders up to that level fill
    4. Update in real-time via WebSocket when order book changes
    5. Format for the depth chart: [{price, quantity, cumulative_quantity}] for each side
    6. For prediction markets: x-axis is [0, 1] (probability), y-axis is quantity in shares
    7. Cache depth snapshots for 100ms to reduce computation during high-frequency updates
  severity: high
  technologies:
