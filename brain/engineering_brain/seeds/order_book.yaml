- id: PM-OB-016
  text: "Order book persistence: the order book state must survive process restarts. Use a combination of database persistence (for durability) and in-memory representation (for performance). Reconstruct in-memory state from the database on startup."
  why: >
    An order book that only lives in memory loses all resting orders on a process crash. Users who
    placed GTC orders expect them to persist. A prediction market that lost its order book during
    a deployment caused 5,000 resting orders to disappear, requiring manual reconciliation with
    angry users. The pattern: persist to database within the trade transaction, but serve reads
    from an in-memory representation. On startup, load all OPEN and PARTIAL orders from the database
    into the in-memory structure.
  how_to_do_right: |
    1. Every order write (create, fill, cancel) is persisted to database within the trade transaction
    2. In-memory order book is the authoritative source for matching (fast)
    3. On startup: SELECT * FROM orders WHERE status IN ('OPEN', 'PARTIAL') ORDER BY sequence
    4. Insert each loaded order into the in-memory SortedDict structure
    5. Verify: count of in-memory orders == count of active orders in database
    6. If mismatch: log error, use database as source of truth, rebuild in-memory
    7. Recovery time target: <5 seconds for order books with up to 100,000 resting orders
    8. Health check: periodically compare in-memory state to database (every 60 seconds)
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
    library: [sqlalchemy, asyncpg]
  domains:
    domain: [prediction_markets, fintech, databases]
    concern: [domain_specific]
  example_good: |
    class PersistentOrderBook:
        def __init__(self, market_id: str, session_factory):
            self.market_id = market_id
            self.session_factory = session_factory
            self.in_memory = OrderBook()

        def startup_load(self):
            """Reconstruct in-memory book from database."""
            with self.session_factory() as session:
                orders = session.query(OrderModel).filter(
                    OrderModel.market_id == self.market_id,
                    OrderModel.status.in_([OrderStatus.OPEN, OrderStatus.PARTIAL])
                ).order_by(OrderModel.sequence).all()

                for order_model in orders:
                    order = Order.from_model(order_model)
                    self.in_memory.add(order)

                db_count = len(orders)
                mem_count = self.in_memory.order_count()
                assert db_count == mem_count, f"Mismatch: DB={db_count}, Memory={mem_count}"
                logger.info(f"Loaded {db_count} orders for market {self.market_id}")

        def add_order(self, session, order: "Order"):
            """Persist to DB and add to in-memory atomically."""
            session.add(order.to_model())
            session.flush()  # Ensure DB write succeeds
            self.in_memory.add(order)
  example_bad: |
    # WRONG: In-memory only — lost on crash
    order_book = {}  # Global dict, lives in process memory only
    def add_order(order):
        order_book[order.id] = order  # Gone after restart
  when_applies: Order book implementation, process recovery, deployment strategy
  sources: ["https://martinfowler.com/eaaDev/EventSourcing.html"]

- id: PM-OB-017
  text: "Order book recovery from event log: after a crash, the order book must be reconstructable from the event log. The recovery process must be idempotent (running it twice produces the same result) and must complete before accepting new orders."
  why: >
    Database persistence stores the current state but may be inconsistent after a crash (transaction
    in progress at crash time). The event log is the source of truth: it contains every order action
    in sequence. Recovery replays events from the last known-good snapshot, producing a consistent
    order book. Recovery must be idempotent because it may be interrupted and restarted. The system
    must not accept new orders during recovery (flag: is_recovering=True) because partial state
    would cause incorrect matching.
  how_to_do_right: |
    1. On startup: set is_recovering = True, reject all incoming orders
    2. Load latest snapshot (if available)
    3. Replay all events since snapshot in sequence order
    4. Verify recovered state: run consistency checks (sum of quantities, order count, etc.)
    5. Set is_recovering = False, begin accepting orders
    6. Log recovery time and event count for monitoring
    7. If recovery fails: alert operator, remain in recovery mode, do not accept orders
    8. Make recovery idempotent: processing the same event twice has no effect (check event_id uniqueness)
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [prediction_markets, fintech]
    concern: [domain_specific]
  example_good: |
    import logging
    import time

    logger = logging.getLogger(__name__)

    class OrderBookRecovery:
        def __init__(self, event_store: "EventStore", market_id: str):
            self.event_store = event_store
            self.market_id = market_id
            self.is_recovering = False
            self.processed_event_ids: set[str] = set()

        def recover(self) -> "OrderBook":
            self.is_recovering = True
            start = time.monotonic()

            try:
                # 1. Load snapshot
                snapshot = self.event_store.get_latest_snapshot(self.market_id)
                book = OrderBook()
                start_seq = 0

                if snapshot:
                    book.load_from_snapshot(snapshot.data)
                    start_seq = snapshot.sequence + 1
                    self.processed_event_ids = set(snapshot.processed_ids)

                # 2. Replay events (idempotent)
                events = self.event_store.get_events(self.market_id, from_sequence=start_seq)
                replayed = 0
                for event in events:
                    if event.event_id in self.processed_event_ids:
                        continue  # Idempotent: skip already-processed
                    book.apply_event(event)
                    self.processed_event_ids.add(event.event_id)
                    replayed += 1

                # 3. Verify
                assert book.is_consistent(), "Recovered book failed consistency check"

                elapsed = time.monotonic() - start
                logger.info(f"Recovery complete: {replayed} events in {elapsed:.2f}s")

                return book
            finally:
                self.is_recovering = False

        def accept_order(self, order: "Order") -> bool:
            if self.is_recovering:
                raise ServiceUnavailable("Order book is recovering, try again shortly")
            return True
  example_bad: |
    # WRONG: No recovery — accept orders on stale/corrupt state
    def startup():
        book = load_from_db()  # May be inconsistent after crash
        start_accepting_orders()  # Matching against corrupt state
  when_applies: System startup, crash recovery, disaster recovery, deployment procedures
  sources: ["https://martinfowler.com/eaaDev/EventSourcing.html"]

- id: PM-OB-018
  text: "Market data feed: publish real-time price, volume, and order book changes via WebSocket. Each message must include a sequence number for gap detection and a timestamp for latency monitoring. Consumers must handle out-of-order and duplicate messages."
  why: >
    Traders need real-time market data to make decisions. A delayed price feed causes traders to
    submit orders based on stale information, leading to bad fills and complaints. WebSocket is the
    standard for real-time market data (used by Binance, Coinbase, Polymarket). Sequence numbers
    allow consumers to detect missed messages (gap = missed a message, request replay). Without
    sequence numbers, consumers have no way to know if they missed an update, leading to silently
    stale displays that erode trust.
  how_to_do_right: |
    1. Publish on every book change: type (trade, new_order, cancel), price, quantity, timestamp, sequence
    2. Include monotonically increasing sequence number in every message
    3. Consumers check: if received_seq != expected_seq, request snapshot (gap detected)
    4. Message types: TRADE (execution), BBO_UPDATE (best bid/ask changed), DEPTH_UPDATE (book change)
    5. Include server timestamp and allow consumers to calculate latency
    6. Batch updates within 10ms window to avoid flooding consumers during bursts
    7. Provide REST endpoint for snapshot: GET /markets/{id}/snapshot returns full book + last sequence
    8. Handle consumer disconnect: buffer last 100 messages for reconnection replay
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi, react]
    library: [websockets]
  domains:
    domain: [prediction_markets, fintech, realtime]
    concern: [domain_specific]
  example_good: |
    import json
    import time
    from dataclasses import dataclass, asdict
    from decimal import Decimal

    @dataclass
    class MarketDataMessage:
        sequence: int
        message_type: str  # "trade", "bbo_update", "depth_update"
        market_id: str
        timestamp_ms: int
        data: dict

    class MarketDataFeed:
        def __init__(self, market_id: str):
            self.market_id = market_id
            self.sequence = 0
            self.subscribers: list = []
            self.recent_messages: list = []  # Last 100 for reconnection

        def publish_trade(self, price: Decimal, quantity: Decimal, side: str):
            self.sequence += 1
            msg = MarketDataMessage(
                sequence=self.sequence,
                message_type="trade",
                market_id=self.market_id,
                timestamp_ms=int(time.time() * 1000),
                data={"price": str(price), "quantity": str(quantity), "side": side}
            )
            self._broadcast(msg)

        def publish_bbo(self, best_bid: Decimal | None, best_ask: Decimal | None):
            self.sequence += 1
            msg = MarketDataMessage(
                sequence=self.sequence,
                message_type="bbo_update",
                market_id=self.market_id,
                timestamp_ms=int(time.time() * 1000),
                data={"best_bid": str(best_bid), "best_ask": str(best_ask)}
            )
            self._broadcast(msg)

        def _broadcast(self, msg: MarketDataMessage):
            self.recent_messages.append(msg)
            if len(self.recent_messages) > 100:
                self.recent_messages.pop(0)
            payload = json.dumps(asdict(msg), default=str)
            for subscriber in self.subscribers:
                subscriber.send(payload)

        def get_snapshot(self) -> dict:
            """REST endpoint for full book state + last sequence."""
            return {
                "market_id": self.market_id,
                "last_sequence": self.sequence,
                "order_book": self.order_book.get_depth(),
                "timestamp_ms": int(time.time() * 1000),
            }
  example_bad: |
    # WRONG: No sequence numbers, no timestamps — consumers can't detect gaps
    def notify_trade(price, quantity):
        for ws in websockets:
            ws.send(json.dumps({"price": price, "qty": quantity}))
            # Which update is this? Is it in order? How old is it? Unknown.
  when_applies: Real-time market data, WebSocket infrastructure, trading UI, algorithmic trading APIs
  sources: ["https://datatracker.ietf.org/doc/html/rfc6455"]
