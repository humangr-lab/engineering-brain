- id: PM-OB-010
  text: "Best bid/ask (BBO) calculation must be O(1) or O(log N). The BBO is the most frequently accessed data point — it drives price display, spread calculation, and market order routing. Cache it and update only on book changes."
  why: >
    The BBO is queried on every page load, every trade preview, every WebSocket tick, and every
    matching attempt. If BBO calculation is O(N) (scanning all orders), it becomes the performance
    bottleneck. A trading platform that calculated BBO by scanning 50,000 orders had 200ms latency
    on price display, making the UI feel sluggish. With SortedDict, BBO is O(log N) via peekitem().
    Caching brings it to O(1) for reads, with O(log N) update on book changes.
  how_to_do_right: |
    1. Use SortedDict.peekitem(-1) for best bid, .peekitem(0) for best ask — O(log N)
    2. Cache BBO in memory, update only when the best price level changes
    3. Invalidate cache on: new order at best price, fill/cancel of last order at best price
    4. Spread = best_ask - best_bid (in probability terms: e.g., 0.02 = 2 percentage points)
    5. Mid price = (best_bid + best_ask) / 2 — used for mark-to-market pricing
    6. If no bids or no asks, report "no market" — do not default to 0 or 1
    7. BBO should be available via both REST (GET /markets/{id}/bbo) and WebSocket (real-time)
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [prediction_markets, fintech, performance]
    concern: [domain_specific]
  example_good: |
    from decimal import Decimal

    class BestBidOffer:
        def __init__(self, order_book: "OrderBook"):
            self._book = order_book
            self._cached_bid: Decimal | None = None
            self._cached_ask: Decimal | None = None
            self._dirty = True

        def get_bbo(self) -> dict:
            if self._dirty:
                self._cached_bid = self._book.bids.best_price()
                self._cached_ask = self._book.asks.best_price()
                self._dirty = False

            spread = None
            mid = None
            if self._cached_bid is not None and self._cached_ask is not None:
                spread = self._cached_ask - self._cached_bid
                mid = (self._cached_bid + self._cached_ask) / 2

            return {
                "best_bid": self._cached_bid,
                "best_ask": self._cached_ask,
                "spread": spread,
                "mid_price": mid,
            }

        def invalidate(self):
            self._dirty = True
  example_bad: |
    # WRONG: O(N) BBO calculation on every access
    def best_bid(orders):
        return max((o.price for o in orders if o.side == "bid"), default=None)  # Scans all orders
  when_applies: Price display, trade preview, matching engine, WebSocket feeds, spread monitoring
  sources: ["https://www.bis.org/cpmi/publ/d101a.pdf"]

- id: PM-OB-011
  text: "Spread calculation: the bid-ask spread is the difference between best ask and best bid. In prediction markets, spread is measured in probability points (e.g., 2% spread means best bid = 0.49, best ask = 0.51). Monitor spread as a market health indicator."
  why: >
    Wide spreads (>10%) indicate poor liquidity and discourage trading. Narrow spreads (<1%)
    indicate healthy competition among market makers. Spread is the implicit cost of a round-trip
    trade (buy then sell immediately), so it directly affects user experience. Polymarket targets
    <2% spread on popular markets. If spread exceeds a threshold, the AMM should provide additional
    liquidity to tighten it. Spread also signals information events: sudden spread widening often
    precedes a large price move.
  how_to_do_right: |
    1. Spread = best_ask - best_bid (in Decimal, probability units)
    2. Display as percentage: "Spread: 2.3%" (multiply by 100)
    3. Monitor: alert if spread > 10% for markets with >$1K daily volume
    4. If spread widens suddenly (>3x in 5 minutes), investigate — possible manipulation or news event
    5. Track historical spread: average spread per hour for market health dashboards
    6. Use spread as input to AMM parameter adjustment: wide spread -> increase b (more liquidity)
    7. Report "no spread" if either side has zero orders (one-sided book)
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi, react]
  domains:
    domain: [prediction_markets, fintech]
    concern: [domain_specific]
  example_good: |
    from decimal import Decimal
    from datetime import datetime

    class SpreadMonitor:
        ALERT_THRESHOLD = Decimal("0.10")  # 10%
        WIDENING_FACTOR = Decimal("3")

        def __init__(self):
            self.spread_history: list[tuple[datetime, Decimal]] = []

        def record_spread(self, spread: Decimal | None):
            if spread is not None:
                self.spread_history.append((datetime.utcnow(), spread))

        def check_alerts(self, current_spread: Decimal | None) -> list[str]:
            alerts = []
            if current_spread is None:
                alerts.append("One-sided book — no spread available")
                return alerts
            if current_spread > self.ALERT_THRESHOLD:
                alerts.append(f"Wide spread: {current_spread*100:.1f}%")

            # Check for sudden widening
            recent = [s for t, s in self.spread_history if
                      (datetime.utcnow() - t).seconds < 300]
            if recent and current_spread > self.WIDENING_FACTOR * min(recent):
                alerts.append(f"Spread widened {current_spread / min(recent):.1f}x in 5min")
            return alerts
