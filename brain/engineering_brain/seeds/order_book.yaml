- id: PM-OB-012
  text: "Order cancellation has two modes: normal (user-initiated) and force (system-initiated, e.g., market close or halt). Normal cancellation requires user authentication. Force cancellation must cancel ALL open orders atomically and log the reason."
  why: >
    When a market closes or is halted, all resting orders must be canceled immediately and atomically.
    If some orders survive a market close, they could be filled after the outcome is known, creating
    guaranteed losses for the counterparty. Force cancellation must be idempotent (canceling an
    already-canceled order is a no-op) because it may be triggered multiple times during system
    recovery. User-initiated cancellation must verify the user owns the order to prevent one user
    from canceling another's orders.
  how_to_do_right: |
    1. Normal cancel: verify order.user_id == requesting_user_id, then cancel
    2. Force cancel: system-level, no user auth required, must succeed even if user session is down
    3. Force cancel all: cancel ALL open orders for a market in a single transaction
    4. Idempotent: canceling an already-canceled order returns success, not error
    5. State transition: OPEN/PARTIAL -> CANCELED, with reason logged
    6. Refund: if order had partial fills, only refund the unfilled portion
    7. Notification: notify user via WebSocket and email for force cancellations
    8. Test: force cancel during active matching should not cause inconsistent state
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [prediction_markets, fintech]
    concern: [domain_specific]
  example_good: |
    from enum import Enum
    from decimal import Decimal

    class CancelReason(Enum):
        USER_REQUESTED = "user_requested"
        MARKET_CLOSED = "market_closed"
        MARKET_HALTED = "market_halted"
        INSUFFICIENT_BALANCE = "insufficient_balance"
        SELF_TRADE_PREVENTION = "stp"
        ADMIN_FORCE = "admin_force"

    class OrderCancellationService:
        def cancel_order(self, order_id: str, user_id: str) -> bool:
            order = self.get_order(order_id)
            if order.user_id != user_id:
                raise PermissionError("Cannot cancel another user's order")
            return self._do_cancel(order, CancelReason.USER_REQUESTED)

        def force_cancel_all(self, market_id: str, reason: CancelReason) -> int:
            """Atomically cancel all open orders for a market."""
            with self.session.begin():
                orders = self.get_open_orders(market_id)
                count = 0
                for order in orders:
                    if self._do_cancel(order, reason):
                        count += 1
                return count

        def _do_cancel(self, order: "Order", reason: CancelReason) -> bool:
            if order.status in (OrderStatus.FILLED, OrderStatus.CANCELED, OrderStatus.REJECTED):
                return False  # Idempotent — already terminal
            order.transition(OrderStatus.CANCELED, reason=reason.value)
            self.order_book.remove(order)
            self.notify_user(order.user_id, f"Order {order.id} canceled: {reason.value}")
            return True
  example_bad: |
    # WRONG: No auth check, not idempotent, no force cancel
    def cancel(order_id):
        order = db.get(order_id)
        order.status = "canceled"  # No auth check — anyone can cancel any order
        db.save(order)
  when_applies: Order cancellation, market close/halt procedures, system error recovery
  sources: ["https://www.cftc.gov/sites/default/files/idc/groups/public/@newsroom/documents/file/federalregister112415.pdf"]

- id: PM-OB-013
  text: "Order modification uses cancel-replace semantics: the original order is canceled and a new order is created with modified parameters. This preserves time priority only if the price doesn't change. If price changes, the order loses its place in the queue."
  why: >
    Allowing in-place modification of orders (change price without losing queue position) enables
    a manipulation tactic called "order spoofing": a trader places a large order at the best price
    to attract others, then modifies the price away just before execution. Cancel-replace semantics
    prevent this because a price change creates a new order at the back of the queue. NYSE, CME,
    and all major exchanges use cancel-replace. The one exception: quantity reduction (decreasing
    order size) can preserve time priority because it doesn't affect other orders.
  how_to_do_right: |
    1. Modification = atomic cancel of old order + creation of new order
    2. If only quantity decreases: preserve time priority (same sequence number)
    3. If price changes or quantity increases: new order gets new sequence number (back of queue)
    4. Atomic: old cancel and new creation must be in the same transaction
    5. New order inherits the old order's filled history for audit continuity
    6. Link old and new orders via a modification_chain_id for traceability
    7. Rate limit modifications: max 10 per order per minute (prevent quote stuffing)
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [prediction_markets, fintech]
    concern: [domain_specific]
  example_good: |
    from decimal import Decimal

    class OrderModificationService:
        def modify_order(self, order_id: str, user_id: str,
                        new_price: Decimal | None = None,
                        new_quantity: Decimal | None = None) -> "Order":
            with self.session.begin():
                old_order = self.get_order(order_id)
                assert old_order.user_id == user_id, "Not your order"
                assert old_order.status in (OrderStatus.OPEN, OrderStatus.PARTIAL)

                # Quantity decrease preserves priority
                quantity_only_decrease = (
                    new_price is None and
                    new_quantity is not None and
                    new_quantity < old_order.remaining_quantity
                )

                if quantity_only_decrease:
                    old_order.remaining_quantity = new_quantity
                    old_order.original_quantity = old_order.filled_quantity + new_quantity
                    return old_order

                # Cancel-replace for price changes or quantity increases
                self.cancel_service._do_cancel(old_order, CancelReason.USER_REQUESTED)
                new_order = Order(
                    price=new_price or old_order.price,
                    quantity=new_quantity or old_order.remaining_quantity,
                    user_id=user_id,
                    market_id=old_order.market_id,
                    side=old_order.side,
                    modification_chain_id=old_order.modification_chain_id or old_order.id,
                )
                self.order_book.add(new_order)
                return new_order
  example_bad: |
    # WRONG: In-place price modification preserving time priority — enables spoofing
    def modify(order_id, new_price):
        order = db.get(order_id)
        order.price = new_price  # Keeps same queue position — spoofing!
        db.save(order)
  when_applies: Order modification API, cancel-replace implementation, anti-spoofing measures
  sources: ["https://www.cftc.gov/sites/default/files/idc/groups/public/@newsroom/documents/file/federalregister112415.pdf"]

- id: PM-OB-014
  text: "Matching engine performance target: <1ms per match operation (price lookup + fill + state update) for 99th percentile latency. Profile and optimize the hot path: match(), fill(), and state_update() are called for every trade."
  why: >
    While prediction markets have lower frequency than equities (hundreds vs millions of trades/day),
    burst periods (election night, sports events) can see 100+ orders per second. At 100 orders/sec
    with 10ms matching latency, the queue grows by 1 order/ms — a 1-second burst creates a 1000-order
    backlog. At <1ms, the engine keeps up in real-time. LMAX (the reference matching engine) processes
    6M orders/second, but even modest Python implementations can achieve <1ms using SortedDict and
    careful memory allocation. Profile before optimizing — the bottleneck is usually database I/O, not
    matching logic.
  how_to_do_right: |
    1. Profile the matching engine with cProfile to identify hot path
    2. Hot path: get_best_price() -> check_match() -> fill() -> update_state()
    3. Target: <1ms for the hot path at 99th percentile
    4. Use SortedDict (C implementation) — 10x faster than pure Python sorted structures
    5. Batch database writes: collect fills in memory, flush to DB every 10ms or 100 fills
    6. Avoid allocation in the hot path: reuse objects, pre-allocate buffers
    7. Benchmark: run 10,000 random orders, measure p50/p90/p99/max latency
    8. Alert if p99 > 5ms — indicates degradation
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [prediction_markets, fintech, performance]
    concern: [domain_specific]
  example_good: |
    import time
    from dataclasses import dataclass

    @dataclass
    class MatchingMetrics:
        total_matches: int = 0
        total_latency_us: int = 0
        max_latency_us: int = 0
        p99_latencies: list = None

        def __post_init__(self):
            self.p99_latencies = []

    class InstrumentedMatcher:
        def __init__(self, engine: "MatchingEngine"):
            self.engine = engine
            self.metrics = MatchingMetrics()

        def match_order(self, order: "Order") -> list["Fill"]:
            start = time.perf_counter_ns()
            fills = self.engine.match(order)
            elapsed_us = (time.perf_counter_ns() - start) // 1000

            self.metrics.total_matches += 1
            self.metrics.total_latency_us += elapsed_us
            self.metrics.max_latency_us = max(self.metrics.max_latency_us, elapsed_us)
            self.metrics.p99_latencies.append(elapsed_us)

            if elapsed_us > 5000:  # 5ms
                logger.warning(f"Slow match: {elapsed_us}us for order {order.id}")

            return fills
  example_bad: |
    # WRONG: No performance monitoring — blind to latency degradation
    def match(order):
        # Is this taking 1ms or 100ms? Nobody knows.
        fills = engine.match(order)
        return fills
  when_applies: Matching engine optimization, performance benchmarking, capacity planning
  sources: ["https://www.cftc.gov/sites/default/files/idc/groups/public/@newsroom/documents/file/federalregister112415.pdf"]

- id: PM-OB-015
  text: "Order validation must check: price within [0, 1] bounds, quantity > 0, user balance sufficient for the trade, user position within position limits, and market is open for trading. Validate ALL conditions BEFORE modifying any state."
  why: >
    Validation after state modification creates the possibility of partial invalid states: balance
    debited but order rejected, or order placed but balance check failed. A prediction market that
    validated balance after placing the order had a race condition where two orders could both pass
    validation before either deducted the balance, allowing double-spending. All validation must
    happen atomically before any state change, within the same transaction that performs the trade.
  how_to_do_right: |
    1. Validate synchronously, in order: market_open -> price_valid -> quantity_valid -> balance_sufficient -> position_within_limits
    2. Price: 0.01 <= price <= 0.99 for limit orders (allow some margin from 0 and 1)
    3. Quantity: must be > 0, must be a multiple of minimum_increment (e.g., 0.01 shares)
    4. Balance: user.available_balance >= estimated_cost (use worst-case cost estimate)
    5. Position limits: user.position(market) + new_quantity <= max_position_per_market
    6. Market status: must be OPEN (not CLOSED, HALTED, SETTLING)
    7. All validations in a single function that returns list[ValidationError] — empty = valid
    8. NEVER proceed to matching if ANY validation fails
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [prediction_markets, fintech]
    concern: [consistency]
  example_good: |
    from decimal import Decimal
    from dataclasses import dataclass

    @dataclass
    class ValidationError:
        field: str
        message: str
        code: str

    class OrderValidator:
        MIN_PRICE = Decimal("0.01")
        MAX_PRICE = Decimal("0.99")
        MIN_QUANTITY = Decimal("0.01")

        def validate(self, order: "Order", user: "User",
                    market: "Market") -> list[ValidationError]:
            errors = []

            # 1. Market open
            if market.status != MarketStatus.OPEN:
                errors.append(ValidationError("market", f"Market is {market.status.value}", "MARKET_NOT_OPEN"))

            # 2. Price bounds
            if order.order_type == OrderType.LIMIT:
                if not (self.MIN_PRICE <= order.price <= self.MAX_PRICE):
                    errors.append(ValidationError("price", f"Price must be in [{self.MIN_PRICE}, {self.MAX_PRICE}]", "INVALID_PRICE"))

            # 3. Quantity
            if order.quantity <= Decimal("0"):
                errors.append(ValidationError("quantity", "Quantity must be positive", "INVALID_QUANTITY"))

            # 4. Balance
            estimated_cost = order.quantity * (order.price or market.best_ask or Decimal("1"))
            if user.available_balance < estimated_cost:
                errors.append(ValidationError("balance", "Insufficient balance", "INSUFFICIENT_BALANCE"))

            # 5. Position limits
            current_position = self.get_user_position(user.id, market.id)
            if current_position + order.quantity > market.max_position:
                errors.append(ValidationError("position", "Exceeds position limit", "POSITION_LIMIT"))

            return errors
