    from decimal import Decimal
    from dataclasses import dataclass

    @dataclass
    class DepthLevel:
        price: Decimal
        quantity: Decimal
        cumulative_quantity: Decimal
        order_count: int

    class DepthCalculator:
        def get_depth(self, book: "OrderBook", levels: int = 20) -> dict:
            bids = self._aggregate_side(book.bids, levels, reverse=True)
            asks = self._aggregate_side(book.asks, levels, reverse=False)
            return {
                "bids": bids,
                "asks": asks,
                "spread": asks[0].price - bids[0].price if bids and asks else None,
                "mid_price": (asks[0].price + bids[0].price) / 2 if bids and asks else None,
            }

        def _aggregate_side(self, side: "OrderBookSide", levels: int,
                           reverse: bool) -> list[DepthLevel]:
            result = []
            cumulative = Decimal("0")
            prices = sorted(side.levels.keys(), reverse=reverse)[:levels]
            for price in prices:
                orders = side.levels[price]
                qty = sum(o.remaining for o in orders)
                cumulative += qty
                result.append(DepthLevel(
                    price=price, quantity=qty,
                    cumulative_quantity=cumulative, order_count=len(orders)
                ))
            return result
