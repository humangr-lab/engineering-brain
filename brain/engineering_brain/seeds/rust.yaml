layer: rules
technology: Rust
domain: backend
knowledge: [{id: "CR-RUST-001", text: 'Every value has exactly one owner — assignment moves ownership, not copies.', why: "Rust\
      \ prevents use-after-free and double-free at compile time through ownership. When you assign x to y, x is moved and\
      \ becomes invalid. Using x after the move is a compile error — not a runtime crash, not undefined behavior, a hard stop\
      \ at build time.", how_to_do_right: "Understand that let y = x moves x (for non-Copy types). If you need both, either\
      \ clone explicitly (x.clone()), borrow (&x), or restructure to avoid the need. Move semantics are the default — embrace\
      \ it.", severity: critical, technologies: {lang: [rust]}, domains: {domain: [architecture], concern: [backend, systems]},
    example_good: "let data = vec![1, 2, 3];\nlet processed = process(data);  // data moved into process\n// data is no longer\
      \ valid here — compiler enforces this\nprintln!(\"{:?}\", processed);\n\n// If you need data after, clone or borrow:\n\
      let data = vec![1, 2, 3];\nlet processed = process(data.clone());  // Explicit clone\nprintln!(\"original: {:?}\", data);\
      \       // Still valid\n", example_bad: "// This does NOT compile — Rust catches it\nlet data = vec![1, 2, 3];\nlet\
      \ processed = process(data);  // data moved\nprintln!(\"{:?}\", data);         // ERROR: value used after move\n// In\
      \ C++ this would compile and cause use-after-free\n", when_applies: Any project using Rust systems with ownership model,
    when_not_applies: projects not using Rust, sources: ["https://doc.rust-lang.org/book/ch04-01-what-is-ownership.html"]},
  {id: "CR-RUST-002", text: "Borrowing rules: you can have either ONE mutable reference OR any number of immutable references\
      \ — never both.", why: "This single rule eliminates data races at compile time. If you have a &mut T, no one else can\
      \ read or write the value. If you have &T references, the value cannot change. This is enforced statically — no runtime\
      \ overhead, no locks needed.", how_to_do_right: "Default to immutable borrows (&T). Use &mut T only when mutation is\
      \ needed. Restructure code to minimize the scope of mutable borrows. If you need shared mutability, use interior mutability\
      \ (RefCell, Mutex).", severity: critical, technologies: {lang: [rust]}, domains: {domain: [architecture, performance],
      concern: [backend, systems, concurrency]}, example_good: "fn analyze(data: &[i32]) -> Stats {\n    // Immutable borrow\
      \ — multiple readers safe\n    Stats {\n        sum: data.iter().sum(),\n        len: data.len(),\n    }\n}\n\nfn normalize(data:\
      \ &mut [f64]) {\n    // Mutable borrow — exclusive access guaranteed\n    let max = data.iter().cloned().fold(f64::NEG_INFINITY,\
      \ f64::max);\n    for val in data.iter_mut() {\n        *val /= max;\n    }\n}\n\nlet mut values = vec![1.0, 2.0, 3.0];\n\
      normalize(&mut values);         // Exclusive mutable access\nlet stats = analyze(&values);   // After mutable borrow\
      \ ends, immutable is fine\n", example_bad: "let mut data = vec![1, 2, 3];\nlet r = &data[0];       // Immutable borrow\n\
      data.push(4);           // Mutable borrow — ERROR: cannot borrow as mutable\nprintln!(\"{}\", r);       // Because immutable\
      \ borrow is still alive here\n// push() could reallocate the Vec, invalidating r — Rust prevents this\n", when_applies: Any
      project using Rust systems with ownership model, when_not_applies: projects not using Rust, sources: ["https://doc.rust-lang.org/book/ch04-02-references-and-borrowing.html"]},
  {id: "CR-RUST-003", text: "Annotate lifetimes explicitly when the compiler cannot infer them — lifetimes tie reference validity\
      \ to scope.", why: "Lifetimes tell the compiler how long a reference is valid. Without them, the compiler cannot verify\
      \ that references don't outlive the data they point to. Elision rules handle 90% of cases, but structs holding references\
      \ and functions returning references from multiple inputs need explicit annotations.", how_to_do_right: "Learn the 3\
      \ elision rules (single input lifetime, &self lifetime, multiple inputs). Add 'a annotations when the compiler asks.\
      \ For structs holding references: struct Foo<'a> { data: &'a str }. Minimize lifetime complexity — often owning data\
      \ (String vs &str) is simpler.", severity: high, technologies: {lang: [rust]}, domains: {domain: [architecture], concern: [
        backend, systems]}, example_good: "// Struct that borrows data — must declare lifetime\nstruct Config<'a> {\n    name:\
      \ &'a str,\n    values: &'a [i32],\n}\n\n// Function returning reference — lifetime ties output to input\nfn longest<'a>(x:\
      \ &'a str, y: &'a str) -> &'a str {\n    if x.len() > y.len() { x } else { y }\n}\n\n// Often simpler: own the data\n\
      struct OwnedConfig {\n    name: String,      // No lifetime needed\n    values: Vec<i32>,\n}\n", example_bad: "// This\
      \ won't compile — compiler can't determine which input the\n// output reference is tied to\nfn longest(x: &str, y: &str)\
      \ -> &str {\n    if x.len() > y.len() { x } else { y }\n}\n// error: missing lifetime specifier — expected named lifetime\
      \ parameter\n", when_applies: Projects using Rust systems with ownership model, when_not_applies: projects not using
      Rust, sources: ["https://doc.rust-lang.org/book/ch10-03-lifetime-syntax.html"]}, {id: "CR-RUST-004", text: "Use Result<T,\
      \ E> for all recoverable errors — propagate with ? operator.", why: "Result forces callers to handle errors — you cannot\
      \ accidentally ignore a Result without a compiler warning. The ? operator propagates errors with automatic From conversion,\
      \ making error handling ergonomic while maintaining explicitness.", how_to_do_right: "Return Result<T, E> from every\
      \ fallible function. Use ? to propagate. Use .map_err() or .context() (anyhow) to add context. Match on Result only\
      \ at boundaries where you handle the error.", severity: critical, technologies: {lang: [rust]}, domains: {domain: [
        architecture, reliability], concern: [backend]}, example_good: "use std::fs;\nuse std::io;\n\nfn read_config(path:\
      \ &str) -> Result<Config, io::Error> {\n    let content = fs::read_to_string(path)?;  // Propagates io::Error\n    let\
      \ config: Config = serde_json::from_str(&content)\n        .map_err(|e| io::Error::new(io::ErrorKind::InvalidData, e))?;\n\
      \    Ok(config)\n}\n\n// With anyhow for applications\nfn read_config(path: &str) -> anyhow::Result<Config> {\n    let\
      \ content = fs::read_to_string(path)\n        .context(\"failed to read config file\")?;\n    let config: Config = serde_json::from_str(&content)\n\
      \        .context(\"failed to parse config JSON\")?;\n    Ok(config)\n}\n", example_bad: "fn read_config(path: &str)\
      \ -> Config {\n    let content = fs::read_to_string(path).unwrap();  // Panics on missing file\n    serde_json::from_str(&content).unwrap()\
      \            // Panics on bad JSON\n}\n// unwrap() in application code = ticking time bomb\n", when_applies: Any project
      using Rust systems with ownership model, when_not_applies: projects not using Rust, sources: ["https://doc.rust-lang.org/book/ch09-02-recoverable-errors-with-result.html"]},
  {id: "CR-RUST-005", text: "Use thiserror for library error types (structured) and anyhow for application error types (ergonomic).",
    why: "Libraries need stable, matchable error types so callers can handle specific cases. Applications need to collect\
      \ errors from many sources with context. thiserror derives Display/Error/From automatically. anyhow wraps any error\
      \ with .context() chains.", how_to_do_right: "Library crate: #[derive(thiserror::Error)] enum with one variant per error\
      \ kind, automatic From for source errors. Application crate: anyhow::Result everywhere, .context() for error messages,\
      \ downcast only when needed.", severity: high, technologies: {lang: [rust]}, domains: {domain: [architecture, reliability],
      concern: [backend]}, example_good: "// Library — thiserror\n#[derive(Debug, thiserror::Error)]\npub enum StorageError\
      \ {\n    #[error(\"record not found: {id}\")]\n    NotFound { id: String },\n\n    #[error(\"connection failed\")]\n\
      \    Connection(#[from] tokio_postgres::Error),\n\n    #[error(\"serialization failed\")]\n    Serialization(#[from]\
      \ serde_json::Error),\n}\n\n// Application — anyhow\nasync fn handle_request(id: &str) -> anyhow::Result<Response> {\n\
      \    let user = db.get_user(id)\n        .await\n        .context(\"failed to fetch user\")?;\n    let response = render(user)\n\
      \        .context(\"failed to render response\")?;\n    Ok(response)\n}\n", example_bad: "// String errors — no structure,\
      \ no matching, no From conversion\nfn get_user(id: &str) -> Result<User, String> {\n    let row = db.query(id).map_err(|e|\
      \ format!(\"db error: {}\", e))?;\n    Ok(parse(row).map_err(|e| format!(\"parse error: {}\", e))?)\n}\n// Caller cannot\
      \ match on error type — only string comparison\n", when_applies: Projects using Rust systems with ownership model, when_not_applies: projects
      not using Rust, sources: ["https://docs.rs/thiserror/latest/thiserror/", "https://docs.rs/anyhow/latest/anyhow/"]},
  {id: "CR-RUST-006", text: "Never panic in library code — always return Result. Reserve panic for violated invariants in\
      \ applications.", why: "A panic in a library takes down the caller's entire thread or process. The library author does\
      \ not know the caller's error handling strategy. Returning Result lets the caller decide: retry, fallback, log and continue,\
      \ or propagate upward.", how_to_do_right: "Every public library function returns Result. Use panic only in application\
      \ code for programmer errors (assert!, unreachable!). If an invariant is truly impossible, document why and use unreachable!()\
      \ not unwrap().", severity: critical, technologies: {lang: [rust]}, domains: {domain: [architecture, reliability], concern: [
        backend]}, example_good: "// Library: always Result\npub fn parse_config(input: &str) -> Result<Config, ParseError>\
      \ {\n    if input.is_empty() {\n        return Err(ParseError::EmptyInput);\n    }\n    // ...\n    Ok(config)\n}\n\n\
      // Application: panic only for impossible states\nmatch direction {\n    Direction::North | Direction::South |\n   \
      \ Direction::East | Direction::West => move_player(direction),\n    // No other variants exist — this is truly unreachable\n\
      }\n", example_bad: "// Library function that panics — caller cannot recover\npub fn parse_config(input: &str) -> Config\
      \ {\n    if input.is_empty() {\n        panic!(\"empty input\");  // Kills caller's thread\n    }\n    serde_json::from_str(input).expect(\"\
      invalid JSON\")  // Also panics\n}\n", when_applies: Any project using Rust systems with ownership model, when_not_applies: projects
      not using Rust, sources: ["https://doc.rust-lang.org/book/ch09-03-to-panic-or-not-to-panic.html"]}, {id: "CR-RUST-007",
    text: "Use trait bounds (where T: Trait) for static dispatch and dyn Trait for dynamic dispatch — default to static.",
    why: "Static dispatch (generics + trait bounds) is monomorphized at compile time — zero runtime overhead, full inlining.\
      \ Dynamic dispatch (dyn Trait) has vtable indirection overhead but enables heterogeneous collections. Static dispatch\
      \ is faster; use dynamic only when you need different concrete types in the same collection.", how_to_do_right: "Default\
      \ to generics: fn process<T: Display>(item: T). Use Box<dyn Trait> only for heterogeneous collections (Vec<Box<dyn Handler>>)\
      \ or when binary size matters (many monomorphizations). Use impl Trait in argument position for convenience.", severity: medium,
    technologies: {lang: [rust]}, domains: {domain: [architecture, performance], concern: [backend]}, example_good: "// Static\
      \ dispatch — zero overhead, compiler monomorphizes\nfn log_item<T: Display>(item: &T) {\n    println!(\"[LOG] {}\",\
      \ item);\n}\n\n// Dynamic dispatch — needed for heterogeneous collection\ntrait Handler: Send + Sync {\n    fn handle(&self,\
      \ req: &Request) -> Response;\n}\n\nstruct Router {\n    handlers: Vec<Box<dyn Handler>>,  // Different concrete types\n\
      }\n\n// impl Trait — syntactic sugar for generics\nfn read_all(reader: &mut impl Read) -> io::Result<Vec<u8>> {\n  \
      \  let mut buf = Vec::new();\n    reader.read_to_end(&mut buf)?;\n    Ok(buf)\n}\n", example_bad: "// Unnecessary dynamic\
      \ dispatch — single concrete type\nfn process(items: &[Box<dyn Display>]) {\n    for item in items {\n        println!(\"\
      {}\", item);  // vtable lookup on every call\n    }\n}\n// If all items are the same type, use generics — zero overhead\n",
    when_applies: Projects using Rust systems with ownership model, when_not_applies: "low-traffic internal tools, admin dashboards,\
      \ or batch jobs where latency is irrelevant. projects not using Rust", sources: ["https://doc.rust-lang.org/book/ch17-02-trait-objects.html"]},
  {id: "CR-RUST-008", text: Implement From/Into for type conversions and derive Default for types with sensible defaults.,
    why: "From/Into provide idiomatic, discoverable type conversion that works with ? operator (automatic From conversion\
      \ on errors). Default enables struct update syntax, builder patterns, and generic code that needs a starting value.\
      \ These are the standard Rust conversion vocabulary.", how_to_do_right: "Implement From<Source> for Target — Into is\
      \ auto-derived. Use #[derive(Default)] when zero/empty/None is sensible. Implement Default manually when defaults need\
      \ computation. Never implement Into directly — always From.", severity: medium, technologies: {lang: [rust]}, domains: {
      domain: [architecture], concern: [backend]}, example_good: "#[derive(Debug, Default)]\nstruct Config {\n    host: String,\n\
      \    port: u16,\n    max_connections: usize,\n}\n\n// From conversion — enables ? operator and .into()\nimpl From<DbRow>\
      \ for User {\n    fn from(row: DbRow) -> Self {\n        User {\n            id: row.get(\"id\"),\n            name:\
      \ row.get(\"name\"),\n            email: row.get(\"email\"),\n        }\n    }\n}\n\n// Usage\nlet user: User = db_row.into();\
      \  // Clean conversion\nlet config = Config { port: 8080, ..Default::default() };\n", example_bad: "// Manual conversion\
      \ function — not discoverable, doesn't integrate\nfn db_row_to_user(row: DbRow) -> User {\n    User {\n        id: row.get(\"\
      id\"),\n        name: row.get(\"name\"),\n        email: row.get(\"email\"),\n    }\n}\n// Cannot use with ?, .into(),\
      \ or generic code expecting From\n", when_applies: Projects using Rust systems with ownership model, when_not_applies: projects
      not using Rust, sources: ["https://doc.rust-lang.org/std/convert/trait.From.html"]}, {id: "CR-RUST-009", text: "Use\
      \ tokio::spawn for concurrent tasks and tokio::select! for racing multiple futures.", why: "Async functions in Rust\
      \ are lazy — they do nothing until awaited. tokio::spawn runs a future on the runtime's thread pool concurrently. tokio::select!\
      \ races multiple futures and cancels the losers. Without these, async code runs sequentially despite looking concurrent.",
    how_to_do_right: "Use tokio::spawn for fire-and-forget or concurrent tasks. Use tokio::select! with cancellation branches\
      \ (ctrl_c, shutdown signal). Use JoinSet for dynamic numbers of spawned tasks. Always handle JoinError from spawn.",
    severity: high, technologies: {lang: [rust], framework: [tokio]}, domains: {domain: [architecture, performance], concern: [
        backend, concurrency]}, example_good: "async fn serve(listener: TcpListener, shutdown: CancellationToken) {\n    loop\
      \ {\n        tokio::select! {\n            Ok((stream, addr)) = listener.accept() => {\n                let token =\
      \ shutdown.clone();\n                tokio::spawn(async move {\n                    if let Err(e) = handle_connection(stream,\
      \ token).await {\n                        eprintln!(\"connection {addr} error: {e}\");\n                    }\n    \
      \            });\n            }\n            _ = shutdown.cancelled() => {\n                println!(\"shutting down\"\
      );\n                break;\n            }\n        }\n    }\n}\n", example_bad: "async fn serve(listener: TcpListener)\
      \ {\n    loop {\n        let (stream, _) = listener.accept().await.unwrap();\n        // Sequential! Next connection\
      \ waits until this one finishes\n        handle_connection(stream).await.unwrap();\n        // No shutdown mechanism\
      \ — runs forever\n    }\n}\n", when_applies: Projects using Rust systems with ownership model or Tokio, when_not_applies: projects
      not using Rust or Tokio, sources: ["https://tokio.rs/tokio/tutorial/spawning"]}, {id: "CR-RUST-010", text: "Ensure async\
      \ types are Send + Sync when crossing thread boundaries — tokio::spawn requires Send.", why: "tokio::spawn can run the\
      \ task on any thread in the pool. If the future holds a non-Send type (Rc, RefCell, raw pointers), it cannot be sent\
      \ to another thread — the compiler rejects it. This is Rust preventing data races at compile time.", how_to_do_right: "Use\
      \ Arc instead of Rc for shared ownership across threads. Use Mutex (tokio::sync::Mutex for async) instead of RefCell.\
      \ Hold MutexGuard only across .await if using tokio::sync::Mutex (not std::sync::Mutex).", severity: high, technologies: {
      lang: [rust], framework: [tokio]}, domains: {domain: [architecture, performance], concern: [backend, concurrency]},
    example_good: "use std::sync::Arc;\nuse tokio::sync::Mutex;\n\nlet shared_state = Arc::new(Mutex::new(HashMap::new()));\n\
      \nfor i in 0..10 {\n    let state = Arc::clone(&shared_state);\n    tokio::spawn(async move {\n        let mut map =\
      \ state.lock().await;  // tokio Mutex — safe across .await\n        map.insert(i, compute(i).await);\n    });\n}\n",
    example_bad: "use std::rc::Rc;\nuse std::cell::RefCell;\n\nlet shared = Rc::new(RefCell::new(HashMap::new()));\ntokio::spawn(async\
      \ move {\n    // ERROR: Rc cannot be sent between threads safely\n    // ERROR: RefCell cannot be shared between threads\
      \ safely\n    shared.borrow_mut().insert(1, \"value\");\n});\n", when_applies: Projects using Rust systems with ownership
      model or Tokio, when_not_applies: projects not using Rust or Tokio, sources: ["https://tokio.rs/tokio/tutorial/shared-state"]},
  {id: "CR-RUST-011", text: "Use Box<T> for heap allocation, Arc<T> for shared ownership across threads, and Weak<T> to break\
      \ reference cycles.", why: "Box gives single ownership on the heap (recursive types, large values). Arc (Atomic Reference\
      \ Count) enables multiple owners across threads — the value is dropped when the last Arc is dropped. Without Weak, two\
      \ Arcs pointing to each other create a cycle that never frees.", how_to_do_right: "Box: recursive types, trait objects,\
      \ large stack values. Arc: shared read-only data across tasks/threads. Arc<Mutex<T>>: shared mutable data. Weak: parent-child\
      \ relationships where child should not keep parent alive.", severity: high, technologies: {lang: [rust]}, domains: {
      domain: [architecture], concern: [backend, systems]}, example_good: "// Arc for shared config across async tasks\nlet\
      \ config = Arc::new(load_config()?);\n\nfor _ in 0..num_workers {\n    let cfg = Arc::clone(&config);\n    tokio::spawn(async\
      \ move {\n        run_worker(&cfg).await;  // Shared read-only access\n    });\n}\n\n// Weak to break cycles\nstruct\
      \ Node {\n    children: Vec<Arc<Node>>,\n    parent: Option<Weak<Node>>,  // Weak — won't prevent parent drop\n}\n",
    example_bad: "// Cloning data for each thread — wastes memory\nlet config = load_config()?;\nfor _ in 0..num_workers {\n\
      \    let cfg = config.clone();  // Full clone per worker — 10 copies\n    tokio::spawn(async move {\n        run_worker(&cfg).await;\n\
      \    });\n}\n", when_applies: Projects using Rust systems with ownership model, when_not_applies: projects not using
      Rust, sources: ["https://doc.rust-lang.org/book/ch15-00-smart-pointers.html"]}, {id: "CR-RUST-012", text: Minimize unsafe
      blocks — wrap unsafe code in safe abstractions with documented invariants., why: "unsafe disables Rust's borrow checker\
      \ for the block — memory safety is now YOUR responsibility. Bugs in unsafe cause undefined behavior: data races, use-after-free,\
      \ buffer overflows. The blast radius should be as small as possible.", how_to_do_right: "Write the smallest possible\
      \ unsafe block. Wrap it in a safe public function. Document SAFETY comments explaining why the invariants hold. Use\
      \ #[deny(unsafe_op_in_unsafe_fn)] to require unsafe blocks even inside unsafe fn.", severity: critical, technologies: {
      lang: [rust]}, domains: {domain: [architecture, security], concern: [backend, systems]}, example_good: "/// Returns\
      \ a slice of the buffer without bounds checking.\n///\n/// # Safety\n/// Caller must ensure `start..end` is within bounds\
      \ and\n/// the buffer is not mutated while the slice exists.\npub fn fast_slice(buf: &[u8], start: usize, end: usize)\
      \ -> &[u8] {\n    assert!(end <= buf.len() && start <= end, \"out of bounds\");\n    // SAFETY: bounds verified by assert\
      \ above\n    unsafe { buf.get_unchecked(start..end) }\n}\n", example_bad: "// Entire function is unsafe — blast radius\
      \ too large\npub unsafe fn process_buffer(ptr: *const u8, len: usize) -> Vec<u8> {\n    let slice = std::slice::from_raw_parts(ptr,\
      \ len);  // Trust caller\n    let mut result = Vec::new();\n    for &b in slice {\n        result.push(transform(b));\n\
      \    }\n    result\n    // No documentation of invariants — what must the caller guarantee?\n}\n", when_applies: Any
      project using Rust systems with ownership model, when_not_applies: projects not using Rust, sources: ["https://doc.rust-lang.org/book/ch19-01-unsafe-rust.html"]},
  {id: "CR-RUST-013", text: "Put unit tests in the same file with #[cfg(test)] — put integration tests in tests/ directory.",
    why: "Unit tests in the same file can test private functions and have zero cognitive distance from the code they test.\
      \ Integration tests in tests/ can only use the public API — they verify the crate works as a consumer sees it. This\
      \ separation is built into Cargo's test runner.", how_to_do_right: "#[cfg(test)] mod tests at the bottom of each file\
      \ for unit tests. tests/ directory for integration tests. Use #[test] attribute. Use doc tests (///) for example-driven\
      \ documentation that stays tested.", severity: medium, technologies: {lang: [rust]}, domains: {domain: [architecture,
        testing], concern: [backend]}, example_good: "// src/lib.rs\npub fn add(a: i32, b: i32) -> i32 { a + b }\n\nfn internal_helper(x:\
      \ i32) -> i32 { x * 2 }\n\n#[cfg(test)]  // Only compiled during `cargo test`\nmod tests {\n    use super::*;\n\n  \
      \  #[test]\n    fn test_add() {\n        assert_eq!(add(2, 3), 5);\n    }\n\n    #[test]\n    fn test_internal() {\n\
      \        assert_eq!(internal_helper(5), 10);  // Can test private fn\n    }\n}\n\n// tests/integration_test.rs — can\
      \ only use public API\nuse my_crate::add;\n\n#[test]\nfn test_add_integration() {\n    assert_eq!(add(100, 200), 300);\n\
      }\n", example_bad: "// All tests in separate files — private functions untestable\n// tests/test_add.rs\nuse my_crate::add;\n\
      #[test]\nfn test_add() { assert_eq!(add(2, 3), 5); }\n// Cannot test internal_helper — it's private\n// Unit tests belong\
      \ in the same file as the code\n", when_applies: Projects using Rust systems with ownership model, when_not_applies: "exploratory\
      \ prototypes, one-off scripts, or spike investigations. projects not using Rust", sources: ["https://doc.rust-lang.org/book/ch11-03-test-organization.html"]},
  {id: "CR-RUST-014", text: "Use proptest for property-based testing and criterion for benchmarks — not hand-written random\
      \ tests.", why: "Hand-written test cases only cover what the developer imagines. Property-based testing generates hundreds\
      \ of random inputs and verifies properties hold for all of them. Criterion provides statistically rigorous benchmarks\
      \ with regression detection — manual timing with Instant::now is unreliable.", how_to_do_right: "proptest: define properties\
      \ (sorted output is sorted, parse(format(x)) == x, length invariants). criterion: bench functions in benches/ directory,\
      \ use black_box to prevent optimization, compare against baseline.", severity: medium, technologies: {lang: [rust]},
    domains: {domain: [architecture, testing], concern: [backend]}, example_good: "// Property-based testing with proptest\n\
      use proptest::prelude::*;\n\nproptest! {\n    #[test]\n    fn parse_roundtrip(s in \"[a-zA-Z0-9]{1,100}\") {\n     \
      \   let encoded = encode(&s);\n        let decoded = decode(&encoded).unwrap();\n        prop_assert_eq!(decoded, s);\n\
      \    }\n\n    #[test]\n    fn sort_preserves_length(mut v in prop::collection::vec(any::<i32>(), 0..1000)) {\n     \
      \   let original_len = v.len();\n        v.sort();\n        prop_assert_eq!(v.len(), original_len);\n    }\n}\n", example_bad: "#[test]\n\
      fn test_roundtrip() {\n    // Only tests 3 cases — what about unicode? empty? 10KB strings?\n    assert_eq!(decode(&encode(\"\
      hello\")).unwrap(), \"hello\");\n    assert_eq!(decode(&encode(\"world\")).unwrap(), \"world\");\n    assert_eq!(decode(&encode(\"\
      123\")).unwrap(), \"123\");\n}\n", when_applies: Projects using Rust systems with ownership model, when_not_applies: "exploratory\
      \ prototypes, one-off scripts, or spike investigations. projects not using Rust", sources: ["https://docs.rs/proptest/latest/proptest/",
      "https://docs.rs/criterion/latest/criterion/"]}, {id: "CR-RUST-015", text: "Use Cargo workspaces for multi-crate projects\
      \ — shared dependencies, single lockfile.", why: "Multiple standalone crates in one repo create dependency version conflicts,\
      \ duplicate builds, and no shared lockfile. Workspaces ensure all crates use compatible dependency versions, build once,\
      \ and share a target/ directory.", how_to_do_right: "Root Cargo.toml with [workspace] members list. Shared deps in [workspace.dependencies].\
      \ Each member crate uses dep.workspace = true. One Cargo.lock for the entire workspace.", severity: medium, technologies: {
      lang: [rust], library: [cargo]}, domains: {domain: [architecture], concern: [backend]}, example_good: "# Root Cargo.toml\n\
      [workspace]\nmembers = [\"api\", \"core\", \"cli\"]\n\n[workspace.dependencies]\nserde = { version = \"1.0\", features\
      \ = [\"derive\"] }\ntokio = { version = \"1\", features = [\"full\"] }\nanyhow = \"1.0\"\n\n# core/Cargo.toml\n[dependencies]\n\
      serde.workspace = true    # Uses workspace version\nanyhow.workspace = true\n", example_bad: "# api/Cargo.toml\n[dependencies]\n\
      serde = \"1.0.190\"\ntokio = \"1.34\"\n\n# core/Cargo.toml\n[dependencies]\nserde = \"1.0.185\"   # Different version\
      \ — potential conflicts\ntokio = \"1.32\"      # Different version — builds both\n", when_applies: Projects using Rust
      systems with ownership model or Cargo, when_not_applies: "small scripts under 100 lines, single-purpose utilities. projects\
      \ not using Rust or Cargo", sources: ["https://doc.rust-lang.org/book/ch14-03-cargo-workspaces.html"]}, {id: "CR-RUST-016",
    text: Enable clippy with deny level in CI — clippy catches hundreds of correctness and performance issues., why: "Clippy\
      \ catches real bugs: redundant clones, lossy conversions, missing error handling, performance anti-patterns, and more.\
      \ At deny level, any clippy warning fails the build — preventing issues from accumulating. It is the most effective\
      \ single quality tool in the Rust ecosystem.", how_to_do_right: "Add #![deny(clippy::all)] to lib.rs/main.rs. Run cargo\
      \ clippy -- -D warnings in CI. Use #[allow(clippy::specific_lint)] for justified exceptions with a comment explaining\
      \ why.", severity: high, technologies: {lang: [rust], library: [cargo]}, domains: {domain: [architecture, quality],
      concern: [backend]}, example_good: "// lib.rs\n#![deny(clippy::all)]\n#![deny(clippy::pedantic)]\n#![allow(clippy::module_name_repetitions)]\
      \  // Justified: our naming convention\n\n// CI pipeline\n// - run: cargo clippy -- -D warnings\n// - run: cargo audit\
      \  # Check for vulnerable dependencies\n// - run: cargo fmt -- --check  # Enforce formatting\n", example_bad: "// No\
      \ clippy configured — warnings accumulate silently\n// CI only runs: cargo build && cargo test\n// Misses: redundant\
      \ clones, lossy casts, unwrap in prod code,\n// deprecated API usage, performance anti-patterns\n", when_applies: Projects
      using Rust systems with ownership model or Cargo, when_not_applies: projects not using Rust or Cargo, sources: ["https://doc.rust-lang.org/clippy/"]},
  {id: "CR-RUST-017", text: "Use tokio::sync::Mutex over std::sync::Mutex when the lock is held across .await points.", why: "std::sync::Mutex\
      \ blocks the OS thread while waiting for the lock. In async code, this blocks the entire tokio worker thread, starving\
      \ other tasks. tokio::sync::Mutex yields the task back to the runtime while waiting, keeping the thread productive.",
    how_to_do_right: "std::sync::Mutex: fine for brief, synchronous critical sections (no .await inside). tokio::sync::Mutex:\
      \ required when the lock guard lives across an .await. Use tokio::sync::RwLock for read-heavy async workloads.", severity: high,
    technologies: {lang: [rust], framework: [tokio]}, domains: {domain: [architecture, performance], concern: [backend, concurrency]},
    example_good: "use tokio::sync::Mutex;\n\nlet cache = Arc::new(Mutex::new(HashMap::new()));\n\nasync fn update_cache(cache:\
      \ &Mutex<HashMap<String, Value>>, key: String) {\n    let value = fetch_from_db(&key).await;  // Async I/O\n    let\
      \ mut map = cache.lock().await;        // Yields if locked\n    map.insert(key, value);\n    // Lock released when map\
      \ is dropped\n}\n", example_bad: "use std::sync::Mutex;  // WRONG for async\n\nlet cache = Arc::new(Mutex::new(HashMap::new()));\n\
      \nasync fn update_cache(cache: &Mutex<HashMap<String, Value>>, key: String) {\n    let mut map = cache.lock().unwrap();\
      \  // Blocks OS thread\n    let value = fetch_from_db(&key).await; // .await while holding std lock!\n    map.insert(key,\
      \ value);\n    // Other tasks on this thread are starved\n}\n", when_applies: Projects using Rust systems with ownership
      model or Tokio, when_not_applies: projects not using Rust or Tokio, sources: ["https://tokio.rs/tokio/tutorial/shared-state"]},
  {id: "CR-RUST-018", text: "Use extern \"C\" with well-defined types for FFI boundaries — never pass Rust-specific types\
      \ across FFI.", why: "Rust types (String, Vec, enum with data) have internal layout that C code cannot understand. Passing\
      \ them across FFI causes undefined behavior. The FFI boundary must use C-compatible types: *const c_char, c_int, #[repr(C)]\
      \ structs.", how_to_do_right: "Use #[repr(C)] on structs shared across FFI. Use CString/CStr for string conversion.\
      \ Use libc types (c_int, c_char). Wrap all FFI calls in safe Rust functions. Use bindgen for auto-generating bindings.",
    severity: critical, technologies: {lang: [rust]}, domains: {domain: [architecture], concern: [backend, systems]}, example_good: "use\
      \ std::ffi::{CStr, CString};\nuse std::os::raw::c_char;\n\nextern \"C\" {\n    fn c_process(input: *const c_char) ->\
      \ i32;\n}\n\n/// Safe wrapper around C function\npub fn process(input: &str) -> Result<i32, std::ffi::NulError> {\n\
      \    let c_input = CString::new(input)?;\n    // SAFETY: c_input is a valid null-terminated C string,\n    // and c_process\
      \ only reads from the pointer during the call\n    let result = unsafe { c_process(c_input.as_ptr()) };\n    Ok(result)\n\
      }\n", example_bad: "extern \"C\" {\n    fn c_process(input: *const u8, len: usize) -> i32;\n}\n\npub fn process(input:\
      \ &str) -> i32 {\n    // Passing Rust &str internals directly — not null-terminated!\n    unsafe { c_process(input.as_ptr(),\
      \ input.len()) }\n    // If C code expects null-terminated string: buffer overread / UB\n}\n", when_applies: Any project
      using Rust systems with ownership model, when_not_applies: projects not using Rust, sources: ["https://doc.rust-lang.org/nomicon/ffi.html"]},
  {id: "CR-RUST-019", text: "Use iterators and iterator adapters instead of manual loops — the compiler optimizes them to\
      \ equivalent or faster code.", why: "Rust iterators are zero-cost abstractions: .map().filter().collect() compiles to\
      \ the same machine code as a hand-written loop, often better due to LLVM optimizations like loop fusion. They also prevent\
      \ off-by-one errors and make intent clearer.", how_to_do_right: "Use .iter()/.into_iter() with .map(), .filter(), .flat_map(),\
      \ .fold(). Use .collect() to materialize. Chain adapters — they fuse into a single pass. Use rayon's .par_iter() for\
      \ automatic parallelization.", severity: medium, technologies: {lang: [rust]}, domains: {domain: [architecture, performance],
      concern: [backend]}, example_good: "// Chained iterators — single pass, zero allocation until collect\nlet active_emails:\
      \ Vec<String> = users\n    .iter()\n    .filter(|u| u.is_active)\n    .map(|u| u.email.clone())\n    .collect();\n\n\
      // Parallel with rayon — just change iter() to par_iter()\nuse rayon::prelude::*;\nlet results: Vec<_> = data\n    .par_iter()\n\
      \    .map(|item| expensive_computation(item))\n    .collect();\n", example_bad: "// Manual loop — same performance but\
      \ more error-prone\nlet mut active_emails = Vec::new();\nfor i in 0..users.len() {      // Off-by-one risk\n    if users[i].is_active\
      \ {      // Bounds check on each access\n        active_emails.push(users[i].email.clone());\n    }\n}\n", when_applies: Projects
      using Rust systems with ownership model, when_not_applies: "low-traffic internal tools, admin dashboards, or batch jobs\
      \ where latency is irrelevant. projects not using Rust", sources: ["https://doc.rust-lang.org/book/ch13-02-iterators.html"]},
  {id: "CR-RUST-020", text: Profile before optimizing — use cargo flamegraph for CPU and DHAT for allocations., why: "Developers\
      \ consistently guess wrong about bottlenecks. Optimizing the wrong code wastes time and often makes code harder to maintain.\
      \ Flamegraphs show exactly where CPU time is spent. DHAT shows allocation hot spots. Data beats intuition.", how_to_do_right: "cargo\
      \ flamegraph for CPU profiling (generates SVG flamegraph). cargo bench with criterion for micro-benchmarks. DHAT (dhat\
      \ crate) for allocation profiling. Profile release builds (--release) — debug builds have different hot spots.", severity: medium,
    technologies: {lang: [rust], library: [cargo]}, domains: {domain: [architecture, performance], concern: [backend]}, example_good: "//\
      \ 1. Profile first\n// cargo flamegraph --release -- --bench my_benchmark\n// -> identifies hot function: parse_json\
      \ taking 40% CPU\n\n// 2. Benchmark the hot path\nuse criterion::{criterion_group, criterion_main, Criterion};\n\nfn\
      \ bench_parse(c: &mut Criterion) {\n    let data = include_str!(\"../testdata/large.json\");\n    c.bench_function(\"\
      parse_json\", |b| {\n        b.iter(|| {\n            std::hint::black_box(parse_json(data))\n        });\n    });\n\
      }\n\ncriterion_group!(benches, bench_parse);\ncriterion_main!(benches);\n\n// 3. Optimize and re-benchmark — verify\
      \ improvement\n", example_bad: "// \"I think this function is slow\" — no profiling data\n// Spent 3 days optimizing\
      \ string parsing\n// Actual bottleneck: network I/O (90% of wall time)\n// Optimization impact: unmeasurable\n", when_applies: Projects
      using Rust systems with ownership model or Cargo, when_not_applies: "low-traffic internal tools, admin dashboards, or\
      \ batch jobs where latency is irrelevant. projects not using Rust or Cargo", sources: ["https://doc.rust-lang.org/cargo/commands/cargo-bench.html"]}]
