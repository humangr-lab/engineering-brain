layer: rules
technology: SRE
domain: reliability
knowledge:
- id: CR-SRE-RISK-001
  text: Never pursue 100% availability — it is the wrong target. The marginal cost of each additional nine of reliability
    increases exponentially while user-perceived benefit plateaus due to unreliable intermediaries (ISPs, WiFi, device hardware).
  why: 'Google observed that users on unreliable networks (mobile, WiFi) cannot distinguish between 99.99% and 99.999% service
    availability because the network itself drops 0.01%-1% of requests. Pursuing 100% means infinite cost for zero perceptible
    improvement. Every engineering hour spent on the last 0.001% is an hour NOT spent shipping features users actually want.
    The real cost is opportunity cost — teams chasing unnecessary nines deliver fewer features, slower iterations, and fall
    behind competitors who ship faster at "good enough" reliability. A service that is 99.999% available but missing critical
    features loses to a 99.9% available competitor with better functionality.

    '
  how_to_do_right: '1. Set an explicit availability target based on user expectations and business impact — not on engineering
    pride.

    2. Measure against the target, not against perfection. If your SLO is 99.95%, hitting 99.97% is success — hitting 99.999%
    means you are over-investing.

    3. Use the gap between actual and target as your error budget for deploying changes.

    4. Review targets quarterly: if you consistently exceed your SLO by large margins, either lower the target or invest that
    reliability engineering elsewhere.

    5. Communicate to stakeholders that higher reliability = slower feature velocity. Make the tradeoff explicit.

    '
  severity: critical
  technologies:
    platform: [cloud, kubernetes]
  domains:
    domain: [architecture, mathematics, reliability]
    concern: [cost_modeling, availability]
  example_good: "# Define explicit SLO based on user needs, not perfection\nSLO_AVAILABILITY = 0.9995  # 99.95% — matches user expectations\nerror_budget = 1.0 - SLO_AVAILABILITY  # 0.05% to spend on velocity\n\ndef check_error_budget(actual_failures, total_requests):\n    actual_error_rate = actual_failures / total_requests\n    budget_remaining = error_budget - actual_error_rate\n    if budget_remaining > 0:\n        print(f'Budget remaining: {budget_remaining:.4%} — safe to deploy')\n    else:\n        print(f'Budget exhausted — freeze deployments')\n"
  example_bad: "# Anti-pattern: pursuing 100% availability\nSLO_AVAILABILITY = 1.0  # 100% — impossible and wasteful\n\ndef on_any_error(error):\n    # Wake up entire team for ANY error, even transient ones\n    page_all_engineers(error)  # Burnout guaranteed\n    halt_all_deployments()     # Feature velocity = 0\n    # No error budget concept — every error is a crisis\n"
  when_applies: "When setting availability targets for any service, especially during initial SLO definition or quarterly SLO review"
  sources:
  - url: https://sre.google/sre-book/embracing-risk/
    title: 'Google SRE Book — Chapter 3: Embracing Risk'
  validation_status: cross_checked
- id: CR-SRE-RISK-002
  text: Measure availability by request success rate (yield), not by uptime clock. Uptime-based availability masks partial
    failures and is meaningless for globally distributed systems where "the service" is never fully up or fully down.
  why: 'Traditional uptime measurement (minutes_up / total_minutes) assumes binary state: system is either up or down. Modern
    distributed systems degrade gracefully — one datacenter may be down while others serve traffic. A global service can have
    50% of its backends down and still serve 95% of requests successfully. Uptime-based measurement would report this as "down"
    when users experienced only minor degradation. Google moved to request success rate (successful_requests / total_requests)
    because it directly measures what users experience. A system serving 2.5M requests/day with a 99.99% SLO can serve up
    to 250 failed requests before breaching its target — this is concrete, measurable, and actionable.

    '
  how_to_do_right: '1. Define availability as: successful_requests / total_requests over a rolling window (e.g., 28 days).

    2. Define "successful" precisely: HTTP 5xx = failure, 4xx = not failure (client error), timeout > threshold = failure.

    3. Instrument at the load balancer or API gateway level for ground truth — do not rely on application self-reporting.

    4. Calculate per-service, not per-machine. One machine failing in a 100-machine fleet is not an outage if traffic is re-routed.

    5. Use percentile latency alongside availability: a request that takes 30 seconds is "successful" but unacceptable.

    6. Dashboard the error budget remaining in real-time so teams know their deployment capacity.

    '
  severity: critical
  technologies:
    platform: [cloud, kubernetes, grafana, prometheus]
  domains:
    domain: [mathematics, observability, reliability]
    concern: [cost_modeling, availability]
  example_good: "# Measure availability by request success rate (yield)\nimport prometheus_client\n\nREQUESTS_TOTAL = prometheus_client.Counter('http_requests_total', 'Total requests', ['status'])\nREQUESTS_SUCCESS = prometheus_client.Counter('http_requests_success', 'Successful requests')\n\ndef calculate_availability(window_seconds=2419200):  # 28-day window\n    total = REQUESTS_TOTAL._value.get()\n    success = REQUESTS_SUCCESS._value.get()\n    if total == 0:\n        return 1.0\n    return success / total  # Request success rate\n\n# SLO: 99.99% = max 250 failures per 2.5M requests/day\n"
  example_bad: "# Anti-pattern: measuring availability by uptime clock\nimport time\n\nSERVICE_START_TIME = time.time()\nDOWNTIME_SECONDS = 0\n\ndef get_availability():\n    total_time = time.time() - SERVICE_START_TIME\n    uptime = total_time - DOWNTIME_SECONDS\n    return uptime / total_time  # Binary up/down — ignores partial failures\n    # A global service with 50% of backends down still serves 95% of requests\n    # but this metric reports it as 'down'\n"
  when_applies: "When defining how to measure and report service availability, especially for distributed systems with partial failure modes"
  sources:
  - url: https://sre.google/sre-book/embracing-risk/
    title: 'Google SRE Book — Chapter 3: Embracing Risk'
  validation_status: cross_checked
- id: CR-SRE-RISK-003
  text: Use error budgets to align incentives between product development and operations. The error budget is the mathematical
    difference between your SLO and 100% — it belongs to the product team to spend on feature velocity.
  why: 'Before error budgets, Google experienced chronic conflict between SRE (wanting stability) and product teams (wanting
    fast releases). Each side had legitimate goals but no shared framework for resolution. Error budgets solved this by making
    the tradeoff explicit and data-driven. If your SLO is 99.95%, your error budget is 0.05% of requests per quarter. Product
    teams can push releases, run experiments, and take risks as long as the error budget has remaining capacity. When the
    budget is exhausted, releases halt until reliability improves. This removes politics: the data decides, not the loudest
    voice. It also makes product teams self-policing — they stop pushing risky releases when their own budget is low because
    THEY feel the consequence (frozen deployments), not just ops.

    '
  how_to_do_right: '1. Calculate error budget: (1 - SLO) × total_requests_per_period. For 99.95% SLO with 100M requests/month
    = 50,000 allowed failures.

    2. Track budget consumption in real-time on a shared dashboard visible to both product and SRE.

    3. Define clear policy: when budget < 20%, slow down releases. When budget = 0%, freeze deployments.

    4. External events (datacenter failures, upstream outages) also consume budget — this creates shared responsibility.

    5. Review and adjust SLOs quarterly. If the budget is never spent, the SLO may be too loose.

    6. Document the error budget policy in a written agreement between product and SRE leadership.

    '
  severity: critical
  technologies:
    platform: [cloud, deployment, kubernetes]
  domains:
    domain: [mathematics, reliability]
    concern: [cost_modeling, availability]
  example_good: "# Error budget policy with data-driven release decisions\nclass ErrorBudget:\n    def __init__(self, slo: float, period_requests: int):\n        self.slo = slo\n        self.allowed_failures = int((1 - slo) * period_requests)\n        self.consumed_failures = 0\n\n    @property\n    def remaining_pct(self) -> float:\n        return max(0, 1 - self.consumed_failures / self.allowed_failures) * 100\n\n    def can_deploy(self) -> bool:\n        return self.remaining_pct > 20  # Freeze below 20%\n\n# 99.95% SLO, 100M requests/month = 50,000 allowed failures\nbudget = ErrorBudget(slo=0.9995, period_requests=100_000_000)\n"
  example_bad: "# Anti-pattern: no error budget — politics decides releases\ndef should_deploy(pm_says_urgent: bool, sre_says_risky: bool) -> bool:\n    # Whoever has more org power wins\n    if pm_says_urgent:\n        return True  # PM always overrides SRE\n    return not sre_says_risky\n    # No data, no shared framework, no accountability\n    # Product teams never feel deployment consequences\n"
  when_applies: "When establishing the relationship between product velocity and reliability, or when resolving conflicts between product and SRE teams"
  sources:
  - url: https://sre.google/sre-book/embracing-risk/
    title: 'Google SRE Book — Chapter 3: Embracing Risk'
  validation_status: cross_checked
- id: CR-SRE-RISK-004
  text: Differentiate reliability targets for infrastructure vs. consumer services. Infrastructure services must offer tiered
    reliability levels because different consumers have conflicting requirements — one size does NOT fit all.
  why: 'Google learned that a single Bigtable cluster cannot serve both low-latency interactive users and high-throughput
    batch jobs well. Low-latency requires over-provisioned capacity with fast failover (expensive). Batch jobs tolerate higher
    latency and occasional retries (cheap). Running both on the same tier means either over-paying for batch or under-serving
    interactive. The solution is partitioned tiers: a "premium" low-latency tier costing 2-5x more, and a "standard" throughput-optimized
    tier. Each consumer selects the tier matching their needs. This same principle applies to any shared infrastructure: databases,
    message queues, caches. Without explicit tiers, all consumers implicitly demand the highest tier, inflating costs for
    everyone.

    '
  how_to_do_right: '1. Define 2-3 service tiers with explicit SLOs (e.g., Premium: 99.99%, p99 < 10ms; Standard: 99.9%, p99
    < 200ms).

    2. Price or chargeback each tier to make cost visible to consumers.

    3. Document the tiers and their tradeoffs — latency, throughput, durability, cost.

    4. Require consumers to explicitly choose a tier at onboarding, not get the highest by default.

    5. Monitor per-tier SLOs independently. A breach in Standard should not trigger Premium-tier incident response.

    6. Review tier assignments quarterly — some consumers outgrow their tier as usage patterns change.

    '
  severity: high
  technologies:
    platform: [cloud, redis, kubernetes, kafka]
  domains:
    domain: [architecture, operations, deployment, mathematics, reliability]
    concern: [cost_modeling, availability]
  example_good: "# Tiered infrastructure with explicit SLOs per tier\nfrom enum import Enum\n\nclass ServiceTier(Enum):\n    PREMIUM = 'premium'    # 99.99%, p99 < 10ms, 5x cost\n    STANDARD = 'standard'  # 99.9%, p99 < 200ms, 1x cost\n    BATCH = 'batch'        # 99.5%, no latency SLO, 0.3x cost\n\nTIER_SLOS = {\n    ServiceTier.PREMIUM: {'availability': 0.9999, 'p99_ms': 10},\n    ServiceTier.STANDARD: {'availability': 0.999, 'p99_ms': 200},\n    ServiceTier.BATCH: {'availability': 0.995, 'p99_ms': None},\n}\n\ndef onboard_consumer(consumer_id: str, tier: ServiceTier):\n    \"\"\"Require explicit tier selection at onboarding.\"\"\"\n    print(f'Consumer {consumer_id} → {tier.value} (SLO: {TIER_SLOS[tier]})')\n"
  example_bad: "# Anti-pattern: single tier for all consumers\nSINGLE_SLO = {'availability': 0.9999, 'p99_ms': 10}  # Premium for everyone\n\ndef handle_request(request):\n    # Batch jobs get the same expensive treatment as interactive users\n    # Over-paying for batch, under-investing for interactive\n    return process_with_premium_resources(request)\n"
  when_applies: "When designing shared infrastructure services (databases, caches, message queues) consumed by teams with different reliability and latency requirements"
  sources:
  - url: https://sre.google/sre-book/embracing-risk/
    title: 'Google SRE Book — Chapter 3: Embracing Risk'
  validation_status: cross_checked
- id: CR-SRE-RISK-005
  text: Quantify the cost of reliability improvements before committing engineering effort. If the cost of gaining one additional
    nine exceeds the revenue impact of that nine, the investment is wasteful.
  why: 'Google developed a concrete methodology: for a service generating $1M/year in revenue, improving from 99.9% to 99.99%
    saves 0.09% of revenue = $900/year. If the engineering effort to achieve that nine costs more than $900, the investment
    has negative ROI. This sounds obvious but most organizations never do this calculation — they pursue reliability improvements
    based on pride, fear, or arbitrary targets. The SRE Book explicitly states that background ISP error rates (0.01%-1%)
    provide a practical floor: improvements below this level are imperceptible to users regardless of the math. Many teams
    waste months chasing five-nines for services where three-nines would be indistinguishable to end users.

    '
  how_to_do_right: '1. Calculate revenue-per-request or revenue-per-minute for each service.

    2. Multiply by the delta in error rate between current and target reliability.

    3. Compare against engineering cost (salary × hours × overhead) for the improvement.

    4. Factor in ISP/network error rates as the perception floor — improvements below this are invisible.

    5. Present the ROI calculation to stakeholders before greenlighting reliability projects.

    6. Re-evaluate when business metrics change (revenue growth may justify previously uneconomical improvements).

    '
  severity: high
  technologies:
    lang: [general]
    platform: [cloud]
  domains:
    domain: [mathematics, reliability]
    concern: [cost_modeling, availability]
  example_good: "# Quantify reliability improvement ROI before committing\ndef reliability_roi(annual_revenue: float, current_nines: float, target_nines: float,\n                    engineering_cost: float, isp_error_floor: float = 0.0001) -> dict:\n    current_error = 1 - current_nines\n    target_error = 1 - target_nines\n    delta = current_error - target_error\n    if delta < isp_error_floor:\n        return {'verdict': 'REJECT', 'reason': 'Below ISP perception floor'}\n    revenue_saved = annual_revenue * delta\n    roi = (revenue_saved - engineering_cost) / engineering_cost\n    return {'verdict': 'APPROVE' if roi > 0 else 'REJECT', 'roi': roi,\n            'revenue_saved': revenue_saved, 'cost': engineering_cost}\n\n# Example: $1M revenue, 99.9% -> 99.99%, $50K eng cost\nprint(reliability_roi(1_000_000, 0.999, 0.9999, 50_000))\n"
  example_bad: "# Anti-pattern: pursuing nines without ROI calculation\ndef improve_reliability():\n    # 6 months of engineering effort to go from 99.99% to 99.999%\n    # No one calculated that this saves $9/year on a $100K service\n    # ISP error rates are 0.01%-1% so users cannot tell the difference\n    dedicate_team_for_six_months()\n    # Cost: $500K in engineering time. Benefit: $9/year.\n"
  when_applies: "When evaluating whether to invest engineering effort in improving service reliability by additional nines"
  sources:
  - url: https://sre.google/sre-book/embracing-risk/
    title: 'Google SRE Book — Chapter 3: Embracing Risk'
  validation_status: cross_checked
- id: CR-SRE-RISK-006
  text: Analyze failure modes, not just failure rates. Two services with identical 99.9% availability can have radically different
    user experiences — one with constant low-level errors vs. one with rare complete outages.
  why: 'A service that drops 0.1% of every request evenly is experienced as "occasionally slow" — users retry and succeed.
    A service that has one 8-hour complete outage per year (same math) is experienced as a catastrophic event that makes the
    news. Google found that failure mode matters more than failure rate for user satisfaction. Some services (e.g., ad serving)
    tolerate constant low-level degradation because each individual failure has low impact. Other services (e.g., payment
    processing) cannot tolerate even brief complete outages because each failure has high impact. Privacy-critical services
    may intentionally choose full shutdown over partial degradation to prevent data leaks.

    '
  how_to_do_right: '1. Characterize your service''s failure modes: gradual degradation, partial outage, complete outage, data
    corruption.

    2. Match failure mode to business impact: which is worse for YOUR users — constant 0.1% errors or rare full outages?

    3. Design systems to fail in the preferred mode: circuit breakers produce clean failures, retry storms produce cascading
    degradation.

    4. For privacy/financial services, prefer hard failures (return error) over soft degradation (serve stale/wrong data).

    5. Test each failure mode explicitly in game days — do not assume the system degrades gracefully without evidence.

    6. Set different alerting thresholds for different failure modes — a 0.1% error rate sustained for 1 hour is different
    from a 100% error rate for 30 seconds.

    '
  severity: high
  technologies:
    lang: [general]
    platform: [cloud]
  domains:
    domain: [architecture, mathematics, reliability]
    concern: [cost_modeling, availability]
  example_good: "# Characterize failure modes and match to business impact\nfrom enum import Enum\n\nclass FailureMode(Enum):\n    GRADUAL = 'gradual_degradation'  # 0.1% constant error rate\n    PARTIAL = 'partial_outage'       # Some endpoints down\n    COMPLETE = 'complete_outage'     # Full service down\n    CORRUPTION = 'data_corruption'   # Wrong data served\n\nSERVICE_FAILURE_PREFERENCES = {\n    'ad_serving': FailureMode.GRADUAL,     # Low per-request impact\n    'payment_processing': FailureMode.COMPLETE,  # Prefer hard fail over wrong charges\n    'user_data_api': FailureMode.COMPLETE,  # Never serve wrong user data\n}\n\ndef configure_circuit_breaker(service: str):\n    preferred = SERVICE_FAILURE_PREFERENCES[service]\n    if preferred == FailureMode.COMPLETE:\n        return {'fail_fast': True, 'never_serve_stale': True}\n    return {'fail_fast': False, 'serve_degraded': True}\n"
  example_bad: "# Anti-pattern: treating all failures identically\ndef handle_error(service, error):\n    # Same response for every service, every failure mode\n    retry(3)  # Retry storms cause cascading degradation\n    # No distinction between 'serve stale data' vs 'hard fail'\n    # Payment service retries could cause double-charges\n    # Privacy service retries could leak wrong user's data\n"
  when_applies: "When designing failure handling for services where the type of failure matters more than the failure rate, especially financial or privacy-critical services"
  sources:
  - url: https://sre.google/sre-book/embracing-risk/
    title: 'Google SRE Book — Chapter 3: Embracing Risk'
  validation_status: cross_checked
- id: CR-SRE-RISK-007
  text: Treat your SLO as both a floor AND a ceiling. Consistently exceeding your SLO wastes resources, creates unrealistic
    user expectations, and reduces your ability to make changes safely.
  why: 'If your SLO is 99.95% and you consistently deliver 99.999%, two bad things happen. First, users and dependent services
    calibrate to the actual performance, not the SLO — when you eventually regress to 99.95% (which is within target), they
    perceive it as an outage. Second, you have no room to deploy risky changes because any regression would violate expectations
    even though it is within budget. Google explicitly recommends "spending" error budget by deploying faster, running more
    experiments, and doing planned maintenance. A team that never uses its error budget is operating too conservatively. The
    SLO should be a target band, not a minimum to exceed indefinitely.

    '
  how_to_do_right: '1. If actual availability consistently exceeds SLO by > 0.1%, intentionally use the budget: ship features
    faster, run chaos experiments, do upgrades.

    2. Do NOT let marketing or sales cite actual performance as a commitment — the SLO is the commitment.

    3. Consider intentionally injecting small amounts of error (synthetic error injection) to prevent dependency on over-reliability.

    4. Track "error budget remaining" as a deployment capacity metric, not just a reliability metric.

    5. If you can never spend the budget, the SLO is too conservative — tighten it or redirect reliability resources.

    '
  severity: high
  technologies:
    platform: [cloud, deployment, kubernetes]
  domains:
    domain: [mathematics, reliability]
    concern: [cost_modeling, availability]
  example_good: "# Treat SLO as both floor AND ceiling — spend excess budget\nclass SLOManager:\n    def __init__(self, slo: float):\n        self.slo = slo\n        self.ceiling_margin = 0.001  # Alert if exceeding SLO by > 0.1%\n\n    def evaluate(self, actual: float) -> str:\n        if actual < self.slo:\n            return 'BELOW_SLO: invest in reliability'\n        if actual > self.slo + self.ceiling_margin:\n            return 'ABOVE_CEILING: spend budget — ship faster, run chaos experiments'\n        return 'ON_TARGET: healthy operating range'\n\nmgr = SLOManager(slo=0.9995)\nprint(mgr.evaluate(0.99999))  # 'ABOVE_CEILING: spend budget...'\n"
  example_bad: "# Anti-pattern: treating SLO only as a floor\nSLO = 0.9995\n\ndef check_reliability(actual: float):\n    if actual >= SLO:\n        print('All good!')  # Never questions over-reliability\n    # Consistently 99.999% for 12 months\n    # Users now EXPECT 99.999% — when we regress to 99.95% (within SLO)\n    # they perceive an outage. We created a ticking time bomb.\n"
  when_applies: "When a service consistently exceeds its SLO by a large margin, creating implicit dependencies on over-reliability"
  sources:
  - url: https://sre.google/sre-book/embracing-risk/
    title: 'Google SRE Book — Chapter 3: Embracing Risk'
  validation_status: cross_checked
- id: CR-SRE-RISK-008
  text: Optimize for user happiness, not for infrastructure metrics. The goal of reliability engineering is to make users
    satisfied — availability, latency, correctness, and freshness are proxies, not the actual goal.
  why: 'Google observed that teams optimizing for infrastructure metrics (CPU utilization, p99 latency, error rate) sometimes
    missed what users actually cared about. A search service with 99.99% availability but stale results is worse than 99.9%
    availability with fresh results. An e-commerce service with low latency but incorrect pricing is worse than a slower service
    with correct prices. The SRE Book frames all reliability work as risk management for user happiness. This means the metrics
    you choose must reflect user-visible outcomes, not internal health signals. A service can have zero alerts firing and
    still provide a terrible user experience if the alerts measure the wrong things.

    '
  how_to_do_right: '1. Define SLIs (Service Level Indicators) from the user''s perspective: request latency as perceived by
    the user, not as measured at the server.

    2. Include correctness and freshness metrics, not just availability and latency.

    3. Use real user monitoring (RUM) alongside synthetic monitoring.

    4. Periodically validate that your SLIs correlate with user satisfaction (NPS, support tickets, churn).

    5. If infrastructure metrics are green but user complaints are up, your metrics are wrong — fix the metrics.

    6. Weight SLIs by user impact: an error affecting 10% of users on the critical path is worse than an error affecting 50%
    of users on a rarely-used feature.

    '
  severity: high
  technologies:
    lang: [general]
    platform: [prometheus]
  domains:
    domain: [mathematics, observability, reliability]
    concern: [cost_modeling, availability]
  example_good: "# SLIs measured from user perspective with RUM\nfrom dataclasses import dataclass\n\n@dataclass\nclass UserPerceivedSLI:\n    metric: str\n    measurement_point: str  # 'client' preferred over 'server'\n    includes_correctness: bool\n    includes_freshness: bool\n\nSLIS = [\n    UserPerceivedSLI('page_load_time_p95', 'client_rum', False, False),\n    UserPerceivedSLI('request_success_rate', 'load_balancer', False, False),\n    UserPerceivedSLI('data_freshness_seconds', 'client_rum', False, True),\n    UserPerceivedSLI('search_relevance_score', 'client_rum', True, False),\n]\n# Validate: if SLIs are green but support tickets spike, SLIs are wrong\n"
  example_bad: "# Anti-pattern: optimizing infra metrics instead of user happiness\nALERTS = [\n    {'metric': 'cpu_utilization', 'threshold': 0.8},\n    {'metric': 'memory_usage', 'threshold': 0.75},\n    {'metric': 'disk_iops', 'threshold': 10000},\n]\n# All green! But users see stale search results, wrong prices,\n# and 3-second page loads. Infra metrics miss the real problems.\n# No correctness SLI, no freshness SLI, no client-side measurement.\n"
  when_applies: "When choosing what metrics to track and alert on, especially when infrastructure metrics are green but user complaints are rising"
  sources:
  - url: https://sre.google/sre-book/embracing-risk/
    title: 'Google SRE Book — Chapter 3: Embracing Risk'
  validation_status: cross_checked
- id: CR-SRE-RISK-009
  text: Consider the full lifecycle cost of a service when setting availability targets. Early-stage services should target
    lower reliability to maximize iteration speed; mature revenue-critical services warrant higher targets.
  why: 'The SRE Book cites YouTube as an example — in its early days, YouTube explicitly chose lower reliability to maximize
    feature development velocity. Features that attracted users mattered more than five-nines uptime. As YouTube matured and
    became critical infrastructure for Google''s ad revenue, reliability targets were raised. This lifecycle-aware approach
    prevents premature optimization: an MVP burning engineering time on five-nines reliability is wasting resources that should
    go to product-market fit. Conversely, a service generating $100M/year that treats reliability as optional is risking catastrophic
    revenue loss. The right SLO depends on where the service is in its lifecycle, who depends on it, and what the competitive
    landscape looks like.

    '
  how_to_do_right: '1. For new services (< 6 months, < 1000 users): target 99.5% or lower. Invest in feature velocity.

    2. For growing services (product-market fit achieved): target 99.9%. Balance features with reliability.

    3. For critical services (significant revenue, many dependents): target 99.95%-99.99%. Invest in reliability engineering.

    4. For platform/infrastructure services: target based on most demanding consumer, with tiered offerings.

    5. Review lifecycle stage annually — services that stop growing may warrant lower investment.

    6. Document the rationale for each service''s target. "We chose 99.9% because we are pre-revenue and iterating on features"
    is a valid justification.

    '
  severity: medium
  technologies:
    lang: [general]
    platform: [cloud]
  domains:
    domain: [mathematics, reliability]
    concern: [cost_modeling, availability]
  example_good: "# Lifecycle-aware SLO targets\nSERVICE_LIFECYCLE_SLOS = {\n    'mvp': {'slo': 0.995, 'rationale': 'Pre-revenue, iterating on features'},\n    'growth': {'slo': 0.999, 'rationale': 'Product-market fit, balancing velocity'},\n    'critical': {'slo': 0.9995, 'rationale': 'Revenue-critical, many dependents'},\n    'platform': {'slo': 0.9999, 'rationale': 'Infrastructure, tiered offerings'},\n}\n\ndef get_slo_for_service(service_name: str, lifecycle_stage: str) -> float:\n    config = SERVICE_LIFECYCLE_SLOS[lifecycle_stage]\n    print(f'{service_name}: SLO={config[\"slo\"]} ({config[\"rationale\"]})')\n    return config['slo']\n"
  example_bad: "# Anti-pattern: same SLO for all services regardless of lifecycle\nDEFAULT_SLO = 0.9999  # Five nines for everything\n\ndef get_slo(service_name: str) -> float:\n    return DEFAULT_SLO  # MVP with 10 users gets same target as payment system\n    # Engineering time wasted on reliability for a service still finding PMF\n    # Features delayed because SLO demands block rapid iteration\n"
  when_applies: "When setting initial SLO targets for new services or reviewing targets for services at different lifecycle stages"
  sources:
  - url: https://sre.google/sre-book/embracing-risk/
    title: 'Google SRE Book — Chapter 3: Embracing Risk'
  validation_status: cross_checked
- id: CR-SRE-RISK-010
  text: External factors consume your error budget too. Datacenter failures, upstream dependency outages, and ISP issues all
    count against your budget — design your budget policy to account for events outside your control.
  why: 'Teams often treat their error budget as if they have full control over it. In reality, a significant portion is consumed
    by external events: a cloud provider outage, a DNS failure, a third-party API going down. Google found that acknowledging
    this creates healthy shared responsibility. When a datacenter failure consumes 30% of the quarterly error budget, the
    product team naturally becomes more conservative with risky deployments for the rest of the quarter — not because SRE
    told them to, but because THEIR budget is depleted. This self-regulating behavior only works if external events genuinely
    consume the same budget as internal changes. Maintaining separate budgets for "our faults" vs. "external faults" defeats
    the purpose.

    '
  how_to_do_right: '1. Track ALL sources of error budget consumption on a single dashboard: deployments, config changes, external
    dependencies, infrastructure failures.

    2. Do NOT exclude external events from budget tracking — they represent real user impact.

    3. Build dependency maps to understand which external failures consume the most budget.

    4. Invest in resilience (retries, caching, fallbacks) for dependencies that frequently consume budget.

    5. Negotiate SLOs with upstream providers and hold them accountable via their error budgets.

    6. If external events consistently consume > 50% of your budget, your dependency architecture needs improvement, not just
    your code.

    '
  severity: medium
  technologies:
    lang: [general]
    platform: [cloud]
  domains:
    domain: [mathematics, reliability]
    concern: [cost_modeling, availability]
  example_good: "# Track ALL error budget sources on a single dashboard\nfrom dataclasses import dataclass, field\nfrom typing import List\n\n@dataclass\nclass BudgetEvent:\n    source: str  # 'deployment', 'config_change', 'external_dep', 'infra'\n    failures: int\n    timestamp: str\n\n@dataclass\nclass UnifiedBudgetTracker:\n    allowed_failures: int\n    events: List[BudgetEvent] = field(default_factory=list)\n\n    def consume(self, event: BudgetEvent):\n        self.events.append(event)  # ALL sources in ONE tracker\n\n    @property\n    def remaining(self) -> int:\n        consumed = sum(e.failures for e in self.events)\n        return max(0, self.allowed_failures - consumed)\n\n    def breakdown(self) -> dict:\n        from collections import defaultdict\n        by_source = defaultdict(int)\n        for e in self.events:\n            by_source[e.source] += e.failures\n        return dict(by_source)\n"
  example_bad: "# Anti-pattern: separate budgets for internal vs external failures\ninternal_budget = 50000\nexternal_budget = 50000  # Separate tracker\n\ndef on_failure(source: str, count: int):\n    if source == 'external':\n        external_budget -= count  # Does not affect deployment decisions\n    else:\n        internal_budget -= count\n    # External outage consumed 30% of total capacity but\n    # internal_budget still shows 100% — team deploys recklessly\n"
  when_applies: "When designing error budget tracking systems and deciding whether external failures should count against the deployment budget"
  sources:
  - url: https://sre.google/sre-book/embracing-risk/
    title: 'Google SRE Book — Chapter 3: Embracing Risk'
  validation_status: cross_checked
- id: CR-SRE-RISK-011
  text: Error budget policies must have teeth — define explicit consequences for budget depletion. A budget without enforcement
    is just a metric no one respects.
  why: 'Google found that error budgets only work when there are real consequences for depletion. Without enforcement, product
    teams acknowledge the budget, then push releases anyway because "this one is really important." The SRE Book describes
    a policy where depleted budgets trigger concrete actions: deployment freezes, mandatory reliability sprints, and executive
    review. The key insight is that these consequences must be agreed upon IN ADVANCE by both product and SRE leadership —
    not imposed unilaterally during a crisis. Pre-agreed consequences remove the need for confrontation: the policy is the
    authority, not any individual.

    '
  how_to_do_right: '1. Write a formal error budget policy document signed by both product and SRE leadership.

    2. Define graduated responses: > 80% budget remaining = normal velocity, 50-80% = caution, 20-50% = slow down, < 20% =
    freeze.

    3. Specify exactly what "freeze" means: no new features, only reliability fixes and rollbacks allowed.

    4. Include an escalation path: how to get an exception (e.g., VP-level approval for a critical launch during a freeze).

    5. Review and publish budget status weekly in team standup — make it visible.

    6. Conduct quarterly retrospectives on budget consumption to identify patterns and improve.

    '
  severity: high
  technologies:
    lang: [general]
    platform: [deployment]
  domains:
    domain: [mathematics, reliability]
    concern: [cost_modeling, availability]
  example_good: "# Error budget policy with graduated enforcement\nfrom enum import Enum\n\nclass DeploymentPolicy(Enum):\n    NORMAL = 'normal'       # Budget > 80% — full velocity\n    CAUTION = 'caution'     # 50-80% — extra review required\n    SLOW_DOWN = 'slow_down' # 20-50% — only low-risk changes\n    FREEZE = 'freeze'       # < 20% — reliability fixes only\n\ndef get_deployment_policy(budget_remaining_pct: float) -> DeploymentPolicy:\n    if budget_remaining_pct > 80:\n        return DeploymentPolicy.NORMAL\n    elif budget_remaining_pct > 50:\n        return DeploymentPolicy.CAUTION\n    elif budget_remaining_pct > 20:\n        return DeploymentPolicy.SLOW_DOWN\n    return DeploymentPolicy.FREEZE\n\ndef can_deploy(budget_pct: float, is_reliability_fix: bool) -> bool:\n    policy = get_deployment_policy(budget_pct)\n    if policy == DeploymentPolicy.FREEZE:\n        return is_reliability_fix  # Only reliability fixes allowed\n    return True\n"
  example_bad: "# Anti-pattern: error budget with no enforcement\nerror_budget_remaining = 0.02  # Only 2% left!\n\ndef should_deploy(release):\n    # Budget is tracked but has no consequences\n    print(f'Warning: budget low ({error_budget_remaining}%)')  # Ignored\n    return True  # Always deploy — budget is just a number\n    # Product team pushes anyway: 'this one is really important'\n"
  when_applies: "When defining error budget enforcement policies and deployment freeze criteria"
  sources:
  - url: https://sre.google/sre-book/embracing-risk/
    title: 'Google SRE Book — Chapter 3: Embracing Risk'
  validation_status: cross_checked
- id: CR-SRE-RISK-012
  text: Risk is a continuum, not a binary. Manage service risk the same way finance manages portfolio risk — diversify, hedge,
    set limits, and accept that zero risk is both impossible and undesirable.
  why: 'The SRE Book explicitly frames reliability engineering as risk management, borrowing concepts from finance. Services
    have a "risk appetite" (the SLO), a "risk budget" (the error budget), and "risk exposure" (current error rate). Just as
    a financial portfolio accepts some volatility for higher returns, a service accepts some unreliability for faster feature
    development. This framing helps technical teams communicate with business stakeholders in familiar terms. It also prevents
    the common anti-pattern of treating every incident as a crisis — some incidents are simply "budget expenditure" and the
    correct response is to log them and move on, not to trigger a war room.

    '
  how_to_do_right: '1. Frame reliability conversations in business terms: "We are spending 15% of our quarterly error budget
    on this release" not "We had 3 incidents this week."

    2. Distinguish between budget-consuming events (normal) and budget-threatening events (need action).

    3. Accept that planned risk-taking (canary deployments, feature flags, A/B tests) is healthy and expected.

    4. Set risk limits: maximum error rate per hour, maximum simultaneous experiments, maximum blast radius per deployment.

    5. Diversify risk: do not deploy to all regions simultaneously, do not change config and code in the same release.

    6. Conduct regular risk reviews: what are the top 5 risks to this service''s SLO this quarter?

    '
  severity: medium
  technologies:
    lang: [general]
    platform: [cloud]
  domains:
    domain: [mathematics, reliability]
    concern: [cost_modeling, availability]
  example_good: "# Frame reliability as risk management with financial analogy\n@dataclass\nclass ServiceRiskProfile:\n    risk_appetite: float  # SLO — how much risk we accept\n    risk_budget: float    # Error budget — capacity for risk-taking\n    risk_exposure: float  # Current error rate\n    max_blast_radius: float = 0.05  # Max 5% of fleet per deploy\n    max_concurrent_experiments: int = 3\n\n    def classify_incident(self) -> str:\n        if self.risk_exposure < self.risk_appetite * 0.5:\n            return 'BUDGET_EXPENDITURE'  # Log and move on\n        elif self.risk_exposure < self.risk_appetite:\n            return 'BUDGET_CONCERNING'  # Monitor closely\n        return 'BUDGET_THREATENING'  # Take action\n\nprofile = ServiceRiskProfile(risk_appetite=0.0005, risk_budget=0.0005, risk_exposure=0.0002)\nprint(profile.classify_incident())  # BUDGET_EXPENDITURE — not a crisis\n"
  example_bad: "# Anti-pattern: treating every incident as a crisis\ndef on_incident(error_rate: float):\n    # Any error triggers war room — no proportionality\n    send_page_to_all_engineers()\n    schedule_war_room()\n    write_postmortem()  # Even for expected budget expenditure\n    # Team exhausted from treating 0.001% errors as catastrophes\n    # No concept of acceptable risk or budget spending\n"
  when_applies: "When framing reliability discussions with business stakeholders or deciding whether an incident warrants emergency response"
  sources:
  - url: https://sre.google/sre-book/embracing-risk/
    title: 'Google SRE Book — Chapter 3: Embracing Risk'
  validation_status: cross_checked
- id: CR-SRE-RISK-013
  text: Optimize globally, not locally. Improving one service's reliability at the cost of slowing the entire organization's
    feature velocity is a net negative even if that service's metrics improve.
  why: 'The SRE Book emphasizes that reliability is NOT the only goal — it is one input to overall product success. A team
    that achieves 99.999% availability by blocking all deployments for 6 months has technically succeeded at reliability and
    failed at product delivery. Google explicitly states that SRE manages service reliability to optimize OVERALL product
    success, which includes feature velocity, experimentation rate, and time-to-market. This means SRE should actively facilitate
    deployments (not just gatekeep them), help product teams deploy faster and safer (not slower), and accept some reliability
    risk to enable business outcomes. The error budget is the mechanism that makes this concrete.

    '
  how_to_do_right: '1. Measure SRE success by BOTH reliability AND deployment frequency. High reliability + low deployment
    frequency = failure.

    2. Invest in deployment safety (canaries, rollback automation, feature flags) to enable faster deployments, not slower
    ones.

    3. Track "time from code complete to production" as a key SRE metric — reducing this is as important as improving availability.

    4. When reliability work conflicts with feature work, use the error budget to decide: budget remaining = features win,
    budget depleted = reliability wins.

    5. SRE should be embedded in product teams, not a separate gatekeeping organization.

    '
  severity: high
  technologies:
    lang: [general]
    platform: [cloud, deployment]
  domains:
    domain: [mathematics, reliability]
    concern: [cost_modeling, availability]
  example_good: "# Measure SRE success by BOTH reliability AND deployment frequency\n@dataclass\nclass SREMetrics:\n    availability: float\n    deploy_frequency_per_week: float\n    mttr_minutes: float\n    change_failure_rate: float\n    time_to_production_hours: float  # Code complete to production\n\n    def is_healthy(self) -> bool:\n        # Both must be good — high reliability + low velocity = failure\n        reliability_ok = self.availability >= 0.9995\n        velocity_ok = self.deploy_frequency_per_week >= 5\n        return reliability_ok and velocity_ok\n\nmetrics = SREMetrics(0.99999, 0.5, 120, 0.3, 720)\nprint(metrics.is_healthy())  # False — great reliability, terrible velocity\n"
  example_bad: "# Anti-pattern: optimizing reliability at the expense of velocity\ndef sre_success_metric(availability: float) -> str:\n    if availability >= 0.99999:\n        return 'EXCELLENT'  # 5 nines!\n    return 'NEEDS_WORK'\n    # Team blocked ALL deployments for 6 months to achieve this\n    # Zero features shipped. Competitors overtook us.\n    # SRE 'succeeded' while the product failed.\n"
  when_applies: "When evaluating SRE team effectiveness or when reliability goals conflict with feature delivery timelines"
  sources:
  - url: https://sre.google/sre-book/embracing-risk/
    title: 'Google SRE Book — Chapter 3: Embracing Risk'
  validation_status: cross_checked
- id: CR-SRE-RISK-014
  text: When product and SRE disagree on risk, escalate to data — not to authority. The error budget provides an objective
    framework that removes the need for subjective judgment calls in release decisions.
  why: 'Before error budgets at Google, release decisions were political. SRE would say "this is too risky" and product would
    say "we need this for the quarter." Resolution depended on who had more organizational power. Error budgets replaced politics
    with math. With 40% budget remaining, both sides can agree that a 5% risk deployment is acceptable. With 2% budget remaining,
    both sides can agree that only zero-risk rollbacks are appropriate. The data decides. This also prevents the common failure
    mode where a charismatic PM overrides a cautious SRE, or where a risk-averse SRE blocks a critical business launch. Neither
    individual''s judgment matters — the budget is the authority.

    '
  how_to_do_right: '1. Never negotiate release decisions based on urgency, seniority, or business pressure — only on error
    budget remaining.

    2. Make the error budget dashboard the first slide in any release decision meeting.

    3. When someone says "but this release is really important," respond with "how much error budget does it require and how
    much do we have?"

    4. If the budget is depleted and business truly needs a release, require VP-level written approval with explicit acknowledgment
    of SLO breach risk.

    5. Post-incident, attribute budget consumption to the release that caused it, creating accountability.

    '
  severity: medium
  technologies:
    lang: [general]
  domains:
    domain: [mathematics, reliability]
    concern: [cost_modeling, availability]
  example_good: "# Data-driven release decisions using error budget\ndef decide_release(budget_remaining_pct: float, estimated_risk_pct: float) -> dict:\n    \"\"\"Let the budget decide, not politics or seniority.\"\"\"\n    if estimated_risk_pct > budget_remaining_pct:\n        return {\n            'decision': 'REJECT',\n            'reason': f'Risk ({estimated_risk_pct}%) exceeds budget ({budget_remaining_pct}%)',\n            'exception_path': 'Requires VP written approval with SLO breach acknowledgment'\n        }\n    return {\n        'decision': 'APPROVE',\n        'reason': f'Budget sufficient: {budget_remaining_pct - estimated_risk_pct}% would remain'\n    }\n\n# Budget dashboard is the first slide in every release meeting\n"
  example_bad: "# Anti-pattern: release decisions based on authority, not data\ndef decide_release(pm_urgency: str, sre_concern: str) -> bool:\n    if pm_urgency == 'critical':\n        return True  # PM always wins — no data consulted\n    if sre_concern == 'high':\n        return False  # SRE blocks with no data either\n    # Decision depends on who has more org power\n    # Charismatic PM overrides cautious SRE every time\n"
  when_applies: "When product and SRE teams disagree about whether a release should proceed, especially under time pressure"
  sources:
  - url: https://sre.google/sre-book/embracing-risk/
    title: 'Google SRE Book — Chapter 3: Embracing Risk'
  validation_status: cross_checked
- id: CR-SRE-RISK-015
  text: Adjust SLOs when they no longer drive the right behavior. An SLO that is never breached is too loose; an SLO that
    is constantly breached is either too tight or the service is fundamentally broken.
  why: 'SLOs are management tools, not physics constants. Google reviews SLOs regularly and adjusts them based on business
    reality. An SLO that was appropriate at launch may be too loose after the service becomes critical infrastructure. Conversely,
    an SLO inherited from a template may be too tight for a service that does not warrant that level of investment. The signs
    of a wrong SLO are clear: if the error budget is never touched, teams are too conservative and velocity suffers. If the
    error budget is depleted every quarter, either the target is unrealistic or the service needs fundamental investment.
    Either way, the SLO needs adjustment. The worst outcome is an SLO that everyone ignores because it has no connection to
    reality.

    '
  how_to_do_right: '1. Review SLOs quarterly with product, engineering, and SRE stakeholders.

    2. If budget was < 20% consumed for 2+ quarters: consider tightening the SLO or redirecting reliability resources.

    3. If budget was depleted for 2+ quarters: either invest in reliability or loosen the SLO to match actual capability.

    4. Before changing an SLO, communicate to all dependents and update dashboards, alerts, and policies.

    5. Document the rationale for every SLO change: "Tightened from 99.9% to 99.95% because the service now processes payments."

    6. Never change an SLO retroactively to avoid an SLO breach — that destroys trust.

    '
  severity: medium
  technologies:
    lang: [general]
  domains:
    domain: [mathematics, reliability]
    concern: [cost_modeling, availability]
  example_good: "# Quarterly SLO review with adjustment logic\ndef quarterly_slo_review(slo: float, budget_consumed_history: list[float]) -> dict:\n    \"\"\"Review SLO based on budget consumption patterns.\"\"\"\n    avg_consumed = sum(budget_consumed_history) / len(budget_consumed_history)\n    if all(c < 0.20 for c in budget_consumed_history[-2:]):\n        return {'action': 'TIGHTEN', 'reason': 'Budget < 20% consumed 2+ quarters',\n                'new_slo': slo + (1 - slo) * 0.5}  # Tighten by half the gap\n    if all(c >= 1.0 for c in budget_consumed_history[-2:]):\n        return {'action': 'LOOSEN_OR_INVEST',\n                'reason': 'Budget depleted 2+ quarters — invest or adjust'}\n    return {'action': 'KEEP', 'reason': f'Healthy consumption: avg {avg_consumed:.0%}'}\n\nprint(quarterly_slo_review(0.999, [0.10, 0.15, 0.12, 0.08]))\n# TIGHTEN — budget barely used\n"
  example_bad: "# Anti-pattern: never reviewing or adjusting SLOs\nSLO = 0.999  # Set 3 years ago, never changed\n\n# Budget depleted every quarter for 2 years\n# but no one adjusts the SLO — it is treated as immutable\n# Team ignores it because it has 'no connection to reality'\n# OR: SLO changed retroactively to avoid reporting a breach\ndef hide_breach(actual: float):\n    global SLO\n    SLO = actual - 0.001  # Retroactive change — destroys trust\n"
  when_applies: "When conducting quarterly SLO reviews or when an SLO has not driven a prioritization decision in multiple quarters"
  sources:
  - url: https://sre.google/sre-book/embracing-risk/
    title: 'Google SRE Book — Chapter 3: Embracing Risk'
  validation_status: cross_checked
