layer: rules
technology: SRE
domain: automation
knowledge:
- id: CR-SRE-AUTO-001
  text: Automation has five evolutionary levels — from manual, to external scripts, to generic automation, to system-internal
    automation, to fully autonomous. Most teams stop at level 2 (scripts) and never reach level 4-5 where the real ROI lives.
  why: 'Google identified five automation maturity levels because the jump from "we have scripts" (level 2) to "the system
    manages itself" (level 5) represents orders of magnitude improvement in operational cost. Level 2 (external scripts) still
    requires a human to decide when and where to run the script, to monitor its execution, and to handle failures. Level 4
    (system-internal automation) means the system ships with its own automation — like a database that handles its own failover.
    Level 5 (autonomous) means the system self-heals with no human involvement at all. Google''s Borg evolution illustrates
    this perfectly: from manual machine management (level 1) to Python scripts (level 2) to Borg itself (level 5), where thousands
    of machines are born, repaired, and decommissioned daily with zero SRE effort. Most organizations plateau at level 2-3
    and never invest in level 4-5 because each script feels like "automation" — but the operational cost stays linear with
    scale.

    '
  how_to_do_right: '1. Assess your current automation maturity level honestly for each operational task.

    2. Level 1→2: Write scripts for repetitive manual tasks. This is table stakes.

    3. Level 2→3: Generalize scripts into reusable tools (e.g., deployment framework, not per-service deploy scripts).

    4. Level 3→4: Build automation INTO the system — the service handles its own health checks, scaling, and failover.

    5. Level 4→5: Design for autonomy — the system detects anomalies, diagnoses root causes, and self-remediates without human
    involvement.

    6. Prioritize reaching level 4 for your most critical and most operationally expensive services first.

    '
  severity: high
  technologies:
    lang: [python]
    platform: [ansible, kubernetes, terraform]
  domains:
    domain: [operations, reliability]
    concern: [maintenance, automation]
  example_good: "# Assess and evolve automation maturity level\nfrom enum import IntEnum\n\nclass AutomationLevel(IntEnum):\n    MANUAL = 1          # Human does everything\n    SCRIPTED = 2        # Human triggers scripts\n    GENERIC_TOOLS = 3   # Reusable frameworks, not per-service scripts\n    SYSTEM_INTERNAL = 4 # System ships with its own automation\n    AUTONOMOUS = 5      # System self-heals, no human involvement\n\ndef assess_task(task: str, current_level: AutomationLevel) -> dict:\n    next_level = AutomationLevel(min(current_level + 1, 5))\n    upgrades = {\n        2: 'Generalize into reusable tools',\n        3: 'Build automation INTO the system (health checks, auto-failover)',\n        4: 'Design for autonomy (detect, diagnose, self-remediate)',\n        5: 'Already autonomous — maintain and monitor',\n    }\n    return {'task': task, 'current': current_level.name,\n            'next_step': upgrades.get(next_level, 'N/A')}\n\nprint(assess_task('database failover', AutomationLevel.SCRIPTED))\n"
  example_bad: "# Anti-pattern: plateauing at Level 2 (scripts)\ndef failover_database():\n    # Human detects the problem (monitoring alert)\n    # Human decides to run the script (judgment call)\n    # Human executes the script\n    subprocess.run(['./failover.sh', '--target', 'replica-2'])\n    # Human verifies the result\n    # Still 4 manual steps wrapping 1 automated step\n    # Scales linearly — 100 databases = 100 manual failovers\n    # 'We have automation' — no, you have scripts\n"
  when_applies: "When evaluating automation maturity for operational tasks and planning the path from scripts to fully autonomous systems"
  sources:
  - url: https://sre.google/sre-book/automation-at-google/
    title: 'Google SRE Book — Chapter 7: The Evolution of Automation at Google'
  validation_status: cross_checked
- id: CR-SRE-AUTO-002
  text: The highest-leverage automation happens at design time, not as a retrofit. Systems designed for autonomous behavior
    from the start cost 10x less to operate than systems where automation is bolted on after deployment.
  why: 'Google learned that automating a poorly designed system is fighting the architecture. If a service requires SSH access
    to each machine for configuration changes, automation must manage SSH connections, handle authentication, deal with network
    failures, and parse unstructured output — all fragile. If the service is designed with an API for configuration changes,
    automation is a simple API call — robust, testable, auditable. Borg represents the ultimate expression of this principle:
    by treating the cluster as a managed resource pool with APIs (not as a collection of machines requiring individual attention),
    Google transformed operational overhead from O(n) to O(1). The philosophical insight is that process migration between
    CPUs is the same problem as task rescheduling across network-connected machines — but you can only see this if you design
    the system that way from the start.

    '
  how_to_do_right: '1. For new systems: require an operations API as a launch criterion — configuration, scaling, failover,
    rollback must be API-driven.

    2. For existing systems: when automating, invest 30% of the effort in improving the system''s operability, not just wrapping
    scripts around it.

    3. Design with decoupled subsystems, clear APIs, minimal side effects, and idempotent operations — these enable automation
    naturally.

    4. Every configuration change should be an API call, not a file edit. Every deployment should be a declarative state change,
    not a procedural script.

    5. Health checks, readiness probes, and graceful shutdown handlers should be built into every service from day one.

    6. Ask during design review: "Can this system be operated with zero SSH access?" If not, redesign.

    '
  severity: critical
  technologies:
    platform: [cloud, kubernetes]
  domains:
    domain: [architecture, operations, reliability]
    concern: [maintenance, automation]
  example_good: "# Design systems with operations API from the start\nfrom fastapi import FastAPI\n\napp = FastAPI()\n\n@app.post('/admin/config')\nasync def update_config(config: dict):\n    \"\"\"API-driven config changes — no SSH, no file edits.\"\"\"\n    validate_config(config)\n    apply_config(config)\n    return {'status': 'applied', 'version': config['version']}\n\n@app.post('/admin/scale')\nasync def scale(replicas: int):\n    \"\"\"Declarative scaling — no manual intervention.\"\"\"\n    return set_replicas(replicas)\n\n@app.get('/health')\nasync def health():\n    \"\"\"Built-in health check for automated monitoring.\"\"\"\n    return {'status': 'healthy', 'uptime': get_uptime()}\n\n# Design review question: 'Can this system be operated with zero SSH access?'\n"
  example_bad: "# Anti-pattern: system requires SSH for operations\ndef deploy_config(server: str, config_file: str):\n    ssh = paramiko.SSHClient()\n    ssh.connect(server)  # Must manage SSH keys, handle network failures\n    sftp = ssh.open_sftp()\n    sftp.put(config_file, '/etc/myapp/config.yaml')  # Parse unstructured output\n    ssh.exec_command('systemctl restart myapp')  # Fragile, not auditable\n    # Automation must manage SSH, authentication, network failures\n    # Cannot test automation without real servers\n    # No audit trail of what changed\n"
  when_applies: "When designing new systems or retrofitting existing ones, to ensure they are built for automated operation from the start"
  sources:
  - url: https://sre.google/sre-book/automation-at-google/
    title: 'Google SRE Book — Chapter 7: The Evolution of Automation at Google'
  validation_status: cross_checked
- id: CR-SRE-AUTO-003
  text: Automation ownership must stay with the team that operates the system in production. Separating automation maintenance
    from operational responsibility creates organizational misalignment — the automation decays while the system evolves.
  why: 'Google''s cluster turnup automation was initially maintained by a dedicated "turnup team" separate from the service
    teams. This created a fatal misalignment: the turnup team had no motivation to fix issues affecting production (not their
    problem), service teams had no incentive to make their systems automation-friendly (not their automation), and product
    managers prioritized features over operability (not their concern). The result was brittle, outdated automation that broke
    on every system change. The fix was radical: eliminate the turnup team and require each service team to own its own automation
    via Admin Servers — peer-reviewed RPC servers with fine-grained access controls. This restored the feedback loop: teams
    that felt the pain of manual operations invested in better automation. Teams that changed their systems updated their
    automation because it was the same codebase.

    '
  how_to_do_right: '1. The team that builds the service owns the automation for that service. No separate "automation teams."

    2. Automation code lives in the same repository as the service code and goes through the same code review process.

    3. Changes to the service that break automation must be fixed by the team making the change — not by an external team.

    4. Measure automation quality as a team metric: automation failure rate, coverage, staleness.

    5. When onboarding a new service, the operating team writes the automation as part of the production readiness process.

    6. Cross-cutting automation (deployment frameworks, monitoring platforms) can be centralized, but service-specific automation
    must be service-owned.

    '
  severity: high
  technologies:
    lang: [general]
  domains:
    domain: [operations, reliability]
    concern: [maintenance, automation]
  example_good: "# Automation ownership stays with the operating team\n# automation/ lives in the SAME repo as the service code\n# Same code review process, same CI/CD pipeline\n\nclass ServiceTeam:\n    def __init__(self, name: str):\n        self.name = name\n        self.service_code = f'src/{name}/'        # Application code\n        self.automation_code = f'src/{name}/ops/'  # Automation code\n        # Same repo, same team, same review process\n\n    def on_service_change(self, change: str):\n        \"\"\"When service changes, team updates automation too.\"\"\"\n        update_service(change)\n        update_automation(change)  # Same PR, same review\n        # Feedback loop: team feels pain of broken automation\n\n# Automation quality is a team metric: failure rate, coverage, staleness\n"
  example_bad: "# Anti-pattern: separate automation team\nclass SeparateAutomationTeam:\n    def maintain_all_automation(self):\n        # Maintains automation for 50 services they do not operate\n        # Service teams change their systems without updating automation\n        # Automation breaks on every service change\n        # No incentive for service teams to make systems automation-friendly\n        # Automation team has no operational context\n        pass\n"
  when_applies: "When deciding organizational ownership of operational automation, to avoid misalignment between automation maintainers and system operators"
  sources:
  - url: https://sre.google/sre-book/automation-at-google/
    title: 'Google SRE Book — Chapter 7: The Evolution of Automation at Google'
  validation_status: cross_checked
- id: CR-SRE-AUTO-004
  text: Effective automation amplifies mistakes at the same speed it amplifies correct actions. Every automation MUST have
    sanity checks, rate limiting, and blast radius controls — otherwise a single logic error can destroy your entire infrastructure
    in seconds.
  why: 'Google''s "Diskerase" incident is a cautionary tale: an automated decommissioning system wiped nearly ALL CDN machines
    because a logic error treated an empty machine set as "everything." The automation worked flawlessly — it decommissioned
    machines exactly as designed. The problem was WHAT it was told to decommission. The result: two days of hardware reinstallation
    and weeks of auditing. This is a fundamental property of automation: it removes the human "are you sure?" checkpoint.
    A human operator decommissioning machines would notice "wait, this is ALL of them" and stop. The automation had no such
    check. Similar incidents have occurred at other companies: automated systems deleting all production databases, scaling
    down to zero instances, or pushing bad configs to every server simultaneously.

    '
  how_to_do_right: '1. Every destructive automation must have a sanity check: "Am I about to affect more than X% of resources?
    If so, halt and alert."

    2. Rate limit destructive operations: decommission at most 5% of fleet per hour, not 100% in one batch.

    3. Implement progressive rollout for any change: 1% → 5% → 25% → 100% with verification at each stage.

    4. Make all destructive operations idempotent and reversible when possible. "Delete machine" should be "mark for deletion"
    with a 24-hour grace period.

    5. Require "two-person rule" for automation affecting > 10% of production: a second system or human must confirm.

    6. Test automation with chaos engineering: what happens when the input is empty, corrupted, or absurdly large?

    '
  severity: critical
  technologies:
    platform: [cloud, ansible, kubernetes, terraform]
  domains:
    domain: [operations, reliability, security]
    concern: [maintenance, automation]
  example_good: "# Automation with sanity checks and blast radius controls\ndef decommission_machines(machine_ids: list[str], fleet_size: int):\n    \"\"\"Destructive automation with safety guardrails.\"\"\"\n    # Sanity check: refuse to affect more than 5% of fleet\n    ratio = len(machine_ids) / fleet_size\n    if ratio > 0.05:\n        raise SafetyError(f'Refusing to decommission {ratio:.0%} of fleet '\n                          f'({len(machine_ids)}/{fleet_size}). Max 5%.')\n\n    # Progressive rollout: 1% -> 5% -> 25% -> 100%\n    batches = create_progressive_batches(machine_ids, [0.01, 0.05, 0.25, 1.0])\n    for batch in batches:\n        decommission_batch(batch)\n        if not verify_fleet_health():\n            rollback_batch(batch)\n            raise SafetyError(f'Fleet health degraded after batch {batch}')\n        wait_and_verify(minutes=10)  # Soak time between batches\n\n# Empty input check: empty set should NOT mean 'everything'\nassert machine_ids, 'Empty machine list — refusing to operate'\n"
  example_bad: "# Anti-pattern: destructive automation without guardrails\ndef decommission_machines(machine_ids: list[str]):\n    for mid in machine_ids:\n        delete_machine(mid)  # No limit, no verification, no rollback\n    # Empty machine_ids from a bug = 'decommission everything'\n    # No sanity check on blast radius\n    # No progressive rollout\n    # Google's Diskerase incident: wiped ALL CDN machines\n"
  when_applies: "When building automation for destructive operations (decommission, delete, scale-down) that need blast radius controls and sanity checks"
  sources:
  - url: https://sre.google/sre-book/automation-at-google/
    title: 'Google SRE Book — Chapter 7: The Evolution of Automation at Google'
  validation_status: cross_checked
- id: CR-SRE-AUTO-005
  text: Over-automation creates a dangerous loss of operational fluency. When automation handles everything for years, engineers
    lose the ability to operate the system manually — and when the automation itself fails, recovery becomes nearly impossible.
  why: 'Google draws explicit parallels with aviation, where highly effective autopilot systems have led to incidents where
    pilots could not recover from failures because they had not hand-flown the aircraft in years. The same happens in infrastructure:
    if automated failover has handled every database outage for 3 years, the on-call engineer has never done a manual failover
    and may not know how. When the automation fails (and all automation eventually fails), the engineer faces a novel situation
    with zero practice. Google experienced situations where automation became "actively harmful" — the automated response
    made the situation worse, and engineers did not know how to override it quickly enough. The solution is not less automation,
    but deliberate practice: scheduled "fire drills" where engineers perform manual operations to maintain proficiency.

    '
  how_to_do_right: '1. Conduct quarterly "manual operation drills" — disable automation and have engineers perform critical
    procedures by hand.

    2. Maintain up-to-date runbooks for manual execution of every automated procedure.

    3. Ensure automation can be DISABLED quickly — a kill switch that reverts to manual mode.

    4. When automation fails, log the failure AND the human recovery steps taken. Use this to improve both the automation
    and the runbooks.

    5. New team members should perform manual operations before being given access to automation — to build mental models.

    6. Track "time since last manual execution" for critical procedures. If > 6 months, schedule a drill.

    '
  severity: high
  technologies:
    lang: [general]
    platform: [kubernetes]
  domains:
    domain: [operations, reliability]
    concern: [maintenance, automation, on_call]
  example_good: "# Maintain manual proficiency with scheduled drills\nimport datetime\n\nclass OperationalDrill:\n    def __init__(self, procedure: str, last_manual_execution: datetime.date):\n        self.procedure = procedure\n        self.last_manual = last_manual_execution\n\n    @property\n    def months_since_manual(self) -> int:\n        return (datetime.date.today() - self.last_manual).days // 30\n\n    def needs_drill(self) -> bool:\n        return self.months_since_manual > 6\n\ndrills = [\n    OperationalDrill('database_failover', datetime.date(2025, 8, 1)),\n    OperationalDrill('dns_cutover', datetime.date(2025, 5, 15)),\n]\nfor d in drills:\n    if d.needs_drill():\n        print(f'DRILL NEEDED: {d.procedure} — {d.months_since_manual} months since last manual execution')\n\n# Automation kill switch: one command to revert to manual mode\n"
  example_bad: "# Anti-pattern: 100% automated with no manual fallback skills\n# Automated failover has handled every outage for 3 years\n# No engineer has ever done a manual failover\n# When automation fails (and all automation eventually fails):\n#   - Engineer faces novel situation with zero practice\n#   - No up-to-date runbooks for manual procedure\n#   - No kill switch to disable automation\n#   - Automation making things worse, cannot override\n#   - MTTR: hours instead of minutes\n"
  when_applies: "When automation handles all operations for extended periods, risking loss of manual operational skills needed for automation failures"
  sources:
  - url: https://sre.google/sre-book/automation-at-google/
    title: 'Google SRE Book — Chapter 7: The Evolution of Automation at Google'
  validation_status: cross_checked
- id: CR-SRE-AUTO-006
  text: Automation is a force multiplier, not a panacea. The ideal goal is designing systems that need no automation at all
    — not systems surrounded by increasingly complex automation to compensate for bad design.
  why: 'Google explicitly states that mindless automation creates as many problems as it solves. Automating a bad process
    codifies the bad process. Automating a workaround for a design flaw makes the design flaw permanent because now "it works"
    (via the workaround). The most effective engineering does not ask "how do we automate this manual step?" but "how do we
    eliminate the need for this step entirely?" A database that requires manual failover needs failover automation. A database
    designed with automatic consensus-based leader election needs no failover automation at all — the problem does not exist.
    Google''s progression from MySQL manual failover (automated to 30 seconds) to Spanner (no failover concept — consensus
    handles it) illustrates this evolution. The automation was good; eliminating the need was better.

    '
  how_to_do_right: '1. Before automating a process, ask: "Can we redesign the system so this process is unnecessary?"

    2. If the answer is yes (even if expensive), evaluate the long-term cost of automation-the-workaround vs. fix-the-design.

    3. If the answer is no, automate it — but document the underlying design limitation and revisit it annually.

    4. Prefer self-healing architectures over external remediation automation: consensus protocols over failover scripts,
    auto-scaling over capacity alerts, immutable infrastructure over configuration management.

    5. Measure automation complexity. If automation for a service exceeds the service code in complexity, the system needs
    redesign, not more automation.

    6. Budget time for both automation work (short-term relief) and design improvements (long-term elimination).

    '
  severity: high
  technologies:
    platform: [cloud, kubernetes]
  domains:
    domain: [architecture, operations, reliability]
    concern: [maintenance, automation]
  example_good: "# Eliminate the need for automation through better design\n# Instead of automating failover, design it away\n\nclass ConsensusBasedLeaderElection:\n    \"\"\"No failover automation needed — consensus handles it.\"\"\"\n    def __init__(self, nodes: list[str]):\n        self.nodes = nodes\n        # Raft/Paxos consensus — leader election is automatic\n        # No failover script, no human intervention, no automation\n        # The PROBLEM does not exist in this architecture\n\n    def get_leader(self) -> str:\n        return self.consensus.current_leader  # Always available\n\n# Before: MySQL manual failover -> automated to 30 seconds\n# After: Spanner consensus -> no failover concept at all\n# Automation was good; eliminating the need was better\n"
  example_bad: "# Anti-pattern: automating around a bad design\ndef automated_mysql_failover():\n    # 200 lines of automation to handle a design limitation\n    detect_primary_failure()\n    select_best_replica()\n    promote_replica()\n    update_dns()\n    drain_connections()\n    verify_replication()\n    # Automation is more complex than the service itself\n    # Every edge case adds more automation code\n    # Better question: 'Can we eliminate the need for failover entirely?'\n"
  when_applies: "When considering whether to automate a workaround versus redesigning the system to eliminate the need for that automation entirely"
  sources:
  - url: https://sre.google/sre-book/automation-at-google/
    title: 'Google SRE Book — Chapter 7: The Evolution of Automation at Google'
  validation_status: cross_checked
- id: CR-SRE-AUTO-007
  text: Google's MySQL-on-Borg automated failover reduced operational cost by 95% and freed 60% of hardware through efficient
    bin-packing. The investment in comprehensive automation platforms pays exponential dividends through cascading improvements.
  why: 'Google ran MySQL on Borg (their cluster management system), which moved database instances multiple times per week
    for bin-packing efficiency. Each move required a MySQL failover. Manual failover took 30-90 minutes per instance — at
    Google''s scale, this consumed entire teams. The "Decider" automated failover daemon completed failovers in under 30 seconds
    for 95% of cases. But the real win was not speed — it was what automation ENABLED. With fast, reliable failover, Borg
    could aggressively bin-pack MySQL instances, freeing 60% of hardware. Without automation, Borg could not move databases
    without human approval, wasting massive hardware capacity. The automation did not just save time on failovers — it unlocked
    an entirely new operating model. This cascading benefit (automation enables optimization enables savings) is where the
    exponential ROI lives.

    '
  how_to_do_right: '1. When evaluating automation ROI, include second-order effects: what does fast, reliable automation ENABLE
    that was previously impossible?

    2. Automated failover enables aggressive resource optimization (bin-packing, preemptible instances, spot pricing).

    3. Automated deployment enables higher release frequency, which enables faster feedback loops, which enables better product
    quality.

    4. Automated testing enables larger test suites, which enables bolder refactoring, which enables lower technical debt.

    5. Measure both direct savings (time saved) and indirect savings (new capabilities unlocked).

    6. When presenting automation proposals to leadership, lead with the cascading benefits — they are typically 10x larger
    than the direct savings.

    '
  severity: high
  technologies:
    platform: [cloud, mysql, kubernetes]
  domains:
    domain: [mathematics, operations, reliability]
    concern: [cost_modeling, maintenance, automation]
  example_good: "# Evaluate automation ROI including cascading benefits\ndef automation_roi_full(direct_savings_hours: float, build_hours: float,\n                        enables_new_capability: bool = False) -> dict:\n    direct_roi = (direct_savings_hours * 52 - build_hours) / build_hours\n    result = {'direct_roi': direct_roi, 'direct_savings_annual': direct_savings_hours * 52}\n    if enables_new_capability:\n        # Second-order effects: what does automation ENABLE?\n        # Automated failover enables bin-packing (60% hardware savings)\n        # Automated deploy enables higher release frequency\n        # Automated testing enables bolder refactoring\n        result['cascading_benefit'] = '10x direct savings (typically)'\n        result['examples'] = [\n            'Fast failover enables aggressive bin-packing',\n            'CI/CD enables faster feedback loops',\n            'Automated testing enables lower tech debt',\n        ]\n    return result\n\nprint(automation_roi_full(8, 80, enables_new_capability=True))\n"
  example_bad: "# Anti-pattern: evaluating automation by direct time savings only\ndef should_automate(hours_saved_per_week: float, hours_to_build: float) -> bool:\n    roi = hours_saved_per_week * 52 / hours_to_build\n    return roi > 1.0\n    # Misses: automated failover ENABLES bin-packing (60% hardware savings)\n    # Misses: CI/CD ENABLES faster feedback (better product quality)\n    # Direct savings are typically 10% of total benefit\n    # Most automation proposals get rejected by looking only at direct savings\n"
  when_applies: "When building business cases for automation investments, to include both direct time savings and cascading second-order benefits"
  sources:
  - url: https://sre.google/sre-book/automation-at-google/
    title: 'Google SRE Book — Chapter 7: The Evolution of Automation at Google'
  validation_status: cross_checked
- id: CR-SRE-AUTO-008
  text: Consistency is the first and most important value of automation. Humans performing the same task 100 times will introduce
    variation — different order, skipped steps, typos. Machines execute identically every time. This consistency is worth
    the automation investment even when time savings are minimal.
  why: 'Google found that many outages traced to "human error" were actually "human variation" — an engineer performing a
    well-known procedure but in a slightly different order, or skipping a step that "usually does not matter." Manual deployments
    are the classic example: the runbook says "step 7: verify canary metrics." After doing 50 deployments where canary metrics
    are always fine, engineers start skipping step 7. On deployment 51, the canary is broken but no one checks. Automation
    does not skip steps, does not get bored, does not take shortcuts. Even if the automation takes the same wall-clock time
    as a human, the elimination of human variation alone justifies the investment. Google also found that consistent automation
    produces consistent logs, making debugging and auditing dramatically easier than investigating ad-hoc manual actions.

    '
  how_to_do_right: '1. When a manual procedure has > 5 steps, automate it — the probability of human error increases with
    step count.

    2. When evaluating automation ROI, include "avoided incidents from human variation" — not just time saved.

    3. Automation logs should record every action taken with timestamps — creating an auditable record that manual processes
    cannot match.

    4. Never allow "optional" steps in automated procedures — if a step can be skipped, remove it entirely or make it mandatory.

    5. Idempotent automation can be safely re-run: if you are unsure if the procedure completed, run it again without risk.

    6. Test automation in staging environments with the same rigor as production code — automation bugs cause outages.

    '
  severity: high
  technologies:
    lang: [general]
    platform: [deployment, ansible, terraform]
  domains:
    domain: [operations, reliability]
    concern: [maintenance, automation]
  example_good: "# Automated deployment with consistent steps and audit log\nimport logging\nfrom datetime import datetime\n\ndef deploy(version: str, environment: str, deployer: str):\n    \"\"\"Idempotent deployment — every step executes identically every time.\"\"\"\n    steps = [\n        ('validate_config', lambda: validate_config(version)),\n        ('run_tests', lambda: run_test_suite(version)),\n        ('deploy_canary', lambda: deploy_to_canary(version, pct=1)),\n        ('verify_canary', lambda: verify_canary_metrics(minutes=10)),\n        ('deploy_full', lambda: deploy_to_production(version)),\n        ('verify_production', lambda: verify_production_metrics(minutes=5)),\n    ]\n    for step_name, step_fn in steps:\n        logging.info(f'{datetime.utcnow()} | {deployer} | {step_name} | {version}')\n        step_fn()  # Never skips steps, never changes order, never gets bored\n\n# Consistent logs, auditable record, no human variation\n"
  example_bad: "# Anti-pattern: manual deployment with human variation\ndef deploy_manual(version: str):\n    # Step 1: SSH to server (different server each time?)\n    # Step 2: Pull latest code (forgot to specify version)\n    # Step 3: Run tests (skipped — 'they passed yesterday')\n    # Step 4: Restart service (forgot to drain connections)\n    # Step 5: Check metrics (skipped after 50 successful deploys)\n    # Step 6: Update changelog (never done)\n    # Deploy #51: canary metrics broken but nobody checked\n    # No audit trail, no consistency, no reproducibility\n"
  when_applies: "When manual procedures have more than 5 steps, where human variation introduces risk through skipped steps or changed order"
  sources:
  - url: https://sre.google/sre-book/automation-at-google/
    title: 'Google SRE Book — Chapter 7: The Evolution of Automation at Google'
  validation_status: cross_checked
