  example_good: "# Outbox pattern — atomic business data + event in one transaction\nclass OrderRepository:\n    async def\
    \ save_with_events(self, order: Order, events: list[DomainEvent]):\n        async with self.db.transaction():  # One transaction\
    \ — atomic\n            # 1. Save business data\n            await self.db.execute(\n                \"INSERT INTO orders\
    \ (id, customer_id, total, status) VALUES ($1, $2, $3, $4)\",\n                order.id, order.customer_id, order.total,\
    \ order.status,\n            )\n            # 2. Save events to outbox (same transaction!)\n            for event in events:\n\
    \                await self.db.execute(\n                    \"\"\"INSERT INTO outbox (id, aggregate_type, aggregate_id,\n\
    \                       event_type, payload, created_at)\n                       VALUES ($1, $2, $3, $4, $5, $6)\"\"\"\
    ,\n                    event.id, \"Order\", order.id,\n                    event.__class__.__name__, event.to_json(),\
    \ datetime.utcnow(),\n                )\n        # Both succeed or both fail — no inconsistency possible\n\n# Relay process\
    \ (runs separately) — reads outbox, publishes to Kafka\nasync def outbox_relay():\n    while True:\n        unpublished\
    \ = await db.fetch(\"SELECT * FROM outbox WHERE published_at IS NULL LIMIT 100\")\n        for record in unpublished:\n\
    \            await kafka.publish(record[\"event_type\"], record[\"payload\"])\n            await db.execute(\"UPDATE outbox\
    \ SET published_at = NOW() WHERE id = $1\", record[\"id\"])\n        await asyncio.sleep(1)  # Poll interval\n"
  example_bad: "# Dual write — race condition between DB and Kafka\nclass OrderRepository:\n    async def save(self, order:\
