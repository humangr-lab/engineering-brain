- id: CR-ARCH-MZD-001
  text: 'Zero Downtime Database Migration — Use expand-contract pattern for schema changes. Expand: add new columns/tables
    (backward compatible). Contract: remove old columns/tables (after all code is updated).'
  why: 'A traditional ALTER TABLE DROP COLUMN during a rolling deployment breaks old pods that still reference the dropped
    column. A column rename requires both old and new code to work simultaneously during the transition. The expand-contract
    pattern separates the migration into two phases: expand (add new column alongside old one, no code changes break) and
    contract (remove old column after ALL pods use the new one). This enables zero-downtime schema migrations where old and
    new code coexist during the rollout.'
  how_to_do_right: '1. Expand phase: add new column with default value. Both old and new code work.

    2. Migrate data: copy data from old column to new column (backfill script).

    3. Deploy new code: new code writes to BOTH columns, reads from new column.

    4. Verify: all pods on new version, new column is fully populated.

    5. Contract phase: deploy code that only uses new column. Remove old column.

    6. Never rename columns directly — add new, migrate, remove old.

    '
  severity: critical
  technologies:
    lang: [python]
    framework: [sqlalchemy, alembic, django]
    platform: [postgresql]
  domains:
    domain: [architecture, operations, deployment, databases]
  example_good: "# Expand-contract: rename 'username' to 'display_name'\n# Phase 1 (Expand): add new column, deploy code that\
    \ writes to both\n# migration_001_expand.py\ndef upgrade():\n    op.add_column(\"users\", sa.Column(\"display_name\",\
    \ sa.String(100)))\n    # Backfill: copy existing usernames to display_name\n    op.execute(\"UPDATE users SET display_name\
    \ = username WHERE display_name IS NULL\")\n\n# Application code v2: writes to BOTH columns, reads from new\nclass User(Base):\n\
    \    username = Column(String(100))      # Old column — still written\n    display_name = Column(String(100))  # New column\
    \ — read from here\n\n    def set_name(self, name: str):\n        self.display_name = name  # Primary\n        self.username\
    \ = name      # Backward compat — old pods read this\n\n# Phase 2 (Contract): after ALL pods are on v2, remove old column\n\
    # migration_002_contract.py (deployed days later)\ndef upgrade():\n    op.drop_column(\"users\", \"username\")\n"
  example_bad: "# Breaking migration — rename column directly\ndef upgrade():\n    op.alter_column(\"users\", \"username\"\
    , new_column_name=\"display_name\")\n\n# During rolling deployment:\n# Pod v1 (old code): SELECT username FROM users →\
    \ ColumnNotFoundError!\n# Pod v2 (new code): SELECT display_name FROM users → works\n# For ~5 minutes during rollout,\
    \ 50% of requests fail (old pods)\n# Result: 500 errors for users hitting old pods, alert fires, rollback needed\n"
  sources: ["https://microservices.io/patterns/deployment/multiple-services-per-host.html"]
  when_applies: "When organizing microservices around team ownership and organizational structure"
