layer: patterns
technology: General
domain: architecture
knowledge:
- id: CR-ARCH-MSD-001
  text: Decompose by Bounded Context — Each microservice maps to one DDD bounded context, owning its domain model, data store,
    and ubiquitous language.
  why: Decomposing by technical layer (UI service, business logic service, data service) recreates a distributed monolith.
    Decomposing by bounded context aligns services with business capabilities, giving each team autonomy over their domain.
    The Order context team can change their data model, add features, and deploy independently of the Inventory context team.
    This is the only decomposition strategy that survives organizational growth — when you add 10 developers, they join a
    bounded context team, not a 'database layer' team.
  how_to_do_right: '1. Identify bounded contexts through Event Storming or domain expert interviews.

    2. Each service owns its data store — no shared tables, no shared schemas.

    3. One ubiquitous language per service (Product in Catalog != Product in Inventory).

    4. Service boundaries should align with team boundaries (Inverse Conway Maneuver).

    5. Start with a modular monolith, extract services when organizational need arises.

    6. Size heuristic: a service should be maintainable by one team (5-8 people).

    '
  severity: critical
  technologies:
    lang: [python, java, typescript, go]
  domains:
    domain: [architecture]
    concern: [microservices, ddd]
  example_good: '# Decomposed by bounded context

    #

    # Catalog Service (Team: Product Discovery)

    #   - CatalogProduct: name, description, images, SEO

    #   - Owns: catalog_db (PostgreSQL)

    #   - API: GET /products, GET /products/{id}, POST /products

    #

    # Inventory Service (Team: Warehouse Ops)

    #   - InventoryItem: sku, qty_on_hand, warehouse_location

    #   - Owns: inventory_db (DynamoDB for high-throughput writes)

    #   - API: POST /reservations, GET /stock/{sku}

    #

    # Pricing Service (Team: Revenue)

    #   - PriceRule: product_id, base_price, discounts, tax_rules

    #   - Owns: pricing_db (PostgreSQL)

    #   - API: GET /prices/{product_id}, POST /price-quotes

    #

    # Each team deploys independently, uses different databases,

    # and communicates via domain events on Kafka.

    '
  example_bad: '# Decomposed by technical layer — distributed monolith

    #

    # "API Gateway Service" — all HTTP routes

    # "Business Logic Service" — all domain logic

    # "Data Access Service" — all database queries

    #

    # Problems:

    # - Adding a feature requires changes to ALL 3 services

    # - Cannot deploy API changes without deploying business logic changes

    # - Data Access Service is a shared dependency — bottleneck

    # - No team autonomy — everyone works on everything

    # - Worse than a monolith: same coupling + network overhead

    '
  sources: ["https://martinfowler.com/bliki/BoundedContext.html"]
  when_applies: "When decomposing a monolith into microservices or designing service boundaries from scratch"
- id: CR-ARCH-MSD-002
  text: Strangler Fig Migration — Incrementally replace a legacy monolith by routing traffic to new microservices, one feature
    at a time, until the monolith is empty.
  why: 'Big-bang rewrites fail 70% of the time (Standish Group). The new system takes 2 years, during which the old system
    continues evolving, creating a moving target. The Strangler Fig pattern avoids this: you build new features as microservices
    and route traffic to them via an API gateway or reverse proxy. The monolith shrinks as features migrate out. At no point
    is there a cutover — the migration is incremental and reversible. If a new service has issues, route traffic back to the
    monolith in seconds.'
  how_to_do_right: '1. Place a reverse proxy (API gateway, nginx) in front of the monolith.

    2. Identify a well-bounded feature to extract first (lowest risk, highest value).

    3. Build the new service, deploy alongside the monolith.

    4. Route traffic for that feature to the new service via the proxy.

    5. Verify correctness (shadow traffic, canary deployment, A/B testing).

    6. Repeat for the next feature. The monolith shrinks with each extraction.

    7. Keep the monolith running until ALL features are migrated (months or years).

    '
  severity: high
  technologies:
    lang: [python, java, typescript, go]
  domains:
    domain: [architecture, operations]
    concern: [microservices, migration]
  example_good: '# Phase 1: Proxy in front of monolith (zero behavior change)

    # nginx.conf

    # location / {

    #     proxy_pass http://monolith:8080;

    # }


    # Phase 2: Extract user authentication (well-bounded, high value)

    # nginx.conf

    # location /api/auth/ {

    #     proxy_pass http://auth-service:8081;  # New service

    # }

    # location / {

    #     proxy_pass http://monolith:8080;  # Everything else unchanged

    # }


    # Phase 3: Extract order management

    # nginx.conf

    # location /api/orders/ {

    #     proxy_pass http://order-service:8082;  # Another new service

    # }


    # Rollback: change one nginx line to route back to monolith

    # Risk: minimal — only the extracted feature is affected

    '
  example_bad: '# Big-bang rewrite — 18-month project

    #

    # Month 1-6: Build new system from scratch

    # Month 7-12: Realize we forgot half the edge cases

    # Month 13-15: Legacy system got 50 new features we need to port

    # Month 16: Team morale collapses

    # Month 17: Management demands a "cutover date"

    # Month 18: Cutover fails — data migration corrupts 5% of records

    # Month 19: Running BOTH systems in parallel (double operational cost)

    # Month 24: Rewrite abandoned, back to the monolith

    # Cost: $2M+ and 2 years, back to square one

    '
  sources: ["https://microservices.io/patterns/apigateway.html"]
  when_applies: "When deciding how microservices expose functionality to external clients or frontends"
- id: CR-ARCH-MSD-003
  text: Anti-Corruption Layer (ACL) — A translation layer that protects a new service from the domain model and assumptions
    of a legacy system or external dependency.
  why: When integrating with a legacy system, its quirks (inconsistent naming, denormalized data, implicit business rules
    encoded in column names like IS_ACTIVE_FLAG_2) leak into your clean domain model. Without an ACL, your new service inherits
    technical debt from every system it integrates with. The ACL translates between the external model and your internal model,
    isolating your domain from external complexity. When the legacy system is eventually replaced, only the ACL changes —
    your domain model is untouched.
  how_to_do_right: '1. Create a dedicated adapter module (acl/) that handles ALL communication with the external system.

    2. The ACL translates external DTOs into your domain model at the boundary.

    3. Your domain code NEVER references external system types, column names, or conventions.

    4. The ACL handles: data format translation, error mapping, retry logic, and caching.

    5. Test the ACL with contract tests that verify the translation is correct.

    6. When the external system changes, only the ACL needs updating.

    '
  severity: high
  technologies:
    lang: [python, java, typescript, go]
  domains:
    domain: [architecture]
    concern: [microservices, integration]
  example_good: "# Anti-Corruption Layer — isolates domain from legacy system quirks\n# acl/legacy_crm_adapter.py\nclass LegacyCRMAdapter:\n\
    \    \"\"\"Translates between legacy CRM's weird model and our clean domain.\"\"\"\n\n    def get_customer(self, customer_id:\
    \ str) -> Customer:\n        # Legacy CRM returns XML with bizarre field names\n        raw = self.crm_client.get(f\"\
    /CUST_MSTR/{customer_id}\")\n        return Customer(\n            id=customer_id,\n            name=f\"{raw['FRST_NM']}\
    \ {raw['LST_NM']}\",  # Translation\n            email=raw[\"ELEC_MAIL_ADDR\"],                 # Translation\n      \
    \      is_active=raw[\"ACCT_STAT_CD\"] == \"A\",        # Translation\n            tier=self._map_tier(raw[\"CUST_SEG_CD\"\
    ]),     # Translation\n        )\n\n    def _map_tier(self, legacy_code: str) -> CustomerTier:\n        mapping = {\"\
    P\": CustomerTier.PREMIUM, \"S\": CustomerTier.STANDARD}\n        return mapping.get(legacy_code, CustomerTier.BASIC)\n\
    \n# Domain code is clean — no legacy references\nclass CustomerService:\n    def __init__(self, customers: CustomerRepository):\n\
    \        self.customers = customers  # Could be ACL or direct DB\n\n    def upgrade_tier(self, customer_id: str) -> Customer:\n\
    \        customer = self.customers.get_customer(customer_id)\n        customer.upgrade()  # Clean domain logic\n     \
    \   return customer\n"
  example_bad: "# No ACL — legacy system quirks leak into domain code\nclass CustomerService:\n    def get_customer(self,\
    \ customer_id: str):\n        raw = crm_client.get(f\"/CUST_MSTR/{customer_id}\")\n        # Legacy field names EVERYWHERE\
    \ in domain code\n        name = f\"{raw['FRST_NM']} {raw['LST_NM']}\"\n        is_active = raw[\"ACCT_STAT_CD\"] == \"\
    A\"\n        # When CRM is replaced, ALL domain code must change\n        # When CRM adds new fields, domain code is polluted\n\
    \        return {\"name\": name, \"active\": is_active}\n"
  sources: ["https://microservices.io/patterns/data/saga.html"]
  when_applies: "When frontend teams need different API shapes for mobile, web, and third-party consumers"
- id: CR-ARCH-MSC-001
  text: Synchronous Communication with Circuit Breaker — Use REST/gRPC for request-reply interactions between services, always
    protected by circuit breakers to prevent cascade failures.
  why: 'When Service A synchronously calls Service B, and Service B is slow or down, Service A''s threads block waiting. If
    Service A has 100 threads and Service B takes 30 seconds to timeout, Service A is effectively down after 100 requests.
    This cascades: Service C calls Service A, which is now slow, so Service C backs up. Within minutes, the entire system
    is down because one service is slow. Circuit breakers detect failures and short-circuit calls, returning a fallback immediately
    instead of waiting for a timeout.'
  how_to_do_right: '1. Circuit breaker states: CLOSED (normal) → OPEN (failing, return fallback) → HALF-OPEN (probe recovery).

    2. Configure failure threshold (e.g., 5 failures in 10 seconds → OPEN).

    3. Configure recovery timeout (e.g., try again after 30 seconds → HALF-OPEN).

    4. Return meaningful fallback in OPEN state (cached data, default value, degraded response).

    5. Monitor circuit breaker state — OPEN circuits = degraded system health.

    6. Set connect AND read timeouts separately (connect: 1s, read: 5s).

    7. Use gRPC for internal service-to-service (binary, multiplexed, typed contracts).

    '
  severity: critical
  technologies:
    lang: [python, java, go, typescript]
  domains:
    domain: [architecture, reliability]
    concern: [microservices, resilience]
  example_good: "# Circuit breaker protecting a synchronous call\nimport circuitbreaker\n\nclass InventoryClient:\n    @circuitbreaker.circuit(\n\
    \        failure_threshold=5,\n        recovery_timeout=30,\n        expected_exception=InventoryServiceError,\n    )\n\
    \    def check_stock(self, sku: str) -> int:\n        response = httpx.get(\n            f\"{self.base_url}/stock/{sku}\"\
    ,\n            timeout=httpx.Timeout(connect=1.0, read=5.0),\n        )\n        response.raise_for_status()\n       \
    \ return response.json()[\"quantity\"]\n\n    def check_stock_with_fallback(self, sku: str) -> int:\n        try:\n  \
    \          return self.check_stock(sku)\n        except circuitbreaker.CircuitBreakerError:\n            # Circuit is\
    \ OPEN — return cached value instead of waiting\n            cached = self.cache.get(f\"stock:{sku}\")\n            return\
    \ int(cached) if cached else -1  # -1 = unknown\n\n# Monitor: alert when circuit opens\n# Grafana: circuit_breaker_state{service=\"\
    inventory\"} == \"open\"\n"
  example_bad: "# No circuit breaker — cascade failure waiting to happen\nclass InventoryClient:\n    def check_stock(self,\
    \ sku: str) -> int:\n        # No timeout — blocks forever if inventory service hangs\n        response = requests.get(f\"\
    {self.base_url}/stock/{sku}\")\n        return response.json()[\"quantity\"]\n        # If inventory service is slow (30s\
    \ response time):\n        # - Each caller thread blocks for 30s\n        # - 100 concurrent requests = 100 blocked threads\n\
    \        # - Thread pool exhausted = this service is now DOWN\n        # - Callers of THIS service also start blocking\n\
    \        # - Entire system cascades to failure in minutes\n"
  sources: ["https://microservices.io/patterns/communication-style/messaging.html"]
  when_applies: "When services need to communicate across process boundaries using synchronous or asynchronous patterns"
- id: CR-ARCH-MSC-002
  text: Asynchronous Communication with Events — Use events/messages for interactions that do not require an immediate response.
    Decouples services in time and availability.
  why: 'Synchronous communication creates temporal coupling: both services must be running at the same time. If the Notification
    service is down for maintenance, the Order service cannot confirm orders. With asynchronous events via a message broker
    (Kafka, RabbitMQ), the Order service publishes OrderPlaced and moves on. The Notification service processes the event
    when it is back online. Zero downtime for orders. Events also enable fan-out: one event, many subscribers, each reacting
    independently. Adding a new subscriber requires zero changes to the publisher.'
  how_to_do_right: '1. Events for fan-out: one publisher, many subscribers (OrderPlaced → Inventory + Notifications + Analytics).

    2. Commands for point-to-point: one sender, one receiver (SendEmail command → Email Worker).

    3. Idempotent consumers: events may be delivered more than once (use event_id for dedup).

    4. At-least-once delivery: ensure consumers can safely re-process events.

    5. Dead letter queue: unprocessable events go to DLQ for investigation, not silently dropped.

    6. Schema evolution: use Avro/Protobuf with schema registry for backward/forward compatibility.

    7. Monitoring: track consumer lag — if lag grows, consumer is falling behind.

    '
  severity: critical
  technologies:
    lang: [python, java, typescript, go]
  domains:
    domain: [architecture]
    concern: [microservices, events]
  example_good: "# Publisher — fire and forget (does not wait for subscribers)\nclass OrderService:\n    async def place_order(self,\
    \ cmd: PlaceOrderCommand) -> Order:\n        order = Order.create(cmd.customer_id, cmd.items)\n        await self.order_repo.save(order)\n\
    \        # Publish event — does not block on subscriber processing\n        await self.event_bus.publish(\"orders\", OrderPlaced(\n\
    \            event_id=uuid4(),  # For idempotency\n            order_id=order.id,\n            customer_id=order.customer_id,\n\
    \            total=order.total,\n            items=[i.to_dict() for i in order.items],\n        ))\n        return order\
    \  # Returns immediately — subscribers process async\n\n# Subscriber — idempotent consumer\nclass InventorySubscriber:\n\
    \    async def handle(self, event: OrderPlaced):\n        if await self.dedup_store.seen(event.event_id):\n          \
    \  return  # Already processed — skip (idempotent)\n        for item in event.items:\n            await self.warehouse.reserve(item[\"\
    sku\"], item[\"quantity\"])\n        await self.dedup_store.mark_seen(event.event_id)\n"
  example_bad: "# Synchronous fan-out — each subscriber blocks the publisher\nclass OrderService:\n    async def place_order(self,\
    \ cmd: PlaceOrderCommand) -> Order:\n        order = Order.create(cmd.customer_id, cmd.items)\n        await self.order_repo.save(order)\n\
    \        # Synchronous calls — if ANY fails, order creation fails\n        await self.inventory_client.reserve(order.items)\
    \  # 200ms\n        await self.notification_client.send(order.id)     # 500ms (email is slow)\n        await self.analytics_client.record(order.id)\
    \      # 100ms\n        await self.loyalty_client.award_points(order.id)  # 150ms\n        # Total: 950ms just for side\
    \ effects\n        # If notification service is down → order creation fails\n        # If analytics service is slow →\
    \ order creation is slow\n        return order\n"
  sources: ["https://microservices.io/patterns/data/event-sourcing.html"]
  when_applies: "When choosing between REST, gRPC, or messaging for inter-service communication"
- id: CR-ARCH-MSG-001
  text: API Gateway Pattern — A single entry point that aggregates calls to multiple backend services, handles cross-cutting
    concerns (auth, rate limiting, routing), and presents a unified API to clients.
  why: Without a gateway, clients must know the addresses of every microservice, handle authentication with each one, and
    make multiple round-trips for a single page. A mobile app loading the order detail page would make 5 separate HTTP calls
    (order, items, payment, shipment, customer). The API Gateway aggregates these into one call, handles authentication once,
    rate limits clients, and routes requests to the correct backend service. It also enables the BFF pattern by providing
    different aggregation for different clients.
  how_to_do_right: '1. Authentication/authorization: validate tokens once at the gateway, pass user context to backends.

    2. Rate limiting: protect backend services from traffic spikes at the gateway.

    3. Request routing: route /api/orders/* to order-service, /api/users/* to user-service.

    4. Response aggregation: compose responses from multiple backends into one response.

    5. Circuit breaking: protect clients from backend failures with fallbacks at the gateway.

    6. Keep the gateway THIN: routing + auth + rate limiting. NO business logic.

    7. Use managed gateways (Kong, AWS API Gateway, Envoy) for production.

    '
  severity: high
  technologies:
    lang: [python, typescript, go, java]
  domains:
    domain: [architecture, api]
    concern: [microservices]
  example_good: "# API Gateway — aggregation + auth + rate limiting\n# gateway/routes/order_detail.py\n@router.get(\"/api/orders/{order_id}\"\
    )\n@require_auth          # Auth handled once at gateway\n@rate_limit(\"100/min\") # Rate limiting at gateway\nasync def\
    \ order_detail(order_id: str, user: AuthUser = Depends()):\n    # Parallel calls to backend services\n    order, payment,\
    \ shipment = await asyncio.gather(\n        order_service.get(order_id),\n        payment_service.get_by_order(order_id),\n\
    \        shipment_service.get_by_order(order_id),\n    )\n    # Aggregate into single response\n    return {\n       \
    \ \"order\": order,\n        \"payment\": payment,\n        \"shipment\": shipment,\n    }\n    # Client makes 1 call\
    \ instead of 3\n    # Auth checked once, not 3 times\n    # Backend services don't need to implement auth or rate limiting\n"
  example_bad: '# No gateway — client calls each service directly

    # Mobile app loading order detail:

    # Call 1: GET http://order-service:8081/orders/123 (needs auth token)

    # Call 2: GET http://payment-service:8082/payments?order=123 (needs auth token)

    # Call 3: GET http://shipment-service:8083/shipments?order=123 (needs auth token)

    # Call 4: GET http://user-service:8084/users/456 (needs auth token)

    # Call 5: GET http://review-service:8085/reviews?order=123 (needs auth token)

    #

    # Problems:

    # - 5 round-trips on mobile (high latency on 3G/4G)

    # - Client knows service addresses (tight coupling to infrastructure)

    # - Auth handled 5 times (5 token validations)

    # - No centralized rate limiting — each service implements its own

    # - Client must handle 5 different error formats

    '
  sources: ["https://microservices.io/patterns/apigateway.html"]
  when_applies: "When implementing API gateways to route, aggregate, and secure cross-cutting concerns for microservices"
- id: CR-ARCH-MSM-001
  text: 'Service Mesh — A dedicated infrastructure layer (sidecar proxies) that handles service-to-service communication:
    mTLS, traffic management, observability, and policy enforcement, without application code changes.'
  why: 'Without a service mesh, every service must implement retry logic, circuit breakers, mTLS, distributed tracing, and
    traffic management in application code. This means every service in every language must include the same libraries, configured
    consistently. A Go service and a Python service must both correctly implement circuit breakers — and when the retry policy
    changes, both must be updated. A service mesh moves all of this to the infrastructure layer: a sidecar proxy (Envoy) handles
    it transparently. Application code focuses on business logic.'
  how_to_do_right: '1. Data plane: sidecar proxy (Envoy) deployed alongside every service pod.

    2. Control plane: central configuration (Istio, Linkerd) that programs the sidecars.

    3. mTLS: automatic encryption between all services — zero-trust networking.

    4. Traffic management: canary deployments, traffic shifting, fault injection — all via config.

    5. Observability: distributed tracing, request metrics — automatic, no code changes.

    6. When NOT to use: <10 services, single language, small team (operational overhead too high).

    '
  severity: medium
  technologies:
    platform: [kubernetes, service_mesh, istio, linkerd, envoy]
  domains:
    domain: [architecture, infrastructure]
    concern: [microservices]
  example_good: "# Service mesh configuration — zero application code changes\n# istio/virtual-service.yaml\n# Canary deployment:\
    \ 90% traffic to v1, 10% to v2\napiVersion: networking.istio.io/v1beta1\nkind: VirtualService\nmetadata:\n  name: order-service\n\
    spec:\n  hosts:\n    - order-service\n  http:\n    - route:\n        - destination:\n            host: order-service\n\
    \            subset: v1\n          weight: 90\n        - destination:\n            host: order-service\n            subset:\
    \ v2\n          weight: 10\n      retries:\n        attempts: 3\n        perTryTimeout: 2s\n      timeout: 10s\n\n# Application\
    \ code — just business logic, zero networking code\n@router.post(\"/orders\")\nasync def create_order(body: CreateOrderRequest):\n\
    \    order = await order_service.create(body)\n    return order\n    # mTLS, retries, timeouts, tracing — all handled\
    \ by sidecar\n"
  example_bad: "# No service mesh — every service implements networking in code\nclass OrderService:\n    def call_inventory(self,\
    \ sku: str):\n        # Retry logic in application code\n        for attempt in range(3):\n            try:\n        \
    \        resp = requests.get(\n                    f\"https://inventory:8080/stock/{sku}\",\n                    cert=(\"\
    /certs/client.crt\", \"/certs/client.key\"),  # Manual mTLS\n                    verify=\"/certs/ca.crt\",\n         \
    \           timeout=5,\n                )\n                return resp.json()\n            except requests.Timeout:\n\
    \                if attempt == 2:\n                    raise\n                time.sleep(2 ** attempt)  # Manual backoff\n\
    \        # Same logic in EVERY service, in EVERY language\n        # Certificate rotation requires redeploying all services\n\
    \        # Canary deployment requires application-level routing code\n"
  sources: ["https://microservices.io/patterns/observability/distributed-tracing.html"]
  when_applies: "When tracking requests across multiple microservices for debugging and performance analysis"
- id: CR-ARCH-MDA-001
  text: Database per Service — Each microservice owns its private database. No service directly accesses another service's
    database. Cross-service data access is via APIs or events.
  why: 'A shared database is the #1 cause of distributed monoliths. When Order Service and Inventory Service share the same
    orders table, a schema migration for Order Service breaks Inventory Service. Both services must be deployed together.
    Both teams must coordinate schema changes. The database becomes a single point of failure and a coupling magnet. Database
    per service ensures true independence: each service can use the optimal database technology (PostgreSQL for orders, DynamoDB
    for inventory, Elasticsearch for search) and evolve its schema without affecting others.'
  how_to_do_right: '1. Each service has its own database instance (or at minimum, its own schema with strict access control).

    2. Cross-service queries: use API composition (service A calls service B''s API) or CQRS projections.

    3. Cross-service transactions: use sagas (compensating transactions), not distributed 2PC.

    4. Data duplication is OK: Inventory Service can cache product names from Catalog Service.

    5. Use domain events to propagate changes: CatalogService publishes ProductRenamed, Inventory updates its cache.

    6. Polyglot persistence: each service chooses the optimal database for its access pattern.

    '
  severity: critical
  technologies:
    platform: [postgresql, dynamodb, mongodb, redis]
  domains:
    domain: [architecture]
    concern: [microservices, data]
  example_good: "# Each service owns its database — independent evolution\n#\n# Order Service → orders_db (PostgreSQL)\n#\
    \   - Tables: orders, order_items, order_events\n#   - Team: can change schema without coordinating with anyone\n#\n#\
    \ Inventory Service → inventory_db (DynamoDB)\n#   - Tables: stock_levels, reservations\n#   - Optimized for high-throughput\
    \ write (stock updates)\n#\n# Search Service → search_index (Elasticsearch)\n#   - Index: products\n#   - Optimized for\
    \ full-text search and faceted filtering\n#\n# Cross-service query: \"Get order with product details\"\nasync def get_order_with_details(order_id:\
    \ str):\n    order = await order_service.get_order(order_id)  # API call\n    products = await catalog_service.get_products(\
    \   # API call\n        [item.product_id for item in order.items]\n    )\n    return OrderDetail(order=order, products=products)\n"
  example_bad: '# Shared database — all services query the same tables

    #

    # shared_db:

    #   orders table — written by Order Service, read by Inventory, Analytics, Shipping

    #   products table — written by Catalog Service, read by Order, Search, Analytics

    #   customers table — written by User Service, read by Order, Billing, Support

    #

    # Order Service:

    SELECT o.*, p.name, c.email

    FROM orders o

    JOIN products p ON o.product_id = p.id  -- Accessing Catalog''s table!

    JOIN customers c ON o.customer_id = c.id  -- Accessing User''s table!

    #

    # Catalog team renames products.name to products.title

    # → Order Service breaks (reads products.name)

    # → Search Service breaks (indexes products.name)

    # → Analytics breaks (reports on products.name)

    # Three services break because ONE team changed their column name

    '
  sources: ["https://microservices.io/patterns/data/database-per-service.html"]
  when_applies: "When deciding how microservices manage and own their persistent data stores"
- id: CR-ARCH-MDA-002
  text: Outbox Pattern — Reliably publish events by writing them to an outbox table in the same database transaction as the
    business data change. A separate process reads the outbox and publishes to the message broker.
  why: 'The dual write problem: a service updates its database AND publishes an event to Kafka. If the database write succeeds
    but the Kafka publish fails (network timeout), the database has the new state but no event was published — subscribers
    never know about the change. If Kafka publish succeeds but the database write fails (constraint violation), an event was
    published for a state that does not exist. The outbox pattern solves this: write both the business data and the event
    record in the SAME database transaction (atomic). A separate process (Debezium CDC or polling) reads the outbox and publishes
    to the broker.'
  how_to_do_right: '1. Write business data + outbox record in ONE database transaction.

    2. Outbox table: id, aggregate_type, aggregate_id, event_type, payload, created_at, published_at.

    3. A relay process reads unpublished outbox records and publishes to the broker.

    4. After successful publish, mark outbox record as published (or delete it).

    5. CDC option (Debezium): reads the database WAL — no polling needed, sub-second latency.

    6. Polling option: SELECT * FROM outbox WHERE published_at IS NULL — simpler, higher latency.

    7. Consumer idempotency: events may be published more than once (relay retries).

    '
