    \ the line below fails:\n        # → DB has the order, but NO event published\n        # → Inventory never reserves stock\n\
    \        # → Customer is charged but items are never shipped\n        await self.kafka.publish(\"OrderPlaced\", order.to_json())\n\
    \        # Or worse: Kafka succeeds but DB fails (constraint violation)\n        # → Event published for an order that\
    \ does not exist\n        # → Inventory reserves stock that should not be reserved\n"
