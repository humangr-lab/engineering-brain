- id: CR-ARCH-MST-001
  text: Consumer-Driven Contract Testing — The consumer service defines a contract (expected request/response), and the provider
    service verifies it passes. Catches breaking changes before deployment.
  why: Integration tests between microservices are slow, flaky, and require all services running simultaneously. End-to-end
    tests catch integration failures too late (after merge, during staging). Contract tests catch API incompatibilities at
    build time. When the Payment Service changes its response format, the Order Service's contract test fails in the Payment
    Service's CI pipeline — BEFORE the breaking change is deployed. This shifts integration failure detection left by days.
  how_to_do_right: '1. Consumer defines a contract: ''When I send POST /payments with {amount: 100}, I expect {id: string,
    status: string}''.

    2. Contract is stored in a shared location (Pact Broker, Git repo).

    3. Provider runs consumer contracts in its CI pipeline — if any fail, build fails.

    4. Provider can evolve its API freely AS LONG AS all consumer contracts still pass.

    5. New fields can be added (backward compatible) — contract tests pass.

    6. Removing fields breaks consumer contracts — caught at build time.

    '
  severity: high
  technologies:
    lang: [python, java, typescript, go]
  domains:
    domain: [architecture, testing]
    concern: [microservices]
  example_good: "# Consumer side (Order Service) — defines what it expects from Payment Service\n# tests/contracts/test_payment_contract.py\n\
    @pact.given(\"a valid payment method exists\")\n@pact.upon_receiving(\"a charge request\")\ndef test_charge_creates_payment(pact_server):\n\
    \    pact_server.will_respond_with(\n        method=\"POST\",\n        path=\"/payments\",\n        body={\"amount\":\
    \ 100, \"currency\": \"USD\", \"method_id\": \"pm_123\"},\n        response={\n            \"status\": 201,\n        \
    \    \"body\": Like({\n                \"id\": \"pay_xxx\",       # Must be a string\n                \"status\": \"succeeded\"\
    ,  # Must be a string\n                \"amount\": 100,          # Must be a number\n            }),\n        },\n   \
    \ )\n    # This contract is published to the Pact Broker\n\n# Provider side (Payment Service) — verifies consumer contracts\n\
    # tests/contracts/test_verify_consumers.py\ndef test_order_service_contract():\n    pact_verifier.verify(\n        provider=\"\
    payment-service\",\n        consumer=\"order-service\",\n        pact_url=\"https://pact-broker/pacts/order-service/payment-service/latest\"\
    ,\n    )\n    # If Payment Service removes \"amount\" from response → TEST FAILS\n    # Caught BEFORE deployment, not\
    \ in production\n"
  example_bad: '# No contract tests — integration failures discovered in staging

    # Payment Service v2 removes "amount" from response (replaced with "total")

    # Payment Service CI: all unit tests pass (no contract tests)

    # Payment Service: deployed to staging

    # Order Service: calls Payment Service, expects "amount" field

    # Order Service: KeyError: "amount" — discovered 3 days later in staging

    # Hotfix: Payment Service adds "amount" back, deprecation notice

    # Cost: 3 days of broken staging, multiple teams blocked

    '
  sources: ["https://martinfowler.com/articles/consumerDrivenContracts.html"]
  when_applies: "When validating API compatibility between microservices during CI/CD"
- id: CR-ARCH-MDP-001
  text: Sidecar Pattern — Deploy a helper container alongside the main application container in the same pod. The sidecar
    handles cross-cutting concerns (logging, monitoring, configuration) without modifying the main application.
  why: Cross-cutting concerns like log collection, metrics export, TLS termination, and configuration refresh are needed by
    every service. Without sidecars, every service must include these libraries in its application code, in every language
    (Python, Go, Java). When the log format changes, every service must be updated. The sidecar pattern deploys a helper container
    that handles these concerns via a shared localhost network. The application writes logs to stdout; the sidecar ships them
    to Elasticsearch. The application serves HTTP; the sidecar terminates TLS.
  how_to_do_right: '1. Sidecar runs in the same pod/network namespace as the main application.

    2. Communication between app and sidecar is via localhost (fast, no network).

    3. Common sidecars: Envoy (networking), Fluentd (logging), Vault Agent (secrets).

    4. The application is unaware of the sidecar — zero code changes.

    5. Sidecar lifecycle is tied to the main container (starts and stops together).

    6. Resource limits: set CPU/memory limits for sidecars separately from the application.

    '
  severity: medium
  technologies:
    platform: [kubernetes, docker, envoy]
  domains:
    domain: [architecture, operations, deployment]
    concern: [microservices]
  example_good: "# Kubernetes pod with sidecar for log collection\napiVersion: v1\nkind: Pod\nmetadata:\n  name: order-service\n\
    spec:\n  containers:\n    # Main application — just writes logs to stdout\n    - name: order-service\n      image: order-service:v1.2.0\n\
    \      ports:\n        - containerPort: 8080\n      resources:\n        limits: { cpu: \"500m\", memory: \"512Mi\" }\n\
    \n    # Sidecar — ships logs to Elasticsearch\n    - name: log-shipper\n      image: fluent/fluent-bit:latest\n      volumeMounts:\n\
    \        - name: varlog\n          mountPath: /var/log\n      resources:\n        limits: { cpu: \"100m\", memory: \"\
    128Mi\" }\n\n    # Sidecar — exports Prometheus metrics\n    - name: metrics-exporter\n      image: prom/statsd-exporter:latest\n\
    \      ports:\n        - containerPort: 9102\n      resources:\n        limits: { cpu: \"50m\", memory: \"64Mi\" }\n"
  example_bad: "# No sidecar — cross-cutting concerns in application code\n# order_service/main.py\nimport elasticsearch \
    \ # Log shipping dependency\nimport prometheus_client  # Metrics dependency\nimport hvac  # Vault client for secrets\n\
    import certifi  # TLS certificate management\n\nclass OrderService:\n    def __init__(self):\n        # Application code\
    \ handles ALL cross-cutting concerns\n        self.es = elasticsearch.Elasticsearch(...)  # Log shipping\n        self.vault\
    \ = hvac.Client(...)               # Secret management\n        self.prom = prometheus_client.start_http_server(9102)\
    \  # Metrics\n\n    def handle_request(self, request):\n        self.es.index(\"logs\", {\"msg\": f\"Request received:\
    \ {request}\"})  # Logging\n        self.prom.counter(\"requests_total\").inc()  # Metrics\n        secret = self.vault.read(\"\
    secret/db-password\")  # Secrets\n        # Actual business logic buried under cross-cutting concerns\n        # Must\
    \ be replicated in EVERY service, in EVERY language\n"
  sources: ["https://12factor.net/config"]
  when_applies: "When managing service configuration across multiple environments without redeployment"
- id: CR-ARCH-MDP-002
  text: Service Discovery — Enable services to find each other dynamically without hardcoded addresses. Essential for auto-scaling,
    rolling deployments, and failover.
  why: 'When Service A calls Service B at http://192.168.1.42:8080, that address is hardcoded to a specific machine. If Service
    B scales to 3 instances, moves to a different host, or crashes and restarts on a new IP, Service A cannot find it. Service
    discovery solves this: Service A asks ''where is service-b?'' and gets back a list of healthy instances. In Kubernetes,
    this is built-in via DNS-based service discovery (service-b.namespace.svc.cluster.local). Outside Kubernetes, use Consul,
    Eureka, or DNS-based solutions.'
  how_to_do_right: '1. DNS-based (simplest): Kubernetes Services provide automatic DNS (service-name.namespace).

    2. Client-side discovery: client queries service registry, picks an instance (load balancing in client).

    3. Server-side discovery: client calls a load balancer/proxy, which routes to an instance.

    4. Health checks: registry removes unhealthy instances automatically.

    5. Never hardcode IP addresses or ports — always use service names.

    6. Combine with circuit breakers: if discovered instance is failing, try another one.

    '
  severity: high
  technologies:
    lang: [python, go]
    platform: [kubernetes, consul]
  domains:
    domain: [architecture, infrastructure]
    concern: [microservices]
  example_good: "# Kubernetes DNS-based service discovery (built-in, zero config)\n# order-service calls inventory-service\
    \ by NAME\nclass InventoryClient:\n    def __init__(self):\n        # DNS resolves to any healthy pod running inventory-service\n\
    \        self.base_url = \"http://inventory-service.production.svc.cluster.local:8080\"\n        # Or simply \"http://inventory-service:8080\"\
    \ within same namespace\n\n    def check_stock(self, sku: str) -> int:\n        response = httpx.get(f\"{self.base_url}/stock/{sku}\"\
    )\n        return response.json()[\"quantity\"]\n\n# Kubernetes Service definition\n# apiVersion: v1\n# kind: Service\n\
    # metadata:\n#   name: inventory-service\n# spec:\n#   selector:\n#     app: inventory-service\n#   ports:\n#     - port:\
    \ 8080\n#       targetPort: 8080\n# Scales to 10 pods → DNS round-robin across all 10\n"
  example_bad: "# Hardcoded addresses — breaks on scale, deploy, or failure\nclass InventoryClient:\n    INVENTORY_HOSTS =\
    \ [\n        \"http://192.168.1.42:8080\",  # Machine A\n        \"http://192.168.1.43:8080\",  # Machine B\n    ]\n \
    \   # If Machine A is replaced → address is invalid\n    # If we add Machine C → must update code and redeploy\n    #\
    \ If Machine B crashes and restarts on 192.168.1.50 → unreachable\n    # Rolling deployment changes ports → client doesn't\
    \ know\n"
  sources: ["https://martinfowler.com/bliki/BlueGreenDeployment.html"]
  when_applies: "When designing deployment strategies that minimize downtime and risk for microservices"
- id: CR-ARCH-MSO-001
  text: Distributed Tracing — Propagate a trace ID across all service calls in a request chain. Each service adds a span with
    timing and metadata. The full trace shows the complete request journey.
  why: 'When a user reports that their order took 15 seconds, which of the 12 services in the call chain was slow? Without
    distributed tracing, debugging requires correlating logs across 12 services by timestamp — a process that takes hours.
    With tracing, a single trace ID shows the complete request journey: API Gateway (20ms) → Order Service (100ms) → Inventory
    Service (50ms) → Payment Service (14,800ms — the bottleneck!). Distributed tracing turns a multi-hour debugging session
    into a 5-minute investigation.'
  how_to_do_right: '1. Inject a trace ID (W3C Trace Context or Zipkin B3) at the entry point (API Gateway).

    2. Propagate the trace ID in every service-to-service call (HTTP header, message attribute).

    3. Each service creates a span with: service name, operation name, start/end time, status, tags.

    4. Use OpenTelemetry SDK — vendor-neutral, supports Jaeger, Zipkin, Datadog, Honeycomb.

    5. Service mesh (Istio, Linkerd) auto-instruments HTTP calls — zero code changes.

    6. Sample at high traffic: 1% of requests traced (reduces storage cost, maintains visibility).

    '
  severity: high
  technologies:
    lang: [python, go]
    platform: [opentelemetry, jaeger]
  domains:
    domain: [architecture, observability]
    concern: [microservices]
  example_good: "# OpenTelemetry auto-instrumentation — minimal code changes\nfrom opentelemetry import trace\nfrom opentelemetry.instrumentation.fastapi\
    \ import FastAPIInstrumentor\nfrom opentelemetry.instrumentation.httpx import HTTPXClientInstrumentor\n\n# Auto-instrument\
    \ framework and HTTP client\nFastAPIInstrumentor.instrument_app(app)\nHTTPXClientInstrumentor.instrument()\n\ntracer =\
    \ trace.get_tracer(\"order-service\")\n\n@router.post(\"/orders\")\nasync def create_order(body: CreateOrderRequest):\n\
    \    # Span automatically created by FastAPI instrumentor\n    with tracer.start_as_current_span(\"validate_order\") as\
    \ span:\n        span.set_attribute(\"order.customer_id\", body.customer_id)\n        span.set_attribute(\"order.item_count\"\
    , len(body.items))\n        # Business logic here\n\n    # httpx call to inventory-service automatically propagates trace\
    \ context\n    stock = await inventory_client.check_stock(body.items[0].sku)\n    # Trace shows: Gateway → Order Service\
    \ → Inventory Service\n    # Each span has timing — bottleneck is immediately visible\n"
  example_bad: "# No tracing — debugging distributed latency takes hours\n@router.post(\"/orders\")\nasync def create_order(body:\
    \ CreateOrderRequest):\n    logger.info(f\"Creating order for {body.customer_id}\")  # timestamp only\n    order = await\
    \ order_service.create(body)\n    logger.info(f\"Order created: {order.id}\")\n\n# In inventory-service:\nlogger.info(f\"\
    Checking stock for {sku}\")  # Different log, different time\n# Debugging: grep 12 service logs, correlate by timestamp\
    \ (off by milliseconds)\n# \"Was it the network between Order and Inventory, or Inventory's DB query?\"\n# Answer: impossible\
    \ to determine without trace spans\n"
  sources: ["https://opentelemetry.io/docs/concepts/signals/traces/"]
  when_applies: "When setting up observability for distributed tracing, metrics, and logging in a microservice architecture"
- id: CR-ARCH-MDP-003
  text: Canary Deployment — Route a small percentage of production traffic to the new version while monitoring key metrics.
    If metrics degrade, automatically roll back. Gradually increase traffic if healthy.
  why: 'Deploying a new version to 100% of traffic at once means that a bug affects 100% of users immediately. Canary deployment
    limits the blast radius: route 1% of traffic to the new version, monitor error rates and latency for 15 minutes. If healthy,
    increase to 10%, then 50%, then 100%. If unhealthy at any stage, route 100% back to the old version in seconds. The cost
    of finding a bug with canary deployment is 1% of users affected for 15 minutes. Without canary, it is 100% of users affected
    until someone notices.'
  how_to_do_right: '1. Deploy new version alongside old version (both running simultaneously).

    2. Route 1-5% of traffic to new version via load balancer/ingress weights.

    3. Monitor SLIs: error rate, latency p99, success rate. Compare with baseline.

    4. Automated promotion: if metrics are within threshold after N minutes, increase traffic %.

    5. Automated rollback: if metrics degrade beyond threshold, route 100% to old version.

    6. Use progressive delivery tools: Argo Rollouts, Flagger, Istio traffic splitting.

    '
  severity: high
  technologies:
    library: [argo rollouts]
    platform: [kubernetes, service_mesh, istio, nginx]
  domains:
    domain: [architecture, operations, deployment, reliability]
  example_good: "# Argo Rollouts canary deployment\napiVersion: argoproj.io/v1alpha1\nkind: Rollout\nmetadata:\n  name: order-service\n\
    spec:\n  replicas: 10\n  strategy:\n    canary:\n      steps:\n        - setWeight: 5          # 5% traffic to new version\n\
    \        - pause: { duration: 5m } # Monitor for 5 minutes\n        - setWeight: 20\n        - pause: { duration: 5m }\n\
    \        - setWeight: 50\n        - pause: { duration: 10m }\n        - setWeight: 100         # Full rollout\n      analysis:\n\
    \        templates:\n          - templateName: success-rate\n        args:\n          - name: service-name\n         \
    \   value: order-service\n  # Automatic rollback if success rate drops below 99.5%\n  # At 5% canary: only 5% of users\
    \ see the bug, for max 5 minutes\n"
  example_bad: '# Big-bang deployment — 100% traffic to new version instantly

    kubectl set image deployment/order-service order-service=v2.0.0

    # All 10 pods updated simultaneously

    # Bug in v2.0.0: payment validation broken

    # 100% of users affected immediately

    # Time to detect: 10 minutes (alerting threshold)

    # Time to rollback: 5 minutes (kubectl rollout undo)

    # Impact: 100% of users for 15 minutes = thousands of failed orders

    '
  sources: ["https://martinfowler.com/bliki/CanaryRelease.html"]
  when_applies: "When rolling out new features incrementally to a subset of users or traffic"
- id: CR-ARCH-MSF-001
  text: Externalized Configuration — Store all environment-specific configuration outside the application code. Use environment
    variables, config maps, or a configuration service. Never hardcode values that change between environments.
  why: Hardcoded configuration values (database URLs, API keys, feature flags) force rebuilding and redeploying the application
    for every environment change. The same Docker image should run in development, staging, and production — only the configuration
    differs. Twelve-Factor App methodology (Factor III) mandates strict separation of config from code. When a database connection
    string is hardcoded, rotating credentials requires a code change, a build, a deploy, and a release — a 2-hour process
    for a 2-second operation.
  how_to_do_right: '1. Environment variables for simple key-value config (DATABASE_URL, API_KEY, LOG_LEVEL).

    2. Config maps for structured config (Kubernetes ConfigMaps, Docker Compose env_file).

    3. Secret management for credentials (Vault, AWS Secrets Manager, K8s Secrets).

    4. Feature flag service for runtime toggles (LaunchDarkly, Unleash, Flagsmith).

    5. NEVER hardcode: URLs, ports, credentials, feature flags, timeouts, retry counts.

    6. Config validation at startup: fail fast if required config is missing.

    '
  severity: critical
  technologies:
    lang: [python, go]
    platform: [kubernetes, docker]
  domains:
    domain: [architecture, operations, deployment, devops]
  example_good: "# Configuration from environment variables with validation\nfrom pydantic_settings import BaseSettings\n\n\
    class Settings(BaseSettings):\n    database_url: str            # Required — fails if missing\n    redis_url: str = \"\
    redis://localhost:6379\"  # Default for development\n    log_level: str = \"INFO\"\n    max_retries: int = 3\n    stripe_api_key:\
    \ str          # Required — no default for secrets\n    feature_new_checkout: bool = False  # Feature flag\n\n    class\
    \ Config:\n        env_file = \".env\"        # Local development\n        case_sensitive = False\n\n# Validated at import\
    \ time — fails fast if misconfigured\nsettings = Settings()\n\n# Usage\ndb = create_engine(settings.database_url)\n\n\
    # Same Docker image, different environments:\n# Dev:     DATABASE_URL=sqlite:///dev.db  STRIPE_API_KEY=sk_test_...\n#\
    \ Staging: DATABASE_URL=postgresql://staging-db/app  STRIPE_API_KEY=sk_test_...\n# Prod:    DATABASE_URL=postgresql://prod-db/app\
    \  STRIPE_API_KEY=sk_live_...\n"
  example_bad: '# Hardcoded configuration — different code per environment

    DATABASE_URL = "postgresql://prod-server:5432/myapp"  # Hardcoded!

    STRIPE_API_KEY = "sk_live_abc123..."                  # SECRET IN CODE!

    MAX_RETRIES = 3                                       # Cannot change without deploy


    # To run locally: comment out prod URL, uncomment dev URL

    # DATABASE_URL = "sqlite:///dev.db"  # Uncomment for local dev

    # Developers forget to switch back → push dev config to production

    '
  sources: ["https://martinfowler.com/articles/feature-toggles.html"]
  when_applies: "When implementing feature flags or canary releases for microservice deployments"
- id: CR-ARCH-MSI-001
  text: Idempotency Keys for API Calls — Allow clients to safely retry failed requests by including a client-generated unique
    key. The server returns the same response for the same key, regardless of how many times it is called.
  why: 'Network failures are inevitable: a client sends a payment request, the server processes it successfully, but the response
    is lost due to a network timeout. The client does not know if the payment was charged or not. Without idempotency, retrying
    charges the customer twice. With an idempotency key, the client retries the SAME request with the SAME key, and the server
    returns the SAME response as the original (already-processed) request. Stripe, PayPal, and AWS all use this pattern for
    financial operations.'
  how_to_do_right: '1. Client generates a unique key per request (UUID v4) and includes it in the header.

    2. Server stores: idempotency_key → (status_code, response_body) in Redis/DB.

    3. On duplicate key: return stored response WITHOUT re-executing the operation.

    4. TTL: expire idempotency records after 24-48 hours (prevent unbounded storage growth).

    5. Key scope: per-user, per-API-key (different users can use the same key independently).

    6. Error responses: do NOT cache — client should be able to retry after fixing the error.

    '
  severity: critical
  technologies:
    lang: [python, java, go]
    platform: [redis]
  domains:
    domain: [architecture, api, reliability]
  example_good: "# Server-side idempotency implementation\n@router.post(\"/payments\")\nasync def create_payment(\n    body:\
    \ PaymentRequest,\n    idempotency_key: str = Header(..., alias=\"Idempotency-Key\"),\n):\n    # Check for existing response\n\
    \    cache_key = f\"idempotency:{request.user_id}:{idempotency_key}\"\n    cached = await redis.get(cache_key)\n    if\
    \ cached:\n        stored = json.loads(cached)\n        return JSONResponse(stored[\"body\"], status_code=stored[\"status\"\
    ])\n\n    # Process the payment (first time)\n    try:\n        payment = await payment_service.charge(body)\n       \
    \ response = {\"id\": payment.id, \"status\": \"succeeded\", \"amount\": body.amount}\n        status = 201\n    except\
    \ InsufficientFunds:\n        # Do NOT cache error responses — client can retry after adding funds\n        return JSONResponse({\"\
    error\": \"insufficient_funds\"}, status_code=402)\n\n    # Cache successful response for 24 hours\n    await redis.set(cache_key,\
    \ json.dumps({\"status\": status, \"body\": response}), ex=86400)\n    return JSONResponse(response, status_code=status)\n\
    \n# Client usage:\n# key = str(uuid4())\n# response = httpx.post(\"/payments\", headers={\"Idempotency-Key\": key}, json=data)\n\
    # If timeout: retry with SAME key → server returns same response, no double charge\n"
  example_bad: "# No idempotency — retries cause duplicate operations\n@router.post(\"/payments\")\nasync def create_payment(body:\
    \ PaymentRequest):\n    payment = await payment_service.charge(body)\n    return {\"id\": payment.id, \"status\": \"succeeded\"\
    }\n    # Client sends POST, gets timeout (response lost)\n    # Client retries POST → second charge!\n    # Customer charged\
    \ twice for one order\n    # Manual refund required → support ticket → customer trust lost\n"
  sources: ["https://microservices.io/patterns/apigateway.html"]
  when_applies: "When building services that need runtime feature toggles for A/B testing or gradual rollouts"
- id: CR-ARCH-MSX-001
  text: Choreography vs Orchestration — Choose event-driven choreography (services react to events independently) for simple
    flows, and central orchestration (saga coordinator directs the flow) for complex multi-step workflows.
  why: 'Choreography is decentralized: each service knows what to do when an event arrives, and emits its own event for the
    next service. This is simple for 3-step flows but becomes impossible to debug for 10-step flows because the logic is spread
    across 10 services and there is no single place to see the overall flow. Orchestration centralizes control: a saga orchestrator
    defines the sequence, handles failures, and provides a single place to monitor the entire workflow. The tradeoff is coupling:
    the orchestrator knows about all services, creating a central dependency.'
  how_to_do_right: '1. Choreography: use for simple, few-step flows (2-4 steps) where each service is autonomous.

    2. Orchestration: use for complex, many-step flows (5+) where visibility and error handling are critical.

    3. Choreography advantages: no central coordinator, services are truly independent, easy to add new subscribers.

    4. Orchestration advantages: single place to see workflow state, centralized error handling, easier debugging.

    5. Hybrid: choreography for cross-domain events (OrderPlaced → Inventory, Notifications, Analytics), orchestration for
    complex within-domain workflows (order fulfillment saga).

    6. Choreography anti-pattern: "event spaghetti" — 15 services exchanging events with no clear flow.

    '
  severity: high
  technologies:
    lang: [python, java, go]
    library: [temporal]
    platform: [kafka]
  domains:
    domain: [architecture]
    concern: [microservices, workflow]
  example_good: "# Choreography — simple 3-step flow, each service independent\n# OrderService publishes → InventoryService\
    \ subscribes → PaymentService subscribes\nclass InventoryService:\n    async def on_order_placed(self, event: OrderPlaced):\n\
    \        await self.reserve_stock(event.items)\n        await self.publish(InventoryReserved(order_id=event.order_id))\n\
    \nclass PaymentService:\n    async def on_inventory_reserved(self, event: InventoryReserved):\n        await self.charge(event.order_id)\n\
    \        await self.publish(PaymentCharged(order_id=event.order_id))\n\n# Orchestration — complex 7-step fulfillment with\
    \ error handling\nclass FulfillmentSaga:\n    \"\"\"Central orchestrator — single place to see and debug the full flow.\"\
    \"\"\n    steps = [\n        ValidateOrder,\n        ReserveInventory,\n        ChargePayment,\n        CreateShipment,\n\
    \        NotifyWarehouse,\n        SendConfirmation,\n        UpdateAnalytics,\n    ]\n\n    async def execute(self, order_id:\
    \ str):\n        for step in self.steps:\n            try:\n                await step.execute(order_id)\n           \
    \ except StepFailure:\n                await self.compensate(order_id)\n                raise\n"
  example_bad: '# Event spaghetti — choreography for a complex 10-step flow

    # Nobody knows the full flow — logic spread across 10 services

    # Debugging: "Why did the shipment label print before payment was confirmed?"

    # Answer: follow events through 10 service logs, reconstruct the sequence

    # Service A → event → Service B → event → Service C → ... → Service J

    # What if Service F fails? Who compensates Services A-E?

    # Answer: nobody — each service would need to handle ALL upstream failures

    # Result: inconsistent state, manual intervention required

    '
