  # === Testing Patterns ===
  - id: PAT-TEST-FIXTURE
    name: "Pytest Fixture Composition Pattern"
    category: testing
    intent: "Build complex test setups from simple, reusable fixture building blocks."
    when_to_use: "When multiple tests need similar but not identical setups. When fixtures have dependencies (user needs database, database needs connection)."
    when_not_to_use: "Simple tests with trivial setup. Fixtures that are used only once."
    languages: [Python, pytest]
    example_good: |
      @pytest.fixture
      def db():
          engine = create_engine("sqlite:///:memory:")
          Base.metadata.create_all(engine)
          yield Session(engine)

      @pytest.fixture
      def sample_user(db):
          user = User(name="Alice", email="alice@test.com")
          db.add(user)
          db.commit()
          return user

      def test_get_user(db, sample_user):
          found = db.query(User).filter_by(name="Alice").first()
          assert found.email == "alice@test.com"
    example_bad: |
      def test_get_user():
          engine = create_engine("sqlite:///:memory:")
          Base.metadata.create_all(engine)
          session = Session(engine)
          user = User(name="Alice", email="alice@test.com")
          session.add(user)
          session.commit()
          found = session.query(User).filter_by(name="Alice").first()
          assert found.email == "alice@test.com"
          session.close()
          # Setup duplicated in every test — 20 tests = 20 copies
          # Change DB schema → update 20 test functions
    text: "Pytest Fixture Composition Pattern -- Build complex test setups from simple, reusable fixture building blocks."
    why: "Build complex test setups from simple, reusable fixture building blocks."
    how_to_do_right: |
      1. Identify where pytest fixture composition pattern applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
    severity: high
    technologies:
      lang: [python, pytest]
    domains:
      domain: [testing, general]
      concern: [pattern, best_practice]
    when_applies: "When multiple tests need similar but not identical setups."

    related_principles: [P-ARCH-DRY, P-TEST-DETERMINISTIC]
    sources: ["https://docs.pytest.org/en/stable/how-to/fixtures.html"]

  # === API Patterns ===
  - id: PAT-API-PAGINATION
    name: "Cursor-Based Pagination Pattern"
    category: api
    intent: "Return large result sets in manageable pages without offset-based performance degradation."
    when_to_use: "Any list endpoint that could return more than 50 items. Real-time data where new items are inserted frequently."
    when_not_to_use: "Small fixed-size collections. Admin UIs where jumping to page 50 is needed."
    languages: [Python, Flask, FastAPI]
    example_good: |
      @app.get("/api/users")
      def list_users(after: str = None, limit: int = 20):
          query = User.query.order_by(User.id)
          if after:
              query = query.filter(User.id > after)
          users = query.limit(limit + 1).all()
          has_more = len(users) > limit
          return {
              "data": [u.to_dict() for u in users[:limit]],
              "next_cursor": users[limit - 1].id if has_more else None,
          }
    example_bad: |
      @app.get("/api/users")
      def list_users(page: int = 1, limit: int = 20):
          offset = (page - 1) * limit
          users = User.query.order_by(User.id).offset(offset).limit(limit).all()
          return {"data": [u.to_dict() for u in users]}
      # OFFSET grows linearly — page 5000 scans 100,000 rows before returning 20
      # New inserts shift all pages — user sees duplicate or missing items
      # At 1M rows: page 50,000 takes 12 seconds vs 2ms with cursor
    text: "Cursor-Based Pagination Pattern -- Return large result sets in manageable pages without offset-based performance degradation."
    why: "Return large result sets in manageable pages without offset-based performance degradation."
    how_to_do_right: |
      1. Identify where cursor-based pagination pattern applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
    severity: high
    technologies:
      lang: [python, flask, fastapi]
    domains:
      domain: [api, general]
      concern: [pattern, best_practice]
    when_applies: "Any list endpoint that could return more than 50 items."

    related_principles: [P-API-CONTRACT, P-PERF-MEASURE]
    sources: ["https://slack.engineering/evolving-api-pagination-at-slack/"]

  # === Observability Patterns ===
  - id: PAT-OBS-CONTEXT
    name: "Request Context Propagation Pattern"
    category: observability
    intent: "Thread a unique request ID through all log entries, enabling end-to-end request tracing."
    when_to_use: "Every web application. Microservice architectures. Any system where a single user action triggers multiple operations."
    when_not_to_use: "Single-function scripts. Batch jobs with their own ID tracking."
    languages: [Python, Flask]
    example_good: |
      @app.before_request
      def add_request_id():
          g.request_id = request.headers.get('X-Request-ID', str(uuid4()))

      @app.after_request
      def log_request(response):
          logger.info("request", extra={
              "request_id": g.request_id,
              "method": request.method,
              "path": request.path,
              "status": response.status_code,
          })
          return response
    example_bad: |
      @app.route("/api/data")
      def get_data():
          logger.info("Fetching data")            # no request ID
          result = db.query(Data).all()
          logger.info("Returning %d items", len(result))  # no correlation
          return jsonify([d.to_dict() for d in result])
      # Logs: "Fetching data" appears 500 times/minute — which request is which?
      # Debugging: "User reports slow request" → grep logs → 500 matches, no way to isolate
    text: "Request Context Propagation Pattern -- Thread a unique request ID through all log entries, enabling end-to-end request tracing."
    why: "Thread a unique request ID through all log entries, enabling end-to-end request tracing."
    how_to_do_right: |
      1. Identify where request context propagation pattern applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
    severity: high
    technologies:
      lang: [python, flask]
    domains:
      domain: [observability, general]
      concern: [pattern, best_practice]
    when_applies: "Every web application."

    related_principles: [P-OBS-STRUCTURED]
    sources: ["https://opentelemetry.io/docs/concepts/context-propagation/"]
