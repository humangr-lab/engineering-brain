  # === Security Patterns ===
  - id: PAT-SEC-AUTH-DECO
    name: "Authentication Decorator Pattern"
    category: security
    intent: "Enforce authentication consistently across all protected routes without repeating auth logic in every handler."
    when_to_use: "Every route that requires authentication. Applied as @require_auth decorator before the handler function."
    when_not_to_use: "Public endpoints (health check, login, static files). Explicitly mark these as @public."
    languages: [Python, Flask, FastAPI]
    example_good: |
      def require_auth(f):
          @wraps(f)
          def decorated(*args, **kwargs):
              token = request.headers.get('Authorization', '').replace('Bearer ', '')
              if not validate_token(token):
                  return jsonify({"error": "Unauthorized"}), 401
              return f(*args, **kwargs)
          return decorated

      @app.route("/api/data")
      @require_auth
      def get_data():
          return jsonify(data)
    example_bad: |
      @app.route("/api/data")
      def get_data():
          # Auth check copy-pasted in every handler — DRY violation
          token = request.headers.get('Authorization')
          if not validate_token(token):
              return "Unauthorized", 401
          return jsonify(data)
    text: "Authentication Decorator Pattern -- Enforce authentication consistently across all protected routes without repeating auth logic in every handler."
    why: "Enforce authentication consistently across all protected routes without repeating auth logic in every handler."
    how_to_do_right: |
      1. Identify where authentication decorator pattern applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
    severity: high
    technologies:
      lang: [python, flask, fastapi]
    domains:
      domain: [security, general]
      concern: [pattern, best_practice]
    when_applies: "Every route that requires authentication."

    related_principles: [P-SEC-DENY, P-ARCH-DRY]
    sources: ["https://cheatsheetseries.owasp.org/cheatsheets/Authentication_Cheat_Sheet.html"]

  - id: PAT-SEC-INPUT-VALID
    name: "Input Validation Gateway Pattern"
    category: security
    intent: "Transform untrusted external input into validated, typed domain objects at the system boundary."
    when_to_use: "Every route handler, WebSocket handler, CLI argument parser, or file ingestion point."
    when_not_to_use: "Internal function calls where input is already validated domain types."
    languages: [Python, Pydantic]
    example_good: |
      class CreateUserRequest(BaseModel):
          name: str = Field(min_length=1, max_length=100)
          email: EmailStr
          age: int = Field(ge=0, le=150)

      @app.post("/api/users")
      def create_user(request: CreateUserRequest):
          # request is validated — safe to use
          user = UserService.create(request.name, request.email, request.age)
          return jsonify(user.to_dict()), 201
    example_bad: |
      @app.post("/api/users")
      def create_user():
          name = request.json.get("name")     # raw dict access, no validation
          email = request.json.get("email")   # could be anything
          age = request.json.get("age")       # could be negative or a string
          user = UserService.create(name, email, age)
          return jsonify(user.to_dict()), 201
      # Attacker sends: {"name": "", "email": "not-an-email", "age": -5}
      # No error — invalid data silently persisted in database
    text: "Input Validation Gateway Pattern -- Transform untrusted external input into validated, typed domain objects at the system boundary."
    why: "Transform untrusted external input into validated, typed domain objects at the system boundary."
    how_to_do_right: |
      1. Identify where input validation gateway pattern applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
    severity: high
    technologies:
      lang: [python, pydantic]
    domains:
      domain: [security, general]
      concern: [pattern, best_practice]
    when_applies: "Every route handler, WebSocket handler, CLI argument parser, or file ingestion point."

    related_principles: [P-SEC-BOUNDARY, P-ARCH-EXPLICIT]
    sources: ["https://cheatsheetseries.owasp.org/cheatsheets/Input_Validation_Cheat_Sheet.html", "https://docs.pydantic.dev/latest/concepts/validators/"]

  # === Error Handling Patterns ===
  - id: PAT-ERR-RESULT
    name: "Result Type Pattern"
    category: error_handling
    intent: "Make success and failure explicit in function return types, forcing callers to handle both paths."
    when_to_use: "Functions that can fail in expected ways (validation, not found, permission denied). Business logic where exceptions would be control flow."
    when_not_to_use: "Truly exceptional situations (out of memory, disk full). Simple functions that can't meaningfully fail."
    languages: [Python]
    example_good: |
      @dataclass
      class Result:
          success: bool
          value: Any = None
          error: str = ""

      def find_user(user_id: int) -> Result:
          user = db.get(user_id)
          if not user:
              return Result(success=False, error=f"User {user_id} not found")
          return Result(success=True, value=user)
    example_bad: |
      def find_user(user_id: int) -> User:
          user = db.get(user_id)
          if not user:
              raise ValueError(f"User {user_id} not found")  # exception as control flow
          return user

      # Caller forgets try/except — unhandled exception crashes the request
      user = find_user(999)  # ValueError propagates to global handler
      # No compile-time signal that this function can fail
    text: "Result Type Pattern -- Make success and failure explicit in function return types, forcing callers to handle both paths."
    why: "Make success and failure explicit in function return types, forcing callers to handle both paths."
    how_to_do_right: |
      1. Identify where result type pattern applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
    severity: high
    technologies:
      lang: [python]
    domains:
      domain: [error_handling, general]
      concern: [pattern, best_practice]
    when_applies: "Functions that can fail in expected ways (validation, not found, permission denied)."

    related_principles: [P-ERR-ACTIONABLE, P-ARCH-EXPLICIT]
    sources: ["https://doc.rust-lang.org/book/ch09-02-recoverable-errors-with-result.html"]

  - id: PAT-ERR-GRACEFUL
    name: "Graceful Degradation Pattern"
    category: error_handling
    intent: "Provide reduced functionality when a dependency fails, rather than total system failure."
    when_to_use: "Optional features (cache, analytics, recommendations). Non-critical external services."
    when_not_to_use: "Core functionality where partial results are dangerous (financial transactions, auth)."
    languages: [Python, JavaScript]
    example_good: |
      def get_user_with_recommendations(user_id):
          user = UserService.get(user_id)  # Core — must succeed
          try:
              user.recommendations = RecommendationService.get(user_id)
          except ServiceUnavailable:
              user.recommendations = []  # Degrade — show user without recommendations
              logger.warning("Recommendation service unavailable for user %s", user_id)
          return user
    example_bad: |
      def get_user_with_recommendations(user_id):
          user = UserService.get(user_id)
          user.recommendations = RecommendationService.get(user_id)  # no try/except
          return user
      # RecommendationService is down → entire request returns 500
      # User sees "Internal Server Error" instead of their profile without recommendations
      # Monitoring shows: 100% error rate even though core user data is available
    text: "Graceful Degradation Pattern -- Provide reduced functionality when a dependency fails, rather than total system failure."
    why: "Provide reduced functionality when a dependency fails, rather than total system failure."
    how_to_do_right: |
      1. Identify where graceful degradation pattern applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
    severity: high
    technologies:
      lang: [python, javascript]
    domains:
      domain: [error_handling, general]
      concern: [pattern, best_practice]
    when_applies: "Optional features (cache, analytics, recommendations)."

    related_principles: [P-ERR-FAIL-FAST]
    sources: ["https://learn.microsoft.com/en-us/azure/architecture/patterns/circuit-breaker"]

  # === Architecture Patterns ===
  - id: PAT-ARCH-FACTORY
    name: "Factory Function Pattern"
    category: architecture
    intent: "Create and configure complex objects without exposing construction logic to consumers."
    when_to_use: "Application creation (create_app), database sessions, configured clients. When construction requires multiple steps or conditional logic."
    when_not_to_use: "Simple objects with obvious constructors. When the constructor IS the documentation."
    languages: [Python]
    example_good: |
      def create_app(config=None):
          app = Flask(__name__)
          app.config.from_object(config or DefaultConfig)
          db.init_app(app)
          register_blueprints(app)
          register_error_handlers(app)
          return app
    example_bad: |
      # Construction logic scattered across caller code
      app = Flask(__name__)
      app.config["DEBUG"] = True               # hardcoded config
      db = SQLAlchemy(app)                      # global coupling
      from views import user_bp, admin_bp       # circular import risk
      app.register_blueprint(user_bp)
      app.register_blueprint(admin_bp)
      # Every test file must repeat this setup — DRY violation
      # Cannot create app with different config for testing vs production
    text: "Factory Function Pattern -- Create and configure complex objects without exposing construction logic to consumers."
    why: "Create and configure complex objects without exposing construction logic to consumers."
    how_to_do_right: |
      1. Identify where factory function pattern applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
    severity: high
    technologies:
      lang: [python]
    domains:
      domain: [architecture, general]
      concern: [pattern, best_practice]
    when_applies: "Application creation (create_app), database sessions, configured clients."

    related_principles: [P-ARCH-SEPARATION, P-ARCH-EXPLICIT]
    sources: ["https://flask.palletsprojects.com/en/stable/patterns/appfactories/"]

  - id: PAT-ARCH-REPOSITORY
    name: "Repository Pattern"
    category: architecture
    intent: "Abstract data access behind a clean interface, decoupling business logic from storage implementation."
    when_to_use: "Any module that queries or persists data. Especially when the storage backend might change or when testing requires mocking storage."
    when_not_to_use: "Throwaway scripts. Prototypes where you're still exploring the data model."
    languages: [Python, SQLAlchemy]
    example_good: |
      class UserRepository:
          def get_by_id(self, user_id: int) -> User | None:
              return db.session.get(User, user_id)

          def create(self, name: str, email: str) -> User:
              user = User(name=name, email=email)
              db.session.add(user)
              db.session.commit()
              return user
    example_bad: |
      # SQL queries scattered directly in business logic
      def process_order(order_id: int):
          user = db.session.execute(
              "SELECT * FROM users WHERE id = :id", {"id": order_id}
          ).fetchone()
          # Business logic mixed with raw SQL — cannot swap DB backend
          # Cannot unit-test without a real database connection
          # Same query copy-pasted in 5 other service functions
    text: "Repository Pattern -- Abstract data access behind a clean interface, decoupling business logic from storage implementation."
    why: "Abstract data access behind a clean interface, decoupling business logic from storage implementation."
    how_to_do_right: |
      1. Identify where repository pattern applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
    severity: high
    technologies:
      lang: [python, sqlalchemy]
    domains:
      domain: [architecture, general]
      concern: [pattern, best_practice]
    when_applies: "Any module that queries or persists data."

    related_principles: [P-ARCH-SEPARATION, P-ARCH-SINGLE-RESP]
    sources: ["https://martinfowler.com/eaaCatalog/repository.html"]

  # === State Management Patterns ===
  - id: PAT-STATE-ATOMIC
    name: "Atomic State Update Pattern"
    category: state_management
    intent: "Update all related state in a single operation, preventing inconsistent intermediate states."
    when_to_use: "Any multi-field state update (game state, form state, dashboard metrics). WebSocket-driven UI updates."
    when_not_to_use: "Independent, unrelated state fields that have no consistency requirements."
    languages: [JavaScript, Python]
    example_good: |
      // Update all game state atomically, then render once
      function handleVoteResult(data) {
          const newState = {
              ...gameState,
              scores: data.scores,
              currentRound: data.round,
              winner: data.winner,
              status: data.status,
          };
          setGameState(newState);
          renderUI(newState);  // Single render from consistent state
      }
    example_bad: |
      // Multiple independent updates — UI flickers, inconsistent between updates
      function handleVoteResult(data) {
          updateScores(data.scores);    // Render 1
          updateRound(data.round);       // Render 2
          updateWinner(data.winner);     // Render 3
          updateStatus(data.status);     // Render 4
      }
    text: "Atomic State Update Pattern -- Update all related state in a single operation, preventing inconsistent intermediate states."
    why: "Update all related state in a single operation, preventing inconsistent intermediate states."
    how_to_do_right: |
      1. Identify where atomic state update pattern applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
    severity: high
    technologies:
      lang: [javascript, python]
    domains:
      domain: [state_management, general]
      concern: [pattern, best_practice]
    when_applies: "Any multi-field state update (game state, form state, dashboard metrics)."

    related_principles: [P-CONC-ATOMIC]
    sources: ["https://react.dev/learn/updating-objects-in-state"]

  # === Configuration Patterns ===
  - id: PAT-CFG-ENV
    name: "Environment-Based Configuration Pattern"
    category: configuration
    intent: "Load all configuration from environment variables with safe defaults, enabling per-deployment customization."
    when_to_use: "Every application that runs in multiple environments (dev, staging, production). Docker containers. CI/CD pipelines."
    when_not_to_use: "Configuration that must be validated at import time (use Pydantic Settings instead)."
    languages: [Python]
    example_good: |
      HOST = os.getenv("HOST", "127.0.0.1")       # Safe: localhost
      PORT = int(os.getenv("PORT", "5000"))
      DEBUG = os.getenv("DEBUG", "false").lower() == "true"  # Safe: off
      SECRET = os.getenv("SECRET_KEY")              # No default — must be set
      if not SECRET:
          raise RuntimeError("SECRET_KEY environment variable required")
    example_bad: |
      HOST = "0.0.0.0"       # Unsafe: all interfaces
      DEBUG = True            # Unsafe: debug in production
      SECRET = "dev-secret"   # Unsafe: hardcoded secret
    text: "Environment-Based Configuration Pattern -- Load all configuration from environment variables with safe defaults, enabling per-deployment customization."
    why: "Load all configuration from environment variables with safe defaults, enabling per-deployment customization."
    how_to_do_right: |
      1. Identify where environment-based configuration pattern applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
    severity: high
    technologies:
      lang: [python]
    domains:
      domain: [configuration, general]
      concern: [pattern, best_practice]
    when_applies: "Every application that runs in multiple environments (dev, staging, production)."

