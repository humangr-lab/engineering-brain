- id: PMRES-008
  text: "Implement market manipulation resistance with circuit breakers, maximum position sizes, and price bands — sudden probability swings of > 20% in < 5 minutes should trigger automatic trading halts."
  why: >
    Prediction markets are vulnerable to manipulation through large orders that move prices to trigger
    cascading behavior (pump-and-dump), or through concentrated positions that create artificial price signals.
    The March 2025 Polymarket incident showed prices moving from 9% to 100% through oracle manipulation —
    but even without oracle attacks, large traders can manipulate prices to profit from derivatives or to
    influence public perception. CertiK's 2025 report on prediction markets (which grew 4x to $63.5B) warned
    of "structural strain" from manipulation. Circuit breakers (pausing trading during extreme moves) are
    standard in traditional finance and must be adapted for 24/7 prediction markets. The CFTC's 2026 advisory
    requires monitoring for manipulative behaviors in regulated prediction markets.
  how_to_do_right: |
    1. Circuit breaker: halt trading if price moves > 20% in < 5 minutes — auto-resume after 30 min cooldown
    2. Maximum position size: no single entity can hold > 5% of total open interest in a market
    3. Price bands: reject orders that would move the price > 10% in a single transaction
    4. Rate limiting: max 100 orders/minute per account (prevents HFT manipulation)
    5. Large order delay: orders > $10K require 5-second delay before execution (shows intent)
    6. Concentration monitoring: alert when top-5 accounts hold > 40% of total open interest
    7. Cross-market surveillance: detect correlated manipulation across related markets
    8. All circuit breaker events logged and reported to compliance
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
    library: [redis, numpy]
  domains:
    domain: [prediction_markets, fintech, security]
    concern: [manipulation, market_integrity, compliance]
  example_good: |
    from dataclasses import dataclass
    from decimal import Decimal
    from datetime import datetime, timedelta
    from collections import deque
    import redis

    @dataclass
    class PricePoint:
        price: Decimal
        timestamp: datetime

    class MarketCircuitBreaker:
        """Manipulation resistance: circuit breakers, position limits, price bands."""

        PRICE_MOVE_THRESHOLD = Decimal("0.20")  # 20% move triggers halt
        PRICE_MOVE_WINDOW = timedelta(minutes=5)
        COOLDOWN_MINUTES = 30
        MAX_POSITION_RATIO = Decimal("0.05")  # 5% of total OI
        MAX_SINGLE_ORDER_IMPACT = Decimal("0.10")  # 10% price impact cap
        MAX_ORDERS_PER_MINUTE = 100

        def __init__(self, market_id: str, redis_client: redis.Redis):
            self.market_id = market_id
            self.redis = redis_client
            self.price_history: deque[PricePoint] = deque(maxlen=1000)
            self.halted_until: datetime | None = None

        def check_circuit_breaker(self, current_price: Decimal) -> dict:
            """Check if circuit breaker should activate."""
            now = datetime.utcnow()

            # Check if currently halted
            if self.halted_until and now < self.halted_until:
                return {"trading_allowed": False, "reason": "circuit_breaker_active",
                        "resumes_at": self.halted_until}

            self.price_history.append(PricePoint(current_price, now))

            # Check price movement in window
            window_start = now - self.PRICE_MOVE_WINDOW
            old_prices = [p for p in self.price_history if p.timestamp >= window_start]

            if old_prices:
                oldest_price = old_prices[0].price
                move = abs(current_price - oldest_price) / oldest_price

                if move >= self.PRICE_MOVE_THRESHOLD:
                    self.halted_until = now + timedelta(minutes=self.COOLDOWN_MINUTES)
                    self._log_circuit_breaker_event(oldest_price, current_price, move)
                    return {"trading_allowed": False, "reason": "price_move_exceeded",
                            "move": float(move), "resumes_at": self.halted_until}

            return {"trading_allowed": True}

        def check_position_limit(
            self, trader_id: str, order_size: Decimal, total_oi: Decimal,
        ) -> dict:
            """Enforce maximum position size per trader."""
            current_position = self._get_trader_position(trader_id)
            new_position = current_position + order_size
            position_ratio = new_position / total_oi if total_oi > 0 else Decimal("1")

            if position_ratio > self.MAX_POSITION_RATIO:
                max_allowed = total_oi * self.MAX_POSITION_RATIO - current_position
                return {"allowed": False, "reason": "position_limit_exceeded",
                        "max_additional": max(Decimal("0"), max_allowed)}

            return {"allowed": True, "new_ratio": float(position_ratio)}

        def check_price_impact(
            self, order_price: Decimal, current_price: Decimal,
        ) -> dict:
            """Reject orders that would move price too far in one transaction."""
            impact = abs(order_price - current_price) / current_price
            if impact > self.MAX_SINGLE_ORDER_IMPACT:
                return {"allowed": False, "reason": "price_impact_too_high",
                        "impact": float(impact), "max_allowed": float(self.MAX_SINGLE_ORDER_IMPACT)}
            return {"allowed": True, "impact": float(impact)}

        def check_rate_limit(self, trader_id: str) -> dict:
            """Rate limit orders per trader."""
            key = f"rate:{self.market_id}:{trader_id}"
            count = self.redis.incr(key)
            if count == 1:
                self.redis.expire(key, 60)
            if count > self.MAX_ORDERS_PER_MINUTE:
                return {"allowed": False, "reason": "rate_limit_exceeded"}
            return {"allowed": True, "remaining": self.MAX_ORDERS_PER_MINUTE - count}

        def _get_trader_position(self, trader_id: str) -> Decimal:
            """Retrieve current position from storage."""
            return Decimal("0")  # Implementation depends on storage

        def _log_circuit_breaker_event(self, old_price, new_price, move):
            """Log for compliance and audit."""
            pass  # Send to compliance monitoring system
