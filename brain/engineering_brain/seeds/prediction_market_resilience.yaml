layer: rules
domain: prediction_markets
knowledge:
- id: PMRES-001
  text: "Defend against oracle governance attacks by requiring supermajority thresholds, time-locked voting, and stake-weighted cooldown periods — a single whale must never be able to override resolution outcomes."
  why: >
    On March 24-25, 2025, a UMA token whale exploited Polymarket's oracle by casting 5 million UMA tokens
    (~25% of active votes) through three accounts to falsely resolve a $7M Ukraine/Trump mineral deal contract
    as "Yes" despite no official agreement existing. The attacker used a mix of owned and delegated tokens to
    exceed the 5M UMA validation threshold. Polymarket called it "unprecedented" but refused refunds, stating
    it "wasn't a market failure." Only 7-8 million UMA tokens were actively participating in oracle defense,
    meaning just two large holders controlled >50% of voting power. This exposed a fundamental design flaw:
    token-weighted voting with low participation is trivially attackable by concentrated capital. The cost of
    the attack (~$1.5M in UMA) was far less than the $7M market value, making it profitable.
  how_to_do_right: |
    1. Require 67% supermajority (not 50%+1) for resolution votes to pass
    2. Implement time-locked voting: large stakes (>1% of supply) require 48h cooldown before votes count
    3. Cap maximum voting power per entity at 5-10% of total active stake
    4. Require minimum voter diversity: at least N unique voters (e.g., 50) for resolution to finalize
    5. Implement quadratic voting: vote_weight = sqrt(stake) to reduce whale dominance
    6. Add dispute escalation: any resolution can be challenged, escalating to a larger voting pool
    7. Monitor voting concentration: alert when top-3 voters control > 40% of active votes
    8. Implement economic security ratio: total_stake_securing_oracle > 2x maximum_market_value
  severity: critical
  technologies:
    lang: [python, solidity]
    framework: [fastapi, web3]
    library: [web3py, eth-abi]
  domains:
    domain: [prediction_markets, blockchain, security]
    concern: [oracle, governance, manipulation]
  example_good: |
    from dataclasses import dataclass
    from decimal import Decimal
    from datetime import datetime, timedelta

    @dataclass
    class GovernanceVote:
        voter: str
        stake: Decimal
        outcome: str
        timestamp: datetime
        is_delegated: bool

    class SecureOracleGovernance:
        """Oracle governance with whale attack resistance."""

        SUPERMAJORITY_THRESHOLD = Decimal("0.67")  # 67% required
        MAX_VOTER_POWER = Decimal("0.05")           # 5% cap per entity
        MIN_UNIQUE_VOTERS = 50
        COOLDOWN_STAKE_THRESHOLD = Decimal("0.01")  # 1% of supply triggers cooldown
        COOLDOWN_HOURS = 48

        def __init__(self, total_supply: Decimal):
            self.total_supply = total_supply
            self.votes: list[GovernanceVote] = []

        def submit_vote(self, vote: GovernanceVote) -> dict:
            """Submit a vote with whale resistance checks."""
            # Cap voting power
            effective_stake = min(
                vote.stake,
                self.total_supply * self.MAX_VOTER_POWER,
            )

            # Apply quadratic voting
            vote_weight = effective_stake.sqrt()

            # Enforce cooldown for large stakes
            if vote.stake > self.total_supply * self.COOLDOWN_STAKE_THRESHOLD:
                vote.timestamp = datetime.utcnow() + timedelta(hours=self.COOLDOWN_HOURS)
                return {"status": "cooldown", "effective_at": vote.timestamp, "weight": vote_weight}

            self.votes.append(vote)
            return {"status": "accepted", "weight": vote_weight}

        def can_resolve(self) -> dict:
            """Check if resolution conditions are met with governance attack resistance."""
            active_votes = [v for v in self.votes if v.timestamp <= datetime.utcnow()]
            unique_voters = len({v.voter for v in active_votes})

            if unique_voters < self.MIN_UNIQUE_VOTERS:
                return {"can_resolve": False, "reason": f"Need {self.MIN_UNIQUE_VOTERS} voters, have {unique_voters}"}

            # Calculate outcome weights using quadratic voting
            outcome_weights: dict[str, Decimal] = {}
            for vote in active_votes:
                weight = min(vote.stake, self.total_supply * self.MAX_VOTER_POWER).sqrt()
                outcome_weights[vote.outcome] = outcome_weights.get(vote.outcome, Decimal(0)) + weight

            total_weight = sum(outcome_weights.values())
            top_outcome = max(outcome_weights, key=outcome_weights.get)
            top_ratio = outcome_weights[top_outcome] / total_weight

            if top_ratio >= self.SUPERMAJORITY_THRESHOLD:
                return {"can_resolve": True, "outcome": top_outcome, "support": float(top_ratio)}
            return {"can_resolve": False, "reason": f"Supermajority not reached: {float(top_ratio):.1%}"}
  example_bad: |
    # VULNERABLE: Simple token-weighted majority — exactly what UMA had
    class NaiveOracle:
        def resolve(self, votes: dict[str, int]) -> str:
            # Whoever has more tokens wins — whale attack trivial
            return max(votes, key=votes.get)

    # Attacker with 25% of tokens can override 75% of smaller voters
    votes = {"Yes": 5_000_000, "No": 3_000_000}  # Whale wins
    result = NaiveOracle().resolve(votes)  # "Yes" — false resolution
  when_applies: Any prediction market using token-weighted oracle resolution, especially with UMA, Chainlink, or custom oracle systems
  sources:
    - "https://www.theblock.co/post/348171/polymarket-says-governance-attack-by-uma-whale-to-hijack-a-bets-resolution-is-unprecedented"
    - "https://orochi.network/blog/oracle-manipulation-in-polymarket-2025"
    - "https://medium.com/@Nothing_Research/governance-attack-or-smart-trade-umas-oracle-just-got-outplayed-on-polymarket-ced65edf1be4"
    - "https://medium.com/@DeepSafe_Official/the-value-of-ai-oracles-insights-from-the-polymarket-oracle-manipulation-case-92d83e2bef0a"

- id: PMRES-002
  text: "Aggregate data from multiple independent oracles (Chainlink, UMA, API3, custom) using median consensus with outlier rejection — never rely on a single oracle for market resolution."
  why: >
    Single-oracle dependency is a single point of failure, as the UMA/Polymarket incident (March 2025) proved.
    Chainlink's architecture demonstrates the solution: multiple independent oracle nodes fetch data from
    multiple sources, and the network takes the median value — requiring corruption of >50% of nodes to
    manipulate the result. As of 2025, Chainlink processes $20+ trillion in TVE using this pattern. The median
    is preferred over the mean because it is robust to outliers: one corrupted oracle returning an extreme
    value does not shift the median significantly. Adding outlier rejection (discard values > 2 standard
    deviations from median) provides defense-in-depth. Multi-oracle aggregation increases the cost of attack
    from corrupting 1 oracle to corrupting N/2+1 independent oracles simultaneously.
  how_to_do_right: |
    1. Integrate at least 3 independent oracle sources (e.g., Chainlink + UMA + custom API oracle)
    2. Use median aggregation — not mean — for numerical values (robust to single outlier)
    3. Implement outlier rejection: discard values > 2 standard deviations from median before final aggregation
    4. For binary outcomes, require 2-of-3 or 3-of-5 agreement (Byzantine fault tolerance)
    5. Weight oracles by historical accuracy: track each oracle's resolution accuracy over time
    6. Implement circuit breaker: if oracles disagree by > threshold, pause resolution and escalate
    7. Log all oracle responses with timestamps for audit trail
    8. Diversify oracle types: on-chain (Chainlink), governance (UMA), API-based (custom), AI oracle
  severity: critical
  technologies:
    lang: [python, solidity]
    framework: [fastapi, web3]
    library: [web3py, numpy, httpx]
  domains:
    domain: [prediction_markets, blockchain, distributed_systems]
    concern: [oracle, reliability, consensus]
  example_good: |
    from dataclasses import dataclass
    from decimal import Decimal
    import numpy as np
    from datetime import datetime
    import httpx

    @dataclass
    class OracleResponse:
        oracle_id: str
        value: str | Decimal  # Binary outcome or numerical value
        confidence: float
        timestamp: datetime
        source_type: str  # "chainlink", "uma", "api", "ai"

    class MultiOracleAggregator:
        """Aggregate multiple oracle responses with median consensus and outlier rejection."""

        REQUIRED_ORACLES = 3
        OUTLIER_SIGMA = 2.0  # Reject values > 2 std devs from median
        AGREEMENT_THRESHOLD = 0.67  # 2-of-3 for binary outcomes

        def __init__(self):
            self.oracle_accuracy: dict[str, list[bool]] = {}  # Track historical accuracy

        async def fetch_all_oracles(self, market_id: str) -> list[OracleResponse]:
            """Fetch resolution data from all registered oracles."""
            async with httpx.AsyncClient() as client:
                responses = []
                # Chainlink DON
                chainlink = await self._fetch_chainlink(client, market_id)
                responses.append(chainlink)
                # UMA optimistic oracle
                uma = await self._fetch_uma(client, market_id)
                responses.append(uma)
                # Custom API oracle (e.g., Associated Press for elections)
                api = await self._fetch_api_oracle(client, market_id)
                responses.append(api)
            return responses

        def aggregate_binary(self, responses: list[OracleResponse]) -> dict:
            """Aggregate binary outcomes using supermajority agreement."""
            if len(responses) < self.REQUIRED_ORACLES:
                return {"resolved": False, "reason": f"Need {self.REQUIRED_ORACLES} oracles, got {len(responses)}"}

            # Weight by historical accuracy
            weighted_votes: dict[str, float] = {}
            for r in responses:
                accuracy = self._get_oracle_accuracy(r.oracle_id)
                weight = accuracy * r.confidence
                weighted_votes[r.value] = weighted_votes.get(r.value, 0.0) + weight

            total_weight = sum(weighted_votes.values())
            top_outcome = max(weighted_votes, key=weighted_votes.get)
            agreement = weighted_votes[top_outcome] / total_weight

            if agreement >= self.AGREEMENT_THRESHOLD:
                return {"resolved": True, "outcome": top_outcome, "agreement": agreement}

            # Circuit breaker: oracles disagree — escalate
            return {
                "resolved": False,
                "reason": "Oracle disagreement — escalating to dispute resolution",
                "votes": weighted_votes,
            }

        def aggregate_numerical(self, responses: list[OracleResponse]) -> dict:
            """Aggregate numerical values using median with outlier rejection."""
            values = [float(r.value) for r in responses]
            median = float(np.median(values))
            std = float(np.std(values))

            # Reject outliers
            filtered = [v for v in values if abs(v - median) <= self.OUTLIER_SIGMA * std]
            if len(filtered) < self.REQUIRED_ORACLES:
                return {"resolved": False, "reason": "Too many outlier oracles"}

            final_value = float(np.median(filtered))
            return {"resolved": True, "value": final_value, "oracles_used": len(filtered)}

        def _get_oracle_accuracy(self, oracle_id: str) -> float:
            history = self.oracle_accuracy.get(oracle_id, [])
            if not history:
                return 0.5  # Default weight for new oracles
            return sum(history) / len(history)
  example_bad: |
    # VULNERABLE: Single oracle dependency
    class SingleOracleResolver:
        def resolve(self, market_id: str) -> str:
            # Only UMA — if UMA is attacked, market is compromised
            return uma_client.get_resolution(market_id)
    # No fallback, no cross-verification, no outlier detection
    # March 2025: UMA whale resolves $7M market falsely
  when_applies: Any prediction market that resolves based on real-world event outcomes
  sources:
    - "https://blog.chain.link/chainlink-price-feeds-secure-defi/"
    - "https://chain.link/education/blockchain-oracles"
    - "https://docs.polymarket.com/developers/resolution/UMA"

- id: PMRES-003
  text: "Design dispute resolution with escalation tiers, increasing bond requirements, and bounded latency — disputes must resolve within a defined window (24-48h per tier) with clear economic incentives for honest participation."
  why: >
    Dispute resolution is the immune system of prediction markets — without it, false resolutions go unchallenged.
    But poorly designed dispute systems either: (1) are too expensive to use (high bonds deter legitimate disputes),
    (2) are too cheap (spam disputes delay all resolutions), or (3) take too long (funds locked for weeks).
    UMA's optimistic oracle uses a 2-hour proposal window + challenge period, but the March 2025 attack showed
    that the challenge mechanism was insufficient against concentrated capital. Kleros 2.0 (deployed on Arbitrum
    One, Nov 2024) demonstrates best-in-class design: escalating tiers with doubling juror counts, appeal bonds
    that increase super-linearly (discouraging frivolous appeals), and bounded resolution within 48h per tier.
    The Schelling point mechanism ensures honest jurors are rewarded and dishonest ones lose their stake.
  how_to_do_right: |
    1. Define 3-4 escalation tiers with increasing juror counts: Tier 1 (3 jurors), Tier 2 (7), Tier 3 (15), Tier 4 (31)
    2. Require appeal bonds that increase super-linearly: bond_n = bond_0 * 2^n (doubles each tier)
    3. Set maximum resolution time per tier: 24-48 hours — total maximum 7 days across all tiers
    4. Use Schelling point mechanism: jurors who vote with the majority keep their stake; minority loses
    5. Distribute losing party's bond to winning voters — creates economic incentive for honest judging
    6. Allow anyone to initiate a dispute (not just market participants) — public accountability
    7. Implement automatic escalation if juror participation is below threshold
    8. Publish all dispute evidence and votes on-chain for transparency and audit
  severity: critical
  technologies:
    lang: [python, solidity]
    framework: [fastapi, web3]
  domains:
    domain: [prediction_markets, blockchain, governance]
    concern: [dispute_resolution, trust, incentive_design]
  example_good: |
    from dataclasses import dataclass, field
    from decimal import Decimal
    from datetime import datetime, timedelta
    from enum import Enum

    class DisputeTier(Enum):
        TIER_1 = 1  # 3 jurors, 24h, base bond
        TIER_2 = 2  # 7 jurors, 24h, 2x bond
        TIER_3 = 3  # 15 jurors, 48h, 4x bond
        TIER_4 = 4  # 31 jurors, 48h, 8x bond (final)

    TIER_CONFIG = {
        DisputeTier.TIER_1: {"jurors": 3, "hours": 24, "bond_multiplier": Decimal("1")},
        DisputeTier.TIER_2: {"jurors": 7, "hours": 24, "bond_multiplier": Decimal("2")},
        DisputeTier.TIER_3: {"jurors": 15, "hours": 48, "bond_multiplier": Decimal("4")},
        DisputeTier.TIER_4: {"jurors": 31, "hours": 48, "bond_multiplier": Decimal("8")},
    }

    @dataclass
    class Dispute:
        market_id: str
        challenger: str
        current_tier: DisputeTier
        base_bond: Decimal
        evidence: list[str]
        created_at: datetime
        deadline: datetime
        votes: dict[str, str] = field(default_factory=dict)  # juror_id -> outcome

    class DisputeResolution:
        """Tiered dispute resolution with escalation and economic incentives."""

        MAX_TOTAL_DAYS = 7

        def initiate_dispute(
            self, market_id: str, challenger: str, bond: Decimal, evidence: list[str]
        ) -> Dispute:
            config = TIER_CONFIG[DisputeTier.TIER_1]
            required_bond = self.base_bond * config["bond_multiplier"]
            if bond < required_bond:
                raise ValueError(f"Bond too low: need {required_bond}, got {bond}")

            return Dispute(
                market_id=market_id,
                challenger=challenger,
                current_tier=DisputeTier.TIER_1,
                base_bond=required_bond,
                evidence=evidence,
                created_at=datetime.utcnow(),
                deadline=datetime.utcnow() + timedelta(hours=config["hours"]),
            )

        def appeal(self, dispute: Dispute, appellant: str, bond: Decimal) -> Dispute:
            """Escalate to next tier with increased bond and juror count."""
            next_tier_val = dispute.current_tier.value + 1
            if next_tier_val > DisputeTier.TIER_4.value:
                raise ValueError("Final tier reached — no further appeals")

            next_tier = DisputeTier(next_tier_val)
            config = TIER_CONFIG[next_tier]
            required_bond = self.base_bond * config["bond_multiplier"]

            if bond < required_bond:
                raise ValueError(f"Appeal bond: need {required_bond}, got {bond}")

            dispute.current_tier = next_tier
            dispute.deadline = datetime.utcnow() + timedelta(hours=config["hours"])
            dispute.votes.clear()  # New jury
            return dispute

        def resolve_tier(self, dispute: Dispute) -> dict:
            """Resolve current tier using Schelling point (majority wins)."""
            config = TIER_CONFIG[dispute.current_tier]
            if len(dispute.votes) < config["jurors"]:
                return {"resolved": False, "reason": "Insufficient juror votes"}

            # Majority outcome
            from collections import Counter
            vote_counts = Counter(dispute.votes.values())
            outcome, count = vote_counts.most_common(1)[0]
            majority_ratio = count / len(dispute.votes)

            # Reward majority voters, slash minority voters
            majority_voters = [j for j, v in dispute.votes.items() if v == outcome]
            minority_voters = [j for j, v in dispute.votes.items() if v != outcome]

            return {
                "resolved": True,
                "outcome": outcome,
                "majority_ratio": majority_ratio,
                "reward_voters": majority_voters,
                "slash_voters": minority_voters,
            }
  example_bad: |
    # No dispute mechanism — resolution is final and unchallengeable
    class NoDisputeMarket:
        def resolve(self, market_id: str, oracle_result: str):
            self.markets[market_id].outcome = oracle_result
            self.distribute_payouts(market_id)
            # Done. If oracle was wrong or attacked, tough luck.
            # Users lose money with no recourse.
  when_applies: Any prediction market or oracle system requiring trust-minimized resolution
  sources:
    - "https://docs.kleros.io/kleros-faq"
    - "https://kleros.io/whitepaper.pdf"
    - "https://blog.kleros.io/kleros-project-update-2026/"

- id: PMRES-004
  text: "Prevent market ambiguity by enforcing machine-readable resolution criteria at market creation — every market must have an unambiguous resolution source, condition, date, and fallback defined in a structured schema."
  why: >
    Ambiguous resolution criteria are the #1 source of disputes in prediction markets. The Polymarket UMA
    attack (March 2025) exploited ambiguity in "Will Ukraine agree to Trump's mineral deal before April?" —
    what constitutes "agreeing"? A signed document? A verbal commitment? An official statement? Without
    machine-readable resolution criteria, humans must interpret vague language under adversarial conditions.
    Kalshi (CFTC-regulated, 2024-2025) requires structured resolution schemas for every market: a specific
    data source (e.g., "Associated Press official call"), an exact condition (e.g., "candidate X receives
    >= 270 electoral votes"), a resolution date, and a fallback procedure if the primary source is unavailable.
    This eliminates interpretation disputes and enables automated resolution.
  how_to_do_right: |
    1. Define a resolution schema with required fields: source, condition, deadline, fallback_source
    2. Validate at market creation — reject markets with ambiguous or missing criteria
    3. Use machine-readable conditions: "value >= threshold" not "when it seems likely"
    4. Specify exact data sources with URLs/APIs: "data from https://apnews.com/election-results"
    5. Include timezone in all dates: "2025-11-05T23:59:59Z" not "November 5th"
    6. Define N/A resolution: "If event is canceled, market resolves 50/50 (refund)"
    7. Require fallback sources: if primary source is unavailable, use secondary
    8. Make resolution criteria immutable after market creation — no retroactive changes
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi, pydantic]
    library: [pydantic]
  domains:
    domain: [prediction_markets, data_quality]
    concern: [resolution, ambiguity, trust]
  example_good: |
    from pydantic import BaseModel, Field, field_validator
    from datetime import datetime
    from enum import Enum

    class ResolutionConditionType(Enum):
        GREATER_THAN = "greater_than"
        LESS_THAN = "less_than"
        EQUAL_TO = "equal_to"
        CONTAINS = "contains"  # For text-based sources
        BOOLEAN = "boolean"    # True/False from API

    class ResolutionSource(BaseModel):
        """A specific, verifiable data source for resolution."""
        name: str = Field(description="Human-readable name")
        url: str = Field(description="URL to data source or API endpoint")
        data_path: str = Field(description="JSON path to the relevant value, e.g., '$.result.winner'")
        source_type: str = Field(description="api, webpage, official_statement")

    class ResolutionCriteria(BaseModel):
        """Machine-readable, unambiguous resolution criteria."""
        primary_source: ResolutionSource
        fallback_source: ResolutionSource
        condition_type: ResolutionConditionType
        condition_value: str = Field(description="The threshold or expected value")
        resolution_deadline: datetime = Field(description="UTC deadline for resolution")
        na_resolution: str = Field(
            description="How to resolve if event is canceled/undefined",
            default="refund_all",
        )
        description_human: str = Field(description="Human-readable description of resolution criteria")

        @field_validator("resolution_deadline")
        @classmethod
        def deadline_must_be_future(cls, v):
            if v <= datetime.utcnow():
                raise ValueError("Resolution deadline must be in the future")
            return v

        @field_validator("condition_value")
        @classmethod
        def condition_must_be_specific(cls, v):
            vague_terms = ["likely", "probably", "seems", "appears", "might", "could"]
            if any(term in v.lower() for term in vague_terms):
                raise ValueError(f"Condition must be specific, not vague. Found vague term in: {v}")
            return v

    # Example: Well-defined presidential election market
    criteria = ResolutionCriteria(
        primary_source=ResolutionSource(
            name="Associated Press Election Results",
            url="https://developer.ap.org/ap-elections-api/",
            data_path="$.races[0].winner.candidateId",
            source_type="api",
        ),
        fallback_source=ResolutionSource(
            name="Federal Election Commission Certified Results",
            url="https://www.fec.gov/data/",
            data_path="$.results.president.winner",
            source_type="api",
        ),
        condition_type=ResolutionConditionType.EQUAL_TO,
        condition_value="candidate_harris",
        resolution_deadline=datetime(2025, 12, 15, 23, 59, 59),
        na_resolution="refund_all",
        description_human="Resolves YES if AP calls Kamala Harris as winner of the 2024 presidential election by Dec 15, 2025 UTC",
    )
  example_bad: |
    # AMBIGUOUS: No structured criteria, vague language
    market = {
        "title": "Will Ukraine agree to Trump's mineral deal?",
        "resolution": "Resolves YES if Ukraine agrees before April",
        # What constitutes "agreeing"? Which April? What timezone?
        # No data source specified — who decides?
        # This exact ambiguity was exploited in the March 2025 attack
    }
  when_applies: Market creation in any prediction market platform — validation must happen before the market goes live
  sources:
    - "https://docs.polymarket.com/developers/resolution/UMA"
    - "https://orochi.network/blog/oracle-manipulation-in-polymarket-2025"
    - "https://www.cftc.gov/PressRoom/PressReleases/9158-26"

- id: PMRES-005
  text: "Use a CLOB (Central Limit Order Book) for liquid, high-volume markets and AMM for long-tail, low-liquidity markets — Polymarket's 2024 migration from AMM to CLOB proved that orderbooks provide tighter spreads and better price discovery at scale."
  why: >
    AMMs (Automated Market Makers) are simple to deploy but have fundamental limitations: they require large
    liquidity pools to achieve tight spreads, suffer from impermanent loss, and produce less efficient prices.
    Polymarket migrated from AMM to CLOB in 2024, achieving tighter spreads and better liquidity for
    high-volume markets. By November 2025, Polymarket processed $3.74B monthly and Kalshi $5.8B — both using
    CLOB architectures. However, CLOBs require active market makers and fail for long-tail markets with few
    traders. The optimal architecture is hybrid: CLOB for markets with > $100K open interest (provides tight
    spreads), AMM for long-tail markets (provides baseline liquidity), with automatic migration from AMM to
    CLOB when volume thresholds are met. Polymarket's hybrid approach uses off-chain matching with on-chain
    settlement for the CLOB component.
  how_to_do_right: |
    1. Default new markets to AMM (provides immediate liquidity without market makers)
    2. Migrate to CLOB when: open_interest > $100K AND daily_volume > $10K AND unique_traders > 50
    3. CLOB: off-chain order matching (low latency) with on-chain settlement (trustless)
    4. AMM: use LMSR (Logarithmic Market Scoring Rule) — optimal for prediction market AMMs
    5. Implement unified liquidity interface: users interact with one API regardless of backend
    6. For CLOB: incentivize market makers with maker rebates (negative fees)
    7. For AMM: set initial liquidity parameter b based on expected trading volume
    8. Monitor spread and adjust: if CLOB spread > AMM spread, fall back to AMM
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
    library: [numpy, sortedcontainers]
  domains:
    domain: [prediction_markets, fintech, trading]
    concern: [liquidity, market_microstructure, trading]
  example_good: |
    from dataclasses import dataclass, field
    from decimal import Decimal
    from sortedcontainers import SortedList
    import math

    class LMSR:
        """Logarithmic Market Scoring Rule — optimal AMM for prediction markets."""

        def __init__(self, b: float, num_outcomes: int = 2):
            self.b = b  # Liquidity parameter — higher = more liquid, lower = more responsive
            self.quantities = [0.0] * num_outcomes  # Shares outstanding per outcome

        def cost(self) -> float:
            """Current cost function value."""
            return self.b * math.log(sum(math.exp(q / self.b) for q in self.quantities))

        def price(self, outcome: int) -> float:
            """Current price (probability) of outcome."""
            exp_values = [math.exp(q / self.b) for q in self.quantities]
            return exp_values[outcome] / sum(exp_values)

        def buy(self, outcome: int, shares: float) -> float:
            """Buy shares — returns cost in collateral."""
            old_cost = self.cost()
            self.quantities[outcome] += shares
            new_cost = self.cost()
            return new_cost - old_cost  # Cost to buyer

    @dataclass
    class Order:
        price: Decimal
        quantity: Decimal
        side: str  # "buy" or "sell"
        trader_id: str

    class HybridLiquidityEngine:
        """Hybrid CLOB + AMM: CLOB for liquid markets, AMM for long-tail."""

        CLOB_THRESHOLD_OI = Decimal("100000")    # $100K open interest
        CLOB_THRESHOLD_VOLUME = Decimal("10000")  # $10K daily volume

        def __init__(self, market_id: str, initial_liquidity_b: float = 100.0):
            self.market_id = market_id
            self.amm = LMSR(b=initial_liquidity_b)
            self.bids: SortedList = SortedList(key=lambda o: -o.price)  # Descending
            self.asks: SortedList = SortedList(key=lambda o: o.price)   # Ascending
            self.use_clob = False

        def should_use_clob(self, open_interest: Decimal, daily_volume: Decimal) -> bool:
            return (open_interest >= self.CLOB_THRESHOLD_OI
                    and daily_volume >= self.CLOB_THRESHOLD_VOLUME)

        def get_price(self, outcome: int) -> float:
            """Unified price interface — works for both AMM and CLOB."""
            if self.use_clob and self.bids and self.asks:
                return float((self.bids[0].price + self.asks[0].price) / 2)  # Midprice
            return self.amm.price(outcome)

        def place_order(self, order: Order) -> dict:
            """Route to CLOB or AMM based on market maturity."""
            if self.use_clob:
                return self._match_clob(order)
            else:
                return self._execute_amm(order)
