  domains:
    domain: [prediction_markets, data_quality]
    concern: [resolution, reliability, data_integrity]
  example_good: |
    from dataclasses import dataclass, field
    from datetime import datetime, timedelta
    import httpx
    import numpy as np

    @dataclass
    class SourceScore:
        source_id: str
        accuracy: float = 1.0      # % correct resolutions (EMA)
        uptime: float = 1.0        # % availability (EMA)
        avg_latency_ms: float = 0  # Average response time
        total_queries: int = 0
        correct_resolutions: int = 0

        @property
        def reliability(self) -> float:
            """Composite reliability score (0-1)."""
            return self.accuracy * 0.6 + self.uptime * 0.3 + max(0, 1 - self.avg_latency_ms / 10000) * 0.1

    class ResolutionSourceManager:
        """Multi-source verification with reliability scoring and fallback."""

        AGREEMENT_THRESHOLD = 2  # Minimum sources that must agree
        AVAILABILITY_TIMEOUT_S = 30
        SOURCE_SWITCH_AFTER_S = 3600  # Fallback after 1 hour

        def __init__(self):
            self.source_scores: dict[str, SourceScore] = {}
            self.source_configs: dict[str, dict] = {}

        def register_source(self, source_id: str, config: dict):
            self.source_scores[source_id] = SourceScore(source_id=source_id)
            self.source_configs[source_id] = config

        async def resolve_with_verification(self, market_id: str) -> dict:
            """Cross-check multiple sources before resolution."""
            responses = {}
            async with httpx.AsyncClient(timeout=self.AVAILABILITY_TIMEOUT_S) as client:
                for source_id, config in self.source_configs.items():
                    try:
                        start = datetime.utcnow()
                        response = await client.get(config["url"])
                        latency = (datetime.utcnow() - start).total_seconds() * 1000

                        value = self._extract_value(response.json(), config["data_path"])
                        responses[source_id] = {"value": value, "latency": latency, "status": "ok"}

                        # Update scores
                        score = self.source_scores[source_id]
                        score.total_queries += 1
                        score.avg_latency_ms = score.avg_latency_ms * 0.9 + latency * 0.1  # EMA
                        score.uptime = score.uptime * 0.99 + 0.01  # EMA toward 1.0

                    except Exception as e:
                        responses[source_id] = {"value": None, "status": "unavailable", "error": str(e)}
                        score = self.source_scores[source_id]
                        score.uptime = score.uptime * 0.99  # EMA toward 0.0

            # Check agreement
            valid_responses = {k: v for k, v in responses.items() if v["status"] == "ok"}
            if len(valid_responses) < self.AGREEMENT_THRESHOLD:
                return {"resolved": False, "reason": "insufficient_available_sources"}

            # Group by reported value — find consensus
            from collections import Counter
            values = Counter(v["value"] for v in valid_responses.values())
            top_value, count = values.most_common(1)[0]

            if count >= self.AGREEMENT_THRESHOLD:
                return {
                    "resolved": True,
                    "outcome": top_value,
                    "agreeing_sources": count,
                    "total_sources": len(valid_responses),
                }

            # Sources disagree — escalate to dispute
            return {
                "resolved": False,
                "reason": "source_disagreement",
                "values_reported": dict(values),
                "action": "escalate_to_dispute_resolution",
            }

        def _extract_value(self, data: dict, path: str) -> str:
            """Extract value from JSON using dot-path notation."""
            parts = path.strip("$.").split(".")
            current = data
            for part in parts:
                current = current[part]
            return str(current)
