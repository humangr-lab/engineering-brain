- id: PMRES-011
  text: "Implement decentralized arbitration using Kleros-style juror selection with stake-weighted random draw, escalating appeal tiers, and Schelling point incentives — arbitration is the last line of defense when oracles and automated resolution fail."
  why: >
    When automated resolution and oracle systems fail (as in the March 2025 Polymarket incident), human
    arbitration is the final backstop. Kleros (deployed on Arbitrum One, Nov 2024, expanded to 6 blockchains
    in 2025) has resolved thousands of disputes using a mechanism where jurors are randomly selected weighted
    by their staked PNK tokens, vote independently, and are rewarded/penalized based on whether they voted
    with the majority (Schelling point). This creates a Nash equilibrium where honest voting is the dominant
    strategy. Appeals double the juror count each tier (3→7→15→31), making manipulation exponentially more
    expensive. The cost to corrupt Tier 4 (31 jurors) is 10x the cost to corrupt Tier 1 (3 jurors), providing
    strong economic security guarantees.
  how_to_do_right: |
    1. Random juror selection weighted by stake: P(selected) proportional to stake amount
    2. Minimum stake threshold: jurors must stake minimum amount to participate (skin in the game)
    3. Independent voting: jurors submit encrypted votes first, then reveal (commit-reveal scheme)
    4. Schelling point: jurors voting with majority keep stake + share of losing side's stake
    5. Appeal doubles jurors: Tier 1 (3), Tier 2 (7), Tier 3 (15), Tier 4 (31) — final
    6. Appeal bond increases super-linearly: bond(n) = base_bond * 2^n
    7. Time-bounded: each tier has 24-48h deadline — no indefinite delays
    8. Juror reputation: track accuracy over time, higher-reputation jurors get more weight
  severity: high
  technologies:
    lang: [python, solidity]
    framework: [fastapi, web3]
    library: [web3py]
  domains:
    domain: [prediction_markets, blockchain, governance]
    concern: [dispute_resolution, arbitration, incentive_design]
  example_good: |
    import random
    import hashlib
    from dataclasses import dataclass, field
    from decimal import Decimal
    from datetime import datetime, timedelta

    @dataclass
    class Juror:
        juror_id: str
        stake: Decimal
        accuracy_history: list[bool] = field(default_factory=list)

        @property
        def reputation(self) -> float:
            if not self.accuracy_history:
                return 0.5
            return sum(self.accuracy_history[-50:]) / len(self.accuracy_history[-50:])

    @dataclass
    class EncryptedVote:
        juror_id: str
        commitment: str   # hash(vote + salt)
        revealed_vote: str | None = None
        salt: str | None = None

    class KlerosStyleArbitration:
        """Decentralized arbitration with stake-weighted juror selection and Schelling point."""

        def __init__(self, juror_pool: list[Juror]):
            self.juror_pool = juror_pool

        def select_jurors(self, count: int, seed: str) -> list[Juror]:
            """Stake-weighted random selection — higher stake = higher probability."""
            total_stake = sum(j.stake for j in self.juror_pool)
            weights = [float(j.stake / total_stake) for j in self.juror_pool]

            # Seeded random for reproducibility and verifiability
            rng = random.Random(seed)
            selected = rng.choices(self.juror_pool, weights=weights, k=count)

            # Ensure no duplicate jurors
            seen = set()
            unique = []
            for j in selected:
                if j.juror_id not in seen:
                    seen.add(j.juror_id)
                    unique.append(j)
            while len(unique) < count:
                extra = rng.choices(self.juror_pool, weights=weights, k=1)[0]
                if extra.juror_id not in seen:
                    seen.add(extra.juror_id)
                    unique.append(extra)

            return unique[:count]

        def commit_vote(self, juror_id: str, vote: str, salt: str) -> EncryptedVote:
            """Phase 1: jurors submit encrypted vote commitment."""
            commitment = hashlib.sha256(f"{vote}:{salt}".encode()).hexdigest()
            return EncryptedVote(juror_id=juror_id, commitment=commitment)

        def reveal_vote(self, encrypted_vote: EncryptedVote, vote: str, salt: str) -> bool:
            """Phase 2: jurors reveal their votes — verify against commitment."""
            expected = hashlib.sha256(f"{vote}:{salt}".encode()).hexdigest()
            if expected != encrypted_vote.commitment:
                return False  # Cheating detected — juror loses stake
            encrypted_vote.revealed_vote = vote
            encrypted_vote.salt = salt
            return True

        def resolve_round(self, votes: list[EncryptedVote], jurors: list[Juror]) -> dict:
            """Determine outcome and distribute rewards/penalties (Schelling point)."""
            revealed = [v for v in votes if v.revealed_vote is not None]
            from collections import Counter
            outcome_counts = Counter(v.revealed_vote for v in revealed)
            winning_outcome, _ = outcome_counts.most_common(1)[0]

            # Schelling point: majority voters are rewarded, minority voters lose stake
            winners = [v.juror_id for v in revealed if v.revealed_vote == winning_outcome]
            losers = [v.juror_id for v in revealed if v.revealed_vote != winning_outcome]

            # Update reputation
            juror_map = {j.juror_id: j for j in jurors}
            for jid in winners:
                juror_map[jid].accuracy_history.append(True)
            for jid in losers:
                juror_map[jid].accuracy_history.append(False)

            loser_stakes = sum(juror_map[jid].stake for jid in losers)
            reward_per_winner = loser_stakes / len(winners) if winners else Decimal("0")

            return {
                "outcome": winning_outcome,
                "winners": winners,
                "losers": losers,
                "reward_per_winner": float(reward_per_winner),
            }
  example_bad: |
