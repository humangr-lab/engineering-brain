    - "https://rocknblock.io/blog/how-polymarket-works-the-tech-behind-prediction-markets"
    - "https://newyorkcityservers.com/blog/prediction-market-making-guide"

- id: PMRES-010
  text: "Implement resolution source reliability scoring with multi-source verification and automatic fallback — every resolution must cross-check against at least 2 independent sources before finalizing."
  why: >
    Resolution sources fail: APIs go down, websites change format, data providers make errors, and
    authoritative sources retract statements. Polymarket's resolution docs show they rely on specific
    oracle providers, but the March 2025 incident demonstrated that even oracle providers can be manipulated.
    Multi-source verification requires that at least 2 independent sources agree before resolution, with
    automatic fallback to secondary sources when primary sources are unavailable. Source reliability scoring
    tracks each source's historical accuracy and availability, automatically demoting unreliable sources.
    The Chainlink model of using multiple independent nodes fetching from multiple data aggregators
    is the gold standard — at least 2/3 of sources must agree for finalization.
  how_to_do_right: |
    1. Register 3+ independent sources per market (different organizations, APIs, methodologies)
    2. Score each source: accuracy (% of correct past resolutions), uptime (% availability), latency
    3. Require 2-of-3 agreement for resolution; escalate to dispute if sources disagree
    4. Auto-fallback: if primary source is unavailable for > 1 hour, switch to secondary
    5. Source diversity: no two sources should share the same upstream data provider
    6. Temporal cross-check: sources must report within 1 hour of each other to be comparable
    7. Anomaly detection: if a source suddenly disagrees with all others, flag it as potentially compromised
    8. Quarterly source audit: review accuracy and availability scores, replace degraded sources
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
