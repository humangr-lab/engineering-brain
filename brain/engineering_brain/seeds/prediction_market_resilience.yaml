- id: PMRES-015
  text: "Implement a documented incident response plan for financial systems with regulatory notification timelines (SEC 72h, CFTC 24h, CVM 24h), pre-authorized emergency actions, and post-incident forensic preservation."
  why: >
    Financial system incidents have legal and regulatory dimensions that software incidents do not.
    In the US, the SEC requires disclosure of material cybersecurity incidents within 4 business days
    (Form 8-K), the CFTC requires immediate notification for market disruptions, and the NYDFS
    requires 72-hour notification for cybersecurity events. In Brazil, the CVM requires disclosure
    within 24 hours for material events affecting investors. Missing these deadlines results in
    regulatory penalties, license revocation, or criminal liability. Beyond notification, financial
    incident response requires evidence preservation for forensic analysis (courts, regulators,
    insurance claims), coordinated communication with counterparties, and pre-authorized emergency
    actions (trading halts, withdrawal freezes) that can be executed without waiting for C-level
    approval at 3 AM. Without a pre-written playbook, response time doubles and critical evidence
    is destroyed by well-meaning engineers who restart services instead of preserving state.
  how_to_do_right: |
    1. Define severity levels: SEV1 (funds at risk, >$100K exposure), SEV2 (service degraded, potential fund risk), SEV3 (anomaly detected, no immediate risk), SEV4 (minor operational issue)
    2. Pre-authorize emergency actions by severity: SEV1 = freeze withdrawals + halt trading (any engineer can execute); SEV2 = halt new market creation (team lead approval); SEV3 = increase monitoring
    3. Notification timeline matrix: SEC = 4 business days (Form 8-K), CFTC = 24h for market disruptions, NYDFS = 72h for cyber events, CVM Brazil = 24h for material events, users = 24h for fund-affecting incidents
    4. Evidence preservation: snapshot all databases, export all logs (do NOT rotate), capture network state, freeze affected wallets. NEVER restart services before capturing state
    5. Communication templates: pre-written for each severity level — internal (Slack/PagerDuty), regulatory (formal letter), user-facing (status page + email)
    6. War room protocol: SEV1 = dedicated Zoom/Slack channel within 15 min, incident commander designated, scribe assigned for timeline documentation
    7. Post-incident: forensic report within 72h, root cause analysis within 7 days, remediation plan within 14 days, regulatory filing within deadline
    8. Quarterly drills: simulate SEV1 incident end-to-end including regulatory notification — measure time-to-freeze and time-to-notify
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
    library: [pagerduty, opsgenie, redis]
  domains:
    domain: [prediction_markets, fintech, security, compliance]
    concern: [domain_specific, regulatory]
  example_good: |
    from enum import IntEnum
    from datetime import datetime, timedelta
    from dataclasses import dataclass, field

    class Severity(IntEnum):
        SEV1 = 1  # Funds at risk, >$100K exposure
        SEV2 = 2  # Service degraded, potential fund risk
        SEV3 = 3  # Anomaly detected, no immediate risk
        SEV4 = 4  # Minor operational issue

    @dataclass
    class RegulatoryDeadline:
        regulator: str
        deadline_hours: int
        form_or_mechanism: str
        template_path: str

    REGULATORY_DEADLINES = [
        RegulatoryDeadline("SEC", 96, "Form 8-K", "templates/sec_8k.md"),
        RegulatoryDeadline("CFTC", 24, "Direct notification", "templates/cftc_notice.md"),
        RegulatoryDeadline("NYDFS", 72, "Cybersecurity notification", "templates/nydfs_cyber.md"),
        RegulatoryDeadline("CVM_Brazil", 24, "Fato Relevante", "templates/cvm_fato_relevante.md"),
    ]

    @dataclass
    class IncidentResponse:
        incident_id: str
        severity: Severity
        detected_at: datetime
        description: str
        deadlines: list[dict] = field(default_factory=list)

        def __post_init__(self):
            for reg in REGULATORY_DEADLINES:
                self.deadlines.append({
                    "regulator": reg.regulator,
                    "due_at": self.detected_at + timedelta(hours=reg.deadline_hours),
                    "form": reg.form_or_mechanism,
                    "filed": False,
                })

        @property
        def pre_authorized_actions(self) -> list[str]:
            """Actions any engineer can execute WITHOUT C-level approval."""
            if self.severity == Severity.SEV1:
                return [
                    "FREEZE_ALL_WITHDRAWALS",
                    "HALT_TRADING",
                    "SNAPSHOT_ALL_DATABASES",
                    "EXPORT_LOGS_NO_ROTATION",
                    "FREEZE_AFFECTED_WALLETS",
                    "PAGE_INCIDENT_COMMANDER",
                ]
            elif self.severity == Severity.SEV2:
                return [
                    "HALT_NEW_MARKET_CREATION",
                    "INCREASE_MONITORING",
                    "SNAPSHOT_AFFECTED_DATABASES",
                    "PAGE_TEAM_LEAD",
                ]
            return ["INCREASE_MONITORING", "LOG_ANOMALY"]

        def check_overdue_filings(self) -> list[dict]:
            """Check which regulatory notifications are overdue."""
            now = datetime.utcnow()
            return [
                d for d in self.deadlines
                if not d["filed"] and now > d["due_at"]
            ]

    # Usage: SEV1 incident detected
    incident = IncidentResponse(
        incident_id="INC-2025-0042",
        severity=Severity.SEV1,
        detected_at=datetime.utcnow(),
        description="Anomalous withdrawal pattern: $2.3M drained in 5 minutes",
    )

    # Any on-call engineer executes pre-authorized actions immediately
    for action in incident.pre_authorized_actions:
        execute_emergency_action(action, incident_id=incident.incident_id)
        # FREEZE_ALL_WITHDRAWALS — executed in <30 seconds
        # No waiting for CEO approval at 3 AM

    # Check regulatory deadlines
    print(f"CFTC notification due: {incident.deadlines[1]['due_at']}")
    # "CFTC notification due: 2025-06-15T04:30:00" (24h from detection)
  example_bad: |
    # No incident response plan — chaos during real incident
    # 3:17 AM: Monitoring alert fires — "unusual withdrawal volume"
    # 3:18 AM: On-call engineer sees alert, thinks it's a false positive
    # 3:45 AM: Engineer realizes it's real, restarts the service to "fix" it
    #          (DESTROYS forensic evidence — logs rotated on restart)
    # 4:00 AM: Tries to call CEO — no answer
    # 4:30 AM: Posts in general Slack channel — nobody awake
    # 5:00 AM: $8M already drained — no freeze was executed
    # 9:00 AM: CEO learns about it, lawyers scramble
    # Day 5: SEC deadline passes without filing — regulatory penalty
    # Day 14: No forensic evidence preserved — insurance claim denied
  when_applies: Any prediction market, exchange, or fintech platform handling user funds that is subject to financial regulation (SEC, CFTC, NYDFS, CVM, FCA)
  sources:
    - "https://www.sec.gov/rules/final/2023/33-11216.pdf"
    - "https://www.cftc.gov/LawRegulation/CommodityExchangeAct/index.htm"
    - "https://www.dfs.ny.gov/industry_guidance/cybersecurity"
