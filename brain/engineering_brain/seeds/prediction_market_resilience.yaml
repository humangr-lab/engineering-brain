    - "https://rocknblock.io/blog/how-polymarket-works-the-tech-behind-prediction-markets"

- id: PMRES-013
  text: "Implement DDoS resilience for trading systems with request prioritization, adaptive rate limiting, and graceful degradation — trading infrastructure must continue processing orders from authenticated users even under volumetric attack."
  why: >
    Trading platforms are high-value DDoS targets because downtime has immediate financial impact.
    During the 2022 FTX bank run, platforms that couldn't handle traffic spikes effectively locked
    users out during the most critical moments. Unlike a content website where DDoS causes inconvenience,
    a trading platform under DDoS can cause users to miss settlement windows, fail to close positions,
    or lose funds. Standard DDoS mitigation (Cloudflare, AWS Shield) handles volumetric L3/L4 attacks
    but not application-layer L7 attacks that mimic legitimate trading API calls. A prediction market
    must implement request prioritization — order submissions and withdrawals from verified users must
    take absolute priority over unauthenticated requests, market data polls, and read-only API calls.
    The system must degrade gracefully: disable non-essential endpoints (leaderboards, analytics) while
    keeping the order path alive.
  how_to_do_right: |
    1. Classify request priority: P0 = order submission, cancellation, withdrawal; P1 = position queries, balances; P2 = market data, leaderboards; P3 = unauthenticated/public endpoints
    2. Implement adaptive rate limiting per tier: P0 gets 80% of capacity under load, P2/P3 get throttled first
    3. Use token bucket with separate buckets per user per endpoint — prevent a single user from monopolizing order throughput
    4. Under attack, shed load by priority: disable P3 entirely → throttle P2 to 10% → maintain P0/P1 at full capacity
    5. Deploy trading-critical paths behind a separate origin/IP that is not publicly advertised — only authenticated clients know the endpoint
    6. Implement connection-level authentication: TLS client certificates or pre-shared tokens for API clients
    7. Use WebSocket connections for active traders — established connections survive DDoS better than per-request HTTP
    8. Monitor and alert on: request rate anomalies (>3 sigma from baseline), geographic anomalies, user-agent entropy
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
    library: [redis, nginx, cloudflare]
  domains:
    domain: [prediction_markets, fintech, security]
    concern: [domain_specific, infrastructure]
  example_good: |
    import redis.asyncio as redis
    import time
    from enum import IntEnum
    from fastapi import Request, HTTPException

    class RequestPriority(IntEnum):
        P0_ORDER = 0      # Orders, cancellations, withdrawals
        P1_POSITION = 1   # Balance, position queries
        P2_MARKET = 2     # Market data, history
        P3_PUBLIC = 3     # Leaderboards, analytics, unauthenticated

    class AdaptiveDDoSShield:
        """Priority-based request admission control for trading systems."""

        def __init__(self, r: redis.Redis, max_rps: int = 10_000):
            self.r = r
            self.max_rps = max_rps
            self.priority_capacity = {
                RequestPriority.P0_ORDER: 0.80,     # 80% of capacity reserved
                RequestPriority.P1_POSITION: 0.15,  # 15%
                RequestPriority.P2_MARKET: 0.04,    # 4%
                RequestPriority.P3_PUBLIC: 0.01,     # 1%
            }

        async def admit(self, request: Request, priority: RequestPriority) -> bool:
            current_second = int(time.time())
            key = f"rps:{current_second}"

            pipe = self.r.pipeline()
            pipe.incr(key)
            pipe.expire(key, 5)
            results = await pipe.execute()
            current_rps = results[0]

            # Under normal load, admit all
            if current_rps < self.max_rps * 0.7:
                return True

            # Under pressure: enforce priority capacity
            priority_key = f"rps:{current_second}:p{priority.value}"
            priority_count = int(await self.r.incr(priority_key) or 0)
            await self.r.expire(priority_key, 5)
            allowed = int(self.max_rps * self.priority_capacity[priority])

            if priority_count > allowed:
                await self.log_shed(request, priority, current_rps)
                return False
            return True

        async def log_shed(self, request: Request, priority: RequestPriority, rps: int):
            await self.r.xadd("ddos:shed_log", {
                "ip": request.client.host,
                "path": request.url.path,
                "priority": priority.value,
                "rps": rps,
                "ts": time.time(),
            }, maxlen=100_000)

    # FastAPI middleware
    shield = AdaptiveDDoSShield(redis_client, max_rps=10_000)

    @app.post("/api/v1/orders")
    async def submit_order(request: Request, order: OrderRequest):
        if not await shield.admit(request, RequestPriority.P0_ORDER):
            raise HTTPException(503, "System at capacity — retry in 1s")
        return await process_order(order)

    @app.get("/api/v1/leaderboard")
    async def leaderboard(request: Request):
        if not await shield.admit(request, RequestPriority.P3_PUBLIC):
            raise HTTPException(503, "Non-essential endpoints temporarily unavailable")
        return await get_leaderboard()
  example_bad: |
    # No request prioritization — all endpoints treated equally
    @app.post("/api/v1/orders")
    async def submit_order(order: OrderRequest):
        return await process_order(order)

    @app.get("/api/v1/leaderboard")
    async def leaderboard():
        return await compute_leaderboard()  # Expensive query

    # Under DDoS: leaderboard queries consume 60% of server capacity
    # Order submissions timeout because the server is computing leaderboards
    # Users can't close positions or withdraw funds during the attack
    # No load shedding, no priority — everyone suffers equally
  when_applies: Any prediction market or exchange platform exposed to public internet traffic handling real financial transactions
  sources:
    - "https://www.cloudflare.com/learning/ddos/what-is-a-ddos-attack/"
    - "https://www.bis.org/cpmi/publ/d101a.pdf"

- id: PMRES-014
  text: "Implement hot wallet security with automated cold storage rotation, transaction velocity limits, and multi-signature authorization — the hot wallet must never hold more than the minimum amount needed for immediate settlements."
  why: >
    Hot wallets (online, internet-connected) are the primary attack vector for cryptocurrency
    exchanges and prediction markets. The history of crypto hacks is essentially a history of hot
    wallet compromises: Mt. Gox (2014, $460M), Bitfinex (2016, $72M), Ronin Bridge (2022, $625M),
    and hundreds more. The core principle is simple: minimize hot wallet exposure. If a hot wallet
    holding $50M is compromised, you lose $50M. If it holds $500K (1 hour of settlements), you lose
    $500K. Cold storage rotation — automatically sweeping excess funds to offline, multi-sig cold
    wallets — is the fundamental control. Transaction velocity limits (max $X per hour from hot wallet)
    contain blast radius even if the hot wallet key is stolen. Multi-sig authorization for large
    withdrawals ensures no single compromised key can drain funds.
  how_to_do_right: |
    1. Define hot wallet threshold: hold only enough for 1-2 hours of expected settlement volume (e.g., $500K for a platform doing $6M/day)
    2. Implement automated sweep: every 15 minutes, sweep hot wallet balance exceeding threshold to cold storage
    3. Cold storage: hardware security module (HSM) or air-gapped multi-sig wallet (3-of-5 keys, geographically distributed)
    4. Transaction velocity limits: max $50K per 5 minutes, max $500K per hour from hot wallet. Exceeding triggers manual approval
    5. Multi-sig for large transactions: any single withdrawal > $10K requires 2-of-3 approvals
    6. Key rotation: rotate hot wallet keys every 30 days. Old keys are revoked, new keys provisioned via HSM
    7. Real-time monitoring: alert on any withdrawal > $5K, any deviation from sweep schedule, any failed multi-sig check
    8. Incident containment: kill switch that freezes all hot wallet outflows within 30 seconds of activation
    9. Insurance: maintain insurance coverage >= hot wallet maximum balance
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
    library: [web3, eth_account, redis]
  domains:
    domain: [prediction_markets, fintech, security]
    concern: [domain_specific, cryptography]
  example_good: |
    from decimal import Decimal
    from datetime import datetime, timedelta
    import redis.asyncio as redis
    from dataclasses import dataclass

    @dataclass
    class WalletConfig:
        hot_wallet_threshold: Decimal = Decimal("500000")  # Max $500K in hot wallet
        sweep_interval_minutes: int = 15
        velocity_limit_5min: Decimal = Decimal("50000")    # Max $50K per 5 min
        velocity_limit_1hr: Decimal = Decimal("500000")    # Max $500K per hour
        large_tx_threshold: Decimal = Decimal("10000")     # Multi-sig above $10K
        multisig_required: int = 2                         # 2-of-3 for large tx

    class HotWalletController:
        def __init__(self, config: WalletConfig, r: redis.Redis):
            self.config = config
            self.r = r

        async def check_withdrawal(self, amount: Decimal, destination: str) -> dict:
            """Validate withdrawal against velocity limits and multi-sig requirements."""
            # Check velocity limit (5 min window)
            window_key = f"hot_wallet:velocity:5m:{datetime.utcnow().strftime('%Y%m%d%H')}"
            recent_amount = Decimal(await self.r.get(window_key) or "0")

            if recent_amount + amount > self.config.velocity_limit_5min:
                return {
                    "approved": False,
                    "reason": "VELOCITY_LIMIT_5MIN",
                    "current": str(recent_amount),
                    "limit": str(self.config.velocity_limit_5min),
                    "action": "MANUAL_APPROVAL_REQUIRED",
                }

            # Check multi-sig requirement
            if amount > self.config.large_tx_threshold:
                approvals = await self.get_multisig_approvals(destination, amount)
                if len(approvals) < self.config.multisig_required:
                    return {
                        "approved": False,
                        "reason": "MULTISIG_PENDING",
                        "approvals": len(approvals),
                        "required": self.config.multisig_required,
                    }

            # Approved — update velocity counter
            pipe = self.r.pipeline()
            pipe.incrbyfloat(window_key, float(amount))
            pipe.expire(window_key, 300)  # 5 min TTL
            await pipe.execute()

            return {"approved": True, "amount": str(amount)}

        async def sweep_to_cold_storage(self, hot_balance: Decimal) -> dict | None:
            """Sweep excess funds from hot wallet to cold storage."""
            excess = hot_balance - self.config.hot_wallet_threshold
            if excess <= Decimal("0"):
                return None

            return {
                "action": "SWEEP_TO_COLD",
                "amount": str(excess),
                "remaining_hot": str(self.config.hot_wallet_threshold),
                "timestamp": datetime.utcnow().isoformat(),
                "requires_multisig": excess > self.config.large_tx_threshold,
            }

    # Automated sweep runs every 15 minutes
    # hot_balance = await get_hot_wallet_balance()
    # sweep = await controller.sweep_to_cold_storage(hot_balance)
    # if sweep: await execute_cold_transfer(sweep)
