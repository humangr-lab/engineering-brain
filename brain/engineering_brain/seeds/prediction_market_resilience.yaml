- id: PMRES-009
  text: "Implement unified liquidity pool architecture to prevent liquidity fragmentation across market types — a single collateral pool should serve multiple related markets with cross-margining."
  why: >
    Prediction market platforms often fragment liquidity by creating isolated pools per market. If a platform
    has 1,000 markets each with $10K liquidity, the total capital is $10M but each market has thin liquidity
    and wide spreads. Unified liquidity pools allow collateral to be shared across correlated markets with
    cross-margining: a trader holding YES on "Candidate A wins" and NO on "Candidate A wins popular vote"
    has hedged risk, so their margin requirement should be lower than the sum of individual positions.
    Kalshi and Polymarket both implemented cross-margining in 2025 to improve capital efficiency. This also
    enables portfolio margining: the platform evaluates the risk of the entire portfolio, not each position
    individually, unlocking 2-5x more trading capacity from the same collateral.
  how_to_do_right: |
    1. Single collateral pool: all markets share one USDC/USD pool, not per-market pools
    2. Cross-margining: calculate net risk across correlated positions, reduce margin requirements
    3. Portfolio margining: evaluate entire portfolio risk, not sum of individual position margins
    4. Correlation matrix: maintain real-time correlations between markets for margining
    5. Stress testing: run worst-case scenarios across portfolio daily — margin must cover 99% VaR
    6. Automatic de-risking: if portfolio risk exceeds threshold, reduce positions starting with most illiquid
    7. Segregated customer funds: pool is for margining calculation only — actual funds remain segregated
    8. Real-time risk dashboard: show traders their portfolio margin utilization and available buying power
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
    library: [numpy, scipy]
  domains:
    domain: [prediction_markets, fintech, trading]
    concern: [liquidity, capital_efficiency, risk_management]
  example_good: |
    from dataclasses import dataclass, field
    from decimal import Decimal
    import numpy as np

    @dataclass
    class MarketPosition:
        market_id: str
        outcome: str
        shares: Decimal
        entry_price: Decimal

    class PortfolioMarginEngine:
        """Cross-margining engine for unified liquidity across markets."""

        def __init__(self):
            # Correlation matrix between markets (updated hourly)
            self.correlations: dict[tuple[str, str], float] = {}

        def calculate_isolated_margin(self, positions: list[MarketPosition]) -> Decimal:
            """Naive margin: sum of individual position margins (no benefit)."""
            return sum(pos.shares * pos.entry_price for pos in positions)

        def calculate_portfolio_margin(self, positions: list[MarketPosition]) -> Decimal:
            """Portfolio margin with cross-market correlation benefits."""
            if len(positions) <= 1:
                return self.calculate_isolated_margin(positions)

            # Build position vector and correlation matrix
            n = len(positions)
            exposures = np.array([float(pos.shares * pos.entry_price) for pos in positions])

            corr_matrix = np.eye(n)
            for i in range(n):
                for j in range(i + 1, n):
                    key = tuple(sorted([positions[i].market_id, positions[j].market_id]))
                    corr = self.correlations.get(key, 0.5)  # Default: moderate correlation
                    # Opposite positions in correlated markets reduce risk
                    if positions[i].outcome != positions[j].outcome:
                        corr = -corr
                    corr_matrix[i][j] = corr
                    corr_matrix[j][i] = corr

            # Portfolio variance: w^T * Sigma * w
            portfolio_variance = float(exposures @ corr_matrix @ exposures)
            portfolio_risk = Decimal(str(max(0, portfolio_variance) ** 0.5))

            # Margin = 99% VaR (2.33 sigma) with floor at 20% of isolated margin
            var_99 = portfolio_risk * Decimal("2.33")
            floor = self.calculate_isolated_margin(positions) * Decimal("0.20")

            return max(var_99, floor)

        def margin_benefit(self, positions: list[MarketPosition]) -> dict:
            """Show trader how much they save with cross-margining."""
            isolated = self.calculate_isolated_margin(positions)
            portfolio = self.calculate_portfolio_margin(positions)
            savings = isolated - portfolio

            return {
                "isolated_margin": float(isolated),
                "portfolio_margin": float(portfolio),
                "savings": float(savings),
                "capital_efficiency": float(isolated / portfolio) if portfolio > 0 else 1.0,
            }

    # Example: trader has hedged positions
    engine = PortfolioMarginEngine()
    engine.correlations[("election_president", "election_senate")] = 0.75

    positions = [
        MarketPosition("election_president", "YES", Decimal("1000"), Decimal("0.60")),
        MarketPosition("election_senate", "NO", Decimal("500"), Decimal("0.45")),
    ]

    result = engine.margin_benefit(positions)
    # Isolated: $825, Portfolio: $520, Savings: $305 (37% more capital efficient)
  example_bad: |
    # Anti-pattern: isolated pools per market
    class FragmentedLiquidity:
        def __init__(self):
            self.pools = {}  # market_id -> isolated pool

        def add_liquidity(self, market_id, amount):
            self.pools.setdefault(market_id, 0)
            self.pools[market_id] += amount  # $10K per market, can't be shared
    # 1000 markets * $10K = $10M capital locked, each market has thin liquidity
    # Correlated positions get no margin benefit — capital inefficient
  when_applies: Prediction market platforms with multiple markets and shared user collateral
