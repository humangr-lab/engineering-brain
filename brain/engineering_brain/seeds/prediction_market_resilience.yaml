- id: PMRES-012
  text: "Implement post-resolution reconciliation with deterministic payout calculation, dust handling, and unclaimed funds policy — every cent of collateral must be accounted for with a complete audit trail."
  why: >
    After resolution, the payout phase is where accounting errors cause irreversible financial loss. Common
    bugs include: rounding errors accumulating across thousands of positions (dust), integer overflow in large
    markets, unclaimed winnings expiring without policy, and race conditions in concurrent settlement.
    Traditional exchanges (NYSE, CME) have T+2 settlement with dedicated reconciliation teams. Prediction
    markets settle atomically (especially on-chain), making bugs immediately irreversible. Polymarket's
    smart contracts handle this on-chain, but any centralized prediction market must implement equivalent
    guarantees in application code. The reconciliation invariant is: sum(all_payouts) + unclaimed + dust_pool
    == total_escrowed_collateral — this must hold exactly, verified after every settlement.
  how_to_do_right: |
    1. Use Decimal arithmetic (not float) for ALL financial calculations — float introduces rounding errors
    2. Payout formula: payout = shares * Decimal("1.00") if outcome == winning, else Decimal("0.00")
    3. Handle dust: if total_payouts < total_escrowed by < $0.01, add difference to platform treasury
    4. Unclaimed funds policy: unclaimed payouts expire after 90 days → moved to insurance fund
    5. Reconciliation invariant: assert sum(payouts) + dust + unclaimed == total_escrowed (EXACT match)
    6. Run reconciliation check after every settlement batch — fail loudly if invariant broken
    7. Idempotent settlement: re-running settlement for same market produces identical payouts
    8. Complete audit trail: log every payout with market_id, trader_id, shares, payout, timestamp
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
    library: [pydantic]
  domains:
    domain: [prediction_markets, fintech]
    concern: [settlement, accounting, audit]
  example_good: |
    from decimal import Decimal, ROUND_HALF_UP, InvalidOperation
    from dataclasses import dataclass
    from datetime import datetime, timedelta
    import logging

    logger = logging.getLogger(__name__)

    @dataclass
    class PayoutRecord:
        market_id: str
        trader_id: str
        shares: Decimal
        payout: Decimal
        timestamp: datetime
        claimed: bool = False

    class PostResolutionReconciliation:
        """Deterministic payout with dust handling and full audit trail."""

        DUST_THRESHOLD = Decimal("0.01")
        UNCLAIMED_EXPIRY_DAYS = 90
        DECIMAL_PRECISION = Decimal("0.000001")  # 6 decimal places

        def calculate_payouts(
            self, market_id: str, winning_outcome: str,
            positions: list[dict], total_escrowed: Decimal,
        ) -> dict:
            """Deterministic, idempotent payout calculation."""
            payouts: list[PayoutRecord] = []
            total_paid = Decimal("0")

            for pos in positions:
                if pos["outcome"] == winning_outcome:
                    payout = (pos["shares"] * Decimal("1")).quantize(
                        self.DECIMAL_PRECISION, rounding=ROUND_HALF_UP
                    )
                else:
                    payout = Decimal("0")

                payouts.append(PayoutRecord(
                    market_id=market_id,
                    trader_id=pos["trader_id"],
                    shares=pos["shares"],
                    payout=payout,
                    timestamp=datetime.utcnow(),
                ))
                total_paid += payout

            # Dust handling
            dust = total_escrowed - total_paid
            if dust < Decimal("0"):
                raise ValueError(
                    f"CRITICAL: Payouts exceed escrow! "
                    f"escrowed={total_escrowed}, payouts={total_paid}, deficit={-dust}"
                )

            if dust > self.DUST_THRESHOLD:
                logger.warning(
                    f"Large dust amount: {dust} for market {market_id}. Investigating."
                )

            # Reconciliation invariant — MUST hold exactly
            reconciliation = {
                "market_id": market_id,
                "total_escrowed": total_escrowed,
                "total_payouts": total_paid,
                "dust": dust,
                "dust_destination": "platform_treasury" if dust <= self.DUST_THRESHOLD else "investigation",
                "num_winners": sum(1 for p in payouts if p.payout > 0),
                "num_losers": sum(1 for p in payouts if p.payout == 0),
                "invariant_holds": (total_paid + dust == total_escrowed),
                "payouts": payouts,
            }

            assert reconciliation["invariant_holds"], (
                f"RECONCILIATION INVARIANT VIOLATED: "
                f"{total_paid} + {dust} != {total_escrowed}"
            )

            return reconciliation

        def process_unclaimed(self, payouts: list[PayoutRecord]) -> dict:
            """Handle unclaimed payouts after expiry period."""
            now = datetime.utcnow()
            expiry = now - timedelta(days=self.UNCLAIMED_EXPIRY_DAYS)

            expired = [
                p for p in payouts
                if not p.claimed and p.timestamp < expiry and p.payout > 0
            ]
            total_expired = sum(p.payout for p in expired)

            return {
                "expired_payouts": len(expired),
                "total_expired_amount": total_expired,
                "destination": "insurance_fund",
                "processed_at": now,
            }

    # Usage
    reconciler = PostResolutionReconciliation()
    result = reconciler.calculate_payouts(
        market_id="election_2025",
        winning_outcome="YES",
        positions=[
            {"trader_id": "alice", "outcome": "YES", "shares": Decimal("100.50")},
            {"trader_id": "bob", "outcome": "NO", "shares": Decimal("200.00")},
            {"trader_id": "carol", "outcome": "YES", "shares": Decimal("50.25")},
        ],
        total_escrowed=Decimal("350.75"),  # Must match sum of all collateral
    )
    assert result["invariant_holds"]  # MUST pass
    print(f"Paid: {result['total_payouts']}, Dust: {result['dust']}")
  example_bad: |
    # DANGEROUS: float arithmetic for financial calculations
    def settle(positions, winner):
        total_payout = 0.0
        for pos in positions:
            if pos.outcome == winner:
                payout = pos.shares * 1.0  # float multiplication
                total_payout += payout     # accumulates rounding errors
                transfer(pos.trader, payout)
        # After 10,000 positions: total_payout = 9999.999999999847
        # Missing $0.000000000153 — where did it go?
        # No invariant check, no audit trail, no dust handling
