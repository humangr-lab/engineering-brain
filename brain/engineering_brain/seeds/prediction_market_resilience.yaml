- id: PMRES-006
  text: "Implement escrowed collateral with instant settlement for binary outcome markets — all collateral must be locked at trade time, and payouts must be atomic and immediate upon resolution."
  why: >
    In prediction markets, counterparty risk must be zero — if a trader buys YES shares at $0.60, the $0.60
    must be escrowed immediately so that payout is guaranteed regardless of the counterparty's solvency at
    resolution time. Polymarket achieves this with USDC escrowed in smart contracts: when a trade executes,
    collateral moves from the trader's wallet to the contract, and upon resolution, the contract automatically
    distributes $1.00 per winning share. This eliminates the settlement risk that plagues traditional derivatives
    markets (where settlement can take T+2 days). Instant atomic settlement also prevents scenarios where a
    losing counterparty refuses to pay — the smart contract enforces settlement unconditionally.
  how_to_do_right: |
    1. Escrow full collateral at trade time: buyer pays price, seller provides (1 - price) as collateral
    2. Use atomic transactions: escrow + share issuance in a single transaction (all or nothing)
    3. Upon resolution: winning shares receive $1.00 each, losing shares receive $0.00
    4. Settlement must be automatic and unconditional — no manual approval or delay
    5. Implement withdrawal function: users can withdraw unwon collateral immediately after resolution
    6. Handle dust amounts: collateral < $0.01 should be rounded or pooled (not lost)
    7. Add emergency pause: admin can pause settlement if oracle is disputed (but not permanently)
    8. Audit escrow balance invariant: sum(all_collateral) == sum(all_potential_payouts) at all times
  severity: critical
  technologies:
    lang: [python, solidity]
    framework: [fastapi, web3]
    library: [web3py, eth-abi]
  domains:
    domain: [prediction_markets, fintech, blockchain]
    concern: [settlement, collateral, trust]
  example_good: |
    from decimal import Decimal, ROUND_DOWN
    from dataclasses import dataclass

    @dataclass
    class Position:
        trader_id: str
        market_id: str
        outcome: str
        shares: Decimal
        collateral_escrowed: Decimal

    class EscrowedSettlement:
        """Zero counterparty risk: escrow at trade, instant payout at resolution."""

        def __init__(self):
            self.positions: list[Position] = []
            self.escrow_balance: Decimal = Decimal("0")
            self.resolved: dict[str, str | None] = {}  # market_id -> winning outcome

        def execute_trade(
            self, trader_id: str, market_id: str, outcome: str,
            shares: Decimal, price_per_share: Decimal,
        ) -> Position:
            """Atomically escrow collateral and issue shares."""
            collateral_required = shares * price_per_share

            # Atomic: escrow + share issuance
            position = Position(
                trader_id=trader_id,
                market_id=market_id,
                outcome=outcome,
                shares=shares,
                collateral_escrowed=collateral_required,
            )
            self.escrow_balance += collateral_required
            self.positions.append(position)

            # Invariant check: escrow covers all potential payouts
            self._assert_escrow_invariant(market_id)
            return position

        def settle(self, market_id: str, winning_outcome: str) -> list[dict]:
            """Instant, automatic settlement — no manual approval needed."""
            self.resolved[market_id] = winning_outcome
            payouts = []

            for pos in self.positions:
                if pos.market_id != market_id:
                    continue
                if pos.outcome == winning_outcome:
                    payout = pos.shares * Decimal("1.00")  # $1.00 per winning share
                else:
                    payout = Decimal("0.00")

                payouts.append({
                    "trader_id": pos.trader_id,
                    "payout": payout,
                    "collateral_returned": payout,
                    "net_pnl": payout - pos.collateral_escrowed,
                })
                self.escrow_balance -= pos.collateral_escrowed

            return payouts

        def _assert_escrow_invariant(self, market_id: str):
            """Invariant: escrow always covers maximum possible payout."""
            market_positions = [p for p in self.positions if p.market_id == market_id]
            max_payout = sum(p.shares for p in market_positions)
            total_escrowed = sum(p.collateral_escrowed for p in market_positions)
            assert total_escrowed >= max_payout.quantize(Decimal("0.01"), rounding=ROUND_DOWN), \
                f"Escrow invariant violated: {total_escrowed} < {max_payout}"
  example_bad: |
    # DANGEROUS: No escrow — counterparty risk
    class UnsettledMarket:
        def trade(self, buyer, seller, amount):
            # Just record the trade — no collateral locked
            self.trades.append({"buyer": buyer, "seller": seller, "amount": amount})

        def settle(self, market_id, winner):
            # Hope the loser has enough balance to pay
            for trade in self.trades:
                loser = trade["seller"] if winner == "YES" else trade["buyer"]
                if self.get_balance(loser) < trade["amount"]:
                    pass  # Loser is insolvent — winner doesn't get paid
  when_applies: Any binary outcome prediction market handling real money or stablecoins
  sources:
    - "https://docs.polymarket.com/developers/CLOB/introduction"
    - "https://rocknblock.io/blog/how-polymarket-works-the-tech-behind-prediction-markets"

- id: PMRES-007
  text: "Implement wash trading detection using network-based analysis (wallet clustering, self-trade detection, volume anomaly scoring) — Columbia University research (2025) found 25% of Polymarket volume was wash trading."
  why: >
    A November 2025 Columbia University study found that 25% of Polymarket's three-year trading volume was
    artificially inflated by wash trading, with some weeks reaching 60%. The study found 45% of sports-related
    trades and 17% of election trades were flagged as inauthentic. Wash trading destroys price signal integrity —
    the core value proposition of prediction markets. Detection requires network analysis: identifying clusters
    of wallets that repeatedly trade with each other, temporal pattern analysis (simultaneous opposing trades),
    and volume anomaly detection. The U.S. CFTC's February 2026 advisory specifically targets wash trading in
    prediction markets. Chainalysis's 2025 report found that crypto wash trading is commonly used to inflate
    volume metrics, attract liquidity, and manipulate prices.
  how_to_do_right: |
    1. Self-trade detection: flag when same entity places both buy and sell sides of a trade
    2. Wallet clustering: use transaction graph analysis to identify wallets controlled by same entity
    3. Temporal pattern detection: flag simultaneous opposing orders within < 1 second
    4. Volume anomaly scoring: compare market volume against historical baseline, flag > 3 sigma spikes
    5. IP/device fingerprint correlation: cluster accounts sharing IP, device fingerprint, or cookie
    6. Economic irrationality detection: flag trades that are guaranteed to lose money (wash trade signal)
    7. Report wash trading ratio per market: healthy < 5%, warning 5-15%, alert > 15%
    8. Implement progressive penalties: warning → trading restriction → account suspension
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi, networkx]
    library: [networkx, numpy, scikit-learn]
  domains:
    domain: [prediction_markets, security, compliance]
    concern: [manipulation, fraud_detection, market_integrity]
  example_good: |
    import networkx as nx
    import numpy as np
    from collections import defaultdict
    from dataclasses import dataclass
    from datetime import datetime, timedelta

    @dataclass
    class Trade:
        trade_id: str
        market_id: str
        buyer: str
        seller: str
        price: float
        quantity: float
        timestamp: datetime

    class WashTradingDetector:
        """Multi-signal wash trading detection system."""

        SELF_TRADE_WINDOW_MS = 1000  # Simultaneous opposing orders within 1s
        VOLUME_ANOMALY_SIGMA = 3.0
        CLUSTER_MIN_TRADES = 5  # Min trades between pair to flag as suspicious

        def detect_self_trades(self, trades: list[Trade]) -> list[dict]:
            """Detect when same entity appears on both sides."""
            flagged = []
            for trade in trades:
                if trade.buyer == trade.seller:
                    flagged.append({"trade_id": trade.trade_id, "signal": "direct_self_trade"})
            return flagged

        def detect_wallet_clusters(self, trades: list[Trade]) -> list[set[str]]:
            """Build transaction graph and find suspicious clusters."""
            G = nx.Graph()
            pair_counts: dict[tuple, int] = defaultdict(int)

            for trade in trades:
                pair = tuple(sorted([trade.buyer, trade.seller]))
                pair_counts[pair] += 1

            # Add edges for pairs with suspiciously many bilateral trades
            for (a, b), count in pair_counts.items():
                if count >= self.CLUSTER_MIN_TRADES:
                    G.add_edge(a, b, weight=count)

            # Find connected components — each is a potential wash trading ring
            clusters = list(nx.connected_components(G))
            suspicious = [c for c in clusters if len(c) >= 2]
            return suspicious

        def detect_volume_anomalies(self, trades: list[Trade], market_id: str) -> dict:
            """Flag volume spikes that exceed historical baseline."""
            market_trades = [t for t in trades if t.market_id == market_id]

            # Daily volume over past 30 days
            daily_volumes = defaultdict(float)
            for t in market_trades:
                day = t.timestamp.date()
                daily_volumes[day] += t.quantity * t.price

            volumes = list(daily_volumes.values())
            if len(volumes) < 7:
                return {"anomaly": False, "reason": "insufficient_history"}

            mean_vol = np.mean(volumes[:-1])  # Exclude today
            std_vol = np.std(volumes[:-1])
            today_vol = volumes[-1]

            z_score = (today_vol - mean_vol) / std_vol if std_vol > 0 else 0

            return {
                "anomaly": z_score > self.VOLUME_ANOMALY_SIGMA,
                "z_score": z_score,
                "today_volume": today_vol,
                "baseline_mean": mean_vol,
            }

        def compute_wash_ratio(self, trades: list[Trade]) -> float:
            """Compute the ratio of suspected wash trades to total volume."""
            self_trades = self.detect_self_trades(trades)
            clusters = self.detect_wallet_clusters(trades)
            cluster_wallets = set().union(*clusters) if clusters else set()

            wash_volume = sum(
                t.price * t.quantity for t in trades
                if t.buyer in cluster_wallets or t.seller in cluster_wallets
                or t.trade_id in {s["trade_id"] for s in self_trades}
            )
            total_volume = sum(t.price * t.quantity for t in trades)

            return wash_volume / total_volume if total_volume > 0 else 0.0
  example_bad: |
