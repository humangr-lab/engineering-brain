- id: CR-SOL-PERF-001
  text: Design account structures to maximize parallelism — avoid shared mutable accounts across unrelated transactions.
  why: Solana's runtime uses accounts as lock granularity. Two transactions touching the same writable account are serialized.
    A single global counter or shared pool account becomes a bottleneck — all transactions queue behind each other. Designing
    per-user or per-operation accounts enables true parallel execution.
  how_to_do_right: Use per-user accounts (PDAs derived from user pubkey) instead of global state. Batch operations within
    a single instruction rather than multiple transactions. For global state that must be shared, consider using multiple
    sharded accounts (e.g., Marinade's stake pool design).
  severity: high
  technologies:
    platform: [solana]
  domains:
    domain: [architecture, blockchain, performance]
  example_good: "// Per-user vault — transactions for different users run in parallel\n#[account(\n    seeds = [b\"vault\"\
    , user.key().as_ref()],\n    bump,\n)]\npub vault: Account<'info, UserVault>,\n// User A's deposit and User B's deposit\
    \ execute concurrently\n// because they touch different accounts\n"
  example_bad: '// Single global vault — ALL deposits serialize

    #[account(mut)]

    pub global_vault: Account<''info, GlobalVault>,

    // Every user''s deposit must wait for the previous one

    // Throughput bottleneck: 1 deposit per slot

    '
  when_applies: Projects using Solana blockchain
  when_not_applies: traditional web2 applications, centralized systems. projects not using Solana
  sources: ["https://solana.com/docs/core/accounts#account-model"]
