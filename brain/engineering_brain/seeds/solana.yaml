layer: rules
technology: Solana
domain: blockchain
knowledge:
- id: CR-SOL-ACCT-001
  text: Understand that Solana programs are stateless — all state lives in separate accounts that are passed to every instruction.
  why: Unlike Ethereum where contracts hold their own storage, Solana programs are read-only executables. State is stored
    in accounts owned by programs. If you don't pass the correct accounts to an instruction, the program can't read or modify
    them. This separation enables Solana's parallel execution model — transactions touching different accounts run concurrently.
  how_to_do_right: 'Define account structs with #[account] in Anchor. Each instruction context specifies required accounts
    with their constraints. Think of accounts as database rows passed by reference to a stateless function.'
  severity: high
  technologies:
    library: [anchor]
    platform: [solana]
  domains:
    domain: [architecture, blockchain]
  example_good: "#[derive(Accounts)]\npub struct Deposit<'info> {\n    #[account(mut)]\n    pub user: Signer<'info>,\n   \
    \ #[account(\n        mut,\n        seeds = [b\"vault\", user.key().as_ref()],\n        bump = vault.bump,\n    )]\n \
    \   pub vault: Account<'info, Vault>,\n    pub system_program: Program<'info, System>,\n}\n\n#[account]\npub struct Vault\
    \ {\n    pub owner: Pubkey,\n    pub balance: u64,\n    pub bump: u8,\n}\n"
  example_bad: "// Treating Solana like Ethereum — trying to store state in program\n// This doesn't work — programs are immutable\
    \ executables\npub fn deposit(amount: u64) {\n    // Where does 'balance' live? Not in the program!\n    self.balance\
    \ += amount; // ERROR: no 'self' storage\n}\n"
  when_applies: Projects using Solana blockchain or Anchor
  when_not_applies: traditional web2 applications, centralized systems. projects not using Solana or Anchor
  sources: ["https://solana.com/docs/core/accounts"]
- id: CR-SOL-ACCT-002
  text: Use Program Derived Addresses (PDAs) with deterministic seeds for program-owned accounts — always store and verify
    the canonical bump.
  why: PDAs are addresses derived from seeds + program ID that have no private key — only the program can sign for them. Without
    deterministic seeds, you can't find accounts again. Without canonical bump, an attacker can create a valid PDA with a
    different bump, leading to account confusion. The canonical bump (first valid bump from 255 downward) must be stored and
    verified.
  how_to_do_right: 'Derive PDAs using find_program_address (returns canonical bump). Store the bump in the account data. In
    Anchor, use seeds + bump constraints to validate. Choose meaningful seed patterns: [b''vault'', user.key().as_ref()] for
    per-user vaults.'
  severity: critical
  technologies:
    library: [anchor]
    platform: [solana]
  domains:
    domain: [architecture, blockchain, security]
  example_good: "// Anchor automatically validates seeds + bump\n#[account(\n    init,\n    payer = user,\n    space = 8 +\
    \ Vault::INIT_SPACE,\n    seeds = [b\"vault\", user.key().as_ref()],\n    bump,\n)]\npub vault: Account<'info, Vault>,\n\
    \n// Store canonical bump on init\npub fn initialize(ctx: Context<Initialize>) -> Result<()> {\n    let vault = &mut ctx.accounts.vault;\n\
    \    vault.bump = ctx.bumps.vault; // Store canonical bump\n    vault.owner = ctx.accounts.user.key();\n    Ok(())\n}\n"
  example_bad: '// DANGEROUS: not verifying bump — attacker can pass non-canonical PDA

    let (pda, _bump) = Pubkey::find_program_address(seeds, program_id);

    // Using bump from instruction data without verification

    let seeds = &[b"vault", &[user_provided_bump]]; // Could be wrong bump!

    '
  when_applies: Any project using Solana blockchain or Anchor
  when_not_applies: traditional web2 applications, centralized systems. projects not using Solana or Anchor
  sources: ["https://solana.com/docs/core/pda"]
- id: CR-SOL-ACCT-003
  text: Always calculate minimum rent-exempt balance and allocate exact account sizes — accounts below rent threshold are
    garbage collected.
  why: Solana charges rent for account storage. Accounts must maintain a minimum lamport balance (rent-exempt threshold) or
    they are purged after 2 years (effectively immediately for low-balance accounts). An under-funded account will be garbage
    collected, losing all stored data permanently. The rent-exempt threshold scales with account size.
  how_to_do_right: Use INIT_SPACE derive macro for account size calculation. Anchor's init constraint handles rent automatically.
    For raw accounts, use Rent::get()?.minimum_balance(data_len). Account size is FIXED at creation — plan for maximum data
    needs upfront.
  severity: high
  technologies:
    library: [anchor]
    platform: [solana]
  domains:
    domain: [architecture, blockchain]
  example_good: "#[account]\n#[derive(InitSpace)]\npub struct GameState {\n    pub authority: Pubkey,        // 32 bytes\n\
    \    pub score: u64,               // 8 bytes\n    pub level: u8,                // 1 byte\n    #[max_len(50)]\n    pub\
    \ player_name: String,      // 4 + 50 bytes\n    pub bump: u8,                 // 1 byte\n}\n// INIT_SPACE auto-calculates:\
    \ 32 + 8 + 1 + 54 + 1 = 96 bytes\n// space = 8 (discriminator) + 96 = 104 bytes\n\n#[account(\n    init,\n    payer =\
    \ user,\n    space = 8 + GameState::INIT_SPACE,\n    seeds = [b\"game\", user.key().as_ref()],\n    bump,\n)]\npub game:\
    \ Account<'info, GameState>,\n"
  example_bad: '// DANGEROUS: hardcoded size without accounting for all fields

    // If you add a field later, existing accounts are too small

    space = 100 // Magic number — what happens when struct changes?

    '
  when_applies: Projects using Solana blockchain or Anchor
  when_not_applies: traditional web2 applications, centralized systems. projects not using Solana or Anchor
  sources: ["https://solana.com/docs/core/accounts#rent"]
- id: CR-SOL-ANCHOR-001
  text: Use Anchor's constraint macros for account validation — never manually check account ownership, seeds, or signers.
  why: 'Manual account validation is the #1 source of Solana exploits. Missing a single check (owner, signer, seeds) can lose
    all funds. Anchor''s constraints are declarative and compile-checked — if you forget a required check, the program won''t
    compile. The Wormhole Solana exploit ($320M) was caused by missing account validation.'
  how_to_do_right: 'Use has_one for ownership checks, constraint for custom logic, seeds+bump for PDA validation, and Signer
    type for signer verification. Let Anchor''s #[derive(Accounts)] generate the validation code.'
  severity: critical
  technologies:
    library: [anchor]
    platform: [solana]
  domains:
    domain: [architecture, blockchain, security]
  example_good: "#[derive(Accounts)]\npub struct Withdraw<'info> {\n    #[account(mut)]\n    pub user: Signer<'info>,  //\
    \ Signer type = auto-verified\n    #[account(\n        mut,\n        has_one = owner,      // Checks vault.owner == owner.key()\n\
    \        seeds = [b\"vault\", owner.key().as_ref()],\n        bump = vault.bump,    // Verifies PDA derivation\n     \
    \   constraint = vault.balance >= amount @ ErrorCode::InsufficientFunds,\n    )]\n    pub vault: Account<'info, Vault>,\n\
    \    /// CHECK: validated by has_one\n    pub owner: AccountInfo<'info>,\n}\n"
  example_bad: "// Manual checks — easy to forget one, each omission is exploitable\npub fn withdraw(ctx: Context<Withdraw>,\
    \ amount: u64) -> Result<()> {\n    let vault = &ctx.accounts.vault;\n    // Forgot to check: is user the signer?\n  \
    \  // Forgot to check: is vault owned by this program?\n    // Forgot to check: is vault the correct PDA?\n    // Any\
    \ missing check = exploit\n}\n"
  when_applies: Any project using Solana blockchain or Anchor
  when_not_applies: traditional web2 applications, centralized systems. projects not using Solana or Anchor
  sources: ["https://www.anchor-lang.com/docs/account-constraints"]
- id: CR-SOL-ANCHOR-002
  text: Implement proper error handling with custom error codes — never use generic errors or unwrap in production.
  why: Generic errors ('Error processing instruction') give no debugging information. unwrap() and expect() cause panics that
    return unhelpful 'Program failed' messages, making it impossible to diagnose issues in production. Custom error codes
    are returned to clients and logged by explorers.
  how_to_do_right: 'Define #[error_code] enum with descriptive variants. Use @ syntax in constraints for specific error codes.
    Return Result<()> from all instruction handlers. Use require!() macro with error codes instead of assert.'
  severity: medium
  technologies:
    library: [anchor]
    platform: [solana]
  domains:
    domain: [architecture, blockchain, reliability]
    concern: [error_handling]
  example_good: "#[error_code]\npub enum ErrorCode {\n    #[msg(\"Insufficient funds for withdrawal\")]\n    InsufficientFunds,\n\
    \    #[msg(\"Unauthorized: signer is not vault owner\")]\n    Unauthorized,\n    #[msg(\"Vault is currently locked\")]\n\
    \    VaultLocked,\n    #[msg(\"Amount exceeds daily withdrawal limit\")]\n    ExceedsDailyLimit,\n}\n\npub fn withdraw(ctx:\
    \ Context<Withdraw>, amount: u64) -> Result<()> {\n    require!(amount > 0, ErrorCode::InsufficientFunds);\n    let vault\
    \ = &mut ctx.accounts.vault;\n    require!(!vault.locked, ErrorCode::VaultLocked);\n    require!(amount <= vault.daily_limit,\
    \ ErrorCode::ExceedsDailyLimit);\n\n    vault.balance = vault.balance\n        .checked_sub(amount)\n        .ok_or(ErrorCode::InsufficientFunds)?;\n\
    \    Ok(())\n}\n"
  example_bad: "pub fn withdraw(ctx: Context<Withdraw>, amount: u64) -> Result<()> {\n    let vault = &mut ctx.accounts.vault;\n\
    \    vault.balance -= amount; // Panics on underflow — unhelpful error\n    Ok(())\n}\n"
  when_applies: Projects using Solana blockchain or Anchor
  when_not_applies: traditional web2 applications, centralized systems. projects not using Solana or Anchor
  sources: ["https://www.anchor-lang.com/docs/errors"]
- id: CR-SOL-CPI-001
  text: Validate all accounts passed through CPI — the called program cannot verify that accounts came from your program's
    context.
  why: When Program A calls Program B via CPI, Program B only sees the accounts it receives. It trusts that Program A validated
    them correctly. If Program A passes an attacker-controlled account instead of the real token mint, Program B will process
    it. CPI privilege escalation is a common Solana exploit vector.
  how_to_do_right: Validate ALL accounts before CPI. Use Anchor's CpiContext with typed accounts. Verify mint addresses, token
    program IDs, and authority. For PDA signers, pass seeds to invoke_signed. Never forward unvalidated AccountInfo to CPI.
  severity: critical
  technologies:
    library: [anchor]
    platform: [solana]
  domains:
    domain: [architecture, blockchain, security]
  example_good: "pub fn transfer_tokens(ctx: Context<TransferTokens>, amount: u64) -> Result<()> {\n    let cpi_accounts =\
    \ Transfer {\n        from: ctx.accounts.source.to_account_info(),\n        to: ctx.accounts.destination.to_account_info(),\n\
    \        authority: ctx.accounts.authority.to_account_info(),\n    };\n    let cpi_program = ctx.accounts.token_program.to_account_info();\n\
    \    let cpi_ctx = CpiContext::new(cpi_program, cpi_accounts);\n    token::transfer(cpi_ctx, amount)?;\n    Ok(())\n}\n\
    \n// Accounts are validated by Anchor constraints:\n#[account(\n    mut,\n    constraint = source.mint == expected_mint.key(),\n\
    \    constraint = source.owner == authority.key(),\n)]\npub source: Account<'info, TokenAccount>,\n"
  example_bad: "// DANGEROUS: passing unvalidated accounts to CPI\ninvoke(\n    &spl_token::instruction::transfer(\n     \
    \   token_program.key,\n        source.key,        // Not validated — could be any token account\n        destination.key,\
    \   // Not validated — could be attacker's account\n        authority.key,     // Not validated — could be wrong authority\n\
    \        &[],\n        amount,\n    )?,\n    &[source, destination, authority, token_program],\n)?;\n"
  when_applies: Any project using Solana blockchain or Anchor
  when_not_applies: traditional web2 applications, centralized systems. projects not using Solana or Anchor
  sources: ["https://solana.com/docs/core/cpi"]
- id: CR-SOL-TOKEN-001
  text: Use Associated Token Accounts (ATAs) for deterministic token account addresses — never create random token accounts.
  why: ATAs have deterministic addresses derived from (wallet, mint, token_program). This means any program or frontend can
    compute a user's token account address without querying. Random token accounts require maintaining a separate registry
    of who owns which account. ATAs also prevent duplicate token accounts for the same mint per wallet.
  how_to_do_right: Use get_associated_token_address() to compute ATA addresses. Use create_associated_token_account for first-time
    creation. The associated-token-account program handles creation idempotently.
  severity: high
  technologies:
    library: [spl token]
    platform: [solana]
  domains:
    domain: [architecture, blockchain]
    concern: [tokens]
  example_good: "use anchor_spl::associated_token::AssociatedToken;\n\n#[derive(Accounts)]\npub struct InitUserToken<'info>\
    \ {\n    #[account(mut)]\n    pub user: Signer<'info>,\n    pub mint: Account<'info, Mint>,\n    #[account(\n        init_if_needed,\n\
    \        payer = user,\n        associated_token::mint = mint,\n        associated_token::authority = user,\n    )]\n\
    \    pub user_token: Account<'info, TokenAccount>,\n    pub token_program: Program<'info, Token>,\n    pub associated_token_program:\
    \ Program<'info, AssociatedToken>,\n    pub system_program: Program<'info, System>,\n}\n"
  example_bad: '// Creating random token accounts — address is unpredictable

    // Other programs can''t find this account without a registry

    let random_account = Keypair::new();

    // Now you need to store random_account.pubkey() somewhere

    // and every program that interacts needs that mapping

    '
  when_applies: Projects using Solana blockchain or SPL Token
  when_not_applies: traditional web2 applications, centralized systems. projects not using Solana or SPL Token
  sources: ["https://spl.solana.com/associated-token-account"]
- id: CR-SOL-SEC-001
  text: Always verify is_signer on accounts that authorize state changes — unsigned accounts can be spoofed.
  why: Any Pubkey can be passed as an AccountInfo. Without checking is_signer, an attacker can pass the admin's public key
    (which is public information) as the authority account and execute privileged operations. This is the most basic Solana
    exploit — equivalent to not checking passwords.
  how_to_do_right: Use Anchor's Signer<'info> type which auto-checks is_signer. For raw code, explicitly check account.is_signer.
    For PDAs, use invoke_signed with correct seeds — the runtime verifies the PDA derivation.
  severity: critical
  technologies:
    library: [anchor]
    platform: [solana]
  domains:
    domain: [architecture, blockchain, security]
  example_good: "// Anchor: Signer type guarantees is_signer = true\n#[derive(Accounts)]\npub struct AdminAction<'info> {\n\
    \    pub admin: Signer<'info>, // Auto-verified: must sign tx\n    #[account(has_one = admin)]\n    pub config: Account<'info,\
    \ Config>,\n}\n\n// Raw: explicit check\nif !admin_account.is_signer {\n    return Err(ProgramError::MissingRequiredSignature);\n\
    }\n"
  example_bad: "// CRITICAL: no signer check — anyone can pass admin's pubkey\npub fn admin_withdraw(accounts: &[AccountInfo],\
    \ amount: u64) -> ProgramResult {\n    let admin = &accounts[0];\n    // admin.key == known_admin_pubkey, but did they\
    \ SIGN? Not checked!\n    // Attacker passes admin's pubkey without signature → drains funds\n}\n"
  when_applies: Any project using Solana blockchain or Anchor
  when_not_applies: traditional web2 applications, centralized systems. projects not using Solana or Anchor
  sources: ["https://solana.com/developers/courses/onchain-development/deserialize-custom-data"]
- id: CR-SOL-SEC-002
  text: Verify account ownership — ensure accounts are owned by the expected program before trusting their data.
  why: On Solana, any program can create an account with any data. Without checking the owner field, an attacker can create
    a fake vault account with arbitrary balance data and pass it to your program. Your program deserializes it, sees a huge
    balance, and allows a massive withdrawal from the real vault. This is account spoofing.
  how_to_do_right: Anchor's Account<'info, T> type auto-checks owner and discriminator. For raw code, check account.owner
    == expected_program_id. Check the 8-byte discriminator at the start of account data to ensure it's the correct account
    type.
  severity: critical
  technologies:
    library: [anchor]
    platform: [solana]
  domains:
    domain: [architecture, blockchain, security]
  example_good: "// Anchor validates owner + discriminator automatically\npub vault: Account<'info, Vault>,  // Owner MUST\
    \ be this program\n\n// Raw: explicit owner check\nif vault_account.owner != program_id {\n    return Err(ProgramError::IncorrectProgramId);\n\
    }\n// Also check discriminator\nlet data = vault_account.try_borrow_data()?;\nif data[..8] != Vault::DISCRIMINATOR {\n\
    \    return Err(ErrorCode::InvalidAccountData.into());\n}\n"
  example_bad: '// DANGEROUS: deserializing without owner check

    let vault_data = Vault::try_from_slice(&vault_account.data.borrow())?;

    // Attacker created a fake account with spoofed data

    // vault_data.balance = 1_000_000 (fake)

    transfer(vault_data.balance)?; // Drains real vault

    '
  when_applies: Any project using Solana blockchain or Anchor
  when_not_applies: traditional web2 applications, centralized systems. projects not using Solana or Anchor
  sources: ["https://solana.com/developers/courses/program-security/owner-checks"]
- id: CR-SOL-SEC-003
  text: Use checked arithmetic (checked_add, checked_sub, checked_mul) for all balance and amount calculations.
  why: Rust's release mode does not check for integer overflow/underflow by default — values silently wrap around. A balance
    of 1 minus 2 becomes u64::MAX (18.4 quintillion). Solana programs run in BPF which uses release-mode arithmetic. This
    can create tokens from nothing or allow infinite withdrawals.
  how_to_do_right: Use .checked_add(), .checked_sub(), .checked_mul(), .checked_div() and handle the None case. Or use the
    require!() macro with explicit overflow checks. Anchor's overflow-checks feature flag can enable this globally but has
    compute cost.
  severity: critical
  technologies:
    lang: [rust]
    platform: [solana]
  domains:
    domain: [architecture, blockchain, security]
  example_good: "pub fn deposit(ctx: Context<Deposit>, amount: u64) -> Result<()> {\n    let vault = &mut ctx.accounts.vault;\n\
    \    vault.balance = vault.balance\n        .checked_add(amount)\n        .ok_or(ErrorCode::Overflow)?;\n    vault.total_deposits\
    \ = vault.total_deposits\n        .checked_add(1)\n        .ok_or(ErrorCode::Overflow)?;\n    Ok(())\n}\n"
  example_bad: "pub fn deposit(ctx: Context<Deposit>, amount: u64) -> Result<()> {\n    let vault = &mut ctx.accounts.vault;\n\
    \    vault.balance += amount;  // Silent overflow in BPF release mode!\n    // If balance = u64::MAX and amount = 1 →\
    \ balance wraps to 0\n    Ok(())\n}\n"
  when_applies: Any project using Solana blockchain or Rust systems with ownership model
  when_not_applies: traditional web2 applications, centralized systems. projects not using Solana or Rust
  sources: ["https://doc.rust-lang.org/book/ch03-02-data-types.html#integer-overflow"]
- id: CR-SOL-SEC-004
  text: When closing accounts, zero out the data AND transfer all lamports to prevent revival attacks.
  why: If you only set a 'closed' flag without zeroing data and draining lamports, the account still exists with valid data.
    An attacker can send lamports back to keep it alive and re-use it. On Solana, accounts below rent-exempt threshold are
    garbage collected — but a non-zero balance prevents collection.
  how_to_do_right: 'Use Anchor''s close = target constraint which handles everything. For raw code: 1) Zero all account data.
    2) Transfer all lamports to a recipient. 3) Set owner to system program. The runtime will garbage-collect the zeroed,
    empty account.'
  severity: high
  technologies:
    library: [anchor]
    platform: [solana]
  domains:
    domain: [architecture, blockchain, security]
  example_good: "// Anchor: close constraint handles everything\n#[derive(Accounts)]\npub struct CloseVault<'info> {\n   \
    \ #[account(\n        mut,\n        has_one = owner,\n        close = owner,  // Zeros data + transfers lamports to owner\n\
    \    )]\n    pub vault: Account<'info, Vault>,\n    #[account(mut)]\n    pub owner: Signer<'info>,\n}\n"
  example_bad: "// DANGEROUS: account can be revived\npub fn close_vault(ctx: Context<CloseVault>) -> Result<()> {\n    let\
    \ vault = &mut ctx.accounts.vault;\n    vault.is_closed = true;  // Just a flag — data still exists\n    // Lamports still\
    \ in account — won't be garbage collected\n    // Attacker can send lamports + re-use the account\n    Ok(())\n}\n"
  when_applies: Projects using Solana blockchain or Anchor
  when_not_applies: traditional web2 applications, centralized systems. projects not using Solana or Anchor
  sources: ["https://solana.com/developers/courses/program-security/closing-accounts"]
- id: CR-SOL-TX-001
  text: Request only the compute units your instruction needs — over-requesting wastes priority fee budget.
  why: Solana charges priority fees proportional to requested compute units. Default is 200,000 CU per instruction. If your
    instruction uses 50,000 CU but requests 200,000, you pay 4x more in priority fees. During congestion, efficient CU usage
    means your transactions land while wasteful ones get dropped.
  how_to_do_right: Measure actual CU usage in tests using solana_program_test. Add 10-20% buffer. Use ComputeBudgetInstruction::set_compute_unit_limit()
    in the transaction. For complex instructions, profile different code paths.
  severity: medium
  technologies:
    platform: [solana]
  domains:
    domain: [architecture, blockchain]
    concern: [gas_optimization]
  example_good: "// TypeScript — request only what you need\nconst modifyComputeUnits = ComputeBudgetProgram.setComputeUnitLimit({\n\
    \    units: 65_000, // Measured: 52,000 CU + 25% buffer\n});\nconst addPriorityFee = ComputeBudgetProgram.setComputeUnitPrice({\n\
    \    microLamports: 50_000, // Priority fee per CU\n});\n\nconst tx = new Transaction()\n    .add(modifyComputeUnits)\n\
    \    .add(addPriorityFee)\n    .add(yourInstruction);\n"
  example_bad: '// Using defaults — 200,000 CU per instruction

    // Your instruction uses 50,000 CU → paying 4x more priority fee

    const tx = new Transaction().add(yourInstruction);

    // Or worse: requesting max

    ComputeBudgetProgram.setComputeUnitLimit({ units: 1_400_000 });

    '
  when_applies: Projects using Solana blockchain
  when_not_applies: traditional web2 applications, centralized systems. projects not using Solana
  sources: ["https://solana.com/docs/core/fees"]
- id: CR-SOL-TX-002
  text: Use versioned transactions with Address Lookup Tables (ALTs) to fit more accounts in a single transaction.
  why: Solana transactions are limited to 1232 bytes. Each account address is 32 bytes. A transaction with 20 accounts uses
    640 bytes just for addresses, leaving little room for instruction data. ALTs compress account addresses to 1-byte indices,
    allowing transactions with 60+ accounts. DeFi swaps across multiple pools require this.
  how_to_do_right: 'Create Address Lookup Tables with frequently-used addresses (program IDs, well-known accounts). Use VersionedTransaction
    with v0 messages. Reference ALT addresses by index. Note: ALTs need 1 slot to activate after creation.'
  severity: medium
  technologies:
    platform: [solana]
  domains:
    domain: [architecture, blockchain, performance]
  example_good: "// Create ALT with common addresses\nconst [lookupTableInst, lookupTableAddress] =\n    AddressLookupTableProgram.createLookupTable({\n\
    \        authority: payer.publicKey,\n        payer: payer.publicKey,\n        recentSlot: await connection.getSlot(),\n\
    \    });\n\n// Extend with frequently-used addresses\nconst extendInst = AddressLookupTableProgram.extendLookupTable({\n\
    \    payer: payer.publicKey,\n    authority: payer.publicKey,\n    lookupTable: lookupTableAddress,\n    addresses: [TOKEN_PROGRAM_ID,\
    \ ASSOCIATED_TOKEN_PROGRAM_ID, ...poolAddresses],\n});\n\n// Use in versioned transaction — addresses compressed to 1-byte\
    \ indices\nconst messageV0 = new TransactionMessage({\n    payerKey: payer.publicKey,\n    recentBlockhash,\n    instructions:\
    \ [swapInstruction],\n}).compileToV0Message([lookupTableAccount]);\n"
  example_bad: '// Legacy transaction — every address is full 32 bytes

    // Can''t fit complex DeFi operations (20+ accounts)

    const tx = new Transaction().add(complexSwapInstruction);

    // Error: Transaction too large

    '
  when_applies: Projects using Solana blockchain
  when_not_applies: traditional web2 applications, centralized systems. projects not using Solana
  sources: ["https://solana.com/docs/advanced/lookup-tables"]
- id: CR-SOL-TEST-001
  text: Use Bankrun for fast local testing and program-test for BPF-level integration tests.
  why: Running a local validator (solana-test-validator) for tests is slow — each test takes seconds to start. Bankrun emulates
    the runtime in-process, running tests 100x faster. program-test compiles your program to BPF and runs it in an emulated
    environment, catching BPF-specific issues (stack size, compute limits) that unit tests miss.
  how_to_do_right: Use Bankrun (or solana-program-test in Rust) for most tests. Use local validator only for E2E tests involving
    multiple programs. Test CPI interactions, compute unit consumption, and error paths. Mock external programs when testing
    in isolation.
  severity: medium
  technologies:
    lang: [rust]
    library: [anchor]
    platform: [solana]
  domains:
    domain: [architecture, blockchain, testing]
  example_good: "// Rust: program-test for BPF integration test\n#[tokio::test]\nasync fn test_deposit() {\n    let program_id\
    \ = Pubkey::new_unique();\n    let mut context = ProgramTest::new(\"my_program\", program_id, None)\n        .start_with_context()\n\
    \        .await;\n\n    // Create accounts, send transaction\n    let vault = Keypair::new();\n    let tx = Transaction::new_signed_with_payer(\n\
    \        &[deposit_instruction(vault.pubkey(), 1_000_000)],\n        Some(&context.payer.pubkey()),\n        &[&context.payer,\
