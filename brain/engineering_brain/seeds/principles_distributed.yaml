    Document these tiers in a runbook accessible during incidents.
    2. Implement feature flags or degradation switches for every Tier 2 and Tier 3 feature. These switches
    must be operable in seconds (not minutes) during an incident — a feature flag service like LaunchDarkly
    or a simple Redis-backed toggle. Automate degradation triggers based on system health metrics.
    3. Design fallback responses for every external dependency: cached data (serve the last known good
    response), default data (generic "Top 10" list), simplified computation (rules-based instead of ML-based),
