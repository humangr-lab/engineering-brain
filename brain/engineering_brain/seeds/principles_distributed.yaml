- id: P-REL-CHAOS
  name: Test Failure Modes Before They Test You
  why: |
    Traditional testing verifies that the system works correctly under ideal conditions. But distributed
    systems do not fail under ideal conditions — they fail when a network partition coincides with a
    deployment, when a disk fills up on the busiest node, when a DNS resolver starts returning stale results.
    These failure modes are nearly impossible to predict through code review or unit testing because they
    emerge from the interaction of components, not from bugs in individual components. Chaos engineering,
    pioneered by Netflix's Chaos Monkey and formalized in the "Principles of Chaos Engineering," is the
    discipline of proactively injecting failures into production systems to discover weaknesses before they
    cause outages. The process is scientific: form a hypothesis ("if we kill one instance, the load balancer
    routes around it within 5 seconds"), run the experiment in production, observe the results, and fix any
    deviations from the hypothesis. Netflix expanded this to Chaos Kong (simulating entire region failures),
    Latency Monkey (injecting artificial delays), and Conformity Monkey (finding instances that do not adhere
    to best practices). The key insight is that confidence in a system's resilience can only come from
    empirical evidence, not from architectural diagrams. A system that has never been tested under failure
    conditions is a system whose failure behavior is unknown. And unknown failure behavior in production
    is a guaranteed surprise at the worst possible time. Organizations that practice chaos engineering
    consistently report faster incident recovery, fewer severity-1 incidents, and higher engineer confidence
    in deployments.
  how_to_apply: |
    1. Start small and in non-production environments. Inject a single instance failure in staging, verify
    that the system recovers automatically, and measure recovery time. Only move to production chaos
    experiments after demonstrating control in staging.
    2. Define steady-state metrics before each experiment: request success rate, p99 latency, error rate,
    and business metrics (orders per minute, sign-ups per hour). These metrics define "normal" and any
    deviation during the experiment indicates a resilience gap.
    3. Use established chaos engineering tools: Chaos Monkey (random instance termination), Litmus Chaos
    (Kubernetes-native), Gremlin (commercial, broad fault injection), Toxiproxy (network fault injection),
    or AWS Fault Injection Simulator. Start with instance termination, then progress to network partitions,
    latency injection, and dependency failures.
    4. Run experiments during business hours when the team is alert and can respond, not on Friday at 5 PM.
    Always have a kill switch to immediately halt the experiment if impact exceeds the blast radius.
    5. After each experiment, document findings in a chaos report: hypothesis, actual behavior, gaps found,
    and remediation actions. Track remediation to completion — a chaos experiment that finds a gap but does
    not fix it is worse than no experiment at all, because it creates false confidence.
    6. Gradually increase scope: single instance -> multiple instances -> entire AZ -> cross-region failover
    -> dependency failures -> cascading failure scenarios. Each level builds on confidence from the previous.
  mental_model: >-
    Fire drill — you do not wait for a real fire to discover that the emergency exit is blocked. You practice regularly so
    that when the real emergency happens, the response is automatic.
  domains:
    domain:
    - reliability
    - testing
    - operations
    - distributed
    concern:
    - resilience
    - fault_tolerance
  violation_consequence: >-
    Without chaos testing, failure modes are discovered during real incidents — at 3 AM, under peak load, with customers watching.
    Recovery is slow because the team has never practiced. The post-mortem reveals that the failover mechanism was broken
    for months but nobody knew because it was never tested.
  teaching_example: >-
    Netflix runs Chaos Kong, which simulates the failure of an entire AWS region. During one exercise, they discovered that
    a critical metadata service did not properly failover cross-region. They fixed it in a controlled setting. Six months
    later, AWS us-east-1 had a real outage, and Netflix's failover worked flawlessly while competitors experienced hours of
    downtime.
  when_applies: >-
    Any production system where availability matters, especially systems with redundancy and failover mechanisms that have
    never been exercised under real conditions.
  when_not_applies: >-
    Early-stage prototypes where the system is still being designed, or systems where the cost of any disruption (even controlled)
    is unacceptable and resilience is validated through other means.
  sources:
  - https://principlesofchaos.org/
  text: >-
    Test Failure Modes Before They Test You: Fire drill — you do not wait for a real fire to discover that the emergency exit
    is blocked.
  severity: high
  technologies:
    lang:
    - python
  how_to_do_right: |-
    1. Start small and in non-production environments. Inject a single instance failure in staging, verify
    that the system recovers automatically, and measure recovery time. Only move to production chaos
    experiments after demonstrating control in staging.
    2. Define steady-state metrics before each experiment: request success rate, p99 latency, error rate,
    and business metrics (orders per minute, sign-ups per hour). These metrics define "normal" and any
    deviation during the experiment indicates a resilience gap.
    3. Use established chaos engineering tools: Chaos Monkey (random instance termination), Litmus Chaos
    (Kubernetes-native), Gremlin (commercial, broad fault injection), Toxiproxy (network fault injection),
    or AWS Fault Injection Simulator. Start with instance termination, then progress to network partitions,
    latency injection, and dependency failures.
    4. Run experiments during business hours when the team is alert and can respond, not on Friday at 5 PM.
    Always have a kill switch to immediately halt the experiment if impact exceeds the blast radius.
    5. After each experiment, document findings in a chaos report: hypothesis, actual behavior, gaps found,
    and remediation actions. Track remediation to completion — a chaos experiment that finds a gap but does
    not fix it is worse than no experiment at all, because it creates false confidence.
    6. Gradually increase scope: single instance -> multiple instances -> entire AZ -> cross-region failover
    -> dependency failures -> cascading failure scenarios. Each level builds on confidence from the previous.
  example_good: |-
    # Netflix runs Chaos Kong, which simulates the failure of an entire AWS region.
    # During one exercise, they discovered that a critical metadata service did not properly failover cross-region.
    # They fixed it in a controlled setting.
    # Six months later, AWS us-east-1 had a real outage, and Netflix's failover worked flawlessly while competitors experienced hours of downtime.
  example_bad: |-
    # Anti-pattern: Violating Test Failure Modes Before They Test You
    # Result: Without chaos testing
    # Result: failure modes are discovered during real incidents — at 3 AM
- id: P-REL-BLAST-RADIUS
  name: Contain Failures to the Smallest Scope
  why: |
    In a monolithic system, a single unhandled exception can crash the entire process, taking down every
    feature for every user. In distributed systems, the equivalent is a failure that propagates across service
    boundaries — a cascading failure. Blast radius containment is the practice of designing architectural
    boundaries so that a failure in one component affects the smallest possible set of users, features, or
    data. This principle operates at multiple levels. At the infrastructure level, deploying across multiple
    availability zones ensures that an AZ failure affects only 1/N of capacity. At the application level,
    bulkhead patterns (named after watertight compartments in ships) isolate critical and non-critical
    workloads into separate thread pools, connection pools, or even separate processes. At the data level,
    sharding ensures that a corrupted shard affects only the users assigned to that shard, not the entire
    user base. At the deployment level, canary deployments and feature flags ensure that a bad release
    affects only 1% of traffic before it is detected and rolled back. AWS practices this religiously with
    their cell-based architecture: each "cell" serves a subset of customers, and a failure in one cell
    cannot propagate to others. This is why an AWS outage might affect some customers in a region but
    rarely all of them. The key insight is that blast radius must be designed in advance — once a failure
    starts cascading, it is too late to contain it. Every architectural boundary (service boundary, AZ
    boundary, shard boundary, deployment boundary) is a potential firewall that stops failure propagation,
    but only if the boundary is properly sealed against cascading effects like retry storms, connection
    pool exhaustion, and shared dependency failures.
  how_to_apply: |
    1. Identify failure domains in your architecture: each microservice, each database, each message queue,
    each external dependency. For each domain, answer: "If this component fails completely, what is the
    maximum impact?" If the answer is "everything," the blast radius is too large.
    2. Implement bulkheads for shared resources. Separate thread pools for critical and non-critical request
    paths. Separate connection pools for different downstream services. Separate Kubernetes namespaces or
    node pools for different workload tiers.
    3. Use cell-based architecture for large-scale services. Partition users into cells (e.g., by user ID
    hash), and each cell is independently deployable and independently failable. A cell failure affects only
    the users in that cell, not the entire service.
    4. Deploy changes gradually: canary deployments (1% -> 5% -> 25% -> 100%) with automated rollback on
    metric regression. Feature flags to control rollout per-user-segment. Blue-green deployments for
    zero-downtime cutover with instant rollback capability.
    5. Set timeout, retry, and circuit breaker policies per dependency to prevent a slow dependency from
    consuming shared resources. Each dependency gets its own circuit breaker with independent thresholds.
  mental_model: >-
    Watertight compartments in a ship — when the Titanic hit an iceberg, water flooded several compartments. Modern ships
    have better bulkheads: flooding one compartment does not sink the ship because the water cannot spread to other compartments.
  domains:
    domain:
    - distributed
    - reliability
    - architecture
    concern:
    - fault_tolerance
    - deployment
  violation_consequence: >-
    Without blast radius containment, a single bad deployment, data corruption, or service failure takes down the entire system
    for all users. A bug in the notification service crashes the shared application server, taking down authentication, payments,
    and everything else.
  teaching_example: >-
    A SaaS platform deploys a new feature to 100% of users simultaneously. The feature has a memory leak that causes OOM kills
    after 30 minutes. Every instance crashes within a 5-minute window. With canary deployment (1% first), the leak would be
    detected in one instance, affecting 1% of users, and automatically rolled back.
  when_applies: >-
    Any system serving multiple users or features where a failure in one area should not affect others — production services,
    multi-tenant platforms, systems with mixed criticality workloads.
  when_not_applies: >-
    Single-purpose systems where the entire system is one indivisible function, or development environments where failure
    isolation adds complexity without benefit.
  sources:
  - https://docs.aws.amazon.com/wellarchitected/latest/reliability-pillar/use-fault-isolation-to-protect-your-workload.html
  text: >-
    Contain Failures to the Smallest Scope: Watertight compartments in a ship — when the Titanic hit an iceberg, water flooded
    several compartments.
  severity: critical
  technologies:
    lang:
    - python
  how_to_do_right: |-
    1. Identify failure domains in your architecture: each microservice, each database, each message queue,
    each external dependency. For each domain, answer: "If this component fails completely, what is the
    maximum impact?" If the answer is "everything," the blast radius is too large.
    2. Implement bulkheads for shared resources. Separate thread pools for critical and non-critical request
    paths. Separate connection pools for different downstream services. Separate Kubernetes namespaces or
    node pools for different workload tiers.
    3. Use cell-based architecture for large-scale services. Partition users into cells (e.g., by user ID
    hash), and each cell is independently deployable and independently failable. A cell failure affects only
    the users in that cell, not the entire service.
    4. Deploy changes gradually: canary deployments (1% -> 5% -> 25% -> 100%) with automated rollback on
    metric regression. Feature flags to control rollout per-user-segment. Blue-green deployments for
    zero-downtime cutover with instant rollback capability.
    5. Set timeout, retry, and circuit breaker policies per dependency to prevent a slow dependency from
    consuming shared resources. Each dependency gets its own circuit breaker with independent thresholds.
  example_good: |-
    # A SaaS platform deploys a new feature to 100% of users simultaneously.
    # The feature has a memory leak that causes OOM kills after 30 minutes.
    # Every instance crashes within a 5-minute window.
    # With canary deployment (1% first), the leak would be detected in one instance, affecting 1% of users, and automatically rolled back.
  example_bad: |-
    # Anti-pattern: Violating Contain Failures to the Smallest Scope
    # Result: Without blast radius containment
    # Result: a single bad deployment
- id: P-SCALE-HORIZONTAL
  name: Design for Horizontal Scaling from Day One
  why: |
    Vertical scaling (bigger machines) has a hard ceiling: the largest EC2 instance has 448 vCPUs and 24 TB
    of RAM, and it costs $100+/hour. More importantly, vertical scaling provides zero redundancy — one big
    machine is still a single point of failure. Horizontal scaling (more machines) has no theoretical ceiling
    and inherently provides redundancy: losing one of 10 instances means 10% capacity loss, not 100%.
    However, horizontal scaling only works if the application is designed for it. Stateless services scale
    horizontally by default — add more instances behind a load balancer and throughput increases linearly.
    Stateful components (databases, caches, session stores) require explicit design for horizontal scaling:
    sharding, replication, and consensus protocols. The critical design decision is separating state from
    compute early in the architecture. If user sessions are stored in application memory, scaling horizontally
    means losing sessions when instances are added or removed. If sessions are stored in Redis, any instance
    can serve any user. If file uploads are stored on local disk, scaling horizontally means files are only
    available on one instance. If uploads go to S3, any instance can serve any file. Every piece of local
    state is a barrier to horizontal scaling, and retrofitting statelessness into a stateful application is
    one of the most expensive refactoring efforts in software engineering. The cost of designing for
    horizontal scaling from day one is minimal — externalize state to Redis/S3/database, use load-balanced
    connection pools, avoid machine-specific assumptions. The cost of retrofitting is months of engineering
    time and significant risk of data loss during migration.
  how_to_apply: |
    1. Make application instances stateless. Store session data in Redis or a distributed cache, not in
    application memory. Store file uploads in object storage (S3, GCS), not on local disk. Store user
    preferences in the database, not in config files. Any instance should be able to serve any request.
    2. Use load balancers with health checks for all service-to-service communication. Kubernetes Services,
    AWS ALB, or Envoy provide automatic traffic distribution and instance health monitoring. Never hardcode
    instance addresses.
    3. Design database schemas for eventual sharding. Use UUIDs instead of auto-increment IDs (auto-increment
    requires coordination across shards). Avoid cross-shard joins by denormalizing data that is accessed
    together. Include the shard key in every query.
    4. Implement auto-scaling based on meaningful metrics: CPU utilization, request queue depth, or custom
    business metrics (orders per second). Set scale-up thresholds aggressively (70% CPU) and scale-down
    thresholds conservatively (30% CPU with a cooldown period) to handle traffic spikes without oscillation.
    5. Test horizontal scaling regularly: add instances under load and verify that throughput increases
    proportionally. If doubling instances does not roughly double throughput, there is a bottleneck —
    typically a shared database, a lock, or a single-threaded component.
  mental_model: >-
    Restaurant kitchen — when orders increase, you add more cooks (horizontal), not one giant cook (vertical). Each cook works
    independently with shared access to the pantry (external state), and any cook can prepare any dish.
  domains:
    domain:
    - distributed
    - architecture
    - performance
    concern:
    - scalability
  violation_consequence: >-
    Stateful application instances cannot scale horizontally without data loss or inconsistency. When traffic doubles, the
    only option is a bigger (and more expensive) machine, which takes downtime to provision and still has a ceiling. Sticky
    sessions create hot spots and make deployments disruptive.
  teaching_example: >-
    A web application stores user sessions in memory and uploaded files on local disk. To handle Black Friday traffic, they
    need 10x capacity. But adding instances means users lose their sessions when routed to a new instance, and uploaded files
    are only accessible from the instance that received them. The entire architecture must be rewritten under time pressure.
  when_applies: >-
    Any service that may need to handle growing traffic, any cloud-deployed application, any service where availability requires
    multiple instances.
  when_not_applies: >-
    Embedded systems with fixed hardware, single-user desktop applications, or batch processing jobs that are inherently single-machine
    and complete within acceptable time.
  sources:
  - https://12factor.net/concurrency
  text: >-
    Design for Horizontal Scaling from Day One: Restaurant kitchen — when orders increase, you add more cooks (horizontal),
    not one giant cook (vertical).
  severity: critical
  technologies:
    lang:
    - python
  how_to_do_right: |-
    1. Make application instances stateless. Store session data in Redis or a distributed cache, not in
    application memory. Store file uploads in object storage (S3, GCS), not on local disk. Store user
    preferences in the database, not in config files. Any instance should be able to serve any request.
    2. Use load balancers with health checks for all service-to-service communication. Kubernetes Services,
    AWS ALB, or Envoy provide automatic traffic distribution and instance health monitoring. Never hardcode
    instance addresses.
    3. Design database schemas for eventual sharding. Use UUIDs instead of auto-increment IDs (auto-increment
    requires coordination across shards). Avoid cross-shard joins by denormalizing data that is accessed
    together. Include the shard key in every query.
    4. Implement auto-scaling based on meaningful metrics: CPU utilization, request queue depth, or custom
    business metrics (orders per second). Set scale-up thresholds aggressively (70% CPU) and scale-down
