  example_good: |-
    # A logging pipeline ingests 100K events/sec but the Elasticsearch cluster can only index 50K/sec.
    # Without backpressure, the Kafka consumer lag grows by 50K/sec.
    # Within an hour, there is a 180M event backlog.
    # Logs arrive 1 hour late, alerting is useless, and the consumer OOMs trying to batch-process the backlog.
  example_bad: |-
    # Anti-pattern: Violating Backpressure Over Unbounded Queues
    # Result: Unbounded queues lead to monotonically increasing memory usage
    # Result: growing latency (new messages wait behind a backlog of thousands)
- id: P-REL-REDUNDANCY
  name: Redundancy at Every Layer
  why: |
    A single point of failure (SPOF) is a component whose failure causes the entire system to fail. In
    distributed systems, the question is not whether a component will fail but when. Hard drives have a
    1-4% annual failure rate. Network switches fail. Data centers lose power. Cloud availability zones
    experience outages — AWS us-east-1 has had multiple multi-hour outages affecting thousands of customers.
    Redundancy is the practice of duplicating critical components so that when one fails, another takes over.
    This applies at every layer: compute (multiple application instances behind a load balancer), storage
    (replicated databases, RAID, multi-AZ), networking (redundant switches, multiple ISPs, anycast DNS), and
    even organizational (no single person who is the only one who knows how a system works). The key principle
    is N+1 redundancy at minimum: for every N components needed to serve traffic, deploy N+1. For critical
    systems, N+2 provides resilience against simultaneous failures. AWS's multi-AZ deployments exemplify this:
    RDS Multi-AZ maintains a synchronous standby in a different availability zone, and failover happens
    automatically within 60-120 seconds. S3 achieves 99.999999999% durability by replicating objects across
    multiple facilities. But redundancy without automatic failover is just expensive standby. The standby must
    be tested regularly — an untested failover mechanism is not a failover mechanism, it is a hope. Netflix's
    Chaos Monkey validates this by randomly terminating instances in production, ensuring that redundancy
    actually works when needed. The cost of redundancy is real (2x or 3x infrastructure), but the cost of
    downtime — lost revenue, damaged reputation, SLA penalties — almost always exceeds it for any
    production system that matters.
  how_to_apply: |
    1. Inventory every component in your system and classify it as redundant or SPOF. For each SPOF, design
    a redundancy strategy: active-active (all replicas serve traffic), active-passive (standby takes over on
    failure), or active-active-passive (N active + 1 standby).
    2. Deploy compute across multiple availability zones. Use auto-scaling groups with a minimum of 2
    instances in different AZs. The load balancer health check must detect unhealthy instances within seconds
    and stop routing traffic to them.
    3. Replicate data stores synchronously for zero RPO (Recovery Point Objective) or asynchronously for near-
    zero RPO with better write performance. PostgreSQL streaming replication, MongoDB replica sets, and Redis
    Sentinel all provide automatic failover. Test failover monthly by killing the primary.
    4. Eliminate single points of failure in networking: multiple NAT gateways, redundant load balancers,
    DNS with health checks (Route 53 failover routing), and CDN as a buffer against origin failures.
    5. Document and automate failover procedures. Manual failover at 3 AM by a sleep-deprived engineer is
    not a plan — it is a liability. Every failover must be a single command or, better, fully automatic
    with human notification after the fact.
  mental_model: >-
    Airplane engines — a twin-engine aircraft can fly safely on one engine. The redundancy is designed in from the start,
    tested regularly, and the crew trains for single-engine operation before they ever need it in a real emergency.
  domains:
    domain:
    - distributed
    - reliability
    - architecture
    - operations
    concern:
    - availability
    - fault_tolerance
  violation_consequence: >-
    A single failed component takes down the entire system. Database server crashes at 2 AM with no replica means complete
    outage until manual recovery. A single load balancer failure means zero traffic reaches healthy backends. Every SPOF is
    a ticking clock.
  teaching_example: >-
    A startup runs their entire platform on a single RDS instance with no read replica and no Multi-AZ. The underlying hardware
    fails at peak traffic on Black Friday. Recovery takes 4 hours (restore from backup), during which the site is completely
    down. Total cost: $200K in lost sales. Multi-AZ would have cost $150/month.
  when_applies: >-
    Any production system where downtime has a business cost — user-facing services, data stores, networking infrastructure,
    CI/CD pipelines, monitoring systems.
  when_not_applies: >-
    Development environments, local tooling, throwaway prototypes, or systems where the cost of redundancy genuinely exceeds
    the cost of downtime (rare in practice).
  sources:
  - https://sre.google/sre-book/eliminating-toil/
  text: 'Redundancy at Every Layer: Airplane engines — a twin-engine aircraft can fly safely on one engine.'
  severity: high
  technologies:
    lang:
    - python
  how_to_do_right: |-
    1. Inventory every component in your system and classify it as redundant or SPOF. For each SPOF, design
    a redundancy strategy: active-active (all replicas serve traffic), active-passive (standby takes over on
    failure), or active-active-passive (N active + 1 standby).
    2. Deploy compute across multiple availability zones. Use auto-scaling groups with a minimum of 2
    instances in different AZs. The load balancer health check must detect unhealthy instances within seconds
    and stop routing traffic to them.
    3. Replicate data stores synchronously for zero RPO (Recovery Point Objective) or asynchronously for near-
    zero RPO with better write performance. PostgreSQL streaming replication, MongoDB replica sets, and Redis
    Sentinel all provide automatic failover. Test failover monthly by killing the primary.
    4. Eliminate single points of failure in networking: multiple NAT gateways, redundant load balancers,
    DNS with health checks (Route 53 failover routing), and CDN as a buffer against origin failures.
    5. Document and automate failover procedures. Manual failover at 3 AM by a sleep-deprived engineer is
    not a plan — it is a liability. Every failover must be a single command or, better, fully automatic
    with human notification after the fact.
  example_good: |-
    # A startup runs their entire platform on a single RDS instance with no read replica and no Multi-AZ.
    # The underlying hardware fails at peak traffic on Black Friday.
    # Recovery takes 4 hours (restore from backup), during which the site is completely down.
    # Total cost: $200K in lost sales.
  example_bad: |-
    # Anti-pattern: Violating Redundancy at Every Layer
    # Result: A single failed component takes down the entire system. Database server crashes at 2 AM with no replica means complete outage until manual recovery. A single load balancer failure means zero traffic reaches healthy backends. Every SPOF is a ticking clock.
- id: P-REL-GRACEFUL-DEGRADE
  name: Degrade Functionality, Never Availability
  why: |
    When a system is under stress — a dependency is down, traffic spikes beyond capacity, or a subsystem is
    degraded — the worst response is to fail entirely. Users who see a blank page or a connection timeout lose
    trust and leave. Users who see a slightly reduced experience (cached data instead of real-time, simplified
    UI instead of full features, generic recommendations instead of personalized ones) often do not even
    notice the degradation. Graceful degradation is the practice of shedding non-essential functionality to
    preserve core functionality. Netflix pioneered this approach: when their personalization service is down,
    users see a generic "Top 10" list instead of personalized recommendations. The streaming experience
    continues uninterrupted. Amazon's product pages degrade similarly: if the review service is slow, the
    product page loads without reviews rather than waiting (and timing out) for them. The key architectural
    decision is defining what is essential and what is non-essential for each user journey BEFORE a failure
    occurs. This requires explicit feature priority tiers: Tier 0 (must work — authentication, core
    transaction flow), Tier 1 (should work — search, navigation), Tier 2 (nice to have — recommendations,
    analytics, personalization), and Tier 3 (expendable under load — A/B tests, non-critical logging). During
    degradation, tiers are shed from lowest to highest. This prioritization must be decided by product and
    engineering together, encoded in configuration, and tested in chaos engineering exercises. A system that
    has never practiced degradation will not degrade gracefully when it needs to — it will degrade chaotically.
  how_to_apply: |
    1. Define feature priority tiers with product stakeholders. Tier 0: authentication, core transaction flow
    (checkout, payment). Tier 1: search, navigation, account management. Tier 2: recommendations,
    personalization, reviews, analytics. Tier 3: A/B tests, non-critical logging, experimental features.
    Document these tiers in a runbook accessible during incidents.
    2. Implement feature flags or degradation switches for every Tier 2 and Tier 3 feature. These switches
    must be operable in seconds (not minutes) during an incident — a feature flag service like LaunchDarkly
    or a simple Redis-backed toggle. Automate degradation triggers based on system health metrics.
    3. Design fallback responses for every external dependency: cached data (serve the last known good
    response), default data (generic "Top 10" list), simplified computation (rules-based instead of ML-based),
    or honest omission (show the page without the component, with a "temporarily unavailable" note).
    4. Test degradation regularly. In chaos engineering exercises, disable Tier 2 and Tier 3 features and
    verify that core user journeys still complete successfully. Measure the user experience delta — if users
    cannot tell the difference, your degradation strategy is excellent.
    5. Implement load shedding at the API gateway level. Under extreme load, return HTTP 503 with Retry-After
    for Tier 3 endpoints while continuing to serve Tier 0 and Tier 1 endpoints at full capacity.
  mental_model: >-
    Airplane in an emergency — the pilot sheds non-essential systems (entertainment, galley power, cabin lights) to preserve
    the essential ones (engines, flight controls, hydraulics). The plane keeps flying, just without movies.
  domains:
    domain:
    - distributed
    - reliability
    - architecture
    - ui
    concern:
    - availability
    - resilience
    - ux
  violation_consequence: >-
    Without graceful degradation, a non-critical dependency failure (recommendation engine, analytics service) takes down
    the entire user experience. Users see error pages instead of a slightly reduced but functional application. Revenue loss
    is total rather than marginal.
  teaching_example: >-
    Twitter's fail whale was the opposite of graceful degradation — when any backend service was overloaded, the entire site
    showed an error page. Modern Twitter degrades gracefully: if the trending topics service is down, the sidebar shows cached
    trends; if the notification service is slow, notifications simply do not update in real-time.
  when_applies: >-
    Any user-facing system with multiple features or dependencies, especially when some features are significantly more critical
    than others.
  when_not_applies: >-
    Systems with a single indivisible function where partial operation is meaningless, or backend batch systems where partial
    results are worse than no results.
  sources:
  - https://sre.google/sre-book/addressing-cascading-failures/
