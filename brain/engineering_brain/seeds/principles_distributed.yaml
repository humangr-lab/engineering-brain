- id: P-SCALE-SHARD
  name: Shard by Access Pattern, Re-shard by Growth
  why: |
    A single database instance has finite capacity: connection limits, I/O throughput, storage size, and CPU
    for query processing. Sharding distributes data across multiple database instances, each holding a subset
    of the total dataset. The critical decision is the shard key — the attribute that determines which shard
    holds each record. A good shard key distributes data evenly (no hot shards), co-locates data that is
    accessed together (minimizing cross-shard queries), and aligns with the application's primary access
    pattern. For a multi-tenant SaaS, tenant_id is often the ideal shard key: all of a tenant's data lives
    on one shard, queries never need to cross shards, and tenants are naturally distributed. For a social
    network, user_id works similarly. For a time-series database, time range sharding ensures that recent
    (hot) data is on fast storage and old (cold) data is on cheap storage. The worst shard key creates hot
    spots — sharding by country puts 40% of data on the US shard, or sharding by first letter puts 15% on
    the S shard. Instagram learned this lesson: they initially sharded by user_id but needed to support
    queries by photo_id, which required a secondary index mapping photo_id to user_id shard. The second
    critical decision is re-sharding strategy. Data grows, access patterns shift, and the initial shard
    count becomes insufficient. Re-sharding (splitting or rebalancing shards) must be possible online,
    without downtime. Vitess, CockroachDB, and DynamoDB handle this automatically; manual sharding requires
    careful planning for the inevitable re-shard event. Design the shard key to be immutable and include
    it in every query to avoid scatter-gather operations.
  how_to_apply: |
    1. Identify the primary access pattern for your data. If 90% of queries filter by tenant_id, shard by
    tenant_id. If 90% of queries filter by date range, shard by time. The shard key must appear in every
    query to avoid scatter-gather (querying all shards).
    2. Validate shard key distribution before deploying. Histogram the shard key values across your dataset —
    if any shard would hold more than 2x the average, choose a different key or use composite keys
    (tenant_id + hash) to distribute hot tenants across multiple shards.
    3. Start with logical sharding (application-level routing) before physical sharding (separate database
    instances). Logical sharding means the application includes the shard key in queries and a routing
    layer directs to the correct schema/table. This is simpler to manage and can be promoted to physical
    sharding when a single instance reaches its limits.
    4. Plan for re-sharding from day one. Use consistent hashing (like DynamoDB or Cassandra) to minimize
    data movement when adding shards. If using range-based sharding, design ranges to be splittable.
    Never assume the initial shard count will be sufficient forever.
    5. Build cross-shard query support for the rare queries that need it: scatter-gather with merge, or
    maintain a global index for secondary access patterns. Accept that cross-shard queries will be slower
    and design the application to minimize them.
    6. Monitor per-shard metrics: query latency, storage usage, connection count, and throughput. Alert when
    any shard deviates significantly from the average — this indicates a hot shard that needs splitting.
  mental_model: >-
    Library card catalog organized by subject — if most people search by subject, organizing by subject means one catalog
    drawer per section. If the Science section overflows, you split it into Physics, Chemistry, and Biology — re-sharding
    by growth.
  domains:
    domain:
    - distributed
    - database
    - architecture
    - performance
    concern:
    - scalability
    - data_management
  violation_consequence: >-
    A poor shard key creates hot shards that bottleneck the entire system while other shards sit idle. Scatter-gather queries
    that hit all shards negate the performance benefits of sharding. Inability to re-shard means the system hits a wall when
    data outgrows the initial design.
  teaching_example: >-
    A SaaS platform shards by company_name first letter. Companies starting with 'S' (Samsung, Salesforce, SAP, Spotify) all
    land on the same shard, which handles 3x the load of average shards. Re-sharding by company_id hash distributes load evenly
    and eliminates the hot shard.
  when_applies: >-
    Any database that will grow beyond a single instance's capacity, multi-tenant systems, high-throughput OLTP systems, time-series
    data stores.
  when_not_applies: >-
    Small datasets that fit comfortably on a single instance, read-heavy workloads better served by read replicas, or systems
    using databases with built-in automatic sharding (CockroachDB, Spanner).
  sources:
  - https://www.mongodb.com/docs/manual/sharding/
  text: >-
    Shard by Access Pattern, Re-shard by Growth: Library card catalog organized by subject — if most people search by subject,
    organizing by subject means one catalog drawer per section.
  severity: medium
  technologies:
    lang:
    - python
  how_to_do_right: |-
    1. Identify the primary access pattern for your data. If 90% of queries filter by tenant_id, shard by
    tenant_id. If 90% of queries filter by date range, shard by time. The shard key must appear in every
    query to avoid scatter-gather (querying all shards).
    2. Validate shard key distribution before deploying. Histogram the shard key values across your dataset —
    if any shard would hold more than 2x the average, choose a different key or use composite keys
    (tenant_id + hash) to distribute hot tenants across multiple shards.
    3. Start with logical sharding (application-level routing) before physical sharding (separate database
    instances). Logical sharding means the application includes the shard key in queries and a routing
    layer directs to the correct schema/table. This is simpler to manage and can be promoted to physical
    sharding when a single instance reaches its limits.
    4. Plan for re-sharding from day one. Use consistent hashing (like DynamoDB or Cassandra) to minimize
    data movement when adding shards. If using range-based sharding, design ranges to be splittable.
    Never assume the initial shard count will be sufficient forever.
    5. Build cross-shard query support for the rare queries that need it: scatter-gather with merge, or
    maintain a global index for secondary access patterns. Accept that cross-shard queries will be slower
    and design the application to minimize them.
    6. Monitor per-shard metrics: query latency, storage usage, connection count, and throughput. Alert when
    any shard deviates significantly from the average — this indicates a hot shard that needs splitting.
  example_good: |-
    # A SaaS platform shards by company_name first letter.
    # Companies starting with 'S' (Samsung, Salesforce, SAP, Spotify) all land on the same shard, which handles 3x the load of average shards.
    # Re-sharding by company_id hash distributes load evenly and eliminates the hot shard.
  example_bad: |-
    # Anti-pattern: Violating Shard by Access Pattern, Re-shard by Growth
    # Result: A poor shard key creates hot shards that bottleneck the entire system while other shards sit idle. Scatter-gather queries that hit all shards negate the performance benefits of sharding. Inability to re-shard means the system hits a wall when data outgrows the initial design.
- id: P-SCALE-CQRS
  name: Separate Read and Write Models
  why: |
    In most applications, read and write workloads have fundamentally different characteristics. Writes need
    strong consistency, validation, and transactional guarantees. Reads need speed, flexible querying, and
    often tolerate slight staleness. A single data model optimized for writes (normalized, indexed for write
    throughput) is suboptimal for reads (denormalized, indexed for query patterns), and vice versa. CQRS
    (Command Query Responsibility Segregation), introduced by Greg Young and building on Bertrand Meyer's
    CQS principle, separates the write model (commands) from the read model (queries) into distinct data
    stores optimized for their respective workloads. The write side uses a normalized relational database
    with strong consistency and referential integrity. The read side uses denormalized views, materialized
    in read-optimized stores like Elasticsearch (full-text search), Redis (key-value lookups), or a
    denormalized read replica (complex queries). Changes on the write side are propagated to the read side
    via domain events, typically through a message broker. This separation provides three benefits. First,
    each model is independently scalable: read-heavy workloads scale the read store without affecting write
    throughput. Second, each model is independently optimizable: the read model can be denormalized,
    pre-computed, and cached aggressively without compromising write-side integrity. Third, the read model
    can evolve independently: adding a new query pattern means adding a new read projection, not changing
    the write schema. The trade-off is eventual consistency between write and read models (the read model
    lags behind the write model by the event propagation delay) and increased system complexity (two models,
    an event bus, and projection logic to maintain). CQRS is not appropriate for every system — it shines
    in systems with highly asymmetric read/write ratios (100:1 is common in user-facing applications) or
    where read and write models need fundamentally different data structures.
  how_to_apply: |
    1. Identify workloads where read and write patterns diverge significantly. A social media feed (writes
    are posts/likes/comments; reads are chronological timelines with aggregated engagement counts) is a
    classic CQRS candidate. A simple CRUD form where reads and writes use the same schema is not.
    2. Implement the write side as the source of truth: normalized schema, strong consistency, all business
    rule validation. Every mutation goes through the write model and produces a domain event (e.g.,
    OrderPlaced, PaymentProcessed, ItemShipped).
    3. Implement the read side as materialized projections: event handlers that consume domain events and
    update denormalized read stores. An OrderPlaced event updates the user's order history view, the
    admin's order dashboard view, and the analytics aggregate — three different projections from one event.
    4. Choose appropriate read stores for each query pattern: Elasticsearch for full-text search and
    filtering, Redis for low-latency key-value lookups, a denormalized PostgreSQL table for complex joins,
    or a pre-computed API response stored as JSON.
    5. Handle eventual consistency explicitly in the UI. After a user creates a post, optimistically display
    it immediately (client-side) while the event propagates to the read model. Use "read-your-writes"
    consistency where the user always sees their own recent changes, even if other users see them with a
    slight delay.
  mental_model: >-
    Restaurant menu vs kitchen inventory — the menu (read model) is optimized for customers to browse: pictures, descriptions,
    categories. The kitchen inventory (write model) is optimized for accuracy: quantities, expiration dates, supplier info.
    They serve different audiences with different needs.
  domains:
    domain:
    - distributed
    - architecture
    - database
    - performance
    concern:
    - scalability
    - design
  violation_consequence: >-
    A single model serving both reads and writes forces compromises in both directions. Write-optimized schemas require expensive
    joins for reads. Read-optimized denormalization complicates write validation. The database becomes the bottleneck as read
    and write workloads compete for the same resources.
  teaching_example: >-
    An e-commerce platform uses a single normalized database for product catalog reads and inventory writes. During a sale,
    read traffic (browsing products) increases 50x while write traffic (purchasing) increases 5x. The shared database's connection
    pool is exhausted by reads, causing write timeouts and failed purchases. With CQRS, reads hit a denormalized Elasticsearch
    index while writes hit the transactional database independently.
  when_applies: >-
    Systems with highly asymmetric read/write ratios, systems where read and write models need different data structures or
    storage engines, event-sourced systems where projections naturally emerge.
  when_not_applies: >-
    Simple CRUD applications where read and write schemas are identical, low-traffic systems where a single database handles
    both easily, or systems where eventual consistency between models is unacceptable.
  sources:
  - https://martinfowler.com/bliki/CQRS.html
  text: >-
    Separate Read and Write Models: Restaurant menu vs kitchen inventory — the menu (read model) is optimized for customers
    to browse: pictures, descriptions, categories.
  severity: critical
  technologies:
    lang:
    - python
  how_to_do_right: |-
    1. Identify workloads where read and write patterns diverge significantly. A social media feed (writes
    are posts/likes/comments; reads are chronological timelines with aggregated engagement counts) is a
    classic CQRS candidate. A simple CRUD form where reads and writes use the same schema is not.
    2. Implement the write side as the source of truth: normalized schema, strong consistency, all business
    rule validation. Every mutation goes through the write model and produces a domain event (e.g.,
    OrderPlaced, PaymentProcessed, ItemShipped).
    3. Implement the read side as materialized projections: event handlers that consume domain events and
    update denormalized read stores. An OrderPlaced event updates the user's order history view, the
    admin's order dashboard view, and the analytics aggregate — three different projections from one event.
    4. Choose appropriate read stores for each query pattern: Elasticsearch for full-text search and
    filtering, Redis for low-latency key-value lookups, a denormalized PostgreSQL table for complex joins,
    or a pre-computed API response stored as JSON.
    5. Handle eventual consistency explicitly in the UI. After a user creates a post, optimistically display
    it immediately (client-side) while the event propagates to the read model. Use "read-your-writes"
    consistency where the user always sees their own recent changes, even if other users see them with a
    slight delay.
  example_good: |-
    # An e-commerce platform uses a single normalized database for product catalog reads and inventory writes.
    # During a sale, read traffic (browsing products) increases 50x while write traffic (purchasing) increases 5x.
    # The shared database's connection pool is exhausted by reads, causing write timeouts and failed purchases.
    # With CQRS, reads hit a denormalized Elasticsearch index while writes hit the transactional database independently.
  example_bad: |-
    # Anti-pattern: Violating Separate Read and Write Models
    # Result: A single model serving both reads and writes forces compromises in both directions. Write-optimized schemas require expensive joins for reads. Read-optimized denormalization complicates write validation. The database becomes the bottleneck as read and write workloads compete for the same resources.
- id: P-MSG-IDEMPOTENT
  name: Every Message Handler Must Be Idempotent
  why: |
    In distributed messaging systems, messages can be delivered more than once. This is not a bug — it is a
    fundamental consequence of the at-least-once delivery guarantee that most message brokers provide. Kafka,
    SQS, RabbitMQ, and Redis Streams all guarantee that a message will be delivered at least once but cannot
    guarantee exactly-once delivery across system boundaries. Duplicate delivery occurs in several scenarios:
    the consumer processes the message but crashes before acknowledging it (the broker redelivers), a network
    partition causes the broker to lose the acknowledgment, or the consumer takes too long and the visibility
    timeout expires (SQS redelivers to another consumer). If a message handler is not idempotent — meaning
    processing the same message twice produces the same result as processing it once — duplicates cause real
    damage: double charges, duplicate records, incorrect counters, phantom inventory deductions. The at-most-
    once alternative (acknowledging before processing) risks losing messages entirely, which is worse than
    duplicates for most use cases. Exactly-once processing can be achieved at the application level through
    idempotency: store a unique message ID (or idempotency key) and check it before processing. If the ID
    exists, the message was already processed — skip it or return the previous result. This pattern is used
    by every payment processor (Stripe's Idempotency-Key header), every event-driven system (Kafka's
    idempotent producer), and every reliable message consumer. Idempotency is not just about duplicate
    detection — it is about making your system resilient to the fundamental unreliability of distributed
    communication. Design every handler as if every message will arrive twice, because eventually it will.
  how_to_apply: |
    1. Assign a globally unique idempotency key to every message at the producer. Use UUIDv7 (timestamp-
    sortable), or a deterministic key derived from the business operation (e.g., order_id + operation_type).
    Include this key in the message payload.
    2. Before processing a message, check if the idempotency key exists in a deduplication store (Redis with
    TTL, a database table, or a Bloom filter for probabilistic deduplication). If it exists, skip processing
    and return the stored result. If it does not exist, store the key and proceed.
    3. Use database UPSERT (INSERT ON CONFLICT DO UPDATE) instead of INSERT for all write operations triggered
    by messages. This makes the database operation itself idempotent — processing the same message twice
    produces the same database state.
    4. For side effects that cannot be made naturally idempotent (sending emails, calling external APIs),
    implement a deduplication check before triggering the side effect. Store a record of "email sent for
    order X" and check it before sending. External APIs should support idempotency keys (Stripe, PayPal).
    5. Set appropriate TTLs on idempotency keys. They need to survive long enough to cover the maximum
    redelivery window (e.g., SQS visibility timeout of 12 hours) but not forever. 24-72 hours covers most
    scenarios.
    6. Test idempotency explicitly: write tests that send the same message twice and verify that the system
    state is identical to processing it once. This should be a standard test pattern for every handler.
  mental_model: >-
    ATM deposit — if the ATM prints 'transaction complete' but you are not sure the screen updated correctly, you can insert
    the same check again. The system recognizes the duplicate deposit (same check number) and does not double-credit your
    account.
  domains:
    domain:
    - distributed
    - messaging
    - architecture
    - reliability
    concern:
    - message_processing
    - consistency
  violation_consequence: >-
    Non-idempotent handlers cause double charges to customers, duplicate records in databases, incorrect inventory counts,
    phantom notifications, and corrupted aggregate statistics. These bugs are intermittent (they only occur on redelivery),
    hard to reproduce, and often discovered by customers rather than monitoring.
  teaching_example: >-
    A payment handler deducts the user's balance on every message receipt. During a Kafka consumer rebalance, a batch of 50
    payment messages is redelivered. Without idempotency, 50 users are double-charged. With idempotency keys stored in Redis,
    the duplicate messages are detected and skipped — each user is charged exactly once.
  when_applies: >-
    Every message handler in every distributed system — this is not optional. Any handler that processes messages from a queue,
    topic, or stream must be idempotent.
  when_not_applies: >-
    In-process function calls where the caller guarantees single invocation, or read-only handlers that have no side effects
    (though even these benefit from deduplication to avoid wasted computation).
  sources:
  - https://stripe.com/docs/webhooks#handle-duplicate-events
  text: >-
    Every Message Handler Must Be Idempotent: ATM deposit — if the ATM prints 'transaction complete' but you are not sure
    the screen updated correctly, you can insert the same check again.
  severity: high
  technologies:
    lang:
    - python
    - sql
  how_to_do_right: |-
    1. Assign a globally unique idempotency key to every message at the producer. Use UUIDv7 (timestamp-
    sortable), or a deterministic key derived from the business operation (e.g., order_id + operation_type).
    Include this key in the message payload.
    2. Before processing a message, check if the idempotency key exists in a deduplication store (Redis with
    TTL, a database table, or a Bloom filter for probabilistic deduplication). If it exists, skip processing
    and return the stored result. If it does not exist, store the key and proceed.
    3. Use database UPSERT (INSERT ON CONFLICT DO UPDATE) instead of INSERT for all write operations triggered
    by messages. This makes the database operation itself idempotent — processing the same message twice
    produces the same database state.
    4. For side effects that cannot be made naturally idempotent (sending emails, calling external APIs),
    implement a deduplication check before triggering the side effect. Store a record of "email sent for
    order X" and check it before sending. External APIs should support idempotency keys (Stripe, PayPal).
    5. Set appropriate TTLs on idempotency keys. They need to survive long enough to cover the maximum
    redelivery window (e.g., SQS visibility timeout of 12 hours) but not forever. 24-72 hours covers most
    scenarios.
    6. Test idempotency explicitly: write tests that send the same message twice and verify that the system
    state is identical to processing it once. This should be a standard test pattern for every handler.
  example_good: |-
    # A payment handler deducts the user's balance on every message receipt.
    # During a Kafka consumer rebalance, a batch of 50 payment messages is redelivered.
    # Without idempotency, 50 users are double-charged.
    # With idempotency keys stored in Redis, the duplicate messages are detected and skipped — each user is charged exactly once.
  example_bad: |-
    # Anti-pattern: Violating Every Message Handler Must Be Idempotent
    # Result: Non-idempotent handlers cause double charges to customers
    # Result: duplicate records in databases
- id: P-MSG-DLQ
  name: Dead Letter Queues Are Your Safety Net
  why: |
    In any message processing system, some messages will fail. The message format might be invalid, a required
    downstream service might be permanently unavailable, or the message might contain data that triggers a
    bug in the handler. Without a dead letter queue (DLQ), these poison messages have two fates: they are
    retried infinitely (blocking the queue and preventing other messages from being processed) or they are
    silently dropped (data loss). Both outcomes are unacceptable. A DLQ is a separate queue where messages
    are sent after they have exhausted their retry attempts. The DLQ serves three critical functions. First,
    it prevents poison messages from blocking the main queue — after N retries (typically 3-5), the message
    is moved to the DLQ and the consumer continues processing other messages. Second, it preserves failed
    messages for investigation and reprocessing — engineers can examine the DLQ to understand why messages
    failed and fix the root cause. Third, it provides an audit trail of processing failures, enabling
    metrics like DLQ ingestion rate (a spike indicates a systemic problem), message age in DLQ (indicates
    how quickly failures are addressed), and DLQ depth trend (growing depth indicates unresolved issues).
    SQS has built-in DLQ support with configurable maxReceiveCount. Kafka achieves DLQ behavior through error
    topics. RabbitMQ supports dead letter exchanges. The DLQ must be monitored as aggressively as the primary
    queue. An unmonitored DLQ is a data graveyard — messages go in and never come out, and nobody notices
    until a customer reports missing transactions. Every message in the DLQ represents a failed business
    operation that needs resolution, whether through automated reprocessing, manual intervention, or
    intentional discard with documentation.
  how_to_apply: |
    1. Configure a DLQ for every queue and topic in your system. Set the max retry count to 3-5 attempts with
    exponential backoff between retries. After max retries, route the message to the DLQ automatically.
    In SQS, this is the redrive policy; in Kafka, produce to an error topic in the catch block.
    2. Enrich messages entering the DLQ with failure metadata: original queue, failure timestamp, error
    message, stack trace, retry count, and the handler version that failed. This metadata is essential for
    diagnosis and enables automated classification of failure types.
    3. Build a DLQ dashboard showing: current depth, ingestion rate (messages per minute entering the DLQ),
    age of oldest message, and failure reason distribution. Alert on depth exceeding a threshold (indicates
    systemic failure) and on messages older than 24 hours (indicates unresolved failures).
    4. Implement a reprocessing mechanism: a tool or script that reads messages from the DLQ, optionally
    transforms them (e.g., fixes a known data issue), and republishes them to the original queue. This
    must be a one-click operation, not a manual database query.
    5. Review the DLQ daily as part of operational hygiene. Every message in the DLQ is a failed business
    operation. Categorize failures as transient (will succeed on retry after a fix), permanent (message is
    invalid and must be discarded), or bug-related (handler code needs a fix before reprocessing).
  mental_model: >-
    Hospital triage — patients who cannot be treated immediately are not sent home (lost) or left blocking the emergency room
    (stuck). They go to a holding area with documentation of their condition, and a specialist reviews them as soon as possible.
  domains:
    domain:
    - distributed
    - messaging
    - reliability
    - operations
    concern:
    - message_processing
    - observability
  violation_consequence: >-
    Without a DLQ, poison messages retry infinitely, blocking the queue and preventing all subsequent messages from processing.
    Alternatively, failed messages are silently dropped, causing data loss that is only discovered when customers report missing
    transactions days later. Neither outcome is acceptable.
  teaching_example: >-
    An order processing system receives a message with a malformed address field. Without a DLQ, the message retries every
    30 seconds forever, and 500 valid orders behind it in the queue never get processed. With a DLQ, the malformed message
    moves to the DLQ after 3 retries, the valid orders process normally, and the ops team is alerted to investigate the address
    parsing bug.
  when_applies: >-
    Every message queue and topic in every distributed system — DLQs are non-negotiable infrastructure. If you have a queue,
    you need a DLQ.
  when_not_applies: >-
    In-memory queues in development environments, or truly fire-and-forget workloads where message loss is acceptable (rare
    in practice).
  sources:
  - https://docs.aws.amazon.com/AWSSimpleQueueService/latest/SQSDeveloperGuide/sqs-dead-letter-queues.html
  text: >-
    Dead Letter Queues Are Your Safety Net: Hospital triage — patients who cannot be treated immediately are not sent home
    (lost) or left blocking the emergency room (stuck).
  severity: high
  technologies:
    lang:
    - python
  how_to_do_right: |-
    1. Configure a DLQ for every queue and topic in your system. Set the max retry count to 3-5 attempts with
    exponential backoff between retries. After max retries, route the message to the DLQ automatically.
    In SQS, this is the redrive policy; in Kafka, produce to an error topic in the catch block.
    2. Enrich messages entering the DLQ with failure metadata: original queue, failure timestamp, error
    message, stack trace, retry count, and the handler version that failed. This metadata is essential for
    diagnosis and enables automated classification of failure types.
    3. Build a DLQ dashboard showing: current depth, ingestion rate (messages per minute entering the DLQ),
    age of oldest message, and failure reason distribution. Alert on depth exceeding a threshold (indicates
    systemic failure) and on messages older than 24 hours (indicates unresolved failures).
    4. Implement a reprocessing mechanism: a tool or script that reads messages from the DLQ, optionally
    transforms them (e.g., fixes a known data issue), and republishes them to the original queue. This
    must be a one-click operation, not a manual database query.
    5. Review the DLQ daily as part of operational hygiene. Every message in the DLQ is a failed business
    operation. Categorize failures as transient (will succeed on retry after a fix), permanent (message is
    invalid and must be discarded), or bug-related (handler code needs a fix before reprocessing).
  example_good: |-
    # An order processing system receives a message with a malformed address field.
    # Without a DLQ, the message retries every 30 seconds forever, and 500 valid orders behind it in the queue never get processed.
    # With a DLQ, the malformed message moves to the DLQ after 3 retries, the valid orders process normally, and the ops team is alerted to investigate the address parsing bug.
  example_bad: |-
    # Anti-pattern: Violating Dead Letter Queues Are Your Safety Net
    # Result: Without a DLQ
    # Result: poison messages retry infinitely
- id: P-MSG-BACKOFF
  name: Exponential Backoff with Jitter
  why: |
    When a service fails and multiple clients detect the failure simultaneously, they all retry at the same
    time. This synchronized retry creates a "thundering herd" — a sudden spike of requests that can overwhelm
    the recovering service and prevent it from actually recovering. Simple linear retry (retry every 1 second)
    is even worse: every client retries on the exact same cadence, creating periodic spikes that keep the
    service pinned. Exponential backoff addresses this by increasing the wait time between retries
    exponentially: 1s, 2s, 4s, 8s, 16s. This spreads retries over a longer time window, reducing instantaneous
    load on the recovering service. But exponential backoff alone is insufficient — if all clients start
    retrying at the same time with the same base, their retries are still synchronized (all retry at 1s, all
    at 2s, all at 4s). Jitter adds randomness to break this synchronization. Full jitter (random between 0
    and the exponential backoff value) provides the best distribution, reducing the probability of collision
    to near zero. AWS's architecture blog published an influential analysis showing that exponential backoff
    with full jitter reduces total completion time and retry load by 40-60% compared to exponential backoff
    alone. The formula is: sleep = random(0, min(cap, base * 2^attempt)). The cap prevents unbounded backoff
    (you do not want a client waiting 17 minutes between retries). This pattern is used by every AWS SDK,
    every gRPC client, and every well-designed HTTP client. It is the standard retry strategy for a reason:
    it is simple to implement, mathematically sound, and empirically proven across millions of production
    systems. Truncated exponential backoff with jitter and a maximum retry count should be the default for
    every remote call in your system.
  how_to_apply: |
    1. Implement the standard backoff formula: sleep_time = random(0, min(max_delay, base_delay * 2^attempt)).
    Typical values: base_delay = 100ms, max_delay = 30s, max_attempts = 5. This gives retry intervals of
    roughly 0-100ms, 0-200ms, 0-400ms, 0-800ms, 0-1600ms with full jitter.
    2. Use full jitter (random between 0 and the exponential value), not equal jitter or decorrelated jitter.
    AWS's empirical analysis shows full jitter provides the best spread and lowest total system load. The
    implementation is a single random() call.
    3. Set a maximum retry count (typically 3-5) and a maximum delay cap (typically 30-60 seconds). After
    exhausting retries, fail the operation — do not retry forever. Route the failed operation to error
    handling (DLQ, circuit breaker trip, user notification).
    4. Classify errors before retrying. Retry transient errors (HTTP 503, connection timeout, ECONNREFUSED).
    Do NOT retry permanent errors (HTTP 400, 401, 404) — retrying a bad request will never succeed and
    wastes resources. Do NOT retry HTTP 429 — use the Retry-After header value instead of your backoff.
    5. Log every retry with the attempt number, delay, and error reason. This creates an audit trail for
    debugging and enables metrics: retry rate per service, average retries per operation, and retry
    exhaustion rate. A high retry rate is an early warning of downstream degradation.
  mental_model: >-
    Polite phone redialing — instead of mashing redial every second (annoying and ineffective), wait 1 minute, then 5 minutes,
    then 15 minutes, each time with a random offset so you and the other 100 callers are not all redialing at the same instant.
  domains:
    domain:
    - distributed
    - messaging
    - reliability
    - networking
    concern:
    - retry
    - resilience
  violation_consequence: >-
    Without jitter, synchronized retries create thundering herd effects that prevent the failing service from recovering.
    Without exponential backoff, constant-interval retries maintain sustained high load on the failing service. Together,
    the absence of both turns a brief service hiccup into a prolonged outage.
  teaching_example: >-
    A load balancer health check marks a backend as unhealthy for 5 seconds. 10,000 in-flight requests fail and retry simultaneously
    after 1 second. The backend receives 10,000 requests at once, fails again, and the cycle repeats. With exponential backoff
    and jitter, retries spread over 0-8 seconds, the backend receives a gradual ramp of traffic, and it recovers within seconds.
  when_applies: >-
    Every remote call that can fail transiently — HTTP requests, database connections, message broker publishes, gRPC calls,
    DNS resolution. This is the universal retry strategy.
  when_not_applies: >-
    Synchronous in-process function calls, operations with hard real-time deadlines where any retry is too slow, or operations
    where the first failure is guaranteed to be permanent.
  sources:
  - https://aws.amazon.com/builders-library/timeouts-retries-and-backoff-with-jitter/
  text: >-
    Exponential Backoff with Jitter: Polite phone redialing — instead of mashing redial every second (annoying and ineffective),
    wait 1 minute, then 5 minutes, then 15 minutes, each time with a random offset so you and the other 100 callers are not
    all redialing at the same instant.
  severity: high
  technologies:
    lang:
    - python
  how_to_do_right: |-
    1. Implement the standard backoff formula: sleep_time = random(0, min(max_delay, base_delay * 2^attempt)).
    Typical values: base_delay = 100ms, max_delay = 30s, max_attempts = 5. This gives retry intervals of
    roughly 0-100ms, 0-200ms, 0-400ms, 0-800ms, 0-1600ms with full jitter.
    2. Use full jitter (random between 0 and the exponential value), not equal jitter or decorrelated jitter.
    AWS's empirical analysis shows full jitter provides the best spread and lowest total system load. The
    implementation is a single random() call.
    3. Set a maximum retry count (typically 3-5) and a maximum delay cap (typically 30-60 seconds). After
    exhausting retries, fail the operation — do not retry forever. Route the failed operation to error
    handling (DLQ, circuit breaker trip, user notification).
    4. Classify errors before retrying. Retry transient errors (HTTP 503, connection timeout, ECONNREFUSED).
    Do NOT retry permanent errors (HTTP 400, 401, 404) — retrying a bad request will never succeed and
    wastes resources. Do NOT retry HTTP 429 — use the Retry-After header value instead of your backoff.
    5. Log every retry with the attempt number, delay, and error reason. This creates an audit trail for
    debugging and enables metrics: retry rate per service, average retries per operation, and retry
    exhaustion rate. A high retry rate is an early warning of downstream degradation.
  example_good: |-
    # A load balancer health check marks a backend as unhealthy for 5 seconds.
    # 10,000 in-flight requests fail and retry simultaneously after 1 second.
    # The backend receives 10,000 requests at once, fails again, and the cycle repeats.
    # With exponential backoff and jitter, retries spread over 0-8 seconds, the backend receives a gradual ramp of traffic, and it recovers within seconds.
  example_bad: |-
    # Anti-pattern: Violating Exponential Backoff with Jitter
    # Result: Without jitter
    # Result: synchronized retries create thundering herd effects that prevent the failing service from recovering. Without exponential backoff
- id: P-MSG-ORDERING
  name: Require Message Ordering Only When Semantically Necessary
  why: |
    Message ordering guarantees are expensive in distributed systems. Kafka guarantees ordering within a
    partition but not across partitions — to get global ordering, you must use a single partition, which
    limits throughput to what one broker can handle. SQS standard queues provide nearly unlimited throughput
    but no ordering; SQS FIFO queues guarantee ordering but cap at 3,000 messages per second with batching
    (300 without). RabbitMQ guarantees ordering per queue but not across queues. The cost of ordering is not
    just throughput — it also means head-of-line blocking: if message N cannot be processed (handler crash,
    downstream failure), messages N+1, N+2, etc. must wait, even if they are completely independent. This
    single constraint can turn a high-throughput parallel system into a serial bottleneck. The key insight is
    that most messages do not actually require global ordering. An e-commerce system processes orders from
    different users — order A and order B are completely independent, and processing B before A has no
    semantic impact. What matters is ordering within a business entity: the sequence of events for a single
    order (created -> paid -> shipped -> delivered) must be preserved. Kafka's partition key achieves this
    perfectly: partition by order_id, and all events for a single order land on the same partition in order.
    Events for different orders land on different partitions and are processed in parallel. This entity-level
    ordering provides the semantic guarantee the business needs without sacrificing throughput. Before
    requiring ordering, ask: "If these two messages are swapped, does the business outcome change?" If the
    answer is no, do not pay the ordering tax.
  how_to_apply: |
    1. For every message type, explicitly document whether ordering matters and at what scope. "Order events
    must be ordered per order_id" is a valid requirement. "All messages must be globally ordered" is almost
    certainly over-specified.
    2. Use entity-level partitioning to get ordering where it matters without sacrificing throughput. In Kafka,
    set the partition key to the entity ID (order_id, user_id, account_id). All events for one entity go to
    one partition (ordered); events for different entities go to different partitions (parallel).
    3. Design handlers to be order-independent where possible. Instead of "apply delta +5 to balance" (order-
    dependent), use "set balance to 105 with version 7" (idempotent and order-independent via optimistic
    concurrency). This eliminates ordering requirements at the handler level.
    4. For cases where ordering is required but throughput is critical, use sequence numbers in messages and
    have the consumer buffer and reorder: if message 5 arrives before message 4, buffer message 5 until
    message 4 arrives. This decouples transport ordering from processing ordering.
    5. Monitor partition distribution to prevent hot partitions. If one entity generates 100x more events
    than average (a viral user, a bulk import), it can create a hot partition that bottlenecks throughput.
    Use sub-partitioning or rate limiting for hot entities.
  mental_model: >-
    Supermarket checkout lanes — each customer's items must be scanned in the order they are placed on the belt (entity ordering),
    but different customers use different lanes simultaneously (no global ordering needed). Adding more lanes increases throughput
    without violating anyone's item order.
  domains:
    domain:
    - distributed
    - messaging
    - architecture
    - performance
    concern:
    - message_processing
    - scalability
  violation_consequence: >-
    Requiring global ordering when only entity-level ordering is needed caps throughput at a single partition's capacity,
    introduces head-of-line blocking across independent entities, and prevents horizontal scaling of consumers. A system designed
    for 100K msg/sec can be limited to 1K msg/sec by an unnecessary ordering constraint.
  teaching_example: >-
    A notification service requires all notifications to be globally ordered. With one Kafka partition, throughput is 5K messages/sec.
    During a marketing campaign sending 500K notifications, the queue builds a 100-second backlog. Re-designing with per-user
    ordering (partition by user_id, 64 partitions) achieves 200K msg/sec with zero backlog. No user notices the change because
    ordering only matters within their own notification stream.
  when_applies: >-
    When evaluating whether to use ordered messaging (FIFO queues, single partitions) — always question whether the ordering
    guarantee is semantically necessary or just a default assumption.
  when_not_applies: >-
    Truly sequential state machines where every event depends on the previous one's outcome (financial ledgers, consensus
    protocols), or systems where the throughput requirements are low enough that ordering comes for free.
  sources:
  - https://kafka.apache.org/documentation/#design_quotasandthrottling
