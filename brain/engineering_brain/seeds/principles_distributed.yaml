- id: P-DIST-SAGA
  name: Sagas Over Distributed Locks
  why: |
    Distributed transactions using two-phase commit (2PC) require every participant to hold locks until the
    coordinator decides to commit or abort. This works in textbook examples but collapses in production for
    three reasons. First, lock duration scales with the slowest participant: if one microservice is degraded,
    every other participant holds locks waiting for it, creating cascading contention across the entire system.
    Second, coordinator failure during the prepared state leaves participants in an uncertain limbo — they
    cannot commit or abort without the coordinator's decision, leading to blocked resources that may require
    manual intervention. Third, 2PC assumes reliable messaging, but networks partition, messages are delayed,
    and timeouts create ambiguous states. The Saga pattern, introduced by Garcia-Molina and Salem (1987),
    replaces a single atomic transaction with a sequence of local transactions, each with a compensating
    action that semantically undoes its effect if a later step fails. Instead of locking resources across
    services, each service commits independently and publishes an event. If step N fails, compensating actions
    for steps N-1 through 1 execute in reverse order. This approach trades atomicity for availability: the
    system is always making progress, either forward or backward. Modern implementations use orchestration
    (a central saga coordinator like Temporal, Step Functions, or Conductor) or choreography (event-driven,
    each service reacts to events). Orchestration is easier to reason about and debug; choreography scales
    better but is harder to trace. The key insight is that most business processes are inherently long-running
    and tolerant of temporary inconsistency — an order can exist in a "pending" state while payment is
    processed, and reversal (refund) is a natural business operation, not an exceptional failure mode.
  how_to_apply: |
    1. Decompose the distributed transaction into a sequence of local transactions, each owned by a single
    service. Map the happy path: Order Created -> Payment Charged -> Inventory Reserved -> Shipment Scheduled.
    Each step commits locally and publishes a domain event.
    2. For every forward step, define a compensating action that semantically reverses its effect. Payment
    Charged -> Refund Issued. Inventory Reserved -> Inventory Released. Compensating actions must be
    idempotent because they may be retried.
    3. Choose between orchestration and choreography. Use orchestration (Temporal, AWS Step Functions) when
    you need centralized visibility, complex branching logic, or timeouts. Use choreography (event-driven)
    when services are independently deployed teams and you want loose coupling.
    4. Implement a saga state machine that tracks which steps have completed and which compensations are
    needed. Persist this state durably — if the saga coordinator crashes mid-execution, it must resume
    from the last known state, not restart from scratch.
    5. Add timeout boundaries for each step. If a service does not respond within the timeout, trigger
    compensation rather than waiting indefinitely. This prevents sagas from hanging in partial states.
    6. Build a saga dashboard showing in-flight sagas, their current step, and any that are stuck in
    compensation. Alert on sagas that have been in a non-terminal state for longer than their expected
    duration.
  mental_model: >-
    Booking a vacation — you reserve the flight, then the hotel, then the car. If the car rental falls through, you cancel
    the hotel and the flight separately. Each cancellation is a normal business operation, not a system failure.
  domains:
    domain:
    - distributed
    - architecture
    - microservices
    concern:
    - transactions
    - coordination
  violation_consequence: >-
    Using distributed locks or 2PC across microservices leads to cascading timeouts, deadlocks under load, and coordinator
    single points of failure. A single slow service freezes the entire transaction chain, and coordinator crashes leave resources
    locked until manual intervention.
  teaching_example: >-
    An e-commerce checkout saga: 1) Create order, 2) Charge payment, 3) Reserve inventory, 4) Schedule shipment. If inventory
    reservation fails, the saga compensates by refunding the payment and cancelling the order — each service handles its own
    rollback.
  when_applies: >-
    Any business process spanning multiple services or databases where the process can tolerate temporary intermediate states
    and compensating actions are semantically meaningful.
  when_not_applies: >-
    Single-database transactions where ACID is sufficient, or truly atomic operations where partial completion is catastrophic
    and cannot be compensated (e.g., firing a physical missile).
  sources:
  - https://microservices.io/patterns/data/saga.html
  text: 'Sagas Over Distributed Locks: Booking a vacation — you reserve the flight, then the hotel, then the car.'
  severity: high
  technologies:
    lang:
    - python
    - javascript
    - sql
  how_to_do_right: |-
    1. Decompose the distributed transaction into a sequence of local transactions, each owned by a single
    service. Map the happy path: Order Created -> Payment Charged -> Inventory Reserved -> Shipment Scheduled.
    Each step commits locally and publishes a domain event.
    2. For every forward step, define a compensating action that semantically reverses its effect. Payment
    Charged -> Refund Issued. Inventory Reserved -> Inventory Released. Compensating actions must be
    idempotent because they may be retried.
    3. Choose between orchestration and choreography. Use orchestration (Temporal, AWS Step Functions) when
    you need centralized visibility, complex branching logic, or timeouts. Use choreography (event-driven)
    when services are independently deployed teams and you want loose coupling.
    4. Implement a saga state machine that tracks which steps have completed and which compensations are
    needed. Persist this state durably — if the saga coordinator crashes mid-execution, it must resume
    from the last known state, not restart from scratch.
    5. Add timeout boundaries for each step. If a service does not respond within the timeout, trigger
    compensation rather than waiting indefinitely. This prevents sagas from hanging in partial states.
    6. Build a saga dashboard showing in-flight sagas, their current step, and any that are stuck in
    compensation. Alert on sagas that have been in a non-terminal state for longer than their expected
    duration.
  example_good: |-
    # An e-commerce checkout saga: 1) Create order, 2) Charge payment, 3) Reserve inventory, 4) Schedule shipment.
    # If inventory reservation fails, the saga compensates by refunding the payment and cancelling the order — each service handles its own rollback.
  example_bad: |-
    # Anti-pattern: Violating Sagas Over Distributed Locks
    # Result: Using distributed locks or 2PC across microservices leads to cascading timeouts
    # Result: deadlocks under load
- id: P-DIST-CIRCUIT-BREAKER
  name: Circuit Breaker for Downstream Failures
  why: |
    When a downstream service becomes slow or unresponsive, naive retry logic turns a localized problem into
    a system-wide outage. Every caller blocks waiting for a response that will never arrive (or arrives after
    30 seconds), exhausting thread pools, connection pools, and file descriptors. This cascading failure
    pattern is the number one cause of distributed system outages. The circuit breaker pattern, popularized
    by Michael Nygard in "Release It!" and implemented in libraries like Hystrix, resilience4j, and Polly,
    introduces three states: Closed (normal operation, requests pass through), Open (downstream is unhealthy,
    requests fail immediately without attempting the call), and Half-Open (periodically allows a probe request
    to check if downstream has recovered). When the failure rate exceeds a threshold (e.g., 50% of requests
    fail within a 10-second window), the circuit trips to Open. In the Open state, callers receive an
    immediate failure response — typically within microseconds rather than waiting for a timeout — freeing
    resources for requests that can actually succeed. After a configurable sleep window, the circuit moves
    to Half-Open and allows one probe request through. If it succeeds, the circuit closes and normal traffic
    resumes; if it fails, the circuit reopens. Netflix's Hystrix demonstrated this at scale: when their
    recommendation service degraded, circuits opened and the UI fell back to showing a generic "Top 10" list
    rather than hanging indefinitely. The key insight is that failing fast is a feature, not a bug — returning
    an error in 5 milliseconds is infinitely better than returning an error in 30 seconds, because those 30
    seconds of blocked resources are what kill your system.
  how_to_apply: |
    1. Wrap every external service call (HTTP, gRPC, database, message broker) in a circuit breaker. Configure
    the failure threshold (e.g., 5 failures in 10 seconds), the open duration (e.g., 30 seconds), and the
    probe interval (e.g., one request every 10 seconds in half-open state).
    2. Define what counts as a failure for each circuit: connection timeouts, HTTP 5xx responses, and explicit
    error codes. Do NOT count client errors (4xx) as failures — a 404 means the downstream is healthy but
    the resource does not exist.
    3. Implement fallback strategies for each circuit: return cached data, return a default response, degrade
    to a simpler algorithm, or return a clear error with retry-after header. The fallback must be defined at
    design time, not invented during an incident.
    4. Expose circuit state as a health check endpoint and as metrics (Prometheus gauges for circuit state,
    counters for trips). Alert when any circuit opens — this is an early warning that a dependency is
    degrading before it becomes a full outage.
    5. Tune thresholds per dependency based on its expected error rate and latency profile. A database that
    normally responds in 2ms should trip at 100ms; an external API that normally takes 500ms should trip at
    2 seconds. One-size-fits-all thresholds either trip too eagerly or too late.
  mental_model: >-
    Electrical circuit breaker in your house — when a short circuit occurs, the breaker trips instantly to protect the entire
    house, rather than letting the overload burn down every room.
  domains:
    domain:
    - distributed
    - reliability
    - microservices
    concern:
    - fault_tolerance
    - resilience
  violation_consequence: >-
    Without circuit breakers, a single degraded dependency cascades into a full system outage. Thread pools fill with blocked
    requests, connection pools exhaust, upstream services start timing out, and the failure propagates backward through the
    entire call chain until the user-facing service is completely unresponsive.
  teaching_example: >-
    A payment service depends on a fraud detection API. The fraud API starts responding in 25 seconds instead of 200ms. Without
    a circuit breaker, every checkout request blocks for 25 seconds, exhausting the payment service's thread pool. With a
    circuit breaker, after 5 slow requests the circuit opens, and checkout immediately falls back to a rules-based fraud check.
  when_applies: >-
    Any service that calls external dependencies — HTTP APIs, databases, message brokers, third-party services — especially
    when the dependency's failure mode is slowness rather than outright refusal.
  when_not_applies: >-
    In-process function calls where failure is immediate, or batch jobs where waiting longer is acceptable and the downstream
    has no alternative.
  sources:
  - https://martinfowler.com/bliki/CircuitBreaker.html
  text: >-
    Circuit Breaker for Downstream Failures: Electrical circuit breaker in your house — when a short circuit occurs, the breaker
    trips instantly to protect the entire house, rather than letting the overload burn down every room.
  severity: high
  technologies:
    lang:
    - python
  how_to_do_right: |-
    1. Wrap every external service call (HTTP, gRPC, database, message broker) in a circuit breaker. Configure
    the failure threshold (e.g., 5 failures in 10 seconds), the open duration (e.g., 30 seconds), and the
    probe interval (e.g., one request every 10 seconds in half-open state).
    2. Define what counts as a failure for each circuit: connection timeouts, HTTP 5xx responses, and explicit
    error codes. Do NOT count client errors (4xx) as failures — a 404 means the downstream is healthy but
    the resource does not exist.
    3. Implement fallback strategies for each circuit: return cached data, return a default response, degrade
    to a simpler algorithm, or return a clear error with retry-after header. The fallback must be defined at
    design time, not invented during an incident.
    4. Expose circuit state as a health check endpoint and as metrics (Prometheus gauges for circuit state,
    counters for trips). Alert when any circuit opens — this is an early warning that a dependency is
    degrading before it becomes a full outage.
    5. Tune thresholds per dependency based on its expected error rate and latency profile. A database that
    normally responds in 2ms should trip at 100ms; an external API that normally takes 500ms should trip at
    2 seconds. One-size-fits-all thresholds either trip too eagerly or too late.
  example_good: |-
    # A payment service depends on a fraud detection API.
    # The fraud API starts responding in 25 seconds instead of 200ms.
    # Without a circuit breaker, every checkout request blocks for 25 seconds, exhausting the payment service's thread pool.
    # With a circuit breaker, after 5 slow requests the circuit opens, and checkout immediately falls back to a rules-based fraud check.
  example_bad: |-
    # Anti-pattern: Violating Circuit Breaker for Downstream Failures
    # Result: Without circuit breakers
    # Result: a single degraded dependency cascades into a full system outage. Thread pools fill with blocked requests
- id: P-DIST-BACKPRESSURE
  name: Backpressure Over Unbounded Queues
  why: |
    Every system has a maximum throughput. When producers generate work faster than consumers can process it,
    the excess must go somewhere. Without explicit backpressure, it accumulates in unbounded queues — in-memory
    buffers, message broker topics, or database tables used as queues. This creates a time bomb: memory grows
    linearly with the rate mismatch, latency increases as queue depth grows (new messages wait behind thousands
    of older ones), and when memory is finally exhausted, the process crashes and loses everything in the
    queue. The problem is insidious because the system appears healthy under normal load and only fails under
    sustained high load — exactly when reliability matters most. Backpressure is the mechanism by which a
    consumer signals to its producer that it cannot accept more work. This signal propagates upstream through
    the pipeline, ultimately slowing down the source of load. TCP flow control is the canonical example: the
    receiver advertises a window size, and the sender cannot transmit more data than the window allows. Reactive
    Streams (Project Reactor, RxJava, Akka Streams) formalize this as a protocol where subscribers request a
    specific number of items from publishers. Kafka consumer groups provide natural backpressure through
    consumer lag — producers can write freely, but consumers process at their own rate, and the lag metric
    tells you how far behind they are. The key architectural decision is where to shed load: at the edge
    (rate limiting, HTTP 429), at the queue (bounded queues that reject when full), or at the consumer (pull-
    based consumption). Each choice has different trade-offs for latency, data loss, and user experience.
    The worst choice is no choice at all — letting the system decide by crashing.
  how_to_apply: |
    1. Bound every queue and buffer in your system. In-memory queues get a max size (e.g., 10,000 items).
    Kafka topics get retention limits. Database tables used as queues get row count alerts. When the bound
    is reached, the producer must be told — either block, drop, or receive an error.
    2. Implement pull-based consumption wherever possible. Instead of pushing messages to consumers, let
    consumers pull at their own rate. Kafka, SQS, and Redis Streams all support this model. The consumer
    controls its own throughput, and the broker buffers within its configured limits.
    3. Add rate limiting at the edge of your system. API gateways should enforce requests-per-second limits
    per client, returning HTTP 429 with a Retry-After header. This is the earliest point to shed load and
    protects everything downstream.
    4. Monitor queue depth and consumer lag as primary health metrics. Alert when queue depth exceeds a
    threshold that represents more than N minutes of processing time. Consumer lag in Kafka should be
    tracked per partition and alerted on sustained growth.
    5. Implement load shedding strategies: priority queues where low-priority work is dropped first,
    deadline-based expiration where messages older than their SLA are discarded, and graceful degradation
    where expensive features are disabled under load to free capacity for core operations.
  mental_model: >-
    Highway on-ramp metering lights — when the highway is full, the ramp light turns red to prevent new cars from entering
    and making the congestion worse. Better to wait at the ramp than gridlock the entire highway.
  domains:
    domain:
    - distributed
    - reliability
    - messaging
    - performance
    concern:
    - flow_control
    - scalability
  violation_consequence: >-
    Unbounded queues lead to monotonically increasing memory usage, growing latency (new messages wait behind a backlog of
    thousands), and eventual OOM crashes that lose all queued work. The system fails at the worst possible time — under peak
    load — and the crash often triggers a retry storm that makes recovery even harder.
  teaching_example: >-
    A logging pipeline ingests 100K events/sec but the Elasticsearch cluster can only index 50K/sec. Without backpressure,
    the Kafka consumer lag grows by 50K/sec. Within an hour, there is a 180M event backlog. Logs arrive 1 hour late, alerting
    is useless, and the consumer OOMs trying to batch-process the backlog.
  when_applies: >-
    Any producer-consumer pipeline where the producer can outpace the consumer, especially under load spikes — message queues,
    stream processing, API ingestion, log pipelines.
  when_not_applies: >-
    Request-response systems where the caller naturally waits for a response, or systems where the producer is inherently
    slower than the consumer and rate mismatch is structurally impossible.
  sources:
  - https://www.reactivemanifesto.org/
  text: >-
    Backpressure Over Unbounded Queues: Highway on-ramp metering lights — when the highway is full, the ramp light turns red
    to prevent new cars from entering and making the congestion worse.
  severity: high
  technologies:
    lang:
    - python
  how_to_do_right: |-
    1. Bound every queue and buffer in your system. In-memory queues get a max size (e.g., 10,000 items).
    Kafka topics get retention limits. Database tables used as queues get row count alerts. When the bound
    is reached, the producer must be told — either block, drop, or receive an error.
    2. Implement pull-based consumption wherever possible. Instead of pushing messages to consumers, let
    consumers pull at their own rate. Kafka, SQS, and Redis Streams all support this model. The consumer
    controls its own throughput, and the broker buffers within its configured limits.
    3. Add rate limiting at the edge of your system. API gateways should enforce requests-per-second limits
    per client, returning HTTP 429 with a Retry-After header. This is the earliest point to shed load and
    protects everything downstream.
    4. Monitor queue depth and consumer lag as primary health metrics. Alert when queue depth exceeds a
    threshold that represents more than N minutes of processing time. Consumer lag in Kafka should be
    tracked per partition and alerted on sustained growth.
    5. Implement load shedding strategies: priority queues where low-priority work is dropped first,
    deadline-based expiration where messages older than their SLA are discarded, and graceful degradation
