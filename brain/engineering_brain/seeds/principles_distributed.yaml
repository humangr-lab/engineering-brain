layer: principles
domain: distributed
knowledge:
- id: P-DIST-EVENTUAL-CONSIST
  name: Embrace Eventual Consistency
  why: |
    Strong consistency requires coordination across every replica before acknowledging a write, which means every
    operation pays the latency tax of the slowest participant. In geo-distributed systems this translates to
    cross-continental round-trips on every single mutation. The CAP theorem formalizes the trade-off: during a
    network partition you must choose between consistency and availability, and for the vast majority of
    user-facing workloads, availability wins. Amazon's Dynamo paper (2007) demonstrated that shopping carts,
    session stores, and preference services all tolerate stale reads for seconds or even minutes without any
    user-visible impact, while gaining orders-of-magnitude improvement in write throughput and availability.
    Cassandra adopted the same philosophy — tunable consistency per query lets developers pick ONE, QUORUM, or
    ALL on a per-operation basis, matching the consistency level to the actual business requirement rather than
    paying for the strongest guarantee everywhere. Eventual consistency also simplifies failure handling: a
    node that was partitioned simply merges its local writes when it rejoins, using vector clocks or CRDTs to
    resolve conflicts deterministically. The key insight is that most data has a natural staleness tolerance.
    A product catalog that is 5 seconds behind is indistinguishable from a perfectly consistent one to the
    end user. Identifying which data actually requires linearizability (financial balances, inventory counts
    at checkout) and which tolerates eventual convergence (user profiles, analytics counters, recommendation
    scores) is the single most impactful architectural decision in distributed system design.
  how_to_apply: |
    1. Classify every data entity by its staleness tolerance: zero (financial ledgers, inventory at checkout),
    seconds (user sessions, shopping carts), minutes (analytics aggregates, recommendation scores), and hours
    (reporting dashboards, search indices). This classification drives every subsequent design choice.
    2. Use CRDTs (Conflict-free Replicated Data Types) for data that must converge without coordination —
    counters (G-Counter, PN-Counter), sets (OR-Set), and registers (LWW-Register) eliminate the need for
    consensus on high-write-volume paths. Libraries like Automerge or Yjs provide production-ready
    implementations.
    3. Implement anti-entropy protocols for background convergence: Merkle tree comparison (like Cassandra's
    read repair and anti-entropy repair), gossip-based dissemination, or periodic full-state synchronization
    for small datasets. Choose the protocol based on dataset size and mutation rate.
    4. Design read paths with explicit staleness budgets. Expose a max-staleness parameter in your API so
    callers can opt into fresher reads when needed (similar to Cassandra's consistency levels or DynamoDB's
    consistent read flag). Cache layers should respect and propagate these budgets.
    5. Implement conflict resolution strategies appropriate to each entity: last-writer-wins for simple values,
    application-level merge for complex documents, and human review queues for conflicts that cannot be
    resolved automatically. Log every conflict for observability.
    6. Build convergence monitoring: track replication lag per partition, alert when lag exceeds the staleness
    SLA, and expose a convergence dashboard showing the percentage of replicas that have received each write.
  mental_model: >-
    Newspaper printing — every city gets the same news, just not at the exact same millisecond. By morning, everyone has read
    the same headlines.
  domains:
    domain:
    - distributed
    - architecture
    - database
    concern:
    - consistency
  violation_consequence: >-
    Forcing strong consistency everywhere creates a system that is technically correct but practically unusable — writes stall
    for hundreds of milliseconds, throughput collapses under partition events, and the system becomes unavailable precisely
    when users need it most. You end up with a perfectly consistent database that nobody can reach.
  teaching_example: >-
    DynamoDB's shopping cart: items added on different replicas during a partition are merged via vector clocks when connectivity
    returns. The user sees all their items — never loses one — even though the cart was temporarily inconsistent across regions.
  when_applies: >-
    Geo-distributed systems, high-availability services, any workload where staleness of seconds to minutes is acceptable
    and availability is paramount.
  when_not_applies: >-
    Financial transactions requiring linearizability, inventory systems at the moment of purchase, or any workflow where reading
    stale data causes irrecoverable business harm.
  sources:
  - https://www.allthingsdistributed.com/files/amazon-dynamo-sosp2007.pdf
  text: >-
    Embrace Eventual Consistency: Newspaper printing — every city gets the same news, just not at the exact same millisecond.
  severity: high
  technologies:
    lang:
    - python
  how_to_do_right: |-
    1. Classify every data entity by its staleness tolerance: zero (financial ledgers, inventory at checkout),
    seconds (user sessions, shopping carts), minutes (analytics aggregates, recommendation scores), and hours
