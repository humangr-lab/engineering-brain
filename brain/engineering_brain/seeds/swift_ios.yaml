layer: rules
technology: Swift
domain: mobile
knowledge:
- id: CR-SWIFT-001
  text: Build SwiftUI views as small, pure functions of state — the body property must be a deterministic transformation of
    @State/@Binding/@ObservedObject
  why: 'SwiftUI recomputes body whenever any observed state changes. If body contains side effects (network calls, file I/O,
    UserDefaults writes), they fire on every recomputation — potentially dozens of times per second during animations. A body
    that reads AND writes state creates infinite loops where writing triggers recomputation which triggers another write.
    Views must be pure: given the same state, body always produces the same view hierarchy. Side effects belong in .task{},
    .onChange(of:), or the ViewModel.

    '
  how_to_do_right: '1. body should ONLY read state and return views — no side effects

    2. Use .task{} for async work on appear (replaces .onAppear for async)

    3. Use .onChange(of:) for reacting to state changes

    4. Keep body under 30 lines — extract subviews as separate structs

    5. Mark subviews as @ViewBuilder functions or separate View structs

    6. Use #Preview macro for rapid iteration (Xcode 15+)

    '
  severity: critical
  technologies:
    lang: [swift]
    framework: [swiftui]
    platform: [mobile, ios]
  domains:
    domain: [architecture, mobile]
  example_good: "struct UserProfileView: View {\n    @StateObject private var viewModel = UserProfileViewModel()\n    let\
    \ userId: String\n\n    var body: some View {\n        // Pure: only reads state, returns views\n        Group {\n   \
    \         switch viewModel.state {\n            case .loading:\n                ProgressView()\n            case .loaded(let\
    \ user):\n                UserContent(user: user, onEdit: viewModel.startEditing)\n            case .error(let message):\n\
    \                ErrorView(message: message, onRetry: { viewModel.load(userId) })\n            }\n        }\n        .task\
    \ {\n            // Side effect in .task, NOT in body\n            await viewModel.load(userId)\n        }\n        .onChange(of:\
    \ userId) { newId in\n            // React to prop change — not in body\n            Task { await viewModel.load(newId)\
    \ }\n        }\n    }\n}\n\n// Extracted subview — small, focused\nstruct UserContent: View {\n    let user: User\n  \
    \  let onEdit: () -> Void\n\n    var body: some View {\n        VStack(alignment: .leading, spacing: 12) {\n         \
    \   Text(user.name).font(.title)\n            Text(user.email).foregroundStyle(.secondary)\n            Button(\"Edit\
    \ Profile\", action: onEdit)\n        }\n    }\n}\n"
  example_bad: "struct UserProfileView: View {\n    @State private var user: User?\n    @State private var isLoading = true\n\
    \    let userId: String\n\n    var body: some View {\n        VStack {\n            if isLoading {\n                ProgressView()\n\
    \                    .onAppear {\n                        // Side effect IN body — fires on every recomputation\n    \
    \                    Task {\n                            user = await api.getUser(userId)\n                          \
    \  isLoading = false\n                        }\n                    }\n            }\n            if let user {\n   \
    \             // 100 lines of inline view code\n                Text(user.name)\n                // ... 80 more lines\
    \ ...\n                Button(\"Save\") {\n                    // Writing to UserDefaults in body\n                  \
    \  UserDefaults.standard.set(user.name, forKey: \"lastUser\")\n                }\n            }\n        }\n    }\n}\n"
  when_applies: Any project using Swift/iOS development, SwiftUI, or iOS
  when_not_applies: web-only applications, backend services, desktop applications
  sources: ["https://developer.apple.com/documentation/swiftui/model-data"]
- id: CR-SWIFT-002
  text: Use @State for local value types, @StateObject for owned reference types, @ObservedObject for injected reference types,
    and @EnvironmentObject for dependency injection
  why: 'SwiftUI''s property wrappers control view lifecycle and update behavior. Using the wrong one causes bugs that are
    hard to diagnose: @ObservedObject for a ViewModel created in the view causes the VM to be destroyed and recreated on every
    parent recomputation, losing all state. @StateObject for an injected dependency causes the view to ignore updates from
    the parent. @State for reference types doesn''t trigger view updates because SwiftUI only observes value changes (struct
    mutation). Each wrapper has exactly one correct use case.

    '
  how_to_do_right: '1. @State: local primitive/struct state owned by this view (toggle, text input, selection)

    2. @StateObject: reference type (ObservableObject) CREATED AND OWNED by this view

    3. @ObservedObject: reference type PASSED IN from parent (view does not own lifecycle)

    4. @EnvironmentObject: reference type injected from ancestor via .environmentObject()

    5. @Binding: two-way connection to parent''s @State (child can modify parent''s state)

    6. @Environment: read system values (colorScheme, locale, dismiss action)

    '
  severity: critical
  technologies:
    lang: [swift]
    framework: [swiftui]
    platform: [mobile, ios]
  domains:
    domain: [architecture, mobile]
    concern: [state_management]
  example_good: "// ViewModel — ObservableObject for SwiftUI observation\n@MainActor\nclass ProfileViewModel: ObservableObject\
    \ {\n    @Published var name: String = \"\"\n    @Published var isLoading = false\n\n    func save() async {\n       \
    \ isLoading = true\n        defer { isLoading = false }\n        try { await api.updateName(name) }\n        catch { /*\
    \ handle */ }\n    }\n}\n\n// Parent creates and owns the ViewModel\nstruct ProfileScreen: View {\n    @StateObject private\
    \ var viewModel = ProfileViewModel() // OWNS lifecycle\n\n    var body: some View {\n        ProfileForm(viewModel: viewModel)\
    \ // passes down\n    }\n}\n\n// Child observes but does NOT own\nstruct ProfileForm: View {\n    @ObservedObject var\
    \ viewModel: ProfileViewModel // DOES NOT own lifecycle\n\n    var body: some View {\n        Form {\n            TextField(\"\
    Name\", text: $viewModel.name)\n            Button(\"Save\") { Task { await viewModel.save() } }\n        }\n    }\n}\n\
    \n// Injected via environment for deep trees\nstruct AppRoot: View {\n    @StateObject private var authService = AuthService()\n\
    \n    var body: some View {\n        ContentView()\n            .environmentObject(authService)\n    }\n}\n\nstruct DeepNestedView:\
    \ View {\n    @EnvironmentObject var auth: AuthService // no prop drilling\n    var body: some View { Text(auth.currentUser?.name\
    \ ?? \"Guest\") }\n}\n"
  example_bad: "struct ProfileScreen: View {\n    // WRONG: @ObservedObject for owned object — recreated on every parent rebuild\n\
    \    @ObservedObject var viewModel = ProfileViewModel()\n    // User types in text field → parent rebuilds → ViewModel\
    \ destroyed → text lost\n\n    var body: some View {\n        TextField(\"Name\", text: $viewModel.name) // loses input\
    \ on parent rebuild\n    }\n}\n\nstruct OtherScreen: View {\n    // WRONG: @State for reference type — SwiftUI can't observe\
    \ class mutations\n    @State private var viewModel = ProfileViewModel()\n    // viewModel.name changes but view NEVER\
    \ updates\n\n    var body: some View {\n        Text(viewModel.name) // always shows initial value\n    }\n}\n"
  when_applies: Any project using Swift/iOS development, SwiftUI, or iOS
  when_not_applies: web-only applications, backend services, desktop applications
  sources: ["https://developer.apple.com/documentation/swiftui/managing-model-data-in-your-app"]
- id: CR-SWIFT-003
  text: Use ViewModifier for reusable view modifications and PreferenceKey for child-to-parent communication
  why: 'Duplicating view modifications (.font(), .padding(), .background()) across views creates consistency bugs where one
    screen''s card styling drifts from another. ViewModifier encapsulates reusable styling/behavior, applied with .modifier()
    or a custom View extension. PreferenceKey enables child views to pass data UP the tree to parents — the inverse of environment.
    Without PreferenceKey, teams resort to closures, NotificationCenter, or Combine publishers for child- to-parent communication,
    creating tight coupling and memory leaks. PreferenceKey is how SwiftUI''s own .navigationTitle() and .tabItem() work.

    '
  how_to_do_right: '1. ViewModifier for reusable styling: card style, section header, loading overlay

    2. Create View extensions for ergonomic modifier application

    3. PreferenceKey for child-to-parent data: scroll offset, content size, selected item

    4. Use onPreferenceChange to react to child data in parent

    5. Combine ViewModifier with PreferenceKey for complex reusable behaviors

    6. Keep modifiers composable — each does one thing

    '
  severity: medium
  technologies:
    lang: [swift]
    framework: [swiftui]
    platform: [mobile, ios]
  domains:
    domain: [architecture, mobile]
  example_good: "// ViewModifier — reusable card styling\nstruct CardModifier: ViewModifier {\n    func body(content: Content)\
    \ -> some View {\n        content\n            .padding(16)\n            .background(.regularMaterial)\n            .clipShape(RoundedRectangle(cornerRadius:\
    \ 12))\n            .shadow(color: .black.opacity(0.1), radius: 4, y: 2)\n    }\n}\n\nextension View {\n    func cardStyle()\
    \ -> some View {\n        modifier(CardModifier())\n    }\n}\n\n// Usage — consistent styling\nText(\"Hello\").cardStyle()\n\
    \n// PreferenceKey — child reports scroll offset to parent\nstruct ScrollOffsetKey: PreferenceKey {\n    static var defaultValue:\
    \ CGFloat = 0\n    static func reduce(value: inout CGFloat, nextValue: () -> CGFloat) {\n        value = nextValue()\n\
    \    }\n}\n\nstruct ScrollableContent: View {\n    var body: some View {\n        ScrollView {\n            GeometryReader\
    \ { geo in\n                Color.clear.preference(\n                    key: ScrollOffsetKey.self,\n                \
    \    value: geo.frame(in: .named(\"scroll\")).minY\n                )\n            }\n            .frame(height: 0)\n\n\
    \            LazyVStack { /* content */ }\n        }\n        .coordinateSpace(name: \"scroll\")\n    }\n}\n\n// Parent\
    \ reads child's scroll offset\nstruct ParentView: View {\n    @State private var scrollOffset: CGFloat = 0\n\n    var\
    \ body: some View {\n        ScrollableContent()\n            .onPreferenceChange(ScrollOffsetKey.self) { offset in\n\
    \                scrollOffset = offset\n            }\n            .overlay(alignment: .top) {\n                // Shrinking\
    \ header based on scroll\n                Header(height: max(44, 100 + scrollOffset))\n            }\n    }\n}\n"
  example_bad: "// Duplicated styling — drifts across screens\nstruct ScreenA: View {\n    var body: some View {\n       \
    \ Text(\"Card A\")\n            .padding(16)\n            .background(.regularMaterial)\n            .clipShape(RoundedRectangle(cornerRadius:\
    \ 12))\n            .shadow(radius: 4)\n    }\n}\n\nstruct ScreenB: View {\n    var body: some View {\n        Text(\"\
    Card B\")\n            .padding(12) // BUG: different padding\n            .background(.regularMaterial)\n           \
    \ .clipShape(RoundedRectangle(cornerRadius: 8)) // BUG: different radius\n            // BUG: missing shadow\n    }\n\
    }\n\n// Child-to-parent via closure chain — messy, leaky\nstruct Parent: View {\n    @State var offset: CGFloat = 0\n\
    \    var body: some View {\n        // Closure passed 3 levels deep — hard to track, potential retain cycle\n        Content(onScroll:\
    \ { offset = $0 })\n    }\n}\n"
  when_applies: Projects using Swift/iOS development, SwiftUI, or iOS
  when_not_applies: web-only applications, backend services, desktop applications
  sources: ["https://developer.apple.com/documentation/swiftui/viewmodifier"]
- id: CR-SWIFT-004
  text: Use MVVM with SwiftUI as the natural architectural pattern — ViewModel owns state, View is a pure function
  why: 'SwiftUI''s observation system (@Published, @StateObject, @ObservedObject) maps directly to MVVM: the ViewModel is
    an ObservableObject, @Published properties are the model bindings, and the View''s body is the declarative template. MVC
    (UIKit''s pattern) doesn''t fit SwiftUI because there''s no controller lifecycle (viewDidLoad, viewWillAppear). VIPER/Clean
    adds layers that duplicate SwiftUI''s built-in navigation and dependency injection. MVVM gives testable business logic
    (test ViewModel without UI), clean separation (View has no logic), and minimal boilerplate (SwiftUI does the binding automatically).

    '
  how_to_do_right: '1. One ViewModel per screen/feature (not per widget)

    2. ViewModel is @MainActor ObservableObject with @Published properties

    3. View reads ViewModel state, calls ViewModel methods — no business logic in View

    4. Use Coordinator pattern for navigation logic (ViewModel doesn''t know about navigation)

    5. Repository pattern for data layer — ViewModel calls repositories, not API directly

    6. Protocol-based dependencies for testability

    '
  severity: high
  technologies:
    lang: [swift]
    framework: [swiftui]
    platform: [mobile, ios]
  domains:
    domain: [architecture, mobile]
  example_good: "// Repository — protocol for testability\nprotocol UserRepository {\n    func getUser(id: String) async throws\
    \ -> User\n    func updateUser(_ user: User) async throws -> User\n}\n\n// ViewModel — owns all business logic\n@MainActor\n\
    class UserProfileViewModel: ObservableObject {\n    @Published private(set) var user: User?\n    @Published private(set)\
    \ var isLoading = false\n    @Published private(set) var error: String?\n\n    private let repository: UserRepository\n\
    \    private let userId: String\n\n    init(userId: String, repository: UserRepository = DefaultUserRepository()) {\n\
    \        self.userId = userId\n        self.repository = repository\n    }\n\n    func loadUser() async {\n        isLoading\
    \ = true\n        error = nil\n        do {\n            user = try await repository.getUser(id: userId)\n        } catch\
    \ {\n            self.error = error.localizedDescription\n        }\n        isLoading = false\n    }\n}\n\n// View —\
    \ pure function of ViewModel state\nstruct UserProfileView: View {\n    @StateObject private var viewModel: UserProfileViewModel\n\
    \n    init(userId: String) {\n        _viewModel = StateObject(wrappedValue: UserProfileViewModel(userId: userId))\n \
    \   }\n\n    var body: some View {\n        Group {\n            if viewModel.isLoading {\n                ProgressView()\n\
    \            } else if let error = viewModel.error {\n                ErrorView(message: error, onRetry: { Task { await\
    \ viewModel.loadUser() } })\n            } else if let user = viewModel.user {\n                UserDetailView(user: user)\n\
    \            }\n        }\n        .task { await viewModel.loadUser() }\n    }\n}\n\n// Test — no UI needed\n@Test func\
    \ loadUser_success() async {\n    let mockRepo = MockUserRepository(user: .sample)\n    let vm = UserProfileViewModel(userId:\
    \ \"123\", repository: mockRepo)\n\n    await vm.loadUser()\n\n    #expect(vm.user?.name == \"Test User\")\n    #expect(vm.isLoading\
    \ == false)\n    #expect(vm.error == nil)\n}\n"
  example_bad: "// Business logic in View — untestable\nstruct UserProfileView: View {\n    @State private var user: User?\n\
    \    @State private var isLoading = false\n    let userId: String\n\n    var body: some View {\n        VStack {\n   \
    \         if let user {\n                Text(user.name)\n                Button(\"Update\") {\n                    Task\
    \ {\n                        // API call in View — untestable without UI\n                        let response = try await\
    \ URLSession.shared.data(from: url)\n                        let updated = try JSONDecoder().decode(User.self, from: response.0)\n\
    \                        self.user = updated\n                    }\n                }\n            }\n        }\n   \
    \     .onAppear {\n            // Another API call in View — logic scattered\n            Task {\n                isLoading\
    \ = true\n                let (data, _) = try await URLSession.shared.data(from: url)\n                user = try JSONDecoder().decode(User.self,\
    \ from: data)\n                isLoading = false\n            }\n        }\n    }\n}\n// Cannot test: loading state, error\
    \ handling, API calls — all inside View\n"
  when_applies: Projects using Swift/iOS development, SwiftUI, or iOS
  when_not_applies: web-only applications, backend services, desktop applications
  sources: ["https://developer.apple.com/documentation/swiftui/model-data"]
- id: CR-SWIFT-005
  text: Use Swift structured concurrency (async/await, Task, TaskGroup) with proper MainActor isolation for UI updates
  why: 'Swift''s structured concurrency (introduced Swift 5.5) prevents the callback hell and retain cycle bugs of completion
    handlers. async/await reads top-to-bottom like synchronous code. TaskGroup enables parallel execution with automatic cancellation
    propagation. However, UI updates MUST happen on the main thread. Without @MainActor annotation on ViewModels, @Published
    property updates from background tasks trigger "Publishing changes from background threads is not allowed" warnings and
    potential data races that crash in production under load.

    '
  how_to_do_right: '1. Mark ViewModels with @MainActor — all @Published updates safe

    2. Use Task {} for launching async work from synchronous contexts

    3. Use TaskGroup for parallel work (multiple API calls, batch processing)

    4. Use Task.detached ONLY when you explicitly need to escape the current actor

    5. Use withCheckedThrowingContinuation to bridge callback APIs to async/await

    6. Always handle Task cancellation: check Task.isCancelled or use try Task.checkCancellation()

    '
  severity: critical
  technologies:
    lang: [swift]
    platform: [mobile, ios]
  domains:
    domain: [architecture, mobile, performance]
    concern: [concurrency]
  example_good: "@MainActor\nclass DashboardViewModel: ObservableObject {\n    @Published private(set) var stats: DashboardStats?\n\
    \    @Published private(set) var isLoading = false\n\n    private let api: DashboardAPI\n\n    func loadDashboard() async\
    \ {\n        isLoading = true\n        defer { isLoading = false }\n\n        do {\n            // Parallel fetch with\
    \ TaskGroup\n            let stats = try await withThrowingTaskGroup(\n                of: PartialStats.self,\n      \
    \          returning: DashboardStats.self\n            ) { group in\n                group.addTask { try await self.api.fetchRevenue()\
    \ }\n                group.addTask { try await self.api.fetchUsers() }\n                group.addTask { try await self.api.fetchOrders()\
    \ }\n\n                var results: [PartialStats] = []\n                for try await result in group {\n           \
    \         results.append(result)\n                }\n                return DashboardStats(from: results)\n          \
    \  }\n\n            self.stats = stats // Safe: @MainActor ensures main thread\n        } catch is CancellationError {\n\
    \            // Task was cancelled (user navigated away) — don't update state\n            return\n        } catch {\n\
    \            // Handle error\n        }\n    }\n}\n\n// Bridging callback API to async/await\nfunc requestPermission()\
    \ async -> Bool {\n    await withCheckedContinuation { continuation in\n        UNUserNotificationCenter.current().requestAuthorization(\n\
    \            options: [.alert, .badge, .sound]\n        ) { granted, _ in\n            continuation.resume(returning:\
    \ granted) // called exactly once\n        }\n    }\n}\n"
  example_bad: "// No @MainActor — @Published updates from background thread\nclass DashboardViewModel: ObservableObject {\n\
    \    @Published var stats: DashboardStats?\n\n    func load() {\n        Task {\n            let data = try await api.fetch()\n\
    \            self.stats = data // WARNING: publishing from background thread\n            // Race condition: two tasks\
    \ updating simultaneously → crash\n        }\n    }\n}\n\n// Sequential instead of parallel — 3x slower\nfunc loadDashboard()\
    \ async {\n    let revenue = try await api.fetchRevenue() // wait 500ms\n    let users = try await api.fetchUsers()  \
    \   // wait 500ms\n    let orders = try await api.fetchOrders()   // wait 500ms\n    // Total: 1500ms — could be 500ms\
    \ with TaskGroup\n}\n\n// Callback hell — the pattern async/await replaces\nfunc load(completion: @escaping (Result<Data,\
    \ Error>) -> Void) {\n    api.fetchRevenue { revenueResult in\n        switch revenueResult {\n        case .success(let\
    \ revenue):\n            api.fetchUsers { usersResult in\n                // 3 levels deep, error handling duplicated\
    \ at each level\n            }\n        case .failure(let error):\n            completion(.failure(error))\n        }\n\
    \    }\n}\n"
  when_applies: Any project using Swift/iOS development or iOS
  when_not_applies: web-only applications, backend services, desktop applications. projects not using Swift or iOS
  sources: ["https://docs.swift.org/swift-book/documentation/the-swift-programming-language/concurrency/"]
- id: CR-SWIFT-006
  text: Use Actor for thread-safe shared mutable state — replace all manual DispatchQueue synchronization
  why: 'Before Swift concurrency, thread safety required manual DispatchQueue.sync/async calls, locks, or semaphores — all
    error-prone. A single missed synchronization point causes data races that manifest as intermittent crashes impossible
    to reproduce in testing. Swift Actors guarantee data isolation at the compiler level: the compiler enforces that actor
    properties are only accessed from within the actor''s context (or via await from outside). This shifts thread safety from
    runtime discipline to compile-time guarantee. Sendable protocol further enforces that only thread-safe types cross concurrency
    boundaries.

    '
  how_to_do_right: '1. Use actor for any shared mutable state accessed from multiple tasks

    2. Access actor properties with await from outside the actor

    3. Use nonisolated for read-only computed properties that don''t need isolation

    4. Mark types as Sendable when passed across concurrency domains

    5. Use @unchecked Sendable only for types you''ve manually verified as thread-safe

    6. Enable strict concurrency checking: -strict-concurrency=complete

    '
  severity: high
  technologies:
    lang: [swift]
    platform: [mobile, ios]
  domains:
    domain: [architecture, mobile, performance]
    concern: [concurrency]
  example_good: "// Actor — compiler-enforced thread safety\nactor ImageCache {\n    private var cache: [URL: UIImage] = [:]\n\
    \    private var inFlight: [URL: Task<UIImage, Error>] = [:]\n\n    func image(for url: URL) async throws -> UIImage {\n\
    \        // Check cache (actor-isolated, thread-safe)\n        if let cached = cache[url] {\n            return cached\n\
    \        }\n\n        // Deduplicate in-flight requests\n        if let existing = inFlight[url] {\n            return\
    \ try await existing.value\n        }\n\n        // Start new download\n        let task = Task {\n            let (data,\
    \ _) = try await URLSession.shared.data(from: url)\n            guard let image = UIImage(data: data) else {\n       \
    \         throw ImageError.invalidData\n            }\n            return image\n        }\n\n        inFlight[url] =\
    \ task\n        let image = try await task.value\n        cache[url] = image\n        inFlight[url] = nil\n        return\
    \ image\n    }\n\n    func clearCache() {\n        cache.removeAll()\n    }\n}\n\n// Usage — await enforced by compiler\n\
    let cache = ImageCache()\nlet image = try await cache.image(for: avatarURL) // must await\n\n// Sendable struct — safe\
    \ to pass across actors\nstruct UserData: Sendable { // compiler verifies all properties are Sendable\n    let id: String\n\
    \    let name: String\n}\n"
  example_bad: "// Manual DispatchQueue — error-prone, no compiler enforcement\nclass ImageCache {\n    private var cache:\
    \ [URL: UIImage] = [:]\n    private let queue = DispatchQueue(label: \"cache\", attributes: .concurrent)\n\n    func image(for\
    \ url: URL) -> UIImage? {\n        // FORGOT queue.sync — data race on cache dictionary\n        return cache[url]\n \
    \   }\n\n    func store(_ image: UIImage, for url: URL) {\n        queue.async(flags: .barrier) {\n            self.cache[url]\
    \ = image\n            // Retain cycle: self captured strongly in closure\n        }\n    }\n}\n\n// Non-Sendable class\
    \ passed across threads — data race\nclass MutableConfig {\n    var apiKey: String = \"\" // mutable, not thread-safe\n\
    }\nTask.detached {\n    config.apiKey = \"new\" // data race — no compiler warning without strict mode\n}\n"
  when_applies: Projects using Swift/iOS development or iOS
  when_not_applies: web-only applications, backend services, desktop applications. projects not using Swift or iOS
  sources: ["https://developer.apple.com/documentation/swift/actor"]
- id: CR-SWIFT-007
  text: Use SwiftData for modern on-device persistence (iOS 17+) or Core Data for iOS 16 support — never raw SQLite or UserDefaults
    for structured data
  why: 'SwiftData (iOS 17+) provides Swift-native persistence with @Model macro, automatic CloudKit sync, and SwiftUI integration
    via @Query. Core Data provides the same capabilities for iOS 16 support but with more boilerplate. UserDefaults is designed
    for small preferences (< 100KB total) — using it for structured data (user profiles, cached lists, settings with relationships)
    causes slow launch times, data corruption on concurrent writes, and no migration path when the schema changes. Raw SQLite
    lacks migrations, relationships, and SwiftUI integration, requiring 10x more code for equivalent functionality.

    '
  how_to_do_right: '1. SwiftData for new apps targeting iOS 17+ (simplest API)

    2. Core Data for apps supporting iOS 16 (more mature, same underlying storage)

    3. UserDefaults ONLY for: simple preferences, feature flags, small scalars

    4. Keychain for credentials (via KeychainAccess library or Security framework)

    5. Define schema migrations explicitly — never rely on auto-migration in production

    6. Use @Query in SwiftUI for live-updating views

    '
  severity: high
  technologies:
    lang: [swift]
    library: [swiftdata, core data]
    platform: [mobile, ios]
  domains:
    domain: [architecture, mobile]
    concern: [data, persistence]
  example_good: "import SwiftData\n\n// SwiftData model — @Model macro generates persistence code\n@Model\nclass Task {\n\
    \    var title: String\n    var isCompleted: Bool\n    var createdAt: Date\n    @Relationship(deleteRule: .cascade) var\
    \ subtasks: [Subtask]\n\n    init(title: String) {\n        self.title = title\n        self.isCompleted = false\n   \
    \     self.createdAt = .now\n        self.subtasks = []\n    }\n}\n\n@Model\nclass Subtask {\n    var title: String\n\
    \    var isCompleted: Bool\n\n    init(title: String) {\n        self.title = title\n        self.isCompleted = false\n\
    \    }\n}\n\n// SwiftUI view with live @Query\nstruct TaskListView: View {\n    @Query(sort: \\Task.createdAt, order:\
    \ .reverse)\n    private var tasks: [Task]\n\n    @Environment(\\.modelContext) private var context\n\n    var body: some\
    \ View {\n        List(tasks) { task in\n            TaskRow(task: task)\n                .swipeActions {\n          \
    \          Button(role: .destructive) {\n                        context.delete(task)\n                    } label: {\n\
    \                        Label(\"Delete\", systemImage: \"trash\")\n                    }\n                }\n       \
    \ }\n    }\n}\n\n// App setup\n@main\nstruct MyApp: App {\n    var body: some Scene {\n        WindowGroup { TaskListView()\
    \ }\n            .modelContainer(for: [Task.self, Subtask.self])\n    }\n}\n"
  example_bad: "// UserDefaults for structured data — slow, fragile, no relationships\nfunc saveTasks(_ tasks: [Task]) {\n\
    \    let data = try? JSONEncoder().encode(tasks)\n    UserDefaults.standard.set(data, forKey: \"tasks\")\n    // No relationships,\
    \ no queries, no live updates\n    // Concurrent writes corrupt data\n    // 100+ tasks = slow app launch\n}\n\nfunc loadTasks()\
    \ -> [Task] {\n    guard let data = UserDefaults.standard.data(forKey: \"tasks\"),\n          let tasks = try? JSONDecoder().decode([Task].self,\
    \ from: data)\n    else { return [] }\n    return tasks\n    // Schema change (add field) = all data lost without migration\
    \ logic\n}\n"
  when_applies: Projects using Swift/iOS development, SwiftData, Core Data, or iOS
  when_not_applies: web-only applications, backend services, desktop applications
