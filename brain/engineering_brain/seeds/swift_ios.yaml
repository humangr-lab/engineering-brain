- id: CR-SWIFT-008
  text: Store credentials in Keychain — never in UserDefaults, plist files, or hardcoded in code
  why: 'UserDefaults stores data in a plain-text plist file readable by any process with file system access (jailbroken device,
    iTunes backup, forensic tools). Keychain encrypts data with the device''s Secure Enclave hardware, surviving app reinstalls
    (optional) and iCloud sync (optional). Storing tokens, passwords, API keys, or biometric-protected secrets in UserDefaults
    is a security vulnerability that fails Apple App Store security review and violates OWASP Mobile Top 10 (M9: Insecure
    Data Storage). A single leaked auth token enables full account takeover.

    '
  how_to_do_right: '1. Use KeychainAccess library (Swift wrapper) or Security framework directly

    2. Set accessibility level: .afterFirstUnlockThisDeviceOnly for auth tokens

    3. Use .whenUnlockedThisDeviceOnly for biometric-protected secrets

    4. Set kSecAttrSynchronizable to false for device-specific credentials

    5. Clear Keychain on first launch after reinstall if needed (detect via UserDefaults flag)

    6. Never log or print Keychain values — even in debug builds

    '
  severity: critical
  technologies:
    lang: [swift]
    platform: [mobile, ios]
  domains:
    domain: [architecture, mobile, security]
  example_good: "import KeychainAccess\n\nenum SecureStorage {\n    private static let keychain = Keychain(service: \"com.myapp.auth\"\
    )\n        .accessibility(.afterFirstUnlockThisDeviceOnly)\n        .synchronizable(false) // don't sync to iCloud\n\n\
    \    static func saveToken(_ token: String) throws {\n        try keychain.set(token, key: \"auth_token\")\n    }\n\n\
    \    static func getToken() throws -> String? {\n        try keychain.get(\"auth_token\")\n    }\n\n    static func deleteToken()\
    \ throws {\n        try keychain.remove(\"auth_token\")\n    }\n\n    // Biometric-protected secret\n    static func saveBiometricSecret(_\
    \ secret: String) throws {\n        let biometricKeychain = Keychain(service: \"com.myapp.wallet\")\n            .accessibility(.whenPasscodeSetThisDeviceOnly,\
    \ authenticationPolicy: .biometryAny)\n            .authenticationPrompt(\"Authenticate to access your wallet\")\n\n \
    \       try biometricKeychain.set(secret, key: \"wallet_key\")\n    }\n\n    static func getBiometricSecret() throws ->\
    \ String? {\n        let biometricKeychain = Keychain(service: \"com.myapp.wallet\")\n            .accessibility(.whenPasscodeSetThisDeviceOnly,\
    \ authenticationPolicy: .biometryAny)\n            .authenticationPrompt(\"Authenticate to access your wallet\")\n\n \
    \       return try biometricKeychain.get(\"wallet_key\")\n        // iOS shows Face ID/Touch ID prompt automatically\n\
    \    }\n}\n"
  example_bad: '// UserDefaults — plaintext, readable by any tool

    UserDefaults.standard.set(authToken, forKey: "auth_token")

    // Visible in: iTunes backup, iExplorer, jailbroken device file browser


    // Hardcoded API key — extracted with ''strings'' command

    let apiKey = "sk-live-abc123def456" // in binary, extractable


    // Plist file — plaintext

    let plist = Bundle.main.path(forResource: "Secrets", ofType: "plist")!

    let secrets = NSDictionary(contentsOfFile: plist)!

    let key = secrets["api_key"] as! String

    // Anyone who downloads your .ipa can read this

    '
  when_applies: Any project using Swift/iOS development or iOS
  when_not_applies: web-only applications, backend services, desktop applications. projects not using Swift or iOS
  sources: ["https://developer.apple.com/documentation/security/keychain_services"]
- id: CR-SWIFT-009
  text: Use Instruments to profile CPU, memory, and network — never optimize without measurement
  why: 'iOS performance optimization without Instruments is guesswork. Developers commonly optimize the wrong thing: spending
    hours on algorithm complexity when the real bottleneck is a retained view controller leaking 50MB per screen transition.
    Instruments provides precise, sample-level data: Time Profiler shows exactly which function consumes CPU, Allocations
    shows every allocation and its retain count, Leaks detects reference cycles in real time, and Network shows every HTTP
    request with timing. A 30-minute Instruments session routinely finds issues that weeks of code review miss.

    '
  how_to_do_right: '1. Time Profiler first — find the hot function before optimizing

    2. Allocations — check for unexpected growth (leak without Leaks detection)

    3. Leaks — find reference cycles (closure captures, delegate strong references)

    4. Network — verify no duplicate requests, proper caching

    5. Core Animation — find offscreen rendering, blending, misaligned images

    6. Profile on the OLDEST supported device — not your M-series Mac

    '
  severity: high
  technologies:
    lang: [swift]
    library: [xcode]
    platform: [mobile, ios]
  domains:
    domain: [architecture, mobile, performance]
  example_good: "// Common leak: closure capturing self strongly in async context\n// Instruments Leaks template catches this\
    \ at runtime\n\n// GOOD: weak self prevents retain cycle\nclass NetworkManager {\n    var onComplete: ((Data) -> Void)?\n\
    \n    func fetchData() {\n        URLSession.shared.dataTask(with: url) { [weak self] data, _, _ in\n            guard\
    \ let self, let data else { return }\n            self.processData(data)\n        }.resume()\n    }\n}\n\n// GOOD: Use\
    \ lazy loading for heavy views\nstruct ProfileScreen: View {\n    var body: some View {\n        ScrollView {\n      \
    \      LazyVStack(spacing: 16) { // lazy: only builds visible items\n                ForEach(posts) { post in\n      \
    \              PostCard(post: post)\n                }\n            }\n        }\n    }\n}\n\n// GOOD: AsyncImage with\
    \ downsampling\nAsyncImage(url: avatarURL) { phase in\n    switch phase {\n    case .success(let image):\n        image\n\
    \            .resizable()\n            .scaledToFill()\n            .frame(width: 48, height: 48)\n            .clipShape(Circle())\n\
    \    case .failure:\n        Image(systemName: \"person.circle.fill\")\n    case .empty:\n        ProgressView()\n   \
    \ @unknown default:\n        EmptyView()\n    }\n}\n"
  example_bad: "// Strong self in closure — retain cycle, view controller never deallocated\nclass NetworkManager {\n    func\
    \ fetchData() {\n        URLSession.shared.dataTask(with: url) { data, _, _ in\n            self.processData(data!) //\
    \ strong self capture — retain cycle\n        }.resume()\n    }\n}\n\n// Non-lazy VStack with 1000 items — builds all\
    \ at once\nScrollView {\n    VStack { // not lazy — 1000 PostCards built immediately\n        ForEach(posts) { post in\n\
    \            PostCard(post: post)\n        }\n    }\n}\n\n// Full-resolution image in 48px avatar — 50MB memory per image\n\
    Image(uiImage: UIImage(data: fullResData)!)\n    .frame(width: 48, height: 48) // still decoded at 4000x4000\n"
  when_applies: Projects using Swift/iOS development, iOS, or Xcode
  when_not_applies: web-only applications, backend services, desktop applications
  sources: ["https://developer.apple.com/documentation/xcode/improving-your-app-s-performance"]
- id: CR-SWIFT-010
  text: Use ARC correctly — understand weak and unowned references to prevent retain cycles and crashes
  why: 'Swift uses Automatic Reference Counting (ARC), not garbage collection. Every strong reference increments a counter;
    the object deallocates when the counter hits zero. Two objects strongly referencing each other creates a retain cycle:
    neither can reach zero, causing a permanent memory leak. In a typical app, retain cycles between ViewControllers, closures,
    and delegates can leak hundreds of MB per session, eventually causing iOS to kill the app. weak references (optional,
    nil when deallocated) and unowned references (non-optional, crashes if accessed after deallocation) break cycles.

    '
  how_to_do_right: '1. Delegates should ALWAYS be weak: weak var delegate: SomeDelegate?

    2. Closures capturing self in async contexts: use [weak self] capture list

    3. Use [unowned self] ONLY when you guarantee self outlives the closure

    4. Parent owns child strongly; child references parent weakly

    5. Use Instruments Leaks template to verify — don''t trust code review alone

    6. In SwiftUI: @StateObject owns, @ObservedObject doesn''t — no manual weak needed

    '
  severity: critical
  technologies:
    lang: [swift]
    platform: [mobile, ios]
  domains:
    domain: [architecture, mobile, performance]
    concern: [memory]
  example_good: "// Delegate pattern — weak to prevent retain cycle\nprotocol NetworkDelegate: AnyObject { // AnyObject required\
    \ for weak\n    func didReceiveData(_ data: Data)\n}\n\nclass NetworkService {\n    weak var delegate: NetworkDelegate?\
    \ // weak: no retain cycle\n}\n\n// Closure with weak self\nclass UserViewModel {\n    var cancellable: AnyCancellable?\n\
    \n    func observe() {\n        cancellable = NotificationCenter.default\n            .publisher(for: .userDidUpdate)\n\
    \            .sink { [weak self] notification in\n                guard let self else { return } // early exit if deallocated\n\
    \                self.handleUpdate(notification)\n            }\n    }\n\n    deinit {\n        cancellable?.cancel()\n\
    \        print(\"UserViewModel deallocated\") // verify this prints!\n    }\n}\n\n// Timer — classic retain cycle source\n\
    class CountdownTimer {\n    private var timer: Timer?\n\n    func start() {\n        timer = Timer.scheduledTimer(withTimeInterval:\
    \ 1.0, repeats: true) {\n            [weak self] _ in\n            self?.tick() // weak: timer doesn't prevent deallocation\n\
    \        }\n    }\n\n    func stop() {\n        timer?.invalidate()\n        timer = nil\n    }\n\n    deinit { stop()\
    \ } // cleanup on dealloc\n}\n"
  example_bad: "// Strong delegate — retain cycle\nclass NetworkService {\n    var delegate: NetworkDelegate? // strong: retains\
    \ delegate\n    // delegate retains service → cycle → both leak\n}\n\n// Closure retaining self — timer keeps VC alive\
    \ forever\nclass MyViewController: UIViewController {\n    func startTimer() {\n        Timer.scheduledTimer(withTimeInterval:\
    \ 1.0, repeats: true) { _ in\n            self.updateUI() // strong capture of self\n            // Timer retains closure\
    \ → closure retains self → self retains timer\n            // VC NEVER deallocates even after dismiss\n        }\n   \
    \ }\n}\n\n// unowned crash — object deallocated before closure runs\nclass Requester {\n    func fetch() {\n        api.request\
    \ { [unowned self] data in\n            self.process(data) // CRASH if Requester deallocated before response\n       \
    \ }\n    }\n}\n"
  when_applies: Any project using Swift/iOS development or iOS
  when_not_applies: web-only applications, backend services, desktop applications. projects not using Swift or iOS
  sources: ["https://docs.swift.org/swift-book/documentation/the-swift-programming-language/automaticreferencecounting/"]
- id: CR-SWIFT-011
  text: Use BGTaskScheduler for background processing and handle push notifications through the UserNotifications framework
    with proper lifecycle management
  why: 'iOS strictly limits background execution: apps get ~30 seconds after entering background, then are suspended. BGTaskScheduler
    (iOS 13+) requests background time from the OS for maintenance tasks (data sync, cleanup, ML model updates) and processing
    tasks (long-running work up to minutes). Without BGTaskScheduler, apps that need background sync resort to hacks (silent
    push notifications, background audio) that Apple rejects during App Review. Push notifications require proper UNUserNotificationCenter
    setup with category actions, provisional authorization, and background fetch handling for silent pushes.

    '
  how_to_do_right: '1. Register BGTaskScheduler identifiers in Info.plist BGTaskSchedulerPermittedIdentifiers

    2. Register handlers in application(_:didFinishLaunchingWithOptions:) or @main App init

    3. Schedule tasks with BGTaskScheduler.shared.submit()

    4. Handle expiration: task.expirationHandler to save progress

    5. For push: request authorization early, handle both foreground and background delivery

    6. Use provisional authorization for quiet notifications (no prompt to user)

    '
  severity: high
  technologies:
    lang: [swift]
    platform: [mobile, ios]
  domains:
    domain: [architecture, mobile]
    concern: [lifecycle]
  example_good: "import BackgroundTasks\nimport UserNotifications\n\n// App entry — register background tasks\n@main\nstruct\
    \ MyApp: App {\n    init() {\n        BGTaskScheduler.shared.register(\n            forTaskWithIdentifier: \"com.app.sync\"\
    ,\n            using: nil\n        ) { task in\n            Self.handleSync(task: task as! BGAppRefreshTask)\n       \
    \ }\n    }\n\n    static func handleSync(task: BGAppRefreshTask) {\n        // Schedule next sync\n        scheduleSync()\n\
    \n        let syncTask = Task {\n            do {\n                try await DataSyncService.shared.sync()\n         \
    \       task.setTaskCompleted(success: true)\n            } catch {\n                task.setTaskCompleted(success: false)\n\
    \            }\n        }\n\n        // Handle expiration — save progress, don't crash\n        task.expirationHandler\
    \ = {\n            syncTask.cancel()\n        }\n    }\n\n    static func scheduleSync() {\n        let request = BGAppRefreshTaskRequest(identifier:\
    \ \"com.app.sync\")\n        request.earliestBeginDate = Date(timeIntervalSinceNow: 3600) // 1 hour\n        try? BGTaskScheduler.shared.submit(request)\n\
    \    }\n\n    var body: some Scene {\n        WindowGroup { ContentView() }\n    }\n}\n\n// Push notification setup\n\
    class NotificationService: NSObject, UNUserNotificationCenterDelegate {\n    func requestPermission() async -> Bool {\n\
    \        let center = UNUserNotificationCenter.current()\n        center.delegate = self\n\n        // Provisional: delivers\
    \ quietly, user can upgrade later\n        let granted = try? await center.requestAuthorization(\n            options:\
    \ [.alert, .badge, .sound, .provisional]\n        )\n        return granted ?? false\n    }\n\n    // Handle notification\
    \ when app is in foreground\n    func userNotificationCenter(\n        _ center: UNUserNotificationCenter,\n        willPresent\
    \ notification: UNNotification\n    ) async -> UNNotificationPresentationOptions {\n        return [.banner, .badge, .sound]\n\
    \    }\n\n    // Handle notification tap\n    func userNotificationCenter(\n        _ center: UNUserNotificationCenter,\n\
    \        didReceive response: UNNotificationResponse\n    ) async {\n        let data = response.notification.request.content.userInfo\n\
    \        DeepLinkService.shared.handle(data)\n    }\n}\n"
  example_bad: "// Background hack — Apple will reject this\nfunc applicationDidEnterBackground(_ application: UIApplication)\
    \ {\n    // Starting background audio to keep app alive — App Store rejection\n    audioPlayer.play()\n\n    // Or: beginning\
    \ a background task without expiration handler\n    UIApplication.shared.beginBackgroundTask {\n        // No cleanup\
    \ — app will be terminated by OS\n    }\n}\n\n// Push notification without proper delegate\n// Result: notifications not\
    \ shown when app is in foreground\n// Result: notification taps don't navigate to correct screen\n"
  when_applies: Projects using Swift/iOS development or iOS
  when_not_applies: web-only applications, backend services, desktop applications. projects not using Swift or iOS
  sources: ["https://developer.apple.com/documentation/backgroundtasks", "https://developer.apple.com/documentation/usernotifications"]
- id: CR-SWIFT-012
  text: Use the Coordinator pattern to separate navigation logic from Views and ViewModels
  why: 'SwiftUI''s NavigationStack and NavigationLink couple navigation to the view layer. When a ViewModel needs to trigger
    navigation (after login success, after payment completion), it must either expose navigation state that the View observes,
    or the View must contain navigation logic. Both approaches pollute the View/ViewModel boundary. The Coordinator pattern
    centralizes navigation in a dedicated object that owns the navigation path, handles deep links, and manages the flow between
    screens. This makes flows testable (test Coordinator without rendering views) and reusable (same screens, different flows).

    '
  how_to_do_right: '1. One Coordinator per major flow (auth flow, checkout flow, settings flow)

    2. Coordinator owns NavigationPath and publishes it to NavigationStack

    3. ViewModels call coordinator methods (coordinator.showProfile(userId))

    4. Coordinator is injected as @EnvironmentObject or passed explicitly

    5. Child coordinators for nested flows (checkout has shipping → payment → confirmation)

    6. Coordinator handles deep links by pushing appropriate screens

    '
  severity: medium
  technologies:
    lang: [swift]
    framework: [swiftui]
    platform: [mobile, ios]
  domains:
    domain: [architecture, mobile]
    concern: [frontend, navigation]
  example_good: "// Route enum — type-safe navigation destinations\nenum AppRoute: Hashable {\n    case home\n    case profile(userId:\
    \ String)\n    case settings\n    case checkout(cartId: String)\n}\n\n// Coordinator — owns navigation state\n@MainActor\n\
    class AppCoordinator: ObservableObject {\n    @Published var path = NavigationPath()\n\n    func showProfile(_ userId:\
    \ String) {\n        path.append(AppRoute.profile(userId: userId))\n    }\n\n    func showCheckout(_ cartId: String) {\n\
    \        path.append(AppRoute.checkout(cartId: cartId))\n    }\n\n    func popToRoot() {\n        path.removeLast(path.count)\n\
    \    }\n\n    func handleDeepLink(_ url: URL) {\n        guard let route = DeepLinkParser.parse(url) else { return }\n\
    \        switch route {\n        case .profile(let userId):\n            popToRoot()\n            showProfile(userId)\n\
    \        case .checkout(let cartId):\n            showCheckout(cartId)\n        default:\n            break\n        }\n\
    \    }\n}\n\n// Root view — NavigationStack bound to Coordinator\nstruct AppRootView: View {\n    @StateObject private\
    \ var coordinator = AppCoordinator()\n\n    var body: some View {\n        NavigationStack(path: $coordinator.path) {\n\
    \            HomeScreen()\n                .navigationDestination(for: AppRoute.self) { route in\n                   \
    \ switch route {\n                    case .home: HomeScreen()\n                    case .profile(let userId): ProfileScreen(userId:\
    \ userId)\n                    case .settings: SettingsScreen()\n                    case .checkout(let cartId): CheckoutScreen(cartId:\
    \ cartId)\n                    }\n                }\n        }\n        .environmentObject(coordinator)\n    }\n}\n\n\
    // ViewModel uses coordinator — no navigation logic in View\nclass HomeViewModel: ObservableObject {\n    let coordinator:\
    \ AppCoordinator\n\n    func onUserTapped(_ userId: String) {\n        coordinator.showProfile(userId)\n    }\n}\n"
  example_bad: "// Navigation logic in View — untestable, scattered\nstruct HomeScreen: View {\n    @State private var showProfile\
    \ = false\n    @State private var selectedUserId: String?\n\n    var body: some View {\n        VStack {\n           \
    \ Button(\"Profile\") {\n                selectedUserId = \"123\"\n                showProfile = true // navigation state\
    \ in View\n            }\n        }\n        .navigationDestination(isPresented: $showProfile) {\n            if let id\
    \ = selectedUserId {\n                ProfileScreen(userId: id)\n            }\n        }\n    }\n    // How do you deep\
    \ link to profile? Duplicate this logic somewhere else.\n    // How do you test navigation? Render the entire view.\n\
    }\n"
  when_applies: Projects using Swift/iOS development, SwiftUI, or iOS
  when_not_applies: web-only applications, backend services, desktop applications
  sources: ["https://developer.apple.com/documentation/swiftui/navigationstack"]
