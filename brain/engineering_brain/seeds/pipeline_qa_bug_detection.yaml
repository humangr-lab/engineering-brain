layer: rules
domain: sacada
knowledge:
- id: PQB-001
  text: "Systematic bug scan methodology — scan code in a deterministic order: security, correctness, performance, maintainability. Random scanning misses patterns; systematic scanning finds categories."
  why: >
    Ad-hoc code review finds bugs randomly — whichever bug catches the reviewer's eye first. Systematic scanning
    finds bugs by category, which means entire classes of bugs are either found or provably absent. When you scan
    for SQL injection across the entire codebase in one pass, you either find all instances or you can say with
    confidence "there are no SQL injection vulnerabilities." Random scanning can never make this claim. The order
    matters too: security bugs before correctness bugs because a security bug in production is catastrophic, while
    a correctness bug is merely expensive.
  how_to_do_right: >
    1. Scan in this order: SECURITY (injection, auth, secrets) → CORRECTNESS (logic, edge cases, types) → PERFORMANCE (N+1, unbounded, leaks) → MAINTAINABILITY (duplication, naming, complexity).

    2. For each category, use a checklist of known bug patterns (this seed file is that checklist).

    3. Complete ONE category across ALL files before moving to the next category.

    4. Record findings in a structured format: file, line, category, severity, description.

    5. Do NOT fix bugs during scanning — just record them. Fixing during scanning breaks your scanning focus.

    6. After scanning all categories, prioritize findings by severity and fix in that order.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing, security]
    concern: [meta_cognition]
  example_good: |
    # Systematic Bug Scan Report for Sprint S05:
    # SECURITY PASS:
    # - [CRITICAL] src/api/claims.py:47 — SQL injection via string interpolation
    # - [HIGH] src/auth/token.py:23 — JWT secret hardcoded
    # CORRECTNESS PASS:
    # - [MEDIUM] src/services/verify.py:89 — off-by-one in pagination
    # - [MEDIUM] src/models/claim.py:34 — float comparison without epsilon
    # PERFORMANCE PASS:
    # - [HIGH] src/services/report.py:12 — N+1 query in report generation
    # MAINTAINABILITY PASS:
    # - [LOW] src/utils/helpers.py — 3 nearly identical functions, should be consolidated

    # Total: 5 findings (1 critical, 2 high, 2 medium)
    # Fix order: SQL injection → hardcoded secret → N+1 query → pagination → float comparison
  example_bad: |
    # Reviewer opens file, starts reading line by line:
    # "This variable name could be better..."
    # "Oh, there's a typo in this comment..."
    # "Wait, is this SQL safe? Hmm, probably..."
    # Reviews 3 of 15 files before running out of time
    # Misses the SQL injection in file 7 and the hardcoded secret in file 12
  when_applies: During every code review and QA scan. Use the systematic approach for any codebase larger than a few files. The checklist should be maintained and updated with new patterns found in production incidents.
  sources: ["https://owasp.org/www-project-code-review-guide/"]

- id: PQB-002
  text: "Boundary-first search strategy — when testing a function, test the boundaries FIRST: min, max, zero, empty, one-before-limit, one-after-limit. Boundaries are where 80% of bugs live."
  why: >
    Off-by-one errors, integer overflows, empty collection handling, and limit violations account for the majority
    of logic bugs. These bugs all share a common trait: they occur at BOUNDARIES — the edges of valid input ranges.
    A function that works for inputs 1-99 but fails for 0, 100, or -1 is a function that works in testing and fails
    in production. Boundary-first testing is the highest-ROI testing strategy because it finds the most bugs with
    the fewest tests.
  how_to_do_right: >
    1. For every numeric parameter: test min, max, 0, -1, min-1, max+1.

    2. For every string parameter: test "", single char, max length, max length + 1.

    3. For every collection parameter: test [], single element, max size.

    4. For every pagination: test page 0, page 1, last page, last page + 1.

    5. For every time-based logic: test midnight, end of day, leap year, DST transition.

    6. Write boundary tests BEFORE happy-path tests — they find more bugs per test.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing, security]
    concern: [meta_cognition]
  example_good: |
    import pytest

    class TestPagination:
        def test_page_zero(self):
            """Page 0 should return first page or error."""
            result = paginate(items, page=0, per_page=10)
            assert result.page == 1  # Normalized to 1

        def test_page_one(self):
            result = paginate(items_100, page=1, per_page=10)
            assert len(result.items) == 10

        def test_last_page(self):
            result = paginate(items_100, page=10, per_page=10)
            assert len(result.items) == 10
            assert result.has_next is False

        def test_beyond_last_page(self):
            result = paginate(items_100, page=11, per_page=10)
            assert len(result.items) == 0

        def test_negative_page(self):
            with pytest.raises(ValueError):
                paginate(items_100, page=-1, per_page=10)

        def test_per_page_zero(self):
            with pytest.raises(ValueError):
                paginate(items_100, page=1, per_page=0)

        def test_empty_collection(self):
            result = paginate([], page=1, per_page=10)
            assert len(result.items) == 0
            assert result.total == 0
  example_bad: |
    def test_pagination():
        result = paginate(items_100, page=2, per_page=10)
        assert len(result.items) == 10
        # Only tests the happy path in the middle
        # Misses: page 0, negative page, empty list, last page, beyond last page
  when_applies: When writing tests for any function that accepts numeric, string, or collection inputs. Boundary tests should be written FIRST, before happy-path tests.
  sources: ["https://hypothesis.readthedocs.io/en/latest/details.html#boundary-values"]

- id: PQB-003
  text: "N+1 query detection — for every endpoint or function that returns a list, verify it does NOT execute a separate query for each item. N+1 queries turn O(1) endpoints into O(N) disasters."
  why: >
    The N+1 query problem is the most common performance bug in web applications. It occurs when code fetches a
    list of N items and then executes a separate query for each item to load related data. For 10 items, this is
    11 queries instead of 2. For 1000 items, this is 1001 queries instead of 2. Each query has network overhead
    (1-5ms), so 1000 queries add 1-5 seconds of latency. The insidious part is that N+1 queries work fine in
    development (10 items, 50ms) and only become a problem in production (10,000 items, 50 seconds).
  how_to_do_right: >
    1. For every function that processes a list, count the SQL queries executed.

    2. The query count should be O(1) — constant regardless of list size — not O(N).

    3. Use eager loading (joinedload, selectinload in SQLAlchemy) for related objects.

    4. Use batch queries: fetch all related objects in one query with WHERE id IN (...).

    5. Add a test that asserts query count: with assert_num_queries(2): endpoint().

    6. Use a query logger in development to visualize query patterns.

    7. Profile with realistic data volumes (1000+ items) in staging.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing, security]
    concern: [meta_cognition]
  example_good: |
    from sqlalchemy.orm import selectinload

    # GOOD: 2 queries regardless of N
    async def get_claims_with_sources(session, limit=100):
        query = (
            select(Claim)
            .options(selectinload(Claim.sources))  # Eager load sources
            .limit(limit)
        )
        result = await session.execute(query)
        return result.scalars().all()
        # Query 1: SELECT * FROM claims LIMIT 100
        # Query 2: SELECT * FROM sources WHERE claim_id IN (1,2,...,100)
        # Total: 2 queries for any N

    def test_no_n_plus_1():
        with count_queries() as counter:
            claims = get_claims_with_sources(session, limit=100)
        assert counter.count <= 3, f"N+1 detected: {counter.count} queries for {len(claims)} items"
  example_bad: |
    # BAD: N+1 queries
    async def get_claims_with_sources(session, limit=100):
        claims = await session.execute(select(Claim).limit(limit))
        results = []
        for claim in claims.scalars():
            # Each iteration executes a separate query!
            sources = await session.execute(
                select(Source).where(Source.claim_id == claim.id)
            )
            claim.sources = sources.scalars().all()
            results.append(claim)
        return results
        # 1 + 100 = 101 queries for 100 claims
        # Dev environment: 101 * 1ms = 100ms (seems fine)
        # Production: 101 * 5ms = 500ms (unacceptable)
  when_applies: Every database query that returns a list or processes a collection. Especially critical in API endpoints that return paginated lists with related objects.
  sources: ["https://www.sqlalchemy.org/features.html", "https://docs.djangoproject.com/en/stable/topics/db/queries/#retrieving-specific-objects-with-filters"]

- id: PQB-004
  text: "SQL injection scan — for every database query, verify parameters are bound (not interpolated). A single string-interpolated query is a critical vulnerability, regardless of how 'internal' the endpoint is."
  why: >
    SQL injection is consistently in the OWASP Top 10 because it allows attackers to read, modify, or delete
    any data in the database, and in some cases execute system commands. The fix is trivially simple: use
    parameterized queries. Yet SQL injection persists because developers use string interpolation for "just this
    one quick query" or believe their internal endpoints are not exposed. There is no such thing as a safe
    unparameterized query — even internal endpoints can be reached through SSRF, proxy misconfigurations, or
    compromised internal services.
  how_to_do_right: >
    1. NEVER use f-strings, format(), or % for SQL queries. ALWAYS use parameterized queries.

    2. Use ORM methods (SQLAlchemy, Django ORM) which parameterize automatically.

    3. If using raw SQL, use placeholders: cursor.execute("SELECT * FROM users WHERE id = %s", (user_id,)).

    4. Scan the entire codebase for SQL string interpolation: grep for f"SELECT, f"INSERT, f"UPDATE, f"DELETE.

    5. Add a linting rule that flags string interpolation in SQL queries.

    6. Test with known SQL injection payloads: "'; DROP TABLE users;--".
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing, security]
    concern: [meta_cognition]
  example_good: |
    from sqlalchemy import select, text

    # SAFE: Parameterized query via ORM
    async def get_user(session, user_id: str):
        result = await session.execute(select(User).where(User.id == user_id))
        return result.scalar_one_or_none()

    # SAFE: Parameterized raw SQL
    async def search_users(session, name: str):
        result = await session.execute(
            text("SELECT * FROM users WHERE name LIKE :pattern"),
            {"pattern": f"%{name}%"},
        )
        return result.all()

    # Automated scan:
    def test_no_sql_injection_patterns():
        import subprocess
        result = subprocess.run(
            ["grep", "-rn", r'f"SELECT\|f"INSERT\|f"UPDATE\|f"DELETE', "src/"],
            capture_output=True, text=True,
        )
        assert result.stdout == "", f"SQL injection risk:\n{result.stdout}"
  example_bad: |
    # VULNERABLE: String interpolation
    async def get_user(session, user_id: str):
        result = await session.execute(
            text(f"SELECT * FROM users WHERE id = '{user_id}'")
        )
        return result.first()

    # Attack: user_id = "'; DROP TABLE users; --"
    # Executed: SELECT * FROM users WHERE id = ''; DROP TABLE users; --'
    # Result: users table deleted
  when_applies: Every database query in the codebase. Scan on every code review and periodically (weekly) scan the entire codebase. Zero tolerance for string-interpolated SQL.
  sources: ["https://cheatsheetseries.owasp.org/cheatsheets/SQL_Injection_Prevention_Cheat_Sheet.html"]

- id: PQB-005
  text: "XSS vulnerability detection — for every user-generated content rendered in HTML, verify it is escaped. Unescaped user content in HTML enables script injection."
  why: >
    Cross-Site Scripting (XSS) allows attackers to execute arbitrary JavaScript in other users' browsers, stealing
    sessions, credentials, and personal data. XSS is the most common web vulnerability because it only takes ONE
    unescaped output to create an exploit. Modern frameworks auto-escape by default, but there are always escape
    hatches (dangerouslySetInnerHTML in React, |safe in Jinja2, v-html in Vue) that developers use "temporarily"
    and forget to remove. Server-rendered HTML, email templates, and PDF generation are especially vulnerable
    because they often bypass framework auto-escaping.
  how_to_do_right: >
    1. Use frameworks that auto-escape HTML output by default (React, Jinja2 with autoescape=True).

    2. Scan for escape hatches: grep for dangerouslySetInnerHTML, |safe, v-html, innerHTML, document.write.

    3. For each escape hatch, verify the content is sanitized (DOMPurify, bleach, or similar).

    4. Validate Content-Type headers: API responses should be application/json, not text/html.

    5. Set Content-Security-Policy headers to prevent inline scripts.

    6. Test with XSS payloads: <script>alert(1)</script>, <img onerror="alert(1)">, javascript:alert(1).
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing, security]
    concern: [meta_cognition]
  example_good: |
    import bleach
    from markupsafe import escape

    # SAFE: User content is sanitized before rendering
    def render_claim(claim_text: str) -> str:
        safe_text = bleach.clean(claim_text, tags=[], strip=True)
        return f"<div class='claim'>{escape(safe_text)}</div>"

    # SAFE: API returns JSON, not HTML
    @app.get("/api/claims/{claim_id}")
    async def get_claim(claim_id: str):
        claim = await db.get_claim(claim_id)
        return {"text": claim.text}  # JSON response, no HTML rendering

    # Test for XSS:
    def test_xss_prevention():
        xss_payloads = [
            "<script>alert(1)</script>",
            '<img onerror="alert(1)" src=x>',
            "javascript:alert(1)",
        ]
        for payload in xss_payloads:
            response = client.post("/claims", json={"text": payload})
            claim = response.json()
            assert "<script>" not in claim["text"]
            assert "onerror" not in claim["text"]
  example_bad: |
    # VULNERABLE: User content rendered as raw HTML
    @app.get("/claims/{claim_id}", response_class=HTMLResponse)
    async def get_claim_html(claim_id: str):
        claim = await db.get_claim(claim_id)
        return f"<h1>{claim.text}</h1>"  # If claim.text = "<script>steal(cookies)</script>"
        # Browser executes the script, stealing user's session
  when_applies: Every place where user-generated content is rendered in HTML (web pages, email templates, PDF reports, admin dashboards). Scan on every code review.
  sources: ["https://cheatsheetseries.owasp.org/cheatsheets/Cross_Site_Scripting_Prevention_Cheat_Sheet.html"]

- id: PQB-006
  text: "CSRF protection verification — for every state-changing endpoint (POST, PUT, DELETE), verify that CSRF protection is active. Missing CSRF allows attackers to perform actions as the victim."
  why: >
    Cross-Site Request Forgery (CSRF) tricks a logged-in user's browser into making requests to your application.
    If user A is logged into your app and visits a malicious site, that site can submit forms to your app as user A.
    Without CSRF protection, any state-changing operation (transfer money, change email, delete account) can be
    triggered by a third-party site. The fix is simple: require a CSRF token on every state-changing request. Modern
    frameworks include CSRF protection, but it must be verified — especially for API endpoints that use cookie-based
    auth.
  how_to_do_right: >
    1. Enable CSRF protection in your framework (Django CSRF middleware, FastAPI with CSRF middleware).

    2. For APIs using cookie-based auth: require CSRF tokens on all POST/PUT/DELETE requests.

    3. For APIs using token-based auth (Bearer tokens): CSRF protection is less critical but still recommended.

    4. Test that state-changing requests WITHOUT a CSRF token are rejected (403).

    5. Verify SameSite cookie attribute is set to Strict or Lax.

    6. Verify CORS is configured to only allow requests from trusted origins.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing, security]
    concern: [meta_cognition]
  example_good: |
    from fastapi_csrf_protect import CsrfProtect

    @app.post("/claims/{claim_id}/delete")
    async def delete_claim(claim_id: str, csrf: CsrfProtect = Depends()):
        csrf.validate_csrf()  # Raises 403 if token missing or invalid
        await db.delete_claim(claim_id)
        return {"status": "deleted"}

    def test_csrf_protection():
        # Without CSRF token → rejected
        response = client.post("/claims/123/delete")
        assert response.status_code == 403

        # With valid CSRF token → accepted
        csrf_token = get_csrf_token()
        response = client.post(
            "/claims/123/delete",
            headers={"X-CSRF-Token": csrf_token},
        )
        assert response.status_code == 200
  example_bad: |
    @app.post("/claims/{claim_id}/delete")
    async def delete_claim(claim_id: str):
        await db.delete_claim(claim_id)  # No CSRF check
        return {"status": "deleted"}

    # Malicious site: <img src="https://yourapp.com/claims/123/delete">
    # Browser sends cookie automatically → claim deleted without user's knowledge
  when_applies: Every state-changing endpoint (POST, PUT, DELETE) in web applications using cookie-based authentication. Less critical for pure API services using Bearer token auth.
  sources: ["https://cheatsheetseries.owasp.org/cheatsheets/Cross-Site_Request_Forgery_Prevention_Cheat_Sheet.html"]

- id: PQB-007
  text: "Authentication bypass attempts — test that every protected endpoint actually checks authentication. A decorator that is missing on one endpoint is a hole in the security perimeter."
  why: >
    Authentication is enforced per-endpoint in most frameworks (decorators, middleware). Missing a single decorator
    on a single endpoint means that endpoint is publicly accessible. In large applications with hundreds of
    endpoints, it is easy to forget the decorator on one new endpoint. This is not a theoretical risk — it is one
    of the most common findings in security audits. The fix is to make authentication the DEFAULT (deny-all) and
    explicitly mark public endpoints, rather than the reverse.
  how_to_do_right: >
    1. Make authentication the DEFAULT for all endpoints (deny-all middleware).

    2. Explicitly mark public endpoints with a decorator (@public or @no_auth_required).

    3. Write a test that discovers ALL endpoints and verifies each one either has auth or is explicitly marked public.

    4. Test each protected endpoint with no credentials → must return 401.

    5. Test each protected endpoint with invalid credentials → must return 401.

    6. Test each protected endpoint with expired credentials → must return 401.

    7. Audit the public endpoint list periodically — minimize the attack surface.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing, security]
    concern: [meta_cognition]
  example_good: |
    import pytest
    from fastapi.testclient import TestClient

    def get_all_endpoints(app):
        """Discover all registered endpoints."""
        endpoints = []
        for route in app.routes:
            if hasattr(route, "methods"):
                for method in route.methods:
                    endpoints.append((method, route.path))
        return endpoints

    PUBLIC_ENDPOINTS = {("GET", "/health"), ("GET", "/docs"), ("GET", "/openapi.json")}

    @pytest.mark.parametrize("method,path", get_all_endpoints(app))
    def test_all_endpoints_require_auth(method, path):
        if (method, path) in PUBLIC_ENDPOINTS:
            pytest.skip("Public endpoint")

        response = client.request(method, path)
        assert response.status_code == 401, (
            f"{method} {path} is accessible without auth! Status: {response.status_code}"
        )
  example_bad: |
    # 99 endpoints have @require_auth
    # 1 new endpoint added without @require_auth:
    @app.get("/admin/export-all-data")  # OOPS — no auth decorator!
    async def export_all_data():
        return await db.export_everything()
    # Publicly accessible endpoint that exports all data
  when_applies: Every endpoint in every service. Run the comprehensive auth test in CI on every PR. Audit the public endpoint list monthly.
  sources: ["https://cheatsheetseries.owasp.org/cheatsheets/Authentication_Cheat_Sheet.html"]

- id: PQB-008
  text: "Authorization escalation testing — test that users cannot escalate their own privileges. A user who can change their role to admin can access everything."
  why: >
    Authorization escalation is when a regular user gains admin or elevated privileges through a bug. Common
    vectors: (1) user can modify their own role field via API, (2) user can access admin endpoints by guessing
    the URL, (3) user can manipulate JWT claims to change their role, (4) user can create resources owned by
    another user by manipulating the owner_id field. Each of these is a critical vulnerability that gives
    attackers full access to the system.
  how_to_do_right: >
    1. Test that users cannot modify their own role via any API endpoint.

    2. Test that regular users cannot access admin endpoints (even if they know the URL).

    3. Test that users cannot create resources owned by other users.

    4. Test that JWT/token claims cannot be manipulated (verify signature).

    5. Test horizontal escalation: user A cannot access user B's resources.

    6. Test vertical escalation: viewer cannot perform admin actions.

    7. Use a deny-by-default permission model — users can only do what is explicitly allowed.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing, security]
    concern: [meta_cognition]
  example_good: |
    import pytest

    class TestAuthorizationEscalation:
        def test_user_cannot_change_own_role(self):
            response = client.patch(
                f"/users/{regular_user.id}",
                json={"role": "admin"},
                headers=regular_user_headers,
            )
            assert response.status_code == 403

            user = db.get_user(regular_user.id)
            assert user.role == "viewer"  # Role unchanged

        def test_user_cannot_access_other_user_data(self):
            response = client.get(
                f"/users/{other_user.id}/claims",
                headers=regular_user_headers,
            )
            assert response.status_code == 403

        def test_user_cannot_create_resource_as_other_user(self):
            response = client.post(
                "/claims",
                json={"text": "claim", "owner_id": other_user.id},  # Trying to set owner
                headers=regular_user_headers,
            )
            # Should either reject or ignore the owner_id field
            if response.status_code == 201:
                claim = response.json()
                assert claim["owner_id"] == regular_user.id  # Overridden to current user
  example_bad: |
    @app.patch("/users/{user_id}")
    async def update_user(user_id: str, data: UserUpdate):
        user = await db.get_user(user_id)
        for field, value in data.dict(exclude_unset=True).items():
            setattr(user, field, value)  # Sets ANY field, including role!
        await db.save(user)
        return user
    # Regular user: PATCH /users/me {"role": "admin"} → now an admin
  when_applies: Every system with roles and permissions. Test during security review and as part of CI security test suite. Critical for any system handling sensitive data or financial operations.
  sources: ["https://owasp.org/Top10/A01_2021-Broken_Access_Control/"]

- id: PQB-009
  text: "Race condition detection — for every shared resource (database record, cache entry, file), verify that concurrent access does not corrupt data. Test with concurrent requests, not just sequential."
  why: >
    Race conditions are the hardest bugs to find because they depend on timing. They do not appear in sequential
    tests. They appear intermittently in production under load. A classic example: two users simultaneously update
    the same record. Both read the old value, both write their update, and one update is silently lost. This is
    called a "lost update" and it is endemic in web applications. The fix is optimistic locking (version numbers),
    pessimistic locking (SELECT FOR UPDATE), or atomic operations (Redis INCR, SQL UPDATE ... SET x = x + 1).
  how_to_do_right: >
    1. Identify ALL shared resources: database records, cache entries, files, counters.

    2. For each shared resource, determine the concurrency control mechanism: optimistic locking, pessimistic locking, or atomic operations.

    3. Write a test that executes concurrent operations and verifies no data is lost or corrupted.

    4. Use asyncio.gather or threading to simulate concurrent requests in tests.

    5. Test the specific race condition: two simultaneous updates, two simultaneous reads-then-writes.

    6. Verify that failed concurrent operations return appropriate errors (409 Conflict for optimistic locking).
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing, security]
    concern: [meta_cognition]
  example_good: |
    import asyncio
    import pytest

    @pytest.mark.asyncio
    async def test_no_lost_update():
        """Two concurrent increments must both be applied."""
        counter = await db.create_counter(value=0)

        async def increment():
            # Atomic increment — no read-modify-write race
            await db.execute(
                "UPDATE counters SET value = value + 1 WHERE id = :id",
                {"id": counter.id},
            )

        # Run 100 concurrent increments
        await asyncio.gather(*[increment() for _ in range(100)])

        result = await db.get_counter(counter.id)
        assert result.value == 100, f"Lost updates! Expected 100, got {result.value}"

    @pytest.mark.asyncio
    async def test_optimistic_locking_detects_conflict():
        """Concurrent updates with optimistic locking must detect conflict."""
        claim = await db.create_claim(text="original", version=1)

        async def update(new_text):
            return await client.patch(
                f"/claims/{claim.id}",
                json={"text": new_text, "version": 1},  # Both use version 1
            )

        results = await asyncio.gather(update("update_a"), update("update_b"))
        statuses = sorted([r.status_code for r in results])
        assert statuses == [200, 409]  # One succeeds, one gets conflict
  example_bad: |
    async def increment_counter(counter_id):
        counter = await db.get_counter(counter_id)  # Read
        counter.value += 1                           # Modify
        await db.save(counter)                       # Write
        # Classic read-modify-write race condition
        # Two concurrent calls: both read value=5, both write value=6
        # One increment is lost
  when_applies: Every shared resource in the system. Especially critical for counters, balances, inventory, status updates, and any data that multiple requests can modify simultaneously.
  sources: ["https://jepsen.io/analyses"]

- id: PQB-010
  text: "Memory leak indicators — for every long-running process, verify that memory usage is bounded. Unbounded caches, growing lists, and unclosed resources are silent killers."
  why: >
    Memory leaks in Python are different from C/C++ — they are usually unbounded data structures rather than
    unreleased allocations. A dict that grows with every request, a list that appends but never trims, a cache
    without a max size — these grow slowly over hours or days until the process is OOM-killed. The process restarts,
    appears healthy for a while, and then dies again. The pattern is insidious because each restart hides the
    evidence. Long-running processes (pipeline workers, background jobs, web servers) are most vulnerable.
  how_to_do_right: >
    1. For every in-memory cache, set a max size (functools.lru_cache(maxsize=N) or cachetools.TTLCache).

    2. For every list that grows during processing, verify it is cleared or bounded.

    3. For every file/socket/connection opened, verify it is closed (use context managers).

    4. Use tracemalloc in development to track memory growth over time.

    5. Set memory limits on containers (--memory flag in Docker).

    6. Monitor memory usage in production and alert on growth trends.

    7. Write a test that runs the operation 10,000 times and verifies memory does not grow linearly.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing, security]
    concern: [meta_cognition]
  example_good: |
    import tracemalloc
    import pytest

    def test_no_memory_leak():
        """Processing 10K items should not grow memory linearly."""
        tracemalloc.start()

        for i in range(10_000):
            process_item(create_test_item(i))

        current, peak = tracemalloc.get_traced_memory()
        tracemalloc.stop()

        # Memory should be bounded, not proportional to 10K items
        assert current < 50 * 1024 * 1024, (  # 50MB max for 10K items
            f"Memory leak: {current / 1024 / 1024:.1f}MB after 10K iterations"
        )

    # Bounded cache:
    from functools import lru_cache

    @lru_cache(maxsize=1000)  # Bounded! Evicts oldest entries
    def get_cached_result(key: str) -> dict:
        return expensive_computation(key)
  example_bad: |
    # Unbounded cache:
    cache = {}

    def get_cached_result(key: str) -> dict:
        if key not in cache:
            cache[key] = expensive_computation(key)
        return cache[key]
    # cache grows forever — 1 million unique keys = 1 million entries in memory
    # OOM-killed after 3 days in production
  when_applies: Every long-running process (web servers, pipeline workers, background jobs). Especially critical for processes with caches, queues, or any growing data structures.
  sources: ["https://sre.google/sre-book/addressing-cascading-failures/"]

- id: PQB-011
  text: "Error swallowing detection — scan for bare except, except Exception pass, and silent error handling. Every swallowed error is a bug that is invisible in production."
  why: >
    Swallowed errors are the dark matter of production bugs. They cause wrong behavior but no visible error. A
    function that catches and ignores an exception returns a default value (None, empty list, 0), and the caller
    proceeds with wrong data. The user sees wrong results, the developer sees no errors in logs, and the bug
    persists for weeks until someone notices the data is wrong. The rule is simple: if you catch an exception,
    you must either (a) handle it correctly, (b) re-raise it, or (c) raise a different exception. Never silence it.
  how_to_do_right: >
    1. Scan the codebase for: bare except, except Exception: pass, except Exception as e: log(e) (log and continue).

    2. For each found instance, determine: is the error handled correctly, or is it swallowed?

    3. "Handled correctly" means: the function returns a valid result that accounts for the error condition.

    4. "Swallowed" means: the function returns a default value that hides the error from the caller.

    5. Replace swallowed errors with: (a) re-raise, (b) raise specific exception, or (c) return a result type that indicates the error.

    6. Add a linting rule that flags bare except and except Exception: pass.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing, security]
    concern: [meta_cognition]
  example_good: |
    # EXPLICIT error handling:
    async def get_user_score(user_id: str) -> float | None:
        try:
            user = await db.get_user(user_id)
            return user.score
        except UserNotFoundError:
            return None  # Expected case — user doesn't exist
        except DatabaseError as e:
            logger.error("Database error fetching user score", user_id=user_id, error=str(e))
            raise  # Re-raise — caller must handle infrastructure errors

    # Automated scan:
    def test_no_swallowed_errors():
        import ast
        import pathlib

        for py_file in pathlib.Path("src").rglob("*.py"):
            tree = ast.parse(py_file.read_text())
            for node in ast.walk(tree):
                if isinstance(node, ast.ExceptHandler):
                    if node.type is None:  # bare except
                        assert False, f"Bare except in {py_file}:{node.lineno}"
  example_bad: |
    async def get_user_score(user_id: str) -> float:
        try:
            user = await db.get_user(user_id)
            return user.score
        except Exception:
            return 0.0  # Swallowed! DB down? User not found? Permission denied?
            # Caller receives 0.0 and proceeds as if score is zero
            # No log, no error, no way to debug
  when_applies: During every code review. Scan the entire codebase periodically for swallowed errors. Every except block must be justified — swallowed errors are bugs.
  sources: ["https://docs.python.org/3/howto/logging.html#exceptions"]

- id: PQB-012
  text: "Hardcoded secrets scan — scan for API keys, passwords, tokens, and connection strings in source code. A single hardcoded secret in a git repo is a permanent exposure."
  why: >
    Once a secret is committed to a git repository, it is in the history forever — even if you delete it in the
    next commit. Anyone with read access to the repository (current employees, former employees, contractors,
    automated tools) can extract the secret. Rotating a leaked secret requires updating every system that uses it,
    which can take hours for a single key and days for widespread credentials. The prevention is trivial: use
    environment variables and .env files (in .gitignore). The cost of prevention is minutes; the cost of a
    leak is hours to days.
  how_to_do_right: >
    1. Use environment variables for ALL secrets (os.getenv or Pydantic BaseSettings).

    2. Use .env files for local development (ALWAYS in .gitignore).

    3. Scan the codebase for secret patterns: API key patterns (sk-, pk-, AKIA), base64 strings > 20 chars, password=, secret=, token=.

    4. Use pre-commit hooks (detect-secrets, gitleaks) to prevent secrets from being committed.

    5. Run secret scans in CI on every PR.

    6. If a secret is found in git history, rotate it IMMEDIATELY — do not just delete the file.

    7. Never log or print secret values (even in debug mode).
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing, security]
    concern: [meta_cognition]
  example_good: |
    import os
    from pydantic_settings import BaseSettings

    class Settings(BaseSettings):
        anthropic_api_key: str  # Read from environment
        database_url: str       # Read from environment

        class Config:
            env_file = ".env"   # .env is in .gitignore

    settings = Settings()

    # Pre-commit hook (.pre-commit-config.yaml):
    # - repo: https://github.com/Yelp/detect-secrets
    #   hooks:
    #     - id: detect-secrets

    # CI scan:
    def test_no_hardcoded_secrets():
        import subprocess
        result = subprocess.run(
            ["detect-secrets", "scan", "--all-files"],
            capture_output=True, text=True,
        )
        findings = json.loads(result.stdout)
        assert len(findings.get("results", {})) == 0, f"Secrets found: {findings}"
  example_bad: |
    # In source code (committed to git):
    ANTHROPIC_API_KEY = "sk-ant-api03-REAL_KEY_HERE"  # Permanent exposure
    DATABASE_URL = "postgresql://admin:P@ssw0rd@prod-db.example.com/main"  # Credentials in code

    # "I'll remove it later" → it's in git history forever
    # Anyone who clones the repo has the production database password
  when_applies: Every commit, every code review, every PR. Run secret scanning in CI and use pre-commit hooks. Zero tolerance for hardcoded secrets.
  sources: ["https://cheatsheetseries.owasp.org/cheatsheets/Secrets_Management_Cheat_Sheet.html"]

- id: PQB-013
  text: "Dependency vulnerability check — scan ALL dependencies for known vulnerabilities. A vulnerable dependency is YOUR vulnerability — attackers do not care whose code the bug is in."
  why: >
    Modern applications have hundreds of dependencies, each of which can have vulnerabilities. Log4Shell (CVE-2021-44228)
    affected every application using Log4j. A vulnerable dependency is as dangerous as vulnerable code you wrote
    yourself — the attacker does not distinguish between your code and your dependency's code. Dependency scanning
    is cheap (automated, runs in seconds) and catches vulnerabilities that no amount of code review can find.
  how_to_do_right: >
    1. Run dependency vulnerability scanning in CI on every PR: pip-audit, safety, or snyk.

    2. Set the scan to FAIL the build on HIGH and CRITICAL vulnerabilities.

    3. Keep dependencies updated: run pip-audit weekly and update vulnerable packages.

    4. Pin dependencies with exact versions (==) to ensure reproducible builds.

    5. Review new dependencies before adding them: how many maintainers? Last update? Known issues?

    6. Monitor dependency advisories (GitHub Dependabot, PyPI advisory database).

    7. Have a process for emergency patching: vulnerability announced → scan → patch → deploy within 24h.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing, security]
    concern: [meta_cognition]
  example_good: |
    # CI pipeline step:
    # pip-audit --strict --desc on --fix --dry-run

    # Automated test:
    def test_no_known_vulnerabilities():
        import subprocess
        result = subprocess.run(
            ["pip-audit", "--strict", "--output", "json"],
            capture_output=True, text=True,
        )
        if result.returncode != 0:
            vulns = json.loads(result.stdout)
            critical = [v for v in vulns if v["fix_versions"]]
            assert len(critical) == 0, (
                f"Dependencies with known vulnerabilities:\n"
                + "\n".join(f"- {v['name']} {v['version']}: {v['id']}" for v in critical)
            )

    # requirements.txt with pinned versions:
    # fastapi==0.109.0
    # pydantic==2.5.3
    # sqlalchemy==2.0.25
  example_bad: |
    # requirements.txt:
    # fastapi>=0.100
    # pydantic
    # sqlalchemy
    # No version pins — any version installed, including vulnerable ones
    # No vulnerability scanning — found out when hackers exploit it
  when_applies: Every build, every PR, every dependency update. Run weekly full scans. Emergency scan when major vulnerabilities are announced (Log4Shell-style events).
  sources: ["https://owasp.org/www-project-dependency-check/"]

- id: PQB-014
  text: "Performance regression indicators — track response times and throughput across deployments. A 10% regression per deploy compounds to 10x slower in 25 deploys."
  why: >
    Performance regressions are the death by a thousand cuts. Each individual change seems fine — it only adds 5ms
    to response time. But after 50 such changes, the endpoint is 250ms slower, and nobody can point to the cause
    because no single commit is responsible. The fix is continuous performance tracking: measure response times
    before and after each deployment, and alert when they degrade beyond a threshold. This turns an invisible
    gradual degradation into a visible, actionable signal.
  how_to_do_right: >
    1. Record baseline performance metrics before each deployment.

    2. Run the same performance tests after deployment and compare.

    3. Alert if any endpoint's p95 latency degrades by more than 10%.

    4. Track performance trends over time (weekly, monthly).

    5. Include performance tests in CI — a PR that degrades performance should be flagged.

    6. Profile specific endpoints that show degradation to identify the cause.

    7. Set performance budgets: "this endpoint must respond in < 200ms."
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing, security]
    concern: [meta_cognition]
  example_good: |
    import pytest
    import time
    import json
    from pathlib import Path

    PERF_BASELINE_FILE = Path("tests/perf_baseline.json")

    @pytest.mark.performance
    def test_no_performance_regression():
        """Compare current performance against baseline."""
        # Measure current
        latencies = {}
        for endpoint in ["/verify", "/claims", "/health"]:
            times = []
            for _ in range(100):
                start = time.monotonic()
                client.get(endpoint)
                times.append(time.monotonic() - start)
            latencies[endpoint] = {"p95": sorted(times)[94]}

        # Compare against baseline
        if PERF_BASELINE_FILE.exists():
            baseline = json.loads(PERF_BASELINE_FILE.read_text())
            for endpoint, metrics in latencies.items():
                if endpoint in baseline:
                    regression = metrics["p95"] / baseline[endpoint]["p95"]
                    assert regression < 1.1, (
                        f"{endpoint} regressed {regression:.0%}: "
                        f"baseline={baseline[endpoint]['p95']:.3f}s, "
                        f"current={metrics['p95']:.3f}s"
                    )
  example_bad: |
    # No performance tracking
    # Deploy 1: /verify responds in 100ms
    # Deploy 10: /verify responds in 150ms (nobody noticed)
    # Deploy 25: /verify responds in 300ms (users complain)
    # Deploy 50: /verify responds in 1000ms (users leave)
    # "When did it get slow?" "We don't know"
  when_applies: Every deployment to staging and production. Performance tests should run in CI and compare against a maintained baseline. Track trends weekly.
  sources: ["https://sre.google/sre-book/monitoring-distributed-systems/"]

- id: PQB-015
  text: "Data consistency bugs — verify that related data stays in sync across tables, caches, and indexes. A claim count that disagrees with the actual claims table is a trust-destroying bug."
  why: >
    Data consistency bugs are among the hardest to diagnose because the data looks correct if you only look at
    one table. The bug only appears when you compare two sources of truth that should agree. Common examples:
    a counter that drifts from the actual count, a cache that serves stale data, an index that is missing entries,
    or a denormalized field that was not updated when the source changed. These bugs erode user trust because the
    system gives contradictory information.
  how_to_do_right: >
    1. Identify ALL denormalized or duplicated data: counters, caches, search indexes, aggregated fields.

    2. For each duplicate, implement a consistency check that compares it against the source of truth.

    3. Run consistency checks periodically (daily) and on demand.

    4. When updating the source of truth, update ALL derived data in the same transaction (or use eventual consistency with reconciliation).

    5. Test that updates to the source of truth propagate to derived data.

    6. Test that derived data can be rebuilt from the source of truth (reconciliation job).
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing, security]
    concern: [meta_cognition]
  example_good: |
    import pytest

    def test_claim_count_consistent():
        """Denormalized claim_count must match actual claims."""
        users = db.get_all_users()
        for user in users:
            actual_count = db.count_claims(user_id=user.id)
            assert user.claim_count == actual_count, (
                f"User {user.id}: claim_count={user.claim_count}, "
                f"actual={actual_count}"
            )

    def test_cache_consistent_with_db():
        """Cached claim must match database claim."""
        claim = db.create_claim(text="test")
        cached = cache.get(f"claim:{claim.id}")
        db_claim = db.get_claim(claim.id)
        assert cached["text"] == db_claim.text
        assert cached["updated_at"] == db_claim.updated_at.isoformat()

    def test_search_index_consistent():
        """Search index must contain all claims from DB."""
        db_claims = set(c.id for c in db.get_all_claims())
        indexed_claims = set(search.get_all_ids())
        missing = db_claims - indexed_claims
        assert len(missing) == 0, f"Claims missing from search index: {missing}"
  example_bad: |
    # User model has claim_count field (denormalized for performance)
    # Create claim → increment claim_count
    # Delete claim → forgot to decrement claim_count!
    # After 100 deletions: user.claim_count shows 500, actual claims: 400
    # UI shows "500 claims" but list only shows 400
  when_applies: Every system with denormalized data, caches, search indexes, or aggregated fields. Run consistency checks daily in production and as part of QA testing.
  sources: ["https://martinfowler.com/articles/data-mesh-principles.html"]

- id: PQB-016
  text: "Timezone handling bugs — test that ALL date/time operations use timezone-aware datetimes (UTC internally, local for display only). Naive datetimes are ambiguous and cause silent bugs."
  why: >
    Timezone bugs are the most subtle bugs in software because they only manifest at specific times (DST transitions,
    cross-timezone operations, midnight edge cases). A naive datetime (no timezone info) is ambiguous — is it UTC?
    Local time? Server time? When you store a naive datetime and read it in a different timezone, you get wrong data.
    When DST transitions happen, naive datetimes can create impossible times (2:30 AM does not exist during spring
    forward) or ambiguous times (1:30 AM happens twice during fall back).
  how_to_do_right: >
    1. Store ALL datetimes in UTC. No exceptions.

    2. Use timezone-aware datetime objects everywhere (datetime.now(UTC), not datetime.now()).

    3. Convert to local timezone ONLY for display, at the last possible moment.

    4. Use the zoneinfo module (Python 3.9+) for timezone conversions.

    5. Test DST transitions: create events before and after spring forward and fall back.

    6. Test midnight edge cases: events at 23:59 and 00:00 in different timezones.

    7. Test date arithmetic across timezone boundaries: "tomorrow" in UTC vs local time.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing, security]
    concern: [meta_cognition]
  example_good: |
    from datetime import datetime, timezone
    from zoneinfo import ZoneInfo
    import pytest

    # ALWAYS use UTC internally:
    def create_claim(text: str) -> Claim:
        return Claim(text=text, created_at=datetime.now(timezone.utc))

    # Convert to local ONLY for display:
    def format_claim_date(claim: Claim, user_tz: str) -> str:
        local_dt = claim.created_at.astimezone(ZoneInfo(user_tz))
        return local_dt.strftime("%Y-%m-%d %H:%M %Z")

    def test_dst_transition():
        """Claims created during DST transition are stored correctly."""
        # Spring forward: 2:00 AM → 3:00 AM (2:30 AM doesn't exist)
        utc_time = datetime(2026, 3, 8, 7, 30, tzinfo=timezone.utc)  # 2:30 AM EST = 7:30 UTC
        claim = Claim(text="test", created_at=utc_time)
        local = claim.created_at.astimezone(ZoneInfo("America/New_York"))
        assert local.hour == 3  # After spring forward: 3:30 AM EDT
  example_bad: |
    from datetime import datetime

    def create_claim(text: str) -> Claim:
        return Claim(text=text, created_at=datetime.now())  # Naive! Which timezone?

    # Server in UTC, user in EST:
    # claim.created_at = 2026-02-26 15:00:00 (UTC, but no timezone info)
    # Display: "Created at 15:00" — user thinks 3 PM their time, actually 10 AM their time
  when_applies: Every date/time operation in the codebase. Especially critical for multi-timezone users, scheduled tasks, data retention, and any time-based business logic.
  sources: ["https://www.iana.org/time-zones", "https://docs.python.org/3/library/datetime.html"]

- id: PQB-017
  text: "Encoding bugs — verify that ALL text processing handles UTF-8 correctly. A function that breaks on non-ASCII input is a function that breaks for 80% of the world's languages."
  why: >
    Unicode handling bugs affect any application used by non-English speakers (which is most applications). Common
    encoding bugs: (1) string length calculation wrong for multi-byte characters (emoji, CJK), (2) truncation in
    the middle of a multi-byte character produces garbage, (3) comparison fails because the same character has
    multiple encodings (NFC vs NFD normalization), (4) database or file I/O silently drops non-ASCII characters.
    These bugs are invisible to English-only developers and testers.
  how_to_do_right: >
    1. Use UTF-8 everywhere: database encoding, file encoding, HTTP headers, API responses.

    2. Test with multi-byte characters: emoji, CJK characters, Arabic, accented Latin.

    3. Test string truncation: truncate by characters, not bytes (len("hello") != len("hello".encode())).

    4. Test string comparison with normalization: unicodedata.normalize("NFC", s1) == unicodedata.normalize("NFC", s2).

    5. Test sorting with locale-aware collation (locale.strxfrm).

    6. Test database round-trip: store and retrieve multi-byte text, verify identity.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing, security]
    concern: [meta_cognition]
  example_good: |
    import pytest

    UNICODE_TEST_CASES = [
        "Hello, World!",               # ASCII
        "Hola, Mundo!",                # Latin accented
        "Bonjour le monde",            # French
        "Olá, Mundo!",                 # Portuguese
        "Test with emoji: 🚀🎉",       # Emoji (4-byte UTF-8)
        "中文测试",                      # Chinese
        "テスト",                        # Japanese
        "한국어",                        # Korean
        "مرحبا",                        # Arabic (RTL)
        "a\u0301",                      # Combining accent (a + acute = á)
    ]

    @pytest.mark.parametrize("text", UNICODE_TEST_CASES)
    def test_claim_round_trip_unicode(text):
        """All Unicode text must survive database round-trip unchanged."""
        claim = create_claim(text=text)
        loaded = get_claim(claim.id)
        assert loaded.text == text

    def test_truncation_respects_characters():
        """Truncation must not break multi-byte characters."""
        text = "🚀" * 100  # Each emoji is 4 bytes
        truncated = truncate(text, max_chars=50)
        assert len(truncated) == 50
        assert truncated.encode("utf-8")  # Must be valid UTF-8
  example_bad: |
    def truncate(text: str, max_bytes: int = 255) -> str:
        return text.encode("utf-8")[:max_bytes].decode("utf-8")
        # Breaks multi-byte characters!
        # "🚀" is 4 bytes — truncating to 3 bytes produces invalid UTF-8
        # UnicodeDecodeError or garbage output
  when_applies: Every function that processes, stores, displays, or transmits text. Test with multi-byte characters in every text-handling test. Critical for any internationalized application.
  sources: ["https://unicode.org/reports/tr15/"]

- id: PQB-018
  text: "Pagination bugs — test that pagination returns ALL items exactly once. Off-by-one errors in pagination mean users either miss items or see duplicates."
  why: >
    Pagination is deceptively simple — divide items into pages and return one page at a time. But the
    implementation has numerous edge cases: off-by-one errors cause missing or duplicate items, sorting changes
    between requests cause items to shift between pages, concurrent inserts cause items to appear or disappear
    mid-pagination, and cursor-based pagination handles deletions differently than offset-based. Each of these
    produces subtle bugs that only manifest when users page through large datasets.
  how_to_do_right: >
    1. Test that paginating through ALL pages returns every item exactly once.

    2. Test the first page, the last page, and beyond the last page.

    3. Test with exactly page_size items (full last page) and page_size + 1 items (one item on last page).

    4. Test that sorting is stable — items do not shift between pages on repeated requests.

    5. Prefer cursor-based pagination over offset-based for large datasets (offset-based is O(N) in the DB).

    6. Test concurrent inserts during pagination — new items should not cause duplicates or gaps.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing, security]
    concern: [meta_cognition]
  example_good: |
    import pytest

    def test_pagination_returns_all_items_exactly_once():
        """Paginating through all pages must return every item exactly once."""
        # Create 57 items (not divisible by page_size=10)
        items = [create_item(f"item_{i}") for i in range(57)]

        all_returned = []
        page = 1
        while True:
            response = client.get(f"/items?page={page}&per_page=10")
            data = response.json()
            if not data["items"]:
                break
            all_returned.extend(data["items"])
            page += 1

        returned_ids = [item["id"] for item in all_returned]
        assert len(returned_ids) == 57, f"Expected 57, got {len(returned_ids)}"
        assert len(set(returned_ids)) == 57, "Duplicate items in pagination"

    def test_pagination_stable_sort():
        """Same page returns same items on repeated requests."""
        r1 = client.get("/items?page=3&per_page=10").json()
        r2 = client.get("/items?page=3&per_page=10").json()
        assert r1["items"] == r2["items"]
  example_bad: |
    @app.get("/items")
    async def list_items(page: int = 1, per_page: int = 10):
        offset = page * per_page  # BUG: should be (page - 1) * per_page
        items = await db.get_items(offset=offset, limit=per_page)
        return {"items": items}
    # Page 1 skips first 10 items (offset=10 instead of offset=0)
    # First 10 items are NEVER returned to any client
  when_applies: Every API endpoint that returns paginated results. Test pagination with varying dataset sizes (0, 1, exactly page_size, page_size + 1, large datasets).
  sources: ["https://www.citusdata.com/blog/2016/03/30/five-ways-to-paginate/"]

- id: PQB-019
  text: "Cache consistency bugs — verify that cache invalidation works correctly. The two hardest problems in CS are cache invalidation, naming things, and off-by-one errors."
  why: >
    Caches improve performance by storing computed results. But when the underlying data changes, the cache must
    be invalidated — otherwise it serves stale data. Cache consistency bugs are insidious because the system works
    correctly most of the time (cache hit → fast, correct response) and only fails after a data change (cache not
    invalidated → fast, WRONG response). The user sees wrong data that "fixes itself" after the cache expires, which
    is maddening to debug and destroys trust in the system.
  how_to_do_right: >
    1. For every cached value, identify what triggers invalidation.

    2. Write a test: update the source data, verify the cache returns the new value (not the old value).

    3. Test cache TTL: verify expired entries are not served.

    4. Test cache stampede: when 1000 concurrent requests hit an expired cache, only ONE recomputes.

    5. Use cache-aside pattern (application manages cache) or write-through (cache updated on every write).

    6. Monitor cache hit rate — a sudden drop indicates an invalidation problem.

    7. Include cache version in the key to enable atomic cache schema changes.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing, security]
    concern: [meta_cognition]
  example_good: |
    import pytest
    import redis

    def test_cache_invalidated_on_update():
        """Cache must return new value after source data is updated."""
        claim = create_claim(text="Original")
        # Warm the cache:
        response1 = client.get(f"/claims/{claim.id}")
        assert response1.json()["text"] == "Original"

        # Update source data:
        update_claim(claim.id, text="Updated")

        # Cache must serve updated data:
        response2 = client.get(f"/claims/{claim.id}")
        assert response2.json()["text"] == "Updated"  # NOT "Original"

    def test_cache_ttl_expiration():
        """Expired cache entries must not be served."""
        cache = redis.Redis()
        cache.setex("test_key", 1, "value")  # TTL = 1 second
        assert cache.get("test_key") == b"value"
        time.sleep(1.1)
        assert cache.get("test_key") is None  # Expired
  example_bad: |
    # Write endpoint updates DB but does not invalidate cache:
    @app.patch("/claims/{claim_id}")
    async def update_claim(claim_id: str, data: ClaimUpdate):
        await db.update_claim(claim_id, data)
        return {"status": "updated"}
        # Forgot: cache.delete(f"claim:{claim_id}")
        # GET /claims/{id} returns stale data from cache for the next 1 hour
  when_applies: Every system that uses caching (Redis, in-memory, CDN). Test cache invalidation for every write operation that affects cached data.
  sources: ["https://martinfowler.com/bliki/TwoHardThings.html"]

- id: PQB-020
  text: "Logging sensitive data detection — scan logs for PII, credentials, tokens, and financial data. A secret that appears in logs is effectively public — logs are the most widely shared artifact."
  why: >
    Logs are shared broadly: developers, ops, support, monitoring tools, log aggregation services, and sometimes
    third-party vendors all have access. A password, API key, credit card number, or SSN in logs is effectively
    public. This is not hypothetical — it is one of the most common findings in security audits. The most
    dangerous pattern is logging entire request/response bodies, which often contain tokens, passwords, and PII.
    Structured logging with explicit field selection (log ONLY what you need) prevents this.
  how_to_do_right: >
    1. Never log request/response bodies in their entirety — select specific fields.

    2. Scan logs for patterns: credit card numbers (16 digits), SSNs (9 digits), email addresses, API keys (sk-, pk-, AKIA), JWTs (eyJ).

    3. Use a log sanitizer that redacts sensitive patterns before writing to logs.

    4. Test that sensitive fields are NOT present in log output.

    5. Define a sensitive field list: password, token, secret, api_key, ssn, credit_card.

    6. Use structured logging (structlog, json-logger) which makes it easier to control exactly which fields are logged.

    7. Audit log output periodically — sample production logs and verify no sensitive data appears.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, testing, security]
    concern: [meta_cognition]
  example_good: |
    import structlog
    import re

    SENSITIVE_PATTERNS = [
        (r"sk-[a-zA-Z0-9]{20,}", "***API_KEY***"),
        (r"eyJ[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+", "***JWT***"),
        (r"\b\d{4}[- ]?\d{4}[- ]?\d{4}[- ]?\d{4}\b", "***CARD***"),
        (r"password['\"]?\s*[:=]\s*['\"][^'\"]+['\"]", "***PASSWORD***"),
    ]

    def sanitize_log_value(value: str) -> str:
        for pattern, replacement in SENSITIVE_PATTERNS:
            value = re.sub(pattern, replacement, value)
        return value

    # Test:
    def test_logs_do_not_contain_secrets(caplog):
        """Verify sensitive data is not present in log output."""
        with caplog.at_level("DEBUG"):
            process_request({"user": "test", "token": "sk-ant-api03-secret"})

        for record in caplog.records:
            assert "sk-ant" not in record.message, "API key found in logs!"
            assert "eyJ" not in record.message, "JWT found in logs!"
  example_bad: |
    logger.info(f"User login request: {request.json()}")
    # Logs: {"email": "user@test.com", "password": "MyP@ssw0rd!"}
    # Password now in logs, shipped to Datadog, retained for 30 days
    # Every developer with Datadog access can read it

    logger.debug(f"API response: {response.text}")
    # Logs entire response including API keys, tokens, user data
  when_applies: Every logging statement in the codebase. Scan logs for sensitive data during QA review. Run automated log sanitization tests in CI.
  sources: ["https://cheatsheetseries.owasp.org/cheatsheets/Logging_Cheat_Sheet.html"]
