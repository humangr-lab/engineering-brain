- id: CR-SRE-INCIDENT-005
  text: Incident management skills atrophy quickly when not in constant use. Apply the incident command framework to routine
    cross-team changes and conduct regular disaster recovery drills — otherwise the framework will fail when you need it most.
  why: 'Google emphasizes that incident management is a perishable skill. If your team only uses the ICS framework during
    real emergencies (which might be monthly or quarterly), they will be rusty when it matters. The IC role requires specific
    skills — maintaining situational awareness, delegating effectively, making decisions with incomplete information, communicating
    clearly under pressure — that degrade without practice. Google''s solution: use the same framework for routine operations.
    A cross-team database migration uses the same IC/Ops Lead/Comms Lead structure as a real outage. A scheduled maintenance
    window uses the same communication channels and escalation paths. By the time a real incident occurs, the team has practiced
    the framework dozens of times and it feels natural, not awkward.

    '
  how_to_do_right: '1. Use the incident command framework for ALL cross-team operations, not just emergencies.

    2. Rotate IC role among team members during routine operations — everyone should have IC experience.

    3. Conduct DR drills quarterly: simulate a realistic outage and practice the full response process.

    4. After each drill, debrief: what worked, what was confusing, what would have been missed in a real incident?

    5. New team members should shadow an IC during a routine operation before being assigned the IC role.

    6. Keep the "muscle memory" fresh: if the team hasn''t used ICS in 2 months, schedule a drill immediately.

    '
  example_good: "# Regular ICS practice during routine operations\nclass IncidentDrillScheduler:\n    def schedule_quarterly_drill(self, team: Team):\n        drill = IncidentDrill(\n            scenario=self.select_past_incident(),\n            ic=team.rotate_ic_role(),  # Rotate who is IC\n            participants=team.all_members,\n        )\n        drill.run()\n        debrief = drill.debrief()\n        log.info(f\"Drill complete — lessons: {debrief.lessons}\")\n\n    def use_ics_for_routine_ops(self, operation: Operation):\n        \"\"\"Use ICS framework for routine cross-team work.\"\"\"\n        operation.ic = self.assign_ic()\n        operation.ops_lead = self.assign_ops_lead()\n        operation.comms_lead = self.assign_comms_lead()\n        # Same framework as incidents — keeps skills fresh\n        operation.run_with_ics()\n"
  example_bad: "# ICS only used during real incidents — skills atrophy\nclass Team:\n    last_incident = \"6 months ago\"\n    last_drill = \"never\"\n\n    def handle_incident(self, incident):\n        # Nobody remembers ICS roles\n        # IC hasn't practiced in months, starts debugging\n        # Comms lead doesn't know the update template\n        # Ops lead makes changes without logging\n        print(\"Who's the IC? What do I do again?\")\n        # Framework fails when it's needed most\n"
  when_applies: When managing on-call teams or SRE organizations where incident response skills may atrophy due to infrequent real incidents.
  severity: high
  technologies:
    lang: [general]
  domains:
    domain: [management, culture, operations, reliability]
    concern: [incident_response]
  sources:
  - url: https://sre.google/sre-book/managing-incidents/
    title: 'Google SRE Book — Chapter 14: Managing Incidents'
