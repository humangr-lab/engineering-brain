layer: rules
technology: SRE
domain: incident_management
knowledge:
- id: CR-SRE-EMER-001
  text: Test your disaster recovery with your BEST engineers during business hours — not at 3 AM with the on-call. Controlled
    failure tests reveal real system behavior that theory and documentation cannot predict. The gap between "how we think
    it works" and "how it actually works" is where outages live.
  why: 'Google''s Emergency Response chapter describes three war stories that all share the same root cause: untested assumptions.
    In the test-induced emergency, SREs blocked access to one test database among 100 to discover hidden dependencies — and
    within minutes, multiple externally-facing services went down because the dependency graph was far more tangled than anyone
    knew. The rollback procedures hadn''t been tested in staging, so they failed when needed. Google''s lesson: "Theory and
    reality differ significantly. Test failures with best personnel available, not during off-hours." The best time to discover
    your disaster recovery doesn''t work is during a controlled test with your most experienced engineers, not during a real
    outage at 3 AM with a stressed junior on-call.

    '
  how_to_do_right: '1. Schedule quarterly disaster recovery tests during business hours with senior engineers present.

    2. Test SPECIFIC failure modes: database failover, network partition, config rollback, automation kill switch.

    3. Before any large-scale test, verify rollback procedures work in staging. If rollback hasn''t been tested, it doesn''t
    work.

    4. Document every gap discovered during tests. Each gap is a future outage prevented.

    5. Treat DR test results with the same urgency as real incidents — file action items, assign owners, set deadlines.

    6. Start small: test one component''s failure, then escalate to multi-component, then full datacenter failover.

    '
  example_good: "# Scheduled DR test with rollback verification\ndef run_dr_test(component: str, team: list[str]):\n    log.info(f\"Starting DR test for {component} with {len(team)} engineers\")\n    pre_state = snapshot_system_state(component)\n    try:\n        simulate_failure(component)\n        verify_monitoring_detected(component, timeout_sec=60)\n        execute_rollback(component)\n        post_state = snapshot_system_state(component)\n        assert pre_state == post_state, \"Rollback did not restore state\"\n        log.info(\"DR test PASSED — rollback verified\")\n    except Exception as e:\n        log.error(f\"DR test FAILED — gap discovered: {e}\")\n        file_action_item(component, str(e), severity=\"P0\")\n    finally:\n        restore_system_state(component, pre_state)\n"
  example_bad: "# No DR testing — assume documentation is correct\ndef deploy_new_database():\n    # \"We documented the failover process, so it works\"\n    provision_primary()\n    provision_replica()\n    # Never tested: does failover actually work?\n    # Never tested: does rollback restore data?\n    # First real test will be during a 3 AM outage\n    log.info(\"Database deployed — failover is documented\")\n"
  when_applies: When designing or operating systems that have disaster recovery procedures, failover mechanisms, or rollback processes that have not been tested under realistic conditions.
  severity: critical
  technologies:
    lang: [general]
    platform: [cloud, kubernetes]
  domains:
    domain: [operations, reliability]
    concern: [incident_response, resilience, disaster_recovery]
  sources:
  - url: https://sre.google/sre-book/emergency-response/
    title: 'Google SRE Book — Chapter 13: Emergency Response'
  validation_status: cross_checked
- id: CR-SRE-EMER-002
  text: The "zero means all" bug — when automation receives an empty filter response, it MUST treat it as an error, not as
    "select everything." This single anti-pattern has caused some of the most devastating outages in Google's history.
  why: 'The Diskerase incident is one of the most dramatic war stories in the SRE Book. Two consecutive server decommission
    requests triggered an automation bug where an empty filter response was interpreted as "all machines globally." The automation
    sent every server worldwide to the hard drive wipe queue. Entire installations went offline simultaneously. Recovery took
    three days, required dividing the team into three groups each handling one reinstallation step, reclassifying network
    traffic priority, and manually restarting thousands of stuck machines. The root cause was simple: empty result = "nothing
    matched" was treated as "everything matched." This pattern recurs across the industry — AWS S3''s 2017 outage was caused
    by a similar "too-broad scope" command.

    '
  how_to_do_right: '1. NEVER treat an empty set as "select all." An empty result from a filter query means ZERO items, not
    ALL items.

    2. Add sanity checks to ALL automation that modifies infrastructure: "If affected_count > N% of total, HALT and require
    human approval."

    3. Implement a "blast radius" limiter: no single automation run can affect more than X% of capacity (e.g., 10%).

    4. Require explicit confirmation for destructive operations affecting more than one machine/instance.

    5. Log the exact scope of every automated action BEFORE execution. If the scope looks wrong, abort.

    6. Design automation to fail closed (do nothing) rather than fail open (do everything).

    '
  example_good: "# Safe automation: empty result = error, not \"select all\"\ndef decommission_servers(filter_query: str) -> list[str]:\n    targets = inventory.query(filter_query)\n    if not targets:\n        raise ValueError(f\"Empty result for filter '{filter_query}' — refusing to proceed\")\n    total = inventory.count_all()\n    if len(targets) > total * 0.10:\n        raise SafetyError(\n            f\"Blast radius too large: {len(targets)}/{total} \"\n            f\"({len(targets)/total:.0%}) — requires human approval\"\n        )\n    log.info(f\"Decommissioning {len(targets)} servers (of {total} total)\")\n    return targets\n"
  example_bad: "# Dangerous: empty filter = select everything\ndef decommission_servers(filter_query: str) -> list[str]:\n    targets = inventory.query(filter_query)\n    # BUG: if query returns empty, we select ALL servers\n    if not targets:\n        targets = inventory.get_all()  # \"nothing matched\" → \"everything matched\"\n    for server in targets:\n        wipe_hard_drive(server)  # Wipes entire fleet on empty filter\n    return targets\n"
  when_applies: When building automation that modifies, deletes, or decommissions infrastructure based on filter queries or selection criteria.
  severity: critical
  technologies:
    platform: [ansible, kubernetes, terraform]
  domains:
    domain: [operations, reliability]
    concern: [incident_response, maintenance, automation]
  sources:
  - url: https://sre.google/sre-book/emergency-response/
    title: 'Google SRE Book — Chapter 13: Emergency Response'
  validation_status: cross_checked
- id: CR-SRE-EMER-003
  text: Out-of-band communication and access paths are not optional — they are critical infrastructure. When your primary
    systems are down, your monitoring, chat, wiki, and deployment tools may also be down. You need alternative paths that
    work when everything else is broken.
  why: 'During Google''s change-induced emergency (a Friday configuration push that crash-looped all externally-facing services),
    engineers discovered that their own tools — the ones they needed to diagnose and fix the outage — were themselves affected.
    Internal communication systems, dashboards, and deployment tools all depended on the same infrastructure that was down.
    The team survived because they had out-of-band communication (phone trees, backup chat systems), command-line tools that
    could operate without the web UI, and engineers who physically relocated to "panic rooms" with backup network access.
    Without these alternatives, they would have been unable to coordinate the response. The lesson: if your incident response
    depends on the same infrastructure as your service, a major outage will also take down your ability to respond.

    '
  how_to_do_right: '1. Maintain out-of-band communication channels: phone bridge, SMS group, separate Slack workspace on different
    infrastructure.

    2. Ensure deployment tools have CLI alternatives that don''t depend on web UIs or internal services.

    3. Document "break glass" procedures: how to access production systems when SSO, VPN, or internal tools are down.

    4. Store critical runbooks offline (printed, local PDF, phone) — not only in your wiki that might be down.

    5. Test out-of-band access quarterly: can engineers actually deploy a fix when internal infrastructure is unavailable?

    6. Ensure monitoring has an independent path: if your monitoring system depends on the same infrastructure it monitors,
    it will go blind during the worst outages.

    '
  example_good: "# Out-of-band incident response with fallback channels\nclass IncidentResponseKit:\n    PRIMARY_CHANNEL = \"slack\"\n    OOB_CHANNELS = [\"pagerduty_sms\", \"phone_bridge\", \"signal_group\"]\n\n    def notify_team(self, incident: Incident):\n        for channel in [self.PRIMARY_CHANNEL] + self.OOB_CHANNELS:\n            try:\n                send_notification(channel, incident)\n                log.info(f\"Notification sent via {channel}\")\n                return\n            except ChannelUnavailable:\n                log.warning(f\"{channel} unavailable, trying next\")\n        log.critical(\"ALL channels failed — manual phone tree required\")\n\n    def get_deploy_tool(self):\n        \"\"\"CLI fallback when web UI is down.\"\"\"\n        if self.web_ui_available():\n            return WebDeployTool()\n        return CLIDeployTool()  # Works without internal infra\n"
  example_bad: "# All incident tools depend on the same infrastructure\nclass IncidentResponse:\n    def notify_team(self, incident):\n        # If Slack is down (because infra is down), we can't notify anyone\n        slack.post_message(\"#incidents\", str(incident))\n\n    def deploy_fix(self, fix):\n        # If internal web UI is down, we can't deploy\n        web_ui.deploy(fix)  # No CLI fallback\n\n    def check_runbooks(self, incident_type):\n        # If wiki is down, we can't access runbooks\n        return wiki.search(incident_type)  # No offline copy\n"
  when_applies: When designing incident response tooling, monitoring systems, or communication channels that could be affected by the same infrastructure failures they are meant to help diagnose.
  severity: critical
  technologies:
    lang: [general]
    platform: [cloud, kubernetes]
  domains:
    domain: [operations, deployment, reliability]
    concern: [incident_response]
  sources:
  - url: https://sre.google/sre-book/emergency-response/
    title: 'Google SRE Book — Chapter 13: Emergency Response'
  validation_status: cross_checked
- id: CR-SRE-EMER-004
  text: A "low-risk" configuration change crashed all of Google's externally-facing services on a Friday. There is no such
    thing as a low-risk change in production. Every change requires canary testing, regardless of perceived risk level.
  why: 'The change-induced emergency in the SRE Book involved a global configuration push to abuse-protection infrastructure.
    The change was considered low-risk because it had been canaried — but the canary hadn''t exercised the specific rare keyword
    combination that triggered the crash-loop bug. The result: the entire fleet crashed simultaneously. Monitoring detected
    the problem within seconds, an engineer pushed a rollback within 5 minutes, but some services took up to an hour for full
    recovery due to secondary bugs triggered by the restart storm. The lesson Google extracted: "Perceived low-risk changes
    still require stringent canary processes." The canary must exercise the ACTUAL change in production conditions, not just
    test that a config file parses correctly.

    '
  how_to_do_right: '1. Canary ALL changes — including "trivial" config changes. The most dangerous changes are the ones you
    don''t think need testing.

    2. Canary must exercise the actual change, not just validate syntax. A config that parses correctly can still crash the
    service.

    3. Limit canary blast radius: 1 instance → 1% of fleet → 10% → 50% → 100%, with monitoring between each step.

    4. Never push global config changes on Fridays. If it breaks, you have the weekend to not notice.

    5. Rate-limit config propagation: if all instances update simultaneously, a bad config crashes everything at once.

    6. Monitor for crash loops specifically: a service that restarts 10 times in 1 minute is not "recovering" — it is crash-looping.

    '
  example_good: "# Canary config deployment with staged rollout\ndef deploy_config(config: dict, service: str):\n    validate_config_schema(config)\n    validate_config_semantics(config)\n    stages = [0.01, 0.10, 0.50, 1.0]  # 1% → 10% → 50% → 100%\n    for pct in stages:\n        instances = select_instances(service, percentage=pct)\n        apply_config(instances, config)\n        log.info(f\"Config applied to {pct:.0%} of {service}\")\n        if not monitor_health(service, duration_sec=600):\n            rollback_config(service)\n            raise ConfigDeployError(f\"Health degraded at {pct:.0%} rollout\")\n        log.info(f\"Health OK at {pct:.0%} — proceeding\")\n    log.info(\"Config fully deployed\")\n"
  example_bad: "# Push config globally without canary or monitoring\ndef deploy_config(config: dict, service: str):\n    # \"It's just a config change, what could go wrong?\"\n    validate_yaml_syntax(config)  # Only checks syntax, not semantics\n    apply_config_to_all_instances(service, config)  # 100% at once\n    # No monitoring between stages\n    # No rollback plan\n    # Deployed on a Friday afternoon\n    log.info(\"Config pushed to all instances\")\n"
  when_applies: When deploying configuration changes to production services, especially changes perceived as low-risk that bypass normal canary and staged rollout processes.
  severity: critical
  technologies:
    lang: [general]
    platform: [deployment, kubernetes]
  domains:
    domain: [code_quality, operations, deployment, reliability]
    concern: [configuration, incident_response]
  sources:
  - url: https://sre.google/sre-book/emergency-response/
    title: 'Google SRE Book — Chapter 13: Emergency Response'
  validation_status: cross_checked
- id: CR-SRE-EMER-005
  text: After every emergency, document honestly with hard questions and hold teams accountable to postmortem action items.
    Outage history must be organized accessibly across the organization — the same trigger causing the same outage twice is
    an organizational failure, not a technical one.
  why: 'The SRE Book describes a continuous improvement cycle: outages lead to documentation, documentation leads to process
    improvements, improvements lead to proactive testing, testing reveals new failure modes, and the cycle repeats. But this
    cycle ONLY works if documentation is honest (not sanitized), accessible (not buried in a team wiki), and actionable (not
    just "we''ll be more careful"). Google maintains organization-wide outage history precisely because the same failure mode
    often affects different teams — and without shared history, each team rediscovers the same lessons independently. The
    most frustrating outages are repeat incidents caused by identical triggers that were already documented in a postmortem
    that no one read.

    '
  how_to_do_right: '1. Write postmortems within 48 hours while memory is fresh. Delayed postmortems lose critical details.

    2. Include the FULL timeline: what happened, when, what was tried (including what didn''t work), what fixed it.

    3. Ask hard questions: "Why didn''t monitoring catch this sooner?" "Why wasn''t this tested?" "What would have prevented
    this entirely?"

    4. Assign concrete action items with owners and deadlines — not vague "improve monitoring."

    5. Make postmortems searchable organization-wide. When a new incident occurs, the first step should be: "Has this happened
    before?"

    6. Review outstanding postmortem action items quarterly. Unresolved items from past incidents are future incidents waiting
    to happen.

    '
  example_good: "# Postmortem with concrete, tracked action items\nclass Postmortem:\n    def create(self, incident: Incident) -> PostmortemDoc:\n        doc = PostmortemDoc(\n            incident_id=incident.id,\n            timeline=incident.get_full_timeline(),\n            root_cause=self.analyze_root_cause(incident),\n            action_items=[],\n        )\n        # Hard questions\n        doc.questions = [\n            \"Why didn't monitoring catch this sooner?\",\n            \"Why wasn't this scenario tested?\",\n            \"Has this exact failure happened before?\",\n        ]\n        return doc\n\n    def add_action_item(self, doc: PostmortemDoc, item: ActionItem):\n        assert item.owner, \"Action item must have an owner\"\n        assert item.deadline, \"Action item must have a deadline\"\n        assert item.verification, \"Must define how to verify completion\"\n        doc.action_items.append(item)\n        tracker.create_ticket(item)  # Auto-create tracked ticket\n"
  example_bad: "# Postmortem written weeks later with vague action items\ndef write_postmortem(incident_id: str):\n    doc = f\"Incident {incident_id} happened. We fixed it.\"\n    doc += \"\\nAction items:\\n\"\n    doc += \"- Improve monitoring\\n\"  # Vague, no owner, no deadline\n    doc += \"- Be more careful with deploys\\n\"  # Not actionable\n    save_to_wiki(doc)  # Buried in team wiki, never read again\n    # No tracking, no review, no follow-up\n"
  when_applies: When conducting post-incident reviews, writing postmortems, or tracking action items from previous outages across the organization.
  severity: high
  technologies:
    lang: [general]
  domains:
    domain: [management, culture, operations, reliability]
    concern: [incident_response, postmortem]
  sources:
  - url: https://sre.google/sre-book/emergency-response/
    title: 'Google SRE Book — Chapter 13: Emergency Response'
  validation_status: cross_checked
- id: CR-SRE-INCIDENT-001
  text: Declare an incident and activate the Incident Command System when ANY of these occur — a second team is needed, the
    outage is customer-visible, or the issue is unsolved after one hour. Unmanaged incidents spiral into chaos where well-meaning
    engineers make things worse.
  why: 'The SRE Book''s incident management chapter opens with a cautionary tale of an unmanaged incident. Two engineers (Mary
    and Malcolm) work independently on the same problem without coordination. Malcolm deploys a change that conflicts with
    Mary''s investigation, making things worse. Neither knows what the other is doing. There is no centralized communication,
    no shared state, and no clear leadership. The chapter then contrasts this with Google''s incident command system, adapted
    from firefighting''s ICS framework. The key insight: incidents don''t fail because of technical complexity — they fail
    because of coordination complexity. Multiple engineers investigating the same problem without structure will step on each
    other''s changes, duplicate effort, and miss critical information.

    '
  how_to_do_right: '1. Define clear incident declaration criteria. When in doubt, declare — you can always stand down. The
    cost of over-declaring is low; the cost of under-declaring is high.

    2. The Incident Commander holds high-level state and assigns roles. They do NOT debug — they coordinate.

    3. The Operations Lead is the ONLY person making system changes. No one else touches production during an incident.

    4. The Communications Lead issues periodic updates (every 30 min minimum) to stakeholders and maintains the incident document.

    5. Use a dedicated communication channel (IRC, Slack) with bots logging all alerts and actions.

    6. Maintain a live incident document (Google Doc, wiki) that anyone can read for current status.

    '
  example_good: "# Structured incident declaration with ICS roles\nclass IncidentManager:\n    DECLARATION_CRITERIA = [\n        lambda i: i.teams_involved >= 2,\n        lambda i: i.is_customer_visible,\n        lambda i: i.duration_minutes > 60,\n    ]\n\n    def should_declare(self, issue: Issue) -> bool:\n        return any(criterion(issue) for criterion in self.DECLARATION_CRITERIA)\n\n    def declare_incident(self, issue: Issue) -> Incident:\n        incident = Incident(issue=issue)\n        incident.ic = self.assign_incident_commander()\n        incident.ops_lead = self.assign_ops_lead()\n        incident.comms_lead = self.assign_comms_lead()\n        incident.channel = self.create_dedicated_channel(incident)\n        incident.doc = self.create_live_document(incident)\n        self.notify_stakeholders(incident)\n        log.info(f\"Incident {incident.id} declared — IC: {incident.ic}\")\n        return incident\n"
  example_bad: "# Unmanaged incident — no coordination\ndef handle_issue(alert: Alert):\n    # Mary sees the alert and starts investigating\n    # Malcolm also sees it and starts investigating independently\n    # Neither knows the other is working on it\n    # Malcolm deploys a change that conflicts with Mary's investigation\n    # No one is tracking what's been tried\n    # No one is communicating to stakeholders\n    ssh(alert.server, \"tail -f /var/log/app.log\")  # Both debugging alone\n"
  when_applies: When a production issue requires coordination across multiple engineers or teams, is customer-visible, or has not been resolved within one hour of detection.
  severity: critical
  technologies:
    lang: [general]
  domains:
    domain: [operations, reliability]
    concern: [incident_response]
  sources:
  - url: https://sre.google/sre-book/managing-incidents/
    title: 'Google SRE Book — Chapter 14: Managing Incidents'
  validation_status: cross_checked
- id: CR-SRE-INCIDENT-002
  text: The Incident Commander does NOT debug. Their job is to hold the high-level state, assign roles, remove roadblocks,
    and make decisions. The moment the IC starts investigating technical details, they lose situational awareness and the
    incident becomes unmanaged again.
  why: 'Google''s incident command system explicitly separates coordination from execution. The Incident Commander''s value
    is NOT their technical skill — it is their situational awareness. They know who is working on what, what has been tried,
    what the current hypothesis is, and what the next escalation step should be. The moment the IC opens a terminal and starts
    debugging, they lose this global view. They become one more engineer tunnel-visioned on a specific component while no
    one is tracking the overall picture. Google found that the most effective ICs are often not the most senior technical
    person — they are the person best at communication, delegation, and decision-making under pressure. The IC can always
    delegate investigation to specialists while maintaining the coordination role.

    '
  how_to_do_right: '1. The IC role requires training and practice. Not everyone is naturally suited to it. Identify and train
    your ICs proactively.

    2. IC responsibilities: maintain incident timeline, assign investigation tasks, make escalation decisions, communicate
    with leadership.

    3. IC does NOT: debug code, read logs, deploy fixes, or investigate hypotheses. They delegate ALL technical work.

    4. If the IC feels overwhelmed, they should immediately escalate and hand off the IC role to someone fresher.

    5. Practice IC skills during routine cross-team changes and DR drills — not just during real incidents.

    6. Explicit handoff protocol: when IC transfers command, both must verbally confirm. No silent handoffs.

    '
  example_good: "# IC delegates all technical work, maintains situational awareness\nclass IncidentCommander:\n    def run_incident(self, incident: Incident):\n        while not incident.resolved:\n            status = self.collect_status_from_all_leads()\n            self.update_incident_document(status)\n            if status.needs_escalation:\n                self.escalate(incident)\n            if status.new_hypothesis:\n                self.assign_investigation(status.new_hypothesis, to=self.ops_lead)\n            # IC NEVER opens a terminal or reads logs\n            self.communicate_update(incident, every_minutes=30)\n\n    def handle_overwhelm(self):\n        \"\"\"IC must hand off if overwhelmed.\"\"\"\n        new_ic = self.find_replacement_ic()\n        self.explicit_handoff(new_ic)  # Verbal confirmation required\n        log.info(f\"IC handoff: {self.name} → {new_ic.name}\")\n"
  example_bad: "# IC starts debugging, loses situational awareness\nclass IncidentCommander:\n    def run_incident(self, incident: Incident):\n        # IC opens terminal and starts reading logs\n        logs = ssh(incident.server, \"tail -f /var/log/app.log\")\n        for line in logs:\n            if \"ERROR\" in line:\n                # IC is now tunnel-visioned on one component\n                # No one is tracking the overall picture\n                # No one is communicating to stakeholders\n                # Other engineers are freelancing without coordination\n                self.investigate(line)  # IC became a debugger, not a commander\n"
  when_applies: When an incident commander is assigned during a production incident and needs to maintain coordination without getting pulled into technical debugging.
  severity: high
  technologies:
    lang: [general]
  domains:
    domain: [operations, reliability]
    concern: [incident_response]
  sources:
  - url: https://sre.google/sre-book/managing-incidents/
    title: 'Google SRE Book — Chapter 14: Managing Incidents'
  validation_status: cross_checked
- id: CR-SRE-INCIDENT-003
  text: During an incident — stop the bleeding first, restore service second, preserve evidence third. This priority order
    is absolute. Never sacrifice service restoration to preserve forensic evidence, and never sacrifice bleeding stoppage
    to attempt a clean fix.
  why: 'Google''s incident management prioritization is deliberately rigid because under stress, engineers make poor priority
    decisions. A common anti-pattern: an engineer discovers the root cause and wants to implement a "proper fix" instead of
    applying a quick mitigation (rollback, traffic shift, feature flag). The proper fix takes 2 hours; the mitigation takes
    2 minutes. During those 2 hours, users are impacted. Another anti-pattern: engineers destroy evidence (logs, state) in
    their rush to restore service, making root cause analysis impossible. The priority order resolves both: first stop the
    bleeding (emergency mitigation), then restore full service (proper recovery), then preserve and analyze evidence (postmortem).
    Each step enables the next — you cannot investigate calmly while users are still impacted.

    '
  how_to_do_right: '1. Stop the bleeding: rollback, traffic diversion, feature flag disable, circuit breaker. Do whatever
    stops user impact FIRST.

    2. Restore service: bring the system back to full operation. This may be different from stopping the bleeding (e.g., re-enabling
    a feature with a fix).

    3. Preserve evidence: save logs, state snapshots, metrics dashboards, heap dumps BEFORE they rotate or expire.

    4. Never attempt a "clean fix" while users are impacted. Quick mitigation first, root cause fix later.

    5. Before restoring, snapshot the broken state (logs, config, memory dumps) for later analysis.

    6. Document the timeline as it happens, not from memory after the fact.

    '
  example_good: "# Priority-ordered incident response\nclass IncidentResponse:\n    def respond(self, incident: Incident):\n        # 1. STOP THE BLEEDING — immediate mitigation\n        self.stop_bleeding(incident)\n        # 2. RESTORE SERVICE — full recovery\n        self.restore_service(incident)\n        # 3. PRESERVE EVIDENCE — for postmortem\n        self.preserve_evidence(incident)\n\n    def stop_bleeding(self, incident: Incident):\n        \"\"\"Quick mitigation: rollback, feature flag, traffic shift.\"\"\"\n        if incident.has_recent_deploy:\n            rollback_deploy(incident.service)  # 2-minute fix\n        elif incident.has_feature_flag:\n            disable_feature_flag(incident.flag)  # 30-second fix\n        log.info(\"Bleeding stopped — user impact mitigated\")\n\n    def preserve_evidence(self, incident: Incident):\n        \"\"\"Snapshot state BEFORE it rotates.\"\"\"\n        save_logs(incident.service, last_hours=2)\n        save_metrics_snapshot(incident.service)\n        save_heap_dump(incident.server)\n"
  example_bad: "# Engineer tries \"proper fix\" while users are impacted\ndef respond_to_incident(incident):\n    # Skip quick mitigation, go straight to root cause fix\n    root_cause = investigate_for_two_hours(incident)\n    proper_fix = implement_fix(root_cause)  # 2 hours while users suffer\n    deploy(proper_fix)\n    # Evidence is gone — logs rotated, metrics expired\n    # Could have rolled back in 2 minutes\n"
  when_applies: When responding to a production incident where user impact is ongoing and engineers must choose between quick mitigation and thorough root-cause investigation.
  severity: critical
  technologies:
    lang: [general]
  domains:
    domain: [operations, reliability]
    concern: [incident_response]
  sources:
  - url: https://sre.google/sre-book/managing-incidents/
    title: 'Google SRE Book — Chapter 14: Managing Incidents'
  validation_status: cross_checked
- id: CR-SRE-INCIDENT-004
  text: Only ONE person modifies the system during an incident — the Operations Lead. "Freelancing" (engineers making changes
    without coordination) is the single most common cause of incidents getting worse instead of better.
  why: 'The unmanaged incident story in the SRE Book illustrates this perfectly: Malcolm deployed a change while Mary was
    investigating, and Malcolm''s change made things worse because it conflicted with the state Mary was observing. Neither
    knew what the other was doing. This pattern — multiple engineers making independent changes to the same system during
    an incident — is devastatingly common and almost always makes things worse. Each uncoordinated change introduces a new
    variable, makes debugging harder (now there are TWO changes to consider), and can mask or amplify the original problem.
    Google''s solution is structural: the Operations Lead is the single point of control for all system modifications. Other
    engineers can investigate, form hypotheses, and propose changes — but only the Ops Lead executes them, and only with the
    IC''s knowledge.

    '
  how_to_do_right: '1. Designate an Operations Lead at the start of every incident. They are the ONLY person authorized to
    make system changes.

    2. All proposed changes go through the Ops Lead: "I want to try X" → Ops Lead evaluates → Ops Lead executes (or delegates
    explicitly).

    3. Log every change in the incident channel with timestamp: "12:34 - Ops Lead: rolled back config change abc123."

    4. If you are NOT the Ops Lead, do NOT touch production. Investigate, analyze, propose — but do not execute.

    5. If the Ops Lead is overwhelmed, they request a second Ops Lead for a different subsystem — not freelancing by others.

    6. After the incident, verify that ONLY authorized changes were made. Unexpected changes are a process failure.

    '
  example_good: "# Single Ops Lead controls all system changes\nclass OpsLead:\n    def __init__(self, incident: Incident):\n        self.incident = incident\n        self.change_log: list[ChangeRecord] = []\n\n    def execute_change(self, proposed_by: str, change: Change):\n        \"\"\"Only the Ops Lead executes changes during an incident.\"\"\"\n        record = ChangeRecord(\n            timestamp=now(),\n            proposed_by=proposed_by,\n            change=change,\n            executed_by=self.name,\n        )\n        self.change_log.append(record)\n        self.incident.channel.post(\n            f\"{now()} — Ops Lead: executing {change.description}\"\n        )\n        change.execute()\n        log.info(f\"Change executed: {change.description}\")\n\n    def reject_freelancing(self, engineer: str, attempted_change: str):\n        log.warning(f\"BLOCKED: {engineer} attempted unauthorized change: {attempted_change}\")\n        self.incident.channel.post(f\"Reminder: only Ops Lead makes changes\")\n"
  example_bad: "# Multiple engineers making independent changes\ndef handle_incident(alert):\n    # Mary rolls back the config\n    ssh(alert.server, \"git checkout HEAD~1 config.yaml\")\n    # Meanwhile Malcolm restarts the service\n    ssh(alert.server, \"systemctl restart app\")\n    # Malcolm's restart conflicts with Mary's rollback\n    # Neither knows what the other did\n    # Now there are TWO changes to debug instead of one\n    # No change log, no coordination\n"
  when_applies: When multiple engineers are involved in responding to a production incident and system changes need to be coordinated to prevent conflicting actions.
  severity: high
  technologies:
    lang: [general]
  domains:
    domain: [operations, reliability]
    concern: [incident_response]
