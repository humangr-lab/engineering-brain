layer: rules
technology: Flask
domain: web
knowledge:
- id: CR-FLASK-001
  text: 'Flask app factory pattern: create_app() function, not module-level app = Flask(__name__).'
  why: Module-level app creation prevents testing with different configs, causes circular imports, and makes the app a singleton
    that can't be reset between tests.
  how_to_do_right: Use create_app(config=None) factory function. Register blueprints inside it. Return the app instance. Tests
    call create_app(test_config) for isolation.
  severity: medium
  technologies:
    lang: [python]
    framework: [flask]
  domains: [web, backend]
  example_good: "def create_app(config=None):\n    app = Flask(__name__)\n    app.config.from_object(config or DefaultConfig)\n\
    \    register_blueprints(app)\n    return app\n"
  example_bad: 'app = Flask(__name__)  # Module-level — can''t test with different configs

    '
  when_applies: Projects using Flask web applications or Python codebases
  when_not_applies: projects not using Flask or Python
  sources: ["https://flask.palletsprojects.com/en/stable/patterns/appfactories/"]
- id: CR-FLASK-002
  text: Flask routes must return proper HTTP status codes, not just strings.
  why: Returning 'Error' as a 200 response breaks API clients, monitoring, and error tracking. Status codes are machine-readable;
    response bodies are human-readable.
  how_to_do_right: Always return (response, status_code) tuple or use jsonify() with explicit status. 2xx for success, 4xx
    for client errors, 5xx for server errors.
  severity: high
  technologies:
    lang: [python]
    framework: [flask]
  domains: [web, backend]
  example_good: "@app.route(\"/api/user/<int:user_id>\")\ndef get_user(user_id):\n    user = User.query.get(user_id)\n   \
    \ if not user:\n        return jsonify({\"error\": \"User not found\", \"id\": user_id}), 404\n    return jsonify(user.to_dict()),\
    \ 200\n"
  example_bad: "@app.route(\"/api/user/<user_id>\")\ndef get_user(user_id):\n    user = User.query.get(user_id)\n    if not\
    \ user:\n        return \"Error\"  # 200 status! No useful info!\n    return str(user)\n"
  when_applies: Projects using Flask web applications or Python codebases
  when_not_applies: projects not using Flask or Python
  sources: ["https://flask.palletsprojects.com/en/stable/api/#flask.Flask.errorhandler"]
- id: CR-SOCKETIO-001
  text: Every socket.emit() in JavaScript must have a corresponding @socketio.on() handler in Python.
  why: Dead emits are silent failures — the client sends data that disappears. No error, no feedback, no functionality. This
    is a wiring bug.
  how_to_do_right: For every socket.emit('event_name', data) in JS, create @socketio.on('event_name') in Python. Cross-reference
    during code review.
  severity: high
  technologies:
    lang: [javascript]
    library: [flask-socketio, socket, io]
  domains:
    domain: [architecture]
    concern: [web, websocket]
  example_good: '// JS: socket.emit(''submit_vote'', {choice: ''A''})

    // PY: @socketio.on(''submit_vote'') def handle_vote(data): ...

    '
  example_bad: '// JS: socket.emit(''submit_vote'', {choice: ''A''})

    // PY: (no handler) — data vanishes silently

    '
  when_applies: Projects using Flask-SocketIO, Socket.IO real-time apps, or JavaScript/TypeScript projects
  when_not_applies: CLI tools, batch scripts, or backend services with no HTTP interface
  sources: ["https://flask-socketio.readthedocs.io/en/latest/getting_started.html"]
- id: CR-SOCKETIO-002
  text: SocketIO event handlers must validate incoming data structure.
  why: WebSocket messages have no schema enforcement. A malformed client message can crash the handler or corrupt state.
  how_to_do_right: Check data type (dict vs None), required fields, and value types before processing. Return error event
    on validation failure.
  severity: high
  technologies:
    library: [flask-socketio, socket, io]
  domains:
    domain: [architecture, security]
    concern: [web, websocket]
  example_good: |
    @socketio.on('submit_vote')
    def handle_vote(data):
        if not isinstance(data, dict) or 'choice' not in data:
            emit('error', {'msg': 'Invalid vote data'})
            return
        process_vote(data['choice'])
  example_bad: |
    @socketio.on('submit_vote')
    def handle_vote(data):
        process_vote(data['choice'])  # Crashes if data is None or missing 'choice'
  when_applies: Projects using Flask-SocketIO or Socket.IO real-time apps
  when_not_applies: CLI tools, batch scripts, or backend services with no HTTP interface. projects not using Flask-SocketIO
    or Socket.IO
  sources: ["https://flask-socketio.readthedocs.io/en/latest/getting_started.html#receiving-messages"]
- id: CR-FLASK-003
  text: Flask SECRET_KEY must be set from environment, never hardcoded.
  why: SECRET_KEY signs sessions and CSRF tokens. A hardcoded key means anyone who reads the source can forge sessions.
  how_to_do_right: app.secret_key = os.getenv('SECRET_KEY') with a startup check that raises if not set in production.
  severity: critical
  technologies:
    lang: [python]
    framework: [flask]
  domains: [web, backend]
  example_good: |
    import os
    app.secret_key = os.getenv('SECRET_KEY')
    if not app.secret_key and not app.debug:
        raise RuntimeError("SECRET_KEY must be set in production")
  example_bad: |
    app.secret_key = "super-secret-key-123"  # Hardcoded in source!
  when_applies: Any project using Flask web applications or Python codebases
  when_not_applies: projects not using Flask or Python
  sources: ["https://flask.palletsprojects.com/en/stable/config/#SECRET_KEY"]
- id: CR-ROUTE-001
  text: 'API routes should use consistent naming: /api/v1/resource (plural nouns, no verbs).'
  why: Inconsistent API naming (/getUser, /api/users, /fetch_data) confuses consumers and makes the API unpredictable.
  how_to_do_right: 'Use RESTful conventions: GET /api/v1/users (list), POST /api/v1/users (create), GET /api/v1/users/<id>
    (read), PUT /api/v1/users/<id> (update), DELETE /api/v1/users/<id> (delete).'
  severity: medium
  technologies:
    lang: [python]
    framework: [flask, fastapi]
  domains:
    domain: [architecture, api]
    concern: [design]
  example_good: |
    # RESTful: plural nouns, HTTP verbs for actions
    GET    /api/v1/users          # list
    POST   /api/v1/users          # create
    GET    /api/v1/users/<id>     # read
    DELETE /api/v1/users/<id>     # delete
  example_bad: |
    GET /getUser/<id>        # Verb in URL
    POST /api/users/create   # Redundant verb
    GET /fetch_data          # Inconsistent naming
  when_applies: Projects using Flask web applications or FastAPI async web services
  when_not_applies: internal modules with no exposed interface, monolithic single-process apps. projects not using Flask or
    FastAPI
  sources: ["https://restfulapi.net/resource-naming/"]
- id: CR-FLASK-ERR-001
  text: Flask error handlers must return JSON for API routes, not HTML.
  why: API consumers (mobile apps, SPAs, other services) can't parse HTML error pages. They need structured JSON with error
    code and message.
  how_to_do_right: 'Register @app.errorhandler(404), @app.errorhandler(500) etc. that return jsonify({''error'': message}),
    status_code.'
  severity: high
  technologies:
    lang: [python]
    framework: [flask]
  domains:
    domain: [architecture, api, reliability]
    concern: [error_handling]
  example_good: "@app.errorhandler(404)\ndef not_found(e):\n    return jsonify({\"error\": \"Resource not found\", \"status\"\
    : 404}), 404\n"
  example_bad: '# Default Flask 404 returns HTML — breaks API clients

    '
  when_applies: Projects using Flask web applications or Python codebases
  when_not_applies: internal modules with no exposed interface, monolithic single-process apps. projects not using Flask or
    Python
  sources: ["https://flask.palletsprojects.com/en/stable/errorhandling/"]
- id: CR-DB-001
  text: Database connections must use connection pooling, not per-request connections.
  why: Creating a new connection per request is slow (TCP handshake + auth) and can exhaust database connection limits under
    load.
  how_to_do_right: Use SQLAlchemy's built-in pool (pool_size=5, max_overflow=10). For raw connections, use a connection pool
    library.
  severity: high
  technologies:
    lang: [python]
    framework: [sqlalchemy]
    platform: [postgresql]
  domains:
    domain: [architecture, performance]
    concern: [data, database]
  example_good: |
    from sqlalchemy import create_engine
    engine = create_engine(
        DATABASE_URL, pool_size=5, max_overflow=10
    )
  example_bad: |
    import psycopg2
    def get_user(uid):
        conn = psycopg2.connect(DATABASE_URL)  # New connection per request!
        cur = conn.cursor()
        cur.execute("SELECT * FROM users WHERE id=%s", (uid,))
        return cur.fetchone()
  when_applies: Projects using SQLAlchemy ORM interactions, PostgreSQL databases, or Python codebases
  when_not_applies: stateless microservices with no data persistence, pure computation modules
  sources: ["https://docs.sqlalchemy.org/en/20/core/pooling.html"]
- id: CR-DB-002
  text: Always use context managers (with session) for database transactions.
  why: Manual commit/rollback is error-prone. A missed rollback after an exception leaves the connection in a dirty state.
  how_to_do_right: Use 'with db.session.begin():' or SQLAlchemy's scoped_session. The context manager handles commit on success
    and rollback on exception.
  severity: medium
  technologies:
    lang: [python]
    framework: [sqlalchemy]
  domains:
    domain: [architecture]
    concern: [data, database]
  example_good: |
    with db.session.begin():
        user = User(name="Alice")
        db.session.add(user)
    # Auto-commit on success, auto-rollback on exception
  example_bad: |
    user = User(name="Alice")
    db.session.add(user)
    db.session.commit()  # If exception above, no rollback!
  when_applies: Projects using SQLAlchemy ORM interactions or Python codebases
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using SQLAlchemy
    or Python
  sources: ["https://docs.sqlalchemy.org/en/20/orm/session_basics.html#using-a-sessionmaker"]
- id: CR-TEMPLATE-001
  text: Jinja2 templates must use autoescaping for all user-supplied content.
  why: Unescaped user content enables XSS attacks. A user can inject <script> tags through form inputs that execute in other
    users' browsers.
  how_to_do_right: Flask enables autoescaping by default for .html templates. Never use |safe filter on user-supplied content.
    Use Markup() only for trusted HTML.
  severity: critical
  technologies:
    lang: [python]
    framework: [flask]
    library: [jinja2]
  domains:
    domain: [security, architecture]
    concern: [web]
  example_good: |
    <!-- Jinja2 auto-escapes by default in .html -->
    <p>{{ user_comment }}</p>
    <!-- Renders <script> as text, not executable -->
  example_bad: |
    <p>{{ user_comment | safe }}</p>
    <!-- |safe disables escaping — XSS if user_comment has <script> -->
  when_applies: Any project using Flask web applications, Jinja2, or Python codebases
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities
  sources: ["https://jinja.palletsprojects.com/en/stable/templates/#html-escaping"]
- id: CR-STATIC-001
  text: Static file serving must set appropriate cache headers and use content hashing for cache busting.
  why: Without cache headers, browsers re-fetch unchanged files on every page load (slow). Without cache busting, browsers
    serve stale cached files after updates (broken).
  how_to_do_right: 'Set Cache-Control: max-age=31536000 for hashed assets. Use flask.url_for(''static'', filename=''style.css'')
    which adds version parameters.'
  severity: low
  technologies:
    lang: [python]
    framework: [flask]
  domains:
    domain: [architecture, performance]
    concern: [web]
  example_good: |
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Flask adds ?v=hash for cache busting -->
  example_bad: |
    <link rel="stylesheet" href="/static/style.css">
    <!-- No cache busting — users see stale CSS after deploy -->
  when_applies: Projects using Flask web applications or Python codebases
  when_not_applies: CLI tools, batch scripts, or backend services with no HTTP interface. projects not using Flask or Python
  sources: ["https://flask.palletsprojects.com/en/stable/patterns/caching/"]
- id: CR-FASTAPI-001
  text: FastAPI dependency injection should be used for auth, db sessions, and config — not global state.
  why: Global state makes testing difficult, creates coupling, and prevents request isolation. Dependencies are testable,
    mockable, and request-scoped.
  how_to_do_right: Use Depends() for auth (get_current_user), database (get_db), and config (get_settings). Override in tests
    with app.dependency_overrides.
  severity: medium
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [architecture, api]
  example_good: |
    @app.get("/api/items")
    async def list_items(
        db: Session = Depends(get_db),
        user: User = Depends(get_current_user),
    ):
        return db.query(Item).filter_by(owner=user.id).all()
  example_bad: |
    db = get_global_db()  # Global state — not testable
    @app.get("/api/items")
    async def list_items():
        return db.query(Item).all()
  when_applies: Projects using FastAPI async web services or Python codebases
  when_not_applies: internal modules with no exposed interface, monolithic single-process apps. projects not using FastAPI
    or Python
  sources: ["https://fastapi.tiangolo.com/tutorial/dependencies/"]
- id: CR-FASTAPI-002
  text: FastAPI response models must be explicitly defined, not returning raw dicts.
  why: Raw dicts have no validation, no documentation, and can accidentally leak internal fields (password_hash, internal_id).
  how_to_do_right: Define Pydantic response models. Use response_model= parameter on the route decorator. Exclude internal
    fields explicitly.
  severity: medium
  technologies:
    lang: [python]
    framework: [fastapi, pydantic]
  domains:
    domain: [architecture, api, security]
  example_good: |
    class UserResponse(BaseModel):
        id: int
        name: str
        email: str

    @app.get("/api/users/{uid}", response_model=UserResponse)
    async def get_user(uid: int):
        return db.get(User, uid)  # password_hash excluded
  example_bad: |
    @app.get("/api/users/{uid}")
    async def get_user(uid: int):
        return db.get(User, uid).__dict__  # Leaks password_hash!
  when_applies: Projects using FastAPI async web services, Pydantic data validation, or Python codebases
  when_not_applies: internal modules with no exposed interface, monolithic single-process apps
  sources: ["https://fastapi.tiangolo.com/tutorial/response-model/"]
- id: CR-PY-MUTABLE-001
  text: Never use mutable default arguments in Python function signatures.
  why: Mutable defaults (list, dict, set) are shared across ALL calls to the function. Appending to a default list in one
    call affects all future calls.
  how_to_do_right: 'Use None as default, create a new mutable in the function body: def f(items=None): items = items or []'
  severity: high
  technologies:
    lang: [python]
  domains: [web, backend]
  example_good: "def process(items=None):\n    items = items or []\n    items.append(\"new\")\n    return items\n"
  example_bad: "def process(items=[]):  # SHARED across all calls!\n    items.append(\"new\")\n    return items\n"
  when_applies: Projects using Python codebases
  when_not_applies: projects not using Python
  sources: ["https://docs.python.org/3/reference/compound_stmts.html#function-definitions"]
