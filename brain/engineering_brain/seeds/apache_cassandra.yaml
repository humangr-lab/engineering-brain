- id: CR-CASS-014
  text: Understand that Cassandra deletes are writes — design your schema to minimize explicit DELETEs.
  why: In Cassandra, DELETE does not remove data immediately. It writes a tombstone — a marker that says 'this data was deleted
    at time T'. Tombstones consume disk space, memory, and read I/O until gc_grace_seconds passes and compaction removes them.
    A workload that heavily uses DELETE (e.g., queue-like table where you delete after processing) generates enormous tombstone
    overhead, degrading read performance and causing compaction pressure.
  how_to_do_right: Use TTL for data that has a natural expiration (sessions, caches, time-series). Use time-bucketed tables
    and drop entire tables instead of deleting rows. For queue-like patterns, use Kafka instead of Cassandra. If you must
    delete, batch deletes by partition key to minimize tombstone scatter. Monitor tombstone counts with nodetool tablestats.
  severity: medium
  technologies:
    lang: [cql]
    platform: [cassandra]
  domains:
    domain: [architecture, performance]
    concern: [data, database, data_modeling]
  example_good: '-- Use TTL instead of DELETE for session data

    INSERT INTO sessions (session_id, user_id, data)

    VALUES (?, ?, ?)

    USING TTL 3600;  -- Auto-expires in 1 hour, no manual DELETE needed


    -- Time-bucketed table — drop old months instead of deleting rows

    CREATE TABLE events_2026_02 (...);

    -- When February ends:

    DROP TABLE events_2026_02;  -- Instant, no tombstones

    '
  example_bad: '-- Queue pattern: insert, process, delete — tombstone generator

    INSERT INTO task_queue (queue_id, task_id, payload) VALUES (?, ?, ?);

    -- ... process task ...

    DELETE FROM task_queue WHERE queue_id = ? AND task_id = ?;

    -- 1M tasks/day = 1M tombstones/day

    -- Read performance degrades, compaction cannot keep up

    '
  when_applies: Projects using Apache Cassandra distributed storage or CQL
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using Cassandra
    or CQL
  sources: ["https://cassandra.apache.org/doc/latest/cassandra/operating/compaction/index.html"]
- id: CR-CASS-015
  text: Use prepared statements for all application queries — never build CQL strings with string concatenation.
  why: Prepared statements are parsed and optimized once by Cassandra, then executed multiple times with different parameters.
    Without prepared statements, every query execution re-parses the CQL, re-computes the query plan, and cannot reuse the
    coordinator's prepared statement cache. This wastes CPU on every node and increases p99 latency by 2-5x. String concatenation
    also opens CQL injection vulnerabilities (Cassandra's equivalent of SQL injection).
  how_to_do_right: Prepare statements once at application startup or first use, cache the PreparedStatement object, and bind
    parameters at execution time. Use the driver's built-in parameter binding (?) — never use Python f-strings or .format()
    to build CQL. For batch operations, use BatchStatement with prepared statements.
  severity: high
  technologies:
    lang: [cql, python]
    platform: [cassandra]
  domains:
    domain: [architecture, performance, security]
    concern: [data, database]
  example_good: "from cassandra.cluster import Cluster\nfrom cassandra.query import BatchStatement, ConsistencyLevel\n\ncluster\
    \ = Cluster(['node1', 'node2', 'node3'])\nsession = cluster.connect('app_data')\n\n# Prepare once, reuse many times\n\
    insert_order = session.prepare(\n    \"INSERT INTO orders (order_id, user_id, total, status) VALUES (?, ?, ?, ?)\"\n)\n\
    insert_order.consistency_level = ConsistencyLevel.LOCAL_QUORUM\n\n# Bind parameters safely at execution time\nsession.execute(insert_order,\
    \ [order_id, user_id, total, 'PENDING'])\n\n# Batch with prepared statements\nbatch = BatchStatement(consistency_level=ConsistencyLevel.LOCAL_QUORUM)\n\
    batch.add(insert_order, [order1_id, user1_id, 99.99, 'PENDING'])\nbatch.add(insert_order, [order2_id, user2_id, 49.99,\
    \ 'PENDING'])\nsession.execute(batch)\n"
  example_bad: "# String concatenation — CQL injection + no prepared statement cache\nsession.execute(\n    f\"INSERT INTO\
    \ orders (order_id, user_id, total) \"\n    f\"VALUES ('{order_id}', '{user_id}', {total})\"\n)\n# CQL injection: user_id\
    \ = \"'; DROP TABLE orders; --\"\n# Also: re-parses query on every call, wasting coordinator CPU\n"
  when_applies: Projects using Apache Cassandra distributed storage, CQL, or Python codebases
  when_not_applies: stateless microservices with no data persistence, pure computation modules
  sources: ["https://cassandra.apache.org/doc/latest/cassandra/cql/dml.html#prepared-statements"]
