- id: CR-CASS-013
  text: Avoid reading before writing (read-modify-write) — use Cassandra's native upsert and collection operations instead.
  why: 'Cassandra writes are append-only and do not read existing data. A write (INSERT/UPDATE) always succeeds regardless
    of whether the row exists — it is an upsert. Reading before writing to check current state introduces a race condition:
    between the read and the write, another client may have changed the data. It also doubles the latency (read + write) and
    negates Cassandra''s write-optimized architecture. The only exception is lightweight transactions (IF conditions), which
    use Paxos for atomic read-modify-write.'
  how_to_do_right: 'Use upserts: INSERT and UPDATE are identical in Cassandra. Use counter columns for atomic increments.
    Use collection append operations (UPDATE SET list = list + [item]) for adding to lists/sets. For true conditional updates,
    use LWTs sparingly. Design your data model to avoid the need for read-modify-write entirely.'
  severity: medium
  technologies:
    lang: [cql]
    platform: [cassandra]
  domains:
    domain: [architecture, performance]
    concern: [data, database, data_modeling]
  example_good: '-- Atomic counter increment — no read needed

    UPDATE page_views SET view_count = view_count + 1

    WHERE page_id = ? AND date = ?;


    -- Atomic set append — no read needed

    UPDATE user_tags SET tags = tags + {''premium''}

    WHERE user_id = ?;


    -- Upsert — works whether row exists or not

    INSERT INTO user_preferences (user_id, theme, language)

    VALUES (?, ''dark'', ''en'');

    -- Overwrites if exists, creates if not — no read needed

    '
  example_bad: '# Anti-pattern: read-modify-write in application code

    row = session.execute("SELECT tags FROM users WHERE user_id = ?", [uid]).one()

    current_tags = row.tags or set()

    current_tags.add(''premium'')

    session.execute("UPDATE users SET tags = ? WHERE user_id = ?", [current_tags, uid])

    # Race condition: concurrent update between read and write is lost

    # Double latency: read + write instead of just write

    '
