layer: rules
technology: OCI
domain: cloud
knowledge:
- id: CR-OCI-001
  text: Organize OCI resources into compartments by environment and workload — never put everything in the root compartment.
  why: The root compartment is the tenancy itself. Putting all resources there makes IAM policies overly broad (any policy
    applies to everything), cost tracking impossible (no compartment-level budgets), and blast radius unlimited (one misconfiguration
    affects all environments). Compartments are the foundational isolation mechanism in OCI.
  how_to_do_right: Create top-level compartments by environment (prod, staging, dev) or by team. Create sub-compartments for
    specific workloads (network, database, compute). Apply IAM policies at the compartment level. Set budgets per compartment.
    Use compartment quotas to prevent runaway resource creation.
  severity: critical
  technologies:
    platform: [oci, aws, iam]
  domains:
    domain: [operations, security]
    concern: [cloud, organization]
  example_good: "# Compartment hierarchy\nTenancy (root)\n├── Production\n│   ├── prod-network    # VCN, subnets, gateways\n\
    │   ├── prod-compute    # VM instances, OKE clusters\n│   ├── prod-database   # Autonomous DB, MySQL\n│   └── prod-storage\
    \    # Object Storage, Block Volumes\n├── Staging\n│   ├── staging-network\n│   └── staging-compute\n└── Shared\n    ├──\
    \ shared-security  # Vault, keys\n    └── shared-logging   # Audit, logs\n\n# Policy scoped to compartment\nAllow group\
    \ DBAdmins to manage autonomous-database-family\n  in compartment Production/prod-database\n"
  example_bad: '# Everything in root compartment

    Tenancy (root)

    ├── vm-prod-1

    ├── vm-dev-1

    ├── db-prod

    ├── db-test

    └── random-experiment

    # Cannot scope policies — "manage all-resources" applies to EVERYTHING

    # Cannot track costs per environment

    # Dev experiment accidentally uses prod database

    '
  when_applies: Any project using OCI or IAM
  when_not_applies: local-only or on-premises deployments. projects not using OCI or IAM
  sources: ["https://docs.oracle.com/iaas/Content/Identity/Tasks/managingcompartments.htm"]
- id: CR-OCI-002
  text: Write OCI IAM policies with explicit compartment scope and specific resource types — never use 'manage all-resources
    in tenancy'.
  why: 'OCI IAM uses a unique policy language: ''Allow group X to verb resource-type in compartment Y''. Using ''manage all-resources
    in tenancy'' gives a group full admin access to every resource in every compartment. This violates least privilege and
    means a compromised account can destroy everything.'
  how_to_do_right: Use the most restrictive verb (inspect < read < use < manage). Specify exact resource types (instances,
    autonomous-databases, object-family). Scope to specific compartments. Use conditions (where) for fine-grained access.
    Review policies quarterly.
  severity: critical
  technologies:
    platform: [oci, aws, iam]
  domains:
    domain: [operations, security]
    concern: [cloud]
  example_good: "# Specific resource type, specific compartment, least privilege\nAllow group AppDevs to manage instances\
    \ in compartment staging-compute\nAllow group AppDevs to read autonomous-databases in compartment staging-database\nAllow\
    \ group AppDevs to use object-family in compartment staging-storage\n\n# Conditional policy\nAllow group AppDevs to manage\
    \ instances in compartment staging-compute\n  where request.permission = 'INSTANCE_CREATE'\n  AND target.compartment.name\
    \ = 'staging-compute'\n\n# Network admin — only networking resources\nAllow group NetAdmins to manage virtual-network-family\
    \ in compartment Production/prod-network\n"
  example_bad: '# God-mode policy — NEVER do this

    Allow group Developers to manage all-resources in tenancy

    # Every developer can: delete prod databases, modify IAM, access secrets

    # Compromised account = full tenancy takeover

    '
  when_applies: Any project using OCI or IAM
  when_not_applies: local-only or on-premises deployments. projects not using OCI or IAM
  sources: ["https://docs.oracle.com/iaas/Content/Identity/policysyntax/policysyntax.htm"]
- id: CR-OCI-003
  text: Use Autonomous Database with auto-scaling enabled and choose the correct workload type — ATP for OLTP, ADW for analytics.
  why: ATP (Autonomous Transaction Processing) is optimized for row-based OLTP workloads with indexes, joins, and transactions.
    ADW (Autonomous Data Warehouse) is optimized for columnar analytics with scans and aggregations. Choosing wrong means
    2-10x slower queries. Auto-scaling handles traffic spikes without manual intervention — without it, your DB throttles
    during peak hours.
  how_to_do_right: 'Choose ATP for: web apps, microservices, mixed workloads. Choose ADW for: reporting, data warehousing,
    batch analytics. Enable auto-scaling (scales up to 3x base OCPU). Set base OCPU to your sustained load, let auto-scaling
    handle peaks. Use always-free tier for dev/test (1 OCPU, 20GB).'
  severity: high
  technologies:
    library: [autonomous database]
    platform: [oci]
  domains:
    domain: [operations, architecture]
    concern: [cloud, data, database]
  example_good: "# ATP for transactional workload with auto-scaling\noci db autonomous-database create \\\n  --compartment-id\
    \ $COMPARTMENT_ID \\\n  --db-name myapp \\\n  --display-name \"MyApp Production\" \\\n  --db-workload OLTP \\\n  --cpu-core-count\
    \ 2 \\\n  --data-storage-size-in-tbs 1 \\\n  --is-auto-scaling-enabled true \\\n  --admin-password \"$ADMIN_PASSWORD\"\
    \ \\\n  --is-mtls-connection-required true\n\n# ADW for analytics\noci db autonomous-database create \\\n  --db-workload\
    \ DW \\\n  --cpu-core-count 4 \\\n  --is-auto-scaling-enabled true\n"
  example_bad: "# ADW for a web application (wrong workload type)\noci db autonomous-database create \\\n  --db-workload DW\
    \ \\\n  --cpu-core-count 2\n# Row-level lookups are 5-10x slower on columnar storage\n# INSERT/UPDATE operations significantly\
    \ slower\n# Auto-scaling disabled — throttles during peak traffic\n"
  when_applies: Projects using OCI or Autonomous Database
  when_not_applies: local-only or on-premises deployments. projects not using OCI or Autonomous Database
  sources: ["https://docs.oracle.com/iaas/Content/Database/Concepts/adboverview.htm"]
- id: CR-OCI-004
  text: Use Autonomous Database auto-indexing — do not manually create indexes unless auto-indexing misses a critical query
    pattern.
  why: Manual index management is error-prone — missing indexes cause slow queries, excessive indexes waste storage and slow
    DML. Autonomous Database auto-indexing analyzes SQL workload, creates indexes that improve performance, and drops indexes
    that are not used. It monitors and adjusts continuously without DBA intervention.
  how_to_do_right: Enable auto-indexing (on by default in newer versions). Monitor the auto-indexing activity report. Override
    only for specific queries where auto-indexing does not create the optimal index. Use the allow/deny list to guide auto-indexing.
    Review the auto-index report monthly.
  severity: medium
  technologies:
    library: [autonomous database]
    platform: [oci]
  domains:
    domain: [operations, architecture, performance]
    concern: [cloud, data, database]
  example_good: '-- Enable auto-indexing

    EXEC DBMS_AUTO_INDEX.CONFIGURE(''AUTO_INDEX_MODE'', ''IMPLEMENT'');


    -- Check auto-indexing report

    SELECT DBMS_AUTO_INDEX.REPORT_ACTIVITY() FROM DUAL;


    -- Check auto-created indexes

    SELECT index_name, auto, visibility, status

    FROM user_indexes

    WHERE auto = ''YES'';


    -- Allow list for specific schemas

    EXEC DBMS_AUTO_INDEX.CONFIGURE(''AUTO_INDEX_SCHEMA'', ''MYAPP'', TRUE);

    '
  example_bad: '-- Manual indexes everywhere, no auto-indexing

    CREATE INDEX idx_orders_customer ON orders(customer_id);

    CREATE INDEX idx_orders_status ON orders(status);

    CREATE INDEX idx_orders_date ON orders(created_at);

    CREATE INDEX idx_orders_cust_date ON orders(customer_id, created_at);

    -- 50 indexes on a table — DML is 3x slower

    -- Half are never used — wasting storage and write performance

    -- Nobody knows which to drop

    '
  when_applies: Projects using OCI or Autonomous Database
  when_not_applies: local-only or on-premises deployments. projects not using OCI or Autonomous Database
  sources: ["https://docs.oracle.com/iaas/autonomous-database-serverless/doc/manage-auto-indexing.html"]
- id: CR-OCI-005
  text: Use VCN-native pod networking on OKE for direct VCN IP assignment — flannel overlay adds latency and complexity.
  why: Flannel overlay networking encapsulates pod traffic in VXLAN — adding ~5-10% CPU overhead, extra latency, and making
    network troubleshooting harder. VCN-native pod networking assigns pods real VCN IPs directly, eliminating the overlay.
    Pods become first-class VCN citizens — accessible via NSGs, route tables, and DNS without NAT.
  how_to_do_right: Create the OKE cluster with VCN-native pod networking (requires a dedicated pod subnet). Size the pod subnet
    for max pods (each node gets a /25 or /26). Use NSGs on the pod subnet for security. This requires OCI CNI plugin — not
    compatible with flannel.
  severity: medium
  technologies:
    library: [oke]
    platform: [oci, kubernetes]
  domains:
    domain: [operations, infrastructure]
    concern: [cloud, containers, networking]
  example_good: "# OKE cluster with VCN-native pod networking\noci ce cluster create \\\n  --compartment-id $COMPARTMENT_ID\
    \ \\\n  --name my-cluster \\\n  --vcn-id $VCN_ID \\\n  --kubernetes-version v1.28.2 \\\n  --cluster-pod-network-options\
    \ '[{\n    \"cniType\": \"OCI_VCN_IP_NATIVE\"\n  }]' \\\n  --service-lb-subnet-ids '[\"'$LB_SUBNET_ID'\"]' \\\n  --endpoint-subnet-id\
    \ $ENDPOINT_SUBNET_ID\n\n# Node pool with pod subnet\noci ce node-pool create \\\n  --cluster-id $CLUSTER_ID \\\n  --name\
    \ worker-pool \\\n  --node-shape VM.Standard.E4.Flex \\\n  --pod-subnet-ids '[\"'$POD_SUBNET_ID'\"]'\n"
  example_bad: "# Default flannel overlay networking\noci ce cluster create \\\n  --cluster-pod-network-options '[{\"cniType\"\
    : \"FLANNEL_OVERLAY\"}]'\n# Pod IPs are internal to the overlay — not visible in VCN\n# Network policies harder to debug\n\
    # Cross-node pod traffic encapsulated in VXLAN — extra latency\n"
  when_applies: Projects using OCI, OKE, or Kubernetes-orchestrated deployments
  when_not_applies: local-only or on-premises deployments
  sources: ["https://docs.oracle.com/iaas/Content/ContEng/Concepts/contengpodnetworking.htm"]
- id: CR-OCI-006
  text: Use flex shapes on OCI compute to right-size CPU and memory independently — fixed shapes waste resources.
  why: Fixed shapes (e.g., VM.Standard2.4 = 4 OCPU, 60GB RAM) force you to choose from predefined combinations. Most workloads
    do not fit these ratios — a memory-heavy app on a balanced shape wastes CPU, a CPU-heavy app wastes memory. Flex shapes
    let you choose exact OCPU (1-64) and memory (1-1024 GB) independently.
  how_to_do_right: Use flex shapes (VM.Standard.E4.Flex, VM.Standard.A1.Flex for ARM) for all new instances. Set OCPU to match
    your workload. Set memory to your actual need. Use A1.Flex (ARM) for cost savings — up to 50% cheaper than AMD/Intel.
    Use preemptible instances for batch jobs.
  severity: medium
  technologies:
    library: [compute]
    platform: [oci]
  domains:
    domain: [operations, performance]
    concern: [cloud, cost]
  example_good: "# Flex shape — exact CPU and memory\noci compute instance launch \\\n  --compartment-id $COMPARTMENT_ID \\\
    \n  --shape VM.Standard.E4.Flex \\\n  --shape-config '{\"ocpus\": 2, \"memoryInGBs\": 16}' \\\n  --availability-domain\
    \ $AD \\\n  --subnet-id $SUBNET_ID \\\n  --image-id $IMAGE_ID\n\n# ARM flex shape — 50% cheaper for compatible workloads\n\
    oci compute instance launch \\\n  --shape VM.Standard.A1.Flex \\\n  --shape-config '{\"ocpus\": 4, \"memoryInGBs\": 24}'\n\
    \n# Preemptible for batch jobs (up to 50% off)\noci compute instance launch \\\n  --shape VM.Standard.E4.Flex \\\n  --preemptible-instance-config\
    \ '{\n    \"preemptionAction\": {\"type\": \"TERMINATE\", \"preserveBootVolume\": false}\n  }'\n"
  example_bad: '# Fixed shape — paying for resources you don''t use

    oci compute instance launch --shape VM.Standard2.4

    # 4 OCPU, 60GB RAM — but your app needs 2 OCPU and 8GB

    # Paying for 52GB of unused RAM

    # ~$200/month wasted per instance

    '
  when_applies: Projects using OCI or Compute
  when_not_applies: local-only or on-premises deployments. projects not using OCI or Compute
  sources: ["https://docs.oracle.com/iaas/Content/Compute/References/computeshapes.htm"]
- id: CR-OCI-007
  text: Use Network Security Groups (NSGs) instead of Security Lists on OCI — NSGs are attached to resources, not subnets.
  why: Security Lists apply to all resources in a subnet — if one VM needs port 8080 open, every VM in the subnet gets it.
    NSGs are attached to individual VNICs (network interfaces), so rules apply per-resource. This enables microsegmentation
    without creating a subnet per security profile. NSGs are also stateful by default and easier to manage.
  how_to_do_right: Create NSGs per application tier (web-nsg, app-nsg, db-nsg). Attach NSGs to compute instances and load
    balancers. Use Security Lists only for broad subnet-level rules (e.g., deny all ingress). Layer NSGs on top for per-resource
    rules. NSG rules are additive — traffic matching ANY NSG or Security List rule is allowed.
  severity: high
  technologies:
    library: [vcn]
    platform: [oci, networking]
  domains:
    domain: [operations, infrastructure, security]
    concern: [cloud, networking]
  example_good: "# Create NSG for web tier\noci network nsg create \\\n  --compartment-id $COMPARTMENT_ID \\\n  --vcn-id $VCN_ID\
    \ \\\n  --display-name web-tier-nsg\n\n# Add rule: allow HTTPS from internet\noci network nsg rules add \\\n  --nsg-id\
    \ $WEB_NSG_ID \\\n  --security-rules '[{\n    \"direction\": \"INGRESS\",\n    \"protocol\": \"6\",\n    \"source\": \"\
    0.0.0.0/0\",\n    \"sourceType\": \"CIDR_BLOCK\",\n    \"tcpOptions\": {\"destinationPortRange\": {\"min\": 443, \"max\"\
    : 443}},\n    \"isStateless\": false\n  }]'\n\n# Attach NSG to instance VNIC\noci compute instance attach-vnic \\\n  --instance-id\
    \ $INSTANCE_ID \\\n  --nsg-ids '[\"'$WEB_NSG_ID'\"]'\n"
  example_bad: "# Security List on subnet — applies to ALL resources\noci network security-list update \\\n  --security-list-id\
    \ $SL_ID \\\n  --ingress-security-rules '[{\n    \"source\": \"0.0.0.0/0\",\n    \"protocol\": \"6\",\n    \"tcpOptions\"\
    : {\"destinationPortRange\": {\"min\": 8080, \"max\": 8080}}\n  }]'\n# Every instance in the subnet now has port 8080\
    \ open\n# Database server in the same subnet? Port 8080 open to the internet\n"
  when_applies: Projects using OCI, Networking, or VCN
  when_not_applies: local-only or on-premises deployments
  sources: ["https://docs.oracle.com/iaas/Content/Network/Concepts/networksecuritygroups.htm"]
- id: CR-OCI-008
  text: Use a Dynamic Routing Gateway (DRG) for VCN peering and on-premises connectivity — never create point-to-point peering
    for more than 2 VCNs.
  why: Local VCN peering creates point-to-point connections. With 5 VCNs, you need 10 peering connections (n*(n-1)/2). With
    10 VCNs, you need 45. This is unmanageable, has no centralized routing, and no transit routing. A DRG acts as a hub —
    all VCNs attach to it, and route tables control traffic flow. It also connects to on-premises via IPSec VPN or FastConnect.
  how_to_do_right: Create one DRG per region. Attach all VCNs to the DRG. Use DRG route tables to control which VCNs can communicate.
    Use DRG for on-premises connectivity (IPSec VPN for dev/test, FastConnect for production). Use import/export route distributions
    for automation.
  severity: high
  technologies:
    library: [drg]
    platform: [oci, networking]
  domains:
    domain: [operations, infrastructure]
    concern: [cloud, networking]
  example_good: "# Create DRG (hub)\noci network drg create \\\n  --compartment-id $COMPARTMENT_ID \\\n  --display-name \"\
    regional-hub\"\n\n# Attach VCNs to DRG\noci network drg-attachment create \\\n  --drg-id $DRG_ID \\\n  --vcn-id $PROD_VCN_ID\
    \ \\\n  --display-name \"prod-attachment\"\n\noci network drg-attachment create \\\n  --drg-id $DRG_ID \\\n  --vcn-id\
    \ $STAGING_VCN_ID \\\n  --display-name \"staging-attachment\"\n\n# Route table on DRG controls traffic flow\n# Production\
    \ VCN can reach shared services\n# Staging VCN isolated from production\n"
  example_bad: '# Point-to-point peering for 5 VCNs

    # prod <-> staging (peering 1)

    # prod <-> shared (peering 2)

    # staging <-> shared (peering 3)

    # dev <-> shared (peering 4)

    # ... 10 peering connections total

    # No transit routing — prod cannot reach dev through shared

    # Adding a 6th VCN requires 5 new peerings

    '
  when_applies: Projects using OCI, Networking, or DRG
  when_not_applies: local-only or on-premises deployments
  sources: ["https://docs.oracle.com/iaas/Content/Network/Tasks/managingDRGs.htm"]
- id: CR-OCI-009
  text: Use pre-authenticated requests (PARs) for temporary access to OCI Object Storage — never make buckets public.
  why: Public buckets expose all objects to the internet. PARs provide time-limited, scoped access to specific objects or
    prefixes without requiring OCI credentials. They can be read-only, write-only, or read-write. Expired PARs return 404
    — no residual access. Revoking a PAR is instant.
  how_to_do_right: Create PARs with the shortest practical expiration time (hours, not months). Scope to specific objects
    or prefixes (not entire buckets). Use read-only PARs for downloads, write-only for uploads. Log PAR creation for audit.
    Revoke PARs immediately when no longer needed.
  severity: high
  technologies:
    library: [object storage]
    platform: [oci]
  domains:
    domain: [operations, security]
    concern: [cloud]
  example_good: "# Create PAR for a specific object (read-only, 1 hour)\noci os preauth-request create \\\n  --namespace $NAMESPACE\
    \ \\\n  --bucket-name my-bucket \\\n  --name \"download-report\" \\\n  --access-type ObjectRead \\\n  --object-name \"\
    reports/2026-02-report.pdf\" \\\n  --time-expires \"2026-02-17T13:00:00Z\"\n\n# Create PAR for prefix (write-only for\
    \ uploads)\noci os preauth-request create \\\n  --namespace $NAMESPACE \\\n  --bucket-name uploads \\\n  --name \"user-uploads\"\
    \ \\\n  --access-type AnyObjectReadWrite \\\n  --bucket-listing-action ListObjects \\\n  --time-expires \"2026-02-18T00:00:00Z\"\
    \n\n# List and revoke PARs\noci os preauth-request list --bucket-name my-bucket\noci os preauth-request delete --par-id\
    \ $PAR_ID --bucket-name my-bucket\n"
  example_bad: "# Make bucket public\noci os bucket update \\\n  --name my-data \\\n  --public-access-type ObjectRead\n# ALL\
    \ objects in the bucket readable by anyone with the URL\n# Crawlers will find and index it\n# Cannot scope access to specific\
    \ objects or time\n"
  when_applies: Projects using OCI or Object Storage
  when_not_applies: local-only or on-premises deployments. projects not using OCI or Object Storage
  sources: ["https://docs.oracle.com/iaas/Content/Object/Tasks/usingpreauthenticatedrequests.htm"]
- id: CR-OCI-010
  text: Use OCI Functions with API Gateway triggers for HTTP endpoints — do not expose functions directly without rate limiting
    and authentication.
  why: 'OCI Functions can be invoked directly via the OCI SDK, but this requires OCI credentials. For HTTP endpoints, API
    Gateway provides: rate limiting, authentication (JWT, OAuth2), request/response transformation, caching, and CORS — none
    of which functions provide natively. Direct invocation also lacks WAF protection.'
  how_to_do_right: Create an API Gateway deployment with routes pointing to functions. Configure authentication (JWT validation,
    OAuth2). Set rate limits per client. Enable request validation. Use WAF policies for DDoS protection. Use function metrics
    for autoscaling decisions.
  severity: high
  technologies:
    library: [functions]
    platform: [oci, aws, apigateway]
  domains:
    domain: [operations, architecture, security]
    concern: [cloud, serverless]
  example_good: "# API Gateway with function backend + auth + rate limit\napiVersion: oci/v1\nkind: ApiGateway\nspec:\n  displayName:\
    \ my-api\n  routes:\n    - path: /orders\n      methods: [GET, POST]\n      backend:\n        type: ORACLE_FUNCTIONS_BACKEND\n\
    \        functionId: ocid1.fnfunc.oc1...\n      requestPolicies:\n        authentication:\n          type: JWT_AUTHENTICATION\n\
    \          tokenHeader: Authorization\n          issuers: [\"https://auth.example.com/\"]\n          audiences: [\"https://api.example.com\"\
    ]\n        rateLimiting:\n          rateInRequestsPerSecond: 100\n          rateKey: CLIENT_IP\n"
  example_bad: '# Function invoked directly — no auth, no rate limit

    fn invoke my-app my-function < payload.json

    # No rate limiting → DDoS vulnerable

    # No authentication → anyone can invoke

    # No request validation → injection attacks possible

    # No WAF → no protection against common web attacks

    '
  when_applies: Projects using OCI, Functions, or API Gateway
  when_not_applies: local-only or on-premises deployments
  sources: ["https://docs.oracle.com/iaas/Content/APIGateway/Concepts/apigatewayoverview.htm"]
- id: CR-OCI-011
  text: Federate OCI IAM with your corporate identity provider — do not create standalone OCI local users for employees.
  why: 'Local OCI users require separate passwords, separate MFA, and separate lifecycle management. When an employee leaves,
    their OCI account must be manually disabled — often forgotten, leaving orphaned accounts with active access. Federation
    with SAML/OIDC means: single source of truth, automatic deprovisioning, corporate MFA, and centralized audit logs.'
  how_to_do_right: Configure SAML 2.0 federation with your IdP (Azure AD, Okta, Google Workspace). Map IdP groups to OCI groups
    for RBAC. Use OCI Identity Domains for SCIM provisioning. Keep a break-glass local admin account (stored in a safe) for
    emergency access when IdP is down.
  severity: high
  technologies:
    library: [identity]
    platform: [oci, aws, iam]
  domains:
    domain: [operations, security]
    concern: [cloud]
  example_good: "# Configure SAML federation with Azure AD\noci iam identity-provider create-saml2-provider \\\n  --compartment-id\
    \ $TENANCY_ID \\\n  --name \"AzureAD-Federation\" \\\n  --metadata-url \"https://login.microsoftonline.com/.../federationmetadata/2007-06/federationmetadata.xml\"\
    \ \\\n  --product-type ADFS\n\n# Map IdP group to OCI group\noci iam idp-group-mapping create \\\n  --identity-provider-id\
    \ $IDP_ID \\\n  --idp-group-name \"Azure-CloudAdmins\" \\\n  --group-id $OCI_ADMIN_GROUP_ID\n\n# Break-glass local admin\
    \ (emergency only)\n# Store credentials in physical safe or secrets manager\n"
  example_bad: '# Create local users for each employee

    oci iam user create --name john.doe@company.com

    oci iam user create --name jane.smith@company.com

    # John leaves the company

    # His OCI account stays active for 6 months

    # Uses it to download customer data on his way out

    '
  when_applies: Projects using OCI, IAM, or Identity
  when_not_applies: local-only or on-premises deployments
  sources: ["https://docs.oracle.com/iaas/Content/Identity/Concepts/federation.htm"]
- id: CR-OCI-012
  text: Use Autonomous Database always-free tier for development and testing — but never for production workloads.
  why: 'The always-free tier (1 OCPU, 20GB storage) is genuinely free and useful for learning and development. But it has
    restrictions: no auto-scaling, no backups beyond 60 days, the instance is reclaimed after 30 days of inactivity, and performance
    is limited. Production workloads on always-free will hit limits at the worst possible time — during a traffic spike.'
  how_to_do_right: 'Use always-free for: learning, development, prototyping, CI/CD test databases. Use paid instances for:
    staging (to match production), production (with auto-scaling and backups). Monitor always-free instances for usage — upgrade
    before hitting limits.'
  severity: medium
  technologies:
    library: [autonomous database]
    platform: [oci]
  domains:
    domain: [operations, architecture]
    concern: [cloud, data, database, cost]
  example_good: "# Always-free for development\noci db autonomous-database create \\\n  --compartment-id $COMPARTMENT_ID \\\
    \n  --db-name devdb \\\n  --display-name \"Dev Database\" \\\n  --db-workload OLTP \\\n  --is-free-tier true \\\n  --cpu-core-count\
    \ 1 \\\n  --data-storage-size-in-tbs 0.02\n\n# Paid instance for production\noci db autonomous-database create \\\n  --db-name\
    \ proddb \\\n  --display-name \"Production Database\" \\\n  --db-workload OLTP \\\n  --is-free-tier false \\\n  --cpu-core-count\
    \ 4 \\\n  --data-storage-size-in-tbs 1 \\\n  --is-auto-scaling-enabled true\n"
  example_bad: "# Production on always-free tier\noci db autonomous-database create \\\n  --db-name proddb \\\n  --is-free-tier\
    \ true\n# No auto-scaling → throttled during traffic spikes\n# Instance reclaimed after 30 days idle (holiday season?)\n\
    # Limited backup retention → data loss risk\n# 1 OCPU → 10ms query becomes 100ms under load\n"
  when_applies: Projects using OCI or Autonomous Database
  when_not_applies: local-only or on-premises deployments. projects not using OCI or Autonomous Database
