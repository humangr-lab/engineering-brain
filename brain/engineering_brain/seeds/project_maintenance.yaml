layer: rules
domain: operations
knowledge:
- id: MAINT-001
  text: >
    Maintain a technical debt register as a first-class artifact in the team's issue
    tracker. Every debt item must have: description, business impact (qualitative or
    quantitative), estimated remediation cost in hours, and an interest rate (cost per
    sprint of NOT fixing it). Items without an owner and a target sprint are decoration,
    not management.
  why: >
    Teams without a debt register make decisions to defer debt indefinitely, believing
    "we'll fix it later." A 2025 vFunction study found only 24% of organizations have a
    consistent way to track debt across projects. Teams with a formal register with interest
    rates achieve at least 50% faster service delivery because high-interest debt gets
    prioritized before it compounds. Interest calculation transforms debt from abstract
    ("the code is messy") to concrete ("this costs 2 hours per sprint in production incidents").
  how_to_do_right: |
    1. Create debt register as GitHub Issues with label "tech-debt" or Jira epic.
    2. Required fields per item:
       - Title: concise description
       - Component: which service/module
       - Impact: what breaks or slows down
       - Remediation hours: estimated fix cost
       - Interest rate: hours per sprint of ongoing cost (incidents, workarounds, slowdowns)
       - Owner: who knows this area
       - Target sprint: when we plan to address it (or "backlog")
    3. Calculate payoff sprint: remediation_hours / interest_rate_per_sprint = sprints_until_break_even
       Example: 40h fix / 4h per sprint = 10 sprints. If we're holding it for > 10 sprints, ship now.
    4. Review register in quarterly planning: retire completed items, update interest rates.
    5. Cap debt intake: if debt register > 20 items, freeze new features until top-5 items are resolved.
  severity: high
  technologies:
    lang: [python]
    framework: [github-issues, jira]
  domains:
    domain: [operations, technical_debt]
    concern: [debt_management, prioritization, sustainability]
  example_good: |
    # tech_debt_register.md entry example
    ## DEBT-042: Payment service uses synchronous HTTP for fraud check
    - **Component**: payment-service/charge.py
    - **Impact**: P99 latency +800ms on every checkout; scales linearly with fraud service latency
    - **Remediation**: Async fraud check with optimistic proceed + async review queue (40h)
    - **Interest rate**: 3h/sprint (manual incident investigation when fraud service is slow)
    - **Break-even**: 40h / 3h per sprint = 13.3 sprints. Currently held 8 sprints. FIX BY SPRINT 22.
    - **Owner**: @alice
    - **Target sprint**: Sprint 20

    # Python script to compute break-even
    def debt_break_even(remediation_hours: float, interest_per_sprint: float) -> float:
        """Sprints until fixing costs less than not fixing."""
        return remediation_hours / interest_per_sprint

    items = [
        {"id": "DEBT-042", "remediation_h": 40, "interest_h_per_sprint": 3},
        {"id": "DEBT-038", "remediation_h": 8, "interest_h_per_sprint": 2},
    ]
    for item in items:
        be = debt_break_even(item["remediation_h"], item["interest_h_per_sprint"])
        print(f"{item['id']}: fix within {be:.1f} sprints or it costs more to defer")
  example_bad: |
    # WRONG: debt in TODO comments — invisible to planning, never addressed
    # payment/charge.py
    def charge_user(user_id, amount):
        # TODO: make this async someday
        # FIXME: this is really slow, fix later
        # HACK: workaround for fraud service latency
        response = requests.post(fraud_check_url, timeout=5)  # blocking
        ...
    # These TODOs accumulate for years, nobody tracks their business impact
  when_applies: "Any team with more than 3 engineers, any codebase older than 6 months, any service with production incidents related to code quality."
  sources:
    - "https://vfunction.com/blog/how-to-manage-technical-debt/"
    - "https://martinfowler.com/bliki/TechnicalDebt.html"
    - "https://www.atlassian.com/agile/software-development/technical-debt"

- id: MAINT-002
  text: >
    Use Renovate (preferred over Dependabot) for automated dependency updates. Configure
    it with 3 tiers: patch updates auto-merge after tests pass, minor updates auto-merge
    for devDependencies and require PR review for production deps, major updates ALWAYS
    require manual review regardless of test results. Never auto-merge major version bumps.
  why: >
    A team running bare Dependabot with default settings generated 200+ open PRs that
    nobody reviewed, creating a "PR debt" worse than the original dependency debt. Auto-merge
    of minor updates for dev dependencies reduces noise by 70% while preserving human oversight
    on anything that changes the production behavior. Major version bumps frequently involve
    breaking API changes that tests don't catch (new deprecation warnings, changed default
    behavior, removed methods used at runtime).
  how_to_do_right: |
    1. Add renovate.json to repo root.
    2. Enable auto-merge for patch and minor dev dependencies:
       {
         "packageRules": [
           {
             "matchUpdateTypes": ["patch"],
             "automerge": true,
             "automergeType": "pr",
             "platformAutomerge": true
           },
           {
             "matchDepTypes": ["devDependencies"],
             "matchUpdateTypes": ["minor"],
             "automerge": true
           },
           {
             "matchUpdateTypes": ["major"],
             "automerge": false,
             "labels": ["major-update", "requires-review"],
             "assignees": ["team-lead"]
           }
         ]
       }
    3. Set schedule: "every weekend" to batch updates and reduce PR noise.
    4. Group related packages: pytest + pytest-* updates into single PR.
    5. Pin test environment versions separately from production versions.
  severity: medium
  technologies:
    lang: [json, yaml]
    framework: [renovate, dependabot, github-actions]
  domains:
    domain: [operations, dependency_management]
    concern: [security, freshness, maintenance_burden]
  example_good: |
    # renovate.json
    {
      "$schema": "https://docs.renovatebot.com/renovate-schema.json",
      "extends": ["config:recommended"],
      "schedule": ["every weekend"],
      "packageRules": [
        {
          "matchUpdateTypes": ["patch"],
          "automerge": true,
          "automergeType": "pr",
          "platformAutomerge": true
        },
        {
          "matchPackagePatterns": ["^pytest"],
          "groupName": "pytest packages",
          "automerge": true
        },
        {
          "matchDepTypes": ["dependencies"],
          "matchUpdateTypes": ["minor"],
          "automerge": false,
          "reviewers": ["team-tech-lead"]
        },
        {
          "matchUpdateTypes": ["major"],
          "automerge": false,
          "labels": ["major-update"],
          "assignees": ["team-tech-lead"],
          "prPriority": 10
        }
      ]
    }
  example_bad: |
    # WRONG: default Dependabot config — creates PR for every package, no auto-merge
    # .github/dependabot.yml
    version: 2
    updates:
      - package-ecosystem: pip
        directory: "/"
        schedule:
          interval: daily  # 50+ PRs per week, nobody reviews them, all go stale
    # After 3 months: 200 unreviewed Dependabot PRs, team ignores all of them
  when_applies: "Any repository with external dependencies (pip, npm, cargo, go.mod) that must be kept current for security reasons."
  sources:
    - "https://docs.renovatebot.com/configuration-options/"
    - "https://www.turbostarter.dev/blog/renovate-vs-dependabot-whats-the-best-tool-to-automate-your-dependency-updates"

- id: MAINT-003
  text: >
    Implement a formal API versioning lifecycle with 4 phases: active, deprecated,
    sunset-announced, and removed. Deprecated endpoints must return Deprecation and
    Sunset headers per RFC 8594. Announce sunset with at least 6 months notice for
    external APIs, 3 months for internal. Never remove an endpoint without the full cycle.
  why: >
    A B2B API provider removed a v1 endpoint with 2 weeks notice, causing 3 enterprise
    customers to file breach-of-contract claims (their SLAs required 90-day notice).
    RFC 8594 Sunset headers allow clients to programmatically detect deprecation and
    alert developers before removal — this is the only reliable way to drive migration
    at scale. Teams that omit deprecation headers see "why did this break?" support
    tickets that could have been prevented with 1 line of middleware.
  how_to_do_right: |
    1. Add deprecation middleware to FastAPI/Flask that injects headers for deprecated routes:
       Deprecation: true
       Sunset: Sat, 01 Jan 2026 00:00:00 GMT
       Link: <https://docs.api.com/migration/v1-to-v2>; rel="successor-version"
    2. Log each call to deprecated endpoints with caller identity (for migration tracking).
    3. 6 months before sunset: email all active callers (from logs).
    4. 30 days before sunset: Deprecation header becomes a 410-preview: add X-Deprecated-Soon: 30-days header.
    5. At sunset date: return 410 Gone with migration guide URL in body.
    6. Maintain a public API changelog: CHANGELOG.md with dated deprecation announcements.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi, flask]
  domains:
    domain: [operations, api_management]
    concern: [backward_compatibility, lifecycle_management, customer_trust]
  example_good: |
    # api/middleware/deprecation.py
    from datetime import datetime, timezone
    from fastapi import Request, Response
    from email.utils import format_datetime

    DEPRECATED_ROUTES = {
        "/api/v1/users": {
            "sunset": datetime(2026, 6, 1, tzinfo=timezone.utc),
            "successor": "https://docs.api.com/migration/v1-to-v2",
            "docs": "/api/v2/users",
        }
    }

    async def deprecation_middleware(request: Request, call_next):
        response: Response = await call_next(request)
        path = request.url.path
        if path in DEPRECATED_ROUTES:
            info = DEPRECATED_ROUTES[path]
            response.headers["Deprecation"] = "true"
            response.headers["Sunset"] = format_datetime(info["sunset"])
            response.headers["Link"] = f'<{info["successor"]}>; rel="successor-version"'
            # Log deprecated call for migration tracking
            logger.warning(
                "deprecated_endpoint_called",
                path=path,
                caller_ip=request.client.host,
                days_until_sunset=(info["sunset"] - datetime.now(timezone.utc)).days,
            )
        return response
  example_bad: |
    # WRONG: removing endpoint with no deprecation cycle
    # PR: "Remove v1 endpoint, everyone should be on v2 by now"
    # No headers, no sunset notice, no email to callers
    # Result: 3 enterprise clients file support tickets, 1 threatens lawsuit
    @app.get("/api/v1/users")
    async def get_users_v1():
        raise HTTPException(status_code=410, detail="Endpoint removed. Use /api/v2/users")
    # Correct intent, wrong execution — should have deprecated 6 months earlier
  when_applies: "Any public or semi-public API endpoint that external services or customers depend on."
  sources:
    - "https://datatracker.ietf.org/doc/html/rfc8594"
    - "https://martinfowler.com/articles/richardsonMaturityModel.html"

- id: MAINT-004
  text: >
    Treat documentation as code: keep docs in the same repo as code, require doc updates
    in the same PR as code changes, run doc linting in CI (markdownlint, vale), and
    assign doc ownership to the same team that owns the code. Docs in a separate wiki
    will be outdated within 6 months.
  why: >
    Atlassian's DevOps trends report found that 78% of engineers report spending 3+ hours
    per week dealing with undocumented behavior. Docs separated from code diverge because
    the PR process does not enforce simultaneous updates. A FastAPI endpoint that returns
    a renamed field with no doc update causes 2-5 support tickets per week for an average-size
    API. Co-located docs with CI linting reduce doc-related support tickets by 60-80% in
    teams that enforce it strictly.
  how_to_do_right: |
    1. Store docs in docs/ directory in the same repo as the service.
    2. Add PR template requirement: "Does this change require documentation updates?"
    3. CI check: if src/ changes include API routes, docs/ must also change:
       git diff --name-only origin/main | grep "src/api" && \
       git diff --name-only origin/main | grep "docs/" || \
       (echo "API changed but docs not updated" && exit 1)
    4. Install vale + markdownlint in CI:
       vale docs/ && markdownlint docs/**/*.md
    5. Add ownership: CODEOWNERS file maps docs/ directories to the team that owns the code.
    6. Staleness detection: docs older than 90 days since the code they describe changed
       get flagged in weekly "stale docs" report (simple git blame script).
  severity: medium
  technologies:
    lang: [markdown, yaml]
    framework: [github-actions, vale, markdownlint]
  domains:
    domain: [operations, documentation]
    concern: [knowledge_management, staleness, onboarding]
  example_good: |
    # .github/workflows/docs-check.yml
    jobs:
      docs-check:
        steps:
          - name: Lint markdown
            run: npx markdownlint-cli docs/**/*.md

          - name: Prose style (vale)
            uses: errata-ai/vale-action@v2
            with:
              files: docs/

          - name: Check API docs updated with code
            run: |
              API_CHANGED=$(git diff --name-only origin/main | grep "src/api/" | wc -l)
              DOCS_CHANGED=$(git diff --name-only origin/main | grep "docs/api/" | wc -l)
              if [ "$API_CHANGED" -gt "0" ] && [ "$DOCS_CHANGED" -eq "0" ]; then
                echo "ERROR: API code changed but docs/api/ not updated"
                exit 1
              fi
  example_bad: |
    # WRONG: docs in Confluence, no link from code to docs
    # src/api/users.py — endpoint with no documentation
    @app.get("/api/v2/users/{user_id}")
    async def get_user(user_id: str):
        ...  # Confluence page exists but is 2 years out of date
    # The Confluence page still documents the v1 response schema
    # 5 engineers have asked "why does the API return X when docs say Y" this month
  when_applies: "Any service used by more than 1 team, any public API, any service where onboarding takes more than 1 day."
  sources:
    - "https://www.writethedocs.org/guide/docs-as-code/"
    - "https://vale.sh/docs/integrations/github-actions/"

- id: MAINT-005
  text: >
    Create and maintain runbooks for every production operation that happens more than
    once per quarter. A runbook must be: tested (run it, verify steps work), automated
    to the maximum extent (prefer scripts over manual steps), and reviewed after every
    incident where it was used. Runbooks that require "ask Alice" are organizational risk.
  why: >
    A company's only engineer who knew how to rotate the database password left, and their
    undocumented procedure took the CTO 6 hours to reconstruct during a security incident.
    The 6-hour delay exposed customer data for longer than necessary. Runbooks reduce mean
    time to repair by 40-70% during incidents because the on-call engineer can follow
    documented, tested steps instead of improvising under pressure. "Ask Alice" runbooks
    create single points of failure in team knowledge.
  how_to_do_right: |
    1. Runbook template (mandatory sections):
       ## Overview: what this runbook does and when to use it
       ## Prerequisites: access, tools, knowledge required
       ## Steps: numbered, specific, copy-pasteable commands
       ## Verification: how to confirm each step worked
       ## Rollback: how to undo this operation
       ## Contacts: who to escalate to (role, not name)
       ## Last tested: date + who + environment
    2. Add automation hooks: every manual step that can be scripted, MUST be scripted.
    3. Test runbooks quarterly by having a different engineer follow them from scratch.
    4. After every incident: update the runbook with any deviations or new steps.
    5. Store in /runbooks directory, searchable by incident type (not by author).
    6. Include expected timing: "step 3 takes 5-10 minutes — do not cancel if it seems slow."
  severity: high
  technologies:
    lang: [bash, markdown]
    framework: [github-wiki, confluence, notion]
  domains:
    domain: [operations, incident_response]
    concern: [knowledge_transfer, incident_management, resilience]
  example_good: |
    # runbooks/rotate-database-password.md
    # Database Password Rotation Runbook
    ## Overview
    Rotate the production PostgreSQL password. Use after: security incident, engineer departure,
    quarterly rotation schedule.
    ## Prerequisites
    - AWS IAM access to prod-db-secrets secret
    - kubectl access to production namespace
    ## Steps
    1. Generate new password (script handles entropy):
       ```bash
       NEW_PASS=$(python -c "import secrets; print(secrets.token_urlsafe(32))")
       echo $NEW_PASS  # Save this temporarily
       ```
    2. Update secret in AWS Secrets Manager:
       ```bash
       aws secretsmanager update-secret \
         --secret-id prod/db/password \
         --secret-string "$NEW_PASS"
       ```
       Expected: {"ARN": "...", "VersionId": "..."}
    3. Trigger rolling restart (app picks up new secret):
       ```bash
       kubectl rollout restart deployment/app -n production
       kubectl rollout status deployment/app -n production --timeout=120s
       ```
    ## Verification
    - `kubectl logs -l app=backend --tail=20 | grep "Connected to database"` should appear
    ## Last tested: 2025-11-15 by @bob in staging
  example_bad: |
    # WRONG: undocumented process
    # rotate-password.md
    # Ask Alice, she knows how to do this
    # Note: don't forget the thing with the AWS console
    # Last step: update the app somehow
    # — Nobody has tested this in 2 years
  when_applies: "Any production operation: database rotation, certificate renewal, manual scaling, incident recovery, deployment rollback."
  sources:
    - "https://sre.google/sre-book/on-call/"
    - "https://sre.google/workbook/on-call/"

- id: MAINT-006
  text: >
    Design on-call rotations with explicit severity tiers and escalation matrices.
    P1 (complete outage) pages the on-call immediately with 5-minute acknowledgement
    SLA. P2 (degraded, users affected) pages with 15-minute SLA. P3 (partial, workaround
    exists) creates a ticket for next business day. Conflating severities creates
    alert fatigue — on-call ignoring P3 pages starts ignoring P1 pages within 3 months.
  why: >
    Google SRE research shows that on-call engineers who receive more than 2 actionable
    alerts per 12-hour shift experience burnout and cognitive overload. Alert fatigue
    is the direct cause of 23% of missed P1 incidents at mid-size companies. The root
    cause is always severity conflation: teams page on P3 "disk at 80%" with the same
    urgency as P1 "service completely down," training on-call to ignore alerts.
  how_to_do_right: |
    1. Define severity matrix in INCIDENT_SEVERITY.md (shared org document):
       P1: Complete service outage, data loss risk, security breach — page immediately
       P2: Degraded service, >10% users affected, >5min elevated error rate — page in 15min
       P3: Partial degradation, workaround exists, <1% users affected — ticket next business day
       P4: Potential future issue, performance concern — weekly review
    2. Configure PagerDuty/Opsgenie alert routing per severity:
       P1 → immediate page + manager escalation at 10 min if no ack
       P2 → page within 15 min + Slack channel
       P3 → Slack only, create JIRA ticket
    3. Review alert definitions quarterly: any P3 alert that never triggered in 90 days
       is either wrong threshold or monitoring dead code — delete or fix.
    4. Track alert volume: on-call should see < 5 actionable alerts per shift.
       If consistently > 5, fix the alerts before the next rotation.
  severity: high
  technologies:
    lang: [yaml]
    framework: [pagerduty, opsgenie, prometheus]
  domains:
    domain: [operations, incident_response]
    concern: [on_call, alert_fatigue, sre]
  example_good: |
    # PagerDuty escalation policy (via Terraform)
    resource "pagerduty_escalation_policy" "backend_api" {
      name = "Backend API Escalation"
      rule {
        escalation_delay_in_minutes = 10
        target { type = "schedule_reference"; id = pagerduty_schedule.primary_oncall.id }
      }
      rule {
        escalation_delay_in_minutes = 5  # escalate after 5 more min of no ack
        target { type = "user_reference"; id = data.pagerduty_user.engineering_manager.id }
      }
    }

    # Prometheus alerting rules with severity labels
    groups:
      - name: api.rules
        rules:
          - alert: ApiCompleteOutage
            expr: sum(rate(http_requests_total{status="200"}[5m])) == 0
            for: 2m
            labels:
              severity: critical  # maps to P1 in PagerDuty
            annotations:
              summary: "API returning 0 successful requests"
          - alert: ApiHighErrorRate
            expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
            for: 5m
            labels:
              severity: warning  # maps to P2
  example_bad: |
    # WRONG: all alerts page the same way regardless of severity
    - alert: DiskUsageHigh
      expr: disk_usage_percent > 80
      labels:
        severity: critical  # WRONG: pages on-call at 3am for 80% disk, non-urgent
    - alert: ServiceDown
      expr: up == 0
      labels:
        severity: critical  # Same severity as disk alert — on-call stops caring
  when_applies: "Any service with on-call rotation, any service generating more than 5 alerts per week, any team experiencing on-call burnout."
  sources:
    - "https://sre.google/sre-book/on-call/"
    - "https://sre.google/workbook/alerting-on-slos/"

- id: MAINT-007
  text: >
    Conduct blameless post-mortems within 72 hours of every P1 incident. The post-mortem
    must produce a timeline (5-why analysis), contributing factors (not "root cause" —
    complex systems have multiple causes), and action items with owners and deadlines.
    Post-mortems without action items are ritual without impact.
  why: >
    Blameless post-mortems originated at Google and have been shown to reduce repeat incident
    rates by 50-70% compared to blame-based cultures where engineers hide problems. The
    72-hour window is critical: beyond 72 hours, timeline reconstruction degrades as memory
    fades, logs scroll off, and the team moves to other priorities. At a SaaS company, a
    team with monthly post-mortems for the same type of incident had 12 repeat occurrences
    in a year; after adopting blameless 72-hour post-mortems, the same category had 1 repeat.
  how_to_do_right: |
    1. Mandatory sections (standard template):
       - Incident summary: severity, duration, user impact
       - Timeline: specific times, actions, what worked, what didn't
       - Contributing factors (5-why analysis, plural factors)
       - What went well: process/tooling that helped
       - What went poorly: process/tooling gaps
       - Action items: each item has owner, deadline, and success criteria
    2. Ground rules for the meeting:
       - No blame, no "who did it" — only "what system factors enabled this"
       - Everyone who was involved must attend (on-call, escalations, affected teams)
       - An action item "monitor more carefully" is not an action item — be specific
    3. Publish post-mortems internally to all engineers (builds collective learning).
    4. Track action items in sprint backlog with "post-mortem" label.
    5. Follow up at next incident review: are action items complete?
  severity: high
  technologies:
    lang: [markdown]
    framework: [github-wiki, confluence]
  domains:
    domain: [operations, incident_response]
    concern: [learning, reliability, culture]
  example_good: |
    # post-mortems/2025-11-14-payment-service-outage.md

    ## Summary
    - **Severity**: P1
    - **Duration**: 47 minutes (14:23 - 15:10 UTC)
    - **Impact**: 100% of checkout attempts failed, estimated $23K revenue lost

    ## Timeline
    - 14:23: First alert: payment success rate dropped below 5%
    - 14:28: On-call acknowledged, began investigation
    - 14:35: Identified new deploy (v2.3.1) as likely cause via git log
    - 14:41: Initiated rollback to v2.3.0
    - 15:10: Service fully recovered, error rate back to baseline

    ## Contributing Factors
    1. New dependency (stripe SDK v4.2) changed default timeout from 30s to 5s
    2. No integration test for timeout configuration changes
    3. No canary deployment for payment service changes

    ## Action Items
    | Item | Owner | Deadline | Success Criteria |
    |------|-------|----------|-----------------|
    | Add canary deployment for payment-service | @alice | 2025-12-01 | Argo Rollout configured |
    | Integration test for timeout config | @bob | 2025-11-28 | Test suite added, CI green |
  example_bad: |
    # WRONG: blame-based post-mortem with no action items
    # "Bob deployed v2.3.1 without testing it properly.
    # He needs to be more careful next time.
    # Everyone should test more thoroughly."
    # — No action items, Bob feels unsafe reporting future mistakes,
    #   the real systemic causes (missing canary, no timeout tests) go unaddressed
  when_applies: "Every P1 incident. Recommended for P2 incidents affecting more than 10% of users. Optional for P3."
  sources:
    - "https://sre.google/sre-book/postmortem-culture/"
    - "https://sre.google/workbook/postmortem-analysis/"

- id: MAINT-008
  text: >
    Run automated dead code detection quarterly and enforce import coverage in CI. Use
    vulture for Python to detect unused functions, classes, and imports. A codebase with
    > 15% dead code has doubled maintenance surface area — every refactoring must consider
    whether to update dead code or remove it first.
  why: >
    Python projects accumulate dead code at approximately 0.5-1% of LOC per month in active
    development. At 24 months, 12-24% of the codebase is dead code that: confuses new
    engineers who study it ("is this important? should I be calling this?"), creates false
    sense of coverage in code review ("this path is tested"), and bloats test suites with
    tests for code that does nothing. At a startup, vulture found 3,200 lines of dead code
    in a 15,000-line codebase, including 2 entire deprecated payment providers that engineers
    were still writing tests for.
  how_to_do_right: |
    1. Install: pip install vulture
    2. Create whitelist for intentionally unused code (callbacks, abstract methods):
       # whitelist.py
       _.configure = None   # abstract base method
       _.on_ready = None    # callback, called by framework
    3. Run in CI (warn, don't fail — false positives exist):
       vulture src/ whitelist.py --min-confidence 80
    4. Quarterly: review vulture output, delete confirmed dead code with PR.
    5. Track dead code metric: vulture src/ | wc -l — trend should decrease.
    6. Use coverage.py with branch coverage to find untested code paths (different from dead code):
       pytest --cov=src --cov-branch --cov-report=html
       # Uncovered branches + unused functions = candidates for deletion
  severity: medium
  technologies:
    lang: [python]
    framework: [vulture, pytest-cov]
  domains:
    domain: [operations, code_quality]
    concern: [dead_code, maintainability, cognitive_load]
  example_good: |
    # CI job: quarterly dead code report
    # .github/workflows/code-health.yml
    jobs:
      dead-code:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4
          - run: pip install vulture
          - name: Detect dead code
            run: |
              DEAD_COUNT=$(vulture src/ whitelist_vulture.py --min-confidence 80 | wc -l)
              echo "Dead code items: $DEAD_COUNT"
              # Fail if dead code count INCREASED from baseline
              BASELINE=$(cat .dead-code-baseline || echo "0")
              if [ "$DEAD_COUNT" -gt "$((BASELINE + 10))" ]; then
                echo "Dead code count increased significantly: $DEAD_COUNT > $BASELINE + 10"
                exit 1
              fi
              echo "$DEAD_COUNT" > .dead-code-baseline

    # whitelist_vulture.py — intentionally unused (framework callbacks)
    # pylint: disable=pointless-statement
    from myapp.base import BaseHandler
    BaseHandler.on_start  # callback called by Celery
    BaseHandler.setup     # called by dependency injection framework
  example_bad: |
    # WRONG: no dead code detection — accumulation over time
    # src/payment/providers.py
    class PaypalProvider:  # Replaced by StripeProvider 18 months ago, nobody deleted this
        def charge(self, amount): ...
        def refund(self, transaction_id): ...

    class PaypalWebhookHandler:  # 800 lines of code, 0 callers
        def handle_payment_complete(self, event): ...

    # tests/test_paypal_provider.py — 200 lines of tests for dead code
    # Engineers maintain these tests to keep coverage > 90%
  when_applies: "Any Python codebase older than 6 months, any service that has undergone major feature additions or removals."
  sources:
    - "https://github.com/jendrikseipp/vulture"
    - "https://coverage.readthedocs.io/en/7.x/"

- id: MAINT-009
  text: >
    Run Trivy or pip-audit for dependency vulnerability scanning in CI on every PR.
    Block merges on CRITICAL CVEs (CVSS >= 9.0) immediately. For HIGH CVEs (CVSS 7.0-8.9),
    create a GitHub Issue automatically and require resolution within 7 days. Medium CVEs
    (CVSS 4.0-6.9) go to a weekly vulnerability review. Never configure vulnerability
    scanners that only report but never block — they are theater, not security.
  why: >
    Log4Shell (CVSS 10.0) affected organizations that had vulnerability scanners running
    but with "warn only" configurations because "we don't want to break CI." The warn-only
    configuration made the scanner useless — it reported the vulnerability, engineers closed
    the notification, and the vulnerable dependency stayed in production for 6+ months.
    Blocking on CRITICAL CVEs adds < 5 minutes to PR review (time to read the advisory)
    and prevents entire classes of critical exposures.
  how_to_do_right: |
    1. Add to CI:
       - name: Scan for vulnerabilities
         run: |
           pip install pip-audit
           pip-audit --strict --desc  # --strict exits non-zero on any vulnerability
    2. For container images, use Trivy:
       trivy image --exit-code 1 --severity CRITICAL myimage:$SHA
    3. Configure severity gates:
       trivy image --exit-code 1 --severity CRITICAL,HIGH myimage:$SHA  # block on critical+high
       trivy image --exit-code 0 --severity MEDIUM myimage:$SHA          # report medium
    4. Auto-create GitHub Issues for HIGH vulnerabilities:
       trivy image --format json myimage:$SHA | \
         python scripts/create_vuln_issues.py --min-severity HIGH
    5. Review and accept known false positives using .trivyignore (document the reason):
       # .trivyignore
       CVE-2021-12345  # Test dependency only, not in production image
  severity: critical
  technologies:
    lang: [yaml, python]
    framework: [trivy, pip-audit, github-actions]
  domains:
    domain: [operations, security]
    concern: [vulnerability_management, supply_chain, compliance]
  example_good: |
    # .github/workflows/security.yml
    jobs:
      vulnerability-scan:
        steps:
          - name: Scan Python dependencies
            run: |
              pip install pip-audit
              pip-audit --strict --format=json --output=vuln-report.json
              # Exit code != 0 on any vulnerability — blocks PR

          - name: Scan Docker image for CRITICAL vulnerabilities
            uses: aquasecurity/trivy-action@master
            with:
              image-ref: "ghcr.io/org/app:${{ github.sha }}"
              exit-code: "1"
              severity: "CRITICAL"
              format: "sarif"
              output: "trivy-results.sarif"

          - name: Upload SARIF to GitHub Security
            uses: github/codeql-action/upload-sarif@v3
            with:
              sarif_file: "trivy-results.sarif"
  example_bad: |
    # WRONG: vulnerability scanner with no blocking behavior
    - name: Security scan (informational only)
      run: trivy image --exit-code 0 --severity CRITICAL myimage  # always exits 0!
      continue-on-error: true   # "we'll fix it later"
    # CRITICAL CVE found, reported, engineer dismisses Slack notification
    # Vulnerability stays in prod for 8 months
  when_applies: "Every PR to main, every Docker image build, every release pipeline. Non-negotiable for any service handling user data."
  sources:
    - "https://github.com/aquasecurity/trivy"
    - "https://pypi.org/project/pip-audit/"
    - "https://owasp.org/www-project-dependency-check/"

- id: MAINT-010
  text: >
    Implement capacity planning with a 30/60/90-day resource forecast based on growth
    metrics. Alert at 70% of resource limit (CPU, memory, connections, storage) — not 90%.
    The gap between 70% alert and 100% limit gives time to provision, not time to panic.
  why: >
    A startup's production database hit connection pool exhaustion at 11pm on a Friday
    because monitoring only alerted at 95% and the engineer who got paged had 15 minutes
    to provision more connections before the service crashed. A 70% alert 2 weeks earlier
    would have allowed scheduled provisioning during business hours. The difference between
    70% and 90% alerts is the difference between planned work and emergency work.
  how_to_do_right: |
    1. Track resource utilization daily (not just when incidents happen):
       - RDS connection count: alert at 70% of max_connections
       - Pod memory: alert at 70% of request limit
       - Disk usage: alert at 70% of capacity
       - Redis memory: alert at 70% of maxmemory
    2. Build 30/60/90-day forecast using linear regression on last 30 days of data:
       from sklearn.linear_model import LinearRegression
       import numpy as np
       # Extrapolate trend — if slope indicates 100% in < 60 days, plan capacity now
    3. Run capacity planning meeting monthly (< 30 min):
       - Review current utilization vs last month
       - Review forecast vs actual
       - Identify any metric trending toward 70% in next 90 days
       - Create provisioning ticket if needed
    4. Document capacity decisions in ADR: "Why we chose t3.xlarge: expected to handle
       current load × 3 for 18 months based on growth model."
  severity: high
  technologies:
    lang: [python]
    framework: [prometheus, grafana, aws-cloudwatch]
  domains:
    domain: [operations, infrastructure]
    concern: [capacity_planning, forecasting, reliability]
  example_good: |
    # scripts/capacity_forecast.py
    import numpy as np
    from prometheus_api_client import PrometheusConnect

    def forecast_days_to_limit(metric: str, limit: float, days_history: int = 30) -> float:
        """Returns estimated days until metric hits limit. Negative = already over."""
        prom = PrometheusConnect(url="http://prometheus:9090")
        data = prom.get_metric_range_data(
            metric_name=metric,
            start_time=f"-{days_history}d",
            end_time="now",
        )
        values = np.array([(float(t), float(v)) for t, v in data[0]["values"]])
        X, y = values[:, 0].reshape(-1, 1), values[:, 1]

        from sklearn.linear_model import LinearRegression
        model = LinearRegression().fit(X, y)
        current_value = y[-1]
        slope = model.coef_[0]  # units per second

        if slope <= 0:
            return float('inf')  # not trending up

        seconds_to_limit = (limit - current_value) / slope
        return seconds_to_limit / 86400  # convert to days

    days = forecast_days_to_limit("pg_stat_activity_count", limit=100 * 0.70)  # alert at 70%
    if days < 30:
        print(f"WARNING: DB connections will hit 70% limit in {days:.0f} days — provision now")
  example_bad: |
    # WRONG: alert at 95%, no forecast
    # Prometheus rule
    - alert: DiskFull
      expr: disk_usage_percent > 95   # by 95%, you have hours to act, not days
      for: 5m
      # No forecast, no trend analysis, pure reactive monitoring
      # Wakes on-call at 3am instead of creating planned work ticket 3 weeks earlier
  when_applies: "Any stateful resource with a hard limit: database connections, disk storage, memory, CPU quotas, API rate limits."
  sources:
    - "https://sre.google/sre-book/service-level-objectives/"
    - "https://sre.google/workbook/implementing-slos/"

- id: MAINT-011
  text: >
    Create structured onboarding documentation using the 4 layers: orientation (what is this
    system?), tutorial (follow me to your first task), how-to guides (I need to do X), and
    reference (complete API/config reference). Diátaxis framework. New engineers who cannot
    independently complete a task within 2 days of joining indicate broken onboarding.
  why: >
    The Diátaxis framework, adopted by Google, Python, and Django, solves the most common
    documentation failure: mixing explanation with procedures. A tutorial that stops to explain
    theory kills the "getting something working" momentum. A reference manual mixed with
    tutorials creates confusion about whether this is "what to do" or "how it works." Teams
    that implement Diátaxis report 60% reduction in "basic questions" directed to senior
    engineers.
  how_to_do_right: |
    1. Orientation (docs/orientation.md): 1 page. What problem does this system solve?
       Who are the users? What are the 3 key concepts to understand first?
    2. Tutorial (docs/tutorial.md): Step-by-step to first success. No theory.
       "Run these commands, see this output, you're done." Takes 30-60 min max.
    3. How-to guides (docs/how-to/*.md): Task-oriented. "How to add a new API endpoint."
       "How to run database migrations." "How to deploy to staging."
    4. Reference (docs/reference/*.md): Complete configuration options, API schema, data models.
       Generated from code where possible (Sphinx, pdoc).
    5. Measure: track time-to-first-commit for new engineers. Target: < 2 days.
       If consistently > 3 days, the tutorial is broken.
  severity: medium
  technologies:
    lang: [markdown]
    framework: [mkdocs, sphinx]
  domains:
    domain: [operations, knowledge_management]
    concern: [onboarding, documentation, team_velocity]
  example_good: |
    # docs/tutorial.md — get-something-working in 30 min, no theory
    # Tutorial: Deploy Your First Change

    ## What you'll build
    A new endpoint `/api/v1/ping` that returns `{"pong": true}`.
    By the end you'll understand the deploy pipeline.

    ## Step 1: Set up local environment (5 min)
    ```bash
    git clone https://github.com/org/backend
    cd backend
    cp .env.example .env
    docker-compose up -d
    # Expected: "services started" — if you see errors, see troubleshooting.md
    ```

    ## Step 2: Add the endpoint (5 min)
    Edit `src/api/routes.py`, add:
    ```python
    @router.get("/ping")
    async def ping():
        return {"pong": True}
    ```

    ## Step 3: Verify locally (2 min)
    ```bash
    curl http://localhost:8000/api/v1/ping
    # Expected: {"pong": true}
    ```

    ## Step 4: Deploy to staging
    `git commit -am "add ping endpoint" && git push origin main`
    CI will automatically deploy to staging. Check #deployments in Slack.
    # This is a tutorial: no explanation of WHY the router works this way
  example_bad: |
    # WRONG: mixes explanation, theory, and procedure in one confusing doc
    # docs/getting-started.md
    # Getting Started
    # Our API is built on FastAPI which uses async/await (explanation).
    # To understand routes, you should read the FastAPI docs first (pointer, not tutorial).
    # The following is an example of how you might add a route (not actionable).
    # Note: our DB uses PostgreSQL 15 which has several differences from 14 (tangent).
    # If you want to try this, first make sure you have Python 3.11 (buried requirement).
    # After reading all of the above, here's how to run the app: ... (finally, action)
  when_applies: "Any team onboarding new engineers, any codebase that causes > 3 days to first productive contribution."
  sources:
    - "https://diataxis.fr/"
    - "https://docs.divio.com/documentation-system/"

- id: MAINT-012
  text: >
    Detect and remediate configuration drift between environments using Terraform state
    comparison and automated drift detection in CI. Configuration that exists in staging
    but not in production, or vice versa, is a bug waiting to happen — and it always
    happens on a Friday evening during a critical deploy.
  why: >
    An e-commerce company deployed a critical Black Friday feature to staging (which had
    a Redis cluster), then to production (which had a single Redis instance, a 6-month-old
    drift). The feature worked in staging and failed silently in production because Redis
    Cluster commands differ from single-instance commands. The drift was never detected
    because "it worked in staging." Terraform plan --target in CI on both staging and prod
    would have flagged the infrastructure difference 6 months earlier.
  how_to_do_right: |
    1. Run terraform plan in CI on every merge to main against all environments.
    2. Alert on drift (terraform plan showing unexpected changes):
       terraform plan -out=plan.tfplan
       terraform show -json plan.tfplan | \
         python scripts/detect_drift.py --alert-on-unexpected-changes
    3. Enforce parity rules: services that exist in staging MUST exist in production
       (even if production is scaled differently).
    4. Use terraform workspaces or directories per environment, never separate repos.
    5. Weekly drift scan: compare staging vs production resource inventory.
    6. Document intentional differences (dev has smaller instances) in terraform.tfvars
       with a comment explaining why.
  severity: high
  technologies:
    lang: [hcl, python]
    framework: [terraform, aws, kubernetes]
  domains:
    domain: [operations, infrastructure]
    concern: [configuration_drift, environment_parity, reliability]
  example_good: |
    # .github/workflows/terraform-drift.yml
    jobs:
      detect-drift:
        strategy:
          matrix:
            environment: [staging, production]
        steps:
          - name: Terraform plan for ${{ matrix.environment }}
            run: |
              cd infra/environments/${{ matrix.environment }}
              terraform init
              terraform plan -detailed-exitcode -out=plan.tfplan
            # exit code 2 = changes detected (drift)
            # exit code 0 = no changes
            # exit code 1 = error

          - name: Alert on unexpected production drift
            if: matrix.environment == 'production' && failure()
            run: |
              gh issue create \
                --title "Infrastructure drift detected in production" \
                --body "terraform plan shows unexpected changes. Run to review."
            env:
              GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  example_bad: |
    # WRONG: separate Terraform repos per environment — drift grows silently
    # repos: infra-staging/ and infra-production/ — completely separate
    # Engineer adds Redis cluster to infra-staging, forgets to update infra-production
    # No automated comparison, drift builds for months
    # Black Friday: production is missing Redis cluster feature required by new code
  when_applies: "Any infrastructure managed as code (Terraform, Pulumi, CDK) with more than 1 environment."
  sources:
    - "https://developer.hashicorp.com/terraform/tutorials/state/resource-drift"
    - "https://sre.google/workbook/configuration-specifics/"

- id: MAINT-013
  text: >
    Implement Architecture Decision Records (ADRs) for every significant technical decision.
    ADRs must capture: status, context (forces driving the decision), decision, and
    consequences (positive and negative). ADRs are immutable history — never edit a past
    ADR, only supersede it. Without ADRs, the same discussion happens repeatedly and
    engineers re-litigate decided questions.
  why: >
    At a Series B startup, four separate architecture reviews over 18 months evaluated
    switching from PostgreSQL to MongoDB, each reaching the same conclusion: "Not worth it
    now." Each review took 3 hours and involved 4 engineers — 48 engineer-hours wasted on
    decided questions. The first decision had no ADR. With an ADR, the second, third, and
    fourth evaluations would have taken 5 minutes: read ADR, see context, confirm context
    unchanged, move on. ADRs pay compound interest — each one saves future discussion time.
  how_to_do_right: |
    1. Store in docs/decisions/ADR-NNN-title.md (zero-padded for sorting).
    2. Required template:
       # ADR-042: Use PostgreSQL as Primary Database
       ## Status: Accepted (2025-03-15)
       ## Context: Need ACID guarantees for financial transactions. Team has PostgreSQL
       expertise. MongoDB evaluated but lacks multi-document ACID pre-4.0.
       ## Decision: Use PostgreSQL 15 with SQLAlchemy 2.0 ORM.
       ## Consequences:
       Positive: Strong consistency, team expertise, excellent tooling.
       Negative: Horizontal scaling requires partitioning or read replicas.
       ## Supersedes: N/A
    3. Never edit past ADRs — create a new ADR with status "Supersedes ADR-042" if decision changes.
    4. Link ADRs from code: add # See ADR-042 comment near significant architectural decisions.
    5. Review ADRs quarterly: any context that has changed should trigger a new ADR.
  severity: medium
  technologies:
    lang: [markdown]
    framework: [github]
  domains:
    domain: [operations, architecture]
    concern: [decision_history, knowledge_transfer, alignment]
  example_good: |
    # docs/decisions/ADR-007-async-task-queue.md
    # ADR-007: Use Celery with Redis for Background Tasks
    ## Status: Accepted (2025-08-12)
    ## Context
    Need to process webhook payloads asynchronously. Options evaluated:
    - Celery + Redis: mature, battle-tested, good monitoring (Flower)
    - ARQ + Redis: modern asyncio-native, simpler, less mature
    - RQ + Redis: simpler than Celery, limited features
    Team uses FastAPI (async) but has CPU-bound tasks (PDF generation).
    ## Decision
    Use Celery with Redis broker and result backend. FastAPI tasks call
    celery.send_task() for async processing.
    ## Consequences
    Positive: Mature ecosystem, Flower monitoring, celery-beat for scheduling,
    extensive retry configuration. CPU-bound tasks handled by prefork workers.
    Negative: Additional infrastructure complexity, not native asyncio.
    ## Revisit Trigger
    If > 80% of tasks are async I/O-bound, evaluate migrating to ARQ.
  example_bad: |
    # WRONG: decision made in Slack DM, never recorded
    # [Slack, 2024-03-15, #engineering]
    # @alice: "Let's use Celery, I've used it before"
    # @bob: "ok sounds good"
    # 18 months later: why do we use Celery? Is it still the right choice?
    # New engineer spends 2 days evaluating ARQ vs Celery, reaches same conclusion
  when_applies: "Any decision that: affects more than 1 team, cannot be easily reversed, or answers a question that was asked more than once."
  sources:
    - "https://adr.github.io/"
    - "https://martinfowler.com/bliki/ArchitectureDecisionRecord.html"
