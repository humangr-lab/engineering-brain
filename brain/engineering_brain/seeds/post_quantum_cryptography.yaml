layer: rules
domain: security
knowledge:
- id: PQC-001
  text: "Use ML-KEM (FIPS 203, formerly CRYSTALS-Kyber) for post-quantum key encapsulation — it is NIST's primary standard for quantum-resistant encryption, finalized August 2024. Prefer ML-KEM-768 for general use (NIST Security Level 3)."
  why: >
    RSA and ECDH key exchange will be broken by sufficiently large quantum computers running Shor's
    algorithm. NIST finalized FIPS 203 (ML-KEM) on August 13, 2024, as the primary post-quantum key
    encapsulation mechanism after an 8-year evaluation process. ML-KEM is based on the Module Learning
    with Errors (MLWE) problem over structured lattices, which is believed to be hard for both classical
    and quantum computers. ML-KEM-768 provides NIST Security Level 3 (equivalent to AES-192) with
    1,184-byte public keys and 1,088-byte ciphertexts — larger than X25519 (32 bytes) but with minimal
    performance impact (adding ~150 microseconds to a 50-100ms TLS handshake). Chrome, Firefox, Cloudflare,
    and AWS already support ML-KEM-768 in hybrid mode. By 2026, over a third of all HTTPS traffic uses
    hybrid post-quantum key exchange.
  how_to_do_right: |
    1. For TLS: deploy hybrid X25519+ML-KEM-768 key exchange (maintains classical security + adds PQ)
    2. For application-level encryption: use ML-KEM-768 for key encapsulation, then AES-256-GCM for bulk
    3. Use ML-KEM-768 for general use (Security Level 3, NIST recommendation for most applications)
    4. Use ML-KEM-1024 only for top-secret/classified data (Security Level 5)
    5. Do NOT use ML-KEM-512 in production — Security Level 1 is insufficient for long-term security
    6. Use liboqs (Open Quantum Safe) or your TLS library's native support
    7. Test with representative traffic to validate key size impact on your specific latency budget
  severity: high
  technologies:
    lang: [python, go, rust]
    library: [liboqs, oqs-python, pqcrypto, circl]
    platform: [openssl]
  domains:
    domain: [security, cryptography]
    concern: [encryption, key-exchange, post-quantum]
  example_good: |
    import oqs

    # ML-KEM-768 key encapsulation (FIPS 203)
    kem = oqs.KeyEncapsulation("ML-KEM-768")

    # Key generation (server side)
    public_key = kem.generate_keypair()  # 1,184 bytes
    # public_key is sent to the client

    # Encapsulation (client side) — produces shared secret + ciphertext
    client_kem = oqs.KeyEncapsulation("ML-KEM-768")
    ciphertext, shared_secret_client = client_kem.encap_secret(public_key)
    # ciphertext: 1,088 bytes, shared_secret: 32 bytes

    # Decapsulation (server side) — recovers same shared secret
    shared_secret_server = kem.decap_secret(ciphertext)
    assert shared_secret_client == shared_secret_server  # Both have same 32-byte key

    # Use shared_secret as key for AES-256-GCM symmetric encryption
    from cryptography.hazmat.primitives.ciphers.aead import AESGCM
    aes = AESGCM(shared_secret_server)
    nonce = os.urandom(12)
    ciphertext_data = aes.encrypt(nonce, plaintext, associated_data)
  example_bad: |
    # Using RSA-2048 for key exchange — broken by quantum computers
    from cryptography.hazmat.primitives.asymmetric import rsa, padding

    private_key = rsa.generate_private_key(public_exponent=65537, key_size=2048)
    # RSA-2048: broken by ~4,000 logical qubits (Shor's algorithm)
    # Shor's on 2048-bit RSA requires ~20 million physical qubits with current error rates,
    # but this is expected within 10-15 years
    # Any data encrypted today with RSA can be recorded and decrypted later (HNDL)
  when_applies: Any system performing key exchange, key agreement, or key encapsulation — TLS, VPNs, messaging, file encryption, API security
  sources:
    - "https://csrc.nist.gov/pubs/fips/203/final"
    - "https://www.nist.gov/news-events/news/2024/08/nist-releases-first-3-finalized-post-quantum-encryption-standards"

- id: PQC-002
  text: "Use ML-DSA (FIPS 204, formerly CRYSTALS-Dilithium) for post-quantum digital signatures replacing RSA and ECDSA. Prefer ML-DSA-65 for general use (NIST Security Level 3). Use ML-DSA-87 for long-lived certificates and high-security contexts."
  why: >
    ECDSA and RSA signatures will be broken by quantum computers. NIST finalized FIPS 204 (ML-DSA) on
    August 13, 2024, as the primary post-quantum signature scheme. ML-DSA is based on the Module Learning
    with Errors (MLWE) problem (same hardness assumption as ML-KEM), providing a unified lattice-based
    security foundation. ML-DSA-65 produces 3,309-byte signatures (vs ECDSA's 64 bytes) with 1,952-byte
    public keys (vs ECDSA's 32 bytes). Despite larger sizes, ML-DSA signing/verification is faster than
    RSA-2048 — signing takes ~200 microseconds, verification ~100 microseconds. ML-DSA is the recommended
    default for code signing, API authentication, document signing, and certificate issuance.
  how_to_do_right: |
    1. Use ML-DSA-65 (Security Level 3) for general-purpose signatures
    2. Use ML-DSA-87 (Security Level 5) for CA certificates and long-lived signing keys
    3. Do NOT use ML-DSA-44 (Security Level 2) for production — insufficient security margin
    4. For TLS certificates: wait for CA/Browser Forum PQC guidelines (expected 2026-2027)
    5. For code signing and internal PKI: begin migration now using hybrid certificates
    6. For API authentication: use ML-DSA-65 for JWT/JWS signing with PQ-safe algorithms
    7. Test certificate chain verification with larger PQC certificates (~5KB per cert in chain)
  severity: high
  technologies:
    lang: [python, go, rust]
    library: [liboqs, oqs-python, pqcrypto, circl]
    platform: [openssl]
  domains:
    domain: [security, cryptography]
    concern: [digital-signatures, authentication, post-quantum]
  example_good: |
    import oqs

    # ML-DSA-65 digital signature (FIPS 204)
    signer = oqs.Signature("ML-DSA-65")

    # Key generation
    public_key = signer.generate_keypair()  # 1,952 bytes
    # Store public_key for verification; protect secret key

    # Signing
    message = b"Critical firmware update v2.1.0"
    signature = signer.sign(message)  # 3,309 bytes

    # Verification (separate process/machine)
    verifier = oqs.Signature("ML-DSA-65")
    is_valid = verifier.verify(message, signature, public_key)
    assert is_valid, "Signature verification failed!"

    # Use for API authentication (JWT-like)
    import json, base64, hashlib

    header = base64.urlsafe_b64encode(json.dumps({
        "alg": "ML-DSA-65", "typ": "JWT"
    }).encode())
    payload = base64.urlsafe_b64encode(json.dumps({
        "sub": "service-a", "iat": 1706000000, "exp": 1706003600
    }).encode())
    signing_input = header + b"." + payload
    token_sig = signer.sign(signing_input)
  example_bad: |
    # Using ECDSA P-256 — broken by quantum computers (Shor's algorithm)
    from cryptography.hazmat.primitives.asymmetric import ec

    private_key = ec.generate_private_key(ec.SECP256R1())
    # ECDSA P-256: broken by ~2,500 logical qubits
    # Any signed document can be forged once quantum computers are available
    # Code signing keys become worthless — attacker can sign malware
    signature = private_key.sign(data, ec.ECDSA(hashes.SHA256()))
  when_applies: Any system using digital signatures — code signing, API authentication, document signing, certificate issuance, PKI
  sources:
    - "https://csrc.nist.gov/pubs/fips/204/final"
    - "https://www.nist.gov/news-events/news/2024/08/nist-releases-first-3-finalized-post-quantum-encryption-standards"

- id: PQC-003
  text: "Use SLH-DSA (FIPS 205, formerly SPHINCS+) as a conservative backup signature scheme based on hash functions — not lattices. Deploy for firmware signing, root CA certificates, and contexts where algorithmic diversity is required."
  why: >
    SLH-DSA is based solely on the security of hash functions (SHA-256, SHAKE-256), not on lattice problems
    like ML-DSA. This provides algorithmic diversity — if a breakthrough breaks the MLWE assumption (affecting
    both ML-KEM and ML-DSA), SLH-DSA remains secure. Hash-based security is the most conservative assumption
    in cryptography — it requires only that the hash function is collision-resistant, which has been studied
    for decades. The tradeoff is performance: SLH-DSA-SHA2-192f signatures are 35,664 bytes (10x larger than
    ML-DSA-65) and signing is ~100x slower. Use SLH-DSA for high-security, low-frequency operations where
    algorithmic diversity matters more than performance — firmware signing, root CAs, long-term archival.
  how_to_do_right: |
    1. Use SLH-DSA as a BACKUP to ML-DSA, not as a replacement — ML-DSA is faster and smaller
    2. Choose parameter set by security-speed tradeoff:
       - SLH-DSA-SHA2-128f: fastest, Security Level 1 (NOT for production)
       - SLH-DSA-SHA2-192s: smallest signatures at Level 3 (~16KB) but slowest
       - SLH-DSA-SHA2-192f: balanced for Level 3 (~35KB signatures, faster signing)
       - SLH-DSA-SHA2-256f: maximum security Level 5 (~49KB signatures)
    3. Deploy for: root CA certificates, firmware/bootloader signing, code signing for critical infrastructure
    4. Do NOT use for high-frequency operations (TLS handshakes, API auth) — too slow
    5. Combine with ML-DSA in dual-signature schemes for defense in depth
  severity: medium
  technologies:
    lang: [python, go, rust]
    library: [liboqs, oqs-python, pqcrypto, circl]
    platform: [openssl]
  domains:
    domain: [security, cryptography]
    concern: [digital-signatures, post-quantum, firmware-security]
  example_good: |
    import oqs

    # SLH-DSA for firmware signing (conservative, hash-based security)
    signer = oqs.Signature("SLH-DSA-SHA2-192f")

    public_key = signer.generate_keypair()  # 48 bytes (small!)
    firmware_binary = open("firmware_v2.1.0.bin", "rb").read()
    signature = signer.sign(firmware_binary)  # ~35,664 bytes (large!)

    # Verification on embedded device
    verifier = oqs.Signature("SLH-DSA-SHA2-192f")
    is_valid = verifier.verify(firmware_binary, signature, public_key)

    # Dual-signature: ML-DSA (fast) + SLH-DSA (conservative backup)
    ml_dsa_signer = oqs.Signature("ML-DSA-65")
    ml_dsa_pk = ml_dsa_signer.generate_keypair()
    ml_dsa_sig = ml_dsa_signer.sign(firmware_binary)    # 3,309 bytes

    slh_dsa_signer = oqs.Signature("SLH-DSA-SHA2-192f")
    slh_dsa_pk = slh_dsa_signer.generate_keypair()
    slh_dsa_sig = slh_dsa_signer.sign(firmware_binary)  # 35,664 bytes

    # Both signatures must verify — defense in depth
    combined_sig = {"ml_dsa": ml_dsa_sig, "slh_dsa": slh_dsa_sig}
  example_bad: |
    # Using only ML-DSA everywhere — no algorithmic diversity
    # If MLWE assumption is broken, ALL signatures are compromised
    signer = oqs.Signature("ML-DSA-65")
    root_ca_sig = signer.sign(root_cert)       # Same algorithm
    firmware_sig = signer.sign(firmware)        # Same algorithm
    code_sig = signer.sign(code_hash)           # Same algorithm
    # Single point of failure: one cryptanalytic breakthrough breaks everything
    # Root CAs have 20+ year lifetimes — need maximum security margin
  when_applies: Firmware signing, root CA certificates, code signing for critical infrastructure, long-term archival signatures, defense-in-depth deployments
  sources:
    - "https://csrc.nist.gov/pubs/fips/205/final"
    - "https://sphincs.org/"

- id: PQC-004
  text: "Design all cryptographic systems for crypto-agility — abstract cryptographic operations behind interfaces so algorithms can be swapped without application code changes. Use configuration-driven algorithm selection following NIST SP 800-131A and CSWP 39 guidance."
  why: >
    Cryptographic algorithms have a history of being broken or deprecated: MD5 (2004), SHA-1 (2017),
    DES (1999), RC4 (2015), RSA-1024 (2010). Each deprecation required painful, years-long migration
    projects because crypto was hardcoded throughout applications. The PQC transition will be the largest
    crypto migration in history — affecting TLS, PKI, code signing, data-at-rest, and key management.
    Systems without crypto-agility will require complete rewrites. NIST CSWP 39 (2024) explicitly
    recommends crypto-agility as a core design principle for the PQC transition. The cost of adding
    crypto-agility upfront is minimal; the cost of retrofitting it later is enormous.
  how_to_do_right: |
    1. Define a CryptoProvider interface with methods: encrypt, decrypt, sign, verify, encapsulate, decapsulate
    2. Implement concrete providers for each algorithm family (classical, PQC, hybrid)
    3. Select provider via configuration (env var, config file) — NOT hardcoded
    4. Support algorithm negotiation in protocols (like TLS cipher suites)
    5. Include algorithm identifier in all encrypted/signed data (for future decryption/verification)
    6. Maintain an algorithm registry with deprecation dates and migration status
    7. Test algorithm swaps in CI/CD — run the test suite with each supported provider
    8. Plan for hybrid mode: run classical + PQC in parallel during transition
  severity: high
  technologies:
    lang: [python, go, rust, java]
    library: [cryptography, liboqs, pqcrypto]
  domains:
    domain: [security, architecture]
    concern: [cryptography, post-quantum, crypto-agility]
  example_good: |
    from abc import ABC, abstractmethod
    from enum import Enum

    class Algorithm(Enum):
        RSA_2048 = "rsa-2048"           # Classical (deprecated 2030)
        ECDSA_P256 = "ecdsa-p256"       # Classical (deprecated 2030)
        ML_KEM_768 = "ml-kem-768"       # PQC (FIPS 203)
        ML_DSA_65 = "ml-dsa-65"         # PQC (FIPS 204)
        X_WING = "x-wing"              # Hybrid (X25519 + ML-KEM-768)

    class KEMProvider(ABC):
        @abstractmethod
        def generate_keypair(self) -> tuple[bytes, bytes]: ...
        @abstractmethod
        def encapsulate(self, public_key: bytes) -> tuple[bytes, bytes]: ...
        @abstractmethod
        def decapsulate(self, secret_key: bytes, ciphertext: bytes) -> bytes: ...

    class MLKEMProvider(KEMProvider):
        def __init__(self, variant: str = "ML-KEM-768"):
            self.kem = oqs.KeyEncapsulation(variant)
        def generate_keypair(self):
            pk = self.kem.generate_keypair()
            return pk, self.kem.export_secret_key()
        def encapsulate(self, pk):
            return self.kem.encap_secret(pk)
        def decapsulate(self, sk, ct):
            return self.kem.decap_secret(ct)

    # Configuration-driven selection
    def get_kem_provider(algo: str = None) -> KEMProvider:
        algo = algo or os.getenv("KEM_ALGORITHM", "ml-kem-768")
        providers = {
            "ml-kem-768": MLKEMProvider,
            "ml-kem-1024": lambda: MLKEMProvider("ML-KEM-1024"),
            "x-wing": XWingProvider,
        }
        return providers[algo]()
  example_bad: |
    # Hardcoded RSA everywhere — no crypto-agility
    from cryptography.hazmat.primitives.asymmetric import rsa

    # Scattered across 50 files:
    key = rsa.generate_private_key(65537, 2048)  # Hardcoded algorithm
    # When RSA is deprecated (2030), every file must be found and changed
    # No algorithm identifier stored — can't tell which algo encrypted old data
    # No interface — can't swap without rewriting business logic
    # Migration estimate: 6-12 months of developer time
  when_applies: Any system using cryptography that needs to survive the PQC transition — all production systems, libraries, protocols
  sources:
    - "https://csrc.nist.gov/pubs/cswp/39/initial-public-draft"
    - "https://csrc.nist.gov/pubs/sp/800/131/a/r2/final"

- id: PQC-005
  text: "Deploy hybrid key exchange combining classical and PQC algorithms (e.g., X25519 + ML-KEM-768) during the transition period. Hybrid mode ensures security even if either the classical or PQC algorithm is later found to be weak."
  why: >
    The PQC standards are new — ML-KEM was standardized in August 2024. While the underlying math has been
    studied for decades, implementation bugs, side-channel attacks, and unforeseen cryptanalytic advances
    are possible. Hybrid key exchange combines a well-tested classical algorithm (X25519) with a PQC
    algorithm (ML-KEM-768): the shared secret is derived from BOTH, so an attacker must break BOTH to
    compromise the exchange. This provides a safety net during the transition period. If ML-KEM is later
    found to have a weakness, X25519 still protects. If quantum computers break X25519, ML-KEM still
    protects. Chrome and Firefox have deployed hybrid X25519+ML-KEM-768 since 2024, and IETF has
    standardized the X-Wing hybrid KEM (draft-connolly-cfrg-xwing).
  how_to_do_right: |
    1. Use X-Wing (X25519 + ML-KEM-768) as the preferred hybrid KEM — IETF standardized
    2. For TLS: enable hybrid key exchange groups in your TLS library configuration
    3. Derive the shared secret by combining both KEM outputs: SS = KDF(SS_classical || SS_pqc)
    4. Never use PQC-only in production until algorithms have 5+ years of deployment experience
    5. Test hybrid mode with your specific latency requirements — adds ~1KB to TLS ClientHello
    6. Monitor for TLS middlebox interference — some firewalls drop large ClientHello messages
    7. Support fallback to classical-only for legacy clients that cannot handle hybrid
  severity: high
  technologies:
    lang: [python, go, rust]
    library: [liboqs, oqs-python, circl, rustls]
    platform: [openssl, boringssl]
  domains:
    domain: [security, cryptography]
    concern: [key-exchange, tls, post-quantum, hybrid-cryptography]
  example_good: |
    import oqs
    from cryptography.hazmat.primitives.asymmetric.x25519 import (
        X25519PrivateKey, X25519PublicKey
    )
    from cryptography.hazmat.primitives.kdf.hkdf import HKDF
    from cryptography.hazmat.primitives import hashes

    class HybridKEM:
        """X-Wing: X25519 + ML-KEM-768 hybrid key exchange."""

        def generate_keypair(self):
            # Classical component
            self.x25519_sk = X25519PrivateKey.generate()
            self.x25519_pk = self.x25519_sk.public_key()
            # PQC component
            self.mlkem = oqs.KeyEncapsulation("ML-KEM-768")
            self.mlkem_pk = self.mlkem.generate_keypair()
            return (self.x25519_pk, self.mlkem_pk)

        def encapsulate(self, x25519_pk: bytes, mlkem_pk: bytes):
            # Classical DH
            ephemeral = X25519PrivateKey.generate()
            x25519_ss = ephemeral.exchange(X25519PublicKey.from_public_bytes(x25519_pk))
            # PQC KEM
            client_kem = oqs.KeyEncapsulation("ML-KEM-768")
            mlkem_ct, mlkem_ss = client_kem.encap_secret(mlkem_pk)
            # Combine: security requires breaking BOTH
            combined_ss = HKDF(
                algorithm=hashes.SHA256(), length=32, salt=None,
                info=b"x-wing-hybrid-kem"
            ).derive(x25519_ss + mlkem_ss)
            return combined_ss, (ephemeral.public_key(), mlkem_ct)
  example_bad: |
    # PQC-only deployment — no safety net if PQC algorithm has weakness
    kem = oqs.KeyEncapsulation("ML-KEM-768")
    pk = kem.generate_keypair()
    ct, ss = kem.encap_secret(pk)
    # If a lattice attack is discovered in 2027, ALL past sessions are compromised
    # No classical fallback — single point of failure

    # Or: classical-only — vulnerable to quantum computers
    from cryptography.hazmat.primitives.asymmetric.x25519 import X25519PrivateKey
    sk = X25519PrivateKey.generate()
    # Harvest-now-decrypt-later: traffic recorded today, decrypted when QC arrives
  when_applies: Any TLS deployment, VPN, messaging protocol, or key exchange system during the 2024-2030+ PQC transition period
  sources:
    - "https://datatracker.ietf.org/doc/draft-connolly-cfrg-xwing/"
    - "https://blog.cloudflare.com/post-quantum-for-all/"

- id: PQC-006
  text: "Configure post-quantum TLS 1.3 by enabling hybrid key exchange groups (X25519+ML-KEM-768) in your TLS library and web server. Test for middlebox compatibility and certificate chain size impact."
  why: >
    TLS protects data in transit for virtually all internet communication. Without PQC TLS, all network
    traffic is vulnerable to harvest-now-decrypt-later attacks. The good news: TLS 1.3's extensible design
    makes PQC integration straightforward — hybrid key exchange groups are added as new named groups, and
    the rest of the handshake remains unchanged. The challenge: larger ClientHello messages (~1,200 bytes
    with hybrid KEM vs ~300 bytes with X25519) can cause problems with middleboxes (firewalls, load
    balancers, WAFs) that have hardcoded size assumptions. PQC certificates (ML-DSA) add ~5KB per
    certificate in the chain, increasing handshake size significantly. Testing with real network
    conditions is essential before deployment.
  how_to_do_right: |
    1. For nginx: use ssl_ecdh_curve with hybrid groups (requires OpenSSL 3.2+ or liboqs provider)
    2. For Python (httpx/aiohttp): configure SSL context with hybrid groups
    3. For Go: use cloudflare/circl or native support in Go 1.23+
    4. Enable TLS certificate compression (RFC 8879) to mitigate larger PQC certificate sizes
    5. Test with network conditions: high latency, packet loss, middlebox firewalls
    6. Monitor TLS handshake latency before and after enabling hybrid KEM
    7. Implement graceful fallback: if hybrid handshake fails, retry with classical-only
    8. Keep classical groups in the supported groups list for backward compatibility
  severity: high
  technologies:
    lang: [python, go]
    library: [openssl, boringssl, circl, liboqs]
    platform: [nginx, haproxy, caddy]
  domains:
    domain: [security, operations]
    concern: [tls, post-quantum, infrastructure]
  example_good: |
    # nginx configuration with hybrid PQC key exchange (OpenSSL 3.2+)
    # nginx.conf
    ssl_protocols TLSv1.3;
    ssl_ecdh_curve X25519MLKEM768:X25519:P-256;  # Hybrid first, fallback to classical
    ssl_prefer_server_ciphers on;

    # Enable certificate compression (RFC 8879) for smaller PQC cert transfers
    ssl_certificate_compression zlib brotli;

    # ---

    # Python: configure SSL context for hybrid TLS
    import ssl

    ctx = ssl.SSLContext(ssl.PROTOCOL_TLS_CLIENT)
    ctx.minimum_version = ssl.TLSVersion.TLSv1_3

    # With OpenSSL 3.2+ compiled with oqs-provider:
    ctx.set_ciphers("DEFAULT")
    # Groups preference: hybrid first, then classical fallback
    ctx.set_ecdh_curve("X25519MLKEM768:X25519:P-256")

    # ---

    # Go: using cloudflare/circl for hybrid TLS
    # import "github.com/cloudflare/circl/kem/hybrid"
    # tlsConfig := &tls.Config{
    #     CurvePreferences: []tls.CurveID{
    #         tls.X25519MLKEM768,  // Hybrid PQC
    #         tls.X25519,          // Classical fallback
    #     },
    # }
  example_bad: |
    # TLS 1.3 with classical-only key exchange — vulnerable to HNDL
    ssl_protocols TLSv1.3;
    ssl_ecdh_curve X25519:P-256;  # No PQC — traffic can be decrypted by future QC

    # Or: forcing PQC-only without fallback — breaks legacy clients
    ssl_ecdh_curve X25519MLKEM768;  # No classical fallback
    # Legacy clients that don't support hybrid will fail to connect

    # Or: not testing for middlebox issues
    # Firewall drops ClientHello > 512 bytes — all PQC connections fail silently
  when_applies: Any web server, API gateway, reverse proxy, or service-to-service TLS deployment
  sources:
    - "https://datatracker.ietf.org/doc/html/rfc8446"
    - "https://blog.cloudflare.com/post-quantum-for-all/"
    - "https://www.openssl.org/docs/man3.2/man7/ossl-guide-migration.html"

- id: PQC-007
  text: "Use hash-based signatures (XMSS/LMS per NIST SP 800-208) for firmware signing and code signing where statefulness is manageable. These are the most conservative PQC signatures with minimal security assumptions."
  why: >
    XMSS (eXtended Merkle Signature Scheme, RFC 8391) and LMS (Leighton-Micali Signature, RFC 8554)
    are stateful hash-based signature schemes standardized by NIST in SP 800-208 (2020) — years before
    the FIPS 203/204/205 standards. Their security relies ONLY on the one-wayness of the hash function
    (SHA-256), making them the most conservative PQC option. The critical constraint: they are STATEFUL —
    each key pair can sign a fixed number of messages (2^10 to 2^20), and the signer MUST track which
    leaf nodes have been used. Reusing a leaf compromises the scheme. This makes XMSS/LMS ideal for
    firmware signing (infrequent, controlled signing operations) but unsuitable for TLS or high-volume
    scenarios. The U.S. government (CNSA 2.0) recommends XMSS/LMS for firmware and software signing.
  how_to_do_right: |
    1. Use LMS/HSS for firmware and bootloader signing (NIST SP 800-208)
    2. Use XMSS/XMSS^MT for code signing with larger key trees
    3. CRITICAL: implement persistent state tracking — never reuse a leaf index
    4. Store signer state in tamper-resistant hardware (HSM) or append-only log
    5. Set tree height based on signing frequency: H=10 (1,024 signatures), H=20 (1,048,576 signatures)
    6. For HSM-backed signing: use AWS CloudHSM, Azure Managed HSM, or Thales Luna with LMS support
    7. Do NOT use for TLS certificates — too few signatures, state management impractical at scale
    8. Monitor remaining leaf count and alert when < 10% remain
  severity: medium
  technologies:
    lang: [python, go, c]
    library: [liboqs, oqs-python, hash-sigs]
    platform: [hsm, tpm]
  domains:
    domain: [security, cryptography]
    concern: [digital-signatures, firmware-security, post-quantum, code-signing]
  example_good: |
    import oqs

    # LMS signature for firmware signing (stateful, hash-based)
    # Tree height H=15 allows 32,768 signatures
    signer = oqs.Signature("LMS-SHA256-H15")
    public_key = signer.generate_keypair()

    # Sign firmware image
    firmware = open("bootloader_v3.0.bin", "rb").read()
    signature = signer.sign(firmware)

    # CRITICAL: persist state after every signature to prevent leaf reuse
    state = signer.export_secret_key()
    save_state_to_hsm(state)  # Tamper-resistant storage
    increment_signature_counter()  # Track usage: 1/32768

    # Verify on target device (stateless operation)
    verifier = oqs.Signature("LMS-SHA256-H15")
    assert verifier.verify(firmware, signature, public_key)

    # Monitor remaining signatures
    remaining = 32768 - get_signature_counter()
    if remaining < 3000:  # < 10% remaining
        alert("LMS key nearing exhaustion — generate new keypair")
  example_bad: |
    # Using XMSS/LMS without state persistence — CATASTROPHIC
    signer = oqs.Signature("LMS-SHA256-H10")
    pk = signer.generate_keypair()

    for firmware in firmware_updates:
        sig = signer.sign(firmware)
        # State NOT persisted! If process crashes and restarts:
        # - Signer reuses leaf index 0
        # - Attacker with two signatures on same leaf can forge signatures
        # - ALL signed firmware is compromised

    # Or: using stateful signatures for high-volume operations
    for request in api_requests:  # Millions per day
        sig = signer.sign(request)  # Will exhaust 1024 signatures in minutes!
  when_applies: Firmware signing, bootloader verification, code signing, software distribution, IoT device updates
  sources:
    - "https://csrc.nist.gov/pubs/sp/800/208/final"
    - "https://datatracker.ietf.org/doc/html/rfc8554"
    - "https://datatracker.ietf.org/doc/html/rfc8391"

- id: PQC-008
  text: "Understand the API design difference between key encapsulation (KEM) and key exchange (DH) — KEM uses encapsulate/decapsulate operations, not the generate/exchange pattern of Diffie-Hellman. Update your code abstractions accordingly."
  why: >
    Classical key exchange (Diffie-Hellman, ECDH) is symmetric: both parties contribute a key share, and
    both compute the shared secret independently. Post-quantum key encapsulation (KEM) is asymmetric: one
    party generates a keypair, the other encapsulates a random secret using the public key, and the first
    party decapsulates to recover it. This is a fundamental API change that breaks existing abstractions.
    Code that assumes DH's generate_private_key() / exchange() pattern will not work with KEMs. Libraries
    like liboqs expose encap_secret() / decap_secret() instead. Developers who map KEM onto DH
    abstractions will create subtle bugs — especially around who generates the shared secret (in DH: both;
    in KEM: only the encapsulator) and how key material flows.
  how_to_do_right: |
    1. Understand the KEM API: keygen() -> (pk, sk); encapsulate(pk) -> (ct, ss); decapsulate(sk, ct) -> ss
    2. Understand the DH API: keygen() -> (pk, sk); exchange(sk, other_pk) -> ss
    3. In KEM: the encapsulator creates the shared secret; the decapsulator recovers it
    4. In DH: both parties independently compute the same shared secret
    5. Design your crypto abstraction to support both patterns with a common SharedSecret output
    6. For protocols: the client typically encapsulates (sends ciphertext), server decapsulates
    7. The ciphertext in KEM is NOT equivalent to a public key share in DH — it is an encrypted secret
    8. Use type systems to prevent mixing KEM ciphertexts with DH public keys
  severity: medium
  technologies:
    lang: [python, go, rust]
    library: [liboqs, oqs-python, pqcrypto, circl]
  domains:
    domain: [security, architecture]
    concern: [cryptography, api-design, post-quantum]
  example_good: |
    from abc import ABC, abstractmethod

    class SharedSecretResult:
        """Common output for both KEM and DH operations."""
        def __init__(self, shared_secret: bytes, metadata: dict):
            self.shared_secret = shared_secret  # Always 32 bytes
            self.metadata = metadata

    class KEMInterface(ABC):
        """Post-quantum KEM: asymmetric encapsulate/decapsulate."""
        @abstractmethod
        def generate_keypair(self) -> tuple[bytes, bytes]: ...
        @abstractmethod
        def encapsulate(self, public_key: bytes) -> tuple[bytes, bytes]:
            """Returns (ciphertext, shared_secret). Client calls this."""
            ...
        @abstractmethod
        def decapsulate(self, secret_key: bytes, ciphertext: bytes) -> bytes:
            """Returns shared_secret. Server calls this."""
            ...

    class DHInterface(ABC):
        """Classical DH: symmetric key exchange."""
        @abstractmethod
        def generate_keypair(self) -> tuple[bytes, bytes]: ...
        @abstractmethod
        def exchange(self, my_secret: bytes, their_public: bytes) -> bytes:
            """Both parties call this — result is the same shared_secret."""
            ...

    # Usage difference:
    # KEM: client calls encapsulate(server_pk) -> sends ciphertext to server
    # DH:  client calls exchange(my_sk, server_pk) -> sends my_pk to server
  example_bad: |
    # Treating KEM like DH — conceptual error leading to bugs
    class BrokenKeyExchange:
        def exchange(self, my_key, their_key):
            # This DH pattern doesn't work for KEMs!
            kem = oqs.KeyEncapsulation("ML-KEM-768")
            # ERROR: KEM doesn't have an "exchange" operation
            # The encapsulator creates the secret, not both parties
            return kem.exchange(my_key, their_key)  # Method doesn't exist!

    # Or: confusing ciphertext with public key
    ct, ss = kem.encap_secret(server_pk)
    # ct is NOT a public key — it's an encrypted secret
    # Sending ct as if it were a DH public key share is incorrect
  when_applies: Any system migrating from DH/ECDH to PQC key encapsulation — TLS libraries, VPN protocols, messaging protocols, custom key exchange
  sources:
    - "https://csrc.nist.gov/pubs/fips/203/final"
    - "https://www.rfc-editor.org/rfc/rfc9180"

- id: PQC-009
  text: "Plan PQC migration by inventorying all cryptographic assets, classifying data by sensitivity and longevity, and prioritizing migration of long-lived secrets and high-value data. Start with key exchange (data-in-transit), then certificates, then data-at-rest."
  why: >
    The PQC migration is the largest cryptographic transition in computing history — affecting every system
    that uses public-key cryptography. Without a structured plan, organizations waste effort on low-priority
    systems while leaving high-value data exposed. The correct prioritization is: (1) data-in-transit first
    (TLS key exchange) because of harvest-now-decrypt-later attacks, (2) signing/certificates next because
    PKI has long lead times, (3) data-at-rest last because it can be re-encrypted on a managed schedule.
    NIST IR 8547 (2024) provides a timeline: RSA/ECDSA deprecated after 2030, disallowed after 2035.
    Organizations that start planning now have 4-8 years; those that wait will face emergency migrations.
  how_to_do_right: |
    1. Inventory ALL cryptographic usage: TLS, certificates, code signing, data encryption, key management
    2. Classify data by longevity: how long must it remain confidential? (5yr, 10yr, 20yr+)
    3. Classify data by sensitivity: public, internal, confidential, top-secret
    4. Prioritize: long-lived + high-sensitivity data first (financial records, healthcare, government)
    5. Migration order: (a) key exchange/TLS, (b) signatures/certificates, (c) data-at-rest
    6. Deploy hybrid mode first (classical + PQC) before full PQC migration
    7. Maintain a migration dashboard: % of traffic using PQC, % of certificates migrated
    8. Set milestones aligned with NIST IR 8547 timeline (deprecation 2030, disallowed 2035)
  severity: critical
  technologies:
    lang: [python, go]
    library: [cryptography, liboqs, openssl]
  domains:
    domain: [security, operations, compliance]
    concern: [cryptography, post-quantum, migration-planning]
  example_good: |
    # PQC Migration Inventory Template

    CRYPTO_INVENTORY = {
        "tls_endpoints": {
            "api.example.com": {
                "algorithm": "X25519",
                "pqc_status": "hybrid_deployed",  # X25519+ML-KEM-768
                "priority": "P0",
                "data_sensitivity": "high",
                "data_longevity_years": 10,
            },
            "internal.example.com": {
                "algorithm": "ECDHE-P256",
                "pqc_status": "not_started",
                "priority": "P1",
                "data_sensitivity": "medium",
                "data_longevity_years": 3,
            },
        },
        "certificates": {
            "root_ca": {
                "algorithm": "RSA-4096",
                "expiry": "2035-01-01",
                "pqc_status": "planning",  # Need ML-DSA root CA
                "priority": "P0",
            },
        },
        "data_at_rest": {
            "customer_pii_db": {
                "algorithm": "AES-256-GCM",
                "key_exchange": "RSA-2048",
                "pqc_status": "not_started",
                "priority": "P1",  # AES-256 is quantum-safe, but key wrapping is not
            },
        },
    }

    # Migration dashboard
    def migration_status():
        total = count_all_crypto_assets()
        pqc = count_pqc_migrated()
        print(f"PQC migration: {pqc}/{total} ({pqc/total:.0%})")
        print(f"P0 items remaining: {count_p0_not_migrated()}")
        print(f"NIST deadline: 2030 (deprecation), 2035 (disallowed)")
  example_bad: |
    # No inventory, no plan — ad hoc migration
    # "We'll migrate when quantum computers arrive"
    # Problem: harvest-now-decrypt-later means the attack is happening NOW
    # No prioritization: team migrates low-value internal tools while
    # customer financial data remains on classical crypto
    # No timeline: surprise when NIST deprecation deadline arrives in 2030
    # No budget: emergency migration costs 10x planned migration
  when_applies: Any organization using public-key cryptography — effectively all software systems
  sources:
    - "https://csrc.nist.gov/pubs/ir/8547/ipd"
    - "https://www.nsa.gov/Cybersecurity/Post-Quantum-Cybersecurity-Resources/"

- id: PQC-010
  text: "Defend against the Harvest Now, Decrypt Later (HNDL) threat — adversaries are recording encrypted network traffic TODAY to decrypt when quantum computers become available. Data with long-term confidentiality requirements must use post-quantum encryption NOW."
  why: >
    Nation-state adversaries (and sophisticated criminal organizations) are actively recording encrypted
    network traffic in bulk — tapping submarine cables, compromising ISPs, and intercepting cloud provider
    traffic. This data is stored cheaply in anticipation of quantum computers that can break RSA and ECDH.
    Data with long-term secrecy requirements (medical records: 50+ years, financial records: 7-30 years,
    trade secrets: indefinite, classified information: 25-75 years) is already compromised if captured
    today with classical-only encryption. The NSA's CNSA 2.0 advisory (2022) explicitly warns about HNDL
    and mandates PQC adoption for national security systems. The cost of deploying hybrid TLS now is
    minimal; the cost of a retroactive data breach spanning decades of captured traffic is incalculable.
  how_to_do_right: |
    1. Classify data by required confidentiality duration: <5yr (low risk), 5-20yr (medium), 20yr+ (high)
    2. Immediately deploy hybrid TLS (X25519+ML-KEM-768) for ALL high-duration data flows
    3. Prioritize: healthcare (HIPAA: indefinite), financial (SOX: 7yr), government (25-75yr)
    4. For stored encrypted data: re-encrypt with PQC-protected keys on a rolling schedule
    5. For VPNs and internal traffic: upgrade to hybrid key exchange (WireGuard + ML-KEM patches)
    6. For messaging: adopt Signal's PQXDH protocol (already deployed, X25519+ML-KEM-768)
    7. Assume ALL classical-only encrypted traffic captured since 2015 will eventually be decrypted
    8. Document the HNDL threat model for executives and compliance teams
  severity: critical
  technologies:
    lang: [python, go]
    library: [liboqs, openssl, wireguard]
    platform: [aws, gcp, azure]
  domains:
    domain: [security, compliance]
    concern: [cryptography, post-quantum, threat-modeling]
  example_good: |
    # HNDL Risk Assessment Matrix

    DATA_HNDL_RISK = {
        "patient_medical_records": {
            "confidentiality_years": 100,  # Lifetime + posthumous
            "current_encryption": "TLS 1.3 (X25519)",
            "hndl_risk": "CRITICAL",
            "action": "Deploy hybrid TLS IMMEDIATELY",
            "deadline": "2024 Q4",
        },
        "financial_transactions": {
            "confidentiality_years": 30,
            "current_encryption": "TLS 1.3 (X25519)",
            "hndl_risk": "HIGH",
            "action": "Deploy hybrid TLS",
            "deadline": "2025 Q2",
        },
        "marketing_analytics": {
            "confidentiality_years": 2,
            "current_encryption": "TLS 1.3 (X25519)",
            "hndl_risk": "LOW",  # Data value decays before QC arrives
            "action": "Monitor, migrate with infrastructure refresh",
            "deadline": "2027",
        },
    }

    def assess_hndl_risk(data_class: str) -> str:
        """Assess HNDL risk based on data confidentiality duration."""
        info = DATA_HNDL_RISK[data_class]
        quantum_timeline_years = 10  # Conservative estimate for cryptanalytically relevant QC
        if info["confidentiality_years"] > quantum_timeline_years:
            return "CRITICAL — deploy PQC immediately"
        elif info["confidentiality_years"] > 5:
            return "HIGH — plan PQC migration"
        return "LOW — standard migration timeline"
  example_bad: |
    # "We'll worry about quantum when it arrives" — the data is already captured

    # 2024: Hospital deploys TLS 1.3 with X25519 (classical only)
    # 2024: Nation-state records all traffic to hospital API
    # 2034: 4,000-qubit quantum computer breaks X25519
    # 2034: All patient records from 2024-2034 are decrypted
    # 2034: 10 years of medical records exposed — HIPAA catastrophe

    # The attack happened in 2024, not 2034 — the decryption is just delayed
  when_applies: Any system transmitting data that must remain confidential for more than 5 years — healthcare, finance, government, legal, trade secrets
  sources:
    - "https://www.nsa.gov/Cybersecurity/Post-Quantum-Cybersecurity-Resources/"
    - "https://media.defense.gov/2022/Sep/07/2003071836/-1/-1/0/CSI_CNSA_2.0_FAQ_.PDF"

- id: PQC-011
  text: "Understand and plan for PQC performance implications — ML-KEM public keys are 37x larger than X25519, ML-DSA signatures are 52x larger than ECDSA. CPU performance is comparable, but bandwidth and storage requirements increase significantly."
  why: >
    PQC algorithms trade larger key/signature sizes for quantum resistance. ML-KEM-768: 1,184-byte public
    key (vs X25519's 32 bytes), 1,088-byte ciphertext. ML-DSA-65: 1,952-byte public key, 3,309-byte
    signature (vs ECDSA's 32-byte key, 64-byte signature). SLH-DSA-192f: 35,664-byte signature.
    Paradoxically, CPU performance is often BETTER: ML-KEM key generation is ~10x faster than RSA-2048,
    and ML-DSA signing is faster than RSA-2048 signing. The real impact is on bandwidth and storage:
    TLS handshakes grow by ~2-5KB with hybrid KEM, certificate chains grow by ~10-15KB with ML-DSA
    certificates, and key stores need more space. For latency-sensitive applications (mobile, IoT,
    high-frequency trading), the bandwidth impact needs testing under real network conditions.
  how_to_do_right: |
    1. Measure actual performance impact in YOUR environment — don't rely on benchmarks alone
    2. Key sizes to budget for:
       - ML-KEM-768: pk=1,184B, ct=1,088B, ss=32B
       - ML-DSA-65: pk=1,952B, sig=3,309B
       - SLH-DSA-192f: pk=48B, sig=35,664B
    3. TLS handshake: expect +2-5KB for hybrid KEM, +10-15KB for PQC certificates
    4. Enable TLS certificate compression (RFC 8879) — reduces PQC cert impact by 40-60%
    5. For IoT/embedded: prefer ML-KEM-768 (best size/security ratio)
    6. For database key stores: plan for 10-50x more storage for PQC public keys
    7. CPU is NOT the bottleneck — ML-KEM encapsulation ~100us, comparable to X25519
    8. Test under constrained bandwidth: 3G/4G mobile, satellite links, high-latency WAN
  severity: medium
  technologies:
    lang: [python, go, c, rust]
    library: [liboqs, openssl, circl, pqcrypto]
  domains:
    domain: [architecture, operations]
    concern: [cryptography, post-quantum, performance]
  example_good: |
    import oqs
    import time

    def benchmark_pqc():
        """Benchmark PQC operations vs classical for capacity planning."""
        results = {}

        # ML-KEM-768 (PQC key encapsulation)
        kem = oqs.KeyEncapsulation("ML-KEM-768")
        t0 = time.perf_counter()
        pk = kem.generate_keypair()
        t_keygen = time.perf_counter() - t0

        client_kem = oqs.KeyEncapsulation("ML-KEM-768")
        t0 = time.perf_counter()
        ct, ss = client_kem.encap_secret(pk)
        t_encap = time.perf_counter() - t0

        t0 = time.perf_counter()
        ss2 = kem.decap_secret(ct)
        t_decap = time.perf_counter() - t0

        results["ML-KEM-768"] = {
            "keygen_us": t_keygen * 1e6,
            "encap_us": t_encap * 1e6,
            "decap_us": t_decap * 1e6,
            "pk_bytes": len(pk),         # 1,184
            "ct_bytes": len(ct),         # 1,088
            "ss_bytes": len(ss),         # 32
        }

        # Compare with X25519 baseline
        # Typical: ML-KEM keygen ~50us, X25519 keygen ~25us (2x, negligible)
        # ML-KEM encap ~100us, X25519 exchange ~50us (2x, negligible)
        # Key difference: pk 1,184B vs 32B (37x — THIS is the impact)

        print("Size impact assessment:")
        print(f"  TLS ClientHello growth: +{1184 + 1088}B (~2.2KB)")
        print(f"  Cert chain growth (3 certs): +{1952 * 3 + 3309 * 3}B (~15.8KB)")
        print(f"  Total handshake growth: ~18KB")
        return results
  example_bad: |
    # Deploying PQC without measuring performance impact
    # "The NIST paper says it's fast, so it'll be fine"

    # Reality on 3G mobile network (500ms RTT, 1Mbps):
    # Classical TLS handshake: ~300B ClientHello = instant
    # Hybrid PQC handshake: ~2.5KB ClientHello = still fast
    # PQC certificates (3-cert chain): +15KB = adds 120ms on 1Mbps
    # Total impact: 120ms extra latency on constrained networks
    # For real-time apps (voice, gaming): may exceed latency budget

    # Not enabling certificate compression: 60% size savings left on table
    # Not testing with real network conditions: surprises in production
  when_applies: Any system planning PQC deployment — especially mobile apps, IoT, high-frequency trading, real-time communications, bandwidth-constrained environments
  sources:
    - "https://csrc.nist.gov/pubs/fips/203/final"
    - "https://blog.cloudflare.com/post-quantum-for-all/"

- id: PQC-012
  text: "Use established PQC libraries for implementation — liboqs/oqs-python for Python prototyping, cloudflare/circl for Go production, and pqcrypto/aws-lc for Rust/C. Never implement PQC algorithms from scratch."
  why: >
    Cryptographic implementation is notoriously error-prone — side-channel attacks, timing attacks, fault
    injection, and subtle mathematical bugs have broken countless "correct" implementations. PQC algorithms
    are especially complex: ML-KEM requires Number Theoretic Transform (NTT), noise sampling from centered
    binomial distributions, and constant-time polynomial arithmetic. A single timing leak in ML-KEM
    decapsulation enables full key recovery. The Open Quantum Safe (OQS) project provides peer-reviewed,
    constant-time implementations that have undergone years of security analysis. Rolling your own PQC
    implementation is guaranteed to be vulnerable. Even using established libraries, you must keep them
    updated — PQC implementations are actively being hardened as new side-channel attacks are discovered.
  how_to_do_right: |
    1. Python prototyping: pip install liboqs-python (wraps C liboqs, all NIST algorithms)
    2. Go production: go get github.com/cloudflare/circl (ML-KEM, ML-DSA, X-Wing, constant-time)
    3. Rust/C production: aws-lc-rs or pqcrypto crate (FIPS-validated where available)
    4. Java: Bouncy Castle (bcprov-jdk18on, ML-KEM and ML-DSA support since v1.78)
    5. NEVER implement NTT, noise sampling, or polynomial arithmetic from scratch
    6. NEVER use non-constant-time operations in KEM decapsulation or signature generation
    7. Pin library versions and monitor for CVEs — PQC implementations are actively hardened
    8. Validate with NIST KAT (Known Answer Tests) vectors to confirm correct implementation
  severity: medium
  technologies:
    lang: [python, go, rust, java, c]
    library: [liboqs, oqs-python, circl, pqcrypto, aws-lc, bouncy-castle]
  domains:
    domain: [security, architecture]
    concern: [cryptography, post-quantum, implementation]
  example_good: |
    # Python: liboqs-python (pip install liboqs-python)
    import oqs

    # List all supported algorithms
    print("KEMs:", oqs.get_enabled_KEM_mechanisms())
    # ['ML-KEM-512', 'ML-KEM-768', 'ML-KEM-1024', ...]

    print("Sigs:", oqs.get_enabled_sig_mechanisms())
    # ['ML-DSA-44', 'ML-DSA-65', 'ML-DSA-87', 'SLH-DSA-SHA2-128f', ...]

    # KEM usage
    kem = oqs.KeyEncapsulation("ML-KEM-768")
    pk = kem.generate_keypair()
    ct, ss = oqs.KeyEncapsulation("ML-KEM-768").encap_secret(pk)

    # Signature usage
    sig = oqs.Signature("ML-DSA-65")
    pk = sig.generate_keypair()
    signature = sig.sign(b"message")
    assert sig.verify(b"message", signature, pk)

    # ---

    # Go: cloudflare/circl (production-grade, constant-time)
    # import (
    #     "github.com/cloudflare/circl/kem/mlkem/mlkem768"
    #     "github.com/cloudflare/circl/sign/mldsa/mldsa65"
    # )
    #
    # pk, sk, _ := mlkem768.GenerateKeyPair()
    # ct, ss, _ := mlkem768.Encapsulate(pk)
    # ss2, _ := mlkem768.Decapsulate(sk, ct)

    # ---

    # Rust: pqcrypto crate
    # use pqcrypto::kem::mlkem768::*;
    # let (pk, sk) = keypair();
    # let (ss, ct) = encapsulate(&pk);
    # let ss2 = decapsulate(&ct, &sk);
  example_bad: |
    # Rolling your own ML-KEM implementation — guaranteed vulnerabilities
    import numpy as np

    def ntt(poly):
        # Custom NTT implementation — NOT constant-time!
        # Timing side-channel: attacker measures execution time
        # to recover secret key coefficients
        for i in range(len(poly)):
            if poly[i] > 0:  # Branch on secret data — timing leak!
                poly[i] = poly[i] * omega_powers[i] % q
        return poly

    def sample_noise(n, eta):
        # Using Python's random module — NOT cryptographically secure!
        import random
        return [random.randint(-eta, eta) for _ in range(n)]
        # random.randint is not CSPRNG — predictable noise = broken KEM

    # This implementation will be broken by:
    # 1. Timing attacks (non-constant-time NTT)
    # 2. Predictable noise (insecure RNG)
    # 3. Missing constant-time comparison in decapsulation
    # 4. Integer overflow in polynomial arithmetic
  when_applies: Any project implementing post-quantum cryptography in any programming language
  sources:
    - "https://github.com/open-quantum-safe/liboqs"
    - "https://github.com/cloudflare/circl"
    - "https://github.com/rustpq/pqcrypto"
    - "https://www.bouncycastle.org/java.html"
