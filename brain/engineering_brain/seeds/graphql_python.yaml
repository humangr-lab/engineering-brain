            if not user:
                raise Exception("User not found")  # Generic exception — no error code

        @strawberry.field
        async def secret_data(self) -> str:
            try:
                return await db.query("SELECT * FROM secrets WHERE...")
            except Exception as e:
                raise Exception(str(e))  # LEAKS: SQL query, table names, DB errors
    # Client receives:
    # { "errors": [{ "message": "relation 'secrets' does not exist" }] }
    # Attacker now knows: PostgreSQL, table name "secrets", and that it doesn't exist
  when_applies: All production GraphQL APIs, especially those exposed to external clients
  sources:
    - "https://spec.graphql.org/October2021/#sec-Errors"
    - "https://strawberry.rocks/docs/types/schema#handling-execution-errors"
    - "https://productionreadygraphql.com/2020-08-01-guide-to-graphql-errors"

- id: GQL-009
  text: Implement authentication and authorization with Strawberry's permission classes and context. Authentication happens once at the transport layer (HTTP/WS). Authorization is enforced per-field using strawberry.permission.
  why: >
    Authentication (who are you?) and authorization (what can you access?) are distinct concerns in GraphQL.
    Authentication should happen ONCE at the transport layer — extract and validate the JWT/session from the
    HTTP header or WebSocket connection_init, then store the user in the context. Authorization must be
    enforced per-field because different fields in the same query may have different access requirements:
    a User's public profile fields are open, but their email requires authentication, and admin_notes
    requires admin role. Strawberry's permission_classes decorator provides declarative, composable
    authorization that runs before the resolver. This is far safer than manual if-checks in each resolver,
    which are easy to forget.
  how_to_do_right: |
    1. Extract auth token in context_getter (runs once per request)
    2. Validate token and store user object in context
    3. Define permission classes extending strawberry.BasePermission
    4. Apply permission_classes to fields/types that require authorization
    5. Use composable permissions: IsAuthenticated, HasRole("admin"), OwnsResource
    6. Permission.has_permission receives info with context — check user, roles, resource ownership
    7. Return clear error messages: "Authentication required" or "Admin access required"
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
    library: [strawberry-graphql, pyjwt]
  domains:
    domain: [api_design, security]
    concern: [backend, graphql, authentication, authorization]
  example_good: |
    import strawberry
    from strawberry.permission import BasePermission
    from strawberry.types import Info
    from fastapi import Request
    import jwt

    class IsAuthenticated(BasePermission):
        message = "Authentication required"

        def has_permission(self, source, info: Info, **kwargs) -> bool:
            return info.context.get("user") is not None

    class IsAdmin(BasePermission):
        message = "Admin access required"

        def has_permission(self, source, info: Info, **kwargs) -> bool:
            user = info.context.get("user")
            return user is not None and user.get("role") == "admin"

    class IsOwner(BasePermission):
        message = "You can only access your own data"

        def has_permission(self, source, info: Info, **kwargs) -> bool:
            user = info.context.get("user")
            return user is not None and str(source.id) == str(user.get("sub"))

    @strawberry.type
    class User:
        id: strawberry.ID
        name: str  # Public — no permission needed

        @strawberry.field(permission_classes=[IsAuthenticated])
        async def email(self) -> str:
            return self._email

        @strawberry.field(permission_classes=[IsAdmin])
        async def admin_notes(self) -> str | None:
            return self._admin_notes

        @strawberry.field(permission_classes=[IsOwner])
        async def payment_methods(self) -> list["PaymentMethod"]:
            return await PaymentRepository.get_by_user(self.id)

    async def get_context(request: Request) -> dict:
        auth_header = request.headers.get("Authorization", "")
        user = None
        if auth_header.startswith("Bearer "):
            try:
                token = auth_header.split(" ")[1]
                user = jwt.decode(token, SECRET_KEY, algorithms=["HS256"])
            except jwt.InvalidTokenError:
                pass
        return {"user": user, "request": request}
  example_bad: |
    @strawberry.type
    class Query:
        @strawberry.field
        async def user(self, info: Info, id: str) -> User:
            token = info.context["request"].headers.get("Authorization")
            if not token:
                raise Exception("Not authenticated")
            user = await get_user(id)
            # Forgot to check authorization — any authenticated user sees any data
            return user

        @strawberry.field
        async def admin_dashboard(self, info: Info) -> AdminData:
            # Forgot auth check entirely — endpoint is public!
            return await get_admin_data()
    # Problems:
    # 1. Auth logic duplicated in every resolver
    # 2. Easy to forget auth on new fields
    # 3. No role-based access — all-or-nothing
    # 4. Error handling inconsistent
  when_applies: Any GraphQL API with authenticated users and role-based or resource-based access control
  sources:
    - "https://strawberry.rocks/docs/guides/permissions"
    - "https://graphql.org/learn/authorization/"
    - "https://www.apollographql.com/docs/apollo-server/security/authentication/"

- id: GQL-010
  text: Use Relay-style cursor-based pagination for real-time or frequently-updated data. Use offset-based pagination only for static or rarely-changing datasets. Never return unbounded lists without pagination.
  why: >
    Offset pagination (LIMIT 20 OFFSET 40) breaks when data changes between pages: if a new item is inserted
    at position 5, page 3 (offset 40) will repeat the last item from page 2. For real-time data (feeds,
    notifications, search results), this causes duplicates and missing items. Cursor-based pagination uses
    an opaque cursor (typically base64-encoded ID or timestamp) to mark the position — "give me 20 items
    after cursor X." This is stable regardless of insertions/deletions because the cursor points to a
    specific item, not a position. The Relay specification defines a standard connection pattern:
    edges (with node + cursor), pageInfo (hasNextPage, endCursor), and totalCount. Strawberry has built-in
    Relay support with strawberry.relay.ListConnection.
  how_to_do_right: |
    1. For real-time/dynamic data: use cursor-based pagination with the Relay connection spec
    2. For static data with known total count: offset pagination is acceptable
    3. Use Strawberry's relay integration: strawberry.relay.Node and ListConnection
    4. Cursors should be opaque (base64-encoded) — clients must not parse or construct them
    5. Always include pageInfo with hasNextPage and endCursor in the response
    6. Set a maximum page size (e.g., 100) and enforce it server-side
    7. Default page size should be reasonable (10-25) — never default to "all"
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
    library: [strawberry-graphql]
  domains:
    domain: [api_design, performance]
    concern: [backend, graphql, pagination]
  example_good: |
    import strawberry
    from base64 import b64encode, b64decode
    from typing import Optional

    @strawberry.type
    class UserEdge:
        node: "User"
        cursor: str

    @strawberry.type
    class PageInfo:
        has_next_page: bool
        has_previous_page: bool
        start_cursor: str | None
        end_cursor: str | None

    @strawberry.type
    class UserConnection:
        edges: list[UserEdge]
        page_info: PageInfo
        total_count: int

    def encode_cursor(id: int) -> str:
        return b64encode(f"user:{id}".encode()).decode()

    def decode_cursor(cursor: str) -> int:
        decoded = b64decode(cursor.encode()).decode()
        return int(decoded.split(":")[1])

    @strawberry.type
    class Query:
        @strawberry.field
        async def users(
            self,
            first: int = 20,
            after: Optional[str] = None,
        ) -> UserConnection:
            if first > 100:
                first = 100  # Enforce max page size

            after_id = decode_cursor(after) if after else 0
            users = await UserRepository.list(after_id=after_id, limit=first + 1)
            has_next = len(users) > first
            users = users[:first]

            return UserConnection(
                edges=[
                    UserEdge(node=u, cursor=encode_cursor(u.id)) for u in users
                ],
                page_info=PageInfo(
                    has_next_page=has_next,
                    has_previous_page=after is not None,
                    start_cursor=encode_cursor(users[0].id) if users else None,
                    end_cursor=encode_cursor(users[-1].id) if users else None,
                ),
                total_count=await UserRepository.count(),
            )
  example_bad: |
    @strawberry.type
    class Query:
        @strawberry.field
        async def users(self) -> list[User]:
            # NO PAGINATION — returns ALL users. 1M users = OOM
            return await UserRepository.list_all()

        @strawberry.field
        async def users_paged(self, page: int = 1, size: int = 20) -> list[User]:
            offset = (page - 1) * size
            # Offset pagination — if new user inserted between page requests:
            # page 2 repeats the last item from page 1 (shifted by 1)
            return await UserRepository.list(offset=offset, limit=size)
            # Also: no hasNextPage info, no totalCount, no standardized format
  when_applies: GraphQL APIs with lists that clients paginate through, especially real-time or frequently-updated data
  sources:
    - "https://relay.dev/graphql/connections.htm"
    - "https://strawberry.rocks/docs/guides/relay"
    - "https://graphql.org/learn/pagination/"

- id: GQL-011
  text: Implement GraphQL file uploads using the graphql-multipart-request-spec. Use a dedicated upload scalar type and handle files as multipart form data — never base64-encode files in GraphQL variables.
  why: >
    GraphQL's transport is JSON, which cannot natively represent binary data. The naive approach is base64-encoding
    files into JSON strings, but this increases file size by 33%, prevents streaming, holds the entire file in
    memory, and blocks the event loop during encoding/decoding. The graphql-multipart-request-spec (used by Apollo,
    Relay, and most GraphQL clients) solves this by sending files as multipart form data alongside the GraphQL
    operation. The file is mapped to a variable using a JSON path. Strawberry supports this natively with the
    Upload scalar type. For large files (>10MB), consider pre-signed URLs instead: the client uploads directly
    to S3/GCS and sends the URL to the GraphQL mutation.
  how_to_do_right: |
    1. Use Strawberry's Upload scalar for file arguments in mutations
    2. The client sends a multipart form request with the file mapped to a variable
    3. For small files (<10MB): accept via Upload scalar directly
    4. For large files (>10MB): return a pre-signed upload URL, client uploads to storage directly
    5. Validate file type (MIME type check) and size server-side before processing
    6. Stream file to storage — never load entire file into memory
    7. Return file metadata (URL, size, content type) after successful upload
  severity: medium
  technologies:
    lang: [python]
    framework: [fastapi]
    library: [strawberry-graphql, boto3]
  domains:
    domain: [api_design]
    concern: [backend, graphql, file_upload]
  example_good: |
    import strawberry
    from strawberry.file_uploads import Upload

    MAX_FILE_SIZE = 10 * 1024 * 1024  # 10MB
    ALLOWED_TYPES = {"image/jpeg", "image/png", "image/webp", "application/pdf"}

    @strawberry.type
    class FileInfo:
        url: str
        filename: str
        size: int
        content_type: str

    @strawberry.type
    class UploadError:
        message: str

    UploadResult = strawberry.union("UploadResult", [FileInfo, UploadError])

    @strawberry.type
    class Mutation:
        @strawberry.mutation
        async def upload_avatar(self, file: Upload) -> UploadResult:
            content = await file.read()
            if len(content) > MAX_FILE_SIZE:
                return UploadError(
                    message=f"File exceeds {MAX_FILE_SIZE // 1024 // 1024}MB limit"
                )

            content_type = file.content_type or "application/octet-stream"
            if content_type not in ALLOWED_TYPES:
                return UploadError(message=f"File type {content_type} not allowed")

            url = await storage.upload(
                content=content,
                filename=file.filename,
                content_type=content_type,
            )
            return FileInfo(
                url=url,
                filename=file.filename,
                size=len(content),
                content_type=content_type,
            )

        @strawberry.mutation
        async def get_upload_url(self, filename: str, content_type: str) -> str:
            """For large files: return pre-signed URL for direct upload."""
            return await storage.generate_presigned_url(
                filename=filename,
                content_type=content_type,
                expires_in=3600,
            )
  example_bad: |
    @strawberry.type
    class Mutation:
        @strawberry.mutation
        async def upload_avatar(self, file_base64: str, filename: str) -> str:
            import base64
            content = base64.b64decode(file_base64)  # 33% larger in transit
            # Entire file held in memory as string + decoded bytes
            # No content type validation, no file size validation
            path = f"/uploads/{filename}"  # Path traversal vulnerability!
            with open(path, "wb") as f:
                f.write(content)
            return path
    # Problems:
    # 1. Base64 adds 33% overhead — 10MB file becomes 13.3MB in JSON
    # 2. Entire file must be in memory as JSON string AND decoded bytes
    # 3. No streaming — blocks event loop for large files
    # 4. No type/size validation — accept anything
    # 5. Path traversal vulnerability (filename="../../etc/passwd")
  when_applies: GraphQL APIs that accept file uploads (avatars, documents, media)
  sources:
    - "https://strawberry.rocks/docs/guides/file-upload"
    - "https://github.com/jaydenseric/graphql-multipart-request-spec"
    - "https://www.apollographql.com/docs/apollo-server/data/file-uploads/"

- id: GQL-012
  text: Test GraphQL APIs using Strawberry's test client for schema-level tests and httpx for integration tests. Test the schema directly — do not test resolvers in isolation without the GraphQL execution layer.
  why: >
    Testing resolvers as plain Python functions misses critical behavior: type coercion, permission checks,
    DataLoader batching, error formatting, input validation, and middleware execution. A resolver test that
    calls resolve_user(id="123") directly skips all of these. Strawberry's test client executes queries
    against the actual schema, including all extensions, permissions, and type serialization. This catches
    issues like: (1) a field returning None when the schema says non-nullable, (2) a permission class
    blocking access unexpectedly, (3) a DataLoader not being available in context, (4) an input type
    not matching the expected Pydantic validation. For integration tests, use httpx.AsyncClient with
    the mounted FastAPI app to test the full HTTP stack (headers, authentication, multipart uploads).
  how_to_do_right: |
    1. Use strawberry.test for schema-level tests (fast, no HTTP overhead)
    2. Use httpx.AsyncClient with FastAPI TestClient for full integration tests
    3. Test queries, mutations, and subscriptions through the schema — not as raw functions
    4. Test error cases: unauthorized access, validation errors, not found
    5. Test DataLoader batching: assert that N items result in 1 batch query, not N queries
    6. Use snapshot testing for complex response structures
    7. Test schema evolution: assert deprecated fields still work, new fields have defaults
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi, pytest]
    library: [strawberry-graphql, httpx, pytest-asyncio]
  domains:
    domain: [api_design, testing]
    concern: [backend, graphql]
  example_good: |
    import pytest
    from strawberry.test import BaseGraphQLTestClient
    from httpx import AsyncClient, ASGITransport

    @pytest.fixture
    def graphql_client():
        return BaseGraphQLTestClient(schema)

    @pytest.mark.asyncio
    async def test_get_user(graphql_client):
        result = await graphql_client.query(
            """
            query GetUser($id: ID!) {
                user(id: $id) {
                    id
                    name
                    email
                }
            }
            """,
            variables={"id": "1"},
            context_value={"user": {"sub": "1", "role": "admin"}},
        )
        assert result.errors is None
        assert result.data["user"]["name"] == "Alice"
        assert result.data["user"]["email"] == "alice@example.com"

    @pytest.mark.asyncio
    async def test_unauthorized_access(graphql_client):
        result = await graphql_client.query(
            "{ user(id: \"1\") { email } }",
            context_value={},  # No user in context
        )
        assert result.errors is not None
        assert "Authentication required" in result.errors[0]["message"]

    @pytest.mark.asyncio
    async def test_create_user_validation(graphql_client):
        result = await graphql_client.query(
            """
            mutation CreateUser($input: CreateUserInput!) {
                createUser(input: $input) {
                    ... on CreateUserSuccess { user { id name } }
                    ... on CreateUserValidationError { errors { field message } }
                }
            }
            """,
            variables={"input": {"name": "", "email": "not-an-email"}},
            context_value={"user": {"sub": "1"}},
        )
        assert result.errors is None
        data = result.data["createUser"]
        assert "errors" in data  # Validation error returned, not exception

    # Full integration test with httpx
    @pytest.mark.asyncio
    async def test_full_http_stack():
        transport = ASGITransport(app=app)
        async with AsyncClient(transport=transport, base_url="http://test") as client:
            response = await client.post(
                "/graphql",
                json={"query": "{ users(first: 5) { edges { node { name } } } }"},
                headers={"Authorization": "Bearer valid-jwt-token"},
            )
            assert response.status_code == 200
            data = response.json()
            assert "errors" not in data
  example_bad: |
    # Testing resolvers directly — misses schema behavior
    async def test_get_user():
        query = Query()
        user = await query.user(id="1")
        assert user.name == "Alice"
        # This passes even if:
        # - The schema declares user as User! (non-nullable) but resolver returns None
        # - Permission class would deny access
        # - DataLoader isn't in context (crashes in real execution)
        # - The field returns datetime but schema expects String

    # Testing with string matching on raw responses
    async def test_with_string():
        result = schema.execute_sync("{ user(id: 1) { name } }")
        assert "Alice" in str(result)  # Fragile, matches error messages too
  when_applies: Any GraphQL API that needs automated testing, especially APIs with permissions, DataLoaders, and validation
  sources:
    - "https://strawberry.rocks/docs/general/testing"
    - "https://fastapi.tiangolo.com/advanced/async-tests/"
    - "https://docs.pytest.org/en/stable/"

- id: GQL-013
  text: Evolve GraphQL schemas with additive changes only — use the @deprecated directive for field removal, never delete fields without a deprecation period. Treat the schema as a public API contract.
  why: >
    Unlike REST where you can version the entire API (/v1 vs /v2), GraphQL typically has a single evolving
    schema. Removing or renaming a field is a breaking change that immediately breaks every client using
    that field. The GraphQL spec includes a @deprecated directive specifically for this: it marks a field
    as deprecated with a reason, clients see a warning in their IDE, and tools like GraphQL Inspector can
    detect usage. The migration path is: (1) add new field, (2) deprecate old field with reason pointing
    to new field, (3) monitor old field usage, (4) remove old field only when usage reaches zero.
    GitHub's GraphQL API has fields deprecated for years that still work because some clients depend on them.
    Schema evolution must be additive — you can always add fields, types, and enum values; you should never
    remove or change existing ones without the deprecation lifecycle.
  how_to_do_right: |
    1. SAFE changes (no deprecation needed): add field, add type, add enum value, add optional argument
    2. BREAKING changes (require deprecation): remove field, rename field, change type, make nullable non-nullable
    3. Use @deprecated(reason: "Use newField instead") for fields being phased out
    4. Monitor deprecated field usage with Strawberry extensions or observability tools
    5. Set a deprecation timeline: minimum 3-6 months for external APIs
    6. Use schema diffing tools (graphql-inspector, rover) in CI to detect accidental breaking changes
    7. Never change the meaning of an existing field — add a new field instead
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
    library: [strawberry-graphql, graphql-inspector]
  domains:
    domain: [api_design, architecture]
    concern: [backend, graphql, versioning]
  example_good: |
    import strawberry

    @strawberry.type
    class User:
        id: strawberry.ID
        name: str
        email: str

        # v1: original field — being phased out
        @strawberry.field(
            deprecation_reason="Use 'fullName' instead. Will be removed 2026-09-01."
        )
        def display_name(self) -> str:
            return self._display_name

        # v2: new field with better semantics
        @strawberry.field
        def full_name(self) -> str:
            return f"{self._first_name} {self._last_name}"

        # v1: was a string, now we need structured data
        @strawberry.field(
            deprecation_reason="Use 'addressInfo' which returns structured AddressInfo type."
        )
        def address(self) -> str:
            return f"{self._street}, {self._city}"

        # v2: structured replacement
        @strawberry.field
        def address_info(self) -> "AddressInfo":
            return AddressInfo(
                street=self._street, city=self._city, country=self._country
            )

    # CI check: graphql-inspector diff old-schema.graphql new-schema.graphql
    # Output: Field 'User.displayName' was deprecated
    # Output: Field 'User.fullName' was added (non-breaking)
  example_bad: |
    # v1 schema (Monday)
    @strawberry.type
    class User:
        id: strawberry.ID
        name: str
        display_name: str  # Clients use this

    # v2 schema (Tuesday) — BREAKING CHANGE, no deprecation
    @strawberry.type
    class User:
        id: strawberry.ID
        name: str
        full_name: str  # Renamed without deprecation — every client breaks
        # display_name: DELETED — queries with display_name now return errors

    # Result: Every mobile app, web client, and integration that queries
    # display_name gets an error: "Cannot query field display_name on type User"
    # Users see broken apps until they update — which could be weeks for mobile
  when_applies: Any GraphQL API with external consumers, multiple client teams, or mobile apps that cannot be force-updated
  sources:
    - "https://spec.graphql.org/October2021/#sec--deprecated"
    - "https://the-guild.dev/graphql/inspector"
    - "https://www.apollographql.com/docs/graphos/delivery/schema-checks"
