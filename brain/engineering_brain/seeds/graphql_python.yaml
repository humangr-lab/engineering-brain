- id: GQL-008
  text: Use structured error handling with GraphQL error extensions — never raise raw Python exceptions from resolvers. Distinguish between client errors (validation, auth) and server errors (bugs, infrastructure). Client errors go in the errors array with extensions; server errors are masked.
  why: >
    GraphQL has a specific error format defined in the spec: { errors: [{ message, locations, path, extensions }] }.
    If you raise raw Python exceptions, the framework converts them to generic "Internal Server Error" messages
    (losing context) or leaks implementation details (stack traces, SQL queries, internal paths). Proper error
    handling distinguishes: (1) Client errors — the client did something wrong (invalid input, unauthorized,
    not found) — return in errors[] with a machine-readable error code in extensions; (2) Server errors — a bug
    or infrastructure failure — log with full details server-side, return a generic "Internal error" with a
    correlation ID to the client. Strawberry supports custom error types and error extensions natively.
  how_to_do_right: |
    1. Define custom exception classes with error codes: NotFoundError, AuthorizationError, ValidationError
    2. Use Strawberry's error handling to convert exceptions to GraphQL errors with extensions
    3. Include machine-readable error codes in extensions: { code: "NOT_FOUND", field: "user_id" }
    4. For mutations, prefer union return types (Success | Error) over exceptions for expected errors
    5. Mask server errors: replace internal exception messages with "Internal server error" + correlation ID
    6. Log full server errors with correlation ID for debugging
    7. Never expose stack traces, SQL queries, file paths, or internal service names to clients
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
    library: [strawberry-graphql]
  domains:
    domain: [api_design, security]
    concern: [backend, graphql, error_handling]
  example_good: |
    import strawberry
    import uuid
    import logging
    from enum import Enum

    logger = logging.getLogger(__name__)

    @strawberry.enum
    class ErrorCode(Enum):
        NOT_FOUND = "NOT_FOUND"
        UNAUTHORIZED = "UNAUTHORIZED"
        VALIDATION_ERROR = "VALIDATION_ERROR"
        INTERNAL_ERROR = "INTERNAL_ERROR"

    class GraphQLClientError(Exception):
        def __init__(self, message: str, code: ErrorCode, field: str | None = None):
            self.message = message
            self.extensions = {"code": code.value}
            if field:
                self.extensions["field"] = field
            super().__init__(message)

    def process_errors(errors, execution_context):
        processed = []
        for error in errors:
            original = error.original_error
            if isinstance(original, GraphQLClientError):
                processed.append(
                    strawberry.types.ExecutionError(
                        message=original.message,
                        path=error.path,
                        extensions=original.extensions,
                    )
                )
            elif original:
                correlation_id = str(uuid.uuid4())[:8]
                logger.error(
                    f"Internal error [{correlation_id}]: {original}",
                    exc_info=original,
                )
                processed.append(
                    strawberry.types.ExecutionError(
                        message=f"Internal server error (ref: {correlation_id})",
                        path=error.path,
                        extensions={"code": "INTERNAL_ERROR", "ref": correlation_id},
                    )
                )
            else:
                processed.append(error)
        return processed

    schema = strawberry.Schema(query=Query, process_errors=process_errors)
  example_bad: |
