layer: rules
domain: api_design
knowledge:
- id: GQL-001
  text: Use Strawberry for new Python 3.10+ GraphQL APIs — it is the only code-first framework with native type safety, dataclass integration, and active maintenance. Avoid Graphene (legacy, poor typing) and Ariadne (schema-first, loses Python type safety).
  why: >
    Strawberry leverages Python type hints and dataclasses to generate the GraphQL schema at runtime, meaning your
    Python types ARE the schema — no separate SDL files to keep in sync, no string-based resolver registration.
    Graphene (the historically dominant Python GraphQL library) uses a custom metaclass-based type system that
    predates Python 3.10 typing features, has poor IDE support, and its maintainer activity has slowed significantly.
    Ariadne is schema-first (you write SDL then bind resolvers), which is fine for JavaScript but loses the
    compile-time type safety that makes Python 3.10+ powerful. Strawberry supports ASGI natively, integrates with
    FastAPI/Django/Flask, has built-in federation support, and is the only Python GraphQL framework with first-class
    Pydantic v2 integration.
  how_to_do_right: |
    1. Install strawberry-graphql with your framework integration: pip install 'strawberry-graphql[fastapi]'
    2. Define types as Python dataclasses with strawberry.type decorator — they become GraphQL types automatically
    3. Use strawberry.input for input types (mutations), strawberry.enum for enums
    4. Define Query/Mutation/Subscription as decorated classes with resolver methods
    5. Use strawberry.Schema(query=Query, mutation=Mutation) to create the schema
    6. Mount on FastAPI with strawberry.fastapi.GraphQLRouter
    7. Use strawberry.experimental.pydantic to convert existing Pydantic models
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi, django]
    library: [strawberry-graphql]
  domains:
    domain: [api_design, architecture]
    concern: [backend, graphql]
  example_good: |
    import strawberry
    from strawberry.fastapi import GraphQLRouter
    from fastapi import FastAPI
    from datetime import datetime

    @strawberry.type
    class User:
        id: strawberry.ID
        name: str
        email: str
        created_at: datetime

    @strawberry.type
    class Query:
        @strawberry.field
        async def user(self, id: strawberry.ID) -> User | None:
            return await UserRepository.get_by_id(id)

        @strawberry.field
        async def users(self, limit: int = 10) -> list[User]:
            return await UserRepository.list(limit=limit)

    @strawberry.input
    class CreateUserInput:
        name: str
        email: str

    @strawberry.type
    class Mutation:
        @strawberry.mutation
        async def create_user(self, input: CreateUserInput) -> User:
            return await UserRepository.create(name=input.name, email=input.email)

    schema = strawberry.Schema(query=Query, mutation=Mutation)
    app = FastAPI()
    app.include_router(GraphQLRouter(schema), prefix="/graphql")
  example_bad: |
    # Graphene — custom metaclasses, no native type hints, poor IDE support
    import graphene

    class UserType(graphene.ObjectType):
        class Meta:
            interfaces = (graphene.relay.Node,)
        name = graphene.String()  # Not a real Python type hint
        email = graphene.String()

    class Query(graphene.ObjectType):
        user = graphene.Field(UserType, id=graphene.ID(required=True))

        def resolve_user(self, info, id):  # No type safety on return
            return get_user(id)  # Could return anything — no validation

    # Ariadne — schema-first, SDL string separate from Python code
    from ariadne import QueryType, make_executable_schema
    type_defs = """
        type User { id: ID!, name: String!, email: String! }
        type Query { user(id: ID!): User }
    """
    query = QueryType()

    @query.field("user")
    def resolve_user(_, info, id):  # No type hints, no validation
        return get_user(id)
  when_applies: Any new Python API project that needs GraphQL, especially with Python 3.10+ and FastAPI
  sources:
    - "https://strawberry.rocks/docs"
    - "https://strawberry.rocks/docs/integrations/fastapi"
    - "https://github.com/strawberry-graphql/strawberry"

- id: GQL-002
  text: Use the DataLoader pattern to eliminate N+1 queries in GraphQL resolvers. Every relationship resolver that hits a database or external service MUST use a DataLoader — batch multiple individual lookups into a single query per request cycle.
  why: >
    The N+1 problem is GraphQL's most critical performance pitfall. When a query requests a list of 50 users
    with their posts, a naive resolver calls get_posts(user_id) 50 times — 1 query for users + 50 queries for
    posts = 51 database round-trips. DataLoader solves this by collecting all requested keys within a single
    event loop tick, then executing one batched query: SELECT * FROM posts WHERE user_id IN (1,2,3,...,50).
    This reduces 51 queries to 2. DataLoader also caches within the request scope, so if the same user_id is
    resolved multiple times in one query, the database is only hit once. Without DataLoader, GraphQL APIs
    become unusably slow at any meaningful nesting depth. Facebook invented DataLoader specifically to solve
    this problem at scale.
  how_to_do_right: |
    1. Create a DataLoader for each relationship that hits a data source (DB, API, cache)
    2. The batch function receives a list of keys, returns results in the SAME ORDER as keys
    3. Create DataLoader instances per-request (not global) to scope the cache to the request lifecycle
    4. Pass DataLoaders via the GraphQL context (info.context) — Strawberry supports this natively
    5. For database: use IN queries (SELECT * FROM posts WHERE user_id = ANY($1))
    6. For external APIs: use batch endpoints or concurrent requests
    7. Always return results aligned with input keys — use a dict to map, then preserve order
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
    library: [strawberry-graphql, aiodataloader, sqlalchemy]
  domains:
    domain: [api_design, performance]
    concern: [backend, graphql, database]
  example_good: |
    import strawberry
    from strawberry.dataloader import DataLoader
    from sqlalchemy import select
    from typing import Optional

    # Batch function: receives list of user_ids, returns list of list[Post]
    async def load_posts_by_user(user_ids: list[int]) -> list[list["Post"]]:
        async with get_session() as session:
            result = await session.execute(
                select(PostModel).where(PostModel.user_id.in_(user_ids))
            )
            posts = result.scalars().all()
            # Group by user_id, preserving input order
            posts_by_user: dict[int, list[Post]] = {uid: [] for uid in user_ids}
            for post in posts:
                posts_by_user[post.user_id].append(Post.from_orm(post))
            return [posts_by_user[uid] for uid in user_ids]

    @strawberry.type
    class User:
        id: int
        name: str

        @strawberry.field
        async def posts(self, info: strawberry.types.Info) -> list["Post"]:
            return await info.context["post_loader"].load(self.id)

    @strawberry.type
    class Post:
        id: int
        title: str
        user_id: int

    # Create loaders per request via context_getter
    async def get_context():
        return {
            "post_loader": DataLoader(load_fn=load_posts_by_user),
        }

    schema = strawberry.Schema(query=Query)
    graphql_router = GraphQLRouter(schema, context_getter=get_context)
  example_bad: |
    @strawberry.type
    class User:
        id: int
        name: str

        @strawberry.field
        async def posts(self) -> list["Post"]:
            # N+1 PROBLEM: this runs once PER USER in the parent list
            # Query: { users { posts { title } } } with 100 users = 101 DB queries
            async with get_session() as session:
                result = await session.execute(
                    select(PostModel).where(PostModel.user_id == self.id)
                )
                return [Post.from_orm(p) for p in result.scalars().all()]
    # With 100 users: 1 query for users + 100 individual queries for posts
    # With 100 users each having comments: 1 + 100 + (100 * avg_posts) queries
    # Exponential degradation with nesting depth
  when_applies: Any GraphQL API with relationship resolvers that access databases, caches, or external services
  sources:
    - "https://strawberry.rocks/docs/guides/dataloaders"
    - "https://github.com/graphql/dataloader"
    - "https://engineering.fb.com/2015/09/14/core-infra/dataloader-source-code/"

- id: GQL-003
  text: Implement GraphQL subscriptions over WebSocket using the graphql-ws protocol (graphql-transport-ws). Never use the legacy subscriptions-transport-ws protocol — it is unmaintained and has known security issues.
  why: >
    GraphQL subscriptions enable real-time data push from server to client. The original subscriptions-transport-ws
    protocol (by Apollo) has been deprecated since 2021 and has known issues: no proper connection acknowledgment
    timeout, no ping/pong keepalive, and ambiguous close semantics. The newer graphql-ws protocol (graphql-transport-ws)
    is the community standard, supported by Strawberry, Apollo Client 3+, urql, and all modern GraphQL clients.
    It has proper lifecycle management (ConnectionInit -> ConnectionAck with timeout), built-in ping/pong,
    and clear error semantics. Strawberry has built-in support for both ASGI WebSocket and the graphql-ws
    subprotocol, making implementation straightforward.
  how_to_do_right: |
    1. Define subscription resolvers as async generators in Strawberry
    2. Use the graphql-transport-ws subprotocol (Strawberry default)
    3. Implement connection_init authentication — validate tokens before allowing subscriptions
    4. Use an async broadcast mechanism (Redis pub/sub, asyncio.Queue, or broadcast library)
    5. Handle client disconnection gracefully — clean up subscriptions and resources
    6. Set connection timeout for ConnectionInit (default 5 seconds in Strawberry)
    7. Implement keepalive ping/pong to detect stale connections
  severity: high
  technologies:
    lang: [python, javascript]
    framework: [fastapi]
    library: [strawberry-graphql, graphql-ws, broadcast]
  domains:
    domain: [api_design, realtime]
    concern: [backend, graphql, websocket]
  example_good: |
    import strawberry
    import asyncio
    from typing import AsyncGenerator
    from strawberry.fastapi import GraphQLRouter
    from strawberry.subscriptions import GRAPHQL_TRANSPORT_WS_PROTOCOL

    # In-memory pub/sub (use Redis pub/sub in production)
    class PubSub:
        def __init__(self):
            self._subscribers: dict[str, list[asyncio.Queue]] = {}

        async def subscribe(self, channel: str) -> AsyncGenerator[dict, None]:
            queue: asyncio.Queue = asyncio.Queue()
            self._subscribers.setdefault(channel, []).append(queue)
            try:
                while True:
                    data = await queue.get()
                    yield data
            finally:
                self._subscribers[channel].remove(queue)

        async def publish(self, channel: str, data: dict):
            for queue in self._subscribers.get(channel, []):
                await queue.put(data)

    pubsub = PubSub()

    @strawberry.type
    class Notification:
        message: str
        channel: str

    @strawberry.type
    class Subscription:
        @strawberry.subscription
        async def notifications(
            self, info: strawberry.types.Info, channel: str
        ) -> AsyncGenerator[Notification, None]:
            # Auth check via context
            user = info.context.get("user")
            if not user:
                raise PermissionError("Authentication required")
            async for data in pubsub.subscribe(channel):
                yield Notification(message=data["message"], channel=channel)

    schema = strawberry.Schema(
        query=Query,
        mutation=Mutation,
        subscription=Subscription,
    )
    graphql_router = GraphQLRouter(
        schema,
        subscription_protocols=[GRAPHQL_TRANSPORT_WS_PROTOCOL],
    )
  example_bad: |
    # Using legacy subscriptions-transport-ws — DEPRECATED, security issues
    # pip install graphql-ws  # Old package, not the new protocol
    from graphql_ws import GeventSubscriptionServer  # Legacy, blocking

    subscription_server = GeventSubscriptionServer(schema)

    @app.route("/subscriptions")
    def subscriptions():
        # No auth on connection, no timeout, no keepalive
        ws = get_websocket()
        subscription_server.handle(ws)
        return []

    # Problems:
    # 1. No ConnectionInit/ConnectionAck lifecycle
    # 2. No ping/pong keepalive — stale connections consume resources
    # 3. No connection timeout — unauthenticated WS stays open forever
    # 4. Uses gevent (blocking) instead of asyncio
    # 5. subscriptions-transport-ws protocol unmaintained since 2021
  when_applies: Any GraphQL API requiring real-time data push (notifications, live updates, streaming results)
  sources:
    - "https://strawberry.rocks/docs/general/subscriptions"
    - "https://github.com/enisdenjo/graphql-ws/blob/master/PROTOCOL.md"
    - "https://the-guild.dev/blog/graphql-over-websockets"

- id: GQL-004
  text: Enforce query complexity analysis and depth limiting on every GraphQL endpoint to prevent recursive query DoS attacks. Without these limits, a single malicious query can exhaust server CPU and memory in seconds.
  why: >
    GraphQL's flexibility is a double-edged sword: clients can construct arbitrarily deep and complex queries.
    A classic attack is a recursive query on circular relationships: { user { friends { friends { friends { ... } } } } }
    nested 10 levels deep. With 100 friends per user, this is 100^10 = 10^20 nodes to resolve — the server
    runs out of memory before completing. Even non-malicious clients can accidentally create expensive queries
    through deeply nested fragments. Unlike REST (where each endpoint has bounded cost), GraphQL queries have
    unbounded cost by default. Production GraphQL APIs MUST enforce: (1) maximum query depth, (2) maximum
    query complexity (weighted cost per field), and (3) rate limiting by complexity cost, not just request count.
    GitHub's GraphQL API, Shopify, and Yelp all enforce complexity limits.
  how_to_do_right: |
    1. Set max_depth to 10-15 (most legitimate queries are < 8 levels deep)
    2. Assign complexity weights to fields: scalar = 1, list = 10 * child_complexity, connection = 50
    3. Set max_complexity to 1000-5000 depending on your server capacity
    4. Use Strawberry extensions for validation: QueryDepthLimiter and custom complexity calculator
    5. Return clear error messages: "Query depth 12 exceeds maximum of 10"
    6. Log blocked queries for monitoring and tuning thresholds
    7. Rate limit by total complexity per time window, not just request count
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
    library: [strawberry-graphql]
  domains:
    domain: [api_design, security]
    concern: [backend, graphql, dos_prevention]
  example_good: |
    import strawberry
    from strawberry.extensions import QueryDepthLimiter
    from strawberry.schema import Schema
    from strawberry.extensions.base_extension import SchemaExtension
    from graphql import DocumentNode
    from graphql.language import FieldNode

    # Custom complexity calculator extension
    class QueryComplexityLimiter(SchemaExtension):
        MAX_COMPLEXITY = 2000

        def on_operation(self):
            query = self.execution_context.graphql_document
            complexity = self._calculate_complexity(query)
            if complexity > self.MAX_COMPLEXITY:
                raise ValueError(
                    f"Query complexity {complexity} exceeds maximum of {self.MAX_COMPLEXITY}"
                )
            yield

        def _calculate_complexity(self, document: DocumentNode) -> int:
            total = 0
            for definition in document.definitions:
                total += self._node_complexity(definition, depth=0)
            return total

        def _node_complexity(self, node, depth: int) -> int:
            cost = 0
            if hasattr(node, "selection_set") and node.selection_set:
                for selection in node.selection_set.selections:
                    if isinstance(selection, FieldNode):
                        field_cost = 10 if self._is_list_field(selection) else 1
                        cost += field_cost + self._node_complexity(selection, depth + 1)
            return cost

        def _is_list_field(self, node: FieldNode) -> bool:
            return node.name.value in {"friends", "posts", "comments", "edges"}

    schema = strawberry.Schema(
        query=Query,
        extensions=[
            QueryDepthLimiter(max_depth=10),
            QueryComplexityLimiter,
        ],
    )
  example_bad: |
    # No depth or complexity limits — vulnerable to query DoS
    schema = strawberry.Schema(query=Query)
    app.include_router(GraphQLRouter(schema), prefix="/graphql")

    # An attacker sends:
    # query {
    #   users {
    #     friends {
    #       friends {
    #         friends {
    #           friends {
    #             friends { name email posts { comments { author { friends { ... } } } } }
    #           }
    #         }
    #       }
    #     }
    #   }
    # }
    # Result: server OOM or 100% CPU for minutes
    # One query can take down the entire API
  when_applies: Any production GraphQL API exposed to external clients or untrusted internal clients
  sources:
    - "https://strawberry.rocks/docs/extensions/query-depth-limiter"
    - "https://www.howtographql.com/advanced/4-security/"
    - "https://docs.github.com/en/graphql/overview/resource-limitations"

- id: GQL-005
  text: Use persisted queries (APQ or static allowlist) for production GraphQL APIs to eliminate arbitrary query execution, reduce bandwidth, and improve security. Clients send a hash instead of the full query string.
  why: >
    In production, allowing arbitrary query strings has three problems: (1) Security — attackers can craft
    malicious queries even with complexity limits; (2) Bandwidth — large queries with fragments can be 5-50KB
    per request; (3) Caching — CDNs and reverse proxies can cache GET requests with query hashes but not
    arbitrary POST bodies. Persisted queries solve all three: the client sends a SHA-256 hash of the query,
    the server looks up the pre-registered query by hash. Automatic Persisted Queries (APQ) are a middle
    ground: the client sends the hash first; if the server does not recognize it, the client sends the full
    query once, and the server registers it. For maximum security, use a static allowlist: only pre-approved
    queries can execute (no ad-hoc queries in production). Shopify, GitHub, and most enterprise GraphQL
    deployments use persisted queries.
  how_to_do_right: |
    1. For APQ: enable automatic persisted queries on your GraphQL server and client
    2. The client generates SHA-256 hash of the query document and sends it in the extensions field
    3. Server checks its cache (Redis/in-memory) for the hash; if found, executes the cached query
    4. If not found: client sends full query + hash; server caches and executes
    5. For strict security: build a query allowlist at build time (extract all queries from client code)
    6. In production strict mode: reject any query not in the allowlist
    7. Use GET requests with query hash for CDN caching of read queries
  severity: high
  technologies:
    lang: [python, javascript]
    framework: [fastapi]
    library: [strawberry-graphql, redis]
  domains:
    domain: [api_design, security, performance]
    concern: [backend, graphql, caching]
  example_good: |
    import hashlib
    import strawberry
    from strawberry.extensions.base_extension import SchemaExtension

    class PersistedQueriesExtension(SchemaExtension):
        """Automatic Persisted Queries (APQ) with Redis backend."""

        def __init__(self, *, execution_context=None):
            super().__init__(execution_context=execution_context)

        def on_operation(self):
            request = self.execution_context
            extensions = request.extensions or {}
            persisted = extensions.get("persistedQuery", {})
            sha256_hash = persisted.get("sha256Hash")

            if sha256_hash:
                cached_query = redis_client.get(f"apq:{sha256_hash}")
                if cached_query and not request.query:
                    request.query = cached_query.decode()
                elif request.query:
                    computed_hash = hashlib.sha256(
                        request.query.encode()
                    ).hexdigest()
                    if computed_hash == sha256_hash:
                        redis_client.setex(
                            f"apq:{sha256_hash}", 86400, request.query
                        )
                    else:
                        raise ValueError("Hash mismatch")
                else:
                    raise ValueError("PersistedQueryNotFound")
            yield

    schema = strawberry.Schema(
        query=Query,
        extensions=[PersistedQueriesExtension],
    )
  example_bad: |
    # No persisted queries — every request sends full query text
    # POST /graphql
    # {
    #   "query": "query GetUserWithPosts($id: ID!) { user(id: $id) { id name email
    #     posts { id title body createdAt comments { id body author { name } } }
    #     followers { id name avatar } following { id name avatar }
    #   } }",
    #   "variables": { "id": "123" }
    # }
    # Problems:
    # 1. 500+ bytes of query text per request (multiply by millions of requests)
    # 2. Any client can send any query — no allowlist
    # 3. Cannot cache with CDN — POST body is opaque
    # 4. Attack surface: arbitrary queries bypass complexity analysis edge cases
  when_applies: Production GraphQL APIs with external clients, mobile apps, or high-traffic web apps
  sources:
    - "https://www.apollographql.com/docs/apollo-server/performance/apq/"
    - "https://relay.dev/docs/guides/persisted-queries/"

- id: GQL-006
  text: Use Strawberry Federation for GraphQL microservice composition — each service owns its subgraph and contributes types to the unified supergraph. Never build a monolithic GraphQL gateway that proxies to REST microservices.
  why: >
    Apollo Federation (and its open-source implementations) solves the fundamental problem of GraphQL in
    microservice architectures: how do you have a single unified schema when data is owned by different services?
    Without federation, teams build a monolithic gateway that manually stitches schemas — this becomes a
    bottleneck and single point of failure. With federation, each microservice defines its own subgraph
    (the types it owns), and a router/gateway automatically composes them into a supergraph. Strawberry has
    native federation support: you annotate types with @strawberry.federation.type and use federation
    directives (@key, @shareable, @external) to declare ownership and relationships. The key principle is
    separation of concerns: the Users service owns the User type, the Orders service extends User with orders.
  how_to_do_right: |
    1. Each microservice defines its own Strawberry schema with federation decorators
    2. Use @strawberry.federation.type(keys=["id"]) for entity types resolvable by other services
    3. Implement __resolve_reference class method for cross-service entity resolution
    4. Use @strawberry.federation.type(extend=True) to extend types owned by other services
    5. Deploy Apollo Router or graphql-mesh as the federation gateway
    6. Each subgraph publishes its schema to a registry (Apollo Studio or schema registry)
    7. The gateway composes subgraphs automatically — no manual stitching
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
    library: [strawberry-graphql, apollo-router]
  domains:
    domain: [api_design, architecture]
    concern: [backend, graphql, microservices]
  example_good: |
    # === Users Service (subgraph) ===
    import strawberry
    from strawberry.federation import Schema

    @strawberry.federation.type(keys=["id"])
    class User:
        id: strawberry.ID
        name: str
        email: str

        @classmethod
        async def resolve_reference(cls, id: strawberry.ID) -> "User":
            """Called by gateway when another service references this User."""
            user = await UserRepository.get_by_id(id)
            return cls(id=user.id, name=user.name, email=user.email)

    @strawberry.type
    class Query:
        @strawberry.field
        async def user(self, id: strawberry.ID) -> User | None:
            return await UserRepository.get_by_id(id)

    schema = Schema(query=Query, enable_federation_2=True)

    # === Orders Service (subgraph) — extends User ===
    @strawberry.federation.type(keys=["id"])
    class User:
        id: strawberry.ID = strawberry.federation.field(external=True)

        @strawberry.field
        async def orders(self, info: strawberry.types.Info) -> list["Order"]:
            return await OrderRepository.get_by_user_id(self.id)

    @strawberry.federation.type(keys=["id"])
    class Order:
        id: strawberry.ID
        total: float
        user: User
  example_bad: |
    # Monolithic gateway that manually proxies to REST microservices
    import httpx

    @strawberry.type
    class Query:
        @strawberry.field
        async def user(self, id: str) -> User:
            resp = await httpx.get(f"http://users-service/api/users/{id}")
            user_data = resp.json()
            resp2 = await httpx.get(f"http://orders-service/api/orders?user_id={id}")
            orders_data = resp2.json()
            # Manually stitching data — becomes unmaintainable at 10+ services
            return User(
                id=user_data["id"],
                name=user_data["name"],
                orders=[Order(**o) for o in orders_data],
            )
    # Problems:
    # 1. Gateway team becomes bottleneck for all schema changes
    # 2. No type safety between services — REST responses are untyped dicts
    # 3. Gateway duplicates business logic from each service
    # 4. Single point of failure — gateway owns all resolvers
  when_applies: GraphQL APIs spanning multiple microservices or teams, especially with 3+ services contributing to the schema
  sources:
    - "https://strawberry.rocks/docs/guides/federation"
    - "https://www.apollographql.com/docs/federation/"
    - "https://www.apollographql.com/docs/federation/federation-spec"

- id: GQL-007
  text: Use strawberry.input types with Pydantic integration for mutation input validation. Never validate inputs manually inside resolvers — use the type system to enforce constraints at the schema boundary.
  why: >
    GraphQL's type system validates structure (required fields, correct types) but not business constraints
    (email format, string length, numeric ranges). Without proper validation, invalid data passes through
    GraphQL's type check and fails deep inside business logic with cryptic errors. Strawberry's Pydantic
    integration lets you define validation rules as Pydantic validators that run BEFORE the resolver executes.
    This means: (1) invalid input never reaches your business logic, (2) error messages are structured and
    client-friendly, (3) validation rules are defined once in the type, not scattered across resolvers.
    The pattern is: Pydantic model defines validation, strawberry.experimental.pydantic converts it to a
    GraphQL input type.
  how_to_do_right: |
    1. Define Pydantic models with validators for all mutation inputs
    2. Use strawberry.experimental.pydantic.input to convert Pydantic models to GraphQL input types
    3. Call .to_pydantic() in the resolver to trigger validation
    4. Catch ValidationError and return structured GraphQL errors
    5. Use Pydantic's field validators for format (email, URL), range (min/max), and custom rules
    6. Define a union return type for mutations: Success | ValidationError for type-safe error handling
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
    library: [strawberry-graphql, pydantic]
  domains:
    domain: [api_design, validation]
    concern: [backend, graphql]
  example_good: |
    import strawberry
    from pydantic import BaseModel, field_validator, EmailStr
    from strawberry.experimental.pydantic import input as pydantic_input

    class CreateUserModel(BaseModel):
        name: str
        email: EmailStr

        @field_validator("name")
        @classmethod
        def name_must_be_reasonable(cls, v: str) -> str:
            if len(v.strip()) < 2:
                raise ValueError("Name must be at least 2 characters")
            if len(v) > 100:
                raise ValueError("Name must be at most 100 characters")
            return v.strip()

    @pydantic_input(model=CreateUserModel, all_fields=True)
    class CreateUserInput:
        pass

    @strawberry.type
    class ValidationFieldError:
        field: str
        message: str

    @strawberry.type
    class CreateUserSuccess:
        user: User

    @strawberry.type
    class CreateUserValidationError:
        errors: list[ValidationFieldError]

    CreateUserResult = strawberry.union(
        "CreateUserResult", [CreateUserSuccess, CreateUserValidationError]
    )

    @strawberry.type
    class Mutation:
        @strawberry.mutation
        async def create_user(self, input: CreateUserInput) -> CreateUserResult:
            try:
                validated = input.to_pydantic()
            except Exception as e:
                return CreateUserValidationError(
                    errors=[
                        ValidationFieldError(field=err["loc"][0], message=err["msg"])
                        for err in e.errors()
                    ]
                )
            user = await UserRepository.create(validated)
            return CreateUserSuccess(user=user)
