layer: rules
technology: CSS
domain: ui
knowledge:
- id: CR-CSS-SYNC-001
  text: CSS class names toggled by JavaScript must match exactly — cross-reference during development.
  why: JS toggles 'active' but CSS styles '.Active' (case mismatch) → style never applies. Silent failure — no error, just
    broken UI.
  how_to_do_right: Use constants for shared class names. Or use data-state attributes which are more explicit about JS-driven
    state.
  severity: high
  technologies:
    lang: [css, javascript, html]
  domains:
    domain: [architecture, ui]
    concern: [frontend, web]
  example_good: '/* CSS */ [data-state="active"] { background: #2ecc71; }

    // JS: element.dataset.state = ''active'';

    '
  example_bad: '/* CSS */ .Active { background: #2ecc71; }

    // JS: element.classList.add(''active'');  // Case mismatch!

    '
  when_applies: Projects using CSS styling and layout, JavaScript/TypeScript projects, or HTML document structure
  when_not_applies: headless services, APIs, CLIs, or backend-only systems
  sources: ["https://developer.mozilla.org/en-US/docs/Web/API/HTMLElement/dataset"]
- id: CR-CSS-SYNC-002
  text: Color values, spacing, and breakpoints must use CSS custom properties, not hardcoded values.
  why: 'Hardcoded #3498db in 15 places means 15 places to update when the brand color changes. Guaranteed inconsistency.'
  how_to_do_right: 'Define in :root { --primary: #3498db; }. Reference everywhere as var(--primary). Theme changes = one line
    change.'
  severity: medium
  technologies:
    lang: [css]
  domains:
    domain: [architecture, ui]
    concern: [frontend, design]
  example_good: ":root {\n    --primary: #3498db;\n    --danger: #e74c3c;\n    --spacing-md: 1rem;\n}\n.button { background:\
    \ var(--primary); padding: var(--spacing-md); }\n"
  example_bad: '.button { background: #3498db; padding: 16px; }

    .header { background: #3498db; padding: 16px; }  /* Duplicated! */

    '
  when_applies: Projects using CSS styling and layout
  when_not_applies: headless services, APIs, CLIs, or backend-only systems. projects not using CSS
  sources: ["https://developer.mozilla.org/en-US/docs/Web/CSS/Using_CSS_custom_properties"]
- id: CR-CSS-STATE-001
  text: Interactive elements must have visible state changes for hover, focus, active, and disabled.
  why: Users need visual feedback that elements are clickable, focused (accessibility), or disabled. Without it, they don't
    know what's interactive.
  how_to_do_right: Define :hover, :focus, :active, and [disabled] styles for all buttons and links. Use focus-visible for
    keyboard-only focus rings.
  severity: high
  technologies:
    lang: [css, html]
  domains:
    domain: [architecture, ui, quality]
    concern: [frontend, accessibility]
  example_good: '.btn { background: var(--primary); cursor: pointer; }

    .btn:hover { background: var(--primary-dark); }

    .btn:focus-visible { outline: 2px solid var(--focus-ring); }

    .btn:active { transform: scale(0.98); }

    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    '
  example_bad: |
    .btn { background: var(--primary); }
    /* No :hover, :focus, :active, or :disabled styles */
    /* Users cannot tell what is clickable or focused */
  when_applies: Projects using CSS styling and layout or HTML document structure
  when_not_applies: headless services, APIs, CLIs, or backend-only systems. projects not using CSS or HTML
  sources: ["https://developer.mozilla.org/en-US/docs/Web/CSS/:focus-visible"]
- id: CR-CSS-STATE-002
  text: Connection status must be visually indicated with color AND text — not color alone.
  why: Color-blind users (8% of men) cannot distinguish red/green. Color-only status violates WCAG accessibility guidelines.
  how_to_do_right: Use color + text label + optional icon. 'Connected' (green dot + text) vs 'Disconnected' (red dot + text).
  severity: high
  technologies:
    lang: [css, html]
  domains:
    domain: [architecture, ui, quality]
    concern: [frontend, accessibility]
  when_applies: Projects using CSS styling and layout or HTML document structure
  when_not_applies: headless services, APIs, CLIs, or backend-only systems. projects not using CSS or HTML
  example_good: |
    <span class="status status--online">
      <span class="status__dot"></span>
      Connected
    </span>
    <!-- Color AND text — accessible to color-blind users -->
  example_bad: |
    <span class="status" style="background: green;">
      <!-- No text label — color-blind users see nothing -->
    </span>
  sources: ["https://www.w3.org/WAI/WCAG21/Understanding/use-of-color.html"]
- id: CR-CSS-RESP-001
  text: Use relative units (rem, em, %, vh/vw) not fixed pixels for layout.
  why: Fixed pixel layouts break on different screen sizes, zoom levels, and when users change browser font size (accessibility).
  how_to_do_right: Use rem for fonts and spacing (respects user font size). Use % or fr for layout widths. Use min()/max()/clamp()
    for fluid typography.
  severity: medium
  technologies:
    lang: [css]
  domains:
    domain: [architecture, ui]
    concern: [frontend, responsive]
  when_applies: Projects using CSS styling and layout
  when_not_applies: headless services, APIs, CLIs, or backend-only systems. projects not using CSS
  example_good: |
    .container { max-width: 90%; margin: 0 auto; }
    .heading { font-size: clamp(1.5rem, 3vw, 2.5rem); }
    .card { padding: 1rem; gap: 0.75em; }
  example_bad: |
    .container { width: 960px; margin: 0 auto; }
    .heading { font-size: 32px; }
    .card { padding: 16px; gap: 12px; }
  sources: ["https://developer.mozilla.org/en-US/docs/Learn/CSS/CSS_layout/Responsive_Design"]
- id: CR-CSS-RESP-002
  text: 'Mobile-first: write base styles for small screens, add complexity with min-width media queries.'
  why: Desktop-first adds unnecessary CSS that mobile browsers download and parse. Mobile-first progressively enhances, which
    is simpler and faster.
  how_to_do_right: 'Base styles work on 320px. @media (min-width: 768px) adds tablet styles. @media (min-width: 1024px) adds
    desktop styles.'
  severity: low
  technologies:
    lang: [css]
  domains:
    domain: [architecture, ui, performance]
    concern: [frontend, responsive]
  when_applies: Projects using CSS styling and layout
  when_not_applies: headless services, APIs, CLIs, or backend-only systems. projects not using CSS
  example_good: |
    /* Base: mobile styles */
    .nav { flex-direction: column; }
    @media (min-width: 768px) {
      .nav { flex-direction: row; }
    }
  example_bad: |
    /* Desktop-first: adds overrides for mobile */
    .nav { flex-direction: row; }
    @media (max-width: 767px) {
      .nav { flex-direction: column; }
    }
  sources: ["https://developer.mozilla.org/en-US/docs/Web/CSS/CSS_media_queries/Using_media_queries"]
- id: CR-CSS-LAYOUT-001
  text: Use CSS Grid for 2D layouts and Flexbox for 1D layouts — not float hacks.
  why: Floats were never designed for layout — they cause collapsed containers, clearfix hacks, and unexpected behavior. Grid
    and Flexbox are designed for layout.
  how_to_do_right: 'Grid: 2D (rows AND columns), e.g., page layout, card grids. Flexbox: 1D (row OR column), e.g., navigation
    bars, form rows.'
  severity: low
  technologies:
    lang: [css]
  domains:
    domain: [architecture, ui]
    concern: [frontend]
  when_applies: Projects using CSS styling and layout
  when_not_applies: headless services, APIs, CLIs, or backend-only systems. projects not using CSS
  example_good: |
    /* Grid for 2D page layout */
    .page { display: grid; grid-template-columns: 250px 1fr; gap: 1rem; }
    /* Flexbox for 1D nav row */
    .nav { display: flex; gap: 1rem; align-items: center; }
  example_bad: |
    .page { overflow: hidden; }
    .sidebar { float: left; width: 250px; }
    .main { margin-left: 260px; }
    /* Requires clearfix hack, fragile layout */
  sources: ["https://developer.mozilla.org/en-US/docs/Web/CSS/CSS_grid_layout", "https://developer.mozilla.org/en-US/docs/Web/CSS/CSS_flexible_box_layout"]
- id: CR-CSS-SPEC-001
  text: Avoid !important — it breaks the cascade and makes styles impossible to override.
  why: '!important overrides everything, including inline styles. Once used, the only way to override it is more !important,
    creating an escalation war.'
  how_to_do_right: Increase specificity by being more specific in selector. Use CSS layers (@layer) for predictable ordering.
    Refactor if !important seems needed.
  severity: medium
  technologies:
    lang: [css]
  domains:
    domain: [architecture, ui]
    concern: [frontend]
  when_applies: Projects using CSS styling and layout
  when_not_applies: headless services, APIs, CLIs, or backend-only systems. projects not using CSS
  example_good: |
    .card { border-radius: 8px; }
    .card--featured { border: 2px solid var(--primary); }
    /* Specificity increased via more specific selector */
  example_bad: |
    .card { border-radius: 8px !important; }
    /* Now nothing can override border-radius without more !important */
  sources: ["https://developer.mozilla.org/en-US/docs/Web/CSS/Specificity", "https://developer.mozilla.org/en-US/docs/Web/CSS/@layer"]
- id: CR-CSS-SPEC-002
  text: CSS selectors should target classes and data attributes, not element types or IDs.
  why: Element selectors (div > p) break when HTML structure changes. ID selectors are too specific. Class selectors are the
    sweet spot for reusability and specificity.
  how_to_do_right: Use .component-name for styling. Use [data-state] for JS-driven states. Reserve IDs for JavaScript targeting
    only.
  severity: low
  technologies:
    lang: [css]
  domains:
    domain: [architecture, ui]
    concern: [frontend]
  when_applies: Projects using CSS styling and layout
  when_not_applies: headless services, APIs, CLIs, or backend-only systems. projects not using CSS
  example_good: |
    .card { padding: 1rem; }
    .card[data-state="active"] { border-color: var(--primary); }
    /* Class for styling, data-attribute for JS-driven state */
  example_bad: |
    #main-card > div > p { color: red; }
    /* Breaks if HTML structure changes; too specific */
  sources: ["https://developer.mozilla.org/en-US/docs/Web/CSS/CSS_selectors"]
- id: CR-CSS-ANIM-001
  text: Animations should use transform and opacity — not width, height, top, or left.
  why: transform and opacity are GPU-composited (smooth 60fps). width/height/top/left trigger layout recalculation (janky,
    battery-draining).
  how_to_do_right: 'Slide: transform: translateX(). Fade: opacity. Scale: transform: scale(). Use will-change sparingly on
    animated elements.'
  severity: low
  technologies:
    lang: [css]
  domains:
    domain: [architecture, ui, performance]
    concern: [frontend]
  when_applies: Projects using CSS styling and layout
  when_not_applies: headless services, APIs, CLIs, or backend-only systems. projects not using CSS
  example_good: |
    .drawer { transform: translateX(-100%); opacity: 0;
      transition: transform 0.3s ease, opacity 0.3s ease; }
    .drawer.open { transform: translateX(0); opacity: 1; }
  example_bad: |
    .drawer { left: -300px; transition: left 0.3s; }
    .drawer.open { left: 0; }
    /* 'left' triggers layout recalculation — janky animation */
  sources: ["https://developer.mozilla.org/en-US/docs/Web/CSS/CSS_animations/Using_CSS_animations", "https://web.dev/articles/animations-guide"]
- id: CR-CSS-FORM-001
  text: Every form input must have a visible, associated label.
  why: Inputs without labels are inaccessible to screen readers. Placeholder text disappears on focus, leaving users unsure
    what the field expects.
  how_to_do_right: Use <label for='input-id'>Label Text</label> with matching id. Or wrap input in label element. Placeholder
    supplements, never replaces, labels.
  severity: high
  technologies:
    lang: [css, html]
  domains:
    domain: [architecture, ui, quality]
    concern: [frontend, accessibility]
  example_good: '<label for="email">Email Address</label>

    <input type="email" id="email" placeholder="you@example.com">

    '
  example_bad: '<input type="email" placeholder="Email">  <!-- No label! -->

    '
  when_applies: Projects using CSS styling and layout or HTML document structure
  when_not_applies: headless services, APIs, CLIs, or backend-only systems. projects not using CSS or HTML
  sources: ["https://developer.mozilla.org/en-US/docs/Web/HTML/Element/label", "https://www.w3.org/WAI/tutorials/forms/labels/"]
- id: CR-CSS-MODAL-001
  text: Modals must trap focus, have a close mechanism, and prevent background scrolling.
  why: Without focus trap, keyboard users tab into hidden background content. Without close button, users get stuck. Background
    scrolling is disorienting.
  how_to_do_right: Use <dialog> element (native focus trap). Add close button AND Escape key handler. Set body overflow:hidden
    when modal opens.
  severity: medium
  technologies:
    lang: [css, html, javascript]
  domains:
    domain: [architecture, ui, quality]
    concern: [frontend, accessibility]
  when_applies: Projects using CSS styling and layout, HTML document structure, or JavaScript/TypeScript projects
  when_not_applies: headless services, APIs, CLIs, or backend-only systems
  example_good: |
    <dialog id="confirm-dialog">
      <h2>Confirm Action</h2>
      <button data-action="close">Close</button>
    </dialog>
    <!-- Native <dialog> traps focus automatically -->
  example_bad: |
    <div class="modal" style="display:block;">
      <div class="modal-body">Content</div>
    </div>
    <!-- No focus trap, no close on Escape, no scroll lock -->
  sources: ["https://developer.mozilla.org/en-US/docs/Web/HTML/Element/dialog", "https://www.w3.org/WAI/ARIA/apg/patterns/dialog-modal/"]
- id: CR-CSS-THEME-001
  text: >
    Build your design system using CSS custom properties at three layers: primitive tokens
    (--color-blue-500), semantic tokens (--color-primary), and component tokens
    (--button-bg). Semantic tokens reference primitives; components reference semantics.
    This three-layer architecture enables theming with a single file swap.
  why: >
    A flat list of CSS variables (--primary, --accent) couples theme semantics to color
    values — changing a shade requires updating every component. Three-layer tokens
    (primitive → semantic → component) decouple decisions: changing from blue to green
    primary requires ONE change at the semantic layer. Semantic tokens communicate intent
    (--color-danger vs --color-red-600) — a developer knows to use --color-danger for
    error states without knowing the current theme's red shade. This is how Figma's
    design tokens, Tailwind's theming, and major design systems (Material, Spectrum) work.
    A flat token system at scale becomes an unmaintainable spaghetti of redundant variables.
  how_to_do_right: |
    1. Layer 1 — Primitive tokens (raw values, rarely used directly in components):
       --color-blue-500: #3b82f6;
       --color-red-500: #ef4444;
       --space-4: 1rem;

    2. Layer 2 — Semantic tokens (reference primitives, use in components):
       --color-primary: var(--color-blue-500);
       --color-danger: var(--color-red-500);
       --space-component: var(--space-4);

    3. Layer 3 — Component tokens (reference semantics):
       --button-bg: var(--color-primary);
       --button-bg-hover: var(--color-primary-dark);

    4. Dark mode: override only semantic tokens in @media/[data-theme]
    5. Store tokens in tokens.css, import everywhere
  severity: high
  technologies:
    lang: [css]
  domains:
    domain: [architecture, ui]
    concern: [frontend, theming, design_system]
  example_good: |
    /* tokens.css — three layers */
    :root {
      /* Layer 1: Primitives */
      --color-blue-500: #3b82f6;
      --color-blue-600: #2563eb;
      --color-red-500: #ef4444;
      --color-gray-900: #111827;
      --color-white: #ffffff;
      --space-4: 1rem;

      /* Layer 2: Semantic (reference primitives) */
      --color-primary: var(--color-blue-500);
      --color-primary-hover: var(--color-blue-600);
      --color-danger: var(--color-red-500);
      --color-text: var(--color-gray-900);
      --color-surface: var(--color-white);
    }

    /* Dark theme: override ONLY semantics — no primitive changes needed */
    [data-theme="dark"] {
      --color-text: var(--color-white);
      --color-surface: var(--color-gray-900);
      /* --color-primary stays blue — same brand color */
    }

    /* Component uses semantic tokens */
    .btn-primary {
      background: var(--color-primary);
      color: var(--color-white);
    }
    .btn-primary:hover {
      background: var(--color-primary-hover);
    }
  example_bad: |
    /* Flat tokens — must update everywhere to change theme */
    :root {
      --primary: #3b82f6;     /* Mixed: is this semantic or primitive? */
      --btn-bg: #3b82f6;      /* Hardcoded color, not referencing semantic */
      --link-color: #3b82f6;  /* Same color, 3 separate variables */
    }
    /* Changing primary color: must update 3+ variables
       Dark mode: must override each component variable individually */
  when_applies: Projects using CSS styling with a design system or theming requirements
  when_not_applies: single-page tools with no theming requirements, headless backends
  sources:
    - "https://developer.mozilla.org/en-US/docs/Web/CSS/Using_CSS_custom_properties"
    - "https://www.w3.org/TR/design-tokens/"
    - "https://css-tricks.com/a-complete-guide-to-dark-mode-on-the-web/"
- id: CR-CSS-DARKMODE-001
  text: >
    Implement dark mode using both prefers-color-scheme (system preference) and a
    manual [data-theme] toggle — use the CSS light-dark() function (2024+) for
    simple two-value color declarations, and :root/@media for semantic token overrides.
    Never use JavaScript to inject inline styles for dark mode.
  why: >
    Dark mode has two requirements: respect system preference AND allow user override.
    prefers-color-scheme handles automatic switching; [data-theme] handles manual toggle.
    The CSS light-dark() function (baseline 2024, 86%+ browser support) eliminates
    the need to write duplicate @media blocks for every color: color: light-dark(#000,
    #fff) handles both modes in one line. JavaScript-injected inline styles for dark
    mode cause Flash of Incorrect Theme (FOIT), defeat CSS cascade, and cannot be
    overridden. Storing the user's theme preference in localStorage and applying it
    synchronously before first paint avoids FOIT.
  how_to_do_right: |
    1. Set color-scheme property: :root { color-scheme: light dark; }
    2. Use light-dark() for simple two-value properties:
       color: light-dark(#111, #eee);
    3. Use @media (prefers-color-scheme: dark) for semantic token overrides
    4. Add [data-theme="dark"] with same overrides as @media block for manual toggle
    5. Manual toggle JS: document.documentElement.dataset.theme = 'dark'
    6. Persist preference: localStorage.setItem('theme', 'dark')
    7. Avoid FOIT: apply theme synchronously in <head> before body renders
    8. Both @media AND [data-theme] must override the same variables
  severity: medium
  technologies:
    lang: [css, javascript, html]
  domains:
    domain: [architecture, ui]
    concern: [frontend, dark_mode, accessibility]
  example_good: |
    /* Base: define color-scheme for browser chrome */
    :root {
      color-scheme: light dark;

      /* Semantic tokens with dark mode via light-dark() */
      --color-text: light-dark(#111827, #f9fafb);
      --color-surface: light-dark(#ffffff, #111827);
      --color-border: light-dark(#e5e7eb, #374151);
    }

    /* Manual override for [data-theme] toggle */
    [data-theme="dark"] {
      color-scheme: dark;
      --color-text: #f9fafb;
      --color-surface: #111827;
      --color-border: #374151;
    }

    body {
      background: var(--color-surface);
      color: var(--color-text);
    }

    /* JS toggle — synchronous to avoid FOIT */
    // In <head> (before body):
    // const saved = localStorage.getItem('theme');
    // if (saved) document.documentElement.dataset.theme = saved;

    // Toggle button:
    // btn.addEventListener('click', () => {
    //   const dark = document.documentElement.dataset.theme === 'dark';
    //   document.documentElement.dataset.theme = dark ? 'light' : 'dark';
    //   localStorage.setItem('theme', dark ? 'light' : 'dark');
    // });
  example_bad: |
    /* Only system preference — no manual toggle */
    @media (prefers-color-scheme: dark) {
      body { background: #111; color: #eee; }
      .card { background: #222; }  /* Hundreds of rules per component */
    }

    /* Or: JavaScript inline styles — defeats CSS cascade */
    document.body.style.backgroundColor = isDark ? '#111' : '#fff';
    document.body.style.color = isDark ? '#eee' : '#111';
    // Cannot override with CSS, causes FOIT, no cascade priority
  when_applies: Projects using CSS with multi-theme or dark/light mode requirements
  when_not_applies: internal tools with no UX polish requirements, headless backends
  sources:
    - "https://developer.mozilla.org/en-US/docs/Web/CSS/color_value/light-dark"
    - "https://12daysofweb.dev/2024/css-light-dark/"
    - "https://css-tricks.com/a-complete-guide-to-dark-mode-on-the-web/"
- id: CR-CSS-CONTAINER-001
  text: >
    Use CSS Container Queries instead of media queries for component-level responsive
    design — components should respond to their container's size, not the viewport size.
    A card that's in a narrow sidebar should reflow differently than the same card
    in a full-width grid, even on the same screen size.
  why: >
    Media queries respond to the viewport, not the component's available space. A card
    component in a 300px sidebar column needs different layout than the same card in a
    900px main content area — but both exist on the same 1440px viewport. Without
    container queries, you must use different card variants or JavaScript to measure
    parent width. Container queries (baseline 2023, 90%+ support) solve this: the
    component reflows based on its container's inline size, making it truly reusable
    across any layout context. This eliminates the "works on desktop, broken in sidebar"
    problem.
  how_to_do_right: |
    1. Mark the container: .container { container-type: inline-size; }
       Optional: container-name: card-container; for named queries
    2. Write component queries:
       @container (min-width: 400px) { .card { flex-direction: row; } }
    3. For named containers: @container card-container (min-width: 400px) { ... }
    4. Use cqi units (container query inline units) for typography:
       font-size: clamp(1rem, 2cqi, 1.5rem);
    5. Nest containers — inner containers respond to their own parent
    6. Fallback: @supports not (container-type: inline-size) { /* old layout */ }
  severity: medium
  technologies:
    lang: [css]
  domains:
    domain: [architecture, ui]
    concern: [frontend, responsive, components]
  example_good: |
    /* Container setup */
    .card-wrapper {
      container-type: inline-size; /* Enable container queries */
      container-name: card;
    }

    /* Default: stacked (narrow containers) */
    .card {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    /* When container is wide: horizontal layout */
    @container card (min-width: 400px) {
      .card {
        flex-direction: row;
        align-items: center;
      }
      .card__image {
        width: 200px;
        flex-shrink: 0;
      }
    }

    /* Font scales with container, not viewport */
    @container card (min-width: 600px) {
      .card__title {
        font-size: clamp(1.25rem, 2cqi, 2rem);
      }
    }
  example_bad: |
    /* Media query — responds to viewport, not component context */
    @media (min-width: 768px) {
      .card {
        flex-direction: row;
      }
    }
    /* Problem: card in a 250px sidebar at 1440px viewport
       → viewport is 1440px (above 768px threshold)
       → card gets row layout despite only having 250px available
       → layout breaks in sidebar context */
  when_applies: Reusable components placed in variable-width layout contexts
  when_not_applies: full-page layouts, components always rendered at full viewport width
  sources:
    - "https://developer.mozilla.org/en-US/docs/Web/CSS/CSS_containment/Container_queries"
    - "https://web.dev/articles/cq-stable"
- id: CR-CSS-VIEWTRANS-001
  text: >
    Use the View Transitions API for page and element transitions — this enables
    smooth cross-document animations with zero JavaScript animation code. Use
    view-transition-name to animate specific elements across navigations.
  why: >
    Page transitions improve perceived performance and navigation clarity. Traditionally,
    implementing them required complex JavaScript, requestAnimationFrame, and managing
    animation state across page loads. The View Transitions API (Chrome 111+, Safari 18,
    baseline ~2024) handles this natively: document.startViewTransition() captures
    the old state, updates the DOM, then animates the transition. For cross-document
    transitions (MPA), a single meta tag enables them. Named elements (view-transition-name)
    animate from their old position to new position with smooth morph — the "magic move"
    effect that previously required JavaScript state tracking.
  how_to_do_right: |
    1. Single-page: wrap DOM updates in document.startViewTransition(() => updateDOM())
    2. Cross-document MPA: add <meta name="view-transition" content="same-origin"> to <head>
    3. Customize animations with ::view-transition-old and ::view-transition-new pseudo-elements
    4. Named element transitions: view-transition-name: hero-image (unique per page)
    5. Graceful degradation: check 'startViewTransition' in document before using
    6. Reduce motion: @media (prefers-reduced-motion) { ::view-transition-* { animation: none; } }
  severity: low
  technologies:
    lang: [css, javascript, html]
  domains:
    domain: [ui, performance]
    concern: [frontend, animation, navigation]
  example_good: |
    /* CSS: customize transition animations */
    ::view-transition-old(root) {
      animation: fade-out 0.3s ease forwards;
    }
    ::view-transition-new(root) {
      animation: fade-in 0.3s ease forwards;
    }

    /* Named element: smooth hero image morph across pages */
    .hero-image {
      view-transition-name: hero-image; /* Unique per page */
    }

    /* Respect reduced motion */
    @media (prefers-reduced-motion: reduce) {
      ::view-transition-old(*),
      ::view-transition-new(*) {
        animation: none;
      }
    }

    // JavaScript: wrap state updates in startViewTransition
    async function navigateTo(newContent) {
      if (!document.startViewTransition) {
        // Graceful fallback for unsupported browsers
        updateContent(newContent);
        return;
      }
      await document.startViewTransition(() => updateContent(newContent));
    }
  example_bad: |
    // Manual animation — complex, brittle, hard to sync with DOM updates
    async function navigateTo(url) {
      await fadeOut(document.body, 300);
      const html = await fetch(url).then(r => r.text());
      document.body.innerHTML = parseBodyContent(html);
      await fadeIn(document.body, 300);
      // 50 lines of animation code for what startViewTransition does in 3
      // Cannot morph specific elements across pages without complex state tracking
    }
  when_applies: Multi-page or single-page apps where navigation UX matters
  when_not_applies: headless services, APIs, highly interactive apps where transitions distract
  sources:
    - "https://developer.mozilla.org/en-US/docs/Web/API/View_Transitions_API"
    - "https://web.dev/articles/view-transitions"
- id: CR-CSS-SCROLLANIM-001
  text: >
    Use CSS Scroll-driven animations with animation-timeline: scroll() or view() to
    create scroll-linked effects without JavaScript scroll event listeners — this runs
    on the compositor thread and cannot cause jank.
  why: >
    JavaScript scroll handlers run on the main thread, can be blocked by other JS,
    and cause layout thrashing when they read offsetTop (forced synchronous layout).
    CSS scroll-driven animations run entirely on the compositor thread — they cannot
    cause main thread jank, never trigger layout, and perform at native 60-120fps
    regardless of JavaScript load. The scroll() timeline links animation progress to
    scroll position; view() links to an element's visibility in the viewport.
    Common patterns (sticky header fade, scroll progress indicator, parallax)
    that previously required 50 lines of JS now take 5 lines of CSS (Chrome 115+,
    baseline 2024).
  how_to_do_right: |
    1. scroll() timeline: animation progress = scroll position / scrollable distance
       @keyframes fade { from { opacity: 0 } to { opacity: 1 } }
       .element { animation: fade linear; animation-timeline: scroll(); }
    2. view() timeline: progress = element's visibility in the viewport
       .card { animation: slide-in linear; animation-timeline: view(); }
    3. animation-range: restrict when animation plays
       animation-range: entry 0% exit 100%; (from entering to leaving viewport)
    4. Scroll progress indicator: width: 0% to 100% over scroll() timeline
    5. Fallback: @supports not (animation-timeline: scroll()) { /* JS fallback */ }
  severity: low
  technologies:
    lang: [css]
  domains:
    domain: [ui, performance]
    concern: [frontend, animation, scroll]
  example_good: |
    /* Scroll progress indicator — no JavaScript needed */
    @keyframes grow-progress {
      from { width: 0%; }
      to { width: 100%; }
    }

    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      height: 4px;
      background: var(--color-primary);
      animation: grow-progress linear;
      animation-timeline: scroll(root);  /* Linked to page scroll */
    }

    /* Fade in cards as they enter viewport */
    @keyframes card-enter {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card {
      animation: card-enter ease-out;
      animation-timeline: view();  /* Plays when card enters viewport */
      animation-range: entry 0% entry 50%;  /* First half of entry */
    }

    /* Fallback for unsupported browsers */
    @supports not (animation-timeline: scroll()) {
      .card { opacity: 1; transform: none; }
    }
  example_bad: |
    // JavaScript scroll handler — runs on main thread, causes jank
    window.addEventListener('scroll', () => {
      const scrolled = window.scrollY;
      const maxScroll = document.body.scrollHeight - window.innerHeight;
      const progress = (scrolled / maxScroll) * 100;
      progressBar.style.width = `${progress}%`;
      // Reads scrollY + sets width → potential layout thrashing
      // Runs on main thread → can be delayed by JS work
    });
  when_applies: Projects with scroll-linked visual effects, parallax, or reveal animations
  when_not_applies: headless backends, apps where animation is irrelevant
  sources:
    - "https://developer.mozilla.org/en-US/docs/Web/CSS/animation-timeline"
    - "https://developer.chrome.com/docs/css-ui/scroll-driven-animations"
