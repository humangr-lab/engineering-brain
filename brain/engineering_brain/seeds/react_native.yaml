- id: CR-RN-010
  text: Use TanStack Query for server state and Zustand for client state — avoid mixing concerns in one store
  why: 'Server state (API data) and client state (UI toggles, form inputs) have fundamentally different lifecycle requirements.
    Server state needs caching, background refetching, optimistic updates, and stale-while-revalidate strategies. Client state
    needs synchronous updates and local persistence. Putting both in Redux/Context creates a monolithic store where API cache
    invalidation logic tangles with UI state, leading to stale data bugs, unnecessary re-renders, and 2-3x the boilerplate
    code. TanStack Query handles server state with built-in caching/dedup/retry. Zustand handles client state with minimal
    boilerplate and no provider wrapping.

    '
  how_to_do_right: '1. TanStack Query for ALL server state: API calls, paginated lists, mutations

    2. Zustand for client-only state: theme, onboarding progress, UI preferences

    3. MMKV (not AsyncStorage) for Zustand persistence — 30x faster

    4. Never duplicate server data in Zustand — query cache is the source of truth

    5. Use queryClient.invalidateQueries() after mutations, not manual state updates

    6. Configure staleTime per query type (user profile: 5min, feed: 30sec)

    '
  severity: high
  technologies:
    framework: [mobile, react_native, state, tanstack_query, zustand]
    library: [mmkv]
  domains:
    domain: [architecture, mobile]
    concern: [state_management]
  example_good: "// stores/useAppStore.ts — Zustand for client state only\nimport { create } from 'zustand';\nimport { persist,\
    \ createJSONStorage } from 'zustand/middleware';\nimport { MMKV } from 'react-native-mmkv';\n\nconst storage = new MMKV();\n\
    const mmkvStorage = {\n  getItem: (key: string) => storage.getString(key) ?? null,\n  setItem: (key: string, value: string)\
    \ => storage.set(key, value),\n  removeItem: (key: string) => storage.delete(key),\n};\n\ninterface AppStore {\n  theme:\
    \ 'light' | 'dark';\n  hasSeenOnboarding: boolean;\n  setTheme: (theme: 'light' | 'dark') => void;\n  completeOnboarding:\
    \ () => void;\n}\n\nexport const useAppStore = create<AppStore>()(\n  persist(\n    (set) => ({\n      theme: 'light',\n\
    \      hasSeenOnboarding: false,\n      setTheme: (theme) => set({ theme }),\n      completeOnboarding: () => set({ hasSeenOnboarding:\
    \ true }),\n    }),\n    { name: 'app-store', storage: createJSONStorage(() => mmkvStorage) }\n  )\n);\n\n// hooks/useUser.ts\
    \ — TanStack Query for server state\nimport { useQuery, useMutation, useQueryClient } from '@tanstack/react-query';\n\n\
    export function useUser(userId: string) {\n  return useQuery({\n    queryKey: ['user', userId],\n    queryFn: () => api.getUser(userId),\n\
    \    staleTime: 5 * 60 * 1000, // 5 minutes\n  });\n}\n\nexport function useUpdateUser() {\n  const queryClient = useQueryClient();\n\
    \  return useMutation({\n    mutationFn: api.updateUser,\n    onSuccess: (data) => {\n      queryClient.invalidateQueries({\
    \ queryKey: ['user', data.id] });\n    },\n  });\n}\n"
  example_bad: "// Giant Redux store mixing server and client state\nconst rootReducer = combineReducers({\n  user: userReducer,\
    \          // server state — needs caching logic\n  posts: postsReducer,        // server state — needs pagination\n \
    \ theme: themeReducer,        // client state\n  onboarding: onboardReducer, // client state\n});\n\n// Manual caching\
    \ attempt — buggy and incomplete\nfunction userReducer(state, action) {\n  switch (action.type) {\n    case 'FETCH_USER_SUCCESS':\n\
    \      return { ...state, data: action.payload, lastFetched: Date.now() };\n    case 'FETCH_USER_STALE':\n      // Do\
    \ we refetch? When? What about race conditions?\n      break;\n  }\n}\n\n// 50 lines of thunk for what TanStack Query\
    \ does in 5\nexport const fetchUser = (id) => async (dispatch) => {\n  dispatch({ type: 'FETCH_USER_START' });\n  try\
    \ {\n    const data = await api.getUser(id);\n    dispatch({ type: 'FETCH_USER_SUCCESS', payload: data });\n  } catch\
    \ (err) {\n    dispatch({ type: 'FETCH_USER_ERROR', payload: err });\n  }\n};\n"
  when_applies: Projects using React Native, TanStack Query, Zustand, or MMKV
  when_not_applies: web-only applications, backend services, desktop applications
  sources: ["https://reactnative.dev/docs/security"]
- id: CR-RN-011
  text: Use MMKV instead of AsyncStorage for fast synchronous key-value persistence
  why: 'AsyncStorage is asynchronous, JSON-serialized, and on Android uses SQLite under the hood with a 6MB default limit.
    Every read requires an async bridge call, making it unusable for synchronous access patterns like reading auth tokens
    on app boot or storing navigation state. MMKV (from WeChat, 1B+ users) is memory-mapped, synchronous, 30x faster, handles
    10k read/write operations per second, and supports encryption. For anything beyond trivial preferences, AsyncStorage becomes
    a performance bottleneck.

    '
  how_to_do_right: '1. Install react-native-mmkv

    2. Create typed storage instances per domain (auth, settings, cache)

    3. Use encryption for sensitive data (MMKV supports AES)

    4. Migrate existing AsyncStorage data on first app launch after migration

    5. Use MMKV as Zustand persist storage backend

    6. Never store large blobs (>1MB) — use file system instead

    '
  severity: medium
  technologies:
    framework: [mobile, react_native]
    library: [mmkv]
  domains:
    domain: [architecture, mobile, infrastructure, performance]
    concern: [storage]
  example_good: "import { MMKV } from 'react-native-mmkv';\n\n// Separate instances per domain\nconst authStorage = new MMKV({\
    \ id: 'auth', encryptionKey: 'your-key' });\nconst settingsStorage = new MMKV({ id: 'settings' });\nconst cacheStorage\
    \ = new MMKV({ id: 'cache' });\n\n// Type-safe wrapper\nconst Auth = {\n  getToken: (): string | undefined => authStorage.getString('access_token'),\n\
    \  setToken: (token: string) => authStorage.set('access_token', token),\n  clearAll: () => authStorage.clearAll(),\n};\n\
    \n// Synchronous — no await needed\nfunction getAuthHeaders(): Record<string, string> {\n  const token = Auth.getToken();\n\
    \  return token ? { Authorization: `Bearer ${token}` } : {};\n}\n\n// Migration from AsyncStorage (run once)\nasync function\
    \ migrateFromAsyncStorage() {\n  const hasMigrated = settingsStorage.getBoolean('migrated');\n  if (hasMigrated) return;\n\
    \n  const keys = await AsyncStorage.getAllKeys();\n  for (const key of keys) {\n    const value = await AsyncStorage.getItem(key);\n\
    \    if (value) settingsStorage.set(key, value);\n  }\n  settingsStorage.set('migrated', true);\n}\n"
  example_bad: "import AsyncStorage from '@react-native-async-storage/async-storage';\n\n// Every read is async — can't use\
    \ in synchronous contexts\nasync function getAuthHeaders() {\n  const token = await AsyncStorage.getItem('access_token');\
    \ // bridge round-trip\n  return token ? { Authorization: `Bearer ${token}` } : {};\n}\n\n// Race condition: two rapid\
    \ writes can interleave\nawait AsyncStorage.setItem('count', '1');\nawait AsyncStorage.setItem('count', '2');\n// Under\
    \ load, these can arrive out of order\n\n// JSON serialization overhead for every operation\nawait AsyncStorage.setItem('user',\
    \ JSON.stringify(bigUserObject));\nconst user = JSON.parse(await AsyncStorage.getItem('user'));\n"
  when_applies: Projects using React Native or MMKV
  when_not_applies: web-only applications, backend services, desktop applications. projects not using React Native or MMKV
  sources: ["https://reactnative.dev/docs/accessibilityinfo"]
- id: CR-RN-012
  text: Use React Context only for truly global, rarely-changing values — never for frequently updated state
  why: 'React Context triggers a re-render of EVERY consumer whenever the context value changes, regardless of whether the
    specific consumer uses the changed property. In a deep component tree, a single context update (e.g., updating a cart
    count) re-renders hundreds of components including those that only read the theme or locale. This is the #1 performance
    mistake in React Native apps. Context is perfect for theme, locale, and auth status that change at most a few times per
    session. For anything that updates on user interaction, use Zustand or TanStack Query.

    '
  how_to_do_right: '1. Context ONLY for: theme, locale, auth status, feature flags

    2. Split contexts by update frequency — ThemeContext separate from UserContext

    3. Never put arrays/objects directly in context value — useMemo the value

    4. For "global" state that updates often, use Zustand (no provider, no re-render cascade)

    5. Measure with React DevTools Profiler — look for "Context" in re-render reasons

    6. If you see Context causing re-renders, it''s a sign to move that state to Zustand

    '
  severity: high
  technologies:
    framework: [mobile, react_native, frontend, react]
  domains:
    domain: [architecture, mobile, performance]
    concern: [state_management]
  example_good: "// Good: Context for theme (changes ~0 times per session)\nconst ThemeContext = createContext<Theme>(lightTheme);\n\
    \nfunction ThemeProvider({ children }: PropsWithChildren) {\n  const theme = useAppStore((s) => s.theme); // Zustand selector\n\
    \  // useMemo prevents new object reference on parent re-render\n  const value = useMemo(() => themes[theme], [theme]);\n\
    \  return (\n    <ThemeContext.Provider value={value}>\n      {children}\n    </ThemeContext.Provider>\n  );\n}\n\n//\
    \ Good: Zustand for cart (changes on every \"Add to Cart\" tap)\nconst useCartStore = create<CartStore>((set) => ({\n\
    \  items: [],\n  addItem: (item) => set((s) => ({ items: [...s.items, item] })),\n  itemCount: 0,\n}));\n\n// Only re-renders\
    \ when itemCount changes, not when items array changes\nfunction CartBadge() {\n  const count = useCartStore((s) => s.items.length);\n\
    \  return <Badge count={count} />;\n}\n"
  example_bad: "// Anti-pattern: frequently updated state in Context\nconst AppContext = createContext({});\n\nfunction AppProvider({\
    \ children }) {\n  const [cart, setCart] = useState([]);\n  const [notifications, setNotifications] = useState([]);\n\
    \  const [theme, setTheme] = useState('light');\n\n  // Every cart/notification update re-renders ALL consumers\n  return\
    \ (\n    <AppContext.Provider value={{\n      cart, setCart,             // updates every \"Add to Cart\"\n      notifications,\
    \ setNotifications, // updates every few seconds\n      theme, setTheme,          // changes rarely\n    }}>\n      {children}\n\
    \    </AppContext.Provider>\n  );\n}\n\n// This component only uses theme but re-renders on every cart change\nfunction\
    \ Header() {\n  const { theme } = useContext(AppContext); // triggers on ANY context change\n  return <View style={{ backgroundColor:\
    \ themes[theme].bg }} />;\n}\n"
  when_applies: Projects using React Native or React component-based UIs
  when_not_applies: web-only applications, backend services, desktop applications. projects not using React Native or React
  sources: ["https://reactnative.dev/docs/appstate"]
- id: CR-RN-013
  text: Use TurboModules with Codegen for type-safe, synchronous native module access
  why: 'Legacy NativeModules are untyped, always asynchronous, and discovered at app startup (adding to launch time even if
    unused). TurboModules are lazy-loaded (only initialized when first accessed), type-safe via Codegen (TypeScript spec generates
    C++/ObjC/Java bindings), and support synchronous calls via JSI. A large app with 20+ native modules saves 100-300ms on
    cold start from lazy loading alone. Codegen catches type mismatches at build time instead of runtime crashes in production.

    '
  how_to_do_right: '1. Write TypeScript spec in src/specs/Native*.ts extending TurboModule

    2. Run codegen: npx react-native codegen (generates C++/ObjC/Java)

    3. Implement generated interface in native code

    4. Access via TurboModuleRegistry.getEnforcing<Spec>(''ModuleName'')

    5. Use synchronous methods for small data, async for heavy operations

    6. Test on both platforms — some methods may need platform-specific implementations

    '
  severity: medium
  technologies:
    framework: [mobile, react_native]
    library: [turbomodules, jsi]
  domains:
    domain: [architecture, mobile]
    concern: [native-integration]
  example_good: "// src/specs/NativeSecureStorage.ts\nimport type { TurboModule } from 'react-native';\nimport { TurboModuleRegistry\
    \ } from 'react-native';\n\nexport interface Spec extends TurboModule {\n  // Sync: read from Keychain/Keystore instantly\n\
    \  getString(key: string): string | null;\n  setString(key: string, value: string): boolean;\n  deleteItem(key: string):\
    \ boolean;\n\n  // Async: biometric prompt requires user interaction\n  getWithBiometric(key: string): Promise<string\
    \ | null>;\n}\n\nexport default TurboModuleRegistry.getEnforcing<Spec>('SecureStorage');\n\n// Usage\nimport SecureStorage\
    \ from './specs/NativeSecureStorage';\n\n// Synchronous — no bridge overhead\nconst token = SecureStorage.getString('auth_token');\n\
    SecureStorage.setString('auth_token', newToken);\n\n// Async only when truly needed\nconst secret = await SecureStorage.getWithBiometric('wallet_key');\n"
  example_bad: '// Legacy NativeModules — always async, untyped, loaded at startup

    import { NativeModules } from ''react-native'';


    const { SecureStorage } = NativeModules;


    // Forced async even for reading a small string

    const token = await SecureStorage.getString(''auth_token'');


    // No type safety — this typo only crashes at runtime

    const token2 = await SecureStorage.getStrng(''auth_token'');

    // TypeError: SecureStorage.getStrng is not a function


    // Every native module loaded eagerly at app start

    // Even if only used in one obscure settings screen

    '
  when_applies: Projects using React Native, TurboModules, or JSI
  when_not_applies: web-only applications, backend services, desktop applications
  sources: ["https://reactnative.dev/docs/image"]
- id: CR-RN-014
  text: Use platform-specific file extensions (.ios.tsx/.android.tsx) for divergent native behavior
  why: 'iOS and Android have fundamentally different UX patterns (e.g., date pickers, share sheets, permissions dialogs, haptic
    feedback). Wrapping platform checks in if(Platform.OS === ''ios'') blocks pollutes components with conditional logic,
    increases bundle size on both platforms (dead code is still bundled), and makes testing harder. React Native''s module
    resolution automatically picks .ios.tsx or .android.tsx files, keeping platform logic isolated and each platform''s bundle
    clean.

    '
  how_to_do_right: '1. Create ComponentName.ios.tsx and ComponentName.android.tsx in same directory

    2. Import as ComponentName — Metro resolves the correct platform file

    3. Keep the public interface (props) identical across platforms

    4. Use .tsx for shared code, .ios.tsx/.android.tsx only where behavior truly differs

    5. Create an index.ts that re-exports (for IDE autocompletion)

    6. Test both platforms in CI — platform files can drift

    '
  severity: medium
  technologies:
    framework: [mobile, react_native]
  domains:
    domain: [architecture, mobile]
  example_good: "// components/DatePicker/DatePicker.ios.tsx\nimport DateTimePicker from '@react-native-community/datetimepicker';\n\
    \nexport function DatePicker({ value, onChange }: DatePickerProps) {\n  return (\n    <DateTimePicker\n      value={value}\n\
    \      mode=\"date\"\n      display=\"spinner\" // iOS-native spinner style\n      onChange={(_, date) => date && onChange(date)}\n\
    \    />\n  );\n}\n\n// components/DatePicker/DatePicker.android.tsx\nimport DateTimePicker from '@react-native-community/datetimepicker';\n\
    import { useState } from 'react';\n\nexport function DatePicker({ value, onChange }: DatePickerProps) {\n  const [show,\
    \ setShow] = useState(false);\n  return (\n    <>\n      <Pressable onPress={() => setShow(true)}>\n        <Text>{value.toLocaleDateString()}</Text>\n\
    \      </Pressable>\n      {show && (\n        <DateTimePicker\n          value={value}\n          mode=\"date\"\n   \
    \       display=\"default\" // Android material dialog\n          onChange={(_, date) => {\n            setShow(false);\
    \ // Android requires manual dismiss\n            date && onChange(date);\n          }}\n        />\n      )}\n    </>\n\
    \  );\n}\n\n// Usage — platform-transparent\nimport { DatePicker } from './components/DatePicker/DatePicker';\n"
  example_bad: "// Single file with platform conditionals everywhere\nimport { Platform } from 'react-native';\n\nexport function\
    \ DatePicker({ value, onChange }) {\n  const [show, setShow] = useState(Platform.OS === 'ios');\n\n  return (\n    <>\n\
    \      {Platform.OS === 'android' && (\n        <Pressable onPress={() => setShow(true)}>\n          <Text>{value.toLocaleDateString()}</Text>\n\
    \        </Pressable>\n      )}\n      {(Platform.OS === 'ios' || show) && (\n        <DateTimePicker\n          value={value}\n\
    \          mode=\"date\"\n          display={Platform.OS === 'ios' ? 'spinner' : 'default'}\n          onChange={(_, date)\
    \ => {\n            if (Platform.OS === 'android') setShow(false);\n            date && onChange(date);\n          }}\n\
    \        />\n      )}\n    </>\n  );\n  // 15 lines of platform conditionals — untestable, grows with each feature\n}\n"
  when_applies: Projects using React Native
  when_not_applies: web-only applications, backend services, desktop applications. projects not using React Native
  sources: ["https://reactnative.dev/docs/running-on-device"]
- id: CR-RN-015
  text: Use Detox for E2E tests on real device behavior, RNTL for component tests, and Jest for unit tests
  why: 'React Native apps have three testing boundaries that require different tools. Jest tests JavaScript logic but cannot
    verify native rendering, gestures, or animations. React Native Testing Library (RNTL) tests component behavior in a simulated
    environment but misses platform-specific bugs. Detox runs tests on a real device/emulator, catching integration issues
    (keyboard behavior, deep links, permission dialogs, push notifications) that no JS-only test can find. Without all three
    layers, teams ship bugs that "pass all tests" but fail on real devices.

    '
  how_to_do_right: '1. Jest: Business logic, utils, hooks (no React component rendering)

    2. RNTL: Component behavior — render, fireEvent, waitFor, screen queries

    3. Detox: Critical user flows — signup, payment, deep links, push handling

    4. RNTL queries: prefer getByRole/getByLabelText (accessibility) over getByTestId

    5. Detox: Use device.launchApp({ newInstance: true }) for cold start tests

    6. Mock native modules in Jest/RNTL, test real ones in Detox

    '
  severity: high
  technologies:
    framework: [mobile, react_native, testing, jest]
    library: [detox, rntl]
  domains:
    domain: [architecture, mobile, testing]
  example_good: "// __tests__/utils/formatPrice.test.ts — Jest unit test\nimport { formatPrice } from '@/utils/formatPrice';\n\
    \ntest('formats with currency symbol and 2 decimals', () => {\n  expect(formatPrice(1234.5, 'USD')).toBe('$1,234.50');\n\
    });\n\ntest('handles zero', () => {\n  expect(formatPrice(0, 'USD')).toBe('$0.00');\n});\n\n// __tests__/components/ProductCard.test.tsx\
    \ — RNTL component test\nimport { render, fireEvent, screen } from '@testing-library/react-native';\nimport { ProductCard\
    \ } from '@/components/ProductCard';\n\ntest('shows add to cart button and calls handler', () => {\n  const onAddToCart\
    \ = jest.fn();\n  render(\n    <ProductCard\n      product={{ id: '1', name: 'Widget', price: 9.99 }}\n      onAddToCart={onAddToCart}\n\
    \    />\n  );\n\n  expect(screen.getByText('Widget')).toBeTruthy();\n  expect(screen.getByText('$9.99')).toBeTruthy();\n\
    \n  fireEvent.press(screen.getByRole('button', { name: /add to cart/i }));\n  expect(onAddToCart).toHaveBeenCalledWith('1');\n\
    });\n\n// e2e/checkout.test.ts — Detox E2E test\ndescribe('Checkout flow', () => {\n  beforeAll(async () => {\n    await\
    \ device.launchApp({ newInstance: true });\n  });\n\n  it('completes purchase from product page', async () => {\n    await\
    \ element(by.text('Widget')).tap();\n    await element(by.id('add-to-cart')).tap();\n    await element(by.id('cart-tab')).tap();\n\
    \    await element(by.id('checkout-button')).tap();\n    await expect(element(by.text('Order Confirmed'))).toBeVisible();\n\
    \  });\n});\n"
  example_bad: "// Only snapshot tests — catches nothing meaningful\ntest('renders correctly', () => {\n  const tree = renderer.create(<ProductCard\
    \ product={mockProduct} />).toJSON();\n  expect(tree).toMatchSnapshot(); // 500-line snapshot nobody reviews\n});\n\n\
    // Testing implementation details instead of behavior\ntest('sets internal state', () => {\n  const { result } = renderHook(()\
    \ => useCart());\n  act(() => result.current.addItem(item));\n  // Testing internal state — breaks on any refactor\n \
    \ expect(result.current.state.items).toHaveLength(1);\n});\n\n// No E2E tests — \"it works on my machine\" shipped to\
    \ production\n// Deep links, push notifications, keyboard behavior: all untested\n"
  when_applies: Projects using React Native, Detox, Jest, or RNTL
  when_not_applies: web-only applications, backend services, desktop applications
  sources: ["https://reactnative.dev/docs/debugging"]
- id: CR-RN-016
  text: Mock native modules correctly in Jest to prevent test crashes and false positives
  why: 'Jest runs in Node.js which has no native iOS/Android runtime. Every native module (camera, file system, biometrics,
    push notifications) will throw "NativeModule X is null" if not mocked. But shallow mocking (jest.mock with empty functions)
    creates false positives where tests pass despite broken native integration. Proper mocks simulate realistic behavior including
    error cases, platform differences, and async timing so tests actually validate the JavaScript logic around native calls.

    '
  how_to_do_right: '1. Create jest/setup.ts with global mocks for commonly used native modules

    2. Mock at module level in __mocks__/ directory for consistent behavior

    3. Include error case mocks — not just happy path

    4. Use jest.requireActual() to keep non-native parts of libraries

    5. Reset mocks between tests to prevent state leakage

    6. Document which mocks diverge from real behavior

    '
  severity: medium
  technologies:
    framework: [mobile, react_native, testing, jest]
  domains:
    domain: [architecture, mobile, testing]
  example_good: "// jest/setup.ts\njest.mock('react-native-mmkv', () => {\n  const store = new Map<string, string>();\n  return\
    \ {\n    MMKV: jest.fn().mockImplementation(() => ({\n      getString: jest.fn((key: string) => store.get(key)),\n   \
    \   set: jest.fn((key: string, value: string) => store.set(key, value)),\n      delete: jest.fn((key: string) => store.delete(key)),\n\
    \      clearAll: jest.fn(() => store.clear()),\n      contains: jest.fn((key: string) => store.has(key)),\n    })),\n\
    \  };\n});\n\njest.mock('@react-native-camera-roll/camera-roll', () => ({\n  CameraRoll: {\n    getPhotos: jest.fn().mockResolvedValue({\n\
    \      edges: [\n        { node: { image: { uri: 'ph://mock-photo-1' } } },\n      ],\n      page_info: { has_next_page:\
    \ false },\n    }),\n    // Mock permission denial\n    save: jest.fn().mockRejectedValue(\n      new Error('Permission\
    \ denied')\n    ),\n  },\n}));\n\n// In test: verify error handling works\ntest('handles camera roll permission denial',\
    \ async () => {\n  const { result } = renderHook(() => useSavePhoto());\n\n  await act(async () => {\n    await result.current.save('photo-uri');\n\
    \  });\n\n  expect(result.current.error).toBe('Permission denied');\n  expect(result.current.showPermissionPrompt).toBe(true);\n\
    });\n"
  example_bad: "// Shallow mock — tests pass but code may be broken\njest.mock('@react-native-camera-roll/camera-roll', ()\
    \ => ({\n  CameraRoll: {\n    getPhotos: jest.fn(), // returns undefined, not realistic\n    save: jest.fn(),      //\
    \ never rejects, no error testing\n  },\n}));\n\n// No mock at all — test crashes\n// TypeError: Cannot read property\
    \ 'getPhotos' of null\n\n// Mock in test file instead of setup — inconsistent across tests\ntest('loads photos', () =>\
    \ {\n  jest.mock('...'); // only works at top level, not inside test()\n});\n"
  when_applies: Projects using React Native or Jest
  when_not_applies: web-only applications, backend services, desktop applications. projects not using React Native or Jest
  sources: ["https://reactnative.dev/docs/networking"]
- id: CR-RN-017
  text: Structure your React Native project by feature, not by type, with barrel exports and clear dependency boundaries
  why: 'Organizing by type (components/, screens/, hooks/, utils/) creates files that are distant from their collaborators,
    forcing developers to jump across 5+ directories to understand a feature. It also makes it impossible to enforce dependency
    rules — any component can import any hook, creating a spaghetti graph. Feature-based organization (features/auth/, features/cart/)
    co-locates related code, enables lazy loading per feature, makes code ownership clear, and allows enforcing that features
    only communicate through explicit public APIs (barrel exports).

    '
  how_to_do_right: '1. Group by feature: features/auth/, features/cart/, features/product/

    2. Each feature has: components/, hooks/, services/, types/, index.ts

    3. index.ts (barrel) exports only the public API — screens and shared hooks

    4. Features import from other features ONLY through barrel exports

    5. shared/ directory for truly cross-feature code (design system, utils)

    6. Use eslint-plugin-import to enforce feature boundaries

    '
  severity: medium
  technologies:
    framework: [mobile, react_native]
  domains:
    domain: [architecture, mobile]
  example_good: '// Project structure

    // src/

    //   features/

    //     auth/

    //       components/LoginForm.tsx

    //       hooks/useAuth.ts

    //       services/authApi.ts

    //       types/auth.ts

    //       screens/LoginScreen.tsx

    //       index.ts           <-- public API

    //     cart/

    //       components/CartItem.tsx

    //       hooks/useCart.ts

    //       services/cartApi.ts

    //       screens/CartScreen.tsx

    //       index.ts

    //   shared/

    //     ui/Button.tsx

    //     utils/formatPrice.ts


    // features/auth/index.ts — explicit public API

    export { LoginScreen } from ''./screens/LoginScreen'';

    export { useAuth, useIsLoggedIn } from ''./hooks/useAuth'';

    export type { User } from ''./types/auth'';

    // Internal components NOT exported — implementation detail


    // features/cart/hooks/useCart.ts

    import { useIsLoggedIn } from ''@/features/auth''; // via barrel only

    import { Button } from ''@/shared/ui/Button'';     // shared UI OK


    // .eslintrc — enforce boundaries

    // rules: { ''import/no-internal-modules'': [''error'', {

    //   allow: [''@/features/*/index'', ''@/shared/**'']

    // }] }

    '
  example_bad: '// Organized by type — 5 directory jumps to understand "auth"

    // src/

    //   components/

    //     LoginForm.tsx      <-- where are its hooks?

    //     CartItem.tsx

    //     ProductCard.tsx

    //   hooks/

    //     useAuth.ts         <-- where is the component that uses it?

    //     useCart.ts

    //   screens/

    //     LoginScreen.tsx

    //     CartScreen.tsx

    //   services/

    //     authApi.ts

    //     cartApi.ts


    // No boundaries — cart imports auth internals directly

    import { authReducer } from ''../../hooks/useAuth''; // implementation detail

    import { validateToken } from ''../../services/authApi''; // internal function

    '
  when_applies: Projects using React Native
  when_not_applies: web-only applications, backend services, desktop applications. projects not using React Native
  sources: ["https://reactnative.dev/docs/signed-apk-android"]
- id: CR-RN-018
  text: Handle app lifecycle events (foreground, background, deep links) in a centralized hook with cleanup
  why: 'Mobile apps transition between foreground, background, and inactive states constantly. Each transition requires specific
    handling: refreshing stale data on foreground, pausing timers on background, handling deep links on cold start vs warm
    start. Scattering lifecycle handling across screens creates bugs where some handlers aren''t cleaned up (memory leaks),
    state checks on background resume conflict with each other, and deep links are handled by multiple listeners causing duplicate
    navigation. A centralized lifecycle hook prevents these issues.

    '
  how_to_do_right: '1. Create a single useAppLifecycle hook that handles all lifecycle events

    2. Use AppState.addEventListener for foreground/background transitions

    3. Use Linking.getInitialURL() for cold start deep links

    4. Use Linking.addEventListener for warm start deep links

    5. Clean up ALL listeners in useEffect return function

    6. Use useRef to track previous app state and avoid duplicate foreground handlers

    '
  severity: high
  technologies:
    framework: [mobile, react_native]
  domains:
    domain: [architecture, mobile]
    concern: [lifecycle]
  example_good: "import { useEffect, useRef } from 'react';\nimport { AppState, AppStateStatus, Linking } from 'react-native';\n\
    import { useQueryClient } from '@tanstack/react-query';\nimport { useNavigation } from '@react-navigation/native';\n\n\
    export function useAppLifecycle() {\n  const appState = useRef<AppStateStatus>(AppState.currentState);\n  const queryClient\
    \ = useQueryClient();\n  const navigation = useNavigation();\n\n  useEffect(() => {\n    // Foreground/background transitions\n\
    \    const subscription = AppState.addEventListener(\n      'change',\n      (nextState: AppStateStatus) => {\n      \
    \  const wasBg = appState.current.match(/inactive|background/);\n        const isFg = nextState === 'active';\n\n    \
    \    if (wasBg && isFg) {\n          // Returned to foreground — refetch stale queries\n          queryClient.invalidateQueries({\n\
    \            predicate: (query) => query.isStale(),\n          });\n        }\n\n        appState.current = nextState;\n\
    \      }\n    );\n\n    // Deep link handler (warm start)\n    const linkSub = Linking.addEventListener('url', ({ url\
    \ }) => {\n      handleDeepLink(url, navigation);\n    });\n\n    // Deep link handler (cold start)\n    Linking.getInitialURL().then((url)\
    \ => {\n      if (url) handleDeepLink(url, navigation);\n    });\n\n    // Cleanup ALL listeners\n    return () => {\n\
    \      subscription.remove();\n      linkSub.remove();\n    };\n  }, [queryClient, navigation]);\n}\n\nfunction handleDeepLink(url:\
    \ string, navigation: any) {\n  const route = parseDeepLink(url);\n  if (route) navigation.navigate(route.screen, route.params);\n\
    }\n"
  example_bad: "// Lifecycle handling scattered across screens with no cleanup\nfunction HomeScreen() {\n  useEffect(() =>\
    \ {\n    // No cleanup — listener accumulates on every mount\n    AppState.addEventListener('change', (state) => {\n \
    \     if (state === 'active') fetchData(); // no previous state check\n    });\n  }, []);\n}\n\nfunction ProfileScreen()\
    \ {\n  useEffect(() => {\n    // Another listener — now we have two foreground handlers\n    AppState.addEventListener('change',\
    \ (state) => {\n      if (state === 'active') refreshProfile();\n    });\n    // No return cleanup — memory leak\n  },\
    \ []);\n}\n\n// Deep link handling missing entirely — cold start links ignored\n"
  when_applies: Projects using React Native
  when_not_applies: web-only applications, backend services, desktop applications. projects not using React Native
  sources: ["https://reactnative.dev/docs/upgrading"]
