- id: CR-RN-001
  text: Use the New Architecture (Fabric + TurboModules + Codegen + JSI) for all new React Native projects targeting 0.72+
  why: 'The old bridge architecture serializes every JS-to-native call through JSON, creating a bottleneck that adds 5-15ms
    per crossing. In scroll-heavy UIs this accumulates into visible jank. The New Architecture replaces the bridge with JSI
    (JavaScript Interface) for synchronous native calls, Fabric for concurrent rendering, and TurboModules for lazy-loaded
    native modules. Projects that stay on the old bridge accumulate tech debt that becomes exponentially harder to migrate
    as native module count grows.

    '
  how_to_do_right: '1. Enable New Architecture in gradle.properties: newArchEnabled=true

    2. Enable Fabric in ios/Podfile: ENV[''RCT_NEW_ARCH_ENABLED''] = ''1''

    3. Use Codegen for type-safe native module specs (TypeScript → C++/ObjC/Java)

    4. Migrate custom native modules to TurboModules one at a time

    5. Verify every third-party library supports New Architecture before upgrading

    6. Run full E2E test suite after enabling — rendering behavior changes subtly

    '
  severity: critical
  technologies:
    framework: [mobile, react_native]
    library: [jsi, fabric, turbomodules]
  domains:
    domain: [architecture, mobile]
  example_good: "// turbo-module spec: src/specs/NativeDeviceInfo.ts\nimport type { TurboModule } from 'react-native';\nimport\
    \ { TurboModuleRegistry } from 'react-native';\n\nexport interface Spec extends TurboModule {\n  getBatteryLevel(): Promise<number>;\n\
    \  getDeviceId(): string; // synchronous via JSI\n}\n\nexport default TurboModuleRegistry.getEnforcing<Spec>('DeviceInfo');\n\
    \n// Usage — zero bridge serialization overhead\nimport DeviceInfo from './specs/NativeDeviceInfo';\nconst id = DeviceInfo.getDeviceId();\
    \ // sync, no JSON round-trip\n"
  example_bad: '// Old bridge native module — every call serializes through JSON

    import { NativeModules } from ''react-native'';


    // Async-only, 5-15ms per call due to JSON serialization

    const { DeviceInfo } = NativeModules;

    const id = await DeviceInfo.getDeviceId(); // forced async even for trivial data


    // No type safety — runtime crash if method name typo

    const battery = await NativeModules.DevceInfo.getBatteryLevel();

    // TypeError: Cannot read property ''getBatteryLevel'' of undefined

    '
  when_applies: Any project using React Native, JSI, Fabric, or TurboModules
  when_not_applies: web-only applications, backend services, desktop applications
  sources: ["https://reactnative.dev/docs/the-new-architecture/landing-page"]
- id: CR-RN-002
  text: Enable Hermes engine for 30-50% faster app startup and lower memory consumption
  why: 'JavaScriptCore (JSC) parses and compiles JavaScript at runtime on every cold start. Hermes precompiles JS to bytecode
    at build time, eliminating parse overhead entirely. Real-world measurements show 30-50% faster TTI (Time to Interactive),
    20-30% lower memory footprint, and smaller APK/IPA size because bytecode is more compact than minified JS. Without Hermes,
    large apps on mid-range Android devices can take 3-5 seconds for cold start, directly increasing user abandonment rates.

    '
  how_to_do_right: '1. In android/app/build.gradle: hermesEnabled: true (default since RN 0.70)

    2. In ios/Podfile: :hermes_enabled => true

    3. Run pod install after changing iOS setting

    4. Profile with Hermes''s built-in sampling profiler: hermes-profile-transformer

    5. Verify Intl polyfill if needed (Hermes has limited Intl support)

    6. Test all date/number formatting — Hermes Intl differs from JSC

    '
  severity: high
  technologies:
    framework: [mobile, react_native]
    library: [hermes]
  domains:
    domain: [architecture, mobile, performance]
  example_good: "// android/app/build.gradle\nproject.ext.react = [\n    hermesEnabled: true,  // bytecode compilation at\
    \ build time\n]\n\n// ios/Podfile\nuse_react_native!(\n  :hermes_enabled => true,\n)\n\n// Verify Hermes is active at\
    \ runtime\nconst isHermes = () => !!global.HermesInternal;\nconsole.log('Hermes enabled:', isHermes()); // true\n\n//\
    \ If Intl needed, add polyfill ONCE at app entry\nif (!global.Intl) {\n  require('intl');\n  require('intl/locale-data/jsonp/en');\n\
    }\n"
  example_bad: "// Hermes disabled — JSC parses raw JS on every cold start\nproject.ext.react = [\n    hermesEnabled: false,\
    \  // 30-50% slower startup\n]\n\n// No Intl check — crashes on Hermes when using Intl.NumberFormat\nconst formatted =\
    \ new Intl.NumberFormat('en-US', {\n  style: 'currency',\n  currency: 'USD',\n}).format(1234.56);\n// ReferenceError:\
    \ Property 'Intl' doesn't exist (on Hermes without polyfill)\n"
  when_applies: Projects using React Native or Hermes
  when_not_applies: web-only applications, backend services, desktop applications. projects not using React Native or Hermes
  sources: ["https://reactnative.dev/docs/flatlist"]
- id: CR-RN-003
  text: Configure Metro bundler for fast refresh, proper tree shaking, and minimal bundle size
  why: 'Metro is React Native''s JavaScript bundler and its configuration directly impacts developer experience (fast refresh
    latency) and production bundle size. Misconfigured Metro leads to duplicate modules in the bundle, missing tree shaking,
    broken fast refresh during development, and unnecessarily large production bundles. A properly configured Metro setup
    enables sub-second fast refresh, removes dead code, and can reduce bundle size by 15-30%.

    '
  how_to_do_right: '1. Use metro.config.js (not .metro.config.js or metro.config.ts)

    2. Configure resolver.resolveRequest for deduplication of shared packages

    3. Set transformer.minifierConfig for production optimization

    4. Enable serializer.experimentalSerializerHook for bundle analysis

    5. Configure watchFolders for monorepo setups

    6. Set maxWorkers based on CI vs local development

    '
  severity: medium
  technologies:
    framework: [mobile, react_native]
    library: [metro]
  domains:
    domain: [architecture, mobile]
    concern: [tooling]
  example_good: "// metro.config.js\nconst { getDefaultConfig, mergeConfig } = require('@react-native/metro-config');\n\n\
    const defaultConfig = getDefaultConfig(__dirname);\n\nconst config = {\n  resolver: {\n    // Deduplicate packages in\
    \ monorepo\n    resolveRequest: (context, moduleName, platform) => {\n      if (moduleName === 'react') {\n        return\
    \ { filePath: require.resolve('react'), type: 'sourceFile' };\n      }\n      return context.resolveRequest(context, moduleName,\
    \ platform);\n    },\n    // Block test files from production bundle\n    blockList: [/.*\\/__tests__\\/.*/],\n  },\n\
    \  transformer: {\n    minifierConfig: {\n      compress: { drop_console: true }, // remove console.log in prod\n    },\n\
    \    getTransformOptions: async () => ({\n      transform: {\n        experimentalImportSupport: true, // tree shaking\n\
    \        inlineRequires: true,            // lazy module loading\n      },\n    }),\n  },\n};\n\nmodule.exports = mergeConfig(defaultConfig,\
    \ config);\n"
  example_bad: "// No metro.config.js — all defaults, no optimization\n// OR: broken config that disables fast refresh\n\n\
    // metro.config.js\nmodule.exports = {\n  // Overwrites ALL defaults instead of merging — breaks fast refresh\n  transformer:\
    \ {\n    babelTransformerPath: './custom-transformer.js',\n  },\n  // No blockList — test files included in production\
    \ bundle\n  // No inlineRequires — all modules eagerly loaded at startup\n  // No drop_console — console.log statements\
    \ in production\n};\n"
  when_applies: Projects using React Native or Metro
  when_not_applies: web-only applications, backend services, desktop applications. projects not using React Native or Metro
  sources: ["https://reactnative.dev/docs/navigation"]
- id: CR-RN-004
  text: Use React Navigation with proper typing, native stack, and deep linking configured from day one
  why: 'Navigation is the backbone of mobile UX. React Navigation with @react-navigation/native-stack uses native navigation
    primitives (UINavigationController on iOS, Fragment on Android) for 60fps transitions. Without native stack, JS-driven
    animations compete with business logic for the JS thread, causing jank during transitions. Deep linking (universal links
    on iOS, app links on Android) must be configured from the start because retrofitting it requires restructuring the entire
    navigation tree. Apps without deep linking lose engagement from push notifications, shared links, and marketing campaigns.

    '
  how_to_do_right: '1. Install @react-navigation/native + @react-navigation/native-stack (NOT @react-navigation/stack)

    2. Define navigation types with TypeScript from the start

    3. Configure linking config for deep links matching your URL structure

    4. Verify universal links on iOS (apple-app-site-association) and app links on Android (assetlinks.json)

    5. Handle navigation state persistence for app restart continuity

    6. Use navigation ref for navigation outside components (analytics, notifications)

    '
  severity: critical
  technologies:
    framework: [mobile, react_native]
    library: [react navigation]
  domains:
    domain: [architecture, mobile]
    concern: [frontend, navigation]
  example_good: "// navigation/types.ts — type-safe from day one\nexport type RootStackParamList = {\n  Home: undefined;\n\
    \  Profile: { userId: string };\n  Settings: undefined;\n  DeepLinked: { referralCode: string };\n};\n\n// navigation/linking.ts\
    \ — deep linking configured from start\nimport { LinkingOptions } from '@react-navigation/native';\nimport { RootStackParamList\
    \ } from './types';\n\nexport const linking: LinkingOptions<RootStackParamList> = {\n  prefixes: ['myapp://', 'https://myapp.com'],\n\
    \  config: {\n    screens: {\n      Home: '',\n      Profile: 'user/:userId',\n      DeepLinked: 'invite/:referralCode',\n\
    \    },\n  },\n};\n\n// App.tsx — native stack with linking\nimport { NavigationContainer } from '@react-navigation/native';\n\
    import { createNativeStackNavigator } from '@react-navigation/native-stack';\n\nconst Stack = createNativeStackNavigator<RootStackParamList>();\n\
    \nexport default function App() {\n  return (\n    <NavigationContainer linking={linking} fallback={<LoadingScreen />}>\n\
    \      <Stack.Navigator>\n        <Stack.Screen name=\"Home\" component={HomeScreen} />\n        <Stack.Screen name=\"\
    Profile\" component={ProfileScreen} />\n      </Stack.Navigator>\n    </NavigationContainer>\n  );\n}\n"
  example_bad: "// Using JS-based stack instead of native stack — janky transitions\nimport { createStackNavigator } from\
    \ '@react-navigation/stack';\n\n// No TypeScript types — runtime crashes on wrong params\nconst Stack = createStackNavigator();\n\
    \n// No linking config — deep links don't work\nexport default function App() {\n  return (\n    <NavigationContainer>\n\
    \      <Stack.Navigator>\n        <Stack.Screen name=\"Home\" component={HomeScreen} />\n        <Stack.Screen name=\"\
    Profile\" component={ProfileScreen} />\n      </Stack.Navigator>\n    </NavigationContainer>\n  );\n}\n\n// Later: \"\
    How do I add deep linking?\" → restructure entire nav tree\n// navigation.navigate('Profile', { userId: 123 }); // no\
    \ type error, crashes at runtime\n"
  when_applies: Any project using React Native or React Navigation
  when_not_applies: web-only applications, backend services, desktop applications. projects not using React Native or React Navigation
  sources: ["https://reactnative.dev/docs/performance"]
- id: CR-RN-005
  text: Persist navigation state across app restarts and handle gesture-based navigation correctly
  why: 'Users expect to return to exactly where they were after an app restart or background kill. Without navigation state
    persistence, a user deep in a multi-step flow loses all progress. Similarly, gesture navigation (swipe-back on iOS, bottom
    sheet drag) must be handled with native-feeling physics or users perceive the app as "non-native." Broken gestures cause
    navigation state corruption, where the user is stuck on a screen with no way back.

    '
  how_to_do_right: '1. Persist navigation state to AsyncStorage/MMKV on state change

    2. Restore state on app mount with a loading screen

    3. Add a staleness check — don''t restore state older than 24 hours

    4. Use react-native-gesture-handler for swipe-back

    5. Configure gestureEnabled per screen (disable on payment/auth screens)

    6. Use @gorhom/bottom-sheet for native-feeling bottom sheets

    '
  severity: high
  technologies:
    framework: [mobile, react_native]
    library: [react navigation, mmkv]
  domains:
    domain: [architecture, mobile]
    concern: [frontend, navigation, ux]
  example_good: "import { NavigationContainer } from '@react-navigation/native';\nimport { MMKV } from 'react-native-mmkv';\n\
    \nconst storage = new MMKV();\nconst NAV_STATE_KEY = 'nav_state';\nconst NAV_STATE_MAX_AGE_MS = 24 * 60 * 60 * 1000; //\
    \ 24 hours\n\nfunction App() {\n  const [isReady, setIsReady] = useState(false);\n  const [initialState, setInitialState]\
    \ = useState<any>();\n\n  useEffect(() => {\n    const raw = storage.getString(NAV_STATE_KEY);\n    if (raw) {\n     \
    \ const { state, timestamp } = JSON.parse(raw);\n      const age = Date.now() - timestamp;\n      if (age < NAV_STATE_MAX_AGE_MS)\
    \ {\n        setInitialState(state);\n      }\n    }\n    setIsReady(true);\n  }, []);\n\n  if (!isReady) return <SplashScreen\
    \ />;\n\n  return (\n    <NavigationContainer\n      initialState={initialState}\n      onStateChange={(state) => {\n\
    \        storage.set(NAV_STATE_KEY, JSON.stringify({\n          state,\n          timestamp: Date.now(),\n        }));\n\
    \      }}\n    >\n      <RootNavigator />\n    </NavigationContainer>\n  );\n}\n"
  example_bad: "// No state persistence — user loses position after app kill\nfunction App() {\n  return (\n    <NavigationContainer>\n\
    \      <RootNavigator />\n    </NavigationContainer>\n  );\n}\n\n// Gesture navigation disabled globally — feels non-native\
    \ on iOS\n<Stack.Navigator screenOptions={{ gestureEnabled: false }}>\n  <Stack.Screen name=\"Home\" component={Home}\
    \ />\n</Stack.Navigator>\n\n// Bottom sheet using Modal — no drag gesture, no snap points\n<Modal visible={showSheet}>\n\
    \  <View style={{ flex: 1 }}>\n    <TouchableOpacity onPress={() => setShowSheet(false)}>\n      <Text>Close</Text>\n\
    \    </TouchableOpacity>\n  </View>\n</Modal>\n"
  when_applies: Projects using React Native, React Navigation, or MMKV
  when_not_applies: web-only applications, backend services, desktop applications
  sources: ["https://reactnative.dev/docs/hermes"]
- id: CR-RN-006
  text: Optimize FlatList with keyExtractor, getItemLayout for fixed-height items, and windowSize tuning
  why: 'FlatList is the primary scrolling component in React Native but its default configuration causes excessive re-renders
    and memory usage for large lists. Without keyExtractor, React re-renders ALL items on any data change. Without getItemLayout
    on fixed-height items, FlatList must measure each item before rendering, causing visible jank when scrolling to offscreen
    positions (scrollToIndex). windowSize defaults to 21 screens, meaning 10 screens above and 10 below are rendered in memory
    — for data-heavy items this causes OOM crashes on low-end devices.

    '
  how_to_do_right: '1. Always provide keyExtractor using a unique stable ID (never array index)

    2. Provide getItemLayout when item heights are fixed or calculable

    3. Reduce windowSize to 5-11 for memory-constrained lists

    4. Set maxToRenderPerBatch=10 and updateCellsBatchingPeriod=50 for smooth scrolling

    5. Use removeClippedSubviews={true} on Android for off-screen item removal

    6. Wrap item renderer in React.memo to prevent re-renders on parent state change

    '
  severity: critical
  technologies:
    framework: [mobile, react_native]
  domains:
    domain: [architecture, mobile, performance]
  example_good: "import React, { memo, useCallback } from 'react';\nimport { FlatList, View, Text } from 'react-native';\n\
    \nconst ITEM_HEIGHT = 72;\nconst SEPARATOR_HEIGHT = 1;\n\nconst Item = memo(({ item }: { item: User }) => (\n  <View style={{\
    \ height: ITEM_HEIGHT }}>\n    <Text>{item.name}</Text>\n    <Text>{item.email}</Text>\n  </View>\n));\n\nfunction UserList({\
    \ users }: { users: User[] }) {\n  const keyExtractor = useCallback((item: User) => item.id, []);\n\n  const getItemLayout\
    \ = useCallback(\n    (_: any, index: number) => ({\n      length: ITEM_HEIGHT,\n      offset: (ITEM_HEIGHT + SEPARATOR_HEIGHT)\
    \ * index,\n      index,\n    }),\n    []\n  );\n\n  const renderItem = useCallback(\n    ({ item }: { item: User }) =>\
    \ <Item item={item} />,\n    []\n  );\n\n  return (\n    <FlatList\n      data={users}\n      keyExtractor={keyExtractor}\n\
    \      getItemLayout={getItemLayout}\n      renderItem={renderItem}\n      windowSize={5}\n      maxToRenderPerBatch={10}\n\
    \      removeClippedSubviews={true}\n      ItemSeparatorComponent={() => <View style={{ height: SEPARATOR_HEIGHT }} />}\n\
    \    />\n  );\n}\n"
  example_bad: "// Every anti-pattern in one component\nfunction UserList({ users }) {\n  return (\n    <FlatList\n      data={users}\n\
    \      // Using index as key — causes full re-render on reorder/delete\n      keyExtractor={(item, index) => index.toString()}\n\
    \      // No getItemLayout — scrollToIndex will crash or lag\n      // Inline renderItem — new function every render,\
    \ breaks memo\n      renderItem={({ item }) => (\n        // No memo — re-renders on ANY parent state change\n       \
    \ <View>\n          <Text>{item.name}</Text>\n          {/* Inline image without caching */}\n          <Image source={{\
    \ uri: item.avatar }} />\n        </View>\n      )}\n      // Default windowSize=21 — renders 10 screens above and below\n\
    \      // No removeClippedSubviews — all items stay in memory\n    />\n  );\n}\n"
  when_applies: Any project using React Native
  when_not_applies: web-only applications, backend services, desktop applications. projects not using React Native
  sources: ["https://reactnative.dev/docs/platform-specific-code"]
- id: CR-RN-007
  text: Use React.memo, useMemo, and useCallback strategically to prevent unnecessary re-renders
  why: 'React Native renders are expensive because they cross the JS-to-native boundary to update the native view hierarchy.
    Unlike web React where DOM diffing is fast, React Native view updates trigger native layout recalculations. A single unnecessary
    re-render in a list item that contains images, animations, or complex layouts can cause a visible frame drop. However,
    over-memoization adds memory overhead and complexity. The key is memoizing at the right boundaries: list items, screens,
    and components that receive callbacks as props.

    '
  how_to_do_right: '1. Wrap FlatList/SectionList item renderers in React.memo

    2. useMemo for expensive computations (filtering, sorting, transforming large arrays)

    3. useCallback for functions passed as props to memoized children

    4. Use React DevTools Profiler to verify — don''t guess what re-renders

    5. Never useMemo/useCallback for simple values or functions not passed as props

    6. Consider Zustand selectors or React Query select for derived state

    '
  severity: high
  technologies:
    framework: [mobile, react_native, frontend, react]
  domains:
    domain: [architecture, mobile, performance]
  example_good: "import React, { memo, useMemo, useCallback, useState } from 'react';\n\n// Memoized list item — only re-renders\
    \ when its own props change\nconst ChatMessage = memo(({ message, onReply }: Props) => (\n  <Pressable onPress={() =>\
    \ onReply(message.id)}>\n    <Text>{message.text}</Text>\n    <Text>{message.timestamp}</Text>\n  </Pressable>\n));\n\n\
    function ChatScreen({ messages }: { messages: Message[] }) {\n  const [filter, setFilter] = useState('');\n\n  // useMemo:\
    \ expensive filter on 1000+ messages\n  const filteredMessages = useMemo(\n    () => messages.filter((m) => m.text.includes(filter)),\n\
    \    [messages, filter]\n  );\n\n  // useCallback: stable reference for memoized child\n  const handleReply = useCallback((messageId:\
    \ string) => {\n    navigation.navigate('Reply', { messageId });\n  }, [navigation]);\n\n  return (\n    <FlatList\n \
    \     data={filteredMessages}\n      renderItem={({ item }) => (\n        <ChatMessage message={item} onReply={handleReply}\
    \ />\n      )}\n      keyExtractor={(item) => item.id}\n    />\n  );\n}\n"
  example_bad: "function ChatScreen({ messages }) {\n  const [filter, setFilter] = useState('');\n\n  // Filters on EVERY\
    \ render — O(n) wasted work\n  const filteredMessages = messages.filter((m) => m.text.includes(filter));\n\n  return (\n\
    \    <FlatList\n      data={filteredMessages}\n      renderItem={({ item }) => (\n        // Inline component — recreated\
    \ every render, breaks any memo\n        <Pressable\n          // New arrow function every render — child always re-renders\n\
    \          onPress={() => navigation.navigate('Reply', { messageId: item.id })}\n        >\n          <Text>{item.text}</Text>\n\
    \        </Pressable>\n      )}\n      keyExtractor={(item) => item.id}\n    />\n  );\n}\n"
  when_applies: Projects using React Native or React component-based UIs
  when_not_applies: web-only applications, backend services, desktop applications. projects not using React Native or React
  sources: ["https://reactnative.dev/docs/native-modules-intro"]
- id: CR-RN-008
  text: Use InteractionManager to defer heavy work until after animations complete, and Reanimated for UI-thread animations
  why: 'React Native runs JavaScript on a single thread. If you start heavy computation (parsing JSON, processing images,
    building search indexes) during a screen transition, the animation drops to 10-20fps because both compete for the JS thread.
    InteractionManager.runAfterInteractions() defers work until the transition animation completes. For animations themselves,
    the built-in Animated API runs on the JS thread by default. react-native-reanimated runs animations on the UI thread via
    worklets, achieving consistent 60fps even under heavy JS load.

    '
  how_to_do_right: '1. Wrap post-navigation data loading in InteractionManager.runAfterInteractions()

    2. Use Reanimated for ALL user-facing animations (transitions, gestures, micro-interactions)

    3. Use Reanimated''s useAnimatedStyle + useSharedValue for gesture-driven animations

    4. Never call setState inside a Reanimated worklet — use runOnJS() to cross threads

    5. Profile with Flipper''s performance plugin to verify animation thread usage

    6. Consider LayoutAnimation for simple layout changes (but not for gestures)

    '
  severity: high
  technologies:
    framework: [mobile, react_native]
    library: [reanimated]
  domains:
    domain: [architecture, mobile, performance]
    concern: [animation]
  example_good: "import { InteractionManager } from 'react-native';\nimport Animated, {\n  useSharedValue,\n  useAnimatedStyle,\n\
    \  withSpring,\n} from 'react-native-reanimated';\n\nfunction ProductScreen({ productId }: Props) {\n  const [details,\
    \ setDetails] = useState<ProductDetails | null>(null);\n\n  useEffect(() => {\n    // Defer API call + parsing until screen\
    \ transition completes\n    const task = InteractionManager.runAfterInteractions(async () => {\n      const data = await\
    \ fetchProductDetails(productId);\n      setDetails(data);\n    });\n    return () => task.cancel();\n  }, [productId]);\n\
    \n  // Reanimated: animation runs on UI thread, zero JS thread impact\n  const scale = useSharedValue(1);\n  const animatedStyle\
    \ = useAnimatedStyle(() => ({\n    transform: [{ scale: withSpring(scale.value) }],\n  }));\n\n  return (\n    <Animated.View\
    \ style={animatedStyle}>\n      {details ? <ProductCard details={details} /> : <Skeleton />}\n    </Animated.View>\n \
    \ );\n}\n"
  example_bad: "function ProductScreen({ productId }) {\n  const [details, setDetails] = useState(null);\n\n  // Fetches immediately\
    \ — competes with screen transition animation\n  useEffect(() => {\n    fetchProductDetails(productId).then(setDetails);\n\
    \  }, [productId]);\n\n  // Animated API on JS thread — drops frames under load\n  const scaleAnim = useRef(new Animated.Value(1)).current;\n\
    \  Animated.spring(scaleAnim, {\n    toValue: 1.2,\n    useNativeDriver: true, // helps but still scheduled from JS thread\n\
    \  }).start();\n\n  return (\n    <Animated.View style={{ transform: [{ scale: scaleAnim }] }}>\n      {details ? <ProductCard\
    \ details={details} /> : null}\n    </Animated.View>\n  );\n}\n"
  when_applies: Projects using React Native or Reanimated
  when_not_applies: web-only applications, backend services, desktop applications. projects not using React Native or Reanimated
  sources: ["https://reactnative.dev/docs/testing-overview"]
- id: CR-RN-009
  text: Use FastImage for network images with caching, resize, and progressive loading
  why: 'The default React Native Image component has no disk caching on Android, no priority system, no progressive loading,
    and no control over resize behavior. In image-heavy apps (social feeds, e-commerce), this causes repeated network requests
    for the same images, visible pop-in, and excessive memory usage from full-resolution images displayed in small containers.
    react-native-fast-image wraps SDWebImage (iOS) and Glide (Android) for production-grade image handling with disk/memory
    caching, priority queues, and resize support.

    '
  how_to_do_right: '1. Replace all network Image components with FastImage

    2. Set resizeMode to ''cover'' or ''contain'' explicitly

    3. Use priority prop for above-the-fold images

    4. Preload critical images on app start with FastImage.preload()

    5. Set cache control: ''immutable'' for CDN images with hashed URLs

    6. Use progressive loading for large hero images

    '
  severity: high
  technologies:
    framework: [mobile, react_native]
    library: [fastimage]
  domains:
    domain: [architecture, mobile, performance]
  example_good: "import FastImage from 'react-native-fast-image';\n\n// Preload critical images at app start\nFastImage.preload([\n\
    \  { uri: 'https://cdn.app.com/hero-banner.webp' },\n  { uri: 'https://cdn.app.com/logo.png' },\n]);\n\nfunction ProductCard({\
    \ product }: { product: Product }) {\n  return (\n    <FastImage\n      source={{\n        uri: product.imageUrl,\n  \
    \      priority: FastImage.priority.high,\n        cache: FastImage.cacheControl.immutable, // CDN hash = never refetch\n\
    \      }}\n      resizeMode={FastImage.resizeMode.cover}\n      style={{ width: 200, height: 200 }}\n      // Placeholder\
    \ while loading\n      defaultSource={require('./placeholder.png')}\n    />\n  );\n}\n\n// In lists — normal priority,\
    \ web cache control\nfunction FeedItem({ post }: { post: Post }) {\n  return (\n    <FastImage\n      source={{\n    \
    \    uri: post.thumbnailUrl, // use thumbnail, not full-res\n        priority: FastImage.priority.normal,\n        cache:\
    \ FastImage.cacheControl.web, // respect HTTP cache headers\n      }}\n      resizeMode={FastImage.resizeMode.cover}\n\
    \      style={{ width: '100%', aspectRatio: 16 / 9 }}\n    />\n  );\n}\n"
