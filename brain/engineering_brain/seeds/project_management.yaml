layer: principles
domain: project_management
knowledge:
- id: P-PROJ-STORY-POINTS
  name: Story Points (Relative Sizing)
  why: >-
    Humans are terrible at absolute estimation ('this will take 4 days') but excellent at relative comparison ('this is about
    twice as hard as that'). Story points measure complexity and effort RELATIVE to a baseline, not calendar time. This decouples
    estimation from individual developer speed and avoids the planning fallacy (humans consistently underestimate duration
    by 30-50%). Teams that use relative sizing improve estimation accuracy by 50% over time because they calibrate against
    real completed work, not optimistic predictions.
  how_to_apply: >-
    1. Establish a baseline story (a well-understood 3-point story the team has completed). 2. Use Fibonacci sequence (1,
    2, 3, 5, 8, 13) — gaps get larger because uncertainty grows with complexity. 3. Estimate during grooming, not sprint planning.
    4. Planning poker: everyone reveals simultaneously to prevent anchoring. 5. Discuss outliers ('Why did you say 13 when
    others said 5?'). 6. Track velocity (points completed per sprint) as rolling 3-5 sprint average. 7. Never convert points
    to hours — they are different units.
  mental_model: >-
    T-shirt sizes — you can easily say 'this task is a Large' compared to a 'Small' you did last week, without needing to
    calculate exactly how many hours each takes.
  domains:
    domain:
    - management
    concern:
    - project
    - agile
    - estimation
  violation_consequence: >-
    Pressure to convert to hours (defeats purpose), gaming the system (inflating points), unstable velocity due to individual
    variation.
  teaching_example: >-
    BAD: 'How many hours will this take?' → Developer says 3 days → takes 7. GOOD: 'How does this compare to the login feature
    we built last sprint?' → Team consensus: about the same complexity → 5 points. Velocity says the team does 30 points/sprint
    → confidence in the plan.
  when_applies: All software engineering decisions
  when_not_applies: throwaway prototypes, learning exercises, or spike investigations where speed trumps correctness
  sources:
  - https://scrumguides.org/scrum-guide.html
  text: >-
    Story Points (Relative Sizing): T-shirt sizes — you can easily say 'this task is a Large' compared to a 'Small' you did
    last week, without needing to calculate exactly how many hours each takes.
  severity: medium
  technologies:
    domain:
    - general
  how_to_do_right: >-
    1. Establish a baseline story (a well-understood 3-point story the team has completed). 2. Use Fibonacci sequence (1,
    2, 3, 5, 8, 13) — gaps get larger because uncertainty grows with complexity. 3. Estimate during grooming, not sprint planning.
    4. Planning poker: everyone reveals simultaneously to prevent anchoring. 5. Discuss outliers ('Why did you say 13 when
    others said 5?'). 6. Track velocity (points completed per sprint) as rolling 3-5 sprint average. 7. Never convert points
    to hours — they are different units.
  example_good: |-
    # BAD: 'How many hours will this take?' → Developer says 3 days → takes 7.
    # GOOD: 'How does this compare to the login feature we built last sprint?' → Team consensus: about the same complexity → 5 points.
    # Velocity says the team does 30 points/sprint → confidence in the plan.
  example_bad: |-
    # Anti-pattern: Violating Story Points (Relative Sizing)
    # Result: Pressure to convert to hours (defeats purpose)
    # Result: gaming the system (inflating points)
- id: P-PROJ-THREE-POINT
  name: Three-Point Estimation (PERT)
  why: >-
    Single-point estimates ('this will take 5 days') ignore uncertainty. Three-point estimation (optimistic, most likely,
    pessimistic) acknowledges that every task has a range of possible durations. The PERT formula (O + 4M + P) / 6 produces
    a weighted average that accounts for the typical right-skewed distribution of project tasks (things take longer than expected
    more often than they finish early). This gives stakeholders a realistic range instead of a false-precision single number.
  how_to_apply: >-
    1. For each task, estimate three values: O (optimistic — everything goes right), M (most likely — normal conditions),
    P (pessimistic — things go wrong). 2. Expected duration = (O + 4M + P) / 6. 3. Standard deviation = (P - O) / 6. 4. Project
    duration = sum of expected durations on critical path. 5. Add buffer: 1 standard deviation = 84% confidence, 2 = 97.5%.
    6. Communicate ranges: 'This will take 8-14 days, most likely 10.' 7. Track actual vs estimated to calibrate future estimates.
  mental_model: >-
    Weather probability — 'There's a 70% chance of rain' is more honest and useful than 'It will rain.' Three-point estimates
    give probability-weighted predictions.
  domains:
    domain:
    - management
    - planning
    concern:
    - project
    - estimation
  violation_consequence: Single-point estimates always wrong, stakeholders lose trust, no buffer for uncertainty, perpetual
    late delivery.
  teaching_example: >-
    Task: Migrate database. O=3 days (schema is simple, no issues). M=5 days (some data cleanup needed). P=12 days (data corruption
    found, rollback needed). Expected = (3 + 4×5 + 12)/6 = 5.8 days. Tell stakeholders: '5-6 working days, with a buffer for
    unexpected issues extending to 8.'
  when_applies: All software engineering decisions
  when_not_applies: throwaway prototypes, learning exercises, or spike investigations where speed trumps correctness
  sources:
  - https://www.pmi.org/learning/library/three-point-estimating-technique-702
  text: >-
    Three-Point Estimation (PERT): Weather probability — 'There's a 70% chance of rain' is more honest and useful than 'It
    will rain.' Three-point estimates give probability-weighted predictions.
  severity: medium
  technologies:
    domain:
    - general
  how_to_do_right: >-
    1. For each task, estimate three values: O (optimistic — everything goes right), M (most likely — normal conditions),
    P (pessimistic — things go wrong). 2. Expected duration = (O + 4M + P) / 6. 3. Standard deviation = (P - O) / 6. 4. Project
    duration = sum of expected durations on critical path. 5. Add buffer: 1 standard deviation = 84% confidence, 2 = 97.5%.
    6. Communicate ranges: 'This will take 8-14 days, most likely 10.' 7. Track actual vs estimated to calibrate future estimates.
  example_good: |-
    # Task: Migrate database.
    # O=3 days (schema is simple, no issues).
    # M=5 days (some data cleanup needed).
    # P=12 days (data corruption found, rollback needed).
  example_bad: |-
    # Anti-pattern: Violating Three-Point Estimation (PERT)
    # Result: Single-point estimates always wrong
    # Result: stakeholders lose trust
- id: P-PROJ-CONE
  name: Cone of Uncertainty
  why: >-
    At the start of a project, estimates have a 4x range (the project could take 4x shorter or 4x longer than estimated).
    As the project progresses and uncertainty is resolved, the cone narrows. Steve McConnell documented this pattern across
    hundreds of software projects. The implication is devastating for waterfall planning: committing to a scope, timeline,
    and budget at the point of maximum uncertainty is guaranteed to be wrong. The solution is iterative planning that updates
    estimates as the cone narrows.
  how_to_apply: >-
    1. Early estimates (concept stage): multiply by 4x for worst case, divide by 4x for best case. 2. After architecture defined:
    2x range. 3. After detailed design: 1.5x range. 4. During development: 1.25x range. 5. Never commit to fixed scope + fixed
    timeline + fixed budget simultaneously (pick 2, flex 1). 6. Re-estimate at each project phase gate. 7. Communicate the
    cone to stakeholders: 'Our estimate will become more accurate as we learn more.'
  mental_model: >-
    Headlights on a dark road — you can only see 200 meters ahead. You know the general direction, but the precise path is
    revealed as you drive. Planning the entire 500km route by headlight range is foolish.
  domains:
    domain:
    - management
    concern:
    - project
    - estimation
    - stakeholder_management
  violation_consequence: Fixed commitments at maximum uncertainty, stakeholder disappointment, team demoralization from impossible
    deadlines.
  teaching_example: >-
    Project kickoff estimate: 6 months. Cone says range is 1.5 - 24 months. After 2-month discovery: 4-9 months. After architecture:
    5-7 months. After 50% development: 5.5-6.5 months. Final: 6.2 months. The honest path narrows; the dishonest commitment
    of '6 months guaranteed' on day 1 was lucky, not skillful.
  when_applies: All software engineering decisions
  when_not_applies: throwaway prototypes, learning exercises, or spike investigations where speed trumps correctness
  sources:
  - https://www.construx.com/books/the-cone-of-uncertainty/
  text: 'Cone of Uncertainty: Headlights on a dark road — you can only see 200 meters ahead.'
  severity: medium
  technologies:
    domain:
    - general
  how_to_do_right: >-
    1. Early estimates (concept stage): multiply by 4x for worst case, divide by 4x for best case. 2. After architecture defined:
    2x range. 3. After detailed design: 1.5x range. 4. During development: 1.25x range. 5. Never commit to fixed scope + fixed
    timeline + fixed budget simultaneously (pick 2, flex 1). 6. Re-estimate at each project phase gate. 7. Communicate the
    cone to stakeholders: 'Our estimate will become more accurate as we learn more.'
  example_good: |-
    # Project kickoff estimate: 6 months.
    # Cone says range is 1.5 - 24 months.
    # After 2-month discovery: 4-9 months.
    # After architecture: 5-7 months.
  example_bad: |-
    # Anti-pattern: Violating Cone of Uncertainty
    # Result: Fixed commitments at maximum uncertainty
    # Result: stakeholder disappointment
- id: P-PROJ-RISK-MATRIX
  name: Risk Register and Probability-Impact Matrix
  why: >-
    Unmanaged risks become surprises. Surprises derail projects. A risk register forces the team to identify, quantify, and
    plan for potential problems BEFORE they occur. The probability × impact matrix separates high-priority risks (likely AND
    severe) from low-priority ones (unlikely OR minor). Without this discipline, teams either ignore risks entirely (then
    scramble when they hit) or treat all risks equally (analysis paralysis). NASA, aerospace, and medical device companies
    all mandate risk registers because the cost of unmanaged risk is catastrophic.
  how_to_apply: >-
    1. Brainstorm risks with the team at project kickoff (minimum 15 risks). 2. Rate each: Probability (1-5) and Impact (1-5).
    3. Score = Probability × Impact. 4. Plot on matrix: Scores ≥12 = critical (mitigate immediately), 6-11 = medium (plan
    mitigation), ≤5 = low (accept and monitor). 5. For each critical risk, define mitigation strategy: Avoid, Transfer, Mitigate,
    or Accept. 6. Assign a risk owner per risk. 7. Review weekly in standup. 8. Update after each sprint.
  mental_model: >-
    Fire insurance — you identify fire as a risk (probability: low, impact: catastrophic), you mitigate (sprinklers, fire-resistant
    materials), transfer (insurance policy), and accept residual risk (can't prevent all fires).
  domains:
    domain:
    - management
    - planning
    concern:
    - project
    - risk
  violation_consequence: Surprise problems with no contingency plan, firefighting instead of building, stakeholder distrust,
    schedule blowouts.
  teaching_example: >-
    Risk: 'Third-party API deprecates v1 during our project.' Probability: 3 (announced but no date). Impact: 5 (blocks entire
    integration). Score: 15 (CRITICAL). Mitigation: Abstract the API behind an adapter interface now, so switching versions
    is a single-file change. Owner: Tech Lead. Review: Monthly.
  when_applies: All software engineering decisions
  when_not_applies: throwaway prototypes, learning exercises, or spike investigations where speed trumps correctness
  sources:
  - https://www.pmi.org/learning/library/risk-analysis-project-management-7070
  text: >-
    Risk Register and Probability-Impact Matrix: Fire insurance — you identify fire as a risk (probability: low, impact: catastrophic),
    you mitigate (sprinklers, fire-resistant materials), transfer (insurance policy), and accept residual risk (can't prevent
    all fires).
  severity: high
  technologies:
    domain:
    - general
  how_to_do_right: >-
    1. Brainstorm risks with the team at project kickoff (minimum 15 risks). 2. Rate each: Probability (1-5) and Impact (1-5).
    3. Score = Probability × Impact. 4. Plot on matrix: Scores ≥12 = critical (mitigate immediately), 6-11 = medium (plan
    mitigation), ≤5 = low (accept and monitor). 5. For each critical risk, define mitigation strategy: Avoid, Transfer, Mitigate,
    or Accept. 6. Assign a risk owner per risk. 7. Review weekly in standup. 8. Update after each sprint.
  example_good: |-
    # Risk: 'Third-party API deprecates v1 during our project.' Probability: 3 (announced but no date).
    # Impact: 5 (blocks entire integration).
    # Score: 15 (CRITICAL).
    # Mitigation: Abstract the API behind an adapter interface now, so switching versions is a single-file change.
  example_bad: |-
    # Anti-pattern: Violating Risk Register and Probability-Impact Matrix
    # Result: Surprise problems with no contingency plan
    # Result: firefighting instead of building
- id: P-PROJ-RISK-DRIVEN
  name: Risk-Driven Development
  why: >-
    Traditional development tackles the easy, well-understood work first and leaves the risky, uncertain work for later. This
    is backwards — if the risky work reveals a fundamental problem, all the 'easy' work may need to be redone. Risk-driven
    development (from George Fairbanks and Barry Boehm's Spiral Model) tackles the highest-risk items first. If the riskiest
    assumption is wrong, you fail fast and cheap instead of late and expensive. Amazon's 'two-way door' vs 'one-way door'
    decision framework serves the same purpose.
  how_to_apply: >-
    1. List all project risks and uncertainties. 2. Rank by risk score (probability × impact). 3. Schedule the riskiest work
    in Sprint 1-2 (spikes, prototypes, integrations). 4. If a risk materializes early, you can pivot, descope, or kill the
    project before major investment. 5. Technical spikes for uncertain technology: time-boxed to 2-3 days, must produce a
    decision (go/no-go). 6. Integration risks before feature risks — prove the system works end-to-end before polishing individual
    features.
  mental_model: >-
    Building a bridge — you test the soil and build the foundations first. You don't paint the railings and then discover
    the ground can't support the weight.
  domains:
    domain:
    - management
    concern:
    - project
    - risk
    - development
  violation_consequence: >-
    Late discovery of fundamental problems, sunk cost fallacy, expensive pivots, 'demo-driven development' where the demo
    works but the foundation is broken.
  teaching_example: >-
    Project has 3 risks: (1) Can we process 10K events/second? (2) Will the ML model achieve 90% accuracy? (3) Can we integrate
    with legacy API? Sprint 1: Load test + ML prototype + API integration spike. If any fail, pivot at week 2 instead of month
    6.
  when_applies: All software engineering decisions
  when_not_applies: throwaway prototypes, learning exercises, or spike investigations where speed trumps correctness
  sources:
  - https://www.georgefairbanks.com/book/
  text: 'Risk-Driven Development: Building a bridge — you test the soil and build the foundations first.'
  severity: high
  technologies:
    domain:
    - general
  how_to_do_right: >-
    1. List all project risks and uncertainties. 2. Rank by risk score (probability × impact). 3. Schedule the riskiest work
    in Sprint 1-2 (spikes, prototypes, integrations). 4. If a risk materializes early, you can pivot, descope, or kill the
    project before major investment. 5. Technical spikes for uncertain technology: time-boxed to 2-3 days, must produce a
    decision (go/no-go). 6. Integration risks before feature risks — prove the system works end-to-end before polishing individual
    features.
  example_good: |-
    # Project has 3 risks: (1) Can we process 10K events/second? (2) Will the ML model achieve 90% accuracy? (3) Can we integrate with legacy API? Sprint 1: Load test + ML prototype + API integration spike.
    # If any fail, pivot at week 2 instead of month 6.
  example_bad: |-
    # Anti-pattern: Violating Risk-Driven Development
    # Result: Late discovery of fundamental problems
    # Result: sunk cost fallacy
- id: P-PROJ-SPIKE
  name: Technical Spike (Uncertainty Reduction)
  why: >-
    A spike is a time-boxed investigation to reduce uncertainty before committing to implementation. Without spikes, teams
    either (a) estimate blindly and are wrong, or (b) start building and discover problems mid-sprint. Both waste time. Spikes
    are investments in information — spending 2 days to learn that an approach is feasible (or not) saves weeks of wasted
    development. The critical discipline is TIME-BOXING: a spike without a deadline becomes exploration without a deliverable.
  how_to_apply: >-
    1. Define the question the spike must answer (e.g., 'Can we process 10K events/sec with Redis Streams?'). 2. Time-box
    strictly (1-3 days maximum). 3. Deliverable is a DECISION, not code: go/no-go with evidence. 4. Write a brief spike report:
    question, approach, findings, decision, risks. 5. Share findings with the team (avoid knowledge silos). 6. If the spike
    didn't answer the question, that IS the answer: more investigation or different approach needed.
  mental_model: >-
    Scouting party — before the army marches into unknown territory, send scouts to report on terrain, enemies, and paths.
    The scouts' mission is information, not conquest.
  domains:
    domain:
    - management
    concern:
    - project
    - development
    - risk
  violation_consequence: >-
    Blind commitments to unknown technology, mid-sprint 'we can't do this' surprises, estimation based on assumptions instead
    of evidence.
  teaching_example: >-
    Question: 'Can FalkorDB handle our graph queries in <100ms at 1M nodes?' Spike: 2 days. Day 1: Set up FalkorDB, load sample
    data, write representative queries. Day 2: Benchmark, profile bottlenecks. Result: 95th percentile = 45ms at 1M nodes.
    Decision: GO. Evidence: benchmark results attached.
  when_applies: All software engineering decisions
  when_not_applies: throwaway prototypes, learning exercises, or spike investigations where speed trumps correctness
  sources:
  - https://www.agilealliance.org/glossary/spike/
  text: >-
    Technical Spike (Uncertainty Reduction): Scouting party — before the army marches into unknown territory, send scouts
    to report on terrain, enemies, and paths.
  severity: high
  technologies:
    domain:
    - general
  how_to_do_right: >-
    1. Define the question the spike must answer (e.g., 'Can we process 10K events/sec with Redis Streams?'). 2. Time-box
    strictly (1-3 days maximum). 3. Deliverable is a DECISION, not code: go/no-go with evidence. 4. Write a brief spike report:
    question, approach, findings, decision, risks. 5. Share findings with the team (avoid knowledge silos). 6. If the spike
    didn't answer the question, that IS the answer: more investigation or different approach needed.
  example_good: |-
    # Question: 'Can FalkorDB handle our graph queries in <100ms at 1M nodes?' Spike: 2 days.
    # Day 1: Set up FalkorDB, load sample data, write representative queries.
    # Day 2: Benchmark, profile bottlenecks.
    # Result: 95th percentile = 45ms at 1M nodes.
  example_bad: |-
    # Anti-pattern: Violating Technical Spike (Uncertainty Reduction)
    # Result: Blind commitments to unknown technology
    # Result: mid-sprint \'we can\'t do this\' surprises
- id: P-PROJ-RACI
  name: RACI Matrix (Responsibility Assignment)
  why: >-
    When responsibility is unclear, either nobody does it (diffusion of responsibility) or multiple people do it differently
    (duplication and conflict). The RACI matrix (Responsible, Accountable, Consulted, Informed) assigns exactly one Accountable
    person per decision/deliverable and clear roles for everyone else. The most common project dysfunction — 'I thought someone
    else was handling that' — is eliminated by RACI. The key constraint is: exactly ONE person is Accountable (the buck stops
    here), though multiple people can be Responsible (doing the work).
  how_to_apply: >-
    1. List all key decisions and deliverables on rows. 2. List all stakeholders on columns. 3. Assign R (does the work),
    A (makes the final call — ONE per row), C (provides input before decision), I (notified after decision). 4. Validate:
    every row has exactly one A. 5. Validate: no person has >5 A's (overloaded). 6. Validate: if someone is R but not A, the
    A person must be able to override. 7. Share and get agreement at project kickoff.
  mental_model: >-
    Restaurant kitchen — the head chef is Accountable for the dish, the line cook is Responsible for executing it, the sommelier
    is Consulted on wine pairing, and the waiter is Informed when it's ready.
  domains:
    domain:
    - management
    - governance
    concern:
    - project
    - communication
  violation_consequence: >-
    Diffusion of responsibility ('I thought you were doing that'), conflicting decisions, bottlenecks on people assigned too
    many A's.
  teaching_example: >-
    Decision: 'Technology stack selection.' R: Tech Lead (researches options). A: CTO (makes final decision). C: Senior Engineers
    (provide input on feasibility). I: Product Manager (notified of decision). Without RACI: 3 people each research different
    stacks, nobody decides, meeting runs 2 hours.
  when_applies: All software engineering decisions
  when_not_applies: throwaway prototypes, learning exercises, or spike investigations where speed trumps correctness
  sources:
  - https://www.pmi.org/learning/library/responsible-accountable-consulted-informed-raci-702
  text: >-
    RACI Matrix (Responsibility Assignment): Restaurant kitchen — the head chef is Accountable for the dish, the line cook
    is Responsible for executing it, the sommelier is Consulted on wine pairing, and the waiter is Informed when it's ready.
  severity: medium
  technologies:
    domain:
    - general
  how_to_do_right: >-
    1. List all key decisions and deliverables on rows. 2. List all stakeholders on columns. 3. Assign R (does the work),
    A (makes the final call — ONE per row), C (provides input before decision), I (notified after decision). 4. Validate:
    every row has exactly one A. 5. Validate: no person has >5 A's (overloaded). 6. Validate: if someone is R but not A, the
    A person must be able to override. 7. Share and get agreement at project kickoff.
  example_good: |-
    # Decision: 'Technology stack selection.' R: Tech Lead (researches options).
    # A: CTO (makes final decision).
    # C: Senior Engineers (provide input on feasibility).
    # I: Product Manager (notified of decision).
  example_bad: |-
    # Anti-pattern: Violating RACI Matrix (Responsibility Assignment)
    # Result: Diffusion of responsibility (\'I thought you were doing that\')
    # Result: conflicting decisions
- id: P-PROJ-STATUS-REPORTING
  name: Status Reporting (Red/Yellow/Green with Actions)
  why: >-
    Stakeholders need to know project health without reading 50 Jira tickets. The RAG (Red/Amber/Green) system provides at-a-glance
    health, BUT only if it includes actions. 'Status: Red' without explanation or plan is useless — it creates panic without
    direction. The report must answer: Where are we? Are we on track? If not, what are we doing about it? Weekly cadence prevents
    information vacuums where stakeholders fill the silence with worst-case assumptions.
  how_to_apply: >-
    1. Green: On track, no intervention needed. 2. Yellow: At risk, mitigation in progress (state the risk AND the mitigation).
    3. Red: Off track, needs escalation or scope change (state the problem AND proposed actions). 4. Include: key metrics,
    completed this week, planned next week, blockers, risks. 5. Keep to 1 page maximum. 6. Send on the same day every week
    (consistency builds trust). 7. Never surprise stakeholders with Red — if it was Green last week, explain what changed.
    8. Different audiences get different detail levels.
  mental_model: >-
    Traffic light — Green means go (no action needed), Yellow means caution (watch it), Red means stop and address (action
    required). But a traffic light without a road map is meaningless — context is required.
  domains:
    domain:
    - management
    concern:
    - project
    - communication
    - stakeholder_management
  violation_consequence: >-
    Stakeholders blind-sided by delays, loss of trust, micromanagement in response to information vacuum, projects 'suddenly'
    going Red.
  teaching_example: >-
    BAD: 'Status: Yellow. We're a bit behind.' (No details, no actions). GOOD: 'Status: Yellow. API integration delayed 3
    days due to vendor API change. Mitigation: Using mock API to unblock frontend. Expected resolution: Wednesday when vendor
    deploys hotfix. Impact: Sprint goal still achievable if resolved by Thursday.'
  when_applies: All software engineering decisions
  when_not_applies: throwaway prototypes, learning exercises, or spike investigations where speed trumps correctness
  sources:
  - https://www.pmi.org/learning/library/project-status-reporting-best-practices-6009
  text: >-
    Status Reporting (Red/Yellow/Green with Actions): Traffic light — Green means go (no action needed), Yellow means caution
    (watch it), Red means stop and address (action required).
  severity: medium
  technologies:
    domain:
    - general
  how_to_do_right: >-
    1. Green: On track, no intervention needed. 2. Yellow: At risk, mitigation in progress (state the risk AND the mitigation).
    3. Red: Off track, needs escalation or scope change (state the problem AND proposed actions). 4. Include: key metrics,
    completed this week, planned next week, blockers, risks. 5. Keep to 1 page maximum. 6. Send on the same day every week
    (consistency builds trust). 7. Never surprise stakeholders with Red — if it was Green last week, explain what changed.
    8. Different audiences get different detail levels.
  example_good: |-
    # BAD: 'Status: Yellow.
    # We're a bit behind.' (No details, no actions).
    # GOOD: 'Status: Yellow.
    # API integration delayed 3 days due to vendor API change.
  example_bad: |-
    # Anti-pattern: Violating Status Reporting (Red/Yellow/Green with Actions)
    # Result: Stakeholders blind-sided by delays
    # Result: loss of trust
- id: P-PROJ-DECISION-LOG
  name: Decision Log
  why: >-
    Without a decision log, decisions are lost in Slack threads, meeting notes, and memories. When a new team member asks
    'Why did we choose PostgreSQL over MongoDB?', nobody remembers the reasoning — only the conclusion. Worse, without recorded
    context, teams revisit the same decisions repeatedly. The decision log preserves the WHO (who decided), WHAT (the decision),
    WHEN (date), WHY (reasoning and alternatives considered), and CONTEXT (constraints at the time). This is institutional
    memory that survives team turnover.
  how_to_apply: >-
    1. Create a shared document/wiki page for the decision log. 2. For each decision, record: Date, Decision, Decider(s),
    Context (what prompted this), Options Considered, Reasoning (why this option won), Consequences (what this means going
    forward). 3. Number decisions sequentially (ADR-001, ADR-002). 4. Decisions are immutable — don't edit old ones, create
    superseding decisions. 5. Review at retros ('Any decisions that need revisiting?'). 6. Link from code comments to relevant
    decisions.
  mental_model: >-
    Court record — every ruling includes the judgment AND the reasoning. Future cases reference past reasoning. Without records,
    the legal system would reinvent every argument from scratch.
  domains:
    domain:
    - management
    - architecture
    concern:
    - project
    - communication
  violation_consequence: >-
    Repeated debates on settled decisions, inability to explain past choices, new team members making contradictory decisions,
    institutional memory loss on team turnover.
  teaching_example: >-
    ADR-012: Database Choice. Date: 2026-01-15. Decision: PostgreSQL over MongoDB. Decider: Tech Lead + CTO. Context: Need
    ACID transactions for financial data. Options: PostgreSQL (ACID, mature, SQL), MongoDB (flexible schema, easy setup),
    DynamoDB (managed, pay-per-request). Reasoning: ACID required for financial data integrity, team has PostgreSQL expertise,
    flexible schema not needed (domain is well-understood). Consequences: Need Alembic for migrations, team must maintain
    PostgreSQL instance.
  when_applies: Any system involving systems requiring structural design decisions
  when_not_applies: throwaway prototypes, learning exercises, or spike investigations where speed trumps correctness
  sources:
  - https://cognitect.com/blog/2011/11/15/documenting-architecture-decisions
  text: 'Decision Log: Court record — every ruling includes the judgment AND the reasoning.'
  severity: medium
  technologies:
    domain:
    - general
  how_to_do_right: >-
    1. Create a shared document/wiki page for the decision log. 2. For each decision, record: Date, Decision, Decider(s),
    Context (what prompted this), Options Considered, Reasoning (why this option won), Consequences (what this means going
    forward). 3. Number decisions sequentially (ADR-001, ADR-002). 4. Decisions are immutable — don't edit old ones, create
    superseding decisions. 5. Review at retros ('Any decisions that need revisiting?'). 6. Link from code comments to relevant
    decisions.
