    # ADR-012: Database Choice.
    # Date: 2026-01-15.
    # Decision: PostgreSQL over MongoDB.
    # Decider: Tech Lead + CTO.
  example_bad: |-
    # Anti-pattern: Violating Decision Log
    # Result: Repeated debates on settled decisions
    # Result: inability to explain past choices
- id: P-PROJ-FEATURE-FLAGS
  name: Feature Flags (Decouple Deploy from Release)
  why: >-
    Deploying code and releasing features are different things. Without feature flags, every deployment is a release — any
    bug goes live to all users immediately. Feature flags allow deploying code to production (testing in real environment)
    while showing it to 0% of users. Then gradually rolling out: 1% (canary), 10% (beta), 100% (GA). This also enables instant
    rollback (flip flag to off) without deploying code. It is the single most impactful practice for safe, continuous delivery.
  how_to_apply: >-
    1. Wrap new features in boolean flags: if (featureFlags.newCheckout) { ... }. 2. Flags are managed externally (not hardcoded
    — use LaunchDarkly, Unleash, or config service). 3. Start at 0% (code deployed but hidden). 4. Monitor metrics at each
    rollout stage. 5. If metrics degrade, flip flag off (instant rollback). 6. Remove flag code after 100% rollout is stable
    (tech debt prevention). 7. Use flags for A/B tests (50/50 split). 8. Never nest flags (combinatorial explosion).
  mental_model: >-
    Dimmer switch vs light switch — a light switch is binary (deploy = everyone sees it). A dimmer (feature flag) lets you
    gradually increase exposure, pausing or reversing if something goes wrong.
  domains:
    domain:
    - management
    - operations
    - devops
    concern:
    - project
    - delivery
  violation_consequence: >-
    All-or-nothing deployments, rollbacks require code revert + deploy (30min+), can't test in production safely, big-bang
    releases with big-bang risks.
  teaching_example: >-
    BAD: Deploy new checkout → bug → 100% of users affected → emergency rollback takes 45 minutes. GOOD: Deploy new checkout
    behind flag → enable for 1% → monitor conversion rate → bug detected at 1% → flip flag off in 5 seconds → 99% of users
    never affected.
  when_applies: Any system involving deployment, CI/CD, or infrastructure automation
  when_not_applies: throwaway prototypes, learning exercises, or spike investigations where speed trumps correctness
  sources:
  - https://martinfowler.com/articles/feature-toggles.html
  text: >-
    Feature Flags (Decouple Deploy from Release): Dimmer switch vs light switch — a light switch is binary (deploy = everyone
    sees it).
  severity: high
  technologies:
    lang:
    - python
    - javascript
  how_to_do_right: >-
    1. Wrap new features in boolean flags: if (featureFlags.newCheckout) { ... }. 2. Flags are managed externally (not hardcoded
    — use LaunchDarkly, Unleash, or config service). 3. Start at 0% (code deployed but hidden). 4. Monitor metrics at each
    rollout stage. 5. If metrics degrade, flip flag off (instant rollback). 6. Remove flag code after 100% rollout is stable
    (tech debt prevention). 7. Use flags for A/B tests (50/50 split). 8. Never nest flags (combinatorial explosion).
  example_good: |-
    # BAD: Deploy new checkout → bug → 100% of users affected → emergency rollback takes 45 minutes.
    # GOOD: Deploy new checkout behind flag → enable for 1% → monitor conversion rate → bug detected at 1% → flip flag off in 5 seconds → 99% of users never affected.
  example_bad: |-
    # Anti-pattern: Violating Feature Flags (Decouple Deploy from Release)
    # Result: All-or-nothing deployments
    # Result: rollbacks require code revert + deploy (30min+)
- id: P-PROJ-ROLLBACK
  name: Rollback Plan (Every Release Has an Exit)
  why: >-
    Every release can fail. Without a pre-planned rollback procedure, the team discovers HOW to roll back during the crisis
    — the worst possible time to learn new procedures. Rollback plans must be written and tested BEFORE the release, not improvised
    during an incident at 2 AM. Database migrations make rollback especially dangerous — a forward migration that drops a
    column cannot be simply reverted. Rollback testing should be part of the release checklist.
  how_to_apply: >-
    1. Every release has a documented rollback procedure BEFORE deployment. 2. Database migrations must be reversible (write
    both up() and down()). 3. If migration is irreversible (column drop), use expand-contract: add new, migrate data, remove
    old in separate releases. 4. Define rollback criteria: what metrics trigger a rollback? (error rate >1%, latency >2s,
    conversion drop >5%). 5. Test the rollback procedure in staging. 6. Feature flags are the preferred rollback mechanism
    (instant, no deploy). 7. Post-rollback: write incident report before re-attempting release.
  mental_model: >-
    Mountaineering — before starting a summit attempt, the team agrees on turnaround conditions (weather, time, oxygen). They
    don't decide mid-crisis whether to descend.
  domains:
    domain:
    - management
    - operations
    - devops
    - reliability
    concern:
    - project
    - delivery
  violation_consequence: Panicked rollback attempts at 2 AM, irreversible database migrations, extended outages, data loss,
    team trauma.
  teaching_example: >-
    Release checklist: (1) Rollback procedure documented. (2) Database migration reversible (tested). (3) Feature flag OFF
    by default. (4) Rollback criteria: error rate >0.5% or p99 latency >500ms. (5) Staging rollback tested. (6) On-call engineer
    aware. If ANY item is unchecked, release is blocked.
  when_applies: Any system involving deployment, CI/CD, or infrastructure automation
  when_not_applies: throwaway prototypes, learning exercises, or spike investigations where speed trumps correctness
  sources:
  - https://martinfowler.com/bliki/BlueGreenDeployment.html
  text: >-
    Rollback Plan (Every Release Has an Exit): Mountaineering — before starting a summit attempt, the team agrees on turnaround
    conditions (weather, time, oxygen).
  severity: critical
  technologies:
    lang:
    - python
    - javascript
  how_to_do_right: >-
    1. Every release has a documented rollback procedure BEFORE deployment. 2. Database migrations must be reversible (write
    both up() and down()). 3. If migration is irreversible (column drop), use expand-contract: add new, migrate data, remove
    old in separate releases. 4. Define rollback criteria: what metrics trigger a rollback? (error rate >1%, latency >2s,
    conversion drop >5%). 5. Test the rollback procedure in staging. 6. Feature flags are the preferred rollback mechanism
    (instant, no deploy). 7. Post-rollback: write incident report before re-attempting release.
  example_good: |-
    # Release checklist: (1) Rollback procedure documented.
    # (2) Database migration reversible (tested).
    # (3) Feature flag OFF by default.
    # (4) Rollback criteria: error rate >0.5% or p99 latency >500ms.
  example_bad: |-
    # Anti-pattern: Violating Rollback Plan (Every Release Has an Exit)
    # Result: Panicked rollback attempts at 2 AM
    # Result: irreversible database migrations
- id: P-PROJ-TEAM-TOPOLOGY
  name: Team Topologies
  why: >-
    Conway's Law states that system architecture mirrors organizational structure. If you want a modular system, you need
    modular teams. Matthew Skelton and Manuel Pais identified four fundamental team types that produce healthy software architectures:
    Stream-aligned (builds and owns a product slice), Enabling (helps stream-aligned teams adopt new practices), Complicated-subsystem
    (manages genuinely complex domains), and Platform (provides self-service infrastructure). Teams organized around technology
    layers (frontend team, backend team, database team) create handoffs, dependencies, and bottlenecks.
  how_to_apply: >-
    1. Stream-aligned teams: Own a user-facing capability end-to-end (from UI to database). Maximum autonomy, minimum dependencies.
    2. Platform teams: Provide self-service tools/infrastructure that stream-aligned teams consume (CI/CD, monitoring, auth
    service). 3. Enabling teams: Temporary consultants that upskill stream-aligned teams (security coaching, ML expertise).
    4. Complicated-subsystem teams: Own genuinely complex domains requiring deep specialization (real-time bidding engine,
    ML model training). 5. Minimize cross-team dependencies. 6. Define clear interfaces between teams (APIs, contracts).
  mental_model: >-
    City planning — each neighborhood (stream-aligned team) has its own shops, restaurants, and services. The city provides
    shared infrastructure (roads, electricity, water). Specialists (hospitals, universities) serve multiple neighborhoods.
  domains:
    domain:
    - management
    - architecture
    concern:
    - project
    - organization
  violation_consequence: >-
    Cross-team dependencies causing bottlenecks, component teams creating handoffs, slow delivery, architecture mirroring
    org dysfunction.
  teaching_example: >-
    BAD: Frontend Team, Backend Team, Database Team → every feature requires 3 teams to coordinate, PR review chains, and
    release synchronization. GOOD: Checkout Team (owns checkout UI + API + DB), Catalog Team (owns catalog UI + API + DB)
    → each team ships independently.
  when_applies: Any system involving systems requiring structural design decisions
  when_not_applies: throwaway prototypes, learning exercises, or spike investigations where speed trumps correctness
  sources:
  - https://teamtopologies.com/key-concepts
  text: 'Team Topologies: City planning — each neighborhood (stream-aligned team) has its own shops, restaurants, and services.'
  severity: medium
  technologies:
    domain:
    - general
  how_to_do_right: >-
    1. Stream-aligned teams: Own a user-facing capability end-to-end (from UI to database). Maximum autonomy, minimum dependencies.
    2. Platform teams: Provide self-service tools/infrastructure that stream-aligned teams consume (CI/CD, monitoring, auth
    service). 3. Enabling teams: Temporary consultants that upskill stream-aligned teams (security coaching, ML expertise).
    4. Complicated-subsystem teams: Own genuinely complex domains requiring deep specialization (real-time bidding engine,
    ML model training). 5. Minimize cross-team dependencies. 6. Define clear interfaces between teams (APIs, contracts).
  example_good: |-
    # BAD: Frontend Team, Backend Team, Database Team → every feature requires 3 teams to coordinate, PR review chains, and release synchronization.
    # GOOD: Checkout Team (owns checkout UI + API + DB), Catalog Team (owns catalog UI + API + DB) → each team ships independently.
  example_bad: |-
    # Anti-pattern: Violating Team Topologies
    # Result: Cross-team dependencies causing bottlenecks
    # Result: component teams creating handoffs
- id: P-PROJ-BROOKS
  name: Brooks's Law (Adding People to Late Projects)
  why: >-
    Adding developers to a late software project makes it later. Fred Brooks documented this in 'The Mythical Man-Month' (1975)
    and it remains true today. New developers need onboarding (taking time from existing developers), communication overhead
    grows as n(n-1)/2 (adding person #10 creates 9 new communication channels), and work must be re-divided (context switching
    costs). The only exceptions are independent, well-defined tasks with zero coordination needs — which are rare in software.
    The solution to a late project is reducing scope, not adding people.
  how_to_apply: >-
    1. When a project is late, first reduce scope (cut features, simplify requirements). 2. If adding people is unavoidable,
    add them to NEW work streams (not existing ones). 3. Budget 2-4 weeks of onboarding time before new members are productive.
    4. Assign a dedicated buddy/mentor for each new member. 5. Keep core team stable — move them to the critical path. 6.
    New members start with well-isolated, low-coordination tasks. 7. Never add people in the last 25% of the project timeline.
  mental_model: >-
    Nine women can't make a baby in one month — some tasks are inherently sequential and coordination-intensive. Adding more
    cooks to a kitchen causes collisions, not faster cooking.
  domains:
    domain:
    - management
    - planning
    concern:
    - project
    - team
  violation_consequence: >-
    Project gets later, existing team demoralized by onboarding overhead, quality drops due to split attention, new members
    frustrated by lack of context.
  teaching_example: >-
    Project is 2 weeks late with 3 developers. Manager adds 2 developers. Week 1: Original devs spend 50% onboarding new devs.
    Week 2: New devs still ramping up, original devs still context-switching. Net: Project is now 3 weeks late instead of
    2. Alternative: Cut 2 low-priority features → back on schedule.
  when_applies: All software engineering decisions
  when_not_applies: throwaway prototypes, learning exercises, or spike investigations where speed trumps correctness
  sources:
  - https://en.wikipedia.org/wiki/Brooks%27s_law
  - https://martinfowler.com/bliki/TeamRoom.html
  text: >-
    Brooks's Law (Adding People to Late Projects): Nine women can't make a baby in one month — some tasks are inherently sequential
    and coordination-intensive.
  severity: high
  technologies:
    domain:
    - general
  how_to_do_right: >-
    1. When a project is late, first reduce scope (cut features, simplify requirements). 2. If adding people is unavoidable,
    add them to NEW work streams (not existing ones). 3. Budget 2-4 weeks of onboarding time before new members are productive.
    4. Assign a dedicated buddy/mentor for each new member. 5. Keep core team stable — move them to the critical path. 6.
    New members start with well-isolated, low-coordination tasks. 7. Never add people in the last 25% of the project timeline.
  example_good: |-
    # Project is 2 weeks late with 3 developers.
    # Manager adds 2 developers.
    # Week 1: Original devs spend 50% onboarding new devs.
    # Week 2: New devs still ramping up, original devs still context-switching.
  example_bad: |-
    # Anti-pattern: Violating Brooks's Law (Adding People to Late Projects)
    # Result: Project gets later
    # Result: existing team demoralized by onboarding overhead
- id: P-PROJ-PSYCH-SAFETY
  name: Psychological Safety
  why: >-
    Google's Project Aristotle studied 180 teams and found that psychological safety was the #1 predictor of team effectiveness
    — more important than individual intelligence, skill, or experience. Psychological safety means team members feel safe
    to take risks, admit mistakes, ask questions, and challenge ideas without fear of punishment or ridicule. Without it,
    bugs are hidden, questions go unasked, and risks are not raised until they become crises. Amy Edmondson's research shows
    that teams with high psychological safety report MORE errors (because they surface them) but have BETTER outcomes.
  how_to_apply: >-
    1. Leaders go first: admit mistakes publicly ('I was wrong about X'). 2. Treat questions as signals of engagement, not
    ignorance. 3. Thank people for raising problems ('Thanks for flagging this risk early'). 4. Separate person from idea
    in disagreements ('I disagree with this approach' not 'Your idea is bad'). 5. No blame in post-mortems — focus on systems
    and processes, not people. 6. Explicitly invite dissent ('What could go wrong? Who disagrees?'). 7. Follow up on raised
    concerns — if people raise issues and nothing happens, they stop raising them.
  mental_model: >-
    Hospital where nurses can stop a surgeon without fear of retaliation — the norm saved the airline industry (CRM culture)
    and saves lives in operating rooms. The same principle saves software projects.
  domains:
    domain:
    - management
    concern:
    - project
    - team
    - leadership
  violation_consequence: >-
    Bugs hidden until production, risks not raised until crises, team members disengage ('not my problem'), turnover of best
    engineers who have options.
  teaching_example: >-
    BAD: Developer deploys a bug, manager says 'How did you miss that? We need to review your code more carefully.' Result:
    Developer never deploys on Fridays again, stops volunteering for risky work. GOOD: Manager says 'That's a tricky one.
    Let's add a test case to prevent this class of bugs. What do we need to change in our process?' Result: Team improves
    process, developer feels supported.
  when_applies: All software engineering decisions
  when_not_applies: throwaway prototypes, learning exercises, or spike investigations where speed trumps correctness
  sources:
  - https://rework.withgoogle.com/guides/understanding-team-effectiveness/steps/introduction/
