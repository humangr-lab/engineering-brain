- id: P-PROJ-TECH-DEBT
  name: Technical Debt Management
  why: >-
    Ward Cunningham coined 'technical debt' as a metaphor: shortcuts taken now accrue interest that must be paid later. Unlike
    financial debt, technical debt has COMPOUND interest — each shortcut makes the next change slower, which creates pressure
    for more shortcuts. Without systematic management, technical debt grows exponentially until the system becomes unmaintainable.
    The solution is not zero debt (impossible and unnecessary) but MANAGED debt: intentional decisions with repayment plans.
    Teams should allocate 15-20% of capacity continuously to debt reduction, not save it for 'tech debt sprints' that never
    happen.
  how_to_apply: >-
    1. Make debt visible: track in backlog with tags (not a separate shadow backlog). 2. Classify: deliberate/prudent ('We
    know this is a shortcut, we'll fix in sprint N') vs inadvertent/reckless ('What's a design pattern?'). 3. Allocate 15-20%
    of each sprint to debt reduction (not optional). 4. Prioritize by pain: debt that slows down daily work > debt that might
    cause future issues. 5. Every PR that adds debt must create a follow-up ticket (debt does not enter unmarked). 6. Measure:
    track cycle time, build time, test time as debt proxies. 7. Never let debt accumulate interest for >2 sprints.
  mental_model: >-
    Credit card — used wisely (buy now, pay next month), it's a tool. Used recklessly (minimum payments, growing balance),
    it bankrupts you. Technical debt works exactly the same way.
  domains:
    domain:
    - management
    - architecture
    concern:
    - project
    - development
  violation_consequence: >-
    Exponentially increasing development time, 'simple changes' taking days, team demoralization, inability to ship new features,
    all effort goes to maintenance.
  teaching_example: >-
    Sprint planning: 40 points capacity. 32 points (80%) feature work + 8 points (20%) tech debt reduction. Debt item: 'Replace
    raw SQL strings with ORM queries in payment module' (5 points). This prevents the 'tech debt sprint' that keeps getting
    postponed — debt is reduced continuously.
  when_applies: Any system involving systems requiring structural design decisions
  when_not_applies: throwaway prototypes, learning exercises, or spike investigations where speed trumps correctness
  sources:
  - https://martinfowler.com/bliki/TechnicalDebt.html
  text: 'Technical Debt Management: Credit card — used wisely (buy now, pay next month), it''s a tool.'
