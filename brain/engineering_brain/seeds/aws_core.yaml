layer: rules
technology: AWS
domain: cloud
knowledge: [{id: "CR-AWS-IAM-001", text: "Never use the AWS root account for day-to-day operations.", why: "The root account\
      \ has unrestricted access to all resources and billing. If compromised, an attacker can delete all resources, create\
      \ backdoor users, and run up unlimited charges. Root credentials cannot be scoped with IAM policies. AWS explicitly\
      \ warns that root usage is the #1 security risk — it bypasses every guardrail including SCPs.", how_to_do_right: "Create\
      \ an IAM admin user or use AWS SSO for daily tasks. Enable MFA on root. Store root credentials in a physical safe. Only\
      \ use root for the ~10 tasks that require it (changing account settings, restoring IAM permissions, activating IAM access\
      \ to billing).", severity: critical, technologies: {platform: [aws, iam]}, domains: {domain: [operations, security],
      concern: [cloud]}, example_good: "# Create admin user via CLI — then NEVER use root again\naws iam create-user --user-name\
      \ admin-operator\naws iam attach-user-policy --user-name admin-operator \\\n  --policy-arn arn:aws:iam::aws:policy/AdministratorAccess\n\
      aws iam create-login-profile --user-name admin-operator \\\n  --password \"ChangeMe!123\" --password-reset-required\n\
      # Enable MFA on root via console, then lock root creds away\n", example_bad: "# Using root credentials in CI/CD pipeline\n\
      export AWS_ACCESS_KEY_ID=AKIAIOSFODNN7ROOT\nexport AWS_SECRET_ACCESS_KEY=wJalrXUtnFEMI/K7MDENG/bPxRfiCYROOTKEY\naws\
      \ s3 sync ./build s3://my-production-bucket\n# Root key leaked in CI logs = total account takeover\n", when_applies: Any
      project using AWS cloud infrastructure or IAM, when_not_applies: "local-only or on-premises deployments. projects not\
      \ using AWS or IAM", sources: ["https://docs.aws.amazon.com/IAM/latest/UserGuide/best-practices.html#lock-away-credentials"]},
  {id: "CR-AWS-IAM-002", text: Enforce MFA on all human IAM users and for sensitive API operations., why: "Passwords alone\
      \ are regularly compromised through phishing, credential stuffing, and keyloggers. Without MFA, a single leaked password\
      \ grants full access to whatever that IAM user can do. AWS reports that MFA blocks 99.9% of account compromise attempts.",
    how_to_do_right: "Attach an IAM policy that denies all actions except IAM self-management unless MFA is present (aws:MultiFactorAuthPresent\
      \ condition). Use hardware MFA for root and virtual MFA (TOTP) for regular users. For CLI access, use 'aws sts get-session-token'\
      \ with MFA token.", severity: critical, technologies: {library: [sts], platform: [aws, iam]}, domains: {domain: [operations,
        security], concern: [cloud]}, example_good: "# IAM policy: deny everything unless MFA authenticated\n{\n  \"Version\"\
      : \"2012-10-17\",\n  \"Statement\": [\n    {\n      \"Sid\": \"DenyAllExceptMFASetup\",\n      \"Effect\": \"Deny\"\
      ,\n      \"NotAction\": [\n        \"iam:CreateVirtualMFADevice\",\n        \"iam:EnableMFADevice\",\n        \"iam:GetUser\"\
      ,\n        \"iam:ListMFADevices\",\n        \"iam:ResyncMFADevice\",\n        \"sts:GetSessionToken\"\n      ],\n  \
      \    \"Resource\": \"*\",\n      \"Condition\": {\n        \"BoolIfExists\": {\"aws:MultiFactorAuthPresent\": \"false\"\
      }\n      }\n    }\n  ]\n}\n", example_bad: "# IAM user with full admin access, no MFA requirement\nresource \"aws_iam_user\"\
      \ \"admin\" {\n  name = \"admin-user\"\n}\nresource \"aws_iam_user_policy_attachment\" \"admin\" {\n  user       = aws_iam_user.admin.name\n\
      \  policy_arn = \"arn:aws:iam::aws:policy/AdministratorAccess\"\n  # No MFA enforcement — password leak = full compromise\n\
      }\n", when_applies: 'Any project using AWS cloud infrastructure, IAM, or STS', when_not_applies: "local-only or on-premises\
      \ deployments", sources: ["https://docs.aws.amazon.com/IAM/latest/UserGuide/best-practices.html#enable-mfa-for-privileged-users"]},
  {id: "CR-AWS-IAM-003", text: "Use IAM roles instead of long-lived access keys for services and applications.", why: "Access\
      \ keys are static credentials that never expire unless manually rotated. They get committed to git repos, pasted in\
      \ Slack, and stored in plaintext config files. IAM roles provide temporary credentials (via STS) that automatically\
      \ rotate every hour. AWS Security Hub flags every active access key as a finding.", how_to_do_right: "For EC2: use instance\
      \ profiles. For ECS: use task roles. For Lambda: use execution roles. For cross-account: use assume-role. For developers:\
      \ use AWS SSO or 'aws sts assume-role'. Delete all long-lived access keys.", severity: critical, technologies: {library: [
        sts], platform: [aws, iam, ec2]}, domains: {domain: [operations, security], concern: [cloud]}, example_good: "# Terraform:\
      \ EC2 instance with IAM role (no access keys)\nresource \"aws_iam_role\" \"app_role\" {\n  name = \"app-server-role\"\
      \n  assume_role_policy = jsonencode({\n    Version = \"2012-10-17\"\n    Statement = [{\n      Action = \"sts:AssumeRole\"\
      \n      Effect = \"Allow\"\n      Principal = { Service = \"ec2.amazonaws.com\" }\n    }]\n  })\n}\nresource \"aws_iam_instance_profile\"\
      \ \"app_profile\" {\n  name = \"app-server-profile\"\n  role = aws_iam_role.app_role.name\n}\nresource \"aws_instance\"\
      \ \"app\" {\n  ami                  = \"ami-0c55b159cbfafe1f0\"\n  instance_type        = \"t3.medium\"\n  iam_instance_profile\
      \ = aws_iam_instance_profile.app_profile.name\n}\n", example_bad: "# Hardcoded access keys in application code\nimport\
      \ boto3\ns3 = boto3.client('s3',\n    aws_access_key_id='AKIAIOSFODNN7EXAMPLE',\n    aws_secret_access_key='wJalrXUtnFEMI/K7MDENG/bPxRfi')\n\
      # These keys will end up in git history, Docker images, logs\n", when_applies: 'Any project using AWS cloud infrastructure,
      IAM, STS, or EC2', when_not_applies: "local-only or on-premises deployments", sources: ["https://docs.aws.amazon.com/IAM/latest/UserGuide/best-practices.html#use-roles-with-ec2"]},
  {id: "CR-AWS-IAM-004", text: Use Service Control Policies (SCPs) as preventive guardrails across the organization., why: "IAM\
      \ policies only control individual accounts. Without SCPs, any account admin can grant themselves any permission — including\
      \ disabling CloudTrail, opening security groups to 0.0.0.0/0, or launching expensive GPU instances. SCPs are the ONLY\
      \ mechanism that restricts what even account admins can do.", how_to_do_right: "Attach SCPs to OUs in AWS Organizations.\
      \ Use deny-list strategy: allow everything, then explicitly deny dangerous actions (leaving the org, disabling CloudTrail/GuardDuty/Config,\
      \ creating IAM users with no MFA). Test SCPs in a sandbox OU first.", severity: high, technologies: {library: [organizations],
      platform: [aws, iam]}, domains: {domain: [operations, security, governance], concern: [cloud]}, example_good: "# SCP:\
      \ Prevent disabling security services\n{\n  \"Version\": \"2012-10-17\",\n  \"Statement\": [\n    {\n      \"Sid\":\
      \ \"ProtectSecurityServices\",\n      \"Effect\": \"Deny\",\n      \"Action\": [\n        \"cloudtrail:StopLogging\"\
      ,\n        \"cloudtrail:DeleteTrail\",\n        \"guardduty:DeleteDetector\",\n        \"guardduty:DisassociateFromMasterAccount\"\
      ,\n        \"config:StopConfigurationRecorder\",\n        \"config:DeleteConfigurationRecorder\"\n      ],\n      \"\
      Resource\": \"*\"\n    },\n    {\n      \"Sid\": \"DenyLeaveOrg\",\n      \"Effect\": \"Deny\",\n      \"Action\": \"\
      organizations:LeaveOrganization\",\n      \"Resource\": \"*\"\n    }\n  ]\n}\n", example_bad: "# No SCPs — every account\
      \ admin is a security risk\n# Developer account admin disables CloudTrail:\naws cloudtrail stop-logging --name my-trail\n\
      # Compromised account leaves the organization:\naws organizations leave-organization\n# Without SCPs, nothing prevents\
      \ these actions\n", when_applies: 'Projects using AWS cloud infrastructure, IAM, or Organizations', when_not_applies: "local-only\
      \ or on-premises deployments", sources: ["https://docs.aws.amazon.com/organizations/latest/userguide/orgs_manage_policies_scps.html"]},
  {id: "CR-AWS-IAM-005", text: "Apply least-privilege permissions using IAM Access Analyzer and policy scoping.", why: "Over-permissioned\
      \ policies (Resource: *, Action: *) are the #1 cause of blast radius expansion during security incidents. A compromised\
      \ Lambda with s3:* can exfiltrate every bucket in the account. IAM Access Analyzer identifies unused permissions so\
      \ you can safely tighten them.", how_to_do_right: "Start with AWS managed policies, then generate a custom policy from\
      \ Access Analyzer findings after 30-90 days of usage. Scope resources to specific ARNs, not wildcards. Use conditions\
      \ (aws:RequestedRegion, aws:PrincipalOrgID) to further restrict.", severity: high, technologies: {platform: [aws, iam]},
    domains: {domain: [operations, security], concern: [cloud]}, example_good: "# Scoped policy: Lambda can only read from\
      \ ONE specific bucket prefix\n{\n  \"Version\": \"2012-10-17\",\n  \"Statement\": [{\n    \"Effect\": \"Allow\",\n \
      \   \"Action\": [\"s3:GetObject\", \"s3:ListBucket\"],\n    \"Resource\": [\n      \"arn:aws:s3:::my-app-data\",\n \
      \     \"arn:aws:s3:::my-app-data/uploads/*\"\n    ],\n    \"Condition\": {\n      \"StringEquals\": {\"aws:RequestedRegion\"\
      : \"us-east-1\"}\n    }\n  }]\n}\n", example_bad: "# Overly permissive — \"just make it work\" policy\n{\n  \"Version\"\
      : \"2012-10-17\",\n  \"Statement\": [{\n    \"Effect\": \"Allow\",\n    \"Action\": \"s3:*\",\n    \"Resource\": \"\
      *\"\n  }]\n}\n# This Lambda can now read/delete EVERY bucket in the account\n", when_applies: Projects using AWS cloud
      infrastructure or IAM, when_not_applies: "local-only or on-premises deployments. projects not using AWS or IAM", sources: [
      "https://docs.aws.amazon.com/IAM/latest/UserGuide/access-analyzer-getting-started.html"]}, {id: "CR-AWS-VPC-001", text: Separate
      public and private subnets — databases and application servers go in private subnets only., why: "Resources in public\
      \ subnets get public IPs and are directly reachable from the internet. A single misconfigured security group on an RDS\
      \ instance in a public subnet exposes your entire database. Private subnets have no internet-routable IPs, adding a\
      \ fundamental network layer of defense.", how_to_do_right: "Create at least 2 public subnets (for ALB/NAT) and 2 private\
      \ subnets (for app/DB) across 2 AZs. Route public subnets through an Internet Gateway. Route private subnets through\
      \ a NAT Gateway (for outbound only). Place ALBs in public, everything else in private.", severity: critical, technologies: {
      platform: [aws, vpc, ec2, rds]}, domains: {domain: [operations, security, infrastructure], concern: [cloud, networking]},
    example_good: "# Terraform: proper public/private subnet separation\nresource \"aws_subnet\" \"public\" {\n  count   \
      \          = 2\n  vpc_id            = aws_vpc.main.id\n  cidr_block        = cidrsubnet(aws_vpc.main.cidr_block, 8,\
      \ count.index)\n  availability_zone = data.aws_availability_zones.available.names[count.index]\n  map_public_ip_on_launch\
      \ = true\n  tags = { Name = \"public-${count.index}\" }\n}\nresource \"aws_subnet\" \"private\" {\n  count         \
      \    = 2\n  vpc_id            = aws_vpc.main.id\n  cidr_block        = cidrsubnet(aws_vpc.main.cidr_block, 8, count.index\
      \ + 10)\n  availability_zone = data.aws_availability_zones.available.names[count.index]\n  map_public_ip_on_launch =\
      \ false  # No public IPs\n  tags = { Name = \"private-${count.index}\" }\n}\nresource \"aws_db_instance\" \"postgres\"\
      \ {\n  db_subnet_group_name = aws_db_subnet_group.private.name  # Private only\n  publicly_accessible  = false\n}\n",
    example_bad: "resource \"aws_db_instance\" \"postgres\" {\n  publicly_accessible = true  # Database exposed to internet!\n\
      \  # Even with security groups, this is defense-in-depth failure\n}\n", when_applies: 'Any project using AWS cloud infrastructure,
      VPC, EC2, or AWS RDS managed databases', when_not_applies: "local-only or on-premises deployments", sources: ["https://docs.aws.amazon.com/vpc/latest/userguide/VPC_Scenario2.html"]},
  {id: "CR-AWS-VPC-002", text: Use VPC endpoints for S3 and DynamoDB to avoid NAT Gateway data processing charges., why: "NAT\
      \ Gateway charges $0.045/GB for data processing. A single application doing 1TB/month of S3 transfers through NAT pays\
      \ $45/month unnecessarily. VPC Gateway Endpoints for S3 and DynamoDB are completely free and keep traffic on the AWS\
      \ private network, which is also faster and more secure.", how_to_do_right: "Create a VPC Gateway Endpoint for S3 and\
      \ DynamoDB in every VPC that uses these services. Add the endpoint to private subnet route tables. For other AWS services\
      \ (SQS, KMS, Secrets Manager), use Interface Endpoints (PrivateLink) — these cost $0.01/hr but eliminate NAT costs for\
      \ high-volume services.", severity: high, technologies: {platform: [aws, vpc, s3, dynamodb]}, domains: {domain: [operations,
        infrastructure], concern: [cloud, cost, networking]}, example_good: "# Terraform: free VPC gateway endpoint for S3\n\
      resource \"aws_vpc_endpoint\" \"s3\" {\n  vpc_id       = aws_vpc.main.id\n  service_name = \"com.amazonaws.us-east-1.s3\"\
      \n  vpc_endpoint_type = \"Gateway\"\n  route_table_ids = aws_route_table.private[*].id\n}\n# Terraform: free VPC gateway\
      \ endpoint for DynamoDB\nresource \"aws_vpc_endpoint\" \"dynamodb\" {\n  vpc_id       = aws_vpc.main.id\n  service_name\
      \ = \"com.amazonaws.us-east-1.dynamodb\"\n  vpc_endpoint_type = \"Gateway\"\n  route_table_ids = aws_route_table.private[*].id\n\
      }\n", example_bad: "# No VPC endpoints — all S3 traffic goes through NAT Gateway\n# NAT Gateway: $0.045/GB data processing\n\
      # 1 TB/month S3 traffic = $45/month wasted\n# 10 TB/month = $450/month wasted\n# VPC Gateway Endpoints for S3/DynamoDB\
      \ = $0/month\n", when_applies: 'Projects using AWS cloud infrastructure, VPC, AWS S3 object storage, or AWS DynamoDB
      NoSQL', when_not_applies: "local-only or on-premises deployments", sources: ["https://docs.aws.amazon.com/vpc/latest/privatelink/vpc-endpoints-s3.html"]},
  {id: "CR-AWS-VPC-003", text: "Use Security Groups (stateful) as primary firewall and NACLs (stateless) only for subnet-level\
      \ deny rules.", why: "Security Groups are stateful — return traffic is automatically allowed, making them simple and\
      \ reliable. NACLs are stateless — you must explicitly allow both inbound AND outbound traffic including ephemeral port\
      \ ranges, which is error-prone. Mixing both without understanding the difference causes mysterious connectivity failures\
      \ that are extremely hard to debug.", how_to_do_right: "Use Security Groups for all allow rules (ingress from ALB, ingress\
      \ from app tier, etc.). Leave NACLs at default allow-all UNLESS you need subnet-level deny rules (blocking a known bad\
      \ IP range, isolating a compromised subnet). Never duplicate SG rules in NACLs.", severity: medium, technologies: {
      platform: [aws, vpc, ec2]}, domains: {domain: [operations, security, infrastructure], concern: [cloud, networking]},
    example_good: "# Security Group: allow app tier to reach database (stateful)\nresource \"aws_security_group\" \"db\" {\n\
      \  vpc_id = aws_vpc.main.id\n  ingress {\n    from_port       = 5432\n    to_port         = 5432\n    protocol     \
      \   = \"tcp\"\n    security_groups = [aws_security_group.app.id]  # Only from app SG\n  }\n  # No egress rule needed\
      \ for return traffic — SGs are stateful\n}\n", example_bad: "# NACL attempting to replicate security group logic (stateless)\n\
      resource \"aws_network_acl_rule\" \"db_inbound\" {\n  network_acl_id = aws_network_acl.db.id\n  rule_number    = 100\n\
      \  protocol       = \"tcp\"\n  from_port      = 5432\n  to_port        = 5432\n  cidr_block     = \"10.0.0.0/16\"\n\
      \  rule_action    = \"allow\"\n  egress         = false\n}\n# FORGOT: need outbound rule for ephemeral ports 1024-65535!\n\
      # Result: connection hangs — SYN arrives but SYN-ACK is blocked\n", when_applies: 'Projects using AWS cloud infrastructure,
      VPC, or EC2', when_not_applies: "local-only or on-premises deployments", sources: ["https://docs.aws.amazon.com/vpc/latest/userguide/VPC_SecurityGroups.html"]},
  {id: "CR-AWS-VPC-004", text: Enable VPC Flow Logs for network troubleshooting and security monitoring., why: "Without flow\
      \ logs, you cannot diagnose rejected connections, detect port scanning, or identify data exfiltration. When a security\
      \ incident occurs, flow logs are the ONLY record of what network connections were made. They are required for PCI-DSS,\
      \ SOC2, and most compliance frameworks.", how_to_do_right: "Enable flow logs at the VPC level (covers all subnets and\
      \ ENIs). Send to CloudWatch Logs for real-time analysis and S3 for long-term storage. Use the custom format to include\
      \ additional fields (pkt-srcaddr, pkt-dstaddr, flow-direction). Set retention to at least 90 days.", severity: high,
    technologies: {platform: [aws, vpc, cloudwatch]}, domains: {domain: [operations, security, observability], concern: [
        cloud]}, example_good: "resource \"aws_flow_log\" \"vpc\" {\n  vpc_id               = aws_vpc.main.id\n  traffic_type\
      \         = \"ALL\"  # ACCEPT + REJECT\n  log_destination_type = \"s3\"\n  log_destination      = \"${aws_s3_bucket.flow_logs.arn}/vpc-flow-logs/\"\
      \n  max_aggregation_interval = 60  # 1-minute granularity\n  log_format = \"$${version} $${account-id} $${interface-id}\
      \ $${srcaddr} $${dstaddr} $${srcport} $${dstport} $${protocol} $${packets} $${bytes} $${start} $${end} $${action} $${log-status}\
      \ $${flow-direction}\"\n}\n", example_bad: "# No flow logs enabled\n# Security incident occurs — no way to determine:\n\
      # - What IP accessed the compromised instance\n# - What data was exfiltrated and to where\n# - Whether lateral movement\
      \ occurred\n# Compliance audit fails — no network logging evidence\n", when_applies: 'Projects using AWS cloud infrastructure,
      VPC, or CloudWatch', when_not_applies: "local-only or on-premises deployments", sources: ["https://docs.aws.amazon.com/vpc/latest/userguide/flow-logs.html"]},
  {id: "CR-AWS-S3-001", text: Block public access at the account level and use bucket policies instead of ACLs., why: "S3\
      \ ACLs are a legacy access control mechanism that is confusing and error-prone. A single 'public-read' ACL makes an\
      \ entire bucket world-readable. AWS has documented hundreds of data breaches from misconfigured S3 ACLs. Account-level\
      \ block public access is a safety net that prevents any bucket from being accidentally made public.", how_to_do_right: "Enable\
      \ S3 Block Public Access at the account level (all 4 settings). Disable ACLs (BucketOwnerEnforced). Use bucket policies\
      \ for all access control — they are auditable, version-controlled, and explicit.", severity: critical, technologies: {
      platform: [aws, s3]}, domains: {domain: [operations, security], concern: [cloud]}, example_good: "# Terraform: account-level\
      \ block public access\nresource \"aws_s3_account_public_access_block\" \"account\" {\n  block_public_acls       = true\n\
      \  block_public_policy     = true\n  ignore_public_acls      = true\n  restrict_public_buckets = true\n}\n# Bucket with\
      \ ACLs disabled\nresource \"aws_s3_bucket_ownership_controls\" \"data\" {\n  bucket = aws_s3_bucket.data.id\n  rule\
      \ { object_ownership = \"BucketOwnerEnforced\" }  # Disables ACLs\n}\n", example_bad: "resource \"aws_s3_bucket\" \"\
      uploads\" {\n  bucket = \"customer-uploads\"\n  acl    = \"public-read\"  # Every object is world-readable!\n}\n# Real\
      \ breach: Capital One (2019), Twitch (2021), US military (2017)\n# all involved misconfigured S3 public access\n", when_applies: Any
      project using AWS cloud infrastructure or AWS S3 object storage, when_not_applies: "local-only or on-premises deployments.\
      \ projects not using AWS or S3", sources: ["https://docs.aws.amazon.com/AmazonS3/latest/userguide/access-control-block-public-access.html"]},
  {id: "CR-AWS-S3-002", text: Enable versioning and lifecycle rules on all S3 buckets that store important data., why: "Without\
      \ versioning, accidental deletion or overwrite is permanent and unrecoverable. Ransomware attacks specifically target\
      \ S3 buckets without versioning — they overwrite objects with encrypted versions and demand payment. Lifecycle rules\
      \ prevent storage costs from growing indefinitely by transitioning old versions to cheaper tiers and eventually deleting\
      \ them.", how_to_do_right: "Enable versioning on all non-ephemeral buckets. Add lifecycle rules: transition current\
      \ objects to Intelligent-Tiering after 30 days, transition noncurrent versions to Glacier after 90 days, delete noncurrent\
      \ versions after 365 days. For compliance buckets, use Object Lock (WORM).", severity: high, technologies: {platform: [
        aws, s3]}, domains: {domain: [operations, security], concern: [cloud, cost]}, example_good: "resource \"aws_s3_bucket_versioning\"\
      \ \"data\" {\n  bucket = aws_s3_bucket.data.id\n  versioning_configuration { status = \"Enabled\" }\n}\nresource \"\
      aws_s3_bucket_lifecycle_configuration\" \"data\" {\n  bucket = aws_s3_bucket.data.id\n  rule {\n    id     = \"archive-and-cleanup\"\
      \n    status = \"Enabled\"\n    transition {\n      days          = 30\n      storage_class = \"INTELLIGENT_TIERING\"\
      \n    }\n    noncurrent_version_transition {\n      noncurrent_days = 90\n      storage_class   = \"GLACIER\"\n    }\n\
      \    noncurrent_version_expiration {\n      noncurrent_days = 365\n    }\n  }\n}\n", example_bad: "resource \"aws_s3_bucket\"\
      \ \"data\" {\n  bucket = \"important-customer-data\"\n  # No versioning — accidental delete is permanent\n  # No lifecycle\
      \ — storage costs grow forever\n  # No Object Lock — ransomware can overwrite everything\n}\n", when_applies: Projects
      using AWS cloud infrastructure or AWS S3 object storage, when_not_applies: "local-only or on-premises deployments. projects\
      \ not using AWS or S3", sources: ["https://docs.aws.amazon.com/AmazonS3/latest/userguide/Versioning.html"]}, {id: "CR-AWS-S3-003",
    text: "Enable server-side encryption — use SSE-KMS for sensitive data, SSE-S3 for everything else.", why: "Unencrypted\
      \ S3 objects can be read by anyone who gains access to the underlying storage (AWS insider threat, disk disposal, hardware\
      \ theft). SSE-S3 is free and automatic. SSE-KMS adds audit trail (CloudTrail logs every decryption) and access control\
      \ (KMS key policy), but costs $0.03 per 10K requests. Without encryption, compliance audits (HIPAA, PCI, SOC2) will\
      \ fail.", how_to_do_right: "Set default encryption on every bucket. Use SSE-S3 (AES-256) for general data. Use SSE-KMS\
      \ with a customer-managed key for PII, financial data, or anything requiring audit trail. Add a bucket policy that denies\
      \ PUT without encryption header.", severity: high, technologies: {library: [kms], platform: [aws, s3]}, domains: {domain: [
        operations, security], concern: [cloud]}, example_good: "# Default encryption with KMS for sensitive bucket\nresource\
      \ \"aws_s3_bucket_server_side_encryption_configuration\" \"sensitive\" {\n  bucket = aws_s3_bucket.sensitive.id\n  rule\
      \ {\n    apply_server_side_encryption_by_default {\n      sse_algorithm     = \"aws:kms\"\n      kms_master_key_id =\
      \ aws_kms_key.s3_encryption.arn\n    }\n    bucket_key_enabled = true  # Reduces KMS API costs by 99%\n  }\n}\n# Deny\
      \ unencrypted uploads\nresource \"aws_s3_bucket_policy\" \"deny_unencrypted\" {\n  bucket = aws_s3_bucket.sensitive.id\n\
      \  policy = jsonencode({\n    Version = \"2012-10-17\"\n    Statement = [{\n      Sid       = \"DenyUnencryptedPut\"\
      \n      Effect    = \"Deny\"\n      Principal = \"*\"\n      Action    = \"s3:PutObject\"\n      Resource  = \"${aws_s3_bucket.sensitive.arn}/*\"\
      \n      Condition = {\n        StringNotEquals = { \"s3:x-amz-server-side-encryption\": \"aws:kms\" }\n      }\n   \
      \ }]\n  })\n}\n", example_bad: "resource \"aws_s3_bucket\" \"customer_pii\" {\n  bucket = \"customer-pii-data\"\n  #\
      \ No encryption configuration\n  # Objects stored in plaintext on disk\n  # CloudTrail has no record of who accessed\
      \ what\n}\n", when_applies: 'Projects using AWS cloud infrastructure, AWS S3 object storage, or KMS', when_not_applies: "local-only\
      \ or on-premises deployments", sources: ["https://docs.aws.amazon.com/AmazonS3/latest/userguide/serv-side-encryption.html"]},
  {id: "CR-AWS-S3-004", text: "Use presigned URLs for temporary, scoped access to S3 objects — never make buckets public for\
      \ sharing.", why: "Making a bucket or object public to share files is the most common S3 security mistake. Presigned\
      \ URLs grant time-limited access (default 1 hour, max 7 days) to a specific object without requiring AWS credentials.\
      \ The URL expires and cannot be reused, providing secure transient access.", how_to_do_right: "Generate presigned URLs\
      \ server-side using the AWS SDK. Set expiration to the minimum needed (15 minutes for downloads, 1 hour for uploads).\
      \ Include conditions for upload presigned URLs (content-type, content-length-range). Never expose the bucket or objects\
      \ publicly.", severity: high, technologies: {platform: [aws, s3]}, domains: {domain: [operations, security], concern: [
        cloud]}, example_good: "import boto3\nfrom botocore.config import Config\n\ns3 = boto3.client('s3', config=Config(signature_version='s3v4'))\n\
      \n# Download URL — expires in 15 minutes\ndownload_url = s3.generate_presigned_url(\n    'get_object',\n    Params={'Bucket':\
      \ 'my-private-bucket', 'Key': 'reports/q4.pdf'},\n    ExpiresIn=900  # 15 minutes\n)\n\n# Upload URL with content restrictions\n\
      upload_url = s3.generate_presigned_url(\n    'put_object',\n    Params={\n        'Bucket': 'my-private-bucket',\n \
      \       'Key': f'uploads/{user_id}/{filename}',\n        'ContentType': 'application/pdf',\n    },\n    ExpiresIn=3600\
      \  # 1 hour\n)\n", example_bad: "# Making bucket public \"temporarily\" for file sharing\naws s3api put-bucket-acl --bucket\
      \ reports --acl public-read\n# \"I'll change it back later\" — you won't, and bots will find it\n", when_applies: Projects
      using AWS cloud infrastructure or AWS S3 object storage, when_not_applies: "local-only or on-premises deployments. projects\
      \ not using AWS or S3", sources: ["https://docs.aws.amazon.com/AmazonS3/latest/userguide/ShareObjectPreSignedURL.html"]},
  {id: "CR-AWS-EC2-001", text: 'Choose EC2 instance types based on workload profile — compute, memory, or storage optimized.',
    why: "Running a memory-intensive database on a compute-optimized instance (c-series) wastes money on CPU you don't use\
      \ while starving the application of RAM. Conversely, running CPU-bound batch processing on a memory-optimized instance\
      \ (r-series) pays for unused RAM. Wrong instance type selection is the most common source of AWS overspend — often 2-3x\
      \ more expensive than necessary.", how_to_do_right: "Profile your workload: CPU-bound (video encoding, ML training)\
      \ → c-series. Memory-bound (databases, caching) → r-series. Balanced (web servers, app servers) → m-series. Storage-bound\
      \ (data warehousing) → i/d-series. Use AWS Compute Optimizer for recommendations based on actual CloudWatch metrics.",
    severity: medium, technologies: {platform: [aws, ec2]}, domains: {domain: [operations, performance], concern: [cloud,
        cost]}, example_good: "# Terraform: right-sized instances by workload\n# Web/app servers — balanced\nresource \"aws_instance\"\
      \ \"web\" {\n  instance_type = \"m6i.large\"    # 2 vCPU, 8 GiB RAM, balanced\n}\n# Redis cache — memory optimized\n\
      resource \"aws_instance\" \"cache\" {\n  instance_type = \"r6i.xlarge\"   # 4 vCPU, 32 GiB RAM, memory-heavy\n}\n# Batch\
      \ processing — compute optimized\nresource \"aws_instance\" \"batch\" {\n  instance_type = \"c6i.2xlarge\"  # 8 vCPU,\
      \ 16 GiB RAM, CPU-heavy\n}\n", example_bad: "# \"Just use the biggest instance\" approach\nresource \"aws_instance\"\
      \ \"everything\" {\n  instance_type = \"m5.4xlarge\"  # 16 vCPU, 64 GiB — $0.768/hr\n  # Actual usage: 5% CPU, 4 GiB\
      \ RAM\n  # Right size: t3.medium — $0.0416/hr (18x cheaper)\n}\n", when_applies: Projects using AWS cloud infrastructure
      or EC2, when_not_applies: "local-only or on-premises deployments. projects not using AWS or EC2", sources: ["https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/instance-types.html"]},
  {id: "CR-AWS-EC2-002", text: "Use a mix of Spot, Reserved, and On-Demand instances for cost optimization — never run 100%\
      \ On-Demand for steady workloads.", why: "On-Demand pricing is AWS's highest price tier. Reserved Instances (1yr no-upfront)\
      \ save 30-40%. Spot Instances save 60-90% for fault-tolerant workloads. A production fleet running 100% On-Demand for\
      \ months is leaving 40-70% cost savings on the table. For a 10-instance fleet at m5.xlarge, that is $15K-$25K/year wasted.",
    how_to_do_right: "Baseline (always-on) workloads → 1yr or 3yr Reserved/Savings Plans. Variable workloads (batch, CI/CD,\
      \ testing) → Spot with fallback to On-Demand. Peak traffic → On-Demand Auto Scaling. Use Spot Fleet with capacity-optimized\
      \ strategy and multiple instance types for availability.", severity: high, technologies: {library: [auto scaling], platform: [
        aws, ec2]}, domains: {domain: [operations], concern: [cloud, cost]}, example_good: "# Terraform: Auto Scaling group\
      \ with mixed instances\nresource \"aws_autoscaling_group\" \"app\" {\n  mixed_instances_policy {\n    instances_distribution\
      \ {\n      on_demand_base_capacity                  = 2     # 2 always On-Demand\n      on_demand_percentage_above_base_capacity\
      \ = 25    # 25% On-Demand above base\n      spot_allocation_strategy                 = \"capacity-optimized\"\n    }\n\
      \    launch_template {\n      launch_template_specification {\n        launch_template_id = aws_launch_template.app.id\n\
      \      }\n      override {\n        instance_type = \"m5.xlarge\"\n      }\n      override {\n        instance_type\
      \ = \"m5a.xlarge\"  # AMD alternative — cheaper\n      }\n      override {\n        instance_type = \"m6i.xlarge\" \
      \ # Newer gen fallback\n      }\n    }\n  }\n}\n", example_bad: "# 20 On-Demand instances running 24/7 for 6 months\n\
      resource \"aws_instance\" \"app\" {\n  count         = 20\n  instance_type = \"m5.xlarge\"\n  # Cost: 20 * $0.192/hr\
      \ * 8760 hrs = $33,638/year\n  # With Reserved (1yr): $23,000/year — saves $10,638\n  # With 70% Spot: ~$14,000/year\
      \ — saves $19,638\n", when_applies: 'Projects using AWS cloud infrastructure, EC2, or Auto Scaling', when_not_applies: "local-only\
      \ or on-premises deployments", sources: ["https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/using-spot-instances.html"]},
  {id: "CR-AWS-EC2-003", text: "Use gp3 EBS volumes instead of gp2 — better performance at lower cost with independent IOPS/throughput\
      \ tuning.", why: "gp2 volumes tie IOPS to volume size (3 IOPS per GiB). To get 10,000 IOPS, you need a 3.3TB volume\
      \ even if you only need 100GB of storage. gp3 provides a baseline of 3,000 IOPS and 125 MB/s throughput regardless of\
      \ size, and lets you scale IOPS and throughput independently. gp3 is 20% cheaper per GB than gp2 at baseline.", how_to_do_right: "Use\
      \ gp3 as the default volume type for all new EBS volumes. Set IOPS and throughput based on actual workload needs. For\
      \ very high IOPS (>16,000), use io2 Block Express. Migrate existing gp2 volumes to gp3 using 'modify-volume' (no downtime).",
    severity: medium, technologies: {library: [ebs], platform: [aws, ec2]}, domains: {domain: [operations, performance], concern: [
        cloud, cost]}, example_good: "resource \"aws_ebs_volume\" \"data\" {\n  availability_zone = \"us-east-1a\"\n  size\
      \              = 100    # 100 GiB — pay for what you need\n  type              = \"gp3\"\n  iops              = 5000\
      \   # Independent of size\n  throughput        = 250    # MB/s — independent of size\n  encrypted         = true\n}\n\
      # Cost: 100 GiB * $0.08/GiB + 2000 extra IOPS * $0.005 = $18/month\n", example_bad: "resource \"aws_ebs_volume\" \"\
      data\" {\n  availability_zone = \"us-east-1a\"\n  size              = 1700   # 1.7 TiB just to get 5,100 IOPS!\n  type\
      \              = \"gp2\"  # IOPS tied to size: 3 per GiB\n  encrypted         = true\n}\n# Cost: 1700 GiB * $0.10/GiB\
      \ = $170/month (vs $18 on gp3)\n", when_applies: 'Projects using AWS cloud infrastructure, EC2, or EBS', when_not_applies: "local-only\
      \ or on-premises deployments", sources: ["https://docs.aws.amazon.com/ebs/latest/userguide/general-purpose.html"]},
  {id: "CR-AWS-LAMBDA-001", text: "Mitigate Lambda cold starts with provisioned concurrency for latency-critical functions,\
      \ SnapStart for Java.", why: "Lambda cold starts add 200ms-5s of latency (depending on runtime, VPC config, and package\
      \ size). For APIs with SLA requirements, a p99 latency spike from cold starts can breach SLOs. Provisioned concurrency\
      \ keeps N instances warm at all times. SnapStart (Java only) snapshots initialized state, reducing cold starts from\
      \ 5s to <200ms.", how_to_do_right: "Identify latency-critical functions (API-facing, real-time processing). Set provisioned\
      \ concurrency to handle baseline traffic. Use Application Auto Scaling to adjust provisioned concurrency by schedule\
      \ or utilization. For non-critical functions, optimize package size and use layers for shared dependencies.", severity: high,
    technologies: {platform: [aws, lambda]}, domains: {domain: [operations, performance], concern: [cloud]}, example_good: "#\
      \ Terraform: Provisioned concurrency with auto-scaling\nresource \"aws_lambda_provisioned_concurrency_config\" \"api\"\
      \ {\n  function_name                  = aws_lambda_function.api.function_name\n  provisioned_concurrent_executions =\
      \ 10\n  qualifier                      = aws_lambda_alias.live.name\n}\nresource \"aws_appautoscaling_target\" \"lambda\"\
      \ {\n  max_capacity       = 50\n  min_capacity       = 10\n  resource_id        = \"function:${aws_lambda_function.api.function_name}:${aws_lambda_alias.live.name}\"\
      \n  scalable_dimension = \"lambda:function:ProvisionedConcurrency\"\n  service_namespace  = \"lambda\"\n}\nresource\
      \ \"aws_appautoscaling_policy\" \"lambda\" {\n  name               = \"lambda-utilization\"\n  resource_id        =\
      \ aws_appautoscaling_target.lambda.resource_id\n  scalable_dimension = aws_appautoscaling_target.lambda.scalable_dimension\n\
      \  service_namespace  = aws_appautoscaling_target.lambda.service_namespace\n  policy_type        = \"TargetTrackingScaling\"\
      \n  target_tracking_scaling_policy_configuration {\n    target_value = 0.7  # Scale at 70% utilization\n    predefined_metric_specification\
      \ {\n      predefined_metric_type = \"LambdaProvisionedConcurrencyUtilization\"\n    }\n  }\n}\n", example_bad: "# API\
      \ Lambda with no cold start mitigation\nresource \"aws_lambda_function\" \"api\" {\n  runtime     = \"python3.12\"\n\
      \  memory_size = 128     # Minimum memory = slowest CPU\n  timeout     = 30\n  # In VPC with NAT — cold start: 3-8 seconds\n\
      \  # No provisioned concurrency\n  # p99 latency: 5000ms+ (API SLO: 500ms)\n}\n", when_applies: Projects using AWS cloud
      infrastructure or AWS Lambda serverless functions, when_not_applies: "local-only or on-premises deployments. projects\
      \ not using AWS or Lambda", sources: ["https://docs.aws.amazon.com/lambda/latest/dg/provisioned-concurrency.html"]},
  {id: "CR-AWS-LAMBDA-002", text: "Lambda memory = CPU allocation — increase memory to get more CPU for compute-bound functions.",
    why: "Lambda allocates CPU proportionally to memory. At 128MB, you get a fraction of one vCPU. At 1769MB, you get exactly\
      \ 1 full vCPU. At 10240MB (max), you get 6 vCPUs. A function that takes 10 seconds at 128MB might take 1 second at 1024MB\
      \ — and cost LESS because Lambda bills by GB-seconds. AWS Lambda Power Tuning tool empirically finds the optimal memory\
      \ setting.", how_to_do_right: "Run AWS Lambda Power Tuning (open-source Step Functions tool) against your function.\
      \ It tests multiple memory configs and plots cost vs duration. Most functions have a sweet spot where increasing memory\
      \ actually decreases total cost. Set memory to that sweet spot.", severity: medium, technologies: {platform: [aws, lambda]},
    domains: {domain: [operations, performance], concern: [cloud, cost]}, example_good: "# Lambda Power Tuning result for\
      \ a data processing function:\n#   128MB  → 10.0s → $0.000021 per invocation\n#   512MB  →  3.1s → $0.000026 per invocation\n\
      #  1024MB  →  1.6s → $0.000027 per invocation  ← best latency/cost\n#  2048MB  →  1.5s → $0.000050 per invocation\n\n\
      resource \"aws_lambda_function\" \"processor\" {\n  function_name = \"data-processor\"\n  runtime       = \"python3.12\"\
      \n  memory_size   = 1024   # 1 full vCPU — optimal from power tuning\n  timeout       = 30\n}\n", example_bad: "# Default\
      \ 128MB memory — slowest possible CPU\nresource \"aws_lambda_function\" \"processor\" {\n  function_name = \"data-processor\"\
      \n  runtime       = \"python3.12\"\n  memory_size   = 128  # Fraction of vCPU — 10s execution\n  timeout       = 60\
      \   # Need long timeout because it's so slow\n  # Costs MORE per invocation despite less memory!\n}\n", when_applies: Projects
      using AWS cloud infrastructure or AWS Lambda serverless functions, when_not_applies: "local-only or on-premises deployments.\
      \ projects not using AWS or Lambda", sources: ["https://docs.aws.amazon.com/lambda/latest/dg/configuration-memory.html"]},
  {id: "CR-AWS-LAMBDA-003", text: Use Lambda Layers for shared dependencies and keep deployment packages small., why: "Large\
      \ deployment packages (>50MB zipped) slow down deployments, increase cold start time, and make iterating painful. Lambda\
      \ Layers let you share common dependencies (boto3, pandas, numpy, shared utilities) across functions without bundling\
      \ them in every package. Layers are cached by Lambda, reducing cold start for subsequent invocations.", how_to_do_right: "Create\
      \ layers for: (1) common Python/Node packages (pandas, requests, etc.), (2) shared business logic, (3) binary dependencies\
      \ (ffmpeg, imagemagick). Keep function code under 5MB zipped. Use up to 5 layers per function. Version layers and pin\
      \ specific versions in function configs.", severity: medium, technologies: {platform: [aws, lambda]}, domains: {domain: [
        operations, performance], concern: [cloud]}, example_good: "# Layer for shared Python dependencies\nresource \"aws_lambda_layer_version\"\
      \ \"common_deps\" {\n  layer_name          = \"common-python-deps\"\n  compatible_runtimes = [\"python3.12\"]\n  filename\
      \            = \"layers/common-deps.zip\"\n  # Contains: requests, pydantic, boto3 (newer version)\n}\nresource \"aws_lambda_function\"\
      \ \"api\" {\n  filename      = \"functions/api.zip\"  # Small — only app code\n  layers        = [aws_lambda_layer_version.common_deps.arn]\n\
      \  memory_size   = 1024\n  runtime       = \"python3.12\"\n}\n# Deploy function code changes in seconds, not minutes\n",
    example_bad: "# Every function bundles all dependencies — 200MB each\nresource \"aws_lambda_function\" \"api\" {\n  filename\
      \    = \"functions/api-with-all-deps.zip\"  # 200MB!\n  memory_size = 128\n  runtime     = \"python3.12\"\n  # Cold\
      \ start: 3-5s (loading 200MB package)\n  # Deploy time: 60s+ (uploading 200MB)\n  # 10 functions = 2GB total S3 storage\
      \ for identical deps\n}\n", when_applies: Projects using AWS cloud infrastructure or AWS Lambda serverless functions,
    when_not_applies: "local-only or on-premises deployments. projects not using AWS or Lambda", sources: ["https://docs.aws.amazon.com/lambda/latest/dg/chapter-layers.html"]},
  {id: "CR-AWS-LAMBDA-004", text: Always configure a Dead Letter Queue (DLQ) on async Lambda invocations to capture failed
      events., why: "When an async Lambda invocation fails all retry attempts (default: 2 retries), the event is silently\
      \ dropped. For critical workflows (S3 event processing, SNS notifications, EventBridge rules), a dropped event means\
      \ lost data with no trace. A DLQ captures these failed events for investigation and replay.", how_to_do_right: "Configure\
      \ an SQS DLQ or SNS topic as the on-failure destination for every async Lambda. Set maxRetryAttempts to 2 (default).\
      \ Monitor the DLQ with a CloudWatch alarm (ApproximateNumberOfMessagesVisible > 0). Build a replay mechanism to re-process\
      \ DLQ messages after fixing the root cause.", severity: high, technologies: {platform: [aws, lambda, sqs]}, domains: {
      domain: [operations, reliability], concern: [cloud]}, example_good: "# Lambda with DLQ for failed async invocations\n\
      resource \"aws_sqs_queue\" \"lambda_dlq\" {\n  name                       = \"processor-dlq\"\n  message_retention_seconds\
      \  = 1209600  # 14 days\n}\nresource \"aws_lambda_function\" \"processor\" {\n  function_name = \"event-processor\"\n\
      \  runtime       = \"python3.12\"\n  dead_letter_config {\n    target_arn = aws_sqs_queue.lambda_dlq.arn\n  }\n}\n#\
      \ CloudWatch alarm on DLQ depth\nresource \"aws_cloudwatch_metric_alarm\" \"dlq_depth\" {\n  alarm_name          = \"\
      processor-dlq-has-messages\"\n  namespace           = \"AWS/SQS\"\n  metric_name         = \"ApproximateNumberOfMessagesVisible\"\
      \n  dimensions          = { QueueName = aws_sqs_queue.lambda_dlq.name }\n  comparison_operator = \"GreaterThanThreshold\"\
      \n  threshold           = 0\n  evaluation_periods  = 1\n  period              = 60\n  statistic           = \"Sum\"\n\
      \  alarm_actions       = [aws_sns_topic.alerts.arn]\n}\n", example_bad: "# Async Lambda with no DLQ\nresource \"aws_lambda_function\"\
      \ \"processor\" {\n  function_name = \"event-processor\"\n  runtime       = \"python3.12\"\n  # No dead_letter_config\n\
      \  # S3 upload triggers this function\n  # If it fails twice → event silently dropped\n  # Customer uploaded file is\
      \ never processed — no alert, no trace\n}\n", when_applies: 'Projects using AWS cloud infrastructure, AWS Lambda serverless
      functions, or AWS SQS message queues', when_not_applies: "local-only or on-premises deployments", sources: ["https://docs.aws.amazon.com/lambda/latest/dg/invocation-async.html#invocation-dlq"]}]
