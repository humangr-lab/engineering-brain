- id: CR-DIST-SERVICEMESH-001
  text: Service Mesh — Use a sidecar proxy (Envoy/Istio/Linkerd) for cross-cutting concerns (mTLS, retries, circuit breaking,
    observability) instead of implementing them in every service.
  why: 'Without a service mesh, every service must implement its own retry logic, circuit breakers, TLS, rate limiting, and
    tracing propagation. In a polyglot environment (Python, Go, Java services), this means implementing the same patterns
    in 3 different languages, maintaining 3 different libraries, and hoping they all behave consistently. A service mesh moves
    these concerns to the infrastructure layer: a sidecar proxy handles retries, mTLS, circuit breaking, and tracing for every
    service regardless of language. The application code focuses on business logic. Istio and Linkerd are the most deployed
    service meshes, used by organizations with 50+ microservices.'
  how_to_do_right: '1. Deploy sidecar proxies (Envoy) alongside each service — all traffic passes through the proxy.

    2. mTLS: automatic encryption between services with certificate rotation.

    3. Retry policies: configured per-route in the mesh, not in application code.

    4. Circuit breaking: configured per-upstream service with failure thresholds.

    5. Observability: automatic distributed tracing, metrics, and access logging.

    6. Start with Linkerd (simpler) or Istio (more features). Migrate incrementally.

    '
  severity: medium
  technologies:
    platform: [service_mesh, istio, linkerd, envoy, kubernetes]
  domains:
    domain: [architecture, infrastructure]
    concern: [distributed_systems, networking]
