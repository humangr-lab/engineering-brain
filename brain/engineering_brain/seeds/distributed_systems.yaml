- id: CR-DIST-CORRELID-001
  text: Correlation IDs — Generate a unique correlation ID at the edge (API gateway/first service) and propagate it through
    all downstream calls and log entries.
  why: Even with distributed tracing, you need a human-readable identifier to search logs across all services for a specific
    request. Trace IDs are 32-character hex strings optimized for tracing backends. Correlation IDs (often the same as trace
    IDs, but can be user-friendly) appear in every log line, making it possible to grep across services. When a user reports
    'my order failed at 2:15 PM', you search for the correlation ID from the API gateway log and instantly find all related
    log entries across all services. Without correlation IDs, you search by timestamp ranges and guess which log entries are
    related.
  how_to_do_right: '1. Generate correlation ID at the API gateway or first service: UUID v4 or ULID.

    2. Accept X-Correlation-ID header from clients (for client-side troubleshooting).

    3. Include correlation ID in every log entry using structured logging.

    4. Propagate via HTTP headers (X-Correlation-ID), message metadata, and async job context.

    5. Return the correlation ID in API responses so users can reference it in support tickets.

    6. Store correlation ID in database records for end-to-end audit trails.

    '
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi, flask, structlog]
  domains:
    domain: [architecture, observability, quality]
    concern: [distributed_systems, debugging]
  example_good: "import uuid\nimport structlog\nfrom contextvars import ContextVar\nfrom starlette.middleware.base import\
    \ BaseHTTPMiddleware\n\ncorrelation_id_var: ContextVar[str] = ContextVar(\"correlation_id\", default=\"\")\n\nclass CorrelationMiddleware(BaseHTTPMiddleware):\n\
    \    async def dispatch(self, request, call_next):\n        # Accept from client or generate new\n        corr_id = request.headers.get(\"\
    X-Correlation-ID\", str(uuid.uuid4()))\n        correlation_id_var.set(corr_id)\n\n        # Bind to all log entries in\
    \ this request\n        structlog.contextvars.bind_contextvars(correlation_id=corr_id)\n\n        response = await call_next(request)\n\
    \        # Return in response for client-side troubleshooting\n        response.headers[\"X-Correlation-ID\"] = corr_id\n\
    \        return response\n\n# All downstream HTTP calls include the correlation ID\nasync def call_downstream(client:\
    \ AsyncClient, url: str, **kwargs):\n    corr_id = correlation_id_var.get()\n    headers = kwargs.pop(\"headers\", {})\n\
    \    headers[\"X-Correlation-ID\"] = corr_id\n    return await client.get(url, headers=headers, **kwargs)\n\n# Every log\
    \ entry automatically includes correlation_id\nlogger = structlog.get_logger()\nlogger.info(\"order_created\", order_id=\"\
    abc123\")\n# Output: {\"event\": \"order_created\", \"order_id\": \"abc123\", \"correlation_id\": \"550e8400-...\"}\n"
  example_bad: "# No correlation ID — logs cannot be correlated across services\nimport logging\nlogger = logging.getLogger(__name__)\n\
