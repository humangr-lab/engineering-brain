  example_good: "# Kong API Gateway configuration\n# Route: /api/v1/orders → order-service\nservices:\n  - name: order-service\n\
    \    url: http://order-service.internal:8080\n    routes:\n      - name: orders-route\n        paths: [\"/api/v1/orders\"\
    ]\n        methods: [\"GET\", \"POST\", \"PUT\"]\n    plugins:\n      - name: jwt                         # Auth at gateway\n\
    \        config:\n          claims_to_verify: [\"exp\"]\n      - name: rate-limiting               # Rate limit at gateway\n\
    \        config:\n          minute: 100\n          policy: redis\n      - name: request-transformer         # Inject user\
    \ context for backend\n        config:\n          add:\n            headers: [\"X-User-ID:$(jwt.sub)\"]\n\n# Backend service:\
    \ NO auth logic needed — trusts X-User-ID from gateway\n# @app.get(\"/orders\")\n# async def list_orders(request: Request):\n\
    #     user_id = request.headers[\"X-User-ID\"]  # Already verified by gateway\n#     return await order_repo.list_by_user(user_id)\n"
  example_bad: '# No API gateway — clients call services directly

    # Mobile app must:

    # 1. Know the URL of each service (order-service.api.com, user-service.api.com, ...)

    # 2. Authenticate with EACH service separately

    # 3. Make 5 HTTP calls to render one page (user profile + orders + recommendations + ...)

    # 4. Handle different error formats from each service


    # Problems:

    # - Rate limiting? Each service implements its own (inconsistently)

    # - Auth? Each service validates tokens (duplicated logic)

    # - Service moved to new URL? All clients must update

    # - Need to aggregate data? Client makes N+1 calls over the network

    '
  sources: ["https://microservices.io/patterns/apigateway.html"]
  when_applies: "When routing, authenticating, and rate-limiting external traffic into a microservice architecture"
