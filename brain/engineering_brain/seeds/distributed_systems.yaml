- id: CR-DIST-CHAOS-001
  text: Chaos Engineering — Systematically inject controlled failures (network delays, service crashes, disk full) into production
    to verify resilience before real failures occur.
  why: 'Testing in staging does not catch all failure modes because staging environments have different traffic patterns,
    data volumes, and infrastructure configurations than production. Chaos engineering proactively injects failures into production
    in a controlled manner: kill a random service instance, inject 500ms network latency, fill up a disk, revoke a database
    connection. If your system degrades gracefully under these conditions, it will handle real failures. Netflix''s Chaos
    Monkey randomly terminates production instances — this practice helped them maintain 99.99% uptime despite frequent infrastructure
    failures. Organizations that practice chaos engineering report 60% faster incident resolution because teams have already
    practiced failure scenarios.'
  how_to_do_right: '1. Start small: inject one failure type in one service during business hours with the team watching.

    2. Define steady state: what metrics define ''healthy''? (error rate <1%, latency P99 <500ms).

    3. Hypothesize: ''If we kill one instance of service X, error rate should stay below 1%.''

    4. Inject the failure. Observe if steady state is maintained.

    5. If steady state breaks: you found a weakness. Fix it. Then re-run the experiment.

    6. Gradually increase scope: more failure types, more services, automated game days.

    '
  severity: high
  technologies:
