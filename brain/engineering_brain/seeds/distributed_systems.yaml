layer: patterns
technology: General
domain: distributed_systems
knowledge:
- id: CR-DIST-RAFT-001
  text: Raft Consensus — Use Raft for leader election and replicated state machines. Understand the leader election, log replication,
    and safety properties.
  why: 'Distributed systems need agreement on state (who is the leader, what is the current value, which transactions committed).
    Without consensus, split-brain scenarios occur: two nodes both think they are the leader and accept conflicting writes.
    Raft was designed as an understandable alternative to Paxos. It guarantees that once a log entry is committed, all nodes
    will eventually have it, and no two leaders exist in the same term. etcd, CockroachDB, and TiDB all use Raft. A Kubernetes
    cluster without proper etcd consensus lost 2 hours of deployments because two etcd members diverged and accepted conflicting
    pod schedules.'
  how_to_do_right: '1. Deploy odd number of nodes (3, 5, 7) — majority quorum requires (N/2)+1 votes.

    2. 3 nodes tolerates 1 failure. 5 nodes tolerates 2 failures. Beyond 5, latency increases.

    3. Leader election timeout: randomize between 150-300ms to avoid split votes.

    4. Heartbeat interval: 50-100ms (must be << election timeout).

    5. Log compaction (snapshotting) prevents unbounded log growth. Configure snapshot interval.

    6. Monitor: leader changes/hour, commit latency, log size. Frequent leader changes = network issues.

    '
  severity: critical
  technologies:
    library: [tidb, raft]
    platform: [etcd, cockroachdb, consul]
  domains:
    domain: [architecture, blockchain, reliability]
    concern: [distributed_systems, consensus]
  example_good: '# etcd cluster configuration for Kubernetes — 3 nodes with proper timeouts

    # /etc/etcd/etcd.conf.yml


    # Node 1 configuration

    name: etcd-1

    initial-cluster: etcd-1=https://10.0.1.1:2380,etcd-2=https://10.0.1.2:2380,etcd-3=https://10.0.1.3:2380

    initial-cluster-state: new


    # Raft tuning

    heartbeat-interval: 100        # ms — leader sends heartbeat every 100ms

    election-timeout: 1000         # ms — follower starts election after 1000ms without heartbeat

    snapshot-count: 10000          # Compact log every 10K entries


    # Health monitoring

    # curl https://10.0.1.1:2379/health → {"health": "true"}

    # etcdctl endpoint status → shows leader, raft term, raft index

    '
  example_bad: '# 2-node etcd cluster — CANNOT achieve consensus if one node fails

    initial-cluster: etcd-1=https://10.0.1.1:2380,etcd-2=https://10.0.1.2:2380

    # Quorum requires 2/2 = both nodes must be up

    # If either node fails: no quorum → cluster is read-only → Kubernetes stops scheduling


    # Even-numbered cluster (4 nodes) wastes resources

    # 4-node quorum = 3, same fault tolerance as 3-node (tolerates 1 failure)

    # But 4 nodes have higher write latency (more nodes to replicate to)

    '
  sources: ["https://raft.github.io/raft.pdf"]
  when_applies: "When implementing consensus for leader election or replicated state machines in distributed clusters"
- id: CR-DIST-FENCE-001
  text: Fencing Tokens — Use monotonically increasing fencing tokens to prevent stale leaders from corrupting data after a
    new leader is elected.
  why: 'A leader that has been replaced (due to network partition or GC pause) may not know it has been replaced and continue
    issuing writes. These zombie leader writes can overwrite data that the new leader has already modified. Fencing tokens
    solve this: each leader gets a monotonically increasing token, and the storage layer rejects writes with tokens lower
    than the current maximum. Without fencing, a GC pause in a Java service caused the old leader to wake up after 30 seconds,
    issue stale writes, and corrupt 10,000 records that the new leader had already updated.'
  how_to_do_right: '1. Each leader election generates a monotonically increasing fencing token (epoch/term number).

    2. The leader includes its fencing token in every write request to the storage layer.

    3. The storage layer tracks the highest fencing token it has seen.

    4. If a write arrives with a token lower than the maximum, REJECT it (stale leader).

    5. Lease-based leadership: leader must periodically renew its lease. Failure to renew = leadership lost.

    6. Storage must enforce fencing atomically — check-and-reject must be a single operation.

    '
  severity: critical
  technologies:
    library: [zookeeper]
    platform: [etcd, redis, postgresql]
  domains:
    domain: [architecture, blockchain]
    concern: [distributed_systems, consensus, safety]
  example_good: "class FencedStorage:\n    \"\"\"Storage layer that rejects writes from stale leaders.\"\"\"\n    def __init__(self,\
    \ db: Database):\n        self.db = db\n\n    def write(self, key: str, value: Any, fencing_token: int) -> bool:\n   \
    \     \"\"\"Atomic check-and-write with fencing token.\"\"\"\n        result = self.db.execute(\"\"\"\n            UPDATE\
    \ kv_store\n            SET value = %(value)s, fencing_token = %(token)s\n            WHERE key = %(key)s AND fencing_token\
    \ < %(token)s\n        \"\"\", {\"key\": key, \"value\": value, \"token\": fencing_token})\n\n        if result.rowcount\
    \ == 0:\n            # Either key doesn't exist or a higher token already wrote\n            raise StaleLeaderError(\n\
    \                f\"Fencing token {fencing_token} is stale for key {key}\"\n            )\n        return True\n\nclass\
    \ Leader:\n    def __init__(self, storage: FencedStorage, token: int):\n        self.storage = storage\n        self.token\
    \ = token  # Assigned during election, monotonically increasing\n\n    def process_write(self, key: str, value: Any):\n\
    \        try:\n            self.storage.write(key, value, self.token)\n        except StaleLeaderError:\n            logger.warning(\"\
    I am a stale leader — stepping down\")\n            self.step_down()\n"
  example_bad: "class UnsafeLeader:\n    def process_write(self, key: str, value: Any):\n        # No fencing token — stale\
    \ leader can overwrite new leader's data\n        self.db.execute(\n            \"UPDATE kv_store SET value = %s WHERE\
    \ key = %s\", (value, key)\n        )\n        # Scenario:\n        # 1. Leader A writes value=100 at T=0\n        # 2.\
    \ Leader A gets GC pause at T=1\n        # 3. Leader B elected at T=2, writes value=200\n        # 4. Leader A wakes up\
    \ at T=3, writes value=100 (STALE!)\n        # 5. Data corrupted: value=100 should be 200\n"
  sources: ["https://martin.kleppmann.com/2016/02/08/how-to-do-distributed-locking.html"]
  when_applies: "When coordinating distributed locks to prevent split-brain scenarios in clustered systems"
- id: CR-DIST-SAGA-001
  text: Saga Pattern — Use sagas (sequence of local transactions with compensating actions) instead of distributed two-phase
    commit for cross-service transactions.
  why: Two-phase commit (2PC) requires a coordinator that locks resources across all services until all vote to commit. If
    the coordinator fails after the prepare phase, all participants are blocked with held locks — potentially for hours until
    manual intervention. 2PC also couples services tightly and does not work across different database technologies. Sagas
    break a distributed transaction into a sequence of local transactions, each with a compensating action (undo). If step
    3 fails, compensating actions for steps 2 and 1 are executed in reverse order. Uber, Netflix, and Airbnb all use sagas
    for their booking flows.
  how_to_do_right: '1. Choreography saga: each service publishes an event after its local transaction; the next service listens
    and reacts. Decentralized, hard to debug.

    2. Orchestration saga: a central orchestrator tells each service what to do. Centralized, easier to debug and modify.

    3. Every step MUST have a compensating action: charge → refund, reserve → release, create → delete.

    4. Compensating actions must be idempotent — they may be called multiple times if retries occur.

    5. Handle the "semantic rollback" problem: you can refund a charge, but you cannot unsend an email.

    6. Persist saga state durably — if the orchestrator crashes, it must resume from where it left off.

    '
  severity: critical
  technologies:
    lang: [python]
    library: [temporal]
    platform: [kafka, rabbitmq, postgresql]
  domains:
    domain: [architecture]
    concern: [distributed_systems, transactions, microservices]
  example_good: "# Orchestration saga for order processing\nclass OrderSaga:\n    \"\"\"Central orchestrator manages the distributed\
    \ transaction.\"\"\"\n\n    steps = [\n        SagaStep(\n            action=reserve_inventory,\n            compensation=release_inventory,\n\
    \        ),\n        SagaStep(\n            action=charge_payment,\n            compensation=refund_payment,\n       \
    \ ),\n        SagaStep(\n            action=create_shipment,\n            compensation=cancel_shipment,\n        ),\n\
    \        SagaStep(\n            action=send_confirmation_email,\n            compensation=None,  # Cannot unsend email\
    \ — no compensation\n        ),\n    ]\n\n    async def execute(self, order: Order):\n        completed_steps = []\n \
    \       try:\n            for step in self.steps:\n                await step.action(order)\n                completed_steps.append(step)\n\
    \        except Exception as e:\n            # Compensate in reverse order\n            for step in reversed(completed_steps):\n\
    \                if step.compensation:\n                    await step.compensation(order)\n            raise SagaFailed(f\"\
    Step failed: {e}, compensated {len(completed_steps)} steps\")\n"
  example_bad: "# Two-phase commit across microservices — blocking and fragile\nasync def place_order(order: Order):\n   \
    \ # Phase 1: PREPARE — all services lock resources\n    inventory_ok = await inventory_service.prepare(order)  # Locks\
    \ inventory rows\n    payment_ok = await payment_service.prepare(order)      # Holds payment authorization\n    shipping_ok\
    \ = await shipping_service.prepare(order)    # Reserves shipping slot\n\n    if inventory_ok and payment_ok and shipping_ok:\n\
    \        # Phase 2: COMMIT\n        await inventory_service.commit(order)\n        await payment_service.commit(order)\n\
    \        await shipping_service.commit(order)\n    else:\n        # Phase 2: ROLLBACK\n        await inventory_service.rollback(order)\n\
    \        await payment_service.rollback(order)\n        await shipping_service.rollback(order)\n\n    # PROBLEM: If this\
    \ coordinator process crashes between PREPARE and COMMIT,\n    # all three services are stuck with held locks until manual\
    \ intervention.\n    # PROBLEM: If payment_service.commit() succeeds but shipping_service.commit() fails,\n    # you're\
    \ in an inconsistent state with no automatic recovery.\n"
  sources: ["https://microservices.io/patterns/data/saga.html"]
  when_applies: "When orchestrating multi-step business transactions across distributed services"
- id: CR-DIST-OUTBOX-001
  text: Transactional Outbox — Write events to an outbox table within the same database transaction as the business data,
    then publish events asynchronously from the outbox.
  why: 'When a service writes to its database AND publishes an event to a message broker, you have a dual-write problem: if
    the database write succeeds but the event publish fails (or vice versa), the systems are inconsistent. The outbox pattern
    solves this by writing the event to an ''outbox'' table in the same database transaction as the business data. A separate
    process (or CDC connector like Debezium) reads the outbox table and publishes events to the message broker. This guarantees
    at-least-once delivery without distributed transactions. Shopify uses the outbox pattern for order events — before adopting
    it, they lost ~0.1% of order events during broker outages.'
  how_to_do_right: '1. Write business data AND event to outbox table in the SAME database transaction.

    2. Outbox table schema: id, aggregate_type, aggregate_id, event_type, payload, created_at, published_at.

    3. A poller or CDC connector reads unpublished rows and publishes to the message broker.

    4. After successful publish, mark the row as published (or delete it).

    5. Consumers must be idempotent — the outbox guarantees at-least-once, not exactly-once.

    6. Clean up published outbox rows periodically (keep for 24-48 hours for debugging).

    '
  severity: high
  technologies:
    library: [debezium]
    platform: [postgresql, kafka, rabbitmq]
  domains:
    domain: [architecture, messaging]
    concern: [distributed_systems, consistency]
  example_good: "# Write business data + outbox event in same transaction\nclass OrderService:\n    async def create_order(self,\
    \ order_data: dict) -> Order:\n        async with self.db.transaction():\n            # 1. Write business data\n     \
    \       order = Order(**order_data)\n            self.db.add(order)\n\n            # 2. Write event to outbox (same transaction!)\n\
    \            outbox_event = OutboxEvent(\n                aggregate_type=\"Order\",\n                aggregate_id=order.id,\n\
    \                event_type=\"order.created\",\n                payload=json.dumps({\n                    \"order_id\"\
    : order.id,\n                    \"customer_id\": order.customer_id,\n                    \"total\": str(order.total),\n\
    \                }),\n            )\n            self.db.add(outbox_event)\n            # Both writes commit or both rollback\
    \ — atomic!\n\n        return order\n\n# Separate process publishes outbox events\nclass OutboxPublisher:\n    async def\
    \ poll_and_publish(self):\n        events = await self.db.query(OutboxEvent).filter(\n            OutboxEvent.published_at.is_(None)\n\
    \        ).order_by(OutboxEvent.created_at).limit(100).all()\n\n        for event in events:\n            await self.broker.publish(event.event_type,\
    \ event.payload)\n            event.published_at = datetime.utcnow()\n        await self.db.commit()\n"
  example_bad: "# Dual write — database and broker are not atomic\nclass OrderService:\n    async def create_order(self, order_data:\
    \ dict) -> Order:\n        # Step 1: Write to database\n        order = Order(**order_data)\n        self.db.add(order)\n\
    \        await self.db.commit()\n\n        # Step 2: Publish event\n        await self.broker.publish(\"order.created\"\
    , order.to_dict())\n        # PROBLEM 1: If broker.publish() fails, event is lost. DB has the order, but\n        # billing/notifications\
    \ never learn about it.\n        # PROBLEM 2: If the process crashes between step 1 and step 2, same result.\n       \
    \ # PROBLEM 3: If broker.publish() succeeds but is slow, and we retry,\n        # we publish duplicate events.\n"
  sources: ["https://microservices.io/patterns/data/transactional-outbox.html"]
  when_applies: "When ensuring atomic event publishing alongside database writes in microservices"
- id: CR-DIST-CIRCUIT-001
  text: Circuit Breaker — Wrap remote calls in a circuit breaker to fail fast when a dependency is down, preventing cascading
    failures.
  why: When a downstream service is down, every request to it times out (e.g., 30 seconds). If your service handles 100 requests/second
    and each waits 30s for the dead dependency, you accumulate 3000 pending connections in 30 seconds, exhausting your connection
    pool and thread pool. Now YOUR service is down too — cascading failure. A circuit breaker detects repeated failures, 'opens'
    the circuit, and immediately returns errors without calling the dependency. This protects your service and gives the dependency
    time to recover. Netflix's Hystrix library prevented cascading failures across hundreds of microservices.
  how_to_do_right: '1. Three states: CLOSED (normal, requests pass through), OPEN (fail fast, no requests sent), HALF-OPEN
    (test with one request).

    2. Transition CLOSED → OPEN: when failure_count exceeds threshold (e.g., 5 failures in 10 seconds).

    3. Transition OPEN → HALF-OPEN: after a timeout period (e.g., 30 seconds).

    4. Transition HALF-OPEN → CLOSED: if the test request succeeds. HALF-OPEN → OPEN: if it fails.

    5. Define fallback behavior: return cached data, default value, or a meaningful error.

    6. Monitor circuit breaker state changes — frequent OPEN states indicate a systemic problem.

    '
  severity: critical
  technologies:
    lang: [python]
    library: [pybreaker, resilience4j, hystrix]
  domains:
    domain: [architecture, reliability]
    concern: [distributed_systems, microservices]
  example_good: "from enum import Enum\nfrom datetime import datetime, timedelta\n\nclass CircuitState(Enum):\n    CLOSED\
    \ = \"closed\"\n    OPEN = \"open\"\n    HALF_OPEN = \"half_open\"\n\nclass CircuitBreaker:\n    def __init__(self, failure_threshold:\
    \ int = 5, recovery_timeout: int = 30):\n        self.failure_threshold = failure_threshold\n        self.recovery_timeout\
    \ = timedelta(seconds=recovery_timeout)\n        self.state = CircuitState.CLOSED\n        self.failure_count = 0\n  \
    \      self.last_failure_time: datetime | None = None\n\n    async def call(self, func, *args, fallback=None, **kwargs):\n\
    \        if self.state == CircuitState.OPEN:\n            if datetime.utcnow() - self.last_failure_time > self.recovery_timeout:\n\
    \                self.state = CircuitState.HALF_OPEN\n            else:\n                if fallback:\n              \
    \      return await fallback()\n                raise CircuitOpenError(\"Circuit breaker is OPEN\")\n\n        try:\n\
    \            result = await func(*args, **kwargs)\n            if self.state == CircuitState.HALF_OPEN:\n            \
    \    self.state = CircuitState.CLOSED\n                self.failure_count = 0\n            return result\n        except\
    \ Exception as e:\n            self.failure_count += 1\n            self.last_failure_time = datetime.utcnow()\n     \
    \       if self.failure_count >= self.failure_threshold:\n                self.state = CircuitState.OPEN\n           \
    \ raise\n\n# Usage\npayment_breaker = CircuitBreaker(failure_threshold=5, recovery_timeout=30)\n\nasync def charge_with_fallback(order):\n\
    \    return await payment_breaker.call(\n        payment_service.charge, order,\n        fallback=lambda: PendingCharge(order.id,\
    \ \"queued\"),\n    )\n"
  example_bad: "# No circuit breaker — cascading failure\nasync def process_order(order: Order):\n    # If payment_service\
    \ is down, this blocks for 30 seconds (timeout)\n    result = await payment_service.charge(order)\n    # 100 requests/second\
    \ × 30s timeout = 3000 blocked threads\n    # Thread pool exhausted → YOUR service stops responding\n    # Now orders\
    \ service, notifications service, and analytics service all fail\n    # because they all depend on YOUR service → full\
    \ system outage\n"
  sources: ["https://martinfowler.com/bliki/CircuitBreaker.html"]
  when_applies: "When calling unreliable external services that may cause cascading failures"
- id: CR-DIST-BULKHEAD-001
  text: Bulkhead Pattern — Isolate critical resources (thread pools, connection pools, memory) per dependency to prevent one
    failing dependency from exhausting shared resources.
  why: If all HTTP requests share a single thread pool and one downstream service is slow, slow requests consume all threads
    waiting for that service, leaving no threads for requests to healthy services. The bulkhead pattern (named after ship
    compartments that prevent the whole ship from sinking) gives each dependency its own isolated resource pool. When the
    payment service is slow, only the payment thread pool fills up — the inventory and user service threads are unaffected.
    Amazon isolates thread pools per dependency in their service mesh, preventing localized failures from becoming system-wide
    outages.
  how_to_do_right: '1. Separate thread/connection pools per downstream dependency.

    2. Size each pool based on the dependency''s expected latency and throughput.

    3. When a pool is exhausted, reject requests immediately (fail fast) instead of queuing indefinitely.

    4. Combine with circuit breakers: pool exhaustion triggers the circuit breaker.

    5. Monitor pool utilization per dependency — high utilization indicates the dependency is slow.

    6. Configure timeouts per pool: fast dependencies get short timeouts, slow dependencies get longer ones.

    '
  severity: high
  technologies:
    lang: [python, java, asyncio]
    library: [threadpoolexecutor]
  domains:
    domain: [architecture, reliability]
    concern: [distributed_systems, microservices]
  example_good: "from concurrent.futures import ThreadPoolExecutor\nimport asyncio\n\nclass BulkheadedClient:\n    \"\"\"\
    Each dependency gets its own isolated thread pool.\"\"\"\n\n    def __init__(self):\n        # Payment service: slow (1-5s),\
    \ small pool\n        self.payment_pool = ThreadPoolExecutor(max_workers=10, thread_name_prefix=\"payment\")\n       \
    \ # Inventory service: fast (50ms), larger pool\n        self.inventory_pool = ThreadPoolExecutor(max_workers=50, thread_name_prefix=\"\
    inventory\")\n        # User service: medium (200ms), medium pool\n        self.user_pool = ThreadPoolExecutor(max_workers=20,\
    \ thread_name_prefix=\"user\")\n\n    async def charge_payment(self, order: Order):\n        \"\"\"Uses payment pool —\
    \ cannot starve inventory or user pools.\"\"\"\n        loop = asyncio.get_event_loop()\n        return await asyncio.wait_for(\n\
    \            loop.run_in_executor(self.payment_pool, payment_client.charge, order),\n            timeout=5.0,\n      \
    \  )\n\n    async def check_inventory(self, items: list):\n        \"\"\"Uses inventory pool — isolated from payment failures.\"\
    \"\"\n        loop = asyncio.get_event_loop()\n        return await asyncio.wait_for(\n            loop.run_in_executor(self.inventory_pool,\
    \ inventory_client.check, items),\n            timeout=1.0,\n        )\n"
  example_bad: "# Shared thread pool for ALL dependencies\nshared_pool = ThreadPoolExecutor(max_workers=50)\n\nasync def process_order(order):\n\
    \    # All three use the SAME pool\n    payment = await loop.run_in_executor(shared_pool, payment_client.charge, order)\n\
    \    inventory = await loop.run_in_executor(shared_pool, inventory_client.check, order.items)\n    user = await loop.run_in_executor(shared_pool,\
    \ user_client.get, order.user_id)\n\n    # If payment_service is slow (5s per request), 50 threads fill up with payment\
    \ calls\n    # Now inventory and user calls ALSO fail — no threads available\n    # One slow dependency takes down ALL\
    \ functionality\n"
  sources: ["https://learn.microsoft.com/en-us/azure/architecture/patterns/bulkhead"]
  when_applies: "When isolating failure domains to prevent one slow dependency from blocking all requests"
- id: CR-DIST-PARTITION-001
  text: Network Partition Handling — Design for network partitions by detecting split-brain scenarios and choosing a deterministic
    resolution strategy.
  why: 'Network partitions cause nodes to be unable to communicate with each other while still being individually functional.
    The most dangerous result is split-brain: two groups of nodes both believe they are the authoritative cluster and accept
    conflicting writes. When the partition heals, conflicting data must be resolved. Without explicit handling, you get data
    loss, duplicate records, or corrupted state. A Redis Cluster without proper sentinel configuration experienced a split-brain
    where both partitions accepted writes for 45 minutes, resulting in 12,000 conflicting keys that required manual reconciliation.'
  how_to_do_right: '1. Detect partitions: nodes that cannot reach a majority quorum should stop accepting writes.

    2. Quorum-based: only the partition with a majority of nodes (>N/2) continues operating.

    3. Minority partition behavior: reject writes, serve stale reads with warnings, or shut down.

    4. Use a witness/tiebreaker node in a third availability zone to break ties.

    5. After partition heals: reconcile divergent state (last-writer-wins, merge, or manual review).

    6. Test partition handling: use tc (traffic control) or Chaos Monkey to simulate network splits.

    '
  severity: critical
  technologies:
    library: [zookeeper]
    platform: [redis, postgresql, etcd, consul]
  domains:
    domain: [architecture, reliability, infrastructure]
    concern: [distributed_systems, networking]
  example_good: "class PartitionAwareNode:\n    \"\"\"Node that detects partitions and degrades gracefully.\"\"\"\n\n    def\
    \ __init__(self, cluster_size: int):\n        self.cluster_size = cluster_size\n        self.quorum = (cluster_size //\
    \ 2) + 1\n        self.reachable_peers: set[str] = set()\n\n    def update_reachable_peers(self, peers: set[str]):\n \
    \       self.reachable_peers = peers\n        if len(self.reachable_peers) + 1 < self.quorum:  # +1 for self\n       \
    \     self.mode = \"read-only\"\n            logger.warning(\n                f\"Partition detected: {len(self.reachable_peers)+1}/{self.cluster_size}\
    \ \"\n                f\"nodes reachable (need {self.quorum} for quorum). Entering read-only mode.\"\n            )\n\
    \        else:\n            self.mode = \"read-write\"\n\n    def write(self, key: str, value: Any):\n        if self.mode\
    \ == \"read-only\":\n            raise PartitionError(\n                \"Cannot accept writes — not enough nodes for\
    \ quorum. \"\n                \"This prevents split-brain data corruption.\"\n            )\n        return self._replicated_write(key,\
    \ value)\n"
  example_bad: "class UnsafeNode:\n    def write(self, key: str, value: Any):\n        # No partition detection — always accepts\
    \ writes\n        self.local_store[key] = value\n        try:\n            self.replicate_to_peers(key, value)\n     \
    \   except ConnectionError:\n            pass  # Silently ignore replication failure\n        # Split-brain scenario:\n\
    \        # Partition A: nodes 1,2 — both accept writes\n        # Partition B: nodes 3,4,5 — all accept writes\n     \
    \   # When partition heals: conflicting values for same keys\n        # Data loss or corruption is inevitable\n"
  sources: ["https://www.cs.cornell.edu/courses/cs6410/2018fa/slides/18-cap.pdf", "https://en.wikipedia.org/wiki/CAP_theorem"]
  when_applies: "When designing systems that must handle network partitions and choose between consistency and availability"
- id: CR-DIST-QUORUM-001
  text: Quorum Reads/Writes — In leaderless replication, use quorum (W + R > N) to guarantee reading the most recent write,
    where W = write replicas, R = read replicas, N = total replicas.
  why: 'In a leaderless system with N=3 replicas, if you write to only 1 replica (W=1) and read from only 1 replica (R=1),
    you might read from the replica that did not receive the write — stale data. With W=2, R=2 (W+R=4 > N=3), at least one
    replica in your read set must have the latest write. The tradeoff: higher W = slower writes but faster consistent reads;
    higher R = slower reads but faster writes. DynamoDB, Cassandra, and Riak all support tunable quorum. A social media app
    set W=1, R=1 for speed and users constantly saw their own posts disappear and reappear.'
  how_to_do_right: '1. Strong consistency: W + R > N. For N=3: W=2, R=2 (most common) or W=3, R=1.

    2. High write availability: W=1, R=N. Writes are fast (one replica enough), reads are slow (must check all).

    3. High read availability: W=N, R=1. Writes are slow (all replicas), reads are fast (any replica).

    4. Sloppy quorum: during partition, write to any N reachable nodes (not necessarily the designated replicas). Increases
    availability, reduces consistency.

    5. Read repair: when a read detects stale data on a replica, update it in the background.

    6. Anti-entropy: background process periodically compares replicas and repairs inconsistencies.

    '
  severity: high
  technologies:
    library: [riak, scylla]
    platform: [cassandra, dynamodb]
  domains:
    domain: [architecture]
    concern: [distributed_systems, consistency, data, database]
  example_good: "# Cassandra with tunable consistency\nfrom cassandra.cluster import Cluster\nfrom cassandra import ConsistencyLevel\n\
