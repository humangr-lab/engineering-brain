- id: CR-DIST-RETRY-001
  text: Retry with Exponential Backoff and Jitter — Retry failed requests with exponentially increasing delays plus random
    jitter to prevent thundering herd on recovery.
  why: Immediate retries flood a recovering service with the same requests that caused the failure. Fixed-interval retries
    synchronize clients, creating periodic load spikes. Exponential backoff spreads retries over time, and jitter (randomness)
    desynchronizes clients that started retrying at the same time. Without jitter, if 1000 clients all fail at T=0, they all
    retry at T=1s, then T=2s, then T=4s — synchronized waves that keep the server overwhelmed. AWS recommends exponential
    backoff with full jitter for all SDK retries.
  how_to_do_right: '1. Exponential backoff: delay = min(base * 2^attempt, max_delay).

    2. Full jitter: delay = random(0, min(base * 2^attempt, max_delay)). Best for desynchronization.

    3. Decorrelated jitter: delay = random(base, previous_delay * 3). Good alternative.

    4. Max retries: 3-5 for API calls, 10+ for background jobs.

    5. Max delay cap: 30-60 seconds for interactive, 5-10 minutes for background.

    6. Retry only on transient errors (5xx, timeout, connection refused). Never retry 4xx (client error).

    '
  severity: critical
  technologies:
    lang: [python]
    framework: [requests, httpx, aiohttp]
    library: [tenacity]
  domains:
    domain: [architecture, reliability, infrastructure]
    concern: [distributed_systems, networking]
  example_good: "import random\nimport asyncio\nfrom httpx import AsyncClient, HTTPStatusError\n\nRETRYABLE_STATUS_CODES =\
    \ {429, 500, 502, 503, 504}\n\nasync def request_with_backoff(\n    client: AsyncClient,\n    method: str,\n    url: str,\n\
    \    max_retries: int = 5,\n    base_delay: float = 0.5,\n    max_delay: float = 30.0,\n    **kwargs,\n):\n    for attempt\
    \ in range(max_retries + 1):\n        try:\n            response = await client.request(method, url, **kwargs)\n     \
    \       response.raise_for_status()\n            return response\n        except HTTPStatusError as e:\n            if\
    \ e.response.status_code not in RETRYABLE_STATUS_CODES:\n                raise  # 4xx errors are not retryable\n     \
    \       if attempt == max_retries:\n                raise\n            # Full jitter exponential backoff\n           \
    \ delay = random.uniform(0, min(base_delay * (2 ** attempt), max_delay))\n            # Respect Retry-After header if\
    \ present\n            retry_after = e.response.headers.get(\"Retry-After\")\n            if retry_after:\n          \
    \      delay = max(delay, float(retry_after))\n            await asyncio.sleep(delay)\n        except (ConnectionError,\
    \ TimeoutError):\n            if attempt == max_retries:\n                raise\n            delay = random.uniform(0,\
    \ min(base_delay * (2 ** attempt), max_delay))\n            await asyncio.sleep(delay)\n"
  example_bad: "# Immediate retry with no backoff — hammers the server\nasync def request_with_retry(client, url, max_retries=10):\n\
    \    for attempt in range(max_retries):\n        try:\n            response = await client.get(url)\n            response.raise_for_status()\n\
    \            return response\n        except Exception:\n            pass  # Retry immediately — no delay, no backoff\n\
    \    # 1000 clients × 10 retries × 0 delay = 10,000 requests per second\n    # The recovering server never gets a chance\
    \ to stabilize\n\n# Fixed interval retry — synchronized thundering herd\nasync def request_with_fixed_retry(client, url):\n\
    \    for attempt in range(5):\n        try:\n            return await client.get(url)\n        except Exception:\n   \
    \         await asyncio.sleep(1.0)  # All clients retry at exactly the same interval\n            # T=0: 1000 requests\
    \ fail\n            # T=1: 1000 retries arrive simultaneously\n            # T=2: 1000 retries arrive simultaneously (same\
    \ wave)\n"
  sources: ["https://aws.amazon.com/builders-library/timeouts-retries-and-backoff-with-jitter/"]
  when_applies: "When retrying failed operations in distributed systems with multiple concurrent clients"
- id: CR-DIST-TIMEOUT-001
  text: Timeout Budgets — Set timeouts at every layer (connection, request, total operation) and propagate deadline context
    across service calls to prevent hanging requests.
  why: 'A request without a timeout can block forever if the downstream service hangs (no response, no error). This ties up
    a thread, a connection, and memory indefinitely. Worse, cascading timeouts occur when Service A calls B calls C: if C
    is slow, B waits, A waits, and the user gets no response for 2 minutes. Timeout budgets propagate a deadline from the
    edge: if the user''s request has a 5-second budget, and 2 seconds are spent in Service A, only 3 seconds remain for Service
    B. This prevents the total wait from exceeding the user-facing timeout.'
  how_to_do_right: '1. Set three timeouts: connect_timeout (TCP handshake, 1-3s), read_timeout (response, 5-30s), total_timeout
    (end-to-end, 30-60s).

    2. Propagate deadline: pass remaining budget as a header (e.g., X-Request-Deadline or gRPC deadline).

    3. Each service checks remaining budget before calling downstream — if budget is exhausted, fail fast.

    4. User-facing services: total timeout = 5-10 seconds. Background jobs: total timeout = 5-10 minutes.

    5. Always set timeouts on: HTTP clients, database connections, cache lookups, file I/O, external APIs.

    6. Log timeout events with context (which service, which endpoint, elapsed time) for debugging.

    '
  severity: critical
  technologies:
    lang: [python, asyncio]
    framework: [httpx, aiohttp]
    platform: [grpc]
  domains:
    domain: [architecture, reliability, performance]
    concern: [distributed_systems]
  example_good: "import time\nfrom dataclasses import dataclass\n\n@dataclass\nclass DeadlineContext:\n    \"\"\"Propagates\
    \ timeout budget across service calls.\"\"\"\n    deadline: float  # Unix timestamp when the request budget expires\n\n\
    \    @classmethod\n    def from_budget(cls, budget_seconds: float) -> \"DeadlineContext\":\n        return cls(deadline=time.time()\
    \ + budget_seconds)\n\n    @property\n    def remaining(self) -> float:\n        return max(0, self.deadline - time.time())\n\
    \n    @property\n    def expired(self) -> bool:\n        return time.time() >= self.deadline\n\nasync def handle_request(request):\n\
    \    # Start with 5-second budget for the entire request\n    ctx = DeadlineContext.from_budget(5.0)\n\n    # Service\
    \ A: 2 seconds used\n    user = await user_service.get(\n        request.user_id,\n        timeout=min(2.0, ctx.remaining),\
    \  # Cap at remaining budget\n    )\n\n    if ctx.expired:\n        raise TimeoutError(\"Request budget exhausted after\
    \ user lookup\")\n\n    # Service B: only 3 seconds remaining\n    orders = await order_service.list(\n        user.id,\n\
    \        timeout=min(3.0, ctx.remaining),  # Uses remaining budget\n    )\n\n    return {\"user\": user, \"orders\": orders}\n"
  example_bad: "async def handle_request(request):\n    # No timeouts — each call can block indefinitely\n    user = await\
    \ user_service.get(request.user_id)        # Could hang for 2 minutes\n    orders = await order_service.list(user.id)\
    \             # Could hang for 2 more minutes\n    recommendations = await rec_service.get(user.id)       # Could hang\
    \ for 2 more minutes\n    # Total wait: potentially 6+ minutes for a web request\n    # User sees a loading spinner until\
    \ their browser times out at 60 seconds\n    # Server thread is tied up for the entire duration\n    return {\"user\"\
    : user, \"orders\": orders, \"recs\": recommendations}\n"
  sources: ["https://aws.amazon.com/builders-library/timeouts-retries-and-backoff-with-jitter/"]
  when_applies: "When setting timeouts for cross-service calls in latency-sensitive distributed architectures"
- id: CR-DIST-TRACE-001
  text: Distributed Tracing — Propagate trace context (trace_id, span_id, parent_id) across all service boundaries to enable
    end-to-end request tracing.
  why: 'In a microservices architecture, a single user request might traverse 5-15 services. When that request is slow or
    fails, you need to know WHICH service caused the problem. Without distributed tracing, debugging is like finding a needle
    in a haystack: you have logs from 15 services with no way to correlate them. Distributed tracing creates a tree of spans
    (one per service call) linked by a trace ID. You can see the entire request lifecycle: Service A (20ms) → Service B (150ms)
    → Service C (2000ms) → found the bottleneck. Google''s Dapper paper pioneered this; now OpenTelemetry is the industry
    standard.'
  how_to_do_right: '1. Use OpenTelemetry (OTEL) for instrumentation — vendor-neutral, industry standard.

    2. Auto-instrument HTTP clients/servers, database drivers, and message consumers.

    3. Propagate context via W3C Trace Context headers (traceparent, tracestate).

    4. Add meaningful span attributes: user_id, order_id, payment_method, error type.

    5. Set sampling rate based on traffic volume: 100% for development, 1-10% for production.

    6. Export to a tracing backend: Jaeger, Zipkin, Tempo, Datadog, or Langfuse (for LLM traces).

    '
  severity: high
  technologies:
    lang: [python]
    library: [langfuse]
    platform: [opentelemetry, jaeger, zipkin]
  domains:
