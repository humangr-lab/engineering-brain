  when_applies: "When managing cross-cutting concerns like mTLS, retries, and observability across many microservices"
- id: CR-DIST-APIGATEWAY-001
  text: API Gateway — Use an API gateway as the single entry point for external clients, handling authentication, rate limiting,
    request routing, and API composition.
  why: 'Without an API gateway, external clients must know the addresses of individual microservices, handle authentication
    with each service, and make multiple calls for a single page load (the API composition problem). An API gateway provides
    a unified interface: one domain, one auth check, one rate limiter, and the ability to aggregate responses from multiple
    backend services into a single response. This simplifies client development, centralizes security, and enables backend
    services to be restructured without breaking client contracts. Every major cloud provider (AWS API Gateway, GCP Apigee,
    Azure API Management) and open-source option (Kong, Ambassador) provides this pattern.'
  how_to_do_right: '1. Single entry point: all external traffic goes through the gateway. Internal service-to-service traffic
    bypasses it.

    2. Authentication: validate tokens at the gateway. Backend services receive a verified user context header.

    3. Rate limiting: enforce per-client limits at the gateway to protect all backend services.

    4. Request routing: route /api/v1/orders to order-service, /api/v1/users to user-service.

    5. API composition: aggregate responses from multiple services into one response for mobile clients.

    6. Keep the gateway thin: routing, auth, rate limiting only. No business logic in the gateway.

    '
