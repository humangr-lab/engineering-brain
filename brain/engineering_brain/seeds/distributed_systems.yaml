    platform: [kubernetes]
  domains:
    domain: [architecture, reliability, testing]
    concern: [distributed_systems]
  example_good: "# Chaos experiment definition (Litmus Chaos for Kubernetes)\napiVersion: litmuschaos.io/v1alpha1\nkind: ChaosEngine\n\
    metadata:\n  name: pod-kill-experiment\nspec:\n  appinfo:\n    appns: production\n    applabel: app=order-service\n  chaosServiceAccount:\
    \ litmus-admin\n  experiments:\n    - name: pod-delete\n      spec:\n        components:\n          env:\n           \
    \ - name: TOTAL_CHAOS_DURATION\n              value: '30'              # Kill pods for 30 seconds\n            - name:\
    \ CHAOS_INTERVAL\n              value: '10'              # Kill one pod every 10 seconds\n            - name: FORCE\n\
    \              value: 'false'           # Graceful shutdown first\n\n# Automated verification after chaos\n# def verify_steady_state():\n\
