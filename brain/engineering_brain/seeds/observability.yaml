layer: rules
technology: General
domain: observability
knowledge:
- id: CR-OBS-001
  text: Instrument resources with USE method (Utilization/Saturation/Errors) and services with RED method (Rate/Errors/Duration).
  why: 'Ad-hoc metrics lead to dashboard sprawl with hundreds of graphs that nobody looks at during incidents. USE and RED
    provide structured frameworks that answer the two critical questions: ''Is the infrastructure healthy?'' (USE) and ''Is
    the service healthy from the user''s perspective?'' (RED). Without these frameworks, teams spend 20+ minutes in incidents
    just figuring out which dashboard to look at.'
  how_to_do_right: 'For every infrastructure resource (CPU, memory, disk, network): track Utilization (% used), Saturation
    (queue depth), Errors (error count). For every service endpoint: track Rate (requests/sec), Errors (error rate %), Duration
    (latency p50/p95/p99). Create one USE dashboard per resource tier and one RED dashboard per service.'
  severity: high
  technologies:
    platform: [prometheus, datadog, grafana, newrelic]
  domains:
    domain: [observability, operations, devops, reliability]
  example_good: '# USE metrics for a PostgreSQL instance

    # Utilization

    - metric: pg_cpu_utilization_percent

    - metric: pg_memory_utilization_percent

    - metric: pg_disk_utilization_percent

    # Saturation

    - metric: pg_connection_pool_waiting  # Queries waiting for connection

    - metric: pg_disk_io_queue_depth

    # Errors

    - metric: pg_deadlocks_total

    - metric: pg_replication_lag_seconds


    # RED metrics for API service

    # Rate

    - metric: http_requests_total{service="api"}  # rate() in PromQL

    # Errors

    - metric: http_requests_total{service="api", status=~"5.."}

    # Duration

    - metric: http_request_duration_seconds{service="api"}  # histogram

    '
  example_bad: '# Random metrics without framework

    - metric: server_uptime_seconds     # Nice to know, useless in incidents

    - metric: total_users               # Business metric, not operational

    - metric: cpu_usage                  # Which CPU? Average? Max? Per core?

    # "Server is slow" → stare at 15 dashboards for 20 minutes

    '
  when_applies: Projects using Prometheus metrics collection, Datadog, Grafana dashboards and alerting, or New Relic
  when_not_applies: throwaway prototypes, local dev scripts
  sources: ["https://www.brendangregg.com/usemethod.html", "https://grafana.com/blog/2018/08/02/the-red-method-how-to-instrument-your-services/"]
- id: CR-OBS-002
  text: 'Track the four golden signals for every user-facing service: latency, traffic, errors, saturation.'
  why: Google SRE identified these four signals as sufficient to detect any service degradation. Latency tells you speed,
    traffic tells you load, errors tell you correctness, saturation tells you capacity. If all four are healthy, the service
    is healthy. If any is degraded, you know exactly which dimension is the problem.
  how_to_do_right: 'Latency: track p50, p95, p99 (not just average — averages hide tail latency). Traffic: requests/sec per
    endpoint. Errors: percentage of 5xx responses + client-visible errors. Saturation: thread pool usage, connection pool
    usage, queue depth. Alert when any signal crosses SLO threshold.'
  severity: high
  technologies:
    platform: [prometheus, grafana, datadog]
  domains:
    domain: [observability, reliability]
  example_good: '# Prometheus metrics for the four golden signals

    # 1. Latency — histogram (enables p50/p95/p99)

    http_request_duration_seconds_bucket{le="0.1"}   # <100ms

    http_request_duration_seconds_bucket{le="0.5"}   # <500ms

    http_request_duration_seconds_bucket{le="1.0"}   # <1s


    # 2. Traffic — counter

    http_requests_total{method="GET", endpoint="/api/users"}


    # 3. Errors — counter (derive error rate via PromQL)

    http_requests_total{status=~"5.."}

    # Error rate: rate(http_requests_total{status=~"5.."}[5m]) /

    #             rate(http_requests_total[5m])


    # 4. Saturation — gauge

    thread_pool_active_threads / thread_pool_max_threads

    db_connection_pool_active / db_connection_pool_max

    '
  example_bad: '# Only tracking averages and totals

    http_request_duration_average  # Hides p99 latency spikes

    http_requests_total            # No breakdown by status code

    # "Average latency is 200ms" — but p99 is 15 seconds

    # "We had 1M requests" — but 50K were 500 errors

    '
  when_applies: Projects using Prometheus metrics collection, Grafana dashboards and alerting, or Datadog
  when_not_applies: throwaway prototypes, local dev scripts
  sources: ["https://sre.google/sre-book/monitoring-distributed-systems/#xref_monitoring_golden-signals"]
- id: CR-OBS-003
  text: Use histograms for latency and response size — never use averages or summaries for server-side aggregation.
  why: 'Averages are mathematically useless for latency: a service with avg 100ms could have p99 of 10 seconds. Summaries
    (quantiles) cannot be aggregated across instances — you cannot combine p99 from 5 instances into a meaningful p99. Histograms
    can be aggregated, allowing accurate percentile calculation across any dimension (instance, region, time window).'
  how_to_do_right: 'Use Prometheus histograms with appropriate bucket boundaries. Set buckets based on your SLO: if SLO is
    p99 < 500ms, you need buckets around 500ms (100, 200, 300, 500, 1000, 2000, 5000). Use histogram_quantile() in PromQL
    for percentiles. Never alert on average latency.'
  severity: high
  technologies:
    platform: [prometheus, grafana, opentelemetry]
  domains:
    domain: [observability, reliability]
  example_good: "# Python — Prometheus histogram with appropriate buckets\nfrom prometheus_client import Histogram\n\nREQUEST_DURATION\
    \ = Histogram(\n    'http_request_duration_seconds',\n    'HTTP request latency',\n    ['method', 'endpoint', 'status'],\n\
    \    buckets=[0.01, 0.025, 0.05, 0.1, 0.25, 0.5, 1.0, 2.5, 5.0, 10.0],\n)\n\n@REQUEST_DURATION.labels(method='GET', endpoint='/api/users',\
    \ status='200').time()\ndef get_users():\n    ...\n\n# PromQL — server-side p99 across all instances\nhistogram_quantile(0.99,\
    \ rate(http_request_duration_seconds_bucket[5m]))\n"
  example_bad: '# Summary — cannot aggregate across instances

    from prometheus_client import Summary

    REQUEST_DURATION = Summary(''request_duration'', ''Request duration'')

    # p99 from instance A and p99 from instance B

    # cannot be combined into a meaningful cluster-wide p99


    # Even worse — just tracking average

    request_duration_sum / request_duration_count  # Average hides everything

    '
  when_applies: Projects using Prometheus metrics collection, Grafana dashboards and alerting, or OpenTelemetry
  when_not_applies: throwaway prototypes, local dev scripts
  sources: ["https://prometheus.io/docs/practices/histograms/"]
- id: CR-OBS-004
  text: Keep metric label cardinality low — never use user_id, request_id, URL path, or any unbounded value as a label.
  why: Every unique label combination creates a new time series in Prometheus/Datadog. A label with 1M unique values (user_id)
    creates 1M time series PER metric. At 10 metrics, that is 10M time series. Prometheus OOMs, queries timeout, storage explodes.
    A single high-cardinality label can cost $10K+/month in monitoring bills or crash your monitoring stack entirely.
  how_to_do_right: 'Labels should have bounded, low cardinality: method (GET/POST/PUT/DELETE = 4 values), status_code (200/400/404/500
    = ~10 values), service_name (~20 values). For high-cardinality data, use logs or traces (designed for it). Maximum ~100
    unique values per label. Alert on cardinality growth.'
  severity: critical
  technologies:
    platform: [prometheus, datadog, grafana]
  domains:
    domain: [observability, performance]
  example_good: "# Low cardinality labels — bounded, aggregatable\nhttp_requests_total{\n  method=\"GET\",           # 4-5\
    \ unique values\n  endpoint=\"/api/users\",  # ~20 unique values (registered routes)\n  status=\"200\",           # ~10\
    \ unique values\n  service=\"api\",          # ~15 unique values\n}\n# Total time series = 5 * 20 * 10 * 15 = 15,000 —\
    \ manageable\n"
  example_bad: "# High cardinality labels — unbounded, Prometheus killer\nhttp_requests_total{\n  user_id=\"usr_abc123\",\
    \          # 1M+ unique values!\n  request_id=\"req_xyz789\",        # Infinite unique values!\n  path=\"/api/users/12345/posts\"\
    ,  # Infinite (contains user IDs)!\n  query_params=\"page=3&sort=asc\", # Near-infinite combinations!\n}\n# Total time\
    \ series = 1M * INF * INF * INF = Prometheus OOM in hours\n# Monitoring bill: $50K/month instead of $500/month\n"
  when_applies: Any project using Prometheus metrics collection, Datadog, or Grafana dashboards and alerting
  when_not_applies: throwaway prototypes, local dev scripts
  sources: ["https://prometheus.io/docs/practices/naming/#labels"]
- id: CR-OBS-005
  text: Use structured JSON logging — never use plain text log messages in production.
  why: 'Plain text logs like ''User 123 failed to login from 10.0.0.1'' require regex parsing to extract fields. Every new
    log format requires a new parser. Structured JSON logs like {user_id: 123, event: login_failed, ip: ''10.0.0.1''} are
    instantly queryable, filterable, and aggregatable without custom parsing. Log aggregation systems (ELK, Loki, CloudWatch)
    work 10x better with structured data.'
  how_to_do_right: 'Use a structured logging library (structlog for Python, winston for Node, slog for Go). Always include:
    timestamp (ISO 8601), level, service, trace_id, message. Add context fields as key-value pairs. Never concatenate variables
    into message strings — use fields instead.'
  severity: high
  technologies:
    lang: [python]
    framework: [structlog]
    library: [winston, slog]
    platform: [elk, loki]
  domains:
    domain: [observability, operations, devops]
  example_good: "# Python — structlog JSON output\nimport structlog\n\nlogger = structlog.get_logger()\n\nlogger.info(\"user_login\"\
    ,\n    user_id=\"usr_123\",\n    ip=\"10.0.0.1\",\n    method=\"oauth2\",\n    duration_ms=45,\n)\n# Output: {\"event\"\
    : \"user_login\", \"user_id\": \"usr_123\",\n#          \"ip\": \"10.0.0.1\", \"method\": \"oauth2\",\n#          \"duration_ms\"\
    : 45, \"timestamp\": \"2026-02-17T10:30:00Z\",\n#          \"level\": \"info\", \"service\": \"auth\"}\n# Instantly queryable:\
    \ user_id=\"usr_123\" AND level=\"error\"\n"
  example_bad: '# Plain text logging — unparseable mess

    import logging

    logging.info(f"User {user_id} logged in from {ip} using {method} in {duration}ms")

    # Output: "2026-02-17 10:30:00 INFO User usr_123 logged in from 10.0.0.1 using oauth2 in 45ms"

    # Querying: regex? split? pray?

    # "Find all logins taking >1 second" — impossible without custom parser

    '
  when_applies: Projects using structlog, winston, slog, or ELK
  when_not_applies: throwaway prototypes, local dev scripts
  sources: ["https://www.structlog.org/en/stable/why.html"]
- id: CR-OBS-006
  text: Use appropriate log levels — ERROR for alerts, WARN for recoverable, INFO for audit, DEBUG for development.
  why: 'Teams that log everything at INFO get 100GB/day of noise. Teams that log everything at ERROR get paged at 3 AM for
    non-issues. Consistent log levels enable: ERROR → auto-alert (PagerDuty), WARN → dashboard review, INFO → audit trail
    (kept 30 days), DEBUG → development only (never in production). Miscategorized levels either cause alert fatigue or miss
    real incidents.'
  how_to_do_right: 'ERROR: Something failed that REQUIRES human attention (database down, payment failed, data corruption).
    WARN: Something degraded but self-recovered (retry succeeded, fallback used, rate limited). INFO: Business events that
    may need auditing (user login, order placed, config changed). DEBUG: Internal state useful for development (variable values,
    loop iterations). Set production to INFO level minimum.'
  severity: medium
  technologies:
    lang: [python]
    framework: [structlog]
    library: [log4j, slog]
  domains:
    domain: [observability, operations, devops]
  example_good: "# Correct level usage\nlogger.error(\"payment_failed\",         # Alert-worthy — human must act\n    order_id=order.id,\n\
    \    error=\"card_declined\",\n    amount=order.total)\n\nlogger.warning(\"cache_miss_fallback\",  # Degraded but recovered\n\
    \    key=cache_key,\n    fallback=\"database\",\n    latency_ms=250)\n\nlogger.info(\"order_created\",           # Business\
    \ event — audit trail\n    order_id=order.id,\n    user_id=user.id,\n    total=order.total)\n\nlogger.debug(\"query_plan\"\
    ,             # Dev only — not in prod\n    sql=query,\n    explain=plan)\n"
  example_bad: '# Everything is ERROR or INFO — no signal in the noise

    logger.error(f"User {user_id} not found")    # 404 is not an error!

    logger.error(f"Cache miss for key {key}")     # Expected behavior!

    logger.info(f"Database connection failed")    # THIS is an error!

    logger.info(f"Starting server")               # OK but mixed in with errors

    '
  when_applies: Projects using structlog, Log4j, or slog
  when_not_applies: throwaway prototypes, local dev scripts
  sources: ["https://sre.google/sre-book/monitoring-distributed-systems/"]
- id: CR-OBS-007
  text: Include correlation IDs (trace_id) in every log line to connect logs across services.
  why: A single user request may touch 5-10 microservices. Without a correlation ID, debugging 'user got a 500 error' requires
    manually matching timestamps across service logs — which is nearly impossible at scale. A trace_id in every log line lets
    you query ALL logs for that request across ALL services in one search.
  how_to_do_right: Generate trace_id at the entry point (API gateway or first service). Propagate via HTTP header (X-Request-ID
    or W3C traceparent). Include in every log line automatically via middleware/context. Include in error responses so users
    can report it. Index trace_id in your log aggregation system.
  severity: high
  technologies:
    lang: [python]
    framework: [structlog, backend, express, fastapi]
    platform: [opentelemetry]
  domains:
    domain: [observability, operations, devops, architecture]
    concern: [microservices]
  example_good: "# FastAPI middleware — auto-inject trace_id into all logs\nimport uuid\nimport structlog\nfrom contextvars\
    \ import ContextVar\n\ntrace_id_var: ContextVar[str] = ContextVar(\"trace_id\", default=\"\")\n\n@app.middleware(\"http\"\
    )\nasync def trace_middleware(request, call_next):\n    trace_id = request.headers.get(\"X-Request-ID\", str(uuid.uuid4()))\n\
    \    trace_id_var.set(trace_id)\n    structlog.contextvars.bind_contextvars(trace_id=trace_id)\n    response = await call_next(request)\n\
    \    response.headers[\"X-Request-ID\"] = trace_id\n    return response\n\n# Every log line now includes trace_id automatically\n\
    # {\"event\": \"db_query\", \"trace_id\": \"abc-123\", \"duration_ms\": 15}\n# {\"event\": \"cache_set\", \"trace_id\"\
    : \"abc-123\", \"key\": \"user:42\"}\n# Search: trace_id=\"abc-123\" → see entire request journey\n"
  example_bad: '# No correlation — impossible to trace across services

    # Auth service log: "User usr_42 authenticated" (which request?)

    # API service log: "GET /api/orders — 200" (which user?)

    # DB service log: "Query took 2500ms" (which endpoint triggered this?)

    # User reports: "I got a 500 error" → grep timestamps across 10 services

    '
  when_applies: Projects using OpenTelemetry, structlog, Express.js/Node.js servers, or FastAPI async web services
  when_not_applies: throwaway prototypes, local dev scripts
  sources: ["https://opentelemetry.io/docs/concepts/context-propagation/"]
- id: CR-OBS-008
  text: Sample logs — log 100% of errors but only 1-10% of successful requests in high-throughput services.
  why: A service handling 10,000 requests/second generates 864M log lines/day at 100% logging. At $0.50/GB ingestion, that
    is $500+/day just for INFO logs. 99% of those lines say 'everything is fine.' Sampling retains statistical significance
    for success patterns while capturing 100% of errors where you need full detail.
  how_to_do_right: Always log 100% of ERROR and WARN. Sample INFO logs at 1-10% based on throughput. Use deterministic sampling
    (hash of trace_id % 100 < sample_rate) so all logs for a sampled request are included. Log 100% of slow requests (>p99
    latency). Increase sampling during incidents.
  severity: medium
  technologies:
    lang: [python]
    framework: [structlog]
    library: [vector]
    platform: [fluentd, loki]
  domains:
    domain: [observability, performance, operations]
    concern: [cost]
  example_good: "# Deterministic sampling — consistent per request\nimport hashlib\n\ndef should_sample(trace_id: str, sample_rate:\
    \ int = 10) -> bool:\n    \"\"\"Sample N% of requests deterministically.\"\"\"\n    hash_val = int(hashlib.md5(trace_id.encode()).hexdigest()[:8],\
    \ 16)\n    return (hash_val % 100) < sample_rate\n\n# In logging middleware\nif level >= WARNING:\n    log(event)    \
    \                          # 100% of errors/warnings\nelif request.duration > p99_threshold:\n    log(event)         \
    \                     # 100% of slow requests\nelif should_sample(trace_id, sample_rate=5):\n    log(event)          \
    \                    # 5% of normal requests\n# Cost reduction: ~95% less log volume, 100% error coverage\n"
  example_bad: "# 100% logging at high throughput — expensive and noisy\n@app.after_request\ndef log_request(response):\n\
    \    logger.info(\"request_complete\",  # Every. Single. Request.\n        path=request.path,\n        status=response.status_code,\n\
    \        duration=elapsed)\n# 10,000 req/s × 86,400 sec/day = 864M log lines/day\n# $500+/day in log ingestion costs\n\
    # Signal-to-noise ratio: 0.1%\n"
  when_applies: Projects using structlog, Fluentd, Vector, or Loki
  when_not_applies: throwaway prototypes, local dev scripts
  sources: ["https://opentelemetry.io/docs/concepts/sampling/"]
- id: CR-OBS-009
  text: Never log passwords, tokens, SSNs, or PII — sanitize sensitive data before logging.
  why: Logs are often stored with less access control than databases. Log aggregation systems (ELK, Splunk, CloudWatch) are
    accessed by many engineers. A single logged API key can be found months later by anyone with log access. GDPR/CCPA require
    PII handling controls — logs with PII in plain text are a compliance violation that can result in millions in fines.
  how_to_do_right: 'Use an allowlist approach — only log fields you explicitly choose. Mask sensitive fields at the logging
    layer (not the application layer). Use a PII detection library to catch mistakes. Redact: passwords, API keys, tokens,
    credit cards, SSNs, email (keep domain only), phone numbers. Audit log configs quarterly.'
  severity: critical
  technologies:
    lang: [python]
    framework: [structlog]
    library: [vector]
    platform: [fluentd]
  domains:
    domain: [observability, security, compliance]
  example_good: "# Sanitize sensitive fields at logging layer\nimport structlog\n\ndef sanitize_processor(logger, method_name,\
    \ event_dict):\n    \"\"\"Redact sensitive fields before logging.\"\"\"\n    sensitive_keys = {\"password\", \"token\"\
    , \"api_key\", \"secret\",\n                     \"credit_card\", \"ssn\", \"authorization\"}\n    for key in sensitive_keys:\n\
    \        if key in event_dict:\n            event_dict[key] = \"***REDACTED***\"\n    # Mask email: user@example.com →\
    \ u***@example.com\n    if \"email\" in event_dict:\n        email = event_dict[\"email\"]\n        local, domain = email.split(\"\
    @\")\n        event_dict[\"email\"] = f\"{local[0]}***@{domain}\"\n    return event_dict\n\nstructlog.configure(processors=[sanitize_processor,\
    \ ...])\n\n# Safe to log — sensitive data redacted automatically\nlogger.info(\"login\", user_id=\"123\", password=\"\
    hunter2\", token=\"sk_live_...\")\n# Output: {\"user_id\": \"123\", \"password\": \"***REDACTED***\", \"token\": \"***REDACTED***\"\
    }\n"
  example_bad: '# Logging raw request bodies — PII leak

    logger.info(f"Request body: {request.json()}")

    # Output: {"password": "hunter2", "credit_card": "4111-1111-1111-1111", "ssn": "123-45-6789"}

    # Stored in CloudWatch for 90 days, accessible by 50+ engineers

    # GDPR violation: 4% of annual revenue fine

    '
  when_applies: Any project using structlog, Fluentd, or Vector
  when_not_applies: throwaway prototypes, local dev scripts
  sources: ["https://cheatsheetseries.owasp.org/cheatsheets/Logging_Cheat_Sheet.html"]
- id: CR-OBS-010
  text: Use OpenTelemetry for distributed tracing — instrument with vendor-neutral APIs, export to any backend.
  why: Vendor-specific SDKs (Datadog SDK, New Relic agent) lock you into one observability platform. Switching costs months
    of re-instrumentation. OpenTelemetry is the CNCF standard — instrument once, export to any backend (Jaeger, Zipkin, Datadog,
    Honeycomb, Grafana Tempo). Your instrumentation investment is permanent regardless of vendor changes.
  how_to_do_right: Install OpenTelemetry SDK for your language. Use auto-instrumentation for frameworks (FastAPI, Express,
    Spring). Add manual spans for business logic. Configure exporters for your backend. Propagate context via W3C TraceContext
    headers. Use semantic conventions for span attributes.
  severity: high
  technologies:
    library: [grafana tempo]
    platform: [opentelemetry, jaeger, datadog]
  domains:
    domain: [observability, architecture]
    concern: [microservices]
  example_good: "# Python — OpenTelemetry auto + manual instrumentation\nfrom opentelemetry import trace\nfrom opentelemetry.sdk.trace\
    \ import TracerProvider\nfrom opentelemetry.sdk.trace.export import BatchSpanProcessor\nfrom opentelemetry.exporter.otlp.proto.grpc.trace_exporter\
    \ import OTLPSpanExporter\nfrom opentelemetry.instrumentation.fastapi import FastAPIInstrumentor\n\n# Setup — vendor-neutral,\
    \ switch backend by changing exporter\nprovider = TracerProvider()\nprovider.add_span_processor(BatchSpanProcessor(\n\
    \    OTLPSpanExporter(endpoint=\"http://tempo:4317\")  # Or Datadog, Jaeger, etc.\n))\ntrace.set_tracer_provider(provider)\n\
    \n# Auto-instrument FastAPI (HTTP spans automatic)\nFastAPIInstrumentor.instrument_app(app)\n\n# Manual span for business\
    \ logic\ntracer = trace.get_tracer(__name__)\nwith tracer.start_as_current_span(\"process_payment\") as span:\n    span.set_attribute(\"\
    payment.amount\", order.total)\n    span.set_attribute(\"payment.currency\", \"USD\")\n    result = payment_gateway.charge(order)\n\
    \    span.set_attribute(\"payment.status\", result.status)\n"
  example_bad: "# Vendor-locked instrumentation — Datadog-specific\nfrom ddtrace import tracer\n@tracer.wrap(service=\"api\"\
    , resource=\"process_payment\")\ndef process_payment(order):\n    ...\n# Switching to Grafana Tempo? Re-instrument EVERY\
    \ service.\n# Migration cost: weeks of work + testing across all services\n"
  when_applies: Projects using OpenTelemetry, Jaeger, Grafana Tempo, or Datadog
  when_not_applies: throwaway prototypes, local dev scripts
  sources: ["https://opentelemetry.io/docs/concepts/signals/traces/"]
- id: CR-OBS-011
  text: Set meaningful span attributes using OpenTelemetry semantic conventions — http.method, db.system, rpc.service.
  why: Spans without attributes are useless — they show timing but not context. You see 'database query took 2 seconds' but
    not which query, which table, or which user triggered it. Semantic conventions ensure consistency across services — every
    team uses the same attribute names, enabling cross-service queries and dashboards.
  how_to_do_right: 'Follow OpenTelemetry Semantic Conventions for attribute names. HTTP spans: http.method, http.status_code,
    http.route, url.scheme. Database spans: db.system, db.statement (sanitized), db.operation. RPC spans: rpc.system, rpc.service,
    rpc.method. Add business attributes: order.id, user.id (if not PII-restricted).'
  severity: medium
  technologies:
    library: [grafana tempo]
    platform: [opentelemetry, jaeger]
  domains:
    domain: [observability, architecture]
    concern: [microservices]
  example_good: "# Span with semantic convention attributes\nwith tracer.start_as_current_span(\"db.query\") as span:\n  \
    \  span.set_attribute(\"db.system\", \"postgresql\")\n    span.set_attribute(\"db.operation\", \"SELECT\")\n    span.set_attribute(\"\
    db.sql.table\", \"orders\")\n    span.set_attribute(\"db.statement\", \"SELECT * FROM orders WHERE user_id = ?\")\n  \
    \  # Now you can query: db.system=\"postgresql\" AND db.operation=\"SELECT\"\n    # Dashboard: latency by db.sql.table\
    \ → shows \"orders\" table is slow\n    result = db.execute(query, params)\n    span.set_attribute(\"db.response.rows\"\
    , len(result))\n"
  example_bad: "# Span with no attributes — useless for debugging\nwith tracer.start_as_current_span(\"query\"):\n    result\
    \ = db.execute(query)\n# Trace shows: \"query\" — 2.3 seconds\n# Which database? Which table? Which query? No idea.\n"
  when_applies: Projects using OpenTelemetry, Jaeger, or Grafana Tempo
  when_not_applies: throwaway prototypes, local dev scripts
  sources: ["https://opentelemetry.io/docs/specs/semconv/"]
- id: CR-OBS-012
  text: Use tail-based sampling for traces — capture 100% of error/slow traces, sample normal traces.
  why: 'Head-based sampling (decide at request start) randomly drops error traces — the exact ones you need most. At 10% head
    sampling, you lose 90% of your error traces. Tail-based sampling waits until the request completes to decide: errors and
    slow requests are always captured (100%), while fast successful requests are sampled (1-10%). This gives you full error
    coverage at a fraction of the storage cost.'
  how_to_do_right: 'Use OpenTelemetry Collector with tail_sampling processor. Configure policies: always sample errors (status
    != OK), always sample slow requests (duration > threshold), probabilistic sample for the rest. Set appropriate thresholds
    based on your p99 latency. Monitor sampling rates to ensure coverage.'
  severity: medium
  technologies:
    library: [opentelemetry collector, grafana tempo]
    platform: [jaeger]
  domains:
    domain: [observability, performance, operations]
    concern: [cost]
  example_good: "# OpenTelemetry Collector — tail-based sampling config\nprocessors:\n  tail_sampling:\n    decision_wait:\
    \ 10s       # Wait for span to complete\n    policies:\n      - name: errors-always\n        type: status_code\n     \
    \   status_code: { status_codes: [ERROR] }\n        # 100% of error traces captured\n\n      - name: slow-requests\n \
    \       type: latency\n        latency: { threshold_ms: 2000 }\n        # 100% of traces >2s captured\n\n      - name:\
    \ normal-sampling\n        type: probabilistic\n        probabilistic: { sampling_percentage: 5 }\n        # 5% of normal\
    \ traces captured\n\n# Result: 100% error coverage, 5% normal, ~80% cost reduction\n"
  example_bad: "# Head-based sampling — randomly drops errors\nprocessors:\n  probabilistic_sampler:\n    sampling_percentage:\
    \ 10    # 10% of ALL traces\n# 10% of error traces are captured — 90% of debugging data lost\n# \"We had 50 errors but\
    \ can only find traces for 5 of them\"\n"
  when_applies: Projects using OpenTelemetry Collector, Jaeger, or Grafana Tempo
  when_not_applies: throwaway prototypes, local dev scripts
  sources: ["https://opentelemetry.io/docs/collector/configuration/#tail_sampling-processor"]
- id: CR-OBS-013
  text: Alert on symptoms (high latency, error rate) not causes (high CPU, disk usage) — users feel symptoms, not causes.
  why: High CPU is not a problem if latency is normal — maybe the service is efficiently using resources. Low disk space is
    not urgent if the service is functioning. But high latency or error rates ALWAYS mean users are affected. Cause-based
    alerts generate noise (CPU spikes during cron jobs, disk grows linearly) while symptom-based alerts have direct user impact
    correlation.
  how_to_do_right: 'Primary alerts: p99 latency > SLO threshold, error rate > SLO budget, availability < SLO target. Secondary
    alerts (lower priority): resource utilization trends for capacity planning. Use cause metrics for DIAGNOSIS after symptom
    alert fires. Dashboard: symptoms on top row, causes on second row.'
  severity: high
  technologies:
    library: [alertmanager]
    platform: [prometheus, pagerduty, datadog]
  domains:
    domain: [observability, reliability]
  example_good: "# Symptom-based alerts — direct user impact\ngroups:\n  - name: service-slo\n    rules:\n      - alert: HighErrorRate\n\
    \        expr: |\n          rate(http_requests_total{status=~\"5..\"}[5m])\n          / rate(http_requests_total[5m])\
    \ > 0.01\n        for: 5m\n        labels:\n          severity: critical\n        annotations:\n          summary: \"\
    Error rate >1% for 5 minutes — users affected\"\n          runbook: \"https://wiki.example.com/runbooks/high-error-rate\"\
    \n\n      - alert: HighLatency\n        expr: |\n          histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m]))\
    \ > 2\n        for: 5m\n        labels:\n          severity: warning\n        annotations:\n          summary: \"p99 latency\
    \ >2s — user experience degraded\"\n"
  example_bad: "# Cause-based alerts — noisy, indirect\n- alert: HighCPU\n  expr: node_cpu_utilization > 80\n  # Fires during:\
    \ batch jobs, deployments, GC pauses, cron jobs\n  # Engineer wakes up at 3 AM → \"latency is fine, was just a batch job\"\
    \n\n- alert: HighMemory\n  expr: node_memory_utilization > 70\n  # Fires because: Linux uses memory for disk cache (healthy\
    \ behavior)\n  # Alert fatigue → real alerts get ignored\n"
  when_applies: Projects using Prometheus metrics collection, Alertmanager, PagerDuty, or Datadog
  when_not_applies: throwaway prototypes, local dev scripts
  sources: ["https://sre.google/sre-book/monitoring-distributed-systems/#symptoms-versus-causes"]
- id: CR-OBS-014
  text: Every alert must have a linked runbook with diagnosis steps and remediation actions.
  why: 'An alert without a runbook is a notification, not an actionable signal. At 3 AM, the on-call engineer seeing ''HighErrorRate''
    needs to know: Which service? What to check first? How to mitigate? Who to escalate to? Without a runbook, they spend
    20 minutes figuring this out while users wait. With a runbook, time-to-mitigate drops from 30 minutes to 5 minutes.'
  how_to_do_right: 'Create a runbook template: 1) What this alert means, 2) Impact assessment, 3) Diagnosis steps (specific
    commands/queries), 4) Remediation options (ordered by speed), 5) Escalation contacts, 6) Post-incident steps. Link runbook
    URL in alert annotations. Review runbooks quarterly. Update after every incident.'
  severity: high
  technologies:
    library: [opsgenie, alertmanager, confluence]
    platform: [pagerduty]
  domains:
    domain: [observability, reliability]
    concern: [incident-management]
  example_good: "# Alert with runbook link\n- alert: DatabaseConnectionPoolExhausted\n  expr: pg_connection_pool_active /\
    \ pg_connection_pool_max > 0.95\n  annotations:\n    summary: \"DB connection pool >95% — new requests will fail\"\n \
    \   runbook: \"https://wiki.example.com/runbooks/db-pool-exhausted\"\n    # Runbook contains:\n    # 1. Check active queries:\
    \ SELECT * FROM pg_stat_activity WHERE state='active'\n    # 2. Kill long-running queries: SELECT pg_terminate_backend(pid)\n\
    \    # 3. Increase pool size (if capacity allows): ALTER SYSTEM SET max_connections\n    # 4. Escalate to DBA if pool\
    \ is exhausted by legitimate traffic\n    # 5. Check for connection leaks in recent deploys\n"
  example_bad: "# Alert with no runbook — panic at 3 AM\n- alert: DatabaseConnectionPoolExhausted\n  expr: pg_connection_pool_active\
    \ / pg_connection_pool_max > 0.95\n  annotations:\n    summary: \"DB pool full\"\n# On-call at 3 AM: \"What do I do? Who\
    \ owns the database? What queries are running?\"\n# 30 minutes of googling while production is down\n"
  when_applies: Projects using PagerDuty, OpsGenie, Alertmanager, or Confluence
  when_not_applies: throwaway prototypes, local dev scripts
  sources: ["https://sre.google/sre-book/effective-troubleshooting/"]
- id: CR-OBS-015
  text: Use SLO-based burn rate alerting — alert when error budget consumption rate threatens the SLO.
  why: 'Traditional threshold alerts (error rate > 1%) fire too often for transient spikes and too late for slow degradations.
    Burn rate alerting asks: ''At this rate, will we exhaust our error budget before the SLO window ends?'' A 14.4x burn rate
    means you''ll exhaust your monthly budget in 2 days — that deserves a page. A 1x burn rate is normal — no alert needed.'
  how_to_do_right: 'Define SLO: 99.9% availability = 43.8 minutes/month error budget. Calculate burn rate: actual_error_rate
    / allowed_error_rate. Multi-window alerts: fast burn (14.4x for 1h) = page, slow burn (3x for 6h) = ticket. Use Google''s
    multi-window, multi-burn-rate approach from the SRE book.'
  severity: high
  technologies:
    library: [alertmanager, sloth, google sre]
    platform: [prometheus]
  domains:
    domain: [observability, reliability, operations]
    concern: [sre]
  example_good: "# Multi-window burn rate alerting (Google SRE approach)\n# SLO: 99.9% availability (error budget = 0.1%)\n\
    groups:\n  - name: slo-burn-rate\n    rules:\n      # Fast burn — PAGE (exhausts budget in 2 days)\n      - alert: SLOBurnRateCritical\n\
    \        expr: |\n          (\n            rate(http_requests_total{status=~\"5..\"}[1h])\n            / rate(http_requests_total[1h])\n\
    \          ) > (14.4 * 0.001)  # 14.4x burn rate\n          AND\n          (\n            rate(http_requests_total{status=~\"\
    5..\"}[5m])\n            / rate(http_requests_total[5m])\n          ) > (14.4 * 0.001)  # Confirmed in short window too\n\
    \        labels:\n          severity: critical  # PagerDuty page\n\n      # Slow burn — TICKET (exhausts budget in 10\
    \ days)\n      - alert: SLOBurnRateWarning\n        expr: |\n          (\n            rate(http_requests_total{status=~\"\
    5..\"}[6h])\n            / rate(http_requests_total[6h])\n          ) > (3 * 0.001)  # 3x burn rate\n        labels:\n\
    \          severity: warning  # Create Jira ticket\n"
  example_bad: "# Static threshold — too noisy or too late\n- alert: HighErrorRate\n  expr: rate(http_requests_total{status=~\"\
    5..\"}[5m]) / rate(http_requests_total[5m]) > 0.01\n  # Fires on: brief 2-second spike, deploy blip, single bad request\n\
    \  # Misses: slow degradation from 0.05% to 0.08% over 3 days (within 0.01 threshold\n  #         but consuming error\
    \ budget faster than sustainable)\n"
  when_applies: Projects using Prometheus metrics collection, Alertmanager, Sloth, or Google SRE
  when_not_applies: throwaway prototypes, local dev scripts
  sources: ["https://sre.google/workbook/alerting-on-slos/"]
- id: CR-OBS-016
  text: Route alerts to the right team with proper escalation — PagerDuty/OpsGenie with on-call schedules.
  why: Unrouted alerts go to a shared channel where everyone assumes someone else will handle it — the bystander effect. Without
    escalation, a missed alert at 3 AM becomes an 8-hour outage. Proper routing ensures the team that owns the service gets
    paged first, with automatic escalation to management if unacknowledged.
  how_to_do_right: 'Tag alerts with owning team (labels: team=payments). Route to team-specific on-call schedule. Escalate:
    5 min → retry primary, 15 min → secondary on-call, 30 min → engineering manager. Use separate channels for critical (page)
    vs warning (ticket). Review escalation policies quarterly.'
  severity: medium
  technologies:
    library: [opsgenie, alertmanager]
    platform: [pagerduty]
  domains:
    domain: [observability, reliability]
    concern: [incident-management]
  example_good: "# Alertmanager routing — team-based with escalation\nroute:\n  receiver: default-slack\n  routes:\n    -\
    \ match:\n        severity: critical\n      receiver: pagerduty-primary\n      continue: true\n      routes:\n       \
    \ - match:\n            team: payments\n          receiver: pagerduty-payments-oncall\n        - match:\n            team:\
    \ platform\n          receiver: pagerduty-platform-oncall\n\n    - match:\n        severity: warning\n      receiver:\
    \ jira-ticket  # Non-urgent → ticket\n\n# PagerDuty escalation policy:\n# 0 min:  Page primary on-call\n# 5 min:  Re-page\
    \ primary (in case missed)\n# 15 min: Page secondary on-call\n# 30 min: Page engineering manager\n"
  example_bad: "# All alerts to one Slack channel — bystander effect\nroute:\n  receiver: slack-alerts  # Everything goes\
    \ here\n# 200 alerts/day in #alerts channel\n# \"Someone should look at that\" → nobody does\n# Critical payment failure\
    \ buried between CPU warnings\n"
  when_applies: Projects using PagerDuty, OpsGenie, or Alertmanager
  when_not_applies: throwaway prototypes, local dev scripts
  sources: ["https://prometheus.io/docs/alerting/latest/alertmanager/#routing"]
- id: CR-OBS-017
  text: Prune alerts that never get actioned — if an alert fires and nobody acts on it, delete it.
  why: 'Alert fatigue is the #1 killer of on-call effectiveness. When 80% of alerts are noise, engineers learn to ignore ALL
    alerts — including real ones. Every unactioned alert actively damages your alerting system''s credibility. Industry data
    shows teams with >100 alerts/week have 3x longer MTTR than teams with <20 meaningful alerts/week.'
  how_to_do_right: 'Audit alerts monthly: count fires, count acknowledged, count actioned. Delete alerts that fired >5 times
    but were never actioned. Convert noisy alerts to dashboards (informational, not actionable). Target: <5 pages/week per
    on-call person. Every alert should be: actionable, relevant, unique, and timely.'
  severity: medium
  technologies:
    library: [opsgenie, alertmanager]
    platform: [pagerduty, datadog]
  domains:
    domain: [observability, reliability]
    concern: [engineering-culture]
  example_good: '# Monthly alert audit process

    # 1. Export alert history

    pagerduty-api get-alerts --last-30d --format=csv > alerts.csv


    # 2. Analyze action rate

    # Alert                    | Fires | Acknowledged | Actioned

    # HighCPU                  |   47  |      5       |    0     ← DELETE

    # DiskSpaceLow             |   12  |      3       |    1     ← TUNE threshold

    # HighErrorRate            |    3  |      3       |    3     ← KEEP

    # DatabaseConnectionPool   |    1  |      1       |    1     ← KEEP


    # 3. Action: Delete HighCPU alert, convert to dashboard panel

    # Result: 47 fewer noise alerts/month, on-call trusts remaining alerts

    '
  example_bad: '# 200 alerts configured, growing every quarter, never pruned

    # On-call week: 150 alerts → acknowledge all → action 3

    # New engineer on-call: "Is this one real?" → "Probably not, just ack it"

    # Real incident: buried in noise, missed for 2 hours

    '
  when_applies: Projects using PagerDuty, OpsGenie, Alertmanager, or Datadog
  when_not_applies: throwaway prototypes, local dev scripts
  sources: ["https://sre.google/sre-book/monitoring-distributed-systems/"]
- id: CR-OBS-018
  text: Generate service maps automatically from distributed traces — visualize service dependencies and health.
  why: Manual architecture diagrams are always out of date. Engineers add services, change dependencies, and remove components
    without updating documentation. Trace-derived service maps show the ACTUAL topology — which services talk to which, latency
    between them, error rates per edge. During incidents, a live service map instantly shows which dependency is degraded.
  how_to_do_right: Enable auto-instrumentation (OpenTelemetry) for all services. Use a backend that generates service maps
    from trace data (Jaeger, Grafana Tempo, Datadog APM). Color-code edges by health (green=healthy, yellow=degraded, red=failing).
    Show throughput and latency per edge. Use for capacity planning and dependency audits.
  severity: medium
  technologies:
    library: [grafana tempo, datadog apm]
    platform: [opentelemetry, jaeger]
  domains:
    domain: [observability, architecture]
    concern: [microservices]
  example_good: "# Auto-instrumented services generate service map\n# OpenTelemetry auto-instrumentation for Python\nopentelemetry-instrument\
    \ \\\n  --traces_exporter otlp \\\n  --service_name user-service \\\n  python app.py\n\n# Grafana Tempo Service Map shows:\n\
    # [API Gateway] --200ms--> [User Service] --50ms--> [PostgreSQL]\n#                     \\--300ms--> [Payment Service]\
    \ --100ms--> [Stripe API]\n#                                        \\--RED--> [Redis]  ← Redis failing!\n# Instant visual:\
    \ Redis is the root cause of payment failures\n"
  example_bad: '# Manual Confluence diagram — always outdated

    # "Architecture Diagram v3.2 (updated 6 months ago)"

    # Missing: 3 new microservices, 2 removed services, changed DB

    # Incident: "Which services depend on Redis?" → nobody knows

    # 30 minutes searching code for Redis imports across 20 repos

    '
  when_applies: Projects using OpenTelemetry, Jaeger, Grafana Tempo, or Datadog APM
  when_not_applies: throwaway prototypes, local dev scripts
  sources: ["https://opentelemetry.io/docs/concepts/signals/traces/"]
