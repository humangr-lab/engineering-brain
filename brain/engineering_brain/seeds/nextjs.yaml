layer: rules
technology: Next.js
domain: frontend
knowledge:
- id: CR-NEXT-LAYOUT-001
  text: Use layout.tsx for shared UI and preserved state — it does not re-render when navigating between child routes.
  why: Putting shared UI (sidebar, header, navigation) in individual pages causes full re-mounts on every navigation — losing
    scroll position, input focus, and component state. Layouts persist across navigations, providing instant transitions and
    consistent UX.
  how_to_do_right: 'Place truly shared UI in layout.tsx. Use nested layouts for progressive specificity (root layout → dashboard
    layout → settings layout). Remember: layouts cannot access the current pathname — use a client component with usePathname
    for active nav highlighting.'
  severity: high
  technologies:
    lang: [typescript]
    framework: [frontend, react]
    library: [next, js]
  domains:
    domain: [architecture]
    concern: [frontend, routing]
  example_good: "// app/dashboard/layout.tsx — persists across all /dashboard/* routes\nexport default function DashboardLayout({\n\
    \  children,\n}: {\n  children: React.ReactNode;\n}) {\n  return (\n    <div className=\"flex\">\n      <Sidebar /> {/*\
    \ Stays mounted — no flicker */}\n      <main className=\"flex-1\">{children}</main>\n    </div>\n  );\n}\n\n// app/dashboard/page.tsx\
    \ — only this re-renders on navigation\nexport default function DashboardHome() {\n  return <DashboardCharts />;\n}\n"
  example_bad: "// Sidebar in every page — re-mounts on each navigation\n// app/dashboard/page.tsx\nexport default function\
    \ Dashboard() {\n  return (\n    <div className=\"flex\">\n      <Sidebar /> {/* Re-renders! Loses sidebar scroll position\
    \ */}\n      <main><DashboardCharts /></main>\n    </div>\n  );\n}\n// app/dashboard/settings/page.tsx — duplicate sidebar\n\
    export default function Settings() {\n  return (\n    <div className=\"flex\">\n      <Sidebar /> {/* Duplicated in every\
    \ page file */}\n      <main><SettingsForm /></main>\n    </div>\n  );\n}\n"
  when_applies: Projects using Next.js SSR/SSG applications, React component-based UIs, or TypeScript projects with static
    typing
  when_not_applies: server-rendered pages, APIs, CLI tools
  sources: ["https://nextjs.org/docs/app/building-your-application/routing/layouts-and-templates"]
- id: CR-NEXT-LOADING-001
  text: Use loading.tsx for instant loading states with streaming Suspense boundaries.
  why: Without loading.tsx, navigation to a page with data fetching shows a blank screen until all data resolves. loading.tsx
    automatically wraps the page in a Suspense boundary, showing a skeleton instantly while the server streams the page content.
  how_to_do_right: Create loading.tsx at each route segment that fetches data. Use skeleton UIs that match the page layout.
    Place loading.tsx at the right nesting level — too high blocks the entire layout, too low creates layout shifts.
  severity: high
  technologies:
    framework: [frontend, react]
    library: [next, js]
  domains:
    domain: [architecture, performance]
    concern: [frontend, ux]
  example_good: "// app/dashboard/loading.tsx — shown instantly during data fetch\nexport default function DashboardLoading()\
    \ {\n  return (\n    <div className=\"grid grid-cols-3 gap-4\">\n      <Skeleton className=\"h-48\" /> {/* Matches chart\
    \ layout */}\n      <Skeleton className=\"h-48\" />\n      <Skeleton className=\"h-48\" />\n    </div>\n  );\n}\n\n//\
    \ app/dashboard/page.tsx — async Server Component\nexport default async function Dashboard() {\n  const stats = await\
    \ fetchDashboardStats(); // Slow — but skeleton shows first\n  return <DashboardGrid stats={stats} />;\n}\n"
  example_bad: "// No loading.tsx — user sees blank white screen for 2 seconds\nexport default async function Dashboard()\
    \ {\n  const stats = await fetchDashboardStats(); // User waits with no feedback\n  return <DashboardGrid stats={stats}\
    \ />;\n}\n"
  when_applies: Projects using Next.js SSR/SSG applications or React component-based UIs
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using Next.js or React
  sources: ["https://nextjs.org/docs/app/building-your-application/routing/loading-ui-and-streaming"]
- id: CR-NEXT-ERROR-001
  text: Use error.tsx for per-route error boundaries — they catch errors without crashing the entire app.
  why: Without error.tsx, a runtime error in any page bubbles up to the root and shows a blank error screen, losing all navigation
    state. error.tsx catches errors at the route segment level, keeping the layout and sibling routes functional.
  how_to_do_right: Create error.tsx at meaningful boundaries. It must be a Client Component ('use client'). Provide a retry
    button using the reset() function. Log errors to your error tracking service (Sentry, etc.).
  severity: high
  technologies:
    lang: [typescript]
    framework: [frontend, react]
    library: [next, js]
  domains:
    domain: [architecture, reliability]
    concern: [frontend, error_handling]
  example_good: "// app/dashboard/error.tsx\n'use client';\n\nexport default function DashboardError({\n  error,\n  reset,\n\
    }: {\n  error: Error & { digest?: string };\n  reset: () => void;\n}) {\n  useEffect(() => {\n    Sentry.captureException(error);\
    \ // Report to error tracking\n  }, [error]);\n\n  return (\n    <div className=\"error-container\">\n      <h2>Dashboard\
    \ failed to load</h2>\n      <p>{error.message}</p>\n      <button onClick={() => reset()}>Try again</button>\n    </div>\n\
    \  );\n}\n"
  example_bad: '// No error.tsx — entire app crashes on dashboard error

    // User sees generic Next.js error page, loses all state

    // Only option is full page reload

    '
  when_applies: Projects using Next.js SSR/SSG applications, React component-based UIs, or TypeScript projects with static
    typing
  when_not_applies: server-rendered pages, APIs, CLI tools
  sources: ["https://nextjs.org/docs/app/building-your-application/routing/error-handling"]
- id: CR-NEXT-ROUTE-GROUP-001
  text: Use route groups (parentheses) to organize routes and apply different layouts without affecting the URL.
  why: Without route groups, you need separate root layouts for marketing pages vs app pages, or you end up with a single
    bloated layout that conditionally renders. Route groups let you have (marketing) and (app) with different layouts at the
    same URL level.
  how_to_do_right: 'Name groups with parentheses: (marketing), (app), (auth). Each group can have its own layout.tsx. Groups
    don''t appear in the URL. Use for auth vs non-auth layouts, public vs private sections.'
  severity: medium
  technologies:
    library: [next, js]
  domains:
    domain: [architecture]
    concern: [frontend, routing]
  example_good: "// Folder structure:\n// app/(marketing)/layout.tsx    — landing page layout (no sidebar)\n// app/(marketing)/page.tsx\
    \      — / (home page)\n// app/(marketing)/pricing/page.tsx — /pricing\n// app/(app)/layout.tsx          — app layout\
    \ (with sidebar + auth)\n// app/(app)/dashboard/page.tsx  — /dashboard\n// app/(app)/settings/page.tsx   — /settings\n\
    \n// (marketing)/layout.tsx\nexport default function MarketingLayout({ children }: { children: React.ReactNode }) {\n\
    \  return <><MarketingNav />{children}<Footer /></>;\n}\n\n// (app)/layout.tsx\nexport default function AppLayout({ children\
    \ }: { children: React.ReactNode }) {\n  return <><AppSidebar /><main>{children}</main></>;\n}\n"
  example_bad: "// Single layout for everything — conditionally shows sidebar\nexport default function RootLayout({ children\
    \ }) {\n  const pathname = usePathname();\n  const isApp = pathname.startsWith('/dashboard');\n  return (\n    <>\n  \
    \    {isApp ? <AppSidebar /> : <MarketingNav />}\n      {children}\n      {!isApp && <Footer />}\n    </>\n  ); // Messy\
    \ conditional logic that grows with every new section\n}\n"
  when_applies: Projects using Next.js SSR/SSG applications
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using Next.js
  sources: ["https://nextjs.org/docs/app/building-your-application/routing/route-groups"]
- id: CR-NEXT-FETCH-001
  text: Fetch data in Server Components with async/await — not in useEffect with client-side fetch.
  why: 'Client-side fetching (useEffect + fetch) creates a waterfall: HTML loads → JS loads → React hydrates → fetch fires
    → data renders. Server Components fetch during rendering — the data is embedded in the streamed HTML, eliminating the
    waterfall and improving TTFB.'
  how_to_do_right: Make Server Components async. Fetch directly from the database or API. Use Next.js extended fetch() for
    caching and revalidation. Pass fetched data as props to Client Components that need interactivity.
  severity: critical
  technologies:
    lang: [typescript]
    framework: [frontend, react]
    library: [next, js]
  domains:
    domain: [architecture, performance]
    concern: [frontend, data-fetching]
  example_good: "// Server Component — data fetched on server, streamed with HTML\nexport default async function ProductPage({\n\
    \  params,\n}: {\n  params: { id: string };\n}) {\n  const product = await fetch(`https://api.example.com/products/${params.id}`,\
    \ {\n    next: { revalidate: 3600 }, // ISR — revalidate every hour\n  }).then(r => r.json());\n\n  return (\n    <div>\n\
    \      <h1>{product.name}</h1>\n      <ProductGallery images={product.images} /> {/* Client for interactivity */}\n  \
    \  </div>\n  );\n}\n"
  example_bad: "'use client'; // Forces entire page to be client-side\nexport default function ProductPage({ params }: { params:\
    \ { id: string } }) {\n  const [product, setProduct] = useState(null);\n  const [loading, setLoading] = useState(true);\n\
    \n  useEffect(() => {\n    fetch(`/api/products/${params.id}`)\n      .then(r => r.json())\n      .then(setProduct)\n\
    \      .finally(() => setLoading(false));\n  }, [params.id]);\n  // Waterfall: blank page → spinner → content. No SEO.\n\
    \  if (loading) return <Spinner />;\n  return <div>{product?.name}</div>;\n}\n"
  when_applies: Any project using Next.js SSR/SSG applications, React component-based UIs, or TypeScript projects with static
    typing
  when_not_applies: server-rendered pages, APIs, CLI tools
  sources: ["https://nextjs.org/docs/app/building-your-application/data-fetching/fetching"]
- id: CR-NEXT-FETCH-002
  text: Use generateStaticParams for static generation of known paths — avoid building pages on-demand for known content.
  why: Without generateStaticParams, dynamic routes are rendered on every request (SSR). For pages with known content (blog
    posts, product catalog), this wastes server resources and adds latency. Static generation serves pre-built HTML from CDN
    at near-zero latency.
  how_to_do_right: Export generateStaticParams from dynamic route pages. Return all known parameter combinations. Use dynamicParams
    = false to return 404 for unknown paths. Combine with revalidate for ISR.
  severity: high
  technologies:
    lang: [typescript]
    library: [next, js]
  domains:
    domain: [architecture, performance]
    concern: [frontend, seo]
  example_good: "// app/blog/[slug]/page.tsx\nexport async function generateStaticParams() {\n  const posts = await getAllPosts();\n\
    \  return posts.map((post) => ({ slug: post.slug }));\n}\n\n// Optionally: return 404 for unknown slugs\nexport const\
    \ dynamicParams = false;\n\nexport default async function BlogPost({ params }: { params: { slug: string } }) {\n  const\
    \ post = await getPost(params.slug);\n  return <article>{post.content}</article>;\n}\n// Built at deploy time — served\
    \ from CDN, sub-50ms TTFB\n"
  example_bad: "// No generateStaticParams — every page visit hits the server\nexport default async function BlogPost({ params\
    \ }: { params: { slug: string } }) {\n  const post = await getPost(params.slug);\n  return <article>{post.content}</article>;\n\
    }\n// 200ms+ TTFB per request instead of CDN-speed static HTML\n"
  when_applies: Projects using Next.js SSR/SSG applications or TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using Next.js or TypeScript
  sources: ["https://nextjs.org/docs/app/api-reference/functions/generate-static-params"]
- id: CR-NEXT-ACTIONS-001
  text: Use Server Actions ('use server') for mutations — not API route handlers for form submissions.
  why: 'API routes for mutations require: creating the route file, defining the request/response types, calling fetch on the
    client, handling serialization, managing loading states. Server Actions do all of this with a single async function that
    works with progressive enhancement.'
  how_to_do_right: Mark functions with 'use server'. Use in form action= for progressive enhancement. Call from event handlers
    for non-form mutations. Use useFormStatus for loading states. Validate inputs with zod on the server.
  severity: medium
  technologies:
    lang: [typescript]
    framework: [frontend, react]
    library: [next, js]
  domains:
    domain: [architecture]
    concern: [frontend, data-fetching, forms]
  example_good: "// app/actions.ts\n'use server';\nimport { z } from 'zod';\nimport { revalidatePath } from 'next/cache';\n\
    \nconst schema = z.object({ title: z.string().min(1), body: z.string().min(10) });\n\nexport async function createPost(formData:\
    \ FormData) {\n  const parsed = schema.safeParse({\n    title: formData.get('title'),\n    body: formData.get('body'),\n\
    \  });\n  if (!parsed.success) return { error: parsed.error.flatten() };\n\n  await db.post.create({ data: parsed.data\
    \ });\n  revalidatePath('/posts');\n}\n\n// app/posts/new/page.tsx — works without JavaScript!\nexport default function\
    \ NewPost() {\n  return (\n    <form action={createPost}>\n      <input name=\"title\" required />\n      <textarea name=\"\
    body\" required />\n      <SubmitButton />\n    </form>\n  );\n}\n"
  example_bad: "// Separate API route + client fetch — more code, no progressive enhancement\n// app/api/posts/route.ts\n\
    export async function POST(req: Request) { /* ... */ }\n\n// app/posts/new/page.tsx\n'use client';\nexport default function\
    \ NewPost() {\n  const handleSubmit = async (e) => {\n    e.preventDefault();\n    await fetch('/api/posts', { method:\
    \ 'POST', body: JSON.stringify(data) });\n  };\n  // Doesn't work without JavaScript\n}\n"
  when_applies: Projects using Next.js SSR/SSG applications, React component-based UIs, or TypeScript projects with static
    typing
  when_not_applies: server-rendered pages, APIs, CLI tools
  sources: ["https://nextjs.org/docs/app/building-your-application/data-fetching/server-actions-and-mutations"]
- id: CR-NEXT-RENDER-001
  text: Choose rendering strategy per page based on data freshness needs — SSG by default, SSR only when necessary.
  why: SSR renders every request on the server — 200ms+ TTFB. SSG pre-renders at build — sub-50ms from CDN. Using SSR for
    content that rarely changes (marketing pages, docs, blog) wastes server resources and adds latency. ISR gives the best
    of both worlds.
  how_to_do_right: 'Default to SSG (no dynamic functions). Use ISR (revalidate: N) for content updated periodically. Use SSR
    (force-dynamic) only for personalized/real-time pages. Use streaming (Suspense) for pages with mixed fast/slow data.'
  severity: high
  technologies:
    framework: [frontend, react]
    library: [next, js]
  domains:
    domain: [architecture, performance]
    concern: [frontend]
  example_good: "// Static: marketing page — built at deploy, served from CDN\nexport default function PricingPage() { return\
    \ <PricingTable />; }\n\n// ISR: product page — revalidates every hour\nexport const revalidate = 3600;\nexport default\
    \ async function ProductPage({ params }) {\n  const product = await getProduct(params.id);\n  return <ProductDetail product={product}\
    \ />;\n}\n\n// SSR: user dashboard — different for every user\nexport const dynamic = 'force-dynamic';\nexport default\
    \ async function Dashboard() {\n  const user = await getCurrentUser();\n  return <UserDashboard user={user} />;\n}\n"
  example_bad: "// Force-dynamic on everything — even static pages\nexport const dynamic = 'force-dynamic'; // On pricing\
    \ page!\nexport default async function PricingPage() {\n  const plans = await getPlans(); // Changes once a month\n  return\
    \ <PricingTable plans={plans} />;\n}\n// 200ms+ server render for content that could be static HTML on CDN\n"
  when_applies: Projects using Next.js SSR/SSG applications or React component-based UIs
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using Next.js or React
  sources: ["https://nextjs.org/docs/app/building-your-application/rendering"]
- id: CR-NEXT-MW-001
  text: Use middleware for authentication, redirects, and geolocation — it runs at the edge before any rendering.
  why: Checking auth in individual pages means the page starts rendering before the check. The user sees a flash of protected
    content before being redirected. Middleware runs before any page rendering, at the edge (close to the user), with sub-millisecond
    overhead.
  how_to_do_right: Create middleware.ts at the project root. Use matcher config to scope to specific routes. Keep middleware
    light — no database calls (use JWT verification, cookie checks). Return NextResponse.redirect for unauthenticated users.
  severity: high
  technologies:
    lang: [typescript]
    library: [next, js]
  domains:
    domain: [architecture, security]
    concern: [frontend, auth]
  example_good: "// middleware.ts — at project root\nimport { NextResponse } from 'next/server';\nimport type { NextRequest\
    \ } from 'next/server';\nimport { verifyJWT } from './lib/auth';\n\nexport async function middleware(request: NextRequest)\
    \ {\n  const token = request.cookies.get('session')?.value;\n\n  if (!token || !await verifyJWT(token)) {\n    const loginUrl\
    \ = new URL('/login', request.url);\n    loginUrl.searchParams.set('from', request.nextUrl.pathname);\n    return NextResponse.redirect(loginUrl);\n\
    \  }\n\n  return NextResponse.next();\n}\n\nexport const config = {\n  matcher: ['/dashboard/:path*', '/settings/:path*',\
    \ '/api/protected/:path*'],\n};\n"
  example_bad: "// Auth check in every page — flash of content, repeated code\nexport default async function Dashboard() {\n\
    \  const session = await getSession();\n  if (!session) redirect('/login'); // User briefly sees dashboard before redirect!\n\
    \  return <DashboardContent />;\n}\n"
  when_applies: Projects using Next.js SSR/SSG applications or TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using Next.js or TypeScript
  sources: ["https://nextjs.org/docs/app/building-your-application/routing/middleware"]
- id: CR-NEXT-CACHE-001
  text: Understand Next.js 4 caching layers — request memoization, data cache, full route cache, and router cache.
  why: Next.js caches aggressively by default. Not understanding the layers leads to stale data bugs (showing old prices,
    outdated user info) or performance issues (cache-busting everything). Each layer has its own invalidation strategy.
  how_to_do_right: 'Use revalidatePath/revalidateTag for on-demand invalidation. Use cache: ''no-store'' for real-time data.
    Use next.revalidate for time-based ISR. Tag fetches with next.tags for granular invalidation. Never bust all caches —
    invalidate surgically.'
  severity: critical
  technologies:
    lang: [typescript]
    library: [next, js]
  domains:
    domain: [architecture, performance]
    concern: [frontend, caching]
  example_good: "// Fetching with surgical cache control\nasync function getProduct(id: string) {\n  return fetch(`https://api.example.com/products/${id}`,\
    \ {\n    next: {\n      revalidate: 3600, // Cache for 1 hour\n      tags: [`product-${id}`], // Tag for granular invalidation\n\
    \    },\n  }).then(r => r.json());\n}\n\n// Server Action — invalidate specific cache after mutation\n'use server';\n\
    async function updateProduct(id: string, data: ProductInput) {\n  await db.product.update({ where: { id }, data });\n\
    \  revalidateTag(`product-${id}`); // Only this product's cache\n}\n"
  example_bad: "// Busting all caches on every mutation\nasync function updateProduct(id: string, data: ProductInput) {\n\
    \  await db.product.update({ where: { id }, data });\n  revalidatePath('/'); // Invalidates EVERYTHING — all pages rebuild\n\
    }\n\n// Or: no-store everywhere — defeats caching entirely\nconst product = await fetch(url, { cache: 'no-store' }); //\
    \ Server hit on every request\n"
  when_applies: Any project using Next.js SSR/SSG applications or TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using Next.js or TypeScript
  sources: ["https://nextjs.org/docs/app/building-your-application/caching"]
- id: CR-NEXT-IMAGE-001
  text: Always use next/image for images — it provides automatic WebP/AVIF, responsive srcset, and lazy loading.
  why: Raw <img> tags serve original-size images (2MB PNG) to all devices, load eagerly (blocking LCP), and don't generate
    responsive variants. next/image automatically optimizes format, generates srcset for different screen sizes, and lazy-loads
    below-fold images.
  how_to_do_right: Use next/image with width/height or fill prop. Set priority for LCP images (above the fold). Configure
    remotePatterns in next.config.js for external images. Use sizes prop for responsive layouts.
  severity: high
  technologies:
    framework: [frontend, react]
    library: [next, js]
  domains:
    domain: [architecture, performance]
    concern: [frontend, seo]
  example_good: "import Image from 'next/image';\n\n// LCP image — priority loading, explicit dimensions\n<Image\n  src=\"\
    /hero.jpg\"\n  alt=\"Hero banner\"\n  width={1200}\n  height={600}\n  priority // Preloads for LCP\n  sizes=\"100vw\"\n\
    />\n\n// Below-fold — lazy loaded, responsive\n<Image\n  src={product.image}\n  alt={product.name}\n  width={400}\n  height={400}\n\
    \  sizes=\"(max-width: 768px) 100vw, 33vw\"\n/>\n"
  example_bad: '// Raw img — no optimization, no lazy loading

    <img src="/hero.jpg" alt="Hero" />

    // Serves 2MB original, no WebP, no srcset, blocks rendering


    // Fixed width — serves 1200px image on mobile

    <img src="/hero.jpg" width="1200" height="600" />

    '
  when_applies: Projects using Next.js SSR/SSG applications or React component-based UIs
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using Next.js or React
  sources: ["https://nextjs.org/docs/app/api-reference/components/image"]
- id: CR-NEXT-FONT-001
  text: Use next/font for self-hosted Google Fonts — eliminates external requests and prevents CLS.
  why: 'Loading Google Fonts via <link> makes a cross-origin request that blocks rendering and causes Cumulative Layout Shift
    (text reflows when the font loads). next/font downloads fonts at build time, self-hosts them, and applies font-display:
    swap with zero CLS.'
  how_to_do_right: Import from next/font/google or next/font/local. Use the variable option for CSS variable integration.
    Apply via className or style. Subset to needed character sets.
  severity: high
  technologies:
    lang: [css]
    library: [next, js]
  domains:
    domain: [architecture, performance]
    concern: [frontend, seo]
  example_good: "// app/layout.tsx\nimport { Inter, JetBrains_Mono } from 'next/font/google';\n\nconst inter = Inter({\n \
    \ subsets: ['latin'],\n  variable: '--font-sans',\n  display: 'swap',\n});\n\nconst mono = JetBrains_Mono({\n  subsets:\
    \ ['latin'],\n  variable: '--font-mono',\n  display: 'swap',\n});\n\nexport default function RootLayout({ children }:\
    \ { children: React.ReactNode }) {\n  return (\n    <html lang=\"en\" className={`${inter.variable} ${mono.variable}`}>\n\
    \      <body>{children}</body>\n    </html>\n  );\n}\n"
  example_bad: "// External Google Fonts link — cross-origin request, CLS, render blocking\n<head>\n  <link\n    href=\"https://fonts.googleapis.com/css2?family=Inter&display=swap\"\
    \n    rel=\"stylesheet\"\n  />\n</head>\n// User sees fallback font → Inter loads → text reflows (CLS)\n"
  when_applies: Projects using Next.js SSR/SSG applications or CSS styling and layout
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using Next.js or CSS
  sources: ["https://nextjs.org/docs/app/building-your-application/optimizing/fonts"]
- id: CR-NEXT-META-001
  text: Use the Metadata API with generateMetadata for dynamic, type-safe SEO — not manual <head> tags.
  why: Manual <meta> tags are easy to forget, not type-checked, and don't compose across layouts. The Metadata API merges
    metadata from layouts and pages, validates required fields at build time, and generates OpenGraph, Twitter cards, and
    JSON-LD automatically.
  how_to_do_right: Export metadata object for static pages. Export generateMetadata function for dynamic pages. Use the template
    option in layouts for title composition. Generate dynamic OpenGraph images with opengraph-image.tsx.
  severity: medium
  technologies:
    lang: [typescript]
    library: [next, js]
  domains:
    domain: [architecture]
    concern: [frontend, seo]
  example_good: "// app/layout.tsx — base metadata with template\nexport const metadata: Metadata = {\n  title: { default:\
    \ 'My App', template: '%s | My App' },\n  description: 'The best app ever',\n  metadataBase: new URL('https://myapp.com'),\n\
    };\n\n// app/blog/[slug]/page.tsx — dynamic metadata\nexport async function generateMetadata({\n  params,\n}: {\n  params:\
    \ { slug: string };\n}): Promise<Metadata> {\n  const post = await getPost(params.slug);\n  return {\n    title: post.title,\
    \ // Becomes \"Post Title | My App\"\n    description: post.excerpt,\n    openGraph: {\n      title: post.title,\n   \
    \   description: post.excerpt,\n      images: [post.coverImage],\n    },\n  };\n}\n"
  example_bad: "// Manual head tags — no type safety, no composition, easy to forget\nexport default function BlogPost({ post\
    \ }) {\n  return (\n    <>\n      <head>\n        <title>{post.title}</title> {/* Overrides layout title */}\n       \
    \ <meta name=\"description\" content={post.excerpt} />\n        {/* Forgot OpenGraph tags — no social sharing preview\
    \ */}\n      </head>\n      <article>{post.content}</article>\n    </>\n  );\n}\n"
  when_applies: Projects using Next.js SSR/SSG applications or TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using Next.js or TypeScript
  sources: ["https://nextjs.org/docs/app/building-your-application/optimizing/metadata"]
- id: CR-NEXT-API-001
  text: Use Route Handlers (route.ts) with proper HTTP methods — not catch-all API routes with method switching.
  why: Catch-all routes with if/else on request.method become unmaintainable, don't support per-method caching, and can't
    leverage Next.js method-specific optimizations. Named exports (GET, POST, PUT, DELETE) are self-documenting and cacheable.
  how_to_do_right: Create route.ts files with exported handler functions per HTTP method. Use NextRequest for typed access.
    Return NextResponse with proper status codes. Use GET handlers that are automatically cached in production.
  severity: medium
  technologies:
    lang: [typescript]
    library: [next, js]
  domains:
    domain: [architecture, api]
    concern: [frontend]
  example_good: "// app/api/posts/route.ts\nimport { NextRequest, NextResponse } from 'next/server';\n\n// GET is automatically\
    \ cached (can be ISR with revalidate)\nexport async function GET() {\n  const posts = await db.post.findMany();\n  return\
    \ NextResponse.json(posts);\n}\n\n// POST is never cached\nexport async function POST(request: NextRequest) {\n  const\
    \ body = await request.json();\n  const parsed = postSchema.safeParse(body);\n  if (!parsed.success) {\n    return NextResponse.json({\
    \ error: parsed.error }, { status: 400 });\n  }\n  const post = await db.post.create({ data: parsed.data });\n  return\
    \ NextResponse.json(post, { status: 201 });\n}\n"
  example_bad: "// Catch-all with method switching — hard to maintain\nexport async function handler(req: NextApiRequest,\
    \ res: NextApiResponse) {\n  if (req.method === 'GET') { /* ... */ }\n  else if (req.method === 'POST') { /* ... */ }\n\
    \  else if (req.method === 'PUT') { /* ... */ }\n  else { res.status(405).end(); }\n  // Single function doing everything\
    \ — no per-method caching\n}\n"
  when_applies: Projects using Next.js SSR/SSG applications or TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using Next.js or TypeScript
  sources: ["https://nextjs.org/docs/app/building-your-application/routing/route-handlers"]
- id: CR-NEXT-PARALLEL-001
  text: Use parallel routes (@slot) for rendering multiple pages simultaneously — dashboards, split views, and conditional
    layouts.
  why: Without parallel routes, showing a modal while preserving the underlying page requires client-side state management
    and manual URL synchronization. Parallel routes let each slot have its own loading/error states and can be independently
    navigated.
  how_to_do_right: Create @slot directories in the route folder. Accept slots as props in layout.tsx. Each slot is an independent
    route segment with its own loading.tsx and error.tsx. Use default.tsx for unmatched parallel routes.
  severity: medium
  technologies:
    framework: [frontend, react]
    library: [next, js]
  domains:
    domain: [architecture]
    concern: [frontend, routing]
  example_good: "// Folder structure:\n// app/dashboard/@analytics/page.tsx\n// app/dashboard/@activity/page.tsx\n// app/dashboard/layout.tsx\n\
    \n// app/dashboard/layout.tsx — receives parallel slots as props\nexport default function DashboardLayout({\n  children,\n\
    \  analytics,\n  activity,\n}: {\n  children: React.ReactNode;\n  analytics: React.ReactNode;\n  activity: React.ReactNode;\n\
    }) {\n  return (\n    <div className=\"grid grid-cols-2 gap-4\">\n      <div>{children}</div>\n      <div>{analytics}</div>\
    \   {/* Independent loading/error */}\n      <div>{activity}</div>    {/* Independent loading/error */}\n    </div>\n\
    \  );\n}\n"
  example_bad: "// Fetching everything in one component — slow waterfall\nexport default async function Dashboard() {\n  const\
    \ analytics = await fetchAnalytics();   // 2s\n  const activity = await fetchActivity();     // 1s\n  // Total: 3s (sequential).\
    \ With parallel routes: 2s (parallel)\n  return <div>{/* render both */}</div>;\n}\n"
  when_applies: Projects using Next.js SSR/SSG applications or React component-based UIs
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using Next.js or React
  sources: ["https://nextjs.org/docs/app/building-your-application/routing/parallel-routes"]
- id: CR-NEXT-INTERCEPT-001
  text: Use intercepting routes for modals that preserve the underlying page — back button closes the modal, direct URL shows
    full page.
  why: Traditional modals lose context on refresh (the underlying page disappears) and break the back button (goes to previous
    page instead of closing modal). Intercepting routes show content as a modal on soft navigation but as a full page on hard
    navigation/direct URL access.
  how_to_do_right: Use (.) for same-level, (..) for one level up, (...) for root-level interception. Create the intercepting
    route directory. Render a Modal wrapper in the intercepting route. The original route serves as the full-page fallback.
  severity: medium
  technologies:
    framework: [frontend, react]
    library: [next, js]
  domains:
    domain: [architecture]
    concern: [frontend, routing, ux]
  example_good: "// Folder structure:\n// app/feed/page.tsx               — feed list\n// app/feed/(.)post/[id]/page.tsx \
    \ — intercepted: shows as modal over feed\n// app/post/[id]/page.tsx          — direct: shows as full page\n\n// app/feed/(.)post/[id]/page.tsx\
    \ — modal version\nexport default async function InterceptedPost({ params }: { params: { id: string } }) {\n  const post\
    \ = await getPost(params.id);\n  return (\n    <Modal>\n      <PostContent post={post} />\n    </Modal>\n  );\n}\n// Click\
    \ post in feed → modal opens over feed (back button closes it)\n// Visit /post/123 directly → full page renders\n"
  example_bad: "// Client-side modal — loses state on refresh, breaks back button\n'use client';\nfunction Feed() {\n  const\
    \ [selectedPost, setSelectedPost] = useState(null);\n  return (\n    <>\n      <PostList onSelect={setSelectedPost} />\n\
    \      {selectedPost && <Modal><PostContent id={selectedPost} /></Modal>}\n    </>\n  );\n  // Refresh → modal gone. Back\
    \ → previous page. URL doesn't change.\n}\n"
  when_applies: Projects using Next.js SSR/SSG applications or React component-based UIs
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using Next.js or React
  sources: ["https://nextjs.org/docs/app/building-your-application/routing/intercepting-routes"]
- id: CR-NEXT-STREAM-001
  text: Use streaming with nested Suspense boundaries for progressive page loading — fast parts render first, slow parts stream
    in.
  why: Without streaming, the entire page waits for the slowest data source. If product info takes 100ms but reviews take
    3s, the user waits 3s for everything. Streaming sends the fast parts immediately and streams slow parts as they resolve,
    improving perceived performance by 60-80%.
  how_to_do_right: Use async Server Components with Suspense boundaries. Place Suspense around slow data. Use loading.tsx
    for route-level streaming. Combine with PPR (Partial Prerendering) for the best of static + dynamic.
  severity: high
  technologies:
    framework: [frontend, react]
    library: [next, js]
  domains:
    domain: [architecture, performance]
    concern: [frontend, ux]
  example_good: "// Product page with progressive streaming\nexport default async function ProductPage({ params }: { params:\
    \ { id: string } }) {\n  // Fast — renders immediately (100ms)\n  const product = await getProduct(params.id);\n\n  return\
    \ (\n    <div>\n      <ProductInfo product={product} /> {/* Renders instantly */}\n\n      {/* Slow — streams in when\
    \ ready (2s) */}\n      <Suspense fallback={<ReviewsSkeleton />}>\n        <ProductReviews productId={params.id} />\n\
    \      </Suspense>\n\n      {/* Even slower — streams last (3s) */}\n      <Suspense fallback={<RecommendationsSkeleton\
    \ />}>\n        <Recommendations category={product.category} />\n      </Suspense>\n    </div>\n  );\n}\n\n// ProductReviews\
    \ is an async Server Component\nasync function ProductReviews({ productId }: { productId: string }) {\n  const reviews\
    \ = await getReviews(productId); // 2s API call\n  return <ReviewList reviews={reviews} />;\n}\n"
  example_bad: "// No streaming — user waits for slowest data source\nexport default async function ProductPage({ params })\
    \ {\n  const [product, reviews, recs] = await Promise.all([\n    getProduct(params.id),     // 100ms\n    getReviews(params.id),\
    \     // 2000ms\n    getRecommendations(params.id), // 3000ms\n  ]);\n  // User sees blank page for 3 seconds, then everything\
    \ at once\n  return <div>{/* all at once */}</div>;\n}\n"
  when_applies: Projects using Next.js SSR/SSG applications or React component-based UIs
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using Next.js or React
  sources: ["https://nextjs.org/docs/app/building-your-application/routing/loading-ui-and-streaming#streaming-with-suspense"]
- id: CR-NEXT-ENV-001
  text: Prefix client-exposed environment variables with NEXT_PUBLIC_ — server-only variables must never leak to the browser.
  why: Environment variables without the NEXT_PUBLIC_ prefix are only available on the server. If you accidentally reference
    a server-only variable in client code, it will be undefined — causing silent failures. Worse, using server secrets in
    client code exposes them in the browser bundle.
  how_to_do_right: Use NEXT_PUBLIC_ prefix for variables needed in the browser (API URLs, feature flags). Keep secrets without
    the prefix (API keys, database URLs). Use server-only imports (server-only package) to prevent accidental client imports
    of server modules.
  severity: critical
  technologies:
    lang: [typescript]
    library: [next, js]
  domains:
    domain: [architecture, security]
    concern: [frontend]
  example_good: '// .env

    DATABASE_URL=postgresql://...        # Server only — never in client

    STRIPE_SECRET_KEY=sk_live_...         # Server only — never in client

    NEXT_PUBLIC_API_URL=https://api.app   # Client + server — safe to expose

    NEXT_PUBLIC_STRIPE_KEY=pk_live_...    # Client + server — publishable key


    // Server Component — can access all env vars

    const db = new Database(process.env.DATABASE_URL); // OK — server only


    // Client Component — only NEXT_PUBLIC_ available

    ''use client'';

    const apiUrl = process.env.NEXT_PUBLIC_API_URL; // OK — public

    const dbUrl = process.env.DATABASE_URL; // undefined! Not exposed to client

    '
  example_bad: "// Trying to use server secret in client code\n'use client';\nexport function PaymentForm() {\n  // WRONG:\
    \ DATABASE_URL is undefined in client — silent failure\n  const db = process.env.DATABASE_URL;\n\n  // DANGEROUS: If you\
    \ use NEXT_PUBLIC_DATABASE_URL, it's in the bundle!\n  // Anyone can view source and see your database connection string\n\
    }\n"
  when_applies: Any project using Next.js SSR/SSG applications or TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using Next.js or TypeScript
  sources: ["https://nextjs.org/docs/app/building-your-application/configuring/environment-variables"]
