- id: P-UX-PROGRESSIVE
  name: Progressive Disclosure
  why: Showing everything at once overwhelms users. Show the most important information first, details on demand.
  how_to_apply: >-
    1. Primary actions are visible, secondary in menus. 2. Error details expandable, not always shown. 3. Advanced settings
    behind a toggle. 4. Dashboard shows summary, drill-down for details.
  mental_model: Newspaper — headline first, then summary, then full article.
  domains:
    domain:
    - architecture
    - ui
    concern:
    - frontend
    - ux
  when_applies: Any system involving user-facing interfaces (web, mobile, or desktop)
  when_not_applies: headless services, APIs, CLIs, or backend-only systems
