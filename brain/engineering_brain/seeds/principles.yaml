- id: P-TEST-DETERMINISTIC
  name: Deterministic Tests
  why: >-
    Flaky tests erode trust in the test suite. Developers start ignoring failures ('oh that one always fails'). Eventually
    real bugs slip through.
  how_to_apply: >-
    1. No random data without seeds. 2. No time-dependent assertions without freezing time. 3. No network calls in unit tests
    (mock them). 4. No shared mutable state between tests.
  mental_model: Reproducible experiment — same inputs, same outputs, every time.
  domains:
    domain:
    - testing
  when_applies: Any system involving codebases with automated test suites
  when_not_applies: exploratory prototypes, one-off scripts, or spike investigations
  sources:
  - https://martinfowler.com/articles/nonDeterminism.html
  text: 'Deterministic Tests: Reproducible experiment — same inputs, same outputs, every time.'
  severity: medium
  technologies:
    lang:
    - python
  how_to_do_right: >-
    1. No random data without seeds. 2. No time-dependent assertions without freezing time. 3. No network calls in unit tests
    (mock them). 4. No shared mutable state between tests.
  example_good: |-
