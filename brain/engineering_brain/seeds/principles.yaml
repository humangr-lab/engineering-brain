    # Leads to preventable failures
- id: P-OBS-STRUCTURED
  name: Structured Logging
  why: Free-text logs are unsearchable. Structured logs (JSON with fields) enable filtering, alerting, and dashboards.
  how_to_apply: >-
    1. Log as JSON with standard fields (timestamp, level, message, context). 2. Include request_id for tracing. 3. Include
    relevant entity IDs (user_id, order_id). 4. Never log sensitive data (passwords, tokens).
  mental_model: Spreadsheet vs sticky notes — spreadsheet columns let you sort and filter; sticky notes are chaos.
  domains:
    domain:
    - observability
    - operations
    - devops
  when_applies: Any system involving systems requiring monitoring, tracing, or alerting, deployment, CI/CD, or infrastructure
    automation
  when_not_applies: throwaway prototypes, local dev scripts
  sources:
  - https://sre.google/sre-book/monitoring-distributed-systems/
  text: 'Structured Logging: Spreadsheet vs sticky notes — spreadsheet columns let you sort and filter; sticky notes are chaos.'
  severity: medium
  technologies:
    lang:
