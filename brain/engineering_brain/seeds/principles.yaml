- id: P-CFG-CONSERVATIVE
  name: Conservative Defaults
  why: >-
    Users who don't configure explicitly get the defaults. Unsafe defaults (debug=True, CORS=*, auth=None) in production are
    the most common source of security incidents.
  how_to_apply: >-
    1. Debug mode defaults to OFF. 2. CORS defaults to same-origin. 3. Auth defaults to required. 4. Rate limits default to
    ON. 5. Logging defaults to WARNING level. 6. Bind to 127.0.0.1, not 0.0.0.0.
  mental_model: Childproofed house — safe by default, adults explicitly unlock what they need.
  domains:
