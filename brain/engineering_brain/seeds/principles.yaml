- id: P-CONC-ATOMIC
  name: Atomic State Updates
  why: >-
    Updating shared state piece by piece creates windows where state is inconsistent. Other threads/handlers see half-updated
    data.
  how_to_apply: >-
    1. Update all related state fields in a single operation. 2. Use transactions for database updates. 3. Use setState({...all_changes})
    not multiple setX() calls. 4. Use locks or CAS for concurrent access.
  mental_model: Bank transfer — debit and credit happen together or not at all.
  domains:
    domain:
    - performance
    - architecture
    - ui
    concern:
    - concurrency
    - state_management
    - frontend
  when_applies: Any system involving user-facing interfaces (web, mobile, or desktop)
  when_not_applies: throwaway prototypes, learning exercises, or spike investigations where speed trumps correctness
  sources:
  - https://martinfowler.com/eaaDev/uiArchs.html
  text: 'Atomic State Updates: Bank transfer — debit and credit happen together or not at all.'
  severity: high
  technologies:
    lang:
    - python
    - javascript
    - sql
  how_to_do_right: >-
    1. Update all related state fields in a single operation. 2. Use transactions for database updates. 3. Use setState({...all_changes})
    not multiple setX() calls. 4. Use locks or CAS for concurrent access.
  example_good: |-
    # Correctly applying: Atomic State Updates
    # Follow the how_to_do_right guidelines above
  example_bad: |-
