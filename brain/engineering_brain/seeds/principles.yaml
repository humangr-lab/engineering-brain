layer: principles
domain: general
knowledge:
- id: P-SEC-DENY
  name: Deny-by-Default Security
  why: >-
    Every endpoint, resource, and action starts hostile until explicitly proven safe. Allowlists prevent entire categories
    of vulnerabilities that blocklists miss.
  how_to_apply: >-
    1. Start every handler with auth check. 2. CORS defaults to same-origin. 3. CSP defaults to self. 4. New endpoints are
    protected by default. 5. Permissions are opt-in, never opt-out.
  mental_model: Castle with drawbridge — everything locked, you explicitly open specific gates for specific visitors.
  domains:
    domain:
    - security
    - architecture
    - api
    concern:
    - web
  violation_consequence: Auth bypass, data exposure, CORS wildcards allowing cross-origin attacks.
  teaching_example: 'Flask CORS: cors_allowed_origins=''same-origin'' (DENY) vs cors_allowed_origins=None (OPEN — bad default).'
  when_applies: >-
    Any system involving security-sensitive systems handling user data, authentication, or authorization, APIs exposed to
    external or internal consumers
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities
  sources:
  - https://cheatsheetseries.owasp.org/cheatsheets/Authorization_Cheat_Sheet.html
  text: >-
    Deny-by-Default Security: Castle with drawbridge — everything locked, you explicitly open specific gates for specific
    visitors.
  severity: critical
  technologies:
    lang:
    - python
    - rest
  how_to_do_right: >-
    1. Start every handler with auth check. 2. CORS defaults to same-origin. 3. CSP defaults to self. 4. New endpoints are
    protected by default. 5. Permissions are opt-in, never opt-out.
  example_good: '# Flask CORS: cors_allowed_origins=''same-origin'' (DENY) vs cors_allowed_origins=None (OPEN — bad default).'
  example_bad: |-
    # Anti-pattern: Violating Deny-by-Default Security
    # Result: Auth bypass
    # Result: data exposure
- id: P-SEC-BOUNDARY
  name: Validate at the Boundary
  why: >-
    External input is the attack surface. Internal code can trust validated data. Validating everywhere is wasteful; validating
    nowhere is dangerous.
  how_to_apply: >-
    1. Parse and validate ALL external input at system entry (routes, WebSocket handlers, file uploads). 2. Use Pydantic/schemas
    to transform raw input into typed domain objects. 3. Internal functions receive validated types, never raw strings.
  mental_model: Airport security — check once at the gate, then move freely inside the terminal.
  domains:
    domain:
    - security
    - architecture
    - api
    concern:
    - web
  violation_consequence: Injection attacks (SQL, XSS, path traversal), malformed data propagating to business logic.
  when_applies: >-
    Any system involving security-sensitive systems handling user data, authentication, or authorization, APIs exposed to
    external or internal consumers
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities
  sources:
  - https://cheatsheetseries.owasp.org/cheatsheets/Input_Validation_Cheat_Sheet.html
  text: 'Validate at the Boundary: Airport security — check once at the gate, then move freely inside the terminal.'
  severity: critical
  technologies:
    lang:
    - python
  how_to_do_right: >-
    1. Parse and validate ALL external input at system entry (routes, WebSocket handlers, file uploads). 2. Use Pydantic/schemas
    to transform raw input into typed domain objects. 3. Internal functions receive validated types, never raw strings.
  example_good: |-
    # Correctly applying: Validate at the Boundary
    # Follow the how_to_do_right guidelines above
  example_bad: |-
    # Anti-pattern: Violating Validate at the Boundary
    # Result: Injection attacks (SQL
    # Result: XSS
- id: P-SEC-LEAST-PRIV
  name: Principle of Least Privilege
  why: Over-permissioned components become attack vectors. If a component is compromised, its permissions are the blast radius.
  how_to_apply: >-
    1. Each service account gets exactly the permissions it needs. 2. API keys are scoped to specific operations. 3. File
    access is restricted to necessary directories. 4. Environment variables contain only what the process needs.
  mental_model: Hotel key card — opens your room and the gym, not every room in the hotel.
  domains:
    domain:
    - security
    - operations
    - devops
    - architecture
  when_applies: >-
    Any system involving security-sensitive systems handling user data, authentication, or authorization, deployment, CI/CD,
    or infrastructure automation
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities
  sources:
  - https://cheatsheetseries.owasp.org/cheatsheets/Authorization_Cheat_Sheet.html#enforce-least-privileges
  text: 'Principle of Least Privilege: Hotel key card — opens your room and the gym, not every room in the hotel.'
  severity: critical
  technologies:
    lang:
    - python
  how_to_do_right: >-
    1. Each service account gets exactly the permissions it needs. 2. API keys are scoped to specific operations. 3. File
    access is restricted to necessary directories. 4. Environment variables contain only what the process needs.
  example_good: |-
    # Correctly applying: Principle of Least Privilege
    # Follow the how_to_do_right guidelines above
  example_bad: |-
    # Anti-pattern: ignoring Principle of Least Privilege
    # No safeguards in place
    # Leads to preventable failures
- id: P-ARCH-SINGLE-RESP
  name: Single Responsibility
  why: >-
    A module with one reason to change is easy to understand, test, and modify. Multiple responsibilities create coupling
    — changing one breaks the other.
  how_to_apply: >-
    1. Each file does ONE thing (routes OR models OR business logic). 2. Functions are <30 lines. 3. Classes have <7 public
    methods. 4. If you struggle to name it, it does too much.
  mental_model: >-
    Swiss army knife vs specialized tools — the specialized screwdriver works better than the knife's screwdriver attachment.
  domains:
    domain:
    - architecture
    concern:
    - design
  when_applies: Any system involving systems requiring structural design decisions, code undergoing design or refactoring
  when_not_applies: small scripts under 100 lines, single-purpose utilities
  sources:
  - https://martinfowler.com/bliki/SingleResponsibilityPrinciple.html
  text: >-
    Single Responsibility: Swiss army knife vs specialized tools — the specialized screwdriver works better than the knife's
    screwdriver attachment.
  severity: medium
  technologies:
    lang:
    - python
  how_to_do_right: >-
    1. Each file does ONE thing (routes OR models OR business logic). 2. Functions are <30 lines. 3. Classes have <7 public
    methods. 4. If you struggle to name it, it does too much.
  example_good: |-
    # Correctly applying: Single Responsibility
    # Follow the how_to_do_right guidelines above
  example_bad: |-
    # Anti-pattern: ignoring Single Responsibility
    # No safeguards in place
    # Leads to preventable failures
- id: P-ARCH-DRY
  name: Don't Repeat Yourself (DRY)
  why: >-
    Duplicated logic diverges over time. When a bug is fixed in one copy but not the others, the system becomes inconsistent.
    Constants extracted once are updated once.
  how_to_apply: >-
    1. Extract shared constants to a dedicated constants file. 2. Shared logic goes into utility functions. 3. Configuration
    values appear in ONE place. 4. CSS/JS values that must match go through shared variables.
  mental_model: Phone book — one entry per person, not one per friend who might call them.
  domains:
    domain:
    - architecture
    concern:
    - design
  violation_consequence: Inconsistent behavior across features, 'fixed in one place but not the other' bugs, maintenance burden.
  when_applies: Any system involving systems requiring structural design decisions, code undergoing design or refactoring
  when_not_applies: small scripts under 100 lines, single-purpose utilities
  sources:
  - https://martinfowler.com/bliki/DontRepeatYourself.html
  - https://12factor.net/config
  text: 'Don''t Repeat Yourself (DRY): Phone book — one entry per person, not one per friend who might call them.'
  severity: medium
  technologies:
    lang:
    - python
  how_to_do_right: >-
    1. Extract shared constants to a dedicated constants file. 2. Shared logic goes into utility functions. 3. Configuration
    values appear in ONE place. 4. CSS/JS values that must match go through shared variables.
  example_good: |-
    # Correctly applying: Don't Repeat Yourself (DRY)
    # Follow the how_to_do_right guidelines above
  example_bad: |-
    # Anti-pattern: Violating Don't Repeat Yourself (DRY)
    # Result: Inconsistent behavior across features
    # Result: \'fixed in one place but not the other\' bugs
- id: P-ARCH-SEPARATION
  name: Separation of Concerns
  why: Mixing presentation, business logic, and data access makes each impossible to test or change independently.
  how_to_apply: >-
    1. Routes handle HTTP (parse request, return response). 2. Services contain business logic. 3. Models handle data persistence.
    4. Templates handle presentation. 5. Never put SQL in route handlers.
  mental_model: Restaurant — waiter (routes) takes orders, kitchen (services) cooks, pantry (models) stores ingredients.
  domains:
    domain:
    - architecture
    concern:
    - design
    - web
  when_applies: Any system involving systems requiring structural design decisions, code undergoing design or refactoring
  when_not_applies: small scripts under 100 lines, single-purpose utilities
  sources:
  - https://martinfowler.com/bliki/PresentationDomainDataLayering.html
  text: >-
    Separation of Concerns: Restaurant — waiter (routes) takes orders, kitchen (services) cooks, pantry (models) stores ingredients.
  severity: medium
  technologies:
    lang:
    - python
    - sql
  how_to_do_right: >-
    1. Routes handle HTTP (parse request, return response). 2. Services contain business logic. 3. Models handle data persistence.
    4. Templates handle presentation. 5. Never put SQL in route handlers.
  example_good: |-
    # Correctly applying: Separation of Concerns
    # Follow the how_to_do_right guidelines above
  example_bad: |-
    # Anti-pattern: ignoring Separation of Concerns
    # No safeguards in place
    # Leads to preventable failures
- id: P-ARCH-EXPLICIT
  name: Explicit Over Implicit
  why: >-
    Implicit behavior creates surprises. Magic defaults, auto-imports, and convention-over-configuration hide what's actually
    happening.
  how_to_apply: >-
    1. Name variables after what they contain, not abbreviations. 2. Default values are documented. 3. Side effects are called
    out. 4. Dependencies are injected, not imported globally.
  mental_model: Recipe with measurements — '350F for 25 minutes' not 'bake until done'.
  domains:
    domain:
    - architecture
    concern:
    - design
  when_applies: Any system involving systems requiring structural design decisions, code undergoing design or refactoring
  when_not_applies: small scripts under 100 lines, single-purpose utilities
  sources:
  - https://peps.python.org/pep-0020/
  text: 'Explicit Over Implicit: Recipe with measurements — ''350F for 25 minutes'' not ''bake until done''.'
  severity: medium
  technologies:
    lang:
    - python
  how_to_do_right: >-
    1. Name variables after what they contain, not abbreviations. 2. Default values are documented. 3. Side effects are called
    out. 4. Dependencies are injected, not imported globally.
  example_good: |-
    # Correctly applying: Explicit Over Implicit
    # Follow the how_to_do_right guidelines above
  example_bad: |-
    # Anti-pattern: ignoring Explicit Over Implicit
    # No safeguards in place
    # Leads to preventable failures
- id: P-ERR-ACTIONABLE
  name: Actionable Error Messages
  why: >-
    A user who sees 'Error occurred' cannot fix the problem. A user who sees 'File not found: config.yaml — create it with:
    cp config.example.yaml config.yaml' can.
  how_to_apply: >-
    1. Every error message says WHAT went wrong AND HOW to fix it. 2. Include the specific value that failed validation. 3.
    Suggest the most likely correct action. 4. Never show raw stack traces to end users.
  mental_model: GPS rerouting — doesn't just say 'wrong turn', it says 'turn right in 200 meters to get back on route'.
  domains:
    domain:
    - architecture
    - ui
    - api
    - reliability
    concern:
    - frontend
    - error_handling
  violation_consequence: Users get stuck, support tickets increase, trust erodes.
  when_applies: Any system involving user-facing interfaces (web, mobile, or desktop), APIs exposed to external or internal
    consumers
  when_not_applies: headless services, APIs, CLIs, or backend-only systems
  sources:
  - https://martinfowler.com/articles/designing-error-messages.html
  text: >-
    Actionable Error Messages: GPS rerouting — doesn't just say 'wrong turn', it says 'turn right in 200 meters to get back
    on route'.
  severity: medium
  technologies:
    lang:
    - python
  how_to_do_right: >-
    1. Every error message says WHAT went wrong AND HOW to fix it. 2. Include the specific value that failed validation. 3.
    Suggest the most likely correct action. 4. Never show raw stack traces to end users.
  example_good: |-
    # Correctly applying: Actionable Error Messages
    # Follow the how_to_do_right guidelines above
  example_bad: |-
    # Anti-pattern: Violating Actionable Error Messages
    # Result: Users get stuck
    # Result: support tickets increase
- id: P-ERR-FAIL-FAST
  name: Fail Fast, Fail Loud
  why: >-
    Silent failures accumulate into catastrophic state corruption. The sooner an error is detected, the cheaper it is to fix
    and the smaller the blast radius.
  how_to_apply: >-
    1. Validate inputs at function entry. 2. Assert preconditions. 3. Log errors with full context immediately. 4. Return
    error types, don't return None and hope the caller checks.
  mental_model: Smoke detector — alerts at first whiff, doesn't wait for the house to be engulfed.
  domains:
    domain:
    - reliability
    concern:
    - error_handling
  when_applies: All software engineering decisions
  when_not_applies: throwaway prototypes, learning exercises, or spike investigations where speed trumps correctness
  sources:
  - https://martinfowler.com/ieeeSoftware/failFast.pdf
  text: 'Fail Fast, Fail Loud: Smoke detector — alerts at first whiff, doesn''t wait for the house to be engulfed.'
  severity: high
  technologies:
    lang:
    - python
  how_to_do_right: >-
    1. Validate inputs at function entry. 2. Assert preconditions. 3. Log errors with full context immediately. 4. Return
    error types, don't return None and hope the caller checks.
  example_good: |-
    # Correctly applying: Fail Fast, Fail Loud
    # Follow the how_to_do_right guidelines above
  example_bad: |-
    # Anti-pattern: ignoring Fail Fast, Fail Loud
    # No safeguards in place
    # Leads to preventable failures
- id: P-TEST-PYRAMID
  name: Testing Pyramid
  why: >-
    Unit tests are fast and precise (catch logic errors). Integration tests catch wiring errors. E2E tests catch user-facing
    bugs. Inverting the pyramid (all E2E, no unit) makes the suite slow and brittle.
  how_to_apply: >-
    1. 70% unit tests (pure functions, no I/O). 2. 20% integration tests (API calls, database). 3. 10% E2E tests (full user
    flows). 4. Every bug fix gets a regression test.
  mental_model: >-
    Physical exam — blood tests (unit) find most issues fast; MRI (integration) for deeper checks; full checkup (E2E) annually.
  domains:
    domain:
    - testing
  when_applies: Any system involving codebases with automated test suites
  when_not_applies: exploratory prototypes, one-off scripts, or spike investigations
  sources:
  - https://martinfowler.com/articles/practical-test-pyramid.html
  text: >-
    Testing Pyramid: Physical exam — blood tests (unit) find most issues fast; MRI (integration) for deeper checks; full checkup
    (E2E) annually.
  severity: medium
  technologies:
    lang:
    - python
  how_to_do_right: >-
    1. 70% unit tests (pure functions, no I/O). 2. 20% integration tests (API calls, database). 3. 10% E2E tests (full user
    flows). 4. Every bug fix gets a regression test.
  example_good: |-
    # Correctly applying: Testing Pyramid
