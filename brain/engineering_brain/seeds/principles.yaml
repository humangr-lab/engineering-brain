- id: P-PERF-MEASURE
  name: Measure Before Optimizing
  why: Intuition about bottlenecks is wrong 90% of the time. Optimizing the wrong thing wastes effort and adds complexity.
  how_to_apply: >-
    1. Profile before optimizing. 2. Benchmark before and after. 3. Optimize the hottest path first. 4. Stop when performance
    meets requirements.
  mental_model: Doctor diagnoses before prescribing — treating symptoms without diagnosis can make things worse.
