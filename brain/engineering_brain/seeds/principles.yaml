  how_to_do_right: >-
    1. Log as JSON with standard fields (timestamp, level, message, context). 2. Include request_id for tracing. 3. Include
    relevant entity IDs (user_id, order_id). 4. Never log sensitive data (passwords, tokens).
  example_good: |-
