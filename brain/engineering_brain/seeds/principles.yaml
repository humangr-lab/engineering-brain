    # Follow the how_to_do_right guidelines above
  example_bad: |-
    # Anti-pattern: ignoring Deterministic Tests
    # No safeguards in place
    # Leads to preventable failures
- id: P-API-CONTRACT
  name: API as Contract
  why: >-
    Every API endpoint is a promise to consumers. Breaking the promise breaks their code. Versioning prevents breaking changes
    from cascading.
  how_to_apply: >-
    1. Define request/response schemas with Pydantic. 2. Never remove fields — deprecate them. 3. Add new optional fields,
    never new required ones. 4. Version the API (v1, v2) for breaking changes.
  mental_model: Legal contract — both parties agree on terms; amendments require mutual consent.
  domains:
    domain:
    - architecture
    - api
  when_applies: Any system involving APIs exposed to external or internal consumers, systems requiring structural design decisions
  when_not_applies: internal modules with no exposed interface, monolithic single-process apps
  sources:
  - https://martinfowler.com/articles/consumerDrivenContracts.html
  text: 'API as Contract: Legal contract — both parties agree on terms; amendments require mutual consent.'
  severity: medium
  technologies:
    lang:
    - python
    - rest
  how_to_do_right: >-
    1. Define request/response schemas with Pydantic. 2. Never remove fields — deprecate them. 3. Add new optional fields,
    never new required ones. 4. Version the API (v1, v2) for breaking changes.
  example_good: |-
    # Correctly applying: API as Contract
    # Follow the how_to_do_right guidelines above
  example_bad: |-
    # Anti-pattern: ignoring API as Contract
    # No safeguards in place
    # Leads to preventable failures
- id: P-API-IDEMPOTENT
  name: Idempotent Operations
  why: Network is unreliable. Clients retry. If creating a resource isn't idempotent, retries create duplicates.
  how_to_apply: >-
    1. PUT/DELETE are naturally idempotent — use them. 2. POST needs idempotency keys. 3. Database operations use UPSERT not
    INSERT. 4. Side effects (emails, webhooks) use deduplication IDs.
  mental_model: Elevator button — pressing it 5 times doesn't call 5 elevators.
  domains:
    domain:
    - architecture
    - api
    concern:
    - distributed
  when_applies: Any system involving APIs exposed to external or internal consumers
  when_not_applies: internal modules with no exposed interface, monolithic single-process apps
  sources:
  - https://tools.ietf.org/html/rfc7231#section-4.2.2
  text: 'Idempotent Operations: Elevator button — pressing it 5 times doesn''t call 5 elevators.'
  severity: high
  technologies:
    lang:
    - python
  how_to_do_right: >-
    1. PUT/DELETE are naturally idempotent — use them. 2. POST needs idempotency keys. 3. Database operations use UPSERT not
    INSERT. 4. Side effects (emails, webhooks) use deduplication IDs.
  example_good: |-
    # Correctly applying: Idempotent Operations
    # Follow the how_to_do_right guidelines above
  example_bad: |-
    # Anti-pattern: ignoring Idempotent Operations
    # No safeguards in place
    # Leads to preventable failures
- id: P-UX-FEEDBACK
  name: Immediate Feedback
  why: Users need to know the system heard them. Without feedback, they click again (causing duplicates) or assume it's broken.
  how_to_apply: >-
    1. Every button click shows loading state. 2. Form submissions show success/error within 2 seconds. 3. WebSocket connections
    show connected/disconnected status. 4. Long operations show progress.
  mental_model: Conversation — when someone talks, you nod to show you're listening.
  domains:
    domain:
    - architecture
    - ui
    concern:
    - frontend
    - ux
  when_applies: Any system involving user-facing interfaces (web, mobile, or desktop)
  when_not_applies: headless services, APIs, CLIs, or backend-only systems
  sources:
