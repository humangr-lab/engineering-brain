  - id: PAT-UX-ERROR-INLINE
    name: "Inline Field Error"
    category: error_handling
    intent: "Display validation errors directly next to the field that caused them, eliminating the need for users to locate the problem."
    when_to_use: "All form validation errors. Any input that fails a constraint. Server-side validation results that map to specific fields."
    when_not_to_use: "Global errors that don't relate to a specific field (use a banner). Network errors (use toast or banner). Success messages (use toast)."
    languages: [HTML, CSS, React]
    example_good: |
      <div className={`field ${error ? 'field-error' : ''}`}>
        <label htmlFor="email">Email address <span aria-hidden="true">*</span></label>
        <input
          id="email" type="email" value={email}
          aria-invalid={!!error}
          aria-describedby={error ? 'email-error' : 'email-hint'}
          className={error ? 'input-error' : ''}
        />
        {!error && <p id="email-hint" className="field-hint">We'll never share your email</p>}
        {error && (
          <p id="email-error" className="field-error-msg" role="alert">
            {/* Specific, actionable message */}
            {error === 'invalid' && 'Enter a valid email like name@example.com'}
            {error === 'taken' && 'This email is already registered. Log in instead?'}
            {error === 'required' && 'Email address is required'}
          </p>
        )}
      </div>
    example_bad: |
      <!-- BAD: All errors in a banner at page top — user scrolls up and down to fix -->
      <div class="error-banner">
        <p>Please fix the following errors:</p>
        <ul>
          <li>Invalid email</li>     <!-- Which email field? There are 2! -->
          <li>Required field</li>    <!-- Which of the 12 fields? -->
          <li>Invalid format</li>    <!-- Not actionable — what format? -->
        </ul>
      </div>
      <!-- ...200px of scrolling... -->
      <input name="email" />  <!-- No visual indicator that THIS field has the error -->
    text: "Inline Field Error -- Display validation errors directly next to the field that caused them, eliminating the need for users to locate the problem."
    why: "Display validation errors directly next to the field that caused them, eliminating the need for users to locate the problem."
    how_to_do_right: |
      1. Identify where inline field error applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
    severity: high
    technologies:
      lang: [html, css, react]
    domains:
      domain: [error_handling, ui]
      concern: [pattern, best_practice]
    when_applies: "All form validation errors."

    related_principles: [P-UX-ERROR-RECOVERY, P-UX-GESTALT-PROXIMITY]

