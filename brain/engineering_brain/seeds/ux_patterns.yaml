layer: patterns
domain: ui

knowledge:
  # === Navigation Patterns ===
  - id: PAT-UX-NAV-TABBAR
    name: "Tab Bar Navigation"
    category: navigation
    intent: "Provide persistent access to 3-5 top-level destinations with single-tap switching and always-visible current location."
    when_to_use: "Mobile apps with 3-5 equally important top-level sections. Users need to switch frequently between sections. Each section has its own navigation stack."
    when_not_to_use: "More than 5 top-level items (use hamburger + tab bar hybrid). Desktop apps (use sidebar). Single-purpose tools with no sections."
    languages: [React Native, Swift, Kotlin, Flutter]
    example_good: |
      # React Native bottom tab navigator — 4 clear icons + labels
      <Tab.Navigator screenOptions={{ tabBarShowLabel: true }}>
        <Tab.Screen name="Home" component={HomeStack}
          options={{ tabBarIcon: ({color}) => <HomeIcon color={color} /> }} />
        <Tab.Screen name="Search" component={SearchStack}
          options={{ tabBarIcon: ({color}) => <SearchIcon color={color} /> }} />
        <Tab.Screen name="Cart" component={CartStack}
          options={{ tabBarIcon: ({color}) => <CartIcon color={color} />,
                     tabBarBadge: cartCount > 0 ? cartCount : undefined }} />
        <Tab.Screen name="Profile" component={ProfileStack}
          options={{ tabBarIcon: ({color}) => <ProfileIcon color={color} /> }} />
      </Tab.Navigator>
    example_bad: |
      # BAD: 7 tabs crammed together, icons only (no labels), no active indicator
      <Tab.Navigator screenOptions={{ tabBarShowLabel: false }}>
        <Tab.Screen name="1" /><Tab.Screen name="2" /><Tab.Screen name="3" />
        <Tab.Screen name="4" /><Tab.Screen name="5" /><Tab.Screen name="6" />
        <Tab.Screen name="7" />  {/* Too many — icons become tiny and indistinguishable */}
      </Tab.Navigator>
    text: "Tab Bar Navigation -- Provide persistent access to 3-5 top-level destinations with single-tap switching and always-visible current location."
    why: "Provide persistent access to 3-5 top-level destinations with single-tap switching and always-visible current location."
    how_to_do_right: |
      1. Identify where tab bar navigation applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
    severity: medium
    technologies:
      lang: [react native, swift, kotlin, flutter]
    domains:
      domain: [navigation, ui]
      concern: [pattern, best_practice]
    when_applies: "Mobile apps with 3-5 equally important top-level sections."

    related_principles: [P-UX-HICKS, P-UX-RECOGNITION, P-UX-CONSISTENCY]
    sources: ["https://developer.apple.com/design/human-interface-guidelines/tab-bars"]

  - id: PAT-UX-NAV-HAMBURGER
    name: "Hamburger Menu Navigation"
    category: navigation
    intent: "Hide secondary navigation behind a menu icon to maximize content area while providing access to all sections."
    when_to_use: "6+ navigation items. Desktop responsive breakpoints where horizontal nav doesn't fit. Secondary navigation that users access occasionally. Content-focused apps where screen real estate is premium."
    when_not_to_use: "Primary navigation that users switch between frequently — hidden navigation reduces discoverability by 50%. Apps where engagement depends on users discovering features. Use visible tab bar instead for high-frequency sections."
    languages: [HTML, CSS, React, Vue]
    example_good: |
      /* Hamburger for secondary items PLUS visible tabs for primary */
      <header>
        <nav class="primary-nav">
          <a href="/home" class="active">Home</a>
          <a href="/dashboard">Dashboard</a>
          <a href="/reports">Reports</a>
        </nav>
        <button class="hamburger" aria-label="More navigation" aria-expanded="false">
          <span class="hamburger-icon">☰</span>
        </button>
        <nav class="secondary-nav" role="navigation" aria-label="Secondary">
          <a href="/settings">Settings</a>
          <a href="/help">Help</a>
          <a href="/about">About</a>
        </nav>
      </header>
    example_bad: |
      <!-- BAD: Hiding ALL navigation behind hamburger — users can't find anything -->
      <header>
        <button class="hamburger">☰</button>
        <nav class="hidden-menu">
          <!-- ALL items hidden — 50% drop in feature discoverability -->
          <a href="/home">Home</a>
          <a href="/dashboard">Dashboard</a>
          <a href="/reports">Reports</a>
          <a href="/settings">Settings</a>
        </nav>
      </header>
    text: "Hamburger Menu Navigation -- Hide secondary navigation behind a menu icon to maximize content area while providing access to all sections."
    why: "Hide secondary navigation behind a menu icon to maximize content area while providing access to all sections."
    how_to_do_right: |
      1. Identify where hamburger menu navigation applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
    severity: medium
    technologies:
      lang: [html, css, react, vue]
    domains:
      domain: [navigation, ui]
      concern: [pattern, best_practice]
    when_applies: "6+ navigation items."

    related_principles: [P-UX-RECOGNITION, P-UX-VISIBILITY]
    sources: ["https://www.nngroup.com/articles/hamburger-menus/"]

  - id: PAT-UX-NAV-BREADCRUMB
    name: "Breadcrumb Navigation"
    category: navigation
    intent: "Show the user's current position in a hierarchy and provide one-click access to any parent level, reducing disorientation in deep structures."
    when_to_use: "Hierarchical content deeper than 2 levels. E-commerce categories (Electronics > Phones > iPhone). File systems and document managers. Help/documentation sites."
    when_not_to_use: "Flat navigation (no hierarchy). Single-level apps. When the hierarchy is only 1-2 levels deep (tab bar is sufficient)."
    languages: [HTML, CSS, React]
    example_good: |
      <nav aria-label="Breadcrumb">
        <ol class="breadcrumb">
          <li><a href="/">Home</a></li>
          <li aria-hidden="true">/</li>
          <li><a href="/electronics">Electronics</a></li>
          <li aria-hidden="true">/</li>
          <li><a href="/electronics/phones">Phones</a></li>
          <li aria-hidden="true">/</li>
          <li aria-current="page">iPhone 16 Pro</li>  <!-- Current page, no link -->
        </ol>
      </nav>
    example_bad: |
      <!-- BAD: Breadcrumb with no links (defeats purpose) and no current page indicator -->
      <div class="breadcrumb">
        <span>Home</span> > <span>Electronics</span> > <span>Phones</span> > <span>iPhone</span>
        <!-- Not clickable, no aria-current, no semantic markup -->
      </div>
    text: "Breadcrumb Navigation -- Show the user's current position in a hierarchy and provide one-click access to any parent level, reducing disorientation in deep structures."
    why: "Show the user's current position in a hierarchy and provide one-click access to any parent level, reducing disorientation in deep structures."
    how_to_do_right: |
      1. Identify where breadcrumb navigation applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
    severity: medium
    technologies:
      lang: [html, css, react]
    domains:
      domain: [navigation, ui]
      concern: [pattern, best_practice]
    when_applies: "Hierarchical content deeper than 2 levels."

    related_principles: [P-UX-VISIBILITY, P-UX-CONTROL, P-UX-RECOGNITION]
    sources: ["https://www.nngroup.com/articles/breadcrumbs/"]

  - id: PAT-UX-NAV-COMMAND-PALETTE
    name: "Command Palette"
    category: navigation
    intent: "Provide keyboard-first access to all actions and navigation via fuzzy search, enabling power users to perform any action in under 2 seconds."
    when_to_use: "Complex applications with many features (IDEs, design tools, project management). Power users who prefer keyboard over mouse. When navigation hierarchy is deep. Applications with 50+ possible actions."
    when_not_to_use: "Simple apps with <10 actions. Consumer-facing apps where discoverability matters more than speed. Mobile apps (no keyboard)."
    languages: [React, TypeScript, Vue]
    example_good: |
      // Command palette with fuzzy search, keyboard navigation, and categories
      function CommandPalette({ isOpen, onClose }) {
        const [query, setQuery] = useState('');
        const results = useFuzzySearch(query, commands); // Fuse.js or similar

        return isOpen ? (
          <div role="dialog" aria-label="Command palette" className="palette-overlay">
            <div className="palette">
              <input
                autoFocus placeholder="Type a command..."
                value={query} onChange={e => setQuery(e.target.value)}
                onKeyDown={handleKeyNav} // ArrowUp/Down/Enter/Escape
                role="combobox" aria-expanded="true"
              />
              <ul role="listbox">
                {results.map(cmd => (
                  <li key={cmd.id} role="option" onClick={() => execute(cmd)}>
                    <span className="cmd-icon">{cmd.icon}</span>
                    <span className="cmd-name">{cmd.name}</span>
                    <kbd className="cmd-shortcut">{cmd.shortcut}</kbd>
                  </li>
                ))}
              </ul>
            </div>
          </div>
        ) : null;
      }
    example_bad: |
      // BAD: Command palette without keyboard nav, no fuzzy search, no shortcuts shown
      function CommandPalette({ isOpen }) {
        const [query, setQuery] = useState('');
        const results = commands.filter(c => c.name.includes(query)); // Exact match only

        return isOpen ? (
          <div>
            <input value={query} onChange={e => setQuery(e.target.value)} />
            {results.map(cmd => <div onClick={() => cmd.run()}>{cmd.name}</div>)}
            {/* No keyboard navigation, no Escape to close, no shortcuts, no categories */}
          </div>
        ) : null;
      }
    text: "Command Palette -- Provide keyboard-first access to all actions and navigation via fuzzy search, enabling power users to perform any action in under 2 seconds."
    why: "Provide keyboard-first access to all actions and navigation via fuzzy search, enabling power users to perform any action in under 2 seconds."
    how_to_do_right: |
      1. Identify where command palette applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
    severity: medium
    technologies:
      lang: [react, typescript, vue]
    domains:
      domain: [navigation, ui]
      concern: [pattern, best_practice]
    when_applies: "Complex applications with many features (IDEs, design tools, project management)."

    related_principles: [P-UX-FLEXIBILITY, P-UX-RECOGNITION]

  # === Form Patterns ===
    sources: ["https://www.nngroup.com/articles/command-palette/"]
  - id: PAT-UX-FORM-INLINE-VALIDATION
    name: "Inline Form Validation"
    category: forms
    intent: "Validate user input at the moment of interaction and display errors next to the relevant field, reducing cognitive load and preventing form-submission surprises."
    when_to_use: "All forms with more than 2 fields. Fields with specific format requirements (email, phone, URL). Fields with server-side uniqueness constraints (username, email). Password strength requirements."
    when_not_to_use: "Single-field search forms. Validation that requires multiple fields together (cross-field validation happens on submit)."
    languages: [HTML, JavaScript, React]
    example_good: |
      // Validate on blur (not keystroke!) — let user finish typing first
      function EmailField() {
        const [email, setEmail] = useState('');
        const [error, setError] = useState('');
        const [touched, setTouched] = useState(false);

        const validate = (value) => {
          if (!value) return 'Email is required';
          if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value)) return 'Enter a valid email address';
          return '';
        };

        return (
          <div className="field">
            <label htmlFor="email">Email address</label>
            <input
              id="email" type="email" value={email}
              onChange={e => setEmail(e.target.value)}
              onBlur={() => { setTouched(true); setError(validate(email)); }}
              aria-invalid={touched && !!error}
              aria-describedby={error ? 'email-error' : undefined}
            />
            {touched && error && (
              <p id="email-error" className="field-error" role="alert">{error}</p>
            )}
          </div>
        );
      }
    example_bad: |
      // BAD: Validates on every keystroke — shows errors while user is still typing
      function EmailField() {
        const [email, setEmail] = useState('');
        const validate = (v) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
        return (
          <div>
            <input value={email} onChange={e => {
              setEmail(e.target.value);
              // ERROR immediately — user types 'j' and sees 'Invalid email'!
            }} />
            {!validate(email) && <span style={{color:'red'}}>Invalid email</span>}
          </div>
        );
      }
    text: "Inline Form Validation -- Validate user input at the moment of interaction and display errors next to the relevant field, reducing cognitive load and preventing form-submission surprises."
    why: "Validate user input at the moment of interaction and display errors next to the relevant field, reducing cognitive load and preventing form-submission surprises."
    how_to_do_right: |
      1. Identify where inline form validation applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
    severity: medium
    technologies:
      lang: [html, javascript, react]
    domains:
      domain: [forms, ui]
      concern: [pattern, best_practice]
    when_applies: "All forms with more than 2 fields."

    related_principles: [P-UX-ERROR-PREVENTION, P-UX-ERROR-RECOVERY]
    sources: ["https://www.nngroup.com/articles/errors-forms-design-guidelines/"]

  - id: PAT-UX-FORM-WIZARD
    name: "Multi-Step Wizard"
    category: forms
    intent: "Break complex forms into sequential steps, reducing cognitive load per screen and giving users a sense of progress."
    when_to_use: "Forms with 8+ fields. Onboarding flows. Checkout processes. Forms where later fields depend on earlier choices. Legal/compliance flows that need signatures at each stage."
    when_not_to_use: "Simple forms with 3-5 fields (a single page is faster). Forms where users need to see all fields at once to make decisions. Editing flows where users modify individual fields (use inline editing)."
    languages: [React, Vue, Angular]
    example_good: |
      function CheckoutWizard() {
        const [step, setStep] = useState(0);
        const steps = ['Shipping', 'Payment', 'Review'];

        return (
          <div>
            {/* Progress indicator — always visible */}
            <nav aria-label="Checkout progress">
              <ol className="step-indicator">
                {steps.map((s, i) => (
                  <li key={s} className={i === step ? 'active' : i < step ? 'complete' : ''}>
                    <span className="step-number">{i < step ? '✓' : i + 1}</span>
                    <span className="step-label">{s}</span>
                  </li>
                ))}
              </ol>
            </nav>

            {/* Current step content */}
            {step === 0 && <ShippingForm onNext={() => setStep(1)} />}
            {step === 1 && <PaymentForm onBack={() => setStep(0)} onNext={() => setStep(2)} />}
            {step === 2 && <ReviewOrder onBack={() => setStep(1)} onSubmit={handleSubmit} />}

            {/* Navigation — always has Back + Next/Submit */}
            <div className="wizard-nav">
              {step > 0 && <button onClick={() => setStep(step - 1)}>Back</button>}
            </div>
          </div>
        );
      }
    example_bad: |
      // BAD: Multi-step with no progress indicator, no back button, losing data on navigation
      function BadWizard() {
        const [step, setStep] = useState(0);
        return (
          <div>
            {/* No progress bar — user doesn't know how many steps remain */}
            {step === 0 && <div><input /><input /><button onClick={() => setStep(1)}>Next</button></div>}
            {step === 1 && <div><input /><button onClick={() => setStep(2)}>Next</button></div>}
            {/* No Back button. Previous form data is lost. No review step. */}
          </div>
        );
      }
    text: "Multi-Step Wizard -- Break complex forms into sequential steps, reducing cognitive load per screen and giving users a sense of progress."
    why: "Break complex forms into sequential steps, reducing cognitive load per screen and giving users a sense of progress."
    how_to_do_right: |
      1. Identify where multi-step wizard applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
    severity: medium
    technologies:
      lang: [react, vue, angular]
    domains:
      domain: [forms, ui]
      concern: [pattern, best_practice]
    when_applies: "Forms with 8+ fields."

    related_principles: [P-UX-VISIBILITY, P-UX-CONTROL, P-UX-MILLER]
    sources: ["https://www.nngroup.com/articles/wizards/"]

  - id: PAT-UX-FORM-AUTOSAVE
    name: "Auto-Save Pattern"
    category: forms
    intent: "Automatically persist user input at regular intervals or on change, preventing data loss from crashes, navigation, or session timeouts."
    when_to_use: "Long-form content (documents, articles, code editors). Multi-session workflows (users may leave and return). Forms that take >2 minutes to complete. Anywhere data loss would cause significant frustration."
    when_not_to_use: "Transactional forms that must be submitted atomically (payment). Forms with destructive actions (immediate save could cause damage). Short forms (<30 seconds to complete)."
    languages: [JavaScript, React, TypeScript]
    example_good: |
      function DocumentEditor() {
        const [content, setContent] = useState(loadDraft());
        const [saveStatus, setSaveStatus] = useState('saved'); // 'saved' | 'saving' | 'unsaved'

        // Debounced auto-save: save 1s after user stops typing
        const debouncedSave = useMemo(
          () => debounce(async (text) => {
            setSaveStatus('saving');
            try {
              await saveDraft(text);
              setSaveStatus('saved');
            } catch {
              setSaveStatus('unsaved'); // Show retry option
            }
          }, 1000),
          []
        );

        const handleChange = (text) => {
          setContent(text);
          setSaveStatus('unsaved');
          debouncedSave(text);
        };

        return (
          <div>
            <div className="status-bar">
              {saveStatus === 'saved' && <span>✓ All changes saved</span>}
              {saveStatus === 'saving' && <span>Saving...</span>}
              {saveStatus === 'unsaved' && <span>● Unsaved changes</span>}
            </div>
            <textarea value={content} onChange={e => handleChange(e.target.value)} />
          </div>
        );
      }
    example_bad: |
      // BAD: No auto-save, no save status indicator, no draft recovery
      function BadEditor() {
        const [content, setContent] = useState('');
        return (
          <div>
            <textarea value={content} onChange={e => setContent(e.target.value)} />
            <button onClick={() => save(content)}>Save</button>
            {/* User closes tab → data gone. Browser crashes → data gone. */}
          </div>
        );
      }
    text: "Auto-Save Pattern -- Automatically persist user input at regular intervals or on change, preventing data loss from crashes, navigation, or session timeouts."
    why: "Automatically persist user input at regular intervals or on change, preventing data loss from crashes, navigation, or session timeouts."
    how_to_do_right: |
      1. Identify where auto-save pattern applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
    severity: medium
    technologies:
      lang: [javascript, react, typescript]
    domains:
      domain: [forms, ui]
      concern: [pattern, best_practice]
    when_applies: "Long-form content (documents, articles, code editors)."

    related_principles: [P-UX-ERROR-PREVENTION, P-UX-VISIBILITY]
    sources: ["https://www.nngroup.com/articles/auto-save/"]

  - id: PAT-UX-FORM-SMART-DEFAULTS
    name: "Smart Defaults"
    category: forms
    intent: "Pre-fill form fields with the most likely correct values, reducing the number of decisions users must make and accelerating task completion."
    when_to_use: "Any form where a common answer exists (>60% of users choose it). Repeat actions (reuse last-used values). Location-dependent fields (country, timezone, currency). Settings with a sensible baseline."
    when_not_to_use: "Fields where wrong defaults could cause harm (medical dosages, financial amounts). Fields where there is no dominant answer. Legal agreements (must never be pre-checked)."
    languages: [JavaScript, React, Python]
    example_good: |
      function ShippingForm({ user }) {
        // Smart defaults from multiple signals
        const defaults = {
          country: user.lastOrder?.country || detectCountryFromIP(),
          currency: user.preferredCurrency || currencyForCountry(defaults.country),
          shippingMethod: 'standard', // Most popular (72% of orders)
          saveAddress: true, // Most users want this (89%)
        };

        return (
          <form>
            <select name="country" defaultValue={defaults.country}>
              {/* Country pre-selected, user only changes if wrong */}
            </select>
            <fieldset>
              <legend>Shipping Method</legend>
              <label><input type="radio" name="shipping" value="standard"
                defaultChecked={defaults.shippingMethod === 'standard'} />
                Standard (5-7 days) — Free</label>
              <label><input type="radio" name="shipping" value="express" />
                Express (2-3 days) — $9.99</label>
            </fieldset>
          </form>
        );
      }
    example_bad: |
      // BAD: All fields blank — user must fill everything from scratch
      function ShippingForm() {
        return (
          <form>
            <select name="country"><option value="">Select country...</option></select>
            {/* No default selected despite 85% of users being from US */}
            <input name="phone" /> {/* No country code pre-filled */}
            <select name="currency"><option value="">Select...</option></select>
          </form>
        );
      }
    text: "Smart Defaults -- Pre-fill form fields with the most likely correct values, reducing the number of decisions users must make and accelerating task completion."
    why: "Pre-fill form fields with the most likely correct values, reducing the number of decisions users must make and accelerating task completion."
    how_to_do_right: |
      1. Identify where smart defaults applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
    severity: medium
    technologies:
      lang: [javascript, react, python]
    domains:
      domain: [forms, ui]
      concern: [pattern, best_practice]
    when_applies: "Any form where a common answer exists (>60% of users choose it)."

    related_principles: [P-UX-ERROR-PREVENTION, P-UX-FLEXIBILITY]

  # === Feedback Patterns ===
    sources: ["https://www.nngroup.com/articles/the-power-of-defaults/"]
  - id: PAT-UX-FEEDBACK-TOAST
    name: "Toast Notification"
    category: feedback
    intent: "Provide brief, non-blocking confirmation of user actions without interrupting workflow or requiring dismissal."
    when_to_use: "Success confirmations (item saved, email sent, settings updated). Informational messages (new version available, sync complete). Non-critical warnings (low storage). Background operation completion."
    when_not_to_use: "Errors that require action (use inline errors or modals). Destructive action confirmations (use modal dialog). Critical information the user must read (use banner or alert). More than one toast at a time."
    languages: [React, HTML, CSS]
    example_good: |
      function ToastProvider({ children }) {
        const [toasts, setToasts] = useState([]);

        const addToast = (message, type = 'success', duration = 4000) => {
          const id = Date.now();
          setToasts(prev => [...prev, { id, message, type }]);
          setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), duration);
        };

        return (
          <ToastContext.Provider value={{ addToast }}>
            {children}
            <div className="toast-container" role="status" aria-live="polite">
              {toasts.map(t => (
                <div key={t.id} className={`toast toast-${t.type}`}>
                  <span>{t.message}</span>
                  <button onClick={() => removeToast(t.id)} aria-label="Dismiss">×</button>
                </div>
              ))}
            </div>
          </ToastContext.Provider>
        );
      }
      // Usage: addToast('Settings saved', 'success');
    example_bad: |
      // BAD: Using window.alert for success — blocks entire UI, requires click to dismiss
      function saveSettings() {
        fetch('/api/settings', { method: 'POST', body: data });
        window.alert('Settings saved!'); // Blocks UI. Disrupts flow. Ugly.
      }
    text: "Toast Notification -- Provide brief, non-blocking confirmation of user actions without interrupting workflow or requiring dismissal."
    why: "Provide brief, non-blocking confirmation of user actions without interrupting workflow or requiring dismissal."
    how_to_do_right: |
      1. Identify where toast notification applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
    severity: medium
    technologies:
      lang: [react, html, css]
    domains:
      domain: [feedback, ui]
      concern: [pattern, best_practice]
    when_applies: "Success confirmations (item saved, email sent, settings updated)."

    related_principles: [P-UX-VISIBILITY, P-UX-AESTHETIC]
    sources: ["https://developer.android.com/reference/android/widget/Toast"]

  - id: PAT-UX-FEEDBACK-SKELETON
    name: "Skeleton Screen"
    category: feedback
    intent: "Show a wireframe preview of the page structure during loading, creating a perception of speed and preventing layout shift when content arrives."
    when_to_use: "Initial page loads with predictable layout. Content feeds (social media, news, product listings). Dashboard panels loading data. Any fetch that takes >200ms with a known layout structure."
    when_not_to_use: "When content structure is unpredictable. Very fast loads (<200ms — skeleton flashes). Error states (show error, not skeleton). When a progress bar is more appropriate (file upload, processing)."
    languages: [React, CSS, HTML]
    example_good: |
      function UserCard({ userId }) {
        const { data: user, isLoading } = useQuery(['user', userId], fetchUser);

        if (isLoading) {
          return (
            <div className="user-card skeleton" aria-busy="true" aria-label="Loading user">
              <div className="skeleton-avatar" />  {/* 48px circle, gray pulse */}
              <div className="skeleton-text skeleton-name" />  {/* 120px × 16px */}
              <div className="skeleton-text skeleton-email" />  {/* 180px × 14px */}
            </div>
          );
        }

        return (
          <div className="user-card">
            <img src={user.avatar} alt="" className="avatar" />
            <h3>{user.name}</h3>
            <p>{user.email}</p>
          </div>
        );
      }

      /* CSS: Pulsing animation for skeleton */
      .skeleton-avatar, .skeleton-text {
        background: linear-gradient(90deg, #e0e0e0 25%, #f0f0f0 50%, #e0e0e0 75%);
        background-size: 200% 100%;
        animation: pulse 1.5s infinite;
        border-radius: 4px;
      }
    example_bad: |
      // BAD: Generic spinner with no layout preview — page jumps when content loads
      function UserCard({ userId }) {
        const { data: user, isLoading } = useQuery(['user', userId], fetchUser);
        if (isLoading) return <div className="spinner" />;  // No size hint → layout shift
        return <div className="user-card">...</div>;
      }
    text: "Skeleton Screen -- Show a wireframe preview of the page structure during loading, creating a perception of speed and preventing layout shift when content arrives."
    why: "Show a wireframe preview of the page structure during loading, creating a perception of speed and preventing layout shift when content arrives."
    how_to_do_right: |
      1. Identify where skeleton screen applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
    severity: medium
    technologies:
      lang: [react, css, html]
    domains:
      domain: [feedback, ui]
      concern: [pattern, best_practice]
    when_applies: "Initial page loads with predictable layout."

    related_principles: [P-UX-VISIBILITY, P-UX-GESTALT-CLOSURE]
