  - id: PAT-UX-FEEDBACK-OPTIMISTIC
    name: "Optimistic UI Update"
    category: feedback
    intent: "Update the UI immediately on user action before server confirmation, making the interface feel instant while handling failures gracefully in the background."
    when_to_use: "Actions with >95% success rate (likes, saves, toggles). Low-risk operations where rollback is painless. Real-time features (chat messages, comments). Anywhere perceived latency hurts experience."
    when_not_to_use: "Financial transactions (payment, transfer). Destructive actions (delete, send). Operations with significant side effects (publish, deploy). Low connectivity environments where failure rate is high."
    languages: [React, TypeScript]
    example_good: |
      function LikeButton({ postId, initialLiked, initialCount }) {
        const [liked, setLiked] = useState(initialLiked);
        const [count, setCount] = useState(initialCount);

        const handleLike = async () => {
          // Optimistic update — instant feedback
          const previousLiked = liked;
          const previousCount = count;
          setLiked(!liked);
          setCount(liked ? count - 1 : count + 1);

          try {
            await api.toggleLike(postId);
          } catch {
            // Rollback on failure — restore previous state
            setLiked(previousLiked);
            setCount(previousCount);
            toast.error('Could not update. Please try again.');
          }
        };

        return (
          <button onClick={handleLike} aria-pressed={liked}>
            {liked ? '❤️' : '🤍'} {count}
          </button>
        );
      }
    example_bad: |
      // BAD: Wait for server before updating UI — user sees nothing for 200-2000ms
      function LikeButton({ postId }) {
        const [liked, setLiked] = useState(false);
        const [loading, setLoading] = useState(false);

        const handleLike = async () => {
          setLoading(true);  // Button becomes unresponsive
          const result = await api.toggleLike(postId);  // Wait 200ms-2s
          setLiked(result.liked);  // UI finally updates
          setLoading(false);
        };

        return <button onClick={handleLike} disabled={loading}>{liked ? '❤️' : '🤍'}</button>;
      }
    text: "Optimistic UI Update -- Update the UI immediately on user action before server confirmation, making the interface feel instant while handling failures gracefully in the background."
    why: "Update the UI immediately on user action before server confirmation, making the interface feel instant while handling failures gracefully in the background."
    how_to_do_right: |
      1. Identify where optimistic ui update applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
    severity: medium
    technologies:
      lang: [react, typescript]
    domains:
      domain: [feedback, ui]
      concern: [pattern, best_practice]
    when_applies: "Actions with >95% success rate (likes, saves, toggles)."

    related_principles: [P-UX-VISIBILITY, P-UX-CONTROL]
    sources: ["https://www.nngroup.com/articles/response-times-3-important-limits/"]

  - id: PAT-UX-FEEDBACK-EMPTY-STATE
    name: "Empty State Design"
    category: feedback
    intent: "Transform blank screens into actionable guidance that helps users understand what belongs here and how to populate it, turning a dead-end into an on-ramp."
    when_to_use: "First-time users seeing a feature for the first time. Lists/tables/dashboards with no data yet. Search results with zero matches. Filtered views that exclude all items. After deletion of all items."
    when_not_to_use: "Loading states (use skeleton screens). Error states (use error messages). States that should never be empty (pre-populate with defaults or examples)."
    languages: [React, HTML, CSS]
    example_good: |
      function ProjectList({ projects }) {
        if (projects.length === 0) {
          return (
            <div className="empty-state">
              <img src="/illustrations/empty-projects.svg" alt="" width={200} />
              <h3>No projects yet</h3>
              <p>Projects help you organize your work. Create your first one to get started.</p>
              <button className="btn-primary" onClick={openCreateDialog}>
                + Create Project
              </button>
              <a href="/docs/projects" className="learn-more">Learn about projects →</a>
            </div>
          );
        }
        return <ul>{projects.map(p => <ProjectCard key={p.id} project={p} />)}</ul>;
      }
    example_bad: |
      // BAD: Blank page with no guidance — user stares at empty space
      function ProjectList({ projects }) {
        if (projects.length === 0) return <div></div>;
        // or worse:
        // if (projects.length === 0) return <p>No data.</p>;
        // What IS data? How do I add it? Why is it empty?
        return <ul>{projects.map(p => <ProjectCard key={p.id} project={p} />)}</ul>;
      }
    text: "Empty State Design -- Transform blank screens into actionable guidance that helps users understand what belongs here and how to populate it, turning a dead-end into an on-ramp."
    why: "Transform blank screens into actionable guidance that helps users understand what belongs here and how to populate it, turning a dead-end into an on-ramp."
    how_to_do_right: |
