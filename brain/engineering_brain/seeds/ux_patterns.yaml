  - id: PAT-UX-SEARCH-TYPEAHEAD
    name: "Search-as-You-Type (Typeahead)"
    category: search
    intent: "Show search results or suggestions as the user types, reducing keystrokes needed and helping users formulate better queries."
    when_to_use: "Product search in e-commerce. User/entity lookup (find a person, file, or record). Navigation search (find a page or feature). Any search where the catalog is large but queries are short."
    when_not_to_use: "Full-text search where results require heavy computation. Databases where every keystroke query is expensive. When result set is <20 items (just show the full list with client-side filter)."
    languages: [React, TypeScript]
    example_good: |
      function SearchInput() {
        const [query, setQuery] = useState('');
        const [results, setResults] = useState([]);

        // Debounce: 300ms delay prevents firing on every keystroke
        const debouncedSearch = useMemo(
          () => debounce(async (q) => {
            if (q.length < 2) { setResults([]); return; } // Min 2 chars
            const data = await api.search(q);
            setResults(data);
          }, 300),
          []
        );

        return (
          <div className="search-container" role="combobox" aria-expanded={results.length > 0}>
            <input
              type="search" value={query} placeholder="Search products..."
              onChange={e => { setQuery(e.target.value); debouncedSearch(e.target.value); }}
              aria-autocomplete="list" aria-controls="search-results"
            />
            {results.length > 0 && (
              <ul id="search-results" role="listbox" className="search-dropdown">
                {results.map(r => (
                  <li key={r.id} role="option">
                    <a href={r.url}>
                      <strong>{highlightMatch(r.name, query)}</strong>
                      <span className="category">{r.category}</span>
                    </a>
                  </li>
                ))}
              </ul>
            )}
          </div>
        );
      }
    example_bad: |
      // BAD: No debounce (fires on EVERY keystroke), no minimum length, no ARIA
      function SearchInput() {
        const [query, setQuery] = useState('');
        const [results, setResults] = useState([]);
        return (
          <div>
            <input onChange={async e => {
              setQuery(e.target.value);
              const data = await api.search(e.target.value); // Fires for 'a', 'ap', 'app', 'appl', 'apple'
              setResults(data); // 5 API calls for one word, race conditions possible
            }} />
            {results.map(r => <div>{r.name}</div>)}
          </div>
        );
      }
    text: "Search-as-You-Type (Typeahead) -- Show search results or suggestions as the user types, reducing keystrokes needed and helping users formulate better queries."
    why: "Show search results or suggestions as the user types, reducing keystrokes needed and helping users formulate better queries."
    how_to_do_right: |
      1. Identify where search-as-you-type (typeahead) applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
    severity: high
    technologies:
      lang: [react, typescript]
    domains:
      domain: [search, ui]
      concern: [pattern, best_practice]
    when_applies: "Product search in e-commerce."

    related_principles: [P-UX-RECOGNITION, P-UX-FLEXIBILITY]

