  - id: PAT-UX-DATA-PAGINATION
    name: "Pagination vs Infinite Scroll vs Virtual Scroll"
    category: data_display
    intent: "Choose the right data loading strategy based on user behavior: browsing (pagination), consuming (infinite scroll), or working with large datasets (virtual scroll)."
    when_to_use: "Pagination: goal-oriented browsing (e-commerce search, admin tables). Infinite scroll: content consumption (social feeds, news). Virtual scroll: large datasets in tables or lists (1000+ rows)."
    when_not_to_use: "Pagination for content feeds (breaking flow). Infinite scroll for search results (can't bookmark a 'page'). Virtual scroll for <100 items (overhead not justified)."
    languages: [React, JavaScript]
    example_good: |
      // PAGINATION — for search results, admin tables
      function PaginatedTable({ data, totalPages, currentPage, onPageChange }) {
        return (
          <>
            <table>{/* ...table rows... */}</table>
            <nav aria-label="Pagination">
              <button disabled={currentPage === 1} onClick={() => onPageChange(currentPage - 1)}>
                Previous
              </button>
              <span>Page {currentPage} of {totalPages}</span>
              <button disabled={currentPage === totalPages} onClick={() => onPageChange(currentPage + 1)}>
                Next
              </button>
            </nav>
            {/* URL reflects page: /products?page=3 — bookmarkable, shareable */}
          </>
        );
      }

      // VIRTUAL SCROLL — for large datasets, only renders visible rows
      function VirtualList({ items }) {
        return (
          <FixedSizeList height={600} itemCount={items.length} itemSize={48} width="100%">
            {({ index, style }) => (
              <div style={style}>{items[index].name}</div>
            )}
          </FixedSizeList>
        );
      }
    example_bad: |
      // BAD: Loading 10,000 DOM nodes at once — browser freezes
      function BadList({ items }) {
        return (
          <ul>
            {items.map(item => <li key={item.id}>{item.name}</li>)}
            {/* 10,000 DOM nodes → 2 second render, scroll lag, memory bloat */}
          </ul>
        );
      }

      // BAD: Infinite scroll for search results — user can't find "page 7" again
      function BadSearch() {
        // No URL state, no way to share results, scroll position lost on back button
        return <InfiniteScroll loadMore={fetchMore}>{results.map(...)}</InfiniteScroll>;
      }
    text: "Pagination vs Infinite Scroll vs Virtual Scroll -- Choose the right data loading strategy based on user behavior: browsing (pagination), consuming (infinite scroll), or working with large datasets (virtual scroll)."
    why: "Choose the right data loading strategy based on user behavior: browsing (pagination), consuming (infinite scroll), or working with large datasets (virtual scroll)."
    how_to_do_right: |
      1. Identify where pagination vs infinite scroll vs virtual scroll applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
    severity: high
    technologies:
      lang: [react, javascript]
    domains:
      domain: [data_display, ui]
      concern: [pattern, best_practice]
    when_applies: "Pagination: goal-oriented browsing (e-commerce search, admin tables)."

    related_principles: [P-UX-CONTROL, P-UX-FLEXIBILITY, P-UX-VISIBILITY]
    sources: ["https://www.nngroup.com/articles/item-list-view-all/"]

  - id: PAT-UX-DATA-TABLE
    name: "Data Table Pattern"
    category: data_display
    intent: "Present structured data in a scannable, sortable, and actionable table with proper semantics and responsive behavior."
    when_to_use: "Structured data with consistent attributes (users, orders, transactions). Comparison tasks (compare rows across columns). Data that needs sorting, filtering, or bulk actions. Admin interfaces and dashboards."
    when_not_to_use: "Visual browsing tasks (use cards instead). Single-attribute lists (use a simple list). Mobile-only interfaces with >4 columns (tables don't work well — use stacked cards)."
    languages: [HTML, React, CSS]
    example_good: |
      <div className="table-container" role="region" aria-label="Users" tabIndex={0}>
        <table>
          <thead>
            <tr>
              <th scope="col">
                <button onClick={() => sort('name')} aria-sort={sortDir('name')}>
                  Name {sortIcon('name')}
                </button>
              </th>
              <th scope="col">Email</th>
              <th scope="col">
                <button onClick={() => sort('joined')} aria-sort={sortDir('joined')}>
                  Joined {sortIcon('joined')}
                </button>
              </th>
              <th scope="col">
                <span className="sr-only">Actions</span>
              </th>
            </tr>
          </thead>
          <tbody>
            {users.map(u => (
              <tr key={u.id}>
                <td><a href={`/users/${u.id}`}>{u.name}</a></td>
                <td>{u.email}</td>
                <td>{formatDate(u.joinedAt)}</td>
                <td>
                  <button aria-label={`Edit ${u.name}`}>Edit</button>
                  <button aria-label={`Delete ${u.name}`}>Delete</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    example_bad: |
      <!-- BAD: Divs pretending to be a table — no semantics, no sorting, no a11y -->
      <div class="table">
        <div class="row header">
          <div>Name</div><div>Email</div><div>Joined</div><div></div>
        </div>
        {users.map(u => (
          <div class="row">
            <div>{u.name}</div>
            <div>{u.email}</div>
            <div>{u.joinedAt}</div>  {/* Raw ISO date, not formatted */}
            <div><button>X</button></div>  {/* No label — what does X do? */}
          </div>
        ))}
      </div>
    text: "Data Table Pattern -- Present structured data in a scannable, sortable, and actionable table with proper semantics and responsive behavior."
    why: "Present structured data in a scannable, sortable, and actionable table with proper semantics and responsive behavior."
    how_to_do_right: |
      1. Identify where data table pattern applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
    severity: high
    technologies:
      lang: [html, react, css]
    domains:
      domain: [data_display, ui]
      concern: [pattern, best_practice]
    when_applies: "Structured data with consistent attributes (users, orders, transactions)."

    related_principles: [P-UX-CONSISTENCY, P-UX-FLEXIBILITY, P-UX-RECOGNITION]
    sources: ["https://www.nngroup.com/articles/data-tables/"]
