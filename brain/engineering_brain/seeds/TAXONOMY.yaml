# =============================================================================
# Engineering Brain — Official Taxonomy v2.0 (Deep Hierarchy)
# =============================================================================
#
# DESIGNED FOR: 100M+ nodes. Every leaf must be precise enough that a query
# at that leaf returns <1000 nodes, not millions.
#
# NOTATION: Dotted path (e.g., "security.authentication.oauth.flows.authorization_code")
# DEPTH: 5-7 levels for major branches. Add new leaves as needed.
# RULE: Tag at the DEEPEST applicable level. Router walks UP for broader queries.
# RULE: This file is a REFERENCE, not a constraint. New leaves can be added organically.
#
# =============================================================================


