layer: rules
technology: pytest
domain: testing
knowledge:
- id: CR-TEST-001
  text: Tests must follow Arrange-Act-Assert pattern with clear separation between phases.
  why: Mixing setup, execution, and assertion makes tests hard to read and debug. When a test fails, you can't quickly identify
    which phase broke.
  how_to_do_right: '1. Arrange: set up inputs and expected values. 2. Act: call the function under test. 3. Assert: verify
    the result. Separate phases with blank lines.'
  severity: medium
  technologies:
    lang: [python]
    framework: [pytest]
  domains: [testing, quality]
  example_good: "def test_user_creation():\n    # Arrange\n    name = \"Alice\"\n    email = \"alice@example.com\"\n\n   \
    \ # Act\n    user = create_user(name=name, email=email)\n\n    # Assert\n    assert user.name == name\n    assert user.email\
    \ == email\n    assert user.id is not None\n"
  example_bad: |
    def test_user_creation():
        user = create_user(name="Alice", email="alice@example.com")
        assert user  # Setup, action, and assertion mashed together
        assert create_user(name="Bob", email="bob@test.com")  # Two tests in one
  when_applies: Projects using pytest or Python codebases
  when_not_applies: projects not using pytest or Python
  sources: ["https://docs.pytest.org/en/stable/", "https://martinfowler.com/bliki/GivenWhenThen.html"]
- id: CR-TEST-002
  text: Test names must describe the scenario and expected outcome, not the function name.
  why: '''test_validate'' tells you nothing. ''test_validate_rejects_negative_amount'' tells you exactly what''s being tested
    and what should happen.'
  how_to_do_right: 'Format: test_{function}_{scenario}_{expected_outcome}. Or: test_{scenario}_should_{outcome}.'
  severity: low
  technologies:
    lang: [python]
    framework: [pytest]
  domains: [testing, quality]
  example_good: 'def test_transfer_with_insufficient_funds_raises_error(): ...

    def test_transfer_between_same_account_is_rejected(): ...

    '
  example_bad: 'def test_transfer(): ...

    def test_transfer2(): ...

    '
  when_applies: Projects using pytest or Python codebases
  when_not_applies: projects not using pytest or Python
  sources: ["https://docs.pytest.org/en/stable/how-to/assert.html"]
- id: CR-TEST-003
  text: Use specific assertions, not bare 'assert result' or 'assert True'.
  why: 'Bare assertions give useless failure messages: ''AssertionError''. Specific assertions show expected vs actual: ''assert
    3 == result'' → ''AssertionError: assert 3 == 5''.'
  how_to_do_right: assert x == expected_value. Use pytest.raises for exceptions. Use pytest.approx for floats. Check specific
    fields, not just truthiness.
  severity: medium
  technologies:
    lang: [python]
    framework: [pytest]
  domains: [testing, quality]
  example_good: "assert user.name == \"Alice\"\nassert len(results) == 3\nwith pytest.raises(ValueError, match=\"negative\"\
    ):\n    transfer(-100)\n"
  example_bad: 'assert result  # What is ''result''? What should it be?

    assert True  # Always passes — tests nothing

    '
  when_applies: Projects using pytest or Python codebases
  when_not_applies: projects not using pytest or Python
  sources: ["https://docs.pytest.org/en/stable/how-to/assert.html"]
- id: CR-TEST-004
  text: Each test should have at least 3 meaningful assertions.
  why: A test with 1 assertion often misses edge cases. Verifying only the return value misses side effects (database changes,
    logged events, sent emails).
  how_to_do_right: Assert the return value AND side effects AND state changes. For objects, check multiple relevant fields.
  severity: low
  technologies:
    lang: [python]
    framework: [pytest]
  domains: [testing, quality]
  example_good: |
    def test_create_order():
        order = create_order(user_id=1, amount=100)
        assert order.id is not None
        assert order.status == "pending"
        assert order.amount == 100
        assert db.query(AuditLog).filter_by(order_id=order.id).count() == 1
  example_bad: |
    def test_create_order():
        order = create_order(user_id=1, amount=100)
        assert order  # Only checks truthiness — misses status, amount, audit log
  when_applies: Projects using pytest or Python codebases
  when_not_applies: projects not using pytest or Python
  sources: ["https://docs.pytest.org/en/stable/how-to/assert.html"]
- id: CR-TEST-005
  text: Tests must not depend on execution order or share mutable state.
  why: Tests that pass individually but fail when run together (or in different order) indicate shared state pollution. This
    makes the suite unreliable.
  how_to_do_right: Each test creates its own fixtures. Use pytest fixtures with scope='function'. Reset global state in setUp/tearDown.
  severity: high
  technologies:
    lang: [python]
    framework: [pytest]
  domains: [testing, quality]
  example_good: |
    @pytest.fixture
    def fresh_db():
        db = create_test_db()
        yield db
        db.rollback()  # Clean state for next test

    def test_insert(fresh_db):
        fresh_db.add(Item(name="A"))
        assert fresh_db.query(Item).count() == 1
  example_bad: |
    items = []  # Module-level shared state!
    def test_add():
        items.append("A")
        assert len(items) == 1
    def test_count():
        assert len(items) == 0  # FAILS — items still has "A" from test_add
  when_applies: Projects using pytest or Python codebases
  when_not_applies: projects not using pytest or Python
  sources: ["https://docs.pytest.org/en/stable/how-to/fixtures.html"]
- id: CR-TEST-006
  text: Unit tests must not make network calls, file I/O, or database queries.
  why: External dependencies make tests slow, flaky, and environment-dependent. A test that fails because Redis is down is
    not testing YOUR code.
  how_to_do_right: Mock external dependencies. Use in-memory fakes for databases. Use unittest.mock.patch for side effects.
  severity: high
  technologies:
    lang: [python]
    framework: [pytest]
  domains: [testing, quality]
  example_good: "def test_process_data(mocker):\n    mocker.patch('mymodule.fetch_from_api', return_value={\"key\": \"value\"\
    })\n    result = process_data()\n    assert result.status == \"processed\"\n"
  example_bad: |
    def test_process_data():
        result = process_data()  # Calls real API — slow, flaky
        assert result.status == "processed"  # Fails if API is down
  when_applies: Projects using pytest or Python codebases
  when_not_applies: projects not using pytest or Python
  sources: ["https://docs.pytest.org/en/stable/how-to/monkeypatch.html", "https://martinfowler.com/articles/practical-test-pyramid.html"]
- id: CR-TEST-007
  text: Use pytest fixtures for reusable setup, not copy-pasted setup code.
  why: Duplicated setup across 20 tests means 20 places to update when the setup changes. Fixtures centralize setup and signal
    intent.
  how_to_do_right: Define fixtures in conftest.py for cross-module sharing. Use yield fixtures for setup+teardown. Parameterize
    fixtures for variant testing.
  severity: medium
  technologies:
    lang: [python]
    framework: [pytest]
  domains: [testing, quality]
  example_good: "@pytest.fixture\ndef sample_user():\n    return User(name=\"Alice\", email=\"alice@test.com\")\n\ndef test_greeting(sample_user):\n\
    \    assert greet(sample_user) == \"Hello, Alice!\"\n"
  example_bad: |
    def test_greeting():
        user = User(name="Alice", email="alice@test.com")  # Duplicated in every test
        assert greet(user) == "Hello, Alice!"
    def test_email():
        user = User(name="Alice", email="alice@test.com")  # Same setup, copy-pasted
        assert user.email == "alice@test.com"
  when_applies: Projects using pytest or Python codebases
  when_not_applies: projects not using pytest or Python
  sources: ["https://docs.pytest.org/en/stable/how-to/fixtures.html"]
- id: CR-TEST-008
  text: 'Always test edge cases: empty input, None, boundary values, and error conditions.'
  why: Most bugs hide at boundaries. The function works for normal input but crashes on empty list, None, negative number,
    or maximum integer.
  how_to_do_right: 'For each function, test: empty/None input, single element, boundary values (0, -1, MAX_INT), invalid types,
    and expected error conditions.'
  severity: high
  technologies:
    lang: [python]
    framework: [pytest]
  domains: [testing, quality]
  example_good: "@pytest.mark.parametrize(\"input,expected\", [\n    ([], 0),           # empty\n    ([1], 1),          #\
    \ single\n    ([1, 2, 3], 6),    # normal\n    ([-1, -2], -3),    # negative\n])\ndef test_sum(input, expected):\n   \
    \ assert sum_values(input) == expected\n"
  example_bad: |
    def test_sum_normal():
        assert sum_values([1, 2, 3]) == 6
    # Only tests happy path — no empty, negative, or single-element tests
  when_applies: Projects using pytest or Python codebases
  when_not_applies: projects not using pytest or Python
  sources: ["https://docs.pytest.org/en/stable/how-to/parametrize.html"]
- id: CR-TEST-ADV-001
  text: Use property-based testing with Hypothesis to discover edge cases that example-based tests miss — Hypothesis generates
    hundreds of random inputs and finds minimal failing examples automatically.
  why: Example-based tests only cover cases the developer thinks of. Property-based testing defines properties that must hold
    for ALL inputs, then automatically generates diverse inputs to falsify them. Hypothesis found a bug in CPython's datetime
    module that had been undiscovered for 15 years. For financial calculations, serialization, parsers, and data transformations,
    property-based tests routinely find edge cases (empty strings, NaN, Unicode surrogates, boundary values) that manual tests
    miss. The shrinking algorithm reduces failing inputs to the minimal reproducing case, making debugging trivial.
  how_to_do_right: '1. Install hypothesis: pip install hypothesis.

    2. Identify properties: roundtrip (encode/decode returns original), invariants (sorted output is same length), oracle (compare
    with reference implementation).

    3. Use @given(st.text(), st.integers(), st.floats()) to generate inputs.

    4. Use @settings(max_examples=500) for thorough testing, @settings(max_examples=50) for CI.

    5. Add Hypothesis profiles: HYPOTHESIS_PROFILE=ci for fast CI runs, HYPOTHESIS_PROFILE=thorough for nightly.

    6. When Hypothesis finds a failure, it saves it to the example database and replays it on every future run.

    '
  severity: high
  technologies:
    lang: [python]
    framework: [pytest]
    library: [hypothesis]
  domains:
    domain: [testing, quality]
    concern: [testing, reliability]
  example_good: "from hypothesis import given, settings, strategies as st\nimport json\n\n# Property: JSON roundtrip preserves\
    \ data\n@given(st.dictionaries(\n    keys=st.text(min_size=1, max_size=50),\n    values=st.one_of(st.integers(), st.floats(allow_nan=False),\
    \ st.text()),\n    max_size=20,\n))\ndef test_json_roundtrip(data):\n    encoded = json.dumps(data)\n    decoded = json.loads(encoded)\n\
    \    assert decoded == data\n\n# Property: sorting preserves length and elements\n@given(st.lists(st.integers()))\ndef test_sort_preserves_elements(lst):\n\
    \    sorted_lst = sorted(lst)\n    assert len(sorted_lst) == len(lst)\n    assert set(sorted_lst) == set(lst)\n    assert\
    \ all(sorted_lst[i] <= sorted_lst[i+1] for i in range(len(sorted_lst)-1))\n\n# Property: financial calculation never produces\
    \ negative fees\n@given(st.decimals(min_value=0, max_value=1000000, places=2))\ndef test_fee_calculation_non_negative(amount):\n\
    \    fee = calculate_fee(amount)\n    assert fee >= 0\n    assert fee <= amount  # Fee cannot exceed principal\n"
  example_bad: "# Only testing with hand-picked examples — misses edge cases\ndef test_json_roundtrip():\n    data = {\"name\"\
    : \"Alice\", \"age\": 30}\n    assert json.loads(json.dumps(data)) == data\n    # Passes — but what about:\n    # Empty dict?\
    \ Nested dicts? Unicode keys? Very long strings?\n    # Float precision issues? Special characters?\n    # Hypothesis would\
    \ find all of these automatically\n"
  when_applies: Projects using pytest or Python codebases, especially data processing, serialization, and financial calculations
  when_not_applies: projects not using Python, trivial CRUD applications with no complex logic
  sources: ["https://hypothesis.readthedocs.io/en/latest/", "https://hypothesis.readthedocs.io/en/latest/quickstart.html"]
- id: CR-TEST-ADV-002
  text: Use contract testing with Pact for microservice API boundaries — consumer-driven contracts ensure that API changes do
    not break consumers without requiring end-to-end integration tests.
  why: Integration tests for microservices are slow, flaky, and require all services to be running. When Service A calls Service
    B's API, a contract test verifies the interaction without running Service B. The consumer (Service A) defines a contract
    describing the request it sends and the response it expects. The provider (Service B) verifies that it satisfies all consumer
    contracts. If Service B changes its API in a way that breaks Service A's contract, the provider verification fails BEFORE
    deployment. This catches breaking changes at build time, not production time. Teams using Pact reported 80% reduction in
    integration-related production incidents.
  how_to_do_right: '1. Install pact-python: pip install pact-python.

    2. Consumer side: define the expected interaction (request + response) in a Pact test.

    3. Publish the Pact contract to a Pact Broker (or file share).

    4. Provider side: verify the provider satisfies all consumer contracts.

    5. Run provider verification in CI on every provider change.

    6. Use can-i-deploy to check if a version is compatible before deployment.

    '
  severity: high
  technologies:
    lang: [python]
    framework: [pytest]
    library: [pact-python]
  domains:
    domain: [testing, architecture]
    concern: [testing, microservices, api]
  example_good: "# Consumer test (Service A tests its expectations of Service B)\nfrom pact import Consumer, Provider\n\npact\
    \ = Consumer('ClaimService').has_pact_with(Provider('EvidenceService'))\n\ndef test_get_evidence_for_claim():\n    expected\
    \ = {\n        \"evidence_id\": \"ev-123\",\n        \"claim_id\": \"cl-456\",\n        \"source_url\": \"https://source.com/article\"\
    ,\n        \"relevance_score\": 0.87,\n    }\n    (pact\n        .given('evidence exists for claim cl-456')\n        .upon_receiving('a\
    \ request for evidence')\n        .with_request('GET', '/api/evidence/cl-456')\n        .will_respond_with(200, body=expected))\n\
    \n    with pact:\n        result = evidence_client.get_evidence('cl-456')\n        assert result.evidence_id == 'ev-123'\n\
    \        assert result.relevance_score == 0.87\n\n# Provider verification (Service B verifies it satisfies all contracts)\n\
    # pytest --pact-verify --pact-url=https://broker.example.com/pacts/ClaimService/EvidenceService\n"
  example_bad: "# No contract testing — relying on integration tests\ndef test_claim_evidence_integration():\n    # Requires\
    \ EvidenceService to be running\n    response = requests.get('http://localhost:8001/api/evidence/cl-456')\n    assert response.status_code\
    \ == 200\n    # If EvidenceService is down → test fails (flaky)\n    # If EvidenceService changes response format → discovered\
    \ in production\n    # If EvidenceService team renames field → no one knows until deployment\n"
  when_applies: Projects with microservice architecture or multi-team API boundaries
  when_not_applies: monolithic applications, single-team projects with no external API consumers
  sources: ["https://docs.pact.io/", "https://docs.pact.io/getting_started/how_pact_works"]
- id: CR-TEST-ADV-003
  text: Use mutation testing with mutmut to measure test suite effectiveness — code coverage measures lines executed, mutation
    testing measures whether tests actually detect changes.
  why: '100% code coverage with zero assertions tests nothing. Mutation testing introduces small changes (mutations) to the source
    code — replacing + with -, True with False, > with >=, deleting statements — and checks if the test suite detects each
    mutation (kills the mutant). If a mutant survives (tests still pass), the test suite has a gap: that line is covered but
    not meaningfully asserted. Mutation kill rate is the gold standard for test quality. A test suite with 95% coverage but
    40% kill rate is weaker than one with 80% coverage and 85% kill rate. Google found that mutation testing identified 73%
    of real bugs that escaped traditional testing.'
  how_to_do_right: '1. Install mutmut: pip install mutmut.

    2. Run: mutmut run --paths-to-mutate=src/module.py --tests-dir=tests/.

    3. Target 70%+ kill rate for production code, 80%+ for critical financial or security code.

    4. Review surviving mutants: mutmut results. Fix the most impactful gaps first.

    5. Run mutation testing per pack or module, not the entire codebase (it is slow).

    6. Add mutation testing to nightly CI, not per-commit (too slow for per-commit).

    '
  severity: medium
  technologies:
    lang: [python]
    framework: [pytest]
    library: [mutmut]
  domains:
    domain: [testing, quality]
    concern: [testing, mutation_testing]
  example_good: "# Run mutation testing on the fee calculation module\n# mutmut run --paths-to-mutate=src/billing/fees.py --tests-dir=tests/\n\
    \n# Results:\n# Killed:   42 (tests detected the mutation)\n# Survived: 8  (tests did NOT detect the mutation)\n# Kill rate:\
    \ 84% (good — above 80% threshold)\n\n# Example surviving mutant:\n# --- src/billing/fees.py\n# +++ mutant\n#  def calculate_fee(amount):\n\
    # -    if amount > 1000:\n# +    if amount >= 1000:  # mutant: > became >=\n#          return amount * 0.02\n#\n# Fix: add\
    \ boundary test\ndef test_fee_at_exact_threshold():\n    assert calculate_fee(Decimal('1000.00')) == Decimal('10.00')  # at\
    \ threshold\n    assert calculate_fee(Decimal('1000.01')) == Decimal('20.00')  # just above\n    assert calculate_fee(Decimal('999.99'))\
    \ == Decimal('10.00')  # just below\n"
  example_bad: "# 100% coverage but weak assertions — mutants survive\ndef test_calculate_fee():\n    result = calculate_fee(500)\n\
    \    assert result is not None  # Useless assertion\n    # Coverage: 100% (all lines executed)\n    # Mutation: change 0.02\
    \ to 0.03 → test still passes (no assertion on value)\n    # Mutation: remove if statement → test still passes\n    # Kill\
    \ rate: 10% (terrible)\n"
  when_applies: Projects using pytest or Python codebases, especially critical business logic
  when_not_applies: exploratory prototypes, spike investigations, projects with <50% line coverage (get coverage first)
  sources: ["https://mutmut.readthedocs.io/en/latest/", "https://research.google/pubs/pub46584/"]
- id: CR-TEST-ADV-004
  text: Use snapshot testing for complex outputs — capture the expected output once, then detect any unintended changes automatically
    on subsequent runs.
  why: Some test outputs are too complex to assert field-by-field — API responses with 50+ fields, HTML renderings, serialized
    data structures, configuration outputs. Snapshot testing captures the first run's output as the "expected" snapshot and
    compares subsequent runs against it. Any change (added field, different ordering, changed value) is flagged. This catches
    unintended side effects of refactoring that field-level assertions would miss. The key discipline is reviewing snapshot
    updates carefully — blindly accepting updated snapshots defeats the purpose.
  how_to_do_right: '1. Use syrupy (pytest-snapshot) or inline-snapshot for Python snapshot testing.

    2. Commit snapshot files to version control — they are part of the test suite.

    3. When a snapshot update is expected (intentional change), review the diff carefully before updating.

    4. Use --snapshot-update flag explicitly to update snapshots, never auto-update.

    5. Combine snapshot tests with targeted assertions for critical fields (snapshot catches unintended changes, assertions catch
    intentional requirements).

    6. Keep snapshot outputs deterministic — mock timestamps, UUIDs, and random values.

    '
  severity: medium
  technologies:
    lang: [python]
    framework: [pytest]
    library: [syrupy, inline-snapshot]
  domains:
    domain: [testing]
    concern: [testing, regression]
  example_good: "from syrupy.assertion import SnapshotAssertion\nimport json\n\ndef test_api_response_format(snapshot: SnapshotAssertion):\n\
    \    \"\"\"Snapshot captures the full response structure.\"\"\"\n    response = client.get('/api/claims/cl-123')\n    # Mock\
    \ non-deterministic fields\n    data = response.json()\n    data['timestamp'] = 'MOCKED'\n    data['request_id'] = 'MOCKED'\n\
    \    assert data == snapshot\n    # First run: creates snapshot file with full response\n    # Subsequent runs: compares against\
    \ snapshot\n    # If someone adds/removes/changes a field: test fails with a diff\n\ndef test_claim_serialization(snapshot:\
    \ SnapshotAssertion):\n    \"\"\"Catch unintended serialization changes.\"\"\"\n    claim = Claim(id='cl-123', text='The earth\
    \ is round', verdict='supported')\n    serialized = claim.model_dump_json(indent=2)\n    assert serialized == snapshot\n"
  example_bad: "# No snapshot — manually asserting 50 fields\ndef test_api_response():\n    response = client.get('/api/claims/cl-123')\n\
    \    data = response.json()\n    assert data['id'] == 'cl-123'\n    assert data['text'] == 'The earth is round'\n    # ...\
    \ 48 more assertions\n    # Someone adds a new field 'confidence_score' → test still passes\n    # Unintended change to 'metadata'\
    \ format → test still passes\n    # Only the 50 explicitly asserted fields are checked\n"
  when_applies: Projects with complex output structures, API responses, serialization formats
  when_not_applies: simple functions with scalar outputs, projects where output format changes frequently
  sources: ["https://github.com/syrupy-project/syrupy"]
- id: CR-TEST-ADV-005
  text: Use load testing with Locust to verify system performance under realistic traffic — performance problems found in production
    are 10x more expensive to fix than those found in load testing.
  why: 'Unit tests verify correctness but not performance. A function that works correctly for 1 request may fail under 1000
    concurrent requests due to connection pool exhaustion, memory leaks, lock contention, or database query degradation. Locust
    is a Python-based load testing tool that simulates realistic user behavior: define user scenarios as Python code, ramp up
    virtual users gradually, and measure response times, throughput, and error rates. It runs distributed across multiple machines
    for high load generation. Finding that your API handles 200 req/s (not the expected 2000) in load testing is far better
    than discovering it during a product launch.'
  how_to_do_right: '1. Install locust: pip install locust.

    2. Define user scenarios that match real usage patterns (not just hammering one endpoint).

    3. Start with baseline: measure current performance with realistic data volume.

    4. Set SLO thresholds: p99 latency < 500ms, error rate < 0.1%, throughput > 1000 req/s.

    5. Test with production-like data (not empty databases).

    6. Run load tests in CI/CD for performance regression detection (reduced load, SLO check only).

    '
  severity: medium
  technologies:
    lang: [python]
    framework: [pytest]
    library: [locust]
  domains:
    domain: [testing, performance]
    concern: [testing, load_testing, performance]
  example_good: "from locust import HttpUser, task, between\n\nclass ClaimVerificationUser(HttpUser):\n    \"\"\"Simulates realistic\
    \ claim verification traffic.\"\"\"\n    wait_time = between(1, 5)  # 1-5 seconds between requests\n\n    @task(3)  # 3x\
    \ more likely than other tasks\n    def submit_claim(self):\n        self.client.post('/api/claims', json={\n            '\
    text': 'The global temperature rose by 1.2C since pre-industrial levels',\n            'source_url': 'https://example.com/article',\n\
    \        })\n\n    @task(5)\n    def check_claim_status(self):\n        self.client.get('/api/claims/cl-123/status')\n\n \
    \   @task(1)\n    def get_evidence(self):\n        self.client.get('/api/evidence?claim_id=cl-123')\n\n# Run: locust -f locustfile.py\
    \ --host=http://localhost:8000\n# Ramp: 10 users → 100 users over 60 seconds\n# Verify: p99 < 500ms, error_rate < 0.1%\n"
  example_bad: "# No load testing — performance discovered in production\n# Launch day: 10,000 users hit the API simultaneously\n\
    # Connection pool exhausted at 50 concurrent requests\n# Database queries that took 10ms with 1 user take 5000ms with 100\n\
    # Redis connection timeout under load\n# Result: 3-hour outage on launch day, lost user trust\n"
  when_applies: Projects with user-facing APIs, services with SLO requirements
  when_not_applies: internal scripts, batch processing jobs, CLI tools
  sources: ["https://docs.locust.io/en/stable/", "https://docs.locust.io/en/stable/quickstart.html"]
- id: CR-TEST-ADV-006
  text: Apply chaos testing principles to verify system resilience — intentionally inject failures (network partitions, service
    crashes, disk full, slow responses) to validate that the system degrades gracefully.
  why: 'Distributed systems fail in surprising ways. A service that works perfectly in testing may crash when Redis is slow (not
    down, just slow — the hardest failure to handle), when the database returns unexpected errors, or when a downstream service
    responds after the timeout but before connection cleanup. Chaos testing (pioneered by Netflix''s Chaos Monkey) intentionally
    injects these failures in a controlled environment. The goal is not to prevent failures but to verify that failures are
    handled gracefully: circuit breakers trip, fallbacks activate, data is not corrupted, and the user sees a meaningful error
    instead of a 500.'
  how_to_do_right: '1. Start with game days: manually inject one failure at a time and observe system behavior.

    2. Inject common failures: service crash, slow response (add 5s delay), network partition, disk full, OOM.

    3. Verify resilience properties: circuit breakers trip, retries work, fallbacks activate, data remains consistent.

    4. Use tools: toxiproxy for network failures, chaos-toolkit for orchestration, pytest-docker for container failures.

    5. Run chaos tests in staging, never directly in production (unless you have Netflix-level automation).

    6. Document expected behavior for each failure mode — chaos tests verify the documented behavior.

    '
  severity: medium
  technologies:
    lang: [python]
    framework: [pytest]
    library: [toxiproxy, chaos-toolkit]
  domains:
    domain: [testing, reliability]
    concern: [testing, chaos_engineering, resilience]
  example_good: "import pytest\nfrom toxiproxy import Toxiproxy\n\ntoxiproxy = Toxiproxy()\n\n@pytest.fixture\ndef redis_proxy():\n\
    \    \"\"\"Proxy that can inject failures into Redis connection.\"\"\"\n    proxy = toxiproxy.create(name='redis', upstream='redis:6379',\
    \ listen='0.0.0.0:16379')\n    yield proxy\n    proxy.destroy()\n\ndef test_system_survives_redis_latency(redis_proxy):\n\
    \    \"\"\"Verify circuit breaker trips when Redis is slow.\"\"\"\n    # Add 5 second latency to Redis\n    redis_proxy.add_toxic('latency',\
    \ attributes={'latency': 5000})\n\n    # System should fall back to direct DB query\n    response = client.get('/api/claims/cl-123')\n\
    \    assert response.status_code == 200  # Degraded but functional\n    assert response.headers['X-Cache-Status'] == 'BYPASS'\
    \  # Cache bypassed\n\ndef test_system_survives_db_connection_failure(redis_proxy):\n    \"\"\"Verify meaningful error when\
    \ DB is down.\"\"\"\n    # Simulate DB connection refused\n    with mock.patch('app.db.connect', side_effect=ConnectionRefusedError):\n\
    \        response = client.get('/api/claims/cl-123')\n        assert response.status_code == 503  # Service Unavailable (not\
    \ 500)\n        assert 'retry_after' in response.json()  # Tells client when to retry\n"
  example_bad: "# No resilience testing — failures discovered in production\n# Scenario: Redis latency spike (not down, just\
    \ slow)\n# Expected: circuit breaker trips, fallback to DB\n# Actual: all requests wait 30s for Redis timeout, thread pool\
    \ exhausted\n# Result: cascade failure, entire system unresponsive for 20 minutes\n# Post-mortem: \"We never tested what happens\
    \ when Redis is slow\"\n"
  when_applies: Distributed systems, microservice architectures, systems with SLO requirements
  when_not_applies: single-process applications, CLI tools, batch jobs with no real-time requirements
  sources: ["https://principlesofchaos.org/", "https://netflixtechblog.com/the-netflix-simian-army-16e57fbab116"]
- id: CR-TEST-009
  text: Every bug fix must include a regression test that fails without the fix.
  why: Without a regression test, the same bug will be reintroduced by future changes. The test encodes the knowledge that
    'this specific case broke before'.
  how_to_do_right: 1. Write a test that reproduces the bug (should fail). 2. Apply the fix. 3. Verify the test passes. 4.
    Name the test with the bug ID or description.
  severity: high
  technologies:
    lang: [python]
    framework: [pytest]
  domains: [testing, quality]
  example_good: "def test_bug_167_exec_daemon_writes_files():\n    \"\"\"Regression: daemon agents were not writing files\
    \ to disk.\"\"\"\n    result = execute_agent_task(task=\"CREATE_FILE\", ...)\n    assert Path(result[\"evidence_paths\"\
    ][0]).exists()\n"
  example_bad: |
    # Bug #167 fixed — no regression test added
    # 3 months later, same bug reintroduced by refactor
    # No test to catch it — discovered again in production
  when_applies: Projects using pytest or Python codebases
  when_not_applies: projects not using pytest or Python
  sources: ["https://docs.pytest.org/en/stable/how-to/assert.html"]
- id: CR-TEST-010
  text: Mock at the boundary, not in the middle — mock external services, not internal functions.
  why: Over-mocking internal functions means you're testing the mock, not the code. Mock the HTTP client, not the function
    that calls the HTTP client.
  how_to_do_right: 'Mock at the I/O boundary: HTTP clients, database connections, file system, time. Let internal logic run
    for real.'
  severity: medium
  technologies:
    lang: [python]
    framework: [pytest]
  domains: [testing, quality]
  example_good: |
    def test_fetch_user(mocker):
        mocker.patch('httpx.get', return_value=Mock(json=lambda: {"name": "Alice"}))
        user = fetch_and_process_user(1)  # Internal logic runs for real
        assert user.name == "Alice"
  example_bad: |
    def test_fetch_user(mocker):
        mocker.patch('myapp.process_user', return_value=User(name="Alice"))
        user = fetch_and_process_user(1)  # Mocked internal function — not testing real logic
        assert user.name == "Alice"
  when_applies: Projects using pytest or Python codebases
  when_not_applies: projects not using pytest or Python
  sources: ["https://martinfowler.com/articles/practical-test-pyramid.html", "https://docs.pytest.org/en/stable/how-to/monkeypatch.html"]
- id: CR-TEST-011
  text: Coverage measures lines touched, not correctness. 100% coverage with zero assertions tests nothing.
  why: Coverage is necessary but not sufficient. A test that calls a function without asserting anything achieves coverage
    but catches no bugs.
  how_to_do_right: Target 90% line coverage as a minimum. Use mutation testing to measure assertion quality. Review coverage
    of error paths, not just happy paths.
  severity: medium
  technologies:
    lang: [python]
    framework: [pytest]
  domains: [testing, quality]
  example_good: |
    def test_divide():
        assert divide(10, 2) == 5.0
        with pytest.raises(ZeroDivisionError):
            divide(10, 0)  # Error path covered WITH assertion
  example_bad: |
    def test_divide():
        divide(10, 2)   # 100% coverage — but asserts nothing!
        divide(10, 0)   # Raises exception — test crashes, not intentional
  when_applies: Projects using pytest or Python codebases
  when_not_applies: projects not using pytest or Python
  sources: ["https://coverage.readthedocs.io/en/latest/", "https://martinfowler.com/articles/practical-test-pyramid.html"]
- id: CR-TEST-012
  text: Performance-sensitive operations should have benchmark tests with explicit thresholds.
  why: Without benchmarks, performance regressions go unnoticed until production. A query that was 10ms becomes 500ms after
    a refactor.
  how_to_do_right: Use pytest-benchmark for timing. Set explicit thresholds. Fail the test if the operation exceeds the threshold.
  severity: low
  technologies:
    lang: [python]
    framework: [pytest]
  domains:
    domain: [testing, performance]
  example_good: |
    def test_query_performance(benchmark):
        result = benchmark(lambda: db.query(User).filter_by(active=True).all())
        assert benchmark.stats["mean"] < 0.05  # Must complete in <50ms
  example_bad: |
    def test_query():
        users = db.query(User).filter_by(active=True).all()
        assert len(users) > 0  # No performance check — 5s query goes unnoticed
  when_applies: Projects using pytest or Python codebases
  when_not_applies: exploratory prototypes, one-off scripts, or spike investigations. projects not using pytest or Python
  sources: ["https://docs.pytest.org/en/stable/how-to/fixtures.html#using-marks-with-parametrized-fixtures"]
- id: CR-TEST-013
  text: Use @pytest.mark.parametrize for testing multiple inputs with the same logic.
  why: Copy-pasting the same test with different values creates maintenance burden and makes it hard to see what cases are
    covered.
  how_to_do_right: Identify the varying inputs and expected outputs. Use parametrize for data-driven tests. Name the parameters
    for readable test IDs.
  severity: low
  technologies:
    lang: [python]
    framework: [pytest]
  domains: [testing, quality]
  example_good: |
    @pytest.mark.parametrize("email,valid", [
        ("user@example.com", True),
        ("invalid", False),
        ("", False),
        ("a@b.c", True),
    ])
    def test_email_validation(email, valid):
        assert is_valid_email(email) == valid
  example_bad: |
    def test_valid_email():
        assert is_valid_email("user@example.com")
    def test_invalid_email():
        assert not is_valid_email("invalid")
    # Copy-paste for each case — 4 functions instead of 1 parametrized
  when_applies: Projects using pytest or Python codebases
  when_not_applies: projects not using pytest or Python
  sources: ["https://docs.pytest.org/en/stable/how-to/parametrize.html"]
- id: CR-TEST-CONC-001
  text: >
    Test concurrency hazards explicitly using asyncio.gather with deliberately
    interleaved operations — concurrent financial operations must be tested for
    race conditions on shared state, not just correctness in sequential execution.
  why: >
    A function that passes all sequential tests may have critical race conditions under
    concurrent load. Two simultaneous withdrawals from the same account can both read
    the same balance, both pass the "sufficient funds" check, and both deduct — resulting
    in a negative balance. This is the classic TOCTOU (Time-Of-Check-Time-Of-Use) race.
    asyncio.gather() triggers exactly this scenario in tests. Production incidents caused
    by untested concurrency cost millions: a fintech startup's concurrent withdrawal bug
    was exploited for $150K before detection. Unit tests that only run operations
    sequentially give false confidence.
  how_to_do_right: |
    1. Use asyncio.gather() to run multiple coroutines simultaneously in tests
    2. Test the exact race condition scenario:
       - Launch N concurrent operations on the same resource
       - Assert final state is consistent (no oversell, no negative balance)
    3. For threading: use threading.Barrier to synchronize start time
    4. Run concurrency tests multiple times (they may be non-deterministic):
       @pytest.mark.parametrize("_", range(10)) to run 10 times
    5. Use asyncio.sleep(0) in production code to yield to other coroutines
       at critical points — this makes races detectable in tests
    6. For database tests: use separate connections per concurrent operation
       (shared connection serializes — misses real concurrency)
  severity: critical
  technologies:
    lang: [python]
    framework: [pytest, asyncio, fastapi]
    library: [pytest-asyncio]
  domains:
    domain: [testing, security]
    concern: [concurrency, race_conditions, financial]
  example_good: |
    import asyncio
    import pytest
    from decimal import Decimal

    @pytest.mark.asyncio
    @pytest.mark.parametrize("_", range(5))  # Run 5 times for determinism
    async def test_concurrent_withdrawal_no_race(db_pool, _):
        """Concurrent withdrawals must not overdraw the account."""
        account_id = await create_account(db_pool, balance=Decimal("100.00"))

        # Launch 10 concurrent withdrawals of $20 each (total: $200 > $100 balance)
        results = await asyncio.gather(
            *[withdraw(db_pool, account_id, Decimal("20.00")) for _ in range(10)],
            return_exceptions=True  # Don't stop on first failure
        )

        successes = [r for r in results if not isinstance(r, Exception)]
        assert len(successes) <= 5, f"Too many successes: {len(successes)}"

        final_balance = await get_balance(db_pool, account_id)
        assert final_balance >= Decimal("0.00"), f"Negative balance: {final_balance}"
  example_bad: |
    async def test_withdrawal_sequential():
        account_id = await create_account(balance=Decimal("100.00"))
        result1 = await withdraw(account_id, Decimal("20.00"))
        result2 = await withdraw(account_id, Decimal("20.00"))
        assert await get_balance(account_id) == Decimal("60.00")
        # PASSES — but concurrent withdrawals may still overdraw account
  when_applies: Any system with concurrent operations on shared financial state
  when_not_applies: purely sequential single-threaded systems, read-only operations
  sources:
    - "https://docs.python.org/3/library/asyncio-task.html#asyncio.gather"
    - "https://hypothesis.readthedocs.io/en/latest/stateful.html"
- id: CR-TEST-PROP-001
  text: >
    Use Hypothesis with financial invariants for prediction market and trading systems —
    define properties like "pool balance is always non-negative", "sum of all positions
    equals total invested", and "price always sums to 1.0" and let Hypothesis find
    the inputs that violate them.
  why: >
    Property-based testing found a bug in Python's datetime module undiscovered for
    15 years. For financial systems, invariants are precise and testable: LMSR market
    prices must always sum to 1.0, a trade cannot produce negative pool balance, fee
    cannot exceed principal. Hand-crafting examples misses the boundary cases Hypothesis
    finds automatically. Hypothesis generates thousands of inputs including edge cases
    developers don't think of: zero amounts, maximum Decimal precision, negative fees,
    simultaneous buy/sell. The shrinking algorithm produces the minimal reproducing
    case, making debugging trivial.
  how_to_do_right: |
    1. Identify invariants: properties that MUST hold for ALL valid inputs
       - sum(prices) == 1.0 for all prediction market outcomes
       - fee >= 0 AND fee <= amount for all amounts > 0
       - pool.balance >= 0 after any sequence of valid trades
    2. Use st.decimals(min_value=0, max_value=1_000_000, places=8) for amounts
    3. Use hypothesis.stateful.RuleBasedStateMachine for stateful invariants
    4. Settings: max_examples=500 for CI, max_examples=2000 for nightly
    5. Suppress known non-invariant exceptions with assume() not try/except
  severity: high
  technologies:
    lang: [python]
    framework: [pytest]
    library: [hypothesis]
  domains:
    domain: [testing, fintech]
    concern: [property_based_testing, financial_invariants]
  example_good: |
    from hypothesis import given, settings, assume, strategies as st
    from hypothesis.stateful import RuleBasedStateMachine, rule, invariant
    from decimal import Decimal

    @given(st.decimals(min_value="0.01", max_value="1000000", places=8))
    @settings(max_examples=500)
    def test_fee_bounds(amount: Decimal):
        fee = calculate_fee(amount)
        assert Decimal("0") <= fee <= amount, \
            f"Fee {fee} out of bounds for amount {amount}"

    class LMSRMarketMachine(RuleBasedStateMachine):
        def __init__(self):
            super().__init__()
            self.market = LMSRMarket(b=50, outcomes=2)

        @rule(amount=st.decimals(min_value="0.01", max_value="1000", places=2),
              outcome=st.integers(min_value=0, max_value=1))
        def buy(self, amount: Decimal, outcome: int):
            assume(self.market.pool_balance >= amount)
            self.market.buy(outcome, amount)

        @invariant()
        def prices_sum_to_one(self):
            total = sum(self.market.get_price(i) for i in range(2))
            assert abs(total - Decimal("1.0")) < Decimal("0.0001"), \
                f"Prices sum to {total}, not 1.0"

        @invariant()
        def pool_balance_non_negative(self):
            assert self.market.pool_balance >= 0

    TestLMSRMarket = LMSRMarketMachine.TestCase
  example_bad: |
    def test_lmsr_prices():
        market = LMSRMarket(b=50, outcomes=2)
        market.buy(0, Decimal("100"))
        market.buy(1, Decimal("50"))
        prices = [market.get_price(i) for i in range(2)]
        assert abs(sum(prices) - 1.0) < 0.001  # Only tests these specific values
        # Hypothesis would test: amount=0.000001, 999999.99, 1000 sequential trades
  when_applies: Financial calculation modules, prediction markets, trading engines, fee calculators
  when_not_applies: simple CRUD, UI rendering, non-numerical business logic
  sources:
    - "https://hypothesis.readthedocs.io/en/latest/stateful.html"
    - "https://hypothesis.works/articles/what-is-property-based-testing/"
    - "https://hypothesis.readthedocs.io/en/latest/"
- id: CR-TEST-STRIPE-001
  text: >
    Test Stripe webhook handlers using stripe.WebhookSignature.generate_header()
    with real construct_event() — never mock signature verification. The signature
    check IS the security contract and must be tested with valid cryptographic payloads.
  why: >
    Stripe webhooks must verify signatures to prevent replay attacks and forged events.
    Mocking stripe.construct_event() in tests defeats this: you may ship a handler
    that processes events without validating the signature (an attacker sends a fake
    "payment succeeded" event and gets order fulfillment without payment). The correct
    approach generates a valid test signature and calls construct_event() with it —
    testing the real code path including crypto verification. This pattern is from
    Stripe's own testing documentation.
  how_to_do_right: |
    1. Generate valid header: stripe.WebhookSignature.generate_header(
           payload=json_payload, secret=TEST_WEBHOOK_SECRET, timestamp=int(time.time()))
    2. Call construct_event() with real payload + generated header + secret
    3. NEVER mock construct_event() — it bypasses the security check
    4. Test invalid signatures: verify handler returns 400, not 200
    5. Test replayed events (old timestamp): verify they are rejected
    6. Store TEST_WEBHOOK_SECRET in test config (not the real production secret)
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi, flask, pytest]
    library: [stripe]
  domains:
    domain: [testing, fintech, security]
    concern: [webhooks, payments, signature_verification]
  example_good: |
    import json
    import time
    import stripe
    import pytest

    TEST_WEBHOOK_SECRET = "whsec_test_only_not_real"

    def make_stripe_request(client, payload: dict):
        json_payload = json.dumps(payload)
        header = stripe.WebhookSignature.generate_header(
            payload=json_payload,
            secret=TEST_WEBHOOK_SECRET,
            timestamp=int(time.time()),
        )
        return client.post(
            "/webhooks/stripe",
            content=json_payload,
            headers={"stripe-signature": header},
        )

    def test_payment_fulfilled(client, db):
        payload = {
            "type": "payment_intent.succeeded",
            "data": {"object": {"id": "pi_test", "metadata": {"order_id": "ord_1"}}},
        }
        response = make_stripe_request(client, payload)
        assert response.status_code == 200
        assert db.query(Order).filter_by(id="ord_1").first().status == "fulfilled"

    def test_invalid_signature_rejected(client):
        response = client.post(
            "/webhooks/stripe",
            json={"type": "payment_intent.succeeded"},
            headers={"stripe-signature": "invalid"},
        )
        assert response.status_code == 400
  example_bad: |
    def test_payment_succeeded(client, mocker):
        mocker.patch(
            "stripe.Webhook.construct_event",
            return_value={"type": "payment_intent.succeeded", "data": {...}}
        )
        # Mocked — if signature check is removed from production code,
        # this test still passes. Security check is invisible to the test suite.
        response = client.post("/webhooks/stripe", json={...})
        assert response.status_code == 200
  when_applies: Any project using Stripe webhooks for payment processing
  when_not_applies: projects not using Stripe, non-payment webhook handlers
  sources:
    - "https://stripe.com/docs/webhooks/signatures"
    - "https://stripe.com/docs/webhooks/build-a-webhook-endpoint"
- id: CR-TEST-EVENTSOURCE-001
  text: >
    Test event-sourced systems by replaying the full event log and asserting final
    state — the determinism property means the same events must ALWAYS produce the
    same state. Any non-determinism embedded in events is a correctness bug.
  why: >
    Event sourcing's core promise is determinism: given the same sequence of events,
    you always reconstruct the same state. If replaying events produces different
    results, the aggregate is broken. Common causes: aggregate reads current time
    during apply(), UUIDs generated inside apply() differ on replay, external calls
    inside apply(). These bugs manifest as phantom orders, inconsistent balances after
    restores, and audit trail discrepancies — catastrophic in financial systems.
  how_to_do_right: |
    1. Apply a sequence of events to aggregate, save state_1
    2. Apply the SAME events from scratch, save state_2
    3. Assert state_1 == state_2 (full determinism check)
    4. Fix non-determinism: use event.occurred_at instead of datetime.now() in apply()
    5. Fix UUID non-determinism: derive IDs from event data, not uuid4()
    6. Remove ALL external calls from apply() methods — apply() must be pure
    7. Use Hypothesis to generate random event sequences and test replay
  severity: critical
  technologies:
    lang: [python]
    framework: [pytest]
    library: [hypothesis]
  domains:
    domain: [testing, architecture]
    concern: [event_sourcing, determinism, financial]
  example_good: |
    def test_order_aggregate_replay_determinism():
        events = [
            OrderCreated(order_id="ord-1", amount=Decimal("100.00"),
                        occurred_at=datetime(2026, 1, 1, 12, 0, 0)),
            OrderFilled(order_id="ord-1", fill_price=Decimal("99.50"),
                       occurred_at=datetime(2026, 1, 1, 12, 1, 0)),
        ]

        aggregate1 = OrderAggregate()
        for event in events:
            aggregate1.apply(event)

        aggregate2 = OrderAggregate()
        for event in events:
            aggregate2.apply(event)

        assert aggregate1.to_dict() == aggregate2.to_dict(), \
            "Replay produced different state — non-determinism bug"
  example_bad: |
    class OrderAggregate:
        def apply(self, event):
            if isinstance(event, OrderCreated):
                self.created_at = datetime.now()  # BUG: uses current time, not event time
                self.id = uuid.uuid4()             # BUG: new UUID each replay
                # Replaying same events produces different created_at, id each time
  when_applies: Event-sourced systems, CQRS architectures, financial audit trails
  when_not_applies: CRUD applications without event sourcing, stateless services
  sources:
    - "https://martinfowler.com/eaaDev/EventSourcing.html"
    - "https://hypothesis.readthedocs.io/en/latest/stateful.html"
