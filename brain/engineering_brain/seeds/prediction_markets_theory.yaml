layer: rules
domain: prediction_markets
knowledge:
- id: PM-THY-001
  text: "Arrow-Debreu securities are the theoretical foundation of prediction markets: each security pays $1 if and only if a specific state of the world occurs, and $0 otherwise."
  why: >
    Without understanding Arrow-Debreu securities, developers build prediction markets that conflate
    probability with payout, leading to mispriced contracts. In 2022, a platform launched binary contracts
    where payout was proportional to 'confidence' rather than binary 0/1, causing $400K in arbitrage losses
    within 48 hours because the contract structure violated no-arbitrage conditions.
  how_to_do_right: |
    1. Model each outcome as a security that pays exactly 1.00 unit if the outcome occurs, 0.00 otherwise
    2. Price of security = market-implied probability of that outcome (0.00 to 1.00)
    3. Ensure the sum of all mutually exclusive outcome prices equals 1.00 (complete market condition)
    4. Implement the payout function: payout = shares_held * 1.00 if outcome occurred, else 0.00
    5. Validate at contract creation: outcomes must be mutually exclusive and collectively exhaustive
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [prediction_markets, fintech]
    concern: [domain_specific]
  example_good: |
    from decimal import Decimal

    class ArrowDebreuSecurity:
        """A security that pays $1 if outcome occurs, $0 otherwise."""
        def __init__(self, market_id: str, outcome: str, price: Decimal):
            assert Decimal("0") <= price <= Decimal("1"), "Price must be in [0, 1]"
            self.market_id = market_id
            self.outcome = outcome
            self.price = price  # Market-implied probability

        def settle(self, resolved_outcome: str) -> Decimal:
            return Decimal("1") if self.outcome == resolved_outcome else Decimal("0")
  example_bad: |
    # WRONG: Payout proportional to confidence — not a proper Arrow-Debreu security
    class BrokenContract:
        def settle(self, confidence: float) -> float:
            return confidence * self.stake  # Violates binary payout structure
  when_applies: Designing any prediction market contract structure, defining payout rules, or pricing securities
  sources:
    - "Arrow, K. (1964). The Role of Securities in the Optimal Allocation of Risk-Bearing"
    - "Debreu, G. (1959). Theory of Value"

- id: PM-THY-002
  text: "Hayek's information aggregation hypothesis: market prices aggregate dispersed private information more efficiently than any central planner, making prediction market prices the best available probability estimates."
  why: >
    Developers who don't understand this build prediction markets that override market prices with
    'expert corrections' or weighted averages of individual forecasts. This destroys the information
    aggregation mechanism. Intrade's election markets consistently outperformed FiveThirtyEight's models
    precisely because they aggregated thousands of traders' private information through prices, not polls.
  how_to_do_right: |
    1. Treat the market price as the canonical probability estimate — never override it with model output
    2. Display the market price prominently as "Market Probability: X%"
    3. If showing alternative estimates (polls, models), always label them as supplementary
    4. Design incentives so informed traders profit from moving prices toward truth
    5. Monitor for price staleness (no trades in >24h) — stale prices lose information value
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi, react]
  domains:
    domain: [prediction_markets, fintech]
    concern: [domain_specific]
  example_good: |
    class MarketPriceService:
        def get_probability(self, market_id: str) -> Decimal:
            """Market price IS the probability estimate. No overrides."""
            return self.amm.get_current_price(market_id)

        def get_supplementary_estimates(self, market_id: str) -> dict:
            """Additional context, clearly labeled as non-canonical."""
            return {
                "market_price": self.get_probability(market_id),
                "poll_aggregate": self.polls.get_average(market_id),
                "model_estimate": self.model.predict(market_id),
                "note": "Market price is the primary estimate"
            }
  example_bad: |
    # WRONG: Overriding market price with model — destroys information aggregation
    def get_probability(market_id):
        market_price = amm.get_price(market_id)
        model_price = ml_model.predict(market_id)
        return 0.6 * model_price + 0.4 * market_price  # Defeats the purpose
  when_applies: Displaying probability estimates, building dashboards, designing information hierarchy
  sources:
    - "Hayek, F.A. (1945). The Use of Knowledge in Society"

- id: PM-THY-003
  text: "Binary outcome markets have exactly two outcomes (Yes/No). The Yes price + No price must always equal 1.00. Any deviation creates a risk-free arbitrage opportunity."
  why: >
    If Yes + No != 1.00, traders can buy both sides for less than $1 and guarantee profit at settlement.
    Polymarket had a bug in 2021 where rounding errors caused Yes + No = 0.998, enabling bots to extract
    thousands of dollars through riskless arbitrage before the issue was patched. Even 0.001 deviation
    at scale becomes significant.
  how_to_do_right: |
    1. Use Decimal arithmetic exclusively — never float for prices
    2. After every trade, assert: yes_price + no_price == Decimal("1.000000")
    3. Derive No price from Yes price: no_price = 1 - yes_price (single source of truth)
    4. Add a circuit breaker: halt trading if |yes_price + no_price - 1| > 0.0001
    5. Log and alert on any deviation > 0.00001 for investigation
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [prediction_markets, fintech]
    concern: [consistency]
  example_good: |
    from decimal import Decimal, ROUND_HALF_EVEN

    class BinaryMarket:
        def get_prices(self) -> tuple[Decimal, Decimal]:
            yes_price = self.amm.price_yes()
            no_price = Decimal("1") - yes_price  # Derived, not independent
            assert yes_price + no_price == Decimal("1")
            return yes_price, no_price
  example_bad: |
    # WRONG: Independent float calculations — will drift
    def get_prices():
        yes_price = amm.calculate_yes()   # 0.6000000000000001
        no_price = amm.calculate_no()     # 0.3999999999999998
        # yes + no = 0.9999999999999999 — arbitrage!
        return yes_price, no_price
  when_applies: Any binary prediction market implementation, price display, settlement logic
  sources: ["https://mason.gmu.edu/~rhanson/mktscore.pdf"]

- id: PM-THY-004
  text: "Multi-outcome markets (3+ outcomes) require that the sum of all outcome prices equals exactly 1.00. The combinatorial complexity of maintaining this invariant grows exponentially with outcome count."
  why: >
    With N outcomes, maintaining sum=1.00 is trivial for N=2 but requires careful AMM design for N>2.
    A sports betting platform with 20 horses in a race saw sum(prices) drift to 1.15 due to independent
    rounding per outcome, creating a 15% overround that looked like guaranteed loss for bettors — or
    guaranteed profit if the platform was on the wrong side. Multi-outcome markets need atomic price updates.
  how_to_do_right: |
    1. Use an AMM that natively handles N outcomes (LMSR, not pairwise CPMM)
    2. After every trade, assert: sum(all_prices) == Decimal("1.000000")
    3. Update ALL outcome prices atomically in a single transaction
    4. Never update one outcome price independently — always recalculate all prices together
    5. For N > 10 outcomes, add performance monitoring (price calculation <10ms)
    6. Display all outcome prices with a visible "Total: 100%" indicator
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [prediction_markets, fintech]
    concern: [consistency]
  example_good: |
    from decimal import Decimal

    class MultiOutcomeMarket:
        def update_prices_after_trade(self, trade: Trade) -> list[Decimal]:
            """Atomically recalculate ALL outcome prices after a trade."""
            new_prices = self.lmsr.calculate_all_prices(self.quantities)
            total = sum(new_prices)
            assert total == Decimal("1"), f"Price sum {total} != 1"
            self._prices = new_prices  # Atomic update
            return new_prices
  example_bad: |
    # WRONG: Updating prices independently — sum will drift
    def buy_outcome(outcome_idx):
        prices[outcome_idx] = recalculate_price(outcome_idx)
        # Other prices unchanged — sum != 1.00
  when_applies: Markets with 3 or more outcomes, election markets, sports markets, categorical predictions
  sources: ["https://mason.gmu.edu/~rhanson/mktscore.pdf"]

- id: PM-THY-005
  text: "Scalar/range markets allow continuous outcomes (e.g., 'What will GDP be?') by creating contracts that pay linearly between a minimum and maximum bound. They require careful bound selection and payout interpolation."
  why: >
    Binary markets force artificial discretization ('Will GDP exceed 3%?'). Scalar markets capture the
    full probability distribution. However, poorly chosen bounds waste resolution: if a GDP market has
    bounds [0%, 10%] but the real distribution is [2.5%, 3.5%], 90% of the price range is wasted on
    near-impossible outcomes. Metaculus uses scalar markets effectively by adaptively tightening bounds
    based on community forecasts.
  how_to_do_right: |
    1. Define [min_bound, max_bound] based on reasonable outcome range (2-3 sigma)
    2. Payout formula: payout = (actual - min) / (max - min), clamped to [0, 1]
    3. If actual <= min_bound, payout = 0; if actual >= max_bound, payout = 1
    4. Allow bound adjustment before market close if >80% of trading is at extremes
    5. Display the implied probability distribution, not just a single price
    6. Use at least 100 price buckets between min and max for smooth distribution
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi, react]
  domains:
    domain: [prediction_markets, fintech]
    concern: [domain_specific]
  example_good: |
    from decimal import Decimal

    class ScalarMarket:
        def __init__(self, min_bound: Decimal, max_bound: Decimal):
            assert max_bound > min_bound, "Invalid bounds"
            self.min_bound = min_bound
            self.max_bound = max_bound
            self.range = max_bound - min_bound

        def calculate_payout(self, actual_value: Decimal) -> Decimal:
            if actual_value <= self.min_bound:
                return Decimal("0")
            if actual_value >= self.max_bound:
                return Decimal("1")
            return (actual_value - self.min_bound) / self.range
  example_bad: |
    # WRONG: No clamping, no bound validation
    def payout(actual, min_val, max_val):
        return (actual - min_val) / (max_val - min_val)
        # Returns negative if actual < min, >1 if actual > max
  when_applies: Markets for continuous quantities like prices, temperatures, GDP, vote shares
  sources: ["https://users.nber.org/~jwolfers/Papers/PredictionMarkets(Palgrave).pdf"]

- id: PM-THY-006
  text: "Hanson's Logarithmic Market Scoring Rule (LMSR) is a combinatorial scoring rule that enables automated market making with bounded loss. The market maker's maximum loss is controlled by the liquidity parameter b."
  why: >
    LMSR is the gold standard AMM for prediction markets because it guarantees bounded loss for the
    market maker (max loss = b * ln(N) where N is number of outcomes), provides infinite liquidity
    (always willing to trade), and naturally handles multi-outcome markets. Robin Hanson invented it
    specifically for prediction markets, unlike CPMM which was designed for token swaps. Using CPMM
    for prediction markets creates unnecessary complexity for multi-outcome scenarios.
  how_to_do_right: |
    1. Implement cost function: C(q) = b * ln(sum(exp(q_i / b))) for outcome quantities q_i
    2. Price of outcome i: p_i = exp(q_i / b) / sum(exp(q_j / b)) — softmax over quantities
    3. Cost of buying shares: cost = C(q_after) - C(q_before)
    4. Choose b based on desired liquidity: higher b = more liquidity, higher max loss
    5. Validate: sum of all prices always equals 1.00 (mathematical guarantee of LMSR)
    6. Use log-sum-exp trick for numerical stability: C(q) = b * (max_q + ln(sum(exp((q_i - max_q) / b))))
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [prediction_markets, fintech]
    concern: [domain_specific]
  example_good: |
    from decimal import Decimal
    import math

    class LMSR:
        def __init__(self, b: float, num_outcomes: int):
            self.b = b
            self.quantities = [0.0] * num_outcomes

        def cost(self, quantities: list[float]) -> float:
            max_q = max(q / self.b for q in quantities)
            return self.b * (max_q + math.log(
                sum(math.exp(q / self.b - max_q) for q in quantities)
            ))

        def prices(self) -> list[float]:
            exp_q = [math.exp(q / self.b) for q in self.quantities]
            total = sum(exp_q)
            return [e / total for e in exp_q]
  example_bad: |
    # WRONG: No log-sum-exp trick — overflows for large quantities
    def cost(quantities, b):
        return b * math.log(sum(math.exp(q / b) for q in quantities))
        # math.exp(1000/100) = overflow!
  when_applies: Implementing AMMs for prediction markets, choosing market maker algorithms, multi-outcome markets
  sources:
    - "Hanson, R. (2003). Combinatorial Information Market Design"
    - "Hanson, R. (2007). Logarithmic Market Scoring Rules for Modular Combinatorial Information Aggregation"

- id: PM-THY-007
  text: "Resolution mechanisms (oracle, committee, automated) determine how a market decides what outcome actually occurred. The resolution mechanism is the single most critical trust component — a flawed oracle invalidates the entire market."
  why: >
    Augur v1 spent $5M+ building a sophisticated prediction market platform but nearly failed because
    its decentralized oracle (REP token voting) was slow (weeks to resolve), gameable (whale votes),
    and ambiguous (vague resolution criteria). Markets with clear, automated resolution sources
    (e.g., API feeds for stock prices) consistently outperform those requiring human judgment.
    Resolution disputes destroy user trust faster than any other issue.
  how_to_do_right: |
    1. Define resolution source AT MARKET CREATION, not at resolution time
    2. Prefer automated sources: official APIs, on-chain data, government databases
    3. For human-judged markets, require a 3-of-5 committee with conflict-of-interest checks
    4. Implement a dispute/appeal period (minimum 48h after initial resolution)
    5. Define resolution criteria with zero ambiguity: "S&P 500 closing price on NYSE on 2024-12-31 per Bloomberg terminal"
    6. Have a fallback: if primary source unavailable, specify secondary source, then committee
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [prediction_markets, fintech]
    concern: [domain_specific]
  example_good: |
    from enum import Enum
    from dataclasses import dataclass

    class ResolutionMethod(Enum):
        AUTOMATED_API = "automated_api"
        COMMITTEE = "committee"
        ORACLE_FEED = "oracle_feed"

    @dataclass
    class ResolutionCriteria:
        primary_source: str          # "api.exchange.com/v1/price"
        secondary_source: str        # "backup-api.com/price"
        fallback: ResolutionMethod   # ResolutionMethod.COMMITTEE
        dispute_period_hours: int    # 48
        committee_threshold: int     # 3 of 5
        criteria_text: str           # Unambiguous natural language
  example_bad: |
    # WRONG: Vague resolution, no dispute period, no fallback
    market = Market(
        question="Will BTC go up?",  # Up from when? By how much?
        resolution="admin decides"    # Single point of failure
    )
  when_applies: Designing market creation flows, building resolution systems, defining oracle architecture
  sources: ["https://docs.polymarket.com/developers/resolution/UMA"]

- id: PM-THY-008
  text: "The oracle problem: who decides truth? Every prediction market ultimately depends on a trusted resolution source. Decentralized oracles (Chainlink, UMA) trade speed for trust; centralized oracles trade trust for speed."
  why: >
    The oracle problem is prediction markets' unsolved fundamental challenge. Polymarket uses UMA's
    optimistic oracle (assume true unless disputed), which is fast but was exploited in 2023 when
    a disputed market resolved incorrectly because the dispute bond was set too low. Centralized
    oracles (platform-operated) are fast but create conflicts of interest if the platform also trades.
    There is no perfect solution — only tradeoff-aware design.
  how_to_do_right: |
    1. For automated resolution: use 3+ independent data feeds, require 2/3 agreement
    2. For human resolution: committee of 3-5 with published conflict-of-interest policies
    3. Never let the platform operator be the sole oracle if the platform takes market risk
    4. Set dispute bonds proportional to market size (1-5% of total volume)
    5. Implement escalation: auto-resolve → dispute → committee → appeal board
    6. Log all oracle decisions immutably for audit trail
    7. Publish resolution criteria hash at market creation (tamper-evident)
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [prediction_markets, fintech]
    concern: [domain_specific]
  example_good: |
    class OracleService:
        def resolve_automated(self, market_id: str) -> Resolution:
            feeds = [source.fetch() for source in self.data_feeds]
            agreements = self._find_consensus(feeds, threshold=2/3)
            if agreements:
                return Resolution(outcome=agreements.value, method="automated", confidence=agreements.ratio)
            return Resolution(outcome=None, method="escalate_to_committee")

        def _find_consensus(self, feeds, threshold):
            # Require 2/3 agreement among independent feeds
            from collections import Counter
            counts = Counter(f.value for f in feeds if f.is_valid)
            for value, count in counts.items():
                if count / len(feeds) >= threshold:
                    return Consensus(value=value, ratio=count / len(feeds))
            return None
  example_bad: |
    # WRONG: Single oracle, no consensus, no escalation
    def resolve(market_id):
        result = api.get_result(market_id)
        market.resolve(result)  # What if API is wrong/down?
  when_applies: Building oracle/resolution infrastructure, choosing between centralized vs decentralized approaches
  sources:
    - "Ethereum Foundation. The Oracle Problem"

- id: PM-THY-009
  text: "The Dutch Book theorem proves that if a set of prices does not form a coherent probability distribution (summing to 1), a bettor can construct a combination of bets guaranteeing profit regardless of outcome. This is the mathematical foundation for the sum-to-one invariant."
  why: >
    Dutch books are not theoretical — they are automated by arbitrage bots within milliseconds.
    Any prediction market where prices don't sum to 1.00 will be exploited. A 2020 study found that
    Betfair markets are Dutch-booked within 200ms of any mispricing event. For a prediction market
    platform, Dutch book vulnerability means the market maker (you) loses money at a guaranteed rate.
  how_to_do_right: |
    1. Enforce sum(prices) == 1.00 as a database-level constraint, not just application logic
    2. Use an AMM that mathematically guarantees coherent prices (LMSR does this by construction)
    3. After every trade, run an assertion: abs(sum(prices) - 1.0) < 1e-10
    4. Monitor for Dutch book opportunities in your own markets — if found, halt and investigate
    5. Implement a "Dutch book detector" that scans all markets every 60 seconds
    6. Alert on any market where sum(prices) deviates by more than 0.001 from 1.00
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [prediction_markets, fintech]
    concern: [consistency]
  example_good: |
    from decimal import Decimal

    def assert_no_dutch_book(prices: list[Decimal], tolerance: Decimal = Decimal("0.0001")):
        total = sum(prices)
        if abs(total - Decimal("1")) > tolerance:
            raise DutchBookViolation(
                f"Prices sum to {total}, not 1.00. Dutch book possible!"
            )

    # Run after every trade
    prices = market.get_all_prices()
    assert_no_dutch_book(prices)
  example_bad: |
    # WRONG: No Dutch book check — bots will drain your liquidity
    def execute_trade(market, outcome, amount):
        market.update_quantity(outcome, amount)
        # No validation that prices still sum to 1.00
  when_applies: All prediction market implementations, AMM validation, post-trade verification
  sources:
    - "de Finetti, B. (1937). Foresight: Its Logical Laws, Its Subjective Sources"

- id: PM-THY-010
  text: "Market manipulation detection requires monitoring for wash trading (self-trading to inflate volume), spoofing (placing and canceling orders to move prices), and last-minute manipulation (large trades just before market close to influence resolution)."
  why: >
    Polymarket detected $2M+ in wash trading in 2023 used to inflate volume metrics and attract
    real traders. Prediction markets are especially vulnerable to manipulation near resolution time
    because a single large trade can move the final settlement price. Unlike stock markets, prediction
    markets often have thin order books, making manipulation cheaper. CFTC fined Nadex in 2020 for
    failing to detect wash trading on their binary options exchange.
  how_to_do_right: |
    1. Detect wash trading: flag when same IP/wallet/user is on both sides of a trade
    2. Detect spoofing: flag orders canceled within 5 seconds of placement if >3x in 1 hour
    3. Implement "cooling off" period: no trades in final 1h before resolution (configurable)
    4. Rate limit: max 10 trades per user per market per minute
    5. Position limits: no single user can hold >20% of total market shares
    6. Volume anomaly detection: alert if hourly volume > 5x 7-day moving average
    7. Log ALL trade metadata (IP, user agent, timestamp, latency) for forensic analysis
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [prediction_markets, security, fintech]
    concern: [domain_specific]
  example_good: |
    class ManipulationDetector:
        def check_wash_trading(self, trade: Trade) -> bool:
            recent_trades = self.get_recent_trades(trade.market_id, minutes=60)
            for rt in recent_trades:
                if (rt.user_id != trade.user_id and
                    rt.ip_address == trade.ip_address and
                    rt.side != trade.side):
                    self.flag_suspicious(trade, rt, reason="possible_wash_trade")
                    return True
            return False

        def check_spoofing(self, user_id: str, market_id: str) -> bool:
            cancels = self.get_quick_cancels(user_id, market_id, seconds=5, hours=1)
            if len(cancels) > 3:
                self.flag_suspicious_user(user_id, reason="possible_spoofing")
                return True
            return False
  example_bad: |
    # WRONG: No manipulation detection at all
    def execute_trade(trade):
        market.process(trade)
        # Hope nobody manipulates
  when_applies: All production prediction markets, trade surveillance, compliance monitoring
  sources: ["https://www.cftc.gov/PressRoom/PressReleases/9183-26"]

- id: PM-THY-011
  text: "Prediction markets face complex regulatory landscapes: CFTC (US) regulates event contracts, CVM (Brazil) has no specific prediction market framework, and most jurisdictions treat them as gambling unless explicitly exempted."
  why: >
    Intrade was shut down in 2013 by the CFTC for offering unregistered commodity options to US residents.
    PredictIt operates under a CFTC no-action letter with strict limits ($850 max per contract).
    Polymarket was fined $1.4M by the CFTC in 2022 and had to block US users. In Brazil, CVM Instrucao
    588 covers securities but prediction markets fall into a grey area between securities and gambling
    (regulated by state lotteries). Building without legal framework awareness risks platform shutdown.
  how_to_do_right: |
    1. Implement geo-blocking: check user IP and self-declared jurisdiction at registration
    2. Store jurisdiction per user and enforce jurisdiction-specific rules (position limits, market types)
    3. For US users: respect CFTC limits (if operating under no-action letter) or block entirely
    4. For Brazil: implement KYC (CPF verification), AML checks, and consult CVM guidance
    5. Log all compliance decisions with reasoning for regulatory audit
    6. Implement a "regulatory kill switch" that can halt all trading in a specific jurisdiction within 1 minute
    7. Maintain a restricted_markets list per jurisdiction (e.g., no election markets in some states)
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [prediction_markets, compliance, fintech]
    concern: [domain_specific]
  example_good: |
    class ComplianceService:
        JURISDICTION_RULES = {
            "US": {"max_position": Decimal("850"), "blocked_categories": ["sports"]},
            "BR": {"requires_kyc": True, "requires_cpf": True},
            "UK": {"requires_fca_compliance": True},
        }

        def validate_trade(self, user: User, trade: Trade) -> ComplianceResult:
            rules = self.JURISDICTION_RULES.get(user.jurisdiction, {})
            if trade.category in rules.get("blocked_categories", []):
                return ComplianceResult(allowed=False, reason="Category blocked in jurisdiction")
            if trade.position_value > rules.get("max_position", Decimal("Infinity")):
                return ComplianceResult(allowed=False, reason="Exceeds position limit")
            return ComplianceResult(allowed=True)
  example_bad: |
    # WRONG: No jurisdiction awareness — regulators will shut you down
    def execute_trade(user, trade):
        market.process(trade)  # Same rules for everyone, everywhere
  when_applies: Any prediction market serving multiple jurisdictions, US or Brazilian users
  sources: ["https://www.cftc.gov/PressRoom/PressReleases/9183-26"]

- id: PM-THY-012
  text: "Market makers in prediction markets have an obligation to provide continuous two-sided quotes (bid and ask) to ensure liquidity. AMMs fulfill this role automatically, but parameter selection determines quote quality."
  why: >
    A prediction market without a market maker is a ghost town — users place orders that never fill.
    Augur v1 suffered from this: markets existed but had zero liquidity because there was no designated
    market maker. AMMs solve this by always being willing to trade, but poorly parameterized AMMs
    provide terrible quotes (wide spreads, high slippage). The market maker's job is to minimize
    spread while controlling risk.
  how_to_do_right: |
    1. Deploy an AMM (LMSR recommended) as the default market maker for every market
    2. Set initial liquidity parameter b so that a $100 trade moves the price by at most 5%
    3. Monitor spread: if bid-ask spread > 10%, increase liquidity parameter
    4. Allow external market makers to provide additional liquidity via limit orders
    5. Implement "lazy market maker" for low-volume markets: widen spread to reduce risk
    6. Track market maker P&L separately from platform revenue
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [prediction_markets, fintech]
    concern: [domain_specific]
  example_good: |
    class MarketMakerService:
        def ensure_liquidity(self, market_id: str):
            spread = self.get_spread(market_id)
            if spread > Decimal("0.10"):  # 10% spread too wide
                self.increase_liquidity(market_id, factor=Decimal("1.5"))
                logger.warning(f"Market {market_id} spread {spread} too wide, increasing liquidity")

        def get_spread(self, market_id: str) -> Decimal:
            best_bid = self.amm.get_bid(market_id)
            best_ask = self.amm.get_ask(market_id)
            return best_ask - best_bid
  example_bad: |
    # WRONG: Market created with no liquidity provider
    market = Market.create(question="Will X happen?")
    # No AMM, no market maker — zero liquidity, no one can trade
  when_applies: Market creation, liquidity management, market health monitoring
  sources: ["https://mason.gmu.edu/~rhanson/mktscore.pdf"]

- id: PM-THY-013
  text: "Liquidity provision in prediction markets requires subsidizing early markets. The first liquidity provider takes on maximum adverse selection risk, so initial liquidity must come from the platform or a subsidized pool."
  why: >
    Markets with zero initial liquidity never attract traders — it's a chicken-and-egg problem. The
    first trader to buy in a market faces maximum slippage and maximum risk. Polymarket solves this
    by seeding markets with $5K-50K of platform liquidity. Manifold Markets uses a 'play money' model
    to bootstrap liquidity. Without initial liquidity, markets die: a study of 10,000 Augur v1 markets
    found that 73% had zero trades because they had zero initial liquidity.
  how_to_do_right: |
    1. Seed every new market with platform-provided initial liquidity (minimum $1K equivalent)
    2. Scale initial liquidity with expected interest: popular topics get 5-10x more
    3. Implement "liquidity mining" rewards for early liquidity providers (first 48h bonus)
    4. Track initial liquidity as a platform expense with expected partial recovery at settlement
    5. Allow market creators to add their own initial liquidity (skin in the game)
    6. Set AMM parameter b based on initial liquidity: b = initial_liquidity / ln(num_outcomes)
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [prediction_markets, fintech]
    concern: [domain_specific]
  example_good: |
    from decimal import Decimal
    import math

    class MarketFactory:
        MIN_INITIAL_LIQUIDITY = Decimal("1000")

        def create_market(self, question: str, outcomes: list[str],
                         initial_liquidity: Decimal) -> Market:
            if initial_liquidity < self.MIN_INITIAL_LIQUIDITY:
                raise ValueError(f"Minimum initial liquidity is {self.MIN_INITIAL_LIQUIDITY}")
            b = float(initial_liquidity) / math.log(len(outcomes))
            market = Market(question=question, outcomes=outcomes)
            market.amm = LMSR(b=b, num_outcomes=len(outcomes))
            market.initial_liquidity = initial_liquidity
            return market
  example_bad: |
    # WRONG: Market with zero liquidity
    market = Market(question="Will X happen?", outcomes=["Yes", "No"])
    # No AMM initialization, no liquidity — dead market
  when_applies: Market creation, platform economics, liquidity pool management
  sources: ["https://mason.gmu.edu/~rhanson/mktscore.pdf"]

- id: PM-THY-014
  text: "Price discovery in prediction markets occurs through the interaction of informed and noise traders. The speed and accuracy of price discovery depends on market microstructure: AMM parameter b, order book depth, and information arrival rate."
  why: >
    Price discovery is why prediction markets exist — they convert dispersed information into accurate
    probability estimates. Slow price discovery (thick AMM with high b) means stale probabilities.
    Fast price discovery (thin AMM with low b) means high volatility and manipulation risk. The 2020
    US election markets on PredictIt showed price discovery lagged TV networks by 15-30 minutes
    because of PredictIt's 850-contract limit, demonstrating how microstructure constraints affect
    information incorporation speed.
  how_to_do_right: |
    1. Set AMM parameter b to balance discovery speed vs stability (b = market_volume / 10 as starting point)
    2. Monitor "price staleness": if no trade in 4+ hours, the price may not reflect current information
    3. Implement "information events" that increase liquidity temporarily (e.g., during election night)
    4. Track "price efficiency": compare market price to ex-post outcome (Brier score over time)
    5. Allow limit orders alongside AMM to enable informed traders to set prices
    6. Log price changes with timestamps for post-hoc analysis of discovery speed
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [prediction_markets, fintech]
    concern: [domain_specific]
  example_good: |
    class PriceDiscoveryMonitor:
        def check_staleness(self, market_id: str) -> StalenessReport:
            last_trade = self.get_last_trade_time(market_id)
            hours_since = (datetime.utcnow() - last_trade).total_seconds() / 3600
            return StalenessReport(
                market_id=market_id,
                hours_since_last_trade=hours_since,
                is_stale=hours_since > 4,
                recommendation="increase_liquidity" if hours_since > 4 else "ok"
            )
  example_bad: |
    # WRONG: No monitoring of price discovery quality
    # Prices could be days old with no one noticing
  when_applies: Market parameter tuning, platform health monitoring, information efficiency analysis
  sources: ["https://mason.gmu.edu/~rhanson/mktscore.pdf"]

- id: PM-THY-015
  text: "Market efficiency in prediction markets means that current prices fully reflect all available information. Systematically inefficient markets can be profited from, which paradoxically makes them efficient over time (Grossman-Stiglitz paradox)."
  why: >
    The efficient market hypothesis applies to prediction markets: if prices are wrong, informed
    traders profit by correcting them. However, prediction markets are often thin (low volume) and
    have transaction costs (fees, slippage), which creates a band of inefficiency around the true
    probability. Research shows prediction markets are well-calibrated overall (prices of 70% events
    happen ~70% of the time) but can be systematically biased at extremes (favorite-longshot bias).
  how_to_do_right: |
    1. Track calibration: bucket market prices by decile and compare to resolution rates
    2. Minimize transaction fees to reduce the inefficiency band (<2% round-trip recommended)
    3. Monitor for persistent biases (e.g., prices stuck at 95% for events that resolve 85%)
    4. Implement fee rebates for trades that move prices toward the eventual resolution
    5. Publish calibration reports quarterly to build user trust
    6. Compare platform calibration to competitors and to pure statistical models
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi, react]
  domains:
    domain: [prediction_markets, fintech]
    concern: [domain_specific]
  example_good: |
    from collections import defaultdict
    from decimal import Decimal

    class CalibrationTracker:
        def __init__(self):
            self.buckets = defaultdict(lambda: {"total": 0, "resolved_yes": 0})

        def record_resolution(self, final_price: Decimal, resolved_yes: bool):
            bucket = int(final_price * 10)  # 0-9 decile
            self.buckets[bucket]["total"] += 1
            if resolved_yes:
                self.buckets[bucket]["resolved_yes"] += 1

        def get_calibration(self) -> dict:
            result = {}
            for bucket, data in sorted(self.buckets.items()):
                expected = (bucket + 0.5) / 10  # Midpoint of bucket
                actual = data["resolved_yes"] / max(data["total"], 1)
                result[f"{bucket*10}-{(bucket+1)*10}%"] = {
                    "expected": expected, "actual": actual,
                    "count": data["total"], "error": abs(expected - actual)
                }
            return result
  example_bad: |
    # WRONG: No calibration tracking — no way to know if your market is accurate
    def resolve_market(market_id, outcome):
        market.set_resolved(outcome)
        # Never check if prices were accurate
  when_applies: Platform quality assessment, calibration reporting, fee structure optimization
  sources:
    - "Grossman, S. & Stiglitz, J. (1980). On the Impossibility of Informationally Efficient Markets"

- id: PM-THY-016
  text: "Order types in prediction markets: MARKET (execute immediately at best price), LIMIT (execute only at specified price or better), STOP (trigger when price crosses threshold), IOC (fill or cancel immediately), FOK (fill entirely or cancel), GTC (remain until filled or canceled)."
  why: >
    Different order types serve different trader strategies. Market orders provide immediate execution
    but suffer slippage. Limit orders provide price control but may never fill. Prediction markets
    that only support market orders against an AMM lose sophisticated traders who need limit orders
    for risk management. PredictIt's lack of stop orders meant traders couldn't automate exit
    strategies, reducing engagement. Supporting all major order types increases platform stickiness.
  how_to_do_right: |
    1. Implement at minimum: MARKET, LIMIT, and GTC order types
    2. MARKET: Fill immediately against AMM + order book, warn user of expected slippage before confirm
    3. LIMIT: Place in order book at specified price, match against incoming orders
    4. IOC: Attempt fill, cancel unfilled portion immediately (no book placement)
    5. FOK: Fill entire quantity or cancel entirely (atomic)
    6. GTC: Place in book, remain until filled, canceled, or market expires
    7. STOP: Trigger a MARKET order when price crosses threshold (useful for stop-loss)
    8. All orders must be validated: price in [0,1], quantity > 0, balance sufficient
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [prediction_markets, fintech]
    concern: [domain_specific]
  example_good: |
    from enum import Enum

    class OrderType(Enum):
        MARKET = "market"
        LIMIT = "limit"
        STOP = "stop"
        IOC = "immediate_or_cancel"
        FOK = "fill_or_kill"
        GTC = "good_till_canceled"

    class Order:
        def __init__(self, order_type: OrderType, market_id: str,
                     outcome: str, side: str, quantity: Decimal,
                     price: Decimal | None = None, stop_price: Decimal | None = None):
            if order_type == OrderType.MARKET and price is not None:
                raise ValueError("Market orders cannot have a price limit")
            if order_type == OrderType.LIMIT and price is None:
                raise ValueError("Limit orders require a price")
            if order_type == OrderType.STOP and stop_price is None:
                raise ValueError("Stop orders require a stop price")
  example_bad: |
    # WRONG: Only market orders — no price control for traders
    def buy(market_id, outcome, amount):
        price = amm.get_price(outcome)
        # User has no idea what price they'll get for large orders
        amm.buy(outcome, amount)
  when_applies: Building trading interfaces, order management systems, matching engines
  sources: ["https://www.nber.org/system/files/working_papers/w10504/w10504.pdf"]

- id: PM-THY-017
  text: "Market microstructure for prediction markets must handle the unique constraint that prices are bounded [0, 1] and the market has a known termination date. This differs fundamentally from equity markets with unbounded prices and no expiry."
  why: >
    Developers who copy equity market microstructure verbatim build prediction markets that allow
    prices >1.00 or <0.00 (meaningless for probabilities), implement after-hours trading when the
    market should halt near resolution, or use tick sizes designed for dollar-denominated assets
    rather than probability-denominated ones. A tick size of $0.01 is 1% of the probability range —
    very coarse for events near 50% but excessively fine for events near 99%.
  how_to_do_right: |
    1. Enforce hard price bounds: 0.00 ≤ price ≤ 1.00 at the matching engine level
    2. Use adaptive tick sizes: 0.001 near 50%, 0.01 near extremes (0-5%, 95-100%)
    3. Implement market close: halt trading N hours before resolution (configurable, default 1h)
    4. Expire all GTC orders at market close automatically
    5. Prevent new market orders in the final 15 minutes (limit orders only)
    6. Display all prices as percentages (63.2%) not decimals (0.632) for user comprehension
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi, react]
  domains:
    domain: [prediction_markets, fintech]
    concern: [domain_specific]
  example_good: |
    from decimal import Decimal

    class PredictionMarketValidator:
        MIN_PRICE = Decimal("0.00")
        MAX_PRICE = Decimal("1.00")

        def validate_price(self, price: Decimal) -> None:
            if not (self.MIN_PRICE <= price <= self.MAX_PRICE):
                raise ValueError(f"Price {price} outside [0, 1] bounds")

        def validate_trade_timing(self, market: Market) -> None:
            hours_to_close = (market.close_time - datetime.utcnow()).total_seconds() / 3600
            if hours_to_close <= 0:
                raise MarketClosed("Market is closed for trading")
            if hours_to_close <= 0.25:  # 15 minutes
                raise MarketOrdersDisabled("Only limit orders in final 15 minutes")
  example_bad: |
    # WRONG: No price bounds — equity market copy-paste
    def place_order(price, quantity):
        order_book.add(price, quantity)  # price could be 1.50 or -0.20
  when_applies: Building matching engines, order validation, market lifecycle management
  sources: ["https://users.nber.org/~jwolfers/Papers/PredictionMarkets(Palgrave).pdf"]

- id: PM-THY-018
  text: "Information asymmetry in prediction markets creates adverse selection: market makers lose to informed traders and profit from noise traders. The AMM liquidity parameter b must be set to survive the expected level of informed trading."
  why: >
    If a trader has inside information that an event will resolve Yes (probability=1.0) but the
    market price is 0.50, they will buy aggressively, and the AMM will sell at a loss. This is
    the fundamental cost of being a market maker. With LMSR, the maximum loss is b*ln(N), so b
    must be set high enough to provide liquidity but the operator must budget for expected losses
    to informed traders. Prediction markets on corporate earnings are especially vulnerable because
    insiders have massive information advantages.
  how_to_do_right: |
    1. Budget AMM losses: max_loss = b * ln(num_outcomes) per market
    2. Set b conservatively for markets with high insider risk (corporate events, private negotiations)
    3. Monitor for "informed trading" signal: single trader accumulating >10% of shares in one direction
    4. Track AMM P&L per market: persistent losses suggest informed traders dominating
    5. Consider dynamic b: increase b (more liquidity) when volume is balanced, decrease when one-sided
    6. For high-risk markets, require longer resolution periods to dilute information advantage
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [prediction_markets, fintech]
    concern: [domain_specific]
  example_good: |
    class AMMRiskManager:
        def calculate_max_loss(self, b: float, num_outcomes: int) -> float:
            import math
            return b * math.log(num_outcomes)

        def check_informed_trading(self, market_id: str) -> list[str]:
            """Flag users with suspiciously large unidirectional positions."""
            total_shares = self.get_total_shares(market_id)
            alerts = []
            for user_id, position in self.get_positions(market_id).items():
                if abs(position) > total_shares * Decimal("0.10"):
                    alerts.append(f"User {user_id} holds {position/total_shares:.1%} of market")
            return alerts
  example_bad: |
    # WRONG: No risk monitoring — AMM bleeds money to informed traders silently
    amm = LMSR(b=10000)  # Arbitrary b, no loss budget
    # No position monitoring, no P&L tracking
  when_applies: AMM parameter selection, risk management, market surveillance
  sources: ["https://www.nber.org/system/files/working_papers/w10504/w10504.pdf"]

- id: PM-THY-019
  text: "Market halting conditions must be defined upfront: halt on technical errors (price invariant violation), market manipulation detection, regulatory request, or resolution source unavailability. Resume requires explicit operator action."
  why: >
    Without predefined halting conditions, operators make ad-hoc decisions under pressure, often too
    late. The 2010 Flash Crash showed that halting too late amplifies damage. Prediction markets need
    additional halt triggers beyond traditional markets: if the resolution source becomes unavailable,
    trading should halt because prices become meaningless. A prediction market on election results
    should halt if the election itself is postponed — continued trading on a non-event is fraudulent.
  how_to_do_right: |
    1. Define halt conditions in code, not in runbooks: enum HaltReason with specific triggers
    2. Auto-halt on Dutch book detection: if sum(prices) deviates >0.01 from 1.00
    3. Auto-halt on manipulation flag: if 3+ manipulation alerts in 1 hour
    4. Auto-halt on resolution source failure: if oracle API returns 5xx for >5 minutes
    5. Manual halt capability: operator can halt any market with reason logged
    6. Resume requires: root cause identified, fix deployed, operator sign-off
    7. All halts logged with timestamp, reason, duration, and resume justification
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [prediction_markets, fintech]
    concern: [domain_specific]
  example_good: |
    from enum import Enum
    from datetime import datetime

    class HaltReason(Enum):
        PRICE_INVARIANT_VIOLATION = "price_invariant_violation"
        MANIPULATION_DETECTED = "manipulation_detected"
        ORACLE_UNAVAILABLE = "oracle_unavailable"
        REGULATORY_REQUEST = "regulatory_request"
        OPERATOR_MANUAL = "operator_manual"
        EVENT_POSTPONED = "event_postponed"

    class MarketHaltService:
        def halt_market(self, market_id: str, reason: HaltReason, details: str):
            market = self.get_market(market_id)
            market.status = MarketStatus.HALTED
            market.halt_reason = reason
            market.halted_at = datetime.utcnow()
            self.cancel_all_pending_orders(market_id)
            self.notify_traders(market_id, f"Market halted: {reason.value}")
            self.audit_log.record(market_id, "HALT", reason=reason, details=details)
  example_bad: |
    # WRONG: No halt mechanism — errors propagate indefinitely
    # "We'll deal with it manually if something goes wrong"
  when_applies: Production market operations, error handling, regulatory compliance
  sources: ["https://www.cftc.gov/PressRoom/PressReleases/9183-26"]

- id: PM-THY-020
  text: "Brier score measures prediction accuracy: BS = (1/N) * sum((forecast_i - outcome_i)^2). Range 0 (perfect) to 2 (worst). Log scoring rule: LS = (1/N) * sum(log(p_i)) where p_i is the probability assigned to the outcome that actually occurred. Log score punishes confident wrong predictions more severely."
  why: >
    Without proper accuracy metrics, you cannot evaluate whether your prediction market is working.
    Brier score is the standard for binary outcomes: a Brier score of 0.25 means your market is as
    good as saying 50/50 for everything. Metaculus reports a Brier score of ~0.11, which is
    excellent calibration. Log scoring is preferred for incentive compatibility (it's a proper scoring
    rule) but is harder to interpret. You need both: Brier for communication, log for internal tuning.
  how_to_do_right: |
    1. Calculate Brier score for all resolved markets: BS = mean((price - outcome)^2)
    2. Calculate log score: LS = mean(log(price_of_actual_outcome))
    3. Compute scores daily, weekly, and all-time
    4. Segment by category (politics, sports, tech) to find weak domains
    5. Benchmark: BS < 0.15 is excellent, 0.15-0.25 is good, >0.25 needs investigation
    6. Track individual user Brier scores for leaderboards and reputation
    7. Report calibration curve alongside aggregate scores
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi, react]
  domains:
    domain: [prediction_markets, fintech]
    concern: [domain_specific]
  example_good: |
    import math
    from decimal import Decimal

    class AccuracyMetrics:
        def brier_score(self, forecasts: list[tuple[Decimal, bool]]) -> float:
            """forecasts: list of (probability_assigned, actually_occurred)"""
            n = len(forecasts)
            if n == 0:
                return 0.0
            return sum(
                (float(prob) - (1.0 if occurred else 0.0)) ** 2
                for prob, occurred in forecasts
            ) / n

        def log_score(self, forecasts: list[tuple[Decimal, bool]]) -> float:
            """Higher (less negative) is better. Uses probability of actual outcome."""
            n = len(forecasts)
            if n == 0:
                return 0.0
            eps = 1e-10  # Avoid log(0)
            return sum(
                math.log(max(float(prob if occurred else 1 - prob), eps))
                for prob, occurred in forecasts
            ) / n
  example_bad: |
    # WRONG: No accuracy tracking at all
    def resolve_market(market_id, outcome):
        market.resolve(outcome)
        # Was the market price close to the outcome? Who knows!
  when_applies: Platform quality measurement, user leaderboards, market accuracy reporting
  sources:
    - "Brier, G.W. (1950). Verification of Forecasts Expressed in Terms of Probability"

- id: PM-THY-021
  text: "Calibration curves plot predicted probabilities (x-axis) against observed frequencies (y-axis). A perfectly calibrated market has all points on the diagonal. Calibration is the primary quality metric for prediction markets."
  why: >
    A market can have good accuracy (Brier score) but poor calibration — for example, if all
    predictions cluster around 50% regardless of true probability. Calibration curves reveal
    systematic biases: if your 80% predictions resolve 60% of the time, your market consistently
    overestimates high-probability events. Metaculus publishes their calibration curve publicly,
    which is a major trust signal. Prediction markets without visible calibration data cannot
    demonstrate their value proposition.
  how_to_do_right: |
    1. Bucket resolved markets by final price into deciles: [0-10%, 10-20%, ..., 90-100%]
    2. For each bucket, calculate the actual resolution rate
    3. Plot: x = bucket midpoint, y = actual resolution rate, diagonal = perfect calibration
    4. Require minimum 30 markets per bucket for statistical significance
    5. Calculate Expected Calibration Error (ECE): weighted average of |predicted - actual| per bucket
    6. Target ECE < 0.05 (5 percentage points average deviation)
    7. Update calibration curve daily and display on platform dashboard
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi, react]
  domains:
    domain: [prediction_markets, fintech]
    concern: [domain_specific]
  example_good: |
    from collections import defaultdict
    from decimal import Decimal

    class CalibrationCurve:
        def __init__(self, num_buckets: int = 10):
            self.num_buckets = num_buckets
            self.buckets = defaultdict(lambda: {"count": 0, "resolved_yes": 0})

        def add_resolution(self, final_price: Decimal, resolved_yes: bool):
            bucket = min(int(float(final_price) * self.num_buckets), self.num_buckets - 1)
            self.buckets[bucket]["count"] += 1
            if resolved_yes:
                self.buckets[bucket]["resolved_yes"] += 1

        def get_curve(self) -> list[dict]:
            curve = []
            for i in range(self.num_buckets):
                data = self.buckets[i]
                midpoint = (i + 0.5) / self.num_buckets
                actual = data["resolved_yes"] / max(data["count"], 1)
                curve.append({"predicted": midpoint, "actual": actual, "count": data["count"]})
            return curve

        def expected_calibration_error(self) -> float:
            curve = self.get_curve()
            total = sum(p["count"] for p in curve)
            if total == 0:
                return 0.0
            return sum(
                p["count"] / total * abs(p["predicted"] - p["actual"])
                for p in curve
            )
  example_bad: |
    # WRONG: Only tracking aggregate accuracy, not calibration
    accuracy = correct_predictions / total_predictions  # Hides systematic biases
  when_applies: Platform quality dashboards, public trust reporting, market parameter tuning
  sources: ["https://www.nber.org/system/files/working_papers/w10504/w10504.pdf"]

- id: PM-THY-022
  text: "Market design best practices: start with binary markets (simplest), add multi-outcome for elections/sports, add scalar for continuous values. Every market must have unambiguous resolution criteria, a defined close date, and initial liquidity before going live."
  why: >
    Prediction markets that launch too many complex market types simultaneously fail because each
    type requires different AMM logic, UI, and settlement code. Polymarket started with binary
    markets only and added complexity gradually over 2 years. Augur v1 launched with combinatorial
    markets from day one and the UX was incomprehensible to most users. The market creation checklist
    prevents the #1 cause of disputes: ambiguous resolution criteria. "Will Biden win?" is ambiguous;
    "Will Joseph R. Biden be inaugurated as President on January 20, 2025, per C-SPAN broadcast?" is not.
  how_to_do_right: |
    1. Launch with binary markets only (Yes/No) — simplest to implement, understand, and settle
    2. Market creation checklist (ALL required before going live):
       a. Unambiguous question (reviewed by 2+ people)
       b. Resolution source specified (URL, API, or committee)
       c. Resolution date/time with timezone
       d. Close date (when trading stops, before resolution)
       e. Initial liquidity deposited (minimum $1K equivalent)
       f. Category and tags assigned
    3. Add multi-outcome markets only after 100+ binary markets are resolved successfully
    4. Add scalar markets only after multi-outcome is stable
    5. Every market must pass a "resolution ambiguity" review before going live
    6. Template library: pre-built question templates for common categories
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi, react]
  domains:
    domain: [prediction_markets, fintech]
    concern: [domain_specific]
  example_good: |
    from dataclasses import dataclass
    from datetime import datetime
    from decimal import Decimal

    @dataclass
    class MarketCreationRequest:
        question: str                  # Must be unambiguous
        resolution_source: str         # URL or committee ID
        resolution_criteria: str       # Exact conditions for each outcome
        resolution_date: datetime      # When outcome is determined
        close_date: datetime           # When trading stops
        initial_liquidity: Decimal     # Platform-provided seed
        outcomes: list[str]            # ["Yes", "No"] for binary
        category: str
        tags: list[str]

    class MarketCreationValidator:
        def validate(self, req: MarketCreationRequest) -> list[str]:
            errors = []
            if req.close_date >= req.resolution_date:
                errors.append("Close date must be before resolution date")
            if req.initial_liquidity < Decimal("1000"):
                errors.append("Minimum initial liquidity is $1000")
            if len(req.resolution_criteria) < 50:
                errors.append("Resolution criteria too vague (min 50 chars)")
            if not req.resolution_source:
                errors.append("Resolution source is required")
            return errors
  example_bad: |
    # WRONG: No validation, no checklist
    market = Market(question="Will crypto go up?")  # Vague, no resolution criteria
    market.publish()  # No liquidity, no close date, no source
  when_applies: Platform launch strategy, market creation flows, quality control
  sources: ["https://users.nber.org/~jwolfers/Papers/PredictionMarkets(Palgrave).pdf"]
