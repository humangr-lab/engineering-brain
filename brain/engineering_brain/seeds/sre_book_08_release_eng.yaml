layer: rules
technology: SRE
domain: deployment
knowledge:
- id: CR-SRE-REL-001
  text: Builds must be hermetic — the output must depend ONLY on the source code and versioned dependencies, never on the
    build machine's environment. A build that produces different results on different machines is a ticking time bomb.
  why: 'Google mandates hermetic builds because non-hermetic builds are the root cause of the most frustrating class of bugs:
    "works on my machine." A build that depends on the build machine''s installed packages, environment variables, or system
    libraries produces different binaries on different machines. This means: you cannot reproduce a production bug because
    your local build is different, you cannot reliably rollback because the old binary was built on a different machine with
    different dependencies, and you cannot audit what code is running in production because the build is not reproducible.
    Google''s build system (Blaze/Bazel) enforces hermeticity: all tools, compilers, and libraries are versioned and fetched
    from a repository. Building the same revision always produces the same binary, regardless of when or where the build runs.

    '
  how_to_do_right: '1. Pin ALL dependencies to exact versions — not ranges, not "latest." Include transitive dependencies.

    2. Build in containers or sandboxed environments that are themselves versioned (e.g., Dockerfile with pinned base image).

    3. Verify build reproducibility: build the same commit twice on different machines and compare checksums.

    4. Include build tools (compiler version, linker version) in the build specification — not inherited from the host.

    5. Use a build system that enforces hermeticity (Bazel, Nix, Buck) rather than one that allows environment leakage (Make,
    shell scripts).

    6. Tag every production binary with the exact source revision, build timestamp, and dependency manifest for full traceability.

    '
  severity: critical
  technologies:
    platform: [deployment, docker]
  domains:
    domain: [deployment, reliability]
    concern: [ci_cd, artifacts]
  example_good: "# Hermetic build with pinned dependencies and reproducibility\n# Dockerfile with pinned base image and exact dependency versions\nDOCKERFILE = \"\"\"\nFROM python:3.11.7-slim@sha256:abc123...  # Pinned by digest\n\nCOPY requirements.lock /app/\nRUN pip install --no-deps -r requirements.lock  # Exact versions, no resolution\n\nCOPY src/ /app/src/\n\n# Build metadata for traceability\nARG GIT_SHA\nLABEL git.sha=${GIT_SHA}\nLABEL build.timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)\n\"\"\"\n\n# Verify reproducibility:\n# Build same commit on 2 machines -> compare checksums -> must match\n# All tools (compiler, linker) versioned in the build spec\n"
  example_bad: "# Anti-pattern: non-hermetic build\nDOCKERFILE_BAD = \"\"\"\nFROM python:3.11  # Floating tag — changes without notice\n\nRUN pip install flask>=2.0  # Version range — different installs on different days\nRUN apt-get update && apt-get install -y libssl-dev  # System package — version varies\n\nCOPY . /app/\n\"\"\"\n# 'Works on my machine' — different binary on different build machines\n# Cannot reproduce production bugs — local build is different\n# Cannot reliably rollback — old binary was built with different deps\n"
  when_applies: "When setting up build systems and CI/CD pipelines, to ensure builds are reproducible regardless of when or where they run"
  sources:
  - url: https://sre.google/sre-book/release-engineering/
    title: 'Google SRE Book — Chapter 8: Release Engineering'
  validation_status: cross_checked
- id: CR-SRE-REL-002
  text: Release engineering is a specialized discipline, not a side task. Treat it with the same rigor as software development
    — dedicated tooling, documented processes, automated pipelines, and clear ownership.
  why: 'Google has dedicated release engineers because they learned that treating releases as an afterthought produces unreliable,
    inconsistent deployments. Release engineering spans source code management, build systems, testing integration, packaging,
    deployment automation, and configuration management. When this is "everyone''s side job," each team reinvents deployment
    differently, with inconsistent quality. Some teams canary properly, others push to 100% immediately. Some teams test before
    deploying, others test in production. Google standardized this by creating shared release engineering tools and practices
    that all teams use. This does not mean every team needs a dedicated release engineer — it means the TOOLING should be
    standardized and the PRACTICES should be documented and enforced.

    '
  how_to_do_right: '1. Standardize the deployment pipeline across the organization: build → test → package → canary → roll
    out.

    2. Use the same deployment tooling for all services — do not allow each team to build custom deployment scripts.

    3. Enforce code review for ALL release configurations, not just application code.

    4. Document the release process for each service: how to build, how to deploy, how to rollback, how to canary.

    5. Automate the release process as much as possible — "Push on Green" (deploy every build that passes all tests) is the
    ideal.

    6. Integrate release engineering early in the development lifecycle, not as a retrofit before launch.

    '
  severity: high
  technologies:
    platform: [deployment, docker, kubernetes]
  domains:
    domain: [deployment, reliability]
    concern: [ci_cd]
  example_good: "# Standardized deployment pipeline across all services\nclass DeploymentPipeline:\n    STAGES = ['build', 'test', 'package', 'canary', 'rollout']\n\n    def deploy(self, version: str, service: str):\n        for stage in self.STAGES:\n            print(f'{service}: executing {stage} for {version}')\n            getattr(self, f'_{stage}')(version, service)\n\n    def _canary(self, version: str, service: str):\n        deploy_to_percentage(service, version, pct=5)\n        monitor_canary(minutes=15)\n        if canary_healthy():\n            proceed_to_rollout()\n        else:\n            auto_rollback(service, version)\n\n# Same pipeline for ALL services — no custom deployment scripts\n# 'Push on Green': deploy every build that passes all tests\n"
  example_bad: "# Anti-pattern: ad-hoc release process\ndef deploy_service_a():\n    run('scp binary user@server:/opt/service-a')  # Custom for this service\n    run('ssh server systemctl restart service-a')  # No canary\n\ndef deploy_service_b():\n    run('kubectl apply -f k8s/')  # Different tool, different process\n    # No canary, no rollback, no monitoring\n\n# Each team has custom scripts, inconsistent quality\n# Some canary, some push to 100% immediately\n# No standardization = no reliability guarantees\n"
  when_applies: "When establishing or standardizing release engineering practices across an organization with multiple services and teams"
  sources:
  - url: https://sre.google/sre-book/release-engineering/
    title: 'Google SRE Book — Chapter 8: Release Engineering'
  validation_status: cross_checked
- id: CR-SRE-REL-003
  text: High release velocity reduces risk, not increases it. Frequent small releases are safer than infrequent large releases
    because each change is smaller, easier to test, easier to understand, and easier to rollback.
  why: 'Google deploys some services hourly because they found that large, infrequent releases are the most dangerous deployment
    pattern. A release containing 3 months of changes has hundreds of potential failure causes — when it breaks, debugging
    is a nightmare because any of hundreds of changes could be responsible. A release containing 1 day of changes has a handful
    of potential causes — debugging is straightforward. Additionally, small releases make rollback practical: rolling back
    1 day of changes has low blast radius. Rolling back 3 months of changes may lose critical features that users now depend
    on. Google''s "Push on Green" model (deploy every build that passes all tests) is the extreme of this philosophy — maximum
    velocity, minimum risk per deployment.

    '
  how_to_do_right: '1. Deploy at least weekly. Daily is better. Hourly is ideal for non-critical services.

    2. Each release should contain the minimum set of related changes — do not batch unrelated changes.

    3. If a release fails, the first question should be "what changed?" with a clear answer (small change set).

    4. Invest in automated testing so that frequent releases do not require proportional manual testing effort.

    5. Invest in automated rollback so that failed frequent releases are recovered in minutes, not hours.

    6. Track "mean time between deployments" and "change failure rate" together — the goal is high frequency AND low failure
    rate.

    '
  severity: high
  technologies:
    platform: [deployment, kubernetes]
  domains:
    domain: [deployment, reliability]
    concern: [ci_cd]
  example_good: "# High release velocity with small, frequent deployments\nclass ReleaseMetrics:\n    def __init__(self):\n        self.deploys_per_week = 0\n        self.changes_per_deploy = 0\n        self.change_failure_rate = 0.0\n        self.mttr_minutes = 0\n\n    def is_elite(self) -> bool:\n        \"\"\"DORA metrics for elite performers.\"\"\"\n        return (self.deploys_per_week >= 5 and      # Daily or more\n                self.changes_per_deploy <= 3 and     # Small change sets\n                self.change_failure_rate < 0.15 and  # < 15% failure\n                self.mttr_minutes < 60)               # < 1 hour recovery\n\n# Small releases: when it fails, 1 possible cause (not 100)\n# Rollback: lose 1 feature (not 3 months of work)\n# Debugging: straightforward (not a guessing game)\n"
  example_bad: "# Anti-pattern: large, infrequent releases\ndef quarterly_release():\n    changes = collect_3_months_of_changes()  # Hundreds of changes\n    deploy_all_at_once(changes)  # Big bang deployment\n    # When it breaks (and it will):\n    # - Any of 200 changes could be the cause\n    # - Debugging is combinatorial: 200 changes = 19,900 pairwise interactions\n    # - Rollback loses 3 months of features users depend on\n    # - Pressure to debug rather than rollback extends incident duration\n"
  when_applies: "When deciding on release cadence and batch size, especially when large infrequent releases cause debugging difficulties"
  sources:
  - url: https://sre.google/sre-book/release-engineering/
    title: 'Google SRE Book — Chapter 8: Release Engineering'
  validation_status: cross_checked
- id: CR-SRE-REL-004
  text: Bug fixes go to mainline FIRST, then are cherry-picked to release branches. Never fix a bug only in the release branch
    — this guarantees the bug will recur in the next release from mainline.
  why: 'Google''s branching strategy is simple and strict: code branches from mainline at a specific revision for release.
    If a bug is found in the release, the fix is committed to mainline first, then cherry-picked to the release branch. This
    ensures the fix survives in all future releases. The anti-pattern — fixing the bug directly in the release branch — means
    the fix exists only in that branch. The next release from mainline will contain the same bug. This seems obvious but under
    time pressure during an incident, engineers naturally want to fix the release branch directly because it is faster. Google''s
    process prevents this by requiring mainline-first as a policy: the cherry-pick tool only accepts changes that already
    exist in mainline.

    '
  how_to_do_right: '1. All bug fixes go to mainline (main branch) first, even if the fix is urgent for a release.

    2. Cherry-pick the fix from mainline to the release branch — never the reverse direction.

    3. Automate cherry-pick tracking: the release tool should show which mainline fixes have been cherry-picked and which
    are pending.

    4. If a fix cannot be cleanly cherry-picked (due to divergence), this signals the release branch has drifted too far —
    cut a new release instead.

    5. Never merge release branches back to mainline — this creates merge conflicts and hidden regressions.

    6. Release branches should be short-lived: cut, stabilize, deploy, then abandon. Long-lived release branches accumulate
    debt.

    '
  severity: high
  technologies:
    lang: [general]
    platform: [deployment]
  domains:
    domain: [deployment, reliability]
    concern: [ci_cd]
  example_good: "# Bug fixes go to mainline FIRST, then cherry-pick to release\nimport subprocess\n\ndef fix_bug(bug_id: str, fix_commit: str, release_branch: str):\n    \"\"\"Mainline-first policy: fix in main, cherry-pick to release.\"\"\"\n    # Step 1: Fix is already committed to mainline (main branch)\n    assert is_in_mainline(fix_commit), 'Fix must be in mainline first!'\n\n    # Step 2: Cherry-pick to release branch\n    subprocess.run(['git', 'checkout', release_branch])\n    result = subprocess.run(['git', 'cherry-pick', fix_commit])\n\n    if result.returncode != 0:\n        print(f'Cherry-pick failed — release branch has diverged too far')\n        print('Consider cutting a new release from mainline instead')\n        return False\n\n    print(f'Bug {bug_id}: fixed in mainline AND release branch')\n    return True\n"
  example_bad: "# Anti-pattern: fixing bugs directly in the release branch\ndef hotfix_release(bug_id: str):\n    subprocess.run(['git', 'checkout', 'release/v2.3'])\n    # Fix applied ONLY to release branch\n    apply_fix(bug_id)\n    subprocess.run(['git', 'commit', '-m', f'Fix {bug_id}'])\n    # Fix does NOT exist in mainline\n    # Next release from mainline will contain the SAME bug\n    # 'We fixed this already!' — yes, in a branch that was abandoned\n"
  when_applies: "When handling bug fixes during a release cycle, to ensure fixes persist in both the current release and all future releases"
  sources:
  - url: https://sre.google/sre-book/release-engineering/
    title: 'Google SRE Book — Chapter 8: Release Engineering'
  validation_status: cross_checked
- id: CR-SRE-REL-005
  text: Configuration is code. All configuration changes must go through code review, version control, and automated deployment
    — just like application code. Unreviewed config changes cause more outages than code bugs.
  why: 'Google found that configuration changes are the single largest cause of production outages — more than code bugs,
    hardware failures, or dependency issues. The reason is that config changes are often treated as "not real code" and bypass
    the safeguards (code review, testing, staged rollout) that protect code changes. A misconfigured timeout, a wrong database
    endpoint, an accidentally removed feature flag — these are trivial changes that can bring down an entire service. Google
    requires all configuration to be version-controlled, reviewed, and deployed through the same pipeline as code. Multiple
    configuration management strategies exist (mainline config, bundled with binary, external config stores) but ALL must
    have review and versioning.

    '
  how_to_do_right: '1. Store ALL configuration in version control — no manual editing of production config files.

    2. Require code review for every config change, even "trivial" ones. Most outage-causing changes look trivial.

    3. Deploy config changes through the same pipeline as code: staged rollout, canary, monitoring, rollback.

    4. Separate config that changes frequently (feature flags, A/B test parameters) from config that changes rarely (database
    endpoints, security policies).

    5. Validate config on deploy: schema validation, constraint checking, diff review. Reject invalid config before it reaches
    production.

    6. Maintain config history with blame annotations: who changed what, when, and why. This is critical for incident investigation.

    '
  severity: critical
  technologies:
    platform: [deployment, ansible, kubernetes, terraform]
  domains:
    domain: [code_quality, deployment, reliability]
    concern: [configuration, ci_cd]
  example_good: "# Configuration as code with validation and review\nimport yaml\nimport jsonschema\n\nCONFIG_SCHEMA = {\n    'type': 'object',\n    'properties': {\n        'database_url': {'type': 'string', 'pattern': r'^postgres://'},\n        'timeout_ms': {'type': 'integer', 'minimum': 100, 'maximum': 30000},\n        'feature_flags': {'type': 'object'},\n    },\n    'required': ['database_url', 'timeout_ms'],\n}\n\ndef deploy_config(config_path: str):\n    \"\"\"Config deployed through same pipeline as code.\"\"\"\n    config = yaml.safe_load(open(config_path))\n    # 1. Schema validation\n    jsonschema.validate(config, CONFIG_SCHEMA)\n    # 2. Diff review (in version control)\n    # 3. Staged rollout (canary -> production)\n    # 4. Monitoring after apply\n    # 5. Blame annotation: who, when, why\n    apply_config(config)\n"
  example_bad: "# Anti-pattern: manual config editing in production\ndef update_config(server: str):\n    ssh(server)\n    # vim /etc/myapp/config.yaml  <- manual edit, no review\n    # typo in timeout: 10 instead of 10000 -> service crashes\n    # No version control, no review, no rollback\n    # 'Who changed this?' — nobody knows\n    # Config changes cause MORE outages than code bugs\n"
  when_applies: "When managing service configuration, to ensure config changes receive the same rigor as code changes (review, versioning, staged rollout)"
  sources:
  - url: https://sre.google/sre-book/release-engineering/
    title: 'Google SRE Book — Chapter 8: Release Engineering'
  validation_status: cross_checked
- id: CR-SRE-REL-006
  text: Release processes must be self-service. If deploying requires a specific person or team's involvement, you have a
    bottleneck that limits velocity and a single point of failure that blocks the organization.
  why: 'Google''s release engineering practice mandates self-service because centralized release gatekeeping does not scale.
    With thousands of engineers and hundreds of services, no central team can review and approve every release. More importantly,
    centralized release approval creates a bottleneck that slows feature velocity and frustrates product teams. Google''s
    approach: build automated tools that enforce policy (code review, test passing, canary health) and let any authorized
    team member trigger a release. The tools are the gatekeeper, not people. This also eliminates the "bus factor" — if the
    release person is on vacation, releases do not stop. Self-service releases, combined with automated rollback, make teams
    autonomous and fast.

    '
  how_to_do_right: '1. Any team member should be able to trigger a deployment without waiting for approval from a specific
    person.

    2. Policy enforcement (code review, test passing, security scan) should be automated in the pipeline — not manual checkpoints.

    3. Provide a single command or button for deployment. If the process has more than 3 manual steps, it is not self-service
    enough.

    4. Include automated rollback in the self-service tooling — if the deploy breaks, one command rolls back.

    5. Audit trail must be automatic: who deployed what, when, and from which commit — for compliance and debugging.

    6. Train all team members on the release process, not just designated "release managers."

    '
  severity: high
  technologies:
    platform: [deployment, kubernetes]
  domains:
    domain: [deployment, reliability]
    concern: [ci_cd]
  example_good: "# Self-service deployment — any team member can deploy\nclass SelfServiceDeploy:\n    def deploy(self, version: str, deployer: str) -> dict:\n        \"\"\"One command deployment with automated policy enforcement.\"\"\"\n        # Automated gates — no human gatekeeper needed\n        checks = {\n            'code_review': check_code_reviewed(version),\n            'tests_pass': check_tests_pass(version),\n            'security_scan': check_security_scan(version),\n        }\n        if not all(checks.values()):\n            return {'status': 'BLOCKED', 'failing_checks': [\n                k for k, v in checks.items() if not v]}\n\n        # Deploy with auto-rollback\n        result = deploy_with_canary(version)\n        # Audit trail: automatic\n        log_deployment(deployer, version, result)\n        return {'status': 'DEPLOYED', 'deployer': deployer}\n\n# Any authorized team member. Tools enforce policy, not people.\n"
  example_bad: "# Anti-pattern: centralized release gatekeeper\ndef deploy(version: str):\n    # Must wait for Release Manager approval (bottleneck)\n    approval = wait_for_approval('release-manager@company.com')\n    if not approval:\n        return 'BLOCKED: Release Manager on vacation'\n    # Single person controls all releases\n    # Bus factor = 1: if they are sick, no releases\n    # Velocity limited by one person's bandwidth\n    manual_deploy(version)\n"
  when_applies: "When deployment processes require specific individuals for approval, creating bottlenecks and single points of failure"
  sources:
  - url: https://sre.google/sre-book/release-engineering/
    title: 'Google SRE Book — Chapter 8: Release Engineering'
  validation_status: cross_checked
