layer: rules
domain: mathematics
knowledge:
- id: MATH-NUM-001
  text: >
    IEEE 754 Floating-Point — Floats are NOT real numbers. Python's float is 64-bit IEEE 754
    (double precision) with ~15-17 significant decimal digits and machine epsilon ~2.22e-16.
    Never compare floats with ==. Catastrophic cancellation occurs when subtracting nearly
    equal numbers, destroying significant digits. Always use math.isclose() or numpy.isclose()
    for comparisons and be aware of representation gaps.
  why: >
    The classic example: 0.1 + 0.2 == 0.30000000000000004 in Python. This is not a bug — 0.1
    cannot be represented exactly in binary floating-point (it is a repeating binary fraction
    1/16 + 1/32 + ...). Every float has a representational gap to its next neighbor: for 1.0
    the gap is ~2.2e-16, but for 1e15 the gap is 0.125 — meaning 1e15 + 0.1 == 1e15 (the 0.1
    is simply lost). Catastrophic cancellation example: computing sqrt(x^2 + 1) - 1 for small x.
    When x=1e-8, the true answer is ~5e-17, but naive computation gives 0.0 because x^2+1 rounds
    to 1.0. The Patriot missile failure (1991) killed 28 soldiers because a 0.000000095-second
    timing error accumulated over 100 hours due to float representation of 0.1 in a 24-bit register.
  how_to_do_right: |
    1. Never use == for float comparison. Use math.isclose(a, b, rel_tol=1e-9) or numpy.isclose().
    2. Know machine epsilon: sys.float_info.epsilon = 2.220446049250313e-16 (for float64).
    3. For catastrophic cancellation, use algebraically equivalent stable forms:
       - BAD: sqrt(x^2 + 1) - 1 → GOOD: x^2 / (sqrt(x^2 + 1) + 1)
       - BAD: (1 - cos(x)) for small x → GOOD: 2 * sin(x/2)^2
    4. Representable range: ~5e-324 (subnormal) to ~1.8e308.
    5. Special values: float('inf'), float('-inf'), float('nan'). NaN != NaN is True.
    6. For financial/monetary calculations, ALWAYS use decimal.Decimal (see MATH-NUM-011).
    7. Accumulation errors grow with O(sqrt(n)) for random signs, O(n) for same-sign sums.
  severity: critical
  technologies:
    lang: [python]
    library: [numpy, math]
  domains:
    domain: [mathematics, numerical_computing]
    concern: [correctness, scientific_computing]
  example_good: |
    import math
    import sys
    import numpy as np

    # 1. NEVER use == for floats
    a = 0.1 + 0.2
    b = 0.3
    print(f"a == b: {a == b}")  # False!
    print(f"isclose: {math.isclose(a, b, rel_tol=1e-9)}")  # True

    # 2. Machine epsilon
    eps = sys.float_info.epsilon  # 2.220446049250313e-16
    print(f"1.0 + eps/2 == 1.0: {1.0 + eps/2 == 1.0}")  # True (below resolution)
    print(f"1.0 + eps   == 1.0: {1.0 + eps == 1.0}")     # False

    # 3. Catastrophic cancellation — FIXED
    x = 1e-8
    # BAD: sqrt(x^2 + 1) - 1 → 0.0 (all digits lost)
    bad = math.sqrt(x**2 + 1) - 1
    # GOOD: algebraically equivalent, numerically stable
    good = x**2 / (math.sqrt(x**2 + 1) + 1)
    print(f"BAD:  {bad}")    # 0.0
    print(f"GOOD: {good}")   # 5e-17 (correct)

    # 4. NaN behavior
    nan = float('nan')
    print(f"nan == nan: {nan == nan}")         # False!
    print(f"math.isnan(nan): {math.isnan(nan)}")  # True
  example_bad: |
    import math

    # BAD 1: Direct float comparison
    total = sum([0.1] * 10)
    if total == 1.0:
        print("Exact match!")  # Never prints — total is 0.9999999999999999

    # BAD 2: Catastrophic cancellation
    x = 1e-8
    result = math.sqrt(x**2 + 1) - 1  # Returns 0.0 instead of ~5e-17

    # BAD 3: Ignoring representational gaps at large magnitudes
    big = 1e16
    print(big + 1 == big)  # True! 1.0 is below the representational gap at 1e16

    # BAD 4: Assuming associativity
    a = 1e20
    b = -1e20
    c = 1.0
    print((a + b) + c)  # 1.0 (correct)
    print(a + (b + c))  # 0.0 (WRONG — c is lost when added to b)
  when_applies: "Any code using floating-point arithmetic, scientific computing, financial calculations, geometric computations"
  sources:
    - "https://docs.python.org/3/tutorial/floatingpoint.html"
    - "https://docs.oracle.com/cd/E19957-01/806-3568/ncg_goldberg.html"

- id: MATH-NUM-002
  text: >
    Numerical Stability and Condition Number — A problem is ill-conditioned when small
    changes in input cause large changes in output (condition number >> 1). An algorithm
    is numerically unstable when it amplifies rounding errors beyond what the condition
    number dictates. Always check the condition number before solving linear systems —
    if cond(A) > 1/epsilon (~4.5e15 for float64), the result has ZERO reliable digits.
  why: >
    The condition number kappa(A) = ||A|| * ||A^(-1)|| tells you how many digits of accuracy
    you LOSE when solving Ax=b. Rule of thumb: if kappa(A)=10^k, you lose ~k digits. With
    float64 (~15 digits), kappa=10^12 leaves only ~3 reliable digits. The Hilbert matrix is
    the classic ill-conditioned example: a 10x10 Hilbert matrix has kappa ~1.6e13. A naive
    solver produces results that are wrong by orders of magnitude while numpy.linalg.solve()
    gives no warning. In 2003, a structural engineering firm's finite element model produced
    subtly wrong stress calculations because a poorly scaled stiffness matrix had kappa~10^14.
    The structure was built with insufficient reinforcement at critical joints.
  how_to_do_right: |
    1. ALWAYS check condition number before solving: numpy.linalg.cond(A).
    2. Rule of thumb: digits_lost = log10(cond(A)). float64 has ~15 digits.
       cond(A) = 1e6 → ~9 reliable digits. cond(A) = 1e12 → ~3 reliable digits.
    3. If cond(A) > 1e10, consider:
       - Rescaling/preconditioning the matrix.
       - Using SVD-based pseudoinverse (numpy.linalg.lstsq) instead of direct solve.
       - Reformulating the problem.
    4. Use relative condition number: cond(A) = sigma_max / sigma_min (from SVD).
    5. For least-squares: use numpy.linalg.lstsq (SVD-based, stable) not normal equations (A^T A x = A^T b) which SQUARES the condition number.
    6. Regularization (Tikhonov/ridge) can tame ill-conditioning: solve (A^T A + lambda*I)x = A^T b.
  severity: high
  technologies:
    lang: [python]
    library: [numpy, scipy]
  domains:
    domain: [mathematics, numerical_computing]
    concern: [scientific_computing, linear_algebra]
  example_good: |
    import numpy as np

    # Always check condition number BEFORE solving
    A = np.array([
        [1.0, 1.0],
        [1.0, 1.0001]
    ])
    b = np.array([2.0, 2.0001])

    cond = np.linalg.cond(A)
    digits_lost = np.log10(cond)
    reliable_digits = 15 - digits_lost

    print(f"Condition number: {cond:.1f}")         # ~40,000
    print(f"Digits lost: {digits_lost:.1f}")        # ~4.6
    print(f"Reliable digits: {reliable_digits:.1f}") # ~10.4

    if cond > 1e10:
        print("WARNING: Ill-conditioned! Use SVD-based solver.")
        x, residuals, rank, sv = np.linalg.lstsq(A, b, rcond=None)
    else:
        x = np.linalg.solve(A, b)

    print(f"Solution: {x}")

    # Hilbert matrix — extremely ill-conditioned
    from scipy.linalg import hilbert
    H10 = hilbert(10)
    print(f"Hilbert 10x10 cond: {np.linalg.cond(H10):.2e}")
    # ~1.6e13 — only ~2 reliable digits in solution!
  example_bad: |
    import numpy as np

    # BAD: Solving without checking condition number
    A = np.array([
        [1.0, 1.0],
        [1.0, 1.0001]
    ])
    b = np.array([2.0, 2.0001])

    x = np.linalg.solve(A, b)  # No warning, but result has ~10 digits lost
    print(f"Solution: {x}")     # Looks reasonable but is fragile

    # BAD: Normal equations for least-squares (squares the condition number!)
    A_big = np.random.randn(1000, 50)
    b_big = np.random.randn(1000)
    # cond(A^T A) = cond(A)^2. If cond(A)=1e6, cond(A^T A)=1e12 → 3 digits left
    x_bad = np.linalg.solve(A_big.T @ A_big, A_big.T @ b_big)  # UNSTABLE

    # GOOD: SVD-based lstsq (does not square the condition number)
    x_good, _, _, _ = np.linalg.lstsq(A_big, b_big, rcond=None)  # STABLE
  when_applies: "Solving linear systems, least-squares fitting, any matrix computation, finite element analysis"
  sources:
    - "https://numpy.org/doc/stable/reference/routines.linalg.html"
    - "https://en.wikipedia.org/wiki/Condition_number"

- id: MATH-NUM-003
  text: >
    Kahan Summation — When summing many floating-point numbers, naive summation accumulates
    O(n) rounding errors. Kahan compensated summation reduces this to O(1) by tracking the
    lost low-order bits in a separate compensation variable. Use math.fsum() in Python for
    exact summation of floats, or implement Kahan for streaming/online scenarios.
  why: >
    Summing 10 million values of 0.1 naively: sum = 999999.9999998981 (error ~1e-7).
    With Kahan: sum = 1000000.0000000000 (exact to float64 precision). For financial calculations,
    even small per-transaction errors compound: $0.01 error/transaction * 1M transactions/day =
    $10,000/day discrepancy. In scientific computing, summing terms of a slowly converging series
    can give completely wrong results with naive summation if the partial sums are large relative
    to individual terms. Python's math.fsum() uses a full-precision intermediate accumulator
    (Shewchuk's algorithm) and is the best choice for batch summation. For streaming data where
    you cannot store all values, Kahan summation is the practical choice.
  how_to_do_right: |
    1. For batch summation in Python: use math.fsum() — exact to full float64 precision.
    2. For streaming/online summation: implement Kahan compensated summation.
    3. Kahan algorithm: maintain a compensation variable c (initially 0):
       for each value x:
         y = x - c        (compensate for lost bits)
         t = sum + y      (add compensated value)
         c = (t - sum) - y  (recover lost bits)
         sum = t
    4. For financial calculations: use decimal.Decimal (see MATH-NUM-011), not Kahan.
    5. numpy.sum() uses pairwise summation (O(log n) error) — better than naive but not exact.
    6. Sort values by ascending absolute magnitude before summing to minimize error (if not using fsum/Kahan).
  severity: high
  technologies:
    lang: [python]
    library: [math, numpy]
  domains:
    domain: [mathematics, numerical_computing]
    concern: [financial, scientific_computing]
  example_good: |
    import math
    import numpy as np

    # Scenario: sum 10 million values of 0.1
    values = [0.1] * 10_000_000

    # Method 1: math.fsum() — exact (best for batch)
    exact_sum = math.fsum(values)
    print(f"math.fsum: {exact_sum}")  # 1000000.0 (exact)

    # Method 2: Kahan summation (best for streaming)
    def kahan_sum(iterable):
        total = 0.0
        c = 0.0  # compensation for lost low-order bits
        for x in iterable:
            y = x - c          # compensated value
            t = total + y      # add to running total
            c = (t - total) - y  # recover what was lost
            total = t
        return total

    kahan_result = kahan_sum(values)
    print(f"Kahan:     {kahan_result}")  # 1000000.0 (exact)

    # Method 3: naive sum (for comparison — BAD for large n)
    naive = sum(values)
    print(f"Naive sum: {naive}")  # 999999.9999998981 (error ~1e-7)

    # Method 4: numpy pairwise (O(log n) error, good but not exact)
    np_sum = np.sum(np.full(10_000_000, 0.1))
    print(f"numpy sum: {np_sum}")  # Close but not exact
  example_bad: |
    # BAD: Naive summation for financial calculations
    transactions = [0.01] * 1_000_000  # 1 million penny transactions

    total = 0.0
    for t in transactions:
        total += t  # Accumulates O(n) rounding errors

    print(f"Expected: 10000.00")
    print(f"Got:      {total:.10f}")  # 10000.0000001844 — off by ~$0.00000018
    # Over billions of transactions, this adds up to real money

    # BAD: Using sum() for scientific series
    # Harmonic series partial sum: sum(1/k for k=1..N)
    N = 10_000_000
    naive_harmonic = sum(1.0/k for k in range(1, N+1))
    exact_harmonic = math.fsum(1.0/k for k in range(1, N+1))
    print(f"Naive: {naive_harmonic}")
    print(f"Exact: {exact_harmonic}")
    print(f"Error: {abs(naive_harmonic - exact_harmonic)}")  # ~1e-9 error
  when_applies: "Summing large arrays, financial aggregation, scientific computing, streaming statistics"
  sources:
    - "https://docs.python.org/3/library/math.html#math.fsum"
    - "https://en.wikipedia.org/wiki/Kahan_summation_algorithm"

- id: MATH-NUM-004
  text: >
    Newton-Raphson Root Finding — Newton-Raphson converges quadratically (digits of accuracy
    double each iteration) WHEN it converges, but it can diverge, cycle, or converge to the
    wrong root. Always provide a good initial guess, set a maximum iteration count, check
    for near-zero derivatives, and use bracketing methods (Brent's) as a fallback.
  why: >
    Quadratic convergence means 5-6 iterations typically suffice for full float64 precision
    (from a good starting point). But pathological cases are common: f(x)=x^3 - 2x + 2
    starting from x0=0 enters an infinite cycle between 0 and 1. f(x)=x^(1/3) near x=0 has
    f'(x)→infinity, causing divergence. For multivariate systems (solving F(x)=0 with Jacobian),
    Newton-Raphson requires computing and inverting the Jacobian at each step — O(n^3) per
    iteration. Quasi-Newton methods (Broyden, BFGS) approximate the Jacobian, trading convergence
    rate for cost. scipy.optimize.brentq() is guaranteed to converge for bracketed roots and
    should be preferred when you can bracket the root.
  how_to_do_right: |
    1. Use scipy.optimize.brentq(f, a, b) for guaranteed convergence (requires f(a)*f(b)<0 bracket).
    2. Use scipy.optimize.newton(f, x0, fprime=f') for quadratic convergence with known derivative.
    3. If derivative is unavailable, secant method: scipy.optimize.newton(f, x0) (superlinear, ~1.618 order).
    4. Always set maxiter (e.g., 50) and tol (e.g., 1e-12).
    5. Check |f(x_n)| < tol AND |x_n - x_{n-1}| < tol (both conditions).
    6. Guard against f'(x_n) near zero — step becomes huge, overshooting.
    7. For polynomials: use numpy.roots() or numpy.polynomial.polynomial.polyroots().
    8. For systems of equations: use scipy.optimize.fsolve() (wraps MINPACK hybrd).
  severity: medium
  technologies:
    lang: [python]
    library: [scipy, numpy]
  domains:
    domain: [mathematics, numerical_computing]
    concern: [scientific_computing, optimization]
  example_good: |
    import numpy as np
    from scipy import optimize

    # Find root of f(x) = x^3 - x - 2 (root near x=1.5)
    f = lambda x: x**3 - x - 2
    fprime = lambda x: 3*x**2 - 1

    # Method 1: Brent's method (guaranteed convergence with bracket)
    root_brent = optimize.brentq(f, 1.0, 2.0)
    print(f"Brent: x={root_brent:.15f}, f(x)={f(root_brent):.2e}")
    # x=1.521379706804568, f(x)=0.00e+00

    # Method 2: Newton-Raphson (quadratic convergence)
    root_newton = optimize.newton(f, x0=1.5, fprime=fprime, maxiter=50, tol=1e-12)
    print(f"Newton: x={root_newton:.15f}, f(x)={f(root_newton):.2e}")

    # Method 3: Secant method (no derivative needed)
    root_secant = optimize.newton(f, x0=1.5, maxiter=50, tol=1e-12)
    print(f"Secant: x={root_secant:.15f}, f(x)={f(root_secant):.2e}")

    # Convergence demo — Newton doubles digits per iteration
    x = 1.5
    for i in range(6):
        x_new = x - f(x)/fprime(x)
        print(f"Iter {i}: x={x_new:.15f}, |f(x)|={abs(f(x_new)):.2e}")
        x = x_new
    # After 5 iterations: full float64 precision from a decent start
  example_bad: |
    from scipy import optimize

    # BAD 1: No convergence check or maxiter
    def newton_naive(f, fprime, x0):
        x = x0
        for _ in range(1000):  # Arbitrary large number
            x = x - f(x) / fprime(x)  # Can divide by zero if f'(x)≈0
        return x  # No convergence guarantee

    # BAD 2: Cycling example — Newton fails to converge
    f = lambda x: x**3 - 2*x + 2
    fprime = lambda x: 3*x**2 - 2
    # Starting from x0=0: x1=1, x2=0.333..., x3≈0.89, cycles...
    try:
        root = optimize.newton(f, x0=0, fprime=fprime, maxiter=5)
    except RuntimeError:
        print("Newton FAILED to converge from x0=0")

    # BAD 3: Not bracketing when you can
    # Brent is safer and only marginally slower for scalar roots
    # Use Newton only when quadratic convergence matters (inner loops)
  when_applies: "Root finding, equation solving, optimization inner loops, implicit function evaluation"
  sources:
    - "https://docs.scipy.org/doc/scipy/reference/optimize.html"
    - "https://en.wikipedia.org/wiki/Newton%27s_method"

- id: MATH-NUM-005
  text: >
    Gradient Descent — SGD, Adam, and learning rate schedules. Vanilla gradient descent
    with a fixed learning rate rarely works well. Use Adam (adaptive moment estimation) as
    the default optimizer. Learning rate is the single most important hyperparameter —
    too high causes divergence, too low causes slow convergence or getting stuck. Always
    use learning rate warmup + decay for training stability.
  why: >
    A Google Brain survey found learning rate is the most sensitive hyperparameter: changing
    it by 2x can make the difference between 90% and 60% accuracy. Vanilla SGD with fixed
    lr=0.1 can diverge on some problems and stall on others. Adam adapts per-parameter learning
    rates using first (mean) and second (variance) moments of gradients, making it robust across
    problem types. However, Adam can converge to worse solutions than well-tuned SGD+momentum for
    some problems (e.g., ImageNet). The warmup-then-decay schedule (linear warmup for 5-10% of
    steps, then cosine decay) is now standard: warmup prevents early large gradient updates from
    destabilizing, while decay enables fine-grained convergence. Weight decay (AdamW) should be
    used instead of L2 regularization with Adam — they are NOT equivalent.
  how_to_do_right: |
    1. Default optimizer: Adam (lr=1e-3 for most tasks) or AdamW (lr=1e-4 to 3e-4 for transformers).
    2. Learning rate schedule: warmup (linear, 5-10% of steps) + decay (cosine to 0 or 1e-6).
    3. For convex problems: vanilla GD with lr = 1/L (L = Lipschitz constant of gradient).
    4. Gradient clipping: clip by global norm (max_norm=1.0) to prevent explosion.
    5. Batch size effects: larger batch → can use larger lr (linear scaling rule: lr * batch_size/base_batch).
    6. For fine-tuning pretrained models: lr 10-100x smaller than pretraining (e.g., 2e-5 for BERT).
    7. Monitor: training loss should decrease monotonically (with noise). If it spikes, lr is too high.
    8. Common choices: Adam for general, AdamW for transformers, SGD+momentum for vision at scale.
  severity: high
  technologies:
    lang: [python]
    library: [numpy, scipy, torch, tensorflow]
  domains:
    domain: [mathematics, machine_learning]
    concern: [optimization, deep_learning]
  example_good: |
    import numpy as np

    # Pure numpy gradient descent with Adam optimizer
    def adam_optimizer(grad_fn, x0, lr=1e-3, beta1=0.9, beta2=0.999,
                       eps=1e-8, max_iter=1000, tol=1e-8):
        """Adam optimizer — adaptive per-parameter learning rates."""
        x = x0.copy()
        m = np.zeros_like(x)  # first moment (mean of gradients)
        v = np.zeros_like(x)  # second moment (variance of gradients)

        for t in range(1, max_iter + 1):
            g = grad_fn(x)

            # Update moments
            m = beta1 * m + (1 - beta1) * g
            v = beta2 * v + (1 - beta2) * g**2

            # Bias correction (critical for early steps)
            m_hat = m / (1 - beta1**t)
            v_hat = v / (1 - beta2**t)

            # Update parameters
            step = lr * m_hat / (np.sqrt(v_hat) + eps)
            x -= step

            if np.linalg.norm(step) < tol:
                print(f"Converged at iteration {t}")
                break

        return x

    # Example: minimize Rosenbrock f(x,y) = (1-x)^2 + 100(y-x^2)^2
    def rosenbrock_grad(xy):
        x, y = xy
        dx = -2*(1-x) + 200*(y - x**2)*(-2*x)
        dy = 200*(y - x**2)
        return np.array([dx, dy])

    result = adam_optimizer(rosenbrock_grad, np.array([-1.0, 1.0]),
                           lr=0.01, max_iter=10000)
    print(f"Minimum at: {result}")  # Close to [1.0, 1.0]
  example_bad: |
    import numpy as np

    # BAD 1: Vanilla GD with fixed learning rate — no adaptation
    def bad_gd(grad_fn, x0, lr=0.1, max_iter=1000):
        x = x0.copy()
        for _ in range(max_iter):
            x -= lr * grad_fn(x)  # Fixed lr, no momentum, no adaptation
        return x
    # lr=0.1 diverges on Rosenbrock, lr=0.0001 converges in 100,000+ iters

    # BAD 2: No gradient clipping — exploding gradients
    x = np.array([100.0, 100.0])
    g = rosenbrock_grad(x)  # Gradient magnitude ~millions
    x -= 0.01 * g  # Step is huge → diverges immediately

    # BAD 3: No bias correction in Adam
    m = 0.9 * m + 0.1 * g
    v = 0.999 * v + 0.001 * g**2
    # At step 1: m ≈ 0.1*g (severely underestimated because m was 0)
    # Bias correction: m/(1-0.9^1) = m/0.1 = g (correct scale)
    # Without it, early steps are ~10x too small
  when_applies: "Training ML models, numerical optimization, curve fitting, parameter estimation"
  sources:
    - "https://en.wikipedia.org/wiki/Stochastic_gradient_descent"
    - "https://numpy.org/doc/stable/reference/routines.linalg.html"

- id: MATH-NUM-006
  text: >
    Matrix Decompositions — LU, QR, and SVD serve different purposes. LU for solving
    Ax=b with multiple right-hand sides (factor once, solve many). QR for least-squares
    and orthogonalization (numerically stable). SVD for rank computation, pseudoinverse,
    dimensionality reduction, and ill-conditioned systems. Know which to use and WHEN.
  why: >
    Using the wrong decomposition wastes computation or produces unstable results. Solving Ax=b
    via A^(-1)*b is O(n^3) and numerically unstable — never compute explicit inverses. LU is
    the standard O(2n^3/3) factorization for square, well-conditioned systems. QR is 2x more
    expensive but numerically superior for least-squares (never squares the condition number).
    SVD is the Swiss Army knife: it handles rank-deficient, rectangular, and ill-conditioned
    matrices but costs O(min(mn^2, m^2n)). For a 1000x1000 dense matrix: LU ~0.3s, QR ~0.7s,
    SVD ~3s. Choosing QR when LU suffices wastes 2x compute. Choosing LU when the matrix is
    ill-conditioned gives wrong answers. Always check condition number first.
  how_to_do_right: |
    1. Ax=b, A square, well-conditioned → numpy.linalg.solve() (uses LU internally).
    2. Ax=b, multiple b's, same A → factor once: lu, piv = scipy.linalg.lu_factor(A), then scipy.linalg.lu_solve((lu, piv), b).
    3. Ax~=b, overdetermined (m>n) → numpy.linalg.lstsq() (uses SVD, most stable) or QR via scipy.linalg.qr().
    4. Rank computation → SVD: numpy.linalg.svd(). Rank = number of singular values > tol.
    5. Pseudoinverse → numpy.linalg.pinv() (SVD-based).
    6. Eigenvalues → numpy.linalg.eigh() for symmetric (guaranteed real), numpy.linalg.eig() for general.
    7. Dimensionality reduction (PCA) → SVD on centered data. sklearn.decomposition.PCA uses this.
    8. NEVER compute A^(-1) explicitly. Use solve or factorize.
  severity: medium
  technologies:
    lang: [python]
    library: [numpy, scipy]
  domains:
    domain: [mathematics, numerical_computing]
    concern: [linear_algebra, scientific_computing]
  example_good: |
    import numpy as np
    from scipy import linalg

    A = np.array([
        [2.0, 1.0, 1.0],
        [4.0, 3.0, 3.0],
        [8.0, 7.0, 9.0]
    ])

    # Scenario 1: Single solve — numpy.linalg.solve (LU internally)
    b = np.array([1.0, 1.0, 1.0])
    x = np.linalg.solve(A, b)
    print(f"Solution: {x}")

    # Scenario 2: Multiple right-hand sides — factor once
    lu, piv = linalg.lu_factor(A)
    for b in [np.array([1,0,0.]), np.array([0,1,0.]), np.array([0,0,1.])]:
        x = linalg.lu_solve((lu, piv), b)
        print(f"  b={b} -> x={x}")

    # Scenario 3: Overdetermined system (least-squares) — use lstsq
    A_rect = np.random.randn(100, 3)
    b_noisy = A_rect @ np.array([1., 2., 3.]) + 0.1*np.random.randn(100)
    x_ls, residuals, rank, sv = np.linalg.lstsq(A_rect, b_noisy, rcond=None)
    print(f"Least-squares solution: {x_ls}")  # Close to [1, 2, 3]
    print(f"Rank: {rank}, Condition: {sv[0]/sv[-1]:.1f}")

    # Scenario 4: SVD for rank and pseudoinverse
    U, S, Vt = np.linalg.svd(A)
    rank = np.sum(S > 1e-10)
    print(f"SVD rank: {rank}, singular values: {S}")
  example_bad: |
    import numpy as np

    A = np.array([[2, 1, 1], [4, 3, 3], [8, 7, 9.]])
    b = np.array([1., 1., 1.])

    # BAD 1: Computing explicit inverse (numerically unstable, 3x slower)
    x = np.linalg.inv(A) @ b  # NEVER do this
    # Use np.linalg.solve(A, b) instead — same result, more stable, faster

    # BAD 2: Normal equations for least-squares (squares condition number)
    A_rect = np.random.randn(100, 3)
    b = np.random.randn(100)
    x = np.linalg.solve(A_rect.T @ A_rect, A_rect.T @ b)  # cond squared!
    # Use np.linalg.lstsq(A_rect, b) instead

    # BAD 3: Not checking rank before solving
    A_singular = np.array([[1, 2], [2, 4.]])
    try:
        x = np.linalg.solve(A_singular, np.array([3., 6.]))  # Singular!
    except np.linalg.LinAlgError:
        pass  # Crashes at runtime — should have checked cond/rank first
  when_applies: "Solving linear systems, least-squares fitting, PCA, data science pipelines, physics simulations"
  sources:
    - "https://numpy.org/doc/stable/reference/routines.linalg.html"
    - "https://en.wikipedia.org/wiki/Matrix_decomposition"

- id: MATH-NUM-007
  text: >
    Sparse Matrices — When a matrix has >90% zeros, use sparse formats (CSR, CSC, COO)
    instead of dense numpy arrays. A 100,000x100,000 dense matrix needs 80 GB of RAM;
    with 0.01% nonzeros, the same matrix in CSR uses ~12 MB. Use CSR for row slicing and
    matrix-vector products, CSC for column slicing and direct solvers, COO for construction.
  why: >
    Dense storage of N x N matrices costs O(N^2) memory and O(N^3) for operations like solve/invert.
    For large sparse systems (finite elements, graph Laplacians, NLP term-document matrices),
    this is prohibitive. A sparse matrix with nnz nonzeros costs O(nnz) storage and sparse
    solvers exploit structure for O(nnz * log(nnz)) or better. scipy.sparse provides CSR
    (Compressed Sparse Row), CSC (Compressed Sparse Column), and COO (Coordinate) formats.
    Common mistake: building a sparse matrix element-by-element with lil_matrix, then using
    it directly for computation — lil is fast for construction but slow for arithmetic. Always
    convert to CSR/CSC before matrix operations. Another mistake: using dense operations on
    sparse matrices (e.g., np.linalg.solve instead of scipy.sparse.linalg.spsolve).
  how_to_do_right: |
    1. Construction: use scipy.sparse.coo_matrix or lil_matrix, then convert to CSR/CSC.
    2. Row slicing, mat-vec (Ax): use CSR (compressed by row).
    3. Column slicing, direct solvers: use CSC (compressed by column).
    4. Solve sparse Ax=b: scipy.sparse.linalg.spsolve(A_csc, b).
    5. Eigenvalues of sparse: scipy.sparse.linalg.eigsh() (symmetric) or eigs() (general).
       Only computes k smallest/largest eigenvalues — O(nnz*k) not O(n^3).
    6. Never convert sparse to dense for operations — defeats the purpose.
    7. Check sparsity: nnz / (m*n) < 0.1 → use sparse; > 0.3 → dense is likely faster.
    8. For ML: sklearn handles sparse matrices natively (TF-IDF, CountVectorizer produce sparse).
  severity: high
  technologies:
    lang: [python]
    library: [scipy, numpy, sklearn]
  domains:
    domain: [mathematics, numerical_computing]
    concern: [performance, scientific_computing, nlp]
  example_good: |
    import numpy as np
    from scipy import sparse
    from scipy.sparse.linalg import spsolve, eigsh

    # Build sparse matrix (e.g., 1D Laplacian: tridiagonal)
    n = 100_000
    diag_main = 2 * np.ones(n)
    diag_off = -1 * np.ones(n - 1)

    # COO for construction, then convert to CSR for computation
    A = sparse.diags([diag_off, diag_main, diag_off], [-1, 0, 1],
                     shape=(n, n), format='csr')

    print(f"Shape: {A.shape}")
    print(f"Nonzeros: {A.nnz:,}")        # 299,998
    print(f"Sparsity: {1 - A.nnz/(n*n):.8f}")  # 0.99999700

    # Memory comparison
    dense_bytes = n * n * 8  # 80 GB for dense!
    sparse_bytes = A.data.nbytes + A.indices.nbytes + A.indptr.nbytes
    print(f"Dense: {dense_bytes/1e9:.1f} GB")
    print(f"Sparse: {sparse_bytes/1e6:.1f} MB")

    # Solve sparse system: ~0.1s vs hours for dense
    b = np.ones(n)
    x = spsolve(A.tocsc(), b)  # Convert to CSC for direct solver
    print(f"Solution norm: {np.linalg.norm(x):.4f}")

    # Sparse eigenvalues (only compute 5 smallest)
    eigenvalues, _ = eigsh(A, k=5, which='SM')
    print(f"5 smallest eigenvalues: {eigenvalues}")
  example_bad: |
    import numpy as np

    n = 100_000

    # BAD 1: Dense allocation — 80 GB! Will crash.
    # A = np.zeros((n, n))  # MemoryError on most machines

    # BAD 2: Building sparse matrix element-by-element (slow)
    from scipy import sparse
    A = sparse.lil_matrix((10000, 10000))
    for i in range(10000):
        A[i, i] = 2.0
        if i > 0: A[i, i-1] = -1.0
        if i < 9999: A[i, i+1] = -1.0
    # This loop is O(n) but lil_matrix is slow for arithmetic
    # Convert before computing: A_csr = A.tocsr()

    # BAD 3: Converting sparse to dense for solve
    A_dense = A.toarray()  # Defeats the purpose — now O(n^2) memory
    x = np.linalg.solve(A_dense, b)  # O(n^3) instead of O(nnz)
    # Use scipy.sparse.linalg.spsolve(A.tocsc(), b)

    # BAD 4: Using dense eigenvalue solver on sparse matrix
    eigenvalues = np.linalg.eigvalsh(A.toarray())  # O(n^3) for ALL eigenvalues
    # Use scipy.sparse.linalg.eigsh(A, k=5) for just the k you need
  when_applies: "Large linear systems, graph algorithms, NLP (term-document matrices), finite element methods, recommendation systems"
  sources:
    - "https://docs.scipy.org/doc/scipy/reference/sparse.html"
    - "https://en.wikipedia.org/wiki/Sparse_matrix"

- id: MATH-NUM-008
  text: >
    Interpolation vs Extrapolation — Interpolation (estimating values within the range
    of known data) is generally safe and well-bounded. Extrapolation (estimating values
    outside the known range) is dangerous and unreliable. Polynomial extrapolation is
    especially treacherous — high-degree polynomials oscillate wildly outside the data
    range (Runge's phenomenon). Use extrapolation only with strong domain knowledge.
  why: >
    A polynomial fitted perfectly through 10 data points (degree 9) may give reasonable
    values between the points but explode to +/- infinity just slightly outside the range.
    This is Runge's phenomenon: high-degree polynomial interpolation near equally-spaced
    points exhibits large oscillations at the edges. Linear extrapolation is safer but still
    assumes the trend continues unchanged — a linear model of stock prices would predict
    negative prices eventually. A real-world disaster: a power plant extrapolated a cooling
    curve 20% beyond measured data using a cubic fit. The cubic diverged sharply, predicting
    safe temperatures when actual temperatures exceeded safety limits. Use splines for
    interpolation (piecewise low-degree polynomials) and be extremely cautious with any
    extrapolation beyond ~5-10% of the data range.
  how_to_do_right: |
    1. Interpolation: use scipy.interpolate.interp1d(kind='cubic') or CubicSpline.
    2. For scattered 2D data: scipy.interpolate.griddata() or RBF interpolation.
    3. NEVER extrapolate with high-degree polynomials. If you must extrapolate, use:
       - Linear extrapolation (simplest, bounded growth).
       - Physics-based models (exponential decay, power law) if you know the functional form.
       - Gaussian Processes with appropriate kernel (provide uncertainty estimates).
    4. Always set fill_value='extrapolate' with extreme caution and VALIDATE against holdout data.
    5. For equally-spaced data: use Chebyshev nodes to avoid Runge's phenomenon.
    6. For noisy data: use regression/smoothing splines, not interpolation (don't fit noise).
    7. Report: "Extrapolation beyond x=X_max is unreliable" in any analysis that extrapolates.
  severity: high
  technologies:
    lang: [python]
    library: [scipy, numpy]
  domains:
    domain: [mathematics, numerical_computing]
    concern: [scientific_computing, data_science, forecasting]
  example_good: |
    import numpy as np
    from scipy.interpolate import CubicSpline, interp1d

    # Known data points
    x_data = np.array([0, 1, 2, 3, 4, 5])
    y_data = np.array([1.0, 2.7, 7.4, 20.1, 54.6, 148.4])  # exp(x)

    # SAFE: Cubic spline interpolation (within data range)
    cs = CubicSpline(x_data, y_data)
    x_interp = np.linspace(0, 5, 100)
    y_interp = cs(x_interp)
    print(f"Interpolated at x=2.5: {cs(2.5):.2f}")  # ~12.2 (true: 12.18)

    # DANGEROUS: Extrapolation — show the risk
    x_extrap = np.array([6, 7, 8])
    y_extrap_spline = cs(x_extrap)
    y_true = np.exp(x_extrap)

    print(f"\n{'x':>5}  {'Spline':>10}  {'True':>10}  {'Error%':>10}")
    for x, ys, yt in zip(x_extrap, y_extrap_spline, y_true):
        err = abs(ys - yt) / yt * 100
        print(f"{x:5.0f}  {ys:10.1f}  {yt:10.1f}  {err:9.1f}%")
    # Error grows rapidly with extrapolation distance

    # BETTER for extrapolation: fit known functional form
    from scipy.optimize import curve_fit
    popt, _ = curve_fit(lambda x, a, b: a * np.exp(b * x), x_data, y_data)
    y_model = popt[0] * np.exp(popt[1] * x_extrap)
    print(f"\nExponential fit at x=8: {y_model[2]:.1f} (true: {y_true[2]:.1f})")
  example_bad: |
    import numpy as np

    # BAD: High-degree polynomial extrapolation
    x = np.array([0, 1, 2, 3, 4, 5])
    y = np.array([1.0, 2.7, 7.4, 20.1, 54.6, 148.4])

    # Degree 5 polynomial — fits data perfectly but extrapolates wildly
    poly_coeffs = np.polyfit(x, y, deg=5)
    poly = np.poly1d(poly_coeffs)

    print(f"At x=5 (in range):  {poly(5):.1f} (true: 148.4)")   # OK
    print(f"At x=6 (just out):  {poly(6):.1f} (true: 403.4)")   # Way off
    print(f"At x=10 (far out):  {poly(10):.1f} (true: 22026.5)") # Catastrophic

    # BAD: Blindly using fill_value='extrapolate'
    from scipy.interpolate import interp1d
    f = interp1d(x, y, kind='cubic', fill_value='extrapolate')
    print(f"Extrapolated x=10: {f(10):.1f}")
    # No warning, no uncertainty — just a wrong number
  when_applies: "Curve fitting, data analysis, forecasting, any model prediction beyond training data range"
  sources:
    - "https://docs.scipy.org/doc/scipy/reference/interpolate.html"
    - "https://en.wikipedia.org/wiki/Extrapolation"

- id: MATH-NUM-009
  text: >
    Numerical Integration — Simpson's rule is often sufficient for smooth functions.
    Gauss quadrature achieves the same accuracy with fewer function evaluations. For
    oscillatory or singular integrands, use specialized routines (scipy.integrate.quad
    handles most cases automatically). Always specify error tolerance and check the
    reported error estimate.
  why: >
    The trapezoidal rule has O(h^2) error; Simpson's has O(h^4) — meaning 10x more points
    gives 10,000x better accuracy with Simpson's vs 100x with trapezoidal. Gauss-Legendre
    quadrature with n points is exact for polynomials of degree up to 2n-1, making it
    extremely efficient for smooth functions. However, for functions with singularities
    (e.g., 1/sqrt(x) near 0) or oscillations (e.g., sin(1000x)), fixed-point rules fail.
    scipy.integrate.quad() uses adaptive Gauss-Kronrod quadrature that automatically refines
    the mesh where the integrand is difficult. It also returns an error estimate — ALWAYS check
    it. For multidimensional integrals, Monte Carlo integration scales as O(1/sqrt(N)) regardless
    of dimension, while grid methods scale as O(N^(-2/d)) — in d>4 dimensions, Monte Carlo wins.
  how_to_do_right: |
    1. Default for 1D: scipy.integrate.quad(f, a, b) — adaptive, handles singularities.
    2. Always check the error estimate: result, error = quad(f, a, b).
    3. For smooth periodic functions: trapezoidal rule is spectacularly good (exponential convergence).
    4. For known singularities: inform quad: quad(f, 0, 1, points=[0.5]) or use weight functions.
    5. For infinite domains: quad(f, 0, np.inf) handles it via variable substitution.
    6. For multidimensional: scipy.integrate.dblquad, tplquad (up to 3D), or Monte Carlo for d>3.
    7. For sampled data (no function, just points): scipy.integrate.trapezoid() or simpson().
    8. Verify: integrate a known function first (e.g., integral of sin(x) from 0 to pi = 2.0).
  severity: medium
  technologies:
    lang: [python]
    library: [scipy, numpy]
  domains:
    domain: [mathematics, numerical_computing]
    concern: [scientific_computing, physics]
  example_good: |
    import numpy as np
    from scipy import integrate

    # 1. Adaptive quadrature (best default for 1D)
    result, error = integrate.quad(lambda x: np.exp(-x**2), -np.inf, np.inf)
    print(f"Integral of exp(-x^2) over R: {result:.10f} (error: {error:.2e})")
    print(f"True value (sqrt(pi)):         {np.sqrt(np.pi):.10f}")
    # 1.7724538509 (matches to 15 digits)

    # 2. Simpson's rule for sampled data
    x = np.linspace(0, np.pi, 101)  # 101 points (must be odd for Simpson)
    y = np.sin(x)
    simps_result = integrate.simpson(y, x=x)
    print(f"Simpson integral of sin(x) [0,pi]: {simps_result:.10f}")  # ~2.0

    # 3. Handling singularity: integral of 1/sqrt(x) from 0 to 1 = 2
    result, error = integrate.quad(lambda x: 1/np.sqrt(x), 0, 1)
    print(f"Integral of 1/sqrt(x) [0,1]: {result:.10f} (error: {error:.2e})")
    # quad handles the singularity at x=0 automatically

    # 4. Gauss-Legendre quadrature (explicit, for special needs)
    nodes, weights = np.polynomial.legendre.leggauss(5)
    # Transform [-1,1] to [0,1]: x = (t+1)/2, dx = dt/2
    gauss_result = 0.5 * np.sum(weights * np.sin(np.pi * (nodes + 1) / 2))
    print(f"Gauss-Legendre (5 points): {gauss_result:.6f}")
  example_bad: |
    import numpy as np

    # BAD 1: Trapezoidal rule with too few points for oscillatory function
    x = np.linspace(0, 10, 11)  # Only 11 points
    y = np.sin(10 * x)          # Oscillates 10 cycles in [0,10]
    trap_result = np.trapz(y, x)
    true_result = (1 - np.cos(100)) / 10  # Exact integral

    print(f"Trapezoidal (11 points): {trap_result:.6f}")
    print(f"True value:              {true_result:.6f}")
    # Catastrophically wrong — 11 points cannot resolve 10 oscillation cycles

    # BAD 2: Ignoring the error estimate from quad
    result, error = integrate.quad(lambda x: np.exp(x*100), 0, 1)
    # If error >> result, the answer is meaningless — but this code ignores error

    # BAD 3: Using fixed grid for singular integrand
    x = np.linspace(0.001, 1, 100)  # Skipping singularity at 0
    y = 1 / np.sqrt(x)
    print(f"Trapz (skip 0): {np.trapz(y, x):.4f}")  # Misses contribution near 0
    # True answer is 2.0; skipping near-zero region gives ~1.94
  when_applies: "Computing integrals, probability distributions, physics simulations, area/volume calculations"
  sources:
    - "https://docs.scipy.org/doc/scipy/reference/integrate.html"
    - "https://en.wikipedia.org/wiki/Numerical_integration"

- id: MATH-NUM-010
  text: >
    Overflow, Underflow, and Log-Space Computation — When multiplying many probabilities
    or computing large exponentials, use log-space arithmetic to avoid overflow (result > 1e308
    → inf) and underflow (result < 5e-324 → 0). The log-sum-exp trick is essential for
    numerically stable softmax, Bayesian computations, and any product of many small numbers.
  why: >
    Multiplying 1000 probabilities of 0.01: 0.01^1000 = 10^(-2000), which underflows to 0.0
    in float64. In log-space: 1000 * log(0.01) = -4605.17 — perfectly representable. The
    softmax function exp(x_i)/sum(exp(x_j)) overflows when max(x) > 709 (exp(710) = inf in
    float64) and underflows when min(x) < -745. The log-sum-exp trick: log(sum(exp(x_i))) =
    max(x) + log(sum(exp(x_i - max(x)))). By subtracting max(x), the largest exponent becomes
    exp(0)=1 and all others are <= 1, preventing overflow. In HMMs, speech recognition, and
    language models, forward/backward probabilities underflow after ~100 time steps without
    log-space computation, producing silent wrong answers (0.0 * anything = 0.0).
  how_to_do_right: |
    1. Products of many small numbers → sums in log-space: log(a*b*c) = log(a)+log(b)+log(c).
    2. Ratios of products → differences in log-space: log(a/b) = log(a) - log(b).
    3. Log-sum-exp for log(sum(exp(x))): scipy.special.logsumexp(x) or:
       max_x = max(x); result = max_x + log(sum(exp(x - max_x)))
    4. Softmax: scipy.special.softmax(x) already uses the log-sum-exp trick internally.
    5. For Bayesian: work with log-likelihoods, not likelihoods.
    6. Check for inf/nan after exponentiation: if any result is inf or nan, you need log-space.
    7. numpy.logaddexp(a, b) computes log(exp(a)+exp(b)) stably for just 2 values.
    8. Overflow boundary: exp(709.78) is max finite float64. exp(709.79) = inf.
    9. Underflow boundary: exp(-745.13) is min positive float64 subnormal. exp(-745.14) = 0.0.
  severity: critical
  technologies:
    lang: [python]
    library: [numpy, scipy]
  domains:
    domain: [mathematics, numerical_computing]
    concern: [machine_learning, probabilistic_computing, statistics]
  example_good: |
    import numpy as np
    from scipy.special import logsumexp, softmax

    # 1. Product of many small probabilities — use log-space
    probs = np.full(1000, 0.01)  # 1000 probabilities of 0.01

    # BAD: direct product underflows to 0.0
    direct_product = np.prod(probs)
    print(f"Direct product: {direct_product}")  # 0.0 (underflow!)

    # GOOD: sum in log-space
    log_product = np.sum(np.log(probs))
    print(f"Log-space: {log_product:.2f}")  # -4605.17 (exact)

    # 2. Log-sum-exp trick for softmax
    logits = np.array([1000, 1001, 1002])  # Huge values → exp overflows

    # BAD: naive softmax overflows
    # exp_logits = np.exp(logits)  # [inf, inf, inf]

    # GOOD: scipy's logsumexp handles it
    log_normalizer = logsumexp(logits)
    log_probs = logits - log_normalizer
    probs = np.exp(log_probs)
    print(f"Stable softmax: {probs}")  # [0.090, 0.245, 0.665]

    # Or just use scipy.special.softmax directly
    print(f"scipy softmax:  {softmax(logits)}")  # Same result

    # 3. Stable log(sum(exp(x))) manually
    def stable_logsumexp(x):
        c = np.max(x)
        return c + np.log(np.sum(np.exp(x - c)))

    print(f"Manual LSE: {stable_logsumexp(logits):.4f}")
  example_bad: |
    import numpy as np

    # BAD 1: Naive softmax — overflows with large logits
    logits = np.array([1000, 1001, 1002])
    exp_logits = np.exp(logits)         # [inf, inf, inf]
    softmax_bad = exp_logits / exp_logits.sum()  # inf/inf = nan
    print(f"Naive softmax: {softmax_bad}")  # [nan, nan, nan]

    # BAD 2: Direct probability products — underflows
    log_likelihood = 1.0
    for i in range(500):
        log_likelihood *= 0.1  # After ~324 iterations: 0.0

    # BAD 3: Not using logsumexp for Bayesian model comparison
    log_evidences = np.array([-500, -501, -502])
    # BAD: exponentiating directly
    evidences = np.exp(log_evidences)  # All 0.0 (underflow)
    posterior = evidences / evidences.sum()  # 0/0 = nan

    # GOOD: use logsumexp
    from scipy.special import logsumexp
    log_total = logsumexp(log_evidences)
    log_posterior = log_evidences - log_total
    posterior = np.exp(log_posterior)  # [0.665, 0.245, 0.090]
  when_applies: "Bayesian inference, softmax, HMMs, language models, any product of many probabilities"
  sources:
    - "https://docs.scipy.org/doc/scipy/reference/generated/scipy.special.logsumexp.html"
    - "https://en.wikipedia.org/wiki/LogSumExp"

- id: MATH-NUM-011
  text: >
    Decimal vs Float for Money — ALWAYS use decimal.Decimal for financial calculations.
    Floats CANNOT represent 0.10 exactly (it is 0.1000000000000000055511151231257827021181583404541015625).
    A single float addition error of $0.000000001 per transaction, compounded over billions
    of transactions, produces real discrepancies. Financial regulations (SOX, PCI-DSS) require
    exact arithmetic. Use Decimal with explicit precision context.
  why: >
    The classic example: 0.1 + 0.2 = 0.30000000000000004 in float. For a single operation
    this seems trivial, but in financial systems processing millions of transactions daily,
    these errors compound. A real-world case: a brokerage firm's float-based portfolio system
    showed a $0.01 discrepancy per account per day. With 500,000 accounts, this was $5,000/day
    or $1.8M/year in unexplained P&L differences. The fix took 3 months of engineering time
    to migrate to Decimal. Banks use fixed-point arithmetic (integers representing cents/millicents)
    or Decimal types. Python's decimal.Decimal uses arbitrary-precision decimal arithmetic —
    0.1 + 0.2 = 0.3 exactly. Always set a Decimal context with appropriate precision (28 digits
    default) and define rounding mode (ROUND_HALF_EVEN is the banking standard — "banker's rounding").
  how_to_do_right: |
    1. ALWAYS use decimal.Decimal for money. Never float.
    2. Create Decimals from STRINGS: Decimal('0.10'), NOT Decimal(0.1) (which inherits float error).
    3. Set context: decimal.getcontext().prec = 28 (default, sufficient for most financial work).
    4. Rounding: use ROUND_HALF_EVEN (banker's rounding) — Decimal('2.5').quantize(Decimal('1'), ROUND_HALF_EVEN) = 2.
    5. Store as integers (cents/millicents) in databases: $10.53 → 1053 cents or 10530 millicents.
    6. When receiving float from external API: Decimal(str(float_value)) to limit damage.
    7. Never mix float and Decimal arithmetic — Python raises TypeError (by design).
    8. For currency display: use locale module or format with .quantize(Decimal('0.01')).
  severity: critical
  technologies:
    lang: [python]
    library: [decimal]
  domains:
    domain: [mathematics, financial_computing]
    concern: [correctness, compliance]
  example_good: |
    from decimal import Decimal, ROUND_HALF_EVEN, getcontext

    # Set precision context
    getcontext().prec = 28

    # ALWAYS create from strings
    price = Decimal('19.99')
    tax_rate = Decimal('0.0825')
    quantity = 3

    subtotal = price * quantity
    tax = subtotal * tax_rate
    total = subtotal + tax

    # Round to cents with banker's rounding
    tax_rounded = tax.quantize(Decimal('0.01'), rounding=ROUND_HALF_EVEN)
    total_rounded = (subtotal + tax_rounded).quantize(Decimal('0.01'))

    print(f"Subtotal: ${subtotal}")           # $59.97
    print(f"Tax:      ${tax_rounded}")         # $4.95
    print(f"Total:    ${total_rounded}")        # $64.92

    # Verification: exact arithmetic
    assert Decimal('0.1') + Decimal('0.2') == Decimal('0.3')  # True!

    # Integer storage for database (cents)
    cents = int(total_rounded * 100)
    print(f"Store as cents: {cents}")  # 6492

    # Reconstruct from cents
    restored = Decimal(cents) / Decimal('100')
    assert restored == total_rounded
  example_bad: |
    # BAD: Using floats for money
    price = 19.99
    tax_rate = 0.0825
    quantity = 3

    subtotal = price * quantity     # 59.96999999999999 (NOT 59.97)
    tax = subtotal * tax_rate       # 4.947524999999999
    total = subtotal + tax          # 64.91752499999999

    print(f"Total: ${total:.2f}")   # $64.92 (looks right but intermediate values are WRONG)

    # BAD: This causes real problems at scale
    balance = 0.0
    for _ in range(1_000_000):
        balance += 0.01  # Adding 1 cent, 1M times
    print(f"Expected: $10000.00")
    print(f"Got:      ${balance:.10f}")  # $9999.9999999980838... (off by ~$0.000000002)

    # BAD: Creating Decimal from float (inherits the float error!)
    from decimal import Decimal
    bad = Decimal(0.1)
    print(bad)  # 0.1000000000000000055511151231257827021181583404541015625
    good = Decimal('0.1')
    print(good)  # 0.1 (exact)
  when_applies: "Any financial calculation, e-commerce, banking, accounting, invoice generation, tax computation"
  sources:
    - "https://docs.python.org/3/library/decimal.html"
    - "https://docs.python.org/3/tutorial/floatingpoint.html"

- id: MATH-NUM-012
  text: >
    Reproducibility — Numerical results MUST be reproducible across runs. Set random seeds
    explicitly, be aware of non-determinism from parallel execution and different hardware
    (CPU vs GPU, x86 vs ARM), and pin library versions. Without reproducibility, you cannot
    debug, validate, or audit numerical results.
  why: >
    A ML team trained a model 5 times with "the same" code and got accuracy ranging from 78%
    to 86% because they did not set random seeds. They reported the best run (86%) in their
    paper — classic cherry-picking. When reviewers could not reproduce the results, the paper
    was rejected. Even with seeds set, results can differ between CPU and GPU (different
    floating-point operation ordering), between numpy/torch versions (algorithm changes), and
    between x86 and ARM (different FMA behavior). CUDA operations are non-deterministic by
    default (atomicAdd has race conditions). Python's hash() is randomized per session (since
    3.3, PYTHONHASHSEED). Reproducibility is not optional — it is a prerequisite for scientific
    validity, regulatory compliance (FDA, SOX), and debugging.
  how_to_do_right: |
    1. Set ALL random seeds at the start of every script:
       - random.seed(42)
       - numpy.random.seed(42) (legacy) or use numpy.random.default_rng(42)
       - torch.manual_seed(42) + torch.cuda.manual_seed_all(42)
       - Set PYTHONHASHSEED=42 environment variable.
    2. For CUDA: torch.backends.cudnn.deterministic = True; torch.backends.cudnn.benchmark = False.
    3. Pin exact library versions: pip freeze > requirements.txt or use poetry.lock.
    4. Record: Python version, OS, CPU architecture, GPU model, driver version.
    5. Use numpy.random.Generator (new API) instead of numpy.random.* (legacy global state):
       rng = numpy.random.default_rng(42) — thread-safe and statistically better.
    6. For parallel code: deterministic reduction order (no atomicAdd) or accept documented variance.
    7. Version control your data (DVC) and random splits.
    8. Run experiments 3-5 times with different seeds and report mean +/- std.
  severity: high
  technologies:
    lang: [python]
    library: [numpy, torch, random]
  domains:
    domain: [mathematics, machine_learning]
    concern: [reproducibility, scientific_computing]
  example_good: |
    import os
    import random
    import numpy as np

    def set_all_seeds(seed: int = 42):
        """Set all random seeds for reproducibility."""
        # Python built-in
        random.seed(seed)

        # NumPy (new API — preferred)
        # Use rng = np.random.default_rng(seed) for new code

        # NumPy (legacy API — for backward compatibility)
        np.random.seed(seed)

        # Python hash seed
        os.environ['PYTHONHASHSEED'] = str(seed)

        # PyTorch (if available)
        try:
            import torch
            torch.manual_seed(seed)
            torch.cuda.manual_seed_all(seed)
            torch.backends.cudnn.deterministic = True
            torch.backends.cudnn.benchmark = False
        except ImportError:
            pass

    # Usage
    set_all_seeds(42)

    # New NumPy API (recommended for new code) — independent generators
    rng = np.random.default_rng(42)
    data1 = rng.normal(0, 1, size=100)

    rng2 = np.random.default_rng(42)
    data2 = rng2.normal(0, 1, size=100)

    assert np.array_equal(data1, data2)  # Always True

    # Report reproducibility info
    print(f"NumPy version: {np.__version__}")
    print(f"Python version: {os.sys.version}")
    print(f"Seed: 42")
  example_bad: |
    import numpy as np

    # BAD 1: No seed set — different results every run
    data = np.random.randn(100)
    model_accuracy = train_model(data)  # 78% this run, 86% next run

    # BAD 2: Using global numpy random state (not thread-safe)
    np.random.seed(42)
    # ... 1000 lines later in another module ...
    np.random.seed(0)  # Someone else resets the global seed!
    # Your "seeded" results are now different

    # BAD 3: Reporting only the best of 5 runs
    results = [0.78, 0.82, 0.79, 0.86, 0.81]
    print(f"Our method achieves {max(results):.0%} accuracy")  # Cherry-picked!
    # Should report: "82.1% +/- 2.9% (mean +/- std, n=5 seeds)"

    # BAD 4: Different results on CPU vs GPU (CUDA non-determinism)
    # torch.backends.cudnn.deterministic = False (default!)
    # atomicAdd in CUDA has race conditions → different sums each run
  when_applies: "ML experiments, scientific simulations, any code with random components, regulated environments"
  sources:
    - "https://numpy.org/doc/stable/reference/random/generator.html"
    - "https://en.wikipedia.org/wiki/Reproducibility"

- id: MATH-NUM-013
  text: >
    Numerical Differentiation vs Automatic Differentiation — Finite differences (f(x+h)-f(x))/h
    suffer from a fundamental tradeoff: small h amplifies rounding errors, large h amplifies
    truncation errors. The optimal h for float64 is ~sqrt(epsilon) ~= 1.5e-8 for forward
    differences, giving only ~8 digits of accuracy. Use automatic differentiation (autograd,
    JAX, PyTorch) for machine-precision derivatives with no truncation error.
  why: >
    Forward finite difference has O(h) truncation error but O(epsilon/h) rounding error. The
    optimal h minimizes both: h_opt = sqrt(epsilon) ~ 1.5e-8, giving total error ~sqrt(epsilon)
    ~ 1.5e-8 (only 8 digits). Central differences ((f(x+h)-f(x-h))/(2h)) have O(h^2) truncation,
    optimal h = epsilon^(1/3) ~ 6e-6, total error ~ 1e-11 (11 digits). Complex-step derivative
    (Im(f(x+ih))/h) avoids cancellation entirely, giving full precision for any small h — but
    requires f to work with complex numbers. Automatic differentiation (AD) computes exact
    derivatives (to machine precision) by applying the chain rule to every elementary operation.
    It has NO truncation error and costs only 2-5x a single function evaluation (vs 2n evaluations
    for n-dimensional finite differences). PyTorch, JAX, and TensorFlow all implement reverse-mode
    AD — use it instead of finite differences whenever possible.
  how_to_do_right: |
    1. For ML/optimization: use autograd (PyTorch, JAX, TensorFlow). NEVER use finite differences.
    2. If autograd is unavailable, use central differences: (f(x+h)-f(x-h))/(2h) with h=1e-5.
    3. For highest accuracy without AD: complex-step method: Im(f(x + 1j*h)) / h (any small h, e.g., 1e-30).
    4. scipy.misc.derivative(f, x, dx=1e-5, n=1, order=3) — uses central differences internally.
    5. For Jacobians: scipy.optimize.approx_fprime(x, f, epsilon=1.5e-8).
    6. Verify derivatives: compare AD/finite-diff results on test functions with known derivatives.
    7. Higher-order derivatives: error amplifies exponentially — use AD or symbolic differentiation.
    8. For gradient-based optimization: always prefer AD. Finite differences scale as O(n) extra evaluations.
  severity: high
  technologies:
    lang: [python]
    library: [scipy, numpy, torch, jax]
  domains:
    domain: [mathematics, numerical_computing]
    concern: [machine_learning, optimization, scientific_computing]
  example_good: |
    import numpy as np
    from scipy.misc import derivative

    # Target: f(x) = sin(x), f'(x) = cos(x)
    f = np.sin
    x = 1.0
    true_deriv = np.cos(x)  # 0.5403023058681398

    # Method 1: Forward difference (worst — O(sqrt(eps)) error)
    h = 1.5e-8  # optimal h for forward difference
    fd_forward = (f(x + h) - f(x)) / h
    print(f"Forward diff:  {fd_forward:.15f} (error: {abs(fd_forward-true_deriv):.2e})")
    # error ~1e-8

    # Method 2: Central difference (better — O(eps^(2/3)) error)
    h = 6e-6  # optimal h for central difference
    fd_central = (f(x + h) - f(x - h)) / (2 * h)
    print(f"Central diff:  {fd_central:.15f} (error: {abs(fd_central-true_deriv):.2e})")
    # error ~1e-11

    # Method 3: Complex-step (best without AD — full precision)
    h_complex = 1e-30
    fd_complex = np.imag(np.sin(x + 1j * h_complex)) / h_complex
    print(f"Complex step:  {fd_complex:.15f} (error: {abs(fd_complex-true_deriv):.2e})")
    # error ~1e-16 (machine precision!)

    # Method 4: Automatic differentiation with JAX (exact)
    try:
        import jax
        import jax.numpy as jnp
        grad_sin = jax.grad(jnp.sin)
        ad_deriv = float(grad_sin(1.0))
        print(f"JAX autograd:  {ad_deriv:.15f} (error: {abs(ad_deriv-true_deriv):.2e})")
    except ImportError:
        print("JAX not installed — AD unavailable")

    # scipy convenience function (uses central differences internally)
    scipy_deriv = derivative(f, x, dx=1e-5, n=1, order=3)
    print(f"scipy deriv:   {scipy_deriv:.15f} (error: {abs(scipy_deriv-true_deriv):.2e})")
  example_bad: |
    import numpy as np

    # BAD 1: Forward difference with poorly chosen h
    f = np.sin
    x = 1.0
    true = np.cos(1.0)

    # h too large → truncation error dominates
    h_big = 0.1
    fd_big = (f(x + h_big) - f(x)) / h_big
    print(f"h=0.1: error={abs(fd_big - true):.6f}")  # error ~0.05

    # h too small → rounding error dominates (catastrophic cancellation)
    h_tiny = 1e-16
    fd_tiny = (f(x + h_tiny) - f(x)) / h_tiny
    print(f"h=1e-16: error={abs(fd_tiny - true):.6f}")  # error ~0.5 (WRONG)
    # f(x+h) and f(x) are identical in float64 → (0.0)/h = 0.0

    # BAD 2: Finite differences for gradient-based optimization
    # Gradient of 1000-dimensional function requires 1001 function evaluations
    # (forward diff) or 2000 (central diff) vs. 1 backward pass with AD.
    # This is ~1000x slower than autograd — NEVER do this for ML.

    # BAD 3: Higher-order finite differences (error amplifies)
    # Second derivative: (f(x+h) - 2f(x) + f(x-h)) / h^2
    # Error is O(epsilon / h^2) — with h=1e-5, error ~1e-6 (only 6 digits)
  when_applies: "Computing derivatives, gradients, Jacobians, Hessians, sensitivity analysis, optimization"
  sources:
    - "https://docs.scipy.org/doc/scipy/reference/generated/scipy.misc.derivative.html"
    - "https://en.wikipedia.org/wiki/Numerical_differentiation"
    - "https://docs.oracle.com/cd/E19957-01/806-3568/ncg_goldberg.html"
