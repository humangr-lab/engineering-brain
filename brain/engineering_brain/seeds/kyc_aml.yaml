layer: rules
domain: fintech
knowledge:
- id: FIN-KYC-001
  text: "Customer Due Diligence (CDD) tiers: implement 3 levels — Simplified (low-risk, limited features), Standard (full identity verification), and Enhanced (high-risk customers, PEPs, high-volume traders). Gate platform features by CDD tier."
  why: >
    Applying full KYC to every user creates friction that kills conversion — 60% of users abandon
    onboarding if forced to upload documents before seeing the product. But allowing unrestricted
    access without KYC enables money laundering. Tiered CDD balances UX with compliance. A Brazilian
    fintech increased onboarding completion from 35% to 78% by letting users explore with Simplified
    CDD and requiring Standard only at first transaction.
  how_to_do_right: |
    1. Simplified CDD: name, email, CPF/SSN — allows browsing, small deposits (< R$1K/month)
    2. Standard CDD: full identity verification (document + selfie), address proof — full features
    3. Enhanced CDD: source of funds declaration, additional document verification — for PEPs, high-volume
    4. Gate features by tier: withdrawal requires Standard, deposits > R$10K require Enhanced
    5. Store CDD tier and verification timestamps per user
    6. Re-verify periodically: Standard every 2 years, Enhanced every 1 year
    7. Log all tier transitions with reason and verifying actor
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [fintech, compliance, security]
    concern: [domain_specific]
  example_good: |
    from enum import Enum

    class CDDTier(str, Enum):
        SIMPLIFIED = "simplified"
        STANDARD = "standard"
        ENHANCED = "enhanced"

    CDD_FEATURE_GATES = {
        CDDTier.SIMPLIFIED: {"browse", "small_deposit"},  # < R$1K/month
        CDDTier.STANDARD: {"browse", "deposit", "withdraw", "trade"},
        CDDTier.ENHANCED: {"browse", "deposit", "withdraw", "trade", "large_deposit", "api_access"},
    }

    CDD_LIMITS = {
        CDDTier.SIMPLIFIED: {"monthly_deposit_cents": 100_000, "single_tx_cents": 50_000},
        CDDTier.STANDARD: {"monthly_deposit_cents": 5_000_000, "single_tx_cents": 1_000_000},
        CDDTier.ENHANCED: {"monthly_deposit_cents": 50_000_000, "single_tx_cents": 10_000_000},
    }

    def check_feature_access(user_cdd_tier: CDDTier, feature: str) -> bool:
        return feature in CDD_FEATURE_GATES.get(user_cdd_tier, set())

    async def check_transaction_limits(
        user: User, amount_cents: int
    ) -> bool:
        limits = CDD_LIMITS[user.cdd_tier]
        if amount_cents > limits["single_tx_cents"]:
            return False
        monthly_total = await get_monthly_volume(user.id)
        return monthly_total + amount_cents <= limits["monthly_deposit_cents"]
  example_bad: |
    # WRONG: No tiering — full KYC upfront kills conversion
    @app.post("/register")
    async def register(user_data: dict):
        # Require document upload, selfie, address proof just to create account
        if not user_data.get("document_front"):
            raise HTTPException(400, "Document required")  # 60% abandon here

    # WRONG: No KYC at all — regulatory violation
    @app.post("/deposit")
    async def deposit(amount: int):
        process_deposit(amount)  # No identity check, no limits
  when_applies: "Any regulated fintech, prediction markets, platforms handling real money"
  sources: ["https://www.fatf-gafi.org/en/publications/Fatfgeneral/Financial-inclusion-cdd-2017.html"]

- id: FIN-KYC-002
  text: "Enhanced Due Diligence (EDD) triggers: automatically escalate to EDD when detecting high-risk indicators — PEP status, sanctioned country, high transaction volume, adverse media, or complex ownership structures. EDD must include source of funds verification."
  why: >
    Regulators expect platforms to apply EDD proportionally to risk. Missing EDD triggers means
    serving high-risk customers with inadequate controls, which results in regulatory fines and
    potential criminal liability. A European fintech was fined EUR 4.7M because they did not
    apply EDD to customers from high-risk jurisdictions — they treated all customers the same.
  how_to_do_right: |
    1. Define EDD triggers: PEP match, sanctioned country, monthly volume > R$50K, adverse media hit
    2. Automatically flag accounts that match any trigger
    3. Require source of funds documentation for flagged accounts
    4. Require manual compliance review before re-enabling flagged accounts
    5. Store EDD assessment with: trigger reason, reviewer, decision, date
    6. Re-assess EDD accounts quarterly
    7. Block transactions from flagged accounts until EDD is completed
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [fintech, compliance, security]
    concern: [domain_specific]
  example_good: |
    from dataclasses import dataclass

    @dataclass
    class EDDTrigger:
        trigger_type: str
        description: str
        auto_block: bool

    EDD_TRIGGERS = [
        EDDTrigger("PEP", "Customer matches PEP database", auto_block=True),
        EDDTrigger("HIGH_RISK_COUNTRY", "Customer from FATF grey/black list country", auto_block=True),
        EDDTrigger("HIGH_VOLUME", "Monthly volume > R$50K", auto_block=False),
        EDDTrigger("ADVERSE_MEDIA", "Negative news screening hit", auto_block=True),
        EDDTrigger("COMPLEX_OWNERSHIP", "Beneficial ownership unclear", auto_block=True),
    ]

    async def check_edd_triggers(user: User) -> list[EDDTrigger]:
        triggered = []
        if await pep_screening(user.full_name, user.date_of_birth):
            triggered.append(EDD_TRIGGERS[0])
        if user.country in HIGH_RISK_COUNTRIES:
            triggered.append(EDD_TRIGGERS[1])
        if await get_monthly_volume(user.id) > 5_000_000:  # R$50K in cents
            triggered.append(EDD_TRIGGERS[2])
        if await adverse_media_check(user.full_name):
            triggered.append(EDD_TRIGGERS[3])

        if triggered:
            await escalate_to_edd(user.id, triggered)
            if any(t.auto_block for t in triggered):
                await block_account(user.id, "EDD required")
        return triggered
  example_bad: |
    # WRONG: No EDD triggers — treating PEPs like regular customers
    async def onboard_user(user_data: dict):
        user = create_user(user_data)
        user.cdd_tier = "standard"  # Even if they're a PEP
        return user
  when_applies: "Any AML-regulated platform, fintech onboarding, prediction markets"
  sources: ["https://www.fatf-gafi.org/content/dam/fatf-gafi/recommendations/FATF%20Recommendations%202012.pdf.coredownload.inline.pdf"]

- id: FIN-KYC-003
  text: "Politically Exposed Person (PEP) screening: check all customers against PEP databases at onboarding and periodically (at least annually). PEP status extends to family members and close associates. A PEP match requires EDD, not automatic rejection."
  why: >
    PEPs (politicians, senior government officials, judges) are high-risk for corruption and
    money laundering. Not screening is a regulatory violation — BACEN fined a Brazilian bank
    R$8M for failing to identify PEP customers. However, PEP status does not mean rejection —
    it means enhanced scrutiny. Automatically rejecting PEPs is discriminatory and loses
    legitimate business.
  how_to_do_right: |
    1. Screen against PEP databases at onboarding: full name + date of birth + country
    2. Include Related PEPs: spouse, children, parents, close business associates
    3. Use fuzzy matching (Levenshtein distance < 3) for name variations
    4. On PEP match: escalate to EDD, do NOT auto-reject
    5. Require compliance officer review within 48 hours of PEP flag
    6. Re-screen all users annually (PEP status changes)
    7. Store screening results with match score and database source
    8. PEP databases: Dow Jones, World-Check, or open-source (OpenSanctions)
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [fintech, compliance, security]
    concern: [domain_specific]
  example_good: |
    from dataclasses import dataclass

    @dataclass
    class PEPMatch:
        name: str
        match_score: float
        pep_category: str  # national, foreign, international_org
        relationship: str  # direct, family, associate
        source_database: str
        country: str

    async def screen_pep(
        full_name: str, dob: str, country: str
    ) -> list[PEPMatch]:
        """Screen against PEP databases. Returns matches, not a reject/accept decision."""
        matches = []

        # Check against configured PEP provider
        results = await pep_provider.search(
            name=full_name,
            date_of_birth=dob,
            country=country,
            fuzziness=2,  # Allow 2 character variations
        )

        for result in results:
            if result.score >= 0.85:  # High confidence match
                matches.append(PEPMatch(
                    name=result.matched_name,
                    match_score=result.score,
                    pep_category=result.category,
                    relationship=result.relationship,
                    source_database=result.source,
                    country=result.country,
                ))

        if matches:
            # Escalate — do NOT reject
            await escalate_to_compliance(
                full_name, matches, action="EDD_REQUIRED"
            )
        return matches
  example_bad: |
    # WRONG: Auto-rejecting PEPs — discriminatory and loses business
    if is_pep(user.name):
        raise HTTPException(403, "PEPs not allowed")  # Illegal discrimination

    # WRONG: No PEP screening at all
    async def onboard(user):
        return create_account(user)  # No screening — regulatory violation
  when_applies: "Any AML-regulated platform, fintech onboarding, prediction markets"
  sources: ["https://www.fatf-gafi.org/content/dam/fatf-gafi/recommendations/FATF%20Recommendations%202012.pdf.coredownload.inline.pdf"]

- id: FIN-KYC-004
  text: "Sanctions screening: check all customers and counterparties against OFAC (US), EU sanctions, and UN sanctions lists before any transaction. Sanctions matches are hard blocks — unlike PEPs, sanctioned entities must be rejected immediately."
  why: >
    Processing a transaction with a sanctioned entity is a criminal offense with penalties up to
    $20M (OFAC) or imprisonment. Unlike PEPs, sanctions violations have strict liability — 'we
    did not know' is not a defense. A UK bank was fined GBP 163M for sanctions failures. Screen
    before every transaction, not just at onboarding, because sanctions lists are updated daily.
  how_to_do_right: |
    1. Screen at onboarding: full name, aliases, date of birth, nationality
    2. Screen before every outbound transfer: recipient name, bank, country
    3. Screen against OFAC SDN, EU Consolidated List, UN Security Council sanctions
    4. Update sanctions lists daily (most providers offer real-time feeds)
    5. On match: BLOCK immediately, do not process the transaction
    6. Report the match to your compliance officer within 1 hour
    7. File a blocking report with the relevant authority (OFAC requires within 10 days)
    8. Use exact + fuzzy matching — sanctioned entities use aliases
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [fintech, compliance, security]
    concern: [domain_specific]
  example_good: |
    from enum import Enum

    class SanctionsList(str, Enum):
        OFAC_SDN = "ofac_sdn"
        EU_CONSOLIDATED = "eu_consolidated"
        UN_SECURITY_COUNCIL = "un_sc"

    async def screen_sanctions(
        full_name: str, country: str, aliases: list[str] | None = None
    ) -> dict:
        """Hard block on sanctions match. No exceptions."""
        all_names = [full_name] + (aliases or [])
        matches = []

        for name in all_names:
            for sanctions_list in SanctionsList:
                results = await sanctions_provider.search(
                    name=name, country=country, list_type=sanctions_list.value
                )
                matches.extend(results)

        if matches:
            # HARD BLOCK — no discretion, no EDD, just block
            await block_account_immediately(full_name, "SANCTIONS_MATCH")
            await alert_compliance_urgent(
                f"SANCTIONS MATCH: {full_name}, lists: {[m.list_type for m in matches]}"
            )
            return {"blocked": True, "matches": matches}

        return {"blocked": False, "matches": []}

    # Screen before EVERY outbound transfer
    @app.post("/api/transfer")
    async def create_transfer(transfer: TransferRequest, user: User = Depends(get_current_user)):
        sanctions_result = await screen_sanctions(
            transfer.recipient_name, transfer.recipient_country
        )
        if sanctions_result["blocked"]:
            raise HTTPException(403, "Transfer blocked by compliance")
        await process_transfer(transfer)
  example_bad: |
    # CATASTROPHIC: No sanctions screening
    @app.post("/api/transfer")
    async def transfer(data: dict):
        process_transfer(data)  # Could be sending money to a sanctioned entity

    # WRONG: Screening only at onboarding — sanctions lists change daily
    async def onboard(user):
        if not is_sanctioned(user.name):
            create_account(user)
        # Never checks again — user could be sanctioned tomorrow
  when_applies: "Any financial platform, cross-border transactions, prediction markets with international users"
  sources: ["https://www.treasury.gov/ofac"]

- id: FIN-KYC-005
  text: "Identity verification workflow: implement a multi-step verification flow — document upload, OCR extraction, liveness check (selfie matches document photo), and data cross-validation (name/DOB match across sources). Never rely on a single verification method."
  why: >
    Document-only verification is trivially bypassed with forged documents. A prediction market
    discovered 200+ accounts created with photoshopped IDs after a fraud ring withdrew $45K.
    Liveness detection (real-time selfie matching the document photo) stops 95% of identity fraud.
    Cross-validation (checking name/DOB against government databases) catches the remaining 5%.
  how_to_do_right: |
    1. Step 1: Document upload (RG, CNH, or passport) — extract data via OCR
    2. Step 2: Liveness check — user takes a real-time selfie, compare against document photo
    3. Step 3: Data validation — verify extracted name/CPF/DOB against government databases (Serpro, Receita Federal)
    4. Step 4: Address verification — proof of address or geolocation confirmation
    5. Each step updates the verification status independently
    6. All steps must pass for Standard CDD; partial verification stays at Simplified
    7. Use a third-party provider (Onfido, Jumio, or Brazilian: Unico, idwall)
    8. Store verification results and provider references, never the raw biometric data
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [fintech, security, compliance]
    concern: [domain_specific]
  example_good: |
    from enum import Enum

    class VerificationStep(str, Enum):
        DOCUMENT_UPLOAD = "document_upload"
        OCR_EXTRACTION = "ocr_extraction"
        LIVENESS_CHECK = "liveness_check"
        DATA_VALIDATION = "data_validation"
        ADDRESS_VERIFICATION = "address_verification"

    class VerificationStatus(str, Enum):
        PENDING = "pending"
        PASSED = "passed"
        FAILED = "failed"
        MANUAL_REVIEW = "manual_review"

    async def process_verification(user_id: str, step: VerificationStep, result: dict):
        await db.execute(
            """
            INSERT INTO verification_results (
                user_id, step, status, provider_reference, detail, created_at
            ) VALUES ($1, $2, $3, $4, $5, NOW())
            """,
            user_id, step.value, result["status"],
            result.get("provider_ref"), json.dumps(result.get("detail", {})),
        )

        # Check if all steps passed — upgrade to Standard CDD
        all_steps = await get_all_verification_results(user_id)
        required = {VerificationStep.DOCUMENT_UPLOAD, VerificationStep.LIVENESS_CHECK, VerificationStep.DATA_VALIDATION}
        passed = {s.step for s in all_steps if s.status == VerificationStatus.PASSED}

        if required.issubset(passed):
            await upgrade_cdd_tier(user_id, CDDTier.STANDARD)
  example_bad: |
    # WRONG: Document-only verification — trivially forged
    async def verify_identity(user_id: str, document_image: bytes):
        text = ocr.extract(document_image)
        if text.get("cpf"):
            user.verified = True  # No liveness, no cross-validation
  when_applies: "Any KYC onboarding, identity verification for financial platforms"
  sources: ["https://www.fatf-gafi.org/en/publications/Fatfgeneral/Financial-inclusion-cdd-2017.html"]

- id: FIN-KYC-006
  text: "Document verification: validate document authenticity by checking security features (watermarks, holograms via image analysis), cross-referencing document numbers with issuing authority databases, and verifying document expiration dates. Reject expired documents."
  why: >
    Accepting expired or forged documents exposes the platform to identity fraud and regulatory
    non-compliance. A Brazilian fintech accepted expired RG documents and later discovered 15%
    of accounts with expired docs had inconsistent identity data — the documents had been altered
    after expiration. Cross-referencing with Serpro/Receita Federal catches most forgeries.
  how_to_do_right: |
    1. Check document expiration date — reject if expired
    2. Validate document format per type: CPF (11 digits with check digit), RG (state-specific)
    3. Verify CPF against Receita Federal API (status: regular, suspended, cancelled)
    4. Extract MRZ (Machine Readable Zone) from passports and validate checksum
    5. Use image analysis to detect photo manipulation (metadata, edge detection)
    6. Store document type, number, issuing authority, expiration — never store the document image long-term
    7. Delete raw document images after verification (data minimization per LGPD)
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [fintech, compliance, security]
    concern: [domain_specific]
  example_good: |
    from datetime import date

    async def validate_document(
        doc_type: str, doc_number: str, expiration_date: date | None, doc_image: bytes
    ) -> dict:
        errors = []

        # Check expiration
        if expiration_date and expiration_date < date.today():
            errors.append("Document expired")

        # Validate format
        if doc_type == "cpf":
            if not validate_cpf_checksum(doc_number):
                errors.append("Invalid CPF check digit")
            else:
                # Cross-reference with Receita Federal
                cpf_status = await receita_federal.check_cpf(doc_number)
                if cpf_status != "regular":
                    errors.append(f"CPF status: {cpf_status}")

        # Image analysis for tampering
        tampering_score = await image_analyzer.detect_tampering(doc_image)
        if tampering_score > 0.7:
            errors.append(f"Suspected document tampering (score: {tampering_score:.2f})")

        return {
            "valid": len(errors) == 0,
            "errors": errors,
            "doc_type": doc_type,
            "doc_number_hash": hash_document_number(doc_number),
        }

    def validate_cpf_checksum(cpf: str) -> bool:
        """Validate CPF using official check digit algorithm."""
        cpf = cpf.replace(".", "").replace("-", "")
        if len(cpf) != 11 or cpf == cpf[0] * 11:
            return False
        for i in range(9, 11):
            total = sum(int(cpf[j]) * (i + 1 - j) for j in range(i))
            digit = (total * 10 % 11) % 10
            if int(cpf[i]) != digit:
                return False
        return True
  example_bad: |
    # WRONG: No document validation — accepting anything
    async def upload_document(user_id: str, image: bytes):
        save_document(user_id, image)
        user.verified = True  # No expiration check, no format validation
  when_applies: "Identity verification, document-based KYC, Brazilian fintech compliance"
  sources: ["https://www.bcb.gov.br/en"]

- id: FIN-KYC-007
  text: "Transaction monitoring patterns: implement real-time detection for structuring (splitting transactions to avoid thresholds), rapid movement (deposit-then-immediate-withdrawal), unusual patterns (sudden activity spike from dormant account), and round-amount transactions."
  why: >
    Transaction monitoring is legally required by AML regulations worldwide. Structuring ($9,999
    deposits to avoid $10K reporting) is itself a federal crime in the US. A Brazilian fintech
    was fined R$2M by COAF for failing to detect structuring patterns — a user made 47 deposits
    of exactly R$9,900 over 2 months. Automated monitoring catches patterns humans miss.
  how_to_do_right: |
    1. Structuring: flag if N transactions in X days sum to just under reporting threshold (e.g., 3+ deposits totaling > R$45K with each < R$50K)
    2. Rapid movement: flag deposit followed by withdrawal > 80% of deposit within 24 hours
    3. Dormant account spike: flag if account inactive > 90 days suddenly has > 5 transactions
    4. Round amounts: flag if > 3 consecutive transactions are round numbers (R$10,000, R$5,000)
    5. Cross-border: flag if user in Brazil sends to country on FATF grey list
    6. Score each pattern (0-100), aggregate into a risk score per user
    7. Scores > 70: auto-block + generate SAR. Scores 40-70: manual review. Scores < 40: log only.
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [fintech, security, compliance]
    concern: [domain_specific]
  example_good: |
    from dataclasses import dataclass
    from datetime import datetime, timedelta

    @dataclass
    class MonitoringAlert:
        user_id: str
        pattern: str
        risk_score: int
        details: dict
        transactions: list[str]

    REPORTING_THRESHOLD_CENTS = 5_000_000  # R$50K

    async def detect_structuring(
        db, user_id: str, window_days: int = 7
    ) -> MonitoringAlert | None:
        """Detect structuring: multiple transactions just under threshold."""
        since = datetime.utcnow() - timedelta(days=window_days)
        transactions = await db.get_deposits(user_id, since=since)

        sub_threshold = [
            t for t in transactions
            if t.amount_cents < REPORTING_THRESHOLD_CENTS
            and t.amount_cents > REPORTING_THRESHOLD_CENTS * 0.8  # > 80% of threshold
        ]

        if len(sub_threshold) >= 3:
            total = sum(t.amount_cents for t in sub_threshold)
            if total >= REPORTING_THRESHOLD_CENTS:
                return MonitoringAlert(
                    user_id=user_id,
                    pattern="STRUCTURING",
                    risk_score=85,
                    details={
                        "count": len(sub_threshold),
                        "total_cents": total,
                        "threshold": REPORTING_THRESHOLD_CENTS,
                        "window_days": window_days,
                    },
                    transactions=[t.id for t in sub_threshold],
                )
        return None

    async def detect_rapid_movement(
        db, user_id: str
    ) -> MonitoringAlert | None:
        """Deposit followed by withdrawal > 80% within 24h."""
        recent_deposits = await db.get_deposits(
            user_id, since=datetime.utcnow() - timedelta(hours=24)
        )
        for deposit in recent_deposits:
            withdrawals_after = await db.get_withdrawals(
                user_id,
                since=deposit.created_at,
                until=deposit.created_at + timedelta(hours=24),
            )
            withdrawn = sum(w.amount_cents for w in withdrawals_after)
            if withdrawn >= deposit.amount_cents * 0.8:
                return MonitoringAlert(
                    user_id=user_id,
                    pattern="RAPID_MOVEMENT",
                    risk_score=75,
                    details={
                        "deposit_cents": deposit.amount_cents,
                        "withdrawn_cents": withdrawn,
                        "ratio": withdrawn / deposit.amount_cents,
                    },
                    transactions=[deposit.id] + [w.id for w in withdrawals_after],
                )
        return None
  example_bad: |
    # WRONG: No transaction monitoring — regulatory violation
    # "We check transactions manually" — you check 0.1% of them

    # WRONG: Only checking individual transactions, not patterns
    if transaction.amount > 50000_00:
        flag(transaction)  # Misses structuring (multiple small amounts)
  when_applies: "Any AML-regulated fintech, transaction processing, prediction market activity monitoring"
  sources: ["https://www.fatf-gafi.org/content/dam/fatf-gafi/recommendations/FATF%20Recommendations%202012.pdf.coredownload.inline.pdf"]

- id: FIN-KYC-008
  text: "Suspicious Activity Report (SAR) generation: when transaction monitoring detects suspicious patterns, automatically generate a SAR draft with all required fields. Submit to COAF (Brazil) or FinCEN (US) within the regulatory deadline."
  why: >
    Failure to file SARs is a criminal offense. COAF requires filing within 24 hours of detection.
    FinCEN requires filing within 30 days. A US money services business was fined $3M for filing
    SARs 90 days late on average. Automating SAR generation ensures consistent, timely filing.
    Manual SAR creation takes 2-4 hours per report — automation reduces this to 15 minutes of review.
  how_to_do_right: |
    1. Auto-generate SAR when monitoring risk score > 70
    2. Include: subject info (name, ID, address), transaction details, pattern description, narrative
    3. For COAF: use SISCOAF electronic filing system, report within 24 hours
    4. For FinCEN: use BSA E-Filing system, file within 30 calendar days
    5. Store SAR drafts internally for compliance officer review before submission
    6. Track SAR filing status: DRAFTED, REVIEWED, SUBMITTED, ACKNOWLEDGED
    7. Never notify the customer that a SAR was filed (tipping off is illegal)
    8. Retain SAR records for 5 years (Brazil) or 5 years (US) after filing
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [fintech, compliance]
    concern: [domain_specific]
  example_good: |
    from dataclasses import dataclass
    from datetime import datetime

    @dataclass
    class SARDraft:
        id: str
        subject_name: str
        subject_id: str
        subject_id_type: str
        subject_address: str
        suspicious_activity_type: str
        transaction_ids: list[str]
        total_amount_cents: int
        date_range_start: datetime
        date_range_end: datetime
        narrative: str
        risk_score: int
        status: str  # DRAFTED, REVIEWED, SUBMITTED
        created_at: datetime
        filing_deadline: datetime

    async def generate_sar(
        alert: MonitoringAlert, jurisdiction: str = "BR"
    ) -> SARDraft:
        user = await db.get_user(alert.user_id)
        transactions = await db.get_transactions(alert.transactions)

        narrative = (
            f"User {user.full_name} (CPF: {mask_cpf(user.cpf)}) "
            f"flagged for {alert.pattern} pattern. "
            f"{len(transactions)} transactions totaling "
            f"R${sum(t.amount_cents for t in transactions) / 100:,.2f} "
            f"detected within {alert.details.get('window_days', 'N/A')} days. "
            f"Risk score: {alert.risk_score}/100."
        )

        deadline = datetime.utcnow() + (
            timedelta(hours=24) if jurisdiction == "BR"
            else timedelta(days=30)
        )

        sar = SARDraft(
            id=f"SAR-{datetime.utcnow().strftime('%Y%m%d')}-{alert.user_id[:8]}",
            subject_name=user.full_name,
            subject_id=mask_cpf(user.cpf),
            subject_id_type="CPF",
            subject_address=user.address,
            suspicious_activity_type=alert.pattern,
            transaction_ids=alert.transactions,
            total_amount_cents=sum(t.amount_cents for t in transactions),
            date_range_start=min(t.created_at for t in transactions),
            date_range_end=max(t.created_at for t in transactions),
            narrative=narrative,
            risk_score=alert.risk_score,
            status="DRAFTED",
            created_at=datetime.utcnow(),
            filing_deadline=deadline,
        )

        await db.save_sar(sar)
        await alert_compliance_officer(sar)  # For review
        # NEVER notify the customer — tipping off is illegal
        return sar
  example_bad: |
    # WRONG: No SAR filing — criminal offense
    if suspicious:
        logger.warning(f"Suspicious activity for {user_id}")  # Not a SAR!

    # WRONG: Tipping off the customer
    if sar_filed:
        send_email(user, "We filed a suspicious activity report about you")  # ILLEGAL
  when_applies: "Any AML-regulated platform, transaction monitoring follow-up, regulatory compliance"
  sources: ["https://www.fatf-gafi.org/content/dam/fatf-gafi/recommendations/FATF%20Recommendations%202012.pdf.coredownload.inline.pdf"]

- id: FIN-KYC-009
  text: "Brazilian AML regulations (COAF/Lei 9.613/98): comply with COAF reporting requirements — report transactions > R$50K, suspicious patterns, and PIX transactions with unusual characteristics. Register as a reporting entity with COAF if operating as a payment institution in Brazil."
  why: >
    Lei 9.613/98 (Brazilian Anti-Money Laundering Law) requires financial institutions and payment
    processors to report to COAF. Non-compliance carries penalties of R$20M or 2x the transaction
    value, plus potential criminal charges. BACEN Circular 3.978/2020 specifically covers prediction
    markets and digital platforms. Ignorance of COAF requirements is not a defense — a Brazilian
    exchange was fined R$8.5M for failing to register and report.
  how_to_do_right: |
    1. Register with COAF as a reporting entity (obrigacao de comunicacao)
    2. Report automatically: single transactions > R$50K, monthly aggregate > R$50K per user
    3. Report PIX transactions: incoming from unknown sources > R$10K, unusual frequency
    4. File reports via SISCOAF within 24 hours of detection
    5. Appoint a compliance officer (Diretor de PLD/FTP) registered with BACEN
    6. Implement risk-based approach per Circular BACEN 3.978/2020
    7. Maintain records for 10 years (COAF retention requirement)
    8. Train all employees on AML annually
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [fintech, compliance]
    concern: [domain_specific]
  example_good: |
    # COAF reporting thresholds for Brazil
    COAF_THRESHOLDS = {
        "single_transaction_cents": 5_000_000,      # R$50K
        "monthly_aggregate_cents": 5_000_000,         # R$50K
        "pix_unknown_source_cents": 1_000_000,        # R$10K
        "cash_equivalent_cents": 1_000_000,           # R$10K
    }

    async def check_coaf_reporting(
        db, user_id: str, transaction_amount_cents: int, tx_type: str
    ) -> bool:
        """Check if transaction triggers COAF mandatory reporting."""
        must_report = False
        reasons = []

        # Single transaction threshold
        if transaction_amount_cents >= COAF_THRESHOLDS["single_transaction_cents"]:
            must_report = True
            reasons.append("SINGLE_TX_ABOVE_50K")

        # Monthly aggregate
        monthly_total = await db.get_monthly_volume(user_id)
        if monthly_total + transaction_amount_cents >= COAF_THRESHOLDS["monthly_aggregate_cents"]:
            must_report = True
            reasons.append("MONTHLY_AGGREGATE_ABOVE_50K")

        # PIX from unknown source
        if tx_type == "pix_incoming" and transaction_amount_cents >= COAF_THRESHOLDS["pix_unknown_source_cents"]:
            must_report = True
            reasons.append("PIX_UNKNOWN_SOURCE_ABOVE_10K")

        if must_report:
            await queue_coaf_report(user_id, transaction_amount_cents, reasons)
            # 24-hour deadline for SISCOAF submission
        return must_report
  example_bad: |
    # WRONG: No COAF reporting — up to R$20M fine
    async def process_deposit(user_id: str, amount: int):
        credit_balance(user_id, amount)  # R$200K deposit, no report
  when_applies: "Any fintech operating in Brazil, PIX processors, prediction markets in BRL"
  sources: ["https://www.gov.br/coaf"]

- id: FIN-KYC-010
  text: "Travel Rule (FATF Recommendation 16): when transferring funds > $1,000 (or equivalent), transmit originator and beneficiary information along with the transfer. This applies to crypto transfers and cross-border wire transfers."
  why: >
    The FATF Travel Rule requires VASPs (Virtual Asset Service Providers) and financial institutions
    to share customer identity information for transfers above the threshold. Non-compliance results
    in exclusion from correspondent banking networks and regulatory action. Several crypto exchanges
    lost banking relationships in 2024-2025 because they could not demonstrate Travel Rule compliance.
  how_to_do_right: |
    1. For transfers > $1,000 (or R$5,000 in Brazil): include originator info (name, account, address)
    2. Include beneficiary info: name, account number at receiving institution
    3. For crypto: use TRISA, OpenVASP, or Sygna Bridge protocol to transmit info
    4. Store Travel Rule data for both sent and received transfers
    5. Validate incoming transfers have originator info — flag if missing
    6. Retain Travel Rule records for 5 years minimum
    7. Implement secure channel for transmitting PII between institutions
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [fintech, compliance]
    concern: [domain_specific]
  example_good: |
    from dataclasses import dataclass

    TRAVEL_RULE_THRESHOLD_CENTS = 100_000  # $1,000

    @dataclass
    class TravelRuleData:
        originator_name: str
        originator_account: str
        originator_address: str
        originator_institution: str
        beneficiary_name: str
        beneficiary_account: str
        beneficiary_institution: str
        transfer_amount_cents: int
        transfer_currency: str

    async def apply_travel_rule(
        transfer: TransferRequest, sender: User
    ) -> TravelRuleData | None:
        if transfer.amount_cents < TRAVEL_RULE_THRESHOLD_CENTS:
            return None  # Below threshold — no Travel Rule data required

        travel_rule_data = TravelRuleData(
            originator_name=sender.full_name,
            originator_account=sender.account_id,
            originator_address=sender.address,
            originator_institution="Forekast Platform",
            beneficiary_name=transfer.recipient_name,
            beneficiary_account=transfer.recipient_account,
            beneficiary_institution=transfer.recipient_institution,
            transfer_amount_cents=transfer.amount_cents,
            transfer_currency=transfer.currency,
        )

        # Transmit to receiving institution via secure protocol
        await transmit_travel_rule_data(
            travel_rule_data, transfer.recipient_institution
        )
        # Store locally for compliance records
        await db.store_travel_rule(travel_rule_data, transfer.id)
        return travel_rule_data
  example_bad: |
    # WRONG: No Travel Rule compliance — risk of losing banking relationships
    async def transfer(sender_id: str, recipient_account: str, amount: int):
        execute_wire_transfer(recipient_account, amount)
        # No originator/beneficiary info transmitted — violation
  when_applies: "Cross-border transfers, crypto transfers, any transfer above threshold"
  sources: ["https://www.fatf-gafi.org/en/publications/Fatfrecommendations/R16-June2019.html"]

- id: FIN-KYC-011
  text: "Risk scoring for customers: assign a dynamic risk score (0-100) based on multiple factors — geography, transaction patterns, PEP/sanctions status, account age, verification level, and industry. Update the score on every transaction and significant event."
  why: >
    Static risk categories (low/medium/high) miss the nuance of evolving customer behavior. A user
    classified as 'low risk' at onboarding can become high risk after unusual transaction patterns
    emerge. Dynamic scoring allows proportional response — higher scrutiny for higher scores, lighter
    touch for lower scores. A fintech reduced false positive alerts by 60% after switching from
    static categories to dynamic scoring.
  how_to_do_right: |
    1. Define risk factors with weights: geography (20%), transaction pattern (25%), PEP/sanctions (25%), account age (10%), verification level (10%), industry (10%)
    2. Score each factor 0-100 independently
    3. Calculate weighted composite score
    4. Update score on: new transaction, KYC change, screening result change, periodic review
    5. Define thresholds: 0-30 (low), 31-60 (medium), 61-80 (high), 81-100 (critical)
    6. Automate actions per threshold: critical = block + SAR, high = EDD + monitoring, medium = periodic review
    7. Log every score change with the triggering event
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [fintech, security, compliance]
    concern: [domain_specific]
  example_good: |
    from dataclasses import dataclass

    RISK_WEIGHTS = {
        "geography": 0.20,
        "transaction_pattern": 0.25,
        "pep_sanctions": 0.25,
        "account_age": 0.10,
        "verification_level": 0.10,
        "industry": 0.10,
    }

    HIGH_RISK_COUNTRIES = {"AF", "IR", "KP", "SY", "YE", "MM"}
    FATF_GREY_LIST = {"JM", "PA", "TR", "AE", "PH", "ZA"}

    @dataclass
    class RiskAssessment:
        user_id: str
        composite_score: int
        factor_scores: dict[str, int]
        risk_level: str
        assessed_at: datetime

    async def calculate_risk_score(db, user: User) -> RiskAssessment:
        factors = {}

        # Geography
        if user.country in HIGH_RISK_COUNTRIES:
            factors["geography"] = 100
        elif user.country in FATF_GREY_LIST:
            factors["geography"] = 60
        else:
            factors["geography"] = 10

        # Transaction pattern (from monitoring)
        pattern_score = await get_transaction_anomaly_score(db, user.id)
        factors["transaction_pattern"] = min(pattern_score, 100)

        # PEP/Sanctions
        pep = await has_pep_flag(db, user.id)
        sanctions = await has_sanctions_flag(db, user.id)
        factors["pep_sanctions"] = 100 if sanctions else (70 if pep else 0)

        # Account age (newer = riskier)
        days_old = (datetime.utcnow() - user.created_at).days
        factors["account_age"] = max(0, 80 - days_old)  # Decreases over time

        # Verification level
        factors["verification_level"] = {
            CDDTier.ENHANCED: 0,
            CDDTier.STANDARD: 20,
            CDDTier.SIMPLIFIED: 60,
        }.get(user.cdd_tier, 80)

        composite = int(sum(
            factors[k] * RISK_WEIGHTS[k] for k in RISK_WEIGHTS
        ))

        risk_level = (
            "critical" if composite > 80
            else "high" if composite > 60
            else "medium" if composite > 30
            else "low"
        )

        return RiskAssessment(
            user_id=user.id,
            composite_score=composite,
            factor_scores=factors,
            risk_level=risk_level,
            assessed_at=datetime.utcnow(),
        )
  example_bad: |
    # WRONG: Static risk category never updated
    user.risk = "low"  # Set at onboarding, never changes
    # User could be laundering millions and still be "low risk"
  when_applies: "Customer risk assessment, AML compliance, onboarding and ongoing monitoring"
  sources: ["https://www.fatf-gafi.org/content/dam/fatf-gafi/recommendations/FATF%20Recommendations%202012.pdf.coredownload.inline.pdf"]

- id: FIN-KYC-012
  text: "Ongoing monitoring requirements: re-verify customer information periodically, re-screen against PEP/sanctions lists on updates, monitor for changes in risk profile, and refresh documentation before it expires. This is not a one-time check."
  why: >
    KYC is not a one-time event. A customer verified 2 years ago may have become a PEP, been added
    to a sanctions list, or changed their risk profile entirely. FATF guidelines require ongoing
    monitoring proportional to risk. A bank was fined GBP 56M because they verified customers at
    onboarding but never re-screened — 12 sanctioned individuals had accounts for years.
  how_to_do_right: |
    1. Re-screen all users against PEP/sanctions lists monthly (automated batch)
    2. Re-verify identity documents before expiration (alert 60 days before)
    3. Update risk score on every significant event (large transaction, country change, etc.)
    4. Review Enhanced CDD accounts quarterly
    5. Review Standard CDD accounts annually
    6. Flag accounts with expired documents — restrict features until renewed
    7. Trigger re-verification on: address change, large transaction, dormancy > 12 months
    8. Automate via scheduled jobs — never rely on manual calendar reminders
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [fintech, compliance]
    concern: [domain_specific]
  example_good: |
    from datetime import datetime, timedelta

    REVIEW_INTERVALS = {
        CDDTier.ENHANCED: timedelta(days=90),    # Quarterly
        CDDTier.STANDARD: timedelta(days=365),   # Annually
        CDDTier.SIMPLIFIED: timedelta(days=730), # Every 2 years
    }

    async def run_periodic_monitoring(db):
        """Scheduled job: run daily, process due reviews."""
        now = datetime.utcnow()

        # 1. Re-screen PEP/sanctions
        users_due_screening = await db.execute(
            """
            SELECT id, full_name, date_of_birth, country
            FROM users
            WHERE last_screening_at < $1 OR last_screening_at IS NULL
            """,
            now - timedelta(days=30),
        )
        for user in users_due_screening:
            await screen_pep(user.full_name, user.date_of_birth, user.country)
            await screen_sanctions(user.full_name, user.country)
            await db.update_last_screening(user.id, now)

        # 2. Check document expiration
        expiring_soon = await db.execute(
            """
            SELECT user_id, doc_type, expiration_date
            FROM verification_results
            WHERE expiration_date BETWEEN $1 AND $2
            AND step = 'document_upload' AND status = 'passed'
            """,
            now, now + timedelta(days=60),
        )
        for doc in expiring_soon:
            await notify_user_document_expiring(doc.user_id, doc.doc_type, doc.expiration_date)

        # 3. Review due accounts
        for tier, interval in REVIEW_INTERVALS.items():
            due_users = await db.execute(
                """
                SELECT id FROM users
                WHERE cdd_tier = $1 AND last_review_at < $2
                """,
                tier.value, now - interval,
            )
            for user in due_users:
                await queue_for_review(user.id, f"Periodic {tier.value} review")
  example_bad: |
    # WRONG: Verify once and forget
    async def onboard(user):
        await verify_identity(user)
        user.verified = True  # Permanently verified? People change!

    # WRONG: Manual calendar reminders for re-verification
    # "We'll review high-risk clients every quarter" — you'll forget
  when_applies: "Any AML-regulated platform, ongoing customer relationship management"
  sources: ["https://www.fatf-gafi.org/en/publications/Fatfgeneral/Financial-inclusion-cdd-2017.html"]

- id: FIN-KYC-013
  text: "Record retention requirements: retain all KYC records, transaction data, and compliance documents for the legally mandated period — 10 years for COAF (Brazil), 5 years for FinCEN (US), or 5 years after the business relationship ends, whichever is longer."
  why: >
    Regulators can request historical records years after the fact. If you cannot produce them,
    you face fines and the assumption of guilt. A Brazilian payment processor could not provide
    transaction records from 3 years prior during a COAF investigation and was fined R$1.5M plus
    had their license suspended. Retention policies must be automated — manual archiving fails.
  how_to_do_right: |
    1. Define retention periods per data type: KYC docs (10yr BR, 5yr US), transactions (10yr), SARs (5yr after filing)
    2. Mark records with retention_until date at creation time
    3. Never hard-delete within retention period — use soft delete if needed
    4. Archive old records to cold storage (S3 Glacier, etc.) after 2 years for cost efficiency
    5. Implement automated deletion after retention period expires (per LGPD/GDPR data minimization)
    6. Log all deletions with reason and authorization
    7. Test recovery from cold storage annually — verify you can actually retrieve archived records
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [fintech, compliance]
    concern: [domain_specific]
  example_good: |
    from datetime import datetime, timedelta
    from enum import Enum

    class RetentionPolicy(str, Enum):
        KYC_BR = "kyc_br"  # 10 years
        TRANSACTION_BR = "transaction_br"  # 10 years
        SAR = "sar"  # 5 years after filing
        KYC_US = "kyc_us"  # 5 years

    RETENTION_PERIODS = {
        RetentionPolicy.KYC_BR: timedelta(days=3650),     # 10 years
        RetentionPolicy.TRANSACTION_BR: timedelta(days=3650),
        RetentionPolicy.SAR: timedelta(days=1825),         # 5 years
        RetentionPolicy.KYC_US: timedelta(days=1825),
    }

    async def set_retention(
        db, record_type: RetentionPolicy, record_id: str, reference_date: datetime
    ):
        retention_until = reference_date + RETENTION_PERIODS[record_type]
        await db.execute(
            """
            UPDATE records SET retention_until = $1, retention_policy = $2
            WHERE id = $3
            """,
            retention_until, record_type.value, record_id,
        )

    async def archive_expired_records(db):
        """Move expired records to cold storage. Run weekly."""
        eligible = await db.execute(
            """
            SELECT id, record_type, data FROM records
            WHERE retention_until < NOW() - INTERVAL '30 days'
            AND archived_at IS NULL
            """,
        )
        for record in eligible:
            await cold_storage.upload(record.id, record.data)
            await db.execute(
                "UPDATE records SET archived_at = NOW(), data = NULL WHERE id = $1",
                record.id,
            )
  example_bad: |
    # WRONG: No retention policy — records randomly deleted or kept forever
    async def delete_user(user_id: str):
        await db.execute("DELETE FROM users WHERE id = $1", user_id)
        # KYC records gone — regulatory violation

    # WRONG: Keeping everything forever — LGPD/GDPR violation
    # "We never delete anything" — you must delete after retention period
  when_applies: "Any regulated financial platform, data governance, compliance"
  sources: ["https://www.fatf-gafi.org/content/dam/fatf-gafi/recommendations/FATF%20Recommendations%202012.pdf.coredownload.inline.pdf"]

- id: FIN-KYC-014
  text: "KYC data privacy: collect only the minimum data necessary for compliance (data minimization per LGPD/GDPR). Encrypt PII at rest and in transit. Hash document numbers for lookups. Never expose raw PII in logs, APIs, or error messages."
  why: >
    Collecting excessive PII creates liability without benefit. If you store raw document images
    beyond the verification period, a data breach exposes sensitive biometric data. LGPD (Brazil)
    fines can reach 2% of revenue or R$50M per violation. A Brazilian fintech was fined R$2.3M
    under LGPD for storing raw CPF numbers in application logs that were accessible to developers.
  how_to_do_right: |
    1. Collect only required fields per CDD tier — no 'nice to have' data
    2. Delete raw document images after verification (keep only: verified/not, doc type, expiration)
    3. Hash document numbers (CPF, SSN) for lookups — store the hash, not the plaintext
    4. Encrypt PII at rest using AES-256 with key rotation every 90 days
    5. Mask PII in logs: CPF "123.456.789-00" -> "***.***.789-**"
    6. Mask PII in API responses: show only last 4 digits of sensitive fields
    7. Grant PII access on a need-to-know basis — not all developers need access
    8. Implement data subject access requests (DSAR) endpoint per LGPD Article 18
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [fintech, security, compliance]
    concern: [domain_specific]
  example_good: |
    import hashlib
    from cryptography.fernet import Fernet

    def mask_cpf(cpf: str) -> str:
        """Mask CPF for display/logging: 123.456.789-00 -> ***.***789-**"""
        clean = cpf.replace(".", "").replace("-", "")
        if len(clean) != 11:
            return "***"
        return f"***.***{clean[6:9]}-**"

    def hash_document(doc_number: str, salt: str) -> str:
        """One-way hash for lookups — never store plaintext."""
        return hashlib.sha256(f"{salt}:{doc_number}".encode()).hexdigest()

    class PIIStore:
        def __init__(self, encryption_key: bytes):
            self.cipher = Fernet(encryption_key)

        async def store_pii(self, user_id: str, field: str, value: str):
            encrypted = self.cipher.encrypt(value.encode())
            await db.execute(
                "INSERT INTO pii_vault (user_id, field, encrypted_value) VALUES ($1, $2, $3)",
                user_id, field, encrypted,
            )

        async def retrieve_pii(self, user_id: str, field: str) -> str:
            row = await db.fetchone(
                "SELECT encrypted_value FROM pii_vault WHERE user_id = $1 AND field = $2",
                user_id, field,
            )
            return self.cipher.decrypt(row.encrypted_value).decode()

    # Logging — NEVER log raw PII
    logger.info(f"Verifying user CPF: {mask_cpf(user.cpf)}")  # ***.***789-**
  example_bad: |
    # CATASTROPHIC: Raw PII in logs
    logger.info(f"User CPF: {user.cpf}")  # 123.456.789-00 in plaintext logs!

    # WRONG: Storing raw document images forever
    await save_to_s3(user_id, document_image)  # Never deleted, data breach risk

    # WRONG: Returning full CPF in API response
    return {"user": {"name": user.name, "cpf": user.cpf}}  # Full CPF exposed!
  when_applies: "Any platform handling PII, LGPD/GDPR compliance, KYC data storage"
  sources: ["https://www.fatf-gafi.org/content/dam/fatf-gafi/recommendations/FATF%20Recommendations%202012.pdf.coredownload.inline.pdf"]

- id: FIN-KYC-015
  text: "KYC/AML testing and audit preparation: maintain a comprehensive test suite for all compliance flows (onboarding, screening, monitoring, reporting). Run quarterly internal audits simulating regulatory examination. Keep an audit-ready evidence package."
  why: >
    Regulatory examinations happen with little notice. A fintech that received a BACEN examination
    notice had 15 business days to produce documentation for 2 years of operations. Without
    pre-prepared evidence packages, the team worked 16-hour days for 2 weeks and still missed
    the deadline, resulting in a R$500K fine for incomplete documentation. Quarterly internal
    audits keep the evidence package current.
  how_to_do_right: |
    1. Test suite must cover: onboarding all CDD tiers, PEP screening (positive + negative), sanctions screening (positive + negative), transaction monitoring (all patterns), SAR generation, Travel Rule
    2. Use test fixtures with known PEP/sanctions matches (test databases)
    3. Run compliance tests in CI/CD — failing compliance test blocks deployment
    4. Quarterly internal audit checklist: policies current?, screenings running?, SARs filed on time?, records retained properly?
    5. Maintain audit evidence package: policy documents, screening logs, SAR filing records, training records, risk assessments
    6. Simulate regulatory examination annually: can you produce all required documents within 48 hours?
    7. Document all compliance decisions with rationale
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [fintech, testing, compliance]
    concern: [domain_specific]
  example_good: |
    import pytest

    class TestComplianceFlows:
        """Compliance tests — MUST pass before deployment."""

        async def test_pep_screening_positive(self, db):
            """Known PEP must be flagged."""
            user = create_test_user(name="Test PEP Person")
            await seed_pep_database(name="Test PEP Person", category="national")
            matches = await screen_pep(user.full_name, user.dob, user.country)
            assert len(matches) >= 1
            assert matches[0].match_score >= 0.85
            # Verify EDD was triggered
            user = await db.get_user(user.id)
            assert user.cdd_tier == CDDTier.ENHANCED

        async def test_sanctions_screening_blocks(self, db):
            """Sanctioned entity must be blocked immediately."""
            user = create_test_user(name="Sanctioned Entity")
            await seed_sanctions_list(name="Sanctioned Entity", list_type="OFAC_SDN")
            result = await screen_sanctions(user.full_name, user.country)
            assert result["blocked"] is True
            user = await db.get_user(user.id)
            assert user.is_blocked is True

        async def test_structuring_detection(self, db):
            """Multiple sub-threshold deposits must trigger alert."""
            user = create_test_user()
            for _ in range(4):
                await create_deposit(user.id, amount_cents=4_500_000)  # R$45K each
            alert = await detect_structuring(db, user.id)
            assert alert is not None
            assert alert.pattern == "STRUCTURING"
            assert alert.risk_score >= 70

        async def test_sar_generation_on_high_risk(self, db):
            """High risk score must trigger SAR draft."""
            alert = MonitoringAlert(
                user_id="test_user",
                pattern="STRUCTURING",
                risk_score=85,
                details={"count": 4, "total_cents": 18_000_000},
                transactions=["tx1", "tx2", "tx3", "tx4"],
            )
            sar = await generate_sar(alert, jurisdiction="BR")
            assert sar.status == "DRAFTED"
            assert sar.filing_deadline > datetime.utcnow()
            assert "STRUCTURING" in sar.narrative

        async def test_coaf_reporting_threshold(self, db):
            """Transaction > R$50K must trigger COAF report."""
            must_report = await check_coaf_reporting(
                db, "test_user", 6_000_000, "deposit"  # R$60K
            )
            assert must_report is True

    @dataclass
    class AuditEvidencePackage:
        """Pre-assembled package for regulatory examination."""
        kyc_policy: str
        aml_policy: str
        screening_logs: list[dict]
        sar_filings: list[dict]
        training_records: list[dict]
        risk_assessments: list[dict]
        generated_at: datetime

    async def generate_audit_package(
        db, start_date: date, end_date: date
    ) -> AuditEvidencePackage:
        return AuditEvidencePackage(
            kyc_policy=await load_current_policy("kyc"),
            aml_policy=await load_current_policy("aml"),
            screening_logs=await db.get_screening_logs(start_date, end_date),
            sar_filings=await db.get_sar_filings(start_date, end_date),
            training_records=await db.get_training_records(start_date, end_date),
            risk_assessments=await db.get_risk_assessments(start_date, end_date),
            generated_at=datetime.utcnow(),
        )
  example_bad: |
    # WRONG: No compliance tests — bugs in screening go undetected
    # "We test it manually" — you test it once and forget

    # WRONG: Scrambling during audit — no pre-assembled evidence
    # "The regulator wants records by Friday" — you don't have them ready
  when_applies: "Any regulated fintech, quarterly compliance reviews, regulatory examination preparation"
  sources: ["https://www.fatf-gafi.org/content/dam/fatf-gafi/recommendations/FATF%20Recommendations%202012.pdf.coredownload.inline.pdf"]
