- id: CR-PWA-010
  text: Use URL-based navigation with proper history management so every view has a shareable, bookmarkable URL
  why: 'The web''s superpower is the URL. Every meaningful view in a PWA must have a unique URL that can be shared, bookmarked,
    indexed by search engines, and deep-linked from notifications. SPAs that manipulate state without updating the URL break
    the back button, prevent bookmarking, and make push notification deep links impossible. history.pushState must be used
    for every navigation. URL parameters should encode filters, sort order, and pagination so the state is fully reproducible
    from the URL alone. Without proper URLs, a PWA loses the web''s distribution advantage over native apps.

    '
  how_to_do_right: '1. Every view has a unique URL path (not just hash fragments)

    2. URL encodes all relevant state: filters, sort, page, selected item

    3. Back/forward buttons work correctly (history.pushState/replaceState)

    4. Sharing a URL reproduces the exact same view

    5. Search engines can crawl and index all public pages (SSR/SSG for SEO)

    6. Push notifications link to specific URLs that open the correct view

    '
  severity: high
  technologies:
    lang: [javascript]
    framework: [frontend, pwa, react, vue]
  domains:
    domain: [architecture, mobile]
    concern: [web, frontend, navigation]
  example_good: "// URL encodes all view state — shareable, bookmarkable\n// /products?category=shoes&sort=price_asc&page=2&color=red\n\
    \nimport { useSearchParams } from 'react-router-dom';\n\nfunction ProductList() {\n  const [searchParams, setSearchParams]\
    \ = useSearchParams();\n\n  // All state derived from URL\n  const category = searchParams.get('category') || 'all';\n\
    \  const sort = searchParams.get('sort') || 'relevance';\n  const page = parseInt(searchParams.get('page') || '1');\n\
    \  const color = searchParams.get('color');\n\n  // State changes update URL (browser history works correctly)\n  const\
    \ setCategory = (cat: string) => {\n    setSearchParams((prev) => {\n      prev.set('category', cat);\n      prev.set('page',\
    \ '1'); // reset page on filter change\n      return prev;\n    });\n  };\n\n  const setSort = (s: string) => {\n    setSearchParams((prev)\
    \ => {\n      prev.set('sort', s);\n      return prev;\n    });\n  };\n\n  // Back button navigates to previous filter\
    \ state — not previous page\n  // Sharing URL shows exact same filtered, sorted, paginated view\n  // Search engine indexes\
    \ /products?category=shoes separately from /products?category=hats\n\n  return (\n    <div>\n      <FilterBar\n      \
    \  category={category}\n        onCategoryChange={setCategory}\n        color={color}\n      />\n      <SortSelector sort={sort}\
    \ onSortChange={setSort} />\n      <ProductGrid category={category} sort={sort} page={page} color={color} />\n      <Pagination\
    \ page={page} onPageChange={(p) =>\n        setSearchParams((prev) => { prev.set('page', String(p)); return prev; })\n\
    \      } />\n    </div>\n  );\n}\n\n// Push notification deep link\n// Notification payload: { url: '/orders/abc123' }\n\
    // Service worker opens: clients.openWindow('/orders/abc123')\n// App router renders: <OrderDetail orderId=\"abc123\"\
    \ />\n"
  example_bad: "// State in component, not URL — not shareable, back button broken\nfunction ProductList() {\n  const [category,\
    \ setCategory] = useState('all'); // lost on refresh\n  const [sort, setSort] = useState('relevance');   // lost on share\n\
    \  const [page, setPage] = useState(1);             // lost on back\n\n  // URL is always /products — can't share filtered\
    \ view\n  // Back button goes to PREVIOUS PAGE, not previous filter state\n  // Search engine sees one page, not category-specific\
    \ pages\n}\n\n// Hash-based routing — not indexable, poor UX\n// /#/products?category=shoes\n// Search engines don't index\
    \ hash fragments\n// Server returns same HTML for all URLs — no SSR benefit\n"
