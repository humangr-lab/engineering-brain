- id: CR-PWA-001
  text: Implement service worker lifecycle correctly — install caches critical assets, activate cleans old caches, fetch implements
    the caching strategy
  why: 'The service worker lifecycle has three distinct phases that serve different purposes. The install event is the only
    chance to pre-cache critical assets before the worker controls the page. The activate event is where old cache versions
    must be cleaned up to prevent unbounded storage growth. The fetch event intercepts every network request, enabling offline
    support. Getting the lifecycle wrong causes: stale assets served forever (no activate cleanup), blank pages offline (no
    install pre-caching), or infinite loading spinners (fetch handler that never responds). A service worker bug affects ALL
    users because it persists across sessions until explicitly updated.

    '
  how_to_do_right: '1. Install: pre-cache app shell (HTML, CSS, JS, icons) with versioned cache name

    2. Activate: delete old caches, claim all clients for immediate control

    3. Fetch: implement strategy per resource type (cache-first for assets, network-first for API)

    4. Version your cache names: ''app-shell-v2'', ''api-cache-v1''

    5. Use skipWaiting() + clients.claim() for immediate activation (carefully)

    6. Always have a fallback for fetch failures — never let requests hang

    '
  severity: critical
  technologies:
    lang: [javascript]
    framework: [frontend, pwa, service_worker]
  domains:
    domain: [architecture, mobile]
    concern: [web, offline]
  example_good: "// sw.js — production service worker with proper lifecycle\nconst CACHE_VERSION = 'v3';\nconst SHELL_CACHE\
    \ = `app-shell-${CACHE_VERSION}`;\nconst API_CACHE = `api-${CACHE_VERSION}`;\nconst IMAGE_CACHE = `images-${CACHE_VERSION}`;\n\
    \nconst SHELL_ASSETS = [\n  '/',\n  '/index.html',\n  '/styles/main.css',\n  '/scripts/app.js',\n  '/scripts/vendor.js',\n\
    \  '/icons/icon-192.png',\n  '/offline.html',  // fallback page\n];\n\n// INSTALL: pre-cache app shell\nself.addEventListener('install',\
    \ (event) => {\n  event.waitUntil(\n    caches.open(SHELL_CACHE)\n      .then((cache) => cache.addAll(SHELL_ASSETS))\n\
    \      .then(() => self.skipWaiting()) // activate immediately\n  );\n});\n\n// ACTIVATE: clean old caches\nself.addEventListener('activate',\
    \ (event) => {\n  const currentCaches = [SHELL_CACHE, API_CACHE, IMAGE_CACHE];\n  event.waitUntil(\n    caches.keys()\n\
    \      .then((cacheNames) =>\n        Promise.all(\n          cacheNames\n            .filter((name) => !currentCaches.includes(name))\n\
    \            .map((name) => caches.delete(name)) // delete old versions\n        )\n      )\n      .then(() => self.clients.claim())\
    \ // control all open tabs\n  );\n});\n\n// FETCH: strategy per resource type\nself.addEventListener('fetch', (event)\
    \ => {\n  const { request } = event;\n  const url = new URL(request.url);\n\n  if (SHELL_ASSETS.includes(url.pathname))\
    \ {\n    // Cache-first for shell assets (they change on deploy)\n    event.respondWith(cacheFirst(request, SHELL_CACHE));\n\
    \  } else if (url.pathname.startsWith('/api/')) {\n    // Network-first for API (fresh data preferred)\n    event.respondWith(networkFirst(request,\
    \ API_CACHE));\n  } else if (request.destination === 'image') {\n    // Stale-while-revalidate for images\n    event.respondWith(staleWhileRevalidate(request,\
    \ IMAGE_CACHE));\n  }\n  // Other requests: pass through to network (no caching)\n});\n\n// Caching strategies\nasync\
    \ function cacheFirst(request, cacheName) {\n  const cached = await caches.match(request);\n  if (cached) return cached;\n\
    \  try {\n    const response = await fetch(request);\n    const cache = await caches.open(cacheName);\n    cache.put(request,\
    \ response.clone());\n    return response;\n  } catch {\n    return caches.match('/offline.html');\n  }\n}\n\nasync function\
    \ networkFirst(request, cacheName) {\n  try {\n    const response = await fetch(request);\n    const cache = await caches.open(cacheName);\n\
    \    cache.put(request, response.clone());\n    return response;\n  } catch {\n    const cached = await caches.match(request);\n\
    \    return cached || new Response('{\"error\": \"offline\"}', {\n      headers: { 'Content-Type': 'application/json'\
    \ },\n      status: 503,\n    });\n  }\n}\n\nasync function staleWhileRevalidate(request, cacheName) {\n  const cache\
    \ = await caches.open(cacheName);\n  const cached = await cache.match(request);\n\n  const fetchPromise = fetch(request).then((response)\
    \ => {\n    cache.put(request, response.clone());\n    return response;\n  }).catch(() => cached);\n\n  return cached\
    \ || fetchPromise;\n}\n"
  example_bad: "// No versioned caches — stale assets served forever\nself.addEventListener('install', (event) => {\n  event.waitUntil(\n\
    \    caches.open('cache') // no version — never invalidated\n      .then((cache) => cache.addAll(['/']))\n  );\n});\n\n\
    // No activate cleanup — storage grows unbounded\nself.addEventListener('activate', (event) => {\n  // Does nothing —\
    \ old caches accumulate until storage quota exceeded\n});\n\n// Catch-all cache — API responses cached forever\nself.addEventListener('fetch',\
    \ (event) => {\n  event.respondWith(\n    caches.match(event.request).then((response) => {\n      return response || fetch(event.request);\n\
    \      // Caches EVERYTHING including API calls — stale data forever\n      // No fallback — request hangs if both cache\
    \ miss and network fails\n    })\n  );\n});\n"
  when_applies: Any project using PWA, JavaScript/TypeScript projects, or Service Worker
  when_not_applies: web-only applications, backend services, desktop applications
  sources: ["https://web.dev/articles/service-worker-lifecycle"]
- id: CR-PWA-002
  text: Implement background sync to queue failed requests and retry when connectivity returns — never lose user data to network
    failures
  why: 'Users on mobile networks experience intermittent connectivity. If a user submits a form, adds an item to cart, or
    sends a message during a connectivity gap, the request fails silently. Without background sync, the data is lost — the
    user must manually retry and may not realize their action failed. The Background Sync API allows the service worker to
    queue failed requests and replay them when connectivity returns, even if the user has closed the tab. This transforms
    "request failed" into "request deferred" — the user sees success immediately and the sync happens transparently.

    '
  how_to_do_right: '1. Register sync event when a mutable request (POST/PUT/DELETE) fails

    2. Store the request details in IndexedDB (not just URL — include body, headers)

    3. In sync handler, replay stored requests in order

    4. Handle idempotency: server must handle duplicate requests gracefully

    5. Show UI indicator for pending syncs ("Saving... will complete when online")

    6. Set a maximum retry count and age — don''t retry 30-day-old requests

    '
  severity: high
  technologies:
    lang: [javascript]
    framework: [frontend, pwa, service_worker]
  domains:
    domain: [architecture, mobile]
    concern: [web, offline]
  example_good: "// Service worker — queue failed mutations and retry\nconst SYNC_STORE = 'pending-sync';\n\n// Intercept\
    \ mutation requests\nself.addEventListener('fetch', (event) => {\n  const { request } = event;\n\n  // Only queue mutations,\
    \ not reads\n  if (['POST', 'PUT', 'DELETE'].includes(request.method)) {\n    event.respondWith(\n      fetch(request.clone()).catch(async\
    \ () => {\n        // Network failed — queue for background sync\n        await queueRequest(request);\n        // Register\
    \ sync event\n        await self.registration.sync.register('replay-mutations');\n        // Return optimistic response\
    \ to UI\n        return new Response(JSON.stringify({\n          status: 'queued',\n          message: 'Will sync when\
    \ online',\n        }), {\n          headers: { 'Content-Type': 'application/json' },\n        });\n      })\n    );\n\
    \  }\n});\n\n// Store failed request in IndexedDB\nasync function queueRequest(request) {\n  const db = await openDB(SYNC_STORE);\n\
    \  const body = await request.text();\n  await db.add('requests', {\n    url: request.url,\n    method: request.method,\n\
    \    headers: Object.fromEntries(request.headers),\n    body,\n    timestamp: Date.now(),\n    retryCount: 0,\n  });\n\
    }\n\n// Background sync handler — replay queued requests\nself.addEventListener('sync', (event) => {\n  if (event.tag\
    \ === 'replay-mutations') {\n    event.waitUntil(replayPendingRequests());\n  }\n});\n\nasync function replayPendingRequests()\
    \ {\n  const db = await openDB(SYNC_STORE);\n  const pending = await db.getAll('requests');\n\n  for (const item of pending)\
    \ {\n    // Skip old requests (> 24 hours)\n    if (Date.now() - item.timestamp > 24 * 60 * 60 * 1000) {\n      await\
    \ db.delete('requests', item.id);\n      continue;\n    }\n\n    try {\n      await fetch(item.url, {\n        method:\
    \ item.method,\n        headers: item.headers,\n        body: item.body,\n      });\n      await db.delete('requests',\
    \ item.id); // success — remove from queue\n    } catch {\n      item.retryCount++;\n      if (item.retryCount > 5) {\n\
    \        await db.delete('requests', item.id); // give up after 5 retries\n      } else {\n        await db.put('requests',\
    \ item);\n      }\n    }\n  }\n}\n"
  example_bad: "// No background sync — data lost on network failure\nasync function submitForm(data) {\n  try {\n    await\
    \ fetch('/api/submit', { method: 'POST', body: JSON.stringify(data) });\n  } catch {\n    alert('Network error. Please\
    \ try again.');\n    // User closes tab → data lost forever\n  }\n}\n\n// Background sync without idempotency — duplicate\
    \ submissions\nself.addEventListener('sync', async (event) => {\n  const pending = await getAll();\n  for (const req of\
    \ pending) {\n    await fetch(req.url, { method: 'POST', body: req.body });\n    // Server creates duplicate order because\
    \ sync retried 3 times\n  }\n});\n"
  when_applies: Projects using PWA, JavaScript/TypeScript projects, or Service Worker
  when_not_applies: web-only applications, backend services, desktop applications
  sources: ["https://web.dev/articles/offline-cookbook"]
- id: CR-PWA-003
  text: Implement push notifications via the Web Push API with proper permission UX and fallback for unsupported browsers
  why: 'Push notifications re-engage users who have closed the app/tab — the only way to reach PWA users when they''re not
    actively using the app. However, aggressive permission prompts on first visit have a 90%+ denial rate because users don''t
    yet trust the app. Once denied, the permission cannot be re-requested (browser blocks it permanently). The notification
    must be sent from the server to a push service (FCM for Chrome, Mozilla Push for Firefox) using the Web Push protocol
    with VAPID keys. Client-side notifications (Notification API without push) only work while the tab is open — useless for
    re-engagement.

    '
  how_to_do_right: '1. Ask for permission AFTER the user shows engagement (not on first visit)

    2. Use a soft prompt first ("Would you like notifications?") before browser prompt

    3. Implement server-side push with VAPID keys and web-push library

    4. Handle subscription changes (user clears browser data = new subscription)

    5. Provide notification preferences (categories, frequency) in app settings

    6. Fallback for unsupported browsers: email notifications or in-app badges

    '
  severity: medium
  technologies:
    lang: [javascript]
    framework: [frontend, pwa, service_worker]
  domains:
    domain: [architecture, mobile]
    concern: [web, engagement]
  example_good: "// 1. Soft prompt — ask before browser prompt\nfunction showNotificationBanner() {\n  // Only show after\
    \ user engagement (3+ visits, or completed action)\n  if (!shouldPrompt()) return;\n\n  return (\n    <Banner>\n     \
    \ <p>Get notified about order updates and deals</p>\n      <Button onClick={requestPushPermission}>Enable</Button>\n \
    \     <Button onClick={dismissBanner}>Not now</Button>\n    </Banner>\n  );\n}\n\n// 2. Request permission and subscribe\n\
    async function requestPushPermission() {\n  // Check support\n  if (!('serviceWorker' in navigator) || !('PushManager'\
    \ in window)) {\n    // Fallback: offer email notifications\n    showEmailNotificationOption();\n    return;\n  }\n\n\
    \  const permission = await Notification.requestPermission();\n  if (permission !== 'granted') {\n    // User denied —\
    \ don't ask again, show alternatives\n    showEmailNotificationOption();\n    return;\n  }\n\n  // Subscribe to push service\n\
    \  const registration = await navigator.serviceWorker.ready;\n  const subscription = await registration.pushManager.subscribe({\n\
    \    userVisibleOnly: true, // required by Chrome\n    applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY),\n\
    \  });\n\n  // Send subscription to server\n  await fetch('/api/push/subscribe', {\n    method: 'POST',\n    body: JSON.stringify({\n\
    \      subscription: subscription.toJSON(),\n      categories: ['orders', 'deals'], // user preferences\n    }),\n   \
    \ headers: { 'Content-Type': 'application/json' },\n  });\n}\n\n// 3. Service worker: handle push event\n// sw.js\nself.addEventListener('push',\
    \ (event) => {\n  const data = event.data?.json() ?? {};\n\n  event.waitUntil(\n    self.registration.showNotification(data.title\
    \ || 'New update', {\n      body: data.body,\n      icon: '/icons/icon-192.png',\n      badge: '/icons/badge-72.png',\n\
    \      tag: data.tag || 'default', // replace same-tag notification\n      data: { url: data.url || '/' },\n      actions:\
    \ data.actions || [],\n    })\n  );\n});\n\n// 4. Handle notification click — navigate to relevant page\nself.addEventListener('notificationclick',\
    \ (event) => {\n  event.notification.close();\n  const url = event.notification.data.url;\n\n  event.waitUntil(\n    clients.matchAll({\
    \ type: 'window' }).then((windowClients) => {\n      // Focus existing tab if open\n      for (const client of windowClients)\
    \ {\n        if (client.url === url && 'focus' in client) {\n          return client.focus();\n        }\n      }\n  \
    \    // Open new tab\n      return clients.openWindow(url);\n    })\n  );\n});\n"
  example_bad: "// Permission prompt on first visit — 90% denial rate\nwindow.addEventListener('load', () => {\n  Notification.requestPermission();\
    \ // user has no context, denies\n  // Permission permanently denied — can never ask again\n});\n\n// Client-side only\
    \ notification — doesn't work when tab is closed\nnew Notification('You have a new message');\n// Only shows if tab is\
    \ open — defeats the purpose of push\n\n// No fallback for Safari (partial support) or older browsers\n// 20% of users\
    \ see nothing, no alternative offered\n"
  when_applies: Projects using PWA, JavaScript/TypeScript projects, or Service Worker
  when_not_applies: web-only applications, backend services, desktop applications
  sources: ["https://web.dev/articles/service-worker-lifecycle#updates"]
- id: CR-PWA-004
  text: Configure a complete web app manifest with proper icons, display mode, theme, shortcuts, and screenshots for app-like
    installation
  why: 'The web app manifest (manifest.json) controls how the PWA appears when installed on a device: the app name, icon on
    the home screen, splash screen, and how it opens (fullscreen, standalone, or in browser). An incomplete manifest causes:
    generic browser icon on home screen (instead of your brand), missing splash screen (white flash on launch), browser chrome
    visible in standalone mode (doesn''t feel like an app), and failed A2HS prompts (Chrome requires specific manifest fields
    to trigger the install prompt). Screenshots enable rich install UI on Android. Shortcuts enable quick actions from long-press
    on the home screen icon.

    '
  how_to_do_right: '1. name + short_name: full name for install dialog, short for home screen

    2. icons: at least 192x192 and 512x512 PNG, plus maskable variants

    3. display: "standalone" for app-like experience (no browser chrome)

    4. theme_color: matches your app''s primary color (status bar, window controls)

    5. background_color: splash screen background (matches first paint)

    6. shortcuts: 3-4 quick actions accessible from home screen long-press

    7. screenshots: at least 2 for rich install UI on Android

    '
  severity: high
  technologies:
    lang: [javascript]
    framework: [frontend, pwa]
  domains:
    domain: [architecture, mobile]
    concern: [web]
  example_good: "// manifest.json — complete configuration\n{\n  \"name\": \"My Store - Shop & Track Orders\",\n  \"short_name\"\
    : \"My Store\",\n  \"description\": \"Shop for products and track your orders\",\n  \"start_url\": \"/?source=pwa\",\n\
    \  \"scope\": \"/\",\n  \"display\": \"standalone\",\n  \"orientation\": \"portrait-primary\",\n  \"theme_color\": \"\
    #1a73e8\",\n  \"background_color\": \"#ffffff\",\n\n  \"icons\": [\n    {\n      \"src\": \"/icons/icon-192.png\",\n \
    \     \"sizes\": \"192x192\",\n      \"type\": \"image/png\",\n      \"purpose\": \"any\"\n    },\n    {\n      \"src\"\
    : \"/icons/icon-512.png\",\n      \"sizes\": \"512x512\",\n      \"type\": \"image/png\",\n      \"purpose\": \"any\"\n\
    \    },\n    {\n      \"src\": \"/icons/icon-maskable-192.png\",\n      \"sizes\": \"192x192\",\n      \"type\": \"image/png\"\
    ,\n      \"purpose\": \"maskable\"\n    },\n    {\n      \"src\": \"/icons/icon-maskable-512.png\",\n      \"sizes\":\
    \ \"512x512\",\n      \"type\": \"image/png\",\n      \"purpose\": \"maskable\"\n    }\n  ],\n\n  \"shortcuts\": [\n \
    \   {\n      \"name\": \"Search Products\",\n      \"short_name\": \"Search\",\n      \"url\": \"/search?source=shortcut\"\
    ,\n      \"icons\": [{ \"src\": \"/icons/search-96.png\", \"sizes\": \"96x96\" }]\n    },\n    {\n      \"name\": \"My\
    \ Orders\",\n      \"short_name\": \"Orders\",\n      \"url\": \"/orders?source=shortcut\",\n      \"icons\": [{ \"src\"\
    : \"/icons/orders-96.png\", \"sizes\": \"96x96\" }]\n    },\n    {\n      \"name\": \"My Cart\",\n      \"short_name\"\
    : \"Cart\",\n      \"url\": \"/cart?source=shortcut\",\n      \"icons\": [{ \"src\": \"/icons/cart-96.png\", \"sizes\"\
    : \"96x96\" }]\n    }\n  ],\n\n  \"screenshots\": [\n    {\n      \"src\": \"/screenshots/home.png\",\n      \"sizes\"\
    : \"1080x1920\",\n      \"type\": \"image/png\",\n      \"form_factor\": \"narrow\",\n      \"label\": \"Home screen with\
    \ featured products\"\n    },\n    {\n      \"src\": \"/screenshots/search.png\",\n      \"sizes\": \"1080x1920\",\n \
    \     \"type\": \"image/png\",\n      \"form_factor\": \"narrow\",\n      \"label\": \"Search and filter products\"\n\
    \    }\n  ],\n\n  \"categories\": [\"shopping\", \"lifestyle\"],\n  \"prefer_related_applications\": false\n}\n\n// HTML:\
    \ link manifest and set theme\n// <link rel=\"manifest\" href=\"/manifest.json\">\n// <meta name=\"theme-color\" content=\"\
    #1a73e8\">\n// <meta name=\"apple-mobile-web-app-capable\" content=\"yes\">\n// <meta name=\"apple-mobile-web-app-status-bar-style\"\
    \ content=\"default\">\n// <link rel=\"apple-touch-icon\" href=\"/icons/apple-touch-icon-180.png\">\n"
  example_bad: "// Minimal manifest — generic icon, no splash, install prompt may not trigger\n{\n  \"name\": \"My App\",\n\
    \  \"start_url\": \"/\"\n  // Missing: short_name, icons, display, theme_color, background_color\n  // Result: browser\
    \ default icon, no splash screen, browser chrome visible\n  // Chrome won't trigger install prompt without icons >=192x192\n\
    }\n\n// Only \"any\" purpose icons — adaptive icons look terrible on Android\n\"icons\": [{\n  \"src\": \"/icon.png\"\
    ,\n  \"sizes\": \"512x512\",\n  \"purpose\": \"any\"\n  // On Android adaptive icon: your square icon with white circle\
    \ mask\n  // Looks unprofessional next to other app icons\n}]\n"
  when_applies: Projects using PWA or JavaScript/TypeScript projects
  when_not_applies: web-only applications, backend services, desktop applications. projects not using PWA or JavaScript
  sources: ["https://web.dev/articles/add-manifest"]
- id: CR-PWA-005
  text: Handle the app install prompt (beforeinstallprompt) with a custom UI — never rely on the browser's default install
    banner
  why: 'Chrome''s automatic install banner appears at an arbitrary time and is easily dismissed or ignored. By intercepting
    the beforeinstallprompt event, you can show a custom install prompt at the optimal moment (after the user completes a
    key action, after 3rd visit, after adding to cart) with messaging that explains the benefit ("Install for offline access
    and faster loading"). Custom prompts have 3-5x higher conversion than the default browser banner because they appear in
    context with a value proposition. The event must be captured and deferred — it fires once and cannot be re-triggered.

    '
  how_to_do_right: '1. Capture beforeinstallprompt event and prevent default

    2. Store the event reference for later use

    3. Show custom install UI at the right moment (not immediately)

    4. Call event.prompt() from the custom UI button handler

    5. Track install analytics: prompt shown, accepted, dismissed

    6. Handle iOS separately (no beforeinstallprompt — show manual instructions)

    '
  severity: medium
  technologies:
    lang: [javascript]
    framework: [frontend, pwa]
  domains:
    domain: [architecture, mobile]
    concern: [web, engagement]
  example_good: "// Capture and defer the install prompt\nlet deferredPrompt = null;\nlet installPromptShown = false;\n\n\
    window.addEventListener('beforeinstallprompt', (event) => {\n  event.preventDefault(); // prevent automatic browser banner\n\
    \  deferredPrompt = event; // save for later\n});\n\n// Show custom prompt at optimal moment\nfunction showInstallPrompt()\
    \ {\n  if (!deferredPrompt || installPromptShown) return false;\n\n  // Check criteria: 3+ visits, completed an action,\
    \ not recently dismissed\n  const visits = parseInt(localStorage.getItem('visit_count') || '0');\n  const dismissed =\
    \ localStorage.getItem('install_dismissed');\n  const dismissedRecently = dismissed &&\n    Date.now() - parseInt(dismissed)\
    \ < 7 * 24 * 60 * 60 * 1000; // 7 days\n\n  if (visits < 3 || dismissedRecently) return false;\n\n  installPromptShown\
    \ = true;\n  return true; // signal UI to show prompt\n}\n\n// Custom install UI component\nfunction InstallBanner({ onDismiss\
    \ }) {\n  const [visible, setVisible] = useState(false);\n\n  useEffect(() => {\n    setVisible(showInstallPrompt());\n\
    \  }, []);\n\n  const handleInstall = async () => {\n    if (!deferredPrompt) return;\n\n    deferredPrompt.prompt();\
    \ // show native browser install dialog\n    const { outcome } = await deferredPrompt.userChoice;\n\n    analytics.track('pwa_install_prompt',\
    \ { outcome }); // 'accepted' or 'dismissed'\n    deferredPrompt = null;\n    setVisible(false);\n  };\n\n  const handleDismiss\
    \ = () => {\n    localStorage.setItem('install_dismissed', Date.now().toString());\n    analytics.track('pwa_install_prompt',\
    \ { outcome: 'custom_dismissed' });\n    setVisible(false);\n  };\n\n  if (!visible) return null;\n\n  return (\n    <div\
    \ className=\"install-banner\">\n      <img src=\"/icons/icon-48.png\" alt=\"\" />\n      <div>\n        <strong>Install\
    \ My Store</strong>\n        <p>Shop offline and get faster load times</p>\n      </div>\n      <button onClick={handleInstall}>Install</button>\n\
    \      <button onClick={handleDismiss} aria-label=\"Dismiss\">x</button>\n    </div>\n  );\n}\n\n// iOS fallback: no beforeinstallprompt,\
    \ show manual instructions\nfunction isIOS() {\n  return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;\n\
    }\n\nfunction IOSInstallInstructions() {\n  if (!isIOS() || window.navigator.standalone) return null;\n  return (\n  \
    \  <div className=\"ios-install\">\n      <p>Install this app: tap the share button\n        <img src=\"/icons/share-ios.svg\"\
    \ alt=\"share\" />\n        then \"Add to Home Screen\"\n      </p>\n    </div>\n  );\n}\n"
  example_bad: "// No custom prompt — rely on browser's random timing\n// Browser shows tiny banner at bottom, user ignores\
    \ or dismisses\n// 2% install rate vs 8% with custom prompt\n\n// Prompt immediately on page load — dismissed instantly\n\
    window.addEventListener('beforeinstallprompt', (event) => {\n  event.prompt(); // \"Install this app?\" before user even\
    \ sees the content\n  // User: \"I just got here, no thanks\" — 95% dismissal\n});\n\n// No iOS handling — 50% of mobile\
    \ users see nothing\n// Safari has no beforeinstallprompt — needs manual A2HS instructions\n"
  when_applies: Projects using PWA or JavaScript/TypeScript projects
  when_not_applies: web-only applications, backend services, desktop applications. projects not using PWA or JavaScript
  sources: ["https://developer.mozilla.org/en-US/docs/Web/API/IndexedDB_API"]
- id: CR-PWA-006
  text: Meet Core Web Vitals targets (LCP < 2.5s, INP < 200ms, CLS < 0.1) — these directly impact search ranking and user
    retention
  why: 'Google uses Core Web Vitals as a ranking signal in search results. PWAs that fail these thresholds rank lower, reducing
    organic traffic. Beyond SEO, these metrics directly correlate with user behavior: LCP > 2.5s increases bounce rate by
    32%. INP > 200ms makes interactions feel sluggish. CLS > 0.1 causes rage clicks when the layout shifts under the user''s
    finger. For PWAs competing with native apps, hitting these targets is the minimum bar for perceived performance parity.

    '
  how_to_do_right: '1. LCP (Largest Contentful Paint) < 2.5s: preload hero image, inline critical CSS

    2. INP (Interaction to Next Paint) < 200ms: defer heavy work, use requestIdleCallback

    3. CLS (Cumulative Layout Shift) < 0.1: set explicit dimensions on images/ads/embeds

    4. Measure in field with web-vitals library (not just Lighthouse)

    5. Set performance budgets in CI: fail build if bundle > threshold

    6. Use Chrome User Experience Report (CrUX) for real-user data

    '
  severity: high
  technologies:
    lang: [javascript]
