- id: CR-PWA-007
  text: Use code splitting and lazy loading for routes — only load the code needed for the current page
  why: 'A PWA that bundles all code into one file forces users to download and parse everything before any page renders. A
    typical app with 20 routes might have 2MB of JavaScript, but the user only needs 200KB for the landing page. Code splitting
    creates separate bundles per route, loaded on demand. Combined with service worker pre-caching of critical routes, this
    gives instant navigation to cached routes and on-demand loading for rarely visited pages. Without code splitting, every
    100KB of JavaScript adds ~100ms to Time to Interactive on a mid-range mobile device.

    '
  how_to_do_right: '1. Split by route: each page is a separate chunk

    2. Preload chunks for likely next navigation (prefetch on hover/viewport)

    3. Service worker caches critical route chunks during install

    4. Dynamic import() for heavy libraries used on specific pages only

    5. Set bundle size budgets: initial load < 150KB JS (compressed)

    6. Use webpack-bundle-analyzer or source-map-explorer to find bloat

    '
  severity: high
  technologies:
    lang: [javascript]
    framework: [frontend, pwa, react, vue]
  domains:
    domain: [architecture, mobile, performance]
    concern: [web]
  example_good: "// React: lazy loading routes with Suspense\nimport { lazy, Suspense } from 'react';\nimport { Routes, Route\
    \ } from 'react-router-dom';\n\n// Each route is a separate chunk — loaded on demand\nconst Home = lazy(() => import('./pages/Home'));\n\
    const Search = lazy(() => import('./pages/Search'));\nconst Product = lazy(() => import('./pages/Product'));\nconst Cart\
    \ = lazy(() => import('./pages/Cart'));\nconst Checkout = lazy(() => import('./pages/Checkout'));\nconst Account = lazy(()\
    \ => import('./pages/Account'));\n\nfunction App() {\n  return (\n    <Suspense fallback={<PageSkeleton />}>\n      <Routes>\n\
    \        <Route path=\"/\" element={<Home />} />\n        <Route path=\"/search\" element={<Search />} />\n        <Route\
    \ path=\"/product/:id\" element={<Product />} />\n        <Route path=\"/cart\" element={<Cart />} />\n        <Route\
    \ path=\"/checkout\" element={<Checkout />} />\n        <Route path=\"/account\" element={<Account />} />\n      </Routes>\n\
    \    </Suspense>\n  );\n}\n\n// Prefetch on hover — preload before user clicks\nfunction NavLink({ to, children }) {\n\
    \  const prefetch = () => {\n    // Webpack magic comment for prefetch\n    if (to === '/search') import(/* webpackPrefetch:\
    \ true */ './pages/Search');\n    if (to === '/cart') import(/* webpackPrefetch: true */ './pages/Cart');\n  };\n\n  return\
    \ (\n    <Link to={to} onMouseEnter={prefetch} onTouchStart={prefetch}>\n      {children}\n    </Link>\n  );\n}\n\n//\
    \ Dynamic import for heavy libraries\nasync function generatePDF(order) {\n  // jspdf is 500KB — only loaded when user\
    \ clicks \"Download Receipt\"\n  const { jsPDF } = await import('jspdf');\n  const doc = new jsPDF();\n  doc.text(`Order\
    \ #${order.id}`, 10, 10);\n  doc.save('receipt.pdf');\n}\n"
