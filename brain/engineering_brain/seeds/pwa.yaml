    \ {\n//   aspect-ratio: 16 / 9;\n//   width: 100%;\n//   object-fit: cover;\n// }\n\n// 4. INP optimization: defer heavy\
    \ work\ndocument.getElementById('search').addEventListener('input', (e) => {\n  // Don't process immediately — debounce\
