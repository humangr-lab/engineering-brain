- id: CR-PWA-012
  text: Cache static assets aggressively with content-hash filenames and use service worker for app shell caching
  why: 'Static assets (JS, CSS, images, fonts) should be cached for as long as possible because they don''t change between
    deployments. Content-hash filenames (main.abc123.js) enable infinite cache duration: when the content changes, the filename
    changes, and the browser fetches the new version. Without content-hash, you must choose between: short cache TTL (frequent
    re-downloads, slow loads) or long cache TTL (users stuck with stale code for hours/days). The app shell (HTML skeleton,
    critical CSS, core JS) should be cached by the service worker for instant subsequent loads, even offline.

    '
  how_to_do_right: '1. Build tools generate content-hash filenames: main.[hash].js, styles.[hash].css

    2. Set Cache-Control: public, max-age=31536000, immutable for hashed assets

    3. Set Cache-Control: no-cache for index.html (always check for new version)

    4. Service worker caches app shell during install event

    5. Service worker serves app shell from cache, fetches new version in background

    6. Precache manifest lists all critical assets with their hashes

    '
  severity: high
  technologies:
    lang: [javascript]
    framework: [frontend, pwa]
  domains:
    domain: [architecture, mobile, performance]
    concern: [web]
  example_good: "// Webpack/Vite: content-hash filenames\n// vite.config.js\nexport default defineConfig({\n  build: {\n \
    \   rollupOptions: {\n      output: {\n        // Content-hash in filenames\n        entryFileNames: 'assets/[name].[hash].js',\n\
    \        chunkFileNames: 'assets/[name].[hash].js',\n        assetFileNames: 'assets/[name].[hash].[ext]',\n      },\n\
    \    },\n  },\n});\n\n// Server: cache headers per file type\n// nginx.conf or CDN rules\n// Hashed assets: cache forever\
    \ (hash changes on content change)\n// location /assets/ {\n//   add_header Cache-Control \"public, max-age=31536000,\
    \ immutable\";\n// }\n//\n// HTML: always revalidate (discovers new hashed assets)\n// location / {\n//   add_header Cache-Control\
    \ \"no-cache\";\n// }\n\n// Service worker: precache manifest from build tool\n// Generated by workbox or manually from\
    \ build output\nconst PRECACHE_MANIFEST = [\n  { url: '/index.html', revision: 'abc123' },\n  { url: '/assets/main.def456.js',\
    \ revision: null }, // hash in filename\n  { url: '/assets/styles.ghi789.css', revision: null },\n  { url: '/offline.html',\
    \ revision: 'xyz987' },\n];\n\nself.addEventListener('install', (event) => {\n  event.waitUntil(\n    caches.open(SHELL_CACHE).then((cache)\
    \ =>\n      Promise.all(\n        PRECACHE_MANIFEST.map(({ url }) => cache.add(url))\n      )\n    )\n  );\n});\n\n//\
    \ Hashed assets: always serve from cache (URL uniqueness guarantees freshness)\nself.addEventListener('fetch', (event)\
    \ => {\n  const url = new URL(event.request.url);\n\n  // Hashed assets in /assets/: cache-first (immutable)\n  if (url.pathname.startsWith('/assets/'))\
    \ {\n    event.respondWith(\n      caches.match(event.request).then((cached) =>\n        cached || fetch(event.request).then((response)\
    \ => {\n          caches.open(SHELL_CACHE).then((cache) =>\n            cache.put(event.request, response.clone())\n \
    \         );\n          return response;\n        })\n      )\n    );\n  }\n});\n"
