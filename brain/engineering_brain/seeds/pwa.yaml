- id: CR-PWA-011
  text: Implement a progressive enhancement strategy — the app must work without JavaScript for basic content, enhance with
    JS for full functionality
  why: 'PWAs are websites first. Search engine crawlers, users with JavaScript disabled (corporate proxies, accessibility
    tools), and the initial HTML download must provide meaningful content without JavaScript. Server-Side Rendering (SSR)
    or Static Site Generation (SSG) ensures the first HTML response contains the page content, not an empty div waiting for
    JS to hydrate. This improves: SEO (search engines index real content), LCP (content visible before JS loads), and accessibility
    (screen readers read content immediately). JavaScript then enhances the static content with interactivity.

    '
  how_to_do_right: '1. SSR or SSG for all public pages (product listings, articles, landing pages)

    2. Meaningful HTML in first response (not <div id="root"></div>)

    3. CSS works without JavaScript (layout, colors, typography)

    4. Core content readable without JavaScript (text, images, links)

    5. JavaScript adds: interactivity, dynamic updates, offline support

    6. Test with JavaScript disabled — content should still be readable

    '
  severity: medium
  technologies:
    lang: [javascript]
    framework: [frontend, pwa, react]
    library: [next, js]
  domains:
    domain: [architecture, mobile]
    concern: [web, seo]
  example_good: "// Next.js SSR — content in initial HTML response\n// pages/products/[id].tsx\nexport async function getServerSideProps({\
    \ params }) {\n  const product = await fetchProduct(params.id);\n  return { props: { product } };\n}\n\nexport default\
    \ function ProductPage({ product }) {\n  // HTML contains product info BEFORE JavaScript loads\n  return (\n    <main>\n\
    \      <h1>{product.name}</h1>\n      <img\n        src={product.imageUrl}\n        alt={product.name}\n        width={400}\n\
    \        height={300}\n      />\n      <p className=\"price\">{formatPrice(product.price)}</p>\n      <p>{product.description}</p>\n\
    \n      {/* JavaScript enhances with interactivity */}\n      <AddToCartButton productId={product.id} />\n      <ReviewSection\
    \ productId={product.id} />\n    </main>\n  );\n}\n\n// Without JavaScript:\n// - Product name, image, price, description:\
    \ VISIBLE\n// - Add to Cart button: visible but non-functional\n// - Reviews: loaded via JS, shows \"Loading reviews...\"\
    \ or server-rendered\n\n// With JavaScript:\n// - Hydration adds interactivity\n// - Cart button works\n// - Reviews load\
    \ dynamically\n// - Service worker registers for offline support\n"
  example_bad: "// Client-side only — empty HTML, no SEO, slow LCP\n// index.html\n<html>\n  <body>\n    <div id=\"root\"\
    ></div>\n    <script src=\"/bundle.js\"></script>\n    <!-- Search engine sees: empty page -->\n    <!-- User sees: blank\
    \ screen for 2-5 seconds while JS loads -->\n    <!-- Accessibility: screen reader announces nothing -->\n  </body>\n\
    </html>\n\n// JavaScript disabled: completely blank page\n// Corporate proxy strips JS: completely blank page\n// Slow\
    \ 3G: 10 seconds of blank screen before any content\n"
