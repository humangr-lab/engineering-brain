    \ => {\n      processSearch(e.target.value); // heavy filtering in idle time\n    });\n  }, 200);\n});\n\n// 5. Performance\
    \ budget in CI\n// performance-budget.json\n// {\n//   \"bundles\": [\n//     { \"name\": \"main.js\", \"maxSize\": \"\
    150KB\" },\n//     { \"name\": \"vendor.js\", \"maxSize\": \"200KB\" }\n//   ],\n//   \"targets\": {\n//     \"LCP\":\
    \ 2500,\n//     \"INP\": 200,\n//     \"CLS\": 0.1\n//   }\n// }\n"
