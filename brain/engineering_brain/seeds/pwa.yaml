- id: CR-PWA-008
  text: Notify users of PWA updates and provide a smooth update flow — never silently update or force-reload during active
    use
  why: 'Service worker updates happen in the background: the browser downloads the new worker, installs it, but keeps the
    old one active until all tabs are closed. Users who keep a PWA tab open for days never get the update. skipWaiting() activates
    the new worker immediately but can break in-flight requests if the new worker has different caching rules. The correct
    approach: detect the update, show a non-intrusive "Update available" banner, and let the user trigger the update when
    ready. Force-reloading during active use (e.g., while filling a form) causes data loss and user frustration.

    '
  how_to_do_right: '1. Detect service worker update via registration.onupdatefound + statechange

    2. Show non-intrusive banner: "New version available — click to update"

    3. On user action: tell new worker to skipWaiting, then reload page

    4. Use BroadcastChannel or postMessage for worker-to-page communication

    5. Save form state before reload (localStorage or sessionStorage)

    6. Track update adoption rate — stale versions = potential bugs

    '
  severity: high
  technologies:
    lang: [javascript]
    framework: [frontend, pwa, service_worker]
  domains:
    domain: [architecture, mobile]
    concern: [web]
  example_good: "// Register service worker and detect updates\nasync function registerSW() {\n  const registration = await\
    \ navigator.serviceWorker.register('/sw.js');\n\n  // Check for updates periodically (every hour)\n  setInterval(() =>\
    \ registration.update(), 60 * 60 * 1000);\n\n  // Detect new service worker available\n  registration.addEventListener('updatefound',\
    \ () => {\n    const newWorker = registration.installing;\n    if (!newWorker) return;\n\n    newWorker.addEventListener('statechange',\
    \ () => {\n      if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {\n        // New version\
    \ available — show update banner\n        showUpdateBanner(newWorker);\n      }\n    });\n  });\n\n  // Handle controller\
    \ change — new SW activated, reload\n  let refreshing = false;\n  navigator.serviceWorker.addEventListener('controllerchange',\
    \ () => {\n    if (refreshing) return;\n    refreshing = true;\n    window.location.reload();\n  });\n}\n\n// UI component\n\
    function UpdateBanner({ onUpdate }) {\n  return (\n    <div className=\"update-banner\" role=\"alert\">\n      <p>A new\
    \ version is available</p>\n      <button onClick={onUpdate}>Update now</button>\n    </div>\n  );\n}\n\nfunction showUpdateBanner(newWorker)\
    \ {\n  const handleUpdate = () => {\n    // Save any unsaved form state\n    saveFormState();\n    // Tell new worker\
    \ to take over\n    newWorker.postMessage({ type: 'SKIP_WAITING' });\n  };\n\n  renderBanner(<UpdateBanner onUpdate={handleUpdate}\
    \ />);\n}\n\n// Service worker: handle skip waiting message\n// sw.js\nself.addEventListener('message', (event) => {\n\
    \  if (event.data?.type === 'SKIP_WAITING') {\n    self.skipWaiting();\n  }\n});\n"
  example_bad: "// Silent force update — reloads page while user is typing\nnavigator.serviceWorker.register('/sw.js').then((reg)\
    \ => {\n  reg.addEventListener('updatefound', () => {\n    const newWorker = reg.installing;\n    newWorker.addEventListener('statechange',\
    \ () => {\n      if (newWorker.state === 'activated') {\n        window.location.reload(); // USER IS FILLING A FORM —\
    \ DATA LOST\n      }\n    });\n  });\n});\n\n// skipWaiting() in install event — breaks in-flight requests\n// sw.js\n\
    self.addEventListener('install', () => {\n  self.skipWaiting(); // old cache rules still active for open tabs\n  // New\
    \ fetch handler handles requests that old handler cached differently\n  // Result: missing assets, broken pages\n});\n"
  when_applies: Projects using PWA, JavaScript/TypeScript projects, or Service Worker
  when_not_applies: web-only applications, backend services, desktop applications
  sources: ["https://developer.mozilla.org/en-US/docs/Web/API/Push_API"]
- id: CR-PWA-009
  text: Provide a meaningful offline page with cached content and pending action status — never show the browser's default
    offline dinosaur
  why: 'The browser''s default offline page ("No internet connection" with a dinosaur game on Chrome) tells the user your
    PWA is just a website. A custom offline page that shows cached content, pending sync status, and basic functionality maintains
    the app illusion and keeps users engaged. The best offline experiences show: recently viewed content from cache, the user''s
    pending actions ("2 items waiting to sync"), and a clear indicator of connectivity status. This is the defining feature
    that separates a PWA from a regular website.

    '
  how_to_do_right: '1. Pre-cache a dedicated /offline.html during service worker install

    2. Serve /offline.html as fallback when both network and cache miss

    3. Show cached content relevant to the user (recent views, favorites)

    4. Show pending sync status ("3 actions will complete when online")

    5. Auto-refresh when connectivity returns (online event)

    6. Allow offline-capable actions (browse cached content, write drafts)

    '
  severity: medium
  technologies:
    lang: [javascript]
    framework: [frontend, pwa, service_worker]
  domains:
    domain: [architecture, mobile]
    concern: [web, offline]
  example_good: "// offline.html — rich offline experience\n<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"\
    utf-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n    <title>My Store - Offline</title>\n\
    \    <style>\n        /* Inline CSS — no external requests needed */\n        .offline-container { max-width: 600px; margin:\
    \ 40px auto; padding: 20px; }\n        .status-badge { padding: 4px 12px; border-radius: 12px; background: #f0f0f0; }\n\
    \        .pending-item { padding: 12px; border-bottom: 1px solid #eee; }\n    </style>\n</head>\n<body>\n    <div class=\"\
    offline-container\">\n        <h1>You're offline</h1>\n        <p>Some features are still available:</p>\n\n        <!--\
    \ Recently viewed items from cache -->\n        <section id=\"recent-items\">\n            <h2>Recently Viewed</h2>\n\
    \            <div id=\"cached-content\">Loading cached content...</div>\n        </section>\n\n        <!-- Pending sync\
    \ actions -->\n        <section id=\"pending-actions\">\n            <h2>Pending Actions</h2>\n            <div id=\"\
    sync-queue\">Checking...</div>\n        </section>\n\n        <!-- Connectivity indicator -->\n        <div id=\"connectivity-status\"\
    \ class=\"status-badge\">\n            Offline - Will reconnect automatically\n        </div>\n    </div>\n\n    <script>\n\
    \        // Load cached content from IndexedDB\n        async function loadCachedContent() {\n            const db = await\
    \ openDB('app-cache');\n            const items = await db.getAll('recent-views');\n            const container = document.getElementById('cached-content');\n\
    \            if (items.length === 0) {\n                container.textContent = 'No cached content available';\n     \
    \           return;\n            }\n            container.innerHTML = items.map(item =>\n                `<div class=\"\
    pending-item\">\n                    <strong>${item.name}</strong>\n                    <span>${item.price}</span>\n \
    \               </div>`\n            ).join('');\n        }\n\n        // Show pending sync count\n        async function\
    \ showPendingActions() {\n            const db = await openDB('pending-sync');\n            const pending = await db.getAll('requests');\n\
    \            const container = document.getElementById('sync-queue');\n            if (pending.length === 0) {\n     \
    \           container.textContent = 'No pending actions';\n            } else {\n                container.textContent\
    \ =\n                    `${pending.length} action(s) will sync when online`;\n            }\n        }\n\n        //\
    \ Auto-refresh when back online\n        window.addEventListener('online', () => {\n            document.getElementById('connectivity-status').textContent\
    \ =\n                'Back online! Refreshing...';\n            setTimeout(() => window.location.reload(), 1000);\n  \
    \      });\n\n        loadCachedContent();\n        showPendingActions();\n    </script>\n</body>\n</html>\n"
  example_bad: "// No offline page — user sees Chrome's dinosaur\n// Service worker fetch handler:\nself.addEventListener('fetch',\
    \ (event) => {\n  event.respondWith(fetch(event.request));\n  // Network fails → browser default error page\n  // User\
    \ thinks the \"app\" is broken\n});\n\n// Minimal offline page — no useful content\n// offline.html\n<h1>No internet connection</h1>\n\
    <p>Please try again later.</p>\n// No cached content, no pending status, no auto-reconnect\n// User closes the tab, opens\
    \ a competitor\n"
