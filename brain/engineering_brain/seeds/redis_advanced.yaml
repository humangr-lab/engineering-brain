- id: CR-REDIS-FIN-004
  text: Use Redis pub/sub for real-time price feed distribution — it broadcasts price updates to all connected clients with
    microsecond latency, ideal for live market data.
  why: Prediction market platforms need to push price updates to all connected users in real-time. Polling the API (every client
    requesting prices every second) creates N*frequency requests — 10,000 users polling every second is 10,000 req/s on the
    API server. Redis pub/sub broadcasts each price update to all subscribers with a single publish operation. The publish latency
    is microseconds, and Redis handles millions of messages per second. Combined with WebSocket connections on the application
    server, pub/sub enables real-time price feeds with minimal server load. Since price feed messages are ephemeral (a missed
    update is replaced by the next one), pub/sub's fire-and-forget semantics are perfectly suited.
  how_to_do_right: '1. Publish price updates to market-specific channels: prices:market:{id}.

    2. Use pattern subscriptions (PSUBSCRIBE prices:market:*) for clients watching multiple markets.

    3. Include sequence numbers in messages so clients can detect missed updates.

    4. Combine with WebSocket on the application layer: Redis pub/sub → app server → WebSocket → browser.

    5. Use Redis Streams (not pub/sub) if you need durable price history or replay.

    6. In Redis Cluster, use sharded pub/sub (SSUBSCRIBE, Redis 7.0+) for scalable distribution.

    '
  severity: medium
  technologies:
    platform: [redis]
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [architecture, fintech]
    concern: [data, database, real_time, financial]
  example_good: "import redis\nimport json\nimport asyncio\nfrom fastapi import FastAPI, WebSocket\n\nr = redis.Redis()\napp\
    \ = FastAPI()\n\n# Publisher: called when orderbook changes\ndef publish_price_update(market_id: str, bid: float, ask: float,\
    \ last: float, seq: int):\n    r.publish(f'prices:market:{market_id}', json.dumps({\n        'market_id': market_id,\n  \
    \      'bid': bid, 'ask': ask, 'last': last,\n        'seq': seq,  # Sequence number for gap detection\n        'ts': time.time(),\n\
    \    }))\n\n# WebSocket endpoint: subscribes to Redis pub/sub, forwards to browser\n@app.websocket('/ws/prices/{market_id}')\n\
    async def price_feed(websocket: WebSocket, market_id: str):\n    await websocket.accept()\n    pubsub = r.pubsub()\n   \
    \ pubsub.subscribe(f'prices:market:{market_id}')\n    try:\n        for message in pubsub.listen():\n            if message['type']\
    \ == 'message':\n                await websocket.send_text(message['data'].decode())\n    finally:\n        pubsub.unsubscribe()\n\
    \        await websocket.close()\n\n# 10,000 connected users get real-time prices\n# Server load: 1 publish per price change\
    \ (not 10,000 API calls)\n"
  example_bad: "# Polling API — 10,000 users × 1 req/s = 10,000 req/s\n@app.get('/api/prices/{market_id}')\ndef get_prices(market_id:\
    \ str):\n    return db.query('SELECT bid, ask, last FROM prices WHERE market_id = %s', market_id)\n# Client: setInterval(fetch('/api/prices/mkt-001'),\
    \ 1000)\n# 10K users: 10K queries/second to the database\n# Price updates delayed by up to 1 second (polling interval)\n\
    # Database CPU at 100% from identical queries\n"
  when_applies: Real-time market data systems, prediction market platforms, trading interfaces
  when_not_applies: batch analytics, systems where real-time pricing is not needed
  sources: ["https://redis.io/docs/latest/develop/interact/pubsub/"]
- id: CR-REDIS-FIN-005
  text: Use Redis rate limiting for API protection in financial platforms — implement sliding window rate limits with atomic
    Lua scripts to prevent abuse, ensure fair access, and comply with regulatory requirements.
  why: Financial APIs are high-value targets for abuse — automated trading bots hammering the order API, scrapers extracting
    market data, and DDoS attacks targeting settlement endpoints. Rate limiting protects system stability and ensures fair access
    for all users. For prediction markets, regulators may require rate limits to prevent market manipulation through rapid-fire
    order placement. Redis-based rate limiting with Lua scripts provides atomic, sub-millisecond rate checks that scale to millions
    of requests per second. The sliding window algorithm (using Sorted Sets) provides smoother rate limiting than fixed windows,
    preventing burst-at-boundary exploits.
  how_to_do_right: '1. Implement sliding window rate limiting using Redis Sorted Sets + Lua script (atomic).

    2. Apply different rate limits by tier: free users (10 req/min), paid (100 req/min), market makers (1000 req/min).

    3. Rate limit by user ID (authenticated) and IP address (unauthenticated) as separate keys.

    4. Return rate limit headers: X-RateLimit-Limit, X-RateLimit-Remaining, X-RateLimit-Reset.

    5. Use a separate Redis instance for rate limiting so it does not compete with cache/session workloads.

    6. Monitor rate limit hits — frequent hitting may indicate abuse or undersized limits.

    '
  severity: high
  technologies:
    platform: [redis]
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [architecture, security, fintech]
    concern: [data, database, rate_limiting, financial]
  example_good: "import redis\nimport time\n\nr = redis.Redis()\n\n# Atomic sliding window rate limiter (Lua script)\nRATE_LIMIT_SCRIPT\
    \ = \"\"\"\nlocal key = KEYS[1]\nlocal now = tonumber(ARGV[1])\nlocal window = tonumber(ARGV[2])\nlocal limit = tonumber(ARGV[3])\n\
    \nredis.call('ZREMRANGEBYSCORE', key, 0, now - window)\nlocal count = redis.call('ZCARD', key)\n\nif count < limit then\n\
    \    redis.call('ZADD', key, now, now .. ':' .. math.random(1000000))\n    redis.call('EXPIRE', key, window)\n    return\
    \ {1, limit - count - 1, 0}  -- allowed, remaining, retry_after\nelse\n    local oldest = redis.call('ZRANGE', key, 0, 0,\
    \ 'WITHSCORES')\n    local retry_after = window - (now - tonumber(oldest[2]))\n    return {0, 0, retry_after}  -- denied,\
    \ 0 remaining, retry_after\nend\n\"\"\"\n\nrate_limiter = r.register_script(RATE_LIMIT_SCRIPT)\n\nRATE_LIMITS = {\n    'free':\
    \ (60, 10),       # 10 requests per 60 seconds\n    'paid': (60, 100),      # 100 requests per 60 seconds\n    'maker':\
    \ (60, 1000),    # 1000 requests per 60 seconds\n}\n\ndef check_rate_limit(user_id: str, tier: str) -> tuple[bool, dict]:\n\
    \    window, limit = RATE_LIMITS[tier]\n    result = rate_limiter(\n        keys=[f'rate:{user_id}'],\n        args=[time.time(),\
    \ window, limit],\n    )\n    allowed, remaining, retry_after = result\n    headers = {\n        'X-RateLimit-Limit': str(limit),\n\
    \        'X-RateLimit-Remaining': str(remaining),\n        'X-RateLimit-Reset': str(int(time.time()) + int(retry_after)),\n\
    \    }\n    return bool(allowed), headers\n"
  example_bad: "# No rate limiting — API is unprotected\n@app.post('/api/orders')\nasync def place_order(order: Order):\n   \
    \ return await execute_order(order)\n    # Bot places 10,000 orders per second\n    # Database overwhelmed, legitimate users\
    \ cannot trade\n    # Regulators: \"Where is your market manipulation prevention?\"\n\n# Fixed window rate limiting — burst\
    \ at boundary\nif r.incr(f'rate:{user_id}') > 100:\n    raise RateLimited()\nr.expire(f'rate:{user_id}', 60)\n# User sends\
    \ 100 requests at 0:59 and 100 at 1:01 = 200 in 2 seconds\n"
  when_applies: Financial APIs, prediction market platforms, trading endpoints
  when_not_applies: internal batch processing, non-financial APIs with low abuse risk
  sources: ["https://redis.io/docs/latest/develop/use/patterns/rate-limiting/"]
