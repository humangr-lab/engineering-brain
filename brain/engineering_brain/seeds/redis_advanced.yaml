- id: CR-RED-DS-001
  text: Use Sorted Sets for leaderboards, rate limiters, and priority queues — they provide O(log N) insertion and O(log N
    + M) range queries with automatic score-based ordering.
  why: Implementing leaderboards or priority queues with plain keys or hashes requires reading all entries, sorting in application
    code, and writing back — O(N log N) per operation and not atomic. Sorted Sets maintain elements ordered by score in a
    skip list, enabling ZADD (insert/update), ZRANGEBYSCORE (range query), ZRANK (position lookup), and ZINCRBY (atomic score
    increment) all in O(log N). For a leaderboard with 1M players, getting the top 100 is O(log N + 100) instead of O(N log
    N). Rate limiters using sliding windows with ZADD/ZRANGEBYSCORE are both atomic and efficient.
  how_to_do_right: 'For leaderboards: ZADD key score member, ZREVRANGE key 0 99 WITHSCORES (top 100), ZRANK key member (player
    position). For rate limiting: ZADD key timestamp member, ZRANGEBYSCORE key (now-window) now (count requests in window),
    ZREMRANGEBYSCORE key 0 (now-window) (clean old entries). For priority queues: ZADD key priority task, ZPOPMIN key (get
    highest priority). Use ZRANGEBYLEX for lexicographic ordering.'
  severity: high
  technologies:
    platform: [redis]
  domains:
    domain: [architecture, performance]
    concern: [data, database, caching, real_time]
  example_good: "# Leaderboard — O(log N) per operation\nZADD leaderboard 1500 \"player:alice\"\nZADD leaderboard 2300 \"\
    player:bob\"\nZADD leaderboard 1800 \"player:charlie\"\nZINCRBY leaderboard 100 \"player:alice\"  # Alice scores 100 more\n\
    \n# Top 3 players with scores\nZREVRANGE leaderboard 0 2 WITHSCORES\n# 1) \"player:bob\"    2300\n# 2) \"player:charlie\"\
    \ 1800\n# 3) \"player:alice\"  1600\n\n# Player's rank (0-based, from top)\nZREVRANK leaderboard \"player:charlie\"  #\
    \ Returns 1 (2nd place)\n\n# Sliding window rate limiter (10 requests per 60 seconds)\nimport time, redis\nr = redis.Redis()\n\
    \ndef is_rate_limited(user_id: str, limit: int = 10, window: int = 60) -> bool:\n    key = f\"rate:{user_id}\"\n    now\
    \ = time.time()\n    pipe = r.pipeline()\n    pipe.zremrangebyscore(key, 0, now - window)  # Remove old entries\n    pipe.zadd(key,\
    \ {f\"{now}:{id(object())}\": now})  # Add current request\n    pipe.zcard(key)  # Count requests in window\n    pipe.expire(key,\
    \ window)  # TTL for cleanup\n    _, _, count, _ = pipe.execute()\n    return count > limit\n"
  example_bad: '# Using a LIST for leaderboard — O(N) to find rank

    RPUSH leaderboard ''{"player":"alice","score":1500}''

    # To get top 10: must LRANGE all, parse JSON, sort in app code

    # O(N) read + O(N log N) sort vs O(log N + 10) with Sorted Set


    # Rate limiting with a simple counter — no sliding window

    INCR rate:user123

    EXPIRE rate:user123 60

    # Problem: counter resets at the exact TTL boundary

    # User can do 10 requests at 0:59 and 10 more at 1:01 = 20 in 2 seconds

    '
  when_applies: Projects using Redis cache/pub-sub systems
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using Redis
  sources: ["https://redis.io/docs/latest/develop/data-types/sorted-sets/"]
- id: CR-RED-DS-002
  text: Use Redis Streams for reliable message queues with consumer groups — they provide exactly-once delivery semantics,
    message acknowledgment, and dead letter handling.
  why: 'Using Redis Lists (RPUSH/BLPOP) for message queues loses messages on consumer crashes — once a message is popped,
    it is gone. Pub/Sub has no persistence — if no subscriber is listening, messages are lost. Redis Streams combine the durability
    of an append-only log with consumer group semantics: messages are stored persistently, each consumer group tracks its
    own offset, unacknowledged messages can be reclaimed (XCLAIM), and messages survive consumer restarts. This makes Streams
    a lightweight alternative to Kafka for applications already using Redis.'
  how_to_do_right: Create streams with XADD, consumer groups with XGROUP CREATE. Consumers read with XREADGROUP (blocks until
    new messages). After processing, acknowledge with XACK. Use XPENDING to find unacknowledged messages and XCLAIM to reassign
    them after a timeout. Set MAXLEN or MINID on XADD to bound stream size. For exactly-once processing, use the message ID
    as an idempotency key.
  severity: high
  technologies:
    platform: [redis]
  domains:
    domain: [architecture, messaging]
    concern: [data, database, event-driven]
  example_good: "# Create stream and consumer group\nXGROUP CREATE orders:stream orders-group $ MKSTREAM\n\n# Producer: add\
    \ events to stream\nXADD orders:stream MAXLEN ~10000 * \\\n  order_id \"ORD-123\" action \"created\" amount \"99.50\"\n\
    \n# Consumer: read new messages (blocks up to 5 seconds)\nXREADGROUP GROUP orders-group consumer-1 COUNT 10 BLOCK 5000\
    \ \\\n  STREAMS orders:stream >\n\n# Acknowledge successful processing\nXACK orders:stream orders-group \"1677123456789-0\"\
    \n\n# Check for unacknowledged messages (consumer crashed)\nXPENDING orders:stream orders-group - + 10\n\n# Reclaim messages\
    \ idle for 30+ seconds\nXAUTOCLAIM orders:stream orders-group consumer-2 30000 0-0\n\n# Python consumer with proper error\
    \ handling\nimport redis\nr = redis.Redis()\n\nwhile True:\n    messages = r.xreadgroup(\n        \"orders-group\", \"\
    consumer-1\",\n        {\"orders:stream\": \">\"},\n        count=10, block=5000\n    )\n    for stream, entries in messages:\n\
    \        for msg_id, fields in entries:\n            try:\n                process_order(fields)\n                r.xack(\"\
    orders:stream\", \"orders-group\", msg_id)\n            except Exception:\n                pass  # Message stays pending\
    \ for XAUTOCLAIM\n"
  example_bad: '# Using LIST as message queue — messages lost on crash

    RPUSH queue ''{"order_id": "ORD-123"}''

    BLPOP queue 0

    # If consumer crashes after BLPOP but before processing: message LOST

    # No consumer groups — only one consumer can read each message

    # No replay — once popped, message is gone


    # Using PUB/SUB — messages lost if no subscriber

    PUBLISH orders ''{"order_id": "ORD-123"}''

    # If no subscriber is connected: message LOST

    # No persistence — cannot replay historical messages

    # No acknowledgment — publisher doesn''t know if message was processed

    '
  when_applies: Projects using Redis cache/pub-sub systems
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using Redis
  sources: ["https://redis.io/docs/latest/develop/data-types/streams/"]
- id: CR-RED-DS-003
  text: Use HyperLogLog for probabilistic cardinality estimation — it counts unique elements using only 12KB of memory regardless
    of the actual count.
  why: Counting unique visitors, unique IP addresses, or unique search queries exactly requires storing every unique element
    in a Set — consuming O(N) memory. For 100M unique visitors, that is ~3.2GB of memory per counter. HyperLogLog uses a fixed
    12KB per counter regardless of cardinality and provides cardinality estimates with a standard error of 0.81%. For most
    analytics use cases (unique visitors, unique events, unique users per feature), the 0.81% error is negligible compared
    to the 250,000x memory reduction. Multiple HyperLogLogs can be merged (PFMERGE) for aggregate counts.
  how_to_do_right: Use PFADD to add elements, PFCOUNT to get the estimated cardinality, PFMERGE to combine counters. Create
    separate HyperLogLogs per time period (day, hour) and PFMERGE for aggregate periods. Do NOT use HyperLogLog when you need
    exact counts (financial transactions, inventory) or when you need to check membership (use Bloom filter instead). HyperLogLog
    answers 'how many unique?' but cannot answer 'was this element seen?'
  severity: medium
  technologies:
    platform: [redis]
  domains:
    domain: [architecture, performance]
    concern: [data, database, analytics]
  example_good: "# Count unique visitors per day — 12KB per day\nPFADD visitors:2026-02-15 \"user:alice\" \"user:bob\" \"\
    user:charlie\"\nPFADD visitors:2026-02-15 \"user:alice\"  # Duplicate — not counted\nPFCOUNT visitors:2026-02-15  # Returns\
    \ ~3 (with 0.81% error)\n\n# Merge weekly unique visitors\nPFMERGE visitors:week-7 \\\n  visitors:2026-02-10 visitors:2026-02-11\
    \ visitors:2026-02-12 \\\n  visitors:2026-02-13 visitors:2026-02-14 visitors:2026-02-15 visitors:2026-02-16\nPFCOUNT visitors:week-7\
    \  # Weekly unique visitors\n\n# Memory comparison:\n# HyperLogLog: 7 keys × 12KB = 84KB for weekly tracking\n# SET: 10M\
    \ unique visitors × 32 bytes avg = 320MB per day = 2.24GB weekly\n\n# Python usage\nimport redis\nr = redis.Redis()\n\n\
    def track_unique_visitor(page: str, user_id: str):\n    date = datetime.now().strftime(\"%Y-%m-%d\")\n    r.pfadd(f\"\
    uv:{page}:{date}\", user_id)\n\ndef get_unique_visitors(page: str, date: str) -> int:\n    return r.pfcount(f\"uv:{page}:{date}\"\
    )\n"
  example_bad: '# Using SET for unique counting — O(N) memory

    SADD visitors:2026-02-15 "user:alice" "user:bob" "user:charlie"

    SCARD visitors:2026-02-15  # Exact count: 3

    # With 10M visitors: SET uses 320MB vs HyperLogLog''s 12KB

    # 26,000x more memory for 0.81% more accuracy


    # Using HyperLogLog for exact-count requirements

    PFADD inventory:warehouse-1 "SKU-001" "SKU-002"

    PFCOUNT inventory:warehouse-1  # Might return 2 or 3 — unacceptable for inventory

    # HyperLogLog error is ±0.81% — for 100 SKUs that is ±1 SKU

    '
  when_applies: Projects using Redis cache/pub-sub systems
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using Redis
  sources: ["https://redis.io/docs/latest/develop/data-types/probabilistic/hyperloglogs/"]
- id: CR-RED-DS-004
  text: Use Lua scripting for atomic multi-step operations — Lua scripts execute as a single atomic command, preventing race
    conditions between read and write steps.
  why: 'Redis executes commands sequentially but individual commands are not composable atomically. A pattern like GET key,
    check value, SET key has a race condition — another client can modify the key between GET and SET. MULTI/EXEC transactions
    prevent interleaving but cannot use intermediate results (you cannot branch based on GET result inside MULTI). Lua scripts
    solve this: they execute atomically on the server, can read values, compute, branch, and write — all without any other
    client intervening. This is the correct way to implement compare-and-swap, conditional updates, and complex atomic operations.'
  how_to_do_right: Write Lua scripts using EVAL or EVALSHA (preloaded). Pass keys as KEYS[] and arguments as ARGV[] for cluster
    compatibility. Keep scripts short (< 5ms execution time) — long-running scripts block all other Redis commands. Use redis.call()
    for commands that should propagate errors, redis.pcall() for error handling. Cache scripts with SCRIPT LOAD + EVALSHA
    to avoid resending script text.
  severity: high
  technologies:
    platform: [redis]
  domains:
    domain: [architecture, performance]
    concern: [data, database, concurrency]
  example_good: "-- Atomic rate limiter with sliding window (Lua script)\n-- KEYS[1] = rate limit key\n-- ARGV[1] = current\
    \ timestamp, ARGV[2] = window size, ARGV[3] = max requests\nlocal key = KEYS[1]\nlocal now = tonumber(ARGV[1])\nlocal\
    \ window = tonumber(ARGV[2])\nlocal max_requests = tonumber(ARGV[3])\n\n-- Remove expired entries\nredis.call('ZREMRANGEBYSCORE',\
    \ key, 0, now - window)\n\n-- Count current requests\nlocal count = redis.call('ZCARD', key)\n\nif count < max_requests\
    \ then\n    -- Add new request\n    redis.call('ZADD', key, now, now .. ':' .. math.random(1000000))\n    redis.call('EXPIRE',\
    \ key, window)\n    return 1  -- Allowed\nelse\n    return 0  -- Rate limited\nend\n\n# Python usage\nrate_limit_script\
    \ = r.register_script(LUA_SCRIPT)\nallowed = rate_limit_script(\n    keys=[\"rate:user:123\"],\n    args=[time.time(),\
    \ 60, 10]\n)\n"
  example_bad: "# Non-atomic rate limiter — race condition\nimport redis, time\nr = redis.Redis()\n\ndef check_rate_limit(user_id):\n\
    \    key = f\"rate:{user_id}\"\n    now = time.time()\n    r.zremrangebyscore(key, 0, now - 60)  # Step 1: Remove old\n\
    \    # RACE CONDITION: another request can arrive here\n    count = r.zcard(key)                    # Step 2: Count\n\
    \    # RACE CONDITION: count is stale\n    if count < 10:\n        r.zadd(key, {str(now): now})         # Step 3: Add\n\
    \        return True\n    return False\n# 20 concurrent requests can all pass the count < 10 check\n# Result: 20 requests\
    \ allowed when limit is 10\n"
  when_applies: Projects using Redis cache/pub-sub systems
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using Redis
  sources: ["https://redis.io/docs/latest/develop/interact/programmability/eval-intro/"]
- id: CR-RED-DS-005
  text: Use hybrid persistence (RDB + AOF) for production Redis — RDB for fast restart and AOF for durability, with appendfsync
    everysec as the balanced default.
  why: RDB snapshots are point-in-time copies saved every N minutes. If Redis crashes between snapshots, you lose up to N
    minutes of data. AOF logs every write command and can be replayed for full recovery, but AOF files are larger and restart
    is slower (replaying millions of commands). Hybrid mode uses AOF for durability (fsync every second = max 1 second of
    data loss) and rewrites the AOF in RDB format during compaction for fast restart. appendfsync=always writes to disk on
    every command (zero data loss but 100x slower). appendfsync=no delegates to the OS (fastest but up to 30 seconds of data
    loss).
  how_to_do_right: 'Enable both RDB and AOF: save ''900 1'' (RDB snapshot every 15min if 1+ key changed), appendonly yes,
    appendfsync everysec. The AOF rewrite uses RDB format for the base (aof-use-rdb-preamble yes). Monitor with INFO persistence
    — check rdb_last_bgsave_status and aof_last_bgrewrite_status. Test recovery regularly: stop Redis, restart, verify data.'
  severity: critical
  technologies:
    platform: [redis]
  domains:
    domain: [architecture, reliability, operations]
    concern: [data, database]
  example_good: '# redis.conf — hybrid persistence (recommended for production)


    # RDB snapshots — fast point-in-time recovery

    save 900 1       # Snapshot every 15min if 1+ key changed

    save 300 10      # Snapshot every 5min if 10+ keys changed

    save 60 10000    # Snapshot every 1min if 10000+ keys changed


    # AOF — durability (max 1 second data loss)

    appendonly yes

    appendfsync everysec             # Fsync every second (balanced)

    aof-use-rdb-preamble yes         # Hybrid: RDB format in AOF rewrite

    auto-aof-rewrite-percentage 100  # Rewrite when AOF doubles in size

    auto-aof-rewrite-min-size 64mb   # Minimum size before rewrite


    # Recovery order: Redis loads AOF if exists (more complete), else RDB


    # Monitoring

    # redis-cli INFO persistence

    # rdb_last_bgsave_status: ok

    # aof_last_bgrewrite_status: ok

    # aof_current_size: 125829120

    '
  example_bad: '# No persistence — all data lost on restart

    save ""

    appendonly no

    # Redis restart = empty database

    # Server crash = all session data, cache, queues LOST


    # RDB only with infrequent saves — up to 15 min data loss

    save 900 1

    appendonly no

    # Server crashes 14 minutes after last snapshot

    # Result: 14 minutes of writes are LOST


    # appendfsync always — correct but too slow for most workloads

    appendfsync always

    # Every write waits for fsync to disk

    # Throughput drops from 100K ops/s to 1K ops/s

    # Only justified for financial transaction logging

    '
  when_applies: Any project using Redis cache/pub-sub systems
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using Redis
  sources: ["https://redis.io/docs/latest/operate/oss_and_stack/management/persistence/"]
- id: CR-RED-DS-006
  text: Understand Redis Cluster's hash slot model — all keys in a multi-key operation must map to the same hash slot, enforced
    by using hash tags {tag}.
  why: 'Redis Cluster distributes data across nodes using 16,384 hash slots. Each key is assigned to a slot via CRC16(key)
    % 16384. Multi-key commands (MGET, MSET, SUNION, Lua scripts with multiple KEYS) require all keys to be on the same node
    — otherwise Redis returns CROSSSLOT error. This is the most common Redis Cluster migration pitfall: code that works on
    standalone Redis breaks in cluster mode because related keys land on different nodes. Hash tags ({prefix}) force keys
    to the same slot by only hashing the content between {}.'
  how_to_do_right: 'Use hash tags for related keys: user:{12345}:profile, user:{12345}:session, user:{12345}:cart — all hash
    to the same slot because of {12345}. Design your key naming scheme to group co-accessed keys under the same hash tag.
    For Lua scripts, all KEYS[] must share a hash tag. Avoid too many keys under one hash tag (hot slot). Test with CLUSTER
    KEYSLOT to verify slot assignment.'
  severity: critical
  technologies:
    platform: [redis]
  domains:
    domain: [architecture, performance]
    concern: [data, database, scalability]
  example_good: "# Hash tags group related keys on the same slot\nSET user:{12345}:profile '{\"name\": \"Alice\"}'\nSET user:{12345}:session\
    \ '{\"token\": \"abc\"}'\nSET user:{12345}:cart '{\"items\": [1, 2, 3]}'\n\n# All three keys hash to the same slot (CRC16\
    \ of \"12345\")\nCLUSTER KEYSLOT user:{12345}:profile   # → 1234\nCLUSTER KEYSLOT user:{12345}:session   # → 1234\nCLUSTER\
    \ KEYSLOT user:{12345}:cart      # → 1234\n\n# Multi-key operations work because same slot\nMGET user:{12345}:profile\
    \ user:{12345}:session user:{12345}:cart\n\n# Lua script with multiple keys — all must be same slot\nEVAL \"return {redis.call('GET',\
    \ KEYS[1]), redis.call('GET', KEYS[2])}\" \\\n  2 user:{12345}:profile user:{12345}:session\n"
  example_bad: '# No hash tags — related keys scatter across slots

    SET user:12345:profile ''{"name": "Alice"}''

    SET user:12345:session ''{"token": "abc"}''


    CLUSTER KEYSLOT user:12345:profile   # → 8901

    CLUSTER KEYSLOT user:12345:session   # → 4567 (different slot!)


    # Multi-key operation fails

    MGET user:12345:profile user:12345:session

    # (error) CROSSSLOT Keys in request don''t hash to the same slot


    # Hot slot — too many keys under one hash tag

    SET orders:{global}:1 "..."

    SET orders:{global}:2 "..."

    # ... millions of keys with {global} tag

    # ALL land on one node — that node becomes the bottleneck

    '
  when_applies: Any project using Redis cache/pub-sub systems
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using Redis
  sources: ["https://redis.io/docs/latest/operate/oss_and_stack/reference/cluster-spec/"]
- id: CR-RED-DS-007
  text: Implement distributed locking with the Redlock algorithm or single-instance SET NX EX — never use SETNX + EXPIRE as
    two separate commands.
  why: 'SETNX and EXPIRE as separate commands have a race condition: if the process crashes after SETNX but before EXPIRE,
    the lock is held forever (no TTL). SET key value NX EX seconds is atomic — it either sets with TTL or fails in a single
    command. For single-instance Redis, this is sufficient. For Redis Cluster or high-availability scenarios, the Redlock
    algorithm acquires locks on N/2+1 independent Redis instances with clock drift compensation. Without proper distributed
    locking, two processes can hold the ''same'' lock, leading to data corruption in critical sections.'
  how_to_do_right: 'For single instance: SET lock:resource unique_value NX EX 30. The unique_value (UUID) prevents releasing
    another client''s lock. Release with Lua script that checks value before DELeting. For production: use a well-tested library
    (Redisson for Java, redis-py with Lock, etc.). Set TTL conservatively longer than maximum expected operation time. Implement
    lock extension (watchdog) for long-running operations.'
  severity: critical
  technologies:
    platform: [redis]
  domains:
    domain: [architecture, performance]
    concern: [data, database, concurrency, distributed-systems]
  example_good: "import redis\nimport uuid\nimport time\n\nr = redis.Redis()\n\ndef acquire_lock(resource: str, ttl: int =\
    \ 30) -> str | None:\n    \"\"\"Acquire distributed lock with unique token.\"\"\"\n    token = str(uuid.uuid4())\n   \
    \ if r.set(f\"lock:{resource}\", token, nx=True, ex=ttl):\n        return token\n    return None\n\ndef release_lock(resource:\
    \ str, token: str) -> bool:\n    \"\"\"Release lock only if we own it (atomic via Lua).\"\"\"\n    script = \"\"\"\n \
    \   if redis.call('GET', KEYS[1]) == ARGV[1] then\n        return redis.call('DEL', KEYS[1])\n    else\n        return\
    \ 0\n    end\n    \"\"\"\n    return bool(r.eval(script, 1, f\"lock:{resource}\", token))\n\n# Usage\ntoken = acquire_lock(\"\
    order:123\")\nif token:\n    try:\n        process_order(\"123\")\n    finally:\n        release_lock(\"order:123\", token)\n\
    else:\n    raise Exception(\"Could not acquire lock\")\n\n# Or use redis-py's built-in Lock (recommended)\nwith r.lock(\"\
    lock:order:123\", timeout=30, blocking_timeout=5):\n    process_order(\"123\")\n"
  example_bad: "# SETNX + EXPIRE — race condition (lock held forever if crash between)\nif r.setnx(\"lock:order:123\", \"\
    locked\"):\n    # Process crashes HERE → no TTL → lock held forever\n    r.expire(\"lock:order:123\", 30)\n    process_order(\"\
    123\")\n    r.delete(\"lock:order:123\")\n\n# DEL without checking ownership — releases another client's lock\ntoken =\
    \ acquire_lock(\"order:123\")\nif token:\n    process_order(\"123\")\n    r.delete(\"lock:order:123\")  # Might delete\
    \ ANOTHER client's lock!\n    # If our lock expired and client B acquired it,\n    # we just released client B's lock\n"
  when_applies: Any project using Redis cache/pub-sub systems
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using Redis
  sources: ["https://redis.io/docs/latest/develop/use/patterns/distributed-locks/"]
- id: CR-RED-DS-008
  text: Use cache-aside pattern with appropriate TTLs — never cache without expiration, and handle cache stampede with probabilistic
    early expiration or locking.
  why: A cache without TTL grows until Redis runs out of memory, then evicts keys unpredictably. When a popular cached key
    expires, hundreds of concurrent requests simultaneously hit the database to regenerate it — the thundering herd (cache
    stampede) problem. This can take down your database if the regeneration query is expensive. Cache-aside with TTL ensures
    freshness while the application controls what is cached. Probabilistic early expiration (XFetch) or mutex locking for
    regeneration prevents stampedes.
  how_to_do_right: 'Cache-aside pattern: (1) read cache, (2) on miss, read DB, (3) write to cache with TTL. Set TTL based
    on data freshness requirements: 5min for user profiles, 1hour for product catalogs, 24h for static content. For stampede
    prevention: use SET NX to acquire a regeneration lock — only one process regenerates while others serve stale data or
    wait. Add jitter to TTLs (TTL + random(0, TTL*0.1)) to prevent synchronized expiration.'
  severity: high
  technologies:
    platform: [redis]
  domains:
    domain: [architecture, performance]
    concern: [data, database, caching]
  example_good: "import redis\nimport json\nimport random\n\nr = redis.Redis()\nBASE_TTL = 3600  # 1 hour\n\ndef get_product(product_id:\
    \ str) -> dict:\n    cache_key = f\"product:{product_id}\"\n\n    # Step 1: Try cache\n    cached = r.get(cache_key)\n\
    \    if cached:\n        return json.loads(cached)\n\n    # Step 2: Cache miss — acquire regeneration lock\n    lock_key\
    \ = f\"lock:regen:{cache_key}\"\n    if r.set(lock_key, \"1\", nx=True, ex=10):\n        try:\n            # Step 3: Read\
    \ from DB (only one process does this)\n            product = db.query(\"SELECT * FROM products WHERE id = %s\", product_id)\n\
    \            # Step 4: Write to cache with jittered TTL\n            ttl = BASE_TTL + random.randint(0, 360)  # 1h ± 6min\n\
    \            r.setex(cache_key, ttl, json.dumps(product))\n            return product\n        finally:\n            r.delete(lock_key)\n\
    \    else:\n        # Another process is regenerating — wait briefly and retry\n        import time\n        time.sleep(0.1)\n\
    \        cached = r.get(cache_key)\n        return json.loads(cached) if cached else get_product_from_db(product_id)\n"
  example_bad: "# No TTL — cache grows forever\ndef get_product(product_id):\n    cached = r.get(f\"product:{product_id}\"\
    )\n    if cached:\n        return json.loads(cached)\n    product = db.query(...)\n    r.set(f\"product:{product_id}\"\
    , json.dumps(product))  # No TTL!\n    return product\n# After 6 months: 10M product keys consuming 8GB\n# Product data\
    \ is stale — price changes not reflected for cached items\n\n# No stampede protection — thundering herd\ndef get_popular_item(item_id):\n\
    \    cached = r.get(f\"item:{item_id}\")\n    if not cached:\n        # 500 concurrent requests all miss cache simultaneously\n\
    \        # 500 identical DB queries execute in parallel\n        data = expensive_db_query(item_id)  # Takes 2 seconds\n\
    \        r.setex(f\"item:{item_id}\", 300, json.dumps(data))\n        return data\n    return json.loads(cached)\n"
  when_applies: Projects using Redis cache/pub-sub systems
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using Redis
