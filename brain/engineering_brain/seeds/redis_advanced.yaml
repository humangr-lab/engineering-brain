- id: CR-RED-DS-009
  text: Never use KEYS command in production — it scans the entire keyspace, blocking Redis for seconds to minutes, causing
    timeouts for all clients.
  why: Redis is single-threaded for command execution. The KEYS pattern command scans every key in the database — O(N) where
    N is the total number of keys. With 10M keys, KEYS * takes 2-5 seconds, during which Redis cannot process ANY other command.
    All other clients experience timeouts. In production with 100M keys, KEYS can block Redis for 30+ seconds, triggering
    cascading failures as applications timeout and retry. This single command has caused more production outages than almost
    any other Redis misuse.
  how_to_do_right: 'Use SCAN cursor COUNT 100 for iterating over keys — it processes in small batches without blocking. SCAN
    is cursor-based: it returns a cursor and a batch of keys; call again with the returned cursor until cursor is 0. Use SCAN
    with MATCH pattern for filtered iteration. For counting keys matching a pattern, use SCAN + client-side counting. For
    monitoring, use INFO keyspace for total key counts.'
  severity: critical
  technologies:
    platform: [redis]
  domains:
    domain: [architecture, operations]
    concern: [data, database, anti-pattern]
  example_good: "# SCAN — non-blocking iteration in batches\nimport redis\n\nr = redis.Redis()\n\ndef find_keys_by_pattern(pattern:\
    \ str) -> list[str]:\n    \"\"\"Iterate keys without blocking Redis.\"\"\"\n    keys = []\n    cursor = 0\n    while True:\n\
    \        cursor, batch = r.scan(cursor, match=pattern, count=100)\n        keys.extend(batch)\n        if cursor == 0:\n\
    \            break\n    return keys\n\n# Find all user session keys\nsessions = find_keys_by_pattern(\"session:user:*\"\
    )\n\n# Delete keys by pattern safely\ndef delete_by_pattern(pattern: str) -> int:\n    deleted = 0\n    cursor = 0\n \
    \   while True:\n        cursor, batch = r.scan(cursor, match=pattern, count=100)\n        if batch:\n            deleted\
    \ += r.delete(*batch)\n        if cursor == 0:\n            break\n    return deleted\n\n# Redis CLI equivalent\n# redis-cli\
    \ --scan --pattern \"session:*\" | head -10\n"
  example_bad: "# KEYS in production — blocks Redis entirely\nkeys = r.keys(\"session:*\")  # 10M keys → blocks for 3-5 seconds\n\
    # ALL other clients timeout during this scan\n# Health checks fail → load balancer removes Redis from pool\n# Application\
    \ cascade failure\n\n# KEYS in a loop — amplified disaster\nfor pattern in [\"user:*\", \"session:*\", \"cache:*\", \"\
    rate:*\"]:\n    keys = r.keys(pattern)  # 4 full scans = 12-20 seconds blocked\n    for key in keys:\n        r.delete(key)\n\
    \n# Using KEYS in monitoring scripts (runs every minute)\n# redis-cli KEYS \"*\" | wc -l  # Blocks Redis every minute\n"
  when_applies: Any project using Redis cache/pub-sub systems
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using Redis
  sources: ["https://redis.io/docs/latest/commands/scan/"]
- id: CR-RED-DS-010
  text: Use Redis pipelining to batch multiple commands into a single round trip — reducing network latency from N round trips
    to 1.
  why: 'Each Redis command requires a network round trip: send command, wait for response. For 1000 commands at 0.5ms per
    round trip, that is 500ms of network latency alone — even though Redis processes each command in microseconds. Pipelining
    sends all commands in a single write and reads all responses in a single read. For 1000 commands, latency drops from 500ms
    to ~1ms. This is the single most impactful Redis optimization for batch operations. Without pipelining, Redis throughput
    is limited by network latency, not server performance.'
  how_to_do_right: Use pipeline() context manager in Redis clients. Batch related operations (e.g., all cache reads for a
    page). Keep pipeline batches under ~1000 commands (very large pipelines consume server memory for buffering responses).
    For operations that depend on intermediate results, use Lua scripts instead. Pipeline operations are NOT atomic — use
    MULTI/EXEC within a pipeline if you need atomicity.
  severity: high
  technologies:
    platform: [redis]
  domains:
    domain: [architecture, performance]
    concern: [data, database]
  example_good: "import redis\n\nr = redis.Redis()\n\n# Pipelining — 1000 commands in 1 round trip\npipe = r.pipeline(transaction=False)\
    \  # No MULTI/EXEC\nfor user_id in range(1000):\n    pipe.get(f\"user:{user_id}:score\")\nresults = pipe.execute()  #\
    \ Single round trip\n\n# Time: ~1ms (1 round trip)\n# vs non-pipelined: ~500ms (1000 round trips)\n\n# Mixed operations\
    \ in pipeline\npipe = r.pipeline()\npipe.set(\"key1\", \"value1\")\npipe.expire(\"key1\", 3600)\npipe.get(\"key2\")\n\
    pipe.incr(\"counter\")\nset_result, expire_result, value, count = pipe.execute()\n\n# Atomic pipeline with MULTI/EXEC\n\
    pipe = r.pipeline(transaction=True)  # MULTI/EXEC wrapper\npipe.decrby(\"balance:alice\", 100)\npipe.incrby(\"balance:bob\"\
    , 100)\npipe.execute()  # Atomic transfer\n"
  example_bad: "# No pipelining — 1000 network round trips\nresults = []\nfor user_id in range(1000):\n    results.append(r.get(f\"\
    user:{user_id}:score\"))\n# Time: ~500ms (1000 × 0.5ms round trip)\n\n# Loading a page that needs 20 cache reads\nuser\
    \ = r.get(f\"user:{user_id}\")           # Round trip 1\nprofile = r.get(f\"profile:{user_id}\")      # Round trip 2\n\
    settings = r.get(f\"settings:{user_id}\")    # Round trip 3\n# ... 17 more ...\n# Total: 20 × 0.5ms = 10ms just in Redis\
    \ latency\n# With pipeline: 20 commands in 1 round trip = 0.5ms\n"
  when_applies: Projects using Redis cache/pub-sub systems
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using Redis
  sources: ["https://redis.io/docs/latest/develop/interact/pipelining/"]
- id: CR-RED-DS-011
  text: Use Redis pub/sub for real-time notifications and Streams for durable message processing — pub/sub is fire-and-forget,
    Streams persist messages.
  why: 'Pub/sub delivers messages to all connected subscribers in real-time with near-zero latency. However, messages are
    not persisted: if no subscriber is listening, the message is lost. If a subscriber disconnects and reconnects, it misses
    all messages published during the gap. This makes pub/sub suitable for ephemeral notifications (cache invalidation, live
    updates) but dangerous for anything requiring guaranteed delivery. Streams provide durability, replay, and consumer groups.
    Choosing pub/sub when you need durability causes silent data loss; choosing Streams when you need broadcast adds unnecessary
    complexity.'
  how_to_do_right: 'Use pub/sub for: real-time UI updates, cache invalidation, live notifications where missing a message
    is acceptable. Use Streams for: task queues, event sourcing, order processing, anything requiring guaranteed delivery.
    For a hybrid: use pub/sub for instant notification + Streams for durable processing. In Redis Cluster, pub/sub messages
    are broadcast to ALL nodes — use sharded pub/sub (SSUBSCRIBE, Redis 7.0+) for scalable pub/sub.'
  severity: high
  technologies:
    platform: [redis]
  domains:
    domain: [architecture, messaging]
    concern: [data, database, real_time]
  example_good: "# Pub/Sub for cache invalidation (ephemeral, broadcast)\nimport redis, threading\n\nr = redis.Redis()\n\n\
    # Publisher: notify all app instances to invalidate cache\ndef invalidate_cache(entity_type: str, entity_id: str):\n \
    \   r.publish(f\"cache:invalidate:{entity_type}\", entity_id)\n\n# Subscriber: listen for invalidation events\ndef cache_invalidation_listener():\n\
    \    pubsub = r.pubsub()\n    pubsub.psubscribe(\"cache:invalidate:*\")\n    for message in pubsub.listen():\n       \
    \ if message[\"type\"] == \"pmessage\":\n            entity_type = message[\"channel\"].decode().split(\":\")[-1]\n  \
    \          entity_id = message[\"data\"].decode()\n            local_cache.delete(f\"{entity_type}:{entity_id}\")\n\n\
    # Run listener in background thread\nthreading.Thread(target=cache_invalidation_listener, daemon=True).start()\n\n# Streams\
    \ for durable order processing (see CR-RED-DS-002)\n# Use Streams when message loss is unacceptable\n"
  example_bad: '# Pub/sub for order processing — messages lost on disconnect

    r.publish("orders", ''{"id": "ORD-123", "action": "process"}'')

    # If order processor is restarting: message LOST

    # No replay, no acknowledgment, no recovery


    # Pub/sub in Redis Cluster without sharded pub/sub

    r.publish("notifications", "message")

    # Message broadcast to ALL cluster nodes (O(N) nodes)

    # 100 nodes × 10K messages/sec = 1M cross-node broadcasts/sec

    '
  when_applies: Projects using Redis cache/pub-sub systems
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using Redis
  sources: ["https://redis.io/docs/latest/develop/interact/pubsub/", "https://redis.io/docs/latest/develop/data-types/streams/"]
- id: CR-RED-DS-012
  text: Use Bloom filters (RedisBloom module) for probabilistic set membership checks — they answer 'is this element in the
    set?' using a fraction of the memory of a Set with zero false negatives.
  why: 'Checking if a username is taken, if a URL has been crawled, or if an IP is in a blocklist requires a set membership
    check. A Redis Set storing 100M elements consumes ~6.4GB. A Bloom filter storing 100M elements with 1% false positive
    rate uses ~114MB — 56x less memory. Bloom filters guarantee zero false negatives: if it says ''not in set'', the element
    is definitely not in the set. False positives (says ''in set'' when it is not) occur at a configurable rate. For username
    availability checks, a 0.1% false positive rate means 1 in 1000 available usernames are incorrectly reported as taken
    — an acceptable trade-off for 560x memory savings.'
  how_to_do_right: Use BF.RESERVE to create a Bloom filter with specified error rate and capacity. Use BF.ADD to add elements
    and BF.EXISTS to check membership. Set error_rate based on your tolerance (0.01 = 1%, 0.001 = 0.1%). Over-provision capacity
    by 20% to avoid degradation as the filter fills. Use BF.MADD/BF.MEXISTS for batch operations. Bloom filters cannot remove
    elements — use Cuckoo filters (CF.*) if you need deletion.
  severity: medium
  technologies:
    library: [redisbloom]
    platform: [redis]
  domains:
    domain: [architecture, performance]
    concern: [data, database, probabilistic]
  example_good: "# Create Bloom filter: 100M capacity, 0.1% false positive rate\nBF.RESERVE crawled_urls 0.001 100000000\n\
    \n# Add URLs as they are crawled\nBF.ADD crawled_urls \"https://example.com/page1\"\nBF.MADD crawled_urls \"https://example.com/page2\"\
    \ \"https://example.com/page3\"\n\n# Check before crawling — avoid duplicate work\nBF.EXISTS crawled_urls \"https://example.com/page1\"\
    \  # Returns 1 (exists)\nBF.EXISTS crawled_urls \"https://example.com/new\"    # Returns 0 (definitely not crawled)\n\n\
    # Python usage\nimport redis\nr = redis.Redis()\n\ndef should_crawl(url: str) -> bool:\n    \"\"\"Returns True if URL\
    \ has NOT been crawled (zero false negatives).\"\"\"\n    return not r.bf().exists(\"crawled_urls\", url)\n\n# Memory\
    \ comparison:\n# SET with 100M URLs (avg 50 bytes): ~6.4GB\n# Bloom filter (100M, 0.1% FPR): ~180MB — 35x smaller\n"
  example_bad: '# Using SET for 100M membership checks

    SADD crawled_urls "https://example.com/page1"

    SISMEMBER crawled_urls "https://example.com/page1"

    # 100M URLs × 64 bytes avg = 6.4GB memory

    # Bloom filter: 180MB for same functionality with 0.1% false positives


    # Bloom filter without reserving capacity

    BF.ADD crawled_urls "url1"  # Auto-creates with default settings

    # Default: 100 capacity, 0.01 error rate

    # After 100 elements: error rate degrades dramatically

    # Must BF.RESERVE with correct capacity upfront

    '
  when_applies: Projects using Redis cache/pub-sub systems or RedisBloom
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using Redis or
    RedisBloom
  sources: ["https://redis.io/docs/latest/develop/data-types/probabilistic/bloom-filter/"]
- id: CR-RED-DS-013
  text: Use Redis as a session store with proper TTL and serialization — it provides sub-millisecond access across all application
    instances with automatic expiration.
  why: Server-side sessions stored in application memory are lost on restart and cannot be shared across instances. Database-backed
    sessions add 5-50ms latency per request. Redis provides sub-millisecond session access with automatic TTL expiration,
    horizontal scalability, and atomic operations. Session data (user ID, permissions, cart) is serialized to a string or
    hash and stored with an appropriate TTL. When the session expires, Redis automatically removes it — no cleanup cron needed.
    For stateless application servers behind a load balancer, Redis sessions are the standard pattern.
  how_to_do_right: Use a Hash for session data (HSET/HGET for individual fields without deserializing the entire session).
    Set TTL on the session key matching your session duration. Refresh TTL on every request (sliding expiration). Use JSON
    serialization for complex session data. Prefix session keys with a namespace. For sensitive sessions, encrypt the session
    data before storing.
  severity: high
  technologies:
    platform: [redis]
  domains:
    domain: [architecture, performance]
    concern: [data, database, caching, web]
  example_good: "import redis\nimport json\nimport uuid\nimport time\n\nr = redis.Redis()\nSESSION_TTL = 3600  # 1 hour\n\n\
    def create_session(user_id: int, metadata: dict) -> str:\n    session_id = str(uuid.uuid4())\n    session_data = {\n \
    \       \"user_id\": str(user_id),\n        \"created\": str(time.time()),\n        \"ip\": metadata.get(\"ip\", \"\"\
    ),\n        \"user_agent\": metadata.get(\"user_agent\", \"\"),\n    }\n    key = f\"session:{session_id}\"\n    r.hset(key,\
    \ mapping=session_data)\n    r.expire(key, SESSION_TTL)\n    return session_id\n\ndef get_session(session_id: str) ->\
    \ dict | None:\n    key = f\"session:{session_id}\"\n    data = r.hgetall(key)\n    if not data:\n        return None\n\
    \    r.expire(key, SESSION_TTL)  # Sliding expiration\n    return {k.decode(): v.decode() for k, v in data.items()}\n\n\
    def destroy_session(session_id: str):\n    r.delete(f\"session:{session_id}\")\n"
  example_bad: '# Session in application memory — not shared, lost on restart

    sessions = {}  # In-memory dict

    sessions[session_id] = {"user_id": 123}

    # Server restart = all sessions lost (users logged out)

    # Load balancer sends request to different instance = session not found


    # Session in database — high latency

    cursor.execute("SELECT data FROM sessions WHERE id = %s", (session_id,))

    # 5-50ms per request × 20 requests/page = 100-1000ms overhead

    # Redis: 0.1ms per request × 20 = 2ms overhead


    # No TTL on session — sessions accumulate forever

    r.set(f"session:{session_id}", json.dumps(data))  # No TTL!

    # After 6 months: 50M expired session keys consuming 10GB

    '
  when_applies: Projects using Redis cache/pub-sub systems
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using Redis
  sources: ["https://redis.io/docs/latest/develop/data-types/hashes/"]
- id: CR-RED-DS-014
  text: Configure maxmemory and eviction policy for production Redis — without a memory limit, Redis grows until the OS kills
    it with OOM, causing cascading failures.
  why: 'Redis stores all data in memory. Without maxmemory configured, Redis consumes memory without bound until the OS out-of-memory
    killer terminates the process — taking down all cached sessions, rate limiters, and queues simultaneously with no graceful
    degradation. With maxmemory + an eviction policy, Redis refuses writes or evicts old data when approaching the limit,
    maintaining service availability. The eviction policy determines which keys to remove: allkeys-lru (remove least recently
    used — best for caching), volatile-lru (only evict keys with TTL), noeviction (reject writes when full — best for data
    stores). Choosing the wrong eviction policy means either data loss (cache evicts session keys) or service outage (data
    store rejects writes).'
  how_to_do_right: 'Set maxmemory to 75% of available RAM (leave room for fork during RDB/AOF rewrite). Choose eviction policy
    based on use case: allkeys-lru for pure caching, volatile-lru when mixing cache + persistent data, volatile-ttl to evict
    keys closest to expiration, noeviction for session stores and queues (reject writes, do not lose data). Monitor with INFO
    memory — track used_memory vs maxmemory. Set up alerts at 80% and 90% memory usage.'
  severity: critical
  technologies:
    platform: [redis]
  domains:
    domain: [architecture, operations, reliability]
    concern: [data, database]
  example_good: '# redis.conf — production memory configuration

    maxmemory 12gb                  # 75% of 16GB server

    maxmemory-policy allkeys-lru    # Evict least recently used (caching)


    # Alternative policies by use case:

    # Pure cache: allkeys-lru (evict any key, LRU order)

    # Cache + sessions: volatile-lru (only evict keys with TTL)

    # Session store: noeviction (reject writes, never lose data)

    # TTL-based expiry: volatile-ttl (evict closest-to-expiry first)


    # Monitor memory usage

    # redis-cli INFO memory

    # used_memory_human: 8.2G

    # maxmemory_human: 12.0G

    # mem_fragmentation_ratio: 1.08  (good: 1.0-1.5)


    # Set alerts

    # Alert at 80%: used_memory > 9.6GB

    # Alert at 90%: used_memory > 10.8GB (investigate immediately)

    # Alert at 95%: used_memory > 11.4GB (evictions increasing rapidly)

    '
  example_bad: '# No maxmemory — Redis grows until OOM kill

    # maxmemory 0  (default — unlimited)

    # After months: Redis uses 14.8GB on a 16GB server

    # OS OOM killer sends SIGKILL — instant death

    # All sessions, caches, rate limiters, queues: GONE

    # No graceful degradation, no warning


    # Wrong eviction policy — loses session data

    maxmemory-policy allkeys-lru

    # Session keys (no TTL) are evicted alongside cache keys

    # Users randomly logged out when memory is tight

    # Should use volatile-lru (only evict keys WITH TTL) for mixed workloads

    '
  when_applies: Any project using Redis cache/pub-sub systems
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using Redis
  sources: ["https://redis.io/docs/latest/operate/oss_and_stack/management/optimization/memory-optimization/"]
- id: CR-REDIS-FIN-001
  text: Use Redis Streams for event sourcing in financial systems — every state change is an immutable event appended to a stream,
    enabling full audit trail, temporal queries, and state reconstruction.
  why: 'Financial systems require complete audit trails and the ability to reconstruct state at any point in time. Redis Streams
    provide an append-only log with automatic timestamps, consumer groups for parallel processing, and message acknowledgment
    for reliable delivery. Unlike pub/sub (fire-and-forget), Streams persist events and support replay. For a prediction market,
    every order, trade, settlement, and balance change is an event in the stream. If a dispute arises, you can replay events
    to reconstruct the exact state at any timestamp. Redis Streams handle 100K+ events/second with sub-millisecond latency
    — suitable for real-time financial event sourcing.'
  how_to_do_right: '1. Use one stream per aggregate (e.g., orders:market:{id}, trades:market:{id}).

    2. Include all event metadata: event_type, timestamp, actor, correlation_id, version.

    3. Use consumer groups for different processing pipelines (settlement, analytics, audit).

    4. Set MAXLEN or MINID to bound stream size — archive old events to PostgreSQL for long-term storage.

    5. Implement idempotent consumers using message ID as idempotency key.

    6. Use XRANGE with timestamp bounds for temporal queries (reconstruct state at time T).

    '
  severity: high
  technologies:
    platform: [redis]
    lang: [python]
  domains:
    domain: [architecture, fintech]
    concern: [data, database, event_sourcing, financial]
  example_good: "import redis\nimport json\nimport time\n\nr = redis.Redis()\n\ndef publish_event(stream: str, event_type: str,\
    \ data: dict, actor: str) -> str:\n    \"\"\"Append immutable event to stream.\"\"\"\n    event = {\n        'event_type':\
    \ event_type,\n        'data': json.dumps(data),\n        'actor': actor,\n        'correlation_id': str(uuid4()),\n    \
    \    'version': '1',\n    }\n    msg_id = r.xadd(\n        stream,\n        event,\n        maxlen=1000000,  # Bound stream\
    \ size\n    )\n    return msg_id\n\n# Publish order events\npublish_event(\n    'orders:market:mkt-001',\n    'ORDER_PLACED',\n\
    \    {'order_id': 'ord-123', 'side': 'buy', 'price': '0.65', 'quantity': '100'},\n    actor='user:u-456',\n)\n\n# Reconstruct\
    \ state at specific time\ndef reconstruct_orderbook(market_id: str, at_time: int) -> dict:\n    events = r.xrange(f'orders:market:{market_id}',\
    \ '-', at_time)\n    orderbook = {'bids': [], 'asks': []}\n    for msg_id, fields in events:\n        event = json.loads(fields[b'data'])\n\
    \        # Replay events to build orderbook state\n        apply_event(orderbook, fields[b'event_type'].decode(), event)\n\
    \    return orderbook\n"
  example_bad: "# Mutable state without event history\ndef place_order(order):\n    db.execute('INSERT INTO orders VALUES ...',\
    \ order)\n    db.execute('UPDATE orderbook SET ... WHERE market_id = ...', ...)\n    # What happened to this order? When?\
    \ By whom?\n    # Cannot reconstruct orderbook at past time\n    # No audit trail for dispute resolution\n"
  when_applies: Financial systems using Redis, prediction markets, trading platforms
  when_not_applies: non-financial applications, systems where event history is not needed
  sources: ["https://redis.io/docs/latest/develop/data-types/streams/"]
- id: CR-REDIS-FIN-002
  text: Use Redis Sorted Sets for real-time leaderboards and ranking in prediction markets — they provide O(log N) rank lookups
    and range queries for portfolio rankings, trader performance, and market activity.
  why: Prediction markets and financial platforms need real-time rankings — top traders by P&L, most active markets by volume,
    best-performing portfolios by return rate. Redis Sorted Sets maintain elements ordered by score with O(log N) insertion,
    O(log N) rank lookup, and O(log N + M) range queries. For 1M traders, getting the top 100 by P&L is O(log N + 100) — microseconds,
    not seconds. Unlike database ORDER BY queries that require full table scans or index rebuilds, Sorted Sets maintain order
    incrementally on every score update. ZINCRBY atomically updates scores, making concurrent P&L updates safe without locks.
  how_to_do_right: '1. Use ZADD for initial placement, ZINCRBY for atomic score updates.

    2. Use ZREVRANGE for top-N (descending), ZRANGE for bottom-N (ascending).

    3. Use ZREVRANK for a specific user''s rank (0-based from top).

    4. Separate leaderboards per time period (daily, weekly, all-time) with TTL on daily/weekly keys.

    5. Use ZUNIONSTORE to merge period-specific leaderboards into aggregate rankings.

    6. Store detailed data in a hash (HSET trader:{id} ...), use the sorted set only for ranking.

    '
  severity: medium
  technologies:
    platform: [redis]
    lang: [python]
  domains:
    domain: [architecture, fintech]
    concern: [data, database, real_time, financial]
  example_good: "import redis\nfrom decimal import Decimal\n\nr = redis.Redis()\n\ndef update_trader_pnl(trader_id: str, pnl_delta:\
    \ float):\n    \"\"\"Atomically update trader P&L and ranking.\"\"\"\n    # Update all-time leaderboard\n    r.zincrby('leaderboard:pnl:alltime',\
    \ pnl_delta, trader_id)\n    # Update daily leaderboard (expires at midnight)\n    daily_key = f'leaderboard:pnl:{date.today().isoformat()}'\n\
    \    r.zincrby(daily_key, pnl_delta, trader_id)\n    r.expireat(daily_key, midnight_timestamp())\n\ndef get_top_traders(period:\
    \ str = 'alltime', limit: int = 100) -> list:\n    key = f'leaderboard:pnl:{period}'\n    return r.zrevrange(key, 0, limit\
    \ - 1, withscores=True)\n\ndef get_trader_rank(trader_id: str, period: str = 'alltime') -> int:\n    rank = r.zrevrank(f'leaderboard:pnl:{period}',\
    \ trader_id)\n    return rank + 1 if rank is not None else None  # 1-based rank\n\n# Usage\nupdate_trader_pnl('trader:alice',\
    \ 150.50)  # O(log N) atomic update\nupdate_trader_pnl('trader:bob', -30.00)\ntop_10 = get_top_traders(limit=10)  # O(log\
    \ N + 10)\nalice_rank = get_trader_rank('trader:alice')  # O(log N)\n"
  example_bad: "# SQL-based leaderboard — slow under concurrent updates\nSELECT trader_id, pnl, RANK() OVER (ORDER BY pnl DESC)\n\
    FROM trader_stats ORDER BY pnl DESC LIMIT 100;\n-- Full table scan or index rebuild on every query\n-- 1M traders: 500ms-5s\
    \ per query\n-- Concurrent PNL updates cause lock contention\n-- Redis Sorted Set: <1ms for same query\n"
  when_applies: Real-time ranking systems, prediction markets, trading platforms using Redis
  when_not_applies: batch-only analytics, systems where rankings update infrequently
  sources: ["https://redis.io/docs/latest/develop/data-types/sorted-sets/"]
- id: CR-REDIS-FIN-003
  text: Use Redlock (distributed locks across multiple Redis instances) for critical financial operations — single-instance locks
    fail when the Redis node crashes, potentially allowing double-execution.
  why: A single Redis instance lock (SET NX EX) is sufficient for most operations but has a failure mode — if the Redis node
    crashes while a client holds the lock, the lock is lost and another client can acquire it, leading to double-execution.
    For financial operations (order execution, settlement, fund transfers), double-execution means double-charging a customer
    or double-settling a trade. Redlock acquires locks on N/2+1 independent Redis instances with clock drift compensation.
    If the majority of instances grant the lock, it is considered acquired. Even if one Redis node crashes, the lock is still
    held on the remaining majority. The Redlock algorithm has been formally analyzed and is the recommended approach for distributed
    locking in Redis.
  how_to_do_right: '1. Deploy at least 3 independent Redis instances (not replicas — independent masters).

    2. Use a well-tested Redlock implementation (python-redis-lock, pottery, or redis-py Lock with multiple instances).

    3. Set TTL conservatively longer than maximum expected operation time (e.g., 30s for a 5s operation).

    4. Implement lock extension (watchdog) for operations that may exceed TTL.

    5. Always use unique lock tokens (UUID) and verify ownership before releasing.

    6. For the highest criticality operations, combine Redlock with database-level constraints as defense-in-depth.

    '
