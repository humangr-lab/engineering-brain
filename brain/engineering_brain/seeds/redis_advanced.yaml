  example_good: "from pottery import Redlock\nfrom redis import Redis\n\n# 3 independent Redis instances (not replicas)\nredis_instances\
    \ = [\n    Redis(host='redis-1', port=6379),\n    Redis(host='redis-2', port=6379),\n    Redis(host='redis-3', port=6379),\n\
    ]\n\ndef execute_settlement(trade_id: str):\n    \"\"\"Settle trade with distributed lock — prevents double-settlement.\"\"\
    \"\n    lock = Redlock(\n        key=f'lock:settlement:{trade_id}',\n        masters=redis_instances,\n        auto_release_time=30,\
    \  # TTL: 30 seconds\n    )\n\n    if lock.acquire(timeout=10):  # Wait up to 10s to acquire\n        try:\n            #\
    \ Check if already settled (defense-in-depth)\n            trade = db.get_trade(trade_id)\n            if trade.status ==\
    \ 'settled':\n                return  # Already settled — idempotent\n\n            # Execute settlement\n            settle_trade(trade)\n\
    \            db.update_trade_status(trade_id, 'settled')\n        finally:\n            lock.release()\n    else:\n      \
    \  raise LockTimeout(f'Could not acquire lock for trade {trade_id}')\n"
