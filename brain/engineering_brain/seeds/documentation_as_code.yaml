layer: rules
domain: operations
knowledge:
- id: DOCS-001
  text: Structure all documentation using the Diataxis framework — four distinct quadrants (tutorials, how-to guides, explanation, reference) serving four distinct user needs. Never mix quadrants in a single document.
  why: >
    Most documentation fails because it mixes different types of content: a tutorial that stops to explain
    theory, a reference that includes step-by-step instructions, a how-to guide that tries to teach concepts.
    The Diataxis framework (created by Daniele Procida, adopted by Django, NumPy, Gatsby, and Cloudflare)
    identifies four documentation types based on two axes: learning vs. working, and theoretical vs. practical.
    Tutorials (learning + practical) guide a beginner through a complete experience. How-to guides (working +
    practical) solve a specific problem for someone who already knows the basics. Explanation (learning +
    theoretical) provides conceptual understanding. Reference (working + theoretical) provides precise,
    complete technical descriptions. When you mix these, every audience is frustrated: beginners are overwhelmed
    by reference details, experts are annoyed by tutorial hand-holding, and everyone struggles to find what
    they need.
  how_to_do_right: |
    1. Audit existing docs: classify each page into one of the four quadrants
    2. Tutorials: "Learn X by building Y" — complete, reproducible, no prerequisites beyond setup
    3. How-to guides: "How to do X" — assume knowledge, goal-oriented, numbered steps
    4. Explanation: "Understanding X" — why things work this way, design decisions, trade-offs
    5. Reference: "API/CLI/Config reference for X" — exhaustive, consistent format, auto-generated where possible
    6. Cross-link between quadrants: tutorial links to reference for details, how-to links to explanation for context
    7. Use directory structure to enforce: docs/tutorials/, docs/how-to/, docs/explanation/, docs/reference/
  severity: high
  technologies:
    lang: [general]
    platform: [mkdocs, sphinx, docusaurus]
  domains:
    domain: [operations, documentation]
    concern: [developer_experience]
  example_good: |
    # Directory structure enforcing Diataxis quadrants
    docs/
    ├── tutorials/
    │   ├── getting-started.md       # "Build your first widget in 10 minutes"
    │   ├── deploy-to-production.md  # "Deploy a complete app step by step"
    │   └── authentication-flow.md   # "Add auth to your app from scratch"
    ├── how-to/
    │   ├── configure-caching.md     # "How to enable Redis caching"
    │   ├── migrate-database.md      # "How to run database migrations"
    │   └── debug-memory-leaks.md    # "How to diagnose memory leaks"
    ├── explanation/
    │   ├── architecture-overview.md # "Why we chose event sourcing"
    │   ├── security-model.md        # "How our auth system works"
    │   └── caching-strategy.md      # "Why we cache at three levels"
    └── reference/
        ├── api/                     # Auto-generated OpenAPI docs
        ├── cli.md                   # Every CLI flag and option
        ├── configuration.md         # Every config option with defaults
        └── error-codes.md           # Every error code with meaning

    # Example tutorial header (clear scope, prerequisites, outcome):
    # ---
    # title: "Build a REST API in 15 minutes"
    # type: tutorial
    # prerequisites: [Python 3.10+, pip]
    # outcome: "A working CRUD API with tests"
    # ---
  example_bad: |
    # Single docs/ folder with mixed content — impossible to navigate
    docs/
    ├── api.md           # Mixes reference with tutorial examples
    ├── guide.md         # 200-page document mixing all four types
    ├── readme.md        # Half tutorial, half reference
    └── advanced.md      # "Advanced" is not a documentation type

    # Example of mixed content in one page:
    # ## Authentication
    # Authentication uses JWT tokens (explanation).
    # To set up authentication, first install... (tutorial).
    # The token format is... (reference).
    # If you need to refresh tokens, do... (how-to).
    # This approach was chosen because... (explanation again).
    # Result: nobody can find what they need quickly.
  when_applies: Any project with more than 3 pages of documentation, especially open-source projects and internal platforms
  sources:
    - "https://diataxis.fr/"
    - "https://docs.djangoproject.com/en/5.0/"
    - "https://documentation.divio.com/"

- id: DOCS-002
  text: Use Architecture Decision Records (ADRs) to document every significant technical decision. ADRs are immutable once accepted — never edit a past ADR, instead create a new one that supersedes it. Use the MADR template for consistency.
  why: >
    Six months from now, nobody will remember why you chose PostgreSQL over MongoDB, or why the API uses
    cursor pagination instead of offset. Without ADRs, teams reverse-engineer decisions from code (slow),
    make the same mistakes again (costly), or relitigate settled decisions (wasteful). ADRs capture the
    context, options considered, decision, and consequences AT THE TIME the decision was made. They are
    immutable because the context at decision time is a historical fact — if the context changes, you create
    a new ADR that supersedes the old one. The MADR (Markdown Any Decision Record) template is the most
    widely adopted format, used by adr-tools, GitHub's own engineering teams, and Spotify. ADRs live in the
    repo (not Confluence/Wiki) so they are versioned, reviewed in PRs, and discoverable by grep.
  how_to_do_right: |
    1. Store ADRs in docs/decisions/ or docs/adr/ — in the repo, not a wiki
    2. Use sequential numbering: 0001-use-postgresql.md, 0002-cursor-pagination.md
    3. Use MADR template: Title, Status, Context, Decision, Consequences
    4. Status lifecycle: proposed -> accepted -> deprecated/superseded
    5. Never edit an accepted ADR — create a new one that supersedes it
    6. Review ADRs in PRs just like code — the team must agree on the decision
    7. Link ADRs from code comments: "See ADR-0012 for why we use this pattern"
  severity: high
  technologies:
    lang: [general]
    platform: [github, gitlab]
    library: [adr-tools, log4brains]
  domains:
    domain: [operations, architecture]
    concern: [documentation, governance]
  example_good: |
    # docs/decisions/0007-use-cursor-pagination.md

    # ADR-0007: Use cursor-based pagination for all list endpoints

    ## Status
    Accepted (2026-01-15)
    Supersedes: ADR-0003 (offset pagination)

    ## Context
    Our mobile app shows infinite-scroll feeds of real-time data (notifications,
    activity). With offset pagination (ADR-0003), users reported duplicate items
    when new data was inserted between page loads. Analytics showed 12% of page
    loads contained at least one duplicate item.

    ## Decision
    Switch all list endpoints from offset to cursor-based pagination using the
    Relay connection spec. Cursors are base64-encoded `(created_at, id)` tuples
    to ensure stable ordering even with identical timestamps.

    ## Consequences
    ### Positive
    - Eliminates duplicate items in paginated feeds
    - Enables consistent infinite scroll UX
    - CDN-cacheable with cursor as cache key

    ### Negative
    - Cannot "jump to page N" — sequential access only
    - Migration requires client updates (new response format)
    - Slightly more complex SQL (WHERE (created_at, id) > ($1, $2))

    ## Options Considered
    1. **Keyset pagination** — chosen (cursor-based, stable)
    2. **Offset pagination** — rejected (duplicates in real-time data)
    3. **Timestamp-only cursor** — rejected (not unique for concurrent writes)
  example_bad: |
    # No ADRs — decisions documented in Slack messages (lost after 90 days)
    # or Confluence pages (never updated, 3 conflicting versions)

    # Or: editing past ADRs to reflect current thinking
    # docs/decisions/0003-use-offset-pagination.md
    # Status: Accepted (2025-06-01)
    # EDITED 2026-01-15: Actually we switched to cursor pagination
    # (Now the historical record is destroyed — nobody knows what changed or why)

    # Or: ADRs without context or alternatives
    # ADR-0007: Use cursor pagination
    # Decision: We will use cursor pagination.
    # (Why? What alternatives were considered? What are the trade-offs?)
  when_applies: Any project with more than 2 developers, or any project expected to live longer than 6 months
  sources:
    - "https://adr.github.io/"
    - "https://adr.github.io/madr/"
    - "https://cognitect.com/blog/2011/11/15/documenting-architecture-decisions"

- id: DOCS-003
  text: Use MkDocs Material with mike for versioned documentation sites — deploy automatically from CI. MkDocs Material is the most feature-rich static documentation generator for technical projects, and mike provides multi-version support.
  why: >
    MkDocs Material has become the de facto standard for technical documentation (used by FastAPI, Pydantic,
    SQLAlchemy, Google, Microsoft, and hundreds of major projects). It provides: instant search, dark mode,
    code highlighting with copy buttons, admonitions (note/warning/tip), tabbed content, diagrams (Mermaid),
    social cards, and accessibility compliance out of the box. The mike plugin adds multi-version support —
    critical for libraries and APIs where users need to see docs for their specific version. Alternative:
    Sphinx is more powerful for API reference auto-generation but has a steeper learning curve and worse
    default UX. Docusaurus is better for React-heavy teams. For Python projects, MkDocs Material + mike
    is the optimal choice.
  how_to_do_right: |
    1. Install: pip install mkdocs-material mike mkdocstrings[python]
    2. Configure mkdocs.yml with Material theme, search, and code highlighting
    3. Use mkdocstrings for automatic API reference from docstrings
    4. Use mike for versioned deployments: mike deploy 2.0 latest --update-aliases
    5. Deploy from CI: on tag push, build and deploy to GitHub Pages
    6. Enable instant navigation, search suggestions, and dark mode
    7. Use nav section in mkdocs.yml to organize by Diataxis quadrants
  severity: medium
  technologies:
    lang: [python, general]
    platform: [github-pages, netlify]
    library: [mkdocs-material, mike, mkdocstrings]
  domains:
    domain: [operations, documentation]
    concern: [developer_experience, ci_cd]
  example_good: |
    # mkdocs.yml — production configuration
    site_name: MyProject
    site_url: https://myproject.github.io/docs/
    repo_url: https://github.com/myorg/myproject

    theme:
      name: material
      features:
        - navigation.instant
        - navigation.tabs
        - navigation.sections
        - search.suggest
        - search.highlight
        - content.code.copy
        - content.code.annotate
      palette:
        - scheme: default
          toggle:
            icon: material/brightness-7
        - scheme: slate
          toggle:
            icon: material/brightness-4

    plugins:
      - search
      - mkdocstrings:
          handlers:
            python:
              options:
                show_source: true
                show_root_heading: true

    nav:
      - Home: index.md
      - Tutorials:
          - Getting Started: tutorials/getting-started.md
          - First API: tutorials/first-api.md
      - How-To Guides:
          - Configuration: how-to/configuration.md
          - Deployment: how-to/deployment.md
      - Reference:
          - API: reference/api.md
          - CLI: reference/cli.md
          - Configuration: reference/config.md
      - Explanation:
          - Architecture: explanation/architecture.md

    markdown_extensions:
      - pymdownx.highlight:
          anchor_linenums: true
      - pymdownx.superfences:
          custom_fences:
            - name: mermaid
              class: mermaid
              format: !!python/name:pymdownx.superfences.fence_code_format
      - admonition
      - pymdownx.tabbed:
          alternate_style: true
      - pymdownx.details

    # .github/workflows/docs.yml — CI deployment
    # name: Deploy Docs
    # on:
    #   push:
    #     tags: ['v*']
    # jobs:
    #   deploy:
    #     runs-on: ubuntu-latest
    #     steps:
    #       - uses: actions/checkout@v4
    #       - run: pip install mkdocs-material mike mkdocstrings[python]
    #       - run: mike deploy ${GITHUB_REF#refs/tags/v} latest --update-aliases --push
  example_bad: |
    # Raw markdown files with no build system — no search, no navigation, no versioning
    docs/
    ├── README.md      # Only entry point — users must browse files manually
    ├── api.md         # No syntax highlighting, no cross-references
    └── guide.md       # No admonitions, no tabs, no dark mode

    # Or: Sphinx with default theme — functional but poor UX
    # - alabaster theme: no dark mode, no instant search, no mobile responsive
    # - RST syntax: steeper learning curve than Markdown for contributors
    # - No versioning without significant setup

    # Or: Wiki/Confluence — not in repo, not versioned, not reviewable in PRs
    # Docs drift from code immediately after initial documentation
  when_applies: Any project that needs a documentation website, especially Python projects with API references
  sources:
    - "https://squidfunk.github.io/mkdocs-material/"
    - "https://github.com/jimporter/mike"
    - "https://mkdocstrings.github.io/"

- id: DOCS-004
  text: Auto-generate OpenAPI/Swagger documentation from FastAPI route definitions with complete response models, examples, and descriptions. Never maintain API docs separately from code — the code IS the documentation.
  why: >
    Manually maintained API documentation (Swagger files, Postman collections, Confluence pages) drifts from
    the actual API within days of any change. FastAPI generates OpenAPI 3.1 documentation automatically from
    your Python type hints, Pydantic models, and route decorators. This means the documentation is always
    accurate because it IS the code. However, auto-generated docs are only as good as the metadata you provide:
    without response models, descriptions, and examples, the generated docs are technically correct but useless.
    The key insight is: invest in Pydantic model definitions with Field descriptions and examples — this effort
    pays off in documentation, validation, AND client code generation (openapi-generator produces typed SDKs
    from your OpenAPI spec).
  how_to_do_right: |
    1. Define Pydantic response models for every endpoint — never return raw dicts
    2. Add Field(description=..., examples=[...]) to every Pydantic model field
    3. Use response_model, summary, description, tags on every route decorator
    4. Define multiple response codes with response models: responses={404: {"model": NotFoundError}}
    5. Use FastAPI's openapi_tags for grouping endpoints in the docs UI
    6. Export the OpenAPI JSON in CI: python -c "from app import app; print(app.openapi())"
    7. Use the exported spec for client SDK generation and contract testing
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
    library: [pydantic, openapi-generator]
  domains:
    domain: [operations, api_design]
    concern: [documentation, backend]
  example_good: |
    from fastapi import FastAPI, HTTPException, Path, Query
    from pydantic import BaseModel, Field
    from datetime import datetime

    app = FastAPI(
        title="User Service API",
        version="2.1.0",
        description="Manages user accounts, authentication, and profiles.",
        openapi_tags=[
            {"name": "users", "description": "User CRUD operations"},
            {"name": "auth", "description": "Authentication endpoints"},
        ],
    )

    class UserResponse(BaseModel):
        """A user account in the system."""
        id: int = Field(description="Unique user identifier", examples=[42])
        name: str = Field(
            description="Display name", min_length=2, max_length=100, examples=["Alice"]
        )
        email: str = Field(description="Email address", examples=["alice@example.com"])
        created_at: datetime = Field(
            description="Account creation timestamp",
            examples=["2026-01-15T10:30:00Z"],
        )

    class ErrorResponse(BaseModel):
        """Standard error response."""
        detail: str = Field(description="Human-readable error message")
        code: str = Field(description="Machine-readable error code", examples=["NOT_FOUND"])

    @app.get(
        "/users/{user_id}",
        response_model=UserResponse,
        summary="Get user by ID",
        description="Retrieves a single user by their unique identifier.",
        tags=["users"],
        responses={
            404: {"model": ErrorResponse, "description": "User not found"},
            403: {"model": ErrorResponse, "description": "Insufficient permissions"},
        },
    )
    async def get_user(
        user_id: int = Path(description="The user ID to look up", ge=1, examples=[42]),
    ) -> UserResponse:
        user = await UserRepository.get(user_id)
        if not user:
            raise HTTPException(status_code=404, detail="User not found")
        return UserResponse.model_validate(user)

    # Export OpenAPI spec in CI for SDK generation:
    # python -c "import json; from app import app; print(json.dumps(app.openapi(), indent=2))" > openapi.json
    # openapi-generator generate -i openapi.json -g typescript-fetch -o client/
  example_bad: |
    from fastapi import FastAPI

    app = FastAPI()  # No title, no version, no description

    @app.get("/users/{id}")  # No type hints, no response model
    async def get_user(id):
        user = db.get(id)
        return {"id": user.id, "name": user.name}  # Raw dict — no schema in docs

    @app.post("/users")  # No request body model
    async def create_user(data: dict):  # dict = no validation, no docs
        return db.create(**data)

    # Auto-generated docs show:
    # GET /users/{id} — Response: {} (empty schema, useless)
    # POST /users — Request body: {} (no fields documented)
    # No examples, no descriptions, no error responses documented
  when_applies: Any FastAPI project, especially APIs consumed by other teams or external clients
  sources:
    - "https://fastapi.tiangolo.com/tutorial/metadata/"
    - "https://fastapi.tiangolo.com/advanced/additional-responses/"
    - "https://swagger.io/specification/"

- id: DOCS-005
  text: Use Google style for Python docstrings and JSDoc for TypeScript/JavaScript. Every public function, class, and module MUST have a docstring. Enforce with linting (ruff D rules for Python, eslint-plugin-jsdoc for JS/TS).
  why: >
    Docstrings serve three audiences simultaneously: (1) developers reading source code, (2) IDE tooltips
    showing parameter types and descriptions on hover, (3) documentation generators (mkdocstrings, TypeDoc)
    that build API reference pages. Without consistent docstrings, developers must read implementation to
    understand behavior, IDEs show no help, and auto-generated reference docs are empty. Google style is
    the most readable Python docstring format: clear sections (Args, Returns, Raises, Examples), no RST
    directives to memorize, and supported by mkdocstrings, Sphinx (napoleon), and all Python IDEs. For
    TypeScript/JavaScript, JSDoc is the standard: @param, @returns, @throws, @example tags that
    TypeScript's language server uses for IntelliSense. Enforcement via linting ensures docstrings are
    not forgotten on new code.
  how_to_do_right: |
    1. Python: use Google style — Args, Returns, Raises, Examples sections
    2. TypeScript/JavaScript: use JSDoc — @param, @returns, @throws, @example tags
    3. Every public function, class, and module must have a docstring — enforce with linting
    4. Include parameter types in docstrings even if type hints exist (for documentation generators)
    5. Include at least one usage example for non-trivial functions
    6. Python: enable ruff rules D100-D418 (pydocstyle) in ruff.toml
    7. JS/TS: enable eslint-plugin-jsdoc with require-jsdoc and check-param-names
  severity: medium
  technologies:
    lang: [python, typescript, javascript]
    library: [ruff, eslint, mkdocstrings, typedoc]
  domains:
    domain: [operations, documentation]
    concern: [code_quality, developer_experience]
  example_good: |
    # Python — Google style docstrings
    def calculate_compound_interest(
        principal: float,
        rate: float,
        periods: int,
        contribution: float = 0.0,
    ) -> float:
        """Calculate compound interest with optional periodic contributions.

        Computes the future value of an investment with compound interest,
        optionally including regular contributions at the end of each period.

        Args:
            principal: Initial investment amount in dollars. Must be >= 0.
            rate: Annual interest rate as a decimal (e.g., 0.07 for 7%).
            periods: Number of compounding periods (typically years).
            contribution: Amount added at the end of each period. Defaults to 0.

        Returns:
            The future value of the investment after all periods.

        Raises:
            ValueError: If principal < 0, rate < 0, or periods < 0.

        Examples:
            >>> calculate_compound_interest(1000, 0.07, 10)
            1967.15
            >>> calculate_compound_interest(1000, 0.07, 10, contribution=100)
            3348.17
        """
        if principal < 0 or rate < 0 or periods < 0:
            raise ValueError("All arguments must be non-negative")
        future_value = principal * (1 + rate) ** periods
        if contribution:
            future_value += contribution * (((1 + rate) ** periods - 1) / rate)
        return round(future_value, 2)

    # ruff.toml — enforce docstrings
    # [lint]
    # select = ["D"]  # pydocstyle rules
    # [lint.pydocstyle]
    # convention = "google"
  example_bad: |
    # No docstrings — IDE shows nothing, docs are empty
    def calc(p, r, n, c=0):
        if p < 0:
            raise ValueError()
        fv = p * (1 + r) ** n
        if c:
            fv += c * (((1 + r) ** n - 1) / r)
        return round(fv, 2)

    # What is p? r? n? c? What does this function return?
    # What errors can it raise? What are valid ranges?
    # Developer must read the implementation to understand anything
    # IDE hover shows: calc(p, r, n, c=0) -> float — useless
  when_applies: Any project with public APIs, shared libraries, or more than one developer
  sources:
    - "https://google.github.io/styleguide/pyguide.html#38-comments-and-docstrings"
    - "https://jsdoc.app/"
    - "https://docs.astral.sh/ruff/rules/#pydocstyle-d"

- id: DOCS-006
  text: Practice README-driven development — write the README before writing code. The README defines the user experience, API surface, and mental model. If you cannot explain the project clearly in a README, the design is not ready for implementation.
  why: >
    Tom Preston-Werner (GitHub co-founder) coined "README-driven development" in 2010, and it remains one of
    the most effective techniques for software design. Writing the README first forces you to think about the
    user experience before implementation details: What problem does this solve? How does someone install it?
    What does the simplest usage look like? What are the configuration options? This surfaces design problems
    early — before you have invested hours of coding. If the README is confusing, the API will be confusing.
    If the "Getting Started" section requires 20 steps, the developer experience needs simplification. The
    README also serves as a contract: the team agrees on the interface before anyone writes implementation code,
    preventing scope creep and misaligned expectations.
  how_to_do_right: |
    1. Write the README before any implementation code — this is the design document
    2. Include: one-line description, problem statement, installation, quick start (under 5 steps)
    3. Show the simplest possible usage example that demonstrates core value
    4. Document configuration options with defaults and explanations
    5. Include a "Contributing" section for open-source projects
    6. Update the README as part of every PR that changes the public API
    7. Test README code examples in CI (see DOCS-008 for tested documentation)
  severity: medium
  technologies:
    lang: [general]
    platform: [github, gitlab, npm]
  domains:
    domain: [operations, documentation]
    concern: [developer_experience, design]
  example_good: |
    # mylib — README written BEFORE implementation

    # mylib

    > Type-safe configuration loading for Python apps. Zero dependencies.

    ## Problem

    Every Python app reinvents config loading: argparse + env vars + YAML +
    defaults + validation. mylib gives you one function that does all of it.

    ## Install

    ```bash
    pip install mylib
    ```

    ## Quick Start

    ```python
    from mylib import Config, field

    class AppConfig(Config):
        host: str = field(default="localhost", env="APP_HOST")
        port: int = field(default=8000, env="APP_PORT", ge=1, le=65535)
        debug: bool = field(default=False, env="APP_DEBUG")

    config = AppConfig()  # Loads from env vars, validates, provides defaults
    print(config.host)    # "localhost" (or APP_HOST env var)
    ```

    ## Configuration Sources (priority order)

    1. Explicit arguments: `AppConfig(port=9000)`
    2. Environment variables: `APP_PORT=9000`
    3. Config file: `mylib.toml` or `mylib.yaml`
    4. Defaults from field definitions

    ## API Reference
    [Full reference →](https://mylib.readthedocs.io/reference/)
  example_bad: |
    # README written AFTER implementation (or never updated)

    # mylib

    A library for stuff.

    ## Usage

    See the code.

    ## Install

    Clone the repo and run setup.py (does setup.py even work? pip install?)

    # Or: no README at all — just a src/ directory
    # New developer experience:
    # 1. What does this do? (reads code for 30 minutes)
    # 2. How do I install it? (reads setup.py/pyproject.toml)
    # 3. How do I use it? (reads tests for examples)
    # 4. What are the config options? (greps for os.getenv)
    # Total onboarding time: 2 hours instead of 5 minutes
  when_applies: Every software project, library, or service — even internal ones
  sources:
    - "https://tom.preston-werner.com/2010/08/23/readme-driven-development.html"
    - "https://github.com/matiassingers/awesome-readme"
    - "https://www.makeareadme.com/"

- id: DOCS-007
  text: Automate changelog generation using Conventional Commits and release-please (or semantic-release). Every commit message must follow the Conventional Commits spec. The changelog and version bumps are then fully automated.
  why: >
    Manual changelogs are either never written, always outdated, or inconsistently formatted. Conventional
    Commits solve this by encoding the type and scope of each change in the commit message: feat(auth):,
    fix(api):, docs:, BREAKING CHANGE:. Tools like release-please (Google) or semantic-release then parse
    these commits to automatically: (1) determine the next version (feat = minor, fix = patch,
    BREAKING CHANGE = major), (2) generate a structured changelog grouped by type, (3) create a GitHub
    release with the changelog. This eliminates manual versioning decisions and ensures every change is
    documented. The Conventional Commits spec is adopted by Angular, Vue, Ionic, and thousands of projects.
    release-please is Google's production tool for this (used by googleapis, google-cloud-python, etc.).
  how_to_do_right: |
    1. Adopt Conventional Commits: type(scope): description — feat, fix, docs, chore, refactor, test, ci
    2. Enforce with commitlint + husky (pre-commit hook) or GitHub Actions
    3. Use release-please GitHub Action for automated releases and changelog
    4. Configure release-please for your language: Python (setup.py/pyproject.toml), Node (package.json)
    5. BREAKING CHANGE in footer or ! after type triggers major version bump
    6. Scope is optional but recommended: feat(auth): add OAuth2 support
    7. Keep commit messages under 72 characters in the subject line
  severity: medium
  technologies:
    lang: [general]
    platform: [github, gitlab]
    library: [release-please, commitlint, semantic-release]
  domains:
    domain: [operations, ci_cd]
    concern: [documentation, versioning]
  example_good: |
    # Commit messages following Conventional Commits spec:
    # feat(auth): add OAuth2 PKCE flow for mobile clients
    # fix(api): prevent N+1 query in user list endpoint
    # docs: add cursor pagination how-to guide
    # refactor(db): extract connection pooling to separate module
    # BREAKING CHANGE: remove deprecated /v1/users endpoint

    # .github/workflows/release.yml — automated release with release-please
    name: Release
    on:
      push:
        branches: [main]

    jobs:
      release:
        runs-on: ubuntu-latest
        steps:
          - uses: googleapis/release-please-action@v4
            with:
              release-type: python

    # release-please automatically:
    # 1. Parses commits since last release
    # 2. Determines version bump (feat=minor, fix=patch, BREAKING=major)
    # 3. Generates CHANGELOG.md entries grouped by type:
    #    ## [2.3.0] - 2026-02-15
    #    ### Features
    #    * **auth:** add OAuth2 PKCE flow for mobile clients
    #    ### Bug Fixes
    #    * **api:** prevent N+1 query in user list endpoint
    # 4. Creates PR with version bump + changelog
    # 5. On PR merge: creates GitHub Release with tag

    # commitlint.config.js — enforce conventional commits
    # module.exports = {
    #   extends: ['@commitlint/config-conventional'],
    # };
  example_bad: |
    # Random commit messages with no convention:
    # "fix stuff"
    # "WIP"
    # "updates"
    # "John's changes"
    # "asdfasdf"

    # Manual CHANGELOG.md (always outdated):
    # ## v2.3.0
    # - Some changes (what changes?)
    # - Bug fixes (which bugs?)
    # (Last updated: 6 months ago)

    # Manual version bumps in 3 files:
    # - setup.py: version="2.2.0"  (forgot to update)
    # - pyproject.toml: version = "2.3.0"  (updated)
    # - __init__.py: __version__ = "2.2.1"  (different version!)
  when_applies: Any project that makes releases, especially libraries and APIs with external consumers
  sources:
    - "https://www.conventionalcommits.org/en/v1.0.0/"
    - "https://github.com/googleapis/release-please"
    - "https://github.com/conventional-changelog/commitlint"

- id: DOCS-008
  text: Test all code examples in documentation — untested examples rot within weeks. Use pytest --doctest-modules for Python docstrings, pytest-examples for markdown files, and mdx-js for JavaScript/TypeScript docs.
  why: >
    Documentation with broken code examples is worse than no documentation — it wastes the reader's time
    and destroys trust. Code examples break silently when APIs change, dependencies update, or behavior is
    modified. The only reliable solution is to test documentation examples in CI, just like production code.
    Python's doctest module can verify examples in docstrings. pytest-examples can extract and run code blocks
    from Markdown files. Sybil provides a more flexible framework for testing any embedded code. The key
    principle is: if a code example appears in documentation, it must be executed and verified in CI.
    FastAPI, Pydantic, and SQLAlchemy all test their documentation examples — this is why their docs
    are consistently accurate.
  how_to_do_right: |
    1. Python docstrings: use pytest --doctest-modules to test all >>> examples
    2. Markdown code blocks: use pytest-examples or sybil to extract and test code from .md files
    3. Include all code examples in CI pipeline — treat docs as code
    4. For complex examples: put them in docs/examples/ as real .py files, include in docs via snippet
    5. Use fixtures/conftest.py to provide test databases, mock services for doc examples
    6. JavaScript/TypeScript: use mdx-js or custom scripts to extract and test code blocks
    7. Pin example dependencies separately if they differ from the main project
  severity: high
  technologies:
    lang: [python, javascript, typescript]
    framework: [pytest]
    library: [pytest-examples, sybil, doctest]
  domains:
    domain: [operations, testing]
    concern: [documentation, ci_cd]
  example_good: |
    # Python docstring with testable example (pytest --doctest-modules)
    def fibonacci(n: int) -> int:
        """Return the nth Fibonacci number.

        Args:
            n: The position in the Fibonacci sequence (0-indexed).

        Returns:
            The nth Fibonacci number.

        Examples:
            >>> fibonacci(0)
            0
            >>> fibonacci(1)
            1
            >>> fibonacci(10)
            55
            >>> fibonacci(20)
            6765
        """
        if n < 2:
            return n
        a, b = 0, 1
        for _ in range(2, n + 1):
            a, b = b, a + b
        return b

    # pyproject.toml — enable doctest in pytest
    # [tool.pytest.ini_options]
    # addopts = "--doctest-modules"
    # doctest_optionflags = ["NORMALIZE_WHITESPACE", "ELLIPSIS"]

    # For Markdown files — pytest-examples
    # tests/test_docs.py
    from pytest_examples import find_examples, CodeExample, EvalExample

    @pytest.mark.parametrize("example", find_examples("docs/"), ids=str)
    def test_docs_examples(example: CodeExample, eval_example: EvalExample):
        if example.lang == "python":
            eval_example.run(example)  # Execute and verify output
  example_bad: |
    # Documentation with untested examples:
    # docs/getting-started.md
    # ```python
    # from mylib import connect
    # db = connect("localhost:5432")  # Function was renamed to create_connection 3 months ago
    # result = db.query("SELECT 1")  # query() now requires a Session object
    # print(result.first())          # first() was renamed to scalar_one()
    # ```
    # Reader follows the tutorial, gets 3 ImportErrors and 2 AttributeErrors
    # Gives up, uses a competitor's library with working docs

    # Or: examples that only work with specific data/state:
    # ```python
    # user = get_user(42)  # Assumes user 42 exists — fails in fresh environment
    # print(user.name)     # AttributeError: NoneType has no attribute 'name'
    # ```
  when_applies: Any project with code examples in documentation, especially libraries and frameworks
  sources:
    - "https://docs.pytest.org/en/stable/how-to/doctest.html"
    - "https://github.com/pydantic/pytest-examples"
    - "https://sybil.readthedocs.io/en/latest/"

- id: DOCS-009
  text: Create a runbook for every production service with a standardized template — trigger, symptoms, diagnosis steps, resolution actions, escalation path. Runbooks must be tested during game days and updated after every incident.
  why: >
    When a service is down at 3 AM, the on-call engineer should not be debugging from scratch. A runbook
    provides a decision tree: given these symptoms, check these things, run these commands, escalate to
    this person if X. Google's SRE book emphasizes that runbooks reduce MTTR (mean time to recovery) by
    50-90% because they eliminate the "what do I check first?" paralysis. Without runbooks, incident response
    depends on tribal knowledge — which fails when the expert is on vacation. Runbooks must be tested
    regularly (game days) because untested runbooks give false confidence: the commands may reference
    deprecated tools, the escalation contacts may have changed, or the diagnosis steps may not match
    current architecture.
  how_to_do_right: |
    1. Create a runbook for every production alert — one runbook per alert type
    2. Use a standardized template: Trigger, Symptoms, Diagnosis, Resolution, Escalation, Post-resolution
    3. Diagnosis section: ordered list of commands to run, with expected output for each
    4. Resolution section: specific actions (not "fix the issue") with rollback steps
    5. Escalation section: names, roles, contact methods, when to escalate (time-based + severity-based)
    6. Test runbooks during game days — run through them with a simulated incident
    7. Update runbooks after every incident — add what you learned, fix what was wrong
  severity: high
  technologies:
    lang: [general]
    platform: [pagerduty, opsgenie, datadog]
  domains:
    domain: [operations, reliability]
    concern: [incident_response, sre]
  example_good: |
    # runbooks/api-high-latency.md

    # Runbook: API High Latency (P99 > 2s)

    ## Trigger
    - Alert: `api_latency_p99_above_2s` (PagerDuty)
    - Threshold: P99 latency > 2000ms for > 5 minutes
    - Severity: P2 (customer-impacting)

    ## Symptoms
    - Users report slow page loads or timeouts
    - Grafana dashboard: API Latency panel shows spike
    - Error rate may increase (timeout-related 504s)

    ## Diagnosis (follow in order)

    ### Step 1: Check if it is a database issue
    ```bash
    # Check active database connections and slow queries
    kubectl exec -it postgres-0 -- psql -c "SELECT count(*) FROM pg_stat_activity WHERE state='active';"
    kubectl exec -it postgres-0 -- psql -c "SELECT query, now()-query_start AS duration FROM pg_stat_activity WHERE state='active' ORDER BY duration DESC LIMIT 5;"
    ```
    **Expected**: < 50 active connections, no queries > 10s
    **If abnormal**: → Go to Resolution A (database)

    ### Step 2: Check if it is a downstream service
    ```bash
    # Check dependency health
    curl -s http://api-service:8080/health/dependencies | jq .
    ```
    **Expected**: all dependencies "healthy"
    **If abnormal**: → Escalate to owning team (see Escalation)

    ### Step 3: Check pod resource usage
    ```bash
    kubectl top pods -l app=api-service --sort-by=memory
    ```
    **Expected**: < 80% memory, < 70% CPU
    **If abnormal**: → Go to Resolution B (scale)

    ## Resolution

    ### A: Database slow queries
    ```bash
    # Kill long-running queries (> 60s)
    kubectl exec -it postgres-0 -- psql -c "SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE state='active' AND now()-query_start > interval '60 seconds';"
    ```
    **Rollback**: None needed — killed queries will be retried by clients.

    ### B: Scale API pods
    ```bash
    kubectl scale deployment api-service --replicas=8
    ```
    **Rollback**: `kubectl scale deployment api-service --replicas=4`

    ## Escalation
    - **After 15 min unresolved**: Notify #incident-response Slack channel
    - **After 30 min unresolved**: Page backend team lead (see PagerDuty schedule)
    - **If data loss suspected**: Immediately page CTO + DB team lead

    ## Post-Resolution
    - [ ] Verify P99 latency < 500ms for 10 minutes
    - [ ] Create incident ticket
    - [ ] Schedule postmortem within 48 hours
  example_bad: |
    # No runbook — on-call engineer at 3 AM:
    # 1. Gets PagerDuty alert: "API latency high"
    # 2. Logs into Grafana — which dashboard? (spends 10 min finding it)
    # 3. Sees latency spike — is it DB? Network? Code? (guesses randomly)
    # 4. SSHes into production server (security violation, no audit trail)
    # 5. Runs random commands trying to diagnose
    # 6. Escalates to senior engineer — who is asleep
    # 7. MTTR: 2 hours instead of 15 minutes

    # Or: outdated runbook
    # "SSH into api-prod-01 and restart nginx"
    # (We moved to Kubernetes 8 months ago — there is no api-prod-01)
  when_applies: Any production service with on-call rotation, SLA commitments, or more than 100 users
  sources:
    - "https://sre.google/sre-book/effective-troubleshooting/"
    - "https://www.pagerduty.com/resources/learn/what-is-a-runbook/"
    - "https://sre.google/workbook/on-call/"

- id: DOCS-010
  text: Use oasdiff for automated API changelog generation and breaking change detection in CI. Every pull request that modifies API routes must pass an oasdiff check that flags breaking changes before merge.
  why: >
    Breaking API changes (removing endpoints, changing field types, making optional fields required) are the
    most costly bugs in microservice architectures — they break all downstream consumers simultaneously.
    Manual review of OpenAPI spec diffs is unreliable because human reviewers miss subtle changes (a field
    changing from string to integer, an enum value being removed). oasdiff is a purpose-built tool that
    compares two OpenAPI specs and classifies every change as breaking, non-breaking, or informational.
    It integrates with CI to block PRs that introduce breaking changes without explicit approval. Combined
    with auto-generated OpenAPI specs from FastAPI, this creates a fully automated API contract enforcement
    pipeline: code change -> spec regeneration -> oasdiff comparison -> CI pass/fail.
  how_to_do_right: |
    1. Export OpenAPI spec from your app in CI (FastAPI: app.openapi())
    2. Store the latest released spec as a versioned artifact (e.g., api/openapi-v2.json in repo)
    3. Run oasdiff in CI comparing current spec against released spec
    4. Block PRs with breaking changes unless explicitly labeled "breaking-change-approved"
    5. Generate API changelog from oasdiff output for release notes
    6. Classify changes: breaking (block), deprecation (warn), addition (info)
    7. Include oasdiff output in PR comments for reviewer awareness
  severity: high
  technologies:
    lang: [general]
    platform: [github, gitlab]
    library: [oasdiff, openapi-diff]
  domains:
    domain: [operations, api_design]
    concern: [ci_cd, versioning]
  example_good: |
    # .github/workflows/api-check.yml
    name: API Breaking Change Detection
    on:
      pull_request:
        paths:
          - 'src/api/**'
          - 'src/models/**'

    jobs:
      api-diff:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4

          - name: Generate current OpenAPI spec
            run: |
              pip install -r requirements.txt
              python -c "
              import json
              from app.main import app
              with open('openapi-current.json', 'w') as f:
                  json.dump(app.openapi(), f, indent=2)
              "

          - name: Install oasdiff
            run: |
              curl -sSL https://github.com/Tufin/oasdiff/releases/latest/download/oasdiff_linux_amd64.tar.gz | tar xz
              chmod +x oasdiff

          - name: Check for breaking changes
            run: |
              # Compare against the released spec
              ./oasdiff breaking api/openapi-released.json openapi-current.json \
                --fail-on ERR
              # ERR = breaking change found -> CI fails

          - name: Generate changelog
            if: always()
            run: |
              ./oasdiff changelog api/openapi-released.json openapi-current.json \
                --format markdown > api-changelog.md
              cat api-changelog.md

          - name: Comment PR with API changes
            if: always()
            uses: marocchino/sticky-pull-request-comment@v2
            with:
              path: api-changelog.md
              header: api-changes

    # Example oasdiff output:
    # BREAKING CHANGES:
    #   - GET /users/{id}: response property 'email' type changed from 'string' to 'integer'
    #   - DELETE /users/{id}: endpoint removed
    # NON-BREAKING CHANGES:
    #   - GET /users: added optional query parameter 'sort_by'
    #   - POST /users: added response property 'created_at'
  example_bad: |
    # No automated API diff — breaking changes discovered by consumers
    # Timeline:
    # Monday: Developer changes email field from string to object
    # Tuesday: PR merged after code review (reviewer didn't notice schema change)
    # Wednesday: Mobile app crashes for 100K users (JSON parsing fails)
    # Thursday: Hotfix deployed, incident postmortem
    # Cost: 24 hours of broken mobile app, 3 engineer-days of incident response

    # Or: manual "API review" checklist that nobody follows consistently
    # [ ] Did you check if any fields were removed?
    # [ ] Did you check if any types changed?
    # (Reviewer checks the boxes without actually checking)
  when_applies: Any API consumed by other services or external clients, especially in microservice architectures
  sources:
    - "https://github.com/Tufin/oasdiff"
    - "https://www.oasdiff.com/breaking-changes"
    - "https://swagger.io/docs/specification/v3_0/paths-and-operations/"

- id: DOCS-011
  text: Use living documentation — BDD specifications (Gherkin/Cucumber) and tests that serve as both verification and documentation. When tests pass, the documentation is guaranteed accurate. When tests fail, the documentation is automatically flagged as outdated.
  why: >
    Traditional documentation and tests are separate artifacts that inevitably diverge. Living documentation
    solves this by making tests THE documentation. Behavior-Driven Development (BDD) with Gherkin syntax
    (Given/When/Then) produces human-readable specifications that are also executable tests. When the feature
    works, the test passes and the documentation is accurate. When the feature breaks or changes, the test
    fails and the documentation is flagged as outdated. This is particularly powerful for business logic:
    product managers can read and validate Gherkin scenarios, QA can verify them, and developers implement
    the step definitions. Tools: pytest-bdd for Python, Cucumber for Java/JS, SpecFlow for .NET.
    The Concordion and Pickles tools can generate HTML reports from test results, creating browsable
    documentation sites that show exactly which features work.
  how_to_do_right: |
    1. Write feature files in Gherkin: Feature, Scenario, Given/When/Then
    2. Keep scenarios focused: one behavior per scenario, 3-7 steps maximum
    3. Use concrete examples, not abstract descriptions: "Given a user with email 'alice@test.com'"
    4. Implement step definitions that actually exercise the system (not mocks)
    5. Generate HTML reports from test results as documentation artifacts
    6. Organize features by domain, not by implementation: features/auth/, features/billing/
    7. Review feature files with product/business stakeholders — they are the specification
  severity: medium
  technologies:
    lang: [python, javascript, java]
    framework: [pytest]
    library: [pytest-bdd, behave, cucumber]
  domains:
    domain: [operations, testing]
    concern: [documentation, bdd]
  example_good: |
    # features/authentication/login.feature
    Feature: User Login
      As a registered user
      I want to log in with my credentials
      So that I can access my account

      Scenario: Successful login with valid credentials
        Given a registered user with email "alice@example.com" and password "SecurePass123!"
        When the user submits login with email "alice@example.com" and password "SecurePass123!"
        Then the response status code is 200
        And the response contains a valid JWT token
        And the token contains claim "sub" with the user's ID

      Scenario: Failed login with wrong password
        Given a registered user with email "alice@example.com" and password "SecurePass123!"
        When the user submits login with email "alice@example.com" and password "WrongPassword"
        Then the response status code is 401
        And the response contains error "Invalid credentials"
        And no JWT token is returned

      Scenario: Account locked after 5 failed attempts
        Given a registered user with email "alice@example.com"
        When the user fails login 5 times in a row
        Then the response status code is 429
        And the response contains error "Account locked. Try again in 15 minutes."

    # tests/step_definitions/test_login.py
    import pytest
    from pytest_bdd import given, when, then, scenario, parsers
    from httpx import AsyncClient

    @scenario("../../features/authentication/login.feature", "Successful login with valid credentials")
    def test_successful_login():
        pass

    @given(parsers.parse('a registered user with email "{email}" and password "{password}"'))
    async def registered_user(email: str, password: str, test_db):
        await create_user(test_db, email=email, password=password)

    @when(parsers.parse('the user submits login with email "{email}" and password "{password}"'))
    async def submit_login(email: str, password: str, client: AsyncClient, context):
        context["response"] = await client.post(
            "/auth/login", json={"email": email, "password": password}
        )

    @then(parsers.parse("the response status code is {status_code:d}"))
    def check_status_code(status_code: int, context):
        assert context["response"].status_code == status_code

    @then("the response contains a valid JWT token")
    def check_jwt_token(context):
        data = context["response"].json()
        assert "access_token" in data
        assert len(data["access_token"]) > 50
  example_bad: |
    # Separate docs and tests that diverge:
    # docs/auth.md says: "Login returns a session cookie"
    # Actual API: returns JWT token (changed 3 months ago, docs not updated)

    # Or: tests that don't document behavior:
    def test_login():
        resp = client.post("/login", json={"e": "a@b.c", "p": "x"})
        assert resp.status_code == 200
        # What behavior is being tested? What are the acceptance criteria?
        # When this test fails, what business requirement is broken?
  when_applies: Projects with complex business logic, regulatory requirements, or when business stakeholders need to validate behavior
  sources:
    - "https://cucumber.io/docs/gherkin/reference/"
    - "https://pytest-bdd.readthedocs.io/en/stable/"
    - "https://martinfowler.com/bliki/GivenWhenThen.html"

- id: DOCS-012
  text: Use diagram-as-code with Mermaid in Markdown for all architecture and flow diagrams. Use the C4 model with Structurizr DSL for formal system architecture documentation. Never use binary diagram files (Visio, Lucidchart exports) in repositories.
  why: >
    Binary diagram files (.vsdx, .drawio, .png from drawing tools) have four fatal flaws for documentation:
    (1) they cannot be diffed in code review — a PR changing a diagram shows "binary file changed" with no
    way to see what changed, (2) they require specific tools to edit — a developer cannot fix a typo without
    Visio/Lucidchart, (3) they are never updated because editing is friction-heavy, (4) they cannot be
    searched by text. Diagram-as-code solves all four: diagrams are defined in text (Mermaid, PlantUML,
    Structurizr DSL), rendered automatically, diffable in PRs, editable by anyone with a text editor, and
    searchable. Mermaid is the best choice for inline diagrams because GitHub, GitLab, and MkDocs Material
    all render it natively. For formal architecture documentation, the C4 model (Context, Container,
    Component, Code) with Structurizr DSL provides standardized zoom levels.
  how_to_do_right: |
    1. Use Mermaid for flow charts, sequence diagrams, ERDs, and state diagrams in Markdown files
    2. Use C4 model for architecture documentation: System Context -> Container -> Component -> Code
    3. Use Structurizr DSL for C4 diagrams — generates consistent diagrams from a single model
    4. Embed Mermaid diagrams directly in Markdown — GitHub/GitLab/MkDocs render them natively
    5. Keep diagrams next to the code they describe: docs/architecture/ or inline in README
    6. Review diagram changes in PRs — text diffs show exactly what changed
    7. Use Mermaid Live Editor (mermaid.live) for authoring and previewing
  severity: medium
  technologies:
    lang: [general]
    platform: [github, gitlab, mkdocs]
    library: [mermaid, structurizr, plantuml]
  domains:
    domain: [operations, architecture]
    concern: [documentation, visualization]
  example_good: |
    # Mermaid sequence diagram in Markdown (renders in GitHub/GitLab/MkDocs)
    # ```mermaid
    # sequenceDiagram
    #     participant C as Client
    #     participant G as API Gateway
    #     participant A as Auth Service
    #     participant U as User Service
    #     participant D as Database
    #
    #     C->>G: POST /login {email, password}
    #     G->>A: Validate credentials
    #     A->>D: SELECT user WHERE email = ?
    #     D-->>A: User record
    #     A->>A: Verify password hash
    #     A-->>G: JWT token
    #     G-->>C: 200 {access_token}
    #
    #     C->>G: GET /profile (Authorization: Bearer token)
    #     G->>A: Validate JWT
    #     A-->>G: User ID from token
    #     G->>U: Get user profile
    #     U->>D: SELECT * FROM profiles WHERE user_id = ?
    #     D-->>U: Profile data
    #     U-->>G: Profile response
    #     G-->>C: 200 {profile}
    # ```

    # Structurizr DSL for C4 model (workspace.dsl)
    workspace {
        model {
            user = person "Customer" "Uses the mobile app to manage account"
            webapp = softwareSystem "Web Application" {
                spa = container "SPA" "React" "Serves the web UI"
                api = container "API" "FastAPI" "Handles business logic" {
                    authModule = component "Auth Module" "Handles authentication"
                    userModule = component "User Module" "Manages user data"
                }
                db = container "Database" "PostgreSQL" "Stores all data"
                cache = container "Cache" "Redis" "Session and query cache"
            }
            user -> spa "Uses"
            spa -> api "Makes API calls" "HTTPS/JSON"
            api -> db "Reads/writes data" "SQL"
            api -> cache "Caches queries" "Redis protocol"
        }
        views {
            systemContext webapp "SystemContext" {
                include *
                autoLayout
            }
            container webapp "Containers" {
                include *
                autoLayout
            }
        }
    }
  example_bad: |
    # Binary diagram files in the repo:
    docs/
    ├── architecture.vsdx      # Requires Visio to edit ($400/year license)
    ├── auth-flow.drawio        # Requires draw.io desktop app
    ├── system-diagram.png      # Screenshot — cannot edit, cannot diff
    └── sequence.pdf            # Exported from Lucidchart — read-only

    # PR review experience:
    # "Binary file docs/architecture.vsdx has changed"
    # Reviewer: "What changed? I can't see the diff."
    # Author: "I moved the database box to the right and added a new service"
    # Reviewer: "Can you take a screenshot?"
    # (This conversation repeats for every diagram change)

    # Stale diagrams:
    # architecture.png shows 3 services — we now have 12
    # Last updated: 18 months ago
    # Nobody updates it because editing requires opening Visio, finding the file,
    # making the change, exporting, committing — 15 minutes for a one-word fix
  when_applies: Any project with architecture documentation, system diagrams, or flow charts
  sources:
    - "https://mermaid.js.org/intro/"
    - "https://c4model.com/"
    - "https://structurizr.com/dsl"

- id: DOCS-013
  text: Implement a docs-as-code CI pipeline that validates documentation on every pull request — check for broken links, lint prose style, verify code examples, and ensure structural consistency. Documentation quality gates must be as strict as code quality gates.
  why: >
    Documentation without CI is like code without tests — it works until it does not, and you find out from
    users instead of from automation. Common documentation failures that CI catches: broken links (internal
    and external), spelling errors, inconsistent terminology, prose that is too complex (Flesch-Kincaid score),
    orphan pages (not linked from navigation), and code examples that no longer compile. Tools like
    markdownlint enforce structural consistency (heading levels, list formatting), vale enforces prose style
    (Google, Microsoft, or custom style guides), and linkchecker catches broken URLs. The key insight is
    that documentation is code — it lives in the repo, is reviewed in PRs, and must pass CI before merge.
  how_to_do_right: |
    1. markdownlint: enforce consistent Markdown formatting (heading levels, list style, line length)
    2. vale: enforce prose style (Google developer docs style, custom terminology rules)
    3. linkchecker or lychee: verify all internal and external links are valid
    4. pytest-examples or sybil: test code blocks in documentation (see DOCS-008)
    5. Run all checks in CI on every PR that touches docs/ or *.md files
    6. Block merge on documentation CI failures — same as code CI
    7. Use pre-commit hooks for fast feedback on documentation changes locally
  severity: medium
  technologies:
    lang: [general]
    platform: [github, gitlab]
    library: [markdownlint, vale, lychee, pre-commit]
  domains:
    domain: [operations, ci_cd]
    concern: [documentation, quality]
  example_good: |
    # .github/workflows/docs-ci.yml
    name: Documentation CI
    on:
      pull_request:
        paths: ['docs/**', '*.md', 'mkdocs.yml']

    jobs:
      lint-markdown:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4
          - uses: DavidAnson/markdownlint-cli2-action@v16
            with:
              globs: '**/*.md'

      lint-prose:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4
          - uses: errata-ai/vale-action@v2
            with:
              files: docs/
              reporter: github-pr-review

      check-links:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4
          - uses: lycheeverse/lychee-action@v1
            with:
              args: --verbose --no-progress 'docs/**/*.md' '*.md'
              fail: true

      test-examples:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4
          - run: pip install -r requirements-dev.txt
          - run: pytest --doctest-modules src/
          - run: pytest tests/test_docs_examples.py

    # .markdownlint.json
    {
      "MD013": { "line_length": 120 },
      "MD033": false,
      "MD041": true
    }

    # .vale.ini
    # StylesPath = .vale/styles
    # MinAlertLevel = suggestion
    # [docs/*.md]
    # BasedOnStyles = Google, write-good
    # Google.Passive = warning
    # Google.We = suggestion
  example_bad: |
    # No documentation CI — quality depends on reviewer attention
    # PR with docs changes:
    # - Reviewer skims the markdown, approves
    # - Broken link to /docs/old-page (renamed last month) — not caught
    # - Code example uses deprecated API — not caught
    # - Heading jumps from ## to #### — not caught
    # - "Click here" link text (accessibility violation) — not caught
    # - Inconsistent terminology: "server" vs "instance" vs "node" — not caught
    # All these issues are discovered by users weeks later
  when_applies: Any project where documentation quality matters — open source projects, developer platforms, API documentation
  sources:
    - "https://github.com/DavidAnson/markdownlint"
    - "https://vale.sh/"
    - "https://github.com/lycheeverse/lychee"
