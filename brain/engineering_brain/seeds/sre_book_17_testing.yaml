layer: rules
technology: SRE
domain: testing
knowledge:
- id: CR-SRE-TEST-001
  text: The amount of testing you need is proportional to the confidence gap between "the system works in dev" and "the system
    works in production." If dev and prod are identical, you need minimal testing. They never are — so you always need extensive
    testing.
  why: 'The SRE Book frames testing as a risk management activity, not a quality assurance checkbox. The fundamental question
    is: "How confident are we that a change will work in production?" Testing closes the gap between development confidence
    and production reality. Google observed that the environments diverge in predictable ways: different data volumes, different
    traffic patterns, different hardware, different configurations, different failure modes. Each divergence is an untested
    assumption. The more divergences, the more testing is required. This framing helps prioritize testing effort: focus on
    the areas where dev and prod diverge most. Testing a feature that works identically in dev and prod is low value. Testing
    behavior under production-scale traffic when dev uses toy data is extremely high value.

    '
  how_to_do_right: '1. Map the specific differences between your dev and prod environments. Each difference is a testing gap.

    2. Prioritize testing effort on the biggest divergences: data volume, traffic patterns, concurrency, failure modes.

    3. Reduce divergence where possible: use production-like data in staging, production-like traffic in load testing.

    4. Accept that some divergence is irreducible — these areas need the most testing AND the fastest rollback.

    5. Track "surprise production failures" — failures that passed all testing. Each one reveals a dev/prod divergence you
    didn''t know about.

    6. The goal is not 100% test coverage. The goal is production confidence proportional to change risk.

    '
  example_good: "# Map dev/prod divergences and prioritize testing accordingly\nclass ConfidenceGapAnalyzer:\n    def analyze(self, service: str) -> list[TestingGap]:\n        gaps = []\n        if self.dev_data_volume(service) < self.prod_data_volume(service) * 0.01:\n            gaps.append(TestingGap(\n                area=\"data_volume\",\n                dev_value=\"1GB\",\n                prod_value=\"100GB\",\n                priority=\"P0\",\n                recommendation=\"Load test with production-scale data\",\n            ))\n        if not self.uses_prod_traffic_patterns(service):\n            gaps.append(TestingGap(\n                area=\"traffic_patterns\",\n                priority=\"P1\",\n                recommendation=\"Replay production traffic in staging\",\n            ))\n        return sorted(gaps, key=lambda g: g.priority)\n"
  example_bad: "# Test only happy path with toy data\ndef test_search():\n    db = InMemoryDB()  # Dev: 10 records\n    db.insert({\"title\": \"test\"})  # Prod: 100M records\n    result = search(db, \"test\")\n    assert result  # Passes in dev, 30-second timeout in prod\n    # Dev/prod divergence: 10 vs 100M records\n    # This test provides false confidence\n"
  when_applies: When planning test strategies for services where development and production environments differ significantly in data volume, traffic patterns, or infrastructure configuration.
  severity: high
  technologies:
    lang: [general]
    platform: [deployment]
  domains:
    domain: [reliability, testing]
  sources:
  - url: https://sre.google/sre-book/testing-reliability/
    title: 'Google SRE Book — Chapter 17: Testing for Reliability'
  validation_status: cross_checked
- id: CR-SRE-TEST-002
  text: Mean Time to Repair (MTTR) is more important than Mean Time Between Failures (MTBF) for large-scale systems. You cannot
    prevent all failures, but you CAN make recovery fast. Testing your recovery mechanisms (rollback, failover, restore) matters
    more than testing for zero bugs.
  why: 'Google operates at a scale where MTBF approaches zero — with millions of machines and billions of requests, SOMETHING
    is always failing. The SRE Book argues that beyond a certain system size, reducing MTBF has diminishing returns because
    the failure space is too large to test exhaustively. But MTTR scales linearly with process quality: if you can detect
    a failure in 1 minute and rollback in 2 minutes, MTTR is 3 minutes regardless of what failed. This shifts the testing
    priority: instead of trying to prevent all failures (impossible), test that you can recover from any failure quickly.
    This means testing rollback procedures, failover mechanisms, backup restoration, circuit breakers, and monitoring detection
    latency — not just testing that the happy path works.

    '
  how_to_do_right: '1. Test rollback: can you revert the last deployment in under 5 minutes? If not, fix rollback before adding
    features.

    2. Test failover: if primary database dies, does the application seamlessly switch to replica? Test this monthly.

    3. Test detection: inject a real failure and measure how long until monitoring alerts. If > 5 minutes, fix monitoring.

    4. Test restoration: can you restore from backup and have the system operational? How long does it take? Is the backup
    actually valid?

    5. Track MTTR separately for each component. The component with the highest MTTR is your biggest reliability risk.

    6. Set MTTR targets per service: P0 = 5 min, P1 = 30 min, P2 = 4 hours. Test that you meet them.

    '
  example_good: "# Test recovery mechanisms, not just happy paths\nclass RecoveryTestSuite:\n    def test_rollback_speed(self):\n        deploy(version=\"v2.0\")\n        start = time.monotonic()\n        rollback(to_version=\"v1.9\")\n        elapsed = time.monotonic() - start\n        assert elapsed < 300, f\"Rollback took {elapsed}s — must be < 5 min\"\n\n    def test_failover_works(self):\n        primary = get_primary_db()\n        kill_instance(primary)\n        # Verify automatic failover\n        new_primary = wait_for_new_primary(timeout_sec=60)\n        assert new_primary != primary\n        assert can_write(new_primary)\n\n    def test_backup_restoration(self):\n        backup = get_latest_backup()\n        restored_db = restore_from_backup(backup)\n        assert restored_db.row_count() > 0, \"Backup is empty!\"\n        assert restored_db.integrity_check(), \"Backup is corrupt!\"\n"
  example_bad: "# Only test that features work — never test recovery\ndef test_app():\n    assert create_user(\"alice\")  # Happy path works\n    assert login(\"alice\")        # Happy path works\n    # Never tested: what happens when we rollback?\n    # Never tested: does failover actually work?\n    # Never tested: can we restore from backup?\n    # MTBF is low but MTTR is infinite because recovery is untested\n"
  when_applies: When operating large-scale systems where preventing all failures is impossible and fast recovery from any failure is more valuable than attempting zero-bug deployments.
  severity: critical
  technologies:
    lang: [general]
    platform: [deployment, kubernetes]
  domains:
    domain: [reliability, testing]
    concern: [data_integrity, backup]
  sources:
  - url: https://sre.google/sre-book/testing-reliability/
    title: 'Google SRE Book — Chapter 17: Testing for Reliability'
  validation_status: cross_checked
- id: CR-SRE-TEST-003
  text: Integration tests are the highest-value test type for distributed systems. Unit tests verify components work in isolation
    — but production failures almost always occur at component BOUNDARIES, not within components.
  why: 'Google''s testing hierarchy for SRE differs from traditional software testing. While unit tests are necessary, they
    have a blind spot: they test components in isolation, with mocked dependencies. Production failures rarely occur because
    a function has a bug — they occur because two components disagree on an interface, a timeout is set differently, a retry
    policy creates a thundering herd, or a version incompatibility causes silent data corruption. These failures only manifest
    when real components interact. Google invests heavily in integration testing that exercises real component interactions:
    real RPCs, real databases, real queues. The SRE Book emphasizes that integration tests catch the class of bugs that cause
    the most severe outages — interface mismatches, protocol incompatibilities, and emergent behaviors from component interactions.

    '
  how_to_do_right: '1. Integration tests must use REAL dependencies (or realistic fakes), not mocks. Mocks hide interface
    mismatches.

    2. Test the critical path end-to-end: user request → load balancer → application → database → response. Each hop is a
    potential failure point.

    3. Include failure modes in integration tests: what happens when the database returns an error? When the network times
    out? When a dependency returns unexpected data?

    4. Run integration tests against a staging environment that mirrors production as closely as possible.

    5. Track "escaped defects" — bugs that reach production despite passing unit tests. Most will be interface/integration
    issues.

    6. Integration tests should cover: version compatibility, timeout behavior, retry policies, error propagation, and data
    format agreements.

    '
  example_good: "# Integration tests with real dependencies, not mocks\nclass PaymentIntegrationTest:\n    def test_checkout_end_to_end(self, staging_db, staging_payment_gw):\n        \"\"\"Real DB, real payment gateway (sandbox), real HTTP.\"\"\"\n        user = create_user(staging_db)\n        cart = add_to_cart(user, item_id=\"SKU-123\")\n        # Real HTTP call to payment gateway sandbox\n        result = checkout(cart, payment_gateway=staging_payment_gw)\n        assert result.status == \"completed\"\n        # Verify DB state is consistent\n        order = staging_db.get_order(result.order_id)\n        assert order.total == cart.total\n\n    def test_payment_gateway_timeout(self, staging_db):\n        \"\"\"Test failure mode: what happens when payment GW times out?\"\"\"\n        with inject_latency(service=\"payment_gw\", delay_ms=30000):\n            result = checkout(cart, timeout_sec=5)\n            assert result.status == \"timeout_error\"\n            assert not staging_db.has_charge(cart.id)  # No orphaned charge\n"
  example_bad: "# Unit tests with mocks — miss interface mismatches\nclass TestPayment:\n    def test_checkout(self):\n        mock_db = Mock()\n        mock_db.save.return_value = True\n        mock_gw = Mock()\n        mock_gw.charge.return_value = {\"status\": \"ok\"}\n        # All mocks return success — test always passes\n        result = checkout(mock_db, mock_gw)\n        assert result  # In production: DB schema mismatch, GW returns different format\n"
  when_applies: When testing distributed systems where production failures typically occur at component boundaries due to interface mismatches, timeout disagreements, or protocol incompatibilities.
  severity: high
  technologies:
    lang: [general]
    platform: [deployment]
  domains:
    domain: [reliability, testing]
  sources:
  - url: https://sre.google/sre-book/testing-reliability/
    title: 'Google SRE Book — Chapter 17: Testing for Reliability'
  validation_status: cross_checked
- id: CR-SRE-TEST-004
  text: Production tests (probers/synthetic monitoring) are mandatory, not optional. A system that passes all pre-deployment
    tests but fails in production has a testing gap. Continuous production probing closes that gap by testing the ACTUAL system
    that users interact with.
  why: 'Google runs production probers (synthetic transactions) continuously against live production systems. These probers
    simulate real user workflows: create an account, upload a file, search for content, download a result. If a prober fails,
    it means a real user would also fail — and the alert fires before real users report the issue. This catches a class of
    failures that pre-deployment testing cannot: infrastructure changes that weren''t coordinated with application teams,
    DNS propagation issues, certificate expirations, third-party dependency failures, capacity exhaustion, and configuration
    drift. Production probers are the final safety net: they test the actual system, with actual data, on actual infrastructure.
    If all other testing fails, production probers catch the problem before users do.

    '
  how_to_do_right: '1. Implement synthetic transactions that exercise every critical user workflow, running continuously (every
    1-5 minutes).

    2. Probers must be indistinguishable from real users: use the same API endpoints, same authentication, same data flow.

    3. Alert on prober failures with the same urgency as real user impact — a prober failure IS a real user impact.

    4. Probers should test from OUTSIDE your infrastructure (different network, different DNS, different region) to catch
    infrastructure-level issues.

    5. Track prober success rate as an SLI. If probers are 99.9% successful, your service is approximately 99.9% available.

    6. Rotate prober configurations: test different user scenarios, different data sizes, different regions to broaden coverage.

    '
  example_good: "# Production probers — synthetic transactions against live system\nclass ProductionProber:\n    INTERVAL_SEC = 60  # Run every minute\n\n    def probe_checkout_flow(self):\n        \"\"\"Synthetic transaction exercising the real production API.\"\"\"\n        start = time.monotonic()\n        try:\n            token = self.authenticate(self.PROBER_USER, self.PROBER_PASS)\n            cart = self.api_call(\"POST\", \"/api/cart\", {\"item\": \"PROBER_SKU\"})\n            order = self.api_call(\"POST\", \"/api/checkout\", {\"cart_id\": cart[\"id\"]})\n            assert order[\"status\"] == \"completed\"\n            latency = time.monotonic() - start\n            metrics.observe(\"prober_checkout_latency_seconds\", latency)\n            metrics.increment(\"prober_checkout_success_total\")\n        except Exception as e:\n            metrics.increment(\"prober_checkout_failure_total\")\n            alert(\"Checkout prober FAILED — users may be impacted\", severity=\"P0\")\n            raise\n"
  example_bad: "# No production probing — rely only on pre-deployment tests\ndef deploy_and_hope(version: str):\n    run_unit_tests()  # Pass\n    run_integration_tests()  # Pass\n    deploy(version)\n    # No continuous monitoring of user-facing flows\n    # DNS change breaks login? We find out from user complaints\n    # Certificate expired? Users report 'can't connect'\n    # Third-party API changed? Silent data corruption\n"
  when_applies: When operating production services that need continuous validation of user-facing workflows, especially to catch infrastructure-level failures that pre-deployment testing cannot predict.
  severity: critical
  technologies:
    lang: [general]
    platform: [cloud, kubernetes, prometheus]
  domains:
    domain: [observability, reliability, testing]
    concern: [monitoring]
  sources:
  - url: https://sre.google/sre-book/testing-reliability/
    title: 'Google SRE Book — Chapter 17: Testing for Reliability'
  validation_status: cross_checked
- id: CR-SRE-TEST-005
  text: Configuration changes need the same testing rigor as code changes — often MORE. Google's most severe outages were
    caused by config changes, not code bugs. Test config changes through canary, staged rollout, and validation, not just
    syntax checking.
  why: 'The SRE Book repeatedly emphasizes that configuration changes cause more outages than code changes because they bypass
    the testing infrastructure designed for code. A code change goes through unit tests, integration tests, code review, and
    staged deployment. A configuration change often goes through... a text editor and a push command. Yet configuration changes
    can be MORE dangerous: they often take effect immediately (no compilation), affect all instances simultaneously (no canary),
    and can express invalid states that code cannot (wrong database endpoint, negative timeout, conflicting feature flags).
    Google treats configuration testing as a critical discipline: config schema validation (is this a valid config?), config
    semantic validation (does this config make sense?), config canary (does this config work on one instance before all instances?),
    and config rollback testing (can we revert this config change?).

    '
  how_to_do_right: '1. Validate config syntax AND semantics before deployment. A valid YAML file can contain nonsensical values.

    2. Config canary: deploy config changes to 1% of instances, monitor for 10 minutes, then expand. NEVER deploy config to
    100% simultaneously.

    3. Test config rollback: can you revert to the previous config version in under 1 minute? Test this regularly.

    4. Version control all config. The same code review process that protects code should protect config.

    5. Create config test suites: "If feature X is enabled, setting Y must be > 0" — these constraints should be checked automatically.

    6. Track "config-induced incidents" separately. If this category is growing, invest in config testing infrastructure.

    '
  example_good: "# Config change testing: schema + semantics + canary + rollback\nclass ConfigDeployPipeline:\n    def deploy(self, config: dict, service: str):\n        # 1. Schema validation\n        validate_schema(config, schema=self.get_schema(service))\n        # 2. Semantic validation\n        self.validate_semantics(config, service)\n        # 3. Version control\n        config_version = self.commit_config(config)\n        # 4. Canary: 1% first\n        self.apply_to_canary(service, config, percentage=0.01)\n        self.monitor(service, duration_sec=600)\n        # 5. Staged rollout\n        for pct in [0.10, 0.50, 1.0]:\n            self.apply(service, config, percentage=pct)\n            self.monitor(service, duration_sec=300)\n\n    def validate_semantics(self, config: dict, service: str):\n        \"\"\"Check config MAKES SENSE, not just valid syntax.\"\"\"\n        if config.get(\"timeout_ms\", 0) < 0:\n            raise ValueError(\"Negative timeout\")\n        if config.get(\"replicas\", 1) > 100:\n            raise ValueError(\"Suspiciously high replica count\")\n"
  example_bad: "# Config change: text editor → push → pray\ndef update_config(key: str, value: str):\n    config = yaml.safe_load(open(\"config.yaml\"))\n    config[key] = value\n    yaml.dump(config, open(\"config.yaml\", \"w\"))  # Only syntax check\n    push_to_all_instances()  # 100% at once, no canary\n    # No semantic validation: timeout=-1 is valid YAML\n    # No rollback test: can we revert?\n    # No staged rollout: if bad, affects 100% of users instantly\n"
  when_applies: When deploying configuration changes to production, especially for services where config changes have historically caused more outages than code changes.
  severity: critical
  technologies:
    lang: [general]
    platform: [deployment, kubernetes, terraform]
  domains:
    domain: [code_quality, reliability, testing]
    concern: [configuration]
  sources:
  - url: https://sre.google/sre-book/testing-reliability/
    title: 'Google SRE Book — Chapter 17: Testing for Reliability'
  validation_status: cross_checked
- id: CR-SRE-TEST-006
  text: Stress tests and capacity planning tests must be conducted regularly against production-like environments, not just
    before launches. Systems that handle today's load will fail at tomorrow's if capacity isn't tested continuously.
  why: 'Google conducts regular load testing because traffic grows, data volumes increase, and system performance degrades
    over time. A service that handles 10,000 RPS today might fail at 12,000 RPS next month due to increased data volume, new
    features adding latency, or dependency degradation. Without regular stress testing, the first indication of a capacity
    problem is a production outage during a traffic spike. Google''s approach: schedule regular load tests that push systems
    to 120-150% of current peak traffic. This reveals the headroom available and identifies which component will be the bottleneck
    at higher load. Combined with traffic growth projections, this enables proactive capacity planning instead of reactive
    firefighting.

    '
  how_to_do_right: '1. Run load tests monthly at 120-150% of current peak traffic. Identify the first component that degrades.

    2. Test graceful degradation: at 200% load, does the system slow down gracefully or crash completely?

    3. Use production-like data volumes. A load test with a 1GB database doesn''t predict behavior with a 1TB database.

    4. Test with realistic traffic patterns (bursty, not uniform). Real traffic has spikes that uniform load tests miss.

    5. Track "headroom" — how much additional traffic can the system handle before degradation? If < 20%, capacity planning
    is urgent.

    6. Combine with chaos engineering: what happens at peak load when one instance dies? At 100% capacity, any failure cascades.

    '
  example_good: "# Regular load testing with headroom tracking\nclass LoadTestRunner:\n    def run_monthly_load_test(self, service: str):\n        current_peak = self.get_current_peak_rps(service)\n        test_targets = [1.0, 1.2, 1.5, 2.0]  # 100%, 120%, 150%, 200% of peak\n        for multiplier in test_targets:\n            target_rps = int(current_peak * multiplier)\n            result = self.run_load_test(service, rps=target_rps, duration_sec=300)\n            if result.p99_latency > self.slo_latency(service):\n                log.warning(\n                    f\"{service} degrades at {multiplier:.0%} of peak \"\n                    f\"({target_rps} RPS). Headroom: {(multiplier-1)*100:.0f}%\"\n                )\n                if multiplier <= 1.2:\n                    alert(f\"URGENT: {service} has < 20% headroom\")\n                break\n            if result.error_rate > 0.01:\n                log.warning(f\"Errors at {multiplier:.0%}: {result.error_rate:.1%}\")\n                break\n"
  example_bad: "# Load test only before launch, never again\ndef launch_service(service):\n    load_test(service, rps=10000)  # Passed at launch\n    deploy(service)\n    # 6 months later: data grew 3x, traffic grew 2x\n    # Load test from launch is irrelevant\n    # First indication of capacity problem: Black Friday outage\n    # No headroom tracking, no growth projections\n"
  when_applies: When operating services where traffic grows over time and capacity limits must be continuously validated, not just tested before initial launch.
  severity: high
  technologies:
    lang: [general]
    platform: [cloud, kubernetes]
  domains:
    domain: [reliability, planning, testing]
    concern: [capacity]
  sources:
  - url: https://sre.google/sre-book/testing-reliability/
    title: 'Google SRE Book — Chapter 17: Testing for Reliability'
  validation_status: cross_checked
