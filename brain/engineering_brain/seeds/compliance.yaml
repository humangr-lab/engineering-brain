- id: CR-HIPAA-002
  text: Implement role-based access control ensuring minimum necessary access to PHI
  why: HIPAA Minimum Necessary Rule (45 CFR 164.502(b)) requires that access to PHI be limited to the minimum necessary for
    the intended purpose. A billing clerk should not see clinical notes; a nurse should not see financial records. Violations
    are individually finable.
  how_to_do_right: '1. Define granular roles aligned to job functions (clinician, billing, admin, researcher).

    2. Each role specifies exactly which PHI fields are accessible (column-level access).

    3. Implement attribute-based access control (ABAC) for context-sensitive rules (e.g., treating physician only).

    4. Break-the-glass procedure for emergencies — logged, reviewed, time-limited.

    5. Review access assignments quarterly; revoke on role change within 24 hours.

    6. Automated access request workflow with manager + compliance approval.

    '
