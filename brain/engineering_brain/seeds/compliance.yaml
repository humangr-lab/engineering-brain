        """Verify professional investor status per CVM Resolução 30."""

        PROFESSIONAL_THRESHOLD_BRL = Decimal("10_000_000")  # R$10M patrimônio
        QUALIFIED_THRESHOLD_BRL = Decimal("1_000_000")      # R$1M se certificado CPA-20

