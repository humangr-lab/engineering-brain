    kind: NetworkPolicy\nmetadata:\n  name: payment-db-access\n  namespace: payment-cde\nspec:\n  podSelector:\n    matchLabels:\n\
    \      app: payment-db\n  policyTypes:\n    - Ingress\n  ingress:\n    - from:\n        - podSelector:\n            matchLabels:\n\
