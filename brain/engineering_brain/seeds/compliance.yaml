    )\nasync def get_patient(patient_id: str):\n    return await db.fetch_one(\"SELECT * FROM patients WHERE id = :id\", {\"\
    id\": patient_id})\n    # No authentication check\n    # No permission check\n    # No ownership check (IDOR vulnerability)\n\
    \    # No audit logging\n"
  when_applies: Any project using Python codebases, FastAPI async web services, Django projects, or Express.js/Node.js servers
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities
  sources: ["https://cheatsheetseries.owasp.org/cheatsheets/Access_Control_Cheat_Sheet.html"]
- id: CR-OWASP-003
  text: Encode all output and implement Content Security Policy to prevent Cross-Site Scripting (XSS)
  why: XSS (OWASP A07:2021) allows attackers to execute JavaScript in other users' browsers, stealing sessions, credentials,
    or performing actions on their behalf. Output encoding prevents stored and reflected XSS; CSP provides defense-in-depth
    by restricting script execution sources.
  how_to_do_right: '1. Use a templating engine with auto-escaping enabled by default (React JSX, Jinja2 autoescape).

    2. Context-aware encoding: HTML entities for HTML body, JS encoding for script context, URL encoding for URLs.

    3. Never use dangerouslySetInnerHTML (React) or |safe (Jinja2) with user-supplied content.

    4. Implement strict Content Security Policy headers: no inline scripts, no eval.

    5. Use DOMPurify or equivalent for any user HTML that must be rendered (rich text editors).

    6. HttpOnly + Secure flags on all session cookies.

    '
