- id: CR-COMP-PM-006
  text: Prediction market operators must implement regulatory reporting — transaction reporting, large trader reporting, and
    suspicious activity reports (SARs) are mandatory in most jurisdictions.
  why: Registered exchanges and market operators must file regular reports with regulators. In the US, the CFTC requires daily
    large trader reports (traders exceeding reportable position limits), weekly Commitments of Traders (COT) reports, and suspicious
    activity reports to FinCEN. In Brazil, the CVM requires periodic disclosure of market statistics and the COAF (Conselho
    de Controle de Atividades Financeiras) requires SAR filing for anti-money laundering. These reports must follow specific
    formats, deadlines, and data schemas. Late or inaccurate reporting triggers fines and potential license revocation.
  how_to_do_right: '1. Implement automated report generation matching regulator-specified formats (CFTC Form 102, CVM periodic
    reports).

    2. Schedule reports with appropriate frequency (daily for large trader, weekly for COT, event-driven for SARs).

    3. Maintain data lineage — every number in a report must trace back to source transactions.

    4. Implement dual-control for SAR filing (two compliance officers must review before submission).

    5. Archive all submitted reports with timestamps and confirmation receipts for 5+ years.

    6. Test report generation with sample data before going live — incorrect reports are worse than late reports.

    '
