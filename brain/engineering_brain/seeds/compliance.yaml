- id: CR-PCI-001
  text: Never store CVV, full track data, or PIN after transaction authorization
  why: PCI DSS Requirement 3.2 explicitly prohibits storing sensitive authentication data after authorization. Storing CVV
    or track data makes you a high-value target and an immediate PCI compliance failure. A breach of stored card data carries
    fines of $5,000-$100,000 per month from card brands.
  how_to_do_right: '1. Use a PCI-compliant payment processor (Stripe, Braintree) — never handle raw card data.

    2. If you must handle cards: use iframes/hosted fields so card data never touches your server.

    3. Store only the token returned by the payment processor, never the card number.

    4. Implement automated scanning for card number patterns (regex) in logs, databases, and code.

    5. Tokenize immediately at the point of capture — card data should exist in memory for milliseconds.

    6. Regular PCI ASV scans and penetration testing.

    '
