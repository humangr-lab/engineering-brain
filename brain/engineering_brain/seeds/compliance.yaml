    \ = Stripe('pk_live_...');\n#   const elements = stripe.elements();\n#   const card = elements.create('card');\n#   card.mount('#card-element');\n\
    # </script>\n\n# Server-side: only receives a token, never card data\n@app.post(\"/api/payments\")\nasync def create_payment(token:\
    \ str, amount: int, currency: str = \"usd\"):\n    charge = stripe.Charge.create(\n        amount=amount,\n        currency=currency,\n\
    \        source=token,  # token from Stripe.js — NOT a card number\n    )\n    # Store only the charge ID and last4 for\
    \ display\n    await db.execute(\n        \"INSERT INTO payments (stripe_charge_id, last4, amount) VALUES (:id, :last4,\
    \ :amt)\",\n        {\"id\": charge.id, \"last4\": charge.source.last4, \"amt\": amount},\n    )\n    return {\"payment_id\"\
    : charge.id, \"status\": charge.status}\n"
