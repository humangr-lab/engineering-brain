                "legal_basis": "standard_contractual_clauses",
                "dpa_date": "2025-01-15",
                "dpa_reference": "AWS-DPA-2025-001"
            },
            "analytics_provider": {
                "country": "US",
                "provider": "Mixpanel",
                "legal_basis": "explicit_consent",
                "consent_form_version": "v2.3"
            }
        }

        def validate_transfer(self, destination_key: str, user_id: str):
            transfer = self.TRANSFER_REGISTRY.get(destination_key)
            if not transfer:
                raise ComplianceError(f"Unregistered transfer destination: {destination_key}")
            if transfer["country"] not in self.ADEQUATE_COUNTRIES:
                if transfer.get("legal_basis") not in [
                    "standard_contractual_clauses", "explicit_consent", "bcr"
                ]:
                    raise ComplianceError(
                        f"No legal basis for transfer to {transfer['country']}"
                    )
  example_bad: |
    # Sending Brazilian user data to US analytics without legal basis
    import mixpanel
    mp = mixpanel.Mixpanel(MIXPANEL_TOKEN)  # US-based service

    async def track_user_event(user_id: str, event: str, properties: dict):
        # No consent check, no SCC, no legal basis assessment
        # Properties may include: email, CPF, phone, location
        mp.track(user_id, event, {**properties, "email": user.email})
        # Violates LGPD Art. 33 — transfer to US without legal basis
