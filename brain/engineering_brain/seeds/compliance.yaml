    class CFTCComplianceChecker:
        """Enforce CFTC position limits and reporting thresholds."""

        REPORTABLE_POSITION_LIMIT = Decimal("25")  # Contracts above this require reporting

        async def check_position_limits(self, trader_id: str, market_id: str,
                                       new_position_size: Decimal):
            current = await get_net_position(trader_id, market_id)
            new_total = current + new_position_size

            # CFTC position limits per Rule 150.2
            limit = await get_position_limit(market_id)
            if abs(new_total) > limit:
                raise PositionLimitExceededError(
                    f"CFTC position limit exceeded: {new_total} > {limit}"
                )

            if abs(new_total) >= self.REPORTABLE_POSITION_LIMIT:
                await self.queue_large_trader_report(trader_id, market_id, new_total)

        async def queue_large_trader_report(self, trader_id: str, market_id: str,
                                           position: Decimal):
            await db.insert("cftc_large_trader_queue", {
                "trader_id": trader_id, "market_id": market_id,
                "position": position, "report_date": date.today(),
                "status": "pending"
            })
