- id: CR-PCI-002
  text: Isolate the cardholder data environment (CDE) with network segmentation
  why: PCI DSS Requirement 1 mandates network segmentation to reduce the scope of PCI compliance. Without segmentation, your
    ENTIRE network is in scope for PCI audits, vulnerability scans, and controls. Proper segmentation reduces audit scope
    by 80-90% and dramatically lowers compliance cost.
  how_to_do_right: '1. Define the CDE boundary — only systems that process, store, or transmit cardholder data.

    2. Place CDE in a dedicated VPC/VLAN with firewall rules allowing only necessary traffic.

    3. No direct internet access from the CDE — use a DMZ with proxy for external calls.

    4. All traffic in/out of CDE passes through a firewall with explicit allow rules (deny all default).

    5. Quarterly penetration testing to verify segmentation effectiveness.

    6. Document all network flows in and out of CDE with business justification.

    '
