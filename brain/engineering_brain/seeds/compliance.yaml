layer: rules
technology: General
domain: compliance
knowledge:
- id: CR-GDPR-001
  text: Collect only the personal data strictly necessary for the stated purpose (data minimization)
  why: Over-collection creates liability surface — every extra field is a breach vector, a storage cost, and a regulatory
    fine risk. GDPR Art. 5(1)(c) mandates data minimization; violations carry fines up to 4% of global annual turnover.
  how_to_do_right: '1. Before adding any PII field, document the lawful basis and specific purpose.

    2. Default form fields to optional; require only what the feature cannot function without.

    3. Audit existing tables quarterly — drop columns no longer serving a documented purpose.

    4. Implement TTL/retention policies so data self-expires when the purpose is fulfilled.

    5. Use schema validation to reject unexpected PII at the API boundary.

    '
  severity: critical
  technologies:
    lang: [python, javascript]
    framework: [django, fastapi]
    platform: [postgresql]
  domains:
    domain: [compliance, security, architecture]
    concern: [data, engineering]
  example_good: "# Only collect what the feature needs\nclass NewsletterSignup(BaseModel):\n    email: EmailStr  # required\
    \ — delivery mechanism\n    # No name, phone, address — not needed for newsletter\n\n@app.post(\"/newsletter\")\nasync\
    \ def subscribe(data: NewsletterSignup):\n    await store_subscription(email=data.email, purpose=\"newsletter\")\n"
  example_bad: "# Collecting everything \"just in case\"\nclass NewsletterSignup(BaseModel):\n    email: str\n    full_name:\
    \ str        # not needed for newsletter\n    phone: str            # not needed for newsletter\n    date_of_birth: str\
    \    # not needed for newsletter\n    address: str          # not needed for newsletter\n"
  when_applies: Any project using Python codebases, JavaScript/TypeScript projects, PostgreSQL databases, or Django projects
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities
  sources: ["https://gdpr.eu/article-5-how-to-process-personal-data/"]
- id: CR-GDPR-002
  text: Implement right to erasure with cascade deletion across all systems storing user data
  why: GDPR Art. 17 gives users the right to have their data deleted. Partial deletion — leaving orphaned records in caches,
    logs, backups, or third-party systems — is a compliance violation and creates ghost data that can resurface in breaches.
  how_to_do_right: '1. Maintain a data map: every system, table, cache, and third-party that stores user PII.

    2. Implement a single erasure endpoint that triggers cascade deletion across all mapped stores.

    3. For backups, implement crypto-shredding: encrypt user data with a per-user key, delete the key on erasure.

    4. Replace deleted user references with anonymized tombstones (e.g., "deleted_user_abc123").

    5. Log the erasure event itself (without PII) for audit trail.

    6. Test erasure end-to-end monthly with synthetic users.

    '
  severity: critical
  technologies:
    platform: [postgresql, redis, elasticsearch, aws, s3]
  domains:
    domain: [compliance, architecture, security]
    concern: [data, engineering]
  example_good: "async def erase_user(user_id: str) -> ErasureReceipt:\n    \"\"\"GDPR Art. 17 — cascade delete across all\
    \ stores.\"\"\"\n    stores_deleted = []\n    # 1. Primary database\n    await db.execute(\"DELETE FROM users WHERE id\
    \ = :id\", {\"id\": user_id})\n    stores_deleted.append(\"postgres:users\")\n    # 2. Search index\n    await es_client.delete_by_query(index=\"\
    users\", body={\"query\": {\"term\": {\"user_id\": user_id}}})\n    stores_deleted.append(\"elasticsearch:users\")\n \
    \   # 3. Cache\n    await redis.delete(f\"user:{user_id}\", f\"session:{user_id}\")\n    stores_deleted.append(\"redis:user_cache\"\
    )\n    # 4. Object storage\n    await s3.delete_objects(Bucket=\"avatars\", Delete={\"Objects\": [{\"Key\": f\"{user_id}/\"\
    }]})\n    stores_deleted.append(\"s3:avatars\")\n    # 5. Audit log (no PII)\n    await audit_log.record(\"user_erased\"\
    , {\"user_id_hash\": hash(user_id), \"stores\": stores_deleted})\n    return ErasureReceipt(stores=stores_deleted, timestamp=utcnow())\n"
  example_bad: "async def delete_user(user_id: str):\n    # Only deletes from primary DB — data remains in cache, search,\
    \ backups\n    await db.execute(\"DELETE FROM users WHERE id = :id\", {\"id\": user_id})\n    return {\"status\": \"deleted\"\
    }\n    # Redis cache still has user session\n    # Elasticsearch still has user profile\n    # S3 still has user avatar\n\
    \    # No audit trail of deletion\n"
  when_applies: Any project using PostgreSQL databases, Redis cache/pub-sub systems, Elasticsearch search clusters, or AWS
    S3 object storage
  sources: ["https://gdpr.eu/article-17-right-to-be-forgotten/"]
- id: CR-GDPR-003
  text: Consent must be explicit opt-in — never pre-checked boxes, never bundled with terms of service
  why: GDPR Art. 7 requires freely given, specific, informed, and unambiguous consent. Pre-checked boxes, consent buried in
    ToS, or 'by continuing you agree' patterns are invalid consent. Regulators have issued multi-million euro fines for dark-pattern
    consent (e.g., Google 50M EUR fine by CNIL).
  how_to_do_right: '1. Each processing purpose gets its own separate checkbox, unchecked by default.

    2. Consent text must be plain language, specific, and separate from terms of service.

    3. Store consent records: what was consented, when, which version of text, IP, user agent.

    4. Provide equally easy withdraw mechanism — same number of clicks as granting consent.

    5. Re-consent when purpose changes or after significant time periods.

    '
  severity: critical
  technologies:
    lang: [javascript, html]
    framework: [frontend, react]
  domains:
    domain: [compliance, architecture]
    concern: [frontend]
  example_good: "{/* Each purpose is a separate, unchecked checkbox */}\n<form onSubmit={handleConsent}>\n  <label>\n    <input\
    \ type=\"checkbox\" name=\"marketing_email\" defaultChecked={false} />\n    I agree to receive marketing emails about\
    \ new features\n  </label>\n  <label>\n    <input type=\"checkbox\" name=\"analytics\" defaultChecked={false} />\n   \
    \ I agree to analytics tracking to improve user experience\n  </label>\n  <label>\n    <input type=\"checkbox\" name=\"\
    third_party\" defaultChecked={false} />\n    I agree to share my data with partner companies\n  </label>\n  <button type=\"\
    submit\">Save preferences</button>\n</form>\n"
  example_bad: "{/* Pre-checked, bundled, no granularity */}\n<form>\n  <label>\n    <input type=\"checkbox\" defaultChecked={true}\
    \ />\n    I agree to the Terms of Service, Privacy Policy, marketing\n    communications, analytics, and third-party data\
    \ sharing.\n  </label>\n  <p>By continuing, you consent to all data processing.</p>\n</form>\n"
  when_applies: Any project using JavaScript/TypeScript projects, React component-based UIs, or HTML document structure
  when_not_applies: server-rendered pages, APIs, CLI tools
  sources: ["https://gdpr.eu/article-7-how-to-get-consent-to-collect-personal-data/"]
- id: CR-GDPR-004
  text: Provide data portability — users can export their data in a machine-readable format
  why: GDPR Art. 20 requires that users can receive their personal data in a structured, commonly used, machine-readable format.
    This enables switching between service providers and gives users control over their data.
  how_to_do_right: '1. Implement a data export endpoint that generates JSON or CSV of all user data.

    2. Include ALL personal data: profile, activity, preferences, uploaded content.

    3. Use a standard schema where possible (e.g., Schema.org, JSON-LD).

    4. Make export available via self-service in user settings, not just via support ticket.

    5. Generate export asynchronously for large datasets; notify user when ready.

    6. Ensure export includes data from all subsystems (same data map as erasure).

    '
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi, django]
    platform: [postgresql]
  domains:
    domain: [compliance, architecture]
    concern: [backend]
  example_good: "@app.post(\"/api/me/export\")\nasync def request_data_export(user: AuthenticatedUser):\n    \"\"\"GDPR Art.\
    \ 20 — data portability export.\"\"\"\n    job_id = await create_export_job(user.id)\n    # Async worker collects from\
    \ all stores\n    await export_queue.enqueue(ExportTask(\n        user_id=user.id,\n        job_id=job_id,\n        include=[\"\
    profile\", \"activity\", \"preferences\", \"uploads\", \"messages\"],\n        format=\"json\",\n        notify_email=user.email,\n\
    \    ))\n    return {\"job_id\": job_id, \"status\": \"processing\", \"estimated_minutes\": 30}\n\n# Export schema\n{\n\
    \  \"export_metadata\": {\"format\": \"json\", \"generated_at\": \"2026-01-15T10:00:00Z\", \"schema_version\": \"1.0\"\
    },\n  \"profile\": {\"email\": \"...\", \"name\": \"...\", \"created_at\": \"...\"},\n  \"activity\": [{\"action\": \"\
    login\", \"timestamp\": \"...\", \"ip\": \"...\"}],\n  \"preferences\": {\"theme\": \"dark\", \"notifications\": true}\n\
    }\n"
  example_bad: "@app.get(\"/api/me/data\")\nasync def get_my_data(user: AuthenticatedUser):\n    # Returns only partial data,\
    \ non-standard format, no async for large exports\n    row = await db.fetch_one(\"SELECT name, email FROM users WHERE\
    \ id = :id\", {\"id\": user.id})\n    return {\"name\": row[\"name\"], \"email\": row[\"email\"]}\n    # Missing: activity\
    \ logs, preferences, uploads, messages\n    # Missing: machine-readable format specification\n    # Missing: async handling\
    \ for large datasets\n"
  when_applies: Projects using Python codebases, FastAPI async web services, Django projects, or PostgreSQL databases
  sources: ["https://gdpr.eu/article-20-right-to-data-portability/"]
- id: CR-GDPR-005
  text: Encrypt PII at rest and in transit; pseudonymize data in analytics and non-production environments
  why: GDPR Art. 25 (privacy by design) and Art. 32 (security of processing) require appropriate technical measures. Encryption
    and pseudonymization are explicitly named as appropriate safeguards. Unencrypted PII in dev/staging databases is a common
    breach vector.
  how_to_do_right: '1. Encrypt all PII columns at the application level (not just disk encryption).

    2. Use envelope encryption: data encrypted with DEK, DEK encrypted with KEK in KMS.

    3. Pseudonymize PII in analytics pipelines — replace identifiers with consistent tokens.

    4. Staging/dev environments get synthetic data or pseudonymized production snapshots.

    5. TLS 1.2+ for all data in transit — no exceptions, no fallback to plaintext.

    6. Rotate encryption keys on a defined schedule (annually minimum).

    '
  severity: critical
  technologies:
    lang: [python]
    library: [aws kms]
    platform: [postgresql, vault]
  domains:
    domain: [compliance, security, architecture]
    concern: [data, engineering]
  example_good: "from cryptography.fernet import Fernet\nimport hashlib\n\nclass PiiEncryptor:\n    \"\"\"Application-level\
    \ PII encryption using envelope encryption.\"\"\"\n    def __init__(self, kms_client, key_id: str):\n        self._kms\
    \ = kms_client\n        self._key_id = key_id\n\n    async def encrypt_pii(self, plaintext: str) -> EncryptedField:\n\
    \        dek = await self._kms.generate_data_key(KeyId=self._key_id)\n        cipher = Fernet(dek[\"Plaintext\"])\n  \
    \      return EncryptedField(\n            ciphertext=cipher.encrypt(plaintext.encode()),\n            encrypted_dek=dek[\"\
    CiphertextBlob\"],\n        )\n\ndef pseudonymize_for_analytics(email: str, salt: str) -> str:\n    \"\"\"Consistent pseudonym\
    \ for analytics — not reversible without salt.\"\"\"\n    return hashlib.sha256(f\"{salt}:{email}\".encode()).hexdigest()[:16]\n"
  example_bad: "# PII stored in plaintext, dev database is a production copy\nclass User(Base):\n    __tablename__ = \"users\"\
    \n    email = Column(String)        # plaintext PII\n    ssn = Column(String)          # plaintext sensitive data\n  \
    \  phone = Column(String)        # plaintext PII\n\n# Dev database setup\n# pg_dump production | psql dev_database  <--\
    \ copies real PII to dev\n"
  when_applies: Any project using PostgreSQL databases, Python codebases, AWS KMS, or HashiCorp Vault
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities
  sources: ["https://gdpr.eu/article-25-data-protection-by-design/", "https://gdpr.eu/article-32-security-of-processing/"]
- id: CR-GDPR-006
  text: Notify supervisory authority within 72 hours of discovering a personal data breach
  why: GDPR Art. 33 requires notification to the supervisory authority without undue delay and within 72 hours of becoming
    aware of a breach. Late notification results in additional fines on top of the breach itself. This requires having detection,
    assessment, and notification processes ready before a breach occurs.
  how_to_do_right: '1. Deploy automated breach detection: anomalous data access patterns, bulk exports, failed auth spikes.

    2. Have a documented incident response runbook with roles, contacts, and escalation paths.

    3. Pre-draft notification templates for the supervisory authority (Art. 33) and data subjects (Art. 34).

    4. Maintain a breach register logging all incidents regardless of notification decision.

    5. Conduct tabletop breach exercises quarterly to verify the 72-hour timeline is achievable.

    6. Automate evidence collection: access logs, affected records count, data categories involved.

    '
  severity: critical
  technologies:
    lang: [python]
    library: [siem]
    platform: [cloudwatch, datadog]
  domains:
    domain: [compliance, security, operations]
  example_good: "class BreachDetector:\n    \"\"\"Automated breach detection with 72-hour notification workflow.\"\"\"\n \
    \   BULK_EXPORT_THRESHOLD = 1000  # records in 1 hour\n    FAILED_AUTH_THRESHOLD = 50    # failures in 5 minutes\n\n \
    \   async def check_anomalies(self):\n        exports = await self.count_exports(window_hours=1)\n        if exports >\
    \ self.BULK_EXPORT_THRESHOLD:\n            await self.trigger_breach_assessment(\n                type=\"bulk_export_anomaly\"\
    ,\n                evidence={\"export_count\": exports, \"window\": \"1h\"},\n                severity=\"high\",\n   \
    \         )\n\n    async def trigger_breach_assessment(self, type: str, evidence: dict, severity: str):\n        incident\
    \ = await IncidentRegister.create(\n            type=type, evidence=evidence, severity=severity,\n            detected_at=utcnow(),\n\
    \            notification_deadline=utcnow() + timedelta(hours=72),\n        )\n        await alert_incident_response_team(incident)\n\
    \        await start_72h_countdown_timer(incident)\n"
  example_bad: "# No automated detection, no runbook, no timeline tracking\ndef handle_breach():\n    print(\"We should probably\
    \ tell someone about this\")\n    # TODO: figure out who to contact\n    # TODO: figure out what data was affected\n \
    \   # No incident register\n    # No deadline tracking\n    # No evidence collection\n"
  when_applies: Any project using Python codebases, SIEM, CloudWatch, or Datadog
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities
  sources: ["https://gdpr.eu/article-33-notification-of-a-personal-data-breach/"]
- id: CR-SOC2-001
  text: Enforce least-privilege access controls with MFA for all systems containing customer data
  why: SOC 2 Trust Services Criteria CC6.1-CC6.3 require logical access controls. Over-privileged accounts are the primary
    vector for insider threats and credential compromise. MFA reduces credential-based attacks by 99.9% according to Microsoft
    research.
  how_to_do_right: '1. Default all new accounts to zero permissions — grant only what''s explicitly requested and approved.

    2. Implement RBAC with granular roles (not just admin/user).

    3. Require MFA for all human access — TOTP minimum, hardware keys preferred.

    4. Service accounts use short-lived tokens (not long-lived API keys).

    5. Review access quarterly — revoke unused permissions automatically after 90 days of inactivity.

    6. Log all privilege escalations and access grants for audit trail.

    '
  severity: critical
  technologies:
    library: [aws iam]
    platform: [okta, auth0, keycloak]
  domains:
    domain: [compliance, security, operations]
  example_good: "# IAM policy: least privilege for a deployment service account\n{\n  \"Version\": \"2012-10-17\",\n  \"Statement\"\
    : [\n    {\n      \"Effect\": \"Allow\",\n      \"Action\": [\n        \"ecs:UpdateService\",\n        \"ecs:DescribeServices\"\
    \n      ],\n      \"Resource\": \"arn:aws:ecs:us-east-1:123456:service/prod-cluster/my-service\",\n      \"Condition\"\
    : {\n        \"StringEquals\": {\"aws:RequestedRegion\": \"us-east-1\"},\n        \"IpAddress\": {\"aws:SourceIp\": \"\
    10.0.0.0/8\"}\n      }\n    }\n  ]\n}\n"
  example_bad: "# Over-privileged: full admin access, no conditions, no MFA\n{\n  \"Version\": \"2012-10-17\",\n  \"Statement\"\
    : [\n    {\n      \"Effect\": \"Allow\",\n      \"Action\": \"*\",\n      \"Resource\": \"*\"\n    }\n  ]\n}\n# Long-lived\
    \ API key stored in environment variable\n# No MFA requirement\n# No access review process\n"
  when_applies: Any project using AWS IAM, Okta, Auth0, or Keycloak
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities
  sources: ["https://us.aicpa.org/interestareas/frc/assuranceadvisoryservices/aaborserviceorganizations"]
- id: CR-SOC2-002
  text: Log all significant system events with who, what, when, and outcome for audit trail
  why: SOC 2 CC7.1-CC7.2 require monitoring of system components. Without comprehensive audit logging, you cannot detect breaches,
    investigate incidents, or demonstrate compliance during audits. Gaps in logging are automatic SOC 2 findings.
  how_to_do_right: '1. Log authentication events (success, failure, MFA challenge, token refresh).

    2. Log authorization events (access granted, denied, privilege escalation).

    3. Log data access events (read, create, update, delete of sensitive records).

    4. Log administrative events (config changes, user management, deployments).

    5. Include: timestamp (UTC), actor (user/service), action, resource, outcome, source IP.

    6. Ship logs to immutable storage (write-once) — actors cannot delete their own audit trail.

    7. Retain logs per policy (typically 1 year minimum for SOC 2).

    '
  severity: critical
  technologies:
    lang: [python]
    library: [elk stack]
    platform: [cloudwatch, datadog]
  domains:
    domain: [compliance, security, observability]
  example_good: "import structlog\n\naudit_log = structlog.get_logger(\"audit\")\n\nasync def update_user_role(actor: User,\
    \ target_user_id: str, new_role: str):\n    old_role = await get_user_role(target_user_id)\n    await db.execute(\n  \
    \      \"UPDATE users SET role = :role WHERE id = :id\",\n        {\"role\": new_role, \"id\": target_user_id},\n    )\n\
    \    audit_log.info(\n        \"user_role_updated\",\n        actor_id=actor.id,\n        actor_role=actor.role,\n   \
    \     target_user_id=target_user_id,\n        old_role=old_role,\n        new_role=new_role,\n        timestamp=utcnow().isoformat(),\n\
    \        source_ip=actor.source_ip,\n        outcome=\"success\",\n    )\n"
  example_bad: "async def update_user_role(user_id, new_role):\n    await db.execute(f\"UPDATE users SET role = '{new_role}'\
    \ WHERE id = '{user_id}'\")\n    # No audit log at all\n    # No record of who made the change\n    # No record of what\
    \ the old value was\n    # SQL injection vulnerability as bonus\n"
  when_applies: Any project using Python codebases, CloudWatch, Datadog, or ELK Stack
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities
  sources: ["https://us.aicpa.org/interestareas/frc/assuranceadvisoryservices/aaborserviceorganizations"]
- id: CR-SOC2-003
  text: All deployments must go through an approved change management process with rollback capability
  why: SOC 2 CC8.1 requires formal change management. Uncontrolled deployments are the leading cause of production incidents.
    Without rollback capability, bad deploys become extended outages. Auditors look for evidence of approval workflows and
    deployment records.
  how_to_do_right: '1. All changes require a pull request with at least one reviewer approval.

    2. CI pipeline runs automated tests, security scans, and lint checks before merge is allowed.

    3. Deployments are automated (no manual SSH + git pull) with versioned artifacts.

    4. Every deployment is recorded: who triggered, what version, when, which environment.

    5. Rollback is a single command or automated on health check failure.

    6. Hotfix process exists for emergencies but still requires post-facto review.

    '
  severity: high
  technologies:
    platform: [github_actions, argocd, kubernetes, terraform]
  domains:
    domain: [compliance, operations, devops]
  example_good: "# GitHub Actions deployment with approval gate and auto-rollback\nname: Deploy Production\non:\n  push:\n\
    \    branches: [main]\njobs:\n  deploy:\n    runs-on: ubuntu-latest\n    environment: production  # requires manual approval\n\
    \    steps:\n      - uses: actions/checkout@v4\n      - name: Run tests\n        run: pytest --tb=short\n      - name:\
    \ Build and push image\n        run: |\n          docker build -t app:${{ github.sha }} .\n          docker push registry/app:${{\
    \ github.sha }}\n      - name: Deploy with rollback\n        run: |\n          kubectl set image deployment/app app=registry/app:${{\
    \ github.sha }}\n          kubectl rollout status deployment/app --timeout=300s || \\\n            kubectl rollout undo\
    \ deployment/app\n"
  example_bad: '# Manual deployment with no audit trail, no rollback

    # Developer SSHs into production server:

    ssh prod-server

    cd /app

    git pull origin main

    pip install -r requirements.txt

    systemctl restart app

    # No approval process

    # No record of who deployed what

    # No automated rollback

    # No health check verification

    '
  when_applies: Projects using GitHub Actions, ArgoCD, Kubernetes-orchestrated deployments, or Terraform infrastructure as
    code
  when_not_applies: local development only, throwaway experiments
  sources: ["https://us.aicpa.org/interestareas/frc/assuranceadvisoryservices/aaborserviceorganizations"]
- id: CR-SOC2-004
  text: Encrypt all data at rest and in transit — no exceptions for internal services
  why: SOC 2 CC6.7 requires encryption for data in transit; CC6.1 implies encryption at rest for sensitive data. Internal
    network traffic is not safe — lateral movement after breach is the most common advanced attack pattern. 'It is internal'
    is not a valid reason to skip encryption.
  how_to_do_right: '1. TLS 1.2+ for all HTTP traffic — enforce via load balancer, reject plaintext.

    2. mTLS between internal services — zero trust, verify both client and server.

    3. Database connections use TLS — configure sslmode=require or verify-full.

    4. Encrypt sensitive columns at application level (not just disk encryption).

    5. S3/blob storage: enable server-side encryption with customer-managed keys.

    6. Rotate encryption keys annually; audit key access.

    '
  severity: critical
  technologies:
    library: [aws kms]
    platform: [tls, postgresql, nginx, service_mesh, istio]
  domains:
    domain: [compliance, security, infrastructure]
  example_good: "# PostgreSQL connection with TLS enforcement\nDATABASE_URL = \"postgresql://user:pass@host:5432/db?sslmode=verify-full&sslrootcert=/certs/ca.pem\"\
    \n\n# Nginx: enforce TLS, reject HTTP\nserver {\n    listen 443 ssl;\n    ssl_protocols TLSv1.2 TLSv1.3;\n    ssl_ciphers\
    \ HIGH:!aNULL:!MD5;\n    ssl_prefer_server_ciphers on;\n    add_header Strict-Transport-Security \"max-age=63072000; includeSubDomains\"\
    \ always;\n}\nserver {\n    listen 80;\n    return 301 https://$host$request_uri;  # redirect all HTTP to HTTPS\n}\n"
  example_bad: '# Plaintext database connection

    DATABASE_URL = "postgresql://user:pass@host:5432/db"  # no SSL


    # Internal API calls over HTTP

    response = requests.get("http://internal-service:8080/api/users")  # plaintext


    # S3 bucket without encryption

    s3.put_object(Bucket="sensitive-data", Key="file.csv", Body=data)

    # No server-side encryption configured

    '
  when_applies: Any project using TLS, AWS KMS, PostgreSQL databases, or Nginx reverse proxy/load balancer
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities
  sources: ["https://us.aicpa.org/interestareas/frc/assuranceadvisoryservices/aaborserviceorganizations"]
- id: CR-HIPAA-001
  text: Encrypt all Protected Health Information (PHI) at rest and in transit with NIST-approved algorithms
  why: HIPAA Security Rule (45 CFR 164.312) requires technical safeguards for ePHI. Unencrypted PHI in a breach triggers mandatory
    notification to every affected individual, HHS, and potentially media. Encryption is a 'safe harbor' — encrypted data
    that is breached does not require notification.
  how_to_do_right: '1. Use AES-256 for data at rest and TLS 1.2+ for data in transit.

    2. Encrypt PHI at the application level, not just disk/volume encryption.

    3. Use NIST-approved algorithms only (FIPS 140-2 validated modules in regulated environments).

    4. Separate encryption keys from encrypted data — use a dedicated KMS.

    5. Implement key rotation on a defined schedule.

    6. Document encryption in your security risk assessment.

    '
  severity: critical
  technologies:
    lang: [python]
    library: [aws kms, azure key vault]
    platform: [postgresql]
  domains:
    domain: [compliance, security]
    concern: [healthcare]
  example_good: "from cryptography.hazmat.primitives.ciphers.aead import AESGCM\nimport os\n\nclass PhiEncryptor:\n    \"\"\
    \"HIPAA-compliant PHI encryption using AES-256-GCM.\"\"\"\n    def __init__(self, kms_client):\n        self._kms = kms_client\n\
    \n    def encrypt_phi(self, plaintext: bytes, context: dict) -> EncryptedPhi:\n        # Generate unique DEK per record\
    \ via KMS\n        dek_response = self._kms.generate_data_key(KeySpec=\"AES_256\")\n        nonce = os.urandom(12)\n \
    \       aesgcm = AESGCM(dek_response[\"Plaintext\"])\n        ciphertext = aesgcm.encrypt(nonce, plaintext, associated_data=None)\n\
    \        return EncryptedPhi(\n            ciphertext=ciphertext,\n            nonce=nonce,\n            encrypted_dek=dek_response[\"\
    CiphertextBlob\"],\n            algorithm=\"AES-256-GCM\",\n        )\n"
