- id: CR-OWASP-001
  text: Use parameterized queries for ALL database operations — never concatenate user input into SQL
  why: SQL injection (OWASP A03:2021) remains one of the most exploited vulnerabilities. A single injection point can dump
    your entire database, modify data, or execute OS commands. Parameterized queries make injection structurally impossible
    regardless of input content.
  how_to_do_right: '1. Use parameterized queries or ORM methods for every database operation without exception.

    2. Never use string formatting, concatenation, or f-strings to build SQL.

    3. Use an ORM (SQLAlchemy, Django ORM) as the default; raw SQL only when ORM cannot express the query.

    4. For raw SQL, always use the database driver''s parameter binding (`:param` or `%s`).

    5. Add SQLi detection to SAST pipeline (Bandit, Semgrep).

    6. Input validation is defense-in-depth, not a replacement for parameterized queries.

    '
  severity: critical
  technologies:
    lang: [python]
    framework: [sqlalchemy, django]
    platform: [postgresql]
  domains:
    domain: [compliance, security, architecture]
    concern: [backend]
  example_good: "# SQLAlchemy ORM — injection impossible\nuser = session.query(User).filter(User.email == email_input).first()\n\
    \n# Raw SQL with parameter binding — injection impossible\nresult = await db.fetch_one(\n    \"SELECT * FROM users WHERE\
    \ email = :email AND status = :status\",\n    {\"email\": email_input, \"status\": \"active\"},\n)\n\n# Django ORM — injection\
    \ impossible\nusers = User.objects.filter(email=email_input, status=\"active\")\n"
  example_bad: '# String concatenation — CRITICAL injection vulnerability

    query = "SELECT * FROM users WHERE email = ''" + email_input + "''"

    result = await db.fetch_one(query)


    # f-string SQL — CRITICAL injection vulnerability

    query = f"SELECT * FROM users WHERE email = ''{email_input}'' AND status = ''active''"


    # Input: '' OR ''1''=''1'' --

    # Resulting query: SELECT * FROM users WHERE email = '''' OR ''1''=''1'' --'' AND status = ''active''

    # Returns ALL users

    '
  when_applies: Any project using Python codebases, SQLAlchemy ORM interactions, PostgreSQL databases, or Django projects
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities
  sources: ["https://cheatsheetseries.owasp.org/cheatsheets/Query_Parameterization_Cheat_Sheet.html"]
- id: CR-OWASP-002
  text: Implement deny-by-default access control — explicitly grant, never implicitly allow
  why: 'Broken access control (OWASP A01:2021) is the #1 web application security risk. Default-allow systems inevitably have
    gaps that attackers find. Every new endpoint, resource, or feature must explicitly declare its access requirements. Missing
    an authorization check on one endpoint can expose all user data.'
  how_to_do_right: '1. Framework-level middleware that denies all requests unless an explicit permission is declared.

    2. Every endpoint/route must declare required permissions (decorator or config).

    3. Check authorization on the server side — never rely on client-side checks.

    4. Verify resource ownership: user can only access their own resources (IDOR prevention).

    5. Test access control with automated negative tests: each role tries to access each endpoint.

    6. Log all authorization failures for monitoring.

    '
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi, django, backend, express]
  domains:
    domain: [compliance, security, architecture]
    concern: [backend]
  example_good: "from functools import wraps\n\ndef require_permission(permission: str):\n    \"\"\"Deny-by-default: endpoint\
    \ MUST declare required permission.\"\"\"\n    def decorator(func):\n        @wraps(func)\n        async def wrapper(request,\
    \ *args, **kwargs):\n            user = await get_authenticated_user(request)\n            if not user:\n            \
    \    raise HTTPException(401, \"Authentication required\")\n            if not user.has_permission(permission):\n    \
    \            audit_log.warning(\"access_denied\", user=user.id, permission=permission)\n                raise HTTPException(403,\
    \ \"Insufficient permissions\")\n            return await func(request, *args, user=user, **kwargs)\n        return wrapper\n\
    \    return decorator\n\n@app.get(\"/api/patients/{patient_id}\")\n@require_permission(\"patient:read\")\nasync def get_patient(patient_id:\
    \ str, user: User):\n    patient = await db.get_patient(patient_id)\n    if patient.organization_id != user.organization_id:\n\
    \        raise HTTPException(403, \"Cannot access patient from another organization\")\n    return patient\n"
