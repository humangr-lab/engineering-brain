            profile = await get_investor_profile(user_id)
            if profile.patrimonio_declarado >= self.PROFESSIONAL_THRESHOLD_BRL:
                return True
            if (profile.patrimonio_declarado >= self.QUALIFIED_THRESHOLD_BRL
