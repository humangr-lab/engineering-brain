- id: CR-COMP-CVM-001
  text: >
    Prediction market platforms targeting Brazilian investors must structure their
    products as derivatives or binary options under CVM supervision — CVM approved
    B3's first prediction market in 2025, restricting initial access to professional
    investors (patrimônio > R$10M or R$1M if certified).
  why: >
    Brazil's CVM authorized B3 to launch the first regulated prediction markets as
    financial securities in 2025, with initial trading limited to professional investors.
    Operators not registered as a bolsa (exchange), corretora, or operating under a
    specific CVM authorization face enforcement risk. CVM Instrução 461 governs
    organized markets. Platforms operating in grey areas (like political event markets)
    face regulatory uncertainty between CVM, BACEN, and COAF oversight. The Kalshi
    precedent in the US (CFTC ruling 2024) provides a model but Brazilian regulation
    is independent.
  how_to_do_right: |
    1. Determine your regulatory classification:
       - Exchange (bolsa): requires CVM registration as organized market operator
       - Broker-dealer (corretora): requires BACEN and CVM authorization
       - Event contracts: classification currently uncertain — seek legal opinion
    2. For B2B API access: partner with B3 or a licensed entity rather than direct retail
    3. Implement investor suitability: verify professional investor status (Resolução 30)
    4. Implement AML/KYC: COAF registration, customer due diligence per BACEN norms
    5. Data residency: Brazilian user financial data must be processable under LGPD
    6. Monitor CVM regulatory agenda 2025 for new prediction market rules
