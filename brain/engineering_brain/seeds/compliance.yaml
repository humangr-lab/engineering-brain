- id: CR-COMP-CFTC-001
  text: >
    US prediction market operators must register as Designated Contract Markets (DCMs)
    with the CFTC or operate under an exemption — the 2024 KalshiEX ruling (DC Circuit)
    confirmed that event contracts on political/economic events are regulated commodities,
    not gaming. The CFTC dropped its appeal in May 2025.
  why: >
    KalshiEX v. CFTC (No. 24-5205, D.C. Circuit, Oct 2024) was a landmark ruling:
    the DC Circuit declined to stay Kalshi's election contracts, allowing Kalshi to
    launch. The CFTC's position that event contracts constitute "gaming" was rejected.
    This established that political and economic event contracts are CFTC-regulated
    commodities. After the 2025 administration change, the CFTC withdrew its proposed
    rule restricting prediction markets. Operators not registered as DCMs or Swap
    Execution Facilities (SEFs) face CFTC enforcement for offering unregistered
    commodity futures. The Commodity Exchange Act (CEA) applies.
  how_to_do_right: |
    1. If offering US users contracts on event outcomes: seek CFTC DCM or SEF registration
    2. Consult legal counsel on "commodity" vs "security" classification for each contract type
    3. Implement CFTC reporting requirements:
       - Daily large trader reports (>reportable position limits)
       - Weekly Commitments of Traders (COT) for regulated markets
       - Suspicious Activity Reports (SARs) to FinCEN
    4. Implement position limits per CFTC Rule 150.2
    5. For non-US operations: verify local regulatory status (CVM Brazil, FCA UK, etc.)
    6. Monitor CFTC no-action letters for exemptions applicable to your structure
