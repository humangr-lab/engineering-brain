- id: CR-COMP-PM-005
  text: Implement real-time compliance monitoring for prediction market operations — suspicious trading patterns, wash trading,
    and market manipulation must be detected and reported.
  why: The CFTC and CVM require market operators to implement surveillance systems detecting market manipulation, wash trading
    (trading with yourself to create artificial volume), spoofing (placing orders with intent to cancel), and insider trading.
    Financial markets regulations (Dodd-Frank Act, CVM Instruction 461) mandate real-time monitoring with automated alerts.
    Failure to detect and report manipulation makes the platform operator liable — not just the manipulator. The CFTC has imposed
    penalties exceeding $100M on exchanges with inadequate surveillance.
  how_to_do_right: '1. Implement real-time trade surveillance detecting wash trading (same beneficiary on both sides).

    2. Monitor for spoofing patterns (large orders quickly cancelled, order-to-trade ratio > 10:1).

    3. Detect unusual volume spikes correlated with external events (potential insider trading).

    4. Track concentration risk — single participant holding > X% of open interest.

    5. Automated alerts to compliance officer with configurable thresholds.

    6. Maintain surveillance audit trail for regulatory examination.

    '
