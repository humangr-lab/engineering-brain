- id: CR-ISO27001-001
  text: Conduct formal risk assessment identifying, analyzing, and treating information security risks
  why: ISO 27001 Clause 6.1.2 requires a risk assessment process. Without systematic risk identification, security investments
    are based on guesswork — you over-invest in low-risk areas and under-invest in high-risk ones. Risk assessment is the
    foundation of the entire ISMS (Information Security Management System).
  how_to_do_right: '1. Identify assets: data, systems, people, processes that support business objectives.

    2. Identify threats and vulnerabilities for each asset.

    3. Assess likelihood and impact using a consistent scale (e.g., 1-5).

    4. Calculate risk score = likelihood x impact.

    5. For each risk, decide: treat (mitigate), transfer (insure), accept (document), or avoid.

    6. Document risk treatment plan with owners, deadlines, and acceptance criteria.

    7. Review and update the risk register at least annually or after significant changes.

    '
  severity: high
  technologies:
    lang: [general]
  domains:
    domain: [compliance, security, governance]
  example_good: "# Risk register entry (structured YAML for tooling)\nrisk_register:\n  - id: RISK-2026-042\n    asset: \"\
    Customer database (PostgreSQL)\"\n    threat: \"SQL injection via API endpoints\"\n    vulnerability: \"Legacy endpoints\
    \ using string concatenation\"\n    likelihood: 4  # high — public-facing, known pattern\n    impact: 5      # critical\
    \ — full database compromise\n    risk_score: 20  # 4 x 5\n    treatment: mitigate\n    controls:\n      - \"Migrate all\
    \ queries to parameterized (deadline: 2026-03-01)\"\n      - \"Deploy WAF rule for SQLi patterns (deadline: 2026-02-15)\"\
    \n      - \"Add Semgrep SQLi rule to CI (deadline: 2026-02-10)\"\n    owner: \"security-team\"\n    review_date: \"2026-06-01\"\
    \n    residual_risk: 4  # 2 x 2 after controls\n    accepted_by: \"CISO\"\n"
  example_bad: '# No risk assessment — security decisions based on "gut feeling"

    # "We should probably encrypt something"

    # "Let''s buy a WAF because competitors have one"

    # No documentation of what risks exist

    # No prioritization of security investments

    # No review cycle

    # Auditor finding: "No evidence of risk assessment process"

    '
  when_applies: Projects using General
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities. projects
    not using General
  sources: ["https://www.iso.org/standard/27001"]
- id: CR-COMP-PM-001
  text: Prediction markets are regulated as event contracts by the CFTC in the US and as derivative instruments by the CVM in
    Brazil — operating without proper classification triggers enforcement action.
  why: The CFTC regulates binary event contracts under the Commodity Exchange Act (CEA). Kalshi obtained the first CFTC-regulated
    exchange designation for event contracts in 2020. Polymarket, operating offshore, faced a $1.4M CFTC settlement in 2022 for
    offering unregistered binary options to US persons. In Brazil, the CVM (Comissão de Valores Mobiliários) classifies prediction
    market contracts as derivatives under CVM Resolution 135, requiring registration and disclosure. Operating without proper
    regulatory classification means every transaction is potentially an illegal unregistered securities offering.
  how_to_do_right: '1. Classify each market contract type (binary, scalar, combinatorial) under the applicable regulatory framework.

    2. In the US, determine if the contract falls under CFTC jurisdiction (commodity-linked events) or SEC jurisdiction (security-linked
    events).

    3. In Brazil, file with the CVM if the contract meets the derivative instrument definition under CVM Resolution 135.

    4. Maintain a regulatory classification register mapping each contract type to its jurisdictional treatment.

    5. Engage regulatory counsel before launching any new contract type.

    6. Implement geo-blocking for jurisdictions where the contract type is prohibited.

    '
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi, django]
  domains:
    domain: [compliance, legal, fintech]
    concern: [regulation, markets]
  example_good: "# Contract classification registry\nclass ContractClassification(BaseModel):\n    contract_type: str  # binary,\
    \ scalar, combinatorial\n    jurisdiction: str  # US, BR, EU\n    regulator: str  # CFTC, CVM, ESMA\n    classification:\
    \ str  # event_contract, derivative, swap\n    registration_status: str  # registered, exempt, pending\n    legal_basis:\
    \ str  # CEA Section 5c, CVM Res 135\n    geo_restrictions: list[str]  # blocked jurisdictions\n\nCONTRACT_REGISTRY = {\n\
    \    \"binary_political\": ContractClassification(\n        contract_type=\"binary\",\n        jurisdiction=\"US\",\n    \
    \    regulator=\"CFTC\",\n        classification=\"event_contract\",\n        registration_status=\"registered\",\n      \
    \  legal_basis=\"CEA Section 5c(c)(5)(C)\",\n        geo_restrictions=[\"US_SANCTIONED_COUNTRIES\"],\n    ),\n}\n"
  example_bad: "# No classification — operating without regulatory framework\n@app.post(\"/markets/create\")\nasync def create_market(title:\
    \ str, description: str):\n    market = Market(title=title, description=description)\n    await db.save(market)\n    return\
    \ market\n    # No jurisdiction check\n    # No contract classification\n    # No geo-blocking\n    # Every market is potentially\
    \ an illegal unregistered offering\n"
  when_applies: Any project operating prediction markets, event contracts, or binary options platforms
  when_not_applies: purely internal tools, non-financial applications
  sources: ["https://www.cftc.gov/IndustryOversight/ContractMarkets/index.htm", "https://www.gov.br/cvm/pt-br"]
- id: CR-COMP-PM-002
  text: Event contracts must be classified as either permitted or prohibited categories — the CFTC prohibits contracts on terrorism,
    assassination, war, and certain election outcomes involving named candidates in some contexts.
  why: The CFTC Designated Contract Market (DCM) rules prohibit event contracts involving terrorism, assassination, war, gaming
    (unless state-regulated), and certain election contracts. The CFTC denied Kalshi's congressional election control contracts
    in 2023 before a court ruling reversed the decision. The regulatory landscape is actively shifting. Even in jurisdictions
    where election markets are permitted, contracts on individual candidate outcomes may face different treatment than party control
    outcomes. Operating prohibited contract types carries criminal liability, not just civil penalties.
  how_to_do_right: '1. Maintain a prohibited categories list per jurisdiction, updated quarterly.

    2. Implement automated screening of new market proposals against prohibited categories.

    3. Use NLP classification to detect prohibited topics in user-submitted market descriptions.

    4. Flag ambiguous cases for manual legal review before market creation.

    5. Log all classification decisions with reasoning for audit trail.

    6. Monitor regulatory updates — the CFTC, CVM, and ESMA publish guidance regularly.

    '
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [compliance, legal, fintech]
    concern: [regulation, markets, content_moderation]
  example_good: "PROHIBITED_CATEGORIES = {\n    \"US\": [\n        \"terrorism\", \"assassination\", \"war_declaration\",\n   \
    \     \"biological_weapon\", \"nuclear_attack\",\n        # Note: election contracts are evolving — check CFTC guidance\n\
    \    ],\n    \"BR\": [\n        \"terrorism\", \"assassination\", \"gambling_unlicensed\",\n        \"public_order_disruption\"\
    ,\n    ],\n}\n\nasync def screen_market_proposal(title: str, description: str, jurisdiction: str) -> ScreeningResult:\n \
    \   prohibited = PROHIBITED_CATEGORIES.get(jurisdiction, [])\n    # NLP classification against prohibited categories\n  \
    \  classification = await classify_content(f\"{title} {description}\", prohibited)\n    if classification.is_prohibited:\n\
    \        return ScreeningResult(\n            approved=False,\n            reason=f\"Prohibited category: {classification.category}\"\
    ,\n            requires_legal_review=True,\n        )\n    if classification.confidence < 0.95:\n        return ScreeningResult(\n\
    \            approved=False,\n            reason=\"Ambiguous classification — requires legal review\",\n            requires_legal_review=True,\n\
    \        )\n    return ScreeningResult(approved=True, reason=\"Passed automated screening\")\n"
  example_bad: "# No content screening — any market can be created\n@app.post(\"/markets/create\")\nasync def create_market(proposal:\
    \ MarketProposal):\n    return await db.save(Market(**proposal.dict()))\n    # User creates \"Will [person] be assassinated\
    \ by December?\" — no screening\n    # Immediate CFTC enforcement action + criminal referral\n"
  when_applies: Any project operating prediction markets or event contracts
  when_not_applies: non-financial applications, internal tools
  sources: ["https://www.cftc.gov/PressRoom/PressReleases/8853-24"]
- id: CR-COMP-PM-003
  text: Information markets may qualify for regulatory exemptions (no-action letters, research exemptions) — but exemptions have
    strict conditions on market size, participant eligibility, and purpose.
  why: The CFTC has historically issued no-action letters to academic prediction markets (e.g., Iowa Electronic Markets since
    1993) allowing operation under strict conditions — small position limits ($500-$850), academic research purpose, limited
    participants. These exemptions demonstrate that regulators recognize the information value of prediction markets while wanting
    to prevent gambling-scale operations. Exceeding exemption conditions (larger positions, commercial purpose, unrestricted
    access) voids the exemption and triggers full regulatory requirements. Understanding available exemptions can save months
    of registration process for qualifying operations.
  how_to_do_right: '1. Research available exemptions in each target jurisdiction before pursuing full registration.

    2. For academic/research markets, apply for CFTC no-action relief with documented research purpose.

    3. Implement hard position limits matching exemption conditions (e.g., $500 max per participant).

    4. Restrict participant eligibility per exemption requirements (e.g., accredited investors only).

    5. Maintain documentation proving ongoing compliance with exemption conditions.

    6. Plan a path from exemption to full registration as the market grows beyond exemption limits.

    '
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
