- id: CR-COMP-RET-001
  text: >
    Implement 7-year financial log retention with crypto-shredding for LGPD compliance —
    financial records must be retained for audit purposes while simultaneously enabling
    the right to erasure for personal data embedded in those records.
  why: >
    Brazilian financial regulations (Lei 9.613/1998 AML, CVM Instrução 461) require
    financial records retention for minimum 5-7 years. LGPD simultaneously grants
    users the right to erasure (Art. 18). These rights conflict for financial records
    containing PII. Crypto-shredding resolves this: encrypt each user's data with a
    per-user key, store the encrypted data (retaining the financial record), and delete
    the encryption key on erasure request. The financial record persists but becomes
    cryptographically irreversible — satisfying both retention and erasure requirements.
  how_to_do_right: |
    1. Generate a unique AES-256 key per user at account creation
    2. Encrypt all PII fields in financial records with this key
    3. Store the encrypted financial record (non-PII fields remain plaintext)
    4. Store the user key in a key management service (AWS KMS, HashiCorp Vault)
    5. On erasure request: delete the user key from KMS (NOT the record)
    6. The record becomes permanently unreadable — financial record preserved for audit
    7. Document the retention schedule: 7 years minimum for AML, 5 years for tax
    8. Implement key rotation annually (re-encrypt with new key)
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
    platform: [postgresql, aws]
    library: [cryptography, boto3]
  domains:
    domain: [compliance, security, fintech]
    concern: [lgpd, data_retention, crypto_shredding]
  example_good: |
    from cryptography.fernet import Fernet
    import boto3

    class UserDataEncryption:
        def __init__(self):
            self.kms = boto3.client('kms', region_name='us-east-1')

        def get_or_create_user_key(self, user_id: str) -> bytes:
            """Get per-user encryption key from KMS."""
            key_alias = f"alias/user-data/{user_id}"
            try:
                response = self.kms.describe_key(KeyId=key_alias)
                return response['KeyMetadata']['KeyId'].encode()
            except self.kms.exceptions.NotFoundException:
                response = self.kms.create_key(
                    Description=f"User data key for {user_id}",
                    Tags=[{'TagKey': 'user_id', 'TagValue': user_id}]
                )
                self.kms.create_alias(
                    AliasName=key_alias,
                    TargetKeyId=response['KeyMetadata']['KeyId']
                )
                return response['KeyMetadata']['KeyId'].encode()

        def encrypt_pii(self, user_id: str, data: str) -> str:
            key_id = self.get_or_create_user_key(user_id)
            response = self.kms.generate_data_key(KeyId=key_id, KeySpec='AES_256')
            f = Fernet(base64.urlsafe_b64encode(response['Plaintext'][:32]))
            return f.encrypt(data.encode()).decode()

        def erase_user(self, user_id: str):
            """LGPD erasure: delete key, records become unreadable."""
            key_alias = f"alias/user-data/{user_id}"
            self.kms.schedule_key_deletion(
                KeyId=key_alias, PendingWindowInDays=7
            )
            # Financial records persist but PII is permanently unreadable
  example_bad: |
    # Storing PII in plaintext — cannot satisfy both retention and erasure
    async def record_trade(user_id: str, trade: Trade):
        await db.execute("""
            INSERT INTO trade_records (user_id, user_name, user_cpf, amount, market)
            VALUES ($1, $2, $3, $4, $5)
