- id: CR-COMP-PM-004
  text: Cross-border prediction market operations must handle conflicting regulatory regimes — a contract legal in one jurisdiction
    may be prohibited in another, requiring geo-fencing and participant verification.
  why: Prediction market regulation varies dramatically across jurisdictions. The US (CFTC) requires exchange registration,
    the EU (MiFID II) treats them as financial instruments, Brazil (CVM) classifies them as derivatives, and some jurisdictions
    (e.g., India) prohibit them entirely. A platform accessible from multiple countries faces simultaneous compliance with conflicting
    rules. Polymarket's $1.4M CFTC fine came from serving US persons without registration — even though the platform operated
    from outside the US. Simply blocking IP addresses is insufficient; regulators expect KYC-level verification of participant
    jurisdiction.
  how_to_do_right: '1. Implement KYC verification that confirms participant jurisdiction (not just IP-based geo-blocking).

    2. Maintain a jurisdiction-market matrix mapping which contracts are available in which jurisdictions.

    3. Block market access at the smart contract or order matching level, not just the UI.

    4. Use IP geo-blocking as first line of defense, KYC as second, and transaction monitoring as third.

    5. Document the regulatory basis for each jurisdiction determination.

    6. Monitor regulatory changes in all served jurisdictions quarterly.

    '
