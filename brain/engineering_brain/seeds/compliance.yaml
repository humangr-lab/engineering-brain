- id: CR-COMP-LGPD-XBORDER-001
  text: >
    Cross-border data transfers of Brazilian user data are regulated by LGPD Articles
    33-36 — transfers are only permitted to countries with adequate protection OR with
    explicit user consent OR under standard contractual clauses. Never transfer
    Brazilian user PII to a third country without a legal basis.
  why: >
    LGPD Art. 33 prohibits transferring personal data to countries that do not provide
    an adequate level of protection unless an exception applies. The ANPD (Autoridade
    Nacional de Proteção de Dados) has published a list of adequate countries. The
    US is NOT on the adequate list — transfers to US processors require a legal basis
    (Art. 33, II: consent; Art. 33, V: standard contractual clauses per ANPD).
    Violations: fines up to 2% of Brazilian revenue, capped at R$50M per violation.
    A fintech using a US-based analytics provider without SCCs faces LGPD liability.
  how_to_do_right: |
    1. Map all data flows: Brazilian user data → what countries/processors?
    2. For each destination country: check ANPD adequacy list
       (Current adequate: EU/EEA under GDPR, UK, Argentina, Uruguay — not US)
    3. For inadequate countries: implement a legal basis:
       a. Art. 33, II: explicit, informed consent for each specific transfer
       b. Art. 33, V: standard contractual clauses (ANPD templates when published)
       c. Art. 33, IX: BCR (Binding Corporate Rules) for intra-group transfers
    4. For US cloud providers (AWS, GCP, Azure): execute DPAs with SCCs
    5. Document the legal basis for each cross-border transfer in your Records of Processing
    6. Review third-party vendors: analytics, support tools, AI providers
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi, django]
    platform: [postgresql, aws]
