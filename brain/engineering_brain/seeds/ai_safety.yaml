  example_good: "from enum import Enum\n\nclass RiskLevel(Enum):\n    LOW = \"low\"         # Auto-approve\n    MEDIUM = \"\
    medium\"   # Sample review\n    HIGH = \"high\"       # Mandatory review\n\nclass HumanInTheLoop:\n    RISK_THRESHOLDS\
    \ = {\n        \"product_recommendation\": RiskLevel.LOW,\n        \"customer_complaint_response\": RiskLevel.MEDIUM,\n\
    \        \"loan_decision\": RiskLevel.HIGH,\n        \"medical_recommendation\": RiskLevel.HIGH,\n        \"legal_advice\"\
    : RiskLevel.HIGH,\n    }\n\n    async def process(self, task_type: str, ai_output: str, confidence: float) -> dict:\n\
    \        risk = self.RISK_THRESHOLDS.get(task_type, RiskLevel.HIGH)\n\n        # Override: low confidence always goes\
    \ to human review\n        if confidence < 0.7:\n            risk = RiskLevel.HIGH\n\n        if risk == RiskLevel.LOW:\n\
    \            return {\"output\": ai_output, \"reviewed_by\": \"auto\", \"status\": \"approved\"}\n\n        if risk ==\
    \ RiskLevel.MEDIUM:\n            # Sample 20% for review\n            if random.random() < 0.2:\n                return\
    \ await self._queue_for_review(task_type, ai_output)\n            return {\"output\": ai_output, \"reviewed_by\": \"auto\"\
    , \"status\": \"approved\"}\n\n        if risk == RiskLevel.HIGH:\n            # Mandatory human review — NEVER auto-approve\n\
    \            return await self._queue_for_review(task_type, ai_output)\n\n    async def _queue_for_review(self, task_type:\
    \ str, ai_output: str) -> dict:\n        review_id = await self.review_queue.submit({\n            \"task_type\": task_type,\n\
    \            \"ai_draft\": ai_output,\n            \"submitted_at\": datetime.utcnow().isoformat(),\n            \"status\"\
    : \"pending_review\",\n        })\n        return {\"review_id\": review_id, \"status\": \"pending_human_review\",\n \
    \               \"message\": \"Your request is being reviewed by a specialist.\"}\n"
