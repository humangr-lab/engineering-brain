    \ 100ms\n    products = requests.get(f\"/api/products/{order.sku}\")    # blocks 150ms\n    shipping = requests.get(f\"\
    /api/shipping/{order.address}\")# blocks 80ms\n    # Total: 330ms (sequential), and worse: event loop blocked for 330ms\n\
    \    # During this time, NO other requests can be processed\n    # Under 100 concurrent requests: all queue → timeout\
    \ → 502 errors\n"
