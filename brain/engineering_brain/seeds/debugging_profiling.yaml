layer: rules
technology: General
domain: code_quality
knowledge:
- id: CR-DBG-001
  text: Apply the scientific method to debugging — form a hypothesis, design an experiment, verify the result
  why: 'Random debugging (''let me try changing this and see if it works'') wastes hours and often introduces new bugs. The
    scientific method forces structured thinking: observe symptoms, form a hypothesis about the root cause, design a minimal
    test to verify, and confirm the fix addresses the root cause. This method finds root causes in minutes instead of hours.'
  how_to_do_right: '1. OBSERVE: Document the exact symptoms. What is the input? What is the expected output? What is the actual
    output?

    2. HYPOTHESIZE: Based on symptoms, what is the most likely root cause? Write it down explicitly.

    3. PREDICT: If the hypothesis is correct, what specific test should pass/fail?

    4. EXPERIMENT: Run the minimal test that confirms or refutes the hypothesis.

    5. If refuted: form a new hypothesis based on the new evidence. Do not guess randomly.

    6. If confirmed: write a regression test, apply the fix, verify the test passes.

    '
  severity: high
  technologies:
    lang: [general]
  domains:
    domain: [quality, testing]
    concern: [code]
  example_good: "# Bug: \"Cart total shows $0 for some users\"\n\n# 1. OBSERVE\n# - Affects ~3% of checkout sessions\n# -\
    \ Started after January promo launch\n# - Only happens when cart contains promotional items\n# - Cart items display correctly,\
    \ only total is wrong\n\n# 2. HYPOTHESIZE\n# \"Promotional items have null price (free items), and sum() propagates null\"\
    \n\n# 3. PREDICT\n# \"If I create a cart with one normal item ($10) and one promo item (null price),\n#  the total should\
    \ be $10 but will be $0 or NaN\"\n\n# 4. EXPERIMENT\ndef test_cart_with_null_price_item():\n    cart = Cart(items=[\n\
    \        CartItem(sku=\"NORMAL-001\", price=Decimal(\"10.00\"), qty=1),\n        CartItem(sku=\"PROMO-001\", price=None,\
    \ qty=1),  # free promo item\n    ])\n    assert cart.total == Decimal(\"10.00\")  # FAILS with TypeError: unsupported\
    \ operand type(s) for *: 'NoneType' and 'int'\n\n# 5. ROOT CAUSE CONFIRMED: None * qty raises TypeError, caught by generic\
    \ except → returns 0\n# 6. FIX: Coalesce null price to Decimal(\"0\") in CartItem model\n"
  example_bad: '# Bug: "Cart total shows $0 for some users"


    # Random debugging:

    # "Maybe it''s a caching issue" → clear all caches → still broken

    # "Maybe it''s a frontend bug" → check React components → look fine

    # "Let me add some print statements" → print(cart) → looks correct

    # "Maybe the database is slow" → check query time → it''s fast

    # "Let me restart the server" → restart → still broken

    # ... 3 hours later, still guessing ...

    # Never formed a hypothesis, never designed a targeted test

    '
  when_applies: Projects using General
  when_not_applies: exploratory prototypes, one-off scripts, or spike investigations. projects not using General
  sources: ["https://en.wikipedia.org/wiki/Scientific_method"]
- id: CR-DBG-002
  text: Use binary search (bisect) to narrow the problem space — halve the search area with each test
  why: 'When you do not know where a bug is, testing random locations is O(n). Binary search is O(log n) — for a 1000-line
    function, that is 10 tests instead of 1000. This applies to: finding the breaking commit (git bisect), finding the failing
    line (insert breakpoint at midpoint), or finding the bad input in a dataset (split in half).'
  how_to_do_right: '1. Define the boundaries: the bug exists BETWEEN point A (known good) and point B (known bad).

    2. Test the midpoint: does the bug exist at the halfway point?

    3. If YES: bug is in the first half. Move B to midpoint. Repeat.

    4. If NO: bug is in the second half. Move A to midpoint. Repeat.

    5. Continue until the problem space is a single commit, line, or data point.

    6. Works for: git bisect (commits), debugging (code lines), data (input rows).

    '
  severity: high
  technologies:
    lang: [general]
    platform: [git]
  domains:
    domain: [quality]
    concern: [code]
  example_good: "# Bug: Processing 10,000 records fails somewhere in the batch\n# Binary search to find the bad record\n\n\
    def find_bad_record(records: list) -> int:\n    \"\"\"Binary search for the record that causes processing to fail.\"\"\
    \"\n    low, high = 0, len(records) - 1\n\n    while low < high:\n        mid = (low + high) // 2\n        try:\n    \
    \        process_batch(records[low:mid + 1])\n            low = mid + 1  # first half works, problem is in second half\n\
    \        except ProcessingError:\n            high = mid      # first half fails, problem is in first half\n\n    return\
    \ low  # this is the bad record\n\nbad_index = find_bad_record(records)\nprint(f\"Bad record at index {bad_index}: {records[bad_index]}\"\
    )\n# Found the problematic record in 14 tests (log2(10000)) instead of 10000\n\n# Same principle with git bisect:\ngit\
    \ bisect start\ngit bisect bad HEAD\ngit bisect good v1.0.0\ngit bisect run pytest tests/test_cart.py -x\n# Finds breaking\
    \ commit in ~10 steps across 1000 commits\n"
  example_bad: "# Linear search: test each record one by one\nfor i, record in enumerate(records):  # 10,000 iterations\n\
    \    try:\n        process_single(record)\n    except Exception:\n        print(f\"Bad record at {i}\")\n        break\n\
    # Takes 10,000 tests in worst case\n# If processing is slow (1 sec/record), this takes 2.7 hours\n# Binary search: 14\
    \ tests × 1 sec = 14 seconds\n"
  when_applies: Projects using General or Git
  when_not_applies: projects not using General or Git
  sources: ["https://git-scm.com/docs/git-bisect"]
- id: CR-DBG-003
  text: Create a minimal reproduction case before attempting a fix — the smallest input that triggers the bug
  why: Debugging in the full application context is noisy — hundreds of variables, concurrent operations, and side effects
    obscure the root cause. A minimal reproduction strips away everything irrelevant, exposing the exact conditions that trigger
    the bug. It also becomes the regression test. If you cannot reproduce it minimally, you do not understand it well enough
    to fix it.
  how_to_do_right: '1. Start with the full failing scenario. Document exact inputs and outputs.

    2. Remove components one at a time: database → mock, network → localhost, auth → skip.

    3. Simplify the input: 1000-record batch → 10 records → 2 records → 1 record.

    4. The goal: the SMALLEST code + input that reproduces the bug.

    5. Once minimal: this becomes your test case. It should fail before the fix, pass after.

    6. If you cannot reproduce: you need more information (logs, metrics, user reports).

    '
  severity: high
  technologies:
    lang: [python, javascript, general]
  domains:
    domain: [quality, testing]
    concern: [code]
  example_good: "# Bug report: \"Cart total wrong in production for user ABC\"\n# Full context: 15 items, authenticated user,\
    \ Redis cache, PostgreSQL, 3 applied coupons\n\n# Step 1: Reproduce in test (full context)\ndef test_reproduce_production_bug():\n\
    \    # Recreate the exact cart from production logs\n    cart = create_cart_from_production_snapshot(\"user_ABC_20260215\"\
    )\n    assert cart.total == expected_total  # FAILS — reproduced\n\n# Step 2: Minimize — remove components\ndef test_minimal_reproduction():\n\
    \    # Removed: auth, Redis, coupons, 13 items\n    # Minimal: 2 items, one with null price\n    cart = Cart(items=[\n\
    \        CartItem(sku=\"A\", price=Decimal(\"10.00\"), qty=1),\n        CartItem(sku=\"B\", price=None, qty=1),  # THIS\
    \ causes the bug\n    ])\n    assert cart.total == Decimal(\"10.00\")  # FAILS — minimal repro found\n\n# Step 3: This\
    \ IS the regression test\n# Fix the bug → this test passes → commit test + fix together\n"
  example_bad: '# No minimal reproduction — fix attempted in the dark

    # "User ABC reported cart total is wrong"

    # Developer: "Let me look at the cart total code..."

    # *reads 500 lines of cart calculation*

    # "I think maybe it''s this line... let me change it"

    # *deploys fix*

    # "It works for user ABC now!"

    # *breaks for user DEF because the fix was for the wrong root cause*

    # No test was written, no reproduction, no understanding of the actual bug

    '
  when_applies: Projects using Python codebases, JavaScript/TypeScript projects, or General
  when_not_applies: exploratory prototypes, one-off scripts, or spike investigations
  sources: ["https://martinfowler.com/articles/nonDeterminism.html"]
- id: CR-DBG-004
  text: Read the FULL error message and stack trace — the answer is usually in the last 5 lines
  why: Developers scan error messages for familiar keywords and miss the actual cause. The full stack trace shows the exact
    file, line, and call chain. The last frame (innermost) is usually where the error occurred. The exception message often
    contains the exact variable name, value, or condition that failed. Reading the error carefully saves hours of guesswork.
  how_to_do_right: '1. Read the exception type first: TypeError, ValueError, KeyError, AttributeError tell you the category.

    2. Read the message: it often contains the exact problem (''NoneType has no attribute X'' → something is None).

    3. Read the last 3-5 frames of the stack trace: where did the error actually happen?

    4. Work backwards from the error: what value was unexpected? Where did that value come from?

    5. For chained exceptions (''During handling of...''), read BOTH — the original cause matters most.

    6. For production errors: ensure structured logging captures full stack traces.

    '
  severity: high
  technologies:
    lang: [python, javascript, general]
  domains:
    domain: [quality]
    concern: [code]
  example_good: '# Error message:

    # Traceback (most recent call last):

    #   File "cart.py", line 42, in calculate_total

    #     item_total = item.price * item.quantity

    # TypeError: unsupported operand type(s) for *: ''NoneType'' and ''int''


    # Reading the error (30 seconds):

    # 1. TypeError — type mismatch in an operation

    # 2. NoneType * int — something is None that should be a number

    # 3. File cart.py, line 42 — exact location

    # 4. item.price * item.quantity — item.price is None

    # 5. Question: why is price None? → check data source


    # Root cause found in 30 seconds by reading the error message

    # Fix: item.price is None for promotional items → coalesce to Decimal("0")

    '
  example_bad: "# Developer reads:\n# TypeError: unsupported operand type(s) for *: 'NoneType' and 'int'\n\n# \"Hmm, a TypeError\
    \ somewhere. Let me add try/except everywhere.\"\ntry:\n    total = calculate_total(cart)\nexcept TypeError:\n    total\
    \ = Decimal(\"0\")  # \"Fixed\" — actually hides the bug\n\n# Did not read:\n# - Which file and line (cart.py:42)\n# -\
    \ Which variable is None (item.price)\n# - Why it's None (promotional items)\n# The \"fix\" silently returns wrong totals\
    \ instead of correct totals\n"
  when_applies: Projects using Python codebases, JavaScript/TypeScript projects, or General
  sources: ["https://docs.python.org/3/library/traceback.html"]
- id: CR-DBG-005
  text: Explain the problem to a rubber duck (or colleague) — verbalizing forces structured thinking
  why: The act of explaining a problem forces you to organize your thoughts sequentially, exposing gaps in your understanding.
    In 60-70% of cases, the developer discovers the answer while explaining — before the listener says anything. This works
    because explaining requires translating implicit mental models into explicit sequential logic, revealing faulty assumptions.
  how_to_do_right: '1. State the problem clearly: ''The system should do X, but instead it does Y.''

    2. Walk through the code step by step, explaining what each line does.

    3. At each step, state what you EXPECT vs what ACTUALLY happens.

    4. The moment you say ''and then this line should...'' and pause — that is where the bug is.

    5. Any actual object works: rubber duck, pet, plant, or a colleague (who does not even need to respond).

    6. Write it down if talking aloud is not possible — same effect.

    '
  severity: medium
  technologies:
    lang: [general]
  domains:
    domain: [quality]
    concern: [code]
  example_good: '# Rubber duck debugging session (written form):


    # "OK duck, here''s the problem. The cart total should be $10 for this cart.

    # Let me walk through the code:

    #

    # Line 1: We iterate over cart items. There are 2 items.

    # Line 2: For each item, we multiply price * quantity.

    # Line 3: Item 1 has price=$10, qty=1, so item_total = $10. Good.

    # Line 4: Item 2 has price=... wait. What''s the price for a promotional item?

    # Line 5: Let me check the database... price is NULL.

    # Line 6: NULL * 1 = ... that''s a TypeError!

    #

    # OH. The price is NULL for free promo items. That''s the bug.

    # I need to handle null prices."


    # Bug found by explaining, not by running the code.

    # The "duck" said nothing. The explanation process revealed the gap.

    '
  example_bad: '# Not explaining, just staring at code:

    # *reads calculate_total() for the 5th time*

    # "I don''t see the bug..."

    # *adds print statements*

    # *runs again*

    # "Still don''t see it..."

    # *changes random things*

    # "Maybe it''s a race condition?"

    # *adds sleep(1)*

    # 2 hours of unfocused staring and random changes

    '
  when_applies: Projects using General
  when_not_applies: projects not using General
  sources: ["https://en.wikipedia.org/wiki/Rubber_duck_debugging"]
- id: CR-DBG-006
  text: Profile before optimizing — measure to find the actual bottleneck, never guess
  why: Developers' intuition about performance bottlenecks is wrong 90% of the time (studies by Knuth, Hennessy). Optimizing
    the wrong code wastes time and often makes code harder to read for zero performance benefit. A 5-minute profiling session
    identifies the actual hotspot, enabling targeted optimization that delivers measurable improvement.
  how_to_do_right: '1. MEASURE first: run a profiler to identify where time is actually spent.

    2. Focus on the top 1-3 hotspots — optimizing beyond the top bottleneck rarely matters.

    3. Use flame graphs for visual identification of hot paths.

    4. Measure AFTER optimization to verify actual improvement (not just theoretical).

    5. Profile with realistic data volumes and production-like conditions.

    6. Document the profiling results and optimization rationale in commit messages.

    '
  severity: high
  technologies:
    lang: [python, javascript, general]
  domains:
    domain: [quality, performance]
    concern: [code]
  example_good: '# Step 1: Profile to find the bottleneck

    import cProfile

    import pstats


    profiler = cProfile.Profile()

    profiler.enable()

    result = process_checkout(cart)

    profiler.disable()


    stats = pstats.Stats(profiler)

    stats.sort_stats("cumulative")

    stats.print_stats(10)  # top 10 functions by cumulative time


    # Output:

    #   ncalls  tottime  cumtime  filename:lineno(function)

    #   1       0.001    4.200    checkout.py:15(process_checkout)

    #   1       0.001    3.800    products.py:42(validate_all_products)  <-- BOTTLENECK

    #   500000  3.700    3.700    products.py:58(fetch_product)           <-- ROOT CAUSE

    #   1       0.200    0.200    payments.py:10(charge_payment)

    #   1       0.100    0.100    email.py:5(send_confirmation)


    # Step 2: 3.7s in 500K individual product fetches → batch query optimization

    # Step 3: After fix — 3.8s → 0.05s (76x faster, verified by profiler)

    '
  example_bad: '# "The checkout is slow. Let me optimize the email sending."

    # *spends 2 days optimizing email template rendering*

    # Result: email: 100ms → 50ms (saved 50ms)

    # Checkout: 4.2s → 4.15s (barely noticeable)

    # The ACTUAL bottleneck (database queries at 3.8s) was never touched

    # 2 days wasted optimizing something that was 2.4% of total time

    '
  when_applies: Projects using Python codebases, JavaScript/TypeScript projects, or General
  when_not_applies: low-traffic internal tools, admin dashboards, or batch jobs where latency is irrelevant
  sources: ["https://docs.python.org/3/library/profile.html"]
- id: CR-DBG-007
  text: Use flame graphs to visually identify performance hotspots — width indicates time spent
  why: 'Tabular profiler output (cProfile, perf stat) is hard to interpret for complex call trees. Flame graphs provide instant
    visual identification of where time is spent: wider bars = more time. You can spot the bottleneck in 5 seconds by looking
    for the widest bar at the top of the graph. They reveal both CPU hotspots and unexpected call chains.'
  how_to_do_right: '1. Generate a flame graph from profiler output (py-spy for Python, Chrome DevTools for JS).

    2. Read bottom-up: the bottom is the entry point, the top is where time is spent.

    3. Width = time proportion. The widest top-level bar is your primary bottleneck.

    4. Look for unexpected function calls — wide bars in surprising locations.

    5. Compare flame graphs before/after optimization to verify improvement.

    6. Use interactive flame graphs (Speedscope, Firefox Profiler) for zoom and search.

    '
  severity: medium
  technologies:
    lang: [python, javascript, go, general]
  domains:
    domain: [quality, performance]
    concern: [code]
  example_good: '# Python: Generate flame graph with py-spy (sampling profiler, production-safe)

    # Install: pip install py-spy


    # Record a flame graph (SVG output)

    py-spy record -o profile.svg --pid 12345 --duration 30

    # Open profile.svg in browser — interactive flame graph


    # Or record from command:

    py-spy record -o profile.svg -- python -m myapp.server


    # JavaScript: Chrome DevTools

    # 1. Open Chrome DevTools → Performance tab

    # 2. Click Record, perform the slow action, click Stop

    # 3. Bottom-Up view shows time by function

    # 4. Chart view shows flame graph


    # What to look for in the flame graph:

    # - Widest bar at top = primary bottleneck

    # - Tall narrow columns = deep call stacks (potential recursion)

    # - Unexpected wide bars = surprises (JSON.parse taking 40% of time?)

    # - Platform functions (GC, regex) taking significant time

    '
  example_bad: '# No profiling, no flame graph

    # "Let me guess where it''s slow..."

    # *adds time.time() around random functions*

    t1 = time.time()

    result = do_something()

    t2 = time.time()

    print(f"do_something took {t2-t1:.3f}s")

    # Problem: only measures the functions you THINK are slow

    # Misses the actual bottleneck in a function you never thought to measure

    # Manual timing is tedious, error-prone, and pollutes the code

    '
  when_applies: Projects using Python codebases, JavaScript/TypeScript projects, Go services and tools, or General
  when_not_applies: low-traffic internal tools, admin dashboards, or batch jobs where latency is irrelevant
  sources: ["https://www.brendangregg.com/flamegraphs.html"]
- id: CR-DBG-008
  text: Profile memory to find leaks — objects that grow unboundedly indicate leaks
  why: 'Memory leaks cause gradual performance degradation and eventual OOM crashes. They are invisible until the application
    runs for hours or days. Common causes: unclosed connections, growing caches without eviction, event listeners never removed,
    circular references preventing garbage collection. Memory profiling catches these before production outages.'
  how_to_do_right: '1. Use heap snapshots to compare memory before and after operations.

    2. Look for object counts that grow over time (should be stable for stateless operations).

    3. Python: tracemalloc for allocation tracking, objgraph for reference graphs.

    4. JavaScript: Chrome DevTools Heap Snapshot, comparison between snapshots.

    5. Test memory under sustained load: run the operation 10,000 times, measure if memory grows.

    6. Common leak patterns: global lists that append without trim, caches without TTL, unclosed streams.

    '
  severity: high
  technologies:
    lang: [python, javascript, general]
  domains:
    domain: [quality, performance]
    concern: [code]
  example_good: "# Python: Find memory leaks with tracemalloc\nimport tracemalloc\nimport gc\n\ntracemalloc.start()\n\n# Take\
    \ snapshot BEFORE operations\nsnapshot1 = tracemalloc.take_snapshot()\n\n# Run the suspected leaking operation 1000 times\n\
    for _ in range(1000):\n    process_request(sample_request)\ngc.collect()  # force garbage collection\n\n# Take snapshot\
    \ AFTER\nsnapshot2 = tracemalloc.take_snapshot()\n\n# Compare: what grew?\ntop_stats = snapshot2.compare_to(snapshot1,\
    \ \"lineno\")\nfor stat in top_stats[:10]:\n    print(stat)\n\n# Output:\n# cache.py:42: size=15.2 MiB (+15.2 MiB), count=100000\
    \ (+100000)\n# ^^^ This cache grows with every request — needs TTL or max size!\n\n# Fix: Add LRU eviction\nfrom functools\
    \ import lru_cache\n\n@lru_cache(maxsize=1000)  # bounded cache, evicts least-recently-used\ndef get_product(sku: str)\
    \ -> Product:\n    return db.fetch_product(sku)\n"
  example_bad: "# Global list that grows forever (memory leak)\nrequest_log = []  # grows unboundedly\n\ndef process_request(request):\n\
    \    request_log.append(request)  # never trimmed\n    # After 1M requests: ~500MB of logged requests\n    # After 10M\
    \ requests: OOM kill\n    result = do_work(request)\n    return result\n\n# Another common leak: unclosed connections\n\
    def fetch_data(url):\n    conn = http.client.HTTPSConnection(url)\n    response = conn.request(\"GET\", \"/data\")\n \
    \   return response.read()\n    # conn is never closed — file descriptors leak\n    # After ~1000 calls: \"Too many open\
    \ files\" error\n"
  when_applies: Projects using Python codebases, JavaScript/TypeScript projects, or General
  when_not_applies: low-traffic internal tools, admin dashboards, or batch jobs where latency is irrelevant
  sources: ["https://docs.python.org/3/library/tracemalloc.html"]
- id: CR-DBG-009
  text: Use breakpoint() for interactive debugging — inspect live state instead of adding print statements
  why: Print debugging requires guessing which variables to print, rerunning the code after each change, and cleaning up print
    statements. breakpoint() drops into an interactive debugger where you can inspect ANY variable, step through code line
    by line, evaluate expressions, and modify state in real-time. It is strictly superior to print debugging.
  how_to_do_right: '1. Insert `breakpoint()` at the line where you want to inspect state.

    2. Run the code normally — it will pause at the breakpoint.

    3. Commands: `n` (next line), `s` (step into), `c` (continue), `p variable` (print), `pp` (pretty print).

    4. Inspect any variable: just type its name or use `p expression`.

    5. Modify state: `variable = new_value` then `c` to continue with the modified state.

    6. For pytest: `pytest -s` to allow breakpoint interaction; use `--pdb` to break on failures.

    '
  severity: medium
  technologies:
    lang: [python]
  domains:
    domain: [quality]
    concern: [code]
  example_good: "# Interactive debugging with breakpoint()\ndef calculate_total(cart: Cart) -> Decimal:\n    total = Decimal(\"\
    0\")\n    for item in cart.items:\n        breakpoint()  # pause here to inspect item\n        # In debugger:\n      \
    \  # (Pdb) p item\n        # CartItem(sku='PROMO-001', price=None, qty=1)\n        # (Pdb) p item.price is None\n    \
    \    # True\n        # (Pdb) p type(item.price)\n        # <class 'NoneType'>\n        # Found the bug! price is None\
    \ for promo items\n        item_total = item.price * item.quantity\n        total += item_total\n    return total\n\n\
    # Or use pytest --pdb to break on failures automatically:\n# pytest tests/test_cart.py --pdb\n# When a test fails, you're\
    \ dropped into debugger at the failure point\n# Can inspect all local variables, call stack, etc.\n\n# Using ipdb for\
    \ better experience:\n# pip install ipdb\n# PYTHONBREAKPOINT=ipdb.set_trace python my_script.py\n"
  example_bad: "# Print debugging — tedious and error-prone\ndef calculate_total(cart):\n    print(f\"DEBUG: cart = {cart}\"\
    )  # need to remember to remove\n    print(f\"DEBUG: items = {cart.items}\")\n    total = 0\n    for item in cart.items:\n\
    \        print(f\"DEBUG: item = {item}\")\n        print(f\"DEBUG: price = {item.price}\")\n        print(f\"DEBUG: qty\
    \ = {item.quantity}\")\n        print(f\"DEBUG: price type = {type(item.price)}\")  # oh, need this too\n        total\
    \ += item.price * item.quantity\n        print(f\"DEBUG: running total = {total}\")\n    print(f\"DEBUG: final total =\
    \ {total}\")\n    return total\n# 9 print statements to inspect what breakpoint() shows with 1 line\n# Must re-run to\
    \ add more prints if these don't show the bug\n# Must remember to remove ALL print statements before commit\n"
  when_applies: Projects using Python codebases
  when_not_applies: projects not using Python
  sources: ["https://docs.python.org/3/library/functions.html#breakpoint"]
- id: CR-DBG-010
  text: Use tracemalloc for memory allocation tracking — find which code allocates the most memory
  why: When a Python application uses excessive memory, you need to know which code allocated it. tracemalloc is a built-in
    module that records where every memory allocation came from (file, line number). Unlike memory_profiler (which tracks
    total memory per line), tracemalloc tracks individual allocations and can compare snapshots to find growing allocations
    (leaks).
  how_to_do_right: '1. Start tracking early: `tracemalloc.start()` at application startup.

    2. Take snapshots at strategic points: before/after operations, periodically.

    3. Compare snapshots: `snapshot2.compare_to(snapshot1, ''lineno'')` shows what grew.

    4. Filter by filename to focus on your code (ignore standard library allocations).

    5. Use `snapshot.statistics(''traceback'')` for full call stacks of large allocations.

    6. For production: tracemalloc has ~10-30% overhead — enable only during investigation.

    '
  severity: medium
  technologies:
    lang: [python]
  domains:
    domain: [quality, performance]
    concern: [code]
  example_good: "import tracemalloc\n\n# Start tracking (do this at app startup)\ntracemalloc.start(25)  # store 25 frames\
    \ of traceback per allocation\n\n# Snapshot before operation\nsnap1 = tracemalloc.take_snapshot()\n\n# Run the operation\
    \ under investigation\nfor _ in range(100):\n    process_batch(batch_data)\n\n# Snapshot after\nsnap2 = tracemalloc.take_snapshot()\n\
    \n# Compare: what grew?\nstats = snap2.compare_to(snap1, \"traceback\")\nfor stat in stats[:5]:\n    print(f\"\\n{stat}\"\
    )\n    for line in stat.traceback.format():\n        print(f\"  {line}\")\n\n# Output shows exact file:line and full call\
    \ stack for largest growth:\n# /app/cache.py:42: size=15.2 MiB (+15.2 MiB), count=100000 (+100000)\n#   File \"/app/cache.py\"\
    , line 42, in get_product\n#     _cache[sku] = fetch_from_db(sku)\n#   File \"/app/service.py\", line 18, in process_batch\n\
    #     product = get_product(item.sku)\n\n# Current peak\ncurrent, peak = tracemalloc.get_traced_memory()\nprint(f\"Current:\
    \ {current / 1024 / 1024:.1f} MiB, Peak: {peak / 1024 / 1024:.1f} MiB\")\n"
