- id: CR-DBG-012
  text: Add caching at the right layer — cache computation results, database queries, and external API responses
  why: 'Caching is the single most effective optimization technique. A database query that takes 50ms can be served from cache
    in <1ms — a 50x improvement. The key is caching at the right layer: cache the result closest to the consumer, with an
    appropriate TTL based on data freshness requirements. Wrong caching (stale data, cache stampede, unbounded growth) causes
    worse bugs than no caching.'
  how_to_do_right: '1. Identify the most frequent and expensive operations (profiling first).

    2. Cache with appropriate TTL: user-specific data (short TTL, 5-15 min), reference data (long TTL, 1-24 hours).

    3. Use bounded caches: LRU with maxsize, Redis with maxmemory policy.

    4. Handle cache misses gracefully: fallback to source, not error.

    5. Invalidate on write: when data changes, invalidate affected cache entries.

    6. Prevent cache stampede: use locks or stale-while-revalidate for hot keys.

    '
  severity: high
  technologies:
    lang: [python, javascript, general]
    platform: [redis]
  domains:
    domain: [quality, performance]
    concern: [code]
  example_good: "from functools import lru_cache\nfrom datetime import timedelta\n\n# Layer 1: In-process LRU cache for hot\
    \ data (zero network overhead)\n@lru_cache(maxsize=1000)\ndef get_tax_rate(state_code: str) -> Decimal:\n    \"\"\"Tax\
    \ rates change rarely — cache in process.\"\"\"\n    return db.fetch_tax_rate(state_code)\n\n# Layer 2: Redis cache for\
    \ shared data across instances\nasync def get_product(sku: str) -> Product:\n    \"\"\"Product data shared across app\
    \ instances.\"\"\"\n    cached = await redis.get(f\"product:{sku}\")\n    if cached:\n        return Product.model_validate_json(cached)\n\
    \    # Cache miss: fetch from DB, store with TTL\n    product = await db.fetch_product(sku)\n    await redis.setex(f\"\
    product:{sku}\", timedelta(minutes=15), product.model_dump_json())\n    return product\n\n# Invalidation on write\nasync\
    \ def update_product(sku: str, data: ProductUpdate):\n    await db.update_product(sku, data)\n    await redis.delete(f\"\
    product:{sku}\")  # invalidate cache\n"
  example_bad: "# Unbounded cache (memory leak)\n_cache = {}  # grows forever\ndef get_product(sku):\n    if sku not in _cache:\n\
    \        _cache[sku] = db.fetch_product(sku)  # never evicted\n    return _cache[sku]\n# After 1M unique SKUs: 500MB memory,\
    \ eventually OOM\n\n# Or: cache without invalidation (stale data)\n# Product price updated in DB but cache still has old\
    \ price\n# User charged old price for 15 minutes until cache expires\n"
  when_applies: Projects using Python codebases, Redis cache/pub-sub systems, JavaScript/TypeScript projects, or General
  when_not_applies: low-traffic internal tools, admin dashboards, or batch jobs where latency is irrelevant
  sources: ["https://redis.io/docs/latest/develop/use/client-side-caching/"]
- id: CR-DBG-013
  text: Batch database operations to eliminate N+1 queries — one query for N items, not N queries for N items
  why: N+1 queries are the most common performance anti-pattern in data-driven applications. Loading 100 orders with their
    items as 1 + 100 queries (100ms + 100*10ms = 1.1s) vs 2 queries with JOIN or IN clause (100ms + 15ms = 115ms) is a 10x
    difference. At scale (10,000 orders), it becomes 1 query vs 10,000 queries — the difference between 150ms and 100 seconds.
  how_to_do_right: '1. Detect N+1s: enable query logging and look for repetitive queries in a single request.

    2. ORM: use eager loading (joinedload in SQLAlchemy, select_related in Django).

    3. Raw SQL: use IN clause or JOIN instead of looping with individual SELECTs.

    4. GraphQL: use DataLoader to batch and deduplicate queries within a request.

    5. Monitor in production: alert on requests that execute more than 10 queries.

    6. Test for N+1s: assert query count in tests (`assertNumQueries` in Django).

    '
  severity: high
  technologies:
    lang: [python, graphql]
    framework: [sqlalchemy, django]
    platform: [postgresql]
  domains:
    domain: [quality, performance, architecture]
    concern: [code, backend]
  example_good: "from sqlalchemy.orm import joinedload\n\n# SQLAlchemy: eager load related data in ONE query\nasync def get_orders_with_items(user_id:\
    \ str) -> list[Order]:\n    result = await session.execute(\n        select(Order)\n        .options(joinedload(Order.items))\
    \  # JOIN in single query\n        .where(Order.user_id == user_id)\n    )\n    return result.unique().scalars().all()\n\
    # 1 query: SELECT orders JOIN order_items WHERE user_id = ...\n\n# Raw SQL: batch fetch with IN clause\nasync def get_products_batch(skus:\
    \ list[str]) -> list[Product]:\n    result = await db.fetch_all(\n        \"SELECT * FROM products WHERE sku = ANY(:skus)\"\
    ,\n        {\"skus\": skus},\n    )\n    return [Product(**row) for row in result]\n# 1 query regardless of list size\
    \ (up to PostgreSQL parameter limit)\n"
  example_bad: "# N+1 query pattern — 1 query to get orders, then N queries for items\nasync def get_orders_with_items(user_id):\n\
    \    orders = await db.fetch_all(\n        \"SELECT * FROM orders WHERE user_id = :uid\", {\"uid\": user_id}\n    )\n\
    \    for order in orders:  # N iterations\n        order[\"items\"] = await db.fetch_all(\n            \"SELECT * FROM\
    \ order_items WHERE order_id = :oid\",\n            {\"oid\": order[\"id\"]},\n        )  # 1 query per order\n    return\
    \ orders\n# 100 orders = 101 queries = 1+ second\n# 10,000 orders = 10,001 queries = 100+ seconds\n# Database connection\
    \ pool exhaustion under load\n"
  when_applies: Projects using Python codebases, SQLAlchemy ORM interactions, Django projects, or PostgreSQL databases
