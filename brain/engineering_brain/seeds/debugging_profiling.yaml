- id: CR-DBG-011
  text: Use Chrome DevTools Performance tab and heap snapshots for frontend profiling — never optimize by feel
  why: 'Frontend performance issues are notoriously hard to diagnose by reading code. A slow render could be caused by: layout
    thrashing, excessive re-renders, large DOM, blocking scripts, unoptimized images, or memory leaks. Chrome DevTools provides
    CPU profiling (flame chart), memory profiling (heap snapshots), and render profiling (paint flashing) that pinpoint the
    exact cause in minutes.'
  how_to_do_right: '1. Performance tab: Record → perform the slow action → Stop. Flame chart shows CPU time by function.

    2. Memory tab: Take heap snapshot before/after. Compare to find growing object counts (leaks).

    3. Allocation timeline: Record allocations over time to see which operations allocate most.

    4. React DevTools Profiler: shows which components re-render and why (props/state changed).

    5. Lighthouse: automated audit for performance, accessibility, SEO (run in Incognito for clean results).

    6. Network tab: identify slow requests, large payloads, waterfall bottlenecks.

    '
  severity: medium
  technologies:
    lang: [javascript]
    framework: [frontend, react]
    library: [chrome devtools]
  domains:
    domain: [quality, performance, architecture]
    concern: [code, frontend]
  example_good: "// Using React DevTools Profiler to find unnecessary re-renders\n\n// Before: Component re-renders 47 times\
    \ on page load\nfunction ProductList({ products }) {\n  return products.map(p => <ProductCard key={p.id} product={p} />);\n\
    }\n\nfunction ProductCard({ product }) {\n  // Re-renders every time ANY product changes\n  // React DevTools shows: \"\
    Why did this render? Props changed: product\"\n  return <div>{product.name} - ${product.price}</div>;\n}\n\n// After:\
    \ Memoize to prevent unnecessary re-renders\nconst ProductCard = React.memo(function ProductCard({ product }) {\n  return\
    \ <div>{product.name} - ${product.price}</div>;\n});\n\n// Verified in React DevTools Profiler:\n// Before: 47 renders,\
    \ 340ms total render time\n// After: 1 render per changed product, 12ms total render time\n\n// Chrome DevTools Performance\
    \ recording:\n// Before: 340ms scripting, 180ms rendering, 520ms total\n// After: 12ms scripting, 8ms rendering, 20ms\
    \ total\n"
  example_bad: "// Optimizing by feel without profiling\n// \"The page is slow, let me add useMemo everywhere\"\nconst ProductCard\
    \ = React.memo(({ product }) => {\n  const formatted = useMemo(() => format(product), [product]);\n  const style = useMemo(()\
    \ => getStyle(product.category), [product.category]);\n  // Added 10 useMemo hooks to 20 components\n  // Result: marginal\
    \ improvement because the actual bottleneck was\n  // a 2MB uncompressed JSON fetch, not React rendering\n  // Wasted\
    \ 4 hours memoizing, never checked Network tab\n});\n"
