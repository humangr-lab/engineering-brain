- id: CR-DBG-014
  text: Use async I/O for concurrent network and disk operations — never block the event loop on I/O
  why: Synchronous I/O blocks the thread while waiting for network or disk responses. In a web server handling 100 concurrent
    requests, each blocking for 100ms on a database query, you need 100 threads to avoid request queuing. With async I/O,
    a single thread handles all 100 requests concurrently — while one request waits for the database, the thread processes
    other requests. This reduces memory 100x and improves throughput 10-50x.
  how_to_do_right: '1. Use async for ALL I/O operations: database queries, HTTP calls, file reads, cache operations.

    2. Never mix sync I/O in an async context: `requests.get()` in an `async def` blocks the event loop.

    3. Use `asyncio.gather()` for concurrent independent I/O operations.

    4. Use async-compatible libraries: httpx (not requests), asyncpg (not psycopg2), aiofiles (not open).

    5. CPU-bound work: use `run_in_executor()` to offload to thread pool, keeping event loop free.

    6. Monitor event loop lag — if >100ms, something is blocking.

    '
  severity: high
  technologies:
    lang: [python, javascript, asyncio]
    framework: [fastapi]
  domains:
    domain: [quality, performance, architecture]
    concern: [code, backend]
  example_good: "import asyncio\nimport httpx\n\n# Concurrent I/O: fetch 3 APIs simultaneously (total time = max of 3, not\
    \ sum)\nasync def enrich_order(order: Order) -> EnrichedOrder:\n    async with httpx.AsyncClient() as client:\n      \
    \  # All 3 calls execute concurrently\n        user_task = client.get(f\"/api/users/{order.user_id}\")\n        products_task\
    \ = client.get(f\"/api/products/batch\", params={\"skus\": order.skus})\n        shipping_task = client.get(f\"/api/shipping/estimate\"\
    , json=order.address)\n\n        user_resp, products_resp, shipping_resp = await asyncio.gather(\n            user_task,\
    \ products_task, shipping_task\n        )\n        # Total time: max(user, products, shipping) instead of sum\n      \
    \  # 100ms + 150ms + 80ms → 150ms (not 330ms)\n\n    return EnrichedOrder(\n        user=user_resp.json(),\n        products=products_resp.json(),\n\
    \        shipping=shipping_resp.json(),\n    )\n"
