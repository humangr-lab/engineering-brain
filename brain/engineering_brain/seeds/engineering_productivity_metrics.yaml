layer: rules
domain: operations
knowledge:
- id: EMET-001
  text: "DORA metrics (Deployment Frequency, Lead Time, MTTR, Change Failure Rate) must be the foundation of delivery measurement. Elite teams deploy on-demand with < 1h lead time, < 1h MTTR, and < 5% change failure rate."
  why: "A 200-person org had no delivery metrics. DORA metrics revealed lead time was 14 days (manual QA), deployment frequency was biweekly, and change failure rate was 22%. Validated by 7 years of research across 36,000+ professionals."
  how_to_do_right: |
    1. Instrument CI/CD to capture 4 metrics automatically
    2. Deployment Frequency: count production deployments per day/week
    3. Lead Time: measure from first commit to production deployment
    4. MTTR: measure from incident detection to resolution
    5. Change Failure Rate: deployments causing incidents / total deployments
    6. Benchmark against DORA categories: Elite, High, Medium, Low
  severity: critical
  technologies:
    lang: [python, yaml]
    framework: [github_actions, gitlab_ci]
    library: [sleuth, linearb, dora_metrics]
  domains:
    domain: [operations, engineering_management]
    concern: [delivery_metrics, devops]
  example_good: |
    # DORA metrics from CI/CD
    from datetime import datetime
    def record_deployment(repo, sha, deployed_at):
        first_commit = get_first_commit_time(sha)
        lead_time_h = (deployed_at - first_commit).total_seconds() / 3600
        store_metric("lead_time_hours", lead_time_h, repo=repo)
        store_metric("deployment_count", 1, repo=repo)
  example_bad: |
    # No delivery metrics
    # VP: "Engineering feels slow"
    # No data to identify bottleneck
    # Root cause: manual QA gate takes 3 days
  when_applies: "Any software engineering organization that wants to measure delivery performance with evidence-based metrics"
  sources:
    - "https://dora.dev/research/"
    - "https://cloud.google.com/blog/products/devops-sre/the-2023-accelerate-state-of-devops-report"

- id: EMET-002
  text: "Adopt SPACE framework to measure productivity across five dimensions: Satisfaction, Performance, Activity, Communication, and Efficiency. Never measure productivity with a single metric."
  why: "A VP used lines-of-code as productivity metric. Top performers scored low. Copy-paste developers scored highest. SPACE framework (GitHub/Microsoft Research) established that productivity is multidimensional."
  how_to_do_right: |
    1. Satisfaction: developer survey (eNPS, tool satisfaction)
    2. Performance: code review quality, change failure rate
    3. Activity: deployment frequency, PR throughput (never standalone)
    4. Communication: review turnaround, documentation quality
    5. Efficiency: CI feedback time, flow state hours, onboarding time
    6. Always measure at team level, never individual
  severity: high
  technologies:
    lang: [python]
    framework: [github]
    library: [linearb, jellyfish]
  domains:
    domain: [operations, engineering_management]
    concern: [developer_productivity, team_health]
  example_good: |
    from dataclasses import dataclass
    @dataclass
    class SPACEMetrics:
        developer_enps: float
        change_failure_rate: float
        deployment_frequency: float
        code_review_turnaround_hours: float
        ci_feedback_minutes: float
        flow_state_hours_per_week: float
  example_bad: |
    productivity = lines_of_code / developer_count
    # Refactoring stopped, dead code never deleted, quality declined
  when_applies: "Any engineering organization measuring developer or team productivity"
  sources:
    - "https://queue.acm.org/detail.cfm?id=3454124"
    - "https://github.blog/engineering/engineering-principles/how-we-think-about-engineering-productivity-at-github/"

- id: EMET-003
  text: "DevEx/DX Core 4 identifies four dimensions of developer experience: feedback loop speed, cognitive load, flow state ease, and tool quality. Optimize all four to improve productivity."
  why: "Google found developers with fast feedback (CI < 10 min), low cognitive load, easy flow states (< 3 meetings/day), and excellent tooling were 2-3x more productive."
  how_to_do_right: |
    1. Speed: CI < 10 min, PR review < 4 hours, deployment < 1 hour
    2. Cognitive load: clear docs, bounded service complexity
    3. Flow state: < 3 meetings/day, async-first communication
    4. Tooling: fast IDE, reliable local dev, one-command setup
    5. Measure with quarterly surveys using DX Core 4 instruments
    6. Pair survey data with technical metrics
  severity: medium
  technologies:
    lang: [python]
    framework: [github, slack]
    library: [getdx, linearb]
  domains:
    domain: [operations, engineering_management]
    concern: [developer_experience, tooling]
  example_good: |
    DEVEX_METRICS = {
        "feedback_loops": {"ci_p50_minutes": 8.5, "target": "< 10 min"},
        "cognitive_load": {"onboarding_days": 3, "target": "< 5 days"},
        "flow_state": {"meetings_per_day": 2.1, "target": "< 3"},
        "tooling": {"local_env_setup_minutes": 15, "target": "< 30 min"},
    }
  example_bad: |
    # CI: 45 min, 6 meetings/day, local env takes 2 hours
    # Developer NPS: -20, attrition: 25% annual
  when_applies: "Any engineering organization improving developer productivity through better developer experience"
  sources:
    - "https://getdx.com/research/measuring-developer-experience/"
    - "https://queue.acm.org/detail.cfm?id=3595878"

- id: EMET-004
  text: "Engineering metrics must always be measured at team level, never individual level. Individual metrics trigger Goodhart's Law: the measure becomes a target and ceases to be a good measure."
  why: "A company implemented individual dashboards (commits/day, PRs/week). Within one month: tiny commits, trivially small PRs, rubber-stamp reviews. Collaboration disappeared."
  how_to_do_right: |
    1. Aggregate all metrics at team level (5-12 people)
    2. Use team dashboards showing team DORA and SPACE scores
    3. For performance reviews: use peer feedback, not activity counts
    4. Make dashboards team-owned
    5. Celebrate team improvements, not individual heroics
  severity: critical
  technologies:
    lang: [python]
    framework: [github, gitlab]
    library: [linearb, grafana]
  domains:
    domain: [operations, engineering_management]
    concern: [team_metrics, goodharts_law]
  example_good: |
    @dataclass
    class TeamMetrics:
        team_name: str
        deployment_frequency_per_week: float
        lead_time_hours_p50: float
        change_failure_rate: float
        team_enps: float
        # NOT INCLUDED: individual commit/PR/review counts
  example_bad: |
    # Individual leaderboard
    # Alice: 47 commits (splits work into tiny commits)
    # Bob: 38 commits (rubber-stamps reviews)
    # Carol: 15 commits (best engineer, writing architecture doc)
  when_applies: "Any engineering organization measuring productivity, especially when leadership requests individual-level metrics"
  sources:
    - "https://newsletter.pragmaticengineer.com/p/measuring-developer-productivity"
    - "https://itrevolution.com/product/accelerate/"

- id: EMET-005
  text: "Protect developer flow state with Focus Time blocks (minimum 4h uninterrupted/day), meeting-free days, and async-first communication. A single interruption costs 23 minutes of recovery time."
  why: "Microsoft research: developers with 2+ hours uninterrupted time completed complex tasks 2x faster. After interruption, 23 minutes to return to same focus level. Shopify and Atlassian report 25-40% productivity gains from meeting-free days."
  how_to_do_right: |
    1. Meeting-free days: minimum 2 days/week
    2. Focus Time blocks: 4-hour windows, no interruptions
    3. Async-first: docs, PRs, Loom videos over meetings
    4. Batch meetings: concentrate into 1-2 days
    5. Measure focus time per developer per week
  severity: high
  technologies:
    lang: [python]
    framework: [slack, google_calendar]
    library: [clockwise, reclaim_ai]
  domains:
    domain: [operations, engineering_management]
    concern: [flow_state, deep_work, meeting_culture]
  example_good: |
    team_agreement = {
        "meeting_free_days": ["Tuesday", "Thursday"],
        "focus_blocks": {"time": "9:00-13:00", "rules": ["No meetings", "Slack DMs only for P0"]},
        "metrics": {"target_focus_hours_per_week": 20, "max_meetings_per_day": 2},
    }
  example_bad: |
    # 19 meetings/week, ~15 hours
    # Effective focus time: ~5 hours/week (with 23-min recovery per meeting)
  when_applies: "Any engineering team where developers report insufficient time for deep work or where complex tasks take longer than expected"
  sources:
    - "https://www.microsoft.com/en-us/research/publication/the-cost-of-interrupted-work-more-speed-and-stress/"
    - "https://shopify.engineering/how-shopify-reduced-meeting-time"

- id: EMET-006
  text: "Measure and minimize toil: repetitive, manual, automatable work. Google SRE mandates < 50% toil; target is < 30%."
  why: "A platform team spent 60% on toil (manual deployments, cert rotations, access provisioning). After automating top 5 toil categories, reduced to 25%. Freed capacity built self-service tooling."
  how_to_do_right: |
    1. Define toil categories: deployments, access requests, alert response
    2. Measure time spent weekly
    3. Target: < 30% toil. Red line: 50%
    4. Prioritize by ROI: (time * frequency) / automation effort
    5. Include toil reduction as team OKR
  severity: high
  technologies:
    lang: [python, bash]
    framework: [terraform, ansible]
    library: [github_actions, pagerduty]
  domains:
    domain: [operations, sre]
    concern: [toil_reduction, automation]
  example_good: |
    class ToilTracker:
        def record(self, category, duration_min, automatable=True):
            self.entries.append({"category": category, "duration": duration_min})
        def weekly_report(self):
            total = sum(e["duration"] for e in self.entries) / 60
            return {"toil_hours": total, "toil_pct": total / (40 * 8) * 100}
  example_bad: |
    # Week 1: 40% toil. "We'll automate next sprint" — never happens
    # Week 12: 70% toil — team entirely reactive, no capacity to improve
  when_applies: "Any engineering or SRE team performing repetitive manual work that could be automated"
  sources:
    - "https://sre.google/sre-book/eliminating-toil/"
    - "https://sre.google/workbook/eliminating-toil/"

- id: EMET-007
  text: "Conduct quarterly developer surveys using validated instruments (eNPS, SPACE, DX Core 4). Surveys must be anonymous, results shared transparently, and at least one action item implemented before next survey."
  why: "A company had 30% attrition. Raised salaries 15% — attrition barely changed. Anonymous survey revealed: broken CI (45 min), 8 meetings/day, outdated docs. Fixing top 3 pain points reduced attrition to 12%."
  how_to_do_right: |
    1. Run quarterly (not annually)
    2. Use validated instruments (eNPS, SPACE, DX Core 4)
    3. Guarantee anonymity: minimum 5 responses per team for reporting
    4. Share results within 2 weeks
    5. Commit to top 3 action items with owners and deadlines
    6. Close the loop: show what was done about last survey's feedback
  severity: medium
  technologies:
    lang: [python]
    framework: [google_forms, typeform]
    library: [getdx, cultureamp]
  domains:
    domain: [operations, engineering_management]
    concern: [developer_satisfaction, retention]
  example_good: |
    SURVEY = {
        "enps": "Scale 0-10, how likely to recommend as place to work?",
        "top_pain_points": "Top 3 things that slow you down (free text)",
        "space_dimensions": [
            {"dim": "satisfaction", "q": "Satisfaction with dev experience? (1-5)"},
            {"dim": "efficiency", "q": "How often can you get into flow state? (1-5)"},
        ],
    }
  example_bad: |
    # Annual survey, results published 2 months later
    # Same #1 issue as last year, no action taken
    # Survey response rate drops from 80% to 35%
  when_applies: "Any engineering organization with 10+ developers wanting to improve developer experience"
  sources:
    - "https://getdx.com/research/developer-experience-survey/"
    - "https://www.cultureamp.com/blog/developer-engagement"

- id: EMET-008
  text: "CI/CD pipeline feedback must be under 10 minutes for the critical path (lint + unit tests + security scan). Total pipeline under 30 minutes. Slow CI is the single largest productivity drain."
  why: "A team's CI took 45 minutes. After optimizing to 8 minutes (parallelized tests, cached dependencies), lead time dropped from 3 days to 4 hours."
  how_to_do_right: |
    1. Critical path < 10 min: lint + type check + unit tests + security scan
    2. Full pipeline < 30 min: add integration tests, E2E, build
    3. Parallelize: run lint, tests, security simultaneously
    4. Cache: dependencies, Docker layers, test results
    5. Run only affected tests via test impact analysis
    6. Move slow tests to post-merge nightly suite
  severity: high
  technologies:
    lang: [yaml, bash]
    framework: [github_actions, gitlab_ci]
    library: [pytest, jest, docker, buildkit]
  domains:
    domain: [operations, devops]
    concern: [ci_cd, feedback_loops, build_optimization]
  example_good: |
    # Parallel CI — 8 min critical path
    jobs:
      lint:    # 2 min — parallel
        run: ruff check src/ && mypy src/
      security:  # 2 min — parallel
        uses: github/codeql-action/analyze@v3
      unit-tests:  # 5 min — parallel
        run: pytest tests/unit/ -x --tb=short -q
      integration:  # post-merge only, 20 min
        if: github.ref == 'refs/heads/main'
        run: pytest tests/integration/ -v
  example_bad: |
    # Sequential CI — 45 minutes
    # pip install (5 min) -> lint (3 min) -> ALL tests (25 min) -> build (8 min)
    # Developer context-switches to Slack, loses flow state
  when_applies: "Any team where CI build times exceed 10 minutes"
  sources:
    - "https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/caching-dependencies-to-speed-up-workflows"
    - "https://circleci.com/blog/config-best-practices-for-faster-builds/"

- id: EMET-009
  text: "Code review turnaround (PR opened to first review) should be under 4 hours. Use PR size limits (< 400 lines), automated reviewers for style, and CODEOWNERS for routing."
  why: "A team's average PR review turnaround was 2.3 days. Small PRs (< 400 lines) get reviewed 3x faster. Google research shows review turnaround is one of the strongest predictors of developer satisfaction."
  how_to_do_right: |
    1. Set team SLA: first review within 4 business hours
    2. Limit PR size: < 400 lines changed
    3. Use CODEOWNERS for auto-assignment
    4. Automate style reviews with linters in CI
    5. Treat reviews as higher priority than starting new work
  severity: medium
  technologies:
    lang: [yaml, markdown]
    framework: [github, gitlab]
    library: [codeowners, danger_js]
  domains:
    domain: [operations, engineering_management]
    concern: [code_review, collaboration]
  example_good: |
    # .github/CODEOWNERS
    /src/api/       @backend-team
    /src/frontend/  @frontend-team
    *.proto         @api-governance-team

    # PR size check in CI
    LINES=$(git diff --stat origin/main...HEAD | tail -1 | awk '{print $4+$6}')
    if [ "$LINES" -gt 400 ]; then echo "Consider splitting PR"; fi
  example_bad: |
    # Monday: PR opened (1200 lines). Thursday: rubber-stamp "LGTM"
    # Friday: merge conflict. Total cycle: 5 days for a 1-day change
  when_applies: "Any team using pull requests where review turnaround is a bottleneck"
  sources:
    - "https://google.github.io/eng-practices/review/reviewer/speed.html"
    - "https://docs.github.com/en/repositories/managing-your-repositorys-settings-and-features/customizing-your-repository/about-code-owners"

- id: EMET-010
  text: "Apply Goodhart's Law awareness: every metric needs a paired counter-metric to prevent gaming. Use metrics for insight, not incentives."
  why: "A VP set 100% code coverage target. Developers wrote tests that executed code but asserted nothing. Coverage hit 100%, actual quality declined. Counter-metric (mutation testing kill rate) would have caught this."
  how_to_do_right: |
    1. Deployment frequency paired with change failure rate
    2. Code coverage paired with mutation kill rate
    3. PR throughput paired with review quality score
    4. Velocity paired with customer satisfaction
    5. Use metrics for insight, never for individual rewards
  severity: critical
  technologies:
    lang: [python]
    framework: [grafana]
    library: [mutmut, pytest_cov]
  domains:
    domain: [operations, engineering_management]
    concern: [goodharts_law, metric_gaming]
  example_good: |
    METRIC_PAIRS = {
        "deployment_frequency": {"counter": "change_failure_rate"},
        "code_coverage": {"counter": "mutation_kill_rate"},
        "pr_throughput": {"counter": "review_quality_score"},
        "lead_time": {"counter": "test_coverage_of_deployed_code"},
    }
  example_bad: |
    # Target: 100% coverage
    # Result: empty test bodies that hit every line
    # Coverage: 100%, mutation kill rate: 0%
    # Quality: worse than before (false confidence)
  when_applies: "Any organization using engineering metrics for goal-setting or performance evaluation"
  sources:
    - "https://en.wikipedia.org/wiki/Goodhart%27s_law"
    - "https://itrevolution.com/articles/four-key-metrics-goodharts-law/"
