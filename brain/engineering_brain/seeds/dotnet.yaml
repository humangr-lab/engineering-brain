layer: rules
technology: .NET
domain: backend
knowledge:
- id: CR-NET-001
  text: Use Minimal APIs for simple endpoints and Controllers for complex APIs with shared concerns. Minimal APIs are concise
    but lack built-in filter pipeline and model binding features.
  why: 'Controllers provide a rich infrastructure: model binding, validation, filters (authorization, exception, action),
    content negotiation, and API versioning out of the box. Minimal APIs strip this away for conciseness but require manual
    implementation of each concern. Choosing wrong leads to either over-engineered simple endpoints or under-featured complex
    APIs.'
  how_to_do_right: '1. Use Minimal APIs for: health checks, simple CRUD, microservices with few endpoints.

    2. Use Controllers for: large APIs with shared authorization, validation, and logging.

    3. Group Minimal API endpoints with MapGroup() and shared filters.

    4. Use TypedResults for compile-time response type checking in Minimal APIs.

    5. Never mix Minimal APIs and Controllers for the same resource.

    '
  severity: medium
  technologies:
    lang: [csharp]
    framework: [dotnet, aspnet_core]
  domains:
    domain: [architecture]
    concern: [backend]
  example_good: "// Minimal API: Simple, concise for small APIs\nvar app = builder.Build();\n\nvar todos = app.MapGroup(\"\
    /api/todos\")\n    .RequireAuthorization()\n    .AddEndpointFilter<ValidationFilter>();\n\ntodos.MapGet(\"/\", async (TodoDb\
    \ db) =>\n    TypedResults.Ok(await db.Todos.ToListAsync()));\n\ntodos.MapGet(\"/{id:int}\", async (int id, TodoDb db)\
    \ =>\n    await db.Todos.FindAsync(id) is Todo todo\n        ? TypedResults.Ok(todo)\n        : TypedResults.NotFound());\n\
    \ntodos.MapPost(\"/\", async (CreateTodoRequest request, TodoDb db) =>\n{\n    var todo = new Todo { Title = request.Title,\
    \ IsComplete = false };\n    db.Todos.Add(todo);\n    await db.SaveChangesAsync();\n    return TypedResults.Created($\"\
    /api/todos/{todo.Id}\", todo);\n});\n\n// Controller: Rich infrastructure for complex APIs\n[ApiController]\n[Route(\"\
    api/[controller]\")]\n[Authorize]\npublic class OrdersController : ControllerBase\n{\n    private readonly IOrderService\
    \ _orderService;\n\n    public OrdersController(IOrderService orderService) => _orderService = orderService;\n\n    [HttpPost]\n\
    \    [ProducesResponseType(typeof(OrderResponse), StatusCodes.Status201Created)]\n    [ProducesResponseType(typeof(ProblemDetails),\
    \ StatusCodes.Status422UnprocessableEntity)]\n    public async Task<IActionResult> Create([FromBody] CreateOrderRequest\
    \ request)\n    {\n        var order = await _orderService.CreateAsync(request);\n        return CreatedAtAction(nameof(GetById),\
    \ new { id = order.Id }, order);\n    }\n}\n"
  example_bad: "// Wrong: Complex logic in Minimal API — no filters, no model validation\napp.MapPost(\"/api/orders\", async\
    \ (HttpContext ctx) =>\n{\n    // Manual auth check — should use RequireAuthorization\n    if (!ctx.User.Identity?.IsAuthenticated\
    \ ?? true)\n        return Results.Unauthorized();\n\n    // Manual JSON deserialization — should use model binding\n\
    \    var body = await JsonSerializer.DeserializeAsync<CreateOrderRequest>(ctx.Request.Body);\n\n    // Manual validation\
    \ — should use validation filter\n    if (string.IsNullOrEmpty(body?.CustomerId))\n        return Results.BadRequest(\"\
    CustomerId is required\");\n\n    // 50 lines of business logic inline\n    // No exception handling, no logging, no response\
    \ type documentation\n});\n"
  when_applies: Projects using .NET, ASP.NET Core, or C#/.NET applications
  when_not_applies: small scripts under 100 lines, single-purpose utilities
  sources: ["https://learn.microsoft.com/en-us/aspnet/core/fundamentals/minimal-apis?view=aspnetcore-9.0"]
- id: CR-NET-002
  text: 'Register services with the correct lifetime: Singleton for stateless shared services, Scoped for per-request services
    (DbContext), Transient for lightweight stateless utilities.'
  why: 'Injecting a Scoped service (DbContext) into a Singleton creates a captive dependency — the DbContext is created once
    and reused across all requests, causing stale data, thread safety violations, and memory leaks. Injecting a Transient
    into a Singleton has the same problem. Lifetime mismatches are the #1 DI bug in ASP.NET Core and cause intermittent, hard-to-reproduce
    failures.'
  how_to_do_right: '1. Singleton: HttpClient, IMemoryCache, configuration services, message bus clients.

    2. Scoped: DbContext, IUnitOfWork, per-request auth context, per-request correlation ID.

    3. Transient: Validators, mappers, lightweight utilities with no state.

    4. Rule: A service can only depend on services with an equal or longer lifetime.

    5. Enable ValidateScopes in development to catch lifetime mismatches at startup.

    '
  severity: critical
  technologies:
    lang: [csharp]
    framework: [dotnet, aspnet_core]
  domains:
    domain: [architecture]
    concern: [backend]
  example_good: "// Program.cs — correct lifetimes\nvar builder = WebApplication.CreateBuilder(args);\n\n// Singleton: shared,\
    \ thread-safe, created once\nbuilder.Services.AddSingleton<IEmailSender, SmtpEmailSender>();\nbuilder.Services.AddSingleton<ICacheService,\
    \ RedisCacheService>();\n\n// Scoped: one per request, disposed at end of request\nbuilder.Services.AddDbContext<AppDbContext>(options\
    \ =>\n    options.UseNpgsql(connectionString));\nbuilder.Services.AddScoped<IOrderRepository, OrderRepository>();\nbuilder.Services.AddScoped<IOrderService,\
    \ OrderService>();\nbuilder.Services.AddScoped<IUnitOfWork, UnitOfWork>();\n\n// Transient: new instance every time, no\
    \ shared state\nbuilder.Services.AddTransient<IValidator<CreateOrderRequest>, CreateOrderValidator>();\n\n// Enable scope\
    \ validation in development\nif (builder.Environment.IsDevelopment())\n{\n    builder.Host.UseDefaultServiceProvider(options\
    \ =>\n    {\n        options.ValidateScopes = true;\n        options.ValidateOnBuild = true;\n    });\n}\n"
  example_bad: '// WRONG: Scoped service in Singleton — captive dependency

    builder.Services.AddSingleton<IOrderService, OrderService>(); // Singleton!

    builder.Services.AddScoped<AppDbContext>();                     // Scoped!


    // OrderService (Singleton) receives AppDbContext (Scoped) in constructor

    // The SAME DbContext is used across ALL requests:

    // - Thread safety violation (DbContext is NOT thread-safe)

    // - Stale data (change tracker accumulates entities from all requests)

    // - Memory leak (tracked entities never released)

    '
  when_applies: Any project using .NET, ASP.NET Core, or C#/.NET applications
  when_not_applies: small scripts under 100 lines, single-purpose utilities
  sources: ["https://learn.microsoft.com/en-us/dotnet/core/extensions/dependency-injection/service-lifetimes"]
- id: CR-NET-003
  text: 'Use the middleware pipeline order correctly: exception handling first, then HTTPS redirect, HSTS, static files, routing,
    CORS, authentication, authorization, then endpoints.'
  why: ASP.NET Core processes middleware in the order registered. Exception handling after authorization means auth errors
    crash instead of returning 401. CORS after authentication means preflight requests fail. Static files after routing means
    every static file request runs through the full routing pipeline unnecessarily. Wrong order causes security holes and
    performance degradation.
  how_to_do_right: '1. UseExceptionHandler first — catches all unhandled exceptions.

    2. UseHsts and UseHttpsRedirection — security headers before any content.

    3. UseStaticFiles — serve static files WITHOUT running the rest of the pipeline.

    4. UseRouting — enables endpoint routing.

    5. UseCors — must be between UseRouting and UseAuthorization.

    6. UseAuthentication, then UseAuthorization — auth before endpoints.

    7. MapControllers/MapEndpoints — last.

    '
  severity: high
  technologies:
    lang: [csharp]
    framework: [dotnet, aspnet_core]
  domains:
    domain: [architecture, security]
    concern: [backend]
  example_good: "var app = builder.Build();\n\n// 1. Exception handling — catches everything below\nif (app.Environment.IsDevelopment())\n\
    \    app.UseDeveloperExceptionPage();\nelse\n    app.UseExceptionHandler(\"/error\");\n\n// 2. Security headers\napp.UseHsts();\n\
    app.UseHttpsRedirection();\n\n// 3. Static files — short-circuits here, skips auth for CSS/JS/images\napp.UseStaticFiles();\n\
    \n// 4. Routing — enables endpoint routing\napp.UseRouting();\n\n// 5. CORS — MUST be between UseRouting and UseAuthorization\n\
    app.UseCors(\"AllowFrontend\");\n\n// 6. Authentication + Authorization\napp.UseAuthentication();\napp.UseAuthorization();\n\
    \n// 7. Rate limiting\napp.UseRateLimiter();\n\n// 8. Endpoints\napp.MapControllers();\napp.MapHealthChecks(\"/health\"\
    );\n"
  example_bad: 'var app = builder.Build();


    app.MapControllers();           // Endpoints before auth!

    app.UseAuthentication();        // Auth after endpoints — never runs

    app.UseAuthorization();         // Authorization after endpoints

    app.UseCors();                  // CORS after auth — preflight fails

    app.UseStaticFiles();           // Static files run through full pipeline

    app.UseExceptionHandler("/error"); // Exception handler last — doesn''t catch anything

    '
  when_applies: Projects using .NET, ASP.NET Core, or C#/.NET applications
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities
  sources: ["https://learn.microsoft.com/en-us/aspnet/core/fundamentals/middleware/?view=aspnetcore-9.0"]
- id: CR-NET-004
  text: Use DbContext as a unit of work with Include/ThenInclude for eager loading. Never lazy-load in loops — it causes N+1
    queries.
  why: EF Core defaults to no lazy loading (unlike EF6). But enabling lazy loading or forgetting eager loading in loops triggers
    N+1 queries — one query for the parent entities, then one per entity for each navigation property accessed. 100 orders
    with 2 navigation properties = 201 queries. Include/ThenInclude loads related data in 1-3 queries.
  how_to_do_right: '1. Use Include() for direct navigation properties.

    2. Use ThenInclude() for nested navigation properties.

    3. Use projection (Select) when you need only specific fields.

    4. Use AsSplitQuery() when Include causes Cartesian explosion.

    5. Profile with LogTo or MiniProfiler to detect N+1 in development.

    '
  severity: critical
  technologies:
    lang: [csharp]
    framework: [dotnet, entity_framework_core]
  domains:
    domain: [architecture, performance]
    concern: [backend, data, database]
  example_good: "// Correct: Eager loading with Include/ThenInclude\npublic async Task<List<Order>> GetPendingOrdersAsync()\n\
    {\n    return await _context.Orders\n        .Include(o => o.Customer)\n        .Include(o => o.Items)\n            .ThenInclude(i\
    \ => i.Product)\n        .Where(o => o.Status == OrderStatus.Pending)\n        .OrderByDescending(o => o.CreatedAt)\n\
    \        .ToListAsync();\n    // 2-3 queries total, regardless of result count\n}\n\n// Projection: Only load what you\
    \ need\npublic async Task<List<OrderSummary>> GetOrderSummariesAsync()\n{\n    return await _context.Orders\n        .Where(o\
    \ => o.Status == OrderStatus.Pending)\n        .Select(o => new OrderSummary\n        {\n            Id = o.Id,\n    \
    \        CustomerName = o.Customer.Name,\n            Total = o.Items.Sum(i => i.Price * i.Quantity),\n            ItemCount\
    \ = o.Items.Count,\n        })\n        .ToListAsync();\n    // Single query with JOIN — most efficient\n}\n\n// Split\
    \ query for Cartesian explosion prevention\npublic async Task<Order?> GetOrderWithAllDetailsAsync(int id)\n{\n    return\
    \ await _context.Orders\n        .Include(o => o.Items).ThenInclude(i => i.Product)\n        .Include(o => o.Payments)\n\
    \        .Include(o => o.ShippingHistory)\n        .AsSplitQuery()  // Separate query per Include — prevents Cartesian\
    \ product\n        .FirstOrDefaultAsync(o => o.Id == id);\n}\n"
  example_bad: "// Wrong: N+1 queries — 1 + N + N*M queries\npublic async Task<List<Order>> GetPendingOrdersAsync()\n{\n \
    \   var orders = await _context.Orders\n        .Where(o => o.Status == OrderStatus.Pending)\n        .ToListAsync();\n\
    \n    foreach (var order in orders)\n    {\n        // Each access triggers a separate query\n        Console.WriteLine(order.Customer.Name);\
    \      // +1 query per order\n        foreach (var item in order.Items)             // +1 query per order\n        {\n\
    \            Console.WriteLine(item.Product.Name);    // +1 query per item\n        }\n    }\n    return orders;\n}\n"
  when_applies: Any project using .NET, Entity Framework Core, or C#/.NET applications
  when_not_applies: low-traffic internal tools, admin dashboards, or batch jobs where latency is irrelevant
  sources: ["https://learn.microsoft.com/en-us/ef/core/querying/related-data/eager"]
- id: CR-NET-005
  text: Use code-first migrations with explicit migration files. Review generated SQL before applying. Never use EnsureCreated()
    in production.
  why: EnsureCreated() creates the database schema without migration history — subsequent schema changes cannot be applied
    without dropping the database. Auto-generated migrations may produce destructive changes (column drops, type changes)
    that are invisible without review. A single unreviewed migration can silently drop a column with production data.
  how_to_do_right: '1. Generate migrations: dotnet ef migrations add MigrationName.

    2. Review the generated C# migration AND the SQL script before applying.

    3. Generate SQL for review: dotnet ef migrations script.

    4. Apply in CI/CD: dotnet ef database update.

    5. Include both Up and Down methods for rollback capability.

    '
  severity: critical
  technologies:
    lang: [csharp]
    framework: [dotnet, entity_framework_core]
  domains:
    domain: [architecture, operations, deployment]
    concern: [backend, data, database]
  example_good: "// Generate migration\n// $ dotnet ef migrations add AddOrderTracking\n\n// Review generated migration\n\
    public partial class AddOrderTracking : Migration\n{\n    protected override void Up(MigrationBuilder migrationBuilder)\n\
    \    {\n        migrationBuilder.AddColumn<string>(\n            name: \"TrackingNumber\",\n            table: \"Orders\"\
    ,\n            type: \"character varying(50)\",\n            maxLength: 50,\n            nullable: true);\n\n        migrationBuilder.CreateIndex(\n\
    \            name: \"IX_Orders_TrackingNumber\",\n            table: \"Orders\",\n            column: \"TrackingNumber\"\
    );\n    }\n\n    protected override void Down(MigrationBuilder migrationBuilder)\n    {\n        migrationBuilder.DropIndex(name:\
    \ \"IX_Orders_TrackingNumber\", table: \"Orders\");\n        migrationBuilder.DropColumn(name: \"TrackingNumber\", table:\
    \ \"Orders\");\n    }\n}\n\n// Generate SQL for DBA review\n// $ dotnet ef migrations script --idempotent -o migration.sql\n\
    \n// Apply in CI/CD\n// $ dotnet ef database update --connection \"$PRODUCTION_DB_URL\"\n"
  example_bad: "// WRONG: EnsureCreated in production — no migration history\npublic class AppDbContext : DbContext\n{\n \
    \   protected override void OnConfiguring(DbContextOptionsBuilder options)\n    {\n        options.UseNpgsql(connectionString);\n\
    \    }\n}\n\n// Startup.cs\nusing var scope = app.Services.CreateScope();\nvar db = scope.ServiceProvider.GetRequiredService<AppDbContext>();\n\
    db.Database.EnsureCreated(); // Creates tables without migration history\n// Next schema change: cannot apply — no migration\
    \ tracking\n// Only option: drop database and recreate (all data lost)\n"
  when_applies: Any project using .NET, Entity Framework Core, or C#/.NET applications
  when_not_applies: stateless microservices with no data persistence, pure computation modules
  sources: ["https://learn.microsoft.com/en-us/ef/core/managing-schemas/migrations/"]
- id: CR-NET-006
  text: Use global query filters for soft delete and multi-tenancy. Apply via OnModelCreating — never rely on developers remembering
    to add WHERE clauses.
  why: Without global filters, every query must remember to add .Where(e => !e.IsDeleted) for soft delete or .Where(e => e.TenantId
    == currentTenant) for multi-tenancy. One forgotten filter exposes deleted data or leaks data across tenants — a data privacy
    violation. Global filters apply automatically to every query, making the default behavior safe.
  how_to_do_right: '1. Configure global query filters in OnModelCreating.

    2. For multi-tenancy, inject tenant context via IHttpContextAccessor.

    3. Use IgnoreQueryFilters() when you explicitly need unfiltered data (admin, audit).

    4. Test that filters are applied by verifying raw SQL output.

    5. Document IgnoreQueryFilters() usage — it bypasses security boundaries.

    '
  severity: high
  technologies:
    lang: [csharp]
    framework: [dotnet, entity_framework_core]
  domains:
    domain: [architecture, security]
    concern: [backend, data, database]
  example_good: "public class AppDbContext : DbContext\n{\n    private readonly ITenantService _tenantService;\n\n    public\
    \ AppDbContext(DbContextOptions options, ITenantService tenantService)\n        : base(options)\n    {\n        _tenantService\
    \ = tenantService;\n    }\n\n    protected override void OnModelCreating(ModelBuilder modelBuilder)\n    {\n        //\
    \ Soft delete: automatically filters deleted records\n        modelBuilder.Entity<Order>()\n            .HasQueryFilter(o\
    \ => !o.IsDeleted);\n\n        modelBuilder.Entity<Customer>()\n            .HasQueryFilter(c => !c.IsDeleted);\n\n  \
    \      // Multi-tenancy: automatically filters by tenant\n        modelBuilder.Entity<Order>()\n            .HasQueryFilter(o\
    \ => o.TenantId == _tenantService.CurrentTenantId);\n    }\n}\n\n// Repository: no filter needed — applied automatically\n\
    public async Task<List<Order>> GetOrdersAsync()\n{\n    return await _context.Orders.ToListAsync();\n    // SQL: SELECT\
    \ * FROM Orders WHERE IsDeleted = false AND TenantId = @tenant\n}\n\n// Admin: explicitly bypass filter when needed\n\
    public async Task<List<Order>> GetAllDeletedOrdersAsync()\n{\n    return await _context.Orders\n        .IgnoreQueryFilters()\n\
    \        .Where(o => o.IsDeleted)\n        .ToListAsync();\n}\n"
  example_bad: "// Wrong: Manual filter — easy to forget, data leak risk\npublic async Task<List<Order>> GetOrdersAsync()\n\
    {\n    return await _context.Orders\n        .Where(o => !o.IsDeleted)  // Must remember on EVERY query\n        .Where(o\
    \ => o.TenantId == _currentTenantId)  // Must remember on EVERY query\n        .ToListAsync();\n}\n\n// One forgotten\
    \ filter in any repository method = data leak\npublic async Task<Order?> GetByIdAsync(int id)\n{\n    return await _context.Orders.FindAsync(id);\n\
    \    // Forgot filters — returns deleted orders AND other tenants' orders!\n}\n"
  when_applies: Projects using .NET, Entity Framework Core, or C#/.NET applications
  when_not_applies: stateless microservices with no data persistence, pure computation modules
  sources: ["https://learn.microsoft.com/en-us/ef/core/querying/filters"]
- id: CR-NET-007
  text: Use compiled queries for hot-path database queries that execute frequently with the same shape. Compiled queries eliminate
    the overhead of expression tree compilation.
  why: Every LINQ query is compiled into SQL at runtime by traversing the expression tree. For hot-path queries (user lookup
    by ID, session validation, permission checks) that execute thousands of times per second, the expression tree compilation
    overhead is 5-10x the actual query execution time. Compiled queries do this compilation once and reuse the result.
  how_to_do_right: '1. Use EF.CompileAsyncQuery for frequently executed queries.

    2. Store compiled queries as static fields for maximum reuse.

    3. Only compile queries that are truly hot paths — profiling first.

    4. Compiled queries cannot use dynamic LINQ (Where with variable predicates).

    5. Measure with BenchmarkDotNet before and after to verify improvement.

    '
  severity: medium
  technologies:
    lang: [csharp]
    framework: [dotnet, entity_framework_core]
  domains:
    domain: [architecture, performance]
    concern: [backend, data, database]
  example_good: "public class UserRepository\n{\n    // Compiled query: expression tree compiled ONCE, reused forever\n  \
    \  private static readonly Func<AppDbContext, string, Task<User?>> _getUserByEmail =\n        EF.CompileAsyncQuery(\n\
    \            (AppDbContext context, string email) =>\n                context.Users\n                    .Include(u =>\
    \ u.Roles)\n                    .FirstOrDefault(u => u.Email == email)\n        );\n\n    private static readonly Func<AppDbContext,\
    \ int, Task<User?>> _getUserById =\n        EF.CompileAsyncQuery(\n            (AppDbContext context, int id) =>\n   \
    \             context.Users\n                    .Include(u => u.Roles)\n                    .FirstOrDefault(u => u.Id\
    \ == id)\n        );\n\n    private readonly AppDbContext _context;\n\n    public async Task<User?> GetByEmailAsync(string\
    \ email)\n    {\n        return await _getUserByEmail(_context, email);\n        // No expression tree compilation — 5-10x\
    \ faster for hot paths\n    }\n\n    public async Task<User?> GetByIdAsync(int id)\n    {\n        return await _getUserById(_context,\
    \ id);\n    }\n}\n"
  example_bad: "// Wrong: Re-compiles expression tree on EVERY call\npublic async Task<User?> GetByEmailAsync(string email)\n\
    {\n    return await _context.Users\n        .Include(u => u.Roles)\n        .FirstOrDefaultAsync(u => u.Email == email);\n\
    \    // Expression tree compiled to SQL on EVERY call\n    // Called 10,000 times/second = 10,000 compilations/second\n\
    }\n"
  when_applies: Projects using .NET, Entity Framework Core, or C#/.NET applications
  when_not_applies: low-traffic internal tools, admin dashboards, or batch jobs where latency is irrelevant
  sources: ["https://learn.microsoft.com/en-us/ef/core/performance/advanced-performance-topics"]
- id: CR-NET-008
  text: Make all I/O operations async using async/await. Never use .Result or .Wait() on Tasks — they cause thread pool starvation
    and deadlocks.
  why: .Result and .Wait() synchronously block the calling thread while waiting for the async operation to complete. In ASP.NET
    Core, this blocks a thread pool thread. Under load, all thread pool threads become blocked waiting for async operations,
    and no threads are available to complete those operations — classic deadlock. The application freezes completely.
  how_to_do_right: '1. Use async/await all the way down — from controller to repository.

    2. Use Task.Run() only for CPU-bound work that should not block the request thread.

    3. Use ValueTask for methods that often complete synchronously (cache hits).

    4. Use CancellationToken to propagate request cancellation.

    5. Use ConfigureAwait(false) in library code (not in ASP.NET Core controllers).

    '
  severity: critical
  technologies:
    lang: [csharp]
    framework: [dotnet, aspnet_core]
  domains:
    domain: [architecture, performance]
    concern: [backend]
  example_good: "// Correct: async all the way down\n[HttpGet(\"{id}\")]\npublic async Task<IActionResult> GetOrder(\n   \
    \ int id,\n    CancellationToken cancellationToken)\n{\n    var order = await _orderService.GetByIdAsync(id, cancellationToken);\n\
    \    if (order is null)\n        return NotFound();\n    return Ok(order);\n}\n\n// Service layer: async\npublic async\
    \ Task<OrderDto?> GetByIdAsync(int id, CancellationToken ct)\n{\n    var order = await _context.Orders\n        .Include(o\
    \ => o.Items)\n        .FirstOrDefaultAsync(o => o.Id == id, ct);\n\n    if (order is null) return null;\n\n    // CPU-bound\
    \ work: use Task.Run with cancellation\n    var report = await Task.Run(\n        () => GenerateOrderReport(order), ct);\n\
    \n    return MapToDto(order, report);\n}\n\n// ValueTask for cache-first patterns\npublic async ValueTask<User?> GetCachedUserAsync(int\
    \ id)\n{\n    if (_cache.TryGetValue(id, out User? user))\n        return user;  // Synchronous return — no allocation\n\
    \n    user = await _context.Users.FindAsync(id);\n    _cache.Set(id, user, TimeSpan.FromMinutes(5));\n    return user;\n\
    }\n"
  example_bad: "// WRONG: .Result causes thread pool starvation and deadlocks\n[HttpGet(\"{id}\")]\npublic IActionResult GetOrder(int\
    \ id)\n{\n    // Blocks thread pool thread while waiting\n    var order = _orderService.GetByIdAsync(id).Result; // DEADLOCK\
    \ RISK\n    return Ok(order);\n}\n\n// WRONG: .Wait() same problem\npublic OrderDto GetById(int id)\n{\n    var order\
    \ = _context.Orders.FirstOrDefaultAsync(o => o.Id == id).Result;\n    // Under load: all thread pool threads blocked here\n\
    \    // No threads available to complete the async DB operation\n    // Application freezes — classic thread pool starvation\n\
    \    return MapToDto(order);\n}\n"
  when_applies: Any project using .NET, ASP.NET Core, or C#/.NET applications
  when_not_applies: low-traffic internal tools, admin dashboards, or batch jobs where latency is irrelevant
  sources: ["https://learn.microsoft.com/en-us/archive/msdn-magazine/2015/july/async-programming-brownfield-async-development"]
- id: CR-NET-009
  text: Use ASP.NET Core Identity for authentication and JWT Bearer for API authentication. Never implement custom authentication
    from scratch.
  why: 'Custom authentication implementations invariably have vulnerabilities: plain text passwords, timing attacks on comparison,
    missing token expiration, predictable token generation, no refresh token rotation. ASP.NET Core Identity handles password
    hashing (PBKDF2), lockout, 2FA, token generation, and claims-based identity. JWT Bearer provides standards-compliant token
    validation.'
  how_to_do_right: '1. Use AddIdentity for web apps with cookies and session management.

    2. Use AddJwtBearer for APIs with token-based authentication.

    3. Configure password requirements (length, complexity) in IdentityOptions.

    4. Enable account lockout to prevent brute-force attacks.

    5. Use refresh tokens with rotation for long-lived API sessions.

    '
  severity: critical
  technologies:
    lang: [csharp]
    framework: [dotnet, aspnet_core]
  domains:
    domain: [architecture, security]
    concern: [backend]
  example_good: "// Program.cs — JWT Bearer authentication for API\nbuilder.Services\n    .AddAuthentication(JwtBearerDefaults.AuthenticationScheme)\n\
    \    .AddJwtBearer(options =>\n    {\n        options.TokenValidationParameters = new TokenValidationParameters\n    \
    \    {\n            ValidateIssuer = true,\n            ValidateAudience = true,\n            ValidateLifetime = true,\n\
    \            ValidateIssuerSigningKey = true,\n            ValidIssuer = builder.Configuration[\"Jwt:Issuer\"],\n    \
    \        ValidAudience = builder.Configuration[\"Jwt:Audience\"],\n            IssuerSigningKey = new SymmetricSecurityKey(\n\
    \                Encoding.UTF8.GetBytes(builder.Configuration[\"Jwt:Key\"]!)),\n            ClockSkew = TimeSpan.FromSeconds(30),\
    \ // Reduce default 5 min skew\n        };\n    });\n\n// Identity with secure password policy\nbuilder.Services.AddIdentity<AppUser,\
    \ IdentityRole>(options =>\n{\n    options.Password.RequiredLength = 12;\n    options.Password.RequireNonAlphanumeric\
    \ = true;\n    options.Lockout.MaxFailedAccessAttempts = 5;\n    options.Lockout.DefaultLockoutTimeSpan = TimeSpan.FromMinutes(15);\n\
    })\n.AddEntityFrameworkStores<AppDbContext>()\n.AddDefaultTokenProviders();\n"
  example_bad: "// WRONG: Custom authentication — full of vulnerabilities\n[HttpPost(\"login\")]\npublic IActionResult Login([FromBody]\
    \ LoginRequest request)\n{\n    var user = _db.Users.FirstOrDefault(u => u.Email == request.Email);\n    // Timing attack:\
    \ different response time for valid vs invalid email\n\n    if (user?.Password != request.Password) // Plain text password\
    \ comparison!\n        return Unauthorized();\n\n    // Predictable token generation\n    var token = Convert.ToBase64String(Encoding.UTF8.GetBytes(user.Id.ToString()));\n\
    \    // No expiration, no signing, no validation\n    return Ok(new { Token = token });\n}\n"
  when_applies: Any project using .NET, ASP.NET Core, or C#/.NET applications
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities
  sources: ["https://learn.microsoft.com/en-us/aspnet/core/security/authentication/identity?view=aspnetcore-9.0", "https://learn.microsoft.com/en-us/aspnet/core/security/authentication/configure-jwt-bearer-authentication?view=aspnetcore-9.0"]
- id: CR-NET-010
  text: Use claim-based authorization with policies for fine-grained access control. Define policies in Program.cs and apply
    with [Authorize(Policy = ...)].
  why: Role-based authorization (Roles = 'Admin') is too coarse for real applications. A manager needs read-write access to
    their department's data but not other departments. Claim-based policies express complex rules (department + role + subscription
    level) declaratively. Policies are testable, auditable, and centrally managed — scattered role checks are none of these.
  how_to_do_right: '1. Define policies in AddAuthorization with RequireClaim, RequireRole, or custom requirements.

    2. Apply with [Authorize(Policy = "PolicyName")] on controllers or endpoints.

    3. Use IAuthorizationHandler for complex authorization logic (resource-based).

    4. Combine policies: [Authorize(Policy = "CanEditOrders")] on the action.

    5. Use resource-based authorization for object-level permissions.

    '
  severity: high
  technologies:
    lang: [csharp]
    framework: [dotnet, aspnet_core]
  domains:
    domain: [architecture, security]
    concern: [backend]
  example_good: "// Program.cs — policy definitions\nbuilder.Services.AddAuthorization(options =>\n{\n    options.AddPolicy(\"\
    CanManageOrders\", policy =>\n        policy.RequireClaim(\"department\", \"sales\", \"operations\")\n              .RequireRole(\"\
    Manager\", \"Admin\"));\n\n    options.AddPolicy(\"PremiumFeature\", policy =>\n        policy.RequireClaim(\"subscription\"\
    , \"premium\", \"enterprise\"));\n\n    // Custom requirement\n    options.AddPolicy(\"CanEditOrder\", policy =>\n   \
    \     policy.AddRequirements(new OrderOwnerRequirement()));\n});\n\n// Custom authorization handler\npublic class OrderOwnerHandler\
    \ : AuthorizationHandler<OrderOwnerRequirement, Order>\n{\n    protected override Task HandleRequirementAsync(\n     \
    \   AuthorizationHandlerContext context,\n        OrderOwnerRequirement requirement,\n        Order order)\n    {\n  \
    \      var userId = context.User.FindFirstValue(ClaimTypes.NameIdentifier);\n        if (order.CreatedByUserId == userId\
    \ || context.User.IsInRole(\"Admin\"))\n        {\n            context.Succeed(requirement);\n        }\n        return\
    \ Task.CompletedTask;\n    }\n}\n\n// Controller: declarative policy\n[Authorize(Policy = \"CanManageOrders\")]\n[HttpPut(\"\
    {id}\")]\npublic async Task<IActionResult> UpdateOrder(int id, UpdateOrderRequest request)\n{\n    var order = await _orderService.GetByIdAsync(id);\n\
    \    // Resource-based authorization\n    var authResult = await _authorizationService.AuthorizeAsync(User, order, \"\
    CanEditOrder\");\n    if (!authResult.Succeeded) return Forbid();\n    // ...\n}\n"
  example_bad: "// Wrong: Role checks scattered in business logic\n[HttpPut(\"{id}\")]\npublic async Task<IActionResult> UpdateOrder(int\
    \ id, UpdateOrderRequest request)\n{\n    // Scattered, easy to forget, hard to audit\n    if (!User.IsInRole(\"Admin\"\
    ) && !User.IsInRole(\"Manager\"))\n        return Forbid();\n\n    // Additional check duplicated in 10 other methods\n\
    \    var dept = User.FindFirstValue(\"department\");\n    if (dept != \"sales\" && dept != \"operations\")\n        return\
    \ Forbid();\n\n    // Can't test authorization separately from business logic\n}\n"
  when_applies: Projects using .NET, ASP.NET Core, or C#/.NET applications
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities
  sources: ["https://learn.microsoft.com/en-us/aspnet/core/security/authorization/policies?view=aspnetcore-9.0"]
- id: CR-NET-011
  text: Use the Data Protection API (DPAPI) for encrypting sensitive data at rest. Never use custom encryption implementations
    or hardcoded keys.
  why: Custom encryption uses static keys, has no key rotation, and often uses insecure algorithms (DES, MD5). DPAPI provides
    automatic key rotation, key ring management, purpose-based isolation (data encrypted for one purpose cannot be decrypted
    by another), and secure key storage. It is the standard for encrypting cookies, tokens, and sensitive configuration data
    in ASP.NET Core.
  how_to_do_right: '1. Inject IDataProtector for encrypting/decrypting data.

    2. Use purpose strings to isolate encryption contexts.

    3. Configure key storage location (file system, Azure Key Vault, Redis).

    4. Configure key lifetime and automatic rotation.

    5. Use TimeLimitedDataProtector for data that should expire.

    '
  severity: high
  technologies:
    lang: [csharp]
    framework: [dotnet, aspnet_core]
  domains:
    domain: [architecture, security]
    concern: [backend]
  example_good: "// Program.cs — configure data protection\nbuilder.Services.AddDataProtection()\n    .SetApplicationName(\"\
    MyApp\")\n    .PersistKeysToFileSystem(new DirectoryInfo(\"/var/keys\"))\n    .SetDefaultKeyLifetime(TimeSpan.FromDays(90))\n\
    \    .ProtectKeysWithCertificate(certificate);\n\n// Service: encrypt/decrypt sensitive data\npublic class TokenService\n\
    {\n    private readonly ITimeLimitedDataProtector _protector;\n\n    public TokenService(IDataProtectionProvider provider)\n\
    \    {\n        _protector = provider\n            .CreateProtector(\"TokenService.PasswordReset\")\n            .ToTimeLimitedDataProtector();\n\
    \    }\n\n    public string CreateResetToken(int userId)\n    {\n        var payload = JsonSerializer.Serialize(new {\
    \ UserId = userId, CreatedAt = DateTime.UtcNow });\n        return _protector.Protect(payload, lifetime: TimeSpan.FromHours(1));\n\
    \        // Encrypted, time-limited, purpose-isolated\n    }\n\n    public int? ValidateResetToken(string token)\n   \
    \ {\n        try\n        {\n            var payload = _protector.Unprotect(token);\n            var data = JsonSerializer.Deserialize<ResetTokenPayload>(payload);\n\
    \            return data?.UserId;\n        }\n        catch (CryptographicException)\n        {\n            return null;\
    \ // Expired, tampered, or wrong purpose\n        }\n    }\n}\n"
  example_bad: "// WRONG: Custom encryption — insecure, no rotation, hardcoded key\npublic class TokenService\n{\n    private\
    \ static readonly byte[] Key = Encoding.UTF8.GetBytes(\"my-secret-key-12\"); // 128-bit!\n    private static readonly\
    \ byte[] IV = new byte[16]; // Zero IV — cryptographic sin\n\n    public string CreateResetToken(int userId)\n    {\n\
    \        using var aes = Aes.Create();\n        aes.Key = Key;  // Hardcoded, never rotated, in source control\n     \
    \   aes.IV = IV;    // Zero IV — same plaintext = same ciphertext\n        // No expiration, no purpose isolation, no\
    \ tampering detection\n    }\n}\n"
  when_applies: Projects using .NET, ASP.NET Core, or C#/.NET applications
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities
  sources: ["https://learn.microsoft.com/en-us/aspnet/core/security/data-protection/introduction?view=aspnetcore-9.0"]
- id: CR-NET-012
  text: Use output caching middleware for cacheable endpoints. Configure Kestrel server limits (request size, connection count,
    timeouts) for production.
  why: 'Without caching, every request for the same product page hits the database. Without Kestrel limits, a single client
    can open unlimited connections or send unlimited request bodies — enabling denial of service. Default Kestrel settings
    are development-friendly but production-hostile: no request size limit means a 10GB request body consumes all server memory.'
  how_to_do_right: '1. Use output caching middleware for GET endpoints that return the same data.

    2. Vary cache by query parameters, headers, or route values.

    3. Configure max request body size (default 30MB — reduce for APIs).

    4. Configure max concurrent connections per server.

    5. Set request and keep-alive timeouts to prevent slowloris attacks.

    '
  severity: high
  technologies:
    lang: [csharp]
    framework: [dotnet, aspnet_core, kestrel]
  domains:
    domain: [architecture, performance, security]
    concern: [backend]
  example_good: "// Program.cs — Output caching\nbuilder.Services.AddOutputCache(options =>\n{\n    options.AddBasePolicy(builder\
    \ => builder.Expire(TimeSpan.FromMinutes(1)));\n    options.AddPolicy(\"ProductList\", builder =>\n        builder.Expire(TimeSpan.FromMinutes(5))\n\
    \               .SetVaryByQuery(\"page\", \"category\")\n               .Tag(\"products\"));\n});\n\n// Endpoint with\
    \ caching\napp.MapGet(\"/api/products\", async (ProductDb db) =>\n    await db.Products.Take(50).ToListAsync())\n    .CacheOutput(\"\
    ProductList\");\n\n// Invalidate on write\napp.MapPost(\"/api/products\", async (Product product, ProductDb db, IOutputCacheStore\
    \ cache) =>\n{\n    db.Products.Add(product);\n    await db.SaveChangesAsync();\n    await cache.EvictByTagAsync(\"products\"\
    , default);\n    return Results.Created($\"/api/products/{product.Id}\", product);\n});\n\n// Kestrel production configuration\n\
    builder.WebHost.ConfigureKestrel(options =>\n{\n    options.Limits.MaxRequestBodySize = 10 * 1024 * 1024; // 10 MB\n \
    \   options.Limits.MaxConcurrentConnections = 1000;\n    options.Limits.MaxConcurrentUpgradedConnections = 100;\n    options.Limits.RequestHeadersTimeout\
    \ = TimeSpan.FromSeconds(30);\n    options.Limits.KeepAliveTimeout = TimeSpan.FromMinutes(2);\n    options.Limits.MinRequestBodyDataRate\
    \ = new MinDataRate(\n        bytesPerSecond: 100, gracePeriod: TimeSpan.FromSeconds(10));\n});\n"
  example_bad: "// Wrong: No caching, no limits\napp.MapGet(\"/api/products\", async (ProductDb db) =>\n    await db.Products.ToListAsync());\n\
    // 10,000 requests/second = 10,000 identical DB queries\n\n// Default Kestrel limits:\n// MaxRequestBodySize = 30 MB (too\
    \ large for most APIs)\n// MaxConcurrentConnections = unlimited (DoS risk)\n// No request rate limit per client\n"
  when_applies: Projects using .NET, ASP.NET Core, Kestrel, or C#/.NET applications
  when_not_applies: low-traffic internal tools, admin dashboards, or batch jobs where latency is irrelevant
  sources: ["https://learn.microsoft.com/en-us/aspnet/core/performance/caching/output?view=aspnetcore-9.0", "https://learn.microsoft.com/en-us/aspnet/core/fundamentals/servers/kestrel/options?view=aspnetcore-9.0"]
