layer: rules
domain: compliance
knowledge:
- id: LGPD-001
  text: >
    Map every personal data processing operation to one of the 10 legal bases in LGPD
    Article 7 before implementing it. The most commonly misused base is "legitimate interest"
    (Art. 7, IX) — it requires a three-part balancing test (necessity, proportionality,
    safeguards) documented in writing. Using the wrong legal basis invalidates the processing
    and exposes the organization to ANPD sanctions up to R$ 50 million per infraction.
  why: >
    Unlike GDPR which has 6 legal bases, LGPD has 10, and Brazilian organizations often
    default to "consent" or "legitimate interest" without performing the required analysis.
    The ANPD's first enforcement actions (2023-2025) focused precisely on organizations that
    processed data without documenting the legal basis. Legitimate interest (Art. 7, IX)
    cannot be used for sensitive data (Art. 11) — a distinct, more restrictive set of bases
    applies. Retroactively changing the legal basis to cover a data subject complaint is
    explicitly prohibited by ANPD guidelines (Nota Técnica 1/2021).
  how_to_do_right: |
    1. For each processing activity, select and document ONE primary legal basis:
       Art. 7, I   — Consent (titulares data subjects must be informed, withdraw anytime)
       Art. 7, II  — Legal obligation (government reporting, labor law compliance)
       Art. 7, III — Public policy enforcement (government entities only)
       Art. 7, IV  — Research (public interest, data minimization mandatory)
       Art. 7, V   — Contract performance (only data strictly necessary for contract)
       Art. 7, VI  — Legal proceedings (data controller's rights defense)
       Art. 7, VII — Life protection
       Art. 7, VIII — Health protection (healthcare providers only)
       Art. 7, IX  — Legitimate interest (requires documented 3-part LIA test)
       Art. 7, X   — Credit protection
    2. Document in ROPA (Record of Processing Activities)
    3. For sensitive data: only Art. 11 bases apply (subset, more restrictive)
    4. For children/teenagers: Art. 14 applies — parental consent mandatory
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi, django]
  domains:
    domain: [compliance, security]
    concern: [lgpd, data_processing, legal_basis]
  example_good: |
    # ropa_registry.py — Record of Processing Activities
    from dataclasses import dataclass
    from enum import Enum
    from datetime import datetime

    class LGPDLegalBasis(Enum):
        CONSENT = "Art. 7, I"
        LEGAL_OBLIGATION = "Art. 7, II"
        CONTRACT = "Art. 7, V"
        LEGITIMATE_INTEREST = "Art. 7, IX"
        CREDIT_PROTECTION = "Art. 7, X"

    @dataclass
    class ProcessingActivity:
        name: str
        purpose: str
        legal_basis: LGPDLegalBasis
        legal_basis_justification: str  # Required for all bases, not just legitimate interest
        data_categories: list[str]
        retention_period_days: int
        documented_at: datetime

    # Example — email marketing
    email_marketing = ProcessingActivity(
        name="Email marketing campaigns",
        purpose="Inform existing customers of relevant product updates",
        legal_basis=LGPDLegalBasis.LEGITIMATE_INTEREST,
        legal_basis_justification=(
            "LIA test performed 2025-01-15: (1) Necessity: minimal personal data used "
            "(name + email only); (2) Proportionality: existing customer relationship, "
            "not cold outreach; (3) Safeguards: unsubscribe in every email, honors all "
            "opt-out requests within 48h. Legitimate interest confirmed."
        ),
        data_categories=["name", "email"],
        retention_period_days=1825,  # 5 years after last purchase
        documented_at=datetime(2025, 1, 15),
    )
  example_bad: |
    # WRONG: No legal basis documentation
    def send_marketing_email(user_email: str, user_name: str):
        # No ROPA entry, no legal basis identified
        # No check if user has consented or if legitimate interest applies
        send_email(user_email, f"Hello {user_name}, check out our new features!")
        # ANPD enforcement risk: processing without documented lawful basis
  when_applies: Before launching any new feature, product, or processing activity that involves Brazilian users' personal data. Also when expanding existing features to process additional data categories.
  sources:
    - "LGPD Art. 7 — Lei 13.709/2018: https://www.planalto.gov.br/ccivil_03/_ato2015-2018/2018/lei/l13709.htm"
    - "ANPD Nota Técnica sobre bases legais: https://www.gov.br/anpd/pt-br"
    - "IAPP Brazil LGPD overview 2025: https://iclg.com/practice-areas/data-protection-laws-and-regulations/brazil"

- id: LGPD-002
  text: >
    Implement all 9 data subject rights from LGPD Article 18 with SLA tracking: access (72h),
    correction (15 days), deletion (15 days if no legal hold), portability (15 days),
    consent withdrawal (immediate effect), and anonymization (30 days). Automate DSAR
    (Data Subject Access Request) intake and response workflow — manual processes fail at
    any scale above 10 requests/month.
  why: >
    ANPD's enforcement priorities include data subject rights violations — specifically,
    organizations that do not respond to data access or deletion requests within reasonable
    timeframes. The LGPD does not specify exact SLAs in all cases, but ANPD guidelines
    and judicial precedents have established 15 days as the standard expectation for most
    requests. In 2024, several Brazilian companies were fined specifically for failing to
    honor deletion requests (Art. 18, VI) in a timely manner.
  how_to_do_right: |
    1. Implement DSAR intake form collecting: CPF (or tax ID), email, request type, description
    2. Send automated acknowledgment email with reference number within 24h
    3. For access requests: compile report of all personal data held, structured by category
    4. For deletion requests: check legal holds (Art. 16 retention obligations) before deleting
    5. For portability: export data in machine-readable format (JSON or CSV) per Art. 18, V
    6. For consent withdrawal: stop processing immediately, do not treat as deletion request
    7. Track all DSARs in a dedicated log with received_at, type, SLA_deadline, completed_at
    8. Alert ops when SLA is 3 days from breach
    9. If data is shared with processors: forward deletion requests to all processors within 5 days
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi, django]
  domains:
    domain: [compliance]
    concern: [lgpd, data_subject_rights, dsar]
  example_good: |
    from enum import Enum
    from datetime import datetime, timedelta, timezone
    from dataclasses import dataclass

    class DSARType(Enum):
        ACCESS = "access"
        CORRECTION = "correction"
        DELETION = "deletion"
        PORTABILITY = "portability"
        CONSENT_WITHDRAWAL = "consent_withdrawal"
        ANONYMIZATION = "anonymization"

    SLA_DAYS = {
        DSARType.ACCESS: 15,
        DSARType.CORRECTION: 15,
        DSARType.DELETION: 15,
        DSARType.PORTABILITY: 15,
        DSARType.CONSENT_WITHDRAWAL: 0,  # Immediate effect
        DSARType.ANONYMIZATION: 30,
    }

    @dataclass
    class DSAR:
        id: str
        user_id: str
        request_type: DSARType
        received_at: datetime
        sla_deadline: datetime
        completed_at: datetime | None = None
        legal_hold_reason: str | None = None

    def create_dsar(user_id: str, request_type: DSARType) -> DSAR:
        now = datetime.now(timezone.utc)
        sla_days = SLA_DAYS[request_type]
        return DSAR(
            id=generate_id(),
            user_id=user_id,
            request_type=request_type,
            received_at=now,
            sla_deadline=now + timedelta(days=sla_days),
        )
  example_bad: |
    # WRONG: Manual email-based DSAR handling
    # support@company.com receives "please delete my data"
    # Email sits in inbox for 3 weeks
    # No tracking, no SLA, no audit trail
    # ANPD cannot verify compliance even if deletion was eventually done
    # Risk: ANPD fine for Art. 18 violation + reputational damage

    # ALSO WRONG: Treating consent withdrawal as deletion
    def process_opt_out(user_id: str):
        # Opt-out ≠ deletion — stops processing for that basis,
        # but data may still be retained under another basis (e.g., Art. 7, II legal obligation)
        delete_user_completely(user_id)  # Too aggressive — may violate data retention requirements
  when_applies: From day one of a product that serves Brazilian users. DSAR handling is not optional — it is a mandatory legal requirement under LGPD Art. 18.
  sources:
    - "LGPD Art. 18 — Lei 13.709/2018: https://www.planalto.gov.br/ccivil_03/_ato2015-2018/2018/lei/l13709.htm"
    - "ANPD guidelines on data subject rights: https://www.gov.br/anpd/pt-br/assuntos/noticias"
    - "LGPD Brazil overview (ICLG 2025): https://iclg.com/practice-areas/data-protection-laws-and-regulations/brazil"

- id: LGPD-003
  text: >
    Implement data retention policies aligned with LGPD Article 16: personal data must be
    deleted or anonymized after the processing purpose ends, unless one of the 4 exception
    bases applies (legal/regulatory compliance, transfer to public entity, titular's exclusive
    use with anonymization, or research with anonymization). Document retention periods
    per data category with specific legal justifications.
  why: >
    LGPD Art. 16 creates an affirmative obligation to delete data when its purpose expires —
    the burden is on the data controller to demonstrate that continued retention has a legal
    basis. Unlimited retention (common in legacy systems) is not compliant. The ANPD has
    specifically noted that "storing data indefinitely for potential future use" does not
    satisfy any exception in Art. 16. Retention periods must be proportional: a one-time
    transaction does not justify 10-year retention of full PII.
  how_to_do_right: |
    1. Define retention schedule per data category:
       - Account data: 5 years after account closure (Art. 7, II — legal obligation)
       - Transaction records: 5 years (Brazilian Civil Code Art. 206)
       - Marketing consent: until withdrawal + 2 years (Art. 7, I evidence)
       - Access logs: 6 months (Marco Civil da Internet Art. 15)
       - Tax/fiscal data: 5 years (CTN Art. 173)
    2. Implement automated deletion job (run daily at low-traffic hours):
       SELECT users where last_activity < NOW() - INTERVAL retention_days AND status = 'closed'
    3. For legal hold: mark record with legal_hold_reason + legal_hold_expiry
    4. Before deletion: check all downstream systems (analytics, DW, backups)
    5. Deletion audit log: who, what, when, why (legal basis for deletion)
    6. Anonymization alternative: replace PII with synthetic data, retain aggregate statistics
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi, django]
  domains:
    domain: [compliance]
    concern: [lgpd, data_retention, deletion]
  example_good: |
    from datetime import datetime, timedelta, timezone
    from dataclasses import dataclass

    @dataclass
    class RetentionPolicy:
        data_category: str
        retention_days: int
        legal_basis: str
        legal_reference: str

    RETENTION_POLICIES = [
        RetentionPolicy("account_pii", 1825, "Legal obligation", "CC Art. 206"),
        RetentionPolicy("transaction_records", 1825, "Fiscal compliance", "CTN Art. 173"),
        RetentionPolicy("marketing_data", 730, "Consent evidence", "LGPD Art. 7, I"),
        RetentionPolicy("access_logs", 180, "Marco Civil", "Lei 12.965/2014 Art. 15"),
        RetentionPolicy("session_data", 30, "Legitimate interest", "LGPD Art. 7, IX"),
    ]

    def should_delete(record_created: datetime, policy: RetentionPolicy) -> bool:
        expiry = record_created + timedelta(days=policy.retention_days)
        return datetime.now(timezone.utc) > expiry

    async def run_retention_cleanup(db) -> dict:
        deleted_counts = {}
        for policy in RETENTION_POLICIES:
            cutoff = datetime.now(timezone.utc) - timedelta(days=policy.retention_days)
            count = await db.execute(
                f"DELETE FROM {policy.data_category} WHERE created_at < :cutoff",
                {"cutoff": cutoff}
            )
            deleted_counts[policy.data_category] = count
        return deleted_counts
  example_bad: |
    # WRONG: No retention policy — data kept forever
    class User(Base):
        __tablename__ = 'users'
        id = Column(Integer, primary_key=True)
        name = Column(String)
        email = Column(String)
        # created_at not even stored — cannot implement retention without it
        # No deletion logic anywhere in codebase
        # LGPD Art. 16 violation from day one
  when_applies: All systems that store personal data. Retention policies must be designed BEFORE data collection begins, not retroactively. Mandatory review annually as regulations evolve.
  sources:
    - "LGPD Art. 16 — Lei 13.709/2018: https://www.planalto.gov.br/ccivil_03/_ato2015-2018/2018/lei/l13709.htm"
    - "Marco Civil da Internet Art. 15 — Lei 12.965/2014: https://www.planalto.gov.br/ccivil_03/_ato2011-2014/2014/lei/l12965.htm"
    - "ANPD Regulatory Agenda 2025-2026: https://www.gov.br/anpd/pt-br"

- id: LGPD-004
  text: >
    Implement privacy-by-design as an architectural principle: personal data collection must
    have a defined purpose (Art. 6, I — finalidade), collection must be limited to what is
    necessary (Art. 6, III — necessidade), and the system must enable all Art. 18 rights
    from initial deployment. These are not features to be added later — they are architectural
    requirements from the first commit.
  why: >
    The ANPD has stated that privacy-by-design and privacy-by-default (Art. 46) are
    mandatory requirements, not recommendations. Systems that collect "all available data"
    for potential future use violate the adequacy and necessity principles of Art. 6.
    Retrofitting LGPD compliance into an existing system costs 10-40x more than designing
    for it from the start. A CPF number stored "in case we need it" that later causes a
    breach is an Art. 46 violation even if it was never actively used.
  how_to_do_right: |
    1. For each model field, document: what, why, legal basis, retention period
    2. Apply field-level access control: roles that don't need PII cannot query it
    3. Separate PII storage from functional data (separate tables or separate services)
    4. Default to non-collection: opt-in for analytics, opt-in for marketing
    5. Minimize collection: instead of storing CPF for KYC validation, store only
       "kyc_verified: bool" after verification (crypto-shredding the CPF)
    6. API design: never return PII fields not needed by the calling endpoint
       (GraphQL projections or explicit DTO mapping per endpoint)
    7. Logging: PII must never appear in application logs — mask before logging
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi, django]
  domains:
    domain: [compliance, security]
    concern: [lgpd, privacy_by_design, data_minimization]
  example_good: |
    from pydantic import BaseModel
    from typing import Annotated

    class PIIField(str):
        """Marker type for fields containing personal data — triggers PII-aware logging."""
        pass

    class UserProfile(BaseModel):
        id: str
        # PII fields — minimal, purpose-documented
        display_name: Annotated[PIIField, "name", "account_display", "Art. 7, V contract"]
        email: Annotated[PIIField, "email", "auth_communication", "Art. 7, V contract"]
        # NOT stored: CPF (stored only during KYC, then crypto-shredded)
        # NOT stored: phone (not needed for core functionality)
        # NOT stored: birth_date (not needed for core functionality)
        kyc_verified: bool  # Result of CPF verification, CPF itself is deleted

    # Safe logging — masks PII before writing to log
    import logging

    class PIIFilter(logging.Filter):
        def filter(self, record):
            if hasattr(record, 'user_email'):
                record.user_email = record.user_email[:3] + "***"
            return True
  example_bad: |
    # WRONG: Collecting all data "for future use"
    class UserBad(Base):
        __tablename__ = 'users'
        id = Column(Integer, primary_key=True)
        name = Column(String)
        email = Column(String)
        cpf = Column(String)           # Collected but never used
        phone = Column(String)          # Collected but never used
        address = Column(String)        # Collected but never used
        birth_date = Column(Date)       # Collected but never used
        income_range = Column(String)   # Sensitive financial data — never used
        # No purpose documented for any field
        # No retention policy
        # LGPD Art. 6, I (finalidade) and Art. 6, III (necessidade) violated
  when_applies: System design and code review stages, before any model or API is implemented. Apply data minimization check as part of PR review template for any model or API change.
  sources:
    - "LGPD Art. 6 — Principles: https://www.planalto.gov.br/ccivil_03/_ato2015-2018/2018/lei/l13709.htm"
    - "ANPD Guia Orientativo sobre bases legais: https://www.gov.br/anpd/pt-br/documentos-e-publicacoes"
    - "LGPD vs GDPR comparison: https://termly.io/resources/articles/brazils-general-data-protection-law/"

- id: LGPD-005
  text: >
    Report personal data breaches to ANPD within 72 hours of awareness using the mandatory
    form at gov.br/anpd, when the breach may cause relevant risk or harm to data subjects
    (LGPD Art. 48). Relevant risk includes: exposure of sensitive data (Art. 11), financial
    data, authentication credentials, or data affecting a large number of individuals.
    Simultaneously notify affected data subjects without undue delay.
  why: >
    ANPD Resolution 1/2021 operationalized Art. 48's breach notification obligation.
    The 72-hour window starts from when the organization becomes "aware" — not from when
    the breach is fully investigated. Partial notifications with updates are accepted;
    delaying notification pending full forensics is not. The ANPD has emphasized that
    failing to notify is an aggravating factor in sanctions — organizations that
    self-report quickly receive more favorable treatment. The US SEC and GDPR supervisory
    authorities have imposed multi-million dollar fines specifically for notification delays.
  how_to_do_right: |
    1. Incident response plan must include: breach detection → 1h assessment → if reportable,
       start 72h clock immediately
    2. Assess reportability: is sensitive data affected? authentication credentials? >1,000 individuals?
    3. Initial ANPD notification (can be incomplete but must be timely):
       - Nature of breach (what happened)
       - Categories and volume of data affected (estimate)
       - Immediate measures taken
       - DPO contact information
    4. Notify affected data subjects: via email + in-app notification, plain language
    5. Document: breach timeline, response actions, assessment rationale
    6. Final report: submit within 30 days with complete forensic findings
    7. Retain all breach documentation for 5 years (evidence of compliance)
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [compliance]
    concern: [lgpd, breach_notification, incident_response]
  example_good: |
    from dataclasses import dataclass, field
    from datetime import datetime, timezone
    from enum import Enum

    class BreachSeverity(Enum):
        LOW = "low"         # Internal only, no PII, no risk to individuals
        MEDIUM = "medium"   # PII exposed but limited scope
        HIGH = "high"       # Sensitive data, credentials, or large scale → ANPD reportable

    @dataclass
    class BreachIncident:
        id: str
        detected_at: datetime
        severity: BreachSeverity
        data_categories_affected: list[str]
        estimated_individuals_affected: int
        anpd_notification_deadline: datetime = field(init=False)
        anpd_notified_at: datetime | None = None
        subjects_notified_at: datetime | None = None

        def __post_init__(self):
            from datetime import timedelta
            if self.severity == BreachSeverity.HIGH:
                # 72-hour window from detection
                self.anpd_notification_deadline = self.detected_at + timedelta(hours=72)

        def is_anpd_deadline_breached(self) -> bool:
            if self.severity != BreachSeverity.HIGH:
                return False
            return datetime.now(timezone.utc) > self.anpd_notification_deadline
  example_bad: |
    # WRONG: Waiting for full forensic investigation before notifying
    def handle_breach(breach_details: dict):
        # "Let's wait until we know exactly what happened"
        # This delays notification beyond the 72-hour window
        # ANPD treats delayed notification as an aggravating factor
        start_full_forensic_investigation()  # Takes 2 weeks
        prepare_perfect_report()              # Takes another week
        notify_anpd()                         # 3 weeks after breach — major LGPD violation

    # ALSO WRONG: Treating all breaches as non-reportable
    def assess_breach_bad(breach: dict) -> bool:
        return False  # Never report — hoping ANPD won't find out
        # ANPD has information sharing agreements with other regulators
        # Non-disclosure is an aggravating factor that increases sanctions
  when_applies: Any incident where personal data of Brazilian users may have been accessed, disclosed, altered, or destroyed without authorization. Err on the side of notification — false positives are not sanctioned.
  sources:
    - "LGPD Art. 48 — Lei 13.709/2018: https://www.planalto.gov.br/ccivil_03/_ato2015-2018/2018/lei/l13709.htm"
    - "ANPD Resolução 1/2021 (breach notification): https://www.gov.br/anpd/pt-br/documentos-e-publicacoes/resolucao-cd-anpd-n1-2021.pdf"
    - "ANPD breach reporting portal: https://www.gov.br/anpd/pt-br"

- id: LGPD-006
  text: >
    Implement granular consent management aligned with LGPD Art. 7, I requirements: consent
    must be free, informed, unambiguous, and for a specific purpose. Consent must be recorded
    with timestamp and the exact version of the consent text shown. A single "I accept terms
    of use" checkbox does not constitute valid LGPD consent for data processing.
  why: >
    LGPD Art. 8 specifies that consent for personal data processing must be in written form
    or another equivalent means demonstrating the data subject's manifestation of will.
    Pre-ticked checkboxes, bundled consent (privacy + terms in one click), or consent
    obtained as a condition of service (when consent is not the legal basis) are all invalid.
    ANPD has specifically addressed cookie consent (which must be separate from terms
    acceptance) and marketing consent (which must be granular per communication channel).
  how_to_do_right: |
    1. Separate consent collection by purpose: analytics, marketing email, push notifications
    2. Store per-consent record: user_id, purpose, consent_text_version, granted_at, ip_address
    3. Consent text must be versioned: if privacy policy changes, re-collect consent
    4. Withdrawal must be as easy as granting: one-click unsubscribe, not buried in settings
    5. For cookies: implement cookie consent banner (separate from terms)
       - Strictly necessary: no consent required
       - Analytics, marketing: require explicit opt-in
    6. For minors (< 16): parental consent required per Art. 14
    7. Process cessation on withdrawal: same-day, not "up to 30 days"
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi, django]
  domains:
    domain: [compliance]
    concern: [lgpd, consent, privacy]
  example_good: |
    from dataclasses import dataclass
    from datetime import datetime, timezone
    from enum import Enum

    class ConsentPurpose(Enum):
        ANALYTICS = "analytics"
        MARKETING_EMAIL = "marketing_email"
        PUSH_NOTIFICATIONS = "push_notifications"
        PERSONALIZATION = "personalization"

    @dataclass
    class ConsentRecord:
        user_id: str
        purpose: ConsentPurpose
        granted: bool  # True=granted, False=withdrawn
        consent_text_version: str  # e.g., "v2.3-2025-01-15"
        recorded_at: datetime
        ip_address: str  # Evidence of informed consent

    async def record_consent(
        user_id: str,
        purpose: ConsentPurpose,
        granted: bool,
        ip_address: str,
        db,
    ) -> ConsentRecord:
        record = ConsentRecord(
            user_id=user_id,
            purpose=purpose,
            granted=granted,
            consent_text_version=CURRENT_CONSENT_VERSION,
            recorded_at=datetime.now(timezone.utc),
            ip_address=ip_address,
        )
        await db.insert("consent_records", record)
        # If withdrawal: immediately stop processing for this purpose
        if not granted:
            await stop_processing_for_purpose(user_id, purpose)
        return record
  example_bad: |
    # WRONG: Single checkbox for all consent purposes
    def register_user_bad(email: str, accepted_terms: bool):
        if not accepted_terms:
            raise ValueError("Must accept terms")
        # One boolean for: terms, privacy policy, marketing, analytics, everything
        # LGPD requires granular consent per purpose
        # "Bundled consent" is explicitly invalid under Art. 8
        user = User(email=email, terms_accepted=True)
        # No consent record, no version tracking, no purpose separation
  when_applies: All user registration flows, marketing opt-ins, cookie consent banners, and any feature that requires consent as its legal basis under LGPD Art. 7, I.
  sources:
    - "LGPD Art. 7 and Art. 8 — Lei 13.709/2018: https://www.planalto.gov.br/ccivil_03/_ato2015-2018/2018/lei/l13709.htm"
    - "ANPD Nota Técnica 1/2021 (legitimate bases): https://www.gov.br/anpd/pt-br/documentos-e-publicacoes"
    - "LGPD overview (usercentrics): https://usercentrics.com/knowledge-hub/brazil-lgpd-general-data-protection-law-overview/"

- id: LGPD-007
  text: >
    Classify sensitive personal data (dados pessoais sensíveis) under LGPD Art. 11 and apply
    stricter processing controls. Sensitive categories require explicit, specific consent or
    a more restrictive set of legal bases (Art. 11, II). Never use "legitimate interest"
    as legal basis for sensitive data processing — it is not permitted under Art. 11.
  why: >
    LGPD Art. 11 creates a distinct, higher-protection category that many engineering teams
    fail to recognize when designing schemas. Biometric data (fingerprints, voice recognition,
    facial recognition) is sensitive under LGPD — the same code that stores a profile photo
    may be processing sensitive data if it runs facial recognition. Health data from a
    wearable, religious affiliation collected during onboarding, or political opinions inferred
    from behavior are all Art. 11 categories. The legal consequences of miscategorizing
    sensitive data as regular PII and applying Art. 7 bases are significant.
  how_to_do_right: |
    1. Sensitive data categories under LGPD Art. 11:
       - Racial or ethnic origin
       - Religious belief
       - Political opinion
       - Trade union membership
       - Health or sex life data
       - Genetic data
       - Biometric data (for identification)
    2. For each database field: tag as sensitive if it falls into above categories
    3. Apply additional access controls: sensitive data tables require separate ACL
    4. Legal bases for sensitive data (Art. 11, II only — not Art. 7):
       - Specific and prominent consent (opt-in, purpose-specific)
       - Legal obligation
       - Research (with anonymization)
       - Exercise of rights in judicial, administrative, or arbitral proceedings
       - Life or physical safety protection
       - Health protection (healthcare professionals only)
       - Fraud prevention (explicit legal authorization needed)
    5. DPO must review all sensitive data processing before implementation
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi, django]
  domains:
    domain: [compliance, security]
    concern: [lgpd, sensitive_data, data_classification]
  example_good: |
    from enum import Enum
    from typing import Annotated

    class DataSensitivity(Enum):
        REGULAR_PII = "regular_pii"       # Art. 7 bases apply
        SENSITIVE_PII = "sensitive_pii"   # Art. 11 bases only

    # Annotate model fields with sensitivity level
    class HealthRecord(BaseModel):
        user_id: str
        # Sensitive under LGPD Art. 11 — only Art. 11, II bases valid
        diagnosis_codes: Annotated[list[str], DataSensitivity.SENSITIVE_PII]
        medications: Annotated[list[str], DataSensitivity.SENSITIVE_PII]
        # Regular PII — Art. 7 bases apply
        appointment_date: Annotated[str, DataSensitivity.REGULAR_PII]

    def check_legal_basis_for_field(field_sensitivity: DataSensitivity, legal_basis: str) -> bool:
        if field_sensitivity == DataSensitivity.SENSITIVE_PII:
            # Legitimate interest (Art. 7, IX) is NOT a valid basis for sensitive data
            if "legitimate_interest" in legal_basis.lower():
                raise ValueError("Legitimate interest cannot be used for sensitive data (LGPD Art. 11)")
        return True
  example_bad: |
    class UserProfile(Base):
        __tablename__ = 'user_profiles'
        id = Column(Integer, primary_key=True)
        name = Column(String)
        # WRONG: Biometric data collected without recognizing it as sensitive
        face_encoding = Column(LargeBinary)  # Facial recognition — LGPD Art. 11 sensitive
        # WRONG: Health data treated as regular data
        bmi = Column(Float)                  # Health data — LGPD Art. 11 sensitive
        # WRONG: Religious data collected without appropriate consent
        dietary_preference = Column(String)  # May infer religious belief — potentially sensitive
        # All these require Art. 11 legal basis, not Art. 7
  when_applies: Whenever a model or feature involves biometric data, health information, genetic data, or any of the LGPD Art. 11 categories. Requires DPO sign-off before implementation.
  sources:
    - "LGPD Art. 11 — Dados pessoais sensíveis: https://www.planalto.gov.br/ccivil_03/_ato2015-2018/2018/lei/l13709.htm"
    - "ANPD Guia sobre tratamento de dados sensíveis: https://www.gov.br/anpd/pt-br/documentos-e-publicacoes"
    - "Wikipedia LGPD overview: https://en.wikipedia.org/wiki/General_Personal_Data_Protection_Law"

- id: LGPD-008
  text: >
    Implement technical security measures for personal data protection per LGPD Article 46:
    encryption at rest, TLS in transit, access logging, and regular security testing.
    Article 46 creates a best-effort obligation (the "state of the art" standard), meaning
    organizations must implement security controls proportional to the risk and sensitivity
    of the data processed.
  why: >
    ANPD's enforcement framework treats Art. 46 violations as strict liability when
    preventable security measures were absent. The "state of the art" standard in 2025 means:
    AES-256 encryption at rest for PII, TLS 1.2+ for all data in transit, MFA for
    administrative access, and documented security testing (SAST + dependency scanning
    at minimum). Companies that suffered breaches from well-known vulnerability classes
    (SQL injection, unencrypted databases) without these basic controls receive maximum
    sanctions. Art. 46 cannot be outsourced to a processor without contractual guarantees.
  how_to_do_right: |
    1. Encryption at rest: enable database transparent data encryption (TDE) or
       application-level field encryption for PII fields (AES-256-GCM)
    2. Encryption in transit: TLS 1.2 minimum for all API endpoints, disable HTTP
    3. Access control: RBAC with least privilege — data analysts cannot access raw PII
    4. Audit logging: all PII access logged with user, timestamp, data category
    5. Security testing: SAST (Bandit + Semgrep) in CI, dependency scanning (pip-audit)
    6. Penetration testing: annually for systems processing sensitive data (Art. 11)
    7. DPA with processors: every vendor/processor must sign LGPD-compliant DPA
    8. Document all security measures in Information Security Policy
    9. Regular security training for development team
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi, django]
  domains:
    domain: [compliance, security]
    concern: [lgpd, security_measures, data_protection]
  example_good: |
    # Security measures checklist for LGPD Art. 46 compliance
    LGPD_SECURITY_CONTROLS = {
        "encryption_at_rest": {
            "standard": "AES-256-GCM per PII field",
            "implementation": "application-level encryption + column-level",
            "verified_by": "quarterly security audit",
        },
        "encryption_in_transit": {
            "standard": "TLS 1.2 minimum (TLS 1.3 preferred)",
            "implementation": "nginx ssl_protocols TLSv1.3 TLSv1.2",
            "verified_by": "sslyze scan in CI pipeline",
        },
        "access_control": {
            "standard": "RBAC with least privilege",
            "implementation": "SQLAlchemy row-level security + API middleware",
            "verified_by": "access rights review quarterly",
        },
        "audit_logging": {
            "standard": "All PII access logged",
            "implementation": "structured logging → immutable CloudWatch Logs",
            "verified_by": "weekly anomaly detection review",
        },
        "security_testing": {
            "standard": "SAST + dependency scanning",
            "implementation": "bandit + semgrep + pip-audit in GitHub Actions",
            "verified_by": "CI gate blocks HIGH findings",
        },
    }
  example_bad: |
    # WRONG: No encryption for PII in database
    class User(Base):
        __tablename__ = 'users'
        cpf = Column(String)    # CPF stored in plaintext — Art. 46 violation
        email = Column(String)  # Email stored in plaintext

    # WRONG: HTTP (not HTTPS) API
    # uvicorn app:app --host 0.0.0.0 --port 8000  # No TLS — all data in transit is exposed

    # WRONG: No access logging
    @app.get("/users/{user_id}/pii")
    async def get_user_pii(user_id: str, db: Session = Depends(get_db)):
        return db.query(User).filter(User.id == user_id).first()
        # No logging of who accessed whose PII — cannot detect insider threat
  when_applies: Every application that processes personal data of Brazilian users. Art. 46 requirements apply from first data collection — not from reaching production scale.
  sources:
    - "LGPD Art. 46 — Lei 13.709/2018: https://www.planalto.gov.br/ccivil_03/_ato2015-2018/2018/lei/l13709.htm"
    - "ANPD security guidelines: https://www.gov.br/anpd/pt-br/documentos-e-publicacoes"
    - "OWASP LGPD alignment: https://owasp.org/www-project-top-ten/"

- id: LGPD-009
  text: >
    Implement technical anonymization (not just pseudonymization) for data used in analytics,
    research, and reporting. LGPD Art. 12 exempts anonymized data from the law's scope;
    pseudonymized data is still personal data. Anonymization is irreversible; pseudonymization
    is reversible. Use k-anonymity (k >= 5) and differential privacy for statistical outputs.
  why: >
    Many organizations mistakenly believe that removing a user's name or replacing their CPF
    with a hash constitutes anonymization. The ANPD, following GDPR precedent, defines
    anonymized data as data that "cannot be associated, directly or indirectly, with an
    individual." A hashed CPF is pseudonymized (reversible with the hash function and a
    CPF list). A dataset with ZIP code + age + gender can re-identify 87% of the US
    population (Sweeney 1997) — the same applies to Brazilian data. Proper anonymization
    requires k-anonymity, l-diversity, or differential privacy applied to the full dataset.
  how_to_do_right: |
    1. Pseudonymization (still LGPD-covered): replace identifier with a reversible token
       stored separately (hash(CPF + secret_salt), mapping stored in key table)
    2. Anonymization (removes LGPD scope): requires k-anonymity where k >= 5
       - Generalize: exact age → age range (25-34)
       - Suppress: records that can't achieve k=5 are dropped from analytics
    3. For aggregate reporting: group by to ensure no cell has < 5 records
    4. For ML training data: apply differential privacy (epsilon <= 1.0 for sensitive data)
    5. Verify anonymization: attempt re-identification with linkage attack using public datasets
    6. Document anonymization method and parameters in ROPA
    7. Anonymized data can be shared without DPA; pseudonymized data requires DPA
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [compliance]
    concern: [lgpd, anonymization, privacy]
  example_good: |
    import pandas as pd

    def anonymize_for_analytics(df: pd.DataFrame, k: int = 5) -> pd.DataFrame:
        """Apply k-anonymity to a dataset. Groups by quasi-identifiers and
        suppresses groups with fewer than k records."""
        quasi_identifiers = ['age_range', 'state', 'gender']

        # Generalize: replace exact values with ranges
        df = df.copy()
        df['age_range'] = pd.cut(df['age'], bins=[0, 18, 25, 35, 50, 65, 100],
                                  labels=['<18', '18-24', '25-34', '35-49', '50-64', '65+'])
        df = df.drop(columns=['age', 'cpf', 'email', 'name'])  # Remove direct identifiers

        # Apply k-anonymity: suppress groups smaller than k
        group_sizes = df.groupby(quasi_identifiers).size()
        valid_groups = group_sizes[group_sizes >= k].index

        # Only retain records belonging to groups with >= k members
        mask = df.set_index(quasi_identifiers).index.isin(valid_groups)
        return df[mask.values].reset_index(drop=True)

    # Before: 10,000 records with CPF, name, exact age
    # After: anonymized dataset, LGPD Art. 12 exemption applies
  example_bad: |
    import hashlib

    def pseudonymize_bad(df):
        # WRONG: Hashing CPF is PSEUDONYMIZATION, not anonymization
        df['cpf'] = df['cpf'].apply(lambda x: hashlib.sha256(x.encode()).hexdigest())
        # This is STILL personal data under LGPD — reversible with CPF list
        # LGPD exemption (Art. 12) does NOT apply
        # All Art. 7 requirements still apply to this dataset
        return df
  when_applies: Building analytics dashboards, training ML models, sharing data with third parties for research, generating reports. Anonymize before leaving the production data boundary.
  sources:
    - "LGPD Art. 12 — Anonymized data: https://www.planalto.gov.br/ccivil_03/_ato2015-2018/2018/lei/l13709.htm"
    - "ANPD guide on anonymization vs pseudonymization: https://www.gov.br/anpd/pt-br/documentos-e-publicacoes"
    - "Sweeney (1997) k-anonymity foundational paper: https://dataprivacylab.org/dataprivacy/projects/kanonymity/"

- id: LGPD-010
  text: >
    Appoint a DPO (Encarregado de Proteção de Dados) and publish their contact on the
    organization's website per LGPD Art. 41. For engineering teams: route all privacy-related
    architectural decisions through DPO sign-off. The DPO must be informed of new personal
    data processing activities before they go to production, not after.
  why: >
    LGPD Art. 41 requires every data controller to appoint a DPO and make their contact
    information publicly available. This is not optional for any size of organization
    processing Brazilian personal data. The DPO's role in engineering is: privacy impact
    assessments (PIAs) for new processing activities, reviewing data sharing agreements
    (DPAs), approving legal basis documentation, and leading breach response. Organizations
    without a DPO cannot demonstrate accountability (Art. 6, X) — a factor ANPD considers
    in sanctions assessment.
  how_to_do_right: |
    1. DPO appointment: designate internal person or external consultant
    2. Publish on website: DPO name (or role), email address, postal address
    3. Engineering integration:
       - New feature with personal data → DPO signs off on PIA before sprint
       - New data processor (vendor) → DPO reviews and signs DPA
       - Incident → DPO notified within 1h, leads ANPD notification decision
    4. PIA template for new features:
       - What data is collected and why?
       - What is the legal basis?
       - Who has access?
       - How long is it retained?
       - What security controls apply?
       - What are the risks to data subjects?
    5. DPO must have authority to stop data processing that lacks legal basis
    6. ANPD may contact DPO directly — ensure contact info is monitored
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [compliance]
    concern: [lgpd, governance, dpo]
  example_good: |
    # privacy_gate.py — Engineering workflow integration
    from dataclasses import dataclass
    from datetime import datetime, timezone

    @dataclass
    class PIARequest:
        feature_name: str
        sprint_id: str
        data_categories: list[str]
        legal_basis: str
        retention_days: int
        dpo_approval: bool = False
        dpo_approved_at: datetime | None = None
        dpo_comments: str = ""

    def check_pia_required(data_categories: list[str]) -> bool:
        """PIA required for any new personal data processing."""
        pii_indicators = ["email", "cpf", "name", "phone", "address", "health", "biometric"]
        return any(indicator in cat.lower()
                   for cat in data_categories
                   for indicator in pii_indicators)

    def gate_deployment(pia: PIARequest) -> None:
        """Block deployment if PIA not approved by DPO."""
        if not pia.dpo_approval:
            raise RuntimeError(
                f"LGPD GATE: Feature '{pia.feature_name}' processes personal data "
                f"but has no DPO approval. Submit PIA to dpo@company.com."
            )
  example_bad: |
    # WRONG: Building features with PII without DPO involvement
    # Sprint planning: "Add CPF field to user profile for KYC"
    # Engineering builds it, deploys to production
    # DPO learns about it 3 months later from an ANPD inquiry
    # No legal basis documented, no consent collected, no retention policy
    # LGPD Art. 41 (DPO) + Art. 6 (accountability) violated
  when_applies: Before any sprint that introduces new personal data collection or processing. DPO sign-off is a hard gate, not a post-implementation review.
  sources:
    - "LGPD Art. 41 — Encarregado: https://www.planalto.gov.br/ccivil_03/_ato2015-2018/2018/lei/l13709.htm"
    - "ANPD DPO appointment guidance: https://www.gov.br/anpd/pt-br/documentos-e-publicacoes"
    - "Termly LGPD guide: https://termly.io/resources/articles/brazils-general-data-protection-law/"
