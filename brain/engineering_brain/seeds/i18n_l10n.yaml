layer: rules
domain: ui
knowledge:
- id: I18N-001
  text: "Separate all translatable strings from code into resource files. Never hardcode user-facing text in components or templates."
  why: >
    Hardcoded strings make translation impossible without modifying source code. A single missed
    string causes a partially-translated UI that erodes user trust. In one project, 200+ hardcoded
    strings were discovered during PT-BR localization, requiring 3 weeks of manual extraction that
    could have been avoided with proper architecture from day one.
  how_to_do_right: |
    1. Use a translation library (i18next for React, python-i18n for FastAPI)
    2. Store all user-facing strings in JSON/YAML resource files under locales/ directory
    3. Use namespaced keys: {module}.{component}.{element} (e.g., "dashboard.header.title")
    4. Run extraction tools (i18next-parser) in CI to catch hardcoded strings
    5. Fail CI build if any untranslated key is detected in the default locale
  severity: high
  technologies:
    lang: [python, javascript]
    framework: [fastapi, react]
    library: [i18next, react-i18next, python-i18n]
  domains:
    domain: [ui, architecture]
    concern: [web]
  example_good: |
    # React component with i18next
    import { useTranslation } from 'react-i18next';

    function WelcomeBanner() {
      const { t } = useTranslation();
      return <h1>{t('home.welcome_title')}</h1>;
    }

    // locales/pt-BR/translation.json
    // { "home": { "welcome_title": "Bem-vindo ao sistema" } }
  example_bad: |
    # Hardcoded string — impossible to translate without code change
    function WelcomeBanner() {
      return <h1>Welcome to the system</h1>;
    }
  when_applies: "Any application that serves users in more than one language, or any PT-BR application that may expand internationally"
  sources: ["https://www.i18next.com/overview/getting-started"]

- id: I18N-002
  text: "PT-BR dates must use dd/mm/yyyy format. Never display mm/dd/yyyy to Brazilian users — it causes data entry errors and confusion."
  why: >
    Brazil uses dd/mm/yyyy exclusively. Displaying 03/04/2026 is interpreted as April 3rd by
    Brazilians but March 4th by Americans. In financial systems, date confusion causes incorrect
    billing, wrong due dates, and compliance violations. A fintech startup lost R$45K in chargebacks
    because invoice dates were displayed in US format, causing customers to miss payment deadlines.
  how_to_do_right: |
    1. Use Intl.DateTimeFormat('pt-BR') in JavaScript for display
    2. Use locale.setlocale(locale.LC_TIME, 'pt_BR.UTF-8') in Python
    3. Store dates as ISO 8601 (yyyy-mm-dd) in the database — format only at display
    4. Use date-fns with pt-BR locale or dayjs with 'DD/MM/YYYY' for formatting
    5. Validate date inputs with dd/mm/yyyy mask on PT-BR forms
  severity: high
  technologies:
    lang: [python, javascript]
    framework: [fastapi, react]
    library: [date-fns, dayjs, babel]
  domains:
    domain: [ui, compliance]
    concern: [domain_specific]
  example_good: |
    // JavaScript — correct PT-BR date formatting
    const formatter = new Intl.DateTimeFormat('pt-BR', {
      day: '2-digit', month: '2-digit', year: 'numeric'
    });
    formatter.format(new Date(2026, 2, 15)); // "15/03/2026"

    # Python — correct PT-BR date formatting
    from babel.dates import format_date
    format_date(date_obj, format='dd/MM/yyyy', locale='pt_BR')
  example_bad: |
    // WRONG: US format shown to Brazilian users
    date.toLocaleDateString('en-US'); // "3/15/2026" — ambiguous

    # WRONG: hardcoded US format
    date_obj.strftime('%m/%d/%Y')  # "03/15/2026" — Brazilians read as day 3
  when_applies: "Any application serving Brazilian users, especially financial, legal, or scheduling systems"
  sources: ["https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Intl/DateTimeFormat"]

- id: I18N-003
  text: "PT-BR currency uses R$ prefix with comma as decimal separator and period as thousands separator (R$ 1.234,56). Never use dot as decimal."
  why: >
    R$ 1.234,56 (one thousand two hundred thirty-four reais and fifty-six centavos) is the only
    correct format. Using R$ 1,234.56 confuses Brazilian users — they read it as one real and
    234.56 centavos. In e-commerce, wrong currency formatting causes cart abandonment rates to
    spike 15-20% because users cannot trust the displayed price.
  how_to_do_right: |
    1. Use Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }) in JavaScript
    2. Use babel.numbers.format_currency(value, 'BRL', locale='pt_BR') in Python
    3. Store monetary values as integers (centavos) in the database to avoid floating point
    4. Format only at the display layer — never store formatted strings
    5. Handle input parsing: strip R$, replace . with empty, replace , with . before converting
  severity: critical
  technologies:
    lang: [python, javascript]
    framework: [fastapi, react]
    library: [babel, intl]
  domains:
    domain: [ui, fintech]
    concern: [domain_specific]
  example_good: |
    // JavaScript — correct BRL formatting
    const formatter = new Intl.NumberFormat('pt-BR', {
      style: 'currency', currency: 'BRL'
    });
    formatter.format(1234.56); // "R$ 1.234,56"

    # Python — correct BRL formatting
    from babel.numbers import format_currency
    format_currency(1234.56, 'BRL', locale='pt_BR')  # "R$ 1.234,56"

    # Store as centavos in DB
    price_centavos = 123456  # R$ 1.234,56
  example_bad: |
    // WRONG: US-style decimal formatting for BRL
    `R$ ${price.toFixed(2)}`  // "R$ 1234.56" — dot as decimal is wrong

    // WRONG: floating point for money
    price = 19.99  // floating point rounding errors accumulate
  when_applies: "Any application handling Brazilian Real (BRL) currency display or input"
  sources: ["https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Intl/NumberFormat"]

- id: I18N-004
  text: "Implement CPF (###.###.###-##) and CNPJ (##.###.###/####-##) input masks with validation. These are mandatory for Brazilian tax, billing, and identity."
  why: >
    CPF (Cadastro de Pessoas Físicas) and CNPJ (Cadastro Nacional da Pessoa Jurídica) are the
    Brazilian equivalents of SSN and EIN. Every financial transaction, invoice (nota fiscal), and
    user registration in Brazil requires one of these. Invalid CPF/CNPJ causes rejected payments,
    blocked invoices, and tax compliance violations. The check digit algorithm catches >99% of
    typos if implemented correctly.
  how_to_do_right: |
    1. Apply input mask: CPF = ###.###.###-## (11 digits), CNPJ = ##.###.###/####-## (14 digits)
    2. Validate check digits using the modulo-11 algorithm (both CPF and CNPJ)
    3. Strip formatting before storing — save only digits in the database
    4. Reject known invalid CPFs (000.000.000-00, 111.111.111-11, etc.)
    5. Use react-imask or cleave.js for frontend masks
    6. Use validate-docbr or pycpfcnpj in Python backend for validation
  severity: critical
  technologies:
    lang: [python, javascript]
    framework: [fastapi, react]
    library: [react-imask, validate-docbr, pycpfcnpj]
  domains:
    domain: [ui, compliance, fintech]
    concern: [domain_specific]
  example_good: |
    # Python — CPF validation with check digits
    from validate_docbr import CPF, CNPJ

    cpf = CPF()
    cpf.validate("123.456.789-09")  # True/False with check digit verification

    # Store stripped in DB
    cpf_digits = "12345678909"  # no formatting

    // React — masked input
    import { IMaskInput } from 'react-imask';
    <IMaskInput mask="000.000.000-00" onAccept={(value) => setCpf(value)} />
  example_bad: |
    # WRONG: No validation — accepts any 11 digits
    def save_cpf(cpf: str):
        db.save(cpf)  # "00000000000" would be accepted

    // WRONG: No mask — user types digits without formatting
    <input type="text" maxLength={11} onChange={e => setCpf(e.target.value)} />
  when_applies: "Any application that registers Brazilian users, processes payments, or generates invoices (nota fiscal) in Brazil"
  sources: ["https://www.gov.br/receitafederal/pt-br/assuntos/orientacao-tributaria/cadastros/cpf"]

- id: I18N-005
  text: "Portuguese pluralization rules differ from English. Portuguese has two forms (singular for 0 and 1, plural for 2+), not English's two forms (singular for 1, plural for everything else)."
  why: >
    In English, "0 items" uses plural form. In Portuguese, "0 item" uses singular — "Nenhum item"
    or "0 item encontrado" is correct. "0 itens encontrados" sounds wrong to native speakers.
    Getting pluralization wrong makes the app feel machine-translated and unprofessional. Users
    notice and lose trust in the product's quality.
  how_to_do_right: |
    1. Configure i18next with pt-BR plural rules: ordinal and cardinal
    2. Use ICU MessageFormat for complex pluralization: {count, plural, =0 {Nenhum item} one {1 item} other {# itens}}
    3. Test with values 0, 1, 2, and large numbers for each pluralized string
    4. Never interpolate bare count + plural noun — always use the pluralization system
    5. Handle gender agreement too: "1 tarefa concluída" vs "2 tarefas concluídas"
  severity: high
  technologies:
    lang: [python, javascript]
    framework: [react]
    library: [i18next, react-intl, icu-messageformat]
  domains:
    domain: [ui, code_quality]
    concern: [web]
  example_good: |
    // i18next with PT-BR plural rules
    // locales/pt-BR/translation.json
    {
      "items_found": "{{count}} item encontrado",
      "items_found_plural": "{{count}} itens encontrados",
      "items_found_zero": "Nenhum item encontrado"
    }

    // Usage
    t('items_found', { count: 0 });  // "Nenhum item encontrado"
    t('items_found', { count: 1 });  // "1 item encontrado"
    t('items_found', { count: 5 });  // "5 itens encontrados"
  example_bad: |
    // WRONG: English pluralization applied to Portuguese
    `${count} itens encontrados`  // "0 itens encontrados" is wrong in PT-BR

    // WRONG: Simple ternary misses zero case
    `${count} ${count === 1 ? 'item' : 'itens'}`  // "0 itens" is wrong
  when_applies: "Any application with PT-BR localization that displays counts, quantities, or list summaries"
  sources: ["https://unicode-org.github.io/cldr-staging/charts/latest/supplemental/language_plural_rules.html"]

- id: I18N-006
  text: "Plan for RTL (right-to-left) text support even if not immediately needed. Use logical CSS properties (margin-inline-start) instead of physical (margin-left) to make RTL adoption trivial."
  why: >
    Adding RTL support retroactively to a large codebase takes 2-4 weeks of refactoring. Using
    logical CSS properties from the start costs zero extra effort and makes RTL work automatically.
    If your product ever expands to Arabic or Hebrew markets, you avoid a complete CSS rewrite.
    Companies like Airbnb and Twitter spent months retrofitting RTL — you can avoid this entirely.
  how_to_do_right: |
    1. Use CSS logical properties: margin-inline-start (not margin-left), padding-inline-end (not padding-right)
    2. Use flexbox/grid — they handle RTL automatically with dir="rtl"
    3. Set dir attribute on html element based on locale
    4. Use text-align: start (not text-align: left)
    5. Avoid absolute positioning for layout — use flexbox order instead
    6. Test with dir="rtl" on html element periodically even if not shipping RTL yet
  severity: high
  technologies:
    lang: [javascript]
    framework: [react]
  domains:
    domain: [ui, architecture]
    concern: [web]
  example_good: |
    /* CSS logical properties — works in both LTR and RTL */
    .sidebar {
      margin-inline-start: 16px;   /* left in LTR, right in RTL */
      padding-inline-end: 8px;     /* right in LTR, left in RTL */
      text-align: start;           /* left in LTR, right in RTL */
      border-inline-start: 2px solid #ccc;
    }

    // React — set direction based on locale
    <html dir={locale === 'ar' ? 'rtl' : 'ltr'} lang={locale}>
  example_bad: |
    /* Physical properties — breaks in RTL */
    .sidebar {
      margin-left: 16px;    /* always left, even in RTL */
      padding-right: 8px;   /* always right, even in RTL */
      text-align: left;     /* always left, even in RTL */
    }
  when_applies: "Any web application that may eventually support RTL languages, or any application following modern CSS best practices"
  sources: ["https://developer.mozilla.org/en-US/docs/Web/CSS/CSS_logical_properties_and_values"]

- id: I18N-007
  text: "Number formatting in PT-BR uses period as thousands separator and comma as decimal (1.234,56). Parse user input accordingly — a comma in a number field is a decimal separator, not a thousands separator."
  why: >
    A Brazilian user typing 1.234,56 means one thousand two hundred thirty-four and 56 hundredths.
    If your parser treats comma as thousands separator (English convention), you read it as 1234.56
    or worse, 1.23456. In financial apps, this means a R$1,234.56 transaction could be processed as
    R$1.23 — a catastrophic data integrity failure that causes financial loss and regulatory issues.
  how_to_do_right: |
    1. Use Intl.NumberFormat('pt-BR') for display formatting
    2. For input parsing: strip periods (thousands), replace comma with dot (decimal)
    3. Validate: after stripping, result should be a valid float
    4. Use input type="text" with mask, not type="number" (number input ignores locale)
    5. Server-side: accept both formats, detect locale from Accept-Language header
    6. Store as numeric type in DB, never as formatted string
  severity: critical
  technologies:
    lang: [python, javascript]
    framework: [fastapi, react]
  domains:
    domain: [ui, fintech]
    concern: [domain_specific]
  example_good: |
    // Parse PT-BR number input
    function parsePtBrNumber(input: string): number {
      // "1.234,56" → "1234.56"
      const cleaned = input.replace(/\./g, '').replace(',', '.');
      const num = parseFloat(cleaned);
      if (isNaN(num)) throw new Error('Invalid number');
      return num;
    }

    // Display
    new Intl.NumberFormat('pt-BR').format(1234.56); // "1.234,56"

    # Python — parse PT-BR number
    import locale
    locale.setlocale(locale.LC_NUMERIC, 'pt_BR.UTF-8')
    locale.atof("1.234,56")  # 1234.56
  example_bad: |
    // WRONG: parseFloat treats comma as string terminator
    parseFloat("1.234,56")  // 1.234 — loses everything after comma

    // WRONG: type="number" ignores locale on most browsers
    <input type="number" step="0.01" />  // User types 1234,56 → NaN
  when_applies: "Any application accepting numeric input from Brazilian users, especially financial, e-commerce, or data entry systems"
  sources: ["https://www.w3.org/International/wiki/Locale-based_text_formatting"]

- id: I18N-008
  text: "Brazilian addresses follow a specific format: Rua/Av, Número, Complemento, Bairro, Cidade-UF, CEP (XXXXX-XXX). Never use US/EU address formats for Brazilian users."
  why: >
    Brazilian addresses have fields that don't exist in US format (Bairro/neighborhood is mandatory
    for delivery), and lack fields common in US (no state spelled out — use 2-letter UF code).
    CEP (ZIP equivalent) has format XXXXX-XXX and validates against Correios API. Using a US-style
    address form causes delivery failures, returned packages, and frustrated customers. Major
    e-commerce sites lose 5-8% of orders due to address formatting issues.
  how_to_do_right: |
    1. Address form fields in order: Logradouro (street), Número, Complemento (apt/suite), Bairro (neighborhood), Cidade (city), UF (2-letter state code), CEP (XXXXX-XXX)
    2. Auto-fill address from CEP using ViaCEP API (GET https://viacep.com.br/ws/{cep}/json/)
    3. Validate CEP format: 5 digits, dash, 3 digits
    4. UF is a dropdown with 27 options (26 states + DF)
    5. Bairro is REQUIRED — delivery companies need it
    6. Complemento is optional but should be prompted (Apto, Bloco, Sala)
  severity: high
  technologies:
    lang: [python, javascript]
    framework: [fastapi, react]
  domains:
    domain: [ui, compliance]
    concern: [domain_specific]
  example_good: |
    // React — Brazilian address form with CEP auto-fill
    async function onCepChange(cep: string) {
      const clean = cep.replace(/\D/g, '');
      if (clean.length === 8) {
        const res = await fetch(`https://viacep.com.br/ws/${clean}/json/`);
        const data = await res.json();
        if (!data.erro) {
          setLogradouro(data.logradouro);
          setBairro(data.bairro);
          setCidade(data.localidade);
          setUf(data.uf);
        }
      }
    }

    # Python — address model
    class BrazilianAddress(BaseModel):
        logradouro: str          # Rua, Avenida, etc.
        numero: str              # House/building number
        complemento: str = ""    # Apt, suite (optional)
        bairro: str              # Neighborhood (REQUIRED)
        cidade: str              # City
        uf: str                  # 2-letter state code (SP, RJ, MG...)
        cep: str                 # XXXXX-XXX format
  example_bad: |
    # WRONG: US-style address form for Brazilian users
    class Address(BaseModel):
        street: str       # Missing bairro
        city: str
        state: str        # Full state name, not 2-letter UF
        zip_code: str     # No CEP mask, no auto-fill
        country: str      # Unnecessary if app is Brazil-only
  when_applies: "Any application that collects or displays addresses for Brazilian users, especially e-commerce, delivery, and registration flows"
  sources: ["https://viacep.com.br/"]

- id: I18N-009
  text: "Brazil spans 4 time zones (BRT/UTC-3, AMT/UTC-4, ACT/UTC-5, FNT/UTC-2). Never assume all Brazilian users are in BRT (Brasília time)."
  why: >
    Manaus (AMT) is 1 hour behind São Paulo (BRT). Scheduling a meeting at 14:00 BRT without
    specifying timezone means Manaus participants arrive at 15:00 local time. For nationwide
    applications, incorrect timezone handling causes missed deadlines, wrong delivery ETAs, and
    scheduling conflicts. Brazil also has inconsistent daylight saving time rules — some states
    observe it, others don't, and the rules changed in 2019.
  how_to_do_right: |
    1. Store all timestamps as UTC in the database
    2. Detect user timezone from browser (Intl.DateTimeFormat().resolvedOptions().timeZone)
    3. Convert to user's local timezone only at display time
    4. Use IANA timezone names (America/Sao_Paulo, America/Manaus, America/Rio_Branco, America/Noronha)
    5. Use pytz or zoneinfo (Python 3.9+) — never manually offset UTC
    6. Display timezone abbreviation next to times for clarity (14:00 BRT)
    7. Use date-fns-tz or luxon for JavaScript timezone conversions
  severity: high
  technologies:
    lang: [python, javascript]
    framework: [fastapi, react]
    library: [pytz, date-fns-tz, luxon]
  domains:
    domain: [ui, reliability]
    concern: [domain_specific]
  example_good: |
    # Python — timezone-aware datetime handling
    from zoneinfo import ZoneInfo
    from datetime import datetime

    # Store as UTC
    utc_now = datetime.now(ZoneInfo("UTC"))

    # Display in user's timezone
    sao_paulo = utc_now.astimezone(ZoneInfo("America/Sao_Paulo"))  # BRT
    manaus = utc_now.astimezone(ZoneInfo("America/Manaus"))        # AMT

    // JavaScript — display in user timezone
    const date = new Date(utcTimestamp);
    date.toLocaleString('pt-BR', { timeZone: 'America/Sao_Paulo' });
  example_bad: |
    # WRONG: Assuming all Brazil is UTC-3
    from datetime import timedelta
    local_time = utc_time - timedelta(hours=3)  # Wrong for Manaus, Acre, Fernando de Noronha

    # WRONG: Naive datetime (no timezone info)
    from datetime import datetime
    now = datetime.now()  # No timezone — ambiguous
  when_applies: "Any application serving users across multiple Brazilian states or scheduling events for geographically distributed users"
  sources: ["https://docs.python.org/3/library/zoneinfo.html"]

- id: I18N-010
  text: "Use translation key naming conventions that are hierarchical, descriptive, and consistent. Keys like 'common.buttons.save' are maintainable; keys like 'str_42' are not."
  why: >
    Translation files grow to thousands of keys. Without naming conventions, you get duplicates
    (btn_save, save_button, save_btn), orphaned keys (removed from code but still in translation
    files), and namespace collisions. A project with 3,000 translation keys and no convention spent
    2 weeks just deduplicating and organizing keys before they could add a new language.
  how_to_do_right: |
    1. Use hierarchical keys: {namespace}.{component}.{element} (e.g., "settings.profile.save_button")
    2. Common strings in shared namespace: "common.buttons.save", "common.labels.email"
    3. Page-specific strings namespaced by page: "dashboard.stats.total_users"
    4. Error messages: "errors.validation.required_field", "errors.api.network_timeout"
    5. Run i18next-parser or similar to extract keys and detect unused ones
    6. Enforce convention with ESLint rule or custom linter
    7. Document convention in CONTRIBUTING.md with examples
  severity: high
  technologies:
    lang: [javascript]
    framework: [react]
    library: [i18next, react-intl]
  domains:
    domain: [ui, code_quality]
    concern: [web]
  example_good: |
    // Structured translation keys
    {
      "common": {
        "buttons": { "save": "Salvar", "cancel": "Cancelar", "delete": "Excluir" },
        "labels": { "email": "E-mail", "password": "Senha" }
      },
      "dashboard": {
        "header": { "title": "Painel de Controle" },
        "stats": { "total_users": "Total de Usuários" }
      },
      "errors": {
        "validation": { "required": "Campo obrigatório" },
        "api": { "timeout": "Servidor não respondeu. Tente novamente." }
      }
    }
  example_bad: |
    // Flat, inconsistent keys — unmaintainable at scale
    {
      "str1": "Salvar",
      "btnCancel": "Cancelar",
      "save_button": "Salvar",       // duplicate of str1
      "error1": "Campo obrigatório",
      "dashTitle": "Painel",
      "the_title_of_dashboard": "Painel de Controle"  // verbose, no convention
    }
  when_applies: "Any application using translation resource files with more than 50 keys"
  sources: ["https://www.i18next.com/translation-function/nesting"]

- id: I18N-011
  text: "Legal texts (terms of service, privacy policy) must be professionally translated and reviewed by a Brazilian lawyer. Machine translation of legal documents creates compliance risk."
  why: >
    Brazil's LGPD (Lei Geral de Proteção de Dados) is the Brazilian equivalent of GDPR. Privacy
    policies must comply with specific LGPD requirements including naming the DPO (Encarregado),
    specifying legal basis for processing, and listing data subject rights. A machine-translated
    privacy policy that omits LGPD-required clauses exposes the company to fines up to 2% of
    revenue (capped at R$50 million per violation). The CDC (Código de Defesa do Consumidor)
    also requires terms of service to be clear and in Portuguese.
  how_to_do_right: |
    1. Hire a Brazilian lawyer to draft PT-BR legal documents (not just translate English ones)
    2. Include LGPD-required sections: legal basis, data retention, DPO contact, data subject rights
    3. Store legal texts as versioned documents (not in translation files)
    4. Display acceptance timestamp and version number when user agrees
    5. Notify users when legal texts change and require re-acceptance
    6. Keep PT-BR as the legally binding version if operating in Brazil
  severity: critical
  technologies:
    lang: [python, javascript]
    framework: [fastapi, react]
  domains:
    domain: [ui, compliance]
    concern: [domain_specific]
  example_good: |
    # Python — versioned legal document acceptance
    class LegalAcceptance(BaseModel):
        user_id: str
        document_type: str        # "terms_of_service" | "privacy_policy"
        document_version: str     # "2.1.0"
        accepted_at: datetime     # UTC timestamp
        ip_address: str           # For audit trail
        locale: str = "pt-BR"    # Language of the accepted document

    # Store legal documents versioned, not in i18n files
    # /legal/pt-BR/privacy_policy_v2.1.0.html
  example_bad: |
    # WRONG: Legal text in translation files — no versioning, no audit trail
    {
      "terms_of_service": "By using this service you agree to..."
    }

    # WRONG: Machine-translated privacy policy
    # Google Translate output lacks LGPD-required clauses
  when_applies: "Any application operating in Brazil that collects personal data or requires user agreements"
  sources: ["https://www.planalto.gov.br/ccivil_03/_ato2015-2018/2018/lei/l13709.htm"]

- id: I18N-012
  text: "Accessibility in Portuguese requires PT-BR alt text, aria-labels, and screen reader-tested content. Do not assume English accessibility labels work for Brazilian users."
  why: >
    Brazilian screen reader users (NVDA, JAWS, VoiceOver) need PT-BR labels to navigate effectively.
    An English aria-label like 'Close dialog' is read aloud in English pronunciation by a Portuguese
    screen reader, making it incomprehensible. Brazil has 6.5 million visually impaired people, and
    the Lei Brasileira de Inclusão (LBI, Law 13.146/2015) requires digital accessibility. Non-compliance
    can result in fines and lawsuits.
  how_to_do_right: |
    1. Include all aria-labels, aria-descriptions, and alt text in translation files
    2. Use semantic HTML elements (nav, main, aside) — screen readers handle them automatically
    3. Test with NVDA or VoiceOver set to Portuguese voice
    4. Alt text should describe image content in PT-BR: "Gráfico mostrando vendas mensais" not "chart"
    5. Form labels must be in PT-BR and associated with inputs via htmlFor/id
    6. Error messages read by screen readers must be in PT-BR and descriptive
    7. Follow WCAG 2.1 AA as minimum, which aligns with Brazilian e-MAG guidelines
  severity: high
  technologies:
    lang: [javascript]
    framework: [react]
  domains:
    domain: [ui, compliance]
    concern: [web]
  example_good: |
    // React — accessible component with translated labels
    import { useTranslation } from 'react-i18next';

    function SearchBar() {
      const { t } = useTranslation();
      return (
        <div role="search" aria-label={t('common.aria.search_section')}>
          <label htmlFor="search-input">{t('common.labels.search')}</label>
          <input
            id="search-input"
            type="search"
            aria-describedby="search-help"
            placeholder={t('common.placeholders.search')}
          />
          <span id="search-help" className="sr-only">
            {t('common.aria.search_help_text')}
          </span>
        </div>
      );
    }

    // locales/pt-BR/translation.json
    // "common.aria.search_section": "Seção de busca"
    // "common.labels.search": "Buscar"
    // "common.aria.search_help_text": "Digite para buscar por nome ou código"
  example_bad: |
    // WRONG: No labels, no translation, inaccessible
    function SearchBar() {
      return (
        <div>
          <input type="text" placeholder="Search..." />
        </div>
      );
    }
  when_applies: "Any web application serving Brazilian users, especially public-facing services subject to LBI accessibility requirements"
  sources: ["https://www.w3.org/TR/WCAG21/"]
