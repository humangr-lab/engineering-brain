layer: rules
domain: sacada
knowledge:

# =============================================================================
# STATE MACHINE INVARIANTS (PSI-001 to PSI-003)
# =============================================================================

- id: PSI-001
  text: "Every entity with a lifecycle MUST have an explicit state machine — states, transitions, guards, and IMPOSSIBLE transitions. If you cannot draw the state diagram, you cannot implement the entity."
  why: >
    Entities without explicit state machines evolve into boolean spaghetti: is_active, is_deleted,
    is_suspended, is_pending, is_verified — with 2^5 = 32 possible combinations, most of which are
    nonsensical (active AND deleted AND pending). An explicit state machine with named states and
    guarded transitions eliminates impossible combinations, makes the lifecycle visible, and gives
    every developer the same mental model. Without it, each developer invents their own interpretation
    of what "active" means, leading to subtle bugs where one code path sets is_active=true while
    another checks status="active" — different fields, different meanings, same entity.
  how_to_do_right: |
    1. For every entity with a lifecycle, draw a state diagram: states as nodes, transitions as edges.
    2. Name every state explicitly: DRAFT, PENDING_REVIEW, APPROVED, ACTIVE, SUSPENDED, ARCHIVED, DELETED.
    3. For every transition, specify the guard (condition that must be true) and the action (side effect).
    4. List IMPOSSIBLE transitions explicitly: "DELETED → ACTIVE is FORBIDDEN" (with reason).
    5. Use a single status field (enum), not multiple booleans.
    6. Implement transitions as a state machine library or explicit transition functions — never raw status updates.
    7. Test: attempt every state×transition combination. Assert that impossible ones raise errors.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Order State Machine
    States: DRAFT → SUBMITTED → CONFIRMED → SHIPPED → DELIVERED → [RETURNED | COMPLETED]
    Terminal: CANCELLED (from any non-terminal state)

    Transitions:
    DRAFT → SUBMITTED: guard(all items in stock), action(reserve inventory)
    SUBMITTED → CONFIRMED: guard(payment captured), action(send confirmation email)
    CONFIRMED → SHIPPED: guard(tracking number assigned), action(notify customer)
    SHIPPED → DELIVERED: guard(carrier confirms delivery), action(start return window timer)
    * → CANCELLED: guard(not DELIVERED and not COMPLETED), action(release inventory, refund payment)

    IMPOSSIBLE: DELIVERED → SUBMITTED, CANCELLED → CONFIRMED, COMPLETED → DRAFT
    Implementation: transitions.py with @require_state decorator
  example_bad: |
    # Order model
    is_confirmed: bool
    is_shipped: bool
    is_cancelled: bool
    is_delivered: bool

    # 2^4 = 16 combinations. Is confirmed+cancelled valid? Is shipped+cancelled valid?
    # Bug: order is_cancelled=True AND is_shipped=True. Warehouse ships cancelled order.
    # Root cause: two concurrent API calls, no state machine guards.
  when_applies: Designing any entity that changes state over time
  sources: ["https://martinfowler.com/bliki/FiniteStateMachine.html"]

- id: PSI-002
  text: "Guard clauses on state transitions are non-negotiable — every transition MUST check preconditions AND enforce them at the database level, not just application code."
  why: >
    Application-level guards are necessary but not sufficient. They protect against normal code paths
    but not against direct database updates, race conditions, or concurrent requests. If the guard
    "order must be CONFIRMED before shipping" exists only in Python code, a concurrent request can
    ship an order that was being cancelled at the same time. Database-level guards (CHECK constraints,
    triggers, or optimistic locking) are the last line of defense. They enforce invariants even when
    application code has bugs, when someone runs a manual SQL query, or when two requests race.
  how_to_do_right: |
    1. Define guards at the application level (Python/service layer) for clear error messages and business logic.
    2. Mirror critical guards at the database level:
       - CHECK constraints for valid state values: CHECK (status IN ('draft', 'confirmed', 'shipped'))
       - Triggers for transition validation: BEFORE UPDATE trigger that validates old_status → new_status
       - Optimistic locking (version column) for concurrent modification detection
    3. For critical financial transitions, use SELECT ... FOR UPDATE to serialize access.
    4. Test guards with concurrent requests: send 100 simultaneous state transitions and verify no invalid states.
    5. Log every guard failure as a warning — they indicate bugs or attack attempts.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Application-level guard
    def ship_order(order_id: UUID) -> Order:
        order = Order.get(order_id)
        if order.status != OrderStatus.CONFIRMED:
            raise InvalidTransition(f"Cannot ship order in {order.status} state")
        order.status = OrderStatus.SHIPPED
        order.save()

    # Database-level guard (PostgreSQL)
    CREATE OR REPLACE FUNCTION validate_order_transition()
    RETURNS TRIGGER AS $$
    BEGIN
      IF OLD.status = 'cancelled' THEN
        RAISE EXCEPTION 'Cannot transition from cancelled state';
      END IF;
      IF NEW.status = 'shipped' AND OLD.status != 'confirmed' THEN
        RAISE EXCEPTION 'Can only ship confirmed orders';
      END IF;
      RETURN NEW;
    END;
    $$ LANGUAGE plpgsql;

    # Optimistic locking
    UPDATE orders SET status = 'shipped', version = version + 1
    WHERE id = $1 AND version = $2;  -- returns 0 rows if concurrent update
  example_bad: |
    # Only application-level guard, no DB protection
    order.status = "shipped"
    order.save()

    # Concurrent request also sets order.status = "cancelled"
    # Last write wins. Order is cancelled but warehouse already shipped it.
    # No optimistic locking, no DB trigger, no SELECT FOR UPDATE.
  when_applies: Implementing any state transition in any entity
  sources: ["https://docs.python.org/3/library/typing.html", "https://refactoring.guru/design-patterns/state"]

- id: PSI-003
  text: "Terminal states must be truly terminal — if DELETED can somehow become ACTIVE again, it's not terminal. Name it ARCHIVED instead and document the resurrection path explicitly."
  why: >
    Terminal states are promises to the rest of the system. When an order is COMPLETED, the inventory
    system releases the reservation permanently. When a user is DELETED, GDPR compliance begins the
    data erasure countdown. If terminal states can be reversed, every system that trusts them must be
    redesigned to handle resurrections. This creates cascading complexity and subtle bugs: the inventory
    system double-counted the reservation, the GDPR countdown created a race condition with the
    undelete. If you need reversibility, use a non-terminal state name (ARCHIVED, SUSPENDED) and
    document the resurrection path explicitly, including all side effects.
  how_to_do_right: |
    1. Define terminal states explicitly: COMPLETED, DELETED, EXPIRED, CANCELLED.
    2. Enforce: no transitions OUT of terminal states. Database trigger + application guard.
    3. If business needs "undo", do NOT undo the terminal state. Create a NEW entity:
       - Cancelled order → New order (with reference to original)
       - Deleted user → New registration (with data import from backup)
    4. If soft-undo is needed, use ARCHIVED instead of DELETED:
       - ARCHIVED → ACTIVE is allowed (with audit log and re-validation)
       - DELETED → anything is FORBIDDEN
    5. Document all side effects of reaching a terminal state:
       - COMPLETED: triggers invoice, releases reservation, starts warranty
       - DELETED: triggers GDPR erasure, revokes tokens, notifies downstream
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Terminal vs. Non-Terminal States
    Terminal (NO transitions out):
    - DELETED: GDPR erasure initiated, all tokens revoked, downstream notified
    - COMPLETED: Invoice generated, warranty started, analytics recorded
    - EXPIRED: Audit log frozen, resources deallocated

    Non-Terminal (reversible with audit):
    - ARCHIVED: Can → ACTIVE (requires admin approval + re-validation)
    - SUSPENDED: Can → ACTIVE (requires compliance review)

    Database enforcement:
    CHECK (NOT (status = 'deleted' AND status != OLD.status))  -- cannot leave deleted
    Application: @terminal_state decorator raises IrreversibleStateError
  example_bad: |
    # "Soft delete" that's actually reversible
    user.is_deleted = True  # "deleted"
    # 3 weeks later:
    user.is_deleted = False  # "undeleted"

    # Problem: GDPR erasure job already ran. Personal data is gone.
    # Problem: Downstream services already cleaned up references.
    # Problem: Analytics counted this user as churned.
    # "Undelete" creates a zombie user with partial data.
  when_applies: Defining lifecycle states for any entity
  sources: ["https://refactoring.guru/design-patterns/state"]

# =============================================================================
# NEGATIVE INVARIANTS — MUST NEVER (PSI-004 to PSI-006)
# =============================================================================

- id: PSI-004
  text: "For every invariant you specify, write its negation as a MUST NEVER — 'balance >= 0' is the invariant; 'balance MUST NEVER go negative' is the enforceable rule that catches bugs."
  why: >
    Positive invariants (balance >= 0) describe desired states. Negative invariants (balance MUST
    NEVER go negative) describe violations that must be detected and prevented. The difference matters
    because enforcement mechanisms are different: positive invariants are checked periodically or
    at boundaries; negative invariants are checked at every mutation. A system that checks "balance
    >= 0 at end of day" misses the intra-day negative balance. A system that enforces "MUST NEVER go
    negative" checks at every debit operation. Negative invariants are also easier to test: you
    try to violate them and assert the system prevents it.
  how_to_do_right: |
    1. For every positive invariant, write the negative form:
       - "Total items = sum of line items" → "Total MUST NEVER differ from sum of line items"
       - "User has exactly one active subscription" → "User MUST NEVER have zero or >1 active subscriptions"
    2. For each MUST NEVER, specify:
       a. Where it's enforced (DB constraint, application guard, runtime assertion)
       b. What happens on violation (reject operation, alert, compensate)
       c. How to test it (specific test case that attempts the violation)
    3. Add MUST NEVER assertions to critical code paths: assert balance >= 0, "INV-FIN-001 violated"
    4. Monitor violations in production: log + alert on every assertion failure.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Invariant Pairs — Financial Module
    INV-FIN-001:
      Positive: Account balance >= 0 for non-credit accounts
      Negative: Account balance MUST NEVER go negative for non-credit accounts
      Enforcement: CHECK constraint on accounts table, application guard on debit()
      On violation: Reject transaction, alert ops, log attempted amount
      Test: test_debit_exceeding_balance_raises_insufficient_funds

    INV-FIN-002:
      Positive: Sum of transaction amounts = account balance delta
      Negative: Transaction log MUST NEVER be inconsistent with balance changes
      Enforcement: Database trigger recalculates balance from transactions on every insert
      On violation: Halt all transactions on account, alert P1, manual reconciliation
      Test: test_concurrent_transactions_maintain_balance_consistency
  example_bad: |
    # "Balance should be positive"
    # No enforcement, no violation handling, no test.
    # Race condition: two concurrent debits both check balance=100,
    # both debit 80, balance goes to -60.
    # Discovered during month-end reconciliation. $50K discrepancy.
  when_applies: Specifying any system invariant, especially financial or data integrity
  sources: ["https://martinfowler.com/articles/replaceThrowWithNotification.html"]

- id: PSI-005
  text: "MUST NEVER invariants require kill switches — when a MUST NEVER is violated in production, the system needs an automated circuit breaker, not a human reading logs at 3 AM."
  why: >
    MUST NEVER invariants represent conditions so severe that continued operation risks data corruption,
    financial loss, or security breach. When a financial invariant is violated (negative balance),
    processing more transactions makes it worse. When a security invariant is violated (unauthorized
    access), allowing more requests expands the breach. Human response time is 15-45 minutes
    (notice alert, wake up, read context, take action). Automated kill switches respond in
    milliseconds. The difference between automated and manual response is the difference between
    "one corrupted record" and "10,000 corrupted records."
  how_to_do_right: |
    1. For every MUST NEVER invariant, define an automated response:
       - HALT: Stop processing related operations (circuit breaker)
       - QUARANTINE: Isolate affected data/requests (dead letter queue)
       - COMPENSATE: Trigger automatic rollback/compensation
       - ALERT: Notify on-call with full context (always, in addition to above)
    2. Implement as circuit breakers with explicit state: CLOSED (normal), OPEN (violation detected), HALF-OPEN (testing recovery).
    3. Define recovery criteria: what must be true before the circuit breaker resets?
    4. Test kill switches regularly: chaos engineering, game days.
    5. Document the blast radius: when this kill switch triggers, what else stops working?
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Kill Switch: INV-FIN-001 (negative balance)
    Trigger: Any debit operation results in balance < 0
    Automated response:
    1. HALT: Pause all debit operations on affected account (circuit breaker OPEN)
    2. QUARANTINE: Move pending debits to dead-letter queue
    3. ALERT: PagerDuty P1 with account_id, attempted_amount, current_balance
    4. LOG: Full transaction trace to forensics table

    Recovery criteria:
    - Manual investigation confirms root cause
    - Balance reconciled with transaction log
    - Circuit breaker manually reset by on-call + team lead (two-person rule)

    Blast radius: Only affected account is blocked. Other accounts unaffected.
    Test: Monthly chaos test — inject negative balance, verify kill switch triggers in <100ms.
  example_bad: |
    # On violation: log.warning("Balance went negative for account %s", account_id)
    # No kill switch. No circuit breaker. No automated response.
    # Log message drowns in 10GB of daily logs. Nobody reads it.
    # 72 hours later: 847 transactions processed on negative balance.
  when_applies: Any MUST NEVER invariant in a production system
  sources: ["https://martinfowler.com/bliki/CircuitBreaker.html"]

- id: PSI-006
  text: "Catalog MUST NEVER invariants by blast radius — a violated auth invariant affects ALL users; a violated cart invariant affects ONE user. Prioritize enforcement by blast radius."
  why: >
    Not all invariant violations are equal. An auth bypass affects every user in the system — it's
    a total security breach. A cart calculation error affects one user's checkout — it's a bug. Both
    are MUST NEVER, but the investment in prevention should be proportional to blast radius. Systems
    with 100 invariants cannot enforce all of them at the database level with circuit breakers. By
    cataloging blast radius, teams can make rational decisions: database-level enforcement for
    global invariants, application-level enforcement for local invariants, monitoring-only for
    informational invariants.
  how_to_do_right: |
    1. Classify every MUST NEVER invariant by blast radius:
       - GLOBAL: Violation affects all users/data (auth, encryption, data corruption)
       - SERVICE: Violation affects one service/domain (payment state, search index)
       - USER: Violation affects one user/session (cart, preferences, session)
       - RECORD: Violation affects one data record (typo, formatting)
    2. Enforcement by blast radius:
       - GLOBAL: Database constraint + circuit breaker + P1 alert + automated recovery
       - SERVICE: Database constraint + P2 alert + manual recovery
       - USER: Application guard + P3 alert + self-service recovery
       - RECORD: Application validation + logging + batch correction
    3. Review catalog quarterly: blast radius can change as the system grows.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # MUST NEVER Catalog by Blast Radius
    | ID          | Invariant                        | Blast Radius | Enforcement              |
    |-------------|----------------------------------|--------------|--------------------------|
    | INV-SEC-001 | Auth token MUST NEVER be forged  | GLOBAL       | DB + circuit breaker + P1 |
    | INV-SEC-002 | PII MUST NEVER appear in logs    | GLOBAL       | Log scrubber + CI scan + P1 |
    | INV-PAY-001 | Payment MUST NEVER be duplicated | SERVICE      | Idempotency key + DB unique + P2 |
    | INV-ORD-001 | Order total MUST NEVER differ    | USER         | Application recalc + P3   |
    |             |   from sum of line items         |              |                          |
    | INV-UI-001  | Display name MUST NEVER contain  | RECORD       | Input validation + log    |
    |             |   HTML tags                      |              |                          |

    Budget allocation: 50% on GLOBAL, 30% on SERVICE, 15% on USER, 5% on RECORD
  example_bad: |
    # All invariants treated equally. Same log.warning() for:
    # - Auth bypass (affects 1M users)
    # - Display name has HTML (affects 1 user)
    # Team spends 3 days investigating HTML in display name
    # while auth bypass goes unnoticed in the same log file.
  when_applies: Organizing and prioritizing invariant enforcement
  sources: ["https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/"]

# =============================================================================
# CONSERVATION AND DATA INTEGRITY INVARIANTS (PSI-007 to PSI-009)
# =============================================================================

- id: PSI-007
  text: "Apply conservation laws to software — money, inventory, and permissions must be conserved across all operations. If $100 enters the system, $100 must be accounted for at all times."
  why: >
    In physics, energy is conserved. In well-designed software, certain quantities must also be
    conserved. Money is the most obvious: if a user pays $100 and gets a $30 refund, $70 must be
    somewhere (platform fee + seller payout + escrow). Inventory is similar: if warehouse has 500
    items and 200 are sold, 300 must be in stock (minus reserved, damaged, returned). Permissions
    follow conservation too: if an admin grants write access, revoking it must restore the original
    state exactly. Conservation violations indicate bugs, fraud, or data corruption. They are the
    most powerful invariants because they can be verified with simple arithmetic.
  how_to_do_right: |
    1. Identify conserved quantities in your domain: money, inventory, permissions, quotas, credits.
    2. For each, write the conservation equation:
       - Money: inflow = outflow + held (at all times, per account)
       - Inventory: initial + received = sold + in_stock + damaged + returned
       - Permissions: granted = active + revoked + expired
    3. Implement double-entry bookkeeping for financial quantities: every debit has a credit.
    4. Run reconciliation jobs that verify conservation equations periodically (hourly for money, daily for inventory).
    5. Alert on any discrepancy, no matter how small. $0.01 discrepancies become $10,000 discrepancies.
    6. Test with property-based testing: generate random sequences of operations, assert conservation holds.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Conservation Law: Money (Double-Entry Bookkeeping)
    Every monetary operation creates TWO ledger entries:
    - User pays $100: DEBIT user_balance $100, CREDIT platform_escrow $100
    - Platform fee $10: DEBIT platform_escrow $10, CREDIT platform_revenue $10
    - Seller payout $90: DEBIT platform_escrow $90, CREDIT seller_balance $90

    Conservation check (runs hourly):
    SUM(all debits) == SUM(all credits)  # Must be true at all times
    user_balance + platform_escrow + platform_revenue + seller_balance == 0  # Zero-sum

    Alert if: |SUM(debits) - SUM(credits)| > $0.00
    Reconciliation frequency: hourly, with P1 alert on any discrepancy
  example_bad: |
    # User pays $100
    user.balance -= 100
    platform.balance += 100

    # Refund $30
    user.balance += 30
    platform.balance -= 30

    # Where did the platform fee go? No ledger entries, no conservation check.
    # Month-end: $47,231 discrepancy. Nobody knows where the money went.
    # 2 weeks of forensic accounting to find the bug.
  when_applies: Any system involving financial transactions, inventory, or quotas
  sources: ["https://martinfowler.com/eaaCatalog/money.html"]

- id: PSI-008
  text: "Referential integrity is not optional — every foreign key must exist, every reference must resolve, every cascade must be documented. Orphaned records are data corruption wearing a disguise."
  why: >
    Orphaned records are the most common form of data corruption in web applications. An order
    references a deleted user. A payment references a cancelled order that was hard-deleted. A
    comment references a product that was removed. Each orphan breaks a query, confuses a report,
    or crashes an API endpoint. The root cause is always the same: foreign keys were not enforced
    at the database level, or deletions were not cascaded properly. "We'll handle it in application
    code" means "we'll handle it until someone forgets or a race condition slips through."
  how_to_do_right: |
    1. Every reference between entities MUST be a database-level foreign key.
    2. For every FK, specify the ON DELETE behavior:
       - CASCADE: Child records deleted with parent (comments on deleted post)
       - SET NULL: Reference cleared, child survives (orders of deleted user → user_id = NULL)
       - RESTRICT: Prevent parent deletion if children exist (user with active orders)
    3. Document all cascades in a "Cascade Map" — trace what happens when each entity type is deleted.
    4. Run orphan detection queries weekly: SELECT * FROM orders WHERE user_id NOT IN (SELECT id FROM users).
    5. For soft-deletes: maintain FK integrity even for soft-deleted records. The reference must still resolve.
    6. Test cascades explicitly: delete a parent, verify all children are in expected state.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Cascade Map — User Deletion
    When User is DELETED (soft-delete, GDPR):
    1. Orders → SET NULL on user_id (orders preserved for financial records, anonymized)
    2. Sessions → CASCADE delete (all sessions terminated immediately)
    3. Comments → SET NULL on author_id, replace display name with "[Deleted User]"
    4. Payments → RESTRICT (cannot delete user with pending payments)
    5. Notifications → CASCADE delete (no value without user)

    Database enforcement:
    ALTER TABLE orders ADD CONSTRAINT fk_user FOREIGN KEY (user_id)
      REFERENCES users(id) ON DELETE SET NULL;
    ALTER TABLE payments ADD CONSTRAINT fk_user FOREIGN KEY (user_id)
      REFERENCES users(id) ON DELETE RESTRICT;

    Orphan detection (weekly cron):
    SELECT o.id FROM orders o LEFT JOIN users u ON o.user_id = u.id
    WHERE o.user_id IS NOT NULL AND u.id IS NULL;
  example_bad: |
    # No foreign keys in database ("for performance")
    # User deleted via SQL: DELETE FROM users WHERE id = 123;
    # Orders still reference user_id = 123. API call: GET /orders/456 → crash
    # Payment references user_id = 123. Monthly report: "Unknown user" × 847 rows
    # 6 months of orphaned records before anyone notices.
  when_applies: Designing any data model with relationships between entities
  sources: ["https://www.postgresql.org/docs/current/ddl-constraints.html"]

- id: PSI-009
  text: "Idempotency is an invariant, not a feature — every write operation must produce the same result whether executed once or N times. Design for network unreliability from day one."
  why: >
    Networks are unreliable. Clients retry. Load balancers re-route. Queues redeliver. Every write
    operation in a distributed system WILL be executed more than once. If creating an order is not
    idempotent, duplicate orders appear. If charging a payment is not idempotent, double charges
    happen. If sending a notification is not idempotent, users get spammed. Idempotency is not a
    "nice to have" for APIs — it is a fundamental invariant of correct distributed systems. Systems
    without idempotency guarantees will corrupt data proportionally to their traffic volume.
  how_to_do_right: |
    1. Every POST/PUT endpoint must accept an idempotency key (UUID, provided by client).
    2. On first request: process normally, store result keyed by idempotency key with TTL (24-72 hours).
    3. On duplicate request (same idempotency key): return stored result without re-processing.
    4. For queues: use message deduplication (SQS dedup ID, Kafka consumer offset tracking).
    5. For database writes: use UPSERT (INSERT ON CONFLICT) instead of INSERT where possible.
    6. Test: send the same request 10 times with the same idempotency key. Assert only 1 side effect.
    7. Monitor: count idempotent hits vs. misses. High hit rate indicates client-side retry storms.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Idempotent Payment Endpoint
    @app.post("/api/v1/payments/charge")
    async def charge_payment(request: ChargeRequest):
        # Check for existing result
        existing = await idempotency_store.get(request.idempotency_key)
        if existing:
            return existing  # Return cached result, no re-processing

        # Process payment
        result = await payment_gateway.charge(request.amount, request.card_token)

        # Store result for future duplicates
        await idempotency_store.set(
            request.idempotency_key, result, ttl=timedelta(hours=72)
        )
        return result

    # Test: 10 identical requests → 1 charge, 10 identical responses
  example_bad: |
    # Non-idempotent payment endpoint
    @app.post("/api/v1/payments/charge")
    async def charge_payment(request: ChargeRequest):
        return await payment_gateway.charge(request.amount)

    # Client timeout → retry → double charge.
    # Load balancer retry → triple charge.
    # Queue redelivery → quadruple charge.
    # User sees 4× charge on credit card statement. Support ticket + chargeback.
  when_applies: Any write operation in any API or message-driven system
  sources: ["https://stripe.com/docs/api/idempotent_requests"]

# =============================================================================
# TEMPORAL AND BUSINESS RULE INVARIANTS (PSI-010 to PSI-012)
# =============================================================================

- id: PSI-010
  text: "Temporal invariants must survive clock skew, timezone confusion, and DST transitions — 'created_at < updated_at' seems obvious until a server's clock drifts backward."
  why: >
    Time in distributed systems is a minefield. Server clocks drift (NTP corrections can jump backward).
    Timezones are political (countries change DST rules mid-year). UTC is not universal (leap seconds
    exist). A temporal invariant like "created_at < updated_at" breaks when a clock correction moves
    time backward, or when a user in UTC+5:30 creates a record that appears to be in the future for
    a server in UTC-8. Temporal invariants must be designed for unreliable clocks: use logical clocks
    (sequence numbers) for ordering, store all timestamps in UTC, and handle the case where the
    physical ordering violates the logical ordering.
  how_to_do_right: |
    1. Store ALL timestamps in UTC. Convert to local time only at display layer.
    2. For ordering guarantees, use logical clocks (sequence numbers, version counters) in addition to timestamps.
    3. For created_at < updated_at: enforce via database trigger, not application code. Handle clock skew gracefully.
    4. For time-based business logic (trial expiration, subscription billing): use date arithmetic, not timestamp comparison.
    5. Test with simulated clock skew: advance system clock 5 minutes, then roll back. Assert invariants hold.
    6. Test DST transitions: create record at 2:30 AM on DST change day. Assert correct behavior.
    7. Document timezone handling strategy in the spec. It's an architectural decision, not an implementation detail.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Temporal Invariant: Order event ordering
    # Physical time (timestamps) for human readability
    # Logical time (sequence numbers) for invariant enforcement

    class OrderEvent:
        timestamp: datetime  # UTC, for display and audit
        sequence: int        # Monotonically increasing, for ordering guarantee
        event_type: str

    # Invariant: events are ordered by sequence, NOT by timestamp
    # This survives clock skew because sequence is server-generated and monotonic

    # Database constraint:
    CREATE UNIQUE INDEX idx_order_event_sequence ON order_events(order_id, sequence);
    # Application: sequence = SELECT MAX(sequence) + 1 FROM order_events WHERE order_id = $1 FOR UPDATE;
  example_bad: |
    # Ordering by timestamp
    events = OrderEvent.query.filter_by(order_id=id).order_by(OrderEvent.created_at)

    # Clock skew: server A creates event at 12:00:01, server B creates event at 12:00:00
    # Events appear out of order. Cancel event appears BEFORE create event.
    # DST: 2:30 AM event stored as 1:30 AM. Now it appears before the 2:00 AM event.
  when_applies: Any system using timestamps for ordering or business logic
  sources: ["https://docs.python.org/3/library/datetime.html", "https://www.iana.org/time-zones"]

- id: PSI-011
  text: "Business rule invariants are the spec's immune system — if the business says 'discount cannot exceed 50%', encode it as an invariant with enforcement at EVERY layer, not just the UI."
  why: >
    Business rules are the domain's laws of physics. "Discount cannot exceed 50%" is not a suggestion
    — it's a constraint that protects revenue. But business rules are often enforced only in the UI
    (max value on an input field), bypassed by API calls, ignored by batch imports, and overridden
    by admin panels. The result: a coupon code gives 90% off because the API endpoint didn't validate,
    or a batch import sets negative prices because the CSV importer skipped validation. Business
    rule invariants must be enforced at every layer: UI, API, service, database. Defense in depth.
  how_to_do_right: |
    1. Extract every business rule from the spec and assign it an ID: BR-001, BR-002, etc.
    2. For each business rule, specify enforcement at every layer:
       - UI: Input validation, disabled buttons, error messages
       - API: Request validation (Pydantic/JSON Schema), 422 on violation
       - Service: Domain logic validation before persistence
       - Database: CHECK constraint, trigger, or stored procedure
    3. Test each enforcement layer independently: bypass UI and call API directly, bypass API and write to DB directly.
    4. Create a "Business Rules Registry" that maps rules to enforcement points.
    5. When business rules change, trace the registry to update all enforcement points.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Business Rule: BR-DISC-001 — Discount cannot exceed 50%
    Enforcement layers:
    1. UI: <input type="number" max="50"> + client-side validation message
    2. API: Pydantic model: discount: float = Field(le=50.0, ge=0.0)
    3. Service: if discount > MAX_DISCOUNT: raise BusinessRuleViolation("BR-DISC-001")
    4. Database: ALTER TABLE order_items ADD CONSTRAINT chk_discount CHECK (discount_pct <= 50.0);

    Test plan:
    - test_ui_rejects_discount_above_50 (Playwright)
    - test_api_returns_422_for_discount_above_50 (pytest)
    - test_service_raises_on_discount_above_50 (pytest)
    - test_db_rejects_discount_above_50 (pytest, direct SQL INSERT)
  example_bad: |
    # Discount validated only in React component
    if (discount > 50) setError("Max discount is 50%")

    # curl -X POST /api/orders -d '{"discount": 90}' → 200 OK, 90% discount applied
    # Batch import CSV with discount=100 → no validation, 100% discount applied
    # Admin panel: discount field has no max. Admin sets 75% "just this once."
    # Revenue loss discovered at quarter-end reconciliation.
  when_applies: Implementing any business rule from the specification
  sources: ["https://martinfowler.com/bliki/RulesEngine.html"]

- id: PSI-012
  text: "Security invariants are ABSOLUTE — they cannot be relaxed for convenience, performance, or deadlines. 'Auth check on every endpoint' is not negotiable, even for internal APIs."
  why: >
    Every security breach traces back to a relaxed security invariant. "We skipped auth on internal
    APIs because they're behind the VPN." Then the VPN was breached. "We disabled rate limiting
    because it was slowing down the load test." Then the load test config went to production. "We
    stored the API key in plaintext because encryption was too slow." Then the database was leaked.
    Security invariants must be treated as laws of nature, not guidelines. They cannot be temporarily
    suspended, partially implemented, or deferred to "after launch." The cost of a security breach
    (regulatory fines, customer trust, remediation) is always orders of magnitude higher than the
    cost of correct implementation.
  how_to_do_right: |
    1. Define security invariants as ABSOLUTE — no exceptions, no temporary relaxation.
    2. Common security invariants:
       - EVERY endpoint requires authentication (including internal APIs)
       - EVERY database query uses parameterized queries (no string concatenation)
       - EVERY password is hashed with bcrypt/argon2 (never MD5/SHA1)
       - EVERY API response excludes stack traces in production
       - EVERY file upload validates content type and size
       - EVERY log entry excludes PII (email, phone, SSN, card numbers)
    3. Enforce in CI: security linter, SAST scan, secret scanner, dependency audit.
    4. Test with adversarial mindset: for each invariant, try to bypass it.
    5. Make violation a blocking P0: no releases with known security invariant violations.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Security Invariants — Absolute, Non-Negotiable
    SEC-INV-001: Every endpoint requires auth.
      Enforcement: FastAPI dependency injection (get_current_user), no endpoint without it.
      CI check: custom linter scans for routes without auth dependency.
      Exception process: NONE. Internal APIs also require service-to-service JWT.

    SEC-INV-002: All queries parameterized.
      Enforcement: SQLAlchemy ORM (no raw SQL), Bandit SAST in CI.
      CI check: bandit -r src/ --tests B608 (hardcoded SQL expressions)
      Exception process: NONE.

    SEC-INV-003: No secrets in code.
      Enforcement: GitLeaks pre-commit hook, GitHub secret scanning.
      CI check: gitleaks detect --source=. in CI pipeline.
      Exception process: NONE. Rotate leaked secret immediately.
  example_bad: |
    # "We'll add auth to internal endpoints later"
    # "Parameterized queries are too verbose, using f-strings for this one query"
    # "API key hardcoded for local development, will fix before deploy"

    # 3 months later: all three shortcuts are still in production.
    # Pentest finds: unauthenticated internal API, SQL injection, hardcoded API key.
    # Remediation cost: 6 weeks of emergency security work + incident response.
  when_applies: Any system design or implementation decision involving security
  sources: ["https://owasp.org/www-project-application-security-verification-standard/"]

# =============================================================================
# INVARIANT ENFORCEMENT AND CROSS-SYSTEM (PSI-013 to PSI-015)
# =============================================================================

- id: PSI-013
  text: "Invariant enforcement has exactly three mechanisms: prevent, detect, correct. Prevention is cheapest, detection is mandatory, correction is the insurance policy you hope you never need."
  why: >
    Invariant violations will happen despite prevention. Networks fail, bugs ship, race conditions
    occur. A system that only prevents violations is fragile — one bug and the invariant is silently
    broken. A system that also detects violations catches the bugs that slipped through prevention.
    A system that also corrects violations recovers automatically from the bugs that detection found.
    The three mechanisms form defense in depth: prevention reduces incidents by 90%, detection catches
    the remaining 10% quickly, correction ensures no incident becomes permanent data corruption.
  how_to_do_right: |
    1. For every invariant, implement all three mechanisms:
       a. PREVENT: Database constraint, application guard, input validation.
       b. DETECT: Periodic reconciliation job, monitoring alert, assertion in code.
       c. CORRECT: Automated compensation, manual runbook, data repair script.
    2. Prevention should stop 99% of violations.
    3. Detection must catch 100% of remaining violations within minutes.
    4. Correction must resolve violations without data loss.
    5. Test all three: attempt violation (test prevention), inject violation directly (test detection), trigger correction (test repair).
    6. Track metrics: prevention rate, mean time to detect, mean time to correct.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Invariant: INV-INV-001 — Inventory count must never be negative

    PREVENT:
    - Application: if item.stock - quantity < 0: raise InsufficientStock()
    - Database: CHECK (stock_count >= 0)
    - Concurrency: SELECT stock_count FROM items WHERE id=$1 FOR UPDATE

    DETECT:
    - Cron job (every hour): SELECT * FROM items WHERE stock_count < 0
    - Real-time: log.critical() on any CHECK constraint violation in error handler
    - Dashboard: Grafana panel showing items with stock_count < 0 (should always be zero)

    CORRECT:
    - Auto: If detected, set stock_count = 0, create adjustment_record with reason "INV-REPAIR"
    - Manual: Runbook in Confluence — investigate transaction log, reconcile with warehouse count
    - Alert: Slack #inventory-alerts + PagerDuty P2
  example_bad: |
    # Prevention only:
    if item.stock - quantity < 0: raise InsufficientStock()

    # No detection: if a race condition bypasses the check, nobody knows.
    # No correction: negative stock stays negative forever.
    # 6 months later: reporting shows -47 units of SKU-1234.
    # "How long has this been negative?" "No idea."
  when_applies: Implementing enforcement for any system invariant
  sources: ["https://martinfowler.com/articles/contracts.html"]

- id: PSI-014
  text: "Cross-system invariants are the hardest to enforce — when System A and System B must agree on a value, neither system 'owns' the truth. You need a reconciliation protocol, not a prayer."
  why: >
    Within a single system, invariants can be enforced with transactions and constraints. Across
    systems, there is no shared transaction. System A says the order is shipped; System B says the
    payment is pending. Who is right? Both are right within their own context, but the cross-system
    invariant ("shipped orders must have captured payments") is violated. This happens because
    distributed systems have no global state — each system has its own eventual consistency window.
    The only reliable solution is periodic reconciliation: compare states across systems and flag
    discrepancies for investigation.
  how_to_do_right: |
    1. Identify all cross-system invariants: "If A is X in System 1, then B must be Y in System 2."
    2. Assign ownership: which system is the source of truth for each data element?
    3. Implement reconciliation jobs:
       - Frequency: proportional to risk (financial: hourly, operational: daily)
       - Scope: compare source-of-truth system against all consumers
       - Output: list of discrepancies with severity classification
    4. Define resolution strategy for each discrepancy type:
       - Auto-fix: if source-of-truth is clearly correct, update consumer automatically
       - Manual review: if both systems might be wrong, queue for human investigation
    5. Track drift metrics: number of discrepancies per reconciliation run, time to resolve.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Cross-System Invariant: Order ↔ Payment consistency
    Invariant: Every order in status=SHIPPED must have a payment in status=CAPTURED
    System A (Orders): source of truth for order status
    System B (Payments): source of truth for payment status

    Reconciliation job (runs hourly):
    1. Query System A: SELECT order_id, status FROM orders WHERE status = 'shipped'
    2. Query System B: SELECT order_id, status FROM payments WHERE order_id IN (...)
    3. Compare: flag orders where payment status != 'captured'

    Resolution:
    - Payment missing entirely → P1 alert, halt shipment, investigate
    - Payment pending → auto-retry capture, alert if >3 retries
    - Payment refunded → auto-cancel shipment, notify warehouse

    Drift metric: target <0.1% discrepancy rate per reconciliation run
  example_bad: |
    # "Orders and payments are always in sync because we use events."
    # Event lost (network issue). Order is SHIPPED, payment is PENDING.
    # No reconciliation. No detection. Discrepancy discovered by user:
    # "I was charged but never received my item" (or vice versa).
    # Manual investigation per complaint. 200 complaints before pattern noticed.
  when_applies: Any system involving data consistency across service boundaries
  sources: ["https://martinfowler.com/articles/data-mesh-principles.html"]

- id: PSI-015
  text: "Document invariants in code, not just in specs — invariants in specs are promises; invariants in code are guarantees. Use assertions, property-based tests, and database constraints."
  why: >
    Specifications are read by humans. Code is executed by machines. An invariant documented only in
    a spec relies on every developer reading the spec, understanding the invariant, and implementing
    it correctly in every relevant code path. An invariant encoded in code (assertion, constraint,
    test) is automatically enforced regardless of whether anyone read the spec. The spec describes
    the intent; the code enforces the reality. When they diverge, the code wins — which means the
    code must be right. Invariants in code also serve as executable documentation: a new developer
    reads the assertion and immediately understands the constraint.
  how_to_do_right: |
    1. For every invariant in the spec, create a corresponding enforcement in code:
       - Database: CHECK constraint, UNIQUE constraint, foreign key, trigger
       - Application: assert statement in critical paths, raising InvariantViolation
       - Test: dedicated test that attempts to violate the invariant
       - Property test: hypothesis/quickcheck test that verifies invariant over random inputs
    2. Name invariants consistently: INV-FIN-001 in spec matches the assertion message in code.
    3. Create an invariant registry (dict or config) mapping invariant IDs to enforcement locations.
    4. In code reviews: for every new feature, ask "which invariants does this affect? Are they all still enforced?"
    5. Run property-based tests in CI: they find invariant violations that unit tests miss.
  severity: high
  technologies:
    lang: [python, fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Invariant INV-FIN-001 encoded at every layer

    # 1. Database
    ALTER TABLE accounts ADD CONSTRAINT chk_non_negative_balance
      CHECK (balance_cents >= 0);

    # 2. Application (Python)
    def debit_account(account_id: UUID, amount_cents: int) -> None:
        account = get_account(account_id)
        new_balance = account.balance_cents - amount_cents
        assert new_balance >= 0, f"INV-FIN-001: balance would go negative ({new_balance})"
        account.balance_cents = new_balance
        account.save()

    # 3. Property-based test (Hypothesis)
    @given(st.lists(st.integers(min_value=-1000, max_value=1000), min_size=1))
    def test_balance_never_negative(transactions):
        account = Account(balance_cents=1000)
        for amount in transactions:
            if account.balance_cents - amount >= 0:
                account.debit(amount)
        assert account.balance_cents >= 0  # INV-FIN-001

    # 4. Invariant registry
    INVARIANTS = {
        "INV-FIN-001": {
            "description": "Account balance must never go negative",
            "db_constraint": "chk_non_negative_balance",
            "assertion": "debit_account() line 5",
            "test": "test_balance_never_negative",
        }
    }
  example_bad: |
    # Spec says: "Balance must never be negative"
    # Code says: account.balance -= amount  (no check)
    # Database: no CHECK constraint
    # Tests: test_debit_reduces_balance (only tests happy path)

    # Invariant lives only in the spec. Nobody reads the spec.
    # Bug introduces negative balance. Nobody notices for 3 months.
  when_applies: Implementing any invariant from a specification
  sources: ["https://docs.python.org/3/reference/simple_stmts.html#the-assert-statement", "https://hypothesis.readthedocs.io/en/latest/"]
