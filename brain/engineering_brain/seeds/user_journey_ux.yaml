layer: rules
domain: general
knowledge:
- id: UJX-001
  text: >
    Map user journeys across 5 stages — Awareness, Consideration, Decision, Retention, Advocacy —
    and instrument each transition with explicit drop-off events. A journey map without analytics
    hooks is decoration, not engineering.
  why: >
    Teams that ship journey maps as static documents never fix the funnel because they can't see
    where users leave. At Userpilot, data shows companies with structured onboarding retain 2–3x
    more users at 30 days. Every unmeasured stage is a black box that hides revenue loss.
    The customer journey analytics market reached $25B by 2026 precisely because static maps
    fail — instrumented maps succeed.
  how_to_do_right: |
    1. Define ONE goal per stage (Awareness: reach landing; Consideration: view pricing;
       Decision: start trial; Retention: use feature 3x/week; Advocacy: share/refer).
    2. Instrument stage transitions with analytics events — fire on enter AND exit.
    3. Capture timestamp + user_id + session_id + referrer on every event.
    4. Build a funnel view showing conversion rate between each pair of stages.
    5. Set alert thresholds: if stage N→N+1 conversion drops >15%, page on-call.
    6. Review funnel weekly; A/B test only ONE change per stage per cycle.
  severity: high
  technologies:
    lang: [javascript, typescript, python]
    framework: [react, nextjs, fastapi]
  domains:
    domain: [ux, analytics, product]
    concern: [conversion_funnel, instrumentation, retention]
  example_good: |
    // Instrument every stage transition with a typed event
    type JourneyStage = 'awareness' | 'consideration' | 'decision' | 'retention' | 'advocacy';

    function trackStageTransition(
      from: JourneyStage,
      to: JourneyStage,
      userId: string,
      metadata: Record<string, unknown> = {}
    ) {
      analytics.track('journey_stage_transition', {
        from_stage: from,
        to_stage: to,
        user_id: userId,
        timestamp: new Date().toISOString(),
        session_id: getSessionId(),
        ...metadata,
      });
    }

    // On trial start (Decision stage entered)
    trackStageTransition('consideration', 'decision', user.id, {
      plan: 'pro',
      source: 'pricing_page',
    });
  example_bad: |
    // Static journey map in a Figma file that nobody updates
    // "Users go from homepage → features → pricing → signup"
    // No events fired, no funnel data, no alerts
    // Product team discovers 90% drop-off at pricing only via quarterly NPS survey
    // 3 months of lost revenue from an invisible bug in the pricing calculator
  when_applies: Any product with a multi-step user flow — SaaS onboarding, e-commerce checkout, mobile app signup
  sources:
    - "https://userpilot.com/blog/mapping-user-journey/"
    - "https://www.statsig.com/perspectives/mapping-the-customer-journey-funnel-analysis-"
    - "https://usermaven.com/blog/how-to-create-a-user-journey-map"

- id: UJX-002
  text: >
    Track drop-off at every funnel step individually, not just start-to-end conversion.
    A/B test only the highest-drop step first. Fixing step 2 when step 4 has 80% abandonment
    is wasted effort.
  why: >
    A typical 5-step checkout funnel with 80% completion at each step yields only 33% end-to-end
    conversion (0.8^5). Improving the weakest step from 80% to 90% yields 39% end-to-end —
    an 18% lift. Improving step 1 (already strong) from 90% to 95% yields only 3% lift.
    Without per-step visibility, engineering effort is misallocated 90% of the time.
  how_to_do_right: |
    1. Define a funnel as an ordered list of required events.
    2. For each consecutive pair (step N → step N+1), compute conversion rate daily.
    3. Rank steps by drop-off: (1 - conversion_rate) * users_entering.
    4. Focus A/B tests exclusively on the top-ranked step until it improves significantly.
    5. Never run simultaneous A/B tests on the same funnel (interaction effects).
    6. Use cohort-based analysis — measure conversion for users who entered in week W.
  severity: high
  technologies:
    lang: [python, sql]
    framework: [postgres, bigquery]
  domains:
    domain: [analytics, product, ux]
    concern: [funnel_analysis, ab_testing, conversion]
  example_good: |
    -- Per-step funnel analysis query
    WITH funnel AS (
      SELECT
        user_id,
        MAX(CASE WHEN event = 'signup_start'   THEN 1 ELSE 0 END) AS step1,
        MAX(CASE WHEN event = 'email_verified'  THEN 1 ELSE 0 END) AS step2,
        MAX(CASE WHEN event = 'profile_created' THEN 1 ELSE 0 END) AS step3,
        MAX(CASE WHEN event = 'first_project'   THEN 1 ELSE 0 END) AS step4,
        MAX(CASE WHEN event = 'invite_sent'     THEN 1 ELSE 0 END) AS step5
      FROM events
      WHERE event_date >= CURRENT_DATE - INTERVAL '30 days'
      GROUP BY user_id
    )
    SELECT
      SUM(step1)                                AS s1_entered,
      ROUND(100.0 * SUM(step2) / SUM(step1), 1) AS s1_to_s2_pct,
      ROUND(100.0 * SUM(step3) / SUM(step2), 1) AS s2_to_s3_pct,
      ROUND(100.0 * SUM(step4) / SUM(step3), 1) AS s3_to_s4_pct,
      ROUND(100.0 * SUM(step5) / SUM(step4), 1) AS s4_to_s5_pct
    FROM funnel;
  example_bad: |
    -- Only tracking start and end — misses the real problem
    SELECT
      COUNT(DISTINCT CASE WHEN event = 'signup_start' THEN user_id END) AS started,
      COUNT(DISTINCT CASE WHEN event = 'invite_sent'  THEN user_id END) AS completed,
      -- Shows 5% overall conversion but team doesn't know WHERE the 95% is lost
      ROUND(100.0 * completed / started, 1) AS conversion_pct
    FROM events;
  when_applies: Any multi-step user flow with >100 users/week entering the funnel
  sources:
    - "https://www.statsig.com/perspectives/mapping-the-customer-journey-funnel-analysis-"
    - "https://salesmotion.io/blog/customer-journey-funnel"

- id: UJX-003
  text: >
    Implement onboarding with progressive disclosure: show only 3–5 actions in the first session.
    Never dump the full feature set at signup. Measure activation milestones, not "tutorial completion."
  why: >
    Cognitive overload at signup is the leading cause of day-1 churn. Users need to reach their
    first "aha moment" — the moment they experience core value — within 5 minutes or they leave.
    HubSpot research shows reducing onboarding steps from 12 to 4 increased activation by 38%.
    Activation (user did the thing that predicts retention) matters more than tutorial completion
    (user clicked through screens).
  how_to_do_right: |
    1. Define activation: the ONE action that best predicts 30-day retention (data-driven).
    2. Remove everything from the onboarding flow that doesn't lead directly to activation.
    3. Show max 3 steps in the initial checklist. Gate additional steps behind the first milestone.
    4. Use contextual tooltips (triggered by user proximity to feature) instead of linear tutorials.
    5. Track time-to-activation per cohort. Target: <5 minutes for core value delivery.
    6. Never block the UI with mandatory tour steps — make them dismissible with one click.
  severity: high
  technologies:
    lang: [typescript, javascript]
    framework: [react, nextjs]
  domains:
    domain: [ux, product, onboarding]
    concern: [activation, progressive_disclosure, retention]
  example_good: |
    // Activation milestone system — track the ONE key action
    const ACTIVATION_EVENT = 'first_project_created'; // data-proven predictor of 30d retention

    function OnboardingChecklist({ user }: { user: User }) {
      // Show only 3 steps initially
      const initialSteps = [
        { id: 'profile', label: 'Complete your profile', done: user.profileComplete },
        { id: 'project', label: 'Create your first project', done: user.hasProject },
        { id: 'invite',  label: 'Invite a teammate',        done: user.hasInvite },
      ];

      // Gate advanced steps — only revealed after activation
      const advancedSteps = user.hasProject
        ? [{ id: 'integration', label: 'Connect your first integration', done: user.hasIntegration }]
        : [];

      return <ChecklistUI steps={[...initialSteps, ...advancedSteps]} />;
    }

    // Contextual tooltip — only shown when user hovers near the feature
    function ContextualTooltip({ targetRef, message }: Props) {
      const [visible, setVisible] = useState(false);
      useProximityDetection(targetRef, 100, () => setVisible(true)); // 100px radius
      return visible ? <Tooltip message={message} onDismiss={() => setVisible(false)} /> : null;
    }
  example_bad: |
    // 12-step mandatory modal tour that blocks the UI
    // Step 1: "Welcome to AppName!" (no value)
    // Step 2: "Here is the sidebar" (user can see it)
    // Step 3: "Here is the main canvas" (user can see it)
    // ... 9 more steps ...
    // User clicks through without reading, sees nothing of value, churns on day 1
    // Completion rate: 94%. Activation rate: 8%. Team celebrates completion rate.
  when_applies: Any product with a signup-to-value onboarding flow, especially B2B SaaS
  sources:
    - "https://userpilot.com/blog/saas-user-onboarding-funnel/"
    - "https://www.nngroup.com/articles/visibility-system-status/"

- id: UJX-004
  text: >
    Write error messages that state what happened, why, and exactly what to do next.
    Never say "Something went wrong." Preserve user input during error recovery.
    Every error must have a recovery action.
  why: >
    Nielsen Norman Group's usability heuristic #9 states error messages must help users
    recognize, diagnose, and recover from errors. Vague messages like "Error 500" cause users
    to lose work and abandon the flow. In one Baymard Institute study, 22% of cart abandonment
    is caused by confusing error messages at checkout. Preserving form state during errors
    is the minimum bar — losing typed data is unforgivable.
  how_to_do_right: |
    1. Error message formula: [What happened] + [Why it happened] + [How to fix it].
    2. Preserve all user input in state — never clear fields on error.
    3. Auto-focus the first field that needs correction after form validation.
    4. Provide a concrete next action (button/link), not just text.
    5. Show inline errors next to the field, not only at the top of the form.
    6. Never use color alone to indicate an error (WCAG 1.4.1) — use icon + text + color.
    7. Log errors server-side with enough context to reproduce without user report.
  severity: high
  technologies:
    lang: [typescript, javascript]
    framework: [react, nextjs]
  domains:
    domain: [ux, accessibility, error_handling]
    concern: [error_messages, form_ux, state_preservation]
  example_good: |
    // Error with clear message, preserved state, and recovery action
    function PaymentForm() {
      const [formData, setFormData] = useState({ card: '', expiry: '', cvv: '' });
      const [errors, setErrors] = useState<Record<string, string>>({});
      const [globalError, setGlobalError] = useState('');

      async function handleSubmit() {
        try {
          await processPayment(formData);
        } catch (err) {
          if (err.code === 'CARD_DECLINED') {
            setGlobalError(
              'Your card was declined. Please check your card details or try a different card.'
            );
            // formData is PRESERVED — user does not retype everything
          } else if (err.code === 'INSUFFICIENT_FUNDS') {
            setGlobalError(
              'Payment failed: insufficient funds. Please use a different payment method.'
            );
          }
        }
      }

      return (
        <form>
          {globalError && (
            <div role="alert" aria-live="assertive" className="error-banner">
              <ErrorIcon aria-hidden="true" />
              <span>{globalError}</span>
              <Button onClick={() => window.open('/help/payment-errors')}>Get help</Button>
            </div>
          )}
          <input value={formData.card} onChange={e => setFormData(p => ({...p, card: e.target.value}))} />
        </form>
      );
    }
  example_bad: |
    // Vague error, cleared state, no recovery action
    async function handleSubmit() {
      try {
        await processPayment(formData);
      } catch (err) {
        setFormData({ card: '', expiry: '', cvv: '' }); // User loses all input
        alert('Something went wrong. Please try again.'); // No information, no action
      }
    }
  when_applies: Every form submission, async operation, or destructive action that can fail
  sources:
    - "https://www.nngroup.com/articles/error-message-guidelines/"
    - "https://www.nngroup.com/videos/usability-heuristic-recognize-errors/"

- id: UJX-005
  text: >
    Design three distinct empty states: first-time use (blank slate), no-data (post-action),
    and error state. Each requires different copy, visual, and call-to-action.
    A generic "No data found" is an opportunity wasted.
  why: >
    Nielsen Norman Group identifies empty states as prime learnability moments. A well-designed
    blank slate increases user confidence and drives the first meaningful action. Apps that show
    a generic empty list lose 40–60% of users who don't understand what to do next.
    Error states need different treatment than empty states — conflating them causes users
    to think their data is lost when it is merely filtered.
  how_to_do_right: |
    1. First-time blank slate: Explain the feature, show example content or screenshot,
       provide ONE primary CTA (e.g., "Create your first project").
    2. No-data (post-search/filter): Confirm what was searched, suggest alternatives,
       provide a "clear filters" action.
    3. Error state: Show a friendly illustration different from blank slate,
       explain the error in plain language, provide retry + contact support actions.
    4. Never use the same illustration for all three states.
    5. Include microcopy that sets expectation: "Your projects will appear here."
  severity: medium
  technologies:
    lang: [typescript, javascript]
    framework: [react, nextjs]
  domains:
    domain: [ux, product]
    concern: [empty_states, first_time_experience, learnability]
  example_good: |
    type EmptyStateType = 'blank_slate' | 'no_results' | 'error';

    interface EmptyStateConfig {
      illustration: string;
      title: string;
      description: string;
      primaryAction?: { label: string; onClick: () => void };
      secondaryAction?: { label: string; onClick: () => void };
    }

    const EMPTY_STATE_CONFIGS: Record<EmptyStateType, EmptyStateConfig> = {
      blank_slate: {
        illustration: '/illustrations/empty-projects.svg',
        title: 'Create your first project',
        description: 'Projects help you organize your work. Start by creating one.',
        primaryAction: { label: 'Create project', onClick: openCreateModal },
        secondaryAction: { label: 'Import from GitHub', onClick: openImport },
      },
      no_results: {
        illustration: '/illustrations/search-empty.svg',
        title: 'No projects match "design system"',
        description: 'Try a different search term or clear your filters.',
        primaryAction: { label: 'Clear filters', onClick: clearFilters },
      },
      error: {
        illustration: '/illustrations/error-state.svg',
        title: 'Failed to load your projects',
        description: 'We had trouble connecting to our servers.',
        primaryAction: { label: 'Retry', onClick: retry },
        secondaryAction: { label: 'Contact support', onClick: openSupport },
      },
    };
  example_bad: |
    // One empty state for everything — no context, no action
    function ProjectList({ projects, error }) {
      if (error || projects.length === 0) {
        return <p>No data found.</p>; // Is it blank? Filtered? Broken?
      }
      // User is completely lost — close app, never return
    }
  when_applies: Every list, grid, or data view that can be empty or error-state
  sources:
    - "https://www.nngroup.com/articles/empty-state-interface-design/"
    - "https://www.nngroup.com/videos/empty-states-in-application-design-guidelines/"

- id: UJX-006
  text: >
    Choose loading state pattern based on expected duration and content type:
    skeleton screens for structured content >300ms, spinners for actions <3s,
    progressive loading for large lists. Never block interaction during background loads.
  why: >
    Nielsen Norman Group research on skeleton screens shows they reduce perceived wait time
    by setting accurate layout expectations. Spinners on structured content (like a dashboard)
    cause layout shift on load, reducing perceived performance. Blocking UI during background
    operations (like saving) causes users to double-click and submit forms twice — a classic
    duplicate order bug in e-commerce.
  how_to_do_right: |
    1. <300ms: Show nothing — UI changes appear instant; loaders cause more distraction.
    2. 300ms–3s: Show skeleton screen matching the layout of the real content.
    3. 3s–10s: Show skeleton + progress indicator with a verbal message ("Loading your data...").
    4. >10s: Show incremental results as they arrive (progressive loading).
    5. Background saves: Show a subtle "Saving..." badge in the corner, never block input.
    6. Avoid full-page spinners for partial updates — only the updating region shows a loader.
    7. All skeleton animations must respect prefers-reduced-motion media query.
  severity: medium
  technologies:
    lang: [typescript, css]
    framework: [react]
  domains:
    domain: [ux, performance]
    concern: [loading_states, perceived_performance, accessibility]
  example_good: |
    // Skeleton screen with reduced-motion support
    const SkeletonCard = () => (
      <div className="skeleton-card" aria-hidden="true">
        <div className="skeleton-avatar" />
        <div className="skeleton-title" />
        <div className="skeleton-body" />
      </div>
    );

    // CSS: respects prefers-reduced-motion
    /*
    .skeleton-card > * {
      background: linear-gradient(90deg, #e0e0e0 25%, #f5f5f5 50%, #e0e0e0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    @media (prefers-reduced-motion: reduce) {
      .skeleton-card > * {
        animation: none;
        background: #e0e0e0;
      }
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    */

    function Dashboard() {
      const { data, isLoading } = useDashboard();
      if (isLoading) return <>{[...Array(3)].map((_, i) => <SkeletonCard key={i} />)}</>;
      return <>{data.map(item => <Card key={item.id} {...item} />)}</>;
    }
  example_bad: |
    // Full-page spinner that blocks everything and causes layout shift
    function Dashboard() {
      const { data, isLoading } = useDashboard();
      if (isLoading) {
        return (
          <div style={{ position: 'fixed', inset: 0, display: 'flex', alignItems: 'center' }}>
            <Spinner size="large" /> {/* Blocks entire app, no layout hint, scary layout shift on load */}
          </div>
        );
      }
      return <>{data.map(item => <Card key={item.id} {...item} />)}</>;
    }
  when_applies: Every async data fetch, especially for structured list/card/dashboard views
  sources:
    - "https://www.nngroup.com/articles/skeleton-screens/"
    - "https://www.nngroup.com/articles/visibility-system-status/"

- id: UJX-007
  text: >
    Multi-step forms: show a step indicator, autosave progress to localStorage or backend
    on each step, validate inline on blur (not on submit), and group related fields.
    Losing form data on browser back is a conversion killer.
  why: >
    Baymard Institute reports that 26% of checkout abandonment is due to forms being too
    long or complicated. Autosave prevents catastrophic data loss on accidental back navigation.
    Inline validation on blur (not on change, not on submit) provides feedback at the right
    moment — after the user has finished typing, not while they are still typing.
    Premature validation on change creates a whack-a-mole effect that frustrates users.
  how_to_do_right: |
    1. Group fields by cognitive proximity (personal info → address → payment — never mix).
    2. Show step indicator: "Step 2 of 4" with completed steps marked visually.
    3. Autosave on step completion to sessionStorage (anonymous) or backend (logged in).
    4. Validate on blur, not on change. Validate all fields on submit as a safety net.
    5. Show character counts for text areas in real time (not as an error after submit).
    6. Mark required fields with * — don't mark optional fields as "optional" (Baymard recommends
       marking required fields with * and adding a legend "* Required fields").
    7. Never disable the submit button as the only error indicator — show explicit errors too.
  severity: high
  technologies:
    lang: [typescript, javascript]
    framework: [react]
  domains:
    domain: [ux, forms]
    concern: [form_design, validation, autosave]
  example_good: |
    function MultiStepForm() {
      const [step, setStep] = useState(1);
      const [formData, setFormData] = useState(() => {
        // Restore autosaved data on mount
        const saved = sessionStorage.getItem('signup_form');
        return saved ? JSON.parse(saved) : { name: '', email: '', company: '' };
      });
      const [errors, setErrors] = useState<Record<string, string>>({});

      // Validate on blur — not on change
      function handleBlur(field: string, value: string) {
        const error = validateField(field, value);
        setErrors(prev => ({ ...prev, [field]: error }));
      }

      // Autosave on every change
      function handleChange(field: string, value: string) {
        const next = { ...formData, [field]: value };
        setFormData(next);
        sessionStorage.setItem('signup_form', JSON.stringify(next)); // Autosave
      }

      return (
        <div>
          <StepIndicator current={step} total={4} />
          <label>
            Name *
            <input
              value={formData.name}
              onChange={e => handleChange('name', e.target.value)}
              onBlur={e => handleBlur('name', e.target.value)}
              aria-describedby={errors.name ? 'name-error' : undefined}
              aria-invalid={!!errors.name}
            />
            {errors.name && <span id="name-error" role="alert">{errors.name}</span>}
          </label>
        </div>
      );
    }
  example_bad: |
    // Validate only on submit, clear everything on back navigation
    function BadForm() {
      const [formData, setFormData] = useState({});
      // No autosave, no inline validation, no step indicator
      function handleSubmit() {
        const errors = validate(formData);
        if (Object.keys(errors).length > 0) {
          // User finds out all errors at the end after filling 20 fields
          setErrors(errors);
        }
      }
    }
  when_applies: Any form with >4 fields or >1 step; especially checkout, signup, profile setup
  sources:
    - "https://www.nngroup.com/articles/web-form-design/"
    - "https://web.dev/learn/forms/"

- id: UJX-008
  text: >
    Design notifications with four levels: Critical (modal, blocks action), Urgent (toast,
    auto-dismisses in 8s), Informational (banner, dismissible), Passive (badge count).
    Never use modals for informational messages.
  why: >
    Notification fatigue is real: users who receive too many disruptive notifications start
    ignoring all of them, including critical ones. Modal dialogs for non-blocking messages
    interrupt flow and train users to dismiss without reading — the "dialog blindness"
    phenomenon documented by NN/Group. Using the wrong interruption level for a notification
    type (e.g., a modal for "Your export is ready") destroys user trust and focus.
  how_to_do_right: |
    1. Critical (data loss risk, permission required): Modal dialog. User must acknowledge.
    2. Urgent (action completed, error occurred): Toast/snackbar. Auto-dismiss in 8s.
       Always provide a "dismiss" button. Never auto-dismiss error toasts.
    3. Informational (new feature, system update): Persistent banner at top. Dismissible.
    4. Passive (unread count, new items): Badge on icon. No interruption.
    5. Position toasts bottom-right for desktop, bottom-center for mobile.
    6. Stack toasts — max 3 visible at once; queue the rest.
    7. Error toasts must NOT auto-dismiss — the user must read and acknowledge.
  severity: medium
  technologies:
    lang: [typescript, css]
    framework: [react]
  domains:
    domain: [ux, product]
    concern: [notifications, interruption_design, accessibility]
  example_good: |
    type NotificationLevel = 'critical' | 'urgent' | 'informational' | 'passive';

    const NOTIFICATION_CONFIG = {
      critical:       { component: 'Modal',   autoDismiss: false, blockUI: true },
      urgent:         { component: 'Toast',   autoDismiss: 8000,  blockUI: false },
      urgent_error:   { component: 'Toast',   autoDismiss: false, blockUI: false }, // Errors never auto-dismiss
      informational:  { component: 'Banner',  autoDismiss: false, blockUI: false },
      passive:        { component: 'Badge',   autoDismiss: false, blockUI: false },
    } as const;

    function notify(level: NotificationLevel, message: string, isError = false) {
      const config = isError && level === 'urgent'
        ? NOTIFICATION_CONFIG.urgent_error
        : NOTIFICATION_CONFIG[level];
      notificationStore.push({ message, ...config });
    }

    // Usage
    notify('urgent', 'Export ready — download now');        // Toast, 8s auto-dismiss
    notify('urgent', 'Upload failed: file too large', true); // Toast, NO auto-dismiss
    notify('critical', 'Delete account? This cannot be undone'); // Modal
  example_bad: |
    // Modal for every message — user develops dialog blindness
    function showNotification(message: string) {
      // Uses a blocking modal for "Export ready" — interrupts user mid-work
      showModal({ title: 'Notification', body: message, confirmLabel: 'OK' });
    }

    // Two weeks later: users click OK without reading anything
    // Critical "Delete your account?" modal gets auto-dismissed by muscle memory
  when_applies: Any system that sends user notifications — app, email, push, in-app
  sources:
    - "https://www.nngroup.com/articles/visibility-system-status/"
    - "https://material.io/components/snackbars"

- id: UJX-009
  text: >
    Implement search UX with: autocomplete showing results in <200ms, zero-results page
    with suggestions, and faceted search for corpora >1,000 items. The search box
    must preserve the query after submission.
  why: >
    Users who get zero results without guidance abandon search 68% of the time (Baymard).
    Autocomplete reduces search abandonment by showing intent-matched suggestions before
    the user commits to a query. Preserving the query after submission is basic — losing
    the search term on results page forces re-typing and signals a broken product.
    Faceted filters are essential when result sets exceed 1,000 items — users cannot
    scroll to find content; they must narrow the space.
  how_to_do_right: |
    1. Debounce autocomplete requests: 200ms debounce, cancel previous in-flight request.
    2. Show max 7 autocomplete suggestions (Miller's Law).
    3. Preserve query in URL: /search?q=user+journey so page is shareable and back works.
    4. Zero results: Show query, suggest alternative terms, show popular searches.
    5. Facets: Show count per facet value. Disable unavailable combinations (not hide them).
    6. Highlight matched terms in results with <mark> element.
    7. Search results must load in <500ms for 95th percentile (p95).
  severity: high
  technologies:
    lang: [typescript, python]
    framework: [react, fastapi, elasticsearch]
  domains:
    domain: [ux, search, performance]
    concern: [search_ux, autocomplete, faceted_search]
  example_good: |
    // Debounced search with query preservation in URL
    function SearchPage() {
      const [searchParams, setSearchParams] = useSearchParams();
      const query = searchParams.get('q') ?? '';
      const [inputValue, setInputValue] = useState(query); // Preserve query in input

      const debouncedSearch = useMemo(
        () => debounce((q: string) => {
          setSearchParams({ q }, { replace: true }); // Preserve in URL
        }, 200),
        [setSearchParams]
      );

      const { data: suggestions } = useQuery({
        queryKey: ['autocomplete', inputValue],
        queryFn: () => fetchSuggestions(inputValue),
        enabled: inputValue.length >= 2,
        staleTime: 60_000, // Cache suggestions for 1 minute
      });

      return (
        <>
          <input
            value={inputValue}
            onChange={e => { setInputValue(e.target.value); debouncedSearch(e.target.value); }}
            aria-label="Search"
            aria-autocomplete="list"
            aria-controls="suggestions"
          />
          {suggestions?.length === 0 && (
            <ZeroResultsPanel query={inputValue} suggestions={popularSearches} />
          )}
        </>
      );
    }
  example_bad: |
    // Query lost after submit, no debounce, no zero-results help
    function SearchForm() {
      function handleSubmit(e) {
        e.preventDefault();
        const q = e.target.search.value;
        // Navigate away — input value is lost on results page
        navigate(`/results?q=${q}`);
        // If no results: just shows empty list with no guidance
      }
      return <form onSubmit={handleSubmit}><input name="search" /></form>;
    }
  when_applies: Any search interface with >100 items; essential for >1,000 items
  sources:
    - "https://www.nngroup.com/articles/search-visible-and-simple/"
    - "https://web.dev/learn/forms/search/"

- id: UJX-010
  text: >
    Design for thumb zones on mobile: primary actions bottom-center, navigation bottom edge,
    destructive actions top or requiring two-tap confirmation. Minimum touch target is 48x48px
    (Google) / 44x44pt (Apple). Pull-to-refresh requires visual affordance.
  why: >
    Steven Hoober's research on 1,333 mobile interactions found 75% of users operate phones
    with one thumb. The bottom center of a phone screen is the easiest zone to reach;
    the top corners are hardest. Placing "Delete" or "Sign out" in the easy zone causes
    accidental activations. Touch targets smaller than 44pt fail WCAG 2.5.5 and cause
    1.5x more tap errors on average.
  how_to_do_right: |
    1. Primary CTA: Bottom center (floating action button or bottom bar).
    2. Secondary navigation: Bottom tab bar (max 5 items).
    3. Dangerous actions: Top right OR require two taps (tap icon → confirm in sheet).
    4. All interactive elements: min 48x48px (CSS). Use padding to inflate hit area
       without enlarging visual size.
    5. Pull-to-refresh: Show a visible indicator at the top when user pulls down >60px.
    6. Swipe actions (delete on list item): show 50% of the action color before
       committing; full swipe triggers, short swipe reverts.
  severity: medium
  technologies:
    lang: [typescript, css]
    framework: [react, react-native]
  domains:
    domain: [ux, mobile]
    concern: [thumb_zones, touch_targets, mobile_patterns]
  example_good: |
    /* CSS: inflate touch target without changing visual size */
    .icon-button {
      width: 24px;
      height: 24px;
      padding: 12px; /* Total hit area: 48x48px */
      margin: -12px; /* Compensate for layout */
      cursor: pointer;
    }

    /* Bottom navigation — primary actions reachable by thumb */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 56px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding-bottom: env(safe-area-inset-bottom); /* iPhone notch */
    }

    /* FAB — primary action at thumb zone */
    .fab {
      position: fixed;
      bottom: calc(72px + env(safe-area-inset-bottom));
      right: 24px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
    }
  example_bad: |
    /* Touch targets too small — fails WCAG 2.5.5 */
    .action-icon {
      width: 16px;
      height: 16px; /* 16x16px — tap error rate 3x higher than 48x48px */
    }

    /* Delete button in easy reach zone — accidental activation */
    .header-right {
      position: fixed;
      top: 16px;
      /* wait, this is fine — danger */
    }
    .bottom-center-delete-btn {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      /* Placed at prime thumb zone — accidental deletion inevitable */
    }
  when_applies: All mobile web and native app interfaces
  sources:
    - "https://www.nngroup.com/reports/mobile-website-and-application-usability/"
    - "https://web.dev/learn/design/ui-regions/"

- id: UJX-011
  text: >
    Implement accessibility-first: full keyboard navigation with visible focus rings,
    ARIA labels on all interactive elements without visible text, and color contrast
    ratio of 4.5:1 for normal text (WCAG AA). Test with a screen reader before shipping.
  why: >
    WCAG 2.1 AA is a legal requirement in the EU (EN 301 549) and US (ADA Section 508).
    WebAIM's 2024 accessibility audit found 96% of top 1M homepages have WCAG failures —
    the most common being missing alt text, low contrast, and missing form labels.
    Beyond compliance, accessible design benefits all users: focus rings help keyboard
    power users, captions help users in noisy environments, proper heading hierarchy
    helps all users scan content faster.
  how_to_do_right: |
    1. Never remove focus outline without replacing it with an equally visible style.
    2. All images: meaningful alt text or alt="" for decorative (never omit alt attribute).
    3. All form inputs: explicit <label for> OR aria-label OR aria-labelledby.
    4. All icon buttons: aria-label describing the action, not the icon.
    5. Color contrast: 4.5:1 for text <18pt, 3:1 for large text and UI components.
    6. Dynamic content updates: use aria-live="polite" for non-urgent, aria-live="assertive"
       for errors. Never announce every keystroke.
    7. Test keyboard nav: Tab → all interactive elements. Shift+Tab → reverse. Enter/Space → activate.
    8. Test with VoiceOver (Mac/iOS) or NVDA (Windows) — at least once before shipping.
  severity: high
  technologies:
    lang: [typescript, html, css]
    framework: [react, nextjs]
  domains:
    domain: [accessibility, ux]
    concern: [keyboard_nav, screen_reader, wcag, color_contrast]
  example_good: |
    // Accessible icon button with visible focus ring
    function IconButton({ icon, label, onClick }: Props) {
      return (
        <button
          onClick={onClick}
          aria-label={label}
          className="icon-button"
          // CSS below provides visible focus ring that respects user preferences
        >
          {icon}
        </button>
      );
    }

    /*
    .icon-button:focus-visible {
      outline: 3px solid #005fcc;  -- contrast 4.5:1 on white
      outline-offset: 2px;
      border-radius: 4px;
    }
    -- Note: :focus-visible only shows ring when navigating by keyboard, not mouse click
    */

    // Live region for async status updates
    function SearchStatus({ resultsCount, query }: Props) {
      return (
        <div aria-live="polite" aria-atomic="true" className="sr-only">
          {resultsCount !== null && `${resultsCount} results for "${query}"`}
        </div>
      );
    }

    // .sr-only: visually hidden but accessible to screen readers
    /*
    .sr-only {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }
    */
  example_bad: |
    // No focus ring, no ARIA label, color-only error indication
    <button style={{ outline: 'none' }} onClick={handleDelete}>
      <TrashIcon /> {/* No aria-label — screen reader says "button" */}
    </button>

    <input
      style={{ borderColor: hasError ? 'red' : 'gray' }}
      // No label, no aria-describedby for error — screen reader has no context
    />
  when_applies: Every UI component shipped to users. Accessibility is not a phase — it is a property.
  sources:
    - "https://www.w3.org/WAI/WCAG21/quickref/"
    - "https://web.dev/learn/accessibility/"
    - "https://webaim.org/projects/million/"

- id: UJX-012
  text: >
    Implement dark mode with CSS custom properties (variables), respect prefers-color-scheme
    by default, and persist manual toggle to localStorage. Never invert colors — redesign
    the palette. Shadows in dark mode must use alpha-opacity, not grey values.
  why: >
    Simply inverting colors in dark mode produces ugly results: #000000 text on #ffffff
    background inverts to #ffffff on #000000, which is too high contrast (causes
    halation — glowing effect around text). Dark mode is not "light mode with black swap."
    Shadows in dark mode using grey values are invisible; alpha-opacity shadows (rgba)
    deepen the perceived depth. Forgetting localStorage persistence causes the "dark mode
    flash" on page load, breaking user trust.
  how_to_do_right: |
    1. Define color tokens as CSS custom properties — at least 8 semantic tokens per theme.
    2. Set defaults from prefers-color-scheme media query.
    3. Apply [data-theme="dark"] on <html> or <body> for manual override.
    4. Persist manual toggle to localStorage key "color-scheme".
    5. Apply theme BEFORE first paint: inject inline script in <head> to avoid flash.
    6. Use rgba shadows in dark mode: box-shadow: 0 4px 16px rgba(0,0,0,0.6).
    7. Never use pure #000000 backgrounds — use #121212 (Material) or #1a1a1a.
    8. Test all images and illustrations — provide dark variants for SVGs with embedded colors.
  severity: medium
  technologies:
    lang: [css, typescript]
    framework: [react, nextjs]
  domains:
    domain: [ux, css, theming]
    concern: [dark_mode, css_variables, theme_persistence]
  example_good: |
    /* CSS custom properties — semantic tokens, not colors */
    :root {
      --color-bg-primary:   #ffffff;
      --color-bg-secondary: #f5f5f5;
      --color-text-primary: #1a1a1a;
      --color-text-muted:   #6b7280;
      --color-border:       rgba(0, 0, 0, 0.12);
      --shadow-card:        0 2px 8px rgba(0, 0, 0, 0.08);
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --color-bg-primary:   #121212;   /* NOT #000000 */
        --color-bg-secondary: #1e1e1e;
        --color-text-primary: #e4e4e4;   /* NOT #ffffff */
        --color-text-muted:   #9ca3af;
        --color-border:       rgba(255, 255, 255, 0.12);
        --shadow-card:        0 2px 8px rgba(0, 0, 0, 0.6); /* Alpha-opacity shadow */
      }
    }

    [data-theme="dark"] { /* Manual override */ }

    // TypeScript: prevent flash of wrong theme
    // In _document.tsx <head>:
    const themeScript = `
      (function() {
        var stored = localStorage.getItem('color-scheme');
        var prefer = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', stored || prefer);
      })();
    `;
  example_bad: |
    /* Inverting colors — produces glare and broken UI */
    @media (prefers-color-scheme: dark) {
      body { filter: invert(1); } /* Inverts images, videos, everything — terrible UX */
    }

    /* Grey shadow in dark mode — invisible */
    .card {
      box-shadow: 0 2px 8px #808080; /* Not visible on dark background */
    }

    /* No localStorage persistence — flashes on every page load */
  when_applies: Any application where dark mode is offered or system dark mode is respected
  sources:
    - "https://web.dev/prefers-color-scheme/"
    - "https://m3.material.io/styles/color/the-color-system/color-roles"

- id: UJX-013
  text: >
    Implement responsive breakpoints based on content needs, not device names.
    Use CSS Container Queries for component-level responsiveness. Mobile-first CSS
    (min-width media queries). Never use viewport-width breakpoints for component styling.
  why: >
    Device-named breakpoints (iPhone, iPad, Desktop) are obsolete — there are thousands
    of device sizes. Content-first breakpoints mean the layout breaks when the content
    breaks, not at arbitrary widths. Container queries (CSS spec, 2023+) solve the
    problem that media queries cannot: a sidebar component at 400px within a 1200px
    viewport needs different styling than the same component in a full-width 400px viewport.
  how_to_do_right: |
    1. Start with mobile layout, add min-width breakpoints as content requires more space.
    2. Typical content-first breakpoints: 480px (small), 768px (medium), 1024px (large),
       1280px (x-large). These are guidelines — adjust per your content.
    3. Use CSS Container Queries for reusable components:
       .container { container-type: inline-size; }
       @container (min-width: 400px) { .card { display: flex; } }
    4. Never use !important to override breakpoints — indicates the architecture is wrong.
    5. Test on actual devices, not only browser DevTools (DevTools simulates, not replicates).
    6. Use rem for breakpoints (1rem = 16px by default) so they scale with user font preferences.
  severity: medium
  technologies:
    lang: [css, typescript]
    framework: [react, nextjs]
  domains:
    domain: [ux, css, responsive_design]
    concern: [breakpoints, container_queries, mobile_first]
  example_good: |
    /* Mobile-first CSS with content-driven breakpoints */
    .card {
      /* Mobile default: stacked layout */
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    @media (min-width: 48rem) { /* 768px — when content benefits from side-by-side */
      .card {
        flex-direction: row;
      }
    }

    /* Container query — component responds to its container, not the viewport */
    .card-container {
      container-type: inline-size;
      container-name: card;
    }

    @container card (min-width: 25rem) { /* 400px container width */
      .card-inner {
        display: grid;
        grid-template-columns: 120px 1fr;
      }
    }
  example_bad: |
    /* Device-specific breakpoints — brittle and arbitrary */
    @media (max-width: 375px) { /* iPhone SE only */ }
    @media (max-width: 768px) { /* "iPad" — but iPads come in many sizes */ }
    @media (max-width: 1920px) { /* "Desktop" */ }

    /* Desktop-first with max-width — mobile is an afterthought */
    .card {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
    }
    @media (max-width: 768px) {
      .card { display: block; } /* Undoing styles is harder than building up */
    }
  when_applies: All web interfaces with responsive requirements
  sources:
    - "https://web.dev/learn/design/responsive-images/"
    - "https://developer.mozilla.org/en-US/docs/Web/CSS/CSS_containment/Container_queries"

- id: UJX-014
  text: >
    Animation principles for UI: use animation only when it conveys meaning (state change,
    relationship, causality). Duration 150–300ms for UI transitions. Always respect
    prefers-reduced-motion. Easing: ease-out for elements entering, ease-in for leaving.
  why: >
    Google Material Design research shows that well-timed motion helps users understand
    spatial relationships and state changes — reducing cognitive load. However, animations
    >400ms feel sluggish; animations on every interaction feel excessive. Users with
    vestibular disorders (affecting millions) experience nausea from large or parallax
    animations — prefers-reduced-motion must be respected to avoid causing physical harm.
  how_to_do_right: |
    1. Entering elements: ease-out (fast start, gentle deceleration) — 150–300ms.
    2. Leaving elements: ease-in (gentle start, fast exit) — 100–200ms.
    3. Attention-seeking (toast, badge): ease-in-out — 200–400ms.
    4. Never animate more than 2 properties simultaneously on the same element (jank risk).
    5. Use transform and opacity only — do not animate width, height, top, left (triggers layout).
    6. Always include:
       @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
    7. Test with Chrome DevTools > Rendering > Show paint flashing — no red flashes on scroll.
  severity: medium
  technologies:
    lang: [css, typescript]
    framework: [react]
  domains:
    domain: [ux, animation, accessibility]
    concern: [micro_interactions, motion_design, reduced_motion]
  example_good: |
    /* Only transform and opacity — GPU-composited, no layout thrash */
    .modal-enter {
      opacity: 0;
      transform: translateY(8px) scale(0.97);
      transition: opacity 200ms ease-out, transform 200ms ease-out;
    }
    .modal-enter-active {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
    .modal-exit {
      opacity: 1;
      transform: scale(1);
      transition: opacity 150ms ease-in, transform 150ms ease-in;
    }
    .modal-exit-active {
      opacity: 0;
      transform: scale(0.97);
    }

    /* Respect vestibular disorder users */
    @media (prefers-reduced-motion: reduce) {
      .modal-enter, .modal-exit {
        transition: opacity 100ms linear; /* Keep opacity only — remove transforms */
      }
    }
  example_bad: |
    /* Animating width and height — triggers full layout reflow on every frame */
    .expand-panel {
      height: 0;
      overflow: hidden;
      transition: height 500ms ease; /* Causes layout recalculation 60x/sec — jank */
    }
    .expand-panel.open {
      height: 300px;
      /* Better: animate max-height or use transform: scaleY() with transform-origin: top */
    }

    /* No prefers-reduced-motion — causes physical distress for vestibular disorder users */
    .parallax-background {
      transform: translateY(var(--scroll-offset));
      transition: transform 0ms; /* Smooth parallax with no opt-out */
    }
  when_applies: Any UI with transitions, modals, toasts, list additions/removals, or loading states
  sources:
    - "https://web.dev/prefers-reduced-motion/"
    - "https://m3.material.io/styles/motion/overview"

- id: UJX-015
  text: >
    Implement PT-BR locale specifics: date as DD/MM/AAAA, currency as R$ 1.234,56
    (period for thousands, comma for decimals), CPF formatted as 000.000.000-00,
    CEP formatted as 00000-000, phone as (11) 99999-9999.
  why: >
    Displaying $1,234.56 instead of R$ 1.234,56 in a Brazilian product destroys trust —
    users read the comma as a decimal separator and think the value is wrong.
    Date format dd/mm/yyyy is the Brazilian standard; showing mm/dd/yyyy causes users
    to enter January 2nd as 01/02 and receive February 1st — a critical bug in any
    financial or scheduling system. CPF without formatting is confusing and breaks
    validation pattern recognition.
  how_to_do_right: |
    1. Use Intl.NumberFormat for currency — never hardcode R$ or format manually.
    2. Use Intl.DateTimeFormat for dates — never string-concatenate date parts.
    3. Apply CPF input mask on keydown (auto-insert dots and dash at positions 3, 6, 9).
    4. Validate CPF with the official algorithm (mod 11), not just format regex.
    5. Use the Intl.NumberFormat + locale 'pt-BR' for all numeric displays.
    6. Store dates as ISO 8601 (YYYY-MM-DD) internally; format only at display layer.
  severity: high
  technologies:
    lang: [typescript, javascript]
    framework: [react]
  domains:
    domain: [ux, localization, brazil]
    concern: [pt_br, i18n, formatting]
  example_good: |
    // Currency — Intl.NumberFormat with pt-BR locale
    const formatBRL = (value: number) =>
      new Intl.NumberFormat('pt-BR', {
        style: 'currency',
        currency: 'BRL',
        minimumFractionDigits: 2,
      }).format(value);

    formatBRL(1234.56); // "R$ 1.234,56" ✓

    // Date — Intl.DateTimeFormat
    const formatDateBR = (date: Date) =>
      new Intl.DateTimeFormat('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' })
        .format(date);

    formatDateBR(new Date('2025-01-15')); // "15/01/2025" ✓

    // CPF format and validation
    function formatCPF(cpf: string): string {
      const digits = cpf.replace(/\D/g, '').slice(0, 11);
      return digits.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
    }

    function validateCPF(cpf: string): boolean {
      const d = cpf.replace(/\D/g, '');
      if (d.length !== 11 || /^(\d)\1{10}$/.test(d)) return false;
      const calc = (n: number) => d.slice(0, n).split('').reduce(
        (sum, digit, i) => sum + parseInt(digit) * (n + 1 - i), 0
      );
      const r1 = (calc(9) * 10) % 11;
      const r2 = (calc(10) * 10) % 11;
      return (r1 > 9 ? 0 : r1) === parseInt(d[9]) && (r2 > 9 ? 0 : r2) === parseInt(d[10]);
    }
  example_bad: |
    // Hardcoded US format in a Brazilian product
    const price = `$${value.toFixed(2)}`; // Shows $1234.56 instead of R$ 1.234,56

    // Date concatenation — month/day confusion
    const date = `${month}/${day}/${year}`; // Shows 01/15/2025 instead of 15/01/2025
    // User entering birthday enters 02/11 thinking it is 11 de fevereiro
    // System stores 11 de outubro — wrong birth date in a health app

    // No CPF validation — accepts invalid CPFs
    const isCPFValid = cpf.length === 14; // Only checks length, not the checksum algorithm
  when_applies: All Brazilian-facing products that display prices, dates, documents, or phone numbers
  sources:
    - "https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Intl/NumberFormat"
    - "https://www.receita.fazenda.gov.br/aplicacoes/atcta/cpf/funcionalidades.asp"
