    Sprint Planning: Packing a suitcase — you know the suitcase size (capacity), you prioritize what to bring (backlog), and
    you pack the most important items first.
  severity: medium
  technologies:
    domain:
    - general
  how_to_do_right: >-
    1. Calculate capacity: team members × available days × focus factor (typically 0.6-0.8). 2. Pull items from prioritized
    backlog UP TO capacity. 3. Break stories into tasks with time estimates. 4. Discuss technical approach for complex items.
    5. Identify dependencies and blockers upfront. 6. Sprint goal: one sentence that summarizes the sprint's purpose. 7. Team
    commits to the goal (not management commits FOR the team). 8. Time-box: 2 hours for a 2-week sprint.
  example_good: |-
    # Team of 5, 2-week sprint, 2 on PTO for 3 days each.
    # Capacity = (5×10 - 2×3) × 0.7 = 30.8 story points.
    # Backlog has 50 points of work → take 30, not 50.
