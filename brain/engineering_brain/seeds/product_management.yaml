- id: P-PM-AB-TESTING-DESIGN
  name: A/B Test Design for Financial Products
  why: |
    A/B testing in financial products requires extra rigor beyond standard web A/B tests because: (1) financial outcomes take weeks or months to observe (a user who deposits today may lose funds 30 days later), (2) statistical significance requires larger samples when effect sizes are small, (3) guardrail metrics (refund rates, fraud rates, support tickets) must be monitored alongside primary metrics to prevent optimizing for conversion at the expense of financial health. Ron Kohavi (Microsoft) demonstrated that 80% of A/B test results that reach statistical significance are false positives when tests are stopped too early. For financial products, a false positive (shipping a feature that actually increases churn or fraud) is expensive.
  how_to_apply: |
    1. Pre-register: state hypothesis, primary metric, sample size, duration BEFORE start
    2. Calculate sample size: use Evans' A/B test calculator
       Minimum detectable effect (MDE), power=80%, significance=5%
    3. Guardrail metrics: define metrics that CANNOT get worse
       - Refund request rate < baseline
       - Fraud flag rate < baseline
       - Settlement error rate = 0
    4. Primary metric must measure OUTCOME not action:
       - GOOD: "7-day retention of active traders"
       - BAD: "click-through rate on deposit button"
    5. Run for minimum 2 full business cycles (2 weeks minimum)
    6. Segment results: new vs returning users, mobile vs desktop
    7. Financial A/B tests need 3-4x larger samples than UX tests
  mental_model: |
    Clinical drug trial — you don't stop when 50 patients show improvement. You wait for the full trial, check for side effects (guardrail metrics), and require p<0.05 with the pre-registered primary endpoint.
  domains:
    domain:
    - management
    - observability
    concern:
    - product
    - experimentation
    - fintech
    - metrics
  violation_consequence: |
    Shipping features that increase short-term conversion but increase fraud or churn, false positives that waste engineering time, optimizing for the wrong metric.
  teaching_example: |
    Testing a new deposit flow: PRE-REGISTERED: - Hypothesis: New flow increases 7-day active trader rate by 10% - Primary metric: 7-day active trader rate (measures actual trading, not just deposit) - Guardrail metrics: refund rate, fraud flag rate, support ticket rate (none can increase) - Sample size: 5000 users per variant (power analysis: MDE=5%, power=80%, alpha=5%) - Duration: 4 weeks (captures weekly patterns and 7-day retention) RESULT AFTER 4 WEEKS: - Primary metric: +8% (significant, p=0.02) → Ship it - Guardrail: refund rate +3% (significant, p=0.04) → DO NOT SHIP Despite positive primary metric, guardrail breach → do not ship
  when_applies: Product experiments on financial platforms where outcomes are monetary
  when_not_applies: pure UX/copy tests with no financial outcome, internal tools
  sources:
  - https://exp-platform.com/Documents/2017-08%20KDDMetaAnalysis.pdf
  - https://www.evanmiller.org/ab-testing/sample-size.html
  - https://amplitude.com/blog/north-star-metric
