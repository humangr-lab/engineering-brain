- id: P-PM-RETROSPECTIVE
  name: Sprint Retrospective
  why: >-
    A team that does not reflect does not improve. The retrospective is the ONLY ceremony specifically designed for process
    improvement. Without it, the same mistakes repeat every sprint. Atlassian's research shows teams that run regular retros
    improve velocity by 20% over 6 months. The key is PSYCHOLOGICAL SAFETY — team members must feel safe to share what went
    wrong without blame. If people don't speak up, the retro is theater. Actions must be tracked and reviewed — a retro without
    follow-through is worse than no retro (it erodes trust).
  how_to_apply: >-
    1. Format: What went well? What didn't go well? What will we change? 2. Use anonymous input (sticky notes, forms) to increase
    honesty. 3. Vote on the top 2-3 issues to discuss in depth. 4. For each issue, identify ROOT CAUSE (5 Whys) not symptoms.
    5. Define 1-3 specific, assignable actions (not 'we should communicate better' but 'John will post daily updates in #team
    by 10am'). 6. Review previous retro actions at the start of next retro. 7. Rotate facilitator to prevent one voice dominating.
    8. Time-box to 1 hour.
  mental_model: >-
    Post-game film review — professional sports teams watch game footage to identify what worked and what to fix. They don't
    just play the next game and hope it goes better.
  domains:
    domain:
    - management
    concern:
    - product
    - agile
    - team
  violation_consequence: >-
    Same mistakes every sprint, team frustration without outlet, action items that never happen, erosion of trust in the process.
  teaching_example: >-
    BAD retro: 'Things are fine, let's move on.' (No issues surfaced — indicates low psychological safety, not absence of
    problems). GOOD retro: 'Deploy failed Friday at 5pm. Root cause: no deploy freeze policy. Action: @Sarah creates deploy
    freeze policy for Fridays by next Monday. Reviewed at next retro.'
  when_applies: All software engineering decisions
  when_not_applies: throwaway prototypes, learning exercises, or spike investigations where speed trumps correctness
  sources:
  - https://scrumguides.org/scrum-guide.html#sprint-retrospective
  text: >-
    Sprint Retrospective: Post-game film review — professional sports teams watch game footage to identify what worked and
    what to fix.
  severity: medium
  technologies:
    domain:
    - general
  how_to_do_right: >-
    1. Format: What went well? What didn't go well? What will we change? 2. Use anonymous input (sticky notes, forms) to increase
    honesty. 3. Vote on the top 2-3 issues to discuss in depth. 4. For each issue, identify ROOT CAUSE (5 Whys) not symptoms.
    5. Define 1-3 specific, assignable actions (not 'we should communicate better' but 'John will post daily updates in #team
    by 10am'). 6. Review previous retro actions at the start of next retro. 7. Rotate facilitator to prevent one voice dominating.
    8. Time-box to 1 hour.
  example_good: |-
    # BAD retro: 'Things are fine, let's move on.' (No issues surfaced — indicates low psychological safety, not absence of problems).
    # GOOD retro: 'Deploy failed Friday at 5pm.
    # Root cause: no deploy freeze policy.
    # Action: @Sarah creates deploy freeze policy for Fridays by next Monday.
