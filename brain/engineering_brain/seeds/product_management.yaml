- id: P-PM-FINTECH-PRIORITIZATION
  name: Fintech-Specific Feature Prioritization Framework
  why: |
    Generic prioritization frameworks (RICE, MoSCoW) are insufficient for fintech and prediction market products because they don't account for regulatory compliance (must-do legal requirements), trust infrastructure (security, auditability), and financial integrity (correctness before features). A prediction market startup that ships cool features before reliable settlement, correct price calculation, and secure fund handling will be destroyed by a single incident. Regulatory requirements are not "features" — they are table stakes that must be done before any optimization.
  how_to_apply: |
    1. Tier 0 — Legal/Regulatory requirements: do first, non-negotiable
       Examples: KYC/AML, financial record retention, investor suitability checks
    2. Tier 1 — Financial integrity: do second, must be correct before launch
       Examples: correct settlement calculation, atomic transactions, audit trail
    3. Tier 2 — Trust infrastructure: do third, before meaningful user growth
       Examples: security hardening, rate limiting, fraud detection, backup/recovery
    4. Tier 3 — Core product features: the value proposition
       Examples: market creation, trading UI, portfolio view, notifications
    5. Tier 4 — Growth/UX optimization: after product-market fit signals
       Examples: onboarding optimization, A/B tests, advanced analytics
    Apply RICE within each tier, never across tiers. A Tier 0 item with RICE score 5
    beats a Tier 3 item with RICE score 500.
  mental_model: |
    Building a bank vault — you install the vault door before the lobby furniture, even if the furniture makes customers feel better. The vault is not optional.
  domains:
    domain:
    - management
    - planning
    concern:
    - product
    - fintech
    - prioritization
    - compliance
  violation_consequence: |
    Regulatory shutdown before launch, financial integrity bugs that destroy user funds, security incidents that collapse user trust overnight.
  teaching_example: |
    Prediction market backlog — after applying fintech prioritization: Tier 0 (now): KYC verification, investor suitability check, AML monitoring Tier 1 (now): Correct LMSR settlement, atomic trade execution, full audit trail Tier 2 (before launch): Rate limiting, fraud detection, 2FA, data backup Tier 3 (v1.0): Market creation UI, trading interface, portfolio view Tier 4 (post-PMF): Leaderboards, social features, advanced charts
    WRONG: "KYC is boring, let's ship the leaderboard first for engagement" → Operating a financial product without KYC → regulatory shutdown on day 1
  when_applies: Fintech products, prediction markets, exchanges, payment platforms
  when_not_applies: non-financial consumer apps, internal tools, prototypes
  sources:
  - https://www.gov.br/cvm/en/foreign-investors/regulation-of-interest
  - https://www.cftc.gov/IndustryOversight/ContractMarkets/index.htm
  - https://www.planalto.gov.br/ccivil_03/_ato2015-2018/2018/lei/l13709.htm
  text: >-
    Fintech-Specific Feature Prioritization Framework: Building a bank vault — you install the vault door before the lobby
    furniture, even if the furniture makes customers feel better.
  severity: high
  technologies:
