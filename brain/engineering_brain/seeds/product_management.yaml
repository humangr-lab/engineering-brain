layer: principles
domain: product_management
knowledge:
- id: P-PM-JTBD
  name: Jobs-to-be-Done Framework
  why: >-
    Customers don't buy products — they hire them to do a job. A customer doesn't want a 1/4-inch drill bit, they want a 1/4-inch
    hole. And they don't even want the hole — they want the shelf on the wall. Understanding the FULL job (functional, emotional,
    and social dimensions) prevents building features nobody wants. Clayton Christensen's research shows that 95% of new products
    fail because they are designed around demographics, not jobs. When you frame development around the job, you discover
    competitors you never expected and opportunities you never imagined.
  how_to_apply: >-
    1. Interview users about SPECIFIC recent experiences ('Tell me about the last time you...'). 2. Identify the functional
    job (what they are trying to accomplish). 3. Identify the emotional job (how they want to feel). 4. Identify the social
    job (how they want to be perceived). 5. Map the job steps (beginning → middle → end). 6. Find where current solutions
    fail (pain points per step). 7. Write job stories: 'When [situation], I want to [motivation], so I can [expected outcome]'.
  mental_model: >-
    Hiring interview — the customer is the employer, your product is the candidate. 'Why should I hire you over the alternatives?
    What job will you do for me better than what I have now?'
  domains:
    domain:
    - management
    concern:
    - product
    - research
    - strategy
  violation_consequence: Building features nobody asked for, competing on the wrong axis, surprised by disruption from unexpected
    competitors.
  teaching_example: >-
    Milkshake example: Fast food chain tried to improve milkshake sales. Demographics said target young men. JTBD research
    found 40% of milkshakes sold at 7 AM to commuters who needed something to make a boring drive interesting, fill their
    stomach until lunch, and be consumable with one hand. Competitors were not other milkshakes — they were bananas, bagels,
    and donuts.
  when_applies: All software engineering decisions
  when_not_applies: throwaway prototypes, learning exercises, or spike investigations where speed trumps correctness
  sources:
  - https://hbswk.hbs.edu/item/clay-christensens-milkshake-marketing
  text: 'Jobs-to-be-Done Framework: Hiring interview — the customer is the employer, your product is the candidate.'
  severity: medium
  technologies:
    domain:
    - general
  how_to_do_right: >-
    1. Interview users about SPECIFIC recent experiences ('Tell me about the last time you...'). 2. Identify the functional
    job (what they are trying to accomplish). 3. Identify the emotional job (how they want to feel). 4. Identify the social
    job (how they want to be perceived). 5. Map the job steps (beginning → middle → end). 6. Find where current solutions
    fail (pain points per step). 7. Write job stories: 'When [situation], I want to [motivation], so I can [expected outcome]'.
  example_good: |-
    # Milkshake example: Fast food chain tried to improve milkshake sales.
    # Demographics said target young men.
    # JTBD research found 40% of milkshakes sold at 7 AM to commuters who needed something to make a boring drive interesting, fill their stomach until lunch, and be consumable with one hand.
    # Competitors were not other milkshakes — they were bananas, bagels, and donuts.
  example_bad: |-
    # Anti-pattern: Violating Jobs-to-be-Done Framework
    # Result: Building features nobody asked for
    # Result: competing on the wrong axis
- id: P-PM-OPPORTUNITY-SCORING
  name: Opportunity Scoring (Importance vs Satisfaction)
  why: >-
    Not all user needs are equal. Some are important but already well-served (no opportunity). Some are unimportant (no market).
    The sweet spot is high importance + low satisfaction — these are underserved needs with real demand. Tony Ulwick's ODI
    (Outcome-Driven Innovation) method has an 86% success rate for new products vs 17% industry average. Without scoring,
    teams chase loud customers instead of large opportunities.
  how_to_apply: >-
    1. List 15-30 desired outcomes (what users are trying to achieve). 2. Survey users on each outcome: 'How important is
    this?' (1-5) and 'How satisfied are you with current solutions?' (1-5). 3. Calculate opportunity score: Importance + max(Importance
    - Satisfaction, 0). 4. Scores >12 are underserved (high opportunity). 5. Scores <6 are overserved (don't invest). 6. Plot
    on a 2x2 matrix: importance (y) vs satisfaction (x). Top-left quadrant = gold.
  mental_model: >-
    Gold mining — importance is 'there's gold here' and satisfaction is 'has someone already mined it?' You want high-gold,
    un-mined territory.
  domains:
    domain:
    - management
    concern:
    - product
    - research
    - strategy
  violation_consequence: >-
    Building features for overserved needs (low differentiation), ignoring underserved needs (missed market opportunity),
    flat prioritization based on gut feeling.
  teaching_example: >-
    File sharing in 2007: 'Share large files with colleagues' scored Importance=5, Satisfaction=2 (email had 10MB limit, USB
    drives were clunky). Dropbox built for this exact underserved need. 'Send small text messages' scored Importance=5, Satisfaction=5
    (email already worked) — no opportunity.
  when_applies: All software engineering decisions
  when_not_applies: throwaway prototypes, learning exercises, or spike investigations where speed trumps correctness
  sources:
  - https://strategyn.com/outcome-driven-innovation-process/
  text: >-
    Opportunity Scoring (Importance vs Satisfaction): Gold mining — importance is 'there's gold here' and satisfaction is
    'has someone already mined it?' You want high-gold, un-mined territory.
  severity: medium
  technologies:
    domain:
    - general
  how_to_do_right: >-
    1. List 15-30 desired outcomes (what users are trying to achieve). 2. Survey users on each outcome: 'How important is
    this?' (1-5) and 'How satisfied are you with current solutions?' (1-5). 3. Calculate opportunity score: Importance + max(Importance
    - Satisfaction, 0). 4. Scores >12 are underserved (high opportunity). 5. Scores <6 are overserved (don't invest). 6. Plot
    on a 2x2 matrix: importance (y) vs satisfaction (x). Top-left quadrant = gold.
  example_good: |-
    # File sharing in 2007: 'Share large files with colleagues' scored Importance=5, Satisfaction=2 (email had 10MB limit, USB drives were clunky).
    # Dropbox built for this exact underserved need.
    # 'Send small text messages' scored Importance=5, Satisfaction=5 (email already worked) — no opportunity.
  example_bad: |-
    # Anti-pattern: Violating Opportunity Scoring (Importance vs Satisfaction)
    # Result: Building features for overserved needs (low differentiation)
    # Result: ignoring underserved needs (missed market opportunity)
- id: P-PM-ASSUMPTION-MAPPING
  name: Assumption Mapping (Certainty vs Risk)
  why: >-
    Every product decision is built on assumptions. Some assumptions are validated (we have data), some are opinions (we believe
    this). The dangerous assumptions are high-risk + low-certainty — if they are wrong, the project fails. Teams that do not
    map assumptions build on the riskiest unknowns without realizing it. Amazon's 'working backwards' process and Lean Startup's
    build-measure-learn loop both start by identifying and testing the riskiest assumptions first.
  how_to_apply: >-
    1. List ALL assumptions underlying your product/feature (minimum 20). 2. Rate each on certainty (have evidence vs just
    believe) and risk (project fails if wrong vs minor impact). 3. Plot on a 2x2: certainty (x) vs risk (y). 4. Top-left quadrant
    (high risk, low certainty) = test THESE FIRST. 5. Design the cheapest possible experiment to validate each risky assumption.
    6. Kill the project early if a critical assumption is invalidated.
  mental_model: >-
    Building a bridge — you test the ground before pouring the foundation. If the soil can't support the weight, you find
    out BEFORE building, not after.
  domains:
    domain:
    - management
    - planning
    concern:
    - product
    - risk
  violation_consequence: >-
    Months of development based on unvalidated assumptions, late-stage pivots that waste resources, products that solve problems
    nobody has.
  teaching_example: >-
    Assumption: 'Users will pay $29/mo for this feature.' Certainty: Low (no pricing research). Risk: Critical (entire business
    model depends on it). Action: Run a fake-door test with a pricing page BEFORE building the feature.
  when_applies: All software engineering decisions
  when_not_applies: throwaway prototypes, learning exercises, or spike investigations where speed trumps correctness
  sources:
  - https://www.strategyzer.com/library/how-to-test-business-ideas
  text: 'Assumption Mapping (Certainty vs Risk): Building a bridge — you test the ground before pouring the foundation.'
  severity: medium
  technologies:
    domain:
    - general
  how_to_do_right: >-
    1. List ALL assumptions underlying your product/feature (minimum 20). 2. Rate each on certainty (have evidence vs just
    believe) and risk (project fails if wrong vs minor impact). 3. Plot on a 2x2: certainty (x) vs risk (y). 4. Top-left quadrant
    (high risk, low certainty) = test THESE FIRST. 5. Design the cheapest possible experiment to validate each risky assumption.
    6. Kill the project early if a critical assumption is invalidated.
  example_good: |-
    # Assumption: 'Users will pay $29/mo for this feature.' Certainty: Low (no pricing research).
    # Risk: Critical (entire business model depends on it).
    # Action: Run a fake-door test with a pricing page BEFORE building the feature.
  example_bad: |-
    # Anti-pattern: Violating Assumption Mapping (Certainty vs Risk)
    # Result: Months of development based on unvalidated assumptions
    # Result: late-stage pivots that waste resources
- id: P-PM-CUSTOMER-INTERVIEWS
  name: Customer Interview Technique
  why: >-
    Surveys tell you WHAT users do. Interviews tell you WHY. But most interview techniques are flawed — leading questions,
    confirmation bias, and asking users to predict future behavior produce unreliable data. Rob Fitzpatrick's 'The Mom Test'
    shows that even your mother will lie to you about your business idea if you ask the wrong questions. The key is to ask
    about past behavior, not future intentions. 'Would you use X?' produces useless data. 'When was the last time you had
    this problem and what did you do?' produces insights.
  how_to_apply: >-
    1. Ask about SPECIFIC past experiences, not hypotheticals ('Tell me about the last time...'). 2. Listen 80%, talk 20%
    — silence is powerful. 3. Never mention your solution until the end (avoid bias). 4. Ask 'Why?' 5 times to reach root
    cause. 5. Ask about current workarounds ('How do you solve this today?'). 6. Watch for emotional signals (frustration,
    excitement). 7. End with: 'Is there anything I should have asked but didn't?' 8. Synthesize across 5-8 interviews before
    drawing conclusions.
  mental_model: >-
    Journalist, not salesperson — your job is to uncover truth, not sell your idea. The interview fails if you learn what
    you hoped rather than what is real.
  domains:
    domain:
    - management
    concern:
    - product
    - research
    - user_research
  violation_consequence: >-
    Confirmation bias disguised as research, building what users SAY they want vs what they ACTUALLY need, wasted development
    on unvalidated ideas.
  teaching_example: >-
    BAD: 'Would you use a feature that automatically categorizes your expenses?' (leading, hypothetical). GOOD: 'Walk me through
    how you handled your expenses last month. Where did you get stuck? What took the longest?'
  when_applies: All software engineering decisions
  when_not_applies: throwaway prototypes, learning exercises, or spike investigations where speed trumps correctness
  sources:
  - https://www.momtestbook.com/
  text: 'Customer Interview Technique: Journalist, not salesperson — your job is to uncover truth, not sell your idea.'
  severity: medium
  technologies:
    domain:
    - general
  how_to_do_right: >-
    1. Ask about SPECIFIC past experiences, not hypotheticals ('Tell me about the last time...'). 2. Listen 80%, talk 20%
    — silence is powerful. 3. Never mention your solution until the end (avoid bias). 4. Ask 'Why?' 5 times to reach root
    cause. 5. Ask about current workarounds ('How do you solve this today?'). 6. Watch for emotional signals (frustration,
    excitement). 7. End with: 'Is there anything I should have asked but didn't?' 8. Synthesize across 5-8 interviews before
    drawing conclusions.
  example_good: |-
    # BAD: 'Would you use a feature that automatically categorizes your expenses?' (leading, hypothetical).
    # GOOD: 'Walk me through how you handled your expenses last month.
    # Where did you get stuck? What took the longest?'.
  example_bad: |-
    # Anti-pattern: Violating Customer Interview Technique
    # Result: Confirmation bias disguised as research
    # Result: building what users SAY they want vs what they ACTUALLY need
- id: P-PM-PROTOTYPE-TESTING
  name: Prototype Testing (Test Before Building)
  why: >-
    Building the wrong thing is the most expensive mistake in product development. A full implementation costs 10-100x what
    a prototype costs. Testing with prototypes (paper, Figma, coded prototype) catches usability issues, desirability gaps,
    and incorrect assumptions BEFORE the team invests weeks of engineering time. Steve Blank's Customer Development methodology
    and IDEO's design thinking both mandate prototype testing before commitment. The fidelity of the prototype should match
    the fidelity of the question.
  how_to_apply: >-
    1. Match prototype fidelity to the question: concept question → paper sketch, interaction question → clickable Figma,
    feasibility question → coded prototype. 2. Test with 5 users (catches 85% of usability issues per Nielsen). 3. Give tasks,
    not tours ('Find and buy a blue shirt' not 'Let me show you the interface'). 4. Think-aloud protocol: ask users to narrate
    their thoughts. 5. Note WHERE they hesitate, WHAT they misunderstand, WHERE they give up. 6. Iterate and re-test — 3 rounds
    of 5 users beats 1 round of 15.
  mental_model: >-
    Movie trailer before the movie — you test audience reaction with a 2-minute trailer before investing $200M in the full
    production.
  domains:
    domain:
    - management
    - architecture
    concern:
    - product
    - design
    - research
  violation_consequence: >-
    Weeks of engineering wasted on features that don't test well, late-stage redesigns, shipping products that users struggle
    to use.
  teaching_example: >-
    Dropbox: Before building the product, Drew Houston made a 3-minute demo video showing the concept. The waitlist went from
    5K to 75K overnight — validating demand with zero code.
  when_applies: Any system involving code undergoing design or refactoring
  when_not_applies: quick fixes, config changes, or documentation-only updates
  sources:
  - https://www.nngroup.com/articles/why-you-only-need-to-test-with-5-users/
  text: >-
    Prototype Testing (Test Before Building): Movie trailer before the movie — you test audience reaction with a 2-minute
    trailer before investing $200M in the full production.
  severity: medium
  technologies:
    domain:
    - general
  how_to_do_right: >-
    1. Match prototype fidelity to the question: concept question → paper sketch, interaction question → clickable Figma,
    feasibility question → coded prototype. 2. Test with 5 users (catches 85% of usability issues per Nielsen). 3. Give tasks,
    not tours ('Find and buy a blue shirt' not 'Let me show you the interface'). 4. Think-aloud protocol: ask users to narrate
    their thoughts. 5. Note WHERE they hesitate, WHAT they misunderstand, WHERE they give up. 6. Iterate and re-test — 3 rounds
    of 5 users beats 1 round of 15.
  example_good: |-
    # Dropbox: Before building the product, Drew Houston made a 3-minute demo video showing the concept.
    # The waitlist went from 5K to 75K overnight — validating demand with zero code.
  example_bad: |-
    # Anti-pattern: Violating Prototype Testing (Test Before Building)
    # Result: Weeks of engineering wasted on features that don\'t test well
    # Result: late-stage redesigns
- id: P-PM-NORTH-STAR
  name: North Star Metric
  why: >-
    Without a single metric that defines success, teams optimize for different things — marketing maximizes signups, engineering
    minimizes bugs, sales maximizes revenue. These goals conflict. A North Star Metric (NSM) aligns the entire company around
    the ONE outcome that matters most. Spotify uses 'time spent listening', Airbnb uses 'nights booked', Slack uses 'messages
    sent per week'. The NSM must capture value delivered to customers, not just business extraction from customers. Revenue
    is a lagging indicator — the NSM should be a leading indicator of sustainable growth.
  how_to_apply: >-
    1. The NSM must reflect VALUE DELIVERED to users (not revenue). 2. It must be leading (predicts future revenue), not lagging
    (measures past revenue). 3. It must be actionable (teams can influence it). 4. It must be measurable (can be tracked weekly).
    5. Decompose the NSM into input metrics each team owns. 6. Review weekly in all-hands. 7. Every feature should be justified
    by its expected impact on the NSM.
  mental_model: >-
    North Star (the actual star) — every navigator can see it, and it guides all ships in the same direction regardless of
    where they are.
  domains:
    domain:
    - management
    - observability
    concern:
    - product
    - strategy
    - metrics
  violation_consequence: Teams pulling in different directions, vanity metrics masking real problems, revenue focus causing
    user value erosion.
  teaching_example: >-
    Facebook's NSM: Daily Active Users (DAU). Every team asks: 'Will this feature increase DAU?' When the growth team found
    that users who added 7 friends in 10 days retained, they focused ALL efforts on that input metric.
  when_applies: All software engineering decisions
  when_not_applies: throwaway prototypes, learning exercises, or spike investigations where speed trumps correctness
  sources:
  - https://amplitude.com/blog/north-star-metric
  text: >-
    North Star Metric: North Star (the actual star) — every navigator can see it, and it guides all ships in the same direction
    regardless of where they are.
  severity: medium
  technologies:
    domain:
    - general
  how_to_do_right: >-
    1. The NSM must reflect VALUE DELIVERED to users (not revenue). 2. It must be leading (predicts future revenue), not lagging
    (measures past revenue). 3. It must be actionable (teams can influence it). 4. It must be measurable (can be tracked weekly).
    5. Decompose the NSM into input metrics each team owns. 6. Review weekly in all-hands. 7. Every feature should be justified
    by its expected impact on the NSM.
  example_good: |-
    # Facebook's NSM: Daily Active Users (DAU).
    # Every team asks: 'Will this feature increase DAU?' When the growth team found that users who added 7 friends in 10 days retained, they focused ALL efforts on that input metric.
  example_bad: |-
    # Anti-pattern: Violating North Star Metric
    # Result: Teams pulling in different directions
    # Result: vanity metrics masking real problems
- id: P-PM-OKR
  name: OKRs (Objectives and Key Results)
  why: >-
    Goals without measurable outcomes are wishes. OKRs force clarity: the Objective is qualitative (what you want to achieve)
    and Key Results are quantitative (how you know you achieved it). Without measurable key results, teams declare 'we launched
    the feature' as success — but launching is output, not outcome. Intel (where Andy Grove invented OKRs) and Google (where
    John Doerr brought them) credit OKRs with enabling focus, alignment, and accountability at scale. The power is in the
    constraint: 3-5 objectives with 3-5 key results each.
  how_to_apply: >-
    1. Objective: qualitative, inspiring, time-bound ('Become the #1 choice for small business invoicing'). 2. Key Results:
    quantitative, measurable, outcome-based ('Increase NPS from 40 to 60', 'Reduce time-to-first-invoice from 15 min to 3
    min'). 3. Maximum 3-5 OKRs per team per quarter. 4. 70% completion is target — 100% means OKRs were too easy. 5. Grade
    quarterly: 0.0-1.0 scale. 6. Separate committed OKRs (must hit) from aspirational (stretch). 7. OKRs are not tasks — they
    are outcomes.
  mental_model: >-
    Destination + GPS — the objective is 'reach San Francisco' and the key results are the GPS checkpoints that confirm you're
    on track (passed Sacramento, reached Bay Bridge, arrived downtown).
  domains:
    domain:
    - management
    - planning
    concern:
    - product
    - strategy
  violation_consequence: Feature factories (shipping without impact), misaligned teams, no accountability for outcomes, sandbagged
    easy goals.
  teaching_example: >-
    BAD OKR: 'O: Improve search. KR: Ship new search feature.' (Output, not outcome). GOOD OKR: 'O: Make finding products
    effortless. KR1: Increase search-to-purchase rate from 5% to 12%. KR2: Reduce zero-result searches from 15% to 3%. KR3:
    Decrease average time-to-find from 45s to 15s.'
  when_applies: All software engineering decisions
  when_not_applies: throwaway prototypes, learning exercises, or spike investigations where speed trumps correctness
  sources:
  - https://rework.withgoogle.com/guides/set-goals-with-okrs/
  text: >-
    OKRs (Objectives and Key Results): Destination + GPS — the objective is 'reach San Francisco' and the key results are
    the GPS checkpoints that confirm you're on track (passed Sacramento, reached Bay Bridge, arrived downtown).
  severity: medium
  technologies:
    domain:
    - general
  how_to_do_right: >-
    1. Objective: qualitative, inspiring, time-bound ('Become the #1 choice for small business invoicing'). 2. Key Results:
    quantitative, measurable, outcome-based ('Increase NPS from 40 to 60', 'Reduce time-to-first-invoice from 15 min to 3
    min'). 3. Maximum 3-5 OKRs per team per quarter. 4. 70% completion is target — 100% means OKRs were too easy. 5. Grade
    quarterly: 0.0-1.0 scale. 6. Separate committed OKRs (must hit) from aspirational (stretch). 7. OKRs are not tasks — they
    are outcomes.
  example_good: |-
    # BAD OKR: 'O: Improve search.
    # KR: Ship new search feature.' (Output, not outcome).
    # GOOD OKR: 'O: Make finding products effortless.
    # KR1: Increase search-to-purchase rate from 5% to 12%.
  example_bad: |-
    # Anti-pattern: Violating OKRs (Objectives and Key Results)
    # Result: Feature factories (shipping without impact)
    # Result: misaligned teams
- id: P-PM-RICE
  name: RICE Prioritization Framework
  why: >-
    Without a scoring framework, prioritization devolves into HiPPO (Highest Paid Person's Opinion) or loudest-customer-wins.
    RICE (Reach, Impact, Confidence, Effort) provides a quantitative comparison across heterogeneous features. It forces teams
    to estimate each dimension separately instead of making gut-feel tradeoffs. Intercom, who created RICE, found it reduced
    prioritization arguments by 80% and increased alignment. The Confidence factor is key — it penalizes ideas without evidence.
  how_to_apply: >-
    1. Reach: How many users/events per quarter? (e.g., 1000 users/quarter). 2. Impact: How much does it move the NSM per
    user? (3=massive, 2=high, 1=medium, 0.5=low, 0.25=minimal). 3. Confidence: How sure are we? (100%=high confidence with
    data, 80%=some evidence, 50%=gut feel). 4. Effort: Person-months to build (higher = worse). 5. Score = (Reach × Impact
    × Confidence) / Effort. 6. Sort by score. 7. Review scores quarterly as new data arrives.
  mental_model: >-
    Investment portfolio — each feature is a bet. RICE calculates the expected return (Reach × Impact × Confidence) divided
    by the cost (Effort). Invest in the highest-return bets.
  domains:
    domain:
    - management
    - planning
    concern:
    - product
    - prioritization
  violation_consequence: >-
    Pet projects prioritized over high-impact features, low-confidence ideas consuming resources, effort underestimated consistently.
  teaching_example: >-
    Feature A: Reach=10000, Impact=2, Confidence=80%, Effort=3 → Score = (10000×2×0.8)/3 = 5333. Feature B: Reach=500, Impact=3,
    Confidence=50%, Effort=1 → Score = (500×3×0.5)/1 = 750. Feature A wins despite Feature B being the CEO's pet project.
  when_applies: All software engineering decisions
  when_not_applies: throwaway prototypes, learning exercises, or spike investigations where speed trumps correctness
  sources:
  - https://www.intercom.com/blog/rice-simple-prioritization-for-product-managers/
  text: 'RICE Prioritization Framework: Investment portfolio — each feature is a bet.'
  severity: medium
  technologies:
    domain:
    - general
  how_to_do_right: >-
    1. Reach: How many users/events per quarter? (e.g., 1000 users/quarter). 2. Impact: How much does it move the NSM per
    user? (3=massive, 2=high, 1=medium, 0.5=low, 0.25=minimal). 3. Confidence: How sure are we? (100%=high confidence with
    data, 80%=some evidence, 50%=gut feel). 4. Effort: Person-months to build (higher = worse). 5. Score = (Reach × Impact
    × Confidence) / Effort. 6. Sort by score. 7. Review scores quarterly as new data arrives.
  example_good: |-
    # Feature A: Reach=10000, Impact=2, Confidence=80%, Effort=3 → Score = (10000×2×0.8)/3 = 5333.
    # Feature B: Reach=500, Impact=3, Confidence=50%, Effort=1 → Score = (500×3×0.5)/1 = 750.
    # Feature A wins despite Feature B being the CEO's pet project.
  example_bad: |-
    # Anti-pattern: Violating RICE Prioritization Framework
    # Result: Pet projects prioritized over high-impact features
    # Result: low-confidence ideas consuming resources
- id: P-PM-USER-STORY
  name: User Story Format and Quality
  why: >-
    User stories are not requirements — they are placeholders for conversations. The format 'As a [persona], I want [action],
    so that [benefit]' forces three critical elements: WHO benefits, WHAT they need, and WHY it matters. Without the 'so that'
    clause, teams build features without understanding the underlying need. Without the persona, they build for an abstract
    'user' instead of a real person with real constraints. The story is an invitation to discuss, not a specification to implement.
  how_to_apply: >-
    1. Format: 'As a [specific persona], I want [concrete action], so that [measurable benefit]'. 2. Include acceptance criteria
    in Given/When/Then BDD format. 3. Apply INVEST criteria: Independent, Negotiable, Valuable, Estimable, Small, Testable.
    4. One story = one user value increment (not one technical task). 5. Add 'Definition of Done' checklist (tests pass, reviewed,
    deployed, monitored). 6. Use story mapping to organize stories into a coherent user journey.
  mental_model: >-
    Movie pitch — 'A lonely robot on Earth (persona) wants to find another living being (action) so he can fulfill his purpose
    (benefit).' If the pitch doesn't compel you, the story needs work.
  domains:
    domain:
    - management
    concern:
    - product
    - agile
    - requirements
  violation_consequence: Vague requirements, scope creep, building technical tasks instead of user value, stories that can't
    be tested.
  teaching_example: >-
    BAD: 'As a user, I want a search feature.' (No persona, no benefit, not testable). GOOD: 'As a returning customer, I want
    to search my order history by product name, so that I can quickly reorder items without browsing the full catalog.' AC:
    Given I have 10+ past orders, When I type 'headphones', Then I see matching orders within 500ms sorted by date.
  when_applies: All software engineering decisions
  when_not_applies: throwaway prototypes, learning exercises, or spike investigations where speed trumps correctness
  sources:
  - https://www.mountaingoatsoftware.com/agile/user-stories
  text: >-
    User Story Format and Quality: Movie pitch — 'A lonely robot on Earth (persona) wants to find another living being (action)
    so he can fulfill his purpose (benefit).' If the pitch doesn't compel you, the story needs work.
  severity: medium
  technologies:
    domain:
    - general
  how_to_do_right: >-
    1. Format: 'As a [specific persona], I want [concrete action], so that [measurable benefit]'. 2. Include acceptance criteria
    in Given/When/Then BDD format. 3. Apply INVEST criteria: Independent, Negotiable, Valuable, Estimable, Small, Testable.
    4. One story = one user value increment (not one technical task). 5. Add 'Definition of Done' checklist (tests pass, reviewed,
    deployed, monitored). 6. Use story mapping to organize stories into a coherent user journey.
  example_good: |-
    # BAD: 'As a user, I want a search feature.' (No persona, no benefit, not testable).
    # GOOD: 'As a returning customer, I want to search my order history by product name, so that I can quickly reorder items without browsing the full catalog.' AC: Given I have 10+ past orders, When I type 'headphones', Then I see matching orders within 500ms sorted by date.
  example_bad: |-
    # Anti-pattern: Violating User Story Format and Quality
    # Result: Vague requirements
    # Result: scope creep
- id: P-PM-STORY-MAPPING
  name: User Story Mapping
  why: >-
    A flat backlog is a list of disconnected items — you can't see the user's journey, can't identify gaps, and can't determine
    what constitutes a viable first release. Jeff Patton's story mapping arranges stories in two dimensions: horizontal (user
    journey steps) and vertical (priority within each step). The top row (backbone) is the minimum viable flow. Each row below
    adds richness. This visualization makes it obvious where gaps exist and what the thinnest viable slice is. It prevents
    'polishing one feature while others are missing entirely.'
  how_to_apply: >-
    1. Lay out the user's journey horizontally (backbone): activities → tasks. 2. Under each task, place stories vertically
    from most essential (top) to nice-to-have (bottom). 3. Draw a horizontal line for 'Release 1' — everything above is MVP.
    4. Each release line should tell a COMPLETE story (thin end-to-end, not thick in one area). 5. Identify gaps: if a backbone
    task has no stories below it, the flow is broken. 6. Use physical cards on a wall or Miro/FigJam digitally.
  mental_model: >-
    Map of a road trip — the backbone is the route (city to city), the stories are the stops at each city (hotel, restaurant,
    attraction). Release 1 is the minimum trip: drive-through meals and budget hotels. Release 2 adds nice restaurants. Release
    3 adds luxury hotels.
  domains:
    domain:
    - management
    - planning
    concern:
    - product
    - agile
  violation_consequence: >-
    Over-investing in one feature while others are broken, shipping a 'release' that doesn't complete any user flow, missing
    critical steps in the journey.
  teaching_example: >-
    E-commerce story map backbone: Browse → Search → Product Detail → Add to Cart → Checkout → Order Confirmation. Release
    1: basic grid, keyword search, single product page, simple cart, single payment method, email confirmation. Release 2:
    filters, autocomplete, reviews, saved cart, multiple payments, order tracking.
  when_applies: All software engineering decisions
  when_not_applies: throwaway prototypes, learning exercises, or spike investigations where speed trumps correctness
  sources:
  - https://www.jpattonassociates.com/user-story-mapping/
  text: >-
    User Story Mapping: Map of a road trip — the backbone is the route (city to city), the stories are the stops at each city
    (hotel, restaurant, attraction).
  severity: medium
  technologies:
    domain:
    - general
  how_to_do_right: >-
    1. Lay out the user's journey horizontally (backbone): activities → tasks. 2. Under each task, place stories vertically
    from most essential (top) to nice-to-have (bottom). 3. Draw a horizontal line for 'Release 1' — everything above is MVP.
    4. Each release line should tell a COMPLETE story (thin end-to-end, not thick in one area). 5. Identify gaps: if a backbone
    task has no stories below it, the flow is broken. 6. Use physical cards on a wall or Miro/FigJam digitally.
  example_good: |-
    # E-commerce story map backbone: Browse → Search → Product Detail → Add to Cart → Checkout → Order Confirmation.
    # Release 1: basic grid, keyword search, single product page, simple cart, single payment method, email confirmation.
    # Release 2: filters, autocomplete, reviews, saved cart, multiple payments, order tracking.
  example_bad: |-
    # Anti-pattern: Violating User Story Mapping
    # Result: Over-investing in one feature while others are broken
    # Result: shipping a \'release\' that doesn\'t complete any user flow
- id: P-PM-AARRR
  name: AARRR Pirate Metrics
  why: >-
    Dave McClure's pirate funnel (Acquisition → Activation → Retention → Revenue → Referral) breaks the customer lifecycle
    into 5 stages, each with distinct metrics and strategies. Without this framework, teams measure vanity metrics (pageviews,
    downloads) that don't indicate business health. The funnel reveals WHERE users drop off. Retention is the most critical
    — a leaky bucket cannot be filled by more acquisition. If retention is broken, spending on acquisition is waste.
  how_to_apply: >-
    1. Acquisition: How do users find you? (channels, CAC, organic vs paid). 2. Activation: Do they have a good first experience?
    ('Aha moment' — Facebook: 7 friends in 10 days). 3. Retention: Do they come back? (D1, D7, D30 retention curves, cohort
    analysis). 4. Revenue: Do they pay? (conversion rate, ARPU, LTV). 5. Referral: Do they tell others? (NPS, viral coefficient,
    referral rate). 6. Measure ALL 5 stages — optimize the weakest link first.
  mental_model: >-
    Water pipe with 5 sections — a leak in any section reduces the flow at the end. Fix the biggest leak first, not the section
    that's easiest to improve.
  domains:
    domain:
    - management
    - observability
    concern:
    - product
    - metrics
    - growth
  violation_consequence: >-
    Pouring money into acquisition while activation is broken, celebrating revenue without noticing retention is declining,
    ignoring referral as a growth channel.
  teaching_example: >-
    Startup sees 10K signups/month but only 500 become active. Fixing activation (5% → 25%) produces 2500 active users — a
    5x improvement. Doubling acquisition (10K → 20K) at 5% activation produces only 1000 — a 2x improvement at higher cost.
  when_applies: All software engineering decisions
  when_not_applies: throwaway prototypes, learning exercises, or spike investigations where speed trumps correctness
  sources:
  - https://www.slideshare.net/daboross/startup-metrics-for-pirates-long-version
  text: 'AARRR Pirate Metrics: Water pipe with 5 sections — a leak in any section reduces the flow at the end.'
  severity: medium
  technologies:
    domain:
    - general
  how_to_do_right: >-
    1. Acquisition: How do users find you? (channels, CAC, organic vs paid). 2. Activation: Do they have a good first experience?
    ('Aha moment' — Facebook: 7 friends in 10 days). 3. Retention: Do they come back? (D1, D7, D30 retention curves, cohort
    analysis). 4. Revenue: Do they pay? (conversion rate, ARPU, LTV). 5. Referral: Do they tell others? (NPS, viral coefficient,
    referral rate). 6. Measure ALL 5 stages — optimize the weakest link first.
  example_good: |-
    # Startup sees 10K signups/month but only 500 become active.
    # Fixing activation (5% → 25%) produces 2500 active users — a 5x improvement.
    # Doubling acquisition (10K → 20K) at 5% activation produces only 1000 — a 2x improvement at higher cost.
  example_bad: |-
    # Anti-pattern: Violating AARRR Pirate Metrics
    # Result: Pouring money into acquisition while activation is broken
    # Result: celebrating revenue without noticing retention is declining
- id: P-PM-COHORT-ANALYSIS
  name: Cohort Analysis
  why: >-
    Aggregate metrics hide critical trends. If 1000 users signed up in January and 1000 in February, and March DAU is 1200
    — is that good? Cohort analysis reveals that January cohort retained 400 (40%) and February cohort retained 800 (80%).
    The product improved dramatically but aggregate DAU masks it. Conversely, growing DAU can mask declining retention if
    acquisition is increasing faster than churn. Cohort analysis is the only way to understand behavior over time. Every SaaS
    metric (retention, LTV, NRR) requires cohort-level analysis to be meaningful.
  how_to_apply: >-
    1. Group users by sign-up date (weekly or monthly cohorts). 2. Track behavior over time (D1, D7, D30, D60, D90 retention).
    3. Plot as a retention curve (cohort on y-axis, time on x-axis). 4. Compare curves between cohorts — is it improving?
    5. Segment cohorts by acquisition channel, plan, geography. 6. Look for the 'retention floor' — where the curve flattens.
    7. Align product changes to cohort dates to measure impact.
  mental_model: >-
    School graduation classes — you compare the Class of 2025 against the Class of 2024, not all students together. Each class
    had different teachers, curriculum, and conditions.
  domains:
    domain:
    - management
    - observability
    - architecture
    concern:
    - product
    - metrics
    - data
    - analytics
  violation_consequence: >-
    Aggregate metrics hiding problems, false confidence from growing DAU while retention drops, inability to measure impact
    of product changes.
  teaching_example: >-
    SaaS dashboard shows 85% monthly retention — looks great. Cohort analysis reveals: Jan cohort: 90%, Feb: 85%, Mar: 80%,
    Apr: 75%. Retention is declining 5 points per cohort. Without cohort analysis, this trend is invisible until it becomes
    a revenue crisis.
  when_applies: All software engineering decisions
  when_not_applies: throwaway prototypes, learning exercises, or spike investigations where speed trumps correctness
  sources:
  - https://amplitude.com/blog/cohort-analysis
  text: >-
    Cohort Analysis: School graduation classes — you compare the Class of 2025 against the Class of 2024, not all students
    together.
  severity: medium
  technologies:
    domain:
    - general
  how_to_do_right: >-
    1. Group users by sign-up date (weekly or monthly cohorts). 2. Track behavior over time (D1, D7, D30, D60, D90 retention).
    3. Plot as a retention curve (cohort on y-axis, time on x-axis). 4. Compare curves between cohorts — is it improving?
    5. Segment cohorts by acquisition channel, plan, geography. 6. Look for the 'retention floor' — where the curve flattens.
    7. Align product changes to cohort dates to measure impact.
  example_good: |-
    # SaaS dashboard shows 85% monthly retention — looks great.
    # Cohort analysis reveals: Jan cohort: 90%, Feb: 85%, Mar: 80%, Apr: 75%.
    # Retention is declining 5 points per cohort.
    # Without cohort analysis, this trend is invisible until it becomes a revenue crisis.
  example_bad: |-
    # Anti-pattern: Violating Cohort Analysis
    # Result: Aggregate metrics hiding problems
    # Result: false confidence from growing DAU while retention drops
- id: P-PM-AB-TESTING
  name: A/B Testing Rigor
  why: >-
    Human intuition about user behavior is wrong 80% of the time (Ron Kohavi, Microsoft). A/B testing replaces opinion with
    evidence. But poorly run A/B tests are worse than no tests — they produce false confidence in wrong conclusions. Common
    mistakes: stopping tests too early (peeking), testing too many variants, ignoring statistical significance, measuring
    the wrong metric, not accounting for novelty effects. A rigorous A/B test requires pre-registration of hypothesis, sample
    size calculation, and waiting for statistical significance before drawing conclusions.
  how_to_apply: >-
    1. Pre-register: State hypothesis, primary metric, sample size, and duration BEFORE starting. 2. Calculate required sample
    size (power analysis: 80% power, 5% significance). 3. Run for full duration — NEVER peek and stop early on positive results.
    4. One primary metric per test (others are exploratory). 5. Minimum 2 weeks to capture weekly cycles. 6. Check for statistical
    significance (p < 0.05) AND practical significance (is the effect large enough to matter?). 7. Document and share results
    regardless of outcome.
  mental_model: >-
    Clinical trial — you wouldn't approve a drug based on 10 patients after 2 days. You need sufficient sample size, controlled
    conditions, and enough time to observe real effects.
  domains:
    domain:
    - management
    - observability
    concern:
    - product
    - metrics
    - experimentation
  violation_consequence: >-
    False positives (ship features that don't actually improve anything), false negatives (kill features that work), wasted
    engineering time on inconclusive tests.
  teaching_example: >-
    BAD: 'We ran the new checkout for 3 days, conversion went up 15%, ship it!' (200 users, p=0.18 — not significant, likely
    noise). GOOD: 'Pre-registered test: 10K users per variant, 2-week duration. Result: +3.2% conversion, p=0.003, 95% CI
    [1.8%, 4.6%]. Practical significance: +$120K/year. Ship it.'
  when_applies: All software engineering decisions
  when_not_applies: throwaway prototypes, learning exercises, or spike investigations where speed trumps correctness
  sources:
  - https://exp-platform.com/Documents/2017-08%20KDDMetaAnalysis.pdf
  text: 'A/B Testing Rigor: Clinical trial — you wouldn''t approve a drug based on 10 patients after 2 days.'
  severity: medium
  technologies:
    domain:
    - general
  how_to_do_right: >-
    1. Pre-register: State hypothesis, primary metric, sample size, and duration BEFORE starting. 2. Calculate required sample
    size (power analysis: 80% power, 5% significance). 3. Run for full duration — NEVER peek and stop early on positive results.
    4. One primary metric per test (others are exploratory). 5. Minimum 2 weeks to capture weekly cycles. 6. Check for statistical
    significance (p < 0.05) AND practical significance (is the effect large enough to matter?). 7. Document and share results
    regardless of outcome.
  example_good: |-
    # BAD: 'We ran the new checkout for 3 days, conversion went up 15%, ship it!' (200 users, p=0.18 — not significant, likely noise).
    # GOOD: 'Pre-registered test: 10K users per variant, 2-week duration.
    # Result: +3.2% conversion, p=0.003, 95% CI [1.8%, 4.6%].
    # Practical significance: +$120K/year.
  example_bad: |-
    # Anti-pattern: Violating A/B Testing Rigor
    # Result: False positives (ship features that don\'t actually improve anything)
    # Result: false negatives (kill features that work)
- id: P-PM-ROADMAP
  name: Now/Next/Later Roadmap
  why: >-
    Date-based roadmaps are lies — they create false precision about unpredictable work. A 'Q3 2026' commitment made in Q1
    with 30% of the information available will be wrong. Now/Next/Later communicates priorities and direction without false
    precision. 'Now' items are committed (in progress). 'Next' items are planned (will start soon). 'Later' items are exploratory
    (being researched). This format sets honest expectations while maintaining strategic direction. Basecamp, Intercom, and
    Atlassian all advocate for this format.
  how_to_apply: >-
    1. Now (this quarter): Committed, in progress, specific scope. 2. Next (next quarter): Planned, scoped but flexible, may
    shift. 3. Later (this year): Directional, exploratory, no commitment. 4. Frame items as OUTCOMES not features ('Reduce
    onboarding time' not 'Build wizard'). 5. Update monthly. 6. Different stakeholders get different detail levels (leadership:
    themes, eng: epics, users: outcomes). 7. Always show the 'why' — connect roadmap items to strategy.
  mental_model: >-
    Weather forecast — today's weather is precise (Now), this week is directional (Next), next month is just 'probably warmer'
    (Later). The further out, the less precise — and that's honest.
  domains:
    domain:
    - management
    concern:
    - product
    - strategy
    - communication
  violation_consequence: Broken commitments, team whiplash from changing dates, stakeholders losing trust, false precision
    causing scope-lock.
  teaching_example: >-
    BAD: 'Q2: Search v2, Q3: ML recommendations, Q4: Mobile app.' GOOD: 'Now: Improving search relevance (search-to-purchase
    rate: 5% → 12%). Next: Personalized recommendations (increase repeat purchase rate). Later: Mobile experience (exploring
    mobile-first use cases).'
  when_applies: All software engineering decisions
  when_not_applies: throwaway prototypes, learning exercises, or spike investigations where speed trumps correctness
  sources:
  - https://www.intercom.com/blog/product-roadmaps/
  text: >-
    Now/Next/Later Roadmap: Weather forecast — today's weather is precise (Now), this week is directional (Next), next month
    is just 'probably warmer' (Later).
  severity: medium
  technologies:
    domain:
    - general
  how_to_do_right: >-
    1. Now (this quarter): Committed, in progress, specific scope. 2. Next (next quarter): Planned, scoped but flexible, may
    shift. 3. Later (this year): Directional, exploratory, no commitment. 4. Frame items as OUTCOMES not features ('Reduce
    onboarding time' not 'Build wizard'). 5. Update monthly. 6. Different stakeholders get different detail levels (leadership:
    themes, eng: epics, users: outcomes). 7. Always show the 'why' — connect roadmap items to strategy.
  example_good: |-
    # BAD: 'Q2: Search v2, Q3: ML recommendations, Q4: Mobile app.' GOOD: 'Now: Improving search relevance (search-to-purchase rate: 5% → 12%).
    # Next: Personalized recommendations (increase repeat purchase rate).
    # Later: Mobile experience (exploring mobile-first use cases).'.
  example_bad: |-
    # Anti-pattern: Violating Now/Next/Later Roadmap
    # Result: Broken commitments
    # Result: team whiplash from changing dates
- id: P-PM-SPRINT-PLANNING
  name: Sprint Planning
  why: >-
    Sprint planning without capacity calculation produces over-commitment, which produces crunch, which produces burnout and
    quality drops. Without clear commitment, the team has no definition of success for the sprint. The planning meeting serves
    three functions: (1) select WHAT to build this sprint, (2) discuss HOW to build it, (3) build shared understanding of
    the work. If any of these three is missing, the sprint starts with confusion and ends with disappointment.
  how_to_apply: >-
    1. Calculate capacity: team members × available days × focus factor (typically 0.6-0.8). 2. Pull items from prioritized
    backlog UP TO capacity. 3. Break stories into tasks with time estimates. 4. Discuss technical approach for complex items.
    5. Identify dependencies and blockers upfront. 6. Sprint goal: one sentence that summarizes the sprint's purpose. 7. Team
    commits to the goal (not management commits FOR the team). 8. Time-box: 2 hours for a 2-week sprint.
  mental_model: >-
    Packing a suitcase — you know the suitcase size (capacity), you prioritize what to bring (backlog), and you pack the most
    important items first. You don't cram everything in and hope the zipper closes.
  domains:
    domain:
    - management
    - planning
    concern:
    - product
    - agile
  violation_consequence: Over-commitment, missed sprint goals, rushed work, burnout, loss of team trust in the planning process.
  teaching_example: >-
    Team of 5, 2-week sprint, 2 on PTO for 3 days each. Capacity = (5×10 - 2×3) × 0.7 = 30.8 story points. Backlog has 50
    points of work → take 30, not 50.
  when_applies: All software engineering decisions
  when_not_applies: throwaway prototypes, learning exercises, or spike investigations where speed trumps correctness
  sources:
  - https://scrumguides.org/scrum-guide.html#sprint-planning
