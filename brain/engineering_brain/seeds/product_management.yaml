- id: P-PM-BACKLOG-GROOMING
  name: Backlog Grooming (Refinement)
  why: >-
    A sprint planning meeting where stories are being discussed for the first time is a sprint planning meeting that will
    fail. Grooming ensures that stories entering sprint planning are understood, estimated, and ready. Without grooming, planning
    meetings run long, estimates are wild guesses, and teams commit to stories they don't understand. The rule of thumb is
    to have 2 sprints of groomed stories ready at all times — this provides a buffer for re-prioritization without scrambling.
  how_to_apply: >-
    1. Schedule weekly grooming (1 hour for 2-week sprints). 2. Review stories that might enter the NEXT 2 sprints. 3. Clarify
    acceptance criteria — if the team can't agree on 'done', the story isn't ready. 4. Estimate story points (planning poker
    for consensus). 5. Split stories that are too large (>8 points typically). 6. Identify technical unknowns and schedule
    spikes. 7. Mark stories as 'ready' when they meet Definition of Ready (estimated, criteria clear, dependencies identified).
    8. The PM writes stories BEFORE grooming, not during.
  mental_model: >-
    Prep cook in a restaurant — ingredients are washed, chopped, and measured before the dinner rush. The chef (sprint planning)
    doesn't start by shelling peas.
  domains:
    domain:
    - management
    - planning
    concern:
    - product
    - agile
  violation_consequence: >-
    Sprint planning takes 4 hours instead of 2, stories are misunderstood mid-sprint, estimates are wildly wrong, scope creep
    during sprint.
  teaching_example: >-
    Definition of Ready checklist: (1) Acceptance criteria in Given/When/Then. (2) Story points estimated. (3) Dependencies
    identified. (4) Designs attached (if UI). (5) Technical approach discussed. If any box is unchecked, story goes back to
    grooming, not into sprint.
  when_applies: All software engineering decisions
  when_not_applies: throwaway prototypes, learning exercises, or spike investigations where speed trumps correctness
  sources:
  - https://scrumguides.org/scrum-guide.html#product-backlog
  text: >-
    Backlog Grooming (Refinement): Prep cook in a restaurant — ingredients are washed, chopped, and measured before the dinner
    rush.
  severity: medium
  technologies:
    domain:
    - general
  how_to_do_right: >-
    1. Schedule weekly grooming (1 hour for 2-week sprints). 2. Review stories that might enter the NEXT 2 sprints. 3. Clarify
    acceptance criteria — if the team can't agree on 'done', the story isn't ready. 4. Estimate story points (planning poker
    for consensus). 5. Split stories that are too large (>8 points typically). 6. Identify technical unknowns and schedule
    spikes. 7. Mark stories as 'ready' when they meet Definition of Ready (estimated, criteria clear, dependencies identified).
    8. The PM writes stories BEFORE grooming, not during.
  example_good: |-
    # Definition of Ready checklist: (1) Acceptance criteria in Given/When/Then.
    # (2) Story points estimated.
    # (3) Dependencies identified.
    # (4) Designs attached (if UI).
  example_bad: |-
    # Anti-pattern: Violating Backlog Grooming (Refinement)
    # Result: Sprint planning takes 4 hours instead of 2
    # Result: stories are misunderstood mid-sprint
- id: P-PM-INVEST
  name: INVEST Criteria for User Story Quality
  why: |
    INVEST (Independent, Negotiable, Valuable, Estimable, Small, Testable) is the gold standard checklist for user story quality, introduced by Bill Wake in 2002 and adopted by the Agile Alliance. A story that fails any INVEST criterion is a story that will cause problems: non-Independent stories create planning dependencies, non-Estimable stories become scope sinks, non-Testable stories have no definition of done. Teams that apply INVEST to every story before sprint planning report 40% fewer mid-sprint scope changes. The most common failure is Valuable — developers write technical tasks disguised as user stories ("As a developer, I want to refactor the database schema"), which have no user value and resist meaningful acceptance criteria.
  how_to_apply: |
    1. Independent: Can this story be developed and deployed without other stories?
       If not, split or merge with the dependency.
    2. Negotiable: Is the HOW flexible (not the WHAT/WHY)? If acceptance criteria
       are locked to implementation details, the story is too prescriptive.
    3. Valuable: Does this story deliver value to a USER or CUSTOMER (not just a developer)?
       "Refactor database" → Not valuable. "Search results under 500ms" → Valuable.
    4. Estimable: Can the team estimate story points? If not, it needs splitting or
       a spike (research task) to resolve unknowns.
    5. Small: Can this be completed in one sprint? >8 story points → split it.
    6. Testable: Can you write Given/When/Then acceptance criteria now?
       If not, the story is not ready for sprint.
    Apply as a checklist before grooming: mark each criterion PASS/FAIL.
  mental_model: |
    Pre-flight checklist — a pilot doesn't take off with a failed item on the checklist. A story with a failed INVEST criterion doesn't enter the sprint.
  domains:
    domain:
    - management
    concern:
    - product
    - agile
    - requirements
    - user_stories
  violation_consequence: |
    Dependent stories create planning gridlock, non-estimable stories blow sprint capacity, non-testable stories have no "done" — the sprint never truly ends.
  teaching_example: |
    FAILING INVEST: "As a developer, I want to add Redis caching so queries are faster." - Not Independent (requires database schema work) - Not Valuable (developer-centric, not user outcome) - Not Testable (no measurable acceptance criteria)
    PASSING INVEST: "As a market viewer, I want the order book to refresh within 500ms, so I can make timely trading decisions." Given the order book is open, When new trades execute, Then the display updates within 500ms. (Independent, Negotiable, Valuable, Estimable=3pts, Small, Testable)
  when_applies: All software engineering decisions
  when_not_applies: throwaway prototypes, learning exercises, or spike investigations where speed trumps correctness
  sources:
  - https://agilealliance.org/glossary/invest/
  - https://blog.logrocket.com/product-management/writing-meaningful-user-stories-invest-principle/
  - https://agileforall.com/new-to-agile-invest-in-good-user-stories/
  text: >-
    INVEST Criteria for User Story Quality: Pre-flight checklist — a pilot doesn't take off with a failed item on the checklist.
  severity: medium
  technologies:
    domain:
    - general
  how_to_do_right: |-
    1. Independent: Can this story be developed and deployed without other stories?
       If not, split or merge with the dependency.
    2. Negotiable: Is the HOW flexible (not the WHAT/WHY)? If acceptance criteria
       are locked to implementation details, the story is too prescriptive.
    3. Valuable: Does this story deliver value to a USER or CUSTOMER (not just a developer)?
       "Refactor database" → Not valuable. "Search results under 500ms" → Valuable.
    4. Estimable: Can the team estimate story points? If not, it needs splitting or
       a spike (research task) to resolve unknowns.
    5. Small: Can this be completed in one sprint? >8 story points → split it.
    6. Testable: Can you write Given/When/Then acceptance criteria now?
       If not, the story is not ready for sprint.
    Apply as a checklist before grooming: mark each criterion PASS/FAIL.
  example_good: |-
    # FAILING INVEST: "As a developer, I want to add Redis caching so queries are faster." - Not Independent (requires database schema work) - Not Valuable (developer-centric, not user outcome) - Not Testable (no measurable acceptance criteria)
    PASSING INVEST: "As a market viewer, I want the order book to refresh within 500ms, so I can make timely trading decisions." Given the order book is open, When new trades execute, Then the display updates within 500ms.
    # (Independent, Negotiable, Valuable, Estimable=3pts, Small, Testable).
  example_bad: |-
    # Anti-pattern: Violating INVEST Criteria for User Story Quality
    # Result: Dependent stories create planning gridlock
    # Result: non-estimable stories blow sprint capacity
- id: P-PM-WALKING-SKELETON
  name: Walking Skeleton MVP Pattern
  why: |
    A walking skeleton is the thinnest possible slice of functionality that traverses the full stack end-to-end — user action → API → business logic → database → response. It is not feature-complete; it is architecturally complete. Alistair Cockburn coined the term: "a tiny implementation of the system that performs a small end-to-end function." The alternative (building each layer fully before connecting them) creates integration risk: three months of frontend + three months of backend, then one month of integration hell. A walking skeleton, deployed on day 1, eliminates this risk. For prediction markets: the walking skeleton is "user submits a yes/no prediction, it is stored, and the current price is returned" — not the full LMSR, not the full UI, but a fully connected slice.
  how_to_apply: |
    1. Identify the most critical user flow (the core value exchange)
    2. Implement the thinnest possible version of every layer:
       - UI: simplest form (no styling)
       - API: single endpoint, no auth
       - Business logic: hardcoded or simplified calculation
       - Database: one table with essential fields
    3. Deploy this to a real environment (not localhost) on day 1-2
    4. Verify all integrations work: can a real user do the core action?
    5. Now add functionality incrementally — the skeleton never breaks
    6. Use feature toggles to hide incomplete features from users
    7. Each sprint adds "flesh to the skeleton" — never rebuilds the skeleton
  mental_model: |
    Building a house — you pour the foundation and frame all walls before finishing any single room. The frame is the walking skeleton. You can then add drywall, paint, and fixtures room by room without structural risk.
  domains:
    domain:
    - management
    - architecture
    concern:
    - product
    - mvp
    - delivery
  violation_consequence: |
    Integration surprises after months of parallel development, late-stage architectural changes, "the backend and frontend don't speak the same language" discovered on demo day.
  teaching_example: |
    Prediction market walking skeleton (week 1): GET /markets → [{"id": 1, "question": "Will Bitcoin exceed $100K by Dec 2026?", "yes_price": 0.45, "no_price": 0.55}] POST /markets/1/positions → {"outcome": "yes", "amount": 10.00} GET /markets/1/positions/{user_id} → {"yes_shares": 22.22, "cost": 10.00}
    Not yet: authentication, settlement, withdrawals, LMSR full implementation. But: fully deployed, every layer connected, first real trade possible.
  when_applies: New product development, greenfield features requiring multi-layer implementation
  when_not_applies: bug fixes, incremental enhancements to existing features
  sources:
  - https://martinfowler.com/bliki/WalkingSkeleton.html
  - https://www.alistair.cockburn.us/hexagonal-architecture/
  text: >-
    Walking Skeleton MVP Pattern: Building a house — you pour the foundation and frame all walls before finishing any single
    room.
  severity: medium
