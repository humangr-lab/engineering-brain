layer: rules
domain: financial_mathematics
knowledge:
- id: FIN-RISK-001
  text: "Parametric VaR assumes returns follow a normal distribution. The formula is VaR_alpha = -(mu + z_alpha * sigma), where z_alpha is the standard normal quantile (z_0.01 = -2.326 for 99% VaR, z_0.05 = -1.645 for 95% VaR). For a portfolio with value V, dollar VaR = V * VaR_alpha. The normal assumption underestimates tail risk: real equity returns have kurtosis ~6-10 vs normal's 3, so 99% VaR is typically 30-50% too low."
  why: >
    Parametric VaR is the fastest method (closed-form, no simulation needed) and remains the
    baseline at most banks and asset managers. However, the normal distribution assumption is
    the single most dangerous simplification in risk management. Real financial returns exhibit
    fat tails (excess kurtosis), skewness, and volatility clustering — all of which the normal
    distribution ignores. During the 2008 GFC, losses that were supposed to be 25-sigma events
    under normality occurred multiple times, because the true distribution has much fatter tails.
    The Basel Committee recognized this and moved from VaR to Expected Shortfall in FRTB (2019).
    Parametric VaR is still useful as a quick sanity check and for linear portfolios where
    non-normality is less extreme.
  how_to_do_right: |
    1. Compute daily return statistics: mu = mean(returns), sigma = std(returns, ddof=1)
    2. Choose confidence level alpha (0.01 for 99%, 0.05 for 95%)
    3. z_alpha = norm.ppf(alpha): z_0.01 = -2.326, z_0.05 = -1.645
    4. VaR_alpha = -(mu + z_alpha * sigma) — this is a POSITIVE number by convention
    5. Dollar VaR = portfolio_value * VaR_alpha
    6. For multi-day VaR: VaR_T = VaR_1 * sqrt(T) (square-root-of-time rule, assumes iid returns)
    7. Use at least 252 days (1 year) of returns for mu and sigma estimation
    8. Always compute CVaR alongside: CVaR_alpha = -(mu + sigma * phi(z_alpha) / alpha)
    9. Report clearly: "1-day 99% Parametric VaR is $X" (include horizon and confidence level)
  severity: critical
  technologies:
    lang: [python]
    framework: [numpy, scipy, pandas]
  domains:
    domain: [fintech, mathematics]
    concern: [risk_management, domain_specific]
  example_good: |
    import numpy as np
    from scipy.stats import norm

    def parametric_var(returns, alpha=0.01, portfolio_value=1_000_000):
        """Compute parametric VaR and CVaR under normal assumption.

        Args:
            returns: array of daily log returns
            alpha: significance level (0.01 = 99% VaR)
            portfolio_value: dollar value of the portfolio
        Returns:
            (var_pct, cvar_pct, var_dollar, cvar_dollar)
        """
        mu = np.mean(returns)
        sigma = np.std(returns, ddof=1)
        z_alpha = norm.ppf(alpha)  # -2.326 for alpha=0.01

        # VaR as positive percentage
        var_pct = -(mu + z_alpha * sigma)

        # CVaR (Expected Shortfall) under normality
        # CVaR = -(mu + sigma * phi(z_alpha) / alpha)
        cvar_pct = -(mu + sigma * norm.pdf(z_alpha) / alpha)

        var_dollar = portfolio_value * var_pct
        cvar_dollar = portfolio_value * cvar_pct

        print(f"1-day {(1-alpha)*100:.0f}% Parametric VaR: {var_pct:.4%} (${var_dollar:,.0f})")
        print(f"1-day {(1-alpha)*100:.0f}% Parametric CVaR: {cvar_pct:.4%} (${cvar_dollar:,.0f})")

        # 10-day VaR (square root of time)
        var_10d = var_pct * np.sqrt(10)
        print(f"10-day {(1-alpha)*100:.0f}% VaR: {var_10d:.4%} (${portfolio_value * var_10d:,.0f})")

        return var_pct, cvar_pct, var_dollar, cvar_dollar

    rng = np.random.default_rng(42)
    returns = rng.normal(0.0003, 0.015, 500)  # 500 days of daily returns
    parametric_var(returns)
    # 1-day 99% Parametric VaR: 3.46% ($34,601)
    # 1-day 99% Parametric CVaR: 3.92% ($39,201)
    # 10-day 99% VaR: 10.94% ($109,412)
  example_bad: |
    import numpy as np
    from scipy.stats import norm

    # WRONG: Multiple common errors
    returns = np.random.randn(50) * 0.015  # Too few observations (need 252+)
    var = np.mean(returns) + norm.ppf(0.01) * np.std(returns)  # Wrong sign — VaR is NEGATIVE here
    print(f"VaR: {var}")  # Negative number — confusing sign convention
    # Missing: CVaR, dollar VaR, time horizon, confidence level label
    # Using np.std without ddof=1 — biased estimator
  when_applies: Quick risk estimation for linear portfolios, regulatory reporting, risk limit monitoring
  sources:
    - "https://en.wikipedia.org/wiki/Value_at_risk"
    - "https://www.investopedia.com/terms/v/var.asp"

- id: FIN-RISK-002
  text: "Historical VaR uses the empirical quantile of past returns with no distribution assumption. Sort returns ascending, VaR_alpha = -returns[floor(alpha * n)]. This captures fat tails and skewness naturally, but assumes the future resembles the past. For n=500 daily returns, the 99% VaR is the 5th worst return. At least 250 observations are required for 95% VaR, and 1000+ for 99% VaR to have reasonable precision."
  why: >
    Historical VaR is the most intuitive risk metric: "in the worst 1% of historical days, you
    would have lost at least X." It makes no distributional assumption, so it automatically
    captures fat tails, skewness, and any other non-normality in the data. However, it has
    critical limitations: (1) it cannot estimate VaR beyond the worst observed return — with 500
    days of data, you cannot reliably estimate 99.9% VaR because you only have ~0.5 observations
    in the tail; (2) it is backward-looking and misses regime changes (if volatility doubles today,
    historical VaR uses yesterday's low-vol data); (3) the estimate is noisy at extreme quantiles
    because it depends on just a few data points. Despite these limitations, historical VaR is
    the most widely used method in the industry and is required by Basel III for backtesting.
  how_to_do_right: |
    1. Collect at least 250 daily returns (1 year) for 95% VaR; 500+ for 99% VaR
    2. Sort returns ascending: sorted_returns = np.sort(returns)
    3. VaR index: idx = int(np.floor(alpha * n)) where alpha = 0.01 for 99% VaR
    4. VaR_alpha = -sorted_returns[idx] (positive number by convention)
    5. For CVaR: average of all returns <= -VaR: CVaR = -mean(returns[returns <= -VaR])
    6. Use np.percentile(returns, alpha * 100) for cleaner code
    7. Compute confidence interval for the quantile using order statistics:
       SE(VaR) ~ sqrt(alpha * (1-alpha) / (n * f(q_alpha)^2)) where f is the density at the quantile
    8. Consider exponentially weighted historical VaR to emphasize recent data
    9. Report the number of observations alongside VaR — this is the sample size, users need it
  severity: critical
  technologies:
    lang: [python]
    framework: [numpy, pandas]
  domains:
    domain: [fintech, mathematics]
    concern: [risk_management, domain_specific]
  example_good: |
    import numpy as np

    def historical_var(returns, alpha=0.01, portfolio_value=1_000_000):
        """Compute Historical VaR and CVaR from empirical return distribution.

        Args:
            returns: array of daily returns (at least 250 observations)
            alpha: significance level (0.01 = 99% VaR)
            portfolio_value: dollar value of portfolio
        """
        n = len(returns)
        if n < 250:
            raise ValueError(f"Need >= 250 observations, got {n}")

        # VaR: negative of the alpha quantile
        var_pct = -np.percentile(returns, alpha * 100)

        # CVaR: average of returns worse than VaR
        tail_returns = returns[returns <= -var_pct]
        cvar_pct = -np.mean(tail_returns)

        # Number of observations in the tail
        n_tail = len(tail_returns)

        var_dollar = portfolio_value * var_pct
        cvar_dollar = portfolio_value * cvar_pct

        print(f"Historical VaR ({(1-alpha)*100:.0f}%, {n} obs):")
        print(f"  VaR:  {var_pct:.4%} (${var_dollar:,.0f})")
        print(f"  CVaR: {cvar_pct:.4%} (${cvar_dollar:,.0f})")
        print(f"  Tail observations: {n_tail}")

        # Worst 5 returns for context
        worst_5 = np.sort(returns)[:5]
        print(f"  Worst 5 daily returns: {[f'{r:.4%}' for r in worst_5]}")

        return var_pct, cvar_pct

    rng = np.random.default_rng(42)
    # Simulate returns with fat tails (Student-t, df=5)
    from scipy.stats import t as t_dist
    returns = t_dist.rvs(df=5, size=500, random_state=42) * 0.012
    historical_var(returns)
  example_bad: |
    import numpy as np

    # WRONG: Too few observations, wrong quantile direction, no CVaR
    returns = np.random.randn(100) * 0.01  # 100 obs — unreliable for 99% VaR
    var_99 = np.percentile(returns, 99)  # WRONG: This is the 99th percentile (a GAIN)!
    # Should be np.percentile(returns, 1) for the 1st percentile (a LOSS)
    # Then negate to report as positive number
    print(f"VaR: {var_99}")  # Reports a positive gain as VaR — completely wrong
  when_applies: Portfolio risk reporting, regulatory VaR (Basel III backtesting), risk limit monitoring
  sources:
    - "https://en.wikipedia.org/wiki/Value_at_risk"
    - "https://www.investopedia.com/terms/v/var.asp"

- id: FIN-RISK-003
  text: "Monte Carlo VaR simulates portfolio returns from a fitted or assumed distribution and computes the quantile of the simulated P&L distribution. It is the most flexible method: supports non-linear portfolios (options), non-normal distributions, and arbitrary dependence structures. Use at least 100,000 simulations for 99% VaR and 1,000,000 for 99.9% VaR to ensure the tail quantile has adequate sample size."
  why: >
    For portfolios containing options, structured products, or other non-linear instruments,
    parametric VaR (which assumes linear exposure) can be wildly inaccurate. A portfolio that
    is short put options has convex losses — parametric VaR underestimates risk dramatically
    because it misses the option's non-linear payoff. Monte Carlo VaR full-valuates the portfolio
    under each simulated scenario, capturing all non-linearities. It also allows modeling
    non-normal marginals (e.g., Student-t for individual assets) with arbitrary copulas for
    dependence (e.g., Clayton copula for lower-tail dependence). The cost is computational:
    full revaluation of a complex portfolio under 1 million scenarios requires significant
    compute, but this is the only method that gives reliable tail risk estimates for non-linear books.
  how_to_do_right: |
    1. Fit marginal distributions for each risk factor (normal, Student-t, or empirical)
    2. Fit a dependence structure (correlation matrix, copula)
    3. Simulate n >= 100,000 joint scenarios of risk factor changes
    4. Full-revalue the portfolio under each scenario: P&L_i = V(factors + delta_i) - V(factors)
    5. Compute VaR: sort P&L ascending, VaR = -P&L[int(alpha * n)]
    6. Compute CVaR: average of P&L below -VaR
    7. Report standard error: SE(VaR) = sqrt(alpha*(1-alpha) / (n * f(q)^2)) or use bootstrap
    8. For 99.9% VaR (FRTB): need n >= 1,000,000 to have 1,000 observations in the tail
    9. Use antithetic variates and control variates to reduce simulation count
  severity: high
  technologies:
    lang: [python]
    framework: [numpy, scipy]
  domains:
    domain: [fintech, mathematics]
    concern: [risk_management, domain_specific]
  example_good: |
    import numpy as np
    from scipy.stats import norm

    def monte_carlo_var(S0, K, r, sigma, T, n_options, portfolio_value,
                        alpha=0.01, n_sim=200_000, seed=42):
        """Monte Carlo VaR for a portfolio with equity + short put options."""
        rng = np.random.default_rng(seed)

        # Simulate 1-day stock returns
        dt = 1 / 252
        Z = rng.standard_normal(n_sim)
        dS = S0 * (np.exp((r - 0.5 * sigma**2) * dt + sigma * np.sqrt(dt) * Z) - 1)

        # Portfolio P&L: equity + short put options (non-linear)
        S_new = S0 + dS
        equity_pnl = dS * (portfolio_value / S0)  # Linear component

        # Short put P&L (simplified: intrinsic value change)
        put_value_old = np.maximum(K - S0, 0)
        put_value_new = np.maximum(K - S_new, 0)
        option_pnl = -(put_value_new - put_value_old) * n_options  # Short = negative of long

        total_pnl = equity_pnl + option_pnl

        # VaR and CVaR from simulated P&L
        var_dollar = -np.percentile(total_pnl, alpha * 100)
        tail_pnl = total_pnl[total_pnl <= -var_dollar]
        cvar_dollar = -np.mean(tail_pnl)

        # Standard error via bootstrap
        n_boot = 1000
        var_boots = []
        for _ in range(n_boot):
            boot_idx = rng.integers(0, n_sim, size=n_sim)
            var_boots.append(-np.percentile(total_pnl[boot_idx], alpha * 100))
        se_var = np.std(var_boots)

        print(f"Monte Carlo VaR ({(1-alpha)*100:.0f}%, {n_sim:,} sims):")
        print(f"  VaR:  ${var_dollar:,.0f} (SE: ${se_var:,.0f})")
        print(f"  CVaR: ${cvar_dollar:,.0f}")
        print(f"  Tail obs: {len(tail_pnl)}")
        return var_dollar, cvar_dollar

    monte_carlo_var(S0=100, K=95, r=0.05, sigma=0.25, T=0.25,
                    n_options=100, portfolio_value=500_000)
  example_bad: |
    import numpy as np

    # WRONG: Using parametric VaR for a non-linear portfolio with options
    portfolio_value = 500_000
    sigma = 0.015  # Daily vol
    z = 2.326
    var = portfolio_value * z * sigma  # $17,445
    # This assumes linear exposure! If portfolio is short puts, actual VaR could be 2-3x higher
    # because put losses accelerate as stock falls — parametric VaR completely misses this

    # Also: only 1,000 simulations for 99.9% VaR — only 1 observation in the tail!
    pnl = np.random.randn(1000) * 10000
    var_999 = -np.percentile(pnl, 0.1)  # Based on ~1 data point — meaningless
  when_applies: Risk measurement for portfolios containing options, structured products, or other non-linear instruments
  sources:
    - "https://en.wikipedia.org/wiki/Value_at_risk"
    - "https://www.risk.net/definition/expected-shortfall-es"

- id: FIN-RISK-004
  text: "Expected Shortfall (ES), also called Conditional VaR (CVaR), is the average loss given that the loss exceeds VaR. ES_alpha = -E[R | R <= -VaR_alpha]. Unlike VaR, ES is a coherent risk measure (satisfies subadditivity: ES(A+B) <= ES(A) + ES(B)). Basel III FRTB replaced VaR with ES at the 97.5% level as the primary regulatory risk metric. ES is always >= VaR."
  why: >
    VaR has a fundamental flaw: it is NOT subadditive. This means diversifying a portfolio can
    increase VaR in pathological cases, which contradicts the basic principle that diversification
    reduces risk. ES fixes this by averaging all losses beyond VaR, not just reporting the boundary.
    This also means ES is sensitive to the shape of the tail — a portfolio with rare catastrophic
    losses has higher ES than one with frequent moderate losses, even if their VaR is identical.
    The Basel Committee replaced VaR with ES in FRTB (2019) precisely because of subadditivity
    and tail sensitivity. For prediction markets, ES quantifies "if my bet goes wrong, how bad
    is the average loss?" — a much more useful question than "what is the threshold loss at 99%?"
  how_to_do_right: |
    1. Compute VaR_alpha first (any method: parametric, historical, or MC)
    2. ES = -mean(returns[returns <= -VaR_alpha])
    3. Under normality: ES_alpha = -(mu + sigma * phi(z_alpha) / alpha) where phi is the PDF
    4. For historical: ES is the average of the floor(alpha * n) worst returns
    5. For Monte Carlo: ES is the average of simulated P&L below the VaR threshold
    6. ES_97.5% roughly equals VaR_99% for normal distributions (Basel's rationale for switching)
    7. Always verify ES >= VaR (it must be by definition)
    8. Compute SE of ES: SE_ES = SE_VaR * sqrt(1 + (z_alpha / alpha)^2 * (ES/VaR - 1)^2) approximately
    9. For regulatory: use ES at 97.5% with liquidity horizons per risk factor
  severity: critical
  technologies:
    lang: [python]
    framework: [numpy, scipy]
  domains:
    domain: [fintech, mathematics]
    concern: [risk_management, domain_specific]
  example_good: |
    import numpy as np
    from scipy.stats import norm

    def compute_es(returns, alpha=0.025, portfolio_value=1_000_000):
        """Compute Expected Shortfall (CVaR) — both historical and parametric.

        Args:
            returns: array of daily returns
            alpha: significance level (0.025 for 97.5% ES per FRTB)
            portfolio_value: dollar portfolio value
        """
        n = len(returns)
        mu = np.mean(returns)
        sigma = np.std(returns, ddof=1)

        # Historical ES: average of worst alpha*n returns
        n_tail = max(int(np.floor(alpha * n)), 1)
        sorted_returns = np.sort(returns)
        worst_returns = sorted_returns[:n_tail]
        es_hist = -np.mean(worst_returns)

        # Historical VaR for comparison
        var_hist = -sorted_returns[n_tail]

        # Parametric ES (normal assumption)
        z_alpha = norm.ppf(alpha)
        es_param = -(mu + sigma * norm.pdf(z_alpha) / alpha)
        var_param = -(mu + z_alpha * sigma)

        print(f"Risk metrics ({(1-alpha)*100:.1f}% level, {n} observations):")
        print(f"  Historical VaR:   {var_hist:.4%} (${portfolio_value * var_hist:,.0f})")
        print(f"  Historical ES:    {es_hist:.4%} (${portfolio_value * es_hist:,.0f})")
        print(f"  Parametric VaR:   {var_param:.4%} (${portfolio_value * var_param:,.0f})")
        print(f"  Parametric ES:    {es_param:.4%} (${portfolio_value * es_param:,.0f})")
        print(f"  ES/VaR ratio:     {es_hist/var_hist:.3f} (normal ≈ {es_param/var_param:.3f})")
        print(f"  Tail observations: {n_tail}")

        assert es_hist >= var_hist, "ES must be >= VaR"
        return es_hist, var_hist

    rng = np.random.default_rng(42)
    from scipy.stats import t as t_dist
    returns = t_dist.rvs(df=5, size=1000, random_state=42) * 0.012
    compute_es(returns, alpha=0.025)
  example_bad: |
    import numpy as np

    # WRONG: Confusing VaR with ES
    returns = np.random.randn(500) * 0.01
    var_99 = -np.percentile(returns, 1)
    # Incorrectly calling VaR "CVaR" — these are different metrics!
    cvar = var_99  # WRONG: CVaR is the average beyond VaR, not VaR itself
    print(f"CVaR: {cvar:.4%}")  # This is just VaR mislabeled

    # Also wrong: computing ES as the single worst return
    es_wrong = -np.min(returns)  # This is Maximum Loss, not Expected Shortfall
  when_applies: Regulatory risk reporting (Basel III FRTB), portfolio risk management, prediction market bankroll protection
  sources:
    - "https://en.wikipedia.org/wiki/Expected_shortfall"
    - "https://www.risk.net/definition/expected-shortfall-es"

- id: FIN-RISK-005
  text: "VaR backtesting validates a VaR model by comparing predicted VaR to realized returns. A VaR exceedance (violation) occurs when the actual loss exceeds VaR. For 99% VaR over 250 days, expect ~2.5 violations. Kupiec's POF test checks if the violation rate equals alpha (binomial test). Christoffersen's test additionally checks that violations are independent (not clustered). Both tests are required by Basel III."
  why: >
    A VaR model that is never backtested is useless — it could systematically under- or over-
    estimate risk and you would never know. Banks that fail VaR backtesting face regulatory
    penalties: Basel III assigns a multiplier (3x to 4x) to capital requirements based on the
    number of exceptions in the past 250 days. The "traffic light" system: Green (0-4 exceptions),
    Yellow (5-9, higher multiplier), Red (10+, severe penalties). Kupiec's test only checks the
    total number of violations but misses clustering — if all 5 violations happen in one week
    (a crisis), the model is clearly failing to adapt to changing volatility. Christoffersen's
    test catches this by testing for independence of violations over time. A model that passes
    both tests is reliable; one that fails either needs recalibration.
  how_to_do_right: |
    1. Compute 1-day VaR for each day t using data up to day t-1 (rolling or expanding window)
    2. Record whether actual return on day t < -VaR_t (violation = 1, no violation = 0)
    3. Count total violations over T days (typically T = 250)
    4. Expected violations: E = alpha * T (e.g., 0.01 * 250 = 2.5)
    5. Kupiec POF test: LR = -2 * ln(L(alpha) / L(x/T)) where x = violations, L is binomial likelihood
    6. Christoffersen test: LR_cc = LR_kupiec + LR_independence (joint test)
    7. Both LR statistics are chi-squared(1) under H0 — reject at 3.84 for 5% significance
    8. Basel traffic light: Green (0-4), Yellow (5-9), Red (10+) violations in 250 days
    9. If model fails: increase sigma estimate, switch to Student-t, or use GARCH
  severity: high
  technologies:
    lang: [python]
    framework: [numpy, scipy, pandas]
  domains:
    domain: [fintech, mathematics]
    concern: [risk_management, testing]
  example_good: |
    import numpy as np
    from scipy.stats import chi2, binom

    def kupiec_test(violations, n_obs, alpha=0.01, sig_level=0.05):
        """Kupiec's Proportion of Failures (POF) test for VaR backtesting.

        H0: true violation rate = alpha
        H1: true violation rate != alpha
        """
        x = np.sum(violations)  # Number of violations
        p_hat = x / n_obs       # Observed violation rate

        if x == 0 or x == n_obs:
            return {"reject": x > alpha * n_obs * 3, "p_value": 0.0}

        # Log-likelihood ratio
        lr = -2 * (
            x * np.log(alpha) + (n_obs - x) * np.log(1 - alpha)
            - x * np.log(p_hat) - (n_obs - x) * np.log(1 - p_hat)
        )
        p_value = 1 - chi2.cdf(lr, df=1)

        return {
            "violations": x,
            "expected": alpha * n_obs,
            "violation_rate": p_hat,
            "LR_statistic": lr,
            "p_value": p_value,
            "reject_H0": p_value < sig_level,
        }

    def christoffersen_test(violations, sig_level=0.05):
        """Christoffersen's independence test for VaR violation clustering."""
        n = len(violations)
        # Transition counts
        n00 = n01 = n10 = n11 = 0
        for i in range(1, n):
            if violations[i-1] == 0 and violations[i] == 0: n00 += 1
            elif violations[i-1] == 0 and violations[i] == 1: n01 += 1
            elif violations[i-1] == 1 and violations[i] == 0: n10 += 1
            else: n11 += 1

        # Transition probabilities
        p01 = n01 / max(n00 + n01, 1)
        p11 = n11 / max(n10 + n11, 1)
        p = (n01 + n11) / max(n00 + n01 + n10 + n11, 1)

        if p01 == 0 or p11 == 0 or p == 0 or p01 == 1 or p11 == 1 or p == 1:
            return {"reject_H0": False, "p_value": 1.0}

        # LR test for independence: H0 is p01 = p11 (Markov independence)
        lr_ind = -2 * (
            (n00 + n10) * np.log(1 - p) + (n01 + n11) * np.log(p)
            - n00 * np.log(1 - p01) - n01 * np.log(p01)
            - n10 * np.log(1 - p11) - n11 * np.log(p11)
        )
        p_value = 1 - chi2.cdf(lr_ind, df=1)

        return {
            "LR_independence": lr_ind,
            "p_value": p_value,
            "reject_H0": p_value < sig_level,
            "p01": p01,
            "p11": p11,
        }

    # Simulate backtesting: 250 days, 99% VaR
    rng = np.random.default_rng(42)
    returns = rng.standard_t(df=5, size=250) * 0.013
    var_99 = -np.percentile(returns, 1)  # Simplified (should be rolling)
    violations = (returns < -var_99).astype(int)

    kupiec = kupiec_test(violations, len(violations))
    christo = christoffersen_test(violations)
    print(f"Kupiec test:         violations={kupiec['violations']}, p={kupiec['p_value']:.4f}, reject={kupiec['reject_H0']}")
    print(f"Christoffersen test: p={christo['p_value']:.4f}, reject={christo['reject_H0']}")
  example_bad: |
    import numpy as np

    # WRONG: Naive backtesting without statistical tests
    returns = np.random.randn(250) * 0.01
    var_99 = 0.0233  # Fixed VaR, not even computed from data
    violations = np.sum(returns < -var_99)
    print(f"Violations: {violations}")
    if violations > 5:
        print("Too many violations!")  # No statistical test — is 5 actually too many?
    # For 250 days at 99%, 0-4 is Green, 5-9 is Yellow, 10+ is Red per Basel
    # But without Kupiec/Christoffersen, you cannot distinguish bad luck from bad model
  when_applies: Regulatory VaR model validation, internal risk model assessment, Basel III compliance
  sources:
    - "https://en.wikipedia.org/wiki/Backtesting"
    - "https://www.investopedia.com/terms/v/var.asp"

- id: FIN-RISK-006
  text: "Risk budgeting decomposes portfolio risk into contributions from each position. Marginal VaR (MVaR) = beta_i * portfolio_VaR. Component VaR (CVaR_i) = w_i * MVaR_i. The sum of component VaRs equals total portfolio VaR (Euler decomposition). Risk parity allocates so that each asset contributes equally to total portfolio risk: CVaR_i = (1/n) * total_VaR for all i."
  why: >
    Knowing total portfolio VaR is not enough — you need to know WHERE the risk comes from.
    A portfolio might have 60% of its weight in bonds but 80% of its risk from a small equity
    allocation. Without risk decomposition, you cannot make informed rebalancing decisions.
    Marginal VaR tells you how much risk changes if you add $1 to a position. Component VaR
    tells you each position's contribution to total risk. The Euler decomposition guarantees that
    component VaRs sum exactly to total VaR — this is not obvious and relies on the homogeneity
    of the risk measure. Risk parity (Bridgewater's All Weather Fund) equalizes risk contributions,
    producing portfolios that are robust across economic regimes because no single asset class
    dominates the risk profile.
  how_to_do_right: |
    1. Compute portfolio variance: sigma_p^2 = w' * Sigma * w where Sigma is the covariance matrix
    2. Marginal risk contribution: MRC_i = (Sigma * w)_i / sigma_p
    3. Component risk contribution: CRC_i = w_i * MRC_i
    4. Verify: sum(CRC_i) = sigma_p (Euler decomposition)
    5. Percentage contribution: PRC_i = CRC_i / sigma_p (sums to 100%)
    6. For risk parity: solve for w such that CRC_i = CRC_j for all i, j
    7. Risk parity optimization: minimize sum((CRC_i - sigma_p/n)^2) subject to sum(w) = 1, w >= 0
    8. Use scipy.optimize.minimize with 'SLSQP' for the risk parity optimization
    9. Rebalance when any PRC_i deviates more than 5% from target allocation
  severity: high
  technologies:
    lang: [python]
    framework: [numpy, scipy]
  domains:
    domain: [fintech, mathematics]
    concern: [risk_management, domain_specific]
  example_good: |
    import numpy as np
    from scipy.optimize import minimize

    def risk_decomposition(weights, cov_matrix):
        """Decompose portfolio risk into per-asset contributions."""
        sigma_p = np.sqrt(weights @ cov_matrix @ weights)
        marginal = (cov_matrix @ weights) / sigma_p
        component = weights * marginal
        pct_contribution = component / sigma_p

        print(f"Portfolio volatility: {sigma_p:.4%}")
        for i, (w, m, c, p) in enumerate(zip(weights, marginal, component, pct_contribution)):
            print(f"  Asset {i}: weight={w:.2%}, marginal={m:.4%}, "
                  f"component={c:.4%}, pct_contrib={p:.2%}")
        print(f"  Sum of components: {np.sum(component):.4%} (should equal {sigma_p:.4%})")
        return component, pct_contribution

    def risk_parity(cov_matrix, n_assets):
        """Find risk parity weights (equal risk contribution)."""
        def objective(w):
            sigma_p = np.sqrt(w @ cov_matrix @ w)
            mrc = (cov_matrix @ w) / sigma_p
            crc = w * mrc
            target = sigma_p / n_assets
            return np.sum((crc - target) ** 2)

        w0 = np.ones(n_assets) / n_assets
        constraints = {'type': 'eq', 'fun': lambda w: np.sum(w) - 1}
        bounds = [(0.01, 1.0)] * n_assets
        result = minimize(objective, w0, method='SLSQP', bounds=bounds, constraints=constraints)
        return result.x

    # Example: 3-asset portfolio (Equities, Bonds, Gold)
    # Annual covariance matrix
    vols = np.array([0.18, 0.06, 0.15])  # Annualized volatilities
    corr = np.array([
        [1.0, -0.2, 0.05],
        [-0.2, 1.0, 0.10],
        [0.05, 0.10, 1.0],
    ])
    cov_matrix = np.outer(vols, vols) * corr

    # Traditional 60/30/10 allocation
    w_trad = np.array([0.60, 0.30, 0.10])
    print("=== Traditional 60/30/10 ===")
    risk_decomposition(w_trad, cov_matrix)

    # Risk parity allocation
    w_rp = risk_parity(cov_matrix, 3)
    print(f"\n=== Risk Parity ===")
    print(f"Weights: {[f'{w:.2%}' for w in w_rp]}")
    risk_decomposition(w_rp, cov_matrix)
  example_bad: |
    import numpy as np

    # WRONG: Using weight as a proxy for risk contribution
    weights = np.array([0.60, 0.30, 0.10])
    # "60% equities so 60% of the risk comes from equities" — WRONG!
    # With vol_eq=18%, vol_bond=6%, equities contribute ~90% of risk, not 60%
    print(f"Risk from equities: {weights[0]:.0%}")  # Misleading: says 60%, reality is ~90%
  when_applies: Portfolio construction, risk budgeting, risk parity implementation, regulatory risk attribution
  sources:
    - "https://en.wikipedia.org/wiki/Risk_parity"
    - "https://www.investopedia.com/terms/r/risk-parity.asp"

- id: FIN-RISK-007
  text: "Stress testing evaluates portfolio losses under extreme but plausible scenarios. Historical stress tests replay past crises (2008 GFC: SPX -38%, VIX +315%). Hypothetical stress tests apply factor shocks (rates +300bp, equities -25%, credit spreads +200bp). Reverse stress tests find the minimum shock that causes a specified loss. Critically, correlations increase under stress — use stressed correlation matrices, not normal-market correlations."
  why: >
    VaR measures risk in normal markets; stress testing measures risk in crises. The 2008 GFC
    demonstrated that normal-market risk models were catastrophically inadequate: assets that
    appeared uncorrelated (equities, credit, commodities) became highly correlated in the crash,
    and diversification benefits disappeared exactly when they were needed most. The correlation
    between S&P 500 and high-yield credit was ~0.3 in normal times but rose to ~0.9 during the
    crisis. Stress tests that apply shocks without adjusting correlations underestimate portfolio
    losses by 30-50%. Reverse stress testing is particularly valuable: instead of asking "what
    happens if equities fall 30%?", ask "what scenario causes our fund to breach its risk limit?"
    and then assess whether that scenario is plausible.
  how_to_do_right: |
    1. Define at least 5 historical scenarios: 2008 GFC, 2020 COVID, 2000 dot-com, 2011 Euro crisis, 2022 rate shock
    2. For each scenario, specify shocks to ALL correlated risk factors (not just one)
    3. Use stressed covariance: C_stress = (1-w)*C_normal + w*C_crisis, w in [0.5, 1.0]
    4. Include second-order effects: if equities fall 30%, vol rises ~80-100%
    5. Apply liquidity haircuts: assume bid-ask spreads widen 3-5x in a crisis
    6. For reverse stress test: minimize ||delta_factors|| subject to P&L(delta_factors) <= -target_loss
    7. Report P&L under each scenario, margin requirement changes, and liquidity needs
    8. Update scenario set annually; add new historical events as they occur
    9. Compare stress P&L to VaR — stress losses should be 2-5x VaR
  severity: high
  technologies:
    lang: [python]
    framework: [numpy, scipy, pandas]
  domains:
    domain: [fintech, mathematics]
    concern: [risk_management, domain_specific]
  example_good: |
    import numpy as np
    from scipy.optimize import minimize

    def stress_test_portfolio(weights, scenarios, portfolio_value=1_000_000):
        """Apply historical and hypothetical stress scenarios."""
        results = {}
        for name, factor_shocks in scenarios.items():
            pnl_pct = np.sum(weights * factor_shocks)
            pnl_dollar = portfolio_value * pnl_pct
            results[name] = {"pnl_pct": pnl_pct, "pnl_dollar": pnl_dollar}

        print(f"Stress Test Results (portfolio: ${portfolio_value:,.0f}):")
        for name, r in sorted(results.items(), key=lambda x: x[1]["pnl_pct"]):
            print(f"  {name:30s}: {r['pnl_pct']:+.2%} (${r['pnl_dollar']:+,.0f})")
        return results

    def reverse_stress_test(weights, target_loss_pct, normal_vols):
        """Find minimum factor shock that causes target_loss_pct loss."""
        n = len(weights)

        def objective(shocks):
            return np.sum((shocks / normal_vols)**2)  # Normalized shock magnitude

        def loss_constraint(shocks):
            return -(np.sum(weights * shocks) + target_loss_pct)  # P&L <= -target

        result = minimize(
            objective,
            x0=-normal_vols,  # Start from 1-sigma down shocks
            method='SLSQP',
            constraints={'type': 'ineq', 'fun': loss_constraint},
        )
        print(f"\nReverse stress test (target loss: {target_loss_pct:.0%}):")
        print(f"  Minimum shock: {result.x}")
        print(f"  Portfolio loss: {np.sum(weights * result.x):.2%}")
        return result.x

    # Portfolio: 50% equity, 30% bonds, 20% alternatives
    weights = np.array([0.50, 0.30, 0.20])
    #                    Equity   Bonds    Alts
    scenarios = {
        "2008 GFC":              np.array([-0.38,  0.05, -0.25]),
        "2020 COVID March":      np.array([-0.34,  0.08, -0.20]),
        "2022 Rate Shock":       np.array([-0.19, -0.13, -0.10]),
        "Stagflation":           np.array([-0.25, -0.15,  0.10]),
        "Hyp: Equities -40%":    np.array([-0.40, -0.05, -0.30]),
    }

    stress_test_portfolio(weights, scenarios)
    reverse_stress_test(weights, target_loss_pct=0.20, normal_vols=np.array([0.18, 0.06, 0.15]))
  example_bad: |
    import numpy as np

    # WRONG: Only shocking one factor, ignoring correlations
    weights = np.array([0.50, 0.30, 0.20])
    equity_shock = -0.30
    loss = weights[0] * equity_shock  # Only equity impact
    print(f"Crisis loss: {loss:.2%}")
    # Ignores that bonds might also fall (2022) or alternatives might crash (2008)
    # True loss could be 2x worse if all assets fall simultaneously
  when_applies: Regulatory stress testing (Basel III, CCAR, EBA), portfolio risk management, crisis preparedness
  sources:
    - "https://en.wikipedia.org/wiki/Stress_testing_(financial)"
    - "https://www.investopedia.com/terms/s/stresstesting.asp"

- id: FIN-RISK-008
  text: "Maximum drawdown (MDD) is the largest peak-to-trough decline in portfolio value: MDD = max_t(peak_t - value_t) / peak_t. The Calmar ratio = annualized_return / MDD. Unlike VaR, drawdown measures cumulative losses over a period, not single-day losses. A 50% drawdown requires a 100% gain to recover. Always track drawdown duration (time from peak to recovery) alongside magnitude."
  why: >
    Drawdown is the risk metric investors feel most viscerally — it measures how much money you
    actually lost from your highest portfolio value. A fund with low VaR can still have devastating
    drawdowns if small daily losses compound over weeks. Maximum drawdown is path-dependent and
    captures sustained adverse conditions that VaR misses. The asymmetry of drawdowns is
    psychologically and mathematically critical: a 50% loss requires a 100% gain to recover, a 75%
    loss requires 300%. The Calmar ratio (return/MDD) is the standard risk-adjusted performance
    measure for hedge funds and CTAs. Drawdown duration matters too — a 20% drawdown lasting 2
    months is tolerable; the same drawdown lasting 2 years destroys investor confidence and
    triggers redemptions.
  how_to_do_right: |
    1. Compute running maximum: peak_t = max(value_0, value_1, ..., value_t)
    2. Drawdown at time t: dd_t = (peak_t - value_t) / peak_t
    3. Maximum drawdown: MDD = max(dd_t)
    4. Drawdown start: time of peak before the trough
    5. Drawdown end: time when value first exceeds the previous peak (recovery)
    6. Duration: end - start (can be ongoing if not yet recovered)
    7. Calmar ratio: annualized_return / MDD (higher is better; > 1.0 is good)
    8. Recovery factor: total_return / MDD (higher means faster recovery)
    9. Track top 5 drawdowns — MDD alone can be an outlier
  severity: high
  technologies:
    lang: [python]
    framework: [numpy, pandas]
  domains:
    domain: [fintech, mathematics, prediction_markets]
    concern: [risk_management, domain_specific]
  example_good: |
    import numpy as np

    def drawdown_analysis(portfolio_values, trading_days_per_year=252):
        """Comprehensive drawdown analysis for a portfolio time series."""
        values = np.asarray(portfolio_values, dtype=float)
        n = len(values)

        # Running maximum (peaks)
        peaks = np.maximum.accumulate(values)

        # Drawdown series
        drawdowns = (peaks - values) / peaks

        # Maximum drawdown
        mdd = np.max(drawdowns)
        mdd_trough_idx = np.argmax(drawdowns)
        mdd_peak_idx = np.argmax(values[:mdd_trough_idx + 1])

        # Find recovery point (first time value exceeds pre-drawdown peak)
        recovery_idx = None
        peak_value = values[mdd_peak_idx]
        for i in range(mdd_trough_idx + 1, n):
            if values[i] >= peak_value:
                recovery_idx = i
                break

        # Drawdown duration
        if recovery_idx is not None:
            duration_days = recovery_idx - mdd_peak_idx
            status = "recovered"
        else:
            duration_days = n - 1 - mdd_peak_idx
            status = "ongoing"

        # Calmar ratio
        total_return = values[-1] / values[0] - 1
        n_years = n / trading_days_per_year
        annualized_return = (1 + total_return) ** (1 / n_years) - 1
        calmar = annualized_return / mdd if mdd > 0 else float('inf')

        print(f"Drawdown Analysis ({n} observations):")
        print(f"  Max Drawdown:     {mdd:.2%}")
        print(f"  Peak index:       {mdd_peak_idx} (value: ${values[mdd_peak_idx]:,.2f})")
        print(f"  Trough index:     {mdd_trough_idx} (value: ${values[mdd_trough_idx]:,.2f})")
        print(f"  Duration:         {duration_days} days ({status})")
        print(f"  Annualized Return:{annualized_return:.2%}")
        print(f"  Calmar Ratio:     {calmar:.3f}")
        print(f"  Recovery needed:  {1/(1-mdd) - 1:.2%} gain to recover from MDD")

        return {"mdd": mdd, "calmar": calmar, "duration": duration_days}

    # Simulate a portfolio with a drawdown
    rng = np.random.default_rng(42)
    daily_returns = rng.normal(0.0003, 0.015, 504)  # 2 years
    daily_returns[100:140] = rng.normal(-0.012, 0.020, 40)  # Crisis period
    portfolio = 100_000 * np.cumprod(1 + daily_returns)
    portfolio = np.insert(portfolio, 0, 100_000)

    drawdown_analysis(portfolio)
  example_bad: |
    import numpy as np

    # WRONG: Computing drawdown from starting value, not running peak
    values = np.array([100, 110, 105, 95, 102, 108])
    dd = (values[0] - np.min(values)) / values[0]  # 5% from start
    # WRONG! The actual MDD is (110 - 95) / 110 = 13.6% from the peak at 110
    # Peak-to-trough, not start-to-trough!
    print(f"Drawdown: {dd:.2%}")  # Reports 5% instead of correct 13.6%
  when_applies: Portfolio performance reporting, hedge fund due diligence, risk management, trading strategy evaluation
  sources:
    - "https://en.wikipedia.org/wiki/Drawdown_(economics)"
    - "https://www.investopedia.com/terms/m/maximum-drawdown-mdd.asp"

- id: FIN-RISK-009
  text: "The Kelly criterion determines optimal position size: f* = (b*p - q) / b where p = win probability, q = 1-p, b = win/loss ratio. For continuous returns: f* = (mu - r) / sigma^2. Full Kelly maximizes long-term growth but has ~33% probability of 50%+ drawdown. Half-Kelly (f*/2) reduces growth by only 25% but cuts drawdown risk dramatically. Never bet more than full Kelly — overbetting guarantees ruin."
  why: >
    Position sizing is the most underrated factor in long-term wealth growth. Even with a genuine
    edge (positive expected value), betting too large causes ruin through the variance drain
    effect: the geometric mean is always less than the arithmetic mean, and the difference grows
    with bet size. Full Kelly maximizes the geometric growth rate (log-wealth), which is the
    correct objective for long-term compounding. However, full Kelly assumes perfect knowledge
    of p and b, which is never true in practice. When p or b are estimated with error, full Kelly
    overbets on average, leading to higher drawdowns. Half-Kelly is the industry standard: it
    sacrifices 25% of growth rate but cuts variance by 75%, dramatically reducing the probability
    of devastating drawdowns. Betting more than full Kelly has NEGATIVE expected log-growth.
  how_to_do_right: |
    1. Estimate win probability p and win/loss ratio b from historical data
    2. Full Kelly: f* = (b*p - q) / b where q = 1 - p
    3. For continuous returns: f* = (mu - r) / sigma^2 (excess return / variance)
    4. Apply fractional Kelly: use f*/2 (half-Kelly) to account for estimation error
    5. Cap position size at 25% of bankroll regardless of Kelly output
    6. Require at least 100 trades for reliable p and b estimates
    7. Update f* as new data arrives (rolling window of 200-500 trades)
    8. Never increase f* above full Kelly — overbetting has negative expected log-growth
    9. For correlated bets: use the multi-asset Kelly formula (involves inverse covariance matrix)
  severity: critical
  technologies:
    lang: [python]
    framework: [numpy, scipy]
  domains:
    domain: [fintech, prediction_markets, mathematics]
    concern: [risk_management, domain_specific]
  example_good: |
    import numpy as np

    def kelly_fraction(p, b, fractional=0.5):
        """Compute Kelly fraction for a binary bet.

        Args:
            p: win probability
            b: net odds (win/loss ratio, i.e., profit per dollar risked)
            fractional: Kelly fraction (0.5 = half-Kelly)
        """
        q = 1 - p
        f_full = (b * p - q) / b
        f_actual = f_full * fractional

        # Expected growth rate (log-wealth)
        growth_full = p * np.log(1 + f_full * b) + q * np.log(1 - f_full)
        growth_frac = p * np.log(1 + f_actual * b) + q * np.log(1 - f_actual)
        growth_ratio = growth_frac / growth_full if growth_full > 0 else 0

        print(f"Win prob: {p:.1%}, Odds: {b:.2f}")
        print(f"Full Kelly: {f_full:.4f} ({f_full:.2%} of bankroll)")
        print(f"Half Kelly: {f_actual:.4f} ({f_actual:.2%} of bankroll)")
        print(f"Growth (full):  {growth_full:.6f} per bet")
        print(f"Growth (half):  {growth_frac:.6f} per bet ({growth_ratio:.1%} of full)")

        if f_full <= 0:
            print("WARNING: Negative edge — do NOT bet!")
        return f_actual

    def kelly_continuous(mu, r, sigma, fractional=0.5):
        """Kelly fraction for continuous returns: f* = (mu - r) / sigma^2."""
        f_full = (mu - r) / sigma**2
        f_actual = f_full * fractional
        print(f"\nContinuous Kelly: mu={mu:.2%}, r={r:.2%}, sigma={sigma:.2%}")
        print(f"Full Kelly leverage: {f_full:.2f}x")
        print(f"Half Kelly leverage: {f_actual:.2f}x")
        return f_actual

    # Prediction market: 55% win probability, even odds (b=1)
    kelly_fraction(p=0.55, b=1.0)
    # Full Kelly: 10%, Half Kelly: 5%

    # Better edge: 60% win, 1.5:1 odds
    kelly_fraction(p=0.60, b=1.5)
    # Full Kelly: 33.3%, Half Kelly: 16.7%

    # Stock market: 10% expected return, 2% risk-free, 20% vol
    kelly_continuous(mu=0.10, r=0.02, sigma=0.20)
    # Full Kelly: 2.0x leverage, Half Kelly: 1.0x
  example_bad: |
    import numpy as np

    # WRONG: Overbetting beyond Kelly — guarantees ruin long-term
    p, b = 0.55, 1.0
    f_full = (b * p - (1 - p)) / b  # 0.10 = 10%

    # Betting 50% of bankroll on a 10% Kelly edge — 5x overbetting!
    bet_fraction = 0.50
    # Simulate: this will go to zero
    bankroll = 1000
    rng = np.random.default_rng(42)
    for _ in range(200):
        if rng.random() < p:
            bankroll *= (1 + bet_fraction * b)
        else:
            bankroll *= (1 - bet_fraction)
    print(f"Final bankroll: ${bankroll:.2f}")  # Near zero despite 55% win rate!
    # Full Kelly would grow; 5x Kelly goes to zero
  when_applies: Position sizing for trading, prediction market betting, bankroll management, portfolio leverage decisions
  sources:
    - "https://en.wikipedia.org/wiki/Kelly_criterion"
    - "https://www.investopedia.com/articles/trading/04/091504.asp"

- id: FIN-RISK-010
  text: "Portfolio VaR accounts for correlations between assets: sigma_p = sqrt(w' * Sigma * w) where Sigma is the covariance matrix and w is the weight vector. The diversification benefit = sum(individual VaRs) - portfolio VaR. For 99% VaR with 2 assets: VaR_p = sqrt(VaR_1^2 + VaR_2^2 + 2*rho*VaR_1*VaR_2). Ignoring correlations either vastly overestimates risk (assuming perfect correlation) or underestimates it (assuming independence)."
  why: >
    The entire point of portfolio construction is diversification, and portfolio VaR quantifies
    the diversification benefit precisely. Two assets with individual 99% VaRs of $1M each have
    a combined VaR ranging from $0 (rho = -1) to $2M (rho = +1). With typical equity correlations
    (rho ~= 0.5), the portfolio VaR is ~$1.73M — a 14% diversification benefit. Ignoring
    correlations and summing individual VaRs (assuming rho = 1) overestimates risk and leads
    to excessively conservative positions. Assuming independence (rho = 0) gives VaR = $1.41M,
    underestimating risk by 19%. During crises, correlations increase toward 1.0, erasing the
    diversification benefit — this is why stress testing with stressed correlations is essential.
  how_to_do_right: |
    1. Estimate covariance matrix Sigma from historical returns (at least 252 days)
    2. Portfolio variance: sigma_p^2 = w' * Sigma * w
    3. Portfolio VaR_alpha = z_alpha * sigma_p (parametric) or from simulated portfolio returns
    4. Diversification benefit: DB = sum(VaR_i) - VaR_portfolio
    5. Diversification ratio: DR = sum(w_i * sigma_i) / sigma_p (always >= 1.0)
    6. For large portfolios: use factor model covariance to avoid noisy N x N estimation
    7. Shrink covariance estimator (Ledoit-Wolf) for better out-of-sample performance
    8. Re-estimate correlations quarterly; use exponentially weighted for regime sensitivity
    9. Report undiversified VaR alongside diversified VaR to show the benefit
  severity: high
  technologies:
    lang: [python]
    framework: [numpy, scipy, pandas]
  domains:
    domain: [fintech, mathematics]
    concern: [risk_management, domain_specific]
  example_good: |
    import numpy as np
    from scipy.stats import norm

    def portfolio_var(weights, cov_matrix, alpha=0.01, portfolio_value=1_000_000):
        """Compute portfolio VaR with diversification analysis."""
        weights = np.asarray(weights)
        cov_matrix = np.asarray(cov_matrix)
        n_assets = len(weights)

        # Portfolio volatility
        port_var = weights @ cov_matrix @ weights
        port_vol = np.sqrt(port_var)

        # Individual asset volatilities
        asset_vols = np.sqrt(np.diag(cov_matrix))

        # z-score for the confidence level
        z = -norm.ppf(alpha)  # 2.326 for 99%

        # Portfolio VaR
        var_portfolio = z * port_vol

        # Individual VaRs (undiversified)
        var_individual = z * weights * asset_vols
        var_undiversified = np.sum(np.abs(var_individual))

        # Diversification benefit
        div_benefit = var_undiversified - var_portfolio
        div_ratio = np.sum(np.abs(weights) * asset_vols) / port_vol

        print(f"Portfolio VaR Analysis ({(1-alpha)*100:.0f}% level):")
        print(f"  Portfolio Vol:       {port_vol:.4%}")
        print(f"  Portfolio VaR:       {var_portfolio:.4%} (${portfolio_value * var_portfolio:,.0f})")
        print(f"  Undiversified VaR:   {var_undiversified:.4%} (${portfolio_value * var_undiversified:,.0f})")
        print(f"  Diversification:     {div_benefit:.4%} ({div_benefit/var_undiversified:.1%} reduction)")
        print(f"  Diversification Ratio: {div_ratio:.3f}")

        for i in range(n_assets):
            print(f"  Asset {i} VaR: {np.abs(var_individual[i]):.4%}")

        # Correlation matrix for display
        D_inv = np.diag(1 / asset_vols)
        corr = D_inv @ cov_matrix @ D_inv
        print(f"\nCorrelation matrix:")
        print(np.round(corr, 3))

        return var_portfolio

    # 3-asset portfolio
    weights = np.array([0.50, 0.30, 0.20])
    vols = np.array([0.18, 0.06, 0.15])
    corr = np.array([
        [1.0, -0.1, 0.3],
        [-0.1, 1.0, 0.1],
        [0.3, 0.1, 1.0],
    ])
    cov = np.outer(vols, vols) * corr

    portfolio_var(weights, cov)
  example_bad: |
    import numpy as np

    # WRONG: Summing individual VaRs (assumes perfect correlation)
    weights = np.array([0.50, 0.30, 0.20])
    vols = np.array([0.18, 0.06, 0.15])
    z = 2.326
    var_total = z * np.sum(weights * vols)  # 2.326 * (0.09 + 0.018 + 0.03) = 32.1%
    # This assumes rho=1 for all pairs — massively overestimates risk
    # True portfolio VaR with correlations ~0.1-0.3 is about 22% — overestimate by 46%
  when_applies: Multi-asset portfolio risk measurement, diversification analysis, portfolio construction optimization
  sources:
    - "https://en.wikipedia.org/wiki/Value_at_risk"
    - "https://en.wikipedia.org/wiki/Modern_portfolio_theory"

- id: FIN-RISK-011
  text: "Extreme Value Theory (EVT) models the tail of the return distribution using the Generalized Pareto Distribution (GPD) for peaks over threshold (POT) or the Generalized Extreme Value (GEV) distribution for block maxima. EVT provides principled estimates for extreme quantiles (99.9%+) beyond the range of observed data. The shape parameter xi > 0 indicates fat tails (Frechet domain), xi = 0 indicates thin tails (Gumbel), xi < 0 indicates bounded tails (Weibull)."
  why: >
    Standard methods (parametric, historical) fail at extreme quantiles. With 500 days of data,
    you have essentially zero observations beyond the 99.9th percentile, making historical VaR
    at 99.9% unreliable. Parametric VaR assumes normality, which underestimates tails. EVT
    solves this by fitting a distribution specifically designed for extreme values. The
    Pickands-Balkema-de Haan theorem proves that for sufficiently extreme thresholds, the excess
    distribution converges to the GPD regardless of the underlying distribution — this is the
    tail equivalent of the central limit theorem. Financial returns typically have xi ≈ 0.2-0.4,
    meaning fat tails in the Frechet domain. EVT-based VaR at 99.9% is typically 30-80% higher
    than normal-based VaR, which explains why "25-sigma events" under normality occur regularly.
  how_to_do_right: |
    1. Choose threshold u: typically the 90th or 95th percentile of losses
    2. Extract exceedances: y_i = x_i - u for all x_i > u
    3. Fit GPD to exceedances using MLE: scipy.stats.genpareto.fit(exceedances)
    4. Shape parameter xi: interpret sign (>0 = fat tail, =0 = exponential, <0 = bounded)
    5. Extreme VaR: VaR_alpha = u + (sigma/xi) * ((n/n_u * (1-alpha))^(-xi) - 1) for xi != 0
    6. Extreme ES: ES_alpha = VaR_alpha / (1 - xi) + (sigma - xi*u) / (1 - xi)
    7. Validate with mean excess plot: E[X - u | X > u] vs u should be linear for GPD
    8. Sensitivity analysis: try multiple thresholds (85th-95th percentile) and check stability
    9. Minimum 250 exceedances for reliable GPD fit
  severity: high
  technologies:
    lang: [python]
    framework: [numpy, scipy]
  domains:
    domain: [fintech, mathematics]
    concern: [risk_management, numerical_methods]
  example_good: |
    import numpy as np
    from scipy.stats import genpareto

    def evt_var(returns, alpha=0.001, threshold_quantile=0.90):
        """Compute extreme VaR using Peaks Over Threshold (GPD).

        Args:
            returns: array of daily returns (losses are positive)
            alpha: target probability (0.001 = 99.9% VaR)
            threshold_quantile: quantile for POT threshold
        """
        losses = -returns  # Convert to losses (positive = bad)

        # Set threshold at the threshold_quantile of losses
        u = np.percentile(losses, threshold_quantile * 100)

        # Extract exceedances
        exceedances = losses[losses > u] - u
        n_total = len(losses)
        n_exceed = len(exceedances)

        # Fit GPD to exceedances
        xi, loc, sigma = genpareto.fit(exceedances, floc=0)

        # Extreme VaR (quantile of the full distribution)
        p_exceed = n_exceed / n_total  # Probability of exceeding threshold
        var_evt = u + (sigma / xi) * ((p_exceed / alpha)**xi - 1) if xi != 0 else \
                  u + sigma * np.log(p_exceed / alpha)

        # Extreme ES
        es_evt = var_evt / (1 - xi) + (sigma - xi * u) / (1 - xi) if xi < 1 else float('inf')

        # Normal-based VaR for comparison
        from scipy.stats import norm
        var_normal = -np.mean(returns) + np.std(returns) * norm.ppf(1 - alpha)

        print(f"EVT Analysis (Peaks Over Threshold):")
        print(f"  Threshold (u):    {u:.4%}")
        print(f"  Exceedances:      {n_exceed}/{n_total}")
        print(f"  Shape (xi):       {xi:.4f} ({'fat tail' if xi > 0 else 'thin tail'})")
        print(f"  Scale (sigma):    {sigma:.4%}")
        print(f"\n  {(1-alpha)*100:.1f}% VaR (EVT):    {var_evt:.4%}")
        print(f"  {(1-alpha)*100:.1f}% VaR (Normal): {var_normal:.4%}")
        print(f"  EVT / Normal:     {var_evt/var_normal:.2f}x")
        print(f"  {(1-alpha)*100:.1f}% ES (EVT):     {es_evt:.4%}")

        return var_evt, es_evt, xi

    # Generate fat-tailed returns (Student-t, df=4)
    rng = np.random.default_rng(42)
    from scipy.stats import t as t_dist
    returns = t_dist.rvs(df=4, size=2000, random_state=42) * 0.013
    evt_var(returns, alpha=0.001)
  example_bad: |
    import numpy as np
    from scipy.stats import norm

    # WRONG: Using normal distribution for extreme quantiles
    returns = np.random.standard_t(df=4, size=2000) * 0.013
    mu, sigma = np.mean(returns), np.std(returns)
    var_999_normal = -(mu - norm.ppf(0.999) * sigma)  # Normal 99.9% VaR
    # For fat-tailed data (df=4), this UNDERESTIMATES by 40-60%
    # A "25-sigma event" under normality is actually ~4-sigma under Student-t(4)
    print(f"99.9% VaR (normal): {var_999_normal:.4%}")  # Dangerously optimistic
  when_applies: Estimating extreme quantile risk (99.9%+), regulatory capital (FRTB), catastrophic loss estimation
  sources:
    - "https://en.wikipedia.org/wiki/Extreme_value_theory"
    - "https://en.wikipedia.org/wiki/Generalized_Pareto_distribution"

- id: FIN-RISK-012
  text: "Liquidity risk encompasses bid-ask spread cost, market impact (price moves against you as you trade), and slippage (execution price differs from quoted price). Liquidity-adjusted VaR (LVaR) adds the cost of unwinding: LVaR = VaR + 0.5 * spread * position_value. Market impact scales as sqrt(Q/ADV) where Q is order size and ADV is average daily volume. In a crisis, liquidity can vanish — spreads widen 3-10x and market depth drops 50-90%."
  why: >
    Standard VaR assumes positions can be liquidated at mid-market prices with zero cost. In
    reality, selling a $10M position in a small-cap stock moves the price against you by 1-5%,
    and in a crisis, you might not be able to sell at all. The 2008 GFC saw bid-ask spreads on
    corporate bonds widen from 0.1% to 5%, and some structured products had zero bids. LTCM's
    collapse in 1998 was fundamentally a liquidity crisis: their positions were too large relative
    to market depth, and unwinding losses far exceeded mark-to-market losses. The square-root
    law of market impact (Kyle, 1985; Almgren and Chriss, 2000) means that a position 4x larger
    has 2x the impact cost per share, not 4x — but the total impact cost still grows superlinearly.
    Liquidity risk is the silent killer that transforms paper losses into realized catastrophes.
  how_to_do_right: |
    1. Measure bid-ask spread for each position: spread = (ask - bid) / mid
    2. Half-spread cost = 0.5 * spread * position_value (cost to cross the spread)
    3. Market impact: impact = sigma * sqrt(Q / ADV) where Q is shares to trade
    4. LVaR = VaR + half_spread_cost + expected_market_impact
    5. Days to liquidate: DTL = position_value / (participation_rate * ADV * price)
    6. Use participation rate <= 20% of ADV to minimize impact (10% is conservative)
    7. For crisis scenarios: multiply spread by 5x, reduce ADV by 50-75%
    8. Liquidity bucket assets: Tier 1 (< 1 day), Tier 2 (1-5 days), Tier 3 (5+ days)
    9. Maintain liquidity buffer: >= 30% of portfolio in Tier 1 assets
  severity: high
  technologies:
    lang: [python]
    framework: [numpy, pandas]
  domains:
    domain: [fintech, mathematics]
    concern: [risk_management, domain_specific]
  example_good: |
    import numpy as np

    def liquidity_adjusted_var(positions, var_pct, crisis_mode=False):
        """Compute Liquidity-adjusted VaR (LVaR) for a portfolio.

        Args:
            positions: list of dicts with keys:
                name, value, bid_ask_spread, adv (avg daily volume in dollars),
                daily_vol (daily return volatility)
            var_pct: portfolio VaR as a percentage
            crisis_mode: if True, apply crisis multipliers
        """
        crisis_spread_mult = 5.0 if crisis_mode else 1.0
        crisis_adv_mult = 0.25 if crisis_mode else 1.0  # ADV drops 75% in crisis
        participation_rate = 0.10  # Trade at most 10% of ADV

        total_value = sum(p["value"] for p in positions)
        total_spread_cost = 0
        total_impact = 0

        print(f"{'Asset':12s} {'Value':>12s} {'Spread':>8s} {'DTL':>6s} {'Impact':>8s} {'LAdj':>8s}")
        print("-" * 60)

        for p in positions:
            spread = p["bid_ask_spread"] * crisis_spread_mult
            adv = p["adv"] * crisis_adv_mult

            # Half-spread cost
            spread_cost = 0.5 * spread * p["value"]

            # Market impact (Almgren-Chriss square root model)
            daily_trade_value = participation_rate * adv
            days_to_liquidate = p["value"] / daily_trade_value if daily_trade_value > 0 else 999
            impact_pct = p["daily_vol"] * np.sqrt(p["value"] / adv) if adv > 0 else 1.0
            impact_cost = impact_pct * p["value"]

            total_spread_cost += spread_cost
            total_impact += impact_cost

            l_adj = (spread_cost + impact_cost) / p["value"]
            print(f"{p['name']:12s} ${p['value']:>10,.0f} {spread:>7.2%} {days_to_liquidate:>5.1f}d {impact_pct:>7.2%} {l_adj:>7.2%}")

        var_dollar = total_value * var_pct
        lvar = var_dollar + total_spread_cost + total_impact
        lvar_pct = lvar / total_value

        mode_label = "CRISIS" if crisis_mode else "Normal"
        print(f"\n{mode_label} conditions:")
        print(f"  Portfolio Value:     ${total_value:,.0f}")
        print(f"  Market Risk (VaR):   ${var_dollar:,.0f} ({var_pct:.2%})")
        print(f"  Spread cost:         ${total_spread_cost:,.0f}")
        print(f"  Market impact:       ${total_impact:,.0f}")
        print(f"  LVaR:                ${lvar:,.0f} ({lvar_pct:.2%})")
        print(f"  Liquidity premium:   {(lvar-var_dollar)/var_dollar:.1%} over raw VaR")
        return lvar_pct

    positions = [
        {"name": "SPY",       "value": 500_000, "bid_ask_spread": 0.0001, "adv": 30_000_000_000, "daily_vol": 0.012},
        {"name": "SmallCap",  "value": 200_000, "bid_ask_spread": 0.0050, "adv": 500_000,        "daily_vol": 0.020},
        {"name": "CorpBond",  "value": 300_000, "bid_ask_spread": 0.0020, "adv": 2_000_000,      "daily_vol": 0.005},
    ]

    liquidity_adjusted_var(positions, var_pct=0.025)
    print()
    liquidity_adjusted_var(positions, var_pct=0.025, crisis_mode=True)
  example_bad: |
    import numpy as np

    # WRONG: Ignoring liquidity costs entirely
    portfolio_value = 1_000_000
    var_99 = 0.025  # 2.5%
    print(f"VaR: ${portfolio_value * var_99:,.0f}")  # $25,000
    # But if 20% of the portfolio is in illiquid small-caps with 5% bid-ask spread,
    # the liquidation cost alone is $5,000 — 20% of VaR!
    # In a crisis with 25% spread, liquidation cost could exceed VaR entirely
  when_applies: Risk management for portfolios with illiquid positions, crisis preparedness, position sizing for small-cap or OTC instruments
  sources:
    - "https://en.wikipedia.org/wiki/Liquidity_risk"
    - "https://en.wikipedia.org/wiki/Market_impact"

- id: FIN-RISK-013
  text: "Basel III FRTB (Fundamental Review of the Trading Book) replaced VaR with Expected Shortfall at 97.5% as the primary market risk metric. Key changes: ES replaces VaR, liquidity horizons vary by risk factor (10 to 120 days), P&L attribution test validates internal models, and the standardized approach uses risk sensitivities (delta, vega, curvature). Banks using internal models must pass backtesting (VaR and P&L attribution) to avoid falling back to the punitive standardized approach."
  why: >
    FRTB (effective January 2025) is the most significant overhaul of market risk capital rules
    since Basel I (1996). It addresses the failures of the 2008 crisis: VaR was not subadditive,
    models ignored liquidity risk, and there was too much variability between banks' internal
    models. The shift from VaR to ES at 97.5% captures tail risk better — ES is coherent and
    sensitive to the shape of the tail, not just the boundary. Varying liquidity horizons mean
    that illiquid risk factors (small-cap equity, credit spread) attract more capital than liquid
    ones (FX majors), aligning capital with actual liquidity risk. The P&L attribution test
    forces internal models to explain actual P&L, preventing banks from using models that
    underestimate risk. Understanding FRTB is essential for anyone building risk systems for
    regulated financial institutions.
  how_to_do_right: |
    1. Primary metric: Expected Shortfall at 97.5% (ES_97.5), not VaR
    2. ES computed over stressed period: use 12-month window of maximum ES in past data
    3. Liquidity horizons by risk factor:
       - FX, interest rates (major): 10 days
       - Equity large cap, credit IG: 20 days
       - Equity small cap, credit HY: 40 days
       - Securitized products: 60-120 days
    4. Multi-horizon ES: ES_LH = sqrt(sum((ES_j * sqrt(LH_j/LH_base))^2))
    5. P&L attribution test: compare risk-theoretical P&L vs actual P&L
       - Spearman correlation > 0.7 AND Kolmogorov-Smirnov p-value > 0.05
    6. Standardized approach: delta + vega + curvature sensitivities with prescribed risk weights
    7. Backtest at desk level (not portfolio level) — each desk must pass independently
    8. Capital floor: internal model capital >= 72.5% of standardized approach capital
    9. Report by risk class: GIRR, CSR, Equity, Commodity, FX
  severity: high
  technologies:
    lang: [python]
    framework: [numpy, scipy, pandas]
  domains:
    domain: [fintech, mathematics]
    concern: [risk_management, compliance]
  example_good: |
    import numpy as np
    from scipy.stats import norm

    def frtb_es(returns_by_risk_factor, liquidity_horizons, alpha=0.025):
        """Compute FRTB-style Expected Shortfall with liquidity horizons.

        Args:
            returns_by_risk_factor: dict of {risk_factor: daily_returns_array}
            liquidity_horizons: dict of {risk_factor: LH_in_days}
            alpha: ES confidence level (0.025 = 97.5%)
        """
        base_horizon = 10  # Base liquidity horizon (days)

        print(f"FRTB Expected Shortfall ({(1-alpha)*100:.1f}% level):")
        print(f"{'Risk Factor':20s} {'LH':>5s} {'Daily ES':>10s} {'LH-adj ES':>12s}")
        print("-" * 52)

        es_components_sq = []
        for rf, returns in returns_by_risk_factor.items():
            lh = liquidity_horizons[rf]

            # Daily ES at 97.5%
            n_tail = max(int(np.floor(alpha * len(returns))), 1)
            sorted_ret = np.sort(returns)
            daily_es = -np.mean(sorted_ret[:n_tail])

            # Scale to liquidity horizon: ES_LH = ES_daily * sqrt(LH)
            lh_adj_es = daily_es * np.sqrt(lh)

            # Under FRTB, components aggregate via: sqrt(sum(ES_j^2 * LH_j / LH_base))
            es_components_sq.append((lh_adj_es)**2)

            print(f"{rf:20s} {lh:>5d}d {daily_es:>9.4%} {lh_adj_es:>11.4%}")

        # Aggregate ES (simplified — ignoring cross-risk correlations)
        total_es = np.sqrt(sum(es_components_sq))

        print(f"\n{'Total FRTB ES':20s}       {'':>10s} {total_es:>11.4%}")

        # Capital charge (simplified): max(ES_recent, ES_stressed) * multiplier
        multiplier = 1.5  # Minimum multiplier
        capital = total_es * multiplier
        print(f"Capital charge (x{multiplier}):                 {capital:>11.4%}")

        return total_es

    # Example: multi-asset desk
    rng = np.random.default_rng(42)
    from scipy.stats import t as t_dist

    returns_by_rf = {
        "FX_EURUSD":       rng.normal(0, 0.006, 500),
        "Equity_LargeCap": t_dist.rvs(df=5, size=500, random_state=42) * 0.012,
        "Credit_HY":       t_dist.rvs(df=4, size=500, random_state=43) * 0.008,
        "Commodity":        rng.normal(0, 0.015, 500),
    }

    liquidity_horizons = {
        "FX_EURUSD": 10,       # Major FX: 10 days
        "Equity_LargeCap": 20, # Large cap equity: 20 days
        "Credit_HY": 40,       # High yield credit: 40 days
        "Commodity": 20,       # Commodity: 20 days
    }

    frtb_es(returns_by_rf, liquidity_horizons)
  example_bad: |
    import numpy as np

    # WRONG: Using VaR instead of ES, ignoring liquidity horizons
    returns = np.random.randn(250) * 0.01
    var_99 = -np.percentile(returns, 1)  # 99% VaR — NOT FRTB compliant!
    capital = var_99 * 3  # Old Basel 2.5 multiplier — outdated!
    print(f"Capital: {capital:.4%}")
    # FRTB requires: (1) ES not VaR, (2) 97.5% level, (3) liquidity horizons,
    # (4) desk-level backtesting, (5) P&L attribution test
    # This computation would fail every regulatory audit
  when_applies: Building risk systems for banks and broker-dealers, regulatory capital computation, FRTB compliance
  sources:
    - "https://en.wikipedia.org/wiki/Fundamental_Review_of_the_Trading_Book"
    - "https://www.bis.org/bcbs/publ/d457.htm"
