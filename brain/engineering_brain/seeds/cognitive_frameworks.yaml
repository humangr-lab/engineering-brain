layer: rules
domain: reasoning
knowledge:
- id: COG-FP-001
  text: 'First Principles: Decompose complex problems to fundamental truths before reaching for patterns or frameworks. When facing
    a new challenge, strip away assumptions and conventions until you reach axioms that are self-evidently true, then rebuild your
    solution from those axioms.'
  why: Engineers who jump to patterns without understanding fundamentals build fragile systems. The Therac-25 radiation machine killed
    patients because engineers reused a software pattern without understanding the underlying concurrency axioms. Cargo-culting patterns
    without first-principles understanding leads to solutions that work until they catastrophically do not.
  how_to_do_right: '1. State the problem in one sentence without jargon. 2. List every assumption you are making. 3. For each assumption,
    ask: is this a physical/mathematical constraint or just convention? 4. Discard conventions. 5. Rebuild the solution from the
    remaining constraints. 6. Only THEN look for existing patterns that match your derived solution.'
  severity: high
  technologies:
    lang: [python, javascript, java, go, rust]
  domains:
    domain: [reasoning, architecture]
    concern: [meta_cognition, design]
  example_good: '# First principles: What does this service ACTUALLY need?

    # Axiom 1: Users need to authenticate (business truth)

    # Axiom 2: Tokens expire (security truth)

    # Axiom 3: Network calls fail (physical truth)

    # Therefore: We need local token validation with expiry + retry on refresh

    class AuthService:

        def validate(self, token):

            if self._is_locally_valid(token):  # No network call needed

                return True

            return self._refresh_with_retry(token)  # Only call network when needed

    '
  example_bad: '# Cargo-culted from a blog post without understanding WHY

    class AuthService:

        def validate(self, token):

            # "Best practice" says always call the auth server

            return requests.post(AUTH_URL, token=token).json()["valid"]

            # Fails when auth server is down, no local validation, no retry

    '
  when_applies: Starting a new system design, facing an unfamiliar problem domain, choosing between competing architectural approaches,
    or when existing solutions feel overcomplicated
  sources: ["https://fs.blog/first-principles/"]
- id: COG-FP-002
  text: 'First Principles: Always ask "Why does this need X?" before asking "How to implement X?" The question of necessity must
    precede the question of implementation. Most complexity in software comes from implementing things that did not need to exist.'
  why: 'The most impactful code is code you do not write. Amazon internal study found that 30-40% of microservices in large organizations
    serve no active business need. YAGNI is not laziness — it is discipline. Every line of code is a liability: it must be maintained,
    tested, secured, and understood by future engineers.'
  how_to_do_right: '1. Before any implementation, write a one-paragraph justification answering: what user/business problem does this
    solve? 2. Ask: what happens if we do NOT build this? 3. If the answer is "nothing bad happens," do not build it. 4. If the answer
    is "we lose X revenue/users," quantify X. 5. Only proceed if the cost of building < cost of not building.'
  severity: high
  technologies:
    lang: [python, javascript, java, go]
  domains:
    domain: [reasoning, architecture]
    concern: [meta_cognition, design]
  example_good: '# Before building a caching layer:

    # Q: Why does this need a cache?

    # A: Database queries take 2s, users abandon after 3s, we lose $50K/month

    # Q: Is there a simpler solution?

    # A: Adding an index reduces query to 50ms. Cache not needed.

    # Result: 1 line of SQL instead of a Redis cluster

    CREATE INDEX idx_users_email ON users(email);

    '
  example_bad: '# "We should add caching because fast is good"

    # No measurement, no justification, now we have:

    # - Redis cluster to maintain ($200/month)

    # - Cache invalidation bugs (3 incidents this quarter)

    # - Stale data complaints from users

    # - 2 weeks of engineering time wasted

    cache = Redis(host="redis-cluster", decode_responses=True)

    '
  when_applies: Any new feature request, any proposed architectural addition, any time someone says "we should add X" without quantifying
    the problem X solves
  sources: ["https://martinfowler.com/bliki/Yagni.html"]
- id: COG-FP-003
  text: 'First Principles: Apply the 5 Whys to architecture decisions — keep asking "why" until you hit a physical constraint, a
    mathematical truth, or an immovable business requirement. If you reach "because that is how we always do it," you have found an
    assumption to challenge.'
  why: Toyota invented the 5 Whys to find root causes in manufacturing. In software, shallow reasoning leads to symptoms-level fixes.
    A team that asks "why is the API slow?" and stops at "because the database is slow" misses the root cause — perhaps the schema
    is denormalized for a use case that no longer exists, or the ORM is generating N+1 queries nobody noticed.
  how_to_do_right: '1. State the architectural decision. 2. Ask "Why?" and write the answer. 3. Ask "Why?" of that answer. 4. Repeat
    until you reach a physical law (latency of light), mathematical bound (CAP theorem), or verified business constraint (legal requirement).
    5. If you reach "convention" or "preference," that layer is negotiable. 6. Document the chain for future engineers.'
  severity: high
  technologies:
    lang: [python, javascript, java, go, rust]
  domains:
    domain: [reasoning, architecture]
    concern: [meta_cognition, root_cause_analysis]
  example_good: '# Why do we use microservices? -> Teams need independent deploys

    # Why independent deploys? -> Monolith deploy takes 4 hours, blocks all teams

    # Why does monolith deploy take 4 hours? -> 45-min test suite + manual QA

    # Why 45-min test suite? -> 12,000 integration tests, most testing unchanged code

    # ROOT CAUSE: Test infrastructure, not architecture.

    # SOLUTION: Parallelize tests + selective test runs = 8 min deploys

    # Result: Monolith with fast deploys, no microservice complexity needed

    '
  example_bad: '# "We need microservices because Netflix uses them"

    # No 5-Whys analysis -> copied Netflix architecture for a 5-person team

    # Result: 23 services, 4 engineers, nobody understands the full system

    # Deploys went from 1 hour (monolith) to 3 hours (coordinating 23 services)

    '
  when_applies: Major architecture decisions, technology selection, when inheriting a legacy system and deciding what to change, any
    decision justified by "best practice" or "industry standard"
  sources: ["https://en.wikipedia.org/wiki/Five_whys"]
- id: COG-FP-004
  text: 'First Principles for Performance: Measure before optimizing, profile before guessing, data before intuition. Human intuition
    about performance bottlenecks is wrong more than 50% of the time. The scientific method applies to performance engineering: hypothesize,
    measure, analyze, conclude.'
  why: 'Knuth''s law ("premature optimization is the root of all evil") is frequently cited but rarely followed. Engineers spend days
    optimizing hot loops that account for 0.1% of total runtime while ignoring the database query that accounts for 80%. A study at
    Google found that senior engineers'' intuition about performance bottlenecks was correct only 42% of the time without profiling
    data.'
  how_to_do_right: '1. Define the performance target (e.g., p99 < 200ms). 2. Measure current performance with production-like data.
    3. Profile to identify the actual bottleneck (cProfile, py-spy, async-profiler). 4. Verify the bottleneck accounts for >10% of
    total time (otherwise, not worth optimizing). 5. Optimize ONLY the bottleneck. 6. Measure again to verify improvement. 7. If target
    met, STOP. Do not optimize further.'
  severity: high
  technologies:
    lang: [python, javascript, java, go]
    tool: [cProfile, py-spy, async-profiler, perf, flamegraph]
  domains:
    domain: [reasoning, performance]
    concern: [meta_cognition, measurement]
  example_good: '# Step 1: Measure

    # $ py-spy record -o profile.svg -- python server.py

    # Step 2: Profile shows 78% time in serialize_response()

    # Step 3: Optimize serialization (orjson instead of json)

    import orjson

    def serialize_response(data):

        return orjson.dumps(data)  # 10x faster than json.dumps

    # Step 4: Re-measure -> p99 dropped from 450ms to 95ms. Target met. STOP.

    '
  example_bad: '# "I bet the ORM is slow, let me rewrite all queries in raw SQL"

    # 2 weeks of work, 500 lines changed, 3 new bugs introduced

    # Re-measure: 5% improvement. Actual bottleneck was JSON serialization.

    # Raw SQL made code harder to maintain for negligible gain.

    '
  when_applies: Any performance optimization effort, any time someone says "I think X is slow," capacity planning, pre-launch performance
    audits
  sources: ["https://dl.acm.org/doi/10.1145/356635.356640"]
- id: COG-FP-005
  text: 'First Principles for Security: Assume breach has already happened, minimize blast radius of every component, and derive
    defense-in-depth from axioms — not from checklists. Security axioms: (1) all inputs are hostile, (2) all networks are compromised,
    (3) all credentials will leak, (4) all code has bugs.'
  why: Equifax breach (2017) exposed 147 million records because a single unpatched Struts server had access to the entire database.
    If they had applied first-principles blast radius minimization, that server would have had access only to its own bounded context.
    Checklist security fails because checklists are static and attackers are adaptive.
  how_to_do_right: '1. From axiom "all inputs are hostile": validate and sanitize at every trust boundary, not just the edge. 2. From
    axiom "all networks are compromised": encrypt in transit AND at rest, use mTLS between services. 3. From axiom "all credentials
    will leak": use short-lived tokens, rotate automatically, grant minimum permissions. 4. From axiom "all code has bugs": isolate
    components so a bug in one cannot compromise another (containers, sandboxes, separate DB credentials per service).'
  severity: critical
  technologies:
    lang: [python, javascript, java, go, rust]
  domains:
    domain: [reasoning, security]
    concern: [meta_cognition, threat_modeling]
  example_good: '# Each service gets its own DB user with minimal permissions

    # Service A can only SELECT/INSERT on its own tables

    # If Service A is compromised, attacker cannot access Service B data

    CREATE USER svc_orders WITH PASSWORD ''rotated-daily-by-vault'';

    GRANT SELECT, INSERT ON orders, order_items TO svc_orders;

    -- No DELETE, no other tables, no admin privileges

    '
  example_bad: '# All services share one superuser connection

    # If ANY service is compromised, attacker gets EVERYTHING

    DATABASE_URL=postgres://admin:static-password@db:5432/production

    # One breach = total compromise of all data

    '
  when_applies: Any system handling user data, any multi-service architecture, any system accessible from the internet, any system
    with compliance requirements
  sources: ["https://cheatsheetseries.owasp.org/cheatsheets/Threat_Modeling_Cheat_Sheet.html"]
- id: COG-PR-001
  text: 'Pattern Recognition: Experienced engineers see "shapes" in problems — they recognize structural similarities between the
    current problem and problems they have solved before. This is not memorizing solutions; it is recognizing that a new problem has
    the same STRUCTURE as a known problem, even if the domain is completely different.'
  why: Chess grandmasters do not calculate more moves than amateurs — they recognize board patterns instantly from thousands of games.
    Similarly, a senior engineer sees a "producer-consumer" shape in a problem whether it involves message queues, ETL pipelines,
    or UI event handling. This pattern recognition compresses years of experience into seconds of insight. Without it, every problem
    feels novel and takes 10x longer to solve.
  how_to_do_right: '1. When facing a new problem, pause and ask: "What does this remind me of?" 2. Describe the problem abstractly
    — strip away domain specifics. 3. Map the abstract description to known patterns (GoF, distributed systems, data processing).
    4. If a pattern matches, verify the mapping: do the constraints match? Do the failure modes match? 5. Adapt the known solution
    to the specific context. 6. Document the analogy for junior engineers.'
  severity: high
  technologies:
    lang: [python, javascript, java, go]
  domains:
    domain: [reasoning, architecture]
    concern: [meta_cognition, pattern_matching]
  example_good: '# Problem: Users upload files, processing takes 5-30 minutes

    # Pattern recognition: This is a producer-consumer problem!

    # Known solution: Queue + async workers

    # Verify mapping: Yes - variable processing time, need backpressure, need retry

    # Adapt: Use Celery (Python) with Redis broker

    @celery.task(bind=True, max_retries=3)

    def process_upload(self, file_id):

        # Async processing with retry, backpressure via queue depth

        result = heavy_processing(file_id)

        notify_user(file_id, result)

    '
  example_bad: '# Same problem, no pattern recognition:

    # "Let me just process it in the request handler"

    @app.post("/upload")

    def upload(file: UploadFile):

        result = heavy_processing(file)  # 30 min blocking request!

        return result  # Timeout, user sees 504, file lost

    '
  when_applies: Starting any new feature or system design, debugging unfamiliar systems, reviewing code and trying to understand intent,
    mentoring junior engineers
  sources: ["https://refactoring.guru/design-patterns"]
- id: COG-PR-002
  text: 'Pattern Recognition: The "I have seen this before" heuristic — when a new problem feels familiar, explicitly map it to the
    known pattern, then VERIFY the mapping before committing to a solution. The mapping step is where most engineers fail: they feel
    the familiarity but skip the rigorous verification.'
  why: 'False pattern matching is more dangerous than no pattern matching. If you recognize "this looks like a caching problem" but
    it is actually a consistency problem, you will build a cache that makes the real problem worse. The human brain is wired to see
    patterns even where none exist (apophenia). Rigorous verification is the antidote: check that the constraints, failure modes,
    and scaling characteristics actually match.'
  how_to_do_right: '1. When you feel "I have seen this before," write down what you think the pattern is. 2. List 3 properties of
    the known pattern. 3. Verify each property holds in the new problem. 4. List 2 ways the new problem DIFFERS from the known pattern.
    5. Decide if the differences invalidate the pattern match. 6. If yes, look for a better pattern. If no, proceed with the adapted
    solution.'
  severity: high
  technologies:
    lang: [python, javascript, java, go]
  domains:
    domain: [reasoning, architecture]
    concern: [meta_cognition, pattern_matching]
  example_good: '# "This looks like a rate limiting problem"

    # Verify: (1) Multiple clients? Yes. (2) Shared resource? Yes.

    # (3) Need fairness? No - we need burst tolerance.

    # Difference: Standard rate limiting is per-client, but our bottleneck

    # is a shared downstream API with a global limit.

    # Adapted solution: Token bucket with global counter, not per-client

    class GlobalRateLimiter:

        def __init__(self, tokens_per_sec):

            self._bucket = TokenBucket(tokens_per_sec)  # Global, not per-client

    '
  example_bad: '# "This looks like a rate limiting problem" -> applies per-client limiter

    # But the actual issue is a global downstream API limit

    # 100 clients each allowed 10 req/s = 1000 req/s to downstream

    # Downstream limit is 50 req/s -> cascading failures

    limiter = RateLimiter(per_client=10)  # Wrong pattern application!

    '
  when_applies: Any time intuition says "this is similar to X," any time a solution from a previous project is being reused, code
    review when someone says "we did this before"
  sources: ["https://martinfowler.com/bliki/ConfirmationBias.html"]
- id: COG-PR-003
  text: 'Anti-Pattern Recognition: Detect code smells that indicate deeper structural issues. A code smell is a surface symptom of
    a design problem — like a fever indicates infection. Treating the fever (refactoring the smell) without diagnosing the infection
    (fixing the design) means the smell returns in a different form.'
  why: Martin Fowler documented 22 code smells in "Refactoring" (1999), and they remain the most reliable early warning system for
    design decay. A "God Class" smell indicates missing domain decomposition. "Feature Envy" indicates misplaced responsibilities.
    Teams that ignore code smells accumulate design debt that compounds until the system is effectively unrewriteable — the average
    legacy system rewrite fails 70% of the time (Standish Group).
  how_to_do_right: '1. Maintain a personal catalog of smells you have seen and what they indicated. 2. During code review, flag smells
    AND hypothesize the underlying design issue. 3. Track smell density per module — increasing density indicates accelerating decay.
    4. Prioritize fixing the design issue, not just the smell. 5. Common smell-to-cause mappings: God Class -> missing domain model,
    Long Parameter List -> missing value object, Shotgun Surgery -> missing abstraction, Feature Envy -> wrong class boundary.'
  severity: high
  technologies:
    lang: [python, javascript, java, go]
  domains:
    domain: [reasoning, code_quality]
    concern: [meta_cognition, refactoring]
  example_good: '# Smell detected: UserService has 47 methods and 2000 lines (God Class)

    # Diagnosis: Missing domain decomposition

    # Fix: Extract bounded contexts

    class AuthenticationService:  # Handles login, tokens, MFA

        ...

    class ProfileService:  # Handles user profile CRUD

        ...

    class NotificationPreferences:  # Handles notification settings

        ...

    # Each class is <200 lines, single responsibility, testable independently

    '
  example_bad: '# Smell ignored: "UserService is big but it works"

    class UserService:  # 2000 lines, 47 methods

        def login(self): ...

        def update_profile(self): ...

        def send_notification(self): ...

        def calculate_subscription(self): ...

        def generate_report(self): ...

        # Every new feature gets added here because "it involves users"

        # Testing requires mocking 15 dependencies

    '
  when_applies: Code review, refactoring planning, sprint retrospectives, onboarding new team members to a codebase, any time a file
    exceeds 500 lines
  sources: ["https://refactoring.guru/refactoring/smells"]
- id: COG-PR-004
  text: 'Performance Pattern Recognition: Identify N+1 queries, thundering herd, and hot partition problems from their symptoms, not
    just from reading code. Symptoms are observable in metrics before they appear in code review: N+1 shows as linear query count
    growth, thundering herd shows as periodic CPU spikes, hot partition shows as uneven latency distribution.'
  why: 'These three performance anti-patterns cause the majority of production incidents in web applications. N+1 queries are the
    number one cause of slow API endpoints — a list endpoint returning 100 items makes 101 database queries instead of 2. Thundering
    herd collapses caches and overwhelms backends after restarts. Hot partitions make horizontal scaling ineffective: adding 10 nodes
    helps nothing if 80% of traffic hits one node.'
  how_to_do_right: '1. For N+1: Monitor query count per request. If it grows linearly with result size, you have N+1. Fix with eager
    loading or batch queries. 2. For thundering herd: Monitor request rate after cache expiry or deploy. If it spikes >10x baseline,
    add jitter to cache TTLs and use request coalescing. 3. For hot partition: Monitor per-partition latency. If variance >5x between
    partitions, your partition key has skew. Fix by adding entropy to the key or using a different partition strategy.'
  severity: high
  technologies:
    lang: [python, javascript, java]
    framework: [django, sqlalchemy, hibernate]
    tool: [datadog, grafana, prometheus]
  domains:
    domain: [reasoning, performance]
    concern: [meta_cognition, databases, distributed_systems]
  example_good: '# N+1 detected: 101 queries for 100 users

    # Fix: Eager load with joinedload

    from sqlalchemy.orm import joinedload

    users = session.query(User).options(

        joinedload(User.orders)  # 1 query with JOIN instead of 100+1

    ).all()

    # Thundering herd fix: Jittered TTL

    import random

    ttl = BASE_TTL + random.uniform(0, BASE_TTL * 0.1)  # +/-10% jitter

    cache.set(key, value, ttl=ttl)

    '
  example_bad: '# N+1 undetected in code review, only visible in production metrics

    users = session.query(User).all()

    for user in users:

        orders = user.orders  # Lazy load = 1 query PER user

        # With 1000 users: 1001 queries, 8 second response time

    '
  when_applies: Any database-backed API returning lists, any system with caching, any horizontally partitioned data store, performance
    reviews and load testing
  sources: ["https://docs.sqlalchemy.org/en/20/orm/queryguide/relationships.html#joined-eager-loading"]
- id: COG-PR-005
  text: 'Architecture Smell Recognition: Detect when microservices smell like a distributed monolith — when services cannot be deployed
    independently, when a change in one service requires coordinated changes in multiple others, or when services share a database.
    A distributed monolith has all the complexity of microservices with none of the benefits.'
  why: 'Distributed monoliths are the worst of both worlds: the operational complexity of microservices (network failures, distributed
    tracing, deployment coordination) combined with the coupling of a monolith (cannot deploy independently, shared schema changes
    break everything). Sam Newman estimates that 60-70% of "microservice" architectures are actually distributed monoliths. The symptom
    is clear: if deploying service A requires also deploying services B and C, you have a distributed monolith.'
  how_to_do_right: '1. Track deployment coupling: how often do services deploy together? If >30%, investigate. 2. Check for shared
    databases: each service should own its data. 3. Check for synchronous chains: A calls B calls C calls D = distributed monolith.
    4. Apply the "delete test": could you delete this service and replace it with a stub? If not, boundaries are wrong. 5. If you
    find a distributed monolith, consider: (a) merge back into a modular monolith, or (b) fix boundaries with async events and data
    ownership.'
  severity: high
  technologies:
    lang: [python, javascript, java, go]
    framework: [kubernetes, docker]
  domains:
    domain: [reasoning, architecture]
    concern: [meta_cognition, microservices]
  example_good: '# Each service owns its data, communicates via events

    # Order Service: owns orders table, publishes OrderCreated event

    # Inventory Service: owns inventory table, subscribes to OrderCreated

    # Can deploy independently, no shared database

    class OrderService:

        async def create_order(self, order):

            await self.db.insert(order)  # Own database

            await self.events.publish("OrderCreated", order.id)  # Async event

    '
  example_bad: '# "Microservices" that share a database and call each other synchronously

    class OrderService:

        def create_order(self, order):

            inventory = requests.get(f"{INVENTORY_URL}/check/{order.sku}")  # Sync

            payment = requests.post(f"{PAYMENT_URL}/charge", json=order)  # Sync

            # If inventory or payment is down, orders are down

            # All 3 services use the same PostgreSQL instance

            db.execute("INSERT INTO orders ...")  # Shared DB!

    '
  when_applies: Any microservice architecture, architecture reviews, migration planning from monolith to services, when deployment
    coordination meetings become necessary
  sources: ["https://microservices.io/patterns/microservices.html"]
- id: COG-FM-001
  text: 'Failure Mode Thinking: Before writing any code, enumerate HOW it can fail — not IF it will fail. Every external call, every
    state transition, every shared resource is a failure point. The question is never "will this fail?" but "what happens WHEN this
    fails?" Designing for the happy path is designing for a system that does not exist in production.'
  why: Netflix Chaos Monkey exists because Netflix learned that systems designed only for the happy path fail catastrophically in production.
    AWS has had every service fail at least once. Every database has had corruption. Every network has had partitions. Engineers who
    do not enumerate failure modes before coding discover them in production at 3 AM. The cost of failure mode analysis is 30 minutes;
    the cost of a production outage is hours to days.
  how_to_do_right: '1. Before implementing, list every external dependency (DB, cache, API, filesystem). 2. For each dependency, answer:
    what happens if it is (a) down, (b) slow (10x latency), (c) returning errors, (d) returning wrong data? 3. For each answer, design
    a mitigation: timeout, retry, fallback, circuit breaker, or graceful degradation. 4. Write tests for each failure mode BEFORE
    writing the happy path. 5. Document failure modes in the service README or runbook.'
  severity: critical
  technologies:
    lang: [python, javascript, java, go, rust]
  domains:
    domain: [reasoning, reliability]
    concern: [meta_cognition, failure_analysis]
  example_good: '# Failure modes enumerated BEFORE implementation:

    # 1. Redis down -> fall back to DB (slower but works)

    # 2. Redis slow (>100ms) -> timeout and fall back

    # 3. Redis returns stale data -> TTL + version check

    class UserCache:

        def get_user(self, user_id):

            try:

                cached = self.redis.get(f"user:{user_id}", timeout=0.1)

                if cached and cached["version"] >= self.min_version:

                    return cached

            except (RedisTimeout, RedisConnectionError):

                pass  # Fall back to DB

            return self.db.get_user(user_id)  # Always works if DB is up

    '
  example_bad: '# Only happy path considered:

    class UserCache:

        def get_user(self, user_id):

            return self.redis.get(f"user:{user_id}")

            # Redis down? -> unhandled exception, 500 error

            # Redis slow? -> request hangs for 30s (default socket timeout)

            # Redis stale? -> user sees old data forever

    '
  when_applies: Any code that calls external services, any code that manages state, any code that will run in production, system design
    documents and architecture reviews
  sources: ["https://sre.google/sre-book/effective-troubleshooting/"]
- id: COG-FM-002
  text: 'Pre-Mortem Analysis: Before launching any system, conduct a pre-mortem — imagine it is 6 months from now and the system has
    failed catastrophically. Work backwards from the failure to identify what went wrong. This inverts the usual optimism bias and
    surfaces risks that "what could go wrong?" misses because the team is anchored on success.'
  why: 'Gary Klein''s research on pre-mortems shows they increase the ability to identify reasons for failure by 30% compared to
    traditional risk analysis. The psychological mechanism: when asked "what could go wrong?" people self-censor to avoid seeming negative.
    When told "it HAS failed, tell me why," the same people generate twice as many risks. Amazon uses pre-mortems (called "Working
    Backwards") for every major launch. Google SRE uses them for every new service onboarding.'
  how_to_do_right: '1. Gather the team. State: "It is 6 months from now. This system has caused a P0 incident. What happened?" 2.
    Each person writes 3 failure scenarios independently (no groupthink). 3. Share and cluster scenarios. 4. For each cluster, assign
    a probability (high/medium/low) and impact (P0/P1/P2). 5. For high-probability or high-impact scenarios, design mitigations NOW.
    6. Add the top 5 scenarios to the service runbook as known risks.'
  severity: high
  technologies:
    lang: [python, javascript, java, go]
  domains:
    domain: [reasoning, reliability]
    concern: [meta_cognition, risk_analysis]
  example_good: '# Pre-mortem output for a payment service:

    # Scenario 1: Double-charge due to retry without idempotency (P: high, I: P0)

    #   Mitigation: Idempotency key on every charge request

    # Scenario 2: PCI audit failure due to log exposure (P: medium, I: P0)

    #   Mitigation: Structured logging with PII redaction

    # Scenario 3: Cascade failure when Stripe is down (P: medium, I: P1)

    #   Mitigation: Circuit breaker + queue for retry

    KNOWN_RISKS = {

        "double_charge": {"mitigation": "idempotency_key", "status": "implemented"},

        "pci_log_leak": {"mitigation": "pii_redaction", "status": "implemented"},

        "stripe_cascade": {"mitigation": "circuit_breaker", "status": "implemented"},

    }

    '
  example_bad: '# No pre-mortem. Launch day:

    # "We tested it, it works, let us deploy"

    # Month 3: Double charges. No idempotency key.

    # Month 4: PCI audit failure. Credit card numbers in logs.

    # Month 5: 4-hour outage when Stripe had a 10-minute blip.

    # All three were predictable and preventable.

    '
  when_applies: Before launching any new service, before major migrations, before any change to payment or security-critical systems,
    quarterly risk reviews
  sources: ["https://hbr.org/2007/09/performing-a-project-premortem"]
- id: COG-FM-003
  text: 'Failure Cascade Mental Model: Every component that CAN fail WILL fail — trace the dominoes. When component A fails, what
    happens to B, C, and D? A single failure is manageable; a cascade is catastrophic. The difference between a 5-minute blip and a
    4-hour outage is whether the failure was contained or cascaded.'
  why: 'The 2017 AWS S3 outage started with a single mistyped command that removed too many servers. This cascaded to every AWS service
    that depended on S3 (which was most of them), causing a 4-hour internet-wide outage. The 2021 Facebook outage started with a BGP
    configuration change that cascaded through DNS, then authentication, then every Facebook service globally for 6 hours. Cascades
    are the primary cause of extended outages: the failure itself is quick, but the cascade is what turns minutes into hours.'
  how_to_do_right: '1. Draw a dependency graph of your system. 2. For each node, simulate its failure: which downstream nodes are affected?
    3. Identify single points of failure (nodes whose failure affects >50% of the system). 4. Add isolation between failure domains:
    circuit breakers, bulkheads, timeouts, fallbacks. 5. Test cascades with chaos engineering: kill a dependency and verify the blast
    radius matches your expectations. 6. Set up cascade-aware alerting: alert on the FIRST domino, not the last.'
  severity: critical
  technologies:
    lang: [python, javascript, java, go]
    tool: [circuit_breaker, bulkhead, chaos_engineering]
  domains:
    domain: [reasoning, reliability]
    concern: [meta_cognition, failure_analysis, distributed_systems]
  example_good: '# Circuit breaker prevents cascade from auth service to all services

    from circuitbreaker import circuit

    @circuit(failure_threshold=5, recovery_timeout=30)

    def authenticate(token):

        return auth_service.validate(token)

    def handle_request(request):

        try:

            user = authenticate(request.token)

        except CircuitBreakerError:

            # Auth is down, but we can serve cached sessions

            user = session_cache.get(request.session_id)

            if not user:

                return Response(503, "Service temporarily unavailable")

    '
  example_bad: '# No circuit breaker: auth failure cascades to every endpoint

    def handle_request(request):

        user = requests.get(f"{AUTH_URL}/validate/{request.token}")

        # Auth service is slow (30s timeout) -> every request queues up

        # Thread pool exhausted -> API returns 503 to ALL users

        # Including users who do not need auth (public endpoints)

    '
  when_applies: Any system with more than 2 services, any system with external dependencies, architecture reviews, incident post-mortems,
    chaos engineering planning
  sources: ["https://sre.google/sre-book/managing-incidents/"]
- id: COG-FM-004
  text: 'Partial Failure: Design for degraded states, not just binary up/down. Partial failure is harder than total failure because
    it is ambiguous — the system is "kind of working" but returning wrong results, dropping some requests, or serving stale data.
    Total failure is easy to detect and triggers automatic recovery. Partial failure lurks undetected for hours.'
  why: 'The most damaging production incidents are partial failures. A database that returns empty results instead of errors looks
    "healthy" to monitors but serves wrong data to users. A network partition that drops 5% of packets is harder to diagnose than a
    complete outage. The Knight Capital incident ($440M loss in 45 minutes) was a partial failure: the system was "up" but a deployment
    bug caused one of eight servers to execute a dead code path, generating wild trades while the other seven worked normally.'
  how_to_do_right: '1. Define health beyond "is it responding?" — include correctness checks (canary queries with known answers). 2.
    Implement semantic health checks: does the response MAKE SENSE, not just return 200? 3. Design explicit degraded modes: "read-only
    mode," "cached mode," "limited functionality mode." 4. Make degraded mode visible to users: "Some features are temporarily unavailable"
    is better than silently serving stale data. 5. Alert on anomalies, not just errors: sudden drop in write rate, unexpected empty
    results, latency variance increase.'
  severity: critical
  technologies:
    lang: [python, javascript, java, go]
  domains:
    domain: [reasoning, reliability]
    concern: [meta_cognition, failure_analysis, monitoring]
  example_good: '# Health check that detects partial failure

    async def health_check():

        checks = {

            "db_connected": await db.ping(),

            "db_correct": await db.execute("SELECT 1+1") == 2,  # Semantic check

            "cache_connected": await cache.ping(),

            "canary_valid": await self._verify_canary_record(),  # Known record exists?

        }

        if all(checks.values()):

            return {"status": "healthy"}

        elif checks["db_connected"] and checks["cache_connected"]:

            return {"status": "degraded", "issues": [k for k,v in checks.items() if not v]}

        else:

            return {"status": "unhealthy"}

    '
  example_bad: '# Binary health check misses partial failure

    async def health_check():

        return {"status": "ok"}  # Always returns ok if process is running

        # Database could be returning empty results

        # Cache could be serving stale data from 3 hours ago

        # System "looks healthy" while corrupting data

    '
  when_applies: Any production system, health check implementation, monitoring design, incident response planning, systems serving
    financial or medical data
  sources: ["https://sre.google/sre-book/monitoring-distributed-systems/"]
- id: COG-FM-005
  text: 'The 3 AM Test: Would you understand this error message, this alert, this runbook at 3 AM after being woken up? If the answer
    is no, rewrite it. Operational clarity is a first-class requirement, not a nice-to-have. The person debugging the incident at 3
    AM is operating at 50% cognitive capacity — your error messages must compensate.'
  why: 'Most production incidents happen outside business hours (Murphy''s Law + global traffic patterns). The on-call engineer who
    gets paged at 3 AM has 30 seconds of context from the alert, is sleep-deprived, and must make critical decisions under pressure.
    An alert that says "Error in module X" is useless. An alert that says "Payment processing failed: Stripe API returning 429, 340
    orders queued, retry in 60s, escalate if queue > 500" is actionable. Google SRE found that clear runbooks reduce MTTR by 40%.'
  how_to_do_right: '1. Every error message must answer: WHAT failed, WHY it might have failed, and WHAT to do about it. 2. Every alert
    must include: severity, impact (users affected), current state, threshold crossed, and suggested action. 3. Every runbook must
    be executable by someone who has never seen the system before. 4. Test your runbooks by having a junior engineer follow them verbatim.
    5. After each incident, update the runbook with what was missing.'
  severity: high
  technologies:
    lang: [python, javascript, java, go]
    tool: [pagerduty, opsgenie, datadog]
  domains:
    domain: [reasoning, reliability, observability]
    concern: [meta_cognition, operations]
  example_good: 'raise PaymentError(

        "Stripe charge failed for order {order_id}: "

        "HTTP 429 (rate limited). "

        "Current rate: 95 req/s (limit: 100). "

        "Automatic retry scheduled in 60s. "

        "If persistent: check Stripe status page, then contact #payments-oncall. "

        "Runbook: https://wiki.internal/runbooks/stripe-429"

    )

    '
  example_bad: 'raise Exception("Payment failed")

    # At 3 AM: Which payment? Why did it fail? What do I do?

    # Engineer has to read source code to understand what happened

    # MTTR: 2 hours instead of 5 minutes

    '
  when_applies: Any error message in production code, any alert configuration, any runbook or operational documentation, any user-facing
    error response
  sources: ["https://sre.google/sre-book/effective-troubleshooting/#making-effective-alerts"]
- id: COG-ST-001
  text: 'Systems Thinking: Every component is part of a system; understand the system before optimizing the component. Optimizing a part
    in isolation often degrades the whole. A faster database means nothing if the bottleneck is the network between the app server and the
    database. See the forest before pruning a tree.'
  why: >
    Suboptimization is the #1 failure mode of well-intentioned engineering. A team that optimizes their microservice to 1ms response time
    while ignoring that the API gateway adds 200ms of overhead has wasted effort. W. Edwards Deming showed that 94% of problems belong
    to the system, not the individual component. Optimizing components without understanding the system produces local maxima and global
    dysfunction.
  how_to_do_right: |
    1. Draw the end-to-end flow before touching any component.
    2. Identify where the request spends the most time (profile the SYSTEM, not just your code).
    3. Ask: "If I make this component 10x faster, does the user notice?" If no, wrong component.
    4. Identify feedback loops: does improving A degrade B?
    5. Optimize the constraint, not the component you are most comfortable with.
  severity: high
  technologies:
    lang: [python, javascript, java]
  domains:
    domain: [reasoning, architecture]
    concern: [meta_cognition]
  example_good: '# Before optimizing, trace the full request lifecycle:
    # Client -> CDN (2ms) -> LB (1ms) -> API (15ms) -> DB (180ms) -> Serialize (3ms)
    # Bottleneck is clearly DB at 180ms. Optimize THERE.
    # Added DB index: DB dropped to 5ms. Total: 26ms. User notices.'
  example_bad: '# "Let me optimize the serialization layer, I know it well"
    # Serialization: 3ms -> 0.5ms (6x improvement!)
    # Total request: 201ms -> 198.5ms (user notices nothing)
    # 2 weeks wasted on the wrong component'
  when_applies: Performance optimization, architecture review, capacity planning, any time you are about to optimize a single component
  sources: ["https://sre.google/workbook/non-abstract-design/"]
- id: COG-ST-002
  text: 'Systems Thinking: Second-order effects — every change has consequences beyond the immediate scope. Adding a cache improves latency
    but introduces stale data. Adding a retry improves reliability but increases load on a failing service. Every solution creates new
    problems; the goal is to create SMALLER problems than the ones you solve.'
  why: >
    The Cobra Effect: British colonial India offered bounties for dead cobras to reduce the population. People started breeding cobras
    for the bounty. When the program was cancelled, breeders released their now-worthless cobras, INCREASING the population. In software:
    adding retries to handle transient failures can cause a thundering herd that turns transient failures into sustained outages. Second-order
    thinking is the difference between junior and senior engineering.
  how_to_do_right: |
    1. For every proposed change, ask: "And then what happens?"
    2. List at least 3 second-order effects before implementing.
    3. For each effect, assess: is this new problem smaller than the original?
    4. Common second-order effects to check: cache (staleness), retry (amplification), queue (backpressure), index (write slowdown), lock (contention).
    5. Design mitigations for the top 2 second-order effects BEFORE shipping.
  severity: high
  technologies:
    lang: [python, javascript, java]
  domains:
    domain: [reasoning, architecture]
    concern: [meta_cognition]
  example_good: '# Change: Add retry with exponential backoff
    # 1st order: Transient failures recovered automatically
    # 2nd order: Failing service gets MORE load during outage
    # Mitigation: Circuit breaker BEFORE retry logic
    @circuit(failure_threshold=5, recovery_timeout=30)
    @retry(max_retries=3, backoff=exponential)
    def call_payment_service(order):
        return payment_api.charge(order)'
  example_bad: '# "Add retries to fix the timeout errors"
    # 3 retries x 1000 concurrent users = 3000 extra requests
    # Failing service now gets 4x load -> complete collapse
    @retry(max_retries=3)  # No circuit breaker, no backoff
    def call_payment_service(order):
        return payment_api.charge(order)'
  when_applies: Any architectural change, adding caching, adding retries, adding queues, adding indexes, any change to a shared resource
  sources: ["https://martinfowler.com/bliki/SecondOrderEffect.html"]
- id: COG-ST-003
  text: 'Systems Thinking: Feedback loops in architecture — positive (amplifying) and negative (stabilizing). Understand which loops exist
    in your system and whether they amplify problems or dampen them. A system without negative feedback loops is a system waiting to
    explode.'
  why: >
    The 2021 Robinhood outage was caused by a positive feedback loop: high load caused slow responses, which caused users to refresh,
    which caused more load, which caused slower responses. No negative feedback loop (rate limiting, backpressure, load shedding) existed
    to break the cycle. In control theory, every stable system has negative feedback. In software, circuit breakers, rate limiters, and
    backpressure mechanisms are negative feedback loops that prevent runaway amplification.
  how_to_do_right: |
    1. Map your system's feedback loops: where does output feed back into input?
    2. Classify each loop: positive (amplifying) or negative (stabilizing)?
    3. For every positive loop, ensure a negative loop counterbalances it.
    4. Common negative loops: rate limiter, circuit breaker, backpressure, load shedder, auto-scaler with cooldown.
    5. Test your negative loops under load: do they actually activate before the system collapses?
  severity: high
  technologies:
    lang: [python, javascript, java]
  domains:
    domain: [reasoning, architecture]
    concern: [meta_cognition]
  example_good: '# Positive loop: More users -> more DB queries -> slower responses -> users retry -> more queries
    # Negative loop: Load shedder activates at 80% capacity
    class LoadShedder:
        def should_accept(self, request):
            if self.current_load > 0.8:
                if request.priority == "low":
                    return False  # Shed low-priority traffic
            return True  # Breaks the amplification cycle'
  example_bad: '# No negative feedback loop:
    # Users retry on slow response (positive loop)
    # No rate limiting, no load shedding, no circuit breaker
    # System amplifies its own failure until total collapse
    @app.get("/api/data")
    def get_data():
        return db.query_all()  # No protection, no limits'
  when_applies: System design review, load testing analysis, incident post-mortems involving cascading failures, capacity planning
  sources: ["https://sre.google/sre-book/addressing-cascading-failures/"]
- id: COG-ST-004
  text: 'Systems Thinking: Emergence — system behavior arises from component interactions, not from component properties. You cannot predict
    system behavior by analyzing components in isolation. The behavior of a distributed system is an emergent property of network topology,
    message ordering, failure timing, and load patterns — none of which exist in unit tests.'
  why: >
    The Therac-25 killed patients not because any single component was buggy, but because the INTERACTION between the operator interface
    and the beam controller created a race condition that no component-level analysis could detect. Similarly, microservice architectures
    exhibit emergent behaviors — deadlocks, cascading failures, data inconsistencies — that only appear when services interact under
    realistic conditions. Unit tests verify components; integration and chaos tests verify emergent behavior.
  how_to_do_right: |
    1. After designing components, analyze their INTERACTIONS explicitly.
    2. Ask: "What happens when A and B both try to X at the same time?"
    3. Ask: "What happens when the order of messages from A and B is reversed?"
    4. Run integration tests with realistic concurrency and failure injection.
    5. Use chaos engineering to discover emergent failure modes you did not anticipate.
  severity: high
  technologies:
    lang: [python, javascript, java]
  domains:
    domain: [reasoning, architecture]
    concern: [meta_cognition]
  example_good: '# Testing emergent behavior: What happens when two services
    # try to update the same resource concurrently?
    async def test_concurrent_order_updates():
        order = await create_order()
        # Simulate two services updating simultaneously
        results = await asyncio.gather(
            service_a.update_status(order.id, "shipped"),
            service_b.update_status(order.id, "cancelled"),
        )
        # Verify: one wins, one gets conflict, data is consistent
        final = await get_order(order.id)
        assert final.status in ("shipped", "cancelled")  # Not corrupted'
  example_bad: '# Only testing components in isolation:
    def test_update_status():
        order = create_order()
        update_status(order.id, "shipped")
        assert order.status == "shipped"
        # Passes! But what about concurrent updates?
        # What about network partitions? What about message reordering?
        # These emergent behaviors are never tested.'
  when_applies: Distributed system design, microservice architecture, any system with concurrent access, integration testing strategy
  sources: ["https://martinfowler.com/bliki/EmergentDesign.html"]
- id: COG-ST-005
  text: 'Systems Thinking: Boundary analysis — 90% of bugs live at system boundaries. The interface between two components, two teams,
    two services, or two data formats is where assumptions diverge and errors concentrate. Invest disproportionately in boundary validation,
    contract testing, and integration tests at boundaries.'
  why: >
    NASA lost the Mars Climate Orbiter ($327M) because one team used metric units and another used imperial — a boundary mismatch.
    In software, most production bugs occur at boundaries: API contracts, serialization/deserialization, timezone conversions, encoding
    mismatches, auth token handoffs. A study at Microsoft found that 60% of critical bugs were at module boundaries, not within modules.
    Boundaries are where implicit assumptions become explicit failures.
  how_to_do_right: |
    1. Identify all boundaries in your system: service-to-service, team-to-team, format-to-format.
    2. At every boundary, make the contract EXPLICIT: schema validation, type checking, contract tests.
    3. Never trust data crossing a boundary — validate even from internal services.
    4. Use contract testing (Pact) between services to catch boundary drift.
    5. When debugging, start at the boundaries: what data crossed, in what format, with what assumptions?
  severity: high
  technologies:
    lang: [python, javascript, java]
  domains:
    domain: [reasoning, architecture]
    concern: [meta_cognition]
  example_good: '# Explicit boundary contract with validation
    from pydantic import BaseModel, validator
    class OrderEvent(BaseModel):
        order_id: str
        amount_cents: int  # Not dollars — explicit unit
        currency: str  # ISO 4217
        timestamp: datetime  # UTC — explicit timezone
        @validator("currency")
        def valid_currency(cls, v):
            assert v in SUPPORTED_CURRENCIES, f"Unsupported: {v}"
            return v'
  example_bad: '# Implicit boundary — no validation, no contract
    def process_order(event: dict):
        amount = event["amount"]  # Dollars? Cents? Who knows
        time = event["time"]  # UTC? Local? String? Epoch?
        # Works in dev (same team), breaks in prod (different team sends different format)'
  when_applies: API design, service integration, data pipeline ingestion, cross-team interfaces, any point where data format or assumptions change
  sources: ["https://martinfowler.com/bliki/ContractTest.html"]
- id: COG-TA-001
  text: 'Trade-off Analysis: There are no solutions, only trade-offs. Make them EXPLICIT. Every architectural decision trades something
    for something else. The mark of senior engineering is not finding the "right" answer but articulating what you are gaining and what
    you are giving up, so the team can make an informed decision.'
  why: >
    The myth of the "best practice" causes more architectural damage than any single bad decision. "Use microservices" is not a best
    practice — it is a trade-off: you gain independent deployment and team autonomy at the cost of operational complexity and distributed
    system failure modes. Teams that adopt microservices without understanding the trade-off end up with distributed monoliths. Making
    trade-offs explicit forces intellectual honesty and enables course correction when the trade-off balance shifts.
  how_to_do_right: |
    1. For every architectural decision, write: "We are choosing X over Y because Z."
    2. List what you GAIN and what you LOSE — both must be non-empty.
    3. State the conditions under which you would REVERSE the decision.
    4. Record the trade-off in an ADR (Architecture Decision Record).
    5. Revisit trade-offs quarterly: has the context changed?
  severity: high
  technologies:
    lang: [python, javascript, java]
  domains:
    domain: [reasoning, architecture]
    concern: [meta_cognition]
  example_good: '# ADR-007: Choose PostgreSQL over DynamoDB
    # GAIN: Strong consistency, complex queries, familiar SQL, joins
    # LOSE: Auto-scaling, managed infrastructure, sub-10ms latency at scale
    # REVERSE IF: We exceed 50K writes/sec or need single-digit ms latency
    # CONTEXT: Current load is 500 writes/sec, complex reporting queries needed'
  example_bad: '# "We use DynamoDB because it is a best practice for microservices"
    # No trade-off analysis. 6 months later:
    # - Cannot do JOIN queries for reporting -> built a separate ETL pipeline
    # - Eventual consistency causing bugs -> added DynamoDB Transactions (expensive)
    # - Team spent 3 months learning NoSQL patterns they did not need'
  when_applies: Any architecture decision, technology selection, build-vs-buy, database choice, monolith-vs-microservices, sync-vs-async
  sources: ["https://martinfowler.com/articles/architect-elevator.html"]
- id: COG-TA-002
  text: 'Trade-off Analysis: CAP theorem mindset — apply "pick 2 of 3" thinking broadly. Beyond distributed databases, every engineering
    decision involves impossible triangles where you cannot maximize all dimensions simultaneously. Identify the dimensions, pick your
    priority, and accept the consequences.'
  why: >
    The CAP theorem is the most famous impossible triangle in computing, but the pattern is universal. Speed-Quality-Cost: pick 2.
    Consistency-Availability-Partition tolerance: pick 2. Developer Experience-Performance-Safety: pick 2. Teams that try to maximize
    all three dimensions end up with none — they build systems that are moderately fast, moderately reliable, and moderately maintainable,
    excelling at nothing. The power of impossible triangles is that they force explicit prioritization.
  how_to_do_right: |
    1. Identify the three competing dimensions for your decision.
    2. Rank them: which is most important for THIS use case?
    3. Accept that the lowest-ranked dimension will suffer — design for it.
    4. Document the ranking and rationale.
    5. Common triangles: Consistency/Availability/Partition-tolerance, Speed/Quality/Cost, Flexibility/Performance/Simplicity, Security/Usability/Cost.
  severity: high
  technologies:
    lang: [python, javascript, java]
  domains:
    domain: [reasoning, architecture]
    concern: [meta_cognition]
  example_good: '# Triangle: Consistency vs Availability vs Latency
    # For payment service: Consistency > Availability > Latency
    # Decision: Synchronous writes to primary DB, accept higher latency
    # For product catalog: Availability > Latency > Consistency
    # Decision: Read from cache/replica, accept stale data up to 5 minutes
    PAYMENT_DB = PostgreSQL(read_from="primary")  # Consistency first
    CATALOG_DB = PostgreSQL(read_from="replica", max_staleness="5m")  # Availability first'
  example_bad: '# "Everything must be consistent AND available AND fast"
    # Result: System is none of the three
    # Payments read from replica (inconsistent!) for speed
    # Catalog uses synchronous primary writes (slow!) for consistency nobody needs'
  when_applies: Database selection, caching strategy, consistency model, API design, any decision with competing dimensions that cannot all be maximized
  sources: ["https://dl.acm.org/doi/10.1145/362459.362813"]
- id: COG-TA-003
  text: 'Trade-off Analysis: Reversibility as a decision criterion. Prefer reversible decisions over irreversible ones. A bad reversible
    decision costs you a few days of refactoring. A bad irreversible decision costs you months or years. Invest decision quality
    proportionally to irreversibility.'
  why: >
    Jeff Bezos distinguishes Type 1 (irreversible, one-way door) and Type 2 (reversible, two-way door) decisions. Most engineering
    decisions are Type 2 but are treated as Type 1, causing analysis paralysis. Choosing a variable name is Type 2 — change it tomorrow.
    Choosing a database is closer to Type 1 — migration takes months. The tragedy is teams that spend weeks debating Type 2 decisions
    while making Type 1 decisions in minutes without analysis.
  how_to_do_right: |
    1. Before any decision, ask: "How hard is it to reverse this?"
    2. If easily reversible (days): decide quickly, iterate.
    3. If hard to reverse (months): invest in analysis, prototyping, and stakeholder alignment.
    4. Make decisions MORE reversible: use feature flags, abstractions, migration layers.
    5. Common irreversible decisions: database choice, API contracts with external consumers, data deletion, public schema changes.
  severity: high
  technologies:
    lang: [python, javascript, java]
  domains:
    domain: [reasoning, architecture]
    concern: [meta_cognition]
  example_good: '# Make database choice MORE reversible with repository pattern
    class OrderRepository(Protocol):
        def save(self, order: Order) -> None: ...
        def find(self, id: str) -> Order: ...
    # Start with PostgreSQL
    class PostgresOrderRepo(OrderRepository): ...
    # If we need to switch to DynamoDB later, only this class changes
    # The rest of the codebase is database-agnostic'
  example_bad: '# Database choice baked into every layer (irreversible)
    class OrderService:
        def create_order(self):
            cursor = psycopg2.connect(...).cursor()  # PostgreSQL everywhere
            cursor.execute("INSERT INTO orders ...")  # Raw SQL in business logic
            # Switching DB requires rewriting every service, every query, every test'
  when_applies: Architecture decisions, technology selection, API design, schema design, any decision that will be difficult to change later
  sources: ["https://cognitect.com/blog/2011/11/15/documenting-architecture-decisions"]
- id: COG-TA-004
  text: 'Trade-off Analysis: Time horizon analysis — the right decision differs for 1 month vs 1 year vs 5 years. A quick hack is the
    right decision for a prototype that will be thrown away in a month. The same hack is technical debt if the code will live for 5 years.
    Always ask: "What is the expected lifetime of this code?"'
  why: >
    Code lives longer than anyone expects. A "temporary" solution built in 2015 is still running in production in 2026. The US Department
    of Defense found that 80% of software costs are maintenance, not initial development. The right investment in code quality depends
    entirely on how long the code will live. Over-engineering a throwaway script wastes time. Under-engineering a core service creates
    compound technical debt that grows exponentially.
  how_to_do_right: |
    1. Before implementing, estimate the expected lifetime: throwaway (<1 month), short-lived (1-6 months), long-lived (1-5 years), core (5+ years).
    2. Throwaway: optimize for speed. No tests, no docs, no abstractions.
    3. Short-lived: basic tests, minimal docs, simple structure.
    4. Long-lived: full test coverage, comprehensive docs, clean abstractions, ADRs.
    5. Core: all of the above plus formal reviews, contract tests, monitoring, runbooks.
  severity: high
  technologies:
    lang: [python, javascript, java]
  domains:
    domain: [reasoning, architecture]
    concern: [meta_cognition]
  example_good: '# Throwaway script (1 week lifetime): optimize for speed
    import csv
    for row in csv.reader(open("data.csv")):
        print(row[2])  # Quick and dirty, appropriate for throwaway
    # ---
    # Core payment service (5+ year lifetime): optimize for maintainability
    class PaymentService:
        """Process payments with full audit trail and idempotency."""
        def charge(self, order: Order) -> ChargeResult:
            # Full validation, error handling, logging, monitoring
            ...'
  example_bad: '# 5-year core service built like a throwaway script
    def charge(order):
        r = requests.post(STRIPE_URL, json=order)
        return r.json()
    # No error handling, no retry, no idempotency, no logging
    # "We will clean it up later" — nobody ever does'
  when_applies: Any new code, deciding on code quality investment, technical debt prioritization, refactoring decisions
  sources: ["https://martinfowler.com/bliki/TechnicalDebtQuadrant.html"]
- id: COG-TA-005
  text: 'Trade-off Analysis: The cost of NOT doing — opportunity cost is invisible but real. Every feature you build is a feature you are
    NOT building. Every technology you evaluate is time NOT spent implementing. The most important trade-off is what you sacrifice by
    choosing this path.'
  why: >
    Opportunity cost is the most under-analyzed trade-off in engineering. Teams spend 3 months building a custom monitoring system
    (saving $500/month on Datadog) while their core product stagnates and a competitor captures the market. The $6,000/year saved is
    dwarfed by the revenue lost. Amazon's "two-way door" framework explicitly accounts for opportunity cost: if the cost of delay is
    high, decide quickly and correct later rather than perfecting the decision.
  how_to_do_right: |
    1. Before starting any initiative, ask: "What will we NOT do because we are doing this?"
    2. Estimate the cost of delay for the alternatives you are deferring.
    3. Use "cost of delay" as a prioritization metric: value / time-to-deliver.
    4. For build-vs-buy decisions: the cost of building is not just engineering time — it is what those engineers COULD have built instead.
    5. Review quarterly: are we spending time on the highest-value work?
  severity: high
  technologies:
    lang: [python, javascript, java]
  domains:
    domain: [reasoning, architecture]
    concern: [meta_cognition]
  example_good: '# Build vs Buy analysis with opportunity cost
    # Option A: Build custom auth (3 months, 2 engineers)
    # Option B: Use Auth0 ($500/month)
    # Direct cost: Auth0 costs $6K/year
    # Opportunity cost: 2 engineers x 3 months = features NOT built
    # Those features have estimated value of $200K/year revenue
    # Decision: Buy Auth0, engineers build revenue features
    AUTH_PROVIDER = "auth0"  # Buy, do not build'
  example_bad: '# "Let us build our own auth to save $500/month"
    # 3 months later: custom auth works, but:
    # - Competitor launched 2 features we planned
    # - Lost 3 enterprise deals waiting for those features
    # - Custom auth has 2 security bugs (no dedicated security team)
    # Saved $6K/year, lost $600K in revenue'
  when_applies: Prioritization, build-vs-buy decisions, roadmap planning, sprint planning, any time choosing between multiple initiatives
  sources: ["https://blog.pragmaticengineer.com/buy-vs-build/"]
- id: COG-TR-001
  text: 'Temporal Reasoning: Think in timelines, not snapshots — all data has a time dimension. A database record is not just its current
    state; it is the history of all its states over time. A metric is not just its current value; it is a trend. Decisions based on
    snapshots miss the trajectory, and trajectory matters more than position.'
  why: >
    A server at 70% CPU is fine if it was at 90% yesterday (recovering). The same 70% is alarming if it was at 30% yesterday (growing
    exponentially). A codebase with 500 bugs is fine if it had 2000 last quarter (improving). The same 500 is alarming if it had 100
    last quarter (decaying). Netflix famously uses "trend alerting" — they alert not on absolute thresholds but on rate of change,
    catching problems before they become crises.
  how_to_do_right: |
    1. For every metric, track the trend, not just the current value.
    2. Store timestamps with all data — you will need them.
    3. When analyzing a problem, ask: "Is this getting better or worse? How fast?"
    4. Design alerts on rate of change, not just absolute thresholds.
    5. Use event sourcing or audit logs to preserve temporal information.
  severity: high
  technologies:
    lang: [python, javascript, java]
  domains:
    domain: [reasoning, architecture]
    concern: [meta_cognition]
  example_good: '# Alert on rate of change, not just absolute value
    def check_error_rate(metrics):
        current = metrics.error_rate(window="5m")
        previous = metrics.error_rate(window="5m", offset="1h")
        rate_of_change = (current - previous) / previous if previous > 0 else 0
        if rate_of_change > 2.0:  # Error rate more than doubled
            alert("Error rate increasing rapidly", current=current, trend=rate_of_change)'
  example_bad: '# Snapshot alert — misses trajectory
    def check_error_rate(metrics):
        if metrics.error_rate() > 0.05:  # 5% threshold
            alert("High error rate")
        # Misses: error rate went from 0.01% to 4.9% in 10 minutes
        # (exponential growth about to cross threshold)'
  when_applies: Monitoring and alerting, capacity planning, debugging production issues, data modeling, any analysis of system health
  sources: ["https://sre.google/sre-book/monitoring-distributed-systems/#analyzing-trends"]
- id: COG-TR-002
  text: 'Temporal Reasoning: Race conditions are temporal bugs — they exist in the time dimension, not in the code dimension. Code review
    cannot find race conditions because the code looks correct at every point in time; the bug exists in the ORDERING of events across
    time. Only temporal analysis (happens-before reasoning, timeline diagrams) can find them.'
  why: >
    Race conditions are the most expensive class of bugs because they are intermittent, hard to reproduce, and hard to detect. The
    Therac-25 radiation machine race condition killed 3 patients and injured 3 more — the code was "correct" in isolation but the
    interaction timing was deadly. In web applications, double-submit bugs (user clicks "Pay" twice) are race conditions that cost
    companies millions annually. The fundamental issue: humans think sequentially, but systems execute concurrently.
  how_to_do_right: |
    1. Identify shared mutable state — this is where races live.
    2. Draw a timeline diagram showing concurrent access to shared state.
    3. Ask: "What if these two operations interleave in the worst possible order?"
    4. Use optimistic locking, transactions, or idempotency keys to prevent races.
    5. Test with concurrent load — race conditions only appear under concurrency.
  severity: high
  technologies:
    lang: [python, javascript, java]
  domains:
    domain: [reasoning, architecture]
    concern: [meta_cognition]
  example_good: '# Race condition prevented with idempotency key
    def process_payment(order_id: str, idempotency_key: str):
        # Check if this exact operation was already completed
        if cache.exists(f"payment:{idempotency_key}"):
            return cache.get(f"payment:{idempotency_key}")  # Return cached result
        result = stripe.charge(order_id)
        cache.set(f"payment:{idempotency_key}", result, ttl=86400)
        return result
    # Double-click: second call returns cached result, no double charge'
  example_bad: '# Race condition: double payment on double-click
    def process_payment(order_id: str):
        order = db.get(order_id)
        if order.status == "pending":  # Both threads see "pending"
            stripe.charge(order_id)     # Both threads charge
            order.status = "paid"       # Both threads update
            db.save(order)
        # Result: customer charged twice'
  when_applies: Any code with concurrent access, payment processing, inventory management, any code with shared mutable state, distributed systems
  sources: ["https://jepsen.io/consistency"]
- id: COG-TR-003
  text: 'Temporal Reasoning: Eventual consistency means "eventually" is unbounded — design for the gap. When a system promises eventual
    consistency, it means data WILL converge but makes NO guarantee about when. The gap between "now" and "eventually" is where bugs,
    user confusion, and data corruption live. Design explicitly for that gap.'
  why: >
    Amazon DynamoDB, Cassandra, and most distributed databases offer eventual consistency for performance. But "eventually" can mean
    milliseconds or hours — it depends on network conditions, load, and failure recovery. A user who updates their profile and immediately
    sees the old data has encountered the consistency gap. An inventory system that shows "in stock" after the last item was sold is in
    the consistency gap. These are not bugs — they are the EXPECTED behavior of eventually consistent systems that nobody designed for.
  how_to_do_right: |
    1. Map every data flow: where does the user WRITE and where do they READ?
    2. If write and read go to different replicas, there is a consistency gap.
    3. For user-facing reads after writes: use "read your own writes" consistency.
    4. For critical data (inventory, balance): use strong consistency or optimistic locking.
    5. Make the gap VISIBLE to users: "Changes may take up to X minutes to appear."
  severity: high
  technologies:
    lang: [python, javascript, java]
  domains:
    domain: [reasoning, architecture]
    concern: [meta_cognition]
  example_good: '# Read-your-own-writes after profile update
    def update_profile(user_id, data):
        db.write(user_id, data)  # Writes to primary
        cache.set(f"profile:{user_id}", data, ttl=60)  # Cache the write
    def get_profile(user_id):
        cached = cache.get(f"profile:{user_id}")  # Check cache first
        if cached:
            return cached  # User sees their own write immediately
        return db.read(user_id)  # Replica read for other users'
  example_bad: '# User updates profile, immediately sees old data
    def update_profile(user_id, data):
        db.write(user_id, data)  # Writes to primary
    def get_profile(user_id):
        return db.read(user_id)  # Reads from replica (stale!)
        # User: "I just updated my name, why does it still show the old one?"'
  when_applies: Any system using replicated databases, caching layers, distributed systems, event-driven architectures, CQRS patterns
  sources: ["https://jepsen.io/consistency/models/eventual"]
- id: COG-TR-004
  text: 'Temporal Reasoning: Time-to-detection vs time-to-recovery — optimize for both independently. MTTR (Mean Time To Recovery) has two
    components: the time to DETECT the problem and the time to FIX it. Most teams invest in fixing fast but detecting slow. A problem
    detected in 1 minute and fixed in 30 minutes has 31 minutes of downtime. A problem detected in 30 minutes and fixed in 1 minute has
    the same 31 minutes. Invest in detection.'
  why: >
    Google SRE data shows that for most incidents, time-to-detection accounts for 60-80% of total downtime. A silent data corruption
    bug that runs undetected for 2 weeks causes more damage than a loud crash that is detected in seconds. The reason is that detection
    is passive (waiting for alerts) while recovery is active (humans debugging). Reducing detection time has higher ROI because it
    requires only better monitoring, while reducing recovery time requires better architecture.
  how_to_do_right: |
    1. Measure TTD and TTR separately for every incident.
    2. If TTD > TTR: invest in monitoring, canary checks, anomaly detection.
    3. If TTR > TTD: invest in runbooks, automation, rollback mechanisms.
    4. For critical paths: add canary checks that verify correctness every N minutes.
    5. After every incident, ask: "How could we have detected this sooner?"
  severity: high
  technologies:
    lang: [python, javascript, java]
  domains:
    domain: [reasoning, architecture]
    concern: [meta_cognition]
  example_good: '# Canary check: detect data corruption BEFORE users report it
    @schedule(every="5m")
    def canary_check():
        # Insert a known record, read it back, verify correctness
        test_id = "canary-001"
        expected = {"name": "Canary", "balance": 100}
        actual = db.read(test_id)
        if actual != expected:
            alert(severity="P0", message=f"Data corruption detected: expected {expected}, got {actual}")
            # Detection time: 5 minutes max. Without this: days or weeks.'
  example_bad: '# No canary: corruption detected by user complaint 2 weeks later
    # User: "My balance is wrong"
    # Support: "Let me check... oh, data corruption since 2 weeks ago"
    # Impact: 2 weeks of corrupted data affecting thousands of users
    # Recovery: manual data reconciliation taking 3 days'
  when_applies: Incident analysis, monitoring strategy, reliability investment decisions, SLO/SLA design, on-call process improvement
  sources: ["https://sre.google/sre-book/service-level-objectives/"]
- id: COG-TR-005
  text: 'Temporal Reasoning: Technical debt compounds with time, like financial debt. A shortcut taken today does not have a fixed cost —
    its cost grows every day as more code is built on top of it. Paying debt early is cheap; paying it late is expensive; not paying it
    at all is bankruptcy (rewrite).'
  why: >
    Ward Cunningham coined "technical debt" as a metaphor precisely because debt has compound interest. A missing abstraction that costs
    1 hour to fix today will cost 1 day to fix after 10 features are built on it, and 1 month to fix after 100 features. The average
    Fortune 500 company spends 40% of engineering time on technical debt (Stripe, 2018 survey). Companies that ignore debt eventually
    face the "Big Rewrite" — which fails 70% of the time (Standish Group) because the debt is not just in the code but in the
    organization's understanding of the system.
  how_to_do_right: |
    1. Track technical debt explicitly: maintain a debt register with estimated cost and interest rate.
    2. Classify debt: intentional (shortcuts with known cost) vs accidental (discovered later).
    3. Pay high-interest debt first: debt in hot paths costs more than debt in cold paths.
    4. Allocate 20% of sprint capacity to debt repayment — non-negotiable.
    5. Never take debt in foundations (auth, data model, core abstractions) — the interest rate is infinite.
  severity: high
  technologies:
    lang: [python, javascript, java]
  domains:
    domain: [reasoning, architecture]
    concern: [meta_cognition]
  example_good: '# Technical debt register with interest estimation
    TECH_DEBT = [
        {"id": "TD-042", "description": "No database migration system",
         "interest": "high",  # Every schema change is manual and risky
         "cost_now": "2 days",  # Add Alembic + migrate existing
         "cost_6mo": "2 weeks",  # 50 manual migrations to convert
         "decision": "Pay now — high interest, compounds fast"},
    ]
    # Sprint allocation: 80% features, 20% debt repayment'
  example_bad: '# "We will fix it later" — the most expensive sentence in engineering
    # Month 1: Skip migrations, ALTER TABLE manually (saves 2 days)
    # Month 3: 15 manual migrations, one typo corrupted staging
    # Month 6: 50 manual migrations, afraid to touch schema
    # Month 12: Cannot add features without breaking data
    # Month 18: "We need a complete rewrite"'
  when_applies: Sprint planning, refactoring prioritization, code review, architecture reviews, any time someone says "we will fix it later"
  sources: ["https://martinfowler.com/bliki/TechnicalDebt.html"]
- id: COG-PB-001
  text: 'Probabilistic Thinking: Not "will it fail?" but "how often and how badly?" Every system fails. The question is not whether but
    when, how frequently, and what the impact will be. Engineering for zero failures is impossible and wasteful. Engineering for acceptable
    failure rates and bounded impact is achievable and rational.'
  why: >
    Google targets 99.99% availability for critical services — not 100%. That 0.01% (52 minutes/year of downtime) is intentional: the cost
    of going from 99.99% to 99.999% is 10x the cost of going from 99.9% to 99.99%, while the user-perceived improvement is negligible.
    Engineers who think in binary (works/broken) over-invest in preventing unlikely failures while ignoring likely ones. Probabilistic
    thinking allocates engineering effort where it has the highest expected value: probability of failure times impact of failure.
  how_to_do_right: |
    1. For every failure mode, estimate: probability (per year) and impact (users affected, revenue lost, data corrupted).
    2. Calculate expected loss: probability x impact.
    3. Invest mitigation effort proportional to expected loss, not to fear.
    4. Set explicit reliability targets (SLOs) — 100% is not a valid target.
    5. Use error budgets: if you have budget remaining, ship faster; if budget is exhausted, stabilize.
  severity: high
  technologies:
    lang: [python, javascript, java]
  domains:
    domain: [reasoning, architecture]
    concern: [meta_cognition]
  example_good: '# SLO-driven reliability engineering
    SLO = {"availability": 0.999, "latency_p99_ms": 500}
    ERROR_BUDGET = 1 - SLO["availability"]  # 0.1% = 8.7 hours/year
    # This month: used 2 hours of error budget (on track)
    # Decision: we have budget, ship the new feature
    # Next month: used 6 hours (over budget)
    # Decision: freeze features, focus on reliability'
  example_bad: '# Binary thinking: "it must never fail"
    # Team spends 3 months building 5-nines infrastructure
    # Cost: $500K in engineering time + $50K/month in infrastructure
    # Meanwhile: the feature it protects serves 100 users
    # Expected loss from 99.9% (not 99.999%): $200/year
    # ROI: spent $500K to save $200/year'
  when_applies: Reliability engineering, SLO/SLA setting, error budget decisions, infrastructure investment, any discussion about "how reliable should this be"
  sources: ["https://sre.google/sre-book/embracing-risk/"]
- id: COG-PB-002
  text: 'Probabilistic Thinking: Long tail distributions — 80% of bugs come from 20% of code paths, and 20% of bugs cause 80% of outages.
    Pareto distributions dominate software systems. Finding and fortifying the critical 20% has more impact than uniformly improving
    everything.'
  why: >
    Microsoft research found that 1% of bugs cause 50% of customer-reported crashes. Netflix found that 3 out of 300 microservices caused
    80% of production incidents. Amazon found that 5% of API endpoints generated 90% of error budget consumption. The Pareto principle
    is not just a heuristic — it is a statistical reality in software systems. Teams that spread their reliability investment uniformly
    across all code paths waste 80% of their effort on the 20% of paths that rarely cause problems.
  how_to_do_right: |
    1. Identify your "vital few": which code paths cause most incidents?
    2. Rank by incident frequency x severity — this is your priority list.
    3. Invest disproportionately in the top 20%: more tests, more monitoring, more review.
    4. For the remaining 80%: basic coverage is sufficient.
    5. Re-measure quarterly — the vital few shift as the system evolves.
  severity: high
  technologies:
    lang: [python, javascript, java]
  domains:
    domain: [reasoning, architecture]
    concern: [meta_cognition]
  example_good: '# Pareto-driven test investment
    # Analysis: 3 modules cause 80% of incidents
    CRITICAL_MODULES = ["payment", "auth", "inventory"]
    # These get: 95% coverage, mutation testing, property tests, chaos tests
    # Other 47 modules get: 80% coverage, unit tests only
    # Result: 3x reduction in incidents with same engineering budget'
  example_bad: '# Uniform test coverage mandate: "every module must have 95% coverage"
    # 50 modules x 95% coverage = massive test maintenance burden
    # Team spends equal time testing the "About Us" page and the payment flow
    # Payment module still has gaps in edge cases because time was spread thin'
  when_applies: Test strategy, reliability investment, incident analysis, monitoring strategy, performance optimization prioritization
  sources: ["https://sre.google/sre-book/service-level-objectives/#choosing-an-appropriate-slo"]
- id: COG-PB-003
  text: 'Probabilistic Thinking: Bayes in debugging — update your hypothesis with each piece of evidence. Start with prior probabilities
    based on experience, observe evidence, and update. The most likely cause is not the first thing you think of; it is the hypothesis
    that best explains ALL the evidence.'
  why: >
    Confirmation bias is the #1 debugging antipattern: an engineer suspects the database, finds one piece of evidence supporting that
    hypothesis, and spends 4 hours investigating the database while ignoring evidence pointing to a network issue. Bayesian reasoning
    forces you to consider ALL evidence and update your belief proportionally. Studies at Microsoft showed that developers who used
    structured hypothesis-evidence debugging resolved issues 40% faster than those who followed their initial intuition.
  how_to_do_right: |
    1. List 3-5 hypotheses for the problem (not just your first guess).
    2. Assign rough prior probabilities based on experience.
    3. Gather one piece of evidence. For each hypothesis, ask: "How likely is this evidence if this hypothesis is true?"
    4. Update probabilities: hypotheses that better explain the evidence get higher probability.
    5. Investigate the highest-probability hypothesis. If evidence contradicts it, update and switch.
  severity: high
  technologies:
    lang: [python, javascript, java]
  domains:
    domain: [reasoning, architecture]
    concern: [meta_cognition]
  example_good: '# Bayesian debugging: API returning 500 errors
    # Hypothesis 1: Database down (prior: 20%, common cause)
    # Hypothesis 2: Bad deploy (prior: 40%, deploy happened 1 hour ago)
    # Hypothesis 3: Dependency failure (prior: 30%, happened before)
    # Evidence: Errors started exactly at deploy time
    # Update: H2 goes to 70%, investigate deploy first
    # Evidence: Rollback fixes it -> H2 confirmed
    # Total time: 15 minutes (vs 2 hours chasing wrong hypothesis)'
  example_bad: '# Intuition-driven debugging: "I bet it is the database"
    # Spends 3 hours investigating database (nothing wrong)
    # "Maybe it is the cache" — 2 hours (nothing wrong)
    # Finally checks deploy logs: bad config pushed 5 hours ago
    # Total time: 5+ hours. First evidence (timing) pointed to deploy.'
  when_applies: Debugging production incidents, root cause analysis, performance investigation, any diagnostic process
  sources: ["https://sre.google/sre-book/effective-troubleshooting/#bisection"]
- id: COG-PB-004
  text: 'Probabilistic Thinking: Risk = Probability x Impact. A low-probability, high-impact risk (data breach) deserves more attention
    than a high-probability, low-impact risk (slow page load). Multiply, do not just enumerate. Risk matrices that ignore this multiplication
    systematically misallocate engineering effort.'
  why: >
    The Fukushima nuclear disaster was caused by a tsunami that was deemed "too unlikely to plan for." The probability was low (once per
    500 years) but the impact was catastrophic ($200 billion). In software: a SQL injection vulnerability might have low probability
    (only exploitable with specific input) but catastrophic impact (full database compromise). Teams that manage risk by listing "high/medium/low"
    without multiplying probability and impact consistently over-invest in high-probability nuisances while ignoring low-probability
    catastrophes.
  how_to_do_right: |
    1. For each risk, estimate probability (0-1) and impact ($, users, or severity).
    2. Calculate expected risk = probability x impact.
    3. Sort by expected risk, not by probability or impact alone.
    4. Invest mitigation effort proportional to expected risk.
    5. For catastrophic-impact risks (data breach, data loss): mitigate even at very low probability.
  severity: high
  technologies:
    lang: [python, javascript, java]
  domains:
    domain: [reasoning, architecture]
    concern: [meta_cognition]
  example_good: '# Risk-prioritized security backlog
    RISKS = [
        {"risk": "SQL injection", "prob": 0.05, "impact": 1_000_000, "expected": 50_000},
        {"risk": "Slow dashboard", "prob": 0.90, "impact": 100, "expected": 90},
        {"risk": "Auth bypass", "prob": 0.01, "impact": 5_000_000, "expected": 50_000},
    ]
    # Priority: SQL injection = Auth bypass >> Slow dashboard
    # Even though slow dashboard is 18x more likely'
  example_bad: '# Priority by probability alone:
    # 1. Slow dashboard (90% likely) — fix first!
    # 2. SQL injection (5% likely) — "unlikely, fix later"
    # 3. Auth bypass (1% likely) — "will never happen"
    # Result: dashboard is fast, but a breach costs $5M'
  when_applies: Security prioritization, risk assessment, architecture review, incident prevention, any resource allocation decision
  sources: ["https://cheatsheetseries.owasp.org/cheatsheets/Threat_Modeling_Cheat_Sheet.html"]
- id: COG-PB-005
  text: 'Probabilistic Thinking: Sample size matters — do not optimize from one complaint, one benchmark, or one incident. A single data
    point is an anecdote, not a trend. Decisions based on small samples are decisions based on noise, not signal. Require statistical
    significance before changing course.'
  why: >
    A/B testing literature shows that most "winning" variants with <1000 observations per group are false positives. In engineering:
    one user reports slow performance, so the team spends a sprint optimizing — but the user was on a 3G connection. One benchmark shows
    framework A is faster, so the team migrates — but the benchmark tested an atypical workload. One incident triggers a complete
    architecture change — but the incident was caused by a one-time operator error. The cost of reacting to noise is enormous: wasted
    engineering time, unnecessary complexity, and sometimes making the real problem worse.
  how_to_do_right: |
    1. Before acting on a data point, ask: "Is this a pattern or an anecdote?"
    2. Require at least 3 independent observations before changing priorities.
    3. For performance claims: reproduce with YOUR workload, not a synthetic benchmark.
    4. For user complaints: check logs to see how many users are actually affected.
    5. For incidents: look at the last 10 incidents before drawing architectural conclusions.
  severity: high
  technologies:
    lang: [python, javascript, java]
  domains:
    domain: [reasoning, architecture]
    concern: [meta_cognition]
  example_good: '# Data-driven decision: is this a real problem?
    def should_investigate(issue_type: str) -> bool:
        recent = get_reports(issue_type, days=30)
        affected_users = count_unique_users(recent)
        total_users = get_active_users(days=30)
        impact_rate = affected_users / total_users
        # Require: 3+ reports AND >0.1% of users affected
        return len(recent) >= 3 and impact_rate > 0.001'
  example_bad: '# Anecdote-driven development:
    # CEO: "My page loaded slowly yesterday"
    # Team: Drops everything, spends 2 weeks on performance optimization
    # Result: CEO was on airplane WiFi. No other users affected.
    # Opportunity cost: 2 weeks of feature development lost'
  when_applies: Prioritization, performance optimization, architecture decisions, responding to user feedback, post-incident reviews
  sources: ["https://sre.google/sre-book/practical-alerting/"]
- id: COG-CF-001
  text: 'Counterfactual Thinking: "What if we did NOT do this?" — the most powerful question in engineering. Before adding any feature,
    service, or abstraction, ask what happens if it does not exist. If the answer is "nothing bad," you have found unnecessary complexity.
    The absence test reveals what is truly essential.'
  why: >
    Antoine de Saint-Exupery said "Perfection is achieved not when there is nothing more to add, but when there is nothing left to take
    away." In software, this is survival wisdom. Every line of code is a liability: it must be understood, tested, maintained, secured,
    and debugged. A study at Google found that removing dead code and unused features improved developer velocity by 15% per quarter.
    The counterfactual "what if this did not exist?" is the sharpest tool for identifying waste.
  how_to_do_right: |
    1. Before adding any component, ask: "What breaks if this does not exist?"
    2. If nothing breaks: do not add it.
    3. For existing components: try disabling them in staging. What happens?
    4. Track feature usage: features used by <1% of users are candidates for removal.
    5. Run "deletion-driven development" sprints: delete first, add only if missed.
  severity: high
  technologies:
    lang: [python, javascript, java]
  domains:
    domain: [reasoning, architecture]
    concern: [meta_cognition]
  example_good: '# Counterfactual analysis before adding a message queue
    # Q: What if we do NOT add RabbitMQ?
    # A: Synchronous processing works for current 100 req/s load
    # A: We lose async retry, but can add retry at HTTP level
    # A: We lose decoupling, but only have 2 services
    # Decision: Skip the queue. Add it when load exceeds 1000 req/s.
    # Saved: 3 weeks of implementation + ongoing ops burden'
  example_bad: '# "Every microservice needs a message queue — best practice"
    # Added RabbitMQ for 2 services handling 50 req/s
    # Result: queue is 99.9% empty, but we now maintain:
    # - RabbitMQ cluster (3 nodes for HA)
    # - Dead letter queue handling
    # - Message serialization/deserialization
    # - Queue monitoring and alerting'
  when_applies: Feature planning, architecture review, dependency evaluation, code review, technical debt assessment
  sources: ["https://martinfowler.com/bliki/Yagni.html"]
- id: COG-CF-002
  text: 'Counterfactual Thinking: "What would this look like if it were easy?" — Tim Ferriss''s question applied to engineering. If the
    solution feels complex, you might be solving the wrong problem. The simplest solution is not always the best, but the best solution
    is always simpler than you first imagined.'
  why: >
    Complexity is the default output of engineering teams. Without active simplification, systems accumulate accidental complexity — complexity
    that is not inherent to the problem but introduced by the solution. Rich Hickey (Clojure creator) distinguishes "simple" (not intertwined)
    from "easy" (familiar): a simple solution might require unfamiliar patterns but will be maintainable for years, while an "easy" solution
    uses familiar patterns but becomes unmaintainable as complexity intertwines.
  how_to_do_right: |
    1. After designing a solution, ask: "What would this look like if it were easy?"
    2. Remove every component and ask: "Does this still work?"
    3. If you need a diagram to explain it, it might be too complex.
    4. Compare your solution to the "simplest thing that could work" — justify every addition.
    5. Timebox simplification: spend 30 minutes trying to make it simpler before implementing.
  severity: high
  technologies:
    lang: [python, javascript, java]
  domains:
    domain: [reasoning, architecture]
    concern: [meta_cognition]
  example_good: '# Complex version: Event sourcing + CQRS + Kafka for a blog
    # "What if it were easy?" -> It is a blog. SQLite + server-rendered HTML.
    # Simple version:
    import sqlite3
    db = sqlite3.connect("blog.db")
    def create_post(title, body):
        db.execute("INSERT INTO posts (title, body) VALUES (?, ?)", (title, body))
    # Ships in 1 day, handles 10K daily readers easily'
  example_bad: '# Blog architecture designed like it is Netflix:
    # PostService -> Kafka -> ReadModelProjector -> ElasticSearch -> CDN
    # 6 services, 3 databases, 2 message queues
    # Handles 10K daily readers (so would a $5/month WordPress instance)
    # 3 months to build, 1 engineer full-time to maintain'
  when_applies: System design, architecture review, any time a solution feels overly complex, startup MVP planning, refactoring decisions
  sources: ["https://www.infoq.com/presentations/Simple-Made-Easy/"]
- id: COG-CF-003
  text: 'Counterfactual Thinking: "What would a fresh team do?" — the outsider perspective. When inheriting a legacy system, imagine a
    competent team building the solution from scratch today with current tools and knowledge. The delta between their solution and your
    current system is your accidental complexity.'
  why: >
    Legacy systems accumulate decisions that made sense at the time but no longer do. A team that started in 2015 might be running Python 2
    with a custom ORM because SQLAlchemy was not mature enough then. A fresh team in 2026 would use Python 3.12 with SQLAlchemy 2.0.
    The outsider perspective strips away historical justifications and reveals what the system SHOULD be. This is not about rewriting — it is
    about knowing the target state so you can migrate incrementally.
  how_to_do_right: |
    1. Describe the PROBLEM the system solves (not the current solution).
    2. Design the solution a fresh team would build today with current tools.
    3. Compare: what is in the current system that would NOT be in the fresh design?
    4. That delta is accidental complexity — candidates for removal or replacement.
    5. Migrate incrementally: replace components one at a time, starting with highest-cost accidental complexity.
  severity: high
  technologies:
    lang: [python, javascript, java]
  domains:
    domain: [reasoning, architecture]
    concern: [meta_cognition]
  example_good: '# Fresh team analysis of legacy notification system
    # Current: Custom SMTP relay -> RabbitMQ -> Custom template engine -> DB queue
    # Fresh team would: SendGrid API + Jinja2 templates + async HTTP
    # Delta (accidental complexity):
    # - Custom SMTP relay (SendGrid does this better)
    # - RabbitMQ (async HTTP with retry is sufficient)
    # - Custom template engine (Jinja2 is standard)
    # Migration plan: Replace one component per sprint'
  example_bad: '# "We cannot change it, it has always been this way"
    # Custom SMTP relay maintained by 1 engineer (bus factor = 1)
    # RabbitMQ cluster for 50 notifications/day (massive overkill)
    # Custom template engine with 15 known bugs
    # Team afraid to touch it — adds workarounds on top'
  when_applies: Legacy system assessment, modernization planning, architecture review, onboarding new team members, technical debt estimation
  sources: ["https://martinfowler.com/bliki/StranglerFigApplication.html"]
- id: COG-CF-004
  text: 'Counterfactual Thinking: "What breaks if this assumption is wrong?" — assumption stress testing. Every system is built on
    assumptions. Identify the critical assumptions and analyze the consequences of each one being wrong. The assumptions you do not test
    are the ones that will break in production.'
  why: >
    Knight Capital lost $440 million in 45 minutes because of one wrong assumption: that a deployment flag would never be reused.
    When it was reused, dead code activated and executed millions of erroneous trades. The Ariane 5 rocket exploded because of one wrong
    assumption: that a 64-bit float would never overflow a 16-bit integer (inherited from Ariane 4 where the assumption was valid).
    Every catastrophic failure in engineering history traces back to an assumption that was never explicitly identified or tested.
  how_to_do_right: |
    1. List every assumption your system makes (start with data format, load, uptime, ordering).
    2. For each assumption, ask: "What happens if this is wrong?"
    3. Classify by impact: if wrong, is it a minor bug or a catastrophe?
    4. For high-impact assumptions: add runtime validation, monitoring, or defensive code.
    5. Document assumptions explicitly — they are the system's hidden requirements.
  severity: high
  technologies:
    lang: [python, javascript, java]
  domains:
    domain: [reasoning, architecture]
    concern: [meta_cognition]
  example_good: '# Assumption stress test for payment service
    ASSUMPTIONS = {
        "Stripe always returns in <5s": {
            "if_wrong": "User sees timeout, payment state unknown",
            "mitigation": "Timeout at 10s + idempotency key + status check endpoint",
        },
        "Order IDs are unique": {
            "if_wrong": "Wrong customer charged",
            "mitigation": "UUID v4 (collision probability: 1 in 2^122)",
        },
        "USD amounts fit in 32-bit int (cents)": {
            "if_wrong": "Overflow on orders > $21M",
            "mitigation": "Use 64-bit int, add validation for max amount",
        },
    }'
  example_bad: '# Assumptions not documented, not tested:
    # "Stripe is always fast" — no timeout configured
    # "IDs are unique" — using auto-increment (unique per table, not globally)
    # "Amounts fit" — using float (precision loss on large amounts)
    # Each assumption waits silently to cause a production incident'
  when_applies: System design, pre-launch review, security review, data migration, any system handling money or sensitive data
  sources: ["https://martinfowler.com/bliki/AssertsAsDefensiveProgramming.html"]
- id: COG-CF-005
  text: 'Counterfactual Thinking: "What would we do differently knowing what we know now?" — retrospective wisdom applied forward.
    After every project, extract the lessons that would have changed the approach. These lessons are gold for the next project — but only
    if they are captured, shared, and applied.'
  why: >
    The US Army's After Action Review (AAR) process is credited with transforming the Army from a struggling organization post-Vietnam
    into the most effective military force in the world. The key insight: learning happens not during the project but in the structured
    reflection afterward. In software, teams that run blameless retrospectives and actually change behavior based on findings improve
    velocity by 20-30% per quarter (DORA research). Teams that skip retrospectives or run them without follow-through repeat the same
    mistakes indefinitely.
  how_to_do_right: |
    1. After every project/sprint/incident, run a structured retrospective.
    2. Ask each participant: "What would you do differently knowing what you know now?"
    3. Identify the TOP 3 lessons (not 20 — focus on the vital few).
    4. Convert each lesson into a CONCRETE action: who will do what by when?
    5. Review actions at the start of the next project — did we actually apply the lessons?
  severity: high
  technologies:
    lang: [python, javascript, java]
  domains:
    domain: [reasoning, architecture]
    concern: [meta_cognition]
  example_good: '# Post-project retrospective with concrete actions
    RETRO_LESSONS = {
        "lesson_1": {
            "insight": "We spent 3 weeks on a custom cache that Redis could have done",
            "action": "Create a build-vs-buy checklist, review before any new component",
            "owner": "tech_lead",
            "deadline": "next sprint planning",
        },
        "lesson_2": {
            "insight": "Integration tests found 80% of bugs, unit tests found 15%",
            "action": "Shift test budget: 60% integration, 30% unit, 10% e2e",
            "owner": "qa_lead",
            "deadline": "next sprint",
        },
    }'
  example_bad: '# Retrospective theater: run it, forget it
    # "What went well? Everything! What could improve? Nothing!"
    # Or: 20 action items, none assigned, none followed up
    # Next project: same mistakes, same overtime, same frustration
    # Team stops attending retrospectives — "they never change anything"'
  when_applies: Sprint retrospectives, post-incident reviews, project post-mortems, quarterly planning, team process improvement
  sources: ["https://cloud.google.com/architecture/devops/devops-process-postmortem-culture"]
- id: COG-CS-001
  text: 'Constraint Satisfaction: Constraints are features, not limitations. Every constraint reduces the solution space, making the problem
    EASIER to solve, not harder. A blank canvas is paralyzing; a canvas with dimensions, palette, and deadline produces art. Embrace
    constraints — they are your most powerful design tool.'
  why: >
    The Unix philosophy ("do one thing well") is a self-imposed constraint that produced the most enduring software ecosystem in history.
    Twitter's 140-character limit (a constraint) created an entirely new communication paradigm. In engineering: "must run on a single
    server" eliminates distributed systems complexity. "Must use PostgreSQL" eliminates database evaluation time. "Must ship in 2 weeks"
    eliminates gold-plating. Constraints drive creativity by forcing engineers to solve the actual problem instead of the imagined one.
  how_to_do_right: |
    1. At the start of any project, list ALL constraints: technical, business, regulatory, timeline.
    2. For each constraint, identify what solution space it ELIMINATES.
    3. Celebrate eliminated options — those are decisions you do not have to make.
    4. If a project has no constraints, ADD some: timeboxes, technology limits, scope limits.
    5. When stuck, add a constraint: "What if we could only use stdlib?" often unblocks thinking.
  severity: high
  technologies:
    lang: [python, javascript, java]
  domains:
    domain: [reasoning, architecture]
    concern: [meta_cognition]
  example_good: '# Constraint: Must run on customer premises (no cloud)
    # This ELIMINATES: managed databases, serverless, cloud queues
    # This SIMPLIFIES: single binary deployment, SQLite, embedded queue
    # Result: simple, self-contained application that customers love
    # The constraint made the product BETTER, not worse
    app = FastAPI()
    db = sqlite3.connect("/data/app.db")  # No cloud dependency'
  example_bad: '# No constraints: "use whatever technology you want"
    # Team evaluates: 5 databases, 3 cloud providers, 4 message queues
    # 6 weeks of evaluation, no code written
    # Finally picks Kubernetes + Kafka + MongoDB + Redis + ElasticSearch
    # For an app that serves 100 users'
  when_applies: Project kickoff, architecture decisions, technology selection, any time feeling overwhelmed by options, sprint planning
  sources: ["https://12factor.net/"]
- id: COG-CS-002
  text: 'Constraint Satisfaction: Identify binding constraints first. Not all constraints are equal. The binding constraint is the one that
    currently limits the system. Improving anything else is wasted effort. Find the binding constraint, relax it, then find the new
    binding constraint. This is iterative optimization.'
  why: >
    A chain is only as strong as its weakest link. Strengthening any other link has zero impact on the chain's strength. In software
    systems: if the database is the binding constraint (slowest component), optimizing the API server (fast component) has zero impact
    on end-to-end performance. Eliyahu Goldratt's "The Goal" formalized this as the Theory of Constraints: identify the bottleneck,
    exploit it, subordinate everything else to it, elevate it, then repeat.
  how_to_do_right: |
    1. Measure end-to-end: where does the request spend the most time?
    2. The component consuming the most time/resources is the binding constraint.
    3. Optimize ONLY the binding constraint.
    4. After optimization, re-measure: the binding constraint may have shifted.
    5. Repeat until the system meets requirements.
  severity: high
  technologies:
    lang: [python, javascript, java]
  domains:
    domain: [reasoning, architecture]
    concern: [meta_cognition]
  example_good: '# Find and fix binding constraint iteratively
    # Iteration 1: Profile -> DB is 80% of request time (binding)
    # Fix: Add index. DB drops from 200ms to 20ms.
    # Iteration 2: Profile -> Serialization is now 60% (new binding)
    # Fix: Use orjson. Serialization drops from 50ms to 5ms.
    # Iteration 3: Profile -> Network is now 70%. Target met at 30ms total. STOP.'
  example_bad: '# Optimize everything uniformly (shotgun approach)
    # "Make the API faster" -> optimize all 5 components equally
    # API server: 5ms -> 3ms (saved 2ms)
    # Auth check: 10ms -> 7ms (saved 3ms)
    # DB query: 200ms -> 200ms (not touched, it is "someone else job")
    # Total: 215ms -> 210ms. 2 weeks of work for 2% improvement.'
  when_applies: Performance optimization, capacity planning, process improvement, any iterative optimization effort
  sources: ["https://www.leanproduction.com/theory-of-constraints/"]
- id: COG-CS-003
  text: 'Constraint Satisfaction: Theory of Constraints applied to software — every system is limited by ONE bottleneck at a time. Improving
    non-bottlenecks does not improve the system. The bottleneck determines throughput, and everything else is subordinate to it.'
  why: >
    Goldratt demonstrated that a manufacturing line producing 100 units/hour at the bottleneck station cannot produce more than 100
    units/hour regardless of how fast every other station operates. In software: if your CI pipeline takes 45 minutes because tests run
    serially, adding faster build servers (3 minutes) has zero impact. If your deploy pipeline is bottlenecked by manual approval (2 hours
    average wait), automating the 5-minute artifact build saves nothing. Teams that do not identify the bottleneck waste enormous effort
    optimizing non-constraints.
  how_to_do_right: |
    1. Map the end-to-end process (request lifecycle, CI/CD pipeline, development workflow).
    2. Measure throughput at each stage.
    3. The stage with lowest throughput IS the bottleneck.
    4. EXPLOIT: get maximum output from the bottleneck without adding resources.
    5. SUBORDINATE: adjust all other stages to match the bottleneck's pace (not faster).
    6. ELEVATE: add resources to the bottleneck only after exploiting and subordinating.
  severity: high
  technologies:
    lang: [python, javascript, java]
  domains:
    domain: [reasoning, architecture]
    concern: [meta_cognition]
  example_good: '# CI/CD bottleneck analysis
    # Build: 3 min | Test: 45 min | Deploy: 5 min | Approval: 2 hours
    # Bottleneck: Manual approval (2 hours)
    # Step 1 (Exploit): Create fast-track approval for low-risk changes
    # Step 2 (Subordinate): No point parallelizing tests yet
    # Step 3 (Elevate): Auto-approve if all checks pass + tests green
    # Result: Approval drops to 5 min. New bottleneck: tests (45 min).
    # NOW parallelize tests.'
  example_bad: '# "CI is slow, let us parallelize the tests!"
    # Tests: 45 min -> 10 min (great improvement!)
    # But approval still takes 2 hours
    # End-to-end: 2h53m -> 2h18m (only 20% improvement)
    # Team feels defeated: "We optimized tests 4x but nothing changed"'
  when_applies: CI/CD optimization, process improvement, capacity planning, team workflow optimization, any system throughput analysis
  sources: ["https://www.tocico.org/page/WhatisTOC"]
- id: COG-CS-004
  text: 'Constraint Satisfaction: Resource constraints drive innovation. When you have unlimited resources, you build the obvious solution.
    When resources are constrained, you are forced to find creative solutions that are often BETTER than the obvious one. Embrace resource
    constraints as innovation catalysts.'
  why: >
    Twitter was built on Ruby on Rails and MySQL by 4 engineers — not because it was the "right" architecture, but because those were
    the constraints. The result: a product that shipped fast enough to capture the market. Apollo 13's engineers had to build a CO2
    filter from duct tape and cardboard — not because that was optimal, but because those were the only materials available. The constraint
    forced a creative solution that worked. In software, teams with unlimited cloud budgets often build wasteful systems. Teams with a
    $100/month budget build efficient ones.
  how_to_do_right: |
    1. When facing a resource constraint, list what you CAN use (not what you cannot).
    2. Ask: "What is the best solution using ONLY what we have?"
    3. Prototype with the constraint — you will often find the constrained solution is simpler.
    4. If the constraint forces a truly inferior solution, THEN request more resources with evidence.
    5. Artificial constraints in hackathons produce innovation: try "build it with no external dependencies."
  severity: high
  technologies:
    lang: [python, javascript, java]
  domains:
    domain: [reasoning, architecture]
    concern: [meta_cognition]
  example_good: '# Constraint: Single server, no cloud, $50/month budget
    # Innovation forced by constraint:
    # - SQLite instead of PostgreSQL cluster (simpler, zero ops)
    # - Embedded search instead of ElasticSearch (no extra service)
    # - Static files instead of CDN (Caddy auto-TLS, fast enough)
    # Result: serves 5K users on a $20 VPS, zero operational burden
    # A cloud architecture would have been 10x more expensive and complex'
  example_bad: '# No constraints: "Use whatever you need, budget is unlimited"
    # Team provisions: 3 Kubernetes clusters, 5 managed databases,
    # ElasticSearch, Redis, Kafka, S3, CloudFront
    # Monthly cost: $15,000. Users: 500.
    # Cost per user: $30/month. Revenue per user: $10/month.'
  when_applies: Startup engineering, prototype design, hackathons, cost-constrained projects, any time feeling overwhelmed by unlimited options
  sources: ["https://mckinsey.com/capabilities/mckinsey-digital/our-insights/tech-forward/from-constraint-to-catalyst"]
- id: COG-CS-005
  text: 'Constraint Satisfaction: Regulatory constraints are first-class requirements, not afterthoughts. GDPR, HIPAA, SOX, PCI-DSS are
    not obstacles — they are requirements with legal enforcement. Designing for compliance from the start is 10x cheaper than retrofitting
    it. Treat regulatory constraints with the same rigor as functional requirements.'
  why: >
    British Airways was fined 20 million pounds for GDPR violations that could have been prevented with basic encryption. Equifax paid
    $700 million for a breach that exploited a known vulnerability. The cost of non-compliance dwarfs the cost of compliance by orders
    of magnitude. Yet teams routinely treat compliance as "phase 2" — after the product ships. Retrofitting PCI compliance into an
    existing system costs 5-10x more than building it in from the start because it requires re-architecting data flows, adding encryption
    to existing storage, and auditing every data access path.
  how_to_do_right: |
    1. At project kickoff, list all applicable regulations (GDPR, HIPAA, PCI-DSS, SOX).
    2. Extract technical requirements from each regulation (encryption at rest, audit logging, data retention, right to deletion).
    3. Add these as first-class requirements in the backlog — same priority as features.
    4. Design the data model for compliance from day 1: what data do we store, where, for how long, who can access it?
    5. Automate compliance checks: automated PCI scans, GDPR data inventory, audit log verification.
  severity: high
  technologies:
    lang: [python, javascript, java]
  domains:
    domain: [reasoning, architecture]
    concern: [meta_cognition]
  example_good: '# GDPR built into the data model from day 1
    class UserData(BaseModel):
        id: UUID
        email: str  # PII: encrypted at rest, auto-deleted after account closure
        name: str   # PII: encrypted at rest
        created_at: datetime
        retention_days: int = 365  # Auto-delete after 1 year of inactivity
        consent_log: list[ConsentRecord]  # Audit trail for GDPR compliance
        def export_for_subject_access_request(self) -> dict:
            """GDPR Article 15: Right of access."""
            return self.dict(exclude={"internal_flags"})'
  example_bad: '# "We will add GDPR compliance later"
    class User:
        email = Column(String)  # Plaintext, no encryption
        name = Column(String)   # No retention policy
        # 18 months later: GDPR audit finds 47 violations
        # Cost to fix: 6 months of engineering + $200K legal fees
        # Plus: user data scattered across 12 services with no inventory'
  when_applies: Any system handling PII, healthcare data, financial data, any system operating in EU/US with regulatory requirements
  sources: ["https://gdpr.eu/", "https://www.pcisecuritystandards.org/"]
- id: COG-AR-001
  text: 'Analogical Reasoning: Cross-discipline analogies from civil engineering, electrical engineering, and mechanical engineering reveal
    deep structural insights about software. Software is young (~70 years); civil engineering is ancient (~5000 years). We can borrow
    patterns from disciplines that have had millennia to learn from failure.'
  why: >
    Software engineering reinvents concepts that other engineering disciplines solved centuries ago. Load balancing is traffic engineering.
    Circuit breakers are borrowed from electrical engineering. Bulkheads are borrowed from shipbuilding. Safety factors are borrowed from
    civil engineering. The advantage of cross-discipline thinking is that these patterns have been refined by real-world failures — bridges
    that collapsed, ships that sank, circuits that burned. Software failures are annoying; physical engineering failures kill people. Their
    patterns are battle-hardened.
  how_to_do_right: |
    1. When facing a new problem, ask: "What would a civil/electrical/mechanical engineer call this?"
    2. Search for the equivalent concept in that discipline.
    3. Study how that discipline solved it (they have had more time to get it right).
    4. Adapt the solution to software, accounting for differences (zero marginal cost, instant deployment).
    5. Common mappings: load balancing = traffic engineering, caching = warehousing, rate limiting = flow control, redundancy = safety factor.
  severity: high
  technologies:
    lang: [python, javascript, java]
  domains:
    domain: [reasoning, architecture]
    concern: [meta_cognition]
  example_good: '# Electrical engineering analogy: circuit breaker
    # In electrical: breaker opens when current exceeds threshold, preventing fire
    # In software: breaker opens when errors exceed threshold, preventing cascade
    from circuitbreaker import circuit
    @circuit(failure_threshold=5, recovery_timeout=30)
    def call_payment_service(order):
        return requests.post(PAYMENT_URL, json=order)
    # Civil engineering analogy: safety factor
    # Bridges are designed to hold 3x expected load
    # Software: provision 3x expected capacity for critical services'
  example_bad: '# No cross-discipline thinking:
    # "Our service can handle 1000 req/s, and we get 900 req/s. We are fine."
    # A civil engineer would laugh: a bridge rated for 1000 tons
    # with 900 tons of regular traffic has NO safety margin.
    # First traffic spike = collapse.'
  when_applies: System design, reliability engineering, capacity planning, any time solving a problem that "feels familiar" from another domain
  sources: ["https://microservices.io/patterns/reliability/circuit-breaker.html"]
- id: COG-AR-002
  text: 'Analogical Reasoning: The plumbing analogy — software systems are plumbing with backpressure and flow control. Data flows through
    pipes (connections), collects in tanks (buffers), and must be regulated to prevent overflow. When the sink is full, you turn off the
    faucet — you do not make the pipes bigger.'
  why: >
    Backpressure is the most under-implemented pattern in software systems. When a producer generates data faster than a consumer can
    process it, the data has to go somewhere: it fills buffers, consumes memory, and eventually crashes the system. Real plumbing solves
    this with pressure regulators and overflow valves. Software systems often have neither — they accept unbounded input and hope the
    consumer keeps up. The result: memory exhaustion, cascading failures, and data loss under load.
  how_to_do_right: |
    1. For every producer-consumer pair, ask: "What happens if the producer is 10x faster than the consumer?"
    2. Add bounded buffers: queues with maximum size, not unbounded lists.
    3. When the buffer is full, apply backpressure: reject new input, slow the producer, or drop low-priority items.
    4. Monitor buffer depth as a leading indicator of problems.
    5. The plumbing rule: never add capacity downstream without adding flow control upstream.
  severity: high
  technologies:
    lang: [python, javascript, java]
  domains:
    domain: [reasoning, architecture]
    concern: [meta_cognition]
  example_good: '# Bounded buffer with backpressure
    import asyncio
    queue = asyncio.Queue(maxsize=1000)  # Bounded! Not infinite.
    async def producer(data):
        try:
            queue.put_nowait(data)  # Raises QueueFull if buffer is full
        except asyncio.QueueFull:
            logger.warn("Backpressure: queue full, rejecting input")
            return False  # Signal producer to slow down
        return True'
  example_bad: '# Unbounded buffer: no backpressure, no flow control
    queue = []  # Unbounded list
    def producer(data):
        queue.append(data)  # Always accepts, never pushes back
    # At 3 AM: queue has 10 million items, 8 GB of memory consumed
    # OOM killer terminates the process, all 10 million items lost'
  when_applies: Any producer-consumer pattern, message queues, event processing, API rate handling, data pipeline design
  sources: ["https://www.reactivemanifesto.org/"]
- id: COG-AR-003
  text: 'Analogical Reasoning: City planning analogy — software infrastructure grows like a city. You cannot rebuild the highway while
    traffic is flowing. You need zoning (separation of concerns), infrastructure that supports growth, and migration paths that do not
    require shutting everything down.'
  why: >
    Robert Moses and Jane Jacobs debated city planning in the 1960s: Moses wanted to demolish neighborhoods to build highways (the "Big
    Rewrite"); Jacobs advocated incremental improvement that preserved existing communities (refactoring). Jacobs won — cities that
    demolished and rebuilt became worse, while cities that incrementally improved thrived. In software: the "Big Rewrite" fails 70% of
    the time (Standish Group). Incremental migration — the "Strangler Fig" pattern — succeeds because it preserves working functionality
    while gradually replacing outdated components.
  how_to_do_right: |
    1. Never plan a "Big Rewrite" — plan incremental migration.
    2. Use the Strangler Fig pattern: new functionality goes to new code, old functionality is gradually migrated.
    3. Maintain backward compatibility during migration — old and new must coexist.
    4. Zone your architecture: separate concerns so one area can change without affecting others.
    5. Build infrastructure (CI/CD, monitoring, testing) BEFORE building features — just like a city builds roads before buildings.
  severity: high
  technologies:
    lang: [python, javascript, java]
  domains:
    domain: [reasoning, architecture]
    concern: [meta_cognition]
  example_good: '# Strangler Fig: Gradual migration from legacy to new system
    class OrderRouter:
        def route(self, order):
            if self.feature_flag("new_order_system", order.customer_id):
                return new_order_service.process(order)  # New system
            return legacy_order_service.process(order)    # Old system
    # Week 1: 1% of traffic to new system (canary)
    # Week 4: 25% of traffic (validated)
    # Week 8: 100% of traffic. Legacy decommissioned.
    # Zero downtime, zero big bang risk.'
  example_bad: '# Big Rewrite: "Let us rebuild everything from scratch"
    # Month 1-6: Building new system in parallel (2x engineering cost)
    # Month 6: "Just a few more features to reach parity"
    # Month 12: Still not at feature parity. Legacy still running.
    # Month 18: Management cancels rewrite. $2M spent, nothing shipped.'
  when_applies: Legacy modernization, migration planning, architecture evolution, scaling decisions, any long-lived system
  sources: ["https://martinfowler.com/bliki/StranglerFigApplication.html"]
- id: COG-AR-004
  text: 'Analogical Reasoning: The immune system analogy — prevention plus response, not just prevention. A robust system, like a biological
    immune system, has multiple layers: barriers (prevention), detection (monitoring), response (auto-healing), and memory (learning from
    past attacks). No single layer is sufficient.'
  why: >
    The human immune system does not prevent all infections — it detects and responds to them rapidly while remembering past threats for
    faster future response. Software systems that focus only on prevention (firewalls, input validation) fail when prevention is breached.
    Defense-in-depth mirrors the immune system: outer barriers (WAF, rate limiting), detection (anomaly monitoring), response (circuit
    breakers, auto-scaling), and memory (incident database, runbooks). Each layer compensates for failures in the previous layer.
  how_to_do_right: |
    1. Layer 1 (Barriers): Input validation, authentication, WAF, rate limiting.
    2. Layer 2 (Detection): Anomaly detection, security monitoring, canary checks.
    3. Layer 3 (Response): Circuit breakers, auto-scaling, auto-rollback, kill switches.
    4. Layer 4 (Memory): Incident database, runbooks, post-mortem lessons, automated regression tests.
    5. Test each layer independently AND together: chaos engineering for the full immune system.
  severity: high
  technologies:
    lang: [python, javascript, java]
  domains:
    domain: [reasoning, architecture]
    concern: [meta_cognition]
  example_good: '# Defense-in-depth: 4 layers like an immune system
    # Layer 1 (Barrier): Rate limiter rejects >100 req/s per IP
    @rate_limit(100, per="second", key="ip")
    def api_endpoint(request):
        # Layer 2 (Detection): Anomaly detection on request patterns
        if anomaly_detector.is_suspicious(request):
            security_alert(request)
        # Layer 3 (Response): Circuit breaker on downstream
        result = circuit_breaker.call(downstream_service, request)
        # Layer 4 (Memory): Log for future pattern learning
        audit_log.record(request, result)
        return result'
  example_bad: '# Single layer of defense: only barriers
    @app.post("/api/data")
    def api_endpoint(request):
        if not authenticate(request):
            return 401  # Only prevention, no detection/response/memory
        return process(request)
    # When auth is bypassed (and it will be): no detection, no response
    # No audit trail, no anomaly detection, no circuit breaker'
  when_applies: Security architecture, reliability engineering, API design, any system exposed to external traffic, incident response planning
  sources: ["https://cheatsheetseries.owasp.org/cheatsheets/Application_Security_Architecture_Cheat_Sheet.html"]
- id: COG-AR-005
  text: 'Analogical Reasoning: Know the limits of analogies — software has zero marginal cost of reproduction. Unlike physical engineering,
    software can be copied infinitely at zero cost, deployed globally in seconds, and updated without physical access. Analogies from
    physical engineering break down at these boundaries. Use analogies for structure, but respect software unique properties.'
  why: >
    The zero marginal cost of software reproduction means that patterns from physical engineering need adaptation. A bridge serves one
    location; software serves the world. A building cannot be updated after construction; software is updated continuously. A car has
    physical wear; software does not degrade from use (but does from neglect). Over-applying physical analogies leads to over-engineering:
    "safety factors" in software mean over-provisioning servers, but software can auto-scale in ways buildings cannot. The best software
    engineers use analogies as starting points and then reason about where software properties diverge.
  how_to_do_right: |
    1. When applying a physical engineering analogy, ask: "Where does this break down for software?"
    2. Three key software differences: zero marginal copy cost, instant global deployment, continuous updateability.
    3. Zero copy cost means: optimize for one, deploy to millions (invest in quality over quantity).
    4. Instant deployment means: ship small changes frequently (not big releases infrequently).
    5. Continuous updates mean: design for change (not for permanence like physical structures).
  severity: high
  technologies:
    lang: [python, javascript, java]
  domains:
    domain: [reasoning, architecture]
    concern: [meta_cognition]
  example_good: '# Leveraging zero marginal cost: invest heavily in quality once
    # Physical: Building 1000 bridges requires 1000x the materials
    # Software: Building 1 excellent library serves 1 million users
    # Decision: Spend 3x more time on core library quality
    # because it will be "copied" to every deployment at zero cost
    class PaymentProcessor:
        """Extensively tested, documented, and hardened — serves all products."""
        # 95% test coverage, property-based tests, fuzzing, formal review
        # Cost: 3 months. Serves: all 12 products. Zero marginal cost per product.'
  example_bad: '# Over-applying physical engineering analogy:
    # "In construction, we build separate foundations for each building"
    # In software: team builds 12 separate payment modules for 12 products
    # Each has its own bugs, its own tests, its own maintenance burden
    # Could have been ONE module serving all 12 at zero marginal cost'
  when_applies: Architecture decisions, build-vs-buy, code reuse strategy, platform engineering, any time applying an analogy from another discipline
  sources: ["https://martinfowler.com/articles/is-quality-worth-cost.html"]
