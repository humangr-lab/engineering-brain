layer: rules
technology: SRE
domain: capacity_planning
knowledge:
- id: CR-SRE-CAP-001
  text: Capacity planning must be based on measured demand, not estimated demand. "We think we'll need 10 servers" is a guess.
    "Our P99 latency exceeds SLO at 500 QPS, we currently serve 400 QPS, and traffic grows 5% monthly — we need headroom by
    March" is capacity planning.
  why: 'Google''s capacity planning (referenced across Chapters 18, 21, and 27) is grounded in measurement. The process: measure
    current demand (QPS, CPU, memory, bandwidth), measure current capacity (at what load does P99 latency exceed SLO?), project
    demand growth (historical growth rate + known launches), calculate when demand exceeds capacity (the "red line"), and
    provision before crossing the red line. Most teams skip measurement and guess — "let''s double the servers" — which either
    wastes money (overprovisioning) or doesn''t solve the bottleneck (the database was the limit, not the servers). Google''s
    rule: you can''t plan capacity for a resource you don''t measure.

    '
  how_to_do_right: '1. Measure current headroom: what''s the maximum load at which all SLOs are met? This is your ceiling.
    Load test to find it.

    2. Measure growth rate: average QPS this month vs last month vs 3 months ago. Use regression, not single-point comparison.

    3. Calculate time to red line: at current growth rate, when does projected demand exceed measured capacity?

    4. Plan provisioning: new capacity should be live 2 months before the red line (to account for procurement, setup, testing).

    5. Account for bursts: capacity must handle peak load (typically 2-5x average), not average load. Size for the peak.

    6. Re-measure quarterly: growth rates change, efficiency improvements free capacity, new features add demand.

    '
  example_good: "# Capacity planning based on measured demand\nimport statistics\n\ndef calculate_capacity_plan(current_qps: float, p99_limit_ms: float,\n                          monthly_growth_rates: list[float]) -> dict:\n    avg_growth = statistics.mean(monthly_growth_rates)\n    current_ceiling = measure_slo_ceiling(p99_limit_ms)  # load test result\n    months_to_redline = 0\n    projected = current_qps\n    while projected < current_ceiling:\n        projected *= (1 + avg_growth)\n        months_to_redline += 1\n    provision_by = months_to_redline - 2  # 2-month lead time\n    return {'ceiling_qps': current_ceiling, 'months_to_redline': months_to_redline,\n            'provision_by_month': provision_by, 'peak_multiplier': 3.0}\n"
  example_bad: "# Guessing capacity without measurement\ndef plan_capacity():\n    # \"We think we'll need 10 servers\"\n    num_servers = 10  # arbitrary guess\n    return num_servers\n\n# No measurement of current QPS, no SLO ceiling,\n# no growth rate calculation, no peak factor\n"
  when_applies: "When provisioning infrastructure for any service that handles user traffic or has SLO requirements."
  severity: high
  technologies:
    lang: [general]
    platform: [cloud, kubernetes]
  domains:
    domain: [performance, reliability, planning]
    concern: [capacity]
  sources:
  - url: https://sre.google/sre-book/software-engineering-in-sre/
    title: 'Google SRE Book — Chapter 18: Software Engineering in SRE'
  validation_status: cross_checked
- id: CR-SRE-CAP-002
  text: N+2 redundancy for critical services — you must survive losing 2 instances simultaneously while maintaining SLO. N+1
    is insufficient because during planned maintenance (1 instance down), an unplanned failure (another instance down) must
    not cause an outage.
  why: 'Google provisions N+2 for critical services because N+1 creates a fragile state during maintenance. With 3 instances
    handling 300 QPS (100 each) and N+1 redundancy: take 1 instance offline for maintenance → 2 instances handle 300 QPS (150
    each) → another instance fails → 1 instance handles 300 QPS → overloaded → SLO violated. With N+2: take 1 instance offline
    → 2 instances handle 300 QPS (150 each) → another instance fails → 1 instance needs to handle 300 QPS — still overloaded.
    So N+2 actually means: 5 instances for 300 QPS (60 each), lose 2 → 3 instances handle 300 QPS (100 each) → within capacity.
    The formula: provision so that (total - 2) instances can handle peak load.

    '
  how_to_do_right: '1. Critical services: provision so that (N - 2) instances handle 100% of peak traffic within SLO.

    2. Non-critical services: N+1 is acceptable if degraded performance during maintenance is tolerable.

    3. Calculate per-instance capacity: peak_traffic / (instances - 2). Each instance must handle this load.

    4. Distribute across failure domains: if all N+2 instances are on the same rack, a rack failure loses all of them.

    5. Verify with chaos testing: kill 2 instances and confirm SLOs are maintained.

    6. Include autoscaling headroom: if autoscaler takes 5 minutes to add capacity, you need enough headroom for 5 minutes
    of degraded state.

    '
  example_good: "# N+2 redundancy: (total - 2) instances handle peak\ndef calculate_n_plus_2(peak_qps: float, per_instance_capacity: float) -> int:\n    min_instances = int(peak_qps / per_instance_capacity)\n    n_plus_2 = min_instances + 2\n    return n_plus_2\n\n# Example: 300 QPS peak, 100 QPS per instance\n# min = 3 instances, N+2 = 5 instances\n# Lose 2 -> 3 instances handle 300 QPS (100 each) -> within SLO\nreplicas = calculate_n_plus_2(peak_qps=300, per_instance_capacity=100)\nprint(f'Deploy {replicas} replicas across different failure domains')\n"
  example_bad: "# N+1 redundancy — fragile during maintenance\nreplicas = 4  # 3 needed + 1 spare\n\n# During maintenance: take 1 down -> 3 handle load (ok)\n# Unplanned failure: another goes down -> 2 handle load\n# -> each instance at 150% capacity -> SLO violated\n# N+1 has zero margin for coincident failures\n"
  when_applies: "When determining replica count for any critical service that must maintain SLO during both planned maintenance and unplanned failures."
  severity: high
  technologies:
    lang: [general]
    platform: [cloud, kubernetes]
  domains:
    domain: [reliability, planning]
    concern: [availability, capacity]
  sources:
  - url: https://sre.google/sre-book/handling-overload/
    title: 'Google SRE Book — Chapter 21: Handling Overload'
  validation_status: cross_checked
- id: CR-SRE-CAP-003
  text: Load testing must happen in a production-like environment with production-like data. A load test against an empty
    database on a laptop proves nothing about production capacity. The only valid capacity measurement comes from realistic
    conditions.
  why: 'Google''s testing for reliability (Chapter 17) emphasizes that load tests are only valuable when they simulate production
    conditions. Common load testing failures: testing against an empty database (queries are fast because indexes fit in memory
    — production has 10TB of data), testing with uniform request patterns (production has hot spots — 10% of users generate
    90% of load), testing with a single client (no concurrency contention), testing without downstream dependencies (mocking
    everything removes the actual bottleneck). Google runs load tests against staging environments with production-scale data
    copies, production traffic patterns (replayed from logs), and real downstream dependencies (or representative stubs with
    realistic latency).

    '
  how_to_do_right: '1. Use production-scale data: copy production database (sanitized) to the load test environment. Not an
    empty database.

    2. Replay production traffic patterns: use access logs to generate realistic request distributions. Don''t use uniform
    random requests.

    3. Include concurrency: simulate hundreds/thousands of concurrent clients, not sequential requests.

    4. Test with real (or realistic) downstream services: if you mock the database, you''re testing the mock, not your system.

    5. Measure P50, P95, P99, and P99.9 latencies — not just average. Average hides tail latency problems.

    6. Run load tests regularly (weekly or on each deploy). A test from 6 months ago doesn''t reflect current code or data.

    '
  example_good: "# Load test with production-like conditions\nimport locust\n\nclass ProductionRealisticUser(locust.HttpUser):\n    wait_time = locust.between(0.5, 2.0)\n\n    # Replay production traffic distribution\n    @locust.task(70)  # 70% reads\n    def read_product(self):\n        product_id = self.weighted_random_product()  # hot-spot distribution\n        self.client.get(f'/api/products/{product_id}')\n\n    @locust.task(20)  # 20% searches\n    def search(self):\n        self.client.get('/api/search', params={'q': self.random_query()})\n\n    @locust.task(10)  # 10% writes\n    def place_order(self):\n        self.client.post('/api/orders', json=self.random_order())\n\n# Run against staging with production-scale data copy\n# locust -f loadtest.py --host=https://staging --users=1000\n"
  example_bad: "# Load test against empty DB on localhost\nimport requests\n\ndef load_test():\n    for i in range(100):\n        requests.get('http://localhost:8000/api/products/1')  # single product\n    print('Load test passed!')  # only tests one endpoint, no concurrency,\n    # no production data, no realistic distribution\n"
  when_applies: "When running load tests to determine production capacity or validate that a system can handle expected traffic."
  severity: high
  technologies:
    lang: [general]
    library: [quality, testing]
  domains:
    domain: [performance, reliability, planning, testing]
    concern: [capacity]
  sources:
  - url: https://sre.google/sre-book/testing-reliability/
    title: 'Google SRE Book — Chapter 17: Testing for Reliability'
  validation_status: cross_checked
- id: CR-SRE-CAP-004
  text: Little's Law governs queue capacity — the average number of items in a system equals the arrival rate times the average
    processing time. L = λW. If you process 100 requests/second and each takes 200ms, you need capacity for 20 concurrent
    requests. This is not a guideline — it is a mathematical law.
  why: 'Google''s capacity planning relies on queueing theory (Little''s Law, M/M/1 queues, and their variants) because systems
    at scale behave according to these mathematical models. Little''s Law (L = λW) is universal: it applies to HTTP request
    queues, database connection pools, Kafka consumer groups, and thread pools. Misunderstanding it causes over or under-provisioning.
    Example: if your service processes 1000 QPS with 50ms average latency, L = 1000 × 0.05 = 50 concurrent requests. Your
    thread pool needs at least 50 threads. If latency degrades to 200ms under load, L = 1000 × 0.2 = 200 concurrent requests
    — your 50-thread pool is now the bottleneck.

    '
  how_to_do_right: '1. Calculate steady-state concurrency: L = arrival_rate × average_processing_time. This is the minimum
    concurrent capacity needed.

    2. Add headroom: provision 2-3x the calculated concurrency to handle bursts and variance.

    3. When latency increases, concurrency increases (L = λW). This is why slow responses cause cascading failures — they
    consume all available connections/threads.

    4. Apply to thread pools: if 500 QPS × 100ms = 50 concurrent, set thread pool to at least 100 (2x for safety).

    5. Apply to connection pools: if database queries average 10ms at 1000 QPS, need 10 connections minimum. Set pool to 20-30.

    6. Monitor actual concurrency (in-flight requests) against capacity. When actual approaches capacity, you''re near saturation.

    '
  example_good: "# Apply Little's Law to size thread pool\ndef calculate_thread_pool(arrival_rate_qps: float, avg_latency_sec: float,\n                         safety_factor: float = 2.0) -> int:\n    # L = lambda * W\n    concurrent_requests = arrival_rate_qps * avg_latency_sec\n    pool_size = int(concurrent_requests * safety_factor)\n    return max(pool_size, 1)\n\n# Example: 500 QPS, 100ms avg latency\nthreads = calculate_thread_pool(500, 0.1)  # L=50, pool=100\nprint(f'Thread pool size: {threads}')  # 100 threads\n\n# Monitor: if latency degrades to 200ms under load\nthreads_degraded = calculate_thread_pool(500, 0.2)  # L=100, pool=200\nprint(f'Under degradation, need: {threads_degraded}')  # 200 threads\n"
  example_bad: "# Arbitrary thread pool / connection pool sizing\nimport concurrent.futures\n\n# \"Let's just use 10 threads\" — no calculation\nexecutor = concurrent.futures.ThreadPoolExecutor(max_workers=10)\n# If actual concurrency is 50, 40 requests queue up\n# Queuing increases latency, which increases concurrency (L=lambda*W)\n# Vicious cycle -> cascading failure\n"
  when_applies: "When sizing thread pools, connection pools, worker pools, or any resource pool that serves concurrent requests."
  severity: high
  technologies:
    lang: [general, go, java, python]
  domains:
    domain: [mathematics, performance, reliability, planning]
    concern: [queuing_theory, capacity]
  sources:
  - url: https://sre.google/sre-book/handling-overload/
    title: 'Google SRE Book — Chapter 21: Handling Overload'
  validation_status: cross_checked
- id: CR-SRE-CAP-005
  text: Thread pool and connection pool sizing must be calculated, not guessed. A connection pool of 100 when you need 10
    wastes resources. A pool of 10 when you need 100 causes queuing and timeouts. The calculation is straightforward — use
    it.
  why: 'Google''s approach to pool sizing is mathematical, not intuitive. Database connection pool formula: connections =
    (peak_QPS × avg_query_time) × safety_factor. For 500 QPS with 20ms average query time: 500 × 0.02 = 10 concurrent connections
    needed. With 2x safety factor: 20 connections. Setting the pool to 100 wastes database server memory (each connection
    costs ~10MB on PostgreSQL). Setting it to 5 causes queries to queue, increasing latency, which increases concurrency (Little''s
    Law), which causes more queuing — a vicious cycle. The same calculation applies to HTTP client pools, thread pools, and
    goroutine pools.

    '
  how_to_do_right: '1. Database connection pool: connections = (peak_QPS × avg_query_time_seconds) × 2. For PostgreSQL, never
    exceed max_connections / number_of_app_instances.

    2. HTTP client pool: connections = (outbound_QPS × avg_response_time_seconds) × 2. Per-host limit, not global.

    3. Thread pool: threads = (request_rate × avg_processing_time) × 2. For CPU-bound work: threads = num_CPUs × 2.

    4. Monitor pool utilization: if utilization is consistently < 20%, the pool is oversized. If utilization hits > 80%, the
    pool is undersized or the dependency is slow.

    5. Set pool timeout: max time to wait for an available connection. If exceeded, fail fast — don''t queue indefinitely.

    6. Different pools for different operations: separate read/write pools, separate fast/slow query pools. One slow query
    shouldn''t block all fast queries.

    '
  example_good: "# Calculated connection pool sizing\ndef calculate_db_pool(peak_qps: float, avg_query_ms: float,\n                      num_instances: int, safety_factor: float = 2.0) -> dict:\n    avg_query_sec = avg_query_ms / 1000.0\n    concurrent_per_instance = (peak_qps / num_instances) * avg_query_sec\n    pool_per_instance = int(concurrent_per_instance * safety_factor)\n    total_connections = pool_per_instance * num_instances\n    return {'pool_per_instance': max(pool_per_instance, 1),\n            'total_connections': total_connections}\n\n# 500 QPS, 20ms queries, 10 app instances\nresult = calculate_db_pool(500, 20, 10)\n# pool_per_instance=2, total=20 — not 100 per instance!\nprint(f'Set pool to {result[\"pool_per_instance\"]} per instance')\nprint(f'DB max_connections >= {result[\"total_connections\"] + 20}')  # +20 for admin/monitoring\n"
  example_bad: "# Arbitrary pool sizing — wastes resources or causes failures\nimport psycopg2.pool\n\n# \"Big number just in case\" — 100 per instance * 10 instances = 1000\npool = psycopg2.pool.ThreadedConnectionPool(\n    minconn=100,  # 100 idle connections wasting ~1GB RAM on PostgreSQL\n    maxconn=100,\n)\n# PostgreSQL default max_connections = 100 -> connection refused!\n"
  when_applies: "When configuring database connection pools, HTTP client pools, or thread pools for any application connecting to a shared resource."
  severity: high
  technologies:
    lang: [general, go, java, python]
    platform: [mysql, postgresql]
  domains:
    domain: [performance, reliability, planning]
    concern: [throughput, connection_pooling, capacity]
  sources:
  - url: https://sre.google/sre-book/handling-overload/
    title: 'Google SRE Book — Chapter 21: Handling Overload'
  validation_status: cross_checked
- id: CR-SRE-CAP-006
  text: Autoscaling cannot replace capacity planning — it can handle transient bursts but not sustained growth. If traffic
    doubles permanently, autoscaling buys you minutes while you provision real capacity. If you rely on autoscaling as your
    capacity plan, your cloud bill will surprise you.
  why: 'Google distinguishes between autoscaling (tactical, handles minutes-to-hours of variance) and capacity planning (strategic,
    handles weeks-to-months of growth). Autoscaling fails as a capacity strategy for several reasons: it has latency (pods
    take 30-60 seconds to start, VMs take 2-5 minutes), it has limits (cluster node limits, IP address limits, quota limits),
    it costs money at scale (running 3x instances during peak is 3x the cost), and it masks underlying issues (if you need
    10x capacity during peak, the architecture may be wrong). Google uses autoscaling for: daily traffic patterns (scale up
    during business hours, down at night), burst handling (Black Friday), and failure recovery (replace failed instances).
    They use capacity planning for: growth provisioning, new launches, and infrastructure procurement.

    '
  how_to_do_right: '1. Use autoscaling for: daily/weekly traffic patterns, unexpected bursts (< 2x baseline), and failure
    recovery.

    2. Use capacity planning for: sustained growth, new feature launches, and infrastructure budgeting.

    3. Set autoscaling min replicas based on capacity planning (not 1). Minimum = baseline traffic capacity.

    4. Set autoscaling max replicas based on budget + infrastructure limits. Alert when max is reached.

    5. Monitor autoscaling frequency: if scaling happens daily, the baseline is wrong. If scaling rarely happens, you may
    be overprovisioned.

    6. Test autoscaling: does it scale fast enough for your traffic patterns? If traffic spikes in 10 seconds and scaling
    takes 60 seconds, autoscaling doesn''t help.

    '
  example_good: "# Autoscaling + capacity planning combined\n# HPA configuration with capacity-planned minimums\napiVersion: autoscaling/v2\nkind: HorizontalPodAutoscaler\nmetadata:\n  name: api-server\nspec:\n  minReplicas: 5       # Capacity-planned baseline (not 1)\n  maxReplicas: 15      # Budget + infra limit\n  metrics:\n  - type: Resource\n    resource:\n      name: cpu\n      target:\n        type: Utilization\n        averageUtilization: 60  # Scale before saturation\n  behavior:\n    scaleUp:\n      stabilizationWindowSeconds: 60\n    scaleDown:\n      stabilizationWindowSeconds: 300  # Slow scale-down to avoid flapping\n"
  example_bad: "# Autoscaling as the only capacity plan\napiVersion: autoscaling/v2\nkind: HorizontalPodAutoscaler\nspec:\n  minReplicas: 1       # Scales to 1 at night -> cold start in the morning\n  maxReplicas: 1000    # No budget limit -> surprise cloud bill\n  metrics:\n  - type: Resource\n    resource:\n      name: cpu\n      target:\n        averageUtilization: 80  # Too late, already degraded\n# No capacity planning, no growth tracking, no budget controls\n"
  when_applies: "When configuring autoscaling for services and deciding the boundary between tactical autoscaling and strategic capacity planning."
  severity: high
  technologies:
    lang: [general]
    platform: [aws, gcp, kubernetes]
  domains:
    domain: [reliability, planning]
    concern: [capacity, autoscaling]
  sources:
  - url: https://sre.google/sre-book/handling-overload/
    title: 'Google SRE Book — Chapter 21: Handling Overload'
  validation_status: cross_checked
- id: CR-SRE-CAP-007
  text: Tail latency matters more than average latency — a service with 50ms average but 5-second P99 is unusable for 1% of
    users. At Google scale (billions of requests), 1% = millions of bad experiences. Design for P99, not P50.
  why: 'Google''s latency monitoring (Chapter 6) emphasizes percentiles over averages because averages hide the worst experiences.
    Consider: a service with 10ms P50 and 5000ms P99. Average latency is ~60ms — looks fine. But 1 in 100 requests takes 5
    seconds — unacceptable. Worse: in a microservice architecture with fan-out, tail latency compounds. If your request calls
    10 services in parallel and each has a 1% chance of being slow, your request has a ~10% chance of being slow (1 - 0.99^10
    ≈ 10%). Google calls this the "tail at scale" problem: even with individually good P99 numbers, the user-facing P99 degrades
    rapidly with service fan-out.

    '
  how_to_do_right: '1. Measure and alert on P50, P95, P99, and P99.9 — not just average. Each tells a different story.

    2. Set SLOs on P99 latency, not average: "99% of requests complete in < 200ms" is actionable. "Average latency < 100ms"
    is misleading.

    3. Investigate tail latency causes: garbage collection pauses, lock contention, slow database queries, network retries,
    cold caches.

    4. Hedged requests: for critical reads, send to 2 replicas and use the first response. Eliminates tail latency at the
    cost of 2x read traffic.

    5. Deadline-based processing: if a request has already exceeded its deadline, don''t process it — return an error immediately.
    Processing a stale request wastes capacity.

    6. Pre-warm caches and connections during deployment: cold starts contribute disproportionately to tail latency.

    '
  example_good: "# Monitor and alert on percentile latencies, not averages\nfrom prometheus_client import Histogram\n\nREQUEST_LATENCY = Histogram(\n    'http_request_duration_seconds',\n    'Request latency in seconds',\n    ['method', 'endpoint'],\n    buckets=[0.01, 0.025, 0.05, 0.1, 0.25, 0.5, 1.0, 2.5, 5.0, 10.0]\n)\n\n# SLO on P99, not average\n# Alert: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) > 0.2\n# \"99% of requests must complete in < 200ms\"\n\n# Hedged requests for critical reads\nasync def hedged_read(key: str, replicas: list[str]) -> bytes:\n    tasks = [fetch_from(r, key) for r in replicas[:2]]  # send to 2 replicas\n    done, pending = await asyncio.wait(tasks, return_when=asyncio.FIRST_COMPLETED)\n    for t in pending:\n        t.cancel()\n    return done.pop().result()\n"
  example_bad: "# Only monitoring average latency — hides tail problems\nimport time\n\nlatencies = []\ndef track_request(duration):\n    latencies.append(duration)\n\ndef report():\n    avg = sum(latencies) / len(latencies)\n    print(f'Average latency: {avg:.1f}ms')  # Shows 60ms — looks fine\n    # But P99 is 5000ms — 1% of users wait 5 seconds\n    # With 10-service fan-out: ~10% of user requests are slow\n"
  when_applies: "When setting SLOs, designing monitoring dashboards, or diagnosing performance problems in any service handling user requests."
  severity: high
  technologies:
    lang: [general]
    platform: [grafana, prometheus]
  domains:
    domain: [performance, reliability, planning]
    concern: [latency, capacity]
  sources:
  - url: https://sre.google/sre-book/monitoring-distributed-systems/
    title: 'Google SRE Book — Chapter 6: Monitoring Distributed Systems'
  validation_status: cross_checked
- id: CR-SRE-CAP-008
  text: Resource limits must account for memory fragmentation, GC overhead, and kernel overhead. A container with 1GB memory
    limit running a JVM with 1GB heap will be OOM-killed — the JVM needs memory for metaspace, thread stacks, native buffers,
    and GC overhead beyond the heap.
  why: 'Google''s container management (Borg, Kubernetes) tracks actual memory consumption, not just application-reported
    usage. Common miscalculation: "my app uses 512MB of heap, so I''ll set the container limit to 512MB." But the actual process
    memory includes: heap (512MB) + metaspace/permgen (64MB) + thread stacks (1MB × 200 threads = 200MB) + native buffers
    (50MB) + GC overhead (10-20% of heap) + shared libraries (50MB) = ~950MB. Setting the limit to 512MB causes OOM-kills.
    In Python: RSS includes the interpreter (30MB), imported libraries (50-200MB), and object overhead (2-3x the data size
    for dicts and lists). Setting memory limit = expected data size will OOM.

    '
  how_to_do_right: '1. Measure actual RSS (Resident Set Size) under production load, not heap usage or object size.

    2. For JVM: container memory = heap + metaspace + (thread_count × stack_size) + native_memory + 256MB buffer. Use -XX:MaxRAMPercentage=75
    to auto-size heap to 75% of container limit.

    3. For Python: container memory = 2x the expected peak data size + 200MB for interpreter/libraries.

    4. For Go: container memory = 1.5x peak goroutine memory (Go has lower overhead than JVM/Python).

    5. Monitor memory usage patterns: steady growth = memory leak, sawtooth = GC working normally, sudden spikes = burst allocations.

    6. Set memory request to average usage, memory limit to peak usage + 20% buffer. The gap allows burst without wasting
    reserved resources.

    '
  example_good: "# Account for all memory components in container limits\ndef calculate_container_memory_limit(heap_mb: int, thread_count: int,\n                                     stack_size_mb: float = 1.0) -> int:\n    heap = heap_mb\n    metaspace = 64  # JVM metaspace\n    thread_stacks = int(thread_count * stack_size_mb)\n    native_buffers = 50\n    gc_overhead = int(heap_mb * 0.15)  # 15% GC overhead\n    shared_libs = 50\n    buffer = 256  # safety buffer\n    total = heap + metaspace + thread_stacks + native_buffers + gc_overhead + shared_libs + buffer\n    return total\n\n# JVM container: heap=512, 200 threads\nlimit = calculate_container_memory_limit(512, 200)\nprint(f'Container memory limit: {limit}MB')  # ~1045MB, NOT 512MB\n# Use: -XX:MaxRAMPercentage=75 to auto-size heap to 75% of limit\n"
  example_bad: "# Setting container limit = heap size — guaranteed OOM kill\napiVersion: v1\nkind: Pod\nspec:\n  containers:\n  - name: app\n    resources:\n      limits:\n        memory: \"512Mi\"  # heap is 512MB, but JVM needs ~1GB total\n    env:\n    - name: JAVA_OPTS\n      value: \"-Xmx512m\"  # heap = container limit -> OOM kill\n# Missing: metaspace, thread stacks, native buffers, GC overhead\n"
  when_applies: "When setting memory limits for containers running JVM, Python, Go, or any runtime with overhead beyond the application's data structures."
  severity: high
  technologies:
    lang: [general, go, java, jvm, python]
    platform: [docker, kubernetes]
  domains:
    domain: [code_quality, reliability, planning]
    concern: [resource_management, capacity]
  sources:
  - url: https://sre.google/sre-book/handling-overload/
    title: 'Google SRE Book — Chapter 21: Handling Overload'
  validation_status: cross_checked
