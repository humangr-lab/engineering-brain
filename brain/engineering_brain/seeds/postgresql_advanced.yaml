- id: CR-PG-QRY-003
  text: In PostgreSQL 12+, CTEs (WITH queries) are inlined by default — use MATERIALIZED hint only when you need the optimization
    fence behavior.
  why: Before PostgreSQL 12, CTEs were always materialized — the planner could not push predicates into them, making them
    optimization fences. Many developers relied on this behavior to force execution order or prevent predicate pushdown. In
    PostgreSQL 12+, CTEs that are referenced once and have no side effects are automatically inlined (flattened into the main
    query). This is usually better (enables more optimization), but can change behavior if you depended on the fence. Incorrectly
    using MATERIALIZED when not needed prevents the planner from optimizing, while not using it when needed can cause repeated
    execution of expensive subqueries.
  how_to_do_right: 'Let PostgreSQL 12+ inline CTEs by default (no hint needed). Use MATERIALIZED when: (1) the CTE is referenced
    multiple times and is expensive, (2) you need to prevent the planner from pushing filters that would change results, (3)
    the CTE has side effects (data-modifying CTEs are always materialized). Use NOT MATERIALIZED to force inlining of CTEs
    referenced multiple times.'
  severity: medium
  technologies:
    platform: [postgresql]
  domains:
    domain: [architecture, performance]
    concern: [data, database]
  example_good: "-- PostgreSQL 12+: CTE is automatically inlined (good default)\nWITH active_users AS (\n  SELECT id, name\
    \ FROM users WHERE status = 'active'\n)\nSELECT * FROM active_users WHERE name LIKE 'A%';\n-- Planner pushes the LIKE\
    \ filter INTO the users scan\n-- Equivalent to: SELECT * FROM users WHERE status='active' AND name LIKE 'A%'\n\n-- Force\
    \ materialization for expensive CTE referenced multiple times\nWITH MATERIALIZED expensive_calc AS (\n  SELECT id, complex_function(data)\
    \ AS result\n  FROM big_table\n)\nSELECT a.id, a.result, b.id, b.result\nFROM expensive_calc a\nJOIN expensive_calc b\
    \ ON a.result = b.result AND a.id < b.id;\n-- Computed once, reused twice — without MATERIALIZED it runs twice\n"
  example_bad: "-- Forcing MATERIALIZED when not needed (prevents optimization)\nWITH MATERIALIZED active AS (\n  SELECT *\
    \ FROM users WHERE status = 'active'\n)\nSELECT * FROM active WHERE name LIKE 'A%';\n-- Planner CANNOT push 'name LIKE\
    \ A%' into users scan\n-- Materializes ALL active users, THEN filters by name\n-- If 1M active users but only 50 start\
    \ with 'A': 20000x more I/O\n\n-- Pre-PG12 pattern carried forward without understanding\nWITH stats AS (SELECT count(*)\
    \ FROM big_table)\nSELECT * FROM stats;\n-- In PG12+ this is automatically inlined — no change needed\n-- Adding MATERIALIZED\
    \ \"just in case\" prevents future optimizations\n"
  when_applies: Projects using PostgreSQL databases
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using PostgreSQL
  sources: ["https://www.postgresql.org/docs/current/queries-with.html"]
- id: CR-PG-QRY-004
  text: Use pg_stat_statements to identify your top slow queries by total time — optimize the queries consuming the most cumulative
    execution time, not just the single slowest query.
  why: A query that runs in 50ms but executes 10,000 times per minute consumes 500 seconds/minute of database time. A query
    that runs in 5 seconds but executes once per hour consumes 0.08 seconds/minute. pg_stat_statements aggregates total execution
    time, call count, and row counts across all queries. Without it, you are guessing which queries to optimize. Most performance
    improvements come from optimizing the top 5 queries by total_exec_time — which are often not the 'slowest' individual
    queries.
  how_to_do_right: 'Enable pg_stat_statements in postgresql.conf (shared_preload_libraries = ''pg_stat_statements''). Query
    the view sorted by total_exec_time DESC. Focus on queries where mean_exec_time * calls is highest. Reset statistics periodically:
    SELECT pg_stat_statements_reset(). Track query plans with pg_stat_statements.track = ''all'' in development. In production,
    set pg_stat_statements.max = 10000 to track enough unique queries.'
  severity: high
  technologies:
    platform: [postgresql]
  domains:
    domain: [architecture, performance, operations]
    concern: [data, database]
  example_good: "-- Enable pg_stat_statements\n-- postgresql.conf: shared_preload_libraries = 'pg_stat_statements'\n\nCREATE\
    \ EXTENSION IF NOT EXISTS pg_stat_statements;\n\n-- Top 10 queries by total execution time\nSELECT\n  round(total_exec_time::numeric,\
    \ 2) AS total_ms,\n  calls,\n  round(mean_exec_time::numeric, 2) AS avg_ms,\n  round((100 * total_exec_time /\n    sum(total_exec_time)\
    \ OVER ())::numeric, 2) AS pct_total,\n  left(query, 80) AS query\nFROM pg_stat_statements\nORDER BY total_exec_time DESC\n\
    LIMIT 10;\n\n-- total_ms   | calls  | avg_ms | pct_total | query\n-- 482031.24  | 891024 |  0.54  |    34.2   | SELECT\
    \ * FROM orders WHERE cust...\n-- 215018.72  |    127 | 1693.1 |    15.3   | SELECT count(*) FROM events WHE...\n-- The\
    \ first query (0.54ms avg) consumes 2.2x more time than the second (1.7s avg)\n"
  example_bad: '-- Optimizing by looking at slow query log only

    -- "Let me fix the 5-second query first!"

    -- That query runs once per hour = 5 seconds total

    -- Meanwhile, 0.5ms query running 1M/day = 500 seconds total


    -- Not having pg_stat_statements enabled

    -- Flying blind — no aggregate query statistics

    -- Relying on application-level timing (misses planning time, network overhead)

    '
  when_applies: Projects using PostgreSQL databases
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using PostgreSQL
  sources: ["https://www.postgresql.org/docs/current/functions-window.html"]
- id: CR-PG-CON-001
  text: Understand MVCC and choose the right transaction isolation level — use READ COMMITTED (default) for most workloads,
    REPEATABLE READ for consistent snapshots, and SERIALIZABLE only when correctness requires it.
  why: PostgreSQL implements MVCC (Multi-Version Concurrency Control) where each transaction sees a snapshot of the database.
    At READ COMMITTED, each statement sees the latest committed data — two SELECTs in the same transaction can return different
    results. REPEATABLE READ takes a snapshot at transaction start — consistent reads but serialization failures on write
    conflicts. SERIALIZABLE detects all anomalies but has the highest overhead (predicate locks, frequent serialization failures
    requiring retry). Choosing SERIALIZABLE without retry logic causes application crashes. Choosing READ COMMITTED for financial
    calculations causes race conditions.
  how_to_do_right: Use READ COMMITTED (default) for OLTP applications where each statement is independent. Use REPEATABLE
    READ for batch jobs, reports, and any operation needing a consistent snapshot. Use SERIALIZABLE for financial transactions,
    inventory management, and booking systems — but ALWAYS implement retry logic for serialization failures (SQLSTATE 40001).
    Use SELECT ... FOR UPDATE for row-level locking when you need to read-then-modify in READ COMMITTED.
  severity: critical
  technologies:
    platform: [postgresql]
  domains:
    domain: [architecture, performance, reliability]
    concern: [data, database, concurrency]
  example_good: "-- READ COMMITTED (default) with explicit row locking for read-modify-write\nBEGIN;\nSELECT balance FROM\
    \ accounts WHERE id = 123 FOR UPDATE;\n-- Row is now locked — other transactions wait\nUPDATE accounts SET balance = balance\
    \ - 100 WHERE id = 123;\nCOMMIT;\n\n-- SERIALIZABLE with retry logic\nimport psycopg2\n\ndef transfer_funds(from_id, to_id,\
    \ amount):\n    for attempt in range(3):\n        try:\n            with conn.cursor() as cur:\n                conn.set_isolation_level(\n\
    \                    psycopg2.extensions.ISOLATION_LEVEL_SERIALIZABLE\n                )\n                cur.execute(\"\
    UPDATE accounts SET balance = balance - %s WHERE id = %s\", (amount, from_id))\n                cur.execute(\"UPDATE accounts\
    \ SET balance = balance + %s WHERE id = %s\", (amount, to_id))\n                conn.commit()\n                return\
    \ True\n        except psycopg2.errors.SerializationFailure:\n            conn.rollback()\n            continue\n    raise\
    \ Exception(\"Transaction failed after 3 retries\")\n"
  example_bad: '-- SERIALIZABLE without retry logic — application crashes

    conn.set_isolation_level(ISOLATION_LEVEL_SERIALIZABLE)

    cur.execute("UPDATE accounts SET balance = balance - 100 WHERE id = 123")

    conn.commit()  # SerializationFailure → unhandled → 500 error


    -- READ COMMITTED race condition (TOCTOU)

    BEGIN;

    SELECT balance FROM accounts WHERE id = 123;  -- returns 500

    -- Another transaction commits: balance is now 0

    UPDATE accounts SET balance = balance - 100 WHERE id = 123;

    -- Balance is now -100! No FOR UPDATE lock, no isolation

    COMMIT;

    '
  when_applies: Any project using PostgreSQL databases
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using PostgreSQL
  sources: ["https://www.postgresql.org/docs/current/transaction-iso.html"]
- id: CR-PG-CON-002
  text: Use PgBouncer in transaction pooling mode for high-concurrency applications — PostgreSQL's per-connection process
    model does not scale past a few hundred connections.
  why: Each PostgreSQL connection spawns a dedicated backend process consuming 5-10MB of RAM. 500 connections = 2.5-5GB just
    for connection overhead. Beyond 200-300 connections, context switching between processes degrades performance severely
    — CPU spends more time switching than executing queries. PgBouncer multiplexes thousands of application connections onto
    a small pool (20-50) of actual PostgreSQL connections. In transaction mode, connections are returned to the pool after
    each transaction, maximizing utilization. Without pooling, microservices with 50 instances x 10 connections each = 500
    connections that idle 90% of the time.
  how_to_do_right: Deploy PgBouncer between your application and PostgreSQL. Use transaction pooling mode (pool_mode = transaction)
    for most applications. Set default_pool_size to 2x your CPU cores (e.g., 16 for 8 cores). Set max_client_conn to handle
    your peak (e.g., 1000). Do NOT use session-mode features (LISTEN/NOTIFY, prepared statements, session variables) in transaction
    mode — they require session pooling. Monitor with SHOW POOLS and SHOW STATS.
  severity: high
  technologies:
    library: [pgbouncer]
    platform: [postgresql]
  domains:
    domain: [architecture, performance, operations]
    concern: [data, database, scalability]
  example_good: '# pgbouncer.ini — transaction pooling mode

    [databases]

    mydb = host=localhost port=5432 dbname=mydb


    [pgbouncer]

    pool_mode = transaction          # Return connection after each transaction

    default_pool_size = 20           # 20 real PG connections per database

    max_client_conn = 1000           # Accept up to 1000 app connections

    reserve_pool_size = 5            # Emergency overflow

    reserve_pool_timeout = 3         # Seconds before using overflow

    server_idle_timeout = 300        # Close idle server connections after 5min

    log_connections = 0              # Reduce log noise

    log_disconnections = 0


    # Application connects to PgBouncer (port 6432), NOT PostgreSQL (5432)

    # DATABASE_URL=postgresql://user:pass@localhost:6432/mydb


    # Result: 500 app connections share 20 PG connections

    # RAM: 5GB → 200MB for connection overhead

    # Latency: Reduced context switching → 2x throughput

    '
  example_bad: '# Direct connections — no pooling

    # 50 microservice instances x 10 connections each = 500 PG processes

    # RAM: 500 * 10MB = 5GB just for connection overhead

    # CPU: constant context switching between 500 processes


    # Wrong: session pooling mode with microservices

    pool_mode = session

    # Connections are held for the entire session (connection lifetime)

    # Microservices with connection pools hold connections idle

    # 500 sessions × 95% idle = 475 wasted PG connections


    # Wrong: pool size too large — negates the benefit

    default_pool_size = 200

    # Still 200 PG backend processes — same context switching problem

    '
  when_applies: Projects using PostgreSQL databases or PgBouncer
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using PostgreSQL
    or PgBouncer
  sources: ["https://www.pgbouncer.org/config.html"]
- id: CR-PG-PART-001
  text: Use range partitioning for time-series data — partition by month or week so the query planner can skip irrelevant
    partitions (partition pruning) and maintenance operations (VACUUM, REINDEX) target individual partitions.
  why: A single 10-billion-row table means every VACUUM, REINDEX, and backup operates on the entire table — hours of I/O.
    Range-partitioned by month, each partition has ~800M rows. Dropping old data is instant (DROP partition) instead of DELETE
    + VACUUM (which creates dead tuples and bloat). Queries filtering by date automatically skip irrelevant partitions — a
    query for 'last 7 days' only scans the current partition instead of all 10 billion rows. Indexes are per-partition, so
    they stay small and fast.
  how_to_do_right: 'Create the parent table with PARTITION BY RANGE. Create partitions for each time period. Automate partition
    creation (pg_partman extension or cron job). Set partition boundaries to align with your most common query patterns. Ensure
    every query includes the partition key in WHERE so the planner can prune. Monitor with EXPLAIN to verify ''Partitions:
    pruned'' appears.'
  severity: high
  technologies:
    platform: [postgresql]
  domains:
    domain: [architecture, performance]
    concern: [data, database, time_series]
  example_good: "-- Range partitioning by month\nCREATE TABLE events (\n  id bigserial,\n  event_type text NOT NULL,\n  payload\
    \ jsonb,\n  created_at timestamptz NOT NULL DEFAULT now()\n) PARTITION BY RANGE (created_at);\n\n-- Create monthly partitions\n\
    CREATE TABLE events_2026_01 PARTITION OF events\n  FOR VALUES FROM ('2026-01-01') TO ('2026-02-01');\nCREATE TABLE events_2026_02\
    \ PARTITION OF events\n  FOR VALUES FROM ('2026-02-01') TO ('2026-03-01');\n\n-- Automate with pg_partman\nSELECT partman.create_parent('public.events',\
    \ 'created_at', 'native', 'monthly');\n\n-- Query with partition pruning\nEXPLAIN ANALYZE\nSELECT * FROM events WHERE\
    \ created_at >= '2026-02-01' AND created_at < '2026-02-15';\n-- Scans ONLY events_2026_02, skips all other partitions\n\
    \n-- Drop old data instantly (no VACUUM needed)\nDROP TABLE events_2025_01;  -- Instant, no dead tuples\n"
  example_bad: '-- Single monolithic table with 10 billion rows

    CREATE TABLE events (id bigserial, created_at timestamptz, payload jsonb);


    -- Deleting old data: creates dead tuples + index bloat

    DELETE FROM events WHERE created_at < ''2025-01-01'';

    -- Deleted 3 billion rows — now must VACUUM (hours of I/O)

    -- Table file is still 800GB until VACUUM FULL (locks table)


    -- Query without partition key — scans ALL partitions

    SELECT * FROM events WHERE event_type = ''login'';

    -- No partition pruning — scans all 12+ partitions

    '
  when_applies: Projects using PostgreSQL databases
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using PostgreSQL
  sources: ["https://www.postgresql.org/docs/current/ddl-partitioning.html"]
- id: CR-PG-JSON-001
  text: Use JSONB (not JSON) for structured data that needs indexing and querying — use it for flexible schema attributes
    within a relational model, not as a replacement for proper columns.
  why: 'JSONB stores data in decomposed binary format enabling fast access, indexing (GIN), and in-place updates. JSON stores
    raw text — every query must reparse the entire document. JSONB supports containment (@>), existence (?), and path queries,
    all indexable with GIN. However, JSONB should complement relational columns, not replace them. Storing everything in JSONB
    negates PostgreSQL''s type safety, constraints, foreign keys, and join optimization. The sweet spot: core data in typed
    columns, flexible/sparse attributes in JSONB.'
  how_to_do_right: Store fixed, frequently queried fields as regular columns. Store variable, sparse, or schema-evolving fields
    in a JSONB column. Add GIN index on the JSONB column for containment queries. Use jsonb_path_query for complex path expressions
    (SQL/JSON standard). Validate structure with CHECK constraints or JSON Schema (pg_jsonschema extension). Never store data
    in JSONB that you need to JOIN on — extract it to a proper column.
  severity: high
  technologies:
    platform: [postgresql]
  domains:
    domain: [architecture]
    concern: [data, database, schema_design]
  example_good: "-- Relational core + JSONB for flexible attributes\nCREATE TABLE products (\n  id serial PRIMARY KEY,\n \
    \ name text NOT NULL,\n  category text NOT NULL,        -- Fixed, queryable, JOINable\n  price numeric(10,2) NOT NULL,\
    \   -- Fixed, typed, constrained\n  attributes jsonb DEFAULT '{}',  -- Flexible: color, size, material, etc.\n  CHECK\
    \ (attributes IS NOT NULL)\n);\n\n-- GIN index for containment queries on attributes\nCREATE INDEX idx_products_attrs\
    \ ON products USING GIN (attributes);\n\n-- Find red products with size large\nSELECT * FROM products\nWHERE attributes\
    \ @> '{\"color\": \"red\", \"size\": \"large\"}';\n\n-- SQL/JSON path queries (PostgreSQL 12+)\nSELECT * FROM products\n\
    WHERE jsonb_path_exists(attributes, '$.ratings[*] ? (@ > 4)');\n\n-- Partial update without rewriting entire document\n\
    UPDATE products\nSET attributes = jsonb_set(attributes, '{color}', '\"blue\"')\nWHERE id = 42;\n"
  example_bad: "-- Everything in JSONB — loses all relational benefits\nCREATE TABLE products (\n  id serial PRIMARY KEY,\n\
    \  data jsonb  -- name, price, category ALL inside JSON\n);\n\n-- Cannot enforce NOT NULL on data->>'name'\n-- Cannot\
    \ add FOREIGN KEY on data->>'category_id'\n-- Cannot efficiently JOIN on data->>'supplier_id'\n-- No type safety: price\
    \ could be \"abc\"\n\n-- Using JSON (text) instead of JSONB (binary)\nCREATE TABLE products (data json);  -- Stores raw\
    \ text\n-- Every query reparses the entire JSON document\n-- Cannot create GIN index\n-- Cannot use @> containment operator\n"
  when_applies: Projects using PostgreSQL databases
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using PostgreSQL
  sources: ["https://www.postgresql.org/docs/current/datatype-json.html"]
- id: CR-PG-LOCK-001
  text: >
    Use SELECT FOR UPDATE NOWAIT or SKIP LOCKED for optimistic concurrency control —
    never hold locks across multiple HTTP requests. NOWAIT fails immediately if the row
    is locked; SKIP LOCKED finds the next available row. Choose based on whether you
    can retry or need any unlocked row.
  why: >
    SELECT FOR UPDATE without NOWAIT blocks indefinitely, starving other transactions
    and causing connection pool exhaustion under load. In a financial system processing
    1000 concurrent orders, a single slow lock holder causes a cascade of waiting
    transactions that exhausts the pool in seconds. NOWAIT converts blocking waits into
    immediate errors (retry logic handles these). SKIP LOCKED is ideal for job queues
    and task processing — each worker picks any available task without competing with
    other workers. PostgreSQL recommends this pattern explicitly in the advisory lock
    documentation.
  how_to_do_right: |
    1. For optimistic locking on a specific row: SELECT FOR UPDATE NOWAIT
       Catch lock_not_available (55P03) and retry with exponential backoff
    2. For job queue / task processing: SELECT FOR UPDATE SKIP LOCKED LIMIT 1
       No retry needed — simply gets the next available task
    3. Always use within a transaction (BEGIN/COMMIT)
    4. Set lock_timeout at session level as a safety net:
       SET LOCAL lock_timeout = '5s';
    5. For financial ledgers: use NOWAIT on account rows to detect concurrent writes
    6. Monitor pg_locks and pg_stat_activity for lock contention
  severity: critical
  technologies:
    platform: [postgresql]
    lang: [python]
    library: [sqlalchemy, asyncpg, psycopg2]
  domains:
    domain: [architecture, performance]
    concern: [concurrency, database, locking]
  example_good: |
    -- Job queue: SKIP LOCKED — each worker gets a different task
    BEGIN;
    SELECT id, payload FROM job_queue
    WHERE status = 'pending'
    ORDER BY created_at
    LIMIT 1
    FOR UPDATE SKIP LOCKED;  -- Returns immediately with any available row
    -- Process task...
    UPDATE job_queue SET status = 'done' WHERE id = $1;
    COMMIT;

    -- Financial account update: NOWAIT — fail fast on contention
    -- Python/SQLAlchemy:
    async def debit_account(conn, account_id: int, amount: Decimal):
        async with conn.transaction():
            try:
                row = await conn.fetchrow(
                    "SELECT balance FROM accounts WHERE id = $1 FOR UPDATE NOWAIT",
                    account_id
                )
            except asyncpg.exceptions.LockNotAvailableError:
                raise RetryableError("Account locked, retry")
            if row['balance'] < amount:
                raise ValueError("Insufficient funds")
            await conn.execute(
                "UPDATE accounts SET balance = balance - $1 WHERE id = $2",
                amount, account_id
            )
  example_bad: |
    -- Blocking FOR UPDATE — starves other transactions
    BEGIN;
    SELECT balance FROM accounts WHERE id = $1 FOR UPDATE;
    -- If another transaction holds this lock, we wait indefinitely
    -- 1000 concurrent requests → 999 pile up → connection pool exhausted
    -- System appears hung, logs show "waiting for lock"
    UPDATE accounts SET balance = balance - $1 WHERE id = $2;
    COMMIT;
  when_applies: Projects using PostgreSQL with concurrent writes or job processing
  when_not_applies: read-only analytics queries, single-writer systems, batch jobs with no concurrency
  sources:
    - "https://www.postgresql.org/docs/current/sql-select.html#SQL-FOR-UPDATE-SHARE"
    - "https://www.postgresql.org/docs/current/explicit-locking.html"
- id: CR-PG-LOCK-002
  text: >
    Use PostgreSQL advisory locks for distributed coordination — pg_try_advisory_lock
    for non-blocking and pg_advisory_xact_lock for transaction-scoped mutual exclusion.
    This replaces Redis-based distributed locks when PostgreSQL is already in your stack.
  why: >
    Distributed systems need mutual exclusion for singleton operations: running a
    scheduled job on exactly one node, processing a payment exactly once, or initializing
    a resource. Advisory locks are stored in memory (not in tables), have no lock table
    overhead, are released automatically on connection close (session locks) or commit
    (transaction locks), and require no external dependency. Using Redis for distributed
    locks when PostgreSQL is available adds operational complexity and a split-brain
    failure mode. Advisory locks are ACID-compliant and consistent with other
    PostgreSQL transactions.
  how_to_do_right: |
    1. Choose the right type:
       - pg_advisory_lock(key): session-scoped, blocks until acquired, released on disconnect
       - pg_try_advisory_lock(key): session-scoped, returns bool immediately (no block)
       - pg_advisory_xact_lock(key): transaction-scoped, auto-released on commit/rollback
    2. Use a consistent key scheme: hash(job_name) → bigint
    3. For scheduled jobs: pg_try_advisory_lock — if False, another node is running it
    4. Always use xact locks inside explicit transactions (auto-release prevents deadlocks)
    5. Document all advisory lock keys in a central registry to avoid collisions
  severity: high
  technologies:
    platform: [postgresql]
    lang: [python]
    library: [sqlalchemy, asyncpg, psycopg2]
  domains:
    domain: [architecture]
    concern: [distributed_systems, locking, coordination]
  example_good: |
    import hashlib
    import asyncpg

    def lock_key(name: str) -> int:
        """Convert lock name to consistent bigint key."""
        return int(hashlib.md5(name.encode()).hexdigest()[:16], 16) % (2**63)

    async def run_scheduled_job(conn: asyncpg.Connection, job_name: str):
        """Ensure only one node runs this job at a time."""
        key = lock_key(job_name)
        acquired = await conn.fetchval(
            "SELECT pg_try_advisory_lock($1)", key
        )
        if not acquired:
            print(f"Another node is running {job_name}, skipping")
            return

        try:
            await execute_job(job_name)
        finally:
            await conn.execute("SELECT pg_advisory_unlock($1)", key)

    # Transaction-scoped (auto-released): ideal for payment processing
    async def process_payment(conn, payment_id: int):
        async with conn.transaction():
            key = lock_key(f"payment:{payment_id}")
            await conn.execute("SELECT pg_advisory_xact_lock($1)", key)
            # Lock auto-released when transaction commits/rolls back
            await create_payment_record(conn, payment_id)
  example_bad: |
    # Using Redis for distributed lock when PostgreSQL is already present
    import redis
    r = redis.Redis()

    def run_job():
        lock = r.set("job:daily_report", "locked", ex=300, nx=True)
        if not lock:
            return  # Another node has it
        # Problem: Redis lock and PostgreSQL transaction are in different systems
        # Network partition between Redis and PG → inconsistent state
        # PostgreSQL advisory locks are ACID-consistent with your transactions
  when_applies: Distributed systems with multiple nodes and PostgreSQL as the primary database
  when_not_applies: single-node deployments, systems already committed to Redis distributed locks
  sources:
    - "https://www.postgresql.org/docs/current/functions-admin.html#FUNCTIONS-ADVISORY-LOCKS"
    - "https://vladmihalcea.com/how-do-postgresql-advisory-locks-work/"
- id: CR-PG-DEADLOCK-001
  text: >
    Prevent deadlocks by always acquiring locks in a consistent total order across
    all transactions — and detect them early with a short deadlock_timeout (200ms).
    Most deadlocks are caused by two transactions locking the same rows in different
    order.
  why: >
    PostgreSQL detects deadlocks by waiting deadlock_timeout (default 1000ms) and then
    checking the wait graph. At 1000ms, a deadlocked transaction ties up a connection
    for 1 second before aborting. With deadlock_timeout=200ms, detection is 5x faster.
    The root cause of 95% of deadlocks is lock ordering: Transaction A locks row 1 then
    row 2; Transaction B locks row 2 then row 1. Solution: always lock row 1 then row 2
    (sort by primary key). In financial systems, multi-leg transfers (A→B and B→A
    simultaneously) are the canonical deadlock scenario.
  how_to_do_right: |
    1. Set deadlock_timeout = '200ms' in postgresql.conf (detect faster)
    2. Lock rows in consistent total order: always sort by id/primary key before locking
    3. For transfers: lock accounts in ascending id order regardless of direction
    4. Keep transactions short: acquire locks, do work, commit/rollback — no I/O or waits
    5. Catch DeadlockDetected (40P01) and retry with jitter:
       max 3 retries, base 100ms, jitter uniform(0, 100ms)
    6. Monitor: SELECT * FROM pg_stat_activity WHERE wait_event_type = 'Lock'
    7. Log deadlocks: log_lock_waits = on, deadlock_timeout = 200ms in postgresql.conf
  severity: critical
  technologies:
    platform: [postgresql]
    lang: [python]
    library: [sqlalchemy, asyncpg, psycopg2]
  domains:
    domain: [architecture, performance]
    concern: [concurrency, database, deadlock]
  example_good: |
    import asyncpg
    import asyncio
    import random

    async def transfer(conn, from_id: int, to_id: int, amount: Decimal):
        """Transfer between accounts — always lock in ascending order."""
        # Sort to prevent deadlock: always acquire lower-id lock first
        first_id, second_id = sorted([from_id, to_id])

        async with conn.transaction():
            # Lock both accounts in consistent order
            await conn.execute(
                "SELECT id FROM accounts WHERE id IN ($1, $2) ORDER BY id FOR UPDATE NOWAIT",
                first_id, second_id
            )
            # Now safely update both
            await conn.execute(
                "UPDATE accounts SET balance = balance - $1 WHERE id = $2",
                amount, from_id
            )
            await conn.execute(
                "UPDATE accounts SET balance = balance + $1 WHERE id = $2",
                amount, to_id
            )

    async def transfer_with_retry(pool, from_id, to_id, amount, max_retries=3):
        for attempt in range(max_retries):
            try:
                async with pool.acquire() as conn:
                    await transfer(conn, from_id, to_id, amount)
                    return
            except asyncpg.exceptions.DeadlockDetectedError:
                if attempt == max_retries - 1:
                    raise
                await asyncio.sleep(0.1 + random.uniform(0, 0.1))
  example_bad: |
    async def transfer(conn, from_id: int, to_id: int, amount: Decimal):
        async with conn.transaction():
            # Locks in request order — deadlock when concurrent reverse transfers
            await conn.execute(
                "SELECT id FROM accounts WHERE id = $1 FOR UPDATE", from_id
            )
            await conn.execute(
                "SELECT id FROM accounts WHERE id = $1 FOR UPDATE", to_id
            )
            # Transaction A: locks 1, waits for 2
            # Transaction B: locks 2, waits for 1
            # → DEADLOCK (detected after 1000ms default timeout)
  when_applies: Any PostgreSQL system with concurrent writes on multiple rows
  when_not_applies: read-only analytics systems, single-writer systems
  sources:
    - "https://www.postgresql.org/docs/current/explicit-locking.html#LOCKING-DEADLOCKS"
    - "https://www.postgresql.org/docs/current/runtime-config-locks.html"
- id: CR-PG-PARTITION-001
  text: >
    Use range partitioning by time for time-series tables that grow unboundedly —
    partition by month or quarter, maintain a rolling window of hot partitions, and
    detach or drop old partitions instead of deleting rows. This enables instant
    historical data removal without expensive DELETE operations.
  why: >
    Time-series tables (events, logs, trades, metrics) grow indefinitely and become
    slow as they scale. DELETE on a 500M-row table takes hours and bloats WAL. Range
    partitioning by date creates separate physical files per time period. Dropping an
    old partition is O(1) (a metadata operation) regardless of row count. Query planner
    prunes irrelevant partitions automatically, making date-filtered queries 10-100x
    faster. Timescale's benchmark shows partitioned time-series queries 20x faster at
    1B rows vs unpartitioned. Partition pruning requires the partition key in WHERE.
  how_to_do_right: |
    1. CREATE TABLE parent PARTITION BY RANGE (created_at)
    2. Create partitions for current + next 2 months:
       CREATE TABLE t_2026_01 PARTITION OF parent
       FOR VALUES FROM ('2026-01-01') TO ('2026-02-01');
    3. Automate future partition creation (run weekly):
       CREATE TABLE t_<next_month> PARTITION OF parent ...
    4. Attach existing data partitions with ATTACH PARTITION (no data copy)
    5. Detach old partitions: ALTER TABLE parent DETACH PARTITION t_old;
       Then DROP TABLE t_old; (instant, even for billions of rows)
    6. Create indexes ON ONLY the parent — they propagate to new partitions
    7. Set constraint_exclusion = partition in postgresql.conf for pruning
  severity: high
  technologies:
    platform: [postgresql]
    lang: [python]
    library: [sqlalchemy, alembic]
  domains:
    domain: [architecture, performance]
    concern: [data, database, partitioning, time_series]
  example_good: |
    -- Create partitioned table
    CREATE TABLE trade_events (
        id          bigserial,
        market_id   int NOT NULL,
        event_type  text NOT NULL,
        amount      numeric(20, 8),
        created_at  timestamptz NOT NULL DEFAULT now()
    ) PARTITION BY RANGE (created_at);

    -- Create monthly partitions (automate this)
    CREATE TABLE trade_events_2026_01 PARTITION OF trade_events
        FOR VALUES FROM ('2026-01-01') TO ('2026-02-01');
    CREATE TABLE trade_events_2026_02 PARTITION OF trade_events
        FOR VALUES FROM ('2026-02-01') TO ('2026-03-01');

    -- Shared index propagates to all partitions
    CREATE INDEX ON ONLY trade_events (market_id, created_at DESC);

    -- Query uses only 2026-01 partition (planner prunes rest)
    SELECT * FROM trade_events
    WHERE market_id = 42
      AND created_at BETWEEN '2026-01-01' AND '2026-01-31';

    -- Drop last year's data: instant (no row-by-row DELETE)
    ALTER TABLE trade_events DETACH PARTITION trade_events_2025_01;
    DROP TABLE trade_events_2025_01;  -- Instant regardless of row count
  example_bad: |
    -- Unpartitioned table with periodic DELETE — scales poorly
    CREATE TABLE trade_events (
        id          bigserial PRIMARY KEY,
        market_id   int NOT NULL,
        created_at  timestamptz NOT NULL DEFAULT now()
    );

    -- Retention cleanup: runs for HOURS on large tables
    DELETE FROM trade_events WHERE created_at < NOW() - INTERVAL '1 year';
    -- Generates massive WAL, blocks autovacuum, causes replication lag
    -- Query at 1B rows: sequential scan or index scan over 12 months of data
  when_applies: Tables growing by more than 1M rows/month or requiring time-based retention
  when_not_applies: small reference tables, tables with no time dimension or non-date partitioning keys
  sources:
    - "https://www.postgresql.org/docs/current/ddl-partitioning.html"
    - "https://www.crunchydata.com/blog/a-look-at-postgres-15-merge-command-with-examples"
- id: CR-PG-MERGE-001
  text: >
    Use PostgreSQL 15+ MERGE for upsert-with-conditional-logic — it handles INSERT,
    UPDATE, and DELETE in a single atomic statement, replacing complex UPSERT patterns
    that require multiple round trips or INSERT ON CONFLICT workarounds.
  why: >
    Before PostgreSQL 15, upsert required INSERT ... ON CONFLICT (limited to constraint
    matching) or a CTE with UPDATE + INSERT (two statements, race condition window).
    MERGE matches source rows to target rows on a join condition, then applies different
    actions per match status: WHEN MATCHED → UPDATE or DELETE, WHEN NOT MATCHED →
    INSERT. This is the SQL standard (ISO/IEC 9075). A single MERGE replaces a
    SELECT-then-INSERT/UPDATE pattern that requires 2 round trips and has a race
    condition between the SELECT and INSERT in concurrent workloads.
  how_to_do_right: |
    1. Requires PostgreSQL 15+. Check: SELECT version();
    2. Structure: MERGE INTO target USING source ON join_condition
       WHEN MATCHED [AND condition] THEN UPDATE/DELETE
       WHEN NOT MATCHED [AND condition] THEN INSERT
    3. Use for ETL/sync: merging external data into a target table
    4. Use for slowly changing dimensions: update price, insert new products
    5. The source can be a VALUES() list, subquery, or CTE
    6. MERGE is fully transactional — all matched rows updated atomically
  severity: medium
  technologies:
    platform: [postgresql]
    lang: [python, sql]
    library: [sqlalchemy, asyncpg]
  domains:
    domain: [architecture, performance]
    concern: [data, database, upsert]
  example_good: |
    -- PostgreSQL 15+ MERGE: sync market prices from external feed
    MERGE INTO market_prices AS target
    USING (
        VALUES
            ('BTC-USD', 65000.00, NOW()),
            ('ETH-USD', 3200.00, NOW()),
            ('SOL-USD', 180.00, NOW())
    ) AS source (market, price, updated_at)
    ON target.market = source.market
    WHEN MATCHED THEN
        UPDATE SET
            price = source.price,
            updated_at = source.updated_at,
            update_count = target.update_count + 1
    WHEN NOT MATCHED THEN
        INSERT (market, price, updated_at, update_count)
        VALUES (source.market, source.price, source.updated_at, 1);
    -- Single round trip, atomic, handles both new and existing markets
  example_bad: |
    -- Pre-PG15 upsert: 2 statements, race condition window
    async def upsert_price(conn, market: str, price: Decimal):
        existing = await conn.fetchrow(
            "SELECT id FROM market_prices WHERE market = $1", market
        )
        if existing:
            await conn.execute(
                "UPDATE market_prices SET price = $1 WHERE market = $2",
                price, market
            )
        else:
            # Race condition: another process may INSERT between our SELECT and INSERT
            await conn.execute(
                "INSERT INTO market_prices (market, price) VALUES ($1, $2)",
                market, price
            )  # UniqueViolationError possible under concurrency
  when_applies: Projects using PostgreSQL 15+ that need upsert or conditional sync operations
  when_not_applies: PostgreSQL < 15 (use INSERT ON CONFLICT instead), non-PostgreSQL databases
  sources:
    - "https://www.postgresql.org/docs/15/sql-merge.html"
    - "https://www.crunchydata.com/blog/a-look-at-postgres-15-merge-command-with-examples"
- id: CR-PG-POOL-001
  text: >
    Configure PgBouncer with transaction-mode pooling for stateless API workloads —
    set pool_size = (max_pg_connections * 0.8) / app_instances, server_lifetime =
    3600, and server_idle_timeout = 600. Never use session-mode for high-concurrency
    APIs; it provides no benefit over direct connections.
  why: >
    Without connection pooling, each API server process holds a PostgreSQL connection
    open. At 100 app processes × 10 connections each = 1000 PostgreSQL backend
    processes, each consuming 5-10MB RAM. PostgreSQL's max_connections default is 100
    — this exhausts it immediately. PgBouncer transaction-mode pools connections at the
    PostgreSQL level: 1000 application "connections" → 100 actual PostgreSQL connections.
    Misconfigured PgBouncer (session mode, wrong pool sizes) provides no benefit or
    breaks prepared statements. Heroku found transaction-mode PgBouncer reduced
    connection counts by 20x at the same throughput.
  how_to_do_right: |
    1. Choose pool_mode = transaction for stateless APIs (most common)
       Exception: use session mode if your app uses SET/RESET, advisory locks per session,
       or LISTEN/NOTIFY (these require session affinity)
    2. Calculate pool_size: target max_connections = 100 (PG default)
       pool_size = 80 / num_pgbouncer_instances (leave 20% for admin connections)
    3. Set server_lifetime = 3600 (recycle connections hourly — prevents stale state)
    4. Set server_idle_timeout = 600 (close idle backend connections after 10 min)
    5. Set client_idle_timeout = 0 (let app handle timeouts, not PgBouncer)
    6. Disable prepared statements in app when using transaction mode:
       SQLAlchemy: pool_pre_ping=True, execution_options={"no_parameters": True}
    7. Monitor: pgbouncer SHOW POOLS; — check cl_waiting > 0 (clients waiting for conn)
  severity: critical
  technologies:
    platform: [postgresql, pgbouncer]
    lang: [python]
    library: [sqlalchemy, asyncpg, psycopg2]
  domains:
    domain: [architecture, performance]
    concern: [database, connection_pooling, scalability]
  example_good: |
    # pgbouncer.ini — transaction mode for stateless API
    [databases]
    veritas_db = host=postgres port=5432 dbname=veritas

    [pgbouncer]
    pool_mode = transaction        # Each transaction gets a connection
    max_client_conn = 1000         # Total client connections allowed
    default_pool_size = 20         # Actual PostgreSQL connections per DB/user pair
    server_lifetime = 3600         # Recycle connections every hour
    server_idle_timeout = 600      # Close idle backends after 10 minutes
    server_connect_timeout = 15    # Fail fast on PG connect
    query_wait_timeout = 30        # Reject waiting clients after 30s

    # SQLAlchemy: disable prepared statements for transaction-mode PgBouncer
    engine = create_async_engine(
        PGBOUNCER_URL,
        # Disable server-side prepared statements (incompatible with transaction mode)
        connect_args={"prepared_statement_cache_size": 0},
        pool_pre_ping=True,
        pool_size=5,      # Per-process connections to PgBouncer
        max_overflow=10,
    )
  example_bad: |
    # Session mode with high concurrency — no benefit over direct connection
    [pgbouncer]
    pool_mode = session   # Each client HOLDS a PostgreSQL connection
    # 1000 client connections → 1000 PostgreSQL backends → OOM

    # Or: wrong pool_size — too small causes connection starvation
    default_pool_size = 5  # With 50 app instances × 10 req/s = queuing immediately

    # Or: using prepared statements with transaction mode (causes errors)
    # asyncpg by default uses prepared statements → "invalid prepared statement"
  when_applies: Any high-concurrency Python application using PostgreSQL
  when_not_applies: low-concurrency internal tools (<10 concurrent connections), apps using LISTEN/NOTIFY or session-level settings
  sources:
    - "https://www.pgbouncer.org/config.html"
    - "https://devcenter.heroku.com/articles/best-practices-pgbouncer-configuration"
