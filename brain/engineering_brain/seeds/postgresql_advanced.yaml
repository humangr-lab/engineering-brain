layer: rules
technology: PostgreSQL
domain: database
knowledge:
- id: CR-PG-IDX-001
  text: Use B-tree indexes (the default) for equality and range queries — they handle =, <, >, <=, >=, BETWEEN, IN, IS NULL,
    and pattern matching with anchored LIKE ('foo%').
  why: B-tree is a balanced tree structure that maintains sorted data, enabling O(log N) lookups. PostgreSQL creates B-tree
    by default because it covers 90%+ of query patterns. Choosing the wrong index type (e.g., GIN for simple equality) wastes
    storage and slows writes without improving reads. A missing B-tree index on a frequently filtered column forces a sequential
    scan — O(N) per query, which becomes catastrophic as tables grow past 100K rows.
  how_to_do_right: 'Run EXPLAIN ANALYZE on your slow queries. If you see ''Seq Scan'' with a filter on a column used in WHERE/JOIN/ORDER
    BY, add a B-tree index. Name indexes descriptively: idx_{table}_{columns}. For multi-column indexes, put the highest-cardinality
    column first (or the column most often filtered with =). Monitor with pg_stat_user_indexes to find unused indexes.'
  severity: critical
  technologies:
    platform: [postgresql]
  domains:
    domain: [architecture, performance]
    concern: [data, database]
  example_good: '-- B-tree index for equality + range

    CREATE INDEX idx_orders_customer_id ON orders (customer_id);

    CREATE INDEX idx_orders_created_at ON orders (created_at);


    -- Composite: equality column first, then range column

    CREATE INDEX idx_orders_status_created ON orders (status, created_at);


    -- Query efficiently uses the composite index

    EXPLAIN ANALYZE

    SELECT * FROM orders

    WHERE status = ''pending'' AND created_at > ''2026-01-01''

    ORDER BY created_at;

    -- Index Scan using idx_orders_status_created (cost=0.43..28.15 rows=42)

    '
  example_bad: '-- No index — full table scan on every query

    SELECT * FROM orders WHERE customer_id = 12345;

    -- Seq Scan on orders (cost=0.00..125000.00 rows=1)

    -- Filter: customer_id = 12345

    -- Rows Removed by Filter: 4999999


    -- Wrong column order in composite — can''t use index for status-only queries

    CREATE INDEX idx_orders_date_status ON orders (created_at, status);

    -- This index CANNOT be used for: WHERE status = ''pending''

    -- B-tree requires leftmost prefix to be present in the query

    '
  when_applies: Any project using PostgreSQL databases
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using PostgreSQL
  sources: ["https://www.postgresql.org/docs/current/indexes-types.html"]
- id: CR-PG-IDX-002
  text: Use GIN indexes for full-text search, JSONB containment queries, and array operations — GIN indexes every element/key
    inside the value.
  why: 'GIN (Generalized Inverted Index) builds an inverted index mapping each element to the rows containing it. This makes
    it ideal for ''does this value contain X?'' queries. Without GIN on a JSONB column, containment queries (@>) fall back
    to sequential scan — checking every row''s JSON document. For a table with 1M documents, that is 1M JSON parses per query.
    GIN makes it O(1) per matching element. The trade-off: GIN indexes are 2-3x larger than B-tree and 10x slower to update.'
  how_to_do_right: Create GIN indexes on JSONB columns queried with @>, ?, ?|, or ?& operators. For full-text, create a tsvector
    column with a GIN index. Use gin_trgm_ops for LIKE '%substring%' queries. For write-heavy tables, consider GIN with fastupdate=on
    (default) to batch index updates, and schedule periodic gin_clean_pending_list().
  severity: high
  technologies:
    platform: [postgresql]
  domains:
    domain: [architecture, performance]
    concern: [data, database, search]
  example_good: "-- GIN index on JSONB for containment queries\nCREATE INDEX idx_products_attrs ON products USING GIN (attributes);\n\
    \n-- Efficiently finds products with specific attributes\nSELECT * FROM products\nWHERE attributes @> '{\"color\": \"\
    red\", \"size\": \"large\"}';\n-- Bitmap Index Scan on idx_products_attrs\n\n-- GIN for full-text search\nALTER TABLE\
    \ articles ADD COLUMN search_vector tsvector\n  GENERATED ALWAYS AS (to_tsvector('english', title || ' ' || body)) STORED;\n\
    CREATE INDEX idx_articles_search ON articles USING GIN (search_vector);\n\nSELECT * FROM articles\nWHERE search_vector\
    \ @@ to_tsquery('english', 'database & optimization');\n\n-- GIN with trigram for substring matching\nCREATE EXTENSION\
    \ IF NOT EXISTS pg_trgm;\nCREATE INDEX idx_users_name_trgm ON users USING GIN (name gin_trgm_ops);\nSELECT * FROM users\
    \ WHERE name LIKE '%schneiter%';\n"
  example_bad: '-- B-tree index on JSONB — USELESS for containment queries

    CREATE INDEX idx_products_attrs ON products (attributes);

    -- B-tree can only compare entire JSONB values, not search inside them


    -- No index on JSONB — sequential scan parses every document

    SELECT * FROM products WHERE attributes @> ''{"color": "red"}'';

    -- Seq Scan: 1M rows, 1M JSON parses, 3.2 seconds

    -- With GIN: 42 rows, 0.8ms

    '
  when_applies: Projects using PostgreSQL databases
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using PostgreSQL
  sources: ["https://www.postgresql.org/docs/current/gin-intro.html"]
- id: CR-PG-IDX-003
  text: Use GiST indexes for geometric data, range types, and PostGIS spatial queries — GiST supports overlap and containment
    operations that B-tree cannot.
  why: GiST (Generalized Search Tree) enables indexing of multi-dimensional data where the concept of 'less than' does not
    apply. IP ranges, geometric shapes, time ranges, and geographic coordinates all require containment (&&, @>, <@) and nearest-neighbor
    (<->) operations that B-tree physically cannot perform. Without GiST, a PostGIS query checking 'which buildings are within
    500m of this point?' must compute the distance function for every row — O(N) geometry calculations.
  how_to_do_right: Use GiST for range types (tstzrange, int4range), PostGIS geometry/geography columns, ltree paths, and inet/cidr
    network addresses. For PostGIS, always create a GIST index on geometry columns. For range types, GiST enables && (overlap),
    @> (contains), <@ (contained by). If you only need equality on ranges, B-tree works. If you need 'nearest N' queries,
    use GiST with ORDER BY <-> operator.
  severity: high
  technologies:
    library: [postgis]
    platform: [postgresql]
  domains:
    domain: [architecture, performance]
    concern: [data, database, geospatial]
  example_good: "-- GiST for PostGIS spatial queries\nCREATE INDEX idx_buildings_geom ON buildings USING GIST (geom);\n\n\
    SELECT name, ST_Distance(geom, ST_MakePoint(-73.98, 40.75)::geography) AS dist\nFROM buildings\nWHERE ST_DWithin(geom,\
    \ ST_MakePoint(-73.98, 40.75)::geography, 500)\nORDER BY geom <-> ST_MakePoint(-73.98, 40.75)::geography\nLIMIT 10;\n\
    -- Index Scan using idx_buildings_geom\n\n-- GiST for range overlap (booking conflict detection)\nCREATE TABLE bookings\
    \ (\n  id serial PRIMARY KEY,\n  room_id int NOT NULL,\n  during tstzrange NOT NULL,\n  EXCLUDE USING GIST (room_id WITH\
    \ =, during WITH &&)\n);\n-- Automatically prevents overlapping bookings for the same room\n"
  example_bad: '-- B-tree on geometry column — cannot answer spatial queries

    CREATE INDEX idx_buildings_geom ON buildings (geom);

    -- ERROR: data type geometry has no default operator class for access method btree


    -- No spatial index — computes distance for every row

    SELECT * FROM buildings

    WHERE ST_DWithin(geom, my_point, 500);

    -- Seq Scan: 2M rows, 2M distance calculations, 8.5 seconds

    -- With GiST: 47 rows, 2.3ms

    '
  when_applies: Projects using PostgreSQL databases or PostGIS
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using PostgreSQL
    or PostGIS
  sources: ["https://www.postgresql.org/docs/current/gist-intro.html", "https://postgis.net/documentation/"]
- id: CR-PG-IDX-004
  text: Use BRIN indexes for large, physically ordered datasets like time-series data — BRIN is 100x smaller than B-tree with
    comparable read performance for range scans.
  why: 'BRIN (Block Range Index) stores min/max summaries per block range (default 128 pages). When data is physically ordered
    by the indexed column (e.g., INSERT-only time-series), BRIN can exclude 99%+ of blocks from a range scan while being 100-1000x
    smaller than a B-tree index. A B-tree on a 1-billion-row time-series table consumes 20-30GB; a BRIN index on the same
    column uses 50-100MB. The trade-off: BRIN is useless for random-access lookups and degrades badly if data is not physically
    correlated with the indexed column.'
  how_to_do_right: 'Use BRIN only on columns where physical row order correlates with value order — typically auto-incrementing
    IDs and timestamps on append-only tables. Verify correlation with: SELECT correlation FROM pg_stats WHERE tablename=''t''
    AND attname=''col'' — values near 1.0 or -1.0 indicate BRIN suitability. Set pages_per_range based on table size and query
    selectivity (smaller = more precise but bigger index). Run VACUUM regularly to update BRIN summaries.'
  severity: medium
  technologies:
    platform: [postgresql]
  domains:
    domain: [architecture, performance]
    concern: [data, database, time_series]
  example_good: "-- BRIN index on timestamp in append-only table\nCREATE TABLE sensor_readings (\n  id bigserial PRIMARY KEY,\n\
    \  sensor_id int NOT NULL,\n  reading_time timestamptz NOT NULL,\n  value double precision NOT NULL\n);\n\n-- Verify physical\
    \ correlation first\n-- SELECT correlation FROM pg_stats\n-- WHERE tablename='sensor_readings' AND attname='reading_time';\n\
    -- correlation = 0.99  (excellent for BRIN)\n\nCREATE INDEX idx_sensor_time_brin ON sensor_readings\n  USING BRIN (reading_time)\
    \ WITH (pages_per_range = 64);\n\n-- Index size comparison on 1B rows:\n-- B-tree: ~21 GB\n-- BRIN:   ~48 MB\n"
  example_bad: "-- BRIN on randomly ordered column — useless\nCREATE INDEX idx_orders_customer_brin ON orders\n  USING BRIN\
    \ (customer_id);\n-- correlation = 0.02 — data is not physically ordered by customer_id\n-- BRIN cannot exclude any blocks,\
    \ falls back to full scan\n\n-- B-tree on 1B row time-series — wasteful\nCREATE INDEX idx_sensor_time ON sensor_readings\
    \ (reading_time);\n-- Works, but consumes 21GB for an index that BRIN handles in 48MB\n-- On a 500GB table, that is 4%\
    \ overhead vs 0.01%\n"
  when_applies: Projects using PostgreSQL databases
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using PostgreSQL
  sources: ["https://www.postgresql.org/docs/current/indexes-partial.html"]
- id: CR-PG-IDX-005
  text: Use partial indexes to index only the rows that matter — reduces index size and write overhead for queries that always
    filter by a constant condition.
  why: A full index on a status column where 99% of rows are 'completed' and you only query 'pending' wastes storage and write
    I/O maintaining index entries for rows you never query. A partial index with WHERE status = 'pending' indexes only the
    1% of rows you actually search, making the index 100x smaller, 100x faster to scan, and nearly free to maintain for completed-row
    inserts. This is especially impactful for tables with billions of rows where only a small fraction is 'active'.
  how_to_do_right: 'Identify queries that always include a constant WHERE condition (status = ''active'', deleted_at IS NULL,
    is_processed = false). Create partial indexes with that same WHERE clause. Ensure your queries include the WHERE condition
    verbatim so the planner can match. Combine with other index types: CREATE INDEX idx ON t USING GIN (attrs) WHERE status
    = ''active''.'
  severity: high
  technologies:
    platform: [postgresql]
  domains:
    domain: [architecture, performance]
    concern: [data, database]
  example_good: "-- Partial index — only indexes unprocessed orders (1% of table)\nCREATE INDEX idx_orders_pending ON orders\
    \ (created_at)\n  WHERE status = 'pending';\n\n-- Query MUST include the WHERE condition to use the partial index\nSELECT\
    \ * FROM orders\nWHERE status = 'pending' AND created_at > now() - interval '1 hour'\nORDER BY created_at;\n-- Index Scan\
    \ using idx_orders_pending (index size: 2MB vs 4GB full)\n\n-- Partial unique index — enforce uniqueness only on active\
    \ records\nCREATE UNIQUE INDEX idx_users_email_active ON users (email)\n  WHERE deleted_at IS NULL;\n-- Allows soft-deleted\
    \ users to have duplicate emails\n"
  example_bad: '-- Full index on status — 99% of entries are ''completed'' (never queried)

    CREATE INDEX idx_orders_status ON orders (status, created_at);

    -- Index size: 4GB (indexes all 100M rows)

    -- 99M index entries for ''completed'' are dead weight


    -- No partial index — unique constraint blocks soft-delete pattern

    CREATE UNIQUE INDEX idx_users_email ON users (email);

    -- Cannot have two users with same email even if one is soft-deleted

    '
  when_applies: Projects using PostgreSQL databases
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using PostgreSQL
  sources: ["https://www.postgresql.org/docs/current/indexes-multicolumn.html"]
- id: CR-PG-IDX-006
  text: Use covering indexes (INCLUDE) to enable index-only scans — add non-searchable columns to the index so PostgreSQL
    never reads the heap.
  why: Even with a perfect index, PostgreSQL must visit the heap (table) to fetch columns not in the index. This heap access
    is random I/O — the most expensive operation in database systems. A covering index INCLUDEs the extra columns needed by
    the query so the planner can satisfy the query entirely from the index. The INCLUDE columns are stored in leaf pages but
    not in the B-tree structure, so they do not affect sort order or increase tree depth. Index-only scans are 2-10x faster
    than index scans with heap fetches.
  how_to_do_right: Look for queries where EXPLAIN shows 'Index Scan' (not 'Index Only Scan'). Identify which columns cause
    the heap fetch. Add them as INCLUDE columns. Only INCLUDE columns you actually SELECT — do not include large TEXT/JSONB
    columns. Ensure VACUUM runs frequently to keep the visibility map updated (index-only scans need it).
  severity: medium
  technologies:
    platform: [postgresql]
  domains:
    domain: [architecture, performance]
    concern: [data, database]
  example_good: "-- Covering index: search by customer_id, return order total without heap access\nCREATE INDEX idx_orders_customer_covering\
    \ ON orders (customer_id)\n  INCLUDE (total_amount, created_at);\n\n-- This query uses index-only scan — never touches\
    \ the table\nEXPLAIN ANALYZE\nSELECT customer_id, total_amount, created_at\nFROM orders\nWHERE customer_id = 12345;\n\
    -- Index Only Scan using idx_orders_customer_covering\n-- Heap Fetches: 0\n\n-- Before INCLUDE existed, you had to add\
    \ columns to the key\n-- which bloated the B-tree and affected sort order\n"
  example_bad: "-- Index without INCLUDE — must fetch total_amount from heap\nCREATE INDEX idx_orders_customer ON orders (customer_id);\n\
    \nSELECT customer_id, total_amount, created_at\nFROM orders WHERE customer_id = 12345;\n-- Index Scan using idx_orders_customer\n\
    -- Heap Fetches: 47  (random I/O for each row)\n\n-- Including large columns in the index (wasteful)\nCREATE INDEX idx\
    \ ON orders (customer_id)\n  INCLUDE (description);  -- TEXT column bloats index leaves\n-- A 500-byte average description\
    \ inflates index by 5x\n"
  when_applies: Projects using PostgreSQL databases
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using PostgreSQL
  sources: ["https://www.postgresql.org/docs/current/indexes-expressional.html"]
- id: CR-PG-IDX-007
  text: Use expression indexes to index computed values — enables index scans on functions, type casts, and computed columns
    without materializing a new column.
  why: PostgreSQL cannot use a B-tree index on column 'email' for a query WHERE lower(email) = 'test@example.com' — the index
    stores raw values, not lowered values. Without an expression index, every query applying a function in WHERE forces a
    sequential scan. Expression indexes store the function result, enabling index scans on computed expressions. This eliminates
    the need for generated columns or application-level normalization for common patterns like case-insensitive search, date
    truncation, and JSON field extraction.
  how_to_do_right: 'Create expression indexes for functions used in WHERE or ORDER BY clauses. The expression in the index
    MUST match the query expression exactly. Common patterns: lower(email) for case-insensitive, date_trunc(''day'', ts) for
    date grouping, (data->>''field'') for JSONB field access. Mark the function as IMMUTABLE if you wrote it — PostgreSQL
    will not use expression indexes with VOLATILE functions.'
  severity: medium
  technologies:
    platform: [postgresql]
  domains:
    domain: [architecture, performance]
    concern: [data, database]
  example_good: '-- Expression index for case-insensitive email lookup

    CREATE INDEX idx_users_email_lower ON users (lower(email));


    -- Query MUST use the same expression

    SELECT * FROM users WHERE lower(email) = ''test@example.com'';

    -- Index Scan using idx_users_email_lower


    -- Expression index for date grouping

    CREATE INDEX idx_events_day ON events (date_trunc(''day'', created_at));


    SELECT date_trunc(''day'', created_at) AS day, count(*)

    FROM events

    WHERE date_trunc(''day'', created_at) = ''2026-01-15''

    GROUP BY day;


    -- Expression index on JSONB field

    CREATE INDEX idx_products_brand ON products ((data->>''brand''));

    SELECT * FROM products WHERE data->>''brand'' = ''Acme'';

    '
  example_bad: '-- Regular index on email — CANNOT be used with lower()

    CREATE INDEX idx_users_email ON users (email);


    SELECT * FROM users WHERE lower(email) = ''test@example.com'';

    -- Seq Scan on users (cost=0.00..85000.00)

    -- Filter: lower(email) = ''test@example.com''

    -- The index exists but PostgreSQL cannot use it

    '
  when_applies: Projects using PostgreSQL databases
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using PostgreSQL
  sources: ["https://www.postgresql.org/docs/current/indexes-opclass.html"]
- id: CR-PG-IDX-008
  text: Monitor and manage index bloat — rebuild or compact indexes that have grown 2x+ their expected size due to updates
    and deletes.
  why: PostgreSQL's MVCC creates dead tuples on UPDATE/DELETE. B-tree indexes retain pointers to dead tuples until VACUUM
    reclaims them. High-churn tables (frequent updates on indexed columns) cause index bloat — the index grows much larger
    than the live data requires. A bloated index means more I/O per scan, more buffer pool usage, and slower sequential index
    scans. Bloated indexes can be 5-10x their optimal size on tables with heavy update patterns, directly degrading query
    performance.
  how_to_do_right: 'Monitor bloat with pgstattuple extension: SELECT * FROM pgstattuple(''idx_name'') — check avg_leaf_density
    (should be >70%) and dead_tuple_percent. For moderate bloat, REINDEX CONCURRENTLY rebuilds without locking. For production
    with zero downtime, use pg_repack extension. Tune autovacuum per table for high-churn tables: autovacuum_vacuum_scale_factor
    = 0.01 (1% vs default 20%). Never disable autovacuum.'
  severity: high
  technologies:
    platform: [postgresql]
  domains:
    domain: [architecture, operations, performance]
    concern: [data, database]
  example_good: "-- Check index bloat\nCREATE EXTENSION IF NOT EXISTS pgstattuple;\nSELECT\n  indexrelname,\n  pg_size_pretty(pg_relation_size(indexrelid))\
    \ AS index_size,\n  idx_scan AS times_used,\n  round(100.0 * avg_leaf_density / fillfactor, 1) AS density_pct\nFROM pg_stat_user_indexes\n\
    JOIN LATERAL pgstattuple(indexrelid) ON true\nWHERE schemaname = 'public'\nORDER BY pg_relation_size(indexrelid) DESC;\n\
    \n-- Rebuild without locking (PostgreSQL 12+)\nREINDEX INDEX CONCURRENTLY idx_orders_status;\n\n-- Tune autovacuum for\
    \ high-churn table\nALTER TABLE orders SET (\n  autovacuum_vacuum_scale_factor = 0.01,     -- vacuum at 1% dead tuples\n\
    \  autovacuum_analyze_scale_factor = 0.005,   -- analyze at 0.5%\n  autovacuum_vacuum_cost_delay = 2            -- more\
    \ aggressive vacuum\n);\n"
  example_bad: '-- Never checking index health

    -- Index was 200MB at creation, now 4.2GB with same row count

    -- Every index scan reads 20x more pages than necessary


    -- Using plain REINDEX — locks the table

    REINDEX INDEX idx_orders_status;

    -- ACCESS EXCLUSIVE lock — blocks ALL reads and writes

    -- On a 4GB index, this takes 5-15 minutes of downtime


    -- Disabling autovacuum (the worst thing you can do)

    ALTER TABLE orders SET (autovacuum_enabled = false);

    -- Dead tuples accumulate → index bloat → transaction ID wraparound → database SHUTDOWN

    '
  when_applies: Projects using PostgreSQL databases
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using PostgreSQL
  sources: ["https://www.postgresql.org/docs/current/sql-createindex.html#SQL-CREATEINDEX-CONCURRENTLY"]
- id: CR-PG-QRY-001
  text: Always use EXPLAIN ANALYZE (not just EXPLAIN) to diagnose slow queries — compare actual row counts vs estimated rows
    to identify planner misjudgments.
  why: Plain EXPLAIN shows the planner's estimated plan without executing the query. These estimates can be wildly wrong —
    the planner might estimate 10 rows but actually return 100,000. EXPLAIN ANALYZE executes the query and shows actual times,
    actual row counts, and loop counts. The gap between estimated and actual rows reveals stale statistics (run ANALYZE),
    correlation assumptions (consider custom statistics), or expression selectivity errors. Without actual execution data,
    you are optimizing based on the planner's guesses.
  how_to_do_right: 'Use EXPLAIN (ANALYZE, BUFFERS, FORMAT TEXT) for human-readable output. Compare ''rows'' (estimated) vs
    ''actual rows'' for each node. If they differ by 10x+, run ANALYZE on the table. If still off, create extended statistics:
    CREATE STATISTICS stat_name ON col_a, col_b FROM table. Look for ''Buffers: shared hit/read'' to understand I/O patterns.
    Use auto_explain for logging slow queries in production (log_min_duration = 1000ms).'
  severity: critical
  technologies:
    platform: [postgresql]
  domains:
    domain: [architecture, performance, quality]
    concern: [data, database, debugging]
  example_good: '-- EXPLAIN ANALYZE with buffers — the complete diagnostic tool

    EXPLAIN (ANALYZE, BUFFERS, FORMAT TEXT)

    SELECT o.*, c.name

    FROM orders o

    JOIN customers c ON c.id = o.customer_id

    WHERE o.status = ''pending'' AND o.created_at > ''2026-01-01'';


    -- Reading the output:

    -- Nested Loop (cost=0.86..124.32 rows=10 width=120)

    --   (actual time=0.035..0.482 rows=47 loops=1)

    --                                   ^^^^^^^^^^

    --   estimated 10 rows, actual 47 — stats slightly stale, run ANALYZE

    --   Buffers: shared hit=52 read=3  — 52 cached, 3 from disk


    -- Enable auto_explain for production monitoring

    -- ALTER SYSTEM SET auto_explain.log_min_duration = ''1s'';

    -- ALTER SYSTEM SET auto_explain.log_analyze = true;

    -- ALTER SYSTEM SET auto_explain.log_buffers = true;

    '
  example_bad: '-- EXPLAIN without ANALYZE — just estimates, not reality

    EXPLAIN SELECT * FROM orders WHERE status = ''pending'';

    -- Seq Scan on orders (cost=0.00..25000.00 rows=100)

    -- Looks fine: only 100 rows, right?

    -- REALITY (with ANALYZE): actual rows=850000 — table has 85% pending!

    -- The planner used default selectivity (1/100) for the string comparison


    -- Optimizing based on estimates leads to wrong decisions

    -- You might add an index that the planner won''t use because

    -- it (correctly) knows 85% of rows match

    '
  when_applies: Any project using PostgreSQL databases
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using PostgreSQL
  sources: ["https://www.postgresql.org/docs/current/using-explain.html"]
- id: CR-PG-QRY-002
  text: Understand when PostgreSQL chooses sequential scan vs index scan — index scans are NOT always faster, and forcing
    them with enable_seqscan=off is a debugging tool, not a solution.
  why: 'An index scan incurs random I/O: read index page, then jump to heap page for each row. Sequential scan reads table
    pages in order — leveraging OS read-ahead and sequential disk throughput. When a query returns >5-10% of the table, sequential
    scan is genuinely faster because sequential I/O throughput is 10-100x higher than random I/O. The planner considers this
    trade-off using random_page_cost and seq_page_cost settings. If the planner chooses a seq scan and you have an index,
    either the statistics are wrong (run ANALYZE) or the seq scan is actually correct.'
  how_to_do_right: 'If EXPLAIN shows seq scan on a seemingly indexed column: (1) run ANALYZE table, (2) check if the query
    returns a large fraction of the table (>5%), (3) verify the index exists on the correct expression, (4) check random_page_cost
    — for SSDs, set to 1.1-1.5 (default 4.0 assumes spinning disks). For SSDs, also set effective_io_concurrency = 200. Only
    use SET enable_seqscan = off temporarily for debugging to verify an index CAN be used.'
  severity: high
  technologies:
    platform: [postgresql]
  domains:
    domain: [architecture, performance]
    concern: [data, database]
  example_good: '-- Tune for SSD storage (critical — defaults assume spinning disk)

    ALTER SYSTEM SET random_page_cost = 1.1;

    ALTER SYSTEM SET effective_io_concurrency = 200;

    ALTER SYSTEM SET effective_cache_size = ''24GB'';  -- 75% of RAM

    SELECT pg_reload_conf();


    -- Check why planner chose seq scan

    EXPLAIN ANALYZE SELECT * FROM orders WHERE status = ''pending'';

    -- If actual rows = 900000 out of 1000000, seq scan is CORRECT

    -- 90% of the table — random I/O would be 10x slower


    -- Debug: temporarily disable seq scan to verify index works

    SET enable_seqscan = off;

    EXPLAIN ANALYZE SELECT * FROM orders WHERE status = ''pending'';

    -- Now shows: Index Scan (cost=0.43..2500000.00)

    -- Cost is 100x higher — confirms seq scan was the right choice

    RESET enable_seqscan;

    '
  example_bad: '-- Permanently disabling seq scan in postgresql.conf

    enable_seqscan = off    -- NEVER do this in production

    -- Forces index scans even when returning 90% of the table

    -- Performance degrades 10-100x for large-result queries


    -- Assuming seq scan = missing index

    -- "Why is PostgreSQL doing a seq scan? I have an index!"

    -- Because your WHERE status = ''active'' matches 95% of rows

    -- The index scan would be 20x slower than seq scan

    '
