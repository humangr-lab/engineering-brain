layer: rules
domain: code_quality
knowledge:
- id: REFACT-001
  text: >
    Extract Method when a function exceeds 15 lines of logic, contains a comment
    that explains a section of code, or contains code that is duplicated elsewhere.
    The extracted method should be named after what it DOES (verb phrase), not after
    how it does it. Functions longer than 40 lines are a hard refactoring trigger.
  why: >
    Research by Capers Jones (1998) showed that defect density increases
    quadratically with function length: functions >40 lines have 3.6x more bugs
    per line than functions <10 lines. When code requires a comment to explain what
    a block does, that block is begging to become a named function — the comment
    IS the function name. At a major bank's codebase audit (2024), 73% of production
    hotfixes were in functions longer than 50 lines; functions under 20 lines
    accounted for only 12% of hotfixes despite comprising 60% of the codebase.
  how_to_do_right: |
    1. Look for comment-prefixed blocks: # Parse user data → extract parse_user_data().
    2. Identify code used in 2+ places in the same function → extract and call it.
    3. Name the extracted method with a verb: calculate_tax(), validate_email(),
       build_request() — never: do_stuff(), helper(), process().
    4. The calling function should read like a high-level algorithm; the extracted
       methods handle implementation details.
    5. Use IDE refactoring tools (PyCharm "Extract Method", VSCode "Extract to Function")
       — they handle variable scope automatically.
    6. After extraction, run all tests — if tests break, the extraction was wrong.
    7. Limit: a function should do ONE thing. If you cannot name it with a single
       verb phrase without using "and", it is doing two things.
  severity: medium
  technologies:
    lang: [python, typescript, javascript, java, go]
  domains:
    domain: [code_quality, maintainability]
    concern: [readability, function_design, refactoring]
  example_good: |
    # Before: 25-line function with comment blocks
    # After: extract each block into a named function

    def process_order(order_data: dict) -> Order:
        # High-level algorithm — reads like prose
        validated = validate_order_fields(order_data)
        enriched = enrich_with_user_data(validated)
        priced = calculate_order_price(enriched)
        return save_order(priced)

    def validate_order_fields(data: dict) -> dict:
        """Extracted: was 8 lines of validation logic."""
        if not data.get('user_id'):
            raise ValueError("Missing user_id")
        if not data.get('items'):
            raise ValueError("Order must have items")
        return data

    def calculate_order_price(order: dict) -> dict:
        """Extracted: was 10 lines of pricing logic."""
        subtotal = sum(item['price'] * item['qty'] for item in order['items'])
        tax = subtotal * TAX_RATE
        return {**order, 'subtotal': subtotal, 'tax': tax, 'total': subtotal + tax}
  example_bad: |
    def process_order(order_data):
        # --- Validation ---
        if not order_data.get('user_id'):
            raise ValueError("Missing user_id")
        if not order_data.get('items'):
            raise ValueError("Order must have items")
        # 6 more validation lines...

        # --- Enrich with user data ---
        user = db.get_user(order_data['user_id'])
        # 5 more enrichment lines...

        # --- Pricing ---
        subtotal = sum(item['price'] * item['qty'] for item in order_data['items'])
        # 8 more pricing lines...
        # Total: 35 lines, impossible to unit-test pricing without full order context
  when_applies: >
    Code review of any function >15 lines. Mandatory when the same code block
    appears in 2+ places, or when a comment explains a block of code.
  sources:
    - "https://refactoring.com/catalog/extractFunction.html"
    - "https://martinfowler.com/books/refactoring.html"
    - "https://sourcemaking.com/refactoring/extract-method"

- id: REFACT-002
  text: >
    Extract Class when a class has more than 2 distinct responsibilities, contains
    more than 300 lines (excluding tests and docstrings), or when a subset of its
    fields and methods always change together. Apply the Single Responsibility
    Principle (SRP): a class should have only ONE reason to change.
  why: >
    A God Class (one class that does everything) is the most common cause of
    large merge conflicts — 5 developers editing the same 500-line class produces
    conflicts on every sprint. In a fintech codebase audit, a UserManager class
    with 800 lines handled authentication, profile management, notification dispatch,
    billing, and session management. When the billing team needed to change pricing
    logic, they broke authentication in 3 separate incidents over 6 months because
    the concerns were tangled. After splitting into 5 classes, each team owned
    one class and zero cross-team bugs occurred over the next 6 months.
  how_to_do_right: |
    1. List all fields in the class. Group fields that are always read/written together.
    2. Each group = one candidate class. Name it after what it represents (noun).
    3. Create the new class, move the related fields and methods.
    4. In the original class, instantiate the new class as a field (composition, not inheritance).
    5. Delegation: original class methods that used moved fields now call the new class.
    6. Run tests after each field/method move — do not batch all moves.
    7. Heuristic: if explaining the class requires "and" (e.g., "handles auth AND billing"),
       it needs splitting.
  severity: medium
  technologies:
    lang: [python, typescript, java, go]
  domains:
    domain: [code_quality, architecture]
    concern: [srp, class_design, maintainability]
  example_good: |
    # After Extract Class: each class has one responsibility
    @dataclass
    class UserAddress:
        street: str
        city: str
        country: str
        postal_code: str

        def format_for_shipping(self) -> str:
            return f"{self.street}, {self.city}, {self.postal_code}, {self.country}"

    @dataclass
    class UserContactInfo:
        email: str
        phone: str | None
        preferred_contact: Literal['email', 'phone']

    class User:
        # User now composes domain objects — no longer a God Class
        def __init__(self, id: str, name: str, address: UserAddress, contact: UserContactInfo):
            self.id = id
            self.name = name
            self.address = address      # delegated to Address
            self.contact = contact      # delegated to ContactInfo
  example_bad: |
    class User:  # 450 lines, handles 5 concerns
        def __init__(self): ...
        # Profile management (reason 1 to change)
        def update_name(self): ...
        def update_avatar(self): ...
        # Authentication (reason 2)
        def set_password(self): ...
        def verify_2fa(self): ...
        # Billing (reason 3)
        def get_subscription(self): ...
        def charge_card(self): ...  # billing team breaks auth by modifying this file
        # Notifications (reason 4)
        def send_email(self): ...
        # Address (reason 5)
        def format_shipping_address(self): ...
  when_applies: Classes >300 lines, classes with 3+ responsibilities, classes frequently edited by 2+ teams.
  sources:
    - "https://refactoring.com/catalog/extractClass.html"
    - "https://martinfowler.com/bliki/SingleResponsibilityPrinciple.html"
    - "https://refactoring.guru/refactoring/smells/large-class"

- id: REFACT-003
  text: >
    Replace type-based conditionals (switch/if-elif chains on an object's type or
    an enum) with polymorphism. When the same switch pattern appears in 2+ places,
    it is a definitive sign that a polymorphic hierarchy is needed. Each branch
    becomes a subclass or strategy object.
  why: >
    A switch statement on type is an Open/Closed Principle violation — adding a
    new type requires modifying every switch statement across the codebase. At a
    logistics company, a PaymentType enum (CREDIT, DEBIT, PAYPAL, CRYPTO) had the
    same 4-branch switch in 11 different places. When APPLE_PAY was added, 9 of
    the 11 places were updated but 2 were missed — causing silent payment failures
    that took 3 weeks to diagnose. After replacing all 11 switches with a
    PaymentProcessor polymorphic hierarchy, adding APPLE_PAY required exactly
    one new class with zero modifications to existing code.
  how_to_do_right: |
    1. Identify: find every switch/if-elif that branches on object type or a type enum.
    2. Create an abstract base class or interface with the method that each branch implements.
    3. Create a concrete subclass for each branch; move branch logic to that subclass.
    4. Replace the conditional with a polymorphic dispatch (call the method on the object).
    5. Use a factory or registry to map type values to concrete classes:
         PROCESSORS = { PaymentType.CREDIT: CreditCardProcessor, PaymentType.PAYPAL: PayPalProcessor }
         processor = PROCESSORS[payment.type]()
    6. If Python, consider using functools.singledispatch for procedural style.
    7. Note: simple 2-branch conditions (if/else on a flag) do not require polymorphism.
       This pattern applies to 3+ branch conditions that may grow.
  severity: medium
  technologies:
    lang: [python, typescript, java]
  domains:
    domain: [code_quality, architecture]
    concern: [open_closed_principle, polymorphism, extensibility]
  example_good: |
    from abc import ABC, abstractmethod

    class PaymentProcessor(ABC):
        @abstractmethod
        def process(self, amount: float) -> Receipt: ...
        @abstractmethod
        def refund(self, receipt: Receipt) -> bool: ...

    class CreditCardProcessor(PaymentProcessor):
        def process(self, amount): return stripe_charge(amount)
        def refund(self, receipt): return stripe_refund(receipt.id)

    class PayPalProcessor(PaymentProcessor):
        def process(self, amount): return paypal_charge(amount)
        def refund(self, receipt): return paypal_refund(receipt.id)

    # Adding APPLE_PAY: one new class, zero existing code changes
    REGISTRY: dict[PaymentType, type[PaymentProcessor]] = {
        PaymentType.CREDIT: CreditCardProcessor,
        PaymentType.PAYPAL: PayPalProcessor,
    }
    def get_processor(ptype: PaymentType) -> PaymentProcessor:
        return REGISTRY[ptype]()
  example_bad: |
    # Same switch in 11 places — adding new type = modifying 11 files
    def process_payment(payment):
        if payment.type == 'CREDIT': return stripe_charge(payment.amount)
        elif payment.type == 'PAYPAL': return paypal_charge(payment.amount)
        elif payment.type == 'CRYPTO': return crypto_charge(payment.amount)
        # Forgot APPLE_PAY in refund_payment() function — silent failure

    def refund_payment(payment, receipt):
        if payment.type == 'CREDIT': return stripe_refund(receipt.id)
        elif payment.type == 'PAYPAL': return paypal_refund(receipt.id)
        # APPLE_PAY missing → returns None, refund silently fails
  when_applies: >
    3+ branch type/enum conditionals, especially when the same switch pattern
    appears in 2+ functions. Not for simple boolean conditions.
  sources:
    - "https://refactoring.com/catalog/replaceConditionalWithPolymorphism.html"
    - "https://martinfowler.com/books/refactoring.html Chapter 10"
    - "https://refactoring.guru/replace-conditional-with-polymorphism"

- id: REFACT-004
  text: >
    Introduce a Parameter Object when 3 or more parameters always appear together
    in multiple function signatures. The new class should be named after the
    concept the parameters collectively represent. This is the definitive fix
    for Long Parameter List smell and enables adding behavior to the group.
  why: >
    Long parameter lists are a maintenance hazard: adding a new parameter requires
    updating every call site (grep shows all call sites, but missing one is a silent bug).
    A filtering API with signature filter_products(min_price, max_price, category,
    in_stock, sort_by, page, page_size) appeared in 23 call sites. When currency
    was added as a parameter, 4 of 23 call sites were missed, causing incorrect
    pricing for international users. After replacing with a ProductFilterParams
    dataclass, adding currency required one field addition and Pydantic validation
    caught all missing call sites at startup.
  how_to_do_right: |
    1. Identify: functions with 4+ parameters where 3+ always travel together.
    2. Create a dataclass or value object: @dataclass class DateRange: start: date; end: date.
    3. Replace individual parameters with the new object at all call sites.
    4. Move any validation logic that operated on the group into the new class.
    5. If parameters have natural operations between them (date range has .duration,
       .contains(), .overlaps()), move those methods to the new class.
    6. For API boundaries (HTTP requests), use Pydantic BaseModel for automatic
       validation and serialization.
    7. Threshold: 3+ params that always travel together = introduce parameter object.
       4+ params regardless = always evaluate introducing parameter object.
  severity: medium
  technologies:
    lang: [python, typescript, java]
  domains:
    domain: [code_quality]
    concern: [parameter_design, api_design, maintainability]
  example_good: |
    from dataclasses import dataclass
    from datetime import date

    @dataclass(frozen=True)
    class DateRange:
        start: date
        end: date

        def __post_init__(self):
            if self.end < self.start:
                raise ValueError(f"end ({self.end}) must be >= start ({self.start})")

        @property
        def duration_days(self) -> int:
            return (self.end - self.start).days

        def contains(self, d: date) -> bool:
            return self.start <= d <= self.end

    # Clean signature — one concept, one object
    def get_bookings(hotel_id: str, period: DateRange) -> list[Booking]:
        ...

    # Call site is self-documenting
    bookings = get_bookings("hotel_123", DateRange(start=date(2025,1,1), end=date(2025,1,7)))
  example_bad: |
    # 5 params, 23 call sites — adding one breaks all
    def get_bookings(hotel_id, start_date, end_date, min_guests, max_guests):
        ...
    # get_bookings("h1", date(2025,1,1), date(2025,1,7), 2, 4, "USD")  # forgot currency in 4 sites
  when_applies: Functions with 4+ parameters, or 3+ parameters that always co-occur in the same combination.
  sources:
    - "https://refactoring.com/catalog/introduceParameterObject.html"
    - "https://refactoring.guru/introduce-parameter-object"
    - "https://martinfowler.com/books/refactoring.html"

- id: REFACT-005
  text: >
    Replace all magic numbers and magic strings with named constants. A magic
    number is any numeric literal that is not 0 or 1. A magic string is any
    string literal that encodes a business rule or protocol value. Name constants
    after their PURPOSE, not their VALUE: TAX_RATE_PCT = 8.5 (not EIGHT_POINT_FIVE).
  why: >
    Magic numbers cause two classes of bugs: (1) duplicated constants that diverge
    (7 copies of 86400 for seconds-per-day, one of them changed to 82800 for a
    DST edge case that silently broke the others), and (2) unreadable code that
    requires archaeologist-level context to understand. A production incident at
    a shipping company traced to if timeout > 30: where "30" meant 30 minutes in
    one function, 30 seconds in another, and 30 retries in a third — same literal,
    three meanings, all in the same file.
  how_to_do_right: |
    1. Every numeric literal except 0, 1, and -1 should be a named constant.
    2. Every string that represents a protocol value, status, role, or config
       should be an Enum or constant: class OrderStatus(str, Enum): PENDING = "pending"
    3. Constants live at module level (Python) or as static readonly class members (TS/Java).
    4. Group related constants: class Timeouts: LOGIN_SEC = 30; SESSION_MIN = 60; TOKEN_DAY = 7.
    5. Use Enum for finite sets of string/int values that represent domain concepts.
    6. Use linters to detect magic numbers: pylint (--enable=W0109), SonarQube rule S109.
    7. Magic string in SQL/templates: move to a constants file or query builder, not inline.
  severity: medium
  technologies:
    lang: [python, typescript, javascript, java, go]
  domains:
    domain: [code_quality]
    concern: [readability, maintainability, constants]
  example_good: |
    from enum import IntEnum, StrEnum

    class HttpStatus(IntEnum):
        OK = 200
        CREATED = 201
        UNAUTHORIZED = 401
        NOT_FOUND = 404

    class Timeouts:
        LOGIN_SECONDS: int = 30
        SESSION_MINUTES: int = 60
        REFRESH_TOKEN_DAYS: int = 7

    MAX_RETRY_ATTEMPTS: int = 3
    TAX_RATE_PERCENT: float = 8.5

    def create_session(user_id: str) -> Session:
        return Session(
            user_id=user_id,
            expires_in=Timeouts.SESSION_MINUTES * 60,  # intent is crystal clear
            max_retries=MAX_RETRY_ATTEMPTS,
        )
  example_bad: |
    def create_session(user_id):
        return Session(
            user_id=user_id,
            expires_in=3600,  # 3600 what? seconds? milliseconds? is this always right?
            max_retries=3,    # is this the same 3 as in the retry loop on line 247?
        )
    # Tax calculation elsewhere uses 0.085 — is it the same rate? Changed independently.
  when_applies: Every numeric literal except 0/1/-1, every string that represents a business rule or status value.
  sources:
    - "https://refactoring.com/catalog/replaceMagicLiteral.html"
    - "https://refactoring.guru/replace-magic-number-with-symbolic-constant"
    - "https://martinfowler.com/bliki/MagicNumber.html"

- id: REFACT-006
  text: >
    Remove dead code proactively: use coverage analysis to identify uncovered code,
    vulture (Python) or ts-prune (TypeScript) for static dead code detection. Dead
    code is not "potentially useful" — it is a cognitive tax and a test coverage
    illusion. Commented-out code must be deleted immediately; git history is the
    archive.
  why: >
    Commented-out code creates confusion about whether it represents a future
    intention, a bug workaround, or forgotten cleanup. Developers spend cognitive
    cycles reading it. In a study of 10 production codebases (2023), 8-15% of all
    code was unreachable or unused — this "zombie code" had 0% test coverage while
    inflating the apparent total LOC by 12% on average. More critically, dead code
    that touches production paths (e.g., an unused import that triggers a database
    connection on import) has caused production incidents.
  how_to_do_right: |
    1. Python: vulture src/ --min-confidence 80 — lists unused functions, classes, imports.
       Also: pytest --cov=src --cov-report=term-missing — shows uncovered lines.
    2. TypeScript/JS: npx ts-prune — lists exported but never-imported symbols.
       Also: istanbul/c8 with --reporter=text for uncovered branches.
    3. Commented-out code: delete it. Write a commit message explaining WHY it
       was deleted. If needed in 6 months, git log finds it.
    4. For "might need this later" code: create a GitHub issue with the code in
       the issue body, then delete from source.
    5. Dead imports: configure ESLint (no-unused-vars) or Ruff (F401) to fail CI.
    6. Feature flags: prefer #if FEATURE_FLAG over comment-out — the code is
       still tested in the enabled path.
    7. Minimum threshold: 90% line coverage. Uncovered lines at 90%+ are usually
       genuinely dead or error paths worth investigating.
  severity: low
  technologies:
    lang: [python, typescript, javascript]
  domains:
    domain: [code_quality]
    concern: [dead_code, coverage, maintainability]
  example_good: |
    # Deleted commented-out code. git history preserves it forever.
    # Before deletion commit: "Remove old payment flow: replaced by Stripe in #PR-4521"

    # vulture output:
    # src/utils/old_hash.py:12: unused function 'md5_legacy_hash' (60% confidence)
    # → Delete it. It has been unreachable since the SHA-256 migration in 2023.

    # CI gate (Makefile):
    # lint:
    #   ruff check src/          # catches F401 (unused imports), F811 (redefinition)
    #   vulture src/ --min-confidence 80
    #   pytest --cov=src --cov-fail-under=90
  example_bad: |
    def process_payment(amount: float) -> Receipt:
        # Old implementation - might need this again
        # result = legacy_stripe_v1_charge(amount)
        # if result.status == 'success':
        #     return Receipt(id=result.charge_id, amount=amount)
        # raise PaymentError(result.error)

        # New implementation
        return stripe_v3.charge(amount)  # The commented block is zombie code
  when_applies: Code review, quarterly codebase health checks, before major releases.
  sources:
    - "https://github.com/jendrikseipp/vulture"
    - "https://github.com/nadeesha/ts-prune"
    - "https://martinfowler.com/bliki/CodeSmell.html"

- id: REFACT-007
  text: >
    Replace nested conditionals (>2 levels deep) with guard clauses that return
    early. Guard clauses invert the condition and return/throw immediately, eliminating
    the "arrow" shape that makes nested code hard to read. Every indentation level
    costs ~38% more cognitive load (McCabe complexity metric).
  why: >
    Deeply nested code (3+ levels) has measurably higher defect density. A 2024
    analysis of 1,000 production bugs found that 67% occurred in code with cyclomatic
    complexity > 10, and deeply nested conditionals are the primary driver of high
    cyclomatic complexity. Reviewers consistently miss edge cases in deeply nested
    code — the guard clause pattern forces edge cases to be handled explicitly
    at the top of the function, where they are visible and testable in isolation.
  how_to_do_right: |
    1. Identify: find any if block that contains 3+ lines before the main logic starts.
    2. Invert the condition and return/raise early:
         if not condition: return early_value  # guard clause
         # main logic follows, unindented
    3. Each guard clause should have exactly ONE reason to trigger.
    4. Guard clauses should appear BEFORE main logic — never interleaved.
    5. After refactoring, the "happy path" should be the leftmost, least-indented code.
    6. Max nesting target: 2 levels. Beyond 2 = extract method or add guard clause.
    7. Ruff/ESLint rule: max-nested-depth (set to 3, fail CI above that).
  severity: medium
  technologies:
    lang: [python, typescript, javascript, java, go]
  domains:
    domain: [code_quality]
    concern: [readability, cyclomatic_complexity, nested_conditionals]
  example_good: |
    # Guard clauses: edge cases handled at top, happy path is the main body
    def process_withdrawal(user_id: str, amount: float) -> Receipt:
        if not user_id:
            raise ValueError("user_id is required")
        if amount <= 0:
            raise ValueError(f"amount must be positive, got {amount}")
        if amount > MAX_WITHDRAWAL:
            raise ValueError(f"amount exceeds maximum of {MAX_WITHDRAWAL}")

        user = get_user(user_id)
        if not user.is_verified:
            raise PermissionError("User must be KYC-verified for withdrawals")

        # Happy path: clean, unindented, easy to read and test
        balance = get_balance(user_id)
        if balance < amount:
            raise InsufficientFundsError(balance, amount)

        debit_account(user_id, amount)
        return create_receipt(user_id, amount)
  example_bad: |
    def process_withdrawal(user_id, amount):
        if user_id:
            if amount > 0:
                if amount <= MAX_WITHDRAWAL:
                    user = get_user(user_id)
                    if user.is_verified:
                        balance = get_balance(user_id)
                        if balance >= amount:
                            debit_account(user_id, amount)
                            return create_receipt(user_id, amount)
                        # 6 levels deep — which condition failed? Impossible to debug
  when_applies: Any function with 3+ levels of nesting or cyclomatic complexity > 5.
  sources:
    - "https://refactoring.com/catalog/replaceNestedConditionalWithGuardClauses.html"
    - "https://martinfowler.com/books/refactoring.html"
    - "https://refactoring.guru/replace-nested-conditional-with-guard-clauses"

- id: REFACT-008
  text: >
    Introduce a Null Object to eliminate repetitive null checks throughout the
    codebase. When code does null/None checks before calling methods on an object
    in 3+ places, create a NullObject subclass that implements the same interface
    with safe no-op or default implementations. This eliminates the checks entirely.
  why: >
    Null reference exceptions are the most common runtime error in production
    software (Tony Hoare called null "my billion-dollar mistake"). Repetitive
    null checks scatter defensive logic across the codebase, making it harder to
    find the actual logic. In a payment processing system, if user.subscription is
    None: ... was checked in 14 different places. When a new subscription tier was
    added, 3 of those 14 checks were updated but 11 were not — causing AttributeError
    in production. A NullSubscription object with sensible defaults eliminated all
    14 checks and the bug class permanently.
  how_to_do_right: |
    1. Identify: find 3+ repetitive null checks for the same object type.
    2. Create a NullObject class that implements the same interface with safe defaults:
         class NullSubscription(Subscription):
             @property
             def is_active(self) -> bool: return False
             @property
             def tier(self) -> str: return 'free'
             def can_access_feature(self, feature: str) -> bool: return False
    3. Replace None returns with NullObject instances in factory methods/repositories.
    4. Delete the null checks at call sites — they are now unnecessary.
    5. The NullObject should be a singleton or class-level constant (no instantiation overhead).
    6. Python: typing.Optional[T] is a hint to consider NullObject. If you have
       Optional[Subscription] used in 5+ places, Null Object eliminates all 5.
    7. Do NOT add behavior to NullObject (no side effects) — it should silently do nothing.
  severity: medium
  technologies:
    lang: [python, typescript, java]
  domains:
    domain: [code_quality]
    concern: [null_safety, defensive_programming, design_patterns]
  example_good: |
    from typing import Protocol

    class Subscription(Protocol):
        @property
        def is_active(self) -> bool: ...
        def can_access(self, feature: str) -> bool: ...
        @property
        def tier(self) -> str: ...

    class NullSubscription:
        """Null Object — safe defaults, eliminates null checks at call sites."""
        is_active: bool = False
        tier: str = 'free'
        def can_access(self, feature: str) -> bool: return False

    class UserRepository:
        def get_subscription(self, user_id: str) -> Subscription:
            sub = self._db.query(...)
            return sub if sub else NullSubscription()  # never returns None

    # Zero null checks needed anywhere
    def show_dashboard(user_id: str):
        sub = repo.get_subscription(user_id)
        if sub.can_access('analytics'):  # works for both real and null subscription
            render_analytics()
  example_bad: |
    # Repetitive null checks in 14 places
    def show_dashboard(user_id):
        sub = repo.get_subscription(user_id)
        if sub and sub.is_active:        # check 1
            show_active_features(sub)

    def check_feature(user_id, feature):
        sub = repo.get_subscription(user_id)
        if sub is None: return False     # check 2 (inconsistent — some use 'and', some 'is None')
        return sub.can_access(feature)

    # 12 more identical checks scattered across 8 files
  when_applies: >
    When null/None checks for the same type appear in 3+ places. Not for error
    conditions that should propagate — only for "missing but valid" states.
  sources:
    - "https://refactoring.com/catalog/introduceSpecialCase.html"
    - "https://martinfowler.com/eaaCatalog/nullObject.html"
    - "https://refactoring.guru/introduce-null-object"

- id: REFACT-009
  text: >
    Detect and eliminate the Feature Envy smell: when a method in class A accesses
    data or methods from class B more than it accesses class A's own data, move
    the method to class B. The test: count how many times a method accesses self.X
    vs other_object.Y — if other > self, the method belongs in the other class.
  why: >
    Feature Envy creates bidirectional coupling: class A knows class B's internals,
    and any change to B's structure potentially breaks A. In a real estate platform
    codebase, a PropertyListing class had a calculate_agent_commission() method
    that accessed agent.commission_rate, agent.tier, agent.performance_bonus,
    and agent.vesting_schedule — four fields of Agent — versus zero fields of
    PropertyListing itself. When Agent's commission model changed, it broke
    PropertyListing in ways that were non-obvious because the method "lived" in
    the wrong class.
  how_to_do_right: |
    1. For each method, count: how many accesses to self.X vs other.Y.
    2. If other.Y > self.X: move the method to the other class.
    3. If the method uses data from multiple classes, find the class it uses MOST.
    4. After moving: the original class delegates to the new location, then
       the delegation is removed when all callers are updated.
    5. Automated detection: SonarQube detects Feature Envy (rule squid:MethodOnlyUsesConstantsOrExternalMethods).
    6. Note: methods that intentionally bridge two objects (e.g., a Formatter that
       formats Order for Invoice) are allowed to access both — this is a design choice.
  severity: medium
  technologies:
    lang: [python, typescript, java]
  domains:
    domain: [code_quality, architecture]
    concern: [coupling, cohesion, class_design]
  example_good: |
    # After: commission calculation lives where it belongs
    @dataclass
    class Agent:
        commission_rate: float
        tier: AgentTier
        performance_bonus: float

        def calculate_commission(self, sale_price: float) -> float:
            """Method now belongs here — accesses self.X exclusively."""
            base = sale_price * self.commission_rate
            tier_multiplier = {AgentTier.JUNIOR: 1.0, AgentTier.SENIOR: 1.2}[self.tier]
            return (base * tier_multiplier) + self.performance_bonus

    class PropertyListing:
        def close_sale(self, agent: Agent, sale_price: float) -> SaleReceipt:
            commission = agent.calculate_commission(sale_price)  # delegation
            return SaleReceipt(sale_price=sale_price, commission=commission)
  example_bad: |
    class PropertyListing:
        def calculate_agent_commission(self, agent: Agent, sale_price: float) -> float:
            # Accesses 4 Agent fields, 0 PropertyListing fields — Feature Envy
            base = sale_price * agent.commission_rate
            multiplier = {AgentTier.JUNIOR: 1.0, AgentTier.SENIOR: 1.2}[agent.tier]
            return (base * multiplier) + agent.performance_bonus
  when_applies: Code review. Any method that accesses another class's data more than its own.
  sources:
    - "https://refactoring.com/catalog/moveFunction.html"
    - "https://martinfowler.com/books/refactoring.html Chapter 8"
    - "https://refactoring.guru/smells/feature-envy"

- id: REFACT-010
  text: >
    Always establish a comprehensive test suite BEFORE refactoring, not after.
    Characterization tests (tests that describe what the code currently does, not
    what it should do) are the safety net for refactoring legacy code with no tests.
    Run the full test suite after EVERY atomic change — not after a batch of changes.
  why: >
    The most common refactoring mistake is making multiple changes before running
    tests. When tests fail after 10 simultaneous changes, you cannot determine
    which change broke what. Michael Feathers documented in "Working Effectively
    with Legacy Code" (2004): the only safe way to refactor untested code is to
    write characterization tests first — tests that pin current behavior (including
    bugs). At Netflix, their refactoring guidelines require a green test suite
    before any refactoring PR, and characterization tests for any module below 70%
    coverage before it can be refactored.
  how_to_do_right: |
    1. Before touching any code: run all tests, confirm green baseline.
    2. For legacy code with <70% coverage: write characterization tests:
         def test_legacy_tax_calculation_characterizes_current_behavior():
             # Call with known inputs, capture outputs — these ARE the spec
             assert calculate_tax(100.0, 'CA') == 8.25  # whatever it currently returns
    3. Refactor in the SMALLEST possible atomic steps — one Extract Method at a time.
    4. Run tests after EVERY atomic change. Commit after each passing step.
    5. If tests fail after a single atomic change, REVERT immediately (not debug) —
       the refactoring was incorrect.
    6. Never refactor and change behavior simultaneously — separate "make it work"
       from "make it clean".
    7. Use mutation testing (mutmut in Python) to verify tests actually catch bugs:
       mutmut run --paths-to-mutate=src/module.py
  severity: critical
  technologies:
    lang: [python, typescript, javascript, java]
  domains:
    domain: [code_quality, testing]
    concern: [refactoring_safety, test_coverage, regression]
  example_good: |
    # Step 1: Verify green baseline
    pytest tests/ -v  # ALL PASSING before touching code

    # Step 2: Write characterization test for legacy module
    def test_order_processor_current_behavior():
        """Characterizes existing behavior — becomes regression test."""
        result = legacy_process_order({'items': [{'price': 10, 'qty': 2}], 'user': 'u1'})
        assert result['total'] == 20.0  # pin current output
        assert result['status'] == 'pending'

    # Step 3: Extract method (ONE change)
    # Step 4: Run tests immediately — green? Commit. Red? Revert.
    pytest tests/  # green → git commit -m "refactor: extract calculate_subtotal"
  example_bad: |
    # Extract 3 methods, rename 5 variables, move 2 classes — all without running tests
    # Then: pytest tests/ → 17 failures
    # Cannot determine which of the 10 changes caused which failure
    # Developer spends 4 hours debugging instead of 10 minutes of incremental refactoring
  when_applies: Before ANY refactoring. Non-negotiable for legacy code with <70% coverage.
  sources:
    - "Feathers, M. (2004). Working Effectively with Legacy Code. Prentice Hall."
    - "https://martinfowler.com/books/refactoring.html"
    - "https://refactoring.guru/refactoring/when"

- id: REFACT-011
  text: >
    Apply the Strangler Fig pattern for replacing a legacy module in production:
    create an abstraction layer in front of the legacy module, route new traffic
    through the new implementation, keep the old implementation running for existing
    paths, migrate call sites gradually, delete the old implementation only when
    traffic drops to zero. Never do a "big bang" replacement.
  why: >
    Martin Fowler coined "Strangler Fig" after the tropical plant that grows
    around a tree and eventually replaces it. Shopify used this pattern to replace
    their monolithic Rails app with microservices incrementally over 4 years —
    zero downtime, zero data loss. By contrast, a mid-size e-commerce company
    attempted a "big bang" rewrite of their payment module: 9 months of parallel
    development, 3 months of delayed launch, $1.2M over budget, and 47 production
    incidents in the first month because the new system had not been proven under
    real traffic while the old system was still running.
  how_to_do_right: |
    1. Create an interface/abstraction that both old and new implementations satisfy.
    2. Wrap the old implementation behind the interface (do not modify legacy code).
    3. Implement the new version behind the same interface.
    4. Add a feature flag or routing mechanism:
         processor = NEW if feature_flags.enabled('new_payment') else LEGACY
    5. Enable new implementation for 1% of traffic (canary), monitor metrics.
    6. Ramp: 1% → 10% → 50% → 100% with explicit go/no-go criteria at each stage.
    7. Delete the old implementation only after 30 days at 100% traffic with SLA met.
    8. Maintain both implementations simultaneously — do not merge paths until proven.
  severity: high
  technologies:
    lang: [python, typescript, java, go]
  domains:
    domain: [code_quality, architecture]
    concern: [legacy_migration, strangler_fig, incremental_replacement]
  example_good: |
    from abc import ABC, abstractmethod

    class PaymentGateway(ABC):
        @abstractmethod
        def charge(self, amount: float, card_token: str) -> ChargeResult: ...

    class LegacyPaymentGateway(PaymentGateway):
        """Wraps old implementation — unchanged."""
        def charge(self, amount, card_token): return legacy_stripe_v1_charge(amount, card_token)

    class StripeV3Gateway(PaymentGateway):
        """New implementation — being proved in production."""
        def charge(self, amount, card_token): return stripe_v3.charge(amount, card_token)

    def get_payment_gateway(user_id: str) -> PaymentGateway:
        # Feature flag controls traffic split — canary at 1%, ramp gradually
        if feature_flags.is_enabled('stripe_v3', user_id, rollout_pct=10):
            return StripeV3Gateway()
        return LegacyPaymentGateway()
  example_bad: |
    # Big bang: rewrite payment module, disable legacy on launch day
    # No parallel running, no traffic validation, no rollback path
    git checkout -b payment-rewrite
    # 9 months later: merge to main, disable legacy, cross fingers
    # 47 production incidents in month 1
  when_applies: Replacing any production module that handles >1K requests/day or involves data mutation.
  sources:
    - "https://martinfowler.com/bliki/StranglerFigApplication.html"
    - "https://learn.microsoft.com/en-us/azure/architecture/patterns/strangler-fig"
    - "https://shopify.engineering/refactoring-legacy-code-strangler-fig-pattern"

- id: REFACT-012
  text: >
    Use Branch by Abstraction for large-scale refactoring that cannot be done in
    a single commit or sprint: introduce an abstraction layer over the component
    being changed, make all clients use the abstraction, refactor the implementation
    behind the abstraction, remove the abstraction when migration is complete.
    This enables long-running refactoring without long-lived branches.
  why: >
    Long-lived feature branches accumulate merge debt: a 3-month refactoring branch
    diverges so far from main that integration takes weeks and reintroduces bugs
    that were fixed in main. Branch by Abstraction allows the refactoring to happen
    in main, behind an abstraction, while the rest of the team continues delivering
    features. Thoughtworks pioneered this pattern for their internal platform
    migrations — a 6-month database engine migration was done entirely on main,
    with zero merge conflicts, by using this pattern.
  how_to_do_right: |
    1. Identify the component to change (e.g., switch from SQLAlchemy to SQLModel).
    2. Create an interface/protocol over it: class UserRepository(Protocol): ...
    3. Create an adapter wrapping the current implementation:
         class SQLAlchemyUserRepository(UserRepository): ...
    4. Make ALL clients use the UserRepository interface (not direct SQLAlchemy calls).
    5. Implement new component: SQLModelUserRepository(UserRepository).
    6. Use a factory to switch implementations: controlled by a config flag.
    7. Migrate one call site at a time, running tests on each migration.
    8. Once all call sites use the new implementation, delete the old one.
    9. Remove the abstraction layer if it no longer adds value.
    10. Timeline: each step is a separate commit on main — no long-lived branches.
  severity: high
  technologies:
    lang: [python, typescript, java]
  domains:
    domain: [code_quality, architecture]
    concern: [large_scale_refactoring, branch_by_abstraction, continuous_integration]
  example_good: |
    from typing import Protocol

    class UserRepository(Protocol):
        """Abstraction introduced to enable migration."""
        def get(self, user_id: str) -> User | None: ...
        def save(self, user: User) -> None: ...

    class SQLAlchemyUserRepo:
        """Current implementation — continues working during migration."""
        def get(self, user_id: str) -> User | None: return db.query(UserModel).get(user_id)
        def save(self, user: User) -> None: db.session.add(UserModel(**user.__dict__)); db.session.commit()

    class SQLModelUserRepo:
        """New implementation — built and tested in parallel on main."""
        def get(self, user_id: str) -> User | None: ...
        def save(self, user: User) -> None: ...

    def get_user_repo() -> UserRepository:
        if config.USE_SQLMODEL:
            return SQLModelUserRepo()
        return SQLAlchemyUserRepo()
  example_bad: |
    # 3-month branch approach
    git checkout -b refactor/sqlalchemy-to-sqlmodel  # diverges from main
    # 3 months: 847 commits on main, 200 on this branch
    # Integration: 3 weeks of conflict resolution, reintroduced 4 bugs fixed on main
    # Final cost: 3 months work + 3 weeks integration = 3.75 months total
  when_applies: >
    Refactoring that takes more than 1 sprint, involves changing a widely-used
    component, or requires keeping the existing implementation running during migration.
  sources:
    - "https://martinfowler.com/bliki/BranchByAbstraction.html"
    - "https://docs.aws.amazon.com/prescriptive-guidance/latest/modernization-decomposing-monoliths/branch-by-abstraction.html"
    - "https://developer.confluent.io/courses/microservices/branch-by-abstraction/"

- id: REFACT-013
  text: >
    Apply the Mikado Method for complex refactoring with deep dependency chains:
    attempt the refactoring naively, note what breaks (these are your sub-tasks),
    revert (do NOT keep broken state), solve the sub-tasks first, then attempt the
    original refactoring again. This produces a directed acyclic graph (DAG) of
    prerequisites that makes the refactoring safe and tractable.
  why: >
    Complex refactoring often reveals cascading dependencies: you try to change
    function A, which requires changing B, which requires changing C, which reveals
    D needs changing too — 2 hours in, you have 20 broken files and no clear path
    to green. The Mikado Method (from the book by Henriksson and Brattberg, 2012)
    turns this chaos into a clear DAG. Teams at Spotify and Klarna used this method
    for large-scale API migrations: each "attempt and revert" cycle takes 30 minutes;
    the full migration takes 2-3 weeks of focused work instead of 2-3 months of chaos.
  how_to_do_right: |
    1. Write the GOAL at the top of a whiteboard or text file.
    2. Attempt the refactoring naively (do not worry about breaking things yet).
    3. Compile/run tests. Note every error/failure as a prerequisite leaf node.
    4. REVERT all changes (git checkout . or git stash). This is critical.
    5. Pick the SIMPLEST prerequisite and apply the Mikado Method recursively to it.
    6. When a leaf node completes without triggering new prerequisites, commit it.
    7. Work bottom-up: leaves first, goal node last.
    8. Track the DAG explicitly: a text file, GitHub issues, or sticky notes — not in your head.
    9. Any node can be: "done" (committed), "in progress" (the current focus), or
       "blocked" (waiting for prerequisites).
  severity: medium
  technologies:
    lang: [python, typescript, java, go]
  domains:
    domain: [code_quality]
    concern: [large_scale_refactoring, dependency_management, planning]
  example_good: |
    # Mikado Graph (text format):
    # GOAL: Replace dict-based config with Pydantic Settings model [GOAL]
    #   ← All config access must use config.X not config['X'] [PREREQ-1]
    #     ← audit_service.py uses config['db_url'] in 3 places [LEAF-1] ✓ DONE
    #     ← worker.py uses config['queue_url'] in 1 place [LEAF-2] ✓ DONE
    #   ← Pydantic Settings model must define all 47 config keys [PREREQ-2]
    #     ← Document all config keys with types [LEAF-3] ✓ DONE
    #   ← Test suite must mock config via Pydantic not dict [PREREQ-3]
    # → After PREREQ-1, PREREQ-2, PREREQ-3 done: attempt GOAL — now succeeds cleanly.

    # Each LEAF commit: ~30 minutes, CI green, reviewable PR
    # GOAL commit: straightforward, all prerequisites met
  example_bad: |
    # Attempt all changes at once
    git checkout -b refactor/pydantic-config
    # Day 1: edit 23 files, break 47 tests
    # Day 2-5: fix some, break others in cascade
    # Day 7: "I'll just start over" → 1 week wasted
    # Alternatively: give up and leave broken half-refactoring in codebase
  when_applies: >
    Refactoring that fails immediately due to dependency cascade. Any refactoring
    that requires changing more than 5 files to get to green.
  sources:
    - "Henriksson, D. & Brattberg, D. (2012). The Mikado Method. Manning Publications."
    - "https://mikadomethod.info/"
    - "https://martinfowler.com/books/refactoring.html"

- id: REFACT-014
  text: >
    Identify and address Data Clumps: when 3+ fields always appear together in
    multiple classes or function signatures, they form a conceptual unit that
    should be extracted into its own class. Data clumps that travel in method
    parameters are Introduce Parameter Object candidates; data clumps that
    appear in multiple class fields are Extract Class candidates.
  why: >
    Data clumps signal missing domain concepts. A geolocation data clump
    (latitude, longitude, altitude) appearing in 8 classes is not 3 unrelated
    floats — it is a Point3D or GeoCoordinate domain object. Without extracting
    it, adding a new operation (e.g., distance calculation, projection) requires
    adding it to every class that carries the clump. A healthcare system's codebase
    had (patient_id, visit_date, provider_id) as separate parameters in 31 functions.
    Extracting them into a ClinicalEncounter reduced the function count from 31 to
    one canonical method and eliminated a class of "wrong order" parameter bugs.
  how_to_do_right: |
    1. Search for fields that always appear together: grep for patterns like
       (start_date.*end_date|end_date.*start_date) in function signatures and class fields.
    2. Ask: "If I delete one of these, does the remaining group make sense?"
       If not — they are a clump.
    3. Extract to a value object (immutable @dataclass, frozen=True).
    4. Add natural operations to the new class: DateRange.contains(), DateRange.overlap(),
       GeoCoordinate.distance_to(), Money.add().
    5. Money is a classic data clump: (amount, currency) should be Money(amount, currency).
       Never float without currency in financial code.
    6. Replace all occurrences — use sed/grep + manual review to find all sites.
  severity: medium
  technologies:
    lang: [python, typescript, java]
  domains:
    domain: [code_quality]
    concern: [data_clumps, domain_modeling, value_objects]
  example_good: |
    from dataclasses import dataclass
    from decimal import Decimal

    @dataclass(frozen=True)
    class Money:
        """Extracted from (amount: float, currency: str) data clump."""
        amount: Decimal
        currency: str  # ISO 4217

        def __post_init__(self):
            if self.amount < 0:
                raise ValueError("Money amount cannot be negative")

        def add(self, other: 'Money') -> 'Money':
            if self.currency != other.currency:
                raise ValueError(f"Currency mismatch: {self.currency} vs {other.currency}")
            return Money(self.amount + other.amount, self.currency)

        def __str__(self) -> str:
            return f"{self.currency} {self.amount:.2f}"

    # All financial functions now use Money — currency mismatch is a compile-time error
    def charge_card(amount: Money, card_token: str) -> Receipt: ...
  example_bad: |
    # (amount, currency) data clump in 14 function signatures
    def charge_card(amount: float, currency: str, card_token: str): ...
    def refund(amount: float, currency: str, transaction_id: str): ...
    def calculate_fee(amount: float, currency: str) -> float: ...
    # Bug: caller passes (19.99, 'card_tok_123', 'USD') — swapped currency and token
    # Python accepts it (all strings), runtime fails at Stripe API
  when_applies: >
    3+ fields that always appear together in function signatures or class definitions.
    Mandatory for (amount, currency) patterns in financial code.
  sources:
    - "https://refactoring.com/catalog/introduceParameterObject.html"
    - "https://refactoring.guru/smells/data-clumps"
    - "https://martinfowler.com/books/refactoring.html Chapter 3"

- id: REFACT-015
  text: >
    Use automated code smell detection tools as part of CI to catch violations
    continuously: Ruff (Python), ESLint with complexity rules (JS/TS), SonarQube
    Community for multi-language. Configure thresholds: max function length 40 lines,
    max complexity 10, max file length 300 lines, max nesting depth 3.
    Treat new violations as CI failures — do not let the debt grow silently.
  why: >
    Manual code review catches ~60-70% of code smells according to studies on
    inspection effectiveness. Automated tools run on every commit, catch 100% of
    detectable patterns, and provide consistent enforcement regardless of reviewer
    experience. A 2024 study of 200 open-source projects found that projects using
    automated quality gates had 43% lower cyclomatic complexity on average and 31%
    fewer production bugs compared to projects relying only on manual review.
    The key is treating warnings as errors — warning suppression culture
    (# noqa, // eslint-disable) without justification comments indicates tech debt
    being silently accumulated.
  how_to_do_right: |
    1. Python (Ruff — replaces flake8, pylint, isort combined):
         [tool.ruff]
         max-line-length = 88
         [tool.ruff.lint]
         select = ["E", "F", "C90"]    # C90 = McCabe complexity
         [tool.ruff.lint.mccabe]
         max-complexity = 10           # functions with complexity >10 fail CI
    2. TypeScript (ESLint):
         "complexity": ["error", 10],
         "max-lines-per-function": ["error", {"max": 40}],
         "max-depth": ["error", 3],
         "max-params": ["error", 4]
    3. SonarQube Community: run against PR, fail if new issues > 0 (zero new debt policy).
    4. Vulture for dead code: vulture src/ --min-confidence 80 in CI.
    5. Enforce suppression comments require justification:
         # noqa: C901  # justification: this is a parser, complexity is inherent
       CI fails on # noqa without a comment explaining why.
    6. Report quality metrics as PR comments (GitHub Actions → PR comment with
       complexity stats, coverage change, new smells introduced).
  severity: medium
  technologies:
    lang: [python, typescript, javascript]
    framework: [ruff, eslint, sonarqube]
  domains:
    domain: [code_quality]
    concern: [static_analysis, code_smells, ci_quality_gates]
  example_good: |
    # .github/workflows/quality.yml
    # - name: Ruff lint + complexity
    #   run: ruff check src/ --select C90 --max-complexity 10
    # - name: Vulture dead code
    #   run: vulture src/ --min-confidence 80
    # - name: Coverage gate
    #   run: pytest --cov=src --cov-fail-under=90

    # pyproject.toml
    [tool.ruff.lint.mccabe]
    max-complexity = 10  # CI fails on functions with >10 cyclomatic complexity

    # Example: function that would fail CI
    # def complex_function():  # complexity = 12 → CI fails, must refactor
    #     if a:
    #       if b:
    #         for x in xs:
    #           if c or d:  # already at complexity 6 from nesting alone
    #             ...
  example_bad: |
    # No quality gates → debt accumulates invisibly
    # grep -r "noqa" src/ | wc -l → 847 suppressions with no justification
    # No one knows which functions are >40 lines until they debug a production incident in one
    # "We'll refactor later" — later never comes when there's no metric to make it visible
  when_applies: All Python/TypeScript/JavaScript projects. Required before any code review tooling.
  sources:
    - "https://docs.astral.sh/ruff/"
    - "https://eslint.org/docs/rules/complexity"
    - "https://docs.sonarsource.com/sonarqube/latest/"
    - "https://github.com/jendrikseipp/vulture"
