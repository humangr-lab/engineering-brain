layer: rules
domain: ui
knowledge:
- id: VIZ-001
  text: "Chart type selection must match data relationship: bar for comparison, line for trends over time, scatter for correlation — never use pie charts for more than 5 categories."
  why: >
    The wrong chart type makes data unreadable. Pie charts with >5 slices produce segments
    so thin that humans cannot distinguish them — research from Cleveland & McGill shows
    humans are 2x worse at judging pie slice angles than bar lengths. Line charts used for
    categorical data (e.g., countries) imply a continuous relationship that does not exist.
    A dashboard with wrong chart types forces users to stare for 30+ seconds at data they
    should grasp in 3 seconds.
  how_to_do_right: |
    1. Comparison between categories: horizontal bar chart (easier to read labels)
    2. Trend over time: line chart with time on X axis
    3. Part of whole (<=5 categories): donut chart (not pie — donut shows total in center)
    4. Part of whole (>5 categories): stacked bar chart or treemap
    5. Correlation between two variables: scatter plot
    6. Distribution: histogram or box plot
    7. When in doubt, use a bar chart — it is the most universally understood
  severity: high
  technologies:
    lang: [javascript, typescript]
    framework: [react]
    library: [d3, recharts]
  domains:
    domain: [ui, data_engineering]
    concern: [domain_specific]
  example_good: |
    import { BarChart, Bar, LineChart, Line, XAxis, YAxis, Tooltip, ResponsiveContainer } from 'recharts';

    // Comparison: Use bar chart
    function CategoryComparison({ data }) {
      return (
        <ResponsiveContainer width="100%" height={300}>
          <BarChart data={data} layout="vertical"> {/* Horizontal bars for readability */}
            <XAxis type="number" />
            <YAxis dataKey="category" type="category" width={120} />
            <Tooltip />
            <Bar dataKey="value" fill="#3b82f6" />
          </BarChart>
        </ResponsiveContainer>
      );
    }

    // Trend: Use line chart
    function TrendOverTime({ data }) {
      return (
        <ResponsiveContainer width="100%" height={300}>
          <LineChart data={data}>
            <XAxis dataKey="date" />
            <YAxis />
            <Tooltip />
            <Line type="monotone" dataKey="value" stroke="#3b82f6" strokeWidth={2} dot={false} />
          </LineChart>
        </ResponsiveContainer>
      );
    }
  example_bad: |
    // Pie chart with 12 slices — impossible to read
    function MarketShare({ data }) {
      return (
        <PieChart>
          <Pie data={data} dataKey="value" nameKey="company">
            {data.map((_, i) => <Cell key={i} fill={COLORS[i % COLORS.length]} />)}
          </Pie>
          {/* 12 tiny slices, some <3 degrees, visually indistinguishable */}
        </PieChart>
      );
    }
  when_applies: Any dashboard or data visualization where chart type selection impacts data comprehension
  sources: ["https://dl.acm.org/doi/10.1145/22949.22950"]

- id: VIZ-002
  text: "Color palettes must be colorblind-safe with sufficient contrast — 8% of men have color vision deficiency and cannot distinguish red/green."
  why: >
    Using red/green as the only differentiator (profit/loss, good/bad, pass/fail) makes
    your visualization unusable for 1 in 12 male users. In financial applications, this
    means 8% of traders cannot distinguish winning from losing positions. WCAG 2.1 requires
    4.5:1 contrast ratio for text and 3:1 for graphical elements. Without accessible colors,
    you fail compliance audits and lose users.
  how_to_do_right: |
    1. Use a colorblind-safe palette: blue/orange instead of green/red for binary states
    2. Never rely on color alone — add icons, patterns, or labels (up arrow + green, down arrow + red)
    3. Test with a colorblindness simulator (Chrome DevTools > Rendering > Emulate vision deficiencies)
    4. Use established accessible palettes: Wong palette, Okabe-Ito, or Tableau Colorblind 10
    5. Maintain minimum 3:1 contrast ratio between adjacent chart colors
    6. For sequential data, use single-hue gradients (light to dark blue) not rainbow
  severity: high
  technologies:
    lang: [javascript, typescript]
    framework: [react]
    library: [d3, recharts]
  domains:
    domain: [ui, compliance]
    concern: [domain_specific]
  example_good: |
    // Colorblind-safe palette (Wong/Okabe-Ito)
    const ACCESSIBLE_PALETTE = {
      blue: '#0072B2',
      orange: '#E69F00',
      green: '#009E73',
      pink: '#CC79A7',
      yellow: '#F0E442',
      cyan: '#56B4E9',
      red: '#D55E00',
      black: '#000000',
    };

    // Binary states: blue/orange instead of green/red
    const PROFIT_LOSS_COLORS = {
      profit: ACCESSIBLE_PALETTE.blue,    // Not green
      loss: ACCESSIBLE_PALETTE.orange,    // Not red
    };

    function ProfitIndicator({ value }) {
      const isProfit = value >= 0;
      return (
        <span style={{ color: isProfit ? PROFIT_LOSS_COLORS.profit : PROFIT_LOSS_COLORS.loss }}>
          {isProfit ? '▲' : '▼'} {/* Icon as secondary signal, not color alone */}
          {isProfit ? '+' : ''}{value.toFixed(2)}%
        </span>
      );
    }

    // Sequential data: single-hue gradient
    const SEQUENTIAL_BLUE = ['#deebf7', '#9ecae1', '#3182bd', '#08519c'];

    // Test: Chrome DevTools > Rendering > Emulate vision deficiencies > Deuteranopia
  example_bad: |
    // Red/green only — invisible to 8% of men
    const COLORS = { good: '#00ff00', bad: '#ff0000' }; // Pure green/red

    function Status({ isGood }) {
      return (
        <div style={{ color: isGood ? COLORS.good : COLORS.bad }}>
          {/* No icon, no label — color is the ONLY indicator */}
          ●
        </div>
      );
    }
  when_applies: Any data visualization, dashboard, or UI that uses color to convey information
  sources: ["https://www.w3.org/TR/WCAG21/#use-of-color"]

- id: VIZ-003
  text: "Interactive data exploration must support zoom, filter, and drill-down — static charts fail when users need to investigate specific data points."
  why: >
    A dashboard showing 1 year of daily data has 365 points on a single chart. Without
    zoom, individual days are unreadable. Without filter, users cannot focus on specific
    segments. Without drill-down, a spike in the chart cannot be investigated. Studies
    show that interactive visualizations increase data comprehension by 40% and reduce
    time-to-insight by 60% compared to static charts.
  how_to_do_right: |
    1. Zoom: Click-drag to select a time range, double-click to reset (brush selection)
    2. Filter: Provide toggleable legend items and filter controls (date range, category)
    3. Drill-down: Click a data point to see detailed breakdown (e.g., daily -> hourly)
    4. Tooltip: Show all relevant values on hover with formatted numbers
    5. Cross-filtering: Selecting data in one chart filters all charts on the dashboard
    6. Reset: Always provide a "Reset zoom/filter" button with a visible state indicator
  severity: high
  technologies:
    lang: [javascript, typescript]
    framework: [react]
    library: [d3, recharts]
  domains:
    domain: [ui, data_engineering]
    concern: [domain_specific]
  example_good: |
    import { LineChart, Line, XAxis, YAxis, Tooltip, Brush, ResponsiveContainer, Legend } from 'recharts';

    function InteractiveTimeSeries({ data, onDrillDown }) {
      const [visibleSeries, setVisibleSeries] = useState(['revenue', 'users']);
      const [dateRange, setDateRange] = useState({ start: 0, end: data.length - 1 });

      const handleLegendClick = (entry) => {
        setVisibleSeries(prev =>
          prev.includes(entry.value)
            ? prev.filter(s => s !== entry.value)
            : [...prev, entry.value]
        );
      };

      return (
        <div>
          <div className="controls flex gap-2 mb-2">
            <DateRangePicker value={dateRange} onChange={setDateRange} />
            <button onClick={() => setDateRange({ start: 0, end: data.length - 1 })}>
              Reset Zoom
            </button>
          </div>
          <ResponsiveContainer width="100%" height={400}>
            <LineChart data={data} onClick={(e) => e?.activePayload && onDrillDown(e.activePayload[0].payload)}>
              <XAxis dataKey="date" />
              <YAxis />
              <Tooltip
                formatter={(value, name) => [`${value.toLocaleString()}`, name]}
                labelFormatter={(label) => `Date: ${label}`}
              />
              <Legend onClick={handleLegendClick} />
              {visibleSeries.includes('revenue') && (
                <Line type="monotone" dataKey="revenue" stroke="#3b82f6" strokeWidth={2} dot={false} />
              )}
              {visibleSeries.includes('users') && (
                <Line type="monotone" dataKey="users" stroke="#10b981" strokeWidth={2} dot={false} />
              )}
              <Brush dataKey="date" height={30} stroke="#8884d8" /> {/* Zoom control */}
            </LineChart>
          </ResponsiveContainer>
        </div>
      );
    }
  example_bad: |
    // Static chart with no interaction — useless for exploration
    function TimeSeries({ data }) {
      return (
        <LineChart data={data} width={800} height={400}> {/* Fixed size, no zoom, no filter */}
          <Line dataKey="value" />
        </LineChart>
      );
    }
  when_applies: Any dashboard where users need to explore data, not just view it
  sources: ["https://www.nngroup.com/articles/interaction-cost-definition/"]

- id: VIZ-004
  text: "Real-time chart updates must append data points incrementally and use a sliding window — never re-render the entire chart on every update."
  why: >
    Re-rendering a chart with 10,000 data points every second consumes 50-200ms per render,
    causing visible jank and dropping frame rate below 30fps. With multiple charts on a
    dashboard, the entire page becomes unresponsive. Incremental append (adding the latest
    point and removing the oldest) is O(1) regardless of dataset size, maintaining smooth
    60fps animations even with high-frequency data.
  how_to_do_right: |
    1. Use chart libraries with incremental update APIs (lightweight-charts series.update())
    2. Maintain a sliding window: keep last N points (e.g., 500), drop oldest when adding new
    3. Batch incoming data: collect updates for 100ms, then apply all at once in one render
    4. Use requestAnimationFrame for update timing, not setInterval
    5. For SVG-based charts (Recharts, D3): use React.memo with shallow comparison to prevent re-renders
    6. For Canvas-based charts (lightweight-charts): use the native update API, not setData()
  severity: high
  technologies:
    lang: [javascript, typescript]
    framework: [react]
    library: [lightweight-charts, recharts]
  domains:
    domain: [ui, performance, realtime]
    concern: [domain_specific]
  example_good: |
    import { createChart } from 'lightweight-charts';
    import { useRef, useEffect, useCallback } from 'react';

    function RealtimeChart({ maxPoints = 500 }) {
      const chartRef = useRef(null);
      const seriesRef = useRef(null);
      const dataRef = useRef([]);
      const bufferRef = useRef([]);

      useEffect(() => {
        const chart = createChart(containerRef.current, { autoSize: true });
        const series = chart.addLineSeries();
        chartRef.current = chart;
        seriesRef.current = series;

        // Flush buffer at 60fps
        let rafId;
        const flush = () => {
          if (bufferRef.current.length > 0 && seriesRef.current) {
            for (const point of bufferRef.current) {
              seriesRef.current.update(point); // O(1) incremental update
              dataRef.current.push(point);
            }

            // Sliding window: remove old points
            while (dataRef.current.length > maxPoints) {
              dataRef.current.shift();
            }

            // Only reset data if window shifted significantly
            if (dataRef.current.length === maxPoints) {
              seriesRef.current.setData(dataRef.current);
            }

            bufferRef.current = [];
          }
          rafId = requestAnimationFrame(flush);
        };
        rafId = requestAnimationFrame(flush);
        return () => { cancelAnimationFrame(rafId); chart.remove(); };
      }, [maxPoints]);

      const addPoint = useCallback((point) => {
        bufferRef.current.push(point);
      }, []);

      return { addPoint };
    }
  example_bad: |
    // Re-renders entire chart on every update — 10fps with 5000 points
    function RealtimeChart({ data }) {
      return (
        <LineChart data={data}> {/* Re-creates SVG with ALL points every render */}
          <Line dataKey="value" />
        </LineChart>
      );
    }

    // Parent component:
    // setData(prev => [...prev, newPoint]); // Creates new array every 100ms, triggers full re-render
  when_applies: Any dashboard or chart that displays real-time streaming data
  sources: ["https://developer.mozilla.org/en-US/docs/Web/API/Canvas_API"]

- id: VIZ-005
  text: "Dashboard design must place the most important metric in the top-left position and use progressive detail — overview first, details on demand."
  why: >
    Eye-tracking studies show that users scan dashboards in an F-pattern: top-left first,
    then across the top, then down the left side. Placing a low-priority metric in the top-left
    position wastes the most valuable screen real estate. Ben Shneiderman's Visual Information
    Seeking Mantra — "Overview first, zoom and filter, then details on demand" — reduces
    time-to-insight by 50-70%. A cluttered dashboard with 20 charts of equal size forces
    users to hunt for the metric they care about.
  how_to_do_right: |
    1. Top-left: Primary KPI as a large number with trend indicator (e.g., "Revenue: $1.2M ▲12%")
    2. Top row: 3-5 KPI cards showing the most important metrics at a glance
    3. Middle: 1-2 primary charts showing the most important trends
    4. Bottom: Detail tables and secondary charts, hidden behind tabs if >3
    5. Use card hierarchy: primary cards are 2x height of secondary cards
    6. Group related metrics: financial metrics together, usage metrics together
  severity: high
  technologies:
    lang: [javascript, typescript]
    framework: [react]
  domains:
    domain: [ui, data_engineering]
    concern: [dashboards]
  example_good: |
    function Dashboard({ metrics }) {
      return (
        <div className="dashboard grid gap-4 p-4">
          {/* Top row: KPI cards — most important metrics at a glance */}
          <div className="kpi-row grid grid-cols-4 gap-4">
            <KPICard
              title="Total Revenue"
              value={formatCurrency(metrics.revenue)}
              change={metrics.revenueChange}
              priority="primary"  /* Larger, top-left */
              className="col-span-1"
            />
            <KPICard title="Active Users" value={formatNumber(metrics.users)} change={metrics.userChange} />
            <KPICard title="Conversion Rate" value={`${metrics.conversionRate}%`} change={metrics.conversionChange} />
            <KPICard title="Avg Order Value" value={formatCurrency(metrics.aov)} change={metrics.aovChange} />
          </div>

          {/* Middle: Primary chart — the one trend everyone needs to see */}
          <div className="primary-chart">
            <RevenueOverTimeChart data={metrics.dailyRevenue} />
          </div>

          {/* Bottom: Secondary details — on demand */}
          <Tabs defaultTab="breakdown">
            <Tab label="Revenue Breakdown"><RevenueByCategory data={metrics.categoryRevenue} /></Tab>
            <Tab label="User Segments"><UserSegmentTable data={metrics.segments} /></Tab>
            <Tab label="Geography"><GeoMap data={metrics.geoData} /></Tab>
          </Tabs>
        </div>
      );
    }

    function KPICard({ title, value, change, priority = 'secondary' }) {
      return (
        <div className={`kpi-card p-4 rounded-lg border ${priority === 'primary' ? 'bg-blue-50 border-blue-200' : 'bg-white'}`}>
          <span className="text-sm text-gray-500">{title}</span>
          <span className={`block ${priority === 'primary' ? 'text-3xl' : 'text-2xl'} font-bold`}>{value}</span>
          <TrendIndicator change={change} />
        </div>
      );
    }
  example_bad: |
    // All charts same size, no hierarchy, no KPI cards
    function Dashboard({ data }) {
      return (
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr' }}>
          <Chart1 data={data} />
          <Chart2 data={data} /> {/* What's most important? Nobody knows */}
          <Chart3 data={data} />
          <Chart4 data={data} />
          <Chart5 data={data} />
          <Chart6 data={data} /> {/* 6 equal-sized charts — cognitive overload */}
        </div>
      );
    }
  when_applies: Any dashboard that presents multiple metrics or KPIs to users
  sources: ["https://www.nngroup.com/articles/f-shaped-pattern-reading-web-content/"]

- id: VIZ-006
  text: "Data density must match the use case: sparklines for overview and monitoring, full charts for analysis — never show a full chart where a sparkline suffices."
  why: >
    A table with 50 rows and a full-sized chart per row is unusable — it requires 10+ pages
    of scrolling. Sparklines (tiny inline charts, typically 60x20px) show trend at a glance
    without consuming space. Edward Tufte coined the term "sparkline" specifically for this:
    data-intense, design-simple, word-sized graphics. Conversely, using a sparkline where
    users need to read exact values forces them to click into a detail view, adding 2-3
    seconds per data point investigation.
  how_to_do_right: |
    1. Overview/monitoring: sparklines in table cells or KPI cards (60-100px wide, 20-30px tall)
    2. Analysis: full interactive chart with axes, tooltips, and zoom (min 300x200px)
    3. Sparklines show TREND only — no axes, no labels, no gridlines
    4. Full charts show EXACT VALUES — with formatted axes, gridlines, and tooltips
    5. Link sparkline to full chart: click sparkline to open detail view
    6. Sparklines should show the same time range for all items (consistent comparison)
  severity: high
  technologies:
    lang: [javascript, typescript]
    framework: [react]
    library: [recharts, d3]
  domains:
    domain: [ui, data_engineering]
    concern: [dashboards]
  example_good: |
    import { LineChart, Line, ResponsiveContainer } from 'recharts';

    // Sparkline: trend-only, no chrome
    function Sparkline({ data, color = '#3b82f6', width = 80, height = 24 }) {
      return (
        <div style={{ width, height, display: 'inline-block' }}>
          <ResponsiveContainer>
            <LineChart data={data}>
              <Line
                type="monotone"
                dataKey="value"
                stroke={color}
                strokeWidth={1.5}
                dot={false}
                isAnimationActive={false}
              />
              {/* No axes, no grid, no tooltip — pure trend */}
            </LineChart>
          </ResponsiveContainer>
        </div>
      );
    }

    // Table row with sparkline
    function MarketRow({ market }) {
      const trend = market.priceHistory.slice(-30); // Last 30 points
      const changeColor = market.change24h >= 0 ? '#22c55e' : '#ef4444';

      return (
        <tr>
          <td>{market.name}</td>
          <td>${market.price.toFixed(2)}</td>
          <td style={{ color: changeColor }}>{market.change24h.toFixed(1)}%</td>
          <td><Sparkline data={trend} color={changeColor} /></td>
          <td>${formatVolume(market.volume24h)}</td>
        </tr>
      );
    }

    // Full chart: for analysis with all details
    function DetailChart({ data }) {
      return (
        <ResponsiveContainer width="100%" height={400}>
          <LineChart data={data}>
            <XAxis dataKey="date" tickFormatter={formatDate} />
            <YAxis tickFormatter={formatCurrency} />
            <Tooltip formatter={(v) => formatCurrency(v)} />
            <Line type="monotone" dataKey="price" stroke="#3b82f6" strokeWidth={2} />
          </LineChart>
        </ResponsiveContainer>
      );
    }
  example_bad: |
    // Full chart in every table row — scrolls forever, unusable
    function MarketTable({ markets }) {
      return (
        <table>
          {markets.map(m => (
            <tr>
              <td>{m.name}</td>
              <td>
                <LineChart width={400} height={200} data={m.priceHistory}> {/* Way too big for a table */}
                  <XAxis /><YAxis /><Tooltip /><Legend />
                  <Line dataKey="price" />
                </LineChart>
              </td>
            </tr>
          ))}
        </table>
      );
    }
  when_applies: Any dashboard that shows data for multiple items (markets, users, products) in a list or table
  sources: ["https://en.wikipedia.org/wiki/Sparkline"]

- id: VIZ-007
  text: "Charts must be responsive: resize gracefully on window change and simplify on mobile by reducing labels, hiding legends, and increasing touch targets."
  why: >
    A chart designed for a 1920px desktop monitor becomes a mess of overlapping labels on
    a 375px phone screen. Fixed-width charts break layouts and create horizontal scrolling.
    Recharts and D3 charts with hardcoded dimensions render at the wrong size on 50%+ of
    devices. ResponsiveContainer in Recharts or viewBox in SVG solves the sizing issue,
    but you also need to reduce visual complexity on small screens.
  how_to_do_right: |
    1. Always use ResponsiveContainer (Recharts) or viewBox (D3) — never hardcode width/height
    2. On mobile (<768px): hide legend, show only abbreviated axis labels
    3. On mobile: increase tooltip trigger area (touch target 44x44px minimum)
    4. On mobile: reduce tick count on axes (max 4-5 ticks on x-axis)
    5. On tablet (768-1024px): show legend below chart instead of inline
    6. Test by resizing browser window — chart should reflow without overlapping
  severity: high
  technologies:
    lang: [javascript, typescript]
    framework: [react]
    library: [recharts, d3]
  domains:
    domain: [ui, mobile]
    concern: [domain_specific]
  example_good: |
    import { LineChart, Line, XAxis, YAxis, Tooltip, Legend, ResponsiveContainer } from 'recharts';

    function ResponsiveChart({ data }) {
      const isMobile = useMediaQuery('(max-width: 768px)');
      const isTablet = useMediaQuery('(max-width: 1024px)');

      return (
        <ResponsiveContainer width="100%" height={isMobile ? 250 : 400}>
          <LineChart data={data} margin={{ top: 5, right: 5, bottom: 5, left: isMobile ? 0 : 20 }}>
            <XAxis
              dataKey="date"
              tickFormatter={isMobile ? shortDateFormat : fullDateFormat}
              interval={isMobile ? Math.floor(data.length / 4) : 'preserveEnd'}
              tick={{ fontSize: isMobile ? 10 : 12 }}
            />
            <YAxis
              tickFormatter={shortNumber}
              width={isMobile ? 40 : 60}
              tick={{ fontSize: isMobile ? 10 : 12 }}
            />
            <Tooltip
              wrapperStyle={{ zIndex: 1000 }}
              allowEscapeViewBox={{ x: true, y: true }}
            />
            {!isMobile && <Legend />} {/* Hide legend on mobile */}
            <Line
              type="monotone"
              dataKey="value"
              stroke="#3b82f6"
              strokeWidth={isMobile ? 1.5 : 2}
              dot={!isMobile} /* Hide dots on mobile for cleaner look */
              activeDot={{ r: isMobile ? 8 : 5 }} /* Larger touch target on mobile */
            />
          </LineChart>
        </ResponsiveContainer>
      );
    }
  example_bad: |
    // Fixed dimensions — breaks on any screen that isn't exactly 800px wide
    function Chart({ data }) {
      return (
        <LineChart width={800} height={400} data={data}>
          <XAxis dataKey="date" /> {/* All 365 date labels overlap on mobile */}
          <YAxis />
          <Legend /> {/* Takes 30% of chart height on mobile */}
          <Line dataKey="value" dot={true} /> {/* 365 tiny dots impossible to tap */}
        </LineChart>
      );
    }
  when_applies: Any chart or visualization that must work across desktop, tablet, and mobile screens
  sources: ["https://recharts.org/en-US/api/ResponsiveContainer"]

- id: VIZ-008
  text: "Chart animations must convey meaning (showing data entering or transitioning) — never add animation purely for decoration as it delays comprehension."
  why: >
    Decorative animations (spinning pie charts, bouncing bars) delay data comprehension by
    500-2000ms. Users must wait for the animation to complete before they can read the data.
    However, meaningful transitions (bars growing to show magnitude, lines drawing to show
    trend direction) improve comprehension by 20% because they encode additional information.
    prefers-reduced-motion must be respected — some users experience motion sickness.
  how_to_do_right: |
    1. Meaningful animations: bars grow from zero to show magnitude comparison
    2. Meaningful transitions: data point changes smoothly to show direction of change
    3. Duration: 300-500ms for entry animations, 150-200ms for transitions
    4. Easing: ease-out for entry (decelerating), ease-in-out for transitions
    5. Respect prefers-reduced-motion: disable all animations if user prefers reduced motion
    6. No animation on real-time data: data streaming in should appear immediately
  severity: high
  technologies:
    lang: [javascript, typescript]
    framework: [react]
    library: [recharts, d3]
  domains:
    domain: [ui]
    concern: [domain_specific]
  example_good: |
    import { BarChart, Bar, ResponsiveContainer } from 'recharts';

    function AnimatedBarChart({ data }) {
      const prefersReducedMotion = useMediaQuery('(prefers-reduced-motion: reduce)');

      return (
        <ResponsiveContainer width="100%" height={300}>
          <BarChart data={data}>
            <Bar
              dataKey="value"
              fill="#3b82f6"
              isAnimationActive={!prefersReducedMotion} /* Respect user preference */
              animationDuration={400}                   /* Quick enough to not annoy */
              animationEasing="ease-out"                /* Decelerating = natural feel */
            />
          </BarChart>
        </ResponsiveContainer>
      );
    }

    // For real-time data: NO animation — appear immediately
    function RealtimeChart({ data }) {
      return (
        <LineChart data={data}>
          <Line
            dataKey="value"
            isAnimationActive={false} /* Real-time data must appear instantly */
          />
        </LineChart>
      );
    }

    // CSS for reduced motion
    // @media (prefers-reduced-motion: reduce) {
    //   .chart-container * { animation-duration: 0ms !important; transition-duration: 0ms !important; }
    // }
  example_bad: |
    // Decorative animation that delays comprehension
    function FancyChart({ data }) {
      return (
        <PieChart>
          <Pie
            data={data}
            animationDuration={2000}   /* 2 seconds of spinning before data is readable */
            animationBegin={500}       /* Waits 500ms before even starting */
            startAngle={0}
            endAngle={360}
          />
          {/* User stares at spinning pie for 2.5 seconds */}
        </PieChart>
      );
    }
  when_applies: Any data visualization that uses animation or transitions
  sources: ["https://www.w3.org/TR/WCAG21/#animation-from-interactions"]

- id: VIZ-009
  text: "Legends must be placed near the data they describe, use the same colors as the chart elements, and be clickable to toggle series visibility."
  why: >
    A legend placed below a chart forces users to look back and forth between the legend
    and the data — a cognitive load study showed this takes 30% longer to interpret than
    inline labels. Non-clickable legends are a missed interaction opportunity: users
    frequently want to isolate a single series for comparison. Legends with colors that
    do not exactly match the chart lines cause confusion, especially when there are 4+ series.
  how_to_do_right: |
    1. Place legend inline with chart or directly above/below the chart area (not in a separate box)
    2. Use direct labeling when possible: put the series name at the end of the line
    3. Legend colors must exactly match chart element colors (same hex value)
    4. Make legend items clickable to toggle series visibility (click to show/hide)
    5. Show the currently-hovered legend item's data highlighted in the chart
    6. On mobile, place legend below the chart (not side-by-side — too narrow)
  severity: high
  technologies:
    lang: [javascript, typescript]
    framework: [react]
    library: [recharts, d3]
  domains:
    domain: [ui]
    concern: [domain_specific]
  example_good: |
    import { LineChart, Line, Legend, Tooltip, ResponsiveContainer } from 'recharts';
    import { useState } from 'react';

    const SERIES_CONFIG = [
      { key: 'revenue', color: '#3b82f6', label: 'Revenue' },
      { key: 'costs', color: '#ef4444', label: 'Costs' },
      { key: 'profit', color: '#22c55e', label: 'Profit' },
    ];

    function ChartWithInteractiveLegend({ data }) {
      const [hiddenSeries, setHiddenSeries] = useState(new Set());

      const toggleSeries = (key) => {
        setHiddenSeries(prev => {
          const next = new Set(prev);
          next.has(key) ? next.delete(key) : next.add(key);
          return next;
        });
      };

      return (
        <ResponsiveContainer width="100%" height={400}>
          <LineChart data={data}>
            {SERIES_CONFIG.map(series => (
              <Line
                key={series.key}
                dataKey={series.key}
                stroke={series.color}
                strokeWidth={2}
                hide={hiddenSeries.has(series.key)}
                strokeOpacity={hiddenSeries.has(series.key) ? 0.2 : 1}
              />
            ))}
            <Legend
              onClick={(e) => toggleSeries(e.dataKey)}
              formatter={(value, entry) => (
                <span style={{
                  color: hiddenSeries.has(entry.dataKey) ? '#ccc' : entry.color,
                  cursor: 'pointer',
                  textDecoration: hiddenSeries.has(entry.dataKey) ? 'line-through' : 'none',
                }}>
                  {value}
                </span>
              )}
            />
            <Tooltip />
          </LineChart>
        </ResponsiveContainer>
      );
    }
  example_bad: |
    // Non-interactive legend with mismatched colors
    function Chart({ data }) {
      return (
        <div>
          <LineChart data={data}>
            <Line dataKey="revenue" stroke="#3b82f6" />
            <Line dataKey="costs" stroke="#ef4444" />
          </LineChart>
          {/* Legend in a separate div — detached from chart */}
          <div className="legend">
            <span style={{ color: '#0000ff' }}>Revenue</span> {/* Different shade of blue! */}
            <span style={{ color: '#ff0000' }}>Costs</span>    {/* Different shade of red! */}
          </div>
        </div>
      );
    }
  when_applies: Any chart with multiple data series that requires a legend
  sources: ["https://www.nngroup.com/articles/chart-legends/"]

- id: VIZ-010
  text: "Tooltips must show all relevant data for the hovered point, formatted for readability — raw numbers without context are meaningless."
  why: >
    Default tooltips in most charting libraries show unformatted raw values (e.g., "1234567.89")
    which users cannot parse quickly. A tooltip showing "$1.2M" is instantly understood while
    "1234567.89" requires 3-5 seconds of mental parsing. Tooltips are the primary way users
    read exact values from charts — if they are unformatted or missing context (units, date,
    comparison to previous period), users must export data to Excel to get the information.
  how_to_do_right: |
    1. Format numbers for readability: $1.2M not 1234567, 12.5% not 0.125
    2. Include the date/category label in the tooltip (not just the value)
    3. Show all relevant series values at the hovered X position (combined tooltip)
    4. Add comparison context: "vs last month: +12%" when useful
    5. Position tooltip to not overlap the data point (offset by 10px)
    6. Keep tooltip visible when data is near chart edges (allow overflow)
  severity: high
  technologies:
    lang: [javascript, typescript]
    framework: [react]
    library: [recharts, d3]
  domains:
    domain: [ui]
    concern: [domain_specific]
  example_good: |
    function CustomTooltip({ active, payload, label }) {
      if (!active || !payload || payload.length === 0) return null;

      return (
        <div className="custom-tooltip bg-white shadow-lg rounded-lg p-3 border">
          <p className="text-sm font-medium text-gray-700 mb-2">
            {formatDate(label, 'MMM d, yyyy')}
          </p>
          {payload.map((entry) => (
            <div key={entry.dataKey} className="flex justify-between gap-4 text-sm">
              <span style={{ color: entry.color }}>
                <span className="inline-block w-2 h-2 rounded-full mr-1" style={{ backgroundColor: entry.color }} />
                {entry.name}
              </span>
              <span className="font-mono font-medium">
                {formatValue(entry.value, entry.dataKey)}
              </span>
            </div>
          ))}
          {payload[0]?.payload?.previousPeriod && (
            <div className="mt-2 pt-2 border-t text-xs text-gray-500">
              vs prev period: {formatChange(payload[0].value, payload[0].payload.previousPeriod)}
            </div>
          )}
        </div>
      );
    }

    function formatValue(value, key) {
      if (key === 'revenue' || key === 'costs') return `$${(value / 1e6).toFixed(1)}M`;
      if (key === 'conversionRate') return `${(value * 100).toFixed(1)}%`;
      if (key === 'users') return value.toLocaleString();
      return value;
    }

    // Usage:
    // <Tooltip content={<CustomTooltip />} />
  example_bad: |
    // Default tooltip — unformatted, no context
    // Shows: "value: 1234567.89123456" — useless
    function Chart({ data }) {
      return (
        <LineChart data={data}>
          <Line dataKey="value" />
          <Tooltip /> {/* Raw numbers, no formatting, no units */}
        </LineChart>
      );
    }
  when_applies: Any data visualization that uses tooltips to show detailed information on hover
  sources: ["https://www.nngroup.com/articles/tooltip-guidelines/"]

- id: VIZ-011
  text: "Export capabilities must support PNG (for presentations), CSV (for analysis), and PDF (for reports) — each format serves a different audience."
  why: >
    Stakeholders need charts in their tools: executives want PNG in slides, analysts want
    CSV in Excel, compliance teams want PDF reports. Without export, users take screenshots
    (low quality, no data) or manually transcribe numbers (error-prone). A dashboard that
    traps data inside itself becomes a bottleneck — users must visit the dashboard to get
    any information. Export is the difference between a dashboard that people use and one
    they ignore.
  how_to_do_right: |
    1. PNG export: use html2canvas or chart library's built-in toDataURL() for the chart area
    2. CSV export: export the raw data behind the chart, not pixel data
    3. PDF export: use a server-side renderer (Puppeteer, wkhtmltopdf) for consistent output
    4. Include title, date range, and filters applied in the exported file
    5. CSV must include headers and use proper formatting (dates as ISO, numbers without commas)
    6. Add an export button group near each chart (download icon with dropdown)
  severity: high
  technologies:
    lang: [javascript, typescript]
    framework: [react]
  domains:
    domain: [ui, data_engineering]
    concern: [domain_specific]
  example_good: |
    function ExportButton({ chartRef, data, title }) {
      const exportPNG = async () => {
        if (!chartRef.current) return;
        const canvas = await html2canvas(chartRef.current);
        const link = document.createElement('a');
        link.download = `${title}_${new Date().toISOString().split('T')[0]}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      };

      const exportCSV = () => {
        const headers = Object.keys(data[0]).join(',');
        const rows = data.map(row =>
          Object.values(row).map(v =>
            typeof v === 'string' ? `"${v}"` : v
          ).join(',')
        );
        const csv = [headers, ...rows].join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.download = `${title}_${new Date().toISOString().split('T')[0]}.csv`;
        link.href = URL.createObjectURL(blob);
        link.click();
        URL.revokeObjectURL(link.href);
      };

      const exportPDF = async () => {
        const response = await fetch('/api/export/pdf', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, data, dateRange: getCurrentDateRange() }),
        });
        const blob = await response.blob();
        const link = document.createElement('a');
        link.download = `${title}_${new Date().toISOString().split('T')[0]}.pdf`;
        link.href = URL.createObjectURL(blob);
        link.click();
        URL.revokeObjectURL(link.href);
      };

      return (
        <div className="export-group relative">
          <DropdownMenu trigger={<button aria-label="Export chart"><DownloadIcon /></button>}>
            <DropdownItem onClick={exportPNG}>Export as PNG</DropdownItem>
            <DropdownItem onClick={exportCSV}>Export as CSV</DropdownItem>
            <DropdownItem onClick={exportPDF}>Export as PDF</DropdownItem>
          </DropdownMenu>
        </div>
      );
    }
  example_bad: |
    // No export — users take screenshots and manually copy numbers
    function Chart({ data }) {
      return <LineChart data={data}><Line dataKey="value" /></LineChart>;
      // Users: *opens Snipping Tool* ... *opens Excel* ... *types numbers one by one*
    }
  when_applies: Any dashboard or data visualization used for reporting or decision-making
  sources: ["https://www.nngroup.com/articles/export-data/"]

- id: VIZ-012
  text: "Large datasets (>10,000 points) must use Canvas rendering instead of SVG and pre-aggregate data server-side — SVG DOM nodes kill browser performance."
  why: >
    Each SVG element creates a DOM node. A scatter plot with 50,000 points creates 50,000
    DOM nodes, consuming 200-500MB of memory and making the page unresponsive. Chrome DevTools
    will show "Aw, Snap!" crashes at ~100,000 SVG nodes. Canvas renders everything to a
    single bitmap — 50,000 points perform identically to 500 points. Server-side aggregation
    (bucketing, downsampling) reduces data transfer from 5MB to 50KB and renders in 50ms
    instead of 5 seconds.
  how_to_do_right: |
    1. Use Canvas-based libraries for >10,000 points (lightweight-charts, uPlot, Chart.js)
    2. Pre-aggregate on the server: for 1-year daily data, send daily averages not minute data
    3. Use LTTB (Largest Triangle Three Buckets) algorithm for downsampling time series
    4. Implement progressive loading: show aggregated data first, load detail on zoom
    5. Set hard limit: never send >50,000 raw data points to the browser
    6. For scatter plots with millions of points, use WebGL (deck.gl, regl-scatterplot)
  severity: high
  technologies:
    lang: [javascript, typescript]
    framework: [react]
    library: [lightweight-charts, d3]
  domains:
    domain: [ui, performance]
    concern: [domain_specific]
  example_good: |
    // Server-side: LTTB downsampling
    def downsample_lttb(data: list[dict], target_points: int = 500) -> list[dict]:
        """Largest Triangle Three Buckets — preserves visual shape with fewer points."""
        if len(data) <= target_points:
            return data

        bucket_size = (len(data) - 2) / (target_points - 2)
        result = [data[0]]  # Always keep first point

        for i in range(1, target_points - 1):
            bucket_start = int((i - 1) * bucket_size) + 1
            bucket_end = int(i * bucket_size) + 1
            bucket = data[bucket_start:bucket_end]

            # Next bucket average for triangle calculation
            next_start = int(i * bucket_size) + 1
            next_end = min(int((i + 1) * bucket_size) + 1, len(data))
            next_avg_y = sum(d['value'] for d in data[next_start:next_end]) / max(next_end - next_start, 1)

            # Select point with largest triangle area
            prev = result[-1]
            max_area = -1
            max_point = bucket[0]
            for point in bucket:
                area = abs(
                    (prev['timestamp'] - next_end) * (point['value'] - prev['value']) -
                    (prev['timestamp'] - point['timestamp']) * (next_avg_y - prev['value'])
                ) * 0.5
                if area > max_area:
                    max_area = area
                    max_point = point
            result.append(max_point)

        result.append(data[-1])  # Always keep last point
        return result

    # Client-side: Canvas-based chart for large datasets
    // Use lightweight-charts (Canvas) instead of Recharts (SVG)
    import { createChart } from 'lightweight-charts';

    function LargeDatasetChart({ data }) {
      // data can be 50,000+ points — Canvas handles it smoothly
      useEffect(() => {
        const chart = createChart(ref.current, { autoSize: true });
        const series = chart.addLineSeries();
        series.setData(data); // Canvas: 50K points render in <100ms
        chart.timeScale().fitContent();
        return () => chart.remove();
      }, [data]);

      return <div ref={ref} style={{ width: '100%', height: 400 }} />;
    }
  example_bad: |
    // SVG with 50,000 points — browser crashes
    import { ScatterChart, Scatter } from 'recharts';

    function BigDataChart({ data }) {
      // data has 50,000 points — creates 50,000 SVG <circle> elements
      return (
        <ScatterChart width={800} height={400}>
          <Scatter data={data} fill="#3b82f6" /> {/* 200MB+ DOM, page freezes */}
        </ScatterChart>
      );
    }
  when_applies: Any visualization with more than 10,000 data points or high-frequency real-time data
  sources: ["https://developer.mozilla.org/en-US/docs/Web/API/Canvas_API/Tutorial"]
