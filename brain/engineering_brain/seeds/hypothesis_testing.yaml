layer: rules
domain: mathematics
knowledge:
- id: MATH-HYPO-001
  text: >
    Null vs Alternative Hypothesis — Always frame the null hypothesis (H0) as the status quo
    (no effect, no difference) and the alternative (H1) as what you want to prove. Choose
    one-tailed when you have a directional prediction BEFORE seeing data; two-tailed when
    testing for any difference. Never switch from two-tailed to one-tailed after seeing results.
  why: >
    Framing H0/H1 incorrectly inverts the burden of proof: you end up trying to "prove the null"
    which classical hypothesis testing cannot do (failing to reject H0 does NOT mean H0 is true).
    Switching from two-tailed to one-tailed after observing results halves the p-value and inflates
    the false positive rate — this is a form of p-hacking. A pharmaceutical company tested a drug
    with a two-tailed test (p=0.08), then retroactively switched to one-tailed (p=0.04) to claim
    significance. The FDA rejected the study because the directional hypothesis was not pre-specified.
  how_to_do_right: |
    1. Write H0 as equality: H0: mu_treatment = mu_control (no effect).
    2. Write H1 based on your PRIOR theory: H1: mu_treatment > mu_control (one-tailed) or H1: mu_treatment != mu_control (two-tailed).
    3. Choose tail direction BEFORE collecting data and document it in your analysis plan.
    4. Use one-tailed ONLY when: (a) there is strong prior evidence for direction, AND (b) the opposite direction is scientifically meaningless.
    5. Default to two-tailed — it is more conservative (alpha/2 per tail = 0.025 each for alpha=0.05).
    6. Register your hypothesis before running the experiment (pre-registration).
    7. Report exact p-values, not just "p < 0.05".
  severity: high
  technologies:
    lang: [python]
    library: [scipy, statsmodels, numpy]
  domains:
    domain: [mathematics, statistics]
    concern: [data_science, experimentation]
  example_good: |
    import numpy as np
    from scipy import stats

    # Pre-specified hypothesis BEFORE data collection:
    # H0: new_layout has no effect on conversion rate
    # H1: new_layout has DIFFERENT conversion rate (two-tailed)
    # alpha = 0.05

    control = np.array([0.12, 0.15, 0.11, 0.13, 0.14, 0.10, 0.16, 0.12])
    treatment = np.array([0.18, 0.21, 0.17, 0.19, 0.22, 0.16, 0.20, 0.19])

    # Two-tailed t-test (default) — matches our two-tailed H1
    t_stat, p_value = stats.ttest_ind(control, treatment)
    alpha = 0.05

    print(f"t-statistic: {t_stat:.4f}")   # t = -5.29
    print(f"p-value: {p_value:.6f}")       # p = 0.000136
    print(f"Reject H0: {p_value < alpha}") # True — significant difference

    # Report: "Two-tailed independent t-test: t(14)=-5.29, p=0.000136.
    # We reject H0 at alpha=0.05. The treatment group shows higher conversion."
  example_bad: |
    import numpy as np
    from scipy import stats

    control = np.array([0.12, 0.15, 0.11, 0.13, 0.14, 0.10, 0.16, 0.12])
    treatment = np.array([0.14, 0.16, 0.13, 0.15, 0.17, 0.12, 0.15, 0.14])

    # BAD: Two-tailed gives p=0.08 (not significant)
    t_stat, p_value_two = stats.ttest_ind(control, treatment)
    print(f"Two-tailed p = {p_value_two:.4f}")  # 0.08 — not significant

    # BAD: Switching to one-tailed AFTER seeing results to get significance
    p_value_one = p_value_two / 2  # Halving p-value retroactively!
    print(f"One-tailed p = {p_value_one:.4f}")  # 0.04 — now "significant"!

    # This is p-hacking. The directional hypothesis was NOT pre-specified.
    # The researcher saw the data, noticed treatment > control, then
    # retroactively claimed they expected that direction all along.
  when_applies: "Setting up any statistical test, A/B test design, clinical trial design, hypothesis formulation"
  sources:
    - "https://en.wikipedia.org/wiki/Statistical_hypothesis_testing"
    - "https://lakens.github.io/statistical_inferences/"

- id: MATH-HYPO-002
  text: >
    P-values — A p-value is the probability of observing data at least as extreme as
    the actual data, GIVEN that H0 is true. It is NOT the probability that H0 is true,
    NOT the probability of a false positive, and NOT the probability that the result
    is due to chance. Misinterpreting p-values leads to overconfident conclusions.
  why: >
    The American Statistical Association issued a formal statement (2016) because p-value
    misinterpretation is so widespread it distorts scientific literature. Common errors:
    "p=0.03 means there is a 3% chance the null is true" (wrong — it is P(data|H0), not P(H0|data)).
    "p=0.06 means no effect" (wrong — absence of evidence is not evidence of absence).
    "p=0.001 means a large effect" (wrong — with n=1,000,000, even trivial effects produce tiny p-values).
    A study with n=88,000 found that an aspirin dose reduced heart attack risk with p<0.00001, but the
    actual effect was only 0.77% absolute risk reduction — statistically significant but clinically irrelevant.
  how_to_do_right: |
    1. State what the p-value ACTUALLY is: "Probability of data this extreme or more, if H0 is true."
    2. Never say "the probability the null is true is p" — that requires Bayesian analysis with priors.
    3. Report exact p-values (p=0.037), not inequalities (p<0.05).
    4. Always report alongside effect size (Cohen's d, odds ratio, etc.).
    5. A p-value of 0.049 and 0.051 are practically identical — do not treat 0.05 as a cliff.
    6. With large samples (n>10,000), almost everything is "significant" — focus on effect size.
    7. With small samples (n<30), non-significance does not mean no effect — you may lack power.
    8. Consider using confidence intervals instead of or alongside p-values.
  severity: critical
  technologies:
    lang: [python]
    library: [scipy, statsmodels, numpy]
  domains:
    domain: [mathematics, statistics]
    concern: [data_science, experimentation]
  example_good: |
    import numpy as np
    from scipy import stats

    # Correct interpretation of p-value
    control = np.random.normal(loc=100, scale=15, size=50)
    treatment = np.random.normal(loc=108, scale=15, size=50)

    t_stat, p_value = stats.ttest_ind(control, treatment)

    # Effect size: Cohen's d
    pooled_std = np.sqrt((control.std()**2 + treatment.std()**2) / 2)
    cohens_d = (treatment.mean() - control.mean()) / pooled_std

    print(f"Mean difference: {treatment.mean() - control.mean():.2f}")
    print(f"p-value: {p_value:.4f}")
    print(f"Cohen's d: {cohens_d:.2f}")

    # CORRECT interpretation:
    # "If there were truly no difference between groups (H0),
    #  the probability of observing a t-statistic this extreme
    #  or more extreme is p={p_value:.4f}."
    # "The effect size is d={cohens_d:.2f} (medium/large by Cohen's conventions)."

    # Cohen's d benchmarks: 0.2=small, 0.5=medium, 0.8=large
  example_bad: |
    from scipy import stats

    t_stat, p_value = stats.ttest_ind(control, treatment)

    # BAD interpretation 1: "3% chance the null is true"
    print(f"There is a {p_value*100:.1f}% chance there is no real effect")
    # WRONG: p-value is P(data|H0), not P(H0|data)

    # BAD interpretation 2: treating p=0.05 as a binary cliff
    if p_value < 0.05:
        print("Effect is REAL")      # Overconfident
    else:
        print("No effect exists")    # Absence of evidence != evidence of absence

    # BAD interpretation 3: no effect size reported
    # p=0.00001 with n=1,000,000 could mean a 0.01% difference
    # — statistically significant but practically meaningless
  when_applies: "Interpreting any statistical test, reviewing scientific papers, reporting A/B test results"
  sources:
    - "https://en.wikipedia.org/wiki/Statistical_hypothesis_testing"
    - "https://www.amstat.org/asa/files/pdfs/p-valuestatement.pdf"
    - "https://lakens.github.io/statistical_inferences/"

- id: MATH-HYPO-003
  text: >
    Type I Error (False Positive) — A Type I error occurs when you reject a true H0.
    The probability of Type I error is alpha (typically 0.05). Every test you run at
    alpha=0.05 has a 5% chance of a false positive EVEN IF there is no real effect.
    Running 20 tests guarantees roughly 1 false positive on average.
  why: >
    With alpha=0.05 and 20 independent tests, the probability of at least one false positive
    is 1-(0.95)^20 = 0.641 (64.1%). This is the multiple comparisons problem. A 2005 paper
    by John Ioannidis ("Why Most Published Research Findings Are False") showed that in fields
    where many hypotheses are tested with low prior probability, the majority of "significant"
    findings are false positives. In genomics, testing 20,000 genes at alpha=0.05 yields ~1,000
    expected false positives. Without correction, these drown real signals.
  how_to_do_right: |
    1. Set alpha BEFORE running the test (typically 0.05, sometimes 0.01 for high-stakes decisions).
    2. Understand the tradeoff: lower alpha reduces false positives but increases false negatives.
    3. For multiple tests, apply correction (see MATH-HYPO-007 on multiple testing).
    4. Calculate family-wise error rate (FWER): 1 - (1-alpha)^k for k independent tests.
       Example: 10 tests at alpha=0.05 → FWER = 1 - 0.95^10 = 0.401 (40.1%).
    5. For critical domains (medicine, safety), use alpha=0.01 or alpha=0.005.
    6. Always report the number of tests conducted, not just the significant ones.
    7. Consider Bayesian approaches where false positive rate depends on prior probability.
  severity: high
  technologies:
    lang: [python]
    library: [scipy, statsmodels, numpy]
  domains:
    domain: [mathematics, statistics]
    concern: [data_science, experimentation, quality_assurance]
  example_good: |
    import numpy as np
    from scipy import stats

    # Demonstrating Type I error with simulated null data
    # (both groups drawn from SAME distribution — H0 is TRUE)
    np.random.seed(42)
    n_tests = 20
    alpha = 0.05
    false_positives = 0

    for i in range(n_tests):
        group_a = np.random.normal(loc=50, scale=10, size=30)
        group_b = np.random.normal(loc=50, scale=10, size=30)  # Same distribution!
        _, p = stats.ttest_ind(group_a, group_b)
        if p < alpha:
            false_positives += 1
            print(f"Test {i+1}: p={p:.4f} — FALSE POSITIVE (H0 is true!)")

    print(f"\nFalse positives: {false_positives}/{n_tests}")
    print(f"Expected: {n_tests * alpha:.1f}")
    print(f"FWER (theoretical): {1 - (1-alpha)**n_tests:.3f}")  # 0.641

    # Correct approach: acknowledge multiple testing and apply correction
    from statsmodels.stats.multitest import multipletests
    # See MATH-HYPO-007 for correction methods
  example_bad: |
    import numpy as np
    from scipy import stats

    # BAD: Running 20 tests, reporting only the "significant" one
    results = []
    for i in range(20):
        a = np.random.normal(50, 10, 30)
        b = np.random.normal(50, 10, 30)  # Same distribution — no real effect
        _, p = stats.ttest_ind(a, b)
        results.append((i, p))

    # Cherry-picking the smallest p-value
    best = min(results, key=lambda x: x[1])
    print(f"Significant result found! Test {best[0]}: p={best[1]:.4f}")
    # This is p-hacking / multiple comparisons abuse.
    # With 20 tests, you EXPECT ~1 false positive at alpha=0.05.
    # Reporting only the "winner" without mentioning the other 19 tests is fraud.
  when_applies: "Setting significance levels, running multiple statistical tests, evaluating published results"
  sources:
    - "https://en.wikipedia.org/wiki/Type_I_and_type_II_errors"
    - "https://docs.scipy.org/doc/scipy/reference/stats.html"

- id: MATH-HYPO-004
  text: >
    Type II Error (False Negative) and Statistical Power — A Type II error (probability = beta)
    occurs when you fail to reject a false H0. Power = 1 - beta = probability of detecting a
    real effect. ALWAYS run a power analysis BEFORE collecting data to determine required sample
    size. Running an underpowered study (power < 0.80) wastes resources because it is unlikely
    to detect the effect even if it exists.
  why: >
    An underpowered study with power=0.30 has a 70% chance of missing a real effect — you invest
    time and money in data collection, then conclude "no effect" when the effect is there but your
    sample is too small to detect it. A meta-analysis found that the median statistical power in
    neuroscience studies is only 21%, meaning 79% of real effects are missed. This contributes to
    the replication crisis: underpowered studies that happen to find significance (by luck) report
    inflated effect sizes. Power depends on four factors: alpha, sample size, effect size, and
    variance. You can control sample size, so always compute the required n before starting.
  how_to_do_right: |
    1. Run a priori power analysis using statsmodels or G*Power BEFORE data collection.
    2. Specify minimum effect size of interest (e.g., Cohen's d=0.5 for medium effect).
    3. Set power >= 0.80 (standard) or >= 0.90 (for critical decisions).
    4. Use alpha = 0.05 (or your chosen level).
    5. Formula for two-sample t-test: n_per_group = (z_alpha/2 + z_beta)^2 * 2 * sigma^2 / delta^2.
       Example: alpha=0.05 (z=1.96), power=0.80 (z=0.84), sigma=10, delta=5:
       n = (1.96+0.84)^2 * 2 * 100 / 25 = 7.84 * 8 = 62.7 → n=63 per group.
    6. If you cannot achieve desired power, increase sample size or accept a larger minimum detectable effect.
    7. Report power alongside non-significant results: "With n=30 per group and d=0.5, power was only 0.48."
  severity: high
  technologies:
    lang: [python]
    library: [statsmodels, scipy, numpy]
  domains:
    domain: [mathematics, statistics]
    concern: [data_science, experimentation]
  example_good: |
    from statsmodels.stats.power import TTestIndPower

    # A priori power analysis: determine sample size BEFORE experiment
    power_analysis = TTestIndPower()

    # Parameters:
    # - effect_size: Cohen's d = 0.5 (medium effect)
    # - alpha: 0.05
    # - power: 0.80 (80% chance of detecting the effect if it exists)
    # - ratio: 1.0 (equal group sizes)
    n_per_group = power_analysis.solve_power(
        effect_size=0.5,
        alpha=0.05,
        power=0.80,
        ratio=1.0,
        alternative='two-sided'
    )
    print(f"Required sample size: {int(np.ceil(n_per_group))} per group")
    # Output: 64 per group (128 total)

    # Post-hoc: compute achieved power for a completed study
    achieved_power = power_analysis.solve_power(
        effect_size=0.5,
        nobs1=30,  # only had 30 per group
        alpha=0.05,
        ratio=1.0,
        alternative='two-sided'
    )
    print(f"Achieved power with n=30: {achieved_power:.2f}")
    # Output: 0.48 — severely underpowered!
  example_bad: |
    from scipy import stats

    # BAD: No power analysis — just collecting "enough" data by gut feeling
    control = [4.2, 3.8, 4.1, 3.9, 4.0]     # n=5 per group!
    treatment = [4.5, 4.1, 4.3, 4.2, 4.4]

    t_stat, p_value = stats.ttest_ind(control, treatment)
    print(f"p = {p_value:.3f}")  # p = 0.082

    # "No significant difference — the treatment doesn't work."
    # WRONG CONCLUSION: With n=5, power is ~0.10 for a medium effect.
    # You had a 90% chance of MISSING the effect even if it exists.
    # This study proves nothing — it was doomed from the start.
  when_applies: "Planning any experiment, sample size determination, interpreting non-significant results"
  sources:
    - "https://www.statsmodels.org/stable/stats.html#power-and-sample-size-calculations"
    - "https://en.wikipedia.org/wiki/Statistical_power"

- id: MATH-HYPO-005
  text: >
    Confidence Intervals — A 95% confidence interval does NOT mean "95% probability the
    true parameter is in this interval." It means: if you repeated the experiment many times,
    95% of the computed intervals would contain the true parameter. Always report CIs alongside
    point estimates — they convey both the estimate and its precision.
  why: >
    Point estimates without confidence intervals are dangerously incomplete. A mean difference
    of 5.0 could come from CI=[4.8, 5.2] (very precise, reliable) or CI=[-10, 20] (worthless
    precision, could go either way). CIs directly map to hypothesis tests: if the 95% CI for
    a difference does NOT contain 0, the test is significant at alpha=0.05. CIs also reveal
    practical significance: if CI=[0.001, 0.003], the effect is statistically significant but
    practically irrelevant. The frequentist interpretation is counterintuitive — after computing
    CI=[3.2, 7.8], the true mean is either in or not in this specific interval (probability is
    0 or 1). The 95% refers to the procedure, not this particular interval.
  how_to_do_right: |
    1. Always report: "point estimate [95% CI: lower, upper]" — e.g., "mean=5.2 [95% CI: 3.1, 7.3]."
    2. For means: CI = x_bar +/- t_{alpha/2, n-1} * (s / sqrt(n)).
       Example: x_bar=50, s=10, n=25 → CI = 50 +/- 2.064 * (10/5) = 50 +/- 4.13 = [45.87, 54.13].
    3. Wider CI = more uncertainty = need more data.
    4. CI width is proportional to 1/sqrt(n) — doubling precision requires 4x the sample size.
    5. If CI for difference includes 0 → not significant at that confidence level.
    6. Use CI to assess practical significance: is the entire CI within a meaningful range?
    7. For proportions, use Wilson score interval (not Wald) for small samples or extreme proportions.
    8. Never say "95% chance the true value is between X and Y" — say "we are 95% confident."
  severity: high
  technologies:
    lang: [python]
    library: [scipy, statsmodels, numpy]
  domains:
    domain: [mathematics, statistics]
    concern: [data_science, reporting]
  example_good: |
    import numpy as np
    from scipy import stats

    data = np.array([23, 25, 28, 22, 27, 24, 26, 29, 21, 25])
    n = len(data)
    mean = data.mean()           # 25.0
    se = data.std(ddof=1) / np.sqrt(n)  # standard error

    # 95% CI using t-distribution (correct for small n)
    t_crit = stats.t.ppf(0.975, df=n-1)  # 2.262 for df=9
    ci_lower = mean - t_crit * se
    ci_upper = mean + t_crit * se

    print(f"Mean: {mean:.1f}")
    print(f"95% CI: [{ci_lower:.2f}, {ci_upper:.2f}]")
    # Output: Mean: 25.0, 95% CI: [23.12, 26.88]

    # CORRECT interpretation:
    # "The sample mean is 25.0 (95% CI: 23.12 to 26.88).
    #  If we repeated this sampling procedure many times,
    #  95% of the resulting intervals would contain the true mean."

    # Using scipy shortcut:
    ci = stats.t.interval(0.95, df=n-1, loc=mean, scale=se)
    print(f"scipy CI: [{ci[0]:.2f}, {ci[1]:.2f}]")
  example_bad: |
    import numpy as np

    data = np.array([23, 25, 28, 22, 27, 24, 26, 29, 21, 25])

    # BAD 1: Using z instead of t for small samples
    mean = data.mean()
    se = data.std() / np.sqrt(len(data))  # Also wrong: ddof=0 (population std)
    ci = (mean - 1.96 * se, mean + 1.96 * se)  # z=1.96 is for large n only

    # BAD 2: Wrong interpretation
    print(f"There is a 95% probability the true mean is between {ci[0]:.1f} and {ci[1]:.1f}")
    # WRONG: the true mean is either in the interval or not.
    # "95%" refers to the long-run coverage rate of the procedure.

    # BAD 3: Reporting mean without CI
    print(f"The mean is {mean:.1f}")
    # Useless without precision information. Is n=10 or n=10000?
  when_applies: "Reporting any statistical estimate, comparing treatments, scientific publications"
  sources:
    - "https://docs.scipy.org/doc/scipy/reference/stats.html"
    - "https://lakens.github.io/statistical_inferences/"

- id: MATH-HYPO-006
  text: >
    Effect Size — Always compute and report effect size (Cohen's d, r, eta-squared, odds ratio)
    alongside p-values. Effect size measures the MAGNITUDE of the difference, not whether it is
    statistically significant. A p-value answers "is there an effect?" — effect size answers
    "how big is the effect?" With large samples, trivial effects become significant.
  why: >
    P-values are a function of sample size: with n=1,000,000, a difference of 0.01 IQ points
    between groups produces p<0.001 — "highly significant" but completely meaningless. Cohen's d
    normalizes the difference by standard deviation: d = (M1-M2)/SD_pooled. Benchmarks: d=0.2
    (small), d=0.5 (medium), d=0.8 (large). A meta-analysis of educational interventions found
    the average effect size is d=0.4. Reporting only p-values without effect sizes contributed to
    the "significance filter" where only large, noisy effects get published while reliable small
    effects are ignored. The APA Publication Manual (7th ed.) requires effect sizes in all results.
  how_to_do_right: |
    1. Compute Cohen's d for two-group comparisons: d = (M1 - M2) / SD_pooled.
       SD_pooled = sqrt(((n1-1)*s1^2 + (n2-1)*s2^2) / (n1+n2-2)).
    2. Benchmarks (Cohen, 1988): d=0.2 (small), d=0.5 (medium), d=0.8 (large).
    3. For correlations: r itself IS the effect size. r=0.1 (small), r=0.3 (medium), r=0.5 (large).
    4. For ANOVA: report eta-squared (eta^2) or partial eta-squared. eta^2=0.01 (small), 0.06 (medium), 0.14 (large).
    5. For proportions/odds: report odds ratio (OR) or relative risk (RR).
    6. Always report with CI: "d=0.65 [95% CI: 0.32, 0.98]."
    7. Define your minimum effect of interest BEFORE the study: "We consider d<0.3 practically irrelevant."
  severity: high
  technologies:
    lang: [python]
    library: [scipy, statsmodels, numpy]
  domains:
    domain: [mathematics, statistics]
    concern: [data_science, experimentation]
  example_good: |
    import numpy as np
    from scipy import stats

    control = np.array([72, 68, 75, 71, 69, 73, 70, 74, 67, 76])
    treatment = np.array([78, 82, 76, 80, 79, 81, 77, 83, 75, 84])

    # 1. Standard test
    t_stat, p_value = stats.ttest_ind(control, treatment)

    # 2. Cohen's d — effect size
    n1, n2 = len(control), len(treatment)
    s1, s2 = control.std(ddof=1), treatment.std(ddof=1)
    pooled_std = np.sqrt(((n1-1)*s1**2 + (n2-1)*s2**2) / (n1+n2-2))
    cohens_d = (treatment.mean() - control.mean()) / pooled_std

    # 3. CI for Cohen's d (approximate)
    se_d = np.sqrt((n1+n2)/(n1*n2) + cohens_d**2 / (2*(n1+n2)))
    d_ci = (cohens_d - 1.96*se_d, cohens_d + 1.96*se_d)

    print(f"Mean diff: {treatment.mean()-control.mean():.1f}")
    print(f"t({n1+n2-2}) = {t_stat:.2f}, p = {p_value:.4f}")
    print(f"Cohen's d = {cohens_d:.2f} [{d_ci[0]:.2f}, {d_ci[1]:.2f}]")
    # Output: Cohen's d = 2.85 [1.72, 3.98] — very large effect

    # CORRECT: "The treatment significantly improved scores
    # (M=79.5, SD=2.99) vs control (M=71.5, SD=2.99),
    # t(18)=-6.35, p<0.001, d=2.85 [95% CI: 1.72, 3.98]."
  example_bad: |
    from scipy import stats

    # BAD: Reporting only p-value without effect size
    t_stat, p_value = stats.ttest_ind(control, treatment)
    print(f"p = {p_value:.4f}")
    if p_value < 0.05:
        print("The treatment works!")  # How MUCH does it work? Unknown.

    # BAD: Huge sample makes tiny effect "significant"
    import numpy as np
    np.random.seed(42)
    a = np.random.normal(100.0, 15, size=100_000)
    b = np.random.normal(100.1, 15, size=100_000)  # Only 0.1 difference!
    _, p = stats.ttest_ind(a, b)
    print(f"p = {p:.6f}")  # p = 0.0002 — "highly significant"!
    # But Cohen's d = 0.1/15 = 0.0067 — completely negligible effect
  when_applies: "Reporting any statistical comparison, meta-analysis, power analysis, A/B test evaluation"
  sources:
    - "https://en.wikipedia.org/wiki/Effect_size"
    - "https://lakens.github.io/statistical_inferences/"

- id: MATH-HYPO-007
  text: >
    Multiple Testing Correction — When running K simultaneous tests, the family-wise error
    rate (FWER) inflates to 1-(1-alpha)^K. Apply Bonferroni (simple, conservative), Holm-Bonferroni
    (uniformly more powerful than Bonferroni), or Benjamini-Hochberg FDR (controls false discovery
    rate, best for exploratory analysis with many tests).
  why: >
    Testing 20 hypotheses at alpha=0.05 gives a 64.1% chance of at least one false positive.
    Testing 100 genes gives 99.4%. In genomics (20,000+ gene tests), GWAS (millions of SNPs),
    or A/B testing dashboards (dozens of metrics), uncorrected p-values are meaningless.
    Bonferroni divides alpha by K (alpha_adj = 0.05/20 = 0.0025), which controls FWER but is
    very conservative — it increases Type II errors. Holm-Bonferroni is strictly better: it is
    uniformly more powerful while still controlling FWER. For exploratory work where some false
    positives are tolerable, Benjamini-Hochberg FDR (controlling proportion of false discoveries
    to at most q=0.05) is the standard.
  how_to_do_right: |
    1. Bonferroni: Reject if p_i < alpha/K. Simple but conservative.
       Example: 10 tests at alpha=0.05 → adjusted alpha = 0.005.
    2. Holm-Bonferroni (always prefer over Bonferroni):
       - Sort p-values: p_(1) <= p_(2) <= ... <= p_(K).
       - Reject p_(i) if p_(i) < alpha / (K - i + 1).
       - Stop at first non-rejection.
    3. Benjamini-Hochberg FDR (for exploratory analysis):
       - Sort p-values ascending.
       - Find largest i where p_(i) <= (i/K) * q.
       - Reject all hypotheses with rank <= that i.
    4. Use statsmodels.stats.multitest.multipletests() — it implements all methods.
    5. Report BOTH raw and adjusted p-values.
    6. Choose method based on context:
       - Confirmatory (clinical trial) → Holm-Bonferroni (FWER control).
       - Exploratory (genomics, A/B dashboards) → BH FDR.
  severity: critical
  technologies:
    lang: [python]
    library: [statsmodels, scipy]
  domains:
    domain: [mathematics, statistics]
    concern: [data_science, experimentation, genomics]
  example_good: |
    import numpy as np
    from statsmodels.stats.multitest import multipletests

    # 10 p-values from 10 simultaneous tests
    p_values = np.array([
        0.001, 0.008, 0.039, 0.041, 0.042,
        0.060, 0.074, 0.200, 0.510, 0.870
    ])

    # Bonferroni (conservative)
    reject_bonf, pvals_bonf, _, _ = multipletests(p_values, alpha=0.05, method='bonferroni')
    print("Bonferroni adjusted:", pvals_bonf.round(4))
    print("Bonferroni rejects: ", reject_bonf)
    # Only p=0.001 survives (0.001*10=0.01 < 0.05)

    # Holm-Bonferroni (strictly better than Bonferroni)
    reject_holm, pvals_holm, _, _ = multipletests(p_values, alpha=0.05, method='holm')
    print("Holm adjusted:      ", pvals_holm.round(4))
    print("Holm rejects:       ", reject_holm)
    # p=0.001 and p=0.008 survive

    # Benjamini-Hochberg FDR (less conservative, for exploratory)
    reject_bh, pvals_bh, _, _ = multipletests(p_values, alpha=0.05, method='fdr_bh')
    print("BH FDR adjusted:    ", pvals_bh.round(4))
    print("BH FDR rejects:     ", reject_bh)
    # p=0.001, 0.008, 0.039, 0.041, 0.042 survive
  example_bad: |
    import numpy as np
    from scipy import stats

    # BAD: Running 10 tests with no correction
    for i in range(10):
        a = np.random.normal(0, 1, 50)
        b = np.random.normal(0, 1, 50)  # No real effect
        _, p = stats.ttest_ind(a, b)
        if p < 0.05:
            # Reporting each test independently at alpha=0.05
            print(f"Test {i}: Significant! p={p:.4f}")
            # FALSE POSITIVE — no correction applied.
            # FWER = 1 - 0.95^10 = 40.1% chance of at least one false positive.

    # Also BAD: Using Bonferroni when Holm is available
    # Bonferroni is uniformly dominated by Holm — there is NEVER a reason
    # to use Bonferroni over Holm. Holm is always >= as powerful.
  when_applies: "Any analysis involving more than one hypothesis test, A/B testing dashboards, genomics, feature selection"
  sources:
    - "https://www.statsmodels.org/stable/generated/statsmodels.stats.multitest.multipletests.html"
    - "https://en.wikipedia.org/wiki/Multiple_comparisons_problem"

- id: MATH-HYPO-008
  text: >
    A/B Testing — Calculate required sample size BEFORE starting. Never peek at results
    mid-experiment and stop early on "significance." The peeking problem inflates false
    positive rates to 20-30%. Use sequential testing (SPRT or alpha-spending) if you need
    to monitor results continuously. Ensure randomization is truly random.
  why: >
    The peeking problem: if you check p-values after every 100 users and stop when p<0.05,
    you are running multiple tests on accumulating data. Simulation shows this inflates the
    actual false positive rate from 5% to 26% for daily checks over 30 days. An e-commerce
    company stopped an A/B test after 3 days because p=0.03, shipped the "winning" variant,
    then saw conversion DROP over the next month — the early "significance" was a random
    fluctuation amplified by repeated peeking. Sequential testing methods (like the Wald SPRT
    or O'Brien-Fleming alpha-spending) allow continuous monitoring while controlling the overall
    false positive rate by using stricter significance thresholds at early looks.
  how_to_do_right: |
    1. Power analysis FIRST: determine n per group for your minimum detectable effect (MDE).
       Example: baseline=10% conversion, MDE=1% absolute lift, alpha=0.05, power=0.80 → n=14,746 per group.
    2. Set runtime: calculate days needed = n / (daily_traffic / 2). Run for FULL duration.
    3. Do NOT peek at p-values mid-test unless using sequential testing.
    4. If you must monitor continuously, use alpha-spending (O'Brien-Fleming):
       - 5 looks: alpha per look = [0.00001, 0.0013, 0.0085, 0.0228, 0.0417].
    5. Check for Simpson's paradox: segment by platform/country/day-of-week.
    6. Run for at least 1 full business cycle (typically 1-2 weeks minimum).
    7. Verify randomization: check that control/treatment are balanced on key covariates.
    8. Use intention-to-treat (ITT): analyze all users assigned, not just those who completed.
  severity: critical
  technologies:
    lang: [python]
    library: [scipy, statsmodels, numpy]
  domains:
    domain: [mathematics, statistics]
    concern: [data_science, experimentation, product]
  example_good: |
    import numpy as np
    from statsmodels.stats.proportion import proportions_ztest
    from statsmodels.stats.power import zt_ind_solve_power

    # Step 1: Power analysis BEFORE experiment
    baseline_rate = 0.10  # 10% conversion
    mde = 0.01            # Minimum detectable effect: 1% absolute
    effect_size = mde / np.sqrt(baseline_rate * (1 - baseline_rate))  # ~0.033

    n_per_group = zt_ind_solve_power(
        effect_size=effect_size,
        alpha=0.05,
        power=0.80,
        alternative='two-sided'
    )
    print(f"Required n per group: {int(np.ceil(n_per_group))}")
    # ~14,746 per group

    # Step 2: Run experiment for FULL duration, then analyze
    # (Do NOT peek mid-experiment)
    control_conversions = 1480     # 1480/14746 = 10.04%
    treatment_conversions = 1625   # 1625/14746 = 11.02%
    n_per = 14746

    z_stat, p_value = proportions_ztest(
        count=[treatment_conversions, control_conversions],
        nobs=[n_per, n_per],
        alternative='two-sided'
    )

    lift = (treatment_conversions - control_conversions) / control_conversions * 100
    print(f"Lift: {lift:.1f}%, p-value: {p_value:.4f}")
  example_bad: |
    from scipy import stats

    # BAD: Peeking at p-values daily and stopping early
    day = 0
    while True:
        day += 1
        control_data = get_data('control', day)  # Accumulating data
        treatment_data = get_data('treatment', day)
        _, p = stats.ttest_ind(control_data, treatment_data)

        if p < 0.05:
            print(f"Day {day}: Significant! p={p:.4f}. Shipping treatment!")
            break  # STOP — this inflates false positive rate to ~26%

        if day > 30:
            print("No significant result after 30 days. Stopping.")
            break

    # This is the "peeking problem." With daily checks for 30 days,
    # actual Type I error rate is ~26%, not 5%.
    # The early "significant" result is likely a random fluctuation.
  when_applies: "Website A/B testing, product experimentation, marketing campaign testing, feature rollouts"
  sources:
    - "https://docs.scipy.org/doc/scipy/reference/stats.html"
    - "https://www.statsmodels.org/stable/index.html"

- id: MATH-HYPO-009
  text: >
    Chi-Squared Test — Use chi-squared test of independence for categorical data: testing
    whether two categorical variables are associated. Requires expected cell counts >= 5
    in at least 80% of cells. For 2x2 tables with small samples, use Fisher's exact test
    instead. Never use chi-squared on continuous data or percentages (use the raw counts).
  why: >
    The chi-squared test assumes the test statistic follows a chi-squared distribution,
    which is an approximation valid only when expected frequencies are sufficiently large.
    With expected counts below 5, the approximation breaks down and p-values become unreliable
    (typically anti-conservative, yielding too many false positives). A common mistake is feeding
    proportions (0.45, 0.55) instead of counts (45, 55) — the chi-squared statistic scales with
    n, so percentages produce nonsensical results. Another error is using chi-squared on paired/
    repeated measures data — use McNemar's test instead.
  how_to_do_right: |
    1. Construct a contingency table of RAW COUNTS (not percentages, not proportions).
    2. Compute expected counts: E_ij = (row_i_total * col_j_total) / grand_total.
    3. Check: at least 80% of cells have E_ij >= 5. No cell has E_ij < 1.
    4. If violated, use Fisher's exact test (for 2x2) or combine categories.
    5. Chi-squared statistic: X^2 = sum((O_ij - E_ij)^2 / E_ij).
    6. df = (rows - 1) * (cols - 1). For 2x2: df=1.
    7. For 2x2 with moderate n (40-200), apply Yates' continuity correction.
    8. Report: X^2(df, N=total) = value, p = value.
    9. Effect size: Cramer's V = sqrt(X^2 / (n * min(r-1, c-1))).
  severity: medium
  technologies:
    lang: [python]
    library: [scipy, statsmodels]
  domains:
    domain: [mathematics, statistics]
    concern: [data_science, survey_analysis]
  example_good: |
    import numpy as np
    from scipy.stats import chi2_contingency, fisher_exact

    # Contingency table: Treatment outcome by group
    # Rows: Control, Treatment
    # Cols: Recovered, Not Recovered
    observed = np.array([
        [45, 55],    # Control: 45 recovered, 55 not
        [62, 38],    # Treatment: 62 recovered, 38 not
    ])

    # Check expected frequencies
    chi2, p_value, dof, expected = chi2_contingency(observed)

    print(f"Expected frequencies:\n{expected}")
    print(f"Min expected: {expected.min():.1f}")  # Must be >= 5
    print(f"Chi2({dof}) = {chi2:.2f}, p = {p_value:.4f}")

    # Effect size: Cramer's V
    n = observed.sum()
    k = min(observed.shape) - 1
    cramers_v = np.sqrt(chi2 / (n * k))
    print(f"Cramer's V = {cramers_v:.3f}")
    # V: 0.1=small, 0.3=medium, 0.5=large (for 2x2)

    # For small samples (expected < 5), use Fisher's exact test
    small_table = np.array([[3, 7], [8, 2]])
    odds_ratio, p_fisher = fisher_exact(small_table)
    print(f"Fisher exact: OR={odds_ratio:.2f}, p={p_fisher:.4f}")
  example_bad: |
    from scipy.stats import chi2_contingency
    import numpy as np

    # BAD 1: Using percentages instead of counts
    proportions = np.array([
        [0.45, 0.55],
        [0.62, 0.38],
    ])
    chi2, p, _, _ = chi2_contingency(proportions)
    # WRONG: chi2 scales with n. Proportions give tiny chi2 and p~1.
    # Use raw counts: [[45, 55], [62, 38]]

    # BAD 2: Small expected frequencies without Fisher's exact
    small_data = np.array([
        [2, 1],    # Expected frequencies will be < 5
        [3, 4],
    ])
    chi2, p, _, expected = chi2_contingency(small_data)
    print(f"Expected: {expected}")  # Many cells < 5
    # Chi-squared approximation is INVALID here. Use Fisher's exact test.

    # BAD 3: Using chi-squared on continuous data
    # "Is height associated with weight?" — use correlation, not chi-squared
  when_applies: "Testing association between categorical variables, survey data analysis, A/B test with categorical outcomes"
  sources:
    - "https://docs.scipy.org/doc/scipy/reference/generated/scipy.stats.chi2_contingency.html"
    - "https://en.wikipedia.org/wiki/Chi-squared_test"

- id: MATH-HYPO-010
  text: >
    T-test — Use independent (unpaired) t-test for comparing means of TWO independent groups.
    Use paired t-test for before/after measurements on the SAME subjects. Assumptions: (1)
    data is approximately normal (or n>=30 by CLT), (2) for independent t-test: equal or
    unequal variances (use Welch's t-test by default as it handles both). Always check
    assumptions before running.
  why: >
    Using an independent t-test on paired data ignores the within-subject correlation, inflating
    variance and reducing power. A study comparing blood pressure before/after treatment used
    an independent t-test (p=0.12) instead of a paired t-test (p=0.003) and incorrectly concluded
    the treatment was ineffective. The paired test was appropriate because each patient served as
    their own control. Conversely, using a paired t-test on independent samples is invalid because
    the pairing is meaningless. Regarding variance assumptions: Student's t-test assumes equal
    variances; Welch's t-test does not. Welch's is robust and performs well even when variances are
    equal, so it should be the default (scipy uses Welch's by default: equal_var=False since v1.6).
  how_to_do_right: |
    1. Independent groups → scipy.stats.ttest_ind() with equal_var=False (Welch's t-test, default).
    2. Paired data (same subjects measured twice) → scipy.stats.ttest_rel().
    3. Check normality: Shapiro-Wilk test (n<50) or visual (Q-Q plot, histogram for n>=50).
       If non-normal: use Mann-Whitney U (independent) or Wilcoxon signed-rank (paired).
    4. Check variance equality with Levene's test (informational, use Welch's regardless).
    5. For n1 != n2 (unequal group sizes), always use Welch's t-test.
    6. Report: t(df) = value, p = value, 95% CI for difference, Cohen's d.
    7. For one-sample t-test (compare mean to known value): scipy.stats.ttest_1samp().
  severity: high
  technologies:
    lang: [python]
    library: [scipy, statsmodels, numpy]
  domains:
    domain: [mathematics, statistics]
    concern: [data_science, experimentation]
  example_good: |
    import numpy as np
    from scipy import stats

    # Example 1: Independent t-test (Welch's — default and preferred)
    group_a = np.array([85, 90, 78, 92, 88, 76, 95, 89, 82, 91])
    group_b = np.array([79, 73, 82, 71, 77, 68, 80, 74, 69, 75])

    t_stat, p_value = stats.ttest_ind(group_a, group_b, equal_var=False)
    print(f"Independent (Welch's): t={t_stat:.3f}, p={p_value:.4f}")
    # t=3.838, p=0.0014

    # Example 2: Paired t-test (same subjects, before/after)
    before = np.array([130, 142, 135, 148, 138, 145, 140, 150, 133, 147])
    after = np.array([125, 135, 128, 140, 132, 138, 134, 142, 127, 139])

    t_stat, p_value = stats.ttest_rel(before, after)
    print(f"Paired: t={t_stat:.3f}, p={p_value:.4f}")
    # t=7.937, p=0.00002

    # Check normality of differences (for paired test)
    differences = before - after
    _, p_shapiro = stats.shapiro(differences)
    print(f"Shapiro-Wilk (differences): p={p_shapiro:.4f}")
    # p>0.05 → normality assumption holds
  example_bad: |
    from scipy import stats
    import numpy as np

    # BAD: Using independent t-test on paired data
    before = np.array([130, 142, 135, 148, 138, 145, 140, 150, 133, 147])
    after = np.array([125, 135, 128, 140, 132, 138, 134, 142, 127, 139])

    # WRONG: treating before/after as independent groups
    t_stat, p_value = stats.ttest_ind(before, after)
    print(f"Independent t-test: p={p_value:.4f}")  # p=0.098 (not significant!)

    # CORRECT: paired t-test (same subjects)
    t_stat, p_value = stats.ttest_rel(before, after)
    print(f"Paired t-test: p={p_value:.5f}")  # p=0.00002 (highly significant!)

    # The independent test MISSED the effect because it ignores
    # within-subject correlation, inflating the error variance.
  when_applies: "Comparing two group means, before/after studies, treatment vs control comparisons"
  sources:
    - "https://docs.scipy.org/doc/scipy/reference/generated/scipy.stats.ttest_ind.html"
    - "https://en.wikipedia.org/wiki/Student%27s_t-test"

- id: MATH-HYPO-011
  text: >
    Mann-Whitney U Test — Use Mann-Whitney U (Wilcoxon rank-sum) as the non-parametric
    alternative to the independent t-test when normality assumption is violated. It tests
    whether one distribution is stochastically greater than the other. It does NOT test
    for mean differences — it tests for distributional differences (specifically, it tests
    P(X>Y) != 0.5). Report the U statistic and the rank-biserial correlation as effect size.
  why: >
    When data is heavily skewed, has outliers, is ordinal (Likert scales), or comes from unknown
    distributions, the t-test's normality assumption may not hold (especially for small n<30).
    The Mann-Whitney U test uses ranks instead of raw values, making it robust to outliers and
    distributional violations. A common mistake is interpreting it as a test of medians — it only
    tests medians if the two distributions have the same shape (which is rarely verified).
    More precisely, it tests whether P(X>Y) = 0.5 for randomly drawn X and Y from the two groups.
    With identical shapes, this reduces to a test of location shift (medians). For Likert-scale
    data (1-5 ratings), the t-test is technically inappropriate (ordinal data), and Mann-Whitney
    is the correct choice.
  how_to_do_right: |
    1. Use when: data is non-normal, ordinal, has outliers, or n<30 with unknown distribution.
    2. scipy.stats.mannwhitneyu(x, y, alternative='two-sided').
    3. Effect size: rank-biserial correlation r = 1 - (2*U)/(n1*n2). r=0.1 small, 0.3 medium, 0.5 large.
    4. Report: U = value, p = value, r_rb = value.
    5. For paired non-parametric: use Wilcoxon signed-rank test (scipy.stats.wilcoxon).
    6. Check if distributions have the same shape (visual inspection) before interpreting as median test.
    7. If distributions differ in shape, report: "The distributions differ significantly" (not "medians differ").
  severity: medium
  technologies:
    lang: [python]
    library: [scipy, numpy]
  domains:
    domain: [mathematics, statistics]
    concern: [data_science, experimentation]
  example_good: |
    import numpy as np
    from scipy import stats

    # Skewed data: response times (right-skewed, outliers common)
    group_a = np.array([120, 135, 150, 180, 200, 250, 310, 450, 800, 1200])
    group_b = np.array([90, 100, 110, 125, 130, 140, 155, 170, 190, 210])

    # Check normality — likely violated due to skew
    _, p_norm_a = stats.shapiro(group_a)
    _, p_norm_b = stats.shapiro(group_b)
    print(f"Shapiro-Wilk: group_a p={p_norm_a:.4f}, group_b p={p_norm_b:.4f}")
    # p < 0.05 → normality violated

    # Mann-Whitney U test (non-parametric)
    u_stat, p_value = stats.mannwhitneyu(group_a, group_b, alternative='two-sided')

    # Effect size: rank-biserial correlation
    n1, n2 = len(group_a), len(group_b)
    r_rb = 1 - (2 * u_stat) / (n1 * n2)

    print(f"U = {u_stat:.0f}, p = {p_value:.4f}")
    print(f"Rank-biserial r = {r_rb:.3f}")
    print(f"Median A: {np.median(group_a):.0f}, Median B: {np.median(group_b):.0f}")

    # For Likert-scale data (ordinal)
    ratings_old = np.array([3, 4, 2, 5, 3, 4, 2, 3, 4, 5])
    ratings_new = np.array([4, 5, 4, 5, 4, 5, 3, 4, 5, 5])
    u, p = stats.mannwhitneyu(ratings_old, ratings_new, alternative='two-sided')
    print(f"Likert comparison: U={u:.0f}, p={p:.4f}")
  example_bad: |
    import numpy as np
    from scipy import stats

    # BAD: Using t-test on heavily skewed data with outliers
    group_a = np.array([120, 135, 150, 180, 200, 250, 310, 450, 800, 1200])
    group_b = np.array([90, 100, 110, 125, 130, 140, 155, 170, 190, 210])

    # Normality is violated (skew, outliers) — t-test is inappropriate
    t_stat, p_value = stats.ttest_ind(group_a, group_b)
    print(f"t-test p = {p_value:.4f}")
    # Outlier 1200 in group_a dominates the mean, inflating variance
    # and making the test unreliable.

    # BAD: Using t-test on ordinal data (Likert 1-5 scale)
    ratings = np.array([3, 4, 2, 5, 3])
    # t-test assumes interval scale — Likert is ordinal
    # The "distance" between 1-2 is not necessarily equal to 4-5
  when_applies: "Non-normal data, ordinal data (Likert scales), response time analysis, data with outliers, small samples"
  sources:
    - "https://docs.scipy.org/doc/scipy/reference/generated/scipy.stats.mannwhitneyu.html"
    - "https://en.wikipedia.org/wiki/Mann%E2%80%93Whitney_U_test"

- id: MATH-HYPO-012
  text: >
    Statistical Significance vs Practical Significance — A statistically significant result
    (p<0.05) can be practically meaningless, and a non-significant result (p>0.05) can hide
    a practically important effect that you lacked power to detect. Always define what
    constitutes a "meaningful" effect BEFORE running the study, and evaluate results against
    that practical threshold, not just p<0.05.
  why: >
    Google ran an A/B test with millions of users that found 41 shades of blue performed
    differently with p<0.0001. But the practical difference in click-through rate was <0.1%.
    Was it worth the engineering effort to implement? Conversely, a startup's A/B test with
    n=200 per group found a 5% conversion lift (practically huge for their business) but p=0.12
    (not "significant" at alpha=0.05). They abandoned a winning variant because they treated
    p<0.05 as an absolute truth gate rather than one input into a decision. The gap between
    statistical and practical significance is especially dangerous in large-sample contexts
    (big data, web analytics) where trivial effects become "significant," and in small-sample
    contexts (startups, clinical pilots) where real effects appear "non-significant."
  how_to_do_right: |
    1. BEFORE the study, define your MCID (Minimum Clinically Important Difference) or MDE
       (Minimum Detectable Effect). Example: "A conversion lift < 0.5% is not worth shipping."
    2. Evaluate effect size (Cohen's d, relative lift) against your practical threshold.
    3. If p<0.05 but effect < MCID: "Statistically significant but practically irrelevant."
    4. If p>0.05 but CI includes practically important effects: "Underpowered — need more data."
    5. If p>0.05 and CI upper bound < MCID: "Confidently no meaningful effect."
    6. Use equivalence testing (TOST — Two One-Sided Tests) to PROVE no meaningful difference.
    7. For business decisions, consider expected value: lift * revenue * probability.
    8. Always visualize: plot effect size CI against your practical significance threshold.
  severity: high
  technologies:
    lang: [python]
    library: [scipy, statsmodels, numpy]
  domains:
    domain: [mathematics, statistics]
    concern: [data_science, experimentation, product]
  example_good: |
    import numpy as np
    from scipy import stats

    # Scenario: Large sample — trivial effect is "significant"
    np.random.seed(42)
    control = np.random.normal(10.00, 2.0, size=500_000)
    treatment = np.random.normal(10.02, 2.0, size=500_000)  # 0.02 diff

    t_stat, p_value = stats.ttest_ind(control, treatment)
    diff = treatment.mean() - control.mean()
    pooled_std = np.sqrt((control.std()**2 + treatment.std()**2) / 2)
    d = diff / pooled_std

    print(f"Mean diff: {diff:.4f}")
    print(f"p-value: {p_value:.6f}")   # p < 0.001 — "significant"!
    print(f"Cohen's d: {d:.4f}")       # d = 0.01 — negligible

    # CORRECT decision framework:
    mcid = 0.10  # Minimum meaningful difference for business
    print(f"\nPractical significance threshold: {mcid}")
    print(f"Effect ({diff:.4f}) < MCID ({mcid}) → NOT practically significant")
    print("Decision: Do NOT ship this change despite p < 0.001")

    # Equivalence test (TOST): prove effect is within [-MCID, +MCID]
    from statsmodels.stats.weightstats import ttost_ind
    p_lower, p_upper, _ = ttost_ind(control, treatment, -mcid, mcid)
    print(f"\nTOST p-values: lower={p_lower:.4f}, upper={p_upper:.4f}")
    print(f"Equivalence established: {max(p_lower, p_upper) < 0.05}")
  example_bad: |
    from scipy import stats

    # BAD 1: Shipping a "significant" but meaningless change
    # p < 0.001 with n=500,000 but lift = 0.002%
    if p_value < 0.05:
        print("Deploy to production!")  # Wasting engineering resources
        # A 0.002% improvement on a $1M/year product = $20/year. Not worth it.

    # BAD 2: Killing a promising variant because p > 0.05
    # n=200, lift=5% (huge for the business), but p=0.12
    if p_value > 0.05:
        print("No effect. Revert.")
        # With n=200 and d=0.3, power was only ~0.35
        # You had a 65% chance of missing this real effect!
        # Correct action: collect more data or make a risk-based decision.
  when_applies: "A/B test decisions, clinical trial interpretation, any scenario where 'significant' results drive business/clinical actions"
  sources:
    - "https://lakens.github.io/statistical_inferences/"
    - "https://en.wikipedia.org/wiki/Clinical_significance"

- id: MATH-HYPO-013
  text: >
    Replication Crisis and Pre-Registration — At least 50% of psychology findings and
    significant fractions of biomedical results fail to replicate. Pre-register your
    hypotheses, analysis plan, and sample size BEFORE data collection. Focus on effect
    sizes with confidence intervals rather than binary significant/not-significant.
    Report ALL analyses conducted, not just the ones that "worked."
  why: >
    The Open Science Collaboration (2015) replicated 100 psychology studies: only 36% replicated
    with significant results (vs. 97% in originals). Effect sizes were on average half the original.
    Key causes: (1) Publication bias — journals publish positive results, creating a "file drawer"
    of failed replications. (2) P-hacking — running analyses until p<0.05 (flexible stopping,
    outcome switching, covariate fishing). (3) HARKing — Hypothesizing After Results are Known,
    then presenting post-hoc findings as a priori. (4) Low statistical power — median power in
    neuroscience is 21%. Pre-registration on platforms like OSF or AsPredicted locks your analysis
    plan, making p-hacking and HARKing impossible. Registered Reports (journals review the plan
    BEFORE data collection) guarantee publication regardless of results.
  how_to_do_right: |
    1. Pre-register on OSF (osf.io) or AsPredicted (aspredicted.org) BEFORE data collection.
    2. Specify: (a) exact hypotheses, (b) sample size with power justification, (c) exclusion criteria, (d) exact statistical tests, (e) primary vs. exploratory analyses.
    3. Report ALL pre-registered analyses, even non-significant ones.
    4. Clearly label any analysis not in the pre-registration as "exploratory."
    5. Focus on effect sizes + CIs, not just p-values.
    6. Share raw data and analysis code (open science).
    7. Use Registered Reports format when possible (peer review before data collection).
    8. For A/B tests: document the analysis plan in a design doc before starting the test.
  severity: high
  technologies:
    lang: [python]
    library: [scipy, statsmodels, numpy]
  domains:
    domain: [mathematics, statistics]
    concern: [data_science, experimentation, research_integrity]
  example_good: |
    """
    Example: Pre-registered analysis plan for an A/B test

    PRE-REGISTRATION (documented BEFORE experiment):
    - H0: new_checkout has no effect on purchase completion rate
    - H1: new_checkout has DIFFERENT purchase completion rate (two-tailed)
    - Primary metric: purchase_completion_rate
    - Secondary metrics: time_to_purchase, cart_abandonment_rate
    - Sample size: 5,000 per group (power=0.80, MDE=2%, alpha=0.05)
    - Duration: 14 days minimum (full business cycles)
    - Exclusion: bot traffic (>100 requests/min)
    - Analysis: two-proportion z-test, BH correction for 3 metrics
    - Decision rule: ship if primary metric p<0.05 AND lift>1%
    """
    import numpy as np
    from statsmodels.stats.proportion import proportions_ztest
    from statsmodels.stats.multitest import multipletests

    # Post-experiment: run EXACTLY the pre-registered analysis
    metrics = {
        'purchase_completion': {'control': (480, 5000), 'treatment': (540, 5000)},
        'time_to_purchase': None,  # analyzed separately (continuous)
        'cart_abandonment': {'control': (1200, 5000), 'treatment': (1100, 5000)},
    }

    p_values = []
    for name, data in metrics.items():
        if data is None:
            continue
        c_count, c_n = data['control']
        t_count, t_n = data['treatment']
        _, p = proportions_ztest([t_count, c_count], [t_n, c_n])
        p_values.append(p)
        lift = (t_count/t_n - c_count/c_n) / (c_count/c_n) * 100
        print(f"{name}: lift={lift:.1f}%, p={p:.4f}")

    # Apply BH correction (pre-registered)
    reject, adjusted_p, _, _ = multipletests(p_values, method='fdr_bh')
    print(f"\nBH-adjusted p-values: {adjusted_p.round(4)}")
    print(f"Reject (adjusted):    {reject}")
  example_bad: |
    # BAD: The "Garden of Forking Paths" — p-hacking in action
    from scipy import stats
    import numpy as np

    data = load_experiment_data()

    # Try different analyses until something is significant
    # 1. Full dataset — p=0.15
    _, p = stats.ttest_ind(data.control, data.treatment)

    # 2. Remove "outliers" (> 2 SD) — p=0.08
    clean = data[np.abs(data.values - data.values.mean()) < 2 * data.values.std()]

    # 3. Only female participants — p=0.04 "Significant!"
    females = data[data.gender == 'F']

    # 4. Only weekday data — p=0.03 "Even more significant!"
    weekdays = data[data.day_of_week < 5]

    # Report ONLY the significant subgroup analysis as if it was planned
    print("Women showed significant improvement (p=0.04)")
    # This is HARKing + p-hacking. None of these subgroup analyses
    # were pre-registered. With enough slicing, you WILL find p<0.05.
  when_applies: "Designing experiments, reviewing scientific literature, planning A/B tests, publishing research"
  sources:
    - "https://en.wikipedia.org/wiki/Replication_crisis"
    - "https://lakens.github.io/statistical_inferences/"
    - "https://osf.io/prereg/"
