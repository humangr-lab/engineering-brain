layer: rules
technology: General
domain: architecture
knowledge:
- id: ARCHF-001
  text: Use the C4 model (Context, Container, Component, Code) to document software architecture at the right level of
    abstraction for each audience -- executives see Context, developers see Component/Code.
  why: >
    Most architecture diagrams fail because they mix abstraction levels. The C4 model, created by Simon Brown, provides
    four zoom levels that match how different audiences think about the system. Context diagrams show system boundaries
    and external actors. Container diagrams show runtime units (services, databases, queues). Component diagrams show
    internal structure of a container. Code diagrams show class/module relationships. SWEBOK v4.0 (Oct 2024) established
    Software Architecture as a dedicated Knowledge Area, emphasizing systematic documentation at multiple abstraction levels.
  how_to_do_right: |
    1. Start with Level 1 (Context): draw the system as a single box, show all external actors and systems.
    2. Level 2 (Container): zoom into the system, show each deployable unit.
    3. Level 3 (Component): zoom into a container, show major components/modules.
    4. Level 4 (Code): only for complex modules, use UML class diagrams or similar.
    5. Use Structurizr DSL for diagrams-as-code (version controlled, reviewable in PRs).
    6. Keep diagrams in the repo alongside the code they describe.
    7. Update diagrams when architecture changes.
    8. Each diagram should have < 20 elements.
  severity: high
  technologies:
    library: [structurizr, mermaid, plantuml]
    platform: [any]
  domains:
    domain: [architecture, documentation]
    concern: [architecture_documentation, communication]
  example_good: |
    # architecture/workspace.dsl -- Structurizr DSL (version controlled)
    workspace "Payment System" "C4 architecture model" {
        model {
            customer = person "Customer" "Pays for products"
            admin = person "Admin" "Manages products and orders"

            paymentSystem = softwareSystem "Payment System" {
                webApp = container "Web Application" "React SPA" "TypeScript"
                apiGateway = container "API Gateway" "Routes and authenticates" "Kong"
                paymentApi = container "Payment API" "Processes payments" "Python/FastAPI"
                orderApi = container "Order API" "Manages orders" "Python/FastAPI"
                database = container "Database" "PostgreSQL"
                messageQueue = container "Message Queue" "RabbitMQ"

                paymentApi -> database "Reads/writes" "SQL/TLS"
                paymentApi -> messageQueue "Publishes events" "AMQP/TLS"
            }

            stripe = softwareSystem "Stripe" "Payment processing" "External"

            customer -> webApp "Uses" "HTTPS"
            webApp -> apiGateway "API calls" "HTTPS"
            apiGateway -> paymentApi "Routes" "HTTP/internal"
            paymentApi -> stripe "Processes charges" "HTTPS"
        }

        views {
            systemContext paymentSystem "Context" {
                include *
                autoLayout
            }
            container paymentSystem "Containers" {
                include *
                autoLayout
            }
        }
    }
  example_bad: |
    # Single diagram in Lucidchart (not version controlled)
    # Mixes abstraction levels: AWS regions AND individual classes
    # 47 boxes with crossing arrows, no legend
    # Last updated 8 months ago, no longer matches reality
    # Cannot be reviewed in a PR or diffed
  when_applies: Any software system with more than one deployable unit or external dependency
  when_not_applies: Single-file scripts or CLI tools with trivial architecture
  sources:
    - "https://c4model.com/"
    - "https://docs.structurizr.com/dsl"
    - "https://www.computer.org/education/bodies-of-knowledge/software-engineering"

- id: ARCHF-002
  text: Record every significant architecture decision as an Architecture Decision Record (ADR) using the MADR 4.0
    template -- ADRs are immutable, numbered, and superseded (never deleted or edited in-place).
  why: >
    Architecture decisions are the most impactful and least documented artifacts in software projects. MADR 4.0
    (released Sept 2024) provides a structured template with mandatory sections (Title, Status, Context, Decision,
    Consequences) and optional sections (Decision Drivers, Considered Options, Pros/Cons). The immutability principle
    is critical -- old ADRs are never edited, only superseded by new ones -- preserving the decision history and rationale.
    Michael Nygard's original ADR proposal (2011) and the MADR project have made ADRs the de facto standard.
  how_to_do_right: |
    1. Store ADRs in docs/adr/ in the repository (version controlled with the code).
    2. Use MADR 4.0 template: Title, Status, Context, Decision, Consequences.
    3. Number sequentially: ADR-0001, ADR-0002, etc. (never reuse numbers).
    4. Status values: Proposed -> Accepted -> Deprecated -> Superseded by ADR-XXXX.
    5. Never edit an accepted ADR -- write a new one that supersedes it.
    6. Require ADR for: new technology adoption, framework/library choice, data store choice,
       communication protocol choice, security architecture change, API contract change.
    7. Review ADRs in architecture review meetings.
    8. Link ADRs from code comments where decisions are implemented.
  severity: high
  technologies:
    library: [adr_tools, log4brains]
    platform: [any]
  domains:
    domain: [architecture, documentation]
    concern: [decision_making, knowledge_management]
  example_good: |
    # docs/adr/ADR-0012-use-postgresql-over-mongodb.md (MADR 4.0)
    ---
    status: accepted
    date: 2025-11-15
    decision-makers: ["@alice-architect", "@bob-tech-lead"]
    consulted: ["@carol-dba", "@dave-backend"]
    ---

    # ADR-0012: Use PostgreSQL over MongoDB for Order Service

    ## Context and Problem Statement
    The Order Service needs a primary data store. Orders have a relational
    schema with ACID transaction requirements for payment consistency.

    ## Decision Drivers
    * ACID transactions required for payment consistency
    * Schema is relational (orders, line items, customers)
    * Team expertise: 4/5 backend engineers have PostgreSQL experience

    ## Considered Options
    1. PostgreSQL 16 (RDS)
    2. MongoDB 7.0 (Atlas)
    3. CockroachDB (self-hosted)

    ## Decision Outcome
    Chosen option: **PostgreSQL 16 on RDS**, because it provides native ACID
    transactions, the team has deep expertise, and the relational schema maps
    naturally to tables with foreign keys.

    ### Consequences
    * Good: Strong consistency guarantees for payment processing
    * Good: Rich ecosystem of tools (pgAdmin, logical replication)
    * Bad: Horizontal scaling requires read replicas or partitioning
    * Bad: Schema migrations require careful planning

    ### Confirmation
    - Load testing with 10K concurrent orders (target: p99 < 200ms)
    - Running for 3 months and reviewing query performance

    ## Links
    - Supersedes: ADR-0003
    - Related: ADR-0010 (API design for Order Service)
  example_bad: |
    # Decision made in Slack DM between two engineers
    # No written record
    # 6 months later: "Why are we using MongoDB for orders?"
    # Team debates for 3 meetings, no one remembers constraints
    # Decision re-made (wasting 2 weeks), same conclusion
  when_applies: Any team making technology, framework, or architecture decisions
  when_not_applies: Solo projects where the developer is the only stakeholder
  sources:
    - "https://adr.github.io/madr/"
    - "https://github.com/adr/madr"
    - "https://cognitect.com/blog/2011/11/15/documenting-architecture-decisions"

- id: ARCHF-003
  text: Use the arc42 template for comprehensive architecture documentation -- 12 sections covering introduction, constraints,
    context, solution strategy, building blocks, runtime, deployment, crosscutting, decisions, quality, risks, and glossary.
  why: >
    Ad-hoc architecture documentation is inconsistent and impossible to navigate. The arc42 template (Gernot Starke,
    Peter Hruschka) provides a standardized 12-section structure used by thousands of organizations. It integrates
    naturally with C4 diagrams (Section 3 = C4 Context, Section 5 = C4 Container/Component) and ADRs (Section 9).
    The template is technology-agnostic and scales from small to large systems.
  how_to_do_right: |
    1. Create docs/architecture/ with one file per arc42 section.
    2. Start with sections 1 (Introduction), 3 (Context), 5 (Building Blocks).
    3. Add sections incrementally as the system grows.
    4. Use C4 diagrams for visual sections (3, 5, 6, 7).
    5. Reference ADRs in Section 9.
    6. Keep documentation close to code (same repo, not a separate wiki).
    7. Review architecture docs in sprint reviews.
  severity: medium
  technologies:
    library: [arc42, structurizr]
    platform: [any]
  domains:
    domain: [architecture, documentation]
    concern: [architecture_documentation]
  example_good: |
    # docs/architecture/ -- arc42 template structure
    docs/architecture/
    ├── 01-introduction-and-goals.md
    ├── 02-constraints.md
    ├── 03-context-and-scope.md          # C4 Level 1
    ├── 04-solution-strategy.md
    ├── 05-building-block-view.md        # C4 Level 2+3
    ├── 06-runtime-view.md               # Sequence diagrams
    ├── 07-deployment-view.md            # Infrastructure topology
    ├── 08-crosscutting-concepts.md      # Auth, logging, error handling
    ├── 09-architecture-decisions.md     # Links to ADRs
    ├── 10-quality-requirements.md       # Quality attribute scenarios
    ├── 11-risks-and-technical-debt.md
    └── 12-glossary.md                   # DDD ubiquitous language

    # Example: 01-introduction-and-goals.md
    # ## 1.2 Quality Goals
    # | Priority | Quality     | Scenario                              |
    # |----------|-------------|---------------------------------------|
    # | 1        | Reliability | 99.95% uptime for payment processing  |
    # | 2        | Security    | PCI DSS Level 1 compliance            |
    # | 3        | Performance | p99 latency < 500ms for payment API   |
  example_bad: |
    # Architecture documentation:
    # - README.md with 3 sentences and an outdated diagram
    # - Confluence page last edited 2 years ago
    # - "Ask Dave, he designed it" -- Dave left 4 months ago
    # - No quality requirements documented
  when_applies: Any system beyond a simple CRUD application
  when_not_applies: Throwaway prototypes and hackathon projects
  sources:
    - "https://arc42.org/overview"
    - "https://docs.arc42.org/home/"

- id: ARCHF-004
  text: Implement architecture fitness functions -- automated tests that continuously verify architecture qualities like
    modularity, dependency constraints, layer violations, and coupling metrics.
  why: >
    Architecture erodes over time as developers take shortcuts under deadline pressure. Neal Ford, Rebecca Parsons, and
    Patrick Kua coined "architecture fitness functions" in Building Evolutionary Architectures (2nd ed., 2023) as automated
    checks that protect architectural decisions. ArchUnit (Java), pytest-archon (Python), and Dependency-Cruiser (JS)
    enforce dependency rules, layer boundaries, and naming conventions in CI. If a developer imports a persistence class
    from the domain layer, the build fails immediately -- not 6 months later in an architecture review.
  how_to_do_right: |
    1. Identify architectural qualities to protect: modularity, layering, coupling, cohesion.
    2. Express each quality as a testable fitness function.
    3. Run fitness functions in CI/CD -- they fail the build on violations.
    4. Start with dependency constraints (most impactful, easiest to implement).
    5. Add complexity metrics as monitoring (warn, don't block).
    6. Review fitness function results in architecture review meetings.
  severity: high
  technologies:
    library: [archunit, pytest_archon, dependency_cruiser]
    platform: [any]
  domains:
    domain: [architecture, testing]
    concern: [architecture_governance, modularity]
  example_good: |
    # Python: tests/test_architecture.py using pytest-archon
    from archon import Rule

    def test_domain_layer_does_not_depend_on_infrastructure():
        """Domain layer must not import from infrastructure layer."""
        (Rule()
            .modules_matching("app.domain.*")
            .should_not_import("app.infrastructure.*")
            .check())

    def test_api_layer_does_not_access_database_directly():
        """API handlers must go through service layer."""
        (Rule()
            .modules_matching("app.api.*")
            .should_not_import("app.infrastructure.database.*")
            .should_not_import("sqlalchemy.*")
            .check())

    def test_no_circular_dependencies():
        """No circular import chains between top-level packages."""
        (Rule()
            .modules_matching("app.*")
            .should_not_have_circular_dependencies()
            .check())

    # JavaScript: .dependency-cruiser.json
    # { "forbidden": [{ "name": "no-domain-to-infra",
    #   "from": { "path": "^src/domain" },
    #   "to": { "path": "^src/infrastructure" } }] }
  example_bad: |
    # "Architecture rules" documented in a wiki page
    # Reality after 6 months:
    # from app.infrastructure.database import SessionLocal  # in domain/order.py
    # 47 violations, no one noticed because no automated check
  when_applies: Any codebase with more than 3 modules or packages
  when_not_applies: Single-module scripts or prototypes
  sources:
    - "https://nealford.com/books/buildingevolutionaryarchitectures.html"
    - "https://www.archunit.org/"
    - "https://github.com/jwbargsten/pytest-archon"

- id: ARCHF-005
  text: Design for evolutionary architecture -- use fitness functions as guardrails, incremental change as the mechanism,
    and appropriate coupling as the enabler.
  why: >
    Traditional "big design up front" architectures become obsolete before deployment. Evolutionary architecture
    (Ford, Parsons, Kua, 2nd ed. 2023) embraces change by making it guided and incremental. Fitness functions ensure
    changes do not violate invariants. Incremental change limits blast radius. Appropriate coupling means modules that
    change together are colocated, and modules that change independently are decoupled. The goal is not "the perfect
    architecture" but "an architecture that can evolve safely."
  how_to_do_right: |
    1. Define fitness functions for each quality attribute to preserve during evolution.
    2. Use incremental change practices: feature flags, trunk-based development, small PRs.
    3. Measure coupling: if changing module A always requires changing module B, merge or contract.
    4. Run architecture review quarterly: are fitness functions still relevant?
    5. Use the "last responsible moment" principle: defer decisions until you have enough information.
    6. Prefer reversible over irreversible decisions.
    7. Document evolutionary constraints in ADRs.
  severity: medium
  technologies:
    platform: [any]
  domains:
    domain: [architecture]
    concern: [evolutionary_architecture, change_management]
  example_good: |
    # evolution-guardrails.yaml
    guardrails:
      structural:
        - name: "Layer dependency constraints"
          tool: "pytest-archon"
          ci_gate: true
        - name: "Circular dependency prevention"
          tool: "pytest-archon"
          ci_gate: true
        - name: "Module size limit"
          tool: "custom script"
          ci_gate: false  # Warning only
          rule: "No module exceeds 500 LOC"

      operational:
        - name: "API response time"
          tool: "k6 / Grafana"
          rule: "p99 < 500ms"
        - name: "Error rate"
          tool: "Prometheus"
          rule: "5xx rate < 0.1%"

      process:
        - name: "Feature flag cleanup"
          rule: "No feature flag older than 90 days"
        - name: "ADR coverage"
          rule: "Every new service/framework has an ADR"
  example_bad: |
    # "Big bang" redesign every 2 years
    # Month 1-6: Design the "perfect" architecture
    # Month 7-12: Rewrite everything
    # Month 13: Requirements changed during rewrite
    # No fitness functions, no incremental change
    # Coupling increases invisibly
  when_applies: Any system expected to live beyond 6 months
  when_not_applies: Throwaway prototypes and one-time scripts
  sources:
    - "https://www.thoughtworks.com/en-us/insights/books/building-evolutionaryarchitectures-second-edition"
    - "https://nealford.com/books/buildingevolutionaryarchitectures.html"

- id: ARCHF-006
  text: Apply Hexagonal Architecture (Ports and Adapters) to isolate domain logic from infrastructure -- the domain core
    depends on nothing, adapters depend on the domain through ports (interfaces).
  why: >
    When domain logic is entangled with infrastructure, the code becomes impossible to test without the full stack,
    infrastructure changes require touching domain code, and domain logic cannot be reused across contexts. Hexagonal
    Architecture (Alistair Cockburn, 2005) defines clear boundaries. The domain core contains business rules and depends
    on nothing. Ports are interfaces defined in the domain. Adapters implement ports for specific technologies. This
    achieves Dependency Inversion (SOLID D) at the architecture level.
  how_to_do_right: |
    1. Structure code: domain/ (core), ports/ (interfaces), adapters/ (implementations).
    2. Domain code imports NOTHING from adapters -- enforce with fitness functions.
    3. Ports are abstract interfaces (Python ABC, Java Interface, Go interface).
    4. Adapters implement ports for specific technologies (SQL, HTTP, gRPC).
    5. Use dependency injection to connect adapters to domain at startup.
    6. Test domain logic with in-memory adapter implementations.
    7. Integration tests verify adapters work with real infrastructure.
  severity: high
  technologies:
    platform: [any]
  domains:
    domain: [architecture]
    concern: [modularity, testability, dependency_inversion]
  example_good: |
    # ports/order_repository.py
    from abc import ABC, abstractmethod
    from domain.models import Order

    class OrderRepository(ABC):
        @abstractmethod
        def save(self, order: Order) -> None: ...
        @abstractmethod
        def find_by_id(self, order_id: str) -> Order | None: ...

    # domain/services.py -- depends only on ports
    from ports.order_repository import OrderRepository
    from ports.payment_gateway import PaymentGateway
    from domain.models import Order

    class OrderService:
        def __init__(self, repo: OrderRepository, payment: PaymentGateway):
            self._repo = repo
            self._payment = payment

        def place_order(self, order: Order) -> None:
            self._payment.charge(order.customer_id, order.total)
            self._repo.save(order)

    # adapters/postgres_order_repo.py
    from sqlalchemy.orm import Session
    from ports.order_repository import OrderRepository

    class PostgresOrderRepository(OrderRepository):
        def __init__(self, session: Session):
            self._session = session
        def save(self, order: Order) -> None:
            self._session.add(OrderORM.from_domain(order))
            self._session.commit()

    # tests/test_order_service.py -- no infrastructure needed
    def test_place_order():
        repo = InMemoryOrderRepository()
        payment = FakePaymentGateway()
        service = OrderService(repo, payment)
        service.place_order(Order(id="1", customer_id="c1", total=100))
        assert repo.find_by_id("1") is not None
  example_bad: |
    from sqlalchemy.orm import Session
    from stripe import Charge
    import redis

    class OrderService:
        def place_order(self, order_data: dict, db: Session):
            db.execute("INSERT INTO orders VALUES (:id, :total)", order_data)
            Charge.create(amount=order_data["total"], currency="usd")
            redis.Redis().publish("orders", json.dumps(order_data))
    # Cannot test without PostgreSQL, Stripe, and Redis running
    # Switching Stripe to Adyen requires changing domain code
  when_applies: Any application with business logic that should be testable independently
  when_not_applies: Simple CRUD applications where the domain IS the database operations
  sources:
    - "https://alistair.cockburn.us/hexagonal-architecture/"
    - "https://herbertograca.com/2017/11/16/explicit-architecture-01-ddd-hexagonal-onion-clean-cqrs-how-i-put-it-all-together/"

- id: ARCHF-007
  text: Treat architecture documentation as code -- use Structurizr DSL, Mermaid, or PlantUML in version-controlled files,
    rendered automatically in CI, and reviewed in pull requests.
  why: >
    Architecture diagrams in Lucidchart or PowerPoint rot faster than code because they are not updated when code changes.
    Diagrams-as-code stores documentation in the same repo, enabling version history, code review, automated rendering,
    and co-location. Simon Brown's Structurizr DSL supports C4 model natively with workspace-level consistency checking.
  how_to_do_right: |
    1. Choose a tool: Structurizr DSL (C4 native), Mermaid (GitHub native), PlantUML (most diagram types).
    2. Store in docs/architecture/ in the code repository.
    3. Add CI step to render diagrams and publish to docs site.
    4. Require diagram update in PRs that change system boundaries.
    5. Use Structurizr Lite (Docker) for local preview.
    6. Link from README.md to rendered diagrams.
  severity: medium
  technologies:
    library: [structurizr, mermaid, plantuml]
    platform: [github, gitlab]
  domains:
    domain: [architecture, documentation]
    concern: [architecture_documentation, devops]
  example_good: |
    # .github/workflows/docs.yml -- Auto-render Structurizr diagrams
    name: Architecture Docs
    on:
      push:
        paths: ['docs/architecture/**']
    jobs:
      render:
        runs-on: ubuntu-22.04
        steps:
          - uses: actions/checkout@v4
          - name: Render Structurizr diagrams
            run: |
              docker run --rm -v $(pwd):/usr/local/structurizr \
                structurizr/cli export \
                -workspace docs/architecture/workspace.dsl \
                -format png \
                -output docs/architecture/images/
          - name: Commit rendered images
            run: |
              git add docs/architecture/images/
              git diff --staged --quiet || git commit -m "docs: update architecture diagrams"

    # PR template:
    # - [ ] If this PR adds/removes services, the C4 diagram is updated
    # - [ ] If this PR changes data flows, the sequence diagram is updated
  example_bad: |
    # Lucidchart diagram last edited 14 months ago
    # Shows 3 services that no longer exist
    # Missing 2 services added last quarter
    # Cannot be reviewed in a PR
    # Only accessible by people with Lucidchart license
  when_applies: Any project with architecture documentation or diagrams
  when_not_applies: Projects with no documentation requirements
  sources:
    - "https://docs.structurizr.com/dsl"
    - "https://mermaid.js.org/"
    - "https://github.com/structurizr/cli"

- id: ARCHF-008
  text: Define quality attribute scenarios with explicit stimulus, response, and measurable response measure -- vague
    quality requirements like "the system must be fast" are unverifiable.
  why: >
    Quality attributes are the primary drivers of architecture decisions but are almost always stated vaguely. A quality
    attribute scenario (Bass, Clements, Kazman -- Software Architecture in Practice, 4th ed., 2022) specifies source,
    stimulus, artifact, environment, response, and response measure. This transforms "be fast" into "when 1000 concurrent
    users submit orders, the payment API processes each in under 500ms at p99 during peak load." SWEBOK v4.0 identifies
    quality attribute analysis as a core architecture activity.
  how_to_do_right: |
    1. Identify critical quality attributes from stakeholders.
    2. Write specific scenarios using the 6-part template.
    3. Prioritize: which would cause the most damage if not met?
    4. Map scenarios to architecture decisions.
    5. Convert to automated tests or monitoring alerts where possible.
    6. Review quarterly with stakeholders.
  severity: medium
  technologies:
    platform: [any]
  domains:
    domain: [architecture, requirements]
    concern: [quality_attributes, non_functional_requirements]
  example_good: |
    # docs/architecture/10-quality-requirements.md
    ### QAS-PERF-001: API Response Time Under Load
    | Element          | Description                              |
    |------------------|------------------------------------------|
    | Source           | 1,000 concurrent authenticated users     |
    | Stimulus         | Submit payment request                   |
    | Artifact         | Payment API                              |
    | Environment      | Normal operation (peak hours)            |
    | Response         | Payment processed, confirmation returned |
    | Response Measure | p99 latency < 500ms, p50 < 100ms        |
    | Fitness Function | k6 load test in CI                       |

    ### QAS-REL-001: Database Failover
    | Element          | Description                              |
    |------------------|------------------------------------------|
    | Source           | Hardware failure                         |
    | Stimulus         | Primary database unavailable             |
    | Response         | Automatic failover to standby replica    |
    | Response Measure | RTO < 30 seconds, RPO = 0               |
    | Fitness Function | Quarterly chaos test                     |
  example_bad: |
    # "Non-functional requirements":
    # - The system must be fast
    # - The system must be secure
    # - The system must be scalable
    # Untestable, unverifiable, meaningless
  when_applies: Any system with quality requirements beyond basic correctness
  when_not_applies: Throwaway prototypes
  sources:
    - "https://www.oreilly.com/library/view/software-architecture-in/9780136885979/"
    - "https://www.sei.cmu.edu/our-work/software-architecture/"

- id: ARCHF-009
  text: Conduct ATAM reviews for high-stakes architecture decisions and lightweight ADR reviews for routine decisions --
    match review rigor to decision impact.
  why: >
    ATAM (SEI/CMU) is the gold standard for evaluating architecture against quality scenarios. It identifies sensitivity
    points, tradeoff points, and risks. But full ATAM is expensive (3-5 days, 10+ participants). For routine decisions,
    an ADR review by 2-3 architects (30-60 min) is sufficient. The key is proportional governance.
  how_to_do_right: |
    1. Classify decisions: High (new system/rearchitecture), Medium (new service/technology), Low (library choice).
    2. High impact: ATAM-lite (half-day workshop, stakeholders, quality scenarios).
    3. Medium impact: ADR + review meeting (30-60 min, 2-3 architects).
    4. Low impact: ADR in PR, async review by 1 architect.
    5. Document outcomes: risks accepted, mitigations, follow-ups.
    6. Schedule ATAM reviews at major milestones.
  severity: medium
  technologies:
    platform: [any]
  domains:
    domain: [architecture, governance]
    concern: [architecture_review, decision_making]
  example_good: |
    review_process:
      high_impact:
        method: "ATAM-lite"
        duration: "4 hours"
        participants: ["Product owner", "Lead architect", "2-3 senior engineers",
                       "Security architect", "SRE lead"]
        process:
          - "Present architecture and key decisions"
          - "Present prioritized quality attribute scenarios"
          - "Walk through scenarios against architecture"
          - "Identify sensitivity, tradeoff, and risk points"
        examples: ["Monolith to microservices", "Event-driven architecture"]

      medium_impact:
        method: "ADR review meeting"
        duration: "30-60 minutes"
        participants: ["Author", "2 architects"]
        examples: ["New microservice", "Choosing Kafka vs RabbitMQ"]

      low_impact:
        method: "ADR in PR (async)"
        participants: ["Author", "1 architect"]
        examples: ["JSON library choice", "Refactoring modules"]
  example_bad: |
    # Full ATAM for every library choice -> paralysis
    # Or: no review -> major decisions in Slack DMs
    # "Let's switch to GraphQL" decided in 10-min standup
    # 6 months later: 3x worse performance, no documentation
  when_applies: Any team making architecture decisions affecting system quality
  when_not_applies: Solo projects
  sources:
    - "https://www.sei.cmu.edu/our-work/software-architecture/tools-methods/"
    - "https://www.computer.org/education/bodies-of-knowledge/software-engineering"

- id: ARCHF-010
  text: Implement a modular monolith with enforced module boundaries before considering microservices -- get boundaries
    right first, then extract services only when you need independent deployment or scaling.
  why: >
    Microservices introduce distributed system complexity that most teams underestimate. A modular monolith gives you
    bounded contexts with enforced boundaries while keeping single-deployment simplicity. Sam Newman (Building
    Microservices, 2nd ed.) recommends starting monolithic. Shopify runs one of the world's largest modular monoliths.
    Wrong boundaries in a monolith = refactoring. Wrong boundaries in microservices = distributed migration.
  how_to_do_right: |
    1. Identify bounded contexts using DDD strategic design.
    2. Implement each as a module with its own package/namespace.
    3. Enforce boundaries with fitness functions (no cross-module internal imports).
    4. Each module owns its database tables.
    5. Inter-module communication through well-defined interfaces (function calls, not HTTP).
    6. Extract to microservice ONLY when needed: independent deployment, independent scaling,
       different tech stack, or organizational boundary.
    7. Use Strangler Fig pattern for extraction.
  severity: high
  technologies:
    platform: [any]
  domains:
    domain: [architecture]
    concern: [modularity, microservices, monolith]
  example_good: |
    # Modular monolith with enforced boundaries
    # modules/orders/__init__.py -- Public API
    from modules.orders.services import OrderService
    __all__ = ["OrderService", "create_order", "get_order"]

    def create_order(customer_id: str, items: list[dict]) -> str:
        """Public API. Other modules call this, not internal services."""
        return OrderService().create(customer_id, items)

    # tests/test_architecture.py -- Enforce module boundaries
    from archon import Rule

    def test_modules_only_import_through_public_api():
        (Rule()
            .modules_matching("modules.orders.*")
            .should_not_import("modules.payments.services")
            .should_not_import("modules.payments.models")
            .should_not_import("modules.payments.repository")
            .check())
  example_bad: |
    # 3 developers, 12 services, 47 API contracts
    # Every feature requires changes to 4+ services
    # 30% of time spent on infrastructure
    # Data consistency bugs from distributed transactions
    # Same team with modular monolith: 1 deployment, function calls
  when_applies: Teams building new systems or evaluating microservices
  when_not_applies: Systems that already have successful microservices
  sources:
    - "https://www.oreilly.com/library/view/building-microservices-2nd/9781492034018/"
    - "https://shopify.engineering/deconstructing-monolith-designing-software-maximizes-developer-productivity"

- id: ARCHF-011
  text: Apply Domain-Driven Design strategic patterns -- identify bounded contexts, create a context map with relationship
    patterns (partnership, customer-supplier, conformist, ACL), and establish ubiquitous language per context.
  why: >
    Without explicit bounded contexts, the domain model becomes a "big ball of mud" where "User" means different things
    in auth, billing, and shipping. Eric Evans' DDD strategic patterns provide systematic decomposition into bounded
    contexts with their own ubiquitous language, model, and relationships. Context mapping reveals integration challenges
    early and directly informs module/service boundaries.
  how_to_do_right: |
    1. Run Event Storming workshop to identify domain events, commands, aggregates.
    2. Group related concepts into bounded contexts.
    3. Create context map with relationships: Partnership, Customer-Supplier, Conformist,
       Anti-Corruption Layer, Open Host Service, Shared Kernel.
    4. Document ubiquitous language in a glossary per context.
    5. Enforce boundaries with module structure and fitness functions.
    6. Update context map when boundaries change.
  severity: high
  technologies:
    platform: [any]
  domains:
    domain: [architecture, design]
    concern: [domain_driven_design, bounded_contexts]
  example_good: |
    # docs/architecture/context-map.md
    ## Bounded Contexts
    ### Order Management
    Language: Order, LineItem, OrderStatus, Fulfillment

    ### Payment Processing
    Language: Payment, Transaction, Refund, PaymentMethod

    ## Context Map
    # [Order Mgmt] --(Customer/Supplier)--> [Payment Processing]
    # [Order Mgmt] --(ACL)--> [Inventory]
    # [Order Mgmt] --(Conformist)--> [Shipping (3rd party)]

    ## Anti-Corruption Layer (Order -> Inventory)
    ```python
    class InventoryACL:
        """Translates between Order and Inventory contexts."""
        def reserve_stock(self, items: list[OrderItem]) -> bool:
            reservations = [
                {"sku": self._to_sku(item.product_id), "quantity": item.qty}
                for item in items
            ]
            return self._client.create_reservation(reservations)

        def _to_sku(self, product_id: str) -> str:
            return self._client.lookup_sku(product_id)
    ```
  example_bad: |
    # Single "User" model with 47 fields used everywhere
    # Auth needs email, password_hash
    # Billing needs payment_method, invoice_address
    # Shipping needs shipping_address, phone
    # Every change touches the shared model, breaks other teams
  when_applies: Systems with complex business logic or multiple teams
  when_not_applies: Simple CRUD applications
  sources:
    - "https://www.domainlanguage.com/ddd/reference/"
    - "https://www.oreilly.com/library/view/implementing-domain-driven-design/9780133039900/"

- id: ARCHF-012
  text: Implement anti-corruption layers (ACL) when integrating with external systems or legacy code -- translate between
    your domain model and the external model at the boundary.
  why: >
    External systems have their own domain models that do not match yours. Without an ACL, external concepts leak into
    your domain -- Stripe-specific fields in Order, LDAP attributes in User. When the external system changes, you must
    change domain code that should be stable. An ACL is a translation layer at the boundary that isolates your domain
    from external volatility. It is the Adapter pattern at the bounded context level.
  how_to_do_right: |
    1. Create ACL at the boundary between your context and the external system.
    2. Define domain model independently of external model.
    3. ACL translates: external -> domain (inbound), domain -> external (outbound).
    4. Never expose external DTOs beyond the ACL.
    5. Test with contract tests (verify translation with fixture data).
    6. When switching providers, only ACL changes -- domain untouched.
  severity: high
  technologies:
    platform: [any]
  domains:
    domain: [architecture, design]
    concern: [integration, anti_corruption_layer]
  example_good: |
    # src/payments/acl/stripe_acl.py
    from payments.domain.models import Payment, PaymentStatus
    import stripe

    class StripePaymentACL:
        """When switching to Adyen, only this file changes."""

        def create_charge(self, payment: Payment) -> Payment:
            charge = stripe.Charge.create(
                amount=payment.amount.cents,
                currency=payment.amount.currency,
                source=payment.payment_method_token,
                idempotency_key=payment.idempotency_key,
            )
            return self._to_domain(payment, charge)

        def _to_domain(self, original: Payment, charge: stripe.Charge) -> Payment:
            status_map = {
                "succeeded": PaymentStatus.CAPTURED,
                "pending": PaymentStatus.PENDING,
                "failed": PaymentStatus.FAILED,
            }
            return Payment(
                id=original.id,
                order_id=original.order_id,
                amount=original.amount,
                status=status_map.get(charge.status, PaymentStatus.UNKNOWN),
                provider_reference=charge.id,
                provider="stripe",
            )
  example_bad: |
    class PaymentService:
        def process_payment(self, stripe_charge_id: str, stripe_amount: int):
            charge = stripe.Charge.retrieve(stripe_charge_id)
            if charge.status == "succeeded":
                order.stripe_charge_id = charge.id  # Stripe in domain model
    # 23 files reference stripe.Charge in domain/service layers
    # Switching to Adyen = rewrite domain, service, tests, migrations
  when_applies: Systems integrating with external APIs, third-party services, or legacy systems
  when_not_applies: Systems with no external integrations
  sources:
    - "https://www.domainlanguage.com/ddd/reference/"
    - "https://learn.microsoft.com/en-us/azure/architecture/patterns/anti-corruption-layer"

- id: ARCHF-013
  text: Establish architecture governance through fitness functions (automated), ADRs (documented), architecture reviews
    (human), and a tech radar (strategic) -- four mechanisms working together.
  why: >
    Architecture governance ensures individual decisions align with technical strategy. Without governance, teams adopt
    conflicting technologies. Effective governance combines four mechanisms. Fitness functions provide automated
    enforcement. ADRs provide decision rationale. Reviews provide human judgment. A tech radar (ThoughtWorks model)
    provides strategic direction (Adopt, Trial, Assess, Hold). The key is proportional governance.
  how_to_do_right: |
    1. Fitness functions in CI/CD: enforce dependency constraints, layer boundaries, complexity limits.
    2. ADRs for every technology/framework/architecture decision.
    3. Architecture review cadence: weekly 30min (lightweight), quarterly half-day (comprehensive).
    4. Tech radar: Adopt, Trial, Assess, Hold -- reviewed quarterly.
    5. Track governance violations as a metric (trend should decrease).
    6. Communicate through developer experience, not bureaucracy.
  severity: medium
  technologies:
    platform: [any]
  domains:
    domain: [architecture, governance]
    concern: [architecture_governance, tech_radar]
  example_good: |
    ## 1. Automated (CI fitness functions)
    def test_no_new_orms():
        """Only SQLAlchemy allowed (ADR-0005)."""
        deps = parse_dependencies("pyproject.toml")
        violations = [d for d in deps if d in ["django.db", "peewee", "tortoise"]]
        assert not violations, f"Unauthorized ORM: {violations}. See ADR-0005."

    ## 2. Documented (ADRs)
    # docs/adr/ADR-0005-use-sqlalchemy-as-sole-orm.md

    ## 3. Human Review
    # Weekly 30min: async review of new ADRs
    # Quarterly 4h: ATAM-lite for major changes

    ## 4. Strategic (Tech Radar)
    tech_radar:
      adopt: ["PostgreSQL", "FastAPI", "SQLAlchemy"]
      trial: ["Kafka"]
      assess: ["CockroachDB"]
      hold: ["MongoDB", "Django ORM"]
  example_bad: |
    # No governance: 3 different message queues, 4 ORMs
    # Or: heavy governance board with 4-week backlog
    # Developers route around it, use unapproved tools anyway
  when_applies: Organizations with multiple development teams or long-lived systems
  when_not_applies: Solo developers or early-stage single-team projects
  sources:
    - "https://www.thoughtworks.com/radar"
    - "https://nealford.com/books/buildingevolutionaryarchitectures.html"
    - "https://www.computer.org/education/bodies-of-knowledge/software-engineering"
