layer: rules
technology: GCP
domain: cloud
knowledge: [{id: "CR-GCP-001", text: "Set Cloud Run concurrency to match your application's thread-safety — default 80 is\
      \ too high for most single-threaded apps.", why: "Cloud Run sends up to 80 concurrent requests to a single container\
      \ instance by default. A single-threaded Python/Node app handling 80 simultaneous requests will queue them all, causing\
      \ latency spikes and timeouts. Over-provisioning concurrency wastes memory; under-provisioning wastes instances.", how_to_do_right: "For\
      \ single-threaded apps (Flask, Express without clustering), set concurrency to 1-10. For async apps (FastAPI, Go), set\
      \ 50-80. For CPU-heavy workloads, set to CPU count. Measure with load testing — watch p99 latency, not just throughput.",
    severity: high, technologies: {platform: [gcp, cloud_run]}, domains: {domain: [operations, performance], concern: [cloud]},
    example_good: "# Async FastAPI app — can handle many concurrent requests\ngcloud run deploy my-api \\\n  --concurrency=50\
      \ \\\n  --cpu=2 \\\n  --memory=1Gi\n\n# Single-threaded Flask app — limit concurrency\ngcloud run deploy my-flask \\\
      \n  --concurrency=4 \\\n  --cpu=1 \\\n  --memory=512Mi\n", example_bad: "# Default concurrency=80 with a single-threaded\
      \ Flask app\ngcloud run deploy my-flask \\\n  --memory=512Mi\n# Result: 80 requests queued in one instance, p99 = 30s+\n",
    when_applies: Projects using Google Cloud Platform services or Cloud Run, when_not_applies: "local-only or on-premises\
      \ deployments. projects not using GCP or Cloud Run", sources: ["https://cloud.google.com/run/docs/about-concurrency"]},
  {id: "CR-GCP-002", text: "Set min-instances >= 1 on latency-sensitive Cloud Run services to eliminate cold starts.", why: "Cloud\
      \ Run scales to zero by default. Cold starts add 2-15 seconds (depending on image size and init logic). For APIs serving\
      \ user-facing requests, this is unacceptable. Each cold start also triggers full dependency loading, DB connection setup,\
      \ and model loading.", how_to_do_right: "Set --min-instances=1 for production APIs. Use --min-instances=0 for background\
      \ jobs, cron tasks, or dev environments. Combine with startup CPU boost (--cpu-boost) to speed up cold starts when they\
      \ do happen.", severity: high, technologies: {platform: [gcp, cloud_run]}, domains: {domain: [operations, performance],
      concern: [cloud]}, example_good: "# Production API — always warm\ngcloud run deploy my-api \\\n  --min-instances=1 \\\
      \n  --max-instances=100 \\\n  --cpu-boost\n\n# Background worker — scale to zero is fine\ngcloud run deploy my-worker\
      \ \\\n  --min-instances=0 \\\n  --no-cpu-boost\n", example_bad: "# User-facing API with default min-instances=0\ngcloud\
      \ run deploy my-api\n# First request after idle: 5-10s cold start\n# Users see spinner, bounce, complain\n", when_applies: Projects
      using Google Cloud Platform services or Cloud Run, when_not_applies: "local-only or on-premises deployments. projects\
      \ not using GCP or Cloud Run", sources: ["https://cloud.google.com/run/docs/configuring/min-instances"]}, {id: "CR-GCP-003",
    text: "Use Cloud Run traffic splitting for canary deployments — never send 100% to a new revision immediately.", why: "Deploying\
      \ 100% traffic to an untested revision means a bad deploy impacts all users instantly. Cloud Run's traffic splitting\
      \ lets you send 1-5% to the new revision, monitor error rates and latency, then gradually increase. Rollback is instant\
      \ — just shift traffic back.", how_to_do_right: "Deploy with --no-traffic, then use traffic splitting to send 5% to\
      \ the new revision. Monitor for 15-30 minutes. If healthy, ramp to 25%, 50%, 100%. Automate with Cloud Deploy or a CI/CD\
      \ pipeline.", severity: medium, technologies: {platform: [gcp, cloud_run]}, domains: {domain: [operations, deployment],
      concern: [cloud]}, example_good: "# Deploy without routing traffic\ngcloud run deploy my-api \\\n  --image=gcr.io/my-proj/api:v2.1\
      \ \\\n  --no-traffic \\\n  --tag=canary\n\n# Send 5% to canary\ngcloud run services update-traffic my-api \\\n  --to-tags=canary=5\n\
      \n# If healthy, promote to 100%\ngcloud run services update-traffic my-api \\\n  --to-latest\n", example_bad: "# Yolo\
      \ deploy — 100% traffic to new revision\ngcloud run deploy my-api --image=gcr.io/my-proj/api:v2.1\n# Bug in v2.1 → 100%\
      \ of users affected instantly\n", when_applies: Projects using Google Cloud Platform services or Cloud Run, when_not_applies: "local-only\
      \ or on-premises deployments. projects not using GCP or Cloud Run", sources: ["https://cloud.google.com/run/docs/rollouts-rollbacks-traffic-migration"]},
  {id: "CR-GCP-004", text: "Use 'always-on' CPU allocation for Cloud Run services that do background work; use 'request-based'\
      \ for pure HTTP handlers.", why: "By default, Cloud Run only allocates CPU during request processing. Background tasks\
      \ (queue consumers, WebSocket connections, cron processing) get throttled to near-zero CPU between requests. This causes\
      \ dropped connections, delayed processing, and mysterious 'slow' behavior that only happens in production.", how_to_do_right: "Set\
      \ --cpu-throttling for request-based APIs (cheaper). Set --no-cpu-throttling for services with background goroutines,\
      \ WebSockets, or queue consumers. Always-on costs more but prevents CPU starvation.", severity: high, technologies: {
      platform: [gcp, cloud_run]}, domains: {domain: [operations, performance], concern: [cloud]}, example_good: "# WebSocket\
      \ service — needs CPU between requests\ngcloud run deploy ws-server \\\n  --no-cpu-throttling \\\n  --min-instances=1\n\
      \n# Pure REST API — CPU only during requests (cheaper)\ngcloud run deploy rest-api \\\n  --cpu-throttling\n", example_bad: "#\
      \ Background queue consumer with default CPU throttling\ngcloud run deploy queue-worker\n# CPU is throttled between\
      \ HTTP requests\n# Background processing stalls, messages pile up\n", when_applies: Projects using Google Cloud Platform
      services or Cloud Run, when_not_applies: "local-only or on-premises deployments. projects not using GCP or Cloud Run",
    sources: ["https://cloud.google.com/run/docs/configuring/cpu-allocation"]}, {id: "CR-GCP-005", text: "Attach a VPC connector\
      \ to Cloud Run services that access private resources (Cloud SQL, Memorystore, internal APIs).", why: "Cloud Run runs\
      \ on Google's serverless infrastructure outside your VPC. Without a VPC connector, it cannot reach private IP resources.\
      \ Developers often expose Cloud SQL publicly as a workaround — creating a massive security hole. VPC connectors route\
      \ traffic through your VPC securely.", how_to_do_right: "Create a Serverless VPC Access connector in the same region.\
      \ Attach it to Cloud Run with --vpc-connector. Use --vpc-egress=private-ranges-only (default) to route only RFC1918\
      \ traffic through VPC. Use --vpc-egress=all-traffic only if you need VPC firewall rules for all egress.", severity: critical,
    technologies: {platform: [gcp, cloud_run, aws, vpc]}, domains: {domain: [operations, infrastructure, security], concern: [
        cloud, networking]}, example_good: "# Create VPC connector\ngcloud compute networks vpc-access connectors create my-connector\
      \ \\\n  --region=us-central1 \\\n  --subnet=my-connector-subnet \\\n  --min-instances=2 \\\n  --max-instances=10\n\n\
      # Deploy with VPC connector\ngcloud run deploy my-api \\\n  --vpc-connector=my-connector \\\n  --vpc-egress=private-ranges-only\n",
    example_bad: "# Cloud SQL with public IP because Cloud Run can't reach private IP\ngcloud sql instances patch my-db --assign-ip\n\
      # Now the database is exposed to the internet\n# Even with SSL + authorized networks, this is unnecessary risk\n", when_applies: 'Any
      project using Google Cloud Platform services, Cloud Run, or VPC', when_not_applies: "local-only or on-premises deployments",
    sources: ["https://cloud.google.com/run/docs/configuring/connecting-vpc"]}, {id: "CR-GCP-006", text: "Use GKE Autopilot\
      \ for most workloads — only use Standard mode when you need GPU, specific machine types, or DaemonSets.", why: "GKE\
      \ Standard requires you to manage node pools, OS patching, capacity planning, and bin-packing. Autopilot handles all\
      \ of this — you pay per pod, not per node. Standard mode leads to over-provisioning (wasted money) or under-provisioning\
      \ (OOMKilled pods). Autopilot enforces best practices by default.", how_to_do_right: "Default to Autopilot for all new\
      \ clusters. Switch to Standard only if you need: GPUs, specific machine families (T2A ARM), privileged containers, DaemonSets,\
      \ or eBPF. Autopilot supports most workloads including StatefulSets, Jobs, and CronJobs.", severity: medium, technologies: {
      platform: [gcp, gke, kubernetes]}, domains: {domain: [operations, infrastructure], concern: [cloud, containers]}, example_good: "#\
      \ Autopilot — Google manages nodes, you manage pods\ngcloud container clusters create-auto my-cluster \\\n  --region=us-central1\
      \ \\\n  --release-channel=regular\n\n# Pod spec — just declare resources, Autopilot handles the rest\nresources:\n \
      \ requests:\n    cpu: \"500m\"\n    memory: \"1Gi\"\n  limits:\n    cpu: \"1000m\"\n    memory: \"2Gi\"\n", example_bad: "#\
      \ Standard cluster with manually managed node pools\ngcloud container clusters create my-cluster \\\n  --num-nodes=3\
      \ \\\n  --machine-type=n2-standard-4\n# You now own: OS patching, capacity planning, scaling rules,\n# node upgrades,\
      \ bin-packing optimization, surge upgrades...\n", when_applies: "Projects using Google Cloud Platform services, GKE,\
      \ or Kubernetes-orchestrated deployments", when_not_applies: "local-only or on-premises deployments", sources: ["https://cloud.google.com/kubernetes-engine/docs/concepts/autopilot-overview"]},
  {id: "CR-GCP-007", text: "Use Workload Identity on GKE — never use the node service account for pod-level access.", why: "Without\
      \ Workload Identity, every pod on a node shares the node's service account. If one pod is compromised, it can access\
      \ every GCP resource the node SA has permissions for. This violates least privilege and makes lateral movement trivial.\
      \ Workload Identity maps Kubernetes SAs to GCP SAs 1:1.", how_to_do_right: "Enable Workload Identity on the cluster.\
      \ Create a dedicated GCP SA per workload with minimal permissions. Bind the GCP SA to the K8s SA via IAM policy. Never\
      \ grant roles to the default compute SA.", severity: critical, technologies: {platform: [gcp, gke, kubernetes]}, domains: {
      domain: [operations, security], concern: [cloud]}, example_good: "# Enable Workload Identity\ngcloud container clusters\
      \ update my-cluster \\\n  --workload-pool=my-project.svc.id.goog\n\n# Create GCP SA with minimal permissions\ngcloud\
      \ iam service-accounts create my-app-sa\ngcloud projects add-iam-policy-binding my-project \\\n  --member=\"serviceAccount:my-app-sa@my-project.iam.gserviceaccount.com\"\
      \ \\\n  --role=\"roles/cloudsql.client\"\n\n# Bind to K8s SA\ngcloud iam service-accounts add-iam-policy-binding \\\n\
      \  my-app-sa@my-project.iam.gserviceaccount.com \\\n  --role=\"roles/iam.workloadIdentityUser\" \\\n  --member=\"serviceAccount:my-project.svc.id.goog[default/my-app-ksa]\"\
      \n", example_bad: "# Node SA with broad permissions — every pod gets them\ngcloud container clusters create my-cluster\
      \ \\\n  --service-account=my-broad-sa@proj.iam.gserviceaccount.com\n# Compromised pod → access to Cloud Storage, BigQuery,\
      \ KMS, etc.\n", when_applies: "Any project using Google Cloud Platform services, GKE, or Kubernetes-orchestrated deployments",
    when_not_applies: "local-only or on-premises deployments", sources: ["https://cloud.google.com/kubernetes-engine/docs/how-to/workload-identity"]},
  {id: "CR-GCP-008", text: "Always partition BigQuery tables by a time column — unpartitioned tables scan all data on every\
      \ query.", why: "BigQuery charges by bytes scanned. An unpartitioned 10TB table scans 10TB on every query, even if you\
      \ filter by date. A time-partitioned table with a WHERE clause on the partition column scans only the relevant partitions\
      \ — potentially 100x cheaper and faster.", how_to_do_right: "Use time-unit partitioning (DAY/HOUR/MONTH/YEAR) on an\
      \ ingestion-time or custom timestamp column. Add a WHERE clause on the partition column in every query. Use integer-range\
      \ partitioning for non-time data. Require partition filters via table settings.", severity: critical, technologies: {
      platform: [gcp, bigquery]}, domains: {domain: [operations, architecture], concern: [cloud, data]}, example_good: "CREATE\
      \ TABLE my_dataset.events (\n  event_id STRING,\n  event_type STRING,\n  payload JSON,\n  created_at TIMESTAMP\n)\n\
      PARTITION BY DATE(created_at)\nCLUSTER BY event_type\nOPTIONS (\n  require_partition_filter = TRUE\n);\n\n-- Query scans\
      \ only 1 day's partition\nSELECT * FROM my_dataset.events\nWHERE DATE(created_at) = '2026-02-15'\n  AND event_type =\
      \ 'purchase';\n", example_bad: "-- Unpartitioned table — every query scans everything\nCREATE TABLE my_dataset.events\
      \ (\n  event_id STRING,\n  event_type STRING,\n  created_at TIMESTAMP\n);\n-- This query scans ALL 10TB every time\n\
      SELECT * FROM my_dataset.events\nWHERE DATE(created_at) = '2026-02-15';\n", when_applies: Any project using Google Cloud
      Platform services or BigQuery, when_not_applies: "local-only or on-premises deployments. projects not using GCP or BigQuery",
    sources: ["https://cloud.google.com/bigquery/docs/partitioned-tables"]}, {id: "CR-GCP-009", text: "Cluster BigQuery tables\
      \ on high-cardinality filter columns — clustering works WITH partitioning, not instead of it.", why: "Clustering sorts\
      \ data within partitions by up to 4 columns. Queries filtering on clustered columns skip irrelevant blocks, reducing\
      \ bytes scanned by 10-100x. Without clustering, BigQuery scans all blocks in matching partitions. Clustering is free\
      \ — there is no reason not to use it.", how_to_do_right: "Partition first, then cluster. Choose columns commonly used\
      \ in WHERE and JOIN clauses. Order cluster columns by filter frequency (most filtered first). Up to 4 columns. Re-cluster\
      \ happens automatically on DML.", severity: high, technologies: {platform: [gcp, bigquery]}, domains: {domain: [operations,
        architecture, performance], concern: [cloud, data]}, example_good: "CREATE TABLE my_dataset.orders (\n  order_id STRING,\n\
      \  customer_id STRING,\n  region STRING,\n  product_category STRING,\n  total NUMERIC,\n  created_at TIMESTAMP\n)\n\
      PARTITION BY DATE(created_at)\nCLUSTER BY region, product_category, customer_id;\n\n-- Scans only the relevant partition\
      \ + cluster blocks\nSELECT SUM(total) FROM my_dataset.orders\nWHERE DATE(created_at) BETWEEN '2026-01-01' AND '2026-01-31'\n\
      \  AND region = 'US'\n  AND product_category = 'electronics';\n", example_bad: "-- Partitioned but not clustered\nCREATE\
      \ TABLE my_dataset.orders (...)\nPARTITION BY DATE(created_at);\n-- Scans entire partition even when filtering on region\n\
      -- Wastes money on every query\n", when_applies: Projects using Google Cloud Platform services or BigQuery, when_not_applies: "local-only\
      \ or on-premises deployments. projects not using GCP or BigQuery", sources: ["https://cloud.google.com/bigquery/docs/clustered-tables"]},
  {id: "CR-GCP-010", text: "Use slot reservations for predictable BigQuery workloads — on-demand pricing can spike unexpectedly.",
    why: "On-demand BigQuery charges $6.25/TB scanned. A single poorly-written query on a 50TB table costs $312. A scheduled\
      \ pipeline running 100 such queries/day = $31,200/day. Slot reservations (editions) give you fixed compute capacity\
      \ at a predictable price. Flex slots allow hourly commitments for batch jobs.", how_to_do_right: "Use on-demand for\
      \ ad-hoc exploration (< $1K/month). Switch to editions (Standard/Enterprise/Enterprise Plus) for production pipelines.\
      \ Start with autoscaling baseline + max slots. Use reservations to assign capacity to teams/projects. Monitor slot utilization\
      \ with INFORMATION_SCHEMA.", severity: medium, technologies: {platform: [gcp, bigquery]}, domains: {domain: [operations],
      concern: [cloud, cost]}, example_good: "# Create reservation with autoscaling\nbq mk --reservation \\\n  --project_id=my-project\
      \ \\\n  --location=US \\\n  --reservation_id=prod-pipeline \\\n  --edition=STANDARD \\\n  --slots=100 \\\n  --autoscale_max_slots=500\n\
      \n# Assign to project\nbq mk --reservation_assignment \\\n  --reservation_id=prod-pipeline \\\n  --job_type=QUERY \\\
      \n  --assignee_id=my-project \\\n  --assignee_type=PROJECT\n", example_bad: "# All teams on on-demand pricing\n# Data\
      \ scientist runs: SELECT * FROM huge_table JOIN other_huge_table\n# Scans 80TB → $500 in one query\n# Monthly bill:\
      \ unpredictable, ranges from $2K to $50K\n", when_applies: Projects using Google Cloud Platform services or BigQuery,
    when_not_applies: "local-only or on-premises deployments. projects not using GCP or BigQuery", sources: ["https://cloud.google.com/bigquery/docs/reservations-overview"]},
  {id: "CR-GCP-011", text: "Never use SELECT * in BigQuery — always select only the columns you need.", why: "BigQuery is\
      \ columnar storage. SELECT * reads every column, even if you only need 3 of 200. On a 10TB table with 200 columns, selecting\
      \ 3 columns scans ~150GB instead of 10TB — a 66x reduction in cost and latency. This is the single most impactful query\
      \ optimization in BigQuery.", how_to_do_right: "Explicitly list columns in SELECT. Use EXCEPT to exclude specific columns\
      \ from a wide select. Use approximate functions (APPROX_COUNT_DISTINCT, APPROX_QUANTILES) for analytics. Preview data\
      \ with LIMIT in the UI, not in scheduled queries (LIMIT does not reduce bytes scanned).", severity: high, technologies: {
      platform: [gcp, bigquery]}, domains: {domain: [operations, architecture, performance], concern: [cloud, data]}, example_good: "--\
      \ Select only needed columns\nSELECT order_id, customer_id, total\nFROM my_dataset.orders\nWHERE DATE(created_at) =\
      \ CURRENT_DATE();\n\n-- Use approximate functions for large-scale analytics\nSELECT\n  region,\n  APPROX_COUNT_DISTINCT(customer_id)\
      \ AS unique_customers\nFROM my_dataset.orders\nGROUP BY region;\n", example_bad: "-- Reads ALL columns — 66x more expensive\n\
      SELECT * FROM my_dataset.orders\nWHERE DATE(created_at) = CURRENT_DATE();\n\n-- LIMIT does NOT reduce bytes scanned\
      \ in BigQuery!\nSELECT * FROM my_dataset.orders LIMIT 100;\n-- Still scans entire table, just returns 100 rows\n", when_applies: Projects
      using Google Cloud Platform services or BigQuery, when_not_applies: "local-only or on-premises deployments. projects\
      \ not using GCP or BigQuery", sources: ["https://cloud.google.com/bigquery/docs/best-practices-performance-compute"]},
  {id: "CR-GCP-012", text: "Use pull subscriptions for high-throughput consumers and push for low-throughput webhook-style\
      \ integrations.", why: "Push subscriptions send HTTP POST to your endpoint — simple but limited to 10MB/s and vulnerable\
      \ to endpoint overload. Pull subscriptions let the consumer control the rate, batch size, and acknowledgment timing\
      \ — essential for high-throughput pipelines. Choosing wrong means either wasted resources (idle push endpoint) or dropped\
      \ messages (overwhelmed push endpoint).", how_to_do_right: "Use pull for: batch processing, microservices, anything\
      \ consuming > 100 msgs/sec. Use push for: Cloud Functions triggers, low-volume webhooks, serverless consumers. For pull,\
      \ use StreamingPull (not synchronous Pull) for best throughput. Set ack deadline to match your processing time.", severity: medium,
    technologies: {platform: [gcp, pubsub]}, domains: {domain: [operations, architecture, messaging], concern: [cloud]}, example_good: "#\
      \ Pull subscription — high throughput consumer\ngcloud pubsub subscriptions create orders-sub \\\n  --topic=orders \\\
      \n  --ack-deadline=60 \\\n  --enable-exactly-once-delivery\n\n# Push subscription — webhook to Cloud Function\ngcloud\
      \ pubsub subscriptions create alerts-push \\\n  --topic=alerts \\\n  --push-endpoint=https://my-func-xyz.run.app \\\n\
      \  --push-auth-service-account=pubsub-invoker@proj.iam.gserviceaccount.com\n", example_bad: "# Push to a service that\
      \ processes 10K msgs/sec\ngcloud pubsub subscriptions create high-vol-push \\\n  --topic=high-volume \\\n  --push-endpoint=https://my-service.run.app\n\
      # Push endpoint gets hammered, returns 429s\n# Pub/Sub backs off exponentially, messages delayed for minutes\n", when_applies: Projects
      using Google Cloud Platform services or Pub/Sub, when_not_applies: "local-only or on-premises deployments. projects\
      \ not using GCP or Pub/Sub", sources: ["https://cloud.google.com/pubsub/docs/subscriber"]}, {id: "CR-GCP-013", text: "Always\
      \ configure a dead-letter topic on Pub/Sub subscriptions to capture messages that fail processing repeatedly.", why: "Without\
      \ a dead-letter topic, poison messages (malformed, triggering bugs) are retried indefinitely — blocking the subscription,\
      \ wasting compute, and potentially causing cascading failures. After N retries, the message should be moved to a dead-letter\
      \ topic for inspection and manual replay.", how_to_do_right: "Create a dead-letter topic and subscription. Set --max-delivery-attempts\
      \ (typically 5-10). Grant Pub/Sub SA the publisher role on the dead-letter topic and subscriber role on the source subscription.\
      \ Monitor the dead-letter subscription with alerting.", severity: high, technologies: {platform: [gcp, pubsub]}, domains: {
      domain: [operations, architecture, messaging, reliability], concern: [cloud]}, example_good: "# Create dead-letter topic\n\
      gcloud pubsub topics create orders-dlq\ngcloud pubsub subscriptions create orders-dlq-sub \\\n  --topic=orders-dlq\n\
      \n# Configure main subscription with dead-letter\ngcloud pubsub subscriptions update orders-sub \\\n  --dead-letter-topic=orders-dlq\
      \ \\\n  --max-delivery-attempts=5\n\n# Grant permissions to Pub/Sub service account\ngcloud pubsub topics add-iam-policy-binding\
      \ orders-dlq \\\n  --member=\"serviceAccount:service-PROJECT_NUM@gcp-sa-pubsub.iam.gserviceaccount.com\" \\\n  --role=\"\
      roles/pubsub.publisher\"\n", example_bad: "# No dead-letter topic — poison messages retry forever\ngcloud pubsub subscriptions\
      \ create orders-sub \\\n  --topic=orders\n# Malformed message → retry → retry → retry → infinity\n# Subscription backlog\
      \ grows, all consumers stuck on bad message\n", when_applies: Projects using Google Cloud Platform services or Pub/Sub,
    when_not_applies: "local-only or on-premises deployments. projects not using GCP or Pub/Sub", sources: ["https://cloud.google.com/pubsub/docs/dead-letter-topics"]},
  {id: "CR-GCP-014", text: "Use Cloud Functions 2nd gen (Cloud Run-based) for new functions — 1st gen has shorter timeouts,\
      \ no concurrency, and limited runtime support.", why: "1st gen Cloud Functions have a 9-minute timeout, single concurrency\
      \ per instance, and limited runtimes. 2nd gen runs on Cloud Run, giving you 60-minute timeouts, configurable concurrency\
      \ (up to 1000), traffic splitting, min instances, and revisioning. There is no cost difference. 1st gen is legacy.",
    how_to_do_right: "Always deploy with --gen2 flag. Set --concurrency based on your function's thread safety. Use --min-instances=1\
      \ for latency-sensitive event handlers. Use Cloud Run directly if you need more control (custom containers, gRPC).",
    severity: medium, technologies: {platform: [gcp, cloud_functions]}, domains: {domain: [operations, architecture], concern: [
        cloud, serverless]}, example_good: "# 2nd gen function — longer timeout, concurrency, Cloud Run features\ngcloud functions\
      \ deploy process-order \\\n  --gen2 \\\n  --runtime=python312 \\\n  --trigger-topic=orders \\\n  --timeout=300 \\\n\
      \  --concurrency=10 \\\n  --min-instances=1 \\\n  --memory=512Mi\n", example_bad: "# 1st gen function — limited timeout,\
      \ no concurrency\ngcloud functions deploy process-order \\\n  --runtime=python312 \\\n  --trigger-topic=orders\n# Max\
      \ timeout: 540s, concurrency: 1\n# Each message = 1 instance, cold starts on every spike\n", when_applies: Projects
      using Google Cloud Platform services or Cloud Functions, when_not_applies: "local-only or on-premises deployments. projects\
      \ not using GCP or Cloud Functions", sources: ["https://cloud.google.com/functions/docs/concepts/version-comparison"]},
  {id: "CR-GCP-015", text: "Use interleaved tables in Spanner for parent-child relationships to co-locate data and avoid expensive\
      \ distributed joins.", why: "Spanner distributes data across splits by primary key. Without interleaving, parent and\
      \ child rows may be on different splits — joins require cross-node RPCs, adding latency and consuming resources. Interleaving\
      \ physically co-locates child rows with their parent, making joins local and fast.", how_to_do_right: "Declare child\
      \ tables with INTERLEAVE IN PARENT. The child's primary key must prefix the parent's primary key. Use ON DELETE CASCADE\
      \ or ON DELETE NO ACTION. Keep interleave depth <= 3 levels to avoid hotspots.", severity: high, technologies: {platform: [
        gcp, spanner]}, domains: {domain: [operations, architecture], concern: [cloud, data, database]}, example_good: "CREATE\
      \ TABLE Customers (\n  customer_id INT64 NOT NULL,\n  name STRING(255),\n  email STRING(255)\n) PRIMARY KEY (customer_id);\n\
      \nCREATE TABLE Orders (\n  customer_id INT64 NOT NULL,\n  order_id INT64 NOT NULL,\n  total NUMERIC,\n  created_at TIMESTAMP\n\
      ) PRIMARY KEY (customer_id, order_id),\n  INTERLEAVE IN PARENT Customers ON DELETE CASCADE;\n\n-- Orders for customer\
      \ 123 are physically next to the customer row\n-- This join is LOCAL, not distributed:\nSELECT c.name, o.total FROM\
      \ Customers c\nJOIN Orders o ON c.customer_id = o.customer_id\nWHERE c.customer_id = 123;\n", example_bad: "-- Non-interleaved\
      \ — parent and child on different splits\nCREATE TABLE Customers (...) PRIMARY KEY (customer_id);\nCREATE TABLE Orders\
      \ (...) PRIMARY KEY (order_id);\n-- Join requires cross-split RPC — 5-10x slower\n", when_applies: Projects using Google
      Cloud Platform services or Spanner, when_not_applies: "local-only or on-premises deployments. projects not using GCP\
      \ or Spanner", sources: ["https://cloud.google.com/spanner/docs/schema-and-data-model#parent-child"]}, {id: "CR-GCP-016",
    text: "Use composite indexes in Firestore for queries with multiple equality filters or a mix of equality and range filters.",
    why: "Firestore automatically creates single-field indexes but NOT composite indexes. Queries with multiple WHERE clauses\
      \ that include range operators (>, <, >=, <=) or orderBy on different fields will fail at runtime with an error — not\
      \ at deploy time. You discover this in production.", how_to_do_right: "Define composite indexes in firestore.indexes.json.\
      \ Deploy with firebase deploy --only firestore:indexes. The Firebase emulator shows index requirements during development.\
      \ Run your query in the console — it generates the exact index definition needed.", severity: high, technologies: {
      platform: [gcp, firestore]}, domains: {domain: [operations, architecture], concern: [cloud, data, database]}, example_good: "//\
      \ firestore.indexes.json\n{\n  \"indexes\": [\n    {\n      \"collectionGroup\": \"orders\",\n      \"queryScope\":\
      \ \"COLLECTION\",\n      \"fields\": [\n        { \"fieldPath\": \"status\", \"order\": \"ASCENDING\" },\n        {\
      \ \"fieldPath\": \"created_at\", \"order\": \"DESCENDING\" }\n      ]\n    }\n  ]\n}\n\n// Query that requires the composite\
      \ index above\ndb.collection('orders')\n  .where('status', '==', 'pending')\n  .orderBy('created_at', 'desc')\n  .limit(50);\n",
    example_bad: "// No composite index defined\ndb.collection('orders')\n  .where('status', '==', 'pending')\n  .orderBy('created_at',\
      \ 'desc')\n  .limit(50);\n// Runtime error: \"The query requires an index\"\n// Users see a blank screen, devs scramble\
      \ to create the index\n", when_applies: Projects using Google Cloud Platform services or Firestore, when_not_applies: "local-only\
      \ or on-premises deployments. projects not using GCP or Firestore", sources: ["https://cloud.google.com/firestore/docs/query-data/indexing"]},
  {id: "CR-GCP-017", text: "Use Cloud Storage lifecycle rules to automatically transition objects to cheaper storage classes\
      \ and delete expired data.", why: "Without lifecycle rules, all objects stay in Standard class forever — even logs,\
      \ backups, and temp files you will never access again. Standard costs $0.020/GB/month. Archive costs $0.0012/GB/month\
      \ (17x cheaper). A 10TB bucket without lifecycle rules wastes ~$190/month on cold data.", how_to_do_right: "Set lifecycle\
      \ rules in the bucket configuration. Transition to Nearline after 30 days, Coldline after 90 days, Archive after 365\
      \ days. Delete temp/log objects after their retention period. Use object versioning with a lifecycle rule to delete\
      \ old versions.", severity: medium, technologies: {library: [cloud storage], platform: [gcp]}, domains: {domain: [operations],
      concern: [cloud, cost]}, example_good: "# lifecycle.json\n{\n  \"lifecycle\": {\n    \"rule\": [\n      {\n        \"\
      action\": {\"type\": \"SetStorageClass\", \"storageClass\": \"NEARLINE\"},\n        \"condition\": {\"age\": 30, \"\
      matchesStorageClass\": [\"STANDARD\"]}\n      },\n      {\n        \"action\": {\"type\": \"SetStorageClass\", \"storageClass\"\
      : \"COLDLINE\"},\n        \"condition\": {\"age\": 90, \"matchesStorageClass\": [\"NEARLINE\"]}\n      },\n      {\n\
      \        \"action\": {\"type\": \"SetStorageClass\", \"storageClass\": \"ARCHIVE\"},\n        \"condition\": {\"age\"\
      : 365, \"matchesStorageClass\": [\"COLDLINE\"]}\n      },\n      {\n        \"action\": {\"type\": \"Delete\"},\n  \
      \      \"condition\": {\"age\": 730}\n      }\n    ]\n  }\n}\ngsutil lifecycle set lifecycle.json gs://my-bucket\n",
    example_bad: "# No lifecycle rules — all data stays in Standard forever\ngsutil mb gs://my-logs-bucket\n# 3 years later:\
      \ 50TB of logs in Standard class\n# Cost: $1,000/month for data nobody ever reads\n", when_applies: Projects using Google
      Cloud Platform services or Cloud Storage, when_not_applies: "local-only or on-premises deployments. projects not using\
      \ GCP or Cloud Storage", sources: ["https://cloud.google.com/storage/docs/lifecycle"]}, {id: "CR-GCP-018", text: "Use\
      \ signed URLs for time-limited access to Cloud Storage objects — never make buckets public for file sharing.", why: "Making\
      \ a bucket public (allUsers) exposes ALL objects to the internet forever. Even 'unlisted' URLs get discovered by crawlers.\
      \ Signed URLs grant time-limited, scoped access to specific objects without requiring the requester to have a Google\
      \ account or IAM permissions.", how_to_do_right: "Generate signed URLs server-side with an expiration time (15 min to\
      \ 7 days). Use V4 signing for compatibility. For uploads, use signed URLs with PUT method. For downloads, use signed\
      \ URLs with GET method. Rotate the signing SA key regularly.", severity: critical, technologies: {library: [cloud storage],
      platform: [gcp]}, domains: {domain: [operations, security], concern: [cloud]}, example_good: "from google.cloud import\
      \ storage\nfrom datetime import timedelta\n\ndef generate_download_url(bucket_name, blob_name):\n    client = storage.Client()\n\
      \    bucket = client.bucket(bucket_name)\n    blob = bucket.blob(blob_name)\n\n    url = blob.generate_signed_url(\n\
      \        version=\"v4\",\n        expiration=timedelta(minutes=15),\n        method=\"GET\",\n    )\n    return url\
      \  # Valid for 15 minutes only\n", example_bad: "# Make bucket public — ALL objects accessible forever\ngsutil iam ch\
      \ allUsers:objectViewer gs://my-private-data\n# Every file in the bucket is now on the public internet\n# Bots will\
      \ find and index it within hours\n", when_applies: Any project using Google Cloud Platform services or Cloud Storage,
    when_not_applies: "local-only or on-premises deployments. projects not using GCP or Cloud Storage", sources: ["https://cloud.google.com/storage/docs/access-control/signed-urls"]},
  {id: "CR-GCP-019", text: "Use streaming inserts for real-time data and batch loads for historical data — never use streaming\
      \ for large backfills.", why: "Streaming inserts cost $0.05/GB (5x more than storage) and have a 10MB/request limit.\
      \ Loading data from Cloud Storage is FREE. A 1TB backfill via streaming costs $50 and takes hours; a batch load costs\
      \ $0 and completes in minutes. Streaming also has a 90-minute buffer before data is queryable with DML.", how_to_do_right: "Use\
      \ streaming (insertAll API) for real-time events: clickstreams, IoT, transactions. Use batch loads (bq load, Storage\
      \ Write API in batch mode) for: backfills, ETL pipelines, data migrations. Use the Storage Write API committed mode\
      \ for exactly-once delivery.", severity: high, technologies: {platform: [gcp, bigquery]}, domains: {domain: [operations,
        architecture], concern: [cloud, data, cost]}, example_good: "# Batch load from GCS — FREE\nbq load \\\n  --source_format=PARQUET\
      \ \\\n  my_dataset.events \\\n  gs://my-bucket/backfill/*.parquet\n\n# Streaming for real-time events\nfrom google.cloud\
      \ import bigquery\nclient = bigquery.Client()\nerrors = client.insert_rows_json(\"my_dataset.events\", rows)\n\n# Storage\
      \ Write API — best of both (exactly-once, high throughput)\nfrom google.cloud.bigquery_storage_v1 import BigQueryWriteClient\n\
      # Use COMMITTED mode for exactly-once, PENDING for batch\n", example_bad: "# Backfilling 1TB via streaming inserts\n\
      for batch in chunks(historical_data, 500):\n    client.insert_rows_json(\"my_dataset.events\", batch)\n# Cost: $50 (vs\
      \ $0 for batch load)\n# Time: hours (vs minutes for batch load)\n# Data not immediately available for DML operations\n",
    when_applies: Projects using Google Cloud Platform services or BigQuery, when_not_applies: "local-only or on-premises\
      \ deployments. projects not using GCP or BigQuery", sources: ["https://cloud.google.com/bigquery/docs/loading-data"]},
  {id: "CR-GCP-020", text: "Use authorized views in BigQuery for row-level and column-level security — never copy data to\
      \ per-team datasets.", why: "Copying data to per-team datasets creates data silos, staleness, inconsistency, and storage\
      \ cost multiplication. Authorized views query the source table with built-in filters based on the viewer's identity,\
      \ ensuring everyone sees fresh data but only the rows/columns they are allowed to see.", how_to_do_right: "Create a\
      \ view with SESSION_USER() or a mapping table to filter rows. Authorize the view to access the source dataset. Grant\
      \ users access to the view's dataset only. Use column-level security (policy tags) for sensitive columns like PII.",
    severity: medium, technologies: {platform: [gcp, bigquery]}, domains: {domain: [operations, architecture, security], concern: [
        cloud, data]}, example_good: "-- Authorized view with row-level security\nCREATE VIEW secure_dataset.my_orders AS\n\
      SELECT order_id, customer_id, total, region\nFROM raw_dataset.orders\nWHERE region IN (\n  SELECT allowed_region FROM\
      \ access_control.user_regions\n  WHERE user_email = SESSION_USER()\n);\n\n-- Authorize the view to access raw_dataset\n\
      -- (done via BigQuery UI or API, not SQL)\n\n-- Grant users access to the view only\n-- They never see raw_dataset directly\n",
    example_bad: "-- Copy data to per-team datasets (anti-pattern)\nCREATE TABLE team_us.orders AS\nSELECT * FROM raw_dataset.orders\
      \ WHERE region = 'US';\n-- Data is stale immediately\n-- Now you have 10 copies for 10 teams = 10x storage cost\n--\
      \ Someone forgets to update a copy → inconsistent reports\n", when_applies: Projects using Google Cloud Platform services
      or BigQuery, when_not_applies: "local-only or on-premises deployments. projects not using GCP or BigQuery", sources: [
      "https://cloud.google.com/bigquery/docs/authorized-views"]}]
