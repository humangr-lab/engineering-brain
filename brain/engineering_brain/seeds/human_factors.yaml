layer: rules
domain: reasoning
knowledge:
- id: HF-001
  text: "Cognitive load in code review is finite. A reviewer's attention budget depletes after ~400 lines of diff. Focus reviewer attention on high-risk areas (auth, payments, data mutations) and keep PRs under 400 lines."
  why: >
    Studies show that defect detection rate drops by 50% after reviewing 400 lines of code in
    a single session. A 2,000-line PR gets rubber-stamped — reviewers skim headers and approve
    because they cannot maintain deep focus for that long. Critical bugs in authentication logic
    hiding in line 1,847 of a massive PR go unnoticed. Microsoft Research found that review
    effectiveness peaks at 200-400 LOC and degrades linearly after that.
  how_to_do_right: |
    1. Keep PRs under 400 lines of meaningful diff (excluding generated files, lock files)
    2. Split large changes into stacked PRs: data model → business logic → API → UI
    3. Mark files that need careful review with PR comments: "ATTENTION: auth logic changed here"
    4. Use CODEOWNERS to auto-assign domain experts to high-risk file changes
    5. Review security-critical files first when attention is freshest
    6. If a PR exceeds 400 lines, add a summary comment explaining what to focus on
  severity: high
  technologies:
    lang: [python, javascript]
  domains:
    domain: [reasoning, code_quality, culture]
    concern: [meta_cognition]
  example_good: |
    # PR description that guides reviewer attention
    """
    ## What changed
    - Added rate limiting to /api/payments endpoint
    - Changed: src/api/payments.py (SECURITY-CRITICAL — please review carefully)
    - Changed: src/middleware/rate_limit.py (new middleware)
    - Changed: tests/test_payments.py (new tests)

    ## What to focus on
    1. Rate limit window calculation in rate_limit.py:45-60
    2. Token bucket algorithm correctness
    3. Redis key expiration matches window size

    ## What to skim
    - Test file is straightforward parametrized tests
    - Config changes are just new env vars
    """
  example_bad: |
    # 2,000-line PR with no guidance
    """
    ## What changed
    Various improvements and fixes.

    Files changed: 47
    Lines added: 1,847
    Lines removed: 312
    """
    # Reviewer rubber-stamps after skimming first 3 files
  when_applies: "Any code review process, especially for PRs touching security, payments, or data integrity code"
  sources: ["https://smartbear.com/learn/code-review/best-practices-for-peer-code-review/"]

- id: HF-002
  text: "Estimation bias follows Hofstadter's Law: it always takes longer than you expect, even when you account for Hofstadter's Law. Multiply initial estimates by 1.5-3x depending on uncertainty and team experience with the domain."
  why: >
    Software estimation is consistently optimistic. A study of 300+ software projects found that
    actual duration exceeded estimates by 2.5x on average. The reason is structural: estimates
    assume the happy path (no API changes, no infrastructure issues, no sick days, no scope
    creep). Each 'small' complication (dependency upgrade breaks tests, staging environment down,
    PM adds one more requirement) adds 10-20% individually. Five such complications — nearly
    guaranteed — double the timeline.
  how_to_do_right: |
    1. Estimate the work assuming everything goes perfectly (optimistic estimate)
    2. Apply multiplier: 1.5x for well-understood domain, 2x for moderate uncertainty, 3x for new territory
    3. Break large estimates into tasks <4 hours — smaller tasks have lower estimation error
    4. Track actual vs estimated for 10 tasks to calibrate your personal multiplier
    5. Use reference class forecasting: "Last time we did X, it took Y" not "I think it will take Z"
    6. Add explicit buffer for integration, testing, and code review (often forgotten)
  severity: high
  technologies:
    lang: [python, javascript]
  domains:
    domain: [reasoning, culture]
    concern: [estimation]
  example_good: |
    # Estimation template with calibrated multiplier
    """
    Task: Add OAuth2 login with Google
    Optimistic estimate: 3 days
    Domain familiarity: moderate (done OAuth before, not with this stack)
    Multiplier: 2x
    Calibrated estimate: 6 days

    Breakdown:
    - Google OAuth setup + callback: 4h (known)
    - Session management integration: 4h (moderate)
    - Frontend login flow: 4h (known)
    - Error handling + edge cases: 4h (unknown unknowns)
    - Testing + code review: 4h (often underestimated)
    - Integration issues buffer: 4h (experience says this always happens)
    Total: ~6 days
    """
  example_bad: |
    # Optimistic estimation without buffer
    """
    Task: Add OAuth2 login with Google
    Estimate: 2 days
    (Assumes: no API issues, no testing, no code review delays,
     no scope questions, no staging environment problems)
    """
    # Actual: 7 days. Team loses credibility with stakeholders.
  when_applies: "Any software estimation task, sprint planning, or project timeline commitment"
  sources: ["https://en.wikipedia.org/wiki/Hofstadter%27s_law"]

- id: HF-003
  text: "Sunk cost fallacy in engineering: the time already invested in a failing approach is irrelevant to the decision of whether to continue. Killing a project after 6 months is sometimes the right call if the remaining effort exceeds a rewrite."
  why: >
    Teams continue investing in failing architectures because 'we already spent 6 months on this.'
    The 6 months are gone regardless of what you decide next. The only relevant question is: 'From
    today forward, is continuing cheaper than starting over?' A team spent 9 months patching a
    custom ORM that was fundamentally flawed. A rewrite with SQLAlchemy took 3 weeks. They lost
    7.5 months to sunk cost thinking. The emotional attachment to existing code is real but must
    be overridden by rational analysis.
  how_to_do_right: |
    1. Ask: "If we started from scratch today, would we choose this approach?" If no, investigate alternatives.
    2. Estimate remaining effort to complete current approach (include ongoing maintenance cost)
    3. Estimate effort to rewrite with a proven alternative
    4. If rewrite effort < remaining effort + 1 year maintenance: rewrite
    5. Set kill criteria upfront: "If we can't achieve X by date Y, we pivot"
    6. Celebrate the learning from failed approaches — the knowledge transfers to the rewrite
  severity: high
  technologies:
    lang: [python, javascript]
  domains:
    domain: [reasoning, culture]
    concern: [decision_making]
  example_good: |
    # Decision framework for continuing vs pivoting
    """
    Current approach: Custom event sourcing framework
    Time invested: 6 months
    Current state: Works for 3/10 use cases, fragile, 2 critical bugs/week

    Option A: Continue current approach
    - Remaining work: ~4 months to cover all use cases
    - Ongoing maintenance: ~20 hours/month (custom code, no community)
    - Risk: Fundamental design may not support use cases 8-10

    Option B: Migrate to EventStoreDB
    - Migration effort: ~6 weeks
    - Ongoing maintenance: ~2 hours/month (maintained by vendor)
    - Risk: Low, proven technology

    DECISION: Migrate. 6 weeks + low maintenance beats 4 months + high maintenance.
    The 6 months already spent are irrelevant to this calculation.
    """
  example_bad: |
    # Sunk cost reasoning
    """
    We can't switch to EventStoreDB now — we already spent 6 months
    building our custom solution. That would mean throwing away all
    that work. Let's just fix the bugs and push through.
    """
    # 4 months later: still fixing bugs, 8 months total wasted
  when_applies: "Any decision about continuing, pivoting, or abandoning an engineering approach, especially after significant investment"
  sources: ["https://thedecisionlab.com/biases/sunk-cost-fallacy"]

- id: HF-004
  text: "Anchoring bias in estimates: the first number mentioned becomes the cognitive anchor. If someone says 'this should take about 2 weeks' before analysis, all subsequent estimates will cluster around 2 weeks regardless of actual complexity."
  why: >
    In planning meetings, the first person to speak sets the anchor. If the tech lead says 'I
    think 3 days,' junior developers who independently estimated 8 days will self-censor and say
    5 days. The anchor pulls all estimates toward it. Research shows that even explicitly stated
    random numbers influence subsequent estimates. A team anchored to '2 sprints' for a database
    migration spent 2 sprints doing rushed, buggy work instead of the 4 sprints it actually needed.
  how_to_do_right: |
    1. Use blind estimation: everyone writes their estimate independently before any discussion
    2. Use Planning Poker or similar technique where estimates are revealed simultaneously
    3. The most experienced person should estimate LAST, not first
    4. If someone provides an anchor accidentally, explicitly acknowledge it: "Let's ignore that number and estimate fresh"
    5. Use T-shirt sizing (S/M/L/XL) before converting to time — reduces numeric anchoring
    6. Compare against historical data: "The last migration took 4 weeks" is a fact-based anchor
  severity: high
  technologies:
    lang: [python, javascript]
  domains:
    domain: [reasoning, culture]
    concern: [estimation]
  example_good: |
    # Blind estimation process
    """
    FACILITATOR: "We need to estimate the search feature. Please write
    your estimate on a card WITHOUT discussing. We'll reveal simultaneously."

    Revealed estimates: 3 days, 8 days, 5 days, 12 days

    FACILITATOR: "We have a wide spread (3-12 days). Person with 3 days
    and person with 12 days, explain your reasoning."

    - 3 days: "I assumed we'd use Elasticsearch, which I've done before"
    - 12 days: "I assumed we'd build it from scratch with PostgreSQL FTS"

    Discussion reveals: we ARE using Elasticsearch, but nobody on the
    team has experience. Calibrated estimate: 7 days.
    """
  example_bad: |
    # Anchored estimation
    """
    TECH LEAD: "This search feature should take about 2-3 days."
    DEV 1: "Yeah, maybe 3 days."
    DEV 2: "I was thinking 4 days to be safe."
    DEV 3: (Thinks 10 days but says) "5 days max."

    Agreed estimate: 3-4 days.
    Actual: 11 days. Nobody wanted to disagree with the tech lead's anchor.
    """
  when_applies: "Any estimation session, sprint planning, or project scoping discussion where multiple people provide estimates"
  sources: ["https://thedecisionlab.com/biases/anchoring-bias"]

- id: HF-005
  text: "Confirmation bias in debugging: you look for evidence that supports your hypothesis and ignore contradictions. Force yourself to try to disprove your theory, not prove it."
  why: >
    A developer hypothesizes 'the bug is in the cache layer' and spends 4 hours investigating
    cache behavior, finding vaguely suspicious things that 'could explain it.' Meanwhile, the
    actual bug is a race condition in the database layer that they never looked at because their
    hypothesis was wrong. Confirmation bias makes you see patterns that aren't there: 'The cache
    miss rate is 5% — that must be the issue!' (5% is normal). Debugging time doubles when you
    chase the wrong hypothesis without falsifying it first.
  how_to_do_right: |
    1. State your hypothesis explicitly: "I believe the bug is caused by X"
    2. Immediately ask: "What evidence would DISPROVE this hypothesis?"
    3. Check the disproving evidence FIRST — if it holds, your hypothesis is wrong
    4. Use binary search: reproduce the bug, then bisect (git bisect, print-midpoint)
    5. Time-box hypothesis testing: 30 minutes max before pivoting to alternative hypothesis
    6. Keep a debugging log: write down each hypothesis, evidence for and against
    7. Ask a colleague for their hypothesis before sharing yours — independent perspectives
  severity: high
  technologies:
    lang: [python, javascript]
  domains:
    domain: [reasoning, code_quality]
    concern: [diagnosis]
  example_good: |
    # Debugging log — structured hypothesis testing
    """
    BUG: Users see stale data after updating their profile.

    Hypothesis 1: Cache is not invalidated on write.
    Test: Add logging to cache invalidation. Check logs after update.
    Result: Cache IS invalidated correctly. Logs show DELETE key at 14:32:01.
    DISPROVED in 10 minutes. Move on.

    Hypothesis 2: Read replica has replication lag.
    Test: Query primary directly after update. Compare results.
    Result: Primary shows updated data, replica shows stale. Lag is 8 seconds.
    CONFIRMED. Root cause: read-after-write goes to replica with 8s lag.

    Fix: Route read-after-write to primary for 10 seconds post-update.
    """
  example_bad: |
    # Confirmation bias debugging
    """
    BUG: Users see stale data after updating their profile.

    "I bet it's the cache."
    - Looked at cache code for 2 hours
    - Found cache TTL is 300 seconds — "that could explain it!"
    - Rewrote cache invalidation logic (3 hours)
    - Bug still exists
    - "Maybe it's a different cache..."
    - 6 hours wasted on wrong hypothesis
    """
  when_applies: "Any debugging session, especially when the first hypothesis feels obvious or when debugging takes more than 30 minutes"
  sources: ["https://thedecisionlab.com/biases/confirmation-bias"]

- id: HF-006
  text: "Availability bias causes teams to overweight recent incidents. The system that crashed last week gets disproportionate attention, while the system that hasn't been touched in 2 years (and is actually more fragile) is ignored."
  why: >
    After a Redis outage, the team spends 3 sprints hardening Redis (which already has decent
    monitoring) while the PostgreSQL backup system — never tested, last configured 18 months
    ago — quietly rots. When PostgreSQL fails 6 months later, backups don't restore because the
    format changed. Availability bias means vivid, recent events dominate risk assessment. The
    boring, unfailing systems are actually the highest risk because nobody has verified they still
    work.
  how_to_do_right: |
    1. Maintain a risk register independent of recent incidents
    2. Schedule quarterly reviews of ALL infrastructure, not just recently-broken systems
    3. Run game days / chaos engineering on systems that HAVEN'T failed recently
    4. Track "last verified" date for backups, failover, DR plans — alert if >90 days
    5. After an incident, ask: "What ELSE has this same class of vulnerability?"
    6. Use pre-mortem technique: "Imagine it's 6 months from now and our system failed catastrophically. What broke?"
  severity: high
  technologies:
    lang: [python, javascript]
  domains:
    domain: [reasoning, reliability, culture]
    concern: [meta_cognition]
  example_good: |
    # Risk register — independent of recent incidents
    """
    QUARTERLY INFRASTRUCTURE REVIEW — Q1 2026

    | System       | Last Incident | Last Verified | Risk Level | Action      |
    |-------------|---------------|---------------|------------|-------------|
    | Redis        | 2026-01-15   | 2026-01-20   | LOW        | None needed |
    | PostgreSQL   | 2024-06-01   | 2024-08-15   | CRITICAL   | Test backups|
    | S3 Backups   | Never        | 2025-03-01   | HIGH       | Verify DR   |
    | Auth Service | 2025-11-20   | 2025-12-01   | MEDIUM     | Load test   |

    DECISION: Prioritize PostgreSQL backup verification and S3 DR test.
    Redis is fine — recent attention has hardened it sufficiently.
    """
  example_bad: |
    # Availability-biased prioritization
    """
    SPRINT PLANNING after Redis outage:

    "Redis crashed last week. We need to spend 3 sprints on Redis reliability."

    Meanwhile:
    - PostgreSQL backups not tested in 18 months
    - S3 bucket policy allows public access (nobody noticed)
    - Auth service has no rate limiting

    All ignored because Redis is top of mind.
    """
  when_applies: "Any prioritization discussion after an incident, quarterly planning, or risk assessment session"
  sources: ["https://thedecisionlab.com/biases/availability-heuristic"]

- id: HF-007
  text: "Planning fallacy: estimates assume the best-case scenario. Teams imagine the work going smoothly and estimate for that imagined timeline, ignoring that things never go smoothly. Use base rates from past projects instead."
  why: >
    When asked 'how long will this take?', developers mentally simulate the work going well:
    the API is documented, the library works as advertised, tests pass on first run, code review
    has no comments. This imagined best-case becomes the estimate. In reality, the API has
    undocumented edge cases (2 days), the library has a bug (1 day), tests reveal a design flaw
    (2 days), and code review requires refactoring (1 day). The 5-day estimate becomes 11 days.
    Base rate data (how long similar past projects took) is 3x more accurate than estimation by
    imagination.
  how_to_do_right: |
    1. Record actual completion times for all tasks (JIRA, Linear, etc.)
    2. After 20+ tasks, calculate your team's average estimation accuracy ratio
    3. Use that ratio to adjust future estimates: if ratio is 2.3x, multiply by 2.3
    4. Estimate three points: optimistic, likely, pessimistic. Use (O + 4L + P) / 6
    5. Ask: "When was the last time a similar task took only X days?" — if never, the estimate is wrong
    6. Include integration time, code review time, and deployment time in estimates
  severity: high
  technologies:
    lang: [python, javascript]
  domains:
    domain: [reasoning, culture]
    concern: [estimation]
  example_good: |
    # Three-point estimation with base rate calibration
    """
    Task: Integrate Stripe webhook processing

    Historical base rate: Last 3 payment integrations took 8, 12, and 10 days.
    Average: 10 days.

    Three-point estimate:
    - Optimistic: 6 days (everything works, docs are accurate)
    - Likely: 10 days (some undocumented edge cases, 1 retry cycle)
    - Pessimistic: 18 days (Stripe API changes, webhook security issues)

    PERT estimate: (6 + 4*10 + 18) / 6 = 10.7 days
    Base rate confirms: ~10 days is realistic.

    Committed estimate: 11 days (2 sprints + 1 day buffer)
    """
  example_bad: |
    # Planning fallacy — best-case imagination
    """
    Task: Integrate Stripe webhook processing
    Estimate: 4 days

    Assumptions (all optimistic):
    - Stripe docs are complete and accurate
    - Webhook signature verification works first try
    - No edge cases in payment state machine
    - Code review has no comments
    - Staging environment is ready

    Actual: 12 days. Every assumption was wrong.
    """
  when_applies: "Any project estimation or sprint planning, especially for tasks involving external APIs, new technologies, or cross-team dependencies"
  sources: ["https://en.wikipedia.org/wiki/Planning_fallacy"]

- id: HF-008
  text: "Decision fatigue degrades engineering judgment throughout the day. Make critical architectural decisions, security reviews, and complex debugging early in the day. Save routine tasks (dependency updates, formatting, simple bug fixes) for low-energy periods."
  why: >
    Research shows decision quality degrades by 40% over the course of a workday. A developer
    reviewing security-critical code at 5 PM after 8 hours of meetings and context switches
    will miss vulnerabilities that would be obvious at 9 AM. Judges grant parole 65% of the time
    in morning sessions and 0% just before lunch — the same bias affects code reviewers. Critical
    decisions made during decision fatigue are more likely to take shortcuts ('just approve it,'
    'we'll fix it later').
  how_to_do_right: |
    1. Block morning hours (9-11 AM) for deep work: architecture decisions, security reviews, complex debugging
    2. Schedule routine tasks after lunch: dependency updates, documentation, simple fixes
    3. Never make "ship or don't ship" decisions after 4 PM — defer to morning
    4. Limit decisions per day: batch similar decisions (all PR reviews in one block)
    5. If you must make a critical decision while fatigued, write it down and review tomorrow before acting
    6. Use checklists for fatigued-state work to compensate for reduced judgment
  severity: high
  technologies:
    lang: [python, javascript]
  domains:
    domain: [reasoning, culture]
    concern: [meta_cognition]
  example_good: |
    # Daily schedule optimized for decision quality
    """
    MORNING (High energy, high judgment):
    09:00-10:00  Architecture review for new payment service
    10:00-11:00  Security code review for auth changes
    11:00-12:00  Complex debugging session (race condition)

    AFTERNOON (Lower energy, routine tasks):
    13:00-14:00  Dependency updates and CI fixes
    14:00-15:00  Write documentation for morning's decisions
    15:00-16:00  Simple bug fixes from backlog
    16:00-17:00  Slack responses, planning tomorrow's deep work

    RULE: No architectural decisions after 3 PM.
    RULE: Security reviews only before noon.
    """
  example_bad: |
    # Unstructured day — critical decisions at worst time
    """
    09:00-10:00  Slack, emails, standup
    10:00-12:00  Meetings (3 back-to-back)
    12:00-13:00  Lunch
    13:00-14:00  More meetings
    14:00-15:00  Simple bug fixes
    15:00-16:00  Finally start architecture review (exhausted)
    16:30        "Let's just go with option A, I'm tired of thinking about this"
    17:00        Security PR approved with rubber stamp (no energy to review)
    """
  when_applies: "Any engineering workflow planning, especially for senior engineers and tech leads who make many decisions daily"
  sources: ["https://www.nngroup.com/articles/decision-fatigue/"]

- id: HF-009
  text: "Context switching costs 15-25 minutes of productive time per switch. An engineer interrupted 4 times in an afternoon loses 1-2 hours of deep work capacity. Protect focus blocks and batch interruptions."
  why: >
    Research by Gloria Mark (UC Irvine) shows it takes an average of 23 minutes to return to
    the same level of focus after an interruption. A developer working on a complex algorithm
    who checks Slack, answers a question, then returns to the algorithm needs 23 minutes to
    rebuild the mental model. Four interruptions in an afternoon = 92 minutes of lost focus in
    a 4-hour block, leaving only 2 hours of actual productive time. The developer feels like
    they worked a full afternoon but produced 2 hours of output.
  how_to_do_right: |
    1. Block 2-3 hour focus periods with calendar blocks and Slack DND
    2. Batch async communication: check Slack at defined intervals (10 AM, 1 PM, 4 PM)
    3. Use async standup formats (Slack/Linear updates) instead of synchronous meetings
    4. Signal focus mode to team: headphones on, status set to DND, calendar blocked
    5. Document decisions and context in code comments so interruptions cost less to recover from
    6. If you must interrupt someone, lead with: "Is now a good time, or should I message you?"
  severity: high
  technologies:
    lang: [python, javascript]
  domains:
    domain: [reasoning, culture]
    concern: [meta_cognition]
  example_good: |
    # Team agreement for protecting focus time
    """
    TEAM FOCUS PROTOCOL:
    1. 09:00-12:00 = Focus Block (no meetings, Slack DND)
       - Async standup in #standup channel before 09:00
       - Urgent-only interruptions (production down = urgent; question about PR = not urgent)

    2. 12:00-13:00 = Lunch + sync time
       - Check messages, respond to PRs

    3. 13:00-15:00 = Meeting block (schedule all meetings here)

    4. 15:00-17:00 = Focus Block 2 (optional, for deep work)

    INTERRUPT PROTOCOL:
    - If it can wait 2 hours → Slack message
    - If it's blocking you → Slack DM with context
    - If production is down → page directly
    """
  example_bad: |
    # No focus protection — constant context switching
    """
    09:00  Start working on feature
    09:15  Slack: "Quick question about the API" (context switch #1)
    09:38  Return to feature, rebuild mental model
    09:45  Meeting: standup (context switch #2)
    10:15  Return to feature
    10:20  Tap on shoulder: "Can you help with this deploy?" (context switch #3)
    10:55  Return to feature
    11:10  Slack: "PR needs review" (context switch #4)

    Result: 2.5 hours elapsed, ~45 minutes of actual feature work done.
    """
  when_applies: "Any team environment where developers are expected to do deep work alongside communication and collaboration"
  sources: ["https://www.ics.uci.edu/~gmark/chi2005.pdf"]

- id: HF-010
  text: "Bus factor: if only one person understands a system, it's a liability, not an asset. The minimum viable bus factor is 2. Every critical system must have at least 2 people who can debug, deploy, and maintain it."
  why: >
    When the sole expert on the payment system goes on vacation and a critical bug emerges, the
    team has three options: wait (losing revenue), call the vacationing engineer (burning them
    out), or guess (introducing more bugs). A company lost $200K in revenue during a 3-day
    outage because the only person who understood the billing system was unreachable. Bus factor
    of 1 is a ticking time bomb — not if but when it detonates.
  how_to_do_right: |
    1. Identify single-owner systems: who can you NOT afford to lose?
    2. Pair the expert with a second person for 2-4 weeks of knowledge transfer
    3. Require that the second person handles one production incident solo while expert shadows
    4. Document runbooks for critical operations (deploy, rollback, debug common issues)
    5. Rotate on-call so at least 2 people per system are incident-capable
    6. Track bus factor per system in your team wiki — flag any system at 1
  severity: critical
  technologies:
    lang: [python, javascript]
  domains:
    domain: [reasoning, reliability, culture]
    concern: [decision_making]
  example_good: |
    # Bus factor tracking and mitigation
    """
    TEAM BUS FACTOR AUDIT — Q1 2026

    | System          | Primary Owner | Backup Owner | Bus Factor | Status      |
    |----------------|---------------|--------------|------------|-------------|
    | Payment Service | Alice         | Bob          | 2          | OK          |
    | Auth Service    | Carol         | —            | 1          | CRITICAL    |
    | Data Pipeline   | Dave          | Eve          | 2          | OK          |
    | ML Scoring      | Frank         | —            | 1          | CRITICAL    |

    ACTION ITEMS:
    - Carol to pair with Grace on Auth Service (2 weeks starting Feb 10)
    - Frank to write ML Scoring runbook and pair with Hank (3 weeks starting Feb 17)
    - Goal: All systems at bus factor >= 2 by end of Q1
    """
  example_bad: |
    # Bus factor of 1 — single point of failure
    """
    "Don't worry, Dave knows how it works."
    "Dave is the only one who can deploy the data pipeline."
    "We'll document it when we have time."

    Day Dave is sick:
    - Pipeline breaks at 3 AM
    - Nobody knows how to fix it
    - 8 hours of data loss before Dave answers his phone
    """
  when_applies: "Any team managing production systems, especially during hiring, team restructuring, or when planning knowledge transfer"
  sources: ["https://en.wikipedia.org/wiki/Bus_factor"]

- id: HF-011
  text: "Knowledge silos form naturally as engineers specialize. Actively rotate team members across services every 6-12 months to distribute institutional knowledge and prevent silos from becoming single points of failure."
  why: >
    Without rotation, engineers naturally deepen their expertise in one area while becoming
    completely unfamiliar with adjacent systems. After 2 years, 'the payments team' and 'the
    auth team' cannot help each other during incidents. Cross-system bugs become exponentially
    harder to debug because nobody has the full picture. A team that rotated quarterly found
    cross-team bug resolution time dropped from 5 days to 1.5 days because multiple people
    understood both sides of the integration.
  how_to_do_right: |
    1. Rotate 1 team member to a different service every quarter
    2. Rotator spends first week reading code and documentation, second week doing small PRs
    3. By week 3-4, rotator should handle a small feature or bug fix independently
    4. Original expert stays available for questions but does not do the work
    5. After rotation, person becomes the backup owner for that service
    6. Track rotation history: ensure every engineer touches 3+ services over 18 months
  severity: high
  technologies:
    lang: [python, javascript]
  domains:
    domain: [reasoning, culture]
    concern: [communication]
  example_good: |
    # Rotation schedule that builds cross-functional knowledge
    """
    Q1 2026: Alice → Data Pipeline (backup for Dave)
    Q2 2026: Bob → Auth Service (backup for Carol)
    Q3 2026: Carol → Payment Service (backup for Alice)
    Q4 2026: Dave → ML Scoring (backup for Frank)

    ROTATION PROTOCOL:
    - Week 1: Read code, run locally, review recent PRs
    - Week 2: Fix 2-3 small bugs with guidance
    - Week 3: Implement small feature independently
    - Week 4: Handle one on-call shift with original owner shadowing

    OUTCOME: By end of year, every system has bus factor >= 3
    """
  example_bad: |
    # No rotation — deepening silos
    """
    Alice has worked on payments for 3 years.
    Nobody else has touched payments code.
    Alice is irreplaceable — she can never take a real vacation.
    When Alice eventually leaves, 3 years of knowledge leaves with her.
    """
  when_applies: "Any team with 4+ engineers working on multiple services, especially when knowledge concentration is identified as a risk"
  sources: ["https://sre.google/sre-book/effective-troubleshooting/"]

- id: HF-012
  text: "Code review is primarily knowledge transfer, not bug finding. Reviews catch ~15% of bugs, but 100% of reviews expose team members to code they didn't write. Optimize review process for learning, not just approval."
  why: >
    Studies show that code review catches about 15% of defects — less than testing or static
    analysis. But code review is the primary mechanism for spreading knowledge about the codebase.
    A junior developer reviewing a senior's authentication code learns patterns they'll use for
    years. When reviews are optimized purely for speed ('LGTM, ship it'), this learning disappears.
    Teams that treat reviews as learning opportunities have 40% faster onboarding and 60% lower
    knowledge silos.
  how_to_do_right: |
    1. Require reviews from people who DON'T own the changed code (forces knowledge spread)
    2. Reviewer should comment on patterns they learned, not just problems they found
    3. Author should add context comments explaining WHY, not just WHAT changed
    4. Rotate reviewers: don't always assign the same person to review the same area
    5. Use review as onboarding: new team members review PRs in their first week (with no approval power)
    6. Timebox reviews to 30-60 minutes — deep review of a subset beats shallow review of everything
  severity: high
  technologies:
    lang: [python, javascript]
  domains:
    domain: [reasoning, culture, code_quality]
    concern: [communication]
  example_good: |
    # Code review comment that transfers knowledge
    """
    REVIEWER (Alice, not the auth team):

    payments.py:45 — "I didn't know we use idempotency keys for retry safety.
    This is a great pattern — I should add this to the order service too.
    Question: is the 24-hour TTL on the idempotency key intentional?"

    AUTHOR (Bob):
    "Yes — Stripe recommends 24h. After that, the same request creates a new
    charge. We chose 24h because our retry policy maxes out at 6 hours."

    → Alice now understands idempotency patterns for her own service.
    → The team has a written record of the design decision.
    """
  example_bad: |
    # Review optimized for speed, not learning
    """
    REVIEWER: "LGTM"
    — Approved in 2 minutes
    — No comments
    — No questions
    — Reviewer learned nothing
    — Author got no feedback
    — Knowledge stayed siloed
    """
  when_applies: "Any code review process, especially in teams larger than 3 people or teams with varying experience levels"
  sources: ["https://google.github.io/eng-practices/review/"]

- id: HF-013
  text: "Pair programming ROI depends on task complexity. For simple tasks (CRUD, config changes), pairing halves throughput with minimal quality gain. For complex tasks (distributed systems, security, architecture), pairing reduces total time and defects."
  why: >
    A study at Microsoft found that pair programming on complex tasks reduced defects by 15%
    and total elapsed time (including debugging) by 20%, but increased development time by 40%
    on simple tasks with no quality improvement. Two senior engineers writing a configuration
    file together is waste. Two engineers designing a distributed locking algorithm together
    catch design flaws that would otherwise surface as production bugs weeks later. The key is
    knowing when to pair and when not to.
  how_to_do_right: |
    1. PAIR for: architecture design, security-critical code, complex algorithms, onboarding
    2. SOLO for: simple CRUD, config changes, documentation, routine bug fixes
    3. Use driver-navigator model: driver writes code, navigator thinks strategically
    4. Switch roles every 25-30 minutes (Pomodoro-style)
    5. Time-box pairing sessions to 2 hours maximum — diminishing returns after that
    6. Both engineers commit as co-authors (git commit with Co-authored-by)
  severity: high
  technologies:
    lang: [python, javascript]
  domains:
    domain: [reasoning, culture]
    concern: [decision_making]
  example_good: |
    # Pairing decision framework
    """
    TASK: Implement rate limiting middleware
    Complexity: HIGH (distributed, race conditions, Redis Lua scripts)
    Novelty: HIGH (team hasn't built rate limiters before)
    Risk: HIGH (wrong implementation causes outage or abuse)

    DECISION: PAIR PROGRAM ✓
    - Alice (driver): Redis experience
    - Bob (navigator): distributed systems experience
    - Time-box: 2 hours, switch roles at 1 hour
    - Expected outcome: correct implementation in 1 day vs 3 days solo + bugs

    ---

    TASK: Add email field to user profile form
    Complexity: LOW (simple CRUD)
    Novelty: LOW (done this many times)
    Risk: LOW (no security/data implications)

    DECISION: SOLO ✓
    - Pairing would double the cost with no quality improvement
    """
  example_bad: |
    # Blanket pairing policy — wasteful for simple tasks
    """
    POLICY: All code must be pair-programmed.

    Result: Two senior engineers spend 2 hours writing a config file together.
    Neither learns anything. Throughput halved. Engineers frustrated.
    Eventually they stop pairing entirely because "it wastes time."
    """
  when_applies: "Any team considering or already practicing pair programming, especially when deciding which tasks warrant pairing"
  sources: ["https://martinfowler.com/articles/on-pair-programming.html"]

- id: HF-014
  text: "Meeting cost is people times hours. An 8-person meeting for 1 hour costs 1 person-day of engineering capacity. Before scheduling, ask: can this be an async Slack thread, a document, or a 15-minute standup instead?"
  why: >
    An 8-person, 1-hour meeting consumes 8 person-hours — a full person-day of engineering
    capacity. If 4 of the 8 people are passive listeners who could have read a summary, you
    wasted 4 person-hours (half a person-day). A team with 3 hours of daily meetings per engineer
    has only 5 hours of coding time — and with context switching costs, effectively 3 hours of
    productive work. Companies that reduced meetings by 40% saw 71% increase in productivity
    (Asana research, 2022).
  how_to_do_right: |
    1. Calculate meeting cost: attendees × hours × hourly rate (or just person-hours)
    2. Before scheduling, try: async document with comment period, Slack thread, or Loom video
    3. If meeting is needed: minimize attendees (only people who must speak or decide)
    4. Set agenda with desired outcomes — "decide X" not "discuss X"
    5. Default to 25 minutes (not 30) or 50 minutes (not 60) to allow transition time
    6. End every meeting with: decisions made, action items, owners, deadlines
  severity: high
  technologies:
    lang: [python, javascript]
  domains:
    domain: [reasoning, culture]
    concern: [decision_making]
  example_good: |
    # Meeting cost analysis and alternative
    """
    PROPOSED: Architecture review meeting
    Attendees: 8 engineers
    Duration: 1 hour
    Cost: 8 person-hours = 1 person-day

    ALTERNATIVE (chosen):
    1. Author writes architecture doc (2 hours, 1 person)
    2. Posts in #architecture Slack channel for async review (24h window)
    3. 15-minute sync meeting with only the 3 people who had questions
    Total cost: 2.75 person-hours (65% cheaper)

    RESULT: Better decision quality (reviewers had time to think)
    + written record of discussion + less context switching for 5 engineers.
    """
  example_bad: |
    # Expensive meeting that could be an email
    """
    MEETING: "Sprint Planning"
    Attendees: 12 people (entire team including QA, design, PMs)
    Duration: 2 hours
    Cost: 24 person-hours = 3 person-days

    Agenda: "Review sprint backlog"
    Outcome: 8 of 12 people were passive listeners.
    Most items discussed were relevant to only 2-3 people.
    Could have been: async prioritization + 30-min meeting with leads only.
    """
  when_applies: "Any meeting scheduling decision, especially recurring meetings, all-hands meetings, or meetings with more than 5 attendees"
  sources: ["https://blog.pragmaticengineer.com/how-big-tech-runs-tech-projects/"]

- id: HF-015
  text: "Documentation is an onboarding investment with compounding returns. 4 hours of documentation saves 4 hours per new team member — after 5 hires, you've saved 20 hours. Write documentation for the person joining the team 6 months from now."
  why: >
    Without documentation, every new hire asks the same questions to the same senior engineers.
    A 30-minute question asked by 10 new hires over 2 years costs 5 hours of senior engineering
    time — time that could have been saved by a 30-minute document. Teams without onboarding docs
    report 4-6 week ramp-up times; teams with good docs report 1-2 weeks. The compounding effect
    is dramatic: a team of 20 that grows by 10 per year saves 200+ hours annually with proper
    documentation.
  how_to_do_right: |
    1. Write a GETTING_STARTED.md that goes from git clone to running tests in <30 minutes
    2. Document the WHY behind non-obvious decisions in ADRs (Architecture Decision Records)
    3. Keep docs next to code (not in a wiki nobody updates): README.md in each service directory
    4. Onboarding buddy records new-hire questions and adds answers to docs
    5. Review docs quarterly: if something changed, the doc must update too
    6. Use "documentation-driven development": write the doc before the code for complex features
  severity: high
  technologies:
    lang: [python, javascript]
  domains:
    domain: [reasoning, culture]
    concern: [communication]
  example_good: |
    # Onboarding document that saves hours per new hire
    """
    # Payment Service — Getting Started

    ## Prerequisites
    - Docker 24+ installed
    - Python 3.11+
    - Access to 1Password vault "Engineering" (ask your manager)

    ## Setup (15 minutes)
    git clone git@github.com:company/payment-service.git
    cd payment-service
    cp .env.example .env  # Fill in from 1Password
    docker compose up -d
    pip install -e ".[dev]"
    pytest  # All tests should pass

    ## Architecture
    See docs/ARCHITECTURE.md for system design.

    ## Common Questions
    Q: Why do we use Stripe webhooks instead of polling?
    A: See ADR-003 — polling missed 2% of events in testing.

    Q: How do I test payment flows locally?
    A: See docs/LOCAL_TESTING.md — uses Stripe test mode with fixtures.
    """
  example_bad: |
    # No documentation — tribal knowledge only
    """
    New hire: "How do I set up the payment service?"
    Senior: "Oh, you need to ask Dave for the secrets, then run the
    special docker command — I think it's in Slack somewhere.
    Also the README is outdated, don't follow it."

    New hire spends 3 days setting up what should take 30 minutes.
    """
  when_applies: "Any team with more than 3 engineers, especially growing teams or teams with regular hiring"
  sources: ["https://www.writethedocs.org/guide/writing/beginners-guide-to-docs/"]

- id: HF-016
  text: "In technical communication, explain WHY before WHAT. People resist changes they don't understand the motivation for. 'We need to migrate to PostgreSQL 16 because our current version loses support in March' gets buy-in; 'We need to migrate to PostgreSQL 16' gets pushback."
  why: >
    Without understanding WHY, engineers fill in their own (often wrong) reasons: 'They want to
    migrate for resume-driven development' or 'This is unnecessary churn.' A migration proposal
    that leads with business impact ('our database version is EOL in 60 days, unpatched CVEs
    after that') gets immediate buy-in. The same proposal that leads with the technical change
    ('Let's upgrade PostgreSQL') triggers weeks of debate about timing and necessity. The WHY
    provides the urgency and context that makes the WHAT uncontroversial.
  how_to_do_right: |
    1. Structure proposals as: PROBLEM → IMPACT → PROPOSED SOLUTION → ALTERNATIVES CONSIDERED
    2. Lead with business impact: "This costs us $X/month" or "This risks Y"
    3. Quantify when possible: "3 incidents in the last 30 days" not "we keep having problems"
    4. Show alternatives you rejected and WHY: demonstrates thorough thinking
    5. End with clear ask: "I need a decision by Friday" not "thoughts?"
    6. For code comments: explain WHY the code exists, not WHAT it does (the code shows WHAT)
  severity: high
  technologies:
    lang: [python, javascript]
  domains:
    domain: [reasoning, culture]
    concern: [communication]
  example_good: |
    # Technical proposal with WHY-first structure
    """
    ## Problem
    PostgreSQL 14 reaches EOL on November 12, 2026. After EOL:
    - No security patches (CVE-2026-XXXX type vulnerabilities go unpatched)
    - Cloud provider drops support (AWS RDS forces upgrade with downtime)

    ## Impact
    - Compliance audit in Q3 will flag unsupported database as critical finding
    - If we delay, AWS forces a maintenance window (up to 30 min downtime)

    ## Proposal
    Migrate to PostgreSQL 16 during Q2 maintenance window (planned downtime).

    ## Alternatives Considered
    1. PostgreSQL 15: Same effort, shorter support window. Rejected.
    2. Wait for forced upgrade: Uncontrolled timing, potential data issues. Rejected.
    3. Migrate to CockroachDB: 10x effort, not justified. Rejected.

    ## Ask
    Approve 2-sprint allocation for migration. Decision needed by Feb 28.
    """
  example_bad: |
    # WHAT-first proposal — triggers resistance
    """
    Subject: PostgreSQL Migration

    We should migrate to PostgreSQL 16. I've started a branch.
    Can we allocate 2 sprints for this?

    Response from team: "Why? PG 14 works fine. We have features to ship."
    3 weeks of debate follow before anyone looks up the EOL date.
    """
  when_applies: "Any technical proposal, RFC, ADR, or communication that requires buy-in from stakeholders or team members"
  sources: ["https://www.nngroup.com/articles/ten-usability-heuristics/"]

- id: HF-017
  text: "Incident post-mortems must be blameless. Focus on systems that failed, not people who made mistakes. 'The deploy pipeline lacked a rollback mechanism' is actionable; 'Bob deployed without testing' is blame that prevents honest reporting."
  why: >
    If post-mortems assign blame, engineers stop reporting incidents. They hide near-misses,
    downplay their involvement, and avoid being the one who 'caused' the outage. The result is
    less data, fewer improvements, and more repeated incidents. Google's SRE team attributes
    their reliability to blameless post-mortems: engineers report everything because they know
    they won't be punished. Organizations with blame cultures have 2.5x more repeat incidents
    because root causes are hidden, not fixed.
  how_to_do_right: |
    1. Use "the system allowed X to happen" language, not "person X did Y wrong"
    2. Ask "how do we make this impossible?" not "who did this?"
    3. Focus on contributing factors: missing tests, absent guardrails, unclear runbooks
    4. Generate action items that change systems (add alerts, add tests, improve docs)
    5. Publish post-mortems company-wide — transparency builds trust
    6. Thank the person who reported the incident — reporting is the most valuable step
    7. Template: Timeline → Impact → Root Cause → Contributing Factors → Action Items
  severity: high
  technologies:
    lang: [python, javascript]
  domains:
    domain: [reasoning, culture, reliability]
    concern: [communication]
  example_good: |
    # Blameless post-mortem excerpt
    """
    ## Incident: Payment Processing Outage (2026-02-15, 45 min)

    ## Root Cause
    A configuration change was deployed to production without passing
    through the staging environment. The deployment pipeline did not
    enforce staging-first deployment for configuration changes.

    ## Contributing Factors
    1. Configuration changes bypass CI/CD pipeline (no automated validation)
    2. No canary deployment for config changes
    3. Monitoring alert for payment failures had a 10-minute delay
    4. Runbook for payment outage was last updated 8 months ago

    ## Action Items
    1. [P0] Add config change validation to CI/CD pipeline (owner: Team Lead, due: Feb 22)
    2. [P1] Reduce payment failure alert delay to 1 minute (owner: SRE, due: Feb 20)
    3. [P1] Update payment outage runbook (owner: On-call, due: Feb 25)
    """
  example_bad: |
    # Blame-focused post-mortem
    """
    ## Root Cause
    Bob deployed a bad config to production without testing.

    ## Action Items
    1. Bob should be more careful in the future
    2. Require Bob to get approval before deploying

    Result: Bob never reports near-misses again. Carol, who almost
    made the same mistake last week, stays quiet too.
    """
  when_applies: "Any production incident response, post-mortem, or retrospective discussion"
  sources: ["https://sre.google/sre-book/postmortem-culture/"]

- id: HF-018
  text: "On-call rotation must be equitable, sustainable, and compensated. An unfair or exhausting on-call schedule causes burnout, attrition, and eventually — when the burned-out person quits — the exact outage you were trying to prevent."
  why: >
    A team of 8 with 2 always handling on-call creates resentment and burnout. Those 2 people
    accumulate sleep debt, their code quality drops, and they eventually quit — taking their
    institutional knowledge with them. The remaining 6, who never did on-call, are unprepared
    for incidents. Companies with equitable on-call rotations have 30% lower attrition among
    senior engineers. Compensation (extra pay or time off) signals that the organization values
    the burden, not just the availability.
  how_to_do_right: |
    1. Rotate equally: everyone in the rotation takes the same number of shifts
    2. One week on, N-1 weeks off (where N = team size). Minimum 3-person rotation.
    3. Compensate: extra pay (20-30% for on-call weeks) or comp time (1 day off per on-call week)
    4. On-call person is NOT expected to do feature work during their shift — only incidents + toil
    5. Track pages per person — if someone gets 3x more pages, fix the alert, not the rotation
    6. Maximum 1 in 4 weeks on-call. More frequent = unsustainable = hire more engineers
    7. Handoff meeting between rotations: share active issues and recent changes
  severity: high
  technologies:
    lang: [python, javascript]
  domains:
    domain: [reasoning, culture, operations]
    concern: [decision_making]
  example_good: |
    # Equitable on-call rotation design
    """
    TEAM ON-CALL ROTATION (6 engineers)

    Schedule: 1 week on, 5 weeks off
    Compensation: 1 comp day per on-call week (taken within 30 days)
    Escalation: Primary → Secondary → Engineering Manager

    Week 1: Alice (primary), Bob (secondary)
    Week 2: Carol (primary), Dave (secondary)
    Week 3: Eve (primary), Frank (secondary)
    Week 4: Bob (primary), Carol (secondary)
    ...

    EXPECTATIONS DURING ON-CALL WEEK:
    - Respond to pages within 15 minutes
    - No feature work — focus on incidents + toil reduction
    - Document all incidents in #incidents channel
    - Handoff meeting (30 min) with next rotation on Monday

    MONTHLY REVIEW:
    - Pages per person (should be roughly equal)
    - Noisy alerts identified and fixed
    - Comp days actually taken (enforce this)
    """
  example_bad: |
    # Inequitable on-call
    """
    "Alice and Bob handle on-call because they know the system best."
    - Alice: on-call 26 weeks/year (50%)
    - Bob: on-call 26 weeks/year (50%)
    - Carol, Dave, Eve, Frank: never on-call

    Result after 1 year:
    - Alice burns out, takes medical leave
    - Bob quits for a job with no on-call
    - Carol is now sole on-call with zero experience
    """
  when_applies: "Any team operating production services with on-call responsibilities"
  sources: ["https://sre.google/sre-book/being-on-call/"]

- id: HF-019
  text: "Burnout manifests as declining code quality, increasing shortcuts, and social withdrawal. These are systems signals, not personal failings. When you see them, reduce workload and investigate systemic causes — don't tell the person to 'manage their time better.'"
  why: >
    Burnout costs organizations 2-3x the burned-out person's salary: decreased productivity for
    months before departure, recruiting costs, onboarding replacement, lost institutional knowledge.
    Early signals are measurable: PR sizes shrink (doing minimum), code review comments become
    terse, technical debt increases (shortcuts), meeting participation drops. These are NOT
    personal problems — they are symptoms of systemic issues: unsustainable on-call, unrealistic
    deadlines, constant context switching, or lack of autonomy. Telling someone to 'take a
    vacation' without fixing the system guarantees they burn out again within 3 months.
  how_to_do_right: |
    1. Track leading indicators: PR size trends, code review engagement, meeting participation
    2. When indicators decline for 2+ weeks, have a 1:1 conversation (not a performance review)
    3. Ask about systemic issues: "What's making your work harder than it should be?"
    4. Reduce workload immediately: remove one responsibility, defer one deadline
    5. Fix the systemic issue: if on-call is the cause, fix the rotation; if deadlines, renegotiate scope
    6. Follow up in 2 weeks — burnout recovery takes 4-8 weeks minimum
    7. Normalize taking mental health days without requiring justification
  severity: critical
  technologies:
    lang: [python, javascript]
  domains:
    domain: [reasoning, culture]
    concern: [meta_cognition]
  example_good: |
    # Manager response to burnout signals
    """
    OBSERVATION (over 3 weeks):
    - Alice's PR sizes dropped from avg 200 LOC to avg 50 LOC
    - Code review comments went from detailed to "LGTM"
    - Stopped attending optional architecture meetings
    - Committed code with TODO comments instead of implementations

    RESPONSE:
    1:1 with Alice (not a performance review):
    "I noticed your engagement has shifted lately. I want to understand
    what's making work harder. Is there something systemic we can fix?"

    Alice: "I've been on-call 3 of the last 4 weeks because Dave is out.
    I'm getting paged at 3 AM and expected to ship features during the day."

    ACTION:
    - Immediately removed Alice from next 2 on-call rotations
    - Hired contractor for on-call coverage during Dave's absence
    - Reduced Alice's sprint commitment by 30% for 4 weeks
    - Scheduled follow-up 1:1 in 2 weeks
    """
  example_bad: |
    # Blame-the-individual response
    """
    MANAGER: "Alice, your productivity has dropped. Your PRs are smaller
    and you're not attending meetings. You need to manage your time better.
    Have you tried making a to-do list?"

    Result: Alice feels unsupported, starts job searching.
    Root cause (unsustainable on-call) never addressed.
    Next person in the rotation burns out too.
    """
  when_applies: "Any team leadership role, especially when noticing changes in engineer behavior, output quality, or engagement patterns"
  sources: ["https://www.who.int/news-room/fact-sheets/detail/burn-out-an-occupational-phenomenon-international-classification-of-diseases"]

- id: HF-020
  text: "Team velocity is not the sum of individual velocities. Collaboration overhead (code reviews, meetings, knowledge sharing, integration) is real and necessary. A team of 5 does not produce 5x what 1 person produces — it produces 3-4x, and that's healthy."
  why: >
    Brooks's Law: adding people to a late project makes it later. Communication overhead grows
    quadratically: 5 people have 10 communication channels, 10 people have 45. A team of 5
    spending 20% of time on collaboration (reviews, meetings, integration) produces 4x individual
    output — not 5x. This is not waste; it's the cost of alignment, quality, and knowledge
    sharing. Teams that try to eliminate all 'overhead' by isolating engineers produce siloed,
    inconsistent, bug-ridden code that costs more to maintain than the collaboration would have.
  how_to_do_right: |
    1. Budget 20-30% of team capacity for collaboration: code review, meetings, pairing, mentoring
    2. Use team velocity (total story points) not individual velocity for planning
    3. Never compare individual velocities — it incentivizes cutting corners on reviews and docs
    4. When adding team members, expect velocity to DIP for 4-6 weeks (onboarding cost) before increasing
    5. Optimal team size is 5-7 people. Above 7, communication overhead exceeds marginal productivity
    6. Track team throughput (features shipped) not individual output (lines of code, PRs merged)
  severity: high
  technologies:
    lang: [python, javascript]
  domains:
    domain: [reasoning, culture]
    concern: [decision_making]
  example_good: |
    # Capacity planning that accounts for collaboration overhead
    """
    SPRINT CAPACITY PLANNING

    Team size: 6 engineers
    Sprint: 2 weeks (10 working days per person = 60 person-days raw)

    Collaboration overhead (healthy, expected):
    - Code reviews: 10% = 6 person-days
    - Meetings (standup, planning, retro): 5% = 3 person-days
    - Mentoring/pairing: 5% = 3 person-days
    - On-call/incidents: 5% = 3 person-days
    Total overhead: 25% = 15 person-days

    Available for feature work: 45 person-days
    Velocity: ~45 story points (1 SP ≈ 1 person-day)

    NOTE: This is 75% efficiency, which is NORMAL and HEALTHY.
    Do not try to "optimize" away code reviews or pairing.
    """
  example_bad: |
    # Individual velocity tracking that destroys collaboration
    """
    MANAGER: "Individual velocity report — Sprint 14"

    Alice: 12 story points
    Bob: 8 story points    ← "Bob, why are you behind?"
    Carol: 15 story points
    Dave: 6 story points   ← "Dave needs to step up"

    What actually happened:
    - Bob spent 40% of his time reviewing Alice's and Carol's PRs (improving quality)
    - Dave spent 30% of his time mentoring the new hire (reducing future ramp-up)
    - Both are punished for collaboration that benefits the entire team
    - Next sprint: Bob stops reviewing, Carol's bugs ship to production
    """
  when_applies: "Any team capacity planning, velocity tracking, or team performance discussion"
  sources: ["https://en.wikipedia.org/wiki/Brooks%27s_law"]
