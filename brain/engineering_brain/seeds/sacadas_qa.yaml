layer: rules
domain: sacada
knowledge:
- id: SAC-QA-001
  text: 100% code coverage means NOTHING with weak assertions — assert True, assert response.status_code (without checking body), assert len(result) > 0 are all worthless tests that pass on any output
  why: 'A test suite with 100% line coverage and zero meaningful assertions gives false confidence. The code runs but nothing is verified. Real example: a team had 98% coverage on a payment service. Every test called the endpoint and asserted status 200. When the payment amount calculation was wrong by 10x, all tests passed. The bug shipped to production and overcharged 12,000 customers. Coverage measures execution, not verification. A test without a meaningful assertion is just a smoke test pretending to be a unit test.'
  how_to_do_right: |
    1. For every test, ask: "If I break the logic, does this test fail?"
    2. Assert on SPECIFIC output values, not just types or truthiness.
    3. Assert on exact expected results: assert result.total == Decimal("49.99"), not assert result.total > 0.
    4. Assert response bodies, not just status codes: assert response.json()["user"]["email"] == "test@example.com".
    5. Use mutation testing (mutmut, cosmic-ray) to verify assertion quality — if mutants survive, your assertions are weak.
    6. Ban assert True, assert result, assert len(x) > 0 in code review unless explicitly justified.
  severity: critical
  technologies:
    lang: [python, javascript]
    framework: [pytest, jest, unittest]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition, verification]
  example_good: |
    def test_discount_applied_correctly():
        order = create_order(items=[Item(price=100)], coupon="SAVE20")
        result = calculate_total(order)
        assert result.subtotal == Decimal("100.00")
        assert result.discount == Decimal("20.00")
        assert result.total == Decimal("80.00")
        assert result.coupon_applied == "SAVE20"
  example_bad: |
    def test_discount():
        order = create_order(items=[Item(price=100)], coupon="SAVE20")
        result = calculate_total(order)
        assert result is not None          # passes if discount is wrong
        assert result.total > 0            # passes if total is 999.99
        assert isinstance(result, OrderTotal)  # passes on any OrderTotal
  when_applies: During QA review of test suites, code review of new tests, test quality audits
  sources: ["https://martinfowler.com/bliki/AssertionFreeTesting.html"]

- id: SAC-QA-002
  text: Test the CONTRACT, not the implementation — if you test internal method calls, every refactor breaks tests without catching any real bug
  why: 'Tests coupled to implementation details (mock.assert_called_with on internal methods, testing private functions, asserting call order of helpers) break on every refactor even when behavior is correct. This creates a perverse incentive: developers stop refactoring because it breaks too many tests. The codebase rots. Real example: a team had 400 tests on a billing module. 380 mocked internal methods. When they refactored from synchronous to async processing, 380 tests broke. Zero of those tests would have caught the actual billing bug that shipped two weeks later — because they tested HOW the code worked, not WHAT it produced.'
  how_to_do_right: |
    1. Test public interfaces only: given input X, expect output Y.
    2. Use real dependencies when possible (in-memory DB, test containers).
    3. Mock only at system boundaries: external APIs, filesystem, clock.
    4. Never assert on call counts or call order of internal methods.
    5. If a refactor breaks a test but the feature still works, the test is wrong.
    6. Write tests as if the implementation is a black box you cannot see.
  severity: high
  technologies:
    lang: [python, javascript]
    framework: [pytest, jest, unittest, mocha]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition, architecture]
  example_good: |
    def test_user_registration_sends_welcome_email():
        # Test the contract: register -> email sent
        fake_mailer = FakeMailer()
        service = UserService(mailer=fake_mailer)
        service.register(email="new@example.com", name="Alice")
        assert fake_mailer.sent_to == ["new@example.com"]
        assert "Welcome" in fake_mailer.last_subject
  example_bad: |
    def test_user_registration():
        service = UserService(mailer=mock_mailer)
        service.register(email="new@example.com", name="Alice")
        # Coupled to implementation: breaks if internals change
        mock_mailer.send.assert_called_once_with(
            to="new@example.com",
            template="welcome_v2",     # breaks if template renamed
            context={"name": "Alice"}, # breaks if context key changes
        )
        service._validate_email.assert_called_once()  # testing private method
  when_applies: During code review of test files, test refactoring, test architecture decisions
  sources: ["https://martinfowler.com/bliki/ContractTest.html"]

- id: SAC-QA-003
  text: What happens when the user does the WRONG thing? Happy path tests are table stakes — edge cases, malicious inputs, and concurrent operations are where production bugs hide
  why: 'Developers naturally test what the code is supposed to do. Nobody naturally tests what the code is NOT supposed to do. Real example: a file upload endpoint had 15 happy-path tests (JPEG, PNG, PDF, various sizes). Zero tests for: empty file, 10GB file, file with null bytes in filename, filename with path traversal (../../etc/passwd), concurrent upload of same filename, upload with expired auth token. A pentester found 4 exploitable vulnerabilities in 30 minutes. Every bug was in an untested error path.'
  how_to_do_right: |
    1. For every feature, list 3 happy paths and 10 sad paths.
    2. Test boundaries: empty, null, maximum, negative, zero, overflow.
    3. Test malicious inputs: SQL injection, XSS, path traversal, oversized payloads.
    4. Test concurrency: two users doing the same thing simultaneously.
    5. Test permission boundaries: what if the user is not authorized?
    6. Test state transitions: what if the entity is in the wrong state for this operation?
    7. Use the mnemonic BICEP: Boundary, Inverse, Cross-check, Error, Performance.
  severity: critical
  technologies:
    lang: [python, javascript]
    framework: [pytest, jest, hypothesis, fast-check]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition, security, robustness]
  example_good: |
    class TestFileUpload:
        def test_upload_jpeg_success(self): ...          # happy path
        def test_upload_empty_file_returns_400(self): ... # edge case
        def test_upload_10gb_file_returns_413(self): ...  # boundary
        def test_upload_null_bytes_in_name_rejected(self): ...  # malicious
        def test_upload_path_traversal_blocked(self): ... # security
        def test_upload_expired_token_returns_401(self): ... # auth
        def test_concurrent_upload_same_name(self): ...   # concurrency
        def test_upload_unsupported_mime_type(self): ...  # validation
  example_bad: |
    class TestFileUpload:
        def test_upload_jpeg(self): ...   # only happy path
        def test_upload_png(self): ...    # another happy path
        def test_upload_pdf(self): ...    # yet another happy path
        # no edge cases, no error paths, no security tests
  when_applies: During QA review, test planning, feature specification review
  sources: ["https://cheatsheetseries.owasp.org/cheatsheets/Input_Validation_Cheat_Sheet.html"]

- id: SAC-QA-004
  text: A flaky test is an ENVIRONMENT DEPENDENCY in disguise — if a test passes sometimes and fails sometimes, it depends on timing, external service, or shared state, and the root cause must be found and fixed
  why: 'Flaky tests erode trust in the entire test suite. After 3-5 flaky failures, developers start ignoring test failures ("oh that one is flaky") and real bugs slip through. Flaky tests are never random — they have a deterministic root cause that is hard to reproduce. Common causes: sleep-based timing (sleep(2) hoping async completes), shared database state between tests, external API calls in tests, timezone-dependent logic, file system ordering assumptions. Real example: a CI pipeline had 8 flaky tests. The team added retry logic (run 3 times, pass if any pass). This masked a race condition that later caused data corruption in production.'
  how_to_do_right: |
    1. Never retry flaky tests — find the root cause.
    2. Eliminate time dependencies: use freezegun/timemachine for time, asyncio.Event for async waits.
    3. Isolate test state: each test gets its own database transaction (rolled back), its own temp directory.
    4. Mock external services: never call real APIs in unit tests.
    5. Use deterministic ordering: do not depend on dict order, file listing order, or set iteration order.
    6. Track flaky tests: tag them, set a deadline to fix, and block merge if deadline passes.
    7. If you cannot fix a flaky test in 30 minutes, delete it and create a ticket.
  severity: high
  technologies:
    lang: [python, javascript]
    framework: [pytest, jest, freezegun, timemachine, testcontainers]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition, reliability]
  example_good: |
    @freeze_time("2026-01-15 10:00:00")
    def test_subscription_expires_after_30_days():
        sub = create_subscription(plan="monthly")
        with freeze_time("2026-02-15 10:00:01"):
            assert sub.is_expired() is True

    # Uses deterministic time, no flakiness possible
  example_bad: |
    def test_subscription_expires():
        sub = create_subscription(plan="monthly")
        # Flaky: depends on wall clock, month boundaries, leap seconds
        time.sleep(0.1)  # "wait for async processing"
        assert sub.days_remaining < 31  # sometimes fails near midnight
  when_applies: During CI failure triage, test suite maintenance, code review of tests with sleep/time dependencies
  sources: ["https://martinfowler.com/articles/nonDeterminism.html"]

- id: SAC-QA-005
  text: Every RF (requirement) in the spec must have at least one test — no exceptions — if a requirement has no test, it is unverified speculation
  why: 'Untested requirements are undiscovered bugs waiting for production. If a spec says "the system shall reject passwords shorter than 8 characters" and no test verifies this, you are trusting the developer got it right without evidence. Real example: a spec had 47 requirements. Testing covered 38. The 9 uncovered requirements included "rate limiting on login endpoint" — which was never implemented. An attacker brute-forced 50,000 passwords in 3 minutes. A traceability matrix (RF -> test) would have caught this gap before release.'
  how_to_do_right: |
    1. Create a traceability matrix: two columns — RF ID and Test ID.
    2. Every RF must map to at least one test. Every test should map to at least one RF.
    3. Automate the check: parse spec RFs and test docstrings/markers to verify coverage.
    4. In pytest, use markers: @pytest.mark.rf("RF-012") to link tests to requirements.
    5. Block release if any RF has zero linked tests.
    6. Review the matrix at sprint end — gaps are P1 bugs.
  severity: critical
  technologies:
    lang: [python, javascript]
    framework: [pytest, jest, allure]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition, compliance, traceability]
  example_good: |
    # Traceability matrix
    # RF-001: Password min 8 chars  -> test_password_too_short_rejected
    # RF-002: Rate limit 5/min      -> test_login_rate_limited_after_5
    # RF-003: Email verification     -> test_unverified_email_blocked

    @pytest.mark.rf("RF-001")
    def test_password_too_short_rejected():
        result = register(password="abc")
        assert result.status == 400
        assert "at least 8 characters" in result.json()["error"]
  example_bad: |
    # Spec says: "RF-042: System shall enforce rate limiting on all API endpoints"
    # Test suite: (no test for rate limiting)
    # QA report: "All tests passing!" (because the missing feature was never tested)
    # Production: endpoint gets hammered with 100K requests/second
  when_applies: During spec review, test planning, release readiness assessment, QA sign-off
  sources: ["https://martinfowler.com/bliki/GivenWhenThen.html"]

- id: SAC-QA-006
  text: Every invariant in the spec must have a test that TRIES TO VIOLATE IT — the test for 'balance >= 0' should attempt to make balance negative and verify the system prevents it
  why: 'An invariant is a property that must ALWAYS hold. Testing that it holds in the happy path is trivial. The real test is whether it holds under adversarial conditions. If the spec says "balance must never be negative," the test must try to make it negative (overdraft, concurrent withdrawals, negative deposit, integer overflow) and verify the system prevents it. Real example: a banking app had the invariant "balance >= 0." They tested deposits and normal withdrawals. Nobody tested: two concurrent withdrawals that together exceed the balance. A race condition allowed negative balances, costing $2.3M before detection.'
  how_to_do_right: |
    1. List every invariant from the spec (INV-001, INV-002, etc.).
    2. For each invariant, write at least 3 adversarial tests that TRY to break it.
    3. Test concurrent violations: two threads trying to break the invariant simultaneously.
    4. Test boundary violations: values at exact boundary (balance=0, withdraw=1).
    5. Test overflow violations: maximum int, maximum string length, maximum list size.
    6. If you cannot break the invariant in testing, the invariant enforcement is likely correct.
  severity: critical
  technologies:
    lang: [python, javascript]
    framework: [pytest, jest, hypothesis, threading]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition, invariant_enforcement]
  example_good: |
    # INV-ACCT-001: balance >= 0

    def test_overdraft_prevented():
        account = Account(balance=Decimal("50.00"))
        with pytest.raises(InsufficientFundsError):
            account.withdraw(Decimal("50.01"))
        assert account.balance == Decimal("50.00")  # unchanged

    def test_concurrent_withdrawals_cannot_overdraft():
        account = Account(balance=Decimal("100.00"))
        # Two threads each try to withdraw 80
        results = run_concurrent(account.withdraw, [Decimal("80"), Decimal("80")])
        assert account.balance >= Decimal("0.00")
        assert sum(1 for r in results if r.success) == 1  # only one succeeds
  example_bad: |
    # INV-ACCT-001: balance >= 0
    def test_balance():
        account = Account(balance=Decimal("100.00"))
        account.withdraw(Decimal("50.00"))
        assert account.balance == Decimal("50.00")
        # Only tests happy path — never tries to violate the invariant
  when_applies: During spec review, invariant definition, security testing, concurrency testing
  sources: ["https://docs.pytest.org/en/stable/how-to/assert.html"]

- id: SAC-QA-007
  text: Error paths need MORE testing than happy paths — happy paths work because developers test them while coding, error paths fail because nobody tests them until production
  why: 'Developers naturally run the happy path while developing (they enter valid data, click the right buttons). Error handling code is often written speculatively and never executed until a real user triggers it. Real example: a retry mechanism had 3 retry strategies (exponential backoff, jitter, circuit breaker). The happy path (first attempt succeeds) had 12 tests. The retry paths had 0 tests. In production, the exponential backoff had a bug that made wait times negative, causing an infinite retry loop that took down the service. Nobody had ever actually triggered a retry during development.'
  how_to_do_right: |
    1. For every try/except block, write a test that triggers the except branch.
    2. For every if/else, write tests for both branches — especially the else.
    3. For every API call, test: timeout, connection error, 4xx, 5xx, malformed response, empty response.
    4. For every file operation, test: file not found, permission denied, disk full, corrupted content.
    5. For every database operation, test: connection lost, deadlock, constraint violation, timeout.
    6. Aim for 2x more error path tests than happy path tests.
    7. Use fault injection: chaos engineering at the test level.
  severity: high
  technologies:
    lang: [python, javascript]
    framework: [pytest, jest, responses, httpretty, unittest.mock]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition, error_handling, resilience]
  example_good: |
    class TestPaymentGateway:
        def test_successful_charge(self): ...           # 1 happy path
        def test_card_declined(self): ...               # error: business
        def test_gateway_timeout(self): ...             # error: network
        def test_gateway_500(self): ...                 # error: server
        def test_malformed_response(self): ...          # error: data
        def test_connection_refused(self): ...          # error: infra
        def test_partial_response(self): ...            # error: truncated
        def test_retry_succeeds_on_second_attempt(self): ... # error: transient
        def test_circuit_breaker_opens_after_5_failures(self): ... # error: cascade
  example_bad: |
    class TestPaymentGateway:
        def test_charge_visa(self): ...      # happy
        def test_charge_mastercard(self): ... # happy
        def test_charge_amex(self): ...       # happy
        # 3 happy paths, 0 error paths — the retry logic is untested
  when_applies: During QA review, error handling code review, resilience testing
  sources: ["https://sre.google/sre-book/effective-troubleshooting/"]

- id: SAC-QA-008
  text: Security requirements need PENETRATION tests, not just unit tests — a unit test for auth checks the function works, a penetration test bypasses the function entirely
  why: 'Unit tests verify that the security function works when called correctly. They do not verify that the security function is always called. A unit test for `check_permission(user, resource)` proves the function works. But it does not test: what happens if someone calls the endpoint without going through the middleware? What if the JWT is malformed? What if the token is valid but for a different tenant? Real example: a team had 100% test coverage on their auth module. A pentester bypassed auth entirely by sending a direct request to an internal endpoint that was exposed on the public port. No unit test would have caught this because the unit test assumed the middleware always runs.'
  how_to_do_right: |
    1. Unit test the auth function itself (necessary but not sufficient).
    2. Integration test every endpoint WITH and WITHOUT valid auth tokens.
    3. Test authorization: user A tries to access user B's resources.
    4. Test token manipulation: expired, malformed, wrong algorithm, wrong issuer.
    5. Test direct access: skip middleware, call internal endpoints directly.
    6. Test IDOR: replace resource IDs in URLs with other users' IDs.
    7. Use OWASP ZAP or similar for automated penetration testing in CI.
    8. Run security-focused tests as a separate CI stage.
  severity: critical
  technologies:
    lang: [python, javascript]
    framework: [pytest, jest, owasp-zap, bandit, semgrep]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition, security, penetration_testing]
  example_good: |
    class TestAuthEndpoints:
        # Unit level
        def test_valid_token_grants_access(self): ...

        # Penetration level
        def test_no_token_returns_401(self):
            resp = client.get("/api/users/me")  # no auth header
            assert resp.status_code == 401

        def test_user_cannot_access_other_user_data(self):
            resp = client.get("/api/users/999", headers=auth_header(user_id=1))
            assert resp.status_code == 403  # IDOR check

        def test_expired_token_returns_401(self):
            expired = create_token(exp=datetime(2020, 1, 1))
            resp = client.get("/api/users/me", headers={"Authorization": f"Bearer {expired}"})
            assert resp.status_code == 401
  example_bad: |
    def test_auth():
        assert check_permission(admin_user, "read") is True
        assert check_permission(guest_user, "write") is False
        # Only tests the function, not the system
        # An attacker who bypasses the function entirely is not caught
  when_applies: During security review, auth implementation review, pre-release security assessment
  sources: ["https://cheatsheetseries.owasp.org/cheatsheets/Web_Service_Security_Testing_Cheat_Sheet.html"]

- id: SAC-QA-009
  text: The bug is at the BOUNDARY — between two modules, between client and server, between your code and the library, between midnight and 00:01 — always check boundaries first
  why: 'Most bugs occur at interfaces between components, not within components. Each component is tested in isolation, but the handoff between them is often untested. Data changes format at boundaries (JSON to object, UTC to local time, string to int). Assumptions change at boundaries (module A assumes sorted input, module B does not sort output). Real example: a date range query worked perfectly except when the range spanned midnight. Module A used inclusive end dates, module B used exclusive end dates. Between 23:59:59 and 00:00:01, transactions disappeared. The bug lived at the boundary between two modules with different date conventions.'
  how_to_do_right: |
    1. Identify all boundaries in the system: module-to-module, service-to-service, code-to-library, code-to-DB.
    2. For each boundary, test data transformation: is the data the same on both sides?
    3. Test time boundaries: midnight, DST transitions, end-of-month, end-of-year, leap year Feb 29.
    4. Test numeric boundaries: 0, -1, MAX_INT, MIN_INT, NaN, Infinity.
    5. Test string boundaries: empty string, whitespace-only, maximum length, Unicode edge cases.
    6. Test pagination boundaries: first page, last page, empty page, page size = total items.
    7. For every API integration, test with the actual response format (record and replay).
  severity: high
  technologies:
    lang: [python, javascript]
    framework: [pytest, jest, vcrpy, responses, nock]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition, integration, boundary_analysis]
  example_good: |
    # Testing date boundary between billing module and reporting module
    def test_transaction_at_midnight_appears_in_correct_day():
        tx = create_transaction(timestamp=datetime(2026, 1, 15, 23, 59, 59))
        report_jan15 = generate_daily_report(date(2026, 1, 15))
        report_jan16 = generate_daily_report(date(2026, 1, 16))
        assert tx.id in report_jan15.transaction_ids
        assert tx.id not in report_jan16.transaction_ids

    def test_transaction_at_first_second_of_day():
        tx = create_transaction(timestamp=datetime(2026, 1, 16, 0, 0, 0))
        report_jan16 = generate_daily_report(date(2026, 1, 16))
        assert tx.id in report_jan16.transaction_ids
  example_bad: |
    def test_daily_report():
        tx = create_transaction(timestamp=datetime(2026, 1, 15, 14, 30, 0))
        report = generate_daily_report(date(2026, 1, 15))
        assert tx.id in report.transaction_ids
        # Only tests middle-of-day — misses midnight boundary bug
  when_applies: During integration testing, API review, module interface review, date/time handling review
  sources: ["https://martinfowler.com/bliki/ContractTest.html"]

- id: SAC-QA-010
  text: Off-by-one errors hide in array indices, pagination, date ranges, and string slicing — if the code has <=, check if it should be <, and if it starts at 0, check if it should start at 1
  why: 'Off-by-one (OBO) errors are the most common class of logic bugs and the hardest to spot in review because the code looks almost right. They manifest as: missing the last item in a list, including one extra item, pagination showing 11 items on a 10-item page, date ranges missing the last day, loops executing one too many or too few times. Real example: a pagination endpoint used `OFFSET = (page - 1) * size; LIMIT = size` but the total pages calculation used `ceil(count / size)`. On the last page, when count was exactly divisible by size, it returned an empty page. Users reported "the last page is always blank."'
  how_to_do_right: |
    1. Always test the first element, the last element, and one past the end.
    2. For pagination: test page 1, the last page, and page N+1 (should be empty or 404).
    3. For date ranges: test the start date, end date, and one day before/after.
    4. For loops: verify the count of iterations matches expected count exactly.
    5. For string slicing: test empty string, single char, exact boundary length.
    6. When reviewing: every <, <=, >, >= is a potential OBO. Check each one.
    7. Prefer range-based idioms: for i in range(len(items)) vs manual index math.
  severity: high
  technologies:
    lang: [python, javascript]
    framework: [pytest, jest]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition, logic_errors]
  example_good: |
    class TestPagination:
        def test_first_page(self):
            result = get_items(page=1, size=10)
            assert len(result.items) == 10
            assert result.items[0].id == 1

        def test_last_page_partial(self):
            # 25 total items, page 3 should have 5 items
            result = get_items(page=3, size=10)
            assert len(result.items) == 5
            assert result.total_pages == 3

        def test_last_page_exact(self):
            # 30 total items, page 3 should have 10, not 0
            result = get_items(page=3, size=10)
            assert len(result.items) == 10

        def test_page_beyond_last_is_empty(self):
            result = get_items(page=4, size=10)  # only 30 items
            assert len(result.items) == 0
  example_bad: |
    def test_pagination():
        result = get_items(page=1, size=10)
        assert len(result.items) == 10
        # Only tests the first page — the OBO bug is on the last page
  when_applies: During code review of loops, pagination, date ranges, string operations, array access
  sources: ["https://docs.pytest.org/en/stable/how-to/parametrize.html"]

- id: SAC-QA-011
  text: Null/None/undefined propagation — for every variable that can be null, trace it forward from origin to crash and verify the code handles it before it explodes
  why: 'Null reference errors are the single most common runtime exception across all languages (Tony Hoare called null his "billion dollar mistake"). The pattern is always the same: a function returns None in an edge case, the caller does not check, it propagates through 3-5 function calls, and finally crashes with an obscure error far from the origin. Real example: user.profile returned None for users who registered via SSO (no profile created). The None propagated through user.profile.preferences.theme, crashing with "AttributeError: NoneType has no attribute preferences" — in the logging middleware, 8 calls away from the origin. Took 4 hours to trace back to the SSO registration path.'
  how_to_do_right: |
    1. For every function that can return None/null, search for all callers.
    2. Verify each caller handles the None case explicitly.
    3. Use Optional type hints in Python, strictNullChecks in TypeScript.
    4. Prefer early returns: if user.profile is None: return default_theme.
    5. Use the Null Object pattern: return EmptyProfile() instead of None.
    6. In code review, for every dot chain (a.b.c.d), ask: can any of these be None?
    7. Write tests specifically for the None case of every nullable return value.
  severity: high
  technologies:
    lang: [python, javascript, typescript]
    framework: [pytest, jest, mypy]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition, null_safety, defensive_programming]
  example_good: |
    def get_user_theme(user_id: int) -> str:
        user = user_repo.find(user_id)
        if user is None:
            return DEFAULT_THEME
        if user.profile is None:
            return DEFAULT_THEME
        return user.profile.theme or DEFAULT_THEME

    def test_theme_for_user_without_profile():
        user = create_user(profile=None)  # SSO user, no profile
        assert get_user_theme(user.id) == DEFAULT_THEME

    def test_theme_for_nonexistent_user():
        assert get_user_theme(99999) == DEFAULT_THEME
  example_bad: |
    def get_user_theme(user_id: int) -> str:
        user = user_repo.find(user_id)
        return user.profile.theme  # crashes if user is None or profile is None

    def test_theme():
        user = create_user(profile=Profile(theme="dark"))
        assert get_user_theme(user.id) == "dark"
        # Only tests the happy path — None cases are untested
  when_applies: During code review, null safety audits, error log analysis, TypeScript strict mode migration
  sources: ["https://docs.python.org/3/library/typing.html"]

- id: SAC-QA-012
  text: String comparison bugs lurk in encoding, case sensitivity, whitespace, and locale — 'cafe' != 'cafe' (composed vs decomposed Unicode), 'ABC' == 'abc' depends on the comparison function
  why: 'String comparison is deceptively complex. What looks like "the same string" to a human can be different bytes. Unicode normalization (NFC vs NFD) means "cafe\u0301" and "caf\u00e9" look identical but are different byte sequences. Leading/trailing whitespace is invisible. Case sensitivity varies by locale (Turkish "I" lowercases to a dotless "i"). Real example: a user search feature failed for users with accented names. "Jose\u0301" (composed) was stored in the database, but the search query used "Jos\u00e9" (decomposed). Direct string comparison found no match. The team spent 2 days debugging before discovering Unicode normalization.'
  how_to_do_right: |
    1. Normalize Unicode on input: unicodedata.normalize("NFC", text) in Python.
    2. Strip whitespace on input: text.strip() before storing or comparing.
    3. Use case-insensitive comparison explicitly: text.casefold() in Python, not .lower().
    4. For database queries, use COLLATE for case-insensitive matching.
    5. Test with accented characters, CJK characters, emoji, RTL text.
    6. Test with invisible characters: zero-width space, BOM, soft hyphen.
    7. Never compare user-facing strings with == directly — always normalize first.
  severity: high
  technologies:
    lang: [python, javascript, typescript]
    framework: [pytest, jest]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition, string_handling, internationalization]
  example_good: |
    import unicodedata

    def normalize_name(name: str) -> str:
        return unicodedata.normalize("NFC", name.strip()).casefold()

    def test_unicode_normalization():
        composed = "caf\u00e9"        # single codepoint e-acute
        decomposed = "cafe\u0301"     # e + combining acute
        assert normalize_name(composed) == normalize_name(decomposed)

    def test_whitespace_handling():
        assert normalize_name("  Alice  ") == normalize_name("Alice")

    def test_case_insensitive():
        assert normalize_name("ALICE") == normalize_name("alice")
  example_bad: |
    def search_user(name: str):
        return db.query(User).filter(User.name == name).first()
        # Fails for: "Jose\u0301" vs "Jos\u00e9", "alice" vs "Alice", " bob " vs "bob"

    def test_search():
        create_user(name="Alice")
        assert search_user("Alice") is not None
        # Only tests exact match — all Unicode/case/whitespace bugs are hidden
  when_applies: During code review of string operations, search features, user input handling, i18n review
  sources: ["https://unicode.org/reports/tr15/"]

- id: SAC-QA-013
  text: Floating point comparison — 0.1 + 0.2 != 0.3 in every language — never use == for floats, use abs(a-b) < epsilon or Decimal for money
  why: 'IEEE 754 floating point cannot represent most decimal fractions exactly. 0.1 is actually 0.1000000000000000055511151231257827021181583404541015625 in binary. This means arithmetic that looks correct produces wrong results: 0.1 + 0.2 == 0.30000000000000004. For money, this causes real financial errors. Real example: an e-commerce platform calculated tax as price * 0.07. For a $14.99 item, the tax was 1.0493000000000001, which was displayed as $1.05 but stored as 1.0493. Over millions of transactions, rounding inconsistencies caused a $47,000 discrepancy in the accounting system.'
  how_to_do_right: |
    1. For money: ALWAYS use Decimal (Python) or BigInt cents (JavaScript).
    2. For scientific/engineering: use math.isclose(a, b, rel_tol=1e-9).
    3. For tests: use pytest.approx(expected, abs=1e-6) instead of ==.
    4. Never store money as float in databases — use DECIMAL(19,4) or integer cents.
    5. Never serialize money as float in JSON — use string "49.99" or integer cents 4999.
    6. When reviewing: every float arithmetic operation near money is a potential bug.
    7. Use the rule: if the value appears on an invoice, it must be Decimal.
  severity: critical
  technologies:
    lang: [python, javascript, typescript]
    framework: [pytest, jest, decimal]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition, numeric_precision, financial]
  example_good: |
    from decimal import Decimal

    def calculate_tax(price: Decimal, rate: Decimal) -> Decimal:
        return (price * rate).quantize(Decimal("0.01"))

    def test_tax_calculation():
        price = Decimal("14.99")
        rate = Decimal("0.07")
        tax = calculate_tax(price, rate)
        assert tax == Decimal("1.05")  # exact comparison is safe with Decimal

    def test_float_approximation():
        # For non-financial floats, use pytest.approx
        result = compute_distance(p1, p2)
        assert result == pytest.approx(3.14159, abs=1e-4)
  example_bad: |
    def calculate_tax(price, rate):
        return price * rate  # float * float = accumulated error

    def test_tax():
        assert calculate_tax(14.99, 0.07) == 1.05  # FAILS: actual is 1.0493000000000001
        # Or worse:
        assert calculate_tax(14.99, 0.07) > 0  # passes but verifies nothing
  when_applies: During code review of financial calculations, price handling, tax computation, accounting features
  sources: ["https://docs.python.org/3/tutorial/floatingpoint.html"]

- id: SAC-QA-014
  text: Concurrency bugs follow the TOCTOU pattern (time-of-check vs time-of-use) — if you check a condition then act on it, another thread may change it between check and act
  why: 'TOCTOU (Time Of Check, Time Of Use) is the root cause of most concurrency bugs. The pattern: (1) check if condition is true, (2) act based on condition. Between steps 1 and 2, another thread/process/request changes the condition, making the action invalid. Real example: an inventory system checked if stock >= requested_quantity, then deducted. Two simultaneous orders for 1 item each, with 1 item in stock, both passed the check (stock=1 >= 1) and both deducted, resulting in stock=-1 and two orders for an item that existed only once. The fix: SELECT FOR UPDATE (database-level lock) or atomic compare-and-swap.'
  how_to_do_right: |
    1. Use atomic operations: UPDATE stock SET count = count - 1 WHERE count >= 1 (single SQL statement).
    2. Use database locks: SELECT FOR UPDATE when checking-then-updating.
    3. Use optimistic locking: version column, retry on conflict.
    4. Use Redis WATCH/MULTI for cache-based operations.
    5. In Python, use threading.Lock or asyncio.Lock for in-memory state.
    6. Test TOCTOU: run the check-and-act pattern concurrently with 10+ threads.
    7. In code review: every if-then-do pattern touching shared state is a TOCTOU candidate.
  severity: critical
  technologies:
    lang: [python, javascript, typescript]
    framework: [pytest, threading, asyncio, sqlalchemy]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition, concurrency, race_conditions]
  example_good: |
    # Atomic: check and act in a single SQL statement
    def reserve_stock(product_id: int, quantity: int) -> bool:
        result = db.execute(
            "UPDATE products SET stock = stock - :qty "
            "WHERE id = :id AND stock >= :qty",
            {"id": product_id, "qty": quantity}
        )
        return result.rowcount > 0  # True if stock was sufficient

    def test_concurrent_stock_reservation():
        set_stock(product_id=1, stock=1)
        results = run_concurrent(reserve_stock, [(1, 1), (1, 1)], threads=2)
        successes = sum(1 for r in results if r is True)
        assert successes == 1  # exactly one reservation succeeds
        assert get_stock(product_id=1) == 0  # not negative
  example_bad: |
    def reserve_stock(product_id, quantity):
        product = db.query(Product).get(product_id)
        if product.stock >= quantity:        # CHECK
            product.stock -= quantity         # USE — another thread may have changed stock
            db.commit()
            return True
        return False
  when_applies: During code review of shared state access, database operations, inventory/balance management, concurrent request handling
  sources: ["https://jepsen.io/consistency"]

- id: SAC-QA-015
  text: SQL injection via dynamic ORDER BY, LIMIT, and column names — parameterized queries protect values, not identifiers — validate identifiers against a whitelist
  why: 'Most developers know to parameterize WHERE clause values. But SQL identifiers (column names, table names, ORDER BY, LIMIT) cannot be parameterized in most databases. If the user controls the ORDER BY column, they can inject SQL. Real example: an API accepted ?sort=name for sorting. An attacker sent ?sort=name;DROP TABLE users;-- and the ORM constructed ORDER BY name;DROP TABLE users;--. The table was dropped. The fix is not parameterization (which does not work for identifiers) but a whitelist of allowed column names.'
  how_to_do_right: |
    1. NEVER interpolate user input into ORDER BY, GROUP BY, or column names.
    2. Create a whitelist of allowed sort columns: ALLOWED_SORTS = {"name", "created_at", "price"}.
    3. Validate: if sort_column not in ALLOWED_SORTS: raise ValueError.
    4. For LIMIT/OFFSET: cast to int and validate range (0 < limit <= 100).
    5. Use ORM methods that handle this safely: query.order_by(getattr(Model, sort_column)).
    6. In code review: search for f-strings or .format() in SQL queries — these are injection points.
    7. Test with injection payloads: "name; DROP TABLE users; --" as sort parameter.
  severity: critical
  technologies:
    lang: [python, javascript, typescript]
    framework: [sqlalchemy, django-orm, knex, prisma, pytest]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition, security, sql_injection]
  example_good: |
    ALLOWED_SORT_COLUMNS = {"name", "created_at", "price", "rating"}

    def get_products(sort_by: str = "created_at", order: str = "desc"):
        if sort_by not in ALLOWED_SORT_COLUMNS:
            raise ValueError(f"Invalid sort column: {sort_by}")
        if order not in ("asc", "desc"):
            raise ValueError(f"Invalid order: {order}")
        column = getattr(Product, sort_by)
        return db.query(Product).order_by(column.desc() if order == "desc" else column.asc())

    def test_sql_injection_in_sort_rejected():
        with pytest.raises(ValueError):
            get_products(sort_by="name; DROP TABLE users; --")
  example_bad: |
    def get_products(sort_by: str = "created_at"):
        query = f"SELECT * FROM products ORDER BY {sort_by}"  # INJECTABLE
        return db.execute(query)

    def test_sort():
        result = get_products(sort_by="name")
        assert len(result) > 0  # does not test injection
  when_applies: During code review of SQL queries, API endpoint review, security audit, ORM usage review
  sources: ["https://cheatsheetseries.owasp.org/cheatsheets/SQL_Injection_Prevention_Cheat_Sheet.html"]

- id: SAC-QA-016
  text: Resource leaks — files, connections, locks, and threads that are not released in error paths — check every try block and verify the finally clause releases ALL acquired resources
  why: 'Resources acquired in a try block must be released in a finally block (or via context managers). When an exception occurs between acquisition and release, the resource leaks. Over time, leaked resources exhaust the pool: file handles run out, database connections are exhausted, locks are never released causing deadlocks. Real example: a service opened a database connection in a try block and closed it at the end. When a query threw an exception, the connection was never returned to the pool. Under load, the pool was exhausted in 20 minutes, and the service started returning 503s. The fix: use context managers (with statement) that guarantee cleanup.'
  how_to_do_right: |
    1. ALWAYS use context managers (with statement) for files, connections, locks.
    2. If a context manager is not available, use try/finally.
    3. In code review, for every resource acquisition, find the corresponding release.
    4. Test resource cleanup: trigger an exception mid-operation and verify the resource is released.
    5. Monitor connection pool usage in tests: assert pool.checkedout() == 0 after each test.
    6. Use resource leak detectors: tracemalloc, objgraph (Python), --detect-open-handles (Jest).
    7. Every open() must have a matching close(). Every acquire() must have a matching release().
  severity: high
  technologies:
    lang: [python, javascript, typescript]
    framework: [pytest, jest, sqlalchemy, asyncio]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition, resource_management, reliability]
  example_good: |
    # Context manager guarantees cleanup even on exception
    async def process_file(path: str) -> dict:
        async with aiofiles.open(path) as f:
            content = await f.read()
        async with get_db_session() as session:
            result = await session.execute(query, {"content": content})
            return result.fetchone()

    def test_connection_released_on_error():
        pool = get_connection_pool()
        initial = pool.checkedout()
        with pytest.raises(ValueError):
            process_invalid_data()  # raises ValueError mid-operation
        assert pool.checkedout() == initial  # connection returned to pool
  example_bad: |
    def process_file(path):
        f = open(path)               # acquired
        conn = db.connect()          # acquired
        data = f.read()
        result = conn.execute(query)  # if this throws, f and conn leak
        f.close()                    # never reached on exception
        conn.close()                 # never reached on exception
        return result
  when_applies: During code review of file I/O, database operations, network connections, lock usage, thread management
  sources: ["https://docs.python.org/3/reference/compound_stmts.html#the-with-statement"]

- id: SAC-QA-017
  text: Surgical rework — fix ONLY what is broken, do not refactor while fixing — a bug fix PR that also "cleans up" code is a review nightmare and a regression risk
  why: 'When reworking a QA finding, the temptation is to "clean up while you are there." This mixes two concerns in one change: the fix and the refactor. The reviewer cannot distinguish which changes fix the bug and which are cosmetic. If a regression occurs, you cannot tell if it was the fix or the refactor. Real example: a developer was asked to fix a null pointer exception. The fix was 3 lines. But the PR contained 200 lines because the developer also renamed variables, reorganized imports, and extracted a helper function. The reviewer approved after a cursory review. The extracted helper function had a subtle bug that was not in the original code, causing a regression.'
  how_to_do_right: |
    1. Fix ONLY the reported finding. Touch the minimum number of lines.
    2. If you see other issues while fixing, create separate tickets for them.
    3. One PR per finding. Never bundle fixes.
    4. The PR description must reference the QA finding ID.
    5. The reviewer should be able to verify the fix in under 5 minutes.
    6. If a refactor is needed to fix the bug, do the refactor in a separate PR first.
    7. Run the failing test before and after — it must fail before and pass after, with no other test changes.
  severity: high
  technologies:
    lang: [python, javascript]
    framework: [pytest, jest, git]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition, rework, change_management]
  example_good: |
    # QA Finding: SAC-F-042 — NullPointerError when user.profile is None
    # Fix: 3 lines changed

    # BEFORE (line 47 of user_service.py):
    #   theme = user.profile.theme
    # AFTER:
    #   theme = user.profile.theme if user.profile else DEFAULT_THEME

    # PR title: "Fix SAC-F-042: handle None profile in get_user_theme"
    # PR size: 3 lines changed, 1 test added
  example_bad: |
    # QA Finding: SAC-F-042 — NullPointerError when user.profile is None
    # PR contains: 200 lines changed
    # - Fixed the null pointer (3 lines)
    # - Renamed user_service.py to user_profile_service.py
    # - Reorganized imports in 5 files
    # - Extracted UserThemeHelper class
    # - Updated 12 tests to use new class name
    # Reviewer: "LGTM" (did not actually verify the null fix)
  when_applies: During rework of QA findings, bug fix PRs, code review of fix-only changes
  sources: ["https://google.github.io/eng-practices/review/reviewer/"]

- id: SAC-QA-018
  text: Use SBAR format for findings — Situation, Background, Assessment, Recommendation — structured findings get fixed 3x faster than vague comments
  why: 'A QA finding that says "this looks wrong" or "potential issue here" gets ignored because the developer does not understand the problem or its severity. SBAR (from healthcare communication) provides a complete picture: what is happening (Situation), why it matters (Background), how bad it is (Assessment), and what to do (Recommendation). Real example: Team A wrote findings as "check the auth logic" — average fix time 4.2 days. Team B wrote SBAR findings — average fix time 1.4 days. The difference was not skill but communication clarity. Developers fix clear problems fast and ambiguous problems never.'
  how_to_do_right: |
    1. Situation: What did you observe? (file, line, specific behavior)
    2. Background: Why is this a problem? (spec violation, security risk, data corruption)
    3. Assessment: How severe? (P0-P3, with justification)
    4. Recommendation: What should be done? (specific fix, not "fix this")
    5. Include a reproducible test case or steps when possible.
    6. Reference the specific RF or INV being violated.
    7. One finding per issue — do not bundle multiple issues in one finding.
  severity: high
  technologies:
    lang: [python, javascript]
    framework: [pytest, jest]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition, communication, process]
  example_good: |
    # Finding SAC-F-073
    # Situation: auth_middleware.py:42 — JWT validation uses HS256 but
    #   the API docs specify RS256. Tokens signed with HS256 can be
    #   forged if the secret leaks.
    # Background: RF-SEC-005 requires RS256 for all JWT validation.
    #   HS256 uses a shared secret, RS256 uses public/private key pair.
    # Assessment: P0 (security) — an attacker with the HS256 secret can
    #   forge tokens for any user, including admin.
    # Recommendation: Change jwt.decode(token, SECRET, algorithms=["HS256"])
    #   to jwt.decode(token, PUBLIC_KEY, algorithms=["RS256"]).
    #   Update key management to use RSA key pair.
  example_bad: |
    # Finding: "The auth might be wrong, please check."
    # Developer response: "Checked, looks fine to me."
    # Result: nothing fixed, vulnerability ships to production
  when_applies: During QA review, finding documentation, bug reporting, code review comments
  sources: ["https://sre.google/sre-book/managing-incidents/"]

- id: SAC-QA-019
  text: Priority classification — P0 is data loss or security breach, P1 is feature broken, P2 is degraded experience, P3 is cosmetic — not everything is urgent, so prioritize correctly
  why: 'When everything is "high priority," nothing is high priority. Developers get overwhelmed and either fix easy things first (P3 cosmetic issues) or freeze. A clear priority system ensures data loss and security issues get fixed before the feature ships, while cosmetic issues go to the backlog. Real example: a QA report had 23 findings all marked "high." The developer fixed the 5 easiest ones (typos and alignment). The actual critical issue (SQL injection in search) was item 19 on the list and was not fixed before release.'
  how_to_do_right: |
    1. P0 (Critical): Data loss, security vulnerability, financial impact. Fix before any other work.
    2. P1 (High): Feature does not work as specified. Fix before release.
    3. P2 (Medium): Feature works but degraded (slow, ugly, confusing). Fix in next sprint.
    4. P3 (Low): Cosmetic, nice-to-have, minor inconsistency. Backlog.
    5. Always fix P0s first, regardless of how many P3s are open.
    6. In QA report, sort findings by priority, not by discovery order.
    7. If unsure between two priorities, pick the higher one and let the team decide.
  severity: high
  technologies:
    lang: [python, javascript]
    framework: [pytest, jest, jira]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition, prioritization, process]
  example_good: |
    # QA Report for Sprint S14 — sorted by priority
    #
    # P0 (fix now):
    #   SAC-F-001: SQL injection in /api/search endpoint (RF-SEC-003)
    #
    # P1 (fix before release):
    #   SAC-F-002: Payment fails for amounts > $9,999.99 (RF-PAY-012)
    #   SAC-F-003: Password reset email not sent (RF-AUTH-007)
    #
    # P2 (next sprint):
    #   SAC-F-004: Search results take 8s for queries > 100 chars
    #   SAC-F-005: Error message shows stack trace to user
    #
    # P3 (backlog):
    #   SAC-F-006: Button alignment off by 2px on mobile
    #   SAC-F-007: Typo in footer: "Copyrigth"
  example_bad: |
    # QA Report — all marked "High"
    # 1. Button alignment off (cosmetic)
    # 2. Typo in footer (cosmetic)
    # ...
    # 19. SQL injection in search (CRITICAL — buried in the list)
    # Developer fixes items 1-5 (easiest), runs out of time, ships with SQL injection
  when_applies: During QA finding documentation, triage meetings, sprint planning, release decisions
  sources: ["https://google.github.io/eng-practices/review/reviewer/looking-for.html"]

- id: SAC-QA-020
  text: Scope limitation — QA reviews the DIFF, not the whole codebase — if the change is in auth.py, do not report issues in unrelated files unless they are security-critical
  why: 'A QA reviewer who reports 30 findings across 20 files when the PR only changed 2 files creates noise and frustration. The developer rightly asks "why are you reviewing files I did not change?" QA scope should match the change scope. Exception: if the change introduces a security vulnerability that also exists in other files, report it. Real example: a QA reviewer spent 3 hours reviewing a 50-line PR and produced 15 findings — 12 of them in files not touched by the PR. The developer rejected the review, the actual bug in the PR (missing input validation) was lost in the noise, and it shipped.'
  how_to_do_right: |
    1. Review ONLY the files and lines in the diff.
    2. For context, read surrounding code but only report findings IN the changed code.
    3. Exception: if the change reveals a security issue in other code, report it separately with a clear note that it is out-of-scope but critical.
    4. If you find issues in unrelated files, create separate tickets — do not put them in the PR review.
    5. Time-box reviews: 30 minutes for <200 lines, 1 hour for 200-400 lines.
    6. Focus on: correctness, security, edge cases, test coverage of changed code.
    7. Do not report style issues that the linter should catch.
  severity: high
  technologies:
    lang: [python, javascript]
    framework: [pytest, jest, github, gitlab]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition, scope_management, process]
  example_good: |
    # PR: "Add rate limiting to /api/login"
    # Files changed: auth/rate_limiter.py, tests/test_rate_limiter.py
    #
    # QA Review (scoped to diff):
    # 1. rate_limiter.py:23 — window_seconds=60 but spec says 300 (RF-SEC-010)
    # 2. test_rate_limiter.py — no test for concurrent requests from same IP
    # 3. rate_limiter.py:45 — Redis key has no TTL, will leak memory
    #
    # Out-of-scope note (separate ticket created):
    # The existing /api/signup endpoint also needs rate limiting (JIRA-456)
  example_bad: |
    # PR: "Add rate limiting to /api/login"
    # QA Review (15 findings):
    # 1-3: Actual issues in rate_limiter.py (the diff)
    # 4: models.py:12 — missing docstring (not in diff)
    # 5: utils.py:89 — could use list comprehension (not in diff)
    # 6-15: Various style issues in unrelated files (not in diff)
    # Developer: "I'm rejecting this review" — real bugs lost in noise
  when_applies: During PR review, QA review, code review scope decisions
  sources: ["https://google.github.io/eng-practices/review/reviewer/standard.html"]

- id: SAC-QA-021
  text: Every bug found in QA needs a regression test — a test that fails before the fix and passes after — this prevents the same bug from returning in a future refactor
  why: 'Without a regression test, the same bug will return. Developers refactor, dependencies update, requirements change — and the same conditions that caused the original bug will recur. A regression test is proof that the bug was real and that the fix works. Real example: a date parsing bug was fixed in March, then reappeared in June when a library was updated. It was fixed again in July, then reappeared in October when a developer refactored the date utility. On the third occurrence, the team added a regression test. The bug never returned. They calculated the three incidents cost 40 hours of debugging. The regression test took 15 minutes to write.'
  how_to_do_right: |
    1. Before fixing the bug, write a test that reproduces it (test should FAIL).
    2. Fix the bug.
    3. Run the test — it should now PASS.
    4. The test name should reference the bug: test_sac_f_042_null_profile_handled.
    5. Add a comment in the test with the finding ID and a one-line description.
    6. Never delete regression tests unless the feature is removed.
    7. Regression tests are a permanent part of the test suite — they run on every CI build.
  severity: high
  technologies:
    lang: [python, javascript]
    framework: [pytest, jest, unittest]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition, regression, bug_prevention]
  example_good: |
    # Regression test for SAC-F-042: NullPointerError when user has no profile
    # Bug: user.profile.theme crashed when profile was None (SSO users)
    # Fixed: 2026-01-15, PR #347
    def test_sac_f_042_null_profile_returns_default_theme():
        user = create_user(auth_method="sso", profile=None)
        theme = get_user_theme(user.id)
        assert theme == DEFAULT_THEME  # was: AttributeError: NoneType has no attribute 'theme'
  example_bad: |
    # Bug SAC-F-042 fixed in PR #347
    # No test added
    # 3 months later: same bug reappears after refactor
    # Developer: "I swear I fixed this before"
    # Git blame confirms: yes, it was fixed and then un-fixed by refactor
  when_applies: During bug fix verification, rework review, test suite maintenance
  sources: ["https://martinfowler.com/bliki/TestCoverage.html"]

- id: SAC-QA-022
  text: Performance bugs — O(n^2) hiding in loops, N+1 queries in ORMs, missing indices — review every loop that contains a database query, API call, or string concatenation
  why: 'Performance bugs are invisible in development (small dataset) and catastrophic in production (large dataset). An O(n^2) algorithm processes 100 items in 10ms and 10,000 items in 100 seconds. An N+1 query fetches 10 records with 11 queries (fast) and 10,000 records with 10,001 queries (database melts). Real example: a dashboard loaded user activity for a team. For each user, it queried their recent activity (N+1). With 5 users in dev: 6 queries, 50ms. With 500 users in production: 501 queries, 45 seconds. The page timed out. The fix (eager loading with joinedload) was a one-line change that reduced it to 1 query.'
  how_to_do_right: |
    1. In code review, flag every database query or API call inside a loop.
    2. For ORMs: use eager loading (joinedload, prefetch_related, include) for relationships accessed in loops.
    3. For string building in loops: use list + join, not += concatenation.
    4. Add performance tests for endpoints with variable-size inputs: test with 1, 100, and 10000 items.
    5. Check database queries with EXPLAIN — missing indices show as sequential scans.
    6. Profile before optimizing: use cProfile, line_profiler, or Django Debug Toolbar.
    7. Set query count assertions in tests: assert len(captured_queries) <= 5.
  severity: high
  technologies:
    lang: [python, javascript]
    framework: [sqlalchemy, django-orm, prisma, pytest, jest]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition, performance, scalability]
  example_good: |
    # Eager loading: 1 query regardless of number of users
    def get_team_activity(team_id: int):
        return (
            db.query(User)
            .filter(User.team_id == team_id)
            .options(joinedload(User.recent_activity))
            .all()
        )

    def test_team_activity_query_count():
        create_team_with_users(team_id=1, num_users=100)
        with assert_num_queries(max=3):  # 1 for users, 1 for activity, 1 for team
            get_team_activity(team_id=1)
  example_bad: |
    # N+1: 1 query for users + 1 query per user for activity
    def get_team_activity(team_id: int):
        users = db.query(User).filter(User.team_id == team_id).all()
        for user in users:
            user.activity = db.query(Activity).filter(Activity.user_id == user.id).all()
            # 500 users = 501 queries = 45 second page load
        return users
  when_applies: During code review of database queries, loop optimization, ORM usage review, performance testing
  sources: ["https://docs.sqlalchemy.org/en/20/orm/queryguide/relationships.html#joined-eager-loading"]

- id: SAC-QA-023
  text: Memory bugs — growing lists, unclosed connections, event listener accumulation — look for append() in loops without bounds, addEventListener without removeEventListener, and open() without close()
  why: 'Memory leaks in long-running services cause gradual degradation until OOM (Out of Memory) kills the process. They are invisible in tests (short-lived) and only appear in production after hours/days. Real example: a WebSocket server stored connection objects in a list. On connect, it appended. On disconnect, it did nothing (the connection was closed but the reference remained in the list). After 72 hours, the list had 1.2 million dead connection references consuming 4GB of RAM. The server was killed by the OOM killer. The fix: remove from list on disconnect.'
  how_to_do_right: |
    1. For every append()/push() in a loop or event handler, find the corresponding remove/pop/clear.
    2. For every addEventListener, find the corresponding removeEventListener.
    3. For every open()/connect(), verify there is a close()/disconnect() in all code paths.
    4. Use weak references (weakref.WeakSet in Python) for observer/listener patterns.
    5. Set maximum sizes for caches and buffers: maxsize on LRU cache, maxlen on deque.
    6. Profile memory in long-running tests: run 10,000 iterations and check memory growth.
    7. Use tracemalloc (Python) or Chrome DevTools heap snapshot (JS) to find leaks.
  severity: high
  technologies:
    lang: [python, javascript, typescript]
    framework: [pytest, jest, tracemalloc, asyncio]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition, memory_management, reliability]
  example_good: |
    import weakref

    class WebSocketServer:
        def __init__(self):
            self.connections: weakref.WeakSet = weakref.WeakSet()

        def on_connect(self, conn):
            self.connections.add(conn)  # weak ref: auto-removed when conn is GC'd

        def broadcast(self, message):
            for conn in list(self.connections):
                conn.send(message)

    def test_memory_stable_after_many_connections():
        server = WebSocketServer()
        for _ in range(10_000):
            conn = MockConnection()
            server.on_connect(conn)
            # conn goes out of scope, weak ref is auto-cleaned
        gc.collect()
        assert len(server.connections) == 0  # all cleaned up
  example_bad: |
    class WebSocketServer:
        def __init__(self):
            self.connections = []  # strong references

        def on_connect(self, conn):
            self.connections.append(conn)  # grows forever

        def on_disconnect(self, conn):
            pass  # forgot to remove from list — memory leak
  when_applies: During code review of event handlers, connection management, cache implementation, long-running services
  sources: ["https://docs.python.org/3/library/tracemalloc.html"]

- id: SAC-QA-024
  text: Type safety bugs — implicit conversions, string-to-number, truthy/falsy — in Python bool('False') is True, '0' is truthy, 0.0 is falsy — these cause subtle logic bugs
  why: 'Dynamic languages silently convert types in ways that surprise even experienced developers. In Python: bool("False") is True (non-empty string), bool("") is False, bool(0) is False, bool("0") is True, bool([]) is False, bool([0]) is True. In JavaScript: "5" + 3 is "53" (string), "5" - 3 is 2 (number), null == undefined is true, null === undefined is false. These implicit conversions cause bugs that pass code review because the code looks correct. Real example: a feature flag system stored flags as strings in Redis ("true"/"false"). The check was `if flag_value:` — which was always True because both "true" and "false" are truthy non-empty strings.'
  how_to_do_right: |
    1. NEVER use if value: for boolean checks on strings or numbers. Use if value == "true": or if value is True:.
    2. Explicit type conversion: int(text) with try/except, not implicit coercion.
    3. In Python, use strict comparisons: is True, is False, is None (not ==).
    4. In JavaScript, always use === instead of ==.
    5. Use type hints and strict type checking: mypy --strict, TypeScript strict mode.
    6. Test truthy/falsy edge cases: empty string, zero, None, empty list, "false" string.
    7. For feature flags from external sources: parse explicitly (json.loads, str.lower() == "true").
  severity: high
  technologies:
    lang: [python, javascript, typescript]
    framework: [pytest, jest, mypy, typescript]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition, type_safety, implicit_conversion]
  example_good: |
    def is_feature_enabled(flag_name: str) -> bool:
        value = redis.get(f"flag:{flag_name}")
        if value is None:
            return False
        return value.decode().lower() == "true"  # explicit string comparison

    def test_feature_flag_false_string():
        redis.set("flag:dark_mode", "false")
        assert is_feature_enabled("dark_mode") is False  # not truthy!

    def test_feature_flag_missing():
        assert is_feature_enabled("nonexistent") is False

    def test_feature_flag_empty_string():
        redis.set("flag:dark_mode", "")
        assert is_feature_enabled("dark_mode") is False
  example_bad: |
    def is_feature_enabled(flag_name: str) -> bool:
        value = redis.get(f"flag:{flag_name}")
        return bool(value)  # BUG: b"false" is truthy!

    def test_feature_flag():
        redis.set("flag:dark_mode", "true")
        assert is_feature_enabled("dark_mode") is True
        # Only tests truthy case — bool("false") bug is never caught
  when_applies: During code review of boolean logic, type conversions, feature flags, configuration parsing
  sources: ["https://docs.python.org/3/library/stdtypes.html#truth-value-testing"]

- id: SAC-QA-025
  text: A test that never fails is not a test — if you have never seen a test turn red, it might not be testing anything — mutate the code and verify the test catches it
  why: 'A test that always passes provides zero information. It could be: asserting on a tautology (assert True), not connected to the code under test (calling a different function), or testing a condition that can never fail (assert isinstance(str, type)). The only way to know a test is valuable is to see it fail when the code is wrong. Mutation testing does this automatically: it changes the code (mutates) and checks if the test catches the change (kills the mutant). Real example: a test suite had 200 tests. Mutation testing revealed 45 of them never failed when the code was mutated — they were all testing trivial properties or had weak assertions. 22% of the test suite was dead weight.'
  how_to_do_right: |
    1. For every new test, temporarily break the code and verify the test fails.
    2. Use mutation testing tools: mutmut (Python), Stryker (JavaScript).
    3. Target a mutation kill rate >= 70% (surviving mutants = weak tests).
    4. Focus mutation testing on critical paths: auth, payments, data integrity.
    5. If a mutant survives, strengthen the assertion — the test is too weak.
    6. Run mutation testing at pack/milestone level, not on every PR (it is slow).
    7. Treat surviving mutants as QA findings — they represent untested behavior.
  severity: high
  technologies:
    lang: [python, javascript]
    framework: [pytest, jest, mutmut, stryker, cosmic-ray]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition, test_quality, mutation_testing]
  example_good: |
    # Original code:
    def apply_discount(price: Decimal, percent: int) -> Decimal:
        return price * (100 - percent) / 100

    # Strong test (kills mutants):
    def test_apply_discount_20_percent():
        result = apply_discount(Decimal("100.00"), 20)
        assert result == Decimal("80.00")  # exact value — any mutation breaks this

    # Mutation: change (100 - percent) to (100 + percent) → test fails (120 != 80)
    # Mutation: change / 100 to / 10 → test fails (800 != 80)
    # Mutation: change * to + → test fails (100.80 != 80)
    # All mutants killed — test is strong
  example_bad: |
    def test_apply_discount():
        result = apply_discount(Decimal("100.00"), 20)
        assert result > 0              # mutant (100+percent)/100 = 1.20 > 0 — survives
        assert isinstance(result, Decimal)  # mutant price+percent is Decimal — survives
        # Weak assertions: most mutations survive
  when_applies: During test quality audits, mutation testing runs, test review, test suite maintenance
  sources: ["https://mutmut.readthedocs.io/en/latest/"]

- id: SAC-QA-026
  text: Test names should describe the SCENARIO, not the function — 'test_payment_fails_when_card_expired' is documentation, 'test_payment' is noise
  why: 'When a test fails in CI, the test name is often the only information visible. A name like "test_payment" forces the developer to open the test file and read the code to understand what broke. A name like "test_payment_fails_when_card_expired" immediately communicates the scenario. Good test names also serve as living documentation of the system behavior — reading test names tells you every scenario the system handles. Real example: CI failed with "test_user FAILED." The developer spent 20 minutes reading the test to understand it was testing that inactive users cannot log in. With "test_inactive_user_cannot_login FAILED," the fix is obvious in seconds.'
  how_to_do_right: |
    1. Use the pattern: test_{action}_{condition}_{expected_result}.
    2. Examples: test_login_with_expired_password_returns_401, test_order_with_zero_items_raises_error.
    3. The name should be readable as a sentence: "test [that] login with expired password returns 401."
    4. Avoid generic names: test_main, test_function, test_it_works, test_1.
    5. For parameterized tests, include the variant: test_tax_for_california, test_tax_for_texas.
    6. Review test names in CI output — if you cannot understand the failure from the name alone, rename the test.
    7. Test names are documentation — treat them with the same care as function names.
  severity: high
  technologies:
    lang: [python, javascript]
    framework: [pytest, jest, unittest]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition, naming, documentation]
  example_good: |
    class TestUserRegistration:
        def test_registration_succeeds_with_valid_data(self): ...
        def test_registration_fails_when_email_already_exists(self): ...
        def test_registration_fails_when_password_too_short(self): ...
        def test_registration_sends_welcome_email(self): ...
        def test_registration_creates_default_preferences(self): ...

    # CI output:
    # FAILED test_registration_fails_when_password_too_short
    # Developer instantly knows: password validation is broken
  example_bad: |
    class TestUser:
        def test_register(self): ...       # register what? succeed or fail?
        def test_register2(self): ...      # what is different about test 2?
        def test_email(self): ...          # email what? send? validate? display?
        def test_it(self): ...             # test... what?

    # CI output:
    # FAILED test_register2
    # Developer: "What does test_register2 even test?" (opens file, reads 50 lines)
  when_applies: During code review of test files, test naming conventions, CI output readability review
  sources: ["https://docs.pytest.org/en/stable/how-to/usage.html"]

- id: SAC-QA-027
  text: Test isolation — each test must work in any order and alone — if test B fails only when run after test A, there is shared state that must be fixed
  why: 'Test order dependency is a silent killer. Tests pass in CI because they happen to run in the right order, then fail when run individually, in parallel, or in a different order. The root cause is always shared state: a database row created by test A that test B depends on, a global variable set by test A that test B reads, a file created by test A that test B expects. Real example: a test suite had 300 tests. They always passed in CI. When a developer ran a single test file (50 tests), 12 failed. Investigation revealed: test_setup_admin (in a different file) created an admin user that 12 tests across 5 files depended on. Nobody knew because the full suite always ran test_setup_admin first.'
  how_to_do_right: |
    1. Each test creates its own data in setup/fixtures and cleans up in teardown.
    2. Use database transactions that rollback after each test (pytest-django, SQLAlchemy rollback).
    3. Use unique identifiers in test data: f"user_{uuid4()}@test.com" instead of "admin@test.com".
    4. Never use global variables for test state — use fixtures.
    5. Run tests in random order regularly: pytest-randomly, jest --randomize.
    6. Run individual test files in CI as a smoke check: pytest tests/test_auth.py (alone).
    7. If a test needs setup from another test, it is not a test — it is a procedure. Refactor.
  severity: high
  technologies:
    lang: [python, javascript]
    framework: [pytest, jest, pytest-randomly, factory-boy]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition, test_isolation, reliability]
  example_good: |
    import pytest
    from uuid import uuid4

    @pytest.fixture
    def user(db_session):
        """Each test gets its own isolated user."""
        u = User(email=f"test-{uuid4()}@example.com", name="Test User")
        db_session.add(u)
        db_session.flush()
        yield u
        # db_session rollback happens automatically via fixture

    def test_update_user_name(user):
        user.name = "New Name"
        db_session.flush()
        assert user.name == "New Name"

    def test_delete_user(user):
        # Does NOT depend on test_update_user_name — has its own fresh user
        db_session.delete(user)
        db_session.flush()
        assert db_session.query(User).get(user.id) is None
  example_bad: |
    # test_setup.py (runs first by filename order)
    def test_create_admin():
        User.create(email="admin@test.com", role="admin")  # shared state

    # test_features.py (depends on test_setup.py running first)
    def test_admin_can_delete_user():
        admin = User.query.filter_by(email="admin@test.com").first()  # FAILS if run alone
        # ...
  when_applies: During test suite maintenance, flaky test investigation, parallel test execution setup
  sources: ["https://docs.pytest.org/en/stable/how-to/fixtures.html"]

- id: SAC-QA-028
  text: Property-based tests catch edge cases humans miss — instead of 3 hand-written test cases, generate 1000 random inputs and verify that properties hold for all of them
  why: 'Humans write tests for cases they can imagine. Property-based testing generates cases humans would never think of. Instead of testing "sort([3,1,2]) == [1,2,3]" (one case), you test "for any list, sort(list) has the same elements and is in non-decreasing order" (thousands of cases). The testing framework generates edge cases: empty list, single element, all duplicates, already sorted, reverse sorted, maximum values. Real example: a serialization function had 5 hand-written tests, all passing. Property-based testing found that strings containing null bytes caused deserialization to silently truncate data. Nobody had thought to test null bytes in strings.'
  how_to_do_right: |
    1. Use Hypothesis (Python) or fast-check (JavaScript) for property-based testing.
    2. Identify properties that should hold for ALL inputs (not just specific inputs).
    3. Common properties: idempotence (f(f(x)) == f(x)), round-trip (decode(encode(x)) == x), invariants (sorted output is same length as input).
    4. Start with simple strategies and let the framework find edge cases.
    5. When Hypothesis finds a failing case, add it as an explicit regression test.
    6. Use @example() decorator to pin known edge cases alongside generated ones.
    7. Run property tests in CI with more examples (--hypothesis-seed, max_examples=1000).
  severity: high
  technologies:
    lang: [python, javascript]
    framework: [hypothesis, fast-check, pytest, jest]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition, property_testing, edge_cases]
  example_good: |
    from hypothesis import given, strategies as st, example

    @given(st.lists(st.integers()))
    @example([])            # pin: empty list
    @example([1])           # pin: single element
    @example([1, 1, 1])    # pin: all duplicates
    def test_sort_preserves_elements(lst):
        sorted_lst = my_sort(lst)
        assert sorted(sorted_lst) == sorted(lst)  # same elements
        assert all(sorted_lst[i] <= sorted_lst[i+1] for i in range(len(sorted_lst)-1))  # ordered

    @given(st.text())
    def test_encode_decode_roundtrip(text):
        assert decode(encode(text)) == text  # round-trip property

    # Hypothesis found: text="\x00data" → decode(encode("\x00data")) == "\x00" (truncated!)
    # Bug: encoder stops at null byte. Would never have found this by hand.
  example_bad: |
    def test_sort():
        assert my_sort([3, 1, 2]) == [1, 2, 3]
        assert my_sort([]) == []
        assert my_sort([1]) == [1]
        # 3 hand-written cases — misses: negative numbers, duplicates, MAX_INT, NaN
  when_applies: During test design for pure functions, serialization, parsing, data transformation, algorithm implementation
  sources: ["https://hypothesis.readthedocs.io/en/latest/"]

- id: SAC-QA-029
  text: Snapshot tests are useful for UI rendering but dangerous for logic — they catch unintended changes but do not verify correctness, so use them for presentation, not for business logic
  why: 'Snapshot tests record the output of a function and fail if the output changes. This catches unintended changes but has a critical flaw: they do not verify the output is CORRECT, only that it has not CHANGED. When a snapshot fails, the developer can "update snapshots" without checking if the new output is right. For UI rendering, this is acceptable (visual diff is meaningful). For business logic, this is dangerous — the snapshot might have been wrong from the start. Real example: a team used snapshots for API response testing. A developer introduced a bug that changed price calculations. The snapshot test failed. The developer ran "update snapshots" (as they always do for UI snapshot updates). The wrong prices were now the "expected" output. Bug shipped.'
  how_to_do_right: |
    1. Use snapshots for: UI components, HTML rendering, CLI output formatting, error messages.
    2. Do NOT use snapshots for: calculations, data transformations, business logic, security checks.
    3. For business logic, use explicit assertions: assert total == Decimal("49.99").
    4. When updating snapshots, ALWAYS review the diff — do not blindly accept.
    5. In CI, treat snapshot updates as a code change that requires review.
    6. Name snapshots descriptively so reviewers know what they are looking at.
    7. Keep snapshots small — a 500-line snapshot will never be properly reviewed.
  severity: high
  technologies:
    lang: [python, javascript]
    framework: [jest, pytest-snapshot, syrupy, react-testing-library]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition, test_strategy, snapshot_testing]
  example_good: |
    # GOOD: Snapshot for UI rendering (presentation)
    def test_invoice_email_html(snapshot):
        html = render_invoice_email(invoice=sample_invoice)
        assert html == snapshot  # catches unintended formatting changes

    # GOOD: Explicit assertion for business logic (correctness)
    def test_invoice_total():
        invoice = create_invoice(items=[Item(price=Decimal("10.00"), qty=3)])
        assert invoice.total == Decimal("30.00")  # verifies correctness, not just stability
        assert invoice.tax == Decimal("2.10")
        assert invoice.grand_total == Decimal("32.10")
  example_bad: |
    # BAD: Snapshot for business logic
    def test_invoice_calculation(snapshot):
        invoice = create_invoice(items=[Item(price=Decimal("10.00"), qty=3)])
        assert invoice.to_dict() == snapshot
        # If the calculation is wrong, "update snapshots" accepts the wrong answer
        # Nobody reviews a 50-line JSON snapshot line by line
  when_applies: During test strategy decisions, test review, test suite design, snapshot test proliferation review
  sources: ["https://jestjs.io/docs/snapshot-testing"]

- id: SAC-QA-030
  text: Contract tests between services verify that the API contract is respected by both producer and consumer — use pact tests or schema validation to ensure service A and service B agree on the interface
  why: 'In a microservice architecture, service A (consumer) calls service B (producer). If service B changes its response format, service A breaks. Unit tests on each service pass because they test in isolation with mocks. Integration tests in staging might catch it, but by then you have wasted a deploy cycle. Contract tests catch it at build time. Real example: service A expected {"user": {"name": "Alice"}}. Service B deployed a change that renamed "name" to "full_name". Both services had 100% test coverage. Both passed CI. The break was discovered in production when users saw blank names. A contract test would have caught the rename before merge.'
  how_to_do_right: |
    1. Use Pact (consumer-driven contracts) or OpenAPI/JSON Schema validation.
    2. Consumer defines the contract: "I expect GET /users/1 to return {id: int, name: string}."
    3. Producer verifies it can fulfill the contract in its CI pipeline.
    4. If producer needs to change the contract, the consumer contract test fails first — preventing silent breaks.
    5. Version APIs: /v1/users, /v2/users. Never break existing versions.
    6. Schema validation: validate responses against OpenAPI spec in both producer and consumer tests.
    7. Run contract tests in CI for both consumer and producer — they are the shared source of truth.
  severity: high
  technologies:
    lang: [python, javascript, typescript]
    framework: [pact, schemathesis, openapi, pytest, jest, dredd]
  domains:
    domain: [sacada, testing]
    concern: [meta_cognition, contract_testing, microservices]
  example_good: |
    # Consumer side (service A) — defines expected contract
    # Using schemathesis to validate against OpenAPI spec
    import schemathesis

    schema = schemathesis.from_url("http://service-b/openapi.json")

    @schema.parametrize()
    def test_service_b_contract(case):
        response = case.call()
        case.validate_response(response)  # validates against OpenAPI spec

    # Manual contract test for critical fields
    def test_user_response_has_required_fields():
        response = service_b_client.get_user(user_id=1)
        assert "id" in response
        assert "name" in response  # catches rename to "full_name"
        assert isinstance(response["id"], int)
        assert isinstance(response["name"], str)
  example_bad: |
    # Both services test with mocks — neither tests the real contract
    # Service A test:
    def test_get_user():
        mock_response = {"user": {"name": "Alice"}}  # hardcoded mock
        result = process_user(mock_response)
        assert result.name == "Alice"

    # Service B test:
    def test_user_endpoint():
        user = create_user(full_name="Alice")  # renamed from "name" to "full_name"
        response = client.get(f"/users/{user.id}")
        assert response.json()["full_name"] == "Alice"
        # Both pass — but service A will break because it expects "name" not "full_name"
  when_applies: During microservice integration design, API versioning, service dependency review, schema evolution
  sources: ["https://docs.pact.io/"]
