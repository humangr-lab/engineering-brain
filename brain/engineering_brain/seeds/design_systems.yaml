layer: patterns
domain: ui

knowledge:
  # === Component Architecture ===
  - id: PAT-DS-ATOMIC-DESIGN
    name: "Atomic Design Methodology"
    category: component_architecture
    intent: "Organize UI components in a hierarchy of increasing complexity (atoms → molecules → organisms → templates → pages) to ensure composability, reuse, and consistent design language."
    when_to_use: "Building or scaling a design system. Creating a shared component library. Multi-product organizations needing consistent UI. Any project with more than 10 reusable components."
    when_not_to_use: "One-off marketing pages. Very small projects with <5 components. Prototypes where speed matters more than structure."
    languages: [React, Vue, Angular, Svelte]
    example_good: |
      // ATOMS — smallest building blocks, no business logic
      // atoms/Button.tsx
      export function Button({ variant = 'primary', size = 'md', children, ...props }) {
        return <button className={`btn btn-${variant} btn-${size}`} {...props}>{children}</button>;
      }

      // atoms/Avatar.tsx
      export function Avatar({ src, name, size = 'md' }) {
        return <img className={`avatar avatar-${size}`} src={src} alt={name} />;
      }

      // MOLECULES — groups of atoms working together
      // molecules/UserChip.tsx
      export function UserChip({ user }) {
        return (
          <div className="user-chip">
            <Avatar src={user.avatar} name={user.name} size="sm" />
            <span className="user-chip-name">{user.name}</span>
          </div>
        );
      }

      // ORGANISMS — complex, self-contained sections
      // organisms/CommentCard.tsx
      export function CommentCard({ comment }) {
        return (
          <div className="comment-card">
            <UserChip user={comment.author} />
            <p className="comment-body">{comment.text}</p>
            <div className="comment-actions">
              <Button variant="ghost" size="sm">Reply</Button>
              <Button variant="ghost" size="sm">Like</Button>
            </div>
          </div>
        );
      }
    example_bad: |
      // BAD: Monolithic component that mixes all levels — impossible to reuse parts
      function CommentSection({ comments }) {
        return comments.map(c => (
          <div className="comment">
            <img src={c.author.avatar} style={{width:32, height:32, borderRadius:'50%'}} />
            <span style={{fontWeight:'bold'}}>{c.author.name}</span>
            <p>{c.text}</p>
            <button style={{background:'blue', color:'white', padding:'4px 8px'}}>Reply</button>
            <button style={{background:'blue', color:'white', padding:'4px 8px'}}>Like</button>
          </div>
        ));
        // Can't reuse Avatar, Button, or UserChip anywhere else
        // Styles are inline — no consistency, no tokens
      }
    text: "Atomic Design Methodology -- Organize UI components in a hierarchy of increasing complexity (atoms → molecules → organisms → templates → pages) to ensure composability, reuse, and consistent design language."
    why: "Organize UI components in a hierarchy of increasing complexity (atoms → molecules → organisms → templates → pages) to ensure composability, reuse, and consistent design language."
    how_to_do_right: |
      1. Identify where atomic design methodology applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
    severity: high
    technologies:
      lang: [react, vue, angular, svelte]
    domains:
      domain: [component_architecture, ui]
      concern: [pattern, best_practice]
    when_applies: "Building or scaling a design system."

    related_principles: [P-ARCH-SINGLE-RESP, P-ARCH-DRY, P-UX-CONSISTENCY]
    sources: ["https://bradfrost.com/blog/post/atomic-web-design/"]

  - id: PAT-DS-COMPONENT-API
    name: "Component API Design (Props Interface)"
    category: component_architecture
    intent: "Design component props that are intuitive, predictable, and consistent across the design system, with sensible defaults that minimize required configuration."
    text: "Component API Design (Props Interface) -- Design component props that are intuitive, predictable, and consistent across the design system, with sensible defaults that minimize required configuration."
    when_to_use: "Every shared component in a design system. Any component used by more than one team. Public-facing component libraries."
    when_not_to_use: "Internal one-off components that won't be reused. Rapid prototyping where API stability doesn't matter."
    languages: [React, TypeScript, Vue]
    example_good: |
      // Consistent API across the design system:
      // - variant: visual style (primary, secondary, ghost, danger)
      // - size: dimensions (sm, md, lg)
      // - disabled: interaction state
      // - className: escape hatch for one-off styling
      // - children: content projection

      interface ButtonProps {
        variant?: 'primary' | 'secondary' | 'ghost' | 'danger';  // Sensible default: primary
        size?: 'sm' | 'md' | 'lg';                                 // Sensible default: md
        disabled?: boolean;                                         // Default: false
        loading?: boolean;                                          // Shows spinner, disables click
        leftIcon?: ReactNode;                                       // Icon before text
        rightIcon?: ReactNode;                                      // Icon after text
        className?: string;                                         // Escape hatch
        children: ReactNode;                                        // Required: content
      }

      // Usage is clean and predictable:
      <Button>Save</Button>                           // Primary, medium — most common
      <Button variant="danger" size="sm">Delete</Button>
      <Button loading>Submitting...</Button>          // Disabled + spinner automatically
      <Button leftIcon={<PlusIcon />}>Add Item</Button>
    example_bad: |
      // BAD: Inconsistent API, boolean props for visual variants, no defaults
      interface ButtonProps {
        isPrimary?: boolean;   // boolean variant — can't add more variants
        isLarge?: boolean;     // what about medium?
        isSmall?: boolean;     // conflicts with isLarge? both true?
        bgColor?: string;      // breaks design tokens, allows arbitrary colors
        textColor?: string;    // same problem
        onClick: () => void;   // required — but Button doesn't always need onClick
        text: string;          // can't put icons or rich content inside
      }

      // Usage is confusing:
      <Button isPrimary isLarge text="Save" onClick={save} />
      <Button isSmall bgColor="#ff0000" textColor="#ffffff" text="Delete" onClick={del} />
      // What is <Button isPrimary={false} isLarge={false} isSmall={false} />? No default!
    why: "Design component props that are intuitive, predictable, and consistent across the design system, with sensible defaults that minimize required configuration."
    how_to_do_right: |
      1. Identify where component api design (props interface) applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
    severity: high
    technologies:
      lang: [react, typescript, vue]
    domains:
      domain: [component_architecture, ui]
      concern: [pattern, best_practice]
    when_applies: "Every shared component in a design system."

    related_principles: [P-UX-CONSISTENCY, P-UX-RECOGNITION, P-UX-ERROR-PREVENTION]
    sources: ["https://react.dev/learn/typescript#typing-component-props"]

  - id: PAT-DS-COMPOSITION
    name: "Composition Over Configuration"
    category: component_architecture
    intent: "Build flexible components using children, render props, and slots instead of adding configuration props for every possible variation. Composition allows users to assemble custom layouts without the component needing to anticipate every use case."
    when_to_use: "Components with variable layouts (cards, modals, dropdowns). Components where users need to inject custom content. Components with many optional sections (headers, footers, actions)."
    when_not_to_use: "Simple components with fixed layout (Button, Badge, Spinner). Components where configuration props cover all valid variants. When composition would create too much boilerplate for common cases."
    languages: [React, Vue, Svelte]
    example_good: |
      // Composition: Card provides structure, user provides content
      function Card({ children, className }) {
        return <div className={`card ${className || ''}`}>{children}</div>;
      }
      Card.Header = ({ children }) => <div className="card-header">{children}</div>;
      Card.Body = ({ children }) => <div className="card-body">{children}</div>;
      Card.Footer = ({ children }) => <div className="card-footer">{children}</div>;

      // Usage — infinitely flexible, user controls layout:
      <Card>
        <Card.Header>
          <h3>Order #1234</h3>
          <Badge variant="success">Shipped</Badge>
        </Card.Header>
        <Card.Body>
          <p>2 items • $49.99</p>
        </Card.Body>
        <Card.Footer>
          <Button variant="ghost">Track Order</Button>
          <Button>View Details</Button>
        </Card.Footer>
      </Card>

      // Different layout, same component — no new props needed:
      <Card>
        <Card.Body>
          <Avatar src={user.avatar} name={user.name} size="lg" />
          <h3>{user.name}</h3>
        </Card.Body>
      </Card>
    example_bad: |
      // BAD: Configuration props for every possible layout variation
      function Card({
        title, subtitle, headerRight, headerIcon,       // 4 header props
        body, bodyImage, bodyImagePosition,              // 3 body props
        footerLeft, footerRight, footerCenter,           // 3 footer props
        showDivider, showShadow, variant, size,          // 4 style props
      }) {
        return (
          <div className={`card card-${variant} card-${size}`}>
            {(title || headerIcon) && (
              <div className="card-header">
                {headerIcon}{title}<span>{headerRight}</span>
              </div>
            )}
            {/* 50 lines of conditional rendering for every prop combination */}
          </div>
        );
      }
      // 14+ props. Adding a new layout requires adding more props. Combinatorial explosion.
    text: "Composition Over Configuration -- Build flexible components using children, render props, and slots instead of adding configuration props for every possible variation."
    why: "Build flexible components using children, render props, and slots instead of adding configuration props for every possible variation. Composition allows users to assemble custom layouts without the component needing to anticipate every use case."
    how_to_do_right: |
      1. Identify where composition over configuration applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
    severity: high
    technologies:
      lang: [react, vue, svelte]
    domains:
      domain: [component_architecture, ui]
      concern: [pattern, best_practice]
    when_applies: "Components with variable layouts (cards, modals, dropdowns)."

    related_principles: [P-ARCH-SINGLE-RESP, P-UX-FLEXIBILITY]
    sources: ["https://react.dev/learn/sharing-state-between-components#controlled-and-uncontrolled-components"]

  - id: PAT-DS-CONTROLLED
    name: "Controlled vs Uncontrolled Components"
    category: component_architecture
    intent: "Support both controlled mode (parent manages state) and uncontrolled mode (component manages its own state) to serve both simple and complex use cases."
    when_to_use: "Form inputs, toggles, accordions, tabs, modals — any component with internal state that a parent might need to control. Components consumed by both simple forms (uncontrolled) and complex forms with validation (controlled)."
    when_not_to_use: "Components with no internal state (Button, Badge). Components where the parent MUST always control state (form submission components)."
    languages: [React, TypeScript]
    example_good: |
      // Supports BOTH controlled and uncontrolled modes
      function Toggle({ value, defaultValue = false, onChange, label }) {
        // If `value` is provided, component is controlled (parent manages state)
        // If `value` is undefined, component is uncontrolled (internal state)
        const [internalValue, setInternalValue] = useState(defaultValue);
        const isControlled = value !== undefined;
        const isOn = isControlled ? value : internalValue;

        const handleToggle = () => {
          const newValue = !isOn;
          if (!isControlled) setInternalValue(newValue);
          onChange?.(newValue);
        };

        return (
          <button
            role="switch" aria-checked={isOn} aria-label={label}
            onClick={handleToggle}
            className={`toggle ${isOn ? 'toggle-on' : 'toggle-off'}`}
          />
        );
      }

      // Uncontrolled: simple usage, component manages its own state
      <Toggle label="Dark mode" onChange={val => console.log(val)} />

      // Controlled: parent manages state for cross-form validation
      const [darkMode, setDarkMode] = useState(false);
      <Toggle label="Dark mode" value={darkMode} onChange={setDarkMode} />
    example_bad: |
      // BAD: Only controlled — forces parent to manage state for simple cases
      function Toggle({ value, onChange, label }) {
        return (
          <button role="switch" aria-checked={value} onClick={() => onChange(!value)}>
            {/* Parent MUST provide value + onChange even for a simple standalone toggle */}
          </button>
        );
      }
      // Every usage requires useState in parent — boilerplate for simple cases

      // BAD: Only uncontrolled — parent cannot sync state with other components
      function Toggle({ defaultValue, label }) {
        const [isOn, setIsOn] = useState(defaultValue);
        return <button onClick={() => setIsOn(!isOn)}>{/* ... */}</button>;
        // Parent cannot read or set the value — useless in complex forms
      }
    text: "Controlled vs Uncontrolled Components -- Support both controlled mode (parent manages state) and uncontrolled mode (component manages its own state) to serve both simple and complex use cases."
    why: "Support both controlled mode (parent manages state) and uncontrolled mode (component manages its own state) to serve both simple and complex use cases."
    how_to_do_right: |
      1. Identify where controlled vs uncontrolled components applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
    severity: high
    technologies:
      lang: [react, typescript]
    domains:
      domain: [component_architecture, ui]
      concern: [pattern, best_practice]
    when_applies: "Form inputs, toggles, accordions, tabs, modals — any component with internal state that a parent might need to control."

    related_principles: [P-UX-FLEXIBILITY, P-UX-CONTROL]
    sources: ["https://react.dev/reference/react-dom/components/input#controlling-an-input-with-a-state-variable"]

  # === Token System ===
  - id: PAT-DS-DESIGN-TOKENS
    name: "Design Tokens (Foundational Values)"
    category: token_system
    intent: "Define color, spacing, typography, and other visual properties as named variables that serve as the single source of truth for the entire design system, enabling consistent theming and easy updates."
    when_to_use: "Every design system. Any project with more than 1 developer or designer. Multi-platform products (web, iOS, Android) sharing visual language. Products requiring theme support (dark mode, white-label)."
    when_not_to_use: "Single-use prototypes. Extremely small projects with no design ambitions."
    languages: [CSS, SCSS, JavaScript, Design Tools]
    example_good: |
      /* FOUNDATIONAL tokens — raw values, never used directly in components */
      :root {
        /* Color palette */
        --color-blue-50: #eff6ff;
        --color-blue-500: #3b82f6;
        --color-blue-700: #1d4ed8;
        --color-red-500: #ef4444;
        --color-gray-50: #f9fafb;
        --color-gray-900: #111827;

        /* Spacing scale (4px base) */
        --space-1: 0.25rem;  /* 4px */
        --space-2: 0.5rem;   /* 8px */
        --space-3: 0.75rem;  /* 12px */
        --space-4: 1rem;     /* 16px */
        --space-6: 1.5rem;   /* 24px */
        --space-8: 2rem;     /* 32px */

        /* Typography scale */
        --font-size-sm: 0.875rem;  /* 14px */
        --font-size-base: 1rem;    /* 16px */
        --font-size-lg: 1.125rem;  /* 18px */
        --font-size-xl: 1.25rem;   /* 20px */
        --font-weight-normal: 400;
        --font-weight-medium: 500;
        --font-weight-bold: 700;

        /* Border radius */
        --radius-sm: 0.25rem;
        --radius-md: 0.375rem;
        --radius-lg: 0.5rem;
        --radius-full: 9999px;
      }
    example_bad: |
      /* BAD: Hardcoded values everywhere — no tokens, no consistency */
      .button { background: #3b82f6; padding: 8px 16px; border-radius: 4px; }
      .card { padding: 12px; border-radius: 6px; }  /* Different radius! */
      .header { background: #3b83f6; }  /* Typo: #3b83f6 vs #3b82f6 — inconsistent blue */
      .sidebar { padding: 15px; }  /* Off-scale: 15px not in any system */
      .modal { font-size: 15px; }  /* Off-scale: not 14 or 16 */
      /* Changing "blue" requires find-and-replace across hundreds of files */
    text: "Design Tokens (Foundational Values) -- Define color, spacing, typography, and other visual properties as named variables that serve as the single source of truth for the entire design system, enabling consistent theming and easy updates."
    why: "Define color, spacing, typography, and other visual properties as named variables that serve as the single source of truth for the entire design system, enabling consistent theming and easy updates."
    how_to_do_right: |
      1. Identify where design tokens (foundational values) applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
    severity: medium
    technologies:
      lang: [css, scss, javascript, design tools]
    domains:
      domain: [token_system, ui]
      concern: [pattern, best_practice]
    when_applies: "Every design system."

    sources: ["https://developer.mozilla.org/en-US/docs/Web/CSS/Using_CSS_custom_properties", "https://tr.designtokens.org/format/"]

  - id: PAT-DS-SEMANTIC-TOKENS
    name: "Semantic Design Tokens"
    category: token_system
    intent: "Map foundational tokens to semantic meanings (primary, surface, error) so that components reference purpose, not appearance, enabling painless theme switching."
    when_to_use: "Any design system that supports theming (light/dark mode, brand variations). Multi-brand products (white-label). Products that may rebrand. Any system where 'primary color' might change."
    when_not_to_use: "One-off projects with no theming needs. When the overhead of two token layers is not justified."
    languages: [CSS, SCSS, JavaScript]
    example_good: |
      /* SEMANTIC tokens — reference foundational tokens, used in components */
      :root {
        /* Purpose-based naming — components use these */
        --color-primary: var(--color-blue-700);
        --color-primary-hover: var(--color-blue-800);
        --color-surface: var(--color-white);
        --color-surface-raised: var(--color-gray-50);
        --color-text-primary: var(--color-gray-900);
        --color-text-secondary: var(--color-gray-600);
        --color-text-on-primary: var(--color-white);
        --color-border: var(--color-gray-200);
        --color-error: var(--color-red-500);
        --color-success: var(--color-green-500);
        --color-warning: var(--color-yellow-500);
      }

      /* Dark mode: ONLY semantic tokens change — components untouched */
      @media (prefers-color-scheme: dark) {
        :root {
          --color-primary: var(--color-blue-400);
          --color-surface: var(--color-gray-900);
          --color-surface-raised: var(--color-gray-800);
          --color-text-primary: var(--color-gray-50);
          --color-text-secondary: var(--color-gray-400);
          --color-border: var(--color-gray-700);
        }
      }

      /* Component uses semantic tokens — works in ALL themes automatically */
      .button-primary {
        background: var(--color-primary);
        color: var(--color-text-on-primary);
      }
    example_bad: |
      /* BAD: Components reference foundational tokens directly — theme change breaks everything */
      .button-primary { background: var(--color-blue-700); color: white; }
      /* To support dark mode, you must find and update EVERY component:  */
      @media (prefers-color-scheme: dark) {
        .button-primary { background: var(--color-blue-400); }  /* Manual override per component */
        .card { background: var(--color-gray-900); }             /* Another manual override */
        .text { color: var(--color-gray-100); }                  /* And another... */
        /* 200 overrides for 200 components — unmaintainable */
      }
    text: "Semantic Design Tokens -- Map foundational tokens to semantic meanings (primary, surface, error) so that components reference purpose, not appearance, enabling painless theme switching."
    why: "Map foundational tokens to semantic meanings (primary, surface, error) so that components reference purpose, not appearance, enabling painless theme switching."
    how_to_do_right: |
      1. Identify where semantic design tokens applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
    severity: medium
    technologies:
      lang: [css, scss, javascript]
    domains:
      domain: [token_system, ui]
      concern: [pattern, best_practice]
    when_applies: "Any design system that supports theming (light/dark mode, brand variations)."

    sources: ["https://developer.mozilla.org/en-US/docs/Web/CSS/Using_CSS_custom_properties"]

  - id: PAT-DS-RESPONSIVE-TOKENS
    name: "Responsive Design Tokens"
    category: token_system
    intent: "Define breakpoint-aware token values that allow spacing, typography, and layout to adapt to screen size through a consistent system rather than ad-hoc media queries."
    when_to_use: "Responsive web applications. Design systems used across mobile and desktop. Applications where spacing/typography needs to scale with viewport."
    when_not_to_use: "Desktop-only applications. Native mobile apps (use platform-specific sizing). When CSS container queries provide better component-level responsiveness."
    languages: [CSS, SCSS, Tailwind]
    example_good: |
      /* Responsive tokens: spacing and typography scale with breakpoints */
      :root {
        /* Mobile first — base values */
        --container-padding: var(--space-4);     /* 16px on mobile */
        --section-gap: var(--space-6);           /* 24px on mobile */
        --heading-1: var(--font-size-2xl);       /* 24px on mobile */
        --heading-2: var(--font-size-xl);        /* 20px on mobile */
        --grid-columns: 1;
      }

      @media (min-width: 48em) {  /* Tablet: 768px */
        :root {
          --container-padding: var(--space-6);   /* 24px on tablet */
          --section-gap: var(--space-8);         /* 32px on tablet */
          --heading-1: var(--font-size-3xl);     /* 30px on tablet */
          --grid-columns: 2;
        }
      }

      @media (min-width: 64em) {  /* Desktop: 1024px */
        :root {
          --container-padding: var(--space-8);   /* 32px on desktop */
          --section-gap: var(--space-12);        /* 48px on desktop */
          --heading-1: var(--font-size-4xl);     /* 36px on desktop */
          --grid-columns: 3;
        }
      }

      /* Components use responsive tokens — no per-component media queries */
      .page { padding: var(--container-padding); }
      .section + .section { margin-top: var(--section-gap); }
      .grid { display: grid; grid-template-columns: repeat(var(--grid-columns), 1fr); }
    example_bad: |
      /* BAD: Ad-hoc media queries in every component — inconsistent and unmaintainable */
      .page { padding: 16px; }
      @media (min-width: 768px) { .page { padding: 20px; } }  /* Different scale than cards */
      @media (min-width: 1024px) { .page { padding: 32px; } }

      .card { padding: 12px; }
      @media (min-width: 768px) { .card { padding: 18px; } }  /* 18px? Not in any system */
      @media (min-width: 1024px) { .card { padding: 24px; } }

      .header { font-size: 22px; }
      @media (min-width: 800px) { .header { font-size: 28px; } }  /* 800px? Different breakpoint! */
      /* Every component has its own breakpoints, its own scales — chaos */
    text: "Responsive Design Tokens -- Define breakpoint-aware token values that allow spacing, typography, and layout to adapt to screen size through a consistent system rather than ad-hoc media queries."
    why: "Define breakpoint-aware token values that allow spacing, typography, and layout to adapt to screen size through a consistent system rather than ad-hoc media queries."
    how_to_do_right: |
      1. Identify where responsive design tokens applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
    severity: medium
    technologies:
      lang: [css, scss, tailwind]
    domains:
      domain: [token_system, ui]
      concern: [pattern, best_practice]
    when_applies: "Responsive web applications."

    sources: ["https://developer.mozilla.org/en-US/docs/Web/CSS/CSS_media_queries/Using_media_queries"]

  # === Documentation ===
  - id: PAT-DS-STORYBOOK
    name: "Component Stories (Storybook)"
    category: documentation
    intent: "Document every component state, variant, and edge case as an interactive story that serves as living documentation, visual regression test, and collaboration tool between design and development."
    when_to_use: "Every shared component in a design system. Any component with multiple visual states (loading, error, empty, populated). Teams where designers review component implementations."
    when_not_to_use: "Internal utility functions (no visual output). One-off page layouts. Backend services."
    languages: [React, Vue, Angular, Storybook]
    example_good: |
      // Button.stories.tsx — comprehensive stories covering all states
      import { Button } from './Button';

      export default {
        title: 'Components/Button',
        component: Button,
        argTypes: {
          variant: { control: 'select', options: ['primary', 'secondary', 'ghost', 'danger'] },
          size: { control: 'select', options: ['sm', 'md', 'lg'] },
          disabled: { control: 'boolean' },
          loading: { control: 'boolean' },
        },
      };

      // Default — interactive playground
      export const Default = { args: { children: 'Button', variant: 'primary', size: 'md' } };

      // All variants side by side
      export const AllVariants = () => (
        <div style={{ display: 'flex', gap: 16 }}>
          <Button variant="primary">Primary</Button>
          <Button variant="secondary">Secondary</Button>
          <Button variant="ghost">Ghost</Button>
          <Button variant="danger">Danger</Button>
        </div>
      );

      // States: disabled, loading, with icon
      export const Disabled = { args: { children: 'Disabled', disabled: true } };
      export const Loading = { args: { children: 'Submitting...', loading: true } };
      export const WithIcon = { args: { children: 'Add Item', leftIcon: <PlusIcon /> } };

      // Edge cases
      export const LongText = { args: { children: 'This is a button with very long text that might overflow' } };
      export const IconOnly = { args: { children: <SearchIcon />, 'aria-label': 'Search' } };
    example_bad: |
      // BAD: Single story with no variants — doesn't show capabilities or edge cases
      export default { title: 'Button', component: Button };
      export const Default = () => <Button>Click me</Button>;
      // Where are the variants? Where are the states? Where are the edge cases?
      // Designer asks: "What does the disabled state look like?" — no answer in Storybook
    text: "Component Stories (Storybook) -- Document every component state, variant, and edge case as an interactive story that serves as living documentation, visual regression test, and collaboration tool between design and development."
    why: "Document every component state, variant, and edge case as an interactive story that serves as living documentation, visual regression test, and collaboration tool between design and development."
    how_to_do_right: |
      1. Identify where component stories (storybook) applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
    severity: medium
    technologies:
      lang: [react, vue, angular, storybook]
    domains:
      domain: [documentation, ui]
      concern: [pattern, best_practice]
    when_applies: "Every shared component in a design system."

    related_principles: [P-UX-HELP, P-UX-CONSISTENCY]
    sources: ["https://storybook.js.org/docs/writing-stories"]

  - id: PAT-DS-USAGE-GUIDELINES
    name: "Component Usage Guidelines"
    category: documentation
    intent: "Document when to use a component, when NOT to use it, and the reasoning behind these guidelines, preventing misuse and ensuring consistency across consuming teams."
    when_to_use: "Every component that could be confused with a similar component. Components with non-obvious usage rules. Components that are frequently misused."
    when_not_to_use: "Trivially simple components (Divider, Spacer) where usage is self-evident."
    languages: [Markdown, MDX, Storybook]
    example_good: |
      ## Modal Dialog

      ### When to Use
      - **Destructive confirmations**: "Delete 47 items? This cannot be undone."
      - **Critical information**: Requiring acknowledgment before proceeding.
      - **Complex sub-tasks**: That need focus (e.g., compose email, edit profile).

      ### When NOT to Use
      - **Success messages**: Use Toast instead (non-blocking).
      - **Simple choices**: Use inline options or dropdown instead.
      - **Non-critical information**: Use Banner or inline message instead.
      - **Frequent actions**: Modals interrupt flow — if the action happens 10x/day, use inline.

      ### Guidelines
      - Maximum 1 modal visible at a time (never stack modals).
      - Always include a close button (X) AND a Cancel action.
      - Destructive action button must be on the right, colored red.
      - Focus must be trapped inside the modal (Tab doesn't escape).
      - Escape key must close the modal.
      - Background overlay must be clickable to close (non-destructive modals).

      ### Accessibility
      - Role: `dialog` with `aria-modal="true"`.
      - `aria-labelledby` pointing to the modal title.
      - Focus moves to modal on open, returns to trigger on close.
      - Screen reader announcement: "Dialog opened: [title]".
    example_bad: |
      ## Modal

      A modal dialog component.

      Props:
      - isOpen: boolean
      - onClose: () => void
      - children: ReactNode

      <!-- No "when to use", no "when NOT to use", no accessibility guidelines,
           no interaction patterns. Developer uses it for success messages,
           stacks 3 modals, forgets focus trap. -->
    text: "Component Usage Guidelines -- Document when to use a component, when NOT to use it, and the reasoning behind these guidelines, preventing misuse and ensuring consistency across consuming teams."
    why: "Document when to use a component, when NOT to use it, and the reasoning behind these guidelines, preventing misuse and ensuring consistency across consuming teams."
    how_to_do_right: |
      1. Identify where component usage guidelines applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
    severity: medium
    technologies:
      lang: [markdown, mdx, storybook]
    domains:
      domain: [documentation, ui]
      concern: [pattern, best_practice]
    when_applies: "Every component that could be confused with a similar component."

    related_principles: [P-UX-HELP, P-UX-CONSISTENCY, P-UX-ERROR-PREVENTION]
    sources: ["https://www.w3.org/WAI/ARIA/apg/patterns/dialog-modal/"]

  # === Versioning ===
  - id: PAT-DS-SEMVER
    name: "Semantic Versioning for Design Systems"
    category: versioning
    intent: "Use semantic versioning to communicate the nature of changes (breaking, feature, fix) so consuming teams can upgrade safely and predictably."
    when_to_use: "Published component libraries. Design systems consumed by multiple products. Any shared UI package distributed via npm, Maven, or similar."
    when_not_to_use: "Monorepo where all consumers are updated simultaneously. Internal components not published as packages."
    languages: [npm, Semantic Versioning]
    example_good: |
      // package.json
      { "version": "3.2.1" }

      // MAJOR (3.x.x → 4.0.0): Breaking changes — consumers must update code
      // - Removed a prop (Button 'color' prop removed, use 'variant')
      // - Changed component API (Modal children → Modal.Body/Modal.Footer)
      // - Changed token names (--primary-color → --color-primary)

      // MINOR (3.2.x → 3.3.0): New features — no consumer changes needed
      // - Added new component (DatePicker)
      // - Added new prop to existing component (Button 'loading' prop)
      // - Added new design tokens (--space-0.5)

      // PATCH (3.2.1 → 3.2.2): Bug fixes — no consumer changes needed
      // - Fixed contrast ratio on disabled button
      // - Fixed focus ring not showing in Safari
      // - Fixed tooltip positioning edge case

      // CHANGELOG.md (user-facing, not developer-facing)
      ## [3.3.0] - 2026-02-15
      ### Added
      - **DatePicker**: New component for date selection with calendar popup
      - **Button**: Added `loading` prop that shows spinner and disables interaction
      ### Fixed
      - **Modal**: Focus trap now works correctly with nested inputs
    example_bad: |
      // BAD: Version 47.0.0 because every change is a major bump
      // Consumers stop upgrading because "major version = scary breaking changes"

      // BAD: Breaking changes in a minor version
      { "version": "3.3.0" }  // Removed Button 'color' prop — consumers' code breaks on npm update

      // BAD: No changelog — consumers don't know what changed
      // "I upgraded from 3.1 to 3.4 and things broke. Which version introduced the break?"
    text: "Semantic Versioning for Design Systems -- Use semantic versioning to communicate the nature of changes (breaking, feature, fix) so consuming teams can upgrade safely and predictably."
    why: "Use semantic versioning to communicate the nature of changes (breaking, feature, fix) so consuming teams can upgrade safely and predictably."
    how_to_do_right: |
      1. Identify where semantic versioning for design systems applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
    severity: medium
    technologies:
      lang: [npm, semantic versioning]
    domains:
      domain: [versioning, ui]
      concern: [pattern, best_practice]
    when_applies: "Published component libraries."

    related_principles: [P-UX-CONSISTENCY, P-UX-CONTROL]
    sources: ["https://semver.org/"]

  - id: PAT-DS-DEPRECATION
    name: "Component Deprecation Strategy"
    category: versioning
    intent: "Provide a predictable, gradual path for removing or replacing components, giving consumers time and guidance to migrate without surprise breakage."
    when_to_use: "Removing a component or prop. Replacing a component with a better version. Renaming tokens or changing API shapes. Any change that will eventually break consuming code."
    when_not_to_use: "Adding new features alongside existing ones (not a breaking change). Internal refactors that don't affect the public API."
    languages: [React, TypeScript, npm]
    example_good: |
      // Step 1: DEPRECATE — mark old API, provide migration path (minor version)
      /**
       * @deprecated Use `variant` prop instead. Will be removed in v4.0.
       * Migration: Replace color="blue" with variant="primary"
       */
      interface ButtonProps {
        /** @deprecated Use `variant` instead */
        color?: 'blue' | 'red' | 'gray';
        variant?: 'primary' | 'danger' | 'secondary';  // New API
      }

      function Button({ color, variant, ...props }) {
        if (color) {
          console.warn(
            `[DesignSystem] Button "color" prop is deprecated. ` +
            `Use "variant" instead. Migration: color="${color}" → variant="${colorToVariant[color]}". ` +
            `"color" will be removed in v4.0.`
          );
          variant = variant || colorToVariant[color];  // Backward compatible
        }
        // ... render with variant
      }

      // Step 2: Keep deprecated API working for 2 minor versions (3.3.0 → 3.4.0 → 3.5.0)
      // Step 3: REMOVE in next major version (4.0.0) with migration guide

      // MIGRATION GUIDE (in CHANGELOG and docs):
      // v3.3.0: `color` prop deprecated. Use `variant` instead.
      //   color="blue"  → variant="primary"
      //   color="red"   → variant="danger"
      //   color="gray"  → variant="secondary"
      // v4.0.0: `color` prop removed.
    example_bad: |
      // BAD: Remove prop without warning in a major version — no migration path
      // v3.x: <Button color="blue">Save</Button>  — works
      // v4.0: <Button color="blue">Save</Button>  — silently renders wrong (no color prop)
      // Consumer discovers breakage in production after upgrading

      // BAD: Deprecation warning without migration guidance
      console.warn('color prop is deprecated');  // Deprecated to WHAT? No replacement mentioned.

      // BAD: Removing after only 1 version — consumers didn't have time to migrate
      // v3.3.0: Deprecated color
      // v3.4.0: Removed color  — only 2 weeks between versions
    text: "Component Deprecation Strategy -- Provide a predictable, gradual path for removing or replacing components, giving consumers time and guidance to migrate without surprise breakage."
    why: "Provide a predictable, gradual path for removing or replacing components, giving consumers time and guidance to migrate without surprise breakage."
    how_to_do_right: |
      1. Identify where component deprecation strategy applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
    severity: medium
    technologies:
      lang: [react, typescript, npm]
    domains:
      domain: [versioning, ui]
      concern: [pattern, best_practice]
    when_applies: "Removing a component or prop."

    related_principles: [P-UX-ERROR-RECOVERY, P-UX-CONTROL, P-UX-HELP]
    sources: ["https://react.dev/blog/2024/04/25/react-19-upgrade-guide"]

  - id: PAT-DS-MIGRATION-GUIDE
    name: "Breaking Change Migration Guide"
    category: versioning
    intent: "Provide step-by-step, copy-pasteable migration instructions for every breaking change, including automated codemods where possible, to minimize upgrade friction and prevent consumer abandonment."
    when_to_use: "Every major version release. Any breaking change, no matter how small. Renaming props, removing components, changing token names."
    when_not_to_use: "Non-breaking changes (minor and patch versions)."
    languages: [Markdown, JavaScript, jscodeshift]
    example_good: |
      # Migration Guide: v3 → v4

      ## Breaking Changes

      ### 1. Button: `color` prop → `variant` prop

      **Before (v3):**
      ```jsx
      <Button color="blue">Save</Button>
      <Button color="red">Delete</Button>
      ```

      **After (v4):**
      ```jsx
      <Button variant="primary">Save</Button>
      <Button variant="danger">Delete</Button>
      ```

      **Automated migration:**
      ```bash
      npx @mydesignsystem/codemods v3-to-v4
      ```

      This codemod automatically replaces:
      - `color="blue"` → `variant="primary"`
      - `color="red"` → `variant="danger"`
      - `color="gray"` → `variant="secondary"`

      ### 2. Design tokens renamed

      | v3 Token | v4 Token |
      |----------|----------|
      | `--primary-color` | `--color-primary` |
      | `--bg-color` | `--color-surface` |

      **Automated migration:**
      ```bash
      npx @mydesignsystem/codemods rename-tokens
      ```

      ## Verification
      After migration, run: `npx @mydesignsystem/lint check-deprecated`
    example_bad: |
      # v4 Release Notes

      ## Changes
      - Updated Button API
      - Renamed some tokens
      - Removed Card.Header

      <!-- No before/after examples. No codemod. No search-and-replace patterns.
           Consumer must read source code to figure out what changed.
           Most consumers stay on v3 forever. -->
    text: "Breaking Change Migration Guide -- Provide step-by-step, copy-pasteable migration instructions for every breaking change, including automated codemods where possible, to minimize upgrade friction and prevent consumer abandonment."
    why: "Provide step-by-step, copy-pasteable migration instructions for every breaking change, including automated codemods where possible, to minimize upgrade friction and prevent consumer abandonment."
    how_to_do_right: |
      1. Identify where breaking change migration guide applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
    severity: medium
    technologies:
      lang: [markdown, javascript, jscodeshift]
    domains:
      domain: [versioning, ui]
      concern: [pattern, best_practice]
    when_applies: "Every major version release."

    related_principles: [P-UX-HELP, P-UX-ERROR-RECOVERY, P-UX-CONTROL]
    sources: ["https://react.dev/blog/2024/04/25/react-19-upgrade-guide"]

  - id: PAT-DS-CHANGELOG
    name: "User-Facing Changelog"
    category: versioning
    intent: "Maintain a changelog that communicates changes in terms consumers care about (what changed, how it affects me, what I need to do), not developer-facing implementation details."
    when_to_use: "Every version release. Published packages. Design systems with external consumers."
    when_not_to_use: "Internal modules where git log is sufficient."
    languages: [Markdown, Keep a Changelog format]
    example_good: |
      # Changelog

      ## [4.0.0] - 2026-03-01

      ### Breaking Changes
      - **Button**: Removed `color` prop. Use `variant` instead.
        See [migration guide](./MIGRATION_v3_to_v4.md).
      - **Design tokens**: Renamed `--primary-color` to `--color-primary`.
        Run `npx @ds/codemods rename-tokens` to auto-migrate.

      ### Added
      - **DateRangePicker**: New component for selecting date ranges
      - **Toast**: Added `action` prop for undo/retry actions in notifications
      - **All components**: Added `data-testid` prop for easier testing

      ### Fixed
      - **Modal**: Focus trap now handles dynamically added inputs
      - **Select**: Dropdown no longer clips in overflow:hidden containers
      - **Tooltip**: Repositions correctly when near viewport edges

      ### Deprecated
      - **Tabs**: `activeIndex` prop deprecated in favor of `value` prop.
        Will be removed in v5.0.
    example_bad: |
      # Changelog

      ## v4.0.0
      - Refactored internal state management
      - Updated dependencies
      - Fixed bug
      - Changed some props
      - Removed unused code

      <!-- Consumer: "Refactored HOW? Which props changed? Which bug? What code removed?"
           This changelog answers zero questions a consumer would have. -->
    text: "User-Facing Changelog -- Maintain a changelog that communicates changes in terms consumers care about (what changed, how it affects me, what I need to do), not developer-facing implementation details."
    why: "Maintain a changelog that communicates changes in terms consumers care about (what changed, how it affects me, what I need to do), not developer-facing implementation details."
    how_to_do_right: |
      1. Identify where user-facing changelog applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
    severity: medium
    technologies:
      lang: [markdown, keep a changelog format]
    domains:
      domain: [versioning, ui]
      concern: [pattern, best_practice]
    when_applies: "Every version release."

    related_principles: [P-UX-VISIBILITY, P-UX-HELP]
    sources: ["https://keepachangelog.com/en/1.1.0/"]
