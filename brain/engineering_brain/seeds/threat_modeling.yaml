layer: rules
technology: General
domain: security
knowledge:
- id: TM-001
  text: Apply STRIDE threat modeling to every new system design — systematically identify Spoofing, Tampering, Repudiation, Information
    Disclosure, Denial of Service, and Elevation of Privilege threats at each component and data flow.
  why: STRIDE (developed at Microsoft) provides a structured, repeatable methodology to identify security threats that ad-hoc brainstorming
    misses. Without STRIDE, threat modeling becomes "what attacks can we think of?" — which depends entirely on the experience of
    whoever is in the room. STRIDE ensures six categories are always considered. Microsoft found that teams using STRIDE identified
    3x more threats than teams doing unstructured threat analysis. Each STRIDE category maps to a security property (Authentication,
    Integrity, Non-repudiation, Confidentiality, Availability, Authorization), making mitigations systematic rather than reactive.
  how_to_do_right: '1. Draw a data flow diagram (DFD) of the system with all components, data stores, data flows, and trust boundaries.

    2. For each element in the DFD, apply the STRIDE mnemonic: Spoofing (can an attacker pretend to be this component?), Tampering
    (can an attacker modify data in transit or at rest?), Repudiation (can a user deny performing an action?), Information Disclosure
    (can data leak to unauthorized parties?), Denial of Service (can availability be disrupted?), Elevation of Privilege (can a
    low-privilege user gain high-privilege access?).

    3. Document each identified threat with: description, affected component, STRIDE category, likelihood (low/medium/high), impact
    (low/medium/high), proposed mitigation.

    4. Prioritize threats by risk (likelihood x impact). Address high-risk threats before shipping.

    5. Review STRIDE analysis in design review — make it a required artifact alongside architecture documents.

    6. Update the STRIDE analysis when the system design changes.'
  severity: critical
  technologies:
    lang: [general]
  domains:
    domain: [security]
    concern: [threat_modeling, design]
  example_good: "# STRIDE analysis for a web API\n\n## Component: User Authentication Service\n\n| STRIDE | Threat | Mitigation\
    \ |\n|--------|--------|------------|\n| Spoofing | Attacker uses stolen credentials | MFA, rate limiting, account lockout |\n\
    | Tampering | JWT token modified to escalate role | RS256 signing (asymmetric), short expiry |\n| Repudiation | User denies\
    \ performing admin action | Immutable audit log with user ID + timestamp |\n| Info Disclosure | Password hashes leaked via\
    \ SQL injection | Parameterized queries, bcrypt with cost=12 |\n| DoS | Login endpoint flooded | Rate limit 10 req/min per\
    \ IP, CAPTCHA after 3 failures |\n| EoP | Regular user accesses admin endpoint | RBAC check at every endpoint, not just UI\
    \ |\n\n## Trust Boundary: API Gateway <-> Internal Services\n| STRIDE | Threat | Mitigation |\n|--------|--------|------------|\n\
    | Spoofing | Internal service impersonation | mTLS between all services |\n| Tampering | Request modified in transit | TLS\
    \ 1.3 for all internal traffic |\n"
  example_bad: "# \"Threat modeling\" without methodology\n# Meeting notes: \"We should add auth. Also maybe rate limiting.\n#\
    \ Bob mentioned something about SQL injection. Let's add that to the backlog.\"\n# No systematic analysis, no coverage guarantee,\
    \ no documentation\n# 4 of 6 STRIDE categories never considered\n# Trust boundaries not identified — internal services trusted\
    \ implicitly\n"
  when_applies: Every new system design, significant architecture changes, security-sensitive features
  sources:
    - url: https://learn.microsoft.com/en-us/azure/security/develop/threat-modeling-tool-threats
      title: Microsoft — STRIDE Threat Model
    - url: https://owasp.org/www-community/Threat_Modeling
      title: OWASP Threat Modeling

- id: TM-002
  text: Use DREAD scoring (Damage, Reproducibility, Exploitability, Affected Users, Discoverability) for internal threat prioritization
    — use CVSS for externally communicated vulnerability severity.
  why: DREAD and CVSS serve different purposes and audiences. DREAD is qualitative and fast (5 dimensions scored 1-10) — ideal
    for internal triage during threat modeling sessions where you need to rank 50+ threats in a meeting. CVSS is quantitative,
    standardized, and externally recognized — required for CVE publications, compliance reports, and customer communications. Using
    CVSS for internal triage is slow (too many fields, requires precision that does not exist at design time). Using DREAD for
    external communication lacks credibility (not an industry standard). Pick the right tool for the audience.
  how_to_do_right: '1. Internal threat modeling: use DREAD. Score each threat 1-10 on Damage (how bad if exploited?), Reproducibility
    (how easy to reproduce?), Exploitability (how easy to exploit?), Affected Users (how many impacted?), Discoverability (how
    easy to find?). Total = sum / 5.

    2. DREAD >= 8: Critical — fix before release. 6-8: High — fix in current sprint. 4-6: Medium — schedule for next sprint. <4:
    Low — backlog.

    3. External vulnerability disclosure: use CVSS v3.1 or v4.0. Calculate the base score using the CVSS calculator. Include temporal
    and environmental metrics when known.

    4. Document both scores: internal DREAD for triage speed, CVSS for the security advisory.

    5. Calibrate DREAD scores across teams: hold scoring sessions where multiple teams score the same threats to align scales.'
  severity: high
  technologies:
    lang: [general]
  domains:
    domain: [security]
    concern: [threat_modeling, risk_assessment]
  example_good: "# DREAD scoring for internal triage\n\n## Threat: SQL Injection in search endpoint\n| Dimension | Score | Justification\
    \ |\n|-----------|-------|---------------|\n| Damage | 9 | Full database read/write, PII exposure |\n| Reproducibility | 10\
    \ | 100% reproducible with crafted input |\n| Exploitability | 8 | Standard SQLi tools (sqlmap) work |\n| Affected Users |\
    \ 10 | All users — search is public |\n| Discoverability | 9 | Automated scanners find this |\n| **DREAD Score** | **9.2**\
    \ | **CRITICAL — fix before release** |\n\n## External Advisory (CVSS v3.1)\nCVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:N\n\
    Base Score: 9.1 (Critical)\n"
  example_bad: "# No scoring — everything is \"high priority\"\n# Threat list:\n# 1. SQL injection — HIGH\n# 2. Missing rate limiting\
    \ — HIGH\n# 3. Debug endpoint exposed — HIGH\n# 4. Weak password policy — HIGH\n# When everything is high, nothing is high.\
    \ No way to prioritize.\n# Team works on #4 (easy) while #1 (critical) waits.\n"
  when_applies: Internal threat triage, security advisory publication, vulnerability management
  sources:
    - url: https://learn.microsoft.com/en-us/previous-versions/msp-n-p/ff648644(v=pandp.10)
      title: Microsoft — The DREAD Threat Ranking Model
    - url: https://www.first.org/cvss/v3.1/specification-document
      title: CVSS v3.1 Specification
    - url: https://www.first.org/cvss/v4.0/specification-document
      title: CVSS v4.0 Specification

- id: TM-003
  text: Build attack trees (Bruce Schneier method) to systematically decompose high-value threats into concrete attack paths with
    cost/difficulty estimates — use these to prioritize defensive investments.
  why: Attack trees decompose a top-level goal ("steal customer credit cards") into sub-goals connected by AND/OR nodes, forming
    a complete map of how an attacker could achieve the goal. Without attack trees, defenders focus on the most obvious attack path
    while missing cheaper or easier alternatives. Bruce Schneier introduced attack trees because they force you to think like an
    attacker — considering all paths, not just the ones you defend against. By assigning cost/difficulty/detectability to leaf nodes,
    you can calculate which path is cheapest for an attacker and prioritize defending that path first.
  how_to_do_right: '1. Define the root goal (attacker objective): "Exfiltrate customer PII from database."

    2. Decompose into sub-goals using OR nodes (alternative paths) and AND nodes (required steps): OR(SQL injection, credential
    theft, insider threat). SQL injection = AND(find injectable endpoint, craft payload, exfiltrate data).

    3. Assign metrics to leaf nodes: cost ($), difficulty (low/medium/high), time (hours), detectability (low/medium/high).

    4. Calculate path cost: AND nodes sum costs, OR nodes take the minimum. The cheapest OR path is the most likely attack.

    5. Defend cheapest paths first — if SQL injection costs $100 and insider threat costs $50,000, prioritize SQLi defense.

    6. Review and update attack trees quarterly or when architecture changes.

    7. Use tools: ADTool, Graphviz, or even Mermaid diagrams for visualization.'
  severity: high
  technologies:
    lang: [general]
  domains:
    domain: [security]
    concern: [threat_modeling, risk_assessment]
  example_good: "# Attack tree: Steal customer PII\n# (Mermaid diagram syntax)\n#\n# graph TD\n#   ROOT[Steal Customer PII] -->\
    \ A[OR]\n#   A --> B[SQL Injection]\n#   A --> C[Credential Theft]\n#   A --> D[Insider Threat]\n#   B --> B1[AND: Find endpoint\
    \ + Craft payload + Exfiltrate]\n#   B1 -->|Cost: $100| B1a[Scan with sqlmap]\n#   B1 -->|Cost: $50| B1b[Craft UNION SELECT]\n\
    #   B1 -->|Cost: $0| B1c[Dump via DNS exfil]\n#   C --> C1[AND: Phish admin + Use stolen creds]\n#   C1 -->|Cost: $500| C1a[Spearphish\
    \ campaign]\n#   C1 -->|Cost: $0| C1b[Login + query DB]\n#\n# Path costs:\n# SQL Injection: $150 (cheapest — prioritize defense\
    \ here)\n# Credential Theft: $500\n# Insider Threat: $50,000+ (expensive — lower priority)\n\nattack_tree:\n  goal: \"Exfiltrate\
    \ customer PII\"\n  type: OR\n  children:\n    - path: \"SQL Injection\"\n      cost: 150\n      difficulty: low\n      detectability:\
    \ medium\n      mitigation: \"Parameterized queries + WAF + DB audit logging\"\n    - path: \"Credential Phishing\"\n      cost:\
    \ 500\n      difficulty: medium\n      detectability: medium\n      mitigation: \"MFA + phishing-resistant WebAuthn + anomaly\
    \ detection\"\n    - path: \"Insider Threat\"\n      cost: 50000\n      difficulty: high\n      detectability: low\n      mitigation:\
    \ \"Least privilege + DB access logging + DLP\"\n"
  example_bad: "# No structured threat decomposition\n# Security review: \"Let's add a WAF and call it done\"\n# Only considers\
    \ one attack path (web attacks)\n# Misses: credential theft (cheapest path), insider threat, supply chain\n# No cost analysis\
    \ — defends the expensive path, leaves cheap path open\n"
  when_applies: High-value assets, compliance requirements, architecture reviews
  sources:
    - url: https://www.schneier.com/academic/archives/1999/12/attack_trees.html
      title: Bruce Schneier — Attack Trees
    - url: https://capec.mitre.org/
      title: MITRE CAPEC — Common Attack Pattern Enumeration and Classification

- id: TM-004
  text: Create Data Flow Diagrams (DFDs) with explicit trust boundaries for every system under threat analysis — identify all points
    where data crosses a trust boundary as primary threat surfaces.
  why: DFDs are the foundation of threat modeling because threats concentrate at trust boundaries — the points where data moves
    between components with different trust levels. A request crossing from the internet (untrusted) to your API (semi-trusted)
    to your database (trusted) crosses two trust boundaries, each requiring different security controls. Without explicit trust
    boundaries on a DFD, teams apply security uniformly (waste resources on low-risk internal flows) or not at all (miss critical
    boundary crossings). Microsoft's SDL mandates DFDs with trust boundaries as the first step of threat modeling.
  how_to_do_right: '1. Draw DFD elements: external entities (users, third-party APIs), processes (your services), data stores
    (databases, caches, queues), and data flows (arrows with data type labels).

    2. Draw trust boundaries: dashed lines separating zones of different trust. Common boundaries: internet/DMZ, DMZ/internal
    network, application/database, user/admin, service-to-service.

    3. Label every data flow with the data type (PII, credentials, financial, public) and protocol (HTTPS, gRPC, SQL).

    4. For each trust boundary crossing, apply STRIDE analysis (see TM-001). This is where threats are most likely.

    5. Use standard DFD notation: circles for processes, parallel lines for data stores, rectangles for external entities, arrows
    for data flows, dashed lines for trust boundaries.

    6. Keep DFDs updated as architecture evolves — stale DFDs are worse than none (false sense of security).'
  severity: critical
  technologies:
    lang: [general]
  domains:
    domain: [security]
    concern: [threat_modeling, architecture]
  example_good: "# DFD with trust boundaries (text representation)\n#\n# ============ INTERNET (Untrusted) ============\n#   [Browser]\
    \ --HTTPS/JSON--> [API Gateway]\n# ------------ Trust Boundary 1 (DMZ) -----------\n#   [API Gateway] --gRPC/mTLS--> [Auth\
    \ Service]\n#   [API Gateway] --gRPC/mTLS--> [Order Service]\n# ------------ Trust Boundary 2 (App/Data) -------\n#   [Auth\
    \ Service] --SQL/TLS--> ((User DB))\n#   [Order Service] --SQL/TLS--> ((Order DB))\n#   [Order Service] --Redis Protocol-->\
    \ ((Cache))\n# ------------ Trust Boundary 3 (External) ------\n#   [Order Service] --HTTPS--> [Payment Provider]\n#\n# Threat\
    \ surface analysis:\n# TB1: Input validation, authentication, rate limiting, WAF\n# TB2: SQL injection prevention, connection\
    \ auth, encryption at rest\n# TB3: API key management, response validation, timeout handling\n\ntrust_boundaries:\n  - name:\
    \ \"TB1: Internet to DMZ\"\n    controls: [\"WAF\", \"TLS termination\", \"Rate limiting\", \"Input validation\"]\n  - name:\
    \ \"TB2: Application to Data\"\n    controls: [\"Parameterized queries\", \"Connection pooling with auth\", \"Encryption at\
    \ rest\"]\n  - name: \"TB3: Internal to External\"\n    controls: [\"API key rotation\", \"Response validation\", \"Circuit\
    \ breaker\"]\n"
  example_bad: "# Architecture diagram with no trust boundaries\n# \"Browser -> API -> Database\"\n# No data types labeled, no\
    \ protocols specified\n# No trust boundaries drawn — treats internet traffic same as internal\n# STRIDE analysis cannot be applied\
    \ without trust boundaries\n# Team adds authentication at the API but forgets database uses plaintext SQL\n"
  when_applies: Every system design, architecture review, security assessment
  sources:
    - url: https://learn.microsoft.com/en-us/azure/security/develop/threat-modeling-tool-getting-started
      title: Microsoft Threat Modeling Tool — Data Flow Diagrams
    - url: https://owasp.org/www-community/Threat_Modeling_Process
      title: OWASP Threat Modeling Process

- id: TM-005
  text: Apply LINDDUN privacy threat modeling for any system processing personal data — systematically identify Linkability, Identifiability,
    Non-repudiation, Detectability, Disclosure of information, Unawareness, and Non-compliance threats.
  why: STRIDE focuses on security threats but does not cover privacy threats. A system can be perfectly secure (no unauthorized access)
    while being a privacy disaster (unnecessary data collection, linkable pseudonyms, no user awareness). LINDDUN (developed at
    KU Leuven) provides a structured privacy threat taxonomy that maps to GDPR principles. With GDPR fines reaching 4% of global
    revenue and CCPA/CPRA enforcement increasing, privacy-by-design is not optional. LINDDUN identifies privacy issues at design
    time — fixing privacy after deployment often requires architectural changes (10-100x more expensive).
  how_to_do_right: '1. Create a DFD of the system (same as TM-004) with data types labeled (PII, quasi-identifiers, sensitive).

    2. For each element in the DFD, apply the LINDDUN categories: Linkability (can two data items be linked to the same person?),
    Identifiability (can a person be identified from the data?), Non-repudiation (is there unwanted proof of involvement?),
    Detectability (can the existence of data be detected?), Disclosure of information (privacy-specific leaks), Unawareness (are
    data subjects unaware of processing?), Non-compliance (does processing violate regulations?).

    3. Map each threat to GDPR articles or applicable privacy regulations.

    4. Define Privacy Enhancing Technologies (PETs) as mitigations: anonymization, pseudonymization, differential privacy,
    purpose limitation, data minimization.

    5. Document privacy impact assessment (PIA/DPIA) results alongside LINDDUN analysis.

    6. Review with privacy/legal team — technical and legal perspectives are both needed.'
  severity: high
  technologies:
    lang: [general]
  domains:
    domain: [security, privacy]
    concern: [threat_modeling, gdpr, privacy]
  example_good: "# LINDDUN analysis for user analytics system\n\n## Component: User Activity Tracker\n\n| LINDDUN | Threat |\
    \ Mitigation |\n|---------|--------|------------|\n| Linkability | Page views + search queries linkable to same user | k-anonymity\
    \ on analytics data, aggregate before store |\n| Identifiability | User ID in analytics DB directly identifies person | Pseudonymize:\
    \ hash(user_id + salt), rotate salt monthly |\n| Non-repudiation | Immutable logs prove user visited sensitive pages | Log retention\
    \ policy: delete after 90 days, no sensitive URLs |\n| Detectability | Analytics endpoint reveals which users are tracked |\
    \ Uniform response sizes, no user-specific endpoints |\n| Disclosure | Analytics dashboard leaks individual browsing patterns\
    \ | Differential privacy (epsilon=1.0) on all dashboard queries |\n| Unawareness | Users do not know what is tracked | Clear\
    \ privacy notice, granular consent controls |\n| Non-compliance | Tracking without consent violates GDPR Art. 6 | Consent management\
    \ platform, purpose limitation |\n"
  example_bad: "# No privacy analysis — only security considered\n# System collects: full name, email, IP, browsing history, location\n\
    # All stored in plaintext, linked by user ID, retained forever\n# \"It's secure — we have authentication and encryption!\"\n\
    # GDPR audit finds 12 violations, 6-month remediation project\n"
  when_applies: Any system processing personal data, GDPR/CCPA compliance, privacy-sensitive applications
  sources:
    - url: https://linddun.org/
      title: LINDDUN Privacy Threat Modeling Framework
    - url: https://linddun.org/linddun-go
      title: LINDDUN GO — Lightweight Privacy Threat Modeling

- id: TM-006
  text: Implement threat modeling as code using pytm, Threagile, or OWASP Threat Dragon — make threat models version-controlled,
    reviewable, and continuously validated in CI.
  why: Traditional threat models are created in PowerPoint or Visio, stored on a shared drive, and never updated after the initial
    design review. Within 6 months, the threat model is stale and useless. Threat modeling as code solves this by representing
    the model in a machine-readable format (Python, YAML, JSON) that lives in the code repository, is reviewed in PRs alongside
    the code it describes, and can be validated in CI. When the architecture changes, the threat model is updated in the same PR.
    pytm (Python Threat Modeling) generates DFDs, STRIDE analysis, and reports from Python code. Threagile uses YAML to define
    the model and generates risk reports.
  how_to_do_right: '1. Choose a tool: pytm (Python, generates DFDs + STRIDE), Threagile (YAML, generates risk reports + DFDs),
    or Threat Dragon (OWASP, visual + JSON).

    2. Define the model in code/YAML in your repository: describe components, data flows, trust boundaries, and data classifications.

    3. Generate reports in CI: DFD diagrams, STRIDE tables, risk rankings. Store as build artifacts.

    4. Validate in CI: fail the build if high-risk threats have no documented mitigation.

    5. Review threat model changes in PRs: when an architect adds a new service, the threat model update is in the same PR.

    6. Link threats to issues: each identified threat becomes a tracked issue with severity, owner, and deadline.'
  severity: high
  technologies:
    lang: [python, yaml]
    library: [pytm, threagile, threat-dragon]
  domains:
    domain: [security]
    concern: [threat_modeling, devsecops]
  example_good: "# pytm threat model — version controlled, CI validated\nfrom pytm import TM, Server, Datastore, Dataflow, Boundary,\
    \ Actor\n\ntm = TM(\"My Application\")\ntm.description = \"E-commerce platform threat model\"\n\n# Trust boundaries\ninternet\
    \ = Boundary(\"Internet\")\ncorporate = Boundary(\"Corporate Network\")\ndata_zone = Boundary(\"Data Zone\")\n\n# Components\n\
    user = Actor(\"Customer\", inBoundary=internet)\napi = Server(\"API Gateway\", inBoundary=corporate,\n             protocol=\"\
    HTTPS\", isHardened=True)\ndb = Datastore(\"Customer DB\", inBoundary=data_zone,\n              isEncryptedAtRest=True, storesPII=True)\n\
    \n# Data flows\nDataflow(user, api, \"Browse Products\", protocol=\"HTTPS\",\n         data=\"Product queries\", isEncrypted=True)\n\
    Dataflow(api, db, \"Query Customer Data\", protocol=\"TLS\",\n         data=\"PII\", isEncrypted=True)\n\n# Generate reports\n\
    tm.process()  # Outputs DFD + STRIDE analysis + risk report\n\n# CI: python threat_model.py --report\n"
  example_bad: "# Threat model in PowerPoint on shared drive\n# Created: 2023-03-15\n# Last updated: 2023-03-15 (never updated)\n\
    # Since then: 3 new microservices added, auth system replaced,\n# database migrated to cloud — none reflected in model\n# Nobody\
    \ knows where the file is\n# Cannot be reviewed in PRs, cannot be validated in CI\n"
  when_applies: All projects with formal threat modeling requirements, DevSecOps teams
  sources:
    - url: https://github.com/izar/pytm
      title: pytm — Pythonic Threat Modeling
    - url: https://threagile.io/
      title: Threagile — Agile Threat Modeling as Code
    - url: https://owasp.org/www-project-threat-dragon/
      title: OWASP Threat Dragon

- id: TM-007
  text: Map identified threats to MITRE ATT&CK techniques — use the framework to validate threat coverage, identify detection gaps,
    and communicate threats using industry-standard terminology.
  why: MITRE ATT&CK is the industry-standard knowledge base of adversary tactics, techniques, and procedures (TTPs) based on real-world
    observations. Mapping your threat model to ATT&CK provides three benefits. First, coverage validation — you can see which ATT&CK
    techniques your defenses cover and which have gaps. Second, detection engineering — each technique has documented detection
    strategies that you can implement. Third, common language — when communicating with SOC teams, incident responders, or auditors,
    ATT&CK technique IDs (T1566, T1078) are universally understood. Without ATT&CK mapping, your threat model exists in isolation
    from the broader security community.
  how_to_do_right: '1. After completing STRIDE analysis, map each threat to one or more ATT&CK techniques. Example: "credential
    theft via phishing" maps to T1566 (Phishing) and T1078 (Valid Accounts).

    2. Use the ATT&CK Navigator to visualize coverage: which techniques are mitigated, detected, or unaddressed.

    3. For each mapped technique, document: current detection capability (none, partial, full), data sources needed for detection,
    and detection engineering priority.

    4. Identify gaps: techniques with no detection or mitigation are your highest-priority security investments.

    5. Use ATT&CK for red team scoping: "test our defenses against T1566, T1078, T1055" is more precise than "do a pentest."

    6. Update ATT&CK mapping when new techniques are added to the framework (updated quarterly).'
  severity: high
  technologies:
    lang: [general]
  domains:
    domain: [security]
    concern: [threat_modeling, detection]
  example_good: "# ATT&CK mapping for e-commerce threat model\n\nthreat_to_attack_mapping:\n  - threat: \"Credential theft via\
    \ phishing\"\n    stride: Spoofing\n    attack_techniques:\n      - id: T1566.001\n        name: \"Spearphishing Attachment\"\
    \n        detection: partial  # Email gateway filters, no user training metrics\n        data_sources: [\"Email gateway logs\"\
    , \"Endpoint EDR\"]\n      - id: T1078\n        name: \"Valid Accounts\"\n        detection: partial  # MFA enforced, no impossible-travel\
    \ detection\n        data_sources: [\"Auth logs\", \"GeoIP\"]\n\n  - threat: \"SQL injection in search\"\n    stride: Tampering\n\
    \    attack_techniques:\n      - id: T1190\n        name: \"Exploit Public-Facing Application\"\n        detection: full  #\
    \ WAF + parameterized queries + SAST\n        data_sources: [\"WAF logs\", \"Application logs\"]\n\n# ATT&CK Navigator heatmap:\
    \ 23/40 relevant techniques covered\n# Gap: T1055 (Process Injection), T1053 (Scheduled Task) — no detection\n"
  example_bad: "# Threat model with no ATT&CK mapping\n# Threats identified: \"phishing\", \"SQL injection\", \"insider threat\"\
    \n# No standard taxonomy — SOC team cannot map to their detection rules\n# No coverage analysis — unknown gaps\n# Red team\
    \ report uses ATT&CK IDs but nobody can correlate to threat model\n"
  when_applies: Enterprise security, SOC integration, detection engineering, red team planning
  sources:
    - url: https://attack.mitre.org/
      title: MITRE ATT&CK Framework
    - url: https://mitre-attack.github.io/attack-navigator/
      title: ATT&CK Navigator

- id: TM-008
  text: Define abuse cases and misuse cases as negative requirements alongside functional requirements — document how each feature
    can be misused and what controls prevent it.
  why: Functional requirements describe what the system should do. Abuse cases describe what the system should NOT allow. Without
    abuse cases, developers implement features that work correctly for legitimate users but have no protection against malicious
    use. Example — a "password reset" feature without abuse cases might allow unlimited reset attempts (account lockout attack),
    send reset links to any email (account enumeration), or use predictable tokens (account takeover). Abuse cases discovered after
    deployment cost 10-100x more to fix because they often require architectural changes rather than simple patches.
  how_to_do_right: '1. For every functional requirement (user story), write at least one abuse case: "As an attacker, I can..."

    2. Abuse case template: Actor (malicious user, competitor, insider), Goal (steal data, disrupt service, gain access), Preconditions
    (what the attacker needs), Attack steps (how the abuse occurs), Impact (what damage results), Prevention (controls that block
    the abuse).

    3. Include abuse cases in sprint planning — they are part of the definition of done.

    4. Common abuse patterns to always check: rate limit bypass, parameter tampering, privilege escalation, business logic abuse
    (e.g., negative quantities in e-commerce), race conditions.

    5. Automate abuse case testing: write security tests that attempt each abuse case and verify it fails.

    6. Review abuse cases in code review — the reviewer should ask "how can this feature be misused?"'
  severity: high
  technologies:
    lang: [general]
  domains:
    domain: [security]
    concern: [threat_modeling, requirements]
  example_good: "# Feature: Password Reset\n\n## Functional Requirement\nAs a user, I can reset my password via email link.\n\n\
    ## Abuse Cases\n\n### AC-001: Account Enumeration\nActor: Unauthenticated attacker\nGoal: Determine which emails have accounts\n\
    Attack: Submit reset for random emails, observe different responses\nPrevention: Return identical response regardless of email\
    \ existence\nTest: assert reset_response('exists@co.com') == reset_response('fake@co.com')\n\n### AC-002: Reset Token Prediction\n\
    Actor: Unauthenticated attacker\nGoal: Guess valid reset tokens\nAttack: Generate tokens, try common patterns\nPrevention: 256-bit\
    \ cryptographically random tokens, single-use, 15-min expiry\nTest: assert len(token) >= 43  # base64 of 256 bits\n\n### AC-003:\
    \ Rate Limit Bypass\nActor: Unauthenticated attacker\nGoal: Flood user with reset emails (harassment)\nAttack: Loop reset endpoint\n\
    Prevention: 3 resets per email per hour, 10 per IP per hour\nTest: for i in range(5): reset('victim@co.com')  # 4th and 5th\
    \ should fail\n"
  example_bad: "# Feature: Password Reset\n# Acceptance criteria: User receives email with reset link. Link works.\n# No abuse\
    \ cases considered.\n# Result: Reset endpoint returns 'User not found' for invalid emails (enumeration)\n# Reset tokens are\
    \ sequential integers (predictable)\n# No rate limiting (flood victim with 10,000 reset emails)\n"
  when_applies: Every feature involving authentication, authorization, financial transactions, or user data
  sources:
    - url: https://owasp.org/www-community/Abuse_Case_Cheat_Sheet
      title: OWASP Abuse Case Cheat Sheet
    - url: https://cheatsheetseries.owasp.org/cheatsheets/Threat_Modeling_Cheat_Sheet.html
      title: OWASP Threat Modeling Cheat Sheet

- id: TM-009
  text: Apply the Cyber Kill Chain (Lockheed Martin) framework to analyze multi-stage attacks — identify detection and disruption
    opportunities at each phase from reconnaissance through actions on objectives.
  why: The Cyber Kill Chain decomposes advanced attacks into 7 sequential phases (Reconnaissance, Weaponization, Delivery, Exploitation,
    Installation, Command & Control, Actions on Objectives). Defenders who only focus on perimeter defense (blocking delivery) miss
    6 other phases where the attack can be detected or disrupted. The key insight is "defense in depth across phases" — if you
    detect at phase 3 (delivery) but miss, you still have phases 4-7 to catch the attacker. Organizations that map their defenses
    to all 7 phases detect breaches 60% faster (IBM Cost of a Data Breach Report). The kill chain also reveals which phases have
    zero detection — your biggest blind spots.
  how_to_do_right: '1. For each identified threat, map the full attack chain across all 7 phases:
    Recon (OSINT, scanning), Weaponization (exploit development, payload creation), Delivery (phishing, compromised website),
    Exploitation (vulnerability trigger), Installation (persistence mechanism), C2 (command channel), Actions (data exfiltration, lateral movement).

    2. For each phase, document: current detection capabilities, detection data sources, disruption mechanisms.

    3. Identify phases with zero detection — these are your blind spots. Prioritize adding detection there.

    4. Left of boom vs right of boom: phases 1-3 are before exploitation (preventive), phases 4-7 are after (detective/responsive).
    Aim for detection in at least 2 phases on each side.

    5. Use kill chain analysis for incident response: when an attack is detected at phase N, investigate whether earlier phases
    left artifacts.

    6. Combine with ATT&CK (TM-007) for technique-level detail within each phase.'
  severity: high
  technologies:
    lang: [general]
  domains:
    domain: [security]
    concern: [threat_modeling, detection, incident_response]
  example_good: "# Kill chain analysis: Targeted attack on customer database\n\nkill_chain:\n  1_reconnaissance:\n    attacker_actions:\
    \ \"OSINT on LinkedIn, GitHub repos, job postings for tech stack\"\n    detection: \"Monitor for scanning activity on public-facing\
    \ services\"\n    disruption: \"Minimize public info, honeypot endpoints\"\n    coverage: partial\n\n  2_weaponization:\n   \
    \ attacker_actions: \"Craft spearphishing email with malicious PDF\"\n    detection: \"Threat intel feeds for known payloads\"\
    \n    disruption: \"N/A — happens on attacker infrastructure\"\n    coverage: none  # BLIND SPOT\n\n  3_delivery:\n    attacker_actions:\
    \ \"Send phishing email to engineering team\"\n    detection: \"Email gateway, URL sandboxing, attachment scanning\"\n    disruption:\
    \ \"Block malicious emails, quarantine suspicious attachments\"\n    coverage: full\n\n  4_exploitation:\n    attacker_actions:\
    \ \"PDF exploit triggers code execution on workstation\"\n    detection: \"EDR behavioral analysis, exploit prevention\"\n \
    \   disruption: \"Application sandboxing, OS exploit mitigations (DEP, ASLR)\"\n    coverage: full\n\n  5_installation:\n  \
    \  attacker_actions: \"Drop persistence via scheduled task\"\n    detection: \"EDR, Sysmon Event ID 1 (process creation)\"\n\
    \    disruption: \"Application allowlisting, admin privilege restriction\"\n    coverage: partial\n\n  6_command_control:\n \
    \   attacker_actions: \"HTTPS beacon to C2 server\"\n    detection: \"DNS analytics, network flow analysis, TLS inspection\"\
    \n    disruption: \"Egress filtering, domain blocking\"\n    coverage: partial\n\n  7_actions_on_objectives:\n    attacker_actions:\
    \ \"Query customer DB, exfiltrate via DNS tunneling\"\n    detection: \"Database audit logs, DLP, DNS query anomalies\"\n  \
    \  disruption: \"Data segmentation, query rate limiting\"\n    coverage: partial\n\n# Summary: 1 blind spot (weaponization),\
    \ 2 partial, 4 covered\n"
  example_bad: "# Defense strategy: \"Put a firewall and call it done\"\n# Only addresses phase 3 (delivery) — 6 other phases unmonitored\n\
    # Attacker bypasses firewall via employee phishing — no detection at any other phase\n# Attacker operates undetected for 207\
    \ days (industry average for undetected breaches)\n"
  when_applies: Advanced threat analysis, SOC planning, incident response preparation, red team exercises
  sources:
    - url: https://www.lockheedmartin.com/en-us/capabilities/cyber/cyber-kill-chain.html
      title: Lockheed Martin Cyber Kill Chain
    - url: https://www.sans.org/white-papers/36297/
      title: SANS — Intelligence-Driven Computer Network Defense

- id: TM-010
  text: Use PASTA (Process for Attack Simulation and Threat Analysis) for risk-centric threat modeling that aligns business objectives
    with technical threats — its 7-stage process bridges the gap between business impact and attack simulation.
  why: STRIDE is component-centric (what can go wrong with each component?) while PASTA is risk-centric (what are the business
    impacts and which attacks realize them?). PASTA starts with business objectives and works down to attack simulation, ensuring
    that threat modeling efforts are proportional to business value. A threat to a marketing page (low business impact) gets less
    analysis than a threat to the payment system (high business impact). PASTA also includes attack simulation (stage 7), making
    it more actionable than STRIDE alone — you do not just identify threats, you validate them.
  how_to_do_right: '1. Stage 1 — Define Business Objectives: What are the critical business functions? What is the acceptable
    risk appetite? What compliance requirements apply?

    2. Stage 2 — Define Technical Scope: What is the application architecture? What technologies are used? What are the entry points?

    3. Stage 3 — Application Decomposition: Create DFDs with trust boundaries (see TM-004). Identify assets and their data classification.

    4. Stage 4 — Threat Analysis: Research applicable threats using ATT&CK, threat intelligence feeds, and industry reports.

    5. Stage 5 — Vulnerability Analysis: Map known vulnerabilities (CVEs) and weaknesses (CWEs) to the architecture.

    6. Stage 6 — Attack Modeling: Build attack trees (see TM-003) for the highest-risk threats. Estimate likelihood and impact.

    7. Stage 7 — Risk & Impact Analysis: Calculate residual risk after existing controls. Prioritize mitigations by business
    impact reduction per dollar spent.'
  severity: high
  technologies:
    lang: [general]
  domains:
    domain: [security]
    concern: [threat_modeling, risk_management]
  example_good: "# PASTA threat model for payment processing system\n\npasta_analysis:\n  stage_1_business_objectives:\n    critical_functions:\n\
    \      - \"Process $50M/month in transactions\"\n      - \"PCI-DSS Level 1 compliance\"\n    risk_appetite: \"Zero tolerance\
    \ for payment data breach\"\n    compliance: [\"PCI-DSS 4.0\", \"SOC 2 Type II\"]\n\n  stage_2_technical_scope:\n    components:\
    \ [\"Payment API\", \"Tokenization Service\", \"HSM\", \"Payment Gateway\"]\n    entry_points: [\"REST API\", \"Webhook receiver\"\
    , \"Admin dashboard\"]\n\n  stage_3_decomposition:\n    dfd: \"payment-dfd.png\"  # Generated from pytm\n    assets:\n     \
    \ - name: \"Card numbers\"\n        classification: \"PCI Restricted\"\n      - name: \"Transaction logs\"\n        classification:\
    \ \"PCI Sensitive\"\n\n  stage_4_threats:\n    - \"Card data interception (ATT&CK T1557)\"\n    - \"Payment API abuse (OWASP\
    \ API8:2023)\"\n    - \"Tokenization bypass\"\n\n  stage_5_vulnerabilities:\n    - cve: \"CVE-2024-XXXX in payment library\"\
    \n      status: \"patched\"\n    - cwe: \"CWE-311 Missing encryption\"\n      status: \"mitigated by HSM\"\n\n  stage_6_attack_modeling:\n\
    \    attack_trees: \"payment-attack-trees.md\"  # See TM-003\n    simulated: true\n    findings: 3\n\n  stage_7_risk_analysis:\n\
    \    residual_risk: \"Low — all critical paths mitigated\"\n    remaining_actions:\n      - \"Add tokenization for webhook payloads\"\
    \n      - \"Implement anomaly detection on transaction patterns\"\n"
  example_bad: "# Threat modeling without business context\n# Security team identifies 200 threats\n# No way to prioritize — marketing\
    \ page XSS treated same as payment system SQLi\n# Business stakeholders cannot understand the report\n# No attack simulation\
    \ — threats are theoretical, never validated\n"
  when_applies: Business-critical systems, compliance-driven environments, executive risk reporting
  sources:
    - url: https://owasp.org/www-project-threat-model/
      title: OWASP Threat Model Project
    - url: https://versprite.com/tag/pasta-threat-modeling/
      title: VerSprite — PASTA Threat Modeling

- id: TM-011
  text: Perform API-specific threat modeling using the OWASP API Security Top 10 (2023) as a structured checklist — APIs have distinct
    threat patterns from web applications.
  why: 'APIs are now the primary attack surface for modern applications — 83% of web traffic is API traffic (Akamai, 2023). The OWASP
    API Security Top 10 identifies threats specific to APIs that the traditional OWASP Web Top 10 does not cover. Broken Object
    Level Authorization (BOLA/IDOR) is the #1 API threat — attackers change object IDs in API calls to access other users'' data.
    This attack is trivial (change user_id=123 to user_id=124) but devastating, and it does not exist in the web application top
    10. API threat modeling must address: authorization at the object level, mass assignment, resource consumption, server-side
    request forgery, and unsafe API composition.'
  how_to_do_right: '1. For each API endpoint, check against the OWASP API Security Top 10 2023: API1 (Broken Object Level Authorization),
    API2 (Broken Authentication), API3 (Broken Object Property Level Authorization), API4 (Unrestricted Resource Consumption),
    API5 (Broken Function Level Authorization), API6 (Unrestricted Access to Sensitive Business Flows), API7 (Server Side Request
    Forgery), API8 (Security Misconfiguration), API9 (Improper Inventory Management), API10 (Unsafe Consumption of APIs).

    2. BOLA check (API1): for every endpoint that takes an object ID, verify that the current user has authorization to access THAT
    specific object — not just the endpoint.

    3. Mass assignment check (API3): verify that API only accepts expected fields. Sending {"role": "admin"} in a profile update
    should not escalate privileges.

    4. Rate limiting check (API4): every endpoint has a rate limit. Resource-intensive endpoints (search, export, report generation)
    have stricter limits.

    5. Inventory check (API9): maintain a complete API inventory. Shadow APIs (undocumented, forgotten) are the most vulnerable.

    6. Automate: use OWASP ZAP API scan or Burp Suite to test each endpoint against the top 10.'
  severity: critical
  technologies:
    lang: [general]
    framework: [rest, graphql, grpc]
  domains:
    domain: [security]
    concern: [threat_modeling, api_security]
  example_good: "# API threat model checklist per endpoint\n\nendpoint: \"GET /api/v1/orders/{order_id}\"\n\nowasp_api_top10:\n\
    \  API1_BOLA:\n    status: mitigated\n    control: \"Authorization middleware checks order.user_id == request.user_id\"\n   \
    \ test: \"test_cannot_access_other_users_order()\"\n  API2_Auth:\n    status: mitigated\n    control: \"JWT validation + refresh\
    \ token rotation\"\n  API3_Property:\n    status: mitigated\n    control: \"Response serializer excludes internal_notes, cost_price\"\
    \n  API4_Resource:\n    status: mitigated\n    control: \"Rate limit: 100 req/min per user. Max page_size=50.\"\n  API5_Function:\n\
    \    status: mitigated\n    control: \"RBAC: only admin role can access /api/v1/admin/* endpoints\"\n  API6_Business_Flow:\n\
    \    status: mitigated\n    control: \"Order creation requires valid cart + payment — cannot bypass checkout flow\"\n  API7_SSRF:\n\
    \    status: not_applicable\n    reason: \"Endpoint does not make outbound requests\"\n  API8_Misconfig:\n    status: mitigated\n\
    \    control: \"CORS restricted, debug=False, no stack traces in errors\"\n  API9_Inventory:\n    status: mitigated\n    control:\
    \ \"OpenAPI spec auto-generated, no undocumented endpoints\"\n  API10_Unsafe_Consumption:\n    status: mitigated\n    control:\
    \ \"Payment gateway responses validated with JSON Schema\"\n"
  example_bad: "# API with no threat model\n# GET /api/v1/orders/123 — returns any order by ID\n# No authorization check — any\
    \ authenticated user can view any order (BOLA)\n# POST /api/v1/users — accepts {\"role\": \"admin\"} in body (mass assignment)\n\
    # No rate limiting — attacker enumerates all 500K orders in minutes\n# /api/v1/internal/debug — forgotten endpoint, no auth,\
    \ dumps stack traces\n"
  when_applies: Every REST API, GraphQL API, gRPC service exposed to untrusted clients
  sources:
    - url: https://owasp.org/API-Security/editions/2023/en/0x11-t10/
      title: OWASP API Security Top 10 — 2023
    - url: https://cheatsheetseries.owasp.org/cheatsheets/REST_Security_Cheat_Sheet.html
      title: OWASP REST Security Cheat Sheet

- id: TM-012
  text: Apply microservices-specific threat modeling — address service mesh security, east-west traffic encryption, sidecar injection,
    and distributed authorization across service boundaries.
  why: Microservices architectures have unique threat patterns that monolithic threat models miss. In a monolith, internal function
    calls are trusted. In microservices, every service-to-service call crosses a network — making east-west traffic (internal) as
    dangerous as north-south traffic (external). The 2020 SolarWinds attack and the 2022 Uber breach both exploited lateral movement
    within internal networks. Without service mesh security, an attacker who compromises one service can call any other service
    because there is no authentication on internal traffic. Service mesh (Istio, Linkerd) provides mTLS, authorization policies,
    and observability for east-west traffic — but must be explicitly configured.
  how_to_do_right: '1. Zero trust for east-west traffic: every service-to-service call requires mutual TLS (mTLS). No service
    trusts another based on network location alone.

    2. Service identity: each service has a cryptographic identity (SPIFFE/SPIRE). Authorization decisions are based on service
    identity, not IP address.

    3. Authorization policies: define which services can call which other services. Order Service can call Payment Service but not
    User Admin Service. Use Istio AuthorizationPolicy or OPA Gatekeeper.

    4. Sidecar security: verify sidecar injection is enforced — a pod without a sidecar bypasses all mesh security. Use admission
    webhooks to block pods without sidecars.

    5. Secrets management: use mesh-native secret distribution (Istio SDS, Vault CSI). No hardcoded credentials between services.

    6. Distributed tracing for security: Jaeger/Zipkin traces reveal anomalous call patterns (service A suddenly calling service
    C directly instead of through B).

    7. Threat model each service boundary as a trust boundary (see TM-004).'
  severity: critical
  technologies:
    platform: [kubernetes, istio, linkerd, envoy]
    library: [spiffe, spire, opa]
  domains:
    domain: [security]
    concern: [threat_modeling, microservices, service_mesh]
  example_good: "# Istio authorization policy — service-to-service access control\napiVersion: security.istio.io/v1\nkind: AuthorizationPolicy\n\
    metadata:\n  name: payment-service-policy\n  namespace: production\nspec:\n  selector:\n    matchLabels:\n      app: payment-service\n\
    \  rules:\n    - from:\n        - source:\n            principals:\n              - \"cluster.local/ns/production/sa/order-service\"\
    \  # Only order-service\n              - \"cluster.local/ns/production/sa/refund-service\" # and refund-service\n      to:\n\
    \        - operation:\n            methods: [\"POST\"]\n            paths: [\"/api/v1/charge\", \"/api/v1/refund\"]\n    # Deny\
    \ all other services — zero trust\n\n# PeerAuthentication — enforce mTLS everywhere\napiVersion: security.istio.io/v1\nkind:\
    \ PeerAuthentication\nmetadata:\n  name: default\n  namespace: production\nspec:\n  mtls:\n    mode: STRICT  # Reject any non-mTLS\
    \ connection\n"
  example_bad: "# Microservices with no mesh security\n# Services communicate over HTTP (no TLS) on internal network\n# Any service\
    \ can call any other service — no authorization\n# Compromised logging service can query payment service directly\n# No service\
    \ identity — services trust based on IP address\n# Attacker moves laterally from low-value to high-value services undetected\n"
  when_applies: Microservices architectures, Kubernetes deployments, any multi-service system
  sources:
    - url: https://istio.io/latest/docs/concepts/security/
      title: Istio Security Architecture
    - url: https://spiffe.io/docs/latest/spiffe-about/overview/
      title: SPIFFE — Secure Production Identity Framework for Everyone

- id: TM-013
  text: Perform cloud-native threat modeling using CNAPP patterns — address identity federation, misconfigured storage, overprivileged
    IAM roles, and cloud-specific attack surfaces (metadata services, serverless cold starts, shared tenancy).
  why: Cloud environments have attack surfaces that do not exist on-premises. The Capital One breach (2019, 100M records) exploited
    an SSRF vulnerability to reach the AWS metadata service (169.254.169.254) and steal IAM role credentials. This attack vector
    does not exist in traditional data centers. Cloud-native threats include misconfigured S3 buckets (public by default until 2023),
    overprivileged Lambda execution roles, cross-account IAM trust, and container escape to host. Traditional threat modeling
    (STRIDE on a network diagram) misses these because they are infrastructure configuration issues, not application code issues.
    CNAPP (Cloud-Native Application Protection Platform) patterns address cloud-specific threats systematically.
  how_to_do_right: '1. Identity threats: model IAM as a trust boundary. Map all IAM roles, their permissions, and trust relationships.
    Flag roles with iam:*, s3:*, or AdministratorAccess as critical threats.

    2. Storage threats: inventory all storage (S3, GCS, Azure Blob). Verify public access is blocked by default. Check for
    bucket policies that grant cross-account or public access.

    3. Network threats: model VPC, security groups, and NACLs. Verify metadata service v2 (IMDSv2) is enforced (blocks SSRF credential
    theft). Check for overly permissive security groups (0.0.0.0/0 ingress).

    4. Serverless threats: Lambda/Cloud Functions have unique risks — cold start injection, event injection, overprivileged
    execution roles. Apply least privilege to every function.

    5. Container threats: model container escape paths, Kubernetes RBAC, pod security standards. Verify no privileged containers
    or host network access.

    6. Use CSPM tools (Prowler, ScoutSuite, Checkov) to continuously validate cloud configuration against threat model.'
  severity: critical
  technologies:
    platform: [aws, gcp, azure, kubernetes]
    library: [prowler, scoutsuite, checkov, cspm]
  domains:
    domain: [security]
    concern: [threat_modeling, cloud_security]
  example_good: "# Cloud-native threat model for AWS deployment\n\ncloud_threats:\n  identity:\n    - threat: \"Overprivileged Lambda\
    \ execution role\"\n      finding: \"lambda-processor-role has s3:* on all buckets\"\n      mitigation: \"Restrict to s3:GetObject\
    \ on specific bucket ARN\"\n      check: \"prowler aws --checks iam_policy_no_star\"\n\n  storage:\n    - threat: \"S3 bucket\
    \ public access\"\n      finding: \"data-exports bucket has BlockPublicAccess=false\"\n      mitigation: \"Enable S3 Block Public\
    \ Access at account level\"\n      check: \"aws s3api get-public-access-block --bucket data-exports\"\n\n  network:\n    - threat:\
    \ \"IMDSv1 enabled — SSRF can steal IAM credentials\"\n      finding: \"EC2 instances allow IMDSv1 (hop limit=1)\"\n      mitigation:\
    \ \"Enforce IMDSv2: HttpTokens=required, HttpPutResponseHopLimit=1\"\n      check: \"aws ec2 describe-instances --query 'Reservations[].Instances[].MetadataOptions'\"\
    \n\n  serverless:\n    - threat: \"Event injection in Lambda via S3 trigger\"\n      finding: \"Lambda parses S3 key as filename\
    \ without sanitization\"\n      mitigation: \"Validate and sanitize event.Records[0].s3.object.key\"\n\n  container:\n    -\
    \ threat: \"Container escape via privileged pod\"\n      finding: \"monitoring-agent runs as privileged: true\"\n      mitigation:\
    \ \"Remove privileged flag, use specific capabilities instead\"\n      check: \"kubectl get pods -o json | jq '.items[].spec.containers[].securityContext'\"\
    \n"
  example_bad: "# Traditional threat model applied to cloud\n# Models: \"Firewall -> Load Balancer -> App Server -> Database\"\n\
    # Misses: IAM roles, metadata service, S3 permissions, Lambda roles\n# No cloud-specific threats identified\n# Capital One-style\
    \ SSRF attack not in the threat model\n# S3 bucket with customer data is publicly readable — not in the threat model\n"
  when_applies: Any cloud-deployed application, AWS/GCP/Azure environments
  sources:
    - url: https://github.com/prowler-cloud/prowler
      title: Prowler — AWS/Azure/GCP Security Assessment Tool
    - url: https://docs.aws.amazon.com/whitepapers/latest/aws-risk-and-compliance/threat-modeling.html
      title: AWS Threat Modeling Whitepaper
    - url: https://www.microsoft.com/en-us/security/business/cloud-security/microsoft-defender-cloud
      title: Microsoft Defender for Cloud (CNAPP)

- id: TM-014
  text: Integrate threat modeling into Agile and DevSecOps workflows — perform incremental threat modeling per sprint rather than
    monolithic models per release.
  why: Traditional threat modeling produces a 100-page document once per release, which is stale by the time development starts.
    In Agile teams shipping every 2 weeks, monolithic threat models are impractical. Incremental threat modeling analyzes only
    what changed in each sprint — new endpoints, modified data flows, added dependencies. This takes 30-60 minutes per sprint
    instead of 2-3 days per release. The key insight is that most sprints change only 5-10% of the threat surface, so re-analyzing
    the entire system every sprint is wasteful. Microsoft's SDL for Agile demonstrates that incremental threat modeling achieves
    equivalent security coverage at 80% less effort.
  how_to_do_right: '1. Sprint planning: identify which components are being modified this sprint. Only threat-model those components.

    2. Lightweight threat model format: for each changed component, answer 4 questions: What changed? What new threats does this
    introduce? What existing mitigations cover it? What new mitigations are needed?

    3. Time-box to 30-60 minutes per sprint — if it takes longer, scope the analysis to the highest-risk changes.

    4. Threat model checklist in PR template: every PR that changes API endpoints, authentication, authorization, or data storage
    must include a threat assessment.

    5. Quarterly deep dive: every 3 months, perform a full threat model review to catch cumulative drift that incremental reviews miss.

    6. Track threat modeling coverage: percentage of sprints with threat assessment, percentage of new endpoints threat-modeled,
    time from threat identification to mitigation.'
  severity: high
  technologies:
    lang: [general]
    platform: [github, gitlab, jira]
  domains:
    domain: [security]
    concern: [threat_modeling, devsecops, agile]
  example_good: "# Sprint threat assessment template (in PR description)\n\n## Threat Assessment — Sprint 24\n\n### Changes This\
    \ Sprint\n- Added: POST /api/v1/exports endpoint (generates CSV of user data)\n- Modified: User authentication to support SSO\n\
    \n### New Threats Identified\n1. **Data exfiltration via export** (STRIDE: Information Disclosure)\n   - Risk: Authenticated\
    \ user exports all customer data\n   - Mitigation: Rate limit exports to 1/hour, limit to own data, audit log every export\n\
    \   - DREAD: 7.2 (High) — implement before merge\n\n2. **SSO token replay** (STRIDE: Spoofing)\n   - Risk: Stolen SSO assertion\
    \ reused\n   - Mitigation: Assertion audience validation + 5-minute replay window + nonce\n   - DREAD: 5.8 (Medium) — implement\
    \ before merge\n\n### Existing Mitigations That Cover Changes\n- RBAC: Export endpoint uses existing authorization middleware\n\
    - Audit: All API calls already logged via middleware\n\n### Sprint Threat Debt\n- None — both threats mitigated in this sprint\n"
  example_bad: "# No threat modeling in Agile workflow\n# Sprint 1-23: no security review on any PR\n# Sprint 24: Security audit\
    \ finds 47 vulnerabilities accumulated over 12 months\n# 3 are critical — require architectural changes (auth bypass, BOLA,\
    \ SSRF)\n# 6-week emergency remediation blocks all feature work\n# Could have been caught incrementally at 30 min/sprint =\
    \ 12 hours total\n# Instead: 6 weeks of emergency work + reputation damage\n"
  when_applies: Agile teams, DevSecOps pipelines, continuous delivery environments
  sources:
    - url: https://www.microsoft.com/en-us/securityengineering/sdl/threatmodeling
      title: Microsoft SDL Threat Modeling
    - url: https://owasp.org/www-project-integration-standards/writeups/owasp_in_sdlc/
      title: OWASP in SDLC — Integrating Security into Agile

- id: TM-015
  text: Use FAIR (Factor Analysis of Information Risk) to quantify risk in monetary terms — translate threat modeling findings into
    business-language risk statements that executives can act on.
  why: Technical threat models produce outputs like "SQL injection in search endpoint, DREAD 9.2." Executives cannot act on this
    — they need to know "How much could this cost us?" and "How much should we spend to fix it?" FAIR is the only international
    standard (OpenFAIR, published by The Open Group) for quantitative information risk analysis. It translates threats into probability
    distributions of financial loss, enabling risk-based decision making. Without FAIR, security budgets are based on fear ("we
    might get hacked") rather than data ("there is a 15% annual probability of a data breach costing $2-8M, and a $200K investment
    reduces probability to 3%"). This makes security a business investment with measurable ROI, not a cost center.
  how_to_do_right: '1. Define the loss event: "Customer PII breach via SQL injection in the search endpoint."

    2. Estimate Loss Event Frequency (LEF): how often could this happen per year? Use threat intelligence and historical data.
    Decompose into Threat Event Frequency (how often attackers try) and Vulnerability (probability of success per attempt).

    3. Estimate Loss Magnitude (LM): if the event occurs, what is the financial impact? Include: response costs (forensics, notification),
    fines (GDPR: up to 4% revenue), lost business (customer churn), reputation damage. Use ranges, not point estimates: "between
    $500K and $5M, most likely $2M."

    4. Calculate Annual Loss Expectancy (ALE): LEF x LM. A 10% annual probability of a $2M loss = $200K ALE.

    5. Evaluate control effectiveness: "Implementing parameterized queries + WAF reduces vulnerability from 30% to 2%, reducing
    ALE from $200K to $13K. Control cost: $50K. Net risk reduction: $137K/year."

    6. Use Monte Carlo simulation (1,000-10,000 runs) for more accurate estimates with confidence intervals.'
  severity: high
  technologies:
    lang: [general]
  domains:
    domain: [security]
    concern: [threat_modeling, risk_management, executive_reporting]
  example_good: "# FAIR analysis for SQL injection risk\n\nfair_analysis:\n  loss_event: \"Customer PII breach via SQL injection\"\
    \n\n  loss_event_frequency:\n    threat_event_frequency: 50  # attempts per year (from WAF logs)\n    vulnerability: 0.05  #\
    \ 5% success rate per attempt (current defenses)\n    annual_frequency: 2.5  # Expected 2.5 successful attacks per year\n\n\
    \  loss_magnitude:\n    response_costs:\n      min: 100000\n      most_likely: 250000\n      max: 500000\n    regulatory_fines:\n\
    \      min: 0\n      most_likely: 500000\n      max: 2000000  # GDPR worst case\n    lost_business:\n      min: 200000\n    \
    \  most_likely: 1000000\n      max: 3000000\n    total_range: \"$300K - $5.5M, most likely $1.75M\"\n\n  annual_loss_expectancy:\n\
    \    current: 4375000  # 2.5 * $1.75M\n    after_mitigation: 87500  # 0.05 * $1.75M (parameterized queries reduce vuln to 1%)\n\
    \    mitigation_cost: 50000\n    net_benefit: 4237500  # $4.375M - $87.5K - $50K\n    roi: \"8475%\"  # ($4.2M benefit / $50K\
    \ investment)\n\n  recommendation: \"Invest $50K in parameterized query migration. Expected annual risk reduction: $4.2M.\"\n"
  example_bad: "# Risk communication without quantification\n# Security team: \"We have a critical SQL injection vulnerability.\"\
    \n# Executive: \"How much will it cost to fix vs not fix?\"\n# Security team: \"It's critical. We need to fix it.\"\n# Executive:\
    \ \"I have 5 critical findings. Which one first? What's the budget?\"\n# No data-driven answer — decision based on whoever argues\
    \ loudest\n"
  when_applies: Executive risk reporting, security budget justification, insurance quantification, compliance
