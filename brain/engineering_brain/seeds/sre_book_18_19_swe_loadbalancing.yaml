- id: CR-SRE-SWE-001
  text: SRE teams should spend 50-60% of their time on software engineering — building tools, automation, and frameworks that
    eliminate toil. If your SRE team spends most of its time on manual operations, you have an ops team with an SRE title.
  why: 'The SRE Book dedicates Chapter 18 to establishing that SRE is a software engineering discipline, not an operations
    role. Google''s SRE teams write code: they build the monitoring systems, deployment pipelines, capacity planning tools,
    and automation that makes large-scale operations feasible. Without this engineering investment, operational work grows
    linearly with system size — and eventually requires an unsustainable number of humans. Google''s rule is explicit: SRE
    teams must spend at least 50% of their time on engineering projects. If operational load exceeds 50%, the team pushes
    back to development teams to improve service reliability, or Google implements the "give back the pager" mechanism. This
    creates a structural incentive: services must be reliable enough that SREs have time to engineer, or they lose SRE support.

    '
  how_to_do_right: '1. Track the engineering/operations time split per SRE. If ops > 50%, this is a red flag requiring immediate
    action.

    2. Treat SRE engineering projects with the same rigor as product engineering: design docs, code review, testing, deployment.

    3. SRE engineering priorities: monitoring/alerting tools, deployment automation, capacity planning, disaster recovery
    tooling.

    4. Evaluate SRE tools by impact: if a tool saves 2 hours/week of toil across 10 engineers, that''s 1,000 hours/year.

    5. SRE code quality matters — SRE tools are production infrastructure. Apply the same standards as product code.

    6. Share SRE tools across teams. If two SRE teams build similar monitoring, that''s duplicated effort.

    '
  example_good: "# SRE team tracks engineering vs ops time split\nclass SRETeamMetrics:\n    ENGINEERING_TARGET = 0.50  # 50% minimum\n\n    def track_weekly(self, team: list[SRE]):\n        for sre in team:\n            eng_hours = sre.hours_on_engineering_projects()\n            ops_hours = sre.hours_on_operations()\n            ratio = eng_hours / (eng_hours + ops_hours)\n            metrics.observe(\"sre_engineering_ratio\", ratio, tags={\"sre\": sre.name})\n            if ratio < self.ENGINEERING_TARGET:\n                log.warning(\n                    f\"{sre.name}: engineering ratio {ratio:.0%} < target {self.ENGINEERING_TARGET:.0%}. \"\n                    f\"Operations overload — push back to dev team or automate.\"\n                )\n\n    def evaluate_tool_impact(self, tool: SRETool) -> float:\n        \"\"\"Hours saved per week across all users.\"\"\"\n        return tool.time_saved_per_use_hours * tool.uses_per_week * tool.num_users\n"
  example_bad: "# SRE team is 100% operations, zero engineering\nclass SRETeam:\n    def daily_work(self):\n        self.triage_alerts()     # 2 hours\n        self.manual_deploys()    # 3 hours\n        self.manual_rollbacks()  # 1 hour\n        self.manual_scaling()    # 1 hour\n        self.firefighting()      # remaining time\n        # No time for automation, tooling, or improvements\n        # Operational load grows linearly with system size\n        # Team is an ops team with an SRE title\n"
  when_applies: When managing SRE teams that should spend at least 50% of their time on software engineering projects to reduce toil through automation and tooling.
  severity: high
  technologies:
    lang: [general, go, python]
  domains:
    domain: [architecture, quality, reliability]
    concern: [code]
  sources:
  - url: https://sre.google/sre-book/software-engineering-in-sre/
    title: 'Google SRE Book — Chapter 18: Software Engineering in SRE'
  validation_status: cross_checked
- id: CR-SRE-SWE-002
  text: SRE-built software must be treated as a real product — with design docs, code reviews, test suites, and proper deprecation.
    The worst SRE tools are one-off scripts that become critical infrastructure without any of these safeguards.
  why: 'Google observed that SRE teams frequently create tools that start as "quick scripts" and evolve into critical infrastructure
    depended on by hundreds of engineers. These tools often lack tests, documentation, and design reviews because they were
    never intended to be products. But once other teams depend on them, they ARE products — with all the maintenance, reliability,
    and backward-compatibility obligations that implies. Google''s solution: apply software engineering practices to SRE tools
    from the start. Design docs that explain the architecture, code reviews that catch bugs and enforce standards, test suites
    that prevent regressions, and proper deprecation processes when tools are replaced. The alternative — a collection of
    undocumented scripts maintained by one person — is a single point of failure for the organization.

    '
  how_to_do_right: '1. Every SRE tool that will be used by more than one person needs a design doc before implementation.

    2. Code review is mandatory. The "I''ll clean it up later" script never gets cleaned up.

    3. Write tests from the start. SRE tools often manipulate production systems — bugs in SRE tools cause outages.

    4. Document the tool: what it does, how to use it, what to do when it breaks. If the author leaves, someone else must
    maintain it.

    5. Plan for deprecation: if the tool is replaced, how do users migrate? What''s the timeline?

    6. Designate a team owner for each tool. Orphaned tools become liabilities.

    '
  example_good: "# SRE tool with proper engineering practices\nclass DeploymentAutomation:\n    \"\"\"SRE-built tool treated as production software.\n\n    - Design doc: docs/deploy-automation-design.md\n    - Code reviewed by 2+ engineers\n    - Test suite: 95% coverage\n    - Deprecation plan: migrate to v2 by Q3\n    \"\"\"\n    VERSION = \"1.3.0\"\n    OWNER = \"sre-platform-team\"\n\n    def deploy(self, service: str, version: str) -> DeployResult:\n        \"\"\"Deploy with canary, monitoring, and rollback.\"\"\"\n        # Production-quality code with proper error handling\n        try:\n            self._validate_inputs(service, version)\n            self._canary_deploy(service, version)\n            self._monitor_and_promote(service, version)\n            return DeployResult(status=\"success\")\n        except DeployError as e:\n            self._auto_rollback(service)\n            return DeployResult(status=\"rolled_back\", error=str(e))\n"
  example_bad: "# \"Quick script\" becomes critical infrastructure\n#!/usr/bin/env python\n# deploy.py - just a quick script, will clean up later\n# (written 2 years ago, never cleaned up)\nimport subprocess\nimport sys\n\ndef deploy(svc, ver):\n    subprocess.run(f\"kubectl set image {svc}={ver}\", shell=True)  # No error handling\n    # No tests, no docs, no code review\n    # No rollback, no canary, no monitoring\n    # Author left the company, no one understands it\n    # 200 engineers depend on this daily\n"
  when_applies: When SRE teams build internal tools, automation scripts, or frameworks that are used by other teams and risk becoming undocumented critical infrastructure.
  severity: high
  technologies:
    lang: [general, go, python]
  domains:
    domain: [architecture, quality, reliability]
    concern: [code]
  sources:
  - url: https://sre.google/sre-book/software-engineering-in-sre/
    title: 'Google SRE Book — Chapter 18: Software Engineering in SRE'
  validation_status: cross_checked
- id: CR-SRE-LB-001
  text: Load balancing happens at three levels — DNS, virtual IP (network), and backend (application) — and you need all three.
    DNS alone is insufficient because clients cache DNS records. Network alone is insufficient because it cannot make application-aware
    decisions. Backend alone is insufficient because it cannot distribute across datacenters.
  why: 'Google''s load balancing architecture has three layers, each solving a different problem. DNS-based load balancing
    directs users to the nearest datacenter, but clients cache DNS responses for minutes to hours, so DNS cannot react to
    rapid changes (a datacenter going down). Virtual IP (VIP) load balancing distributes traffic within a datacenter across
    multiple machines, but it operates at the network level and cannot make decisions based on application health. Backend-level
    load balancing (within the application) distributes requests across server instances based on health, capacity, and request
    type. Each layer compensates for the limitations of the others. A common mistake is implementing only one layer and discovering
    its blind spots during an incident.

    '
  how_to_do_right: '1. Layer 1 (DNS): Direct users to the nearest healthy datacenter. Use short TTLs (30-60s) for faster failover,
    but accept that some clients will cache longer.

    2. Layer 2 (Network/VIP): Distribute traffic within a datacenter. Use health checks to remove unhealthy backends. Handle
    connection draining during deployments.

    3. Layer 3 (Application): Route requests based on application-level signals: server capacity, request priority, session
    affinity.

    4. Health checks at EVERY layer. A machine that passes TCP health checks but fails application health checks should not
    receive traffic.

    5. Test failover at each layer independently: what happens when DNS stops resolving? When the VIP drops a backend? When
    an application instance is unhealthy?

    6. Monitor load distribution: if one backend has 3x the traffic of others, the load balancer is misconfigured.

    '
  example_good: "# Three-layer load balancing: DNS + Network + Application\nclass LoadBalancingStack:\n    def configure(self, service: str):\n        # Layer 1: DNS — direct to nearest healthy datacenter\n        dns_config = DNSLoadBalancer(\n            service=service,\n            strategy=\"geo_latency\",\n            ttl_seconds=30,  # Short TTL for faster failover\n            health_check=True,\n        )\n        # Layer 2: Network/VIP — distribute within datacenter\n        vip_config = NetworkLoadBalancer(\n            service=service,\n            health_check=TCPHealthCheck(port=8080, interval_sec=5),\n            drain_on_unhealthy=True,\n        )\n        # Layer 3: Application — route by app-level signals\n        app_lb = ApplicationLoadBalancer(\n            service=service,\n            strategy=\"least_connections\",\n            health_check=HTTPHealthCheck(\"/healthz\", expected_status=200),\n        )\n        return [dns_config, vip_config, app_lb]\n"
  example_bad: "# Only DNS-based load balancing\ndef setup_lb(service):\n    # Single layer: DNS only\n    dns.add_record(service, \"A\", [\"10.0.0.1\", \"10.0.0.2\"])\n    # Problem 1: Clients cache DNS for hours — can't react to failures\n    # Problem 2: No application-level health checks\n    # Problem 3: No capacity-aware routing\n    # When 10.0.0.1 goes down, half the traffic goes to a dead server\n"
  when_applies: When architecting load balancing for services that span multiple datacenters or availability zones and need resilience at DNS, network, and application layers.
  severity: high
  technologies:
    platform: [cloud, kubernetes, dns, load_balancer]
  domains:
    domain: [performance, reliability, security]
    concern: [scaling, horizontal, network]
  sources:
  - url: https://sre.google/sre-book/load-balancing-frontend/
    title: 'Google SRE Book — Chapter 19: Load Balancing at the Frontend'
  validation_status: cross_checked
- id: CR-SRE-LB-002
  text: Health checks must test what matters — not just "is the process running" but "can this instance serve requests correctly."
    A process that is running but returning errors, or running but overloaded, should be removed from the load balancer pool.
  why: 'Google''s load balancing uses multi-level health checks because a binary "up/down" check is insufficient. A server
    can be "up" (process running, port responding) but completely useless: it might be overloaded (100% CPU, requests queuing),
    experiencing a dependency failure (can''t reach the database), in a degraded state (serving stale data), or failing application
    logic (returning 500 errors). A simple TCP health check sees the port is open and keeps sending traffic. Google''s health
    checks test application-level functionality: can the server handle a realistic request and return a correct response within
    acceptable latency? Servers that fail application-level health checks are drained (existing connections complete; new
    connections go elsewhere), not killed — avoiding in-progress request failures.

    '
  how_to_do_right: '1. Implement three health check levels: liveness (is the process running?), readiness (can it accept new
    requests?), and application (can it serve correctly?).

    2. Kubernetes example: liveness probe = TCP check, readiness probe = HTTP /healthz that tests database connectivity and
    returns 200 only when ready.

    3. Health check endpoints should test critical dependencies: database, cache, upstream services.

    4. Include latency in health checks: if the health check takes > 2 seconds, the server is overloaded and should be drained.

    5. Drain, don''t kill: remove unhealthy instances from the pool gracefully, allowing in-progress requests to complete.

    6. Monitor health check flapping: an instance that alternates healthy/unhealthy is worse than one that stays unhealthy
    (it gets intermittent traffic).

    '
  example_good: "# Multi-level health checks: liveness + readiness + application\n# Kubernetes deployment with proper health checks\napiVersion: apps/v1\nkind: Deployment\nspec:\n  template:\n    spec:\n      containers:\n      - name: app\n        livenessProbe:   # Is the process fundamentally broken?\n          tcpSocket:\n            port: 8080\n          periodSeconds: 10\n        readinessProbe:  # Can it accept new requests?\n          httpGet:\n            path: /healthz\n            port: 8080\n          periodSeconds: 5\n        # /healthz checks DB connectivity, cache, and latency:\n        # Returns 200 only when ALL dependencies are reachable\n        # Returns 503 when overloaded (latency > 2s)\n"
  example_bad: "# Binary health check: TCP port open = healthy\napiVersion: apps/v1\nkind: Deployment\nspec:\n  template:\n    spec:\n      containers:\n      - name: app\n        livenessProbe:\n          tcpSocket:\n            port: 8080  # Only checks if port is open\n          # Server could be: returning 500 errors, can't reach DB,\n          # serving stale data, 100% CPU — but port is open = \"healthy\"\n          # Load balancer keeps sending traffic to a broken server\n"
  when_applies: When configuring health checks for load balancers or Kubernetes services where a simple TCP port check is insufficient to determine if an instance can serve requests correctly.
  severity: high
  technologies:
    platform: [cloud, kubernetes, load_balancer]
  domains:
    domain: [observability, performance, reliability]
    concern: [monitoring, health_checks, scaling, horizontal]
  sources:
  - url: https://sre.google/sre-book/load-balancing-frontend/
    title: 'Google SRE Book — Chapter 19: Load Balancing at the Frontend'
  validation_status: cross_checked
