layer: rules
technology: Angular
domain: frontend
knowledge:
- id: CR-NG-SIG-001
  text: Use signal() for component state — it provides fine-grained reactivity without zone.js overhead or OnPush ceremony.
  why: zone.js-based change detection re-checks the entire component tree on every async event (click, timer, HTTP response).
    Signals notify only the exact views that depend on the changed value, reducing change detection work from O(tree) to O(affected-views).
  how_to_do_right: Use signal<T>(initialValue) for writable state. Use computed(() => ...) for derived values. Use effect(()
    => ...) for side effects. Update signals with .set(), .update(), or .mutate(). Signals are synchronous and glitch-free.
  severity: high
  technologies:
    lang: [typescript]
    framework: [frontend, angular]
  domains:
    domain: [architecture, performance]
    concern: [frontend, state_management]
  example_good: "import { Component, signal, computed, effect } from '@angular/core';\n\n@Component({\n  selector: 'app-counter',\n\
    \  template: `\n    <span>Count: {{ count() }}</span>\n    <span>Double: {{ doubled() }}</span>\n    <button (click)=\"\
    increment()\">+</button>\n  `,\n})\nexport class CounterComponent {\n  count = signal(0);\n  doubled = computed(() =>\
    \ this.count() * 2); // Auto-derived\n\n  constructor() {\n    effect(() => {\n      console.log(`Count changed to: ${this.count()}`);\
    \ // Side effect\n    });\n  }\n\n  increment() {\n    this.count.update(c => c + 1); // Notifies only dependents\n  }\n\
    }\n"
  example_bad: "@Component({\n  selector: 'app-counter',\n  template: `<span>Count: {{ count }}</span><span>Double: {{ getDoubled()\
    \ }}</span>`,\n})\nexport class CounterComponent {\n  count = 0;\n  getDoubled() { return this.count * 2; } // Called\
    \ on EVERY change detection cycle!\n  increment() { this.count++; } // Triggers full tree check via zone.js\n}\n"
  when_applies: Projects using Angular applications or TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using Angular or TypeScript
  sources: ["https://angular.dev/guide/signals"]
- id: CR-NG-SIG-002
  text: Use input signals and model signals for component inputs — they replace @Input() and @Output() with reactive primitives.
  why: '@Input() values are not reactive — reading them in ngOnChanges is imperative and error-prone. Input signals integrate
    with the signal graph: you can use them in computed() and effect() naturally, and model signals provide built-in two-way
    binding without banana-in-a-box syntax.'
  how_to_do_right: Use input<T>() for read-only inputs. Use input.required<T>() for required inputs. Use model<T>() for two-way
    binding. Access values with .call syntax (inputName()). Connect to computed/effect for derived state.
  severity: high
  technologies:
    lang: [typescript]
    framework: [frontend, angular]
  domains:
    domain: [architecture]
    concern: [frontend, component-design]
  example_good: "import { Component, input, model, computed } from '@angular/core';\n\n@Component({\n  selector: 'app-price-input',\n\
    \  template: `\n    <input [value]=\"displayValue()\" (input)=\"onInput($event)\" />\n    <span>{{ formattedPrice() }}</span>\n\
    \  `,\n})\nexport class PriceInputComponent {\n  currency = input<string>('USD');        // Optional with default\n  min\
    \ = input.required<number>();          // Required — compile error if missing\n  price = model<number>(0);           \
    \    // Two-way binding\n\n  formattedPrice = computed(() =>\n    new Intl.NumberFormat('en', {\n      style: 'currency',\n\
    \      currency: this.currency(),\n    }).format(this.price())\n  );\n\n  displayValue = computed(() => this.price().toString());\n\
    \n  onInput(event: Event) {\n    const val = +(event.target as HTMLInputElement).value;\n    if (val >= this.min()) this.price.set(val);\n\
    \  }\n}\n\n// Usage: <app-price-input [(price)]=\"amount\" [min]=\"0\" />\n"
  example_bad: "@Component({ /* ... */ })\nexport class PriceInputComponent implements OnChanges {\n  @Input() currency =\
    \ 'USD';\n  @Input() min!: number; // No compile-time required check\n  @Input() price = 0;\n  @Output() priceChange =\
    \ new EventEmitter<number>();\n\n  formattedPrice = '';\n\n  ngOnChanges(changes: SimpleChanges) {\n    // Imperative,\
    \ error-prone — must check every input\n    if (changes['price'] || changes['currency']) {\n      this.formattedPrice\
    \ = new Intl.NumberFormat(/*...*/).format(this.price);\n    }\n  }\n}\n"
  when_applies: Projects using Angular applications or TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using Angular or TypeScript
  sources: ["https://angular.dev/guide/signals/inputs"]
- id: CR-NG-SIG-003
  text: Use toSignal() and toObservable() for interop between signals and RxJS — bridge the two reactivity systems cleanly.
  why: 'Angular has two reactivity systems: signals (synchronous, fine-grained) and RxJS (async streams). Mixing them without
    proper interop (manually subscribing to observables to update signals) creates memory leaks and timing bugs. toSignal/toObservable
    bridge them safely.'
  how_to_do_right: Use toSignal(observable$) to read an Observable as a signal — handles subscription and cleanup automatically.
    Use toObservable(signal) to pipe a signal into RxJS operators. Use requireSync option when the Observable is guaranteed
    synchronous (BehaviorSubject).
  severity: high
  technologies:
    lang: [typescript]
    framework: [frontend, angular]
    library: [rxjs]
  domains:
    domain: [architecture]
    concern: [frontend, state_management, async]
  example_good: "import { Component, signal } from '@angular/core';\nimport { toSignal, toObservable } from '@angular/core/rxjs-interop';\n\
    import { switchMap, debounceTime } from 'rxjs/operators';\n\n@Component({ /* ... */ })\nexport class SearchComponent {\n\
    \  query = signal('');\n\n  // Signal → Observable → RxJS operators → Signal\n  results = toSignal(\n    toObservable(this.query).pipe(\n\
    \      debounceTime(300),\n      switchMap(q => this.http.get<Result[]>(`/api/search?q=${q}`))\n    ),\n    { initialValue:\
    \ [] as Result[] }\n  );\n\n  // Template: {{ results() }} — always current, auto-cleaned up\n}\n"
  example_bad: "@Component({ /* ... */ })\nexport class SearchComponent implements OnDestroy {\n  query = signal('');\n  results:\
    \ Result[] = [];\n  private sub!: Subscription;\n\n  ngOnInit() {\n    // Manual subscription — must remember to unsubscribe\n\
    \    this.sub = toObservable(this.query).pipe(\n      debounceTime(300),\n      switchMap(q => this.http.get<Result[]>(`/api/search?q=${q}`))\n\
    \    ).subscribe(r => this.results = r); // Manual assignment\n  }\n\n  ngOnDestroy() { this.sub.unsubscribe(); } // Forget\
    \ this = memory leak\n}\n"
  when_applies: Projects using Angular applications, RxJS, or TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools
  sources: ["https://angular.dev/guide/signals/rxjs-interop"]
- id: CR-NG-STANDALONE-001
  text: Use standalone components — NgModules are legacy and add unnecessary indirection.
  why: NgModules group components/services with declaration arrays that are hard to reason about (which module declares this
    component? which module provides this service?). Standalone components import their own dependencies directly — the dependency
    graph is explicit and tree-shakeable.
  how_to_do_right: 'Set standalone: true on all components, directives, and pipes. Use importProvidersFrom() for library providers.
    Bootstrap with bootstrapApplication() instead of platformBrowserDynamic().bootstrapModule(). Import shared utilities directly
    where needed.'
  severity: high
  technologies:
    lang: [typescript]
    framework: [frontend, angular]
  domains:
    domain: [architecture]
    concern: [frontend]
  example_good: "// Standalone component — imports own dependencies\n@Component({\n  selector: 'app-user-list',\n  standalone:\
    \ true,\n  imports: [CommonModule, RouterLink, UserCardComponent],\n  template: `\n    <app-user-card *ngFor=\"let user\
    \ of users()\" [user]=\"user\" />\n  `,\n})\nexport class UserListComponent {\n  users = input.required<User[]>();\n}\n\
    \n// Bootstrap — no AppModule needed\nbootstrapApplication(AppComponent, {\n  providers: [\n    provideRouter(routes),\n\
    \    provideHttpClient(withInterceptors([authInterceptor])),\n    provideAnimations(),\n  ],\n});\n"
  example_bad: "// NgModule approach — indirection, hard to trace dependencies\n@NgModule({\n  declarations: [UserListComponent,\
    \ UserCardComponent], // Where are these used?\n  imports: [CommonModule, RouterModule, SharedModule], // What does SharedModule\
    \ provide?\n  exports: [UserListComponent], // Must remember to export\n})\nexport class UserModule {}\n// 5 files of\
    \ ceremony before writing any template\n"
  when_applies: Projects using Angular applications or TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using Angular or TypeScript
  sources: ["https://angular.dev/guide/components/importing"]
- id: CR-NG-DI-001
  text: 'Use providedIn: ''root'' for singleton services — tree-shakeable and no manual provider registration.'
  why: 'Services registered in NgModule providers arrays are included in the bundle even if no component imports them. providedIn:
    ''root'' makes the service a tree-shakeable singleton — it''s only included in the final bundle if actually injected somewhere.'
  how_to_do_right: 'Use @Injectable({ providedIn: ''root'' }) for app-wide singletons. Use component-level providers for scoped
    instances. Use InjectionToken for non-class values. Use multi: true for multiple implementations of the same token.'
  severity: medium
  technologies:
    lang: [typescript]
    framework: [frontend, angular]
  domains:
    domain: [architecture]
    concern: [frontend, dependency-injection]
  example_good: "// Tree-shakeable singleton — included only if injected\n@Injectable({ providedIn: 'root' })\nexport class\
    \ AuthService {\n  private currentUser = signal<User | null>(null);\n  readonly user = this.currentUser.asReadonly();\n\
    \n  async login(credentials: Credentials): Promise<void> {\n    const user = await firstValueFrom(this.http.post<User>('/api/login',\
    \ credentials));\n    this.currentUser.set(user);\n  }\n\n  logout(): void { this.currentUser.set(null); }\n}\n\n// Injection\
    \ token for configuration\nexport const API_BASE_URL = new InjectionToken<string>('API_BASE_URL');\n\n// Provide in bootstrap\n\
    bootstrapApplication(AppComponent, {\n  providers: [{ provide: API_BASE_URL, useValue: 'https://api.example.com' }],\n\
    });\n"
  example_bad: "// Registered in module — not tree-shakeable, manual registration\n@Injectable()\nexport class AuthService\
    \ { /* ... */ }\n\n@NgModule({\n  providers: [AuthService], // Always bundled even if unused\n})\nexport class CoreModule\
    \ {}\n"
  when_applies: Projects using Angular applications or TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using Angular or TypeScript
  sources: ["https://angular.dev/guide/di/dependency-injection"]
- id: CR-NG-RXJS-001
  text: Use switchMap for search/autocomplete, exhaustMap for form submissions — choosing the wrong flattening operator causes
    bugs.
  why: switchMap cancels the previous inner Observable when a new emission arrives — perfect for search (cancel stale results).
    exhaustMap ignores new emissions while the current inner Observable is active — perfect for form submission (prevent double-submit).
    Using mergeMap for search shows stale results; using switchMap for submission cancels the first request.
  how_to_do_right: 'switchMap: search, autocomplete, route navigation (cancel previous). exhaustMap: form submission, button
    clicks (ignore while processing). mergeMap: parallel independent operations (download multiple files). concatMap: ordered
    sequential operations (queue).'
  severity: critical
  technologies:
    lang: [typescript]
    framework: [frontend, angular]
    library: [rxjs]
  domains:
    domain: [architecture]
    concern: [frontend, async, data-fetching]
  example_good: "// Search — switchMap cancels previous search when user types new query\nthis.searchResults$ = this.searchControl.valueChanges.pipe(\n\
    \  debounceTime(300),\n  distinctUntilChanged(),\n  switchMap(query => this.searchService.search(query)),\n  // Previous\
    \ search cancelled automatically — no stale results\n);\n\n// Form submit — exhaustMap prevents double submission\nthis.submitResult$\
    \ = this.submitAction$.pipe(\n  exhaustMap(formData =>\n    this.orderService.submit(formData).pipe(\n      catchError(err\
    \ => of({ error: err.message }))\n    )\n  ),\n  // Second click ignored while first submission is in flight\n);\n"
  example_bad: "// WRONG: mergeMap for search — parallel searches, stale results arrive last\nthis.searchResults$ = this.searchControl.valueChanges.pipe(\n\
    \  mergeMap(query => this.searchService.search(query)),\n  // Typing \"abc\" fires 3 parallel searches — \"a\" result\
    \ might arrive last!\n);\n\n// WRONG: switchMap for submit — cancels first submission on double-click\nthis.submitResult$\
    \ = this.submitAction$.pipe(\n  switchMap(data => this.orderService.submit(data)),\n  // Double-click cancels first order!\
    \ Customer charged but order lost.\n);\n"
  when_applies: Any project using Angular applications, RxJS, or TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools
  sources:
    - "https://rxjs.dev/guide/operators#join-creation-operators"
    - "https://angular.dev/guide/signals/rxjs-interop"
- id: CR-NG-RXJS-002
  text: Use takeUntilDestroyed() for automatic unsubscription — never manually manage subscriptions in ngOnDestroy.
  why: Manual subscription management (storing Subscription, calling unsubscribe in ngOnDestroy) is error-prone — forget one
    and you have a memory leak. takeUntilDestroyed() automatically completes the Observable when the component/service is
    destroyed.
  how_to_do_right: Use takeUntilDestroyed() from @angular/core/rxjs-interop as the LAST operator in the pipe. It reads the
    DestroyRef automatically in injection context. Outside injection context, pass a DestroyRef explicitly.
  severity: high
  technologies:
    lang: [typescript]
    framework: [frontend, angular]
    library: [rxjs]
  domains:
    domain: [architecture, performance]
    concern: [frontend, memory, async]
  example_good: "import { Component, inject } from '@angular/core';\nimport { takeUntilDestroyed } from '@angular/core/rxjs-interop';\n\
    \n@Component({ /* ... */ })\nexport class DashboardComponent {\n  constructor() {\n    // Auto-unsubscribes when component\
    \ is destroyed\n    this.webSocket.messages$\n      .pipe(takeUntilDestroyed())\n      .subscribe(msg => this.handleMessage(msg));\n\
    \n    interval(5000)\n      .pipe(takeUntilDestroyed())\n      .subscribe(() => this.refresh());\n  }\n}\n"
  example_bad: "@Component({ /* ... */ })\nexport class DashboardComponent implements OnDestroy {\n  private subs: Subscription[]\
    \ = [];\n\n  ngOnInit() {\n    // Manual tracking — error-prone\n    this.subs.push(this.webSocket.messages$.subscribe(/*...*/));\n\
    \    this.subs.push(interval(5000).subscribe(/*...*/));\n    // Forget to push one = memory leak\n  }\n\n  ngOnDestroy()\
    \ {\n    this.subs.forEach(s => s.unsubscribe()); // Must remember this!\n  }\n}\n"
  when_applies: Projects using Angular applications, RxJS, or TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools
  sources: ["https://angular.dev/api/core/rxjs-interop/takeUntilDestroyed"]
- id: CR-NG-LAZY-001
  text: Use @defer for template-based lazy loading with triggers — it replaces complex dynamic import patterns.
  why: Traditional lazy loading requires route configuration, dynamic imports, and manual loading state management. @defer
    handles all of this in the template with declarative triggers (on viewport, on interaction, on idle), built-in loading/error/placeholder
    states.
  how_to_do_right: 'Use @defer for below-fold content, heavy components, and optional features. Choose triggers: on viewport
    (scroll into view), on interaction (click/hover), on idle (browser idle), on timer (after delay). Provide @placeholder,
    @loading, and @error blocks.'
  severity: high
  technologies:
    lang: [typescript]
    framework: [frontend, angular]
  domains:
    domain: [architecture, performance]
    concern: [frontend]
  example_good: "<!-- Heavy chart component — loads when scrolled into view -->\n@defer (on viewport) {\n  <app-analytics-chart\
    \ [data]=\"chartData()\" />\n} @placeholder {\n  <div class=\"chart-skeleton\" style=\"height: 400px\"></div>\n} @loading\
    \ (minimum 200ms) {\n  <app-spinner />\n} @error {\n  <p>Failed to load chart. <button (click)=\"retry()\">Retry</button></p>\n\
    }\n\n<!-- Feature loaded on first interaction -->\n@defer (on interaction) {\n  <app-rich-text-editor [(content)]=\"body\"\
    \ />\n} @placeholder {\n  <textarea [value]=\"body()\" (focus)=\"$event\">Click to load editor</textarea>\n}\n"
  example_bad: '<!-- Loading everything eagerly — 500KB initial bundle -->

    <app-analytics-chart [data]="chartData" />

    <app-rich-text-editor [(content)]="body" />

    <app-3d-viewer [model]="model" />

    <!-- User downloads all JS even if they never scroll to these components -->

    '
  when_applies: Projects using Angular applications or TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using Angular or TypeScript
  sources: ["https://angular.dev/guide/defer"]
- id: CR-NG-CD-001
  text: Use OnPush change detection with signals or immutable data — default change detection is too expensive for large apps.
  why: Default change detection checks EVERY binding in EVERY component on EVERY async event (click, timer, HTTP). For a 200-component
    app, this means thousands of checks per keystroke. OnPush skips the component unless its inputs change (by reference)
    or a signal notifies.
  how_to_do_right: 'Set changeDetection: ChangeDetectionStrategy.OnPush on all components. Use signals for state (automatic
    notification). Use the async pipe for Observables (triggers markForCheck). Never mutate objects — replace them with new
    references.'
  severity: high
  technologies:
    lang: [typescript]
    framework: [frontend, angular]
  domains:
    domain: [architecture, performance]
    concern: [frontend]
  example_good: "@Component({\n  selector: 'app-user-card',\n  changeDetection: ChangeDetectionStrategy.OnPush,\n  template:\
    \ `\n    <div class=\"card\">\n      <h3>{{ user().name }}</h3>\n      <p>{{ user().email }}</p>\n      <span>Status:\
    \ {{ status() }}</span>\n    </div>\n  `,\n})\nexport class UserCardComponent {\n  user = input.required<User>();\n\n\
    \  // Computed signal — auto-triggers change detection when user changes\n  status = computed(() =>\n    this.user().lastSeen\
    \ > Date.now() - 300000 ? 'Online' : 'Offline'\n  );\n}\n"
  example_bad: "@Component({\n  selector: 'app-user-card',\n  // Default change detection — checks on EVERY async event\n\
    \  template: `\n    <div class=\"card\">\n      <h3>{{ user.name }}</h3>\n      <p>{{ getStatus() }}</p> <!-- Method called\
    \ on every check! -->\n    </div>\n  `,\n})\nexport class UserCardComponent {\n  @Input() user!: User;\n  getStatus()\
    \ { // Expensive — runs on every change detection cycle\n    return this.user.lastSeen > Date.now() - 300000 ? 'Online'\
    \ : 'Offline';\n  }\n}\n"
  when_applies: Projects using Angular applications or TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using Angular or TypeScript
  sources: ["https://angular.dev/guide/components/advanced-configuration#changedetectionstrategy"]
- id: CR-NG-FORMS-001
  text: Use typed Reactive Forms with FormBuilder — template-driven forms lack type safety and are hard to test.
  why: Template-driven forms use ngModel with any typing — the compiler can't catch field name typos, wrong value types, or
    missing validators. Reactive Forms with typed FormGroup<T> provide compile-time checking of field names, value types,
    and form structure.
  how_to_do_right: Use FormBuilder.nonNullable for forms that always have values. Define form types explicitly. Use custom
    validators for complex rules. Use FormArray<T> for dynamic form sections. Test form logic without DOM rendering.
  severity: high
  technologies:
    lang: [typescript]
    framework: [frontend, angular]
  domains:
    domain: [architecture, quality]
    concern: [frontend, forms, type_safety]
  example_good: "interface LoginForm {\n  email: FormControl<string>;\n  password: FormControl<string>;\n  rememberMe: FormControl<boolean>;\n\
    }\n\n@Component({ /* ... */ })\nexport class LoginComponent {\n  private fb = inject(NonNullableFormBuilder);\n\n  form\
    \ = this.fb.group<LoginForm>({\n    email: this.fb.control('', [Validators.required, Validators.email]),\n    password:\
    \ this.fb.control('', [Validators.required, Validators.minLength(8)]),\n    rememberMe: this.fb.control(false),\n  });\n\
    \n  onSubmit() {\n    if (this.form.invalid) return;\n    const { email, password } = this.form.getRawValue();\n    //\
    \ email is string (not string | null), password is string — fully typed\n    this.auth.login(email, password);\n  }\n\
    }\n"
  example_bad: "// Template-driven — no type safety, hard to test\n@Component({\n  template: `\n    <input [(ngModel)]=\"\
    emal\" /> <!-- Typo not caught! -->\n    <input [(ngModel)]=\"password\" />\n  `,\n})\nexport class LoginComponent {\n\
    \  email = '';\n  password = '';\n  // No validation until runtime, no type checking\n}\n"
  when_applies: Projects using Angular applications or TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using Angular or TypeScript
  sources: ["https://angular.dev/guide/forms/typed-forms"]
- id: CR-NG-HTTP-001
  text: Use functional interceptors (HttpInterceptorFn) for HTTP concerns — auth tokens, retry logic, error handling.
  why: Class-based interceptors require NgModule registration and have complex DI setup. Functional interceptors are simpler,
    tree-shakeable, composable, and work with standalone bootstrapping. They chain in order — put auth first, retry last.
  how_to_do_right: 'Define interceptors as HttpInterceptorFn functions. Register with provideHttpClient(withInterceptors([...])).
    Chain order matters: auth → caching → error handling → retry. Use inject() inside the function for DI.'
  severity: medium
  technologies:
    lang: [typescript]
    framework: [frontend, angular]
  domains:
    domain: [architecture, api, security]
    concern: [frontend]
  example_good: "// auth.interceptor.ts — functional interceptor\nexport const authInterceptor: HttpInterceptorFn = (req,\
    \ next) => {\n  const auth = inject(AuthService);\n  const token = auth.token();\n\n  if (token) {\n    req = req.clone({\n\
    \      setHeaders: { Authorization: `Bearer ${token}` },\n    });\n  }\n\n  return next(req).pipe(\n    catchError(err\
    \ => {\n      if (err.status === 401) auth.logout();\n      return throwError(() => err);\n    })\n  );\n};\n\n// retry.interceptor.ts\n\
    export const retryInterceptor: HttpInterceptorFn = (req, next) => {\n  return next(req).pipe(\n    retry({ count: 2, delay:\
    \ 1000 }) // Retry failed requests\n  );\n};\n\n// Bootstrap — order matters\nbootstrapApplication(AppComponent, {\n \
    \ providers: [\n    provideHttpClient(\n      withInterceptors([authInterceptor, retryInterceptor])\n    ),\n  ],\n});\n"
  example_bad: "// Class-based — verbose, requires NgModule\n@Injectable()\nexport class AuthInterceptor implements HttpInterceptor\
    \ {\n  constructor(private auth: AuthService) {}\n  intercept(req: HttpRequest<any>, next: HttpHandler) { /* ... */ }\n\
    }\n\n@NgModule({\n  providers: [{\n    provide: HTTP_INTERCEPTORS,\n    useClass: AuthInterceptor,\n    multi: true, //\
    \ Forget multi: true = overwrite all interceptors!\n  }],\n})\nexport class CoreModule {}\n"
  when_applies: Projects using Angular applications or TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using Angular or TypeScript
  sources: ["https://angular.dev/guide/http/interceptors"]
- id: CR-NG-TEST-001
  text: Test components with signals by reading signal values directly — no need for fixture.detectChanges() ceremony.
  why: Traditional Angular testing requires TestBed setup, fixture creation, detectChanges calls, and DOM queries. With signals,
    component state is accessible as plain function calls — you can test logic without rendering the template, making tests
    10x faster and simpler.
  how_to_do_right: Instantiate the component class directly for logic tests. Use signal inputs with componentRef.setInput().
    Read signal values with signal(). Use TestBed only when testing template rendering or DI interactions.
  severity: medium
  technologies:
    lang: [typescript]
    framework: [frontend, angular]
    library: [jasmine]
  domains:
    domain: [architecture, testing]
    concern: [frontend]
  example_good: "describe('CounterComponent', () => {\n  it('should compute doubled value', () => {\n    const fixture = TestBed.createComponent(CounterComponent);\n\
    \    const component = fixture.componentInstance;\n\n    // Read signal directly — no DOM, no detectChanges\n    expect(component.count()).toBe(0);\n\
    \    expect(component.doubled()).toBe(0);\n\n    component.increment();\n    expect(component.count()).toBe(1);\n    expect(component.doubled()).toBe(2);\
    \ // Computed updates synchronously\n  });\n\n  it('should handle input signals', () => {\n    const fixture = TestBed.createComponent(UserCardComponent);\n\
    \    fixture.componentRef.setInput('user', { name: 'Alice', email: 'a@b.com' });\n    // Signal inputs set directly —\
    \ no ngOnChanges\n    expect(fixture.componentInstance.user().name).toBe('Alice');\n  });\n});\n"
  example_bad: "describe('CounterComponent', () => {\n  it('should display doubled value', () => {\n    const fixture = TestBed.createComponent(CounterComponent);\n\
    \    fixture.detectChanges(); // Ceremony\n    const el = fixture.nativeElement.querySelector('.doubled');\n    expect(el.textContent).toBe('0');\
    \ // DOM query — brittle\n    fixture.componentInstance.increment();\n    fixture.detectChanges(); // More ceremony\n\
    \    expect(el.textContent).toBe('2'); // Still DOM-coupled\n  });\n});\n"
  when_applies: Projects using Angular applications, TypeScript projects with static typing, or Jasmine
  when_not_applies: server-rendered pages, APIs, CLI tools
  sources: ["https://angular.dev/guide/testing/components-basics"]
- id: CR-NG-ROUTE-001
  text: Use functional route guards and resolvers — class-based guards are legacy and overly verbose.
  why: Class-based guards require creating a full @Injectable class, implementing an interface, and registering in providers.
    Functional guards are simple arrow functions with inject() for DI — 80% less code, better tree shaking, and work with
    standalone components.
  how_to_do_right: Use CanActivateFn, CanDeactivateFn, ResolveFn types. Use inject() for DI inside the function. Return boolean,
    UrlTree (redirect), or Observable/Promise. Register directly in route config — no providers needed.
  severity: medium
  technologies:
    lang: [typescript]
    framework: [frontend, angular]
  domains:
    domain: [architecture, security]
    concern: [frontend, routing]
  example_good: "// Functional guard — simple, tree-shakeable\nexport const authGuard: CanActivateFn = (route, state) => {\n\
    \  const auth = inject(AuthService);\n  const router = inject(Router);\n\n  if (auth.isAuthenticated()) {\n    return\
    \ true;\n  }\n\n  // Redirect to login with return URL\n  return router.createUrlTree(['/login'], {\n    queryParams:\
    \ { returnUrl: state.url },\n  });\n};\n\n// Functional resolver\nexport const userResolver: ResolveFn<User> = (route)\
    \ => {\n  const userService = inject(UserService);\n  return userService.getUser(route.params['id']);\n};\n\n// Route\
    \ config — clean, no provider registration\nconst routes: Routes = [\n  {\n    path: 'dashboard',\n    canActivate: [authGuard],\n\
    \    resolve: { user: userResolver },\n    loadComponent: () => import('./dashboard.component'),\n  },\n];\n"
  example_bad: "// Class-based guard — verbose, needs providers registration\n@Injectable({ providedIn: 'root' })\nexport\
    \ class AuthGuard implements CanActivate {\n  constructor(private auth: AuthService, private router: Router) {}\n  canActivate(route:\
    \ ActivatedRouteSnapshot, state: RouterStateSnapshot) {\n    if (this.auth.isAuthenticated()) return true;\n    return\
    \ this.router.createUrlTree(['/login']);\n  }\n}\n"
  when_applies: Projects using Angular applications or TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using Angular or TypeScript
  sources: ["https://angular.dev/guide/routing/common-router-tasks"]
- id: CR-NG-PIPE-001
  text: Use pure pipes for data transformation in templates — they are cached and only re-evaluate when inputs change.
  why: Methods called in templates ({{ format(date) }}) execute on EVERY change detection cycle — potentially 60+ times per
    second. Pure pipes cache their result and only re-compute when the input value changes (by reference), eliminating redundant
    computation.
  how_to_do_right: 'Create standalone pure pipes for formatting (dates, currency, truncation). Mark as pure: true (default).
    Never create impure pipes (pure: false) unless absolutely necessary — they re-evaluate every cycle. Use the async pipe
    for Observable values.'
  severity: high
  technologies:
    lang: [typescript]
    framework: [frontend, angular]
  domains:
    domain: [architecture, performance]
    concern: [frontend]
  example_good: "// Standalone pure pipe — cached, only recomputes on input change\n@Pipe({ name: 'relativeTime', standalone:\
    \ true, pure: true })\nexport class RelativeTimePipe implements PipeTransform {\n  transform(date: Date | string): string\
    \ {\n    const d = new Date(date);\n    const diff = Date.now() - d.getTime();\n    if (diff < 60000) return 'just now';\n\
    \    if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;\n    if (diff < 86400000) return `${Math.floor(diff\
    \ / 3600000)}h ago`;\n    return d.toLocaleDateString();\n  }\n}\n\n// Template — pipe result cached until input changes\n\
    // {{ user.lastSeen | relativeTime }}\n\n// Async pipe — auto-subscribes and unsubscribes\n// {{ data$ | async }}\n"
  example_bad: "// Method in template — called on EVERY change detection cycle\n@Component({\n  template: `<span>{{ formatDate(user.lastSeen)\
    \ }}</span>`,\n})\nexport class UserComponent {\n  formatDate(date: Date): string {\n    // This runs 60+ times/second\
    \ even if date hasn't changed!\n    return new Intl.DateTimeFormat('en').format(date);\n  }\n}\n"
  when_applies: Projects using Angular applications or TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using Angular or TypeScript
  sources: ["https://angular.dev/guide/pipes"]
- id: CR-NG-CONTENT-001
  text: Use ng-content with select for multi-slot content projection — the Angular equivalent of named slots.
  why: Without named slots, a component can only accept one block of projected content. select-based projection lets consumers
    pass header, body, and footer content separately, enabling flexible, composable component APIs like card layouts, dialogs,
    and data tables.
  how_to_do_right: Use ng-content with select attribute for named slots. Use [ngProjectAs] to project content into specific
    slots without wrapper elements. Provide fallback content with @if and @empty. Use ContentChild/ContentChildren for querying
    projected content.
  severity: medium
  technologies:
    lang: [typescript]
    framework: [frontend, angular]
  domains:
    domain: [architecture]
    concern: [frontend, component-design]
  example_good: "// card.component.ts — multi-slot component\n@Component({\n  selector: 'app-card',\n  standalone: true,\n\
    \  template: `\n    <div class=\"card\">\n      <header class=\"card-header\">\n        <ng-content select=\"[card-header]\"\
    \ />\n      </header>\n      <div class=\"card-body\">\n        <ng-content /> <!-- Default slot -->\n      </div>\n \
    \     <footer class=\"card-footer\">\n        <ng-content select=\"[card-footer]\" />\n      </footer>\n    </div>\n \
    \ `,\n})\nexport class CardComponent {}\n\n// Usage — clean, declarative API\n<app-card>\n  <h3 card-header>User Profile</h3>\n\
    \  <p>This is the card body content.</p>\n  <button card-footer>Save</button>\n</app-card>\n"
  example_bad: "// Single-slot component — rigid API\n@Component({\n  selector: 'app-card',\n  template: `<div class=\"card\"\
    ><ng-content /></div>`,\n})\nexport class CardComponent {}\n// Consumer must handle all layout internally — no header/footer\
    \ abstraction\n// Every usage duplicates the card structure\n"
  when_applies: Projects using Angular applications or TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using Angular or TypeScript
  sources: ["https://angular.dev/guide/components/content-projection"]
- id: CR-NG-RESOURCE-001
  text: Use Angular's resource() and httpResource() APIs for declarative, signal-based data fetching.
  why: Manual data fetching with HttpClient + subscribe + loading/error state management is verbose and error-prone. resource()
    provides a signal-based, declarative API that handles loading states, error handling, and automatic refetching when dependencies
    change — similar to React Query/TanStack Query.
  how_to_do_right: Use httpResource() for HTTP-based resources with automatic typing. Use resource() for custom async operations.
    Access .value(), .isLoading(), .error() signals in templates. Dependencies auto-track via signals — changing a signal
    triggers refetch.
  severity: high
  technologies:
    lang: [typescript]
    framework: [frontend, angular]
  domains:
    domain: [architecture]
    concern: [frontend, data-fetching]
  example_good: "@Component({\n  template: `\n    @if (users.isLoading()) {\n      <app-spinner />\n    } @else if (users.error())\
    \ {\n      <p>Error: {{ users.error()?.message }}</p>\n    } @else {\n      <app-user-list [users]=\"users.value() ??\
    \ []\" />\n    }\n  `,\n})\nexport class UserPageComponent {\n  private search = signal('');\n\n  // Auto-refetches when\
    \ search signal changes\n  users = httpResource<User[]>(() => ({\n    url: '/api/users',\n    params: { q: this.search()\
    \ },\n  }));\n\n  onSearch(query: string) {\n    this.search.set(query); // Triggers automatic refetch\n  }\n}\n"
  example_bad: "@Component({ /* ... */ })\nexport class UserPageComponent implements OnInit, OnDestroy {\n  users: User[]\
    \ = [];\n  loading = true;\n  error: string | null = null;\n  private sub!: Subscription;\n\n  ngOnInit() {\n    this.sub\
    \ = this.http.get<User[]>('/api/users').subscribe({\n      next: data => { this.users = data; this.loading = false; },\n\
    \      error: err => { this.error = err.message; this.loading = false; },\n    });\n  }\n  ngOnDestroy() { this.sub.unsubscribe();\
    \ } // Manual cleanup\n  // Must repeat this pattern for EVERY data source\n}\n"
  when_applies: Projects using Angular applications or TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using Angular or TypeScript
  sources: ["https://angular.dev/guide/signals/resource"]
