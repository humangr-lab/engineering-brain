- id: PCC-011
  text: Caching strategy must define TTL, invalidation triggers, and cache-aside pattern for EVERY cached entity — "add Redis cache" without a strategy creates stale data nightmares
  why: 'Caching without invalidation strategy means stale data. Caching with aggressive TTL means cache misses. Caching everything means memory exhaustion. The cache strategy must be designed per entity based on read/write ratio, staleness tolerance, and consistency requirements. Real example: a team cached user profiles in Redis with a 1-hour TTL. When a user changed their name, the old name was displayed for up to 1 hour across the platform. Support received 20 tickets per day about "wrong name after update." The fix was cache invalidation on write — a 10-line change that should have been designed from the start.'
  how_to_do_right: |
    1. Cache-aside pattern: read from cache, if miss read from DB, write to cache. On write to DB, invalidate cache.
    2. Define TTL per entity type: user_profile=5min, config=1hour, price=30sec, static_content=24hours.
    3. Define invalidation triggers: any write to the entity invalidates its cache entry.
    4. Define cache key format: "entity:{type}:{id}:{version}" (e.g., "user:profile:abc-123:v2").
    5. Define max memory and eviction policy: LRU for general cache, LFU for hot-key scenarios.
    6. Monitor hit rate: below 80% means the TTL is too short or the cache is too small.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, operations]
    concern: [meta_cognition]
  example_good: |
    class CachedUserService:
        def __init__(self, repo: UserRepository, cache: Redis):
            self.repo = repo
            self.cache = cache
            self.ttl = 300  # 5 minutes

        async def get(self, user_id: UUID) -> User:
            key = f"user:profile:{user_id}"
            cached = await self.cache.get(key)
            if cached:
                return User.model_validate_json(cached)
            user = await self.repo.get(user_id)
            await self.cache.setex(key, self.ttl, user.model_dump_json())
            return user

        async def update(self, user_id: UUID, data: UserUpdate) -> User:
            user = await self.repo.update(user_id, data)
            await self.cache.delete(f"user:profile:{user_id}")  # invalidate on write
            return user
  example_bad: |
    # Cache everything with 1-hour TTL, no invalidation
    @app.get("/api/v1/users/{id}")
    async def get_user(id: str):
        cached = redis.get(f"user:{id}")
        if cached:
            return json.loads(cached)
        user = db.get_user(id)
        redis.setex(f"user:{id}", 3600, json.dumps(user))  # 1 hour, never invalidated
        return user
    # User changes name → old name shown for up to 1 hour
  when_applies: During caching strategy design, performance optimization, data consistency reviews
  sources: ["https://redis.io/docs/latest/develop/data-types/"]

- id: PCC-012
  text: Health checks must distinguish LIVENESS (is the process running?) from READINESS (can the process serve traffic?) — conflating them causes cascading failures
  why: 'Kubernetes and load balancers use health checks to decide whether to restart a pod (liveness) or route traffic to it (readiness). If liveness fails, the pod is killed. If readiness fails, traffic stops. Conflating them means a slow database query causes liveness failure, which kills the pod, which increases load on remaining pods, which makes them slow, which kills more pods — a cascading failure. Real example: a service had one /health endpoint that checked the database. A brief database slowdown caused health checks to timeout. Kubernetes killed all 5 pods simultaneously. The service went completely offline for 3 minutes while new pods started up. Separating liveness from readiness would have stopped traffic routing but kept pods alive.'
  how_to_do_right: |
    1. Liveness check (/health/live): is the process running? Return 200 if the HTTP server can respond. No external dependency checks.
    2. Readiness check (/health/ready): can this instance serve traffic? Check: database connection, Redis connection, external APIs.
    3. Liveness: fast (< 100ms), no external calls, always succeeds if process is alive.
    4. Readiness: can take longer, checks all dependencies, returns 503 if any dependency is down.
    5. Startup probe: separate from liveness, allows slow startup (migration, cache warmup) without being killed.
    6. Never check external non-critical dependencies in readiness: if analytics is down, the service can still serve.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, operations]
    concern: [meta_cognition]
  example_good: |
    @app.get("/health/live")
    async def liveness():
        """Process is running. No external checks."""
        return {"status": "alive"}

    @app.get("/health/ready")
    async def readiness():
        """Can serve traffic. Checks critical dependencies."""
        checks = {
            "database": await check_db_connection(),
            "redis": await check_redis_connection(),
        }
        all_healthy = all(checks.values())
        status_code = 200 if all_healthy else 503
        return JSONResponse(
            status_code=status_code,
            content={"status": "ready" if all_healthy else "not_ready", "checks": checks},
        )
  example_bad: |
    @app.get("/health")
    async def health():
        # Single endpoint for both liveness and readiness
        db_ok = await check_db()       # if DB is slow, pod gets killed
        redis_ok = await check_redis() # if Redis is down, pod gets killed
        analytics_ok = await check_analytics()  # non-critical dependency kills the pod
        if not all([db_ok, redis_ok, analytics_ok]):
            raise HTTPException(503)
        return {"status": "healthy"}
  when_applies: During service health check design, Kubernetes configuration, load balancer setup
  sources: ["https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/"]

- id: PCC-013
  text: Graceful shutdown must drain in-flight requests, close connections, and flush buffers BEFORE the process exits — os.kill(pid, SIGKILL) is not a shutdown strategy
  why: 'Abrupt process termination (SIGKILL, OOM kill, power loss) leaves in-flight requests incomplete, database connections open, log buffers unflushed, and temporary files orphaned. Graceful shutdown gives the process time to finish what it is doing before exiting. Real example: a service processed payment webhooks. During deployment, the old pod was killed immediately (SIGKILL). A webhook was mid-processing: the payment was recorded in Stripe but not in the local database. The customer was charged but the order was not created. The reconciliation took 2 days. Graceful shutdown with a 30-second drain period would have prevented this.'
  how_to_do_right: |
    1. Handle SIGTERM: when the process receives SIGTERM, stop accepting new requests.
    2. Drain in-flight requests: wait for all current requests to complete (up to timeout, e.g., 30 seconds).
    3. Close connections: database connection pool, Redis connections, HTTP client sessions.
    4. Flush buffers: log buffers, metric buffers, trace buffers.
    5. Release resources: close file handles, release locks, clean up temporary files.
    6. Kubernetes: set terminationGracePeriodSeconds to at least 30 seconds and configure preStop hook.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, operations]
    concern: [meta_cognition]
  example_good: |
    import signal
    import asyncio
    from contextlib import asynccontextmanager

    @asynccontextmanager
    async def lifespan(app: FastAPI):
        # Startup
        await db_pool.connect()
        await redis.connect()
        yield
        # Shutdown (graceful)
        logger.info("shutdown.started")
        await asyncio.sleep(5)          # let load balancer stop sending traffic
        # In-flight requests finish via uvicorn's graceful shutdown
        await db_pool.disconnect()       # close DB connections
        await redis.close()              # close Redis connections
        logger.info("shutdown.complete")
        await log_handler.flush()        # flush log buffers

    app = FastAPI(lifespan=lifespan)

    # Kubernetes deployment:
    # terminationGracePeriodSeconds: 60
    # lifecycle:
    #   preStop:
    #     exec:
    #       command: ["sleep", "5"]  # let LB drain
  example_bad: |
    app = FastAPI()
    # No shutdown handler
    # Deployment: kubectl rollout restart → SIGTERM → 10s → SIGKILL
    # In-flight requests terminated mid-execution
    # DB connections leaked
    # Log buffer flushed by OS (some logs lost)
  when_applies: During service lifecycle design, deployment configuration, reliability reviews
  sources: ["https://kubernetes.io/docs/concepts/workloads/pods/pod-lifecycle/#container-hooks"]

- id: PCC-014
  text: Configuration management must use a layered system — hardcoded defaults, env vars for environment-specific values, secrets manager for sensitive values, and feature flags for runtime toggles
  why: 'Mixing configuration sources (some in code, some in env vars, some in config files, some in database) creates inconsistency, security risks, and deployment failures. A layered approach with clear precedence and separation of concerns makes configuration predictable and auditable. Real example: a service had database credentials in 4 places: .env file (dev), Kubernetes secrets (staging), AWS Secrets Manager (production), and hardcoded in a test file (which was accidentally deployed). The production deploy used the test credentials because the environment variable override was misconfigured. The service connected to the test database in production for 6 hours before someone noticed.'
  how_to_do_right: |
    1. Layer 1 (code): hardcoded defaults for non-sensitive, non-environment-specific values (pagination size, timeout defaults).
    2. Layer 2 (env vars): environment-specific values (database host, Redis URL, log level). Use pydantic BaseSettings.
    3. Layer 3 (secrets manager): sensitive values (API keys, database passwords, encryption keys). AWS Secrets Manager or Vault.
    4. Layer 4 (feature flags): runtime toggles (enable_new_payment_flow, max_export_rows). LaunchDarkly or simple Redis-backed.
    5. Precedence: secrets > env vars > config file > defaults.
    6. Validate ALL configuration at startup: fail fast if required config is missing.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, operations]
    concern: [meta_cognition]
  example_good: |
    from pydantic_settings import BaseSettings

    class Settings(BaseSettings):
        # Layer 1: Defaults
        page_size: int = 20
        request_timeout_seconds: int = 30

        # Layer 2: Env vars (required, no default)
        database_url: str
        redis_url: str
        environment: str  # "development", "staging", "production"

        # Layer 3: Secrets (loaded from secrets manager at startup)
        stripe_secret_key: str  # from AWS Secrets Manager
        jwt_private_key: str    # from AWS Secrets Manager

        # Layer 4: Feature flags (read from Redis at runtime)
        # Not here — separate FeatureFlagService

        class Config:
            env_file = ".env"
            env_file_encoding = "utf-8"

    # Validate at startup — fail fast if anything is missing
    settings = Settings()  # raises ValidationError if required fields missing
  example_bad: |
    # Configuration scattered everywhere:
    PAGE_SIZE = 20                                    # hardcoded
    DB_URL = os.getenv("DATABASE_URL", "sqlite:///")  # env var with dangerous default
    STRIPE_KEY = "sk_test_abc123"                      # SECRET HARDCODED IN SOURCE!
    # Some config in config.yaml, some in database, some in Redis
    # Nobody knows the precedence order
    # Missing config silently uses dangerous defaults
  when_applies: During project setup, configuration architecture, deployment planning
  sources: ["https://12factor.net/config"]

- id: PCC-015
  text: API versioning must be decided ONCE and applied consistently — mixing URL versioning (/v1/) and header versioning (Accept-Version) in the same API is a maintenance nightmare
  why: 'API versioning strategy affects every endpoint, every client SDK, every piece of documentation, and every deployment pipeline. Choosing one strategy and applying it consistently is far more important than choosing the "best" strategy. Real example: a team started with URL versioning (/v1/), then a new developer added header versioning for "mobile endpoints." Six months later, the API had 40 endpoints: 28 with URL versioning, 8 with header versioning, and 4 with no versioning. Client SDKs had to handle both. Documentation was inconsistent. Nobody knew which version of which endpoint was the latest.'
  how_to_do_right: |
    1. Choose ONE strategy: URL path (/api/v1/), query param (?version=1), or header (Accept-Version: v1).
    2. URL path is the most common and simplest: /api/v1/claims, /api/v2/claims.
    3. Apply to ALL endpoints, no exceptions.
    4. Version when breaking changes are needed: removing fields, changing types, changing behavior.
    5. Do NOT version for additive changes: adding optional fields, new endpoints, new query params.
    6. Maintain N-1 version: support current and previous version. Deprecate with 6-month sunset period.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, operations]
    concern: [meta_cognition]
  example_good: |
    from fastapi import APIRouter

    # URL versioning — consistent for all endpoints
    v1_router = APIRouter(prefix="/api/v1")
    v2_router = APIRouter(prefix="/api/v2")

    @v1_router.get("/claims/{id}")
    async def get_claim_v1(id: UUID) -> ClaimResponseV1:
        """V1: returns basic claim fields."""
        ...

    @v2_router.get("/claims/{id}")
    async def get_claim_v2(id: UUID) -> ClaimResponseV2:
        """V2: returns claim with evidence and score breakdown."""
        ...

    app.include_router(v1_router)  # supported until 2027-01-01
    app.include_router(v2_router)  # current version
  example_bad: |
    # Mixed versioning strategies:
    @app.get("/api/v1/claims")           # URL versioning
    @app.get("/api/users")               # No versioning
    @app.get("/api/payments")            # Header: Accept-Version: 2
    # Nobody knows which strategy to use for new endpoints
  when_applies: During API architecture, first endpoint design, breaking change planning
  sources: ["https://martinfowler.com/articles/richardsonMaturityModel.html"]

- id: PCC-016
  text: Database connection management must use connection pooling with proper min/max sizes, health checks, and leak detection — creating a new connection per request is a denial-of-service on your own database
  why: 'Database connections are expensive resources (TCP handshake, TLS negotiation, authentication, memory allocation). Creating one per request wastes 50-100ms per request and risks exhausting the database connection limit under load. Not closing connections leaks them until the database refuses new connections entirely. Real example: a service created a new PostgreSQL connection per request. Under normal load (50 req/s), this was fine. During a traffic spike (500 req/s), the database hit its max_connections limit (100). All subsequent requests failed with "too many connections." The fix was a connection pool (min=5, max=20) — 80% fewer connections, 50ms faster per request.'
  how_to_do_right: |
    1. Use a connection pool (SQLAlchemy, asyncpg pool, psycopg pool).
    2. Set pool_size (min connections): 5-10 for typical services.
    3. Set max_overflow (max beyond pool_size): 10-20 for burst handling.
    4. Set pool_timeout: 30 seconds (time to wait for a connection from the pool).
    5. Set pool_recycle: 3600 seconds (replace connections older than 1 hour to avoid stale connections).
    6. Enable pool health checks: test connections before handing them to application code.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, operations]
    concern: [meta_cognition]
  example_good: |
    from sqlalchemy.ext.asyncio import create_async_engine

    engine = create_async_engine(
        DATABASE_URL,
        pool_size=10,              # minimum connections
        max_overflow=20,           # burst capacity
        pool_timeout=30,           # wait for connection
        pool_recycle=3600,         # replace stale connections
        pool_pre_ping=True,        # health check before use
        echo=False,                # no SQL logging in production
    )
  example_bad: |
    import psycopg2

    @app.get("/api/v1/claims")
    async def list_claims():
        conn = psycopg2.connect(DATABASE_URL)  # new connection every request!
        cursor = conn.cursor()
        cursor.execute("SELECT * FROM claims")
        result = cursor.fetchall()
        conn.close()  # if exception above, connection leaks
        return result
  when_applies: During database setup, connection management, performance optimization
  sources: ["https://www.postgresql.org/docs/current/libpq-connect.html"]

- id: PCC-017
  text: Background job patterns must handle retries, dead letter queues, and idempotency — a fire-and-forget background task is a data loss waiting to happen
  why: 'Background jobs (email sending, report generation, webhook delivery) fail silently when they lack retry logic, dead letter queues, and idempotency. The caller assumes the job succeeded, but it may have failed due to transient errors, resource exhaustion, or bugs. Without retries, the job is lost. Without dead letter queues, permanently failing jobs block the queue. Without idempotency, retries create duplicates. Real example: an email sending job failed silently when the SMTP server was down for 30 minutes. 500 welcome emails were never sent. No alert fired. No retry happened. Users who signed up during that window never received their welcome email or activation link.'
  how_to_do_right: |
    1. Retry with exponential backoff: 1s, 2s, 4s, 8s, 16s (max 5 retries).
    2. Dead letter queue: after max retries, move the job to DLQ for manual inspection.
    3. Idempotency: each job has a unique ID; processing the same job twice produces the same result.
    4. Visibility timeout: if a worker dies mid-processing, the job becomes visible again after timeout.
    5. Monitoring: alert on DLQ depth > 0, alert on job age > SLA.
    6. Use established libraries: Celery, ARQ, Dramatiq, or Redis Streams with consumer groups.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, operations]
    concern: [meta_cognition]
  example_good: |
    import arq
    from arq.connections import RedisSettings

    async def send_welcome_email(ctx, user_id: str, idempotency_key: str):
        """Background job with idempotency and structured error handling."""
        if await already_processed(idempotency_key):
            return {"status": "skipped", "reason": "already_processed"}

        user = await get_user(user_id)
        await email_service.send(to=user.email, template="welcome")
        await mark_processed(idempotency_key)
        return {"status": "sent"}

    # ARQ config with retry and dead letter
    class WorkerSettings:
        functions = [send_welcome_email]
        redis_settings = RedisSettings()
        max_tries = 5
        retry_delay = 1  # exponential backoff: 1, 2, 4, 8, 16 seconds
  example_bad: |
    import threading

    @app.post("/api/v1/users")
    async def create_user(request: CreateUserRequest):
        user = await user_service.create(request)
        # Fire-and-forget — if email fails, nobody knows
        threading.Thread(target=send_email, args=(user.email,)).start()
        return user
    # Thread crashes silently, email never sent, no retry, no logging
  when_applies: During background job design, async processing, notification systems
  sources: ["https://12factor.net/backing-services"]

- id: PCC-018
  text: File upload handling must validate size, type, and content BEFORE processing — trusting the Content-Type header or file extension is a security vulnerability
  why: 'File uploads are one of the most dangerous attack vectors. Attackers rename malicious files (malware.exe -> photo.jpg), set fake Content-Type headers, embed scripts in image metadata, or upload files with path traversal in filenames. Real example: a document upload endpoint checked the file extension (.pdf) but not the content. An attacker uploaded a PHP shell with a .pdf extension. The file was stored in a web-accessible directory. When accessed via URL, the server executed the PHP code, giving the attacker full server access. Content validation (checking the file magic bytes) would have rejected the upload.'
  how_to_do_right: |
    1. Check file size BEFORE reading the full body: reject > max_size immediately (avoid OOM).
    2. Check magic bytes (file signature), not extension or Content-Type header.
    3. Sanitize filename: strip path separators, limit length, generate UUID-based names.
    4. Store files outside the web root or in object storage (S3), never in a directory served by the web server.
    5. Scan uploaded files for malware (ClamAV or cloud-based scanning).
    6. Set download Content-Disposition: attachment to prevent browser interpretation.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, operations]
    concern: [meta_cognition]
  example_good: |
    import magic
    from uuid import uuid4

    ALLOWED_TYPES = {"application/pdf": ".pdf", "image/jpeg": ".jpg", "image/png": ".png"}
    MAX_SIZE = 10 * 1024 * 1024  # 10MB

    @app.post("/api/v1/documents")
    async def upload_document(file: UploadFile):
        # 1. Check size before reading full content
        if file.size and file.size > MAX_SIZE:
            raise HTTPException(413, "File too large (max 10MB)")

        content = await file.read()
        if len(content) > MAX_SIZE:
            raise HTTPException(413, "File too large (max 10MB)")

        # 2. Check magic bytes, not extension or Content-Type
        detected_type = magic.from_buffer(content, mime=True)
        if detected_type not in ALLOWED_TYPES:
            raise HTTPException(415, f"Unsupported file type: {detected_type}")

        # 3. Generate safe filename (UUID, not user-provided name)
        safe_name = f"{uuid4()}{ALLOWED_TYPES[detected_type]}"

        # 4. Store in S3, not local filesystem
        await s3.upload(bucket="documents", key=safe_name, body=content)
        return {"document_id": safe_name}
  example_bad: |
    @app.post("/api/v1/documents")
    async def upload_document(file: UploadFile):
        # Trust filename (path traversal!), no size check, no content validation
        with open(f"uploads/{file.filename}", "wb") as f:  # file.filename = "../../etc/passwd"
            f.write(await file.read())  # reads entire file into memory, OOM on 10GB file
        return {"filename": file.filename}
  when_applies: During file upload endpoint design, document management, media handling
  sources: ["https://cheatsheetseries.owasp.org/cheatsheets/File_Upload_Cheat_Sheet.html"]

- id: PCC-019
  text: Webhook patterns must implement signature verification, replay protection, and idempotent processing — treating webhooks as trusted input is an injection vulnerability
  why: 'Webhooks are HTTP requests from external services to your API. Anyone can send a request that looks like a webhook. Without signature verification, an attacker can forge webhooks to create fake payments, fake subscriptions, or inject malicious data. Without replay protection, a captured webhook can be resent indefinitely. Without idempotent processing, retried webhooks create duplicates. Real example: a payment system processed Stripe webhooks without signature verification. An attacker sent a forged webhook claiming a R$10,000 payment was successful. The system created the order and shipped the product. Stripe signature verification (a 5-line check) would have rejected the forged webhook.'
  how_to_do_right: |
    1. Verify signature: Stripe uses HMAC-SHA256, GitHub uses HMAC-SHA256, each provider has its own scheme.
    2. Replay protection: check the timestamp in the webhook payload, reject if > 5 minutes old.
    3. Idempotent processing: use the webhook event_id as an idempotency key.
    4. Async processing: acknowledge the webhook immediately (return 200), process asynchronously.
    5. Retry handling: webhook providers retry on non-2xx responses, ensure your endpoint is idempotent.
    6. Logging: log every webhook received with event_id, event_type, timestamp (mask any PII).
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, operations]
    concern: [meta_cognition]
  example_good: |
    import stripe
    from fastapi import Request, HTTPException

    @app.post("/webhooks/stripe")
    async def stripe_webhook(request: Request):
        payload = await request.body()
        sig_header = request.headers.get("Stripe-Signature")

        # 1. Verify signature
        try:
            event = stripe.Webhook.construct_event(payload, sig_header, WEBHOOK_SECRET)
        except stripe.error.SignatureVerificationError:
            raise HTTPException(400, "Invalid signature")

        # 2. Replay protection (Stripe includes timestamp in signature)
        # 3. Idempotent processing
        if await already_processed(event["id"]):
            return {"status": "already_processed"}

        # 4. Async processing
        await job_queue.enqueue("process_stripe_event", event_id=event["id"], event=event)
        await mark_processed(event["id"])

        return {"status": "accepted"}  # 200 immediately
  example_bad: |
    @app.post("/webhooks/stripe")
    async def stripe_webhook(body: dict):
        # No signature verification — anyone can send fake webhooks
        # No replay protection — same webhook processed multiple times
        # Synchronous processing — slow processing causes webhook retries
        if body["type"] == "payment_intent.succeeded":
            await create_order(body["data"]["object"])  # forged webhook = free order
        return {"ok": True}
  when_applies: During webhook integration, payment processing, third-party integration
  sources: ["https://stripe.com/docs/webhooks/signatures"]

- id: PCC-020
  text: Email and notification patterns must use a queue, support templates, handle bounces, and respect opt-out — sending email synchronously in the request path blocks users and loses emails
  why: 'Sending notifications (email, SMS, push) synchronously in the request handler makes the response time dependent on the notification service. If the email server is slow (5 seconds), every request that triggers an email is slow. If the email server is down, those requests fail entirely. Real example: a registration endpoint sent a welcome email synchronously. When the SMTP server was slow (3-second response), the registration endpoint took 4 seconds instead of 200ms. During an SMTP outage, registrations failed with a 500 error. Users could not sign up because the email server was down — even though email was not required to complete registration.'
  how_to_do_right: |
    1. Async queue: enqueue notification jobs, process them in background workers.
    2. Templates: use Jinja2 or similar for email templates, stored in version control.
    3. Bounce handling: process bounce notifications, mark emails as invalid, stop sending to them.
    4. Opt-out: respect unsubscribe requests, implement List-Unsubscribe header, maintain suppression list.
    5. Rate limiting: respect provider limits (SES: 14 emails/sec default), implement queue throttling.
    6. Retry: transient failures (5xx) retry with backoff, permanent failures (4xx) go to DLQ.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, operations]
    concern: [meta_cognition]
  example_good: |
    from jinja2 import Environment, FileSystemLoader

    email_templates = Environment(loader=FileSystemLoader("templates/email"))

    @app.post("/api/v1/users")
    async def create_user(request: CreateUserRequest):
        user = await user_service.create(request)
        # Enqueue email — registration succeeds even if email fails
        await notification_queue.enqueue(
            "send_email",
            template="welcome",
            to=user.email,
            context={"name": user.name},
            idempotency_key=f"welcome:{user.id}",
        )
        return user  # 200ms response, email sends async

    # Background worker processes the queue:
    async def send_email(template: str, to: str, context: dict, idempotency_key: str):
        if await is_suppressed(to):  # bounce list / unsubscribed
            return {"status": "suppressed"}
        html = email_templates.get_template(f"{template}.html").render(context)
        await ses.send(to=to, subject=SUBJECTS[template], html=html)
  example_bad: |
    @app.post("/api/v1/users")
    async def create_user(request: CreateUserRequest):
        user = await user_service.create(request)
        # Synchronous email — blocks registration
        await smtp.send(to=user.email, subject="Welcome", body="Hello!")  # 3 seconds!
        return user  # if SMTP is down, registration fails
  when_applies: During notification system design, email integration, user communication flows
  sources: ["https://12factor.net/concurrency"]

- id: PCC-021
  text: Search implementation must distinguish between exact match, fuzzy match, and full-text search — using LIKE '%query%' on a SQL column is not a search engine
  why: 'Different search use cases require different implementations. Exact match (user lookup by email) needs a database index. Fuzzy match (product search with typos) needs Levenshtein or trigram similarity. Full-text search (document search across thousands of records) needs an inverted index (PostgreSQL full-text, Elasticsearch, Typesense). Using SQL LIKE for everything results in slow queries, no relevance ranking, and no typo tolerance. Real example: a product catalog with 500,000 items used LIKE ''%query%'' for search. A search for "camisa" took 12 seconds (full table scan). Adding a GIN index with pg_trgm brought it to 50ms. Switching to Typesense brought it to 5ms with typo tolerance and relevance ranking.'
  how_to_do_right: |
    1. Exact match: database index, direct lookup. Use for: email, ID, slug.
    2. Autocomplete: prefix search with pg_trgm index or dedicated search engine. Use for: search-as-you-type.
    3. Full-text search: PostgreSQL tsvector/tsquery or Elasticsearch. Use for: document search, article search.
    4. Fuzzy search: trigram similarity (pg_trgm) or Levenshtein distance. Use for: typo-tolerant search.
    5. Semantic search: vector embeddings (Qdrant, pgvector). Use for: natural language queries, "similar items."
    6. Choose based on dataset size: <10K rows: pg_trgm, <1M rows: PostgreSQL FTS, >1M rows: dedicated search engine.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, operations]
    concern: [meta_cognition]
  example_good: |
    # PostgreSQL full-text search with ranking
    from sqlalchemy import func

    @app.get("/api/v1/claims/search")
    async def search_claims(q: str, limit: int = 20):
        ts_query = func.plainto_tsquery("portuguese", q)
        results = await db.execute(
            select(Claim)
            .where(Claim.search_vector.op("@@")(ts_query))
            .order_by(func.ts_rank(Claim.search_vector, ts_query).desc())
            .limit(limit)
        )
        return results.scalars().all()

    # For typo-tolerant search, add pg_trgm:
    # CREATE INDEX idx_claim_title_trgm ON claims USING gin (title gin_trgm_ops);
    # SELECT * FROM claims WHERE title % 'camisa' ORDER BY similarity(title, 'camisa') DESC;
  example_bad: |
    @app.get("/api/v1/claims/search")
    async def search_claims(q: str):
        # Full table scan, no relevance, no typo tolerance
        return await db.execute(
            "SELECT * FROM claims WHERE title LIKE '%' || $1 || '%'", q
        )
        # 500K rows: 12-second query, no ranking, "camsia" returns 0 results
  when_applies: During search feature design, query optimization, user experience improvement
  sources: ["https://www.elastic.co/guide/en/elasticsearch/reference/current/full-text-queries.html"]

- id: PCC-022
  text: Audit trail must be append-only, tamper-evident, and queryable — a database table with an updated_at column is not an audit trail
  why: 'Audit trails serve legal, compliance, and forensic purposes. They must prove that specific actions were taken by specific actors at specific times. If the audit trail can be modified (UPDATE, DELETE), it cannot serve as evidence. Real example: during a fraud investigation, the security team needed to prove that a specific employee accessed a customer record on a specific date. The "audit log" was a database table with UPDATE permissions. The employee (who had database access) had already modified the log entries. The investigation was inconclusive because the audit trail was not tamper-evident. An append-only log with cryptographic chaining would have made tampering detectable.'
  how_to_do_right: |
    1. Append-only: INSERT only, no UPDATE or DELETE permissions on the audit table.
    2. Tamper-evident: hash chain (each entry includes hash of previous entry) or use a dedicated audit service.
    3. Queryable: index on actor_id, resource_type, resource_id, timestamp.
    4. Retention: define per-regulation (LGPD: as needed, financial: 5 years, healthcare: lifetime).
    5. Separate storage: audit logs in a separate database/service with different access controls.
    6. Include: actor_id, action, resource_type, resource_id, timestamp, ip, before_state, after_state.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, operations]
    concern: [meta_cognition]
  example_good: |
    import hashlib
    import json
    from datetime import datetime, timezone

    class AuditService:
        async def record(self, actor_id: str, action: str, resource_type: str,
                         resource_id: str, before: dict | None, after: dict | None):
            prev_hash = await self._get_last_hash()
            entry = {
                "actor_id": actor_id,
                "action": action,
                "resource_type": resource_type,
                "resource_id": resource_id,
                "before_state": before,
                "after_state": after,
                "timestamp": datetime.now(timezone.utc).isoformat(),
                "prev_hash": prev_hash,
            }
            entry["hash"] = hashlib.sha256(json.dumps(entry, sort_keys=True).encode()).hexdigest()
            await self.db.execute(
                "INSERT INTO audit_log (data, hash) VALUES ($1, $2)",
                json.dumps(entry), entry["hash"]
            )
            # Table: REVOKE UPDATE, DELETE ON audit_log FROM app_user;
  example_bad: |
    # "Audit log" with UPDATE and DELETE permissions
    await db.execute(
        "INSERT INTO logs (message) VALUES ($1)",
        f"User {user_id} did something"  # no structure, no before/after
    )
    # Anyone with DB access can: UPDATE logs SET message = 'nothing happened'
  when_applies: During audit trail design, compliance implementation, forensic readiness
  sources: ["https://cheatsheetseries.owasp.org/cheatsheets/Logging_Cheat_Sheet.html"]

- id: PCC-023
  text: Data export and import must use streaming for large datasets, validate on import, and support incremental operations — loading 1 million records into memory causes OOM, and importing without validation corrupts your database
  why: 'Naive export (SELECT * → JSON → response) and naive import (read entire file → INSERT all) fail at scale. Export of 1M records into a single JSON response requires gigabytes of memory and will OOM. Import without validation inserts corrupt, duplicate, or malicious data. Real example: a data export endpoint loaded 2 million records into a Python list, serialized to JSON, and returned the response. The server OOM-killed with 8GB of memory consumed. The fix was streaming: generate NDJSON line-by-line, never holding more than one record in memory. Memory usage dropped from 8GB to 50MB.'
  how_to_do_right: |
    1. Export: use streaming responses (StreamingResponse in FastAPI, NDJSON format).
    2. Import: stream the file line-by-line, validate each record, batch INSERT (1000 records per batch).
    3. Incremental export: support since_timestamp parameter to export only changed records.
    4. Incremental import: use upsert (INSERT ON CONFLICT UPDATE) to handle re-imports safely.
    5. Progress tracking: for long exports/imports, return a job_id and provide a status endpoint.
    6. Format: prefer NDJSON (one JSON object per line) over single JSON array — it is streamable and resumable.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, operations]
    concern: [meta_cognition]
  example_good: |
    from fastapi.responses import StreamingResponse
    import json

    @app.get("/api/v1/claims/export")
    async def export_claims(since: datetime | None = None):
        async def generate():
            async for claim in claim_repo.stream(since=since, batch_size=1000):
                yield json.dumps(claim.dict()) + "\n"  # NDJSON: one record per line

        return StreamingResponse(
            generate(),
            media_type="application/x-ndjson",
            headers={"Content-Disposition": "attachment; filename=claims.ndjson"},
        )

    @app.post("/api/v1/claims/import")
    async def import_claims(file: UploadFile):
        job_id = str(uuid4())
        await import_queue.enqueue("import_claims", job_id=job_id, file_key=await store_temp(file))
        return {"job_id": job_id, "status_url": f"/api/v1/jobs/{job_id}"}
  example_bad: |
    @app.get("/api/v1/claims/export")
    async def export_claims():
        claims = await db.fetch_all("SELECT * FROM claims")  # 2M records into memory
        return claims  # 8GB JSON response, OOM
  when_applies: During data export/import design, bulk operations, migration tools
  sources: ["https://fastapi.tiangolo.com/advanced/custom-response/#streamingresponse"]

- id: PCC-024
  text: Backup strategy must define RPO (Recovery Point Objective) and RTO (Recovery Time Objective) BEFORE the first production deployment — backups without tested restore are just storage waste
  why: 'Backups that are never tested are not backups — they are assumptions. RPO defines how much data you can afford to lose (last 1 hour? last 5 minutes?). RTO defines how long the system can be down (4 hours? 15 minutes?). Without these targets, backup frequency and restore procedures are arbitrary. Real example: a company did daily backups at midnight. At 11:30 PM, the database was accidentally dropped. The latest backup was 23.5 hours old. They lost an entire day of transactions (RPO was actually 24 hours but nobody had agreed to that). The restore took 6 hours because nobody had practiced the procedure (RTO was actually 6 hours but the SLA said 1 hour).'
  how_to_do_right: |
    1. Define RPO per data tier: financial transactions = 5 min (WAL streaming), user profiles = 1 hour, analytics = 24 hours.
    2. Define RTO per service: payment API = 15 min, user portal = 1 hour, internal tools = 4 hours.
    3. Implement backup schedule matching RPO: continuous WAL for 5-min RPO, hourly snapshots for 1-hour RPO.
    4. Test restore monthly: actually restore from backup to a test environment and verify data integrity.
    5. Document restore procedure: step-by-step, with estimated time per step.
    6. Separate backup storage: backups in a different region/account from production (protect against account compromise).
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, operations]
    concern: [meta_cognition]
  example_good: |
    # Backup Strategy Document
    # | Data Tier        | RPO     | Backup Method                    | RTO     | Last Test   |
    # |------------------|---------|----------------------------------|---------|-------------|
    # | Transactions DB  | 5 min   | Continuous WAL + hourly snapshot | 15 min  | 2026-02-15  |
    # | User profiles    | 1 hour  | Hourly pg_dump to S3             | 1 hour  | 2026-02-15  |
    # | Uploaded files   | 24 hours| S3 cross-region replication      | 4 hours | 2026-02-01  |
    # | Redis cache      | N/A     | No backup (rebuild from DB)      | 5 min   | N/A         |
    #
    # Restore procedure: docs/runbooks/DATABASE_RESTORE.md
    # Last full restore test: 2026-02-15 (completed in 12 minutes, RTO met)
    # Next scheduled test: 2026-03-15
  example_bad: |
    # "We have backups"
    # Frequency: daily (at midnight)
    # Storage: same server as production
    # Last restore test: never
    # RPO: "daily" (actually 24 hours — acceptable?)
    # RTO: "we'll figure it out" (actually 6 hours when tested under pressure)
  when_applies: During infrastructure design, disaster recovery planning, compliance reviews
  sources: ["https://sre.google/sre-book/data-integrity/"]

- id: PCC-025
  text: Deployment checklist must cover database migrations, feature flags, rollback plan, monitoring, and communication BEFORE pushing the button — deploying without a checklist is deploying blind
  why: 'Deployments are the highest-risk moment in the software lifecycle. A forgotten migration, a missing environment variable, or a disabled feature flag can take down production. A deployment checklist ensures nothing is missed. Real example: a deploy went out with a new endpoint that required a database migration. The migration was not included in the deployment. The endpoint returned 500 errors because the new column did not exist. It took 45 minutes to diagnose (the error message was "column xyz does not exist" buried in a stack trace). A 30-second checklist item "migrations included?" would have caught this.'
  how_to_do_right: |
    1. Pre-deploy: migrations applied in staging, feature flags configured, env vars set, rollback plan documented.
    2. Deploy: canary deployment (5% traffic), monitor error rate and latency for 10 minutes.
    3. Post-deploy: smoke test critical endpoints, verify metrics dashboard, check error logs.
    4. Rollback criteria: error rate > 1%, p99 latency > 2x baseline, any critical alert.
    5. Communication: notify team in Slack before deploy, after success, or on rollback.
    6. Automate the checklist: CI/CD pipeline enforces migration check, env var check, and smoke test.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, operations]
    concern: [meta_cognition]
  example_good: |
    # Deployment Checklist — v2.3.0
    #
    # PRE-DEPLOY:
    # [x] Database migrations: 001_add_payments_table (applied in staging, tested rollback)
    # [x] Environment variables: STRIPE_WEBHOOK_SECRET added in production
    # [x] Feature flags: ENABLE_PAYMENTS=false (will enable after smoke test)
    # [x] Rollback plan: revert to v2.2.0, run migration down 001
    # [x] Monitoring: Grafana dashboard for payments endpoint added
    #
    # DEPLOY:
    # [x] Canary: 5% traffic for 10 minutes — error rate 0%, p99 250ms (baseline 230ms)
    # [x] Full rollout: 100% traffic
    #
    # POST-DEPLOY:
    # [x] Smoke test: POST /api/v1/payments returns 201 (with test card)
    # [x] Error logs: no new errors in last 10 minutes
    # [x] Feature flag: ENABLE_PAYMENTS=true (payments now live)
    # [x] Communication: #deploys "v2.3.0 deployed, payments live"
  example_bad: |
    # "Just deploy it"
    # git push origin main → auto-deploy
    # New endpoint returns 500 (migration missing)
    # Nobody monitors for 2 hours
    # Customer reports the error
    # 45 minutes to diagnose "column xyz does not exist"
  when_applies: During deployment planning, CI/CD pipeline design, release management
  sources: ["https://sre.google/sre-book/release-engineering/"]
