layer: rules
domain: sacada
knowledge:
- id: PCC-001
  text: LGPD/GDPR compliance is not a feature you add later — it is a data architecture constraint that must be embedded from the first migration
  why: 'Retrofitting privacy compliance onto an existing system is 10-50x more expensive than building it in from the start. Data flows, retention policies, and deletion cascades must be baked into the schema and services from day one. Real example: a SaaS company built 200 endpoints over 18 months. When a customer demanded LGPD data deletion, they discovered PII was spread across 47 tables, 12 Redis caches, 3 Elasticsearch indices, 8 log systems, and 4 third-party analytics tools. The "right to deletion" endpoint took 4 months to implement, touching 120 files. If they had designed with PII isolation from the start, it would have been 2 tables and 1 endpoint.'
  how_to_do_right: |
    1. Create a PII registry (table/column -> classification -> retention -> deletion cascade) BEFORE writing any migration.
    2. Isolate PII in dedicated tables: user_pii (name, email, cpf) separate from user_settings (theme, language).
    3. Use a single deletion service that cascades to all PII stores: DB, cache, search, logs, analytics.
    4. Implement consent management as a core service, not an afterthought.
    5. Log access to PII fields (who read what, when) for audit trail.
    6. Mask PII in non-production environments: staging uses anonymized data, never production copies.
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, operations]
    concern: [meta_cognition]
  example_good: |
    # PII-isolated schema:
    # users (id, created_at, role, is_active)          -- non-PII
    # user_pii (user_id FK, name, email, cpf, phone)   -- PII, separate table
    # user_consents (user_id FK, purpose, granted_at, revoked_at)

    class PIIDeletionService:
        """Cascade PII deletion to all stores."""
        async def delete_user_pii(self, user_id: UUID):
            await self.db.delete("user_pii", user_id=user_id)
            await self.cache.delete(f"user_pii:{user_id}")
            await self.search.delete_document("users", user_id)
            await self.analytics.anonymize(user_id)
            audit_log.info("pii.deleted", user_id=str(user_id))
  example_bad: |
    # PII mixed everywhere:
    # users (id, name, email, cpf, theme, language, role, is_active)
    # orders (id, user_name, user_email, user_cpf, ...)  -- PII duplicated!
    # logs: "User gustavo@email.com created order 123"   -- PII in logs!
    # DELETE endpoint: "We'll add it when someone asks"
  when_applies: During database schema design, first migration, data architecture reviews
  sources: ["https://www.planalto.gov.br/ccivil_03/_ato2015-2018/2018/lei/l13709.htm", "https://gdpr-info.eu/"]

- id: PCC-002
  text: Brazilian i18n is not just translation — it is date formats (dd/mm/yyyy), currency (R$ with comma decimals), CPF/CNPJ validation, timezone (UTC-3 BRT), and address structure (CEP, estado, cidade)
  why: 'Treating Brazilian localization as "translate strings to Portuguese" misses the structural differences that break parsing, validation, and display. Real example: a system stored dates as mm/dd/yyyy (US format). Brazilian users entered 01/02/2026 meaning February 1st. The system parsed it as January 2nd. For 11 months of the year, dates were silently wrong. Nobody noticed until a report showed transactions on dates that did not exist (month 13+ edge cases). The fix required migrating 2 years of data with ambiguous dates.'
  how_to_do_right: |
    1. Dates: store as ISO 8601 UTC internally, display as dd/mm/yyyy for PT-BR locale.
    2. Currency: store as integer centavos internally, display as R$ 1.234,56 (dot for thousands, comma for decimals).
    3. CPF validation: 11 digits + 2 check digits (modulo 11 algorithm). Validate on input, store without punctuation.
    4. CNPJ validation: 14 digits + 2 check digits. Validate on input, store without punctuation.
    5. Timezone: store UTC, display BRT (UTC-3) or BRST (UTC-2 during daylight saving — abolished since 2019 but may return).
    6. Address: CEP (8 digits), logradouro, numero, complemento, bairro, cidade, estado (UF 2-letter code).
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, operations]
    concern: [meta_cognition]
  example_good: |
    from decimal import Decimal
    import re

    def format_brl(centavos: int) -> str:
        """Format integer centavos as R$ display string."""
        reais = Decimal(centavos) / 100
        # R$ 1.234,56 (dot thousands, comma decimals)
        formatted = f"{reais:,.2f}".replace(",", "X").replace(".", ",").replace("X", ".")
        return f"R$ {formatted}"

    def validate_cpf(cpf: str) -> bool:
        """Validate CPF with check digits (modulo 11)."""
        cpf = re.sub(r"\D", "", cpf)
        if len(cpf) != 11 or len(set(cpf)) == 1:
            return False
        for i in range(9, 11):
            val = sum((cpf_digit := int(cpf[num])) * ((i + 1) - num) for num in range(0, i))
            digit = ((val * 10) % 11) % 10
            if digit != int(cpf[i]):
                return False
        return True

    # Date display: dd/mm/yyyy
    from datetime import datetime
    dt = datetime(2026, 2, 1)
    display = dt.strftime("%d/%m/%Y")  # "01/02/2026" = 1 de fevereiro
  example_bad: |
    # Store dates as mm/dd/yyyy
    # User enters "01/02/2026" → parsed as January 2nd (wrong! it's February 1st)

    # Display currency as $1,234.56
    # Brazilian user reads "R$1.234,56" but sees "$1,234.56" — confusion

    # No CPF validation — accept "000.000.000-00" (invalid)
  when_applies: During i18n setup, form validation, display formatting, database schema design for Brazilian products
  sources: ["https://docs.python.org/3/library/locale.html"]

- id: PCC-003
  text: Accessibility (WCAG 2.1 AA) is not optional decoration — it is a legal requirement in many jurisdictions and affects 15-20% of your users
  why: 'Accessibility is not a feature for "disabled people" — it affects anyone using a screen reader, keyboard-only navigation, high contrast mode, slow connections, or small screens. 15-20% of users have some form of disability. In Brazil, Lei 13.146/2015 (Estatuto da Pessoa com Deficiencia) requires digital accessibility. Real example: a government portal launched without accessibility. A visually impaired citizen filed a complaint. The portal was fined R$50,000 and given 90 days to comply. The retrofit cost R$200,000 and 3 months of development — 10x what it would have cost to build it accessible from the start.'
  how_to_do_right: |
    1. WCAG 2.1 AA minimum: sufficient color contrast (4.5:1 for text), keyboard navigation, screen reader compatibility, focus indicators.
    2. Semantic HTML: use <button>, <nav>, <main>, <header> — not <div> with onclick.
    3. ARIA labels: every interactive element must have an accessible name.
    4. Alt text: every informational image must have descriptive alt text.
    5. Form labels: every input must have an associated <label> element.
    6. Test with screen reader (VoiceOver on Mac, NVDA on Windows) at least once per sprint.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, operations]
    concern: [meta_cognition]
  example_good: |
    <!-- Accessible form with proper labels, ARIA, and keyboard support -->
    <form role="form" aria-label="Cadastro de usuario">
      <label for="name">Nome completo</label>
      <input id="name" type="text" required aria-required="true" autocomplete="name" />

      <label for="cpf">CPF</label>
      <input id="cpf" type="text" required aria-required="true"
             pattern="\d{3}\.\d{3}\.\d{3}-\d{2}"
             aria-describedby="cpf-help" />
      <span id="cpf-help">Formato: 123.456.789-00</span>

      <button type="submit">Cadastrar</button>
    </form>
  example_bad: |
    <!-- Inaccessible: no labels, no ARIA, div instead of button -->
    <div>
      <div>Nome</div>
      <input type="text" />
      <div>CPF</div>
      <input type="text" />
      <div onclick="submit()" style="cursor: pointer;">Cadastrar</div>
    </div>
  when_applies: During frontend development, UI design reviews, accessibility audits
  sources: ["https://www.w3.org/WAI/WCAG21/quickref/"]

- id: PCC-004
  text: Idempotency is not optional for any state-changing operation — without idempotency keys, network retries create duplicate records, double charges, and data corruption
  why: 'Networks are unreliable. Clients retry requests. Load balancers timeout and resend. Mobile apps lose connectivity mid-request. Without idempotency, every retry creates a new side effect. Real example: a payment endpoint had no idempotency. A mobile client submitted a R$500 payment, the server processed it, but the response was lost due to a network timeout. The client retried. The server processed it again. The customer was charged R$1,000. The dispute resolution cost the company R$500 plus customer trust. A simple idempotency key would have prevented the duplicate charge.'
  how_to_do_right: |
    1. Every POST/PUT/DELETE endpoint must accept an Idempotency-Key header (client-generated UUID).
    2. Store the idempotency key with the result: {key: UUID, response: JSON, created_at: datetime, expires_at: datetime}.
    3. On duplicate key: return the stored response without re-executing the operation.
    4. Key expiry: 24 hours (configurable per endpoint). After expiry, same key is treated as new.
    5. Key scope: per-user + per-endpoint. Same key on different endpoints is different.
    6. Implement at-least-once + dedup, not exactly-once (which is impossible in distributed systems).
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, operations]
    concern: [meta_cognition]
  example_good: |
    from uuid import UUID
    from fastapi import Header, HTTPException

    @app.post("/api/v1/payments")
    async def create_payment(
        request: PaymentRequest,
        idempotency_key: UUID = Header(..., alias="Idempotency-Key"),
        user: AuthUser = Depends(require_auth),
    ):
        # Check for existing result
        existing = await idempotency_store.get(
            key=idempotency_key, user_id=user.id, endpoint="create_payment"
        )
        if existing:
            return JSONResponse(status_code=existing.status_code, content=existing.body)

        # Process the payment
        result = await payment_service.create(request)

        # Store the result for future retries
        await idempotency_store.save(
            key=idempotency_key, user_id=user.id, endpoint="create_payment",
            status_code=201, body=result.dict(), expires_in=timedelta(hours=24),
        )
        return result
  example_bad: |
    @app.post("/api/v1/payments")
    async def create_payment(request: PaymentRequest):
        # No idempotency key — every request creates a new payment
        return await payment_service.create(request)
        # Client retries on timeout → double charge
  when_applies: During API design for any state-changing endpoint, payment processing, order creation
  sources: ["https://stripe.com/docs/api/idempotent_requests"]

- id: PCC-005
  text: Structured logging with JSON format and request_id propagation is the MINIMUM — unstructured logs are unsearchable, uncorrelatable, and useless during incidents
  why: 'Unstructured logs (print statements, f-strings) cannot be searched, filtered, aggregated, or correlated across services. During an incident, you need to find all log lines for a specific request across all services in under 30 seconds. With unstructured logs, this is impossible. Real example: during a production incident, the team needed to trace a failed payment through 5 microservices. Each service logged differently: one used print(), another used logging.info() with custom format, a third used JSON but different field names. Finding the 47 relevant log lines took 2 hours. With structured JSON logs and request_id propagation, it would have taken one Kibana query: request_id="abc-123".'
  how_to_do_right: |
    1. Use structlog or python-json-logger for JSON-formatted logs.
    2. Every log line must include: timestamp (ISO 8601 UTC), level, message, service_name, request_id.
    3. Propagate request_id from the first service to all downstream services via headers.
    4. Add contextual fields: user_id (if authenticated), endpoint, method, duration_ms.
    5. Scrub PII from logs: never log email, CPF, tokens, passwords. Use masking: cpf=***.456.***-**.
    6. Use log levels correctly: DEBUG (dev only), INFO (business events), WARNING (recoverable issues), ERROR (failures), CRITICAL (system down).
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, operations]
    concern: [meta_cognition]
  example_good: |
    import structlog
    from uuid import uuid4

    logger = structlog.get_logger()

    @app.middleware("http")
    async def add_request_id(request: Request, call_next):
        request_id = request.headers.get("X-Request-ID", str(uuid4()))
        structlog.contextvars.bind_contextvars(request_id=request_id)
        response = await call_next(request)
        response.headers["X-Request-ID"] = request_id
        return response

    # Every log line automatically includes request_id:
    # {"timestamp": "2026-02-26T10:30:00Z", "level": "info", "event": "payment.created",
    #  "request_id": "abc-123", "user_id": "usr-456", "amount": 4999, "service": "payments"}
  example_bad: |
    # Unstructured, no request_id, PII in logs
    print(f"User gustavo@email.com created payment for R$49.99")
    # Cannot search by request, cannot correlate across services, PII leaked
  when_applies: During logging setup, middleware configuration, service initialization
  sources: ["https://www.structlog.org/en/stable/"]

- id: PCC-006
  text: PII scrubbing in logs must be AUTOMATIC, not manual — developers will forget to mask sensitive data, so the logging pipeline must strip it
  why: 'Every developer who writes a log statement is a potential PII leak. Manual scrubbing ("remember to mask the CPF before logging") fails at scale because developers forget, are unaware of what constitutes PII, or add new PII fields without updating scrubbing rules. Real example: a developer logged the entire request body for debugging. The request body contained name, email, CPF, and credit card number. The logs were stored in Elasticsearch with 90-day retention and were accessible to 40 engineers. This was a LGPD violation discovered during an audit. The fix required deleting 90 days of logs and rebuilding the log pipeline with automatic scrubbing.'
  how_to_do_right: |
    1. Implement a log processor that automatically detects and masks PII patterns: CPF, CNPJ, email, phone, credit card.
    2. Use regex patterns: CPF (\d{3}\.?\d{3}\.?\d{3}-?\d{2}), email (\S+@\S+), card (\d{4}[\s-]?\d{4}[\s-]?\d{4}[\s-]?\d{4}).
    3. Register PII field names: any log field named email, cpf, phone, card_number, password is auto-masked.
    4. Apply scrubbing at the log sink level (structlog processor), not at the log call site.
    5. Test scrubbing: write tests that log known PII patterns and verify they are masked in output.
    6. Alert on PII detection: if the scrubber finds patterns, also alert the security team.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, operations]
    concern: [meta_cognition]
  example_good: |
    import re
    import structlog

    PII_PATTERNS = {
        "cpf": (re.compile(r"\d{3}\.?\d{3}\.?\d{3}-?\d{2}"), "***.***.***-**"),
        "email": (re.compile(r"\S+@\S+\.\S+"), "***@***.***"),
        "card": (re.compile(r"\d{4}[\s-]?\d{4}[\s-]?\d{4}[\s-]?\d{4}"), "****-****-****-****"),
    }

    def scrub_pii(logger, method_name, event_dict):
        """Structlog processor that auto-scrubs PII from all log fields."""
        for key, value in event_dict.items():
            if isinstance(value, str):
                for pii_name, (pattern, mask) in PII_PATTERNS.items():
                    value = pattern.sub(mask, value)
                event_dict[key] = value
        return event_dict

    structlog.configure(processors=[scrub_pii, structlog.dev.ConsoleRenderer()])
  example_bad: |
    # Manual scrubbing — developer must remember every time
    logger.info("User created", email=mask_email(user.email), cpf=mask_cpf(user.cpf))
    # Next developer forgets:
    logger.info("Payment failed", user_data=user.__dict__)  # leaks ALL PII
  when_applies: During logging pipeline setup, security audits, LGPD compliance reviews
  sources: ["https://cheatsheetseries.owasp.org/cheatsheets/Logging_Cheat_Sheet.html"]

- id: PCC-007
  text: Observability requires the three pillars — metrics, traces, and logs — correlated by request_id and trace_id. Having only logs is flying blind.
  why: 'Logs tell you WHAT happened. Metrics tell you HOW MUCH happened. Traces tell you WHERE it happened. Without all three, incident diagnosis is guesswork. Real example: a team had logs but no metrics or traces. They knew "payment failed" (log) but not how many payments were failing (metric) or which service in the chain caused the failure (trace). They spent 3 hours grepping logs to estimate the blast radius. With metrics, they would have seen the failure spike instantly. With traces, they would have identified the failing service in 30 seconds.'
  how_to_do_right: |
    1. Metrics: Use Prometheus/OpenTelemetry for counters (requests, errors), histograms (latency), gauges (queue depth).
    2. Traces: Use OpenTelemetry for distributed tracing across services. Every request gets a trace_id.
    3. Logs: Use structlog with JSON format, include trace_id and span_id in every log line.
    4. Correlation: request_id + trace_id must be present in all three signals.
    5. Dashboards: Grafana with pre-built dashboards for RED metrics (Rate, Errors, Duration) per endpoint.
    6. Alerting: alert on error rate > 1%, p99 latency > 2s, queue depth > 1000.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, operations]
    concern: [meta_cognition]
  example_good: |
    from opentelemetry import trace, metrics
    from opentelemetry.instrumentation.fastapi import FastAPIInstrumentor
    import structlog

    # Traces: auto-instrument FastAPI
    FastAPIInstrumentor.instrument_app(app)

    # Metrics: custom business metrics
    meter = metrics.get_meter("payments")
    payment_counter = meter.create_counter("payments.created", description="Payments created")
    payment_latency = meter.create_histogram("payments.latency_ms", description="Payment creation latency")

    # Logs: include trace context
    @app.post("/api/v1/payments")
    async def create_payment(request: PaymentRequest):
        span = trace.get_current_span()
        logger.info("payment.creating", trace_id=span.get_span_context().trace_id)
        with payment_latency.record():
            result = await payment_service.create(request)
        payment_counter.add(1, {"status": "success"})
        return result
  example_bad: |
    # Only logs, no metrics, no traces
    @app.post("/api/v1/payments")
    async def create_payment(request: PaymentRequest):
        print(f"Creating payment: {request}")  # unstructured log
        result = await payment_service.create(request)
        print(f"Payment created: {result}")
        return result
    # Incident: "Payments are slow" — how slow? how many? which service? Nobody knows.
  when_applies: During service initialization, observability setup, incident response planning
  sources: ["https://opentelemetry.io/docs/"]

- id: PCC-008
  text: Error handling must produce THREE outputs — a user-facing message (safe, translated), a developer log (detailed, with context), and an error code (stable, documented) — never just one
  why: 'Errors that only produce one output fail in different contexts. A Python stack trace shown to users is confusing and leaks implementation details. A user-friendly message without an error code makes support impossible ("the screen said something went wrong"). A log without context makes debugging impossible. Real example: a payment error returned "Unexpected error" to the user, logged "Exception in create_payment," and had no error code. Support received 50 tickets saying "payment failed." Without an error code, they could not categorize the failures. Without detailed logs, developers could not diagnose. The fix required adding error codes, detailed logging, AND user messages — a 3-day rework of every error path.'
  how_to_do_right: |
    1. Define an error code registry: PAY-001 (insufficient funds), PAY-002 (card declined), PAY-003 (timeout), etc.
    2. User message: translated, safe, actionable. "Payment declined. Please check your card details or try another payment method."
    3. Developer log: full context. error_code, user_id, amount, card_last4, stripe_error_code, stack trace.
    4. API response: {"error_code": "PAY-002", "message": "Pagamento recusado", "request_id": "abc-123"}.
    5. Never expose stack traces, internal paths, or database errors in API responses.
    6. Map external errors to internal codes: Stripe "card_declined" -> PAY-002, Stripe "insufficient_funds" -> PAY-001.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, operations]
    concern: [meta_cognition]
  example_good: |
    class AppError(Exception):
        def __init__(self, code: str, user_message: str, dev_detail: str):
            self.code = code
            self.user_message = user_message
            self.dev_detail = dev_detail

    @app.exception_handler(AppError)
    async def app_error_handler(request: Request, exc: AppError):
        logger.error("app_error", error_code=exc.code, detail=exc.dev_detail,
                      request_id=request.state.request_id, user_id=request.state.user_id)
        return JSONResponse(
            status_code=400,
            content={"error_code": exc.code, "message": exc.user_message,
                      "request_id": request.state.request_id},
        )

    # Usage:
    raise AppError(
        code="PAY-002",
        user_message="Pagamento recusado. Verifique os dados do cartao.",
        dev_detail=f"Stripe declined: {stripe_error.code}, card_last4={card.last4}",
    )
  example_bad: |
    @app.post("/api/v1/payments")
    async def create_payment(request: PaymentRequest):
        try:
            return await payment_service.create(request)
        except Exception as e:
            return {"error": str(e)}  # leaks internals, no error code, no log
  when_applies: During error handling design, API response design, support workflow planning
  sources: ["https://martinfowler.com/articles/replaceThrowWithNotification.html"]

- id: PCC-009
  text: Rate limiting must use token bucket for burst tolerance and sliding window for sustained load — fixed window rate limiting has a burst-at-boundary vulnerability
  why: 'Fixed window rate limiting (e.g., 100 requests per minute) has a well-known vulnerability: a client can send 100 requests at 11:59:59 and 100 more at 12:00:01, effectively getting 200 requests in 2 seconds. Token bucket allows controlled bursts while maintaining average rate. Sliding window prevents the boundary exploit. Real example: an API used fixed window rate limiting of 60 req/min. An attacker discovered the window boundary and sent 60 requests at the end of each window and 60 at the start of the next. They achieved 120 req/min sustained — double the intended limit. The brute-force attack on the login endpoint succeeded because the effective rate limit was twice what was configured.'
  how_to_do_right: |
    1. Token bucket: set rate (tokens per second) and burst size (max tokens). Client can burst up to burst_size then limited to rate.
    2. Sliding window: track requests in the last N seconds, not in fixed time blocks.
    3. Per-identity: separate buckets for each user_id, IP, or API key.
    4. Per-endpoint: different limits for different endpoints (login=5/min, search=60/min, export=1/hour).
    5. Response: HTTP 429 with Retry-After header (seconds until next request is allowed).
    6. Store state in Redis: INCR + EXPIRE for sliding window, or Redis Cell for token bucket.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, operations]
    concern: [meta_cognition]
  example_good: |
    import redis
    from time import time

    class SlidingWindowRateLimiter:
        """Sliding window rate limiter using Redis sorted sets."""

        def __init__(self, redis_client: redis.Redis, limit: int, window_seconds: int):
            self.redis = redis_client
            self.limit = limit
            self.window = window_seconds

        async def is_allowed(self, identity: str) -> tuple[bool, int]:
            key = f"rate:{identity}"
            now = time()
            pipe = self.redis.pipeline()
            pipe.zremrangebyscore(key, 0, now - self.window)  # remove expired
            pipe.zadd(key, {str(now): now})                    # add current
            pipe.zcard(key)                                    # count in window
            pipe.expire(key, self.window)                      # auto-cleanup
            _, _, count, _ = pipe.execute()
            remaining = max(0, self.limit - count)
            return count <= self.limit, remaining
  example_bad: |
    # Fixed window — vulnerable to burst-at-boundary
    request_counts = {}  # {"user:123": {"count": 50, "window_start": 1708900000}}

    def check_rate_limit(user_id: str) -> bool:
        window = int(time()) // 60  # fixed 1-minute windows
        key = f"{user_id}:{window}"
        request_counts[key] = request_counts.get(key, 0) + 1
        return request_counts[key] <= 60
        # Attacker sends 60 at 11:59:59 + 60 at 12:00:00 = 120 in 1 second
  when_applies: During rate limiting implementation, API security design, load testing
  sources: ["https://sre.google/sre-book/handling-overload/"]

- id: PCC-010
  text: Cursor-based pagination is the ONLY correct choice for mutable datasets — offset pagination breaks when records are inserted or deleted between pages
  why: 'Offset pagination (LIMIT 10 OFFSET 20) skips or duplicates records when data changes between page fetches. If a record is inserted before the current offset, the next page shows a duplicate. If a record is deleted, the next page skips one. For immutable datasets (historical reports), offset works fine. For live data (user feeds, search results, logs), cursor-based pagination is essential. Real example: a user scrolled through a 50-page claim list. Between page 3 and page 4, a new claim was inserted at the top. Page 4 showed the last item from page 3 again. The user reported a "duplicate claim" bug that took 2 days to diagnose.'
  how_to_do_right: |
    1. Use cursor-based pagination: "give me 10 items after cursor X" (cursor = last item's sort key).
    2. Cursor is opaque to client: base64-encode the sort key + direction.
    3. Response includes: items, next_cursor (null if last page), has_more boolean.
    4. Support forward and backward navigation: after_cursor, before_cursor.
    5. Always sort by a stable, unique key: created_at + id (not just created_at — ties exist).
    6. Use offset pagination ONLY for immutable datasets or when total count is required (with explicit warning in docs).
  severity: high
  technologies:
