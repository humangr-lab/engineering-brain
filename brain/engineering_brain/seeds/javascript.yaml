layer: rules
technology: JavaScript
domain: web
knowledge:
- id: CR-JS-DOM-001
  text: Always use getElementById/querySelector with null checks before manipulating DOM elements.
  why: 'If the element doesn''t exist (typo in ID, element not rendered yet, conditional rendering), accessing .value or .innerHTML
    throws TypeError: Cannot read property of null.'
  how_to_do_right: Check element existence before use. Use optional chaining (el?.value) or guard clause (if (!el) return).
    Consider using data attributes for reliable element targeting.
  severity: high
  technologies:
    lang: [javascript, html]
    library: [dom]
  domains:
    domain: [architecture, ui]
    concern: [web, frontend]
  example_good: "const el = document.getElementById('submit-btn');\nif (el) {\n    el.addEventListener('click', handleSubmit);\n\
    }\n"
  example_bad: '// Crashes if element doesn''t exist

    document.getElementById(''submit-btn'').addEventListener(''click'', handleSubmit);

    '
  when_applies: Projects using JavaScript/TypeScript projects, HTML document structure, or DOM
  when_not_applies: CLI tools, batch scripts, or backend services with no HTTP interface
  sources: ["https://developer.mozilla.org/en-US/docs/Web/API/Document/getElementById"]
- id: CR-JS-DOM-002
  text: Event listeners must be cleaned up when components are removed from DOM.
  why: Orphaned event listeners cause memory leaks and ghost behavior — clicking a removed button still triggers the old handler
    if the listener wasn't removed.
  how_to_do_right: Use AbortController for cleanup, or store handler references for removeEventListener. In frameworks, use
    lifecycle hooks (useEffect cleanup, disconnectedCallback).
  severity: medium
  technologies:
    lang: [javascript]
    library: [dom]
  domains:
    domain: [architecture, ui, performance]
    concern: [web, frontend]
  when_applies: Projects using JavaScript/TypeScript projects or DOM
  when_not_applies: CLI tools, batch scripts, or backend services with no HTTP interface. projects not using JavaScript or
    DOM
  example_good: |
    const controller = new AbortController();
    el.addEventListener('click', handler, { signal: controller.signal });
    // Cleanup: controller.abort(); removes all listeners
  example_bad: |
    el.addEventListener('click', () => doSomething());
    // Anonymous function — cannot be removed with removeEventListener
    // Memory leak when element is removed from DOM
  sources: ["https://developer.mozilla.org/en-US/docs/Web/API/EventTarget/removeEventListener"]
- id: CR-JS-DOM-003
  text: HTML IDs referenced in JavaScript must match exactly — cross-reference during development.
  why: A typo in an element ID silently returns null. getElementById('submitBtn') vs id='submit-btn' causes silent failure
    — no error, just nothing happens.
  how_to_do_right: Use constants for shared IDs. Or use data-* attributes which are more explicit about JS binding intent.
  severity: high
  technologies:
    lang: [javascript, html]
  domains:
    domain: [architecture, ui]
    concern: [web, frontend]
  example_good: '<!-- HTML --> <button id="submit-btn" data-action="submit">Submit</button>

    // JS: document.querySelector(''[data-action="submit"]'')

    '
  example_bad: '<!-- HTML --> <button id="submit-btn">Submit</button>

    // JS: document.getElementById(''submitBtn'')  // WRONG ID! Silent null.

    '
  when_applies: Projects using JavaScript/TypeScript projects or HTML document structure
  when_not_applies: CLI tools, batch scripts, or backend services with no HTTP interface. projects not using JavaScript or
    HTML
  sources: ["https://developer.mozilla.org/en-US/docs/Web/API/Document/getElementById"]
- id: CR-JS-WS-001
  text: WebSocket connections must show connection status to the user.
  why: Users don't know why buttons stop working when the WebSocket disconnects. Without visible connection status, they think
    the app is broken.
  how_to_do_right: Show connected/disconnected indicator. Disable interactive elements when disconnected. Auto-reconnect with
    backoff.
  severity: high
  technologies:
    lang: [javascript]
    library: [socket, io]
    platform: [websocket]
  domains:
    domain: [architecture, ui]
    concern: [frontend, websocket]
  example_good: "socket.on('connect', () => {\n    statusEl.textContent = 'Connected';\n    statusEl.className = 'connected';\n\
    \    submitBtn.disabled = false;\n});\nsocket.on('disconnect', () => {\n    statusEl.textContent = 'Reconnecting...';\n\
    \    statusEl.className = 'disconnected';\n    submitBtn.disabled = true;\n});\n"
  when_applies: Projects using Socket.IO real-time apps, real-time WebSocket connections, or JavaScript/TypeScript projects
  when_not_applies: headless services, APIs, CLIs, or backend-only systems
  example_bad: |
    const socket = io();
    // No connection status shown — user doesn't know if connected
    // Buttons stay enabled when disconnected — actions silently fail
  sources: ["https://developer.mozilla.org/en-US/docs/Web/API/WebSocket"]
- id: CR-JS-WS-002
  text: Socket.IO error and disconnect events must be handled explicitly.
  why: Unhandled disconnect = user sends messages into void. Unhandled error = silent failures. Both destroy user trust.
  how_to_do_right: Handle 'connect_error', 'disconnect', and 'error' events. Show user-friendly messages. Implement reconnection
    logic.
  severity: high
  technologies:
    lang: [javascript]
    library: [socket, io]
  domains:
    domain: [architecture, reliability]
    concern: [web, websocket, error_handling]
  when_applies: Projects using Socket.IO real-time apps or JavaScript/TypeScript projects
  when_not_applies: CLI tools, batch scripts, or backend services with no HTTP interface. projects not using Socket.IO or
    JavaScript
  example_good: |
    socket.on('connect_error', (err) => {
        showToast(`Connection failed: ${err.message}`);
    });
    socket.on('disconnect', (reason) => {
        if (reason === 'io server disconnect') socket.connect();
    });
  example_bad: |
    const socket = io();
    socket.on('message', handleMessage);
    // No error/disconnect handlers — silent failures
  sources: ["https://socket.io/docs/v4/client-api/#event-disconnect"]
- id: CR-JS-ASYNC-001
  text: Every fetch/Promise must have .catch() or try/catch with async/await.
  why: Unhandled promise rejections crash Node.js and create silent failures in browsers. A network error in an uncaught fetch
    shows nothing to the user.
  how_to_do_right: Use try/catch with await, or .catch() with fetch. Show error feedback to the user. Log the error for debugging.
  severity: high
  technologies:
    lang: [javascript]
  domains:
    domain: [architecture, reliability]
    concern: [web, error_handling]
  example_good: "try {\n    const response = await fetch('/api/data');\n    if (!response.ok) throw new Error(`HTTP ${response.status}`);\n\
    \    const data = await response.json();\n} catch (error) {\n    showError('Failed to load data. Please try again.');\n\
    \    console.error('Fetch failed:', error);\n}\n"
  example_bad: '// No error handling — silent failure on network error

    const data = await fetch(''/api/data'').then(r => r.json());

    '
  when_applies: Projects using JavaScript/TypeScript projects
  when_not_applies: CLI tools, batch scripts, or backend services with no HTTP interface. projects not using JavaScript
  sources: ["https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Promise/catch"]
- id: CR-JS-STATE-001
  text: UI state updates must be atomic — update all related elements in a single operation.
  why: Updating elements one by one creates flickering and inconsistent states. If score updates but winner doesn't, users
    see contradictory information.
  how_to_do_right: Batch DOM updates. Use requestAnimationFrame for visual consistency. Update state object first, then render
    everything from state.
  severity: medium
  technologies:
    lang: [javascript]
    library: [dom]
  domains:
    domain: [architecture, ui]
    concern: [frontend, state_management]
  example_good: "function updateGame(state) {\n    // Update state object atomically\n    Object.assign(gameState, state);\n\
    \    // Render everything from state\n    renderScore(gameState);\n    renderBoard(gameState);\n    renderStatus(gameState);\n\
    }\n"
  when_applies: Projects using JavaScript/TypeScript projects or DOM
  when_not_applies: headless services, APIs, CLIs, or backend-only systems. projects not using JavaScript or DOM
  example_bad: |
    scoreEl.textContent = newScore;
    // User sees score update but winner unchanged — inconsistent
    setTimeout(() => winnerEl.textContent = newWinner, 500);
  sources: ["https://developer.mozilla.org/en-US/docs/Web/API/Window/requestAnimationFrame"]
- id: CR-JS-STATE-002
  text: Form state must be validated client-side before submission, AND server-side on receipt.
  why: Client-side validation improves UX (instant feedback). Server-side validation prevents attacks (client can be bypassed).
    Both are needed.
  how_to_do_right: Validate on blur/change for instant feedback. Validate on submit before sending. Server validates again
    with same rules.
  severity: high
  technologies:
    lang: [javascript, html]
  domains:
    domain: [architecture, ui, security]
    concern: [web, frontend]
  when_applies: Projects using JavaScript/TypeScript projects or HTML document structure
  when_not_applies: CLI tools, batch scripts, or backend services with no HTTP interface. projects not using JavaScript or
    HTML
  example_good: |
    // Client-side: instant feedback
    form.addEventListener('submit', (e) => {
        if (!emailInput.checkValidity()) {
            e.preventDefault();
            showError('Invalid email format');
        }
    });
  example_bad: |
    // Only server-side validation — user waits for round-trip
    form.addEventListener('submit', async (e) => {
        const res = await fetch('/api/submit', { body: formData });
        // 500ms later: "Invalid email" — bad UX
    });
  sources: ["https://developer.mozilla.org/en-US/docs/Learn/Forms/Form_validation"]
- id: CR-JS-CONST-001
  text: Constants shared between CSS and JavaScript must have a single source of truth.
  why: CSS color '#3498db' and JS constant THEME_BLUE='#3498db' will diverge when one is updated and the other isn't. Cross-file
    constants are a DRY violation.
  how_to_do_right: Use CSS custom properties (var(--theme-blue)) readable from JS via getComputedStyle. Or generate CSS from
    a shared config file.
  severity: medium
  technologies:
    lang: [javascript, css]
  domains:
    domain: [architecture, ui]
    concern: [web, frontend]
  example_good: '/* CSS */ :root { --theme-blue: #3498db; }

    // JS: getComputedStyle(document.documentElement).getPropertyValue(''--theme-blue'')

    '
  example_bad: |
    /* CSS */ .btn { color: #3498db; }
    // JS: const THEME_BLUE = '#3498db';
    // Two sources of truth — will diverge when one is updated
  when_applies: Projects using JavaScript/TypeScript projects or CSS styling and layout
  when_not_applies: CLI tools, batch scripts, or backend services with no HTTP interface. projects not using JavaScript or
    CSS
  sources: ["https://developer.mozilla.org/en-US/docs/Web/CSS/Using_CSS_custom_properties"]
- id: CR-JS-SEC-001
  text: Never use innerHTML with user-supplied content.
  why: innerHTML parses HTML, enabling XSS attacks. User input like <img onerror='steal(cookies)'> executes JavaScript.
  how_to_do_right: Use textContent for text, createElement + appendChild for DOM structure. If HTML is needed, use DOMPurify
    to sanitize.
  severity: critical
  technologies:
    lang: [javascript]
    library: [dom]
  domains:
    domain: [security, architecture]
    concern: [web]
  example_good: 'element.textContent = userInput;  // Safe — treated as text

    '
  example_bad: 'element.innerHTML = userInput;  // XSS vulnerability!

    '
  when_applies: Any project using JavaScript/TypeScript projects or DOM
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities. projects
    not using JavaScript or DOM
  sources: ["https://cheatsheetseries.owasp.org/cheatsheets/Cross_Site_Scripting_Prevention_Cheat_Sheet.html"]
- id: CR-JS-SEC-002
  text: Never store sensitive data in localStorage — it's accessible to any script on the domain.
  why: localStorage has no expiration, no access control, and is readable by any XSS attack. Storing auth tokens there means
    any XSS = full account takeover.
  how_to_do_right: Store auth tokens in httpOnly cookies (not accessible to JS). Use sessionStorage for temporary non-sensitive
    data.
  severity: high
  technologies:
    lang: [javascript]
  domains:
    domain: [security, architecture]
    concern: [web]
  when_applies: Projects using JavaScript/TypeScript projects
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities. projects
    not using JavaScript
  example_good: |
    // Store preferences, not secrets
    sessionStorage.setItem('theme', 'dark');
    // Auth token in httpOnly cookie (set by server)
  example_bad: |
    localStorage.setItem('auth_token', token);
    // Any XSS attack can read this — full account takeover
  sources: ["https://cheatsheetseries.owasp.org/cheatsheets/HTML5_Security_Cheat_Sheet.html"]
- id: CR-JS-MODULE-001
  text: Use ES modules (import/export) not script tags with global variables.
  why: Global variables collide, have no dependency tracking, and load in unpredictable order. ES modules have explicit dependencies,
    tree-shaking, and isolation.
  how_to_do_right: Use import/export syntax. Add type='module' to script tags. Bundle for production with a build tool if
    needed.
  severity: medium
  technologies:
    lang: [javascript]
  domains:
    domain: [architecture]
    concern: [web]
  when_applies: Projects using JavaScript/TypeScript projects
  when_not_applies: CLI tools, batch scripts, or backend services with no HTTP interface. projects not using JavaScript
  example_good: |
    // utils.js
    export function formatDate(d) { return d.toISOString(); }
    // app.js
    import { formatDate } from './utils.js';
  example_bad: |
    <!-- globals.js loaded via script tag -->
    <script src="globals.js"></script>
    <!-- formatDate is global — any script can overwrite it -->
  sources: ["https://developer.mozilla.org/en-US/docs/Web/JavaScript/Guide/Modules"]
