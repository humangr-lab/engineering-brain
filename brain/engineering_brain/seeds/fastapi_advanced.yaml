- id: CR-FAPI-010
  text: 'Use WebSocket with proper connection management: authenticate on connect, handle disconnections gracefully, and implement
    heartbeat/ping-pong.'
  why: WebSocket connections are long-lived and stateful. Without authentication on connect, anyone can open a WebSocket and
    receive data. Without heartbeat, dead connections consume server resources indefinitely. Without graceful disconnection
    handling, the server accumulates zombie connections and eventually runs out of file descriptors.
  how_to_do_right: '1. Authenticate in the WebSocket handshake (query params or first message).

    2. Implement ping/pong heartbeat to detect dead connections.

    3. Use a connection manager to track active connections.

    4. Handle WebSocketDisconnect exceptions for cleanup.

    5. Set connection limits per user to prevent resource exhaustion.

    '
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
    platform: [websocket]
  domains:
    domain: [architecture, security, performance]
    concern: [backend]
  example_good: "class ConnectionManager:\n    def __init__(self):\n        self.active: dict[str, WebSocket] = {}\n\n   \
    \ async def connect(self, user_id: str, websocket: WebSocket):\n        await websocket.accept()\n        # Disconnect\
    \ existing connection for same user\n        if user_id in self.active:\n            await self.disconnect(user_id)\n\
    \        self.active[user_id] = websocket\n\n    async def disconnect(self, user_id: str):\n        ws = self.active.pop(user_id,\
    \ None)\n        if ws:\n            try:\n                await ws.close()\n            except RuntimeError:\n      \
    \          pass  # Already closed\n\n    async def send(self, user_id: str, message: dict):\n        ws = self.active.get(user_id)\n\
    \        if ws:\n            try:\n                await ws.send_json(message)\n            except WebSocketDisconnect:\n\
    \                await self.disconnect(user_id)\n\nmanager = ConnectionManager()\n\n@app.websocket(\"/ws\")\nasync def\
    \ websocket_endpoint(websocket: WebSocket, token: str = Query(...)):\n    user = verify_token(token)  # Auth on connect\n\
    \    if not user:\n        await websocket.close(code=4001, reason=\"Unauthorized\")\n        return\n    await manager.connect(user.id,\
    \ websocket)\n    try:\n        while True:\n            data = await asyncio.wait_for(\n                websocket.receive_json(),\
    \ timeout=60.0  # Heartbeat timeout\n            )\n            if data.get(\"type\") == \"ping\":\n                await\
    \ websocket.send_json({\"type\": \"pong\"})\n            else:\n                await handle_message(user, data)\n   \
    \ except (WebSocketDisconnect, asyncio.TimeoutError):\n        await manager.disconnect(user.id)\n"
  example_bad: "# Wrong: No auth, no cleanup, no heartbeat\n@app.websocket(\"/ws\")\nasync def ws(websocket: WebSocket):\n\
    \    await websocket.accept()  # No authentication — anyone can connect\n    while True:  # No timeout — dead connections\
    \ persist forever\n        data = await websocket.receive_text()\n        await websocket.send_text(f\"Echo: {data}\"\
    )\n    # No disconnect handling — zombie connections accumulate\n    # No connection tracking — can't broadcast, can't\
    \ limit\n"
  when_applies: Projects using FastAPI async web services, Python codebases, or real-time WebSocket connections
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities
  sources: ["https://fastapi.tiangolo.com/advanced/websockets/"]
- id: CR-FAPI-011
  text: Use Annotated types with constrained fields for reusable validation. Define custom types for common patterns like
    Email, PhoneNumber, and Pagination.
  why: Repeating Field(min_length=1, max_length=255) on every string field is error-prone — one field will inevitably be missed.
    Annotated types define constraints once and reuse everywhere. When constraints change (email regex update), only one definition
    needs updating. Custom types also improve OpenAPI documentation with proper descriptions.
  how_to_do_right: '1. Define Annotated types for common patterns in a types.py module.

    2. Use Field() inside Annotated for constraints and metadata.

    3. Use AfterValidator for custom validation logic.

    4. Reuse types across all request/response models.

    5. Include JSON schema examples in type definitions.

    '
  severity: medium
  technologies:
    lang: [python]
    framework: [fastapi, pydantic]
  domains:
    domain: [architecture]
    concern: [backend]
  example_good: "# types.py — reusable constrained types\nfrom typing import Annotated\nfrom pydantic import Field, AfterValidator\n\
    import re\n\nNonEmptyStr = Annotated[str, Field(min_length=1, max_length=500, strip_whitespace=True)]\nProductName = Annotated[str,\
    \ Field(min_length=2, max_length=200, examples=[\"iPhone 15 Pro\"])]\nMoney = Annotated[Decimal, Field(ge=0, decimal_places=2,\
    \ examples=[99.99])]\nQuantity = Annotated[int, Field(ge=1, le=10000)]\n\ndef validate_phone(v: str) -> str:\n    cleaned\
    \ = re.sub(r\"[\\s\\-\\(\\)]\", \"\", v)\n    if not re.match(r\"^\\+\\d{10,15}$\", cleaned):\n        raise ValueError(\"\
    Invalid phone number format. Use +1234567890\")\n    return cleaned\n\nPhoneNumber = Annotated[str, AfterValidator(validate_phone)]\n\
    \n# Usage in models — clean, consistent, reusable\nclass CreateProductRequest(BaseModel):\n    name: ProductName\n   \
    \ description: NonEmptyStr\n    price: Money\n    quantity: Quantity\n\nclass CreateUserRequest(BaseModel):\n    name:\
    \ NonEmptyStr\n    phone: PhoneNumber\n"
  example_bad: "# Wrong: Constraints duplicated and inconsistent across models\nclass CreateProductRequest(BaseModel):\n \
    \   name: str = Field(min_length=2, max_length=200)\n    description: str = Field(min_length=1, max_length=500)\n\nclass\
    \ UpdateProductRequest(BaseModel):\n    name: str = Field(min_length=1, max_length=100)  # Different constraints!\n  \
    \  description: str  # Forgot constraints entirely\n"
  when_applies: Projects using FastAPI async web services, Pydantic data validation, or Python codebases
  when_not_applies: small scripts under 100 lines, single-purpose utilities
  sources: ["https://docs.pydantic.dev/latest/concepts/types/#custom-types"]
- id: CR-FAPI-012
  text: Always return proper HTTP status codes and structured error responses. Use exception handlers to standardize error
    format across the API.
  why: Returning 200 for errors or unstructured error messages forces API consumers to parse response bodies to determine
    success/failure. Missing error details make debugging impossible for consumers. Standardized error responses with correlation
    IDs enable automated error handling, retry logic, and efficient debugging across distributed systems.
  how_to_do_right: '1. Register exception handlers for common exception types.

    2. Return structured error responses with: type, title, status, detail, instance.

    3. Use appropriate HTTP status codes: 400 (validation), 401 (auth), 403 (forbidden), 404 (not found), 409 (conflict),
    422 (validation), 429 (rate limit), 500 (server error).

    4. Include a correlation ID for request tracing.

    5. Never expose stack traces or internal details in production error responses.

    '
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [architecture]
    concern: [backend]
  example_good: "from fastapi import FastAPI, Request\nfrom fastapi.responses import JSONResponse\nimport uuid\n\nclass AppError(Exception):\n\
    \    def __init__(self, status_code: int, error_type: str, detail: str):\n        self.status_code = status_code\n   \
    \     self.error_type = error_type\n        self.detail = detail\n\nclass NotFoundError(AppError):\n    def __init__(self,\
    \ resource: str, resource_id: str):\n        super().__init__(404, \"not_found\", f\"{resource} '{resource_id}' not found\"\
    )\n\nclass ConflictError(AppError):\n    def __init__(self, detail: str):\n        super().__init__(409, \"conflict\"\
    , detail)\n\n@app.exception_handler(AppError)\nasync def app_error_handler(request: Request, exc: AppError):\n    return\
    \ JSONResponse(\n        status_code=exc.status_code,\n        content={\n            \"type\": exc.error_type,\n    \
    \        \"title\": exc.error_type.replace(\"_\", \" \").title(),\n            \"status\": exc.status_code,\n        \
    \    \"detail\": exc.detail,\n            \"instance\": str(request.url),\n            \"correlation_id\": request.state.correlation_id,\n\
    \        },\n    )\n\n@app.exception_handler(Exception)\nasync def unhandled_error_handler(request: Request, exc: Exception):\n\
    \    logger.error(f\"Unhandled error: {exc}\", exc_info=True)\n    return JSONResponse(\n        status_code=500,\n  \
    \      content={\n            \"type\": \"internal_error\",\n            \"title\": \"Internal Server Error\",\n     \
    \       \"status\": 500,\n            \"detail\": \"An unexpected error occurred\",\n            \"correlation_id\": request.state.correlation_id,\n\
    \        },\n    )\n"
  example_bad: "# Wrong: 200 for errors, unstructured responses, exposed internals\n@router.get(\"/users/{user_id}\")\nasync\
    \ def get_user(user_id: int):\n    try:\n        user = db.query(User).get(user_id)\n        if not user:\n          \
    \  return {\"error\": True, \"message\": \"not found\"}  # 200 status!\n        return {\"error\": False, \"data\": user}\n\
    \    except Exception as e:\n        return {\"error\": True, \"message\": str(e)}  # Exposes stack trace\n        # {\"\
    error\": True, \"message\": \"relation \\\"users\\\" does not exist\"}\n"
  when_applies: Projects using FastAPI async web services or Python codebases
  when_not_applies: small scripts under 100 lines, single-purpose utilities. projects not using FastAPI or Python
  sources: ["https://fastapi.tiangolo.com/tutorial/handling-errors/"]
- id: CR-FAPI-013
  text: Use lifespan events for application startup and shutdown. Initialize database engines, HTTP clients, and caches on
    startup — dispose on shutdown.
  why: Creating resources (database connections, HTTP clients) on first request adds latency to the first user's experience,
    creates race conditions if multiple requests arrive simultaneously, and fails to cleanly release resources on shutdown.
    Lifespan events ensure resources are ready before the first request and cleaned up on shutdown — preventing connection
    leaks and data corruption.
  how_to_do_right: '1. Use @asynccontextmanager lifespan function (replaces deprecated on_event).

    2. Create shared resources (engine, client, cache) before yield.

    3. Store resources on app.state for access in dependencies.

    4. Dispose all resources after yield (shutdown).

    5. Handle startup failures gracefully — log and exit, don''t serve without resources.

    '
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [architecture, operations, deployment]
    concern: [backend]
  example_good: "from contextlib import asynccontextmanager\nfrom sqlalchemy.ext.asyncio import create_async_engine, async_sessionmaker\n\
    import httpx\nimport redis.asyncio as redis\n\n@asynccontextmanager\nasync def lifespan(app: FastAPI):\n    # Startup\
    \ — create all shared resources\n    app.state.db_engine = create_async_engine(\n        settings.DATABASE_URL,\n    \
    \    pool_size=10,\n        max_overflow=5,\n    )\n    app.state.session_factory = async_sessionmaker(\n        app.state.db_engine,\
    \ expire_on_commit=False\n    )\n    app.state.http_client = httpx.AsyncClient(\n        timeout=30.0,\n        limits=httpx.Limits(max_connections=100),\n\
    \    )\n    app.state.redis = redis.from_url(settings.REDIS_URL)\n\n    logger.info(\"Application started — all resources\
    \ initialized\")\n    yield\n\n    # Shutdown — clean up all resources\n    await app.state.redis.aclose()\n    await\
    \ app.state.http_client.aclose()\n    await app.state.db_engine.dispose()\n    logger.info(\"Application shutdown — all\
    \ resources released\")\n\napp = FastAPI(lifespan=lifespan)\n\n# Dependency using lifespan resources\nasync def get_db(request:\
    \ Request) -> AsyncGenerator[AsyncSession, None]:\n    async with request.app.state.session_factory() as session:\n  \
    \      yield session\n"
  example_bad: "# Wrong: Deprecated on_event + global mutable state\ndb_engine = None  # Global mutable — race condition on\
    \ startup\n\n@app.on_event(\"startup\")\nasync def startup():\n    global db_engine\n    db_engine = create_async_engine(DATABASE_URL)\n\
    \n@app.on_event(\"shutdown\")\nasync def shutdown():\n    if db_engine:\n        await db_engine.dispose()\n        #\
    \ What if shutdown fails? Resources leak.\n\n# Wrong: No startup initialization — first request creates engine\n@router.get(\"\
    /users\")\nasync def get_users():\n    engine = create_async_engine(DATABASE_URL)  # Created per request!\n    # ...\n"
  when_applies: Projects using FastAPI async web services or Python codebases
  when_not_applies: small scripts under 100 lines, single-purpose utilities. projects not using FastAPI or Python
  sources: ["https://fastapi.tiangolo.com/advanced/events/"]
- id: CR-FAPI-014
  text: Use custom APIRoute classes to extend endpoint behavior (logging, timing, request ID injection) without modifying
    endpoint code.
  why: Adding logging, timing, and correlation ID injection to every endpoint function creates massive boilerplate. Custom
    APIRoute classes intercept the request/response cycle once, applying behavior to all endpoints on a router. This is more
    maintainable than middleware because it has access to route-specific metadata and applies only to specific routers.
  how_to_do_right: '1. Subclass APIRoute and override get_route_handler().

    2. Wrap the original handler with your custom logic.

    3. Assign the custom route class to the router: router.route_class = MyRoute.

    4. Use for: request logging, timing headers, correlation IDs, request validation.

    5. Keep middleware for truly global concerns; use route classes for router-specific concerns.

    '
  severity: medium
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [architecture, observability]
    concern: [backend]
  example_good: "import time\nimport uuid\nfrom fastapi import APIRouter, Request, Response\nfrom fastapi.routing import APIRoute\n\
    \nclass TimedRoute(APIRoute):\n    def get_route_handler(self):\n        original = super().get_route_handler()\n\n  \
    \      async def custom_handler(request: Request) -> Response:\n            # Inject correlation ID\n            correlation_id\
    \ = request.headers.get(\"X-Correlation-ID\", str(uuid.uuid4()))\n            request.state.correlation_id = correlation_id\n\
    \n            # Time the request\n            start = time.perf_counter()\n            response = await original(request)\n\
    \            elapsed = time.perf_counter() - start\n\n            # Add headers\n            response.headers[\"X-Correlation-ID\"\
    ] = correlation_id\n            response.headers[\"X-Process-Time\"] = f\"{elapsed:.4f}\"\n\n            # Log\n     \
    \       logger.info(\n                \"request_completed\",\n                method=request.method,\n               \
    \ path=request.url.path,\n                status=response.status_code,\n                duration_ms=round(elapsed * 1000),\n\
    \                correlation_id=correlation_id,\n            )\n            return response\n\n        return custom_handler\n\
    \n# Apply to router\nrouter = APIRouter(prefix=\"/api/v1\", route_class=TimedRoute)\n"
  example_bad: "# Wrong: Boilerplate in every endpoint\n@router.get(\"/orders\")\nasync def list_orders(request: Request):\n\
    \    correlation_id = request.headers.get(\"X-Correlation-ID\", str(uuid.uuid4()))\n    start = time.perf_counter()\n\
    \    try:\n        orders = await service.list_orders()\n        elapsed = time.perf_counter() - start\n        logger.info(f\"\
    GET /orders 200 {elapsed:.4f}s cid={correlation_id}\")\n        return JSONResponse(content=orders, headers={\"X-Correlation-ID\"\
    : correlation_id})\n    except Exception:\n        elapsed = time.perf_counter() - start\n        logger.error(f\"GET\
    \ /orders 500 {elapsed:.4f}s cid={correlation_id}\")\n        raise\n# Same boilerplate in every single endpoint function\n"
  when_applies: Projects using FastAPI async web services or Python codebases
  when_not_applies: small scripts under 100 lines, single-purpose utilities. projects not using FastAPI or Python
  sources: ["https://fastapi.tiangolo.com/advanced/custom-request-and-route/"]
