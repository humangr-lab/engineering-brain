  - GitHub metrics
  text: Measure developer experience with DORA metrics and the SPACE framework — track deployment frequency, lead time, change failure rate, and MTTR alongside developer satisfaction and productivity perceptions.
  when_applies: Any organization with a platform engineering team or DevOps function seeking to measure and improve software delivery performance and developer productivity.
  why: DORA metrics (Deployment Frequency, Lead Time for Changes, Change Failure Rate, Mean Time to Recovery) are the industry standard for measuring software delivery performance. However, DORA metrics
    alone miss the developer experience dimension. The SPACE framework (Satisfaction, Performance, Activity, Communication, Efficiency) adds qualitative measures. Without measurement, platform teams cannot
    demonstrate value, justify investment, or identify bottlenecks. Organizations with elite DORA metrics ship 973x more deployments with 6570x faster lead times (DORA 2023). Platform engineering directly
    impacts all four DORA metrics.
- domains:
  - operations
  - platform-engineering
  - infrastructure
  - devops
  example_bad: '# ClickOps — manual console changes in production

    # Developer: ''I''ll just click Create Bucket in the AWS console''

    # Result:

    # - No audit trail beyond CloudTrail (which nobody reads)

    # - Terraform state doesn''t know about the resource

    # - Next terraform apply might delete it (not in state)

    # - No code review, no policy check, no cost estimation

    # - Environment inconsistency: prod has resources dev doesn''t

    # - Drift accumulates until nobody trusts terraform plan output

    '
  example_good: "# IaC maturity model — enforced via CI pipeline\n# .github/workflows/infrastructure.yaml\nname: Infrastructure Change\non:\n  pull_request:\n    paths: ['infrastructure/**']\njobs:\n  validate:\n\
    \    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v4\n      - name: Terraform Init\n        run: terraform init\n      - name: Terraform Validate\n        run: terraform validate\n\
    \      - name: Terraform Plan\n        run: terraform plan -out=plan.tfplan\n      - name: OPA Policy Check\n        run: |\n          terraform show -json plan.tfplan > plan.json\n          opa eval\
    \ -d policies/ -i plan.json 'data.terraform.deny'\n      - name: Cost Estimation\n        run: infracost diff --path=plan.json\n      - name: Post Plan to PR\n        run: terraform show plan.tfplan\
    \ | gh pr comment -F -\n\n  drift_detection:\n    runs-on: ubuntu-latest\n    schedule: [{ cron: '0 */6 * * *' }]  # Every 6 hours\n    steps:\n      - name: Detect Drift\n        run: terraform plan\
    \ -detailed-exitcode\n        # Exit code 2 = drift detected — alert platform team\n"
  how_to_do_right: '1. Choose your IaC tool based on team skills and platform architecture: Terraform for multi-cloud declarative, Pulumi for programmatic needs, Crossplane for Kubernetes-native platforms.
    2. Store ALL infrastructure definitions in version control — no exceptions. 3. Enforce IaC-only changes: read-only cloud console access for operators, SCPs blocking manual resource creation. 4. Implement
    drift detection: terraform plan in CI, Crossplane continuous reconciliation, or driftctl. 5. Use modules/components for reusable infrastructure patterns. 6. Implement policy-as-code (OPA, Sentinel,
    Kyverno) to validate IaC before apply.'
  id: PLAT-006
  severity: high
  sources:
  - https://developer.hashicorp.com/terraform/tutorials
  - https://www.pulumi.com/docs/concepts/
  - https://www.crossplane.io/docs/
  technologies:
  - Terraform
  - Pulumi
  - Crossplane
  - OpenTofu
  - CDK
  - driftctl
  text: Progress Infrastructure as Code maturity through Terraform, Pulumi, or Crossplane — choose the right IaC tool for your maturity level and enforce IaC-only changes to prevent configuration drift.
  when_applies: Any organization managing cloud or on-premises infrastructure, from startups with a few resources to enterprises with thousands of cloud resources.
  why: 'Infrastructure as Code eliminates configuration drift, enables reproducible environments, and provides an audit trail for all infrastructure changes. The maturity progression matters: Terraform
    (HCL, declarative, massive provider ecosystem) for traditional IaC; Pulumi (real programming languages, loops/conditions native) for teams that need programmatic infrastructure; Crossplane (Kubernetes-native,
    control plane for cloud resources) for platform teams building self-service abstractions. Manual infrastructure changes (''ClickOps'') in production cause 40% of outages (Puppet State of DevOps). IaC
    without drift detection is only half the solution.'
- domains:
  - operations
  - platform-engineering
  - service-catalog
  - incident-management
  example_bad: '# No service catalog — tribal knowledge only

    # ''Who owns the payment-gateway?''

    # - Slack: ''@here does anyone know who owns payment-gateway?''

    # - 5 minutes: ''I think it was built by the old payments team''

    # - 10 minutes: ''That team was reorged — maybe team-platform?''

    # - 15 minutes: ''Found a git blame — the author left 6 months ago''

    # - 20 minutes: ''Let''s just page the SRE team''

    # Meanwhile: payment processing is down for 20 minutes

    '
  example_good: "# catalog-info.yaml — lives in the service repo\napiVersion: backstage.io/v1alpha1\nkind: Component\nmetadata:\n  name: payment-gateway\n  description: \"Processes card payments and tokenization\"\
    \n  annotations:\n    backstage.io/techdocs-ref: dir:.\n    pagerduty.com/service-id: P1234567\n    datadog.com/dashboard-url: https://app.datadoghq.com/dashboard/abc\n  tags: [payments, critical, go]\n\
    spec:\n  type: service\n  lifecycle: production\n  owner: team-payments  # Team, not individual\n  system: payments-platform\n  tier: critical  # SLO: 99.99%\n  dependsOn:\n    - component:user-service\n\
    \    - resource:payments-db\n  providesApis:\n    - payments-api-v2\n  consumesApis:\n    - fraud-detection-api\n    - notification-api\n"
  how_to_do_right: '1. Define a catalog-info.yaml format that lives in each service repository. 2. Require: owner (team, not individual), lifecycle (production/deprecated/experimental), tier (critical/standard/experimental),
    dependencies (APIs consumed/provided). 3. Automate catalog population from Git repos — do not rely on manual registration. 4. Enforce catalog registration as part of the golden path — new services are
    auto-registered. 5. Display catalog data in the developer portal with search and filtering. 6. Integrate with incident management: auto-page the owning team. 7. Run quarterly catalog audits: orphaned
    services, missing owners, stale entries.'
  id: PLAT-007
  severity: high
  sources:
  - https://backstage.io/docs/features/software-catalog/
  - https://www.opslevel.com/resources/what-is-a-service-catalog
  technologies:
  - Backstage
