  example_good: "# Kubecost allocation — per-team cost visibility\n# kubecost-config.yaml\napiVersion: v1\nkind: ConfigMap\nmetadata:\n  name: kubecost-allocation-config\ndata:\n  allocation.yaml: |\n \
    \   allocation:\n      labels:\n        team: \"team\"          # Primary allocation label\n        service: \"service\"    # Secondary allocation\n        environment: \"env\"    # Environment breakdown\n\
