  example_bad: "# Imperative deployments — no source of truth\n# Developer runs from laptop:\nkubectl set image deployment/payment-gateway \\\n  payment-gateway=payment-gateway:latest\n# Problems:\n# -\
    \ No Git record of what was deployed\n# - 'latest' tag — which version is actually running?\n# - No PR review for production changes\n# - No rollback mechanism except 'remember the previous version'\n\
    # - Drift: manual changes accumulate, nobody knows actual state\n# - kubectl access = cluster admin credentials on laptops\n"
  example_good: "# ArgoCD Application — GitOps deployment\napiVersion: argoproj.io/v1alpha1\nkind: Application\nmetadata:\n  name: payment-gateway\n  namespace: argocd\nspec:\n  project: team-payments\n\
    \  source:\n    repoURL: https://github.com/acme/gitops-config\n    targetRevision: main\n    path: apps/payment-gateway/overlays/production\n  destination:\n    server: https://kubernetes.default.svc\n\
    \    namespace: team-payments\n  syncPolicy:\n    automated:\n      prune: true      # Remove resources deleted from Git\n      selfHeal: true   # Correct manual changes (drift)\n    syncOptions:\n\
    \      - CreateNamespace=true\n    retry:\n      limit: 3\n      backoff:\n        duration: 5s\n        factor: 2\n        maxDuration: 3m\n\n# Deployment flow:\n# 1. Developer merges PR to app repo\n\
    # 2. CI builds image: payment-gateway:abc123\n# 3. CI opens PR to gitops-config: update image tag\n# 4. PR approved and merged\n# 5. ArgoCD detects change, syncs to cluster\n# 6. Rollback: git revert\
    \ the image tag PR\n"
  how_to_do_right: '1. Separate application source repos from GitOps config repos (recommended by ArgoCD). 2. CI pipeline: builds image, pushes to registry, updates image tag in GitOps repo. 3. ArgoCD/Flux
    watches GitOps repo and applies changes to cluster. 4. Enable auto-sync with auto-prune for non-production environments. 5. Require PR approval for production changes in GitOps repo. 6. Use ApplicationSets
    (ArgoCD) or Kustomization (Flux) for multi-cluster/multi-env management. 7. Monitor sync status and alert on persistent out-of-sync state.'
