  - Operator SDK
  - CRDs
  text: Design platform APIs using the Kubernetes operator pattern — expose infrastructure as declarative custom resources that reconcile desired state, enabling GitOps and self-healing.
  when_applies: Organizations running Kubernetes-based platforms where infrastructure is provisioned for application teams, particularly when GitOps workflows are desired.
  why: 'The Kubernetes operator pattern (custom resource + controller) has become the standard API paradigm for platform engineering. Developers declare WHAT they want (a PostgreSQL database, a Redis cache,
    a certificate) as a YAML resource, and the operator continuously reconciles actual state to match desired state. This enables: GitOps (infrastructure changes via pull request), self-healing (operator
    detects drift and corrects), auditing (all changes are Git commits), and consistency (same API for dev, staging, prod). Imperative APIs (''create this now'') require error handling at the caller; declarative
    APIs handle failures internally through reconciliation loops.'
