  text: Build self-service infrastructure with developer portals like Backstage or Port — provide a single pane of glass for service catalog, documentation, CI/CD status, and infrastructure provisioning.
  when_applies: Organizations with 20+ services and 30+ developers where service discovery, ownership, and documentation are becoming friction points.
  why: 'Developers spend 30-60 minutes per day context-switching between tools: GitHub for code, Jenkins for CI, Datadog for monitoring, PagerDuty for on-call, Confluence for docs, JIRA for tickets. A developer
    portal consolidates this into a single interface. Backstage (open-source, CNCF incubating) provides: service catalog (who owns what), software templates (golden paths), TechDocs (documentation-as-code),
    and a plugin ecosystem. Without a portal, new engineers take 2-4 weeks to find and understand all the systems; with a portal, onboarding drops to 2-3 days.'
