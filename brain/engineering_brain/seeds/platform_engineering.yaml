  text: Implement GitOps with ArgoCD or Flux as the platform primitive for deployments — Git is the single source of truth for both application code and infrastructure, with automated reconciliation from
    Git to cluster.
  when_applies: Any organization deploying to Kubernetes that wants declarative, auditable, and automated deployment workflows.
  why: 'GitOps means the desired state of infrastructure and applications is stored in Git, and an operator (ArgoCD/Flux) continuously reconciles the actual state to match. Benefits: every change is a Git
    commit (audit trail), rollbacks are git revert (instant), access control is Git permissions (no cluster admin needed for developers), drift is automatically corrected. ArgoCD provides a UI showing sync
    status of every application. Without GitOps, deployments are imperative (kubectl apply, helm upgrade) with no single source of truth — drift accumulates and nobody can answer ''what is currently deployed?'''
- domains:
  - operations
  - platform-engineering
  - multi-tenancy
  - security
  - kubernetes
  example_bad: '# Shared cluster with no isolation

    # All teams deploy to ''default'' namespace

    # No ResourceQuotas — one team''s memory leak crashes all nodes

    # No NetworkPolicies — any pod can reach any other pod

    # No RBAC — developers have cluster-admin

    # No Pod Security Standards — containers run as root

    #

    # Incident: team-analytics ran a Spark job that consumed 80% of

    # cluster CPU. Payment processing latency spiked to 30 seconds.

    # team-payments had no protection from noisy neighbor.

    '
  example_good: "# Namespace with full multi-tenancy controls\napiVersion: v1\nkind: Namespace\nmetadata:\n  name: team-payments-prod\n  labels:\n    team: payments\n    environment: production\n    pod-security.kubernetes.io/enforce:\
    \ restricted\n---\napiVersion: v1\nkind: ResourceQuota\nmetadata:\n  name: team-quota\n  namespace: team-payments-prod\nspec:\n  hard:\n    requests.cpu: \"20\"\n    requests.memory: 40Gi\n    limits.cpu:\
    \ \"40\"\n    limits.memory: 80Gi\n    pods: \"100\"\n    persistentvolumeclaims: \"20\"\n---\napiVersion: networking.k8s.io/v1\nkind: NetworkPolicy\nmetadata:\n  name: default-deny-all\n  namespace:\
    \ team-payments-prod\nspec:\n  podSelector: {}\n  policyTypes: [Ingress, Egress]\n  # Explicit allow rules added per-service\n---\napiVersion: rbac.authorization.k8s.io/v1\nkind: RoleBinding\nmetadata:\n\
    \  name: team-payments-access\n  namespace: team-payments-prod\nsubjects:\n  - kind: Group\n    name: team-payments\n    apiGroup: rbac.authorization.k8s.io\nroleRef:\n  kind: ClusterRole\n  name: namespace-admin\
    \  # Custom role: full access within namespace only\n  apiGroup: rbac.authorization.k8s.io\n"
  how_to_do_right: '1. One namespace per team per environment (e.g., team-payments-prod, team-payments-staging). 2. Apply ResourceQuotas per namespace: CPU, memory, storage limits, pod count limits. 3.
    Apply LimitRanges per namespace: default container resource requests/limits. 4. Deploy NetworkPolicies: default-deny ingress/egress, explicit allow rules per namespace. 5. Implement Kubernetes RBAC:
    teams can only access their own namespaces. 6. Enforce Pod Security Standards: restricted profile for production namespaces. 7. Use separate node pools for strict isolation requirements (e.g., PCI workloads).'
  id: PLAT-015
  severity: high
  sources:
  - https://kubernetes.io/docs/concepts/security/multi-tenancy/
  - https://kubernetes.io/docs/concepts/security/pod-security-standards/
  - https://www.vcluster.com/docs
  technologies:
  - Kubernetes
  - namespaces
  - NetworkPolicy
  - ResourceQuota
  - RBAC
  - Pod Security Standards
  - vCluster
  text: Design multi-tenancy patterns for shared platforms with strong isolation boundaries — use Kubernetes namespaces, network policies, resource quotas, and RBAC to prevent noisy-neighbor and security
    cross-contamination.
  when_applies: Any organization running a shared Kubernetes cluster for multiple teams or tenants, particularly in production environments where isolation is critical for security and reliability.
  why: 'Shared platforms (a single Kubernetes cluster for multiple teams) provide cost efficiency and operational simplicity, but without proper isolation, one team''s misconfigured workload can consume
    all cluster resources (noisy neighbor), access another team''s secrets (security breach), or cause cluster-wide instability (cascading failure). Multi-tenancy requires defense in depth: namespace isolation
    (logical), network policies (network), resource quotas (compute), RBAC (access control), and Pod Security Standards (runtime). A shared platform without isolation is a shared liability.'

