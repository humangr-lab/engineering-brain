  text: Implement a developer portal with scorecards and maturity models — give teams visibility into their service health, security posture, and engineering maturity through automated assessments.
  when_applies: Organizations with 20+ services seeking to improve and standardize engineering practices across teams.
  why: 'Scorecards provide objective, automated assessment of service health across dimensions: ownership (is an owner declared?), documentation (is it up to date?), security (are vulnerabilities patched?),
    reliability (are SLOs met?), and quality (test coverage, dependency freshness). Without scorecards, maturity conversations are subjective and inconsistent. OpsLevel and Backstage scorecards have shown
    that teams improve their scores by 40-60% within 6 months of scorecards being introduced — visibility drives behavior. Scorecards also help platform teams prioritize: if 70% of services fail the ''has
    runbook'' check, that is the next golden path feature.'
