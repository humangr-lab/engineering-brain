  - OpsLevel
  - service catalog
  - CMDB
  text: Maintain a service catalog with ownership registry as the foundation of your platform — every service must have a declared owner, tier, lifecycle status, and dependency map.
  when_applies: Any organization with 10+ services, particularly where multiple teams own different services and incident response requires quick routing to the right team.
  why: 'During an incident, the first question is always ''who owns this service?'' Without a service catalog, this becomes a 15-minute Slack thread while the outage continues. A service catalog with ownership
    registry provides: instant owner lookup for incidents, dependency maps for blast radius analysis, lifecycle tracking (is this service deprecated?), tier classification for SLO requirements, and tech
    debt visibility. Backstage found that organizations with a service catalog reduce incident response time by 50% because routing to the right team is immediate.'
- domains:
  - operations
  - platform-engineering
  - environment-management
  - devops
  example_bad: '# Snowflake environments — each is unique

    # Dev: Docker Compose on laptop, SQLite, no TLS

    # Staging: Single VM, MySQL 5.7, self-signed cert

    # Prod: Kubernetes, MySQL 8.0, ACM cert, WAF, CDN

    # Bug passes dev and staging (different DB, different scale)

    # Deployment fails in prod (different orchestrator)

    # ''Works in staging'' means nothing — staging is not prod-like

    '
  example_good: "# Kustomize overlays — structural parity, scale differences\n# base/deployment.yaml (shared by all environments)\napiVersion: apps/v1\nkind: Deployment\nmetadata:\n  name: payment-gateway\n\
    spec:\n  selector:\n    matchLabels:\n      app: payment-gateway\n  template:\n    spec:\n      containers:\n        - name: payment-gateway\n          image: payment-gateway  # Tag set by CI\n    \
    \      resources:\n            requests:\n              cpu: 100m\n              memory: 128Mi\n\n# overlays/production/kustomization.yaml\nresources: [../../base]\npatches:\n  - patch: |\n      apiVersion:\
    \ apps/v1\n      kind: Deployment\n      metadata:\n        name: payment-gateway\n      spec:\n        replicas: 5  # Production scale\n        template:\n          spec:\n            containers:\n\
    \              - name: payment-gateway\n                resources:\n                  requests:\n                    cpu: '1'\n                    memory: 1Gi\n# Same structure, same image, different\
    \ scale\n"
  how_to_do_right: '1. Generate all environments from the same IaC templates — dev, staging, and prod differ only in variables (instance sizes, replica counts, domain names). 2. Use containerization to
    eliminate OS-level differences. 3. Seed staging with anonymized production data for realistic testing. 4. Deploy the same container images to all environments — only configuration (env vars) changes.
    5. Run the same CI/CD pipeline for all environments — no manual deployment steps in prod. 6. Implement environment provisioning as self-service: developers can spin up ephemeral preview environments.'
  id: PLAT-008
  severity: high
  sources:
  - https://12factor.net/dev-prod-parity
  - https://kubernetes.io/docs/tasks/manage-kubernetes-objects/kustomization/
  technologies:
  - Terraform
  - Kubernetes
  - Docker
  - Helm
  - Kustomize
  - Nix
  - Devcontainers
  text: Implement environment management with dev/staging/prod parity — use infrastructure as code to ensure environments are structurally identical, differing only in scale and data.
  when_applies: Any organization with multiple deployment environments, from startups with dev/prod to enterprises with dev/staging/UAT/preprod/prod.
  why: The 'works on my machine' and 'works in staging' problems stem from environment drift. Dev environments that differ from production hide bugs until they reach production. The Twelve-Factor App methodology
    mandates dev/prod parity. Without parity, staging is not a useful pre-production gate — it gives false confidence. Environment drift causes 30% of deployment failures (Puppet State of DevOps). With
    IaC, all environments are generated from the same templates with different variable files, making parity automatic.
- domains:
  - operations
  - platform-engineering
  - security
  - secret-management
  example_bad: "# Secrets in Git — 12.8M leaked secrets in 2023\n# .env committed to repo (even if in .gitignore, often pushed by accident)\nDATABASE_URL=postgres://admin:P@ssw0rd!@db.prod.internal:5432/payments\n\
    STRIPE_SECRET_KEY=sk_live_EXAMPLE_NOT_A_REAL_KEY\n\n# Or hardcoded in Kubernetes manifest\nenv:\n  - name: DATABASE_PASSWORD\n    value: \"P@ssw0rd!\"  # Plaintext in Git history forever\n# Even\
    \ after deletion, git log --all -p reveals the secret\n# Secret rotation: manual, per-team, often forgotten\n"
  example_good: "# External Secrets Operator — secrets synced from Vault\napiVersion: external-secrets.io/v1beta1\nkind: ExternalSecret\nmetadata:\n  name: payment-gateway-secrets\n  namespace: team-payments\n\
    spec:\n  refreshInterval: 1h  # Auto-rotate hourly\n  secretStoreRef:\n    name: vault-backend\n    kind: ClusterSecretStore\n  target:\n    name: payment-gateway-secrets\n    creationPolicy: Owner\n\
    \  data:\n    - secretKey: DATABASE_URL\n      remoteRef:\n        key: secret/data/team-payments/payment-gateway\n        property: database_url\n    - secretKey: STRIPE_SECRET_KEY\n      remoteRef:\n\
    \        key: secret/data/team-payments/payment-gateway\n        property: stripe_secret_key\n---\n# Developer's deployment — references secret by name, never sees values\nenvFrom:\n  - secretRef:\n\
    \      name: payment-gateway-secrets\n"
  how_to_do_right: '1. Deploy HashiCorp Vault (or cloud-native equivalent: AWS Secrets Manager, Azure Key Vault) as the central secret store. 2. Deploy External Secrets Operator (ESO) in Kubernetes to sync
    secrets from Vault to Kubernetes Secrets automatically. 3. Developers reference secrets by name in their deployment configs — the platform handles injection. 4. Implement automatic secret rotation for
    database credentials, API keys, and certificates. 5. Audit all secret access — Vault provides a complete audit log. 6. Block secrets in Git with pre-commit hooks (detect-secrets, gitleaks, GitGuardian).
    7. Never expose secret values in CI/CD logs — use secret masking.'
  id: PLAT-009
  severity: critical
