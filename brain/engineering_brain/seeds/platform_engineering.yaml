  example_bad: "# No developer experience metrics\nmetrics:\n  tracked: [\"uptime\", \"CPU utilization\", \"cost\"]\n  # These are infrastructure metrics, not developer experience\n  # No DORA metrics:\
    \ don't know deployment frequency or lead time\n  # No developer surveys: assume developers are happy\n  # Platform team says 'we improved things' but has no data\n  # Leadership asks 'why should we\
    \ invest more?' — no answer\n"
  example_good: "# DORA metrics dashboard — automated collection\ndora_metrics:\n  collection:\n    source: \"GitHub Actions + ArgoCD + PagerDuty\"\n    automation: \"fully automated — no manual data entry\"\
    \n\n  current_performance:  # Q1 2025\n    deployment_frequency:\n      value: \"12 deploys/day\"\n      band: \"elite\"  # On demand\n    lead_time_for_changes:\n      value: \"45 minutes\"\n     \
    \ band: \"elite\"  # Less than 1 hour\n    change_failure_rate:\n      value: \"3.2%\"\n      band: \"elite\"  # Less than 5%\n    mean_time_to_recovery:\n      value: \"28 minutes\"\n      band: \"\
    elite\"  # Less than 1 hour\n\n  space_survey:  # Quarterly\n    satisfaction: 4.2  # out of 5\n    efficiency: 3.8\n    top_friction_points:\n      - \"Secret rotation still manual\"\n      - \"Database\
    \ provisioning takes 2 hours\"\n    sample_size: 85  # developers\n\n  trend: \"Improving — platform migration increased DF by 3x in 6 months\"\n"
  how_to_do_right: '1. Instrument CI/CD pipelines to automatically capture DORA metrics: deployment timestamp, commit timestamp, deployment success/rollback, incident start/resolution. 2. Set baselines
    before platform changes — measure current DORA metrics. 3. Track DORA metrics per team and for the organization overall. 4. Run quarterly developer satisfaction surveys (SPACE: satisfaction + efficiency
    dimensions). 5. Set targets: Elite DORA = on-demand deploys, <1 hour lead time, <5% change failure, <1 hour MTTR. 6. Present metrics to leadership monthly — platform investment needs quantified ROI.'
  id: PLAT-005
  severity: high
  sources:
  - https://dora.dev/guides/dora-metrics-four-keys/
  - https://queue.acm.org/detail.cfm?id=3454124
  technologies:
  - DORA
  - SPACE
