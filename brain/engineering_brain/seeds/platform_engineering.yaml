  text: Implement cost allocation and showback per team — tag all cloud resources with team ownership and provide automated cost dashboards that drive accountability without requiring central approval for
    every resource.
  when_applies: Any organization spending more than $10K/month on cloud infrastructure, or any organization with multiple teams sharing cloud resources.
  why: 'Cloud costs grow 20-30% per year without governance, and 30% of cloud spend is wasted (Flexera 2024). Central approval for every resource creates bottlenecks and slows development. Showback (showing
    teams their costs) drives accountability without the bureaucracy of chargeback (billing teams). When teams see that their unused dev environment costs $3K/month, they shut it down. Cost visibility per
    team also enables platform teams to demonstrate ROI: ''our shared Kubernetes cluster costs $X/month less than individual EC2 instances per team.'''
