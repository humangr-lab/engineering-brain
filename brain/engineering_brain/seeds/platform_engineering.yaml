  example_bad: "# Imperative script — no reconciliation, no self-healing\n#!/bin/bash\n# create-database.sh — one-shot, fragile, no drift detection\nkubectl create namespace team-accounts 2>/dev/null\n\
    helm install user-preferences-db bitnami/postgresql \\\n  --namespace team-accounts \\\n  --set auth.postgresPassword=hardcoded123  # Secret in script!\n# If it fails halfway: manual cleanup required\n\
    # If someone manually changes config: permanent drift\n# No status reporting, no backup configuration\n# No automatic secret rotation\n"
  example_good: "# Custom Resource — developer declares desired database\napiVersion: platform.acme.com/v1alpha1\nkind: Database\nmetadata:\n  name: user-preferences-db\n  namespace: team-accounts\nspec:\n\
    \  engine: postgresql\n  version: \"16\"\n  tier: standard  # Maps to instance size + backup policy\n  storage: 50Gi\n  replicas: 2  # Primary + read replica\n  backup:\n    enabled: true\n    retentionDays:\
    \ 30\n---\n# Controller reconciles:\n# 1. Creates CloudNativePG Cluster\n# 2. Creates Vault secret with credentials\n# 3. Creates NetworkPolicy for access control\n# 4. Creates Datadog monitors for\
    \ health/performance\n# 5. Registers in service catalog\n# 6. Updates status:\n# status:\n#   phase: Ready\n#   connectionSecret: user-preferences-db-credentials\n#   endpoint: user-preferences-db.team-accounts.svc:5432\n\
    #   lastBackup: \"2025-06-15T03:00:00Z\"\n"
  how_to_do_right: 1. Define Custom Resource Definitions (CRDs) for each platform capability (database, cache, queue, certificate). 2. Implement controllers using a framework (kubebuilder, Operator SDK,
    or Crossplane Composition). 3. CRDs should have clear spec (desired state) and status (actual state) sections. 4. Controllers must be idempotent — running reconciliation multiple times produces the
    same result. 5. Implement finalizers for clean resource deletion. 6. Expose CRD status in the developer portal for visibility. 7. Version CRDs with proper deprecation policies.
  id: PLAT-004
  severity: medium
  sources:
  - https://kubernetes.io/docs/concepts/extend-kubernetes/operator/
  - https://www.crossplane.io/docs/v1.14/concepts/compositions
  technologies:
