  - standardization
  example_bad: '# No golden paths — every team builds from scratch

    # Team A: Jenkins + Docker Compose + ECS + CloudWatch

    # Team B: GitHub Actions + Helm + EKS + Datadog

    # Team C: GitLab CI + Docker Swarm + Prometheus

    # Team D: CircleCI + Terraform + Lambda + X-Ray

    # 4 teams, 4 completely different stacks

    # On-call engineer must know all 4 stacks

    # Security team must audit 4 different pipeline configurations

    # Incident response: ''which monitoring tool does this service use?''

    '
  example_good: "# Golden path template — go-microservice\n# backstage/templates/go-microservice/template.yaml\napiVersion: scaffolder.backstage.io/v1beta3\nkind: Template\nmetadata:\n  name: go-microservice\n\
    \  title: Go Microservice (Golden Path)\n  description: \"Production-ready Go service with CI/CD, observability, security\"\nspec:\n  type: service\n  parameters:\n    - title: Service Info\n      properties:\n\
    \        name: { type: string }\n        owner: { type: string, ui:field: OwnerPicker }\n        tier: { type: string, enum: [critical, standard, experimental] }\n  steps:\n    - id: create-repo\n \
    \     action: publish:github\n      input:\n        repoUrl: \"github.com?repo=${{ parameters.name }}\"\n    - id: create-k8s\n      action: kubernetes:create-namespace\n    - id: create-vault-secrets\n\
    \      action: vault:create-kv-mount\n    - id: create-datadog-monitors\n      action: datadog:create-monitors\n    - id: register-catalog\n      action: catalog:register\n"
  how_to_do_right: '1. Define 3-5 golden path templates covering 80% of use cases (REST API, event consumer, batch job, frontend app, ML pipeline). 2. Each template includes: repo structure, CI/CD pipeline,
    Dockerfile, Kubernetes manifests, observability config, security controls. 3. Templates are versioned and maintained by the platform team. 4. Make golden paths the default — new service creation uses
    them automatically. 5. Allow divergence: teams can customize, but they own the maintenance burden. 6. Track adoption: >80% of services should be on a golden path. 7. Update golden paths based on post-incident
    learnings.'
  id: PLAT-002
  severity: high
  sources:
  - https://engineering.atspotify.com/2020/08/how-we-use-golden-paths-to-solve-fragmentation-in-our-software-ecosystem/
  - https://backstage.io/docs/features/software-templates/
  technologies:
  - Backstage
  - Cookiecutter
  - Yeoman
