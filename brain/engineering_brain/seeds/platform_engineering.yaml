  example_bad: '# Ticket-based infrastructure provisioning

    # Developer files JIRA ticket: ''Need new microservice infrastructure''

    # Wait 3 days for platform team triage

    # Platform team asks 15 clarifying questions

    # Wait 5 days for provisioning

    # Missing observability — file another ticket

    # Missing secrets access — file another ticket

    # Total time to first deployment: 3 weeks

    # Developer: ''Next time I''ll just deploy to my personal AWS account''

    '
  example_good: "# Platform API — self-service service creation\n# Developer runs one command, gets production-ready service\n$ platform create service \\\n    --name user-preferences \\\n    --template\
    \ go-microservice \\\n    --tier standard \\\n    --owner team-accounts\n\n# Platform automatically provisions:\n# - GitHub repo from template with CI/CD pipeline\n# - Kubernetes namespace with resource\
    \ quotas\n# - Database (PostgreSQL) with connection secrets in Vault\n# - Observability: Datadog dashboard + alerts\n# - Service mesh entry (Istio VirtualService)\n# - Cost allocation tags\n# - Entry\
    \ in service catalog\n# Time: 3 minutes. No tickets filed.\n"
  how_to_do_right: '1. Treat the platform as a product: interview developer customers, build a roadmap, measure adoption. 2. Start with the highest-friction developer workflows (environment creation, deployment,
    secret management). 3. Provide self-service APIs and CLI tools — no ticket queues for standard operations. 4. Embed organizational standards (security, compliance, observability) into platform defaults.
    5. Measure: time-to-first-deployment for new services, developer satisfaction (quarterly survey), and adoption rate. 6. Iterate based on developer feedback — if developers work around the platform,
    the platform has failed.'
  id: PLAT-001
  severity: high
  sources:
  - https://platformengineering.org/blog/what-is-platform-engineering
  - https://teamtopologies.com/key-concepts
  technologies:
  - Backstage
  - Port
  - Kratix
  - Humanitec
  - Kubernetes
  text: Design Internal Developer Platforms as products with clear APIs, not as ticket-based services — the platform must reduce cognitive load for application developers while maintaining organizational
    standards.
  when_applies: Organizations with 50+ developers where infrastructure provisioning is a bottleneck, or where compliance and security standards need to be enforced consistently across teams.
  why: 'Platform engineering exists to solve the ''infrastructure bottleneck'' where application teams wait days or weeks for infrastructure changes through ticket queues. A well-designed IDP makes the
    right thing easy: developers get self-service access to compliant, production-ready infrastructure through APIs and UIs, not by filing tickets. Teams with mature IDPs ship 4x faster than those with
    ticket-based ops (DORA State of DevOps 2024). An IDP that nobody wants to use is worse than no IDP — it adds a layer of complexity without reducing cognitive load.'
- domains:
  - operations
