  how_to_do_right: '1. Enforce resource tagging via policy-as-code: every resource must have team, environment, and service tags. 2. Deploy a cost dashboard (Kubecost, CloudHealth, AWS Cost Explorer, Infracost)
    with per-team views. 3. Share weekly cost reports with team leads — automated, not manual. 4. Set cost anomaly alerts: notify when a team''s spend increases >20% week-over-week. 5. Implement right-sizing
    recommendations: identify over-provisioned resources. 6. Automate cost-saving actions: schedule non-production environments to shut down nights/weekends. 7. Make cost a first-class metric in the developer
    portal.'
