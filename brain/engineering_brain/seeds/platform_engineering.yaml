  example_bad: '# No developer portal — information scattered everywhere

    # Service ownership: a shared spreadsheet (last updated 6 months ago)

    # Documentation: Confluence (some), README.md (some), tribal knowledge (mostly)

    # CI/CD status: check each team''s preferred CI tool

    # Monitoring: ''ask the team which tool they use''

    # New engineer onboarding: ''shadow someone for 3 weeks''

    # Incident: ''does anyone know who owns this service?''

    '
  example_good: "# Backstage app-config.yaml — developer portal configuration\napp:\n  title: \"ACME Developer Portal\"\n  baseUrl: https://portal.internal.acme.com\n\ncatalog:\n  rules:\n    - allow: [Component,\
    \ System, API, Resource, Group, User]\n  locations:\n    - type: url\n      target: https://github.com/acme/*/blob/main/catalog-info.yaml\n      # Auto-discover all services from their catalog-info.yaml\n\
    \nintegrations:\n  github:\n    - host: github.com\n      apps:\n        - appId: 12345\n          privateKey: ${GITHUB_APP_PK}\n\ntechdocs:\n  builder: external  # CI builds docs, portal serves them\n\
    \  generator:\n    runIn: local\n  publisher:\n    type: awsS3\n    awsS3:\n      bucketName: acme-techdocs\n\nkubernetes:\n  serviceLocatorMethod: { type: multiTenant }\n  clusterLocatorMethods:\n\
    \    - type: config\n      clusters:\n        - url: https://k8s.production.internal\n          name: production\n          authProvider: serviceAccount\n"
  how_to_do_right: '1. Deploy Backstage or Port as the developer portal foundation. 2. Populate the service catalog first — register ALL services with owner, lifecycle, tier, dependencies. 3. Enable software
    templates for golden path provisioning. 4. Integrate CI/CD status (GitHub Actions, ArgoCD) as portal plugins. 5. Enable TechDocs for documentation-as-code (docs live in the service repo, rendered in
    portal). 6. Add cost dashboards per team/service. 7. Measure portal adoption: daily active users, template usage, catalog completeness.'
  id: PLAT-003
  severity: medium
  sources:
  - https://backstage.io/docs/overview/what-is-backstage
