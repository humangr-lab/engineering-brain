  text: Implement Compliance as Code with policy engines like OPA, Kyverno, or Sentinel — encode security and compliance policies as code that is automatically enforced in CI/CD and at runtime.
  when_applies: Any organization with compliance requirements (PCI, SOC2, HIPAA, DORA) or security policies that need to be enforced consistently across teams and environments.
  why: Manual compliance checks (spreadsheets, audits, review meetings) do not scale and create friction between security and development teams. Compliance as Code means encoding policies (no public S3
    buckets, all containers run as non-root, PCI-scoped resources must be encrypted) as executable rules that are automatically evaluated. OPA (Open Policy Agent) evaluates policies against JSON input from
    any source. Kyverno operates natively in Kubernetes as an admission controller. Sentinel integrates with Terraform. Automated policy enforcement catches violations before they reach production — a policy
    violation in a PR review is 100x cheaper to fix than one found in a compliance audit.
