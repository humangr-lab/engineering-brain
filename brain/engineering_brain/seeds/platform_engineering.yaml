  - GitHub templates
  text: Define golden paths as paved roads that are easy to follow — provide opinionated templates that encode organizational best practices while allowing teams to diverge when justified.
  when_applies: Organizations with multiple development teams building services, particularly where consistency in security, observability, and operational practices is important.
  why: 'Golden paths (a.k.a. paved roads) are pre-built, well-maintained paths through the platform that encode best practices: the right CI/CD pipeline, the right observability setup, the right security
    controls. Spotify coined the term: ''the golden path is the opinionated and supported path to build something. It is not mandatory, but it should be the easiest path.'' Without golden paths, every team
    reinvents infrastructure from scratch, leading to inconsistent security posture, operational burden from unique snowflake services, and 3-5x longer time-to-production for new services.'
