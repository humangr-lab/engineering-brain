  how_to_do_right: '1. Staff the platform team with engineers, not just ops — platform work is software engineering. 2. Define the platform team''s API surface: what self-service capabilities do you provide?
    3. Interaction mode: X-as-a-Service for mature capabilities, Collaboration for new capabilities being designed. 4. Minimize tickets: every ticket is a signal that the self-service API is incomplete.
    5. Track platform team as a product team: roadmap, backlog, user research (developer interviews). 6. Platform team size: typically 5-15% of engineering headcount. 7. Avoid the ''platform team does everything''
