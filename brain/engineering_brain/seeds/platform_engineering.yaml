  text: Provide secret management as a platform service using Vault or External Secrets Operator — developers should never handle raw secrets or store them in environment variables, config files, or Git.
  when_applies: Any application that uses secrets (database credentials, API keys, certificates, tokens), which is virtually every application in production.
  why: Secrets in environment variables, config files, or Git are the root cause of 13% of data breaches (GitGuardian State of Secrets 2024). Over 12.8 million hardcoded secrets were detected in public
    GitHub repos in 2023. A platform-managed secret service means developers declare that they need a database password, and the platform injects it at runtime from Vault. The developer never sees, copies,
    or manages the actual secret value. This eliminates an entire class of security vulnerabilities and operational burden (secret rotation becomes a platform concern, not a per-team effort).
