  example_bad: '# Compliance via quarterly audit spreadsheet

    # compliance_checklist.xlsx

    # Row 1: ''Are all S3 buckets private?'' -> ''Yes'' (manually checked 3 months ago)

    # Row 2: ''Do all containers run as non-root?'' -> ''Mostly'' (not verified)

    # Row 3: ''Is encryption enabled?'' -> ''Yes'' (for resources we know about)

    # Between audits: 47 public buckets created, 12 root containers deployed

    # Audit finds violations 3 months late — remediation costs 10x more

    '
  example_good: "# Kyverno policy — enforce non-root containers\napiVersion: kyverno.io/v1\nkind: ClusterPolicy\nmetadata:\n  name: require-non-root\n  annotations:\n    policies.kyverno.io/title: Require\
    \ Non-Root Containers\n    policies.kyverno.io/category: Security\n    policies.kyverno.io/severity: high\nspec:\n  validationFailureAction: Enforce  # Block, not just warn\n  rules:\n    - name: check-security-context\n\
    \      match:\n        any:\n          - resources:\n              kinds: [Pod]\n      validate:\n        message: \"Containers must run as non-root. Set securityContext.runAsNonRoot: true and securityContext.runAsUser\
    \ > 0.\"\n        pattern:\n          spec:\n            containers:\n              - securityContext:\n                  runAsNonRoot: true\n                  runAsUser: \">0\"\n---\n# OPA policy for\
    \ Terraform — no public S3 buckets\npackage terraform.s3\ndeny[msg] {\n    resource := input.resource_changes[_]\n    resource.type == \"aws_s3_bucket_acl\"\n    resource.change.after.acl == \"public-read\"\
    \n    msg := sprintf(\"S3 bucket '%s' must not be public\", [resource.address])\n}\n"
  how_to_do_right: '1. Start with the highest-risk policies: no public cloud storage, no containers running as root, encryption required for sensitive data. 2. Implement policies as code in Rego (OPA),
    Kyverno YAML, or Sentinel. 3. Enforce in CI/CD: Terraform plans checked by OPA/Sentinel before apply. 4. Enforce at runtime: Kyverno as Kubernetes admission controller rejects non-compliant resources.
    5. Provide clear error messages: tell developers exactly what is wrong and how to fix it. 6. Allow policy exceptions with documented approval workflow (not blanket bypasses). 7. Version policies in
    Git alongside infrastructure code.'
