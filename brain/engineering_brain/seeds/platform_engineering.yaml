  text: Organize platform teams using the Team Topologies platform team pattern — a platform team is a stream-aligned team that provides a self-service API to reduce cognitive load for other stream-aligned
    teams.
  when_applies: Organizations with 30+ engineers and multiple stream-aligned teams, where infrastructure and tooling needs are creating friction for product development.
  why: 'Team Topologies (Skelton & Pais) defines four fundamental team types: stream-aligned, enabling, complicated-subsystem, and platform. The platform team exists specifically to reduce cognitive load
    for stream-aligned teams by providing self-service internal tools, frameworks, and services. A platform team that operates as a gatekeeper (ticket queues, approval workflows) is an anti-pattern — it
    becomes an ops team wearing a platform team label. The interaction mode between platform and stream-aligned teams should be X-as-a-Service: low friction, high autonomy. Platform teams that require embedded
    work with every consuming team do not scale.'
