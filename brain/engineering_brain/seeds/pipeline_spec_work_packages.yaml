layer: rules
domain: sacada
knowledge:
- id: PSW-001
  text: A Work Package must be ATOMIC — completable in a single pass by one developer in under 4 hours, with no external dependencies blocking completion
  why: 'Work Packages that take more than 4 hours invite context-switching, partial completion, and stale branches. When a WP requires multiple sessions, the developer loses context between sessions and introduces inconsistencies. Real example: a WP titled "Implement payment system" was assigned to a developer. It took 3 weeks, spanned 47 files, and had 12 intermediate commits that broke tests. When code review came, the reviewer could not understand the 2,400-line diff. The PR was abandoned and rewritten as 8 smaller WPs, each reviewable in 20 minutes. The 8 WPs were completed in 5 days total — less than the original 3 weeks.'
  how_to_do_right: |
    1. A WP must be completable in ONE sitting (2-4 hours max, including tests).
    2. A WP must produce a deployable increment — tests pass before and after.
    3. If a WP requires waiting for another team, API, or infrastructure, split it: one WP for the stub/mock, one for the integration.
    4. If a WP touches more than 5 files, it is probably too big — decompose further.
    5. Apply the "could a new joiner do this in a day?" test. If no, it is too big.
    6. Each WP must have exactly ONE primary deliverable (a file, a function, a migration, a test suite).
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # WP-PAY-001: Create Pydantic models for payment requests/responses
    # Deliverable: src/payments/models.py
    # Acceptance: Models validate all fields, 100% type coverage, tests pass
    # Estimate: 2 hours
    # Dependencies: None

    # WP-PAY-002: Implement payment creation endpoint
    # Deliverable: src/payments/routes.py::create_payment
    # Acceptance: POST /payments returns 201, validates input, saves to DB
    # Estimate: 3 hours
    # Dependencies: WP-PAY-001 (models)
  example_bad: |
    # WP-001: Implement payment system
    # Deliverable: "Payment module"
    # Acceptance: "Payments work"
    # Estimate: 2 weeks
    # Dependencies: "Auth system, database, Stripe integration, frontend"
    # Result: 3 weeks, 47 files, 2400-line PR, abandoned and rewritten
  when_applies: During spec decomposition, sprint planning, WP creation
  sources: ["https://www.agilealliance.org/glossary/user-story-splitting/"]

- id: PSW-002
  text: Acceptance criteria must be EXECUTABLE — if a human cannot verify it in under 5 minutes with a concrete command or check, it is not an acceptance criterion
  why: 'Vague acceptance criteria ("works correctly," "handles errors," "is performant") cannot be verified, so they are never verified. The WP is marked "done" based on gut feeling. Real example: a WP had acceptance criteria "API handles errors gracefully." The developer added try/except that returned HTTP 500 with the Python stack trace. Technically, it "handled" the error. Gracefully? Depends on who you ask. A concrete criterion like "all errors return JSON with error_code and message, never stack traces, verified by pytest test_error_responses.py" would have caught this.'
  how_to_do_right: |
    1. Every acceptance criterion must be verifiable with a specific command: pytest, curl, or manual check.
    2. Format: "GIVEN [context], WHEN [action], THEN [observable result]."
    3. Include the exact verification command: "Run: pytest tests/test_payment.py -k test_create_payment_success"
    4. Include expected output: "Returns HTTP 201 with body containing payment_id (UUID) and status='pending'"
    5. Include negative cases: "Returns HTTP 422 when amount is negative, with error_code='INVALID_AMOUNT'"
    6. Ban vague words: "works," "handles," "is correct," "properly," "gracefully" — replace with specifics.
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Acceptance Criteria for WP-PAY-001:
    # AC1: pytest tests/test_payment_models.py passes (0 failures)
    # AC2: PaymentRequest rejects negative amounts: PaymentRequest(amount=-1) raises ValidationError
    # AC3: PaymentRequest rejects invalid currencies: PaymentRequest(currency="XXX") raises ValidationError
    # AC4: PaymentResponse serializes to JSON with keys: payment_id, amount, currency, status, created_at
    # AC5: mypy src/payments/models.py --strict exits with 0 errors
  example_bad: |
    # Acceptance Criteria:
    # - Models work correctly
    # - Validation is implemented
    # - Types are correct
    # Result: "works correctly" = passes one happy-path test, edge cases untested
  when_applies: During WP writing, spec reviews, sprint planning
  sources: ["https://www.agilealliance.org/glossary/acceptance-criteria/"]

- id: PSW-003
  text: Cross-reference validation between WPs must verify that every dependency exists, every deliverable is consumed, and no circular dependencies exist
  why: 'WPs form a dependency graph. If WP-B depends on WP-A deliverable that does not exist, WP-B is blocked. If WP-C produces a deliverable nobody consumes, it is waste. If WP-D depends on WP-E which depends on WP-D, both are blocked forever. Real example: a sprint plan had 15 WPs. WP-07 depended on "WP-04: Create database migrations" — but WP-04 did not exist (it was WP-05 that created migrations). WP-07 was blocked for 2 days while the team figured out the dependency. WP-12 produced a "caching layer" that no other WP referenced — it was never integrated and was deleted 3 months later.'
  how_to_do_right: |
    1. Build a dependency graph before starting: WP-A -> WP-B -> WP-C.
    2. Validate forward references: every "depends on WP-X" must reference an existing WP.
    3. Validate consumption: every WP deliverable must be consumed by at least one downstream WP or be a final artifact.
    4. Check for cycles: topological sort must succeed. If it fails, there is a circular dependency.
    5. Validate ID uniqueness: no two WPs can have the same ID.
    6. Automate validation: write a script that parses WP YAML and validates the graph.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Dependency graph (validated by scripts/validate_wps.py):
    # WP-001 (models) -> WP-002 (routes) -> WP-004 (integration tests)
    # WP-001 (models) -> WP-003 (services) -> WP-004 (integration tests)
    # WP-005 (migrations) -> WP-002 (routes)
    #
    # Validation output:
    # [OK] 5 WPs, 0 orphans, 0 missing refs, 0 cycles
    # [OK] Topological order: WP-001, WP-005, WP-002, WP-003, WP-004
  example_bad: |
    # WP-007 depends on WP-004, but WP-004 doesn't exist (it's WP-005)
    # WP-012 produces "caching layer" but nothing depends on it
    # WP-009 depends on WP-011, WP-011 depends on WP-009 (cycle!)
    # Nobody validates the graph — developers discover issues at implementation time
  when_applies: During sprint planning, WP creation, spec validation gates
  sources: ["https://martinfowler.com/articles/consumer-driven-contracts.html"]

- id: PSW-004
  text: Dependency graph construction must use topological sort to determine execution order — never rely on WP numbering as implicit ordering
  why: 'WP numbering (WP-001, WP-002, ...) creates a false sense of sequential ordering. Developers assume WP-003 depends on WP-002 which depends on WP-001. In reality, WP-003 might depend on WP-001 directly, and WP-002 might be completely independent. Without explicit dependency edges and topological sort, parallel work opportunities are missed and false dependencies are created. Real example: a team of 4 developers executed 20 WPs sequentially (one at a time) because the WP numbers implied order. A topological analysis showed that 8 WPs had no dependencies and could have been parallelized, reducing the sprint from 10 days to 5.'
  how_to_do_right: |
    1. Each WP explicitly lists its dependencies: depends_on: [WP-001, WP-005].
    2. Run topological sort on the dependency graph to determine valid execution orders.
    3. Identify parallelizable WPs: WPs with no shared dependencies can run concurrently.
    4. Visualize the graph: use graphviz or mermaid to create a DAG diagram.
    5. Calculate the critical path: the longest chain of dependent WPs determines minimum sprint duration.
    6. Never assign WP numbers based on execution order — use semantic IDs (WP-AUTH-001, WP-PAY-001).
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Dependency DAG (topological sort reveals parallelism):
    #
    # Layer 0 (parallel): WP-AUTH-001 (models), WP-PAY-001 (models)
    # Layer 1 (parallel): WP-AUTH-002 (service), WP-PAY-002 (service)
    # Layer 2 (parallel): WP-AUTH-003 (routes), WP-PAY-003 (routes)
    # Layer 3 (sequential): WP-INT-001 (integration — depends on both)
    #
    # Critical path: 4 layers = 4 WPs sequential = ~16 hours
    # With 2 devs: Auth track + Pay track in parallel = 2 layers + 1 integration = ~12 hours
  example_bad: |
    # WP-001, WP-002, WP-003, ..., WP-020
    # Team executes sequentially: WP-001 first, then WP-002, etc.
    # WP-008 (database migration) blocks WP-009 (API routes) — but WP-010 (frontend) doesn't need either
    # Nobody discovers the parallelism opportunity
  when_applies: During sprint planning, WP creation, team assignment
  sources: ["https://docs.python.org/3/library/graphlib.html"]

- id: PSW-005
  text: WP naming conventions must encode the domain, type, and sequence — WP-001 tells you nothing, WP-AUTH-SVC-003 tells you everything
  why: 'Opaque WP names (WP-001, TASK-42) force developers to open the WP description to understand what it is about. In a sprint with 20+ WPs, this constant context-switching wastes time and creates confusion. Semantic names let you understand the sprint plan at a glance, identify domain clusters, and spot missing pieces. Real example: a sprint retrospective revealed that developers spent 15% of their time just finding and reading WP descriptions to understand what each one was about. After switching to semantic naming, the same information was encoded in the ID, and planning meetings became 40% shorter.'
  how_to_do_right: |
    1. Format: WP-{DOMAIN}-{TYPE}-{SEQ} (e.g., WP-AUTH-MDL-001, WP-PAY-SVC-002).
    2. DOMAIN: 3-4 letter code for the bounded context (AUTH, PAY, CLAIM, USER, NOTIF).
    3. TYPE: 3 letter code for the artifact type (MDL=model, SVC=service, RTE=route, TST=test, MIG=migration, CFG=config).
    4. SEQ: 3-digit sequence within domain+type (001, 002, ...).
    5. Keep a registry of domain codes and type codes in the project wiki.
    6. Names must be unique across the entire project, not just the sprint.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Sprint 12 WP List — readable at a glance:
    # WP-AUTH-MDL-001: JWT token Pydantic models
    # WP-AUTH-SVC-001: Token generation service
    # WP-AUTH-RTE-001: Login endpoint
    # WP-AUTH-TST-001: Auth integration tests
    # WP-PAY-MDL-001: Payment request/response models
    # WP-PAY-SVC-001: Payment processing service
    # WP-PAY-RTE-001: Payment creation endpoint
    # WP-PAY-MIG-001: Payments table migration
    # At a glance: 2 domains (AUTH, PAY), full stack for each, tests included
  example_bad: |
    # Sprint 12 WP List:
    # WP-001, WP-002, WP-003, WP-004, WP-005, WP-006, WP-007, WP-008
    # Which one is the auth model? Which is the payment route?
    # Nobody knows without opening each WP description
  when_applies: During WP creation, sprint planning, naming convention reviews
  sources: ["https://martinfowler.com/bliki/UbiquitousLanguage.html"]

- id: PSW-006
  text: WP deliverable specification must name the EXACT file path, function/class name, and interface — "implement the service" is not a deliverable
  why: 'Ambiguous deliverables lead to ambiguous implementations. When a WP says "implement payment service," one developer creates a single 500-line file, another creates a module with 5 files, and a third creates a class with 3 methods. None match what downstream WPs expect. Real example: WP-003 depended on WP-002 deliverable "auth middleware." WP-002 developer created a function called verify_token() in utils.py. WP-003 developer expected a class called AuthMiddleware in middleware.py with method authenticate(). The integration required a full day of rework that would not have been needed if the deliverable specified the exact interface.'
  how_to_do_right: |
    1. Specify the exact file path: src/payments/services.py
    2. Specify the exact class/function: class PaymentService with methods create(), get(), list(), cancel()
    3. Specify the interface (signature): create(request: PaymentRequest) -> PaymentResponse
    4. Specify the module exports: __all__ = ["PaymentService", "PaymentError"]
    5. If creating a new file, specify the full module structure including imports.
    6. If modifying an existing file, specify which function/class to add/modify and the expected diff.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # WP-PAY-SVC-001 Deliverable:
    # File: src/payments/services.py
    # Class: PaymentService
    # Methods:
    #   async def create(self, request: PaymentRequest) -> PaymentResponse
    #   async def get(self, payment_id: UUID) -> PaymentResponse
    #   async def list(self, user_id: UUID, page: int, size: int) -> Page[PaymentResponse]
    #   async def cancel(self, payment_id: UUID, reason: str) -> PaymentResponse
    # Dependencies: PaymentRepository (injected), StripeClient (injected)
    # Exports: __all__ = ["PaymentService"]
  example_bad: |
    # WP-002 Deliverable: "Payment service"
    # Result: developer creates pay.py with function do_payment()
    # Downstream WP expected: PaymentService.create() in services.py
    # Integration fails, 1 day wasted on rework
  when_applies: During WP writing, deliverable specification, interface design
  sources: ["https://martinfowler.com/articles/designDead.html"]

- id: PSW-007
  text: WP size estimation must use reference-based estimation, not gut feeling — compare to completed WPs of similar complexity, not to an abstract "story points" scale
  why: 'Estimation by gut feeling is consistently wrong. Developers underestimate by 2-3x on average (planning fallacy). Story points are meaningless without calibration — one team''s 5 points is another team''s 13. Reference-based estimation using completed WPs provides an empirical anchor. Real example: a team estimated a "simple CRUD endpoint" at 2 hours. Historical data showed that their last 5 "simple CRUD endpoints" took 3.5, 4.0, 2.5, 5.0, and 3.0 hours respectively. The average was 3.6 hours, the median was 3.5. The 2-hour estimate was optimistic by 75%. Using the historical reference, the WP was estimated at 4 hours and completed in 3.5.'
  how_to_do_right: |
    1. Maintain a catalog of completed WPs with actual time: {WP-ID, type, estimate, actual, complexity_notes}.
    2. For each new WP, find 3 similar completed WPs and use their average actual time.
    3. Apply a 1.3x buffer for unknowns (new technology, new domain, unfamiliar codebase).
    4. If no reference WPs exist, use planning poker with explicit uncertainty range (e.g., 2-6 hours).
    5. Track estimate vs actual for every WP to calibrate future estimates.
    6. If a WP estimate exceeds 4 hours, decompose it into smaller WPs.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # WP-PAY-SVC-001 Estimation:
    # Reference WPs:
    #   WP-AUTH-SVC-001 (similar: service with 4 methods, DI, tests) -> actual: 3.5h
    #   WP-USER-SVC-001 (similar: CRUD service, repository pattern) -> actual: 4.0h
    #   WP-CLAIM-SVC-001 (similar: service with validation logic) -> actual: 3.0h
    # Average reference: 3.5h
    # Adjustment: +0.5h (new Stripe API, unfamiliar)
    # Estimate: 4.0h
    # Actual: 3.5h (within 15% of estimate — good calibration)
  example_bad: |
    # WP-PAY-SVC-001 Estimation:
    # "I think this is about 2 hours" (gut feeling)
    # Actual: 6 hours (3x underestimate)
    # Sprint overruns by 2 days because every WP was underestimated the same way
  when_applies: During sprint planning, WP estimation, capacity planning
  sources: ["https://www.agilealliance.org/glossary/relative-estimation/"]

- id: PSW-008
  text: WP independence verification must confirm that a WP can be developed, tested, and merged WITHOUT any other WP being in progress — shared branches and shared state are WP killers
  why: 'When WPs share branches, share in-progress state, or require simultaneous development, they create merge conflicts, integration headaches, and blocking dependencies. Independent WPs can be developed in any order, by any developer, and merged individually. Real example: 4 WPs were developed on the same branch because "they are related." When WP-03 had a test failure, it blocked the merge of WP-01 and WP-02 (which were both complete and passing). The team lost 2 days waiting for WP-03 to be fixed before any work could be merged.'
  how_to_do_right: |
    1. Each WP gets its own branch: feature/WP-PAY-SVC-001.
    2. Each WP is mergeable independently: tests pass on the WP branch alone.
    3. If WP-B depends on WP-A, WP-B branches from main AFTER WP-A is merged. Never branch from a feature branch.
    4. If two WPs modify the same file, one must be sequenced after the other (dependency edge).
    5. Verify independence: "Can I develop and merge this WP if all other WPs are cancelled?" If no, add a dependency.
    6. Shared state (e.g., database schema) must be handled via migrations that are their own WP.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # WP Independence Matrix:
    # | WP              | Branch                  | Mergeable alone? | Modifies shared file? |
    # |-----------------|-------------------------|------------------|-----------------------|
    # | WP-PAY-MDL-001  | feature/WP-PAY-MDL-001  | Yes              | No (new file)         |
    # | WP-PAY-SVC-001  | feature/WP-PAY-SVC-001  | Yes (after MDL)  | No (new file)         |
    # | WP-PAY-RTE-001  | feature/WP-PAY-RTE-001  | Yes (after SVC)  | Yes (app.py — router) |
    # | WP-PAY-MIG-001  | feature/WP-PAY-MIG-001  | Yes              | No (new migration)    |
    # Conclusion: MDL and MIG can be parallel. SVC after MDL. RTE after SVC.
  example_bad: |
    # All 4 WPs on branch "feature/payments"
    # WP-03 test fails → blocks merge of WP-01, WP-02, WP-04
    # Developer A's changes conflict with Developer B's changes in same branch
    # 2 days lost to merge conflicts and coordination
  when_applies: During WP planning, branch strategy, team assignment
  sources: ["https://martinfowler.com/bliki/FeatureBranch.html"]

- id: PSW-009
  text: WP testing strategy must specify WHICH tests to write, WHERE they go, and what they cover — "add tests" is not a testing strategy
  why: 'Without a specific testing strategy, developers write the minimum tests to pass code review — usually a few happy-path unit tests. Edge cases, integration tests, and error paths are skipped because the WP does not require them. Real example: a WP had acceptance criterion "add tests." The developer wrote 3 unit tests with 100% line coverage. All three tested the happy path. The service had 7 error paths (invalid input, database error, external API timeout, duplicate key, etc.) — none were tested. The first production error caused a 500 with a stack trace because the error handling code had never been executed.'
  how_to_do_right: |
    1. Specify test file location: tests/test_payments/test_payment_service.py
    2. Specify test categories: unit (isolated), integration (with DB), e2e (full stack).
    3. Specify test cases explicitly: test_create_success, test_create_negative_amount, test_create_db_timeout, test_create_duplicate_idempotency_key.
    4. Specify coverage requirement: 90% line coverage, 100% branch coverage on error paths.
    5. Specify what to mock: external APIs (Stripe), what to NOT mock: database (use test containers).
    6. Each WP that creates business logic must include test cases for ALL error paths, not just the happy path.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # WP-PAY-SVC-001 Testing Strategy:
    # File: tests/test_payments/test_payment_service.py
    # Unit tests (mock: StripeClient, PaymentRepository):
    #   test_create_payment_success
    #   test_create_payment_negative_amount_raises_validation_error
    #   test_create_payment_duplicate_idempotency_key_returns_existing
    #   test_create_payment_stripe_timeout_raises_service_error
    #   test_create_payment_db_error_does_not_charge_stripe
    # Integration tests (real DB, mock: StripeClient):
    #   test_create_payment_persists_to_db
    #   test_cancel_payment_updates_status_in_db
    # Coverage: >= 95% line, 100% branch on error paths
  example_bad: |
    # WP-PAY-SVC-001 Testing:
    # "Add tests"
    # Result: 3 happy-path tests, 100% line coverage, 0% error path coverage
  when_applies: During WP writing, test strategy reviews, QA reviews
  sources: ["https://martinfowler.com/articles/practical-test-pyramid.html"]

- id: PSW-010
  text: WP prioritization must use a dependency-aware algorithm — MoSCoW without considering the dependency graph produces unimplementable sprint plans
  why: 'Prioritizing WPs by business value alone ignores technical dependencies. A "Must Have" feature that depends on three "Could Have" infrastructure WPs cannot be implemented first. The result is a sprint plan that looks correct on paper but is impossible to execute in order. Real example: a product owner prioritized WPs by business value. The #1 priority WP required a database migration (#8 priority), a new authentication scope (#12 priority), and an API gateway configuration (#15 priority). The developer started the #1 WP and was immediately blocked by three lower-priority WPs that had not been started.'
  how_to_do_right: |
    1. First, build the dependency graph (topological sort).
    2. Then, assign business priority within each dependency layer.
    3. All dependencies of a "Must Have" WP are automatically "Must Have" (priority inheritance).
    4. If a "Could Have" WP is a dependency of a "Must Have" WP, promote it to "Must Have."
    5. The execution order is: topological order FIRST, then business priority within each layer.
    6. Visualize the prioritized DAG: Must Have dependencies form the critical path.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # Prioritization with dependency awareness:
    #
    # Layer 0 (no deps):
    #   [MUST]  WP-PAY-MDL-001 (models — inherited from WP-PAY-RTE-001)
    #   [MUST]  WP-PAY-MIG-001 (migration — inherited from WP-PAY-SVC-001)
    #   [COULD] WP-NOTIF-MDL-001 (notification models — no downstream Must)
    #
    # Layer 1 (depends on Layer 0):
    #   [MUST]  WP-PAY-SVC-001 (service — required by route)
    #   [SHOULD] WP-NOTIF-SVC-001 (notification service)
    #
    # Layer 2:
    #   [MUST]  WP-PAY-RTE-001 (the endpoint product wants)
    #
    # Critical path: MDL -> SVC -> RTE (3 layers, ~12 hours)
  example_bad: |
    # MoSCoW without dependencies:
    # [MUST]  WP-PAY-RTE-001 — "Start here!" says product owner
    # Developer: "I need models, services, and migrations first..."
    # [COULD] WP-PAY-MDL-001 — "This is just plumbing, do it later"
    # Sprint is stuck on day 1
  when_applies: During sprint planning, backlog prioritization, sprint reviews
  sources: ["https://www.agilealliance.org/glossary/moscow/"]

- id: PSW-011
  text: WP risk assessment must identify technical risks BEFORE implementation and assign mitigation strategies — discovering risks during implementation wastes the entire WP time budget
  why: 'Technical risks (unfamiliar API, complex algorithm, new infrastructure, performance uncertainty) discovered during implementation blow up WP estimates and block sprints. Identifying risks upfront allows mitigation (spike, prototype, fallback plan) before committing the sprint time. Real example: a WP estimated at 4 hours required integrating with a third-party KYC API. During implementation, the developer discovered the API had a 15-second response time, no sandbox environment, and documentation in Portuguese only. The 4-hour WP took 3 days. A 30-minute risk assessment would have identified these issues, and the mitigation (mock the API, build async processing) could have been planned as separate WPs.'
  how_to_do_right: |
    1. For each WP, list risks: new technology, external API, performance-critical, complex algorithm, shared state.
    2. Classify risk level: LOW (known tech, clear requirements), MEDIUM (new API, some unknowns), HIGH (new domain, no reference).
    3. For MEDIUM risks: add 50% time buffer and document the risk.
    4. For HIGH risks: create a spike WP (2-hour investigation) before the implementation WP.
    5. Define fallback plan: "If Stripe API is down, use mock response and queue for retry."
    6. Never start a HIGH-risk WP without completing the spike first.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # WP-PAY-SVC-001 Risk Assessment:
    # | Risk                          | Level  | Mitigation                              |
    # |-------------------------------|--------|-----------------------------------------|
    # | Stripe API rate limits        | MEDIUM | Use idempotency keys, add retry logic   |
    # | Stripe sandbox unavailable    | LOW    | Mock client exists in test fixtures      |
    # | Decimal precision in BRL      | MEDIUM | Use Decimal(2) for BRL, test with R$0.01|
    # | Concurrent payment creation   | HIGH   | SPIKE: WP-PAY-SPIKE-001 (2h) first     |
    # Overall: MEDIUM — add 50% buffer (4h -> 6h estimate)
  example_bad: |
    # WP-PAY-SVC-001: No risk assessment
    # Developer discovers during implementation:
    # - Stripe rate limit hit on 3rd test run
    # - Decimal rounding produces R$0.01 errors
    # - Two concurrent requests create duplicate payments
    # 4-hour estimate becomes 3-day ordeal
  when_applies: During WP creation, sprint planning, risk reviews
  sources: ["https://sre.google/sre-book/managing-risk/"]

- id: PSW-012
  text: WP rollback plan must define how to UNDO the WP changes if they break production — every WP is a potential deployment, and every deployment needs a rollback
  why: 'In continuous deployment, every merged WP is a potential production deployment. If the WP introduces a regression, the team needs a fast rollback plan — not a "figure it out in the incident." Real example: a WP added a new database column with a NOT NULL constraint and no default value. The migration ran successfully in staging (empty table). In production (10 million rows), the migration locked the table for 47 minutes and then failed. There was no rollback plan. The team spent 3 hours writing a reverse migration under pressure during the incident, while the application was partially down.'
  how_to_do_right: |
    1. Every WP must include a rollback plan: "Revert commit X" or "Run migration Y_rollback."
    2. Database migrations must be reversible: every UP migration has a matching DOWN migration.
    3. Feature flags: new features behind flags allow disable without code rollback.
    4. If the WP changes an API contract, specify the backward-compatible transition period.
    5. Test the rollback: actually run the reverse migration in staging before deploying to production.
    6. Define rollback criteria: "If error rate > 1% within 15 minutes of deploy, trigger rollback."
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # WP-PAY-MIG-001 Rollback Plan:
    # Forward: alembic upgrade head (adds payments table)
    # Rollback: alembic downgrade -1 (drops payments table)
    # Tested: rollback verified in staging on 2026-02-20
    # Criteria: if payments.create error rate > 1% in 15 min, run rollback
    # Data: new table, no data loss on rollback
    # Dependencies: WP-PAY-SVC-001 must also be rolled back (feature flag OFF)
    #
    # WP-PAY-SVC-001 Rollback Plan:
    # Feature flag: ENABLE_PAYMENTS=false (disables routes, no code rollback needed)
    # Full rollback: git revert <commit-sha> if flag is insufficient
  example_bad: |
    # WP-PAY-MIG-001: No rollback plan
    # Migration adds NOT NULL column to 10M-row table
    # Production: table locked for 47 minutes, migration fails
    # Team scrambles to write reverse migration during incident
    # 3 hours of downtime
  when_applies: During WP creation, deployment planning, incident preparedness
  sources: ["https://martinfowler.com/bliki/BlueGreenDeployment.html", "https://martinfowler.com/bliki/FeatureToggle.html"]

- id: PSW-013
  text: WP documentation requirements must specify WHAT to document and WHERE — inline code comments, docstrings, and ADRs serve different purposes
  why: 'Undocumented WPs create knowledge silos. When the original developer leaves, no one understands why certain decisions were made or how to modify the code safely. But "add documentation" without specifying type and location leads to either no documentation or the wrong kind. Real example: a WP had acceptance criterion "document the code." The developer added a 500-word comment at the top of the file explaining the algorithm. Six months later, the algorithm had been refactored 3 times but the comment was never updated. The comment described code that no longer existed, misleading 2 developers who relied on it.'
  how_to_do_right: |
    1. Docstrings: every public function/class must have a docstring (Google style). What it does, parameters, return value, raises.
    2. Inline comments: explain WHY, not WHAT. "# Stripe requires amount in centavos, not reais" — good. "# Multiply by 100" — bad.
    3. ADRs: any significant design decision gets an Architecture Decision Record (why this approach, what alternatives were considered).
    4. README: module-level README.md only if the module has non-obvious setup or usage patterns.
    5. Type hints: 100% type coverage on public APIs — types ARE documentation.
    6. Keep documentation close to code: docstrings > wiki pages. If the code changes, the docstring is right there to update.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    class PaymentService:
        """Handles payment lifecycle: creation, retrieval, cancellation.

        Uses Stripe as the payment processor. All amounts are in BRL centavos
        (R$49.99 = 4999 centavos) to avoid floating-point precision issues.

        Args:
            repo: PaymentRepository for persistence.
            stripe: StripeClient for payment processing.

        Example:
            service = PaymentService(repo=repo, stripe=stripe)
            payment = await service.create(PaymentRequest(amount=4999, currency="BRL"))
        """

        async def create(self, request: PaymentRequest) -> PaymentResponse:
            """Create a new payment and charge via Stripe.

            Args:
                request: Validated payment request with amount in centavos.

            Returns:
                PaymentResponse with payment_id and initial status.

            Raises:
                PaymentError: If Stripe charge fails.
                DuplicateError: If idempotency key already exists.
            """
  example_bad: |
    class PaymentService:
        # Payment service
        def create(self, request):
            # Create payment
            ...
  when_applies: During WP writing, code review, documentation audits
  sources: ["https://google.github.io/styleguide/pyguide.html#38-comments-and-docstrings"]

- id: PSW-014
  text: WP code review scope must be defined UPFRONT — reviewer must know what to focus on (logic, security, performance, architecture) before opening the PR
  why: 'Without a defined review scope, reviewers either rubber-stamp the PR ("LGTM" in 2 minutes) or spend hours reviewing irrelevant details (formatting, import order) while missing critical logic bugs. Defining the review scope upfront tells the reviewer what matters. Real example: a PR with a complex concurrency fix was reviewed in 5 minutes — the reviewer focused on code style (consistent naming, import order) and missed a race condition. The race condition reached production and caused duplicate charges. If the review scope had said "Focus: concurrency correctness, check all shared state access," the reviewer would have found the bug.'
  how_to_do_right: |
    1. Each WP PR includes a "Review Focus" section in the PR description.
    2. Specify primary focus: LOGIC (business rules), SECURITY (auth, input validation), PERFORMANCE (queries, caching), ARCHITECTURE (patterns, coupling).
    3. Specify what NOT to review: "Formatting was already fixed by ruff — do not review style."
    4. Highlight risky areas: "Lines 45-60 handle the race condition fix — please review carefully."
    5. Assign reviewer by expertise: security WPs to security-focused reviewer, performance WPs to performance expert.
    6. Include test evidence: "Tests covering this change: test_concurrent_payment_creation, test_idempotency_key_reuse."
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # PR Description for WP-PAY-SVC-001:
    #
    # ## Review Focus
    # - **PRIMARY**: Business logic correctness (payment creation, cancellation)
    # - **SECONDARY**: Error handling completeness (all Stripe error codes handled)
    # - **SKIP**: Formatting (ruff applied), type hints (mypy passes)
    #
    # ## Risky Areas
    # - `services.py:45-60`: Idempotency key check — race condition possible
    # - `services.py:72-85`: Stripe amount conversion (BRL centavos)
    #
    # ## Tests
    # - `test_payment_service.py`: 12 tests, 95% coverage
    # - Run: `pytest tests/test_payments/ -v`
  example_bad: |
    # PR Description: "Implement payment service"
    # No review focus, no risky areas, no test evidence
    # Reviewer spends 30 minutes checking import order
    # Misses the race condition in line 52
  when_applies: During PR creation, code review setup, review process design
  sources: ["https://google.github.io/eng-practices/review/reviewer/"]

- id: PSW-015
  text: WP completion criteria must include passing automated checks AND manual verification — green CI is necessary but not sufficient
  why: 'CI passing means the code compiles, tests pass, and linting is clean. It does NOT mean the feature works as intended, the UX is acceptable, or the edge cases were covered. Relying solely on CI for completion leads to features that technically work but do not solve the problem. Real example: a WP for "user search" passed all CI checks — tests passed, coverage was 95%, linting clean. But the search returned results sorted by database insertion order instead of relevance. The acceptance criteria said "search returns results" (which it did), not "search returns results sorted by relevance." A manual check by the QA would have caught this in 30 seconds.'
  how_to_do_right: |
    1. Automated checks (CI): tests pass, coverage >= 90%, linting clean, type check clean, security scan clean.
    2. Manual verification (developer): run the feature locally, verify the happy path works as intended.
    3. Manual verification (reviewer): checkout the branch, run the feature, verify edge cases.
    4. Acceptance test: execute each acceptance criterion manually and record pass/fail.
    5. Demo: WPs that change user-facing behavior must include a 2-minute demo (screen recording or live).
    6. Definition of Done checklist: [ ] CI green, [ ] Manual test, [ ] Review approved, [ ] AC verified, [ ] Demo recorded.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, code_quality]
    concern: [meta_cognition]
  example_good: |
    # WP-PAY-RTE-001 Completion Checklist:
    # [x] CI green: tests pass (12/12), coverage 96%, ruff clean, mypy clean
    # [x] Manual test: POST /api/v1/payments with valid body -> 201, payment_id returned
    # [x] Edge case test: negative amount -> 422, missing field -> 422, duplicate key -> 409
    # [x] Review approved: @reviewer focused on business logic, approved with no comments
    # [x] AC verified:
    #     AC1: POST returns 201 with payment_id — PASS
    #     AC2: Negative amount returns 422 — PASS
    #     AC3: Idempotency key prevents duplicate — PASS
    # [x] Demo: recorded at demos/WP-PAY-RTE-001.mp4
  example_bad: |
    # WP-PAY-RTE-001 Completion:
    # CI: green
    # Status: DONE
    # (Nobody ran the feature manually, nobody verified ACs, search sorts by insertion order)
  when_applies: During WP completion, sprint reviews, definition of done
  sources: ["https://www.agilealliance.org/glossary/definition-of-done/"]
