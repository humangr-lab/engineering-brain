- id: CR-SRE-PIPE-002
  text: Big-data pipelines that use periodic batch processing (MapReduce, Spark) are inherently fragile because they have a fixed time budget. If the data grows 10% but the pipeline takes 12 hours of a
    12-hour window, there is zero headroom. Prefer continuous/streaming pipelines that scale with data volume.
  why: 'Google describes the "thundering herd" problem with batch pipelines: hundreds of pipelines all scheduled to run at midnight, competing for the same compute resources, with hard deadlines (the dashboard
    must be ready by 8 AM). If one pipeline takes longer than expected (data grew, a dependency was slow), it delays every pipeline behind it in the queue. This creates a cascade where ALL morning dashboards
    are late. Google''s migration from batch MapReduce to streaming (Millwheel/Dataflow) eliminated this problem because streaming pipelines process data continuously — there is no "start time" or "deadline."
    Data arrives, is processed, and results are available with low latency. When data volume grows 10%, streaming latency increases 10% — not catastrophically like batch.

    '
  how_to_do_right: '1. Monitor pipeline runtime trends. If a 12-hour pipeline is taking 11 hours and data grows 5% per month, you have ~2 months before it breaks.

    2. Set pipeline runtime alarms at 80% of the time budget. Don''t wait until it exceeds the budget to notice.

    3. For critical pipelines, prefer streaming over batch: Kafka Streams, Flink, Spark Streaming, Dataflow.

    4. If batch is necessary, provision headroom: a 12-hour pipeline in a 24-hour window has 50% headroom. In a 12-hour window, 0%.

    5. Decouple pipelines: if pipeline B depends on pipeline A''s output, A''s delay cascades to B. Design for eventual consistency where possible.

    6. Track data growth rate and pipeline runtime separately. If data grows faster than pipeline optimization, you are falling behind.

    '
  example_good: "# Monitor pipeline runtime and headroom proactively\nclass PipelineMonitor:\n    def check_headroom(self, pipeline: Pipeline):\n        budget_hours = pipeline.time_budget_hours  # e.g., 12 hours\n        actual_hours = pipeline.last_runtime_hours  # e.g., 10 hours\n        headroom_pct = (budget_hours - actual_hours) / budget_hours\n        data_growth_rate = pipeline.monthly_data_growth_rate  # e.g., 0.05 (5%)\n\n        months_until_breach = headroom_pct / data_growth_rate if data_growth_rate > 0 else float('inf')\n\n        metrics.observe(\"pipeline_headroom_pct\", headroom_pct, tags={\"pipeline\": pipeline.name})\n\n        if headroom_pct < 0.20:\n            alert(\n                f\"URGENT: {pipeline.name} has {headroom_pct:.0%} headroom. \"\n                f\"At {data_growth_rate:.0%}/month growth, breach in ~{months_until_breach:.0f} months. \"\n                f\"Consider migrating to streaming.\"\n            )\n\n    def recommend_architecture(self, pipeline: Pipeline) -> str:\n        if pipeline.is_critical and pipeline.headroom_pct < 0.30:\n            return \"STREAMING\"  # Kafka Streams, Flink, Spark Streaming\n        return \"BATCH\"  # Sufficient headroom\n"
  example_bad: "# Batch pipeline with no headroom monitoring\ndef run_nightly_batch():\n    # Budget: 12 hours (midnight to noon)\n    # Current runtime: 11.5 hours\n    # Data growth: 5% per month\n    # In 1 month: runtime = 12.1 hours → EXCEEDS BUDGET\n    start = time.time()\n    process_all_data()  # Takes 11.5 hours and growing\n    elapsed = (time.time() - start) / 3600\n    # No monitoring of elapsed vs budget\n    # No tracking of data growth rate\n    # First indication of problem: morning dashboard is late\n    # All downstream pipelines cascade-delayed\n"
  when_applies: When operating batch data pipelines with fixed time budgets where data growth can cause pipelines to exceed their processing windows and cascade delays to downstream consumers.
  severity: high
