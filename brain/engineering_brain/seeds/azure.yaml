layer: rules
technology: Azure
domain: cloud
knowledge:
- id: CR-AZURE-001
  text: Use Durable Functions for stateful orchestrations — do not try to manage state in regular Azure Functions with external
    storage.
  why: Regular Azure Functions are stateless. Developers build state machines with queues + tables + custom code — fragile,
    hard to debug, and impossible to replay. Durable Functions provide orchestrator/activity/entity patterns with built-in
    state management, retry, fan-out/fan-in, and replay — all serialized automatically.
  how_to_do_right: Use orchestrator functions for workflows (sequential, parallel, fan-out). Use activity functions for individual
    steps (API calls, DB writes). Use entity functions for stateful singleton actors (counters, aggregators). Use sub-orchestrations
    for complex nested workflows. Never do I/O in orchestrator functions — they must be deterministic.
  severity: high
  technologies:
    library: [durable functions]
    platform: [azure, functions]
  domains:
    domain: [operations, architecture]
    concern: [cloud, serverless]
  example_good: "import azure.functions as func\nimport azure.durable_functions as df\n\n# Orchestrator — deterministic, no\
    \ I/O\ndef orchestrator_function(context: df.DurableOrchestrationContext):\n    order = context.get_input()\n    # Sequential:\
    \ validate → charge → ship\n    validated = yield context.call_activity(\"ValidateOrder\", order)\n    charged = yield\
    \ context.call_activity(\"ChargePayment\", validated)\n    shipped = yield context.call_activity(\"ShipOrder\", charged)\n\
    \    return shipped\n\n# Activity — does the actual work\ndef validate_order(order: dict) -> dict:\n    # Real I/O happens\
    \ here\n    return {**order, \"validated\": True}\n\n# Fan-out/fan-in pattern\ndef batch_orchestrator(context: df.DurableOrchestrationContext):\n\
    \    items = context.get_input()\n    tasks = [context.call_activity(\"ProcessItem\", item) for item in items]\n    results\
    \ = yield context.task_all(tasks)  # Parallel execution\n    return results\n"
  example_bad: "# Hand-rolled state machine with queues — fragile\ndef process_order(msg: func.QueueMessage):\n    order =\
    \ json.loads(msg.get_body())\n    if order[\"state\"] == \"pending\":\n        validate(order)\n        order[\"state\"\
    ] = \"validated\"\n        queue_client.send_message(json.dumps(order))\n    elif order[\"state\"] == \"validated\":\n\
    \        charge(order)\n        # What if this crashes? State lost. Retry = double charge.\n"
  when_applies: Projects using Microsoft Azure services, Azure Functions, or Durable Functions
  when_not_applies: local-only or on-premises deployments
  sources: ["https://learn.microsoft.com/en-us/azure/azure-functions/durable/durable-functions-overview"]
- id: CR-AZURE-002
  text: Use Premium or Dedicated plan for Azure Functions with predictable latency — Consumption plan has cold starts of 1-10+
    seconds.
  why: Consumption plan scales to zero — great for cost, terrible for latency. Cold starts on Consumption can exceed 10 seconds
    for .NET and Java functions. Premium plan keeps instances warm with pre-warmed workers, VNET integration, and unlimited
    execution duration. The cost difference is often justified by the latency improvement.
  how_to_do_right: 'Use Consumption for: dev/test, low-traffic event processing, cost-sensitive batch jobs. Use Premium (EP1-EP3)
    for: user-facing APIs, latency-sensitive event handlers, VNET requirements. Use Dedicated (App Service Plan) for: always-on
    workloads, existing App Service Plan with spare capacity.'
  severity: medium
  technologies:
    platform: [azure, functions]
  domains:
    domain: [operations, architecture, performance]
    concern: [cloud, serverless]
  example_good: "# Premium plan — pre-warmed instances, no cold starts\naz functionapp plan create \\\n  --name my-premium-plan\
    \ \\\n  --resource-group my-rg \\\n  --sku EP1 \\\n  --min-instances 1 \\\n  --max-burst 10\n\naz functionapp create \\\
    \n  --name my-func \\\n  --plan my-premium-plan \\\n  --runtime python \\\n  --runtime-version 3.11\n"
  example_bad: "# Consumption plan for a user-facing API\naz functionapp create \\\n  --name my-api \\\n  --consumption-plan-location\
    \ eastus \\\n  --runtime python\n# First request after idle: 5-10s cold start\n# Users think the app is broken\n"
  when_applies: Projects using Microsoft Azure services or Azure Functions
  when_not_applies: local-only or on-premises deployments. projects not using Azure or Azure Functions
  sources: ["https://learn.microsoft.com/en-us/azure/azure-functions/functions-scale"]
- id: CR-AZURE-003
  text: Choose a high-cardinality partition key in CosmosDB — the partition key determines scalability, cost, and query performance.
  why: CosmosDB distributes data across physical partitions by partition key. A low-cardinality key (e.g., status with 3 values)
    creates hot partitions — one partition gets 90% of traffic, hits the 10K RU/s limit, and throttles. High cardinality (e.g.,
    user_id, tenant_id) distributes evenly. Changing partition key requires recreating the container — get it right the first
    time.
  how_to_do_right: 'Choose a field with high cardinality (thousands+ unique values) that appears in most queries'' WHERE clause.
    Good: user_id, tenant_id, device_id. Bad: status, category, country. For multi-tenant apps, use /tenantId. Test with representative
    data volume — not just 100 rows.'
  severity: critical
  technologies:
    platform: [azure, cosmosdb]
  domains:
    domain: [operations, architecture]
    concern: [cloud, data, database]
  example_good: "// High-cardinality partition key — scales evenly\naz cosmosdb sql container create \\\n  --account-name\
    \ myaccount \\\n  --database-name mydb \\\n  --name orders \\\n  --partition-key-path \"/customerId\" \\\n  --throughput\
    \ 4000\n\n// Queries scoped to partition — fast and cheap (1 RU)\nSELECT * FROM orders o WHERE o.customerId = \"cust-123\"\
    \n"
  example_bad: "// Low-cardinality partition key — hot partition\naz cosmosdb sql container create \\\n  --partition-key-path\
    \ \"/status\" \\\n  --throughput 4000\n// \"pending\" partition gets 80% of writes → throttled at 10K RU\n// \"completed\"\
    \ partition is idle\n// Cannot fix without recreating the container and migrating data\n"
  when_applies: Any project using Microsoft Azure services or CosmosDB
  when_not_applies: local-only or on-premises deployments. projects not using Azure or CosmosDB
  sources: ["https://learn.microsoft.com/en-us/azure/cosmos-db/partitioning-overview"]
- id: CR-AZURE-004
  text: Use Session consistency as default for CosmosDB — Strong is expensive, Eventual is surprising.
  why: Strong consistency requires synchronous replication to all replicas — adds 2-10ms latency and doubles RU cost. Eventual
    consistency can return stale reads — users update a record and immediately see the old value. Session consistency guarantees
    read-your-own-writes within a session, which is what 95% of apps need.
  how_to_do_right: Set account-level consistency to Session (default). Use Bounded Staleness for analytics that tolerate lag.
    Use Strong only for financial transactions requiring linearizability. Pass the session token in subsequent requests to
    guarantee read-your-own-writes.
  severity: medium
  technologies:
    platform: [azure, cosmosdb]
  domains:
    domain: [operations, architecture]
    concern: [cloud, data, database]
  example_good: "# Set session consistency at account level\naz cosmosdb update \\\n  --name myaccount \\\n  --default-consistency-level\
    \ Session\n\n# Client-side: pass session token for read-your-own-writes\nresponse = container.create_item(body=item)\n\
    session_token = response.headers[\"x-ms-session-token\"]\n# Use session_token in subsequent reads\nresult = container.read_item(\n\
    \    item=item_id, partition_key=pk,\n    session_token=session_token\n)\n"
  example_bad: "# Strong consistency everywhere — 2x RU cost, extra latency\naz cosmosdb update \\\n  --default-consistency-level\
    \ Strong\n# Every read waits for quorum across all regions\n# Cost doubles, latency increases by 5-10ms per read\n"
  when_applies: Projects using Microsoft Azure services or CosmosDB
  when_not_applies: local-only or on-premises deployments. projects not using Azure or CosmosDB
  sources: ["https://learn.microsoft.com/en-us/azure/cosmos-db/consistency-levels"]
- id: CR-AZURE-005
  text: Use CosmosDB change feed for event-driven architectures — do not poll for changes.
  why: Polling CosmosDB for changes wastes RUs, adds latency, and misses changes between polls. The change feed is a persistent,
    ordered log of all inserts and updates — consumed with zero RU overhead (you only pay for reading the feed). It enables
    CDC, materialized views, event sourcing, and real-time sync.
  how_to_do_right: Use the change feed processor library for automatic partition management and checkpointing. Use Azure Functions
    CosmosDB trigger for simple event handlers. For complex pipelines, read the feed into Event Hubs or Kafka. Change feed
    does NOT capture deletes — use soft-delete patterns or TTL.
  severity: medium
  technologies:
    platform: [azure, cosmosdb]
  domains:
    domain: [operations, architecture]
    concern: [cloud, data, database]
  example_good: "import azure.functions as func\n\n# CosmosDB trigger — processes change feed automatically\n@app.cosmos_db_trigger(\n\
    \    arg_name=\"documents\",\n    container_name=\"orders\",\n    database_name=\"mydb\",\n    connection=\"CosmosDBConnection\"\
    ,\n    lease_container_name=\"leases\",\n    create_lease_container_if_not_exists=True\n)\ndef on_order_change(documents:\
    \ func.DocumentList):\n    for doc in documents:\n        # Process each change — guaranteed order per partition\n   \
    \     send_notification(doc[\"customerId\"], doc[\"status\"])\n"
  example_bad: "# Polling for changes — wastes RUs, misses changes\nimport time\nwhile True:\n    results = container.query_items(\n\
    \        \"SELECT * FROM c WHERE c._ts > @last_ts\",\n        parameters=[{\"name\": \"@last_ts\", \"value\": last_ts}]\n\
    \    )\n    for item in results:\n        process(item)\n    time.sleep(5)  # 5 sec gap = missed changes possible\n# Burns\
    \ RUs even when nothing changed\n# Misses rapid changes between polls\n"
  when_applies: Projects using Microsoft Azure services or CosmosDB
  when_not_applies: local-only or on-premises deployments. projects not using Azure or CosmosDB
  sources: ["https://learn.microsoft.com/en-us/azure/cosmos-db/change-feed"]
- id: CR-AZURE-006
  text: Use workload identity (OIDC federation) on AKS — never mount service principal credentials as secrets.
  why: Mounting SP credentials as Kubernetes secrets means the secret exists in etcd, in pod environment, and potentially
    in logs. If a pod is compromised, the attacker gets the SP credentials. Workload identity uses OIDC federation — the pod
    gets a short-lived token from Azure AD, no long-lived credentials exist anywhere in the cluster.
  how_to_do_right: Enable workload identity on the AKS cluster. Create a managed identity with minimal permissions. Establish
    a federated credential between the managed identity and the K8s service account. Annotate the K8s SA with the managed
    identity client ID.
  severity: critical
  technologies:
    platform: [azure, aks, kubernetes]
  domains:
    domain: [operations, security]
    concern: [cloud]
  example_good: "# Enable workload identity on AKS\naz aks update \\\n  --name my-cluster \\\n  --enable-oidc-issuer \\\n\
    \  --enable-workload-identity\n\n# Create managed identity\naz identity create --name my-app-identity --resource-group\
    \ my-rg\n\n# Create federated credential\naz identity federated-credential create \\\n  --name my-fed-cred \\\n  --identity-name\
    \ my-app-identity \\\n  --resource-group my-rg \\\n  --issuer \"${OIDC_ISSUER_URL}\" \\\n  --subject \"system:serviceaccount:default:my-app-sa\"\
    \n\n# K8s SA annotation\napiVersion: v1\nkind: ServiceAccount\nmetadata:\n  name: my-app-sa\n  annotations:\n    azure.workload.identity/client-id:\
    \ \"<MANAGED_IDENTITY_CLIENT_ID>\"\n"
  example_bad: "# SP credentials as K8s secret — long-lived, extractable\nkubectl create secret generic azure-creds \\\n \
    \ --from-literal=client-id=xxx \\\n  --from-literal=client-secret=yyy \\\n  --from-literal=tenant-id=zzz\n# Credentials\
    \ in etcd, visible in pod env, never rotate\n# Compromised pod = full Azure access with SP permissions\n"
  when_applies: Any project using Microsoft Azure services, AKS, or Kubernetes-orchestrated deployments
  when_not_applies: local-only or on-premises deployments
  sources: ["https://learn.microsoft.com/en-us/azure/aks/workload-identity-overview"]
- id: CR-AZURE-007
  text: Use KEDA for event-driven autoscaling on AKS — the default HPA only scales on CPU/memory.
  why: Horizontal Pod Autoscaler (HPA) scales based on CPU and memory metrics. But many workloads should scale based on queue
    depth, event count, or custom metrics. KEDA (Kubernetes Event-Driven Autoscaling) scales based on 60+ event sources (Service
    Bus, Event Hubs, Cosmos change feed, Kafka, Redis, etc.) and can scale to zero.
  how_to_do_right: Install KEDA as an AKS add-on. Create ScaledObject resources pointing to your event source. Set minReplicaCount=0
    for scale-to-zero. Use pollingInterval and cooldownPeriod to control scaling speed. KEDA manages the HPA automatically.
  severity: medium
  technologies:
    library: [keda]
    platform: [azure, aks, kubernetes]
  domains:
    domain: [operations, infrastructure, performance]
    concern: [cloud, containers]
  example_good: "# Install KEDA add-on\naz aks update --name my-cluster --enable-keda\n\n# ScaledObject — scale based on Service\
    \ Bus queue depth\napiVersion: keda.sh/v1alpha1\nkind: ScaledObject\nmetadata:\n  name: order-processor-scaler\nspec:\n\
    \  scaleTargetRef:\n    name: order-processor\n  minReplicaCount: 0    # Scale to zero when idle\n  maxReplicaCount: 50\n\
    \  pollingInterval: 10\n  cooldownPeriod: 300\n  triggers:\n    - type: azure-servicebus\n      metadata:\n        queueName:\
    \ orders\n        messageCount: \"5\"  # 1 pod per 5 messages\n        connectionFromEnv: SB_CONNECTION\n"
  example_bad: "# Default HPA — CPU-only scaling for a queue consumer\napiVersion: autoscaling/v2\nkind: HorizontalPodAutoscaler\n\
    spec:\n  minReplicas: 1  # Cannot scale to zero\n  maxReplicas: 10\n  metrics:\n    - type: Resource\n      resource:\n\
    \        name: cpu\n        target:\n          averageUtilization: 70\n# Queue has 10K messages but CPU is low → no scaling\n\
    # Queue drains slowly, messages expire, data lost\n"
  when_applies: Projects using Microsoft Azure services, AKS, KEDA, or Kubernetes-orchestrated deployments
  when_not_applies: local-only or on-premises deployments
  sources: ["https://learn.microsoft.com/en-us/azure/aks/keda-about"]
- id: CR-AZURE-008
  text: Use Service Bus sessions for guaranteed FIFO processing — standard queues do not guarantee message ordering.
  why: Standard Service Bus queues deliver messages in roughly FIFO order but make no guarantees — especially with multiple
    consumers. If you need strict ordering (e.g., process events for user X in order), you must use sessions. Sessions group
    related messages and ensure a single consumer processes all messages in a session sequentially.
  how_to_do_right: Enable sessions on the queue. Set SessionId on messages to group related messages (e.g., user_id, order_id).
    Use ServiceBusSessionReceiver to process sessions. One consumer locks a session — all its messages are processed in order.
    Different sessions can be processed in parallel by different consumers.
  severity: high
  technologies:
    library: [service bus]
    platform: [azure]
  domains:
    domain: [operations, architecture, messaging]
    concern: [cloud]
  example_good: "# Create session-enabled queue\naz servicebus queue create \\\n  --name orders \\\n  --namespace-name my-ns\
    \ \\\n  --enable-session true\n\n# Send with session ID (all messages for same order go to same session)\nfrom azure.servicebus\
    \ import ServiceBusClient, ServiceBusMessage\n\nmsg = ServiceBusMessage(\n    body=json.dumps(event),\n    session_id=order_id,\
    \  # Groups messages by order\n    message_id=str(uuid4())\n)\nsender.send_messages(msg)\n\n# Receive — processes one\
    \ session at a time, in order\nasync with client.get_queue_receiver(\n    queue_name=\"orders\", session_id=NEXT_AVAILABLE_SESSION\n\
    ) as receiver:\n    async for msg in receiver:\n        process(msg)\n        await receiver.complete_message(msg)\n"
  example_bad: '# Standard queue with multiple consumers — ordering not guaranteed

    az servicebus queue create --name orders --namespace-name my-ns

    # Consumer A gets message 3, Consumer B gets message 1

    # Order processed out of sequence → inventory errors

    '
  when_applies: Projects using Microsoft Azure services or Service Bus
  when_not_applies: local-only or on-premises deployments. projects not using Azure or Service Bus
  sources: ["https://learn.microsoft.com/en-us/azure/service-bus-messaging/message-sessions"]
- id: CR-AZURE-009
  text: Configure dead-letter queues on Service Bus and set up alerts — unprocessed poison messages indicate bugs in your
    consumer.
  why: When a message fails processing max-delivery-count times (default 10), Service Bus moves it to the dead-letter sub-queue.
    Without monitoring, poison messages accumulate silently. The dead-letter queue has a max size — when full, new dead-letters
    are dropped entirely. Each dead-letter message has a reason and description for debugging.
  how_to_do_right: Set max-delivery-count to a reasonable value (3-5 for idempotent handlers, 10 for transient failures).
    Create an Azure Monitor alert on dead-letter message count > 0. Build a dead-letter processor that logs, analyzes, and
    optionally re-enqueues messages. Never ignore the DLQ.
  severity: high
  technologies:
    library: [service bus]
    platform: [azure]
  domains:
    domain: [operations, architecture, messaging, reliability]
    concern: [cloud]
  example_good: "# Set low max delivery count — fail fast\naz servicebus queue update \\\n  --name orders \\\n  --namespace-name\
    \ my-ns \\\n  --max-delivery-count 5\n\n# Alert on dead-letters\naz monitor metrics alert create \\\n  --name \"OrdersDLQAlert\"\
    \ \\\n  --resource \"/subscriptions/.../orders\" \\\n  --condition \"total DeadletteredMessages > 0\" \\\n  --action \"\
    /subscriptions/.../action-groups/on-call\"\n\n# Dead-letter processor\nasync with client.get_queue_receiver(\n    queue_name=\"\
    orders\", sub_queue=ServiceBusSubQueue.DEAD_LETTER\n) as dlq_receiver:\n    async for msg in dlq_receiver:\n        log.error(f\"\
    DLQ: {msg.dead_letter_reason}: {msg.dead_letter_error_description}\")\n        await analyze_and_fix(msg)\n"
  example_bad: '# Default config, no monitoring

    az servicebus queue create --name orders --namespace-name my-ns

    # Bad messages silently move to DLQ

    # Nobody monitors DLQ

    # Months later: 50K unprocessed messages, data loss discovered

    '
  when_applies: Projects using Microsoft Azure services or Service Bus
  when_not_applies: local-only or on-premises deployments. projects not using Azure or Service Bus
  sources: ["https://learn.microsoft.com/en-us/azure/service-bus-messaging/service-bus-dead-letter-queues"]
- id: CR-AZURE-010
  text: Use managed identities instead of service principals with client secrets for Azure service-to-service authentication.
  why: Service principal client secrets expire, need rotation, can be leaked in code/config/logs, and create operational burden.
    Managed identities are credential-free — Azure handles the token lifecycle. System-assigned MIs are tied to the resource
    lifecycle. User-assigned MIs can be shared across resources.
  how_to_do_right: Use system-assigned managed identity for single-resource scenarios (one Function App accessing one Storage
    account). Use user-assigned managed identity when multiple resources need the same identity. Grant RBAC roles to the managed
    identity — not the resource.
  severity: critical
  technologies:
    library: [entra id, azure ad]
    platform: [azure]
  domains:
    domain: [operations, security]
    concern: [cloud]
  example_good: "# Enable system-assigned managed identity\naz webapp identity assign --name my-app --resource-group my-rg\n\
    \n# Grant specific RBAC role (not Contributor!)\naz role assignment create \\\n  --assignee $(az webapp identity show\
    \ --name my-app --query principalId -o tsv) \\\n  --role \"Storage Blob Data Reader\" \\\n  --scope \"/subscriptions/.../storageAccounts/mystorage\"\
    \n\n# Code — DefaultAzureCredential picks up managed identity automatically\nfrom azure.identity import DefaultAzureCredential\n\
    from azure.storage.blob import BlobServiceClient\n\ncredential = DefaultAzureCredential()\nclient = BlobServiceClient(account_url,\
    \ credential=credential)\n"
  example_bad: '# Service principal with client secret

    client_secret = os.environ["AZURE_CLIENT_SECRET"]  # Expires in 1 year

    # Secret in env var, maybe in Key Vault, maybe hardcoded

    # When it expires: app breaks at 2am, on-call scrambles to rotate

    '
  when_applies: Any project using Microsoft Azure services, Entra ID, or Azure AD
  when_not_applies: local-only or on-premises deployments
  sources: ["https://learn.microsoft.com/en-us/entra/identity/managed-identities-azure-resources/overview"]
- id: CR-AZURE-011
  text: Use Blob Storage access tiers and lifecycle management to automatically reduce storage costs for aging data.
  why: Hot tier costs $0.018/GB/month. Archive tier costs $0.00099/GB/month (18x cheaper). Without lifecycle policies, all
    blobs stay in Hot tier forever. A 50TB storage account without lifecycle management wastes ~$850/month on cold data. Archive
    rehydration takes hours — plan ahead.
  how_to_do_right: 'Set default access tier to Hot for the account. Use lifecycle management rules to: move to Cool after
    30 days, Archive after 180 days, delete after retention period. Use Cool for data accessed < 1x/month. Use Archive for
    compliance/backup data accessed < 1x/year.'
  severity: medium
  technologies:
    library: [blob storage]
    platform: [azure]
  domains:
    domain: [operations]
    concern: [cloud, cost]
  example_good: "# Lifecycle management policy\naz storage account management-policy create \\\n  --account-name mystorage\
    \ \\\n  --policy '{\n    \"rules\": [{\n      \"name\": \"lifecycle-rule\",\n      \"type\": \"Lifecycle\",\n      \"\
    definition\": {\n        \"actions\": {\n          \"baseBlob\": {\n            \"tierToCool\": {\"daysAfterModificationGreaterThan\"\
    : 30},\n            \"tierToArchive\": {\"daysAfterModificationGreaterThan\": 180},\n            \"delete\": {\"daysAfterModificationGreaterThan\"\
    : 730}\n          },\n          \"snapshot\": {\n            \"delete\": {\"daysAfterCreationGreaterThan\": 90}\n    \
    \      }\n        },\n        \"filters\": {\"blobTypes\": [\"blockBlob\"]}\n      }\n    }]\n  }'\n"
  example_bad: '# No lifecycle policy — everything stays Hot

    az storage account create --name mystorage --sku Standard_LRS

    # Years of backups, logs, exports sitting in Hot tier

    # Monthly bill: 5x what it should be

    '
  when_applies: Projects using Microsoft Azure services or Blob Storage
  when_not_applies: local-only or on-premises deployments. projects not using Azure or Blob Storage
  sources: ["https://learn.microsoft.com/en-us/azure/storage/blobs/lifecycle-management-overview"]
- id: CR-AZURE-012
  text: Use immutable storage with legal hold or time-based retention for compliance data — it prevents deletion even by admins.
  why: Regulatory requirements (SEC 17a-4, GDPR, HIPAA) mandate that certain data cannot be modified or deleted for a retention
    period. Standard Blob Storage allows anyone with the right RBAC role to delete data. Immutable storage with WORM (Write
    Once Read Many) policies makes blobs tamper-proof — even Owner/Contributor cannot delete or modify them.
  how_to_do_right: Use time-based retention policies for fixed retention periods (e.g., 7 years for financial records). Use
    legal holds for indefinite retention during litigation. Apply at container level. Test with an unlocked policy first —
    locked policies are IRREVERSIBLE. Version-level immutability for granular control.
  severity: high
  technologies:
    library: [blob storage]
    platform: [azure]
  domains:
    domain: [operations, security, compliance]
    concern: [cloud]
  example_good: "# Create container with immutable storage\naz storage container immutability-policy create \\\n  --account-name\
    \ mystorage \\\n  --container-name audit-logs \\\n  --period 2555  # 7 years in days\n\n# Lock the policy (IRREVERSIBLE\
    \ — cannot shorten retention)\naz storage container immutability-policy lock \\\n  --account-name mystorage \\\n  --container-name\
    \ audit-logs\n\n# Legal hold (for active litigation)\naz storage container legal-hold set \\\n  --account-name mystorage\
    \ \\\n  --container-name evidence \\\n  --tags \"case-2026-001\"\n"
  example_bad: '# Compliance data in a regular container

    az storage container create --name audit-logs

    # Disgruntled admin: az storage blob delete-batch --source audit-logs

    # All audit logs gone — regulatory violation, fines, lawsuits

    '
  when_applies: Projects using Microsoft Azure services or Blob Storage
  when_not_applies: local-only or on-premises deployments. projects not using Azure or Blob Storage
  sources: ["https://learn.microsoft.com/en-us/azure/storage/blobs/immutable-storage-overview"]
- id: CR-AZURE-013
  text: Use YAML pipelines in Azure DevOps — classic (UI) pipelines are not version-controlled and cannot be reviewed in PRs.
  why: Classic pipelines are stored in Azure DevOps, not in your repo. They cannot be reviewed in pull requests, diffed, rolled
    back with git, or audited for changes. YAML pipelines live in the repo alongside code — they go through the same review
    process, are versioned, and can be templated for reuse.
  how_to_do_right: Define pipelines in azure-pipelines.yml at the repo root. Use templates for shared stages/jobs/steps. Use
    variable groups linked to Key Vault for secrets. Use environments with approval gates for production deployments. Use
    extends templates for security-enforced pipeline structure.
  severity: medium
  technologies:
    platform: [azure, devops]
  domains:
    domain: [operations]
    concern: [cloud, ci_cd]
  example_good: "# azure-pipelines.yml — version-controlled, reviewable\ntrigger:\n  branches:\n    include: [main]\n\nstages:\n\
    \  - stage: Build\n    jobs:\n      - job: BuildAndTest\n        pool: { vmImage: 'ubuntu-latest' }\n        steps:\n\
    \          - script: pip install -r requirements.txt\n          - script: pytest tests/ --cov=src\n          - task: Docker@2\n\
    \            inputs:\n              command: buildAndPush\n              repository: myapp\n              tags: $(Build.BuildId)\n\
    \n  - stage: Deploy\n    dependsOn: Build\n    jobs:\n      - deployment: Production\n        environment: production\
    \  # Requires approval\n        strategy:\n          runOnce:\n            deploy:\n              steps:\n           \
    \     - script: ./deploy.sh\n"
  example_bad: '# Classic pipeline in UI

    # Cannot be reviewed in PR

    # Cannot be git diffed or rolled back

    # Someone clicks "Edit" and changes the deploy step

    # No audit trail in source control

    '
  when_applies: Projects using Microsoft Azure services or Azure DevOps
  when_not_applies: local-only or on-premises deployments. projects not using Azure or Azure DevOps
  sources: ["https://learn.microsoft.com/en-us/azure/devops/pipelines/yaml-schema"]
- id: CR-AZURE-014
  text: Use deployment slots for zero-downtime deployments in App Service — swap slots instead of deploying directly to production.
  why: Deploying directly to production causes downtime during deployment — the app restarts, connections drop, and cold start
    latency hits all users. Deployment slots let you deploy to a staging slot, warm it up, test it, and then swap it with
    production atomically. The swap is instant — no restart, no downtime, and rollback is just swapping back.
  how_to_do_right: Create a staging slot. Deploy new code to staging. Run smoke tests against the staging URL. Use auto-swap
    for automated pipelines. Swap staging ↔ production. If issues detected, swap back immediately. Use slot-specific settings
    for connection strings and feature flags.
  severity: high
  technologies:
    platform: [azure, app_service]
  domains:
    domain: [operations, deployment]
    concern: [cloud]
  example_good: "# Create staging slot\naz webapp deployment slot create \\\n  --name my-app \\\n  --slot staging\n\n# Deploy\
    \ to staging (not production)\naz webapp deployment source config-zip \\\n  --name my-app \\\n  --slot staging \\\n  --src\
    \ app.zip\n\n# Warm up and test staging\ncurl https://my-app-staging.azurewebsites.net/health\n\n# Swap staging → production\
    \ (instant, zero-downtime)\naz webapp deployment slot swap \\\n  --name my-app \\\n  --slot staging \\\n  --target-slot\
    \ production\n\n# Something wrong? Swap back in seconds\naz webapp deployment slot swap \\\n  --name my-app \\\n  --slot\
    \ production \\\n  --target-slot staging\n"
  example_bad: "# Deploy directly to production\naz webapp deployment source config-zip \\\n  --name my-app \\\n  --src app.zip\n\
    # App restarts → 30-60s downtime\n# Cold start → first requests timeout\n# Bug found → redeploy takes 5 more minutes\n"
  when_applies: Projects using Microsoft Azure services or App Service
  when_not_applies: local-only or on-premises deployments. projects not using Azure or App Service
  sources: ["https://learn.microsoft.com/en-us/azure/app-service/deploy-staging-slots"]
- id: CR-AZURE-015
  text: Always configure a health check endpoint on App Service — without it, unhealthy instances keep serving traffic.
  why: Without a health check, App Service considers an instance healthy as long as the process is running. A hung process
    (deadlock, exhausted connections, OOM) still receives traffic but cannot handle it — users see timeouts. The health check
    endpoint lets App Service detect unhealthy instances and restart them automatically.
  how_to_do_right: Create a /health endpoint that verifies critical dependencies (DB, cache, external APIs). Return 200 for
    healthy, 5xx for unhealthy. Configure App Service health check to hit this endpoint. Set the threshold to 2-3 consecutive
    failures. Health check should complete in < 2 seconds.
  severity: high
  technologies:
    platform: [azure, app_service]
  domains:
    domain: [operations, reliability]
    concern: [cloud]
  example_good: "# Health check endpoint\n@app.get(\"/health\")\nasync def health():\n    checks = {}\n    try:\n        await\
    \ db.execute(\"SELECT 1\")\n        checks[\"database\"] = \"ok\"\n    except Exception:\n        checks[\"database\"\
    ] = \"failed\"\n        return JSONResponse(status_code=503, content=checks)\n    try:\n        await redis.ping()\n \
    \       checks[\"cache\"] = \"ok\"\n    except Exception:\n        checks[\"cache\"] = \"failed\"\n        return JSONResponse(status_code=503,\
    \ content=checks)\n    return checks\n\n# Configure in App Service\naz webapp config set \\\n  --name my-app \\\n  --generic-configurations\
    \ '{\"healthCheckPath\": \"/health\"}'\n"
  example_bad: '# No health check — App Service only checks if process is alive

    # Scenario: DB connection pool exhausted

    # Process running ✓ but all requests fail with 500

    # App Service keeps sending traffic to the dead instance

    # Users see errors for 5+ minutes until someone notices

    '
  when_applies: Projects using Microsoft Azure services or App Service
  when_not_applies: local-only or on-premises deployments. projects not using Azure or App Service
  sources: ["https://learn.microsoft.com/en-us/azure/app-service/monitor-instances-health-check"]
- id: CR-AZURE-016
  text: Use built-in RBAC roles with least privilege — never assign Owner or Contributor at the subscription level.
  why: 'Owner at subscription level can: delete all resources, modify IAM, access all data, create new subscriptions. Contributor
    can delete resources and modify configurations. Most users need narrow access — Storage Blob Data Reader, SQL DB Contributor,
    etc. Over-privileged accounts are the #1 attack vector in cloud breaches.'
  how_to_do_right: Assign roles at the narrowest scope (resource > resource group > subscription). Use built-in roles that
    match the exact need. Create custom roles only when no built-in role matches. Use PIM (Privileged Identity Management)
    for just-in-time elevation. Review role assignments quarterly.
  severity: critical
  technologies:
    library: [entra id, rbac]
    platform: [azure]
  domains:
    domain: [operations, security]
    concern: [cloud]
  example_good: "# Narrow scope, specific role\naz role assignment create \\\n  --assignee user@company.com \\\n  --role \"\
    Storage Blob Data Contributor\" \\\n  --scope \"/subscriptions/.../resourceGroups/my-rg/providers/Microsoft.Storage/storageAccounts/mystorage\"\
    \n\n# Just-in-time access with PIM (Azure AD P2)\n# User requests \"Virtual Machine Contributor\" for 4 hours\n# Manager\
    \ approves → access granted → auto-revokes after 4h\n"
  example_bad: "# Owner at subscription level — nuclear option\naz role assignment create \\\n  --assignee developer@company.com\
    \ \\\n  --role \"Owner\" \\\n  --scope \"/subscriptions/xxx\"\n# Developer can: delete production, change IAM, access\
    \ secrets\n# Account compromised → entire subscription wiped\n"
  when_applies: Any project using Microsoft Azure services, Entra ID, or RBAC
  when_not_applies: local-only or on-premises deployments
  sources: ["https://learn.microsoft.com/en-us/azure/role-based-access-control/best-practices"]
- id: CR-AZURE-017
  text: Tune CosmosDB indexing policy to reduce RU consumption — the default indexes everything, which is wasteful for write-heavy
    workloads.
  why: By default, CosmosDB indexes every property in every document. Each write updates all indexes, consuming 2-5x more
    RUs than necessary. For write-heavy workloads with known query patterns, excluding unused paths from indexing can reduce
    write RU cost by 50-70%.
  how_to_do_right: Start with the default policy. Analyze your query patterns with Query Stats. Exclude paths never used in
    WHERE, ORDER BY, or JOIN. Include only paths used in queries. Use composite indexes for ORDER BY on multiple properties.
    Use spatial indexes only for geospatial queries.
  severity: medium
  technologies:
    platform: [azure, cosmosdb]
  domains:
    domain: [operations, architecture, performance]
    concern: [cloud, data, database]
  example_good: "// Optimized indexing policy — index only queried paths\n{\n  \"indexingMode\": \"consistent\",\n  \"includedPaths\"\
    : [\n    { \"path\": \"/customerId/?\" },\n    { \"path\": \"/status/?\" },\n    { \"path\": \"/createdAt/?\" }\n  ],\n\
    \  \"excludedPaths\": [\n    { \"path\": \"/payload/*\" },   // Large nested object, never queried\n    { \"path\": \"\
    /metadata/*\" },  // Internal metadata, never queried\n    { \"path\": \"/*\" }            // Exclude everything else\n\
    \  ],\n  \"compositeIndexes\": [\n    [\n      { \"path\": \"/status\", \"order\": \"ascending\" },\n      { \"path\"\
    : \"/createdAt\", \"order\": \"descending\" }\n    ]\n  ]\n}\n"
  example_bad: '// Default policy — indexes everything

    { "indexingMode": "consistent", "includedPaths": [{"path": "/*"}] }

    // 1KB document with 50 fields → 50 index entries per write

    // Write cost: 15 RU instead of 5 RU

    // At 10K writes/sec → 100K extra RU/s → $$$

    '
  when_applies: Projects using Microsoft Azure services or CosmosDB
  when_not_applies: local-only or on-premises deployments. projects not using Azure or CosmosDB
  sources: ["https://learn.microsoft.com/en-us/azure/cosmos-db/index-policy"]
- id: CR-AZURE-018
  text: Use multi-region writes in CosmosDB only when you need sub-50ms writes from multiple regions — single-write with read
    replicas is cheaper and simpler.
  why: Multi-region writes enable writing to any region with automatic conflict resolution. But it costs 2x the RUs (every
    write replicates to all regions), requires conflict resolution policies (last-writer-wins or custom), and can introduce
    data inconsistencies. Single-write-region with read replicas gives low-latency reads everywhere at half the cost.
  how_to_do_right: Default to single-write-region with automatic failover. Add read replicas in regions where users need low-latency
    reads. Enable multi-region writes ONLY if you need < 50ms write latency from multiple continents AND can handle conflict
    resolution. Use last-writer-wins for most cases.
  severity: medium
  technologies:
    platform: [azure, cosmosdb]
  domains:
    domain: [operations, architecture]
    concern: [cloud, data, database]
  example_good: "# Single write region with read replicas (recommended for most apps)\naz cosmosdb update \\\n  --name myaccount\
    \ \\\n  --locations \"regionName=eastus failoverPriority=0 isZoneRedundant=true\" \\\n  --locations \"regionName=westeurope\
    \ failoverPriority=1\" \\\n  --enable-automatic-failover true\n\n# Multi-region writes ONLY when truly needed\naz cosmosdb\
    \ update \\\n  --name myaccount \\\n  --enable-multiple-write-locations true \\\n  --default-consistency-level Session\n"
  example_bad: '# Multi-region writes "just in case"

    az cosmosdb update --enable-multiple-write-locations true

    # 2x RU cost for every write

    # Conflict resolution needed but not configured

    # Last-writer-wins silently losing data from one region

    '
  when_applies: Projects using Microsoft Azure services or CosmosDB
  when_not_applies: local-only or on-premises deployments. projects not using Azure or CosmosDB
  sources: ["https://learn.microsoft.com/en-us/azure/cosmos-db/how-to-multi-master"]
