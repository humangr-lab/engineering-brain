layer: rules
domain: sacada
knowledge:

# =============================================================================
# REQUIREMENT ELICITATION (SAC-SPEC-001 to SAC-SPEC-006)
# =============================================================================

- id: SAC-SPEC-001
  text: "If a spec has no error cases, it is 20% complete — a spec without negative requirements is a spec waiting to fail in production"
  why: >
    Production systems spend 60-80% of their code handling errors, edge cases, and recovery paths.
    A spec that only describes the happy path gives developers no guidance on what to do when things
    go wrong. The result: each developer invents their own error handling, error messages are
    inconsistent, retry logic is ad-hoc, and users see raw stack traces. Every production outage
    post-mortem traces back to an unspecified failure mode.
  how_to_do_right: |
    1. For every functional requirement, write at least one negative requirement (what must NOT happen).
    2. For every API endpoint, enumerate: network timeout, invalid input, auth failure, rate limit, upstream dependency down.
    3. For every state transition, specify what happens if the transition fails midway (partial state).
    4. For every data write, specify: what if disk is full, what if constraint violated, what if concurrent write.
    5. Create an explicit "Error Taxonomy" section in the spec with error codes, messages, and recovery actions.
    6. Use the pattern: "WHEN [failure condition], the system MUST [recovery action] AND [notify whom]."
  severity: critical
  technologies:
    lang: [python, typescript]
    framework: [fastapi, react]
  domains:
    domain: [sacada, code_quality, spec_writing]
    concern: [meta_cognition, error_handling]
  example_good: |
    # RF-AUTH-001: User Login
    The system SHALL authenticate users via email and password.

    # Error Cases:
    ERR-AUTH-001: Invalid credentials → return HTTP 401, message "Invalid email or password", increment failed_attempts counter.
    ERR-AUTH-002: Account locked (>5 failures) → return HTTP 423, send unlock email, log security event.
    ERR-AUTH-003: Auth service unavailable → return HTTP 503, retry-after: 30s header, serve cached session if valid.
    ERR-AUTH-004: Malformed request body → return HTTP 422 with field-level validation errors.
    ERR-AUTH-005: Rate limit exceeded → return HTTP 429, retry-after header, no counter increment.
  example_bad: |
    # RF-AUTH-001: User Login
    The system should allow users to log in with email and password.
    On success, return a JWT token.

    # No error cases specified at all.
    # Developer will: return generic 500, no retry logic, no rate limiting,
    # no account lockout, raw exception messages leaked to client.
  when_applies: Writing or reviewing any specification document
  sources: ["https://sre.google/sre-book/effective-troubleshooting/"]

- id: SAC-SPEC-002
  text: "A requirement with 'should' becomes optional under deadline — use MUST, MUST NOT, SHALL for non-negotiable requirements. RFC 2119 exists for a reason."
  why: >
    When deadlines compress, product managers and developers triage requirements by keyword. "Should"
    becomes "nice to have", "may" becomes "won't do", and only "must" survives. If security validation
    is specified with "should", it WILL be cut from the release. RFC 2119 provides a universal,
    unambiguous vocabulary for requirement strength. Not using it is professional negligence.
  how_to_do_right: |
    1. Adopt RFC 2119 keywords explicitly: MUST, MUST NOT, SHALL, SHALL NOT, SHOULD, SHOULD NOT, MAY.
    2. Add a "Keywords" section at the top of every spec: "The key words in this document follow RFC 2119."
    3. MUST/SHALL = non-negotiable, blocks release if missing.
    4. SHOULD = strongly recommended, requires documented justification to skip.
    5. MAY = truly optional, implement if time permits.
    6. Review every requirement: if cutting it would cause a security hole, data loss, or legal issue, it MUST be MUST.
  severity: high
  technologies:
    lang: [python, typescript]
  domains:
    domain: [sacada, spec_writing]
    concern: [meta_cognition, process]
  example_good: |
    # Requirements use RFC 2119 keywords consistently
    RF-SEC-001: The system MUST validate all input against the schema before processing.
    RF-SEC-002: The system MUST NOT store plaintext passwords under any circumstances.
    RF-SEC-003: The system SHALL rate-limit login attempts to 5 per minute per IP.
    RF-PERF-001: API responses SHOULD complete within 200ms at p95.
    RF-UI-001: The dashboard MAY include a dark mode toggle.
  example_bad: |
    # Ambiguous keywords — "should" everywhere
    RF-SEC-001: The system should validate input.
    RF-SEC-002: Passwords should be hashed.
    RF-SEC-003: Login attempts should be rate-limited.
    RF-PERF-001: API should be fast.
    RF-UI-001: Dashboard should have dark mode.

    # Under deadline, ALL of these become optional.
    # Even input validation and password hashing get cut.
  when_applies: Writing any requirement in any specification document
  sources: ["https://tools.ietf.org/html/rfc2119"]

- id: SAC-SPEC-003
  text: "Spend 50% of spec time on integration points — component internals rarely fail; boundaries ALWAYS fail. Spec the contracts obsessively."
  why: >
    In 15 years of post-mortems, 80% of production incidents trace to integration boundaries:
    mismatched schemas between services, undocumented rate limits on third-party APIs, timezone
    mismatches between frontend and backend, encoding disagreements. Component internals are tested
    in isolation and work fine. The moment two components talk, assumptions collide. The spec must
    be the contract that prevents these collisions.
  how_to_do_right: |
    1. Create an "Integration Points" section as a first-class part of every spec.
    2. For each integration: document request schema, response schema, error codes, timeouts, retries, auth.
    3. Specify data format explicitly: datetime as ISO 8601 UTC, money as integer cents, encoding as UTF-8.
    4. Document rate limits, circuit breaker thresholds, and fallback behavior.
    5. For async integrations: specify message schema, delivery guarantees (at-least-once, exactly-once), ordering.
    6. Write contract tests (not just unit tests) for every integration point.
  severity: critical
  technologies:
    lang: [python, typescript]
    framework: [fastapi, react]
  domains:
    domain: [sacada, architecture, spec_writing]
    concern: [meta_cognition, integration]
  example_good: |
    # Integration Point: Payment Service <-> Order Service
    ## Contract
    - Endpoint: POST /api/v1/payments/charge
    - Auth: Service-to-service JWT, audience "payment-service"
    - Request: { order_id: UUID, amount_cents: int, currency: "USD"|"BRL", idempotency_key: UUID }
    - Response 200: { payment_id: UUID, status: "captured", charged_at: ISO8601 }
    - Response 402: { error: "insufficient_funds", decline_code: string }
    - Response 409: { error: "duplicate_idempotency_key", original_payment_id: UUID }
    - Timeout: 5s connect, 30s read
    - Retry: 3x with exponential backoff (1s, 2s, 4s), only on 5xx or timeout
    - Circuit breaker: open after 5 consecutive failures, half-open after 30s
  example_bad: |
    # Integration: Payment
    The order service calls the payment service to charge the user.
    The payment service returns success or failure.

    # Missing: schemas, error codes, timeouts, retries, auth, idempotency.
    # Result: each developer invents their own integration logic.
  when_applies: Any specification involving more than one component or service
  sources: ["https://martinfowler.com/articles/consumerDrivenContracts.html"]

- id: SAC-SPEC-004
  text: "Every user-facing feature needs a loading state, error state, and empty state — designers forget; specs MUST specify all 3."
  why: >
    Users spend more time looking at loading spinners, error messages, and empty states than at
    the ideal populated view. Yet specs describe only the happy populated state. Developers
    implement features that show a blank white screen while loading, crash silently on errors,
    and show nothing when there is no data. Each missing state is a support ticket waiting to happen.
  how_to_do_right: |
    1. For every UI component, explicitly specify four states: loading, populated, empty, error.
    2. Loading state: specify skeleton/spinner, timeout threshold, timeout behavior.
    3. Empty state: specify illustration, message, call-to-action button (e.g., "Create your first X").
    4. Error state: specify user-facing message, retry button, support link, error code for debugging.
    5. Create a "UI State Matrix" table: feature x state = expected behavior.
    6. Include partial states: what if 3 of 5 API calls succeed? Show partial data or full error?
  severity: high
  technologies:
    lang: [typescript]
    framework: [react, nextjs]
  domains:
    domain: [sacada, ux, spec_writing]
    concern: [meta_cognition, user_experience]
  example_good: |
    # Feature: Dashboard Analytics Chart
    ## States
    | State    | Behavior                                                       |
    |----------|----------------------------------------------------------------|
    | Loading  | Skeleton chart with pulsing animation. Timeout after 10s.      |
    | Timeout  | "Data is taking longer than usual. [Retry] [Contact Support]"  |
    | Populated| Render chart with data. Show last-updated timestamp.           |
    | Empty    | Illustration + "No data yet. Analytics appear after 24 hours." |
    | Error    | "Could not load analytics. Error: {code}. [Retry]"            |
    | Partial  | Render available data, gray out missing series with tooltip.   |
  example_bad: |
    # Feature: Dashboard Analytics Chart
    Display a line chart showing daily active users for the past 30 days.

    # No loading state — user sees nothing for 3 seconds.
    # No empty state — new user sees an empty chart with no explanation.
    # No error state — API failure shows blank area or crashes.
  when_applies: Any specification with user-facing features or UI components
  sources: ["https://web.dev/articles/vitals"]

- id: SAC-SPEC-005
  text: "If you cannot write an acceptance test for it, the requirement is ambiguous — every requirement must be testable. If it is not, decompose further."
  why: >
    Ambiguous requirements are the #1 source of rework in software projects. A requirement like
    "the system should be user-friendly" cannot be tested, so it cannot be verified, so it will
    be argued about in every review until the end of time. The testability test is the cheapest
    ambiguity detector available. If QA cannot write a test case from the requirement alone,
    the requirement is incomplete.
  how_to_do_right: |
    1. For every requirement, immediately write the acceptance test in Given/When/Then format.
    2. If you cannot write the Given (precondition), the requirement lacks context.
    3. If you cannot write the When (action), the requirement lacks specificity.
    4. If you cannot write the Then (expected result), the requirement lacks measurability.
    5. Decompose until each sub-requirement has exactly one acceptance test.
    6. Use the "5-second test": can a new developer understand what to test in 5 seconds?
  severity: high
  technologies:
    lang: [python, typescript]
  domains:
    domain: [sacada, testing, spec_writing]
    concern: [meta_cognition, verification]
  example_good: |
    # RF-CART-001: Add item to cart
    The system MUST add the specified item to the user's cart with the given quantity.

    # Acceptance Test:
    Given: authenticated user, product SKU-123 in stock with qty >= 5
    When: POST /api/cart/items { sku: "SKU-123", quantity: 3 }
    Then: HTTP 200, cart contains SKU-123 with quantity 3, cart total updated
  example_bad: |
    # RF-CART-001: Shopping Cart
    The system should provide a smooth and intuitive shopping cart experience.

    # Cannot write a test: What is "smooth"? What is "intuitive"?
    # Measured how? By whom? Under what conditions?
    # This will be "done" and "not done" simultaneously forever.
  when_applies: Writing or reviewing any functional or non-functional requirement
  sources: ["https://martinfowler.com/bliki/GivenWhenThen.html"]

- id: SAC-SPEC-006
  text: "Implicit requirements kill projects — performance budgets, accessibility, i18n, data retention, audit logging. If not in spec, nobody will build it."
  why: >
    Every project has requirements that "everyone knows" but nobody writes down. Performance
    budgets, accessibility (WCAG), internationalization, data retention policies, audit logging,
    GDPR compliance. Because they are implicit, they are discovered at the worst possible time:
    during security audit, accessibility lawsuit, GDPR investigation, or production meltdown.
    Retrofitting these into an existing system costs 10-50x more than building them in from the start.
  how_to_do_right: |
    1. Maintain a "Cross-Cutting Requirements Checklist" and apply it to every spec.
    2. Checklist items: performance budgets (p50/p95/p99), accessibility (WCAG level), i18n/l10n,
       data retention, audit logging, GDPR/privacy, security (OWASP Top 10), backup/restore,
       monitoring/alerting, rate limiting, graceful degradation.
    3. For each checklist item: either specify it explicitly or write "N/A — [reason]".
    4. Create a "Non-Functional Requirements" section as mandatory in every spec template.
    5. Review the checklist with legal, security, and ops teams before finalizing.
    6. Block spec approval if any checklist item is neither specified nor explicitly excluded.
  severity: critical
  technologies:
    lang: [python, typescript]
    framework: [fastapi, react]
  domains:
    domain: [sacada, spec_writing, compliance]
    concern: [meta_cognition, cross_cutting]
  example_good: |
    # Cross-Cutting Requirements (MANDATORY for every feature)
    ## Performance
    - API p95 latency: < 200ms under 1000 concurrent users
    - Page load (LCP): < 2.5s on 4G connection

    ## Accessibility
    - WCAG 2.1 Level AA compliance
    - Keyboard navigation for all interactive elements
    - Screen reader compatibility (ARIA labels)

    ## Data Retention
    - User data: retained 90 days after account deletion
    - Audit logs: retained 7 years (SOC2 requirement)

    ## Audit Logging
    - All write operations logged: who, what, when, from_where
    - Log format: structured JSON, shipped to SIEM within 5 minutes
  example_bad: |
    # The spec only describes features.
    # No performance budgets — discovered when p99 hits 8 seconds.
    # No accessibility — discovered when lawsuit arrives.
    # No data retention — discovered when GDPR audit happens.
    # No audit logging — discovered when investigating a breach.
    # Cost of retrofitting: 3 months of rework.
  when_applies: Every specification document, without exception
  sources: ["https://www.w3.org/WAI/standards-guidelines/wcag/"]

# =============================================================================
# DECOMPOSITION (SAC-SPEC-007 to SAC-SPEC-012)
# =============================================================================

- id: SAC-SPEC-007
  text: "A Work Package that takes more than 4 hours is not atomic — if an AI agent cannot complete it in one pass, it is too big. Decompose."
  why: >
    AI agents (and humans) lose coherence on long tasks. Context windows fill up, attention
    drifts, and the quality of output degrades exponentially after 2-3 hours of continuous work.
    A 4-hour WP has a 90%+ success rate in one agent pass. An 8-hour WP drops to 50%.
    A 16-hour WP drops to 10%. The cost of decomposition is minutes; the cost of a failed
    agent pass is hours of debugging and rework.
  how_to_do_right: |
    1. Estimate each WP honestly. If estimate > 4 hours, split immediately.
    2. Split by output artifact: one WP = one file, one endpoint, one component.
    3. Each WP must have: clear input, clear output, clear acceptance criteria.
    4. WP names should be verbs: "Implement X", "Create Y", "Add Z" — not nouns.
    5. Validation: can you describe the WP deliverable in one sentence? If not, too big.
    6. For AI agents: each WP should fit in a single prompt with context + instructions + output.
  severity: high
  technologies:
    lang: [python, typescript]
  domains:
    domain: [sacada, project_management, spec_writing]
    concern: [meta_cognition, decomposition]
  example_good: |
    # WP-AUTH-001: Create User model with Pydantic schema (2h)
    # WP-AUTH-002: Implement password hashing utility (1h)
    # WP-AUTH-003: Create login endpoint POST /api/auth/login (2h)
    # WP-AUTH-004: Create registration endpoint POST /api/auth/register (2h)
    # WP-AUTH-005: Add JWT token generation and validation (2h)
    # WP-AUTH-006: Add rate limiting middleware for auth endpoints (2h)

    # Each WP: one artifact, one concern, < 4 hours, testable independently.
  example_bad: |
    # WP-AUTH-001: Implement authentication system (40h)
    # Includes: models, hashing, login, registration, JWT, rate limiting,
    # password reset, email verification, 2FA, session management, OAuth.

    # An agent receiving this WP will: produce incomplete code, miss edge cases,
    # mix concerns, and the output will need 20+ hours of manual cleanup.
  when_applies: Decomposing any specification into work packages
  sources: ["https://blog.pragmaticengineer.com/project-management-at-big-tech/"]

- id: SAC-SPEC-008
  text: "Decompose by NOUN first, then by VERB — data model drives architecture. Get the entities right, then add the operations."
  why: >
    Projects that decompose by feature (verb) end up with overlapping data models, inconsistent
    schemas, and integration nightmares. Two developers implement "create order" and "process
    payment" — each invents their own Order model. Now there are two incompatible Order schemas
    in the codebase. Decomposing by entity (noun) first ensures a single source of truth for
    each domain object. Operations layer cleanly on top.
  how_to_do_right: |
    1. First pass: identify all domain entities (User, Order, Payment, Product, etc.).
    2. For each entity: define the complete schema (all fields, types, constraints, relationships).
    3. Second pass: for each entity, list all operations (CRUD + domain-specific).
    4. Third pass: identify cross-entity operations (e.g., "checkout" touches Order + Payment + Inventory).
    5. WP structure: Entity WPs first (models), then Operation WPs (endpoints), then Cross-Entity WPs.
    6. Validate: every field in every operation must trace to an entity definition.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi, sqlalchemy, pydantic]
  domains:
    domain: [sacada, architecture, spec_writing]
    concern: [meta_cognition, decomposition, data_modeling]
  example_good: |
    # Phase 1: Entities (NOUN-first)
    WP-MODEL-001: Define User entity (id, email, password_hash, created_at, status)
    WP-MODEL-002: Define Order entity (id, user_id, items, total_cents, status, created_at)
    WP-MODEL-003: Define Payment entity (id, order_id, amount_cents, provider, status)

    # Phase 2: Operations (VERB-second)
    WP-API-001: Create user registration (depends: WP-MODEL-001)
    WP-API-002: Create order placement (depends: WP-MODEL-001, WP-MODEL-002)
    WP-API-003: Process payment (depends: WP-MODEL-002, WP-MODEL-003)
  example_bad: |
    # Decomposed by feature (VERB-first) — no shared entity definitions
    WP-001: Implement user registration (invents its own User model)
    WP-002: Implement order placement (invents its own User + Order model)
    WP-003: Implement payment processing (invents its own Order + Payment model)

    # Result: 3 different User models, 2 different Order models.
    # Integration requires reconciling all of them. Days of rework.
  when_applies: Decomposing specifications into work packages or sprints
  sources: ["https://martinfowler.com/bliki/DomainDrivenDesign.html"]

- id: SAC-SPEC-009
  text: "Every RF must map to exactly one acceptance test — if RF maps to zero tests, it is unverifiable. If it maps to 10 tests, it is too coarse."
  why: >
    The RF-to-test mapping is the strongest signal of spec quality. Zero tests means the requirement
    is vague or aspirational. Ten tests means the requirement is a disguised epic containing multiple
    behaviors. Both are spec smells. A 1:1 mapping ensures each requirement is atomic, testable,
    and independently verifiable. It also makes traceability trivial: failed test -> broken requirement -> responsible WP.
  how_to_do_right: |
    1. Create a traceability matrix: RF ID -> Test ID -> WP ID.
    2. For each RF, write exactly one acceptance test in Given/When/Then format.
    3. If you need multiple test scenarios, the RF is too coarse — split it.
    4. If you cannot write any test, the RF is too vague — rewrite it.
    5. Automate the traceability check: script that verifies every RF has a matching test.
    6. In code reviews, reject PRs that add code without a corresponding test-to-RF mapping.
  severity: high
  technologies:
    lang: [python, typescript]
    framework: [pytest, jest]
  domains:
    domain: [sacada, testing, spec_writing]
    concern: [meta_cognition, traceability]
  example_good: |
    # Traceability Matrix
    | RF ID        | Test ID           | WP ID       |
    |--------------|-------------------|-------------|
    | RF-CART-001  | test_add_item     | WP-CART-001 |
    | RF-CART-002  | test_remove_item  | WP-CART-002 |
    | RF-CART-003  | test_update_qty   | WP-CART-003 |

    # Each RF: one behavior, one test, one work package. Clean traceability.
  example_bad: |
    # RF-CART-001: Shopping cart functionality
    # Tests: test_add_item, test_remove_item, test_update_qty, test_clear_cart,
    #        test_apply_coupon, test_calculate_total, test_checkout, test_save_for_later,
    #        test_merge_guest_cart, test_cart_expiry

    # 10 tests for 1 RF = the RF is an epic, not a requirement.
    # When test_apply_coupon fails, which "requirement" broke?
  when_applies: Writing functional requirements and acceptance criteria
  sources: ["https://martinfowler.com/bliki/GivenWhenThen.html"]

- id: SAC-SPEC-010
  text: "Cross-cutting concerns are not Work Packages, they are constraints — auth, logging, i18n apply to ALL WPs, not one WP."
  why: >
    When auth is assigned as WP-AUTH-001, developers treat it as a one-time task: implement the
    auth middleware and done. But auth is not done until EVERY endpoint checks permissions.
    Logging is not done until EVERY operation is logged. i18n is not done until EVERY user-facing
    string is translatable. Making these into WPs creates the illusion of completion. Making them
    into constraints ensures they are verified in every WP.
  how_to_do_right: |
    1. Identify cross-cutting concerns: auth, logging, i18n, error handling, validation, monitoring.
    2. Document them as "Constraints" in the spec, not as Work Packages.
    3. Every WP's acceptance criteria MUST include: "Satisfies constraints C-001, C-002, C-003."
    4. Gate checks verify constraints in every WP, not just in the "auth WP".
    5. Create a shared checklist that every WP must pass before done.
    6. Constraints have their own setup WP (create middleware) but enforcement is per-WP.
  severity: high
  technologies:
    lang: [python, typescript]
    framework: [fastapi, react]
  domains:
    domain: [sacada, architecture, spec_writing]
    concern: [meta_cognition, cross_cutting]
  example_good: |
    # Constraints (apply to ALL work packages)
    C-001: Every API endpoint MUST require authentication via JWT.
    C-002: Every write operation MUST emit an audit log event.
    C-003: Every user-facing string MUST use the i18n translation system.
    C-004: Every API endpoint MUST validate input with Pydantic schemas.

    # WP-ORDER-001: Create order endpoint
    # Acceptance: ... AND satisfies C-001, C-002, C-003, C-004.
  example_bad: |
    # WP-AUTH-001: Implement authentication (DONE)
    # WP-ORDER-001: Create order endpoint (no auth check - "auth was done in WP-AUTH-001")
    # WP-PAYMENT-001: Process payment (no auth check - same reasoning)

    # Result: 40% of endpoints have no auth. Discovered in security audit.
  when_applies: Structuring specifications and work package lists
  sources: ["https://martinfowler.com/bliki/CrossCuttingConcern.html"]

- id: SAC-SPEC-011
  text: "If two WPs share the same database table, they are not independent — true independence requires data isolation or explicit coordination."
  why: >
    Independent WPs can be developed in parallel by different agents or developers. But if WP-A
    and WP-B both write to the users table, they are NOT independent — they can deadlock, create
    conflicting migrations, or produce race conditions. The spec must identify these hidden
    dependencies. False independence leads to merge conflicts, migration collisions, and
    production data corruption.
  how_to_do_right: |
    1. For each WP, list all database tables it reads from and writes to.
    2. Create a "Data Dependency Matrix": WP x Table x Access (R/W).
    3. If two WPs write to the same table, they MUST be sequenced or coordinated.
    4. If two WPs only read the same table, they can be parallel.
    5. For parallel WPs with shared writes: define explicit locking strategy or use event sourcing.
    6. Include migration coordination: which WP owns the schema change?
  severity: high
  technologies:
    lang: [python]
    framework: [sqlalchemy, fastapi]
  domains:
    domain: [sacada, architecture, spec_writing]
    concern: [meta_cognition, decomposition, data_modeling]
  example_good: |
    # Data Dependency Matrix
    | WP            | users (R/W) | orders (R/W) | payments (R/W) |
    |---------------|-------------|--------------|-----------------|
    | WP-USER-001   | W           | -            | -               |
    | WP-ORDER-001  | R           | W            | -               |
    | WP-PAY-001    | -           | R            | W               |

    # WP-USER-001 and WP-ORDER-001 share "users" table.
    # Constraint: WP-USER-001 MUST complete before WP-ORDER-001 starts.
    # WP-ORDER-001 and WP-PAY-001 are truly independent (no shared writes).
  example_bad: |
    # WP-USER-001: Create user profile (writes users table)
    # WP-AUTH-001: Implement auth (writes users table - adds password_hash, last_login)
    # WP-SOCIAL-001: Social features (writes users table - adds avatar, bio)

    # All 3 WPs assigned to different agents in parallel.
    # Result: 3 conflicting migrations, merge hell, data corruption.
  when_applies: Planning parallel execution of work packages
  sources: ["https://docs.sqlalchemy.org/en/20/orm/extensions/declarative/basic_use.html"]

- id: SAC-SPEC-012
  text: "The dependency graph of WPs reveals the critical path — longest chain = minimum delivery time. Identify it FIRST."
  why: >
    Without identifying the critical path, teams optimize the wrong things. They parallelize
    independent WPs that are not on the critical path (saving zero time) while leaving the
    bottleneck sequential chain untouched. The critical path determines the minimum possible
    delivery time. Every hour saved on the critical path is an hour saved on the project.
    Every hour saved off the critical path is wasted optimization effort.
  how_to_do_right: |
    1. Build a DAG (Directed Acyclic Graph) of WP dependencies.
    2. Assign time estimates to each WP node.
    3. Find the longest path (sum of estimates) through the DAG — this is the critical path.
    4. Focus optimization on critical path WPs: can any be decomposed further? Parallelized?
    5. Non-critical WPs have slack — they can be delayed without affecting delivery.
    6. Visualize the DAG in the spec. Every stakeholder must see the critical path.
  severity: high
  technologies:
    lang: [python]
  domains:
    domain: [sacada, project_management, spec_writing]
    concern: [meta_cognition, planning]
  example_good: |
    # WP Dependency Graph (Critical Path marked with *)
    #
    # WP-MODEL-001* (2h) -> WP-API-001* (3h) -> WP-INT-001* (4h) -> WP-E2E-001* (2h)
    #                    \-> WP-API-002  (2h) -> WP-UI-001   (3h)
    #                    \-> WP-API-003  (1h)
    #
    # Critical path: MODEL -> API-001 -> INT-001 -> E2E-001 = 11 hours minimum
    # Optimization: can INT-001 (4h) be split into two 2h WPs to parallelize?
  example_bad: |
    # WP list (flat, no dependencies shown):
    # WP-001: Models (2h)
    # WP-002: API endpoints (8h)
    # WP-003: Integration (4h)
    # WP-004: UI (3h)
    # WP-005: E2E tests (2h)
    # Total: 19h. "Should take about 3 days."

    # Reality: dependencies force sequential execution of 17h.
    # Actual delivery: 4+ days. "Why is this taking so long?"
  when_applies: Planning sprints, estimating delivery timelines
  sources: ["https://blog.pragmaticengineer.com/project-management-at-big-tech/"]

# =============================================================================
# INVARIANT DISCOVERY (SAC-SPEC-013 to SAC-SPEC-018)
# =============================================================================

- id: SAC-SPEC-013
  text: "State machines have invariants at EVERY transition, not just states — invariants are properties of transitions + states combined."
  why: >
    Most specs define valid states (PENDING, ACTIVE, CANCELLED) but ignore transition invariants.
    Can an order go directly from PENDING to REFUNDED? Can a user go from DELETED back to ACTIVE?
    Without transition invariants, developers implement whichever transitions seem reasonable,
    and the system accumulates impossible state combinations. The state machine becomes a state
    spaghetti. Every "impossible" bug report traces back to an unspecified transition.
  how_to_do_right: |
    1. Define all valid states explicitly: draw the state diagram.
    2. For EVERY arrow (transition), specify: precondition, action, postcondition, who can trigger it.
    3. Explicitly list FORBIDDEN transitions: "CANCELLED -> ACTIVE is NEVER allowed."
    4. For each state, define what operations are valid IN that state.
    5. Add transition invariants: "PENDING -> ACTIVE requires payment_confirmed AND stock_reserved."
    6. Implement as a state machine library with explicit transition guards, not if/else chains.
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, architecture, spec_writing]
    concern: [meta_cognition, state_management]
  example_good: |
    # Order State Machine
    # States: DRAFT, PENDING, CONFIRMED, SHIPPED, DELIVERED, CANCELLED, REFUNDED
    #
    # Transitions:
    # DRAFT -> PENDING:     requires items.count > 0 AND total > 0
    # PENDING -> CONFIRMED: requires payment.status == "captured"
    # CONFIRMED -> SHIPPED: requires tracking_number IS NOT NULL
    # SHIPPED -> DELIVERED: requires delivery_confirmation == True
    # ANY -> CANCELLED:     requires state NOT IN (SHIPPED, DELIVERED, REFUNDED)
    # DELIVERED -> REFUNDED: requires refund_request within 30 days
    #
    # FORBIDDEN:
    # CANCELLED -> ANY (terminal state)
    # REFUNDED -> ANY (terminal state)
    # DELIVERED -> CONFIRMED (no going back)
  example_bad: |
    # Order has status field: draft, pending, confirmed, shipped, delivered, cancelled
    #
    # Developer implements: order.status = new_status  (any to any)
    # No guards, no preconditions, no forbidden transitions.
    # Result: orders go from CANCELLED to SHIPPED in production.
  when_applies: Specifying any entity with lifecycle states
  sources: ["https://refactoring.guru/design-patterns/state"]

- id: SAC-SPEC-014
  text: "Negative invariants are more valuable than positive ones — 'balance MUST NEVER be negative' is more useful than 'balance SHOULD be non-negative'."
  why: >
    Positive invariants describe what SHOULD be true. Negative invariants describe what MUST NEVER
    happen. The difference is enforcement strength. "Balance should be non-negative" is a guideline.
    "Balance MUST NEVER be negative" is a hard constraint that requires a CHECK constraint in the
    database, a validation in the API, and an assertion in the business logic. Negative invariants
    are naturally enforceable because they describe forbidden states that can be detected and blocked.
  how_to_do_right: |
    1. For every entity, ask: "What must NEVER happen to this entity?"
    2. Express as MUST NEVER / MUST NOT: "A user MUST NEVER have negative balance."
    3. For each negative invariant, specify three enforcement layers:
       a. Database: CHECK constraint, UNIQUE constraint, or trigger.
       b. API: Input validation that rejects violating requests.
       c. Business logic: Runtime assertion that catches violations.
    4. Specify the violation response: reject, compensate, alert, or all three.
    5. Negative invariants are excellent fuzz testing targets.
  severity: high
  technologies:
    lang: [python]
    framework: [sqlalchemy, pydantic, fastapi]
  domains:
    domain: [sacada, code_quality, spec_writing]
    concern: [meta_cognition, invariants]
  example_good: |
    # Negative Invariants (enforced at all layers)
    INV-NEG-001: Account balance MUST NEVER be negative.
      - DB: CHECK (balance_cents >= 0)
      - API: Reject withdrawal if amount > current_balance
      - Logic: assert account.balance_cents >= 0 after every transaction
      - Violation: Reject transaction, log alert, notify fraud team

    INV-NEG-002: An order MUST NEVER have zero items.
      - DB: CHECK (item_count > 0) — or trigger on items table
      - API: Reject order creation with empty items list
      - Logic: Order.validate() raises if len(items) == 0
  example_bad: |
    # Positive invariant (weak, easily ignored)
    INV-001: Account balance should be non-negative.

    # No enforcement specified. Developer implements:
    # account.balance -= amount  (no check)
    # Result: negative balances in production, found 6 months later.
  when_applies: Defining invariants for any domain entity
  sources: ["https://www.postgresql.org/docs/current/ddl-constraints.html"]

- id: SAC-SPEC-015
  text: "Conservation laws exist in software too — total money in = total money out. Total items in cart = sum of line items. Find the conservation."
  why: >
    Conservation invariants are the most powerful bug detectors in software. If your system moves
    money, the total must always balance. If your system manages inventory, items cannot appear
    or disappear. These invariants catch entire categories of bugs: double-charging, lost
    inventory, phantom records, off-by-one in aggregations. A single conservation check at the
    end of a transaction catches more bugs than 100 unit tests.
  how_to_do_right: |
    1. Identify all "quantities" in the system: money, items, credits, tokens, votes.
    2. For each quantity, define the conservation law: sum of inputs = sum of outputs + current balance.
    3. Implement balance assertions at transaction boundaries.
    4. Create reconciliation jobs that verify conservation across the entire system periodically.
    5. When conservation is violated, HALT and alert — do not silently continue.
    6. Double-entry bookkeeping is the gold standard for financial conservation.
  severity: critical
  technologies:
    lang: [python]
    framework: [sqlalchemy, fastapi]
  domains:
    domain: [sacada, architecture, spec_writing]
    concern: [meta_cognition, invariants, data_integrity]
  example_good: |
    # Conservation Invariant: Money
    # For every user, at all times:
    #   SUM(deposits) - SUM(withdrawals) - SUM(fees) == current_balance
    #
    # Enforcement:
    # 1. Every transaction is double-entry: debit one account, credit another.
    # 2. After each transaction: assert SUM(debits) == SUM(credits).
    # 3. Nightly reconciliation job: verify all balances match transaction history.
    # 4. If mismatch > $0.01: halt processing, page on-call, create incident.
    #
    # Conservation Invariant: Inventory
    #   received_qty - sold_qty - returned_qty - damaged_qty == on_hand_qty
  example_bad: |
    # No conservation invariant. Each operation updates balance independently:
    # deposit: balance += amount
    # withdraw: balance -= amount
    # fee: balance -= fee
    #
    # Race condition: two concurrent withdrawals both read balance=100,
    # both withdraw 80, balance becomes -60. Nobody notices for months.
  when_applies: Any system that manages quantities (money, inventory, credits, tokens)
  sources: ["https://martinfowler.com/eaaDev/AccountingNarrative.html"]

- id: SAC-SPEC-016
  text: "Temporal invariants: X MUST happen before Y — ordering constraints are invariants. Spec them explicitly."
  why: >
    Temporal invariants are the most commonly violated and the hardest to debug. "Payment must be
    confirmed before shipment" seems obvious, but in an async microservice architecture, the
    shipment event can arrive before the payment confirmation due to network partitions, message
    reordering, or retry logic. Without explicit temporal invariants, these ordering violations
    create inconsistent states that are nearly impossible to reproduce in testing.
  how_to_do_right: |
    1. For every multi-step process, draw the sequence diagram with explicit ordering arrows.
    2. Express ordering as invariants: "MUST happen before", "MUST NOT happen until", "MUST happen within X time".
    3. For async systems: specify what happens if events arrive out of order (buffer, reject, compensate).
    4. Implement temporal guards: check precondition timestamps before allowing subsequent steps.
    5. Add timeout invariants: "If step B does not happen within 30 minutes of step A, trigger compensation."
    6. Log timestamps at every step boundary for forensic analysis.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi, celery]
  domains:
    domain: [sacada, architecture, spec_writing]
    concern: [meta_cognition, invariants, temporal]
  example_good: |
    # Temporal Invariants: Order Fulfillment
    TINV-001: payment.confirmed_at MUST be < shipment.created_at
      Guard: Shipment service checks payment status before creating shipment.
      Out-of-order: Reject shipment request, return 409 "payment not confirmed".

    TINV-002: order.placed_at MUST be < payment.initiated_at
      Guard: Payment service verifies order exists and is in PENDING state.

    TINV-003: IF shipment.created_at + 48h < shipment.shipped_at THEN alert ops
      Timeout: If not shipped within 48h, escalate to fulfillment team.
  example_bad: |
    # "The user places an order, pays, and we ship it."
    #
    # No temporal guards. In production:
    # - Webhook retry delivers payment confirmation twice -> double shipment
    # - Shipment service processes queue faster than payment service -> ships before payment
    # - Network partition -> order placed but payment service unreachable -> stuck forever
  when_applies: Any specification involving multi-step processes or async workflows
  sources: ["https://microservices.io/patterns/data/saga.html"]

- id: SAC-SPEC-017
  text: "If the invariant sounds obvious, it is the most critical one — 'a user cannot be both active and deleted' catches more bugs than complex invariants."
  why: >
    Complex invariants get attention because they are intellectually interesting. Obvious invariants
    get skipped because "everyone knows that." But obvious invariants are violated more often
    precisely because nobody enforces them. "A user cannot be both active and deleted" sounds
    trivial until you discover the soft-delete feature that sets deleted_at without updating
    status, creating zombie users that are both active and deleted. The obvious invariants are
    the ones that need enforcement the most.
  how_to_do_right: |
    1. Brainstorm "obvious" invariants for every entity — the ones that feel too simple to write down.
    2. Write them down anyway. If it feels obvious, it is critical.
    3. Implement them as database constraints (CHECK, UNIQUE, EXCLUDE).
    4. Add runtime assertions that check them on every state change.
    5. Test them explicitly: write tests that attempt to violate the "obvious" invariant.
    6. Common obvious invariants: mutual exclusion (not both X and Y), non-null (required fields),
       uniqueness (no duplicate emails), referential (parent exists).
  severity: high
  technologies:
    lang: [python]
    framework: [sqlalchemy, pydantic]
  domains:
    domain: [sacada, code_quality, spec_writing]
    concern: [meta_cognition, invariants]
  example_good: |
    # "Obvious" Invariants (MUST be enforced)
    INV-OBVIOUS-001: A user MUST NOT be both is_active=True AND deleted_at IS NOT NULL.
      DB: CHECK (NOT (is_active = TRUE AND deleted_at IS NOT NULL))
      Code: User.validate() asserts mutual exclusion.

    INV-OBVIOUS-002: An email address MUST be unique across all non-deleted users.
      DB: UNIQUE INDEX on (email) WHERE deleted_at IS NULL

    INV-OBVIOUS-003: A product price MUST be > 0.
      DB: CHECK (price_cents > 0)
      API: Pydantic Field(gt=0)
  example_bad: |
    # "Obvious" invariants not enforced:
    # User model: is_active: bool, deleted_at: Optional[datetime]
    # No CHECK constraint, no validation.
    #
    # Soft-delete sets deleted_at but forgets is_active.
    # Result: 2,347 users are both "active" and "deleted" in production.
    # Billing still charges them. Support tickets flood in.
  when_applies: Defining invariants for any domain entity
  sources: ["https://www.postgresql.org/docs/current/ddl-constraints.html#DDL-CONSTRAINTS-CHECK-CONSTRAINTS"]

- id: SAC-SPEC-018
  text: "An invariant without an enforcement mechanism is a wish — every invariant needs: where it is checked, what happens on violation, who gets notified."
  why: >
    Specs are full of beautifully written invariants that nobody enforces. "The system maintains
    data consistency" is a wish. An invariant becomes real only when three questions are answered:
    WHERE is it checked (database constraint? API validation? cron job?), WHAT happens on violation
    (reject? compensate? alert?), and WHO gets notified (ops? security? the user?). Without all
    three, the invariant is decorative text.
  how_to_do_right: |
    1. For every invariant, fill in the enforcement template:
       - WHERE checked: [database | api | business_logic | cron_job | all]
       - WHAT on violation: [reject_request | rollback_transaction | compensate | alert]
       - WHO notified: [user | ops_team | security_team | product_owner]
    2. At least one enforcement point must be at the database level (last line of defense).
    3. Violations in business logic should log structured events for monitoring.
    4. Create dashboards that show invariant violation rates over time.
    5. Zero violations is the target. Any violation is an incident.
    6. Regular audits: run invariant checks against the entire dataset monthly.
  severity: critical
  technologies:
    lang: [python]
    framework: [sqlalchemy, fastapi, pydantic]
  domains:
    domain: [sacada, code_quality, spec_writing]
    concern: [meta_cognition, invariants, enforcement]
  example_good: |
    # INV-BAL-001: Account balance MUST NEVER be negative.
    #
    # Enforcement:
    # WHERE:  1. DB: CHECK (balance_cents >= 0)
    #         2. API: Validate before debit: if amount > balance, reject.
    #         3. Cron: Nightly reconciliation asserts all balances >= 0.
    # WHAT:   1. DB violation: transaction rolls back automatically.
    #         2. API violation: return HTTP 422 "Insufficient balance".
    #         3. Cron violation: create P0 incident, freeze account.
    # WHO:    1. User: "Insufficient funds" message.
    #         2. Ops: PagerDuty alert on cron violation.
    #         3. Finance: Weekly report of near-zero accounts.
  example_bad: |
    # INV-BAL-001: The system should maintain positive account balances.
    #
    # No enforcement specified. Not checked anywhere.
    # Violation behavior: undefined.
    # Notification: nobody.
    # This invariant exists only in the spec document. The system ignores it.
  when_applies: Defining any invariant in a specification
  sources: ["https://sre.google/sre-book/monitoring-distributed-systems/"]

# =============================================================================
# EDGE CASE DETECTION (SAC-SPEC-019 to SAC-SPEC-024)
# =============================================================================

- id: SAC-SPEC-019
  text: "The 5 Horsemen of Edge Cases: Empty, Boundary, Concurrent, Error, Type — systematically check each for every feature."
  why: >
    Edge cases cause 80% of production bugs but receive 5% of spec attention. Developers think
    about the happy path and test the happy path. Edge cases are discovered by users in production.
    A systematic checklist prevents this: for every feature, check all five categories. This is
    not creative work — it is disciplined, mechanical verification that a checklist enforces.
  how_to_do_right: |
    1. For every feature, create an Edge Case Matrix with 5 rows:
       - Empty: null, empty string, empty list, zero, missing field.
       - Boundary: min, max, min-1, max+1, exactly at limit.
       - Concurrent: two users same action, double-submit, stale read.
       - Error: network failure, timeout, malformed input, auth expired.
       - Type: wrong type, unicode, injection, overflow, NaN.
    2. For each cell: specify expected behavior.
    3. For each cell: write a test case.
    4. Automate: create a parameterized test that covers all 5 categories.
    5. In code review: reject if any category is uncovered.
  severity: critical
  technologies:
    lang: [python, typescript]
    framework: [pytest, jest]
  domains:
    domain: [sacada, testing, spec_writing]
    concern: [meta_cognition, edge_cases]
  example_good: |
    # Edge Case Matrix: POST /api/cart/items
    | Category   | Case                      | Expected                        |
    |------------|---------------------------|---------------------------------|
    | Empty      | quantity = 0              | 422 "Quantity must be > 0"      |
    | Empty      | sku = ""                  | 422 "SKU is required"           |
    | Empty      | body = {}                 | 422 field-level errors          |
    | Boundary   | quantity = 999 (max)      | 200 OK                          |
    | Boundary   | quantity = 1000 (max+1)   | 422 "Max quantity is 999"       |
    | Concurrent | same user, same item, 2x  | Idempotent: qty not doubled     |
    | Error      | product out of stock      | 409 "Out of stock"              |
    | Type       | quantity = "abc"          | 422 "Must be integer"           |
    | Type       | sku = "<script>alert(1)"  | 422 "Invalid SKU format"        |
  example_bad: |
    # Test for POST /api/cart/items:
    # test_add_item_success: adds item, checks 200. DONE.
    #
    # Missing: 0 edge cases tested. Production will discover them all.
  when_applies: Writing test plans or acceptance criteria for any feature
  sources: ["https://docs.pytest.org/en/stable/how-to/parametrize.html"]

- id: SAC-SPEC-020
  text: "Boundary proximity: n-1, n, n+1 for every numeric constraint — if limit is 100, test 99, 100, 101."
  why: >
    Off-by-one errors are the most common bug in software history. Every numeric constraint has
    three critical test points: just below (valid), exactly at (boundary), and just above (invalid).
    The classic bugs: < instead of <=, > instead of >=, array index 0 vs 1, page size 100 returning
    101 items. Boundary testing catches all of them. Missing boundary tests is not a judgment call —
    it is a defect in the test plan.
  how_to_do_right: |
    1. For every numeric constraint in the spec, extract: min, max, step.
    2. For each: test min-1 (invalid), min (valid), min+1 (valid), max-1 (valid), max (valid), max+1 (invalid).
    3. For pagination: test page_size=0, page_size=1, page_size=max, page_size=max+1.
    4. For strings: test length=0, length=1, length=max, length=max+1.
    5. For dates: test start_date, end_date, start_date-1day, end_date+1day.
    6. Automate: parameterized tests with boundary values as test data.
  severity: high
  technologies:
    lang: [python, typescript]
    framework: [pytest, jest]
  domains:
    domain: [sacada, testing, spec_writing]
    concern: [meta_cognition, edge_cases, boundary]
  example_good: |
    # Spec: "Username must be 3-30 characters"
    # Boundary tests:
    @pytest.mark.parametrize("length,expected_status", [
        (0, 422),    # empty
        (1, 422),    # below min
        (2, 422),    # min-1
        (3, 200),    # min (boundary)
        (4, 200),    # min+1
        (29, 200),   # max-1
        (30, 200),   # max (boundary)
        (31, 422),   # max+1
        (1000, 422), # far above max
    ])
    def test_username_length(length, expected_status):
        username = "a" * length
        response = client.post("/api/users", json={"username": username})
        assert response.status_code == expected_status
  example_bad: |
    # Spec: "Username must be 3-30 characters"
    # Test:
    def test_username():
        response = client.post("/api/users", json={"username": "john"})
        assert response.status_code == 200
    # Only tests length=4. Boundaries 3, 30, 31, 0 never tested.
  when_applies: Testing any feature with numeric constraints
  sources: ["https://docs.pytest.org/en/stable/how-to/parametrize.html"]

- id: SAC-SPEC-021
  text: "Empty is not null is not undefined is not zero — each means something different. Spec the behavior for ALL of them."
  why: >
    In JavaScript/TypeScript: null, undefined, "", 0, false, NaN, and [] are all falsy but mean
    different things. In Python: None, "", 0, False, [], and {} are all falsy. In databases:
    NULL is distinct from empty string. In JSON: missing key is different from key with null value.
    If the spec says "handle empty input", the developer will pick ONE of these — and users will
    send ALL of them. Each must have explicitly specified behavior.
  how_to_do_right: |
    1. For every input field, specify behavior for each "empty" variant:
       - null / None: field explicitly set to null
       - missing: field not present in request body
       - empty string: field is ""
       - zero: field is 0
       - empty collection: field is [] or {}
       - whitespace-only: field is "   "
    2. Use a decision table: field x variant = behavior (accept/reject/default).
    3. In Pydantic: distinguish Optional[str] (nullable) from str with default (missing OK) from str (required).
    4. In API: document whether PATCH with null means "clear field" or "don't change field".
    5. Test all variants explicitly.
  severity: high
  technologies:
    lang: [python, typescript]
    framework: [pydantic, fastapi, react]
  domains:
    domain: [sacada, code_quality, spec_writing]
    concern: [meta_cognition, edge_cases, types]
  example_good: |
    # Field: user.bio (optional, max 500 chars)
    | Input                     | Behavior                        |
    |---------------------------|---------------------------------|
    | "Hello, I am John"        | Accept, store as-is             |
    | ""                        | Accept, store as empty string   |
    | "   "                     | Reject: "Bio cannot be only whitespace" |
    | null                      | Accept, set bio to NULL (clear) |
    | missing from request      | No change (PATCH) / NULL (POST) |
    | 0                         | Reject: "Bio must be a string"  |
    | false                     | Reject: "Bio must be a string"  |

    # Pydantic model:
    class UserUpdate(BaseModel):
        bio: Optional[str] = Field(None, max_length=500)

        @field_validator("bio")
        def no_whitespace_only(cls, v):
            if v is not None and v.strip() == "" and v != "":
                raise ValueError("Bio cannot be only whitespace")
            return v
  example_bad: |
    # Field: user.bio
    # Spec: "Users can set their bio."
    # Implementation: bio: str = ""
    #
    # What happens with null? Crash. Missing? Default "". Zero? Stored as "0".
    # Each developer handles it differently across 20 endpoints.
  when_applies: Specifying any input field in any API or UI form
  sources: ["https://docs.pydantic.dev/latest/concepts/types/"]

- id: SAC-SPEC-022
  text: "Unicode edge cases: emoji, RTL text, zero-width characters, combining marks — if users can type it, it WILL arrive."
  why: >
    Modern applications receive input from global users. A username of emoji characters, a bio in
    Arabic (RTL), a display name with zero-width joiners, a comment with combining diacritical
    marks that render as one character but are 4 bytes. These are not theoretical — they are daily
    production input. If the spec does not address Unicode handling, developers will discover these
    bugs from user reports, one painful ticket at a time.
  how_to_do_right: |
    1. Specify string length in: characters (grapheme clusters), code points, or bytes. Pick ONE and be explicit.
    2. Specify allowed character ranges: alphanumeric only? Any Unicode? Specific scripts?
    3. Specify normalization form: NFC (composed) for storage. Normalize before comparison.
    4. Test with: emoji (2-4 bytes), RTL text (Arabic/Hebrew), CJK characters, combining marks, zero-width chars.
    5. For display: specify text direction handling (dir="auto" or explicit).
    6. For search/comparison: specify case-folding rules (Turkish "i" problem).
  severity: high
  technologies:
    lang: [python, typescript]
    framework: [fastapi, react, pydantic]
  domains:
    domain: [sacada, code_quality, spec_writing]
    concern: [meta_cognition, edge_cases, unicode]
  example_good: |
    # Field: display_name
    # Constraints:
    # - Length: 1-50 grapheme clusters (NOT bytes, NOT code points)
    # - Allowed: any Unicode letter, number, space, hyphen, apostrophe
    # - Forbidden: control characters (U+0000-U+001F), zero-width spaces (U+200B)
    # - Normalization: NFC before storage
    # - Comparison: case-fold + normalize before comparison
    # - Display: dir="auto" for RTL support
    #
    # Test cases:
    # "John" -> OK (ASCII)
    # "Jean-Pierre" -> OK (hyphen)
    # "Jose" -> OK (combining accent, 5 graphemes)
    # "Ahmad" (Arabic) -> OK (RTL)
    # "Tanaka" (Japanese) -> OK (CJK)
    # U+200B + "John" -> Rejected (zero-width space)
  example_bad: |
    # Field: display_name
    # Spec: "Max 50 characters"
    #
    # Developer implements: len(name) <= 50  (counts code points, not graphemes)
    # "Family" emoji = 7 code points but 1 grapheme cluster.
    # User with 10 emoji in name gets rejected at "50 characters".
  when_applies: Any spec with user-input text fields
  sources: ["https://unicode.org/reports/tr15/"]

- id: SAC-SPEC-023
  text: "Time edge cases: midnight, DST transitions, leap seconds, timezone changes — time is the #1 source of subtle production bugs."
  why: >
    Time bugs are uniquely insidious because they only manifest at specific moments, making them
    nearly impossible to reproduce. A cron job that double-fires at DST "fall back". A daily
    report that skips March 10th during "spring forward". A billing system that charges twice
    on leap-second days. A user in UTC+13 whose "today" is "tomorrow" for the server. Every one
    of these has caused a production outage at a major company.
  how_to_do_right: |
    1. Store all timestamps in UTC. Always. No exceptions.
    2. Convert to user timezone ONLY at display layer.
    3. Specify how the system handles DST transitions: does "daily at 2am" run at 3am during spring forward?
    4. Specify midnight behavior: is midnight the end of today or the start of tomorrow? Use half-open intervals: [start, end).
    5. Specify timezone for all date-only fields: "2026-02-26" in which timezone?
    6. Test with: UTC, UTC+13 (Tonga), UTC-12 (Baker Island), DST transition dates.
    7. Use ISO 8601 with timezone offset for all API date/time fields.
  severity: high
  technologies:
    lang: [python, typescript]
    framework: [fastapi, react]
  domains:
    domain: [sacada, code_quality, spec_writing]
    concern: [meta_cognition, edge_cases, temporal]
  example_good: |
    # Time Handling Specification
    # Storage: All datetimes in UTC (datetime with timezone in PostgreSQL).
    # API format: ISO 8601 with offset: "2026-02-26T14:30:00Z"
    # Display: Convert to user.timezone at rendering layer only.
    #
    # Date ranges: half-open intervals [start, end).
    #   "Events on Feb 26" = created_at >= 2026-02-26T00:00:00Z AND created_at < 2026-02-27T00:00:00Z
    #
    # DST: "Daily at 2am local" = store next_run_utc, recalculate after each run.
    #   Spring forward: if 2am doesn't exist, run at 3am (next valid time).
    #   Fall back: if 2am happens twice, run only on first occurrence.
    #
    # Edge case tests required:
    # - User in UTC+13 creating event "today"
    # - Report spanning DST transition
    # - Billing period ending on Feb 29 (leap year)
  example_bad: |
    # "Events have a date field."
    #
    # Developer stores: date = "2026-02-26" (no timezone).
    # User in Tokyo creates event at 11pm JST (Feb 26). Server in UTC stores Feb 26.
    # User in New York sees it on Feb 25.
    # Date ranges use <= instead of <: events on boundary counted twice.
  when_applies: Any specification involving dates, times, scheduling, or billing periods
  sources: ["https://www.iso.org/iso-8601-date-and-time-format.html"]

- id: SAC-SPEC-024
  text: "Concurrent edge cases: double-submit, race conditions, stale data reads — if two users CAN do it simultaneously, test it."
  why: >
    Every web application is concurrent. Two users buying the last item in stock. Two admins
    editing the same document. A user double-clicking the "Pay" button. A webhook retry arriving
    while the first webhook is still processing. These are not edge cases — they are normal
    production traffic. Without concurrency specifications, the system will: sell 2 of the last 1
    item, lose one admin's edits, charge the user twice, and process the webhook twice.
  how_to_do_right: |
    1. For every write operation, ask: "What if two requests arrive at the exact same time?"
    2. Specify the concurrency control mechanism: optimistic locking (version column), pessimistic locking (SELECT FOR UPDATE), idempotency keys.
    3. For user actions: specify debounce/throttle on the client AND idempotency on the server.
    4. For inventory/balance: specify the isolation level and locking strategy.
    5. For document editing: specify conflict resolution (last-write-wins, merge, reject).
    6. Test with concurrent requests in CI: use pytest-asyncio or k6 to simulate concurrent load.
  severity: critical
  technologies:
    lang: [python, typescript]
    framework: [fastapi, sqlalchemy, react]
  domains:
    domain: [sacada, architecture, spec_writing]
    concern: [meta_cognition, edge_cases, concurrency]
  example_good: |
    # Concurrency Specification: Purchase Flow
    #
    # Double-submit protection:
    #   Client: Disable button after first click. Debounce 500ms.
    #   Server: Require idempotency_key (UUID) header. Return cached response for duplicate key.
    #
    # Inventory race condition:
    #   Mechanism: SELECT ... FOR UPDATE on inventory row.
    #   If stock < requested_qty after lock: return 409 "Insufficient stock".
    #   Isolation: READ COMMITTED (PostgreSQL default).
    #
    # Document editing:
    #   Mechanism: Optimistic locking with version column.
    #   On save: UPDATE ... WHERE id = :id AND version = :expected_version.
    #   If 0 rows updated: return 409 "Document was modified. Please refresh."
  example_bad: |
    # "Users can purchase items from the store."
    #
    # No concurrency spec. In production:
    # Two users buy last item -> both succeed -> inventory = -1.
    # User double-clicks Pay -> charged twice -> refund required.
    # Two admins edit same page -> one's changes silently lost.
  when_applies: Any specification with write operations accessible by multiple users
  sources: ["https://www.postgresql.org/docs/current/transaction-iso.html"]

# =============================================================================
# CROSS-REFERENCE & QUALITY (SAC-SPEC-025 to SAC-SPEC-030)
# =============================================================================

- id: SAC-SPEC-025
  text: "Every API endpoint in the spec must have: request schema, response schema, error codes, rate limits, auth requirements — missing any = incomplete."
  why: >
    An API endpoint specified with only a description and a success response is 30% complete.
    The frontend developer needs the request schema to build the form. The error codes to show
    the right messages. The rate limits to implement retry logic. The auth requirements to add
    the right headers. Missing any one of these forces the frontend developer to read the backend
    code, guess, or ask the backend developer — all of which waste time and introduce bugs.
  how_to_do_right: |
    1. For every endpoint, use this template:
       - Method + Path: POST /api/v1/resource
       - Auth: Bearer JWT / API Key / None
       - Rate limit: 100 req/min per user, 1000 req/min per IP
       - Request: full JSON schema with types, constraints, required fields
       - Response 2xx: full JSON schema
       - Response 4xx: each error code with message and when it occurs
       - Response 5xx: retry behavior
    2. Use OpenAPI/Swagger spec as the canonical format.
    3. Generate client SDKs from the spec — if the spec is complete enough for codegen, it is complete.
    4. Include example request/response pairs for every endpoint.
    5. Version the API spec alongside the code.
  severity: high
  technologies:
    lang: [python, typescript]
    framework: [fastapi, react]
  domains:
    domain: [sacada, spec_writing, api_design]
    concern: [meta_cognition, completeness]
  example_good: |
    # POST /api/v1/orders
    # Auth: Bearer JWT (role: customer)
    # Rate limit: 10 req/min per user
    #
    # Request:
    # {
    #   "items": [{"sku": "string", "quantity": "int (1-999)"}],  # required, min 1 item
    #   "shipping_address_id": "uuid",  # required
    #   "idempotency_key": "uuid"       # required (header)
    # }
    #
    # Response 201: { "order_id": "uuid", "status": "pending", "total_cents": "int" }
    # Response 400: { "error": "validation_error", "details": [{"field": "...", "message": "..."}] }
    # Response 401: { "error": "unauthorized" }
    # Response 409: { "error": "duplicate_order", "existing_order_id": "uuid" }
    # Response 422: { "error": "out_of_stock", "sku": "string" }
    # Response 429: { "error": "rate_limited", "retry_after_seconds": 60 }
    # Response 500: Client should retry with exponential backoff (3 attempts, 1s/2s/4s)
  example_bad: |
    # POST /api/v1/orders
    # Creates a new order.
    # Returns the order object on success.
    #
    # Missing: request schema, error codes, auth, rate limits, retry behavior.
    # Frontend developer will: guess the schema, hardcode error handling, skip retry logic.
  when_applies: Specifying any API endpoint
  sources: ["https://swagger.io/specification/"]

- id: SAC-SPEC-026
  text: "Spec consistency check: if entity X is mentioned in 3 sections, the properties must match in all 3 — inconsistency is the #1 source of integration bugs."
  why: >
    A large spec mentions the User entity in the data model section (with 12 fields), in the
    API section (with 10 fields), and in the UI wireframes (with 8 fields). Are the missing
    fields intentional (different views) or accidental (spec drift)? Nobody knows. The backend
    implements 12 fields, the frontend displays 8, and the API returns 10 — but they are the
    WRONG 10. Inconsistency between spec sections is the single most expensive spec defect.
  how_to_do_right: |
    1. Define each entity ONCE in a canonical "Data Model" section.
    2. All other sections REFERENCE the canonical definition, not copy it.
    3. If a section shows a subset (e.g., API response), explicitly list which fields are included and why.
    4. Create a cross-reference check: for every entity mention, verify it matches the canonical definition.
    5. Use a single source schema (e.g., JSON Schema or Pydantic model) that generates API docs and UI types.
    6. In spec reviews: one reviewer's sole job is checking cross-section consistency.
  severity: critical
  technologies:
    lang: [python, typescript]
    framework: [pydantic, fastapi]
  domains:
    domain: [sacada, spec_writing, code_quality]
    concern: [meta_cognition, consistency]
  example_good: |
    # Canonical Definition (Section 3.1 Data Model)
    User:
      id: UUID (PK)
      email: string (unique, required)
      display_name: string (required, 1-50 chars)
      created_at: datetime (UTC)
      status: enum (active, suspended, deleted)

    # API Response (Section 4.2) — references canonical
    GET /api/users/:id -> UserPublic
    UserPublic = User MINUS [password_hash]  # Explicit exclusion

    # UI Display (Section 5.1) — references canonical
    Profile Card shows: User.display_name, User.email, User.created_at
    # All field names match canonical definition exactly.
  example_bad: |
    # Data Model (Section 3): User has "display_name"
    # API Docs (Section 4): User has "name"
    # UI Wireframe (Section 5): User has "username"
    #
    # Same concept, three different names. Backend returns "display_name",
    # frontend looks for "name", UI mock shows "username".
    # Integration fails. 2 days of debugging.
  when_applies: Reviewing any specification with entities mentioned in multiple sections
  sources: ["https://json-schema.org/understanding-json-schema/"]

- id: SAC-SPEC-027
  text: "Spec-to-code traceability: every code function should trace to a spec section — if code exists without spec, it is either missing spec or dead code."
  why: >
    Traceability is the mechanism that keeps code and spec synchronized. Without it, code drifts
    from spec within weeks. New features get added "informally" without spec updates. Old features
    get removed from code but remain in spec. The result: the spec describes a system that does not
    exist, and the system implements features that nobody specified. Traceability makes drift visible
    and prevents it.
  how_to_do_right: |
    1. Every function/class docstring includes the spec reference: "Implements RF-AUTH-001".
    2. Every test includes the spec reference: "Tests RF-AUTH-001 acceptance criteria".
    3. Create a traceability matrix: RF ID -> Code file -> Test file.
    4. Automate: script that scans code for RF references and reports orphaned code (no RF) and unimplemented RFs (no code).
    5. In code reviews: reject PRs that add functionality without a spec reference.
    6. In spec reviews: reject spec changes without corresponding code change tickets.
  severity: high
  technologies:
    lang: [python, typescript]
    framework: [pytest, jest]
  domains:
    domain: [sacada, spec_writing, code_quality]
    concern: [meta_cognition, traceability]
  example_good: |
    # In code:
    class AuthService:
        def login(self, email: str, password: str) -> Token:
            """Authenticate user and return JWT token.

            Implements: RF-AUTH-001
            Invariants: INV-AUTH-001 (max 5 failed attempts)
            """

    # In tests:
    def test_login_success():
        """Tests RF-AUTH-001: successful authentication returns JWT."""

    def test_login_lockout():
        """Tests INV-AUTH-001: account locked after 5 failures."""

    # Traceability matrix (automated):
    # RF-AUTH-001 -> src/auth/service.py:login -> tests/test_auth.py:test_login_success
    # INV-AUTH-001 -> src/auth/service.py:login -> tests/test_auth.py:test_login_lockout
  example_bad: |
    # Code with no spec references:
    class AuthService:
        def login(self, email, password):
            # ... 200 lines of code ...
            pass

        def _legacy_oauth_flow(self, provider):
            # Nobody knows if this is still needed.
            # No spec reference. Is it dead code? Missing spec? Legacy?
            pass
  when_applies: Writing code that implements a specification
  sources: ["https://martinfowler.com/bliki/RequirementsAsTests.html"]

- id: SAC-SPEC-028
  text: "Spec versioning: every change to a spec after implementation starts needs impact analysis — scope creep kills through accumulated micro-changes."
  why: >
    A single spec change seems harmless: "Just add a 'notes' field to orders." But this one change
    touches: the data model (migration), the API (request/response schemas), the UI (form + display),
    the tests (new test cases), the docs (API documentation). What seemed like a 30-minute change
    becomes 2 days of work across 4 teams. Multiply by 20 "small" spec changes, and the project is
    3 months behind schedule — killed by a thousand paper cuts.
  how_to_do_right: |
    1. After implementation starts, every spec change requires a Change Request (CR).
    2. Each CR must include: what changed, why, impact analysis (which components affected), effort estimate.
    3. Impact analysis template: Data Model impact, API impact, UI impact, Test impact, Migration impact.
    4. CR must be approved by: spec owner, tech lead, QA lead.
    5. Track spec version: v1.0 (baseline), v1.1 (CR-001), v1.2 (CR-002), etc.
    6. Maintain a changelog: what changed between versions, who approved, why.
    7. Batch non-critical CRs into planned spec revisions, not ad-hoc changes.
  severity: high
  technologies:
    lang: [python, typescript]
  domains:
    domain: [sacada, project_management, spec_writing]
    concern: [meta_cognition, change_management]
  example_good: |
    # Change Request CR-007
    # Change: Add "notes" field to Order entity
    # Reason: Customer support needs to annotate orders
    #
    # Impact Analysis:
    # - Data Model: ADD notes TEXT NULLABLE to orders table. Migration required.
    # - API: PATCH /api/orders/:id now accepts "notes" field. GET returns it.
    # - UI: Order detail page adds notes textarea. Order list adds notes column.
    # - Tests: 4 new tests (create with notes, update notes, empty notes, null notes).
    # - Docs: OpenAPI spec update, API changelog entry.
    #
    # Effort: 1.5 days (backend 0.5d, frontend 0.5d, tests 0.25d, docs 0.25d)
    # Approved by: @spec-owner, @tech-lead, @qa-lead
    # Spec version: v1.0 -> v1.1
  example_bad: |
    # Slack message: "Hey can we add a notes field to orders? Should be quick."
    # Developer adds it. No migration plan. No test update. No API doc update.
    # Frontend discovers it 2 weeks later. Builds UI. Ships.
    # QA finds the field is not in the test suite. Blocks release.
    # 3 days lost to a "quick" change.
  when_applies: Managing any specification after implementation has begun
  sources: ["https://blog.pragmaticengineer.com/project-management-at-big-tech/"]

- id: SAC-SPEC-029
  text: "Non-functional requirements need NUMBERS: '99.9% uptime', 'p99 < 200ms', 'support 10K concurrent users' — 'fast' and 'reliable' are not requirements."
  why: >
    "The system should be fast" passes every spec review and fails every production audit. Without
    numbers, there is no way to design the architecture (do we need caching? CDN? read replicas?),
    no way to test (what is the pass/fail threshold?), and no way to monitor (what triggers an
    alert?). A number turns a wish into an engineering constraint that drives real decisions.
    "p99 < 200ms" tells the architect to add Redis caching. "Fast" tells them nothing.
  how_to_do_right: |
    1. For every NFR, provide: metric, target value, measurement method, load context.
    2. Performance: p50, p95, p99 latency under specified concurrent load.
    3. Availability: percentage uptime, measured over what period, excluding what.
    4. Scalability: number of concurrent users, requests per second, data volume.
    5. Security: password policy (min length, complexity), session timeout, encryption standard.
    6. If you cannot assign a number, the requirement is not yet understood. Research and quantify.
    7. Link NFRs to monitoring alerts: when the number is breached, who is paged?
  severity: critical
  technologies:
    lang: [python, typescript]
    framework: [fastapi, react]
  domains:
    domain: [sacada, spec_writing, architecture]
    concern: [meta_cognition, non_functional]
  example_good: |
    # Non-Functional Requirements
    NFR-PERF-001: API Latency
      - p50: < 50ms
      - p95: < 200ms
      - p99: < 500ms
      - Measured at: API gateway (not application server)
      - Load context: 1000 concurrent users, 500 req/sec
      - Alert: PagerDuty if p99 > 1000ms for 5 consecutive minutes

    NFR-AVAIL-001: System Uptime
      - Target: 99.9% monthly (< 43.8 minutes downtime/month)
      - Excludes: planned maintenance windows (max 2h/month, announced 48h ahead)
      - Measured: synthetic health checks every 30 seconds from 3 regions

    NFR-SCALE-001: Data Volume
      - Support 10M users, 100M orders, 1B events
      - Query performance must meet NFR-PERF-001 at this scale
  example_bad: |
    # Non-Functional Requirements
    # - The system should be fast.
    # - The system should be reliable.
    # - The system should scale.
    # - The system should be secure.
    #
    # None of these can be tested, measured, or monitored.
    # Architect makes random decisions. Nobody can say "we met the requirement."
  when_applies: Writing non-functional requirements in any specification
  sources: ["https://sre.google/sre-book/service-level-objectives/"]

- id: SAC-SPEC-030
  text: "The spec is NOT done until QA can write tests from it without asking questions — if QA needs clarification, the spec is ambiguous."
  why: >
    QA is the ultimate spec validator. A QA engineer reads the spec from a different perspective
    than the author: they look for testable behaviors, not architectural elegance. If QA reads the
    spec and can write complete test cases without asking a single question, the spec is
    unambiguous. If QA needs to ask "what happens when X?", the spec has a gap that would
    have become a production bug. This is the cheapest quality gate available — and it must be
    mandatory before any spec is approved.
  how_to_do_right: |
    1. Before spec approval: give the spec to a QA engineer who was NOT involved in writing it.
    2. QA writes test cases from the spec alone — no meetings, no Slack questions.
    3. QA documents every question they would need to ask.
    4. Each question = a spec gap. Fix the spec before approving.
    5. Target: zero questions from QA. Realistic target: < 3 questions.
    6. Make this a formal spec gate: spec cannot be approved until QA signs off.
    7. Track "questions per spec" as a quality metric. Trend it down over time.
  severity: critical
  technologies:
    lang: [python, typescript]
    framework: [pytest, jest]
  domains:
    domain: [sacada, testing, spec_writing]
    concern: [meta_cognition, verification, quality]
  example_good: |
    # Spec Review Gate: QA Sign-Off
    #
    # Process:
    # 1. Spec author submits spec for review.
    # 2. QA engineer (not the author) writes test plan from spec alone.
    # 3. QA documents questions found (spec gaps).
    # 4. If questions > 0: spec returned to author for fixes.
    # 5. Repeat until QA can write complete test plan with 0 questions.
    # 6. QA signs off: "I can test this without asking anything."
    #
    # Metric tracked: questions_per_spec
    # Target: 0 questions. Alert if average > 3 over last 5 specs.
    #
    # QA Test Plan (generated from spec alone):
    # TC-001: Login with valid credentials -> token returned
    # TC-002: Login with invalid password -> 401 + specific error message
    # TC-003: Login after 5 failures -> 423 + unlock email sent
    # TC-004: Login with locked account -> 423 + remaining lockout time
    # (QA was able to write all test cases without any questions)
  example_bad: |
    # Spec submitted. QA reads it. Questions:
    # Q1: "What happens after 5 failed logins?" -> Not specified
    # Q2: "What error message for invalid email format?" -> Not specified
    # Q3: "Does rate limiting apply per user or per IP?" -> Not specified
    # Q4: "What is the session timeout?" -> Not specified
    # Q5: "Can users login from multiple devices?" -> Not specified
    #
    # 5 questions = 5 spec gaps = 5 potential production bugs.
    # Each gap costs 2-8 hours to fix after implementation.
  when_applies: Final review of any specification before approval and implementation
  sources: ["https://martinfowler.com/bliki/GivenWhenThen.html"]
