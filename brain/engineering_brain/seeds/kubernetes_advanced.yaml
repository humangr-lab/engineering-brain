layer: rules
technology: Kubernetes
domain: architecture
knowledge:
- id: CR-K8S-ADV-001
  text: Use ArgoCD Application CRDs with sync waves and automated sync for GitOps — never deploy with kubectl apply in production.
  why: 'Manual kubectl apply has no audit trail, no rollback, no drift detection, and depends on whoever has kubeconfig access.
    GitOps with ArgoCD ensures: all changes go through git (reviewed, audited), cluster state is continuously reconciled with
    git (drift detection and correction), deployments are automated and reproducible, and rollback is just a git revert. This
    eliminates the #1 cause of production incidents: ad-hoc manual changes.'
  how_to_do_right: 'Deploy ArgoCD. Create Application CRDs pointing to git repositories. Use sync waves for ordering (CRDs
    before operators, namespaces before workloads). Enable automated sync with self-heal for production. Use ApplicationSets
    for multi-cluster/multi-tenant deployments. Set sync policy: automated with prune and self-heal. Use progressive delivery
    (Argo Rollouts) for canary/blue-green.'
  severity: critical
  technologies:
    platform: [kubernetes, argocd]
  domains:
    domain: [architecture, operations, devops]
  example_good: "apiVersion: argoproj.io/v1alpha1\nkind: Application\nmetadata:\n  name: api-gateway\n  namespace: argocd\n\
    spec:\n  project: production\n  source:\n    repoURL: https://github.com/org/k8s-manifests.git\n    targetRevision: main\n\
    \    path: apps/api-gateway/overlays/production\n  destination:\n    server: https://kubernetes.default.svc\n    namespace:\
    \ production\n  syncPolicy:\n    automated:\n      prune: true            # Delete resources not in git\n      selfHeal:\
    \ true         # Revert manual changes\n    syncOptions:\n      - CreateNamespace=true\n      - ServerSideApply=true\n\
    \    retry:\n      limit: 3\n      backoff:\n        duration: 5s\n        maxDuration: 3m\n        factor: 2\n---\n#\
    \ Sync waves: CRDs first, then operator, then workloads\n# CRD (wave -2):\nmetadata:\n  annotations:\n    argocd.argoproj.io/sync-wave:\
    \ \"-2\"\n# Operator (wave -1):\nmetadata:\n  annotations:\n    argocd.argoproj.io/sync-wave: \"-1\"\n# Workload (wave\
    \ 0, default):\n"
  example_bad: '# Manual deployment process:

    # 1. SSH to bastion host

    # 2. kubectl apply -f deployment.yaml

    # 3. Hope nothing breaks

    # 4. No audit trail of who changed what

    # 5. Drift from git — nobody knows actual state

    # 6. Rollback: "does anyone have the old YAML?"

    '
  when_applies: Any project using Kubernetes-orchestrated deployments or ArgoCD
  when_not_applies: small scripts under 100 lines, single-purpose utilities. projects not using Kubernetes or ArgoCD
  sources: ["https://argo-cd.readthedocs.io/en/stable/user-guide/sync-waves/"]
- id: CR-K8S-ADV-002
  text: Use ApplicationSets for generating ArgoCD Applications across multiple clusters, namespaces, or tenants.
  why: 'Managing individual Application CRDs for 50 microservices across 3 clusters (150 Application objects) is unsustainable
    — adding a new cluster requires creating 50 new Applications. ApplicationSets generate Application objects from templates
    using generators: git directory (one app per folder), cluster (one app per cluster), matrix (cross-product of generators).
    Adding a cluster or service automatically generates all necessary Applications.'
  how_to_do_right: Use git directory generator for monorepo microservices (one Application per directory). Use cluster generator
    for multi-cluster deployments (replicate to all clusters). Use matrix generator for cross-product (every app to every
    cluster). Use merge generator for environment-specific overrides. Set sync policy per-generator for different environments
    (manual for production, auto for staging).
  severity: medium
  technologies:
    platform: [kubernetes, argocd]
  domains:
    domain: [architecture, operations, devops]
  example_good: "apiVersion: argoproj.io/v1alpha1\nkind: ApplicationSet\nmetadata:\n  name: microservices\n  namespace: argocd\n\
    spec:\n  generators:\n    - matrix:\n        generators:\n          # All services from git directory structure\n    \
    \      - git:\n              repoURL: https://github.com/org/k8s-manifests.git\n              revision: main\n       \
    \       directories:\n                - path: apps/*\n          # All registered clusters\n          - clusters:\n   \
    \           selector:\n                matchLabels:\n                  environment: production\n  template:\n    metadata:\n\
    \      name: \"{{name}}-{{path.basename}}\"\n    spec:\n      project: production\n      source:\n        repoURL: https://github.com/org/k8s-manifests.git\n\
    \        targetRevision: main\n        path: \"{{path}}/overlays/{{metadata.labels.environment}}\"\n      destination:\n\
    \        server: \"{{server}}\"\n        namespace: \"{{path.basename}}\"\n"
  example_bad: '# 150 individual Application CRDs maintained manually

    # New cluster added → create 50 new Applications by hand

    # New service added → create 3 new Applications (one per cluster)

    # Forgot one → service not deployed to cluster-3

    '
  when_applies: Projects using Kubernetes-orchestrated deployments or ArgoCD
  when_not_applies: small scripts under 100 lines, single-purpose utilities. projects not using Kubernetes or ArgoCD
  sources: ["https://argo-cd.readthedocs.io/en/stable/operator-manual/applicationset/"]
- id: CR-K8S-ADV-003
  text: Use Cluster API for declarative cluster lifecycle management — never provision clusters manually.
  why: 'Manual cluster provisioning (clicking through cloud console, running kops/eksctl interactively) is unreproducible,
    error-prone, and slow. Cluster API (CAPI) manages Kubernetes clusters as Kubernetes resources — you define a Cluster CR,
    and CAPI provisions the infrastructure. This enables: GitOps for cluster management, consistent configuration across clusters,
    automated upgrades, and disaster recovery (recreate cluster from git).'
  how_to_do_right: Deploy a CAPI management cluster. Install infrastructure providers (AWS, GCP, Azure, vSphere). Define Cluster,
    MachineDeployment, and KubeadmControlPlane CRDs. Store cluster definitions in git. Use ClusterClass for reusable cluster
    templates. Upgrade clusters by updating the Kubernetes version in the CR. Use CAPI Operator for self-managed CAPI lifecycle.
  severity: medium
  technologies:
    library: [cluster api]
    platform: [kubernetes]
  domains:
    domain: [architecture, operations, devops]
  example_good: "# Cluster API: Declarative cluster management\napiVersion: cluster.x-k8s.io/v1beta1\nkind: Cluster\nmetadata:\n\
    \  name: production-east\n  namespace: clusters\nspec:\n  clusterNetwork:\n    pods:\n      cidrBlocks: [\"192.168.0.0/16\"\
    ]\n    services:\n      cidrBlocks: [\"10.128.0.0/12\"]\n  topology:\n    class: standard-production     # Reusable ClusterClass\n\
    \    version: v1.29.2\n    controlPlane:\n      replicas: 3\n    workers:\n      machineDeployments:\n        - class:\
    \ default-worker\n          name: general\n          replicas: 5\n        - class: gpu-worker\n          name: gpu\n \
    \         replicas: 2\n"
  example_bad: '# Manual cluster provisioning:

    # eksctl create cluster --name production --region us-east-1 --nodes 5

    # Result: unreproducible, no git history, no drift detection

    # Disaster recovery: "how was this cluster configured?" -> unknown

    '
  when_applies: Projects using Kubernetes-orchestrated deployments or Cluster API
  when_not_applies: small scripts under 100 lines, single-purpose utilities. projects not using Kubernetes or Cluster API
  sources: ["https://cluster-api.sigs.k8s.io/introduction"]
- id: CR-K8S-ADV-004
  text: 'Implement comprehensive cost optimization: right-size resources, use spot instances, enable bin packing, and track
    spending per team.'
  why: 'The average Kubernetes cluster wastes 30-60% of its compute spend on over-provisioned resources. Without systematic
    optimization, costs grow linearly with workloads while actual utilization stays at 20-40%. The three biggest savings:
    right-sizing pods (matching requests to actual usage), using spot/preemptible instances for tolerant workloads (60-90%
    savings), and bin packing to reduce node count (20-40% savings).'
  how_to_do_right: 'Deploy VPA in recommendation mode for all workloads. Review and apply recommendations quarterly. Deploy
    OpenCost/Kubecost for cost visibility per namespace/team. Create spot node groups for stateless workloads (tainted, with
    PDB). Configure Cluster Autoscaler with MostAllocated scoring. Set ResourceQuotas per namespace. Alert on: cost anomalies,
    idle resources, unoptimized workloads. Target: <20% resource waste.'
  severity: medium
  technologies:
    library: [opencost, vpa]
    platform: [kubernetes]
  domains:
    domain: [architecture, performance]
  example_good: "# Cost optimization stack\n# 1. VPA recommendations (already deployed per CR-K8S-SCALE-003)\n# 2. OpenCost\
    \ for visibility\n# helm install opencost opencost/opencost -n opencost\n\n# 3. Spot node group with taint\n# eksctl create\
    \ nodegroup --cluster production \\\n#   --name spot --spot --instance-types m5.large,m5a.large,m5.xlarge \\\n#   --nodes-min\
    \ 0 --nodes-max 20\n\n# 4. Bin packing scheduler\n# See CR-K8S-SCALE-014\n\n# 5. Cost alert\napiVersion: monitoring.coreos.com/v1\n\
    kind: PrometheusRule\nspec:\n  groups:\n    - name: cost.rules\n      rules:\n        - alert: HighResourceWaste\n   \
    \       expr: |\n            (sum(kube_pod_container_resource_requests{resource=\"cpu\"}) by (namespace)\n           \
    \ - sum(rate(container_cpu_usage_seconds_total[1h])) by (namespace))\n            / sum(kube_pod_container_resource_requests{resource=\"\
    cpu\"}) by (namespace)\n            > 0.6\n          for: 24h\n          labels:\n            severity: info\n       \
    \   annotations:\n            summary: \"Namespace {{ $labels.namespace }} wastes >60% of requested CPU\"\n"
  example_bad: '# No cost optimization

    # 50 pods with 2 CPU request, actual usage 0.3 CPU

    # 30 on-demand nodes at $100/month = $3,000/month

    # Could be: 10 spot nodes at $30/month = $300/month

    # Savings: $2,700/month = $32,400/year

    '
  when_applies: Projects using Kubernetes-orchestrated deployments, OpenCost, or VPA
  when_not_applies: small scripts under 100 lines, single-purpose utilities
  sources:
    - "https://www.opencost.io/docs/"
    - "https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/"
- id: CR-K8S-ADV-005
  text: Use kubectl debug with ephemeral containers for production troubleshooting — never install debug tools in production
    images.
  why: Installing curl, tcpdump, strace, and netcat in production images increases attack surface by 10x — each tool is a
    potential vector for an attacker who gains container access. Distroless images have no shell or debug tools by design.
    kubectl debug (Kubernetes 1.23+) injects ephemeral containers into running pods with full debug tools, sharing the pod's
    network namespace and process space, without modifying the production image.
  how_to_do_right: Use 'kubectl debug -it <pod> --image=nicolaka/netshoot --target=<container>' for network debugging (curl,
    dig, tcpdump, nmap). Use 'kubectl debug -it <pod> --image=busybox --target=<container>' for filesystem inspection. Use
    'kubectl debug node/<node> -it --image=ubuntu' for node-level debugging. Use '--copy-to' to create a debug copy of the
    pod with modified security context. Clean up ephemeral containers when done.
  severity: medium
  technologies:
    platform: [kubernetes]
  domains:
    domain: [architecture, operations, devops]
  example_good: "# Debug network issues in a running pod\n# kubectl debug -it api-pod-abc123 \\\n#   --image=nicolaka/netshoot\
    \ \\\n#   --target=api \\\n#   -- bash\n\n# Inside the ephemeral container:\n# curl localhost:8080/healthz          #\
    \ Test application endpoint\n# dig postgres.database.svc            # Test DNS resolution\n# tcpdump -i eth0 port 5432\
    \           # Capture database traffic\n# nslookup api.example.com            # Test external DNS\n\n# Debug node issues\n\
    # kubectl debug node/worker-1 -it --image=ubuntu -- bash\n# Inside: check disk, network, kernel logs\n\n# Copy pod with\
    \ modified security context\n# kubectl debug api-pod-abc123 --copy-to=debug-pod \\\n#   --container=api \\\n#   --set-image=api=api:debug-v1.2.3\n\
    apiVersion: v1\nkind: Pod\nmetadata:\n  name: api\nspec:\n  containers:\n    - name: api\n      image: gcr.io/distroless/python3\
    \    # No debug tools — secure\n"
  example_bad: '# Debug tools in production image

    FROM python:3.13

    RUN apt-get install -y curl netcat tcpdump strace vim

    # 50 MB of attack surface added

    # Attacker gets shell → full network diagnostic toolkit available

    # CVEs in debug tools → security vulnerabilities

    '
  when_applies: Projects using Kubernetes-orchestrated deployments
  when_not_applies: small scripts under 100 lines, single-purpose utilities. projects not using Kubernetes
  sources: ["https://kubernetes.io/docs/tasks/debug/debug-running-pods/#ephemeral-container"]
- id: CR-K8S-ADV-006
  text: Follow the version skew policy for Kubernetes upgrades — never skip minor versions.
  why: 'Kubernetes guarantees backward compatibility within the version skew policy: kubelet can be at most 2 minor versions
    behind the API server, kubectl 1 minor version. Skipping a minor version (e.g., 1.27 -> 1.29) risks: API deprecation removals
    that break workloads, feature gate changes that alter behavior, and etcd schema migrations that fail. Each minor version
    must be validated before proceeding to the next.'
  how_to_do_right: 'Upgrade one minor version at a time (1.28 -> 1.29 -> 1.30). Before upgrading: check deprecated API versions
    with ''kubectl deprecation'' or pluto. Upgrade control plane first, then workers. Use PodDisruptionBudgets to maintain
    availability during node drain. Test the upgrade in staging first. Use surge upgrades (add new nodes before removing old)
    for zero-downtime. Read the release notes for every version.'
  severity: critical
  technologies:
    platform: [kubernetes]
  domains:
    domain: [architecture, operations, devops]
  example_good: "# Pre-upgrade checklist:\n# 1. Check deprecated APIs\n# pluto detect-all-in-cluster\n# kubectl api-resources\
    \ --verbs=list -o name | xargs -I {} kubectl get {} -A -o json | pluto detect -\n\n# 2. Upgrade control plane (one minor\
    \ version)\n# For EKS: aws eks update-cluster-version --name production --kubernetes-version 1.29\n# For GKE: gcloud container\
    \ clusters upgrade production --master --cluster-version 1.29\n\n# 3. Upgrade node groups with surge (zero downtime)\n\
    # eksctl create nodegroup --cluster production --name v129-workers \\\n#   --kubernetes-version 1.29 --nodes 5\n# kubectl\
    \ drain <old-node> --delete-emptydir-data --ignore-daemonsets\n# eksctl delete nodegroup --cluster production --name v128-workers\n\
    \n# 4. Validate\n# kubectl get nodes -o wide   # All nodes on new version\n# kubectl get pods -A | grep -v Running  #\
    \ No broken pods\napiVersion: v1\nkind: ConfigMap\nmetadata:\n  name: upgrade-checklist\n"
  example_bad: '# Skip versions: 1.27 -> 1.30

    # "It''s just Kubernetes, what could go wrong?"

    # - PodSecurityPolicy removed in 1.25 (not caught)

    # - FlowSchema API changed in 1.29 (breaks admission)

    # - etcd compact-revision field changed (data corruption risk)

    '
  when_applies: Any project using Kubernetes-orchestrated deployments
  when_not_applies: small scripts under 100 lines, single-purpose utilities. projects not using Kubernetes
  sources: ["https://kubernetes.io/releases/version-skew-policy/"]
- id: CR-K8S-ADV-007
  text: Implement Velero for cluster backup and disaster recovery — backup both etcd and persistent volumes.
  why: 'Without backup, a cluster failure (etcd corruption, accidental namespace deletion, ransomware) means total loss of
    all Kubernetes resources AND data. etcd snapshots alone don''t backup PersistentVolume data. PV snapshots alone don''t
    backup Kubernetes resources. Velero backs up both: Kubernetes resources (YAML definitions) and PV data (volume snapshots
    or Restic/Kopia for non-snapshot storage). This enables: cluster migration, disaster recovery, and namespace-level restore.'
  how_to_do_right: Deploy Velero with the CSI snapshot plugin and cloud storage plugin (S3, GCS). Schedule daily cluster backups
    with 30-day retention. Test restore monthly in a separate cluster. Use include-namespaces for workload backups (exclude
    kube-system, velero). Use volume snapshot class for CSI volumes. Store backups in a different region/account (protect
    against account compromise). Document and test the full restore procedure.
  severity: critical
  technologies:
    library: [velero]
    platform: [kubernetes]
  domains:
    domain: [architecture, reliability]
  example_good: "# Velero backup schedule\napiVersion: velero.io/v1\nkind: Schedule\nmetadata:\n  name: daily-backup\n  namespace:\
    \ velero\nspec:\n  schedule: \"0 2 * * *\"        # Daily at 2 AM\n  template:\n    ttl: 720h                   # 30-day\
    \ retention\n    includedNamespaces:\n      - production\n      - staging\n    excludedResources:\n      - events\n  \
    \    - events.events.k8s.io\n    snapshotVolumes: true\n    storageLocation: default\n    volumeSnapshotLocations:\n \
    \     - default\n  useOwnerReferencesInBackup: false\n---\n# Backup storage location (S3 in different region)\napiVersion:\
    \ velero.io/v1\nkind: BackupStorageLocation\nmetadata:\n  name: default\n  namespace: velero\nspec:\n  provider: aws\n\
    \  objectStorage:\n    bucket: k8s-backups-dr\n    prefix: production\n  config:\n    region: us-west-2     # Different\
    \ region from cluster\n"
  example_bad: '# No backup strategy

    # "We have RAID on the nodes" — doesn''t protect against:

    #   - Accidental namespace deletion

    #   - etcd corruption

    #   - Ransomware encrypting PVs

    #   - Cloud account compromise

    #   - Region outage

    # Recovery: rebuild everything from scratch (days to weeks)

    '
  when_applies: Any project using Kubernetes-orchestrated deployments or Velero
  when_not_applies: small scripts under 100 lines, single-purpose utilities. projects not using Kubernetes or Velero
  sources: ["https://velero.io/docs/"]
- id: CR-K8S-ADV-008
  text: Use bound service account tokens with short expiry and audience restrictions — disable legacy token auto-mounting.
  why: 'Legacy service account tokens are: permanent (never expire), cluster-wide (no audience binding), and automatically
    mounted in every pod. A stolen legacy token grants API access until manually revoked. Bound tokens (Kubernetes 1.22+)
    are: time-limited (auto-rotated), audience-scoped (only valid for specific services), and bound to the pod lifecycle (revoked
    when pod is deleted). This reduces the blast radius of token theft from ''permanent cluster access'' to ''temporary, scoped
    access.'''
  how_to_do_right: 'Set automountServiceAccountToken: false on all ServiceAccounts and pods (see CR-K8S-SEC-014). For pods
    that need API access, use projected volume with serviceAccountToken source specifying expirationSeconds (3600 = 1 hour)
    and audience. Disable legacy token creation with --service-account-max-token-expiration on kube-apiserver. Audit existing
    tokens with ''kubectl get secrets --field-selector type=kubernetes.io/service-account-token''.'
  severity: high
  technologies:
    platform: [kubernetes]
  domains:
    domain: [architecture, security]
  example_good: "# Bound token with short expiry and audience\nspec:\n  serviceAccountName: sa-api\n  automountServiceAccountToken:\
    \ false\n  volumes:\n    - name: api-token\n      projected:\n        sources:\n          - serviceAccountToken:\n   \
    \           path: token\n              expirationSeconds: 3600      # 1 hour, auto-rotated\n              audience: api.example.com\
    \     # Scoped to this service\n  containers:\n    - name: api\n      volumeMounts:\n        - name: api-token\n     \
    \     mountPath: /var/run/secrets/tokens\n          readOnly: true\n"
  example_bad: "spec:\n  # Default: legacy token auto-mounted\n  # Token at /var/run/secrets/kubernetes.io/serviceaccount/token\n\
    \  # Never expires, no audience binding\n  # Stolen token = permanent cluster access\n  containers:\n    - name: api\n\
    \      # Legacy token automatically available\n"
  when_applies: Projects using Kubernetes-orchestrated deployments
  when_not_applies: small scripts under 100 lines, single-purpose utilities. projects not using Kubernetes
  sources: ["https://kubernetes.io/docs/reference/access-authn-authz/service-accounts-admin/#bound-service-account-tokens"]
- id: CR-K8S-ADV-009
  text: Use Argo Rollouts or Flagger for canary and blue-green deployments — native Deployments cannot do progressive delivery.
  why: Kubernetes Deployments only support rolling updates — ALL traffic shifts to the new version simultaneously (just spread
    over time). If the new version has a bug affecting 5% of requests, ALL users are affected within minutes. Progressive
    delivery (canary) routes a small percentage of traffic to the new version, monitors metrics, and only promotes if metrics
    are healthy. This catches issues before they affect all users.
  how_to_do_right: 'Deploy Argo Rollouts or Flagger. Replace Deployment with Rollout CR. Define canary strategy: start at
    5% traffic, observe for 5 minutes, promote to 20%, 50%, 100%. Define analysis template: check error rate, latency, and
    custom metrics at each step. Auto-rollback if metrics degrade. Integrate with Prometheus for metric analysis. Use traffic
    management via Istio, Nginx, or ALB.'
  severity: high
  technologies:
    library: [argo rollouts]
    platform: [kubernetes, service_mesh, istio]
  domains:
    domain: [architecture, reliability]
  example_good: "apiVersion: argoproj.io/v1alpha1\nkind: Rollout\nmetadata:\n  name: api\nspec:\n  replicas: 10\n  strategy:\n\
    \    canary:\n      canaryService: api-canary\n      stableService: api-stable\n      trafficRouting:\n        istio:\n\
    \          virtualService:\n            name: api-vsvc\n      steps:\n        - setWeight: 5\n        - pause: {duration:\
    \ 5m}\n        - analysis:\n            templates:\n              - templateName: success-rate\n        - setWeight: 20\n\
    \        - pause: {duration: 5m}\n        - analysis:\n            templates:\n              - templateName: success-rate\n\
    \        - setWeight: 50\n        - pause: {duration: 10m}\n        - setWeight: 100\n      analysis:\n        successfulRunHistoryLimit:\
    \ 3\n        unsuccessfulRunHistoryLimit: 3\n---\napiVersion: argoproj.io/v1alpha1\nkind: AnalysisTemplate\nmetadata:\n\
    \  name: success-rate\nspec:\n  metrics:\n    - name: success-rate\n      interval: 60s\n      successCondition: result[0]\
    \ > 0.99\n      provider:\n        prometheus:\n          address: http://prometheus:9090\n          query: |\n      \
    \      sum(rate(http_requests_total{status!~\"5..\",service=\"api-canary\"}[5m]))\n            / sum(rate(http_requests_total{service=\"\
    api-canary\"}[5m]))\n"
  example_bad: '# Native Deployment rolling update

    # All traffic shifts to new version in ~2 minutes

    # New version has 2% error rate → ALL users affected

    # Manual rollback takes 3+ minutes after detection

    # Total impact: 5+ minutes of degraded service for ALL users

    '
  when_applies: Projects using Kubernetes-orchestrated deployments, Argo Rollouts, or Istio service mesh
  when_not_applies: small scripts under 100 lines, single-purpose utilities
  sources: ["https://argoproj.github.io/argo-rollouts/"]
- id: CR-K8S-ADV-010
  text: Harden Kubernetes clusters following CIS Benchmark and automate compliance scanning.
  why: 'Default Kubernetes installations have numerous security weaknesses: API server accessible without network restrictions,
    anonymous auth enabled, insecure ports open, etcd unencrypted, kubelet API unauthenticated. The CIS Kubernetes Benchmark
    provides 200+ security checks. Without automated scanning, configuration drift reintroduces vulnerabilities over time
    — a cluster that was secure at initial setup may have 50 failures after 6 months of changes.'
  how_to_do_right: 'Run kube-bench against CIS Benchmark regularly (as a CronJob). Fix critical and high findings. Deploy
    Kubiscan for RBAC analysis. Use Popeye for cluster resource lint. Implement: disable anonymous auth, enable audit logging,
    encrypt etcd at rest, restrict API server network access, enable admission controllers, use PSA Restricted. Scan weekly
    in CI, alert on new failures.'
  severity: high
  technologies:
    library: [kube-bench]
    platform: [kubernetes]
  domains:
    domain: [architecture, security]
  example_good: "# kube-bench as CronJob\napiVersion: batch/v1\nkind: CronJob\nmetadata:\n  name: kube-bench-scan\n  namespace:\
    \ security\nspec:\n  schedule: \"0 6 * * 1\"    # Weekly Monday 6 AM\n  jobTemplate:\n    spec:\n      template:\n   \
    \     spec:\n          hostPID: true\n          containers:\n            - name: kube-bench\n              image: aquasec/kube-bench:latest\n\
    \              command: [\"kube-bench\", \"run\", \"--json\"]\n              volumeMounts:\n                - name: var-lib-kubelet\n\
    \                  mountPath: /var/lib/kubelet\n                  readOnly: true\n                - name: etc-kubernetes\n\
    \                  mountPath: /etc/kubernetes\n                  readOnly: true\n          volumes:\n            - name:\
    \ var-lib-kubelet\n              hostPath:\n                path: /var/lib/kubelet\n            - name: etc-kubernetes\n\
    \              hostPath:\n                path: /etc/kubernetes\n          restartPolicy: Never\n"
  example_bad: '# Default cluster installation — never hardened

    # CIS Benchmark: 50+ FAIL results

    # Anonymous auth: enabled (attackers can query API)

    # etcd: unencrypted (secrets readable from disk)

    # Audit logging: disabled (no forensic capability)

    # kubelet API: unauthenticated (node compromise = cluster compromise)

    '
  when_applies: Projects using Kubernetes-orchestrated deployments or kube-bench
  when_not_applies: small scripts under 100 lines, single-purpose utilities. projects not using Kubernetes or kube-bench
  sources: ["https://www.cisecurity.org/benchmark/kubernetes"]
- id: CR-K8S-ADV-011
  text: Create ephemeral preview environments per pull request using namespaces or virtual clusters.
  why: Without preview environments, developers deploy to shared staging and step on each other's toes — conflicting changes,
    broken shared databases, and 'it worked on staging' when it fails in production because staging was modified by someone
    else. Ephemeral environments give each PR an isolated instance of the entire application, enabling parallel development,
    safer testing, and faster review cycles.
  how_to_do_right: Use ArgoCD ApplicationSets with pull request generator to create per-PR environments. Use vcluster for
    virtual Kubernetes clusters (no namespace conflicts, full isolation). Or use namespace-per-PR with NetworkPolicies for
    isolation. Tear down automatically when PR is closed/merged. Limit ephemeral env resources with ResourceQuotas. Use ephemeral
    databases (init from snapshot or seed data).
  severity: medium
  technologies:
    library: [vcluster]
    platform: [kubernetes, argocd]
  domains:
    domain: [architecture, operations, devops]
  example_good: "# ArgoCD ApplicationSet with PR generator\napiVersion: argoproj.io/v1alpha1\nkind: ApplicationSet\nmetadata:\n\
    \  name: preview-envs\nspec:\n  generators:\n    - pullRequest:\n        github:\n          owner: myorg\n          repo:\
    \ myapp\n          tokenRef:\n            secretName: github-token\n            key: token\n        requeueAfterSeconds:\
    \ 60\n  template:\n    metadata:\n      name: \"preview-{{number}}\"\n    spec:\n      source:\n        repoURL: https://github.com/myorg/myapp.git\n\
    \        targetRevision: \"{{branch}}\"\n        path: deploy/preview\n        helm:\n          parameters:\n        \
    \    - name: image.tag\n              value: \"pr-{{number}}\"\n            - name: ingress.host\n              value:\
    \ \"pr-{{number}}.preview.example.com\"\n      destination:\n        server: https://kubernetes.default.svc\n        namespace:\
    \ \"preview-{{number}}\"\n      syncPolicy:\n        automated:\n          prune: true\n          selfHeal: true\n"
  example_bad: '# Shared staging environment

    # Developer A deploys feature-X to staging

    # Developer B deploys feature-Y to staging (overwrites A''s changes)

    # Developer A: "my tests pass locally but fail on staging"

    # QA: "which version is on staging right now?" -> nobody knows

    '
  when_applies: Projects using Kubernetes-orchestrated deployments, ArgoCD, or vcluster
  when_not_applies: small scripts under 100 lines, single-purpose utilities
  sources: ["https://argo-cd.readthedocs.io/en/stable/operator-manual/applicationset/Generators-Pull-Request/"]
- id: CR-K8S-ADV-012
  text: Implement multi-tenancy with namespace isolation, RBAC, ResourceQuotas, NetworkPolicies, and pod security — or use
    virtual clusters.
  why: 'Running multiple teams or customers on a single cluster without isolation is equivalent to giving everyone root on
    a shared server. Without isolation: team A''s runaway pod starves team B (no quotas), team A''s pod accesses team B''s
    data (no network policies), team A''s developer reads team B''s secrets (no RBAC). Hard multi-tenancy requires virtual
    clusters (vcluster, Kamaji) for truly isolated control planes.'
  how_to_do_right: 'Soft multi-tenancy (same org teams): Namespace per tenant + RBAC + ResourceQuota + LimitRange + NetworkPolicy
    (default deny) + PSA Restricted + Kyverno/OPA policies. Hard multi-tenancy (different orgs/customers): Virtual clusters
    with vcluster (each tenant gets their own API server, scheduler, and controller-manager). Apply hierarchical namespaces
    (HNC) for tenant sub-namespaces.'
  severity: high
  technologies:
    library: [vcluster]
    platform: [kubernetes]
  domains:
    domain: [architecture, security]
  example_good: "# Soft multi-tenancy: namespace per tenant\napiVersion: v1\nkind: Namespace\nmetadata:\n  name: tenant-acme\n\
    \  labels:\n    tenant: acme\n    pod-security.kubernetes.io/enforce: restricted\n---\napiVersion: v1\nkind: ResourceQuota\n\
    metadata:\n  name: tenant-quota\n  namespace: tenant-acme\nspec:\n  hard:\n    requests.cpu: \"10\"\n    requests.memory:\
    \ \"20Gi\"\n    pods: \"50\"\n---\napiVersion: networking.k8s.io/v1\nkind: NetworkPolicy\nmetadata:\n  name: deny-cross-tenant\n\
    \  namespace: tenant-acme\nspec:\n  podSelector: {}\n  policyTypes: [Ingress, Egress]\n  ingress:\n    - from:\n     \
    \   - podSelector: {}    # Only within same namespace\n  egress:\n    - to:\n        - podSelector: {}\n    - to:    \
    \                 # Allow DNS\n        - namespaceSelector:\n            matchLabels:\n              kubernetes.io/metadata.name:\
    \ kube-system\n      ports:\n        - port: 53\n          protocol: UDP\n"
  example_bad: '# No tenant isolation

    # All teams share "default" namespace

    # No RBAC — everyone can see everyone''s secrets

    # No quotas — one team''s load test starves production

    # No network policies — any pod talks to any pod

    '
  when_applies: Projects using Kubernetes-orchestrated deployments or vcluster
  when_not_applies: small scripts under 100 lines, single-purpose utilities. projects not using Kubernetes or vcluster
  sources: ["https://kubernetes.io/docs/concepts/security/multi-tenancy/"]
- id: CR-K8S-ADV-013
  text: Tag all Kubernetes resources with cost allocation labels and implement showback/chargeback per team.
  why: 'Without cost allocation, Kubernetes is a shared credit card with no itemized bill. When costs spike 40%, nobody knows
    which team or service caused it. Teams over-provision because there''s no accountability — ''it''s the platform team''s
    budget, not ours.'' Cost allocation labels enable: per-team billing (chargeback), cost visibility (showback), budget enforcement
    (alerts when team exceeds budget), and data-driven optimization (teams see their waste percentage).'
  how_to_do_right: 'Require labels on all workloads: team, project, environment, cost-center (enforce with Kyverno). Deploy
    OpenCost for cost allocation by label. Create Grafana dashboards showing: cost per team, cost per service, cost efficiency
    (used/requested). Set up budget alerts per namespace. Implement quarterly cost reviews with teams. Target: every dollar
    of K8s spend attributed to a team.'
  severity: medium
  technologies:
    library: [opencost]
    platform: [kubernetes, kyverno]
  domains:
    domain: [architecture]
  example_good: "# Kyverno: Require cost labels\napiVersion: kyverno.io/v1\nkind: ClusterPolicy\nmetadata:\n  name: require-cost-labels\n\
    spec:\n  validationFailureAction: Enforce\n  rules:\n    - name: check-labels\n      match:\n        any:\n          -\
    \ resources:\n              kinds: [\"Deployment\", \"StatefulSet\", \"DaemonSet\", \"Job\"]\n      validate:\n      \
    \  message: \"Resources must have team, project, and cost-center labels\"\n        pattern:\n          metadata:\n   \
    \         labels:\n              team: \"?*\"\n              project: \"?*\"\n              cost-center: \"?*\"\n---\n\
    # Cost allocation dashboard query (OpenCost)\n# sum(opencost_monthly_cost) by (label_team)\n# → Team Alpha: $5,200/month\n\
    # → Team Beta: $3,100/month\n# → Unallocated: $800/month (< 10% — good)\napiVersion: v1\nkind: ConfigMap\nmetadata:\n\
    \  name: cost-allocation-policy\n"
  example_bad: '# No cost labels — $50,000/month K8s bill

    # "Which team is spending the most?" → unknown

    # "Can we optimize?" → no data to identify waste

    # "Why did costs increase 40%?" → weeks of investigation

    '
  when_applies: Projects using Kubernetes-orchestrated deployments, OpenCost, or Kyverno
  when_not_applies: small scripts under 100 lines, single-purpose utilities
  sources: ["https://www.opencost.io/docs/"]
- id: CR-K8S-ADV-014
  text: When using Flux, use Kustomization and HelmRelease CRDs with health checks and dependency ordering.
  why: 'Flux''s Kustomization (not to be confused with kustomize) and HelmRelease CRDs provide declarative cluster state management
    with: automatic reconciliation (drift detection and correction), health checks (block promotion if unhealthy), dependency
    ordering (CRDs before operators, operators before workloads), and multi-tenancy support. Without health checks, Flux promotes
    broken deployments. Without dependencies, resources are applied in random order, causing failures.'
  how_to_do_right: Use Kustomization for plain manifests and HelmRelease for Helm charts. Define dependsOn for ordering. Enable
    health checks with timeout. Use sourceRef to point to GitRepository or HelmRepository. Set reconciliation interval (1m
    for production, 5m for staging). Use post-build variable substitution for environment-specific values. Use Flux notifications
    (Provider + Alert CRDs) for deployment alerts.
  severity: medium
  technologies:
    library: [flux]
    platform: [kubernetes]
  domains:
    domain: [architecture, operations, devops]
  example_good: "# Flux: Kustomization with dependencies and health\napiVersion: kustomize.toolkit.fluxcd.io/v1\nkind: Kustomization\n\
    metadata:\n  name: infrastructure\n  namespace: flux-system\nspec:\n  interval: 10m\n  sourceRef:\n    kind: GitRepository\n\
    \    name: infra-repo\n  path: ./infrastructure\n  prune: true\n  healthChecks:\n    - apiVersion: apps/v1\n      kind:\
    \ Deployment\n      name: cert-manager\n      namespace: cert-manager\n    - apiVersion: apps/v1\n      kind: Deployment\n\
    \      name: ingress-nginx-controller\n      namespace: ingress-nginx\n  timeout: 5m\n---\napiVersion: kustomize.toolkit.fluxcd.io/v1\n\
    kind: Kustomization\nmetadata:\n  name: applications\n  namespace: flux-system\nspec:\n  dependsOn:\n    - name: infrastructure\
    \     # Wait for infra to be healthy\n  interval: 5m\n  sourceRef:\n    kind: GitRepository\n    name: apps-repo\n  path:\
    \ ./production\n  prune: true\n"
  example_bad: '# Flux without dependencies or health checks

    # Kustomization applies everything at once

    # Workloads deploy before cert-manager → TLS errors

    # Broken deployment not detected → serves errors for hours

    '
  when_applies: Projects using Kubernetes-orchestrated deployments or Flux
  when_not_applies: small scripts under 100 lines, single-purpose utilities. projects not using Kubernetes or Flux
  sources: ["https://fluxcd.io/flux/components/kustomize/kustomizations/"]
- id: CR-K8S-ADV-015
  text: Configure PodDisruptionBudgets strategically — use maxUnavailable for stateless and minAvailable for stateful workloads.
  why: PDBs protect availability during voluntary disruptions (node drain, cluster upgrade, autoscaler scale-down). maxUnavailable
    says 'at most N pods can be down' — simpler to reason about and doesn't block drains when you have more replicas than
    expected. minAvailable says 'at least N pods must be running' — better for quorum-based systems (etcd, ZooKeeper) where
    a specific minimum is required. Wrong PDB strategy either blocks all drains or provides no protection.
  how_to_do_right: 'For stateless services (APIs, workers): maxUnavailable=1 (always keep all-but-one running). For stateful
    quorum systems (etcd 3-node): minAvailable=2 (maintain quorum). Never set minAvailable equal to replicas (blocks all drains).
    Never set maxUnavailable equal to replicas (no protection). Test PDB with ''kubectl drain --dry-run=client''. Monitor
    PDB violations in cluster events.'
  severity: high
  technologies:
    platform: [kubernetes]
  domains:
    domain: [architecture, reliability]
  example_good: "# Stateless API: maxUnavailable (flexible)\napiVersion: policy/v1\nkind: PodDisruptionBudget\nmetadata:\n\
    \  name: api-pdb\nspec:\n  maxUnavailable: 1\n  selector:\n    matchLabels:\n      app: api\n---\n# Stateful quorum: minAvailable\
    \ (strict minimum)\napiVersion: policy/v1\nkind: PodDisruptionBudget\nmetadata:\n  name: etcd-pdb\nspec:\n  minAvailable:\
    \ 2     # Maintain quorum (2 of 3)\n  selector:\n    matchLabels:\n      app: etcd\n"
  example_bad: "# PDB blocks all drains\napiVersion: policy/v1\nkind: PodDisruptionBudget\nspec:\n  minAvailable: 3     #\
    \ Equal to replicas!\n  selector:\n    matchLabels:\n      app: api\n# kubectl drain: \"Cannot evict pod — would violate\
    \ PDB\"\n# Cluster upgrade blocked indefinitely\n"
  when_applies: Projects using Kubernetes-orchestrated deployments
  when_not_applies: small scripts under 100 lines, single-purpose utilities. projects not using Kubernetes
  sources: ["https://kubernetes.io/docs/tasks/run-application/configure-pdb/"]
- id: CR-K8S-ADV-016
  text: Master kubectl resource inspection commands for rapid troubleshooting — common failure modes have specific diagnostic
    patterns.
  why: 'Most Kubernetes issues fall into predictable categories with specific diagnostic patterns: ImagePullBackOff (wrong
    image/registry), CrashLoopBackOff (app crashing at startup), Pending (insufficient resources or wrong node selector),
    Evicted (resource pressure), OOMKilled (memory limit too low). Knowing the diagnostic commands for each pattern reduces
    MTTR from 30 minutes to 5 minutes.'
  how_to_do_right: 'For Pending pods: ''kubectl describe pod'' -> Events section shows why (insufficient CPU/memory, node
    selector mismatch, PVC not bound). For CrashLoopBackOff: ''kubectl logs --previous'' shows why the container crashed.
    For ImagePullBackOff: ''kubectl describe pod'' -> image name and pull error. For OOMKilled: ''kubectl describe pod'' ->
    lastState.terminated.reason=OOMKilled. For networking: ''kubectl exec -it -- nslookup service-name''. Always check Events
    first.'
  severity: medium
  technologies:
    platform: [kubernetes]
  domains:
    domain: [architecture, operations, devops]
  example_good: "# Diagnostic flowchart:\n# 1. Pod not running?\n# kubectl get pods -n <ns> | grep -v Running\n# kubectl describe\
    \ pod <pod> -n <ns>   # Check Events section\n\n# 2. Pod crashing?\n# kubectl logs <pod> -n <ns> --previous    # Previous\
    \ crash logs\n# kubectl get pod <pod> -n <ns> -o jsonpath='{.status.containerStatuses[*].lastState}'\n\n# 3. Service not\
    \ reachable?\n# kubectl get endpoints <svc> -n <ns>       # Are there endpoints?\n# kubectl exec -it <pod> -- nslookup\
    \ <svc>  # DNS working?\n# kubectl exec -it <pod> -- wget -qO- <svc>:<port>/healthz\n\n# 4. Resource issues?\n# kubectl\
    \ top pods -n <ns> --sort-by=memory\n# kubectl top nodes\n# kubectl describe node <node> | grep -A5 \"Allocated resources\"\
    \n\n# 5. Network policy blocking?\n# kubectl get networkpolicy -n <ns>\n# kubectl describe networkpolicy <policy> -n <ns>\n\
    # kubectl exec -it <pod> -- nc -zv <target> <port>\napiVersion: v1\nkind: ConfigMap\nmetadata:\n  name: troubleshooting-guide\n"
  example_bad: '# Random troubleshooting — no systematic approach

    # "Pod is not running"

    # → kubectl delete pod (maybe it restarts?)

    # → still not running

    # → kubectl delete deployment && kubectl apply (nuke and pave)

    # → works temporarily, root cause unknown

    # → happens again tomorrow

    '
  when_applies: Projects using Kubernetes-orchestrated deployments
  when_not_applies: small scripts under 100 lines, single-purpose utilities. projects not using Kubernetes
  sources: ["https://kubernetes.io/docs/reference/kubectl/cheatsheet/"]
