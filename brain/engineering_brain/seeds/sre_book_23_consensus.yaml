- id: CR-SRE-CONS-003
  text: Leader election must handle the "split-brain" problem — where two nodes both believe they are the leader. This is not a theoretical concern; it happens in production when networks partition. Without
    fencing tokens or lease-based leadership, split-brain causes data corruption.
  why: 'Google''s treatment of leader election emphasizes that split-brain is not a rare edge case — it is a routine production event. Networks partition, GC pauses cause heartbeat timeouts, and clock skew
    causes lease disagreements. The classic failure: Node A is the leader. A network partition isolates Node A from Nodes B and C. B and C elect a new leader (B). Now both A and B believe they are the leader.
    Both accept writes. When the partition heals, the system has two conflicting histories that cannot be automatically reconciled — data is corrupt. Google''s defense: fencing tokens (monotonically increasing
    generation numbers attached to every write) and lease-based leadership (the leader must renew its lease periodically; if it can''t reach quorum, it steps down). A write with an old fencing token is
    rejected because the system knows a newer leader exists.

    '
  how_to_do_right: '1. Use fencing tokens: every leader election increments a generation number. All writes include this number. Storage rejects writes with stale generation numbers.

    2. Use lease-based leadership: the leader holds a lease that expires after N seconds. If the leader cannot renew the lease (lost quorum), it MUST stop accepting writes.

    3. When the old leader''s lease expires, it MUST assume it is no longer the leader — even if it hasn''t received a "you''re fired" message. Network partitions prevent such messages.

    4. Storage systems must validate fencing tokens: if a write arrives with generation 5 but the storage has already seen generation 6, reject the write.

    5. Test split-brain scenarios: partition the leader from quorum and verify that a new leader is elected AND the old leader stops accepting writes.

    6. Monitor leader election events. More than 1 election per hour suggests instability (network issues, GC pauses, or misconfigured timeouts).

    '
  example_good: "# Fencing tokens + lease-based leadership to prevent split-brain\nclass LeaseBasedLeader:\n    def __init__(self, etcd_client, ttl_sec: int = 10):\n        self.etcd = etcd_client\n        self.ttl = ttl_sec\n        self.lease = None\n        self.generation = 0\n\n    def campaign(self, candidate_id: str):\n        self.lease = self.etcd.lease(self.ttl)\n        # Lease auto-expires if we can't renew (lost quorum)\n        self.etcd.put(\"/leader\", candidate_id, lease=self.lease)\n        self.generation = self.etcd.get(\"/generation\") + 1\n        self.etcd.put(\"/generation\", str(self.generation))\n\n    def write_with_fencing(self, key: str, value: str):\n        \"\"\"Include generation number — storage rejects stale writes.\"\"\"\n        current_gen = int(self.etcd.get(\"/generation\"))\n        if self.generation < current_gen:\n            raise StaleLeaderError(\n                f\"My generation {self.generation} < current {current_gen} — stepping down\"\n            )\n        self.storage.write(key, value, fencing_token=self.generation)\n\n    def must_step_down(self) -> bool:\n        \"\"\"If lease expired, assume we are no longer leader.\"\"\"\n        return self.lease is None or self.lease.remaining_ttl <= 0\n"
  example_bad: "# Leader election without fencing — split-brain guaranteed\nclass NaiveLeader:\n    def __init__(self):\n        self.is_leader = False\n\n    def campaign(self):\n        # No lease, no fencing token\n        self.is_leader = True\n\n    def write(self, key, value):\n        if self.is_leader:\n            db.write(key, value)\n        # Network partition: both Node A and Node B think they're leader\n        # Both accept writes → two conflicting histories\n        # When partition heals → data corruption\n        # No fencing token → storage can't reject stale writes\n        # No lease → old leader never steps down\n"
  when_applies: When implementing leader election in distributed systems where network partitions can cause split-brain scenarios with two nodes both believing they are the leader.
