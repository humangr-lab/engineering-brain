layer: rules
technology: SRE
domain: distributed_systems
knowledge:
- id: CR-SRE-CONS-001
  text: Use existing consensus implementations (Raft, Paxos, ZAB) — never build your own. Distributed consensus is one of the hardest problems in computer science, and subtle bugs in consensus implementations
    have caused data loss at every major cloud provider.
  why: 'Google''s Chapter 23 on Distributed Consensus warns explicitly against building custom consensus algorithms. Google itself uses Paxos (via Chubby and Spanner) and invested thousands of engineer-years
    making it correct and performant. Even with that investment, they found subtle bugs years after deployment. The problem is that distributed consensus has failure modes that are nearly impossible to
    discover through testing: network partitions that create split-brain, message reordering that violates linearizability, and timing-dependent bugs that only manifest under specific load patterns. Google
    recommends using well-tested implementations (etcd/Raft, ZooKeeper/ZAB, Consul) because these have been battle-tested by millions of deployments. Building your own is not engineering — it is hubris.

    '
  how_to_do_right: '1. Use etcd (Raft), ZooKeeper (ZAB), or Consul for distributed consensus. Do not implement your own.

    2. If you need consensus, clearly identify WHAT needs consensus: leader election, distributed locking, configuration distribution, or replicated state machine.

    3. Understand the CAP tradeoffs of your consensus system: during a network partition, does it prioritize consistency (rejects writes) or availability (risks stale reads)?

    4. Monitor consensus health: leader election frequency, replication lag, quorum status. A consensus system losing quorum is a critical emergency.

    5. Test network partition scenarios: what happens when the leader is isolated? When a minority is isolated? When the network heals?

    6. Set appropriate election timeouts: too short causes unnecessary leader elections (instability), too long causes extended unavailability during real leader failures.

    '
  example_good: "# Use existing consensus implementation (etcd/Raft) — never roll your own\nimport etcd3\n\nclass DistributedLock:\n    \"\"\"Leader election using etcd — battle-tested Raft implementation.\"\"\"\n    def __init__(self, etcd_host: str = \"localhost\", etcd_port: int = 2379):\n        self.client = etcd3.client(host=etcd_host, port=etcd_port)\n\n    def elect_leader(self, election_name: str, candidate_id: str):\n        election = self.client.election(election_name)\n        election.campaign(candidate_id.encode())\n        log.info(f\"{candidate_id} elected as leader for {election_name}\")\n        return election\n\n    def acquire_lock(self, lock_name: str, ttl: int = 30) -> etcd3.Lock:\n        \"\"\"Distributed lock with TTL (lease-based, auto-expires).\"\"\"\n        lock = self.client.lock(lock_name, ttl=ttl)\n        lock.acquire()\n        return lock\n"
  example_bad: "# Custom consensus implementation — subtle bugs guaranteed\nclass MyConsensus:\n    def elect_leader(self, nodes):\n        # \"Simple\" leader election — what could go wrong?\n        for node in nodes:\n            if node.is_alive():\n                node.is_leader = True\n                return node\n        # BUG: network partition → two nodes both think they're alive\n        # BUG: no fencing tokens → split-brain data corruption\n        # BUG: no lease expiry → dead leader blocks forever\n        # BUG: message reordering → violates linearizability\n        # These bugs appear after months in production\n"
  when_applies: When a system requires distributed consensus for leader election, distributed locking, or configuration distribution and the team is considering building a custom solution.
  severity: critical
  technologies:
    platform: [kubernetes, networking]
  domains:
    domain: [architecture, reliability]
    concern: [distributed_systems, consensus]
  sources:
  - url: https://sre.google/sre-book/managing-critical-state/
    title: 'Google SRE Book — Chapter 23: Managing Critical State: Distributed Consensus for Reliability'
  validation_status: cross_checked
- id: CR-SRE-CONS-002
  text: Distributed consensus is expensive — use it only for critical state that MUST be consistent. Configuration, leader election, and distributed locks need consensus. User session data, caches, and
    metrics do not. Every problem you solve with consensus costs latency and availability.
  why: 'Google uses consensus selectively because it imposes real costs. Every consensus operation requires a majority of replicas to agree, which means: write latency = round-trip to the slowest majority
    member (P50 latency of 3 replicas is dominated by the slowest), availability requires majority quorum (with 3 replicas, losing 2 means unavailability), and throughput is limited by the leader''s ability
    to replicate. For data that requires strong consistency (who is the leader? what is the current configuration? is this lock held?), these costs are necessary. For data where eventual consistency is
    acceptable (user preferences, analytics, caches), using consensus is over-engineering that costs latency and reduces availability. Google''s rule: consensus for coordination, eventual consistency for
    data that tolerates staleness.

    '
  how_to_do_right: '1. Categorize your data: "Must be strongly consistent" (leader election, locks, config) vs "Can be eventually consistent" (user data, caches, metrics).

    2. Use consensus ONLY for the first category. Use simpler replication (async replicas, CRDT, last-writer-wins) for the second.

    3. Keep consensus state small. If your consensus system stores more than a few GB, you are likely using it for data that should be in a database.

    4. Minimize the number of consensus operations per request. Ideally zero (use cached state), occasionally one (leader check), never multiple.

    5. Use leases (time-bounded locks) instead of permanent locks. Permanent locks + dead client = permanent deadlock.

    6. Monitor consensus operation latency separately from application latency. A spike in consensus latency affects everything.

    '
  example_good: "# Use consensus only for coordination — not for bulk data\nimport etcd3\n\nclass ServiceCoordinator:\n    \"\"\"Consensus for coordination only. Data goes in the database.\"\"\"\n    def __init__(self):\n        self.etcd = etcd3.client()  # Small state: config, locks, leader\n        self.db = PostgresDB()       # Large state: user data, analytics\n\n    def get_leader(self) -> str:\n        \"\"\"Consensus: who is the leader? (1 key, ~100 bytes)\"\"\"\n        return self.etcd.get(\"/leader\").decode()\n\n    def get_config(self, key: str) -> dict:\n        \"\"\"Consensus: current config (small, must be consistent).\"\"\"\n        return json.loads(self.etcd.get(f\"/config/{key}\"))\n\n    def get_user_data(self, user_id: str) -> dict:\n        \"\"\"Database: user data (large, eventual consistency OK).\"\"\"\n        return self.db.query(\"SELECT * FROM users WHERE id = %s\", user_id)\n        # NOT in etcd — would waste consensus throughput on bulk data\n"
  example_bad: "# Store everything in consensus system — expensive and slow\nimport etcd3\n\ndef save_user_session(user_id, session_data):\n    etcd = etcd3.client()\n    # Storing user sessions in etcd — each write requires quorum\n    etcd.put(f\"/sessions/{user_id}\", json.dumps(session_data))\n    # 10,000 users × 1 session update/sec = 10,000 consensus ops/sec\n    # etcd throughput limit: ~10,000 writes/sec\n    # Session data doesn't need strong consistency — Redis would work\n    # Leader is overwhelmed replicating session data instead of config\n"
  when_applies: When deciding which data requires distributed consensus versus simpler replication, to avoid overloading consensus systems with data that tolerates eventual consistency.
  severity: high
