layer: rules
domain: fintech
knowledge:
- id: "FIN-OPT-001"
  text: "Black-Scholes European call price: C = S*N(d1) - K*exp(-rT)*N(d2), where d1 = (ln(S/K) + (r + sigma^2/2)*T) / (sigma*sqrt(T)), d2 = d1 - sigma*sqrt(T). All five inputs (S, K, T, r, sigma) must be positive. Use scipy.stats.norm.cdf for N(). Handle edge cases: T=0 returns max(S-K, 0), sigma=0 returns max(S - K*exp(-rT), 0)."
  why: >
    The Black-Scholes formula is the foundation of modern option pricing and the basis for
    computing all Greeks. It assumes log-normal price dynamics, constant volatility, no
    dividends, continuous trading, and no transaction costs. Despite its limitations, it
    remains the industry standard for European options because: (1) it provides a closed-form
    solution enabling real-time pricing, (2) all Greeks are analytically available, (3) it
    defines the language of options markets (implied volatility IS the BS-inverted price).
    Getting the formula wrong — especially the sign of d1/d2 or missing the exp(-rT) discount
    — leads to arbitrage violations and incorrect hedges. The formula prices ~$1 trillion
    notional daily across global exchanges.
  how_to_do_right: |
    1. Validate inputs: S > 0, K > 0, T >= 0, sigma >= 0
    2. Handle T = 0: return max(S - K, 0) immediately (intrinsic value)
    3. Handle sigma = 0: return max(S - K * exp(-r * T), 0) (deterministic)
    4. Compute d1 = (ln(S/K) + (r + sigma^2/2) * T) / (sigma * sqrt(T))
    5. Compute d2 = d1 - sigma * sqrt(T)
    6. C = S * N(d1) - K * exp(-r * T) * N(d2)
    7. Use scipy.stats.norm.cdf for N() — do NOT hand-code the CDF
    8. Verify: C >= max(S - K * exp(-r * T), 0) (lower bound, no-arbitrage)
    9. Verify: C <= S (upper bound — call cannot be worth more than the stock)
    10. Use float64 throughout; float32 loses precision for deep OTM options
  severity: critical
  technologies:
    lang: [python, numpy, scipy]
    framework: [scipy]
  domains:
    domain: [fintech, prediction_markets, derivatives]
    concern: [domain_specific, numerical_accuracy]
  example_good: |
    import numpy as np
    from scipy.stats import norm

    def bs_call(S: float, K: float, T: float, r: float,
                sigma: float) -> float:
        """Black-Scholes European call price.

        Args:
            S: Current stock price (spot).
            K: Strike price.
            T: Time to expiration in years.
            r: Risk-free rate (annualized, continuous compounding).
            sigma: Volatility (annualized).

        Returns:
            Call option price.

        Raises:
            ValueError: If inputs are invalid.
        """
        if S <= 0 or K <= 0:
            raise ValueError(f"S and K must be positive: S={S}, K={K}")
        if T < 0 or sigma < 0:
            raise ValueError(f"T and sigma must be non-negative: T={T}, sigma={sigma}")

        # Edge case: at expiry
        if T == 0:
            return max(S - K, 0.0)
        # Edge case: zero volatility (deterministic)
        if sigma == 0:
            return max(S - K * np.exp(-r * T), 0.0)

        d1 = (np.log(S / K) + (r + 0.5 * sigma**2) * T) / (sigma * np.sqrt(T))
        d2 = d1 - sigma * np.sqrt(T)

        call = S * norm.cdf(d1) - K * np.exp(-r * T) * norm.cdf(d2)
        return call

    # Example: S=100, K=105, T=0.25 (3 months), r=5%, sigma=20%
    price = bs_call(100, 105, 0.25, 0.05, 0.20)
    print(f"Call price: ${price:.4f}")  # ~$2.46

    # Verify bounds
    lower = max(100 - 105 * np.exp(-0.05 * 0.25), 0)
    assert price >= lower, "Violates lower bound"
    assert price <= 100, "Violates upper bound"

    # At-the-money forward: S=100, K=F=100*exp(0.05*0.25)=101.26
    K_atm = 100 * np.exp(0.05 * 0.25)
    atm_call = bs_call(100, K_atm, 0.25, 0.05, 0.20)
    print(f"ATM forward call: ${atm_call:.4f}")  # ~$3.99
  example_bad: |
    import numpy as np
    from scipy.stats import norm

    # WRONG 1: Swapped d1 and d2 — prices calls incorrectly
    d1 = (np.log(100/105) + (0.05 - 0.5*0.2**2)*0.25) / (0.2*np.sqrt(0.25))
    # Notice: (r - sigma^2/2) instead of (r + sigma^2/2) — this is d2's numerator!
    d2 = d1 + 0.2 * np.sqrt(0.25)  # Wrong sign: should be d1 - sigma*sqrt(T)

    # WRONG 2: Missing discount factor on strike
    call = 100 * norm.cdf(d1) - 105 * norm.cdf(d2)  # Missing exp(-rT)!
    # Overprices the call by K * (1 - exp(-rT)) ≈ $1.31 for these parameters

    # WRONG 3: Not handling T=0
    def bad_bs_call(S, K, T, r, sigma):
        d1 = (np.log(S/K) + (r + 0.5*sigma**2)*T) / (sigma*np.sqrt(T))
        # When T=0: division by zero! np.sqrt(0) = 0, 0/0 = nan
        d2 = d1 - sigma * np.sqrt(T)
        return S * norm.cdf(d1) - K * np.exp(-r*T) * norm.cdf(d2)

    # WRONG 4: Using float32 for deep OTM
    S32 = np.float32(100)
    K32 = np.float32(200)  # Deep OTM
    # norm.cdf returns ~0.0 in float32, losing all precision
  when_applies: "Pricing European call options, computing implied volatility, calibrating option models, any system that trades or values call options."
  sources:
    - "https://en.wikipedia.org/wiki/Black%E2%80%93Scholes_model"
    - "https://docs.scipy.org/doc/scipy/reference/generated/scipy.stats.norm.html"

- id: "FIN-OPT-002"
  text: "Black-Scholes European put price via put-call parity: P = C - S + K*exp(-rT), or directly: P = K*exp(-rT)*N(-d2) - S*N(-d1). Always implement puts via put-call parity rather than a separate formula — this ensures put and call prices are arbitrage-consistent by construction."
  why: >
    Put-call parity C - P = S - K*exp(-rT) is a model-free no-arbitrage relationship that
    holds for ANY European option pricing model, not just Black-Scholes. Implementing the put
    formula independently from the call formula risks numerical inconsistency: the put and call
    might not satisfy parity due to floating-point differences, creating apparent arbitrage
    opportunities that confuse downstream systems. By computing puts as P = C - S + K*exp(-rT),
    parity is satisfied by construction. The direct formula P = K*exp(-rT)*N(-d2) - S*N(-d1)
    is mathematically equivalent but can differ by ~1e-15 due to floating point, which matters
    when checking arbitrage bounds.
  how_to_do_right: |
    1. Implement bs_call() first with full edge-case handling
    2. Implement bs_put() as: P = bs_call(S, K, T, r, sigma) - S + K * exp(-r * T)
    3. This guarantees put-call parity: C - P = S - K * exp(-rT) exactly
    4. Verify: P >= max(K * exp(-rT) - S, 0) (lower bound for European put)
    5. Verify: P <= K * exp(-rT) (upper bound — put cannot exceed discounted strike)
    6. Handle T = 0: return max(K - S, 0) (intrinsic value)
    7. Handle sigma = 0: return max(K * exp(-rT) - S, 0)
    8. For ATM forward (S = K * exp(-rT)): put ≈ call (symmetric around forward)
  severity: critical
  technologies:
    lang: [python, numpy, scipy]
    framework: [scipy]
  domains:
    domain: [fintech, prediction_markets, derivatives]
    concern: [domain_specific, numerical_accuracy]
  example_good: |
    import numpy as np
    from scipy.stats import norm

    def bs_call(S, K, T, r, sigma):
        """Black-Scholes European call (see FIN-OPT-001 for full version)."""
        if T == 0:
            return max(S - K, 0.0)
        if sigma == 0:
            return max(S - K * np.exp(-r * T), 0.0)
        d1 = (np.log(S / K) + (r + 0.5 * sigma**2) * T) / (sigma * np.sqrt(T))
        d2 = d1 - sigma * np.sqrt(T)
        return S * norm.cdf(d1) - K * np.exp(-r * T) * norm.cdf(d2)

    def bs_put(S: float, K: float, T: float, r: float,
               sigma: float) -> float:
        """Black-Scholes European put via put-call parity.

        P = C - S + K * exp(-r * T)

        This ensures put-call parity is satisfied by construction.
        """
        if S <= 0 or K <= 0:
            raise ValueError(f"S and K must be positive: S={S}, K={K}")
        if T < 0 or sigma < 0:
            raise ValueError(f"T and sigma must be non-negative")

        if T == 0:
            return max(K - S, 0.0)

        call = bs_call(S, K, T, r, sigma)
        put = call - S + K * np.exp(-r * T)
        return put

    # Example: S=100, K=105, T=0.25, r=5%, sigma=20%
    call = bs_call(100, 105, 0.25, 0.05, 0.20)
    put = bs_put(100, 105, 0.25, 0.05, 0.20)
    parity_lhs = call - put
    parity_rhs = 100 - 105 * np.exp(-0.05 * 0.25)

    print(f"Call: ${call:.4f}")     # ~$2.46
    print(f"Put: ${put:.4f}")       # ~$6.15
    print(f"C - P: {parity_lhs:.10f}")  # -3.6870...
    print(f"S - Ke^-rT: {parity_rhs:.10f}")  # -3.6870... (EXACT MATCH)

    # Verify bounds
    lower = max(105 * np.exp(-0.05 * 0.25) - 100, 0)
    assert put >= lower, "Violates lower bound"
  example_bad: |
    import numpy as np
    from scipy.stats import norm

    # WRONG 1: Independent put formula — may violate parity due to float rounding
    def bs_put_independent(S, K, T, r, sigma):
        d1 = (np.log(S/K) + (r + 0.5*sigma**2)*T) / (sigma*np.sqrt(T))
        d2 = d1 - sigma*np.sqrt(T)
        return K * np.exp(-r*T) * norm.cdf(-d2) - S * norm.cdf(-d1)

    call = bs_call(100, 105, 0.25, 0.05, 0.20)
    put_ind = bs_put_independent(100, 105, 0.25, 0.05, 0.20)
    # call - put_ind might differ from S - K*exp(-rT) by ~1e-15
    # This breaks exact arbitrage checks

    # WRONG 2: Using call formula for put (forgetting sign changes)
    def bs_put_wrong(S, K, T, r, sigma):
        d1 = (np.log(S/K) + (r + 0.5*sigma**2)*T) / (sigma*np.sqrt(T))
        d2 = d1 - sigma*np.sqrt(T)
        # Using N(d2) instead of N(-d2) — completely wrong
        return K * np.exp(-r*T) * norm.cdf(d2) - S * norm.cdf(d1)

    # WRONG 3: Confusing American and European put bounds
    put = bs_put(100, 105, 0.25, 0.05, 0.20)
    assert put >= 105 - 100  # 5.0 — this is the AMERICAN bound, not European!
    # European lower bound is max(K*exp(-rT) - S, 0) = max(103.69 - 100, 0) = 3.69
  when_applies: "Pricing European put options, verifying put-call parity in market data, constructing synthetic positions, any system that values put options."
  sources:
    - "https://en.wikipedia.org/wiki/Black%E2%80%93Scholes_model"

- id: "FIN-OPT-003"
  text: "Put-call parity: C - P = S - K*exp(-rT) for European options. This is MODEL-FREE — it holds regardless of volatility model. Use it to: (1) detect mispricing/arbitrage, (2) compute puts from calls and vice versa, (3) construct synthetic positions (synthetic long = long call + short put + invest K*exp(-rT)). Violation > 0.5% of underlying is actionable arbitrage."
  why: >
    Put-call parity is derived purely from no-arbitrage arguments and does not depend on any
    pricing model. If the relationship is violated, a risk-free profit can be constructed. In
    practice, violations of 0.1-0.5% exist due to bid-ask spreads and transaction costs, but
    anything larger signals either mispricing or data errors. Market makers use put-call parity
    constantly: they price puts from calls (or vice versa) to ensure consistency. In prediction
    markets, the equivalent is p_yes + p_no = 1.00 — any deviation is arbitrage. Understanding
    synthetic positions is essential for options strategy: a synthetic long stock = long call +
    short put at the same strike, which means you can replicate stock exposure using options.
  how_to_do_right: |
    1. For European options: C - P = S - K * exp(-r * T)
    2. Tolerance for arbitrage: |violation| > 0.5% of S means data error or mispricing
    3. Synthetic long stock: Buy call + Sell put at same K, T → payoff = S - K at expiry
    4. Synthetic call: Buy stock + Buy put at K → payoff = max(S - K, 0) + K
    5. For dividends: C - P = S - PV(dividends) - K * exp(-r * T)
    6. For prediction markets: p_yes + p_no = 1.00 (equivalent to put-call parity)
    7. Always verify parity after computing both call and put prices
    8. When calibrating a model, enforce parity as a hard constraint
  severity: critical
  technologies:
    lang: [python, numpy]
    framework: []
  domains:
    domain: [fintech, prediction_markets, derivatives]
    concern: [domain_specific]
  example_good: |
    import numpy as np

    def check_put_call_parity(call: float, put: float,
                                S: float, K: float, T: float, r: float,
                                tolerance_pct: float = 0.005) -> dict:
        """Check put-call parity and detect arbitrage.

        Args:
            call: Market call price.
            put: Market put price.
            S: Spot price.
            K: Strike price.
            T: Time to expiry in years.
            r: Risk-free rate.
            tolerance_pct: Tolerance as fraction of S (default 0.5%).

        Returns:
            Dict with parity check results.
        """
        lhs = call - put           # C - P
        rhs = S - K * np.exp(-r * T)  # S - K * exp(-rT)
        violation = lhs - rhs
        tolerance = tolerance_pct * S

        is_violated = abs(violation) > tolerance

        # Arbitrage strategy if violated
        strategy = None
        if violation > tolerance:
            # C - P > S - K*exp(-rT): call is overpriced relative to put
            strategy = "Sell call, buy put, buy stock, borrow K*exp(-rT)"
        elif violation < -tolerance:
            # C - P < S - K*exp(-rT): put is overpriced relative to call
            strategy = "Buy call, sell put, sell stock, lend K*exp(-rT)"

        return {
            'lhs_C_minus_P': lhs,
            'rhs_S_minus_PV_K': rhs,
            'violation': violation,
            'violation_pct': violation / S * 100,
            'is_violated': is_violated,
            'arbitrage_strategy': strategy,
        }

    # Example: Checking real market data
    result = check_put_call_parity(
        call=2.50, put=6.20,  # Market mid-quotes
        S=100, K=105, T=0.25, r=0.05
    )
    print(f"C - P = {result['lhs_C_minus_P']:.2f}")
    print(f"S - Ke^-rT = {result['rhs_S_minus_PV_K']:.2f}")
    print(f"Violation: {result['violation_pct']:.3f}%")
    print(f"Arbitrage? {result['is_violated']}")

    # Synthetic long stock: Buy C, Sell P at K=105
    # Payoff at T: max(S_T - 105, 0) - max(105 - S_T, 0) = S_T - 105
    # Net cost: C - P + K*exp(-rT) = 2.50 - 6.20 + 103.69 = 99.99 ≈ S
  example_bad: |
    # WRONG 1: Using put-call parity for American options
    # American put-call parity is an INEQUALITY, not equality:
    # S - K <= C_am - P_am <= S - K * exp(-r * T)
    # Using the European equality for American options gives wrong results

    # WRONG 2: Ignoring dividends
    # If stock pays dividend D at time t < T:
    # C - P = S - D*exp(-r*t) - K*exp(-r*T)  (NOT S - K*exp(-rT))
    # Missing a $2 dividend on a $100 stock = 2% error

    # WRONG 3: Wrong tolerance for arbitrage detection
    call, put, S = 2.50, 6.20, 100
    rhs = 100 - 105 * np.exp(-0.05 * 0.25)
    violation = (call - put) - rhs  # ~$0.01
    if abs(violation) > 0.01:  # $0.01 tolerance — too tight!
        print("ARBITRAGE!")  # False positive — bid-ask spread is wider than this
  when_applies: "Arbitrage detection, synthetic position construction, model validation, any system that uses both calls and puts at the same strike."
  sources:
    - "https://en.wikipedia.org/wiki/Black%E2%80%93Scholes_model"
    - "https://www.investopedia.com/terms/g/greeks.asp"

- id: "FIN-OPT-004"
  text: "Delta = dC/dS = N(d1) for calls, N(d1) - 1 for puts. Delta ranges from 0 to 1 for calls, -1 to 0 for puts. It approximates the probability of finishing ITM AND is the hedge ratio: to delta-hedge a short call, buy Delta shares. ATM delta is approximately 0.5 (calls) or -0.5 (puts), not exactly 0.5 due to the forward-moneyness correction."
  why: >
    Delta is the most important Greek for risk management. As a hedge ratio, it tells you
    exactly how many shares to hold to neutralize the directional risk of an option position.
    A delta-neutral portfolio has zero first-order exposure to the underlying price. Market
    makers maintain delta-neutral books and earn the bid-ask spread. Delta also approximates
    the risk-neutral probability of the option finishing in-the-money, which makes it directly
    useful in prediction markets. The exact ATM delta is N(d1) where d1 = (r + sigma^2/2)*T /
    (sigma*sqrt(T)) ≈ 0.5 + 0.4*sigma*sqrt(T) for small vol — it's slightly above 0.5 for
    calls because the forward is above spot (assuming r > 0).
  how_to_do_right: |
    1. Call delta: delta_c = N(d1) where d1 from Black-Scholes
    2. Put delta: delta_p = N(d1) - 1 = -N(-d1)
    3. Delta-hedge: to hedge short 1 call, buy delta shares of underlying
    4. ATM forward delta ≈ 0.52 for calls (not exactly 0.5)
    5. Deep ITM call: delta → 1.0; Deep OTM call: delta → 0.0
    6. Deep ITM put: delta → -1.0; Deep OTM put: delta → 0.0
    7. Portfolio delta: sum of individual position deltas * quantities
    8. Rebalance delta-hedge at least daily (more frequently near expiry)
    9. Delta changes with spot (gamma), time (charm), and vol (vanna)
    10. Handle T=0: delta = 1 if S > K, 0 if S < K, undefined at S = K
  severity: critical
  technologies:
    lang: [python, numpy, scipy]
    framework: [scipy]
  domains:
    domain: [fintech, prediction_markets, derivatives]
    concern: [domain_specific]
  example_good: |
    import numpy as np
    from scipy.stats import norm

    def bs_delta(S: float, K: float, T: float, r: float,
                  sigma: float, option_type: str = 'call') -> float:
        """Black-Scholes delta.

        Args:
            S, K, T, r, sigma: Standard BS parameters.
            option_type: 'call' or 'put'.

        Returns:
            Delta value.
        """
        if T <= 0:
            if option_type == 'call':
                return 1.0 if S > K else 0.0
            else:
                return -1.0 if S < K else 0.0

        if sigma <= 0:
            # Deterministic: delta is 1 or 0
            forward = S * np.exp(r * T)
            if option_type == 'call':
                return 1.0 if forward > K else 0.0
            else:
                return -1.0 if forward < K else 0.0

        d1 = (np.log(S / K) + (r + 0.5 * sigma**2) * T) / (sigma * np.sqrt(T))

        if option_type == 'call':
            return norm.cdf(d1)
        elif option_type == 'put':
            return norm.cdf(d1) - 1.0
        else:
            raise ValueError(f"option_type must be 'call' or 'put', got '{option_type}'")

    def delta_hedge_position(option_delta: float, num_options: int,
                              position: str = 'short') -> float:
        """Compute shares needed for delta-neutral hedge.

        Args:
            option_delta: Delta per option contract.
            num_options: Number of option contracts (each = 100 shares).
            position: 'short' (sold options) or 'long' (bought options).

        Returns:
            Number of shares to hold (positive = buy, negative = sell).
        """
        sign = 1 if position == 'short' else -1
        return sign * option_delta * num_options * 100

    # Example: S=100, K=100, T=0.25, r=5%, sigma=20%
    delta_c = bs_delta(100, 100, 0.25, 0.05, 0.20, 'call')
    delta_p = bs_delta(100, 100, 0.25, 0.05, 0.20, 'put')

    print(f"Call delta: {delta_c:.4f}")  # ~0.5645 (not exactly 0.5!)
    print(f"Put delta: {delta_p:.4f}")   # ~-0.4355
    print(f"Call + |Put| delta: {delta_c + abs(delta_p):.4f}")  # ~1.0 (always)

    # Delta hedge: short 10 call contracts
    shares = delta_hedge_position(delta_c, 10, 'short')
    print(f"Buy {shares:.0f} shares to delta-hedge")  # ~565 shares
  example_bad: |
    from scipy.stats import norm
    import numpy as np

    # WRONG 1: Assuming ATM delta is exactly 0.5
    def simple_delta(S, K):
        if S > K:
            return 0.8  # "Deep ITM"
        elif S < K:
            return 0.2  # "OTM"
        else:
            return 0.5  # "ATM" — actual is ~0.56 for typical params

    # WRONG 2: Put delta as positive number
    d1 = 0.3
    put_delta = norm.cdf(d1)  # 0.618 — this is the CALL delta!
    # Correct: put_delta = norm.cdf(d1) - 1 = -0.382

    # WRONG 3: Not handling T=0 (expired options)
    def bad_delta(S, K, T, r, sigma):
        d1 = (np.log(S/K) + (r + 0.5*sigma**2)*T) / (sigma*np.sqrt(T))
        return norm.cdf(d1)  # Division by zero when T=0!

    # WRONG 4: Delta-hedging with wrong sign
    delta = 0.55
    shares_to_buy = -delta * 1000  # Negative! You need +550 shares, not -550
  when_applies: "Delta-hedging option positions, computing portfolio directional exposure, estimating ITM probability, prediction market probability estimation."
  sources:
    - "https://en.wikipedia.org/wiki/Black%E2%80%93Scholes_model"
    - "https://www.investopedia.com/terms/g/greeks.asp"

- id: "FIN-OPT-005"
  text: "Gamma = d^2C/dS^2 = N'(d1) / (S * sigma * sqrt(T)). Gamma is always positive for long options (calls and puts have the same gamma). Gamma peaks at ATM and increases as T → 0, creating 'gamma risk' — near-expiry ATM options have enormous gamma, meaning delta changes rapidly and hedging becomes expensive (frequent rebalancing). Gamma is the key risk for short option sellers."
  why: >
    Gamma measures how fast delta changes as the underlying moves. High gamma means you need
    to rebalance your delta-hedge frequently, incurring transaction costs. For a market maker
    short ATM options near expiry, gamma can be enormous: an ATM option with 1 day to expiry
    might have gamma of 0.10, meaning a $1 move changes delta by 0.10 — requiring buying or
    selling 10 shares per contract per dollar move. This is the gamma-theta tradeoff: long
    gamma positions benefit from large moves but pay theta (time decay). Short gamma positions
    collect theta but face unlimited loss on large moves. The 2018 'Volmageddon' event (XIV
    blowup) was fundamentally a short-gamma catastrophe.
  how_to_do_right: |
    1. Gamma = N'(d1) / (S * sigma * sqrt(T)) where N'(x) = norm.pdf(x)
    2. Same formula for calls and puts (gamma is always positive for long options)
    3. Gamma peaks at ATM (S ≈ K * exp(-rT))
    4. Gamma increases as T → 0 (approaches infinity at expiry for ATM)
    5. Handle T → 0: gamma → infinity for ATM — use a floor value or return special value
    6. Dollar gamma = gamma * S^2 / 100 (P&L sensitivity per 1% move)
    7. Gamma exposure = sum(gamma_i * quantity_i * S^2 * 0.01)
    8. Monitor gamma when short options near expiry — rebalance more frequently
    9. Gamma risk is highest in the last 5 days to expiry for ATM options
    10. Long straddle = long gamma; short straddle = short gamma
  severity: critical
  technologies:
    lang: [python, numpy, scipy]
    framework: [scipy]
  domains:
    domain: [fintech, derivatives, risk_management]
    concern: [domain_specific, numerical_accuracy]
  example_good: |
    import numpy as np
    from scipy.stats import norm

    def bs_gamma(S: float, K: float, T: float, r: float,
                  sigma: float) -> float:
        """Black-Scholes gamma (same for calls and puts).

        Args:
            S, K, T, r, sigma: Standard BS parameters.

        Returns:
            Gamma value. Returns 0 for T <= 0 or sigma <= 0.
        """
        if T <= 0 or sigma <= 0:
            # At expiry, gamma is a Dirac delta at S=K — not finite
            return 0.0

        d1 = (np.log(S / K) + (r + 0.5 * sigma**2) * T) / (sigma * np.sqrt(T))
        gamma = norm.pdf(d1) / (S * sigma * np.sqrt(T))
        return gamma

    def dollar_gamma(S: float, K: float, T: float, r: float,
                      sigma: float) -> float:
        """Dollar gamma: P&L impact per 1% move in underlying.

        Dollar gamma = gamma * S^2 * 0.01
        """
        g = bs_gamma(S, K, T, r, sigma)
        return g * S**2 * 0.01

    # Example: ATM option approaching expiry
    S, K, r, sigma = 100, 100, 0.05, 0.20

    # Gamma term structure
    for days in [30, 7, 1]:
        T = days / 252
        g = bs_gamma(S, K, T, r, sigma)
        dg = dollar_gamma(S, K, T, r, sigma)
        print(f"T={days:2d}d: gamma={g:.4f}, $gamma={dg:.2f}")

    # Output shows gamma explosion near expiry:
    # T=30d: gamma=0.0578, $gamma=5.78
    # T= 7d: gamma=0.1137, $gamma=11.37
    # T= 1d: gamma=0.2821, $gamma=28.21  ← 5x higher than 30-day!

    # Gamma P&L for a 2% move with 1 contract (100 shares):
    g_1d = bs_gamma(S, K, 1/252, r, sigma)
    pnl_2pct = 0.5 * g_1d * (S * 0.02)**2 * 100
    print(f"Gamma P&L for 2% move (1 contract, 1 DTE): ${pnl_2pct:.2f}")
  example_bad: |
    import numpy as np
    from scipy.stats import norm

    # WRONG 1: Using different gamma for call vs put
    def call_gamma(S, K, T, r, sigma):
        d1 = (np.log(S/K) + (r + 0.5*sigma**2)*T) / (sigma*np.sqrt(T))
        return norm.pdf(d1) / (S * sigma * np.sqrt(T))

    def put_gamma(S, K, T, r, sigma):
        d2 = d1 - sigma * np.sqrt(T)
        return norm.pdf(d2) / (S * sigma * np.sqrt(T))  # WRONG: uses d2 not d1

    # WRONG 2: Not handling T=0
    gamma = norm.pdf(d1) / (100 * 0.2 * np.sqrt(0))  # Division by zero!

    # WRONG 3: Ignoring gamma near expiry
    # "Gamma is small, I don't need to hedge"
    # ATM 1-day gamma ≈ 0.28 — a $3 move changes delta by 0.84!
    # Short 100 contracts: need to buy/sell 8,400 shares on a $3 move
  when_applies: "Managing short option positions, computing rebalancing frequency for delta hedges, pricing exotic options, understanding the gamma-theta tradeoff."
  sources:
    - "https://www.investopedia.com/terms/g/greeks.asp"
    - "https://en.wikipedia.org/wiki/Black%E2%80%93Scholes_model"

- id: "FIN-OPT-006"
  text: "Theta = dC/dT (time decay): Theta_call = -(S*N'(d1)*sigma)/(2*sqrt(T)) - r*K*exp(-rT)*N(d2). Theta is always negative for long options (options lose value over time). Theta accelerates near expiry for ATM options — most decay happens in the last 30 days. Express theta in dollars per day by dividing by 252 (trading days)."
  why: >
    Theta is the 'cost of holding' an option. Long option holders pay theta daily; short
    option sellers collect it. This is the gamma-theta tradeoff: you cannot have positive
    gamma (benefiting from moves) without paying negative theta (losing time value). For ATM
    options, roughly 1/3 of the time value decays in the last 7 days. The 'weekend effect'
    means theta runs over weekends even though the market is closed — in practice, Friday
    closing prices already discount weekend theta. Market makers explicitly compute daily theta
    to understand their carry cost. For prediction markets with binary outcomes, theta is
    analogous to the time value of the contract above/below its expected terminal value.
  how_to_do_right: |
    1. Theta_call = -(S * N'(d1) * sigma) / (2 * sqrt(T)) - r * K * exp(-rT) * N(d2)
    2. Theta_put = -(S * N'(d1) * sigma) / (2 * sqrt(T)) + r * K * exp(-rT) * N(-d2)
    3. Convert to daily theta: theta_daily = theta_annual / 252
    4. Or per calendar day: theta_daily = theta_annual / 365 (for weekend decay)
    5. Theta is most negative for ATM options
    6. Deep ITM put theta can be slightly positive (due to rK*exp(-rT) term)
    7. Handle T → 0: theta → -infinity for ATM — return a capped value
    8. Theta P&L: position_theta * days_passed * num_contracts * 100
    9. Verify: theta + 0.5*gamma*S^2*sigma^2 + r*S*delta - r*C ≈ 0 (BS PDE)
  severity: high
  technologies:
    lang: [python, numpy, scipy]
    framework: [scipy]
  domains:
    domain: [fintech, derivatives, risk_management]
    concern: [domain_specific]
  example_good: |
    import numpy as np
    from scipy.stats import norm

    def bs_theta(S: float, K: float, T: float, r: float,
                  sigma: float, option_type: str = 'call',
                  per_day: bool = True) -> float:
        """Black-Scholes theta (time decay).

        Args:
            S, K, T, r, sigma: Standard BS parameters.
            option_type: 'call' or 'put'.
            per_day: If True, return per-trading-day theta (divide by 252).

        Returns:
            Theta value (negative for long options).
        """
        if T <= 0 or sigma <= 0:
            return 0.0

        d1 = (np.log(S / K) + (r + 0.5 * sigma**2) * T) / (sigma * np.sqrt(T))
        d2 = d1 - sigma * np.sqrt(T)

        # Common term: -(S * N'(d1) * sigma) / (2 * sqrt(T))
        term1 = -(S * norm.pdf(d1) * sigma) / (2 * np.sqrt(T))

        if option_type == 'call':
            theta = term1 - r * K * np.exp(-r * T) * norm.cdf(d2)
        elif option_type == 'put':
            theta = term1 + r * K * np.exp(-r * T) * norm.cdf(-d2)
        else:
            raise ValueError(f"option_type must be 'call' or 'put'")

        if per_day:
            theta /= 252  # Per trading day

        return theta

    # Example: ATM call theta term structure
    S, K, r, sigma = 100, 100, 0.05, 0.20

    print("Theta decay acceleration near expiry:")
    for days in [90, 60, 30, 14, 7, 1]:
        T = days / 252
        theta = bs_theta(S, K, T, r, sigma, 'call', per_day=True)
        print(f"  {days:2d} DTE: theta = ${theta:.4f}/day")

    # Output:
    #  90 DTE: theta = $-0.0340/day
    #  60 DTE: theta = $-0.0415/day
    #  30 DTE: theta = $-0.0582/day
    #  14 DTE: theta = $-0.0840/day
    #   7 DTE: theta = $-0.1174/day
    #   1 DTE: theta = $-0.2991/day  ← 9x the 90-day theta!

    # Portfolio theta: short 20 ATM calls, 30 DTE
    T_30 = 30 / 252
    theta_daily = bs_theta(S, K, T_30, r, sigma, 'call', per_day=True)
    portfolio_theta = -20 * 100 * theta_daily  # Short = collect theta
    print(f"Daily theta income: ${portfolio_theta:.2f}")  # ~$116/day
  example_bad: |
    import numpy as np
    from scipy.stats import norm

    # WRONG 1: Forgetting the rK*exp(-rT) term
    def bad_theta(S, K, T, r, sigma):
        d1 = (np.log(S/K) + (r + 0.5*sigma**2)*T) / (sigma*np.sqrt(T))
        return -(S * norm.pdf(d1) * sigma) / (2 * np.sqrt(T))
        # Missing: - r * K * exp(-rT) * N(d2)
        # Underestimates theta by ~10-20% for ITM options

    # WRONG 2: Not converting to per-day
    theta_annual = -15.0  # Annual theta
    # "My option loses $15 per day!" — NO! It's $15/252 = $0.06/day

    # WRONG 3: Positive theta for long call
    theta = 0.05  # Long call theta is NEVER positive
    # If your long call has positive theta, there's a bug

    # WRONG 4: Ignoring theta over weekends
    friday_price = 3.50
    # Monday price = 3.50 - 3 * theta_daily (3 calendar days passed!)
    # Many backtests forget this and show inflated returns
  when_applies: "Computing daily carry cost of option positions, theta income strategies (covered calls, iron condors), predicting option price decay, portfolio management."
  sources:
    - "https://www.investopedia.com/terms/g/greeks.asp"
    - "https://en.wikipedia.org/wiki/Black%E2%80%93Scholes_model"

- id: "FIN-OPT-007"
  text: "Vega = dC/dsigma = S * sqrt(T) * N'(d1). Vega is always positive for long options (higher vol = higher option price). Vega peaks at ATM and is proportional to sqrt(T). A vega of 0.20 means a 1 percentage point increase in IV raises the option price by $0.20. Vega-neutral portfolios are constructed to eliminate volatility exposure."
  why: >
    Vega quantifies the sensitivity of an option price to changes in implied volatility. Since
    implied volatility is the most uncertain input to Black-Scholes, vega is often the largest
    risk in an options portfolio. A sudden volatility spike (like in March 2020: VIX went from
    15 to 82) can move option prices by multiples of their vega. Confusingly, 'vega' is not an
    actual Greek letter — it was invented by practitioners. The convention is that vega
    represents the price change per 1 percentage point (not 1%) change in volatility: if
    sigma goes from 20% to 21%, the option price changes by vega. This convention differs from
    delta/gamma which use absolute changes.
  how_to_do_right: |
    1. Vega = S * sqrt(T) * N'(d1) where N'(x) = norm.pdf(x)
    2. Same formula for calls and puts (vega is always positive for long options)
    3. Convention: vega is per 1 percentage point change (sigma: 0.20 → 0.21)
    4. If computing per 1% relative change, divide by 100
    5. Vega peaks at ATM and is proportional to sqrt(T)
    6. Long-dated ATM options have the highest vega
    7. Vega-neutral: combine long and short options at different strikes/expiries
    8. Verify: vega is bounded by S * sqrt(T) / sqrt(2*pi) ≈ 0.399 * S * sqrt(T)
    9. Total portfolio vega = sum(vega_i * quantity_i * 100)
    10. Handle T=0 and sigma=0: vega = 0
  severity: high
  technologies:
    lang: [python, numpy, scipy]
    framework: [scipy]
  domains:
    domain: [fintech, derivatives, risk_management]
    concern: [domain_specific]
  example_good: |
    import numpy as np
    from scipy.stats import norm

    def bs_vega(S: float, K: float, T: float, r: float,
                sigma: float) -> float:
        """Black-Scholes vega (same for calls and puts).

        Returns vega per 1 percentage point change in sigma.
        If sigma goes from 0.20 to 0.21, option price changes by vega.

        Args:
            S, K, T, r, sigma: Standard BS parameters.

        Returns:
            Vega value (always >= 0 for long options).
        """
        if T <= 0 or sigma <= 0:
            return 0.0

        d1 = (np.log(S / K) + (r + 0.5 * sigma**2) * T) / (sigma * np.sqrt(T))
        # Vega per 1 point (0.01 in sigma)
        vega = S * np.sqrt(T) * norm.pdf(d1) * 0.01
        return vega

    # Example: Vega across strikes for 3-month option
    S, T, r, sigma = 100, 0.25, 0.05, 0.20

    print("Vega across strikes (T=3 months, sigma=20%):")
    for K in [85, 90, 95, 100, 105, 110, 115]:
        v = bs_vega(S, K, T, r, sigma)
        moneyness = "ITM" if S > K else ("ATM" if S == K else "OTM")
        print(f"  K={K:3d} ({moneyness}): vega=${v:.4f}")

    # Vega is highest ATM and decays symmetrically (approximately)

    # Vega P&L: If I'm long 50 contracts and IV goes from 20% to 25%
    v_atm = bs_vega(100, 100, 0.25, 0.05, 0.20)
    iv_change = 5  # 5 percentage points (20% → 25%)
    pnl = 50 * 100 * v_atm * iv_change
    print(f"Vega P&L for 5-pt IV increase: ${pnl:.2f}")

    # Vega-neutral: long K=100, short K=110
    v_100 = bs_vega(100, 100, 0.25, 0.05, 0.20)
    v_110 = bs_vega(100, 110, 0.25, 0.05, 0.20)
    ratio = v_100 / v_110
    print(f"Vega-neutral ratio: {ratio:.2f} (sell {ratio:.2f} K=110 per K=100)")
  example_bad: |
    import numpy as np
    from scipy.stats import norm

    # WRONG 1: Vega per 1% relative change (not 1 percentage point)
    d1 = 0.3
    S, T = 100, 0.25
    vega = S * np.sqrt(T) * norm.pdf(d1)  # This is per 100% change!
    # A 1 point IV change (20% → 21%) would be vega * 0.01
    # Misreporting by factor of 100

    # WRONG 2: Claiming put vega is negative
    put_vega = -0.15  # WRONG — vega is positive for ALL long options
    # Higher vol = higher put price (more chance of finishing ITM)

    # WRONG 3: Ignoring vega in delta-hedging
    # "I'm delta-neutral so I'm safe"
    # A 5-point IV move can cause $5,000 loss per ATM contract near expiry
  when_applies: "Measuring volatility exposure, constructing vega-neutral portfolios, computing P&L attribution to volatility changes, option trading strategies."
  sources:
    - "https://www.investopedia.com/terms/g/greeks.asp"
    - "https://en.wikipedia.org/wiki/Black%E2%80%93Scholes_model"

- id: "FIN-OPT-008"
  text: "Rho = dC/dr: Rho_call = K*T*exp(-rT)*N(d2), Rho_put = -K*T*exp(-rT)*N(-d2). Rho measures sensitivity to interest rate changes and is typically the smallest Greek. However, for long-dated options (LEAPS, T > 1 year), rho becomes significant: a 100bp rate change can move a 2-year ATM call by 5-8%. Express rho per 1 percentage point (100bp) change in r."
  why: >
    Rho is often dismissed as negligible, but this is only true for short-dated options. The
    Black-Scholes formula contains the term K*exp(-rT), so the discounting effect grows with
    time. For a 2-year LEAP with K=100 and r=5%, the discount factor is exp(-0.10) = 0.905,
    meaning the present value of the strike is $90.48 — a 100bp rate change to 6% gives
    exp(-0.12) = 0.887 or $88.69. That's a $1.79 change in the discounted strike alone.
    In 2022-2023, the Fed raised rates by 525bp, causing significant repricing of LEAPS and
    long-dated options. Interest rate risk in options books became front-page news for the
    first time in a decade.
  how_to_do_right: |
    1. Rho_call = K * T * exp(-r * T) * N(d2) * 0.01 (per 1 percentage point)
    2. Rho_put = -K * T * exp(-r * T) * N(-d2) * 0.01
    3. Convention: rho is per 1 percentage point change (r: 5% → 6%)
    4. Rho is positive for calls (higher r → higher call price)
    5. Rho is negative for puts (higher r → lower put price)
    6. Significance threshold: if |rho * 100bp| > 1% of option price, it matters
    7. For LEAPS (T > 1 year), always include rho in risk reports
    8. For short-dated options (T < 3 months), rho is typically negligible
    9. Handle T = 0: rho = 0
  severity: medium
  technologies:
    lang: [python, numpy, scipy]
    framework: [scipy]
  domains:
    domain: [fintech, derivatives]
    concern: [domain_specific]
  example_good: |
    import numpy as np
    from scipy.stats import norm

    def bs_rho(S: float, K: float, T: float, r: float,
               sigma: float, option_type: str = 'call') -> float:
        """Black-Scholes rho per 1 percentage point change in r.

        Args:
            S, K, T, r, sigma: Standard BS parameters.
            option_type: 'call' or 'put'.

        Returns:
            Rho value per 100bp rate change.
        """
        if T <= 0:
            return 0.0
        if sigma <= 0:
            sigma = 1e-10  # Avoid division by zero

        d1 = (np.log(S / K) + (r + 0.5 * sigma**2) * T) / (sigma * np.sqrt(T))
        d2 = d1 - sigma * np.sqrt(T)

        if option_type == 'call':
            rho = K * T * np.exp(-r * T) * norm.cdf(d2) * 0.01
        elif option_type == 'put':
            rho = -K * T * np.exp(-r * T) * norm.cdf(-d2) * 0.01
        else:
            raise ValueError(f"option_type must be 'call' or 'put'")

        return rho

    # Short-dated vs long-dated comparison
    S, K, sigma = 100, 100, 0.20

    print("Rho significance by maturity (r=5%, sigma=20%, ATM):")
    for T_years in [0.083, 0.25, 0.5, 1.0, 2.0]:
        from_fn = bs_rho  # Just to refer to existing function
        rho_c = bs_rho(S, K, T_years, 0.05, sigma, 'call')
        # BS call price for context
        d1 = (np.log(S/K) + (0.05 + 0.5*sigma**2)*T_years) / (sigma*np.sqrt(T_years))
        d2 = d1 - sigma*np.sqrt(T_years)
        call_price = S*norm.cdf(d1) - K*np.exp(-0.05*T_years)*norm.cdf(d2)
        pct_impact = abs(rho_c) / call_price * 100 if call_price > 0 else 0

        print(f"  T={T_years:.3f}y: rho=${rho_c:.4f}, "
              f"call=${call_price:.2f}, impact={pct_impact:.1f}%")
    # 1-month: rho ~$0.004 (0.1% of price) — negligible
    # 2-year:  rho ~$0.074 (4.5% of price) — significant!
  example_bad: |
    # WRONG 1: Ignoring rho for LEAPS
    leap_call = bs_call(100, 100, 2.0, 0.05, 0.20)
    # "Rho doesn't matter" — but 100bp rate change moves this by ~$0.74
    # That's a 4.5% price impact!

    # WRONG 2: Wrong sign for put rho
    rho_put = 0.05  # WRONG — put rho is always negative
    # Higher rates decrease put value (increase forward, less chance of K > S_T)

    # WRONG 3: Using rho per 100% change instead of 1 percentage point
    rho_raw = K * T * np.exp(-r * T) * norm.cdf(d2)
    # This is rho per 100% rate change — unusable!
    # A 1% rate change effect is rho_raw * 0.01
  when_applies: "Managing long-dated option portfolios (LEAPS), interest rate risk hedging, multi-asset portfolios with both options and bonds, periods of significant rate changes."
  sources:
    - "https://www.investopedia.com/terms/g/greeks.asp"

- id: "FIN-OPT-009"
  text: "Binary (digital) options pay a fixed amount if the underlying finishes above (call) or below (put) the strike. BS binary call price: C_bin = exp(-rT) * N(d2). In prediction markets, binary contracts paying $1 if event occurs are priced as: price = exp(-rT) * Q(event), where Q is the risk-neutral probability. The price IS the discounted probability."
  why: >
    Binary options are the mathematical foundation of prediction markets. A Polymarket contract
    paying $1 if 'Event X occurs' is exactly a binary call option. The price directly reflects
    the risk-neutral probability of the event (discounted by the risk-free rate, which for
    short-dated contracts is negligible). Binary delta is discontinuous at the strike (a spike,
    not a smooth curve like vanilla delta), making them harder to hedge. The hedging cost of
    binary options is proportional to 1/(sigma*sqrt(T)) near the strike, which explains why
    prediction markets widen bid-ask spreads near expiry for close probabilities. The BS
    formula for binary calls uses N(d2), NOT N(d1) — this is because d2 corresponds to the
    risk-neutral probability of finishing ITM.
  how_to_do_right: |
    1. Binary call: C_bin = exp(-r * T) * N(d2)
    2. Binary put: P_bin = exp(-r * T) * N(-d2)
    3. Binary call + binary put = exp(-r * T) (no-arbitrage)
    4. In prediction markets (short-dated): price ≈ N(d2) ≈ probability
    5. Binary delta = exp(-r * T) * N'(d2) / (S * sigma * sqrt(T))
    6. Binary delta has a spike at ATM — hedging is expensive near the strike
    7. For prediction markets: p_yes + p_no = 1.00 (after removing discount)
    8. Hedging binary options: use call/put spreads as approximation
    9. Replication: binary ≈ tight call spread (C(K) - C(K+eps)) / eps as eps → 0
    10. For practical hedging, use 0.5-1 point call spread as binary proxy
  severity: high
  technologies:
    lang: [python, numpy, scipy]
    framework: [scipy]
  domains:
    domain: [fintech, prediction_markets, derivatives]
    concern: [domain_specific]
  example_good: |
    import numpy as np
    from scipy.stats import norm

    def binary_call(S: float, K: float, T: float, r: float,
                     sigma: float, payout: float = 1.0) -> float:
        """Binary (digital) call option price.

        Pays 'payout' if S_T > K, else 0.

        Args:
            S, K, T, r, sigma: Standard BS parameters.
            payout: Fixed payout amount (default $1).

        Returns:
            Binary call price = discounted risk-neutral probability.
        """
        if T <= 0:
            return payout if S > K else 0.0
        if sigma <= 0:
            forward = S * np.exp(r * T)
            return payout * np.exp(-r * T) if forward > K else 0.0

        d1 = (np.log(S / K) + (r + 0.5 * sigma**2) * T) / (sigma * np.sqrt(T))
        d2 = d1 - sigma * np.sqrt(T)

        return payout * np.exp(-r * T) * norm.cdf(d2)

    def binary_put(S: float, K: float, T: float, r: float,
                    sigma: float, payout: float = 1.0) -> float:
        """Binary put: pays if S_T < K."""
        return payout * np.exp(-r * T) - binary_call(S, K, T, r, sigma, payout)

    def prediction_market_price(implied_prob: float, T_days: float,
                                 r: float = 0.05) -> float:
        """Convert probability to prediction market contract price.

        Args:
            implied_prob: Risk-neutral probability of event.
            T_days: Days to resolution.
            r: Risk-free rate.

        Returns:
            Contract price (between 0 and 1).
        """
        T = T_days / 365
        return np.exp(-r * T) * implied_prob

    # Example: Binary option / prediction market contract
    # "Will AAPL close above $200 in 3 months?"
    prob_above = binary_call(195, 200, 0.25, 0.05, 0.25, payout=1.0)
    prob_below = binary_put(195, 200, 0.25, 0.05, 0.25, payout=1.0)

    print(f"Price of YES contract: ${prob_above:.4f}")  # ~$0.42
    print(f"Price of NO contract: ${prob_below:.4f}")   # ~$0.57
    print(f"Sum: ${prob_above + prob_below:.4f}")        # ~$0.9876 = exp(-0.05*0.25)
    print(f"Implied probability: {prob_above / np.exp(-0.05*0.25):.4f}")  # ~0.426

    # Hedging a binary with a call spread (practical replication)
    spread_width = 1.0  # $1 wide
    call_K = bs_call_price(195, 200, 0.25, 0.05, 0.25)  # assume helper
    call_K1 = bs_call_price(195, 201, 0.25, 0.05, 0.25)
    binary_approx = (call_K - call_K1) / spread_width
    print(f"Binary via call spread: ${binary_approx:.4f}")
  example_bad: |
    import numpy as np
    from scipy.stats import norm

    # WRONG 1: Using N(d1) instead of N(d2) for binary call
    d1 = 0.3
    d2 = 0.2
    binary_wrong = np.exp(-0.05 * 0.25) * norm.cdf(d1)  # N(d1) is for vanilla!
    binary_right = np.exp(-0.05 * 0.25) * norm.cdf(d2)  # N(d2) for binary

    # WRONG 2: Binary call + binary put != 1 (not discounting)
    bc = norm.cdf(d2)
    bp = norm.cdf(-d2)
    print(f"Sum: {bc + bp}")  # 1.0 — but this ignores discounting
    # Correct: bc + bp = exp(-rT), not 1.0

    # WRONG 3: Hedging binary with a single vanilla option
    # Binary delta is a spike at K; vanilla delta is smooth
    # A single vanilla cannot replicate the discontinuous payoff
    # Need a call spread with very tight strikes for proper replication
  when_applies: "Prediction market contract pricing, binary option valuation, hedging discontinuous payoffs, any system that maps events to probabilities via market prices."
  sources:
    - "https://en.wikipedia.org/wiki/Black%E2%80%93Scholes_model"
    - "https://www.investopedia.com/terms/g/greeks.asp"

- id: "FIN-OPT-010"
  text: "American options can be exercised at any time before expiry. For calls on non-dividend-paying stocks, early exercise is NEVER optimal (American call = European call). For puts, early exercise CAN be optimal when the option is deep ITM and the interest earned on the strike exceeds the remaining time value. Use binomial trees or Barone-Adesi-Whaley approximation — Black-Scholes only prices European options."
  why: >
    This distinction is critical and often misunderstood. Black-Scholes gives the EUROPEAN
    option price. For American calls on non-dividend stocks, this is fine because early
    exercise is never optimal (you lose the time value and the interest on the strike price).
    However, for American puts, early exercise becomes optimal when the put is deep ITM:
    the holder would rather have K dollars now (earning interest) than wait for an uncertain
    payoff that's already close to maximum (K). The early exercise boundary is a function of
    time: at expiry, exercise if S < K; at T, exercise if S < S*(T) where S*(T) < K is the
    critical price. Using Black-Scholes for American puts underprices them by 0.5-5% for deep
    ITM puts. The Barone-Adesi-Whaley (BAW) approximation is fast and accurate to ~0.01%.
  how_to_do_right: |
    1. American call on non-dividend stock: use Black-Scholes (early exercise never optimal)
    2. American call WITH dividends: use binomial tree or BAW (early exercise before ex-div)
    3. American put: NEVER use Black-Scholes — always use binomial tree or BAW
    4. Binomial tree: N >= 200 steps for 0.01% accuracy
    5. BAW approximation: O(1) computation, ~0.01% accuracy for most cases
    6. Early exercise boundary: S*(T) ≈ K * (1 - 2*sigma*sqrt(T)/sqrt(2*pi)) for small T
    7. In practice: check if put delta is exactly -1.0 — this means you're past the boundary
    8. Most equity options in the US are American-style; index options are European
    9. For deep ITM American puts, the price floor is K - S (not K*exp(-rT) - S)
  severity: high
  technologies:
    lang: [python, numpy, scipy]
    framework: [scipy]
  domains:
    domain: [fintech, derivatives]
    concern: [domain_specific, numerical_accuracy]
  example_good: |
    import numpy as np
    from scipy.stats import norm

    def barone_adesi_whaley_put(S: float, K: float, T: float,
                                 r: float, sigma: float,
                                 max_iter: int = 100,
                                 tol: float = 1e-8) -> float:
        """Barone-Adesi-Whaley American put approximation.

        Args:
            S, K, T, r, sigma: Standard option parameters.
            max_iter: Max Newton iterations for critical price.
            tol: Convergence tolerance.

        Returns:
            American put price.
        """
        if T <= 0:
            return max(K - S, 0.0)

        # European put price
        d1 = (np.log(S / K) + (r + 0.5 * sigma**2) * T) / (sigma * np.sqrt(T))
        d2 = d1 - sigma * np.sqrt(T)
        euro_put = K * np.exp(-r * T) * norm.cdf(-d2) - S * norm.cdf(-d1)

        # BAW parameters
        M = 2 * r / sigma**2
        N_param = 2 * (r - 0.0) / sigma**2  # No dividend (q=0)
        K_baw = 1 - np.exp(-r * T)
        q2 = (-(N_param - 1) - np.sqrt((N_param - 1)**2 + 4 * M / K_baw)) / 2

        # Find critical stock price S* via Newton-Raphson
        S_star = K  # Initial guess
        for _ in range(max_iter):
            d1_star = (np.log(S_star / K) + (r + 0.5 * sigma**2) * T) / (sigma * np.sqrt(T))
            d2_star = d1_star - sigma * np.sqrt(T)
            euro_put_star = K * np.exp(-r * T) * norm.cdf(-d2_star) - S_star * norm.cdf(-d1_star)

            # Boundary condition: K - S* = euro_put(S*) + A2 * (S*/S*)^q2
            # Where A2 = -(S*/q2) * (1 - exp(-r*T)*N(-d1(S*)))
            A2_part = -(S_star / q2) * (1 - np.exp(0) * norm.cdf(-d1_star))

            lhs = K - S_star
            rhs = euro_put_star + A2_part

            if abs(lhs - rhs) < tol:
                break

            # Newton step (simplified)
            S_star = S_star - (lhs - rhs) * 0.5
            S_star = max(S_star, 0.01)

        # Early exercise premium
        if S <= S_star:
            return max(K - S, 0.0)  # Immediate exercise

        A2 = -(S_star / q2) * (1 - np.exp(0) * norm.cdf(-d1_star))
        american_put = euro_put + A2 * (S / S_star)**q2

        return max(american_put, max(K - S, 0.0))

    # Example: American vs European put
    S, K, T, r, sigma = 90, 100, 0.5, 0.05, 0.25
    d1 = (np.log(S/K) + (r + 0.5*sigma**2)*T) / (sigma*np.sqrt(T))
    d2 = d1 - sigma*np.sqrt(T)
    euro_put = K * np.exp(-r*T) * norm.cdf(-d2) - S * norm.cdf(-d1)
    amer_put = barone_adesi_whaley_put(S, K, T, r, sigma)

    print(f"European put: ${euro_put:.4f}")
    print(f"American put: ${amer_put:.4f}")
    print(f"Early exercise premium: ${amer_put - euro_put:.4f}")
    # Deep ITM put: American price > European by $0.30-$1.00
  example_bad: |
    import numpy as np
    from scipy.stats import norm

    # WRONG 1: Using Black-Scholes for American puts
    def american_put(S, K, T, r, sigma):
        d1 = (np.log(S/K) + (r + 0.5*sigma**2)*T) / (sigma*np.sqrt(T))
        d2 = d1 - sigma*np.sqrt(T)
        return K * np.exp(-r*T) * norm.cdf(-d2) - S * norm.cdf(-d1)
    # This is the EUROPEAN put! Underprices American put by 0.5-5%

    # WRONG 2: Assuming American call = European call WITH dividends
    # If stock pays $2 dividend before expiry, American call might be exercised
    # the day before ex-dividend. BS ignores this!

    # WRONG 3: Using too few binomial steps
    # N=10 gives ~5% error; N=50 gives ~0.5% error; N=200 gives ~0.01%
    # Many tutorials use N=5 for "simplicity" — unusable for real pricing
  when_applies: "Pricing US-listed equity options (almost all are American-style), early exercise decisions, option portfolio valuation, any system that must distinguish American from European exercise."
  sources:
    - "https://en.wikipedia.org/wiki/Black%E2%80%93Scholes_model"

- id: "FIN-OPT-011"
  text: "The Cox-Ross-Rubinstein (CRR) binomial tree prices options by constructing a recombining lattice where u = exp(sigma*sqrt(dt)), d = 1/u, p = (exp(r*dt) - d) / (u - d). Work backward from terminal payoffs, applying the max(payoff, continuation_value) at each node for American options. Use N >= 200 steps for production; the O(N^2) complexity is manageable for single options."
  why: >
    The binomial tree is the most versatile option pricing model: it handles American exercise,
    dividends, barriers, and any payoff structure. The CRR parametrization ensures the tree
    recombines (u*d = 1), giving O(N^2) complexity instead of O(2^N). As N → infinity, the
    CRR tree converges to Black-Scholes. The key insight is risk-neutral pricing: you don't
    need the real probability of up/down moves — you use the risk-neutral probability p that
    makes the expected return equal to the risk-free rate. For American options, you compare
    the continuation value (hold) vs exercise value (exercise now) at each node and take the
    maximum. This is dynamic programming. The tree also provides Greeks via finite differences
    between node values.
  how_to_do_right: |
    1. Set dt = T / N, u = exp(sigma * sqrt(dt)), d = 1 / u
    2. Risk-neutral probability: p = (exp(r * dt) - d) / (u - d)
    3. Verify: 0 < p < 1 (if not, dt is too large or r, sigma are extreme)
    4. Build stock price tree: S_{i,j} = S * u^j * d^(i-j) for node (i, j)
    5. Terminal payoffs: V_{N,j} = max(S_{N,j} - K, 0) for calls
    6. Backward induction: V_{i,j} = exp(-r*dt) * (p * V_{i+1,j+1} + (1-p) * V_{i+1,j})
    7. For American options: V_{i,j} = max(exercise_value, continuation_value)
    8. Use N >= 200 for production (< 0.01% error vs analytic)
    9. Use N >= 500 for barrier options (barrier introduces sawtooth convergence)
    10. Optimize: store only current and next column (O(N) memory instead of O(N^2))
  severity: high
  technologies:
    lang: [python, numpy]
    framework: []
  domains:
    domain: [fintech, derivatives]
    concern: [domain_specific, numerical_accuracy]
  example_good: |
    import numpy as np

    def crr_binomial(S: float, K: float, T: float, r: float,
                      sigma: float, N: int = 200,
                      option_type: str = 'call',
                      american: bool = False) -> float:
        """Cox-Ross-Rubinstein binomial tree option pricer.

        Args:
            S, K, T, r, sigma: Standard option parameters.
            N: Number of time steps (>= 50 for reasonable accuracy).
            option_type: 'call' or 'put'.
            american: If True, price American option (early exercise).

        Returns:
            Option price.
        """
        if N < 10:
            raise ValueError(f"N must be >= 10 for meaningful results, got {N}")

        dt = T / N
        u = np.exp(sigma * np.sqrt(dt))
        d = 1 / u
        p = (np.exp(r * dt) - d) / (u - d)

        if not (0 < p < 1):
            raise ValueError(f"Invalid risk-neutral prob p={p:.4f}. "
                             f"Check r={r}, sigma={sigma}, dt={dt:.6f}")

        # Stock prices at maturity
        stock_prices = S * u ** np.arange(N, -1, -1) * d ** np.arange(0, N + 1, 1)

        # Terminal payoffs
        if option_type == 'call':
            values = np.maximum(stock_prices - K, 0.0)
        elif option_type == 'put':
            values = np.maximum(K - stock_prices, 0.0)
        else:
            raise ValueError(f"option_type must be 'call' or 'put'")

        # Backward induction
        discount = np.exp(-r * dt)
        for i in range(N - 1, -1, -1):
            # Continuation values
            values = discount * (p * values[:-1] + (1 - p) * values[1:])

            if american:
                # Stock prices at step i
                stock_at_i = S * u ** np.arange(i, -1, -1) * d ** np.arange(0, i + 1, 1)
                if option_type == 'call':
                    exercise = np.maximum(stock_at_i - K, 0.0)
                else:
                    exercise = np.maximum(K - stock_at_i, 0.0)
                values = np.maximum(values, exercise)

        return values[0]

    # Example: Compare European vs American put
    S, K, T, r, sigma = 90, 100, 0.5, 0.05, 0.25

    euro_put_tree = crr_binomial(S, K, T, r, sigma, N=500,
                                   option_type='put', american=False)
    amer_put_tree = crr_binomial(S, K, T, r, sigma, N=500,
                                   option_type='put', american=True)

    print(f"European put (tree, N=500): ${euro_put_tree:.4f}")
    print(f"American put (tree, N=500): ${amer_put_tree:.4f}")
    print(f"Early exercise premium: ${amer_put_tree - euro_put_tree:.4f}")

    # Convergence check
    for n in [50, 100, 200, 500]:
        p = crr_binomial(100, 100, 0.25, 0.05, 0.20, N=n, option_type='call')
        print(f"N={n:3d}: call=${p:.4f}")
    # Should converge to BS price ~$4.62
  example_bad: |
    import numpy as np

    # WRONG 1: Too few steps
    price = crr_binomial(100, 100, 0.25, 0.05, 0.20, N=5)
    # N=5 gives ~2% error vs Black-Scholes — unusable for trading

    # WRONG 2: Not recombining (exponential complexity)
    def bad_tree(S, u, d, p, n, K):
        if n == 0:
            return max(S - K, 0)
        up = bad_tree(S * u, u, d, p, n - 1, K)
        dn = bad_tree(S * d, u, d, p, n - 1, K)
        return np.exp(-r * dt) * (p * up + (1 - p) * dn)
    # This is O(2^N) — N=30 takes billions of operations!

    # WRONG 3: Using real-world probabilities instead of risk-neutral
    p_real = 0.55  # "I think the stock goes up 55% of the time"
    # Risk-neutral pricing doesn't care about your view — use p = (exp(r*dt) - d)/(u - d)

    # WRONG 4: Forgetting max(exercise, continuation) for American
    values = discount * (p * values[:-1] + (1 - p) * values[1:])
    # This only computes continuation value — it's the European price!
  when_applies: "Pricing American options, options with discrete dividends, barrier options, any non-standard payoff that lacks a closed-form solution."
  sources:
    - "https://en.wikipedia.org/wiki/Black%E2%80%93Scholes_model"

- id: "FIN-OPT-012"
  text: "Risk-neutral pricing means option prices are computed as discounted expectations under the risk-neutral measure Q, NOT the real-world measure P. Under Q, the expected return of every asset is the risk-free rate r. This is a change of measure (Girsanov's theorem), not an assumption about investor preferences. The formula C = exp(-rT) * E_Q[max(S_T - K, 0)] holds for ANY contingent claim."
  why: >
    Risk-neutral pricing is the intellectual foundation of all derivative pricing. A common
    misunderstanding is that it assumes investors are risk-neutral — it does not. It's a
    mathematical technique: by changing from the real-world probability measure P to the
    risk-neutral measure Q, the drift of the stock changes from mu (expected return) to r
    (risk-free rate), but the volatility sigma is unchanged. Under Q, discounted asset prices
    are martingales (no drift after discounting). This means you can price ANY derivative by:
    (1) simulating paths under Q (drift = r), (2) computing the payoff at each path, (3)
    averaging and discounting. The Black-Scholes formula is just the analytical result of this
    procedure for a European call. Monte Carlo, trees, and PDEs all implement risk-neutral
    pricing in different ways.
  how_to_do_right: |
    1. Under Q, stock dynamics: dS = r*S*dt + sigma*S*dW_Q (NOT mu*S*dt)
    2. For simulation: S_T = S * exp((r - sigma^2/2)*T + sigma*sqrt(T)*Z), Z ~ N(0,1)
    3. Option price: C = exp(-rT) * mean(payoffs under Q)
    4. This works for ANY payoff: calls, puts, barriers, digitals, Asians, lookbacks
    5. The real-world drift mu does NOT appear in the pricing formula
    6. Volatility sigma is the SAME under P and Q (Girsanov only changes drift)
    7. Monte Carlo: use at least 100,000 paths; variance reduction for efficiency
    8. Verify: Monte Carlo BS call should match analytical BS within ~0.1%
    9. Antithetic variates: for each Z, also use -Z to reduce variance by ~50%
    10. Control variate: use analytical BS price to reduce Monte Carlo variance further
  severity: high
  technologies:
    lang: [python, numpy]
    framework: []
  domains:
    domain: [fintech, derivatives, prediction_markets]
    concern: [domain_specific]
  example_good: |
    import numpy as np
    from scipy.stats import norm

    def monte_carlo_european_call(S: float, K: float, T: float,
                                    r: float, sigma: float,
                                    n_paths: int = 100_000,
                                    seed: int = 42) -> dict:
        """Price European call via Monte Carlo under risk-neutral measure.

        Args:
            S, K, T, r, sigma: Standard BS parameters.
            n_paths: Number of simulation paths.
            seed: Random seed for reproducibility.

        Returns:
            Dict with MC price, std error, and BS analytical price.
        """
        np.random.seed(seed)

        # Generate terminal stock prices under Q
        Z = np.random.standard_normal(n_paths)

        # Antithetic variates: use both Z and -Z
        Z_anti = np.concatenate([Z, -Z])
        S_T = S * np.exp((r - 0.5 * sigma**2) * T + sigma * np.sqrt(T) * Z_anti)

        # Payoffs
        payoffs = np.maximum(S_T - K, 0.0)

        # Discounted expected value under Q
        mc_price = np.exp(-r * T) * np.mean(payoffs)
        mc_stderr = np.exp(-r * T) * np.std(payoffs) / np.sqrt(len(payoffs))

        # Analytical BS price for comparison
        d1 = (np.log(S / K) + (r + 0.5 * sigma**2) * T) / (sigma * np.sqrt(T))
        d2 = d1 - sigma * np.sqrt(T)
        bs_price = S * norm.cdf(d1) - K * np.exp(-r * T) * norm.cdf(d2)

        return {
            'mc_price': mc_price,
            'mc_stderr': mc_stderr,
            'bs_price': bs_price,
            'error': abs(mc_price - bs_price),
            'error_pct': abs(mc_price - bs_price) / bs_price * 100,
        }

    # Example
    result = monte_carlo_european_call(100, 105, 0.25, 0.05, 0.20,
                                        n_paths=500_000)
    print(f"MC price:  ${result['mc_price']:.4f} (±{result['mc_stderr']:.4f})")
    print(f"BS price:  ${result['bs_price']:.4f}")
    print(f"Error: {result['error_pct']:.3f}%")
    # With 1M paths (500K + antithetic), error should be < 0.1%
  example_bad: |
    import numpy as np

    # WRONG 1: Using real-world drift mu instead of r
    mu = 0.10  # "Expected return is 10%"
    S_T = 100 * np.exp((mu - 0.5 * 0.2**2) * 0.25 + 0.2 * np.sqrt(0.25) * Z)
    # This gives the WRONG option price!
    # Risk-neutral pricing requires drift = r, not mu

    # WRONG 2: Not discounting
    payoffs = np.maximum(S_T - K, 0)
    price = np.mean(payoffs)  # Missing exp(-rT) discount!
    # Overprices the option by exp(rT) - 1 ≈ rT for small rT

    # WRONG 3: Too few paths
    Z = np.random.standard_normal(100)
    # 100 paths gives standard error of ~10% — useless for pricing

    # WRONG 4: Simulating sigma under Q differently from P
    # sigma is the SAME under P and Q — Girsanov only changes the drift
    sigma_Q = sigma * 0.8  # WRONG — no such adjustment!
  when_applies: "Understanding why Black-Scholes works, Monte Carlo option pricing, pricing exotic derivatives, any situation where you need to price contingent claims."
  sources:
    - "https://en.wikipedia.org/wiki/Black%E2%80%93Scholes_model"

- id: "FIN-OPT-013"
  text: "Prediction market contracts can be priced as binary options. A contract paying $1 if 'Event X occurs by date T' is equivalent to a binary call on an abstract underlying with strike at the decision boundary. Use the Black-Scholes binary formula when the underlying is continuous (e.g., price levels), and logistic/probit models when the underlying is discrete or categorical."
  why: >
    Prediction markets (Polymarket, Kalshi, Metaculus) trade contracts that are mathematically
    equivalent to binary options. The key insight is that ANY binary outcome can be mapped to
    an option framework: the 'underlying' is whatever determines the outcome, the 'strike' is
    the decision boundary, and 'volatility' represents uncertainty about the outcome. For
    financial events (e.g., 'S&P 500 above 5000 by Dec'), the mapping is direct to BS binary
    options. For non-financial events (e.g., 'Will AI pass test X by 2027?'), you model the
    underlying as a latent variable with some drift and volatility, making the contract a
    binary option on that latent variable. This framework gives you Greeks: delta tells you
    how the contract price changes with new information, and theta tells you the time decay.
  how_to_do_right: |
    1. Identify the 'underlying' — what determines the outcome
    2. For financial events: use BS binary option directly (FIN-OPT-009)
    3. For non-financial events: model latent state X_t with drift mu and vol sigma
    4. Contract price = P(X_T > threshold) under risk-neutral measure
    5. For binary outcomes: use logistic model: p = 1 / (1 + exp(-z)), z = (X_t - threshold) / sigma
    6. Calibrate sigma from observed price changes: larger moves = higher vol
    7. Greeks: delta = dp/dX = p(1-p) / sigma for logistic model
    8. Time value: contract at 50% has maximum uncertainty; 0% or 100% has none
    9. Bid-ask spread ∝ 1/(sigma*sqrt(T)) — widens near expiry for close probabilities
    10. Arbitrage: p_yes + p_no must equal 1 (minus transaction costs)
  severity: high
  technologies:
    lang: [python, numpy, scipy]
    framework: [scipy]
  domains:
    domain: [prediction_markets, fintech, derivatives]
    concern: [domain_specific]
  example_good: |
    import numpy as np
    from scipy.stats import norm
    from dataclasses import dataclass

    @dataclass
    class PredictionContract:
        """A prediction market contract modeled as a binary option."""
        description: str
        current_price: float    # Current market price (0 to 1)
        days_to_resolution: int  # Days until contract resolves
        implied_vol: float       # Implied volatility of the latent state

    def prediction_market_greeks(contract: PredictionContract) -> dict:
        """Compute Greeks for a prediction market contract.

        Models the contract as a binary option on a latent variable.

        Args:
            contract: PredictionContract with current state.

        Returns:
            Dict with delta, gamma, theta, and other analytics.
        """
        p = contract.current_price
        T = contract.days_to_resolution / 365
        sigma = contract.implied_vol

        if T <= 0:
            return {'delta': 0, 'gamma': 0, 'theta': 0}

        # Inverse of probit (find z such that N(z) = p)
        z = norm.ppf(p)

        # Delta: sensitivity to the underlying state
        delta = norm.pdf(z) / (sigma * np.sqrt(T))

        # Gamma: rate of change of delta
        gamma = -z * norm.pdf(z) / (sigma**2 * T)

        # Theta: time decay per day
        # As T → 0, uncertainty resolves → prices move toward 0 or 1
        theta_annual = z * norm.pdf(z) * sigma / (2 * np.sqrt(T))
        theta_daily = theta_annual / 365

        # Information value: max uncertainty at p=0.5
        entropy = -p * np.log2(max(p, 1e-10)) - (1-p) * np.log2(max(1-p, 1e-10))

        return {
            'price': p,
            'delta': delta,
            'gamma': gamma,
            'theta_daily': theta_daily,
            'entropy_bits': entropy,
            'days_to_resolution': contract.days_to_resolution,
            'z_score': z,
        }

    # Example: "Will BTC exceed $100K by June 2026?"
    btc_contract = PredictionContract(
        description="BTC > $100K by June 2026",
        current_price=0.65,
        days_to_resolution=120,
        implied_vol=0.60,
    )

    greeks = prediction_market_greeks(btc_contract)
    print(f"Contract: {btc_contract.description}")
    print(f"Price: {greeks['price']:.2%}")
    print(f"Delta: {greeks['delta']:.4f}")
    print(f"Theta (daily): {greeks['theta_daily']:.4f}")
    print(f"Entropy: {greeks['entropy_bits']:.3f} bits")

    # Compare: 50/50 contract vs 90/10 contract
    for prob in [0.50, 0.65, 0.90]:
        c = PredictionContract("test", prob, 30, 0.40)
        g = prediction_market_greeks(c)
        print(f"p={prob:.0%}: delta={g['delta']:.4f}, "
              f"theta={g['theta_daily']:.4f}, "
              f"entropy={g['entropy_bits']:.3f} bits")
  example_bad: |
    # WRONG 1: Treating prediction market price as a real-world probability
    price = 0.65  # Market price of "BTC > $100K"
    # "There's a 65% chance BTC exceeds $100K"
    # NO — this is the RISK-NEUTRAL probability, which includes risk premia
    # Real-world probability might be 55% (investors pay premium for upside exposure)

    # WRONG 2: No-arbitrage violation
    p_yes = 0.65
    p_no = 0.38
    # p_yes + p_no = 1.03 — this is not necessarily wrong (bid-ask spread)
    # But if both are MID prices: 1.03 means data error

    # WRONG 3: Using Black-Scholes vol for discrete events
    # "Will candidate X win election?" has no continuous underlying
    # BS assumes log-normal dynamics — completely wrong for binary political events
    # Use logistic/probit models instead
  when_applies: "Pricing prediction market contracts, computing analytics for binary outcome markets, hedging event risk, any system that trades on binary outcomes."
  sources:
    - "https://en.wikipedia.org/wiki/Black%E2%80%93Scholes_model"
    - "https://www.investopedia.com/terms/g/greeks.asp"

- id: "FIN-OPT-014"
  text: "The gamma-theta tradeoff is the fundamental law of options: 0.5*gamma*S^2*sigma^2 + theta ≈ 0 (for delta-neutral positions). Long gamma (buying options) profits from large moves but pays theta. Short gamma (selling options) collects theta but faces unlimited loss on large moves. You cannot have positive gamma without negative theta — this is enforced by the Black-Scholes PDE."
  why: >
    The Black-Scholes PDE states: theta + 0.5*gamma*S^2*sigma^2 + r*S*delta - r*V = 0. For
    delta-neutral portfolios (delta=0), this simplifies to theta ≈ -0.5*gamma*S^2*sigma^2
    (ignoring the small r*V term). This means gamma and theta are locked in a zero-sum
    tradeoff. A long straddle (long call + long put) has positive gamma and negative theta:
    it profits if the stock moves more than the market expects (realized vol > implied vol)
    but loses time value daily. A short straddle is the opposite. Understanding this tradeoff
    is essential for every options strategy. The 'breakeven move' for a long straddle over
    one day is approximately sqrt(2 * |theta_daily| / gamma) = sigma * S * sqrt(dt).
  how_to_do_right: |
    1. Compute theta and gamma for the position
    2. Verify: theta + 0.5 * gamma * S^2 * sigma^2 ≈ 0 (per year, for delta-neutral)
    3. Daily breakeven move: dS_be = sqrt(2 * |theta_daily| / gamma) ≈ sigma * S * sqrt(1/252)
    4. If realized vol > implied vol: long gamma profits
    5. If realized vol < implied vol: short gamma profits
    6. P&L attribution: gamma_pnl = 0.5 * gamma * dS^2, theta_pnl = theta * dt
    7. Total P&L ≈ gamma_pnl + theta_pnl (for delta-hedged position)
    8. Gamma scalping: delta-hedge a long gamma position, collect gamma P&L from moves
    9. The theta/gamma ratio determines the 'implied daily move'
    10. Vega and gamma are related: high gamma ↔ high vega for same expiry
  severity: high
  technologies:
    lang: [python, numpy, scipy]
    framework: [scipy]
  domains:
    domain: [fintech, derivatives, risk_management]
    concern: [domain_specific]
  example_good: |
    import numpy as np
    from scipy.stats import norm

    def gamma_theta_analysis(S: float, K: float, T: float,
                              r: float, sigma: float,
                              position: str = 'long_straddle') -> dict:
        """Analyze gamma-theta tradeoff for a position.

        Args:
            S, K, T, r, sigma: Standard BS parameters.
            position: 'long_straddle', 'short_straddle', 'long_call', etc.

        Returns:
            Dict with gamma, theta, breakeven, daily P&L scenarios.
        """
        if T <= 0 or sigma <= 0:
            return {'error': 'T and sigma must be positive'}

        d1 = (np.log(S / K) + (r + 0.5 * sigma**2) * T) / (sigma * np.sqrt(T))
        d2 = d1 - sigma * np.sqrt(T)

        # Compute per-option Greeks
        gamma_opt = norm.pdf(d1) / (S * sigma * np.sqrt(T))
        theta_call = (-(S * norm.pdf(d1) * sigma) / (2 * np.sqrt(T))
                      - r * K * np.exp(-r * T) * norm.cdf(d2)) / 252
        theta_put = (-(S * norm.pdf(d1) * sigma) / (2 * np.sqrt(T))
                     + r * K * np.exp(-r * T) * norm.cdf(-d2)) / 252

        # Position-level Greeks
        if position == 'long_straddle':
            total_gamma = 2 * gamma_opt  # Long call + long put
            total_theta = theta_call + theta_put
        elif position == 'short_straddle':
            total_gamma = -2 * gamma_opt
            total_theta = -(theta_call + theta_put)
        elif position == 'long_call':
            total_gamma = gamma_opt
            total_theta = theta_call
        else:
            raise ValueError(f"Unknown position: {position}")

        # Breakeven daily move
        if abs(total_gamma) > 1e-12:
            breakeven_move = np.sqrt(2 * abs(total_theta) / abs(total_gamma))
            breakeven_pct = breakeven_move / S * 100
        else:
            breakeven_move = 0
            breakeven_pct = 0

        # PDE check: theta + 0.5*gamma*S^2*sigma^2 should ≈ 0 (annually, per unit)
        # For long straddle per unit: sum of call and put
        pde_lhs = (theta_call + theta_put) * 252 + 0.5 * 2 * gamma_opt * S**2 * sigma**2
        pde_residual = pde_lhs  # Should be close to r * (call + put) ≈ small

        # Daily P&L scenarios
        scenarios = {}
        for move_pct in [-3, -2, -1, 0, 1, 2, 3]:
            dS = S * move_pct / 100
            gamma_pnl = 0.5 * total_gamma * dS**2
            daily_pnl = gamma_pnl + total_theta
            scenarios[f"{move_pct:+d}%"] = daily_pnl

        return {
            'total_gamma': total_gamma,
            'total_theta_daily': total_theta,
            'breakeven_daily_move': breakeven_move,
            'breakeven_pct': breakeven_pct,
            'implied_daily_vol': sigma * S / np.sqrt(252),
            'pde_residual': pde_residual,
            'daily_pnl_scenarios': scenarios,
        }

    # Example: Long ATM straddle
    result = gamma_theta_analysis(100, 100, 30/252, 0.05, 0.20, 'long_straddle')
    print(f"Gamma: {result['total_gamma']:.4f}")
    print(f"Theta (daily): ${result['total_theta_daily']:.4f}")
    print(f"Breakeven move: ${result['breakeven_daily_move']:.2f} "
          f"({result['breakeven_pct']:.2f}%)")
    print(f"Implied daily vol: ${result['implied_daily_vol']:.2f}")
    print("\nDaily P&L scenarios (per contract):")
    for move, pnl in result['daily_pnl_scenarios'].items():
        print(f"  {move}: ${pnl:.4f}")
  example_bad: |
    # WRONG 1: "I'll buy a straddle and always profit from moves"
    # You profit ONLY if the realized move exceeds the breakeven
    # Breakeven = theta_paid / gamma = implied daily move
    # If vol stays at implied, gamma P&L exactly offsets theta decay

    # WRONG 2: Ignoring the tradeoff when selling options
    # "Theta income is free money" — NO, you're exposed to gamma risk
    # A 3-sigma move costs: 0.5 * gamma * (3 * sigma_daily * S)^2
    # This can exceed months of theta income in one day

    # WRONG 3: Not delta-hedging a gamma position
    # Raw straddle P&L includes delta exposure
    # Gamma-theta tradeoff only applies to the delta-HEDGED position
    # Without hedging, your P&L is dominated by direction, not vol
  when_applies: "Options strategy selection, understanding P&L attribution, volatility trading, any context where you need to decide between buying vs selling options."
  sources:
    - "https://en.wikipedia.org/wiki/Black%E2%80%93Scholes_model"
    - "https://www.investopedia.com/terms/g/greeks.asp"

- id: "FIN-OPT-015"
  text: "Numerical Greeks via finite differences: Delta ≈ (C(S+h) - C(S-h)) / (2h), Gamma ≈ (C(S+h) - 2*C(S) + C(S-h)) / h^2, Theta ≈ (C(T-dt) - C(T)) / dt. Use central differences (not forward) for accuracy. Choose h = 0.01*S for delta/gamma and dt = 1/252 for theta. Numerical Greeks work for ANY pricing model, including Monte Carlo and trees where analytical Greeks don't exist."
  why: >
    Analytical Greeks exist only for Black-Scholes and a few other models. For Monte Carlo
    pricing, binomial trees with barriers, or any exotic payoff, you must compute Greeks
    numerically via finite differences. The central difference (C(x+h) - C(x-h))/(2h) is
    second-order accurate (error ~ h^2), while forward difference (C(x+h) - C(x))/h is only
    first-order (error ~ h). The choice of step size h is critical: too large and you get
    truncation error, too small and you get numerical noise (especially for Monte Carlo where
    C(x) itself has sampling error). The optimal h balances both errors. For bump-and-reprice
    with Monte Carlo, use the SAME random numbers for C(S+h) and C(S-h) (common random
    numbers) to reduce variance by 10-100x.
  how_to_do_right: |
    1. Central difference for delta: (C(S+h) - C(S-h)) / (2h)
    2. Central difference for gamma: (C(S+h) - 2*C(S) + C(S-h)) / h^2
    3. Forward difference for theta: (C(T-dt) - C(T)) / dt (time only moves forward)
    4. h = 0.01 * S for delta/gamma (1% of spot price)
    5. dt = 1/252 for theta (one trading day)
    6. For vega: h_sigma = 0.01 (1 vol point); vega = (C(sigma+h) - C(sigma-h)) / (2h)
    7. For Monte Carlo: use SAME random seed for all bumps (common random numbers)
    8. Verify: numerical Greeks should match analytical (BS) to 4+ decimal places
    9. If using Monte Carlo, increase paths to 500K+ for stable numerical Greeks
    10. Cross-Greeks (vanna, volga): use 2D finite differences
  severity: high
  technologies:
    lang: [python, numpy, scipy]
    framework: [scipy]
  domains:
    domain: [fintech, derivatives, risk_management]
    concern: [domain_specific, numerical_accuracy]
  example_good: |
    import numpy as np
    from scipy.stats import norm

    def bs_price(S, K, T, r, sigma, option_type='call'):
        """Black-Scholes price (call or put)."""
        if T <= 0 or sigma <= 0:
            if option_type == 'call':
                return max(S - K * np.exp(-r * max(T, 0)), 0.0)
            else:
                return max(K * np.exp(-r * max(T, 0)) - S, 0.0)
        d1 = (np.log(S/K) + (r + 0.5*sigma**2)*T) / (sigma*np.sqrt(T))
        d2 = d1 - sigma*np.sqrt(T)
        if option_type == 'call':
            return S * norm.cdf(d1) - K * np.exp(-r*T) * norm.cdf(d2)
        else:
            return K * np.exp(-r*T) * norm.cdf(-d2) - S * norm.cdf(-d1)

    def numerical_greeks(pricer, S, K, T, r, sigma,
                          option_type='call',
                          h_spot=None, h_vol=0.001,
                          h_time=1/252) -> dict:
        """Compute all Greeks via finite differences.

        Works with ANY pricing function, not just Black-Scholes.

        Args:
            pricer: Function(S, K, T, r, sigma, option_type) -> price.
            S, K, T, r, sigma: Standard parameters.
            option_type: 'call' or 'put'.
            h_spot: Spot bump size (default 0.01 * S).
            h_vol: Vol bump size (default 0.001 = 0.1%).
            h_time: Time bump size (default 1/252 = 1 day).

        Returns:
            Dict with all Greeks.
        """
        if h_spot is None:
            h_spot = 0.01 * S

        base = pricer(S, K, T, r, sigma, option_type)

        # Delta: central difference in S
        p_up = pricer(S + h_spot, K, T, r, sigma, option_type)
        p_dn = pricer(S - h_spot, K, T, r, sigma, option_type)
        delta = (p_up - p_dn) / (2 * h_spot)

        # Gamma: second central difference in S
        gamma = (p_up - 2 * base + p_dn) / (h_spot**2)

        # Theta: forward difference in T (time decreases)
        if T > h_time:
            p_tminus = pricer(S, K, T - h_time, r, sigma, option_type)
            theta = (p_tminus - base) / h_time  # Negative (price decreases)
        else:
            theta = 0.0

        # Vega: central difference in sigma (per 1 point = 0.01)
        p_vup = pricer(S, K, T, r, sigma + h_vol, option_type)
        p_vdn = pricer(S, K, T, r, sigma - h_vol, option_type)
        vega = (p_vup - p_vdn) / (2 * h_vol) * 0.01  # Per 1 vol point

        # Rho: central difference in r (per 1 point = 0.01)
        h_r = 0.001
        p_rup = pricer(S, K, T, r + h_r, sigma, option_type)
        p_rdn = pricer(S, K, T, r - h_r, sigma, option_type)
        rho = (p_rup - p_rdn) / (2 * h_r) * 0.01  # Per 1 rate point

        return {
            'price': base,
            'delta': delta,
            'gamma': gamma,
            'theta_daily': theta / 252 if theta != 0 else 0,
            'vega': vega,
            'rho': rho,
        }

    # Example: Compare numerical vs analytical
    S, K, T, r, sigma = 100, 105, 0.25, 0.05, 0.20

    num = numerical_greeks(bs_price, S, K, T, r, sigma, 'call')

    # Analytical Greeks for comparison
    d1 = (np.log(S/K) + (r + 0.5*sigma**2)*T) / (sigma*np.sqrt(T))
    d2 = d1 - sigma * np.sqrt(T)
    anal_delta = norm.cdf(d1)
    anal_gamma = norm.pdf(d1) / (S * sigma * np.sqrt(T))

    print(f"{'Greek':<12} {'Numerical':>12} {'Analytical':>12} {'Error':>12}")
    print(f"{'Delta':<12} {num['delta']:>12.6f} {anal_delta:>12.6f} "
          f"{abs(num['delta']-anal_delta):>12.2e}")
    print(f"{'Gamma':<12} {num['gamma']:>12.6f} {anal_gamma:>12.6f} "
          f"{abs(num['gamma']-anal_gamma):>12.2e}")
    # Errors should be < 1e-6 for h = 0.01*S
  example_bad: |
    import numpy as np

    # WRONG 1: Forward difference (first-order, less accurate)
    delta = (bs_price(101, K, T, r, sigma) - bs_price(100, K, T, r, sigma)) / 1.0
    # Error ~ h, not h^2. Use central difference for 100x better accuracy.

    # WRONG 2: Step size too small (noise dominates for Monte Carlo)
    h = 1e-8  # Tiny step
    delta = (mc_price(100 + h) - mc_price(100 - h)) / (2 * h)
    # Monte Carlo noise is ~$0.01, but 2*h = 2e-8
    # delta ≈ 0.01 / 2e-8 = 500,000 — completely wrong!

    # WRONG 3: Different random numbers for bumped prices
    np.random.seed(42)
    p_up = mc_price(101)  # Uses random seed 42
    np.random.seed(None)  # Different seed!
    p_dn = mc_price(99)   # Uses different random numbers
    # The noise in p_up and p_dn doesn't cancel — delta is dominated by MC noise

    # WRONG 4: Using h = 1 for S = 10000 (h/S = 0.01%)
    h = 1.0
    # For S=100, h=1.0 is 1% — fine
    # For S=10000, h=1.0 is 0.01% — too small, noise dominates
    # Always use h = 0.01 * S (relative step)
  when_applies: "Computing Greeks for exotic options, Monte Carlo Greeks, any pricing model without analytical Greek formulas, model validation by comparing numerical to analytical Greeks."
  sources:
    - "https://en.wikipedia.org/wiki/Black%E2%80%93Scholes_model"
    - "https://docs.scipy.org/doc/scipy/reference/generated/scipy.stats.norm.html"

- id: "FIN-OPT-016"
  text: "Black-Scholes assumes: (1) log-normal prices (no jumps), (2) constant volatility, (3) continuous trading, (4) no transaction costs, (5) no dividends, (6) constant risk-free rate. ALL these assumptions are violated in real markets. The volatility smile (FIN-VOL-004), fat tails (FIN-VOL-011), and discrete trading prove this. Use BS as a QUOTING CONVENTION (implied vol) and a STARTING POINT, not as ground truth. Stochastic volatility (Heston), jump-diffusion (Merton), and local volatility models correct specific violations."
  why: >
    Despite being wrong in every assumption, Black-Scholes remains the industry standard because
    it provides a common language (implied volatility) and a fast analytical solution. The gap
    between BS and reality is quantified by the volatility smile — if BS were correct, implied
    volatility would be flat across all strikes. The key violations: (1) Log-normal assumption
    ignores jumps (crashes happen; returns have fat tails with kurtosis 3-10). (2) Constant
    volatility contradicts the existence of GARCH effects and the VIX. (3) Continuous trading is
    impossible — there are overnight gaps, weekends, and flash crashes. (4) Transaction costs
    make perfect delta-hedging impossible. (5) Most stocks pay dividends, shifting the forward.
    (6) Interest rates change, especially for long-dated options. Each violation has a
    corresponding model correction: Heston for stochastic vol, Merton for jumps, local vol for
    the smile, etc.
  how_to_do_right: |
    1. Use BS as a quoting convention: trade in implied vol, not dollar prices
    2. For pricing: calibrate BS to market IVs per strike (volatility surface)
    3. For risk: acknowledge BS Greeks are approximate — use model Greeks with stochastic vol
    4. For fat tails: use Student-t GARCH or jump-diffusion for VaR (FIN-VOL-011)
    5. For dividends: replace S with S - PV(dividends) in BS formula (Merton adjustment)
    6. For American options: use binomial tree, not BS (FIN-OPT-010, FIN-OPT-011)
    7. For stochastic vol: Heston model — dv_t = kappa*(theta-v_t)*dt + xi*sqrt(v_t)*dW
    8. For jumps: Merton jump-diffusion — adds Poisson-distributed jumps to BS
    9. Local volatility (Dupire): sigma(S,t) calibrated from the entire vol surface
    10. Always compute model risk: reprice with BS, Heston, and local vol; compare
  severity: critical
  technologies:
    lang: [python, numpy, scipy]
    framework: [scipy, arch]
  domains:
    domain: [fintech, derivatives, risk_management, prediction_markets]
    concern: [domain_specific]
  example_good: |
    import numpy as np
    from scipy.stats import norm, t as student_t
    from scipy import stats

    def bs_mispricing_analysis(S: float, K: float, T: float,
                                r: float, sigma_bs: float,
                                realized_returns: np.ndarray) -> dict:
        """Quantify how much Black-Scholes assumptions are violated.

        Args:
            S, K, T, r: Market parameters.
            sigma_bs: Black-Scholes implied volatility.
            realized_returns: Historical log returns for assumption testing.

        Returns:
            Dict with assumption violation metrics.
        """
        # 1. Test log-normality (Jarque-Bera)
        jb_stat, jb_pval = stats.jarque_bera(realized_returns)

        # 2. Fat tails
        excess_kurtosis = stats.kurtosis(realized_returns, fisher=True)
        skewness = stats.skew(realized_returns)

        # 3. Fit Student-t for tail comparison
        df_t, _, _ = student_t.fit(realized_returns)

        # 4. Volatility clustering (Ljung-Box on squared returns)
        from statsmodels.stats.diagnostic import acorr_ljungbox
        lb = acorr_ljungbox(realized_returns**2, lags=[10], return_df=True)
        vol_cluster_pval = lb['lb_pvalue'].values[0]

        # 5. Return autocorrelation
        autocorr_1 = np.corrcoef(realized_returns[:-1], realized_returns[1:])[0, 1]

        # 6. BS price vs Student-t adjusted price
        d1 = (np.log(S/K) + (r + 0.5*sigma_bs**2)*T) / (sigma_bs*np.sqrt(T))
        d2 = d1 - sigma_bs*np.sqrt(T)
        bs_call = S * norm.cdf(d1) - K * np.exp(-r*T) * norm.cdf(d2)

        # Student-t adjusted: use t-distribution quantiles instead of Normal
        scale = sigma_bs * np.sqrt((df_t - 2) / df_t) if df_t > 2 else sigma_bs
        # Approximate: BS with fat-tail adjusted vol
        adj_sigma = sigma_bs * np.sqrt(excess_kurtosis / 3 + 1) if excess_kurtosis > 0 else sigma_bs
        d1_adj = (np.log(S/K) + (r + 0.5*adj_sigma**2)*T) / (adj_sigma*np.sqrt(T))
        d2_adj = d1_adj - adj_sigma*np.sqrt(T)
        adj_call = S * norm.cdf(d1_adj) - K * np.exp(-r*T) * norm.cdf(d2_adj)

        return {
            'bs_call': bs_call,
            'fat_tail_adj_call': adj_call,
            'mispricing_pct': (adj_call - bs_call) / bs_call * 100,
            'normality': {
                'jarque_bera_pval': jb_pval,
                'is_normal': jb_pval > 0.05,
                'excess_kurtosis': excess_kurtosis,
                'skewness': skewness,
                'fitted_t_df': df_t,
            },
            'vol_clustering': {
                'ljung_box_pval': vol_cluster_pval,
                'has_clustering': vol_cluster_pval < 0.05,
            },
            'return_autocorr': autocorr_1,
            'violations': {
                'log_normal': jb_pval < 0.05,
                'constant_vol': vol_cluster_pval < 0.05,
                'iid_returns': abs(autocorr_1) > 0.05,
                'fat_tails': excess_kurtosis > 1.0,
            },
        }

    # Example: Analyze real-looking data
    np.random.seed(42)
    # Simulate fat-tailed, clustered returns
    n = 1000
    returns = student_t.rvs(df=5, scale=0.01, size=n)

    result = bs_mispricing_analysis(
        S=100, K=105, T=0.25, r=0.05, sigma_bs=0.20,
        realized_returns=returns,
    )

    print("=== Black-Scholes Assumption Violations ===")
    print(f"BS call: ${result['bs_call']:.4f}")
    print(f"Fat-tail adjusted: ${result['fat_tail_adj_call']:.4f}")
    print(f"Mispricing: {result['mispricing_pct']:.2f}%")
    print(f"\nAssumptions violated:")
    for assumption, violated in result['violations'].items():
        status = "VIOLATED" if violated else "OK"
        print(f"  {assumption}: {status}")
    print(f"\nExcess kurtosis: {result['normality']['excess_kurtosis']:.2f}")
    print(f"Fitted t-df: {result['normality']['fitted_t_df']:.1f}")
  example_bad: |
    # WRONG 1: Trusting BS prices as ground truth
    bs_price = bs_call(100, 105, 0.25, 0.05, 0.20)
    if market_price != bs_price:
        print("Market is wrong!")
    # NO — the market reflects stochastic vol, skew, jumps. BS is the approximation.

    # WRONG 2: Constant volatility for all strikes
    sigma = 0.20
    for K in [80, 90, 100, 110, 120]:
        price = bs_call(100, K, 0.25, 0.05, sigma)
    # Each strike should use its OWN implied vol from the vol surface

    # WRONG 3: Ignoring dividends
    # AAPL pays ~0.5% dividend yield. For 1-year options:
    # BS call without dividend is overpriced by ~S * q * T ≈ $0.50
    # Use S * exp(-q*T) instead of S in the formula

    # WRONG 4: Assuming continuous hedging is free
    # Transaction costs of ~$0.01/share × hedging 50 times/day = $0.50/day
    # For a $3 option, this is 17% of the premium!
  when_applies: "Understanding model risk, choosing appropriate pricing models, calibrating to market data, any context where BS prices diverge significantly from market prices."
  sources:
    - "https://en.wikipedia.org/wiki/Black%E2%80%93Scholes_model"
    - "https://www.investopedia.com/terms/g/greeks.asp"
    - "https://docs.scipy.org/doc/scipy/reference/generated/scipy.stats.norm.html"
