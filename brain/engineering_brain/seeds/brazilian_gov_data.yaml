        if source.last_update < now - STALE_THRESHOLD:
            alert(f"{source.name} is stale!")  # Alert fatigue
  when_applies: "Monitoring freshness of Brazilian government data sources in a fact-checking system"
  sources:
    - "https://dadosabertos.bcb.gov.br/"
    - "https://servicodados.ibge.gov.br/api/docs/"

- id: FC-BR-012
  text: "Cross-reference multiple government data sources to validate facts and detect inconsistencies. Link data using shared identifiers (CPF, CNPJ, IBGE codes) and flag discrepancies for investigation."
  why: >
    No single government source tells the complete story. A politician's declared assets (TSE) must
    be cross-referenced with their salary (Portal da Transparencia) and any contracts with their
    companies (CNPJ lookup). Company sanctions (CEIS) must be checked against active contracts.
    Cross-referencing catches: undeclared conflicts of interest, sanctioned companies receiving
    contracts, claims contradicted by official data. This is where fact-checking adds value beyond
    what any single source provides.
  how_to_do_right: |
    1. Define cross-reference rules: which sources should be linked and on what keys
    2. Primary linking keys: CPF (persons), CNPJ (companies), IBGE code (geographic)
    3. Common cross-references:
       - TSE candidates x Transparencia servants (CPF) → public servant running for office
       - CEIS sanctions x Transparencia contracts (CNPJ) → sanctioned company with active contract
       - TSE donations x CNPJ registry → donation from related companies
    4. Flag discrepancies with severity levels (critical: sanctions+contract, warning: data mismatch)
    5. Store cross-reference results with timestamps and source versions for reproducibility
    6. Update cross-references when any linked source updates
    7. Expose cross-reference results via API for fact-checker consumption
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [fact_checking, data_engineering]
    concern: [domain_specific]
  example_good: |
    from dataclasses import dataclass
    from enum import Enum
    from datetime import datetime

    class DiscrepancySeverity(str, Enum):
        CRITICAL = "critical"
        WARNING = "warning"
        INFO = "info"

    @dataclass
    class CrossReferenceResult:
        entity_id: str  # CPF or CNPJ
        sources_checked: list[str]
        discrepancies: list[dict]
        checked_at: datetime

    class GovernmentCrossReferencer:
        def __init__(self, transparencia, tse, ceis):
            self.transparencia = transparencia
            self.tse = tse
            self.ceis = ceis

        async def check_company(self, cnpj: str) -> CrossReferenceResult:
            discrepancies = []

            # Check sanctions
            sanctions = await self.ceis.check_sanctions(cnpj)
            contracts = await self.transparencia.get_contracts(cnpj=cnpj)

            if sanctions["ceis_sanctions"] and contracts:
                discrepancies.append({
                    "type": "sanctioned_company_with_contracts",
                    "severity": DiscrepancySeverity.CRITICAL,
                    "detail": f"CNPJ {cnpj} is CEIS-sanctioned but has {len(contracts)} active contracts",
                    "sanctions": sanctions["ceis_sanctions"],
                    "contracts": contracts[:5],
                })

            # Check TSE donations from sanctioned companies
            donations = await self.tse.get_donations_by_cnpj(cnpj)
            if sanctions["ceis_sanctions"] and donations:
                discrepancies.append({
                    "type": "sanctioned_company_donating",
                    "severity": DiscrepancySeverity.CRITICAL,
                    "detail": f"CNPJ {cnpj} is CEIS-sanctioned but made {len(donations)} political donations",
                })

            return CrossReferenceResult(
                entity_id=cnpj,
                sources_checked=["transparencia", "tse", "ceis"],
                discrepancies=discrepancies,
                checked_at=datetime.utcnow(),
            )
  example_bad: |
    # Checking only one source — misses cross-source red flags
    contracts = get_contracts(cnpj)
    if contracts:
        print(f"Company has {len(contracts)} contracts")
    # Never checks if company is sanctioned in CEIS
    # Never checks if company donated to campaigns of officials who awarded contracts
  when_applies: "Investigative fact-checking involving government entities, spending, or political claims"
  sources:
    - "https://portaldatransparencia.gov.br/api-de-dados"
    - "https://dadosabertos.tse.jus.br/"
