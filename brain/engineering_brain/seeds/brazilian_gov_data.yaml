            "frequency": UpdateFrequency.MONTHLY,
            "stale_threshold": timedelta(days=45),
            "description": "IBGE IPCA consumer price index",
        },
        "ibge_pnad": {
            "frequency": UpdateFrequency.QUARTERLY,
            "stale_threshold": timedelta(days=120),
            "description": "IBGE PNAD employment survey",
        },
        "ibge_census": {
            "frequency": UpdateFrequency.ANNUAL,
