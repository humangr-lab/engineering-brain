layer: rules
technology: Ethereum
domain: blockchain
knowledge: [{id: "CR-ETH-VIS-001", text: Use external instead of public for functions only called from outside the contract.,
    why: "public copies calldata arguments to memory, costing extra gas per argument. external reads directly from calldata,\
      \ saving 200+ gas per call for functions with array/struct parameters. In high-frequency DeFi contracts, this adds up\
      \ to thousands of dollars in user gas costs.", how_to_do_right: "Mark functions external when they are never called\
      \ internally (this.fn() doesn't count as internal). Use public only when the function is called both externally and\
      \ internally within the contract.", severity: medium, technologies: {lang: [solidity], library: [evm]}, domains: {domain: [
        architecture, blockchain], concern: [gas_optimization]}, example_good: "// Only called externally — calldata stays\
      \ in calldata\nfunction deposit(uint256[] calldata amounts) external {\n    for (uint256 i = 0; i < amounts.length;\
      \ i++) {\n        _processDeposit(amounts[i]);\n    }\n}\n", example_bad: "// public forces calldata → memory copy for\
      \ arrays\nfunction deposit(uint256[] memory amounts) public {\n    for (uint256 i = 0; i < amounts.length; i++) {\n\
      \        _processDeposit(amounts[i]);\n    }\n}\n", when_applies: Projects using Solidity smart contracts or EVM, when_not_applies: 'traditional
      web2 applications, centralized systems. projects not using Solidity or EVM', sources: ["https://docs.soliditylang.org/en/latest/types.html#data-location"]},
  {id: "CR-ETH-REENT-001", text: "Follow checks-effects-interactions pattern AND use ReentrancyGuard for all external calls\
      \ that transfer value.", why: "The DAO hack (2016) drained $60M via reentrancy — the attacker's receive() called back\
      \ into withdraw() before the balance was updated. Checks-effects-interactions alone is error-prone in complex contracts\
      \ with multiple external calls. Belt-and-suspenders: pattern + guard.", how_to_do_right: "1) Check conditions (require).\
      \ 2) Update ALL state (effects). 3) Make external calls last (interactions). 4) Add nonReentrant modifier from OpenZeppelin.\
      \ This covers both single-function and cross-function reentrancy.", severity: critical, technologies: {lang: [solidity],
      platform: [tools, openzeppelin]}, domains: {domain: [architecture, blockchain, security]}, example_good: "import \"\
      @openzeppelin/contracts/security/ReentrancyGuard.sol\";\n\ncontract Vault is ReentrancyGuard {\n    mapping(address\
      \ => uint256) private balances;\n\n    function withdraw(uint256 amount) external nonReentrant {\n        // 1. CHECKS\n\
      \        require(balances[msg.sender] >= amount, \"Insufficient\");\n        // 2. EFFECTS — state updated BEFORE external\
      \ call\n        balances[msg.sender] -= amount;\n        // 3. INTERACTIONS — external call LAST\n        (bool ok,\
      \ ) = msg.sender.call{value: amount}(\"\");\n        require(ok, \"Transfer failed\");\n    }\n}\n", example_bad: "function\
      \ withdraw(uint256 amount) external {\n    require(balances[msg.sender] >= amount);\n    // DANGEROUS: external call\
      \ BEFORE state update\n    (bool ok, ) = msg.sender.call{value: amount}(\"\");\n    require(ok);\n    balances[msg.sender]\
      \ -= amount; // Attacker re-enters before this line\n}\n", when_applies: Any project using Solidity smart contracts
      or OpenZeppelin, when_not_applies: 'traditional web2 applications, centralized systems. projects not using Solidity
      or OpenZeppelin', sources: ["https://docs.openzeppelin.com/contracts/5.x/api/utils#ReentrancyGuard"]}, {id: "CR-ETH-REENT-002",
    text: "Guard against cross-contract reentrancy by updating state before calling any external contract.", why: "Cross-contract\
      \ reentrancy happens when Contract A calls Contract B, and B calls back into Contract C which reads stale state from\
      \ A. Single-contract ReentrancyGuard does NOT protect against this. The Curve/Vyper exploit (2023) drained $70M+ via\
      \ cross-contract reentrancy through read-only reentrancy.", how_to_do_right: "Update all shared state variables before\
      \ any external call, even to trusted contracts. Use reentrancy locks on view functions that expose critical state. Consider\
      \ protocol-level reentrancy guards that span multiple contracts.", severity: critical, technologies: {lang: [solidity],
      library: [defi]}, domains: {domain: [architecture, blockchain, security]}, example_good: "// Update LP token state BEFORE\
      \ calling external price oracle\nfunction removeLiquidity(uint256 shares) external nonReentrant {\n    uint256 amount\
      \ = (shares * totalAssets) / totalSupply;\n    totalSupply -= shares;        // Effect first\n    totalAssets -= amount;\
      \         // Effect first\n    balanceOf[msg.sender] -= shares;\n    asset.transfer(msg.sender, amount); // Interaction\
      \ last\n}\n", example_bad: "function removeLiquidity(uint256 shares) external {\n    uint256 amount = (shares * totalAssets)\
      \ / totalSupply;\n    asset.transfer(msg.sender, amount); // External call with stale totalSupply\n    totalSupply -=\
      \ shares;        // Updated AFTER — other contracts read stale\n    totalAssets -= amount;\n}\n", when_applies: Any
      project using Solidity smart contracts or DeFi, when_not_applies: 'traditional web2 applications, centralized systems.
      projects not using Solidity or DeFi', sources: ["https://ethereum.org/en/developers/docs/smart-contracts/security/#reentrancy"]},
  {id: "CR-ETH-DATA-001", text: "Use calldata for read-only function parameters, memory for mutable local copies, and minimize\
      \ storage reads/writes.", why: "Storage reads (SLOAD) cost 2100 gas cold / 100 warm. Storage writes (SSTORE) cost 20000\
      \ gas for new values / 5000 for updates. Memory is 3 gas per word. Calldata is cheapest for external function inputs.\
      \ Incorrect data location is the #1 source of unnecessary gas costs.", how_to_do_right: "External function array/struct\
      \ params: calldata. Internal function params or local copies: memory. Cache storage values in local variables when reading\
      \ multiple times. Batch storage writes.", severity: high, technologies: {lang: [solidity], library: [evm]}, domains: {
      domain: [architecture, blockchain], concern: [gas_optimization]}, example_good: "// Cache storage read — 1 SLOAD instead\
      \ of N\nfunction getTotalRewards(address[] calldata users) external view returns (uint256 total) {\n    mapping(address\
      \ => uint256) storage _rewards = rewards;\n    for (uint256 i = 0; i < users.length; i++) {\n        total += _rewards[users[i]];\
      \ // Storage pointer, still SLOADs but optimized\n    }\n}\n\n// Use calldata for read-only external params\nfunction\
      \ processIds(uint256[] calldata ids) external {\n    // calldata — no memory copy cost\n}\n", example_bad: "// memory\
      \ forces calldata → memory copy (expensive for large arrays)\nfunction processIds(uint256[] memory ids) external {\n\
      \    // Unnecessary copy\n}\n// Reading storage in a loop without caching\nfunction sum() external view returns (uint256\
      \ s) {\n    for (uint256 i = 0; i < array.length; i++) { // array.length is SLOAD each iteration\n        s += array[i];\
      \ // Another SLOAD each iteration\n    }\n}\n", when_applies: Projects using Solidity smart contracts or EVM, when_not_applies: 'traditional
      web2 applications, centralized systems. projects not using Solidity or EVM', sources: ["https://docs.soliditylang.org/en/latest/types.html#data-location"]},
  {id: "CR-ETH-ERR-001", text: Use custom errors instead of require with string messages for gas savings and structured error
      data., why: "require('string') stores the entire string in bytecode and ABI-encodes it on revert, costing ~50 gas per\
      \ character in deployment and runtime. Custom errors use only 4-byte selectors and can carry typed parameters. On a\
      \ contract deployed to mainnet, this saves thousands of gas and enables better error handling in frontends.", how_to_do_right: "Define\
      \ custom errors at contract level. Use if/revert instead of require. Include relevant parameters in the error for debugging.",
    severity: medium, technologies: {lang: [solidity]}, domains: {domain: [architecture, blockchain], concern: [gas_optimization]},
    example_good: "error InsufficientBalance(address account, uint256 available, uint256 required);\nerror Unauthorized(address\
      \ caller);\n\nfunction withdraw(uint256 amount) external {\n    if (balances[msg.sender] < amount) {\n        revert\
      \ InsufficientBalance(msg.sender, balances[msg.sender], amount);\n    }\n    // ...\n}\n", example_bad: "function withdraw(uint256\
      \ amount) external {\n    // String stored in bytecode — wastes deployment gas\n    require(balances[msg.sender] >=\
      \ amount, \"Insufficient balance for withdrawal\");\n}\n", when_applies: Projects using Solidity smart contracts, when_not_applies: 'traditional
      web2 applications, centralized systems. projects not using Solidity', sources: ["https://docs.soliditylang.org/en/latest/abi-spec.html#errors"]},
  {id: "CR-ETH-EVENT-001", text: "Emit events for every state change that off-chain systems need to track.", why: "Events\
      \ are the primary mechanism for dApps and indexers (TheGraph, Goldsky) to track on-chain activity. Without events, frontends\
      \ must simulate every transaction to detect changes — expensive and unreliable. Indexed parameters enable efficient\
      \ filtering (up to 3 indexed per event).", how_to_do_right: "Emit events after state changes succeed. Index parameters\
      \ used for filtering (addresses, IDs). Include both old and new values for critical state changes. Keep non-indexed\
      \ data for context.", severity: high, technologies: {lang: [solidity], library: [thegraph]}, domains: {domain: [architecture,
        blockchain], concern: [indexing]}, example_good: "event Transfer(address indexed from, address indexed to, uint256\
      \ value);\nevent OwnershipTransferred(address indexed previousOwner, address indexed newOwner);\n\nfunction transfer(address\
      \ to, uint256 amount) external returns (bool) {\n    balances[msg.sender] -= amount;\n    balances[to] += amount;\n\
      \    emit Transfer(msg.sender, to, amount); // Indexed for filtering\n    return true;\n}\n", example_bad: "function\
      \ transfer(address to, uint256 amount) external {\n    balances[msg.sender] -= amount;\n    balances[to] += amount;\n\
      \    // No event — off-chain systems can't detect this transfer\n}\n", when_applies: Projects using Solidity smart contracts
      or TheGraph, when_not_applies: 'traditional web2 applications, centralized systems. projects not using Solidity or TheGraph',
    sources: ["https://docs.soliditylang.org/en/latest/abi-spec.html#events"]}, {id: "CR-ETH-CONST-001", text: "Use immutable\
      \ for constructor-set values and constant for compile-time values — never storage for values that don't change.", why: "constant\
      \ values are inlined at compile time (zero gas to read). immutable values are stored in bytecode (not storage) after\
      \ construction, costing 3 gas vs 2100 gas for a cold SLOAD. A token contract reading its own address or decimals from\
      \ storage wastes gas on every single call.", how_to_do_right: "Mark values known at compile time as constant. Mark values\
      \ set once in constructor as immutable. Only use storage variables for values that genuinely change.", severity: medium,
    technologies: {lang: [solidity], library: [evm]}, domains: {domain: [architecture, blockchain], concern: [gas_optimization]},
    example_good: "contract Token {\n    string public constant NAME = \"MyToken\";     // Compile-time: 0 gas read\n    uint8\
      \ public constant DECIMALS = 18;          // Compile-time: 0 gas read\n    address public immutable FACTORY;       \
      \      // Set in constructor: 3 gas read\n    uint256 public immutable DEPLOY_TIMESTAMP;\n\n    constructor(address\
      \ factory) {\n        FACTORY = factory;\n        DEPLOY_TIMESTAMP = block.timestamp;\n    }\n}\n", example_bad: "contract\
      \ Token {\n    string public name = \"MyToken\";    // Storage: 2100 gas cold read\n    uint8 public decimals = 18;\
      \         // Storage: 2100 gas cold read\n    address public factory;             // Storage: 2100 gas cold read\n}\n",
    when_applies: Projects using Solidity smart contracts or EVM, when_not_applies: 'traditional web2 applications, centralized
      systems. projects not using Solidity or EVM', sources: ["https://docs.soliditylang.org/en/latest/contracts.html#constant-and-immutable-state-variables"]},
  {id: "CR-ETH-MATH-001", text: "Use unchecked blocks for arithmetic that provably cannot overflow — typically loop counters\
      \ and post-validation math.", why: "Solidity 0.8+ adds overflow/underflow checks on every arithmetic operation, costing\
      \ ~30 gas each. In a loop iterating 1000 times, that's 30,000 gas wasted on checking i++ when i is bounded by array.length.\
      \ For validated math (e.g., balance already checked >= amount), the check is redundant.", how_to_do_right: "Wrap provably\
      \ safe arithmetic in unchecked {}. Common safe cases: loop counter increment, subtraction after >= check, addition of\
      \ values known to be bounded. NEVER unchecked user-controlled arithmetic.", severity: medium, technologies: {lang: [
        solidity]}, domains: {domain: [architecture, blockchain], concern: [gas_optimization]}, example_good: "function sum(uint256[]\
      \ calldata values) external pure returns (uint256 total) {\n    for (uint256 i = 0; i < values.length;) {\n        total\
      \ += values[i];\n        unchecked { ++i; } // Safe: i < values.length guarantees no overflow\n    }\n}\n\nfunction\
      \ withdraw(uint256 amount) external {\n    require(balances[msg.sender] >= amount);\n    unchecked {\n        balances[msg.sender]\
      \ -= amount; // Safe: checked above\n    }\n}\n", example_bad: "// DANGEROUS: unchecked on user-controlled values\n\
      unchecked {\n    balances[msg.sender] += userProvidedAmount; // Can overflow!\n}\n", when_applies: Projects using Solidity
      smart contracts, when_not_applies: 'traditional web2 applications, centralized systems. projects not using Solidity',
    sources: ["https://docs.soliditylang.org/en/latest/control-structures.html#checked-or-unchecked-arithmetic"]}, {id: "CR-ETH-PACK-001",
    text: "Pack struct and storage variables into 32-byte slots — order variables by size to minimize storage slots used.",
    why: "Each storage slot is 32 bytes. A uint8 followed by an address followed by a uint8 uses 3 slots (96 bytes). Reordering\
      \ to uint8, uint8, address packs into 2 slots (64 bytes). Each unnecessary slot costs 20,000 gas on first write. For\
      \ frequently-written structs, packing saves $10+ per transaction at current gas prices.", how_to_do_right: "Group variables\
      \ smaller than 32 bytes together. Order: smallest types first within a group. Use uint96 for balances that fit, uint48\
      \ for timestamps, uint8 for flags. Verify packing with forge inspect or storage layout tools.", severity: high, technologies: {
      lang: [solidity], library: [evm]}, domains: {domain: [architecture, blockchain], concern: [gas_optimization]}, example_good: "struct\
      \ Position {\n    uint96 amount;      // 12 bytes \\\n    uint48 timestamp;   // 6 bytes   | = 30 bytes → 1 slot\n \
      \   bool active;        // 1 byte   /\n    uint8 tier;         // 1 byte  /\n    address owner;      // 20 bytes \\\n\
      \    uint96 rewards;     // 12 bytes  | = 32 bytes → 1 slot\n}\n// Total: 2 slots = 64 bytes\n", example_bad: "struct\
      \ Position {\n    uint256 amount;     // 32 bytes → slot 0\n    bool active;        // 1 byte → slot 1 (wastes 31 bytes)\n\
      \    address owner;      // 20 bytes → slot 2 (wastes 12 bytes)\n    uint256 rewards;    // 32 bytes → slot 3\n    uint48\
      \ timestamp;   // 6 bytes → slot 4 (wastes 26 bytes)\n    uint8 tier;         // 1 byte → slot 4 (still wastes 25 bytes)\n\
      }\n// Total: 5 slots = 160 bytes — 2.5x more gas\n", when_applies: Projects using Solidity smart contracts or EVM, when_not_applies: 'traditional
      web2 applications, centralized systems. projects not using Solidity or EVM', sources: ["https://docs.soliditylang.org/en/latest/internals/layout_in_storage.html"]},
  {id: "CR-ETH-OZ-001", text: "Use AccessControl with role-based permissions instead of Ownable for contracts with multiple\
      \ privileged operations.", why: "Ownable has a single owner with god-mode access. If that key is compromised, everything\
      \ is lost. AccessControl enables granular roles (MINTER, PAUSER, ADMIN) with separate key holders, reducing blast radius.\
      \ The Ronin Bridge hack ($625M) exploited a single-key ownership pattern.", how_to_do_right: "Define granular roles\
      \ as bytes32 constants. Grant minimum necessary roles per address. Use timelock for admin role changes. Separate ADMIN\
      \ role from operational roles. Consider multi-sig for DEFAULT_ADMIN_ROLE.", severity: high, technologies: {lang: [solidity],
      platform: [tools, openzeppelin]}, domains: {domain: [architecture, blockchain, security]}, example_good: "import \"\
      @openzeppelin/contracts/access/AccessControl.sol\";\n\ncontract Treasury is AccessControl {\n    bytes32 public constant\
      \ WITHDRAWER = keccak256(\"WITHDRAWER\");\n    bytes32 public constant PAUSER = keccak256(\"PAUSER\");\n\n    constructor(address\
      \ admin) {\n        _grantRole(DEFAULT_ADMIN_ROLE, admin);\n        // Admin can grant/revoke WITHDRAWER and PAUSER\n\
      \    }\n\n    function withdraw(uint256 amount) external onlyRole(WITHDRAWER) {\n        // Only WITHDRAWER role — not\
      \ admin\n    }\n\n    function pause() external onlyRole(PAUSER) {\n        // Only PAUSER role — separate key\n   \
      \ }\n}\n", example_bad: "import \"@openzeppelin/contracts/access/Ownable.sol\";\n\ncontract Treasury is Ownable {\n\
      \    // Single key controls EVERYTHING — one compromise = total loss\n    function withdraw(uint256 amount) external\
      \ onlyOwner { }\n    function pause() external onlyOwner { }\n    function changeOracle(address oracle) external onlyOwner\
      \ { }\n}\n", when_applies: Projects using Solidity smart contracts or OpenZeppelin, when_not_applies: 'traditional web2
      applications, centralized systems. projects not using Solidity or OpenZeppelin', sources: ["https://docs.openzeppelin.com/contracts/5.x/api/access#AccessControl"]},
  {id: "CR-ETH-OZ-002", text: "Implement Pausable for contracts holding significant value — pause must be operable by a dedicated\
      \ role, not just owner.", why: "When an exploit is detected, you have minutes to react. Without Pausable, the only option\
      \ is deploying a new contract (too slow). The Wormhole hack ($320M) could have been partially mitigated with a fast\
      \ pause mechanism. Pause must NOT require the same key as admin — admin keys are usually in cold storage.", how_to_do_right: "Inherit\
      \ Pausable. Add whenNotPaused to value-transfer functions. Create a dedicated PAUSER role with a hot wallet or multi-sig\
      \ with low threshold. Keep admin role in timelock/cold storage.", severity: high, technologies: {lang: [solidity], platform: [
        tools, openzeppelin]}, domains: {domain: [architecture, blockchain, security]}, example_good: "import \"@openzeppelin/contracts/security/Pausable.sol\"\
      ;\nimport \"@openzeppelin/contracts/access/AccessControl.sol\";\n\ncontract Bridge is Pausable, AccessControl {\n  \
      \  bytes32 public constant GUARDIAN = keccak256(\"GUARDIAN\");\n\n    function bridgeTokens(uint256 amount) external\
      \ whenNotPaused {\n        // Protected — can be paused in emergency\n    }\n\n    function emergencyPause() external\
      \ onlyRole(GUARDIAN) {\n        _pause(); // Guardian = hot wallet, can react in seconds\n    }\n}\n", example_bad: "contract\
      \ Bridge {\n    // No pause mechanism — exploit drains everything before team reacts\n    function bridgeTokens(uint256\
      \ amount) external {\n        _transfer(msg.sender, amount);\n    }\n}\n", when_applies: Projects using Solidity smart
      contracts or OpenZeppelin, when_not_applies: 'traditional web2 applications, centralized systems. projects not using
      Solidity or OpenZeppelin', sources: ["https://docs.openzeppelin.com/contracts/5.x/api/utils#Pausable"]}, {id: "CR-ETH-PROXY-001",
    text: "Use UUPS proxies for most upgradeable contracts — choose Transparent proxy only when upgrade logic must be admin-only\
      \ at the proxy level.", why: "Transparent proxies deploy a separate ProxyAdmin contract, adding gas overhead on every\
      \ call (admin check via msg.sender). UUPS puts upgrade logic in the implementation, saving ~2000 gas per call. UUPS\
      \ also allows removing upgradeability permanently by not including upgrade functions in a future implementation.", how_to_do_right: "Use\
      \ UUPSUpgradeable from OpenZeppelin. Override _authorizeUpgrade with access control. Use Transparent proxy only for\
      \ protocols where governance upgradeability must be enforced at proxy level (e.g., protocol DAOs).", severity: high,
    technologies: {lang: [solidity], platform: [tools, openzeppelin]}, domains: {domain: [architecture, blockchain]}, example_good: "import\
      \ \"@openzeppelin/contracts-upgradeable/proxy/utils/UUPSUpgradeable.sol\";\nimport \"@openzeppelin/contracts-upgradeable/access/OwnableUpgradeable.sol\"\
      ;\n\ncontract VaultV1 is UUPSUpgradeable, OwnableUpgradeable {\n    function initialize(address owner) public initializer\
      \ {\n        __Ownable_init(owner);\n        __UUPSUpgradeable_init();\n    }\n\n    function _authorizeUpgrade(address)\
      \ internal override onlyOwner {}\n}\n", example_bad: "// Using Transparent proxy for a simple vault — unnecessary gas\
      \ overhead\n// Every call checks if msg.sender == admin at proxy level\n", when_applies: Projects using Solidity smart
      contracts or OpenZeppelin, when_not_applies: 'traditional web2 applications, centralized systems. projects not using
      Solidity or OpenZeppelin', sources: ["https://docs.openzeppelin.com/contracts/5.x/api/proxy#UUPSUpgradeable"]}, {id: "CR-ETH-PROXY-002",
    text: Never leave implementation contracts uninitialized — call _disableInitializers in the constructor., why: "An uninitialized\
      \ implementation contract can be initialized by an attacker, who becomes the owner. They can then selfdestruct the implementation\
      \ (pre-Dencun) or manipulate storage, bricking all proxies pointing to it. This has caused multiple real exploits including\
      \ the Wormhole implementation takeover.", how_to_do_right: "Add a constructor with _disableInitializers() to every upgradeable\
      \ implementation. Use OpenZeppelin's Initializable. Never use constructors for state in implementation contracts.",
    severity: critical, technologies: {lang: [solidity], platform: [tools, openzeppelin]}, domains: {domain: [architecture,
        blockchain, security]}, example_good: "contract VaultV1 is UUPSUpgradeable, OwnableUpgradeable {\n    /// @custom:oz-upgrades-unsafe-allow\
      \ constructor\n    constructor() {\n        _disableInitializers(); // Prevents initialization of implementation\n \
      \   }\n\n    function initialize(address owner) public initializer {\n        __Ownable_init(owner);\n        __UUPSUpgradeable_init();\n\
      \    }\n}\n", example_bad: "contract VaultV1 is UUPSUpgradeable, OwnableUpgradeable {\n    // No constructor — attacker\
      \ can call initialize() on the implementation\n    function initialize(address owner) public initializer {\n       \
      \ __Ownable_init(owner);\n    }\n}\n", when_applies: Any project using Solidity smart contracts or OpenZeppelin, when_not_applies: 'traditional
      web2 applications, centralized systems. projects not using Solidity or OpenZeppelin', sources: ["https://docs.openzeppelin.com/contracts/5.x/api/proxy#Initializable"]},
  {id: "CR-ETH-PROXY-003", text: "Use EIP-1967 storage slots for proxy state to prevent storage collisions with implementation\
      \ contracts.", why: "Without standardized storage slots, the proxy's admin/implementation address variables can collide\
      \ with implementation storage variables. This causes catastrophic data corruption — an address written as admin could\
      \ overwrite a user's balance. EIP-1967 uses hash-derived slots that are practically impossible to collide with.", how_to_do_right: "Use\
      \ OpenZeppelin's proxy contracts which implement EIP-1967 automatically. If building custom proxies, use the standard\
      \ slot positions: keccak256('eip1967.proxy.implementation') - 1 for implementation address.", severity: critical, technologies: {
      lang: [solidity], library: [evm]}, domains: {domain: [architecture, blockchain, security]}, example_good: "// OpenZeppelin\
      \ handles this — just use their proxy base\nimport \"@openzeppelin/contracts/proxy/ERC1967/ERC1967Proxy.sol\";\n\n//\
      \ Storage slot: bytes32(uint256(keccak256(\"eip1967.proxy.implementation\")) - 1)\n// = 0x360894a13ba1a3210667c828492db98dca3e2076cc3735a920a3ca505d382bbc\n",
    example_bad: "contract NaiveProxy {\n    address public implementation; // Slot 0 — collides with impl's first variable!\n\
      \    address public admin;          // Slot 1 — collides with impl's second variable!\n\n    fallback() external payable\
      \ {\n        // delegatecall to implementation — storage collision guaranteed\n    }\n}\n", when_applies: Any project
      using Solidity smart contracts or EVM, when_not_applies: 'traditional web2 applications, centralized systems. projects
      not using Solidity or EVM', sources: ["https://eips.ethereum.org/EIPS/eip-1967"]}, {id: "CR-ETH-SEC-001", text: "Use\
      \ commit-reveal schemes or private mempools for transactions vulnerable to front-running.", why: "Every pending transaction\
      \ in the public mempool is visible to MEV bots. A large DEX swap can be sandwiched (bot buys before, sells after) costing\
      \ users 1-5% in slippage. NFT mints can be sniped. Auction bids can be outbid at the last second.", how_to_do_right: "Implement\
      \ commit-reveal: Phase 1 — user submits hash(value + salt). Phase 2 — user reveals value + salt after commit period.\
      \ Alternatively, use Flashbots Protect for private transaction submission.", severity: high, technologies: {lang: [
        solidity], library: [mev]}, domains: {domain: [architecture, blockchain, security]}, example_good: "contract CommitRevealAuction\
      \ {\n    mapping(address => bytes32) public commits;\n    uint256 public commitDeadline;\n    uint256 public revealDeadline;\n\
      \n    function commit(bytes32 hash) external {\n        require(block.timestamp < commitDeadline);\n        commits[msg.sender]\
      \ = hash;\n    }\n\n    function reveal(uint256 bid, bytes32 salt) external payable {\n        require(block.timestamp\
      \ >= commitDeadline && block.timestamp < revealDeadline);\n        require(keccak256(abi.encodePacked(bid, salt)) ==\
      \ commits[msg.sender]);\n        // Process bid\n    }\n}\n", example_bad: "contract NaiveAuction {\n    function bid()\
      \ external payable {\n        // Visible in mempool — front-runner submits higher bid with more gas\n        require(msg.value\
      \ > highestBid);\n        highestBid = msg.value;\n    }\n}\n", when_applies: Projects using Solidity smart contracts
      or MEV, when_not_applies: 'traditional web2 applications, centralized systems. projects not using Solidity or MEV',
    sources: ["https://ethereum.org/en/developers/docs/mev/"]}, {id: "CR-ETH-SEC-002", text: "Use TWAP (Time-Weighted Average\
      \ Price) or Chainlink feeds — never use spot prices from a single DEX for critical calculations.", why: "Spot prices\
      \ from AMMs can be manipulated within a single transaction using flash loans. An attacker borrows millions, moves the\
      \ price, triggers your contract's price-dependent logic, then repays — all atomically. The Mango Markets exploit ($100M+)\
      \ and dozens of lending protocol exploits used this exact pattern.", how_to_do_right: "Use Chainlink price feeds with\
      \ staleness checks. For on-chain TWAP, use Uniswap V3's built-in TWAP oracle with a sufficiently long window (30+ minutes).\
      \ Always check oracle freshness — stale prices are as dangerous as manipulated ones.", severity: critical, technologies: {
      lang: [solidity], platform: [oracle, chainlink, defi, uniswap]}, domains: {domain: [architecture, blockchain, security],
      concern: [defi]}, example_good: "import \"@chainlink/contracts/src/v0.8/interfaces/AggregatorV3Interface.sol\";\n\n\
      function getPrice(address feed) internal view returns (uint256) {\n    AggregatorV3Interface oracle = AggregatorV3Interface(feed);\n\
      \    (, int256 price, , uint256 updatedAt, ) = oracle.latestRoundData();\n    require(price > 0, \"Invalid price\");\n\
      \    require(block.timestamp - updatedAt < 3600, \"Stale price\"); // Max 1 hour\n    return uint256(price);\n}\n",
    example_bad: "function getPrice(address pair) internal view returns (uint256) {\n    // DANGEROUS: spot price manipulable\
      \ via flash loan in same tx\n    (uint112 reserve0, uint112 reserve1, ) = IUniswapV2Pair(pair).getReserves();\n    return\
      \ (uint256(reserve1) * 1e18) / uint256(reserve0);\n}\n", when_applies: 'Any project using Solidity smart contracts,
      Chainlink, or Uniswap', when_not_applies: 'traditional web2 applications, centralized systems', sources: ["https://docs.chain.link/data-feeds"]},
  {id: "CR-ETH-SEC-003", text: Never use tx.origin for authorization — always use msg.sender., why: "tx.origin is the EOA\
      \ that initiated the transaction chain. If an authorized user calls a malicious contract, that contract can call your\
      \ contract and tx.origin will still be the authorized user. This enables phishing attacks where a user signs a seemingly\
      \ innocent transaction that drains their funds from your contract.", how_to_do_right: "Always use msg.sender for authorization\
      \ checks. msg.sender is the immediate caller, which is the correct security boundary. The only valid use of tx.origin\
      \ is to verify that the caller is an EOA (tx.origin == msg.sender), not a contract.", severity: critical, technologies: {
      lang: [solidity], library: [evm]}, domains: {domain: [architecture, blockchain, security]}, example_good: "function\
      \ withdraw() external {\n    require(msg.sender == owner, \"Not owner\"); // Correct: checks immediate caller\n}\n",
    example_bad: "function withdraw() external {\n    // VULNERABLE: if owner calls malicious contract, it can call this\n\
      \    require(tx.origin == owner, \"Not owner\");\n}\n", when_applies: Any project using Solidity smart contracts or
      EVM, when_not_applies: 'traditional web2 applications, centralized systems. projects not using Solidity or EVM', sources: [
      "https://docs.soliditylang.org/en/latest/security-considerations.html#tx-origin"]}, {id: "CR-ETH-TEST-001", text: Use
      Foundry for fuzz testing and invariant testing — these catch edge cases that unit tests miss., why: "Unit tests verify\
      \ known scenarios. Fuzz tests generate random inputs that reveal unexpected failures — integer edge cases, empty arrays,\
      \ max values, zero addresses. Invariant tests verify properties that must ALWAYS hold (total supply = sum of balances).\
      \ The Euler Finance exploit ($197M) might have been caught by invariant testing the accounting equations.", how_to_do_right: "Write\
      \ fuzz tests for all public functions with forge test. Define invariant tests for critical properties. Use bound() to\
      \ constrain fuzz inputs to valid ranges. Run fork tests against mainnet state for integration testing.", severity: high,
    technologies: {lang: [solidity], platform: [tools, foundry]}, domains: {domain: [architecture, blockchain, testing]},
    example_good: "// Fuzz test — Foundry generates random inputs\nfunction testFuzz_deposit(uint256 amount) public {\n  \
      \  amount = bound(amount, 1, type(uint96).max); // Constrain to valid range\n    deal(address(token), user, amount);\n\
      \n    vm.prank(user);\n    vault.deposit(amount);\n\n    assertEq(vault.balanceOf(user), amount);\n    assertEq(token.balanceOf(address(vault)),\
      \ amount);\n}\n\n// Invariant test — must ALWAYS hold\nfunction invariant_totalSupplyMatchesBalances() public {\n  \
      \  uint256 sum = 0;\n    for (uint256 i = 0; i < actors.length; i++) {\n        sum += vault.balanceOf(actors[i]);\n\
      \    }\n    assertEq(vault.totalSupply(), sum);\n}\n", example_bad: "// Only testing happy path with hardcoded values\n\
      function test_deposit() public {\n    vault.deposit(100); // What about 0? type(uint256).max? Odd numbers?\n    assertEq(vault.balanceOf(address(this)),\
      \ 100);\n}\n", when_applies: Projects using Foundry or Solidity smart contracts, when_not_applies: 'traditional web2
      applications, centralized systems. projects not using Foundry or Solidity', sources: ["https://book.getfoundry.sh/forge/fuzz-testing"]},
  {id: "CR-ETH-GAS-001", text: 'Batch multiple operations into a single transaction to amortize base transaction cost (21,000
      gas).', why: "Every Ethereum transaction has a base cost of 21,000 gas (~$2-5 at typical gas prices). Sending 100 token\
      \ transfers individually costs 100 * 21,000 = 2.1M gas in base costs alone. Batching into one call costs 21,000 gas\
      \ base + the operations. For airdrops, NFT mints, or multi-transfers, batching saves 90%+ on base costs.", how_to_do_right: "Implement\
      \ batch functions that accept arrays. Use Multicall3 for batching calls to existing contracts. Limit batch size to avoid\
      \ exceeding block gas limit. Emit individual events within the batch for indexing.", severity: medium, technologies: {
      lang: [solidity], library: [evm]}, domains: {domain: [architecture, blockchain], concern: [gas_optimization]}, example_good: "function\
      \ batchTransfer(\n    address[] calldata recipients,\n    uint256[] calldata amounts\n) external {\n    require(recipients.length\
      \ == amounts.length, \"Length mismatch\");\n    require(recipients.length <= 200, \"Batch too large\");\n    for (uint256\
      \ i = 0; i < recipients.length;) {\n        _transfer(msg.sender, recipients[i], amounts[i]);\n        unchecked { ++i;\
      \ }\n    }\n}\n", example_bad: "// 100 separate transactions — 100x base cost\nfor (uint i = 0; i < recipients.length;\
      \ i++) {\n    token.transfer(recipients[i], amounts[i]); // Each is a separate tx\n}\n", when_applies: Projects using
      Solidity smart contracts or EVM, when_not_applies: 'traditional web2 applications, centralized systems. projects not
      using Solidity or EVM', sources: ["https://ethereum.org/en/developers/docs/gas/"]}, {id: "CR-ETH-DEPLOY-001", text: Use
      CREATE2 for deterministic contract addresses when the address must be known before deployment., why: "Regular CREATE\
      \ uses the deployer's nonce, making the address unpredictable and different across chains. CREATE2 uses salt + init\
      \ code hash, producing the same address on every chain. This enables counterfactual deployments (telling users an address\
      \ before deploying), cross-chain address consistency, and factory patterns.", how_to_do_right: "Use a factory contract\
      \ with CREATE2. Compute the address off-chain with keccak256(0xff, factory, salt, keccak256(initCode)). Verify deployed\
      \ address matches expected. Use unique salts per deployment to prevent front-running.", severity: medium, technologies: {
      lang: [solidity], library: [evm]}, domains: {domain: [architecture, blockchain, operations, deployment]}, example_good: "contract\
      \ Factory {\n    function deploy(bytes32 salt, bytes memory bytecode)\n        external returns (address deployed)\n\
      \    {\n        assembly {\n            deployed := create2(0, add(bytecode, 0x20), mload(bytecode), salt)\n       \
      \ }\n        require(deployed != address(0), \"Deploy failed\");\n    }\n\n    function computeAddress(bytes32 salt,\
      \ bytes memory bytecode)\n        external view returns (address)\n    {\n        return address(uint160(uint256(keccak256(abi.encodePacked(\n\
      \            bytes1(0xff), address(this), salt, keccak256(bytecode)\n        )))));\n    }\n}\n", example_bad: "// Regular\
      \ CREATE — address depends on deployer nonce\n// Different address on each chain, can't pre-compute\nnew Token(); //\
      \ address = keccak256(deployer, nonce) — unpredictable\n", when_applies: Projects using Solidity smart contracts or
      EVM, when_not_applies: 'traditional web2 applications, centralized systems. projects not using Solidity or EVM', sources: [
      "https://docs.soliditylang.org/en/latest/control-structures.html#salted-contract-creations-create2"]}, {id: "CR-ETH-GAS-002",
    text: Use mappings for O(1) lookups — use arrays only when you need enumeration or ordered access., why: "Arrays in Solidity\
      \ require linear search for lookups (O(n) gas cost). A mapping provides O(1) access by key. For a whitelist of 10,000\
      \ addresses, checking membership via array costs up to 10,000 SLOADs (21M gas worst case) vs 1 SLOAD (2,100 gas) with\
      \ a mapping.", how_to_do_right: "Use mapping(address => bool) for existence checks. Use mapping(address => uint256)\
      \ for balances. If you need both lookup AND enumeration, use OpenZeppelin's EnumerableSet or maintain a mapping + array\
      \ pair.", severity: high, technologies: {lang: [solidity], library: [evm]}, domains: {domain: [architecture, blockchain],
      concern: [gas_optimization]}, example_good: "mapping(address => bool) public whitelisted;\n\nfunction isWhitelisted(address\
      \ user) external view returns (bool) {\n    return whitelisted[user]; // O(1) — single SLOAD\n}\n", example_bad: "address[]\
      \ public whitelist;\n\nfunction isWhitelisted(address user) external view returns (bool) {\n    // O(n) — scans entire\
      \ array, catastrophic gas for large lists\n    for (uint256 i = 0; i < whitelist.length; i++) {\n        if (whitelist[i]\
      \ == user) return true;\n    }\n    return false;\n}\n", when_applies: Projects using Solidity smart contracts or EVM,
    when_not_applies: 'traditional web2 applications, centralized systems. projects not using Solidity or EVM', sources: [
      "https://docs.soliditylang.org/en/latest/types.html#mappings"]},
  {id: "CR-ETH-PMK-001", text: "Use the Gnosis Conditional Tokens Framework (CTF) for prediction market outcome tokenization — it provides standardized ERC-1155 position tokens, atomic splits/merges, and condition-based redemption.", why: "Building prediction market infrastructure from scratch requires solving: outcome tokenization, position accounting, oracle integration, and reward distribution — all with high exploit risk. CTF is battle-tested across Polymarket, Augur v2, and Omen with over $1B in volume. CTF uses ERC-1155 conditional tokens where each token represents a (collateral, condition, outcome) tuple. Position splitting and merging is atomic. Rewriting this logic introduces reentrancy and accounting errors.", how_to_do_right: "Use the official Gnosis CTF contracts (@gnosis.pm/conditional-tokens-contracts). Deploy the ConditionalTokens contract. Use FixedProductMarketMaker for AMM-based markets or an off-chain order book for CEX-style trading. Use Chainlink + UMA optimistic oracle for outcome resolution. Index Transfer events via The Graph for position tracking.", severity: high, technologies: {lang: [solidity], library: [gnosis-ctf, openzeppelin], platform: [ethereum, polygon]}, domains: {domain: [architecture, blockchain], concern: [defi, prediction_markets]}, example_good: "// Split collateral into conditional tokens atomically\n// 100 USDC -> 100 YES + 100 NO tokens (single call)\nuint256[] memory partition = new uint256[](2);\npartition[0] = 1; // YES outcome index 0 (bit 0)\npartition[1] = 2; // NO  outcome index 1 (bit 1)\n\nbytes32 parentCollectionId = bytes32(0);\nIERC20(USDC).approve(address(CTF), amount);\nCTF.splitPosition(\n    USDC,                // Collateral token\n    parentCollectionId,  // Root collection (0x0 for top-level)\n    conditionId,         // The prepared condition\n    partition,           // How to split outcomes\n    amount               // Amount to split\n);\n// User now holds YES and NO tokens — no custom logic needed\n", example_bad: "// Custom prediction market — manual position tracking\ncontract NaiveMarket {\n    mapping(address => uint256) public yesShares;\n    mapping(address => uint256) public noShares;\n    uint256 public totalCollateral;\n\n    function buyYes(uint256 amount) external {\n        yesShares[msg.sender] += amount; // Rounding errors accumulate\n        totalCollateral += amount;        // No atomic split — reentrancy possible\n        // No ERC-1155 composability\n    }\n}\n", when_applies: "Projects building prediction markets on Ethereum or EVM-compatible chains", when_not_applies: "traditional web2 applications, non-prediction-market DeFi", sources: ["https://github.com/gnosis/conditional-tokens-contracts", "https://docs.gnosis.io/conditionaltokens/"]},
  {id: "CR-ETH-ORACLE-001", text: "Use UMA's Optimistic Oracle for subjective event outcome resolution — it provides human-verifiable outcomes with an economic bonding dispute mechanism instead of a single trusted reporter.", why: "On-chain oracle design for prediction markets faces the oracle problem: who decides if 'Candidate X won the election'? A single reporter can be bribed or hacked. Chainlink price feeds cover only financial prices, not event outcomes. UMA's Optimistic Oracle assumes proposed answers are correct unless disputed within a liveness window (2-7 hours). Economic bonding (proposer and disputer stake tokens) aligns incentives — false proposals lose the bond. This powers Polymarket's $1B+ volume.", how_to_do_right: "Integrate UMA's OptimisticOracleV2. Call requestPrice() with your question encoded as ancillary data and a USDC bond. After the liveness period, call settleAndGetPrice(). Handle disputes by implementing callbackOnPriceSettled(). Use UMA's UMIP-approved YES_OR_NO_QUERY identifier for binary markets.", severity: high, technologies: {lang: [solidity], platform: [oracle, uma, ethereum]}, domains: {domain: [architecture, blockchain], concern: [oracle, prediction_markets]}, example_good: "import \"@uma/core/contracts/oracle/interfaces/OptimisticOracleV2Interface.sol\";\n\ncontract UMAMarketResolver {\n    OptimisticOracleV2Interface public immutable OO;\n    bytes32 public constant IDENTIFIER = bytes32('YES_OR_NO_QUERY');\n\n    function requestResolution(bytes32 marketId, string calldata question) external {\n        bytes memory ancillaryData = bytes(question);\n        OO.requestPrice(IDENTIFIER, block.timestamp, ancillaryData, IERC20(USDC), 0);\n        OO.setCustomLiveness(IDENTIFIER, block.timestamp, ancillaryData, 7200); // 2hr liveness\n        emit ResolutionRequested(marketId, ancillaryData);\n    }\n\n    function settle(bytes32 marketId, bytes calldata ancillaryData) external returns (int256 result) {\n        result = OO.settleAndGetPrice(IDENTIFIER, requestTimes[marketId], ancillaryData);\n        // 1e18 = YES, 0 = NO\n        resolvedOutcomes[marketId] = result > 0;\n    }\n}\n", example_bad: "// Single trusted reporter — bribable, hackable\ncontract TrustedOracle {\n    address public reporter;\n    function resolve(bytes32 marketId, bool outcome) external {\n        require(msg.sender == reporter, 'Not reporter');\n        // $1M market decided by one private key — no dispute mechanism\n    }\n}\n", when_applies: "Prediction markets requiring on-chain outcome resolution for non-price events", when_not_applies: "price-only markets (use Chainlink), traditional web2, non-blockchain systems", sources: ["https://docs.umaproject.org/developers/optimistic-oracle-v2", "https://docs.polymarket.com/"]},
  {id: "CR-ETH-GASEST-001", text: "Simulate transactions with eth_call before submission to detect reverts and estimate gas — never let users pay gas for transactions that will fail on-chain.", why: "An 'out of gas' or revert error burns all gas up to the revert point. For a complex settlement consuming 200,000 gas before reverting, the user loses $4-20 with nothing to show. viem's simulateContract runs eth_call (free, off-chain simulation) that catches revert reasons, require failures, and custom errors before the user signs anything. Gas estimation with a 20% buffer prevents 'out of gas' failures caused by state changes between estimation and execution.", how_to_do_right: "Call simulateContract() before writeContract(). Catch simulation errors and decode the revert reason (viem decodes ABI errors automatically). Estimate gas and add 20% buffer. Check user's ETH balance >= estimatedGas * maxFeePerGas. Display estimated cost in USD before the user signs. Use formatGwei and formatEther for human-readable display.", severity: high, technologies: {lang: [typescript], library: [viem], platform: [ethereum]}, domains: {domain: [architecture, blockchain], concern: [gas_optimization, frontend]}, example_good: "import { createPublicClient, formatEther, http } from 'viem';\n\nasync function submitWithValidation(contractConfig, functionName, args, walletClient) {\n    const publicClient = createPublicClient({ chain: mainnet, transport: http() });\n\n    // 1. Simulate (free) — catches reverts before user signs\n    try {\n        const { request } = await publicClient.simulateContract({\n            ...contractConfig, functionName, args,\n            account: walletClient.account,\n        });\n    } catch (err) {\n        // viem decodes custom errors: err.cause?.reason\n        throw new Error(`Will fail: ${err.shortMessage}`);\n    }\n\n    // 2. Estimate gas + 20% buffer\n    const gas = await publicClient.estimateContractGas({\n        ...contractConfig, functionName, args,\n        account: walletClient.account,\n    });\n    const gasLimit = (gas * 120n) / 100n;\n\n    // 3. Check balance\n    const block = await publicClient.getBlock();\n    const maxCost = gasLimit * (block.baseFeePerGas * 2n);\n    const balance = await publicClient.getBalance({ address: walletClient.account.address });\n    if (balance < maxCost) throw new Error(`Need ~${formatEther(maxCost)} ETH`);\n\n    return walletClient.writeContract({ ...contractConfig, functionName, args, gas: gasLimit });\n}\n", example_bad: "// No simulation — user pays for failed transactions\nasync function placeOrder(amount) {\n    const tx = await contract.write.placeOrder([amount]);\n    // Revert discovered AFTER 30-60 second confirmation wait\n    // User pays full gas for nothing\n    // Error: 'execution reverted' — no reason shown\n}\n", when_applies: "Any frontend or backend submitting write transactions to Ethereum or EVM chains", when_not_applies: "read-only blockchain queries, non-Ethereum systems", sources: ["https://viem.sh/docs/contract/simulateContract", "https://ethereum.org/en/developers/docs/gas/"]},
  {id: "CR-ETH-EIP712-001", text: "Use EIP-712 typed structured data signing for off-chain order books and gasless authorizations — typed signatures display human-readable fields in wallet UIs and include a domain separator that prevents cross-chain replay.", why: "Raw bytes32 signing displays as '0xdeadbeef...' in wallet UIs — users cannot verify what they are signing, enabling phishing. EIP-712 typed data signing shows field names and values in MetaMask (e.g., 'Outcome: YES, Amount: 100 USDC, Price: 0.65'). The domain separator (chainId + verifyingContract) prevents replay: a signature for Polygon cannot be replayed on Ethereum. For off-chain order books, users sign for free; relayers submit on-chain.", severity: high, technologies: {lang: [solidity, typescript], library: [viem, openzeppelin]}, domains: {domain: [architecture, blockchain, security], concern: [prediction_markets, defi]}, example_good: "// Contract: EIP-712 verification\nimport \"@openzeppelin/contracts/utils/cryptography/EIP712.sol\";\nimport \"@openzeppelin/contracts/utils/cryptography/ECDSA.sol\";\n\ncontract OrderBook is EIP712 {\n    bytes32 constant ORDER_TYPEHASH = keccak256(\n        \"Order(address maker,bytes32 conditionId,uint8 outcome,uint256 amount,uint256 price,uint256 nonce,uint256 deadline)\"\n    );\n    constructor() EIP712(\"PredictionMarket\", \"1\") {}\n\n    function fillOrder(Order calldata order, bytes calldata sig) external {\n        bytes32 digest = _hashTypedDataV4(keccak256(abi.encode(\n            ORDER_TYPEHASH,\n            order.maker, order.conditionId, order.outcome,\n            order.amount, order.price, order.nonce, order.deadline\n        )));\n        require(ECDSA.recover(digest, sig) == order.maker, \"Bad sig\");\n        require(block.timestamp <= order.deadline, \"Expired\");\n        _fill(order);\n    }\n}\n\n// Frontend: wallet shows field names, not opaque bytes\nconst sig = await walletClient.signTypedData({\n    domain: { name: 'PredictionMarket', version: '1', chainId: 137, verifyingContract: orderBookAddr },\n    types: { Order: [\n        { name: 'maker', type: 'address' },\n        { name: 'conditionId', type: 'bytes32' },\n        { name: 'outcome', type: 'uint8' },\n        { name: 'amount', type: 'uint256' },\n        { name: 'price', type: 'uint256' },\n        { name: 'nonce', type: 'uint256' },\n        { name: 'deadline', type: 'uint256' },\n    ]},\n    primaryType: 'Order',\n    message: order,\n});\n", example_bad: "// Raw hash signing — unreadable in wallet\nconst hash = keccak256(encodePacked(['address','uint256','uint256'], [market, amount, price]));\nconst sig = await wallet.signMessage(toBytes(hash));\n// MetaMask: 'Sign: 0x7f8a9b...' — user cannot verify what they are authorizing\n// No chainId — signature replayable on all EVM chains\n", when_applies: "Off-chain order books, gasless approvals, signed authorizations on Ethereum", when_not_applies: "non-blockchain systems, read-only operations", sources: ["https://eips.ethereum.org/EIPS/eip-712", "https://docs.openzeppelin.com/contracts/5.x/api/utils#EIP712"]},
  {id: "CR-ETH-FLASHGUARD-001", text: "Protect price-dependent operations against flash loan manipulation by using TWAP oracles, not AMM spot prices — any protocol reading spot prices from a single DEX pool is vulnerable to same-block price manipulation.", why: "Flash loans provide uncollateralized loans of any size repayable in the same transaction. Attackers borrow $100M, manipulate AMM reserve ratios, trigger your protocol's spot price read, profit from the mispriced state, and repay — all atomically. This pattern drained $1B+ from DeFi. TWAP (Time-Weighted Average Price) over a 30+ minute window cannot be manipulated within a single block because manipulation would require sustained capital over many blocks, making the attack economically unprofitable.", severity: critical, technologies: {lang: [solidity], library: [defi], platform: [defi, uniswap, chainlink]}, domains: {domain: [architecture, blockchain, security], concern: [defi, prediction_markets]}, how_to_do_right: "Use Chainlink price feeds (off-chain, immune to AMM manipulation) as the primary oracle. Use Uniswap V3 TWAP (30-minute minimum window) as a secondary check. Never use getReserves() from Uniswap V2 or V3 slot0 (instantaneous price) for any critical calculation. Validate price feeds for staleness and deviation. Implement circuit breaker: if Chainlink and TWAP deviate >5%, halt operations.", example_good: "// TWAP-based price — flash loan resistant (30 min window)\nfunction getTWAP(address pool, uint32 interval) internal view returns (uint256) {\n    require(interval >= 1800, \"Min 30min TWAP\");  // Flash loans can't manipulate 30-min TWAPs\n    uint32[] memory secondsAgos = new uint32[](2);\n    secondsAgos[0] = interval; secondsAgos[1] = 0;\n    (int56[] memory tickCumulatives,) = IUniswapV3Pool(pool).observe(secondsAgos);\n    int56 tickDelta = tickCumulatives[1] - tickCumulatives[0];\n    int24 avgTick = int24(tickDelta / int56(int32(interval)));\n    return OracleLibrary.getQuoteAtTick(avgTick, 1e18, token0, token1);\n}\n", example_bad: "// VULNERABLE: reads Uniswap V2 spot price\nfunction getPrice(address pair) internal view returns (uint256) {\n    (uint112 r0, uint112 r1,) = IUniswapV2Pair(pair).getReserves();\n    return (uint256(r1) * 1e18) / uint256(r0);  // Manipulable in same block\n}\n// Attacker: flash loan $100M WETH → buy all USDC → your price reads 10x inflated → profit\n", when_applies: "DeFi protocols using on-chain price data, prediction market collateral valuation", when_not_applies: "non-financial contracts, read-only operations", sources: ["https://blog.uniswap.org/uniswap-v3-oracles", "https://docs.chain.link/data-feeds/using-data-feeds"]},
  {id: "CR-ETH-REENTRANCY-GUARD-001", text: "Apply OpenZeppelin's nonReentrant modifier to all value-transfer functions AND to view functions that expose critical accounting state — read-only reentrancy enabled the $70M Curve exploit (2023).", why: "Checks-effects-interactions alone is insufficient in complex multi-contract systems. Cross-function reentrancy: function A calls external contract which calls function B before A finishes, reading stale state. Read-only reentrancy: view functions queried mid-execution return values that have not yet been updated. The Curve/Vyper exploit used read-only reentrancy — the attacker called a price oracle view function while Curve's internal balances were mid-update, getting a stale price and draining $70M. ReentrancyGuard costs 200-2100 gas (warm vs cold storage read) — trivial compared to the protection.", severity: critical, technologies: {lang: [solidity], platform: [tools, openzeppelin]}, domains: {domain: [architecture, blockchain, security]}, how_to_do_right: "Inherit ReentrancyGuard (or ReentrancyGuardUpgradeable for proxy contracts). Add nonReentrant to: all ETH/ERC-20 transfer functions, all functions that call external contracts, all view functions that expose balances, prices, or ratios used by other protocols. Keep checks-effects-interactions as a secondary defense. Use nonReentrant on view functions in vaults that other protocols may read during callbacks.", example_good: "import \"@openzeppelin/contracts/security/ReentrancyGuard.sol\";\n\ncontract Vault is ReentrancyGuard {\n    mapping(address => uint256) private balances;\n\n    function withdraw(uint256 amount) external nonReentrant {\n        require(balances[msg.sender] >= amount, \"Insufficient\");\n        balances[msg.sender] -= amount;          // Effect before interaction\n        (bool ok,) = msg.sender.call{value: amount}(\"\");\n        require(ok, \"Transfer failed\");\n    }\n\n    // Protect view functions used by external protocols\n    // Prevents read-only reentrancy (Curve attack pattern)\n    function totalAssets() external view nonReentrant returns (uint256) {\n        return address(this).balance;\n    }\n}\n", example_bad: "contract VulnerableVault {\n    // No reentrancy guard — cross-function + read-only reentrancy possible\n    function withdraw(uint256 amount) external {\n        require(balances[msg.sender] >= amount);\n        balances[msg.sender] -= amount;\n        (bool ok,) = msg.sender.call{value: amount}(\"\");\n        require(ok);\n    }\n    // View function called by Curve-style protocol during callback\n    function getPrice() external view returns (uint256) {\n        return totalBalance / totalShares; // Read-only reentrancy: totalBalance stale mid-withdraw\n    }\n}\n", when_applies: "Any Solidity contract transferring value or callable by untrusted external contracts", when_not_applies: "view-only contracts with no state modifications", sources: ["https://docs.openzeppelin.com/contracts/5.x/api/utils#ReentrancyGuard", "https://medium.com/@zokyo.io/read-only-reentrancy-attacks-understanding-the-threat-to-your-smart-contracts-99444c0a7334"]}]
