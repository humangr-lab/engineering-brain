layer: rules
technology: Web
domain: performance
knowledge:
- id: CR-PERF-LCP-001
  text: Optimize Largest Contentful Paint (LCP) to under 2.5 seconds — target hero images, fonts, and render-blocking resources.
  why: LCP measures when the main content finishes loading. Above 2.5s, users perceive the page as slow and bounce rates increase
    32% per additional second. Google uses LCP as a ranking factor — poor LCP directly hurts SEO and conversion.
  how_to_do_right: Identify the LCP element (usually hero image or heading). Preload it with <link rel='preload'>. Use fetchpriority='high'
    on LCP images. Inline critical CSS. Eliminate render-blocking JavaScript. Use SSR/SSG for instant HTML.
  severity: critical
  technologies:
    lang: [html, css, javascript]
    library: [next, js]
  domains:
    domain: [performance, architecture]
    concern: [seo, frontend, ux]
  example_good: "<!-- Preload LCP image + fetchpriority -->\n<link rel=\"preload\" as=\"image\" href=\"/hero.webp\" fetchpriority=\"\
    high\" />\n\n<!-- Inline critical CSS — no render-blocking stylesheet for above-fold -->\n<style>\n  .hero { width: 100%;\
    \ height: 60vh; object-fit: cover; }\n  h1 { font-size: 2.5rem; margin: 1rem 0; }\n</style>\n\n<!-- LCP image with explicit\
    \ dimensions (no CLS) + priority -->\n<img\n  src=\"/hero.webp\"\n  alt=\"Hero\"\n  width=\"1200\"\n  height=\"600\"\n\
    \  class=\"hero\"\n  fetchpriority=\"high\"\n  decoding=\"async\"\n/>\n\n<!-- Non-critical CSS loaded asynchronously -->\n\
    <link rel=\"stylesheet\" href=\"/styles.css\" media=\"print\" onload=\"this.media='all'\" />\n"
  example_bad: '<!-- Render-blocking CSS delays LCP -->

    <link rel="stylesheet" href="/all-styles.css" /> <!-- 200KB, blocks rendering -->


    <!-- No dimensions — browser can''t allocate space until loaded -->

    <img src="/hero.png" alt="Hero" /> <!-- PNG not WebP, no priority, no dimensions -->


    <!-- Render-blocking JS before content -->

    <script src="/analytics.js"></script> <!-- Blocks parsing and rendering -->

    '
  when_applies: Any project using HTML document structure, CSS styling and layout, JavaScript/TypeScript projects, or Next.js
    SSR/SSG applications
  when_not_applies: low-traffic internal tools, admin dashboards, or batch jobs where latency is irrelevant
  sources: ["https://web.dev/articles/lcp", "https://web.dev/articles/optimize-lcp"]
- id: CR-PERF-INP-001
  text: Optimize Interaction to Next Paint (INP) to under 200ms — reduce main thread work and optimize event handlers.
  why: INP measures responsiveness — the time from user interaction (click, tap, key press) to the next visual update. Above
    200ms, the UI feels sluggish. Long-running event handlers, heavy re-renders, and main thread blocking are the primary
    causes.
  how_to_do_right: Keep event handlers under 50ms. Use requestAnimationFrame for visual updates. Debounce/throttle scroll
    and resize handlers. Use Web Workers for CPU-intensive tasks. Break long tasks with scheduler.yield() or setTimeout(fn,
    0).
  severity: critical
  technologies:
    lang: [javascript]
    framework: [frontend, react, vue, angular]
  domains:
    domain: [performance, architecture]
    concern: [frontend, ux]
  example_good: "// Break long task to keep main thread responsive\nasync function processLargeDataset(items: Item[]) {\n\
    \  const BATCH_SIZE = 100;\n  const results: Result[] = [];\n\n  for (let i = 0; i < items.length; i += BATCH_SIZE) {\n\
    \    const batch = items.slice(i, i + BATCH_SIZE);\n    results.push(...batch.map(processItem));\n\n    // Yield to main\
    \ thread — keeps UI responsive\n    if (i + BATCH_SIZE < items.length) {\n      await new Promise(resolve => setTimeout(resolve,\
    \ 0));\n    }\n  }\n  return results;\n}\n\n// Use requestAnimationFrame for visual updates\nbutton.addEventListener('click',\
    \ () => {\n  // Lightweight handler — schedule visual work\n  requestAnimationFrame(() => {\n    updateUI(); // Runs at\
    \ next paint — doesn't block input\n  });\n});\n"
  example_bad: "// Blocks main thread for 500ms — UI frozen during click\nbutton.addEventListener('click', () => {\n  const\
    \ results = processAllItems(10000); // Synchronous, 500ms\n  renderResults(results); // Another 200ms\n  // Total: 700ms\
    \ INP — user sees frozen button\n});\n"
  when_applies: Any project using JavaScript/TypeScript projects, React component-based UIs, Vue.js applications, or Angular
    applications
  when_not_applies: low-traffic internal tools, admin dashboards, or batch jobs where latency is irrelevant
  sources: ["https://web.dev/articles/inp", "https://web.dev/articles/optimize-inp"]
- id: CR-PERF-CLS-001
  text: 'Keep Cumulative Layout Shift (CLS) below 0.1 — set explicit dimensions on images/videos and use font-display: swap.'
  why: 'CLS measures visual stability — elements jumping around as the page loads. Above 0.1, users click the wrong button,
    lose their reading position, and perceive the page as broken. Common causes: images without dimensions, late-loading fonts,
    injected ads.'
  how_to_do_right: 'Set width and height attributes on all images and videos. Use aspect-ratio CSS for responsive containers.
    Use font-display: swap or next/font to prevent FOIT. Reserve space for ads/embeds with min-height. Use transform animations
    (not top/left).'
  severity: critical
  technologies:
    lang: [html, css]
  domains:
    domain: [performance, architecture]
    concern: [frontend, ux, seo]
  example_good: "/* Reserve space for images with aspect-ratio */\n.responsive-image {\n  width: 100%;\n  aspect-ratio: 16\
    \ / 9;\n  object-fit: cover;\n}\n\n/* Font loading without layout shift */\n@font-face {\n  font-family: 'CustomFont';\n\
    \  src: url('/fonts/custom.woff2') format('woff2');\n  font-display: swap; /* Show fallback immediately, swap when loaded\
    \ */\n}\n\n/* Reserve space for dynamic content */\n.ad-container {\n  min-height: 250px; /* Prevents shift when ad loads\
    \ */\n  contain: layout; /* Isolate layout from rest of page */\n}\n\n<!-- Image with explicit dimensions -->\n<img src=\"\
    /photo.webp\" alt=\"Photo\" width=\"800\" height=\"450\" loading=\"lazy\" />\n"
  example_bad: "<!-- No dimensions — browser doesn't know size until loaded -->\n<img src=\"/photo.jpg\" alt=\"Photo\" />\
    \ <!-- Causes layout shift when loaded -->\n\n/* No font-display — invisible text until font loads (FOIT) */\n@font-face\
    \ {\n  font-family: 'CustomFont';\n  src: url('/fonts/custom.woff2');\n  /* Missing font-display: swap — text invisible\
    \ for 3 seconds */\n}\n\n/* Dynamic content with no reserved space */\n.banner { /* Height: 0 until JS loads → jumps to\
    \ 300px */ }\n"
  when_applies: Any project using HTML document structure or CSS styling and layout
  when_not_applies: low-traffic internal tools, admin dashboards, or batch jobs where latency is irrelevant. projects not using HTML or CSS
  sources: ["https://web.dev/articles/cls", "https://web.dev/articles/optimize-cls"]
- id: CR-PERF-BUNDLE-001
  text: 'Configure tree shaking with sideEffects: false and use ES modules — unused code should never reach production.'
  why: 'Without tree shaking, importing one function from a utility library bundles the entire library. A 500KB lodash import
    when you only use debounce adds 490KB of dead code. sideEffects: false tells the bundler that unused exports can be safely
    removed.'
  how_to_do_right: 'Set sideEffects: false in package.json (or list side-effect files explicitly). Use ES module imports (import
    { x } from ''lib'') not namespace imports (import * as lib). Avoid re-export barrels (index.ts) that defeat tree shaking.'
  severity: high
  technologies:
    lang: [javascript, typescript]
    framework: [build, webpack, vite]
  domains:
    domain: [performance]
    concern: [bundling]
  example_good: "// package.json\n{\n  \"sideEffects\": false // Or: [\"*.css\", \"*.global.js\"]\n}\n\n// Named imports —\
    \ tree-shakeable\nimport { debounce } from 'lodash-es'; // Only debounce is bundled (~1KB)\n\n// Direct path imports for\
    \ large libraries\nimport Button from '@mui/material/Button'; // Only Button code\n\n// Barrel file with explicit exports\
    \ (not re-exporting everything)\n// utils/index.ts\nexport { formatDate } from './date';\nexport { formatCurrency } from\
    \ './currency';\n"
  example_bad: '// Namespace import — bundles EVERYTHING

    import * as _ from ''lodash''; // 500KB+ bundled for _.debounce()


    // Barrel that re-exports entire library

    // utils/index.ts

    export * from ''./date'';      // Exports 50 functions

    export * from ''./currency'';  // Exports 30 functions

    export * from ''./string'';    // Even if consumer uses 1 function

    '
  when_applies: Projects using JavaScript/TypeScript projects, TypeScript projects with static typing, Webpack, or Vite
  when_not_applies: low-traffic internal tools, admin dashboards, or batch jobs where latency is irrelevant
  sources: ["https://webpack.js.org/guides/tree-shaking/"]
- id: CR-PERF-BUNDLE-002
  text: Implement route-based code splitting — each route should load only its own JavaScript and CSS.
  why: A single-bundle SPA forces users to download all page code upfront — the settings page, admin dashboard, and rarely-used
    features. Route-based splitting creates separate chunks per route, reducing initial load by 40-70% and improving Time
    to Interactive.
  how_to_do_right: Use dynamic import() for route components. Configure your framework's lazy loading (React.lazy, loadComponent
    in Angular, defineAsyncComponent in Vue). Preload adjacent routes on link hover. Analyze bundles with webpack-bundle-analyzer
    or source-map-explorer.
  severity: high
  technologies:
    lang: [javascript]
    framework: [frontend, react, vue, angular, build, webpack, vite]
  domains:
    domain: [performance, architecture]
    concern: [bundling]
  example_good: "// React — route-level code splitting\nconst Dashboard = React.lazy(() => import('./pages/Dashboard'));\n\
    const Settings = React.lazy(() => import('./pages/Settings'));\n\n// Preload on hover — loads before user clicks\nfunction\
    \ NavLink({ to, children }: { to: string; children: React.ReactNode }) {\n  const preload = () => {\n    if (to === '/dashboard')\
    \ import('./pages/Dashboard');\n    if (to === '/settings') import('./pages/Settings');\n  };\n  return <Link to={to}\
    \ onMouseEnter={preload}>{children}</Link>;\n}\n\n// Analyze: npx webpack-bundle-analyzer stats.json\n"
  example_bad: '// Everything in one bundle — 2MB initial download

    import Dashboard from ''./pages/Dashboard'';

    import Settings from ''./pages/Settings'';

    import AdminPanel from ''./pages/AdminPanel'';

    import ReportGenerator from ''./pages/ReportGenerator'';

    // User downloads ALL code even if they only visit the home page

    '
  when_applies: Projects using JavaScript/TypeScript projects, React component-based UIs, Vue.js applications, or Angular
    applications
  when_not_applies: low-traffic internal tools, admin dashboards, or batch jobs where latency is irrelevant
  sources: ["https://web.dev/articles/code-splitting-suspense"]
- id: CR-PERF-IMG-001
  text: Serve images in WebP/AVIF format with responsive srcset — never serve a single large image to all devices.
  why: A 2MB PNG hero image served to mobile users wastes bandwidth and adds seconds to load time. WebP is 25-35% smaller
    than JPEG at same quality. AVIF is 50% smaller. srcset serves appropriate sizes per device — a 400px-wide phone gets a
    400px image, not a 1200px one.
  how_to_do_right: Use <picture> with source elements for format fallback. Use srcset with width descriptors. Use sizes attribute
    to tell the browser the display size. Use CDN image transformation for automatic format/size selection.
  severity: high
  technologies:
    lang: [html, css]
  domains:
    domain: [performance, architecture]
    concern: [frontend, ux]
  example_good: "<picture>\n  <!-- AVIF first (smallest) -->\n  <source\n    type=\"image/avif\"\n    srcset=\"/img/hero-400.avif\
    \ 400w, /img/hero-800.avif 800w, /img/hero-1200.avif 1200w\"\n    sizes=\"(max-width: 768px) 100vw, 50vw\"\n  />\n  <!--\
    \ WebP fallback -->\n  <source\n    type=\"image/webp\"\n    srcset=\"/img/hero-400.webp 400w, /img/hero-800.webp 800w,\
    \ /img/hero-1200.webp 1200w\"\n    sizes=\"(max-width: 768px) 100vw, 50vw\"\n  />\n  <!-- JPEG last resort -->\n  <img\n\
    \    src=\"/img/hero-800.jpg\"\n    alt=\"Hero image\"\n    width=\"1200\"\n    height=\"600\"\n    loading=\"lazy\"\n\
    \    decoding=\"async\"\n  />\n</picture>\n"
  example_bad: '<!-- Single format, single size, no lazy loading -->

    <img src="/img/hero.png" alt="Hero" />

    <!-- Serves 2MB PNG to all devices — mobile users on 3G wait 8+ seconds -->

    '
  when_applies: Projects using HTML document structure or CSS styling and layout
  when_not_applies: low-traffic internal tools, admin dashboards, or batch jobs where latency is irrelevant. projects not using HTML or CSS
  sources: ["https://web.dev/articles/serve-responsive-images"]
- id: CR-PERF-IMG-002
  text: Use loading='lazy' for below-fold images and fetchpriority='high' for the LCP image — never lazy-load above-fold content.
  why: Lazy loading above-fold images delays LCP — the image doesn't start loading until JavaScript runs and the IntersectionObserver
    triggers. The LCP image must load as early as possible. Below-fold images should lazy load to save bandwidth.
  how_to_do_right: Use fetchpriority='high' + no lazy loading for the hero/LCP image. Use loading='lazy' for all images below
    the fold. Use loading='eager' (default) for above-fold images. Preload critical images with <link rel='preload'>.
  severity: high
  technologies:
    lang: [html]
  domains:
    domain: [performance]
    concern: [seo]
  example_good: "<!-- Above fold: LCP image — load immediately with high priority -->\n<img\n  src=\"/hero.webp\"\n  alt=\"\
    Hero\"\n  width=\"1200\"\n  height=\"600\"\n  fetchpriority=\"high\"\n  decoding=\"async\"\n/>\n\n<!-- Below fold: lazy\
    \ load — saves bandwidth -->\n<img\n  src=\"/product-1.webp\"\n  alt=\"Product 1\"\n  width=\"400\"\n  height=\"400\"\n\
    \  loading=\"lazy\"\n  decoding=\"async\"\n/>\n"
  example_bad: '<!-- WRONG: Lazy loading LCP image — delays main content -->

    <img src="/hero.webp" loading="lazy" /> <!-- LCP delayed by 500ms+ -->


    <!-- WRONG: Eager loading all images — wastes bandwidth -->

    <img src="/product-1.webp" /> <!-- Below fold but loaded immediately -->

    <img src="/product-2.webp" /> <!-- User may never scroll here -->

    '
  when_applies: Projects using HTML document structure
  when_not_applies: low-traffic internal tools, admin dashboards, or batch jobs where latency is irrelevant. projects not using HTML
  sources: ["https://web.dev/articles/browser-level-image-lazy-loading"]
- id: CR-PERF-FONT-001
  text: 'Use font-display: swap and preload critical fonts — never block rendering on font download.'
  why: 'Without font-display: swap, browsers hide text for up to 3 seconds (Flash of Invisible Text — FOIT) while the font
    downloads. Users see a blank page. swap shows fallback text immediately and swaps when the font loads, keeping the page
    readable.'
  how_to_do_right: 'Set font-display: swap on all @font-face declarations. Preload the primary font with <link rel=''preload''
    as=''font''>. Self-host fonts to avoid cross-origin latency. Subset fonts to needed character ranges. Use variable fonts
    to reduce total downloads.'
  severity: high
  technologies:
    lang: [css, html]
  domains:
    domain: [performance, architecture]
    concern: [frontend, ux]
  example_good: "<!-- Preload critical font — starts downloading immediately -->\n<link rel=\"preload\" href=\"/fonts/inter-var.woff2\"\
    \ as=\"font\" type=\"font/woff2\" crossorigin />\n\n<style>\n  @font-face {\n    font-family: 'Inter';\n    src: url('/fonts/inter-var.woff2')\
    \ format('woff2');\n    font-display: swap; /* Show fallback instantly, swap when loaded */\n    unicode-range: U+0000-00FF,\
    \ U+0131, U+0152-0153; /* Latin subset only */\n    font-weight: 100 900; /* Variable font — all weights in one file */\n\
    \  }\n</style>\n"
  example_bad: '<!-- External Google Fonts — cross-origin, blocks rendering -->

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700" rel="stylesheet" />

    <!-- 4 separate font files downloaded from external origin -->

    <!-- No font-display set in Google''s CSS = browser default (block for 3s) -->

    '
  when_applies: Projects using CSS styling and layout or HTML document structure
  when_not_applies: low-traffic internal tools, admin dashboards, or batch jobs where latency is irrelevant. projects not using CSS or HTML
  sources: ["https://web.dev/articles/font-best-practices"]
- id: CR-PERF-CACHE-001
  text: 'Use Cache-Control: immutable for hashed assets and stale-while-revalidate for API responses.'
  why: Without proper caching, browsers re-download the same 200KB JavaScript bundle on every page load. With content-hashed
    filenames + immutable cache, assets are cached forever and only re-downloaded when the code actually changes. API caching
    with SWR shows stale data instantly while refreshing.
  how_to_do_right: 'Hash asset filenames (app.abc123.js). Set Cache-Control: max-age=31536000, immutable for hashed assets.
    Set Cache-Control: max-age=0, stale-while-revalidate=60 for HTML pages. Set appropriate SWR for API responses.'
  severity: high
  technologies:
    platform: [http, cdn]
  domains:
    domain: [performance, infrastructure]
  example_good: "# Nginx configuration\n# Hashed static assets — cache forever (immutable)\nlocation ~* \\.(js|css|woff2|avif|webp)$\
    \ {\n    add_header Cache-Control \"public, max-age=31536000, immutable\";\n}\n\n# HTML pages — always revalidate\nlocation\
    \ ~* \\.html$ {\n    add_header Cache-Control \"no-cache\"; # Revalidate every time\n}\n\n# API responses — stale-while-revalidate\
    \ for perceived speed\nlocation /api/ {\n    add_header Cache-Control \"max-age=0, stale-while-revalidate=60\";\n    #\
    \ Shows cached response instantly, refreshes in background\n}\n\n# Service Worker cache strategy\n# Cache-first for static,\
    \ network-first for API\n"
  example_bad: "# No caching headers — browser re-downloads everything\n# Or worse: max-age without content hashing\nlocation\
    \ ~* \\.js$ {\n    add_header Cache-Control \"max-age=3600\"; # Stale for 1 hour after deploy!\n    # app.js cached →\
    \ user gets OLD code for an hour after deploy\n}\n"
  when_applies: Projects using HTTP or CDN
  when_not_applies: low-traffic internal tools, admin dashboards, or batch jobs where latency is irrelevant. projects not using HTTP or CDN
  sources: ["https://web.dev/articles/http-cache"]
- id: CR-PERF-RENDER-001
  text: Choose the right rendering strategy per page — SSG for static, ISR for semi-static, SSR for personalized, CSR only
    behind login.
  why: Using SSR for a marketing page wastes server resources and adds 200ms+ latency when SSG could serve from CDN at 20ms.
    Using CSR for a public landing page means no SEO and slow initial load. Each page has a correct rendering strategy based
    on data freshness and personalization needs.
  how_to_do_right: 'SSG: marketing, docs, blog (CDN-cached, fastest TTFB). ISR: product catalog, pricing (static + periodic
    refresh). SSR: user dashboard, personalized pages (per-request rendering). CSR: app behind auth where SEO doesn''t matter
    and data is highly dynamic.'
  severity: high
  technologies:
    framework: [frontend, nuxt, angular, react]
    library: [next, js]
  domains:
    domain: [performance, architecture]
    concern: [seo]
  example_good: '// Decision framework:

    // 1. Does the page need SEO? → SSG/ISR/SSR (not CSR)

    // 2. Does the data change per user? → SSR (not SSG)

    // 3. Does the data change per hour/day? → ISR (not SSR)

    // 4. Does the data never change? → SSG (fastest)

    // 5. Is it behind auth with no SEO need? → CSR is fine


    // SSG — Marketing page (build time, CDN cached)

    export default function PricingPage() { return <StaticPricing />; }


    // ISR — Blog post (static + revalidate daily)

    export const revalidate = 86400;

    export default async function BlogPost({ params }) { /* ... */ }


    // SSR — User dashboard (per-request)

    export const dynamic = ''force-dynamic'';

    export default async function Dashboard() { /* ... */ }

    '
  example_bad: "// SSR for static content — wastes server resources\nexport const dynamic = 'force-dynamic'; // On a pricing\
    \ page that changes monthly!\n\n// CSR for public landing page — no SEO, slow initial load\n'use client';\nexport default\
    \ function LandingPage() {\n  const [content, setContent] = useState(null);\n  useEffect(() => { fetchContent().then(setContent);\
    \ }, []);\n  // Blank page → spinner → content. Google sees empty HTML.\n}\n"
  when_applies: Projects using Next.js SSR/SSG applications, Nuxt, Angular applications, or React component-based UIs
  when_not_applies: low-traffic internal tools, admin dashboards, or batch jobs where latency is irrelevant
  sources: ["https://nextjs.org/docs/app/building-your-application/rendering"]
- id: CR-PERF-CRP-001
  text: Inline critical CSS and defer non-critical stylesheets — render-blocking CSS adds directly to LCP.
  why: The browser cannot render any content until ALL linked CSS files are downloaded and parsed. A 200KB stylesheet blocks
    rendering for the time it takes to download, even if only 5KB is needed for above-fold content. Inlining critical CSS
    eliminates this network dependency.
  how_to_do_right: 'Extract critical CSS for above-fold content (tools: critical, critters). Inline it in <style> tags in
    <head>. Load remaining CSS asynchronously with media=''print'' + onload hack or loadCSS. Keep critical CSS under 14KB
    (fits in first TCP roundtrip).'
  severity: high
  technologies:
    lang: [css, html]
  domains:
    domain: [performance]
  example_good: "<head>\n  <!-- Critical CSS inlined — renders immediately (no network wait) -->\n  <style>\n    /* Only above-fold\
    \ styles — header, hero, nav (~5KB) */\n    .header { display: flex; align-items: center; height: 64px; }\n    .hero {\
    \ width: 100%; height: 60vh; }\n    .nav { display: flex; gap: 1rem; }\n  </style>\n\n  <!-- Non-critical CSS loaded asynchronously\
    \ -->\n  <link rel=\"stylesheet\" href=\"/styles.css\" media=\"print\" onload=\"this.media='all'\" />\n  <noscript><link\
    \ rel=\"stylesheet\" href=\"/styles.css\" /></noscript>\n\n  <!-- Preconnect to CDN for faster asset loading -->\n  <link\
    \ rel=\"preconnect\" href=\"https://cdn.example.com\" />\n</head>\n"
  example_bad: "<head>\n  <!-- 200KB render-blocking stylesheet — blocks ALL rendering -->\n  <link rel=\"stylesheet\" href=\"\
    /all-styles.css\" />\n  <!-- Another render-blocking stylesheet -->\n  <link rel=\"stylesheet\" href=\"/components.css\"\
    \ />\n  <!-- Browser downloads BOTH files before painting a single pixel -->\n</head>\n"
  when_applies: Projects using CSS styling and layout or HTML document structure
  when_not_applies: low-traffic internal tools, admin dashboards, or batch jobs where latency is irrelevant. projects not using CSS or HTML
  sources: ["https://web.dev/articles/extract-critical-css"]
- id: CR-PERF-CRP-002
  text: Use resource hints (preconnect, prefetch, preload) strategically — preconnect for third-party origins, prefetch for
    next navigation.
  why: DNS lookup + TCP connection + TLS handshake takes 100-500ms per new origin. preconnect eliminates this for third-party
    resources. prefetch downloads resources the user will likely need next (after link hover or based on navigation patterns),
    making the next page instant.
  how_to_do_right: 'preconnect: known third-party origins (fonts, analytics, CDN). dns-prefetch: origins you might use. preload:
    critical resources for current page (fonts, LCP image). prefetch: resources for likely next page. Limit to 2-4 preconnect
    hints to avoid connection competition.'
  severity: medium
  technologies:
    lang: [html]
  domains:
    domain: [performance]
  example_good: "<head>\n  <!-- Preconnect to known third-party origins (limit to 2-4) -->\n  <link rel=\"preconnect\" href=\"\
    https://fonts.googleapis.com\" />\n  <link rel=\"preconnect\" href=\"https://cdn.analytics.com\" crossorigin />\n\n  <!--\
    \ DNS prefetch for potential third-party (cheaper than preconnect) -->\n  <link rel=\"dns-prefetch\" href=\"https://maps.googleapis.com\"\
    \ />\n\n  <!-- Preload critical current-page resources -->\n  <link rel=\"preload\" href=\"/fonts/inter.woff2\" as=\"\
    font\" type=\"font/woff2\" crossorigin />\n  <link rel=\"preload\" href=\"/hero.avif\" as=\"image\" fetchpriority=\"high\"\
    \ />\n\n  <!-- Prefetch likely next page (on link hover or predictively) -->\n  <link rel=\"prefetch\" href=\"/dashboard\"\
    \ />\n</head>\n"
  example_bad: "<!-- No resource hints — every third-party origin adds 300ms+ -->\n<head>\n  <!-- Google Fonts: DNS (50ms)\
    \ + TCP (100ms) + TLS (100ms) + download -->\n  <link href=\"https://fonts.googleapis.com/...\" rel=\"stylesheet\" />\n\
    \  <!-- Analytics SDK: another 300ms for origin connection -->\n  <script src=\"https://cdn.analytics.com/tracker.js\"\
    ></script>\n  <!-- Total: 600ms+ wasted on connections that could be preconnected -->\n</head>\n"
  when_applies: Projects using HTML document structure
  when_not_applies: low-traffic internal tools, admin dashboards, or batch jobs where latency is irrelevant. projects not using HTML
  sources: ["https://web.dev/articles/preconnect-and-dns-prefetch"]
- id: CR-PERF-JS-001
  text: Use Web Workers for CPU-intensive tasks — never block the main thread for more than 50ms.
  why: The main thread handles rendering, event handling, and JavaScript execution. Any task over 50ms blocks user interaction
    — the page feels frozen. Web Workers run in a separate thread, keeping the UI responsive while processing data, parsing,
    or computing.
  how_to_do_right: Move heavy computation to a Web Worker (sorting, filtering, parsing, image processing). Communicate via
    postMessage with structured cloning. Use Comlink for a clean async API. Use SharedArrayBuffer for high-performance data
    sharing.
  severity: high
  technologies:
    lang: [javascript, typescript]
  domains:
    domain: [performance]
  example_good: "// worker.ts — runs in separate thread\nself.addEventListener('message', (e: MessageEvent) => {\n  const\
    \ { items, query } = e.data;\n  // Heavy computation — doesn't block UI\n  const results = items\n    .filter(item =>\
    \ fuzzyMatch(item.name, query))\n    .sort((a, b) => scoreMatch(b.name, query) - scoreMatch(a.name, query));\n  self.postMessage(results);\n\
    });\n\n// main.ts — UI stays responsive\nconst worker = new Worker(new URL('./worker.ts', import.meta.url));\n\nfunction\
    \ search(query: string) {\n  worker.postMessage({ items: allItems, query });\n  // UI remains interactive while worker\
    \ processes 100,000 items\n}\n\nworker.addEventListener('message', (e) => {\n  renderResults(e.data); // Update UI when\
    \ results ready\n});\n"
  example_bad: "// Everything on main thread — UI freezes during search\nfunction search(query: string) {\n  // 500ms blocking\
    \ operation on main thread\n  const results = allItems // 100,000 items\n    .filter(item => fuzzyMatch(item.name, query))\n\
    \    .sort((a, b) => scoreMatch(b.name, query) - scoreMatch(a.name, query));\n  renderResults(results);\n  // User can't\
    \ type, scroll, or click during these 500ms\n}\n"
  when_applies: Projects using JavaScript/TypeScript projects or TypeScript projects with static typing
  when_not_applies: low-traffic internal tools, admin dashboards, or batch jobs where latency is irrelevant. projects not using JavaScript or TypeScript
  sources: ["https://developer.mozilla.org/en-US/docs/Web/API/Web_Workers_API/Using_web_workers"]
- id: CR-PERF-JS-002
  text: Use passive event listeners for scroll and touch events — never call preventDefault() in scroll handlers.
  why: The browser must wait for scroll/touch event handlers to complete before scrolling, in case the handler calls preventDefault().
    Passive listeners tell the browser the handler will NOT call preventDefault(), allowing immediate smooth scrolling. This
    eliminates scroll jank on mobile.
  how_to_do_right: 'Add { passive: true } to all scroll, touchstart, touchmove, and wheel event listeners. If you need to
    prevent default (e.g., pull-to-refresh), use CSS touch-action instead of JavaScript preventDefault. Modern browsers default
    to passive for window/document/body listeners.'
  severity: medium
  technologies:
    lang: [javascript]
  domains:
    domain: [performance, architecture, mobile]
  example_good: "// Passive scroll listener — browser scrolls immediately\nwindow.addEventListener('scroll', () => {\n  //\
    \ Read-only: track scroll position, show/hide header, lazy load\n  const scrollY = window.scrollY;\n  header.classList.toggle('hidden',\
    \ scrollY > lastScroll);\n  lastScroll = scrollY;\n}, { passive: true }); // Browser knows we won't block scrolling\n\n\
    // CSS instead of JS for preventing scroll behaviors\n.no-pull-to-refresh {\n  overscroll-behavior-y: contain; /* Prevents\
    \ pull-to-refresh */\n  touch-action: pan-x; /* Only allow horizontal touch */\n}\n"
  example_bad: "// Non-passive — browser waits for handler before scrolling\nwindow.addEventListener('scroll', (e) => {\n\
    \  // Browser can't scroll until this completes (might take 100ms+)\n  expensiveScrollHandler();\n  // Even though we\
    \ never call e.preventDefault()\n}); // Missing { passive: true } — scroll jank on mobile\n\n// Blocking touch events\
    \ — prevents browser smooth scrolling\ndocument.addEventListener('touchmove', (e) => {\n  e.preventDefault(); // Blocks\
    \ native scrolling!\n  customScroll(e); // Custom scroll is always janky vs native\n});\n"
  when_applies: Projects using JavaScript/TypeScript projects
  when_not_applies: low-traffic internal tools, admin dashboards, or batch jobs where latency is irrelevant. projects not using JavaScript
  sources: ["https://developer.chrome.com/docs/lighthouse/best-practices/uses-passive-event-listeners"]
- id: CR-PERF-JS-003
  text: Debounce search inputs and throttle scroll/resize handlers — never fire expensive operations on every event.
  why: A keystroke fires every 50ms during typing — 20 events per second. A scroll event fires every 16ms — 60 events per
    second. Without debounce/throttle, each event triggers an expensive operation (API call, layout recalculation, re-render),
    saturating the main thread and network.
  how_to_do_right: 'Debounce (wait until pauses): search input, form validation, window resize. Throttle (max frequency):
    scroll position tracking, mousemove, live preview. Use 200-300ms debounce for typing, 100-200ms throttle for visual updates.'
  severity: high
  technologies:
    lang: [javascript, typescript]
  domains:
    domain: [performance, architecture]
    concern: [frontend, ux]
  example_good: "// Debounce — wait 300ms after last keystroke before searching\nfunction debounce<T extends (...args: any[])\
    \ => void>(fn: T, ms: number): T {\n  let timer: ReturnType<typeof setTimeout>;\n  return ((...args: Parameters<T>) =>\
    \ {\n    clearTimeout(timer);\n    timer = setTimeout(() => fn(...args), ms);\n  }) as T;\n}\n\nconst handleSearch = debounce((query:\
    \ string) => {\n  fetch(`/api/search?q=${query}`); // Fires once after 300ms pause\n}, 300);\n\ninput.addEventListener('input',\
    \ (e) => handleSearch(e.target.value));\n\n// Throttle — max once per 100ms for scroll tracking\nfunction throttle<T extends\
    \ (...args: any[]) => void>(fn: T, ms: number): T {\n  let last = 0;\n  return ((...args: Parameters<T>) => {\n    const\
    \ now = Date.now();\n    if (now - last >= ms) { last = now; fn(...args); }\n  }) as T;\n}\n\nwindow.addEventListener('scroll',\
    \ throttle(() => {\n  updateScrollProgress(); // Max 10 calls/sec instead of 60\n}, 100), { passive: true });\n"
  example_bad: "// API call on EVERY keystroke — 20 requests/second while typing\ninput.addEventListener('input', (e) => {\n\
    \  fetch(`/api/search?q=${e.target.value}`); // Fires every 50ms!\n  // Server overwhelmed, network saturated, results\
    \ arrive out of order\n});\n\n// Expensive computation on every scroll event — 60 times/second\nwindow.addEventListener('scroll',\
    \ () => {\n  recalculateLayout(); // 10ms each = 600ms/sec of main thread blocked\n});\n"
  when_applies: Projects using JavaScript/TypeScript projects or TypeScript projects with static typing
  when_not_applies: low-traffic internal tools, admin dashboards, or batch jobs where latency is irrelevant. projects not using JavaScript or TypeScript
  sources: ["https://web.dev/articles/optimize-inp"]
- id: CR-PERF-CSS-001
  text: Use CSS contain and content-visibility for layout isolation — prevent off-screen elements from triggering layout recalculations.
  why: 'Without containment, changing one element''s size can trigger layout recalculation for hundreds of sibling elements
    (layout thrashing). contain: layout tells the browser this element''s internals don''t affect outside layout, enabling
    skip optimizations.'
  how_to_do_right: 'Use contain: layout paint on independent widgets/cards. Use content-visibility: auto for off-screen sections
    (like long lists). Set contain-intrinsic-size to hint the size for content-visibility. Use will-change sparingly — only
    for known animations.'
  severity: medium
  technologies:
    lang: [css]
  domains:
    domain: [performance]
    concern: [rendering]
  example_good: "/* Card grid — each card's layout is independent */\n.card {\n  contain: layout paint; /* Internal changes\
    \ don't trigger sibling relayout */\n}\n\n/* Long page sections — skip rendering when off-screen */\n.content-section\
    \ {\n  content-visibility: auto; /* Browser skips rendering when off-screen */\n  contain-intrinsic-size: 0 500px; /*\
    \ Estimated height for scrollbar accuracy */\n}\n\n/* Animation — only transform and opacity are GPU-accelerated */\n\
    .animated-element {\n  will-change: transform; /* Hint to browser — creates compositor layer */\n  transition: transform\
    \ 0.3s ease;\n}\n.animated-element:hover {\n  transform: translateY(-4px); /* GPU-accelerated — no layout triggered */\n\
    }\n"
  example_bad: "/* Animating layout properties — triggers full relayout every frame */\n.animated-element {\n  transition:\
    \ top 0.3s ease, height 0.3s ease; /* Layout triggered 60fps! */\n}\n.animated-element:hover {\n  top: -4px; /* Triggers\
    \ layout recalc for entire page */\n  height: 204px; /* Another layout recalc */\n}\n\n/* will-change everywhere — wastes\
    \ GPU memory */\n* { will-change: transform; } /* Creates compositor layer for EVERY element */\n"
  when_applies: Projects using CSS styling and layout
  when_not_applies: low-traffic internal tools, admin dashboards, or batch jobs where latency is irrelevant. projects not using CSS
  sources: ["https://developer.mozilla.org/en-US/docs/Web/CSS/CSS_containment", "https://web.dev/articles/content-visibility"]
- id: CR-PERF-CSS-002
  text: Only animate transform and opacity — they are the only properties that can be GPU-composited without triggering layout
    or paint.
  why: Animating width, height, top, left, margin, or padding triggers layout recalculation on every frame (60 times/second).
    Layout is the most expensive rendering step. transform and opacity are handled by the GPU compositor — they skip layout
    AND paint entirely, achieving smooth 60fps.
  how_to_do_right: 'Replace top/left animations with transform: translate(). Replace width/height animations with transform:
    scale(). Replace visibility with opacity. Use cubic-bezier or spring easing for natural motion. Test with Chrome DevTools
    Performance panel.'
  severity: high
  technologies:
    lang: [css]
  domains:
    domain: [performance]
    concern: [animation]
  example_good: "/* GPU-composited — no layout or paint, 60fps guaranteed */\n.modal-enter {\n  opacity: 0;\n  transform:\
    \ translateY(20px) scale(0.95);\n}\n.modal-enter-active {\n  opacity: 1;\n  transform: translateY(0) scale(1);\n  transition:\
    \ opacity 0.3s ease, transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);\n}\n\n/* Slide menu — translate instead of left */\n\
    .sidebar {\n  transform: translateX(-100%); /* Off-screen */\n  transition: transform 0.3s ease;\n}\n.sidebar.open {\n\
    \  transform: translateX(0); /* Slides in — GPU only */\n}\n"
  example_bad: "/* Layout-triggering animation — jank at 60fps */\n.modal-enter {\n  margin-top: 20px; /* Triggers layout\
    \ */\n  height: 0; /* Triggers layout */\n}\n.modal-enter-active {\n  margin-top: 0; /* Layout recalc every frame */\n\
    \  height: auto; /* Can't even animate to auto! */\n  transition: margin-top 0.3s, height 0.3s;\n}\n\n.sidebar {\n  left:\
    \ -300px; /* Triggers layout */\n  transition: left 0.3s;\n}\n.sidebar.open {\n  left: 0; /* Layout recalc 60 times/second\
    \ */\n}\n"
  when_applies: Projects using CSS styling and layout
  when_not_applies: low-traffic internal tools, admin dashboards, or batch jobs where latency is irrelevant. projects not using CSS
  sources: ["https://web.dev/articles/animations-guide"]
- id: CR-PERF-SW-001
  text: Use service workers with cache-first strategy for static assets and network-first for API data.
  why: Service workers intercept all network requests and can serve cached responses instantly (0ms latency). For static assets
    that rarely change, cache-first eliminates network dependency entirely. For API data, network-first ensures freshness
    while falling back to cache when offline.
  how_to_do_right: 'Cache-first: static assets (JS, CSS, images, fonts). Network-first: API responses (fresh data preferred).
    Stale-while-revalidate: semi-static content (avatars, config). Cache-only: app shell. Network-only: analytics, real-time
    data. Precache critical routes at install.'
  severity: medium
  technologies:
    lang: [javascript]
    library: [service workers]
  domains:
    domain: [performance]
    concern: [pwa, offline]
  example_good: "// Service Worker — workbox strategies\nimport { registerRoute } from 'workbox-routing';\nimport { CacheFirst,\
    \ NetworkFirst, StaleWhileRevalidate } from 'workbox-strategies';\nimport { ExpirationPlugin } from 'workbox-expiration';\n\
    \n// Static assets — cache forever, update on new deploy\nregisterRoute(\n  ({ request }) => ['style', 'script', 'font'].includes(request.destination),\n\
    \  new CacheFirst({\n    cacheName: 'static-v1',\n    plugins: [new ExpirationPlugin({ maxEntries: 100, maxAgeSeconds:\
    \ 365 * 24 * 3600 })],\n  })\n);\n\n// API data — network first, fall back to cache when offline\nregisterRoute(\n  ({\
    \ url }) => url.pathname.startsWith('/api/'),\n  new NetworkFirst({\n    cacheName: 'api-v1',\n    plugins: [new ExpirationPlugin({\
    \ maxEntries: 50, maxAgeSeconds: 24 * 3600 })],\n  })\n);\n\n// Images — stale-while-revalidate (show cached, update in\
    \ background)\nregisterRoute(\n  ({ request }) => request.destination === 'image',\n  new StaleWhileRevalidate({ cacheName:\
    \ 'images-v1' })\n);\n"
  example_bad: "// Cache everything with same strategy — stale API data + wasted cache space\nself.addEventListener('fetch',\
    \ (event) => {\n  event.respondWith(\n    caches.match(event.request).then(cached => cached || fetch(event.request))\n\
    \  );\n  // API responses cached forever — shows stale data\n  // No cache expiration — fills up storage\n  // No versioning\
    \ — can't update cached assets\n});\n"
  when_applies: Projects using JavaScript/TypeScript projects or Service Workers
  when_not_applies: low-traffic internal tools, admin dashboards, or batch jobs where latency is irrelevant. projects not using JavaScript or Service Workers
  sources: ["https://web.dev/articles/service-worker-caching-and-http-caching"]
- id: CR-PERF-VSCROLL-001
  text: >
    Implement virtual scrolling (windowing) for lists with more than 100 items —
    only render the DOM nodes currently visible in the viewport. Rendering 10,000
    items creates 10,000 DOM nodes, causing 5-30 second initial renders and janky
    scrolling. Virtual scrolling maintains a fixed DOM regardless of list length.
  why: >
    DOM nodes are expensive: each node consumes memory (~1KB each), participates
    in layout calculations, and triggers style recalculations on every repaint.
    A list of 10,000 rows with 20 columns creates 200,000 DOM nodes. The browser
    crashes or freezes on creation, scrolling triggers full-page layout recalculation,
    and memory usage can exceed 500MB. Virtual scrolling keeps 20-50 items in the DOM
    (one viewport's worth plus a buffer), recycling DOM nodes as the user scrolls.
    A trading platform order book with 5,000 entries must use virtual scrolling —
    without it, the UI is unusable. React Virtuoso benchmarks: 100,000 items render
    in 50ms with virtual scrolling vs 8 seconds without.
  how_to_do_right: |
    1. Choose a library:
       - React: react-window (lightweight), react-virtuoso (feature-rich), TanStack Virtual
       - Vue: vue-virtual-scroller
       - Vanilla JS: @tanstack/virtual-core
    2. Fixed row height: use FixedSizeList (simpler, faster)
    3. Variable row height: use VariableSizeList with itemSize callback or react-virtuoso
    4. Threshold: enable virtual scrolling when list > 100 items
    5. Overscan: render 5-10 items outside viewport (prevents blank flicker during fast scroll)
    6. Keep state outside virtual list — virtual items must be pure render functions
    7. For infinite scroll: combine with IntersectionObserver to load more pages
  severity: high
  technologies:
    lang: [javascript, typescript]
    framework: [react, vue, angular]
    library: [react-window, react-virtuoso, tanstack-virtual]
  domains:
    domain: [performance, architecture]
    concern: [frontend, rendering, lists]
  example_good: |
    import { FixedSizeList } from 'react-window';

    interface Order {
      id: string;
      price: number;
      quantity: number;
      side: 'buy' | 'sell';
    }

    // Row renderer — pure, no side effects
    const OrderRow = ({ index, style, data }: any) => {
      const order: Order = data[index];
      return (
        <div style={style} className={`order-row order-row--${order.side}`}>
          <span>{order.price.toFixed(2)}</span>
          <span>{order.quantity}</span>
        </div>
      );
    };

    // OrderBook: 5,000 orders, only renders visible rows
    function OrderBook({ orders }: { orders: Order[] }) {
      return (
        <FixedSizeList
          height={600}         // Visible viewport height
          itemCount={orders.length}  // Can be 5,000 — no DOM impact
          itemSize={32}        // Fixed row height (px)
          itemData={orders}    // Passed to each row renderer
          overscanCount={10}   // Buffer above/below viewport
        >
          {OrderRow}
        </FixedSizeList>
      );
    }
  example_bad: |
    // Rendering all items — 5,000 DOM nodes
    function OrderBook({ orders }: { orders: Order[] }) {
      return (
        <div className="order-book" style={{ height: 600, overflow: 'auto' }}>
          {orders.map(order => (  // Renders ALL 5,000 orders
            <div key={order.id} className={`order-row order-row--${order.side}`}>
              <span>{order.price.toFixed(2)}</span>
              <span>{order.quantity}</span>
            </div>
            // 5,000 × 2 spans + 5,000 divs = 15,000 DOM nodes
            // Initial render: 5-8 seconds, scrolling: janky 10fps
          ))}
        </div>
      );
    }
  when_applies: Any list with more than 100 items or tables with more than 50 rows
  when_not_applies: small lists (<100 items), paginated tables that load a fixed small page
  sources:
    - "https://react-window.vercel.app/"
    - "https://tanstack.com/virtual/latest"
    - "https://web.dev/articles/content-visibility"
- id: CR-PERF-SHAREDARRAYBUFFER-001
  text: >
    Use SharedArrayBuffer + Atomics for zero-copy high-performance data sharing
    between the main thread and Web Workers — required for real-time financial
    data visualization where postMessage serialization overhead is unacceptable
    at >10,000 updates/second.
  why: >
    postMessage() serializes data with structured clone algorithm — copying 1MB of
    order book data takes 2-10ms per message, creating a bottleneck at high update
    rates. A real-time trading UI processing 10,000 price updates/second via
    postMessage creates 100ms+ serialization overhead. SharedArrayBuffer allows
    direct memory access across threads with zero copying: the worker writes to
    the buffer, the main thread reads it. Atomics.wait() and Atomics.notify()
    provide lock-free synchronization. Requires COOP/COEP headers (Cross-Origin
    Opener/Embedder Policy) for security. Available in all modern browsers since 2022.
  how_to_do_right: |
    1. Server must set headers:
       Cross-Origin-Opener-Policy: same-origin
       Cross-Origin-Embedder-Policy: require-corp
    2. Create buffer: new SharedArrayBuffer(byteLength)
    3. Create view: new Float64Array(sharedBuffer) for prices
    4. Worker writes: Atomics.store(view, index, value)
    5. Main thread reads: Atomics.load(view, index)
    6. Notifications: Atomics.notify(view, 0) to wake waiting thread
    7. Use a separate Int32Array for a version counter (detect updates)
    8. Fallback: feature-detect with 'SharedArrayBuffer' in self
  severity: medium
  technologies:
    lang: [javascript, typescript]
  domains:
    domain: [performance]
    concern: [web_workers, shared_memory, real_time]
  example_good: |
    // shared-buffer.ts — create shared memory for price data
    const PRICE_COUNT = 1000;
    const buffer = new SharedArrayBuffer(
      PRICE_COUNT * Float64Array.BYTES_PER_ELEMENT
    );
    const priceView = new Float64Array(buffer);
    const versionBuffer = new SharedArrayBuffer(Int32Array.BYTES_PER_ELEMENT);
    const version = new Int32Array(versionBuffer);

    // Worker: write prices (zero-copy, no serialization)
    // worker.ts
    self.addEventListener('message', ({ data: { buffer, versionBuffer } }) => {
      const prices = new Float64Array(buffer);
      const ver = new Int32Array(versionBuffer);
      // WebSocket data handler
      ws.onmessage = ({ data }) => {
        const updates = JSON.parse(data);
        updates.forEach(({ index, price }) => {
          Atomics.store(prices, index, price);
        });
        Atomics.add(ver, 0, 1);           // Increment version
        Atomics.notify(ver, 0, 1);        // Wake main thread
      };
    });

    // Main thread: read prices (zero-copy)
    const worker = new Worker('worker.js');
    worker.postMessage({ buffer, versionBuffer });

    function renderPrices() {
      const currentVersion = Atomics.load(version, 0);
      // Read all prices at once — no serialization overhead
      for (let i = 0; i < PRICE_COUNT; i++) {
        updatePriceDisplay(i, Atomics.load(priceView, i));
      }
      requestAnimationFrame(renderPrices);
    }
  example_bad: |
    // postMessage for every price update — serialization bottleneck
    // Worker:
    ws.onmessage = ({ data }) => {
      const updates = JSON.parse(data);
      // Sending 1000 updates/second via postMessage
      self.postMessage(updates);  // Serializes entire array each time
    };

    // Main thread:
    worker.onmessage = ({ data }) => {
      // data has been serialized AND deserialized (structured clone)
      // At 1000 updates/second with 1MB payloads: 100ms+ serialization overhead
      data.forEach(update => updatePriceDisplay(update.index, update.price));
    };
  when_applies: Real-time financial UIs with >1,000 data point updates per second
  when_not_applies: standard web apps with normal update rates, apps without intensive worker communication
  sources:
    - "https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/SharedArrayBuffer"
    - "https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Atomics"
- id: CR-PERF-RESOURCEHINTS-001
  text: >
    Use modulepreload for ES module scripts — not just preload. modulepreload fetches,
    parses, AND compiles the module (and its static imports), while preload only
    downloads the bytes. This eliminates parse-and-compile time from the critical
    rendering path for JavaScript modules.
  why: >
    preload fetches resources with high priority but does NOT execute them — the
    browser still needs to parse and compile the JavaScript when it's first used.
    modulepreload fetches + parses + compiles the module AND its static dependency
    tree in the background, so by the time the HTML parser encounters the <script
    type="module">, the module is fully compiled and ready to execute. For a 200KB
    JavaScript module, compilation takes 50-200ms on mobile. modulepreload eliminates
    this from the critical path. Use modulepreload for critical ES modules (the entry
    point and its immediate dependencies). This is the correct hint for modern ES
    module apps.
  how_to_do_right: |
    1. <link rel="modulepreload" href="/app.js"> in <head>
    2. Also preload direct imports: <link rel="modulepreload" href="/core.js">
    3. For dynamic imports that are likely: <link rel="modulepreload" href="/dashboard.js">
    4. Limit to 3-5 most critical modules (preloading too many competes for bandwidth)
    5. Use preload for non-module resources (images, fonts, CSS, WASM)
    6. Use prefetch for next-page modules (lower priority, loads after current page)
    7. modulepreload has 87%+ browser support (Chrome, Firefox, Safari 17+)
  severity: medium
  technologies:
    lang: [html, javascript]
    framework: [build, vite, webpack]
  domains:
    domain: [performance]
    concern: [loading, modules, critical_path]
  example_good: |
    <head>
      <!-- modulepreload: fetch + parse + compile the entry module -->
      <link rel="modulepreload" href="/assets/app.abc123.js" />

      <!-- Also preload critical dependencies of app.js -->
      <link rel="modulepreload" href="/assets/core.def456.js" />
      <link rel="modulepreload" href="/assets/router.ghi789.js" />

      <!-- Regular preload for non-module resources -->
      <link rel="preload" href="/fonts/inter.woff2" as="font" type="font/woff2" crossorigin />
      <link rel="preload" href="/images/hero.avif" as="image" fetchpriority="high" />

      <!-- Prefetch: next page module (low priority) -->
      <link rel="prefetch" href="/assets/dashboard.jkl012.js" as="script" />

      <!-- The actual script: already compiled by the time we get here -->
      <script type="module" src="/assets/app.abc123.js"></script>
    </head>
  example_bad: |
    <head>
      <!-- Using preload for ES modules — only downloads, doesn't compile -->
      <link rel="preload" href="/assets/app.js" as="script" />
      <!-- Browser downloads app.js early, but still must parse+compile when used -->
      <!-- modulepreload would have done ALL of this in the background -->

      <!-- Or: no hints at all — module loaded and compiled synchronously -->
      <script type="module" src="/assets/app.js"></script>
      <!-- 200KB module: download (300ms) + parse+compile (150ms) = 450ms before first paint -->
    </head>
  when_applies: Projects using ES modules with performance-sensitive initial load
  when_not_applies: non-module (CommonJS/UMD) scripts, apps where initial load performance is irrelevant
  sources:
    - "https://developer.mozilla.org/en-US/docs/Web/HTML/Attributes/rel/modulepreload"
    - "https://web.dev/articles/modulepreload"
    - "https://web.dev/articles/preconnect-and-dns-prefetch"
- id: CR-PERF-IMAGEOPT-001
  text: >
    Implement an image optimization pipeline that generates AVIF + WebP + JPEG
    fallbacks at multiple resolutions during the build — never serve unoptimized
    source images. AVIF saves 50% over JPEG; WebP saves 25-35%. An unoptimized
    image pipeline is one of the highest-ROI performance improvements available.
  why: >
    A single 5MB hero image served to all devices adds 8+ seconds to mobile load time
    on 3G. AVIF (AV1 Image Format) achieves 50% better compression than JPEG at
    equivalent quality. WebP achieves 25-35% better compression. Responsive images
    (srcset + sizes) ensure mobile users receive appropriately sized images, not a
    1200px image scaled down in CSS. A proper pipeline (sharp, squoosh, or Vite/Next.js
    image optimization) runs at build time — zero runtime cost. Google Lighthouse
    reports image optimization as the top performance opportunity for 70% of scanned
    pages.
  how_to_do_right: |
    1. Use Next.js <Image> (auto-optimizes) or Vite's vite-imagetools
    2. Or manual pipeline with sharp:
       Input: hero.png → Output: hero-400.avif, hero-800.avif, hero-1200.avif,
                                  hero-400.webp, hero-800.webp, hero-1200.webp,
                                  hero-800.jpg (fallback)
    3. Widths: [400, 800, 1200, 1920] for full-width images
    4. Quality: AVIF 60-70, WebP 75-80, JPEG 80-85
    5. Always set explicit width and height attributes (prevents CLS)
    6. Use <picture> element for format selection + srcset for responsive
    7. Lazy load below-fold images: loading="lazy" decoding="async"
    8. CDN: use Cloudflare Images, Cloudinary, or imgix for runtime optimization
  severity: high
  technologies:
    lang: [html, javascript]
    library: [sharp, next-image, vite-imagetools]
  domains:
    domain: [performance]
    concern: [images, loading, bandwidth]
  example_good: |
    // vite.config.ts — auto-generate responsive images at build time
    import { imagetools } from 'vite-imagetools';
    export default { plugins: [imagetools()] };

    // Usage in component:
    import heroAvif400 from './hero.png?w=400&format=avif';
    import heroAvif800 from './hero.png?w=800&format=avif';
    import heroWebp400 from './hero.png?w=400&format=webp';
    import heroWebp800 from './hero.png?w=800&format=webp';
    import heroJpg800 from './hero.png?w=800&format=jpeg'; // fallback

    // HTML with full format + size optimization
    /*
    <picture>
      <source type="image/avif"
              srcset="${heroAvif400} 400w, ${heroAvif800} 800w"
              sizes="(max-width: 768px) 100vw, 800px" />
      <source type="image/webp"
              srcset="${heroWebp400} 400w, ${heroWebp800} 800w"
              sizes="(max-width: 768px) 100vw, 800px" />
      <img src="${heroJpg800}" alt="Hero" width="800" height="450"
           loading="eager" fetchpriority="high" decoding="async" />
    </picture>
    */
  example_bad: |
    <!-- Single unoptimized PNG for all devices -->
    <img src="/images/hero.png" alt="Hero" />
    <!-- hero.png: 5MB, 3000x2000px
         Mobile user receives: 5MB PNG (no AVIF, no WebP, no responsive)
         Load time on 3G: 8 seconds
         Could be: 180KB AVIF at 400px = 0.3 seconds (27x improvement) -->
  when_applies: Any web application with user-visible images
  when_not_applies: internal tools with no performance requirements, purely text-based applications
  sources:
    - "https://web.dev/articles/serve-responsive-images"
    - "https://sharp.pixelplumbing.com/"
    - "https://web.dev/articles/uses-optimized-images"
- id: CR-PERF-FONTOPT-001
  text: >
    Self-host fonts with variable font files, subset to used characters, preload
    the primary weight, and set font-display: optional for non-critical fonts —
    external font providers add 300ms+ connection latency and cannot be preloaded
    with modulepreload.
  why: >
    Google Fonts served from an external origin adds: DNS lookup (50ms) + TCP
    connection (100ms) + TLS handshake (100ms) + download = 300-500ms minimum
    latency before any text renders. Self-hosting eliminates all connection overhead.
    Variable fonts pack all weights (100-900) in a single file — replacing 8
    separate weight files with one 40-60KB variable font file. Character subsetting
    removes unused Unicode ranges: a Latin-only site doesn't need Japanese characters.
    font-display: optional renders with the system font if the custom font hasn't
    loaded by first paint — eliminating FOUT (Flash of Unstyled Text) entirely.
  how_to_do_right: |
    1. Download variable font: google-webfonts-helper.herokuapp.com
    2. Subset: pyftsubset font.ttf --unicodes="U+0000-00FF" --output-file=font-subset.ttf
       Then convert to woff2: woff2_compress font-subset.ttf
    3. @font-face with font-display: optional (no FOUT) or swap (show fallback)
    4. Preload the primary font file: <link rel="preload" as="font">
    5. Use font-size-adjust and size-adjust on @font-face to minimize layout shift
       when swapping fallback → custom font
    6. Cache with immutable headers (font files don't change)
    7. Total budget: primary font weight woff2 should be <50KB after subsetting
  severity: high
  technologies:
    lang: [css, html]
  domains:
    domain: [performance]
    concern: [fonts, loading, cls]
  example_good: |
    <!-- Self-hosted font: no external connection -->
    <link rel="preload" href="/fonts/inter-var-latin.woff2"
          as="font" type="font/woff2" crossorigin />

    <style>
      @font-face {
        font-family: 'Inter';
        src: url('/fonts/inter-var-latin.woff2') format('woff2');
        font-weight: 100 900;          /* Variable font: all weights in one file */
        font-style: normal;
        font-display: optional;        /* No FOUT: uses system font if not ready */
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6,
                       U+02DA, U+02DC, U+2000-206F, U+2074, U+20AC, U+2122,
                       U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
        /* Subsetted to Latin characters only — 30KB vs 120KB full */
      }

      /* Adjust fallback metrics to reduce layout shift on swap */
      @font-face {
        font-family: 'Inter-fallback';
        src: local('Arial');
        size-adjust: 107%;  /* Match Inter's metrics approximately */
        ascent-override: 90%;
      }

      body { font-family: 'Inter', 'Inter-fallback', system-ui, sans-serif; }
    </style>
  example_bad: |
    <!-- External Google Fonts: 300-500ms connection overhead -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
          rel="stylesheet">
    <!-- 4 separate weight files served from external origin
         No preload possible for external fonts
         300ms connection + 4 × 20KB font files = 400ms+ font load delay -->
  when_applies: Any web application where typography quality matters or performance is measured
  when_not_applies: internal tools where system fonts are acceptable, prototypes
  sources:
    - "https://web.dev/articles/font-best-practices"
    - "https://developer.mozilla.org/en-US/docs/Web/CSS/@font-face/font-display"
    - "https://google-webfonts-helper.herokuapp.com/"
