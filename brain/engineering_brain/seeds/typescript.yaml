layer: rules
technology: TypeScript
domain: frontend
knowledge:
- id: CR-TS-UNION-001
  text: Use discriminated unions for state machines and tagged variants — add a literal type field as discriminant.
  why: Plain union types force unsafe type assertions or repeated typeof checks. Discriminated unions let TypeScript narrow
    automatically via switch/if, and the compiler catches missing cases at build time — preventing runtime crashes when a
    new state is added.
  how_to_do_right: Add a shared literal property (kind, type, status) to each variant. Use switch on the discriminant. Enable
    noImplicitReturns and add a never default to catch exhaustiveness.
  severity: critical
  technologies:
    lang: [typescript]
  domains:
    domain: [architecture]
    concern: [frontend, state_management]
  example_good: "type State =\n  | { status: 'idle' }\n  | { status: 'loading' }\n  | { status: 'success'; data: User[] }\n\
    \  | { status: 'error'; error: string };\n\nfunction render(state: State) {\n  switch (state.status) {\n    case 'idle':\
    \ return <Placeholder />;\n    case 'loading': return <Spinner />;\n    case 'success': return <UserList users={state.data}\
    \ />;\n    case 'error': return <ErrorBanner message={state.error} />;\n    // compiler error if a case is missing\n \
    \ }\n}\n"
  example_bad: "// No discriminant — TypeScript can't narrow\ntype State = {\n  loading: boolean;\n  data?: User[];\n  error?:\
    \ string;\n};\n// All fields optional → impossible states representable:\n// { loading: true, data: [...], error: \"fail\"\
    \ }\n"
  when_applies: Any project using TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using TypeScript
  sources: ["https://www.typescriptlang.org/docs/handbook/2/narrowing.html#discriminated-unions"]
- id: CR-TS-UNION-002
  text: Use the never type for exhaustive checks in switch statements and conditional logic.
  why: Without an exhaustiveness check, adding a new variant to a union compiles fine but silently falls through at runtime.
    The never type forces a compile error when unhandled cases exist, catching the bug before deployment.
  how_to_do_right: Create an assertNever helper that accepts never. Place it in the default case of every switch on a discriminated
    union. The compiler will error if any case is unhandled.
  severity: high
  technologies:
    lang: [typescript]
  domains:
    domain: [architecture, quality]
    concern: [frontend, type_safety]
  example_good: "function assertNever(x: never): never {\n  throw new Error(`Unexpected value: ${x}`);\n}\n\ntype Shape =\
    \ { kind: 'circle'; r: number } | { kind: 'rect'; w: number; h: number };\n\nfunction area(s: Shape): number {\n  switch\
    \ (s.kind) {\n    case 'circle': return Math.PI * s.r ** 2;\n    case 'rect': return s.w * s.h;\n    default: return assertNever(s);\
    \ // compile error if new variant added\n  }\n}\n"
  example_bad: "function area(s: Shape): number {\n  switch (s.kind) {\n    case 'circle': return Math.PI * s.r ** 2;\n  \
    \  case 'rect': return s.w * s.h;\n    default: return 0; // Silently returns 0 for any new shape — bug hides until production\n\
    \  }\n}\n"
  when_applies: Projects using TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using TypeScript
  sources: ["https://www.typescriptlang.org/docs/handbook/2/narrowing.html#the-never-type"]
- id: CR-TS-INTERSECT-001
  text: Use intersection types to compose mixins and extend interfaces without inheritance.
  why: Deep inheritance chains are fragile and hard to refactor. Intersection types compose flat capabilities that can be
    mixed freely, and TypeScript checks structural compatibility — you get the flexibility of mixins with compile-time safety.
  how_to_do_right: Define small focused types. Compose with & for object shapes. Use interface extends for nominal documentation,
    & for ad-hoc composition.
  severity: medium
  technologies:
    lang: [typescript]
  domains:
    domain: [architecture]
    concern: [frontend]
  example_good: "type Timestamped = { createdAt: Date; updatedAt: Date };\ntype SoftDeletable = { deletedAt: Date | null };\n\
    type WithId = { id: string };\n\ntype User = WithId & Timestamped & SoftDeletable & {\n  email: string;\n  name: string;\n\
    };\n// Flat composition — easy to add/remove capabilities\n"
  example_bad: 'class BaseEntity { id: string; createdAt: Date; updatedAt: Date; }

    class SoftDeletableEntity extends BaseEntity { deletedAt: Date | null; }

    class User extends SoftDeletableEntity { email: string; name: string; }

    // Deep chain — can''t reuse SoftDeletable without BaseEntity

    '
  when_applies: Projects using TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using TypeScript
  sources: ["https://www.typescriptlang.org/docs/handbook/2/objects.html#intersection-types"]
- id: CR-TS-LITERAL-001
  text: Use literal types and const assertions for compile-time string validation and exhaustive checks.
  why: Plain string types accept any string — typos in event names, action types, or config keys compile fine but crash at
    runtime. Literal types turn strings into compiler-checked values.
  how_to_do_right: Define string literal unions for finite sets. Use as const for object literals to preserve literal types.
    Combine with template literal types for structured string patterns.
  severity: high
  technologies:
    lang: [typescript]
  domains:
    domain: [architecture, quality]
    concern: [frontend, type_safety]
  example_good: "const EVENTS = {\n  USER_LOGIN: 'user:login',\n  USER_LOGOUT: 'user:logout',\n  CART_ADD: 'cart:add',\n}\
    \ as const;\n\ntype EventName = typeof EVENTS[keyof typeof EVENTS];\n// \"user:login\" | \"user:logout\" | \"cart:add\"\
    \n\nfunction emit(event: EventName, data: unknown) { /* ... */ }\nemit('user:login', {}); // OK\nemit('user:logn', {});\
    \  // Compile error — typo caught\n"
  example_bad: 'function emit(event: string, data: unknown) { /* ... */ }

    emit(''user:logn'', {}); // No error — typo goes to production

    '
  when_applies: Projects using TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using TypeScript
  sources: ["https://www.typescriptlang.org/docs/handbook/2/everyday-types.html#literal-types"]
- id: CR-TS-GEN-001
  text: Constrain generics with extends to prevent overly broad type parameters.
  why: Unconstrained generics accept anything including undefined and null. When you access .id or .length inside the function,
    TypeScript can't verify the property exists — either you get any-like behavior or runtime errors.
  how_to_do_right: Always add extends with the minimum required shape. Use extends Record<string, unknown> for object constraints.
    Use extends readonly unknown[] for array constraints.
  severity: high
  technologies:
    lang: [typescript]
  domains:
    domain: [architecture, quality]
    concern: [frontend, type_safety]
  example_good: "function getProperty<T extends Record<string, unknown>, K extends keyof T>(\n  obj: T,\n  key: K\n): T[K]\
    \ {\n  return obj[key]; // TypeScript knows T has string keys, K is valid\n}\n\nconst user = { name: 'Alice', age: 30\
    \ };\nconst name = getProperty(user, 'name'); // string\ngetProperty(user, 'email'); // Compile error — 'email' not in\
    \ keyof typeof user\n"
  example_bad: "function getProperty<T>(obj: T, key: string): any {\n  return (obj as any)[key]; // No type safety — returns\
    \ any\n}\n"
  when_applies: Projects using TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using TypeScript
  sources: ["https://www.typescriptlang.org/docs/handbook/2/generics.html#generic-constraints"]
- id: CR-TS-GEN-002
  text: Use mapped types to create systematic type transformations instead of manually duplicating interfaces.
  why: Manually maintaining a Readonly version, Partial version, and Nullable version of the same type leads to drift — update
    one, forget the other. Mapped types derive automatically, so changes propagate.
  how_to_do_right: Use built-in mapped types (Partial, Required, Readonly) and create custom ones for domain patterns. Combine
    with conditional types for advanced transformations.
  severity: medium
  technologies:
    lang: [typescript]
  domains:
    domain: [architecture]
    concern: [frontend]
  example_good: 'type Entity = { id: string; name: string; email: string };


    // Auto-derive form input type — all optional except id

    type EntityFormInput = Partial<Omit<Entity, ''id''>>;


    // Auto-derive API response — all readonly

    type EntityResponse = Readonly<Entity>;


    // Custom mapped type — make all string fields nullable

    type Nullable<T> = { [K in keyof T]: T[K] | null };

    type NullableEntity = Nullable<Entity>;

    '
  example_bad: '// Manually maintained — drifts when Entity changes

    type EntityFormInput = { name?: string; email?: string };

    type EntityResponse = { readonly id: string; readonly name: string; readonly email: string };

    type NullableEntity = { id: string | null; name: string | null; email: string | null };

    '
  when_applies: Projects using TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using TypeScript
  sources: ["https://www.typescriptlang.org/docs/handbook/2/mapped-types.html"]
- id: CR-TS-GEN-003
  text: Use conditional types with infer to extract and transform types from existing structures.
  why: When wrapping third-party APIs or building generic utilities, you need to extract return types, parameter types, or
    promise inner types. Without infer, you resort to any or manual duplication.
  how_to_do_right: 'Use T extends (...args: infer P) => infer R to extract function signatures. Use T extends Promise<infer
    U> for async unwrapping. Combine with mapped types for powerful transformations.'
  severity: medium
  technologies:
    lang: [typescript]
  domains:
    domain: [architecture, quality]
    concern: [frontend, type_safety]
  example_good: '// Extract the resolved type from a Promise

    type Awaited<T> = T extends Promise<infer U> ? U : T;


    // Extract props type from a React component

    type PropsOf<C> = C extends React.ComponentType<infer P> ? P : never;


    // Extract array element type

    type ElementOf<T> = T extends readonly (infer E)[] ? E : never;


    type Users = Awaited<ReturnType<typeof fetchUsers>>; // User[]

    '
  example_bad: '// Manual extraction — breaks when fetchUsers return type changes

    type Users = User[];

    // Or giving up on types entirely

    const users: any = await fetchUsers();

    '
  when_applies: Projects using TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using TypeScript
  sources: ["https://www.typescriptlang.org/docs/handbook/2/conditional-types.html#inferring-within-conditional-types"]
- id: CR-TS-GEN-004
  text: Use template literal types for structured string patterns like API routes and event names.
  why: APIs and event systems use predictable string patterns (e.g., /api/v1/users/:id). Template literal types validate these
    patterns at compile time, catching typos and structural errors before runtime.
  how_to_do_right: Define base literal unions and combine with template literal syntax. Use for API routes, event names, CSS
    property patterns, and i18n keys.
  severity: medium
  technologies:
    lang: [typescript]
  domains:
    domain: [architecture, api]
    concern: [frontend]
  example_good: 'type HttpMethod = ''GET'' | ''POST'' | ''PUT'' | ''DELETE'';

    type ApiVersion = ''v1'' | ''v2'';

    type Resource = ''users'' | ''posts'' | ''comments'';


    type ApiRoute = `/api/${ApiVersion}/${Resource}`;

    // "/api/v1/users" | "/api/v1/posts" | "/api/v2/users" | ...


    type EventName = `${''user'' | ''cart''}:${''created'' | ''updated'' | ''deleted''}`;

    // "user:created" | "user:updated" | "cart:deleted" | ...


    function fetchApi(route: ApiRoute): Promise<Response> { /* ... */ }

    fetchApi(''/api/v1/users'');     // OK

    fetchApi(''/api/v3/users'');     // Compile error

    '
  example_bad: 'function fetchApi(route: string): Promise<Response> { /* ... */ }

    fetchApi(''/api/v1/uesrs''); // Typo — compiles fine, 404 at runtime

    '
  when_applies: Projects using TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using TypeScript
  sources: ["https://www.typescriptlang.org/docs/handbook/2/template-literal-types.html"]
- id: CR-TS-UTIL-001
  text: Use Pick and Omit for interface slicing — create focused types from larger interfaces.
  why: Passing a full User object when a function only needs id and name exposes unnecessary data, bloats API contracts, and
    makes refactoring harder. Sliced types document exact requirements.
  how_to_do_right: Use Pick<T, K> to select specific fields. Use Omit<T, K> to exclude fields. Prefer Pick for small subsets,
    Omit when excluding few fields from a large type.
  severity: medium
  technologies:
    lang: [typescript]
  domains:
    domain: [architecture, api, quality]
    concern: [frontend, type_safety]
  example_good: "interface User {\n  id: string;\n  name: string;\n  email: string;\n  hashedPassword: string;\n  createdAt:\
    \ Date;\n}\n\n// API response — never expose password\ntype UserPublic = Omit<User, 'hashedPassword'>;\n\n// Avatar component\
    \ only needs these\ntype AvatarProps = Pick<User, 'id' | 'name'>;\n\nfunction Avatar({ id, name }: AvatarProps) { /* ...\
    \ */ }\n"
  example_bad: "// Passing entire User everywhere — leaks hashedPassword to frontend\nfunction Avatar(user: User) {\n  //\
    \ Only uses user.id and user.name, but has access to user.hashedPassword\n}\n"
  when_applies: Projects using TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using TypeScript
  sources: ["https://www.typescriptlang.org/docs/handbook/utility-types.html#picktype-keys"]
- id: CR-TS-UTIL-002
  text: Use Record<K, V> for typed dictionaries instead of plain object types or index signatures.
  why: 'Using { [key: string]: T } doesn''t constrain keys — any string is valid. Record<K, V> with a union key type ensures
    all keys are present and only valid keys are used, catching missing entries at compile time.'
  how_to_do_right: Define key union types. Use Record<KeyUnion, ValueType> for lookup tables. Use Partial<Record<K, V>> when
    not all keys are required.
  severity: medium
  technologies:
    lang: [typescript]
  domains:
    domain: [architecture, quality]
    concern: [frontend, type_safety]
  example_good: "type Status = 'idle' | 'loading' | 'success' | 'error';\ntype StatusConfig = { label: string; color: string;\
    \ icon: string };\n\nconst STATUS_MAP: Record<Status, StatusConfig> = {\n  idle: { label: 'Ready', color: 'gray', icon:\
    \ 'circle' },\n  loading: { label: 'Loading...', color: 'blue', icon: 'spinner' },\n  success: { label: 'Done', color:\
    \ 'green', icon: 'check' },\n  error: { label: 'Failed', color: 'red', icon: 'x' },\n  // Compile error if any Status\
    \ is missing\n};\n"
  example_bad: "const STATUS_MAP: { [key: string]: StatusConfig } = {\n  idle: { label: 'Ready', color: 'gray', icon: 'circle'\
    \ },\n  loading: { label: 'Loading...', color: 'blue', icon: 'spinner' },\n  // 'success' and 'error' missing — no compile\
    \ error!\n};\n"
  when_applies: Projects using TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using TypeScript
  sources: ["https://www.typescriptlang.org/docs/handbook/utility-types.html#recordkeys-type"]
- id: CR-TS-UTIL-003
  text: Use ReturnType and Parameters to extract function type signatures for wrappers and middleware.
  why: Manually duplicating a function's return type or parameter types breaks when the original function changes. ReturnType<T>
    and Parameters<T> derive automatically, keeping wrappers in sync.
  how_to_do_right: Use ReturnType<typeof fn> for return types. Use Parameters<typeof fn> for argument tuples. Combine with
    Awaited for async functions.
  severity: medium
  technologies:
    lang: [typescript]
  domains:
    domain: [architecture, quality]
    concern: [frontend, type_safety]
  example_good: "async function fetchUser(id: string): Promise<{ name: string; email: string }> {\n  return fetch(`/api/users/${id}`).then(r\
    \ => r.json());\n}\n\n// Derived — stays in sync automatically\ntype User = Awaited<ReturnType<typeof fetchUser>>;\ntype\
    \ FetchUserArgs = Parameters<typeof fetchUser>;\n\nfunction withRetry(\n  ...args: FetchUserArgs\n): ReturnType<typeof\
    \ fetchUser> {\n  return fetchUser(...args).catch(() => fetchUser(...args));\n}\n"
  example_bad: "// Manually duplicated — drifts when fetchUser changes\ntype User = { name: string; email: string };\nfunction\
    \ withRetry(id: string): Promise<User> {\n  return fetchUser(id).catch(() => fetchUser(id));\n}\n"
  when_applies: Projects using TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using TypeScript
  sources: ["https://www.typescriptlang.org/docs/handbook/utility-types.html#returntypetype"]
- id: CR-TS-GUARD-001
  text: Use custom type guards with the is keyword for complex type narrowing.
  why: typeof only works for primitives (string, number, boolean). For interfaces and objects, TypeScript can't narrow without
    a type predicate — you end up with unsafe type assertions that bypass the compiler.
  how_to_do_right: Write functions returning paramName is Type. Check discriminant fields or use in operator. Never use as
    Type inside guards — check actual runtime properties.
  severity: high
  technologies:
    lang: [typescript]
  domains:
    domain: [architecture, quality]
    concern: [frontend, type_safety]
  example_good: "interface ApiError {\n  code: number;\n  message: string;\n  details?: Record<string, string[]>;\n}\n\nfunction\
    \ isApiError(error: unknown): error is ApiError {\n  return (\n    typeof error === 'object' &&\n    error !== null &&\n\
    \    'code' in error &&\n    typeof (error as Record<string, unknown>).code === 'number' &&\n    'message' in error &&\n\
    \    typeof (error as Record<string, unknown>).message === 'string'\n  );\n}\n\ntry { await fetchUser(id); }\ncatch (err)\
    \ {\n  if (isApiError(err)) {\n    console.error(err.code, err.message); // Fully typed\n  }\n}\n"
  example_bad: "try { await fetchUser(id); }\ncatch (err) {\n  // Unsafe assertion — crashes if err is not ApiError\n  const\
    \ apiErr = err as ApiError;\n  console.error(apiErr.code, apiErr.message);\n}\n"
  when_applies: Projects using TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using TypeScript
  sources: ["https://www.typescriptlang.org/docs/handbook/2/narrowing.html#using-type-predicates"]
- id: CR-TS-GUARD-002
  text: Use assertion functions with asserts keyword for validation that throws on failure.
  why: Regular type guards require an if-else branch. Assertion functions narrow the type for all code after the call — cleaner
    for input validation at function boundaries where invalid input should throw.
  how_to_do_right: Define functions with asserts param is Type. Throw descriptive errors on failure. Use at function entry
    points for input validation.
  severity: medium
  technologies:
    lang: [typescript]
  domains:
    domain: [architecture, quality]
    concern: [frontend, type_safety]
  example_good: "function assertIsString(value: unknown, name: string): asserts value is string {\n  if (typeof value !==\
    \ 'string') {\n    throw new TypeError(`Expected ${name} to be string, got ${typeof value}`);\n  }\n}\n\nfunction processInput(input:\
    \ unknown) {\n  assertIsString(input, 'input');\n  // TypeScript knows input is string from here\n  return input.toUpperCase();\
    \ // No assertion needed\n}\n"
  example_bad: "function processInput(input: unknown) {\n  // Unsafe cast — no runtime check\n  return (input as string).toUpperCase();\
    \ // Crashes if input is number\n}\n"
  when_applies: Projects using TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using TypeScript
  sources: ["https://www.typescriptlang.org/docs/handbook/2/narrowing.html#assertion-functions"]
- id: CR-TS-STRICT-001
  text: 'Always enable strict: true in tsconfig.json — it is the single most impactful TypeScript configuration.'
  why: Without strict mode, TypeScript allows implicit any, unchecked null access, and loose this typing. These are the exact
    bugs TypeScript was designed to catch — disabling strict mode throws away 60% of TypeScript's value.
  how_to_do_right: 'Set strict: true (enables strictNullChecks, noImplicitAny, strictFunctionTypes, etc.). Add noUncheckedIndexedAccess
    for array/object index safety. Add exactOptionalPropertyTypes for precise optionals.'
  severity: critical
  technologies:
    lang: [typescript]
  domains:
    domain: [architecture, quality]
    concern: [frontend, type_safety]
  example_good: "// tsconfig.json\n{\n  \"compilerOptions\": {\n    \"strict\": true,\n    \"noUncheckedIndexedAccess\": true,\n\
    \    \"exactOptionalPropertyTypes\": true,\n    \"noImplicitReturns\": true,\n    \"noFallthroughCasesInSwitch\": true\n\
    \  }\n}\n\n// Now TypeScript catches:\nconst arr = [1, 2, 3];\nconst val = arr[5]; // type is number | undefined (not\
    \ number)\n"
  example_bad: "// tsconfig.json — barely using TypeScript\n{\n  \"compilerOptions\": {\n    \"strict\": false // Allows implicit\
    \ any, unchecked nulls, etc.\n  }\n}\n\nconst arr = [1, 2, 3];\nconst val = arr[5]; // type is number — no undefined check!\n\
    val.toFixed(2); // Runtime: Cannot read property 'toFixed' of undefined\n"
  when_applies: Any project using TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using TypeScript
  sources: ["https://www.typescriptlang.org/tsconfig/#strict"]
- id: CR-TS-STRICT-002
  text: Never use any — use unknown for truly unknown types, then narrow with type guards.
  why: any disables ALL type checking for that value and everything it touches. It spreads virally — a single any can make
    entire call chains untyped. unknown forces you to check the type before using it.
  how_to_do_right: 'Use unknown for values from external sources (API responses, JSON.parse, catch blocks). Narrow with type
    guards or assertion functions. Use as a last resort: branded unknown types.'
  severity: critical
  technologies:
    lang: [typescript]
  domains:
    domain: [architecture, quality]
    concern: [frontend, type_safety]
  example_good: "async function fetchData(url: string): Promise<unknown> {\n  const res = await fetch(url);\n  return res.json();\
    \ // Returns unknown — must validate before use\n}\n\nconst data = await fetchData('/api/users');\nif (isUserArray(data))\
    \ {\n  // Now safely typed as User[]\n  data.forEach(user => console.log(user.name));\n}\n"
  example_bad: "async function fetchData(url: string): Promise<any> {\n  const res = await fetch(url);\n  return res.json();\n\
    }\n\nconst data = await fetchData('/api/users');\n// No type checking — typos and wrong access compile fine\ndata.forEch(user\
    \ => console.log(user.naem));\n// Runtime: data.forEch is not a function\n"
  when_applies: Any project using TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using TypeScript
  sources: ["https://www.typescriptlang.org/docs/handbook/2/types-from-types.html"]
- id: CR-TS-ADV-001
  text: Use branded types (nominal typing) for domain IDs to prevent mixing incompatible identifiers.
  why: TypeScript uses structural typing — UserId and PostId are both string and interchangeable. Passing a PostId where UserId
    is expected compiles fine but causes wrong-record bugs that are nearly impossible to debug.
  how_to_do_right: 'Create branded types using a phantom property (declare const brand: unique symbol). Create factory functions
    that return branded types. The brand exists only at compile time — zero runtime cost.'
  severity: high
  technologies:
    lang: [typescript]
  domains:
    domain: [architecture]
    concern: [frontend, domain-modeling]
  example_good: 'declare const __brand: unique symbol;

    type Brand<T, B extends string> = T & { readonly [__brand]: B };


    type UserId = Brand<string, ''UserId''>;

    type PostId = Brand<string, ''PostId''>;


    function createUserId(id: string): UserId { return id as UserId; }

    function createPostId(id: string): PostId { return id as PostId; }


    function getUser(id: UserId): Promise<User> { /* ... */ }


    const userId = createUserId(''u-123'');

    const postId = createPostId(''p-456'');

    getUser(userId); // OK

    getUser(postId); // Compile error — PostId is not UserId

    '
  example_bad: 'function getUser(id: string): Promise<User> { /* ... */ }

    function getPost(id: string): Promise<Post> { /* ... */ }


    const userId = ''u-123'';

    const postId = ''p-456'';

    getUser(postId); // Compiles fine — fetches wrong record!

    '
  when_applies: Projects using TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using TypeScript
  sources: ["https://github.com/microsoft/TypeScript/wiki/FAQ#what-is-structural-typing"]
- id: CR-TS-ADV-002
  text: Use the satisfies operator to validate type conformance without widening the inferred type.
  why: 'Using a type annotation (const x: Type = ...) widens the type — you lose literal types and autocomplete. as const
    preserves literals but doesn''t validate structure. satisfies gives you both: validation + preservation.'
  how_to_do_right: Use satisfies for configuration objects, theme constants, and route definitions where you need both type
    validation and literal inference.
  severity: medium
  technologies:
    lang: [typescript]
  domains:
    domain: [architecture, quality]
    concern: [frontend, type_safety]
  example_good: "type RouteConfig = Record<string, { path: string; auth: boolean }>;\n\nconst routes = {\n  home: { path:\
    \ '/', auth: false },\n  dashboard: { path: '/dashboard', auth: true },\n  profile: { path: '/profile', auth: true },\n\
    } satisfies RouteConfig;\n\n// TypeScript knows routes.home.path is exactly '/' (literal)\n// AND validates that all values\
    \ match RouteConfig shape\nroutes.home.path; // type: '/'\nroutes.nonexistent; // Compile error\n"
  example_bad: "// With annotation — loses literal types\nconst routes: RouteConfig = {\n  home: { path: '/', auth: false\
    \ },\n};\nroutes.home.path; // type: string (not '/')\n\n// With as const — no structural validation\nconst routes2 =\
    \ { home: { path: '/', ath: false } } as const;\n// Typo 'ath' not caught!\n"
  when_applies: Projects using TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using TypeScript
  sources: ["https://www.typescriptlang.org/docs/handbook/release-notes/typescript-4-9.html#the-satisfies-operator"]
- id: CR-TS-DECL-001
  text: Create .d.ts declaration files for untyped JavaScript libraries and CSS modules.
  why: Without declarations, imports from untyped libraries or CSS modules are implicitly any, spreading type unsafety throughout
    your codebase. declare module provides type coverage without modifying the source.
  how_to_do_right: Create a global.d.ts or types/ directory. Use declare module for CSS/image imports. Use module augmentation
    for extending third-party types. Check DefinitelyTyped (@types/) first.
  severity: medium
  technologies:
    lang: [typescript, css]
  domains:
    domain: [architecture]
    concern: [frontend, tooling]
  example_good: "// types/css-modules.d.ts\ndeclare module '*.module.css' {\n  const classes: Record<string, string>;\n  export\
    \ default classes;\n}\n\n// types/images.d.ts\ndeclare module '*.svg' {\n  const content: React.FC<React.SVGProps<SVGSVGElement>>;\n\
    \  export default content;\n}\n\n// Now imports are typed:\nimport styles from './Button.module.css'; // Record<string,\
    \ string>\nimport Logo from './logo.svg'; // React.FC<SVGProps>\n"
  example_bad: '// No declaration — implicit any, no autocomplete

    import styles from ''./Button.module.css''; // any

    import Logo from ''./logo.svg''; // any

    // TypeScript errors with noImplicitAny or shows no type info

    '
  when_applies: Projects using TypeScript projects with static typing or CSS styling and layout
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using TypeScript or CSS
  sources: ["https://www.typescriptlang.org/docs/handbook/declaration-files/introduction.html"]
- id: CR-TS-ENUM-001
  text: Prefer const objects with as const or string union types over TypeScript enums.
  why: 'TypeScript enums have surprising behaviors: numeric enums create reverse mappings that bloat bundles, string enums
    cannot be used as object keys in Record, and enums are nominal — they are not compatible with plain strings even when
    values match.'
  how_to_do_right: Use const objects with as const and derive the union type. For simple cases, use plain string literal unions.
    Reserve enums only for ambient declarations (declare enum) in .d.ts files.
  severity: high
  technologies:
    lang: [typescript]
  domains:
    domain: [architecture]
    concern: [frontend]
  example_good: "// Const object pattern — tree-shakeable, compatible with plain strings\nconst Status = {\n  ACTIVE: 'active',\n\
    \  INACTIVE: 'inactive',\n  PENDING: 'pending',\n} as const;\n\ntype Status = typeof Status[keyof typeof Status];\n//\
    \ \"active\" | \"inactive\" | \"pending\"\n\nfunction setStatus(s: Status) { /* ... */ }\nsetStatus('active'); // OK —\
    \ plain string works\nsetStatus(Status.ACTIVE); // Also OK\n"
  example_bad: "// TypeScript enum — not compatible with plain strings\nenum Status {\n  ACTIVE = 'active',\n  INACTIVE =\
    \ 'inactive',\n  PENDING = 'pending',\n}\n\nfunction setStatus(s: Status) { /* ... */ }\nsetStatus('active'); // ERROR\
    \ — string is not assignable to Status\n// Requires Status.ACTIVE everywhere — poor interop with APIs\n"
  when_applies: Projects using TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using TypeScript
  sources: ["https://www.typescriptlang.org/docs/handbook/enums.html"]
- id: CR-TS-ERR-001
  text: Type error handling explicitly with Result types or discriminated union returns — not try/catch with unknown.
  why: try/catch loses all type information — the catch variable is unknown (or any in loose mode). Functions that can fail
    should encode failure in their return type, making callers handle errors at compile time instead of discovering them at
    runtime.
  how_to_do_right: 'Create a Result<T, E> discriminated union. Return { ok: true, value: T } for success and { ok: false,
    error: E } for failure. Callers must check ok before accessing value — enforced by the compiler. Use for domain errors,
    not for unexpected crashes.'
  severity: high
  technologies:
    lang: [typescript]
  domains:
    domain: [architecture, reliability, quality]
    concern: [frontend, error_handling, type_safety]
  example_good: "type Result<T, E = Error> =\n  | { ok: true; value: T }\n  | { ok: false; error: E };\n\ntype ValidationError\
    \ = { field: string; message: string };\n\nfunction parseEmail(input: string): Result<string, ValidationError> {\n  const\
    \ trimmed = input.trim().toLowerCase();\n  if (!trimmed.includes('@')) {\n    return { ok: false, error: { field: 'email',\
    \ message: 'Missing @' } };\n  }\n  return { ok: true, value: trimmed };\n}\n\n// Caller MUST handle both cases — compiler\
    \ enforces it\nconst result = parseEmail(input);\nif (result.ok) {\n  sendEmail(result.value); // TypeScript knows it's\
    \ string\n} else {\n  showError(result.error.message); // TypeScript knows it's ValidationError\n}\n"
  example_bad: "// Throws on failure — caller may forget to catch\nfunction parseEmail(input: string): string {\n  if (!input.includes('@'))\
    \ throw new Error('Invalid email');\n  return input.trim().toLowerCase();\n}\n\n// Caller forgets try/catch — crash at\
    \ runtime\nconst email = parseEmail(input); // Might throw — TypeScript doesn't warn!\nsendEmail(email);\n"
  when_applies: Projects using TypeScript projects with static typing
  when_not_applies: server-rendered pages, APIs, CLI tools. projects not using TypeScript
  sources: ["https://www.typescriptlang.org/docs/handbook/2/narrowing.html#discriminated-unions"]
