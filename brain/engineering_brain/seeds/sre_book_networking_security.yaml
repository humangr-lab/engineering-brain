layer: rules
technology: SRE
domain: networking
knowledge:
- id: CR-SRE-NET-001
  text: DNS is a single point of failure that most teams ignore. A DNS misconfiguration or provider outage makes your entire
    service unreachable — even if all servers are healthy. DNS TTLs, redundancy, and monitoring are critical infrastructure.
  why: 'Google''s load balancing chapters (19-20) begin with DNS because it is the first point of contact for every user request.
    If DNS fails, nothing else matters — users cannot resolve your domain name and cannot reach your servers. Yet most teams
    treat DNS as "set and forget" infrastructure. Common DNS failures: TTL set too high (3600s) so DNS changes take an hour
    to propagate during an emergency, single DNS provider with no failover, CNAME chains that add latency and create cascading
    failure risk, missing monitoring on DNS resolution time. The 2016 Dyn DNS attack took down Twitter, Netflix, and Reddit
    — all because they depended on a single DNS provider. Google uses multiple DNS providers with automatic failover and short
    TTLs for critical records.

    '
  how_to_do_right: '1. Use at least 2 DNS providers for critical domains. If one goes down, the other serves records.

    2. Set TTL to 60 seconds for records that may change during incidents (A records pointing to load balancers). Short TTL
    enables fast failover.

    3. Monitor DNS resolution from external locations. If DNS fails, your internal monitoring may not detect it (internal
    DNS still works).

    4. Avoid long CNAME chains: A → CNAME → CNAME → CNAME adds latency and creates a chain of dependencies.

    5. Use ALIAS/ANAME records instead of CNAME at the zone apex. CNAME at apex violates RFC and breaks MX records.

    6. Test DNS failover: manually disable one provider and verify resolution continues from the other.

    '
  example_good: "# DNS configuration with redundancy and short TTL\n# Primary: Route53, Secondary: Cloudflare DNS\n# A record: api.example.com -> 1.2.3.4 TTL=60\n#\n# Monitoring:\n# - External DNS resolution check from 3 regions every 60s\n# - Alert if resolution fails from 2+ locations\n# - Alert if resolution time > 500ms\n#\n# terraform/dns.tf\nresource \"aws_route53_record\" \"api\" {\n  name    = \"api.example.com\"\n  type    = \"A\"\n  ttl     = 60  # Short TTL for fast failover\n  records = [aws_lb.api.dns_name]\n}\n"
  example_bad: "# Single DNS provider, high TTL, no monitoring\n# A record: api.example.com -> 1.2.3.4 TTL=3600\n#\n# DNS provider goes down -> domain unreachable for entire internet\n# TTL=3600 means even after fix, clients cache old (broken) record for 1 hour\n# No external monitoring -> internal checks show 'healthy' while users can't resolve\n"
  when_applies: "When managing DNS records for any production domain, especially those serving user-facing traffic."
  severity: high
  technologies:
    lang: [general]
    platform: [cloud, dns]
  domains:
    domain: [operations, deployment, reliability, security]
    concern: [network, dns]
  sources:
  - url: https://sre.google/sre-book/load-balancing-frontend/
    title: 'Google SRE Book — Chapter 19: Load Balancing at the Frontend'
  validation_status: cross_checked
- id: CR-SRE-NET-002
  text: TLS certificates expire silently and predictably — yet certificate expiration is one of the most common causes of
    outages. Automate certificate rotation and monitor certificate expiration dates. There is no excuse for a certificate
    expiration outage in 2025+.
  why: 'Certificate expiration outages have hit every major tech company because certificates have finite lifetimes and most
    teams manage them manually. The pattern: a certificate is issued with a 1-year validity, an engineer sets a calendar reminder,
    the engineer leaves the company, the reminder fires but no one notices, the certificate expires, HTTPS connections fail,
    and the service is unreachable. Google''s Chapter 24 on periodic scheduling touches on this: any task that must run periodically
    (certificate renewal, key rotation, backup verification) must be automated, not calendared. Let''s Encrypt and ACME protocol
    made certificate automation free and standard. There is no technical reason for manual certificate management in any modern
    system.

    '
  how_to_do_right: '1. Automate certificate rotation using ACME (Let''s Encrypt, cert-manager on Kubernetes). Zero manual
    certificate management.

    2. Monitor certificate expiration dates: alert at 30 days, 14 days, and 7 days before expiry.

    3. If using cert-manager in Kubernetes, monitor the cert-manager pod health and certificate renewal events.

    4. Test certificate rotation: manually trigger a renewal and verify the new certificate is served correctly.

    5. Monitor from OUTSIDE your infrastructure: a client connecting to your domain should see a valid certificate. Internal
    checks may miss CDN or load balancer certificate issues.

    6. Keep an inventory of ALL certificates: domain certificates, internal mTLS certificates, API client certificates, code
    signing certificates. Each can expire independently.

    '
  example_good: "# Automated certificate rotation with cert-manager on Kubernetes\napiVersion: cert-manager.io/v1\nkind: Certificate\nmetadata:\n  name: api-tls\nspec:\n  secretName: api-tls-secret\n  issuerRef:\n    name: letsencrypt-prod\n    kind: ClusterIssuer\n  dnsNames:\n  - api.example.com\n  renewBefore: 720h  # Renew 30 days before expiry\n---\n# Monitoring: alert at 30, 14, and 7 days before expiry\n- alert: CertificateExpiringSoon\n  expr: certmanager_certificate_expiration_timestamp_seconds - time() < 604800\n  labels:\n    severity: warning\n"
  example_bad: "# Manual certificate management with calendar reminders\n# 1. Engineer creates cert with 1-year validity\n# 2. Sets Google Calendar reminder for 11 months\n# 3. Engineer leaves the company\n# 4. Reminder fires — nobody notices\n# 5. Certificate expires → HTTPS fails → complete outage\n# 6. 2 hours to diagnose + emergency cert renewal\n"
  when_applies: "When managing TLS certificates for any production domain, internal mTLS, or API client certificates."
  severity: high
  technologies:
    lang: [general]
    platform: [kubernetes, load_balancer, tls, certmanager]
  domains:
    domain: [operations, deployment, reliability, security]
    concern: [network]
  sources:
  - url: https://sre.google/sre-book/distributed-periodic-scheduling/
    title: 'Google SRE Book — Chapter 24: Distributed Periodic Scheduling'
  validation_status: cross_checked
- id: CR-SRE-NET-003
  text: Network timeouts must be set explicitly at every layer. Default timeouts (30-60 seconds) are almost always wrong for
    production. Set timeouts based on expected operation duration, not library defaults.
  why: 'Google''s cascading failure chapter (Chapter 22) identifies timeout misconfiguration as a primary contributor to cascading
    failures. Default timeouts in most HTTP/RPC libraries are 30-60 seconds — an eternity in a microservice architecture.
    If a downstream service is dead, a 30-second timeout means the caller holds a thread, connection, and memory for 30 seconds
    before discovering the service is down. With 100 concurrent requests, that''s 100 threads blocked for 30 seconds — potentially
    exhausting the thread pool and making the caller unresponsive. Google sets timeouts based on the expected operation: a
    database lookup should take < 100ms, so timeout is 500ms. An API call should take < 1s, so timeout is 3s. A batch job
    may take 30s, so timeout is 60s. Never use a single default timeout for all operations.

    '
  how_to_do_right: '1. Set connect timeout separately from read timeout. Connect timeout should be 1-5 seconds. Read timeout
    depends on the operation.

    2. Set read timeout based on expected operation duration: expected_time × 3 (to allow for variance) but never > 30 seconds
    for user-facing requests.

    3. Override library defaults explicitly. Code that uses `requests.get(url)` without a timeout will hang indefinitely if
    the server is unreachable.

    4. In Python: `requests.get(url, timeout=(3, 10))` — 3s connect, 10s read. NEVER use `requests.get(url)` without timeout.

    5. Log timeout events: which service, which endpoint, what was the configured timeout, how long did it actually wait.

    6. Review timeouts quarterly: are they still appropriate? Has the downstream service become slower?

    '
  example_good: "import httpx\n\n# Explicit timeouts based on expected operation duration\nclient = httpx.Client(\n    timeout=httpx.Timeout(\n        connect=3.0,   # 3s to establish connection\n        read=10.0,     # 10s to read response (API call)\n        write=5.0,     # 5s to send request body\n        pool=5.0,      # 5s to get connection from pool\n    )\n)\n\n# Different timeouts for different operations\ndb_timeout = 0.5      # 500ms for DB lookups\napi_timeout = 3.0     # 3s for external API calls\nbatch_timeout = 60.0  # 60s for batch jobs\n"
  example_bad: "import requests\n\n# No timeout — hangs indefinitely if server is unreachable\nresponse = requests.get(\"https://api.partner.com/data\")\n# If server never responds, this thread is blocked FOREVER\n# With 100 concurrent requests, 100 threads blocked = thread pool exhausted\n\n# Library default (30-60s) is almost always wrong\nresponse = requests.get(url)  # Default timeout: none!\n"
  when_applies: "When making any network call — HTTP requests, database queries, RPC calls — in any production service."
  severity: high
  technologies:
    lang: [general, go, java, python]
    platform: [grpc, http]
  domains:
    domain: [architecture, reliability, security]
    concern: [distributed_systems, fault_tolerance, timeout, network]
  sources:
  - url: https://sre.google/sre-book/addressing-cascading-failures/
    title: 'Google SRE Book — Chapter 22: Addressing Cascading Failures'
  validation_status: cross_checked
- id: CR-SRE-NET-004
  text: Rate limiting must be implemented at the edge (API gateway, load balancer) — not inside the application. By the time
    a request reaches your application, it has already consumed network bandwidth, TLS handshake CPU, and a connection. Rejecting
    it at the edge is 100x cheaper than rejecting it in the application.
  why: 'Google''s overload handling (Chapter 21) emphasizes that load shedding should happen as early as possible in the request
    path. An abusive client sending 10,000 requests/second consumes resources at every layer it reaches: DNS resolution, TCP
    connection establishment, TLS handshake, HTTP parsing, authentication, authorization, and finally the business logic that
    rejects the request. If rate limiting is in the business logic, all preceding layers are wasted. If rate limiting is at
    the edge (CDN, API gateway, load balancer), the request is rejected after TLS — saving application resources entirely.
    Google''s GFE (Google Frontend) rejects abusive traffic before it reaches application servers, protecting application
    capacity for legitimate users.

    '
  how_to_do_right: '1. Implement rate limiting at the API gateway or load balancer level. Nginx, Envoy, and all cloud load
    balancers support this.

    2. Rate limit by: IP address (coarse), API key (medium), user ID (fine). Use all three for defense in depth.

    3. Return 429 (Too Many Requests) with Retry-After header. This is the standard HTTP response for rate limiting.

    4. Set different limits for different endpoints: public endpoints (stricter), authenticated endpoints (moderate), admin
    endpoints (lenient but monitored).

    5. Monitor rate limiting: track rejected requests by client, endpoint, and reason. High rejection rate for a specific
    client may indicate abuse.

    6. Use sliding window rate limiting, not fixed window. Fixed window has a burst vulnerability at window boundaries.

    '
  example_good: "# Rate limiting at the API gateway (Nginx) — rejects before reaching app\n# nginx.conf\nhttp {\n    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;\n    limit_req_zone $http_x_api_key zone=apikey:10m rate=1000r/s;\n\n    server {\n        location /api/ {\n            limit_req zone=api burst=20 nodelay;\n            limit_req zone=apikey burst=50 nodelay;\n            limit_req_status 429;  # Standard Too Many Requests\n            add_header Retry-After 5;\n            proxy_pass http://backend;\n        }\n    }\n}\n"
  example_bad: "# Rate limiting inside the application — too late!\n@app.route('/api/data')\ndef get_data():\n    # By the time this runs, the request has already consumed:\n    # DNS resolution, TCP connection, TLS handshake, HTTP parsing,\n    # authentication, authorization... all wasted for rejected requests\n    if rate_limiter.is_over_limit(request.remote_addr):\n        return Response(status=429)\n    return process_request()\n"
  when_applies: "When protecting any production API from abuse, DDoS, or excessive client requests."
  severity: high
  technologies:
    lang: [general]
    platform: [aws, kubernetes, dns, load_balancer]
  domains:
    domain: [reliability, security]
    concern: [network, rate_limiting]
  sources:
  - url: https://sre.google/sre-book/handling-overload/
    title: 'Google SRE Book — Chapter 21: Handling Overload'
  validation_status: cross_checked
- id: CR-SRE-NET-005
  text: Implement mTLS (mutual TLS) between services in a microservice architecture. Without authentication between services,
    any compromised service can call any other service. Zero-trust networking means every service authenticates every connection,
    even on the internal network.
  why: 'Google''s approach to service-to-service security (informed by their BeyondCorp zero-trust framework) treats the internal
    network as untrusted. In a traditional "castle and moat" architecture, services trust each other because they''re on the
    same network. This means a single compromised service can access any other service — database, payment, admin — without
    authentication. Google requires mTLS between ALL services: every connection is authenticated with a client certificate,
    and the receiving service verifies the caller''s identity before processing the request. This limits the blast radius
    of a compromise: a compromised frontend can only call services that the frontend is authorized to call, not the payment
    service or admin API.

    '
  how_to_do_right: '1. Deploy mTLS between ALL services using a service mesh (Istio, Linkerd) or manual certificate management.

    2. Each service gets a unique identity (certificate). The receiving service checks the caller''s identity against an access
    control list.

    3. Use a certificate authority (internal CA, cert-manager, SPIFFE) to issue and rotate service certificates automatically.

    4. Rotate service certificates frequently (24-72 hours). Short-lived certificates limit the window of compromise.

    5. Monitor mTLS: log authentication failures. An unexpected authentication failure may indicate a compromised or misconfigured
    service.

    6. Do NOT use service accounts or API keys as the sole authentication method — they are long-lived and shared, making
    rotation difficult.

    '
  example_good: "# mTLS with SPIFFE identity — automatic cert rotation\n# Istio strict mTLS + AuthorizationPolicy\napiVersion: security.istio.io/v1beta1\nkind: PeerAuthentication\nmetadata:\n  name: default\nspec:\n  mtls:\n    mode: STRICT\n---\n# Only order-service can call payment-service\napiVersion: security.istio.io/v1beta1\nkind: AuthorizationPolicy\nmetadata:\n  name: payment-access\nspec:\n  selector:\n    matchLabels:\n      app: payment-service\n  rules:\n  - from:\n    - source:\n        principals: [\"cluster.local/ns/prod/sa/order-service\"]\n    to:\n    - operation:\n        methods: [\"POST\"]\n        paths: [\"/api/v1/charge\"]\n"
  example_bad: "# No mTLS — services trust the network (castle-and-moat)\n# Any pod on the internal network can call any service:\n# curl http://payment-service:8080/admin/refund-all  # No auth\n# curl http://user-db:5432/  # Direct DB access, no auth\n#\n# Attacker compromises one pod -> access to everything\n# No encryption -> traffic can be sniffed by compromised neighbor\n"
  when_applies: "When deploying services that communicate over any network, including 'trusted' internal networks in a microservice architecture."
  severity: high
  technologies:
    lang: [general]
    platform: [kubernetes, istio]
  domains:
    domain: [reliability, security]
    concern: [network, zero_trust]
  sources:
  - url: https://sre.google/sre-book/managing-critical-state/
    title: 'Google SRE Book — Chapter 23: Managing Critical State: Distributed Consensus for Reliability'
  validation_status: cross_checked
- id: CR-SRE-NET-006
  text: Least privilege for service accounts — every service should have the minimum permissions necessary to do its job.
    A web server does not need write access to the user database. A batch job does not need access to the payment API. Over-permissioned
    services turn a small compromise into a total breach.
  why: 'Google applies the principle of least privilege to service identities with the same rigor as to human identities.
    The reasoning is simple: if a service is compromised, the attacker gains the service''s permissions. A web server with
    read-only database access limits the attacker to reading data. A web server with database admin access allows the attacker
    to delete all data. Google''s services have fine-grained permissions: which APIs they can call, which database tables
    they can access, which operations (read/write/admin) they can perform. This is enforced through service identity (mTLS
    certificates) and access control policies, not through network segmentation alone.

    '
  how_to_do_right: '1. Define permissions per service: which APIs it can call, which databases it can access, which operations
    it can perform.

    2. Use separate credentials for different operations: read-only credentials for the web tier, read-write for the backend,
    admin for migrations only.

    3. Review service permissions quarterly: remove permissions that are no longer needed. Permission accumulation is a security
    risk.

    4. Use IAM roles (cloud) or RBAC (Kubernetes) to enforce permissions. Don''t rely on application-level checks alone.

    5. Log all permission-escalated operations: database admin commands, API admin endpoints, infrastructure changes.

    6. Audit: "If this service is compromised, what can the attacker do?" The answer should be "limited damage to one component,"
    not "access everything."

    '
  example_good: "# Kubernetes RBAC: web-tier gets read-only DB access only\napiVersion: rbac.authorization.k8s.io/v1\nkind: Role\nmetadata:\n  name: web-tier-db-reader\nrules:\n- apiGroups: [\"\"]\n  resources: [\"secrets\"]\n  resourceNames: [\"db-readonly-credentials\"]  # Only read-only creds\n  verbs: [\"get\"]\n---\n# Separate credentials per operation\n# web_tier:     db_user=web_reader    (SELECT only)\n# backend_api:  db_user=api_writer    (SELECT, INSERT, UPDATE)\n# migrations:   db_user=schema_admin  (ALL, only during deploys)\n"
  example_bad: "# Over-permissioned: every service uses the same admin credentials\n# web_tier:     db_user=admin  (can DROP DATABASE)\n# backend_api:  db_user=admin  (can DROP DATABASE)\n# batch_jobs:   db_user=admin  (can DROP DATABASE)\n#\n# Attacker compromises web tier -> has full admin DB access\n# Can delete all data, exfiltrate everything, modify schemas\n"
  when_applies: "When assigning permissions to service accounts, IAM roles, or database credentials for any production service."
  severity: high
  technologies:
    lang: [general]
    platform: [aws, iam, gcp, kubernetes]
  domains:
    domain: [reliability, security]
    concern: [authorization, network]
  sources:
  - url: https://sre.google/sre-book/reliable-product-launches/
    title: 'Google SRE Book — Chapter 27: Reliable Product Launches at Scale'
  validation_status: cross_checked
