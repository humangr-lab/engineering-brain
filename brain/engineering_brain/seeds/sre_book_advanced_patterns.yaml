- id: CR-SRE-ADV-015
  text: Multi-region architectures are the only way to achieve > 99.99% availability. A single region has too many correlated
    failure modes (power, network, cooling, human error) to reliably exceed four nines. Active-active across 2+ regions is
    required.
  why: 'Google operates in multiple regions because single-region availability has a ceiling around 99.95-99.99%. Regional
    failures include: power grid outages (affect all datacenters in the region), network backbone failures (isolate the region
    from the internet), cooling system failures (thermal shutdown of all servers), and regional configuration pushes (a bad
    config affects all instances in the region). Multi-region active-active eliminates all of these: when region A fails,
    regions B and C continue serving. The challenge is data: synchronous replication across regions adds latency (10-100ms
    per write), while asynchronous replication risks data loss during failover. Google uses a combination of Spanner (synchronous
    global replication for critical data) and regional databases with async replication for latency-sensitive but less critical
    data.

    '
  how_to_do_right: '1. For > 99.99% availability, deploy in at least 2 regions with active-active serving.

    2. Choose data replication strategy per dataset: synchronous (strong consistency, higher latency) vs asynchronous (lower
    latency, risk of data loss on failover).

    3. Test regional failover quarterly: drain one region completely and verify the other handles 100% of traffic.

    4. Use DNS-based global load balancing to direct users to the nearest healthy region. TTL should be short (30-60s) for
    fast failover.

    5. Design for "region-local" access patterns: a user''s data should be in their nearest region for low latency. Cross-region
    reads should be rare.

    6. Track RPO (Recovery Point Objective: max data loss on failover) and RTO (Recovery Time Objective: max failover time)
    per region and test them.

    '
  example_good: "from dataclasses import dataclass\nfrom typing import Dict\n\n@dataclass\nclass RegionConfig:\n    region: str\n    is_active: bool\n    replication_mode: str  # 'synchronous' or 'asynchronous'\n    rpo_seconds: int  # Recovery Point Objective\n    rto_seconds: int  # Recovery Time Objective\n\nclass MultiRegionService:\n    regions = [\n        RegionConfig('us-east-1', is_active=True, replication_mode='synchronous', rpo_seconds=0, rto_seconds=30),\n        RegionConfig('us-west-2', is_active=True, replication_mode='synchronous', rpo_seconds=0, rto_seconds=30),\n        RegionConfig('eu-west-1', is_active=True, replication_mode='asynchronous', rpo_seconds=60, rto_seconds=120),\n    ]\n\n    def failover(self, failed_region: str):\n        \"\"\"Drain failed region, redistribute to healthy regions.\"\"\"\n        healthy = [r for r in self.regions if r.region != failed_region and r.is_active]\n        assert len(healthy) >= 1, 'No healthy regions available'\n        dns_update(failed_region, weight=0)\n        for r in healthy:\n            dns_update(r.region, weight=100 // len(healthy))\n\n    def quarterly_failover_test(self):\n        \"\"\"Test: drain one region, verify others handle 100% traffic.\"\"\"\n        for region in self.regions:\n            self.failover(region.region)\n            assert all_health_checks_passing()\n            assert p99_latency() < self.slo_latency_ms * 1.5\n            self.restore_all()\n"
  example_bad: "# Single-region deployment — ceiling of ~99.95% availability\nclass SingleRegionService:\n    region = 'us-east-1'\n    # Regional power outage → service down for hours\n    # Regional network failure → service completely unreachable\n    # Regional config push → all instances affected simultaneously\n    # No failover possible — there's nowhere to fail over TO\n"
  when_applies: "When availability requirements exceed 99.99% — single-region deployments have too many correlated failure modes to achieve four nines."
  severity: high
  technologies:
    platform: [aws, azure, gcp, spanner, postgresql, kubernetes]
  domains:
    domain: [architecture, reliability]
    concern: [distributed_systems, availability]
