layer: rules
technology: Firebase
domain: backend
knowledge:
- id: CR-FIRE-001
  text: Firestore Security Rules must deny all access by default — then allow specific paths for specific users.
  why: 'Firestore is directly accessible from the client. If security rules are permissive (allow read, write: if true), any
    user with your Firebase config (which is public in your JS bundle) can read, modify, or delete ANY document in your database.
    This is the #1 Firebase security breach vector.'
  how_to_do_right: 'Start with deny-all rules. Allow access per collection with conditions: request.auth != null (authenticated),
    request.auth.uid == resource.data.userId (owner), request.resource.data.keys() (validate fields). Test rules with the
    Firestore emulator. Use Firebase App Check to block non-app traffic.'
  severity: critical
  technologies:
    library: [firebase]
    platform: [firestore]
  domains:
    domain: [architecture, security]
    concern: [backend, authentication]
  example_good: "// firestore.rules — deny by default, allow specifically\nrules_version = '2';\nservice cloud.firestore {\n\
    \  match /databases/{database}/documents {\n    // Default: deny everything\n    match /{document=**} {\n      allow read,\
    \ write: if false;\n    }\n\n    // Users can read/write only their own profile\n    match /users/{userId} {\n      allow\
    \ read: if request.auth != null && request.auth.uid == userId;\n      allow write: if request.auth != null\n         \
    \          && request.auth.uid == userId\n                   && request.resource.data.keys().hasOnly(['name', 'email',\
    \ 'avatar'])\n                   && request.resource.data.name is string\n                   && request.resource.data.name.size()\
    \ <= 100;\n    }\n\n    // Orders: owner reads, only server creates (via Admin SDK)\n    match /orders/{orderId} {\n \
    \     allow read: if request.auth != null\n                  && resource.data.customerId == request.auth.uid;\n      allow\
    \ create: if false;  // Only Admin SDK can create\n    }\n  }\n}\n"
  example_bad: "// firestore.rules — DANGEROUS: allows anyone to do anything\nrules_version = '2';\nservice cloud.firestore\
    \ {\n  match /databases/{database}/documents {\n    match /{document=**} {\n      allow read, write: if true;  // ANYONE\
    \ can read/write/delete EVERYTHING\n    }\n  }\n}\n// Your Firebase config is PUBLIC in your JS bundle\n// Attacker: reads\
    \ all user data, deletes all orders, modifies all prices\n"
  when_applies: Any project using Firebase or Firestore
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities. projects
    not using Firebase or Firestore
  sources: ["https://firebase.google.com/docs/firestore/security/get-started"]
- id: CR-FIRE-002
  text: Use Firestore's real-time listeners for live data — do not poll with repeated get() calls.
  why: Polling with get() every N seconds wastes bandwidth, increases latency (data is always stale by N seconds), and costs
    more (Firestore charges per read). Real-time listeners use a persistent WebSocket connection that pushes only CHANGED
    documents — lower latency, lower cost, less bandwidth.
  how_to_do_right: Use onSnapshot() for real-time updates. Handle the initial snapshot (full data) and subsequent snapshots
    (only changes via docChanges). Detach listeners when components unmount to prevent memory leaks. Use metadata.hasPendingWrites
    to show optimistic UI while writes are in flight.
  severity: high
  technologies:
    lang: [javascript]
    framework: [frontend, react]
    library: [firebase]
    platform: [firestore]
  domains:
    domain: [architecture, performance]
    concern: [backend, frontend]
  example_good: "// React — real-time listener with cleanup\nimport { collection, query, where, onSnapshot } from 'firebase/firestore';\n\
    \nfunction OrdersList({ userId }) {\n  const [orders, setOrders] = useState([]);\n\n  useEffect(() => {\n    const q =\
    \ query(\n      collection(db, 'orders'),\n      where('customerId', '==', userId),\n      orderBy('createdAt', 'desc'),\n\
    \      limit(50),\n    );\n\n    // Real-time listener — pushes only changes\n    const unsubscribe = onSnapshot(q, (snapshot)\
    \ => {\n      const updated = [];\n      snapshot.docChanges().forEach((change) => {\n        if (change.type === 'added'\
    \ || change.type === 'modified') {\n          updated.push({ id: change.doc.id, ...change.doc.data() });\n        }\n\
    \      });\n      setOrders((prev) => mergeOrders(prev, updated, snapshot));\n    }, (error) => {\n      console.error('Listener\
    \ error:', error);\n    });\n\n    return () => unsubscribe();  // Cleanup on unmount\n  }, [userId]);\n\n  return <OrderList\
    \ items={orders} />;\n}\n"
  example_bad: "// Polling — wasteful, stale, expensive\nfunction OrdersList({ userId }) {\n  const [orders, setOrders] =\
    \ useState([]);\n\n  useEffect(() => {\n    const interval = setInterval(async () => {\n      // Fetches ALL orders every\
    \ 5 seconds — even if nothing changed\n      const snap = await getDocs(query(\n        collection(db, 'orders'),\n  \
    \      where('customerId', '==', userId),\n      ));\n      setOrders(snap.docs.map(d => ({ id: d.id, ...d.data() })));\n\
    \    }, 5000);\n\n    return () => clearInterval(interval);\n  }, [userId]);\n  // Problems: 5s stale data, reads 50 docs\
    \ × 12/min = 600 reads/min per user\n}\n"
  when_applies: Projects using Firebase, Firestore, React component-based UIs, or JavaScript/TypeScript projects
  when_not_applies: server-rendered pages, APIs, CLI tools
  sources: ["https://firebase.google.com/docs/firestore/query-data/listen"]
- id: CR-FIRE-003
  text: Use Cloud Functions for server-side logic triggered by Firestore events — do not put business logic in security rules.
  why: 'Security rules can validate data shape and ownership, but they cannot: call external APIs, send emails, update related
    documents, calculate derived values, or enforce complex business logic (e.g. ''order total must match sum of items'').
    Stuffing business logic into rules makes them unreadable, untestable, and unmaintainable.'
  how_to_do_right: 'Use Cloud Functions triggered by Firestore events (onCreate, onUpdate, onDelete). Keep security rules
    focused on authentication and authorization. Use functions for: cascading updates, external API calls, complex validation,
    notifications, and analytics. Use transactions in functions for atomic multi-document updates.'
  severity: high
  technologies:
    library: [firebase]
    platform: [gcp, cloud_functions, firestore]
  domains:
    domain: [architecture]
    concern: [backend]
  example_good: "// Cloud Function — triggered when order is created\nimport { onDocumentCreated } from 'firebase-functions/v2/firestore';\n\
    import { getFirestore, FieldValue } from 'firebase-admin/firestore';\n\nexport const onOrderCreated = onDocumentCreated(\n\
    \  'orders/{orderId}',\n  async (event) => {\n    const order = event.data.data();\n    const db = getFirestore();\n\n\
    \    // 1. Validate business logic (can't do in rules)\n    const itemsTotal = order.items.reduce((sum, item) => sum +\
    \ item.price * item.qty, 0);\n    if (Math.abs(itemsTotal - order.total) > 0.01) {\n      await event.data.ref.update({\
    \ status: 'INVALID', reason: 'Total mismatch' });\n      return;\n    }\n\n    // 2. Update related documents atomically\n\
    \    const batch = db.batch();\n    batch.update(db.doc(`users/${order.customerId}`), {\n      orderCount: FieldValue.increment(1),\n\
    \      lastOrderAt: FieldValue.serverTimestamp(),\n    });\n\n    // 3. Send notification (external API)\n    await sendOrderConfirmationEmail(order.customerId,\
    \ order);\n\n    batch.update(event.data.ref, { status: 'CONFIRMED' });\n    await batch.commit();\n  }\n);\n"
  example_bad: "// Business logic crammed into security rules — unmaintainable\nmatch /orders/{orderId} {\n  allow create:\
    \ if request.auth != null\n    && request.resource.data.total == request.resource.data.items.reduce(\n         (sum, item)\
    \ => sum + item.price * item.qty, 0)  // Doesn't even work!\n    // Rules can't: reduce arrays, call APIs, update other\
    \ docs, send emails\n}\n"
  when_applies: Projects using Firebase, Cloud Functions, or Firestore
  when_not_applies: small scripts under 100 lines, single-purpose utilities
  sources: ["https://firebase.google.com/docs/functions/firestore-events"]
- id: CR-FIRE-004
  text: Do NOT use Firebase for applications requiring complex queries, joins, or relational data — use Supabase or PostgreSQL.
  why: 'Firestore is a document database. It cannot: JOIN documents across collections, filter on multiple inequality conditions
    (e.g. price > 10 AND rating > 4), perform full-text search, or aggregate across collections efficiently. Workarounds (denormalization,
    composite indexes, Cloud Functions) add complexity and cost that often exceed switching to PostgreSQL.'
  how_to_do_right: 'Use Firebase for: real-time collaborative apps, simple CRUD, chat, live dashboards, and projects where
    real-time sync is the primary requirement. Use Supabase/PostgreSQL for: e-commerce (orders + products + users JOIN), analytics
    dashboards, reporting, full-text search, and complex filtering. Evaluate query patterns BEFORE choosing a database.'
  severity: high
  technologies:
    library: [firebase]
    platform: [firestore, supabase, postgresql]
  domains:
    domain: [architecture]
    concern: [backend, data, database]
  example_good: "// Firebase — great for real-time collaborative data\n// Chat app: messages arrive instantly via onSnapshot\n\
    const q = query(\n  collection(db, 'rooms', roomId, 'messages'),\n  orderBy('timestamp', 'desc'),\n  limit(50),\n);\n\
    onSnapshot(q, (snap) => renderMessages(snap.docs));\n// Perfect: simple queries, real-time updates, offline support\n\n\
    // Supabase — great for complex relational queries\n// E-commerce: orders with products and customer data\nconst { data:\
    \ orders } = await supabase\n  .from('orders')\n  .select(`\n    id, total, created_at,\n    customer:customers(name,\
    \ email, tier),\n    items:order_items(\n      quantity, price,\n      product:products(name, category, image_url)\n \
    \   )\n  `)\n  .gte('total', 100)\n  .lte('created_at', '2026-02-01')\n  .order('created_at', { ascending: false });\n\
    // One query: 3 JOINs + 2 filters + sort — impossible in Firestore\n"
  example_bad: "// Firestore — forcing relational patterns into a document database\n// To show \"orders with product names\
    \ and customer info\":\nconst orders = await getDocs(collection(db, 'orders'));\nfor (const order of orders.docs) {\n\
    \  // N+1 query: fetch customer for each order\n  const customer = await getDoc(doc(db, 'customers', order.data().customerId));\n\
    \  // N+M query: fetch each product in each order\n  for (const item of order.data().items) {\n    const product = await\
    \ getDoc(doc(db, 'products', item.productId));\n  }\n}\n// 50 orders × (1 customer + 3 products) = 200 reads per page\
    \ load\n// Firestore charges per read — this gets expensive fast\n"
  when_applies: Projects using Firebase, Firestore, Supabase, or PostgreSQL databases
  when_not_applies: small scripts under 100 lines, single-purpose utilities
  sources: ["https://firebase.google.com/docs/firestore/query-data/queries", "https://supabase.com/docs/guides/database/overview"]
- id: CR-FIRE-005
  text: Use Supabase Row Level Security (RLS) for data access control — never rely on application-level checks alone.
  why: Without RLS, any client with the Supabase anon key (public in your JS bundle) can access ALL rows in ALL tables via
    the PostgREST API. Application-level checks can be bypassed by directly calling the API. RLS enforces access at the DATABASE
    level — even direct SQL connections respect the policies.
  how_to_do_right: Enable RLS on every table. Create policies for SELECT, INSERT, UPDATE, DELETE. Use auth.uid() to identify
    the current user. Use auth.jwt() for role-based access. Test policies with the Supabase SQL editor. Always enable RLS
    before exposing tables to the client.
  severity: critical
  technologies:
    platform: [supabase, postgresql]
  domains:
    domain: [architecture, security]
    concern: [backend, authentication]
  example_good: "-- Enable RLS on all tables\nALTER TABLE orders ENABLE ROW LEVEL SECURITY;\nALTER TABLE profiles ENABLE ROW\
    \ LEVEL SECURITY;\n\n-- Users can only read their own orders\nCREATE POLICY \"Users read own orders\"\n  ON orders FOR\
    \ SELECT\n  USING (auth.uid() = customer_id);\n\n-- Users can create orders only for themselves\nCREATE POLICY \"Users\
    \ create own orders\"\n  ON orders FOR INSERT\n  WITH CHECK (\n    auth.uid() = customer_id\n    AND status = 'pending'\
    \  -- Can only create pending orders\n    AND total > 0\n  );\n\n-- Admins can read all orders\nCREATE POLICY \"Admins\
    \ read all orders\"\n  ON orders FOR SELECT\n  USING (\n    auth.jwt() ->> 'role' = 'admin'\n  );\n\n-- Profiles: users\
    \ read own, update own (limited fields)\nCREATE POLICY \"Users read own profile\"\n  ON profiles FOR SELECT\n  USING (auth.uid()\
    \ = id);\n\nCREATE POLICY \"Users update own profile\"\n  ON profiles FOR UPDATE\n  USING (auth.uid() = id)\n  WITH CHECK\
    \ (\n    -- Cannot change role or email via client\n    id = OLD.id AND role = OLD.role AND email = OLD.email\n  );\n"
  example_bad: "-- Table WITHOUT RLS — anyone can read/write everything\nCREATE TABLE orders (\n  id uuid PRIMARY KEY,\n \
    \ customer_id uuid,\n  total decimal,\n  status text\n);\n-- Forgot to enable RLS!\n-- Supabase anon key (public in JS)\
    \ → attacker reads ALL orders:\n-- supabase.from('orders').select('*') → returns every order in the database\n"
  when_applies: Any project using Supabase or PostgreSQL databases
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities. projects
    not using Supabase or PostgreSQL
  sources: ["https://supabase.com/docs/guides/database/postgres/row-level-security"]
- id: CR-FIRE-006
  text: Use Supabase Realtime (PostgreSQL CDC) for live updates — it is built on WAL-based change data capture.
  why: Supabase Realtime listens to PostgreSQL's Write-Ahead Log (WAL) and pushes changes over WebSocket. Unlike Firestore's
    real-time listeners which are native to the database, Supabase Realtime is an opt-in layer that must be explicitly enabled
    per table. Without it, clients must poll — losing Supabase's main advantage over raw PostgreSQL.
  how_to_do_right: Enable Realtime on tables that need live updates (Supabase dashboard or SQL). Subscribe with channel.on('postgres_changes').
    Use filters to subscribe to specific rows or events (INSERT, UPDATE, DELETE). Combine with RLS — Realtime respects Row
    Level Security policies. Unsubscribe when components unmount.
  severity: high
  technologies:
    framework: [frontend, react]
    platform: [supabase, postgresql]
  domains:
    domain: [architecture]
    concern: [backend, frontend]
  example_good: "-- Enable Realtime on the orders table\nALTER PUBLICATION supabase_realtime ADD TABLE orders;\n\n// React\
    \ — subscribe to real-time order updates\nimport { useEffect, useState } from 'react';\nimport { supabase } from './supabaseClient';\n\
    \nfunction OrderDashboard({ userId }) {\n  const [orders, setOrders] = useState([]);\n\n  useEffect(() => {\n    // Initial\
    \ fetch\n    supabase.from('orders')\n      .select('*')\n      .eq('customer_id', userId)\n      .order('created_at',\
    \ { ascending: false })\n      .then(({ data }) => setOrders(data));\n\n    // Real-time subscription — only this user's\
    \ orders (RLS enforced)\n    const channel = supabase\n      .channel('orders-realtime')\n      .on('postgres_changes',\
    \ {\n        event: '*',           // INSERT, UPDATE, DELETE\n        schema: 'public',\n        table: 'orders',\n  \
    \      filter: `customer_id=eq.${userId}`,\n      }, (payload) => {\n        if (payload.eventType === 'INSERT') {\n \
    \         setOrders((prev) => [payload.new, ...prev]);\n        } else if (payload.eventType === 'UPDATE') {\n       \
    \   setOrders((prev) => prev.map((o) =>\n            o.id === payload.new.id ? payload.new : o\n          ));\n      \
    \  } else if (payload.eventType === 'DELETE') {\n          setOrders((prev) => prev.filter((o) => o.id !== payload.old.id));\n\
    \        }\n      })\n      .subscribe();\n\n    return () => { supabase.removeChannel(channel); };\n  }, [userId]);\n\
    \n  return <OrderList items={orders} />;\n}\n"
  example_bad: "// Polling Supabase — defeats the purpose of using it\nuseEffect(() => {\n  const interval = setInterval(async\
    \ () => {\n    const { data } = await supabase.from('orders').select('*');\n    setOrders(data);  // Full refetch every\
    \ 5 seconds\n  }, 5000);\n  return () => clearInterval(interval);\n}, []);\n// Stale data, wasted bandwidth, unnecessary\
    \ database load\n"
  when_applies: Projects using Supabase, PostgreSQL databases, or React component-based UIs
  when_not_applies: server-rendered pages, APIs, CLI tools
  sources: ["https://supabase.com/docs/guides/realtime"]
- id: CR-FIRE-007
  text: Use Supabase Edge Functions (Deno) for server-side logic — they run close to users with cold starts under 200ms.
  why: Complex business logic (payment processing, email sending, third-party API calls) cannot run in the browser (security)
    and should not be crammed into PostgreSQL functions (wrong tool). Edge Functions are serverless Deno functions that deploy
    to 30+ regions, have access to environment variables and secrets, and can call any external API.
  how_to_do_right: 'Create Edge Functions for: webhooks, payment processing, email sending, and complex validation. Use Deno.env.get()
    for secrets. Import from npm via npm: specifier. Test locally with supabase functions serve. Deploy with supabase functions
    deploy. Use the Supabase client library inside functions for database access.'
  severity: medium
  technologies:
    lang: [typescript]
    framework: [backend, deno]
    platform: [supabase]
  domains:
    domain: [architecture]
    concern: [backend, serverless]
  example_good: "// supabase/functions/process-payment/index.ts\nimport { serve } from \"https://deno.land/std@0.177.0/http/server.ts\"\
    ;\nimport { createClient } from \"npm:@supabase/supabase-js@2\";\nimport Stripe from \"npm:stripe@14\";\n\nserve(async\
    \ (req) => {\n  const { orderId } = await req.json();\n\n  // Auth — verify the JWT from the request\n  const authHeader\
    \ = req.headers.get(\"Authorization\");\n  const supabase = createClient(\n    Deno.env.get(\"SUPABASE_URL\")!,\n    Deno.env.get(\"\
    SUPABASE_ANON_KEY\")!,\n    { global: { headers: { Authorization: authHeader! } } },\n  );\n\n  // Database access — respects\
    \ RLS (uses user's JWT)\n  const { data: order } = await supabase\n    .from(\"orders\")\n    .select(\"*, customer:customers(email,\
    \ stripe_customer_id)\")\n    .eq(\"id\", orderId)\n    .single();\n\n  // Server-side logic — secrets safe, not in browser\n\
    \  const stripe = new Stripe(Deno.env.get(\"STRIPE_SECRET_KEY\")!);\n  const payment = await stripe.paymentIntents.create({\n\
    \    amount: Math.round(order.total * 100),\n    currency: \"usd\",\n    customer: order.customer.stripe_customer_id,\n\
    \  });\n\n  // Update order status\n  await supabase.from(\"orders\").update({\n    status: \"payment_pending\",\n   \
    \ stripe_payment_id: payment.id,\n  }).eq(\"id\", orderId);\n\n  return new Response(JSON.stringify({ clientSecret: payment.client_secret\
    \ }));\n});\n"
  example_bad: "// Stripe secret key in the browser — SECURITY CATASTROPHE\nconst stripe = new Stripe('sk_live_ACTUAL_SECRET_KEY');\
    \  // Visible in DevTools!\nconst payment = await stripe.paymentIntents.create({\n  amount: order.total * 100,  // User\
    \ can modify this in DevTools\n  currency: 'usd',\n});\n// Attacker: changes amount to $0.01, uses your Stripe key for\
    \ other charges\n"
  when_applies: Projects using Supabase, Deno, or TypeScript projects with static typing
  sources: ["https://supabase.com/docs/guides/functions"]
- id: CR-FIRE-008
  text: Choose Firebase for rapid prototyping and real-time apps — choose Supabase when you need SQL, joins, or self-hosting.
  why: Firebase and Supabase solve different problems optimally. Firebase excels at real-time sync, offline-first mobile apps,
    and rapid prototyping (auth in 5 minutes). Supabase excels at relational data, complex queries, migrations, and avoiding
    vendor lock-in. Choosing wrong costs weeks of workarounds.
  how_to_do_right: 'Use Firebase when: you need real-time sync (chat, collaborative editing), offline-first mobile (Firestore
    offline persistence), or fastest time-to-prototype. Use Supabase when: your data is relational (users → orders → products),
    you need complex queries (GROUP BY, JOIN, subqueries), you want SQL migrations (version-controlled schema), or you need
    to self-host (compliance, data residency).'
  severity: high
  technologies:
    library: [firebase]
    platform: [supabase, postgresql, firestore]
  domains:
    domain: [architecture]
    concern: [backend]
  example_good: '// DECISION MATRIX — choose the right tool

    //

    // Requirement                          Firebase    Supabase

    // ─────────────────────────────────── ────────── ──────────

    // Real-time sync (chat, collab)        ★★★★★      ★★★☆☆

    // Offline-first mobile                 ★★★★★      ★★☆☆☆

    // Time to prototype                    ★★★★★      ★★★★☆

    // Complex queries (JOIN, GROUP BY)     ★☆☆☆☆      ★★★★★

    // Relational data model                ★★☆☆☆      ★★★★★

    // SQL migrations                       ☆☆☆☆☆      ★★★★★

    // Full-text search                     ☆☆☆☆☆      ★★★★☆

    // Self-hosting                         ☆☆☆☆☆      ★★★★★

    // Vendor lock-in risk                  HIGH        LOW

    // Pricing predictability               VARIABLE    PREDICTABLE


    // Firebase: Chat app, live dashboard, mobile game leaderboard

    // Supabase: E-commerce, SaaS, CRM, analytics, any relational domain

    '
  example_bad: '// Using Firebase for a relational e-commerce platform

    // "We''ll just denormalize everything!"

    // orders/{orderId}: { items: [...], customerName: "Alice", ... }

    // Problem 1: Customer changes name → update ALL their orders

    // Problem 2: "Show orders by category with avg rating" → impossible query

    // Problem 3: Monthly revenue report → Cloud Function reads ALL orders

    // 6 months later: migrating to PostgreSQL, rewriting everything

    '
  when_applies: Projects using Firebase, Supabase, PostgreSQL databases, or Firestore
  when_not_applies: small scripts under 100 lines, single-purpose utilities
  sources: ["https://firebase.google.com/docs/firestore", "https://supabase.com/docs"]
- id: CR-FIRE-009
  text: Both Firebase and Supabase Authentication work well — choose based on your database choice, not auth features.
  why: 'Firebase Auth and Supabase Auth both support: social login (Google, Apple, GitHub), email/password, phone/SMS, magic
    links, and MFA. The auth features are nearly identical. The differentiator is database integration — Firebase Auth tokens
    integrate seamlessly with Firestore rules, while Supabase Auth tokens integrate with PostgreSQL RLS. Mixing (Firebase
    Auth + Supabase DB) creates unnecessary complexity.'
  how_to_do_right: If using Firestore, use Firebase Auth (security rules use request.auth natively). If using Supabase PostgreSQL,
    use Supabase Auth (RLS uses auth.uid() natively). If migrating from Firebase to Supabase, migrate auth last — it is the
    hardest part (user passwords are not exportable from Firebase).
  severity: medium
  technologies:
    library: [firebase]
    platform: [supabase]
  domains:
    domain: [architecture, security]
    concern: [backend, authentication]
  example_good: "// Firebase Auth → Firestore Rules (natural pairing)\n// Client\nimport { signInWithPopup, GoogleAuthProvider\
    \ } from 'firebase/auth';\nconst result = await signInWithPopup(auth, new GoogleAuthProvider());\n// Token automatically\
    \ included in Firestore requests\n\n// Firestore rules use request.auth directly\n// allow read: if request.auth.uid ==\
    \ resource.data.userId;\n\n// ─────────────────────────────────────────\n\n// Supabase Auth → PostgreSQL RLS (natural\
    \ pairing)\n// Client\nconst { data } = await supabase.auth.signInWithOAuth({\n  provider: 'google',\n});\n// Token automatically\
    \ included in all Supabase queries\n\n// RLS policies use auth.uid() directly\n// CREATE POLICY \"read_own\" ON orders\n\
    //   USING (auth.uid() = customer_id);\n"
  example_bad: '// Firebase Auth + Supabase Database — unnecessary complexity

    // 1. User signs in with Firebase Auth (gets Firebase JWT)

    // 2. Need to verify Firebase JWT in Supabase Edge Function

    // 3. Create a Supabase-compatible session from Firebase token

    // 4. RLS doesn''t work with Firebase tokens — custom JWT needed

    // 5. Two auth systems to manage, debug, and monitor

    // Just use Supabase Auth if you''re using Supabase Database!

    '
  when_applies: Projects using Firebase or Supabase
  when_not_applies: projects not using Firebase or Supabase
  sources: ["https://firebase.google.com/docs/auth", "https://supabase.com/docs/guides/auth"]
- id: CR-FIRE-010
  text: Plan your Firebase-to-Supabase migration path BEFORE starting — it requires a complete data model rethink.
  why: Migrating from Firestore (document/NoSQL) to Supabase (PostgreSQL/relational) is NOT a simple data export/import. Document
    structures must be decomposed into normalized tables. Denormalized fields become JOINs. Sub-collections become separate
    tables with foreign keys. Security rules become RLS policies. Cloud Functions become Edge Functions. This typically takes
    2-4x longer than teams estimate.
  how_to_do_right: 'Phase 1: Map Firestore collections to PostgreSQL tables (normalize). Phase 2: Convert security rules to
    RLS policies. Phase 3: Migrate auth (export users, re-create in Supabase — passwords not exportable, users must reset).
    Phase 4: Migrate data (custom script, not generic tool). Phase 5: Update client code (Firestore SDK → Supabase SDK). Run
    both systems in parallel during migration.'
  severity: medium
  technologies:
    library: [firebase]
    platform: [supabase, postgresql, firestore]
  domains:
    domain: [architecture]
    concern: [backend, data, database]
  example_good: "// Phase 1: Firestore → PostgreSQL schema mapping\n// Firestore (document model):\n// users/{userId}: { name,\
    \ email, orders: [{id, total, items: [{productId, qty}]}] }\n//\n// PostgreSQL (normalized):\nCREATE TABLE users (\n \
    \ id uuid PRIMARY KEY DEFAULT gen_random_uuid(),\n  firebase_uid text UNIQUE,  -- Keep for migration mapping\n  name text\
    \ NOT NULL,\n  email text UNIQUE NOT NULL\n);\n\nCREATE TABLE orders (\n  id uuid PRIMARY KEY DEFAULT gen_random_uuid(),\n\
    \  customer_id uuid REFERENCES users(id),\n  total decimal NOT NULL,\n  status text DEFAULT 'pending',\n  created_at timestamptz\
    \ DEFAULT now()\n);\n\nCREATE TABLE order_items (\n  id uuid PRIMARY KEY DEFAULT gen_random_uuid(),\n  order_id uuid REFERENCES\
    \ orders(id) ON DELETE CASCADE,\n  product_id uuid REFERENCES products(id),\n  quantity int NOT NULL CHECK (quantity >\
    \ 0),\n  price decimal NOT NULL\n);\n\n// Phase 2: Security rules → RLS\nALTER TABLE orders ENABLE ROW LEVEL SECURITY;\n\
    CREATE POLICY \"owner_read\" ON orders FOR SELECT\n  USING (customer_id = auth.uid());\n\n// Migration script (Python)\n\
    for doc in firestore_client.collection('users').stream():\n    user = doc.to_dict()\n    supabase.table('users').insert({\n\
    \        'firebase_uid': doc.id,\n        'name': user['name'],\n        'email': user['email'],\n    }).execute()\n"
  example_bad: '// "Just dump Firestore to JSON and load into PostgreSQL"

    // Firestore export: { "users/abc123": { "orders": [{"items": [...]}] } }

    // INSERT INTO users VALUES (''abc123'', ''{"orders": [{"items": [...]}]}'');

    // Now you have JSON blobs in PostgreSQL — worst of both worlds:

    // - No foreign keys, no JOINs, no referential integrity

    // - Can''t use RLS on nested data

    // - Indexes don''t work on JSON arrays efficiently

    '
  when_applies: Projects using Firebase, Supabase, PostgreSQL databases, or Firestore
  when_not_applies: small scripts under 100 lines, single-purpose utilities
  sources: ["https://supabase.com/docs/guides/getting-started/tutorials/with-nextjs"]
- id: CR-FIRE-011
  text: Use Supabase database migrations for schema changes — never modify production schema manually.
  why: Manual schema changes (ALTER TABLE via SQL editor) are untracked, unrepeatable, and unrevertable. When staging and
    production diverge, deployments fail. When a teammate makes a conflicting change, data is corrupted. Migrations are version-controlled,
    reviewable, and applied consistently across environments.
  how_to_do_right: Use supabase db diff to generate migrations from local changes. Store migrations in supabase/migrations/
    (version-controlled). Apply with supabase db push. Never modify production directly — all changes go through migrations.
    Test migrations on a branch database (supabase db branch) before applying to production.
  severity: high
  technologies:
    platform: [supabase, postgresql]
  domains:
    domain: [architecture, operations, devops]
    concern: [backend, data, database]
  example_good: "# Create migration\nsupabase migration new add_orders_table\n\n# supabase/migrations/20260217120000_add_orders_table.sql\n\
    CREATE TABLE orders (\n  id uuid PRIMARY KEY DEFAULT gen_random_uuid(),\n  customer_id uuid NOT NULL REFERENCES auth.users(id),\n\
    \  total decimal(10,2) NOT NULL CHECK (total > 0),\n  status text NOT NULL DEFAULT 'pending'\n    CHECK (status IN ('pending',\
    \ 'confirmed', 'shipped', 'delivered')),\n  created_at timestamptz NOT NULL DEFAULT now()\n);\n\nCREATE INDEX idx_orders_customer\
    \ ON orders(customer_id);\nCREATE INDEX idx_orders_status ON orders(status) WHERE status != 'delivered';\n\nALTER TABLE\
    \ orders ENABLE ROW LEVEL SECURITY;\n\nCREATE POLICY \"Users read own orders\" ON orders\n  FOR SELECT USING (auth.uid()\
    \ = customer_id);\n\n# Apply to staging\nsupabase db push --db-url $STAGING_DB_URL\n\n# Test, then apply to production\n\
    supabase db push --db-url $PRODUCTION_DB_URL\n"
  example_bad: '-- Manual change in production SQL editor

    ALTER TABLE orders ADD COLUMN discount decimal;

    -- Oops: forgot to add it to staging

    -- Oops: forgot to update the migration files

    -- Next deployment: migration tries to add ''discount'' → already exists → FAILS

    -- Teammate: doesn''t know ''discount'' exists → creates conflicting migration

    '
  when_applies: Projects using Supabase or PostgreSQL databases
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using Supabase
    or PostgreSQL
  sources: ["https://supabase.com/docs/guides/cli/managing-environments"]
- id: CR-FIRE-012
  text: Use Supabase Storage with bucket-level policies — never store files with public access by default.
  why: 'Supabase Storage is S3-compatible and directly accessible via URL. Without bucket policies, uploaded files are either
    all public (anyone can download user documents) or all private (users cannot access their own files). Bucket policies
    provide fine-grained control: users access their own files, admins access all files.'
  how_to_do_right: Create separate buckets per access pattern (avatars = public, documents = private). Set bucket policies
    using RLS-style SQL. Use signed URLs for temporary access to private files. Validate file types and sizes in policies.
    Use Supabase's image transformation for thumbnails (saves storage and bandwidth).
  severity: high
  technologies:
    platform: [supabase, aws, s3]
  domains:
    domain: [architecture, security, infrastructure]
    concern: [backend, storage]
  example_good: "-- Storage bucket policies (via SQL)\n-- Avatars bucket: public read, authenticated upload to own folder\n\
    CREATE POLICY \"Public avatar read\"\n  ON storage.objects FOR SELECT\n  USING (bucket_id = 'avatars');\n\nCREATE POLICY\
    \ \"Users upload own avatar\"\n  ON storage.objects FOR INSERT\n  WITH CHECK (\n    bucket_id = 'avatars'\n    AND auth.uid()::text\
    \ = (storage.foldername(name))[1]\n    AND (LOWER(storage.extension(name)) = ANY(ARRAY['jpg', 'png', 'webp']))\n    AND\
    \ (metadata->>'size')::int < 5242880  -- 5MB max\n  );\n\n-- Documents bucket: private, owner-only access\nCREATE POLICY\
    \ \"Users read own documents\"\n  ON storage.objects FOR SELECT\n  USING (\n    bucket_id = 'documents'\n    AND auth.uid()::text\
    \ = (storage.foldername(name))[1]\n  );\n\n// Client — upload to user's folder\nconst { data } = await supabase.storage\n\
    \  .from('avatars')\n  .upload(`${userId}/avatar.jpg`, file, {\n    contentType: 'image/jpeg',\n    upsert: true,\n  });\n\
    \n// Public URL for avatars\nconst { data: { publicUrl } } = supabase.storage\n  .from('avatars')\n  .getPublicUrl(`${userId}/avatar.jpg`);\n"
  example_bad: "// No policies — all files public or all private\nconst { data } = await supabase.storage\n  .from('documents')\
    \  // Bucket has no policies\n  .upload('contracts/secret_agreement.pdf', file);\n\n// Anyone with the URL can download:\n\
    // https://project.supabase.co/storage/v1/object/public/documents/contracts/secret_agreement.pdf\n// No authentication\
    \ required — GDPR violation waiting to happen\n"
  when_applies: Projects using Supabase or AWS S3 object storage
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities. projects
    not using Supabase or S3
  sources: ["https://supabase.com/docs/guides/storage"]
