layer: rules
technology: General
domain: ci-cd
knowledge:
- id: CR-CICD-001
  text: Use trunk-based development with short-lived feature branches (max 2 days).
  why: Long-lived branches accumulate merge conflicts exponentially — a 10-day branch averages 3x more merge conflicts than
    a 2-day branch. Merge pain grows quadratically with branch lifetime because parallel changes overlap more. Teams with
    long-lived branches spend 15-30% of dev time resolving conflicts instead of shipping.
  how_to_do_right: Main branch is always deployable. Feature branches live max 48 hours. Use feature flags to merge incomplete
    work safely. Require CI green before merge. Delete branch after merge. If a feature takes longer than 2 days, break it
    into smaller increments that can merge independently.
  severity: high
  technologies:
    platform: [git, github, gitlab]
  domains:
    domain: [operations, devops]
    concern: [ci_cd, engineering-culture]
  example_good: "# Short-lived branch with feature flag\ngit checkout -b feat/user-avatar  # Day 1 morning\n# Implement behind\
    \ flag\nif feature_flags.is_enabled(\"user_avatar\"):\n    show_avatar(user)\n# Merge same day or next day\ngit push origin\
    \ feat/user-avatar\n# PR merged, branch deleted — feature flag controls rollout\n"
  example_bad: '# Long-lived branch — merge hell awaits

    git checkout -b feat/new-checkout-flow  # Created Jan 5

    # ... 3 weeks of isolated development ...

    git merge main  # Jan 26 — 47 conflicts, 2 days to resolve

    # Meanwhile main moved again — another round of conflicts

    '
  when_applies: Projects using Git, GitHub, or GitLab
  when_not_applies: local development only, throwaway experiments
  sources: ["https://trunkbaseddevelopment.com/", "https://cloud.google.com/architecture/devops/devops-tech-trunk-based-development"]
- id: CR-CICD-002
  text: Define pipelines as code (Jenkinsfile, GitHub Actions, .gitlab-ci.yml) — never use UI-only configuration.
  why: UI-configured pipelines cannot be version-controlled, code-reviewed, rolled back, or reproduced. When the CI server
    dies, your pipeline definition dies with it. Pipeline-as-code enables the same review/test/rollback workflow as application
    code.
  how_to_do_right: Store pipeline definition in the repo root. Use YAML or Groovy DSL. Review pipeline changes in PRs just
    like code. Use reusable workflow templates for common patterns. Pin action versions to SHA, not tags.
  severity: critical
  technologies:
    platform: [github_actions, gitlab_ci, jenkins, circleci]
  domains:
    domain: [operations, devops]
    concern: [ci_cd]
  example_good: "# .github/workflows/ci.yml — versioned, reviewable, reproducible\nname: CI\non:\n  pull_request:\n    branches:\
    \ [main]\njobs:\n  lint:\n    runs-on: ubuntu-22.04\n    steps:\n      - uses: actions/checkout@v4  # Pinned to major\
    \ version\n      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # SHA-pinned\n        with:\n\
    \          python-version: \"3.12\"\n      - run: ruff check src/\n"
  example_bad: '# Pipeline configured only in Jenkins UI

    # - No version history

    # - No code review

    # - Cannot reproduce after server rebuild

    # - Team members can''t see or understand the pipeline

    # "Just click through the Jenkins UI to set it up"

    '
  when_applies: Any project using GitHub Actions, GitLab CI, Jenkins, or CircleCI
  when_not_applies: local development only, throwaway experiments
  sources: ["https://docs.github.com/en/actions/writing-workflows/workflow-syntax-for-github-actions", "https://docs.gitlab.com/ci/yaml/"]
- id: CR-CICD-003
  text: 'Fail fast — order pipeline stages from cheapest to most expensive: lint → unit test → build → integration test →
    deploy.'
  why: Running a 30-minute E2E suite before catching a syntax error wastes compute and developer time. Lint catches 40% of
    issues in seconds. Unit tests catch 30% more in minutes. Catching errors early means faster feedback loops and cheaper
    CI bills.
  how_to_do_right: 'Stage 1: lint + type check + format check (seconds). Stage 2: unit tests (minutes). Stage 3: build artifact
    (minutes). Stage 4: integration tests (minutes). Stage 5: E2E tests (expensive, only on merge). Each stage gates the next
    — fail at lint, skip everything else.'
  severity: high
  technologies:
    platform: [github_actions, gitlab_ci, jenkins]
  domains:
    domain: [operations, devops, performance]
    concern: [ci_cd]
  example_good: "# Fail fast pipeline — cheapest checks first\njobs:\n  lint:\n    runs-on: ubuntu-22.04\n    steps:\n   \
    \   - run: ruff check src/ && mypy src/  # Seconds\n  unit-test:\n    needs: [lint]  # Only runs if lint passes\n    runs-on:\
    \ ubuntu-22.04\n    steps:\n      - run: pytest tests/unit/ -x --timeout=60  # Minutes\n  build:\n    needs: [unit-test]\
    \  # Only runs if tests pass\n    runs-on: ubuntu-22.04\n    steps:\n      - run: docker build -t app:${{ github.sha }}\
    \ .\n  integration:\n    needs: [build]\n    runs-on: ubuntu-22.04\n    steps:\n      - run: pytest tests/integration/\
    \ --timeout=300\n"
  example_bad: "# Everything in one job — slow and wasteful\njobs:\n  ci:\n    steps:\n      - run: docker build -t app .\
    \          # 5 min build\n      - run: pytest tests/                   # 15 min full suite\n      - run: ruff check src/\
    \                 # Lint AFTER build?!\n      # A typo caught by lint wasted 20 minutes of CI time\n"
  when_applies: Projects using GitHub Actions, GitLab CI, or Jenkins
  when_not_applies: local development only, throwaway experiments
  sources: ["https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/using-jobs-in-a-workflow"]
- id: CR-CICD-004
  text: Run independent pipeline jobs in parallel — do not serialize stages that have no dependency.
  why: Sequential execution of independent jobs doubles or triples pipeline duration. A 20-minute sequential pipeline becomes
    8 minutes when lint, unit tests, and security scan run in parallel. Developer wait time directly impacts commit frequency
    and feedback quality.
  how_to_do_right: Identify jobs with no data dependency. Run them in parallel. Use dependency graph (needs/depends_on) only
    for real dependencies. Merge results at a fan-in step. Use matrix builds for multi-platform/multi-version testing.
  severity: medium
  technologies:
    platform: [github_actions, gitlab_ci, jenkins]
  domains:
    domain: [operations, devops, performance]
    concern: [ci_cd]
  example_good: "# Parallel independent jobs — total time = max(lint, test, security)\njobs:\n  lint:           # ~30s\n \
    \   runs-on: ubuntu-22.04\n    steps:\n      - run: ruff check src/\n  unit-test:      # ~3min\n    runs-on: ubuntu-22.04\n\
    \    steps:\n      - run: pytest tests/unit/\n  security-scan:  # ~2min\n    runs-on: ubuntu-22.04\n    steps:\n     \
    \ - run: trivy fs --severity HIGH,CRITICAL .\n  build:\n    needs: [lint, unit-test, security-scan]  # Fan-in after all\
    \ pass\n    runs-on: ubuntu-22.04\n    steps:\n      - run: docker build -t app:${{ github.sha }} .\n"
  example_bad: "# Sequential — total time = sum of all\njobs:\n  pipeline:\n    steps:\n      - run: ruff check src/     \
    \   # 30s, then wait...\n      - run: pytest tests/unit/      # 3min, then wait...\n      - run: trivy fs .          \
    \    # 2min, then wait...\n      - run: docker build .          # Total: 5.5min+ (could be 3min)\n"
  when_applies: Projects using GitHub Actions, GitLab CI, or Jenkins
  when_not_applies: local development only, throwaway experiments
  sources: ["https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/running-jobs-in-a-workflow"]
- id: CR-CICD-005
  text: Cache dependencies between pipeline runs — never re-download the entire dependency tree every build.
  why: Downloading and installing dependencies from scratch adds 2-10 minutes to every CI run. Over 50 builds/day, that is
    100-500 minutes of pure waste. Network failures during download cause flaky builds. Caching makes builds faster AND more
    reliable.
  how_to_do_right: Cache based on lockfile hash (package-lock.json, poetry.lock, go.sum). Invalidate cache when lockfile changes.
    Use CI-native caching (actions/cache, GitLab cache:key). Cache Docker layers with registry-based cache. Cache pip/npm/gradle
    directories, not just installed packages.
  severity: medium
  technologies:
    lang: [python]
    framework: [pip]
    library: [npm]
    platform: [github_actions, gitlab_ci, docker]
  domains:
    domain: [operations, devops, performance]
    concern: [ci_cd]
  example_good: "# GitHub Actions — cache Python deps based on lockfile\n- uses: actions/cache@v4\n  with:\n    path: ~/.cache/pip\n\
    \    key: pip-${{ runner.os }}-${{ hashFiles('poetry.lock') }}\n    restore-keys: |\n      pip-${{ runner.os }}-\n- run:\
    \ pip install -r requirements.txt  # Cache hit = seconds, not minutes\n\n# Docker layer caching\n- uses: docker/build-push-action@v5\n\
    \  with:\n    cache-from: type=gha\n    cache-to: type=gha,mode=max\n"
  example_bad: '# No caching — downloads everything every time

    - run: pip install -r requirements.txt    # 3 min every build

    - run: npm ci                              # 2 min every build

    # 50 builds/day × 5 min = 250 min/day wasted on downloads

    '
  when_applies: Projects using GitHub Actions, GitLab CI, npm, or pip
  when_not_applies: local development only, throwaway experiments
  sources: ["https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/caching-dependencies-to-speed-up-workflows"]
- id: CR-CICD-006
  text: Never store secrets in pipeline code or environment variable definitions — use a secrets manager.
  why: Secrets in pipeline YAML are visible to anyone with repo access. Environment variables defined in CI config are often
    logged in debug output. A single leaked API key can cost thousands (crypto mining on your cloud account) or cause data
    breaches. Secrets in git history persist forever even after deletion.
  how_to_do_right: Use CI-native secrets (GitHub Secrets, GitLab CI Variables masked+protected). Reference by name, never
    by value. Use OIDC federation instead of long-lived credentials. Rotate secrets quarterly. Audit secret access logs. Never
    echo/print secret values in pipeline steps.
  severity: critical
  technologies:
    library: [aws secrets manager]
    platform: [github_actions, gitlab_ci, vault]
  domains:
    domain: [operations, devops, security]
    concern: [ci_cd]
  example_good: "# Secrets stored in GitHub Secrets, referenced by name\n- name: Deploy to AWS\n  env:\n    AWS_ACCESS_KEY_ID:\
    \ ${{ secrets.AWS_ACCESS_KEY_ID }}\n    AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}\n  run: aws s3 sync\
    \ dist/ s3://my-bucket/\n\n# Even better — OIDC federation, no long-lived keys\n- uses: aws-actions/configure-aws-credentials@v4\n\
    \  with:\n    role-to-assume: arn:aws:iam::123456789:role/GitHubActionsRole\n    aws-region: us-east-1\n"
  example_bad: "# Secrets hardcoded in pipeline YAML — DISASTER\nenv:\n  AWS_ACCESS_KEY_ID: AKIAIOSFODNN7EXAMPLE      # Visible\
    \ in repo!\n  AWS_SECRET_ACCESS_KEY: wJalrXUtnFEMI/K7MDENG  # Leaked forever\n  DATABASE_URL: postgres://admin:p@ssw0rd@db.prod.example.com/app\n"
  when_applies: Any project using GitHub Actions, GitLab CI, HashiCorp Vault secrets management, or AWS Secrets Manager
  when_not_applies: local development only, throwaway experiments
  sources: ["https://docs.github.com/en/actions/security-for-github-actions/security-guides/using-secrets-in-github-actions"]
- id: CR-CICD-007
  text: Builds must be reproducible — same source commit must produce identical artifacts.
  why: Non-reproducible builds make debugging production incidents impossible. If you cannot rebuild the exact binary running
    in production, you cannot verify patches or audit for supply chain attacks. Reproducibility is a security requirement
    (SLSA Level 1+).
  how_to_do_right: Pin ALL dependency versions with lockfiles. Use deterministic build tools (no timestamps in binaries).
    Set SOURCE_DATE_EPOCH for reproducible timestamps. Use content-addressable storage for artifacts. Verify builds by building
    twice and comparing checksums.
  severity: high
  technologies:
    lang: [python, go]
    framework: [pip]
    library: [npm, bazel]
    platform: [docker]
  domains:
    domain: [operations, devops, security]
    concern: [ci_cd]
  example_good: '# Reproducible Docker build

    FROM python:3.12.3-slim@sha256:abc123...  # Pinned to digest

    COPY requirements.txt .

    RUN pip install --no-cache-dir -r requirements.txt  # Versions locked in file

    COPY . .

    ENV SOURCE_DATE_EPOCH=0  # Reproducible timestamps

    RUN python -m compileall .

    '
  example_bad: 'FROM python:3-slim                      # Floating tag — different every week

    RUN pip install flask requests boto3    # No version pins — unpredictable

    RUN apt-get update && apt-get install -y curl  # apt repos change daily

    '
  when_applies: Projects using containerized applications, npm, pip, or Go services and tools
  when_not_applies: local development only, throwaway experiments
  sources: ["https://slsa.dev/spec/v1.0/levels", "https://reproducible-builds.org/docs/definition/"]
- id: CR-CICD-008
  text: Build once, deploy many — promote the same artifact through environments, never rebuild.
  why: Rebuilding for each environment introduces variability. The artifact in staging is NOT what was tested if you rebuild
    for production. Build differences cause 'works in staging, fails in prod' incidents. Environment-specific config should
    be injected at deploy time, not build time.
  how_to_do_right: Build artifact once in CI. Store in artifact registry (ECR, GCR, Artifactory) with immutable tag (git SHA).
    Deploy same image to dev, staging, production. Inject environment config via env vars, config maps, or secrets at runtime.
    Never bake environment-specific values into the image.
  severity: critical
  technologies:
    library: [ecr, gcr, artifactory]
    platform: [docker]
  domains:
    domain: [operations, devops]
    concern: [ci_cd]
  example_good: "# Build stage — produces ONE immutable artifact\n- name: Build\n  run: |\n    docker build -t app:${{ github.sha\
    \ }} .\n    docker push registry.example.com/app:${{ github.sha }}\n\n# Deploy to staging — SAME image, different config\n\
    - name: Deploy Staging\n  run: |\n    helm upgrade app ./chart \\\n      --set image.tag=${{ github.sha }} \\\n      --set\
    \ config.database_url=${{ secrets.STAGING_DB_URL }}\n\n# Deploy to prod — SAME image, different config\n- name: Deploy\
    \ Prod\n  run: |\n    helm upgrade app ./chart \\\n      --set image.tag=${{ github.sha }} \\\n      --set config.database_url=${{\
    \ secrets.PROD_DB_URL }}\n"
  example_bad: "# Rebuilding for each environment — NOT the same artifact\n- name: Deploy Staging\n  run: |\n    docker build\
    \ --build-arg ENV=staging -t app:staging .  # Rebuild!\n    docker push registry.example.com/app:staging\n\n- name: Deploy\
    \ Prod\n  run: |\n    docker build --build-arg ENV=production -t app:prod .  # Different build!\n    # This is NOT what\
    \ was tested in staging\n"
  when_applies: Any project using containerized applications, ECR, GCR, or Artifactory
  when_not_applies: local development only, throwaway experiments
  sources: ["https://12factor.net/build-release-run", "https://cloud.google.com/architecture/application-deployment-and-testing-strategies"]
- id: CR-CICD-009
  text: Tag container images with git SHA — never use 'latest' as a deployment tag.
  why: '''latest'' is a mutable pointer — you cannot tell which code is running in production, cannot roll back to a specific
    version, and cannot audit what was deployed when. Two ''latest'' pushes in quick succession cause race conditions. Kubernetes
    will not pull a new image if the tag hasn''t changed (imagePullPolicy: IfNotPresent).'
  how_to_do_right: 'Tag with full git SHA: app:a1b2c3d4. Optionally also tag with semver for releases: app:v2.3.1. Never push
    to ''latest'' in automated pipelines. Use immutable tags in deployment manifests. Set imagePullPolicy: Always only for
    development.'
  severity: high
  technologies:
    library: [ecr, gcr]
    platform: [docker, kubernetes]
  domains:
    domain: [operations, devops]
    concern: [ci_cd]
  example_good: "# Tag with git SHA — immutable, traceable\nIMAGE_TAG=\"${GITHUB_SHA:0:12}\"\ndocker build -t registry.example.com/app:${IMAGE_TAG}\
    \ .\ndocker push registry.example.com/app:${IMAGE_TAG}\n\n# In Kubernetes deployment\nspec:\n  containers:\n    - name:\
    \ app\n      image: registry.example.com/app:a1b2c3d4e5f6\n      imagePullPolicy: IfNotPresent\n"
  example_bad: "# Mutable tag — which version is running?\ndocker build -t registry.example.com/app:latest .\ndocker push\
    \ registry.example.com/app:latest\n\n# In Kubernetes — \"latest\" is cached, won't pull new version\nspec:\n  containers:\n\
    \    - name: app\n      image: registry.example.com/app:latest  # Which commit? Nobody knows.\n"
  when_applies: Projects using containerized applications, Kubernetes-orchestrated deployments, ECR, or GCR
  when_not_applies: local development only, throwaway experiments
  sources: ["https://kubernetes.io/docs/concepts/containers/images/#image-pull-policy"]
- id: CR-CICD-010
  text: Use minimal base images (Alpine, distroless, scratch) for production containers.
  why: A full ubuntu image is 200MB+ with hundreds of packages you don't need — each one is an attack surface. Alpine is 5MB,
    distroless is 2MB. Smaller images mean faster pulls (critical for autoscaling), fewer CVEs to patch, and reduced blast
    radius if compromised. A typical ubuntu image has 50+ medium/high CVEs; distroless has near zero.
  how_to_do_right: 'Use multi-stage build: full image for building, minimal for running. Python: python:3.12-slim (60MB) or
    distroless/python3 (50MB). Go: scratch or distroless/static (2MB). Node: node:20-alpine (50MB). Scan final image with
    Trivy/Snyk.'
  severity: medium
  technologies:
    library: [alpine, distroless]
    platform: [docker]
  domains:
    domain: [operations, devops, security]
    concern: [ci_cd]
  example_good: '# Multi-stage: build with full image, run with distroless

    FROM golang:1.22 AS builder

    WORKDIR /app

    COPY go.mod go.sum ./

    RUN go mod download

    COPY . .

    RUN CGO_ENABLED=0 go build -o /server .


    FROM gcr.io/distroless/static:nonroot  # 2MB, zero shell, zero package manager

    COPY --from=builder /server /server

    USER nonroot:nonroot

    ENTRYPOINT ["/server"]

    '
  example_bad: 'FROM ubuntu:22.04  # 200MB+ base, hundreds of unused packages

    RUN apt-get update && apt-get install -y python3 python3-pip curl wget vim

    # vim in production? curl for debugging? Every package is attack surface

    COPY . /app

    RUN pip install -r requirements.txt

    CMD ["python3", "app.py"]

    '
  when_applies: Projects using containerized applications, Alpine, or Distroless
  when_not_applies: local development only, throwaway experiments
  sources: ["https://docs.docker.com/build/building/multi-stage/", "https://github.com/GoogleContainerTools/distroless"]
- id: CR-CICD-011
  text: Follow the test pyramid — many unit tests, fewer integration tests, minimal E2E tests.
  why: Inverted pyramids (many E2E, few unit tests) are slow, flaky, and expensive. E2E tests take minutes each, fail non-deterministically,
    and give vague error messages. Unit tests take milliseconds, rarely flake, and pinpoint the exact broken function. A healthy
    ratio is 70% unit / 20% integration / 10% E2E.
  how_to_do_right: Write unit tests for every function with logic. Write integration tests for API boundaries and database
    queries. Write E2E tests only for critical user journeys (login, checkout, payment). Run unit tests on every commit, integration
    on every PR, E2E on merge to main.
  severity: high
  technologies:
    lang: [python, java]
    framework: [pytest, testing, jest, junit, playwright]
  domains:
    domain: [operations, testing]
    concern: [ci_cd]
  example_good: '# Test pyramid in CI — fast feedback first

    # Unit tests: 500 tests, 30 seconds, every commit

    pytest tests/unit/ -x --timeout=5 -q


    # Integration tests: 50 tests, 3 minutes, every PR

    pytest tests/integration/ --timeout=60


    # E2E tests: 10 critical journeys, 8 minutes, merge to main only

    playwright test tests/e2e/critical/ --workers=4

    '
  example_bad: '# Inverted pyramid — 200 Selenium tests, 5 unit tests

    # CI takes 45 minutes, flakes 3x/week, nobody trusts it

    selenium-runner tests/  # 200 browser tests, 40 min

    pytest tests/unit/       # 5 unit tests — afterthought

    '
  when_applies: Projects using pytest, Jest, JUnit, or Playwright
  when_not_applies: exploratory prototypes, one-off scripts, or spike investigations
  sources: ["https://martinfowler.com/articles/practical-test-pyramid.html"]
- id: CR-CICD-012
  text: Quarantine flaky tests — isolate unreliable tests from the main pipeline to prevent alert fatigue.
  why: A single flaky test that fails 10% of the time will fail 1 in 10 CI runs. With 50 builds/day, that is 5 false failures
    daily. Developers learn to ignore CI failures ('oh that's just the flaky test'), which means real failures also get ignored.
    Flaky tests erode CI trust completely.
  how_to_do_right: Track test reliability metrics (pass rate over last 30 runs). Auto-quarantine tests below 95% pass rate.
    Run quarantined tests in a separate non-blocking job. Fix or delete quarantined tests within 1 sprint. Use pytest-rerunfailures
    for known-flaky while fixing root cause.
  severity: high
  technologies:
    lang: [python, java]
    framework: [pytest, testing, jest, junit]
    platform: [github_actions]
  domains:
    domain: [operations, testing]
    concern: [ci_cd]
  example_good: "# Main pipeline — only reliable tests (blocks merge)\n- name: Reliable Tests\n  run: pytest tests/ --ignore=tests/quarantine/\
    \ -x\n\n# Quarantine job — flaky tests (does NOT block merge)\n- name: Quarantined Tests\n  continue-on-error: true\n\
    \  run: |\n    pytest tests/quarantine/ --reruns=3 --reruns-delay=5\n    # Report flaky test metrics to dashboard\n"
  example_bad: "# All tests in one bucket — flaky tests block everyone\n- name: Tests\n  run: pytest tests/   # includes flaky\
    \ tests\n# Result: \"CI failed again\" → \"just re-run it\" → real bugs slip through\n"
  when_applies: Projects using pytest, Jest, JUnit, or GitHub Actions
  when_not_applies: exploratory prototypes, one-off scripts, or spike investigations
  sources: ["https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/running-variations-of-jobs-in-a-workflow"]
- id: CR-CICD-013
  text: Parallelize test suites across multiple workers to cut CI wait time.
  why: A 15-minute test suite running on one worker keeps developers waiting. The same suite split across 4 workers finishes
    in 4 minutes. Developer wait time directly impacts commit frequency — teams with <5min CI commit 3x more often than teams
    with >15min CI.
  how_to_do_right: Use test splitting by timing data (pytest-split, Jest --shard, CircleCI test splitting). Balance shards
    by historical execution time, not file count. Use CI matrix builds for multi-version testing. Cache test timing data between
    runs.
  severity: medium
  technologies:
    lang: [python]
    framework: [pytest, testing, jest]
    platform: [github_actions, circleci]
  domains:
    domain: [operations, testing, performance]
    concern: [ci_cd]
  example_good: "# GitHub Actions matrix — 4 parallel test shards\njobs:\n  test:\n    strategy:\n      matrix:\n        shard:\
    \ [1, 2, 3, 4]\n    steps:\n      - run: |\n          pytest tests/ \\\n            --splits 4 \\\n            --group\
    \ ${{ matrix.shard }} \\\n            --splitting-algorithm least_duration\n        # Uses timing data from previous runs\
    \ to balance shards evenly\n"
  example_bad: "# Single worker — serial execution of all tests\njobs:\n  test:\n    steps:\n      - run: pytest tests/  #\
    \ 15 min wall clock, 1 CPU utilized\n      # Developer pushes code at 2:00, gets feedback at 2:15\n      # Pushes fix\
    \ at 2:20, gets feedback at 2:35 — half hour for one cycle\n"
  when_applies: Projects using pytest, Jest, GitHub Actions, or CircleCI
  when_not_applies: exploratory prototypes, one-off scripts, or spike investigations
  sources: ["https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/using-a-matrix-for-your-jobs"]
- id: CR-CICD-014
  text: Enforce coverage gates — block PR merge when test coverage drops below threshold.
  why: Without enforcement, coverage decays 1-2% per month as new code ships without tests. A project at 80% coverage today
    will be at 60% in a year without gates. Low coverage means bugs ship undetected. Coverage gates create a ratchet — coverage
    can only go up.
  how_to_do_right: Set project-wide minimum (e.g., 80% line coverage). Set diff coverage minimum (new code must be 90%+).
    Fail PR if either threshold is violated. Use coverage tools (Codecov, Coveralls, SonarCloud). Show coverage diff in PR
    comments. Exclude generated code and config files.
  severity: medium
  technologies:
    library: [codecov, pytest-cov, istanbul, jacoco]
  domains:
    domain: [operations, testing]
    concern: [ci_cd]
  example_good: "# pytest with coverage gate in CI\n- run: |\n    pytest tests/ --cov=src --cov-report=xml --cov-fail-under=80\n\
    \n# codecov.yml — diff coverage gate\ncoverage:\n  status:\n    project:\n      default:\n        target: 80%\n      \
    \  threshold: 1%\n    patch:  # New code specifically\n      default:\n        target: 90%\n"
  example_bad: '# No coverage gate — "we''ll add tests later" (they won''t)

    - run: pytest tests/  # No --cov, no threshold

    # Coverage: 80% → 75% → 68% → 55% → "we need a testing sprint"

    '
  when_applies: Projects using Codecov, pytest-cov, Istanbul, or JaCoCo
  when_not_applies: exploratory prototypes, one-off scripts, or spike investigations
  sources: ["https://docs.codecov.com/docs/commit-status"]
- id: CR-CICD-015
  text: Use blue-green deployment for zero-downtime releases with instant rollback capability.
  why: Traditional deployments cause downtime during the switch. Even 30 seconds of downtime during peak traffic can mean
    thousands of failed requests and lost revenue. Blue-green gives you two identical environments — if the new version fails,
    switch back to the old one in seconds, not minutes.
  how_to_do_right: Maintain two identical environments (blue and green). Deploy new version to inactive environment. Run smoke
    tests against new environment. Switch load balancer/router to new environment. Keep old environment running for instant
    rollback (15-30 min). Tear down old environment after confidence period.
  severity: high
  technologies:
    library: [aws alb]
    platform: [kubernetes, nginx, service_mesh, istio]
  domains:
    domain: [operations, devops, reliability]
    concern: [ci_cd]
  example_good: "# Blue-green with Kubernetes and Istio\n# 1. Deploy new version (green)\nkubectl apply -f deployment-green.yaml\n\
    \n# 2. Run smoke tests against green\ncurl -f https://green.internal.example.com/health\n\n# 3. Shift traffic to green\n\
    kubectl apply -f - <<EOF\napiVersion: networking.istio.io/v1beta1\nkind: VirtualService\nspec:\n  http:\n    - route:\n\
    \        - destination:\n            host: app-green\n            port: { number: 8080 }\n          weight: 100\nEOF\n\
    \n# 4. Rollback if needed — instant, just switch back to blue\n# kubectl apply -f virtualservice-blue.yaml\n"
  example_bad: '# In-place deployment — downtime guaranteed

    kubectl set image deployment/app app=registry.example.com/app:v2

    # Old pods terminating, new pods starting — requests fail during transition

    # Rollback requires another deployment — minutes of additional downtime

    '
  when_applies: Projects using Kubernetes-orchestrated deployments, AWS ALB, Nginx reverse proxy/load balancer, or Istio service
    mesh
  when_not_applies: local development only, throwaway experiments
  sources: ["https://martinfowler.com/bliki/BlueGreenDeployment.html"]
- id: CR-CICD-016
  text: Use canary deployments for gradual traffic shift — start at 1%, validate, then increase to 100%.
  why: Deploying to 100% of traffic at once means 100% of users are affected if the new version has a bug. Canary lets you
    expose 1% of traffic first — if error rates spike, only 1% of users were affected instead of all of them. This is the
    difference between 'we caught it early' and 'total outage'.
  how_to_do_right: Deploy new version alongside old. Route 1% of traffic to new version. Monitor error rates, latency, and
    business metrics for 10-30 minutes. If metrics are healthy, increase to 10%, then 50%, then 100%. Automate promotion/rollback
    based on metric thresholds. Use service mesh (Istio, Linkerd) or progressive delivery tools (Argo Rollouts, Flagger).
  severity: high
  technologies:
    library: [argo rollouts, flagger]
    platform: [kubernetes, service_mesh, istio]
  domains:
    domain: [operations, devops, reliability]
    concern: [ci_cd]
  example_good: "# Argo Rollouts — automated canary with metric analysis\napiVersion: argoproj.io/v1alpha1\nkind: Rollout\n\
    spec:\n  strategy:\n    canary:\n      steps:\n        - setWeight: 1      # 1% traffic to canary\n        - pause: {\
    \ duration: 10m }\n        - analysis:\n            templates:\n              - templateName: error-rate\n           \
    \ args:\n              - name: service\n                value: app\n        - setWeight: 10     # 10% if analysis passes\n\
    \        - pause: { duration: 10m }\n        - setWeight: 50     # 50%\n        - pause: { duration: 10m }\n        -\
    \ setWeight: 100    # Full rollout\n"
  example_bad: '# Big bang deployment — all or nothing

    kubectl set image deployment/app app=registry.example.com/app:v2

    kubectl rollout status deployment/app

    # 100% of traffic hits new version immediately

    # Bug discovered 5 minutes later — all users affected

    '
  when_applies: Projects using Kubernetes-orchestrated deployments, Istio service mesh, Argo Rollouts, or Flagger
  when_not_applies: local development only, throwaway experiments
  sources: ["https://martinfowler.com/bliki/CanaryRelease.html", "https://argo-rollouts.readthedocs.io/en/stable/features/canary/"]
- id: CR-CICD-017
  text: Use feature flags to decouple deployment from release — deploy code without activating features.
  why: Without feature flags, the only way to release a feature is to deploy code. This forces either long-lived branches
    (merge hell) or releasing half-built features. Feature flags let you merge and deploy incomplete code safely, then activate
    it independently. They also enable instant rollback of a feature without a code deployment.
  how_to_do_right: Use a feature flag service (LaunchDarkly, Unleash, Flagsmith, or simple config). Wrap new features in flag
    checks. Deploy code continuously. Enable features per environment, user segment, or percentage. Remove flag and dead code
    within 2 sprints of full rollout. Never nest flags more than 2 levels deep.
  severity: medium
  technologies:
    library: [launchdarkly, unleash, flagsmith]
  domains:
    domain: [operations, devops]
    concern: [ci_cd, engineering-culture]
  example_good: "# Feature flag guarding new checkout flow\nfrom feature_flags import is_enabled\n\ndef get_checkout_page(user):\n\
    \    if is_enabled(\"new_checkout_v2\", user_id=user.id):\n        return render_new_checkout(user)  # New flow — % rollout\n\
    \    return render_checkout(user)           # Old flow — safe default\n\n# Flag lifecycle:\n# Week 1: Deploy code, flag\
    \ OFF\n# Week 2: Enable for internal team (10 users)\n# Week 3: Enable for 5% of users\n# Week 4: Enable for 100%\n# Week\
    \ 5: Remove flag and old code path\n"
  example_bad: "# No feature flags — deploy = release\ndef get_checkout_page(user):\n    return render_new_checkout(user)\
    \  # Deployed = live for everyone\n    # Bug found? Only fix is another deployment (20 min)\n    # Feature not ready?\
    \ Long-lived branch until it is (merge hell)\n"
  when_applies: Projects using LaunchDarkly, Unleash, or Flagsmith
  when_not_applies: local development only, throwaway experiments
  sources: ["https://martinfowler.com/articles/feature-toggles.html"]
- id: CR-CICD-018
  text: Annotate monitoring dashboards with deploy events — correlate changes with metric shifts.
  why: When latency spikes at 2:47 PM, the first question is 'did anything change?' Without deploy markers, you spend 15 minutes
    checking git logs and deployment history manually. Deploy annotations on dashboards give instant visual correlation —
    the spike started exactly when v2.3.1 was deployed. This cuts incident diagnosis time from 15 minutes to 15 seconds.
  how_to_do_right: 'Send deploy events to monitoring system (Datadog, Grafana, New Relic) as annotations. Include: deploy
    timestamp, git SHA, deployer, environment, changelog summary. Display as vertical lines on all dashboards. Use in automated
    anomaly detection — compare metrics 5 min before and after deploy.'
  severity: medium
  technologies:
    platform: [datadog, grafana, prometheus, newrelic]
  domains:
    domain: [operations, devops, observability]
    concern: [ci_cd]
  example_good: "# GitHub Actions — annotate Datadog on deploy\n- name: Notify Datadog of Deploy\n  run: |\n    curl -X POST\
    \ \"https://api.datadoghq.com/api/v1/events\" \\\n      -H \"DD-API-KEY: ${{ secrets.DD_API_KEY }}\" \\\n      -d '{\n\
    \        \"title\": \"Deployed app:${{ github.sha }}\",\n        \"text\": \"Deployed by ${{ github.actor }}\",\n    \
    \    \"tags\": [\"env:production\", \"service:app\"],\n        \"alert_type\": \"info\"\n      }'\n# Dashboard shows vertical\
    \ line at deploy time\n# Latency spike starts at the same line → root cause found instantly\n"
  example_bad: '# No deploy markers — detective work on every incident

    # "Latency spiked at 2:47 PM"

    # "When was the last deploy?" → check CI → "2:45 PM"

    # "What changed?" → check git log → scan 15 commits

    # 20 minutes to reach the same conclusion deploy markers give in 5 seconds

    '
  when_applies: Projects using Datadog, Grafana dashboards and alerting, Prometheus metrics collection, or New Relic
  when_not_applies: local development only, throwaway experiments
  sources: ["https://grafana.com/docs/grafana/latest/dashboards/build-dashboards/annotate-visualizations/"]
