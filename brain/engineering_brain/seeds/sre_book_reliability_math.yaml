layer: rules
technology: SRE
domain: reliability
knowledge:
- id: CR-SRE-MATH-001
  text: The cost of each additional nine of availability increases roughly 10x. Going from 99% to 99.9% is 10x the effort
    of 99%. Going from 99.9% to 99.99% is 10x more. This exponential cost curve means you should never aim for more reliability
    than users need.
  why: 'Google''s risk chapter (Chapter 3) quantifies the cost of reliability because it grounds SLO decisions in economics.
    The rough cost model: 99% availability (87.6 hours downtime/year) — basic architecture, single region, manual failover.
    99.9% (8.7 hours downtime/year) — redundant architecture, automated failover, monitoring. 99.99% (52 minutes downtime/year)
    — multi-region, automated canary, sophisticated load balancing, extensive testing. 99.999% (5.2 minutes downtime/year)
    — custom-built distributed systems, dedicated SRE team, chaos engineering program. Each nine requires fundamentally different
    architecture, not just more of the same. Google''s decision framework: compare the cost of the next nine against the value
    it provides. For most web services, 99.9%-99.95% is the sweet spot — beyond that, the cost exceeds the benefit.

    '
  how_to_do_right: '1. Calculate the cost of downtime for your service: revenue loss, user impact, reputation damage. This
    determines how many nines you need.

    2. 99% (8.7 hours/year): single instance, basic monitoring, manual recovery. Appropriate for: internal tools, dev environments.

    3. 99.9% (8.7 hours/year): redundant instances, automated health checks, on-call rotation. Appropriate for: most web applications.

    4. 99.99% (52 min/year): multi-region, automated failover, canary deployments, extensive testing. Appropriate for: payment
    systems, critical infrastructure.

    5. 99.999% (5.2 min/year): custom distributed systems, dedicated teams, continuous chaos testing. Appropriate for: core
    infrastructure (DNS, auth).

    6. Don''t target more reliability than users need: overengineering reliability wastes resources that could improve features.

    '
  example_good: "# Calculate cost-benefit before adding a nine\ndef evaluate_reliability_target(current: float, target: float,\n                                revenue_per_hour: float) -> dict:\n    current_downtime_h = (1 - current) * 8760  # hours/year\n    target_downtime_h = (1 - target) * 8760\n    saved_downtime_h = current_downtime_h - target_downtime_h\n    revenue_saved = saved_downtime_h * revenue_per_hour\n    return {\n        \"current_downtime_hours_year\": current_downtime_h,\n        \"target_downtime_hours_year\": target_downtime_h,\n        \"revenue_saved_year\": revenue_saved,\n        \"decision\": \"invest\" if revenue_saved > engineering_cost else \"skip\"\n    }\n# evaluate_reliability_target(0.999, 0.9999, 10000)\n# -> saved: 7.8 hours/yr -> $78K saved. Worth it if eng cost < $78K\n"
  example_bad: "# Blindly targeting 99.999% for an internal dashboard\n# 99.999% = 5.2 minutes downtime/year\n# Requires: multi-region, chaos engineering, dedicated SRE team\n# Cost: $500K+/year in engineering\n# But users check this dashboard once a day and tolerate minutes of delay\n# 99.9% would be sufficient at 1/100th the cost\n\nSLO = 99.999  # Over-engineered for the use case\n"
  when_applies: "When setting reliability targets (SLOs) and deciding how much engineering effort to invest in availability."
  severity: high
  technologies:
    lang: [general]
  domains:
    domain: [architecture, mathematics, reliability]
    concern: [cost_modeling]
  sources:
  - url: https://sre.google/sre-book/embracing-risk/
    title: 'Google SRE Book — Chapter 3: Embracing Risk'
  validation_status: cross_checked
- id: CR-SRE-MATH-002
  text: Failure domains must be independent for redundancy to work. Two servers in the same rack are NOT independent (rack
    power failure kills both). Two servers in different AZs but same region are partially independent (region-wide outage
    kills both). True independence requires geographic diversity.
  why: 'Google''s failure analysis (Chapters 22, 26) emphasizes that correlated failures defeat redundancy. The math of independent
    failures: if each server has 99.9% availability and failures are INDEPENDENT, two servers have 1 - (0.001)^2 = 99.9999%
    compound availability. But if failures are CORRELATED (both on the same rack, same power supply, same network switch),
    a single failure takes both down — the compound availability is just 99.9%, same as one server. Google identifies common
    failure domains: rack (shared power, network switch), availability zone (shared datacenter infrastructure), region (shared
    backbone network), cloud provider (shared control plane), DNS provider (shared resolution), and CDN (shared edge). True
    redundancy requires diversity across the relevant failure domain.

    '
  how_to_do_right: '1. Identify failure domains: what can fail and take multiple components with it? Rack, AZ, region, provider,
    DNS, CDN.

    2. Spread replicas across failure domains: at minimum, different nodes. For critical services, different AZs. For maximum
    resilience, different regions.

    3. Test independence: kill one failure domain (drain a node, simulate AZ failure) and verify the service continues operating.

    4. Don''t assume cloud AZs are independent: they share the cloud provider''s control plane, API, and sometimes network
    backbone.

    5. For DNS and CDN: use multiple providers. Route53 + Cloudflare. Not two Route53 zones (same failure domain).

    6. Monitor failure correlation: if two "independent" replicas fail simultaneously, investigate — they may share an unidentified
    dependency.

    '
  example_good: "# Kubernetes anti-affinity: spread pods across failure domains\napiVersion: apps/v1\nkind: Deployment\nspec:\n  replicas: 3\n  template:\n    spec:\n      topologySpreadConstraints:\n        - maxSkew: 1\n          topologyKey: topology.kubernetes.io/zone\n          whenUnsatisfiable: DoNotSchedule\n      affinity:\n        podAntiAffinity:\n          requiredDuringSchedulingIgnoredDuringExecution:\n            - labelSelector:\n                matchLabels:\n                  app: payment-service\n              topologyKey: kubernetes.io/hostname\n# Pods spread across zones AND different nodes\n"
  example_bad: "# All replicas on the same node (default without anti-affinity)\napiVersion: apps/v1\nkind: Deployment\nspec:\n  replicas: 3\n  template:\n    spec:\n      # No anti-affinity, no topology constraints\n      containers:\n        - name: payment-service\n          image: payment:latest\n# Kubernetes may schedule all 3 pods on the same node\n# Node failure = all 3 replicas down = total outage\n# Compound availability = same as 1 replica, not 3\n"
  when_applies: "When deploying redundant services where true independence between replicas is required for fault tolerance."
  severity: high
  technologies:
    lang: [general]
    platform: [cloud, kubernetes]
  domains:
    domain: [architecture, mathematics, reliability]
    concern: [availability, resilience, failure_domains]
  sources:
  - url: https://sre.google/sre-book/addressing-cascading-failures/
    title: 'Google SRE Book — Chapter 22: Addressing Cascading Failures'
  validation_status: cross_checked
- id: CR-SRE-MATH-003
  text: Utilization above 70% leaves no headroom for traffic spikes — a service at 80% CPU utilization is one burst away from
    degradation. Target 50-60% average utilization to absorb spikes, failures (N-1 capacity), and growth.
  why: 'Google''s capacity planning (Chapter 21) treats utilization headroom as a reliability requirement, not a cost waste.
    The math: a service at 80% average CPU utilization receives a 30% traffic spike → utilization hits 104% → CPU throttling
    → latency increases → requests queue → latency increases more → cascade. The same service at 60% average utilization receives
    the same spike → utilization hits 78% → within capacity → no degradation. Headroom serves four purposes: absorbing traffic
    spikes (daily patterns, marketing campaigns), absorbing failure (when 1 of 4 instances fails, the remaining 3 must handle
    133% of normal per-instance traffic), absorbing growth (traffic grows between capacity planning cycles), and absorbing
    maintenance (1 instance down for upgrade, remaining instances handle more traffic).

    '
  how_to_do_right: '1. Target average utilization: 50-60% of capacity. This leaves 40-50% headroom for spikes, failures, and
    growth.

    2. Alert at 70% sustained utilization: this is the warning threshold. Begin capacity expansion.

    3. Page at 85% sustained utilization: this is the danger threshold. Traffic or failure spike may cause degradation.

    4. Calculate headroom needed: max(spike_factor, N/(N-1), growth_until_next_provision) × average_utilization < 100%.

    5. Measure utilization against the SLO boundary (load at which SLOs are violated), not against 100% CPU. SLOs may be violated
    at 70% CPU.

    6. Different resources have different headroom needs: CPU can burst (headroom = 30%), memory cannot (headroom = 40%),
    disk fills gradually (headroom = 30%).

    '
  example_good: "from prometheus_client import Gauge\n\ncpu_utilization = Gauge('service_cpu_utilization', 'CPU utilization %')\n\ndef check_capacity(current_util: float, num_instances: int) -> dict:\n    # N-1 capacity: can we lose 1 instance and stay under 85%?\n    per_instance_load = current_util * num_instances\n    util_after_failure = per_instance_load / (num_instances - 1)\n    return {\n        \"current_util\": current_util,\n        \"util_after_1_failure\": util_after_failure,\n        \"safe\": util_after_failure < 0.85,\n        \"action\": \"scale up\" if util_after_failure >= 0.85 else \"ok\"\n    }\n# check_capacity(0.60, 4) -> util_after_failure=0.80, safe=True\n# check_capacity(0.80, 4) -> util_after_failure=1.07, safe=False!\n"
  example_bad: "# Running at 85% average utilization — no headroom\nNUM_INSTANCES = 4\nAVG_CPU = 0.85  # 85% average\n\n# Traffic spike of 20%: 0.85 * 1.2 = 1.02 -> CPU throttling -> cascade\n# One instance fails: load on remaining 3 = 0.85 * 4 / 3 = 1.13 -> overload\n# Both scenarios cause degradation or outage\n# No buffer for growth, maintenance, or unexpected load\n"
  when_applies: "When planning service capacity and setting utilization thresholds for autoscaling or alerting."
  severity: high
  technologies:
    lang: [general]
    platform: [cloud, kubernetes]
  domains:
    domain: [mathematics, performance, reliability, planning]
    concern: [capacity]
  sources:
  - url: https://sre.google/sre-book/handling-overload/
    title: 'Google SRE Book — Chapter 21: Handling Overload'
  validation_status: cross_checked
- id: CR-SRE-MATH-004
  text: The birthday paradox applies to distributed systems — in a cluster of N nodes, the probability of at least one failure
    per day is much higher than you'd expect. With 100 nodes each at 99.9% daily availability, there's a 10% chance of at
    least one failure per day.
  why: 'Google manages clusters of thousands of nodes and plans for frequent individual failures. The math: probability of
    NO failure in N nodes = (1 - p_failure)^N. With 100 nodes at 99.9% daily availability (p_failure = 0.001): P(no failure)
    = 0.999^100 = 0.905. P(at least one failure) = 9.5%. With 1000 nodes: P(at least one failure) = 1 - 0.999^1000 = 63.2%.
    At Google scale (100,000+ servers): individual node failures are CERTAIN every minute. This is why Google designs for
    graceful degradation rather than failure prevention — you can''t prevent individual failures in a large enough fleet,
    but you can make the system tolerate them.

    '
  how_to_do_right: '1. Calculate expected daily failures: N × p_failure. For 100 nodes at 99.9%: 0.1 failures/day. For 1000
    nodes: 1 failure/day.

    2. Design for the expected failure rate: if 1 node fails daily, the system must handle 1 node failure without any manual
    intervention.

    3. Automate failure recovery: automated health checks, automated instance replacement, automated traffic rerouting.

    4. Set appropriate alerting: don''t page for individual node failures that are automatically recovered. Alert only for
    cluster-level degradation.

    5. Test at scale: chaos testing should reflect actual failure rates, not artificial scenarios.

    6. Pre-provision replacement capacity: keep warm spares or use autoscaling with fast startup. A 5-minute replacement gap
    is acceptable; a 30-minute gap is not.

    '
  example_good: "import math\n\ndef expected_daily_failures(num_nodes: int, daily_avail: float) -> dict:\n    p_failure = 1 - daily_avail\n    p_no_failure = (daily_avail) ** num_nodes\n    p_at_least_one = 1 - p_no_failure\n    expected_failures = num_nodes * p_failure\n    return {\n        \"num_nodes\": num_nodes,\n        \"p_at_least_one_failure\": round(p_at_least_one, 4),\n        \"expected_failures_per_day\": round(expected_failures, 2),\n        \"design_for\": f\"Automate recovery for {math.ceil(expected_failures)} failures/day\"\n    }\n# expected_daily_failures(100, 0.999)\n# -> p_at_least_one=0.0952, expected=0.1/day\n# expected_daily_failures(1000, 0.999)\n# -> p_at_least_one=0.6321, expected=1.0/day\n"
  example_bad: "# Assuming individual failures are rare, so no automation needed\nNUM_SERVERS = 500\nAVAILABILITY = 0.999  # 99.9% per server per day\n\n# \"Each server only fails once every 1000 days, so failures are rare\"\n# WRONG: P(at least one failure) = 1 - 0.999^500 = 39.4%\n# Nearly every other day, at least one server fails\n# Without automated recovery, on-call is paged daily\n# Manual remediation at this scale is unsustainable\n"
  when_applies: "When operating clusters or fleets where the aggregate probability of individual component failures must be planned for."
  severity: medium
  technologies:
    lang: [general]
    platform: [cloud, kubernetes]
  domains:
    domain: [architecture, mathematics, reliability]
    concern: [resilience, failure_domains]
  sources:
  - url: https://sre.google/sre-book/addressing-cascading-failures/
    title: 'Google SRE Book — Chapter 22: Addressing Cascading Failures'
  validation_status: cross_checked
- id: CR-SRE-MATH-005
  text: Amdahl's Law limits the speedup from parallelization — if 20% of a task is sequential, no amount of parallel workers
    can make it more than 5x faster. Before scaling horizontally, identify and optimize the sequential bottleneck.
  why: 'Google''s software engineering (Chapter 18) and scaling practices apply Amdahl''s Law to system design. The law: maximum
    speedup = 1 / (S + P/N), where S is the sequential fraction, P is the parallel fraction, and N is the number of workers.
    If 20% of processing is sequential (S=0.2, P=0.8): with 10 workers, speedup = 1/(0.2 + 0.8/10) = 3.57x. With 100 workers:
    4.81x. With infinite workers: 5x. Adding workers beyond a point yields diminishing returns because the sequential portion
    dominates. In practice, the sequential bottleneck is often: a single database write, a global lock, a sequential API call,
    a synchronization point, or a shared resource (single master, single queue).

    '
  how_to_do_right: '1. Profile before scaling: identify what percentage of the workload is sequential (database writes, locks,
    synchronization) vs parallel.

    2. Optimize the sequential bottleneck first: batch database writes, reduce lock contention, eliminate synchronization
    points.

    3. Calculate theoretical maximum speedup: 1/sequential_fraction. If 30% is sequential, max speedup = 3.3x regardless of
    worker count.

    4. Beyond the theoretical maximum, scaling wastes resources: adding workers that sit idle waiting for the sequential bottleneck.

    5. Common sequential bottlenecks: single-writer databases, global locks, sequential API chains, leader-based consensus,
    centralized queues.

    6. Solutions for sequential bottlenecks: partitioning (multiple independent writers), sharding (multiple independent databases),
    pipelining (overlap sequential stages), batching (reduce synchronization frequency).

    '
  example_good: "import time\n\ndef profile_parallelism(task_fn, data_chunks, max_workers_list):\n    \"\"\"Measure actual speedup to find the sequential bottleneck.\"\"\"\n    # First: measure sequential baseline\n    t0 = time.time()\n    for chunk in data_chunks:\n        task_fn(chunk)\n    sequential_time = time.time() - t0\n\n    results = {}\n    for n_workers in max_workers_list:\n        t0 = time.time()\n        with ProcessPoolExecutor(max_workers=n_workers) as pool:\n            list(pool.map(task_fn, data_chunks))\n        parallel_time = time.time() - t0\n        speedup = sequential_time / parallel_time\n        results[n_workers] = speedup\n        # If speedup plateaus, sequential bottleneck is dominant\n    return results\n# {2: 1.8, 4: 3.2, 8: 3.5, 16: 3.6} -> plateaus at ~3.6x\n# Sequential fraction ~ 1/3.6 = 28%\n"
  example_bad: "# Adding more workers without profiling the sequential bottleneck\nNUM_WORKERS = 64  # 64 workers for a task with a DB write lock\n\n# The DB write is sequential (single-writer lock)\n# 30% of the task is the DB write (sequential fraction = 0.3)\n# Max speedup = 1 / 0.3 = 3.3x regardless of workers\n# 64 workers give 3.3x speedup — same as 8 workers\n# 56 workers sit idle, consuming memory and connections\n# Wasted resources, no additional performance\n"
  when_applies: "When scaling a workload horizontally and encountering diminishing returns from adding more workers."
  severity: medium
  technologies:
    lang: [general]
  domains:
    domain: [architecture, mathematics, performance, reliability]
    concern: [scaling]
  sources:
  - url: https://sre.google/sre-book/software-engineering-in-sre/
    title: 'Google SRE Book — Chapter 18: Software Engineering in SRE'
  validation_status: cross_checked
- id: CR-SRE-MATH-006
  text: Goodhart's Law applies to engineering metrics — when a metric becomes a target, it ceases to be a good metric. If
    you target 90% code coverage, engineers write meaningless tests that execute code without verifying behavior. If you target
    zero alerts, engineers disable alerts.
  why: 'Google''s SRE management chapters (Chapters 28-34) recognize that metrics drive behavior — and misaligned metrics
    drive harmful behavior. Examples: code coverage as a target → engineers write assert True after calling functions (100%
    coverage, 0% testing quality). Deployment frequency as a target → teams deploy empty commits to inflate the metric. Alert
    count as a target → teams increase alert thresholds until problems go undetected. On-call incident count as a target →
    incidents are reclassified as "expected behavior" to reduce the count. MTTR as a target → incidents are prematurely closed
    and reopened as new incidents. Google''s approach: use metrics as signals, not targets. Track them for understanding,
    not for performance evaluation. When metrics are used for evaluation, pair leading indicators with lagging indicators
    to prevent gaming.

    '
  how_to_do_right: '1. Use metrics as diagnostic signals, not targets: "our code coverage is 60% — we should investigate which
    areas are untested" not "achieve 90% coverage by Friday."

    2. Pair quantity metrics with quality metrics: code coverage + mutation kill rate, deployment frequency + change failure
    rate, alert count + MTTD.

    3. Be skeptical of metrics that improve rapidly: a sudden jump from 70% to 95% coverage likely means gaming, not improvement.

    4. Focus on outcome metrics, not activity metrics: user satisfaction, error rate, time-to-value — not lines of code, commits
    per day, tickets closed.

    5. Regularly audit metrics for gaming: sample the tests that contribute to coverage — do they actually verify behavior?

    6. Change metrics periodically: if a metric has been a target for 6 months, it''s likely been optimized for (gamed). Introduce
    a complementary metric.

    '
  example_good: "# Pair quantity metrics with quality metrics\nmetrics = {\n    \"code_coverage\": 0.85,\n    \"mutation_kill_rate\": 0.72,  # Paired quality metric\n    \"deploy_frequency\": 3.2,   # deploys/day\n    \"change_failure_rate\": 0.04, # Paired quality metric\n    \"alerts_fired\": 12,\n    \"mttd_minutes\": 4.5,        # Paired quality metric\n}\n\ndef evaluate_team_health(metrics: dict) -> str:\n    # Use metrics as diagnostic signals, not targets\n    if metrics[\"mutation_kill_rate\"] < 0.60:\n        return \"Investigate: tests may not verify behavior\"\n    if metrics[\"change_failure_rate\"] > 0.15:\n        return \"Investigate: deploys causing too many failures\"\n    return \"Healthy\"\n"
  example_bad: "# Using code coverage as a target incentivizes gaming\nMIN_COVERAGE = 0.90  # Team KPI: 90% coverage by Friday\n\n# Result: engineers write tests like this to hit the target:\ndef test_process_payment():\n    result = process_payment(100, 'USD')  # Executes the code (coverage)\n    assert result is not None  # Useless assertion (no quality)\n    # 100% coverage, 0% testing quality\n    # Mutation testing would show 0% kill rate\n\n# The metric improved, but test quality did not\n"
  when_applies: "When defining engineering team metrics, KPIs, or any quantitative targets that may drive behavior."
  severity: medium
  technologies:
    lang: [general]
  domains:
    domain: [management, culture, mathematics, observability, reliability]
    concern: [monitoring, metrics]
  sources:
  - url: https://sre.google/sre-book/dealing-with-interrupts/
