- id: CR-RAG-SELFRAG-001
  text: Self-RAG — Let the model decide when to retrieve, evaluate retrieval quality, and determine if the response needs
    more context before generating the final answer.
  why: 'Standard RAG always retrieves, even for questions the model can answer from its training data (''What is Python?'').
    Unnecessary retrieval adds latency and can introduce irrelevant context that confuses the model. Self-RAG adds decision
    points: (1) Should I retrieve? (2) Are the retrieved documents relevant? (3) Is my answer supported by the context? (4)
    Is my answer complete? This adaptive approach reduces unnecessary retrieval by 40% while improving answer quality on hard
    questions by 15%. The model becomes a critic of its own retrieval and generation pipeline.'
  how_to_do_right: '1. Retrieve decision: classify the query — factual/current → retrieve; general knowledge → skip.

    2. Relevance check: after retrieval, score each chunk for relevance. Discard irrelevant chunks.

    3. Support check: after generation, verify the answer is supported by the context.

    4. Completeness check: does the answer fully address the question? If not, retrieve more context.

    5. Implement as a LangGraph state machine with conditional edges.

    6. Monitor: track retrieve/skip ratio, relevance scores, and support scores over time.

    '
  severity: medium
  technologies:
    framework: [ai, langchain, llamaindex]
    library: [langgraph]
  domains:
    domain: [architecture]
    concern: [ai, rag, advanced]
  example_good: "from langgraph.graph import StateGraph, END\n\nclass SelfRAGState(TypedDict):\n    query: str\n    needs_retrieval:\
    \ bool\n    retrieved_chunks: list[str]\n    relevant_chunks: list[str]\n    answer: str\n    is_supported: bool\n\ndef\
    \ decide_retrieval(state: SelfRAGState) -> SelfRAGState:\n    \"\"\"Decide if retrieval is needed.\"\"\"\n    decision\
    \ = llm.invoke(\n        f\"Does this question require looking up specific information, \"\n        f\"or can it be answered\
    \ from general knowledge?\\n\"\n        f\"Question: {state['query']}\\n\"\n        f\"Respond: RETRIEVE or GENERATE\"\
    \n    )\n    state[\"needs_retrieval\"] = \"RETRIEVE\" in decision\n    return state\n\ndef retrieve(state: SelfRAGState)\
    \ -> SelfRAGState:\n    state[\"retrieved_chunks\"] = retriever.search(state[\"query\"], limit=10)\n    return state\n\
    \ndef filter_relevant(state: SelfRAGState) -> SelfRAGState:\n    \"\"\"Score and filter retrieved chunks for relevance.\"\
    \"\"\n    relevant = []\n    for chunk in state[\"retrieved_chunks\"]:\n        score = reranker.score(state[\"query\"\
    ], chunk)\n        if score > 0.5:\n            relevant.append(chunk)\n    state[\"relevant_chunks\"] = relevant\n  \
    \  return state\n\ndef generate(state: SelfRAGState) -> SelfRAGState:\n    context = \"\\n\".join(state.get(\"relevant_chunks\"\
    , []))\n    state[\"answer\"] = llm.invoke(\n        f\"Context: {context}\\nQuestion: {state['query']}\\nAnswer:\"\n\
    \    )\n    return state\n\ndef check_support(state: SelfRAGState) -> SelfRAGState:\n    \"\"\"Verify answer is supported\
    \ by context.\"\"\"\n    check = llm.invoke(\n        f\"Is this answer fully supported by the context?\\n\"\n       \
    \ f\"Context: {state.get('relevant_chunks', [])}\\n\"\n        f\"Answer: {state['answer']}\\n\"\n        f\"Respond:\
    \ SUPPORTED or UNSUPPORTED with explanation\"\n    )\n    state[\"is_supported\"] = \"SUPPORTED\" in check\n    return\
    \ state\n\n# Build the Self-RAG graph\ngraph = StateGraph(SelfRAGState)\ngraph.add_node(\"decide\", decide_retrieval)\n\
    graph.add_node(\"retrieve\", retrieve)\ngraph.add_node(\"filter\", filter_relevant)\ngraph.add_node(\"generate\", generate)\n\
    graph.add_node(\"verify\", check_support)\n\ngraph.add_conditional_edges(\"decide\", lambda s: \"retrieve\" if s[\"needs_retrieval\"\
    ] else \"generate\")\ngraph.add_edge(\"retrieve\", \"filter\")\ngraph.add_edge(\"filter\", \"generate\")\ngraph.add_edge(\"\
    generate\", \"verify\")\ngraph.add_edge(\"verify\", END)\n"
  example_bad: "# Always retrieve, never check relevance — blind RAG\ndef answer(query: str) -> str:\n    chunks = retriever.search(query,\
    \ limit=5)  # Always retrieves\n    context = \"\\n\".join(chunks)\n    return llm.invoke(f\"Context: {context}\\nQuestion:\
    \ {query}\")\n    # \"What is Python?\" → retrieves 5 irrelevant chunks about Python packaging\n    # Model gets confused\
    \ by packaging context, gives a worse answer than without RAG\n"
  sources: ["https://arxiv.org/abs/2310.11511"]
  when_applies: "When building RAG systems that self-assess retrieval quality and decide when to retrieve more"
- id: CR-RAG-GRAPHRAG-001
  text: Graph RAG — Augment vector retrieval with knowledge graph traversal to capture relationships, multi-hop reasoning,
    and structured data that embeddings miss.
  why: 'Vector similarity retrieval finds documents that are semantically similar to the query, but it cannot follow relationships.
    ''What drugs interact with Drug X?'' requires traversing drug→interaction→drug edges in a knowledge graph — not finding
    documents that mention Drug X. Graph RAG combines vector retrieval (for relevant documents) with graph traversal (for
    structured relationships). Microsoft''s GraphRAG paper showed 20-30% improvement on multi-hop questions over standard
    RAG. Use cases: medical (drug interactions), legal (case precedents), technical (API dependency graphs).'
  how_to_do_right: '1. Build a knowledge graph from your documents: entities as nodes, relationships as edges.

    2. Hybrid retrieval: vector search for relevant documents + graph traversal for relationships.

    3. Use entity linking: map entities in the query to nodes in the graph.

    4. Multi-hop: traverse 1-3 hops from the matched entity to find related information.

    5. Include graph context in the LLM prompt alongside retrieved text chunks.

    6. Tools: FalkorDB, Neo4j for graph storage; LlamaIndex PropertyGraphIndex for integration.

    '
  severity: medium
  technologies:
    framework: [ai, llamaindex, langchain]
    library: [falkordb]
    platform: [neo4j]
  domains:
    domain: [architecture]
    concern: [ai, rag, knowledge_graph]
  example_good: "from llama_index.core import PropertyGraphIndex\n\n# Build knowledge graph from documents\nkg_index = PropertyGraphIndex.from_documents(\n\
    \    documents,\n    llm=llm,\n    embed_model=embed_model,\n    # Extract entities and relationships\n    kg_extractors=[\n\
    \        SchemaLLMPathExtractor(llm=llm),\n        ImplicitPathExtractor(),\n    ],\n    property_graph_store=FalkorDBPropertyGraphStore(\n\
    \        url=\"redis://localhost:6379\",\n        database=\"knowledge_graph\",\n    ),\n)\n\n# Query with graph traversal\
    \ + vector retrieval\nquery_engine = kg_index.as_query_engine(\n    include_text=True,          # Include source text\
    \ chunks\n    response_mode=\"tree_summarize\",\n    embedding_mode=\"hybrid\",    # Vector + graph\n    graph_traversal_depth=2,\
    \    # Follow relationships up to 2 hops\n)\n\n# \"What APIs depend on the authentication service?\"\n# Vector search:\
    \ finds docs mentioning auth service\n# Graph traversal: AuthService → depends_on → UserService, PaymentService, OrderService\n\
    # Combined: complete answer with both descriptions AND dependency chain\nresponse = query_engine.query(\"What APIs depend\
    \ on the authentication service?\")\n"
  example_bad: "# Vector-only RAG — cannot answer relationship questions\ndef answer(query: str):\n    chunks = vector_store.search(query,\
