    What is our refund policy?\")\n    assert len(answer) > 0  # Only checks that SOMETHING was returned\n    # Answer: \"\
    Our refund policy allows returns within 90 days\" (WRONG: actual policy is 30 days)\n    # No automated check detects\
    \ the hallucinated \"90 days\"\n"
