- id: CR-RAG-BATCH-001
  text: Batch Embedding — Embed documents in batches (50-100 per request) instead of one-by-one to reduce API calls, cost,
    and latency.
  why: 'Embedding APIs have per-request overhead: network round-trip (50-200ms), auth, rate limit checking. Embedding 10,000
    documents one-by-one takes 10,000 API calls = 10,000 * 100ms = 17 minutes of network overhead alone. Batching 100 documents
    per request reduces to 100 API calls = 10 seconds of overhead. Most embedding APIs support batch requests and charge the
    same per-token regardless of batch size. OpenAI''s API accepts up to 2048 inputs per batch. A documentation indexing pipeline
    reduced from 45 minutes to 3 minutes by switching from single to batch embedding.'
  how_to_do_right: '1. Batch size: 50-100 documents per API call (check provider limits).

    2. Handle rate limits: implement exponential backoff on 429 responses.

    3. Track progress: log batch N of M, estimated time remaining.

    4. Handle partial failures: retry failed batches, not the entire job.

    5. For very large datasets (>100K docs): use async processing with progress tracking.

    6. Pre-filter: skip documents that are already embedded (content hash check).

    '
  severity: medium
  technologies:
    lang: [python]
    library: [voyage ai, openai, cohere]
  domains:
    domain: [architecture, performance]
    concern: [ai, rag]
  example_good: "import asyncio\nfrom typing import AsyncIterator\n\nclass BatchEmbedder:\n    def __init__(self, client,\
    \ batch_size: int = 100, max_concurrent: int = 5):\n        self.client = client\n        self.batch_size = batch_size\n\
    \        self.semaphore = asyncio.Semaphore(max_concurrent)\n\n    async def embed_documents(self, documents: list[str])\
    \ -> list[list[float]]:\n        \"\"\"Embed documents in parallel batches.\"\"\"\n        batches = [\n            documents[i:i\
    \ + self.batch_size]\n            for i in range(0, len(documents), self.batch_size)\n        ]\n\n        all_embeddings\
    \ = []\n        tasks = [self._embed_batch(batch, idx, len(batches)) for idx, batch in enumerate(batches)]\n        results\
    \ = await asyncio.gather(*tasks)\n        for result in results:\n            all_embeddings.extend(result)\n        return\
    \ all_embeddings\n\n    async def _embed_batch(self, batch: list[str], batch_idx: int, total: int) -> list[list[float]]:\n\
    \        async with self.semaphore:\n            for attempt in range(3):\n                try:\n                    result\
    \ = await self.client.embed_batch(batch)\n                    print(f\"Batch {batch_idx+1}/{total}: {len(batch)} docs\
    \ embedded\")\n                    return result\n                except RateLimitError:\n                    await asyncio.sleep(2\
    \ ** attempt)\n            raise Exception(f\"Batch {batch_idx} failed after 3 retries\")\n\n# Usage: 10,000 documents\
    \ in ~30 seconds instead of ~17 minutes\nembedder = BatchEmbedder(voyage_client, batch_size=100, max_concurrent=5)\nembeddings\
    \ = await embedder.embed_documents(all_documents)\n"
  example_bad: "# One-by-one embedding — 100x slower and more expensive on API overhead\nasync def embed_documents(documents:\
    \ list[str]) -> list[list[float]]:\n    embeddings = []\n    for doc in documents:  # 10,000 documents = 10,000 API calls\n\
    \        embedding = await client.embed(doc)  # 100ms overhead per call\n        embeddings.append(embedding)\n    return\
    \ embeddings\n    # 10,000 * 100ms overhead = 16.7 minutes just in network overhead\n    # Plus rate limiting: at 3000\
    \ RPM, throttled to 50 req/sec = 3.3 minutes minimum\n"
  sources: ["https://docs.voyageai.com/reference/embeddings-api"]
  when_applies: "When processing large document collections for embedding and indexing"
- id: CR-RAG-HYBRID-001
  text: Hybrid Search — Combine vector similarity (semantic) with keyword matching (BM25) for retrieval that handles both
    conceptual and exact-match queries.
  why: 'Pure vector search excels at semantic similarity (''how to handle errors'' matches ''exception handling best practices'')
    but fails on exact terms (''error code E-4021'' does not match ''error code E-4022'' — they are equally distant in embedding
    space). Pure keyword search (BM25) excels at exact matches but fails on semantic equivalence (''automobile'' does not
    match ''car''). Hybrid search combines both: BM25 for exact matches and acronyms, vector search for conceptual similarity.
    Qdrant and Weaviate benchmarks show hybrid search improves recall by 10-15% compared to either method alone.'
  how_to_do_right: '1. Run both vector search and BM25/keyword search in parallel.

    2. Merge results using Reciprocal Rank Fusion (RRF): score = sum(1/(k+rank)) across methods.

    3. Tunable weight: alpha * vector_score + (1-alpha) * bm25_score. Start with alpha=0.7.

    4. Qdrant hybrid: use named vectors + BM25 payload index.

    5. Fallback: if vector search returns low scores, weight BM25 higher (exact match likely needed).

    6. Test with both query types: conceptual (''how does authentication work?'') and exact (''API key AK-12345'').

    '
  severity: high
  technologies:
    framework: [ai, llamaindex]
    library: [vector_database, qdrant, weaviate]
    platform: [elasticsearch]
  domains:
    domain: [architecture]
    concern: [ai, rag, retrieval]
  example_good: "from qdrant_client import QdrantClient\nfrom qdrant_client.models import SearchRequest, NamedVector, FusionQuery\n\
    \nclass HybridSearcher:\n    def __init__(self, qdrant: QdrantClient, embedding_model):\n        self.qdrant = qdrant\n\
    \        self.embed = embedding_model\n\n    def search(self, query: str, limit: int = 5, alpha: float = 0.7) -> list[dict]:\n\
    \        query_embedding = self.embed.embed(query)\n\n        # Vector search (semantic)\n        vector_results = self.qdrant.search(\n\
    \            collection_name=\"knowledge\",\n            query_vector=query_embedding,\n            limit=limit * 2, \
    \ # Over-fetch for merging\n        )\n\n        # BM25 keyword search (exact match)\n        keyword_results = self.qdrant.scroll(\n\
    \            collection_name=\"knowledge\",\n            scroll_filter=Filter(must=[\n                FieldCondition(key=\"\
    content\", match=MatchText(text=query))\n            ]),\n            limit=limit * 2,\n        )\n\n        # Reciprocal\
    \ Rank Fusion\n        scores = {}\n        k = 60  # RRF constant\n        for rank, result in enumerate(vector_results):\n\
    \            scores[result.id] = scores.get(result.id, 0) + alpha / (k + rank + 1)\n        for rank, result in enumerate(keyword_results[0]):\n\
    \            scores[result.id] = scores.get(result.id, 0) + (1 - alpha) / (k + rank + 1)\n\n        # Sort by fused score\
    \ and return top results\n        sorted_ids = sorted(scores, key=scores.get, reverse=True)[:limit]\n        return [self._get_result(rid,\
    \ scores[rid]) for rid in sorted_ids]\n"
  example_bad: "# Vector-only search — fails on exact-match queries\ndef search(query: str, limit: int = 5):\n    return qdrant.search(\n\
    \        collection_name=\"knowledge\",\n        query_vector=embed_model.embed(query),\n        limit=limit,\n    )\n\
    # Query: \"error code E-4021\"\n# Vector search returns chunks about error handling in general (E-4020, E-4022, E-4023)\n\
    # The specific chunk about E-4021 has the same embedding distance as E-4022\n# User gets wrong information about the wrong\
    \ error code\n"
  sources: ["https://qdrant.tech/documentation/concepts/hybrid-queries/"]
  when_applies: "When combining dense vector search with sparse keyword search for better retrieval recall"
- id: CR-RAG-RERANK-001
  text: Cross-Encoder Reranking — After initial retrieval, rerank the top-K results with a cross-encoder model for significantly
    better precision.
  why: 'Bi-encoder retrieval (embedding similarity) is fast but approximate — it compresses the query and document into fixed-size
    vectors independently, losing fine-grained interactions. Cross-encoders process the query and document TOGETHER, capturing
    word-level interactions that bi-encoders miss. The tradeoff: cross-encoders are 100x slower (cannot pre-compute), so they
    can only process the top 20-50 results from the initial retrieval. Reranking the top 20 results with a cross-encoder typically
    improves NDCG@5 by 10-15%. Cohere Rerank and Voyage Rerank are popular options.'
  how_to_do_right: '1. Initial retrieval: fast bi-encoder search returns top 20-50 candidates.

    2. Rerank: cross-encoder scores each (query, document) pair.

    3. Return: top 3-5 reranked results to the LLM.

    4. Use API-based rerankers (Cohere Rerank, Voyage Rerank) for simplicity.

    5. For self-hosted: use sentence-transformers cross-encoders (ms-marco-MiniLM).

    6. Reranking adds 100-500ms latency — acceptable for most RAG applications.

    '
  severity: high
  technologies:
    framework: [ai, llamaindex]
    library: [cohere, voyage ai, sentence-transformers]
  domains:
    domain: [architecture]
    concern: [ai, rag, retrieval]
  example_good: "import cohere\n\nclass RerankedRetriever:\n    def __init__(self, vector_store, reranker_client: cohere.Client):\n\
    \        self.store = vector_store\n        self.reranker = reranker_client\n\n    def retrieve(self, query: str, initial_k:\
    \ int = 20, final_k: int = 5) -> list[dict]:\n        # Step 1: Fast bi-encoder retrieval (top 20)\n        candidates\
    \ = self.store.search(query, limit=initial_k)\n        candidate_texts = [c.payload[\"content\"] for c in candidates]\n\
    \n        # Step 2: Cross-encoder reranking (score all 20 against query)\n        rerank_results = self.reranker.rerank(\n\
    \            query=query,\n            documents=candidate_texts,\n            top_n=final_k,\n            model=\"rerank-english-v3.0\"\
    ,\n        )\n\n        # Step 3: Return top 5 reranked results\n        results = []\n        for r in rerank_results.results:\n\
    \            original = candidates[r.index]\n            results.append({\n                \"content\": original.payload[\"\
    content\"],\n                \"source\": original.payload.get(\"source_file\", \"unknown\"),\n                \"vector_score\"\
    : original.score,\n                \"rerank_score\": r.relevance_score,\n            })\n        return results\n\n# Without\
    \ reranking: top 5 results have 60% relevance\n# With reranking: top 5 results have 80% relevance (relevant docs promoted\
    \ from positions 6-15)\n"
  example_bad: "# No reranking — return raw bi-encoder results\ndef retrieve(query: str, k: int = 5):\n    return vector_store.search(query,\
    \ limit=k)\n    # Bi-encoder missed: the most relevant document is at position 12\n    # because the query uses different\
    \ terminology than the document\n    # Cross-encoder would have caught the semantic match and promoted it to top 3\n"
  sources: ["https://www.sbert.net/examples/applications/cross-encoder/README.html"]
  when_applies: "When re-ranking retrieved documents to improve relevance before passing to the LLM"
- id: CR-RAG-QUERYXFORM-001
  text: 'Query Transformation — Transform the user''s query before retrieval to improve recall: HyDE generates a hypothetical
    answer, multi-query generates query variations.'
  why: Users ask questions in conversational language ('why is my app slow?') but documents are written in technical language
    ('performance optimization for latency reduction'). The embedding distance between the question and the relevant document
    is large because they use different vocabulary. Query transformation bridges this gap. HyDE (Hypothetical Document Embeddings)
    generates a fake answer first and uses its embedding for retrieval — the fake answer uses technical language closer to
    the actual documents. Multi-query generates 3-5 variations of the question to capture different phrasings. Both improve
    recall by 15-25%.
  how_to_do_right: '1. HyDE: ask the LLM to generate a hypothetical answer, then embed the answer (not the question) for retrieval.

    2. Multi-query: ask the LLM to generate 3-5 alternative phrasings of the question. Retrieve for each, merge results.

    3. Step-back prompting: ask a more general question first, then the specific question.

    4. Query decomposition: break complex questions into sub-questions, retrieve for each.

    5. Choose based on query type: HyDE for factual, multi-query for exploratory, decomposition for complex.

    6. Monitor: compare retrieval scores with and without transformation to validate improvement.

    '
  severity: high
  technologies:
    framework: [ai, langchain, llamaindex]
    library: [anthropic, openai]
  domains:
    domain: [architecture]
    concern: [ai, rag, retrieval]
  example_good: "class QueryTransformer:\n    def __init__(self, llm, retriever):\n        self.llm = llm\n        self.retriever\
    \ = retriever\n\n    async def hyde_retrieve(self, query: str, k: int = 5) -> list[dict]:\n        \"\"\"HyDE: generate\
    \ hypothetical answer, use it for retrieval.\"\"\"\n        # Step 1: Generate a fake answer (uses technical vocabulary)\n\
    \        hypothetical = await self.llm.invoke(\n            f\"Write a short, technical paragraph answering this question.\
    \ \"\n            f\"Do not worry about accuracy — focus on using the right terminology.\\n\"\n            f\"Question:\
    \ {query}\"\n        )\n\n        # Step 2: Retrieve using the hypothetical answer's embedding\n        # The fake answer\
    \ uses technical terms closer to actual documents\n        results = self.retriever.search(hypothetical, limit=k)\n  \
    \      return results\n\n    async def multi_query_retrieve(self, query: str, k: int = 5) -> list[dict]:\n        \"\"\
    \"Generate query variations for broader recall.\"\"\"\n        variations = await self.llm.invoke(\n            f\"Generate\
    \ 3 alternative phrasings for this question. \"\n            f\"Use different vocabulary and perspectives.\\n\"\n    \
    \        f\"Question: {query}\\n\"\n            f\"Return as a JSON list of strings.\"\n        )\n        queries = [query]\
    \ + json.loads(variations)\n\n        # Retrieve for each variation and merge\n        all_results = {}\n        for q\
    \ in queries:\n            for result in self.retriever.search(q, limit=k):\n                if result.id not in all_results:\n\
    \                    all_results[result.id] = result\n\n        # Return top-k by best score across all queries\n    \
    \    sorted_results = sorted(all_results.values(), key=lambda r: r.score, reverse=True)\n        return sorted_results[:k]\n\
    \n# User query: \"why is my app slow?\"\n# HyDE generates: \"Application latency can be caused by unoptimized database\
    \ queries,\n#                   missing indexes, N+1 query patterns, and insufficient connection pooling...\"\n# This\
    \ embedding is much closer to the actual performance docs\n"
  example_bad: "# Direct query — vocabulary mismatch reduces retrieval quality\ndef search(query: str):\n    return retriever.search(query,\
    \ limit=5)\n    # Query: \"why is my app slow?\"\n    # Embedding distance to \"Performance Optimization Guide\" is high\n\
    \    # because \"slow\" and \"performance optimization\" are semantically distant\n    # Relevant docs at position 15+,\
    \ irrelevant docs at position 1-5\n"
  sources: ["https://arxiv.org/abs/2212.10496"]
  when_applies: "When transforming user queries to improve retrieval quality in RAG systems"
- id: CR-RAG-GROUND-001
  text: Grounded Generation — Instruct the LLM to ONLY use the provided context for answers, explicitly state when information
    is not found, and cite sources.
  why: LLMs hallucinate — they generate plausible-sounding but factually incorrect information. In a RAG system, the model
    should ONLY use the retrieved context, not its training data. Without explicit grounding instructions, the model freely
    mixes retrieved facts with hallucinated details. A medical RAG system without grounding instructions mixed actual drug
    interactions from the database with hallucinated dosage information from training data — a dangerous combination. Grounding
    reduces hallucination by 60-80% according to Anthropic and OpenAI benchmarks.
  how_to_do_right: '1. System prompt: "Answer ONLY based on the provided context. If the context does not contain the answer,
    say ''I don''t have information about that.''"

    2. Cite sources: "After each statement, cite the source in brackets [Source: document_name, section]."

    3. Separate context from instructions: use clear delimiters (XML tags, markdown sections).

    4. Include a "no answer" instruction: tell the model what to do when context is insufficient.

    5. Evaluate faithfulness: use RAGAS or DeepEval faithfulness metric to detect hallucination.

    6. Temperature: use 0.0-0.2 for factual RAG to minimize creative hallucination.

    '
  severity: critical
  technologies:
    framework: [ai, langchain, llamaindex]
    library: [openai, anthropic]
  domains:
    domain: [architecture]
    concern: [ai, rag, safety]
  example_good: "RAG_SYSTEM_PROMPT = \"\"\"\nYou are a knowledge assistant. Answer questions using ONLY the provided context.\n\
    \nRULES:\n1. Base your answer EXCLUSIVELY on the <context> section below.\n2. After each factual statement, cite the source:\
    \ [Source: filename, section].\n3. If the context does not contain enough information to answer, respond:\n   \"I don't\
    \ have enough information in my knowledge base to answer this question.\n    You might want to check: [suggest relevant\
    \ documentation].\"\n4. NEVER make up information, statistics, dates, or URLs not present in the context.\n5. If you are\
    \ unsure, say \"Based on the available context, I believe...\" with a caveat.\n\n<context>\n{retrieved_chunks_with_sources}\n\
    </context>\n\"\"\"\n\n# Response with citations\n# \"The API rate limit is 1000 requests per minute for the Pro plan\n\
    # [Source: api_reference.md, Section: Rate Limits]. Exceeding this limit\n# results in a 429 status code with a Retry-After\
    \ header\n# [Source: api_reference.md, Section: Error Handling].\"\n"
  example_bad: 'RAG_SYSTEM_PROMPT = "You are a helpful assistant. Here is some context: {context}. Answer the user''s question."

