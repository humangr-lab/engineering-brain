- id: CR-RAG-MULTIMODAL-001
  text: Multi-Modal RAG — Process and retrieve from images, tables, and diagrams alongside text. Tables and images contain
    structured information that text chunking misses.
  why: 'Many documents contain critical information in tables (pricing matrices, API parameter tables, comparison charts)
    and diagrams (architecture diagrams, flowcharts, entity-relationship diagrams) that pure text RAG ignores. A table showing
    pricing tiers cannot be meaningfully chunked as text — the column headers and row relationships are lost. Multi-modal
    RAG processes these elements separately: tables are parsed into structured data, images are described by a vision model,
    and both are embedded alongside text. A technical documentation RAG system missed 30% of user questions because the answers
    were in architecture diagrams and API parameter tables that were ignored by text-only chunking.'
  how_to_do_right: '1. Table extraction: use PDF parsers (unstructured, camelot) to extract tables as structured data (CSV/JSON).

    2. Image description: use a vision model (GPT-4V, Claude vision) to generate text descriptions of diagrams.

    3. Store table data as structured text: "| Column1 | Column2 |\n|---|---|\n| val1 | val2 |".

    4. Embed the table/image description alongside surrounding text for context.

    5. Metadata: tag chunks as type=text|table|image|code for filtering.

    6. At retrieval time, include the structured table data (not just the description) in the context.

    '
  severity: medium
  technologies:
    framework: [ai, llamaindex]
    library: [unstructured, gpt-4v, anthropic]
  domains:
    domain: [architecture]
    concern: [ai, rag, multi_modal]
  example_good: "from unstructured.partition.pdf import partition_pdf\nfrom unstructured.documents.elements import Table,\
    \ Image, NarrativeText\n\ndef process_document(pdf_path: str) -> list[dict]:\n    \"\"\"Extract text, tables, and images\
    \ from a PDF document.\"\"\"\n    elements = partition_pdf(\n        filename=pdf_path,\n        strategy=\"hi_res\",\
    \              # Use OCR + layout analysis\n        extract_images_in_pdf=True,\n        infer_table_structure=True, \
    \      # Parse tables into HTML/markdown\n    )\n\n    chunks = []\n    for element in elements:\n        if isinstance(element,\
    \ Table):\n            # Store table as markdown + surrounding context\n            chunks.append({\n                \"\
    content\": f\"TABLE: {element.metadata.text_as_html}\\n\\nContext: {element.metadata.parent_id}\",\n                \"\
    type\": \"table\",\n                \"metadata\": {\"page\": element.metadata.page_number, \"source\": pdf_path},\n  \
    \          })\n        elif isinstance(element, Image):\n            # Describe image with vision model\n            description\
    \ = vision_model.describe(element.metadata.image_path)\n            chunks.append({\n                \"content\": f\"\
    DIAGRAM: {description}\",\n                \"type\": \"image\",\n                \"metadata\": {\"page\": element.metadata.page_number,\
    \ \"source\": pdf_path},\n            })\n        elif isinstance(element, NarrativeText):\n            chunks.append({\n\
    \                \"content\": element.text,\n                \"type\": \"text\",\n                \"metadata\": {\"page\"\
    : element.metadata.page_number, \"source\": pdf_path},\n            })\n    return chunks\n"
  example_bad: "# Text-only extraction — loses tables and diagrams\ndef process_document(pdf_path: str) -> list[str]:\n  \
    \  text = extract_text(pdf_path)  # Just raw text extraction\n    chunks = text_splitter.split(text)\n    return chunks\n\
    \    # Table: \"| Plan | Price | Features |\" becomes \"Plan Price Features\" — structure lost\n    # Diagram: completely\
    \ ignored — the architecture diagram is invisible to RAG\n    # User asks: \"What's the price difference between Pro and\
    \ Enterprise?\"\n    # RAG cannot answer because the pricing table was destroyed during extraction\n"
  sources: ["https://docs.llamaindex.ai/en/stable/module_guides/loading/connector/llama_parse/"]
