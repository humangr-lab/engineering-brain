    concern: [ai, rag, evaluation]
  example_good: "from ragas import evaluate\nfrom ragas.metrics import faithfulness, answer_relevancy, context_precision\n\
    \ndef evaluate_rag_pipeline(test_cases: list[dict]) -> dict:\n    \"\"\"Run faithfulness evaluation on test cases.\"\"\
    \"\n    dataset = Dataset.from_list([\n        {\n            \"question\": tc[\"question\"],\n            \"answer\"\
    : rag_pipeline.invoke(tc[\"question\"]),\n            \"contexts\": retriever.search(tc[\"question\"]),\n            \"\
    ground_truth\": tc[\"expected_answer\"],\n        }\n        for tc in test_cases\n    ])\n\n    result = evaluate(\n\
    \        dataset,\n        metrics=[faithfulness, answer_relevancy, context_precision],\n    )\n\n    scores = {\n   \
    \     \"faithfulness\": result[\"faithfulness\"],\n        \"answer_relevancy\": result[\"answer_relevancy\"],\n     \
    \   \"context_precision\": result[\"context_precision\"],\n    }\n\n    # CI/CD gate: fail if faithfulness drops below\
    \ threshold\n    assert scores[\"faithfulness\"] >= 0.85, (\n        f\"Faithfulness dropped to {scores['faithfulness']:.2f}\
    \ \"\n        f\"(threshold: 0.85). Check for hallucination in recent prompt changes.\"\n    )\n    return scores\n"
