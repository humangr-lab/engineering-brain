- id: CR-RAG-EVAL-PIPELINE-001
  text: RAG Evaluation Pipeline — Evaluate the full RAG pipeline (retrieval quality + generation quality) with separate metrics
    for each stage to isolate failures.
  why: When a RAG system gives a wrong answer, the failure can be in retrieval (wrong documents retrieved), generation (right
    documents but wrong answer), or both. Without separate metrics per stage, you do not know where to focus improvement efforts.
    Context precision measures retrieval quality (did you retrieve relevant documents?). Faithfulness measures generation
    quality (is the answer grounded in the context?). Answer relevancy measures end-to-end quality (does the answer address
    the question?). A legal RAG system had low accuracy — separate evaluation revealed retrieval was 90% precise but generation
    was only 60% faithful. Fixing the generation prompt (not retrieval) improved overall accuracy by 25%.
  how_to_do_right: '1. Retrieval metrics: context precision (relevance of retrieved docs), context recall (did you find all
    relevant docs).

    2. Generation metrics: faithfulness (grounded in context), answer relevancy (addresses the question).

    3. End-to-end metrics: answer correctness (matches ground truth), answer completeness.

    4. Golden dataset: maintain 100+ question-answer-context triples for regression testing.

    5. Run evaluations in CI/CD on every prompt or retrieval config change.

    6. Dashboards: track all metrics over time. Set alerts on degradation (>5% drop in any metric).

    '
  severity: high
  technologies:
    library: [ragas, deepeval, langsmith, braintrust]
  domains:
    domain: [architecture]
    concern: [ai, rag, evaluation]
  example_good: "from ragas import evaluate\nfrom ragas.metrics import (\n    context_precision,      # Are retrieved docs\
    \ relevant?\n    context_recall,         # Did we find all relevant docs?\n    faithfulness,           # Is the answer\
    \ grounded in context?\n    answer_relevancy,       # Does the answer address the question?\n    answer_correctness, \
    \    # Does the answer match ground truth?\n)\nfrom datasets import Dataset\n\ndef evaluate_rag_pipeline(golden_dataset:\
    \ list[dict]) -> dict:\n    \"\"\"Full pipeline evaluation with per-stage metrics.\"\"\"\n\n    # Run the RAG pipeline\
    \ on each test case\n    results = []\n    for case in golden_dataset:\n        retrieved = retriever.search(case[\"question\"\
    ], limit=5)\n        answer = generator.generate(case[\"question\"], retrieved)\n        results.append({\n          \
    \  \"question\": case[\"question\"],\n            \"answer\": answer,\n            \"contexts\": [r.content for r in retrieved],\n\
    \            \"ground_truth\": case[\"expected_answer\"],\n        })\n\n    dataset = Dataset.from_list(results)\n  \
    \  scores = evaluate(dataset, metrics=[\n        context_precision,   # Retrieval quality\n        context_recall,   \
    \   # Retrieval completeness\n        faithfulness,        # Generation grounding\n        answer_relevancy,    # Generation\
    \ relevance\n        answer_correctness,  # End-to-end correctness\n    ])\n\n    # Stage-level diagnosis\n    if scores[\"\
    context_precision\"] < 0.7:\n        print(\"FIX RETRIEVAL: retrieved documents are not relevant\")\n    if scores[\"\
    faithfulness\"] < 0.8:\n        print(\"FIX GENERATION: answers not grounded in context (hallucination)\")\n    if scores[\"\
    answer_correctness\"] < 0.8:\n        print(\"FIX END-TO-END: overall answer quality below threshold\")\n\n    return\
    \ scores\n"
  example_bad: "# Only check final answer — cannot diagnose which stage failed\ndef evaluate_rag():\n    correct = 0\n   \
    \ for case in test_cases:\n        answer = rag_pipeline.invoke(case[\"question\"])\n        if case[\"expected_answer\"\
    ].lower() in answer.lower():\n            correct += 1\n    accuracy = correct / len(test_cases)\n    print(f\"Accuracy:\
    \ {accuracy}\")\n    # Accuracy is 60% — but WHY?\n    # Is it retrieval (wrong docs)? Or generation (right docs, wrong\
    \ answer)?\n    # Without separate metrics, you are guessing where to invest improvement effort\n"
  sources: ["https://docs.ragas.io/en/latest/concepts/metrics/"]
  when_applies: "When evaluating end-to-end RAG pipeline quality including retrieval and generation"

- id: CR-RAG-GRAPH-001
  text: >
    Graph-based RAG — traverse a knowledge graph to gather multi-hop context before generating answers.
    When a query requires reasoning across connected entities (e.g., "what drugs interact with the
    medication prescribed to patients with condition X?"), flat vector retrieval returns disconnected
    chunks. Graph traversal follows relationships explicitly, collecting exactly the nodes needed.
  why: >
    Vector retrieval excels at single-hop semantic similarity but fails on multi-hop relational queries.
    A 2023 Microsoft study on GraphRAG showed 40% improvement in answer completeness for complex
    analytical queries compared to naive RAG, because graph traversal captures relationship chains
    that no single chunk contains. Without graph-based retrieval, agents either hallucinate missing
    hops or give incomplete answers citing only the first-level information.
  how_to_do_right: |
    1. Build a knowledge graph from your documents (entities as nodes, relations as edges).
    2. At query time, extract key entities from the query using NER or LLM.
    3. Start a BFS/DFS traversal from those entities with a max depth of 2-3 hops.
    4. Collect all visited nodes and their text as context for the LLM.
    5. Use a community detection algorithm (Louvain) to build summary nodes for global questions.
    6. Combine graph context with dense retrieval for hybrid coverage.
    7. Cap traversal at depth 3 — deeper traversal adds noise faster than signal.
  severity: high
  technologies:
    lang: [python]
    framework: [langchain, llamaindex]
    platform: [neo4j, falkordb]
  domains:
    domain: [architecture]
    concern: [ai, rag, knowledge_graph]
  example_good: |
    from neo4j import GraphDatabase
    from openai import OpenAI

    driver = GraphDatabase.driver("bolt://localhost:7687")
    client = OpenAI()

    def graph_rag_retrieve(query: str, max_depth: int = 2) -> str:
        # Step 1: Extract entities from query
        entities = extract_entities_with_llm(query)  # e.g., ["metformin", "type 2 diabetes"]

        # Step 2: Traverse knowledge graph
        cypher = """
        MATCH path = (start:Entity)-[*1..{depth}]-(related)
        WHERE start.name IN $entities
        RETURN related.text AS context, length(path) AS hops
        ORDER BY hops ASC
        LIMIT 20
        """.format(depth=max_depth)

        with driver.session() as session:
            results = session.run(cypher, entities=entities)
            contexts = [r["context"] for r in results if r["context"]]

        # Step 3: Generate with graph context
        combined_context = "\n\n".join(contexts)
        return client.chat.completions.create(
            model="gpt-4o",
            messages=[
                {"role": "system", "content": f"Answer based on this context:\n{combined_context}"},
                {"role": "user", "content": query},
            ]
        ).choices[0].message.content
  example_bad: |
    # Flat vector retrieval — misses relationship hops
    def rag_retrieve(query: str) -> str:
        chunks = vector_store.similarity_search(query, k=5)
        context = "\n".join([c.page_content for c in chunks])
        return llm.invoke(f"Context: {context}\nQuestion: {query}")
    # Query: "What are side effects for patients with kidney disease taking metformin?"
    # Returns chunks about metformin OR kidney disease — never the INTERSECTION
    # LLM hallucinates the relationship because it was never retrieved
  when_applies: "Multi-hop questions requiring traversal of relational knowledge, knowledge bases with explicit entity relationships"
  sources:
    - "Microsoft GraphRAG (2024) — https://microsoft.github.io/graphrag/"
    - "Edge et al. (2024). From Local to Global: A Graph RAG Approach to Query-Focused Summarization. arXiv:2404.16130"

- id: CR-RAG-TEMPORAL-001
  text: >
    Temporal RAG — weight retrieved documents by freshness, applying time-decay to older content
    so recent information outranks stale knowledge for time-sensitive queries.
  why: >
    Standard BM25 and vector similarity are time-agnostic — a document from 2019 can outscore a
    2024 document even when the query asks about current status. For fast-moving domains (financial
    data, medical guidelines, software documentation), stale retrieval causes confidently wrong
    answers. Elasticsearch function_score with an exponential decay on publish_date consistently
    improves freshness without sacrificing relevance when properly tuned.
  how_to_do_right: |
    1. Store published_at (ISO timestamp) as a metadata field on every document.
    2. Apply exponential time-decay: score = relevance_score * e^(-lambda * days_old).
    3. Lambda tuning: 0.005 for general knowledge (half-life ~140 days), 0.05 for news (half-life ~14 days).
    4. For queries containing temporal signals ("current", "latest", "2025"), boost lambda to 0.1.
    5. Always return the publish date alongside retrieved content so LLM can reason about recency.
    6. Exclude documents older than max_age (e.g., 2 years for medical guidelines unless no newer source exists).
  severity: high
  technologies:
    lang: [python]
    platform: [elasticsearch, qdrant]
    framework: [langchain, llamaindex]
  domains:
    domain: [architecture]
    concern: [ai, rag, retrieval]
  example_good: |
    import math
    from datetime import datetime, timezone
    from qdrant_client.models import ScoredPoint

    def temporal_rerank(results: list[ScoredPoint], lambda_decay: float = 0.005) -> list[ScoredPoint]:
        """Rerank results by combined relevance × freshness decay."""
        now = datetime.now(timezone.utc)
        reranked = []
        for r in results:
            published_at = r.payload.get("published_at")
            if published_at:
                age_days = (now - datetime.fromisoformat(published_at)).days
                freshness = math.exp(-lambda_decay * age_days)
            else:
                freshness = 0.5  # Unknown age → neutral decay

            combined_score = r.score * freshness
            reranked.append((combined_score, r))

        reranked.sort(key=lambda x: x[0], reverse=True)
        return [r for _, r in reranked]

    # Usage
    raw_results = qdrant_client.search(collection_name="docs", query_vector=embedding, limit=20)
    fresh_results = temporal_rerank(raw_results, lambda_decay=0.005)[:5]
  example_bad: |
    # Time-agnostic retrieval — stale documents can dominate results
    results = vector_store.similarity_search("current COVID treatment guidelines", k=5)
    # Returns a highly-upvoted 2021 paper about treatments that are no longer recommended
    # LLM confidently cites outdated protocols — patient safety risk
  when_applies: "Domains with rapidly changing information: news, medical guidelines, software docs, financial data, research"
  sources:
    - "Campos et al. (2014). Date Ranking in News Search. SIGIR. https://doi.org/10.1145/2600428.2609491"
    - "Elasticsearch decay functions — https://www.elastic.co/guide/en/elasticsearch/reference/current/query-dsl-function-score-query.html#decay-functions"

- id: CR-RAG-MULTIHOP-001
  text: >
    Multi-hop RAG — iteratively retrieve and reason, using the output of each retrieval step as
    the query for the next, for questions that require chaining 2+ pieces of evidence.
  why: >
    Single-pass retrieval fails for bridging questions: "Who founded the company that acquired the
    startup where Person X worked?" requires knowing the startup first, then the acquirer, then the
    founder — three separate lookups. IRCoT (Interleaved Retrieval + CoT) demonstrated 10-20 point
    accuracy gains on HotpotQA and MuSiQue benchmarks over single-pass RAG, precisely because it
    allows each reasoning step to guide the next retrieval.
  how_to_do_right: |
    1. Parse the initial query to detect if it requires bridging (look for "who also", "which company that", "when did X then Y").
    2. Retrieve top-3 documents for the initial query.
    3. Prompt the LLM: "Based on these documents, what additional information do I need?"
    4. Use the LLM's identified sub-question as the next retrieval query.
    5. Repeat up to max_hops = 3 (more hops = more latency + hallucination risk).
    6. Stop early if the LLM says "sufficient information available".
    7. Deduplicate retrieved documents across hops before final generation.
  severity: medium
  technologies:
    lang: [python]
    framework: [langchain, llamaindex]
    library: [dspy]
  domains:
    domain: [architecture]
    concern: [ai, rag, reasoning]
  example_good: |
    from openai import OpenAI

    client = OpenAI()

    def multi_hop_rag(initial_query: str, max_hops: int = 3) -> str:
        all_context = []
        current_query = initial_query

        for hop in range(max_hops):
            # Retrieve for current query
            results = vector_store.similarity_search(current_query, k=3)
            hop_context = [r.page_content for r in results]
            all_context.extend(hop_context)

            # Ask LLM if more retrieval is needed
            check_response = client.chat.completions.create(
                model="gpt-4o-mini",
                messages=[{
                    "role": "user",
                    "content": f"Original question: {initial_query}\n\n"
                               f"Retrieved so far:\n{''.join(all_context)}\n\n"
                               "Do you have enough to answer? If no, what sub-question should I look up next? "
                               "Reply 'SUFFICIENT' or the sub-question only."
                }]
            ).choices[0].message.content.strip()

            if check_response == "SUFFICIENT":
                break
            current_query = check_response  # Next hop uses LLM-generated sub-question

        # Final generation with all accumulated context
        combined = "\n\n".join(dict.fromkeys(all_context))  # Deduplicate
        return generate_answer(initial_query, combined)
  example_bad: |
    # Single-pass retrieval for multi-hop questions
    def rag(query: str) -> str:
        docs = vector_store.similarity_search(query, k=5)
        return llm.invoke(query + "\n" + "\n".join([d.page_content for d in docs]))
    # Query: "What is the nationality of the CEO of the company that acquired DeepMind?"
    # Single pass finds DeepMind docs — never retrieves Alphabet or Sundar Pichai
    # LLM guesses nationality instead of looking it up — hallucination
  when_applies: "Bridging questions, multi-entity queries, research requiring evidence chaining"
  sources:
    - "Trivedi et al. (2022). Interleaving Retrieval with Chain-of-Thought Reasoning. arXiv:2212.10509"
    - "Yang et al. (2018). HotpotQA: A Dataset for Diverse, Explainable Multi-hop Question Answering. EMNLP."

- id: CR-RAG-EVAL-METRICS-001
  text: >
    RAG evaluation metrics — measure faithfulness (no hallucination), answer relevance (addresses
    the question), context precision (retrieved docs are relevant), and context recall (relevant
    docs were retrieved). All four must be tracked — optimizing one metric can degrade another.
  why: >
    Teams that only track end-to-end accuracy miss the root cause of failures. Faithfulness < 0.8
    means the LLM ignores the retrieved context and hallucinates. Context precision < 0.7 means
    the retriever returns noisy irrelevant chunks that confuse the generator. Context recall < 0.7
    means relevant information is missing from retrieval. Each requires a different fix: prompt
    engineering for faithfulness, retrieval tuning for precision/recall.
  how_to_do_right: |
    1. Maintain a golden dataset of 100+ (question, ground_truth_answer, relevant_document_ids) triples.
    2. Faithfulness: after generation, verify every claim in the answer traces to a retrieved chunk.
    3. Answer relevance: embed the answer and question; cosine similarity > 0.85 = relevant.
    4. Context precision: what fraction of retrieved chunks were actually used in the answer.
    5. Context recall: what fraction of ground-truth relevant docs were in the retrieved set.
    6. Run the full evaluation suite in CI on every retrieval config or prompt change.
    7. Set minimum thresholds: faithfulness ≥ 0.85, answer_relevance ≥ 0.80, context_precision ≥ 0.70.
  severity: high
  technologies:
    lang: [python]
    library: [ragas, deepeval]
  domains:
    domain: [architecture]
    concern: [ai, rag, evaluation, quality]
  example_good: |
    from ragas import evaluate
    from ragas.metrics import faithfulness, answer_relevancy, context_precision, context_recall
    from datasets import Dataset

    THRESHOLDS = {
        "faithfulness": 0.85,
        "answer_relevancy": 0.80,
        "context_precision": 0.70,
        "context_recall": 0.70,
    }

    def run_rag_eval_suite(test_cases: list[dict]) -> dict:
        """Run all four RAG metrics and raise if any threshold violated."""
        dataset = Dataset.from_list([{
            "question": tc["question"],
            "answer": tc["generated_answer"],
            "contexts": tc["retrieved_chunks"],
            "ground_truth": tc["ground_truth"],
        } for tc in test_cases])

        scores = evaluate(dataset, metrics=[
            faithfulness, answer_relevancy, context_precision, context_recall
        ])

        failures = {}
        for metric, threshold in THRESHOLDS.items():
            if scores[metric] < threshold:
                failures[metric] = {"score": scores[metric], "threshold": threshold}

        if failures:
            raise AssertionError(f"RAG eval failed: {failures}")

        return dict(scores)
  example_bad: |
    # Only checking final answer accuracy — no diagnostic power
    correct = sum(1 for tc in test_cases if tc["expected"] in rag(tc["question"]))
    accuracy = correct / len(test_cases)
    # accuracy = 62% — but WHY? Wrong retrieval? Hallucination? Both?
    # No way to know which component to fix without per-stage metrics
  when_applies: "Any RAG system in production or pre-production — run in CI on every retrieval/prompt change"
  sources:
    - "RAGAS: Automated Evaluation of Retrieval Augmented Generation — https://docs.ragas.io/en/latest/concepts/metrics/"
    - "Es et al. (2023). RAGAS: Automated Evaluation of Retrieval Augmented Generation. arXiv:2309.15217"

- id: CR-RAG-HYBRID-001
  text: >
    Hybrid RAG — combine dense vector search (semantic), sparse BM25 (keyword), and optionally
    graph traversal into a single retrieval pipeline with score fusion. No single retrieval method
    dominates across all query types.
  why: >
    Dense retrieval excels at semantic similarity but misses exact-match queries ("what is the
    CVE-2024-1234 vulnerability?"). BM25 excels at exact keyword matching but misses paraphrase
    queries. Studies on BEIR benchmark show hybrid retrieval improves nDCG@10 by 5-15% over either
    method alone across diverse query types. Reciprocal Rank Fusion (RRF) is parameter-free and
    consistently outperforms weighted sum fusion for combining ranked lists.
  how_to_do_right: |
    1. Run dense retrieval (top-20) and sparse BM25 retrieval (top-20) in parallel.
    2. Fuse results using Reciprocal Rank Fusion: score(d) = Σ 1/(k + rank_i(d)), k=60.
    3. Take top-10 from fused results as final context.
    4. For code search: add exact-match AST search as a third signal.
    5. Qdrant supports hybrid search natively (sparse+dense); Elasticsearch supports it with knn + bool query.
    6. Monitor per-retrieval-type hit rate to know which query types favor which method.
  severity: high
  technologies:
    lang: [python]
    platform: [qdrant, elasticsearch]
    framework: [llamaindex, langchain]
  domains:
    domain: [architecture]
    concern: [ai, rag, retrieval, hybrid]
  example_good: |
    from qdrant_client import QdrantClient, models

    client = QdrantClient("localhost", port=6333)

    def hybrid_search(query: str, query_embedding: list[float],
                      sparse_vector: dict, limit: int = 10) -> list:
        """Hybrid search: dense + sparse with RRF fusion in Qdrant."""
        results = client.query_points(
            collection_name="documents",
            prefetch=[
                models.Prefetch(
                    query=query_embedding,  # Dense vector
                    using="dense",
                    limit=20,
                ),
                models.Prefetch(
                    query=models.SparseVector(**sparse_vector),  # BM25-style sparse
                    using="sparse",
                    limit=20,
                ),
            ],
            query=models.FusionQuery(fusion=models.Fusion.RRF),  # Reciprocal Rank Fusion
            limit=limit,
        )
        return results.points
  example_bad: |
    # Dense-only retrieval — exact-match queries fail
    results = qdrant_client.search(
        collection_name="documents",
        query_vector=embedding,
        limit=10,
    )
    # Query: "What does CVE-2024-1234 say about buffer overflow?"
    # CVE ID is a rare token — dense model embeds it poorly
    # Sparse/BM25 would find it instantly by exact match
  when_applies: "Production RAG systems handling diverse query types: semantic + factual + exact-match"
  sources:
    - "Qdrant Hybrid Search — https://qdrant.tech/documentation/concepts/hybrid-queries/"
    - "Cormack et al. (2009). Reciprocal Rank Fusion outperforms Condorcet and individual Rank Learning Methods. SIGIR."

- id: CR-RAG-CODE-001
  text: >
    RAG for code generation — chunk code by function/class boundary (not token count), embed both
    code and docstrings, and include caller/callee context to give the LLM complete implementation
    context.
  why: >
    Generic text chunking applied to code produces useless chunks: half a function, or a function
    body without its signature. Code search requires structural awareness — the relevant unit is
    a function, class, or module, not 512 tokens. GitHub Copilot's internal evaluation showed
    function-level chunking reduced "incomplete context" errors by 60% compared to fixed-size
    chunking. Including the call graph context (what calls this, what this calls) provides the
    LLM with enough context to generate idiomatic code.
  how_to_do_right: |
    1. Use tree-sitter or AST parsing to extract function/class boundaries.
    2. Create one chunk per function: signature + docstring + body.
    3. Embed both the natural language description (docstring) and the code separately; store both vectors.
    4. At query time, search both vectors and take the union of results.
    5. Expand the context: include the function's imports, the class it belongs to, and direct callers.
    6. Add file path and module name as metadata for cross-file context.
    7. For large codebases, pre-build a call graph and store caller/callee lists per function node.
  severity: high
  technologies:
    lang: [python]
    framework: [llamaindex, langchain]
    library: [tree-sitter]
  domains:
    domain: [architecture]
    concern: [ai, rag, code]
  example_good: |
    import ast
    from pathlib import Path

    def extract_code_chunks(filepath: str) -> list[dict]:
        """Extract function-level chunks with full context."""
        source = Path(filepath).read_text()
        tree = ast.parse(source)
        chunks = []

        for node in ast.walk(tree):
            if isinstance(node, (ast.FunctionDef, ast.AsyncFunctionDef)):
                func_source = ast.get_source_segment(source, node)
                docstring = ast.get_docstring(node) or ""

                # Include imports context (file-level)
                imports = [
                    ast.get_source_segment(source, n)
                    for n in ast.walk(tree)
                    if isinstance(n, (ast.Import, ast.ImportFrom))
                ]

                chunks.append({
                    "id": f"{filepath}::{node.name}",
                    "code": func_source,
                    "docstring": docstring,
                    "imports": "\n".join(imports[:10]),  # Top 10 imports for context
                    "file": filepath,
                    "line_start": node.lineno,
                    "function_name": node.name,
                })
        return chunks
  example_bad: |
    # Fixed-size chunking on code — produces broken fragments
    from langchain.text_splitter import CharacterTextSplitter

    splitter = CharacterTextSplitter(chunk_size=500, chunk_overlap=50)
    chunks = splitter.split_text(source_code)
    # Chunk 3: "    return result\n\ndef process_order(order_id: int,\n    user: User"
    # LLM receives half a function definition and half another — useless context
  when_applies: "Code search, code generation assistance, documentation retrieval for developer tools"
  sources:
    - "LlamaIndex Code Splitter — https://docs.llamaindex.ai/en/stable/api_reference/node_parsers/code/"
    - "TreeSitter — https://tree-sitter.github.io/tree-sitter/"

- id: CR-RAG-PARENT-CHILD-001
  text: >
    Parent-child retrieval — index small child chunks for precise retrieval but return their larger
    parent chunks for complete context. Resolves the precision-context trade-off inherent in RAG.
  why: >
    Small chunks (128 tokens) embed well and retrieve precisely — the embedding captures one focused
    concept. But they are too short for the LLM to understand context. Large chunks (1024 tokens)
    give the LLM full context but embed poorly — the vector averages over too many concepts, reducing
    retrieval precision. Parent-child retrieval gets the best of both: precise retrieval (small
    chunks) + complete generation context (full section). LlamaIndex reports 20-30% faithfulness
    improvement with parent-child over same-size-chunk baseline.
  how_to_do_right: |
    1. Split documents into parent chunks (512-1024 tokens) by section/paragraph boundaries.
    2. Split parent chunks further into child chunks (64-128 tokens) for embedding.
    3. Store parent_id on every child chunk as metadata.
    4. Index only child chunk embeddings in the vector store.
    5. At retrieval time: search using child embeddings, retrieve top-k child matches.
    6. Fetch the parent chunk for each matched child (via parent_id lookup).
    7. Deduplicate parents — multiple child matches from the same parent return that parent once.
  severity: medium
  technologies:
    lang: [python]
    framework: [llamaindex, langchain]
    platform: [qdrant]
  domains:
    domain: [architecture]
    concern: [ai, rag, retrieval]
  example_good: |
    from llama_index.core.node_parser import HierarchicalNodeParser, get_leaf_nodes
    from llama_index.core import VectorStoreIndex, StorageContext

    # Build parent-child hierarchy
    parser = HierarchicalNodeParser.from_defaults(
        chunk_sizes=[1024, 256, 64]  # Parent → mid → child
    )
    all_nodes = parser.get_nodes_from_documents(documents)
    leaf_nodes = get_leaf_nodes(all_nodes)  # Smallest chunks — index these

    # Index only leaf (child) nodes
    storage_context = StorageContext.from_defaults(docstore=docstore)
    storage_context.docstore.add_documents(all_nodes)  # Store ALL nodes

    # Vector index uses leaf nodes for retrieval precision
    index = VectorStoreIndex(leaf_nodes, storage_context=storage_context)

    # AutoMergingRetriever fetches parent when enough children match
    from llama_index.core.retrievers import AutoMergingRetriever
    retriever = AutoMergingRetriever(index.as_retriever(similarity_top_k=12), storage_context)
    # Returns parent chunks for full context — best of both worlds
  example_bad: |
    # Single chunk size — either imprecise retrieval OR missing context
    # Large chunks (1024 tokens) — bad recall, embeddings too diffuse
    splitter = TokenTextSplitter(chunk_size=1024)
    # OR
    # Small chunks (64 tokens) — good recall, but LLM lacks context
    splitter = TokenTextSplitter(chunk_size=64)
    # There is no single chunk size that solves both requirements
  when_applies: "Long documents where precise retrieval AND complete context are both needed"
  sources:
    - "LlamaIndex AutoMergingRetriever — https://docs.llamaindex.ai/en/stable/examples/retrievers/auto_merging_retriever/"
    - "LlamaIndex Hierarchical Node Parser — https://docs.llamaindex.ai/en/stable/api_reference/node_parsers/hierarchical/"

- id: CR-RAG-SELFRAG-001
  text: >
    Self-RAG — train or prompt the LLM to decide WHEN to retrieve, WHAT to retrieve, and HOW to
    use retrieved content. The LLM generates special tokens (RETRIEVE, ISREL, ISSUP, ISUSE) to
    self-critique retrieval quality before finalizing the answer.
  why: >
    Standard RAG always retrieves, even for queries the LLM can answer from parametric knowledge.
    Over-retrieval adds latency and introduces noisy context. Under-retrieval (never checking)
    allows confident hallucinations. Self-RAG (Asai et al., 2023) demonstrated that models with
    self-critique tokens achieve 5-10% higher accuracy on ASQA, TriviaQA, and PubHealth compared
    to standard RAG, because they retrieve only when needed and critically evaluate retrieved content.
  how_to_do_right: |
    1. Implement a "should I retrieve?" gate: for factual queries (dates, numbers, events), always retrieve.
       For reasoning-only queries (math, logic), skip retrieval.
    2. After retrieval, score each chunk: ISREL (is this relevant?), ISSUP (does it support the answer?).
    3. If no retrieved chunk is ISSUP, generate from parametric knowledge with explicit uncertainty.
    4. If a chunk IS ISSUP, use it and mark the claim as grounded in the answer.
    5. Use LLM-as-judge scoring (gpt-4o-mini as evaluator) as an approximation of trained Self-RAG tokens.
  severity: medium
  technologies:
    lang: [python]
    framework: [langchain, llamaindex]
    library: [dspy]
  domains:
    domain: [architecture]
    concern: [ai, rag, retrieval, self_reflection]
  example_good: |
    from openai import OpenAI

    client = OpenAI()

    def self_rag(query: str) -> dict:
        """Self-RAG: decide whether to retrieve, evaluate retrieved content."""

        # Step 1: Should I retrieve?
        retrieval_decision = client.chat.completions.create(
            model="gpt-4o-mini",
            messages=[{
                "role": "user",
                "content": f"Does answering this query require looking up external facts? "
                           f"Query: '{query}' — Reply YES or NO only."
            }]
        ).choices[0].message.content.strip()

        if retrieval_decision == "NO":
            answer = client.chat.completions.create(
                model="gpt-4o",
                messages=[{"role": "user", "content": query}]
            ).choices[0].message.content
            return {"answer": answer, "retrieved": False, "grounded": False}

        # Step 2: Retrieve
        chunks = vector_store.similarity_search(query, k=5)

        # Step 3: Evaluate relevance and support
        relevant_chunks = []
        for chunk in chunks:
            eval_response = client.chat.completions.create(
                model="gpt-4o-mini",
                messages=[{
                    "role": "user",
                    "content": f"Does this text support answering '{query}'?\nText: {chunk.page_content}\nReply RELEVANT or NOT."
                }]
            ).choices[0].message.content.strip()
            if eval_response == "RELEVANT":
                relevant_chunks.append(chunk)

        if not relevant_chunks:
            # No relevant chunks — generate from parametric knowledge with caveat
            return {"answer": f"[No supporting sources found] {client.chat.completions.create(model='gpt-4o', messages=[{'role':'user','content':query}]).choices[0].message.content}", "retrieved": True, "grounded": False}

        context = "\n\n".join([c.page_content for c in relevant_chunks])
        answer = client.chat.completions.create(
            model="gpt-4o",
            messages=[
                {"role": "system", "content": f"Answer based ONLY on this context:\n{context}"},
                {"role": "user", "content": query},
            ]
        ).choices[0].message.content
        return {"answer": answer, "retrieved": True, "grounded": True}
  example_bad: |
    # Always retrieves, never evaluates quality
    def naive_rag(query: str) -> str:
        chunks = vector_store.similarity_search(query, k=5)  # Always retrieves
        context = "\n".join([c.page_content for c in chunks])
        return llm.invoke(f"Context: {context}\n{query}")
    # Retrieves for "What is 2+2?" — wastes latency, adds irrelevant context
    # Never checks if retrieved chunks actually support the answer
  when_applies: "Production RAG systems where retrieval quality is inconsistent or latency matters"
  sources:
    - "Asai et al. (2023). Self-RAG: Learning to Retrieve, Generate, and Critique through Self-Reflection. arXiv:2310.11511"
    - "https://selfrag.github.io/"
