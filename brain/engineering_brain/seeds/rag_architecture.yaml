    # 1. No instruction to ONLY use context — model freely hallucinates

    # 2. No citation requirement — user cannot verify claims

    # 3. No "I don''t know" instruction — model invents answers for unknown topics

    # 4. No clear context delimiter — model confuses context with instructions

    # Result: "The API rate limit is 500 requests per minute" (hallucinated — actual limit is 1000)

    '
  sources: ["https://arxiv.org/abs/2005.11401"]
  when_applies: "When grounding LLM responses in retrieved context to reduce hallucinations"
- id: CR-RAG-FAITHFUL-001
  text: Faithfulness Evaluation — Measure whether the generated answer is faithful to the retrieved context using automated
    metrics (RAGAS faithfulness, DeepEval).
  why: 'Even with grounding instructions, LLMs occasionally introduce information not present in the context (unfaithful generation).
    Without automated evaluation, you discover hallucinations only when users complain. RAGAS faithfulness metric breaks the
    answer into claims and checks each against the context — a faithfulness score of 0.85 means 85% of claims are supported
    by the context. Running this in CI/CD catches regressions: if a prompt change drops faithfulness from 0.92 to 0.75, you
    know before deploying. A financial services RAG system that added faithfulness monitoring caught a prompt regression that
    was generating incorrect interest rate information.'
  how_to_do_right: '1. Use RAGAS faithfulness metric: decomposes answer into claims, checks each against context.

    2. Use DeepEval FaithfulnessMetric as an alternative (different decomposition strategy).

    3. Threshold: faithfulness >= 0.85 for production (strict), >= 0.75 for development.

    4. Run on a golden test set (50-100 cases) in CI/CD — block deployment if faithfulness drops.

    5. Log per-query faithfulness for monitoring — alert on queries with faithfulness < 0.5.

    6. Investigate unfaithful answers: are they from hallucination or from poor retrieval (wrong context)?

    '
  severity: high
  technologies:
    lang: [python]
    library: [ragas, deepeval, langsmith]
  domains:
