- id: CR-RAG-CHUNK-001
  text: Semantic Chunking — Split documents by meaning (paragraphs, sections, topics) rather than fixed token counts to preserve
    context integrity.
  why: 'Fixed-size chunking (e.g., every 512 tokens) splits mid-sentence, mid-paragraph, or mid-concept. A chunk about ''authentication''
    might end with ''First, validate the token...'' and the next chunk starts with ''...then check the expiry date'' — neither
    chunk contains the complete concept. When retrieved, the user gets an incomplete answer. Semantic chunking respects document
    structure: paragraphs, headings, code blocks, and topic boundaries. LlamaIndex found that semantic chunking improved retrieval
    accuracy by 15-25% compared to fixed-size chunking on technical documentation because each chunk contains a complete thought.'
  how_to_do_right: '1. Use document structure: headings (H1→H2→H3), paragraph breaks, section dividers.

    2. For code: chunk by function/class/module, not by line count.

    3. For markdown/HTML: parse the structure and chunk by section.

    4. Maximum chunk size: 512-1024 tokens (fits well in most embedding models).

    5. Minimum chunk size: 50 tokens (very small chunks lack context for meaningful embeddings).

    6. Preserve hierarchy metadata: include the parent heading chain in each chunk''s metadata.

    '
  severity: high
  technologies:
    lang: [python]
    framework: [ai, llamaindex, langchain]
  domains:
    domain: [architecture]
    concern: [ai, rag, retrieval]
  example_good: "from langchain.text_splitter import RecursiveCharacterTextSplitter, MarkdownHeaderTextSplitter\n\n# Step\
    \ 1: Split by markdown structure (headings)\nheaders_splitter = MarkdownHeaderTextSplitter(\n    headers_to_split_on=[\n\
    \        (\"#\", \"h1\"),\n        (\"##\", \"h2\"),\n        (\"###\", \"h3\"),\n    ]\n)\nheader_chunks = headers_splitter.split_text(markdown_doc)\n\
    \n# Step 2: Split large sections into sub-chunks (with overlap)\ntext_splitter = RecursiveCharacterTextSplitter(\n   \
    \ chunk_size=800,          # Target size in characters (~200 tokens)\n    chunk_overlap=100,       # Overlap between chunks\n\
    \    separators=[\"\\n\\n\", \"\\n\", \". \", \" \"],  # Prefer splitting at paragraphs, sentences\n)\n\nfinal_chunks\
    \ = []\nfor chunk in header_chunks:\n    # Preserve heading hierarchy as metadata\n    sub_chunks = text_splitter.split_text(chunk.page_content)\n\
    \    for sub in sub_chunks:\n        final_chunks.append({\n            \"content\": sub,\n            \"metadata\": {\n\
    \                \"h1\": chunk.metadata.get(\"h1\", \"\"),\n                \"h2\": chunk.metadata.get(\"h2\", \"\"),\n\
    \                \"h3\": chunk.metadata.get(\"h3\", \"\"),\n                \"source\": doc.source,\n            }\n \
    \       })\n"
  example_bad: "# Fixed-size chunking — destroys meaning boundaries\ndef chunk_document(text: str, chunk_size: int = 500)\
    \ -> list[str]:\n    return [text[i:i+chunk_size] for i in range(0, len(text), chunk_size)]\n\n# Chunk 1: \"...connection\
    \ pooling improves database performance by reusing\"\n# Chunk 2: \"connections instead of opening new ones. The recommended\
    \ pool size...\"\n# The concept is split across two chunks\n# Retrieving either chunk gives an incomplete answer about\
    \ connection pooling\n"
  sources: ["https://docs.llamaindex.ai/en/stable/module_guides/loading/node_parsers/"]
  when_applies: "When splitting documents into chunks for embedding and retrieval in RAG pipelines"
- id: CR-RAG-OVERLAP-001
  text: Chunk Overlap — Include 10-20% overlap between adjacent chunks to prevent information loss at chunk boundaries.
  why: Even with semantic chunking, boundaries between chunks can split important context. A sentence at the end of chunk
    N might be the premise for the conclusion at the start of chunk N+1. Without overlap, neither chunk contains the full
    reasoning chain. 10-20% overlap ensures that boundary content appears in both chunks, so whichever is retrieved, the context
    is complete. Too much overlap (>30%) wastes storage and can cause duplicate results in retrieval. Too little (<5%) misses
    the boundary problem entirely.
  how_to_do_right: '1. Set overlap to 10-20% of chunk size (e.g., 100 tokens overlap for 800 token chunks).

    2. Overlap at natural boundaries: prefer overlapping at sentence or paragraph boundaries.

    3. After retrieval, deduplicate overlapping content before injecting into the prompt.

    4. For code chunks: overlap by including the function signature in both chunks.

    5. Monitor: if retrieved chunks often have near-identical content, reduce overlap.

    6. For very structured documents (tables, forms): zero overlap is fine — structure is the boundary.

    '
  severity: medium
  technologies:
    lang: [python]
    framework: [ai, llamaindex, langchain]
  domains:
    domain: [architecture]
    concern: [ai, rag, chunking]
  example_good: "from langchain.text_splitter import RecursiveCharacterTextSplitter\n\nsplitter = RecursiveCharacterTextSplitter(\n\
    \    chunk_size=800,\n    chunk_overlap=120,  # 15% overlap — sweet spot for most documents\n    separators=[\"\\n\\n\"\
    , \"\\n\", \". \", \" \"],\n    length_function=len,\n)\n\nchunks = splitter.split_text(document_text)\n\n# Chunk 1: \"\
    ...The token bucket algorithm works by maintaining a bucket of tokens.\n#           Tokens are added at a fixed rate.\
    \ Each request consumes one token.\"\n# Chunk 2: \"Each request consumes one token. When the bucket is empty,\n#     \
    \      requests are rejected with a 429 status code...\"\n# ↑ Overlap: \"Each request consumes one token.\" appears in\
    \ both chunks\n# Either chunk provides enough context for a complete answer\n"
  example_bad: "# Zero overlap — information lost at boundaries\nsplitter = RecursiveCharacterTextSplitter(\n    chunk_size=800,\n\
    \    chunk_overlap=0,  # No overlap!\n)\n# Chunk 1: \"...The algorithm maintains a bucket of tokens. Tokens are added\"\
    \n# Chunk 2: \"at a fixed rate. Each request consumes one token. When empty...\"\n# \"Tokens are added\" — added how?\
    \ Missing from chunk 1.\n# \"at a fixed rate\" — rate of what? Missing context in chunk 2.\n"
  sources: ["https://python.langchain.com/docs/how_to/recursive_text_splitter/"]
  when_applies: "When configuring chunk overlap to preserve context at chunk boundaries"
- id: CR-RAG-META-001
  text: Chunk Metadata — Preserve source document metadata (file name, page number, section hierarchy, creation date) with
    every chunk for filtering and citation.
  why: 'Without metadata, retrieved chunks are anonymous text with no provenance. You cannot filter by source (''only search
    the API docs''), cite sources (''according to page 42 of the user manual''), or apply access control (''this user can
    only access public docs''). Metadata enables hybrid retrieval: first filter by metadata (date range, document type, access
    level), then semantic search within the filtered set. A legal RAG system without metadata could not cite which contract
    clause a response was based on — making it useless for legal review.'
  how_to_do_right: '1. Always store: source_file, page_number/section, creation_date, last_modified.

    2. Structural metadata: heading hierarchy (h1→h2→h3), document type, language.

    3. Access control metadata: access_level, department, classification.

    4. Custom metadata: product_name, version, author, review_status.

    5. Use metadata for pre-filtering: reduce the search space before vector similarity.

    6. Return metadata with results for citation: "Source: API Reference, Section 3.2, page 15."

    '
  severity: high
  technologies:
    framework: [ai, llamaindex]
    library: [vector_database, qdrant, pinecone, weaviate]
  domains:
    domain: [architecture]
    concern: [ai, rag, retrieval]
  example_good: "from qdrant_client.models import PointStruct, Filter, FieldCondition, MatchValue\n\n# Store chunks with rich\
    \ metadata\ndef index_document(doc_path: str, chunks: list[str], metadata: dict):\n    points = []\n    for i, chunk in\
    \ enumerate(chunks):\n        embedding = embed_model.embed(chunk)\n        points.append(PointStruct(\n            id=str(uuid.uuid4()),\n\
    \            vector=embedding,\n            payload={\n                \"content\": chunk,\n                \"source_file\"\
    : doc_path,\n                \"page_number\": metadata.get(\"pages\", {}).get(i),\n                \"section\": metadata.get(\"\
    sections\", {}).get(i, \"\"),\n                \"doc_type\": metadata[\"doc_type\"],        # \"api_reference\", \"tutorial\"\
    , \"faq\"\n                \"product\": metadata[\"product\"],           # \"billing\", \"auth\", \"payments\"\n     \
    \           \"last_updated\": metadata[\"last_updated\"], # ISO timestamp\n                \"access_level\": metadata.get(\"\
    access_level\", \"public\"),\n            },\n        ))\n    qdrant.upsert(collection_name=\"knowledge\", points=points)\n\
    \n# Retrieve with metadata filtering\ndef search(query: str, product: str = None, doc_type: str = None) -> list:\n   \
    \ filters = []\n    if product:\n        filters.append(FieldCondition(key=\"product\", match=MatchValue(value=product)))\n\
    \    if doc_type:\n        filters.append(FieldCondition(key=\"doc_type\", match=MatchValue(value=doc_type)))\n\n    results\
    \ = qdrant.search(\n        collection_name=\"knowledge\",\n        query_vector=embed_model.embed(query),\n        query_filter=Filter(must=filters)\
    \ if filters else None,\n        limit=5,\n    )\n    return [{\"content\": r.payload[\"content\"],\n             \"source\"\
    : f\"{r.payload['source_file']}, Section: {r.payload['section']}\",\n             \"score\": r.score} for r in results]\n"
  example_bad: "# Chunks stored without metadata — no filtering, no citation\ndef index_document(chunks: list[str]):\n   \
    \ for chunk in chunks:\n        qdrant.upsert(\n            collection_name=\"knowledge\",\n            points=[PointStruct(\n\
    \                id=str(uuid.uuid4()),\n                vector=embed_model.embed(chunk),\n                payload={\"\
    content\": chunk},  # No source, no section, no date\n            )],\n        )\n# Cannot filter: \"search only in API\
    \ docs\" — impossible\n# Cannot cite: \"where did this answer come from?\" — unknown\n# Cannot control access: confidential\
    \ and public docs mixed together\n"
  sources: ["https://docs.llamaindex.ai/en/stable/module_guides/loading/node_parsers/"]
  when_applies: "When enriching document chunks with metadata to improve retrieval precision and filtering"
- id: CR-RAG-EMBED-001
  text: 'Embedding Model Selection — Choose embedding models based on your domain: general-purpose for broad content, task-specific
    for specialized retrieval.'
  why: 'Not all embedding models perform equally on all tasks. A model trained on English Wikipedia performs poorly on code
    search. A model trained on web text performs poorly on legal documents. The MTEB benchmark shows that the best model varies
    by task type: retrieval, classification, clustering, and reranking. Using a general-purpose model for a specialized domain
    (medical, legal, code) typically reduces retrieval accuracy by 10-20% compared to a domain-specific or fine-tuned model.
    Voyage AI voyage-code-2 outperforms general models by 15% on code search tasks.'
  how_to_do_right: '1. Check MTEB benchmark for your task type (retrieval, clustering, classification).

    2. For code: use code-specific models (Voyage code-2, CodeBERT, StarEncoder).

    3. For general text: use top-ranked retrieval models (Voyage large-2, text-embedding-3-large).

    4. For multilingual: use multilingual models (multilingual-e5-large, Cohere multilingual-v3).

    5. Match dimensions to your vector store configuration. Common: 768, 1024, 1536.

    6. Benchmark on YOUR data: embed 100 queries, measure retrieval accuracy vs gold standard.

    '
  severity: high
  technologies:
    framework: [ml, huggingface]
    library: [voyage ai, openai, cohere]
  domains:
