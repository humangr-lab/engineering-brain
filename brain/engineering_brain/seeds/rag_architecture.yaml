    \ service?\"\n# Vector search returns 5 chunks mentioning \"authentication\"\n# But none of them list the DEPENDENCIES\
    \ — that's structural information\n# Answer: \"The authentication service handles user login and token validation.\"\n\
    # Missing: OrderService, PaymentService, UserService all depend on it\n"
  sources: ["https://arxiv.org/abs/2404.16130"]
  when_applies: "When combining knowledge graphs with vector search for multi-hop reasoning in RAG"
- id: CR-RAG-AGENTIC-001
  text: 'Agentic RAG — Give the agent control over retrieval decisions: what to retrieve, when to retrieve, how many times,
    and from which sources.'
  why: 'Standard RAG retrieves once and generates. But complex questions need iterative retrieval: the first retrieval provides
    partial context that informs what to retrieve next. ''Compare our Q3 and Q4 pricing strategies'' needs two separate retrievals
    (Q3 docs, then Q4 docs), then a comparison. An agent can decide: ''I need Q3 pricing first'' → retrieve → ''Now I need
    Q4 pricing'' → retrieve → ''Now I have enough context to compare''. This iterative approach handles multi-part, comparative,
    and follow-up questions that single-retrieval RAG fails on.'
  how_to_do_right: '1. Define retrieval as a TOOL the agent can call (not a fixed pipeline step).

    2. The agent decides: (a) whether to retrieve, (b) what query to use, (c) from which collection.

    3. Multiple retrieval steps: agent can retrieve, reason about what''s missing, retrieve more.

    4. Source selection: different tools for different knowledge bases (docs, code, tickets, wiki).

    5. Set a max retrieval limit (3-5) to prevent infinite retrieval loops.

    6. The agent summarizes retrieved context before injecting into the final answer prompt.

    '
  severity: medium
  technologies:
    framework: [ai, langchain, llamaindex]
    library: [langgraph, anthropic]
  domains:
    domain: [architecture]
    concern: [ai, rag, agents]
  example_good: "from langchain.tools import tool\n\n@tool\ndef search_documentation(query: str, collection: str = \"general\"\
    ) -> str:\n    \"\"\"Search the documentation knowledge base.\n    Args:\n        query: search query\n        collection:\
    \ 'general', 'api_reference', 'tutorials', or 'release_notes'\n    \"\"\"\n    results = retriever.search(query, collection=collection,\
    \ limit=3)\n    return \"\\n\\n\".join([f\"[{r.source}]: {r.content}\" for r in results])\n\n@tool\ndef search_support_tickets(query:\
    \ str, status: str = \"resolved\") -> str:\n    \"\"\"Search past support tickets for similar issues.\n    Args:\n   \
    \     query: search query\n        status: 'resolved', 'open', or 'all'\n    \"\"\"\n    tickets = ticket_store.search(query,\
    \ status=status, limit=3)\n    return \"\\n\\n\".join([f\"Ticket #{t.id}: {t.summary}\\nResolution: {t.resolution}\" for\
    \ t in tickets])\n\nAGENTIC_RAG_PROMPT = \"\"\"\nYou are a support agent with access to documentation and support ticket\
    \ history.\nUse the search tools to find relevant information before answering.\nYou may search multiple times if needed\
    \ — first search may not contain everything.\nAlways cite your sources.\n\"\"\"\n\nagent = create_tool_calling_agent(\n\
    \    llm=llm,\n    tools=[search_documentation, search_support_tickets],\n    prompt=AGENTIC_RAG_PROMPT,\n)\n\n# Agent\
    \ flow for \"How do I migrate from v2 to v3 API?\":\n# 1. search_documentation(\"v3 migration guide\", collection=\"tutorials\"\
    ) → gets migration steps\n# 2. search_documentation(\"v3 breaking changes\", collection=\"release_notes\") → gets breaking\
    \ changes\n# 3. search_support_tickets(\"v2 to v3 migration issues\", status=\"resolved\") → gets common pitfalls\n# 4.\
    \ Synthesizes all three into a comprehensive migration guide\n"
  example_bad: "# Single-shot RAG — cannot handle multi-part questions\ndef answer(query: str):\n    chunks = retriever.search(query,\
    \ limit=5)\n    return llm.invoke(f\"Context: {chunks}\\nQuestion: {query}\")\n\n# Query: \"How do I migrate from v2 to\
