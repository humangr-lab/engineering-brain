layer: rules
domain: sacada
knowledge:

- id: SQL-001
  text: >
    Design work packages to be atomic: each WP delivers exactly one verifiable artifact
    that can be tested in isolation. If a WP requires two artifacts to be meaningful,
    split it. The test of atomicity: can you write a failing test before starting the WP
    and a passing test after completing it, without referencing any other in-progress WP?
  why: >
    Non-atomic WPs are the primary cause of "partial completion" states in pipelines:
    the state where a WP is 80% done but 0% releasable. In agent-driven pipelines,
    non-atomic WPs lead to partial outputs that corrupt downstream agents expecting
    complete inputs. The brains pipeline's atomic WP system (implemented 2026-02-18)
    achieved 100% RF compliance (14/14) after switching from multi-artifact WPs to
    per-function atomic WPs. The improvement was directly attributable to atomicity.
  how_to_do_right: |
    1. Write the acceptance test FIRST before defining the WP — if you cannot write it, the WP is too vague.
    2. Enforce: 1 WP = 1 verifiable artifact (function, class, endpoint, migration, config).
    3. If a natural WP has 3 artifacts, split into 3 WPs with explicit dependencies between them.
    4. WP description must answer: what exactly exists after this WP that did not exist before?
    5. WP must have a DONE definition requiring no human judgment:
       tests pass, linter passes, artifact exists at path, integration test green.
    6. Reject WPs whose DONE definition includes words: "good", "complete", "proper", "thorough".
  severity: critical
  technologies:
    lang: [python]
    framework: [pytest, langgraph]
  domains:
    domain: [sacada, squad_lead, task_design]
    concern: [work_package_design, atomicity, deliverables]
  example_good: |
    # Atomic WP: single function, single test, binary done definition
    WP = {
        "id": "WP-042",
        "artifact": "src/veritas/core/claim_validator.py::validate_claim()",
        "done_when": [
            "function exists at specified path",
            "pytest tests/test_claim_validator.py::test_validate_claim passes",
            "ruff check src/veritas/core/claim_validator.py returns 0 errors",
        ],
        "dependencies": ["WP-039"],  # ClaimModel must exist first
    }
  example_bad: |
    # Non-atomic WP: multiple artifacts, vague done definition
    WP = {
        "id": "WP-042",
        "description": "Implement the validation module with good error handling and tests",
        # "good" is not measurable. "with tests" — how many? what coverage? which cases?
        # "module" implies multiple files — which ones? agent invents the scope.
    }
  when_applies: "Every work package definition in any sprint, for agent-executed or human-executed tasks."
  sources:
    - "CLAUDE.md Brains — Atomic WP System (2026-02-18 implementation, 14/14 compliance)"
    - "Atomic Requirements — Tyner Blain: https://tynerblain.com/blog/2010/09/14/atomic-requirements/"
    - "Atomic User Stories — ISPI: https://www.ispi-llc.com/blog/2018/5/8/atomic-user-stories"

- id: SQL-002
  text: >
    Before assigning any tasks in a sprint, build an explicit dependency graph and identify
    the critical path. Assign the best worker to critical-path tasks first. Non-critical-path
    tasks can be deferred, parallelized, or assigned to a junior. Never assign tasks without
    knowing which ones, if delayed, delay the entire sprint.
  why: >
    The most common sprint planning mistake is treating all tasks as equally urgent. In a
    10-task sprint, typically 2-3 tasks are on the critical path and determine the sprint
    outcome. A senior engineer assigned to a non-critical task while a critical-path task
    waits for a junior is a squad lead planning failure. The critical path is the single
    most important output of sprint planning. This is why CPM (Critical Path Method) is
    still taught in engineering management 60 years after its invention: knowing the critical
    path changes every downstream assignment decision.
  how_to_do_right: |
    1. List all tasks with estimated durations and dependencies.
    2. Build the DAG: nodes=tasks, edges=must-complete-before relationships.
    3. Compute earliest start and latest start for each task using forward/backward pass.
    4. Critical path = tasks where earliest start == latest start (zero float/slack).
    5. Assign most capable agent to critical-path tasks first.
    6. Mark non-critical tasks with their slack time — they can slip N days without sprint impact.
    7. Share the critical path explicitly with the whole team at kickoff — not just the lead.
  severity: high
  technologies:
    lang: [python]
    framework: [graphlib, asyncio]
  domains:
    domain: [sacada, squad_lead, planning]
    concern: [dependency_graph, critical_path, resource_allocation]
  example_good: |
    import graphlib

    tasks = {
        "spec_review":    {"duration": 1, "deps": set()},
        "db_schema":      {"duration": 2, "deps": {"spec_review"}},      # Critical path
        "api_endpoints":  {"duration": 3, "deps": {"db_schema"}},        # Critical path
        "frontend":       {"duration": 2, "deps": {"spec_review"}},      # 3 days of slack
        "tests":          {"duration": 1, "deps": {"api_endpoints"}},    # Critical path
    }
    # Critical path: spec_review(1) + db_schema(2) + api_endpoints(3) + tests(1) = 7 days
    # frontend has 3 days slack — assign to junior, will not block sprint
    ts = graphlib.TopologicalSorter({k: v["deps"] for k, v in tasks.items()})
  example_bad: |
    # Task list assigned round-robin without critical path analysis
    tasks = ["spec_review", "db_schema", "api_endpoints", "frontend", "tests"]
    for i, task in enumerate(tasks):
        team_members[i % len(team_members)].assign(task)
    # Senior gets "frontend" (3 days slack), junior gets "db_schema" (critical path) — inverted priorities
  when_applies: "Every sprint planning session with 3+ tasks and any dependency between tasks."
  sources:
    - "Critical Path Method — PMI: https://www.pmi.org/learning/library/critical-path-method-6621"
    - "Python graphlib: https://docs.python.org/3/library/graphlib.html"
    - "Sprint Planning — Atlassian: https://www.atlassian.com/agile/scrum/sprint-planning"

- id: SQL-003
  text: >
    Two tasks can safely run in parallel if and only if: they write to different output
    artifacts AND both read from already-committed inputs. "Different files" is necessary
    but not sufficient — two tasks reading from an uncommitted intermediate result have
    a hidden dependency that produces semantic inconsistency at merge time, even if they
    write different files.
  why: >
    Parallel work that appears independent but shares an uncommitted dependency is the
    most dangerous form of rework in a sprint. Example: Agent A writes code while Agent B
    writes tests for a spec that Agent A is simultaneously modifying. When A's spec changes
    are committed, B's tests may be testing behavior that no longer exists. The rule
    "different files" is necessary but not sufficient for safe parallelism. The correct
    rule requires committed inputs — a state gate, not a file gate.
  how_to_do_right: |
    1. For any two candidate parallel tasks, answer these questions:
       a. Do they write to overlapping output files or keys? If yes: must be sequential.
       b. Does either task read from an artifact the other is producing? If yes: sequential.
       c. Are all their inputs from committed, locked artifacts? If no: wait for the commit first.
    2. Define "committed" as: tests pass, artifact is in version control, locked against changes.
    3. Safe parallels: docs + tests after code is committed; two truly independent modules.
    4. Unsafe parallels: code + tests when the spec is still being finalized.
    5. Apply the parallel safety check at task assignment time, not at execution time.
  severity: high
  technologies:
    lang: [python]
    framework: [git, langgraph]
  domains:
    domain: [sacada, squad_lead, parallelism]
    concern: [parallel_safety, dependency_analysis, race_conditions]
  example_good: |
    async def assign_parallel_implementation(spec_task, impl_tasks):
        # Gate: ensure spec is committed before parallelizing implementation
        spec_result = await run_task(spec_task)
        if not spec_result.committed:
            raise PreconditionError("Spec must be committed before parallel impl tasks start")
        # Now safe to parallelize — both impl tasks read from committed spec
        await asyncio.gather(*[run_task(t) for t in impl_tasks])
  example_bad: |
    # Parallelizes before shared input is committed — semantic inconsistency guaranteed
    await asyncio.gather(
        finalize_spec(),    # Still modifying the spec (uncommitted)
        write_code(),       # Reads from the uncommitted spec
        write_tests(),      # Also reads from the uncommitted spec
    )
    # finalize_spec() changes an interface → code and tests now describe different behavior
  when_applies: "Every task assignment decision where parallel execution is being considered."
  sources:
    - "Claude Code Sub-Agents — Parallel vs Sequential: https://claudefa.st/blog/guide/agents/sub-agent-best-practices"
    - "Riloworks — The Dependency Graph Guide to Agent Architecture: https://blog.riloworks.com/its-the-dependency-graph-stupid-a-guide-to-agent-architecture/"
    - "Scrum.org — Planning and Decomposing Tasks: https://www.scrum.org/forum/scrum-forum/15817/scrum-planning-and-decomposing-task"

- id: SQL-004
  text: >
    Classify every blocker before attempting to resolve it. Five classes with distinct
    resolution paths: WAITING_ON_UPSTREAM (another task must complete first),
    MISSING_INFORMATION (spec is ambiguous), EXTERNAL_DEPENDENCY (blocked on a team,
    API, or service outside your control), SKILL_GAP (assignee lacks the knowledge),
    TECHNICAL_BLOCKER (implementation problem). Applying the wrong remedy wastes time.
  why: >
    A squad lead who treats all blockers as "needs more time" applies the wrong remedy
    to 4 out of 5 blocker types. A MISSING_INFORMATION blocker resolved by waiting
    produces wasted implementation when the spec finally changes. A SKILL_GAP blocker
    resolved by simply reassigning it creates delays that reassignment cannot fix without
    knowledge transfer. The insight: blocker classification takes 2 minutes and saves
    hours by routing to the correct resolution path immediately, rather than trying
    wrong remedies sequentially.
  how_to_do_right: |
    1. When a worker reports a blocker, classify within 15 minutes:
       WAITING_ON_UPSTREAM → check if tasks can be reordered or if upstream can be expedited
       MISSING_INFORMATION → schedule spec clarification same day (not next sprint)
       EXTERNAL_DEPENDENCY → escalate to the level that can negotiate the SLA or provide a workaround
       SKILL_GAP → pair with senior or provide targeted resource before reassigning
       TECHNICAL_BLOCKER → bring in domain expert for the specific domain
    2. Set resolution deadline per class:
       MISSING_INFORMATION: < 4 hours
       EXTERNAL_DEPENDENCY: < 24 hours
       SKILL_GAP: same day (pair, not reassign)
    3. If blocker is not resolved within deadline: escalate one level.
    4. Track blockers and resolution times per class — patterns reveal structural issues.
  severity: high
  technologies:
    lang: [python]
    framework: [linear, jira, github]
  domains:
    domain: [sacada, squad_lead, blocker_management]
    concern: [blocker_classification, resolution, escalation]
  example_good: |
    BLOCKER_RESOLUTION = {
        "WAITING_ON_UPSTREAM": {"action": "reorder_or_expedite_upstream", "deadline_hours": 2},
        "MISSING_INFORMATION": {"action": "schedule_spec_clarification_now", "deadline_hours": 4},
        "EXTERNAL_DEPENDENCY": {"action": "escalate_for_SLA_negotiation", "deadline_hours": 24},
        "SKILL_GAP":           {"action": "pair_with_senior_same_day", "deadline_hours": 8},
        "TECHNICAL_BLOCKER":   {"action": "bring_domain_expert", "deadline_hours": 4},
    }

    def resolve_blocker(blocker: Blocker) -> ResolutionPlan:
        plan = BLOCKER_RESOLUTION[blocker.type]  # Classify first, then act
        return ResolutionPlan(
            action=plan["action"],
            deadline_hours=plan["deadline_hours"],
        )
  example_bad: |
    def handle_blocker(blocker):
        # Treat all blockers as needing more time — wrong for 4 of 5 types
        blocker.assignee.deadline += timedelta(days=2)
        # SKILL_GAP: worker still lacks knowledge after 2 more days
        # MISSING_INFORMATION: wait 2 days then get a changed spec — wasted work
  when_applies: "Every blocker report in any sprint, for any type of task."
  sources:
    - "The Engineering Manager — Delegation: https://www.theengineeringmanager.com/management-101/delegation/"
    - "Minware — Tracking Cross-Team Dependencies: https://www.minware.com/blog/tracking-cross-team-dependencies"
    - "NetworkPerspective — Cross-team Collaboration Dependency Resolution: https://www.networkperspective.io/devex-book/cross-team-collaboration-dependency-resolution"

- id: SQL-005
  text: >
    Establish an explicit integration contract before any two parallel teams start work
    that will eventually merge. The contract must define: the interface (function signature,
    API schema, data model), the version pinning (what version each team builds against),
    and the integration test that verifies correct assembly. Without this, parallel teams
    drift and integration day becomes rework day.
  why: >
    The most expensive form of rework in parallel development is interface mismatch
    discovered at integration time. Two teams can each complete their work perfectly
    against their own interpretation of a shared interface and produce output that cannot
    be assembled. This is not a technical failure — it is a squad lead failure to establish
    and enforce an integration contract before work begins. The contract takes 30 minutes
    to write and prevents days of integration rework. It is the most asymmetric investment
    in sprint planning.
  how_to_do_right: |
    1. Before splitting work across teams, write the integration contract:
       - Interface definition: OpenAPI spec, Pydantic model, or function signature
       - Golden fixture: example request + example response
       - Integration test that verifies assembly against both outputs
    2. Pin the contract to a version: both teams build against v1.0.0 until renegotiated.
    3. Any interface change requires both squads to agree and version-bump the contract.
    4. Integration test runs in CI against both teams' outputs — break = drift detected immediately.
    5. Run the integration test on Day 1 of parallel work, not only at merge time.
  severity: critical
  technologies:
    lang: [python]
    framework: [pydantic, openapi, pytest]
  domains:
    domain: [sacada, squad_lead, integration]
    concern: [integration_contract, interface_definition, parallel_development]
  example_good: |
    class PaymentGatewayContract(BaseModel):
        """v1.0.0 — agreed by Backend and Payments squads on 2026-02-18."""
        transaction_id: str
        amount_cents: int  # Always integer cents, never float (precision requirement)
        currency: str = Field(pattern="^[A-Z]{3}$")  # ISO 4217
        status: str = Field(pattern="^(pending|completed|failed)$")

    def test_payment_gateway_integration():
        backend_output = backend_squad.process_payment(TEST_INPUT)
        payments_output = payments_squad.verify_payment(backend_output)
        assert PaymentGatewayContract.model_validate(backend_output)
        assert payments_output.confirmed is True
  example_bad: |
    # "We'll figure out the interface when we merge"
    # Backend squad: amount = 10.50 (float)
    # Payments squad expects: amount_cents = 1050 (int)
    # Integration day: 2 days rework. Both teams did their job correctly against different assumptions.
  when_applies: "Any sprint where two or more squads work in parallel on components that will be assembled together."
  sources:
    - "Managing Inter-Team Dependencies — SAFe: https://agileseekers.com/blog/managing-inter-team-dependencies-in-large-scale-safe-environments"
    - "Asana — Project Dependencies: https://asana.com/resources/project-dependencies"
    - "Pydantic — Contract Validation: https://docs.pydantic.dev/latest/"

- id: SQL-006
  text: >
    Track sprint progress using output artifacts, not activity. The only valid progress
    metric is: artifact exists and passes its acceptance test. A task is 0% or 100%,
    never in between for reporting purposes. Replace "working on it" and "80% done" with
    "artifact exists: yes/no, tests passing: yes/no."
  why: >
    "80% done" is the most dangerous status in any software project. It describes a state
    where the artifact does not yet exist in testable form — it could be genuinely 80% done
    or 20% done with 80% of the work still undiscovered. The Pragmatic Engineer's deep dive
    on leading engineering teams confirms: the highest-leverage squad lead behavior is
    replacing activity status with artifact status. "I've been working on the validator"
    tells you nothing. "validator.py exists and test_validate_claim passes" tells you
    everything you need to make scheduling decisions.
  how_to_do_right: |
    1. At sprint kickoff, produce the artifact checklist: list every specific, verifiable artifact.
    2. Daily standup format: "ARTIFACT_X: [exists|not_exists]. ARTIFACT_Y: [exists|not_exists]."
    3. Artifact exists + tests pass = 100%. Artifact does not exist = 0%. No intermediate values.
    4. When a worker says "80% done": ask "does the artifact exist and pass its acceptance test?"
       If no: it is 0%. Redirect to that question at every standup.
    5. Use artifact existence as the sprint burndown metric — not story points or hours logged.
    6. Agents must emit artifact_created events that the orchestrator tracks — never infer from LLM output.
  severity: high
  technologies:
    lang: [python]
    framework: [pytest, github, linear]
  domains:
    domain: [sacada, squad_lead, progress_tracking]
    concern: [artifact_status, progress_measurement, antipatterns]
  example_good: |
    # Sprint artifact checklist — binary status, zero ambiguity
    SPRINT_ARTIFACTS = {
        "src/veritas/core/models.py":    {"test": "pytest tests/test_models.py",    "status": "DONE"},
        "src/veritas/core/validator.py": {"test": "pytest tests/test_validator.py", "status": "NOT_DONE"},
        "src/veritas/api/endpoints.py":  {"test": "pytest tests/test_endpoints.py", "status": "NOT_DONE"},
    }
    done_count = sum(1 for v in SPRINT_ARTIFACTS.values() if v["status"] == "DONE")
    # Report: 1 of 3 artifacts complete. Not "33% done". Not "making good progress."
  example_bad: |
    status_update = {
        "models":    "80% done, working on edge cases",
        "validator": "started, making good progress",
        "endpoints": "researching best approach",
        # None of these tell you if a single artifact exists in testable form
    }
  when_applies: "Every sprint with measurable deliverables, for any team size or task type."
  sources:
    - "Pragmatic Engineer — Leading Effective Engineering Teams: https://newsletter.pragmaticengineer.com/p/leading-effective-engineering-teams"
    - "CLAUDE.md Brains — Atomic WP system and artifact-based completion tracking"
    - "Atlassian — Sprint Planning: https://www.atlassian.com/agile/scrum/sprint-planning"

- id: SQL-007
  text: >
    When estimating sprint velocity for agent-executed tasks, use three-point estimation
    with an explicit uncertainty multiplier. Formula: expected = (O + 4*M + P) / 6, then
    multiply by 1.5 for novel tasks, 1.2 for familiar, 1.0 only for exact-precedent tasks.
    Agent tasks have higher variance than human tasks — they can be 10x faster or 10x
    slower than expected depending on context quality.
  why: >
    Agent tasks (LLM-based code generation, analysis) have fundamentally different variance
    profiles than human tasks. A human can estimate "write this function" within plus or
    minus 20%. An agent can complete the same function in 30 seconds or spend 20 minutes
    iterating depending on context quality, prompt clarity, and model behavior on that
    specific input. Single-point estimates for agent tasks produce plans that are
    systematically overoptimistic. Three-point estimation with uncertainty multipliers
    captures the fat tail of agent performance variance.
  how_to_do_right: |
    1. For each task, estimate O (optimistic), M (most likely), P (pessimistic) in minutes.
    2. Expected = (O + 4*M + P) / 6  (PERT formula)
    3. Apply uncertainty multiplier:
       Novel task (no precedent): multiply by 1.5
       Familiar task (similar done before): multiply by 1.2
       Exact precedent (identical task done before): multiply by 1.0
    4. Sprint capacity = sum(adjusted_expected) <= available_minutes * 0.70 (30% buffer)
    5. If total > capacity: cut non-critical-path tasks with the most slack first.
    6. Track actual vs estimate per task — recalibrate multipliers from real data quarterly.
  severity: medium
  technologies:
    lang: [python]
    framework: [langgraph, crewai]
  domains:
    domain: [sacada, squad_lead, estimation]
    concern: [velocity, sprint_planning, uncertainty]
  example_good: |
    def estimate_task(optimistic: float, most_likely: float, pessimistic: float,
                      novelty: str) -> float:
        pert = (optimistic + 4 * most_likely + pessimistic) / 6
        multipliers = {"novel": 1.5, "familiar": 1.2, "exact_precedent": 1.0}
        return pert * multipliers[novelty]

    estimates = [
        estimate_task(10, 20, 60, "novel"),        # New domain: 23.3 * 1.5 = 34.9 min
        estimate_task(5, 10, 20, "familiar"),      # Done before: 10.8 * 1.2 = 13.0 min
        estimate_task(2, 3, 5, "exact_precedent"), # Exact match: 3.2 * 1.0 = 3.2 min
    ]
    total = sum(estimates)  # 51.1 min
    capacity = available_min * 0.70  # 30% buffer always reserved
  example_bad: |
    # Single-point gut-feel estimates — systematically wrong for agent tasks
    tasks = [
        {"name": "implement_validator", "estimate_min": 20},  # Usually 45-90 min for novel domain
        {"name": "write_tests", "estimate_min": 10},          # Usually 20-40 min with edge cases
    ]
    # Sprint consistently runs 2x over — team loses confidence in sprint planning
  when_applies: "Every sprint planning session involving agent-executed tasks or novel work."
  sources:
    - "PERT Estimation Formula — Project Management Institute"
    - "Atlassian — Sprint Planning: https://www.atlassian.com/agile/scrum/sprint-planning"
    - "Lagrangian heuristic for sprint planning: https://www.sciencedirect.com/science/article/abs/pii/S0305054813002657"

- id: SQL-008
  text: >
    Delegate technical implementation decisions to the person or agent closest to the code.
    The squad lead makes: priority decisions, scope decisions, and resource decisions. The
    worker makes: implementation decisions, library choices, and internal design choices.
    A squad lead who makes technical implementation decisions removes ownership from the
    worker and becomes a bottleneck for every technical choice.
  why: >
    Technical decision centralization at the squad lead level creates three compounding
    problems: (1) the squad lead becomes a bottleneck — everything needs their approval;
    (2) the worker loses ownership and becomes an executor of someone else's design, with
    no investment in its quality; (3) the squad lead is usually further from implementation
    details than the worker and systematically makes worse technical choices. The specialist
    knows which library has a memory leak in version 2.3.1, which API has undocumented rate
    limits, and which approach breaks on an edge case not obvious from the spec. These
    insights only surface when the specialist owns the decision.
  how_to_do_right: |
    1. Define the decision taxonomy explicitly:
       SQUAD LEAD decides: priority, scope, resources, sprint goals, integration points.
       WORKER decides: implementation approach, library selection, internal design, test strategy.
    2. When a worker asks "how should I implement X?": provide constraints, not the answer.
       Good: "We need max 30s response time and Python 3.11 compatibility."
       Bad: "Use tenacity with @retry(stop=stop_after_attempt(3), wait=wait_exponential(min=1))."
    3. If a worker's technical choice creates a risk: discuss the risk — do not override the choice.
    4. Document that the worker made the decision — do not silently change it in review.
    5. Code reviews focus on: does it meet acceptance criteria? Not: would I have done it differently?
  severity: high
  technologies:
    lang: [python]
    framework: [github, linear]
  domains:
    domain: [sacada, squad_lead, delegation]
    concern: [decision_making, ownership, bottleneck_prevention]
  example_good: |
    # Worker: "Should I use Pydantic or dataclasses for the models?"
    # Squad lead response: "We need JSON serialization and runtime validation. Your call."
    # Worker chooses Pydantic — correct for the constraints. Worker owns the decision.

    # Worker: "How should I structure the retry logic?"
    # Squad lead response: "Max 3 retries, 30s hard timeout per attempt. Implementation is yours."
    # Worker chooses tenacity. Owns the implementation. Knows the edge cases.
  example_bad: |
    # Squad lead provides complete implementation spec — worker becomes a typist
    squad_lead_response = """
    Use tenacity with @retry(stop=stop_after_attempt(3), wait=wait_exponential(multiplier=1, min=1, max=30)).
    Import it at the top of the file. Handle TimeoutError separately from other exceptions.
    """
    # Worker implements exactly this. Squad lead is now the bottleneck for all technical decisions.
    # Worker has no ownership and does not invest in quality of design they did not choose.
  when_applies: "Any technical question from a worker that falls within their domain of responsibility."
  sources:
    - "The Engineering Manager — Delegation: https://www.theengineeringmanager.com/management-101/delegation/"
    - "Mastering Delegation for Tech Leads: https://medium.com/@obada/mastering-the-art-of-delegation-in-software-development-6f683537e640"
    - "A Tech Lead's Guide to Leadership 2025: https://justanothertechlead.com/leadership/leadership-in-software-engineering/"

- id: SQL-009
  text: >
    Identify scope creep at the task level before it reaches the sprint level. The rule:
    if implementing a task requires more than 2 unplanned artifacts, stop and re-scope.
    Workers must report unplanned artifacts as they discover them — not at review time.
    Silent scope expansion by workers is a squad lead communication failure.
  why: >
    Scope creep never announces itself as "we are adding requirements." It arrives as
    "I realized I also need X to make this work." Each individual addition seems reasonable;
    the cumulative effect is a sprint 40% over capacity. The threshold of 2 unplanned
    artifacts is a production heuristic: 1 unplanned artifact (a helper function, a config
    file) is normal implementation discovery; 3+ unplanned artifacts indicates the original
    task was too broadly scoped and requires re-decomposition, not silent absorption.
  how_to_do_right: |
    1. Workers must report unplanned artifacts immediately — not at review time.
    2. Trigger a re-scope meeting when: unplanned_artifacts >= 2 OR time_spent > 2x estimate.
    3. At re-scope: classify each unplanned artifact:
       NECESSARY_FOR_ACCEPTANCE: must be in this sprint
       NICE_TO_HAVE: defer to next sprint
       OUT_OF_SCOPE: create a separate ticket immediately
    4. Update sprint capacity after re-scope — adjust deadlines or cut other tasks.
    5. Never silently absorb unplanned artifacts — every addition is a trade-off, not a free addition.
  severity: high
  technologies:
    lang: [python]
    framework: [linear, jira, github]
  domains:
    domain: [sacada, squad_lead, scope_management]
    concern: [scope_creep, sprint_capacity, work_discovery]
  example_good: |
    # Worker discovers 3 helper modules are needed mid-task
    worker.report_scope_discovery({
        "task_id": "WP-042",
        "unplanned_artifacts": [
            {"file": "src/utils/token_counter.py",  "classification": "NECESSARY"},
            {"file": "src/utils/prompt_builder.py", "classification": "NECESSARY"},
            {"file": "src/utils/cache.py",          "classification": "NICE_TO_HAVE"},
        ],
    })
    # Squad lead re-scopes: first 2 added to sprint (NECESSARY), cache deferred to next sprint
    # Sprint capacity updated accordingly — no silent absorption
  example_bad: |
    # Worker silently implements 6 extra modules "because they were needed"
    # Sprint review: "I also added caching, logging, metrics, retry utils, prompt builders,
    #  and a config loader because they were all interconnected."
    # Sprint is now 80% over capacity. Squad lead learns at demo.
  when_applies: "Any task where the worker discovers unplanned work during implementation."
  sources:
    - "Growing Scrum Masters — Agile Work Decomposition: https://www.growingscrummasters.com/keywords/agile-work-decomposition/"
    - "Blueprintsys — Feature Decomposition: https://www.blueprintsys.com/blog/automatic-feature-decomposition-surprising-way-ensure-agile-project-success"
    - "Scrum.org — Dependency Management: https://www.scrum.org/resources/blog/dependency-management-good-bad-ugly"

- id: SQL-010
  text: >
    Run code reviews as knowledge transfer, not gatekeeping. Every review comment must
    cite a specific acceptance criterion, security rule, or integration contract. Personal
    style preference labeled as BLOCKING is a squad lead antipattern that demoralizes
    workers and creates review bottlenecks without improving output quality.
  why: >
    The fastest path to a stalled code review culture is a squad lead who returns PRs
    with comments like "I would have done this differently" when both approaches are
    correct. This trains workers to write code that looks like the squad lead wrote it
    rather than code that meets the acceptance criteria — cargo-culting style over
    substance. Code reviews are valuable for: correctness (does it meet criteria?),
    security (does it introduce vulnerabilities?), and integration (does it break contracts?).
    Personal style preference is noise that degrades the signal-to-noise ratio of reviews.
  how_to_do_right: |
    1. Define review checklist tied to acceptance criteria — not personal style:
       tests pass, linter clean, meets WP acceptance criteria, no security issues, no contract violations.
    2. Every BLOCKING comment must cite: a specific acceptance criterion, security rule, or contract.
       Good: "This violates the 30s hard timeout in WP-042 acceptance criteria."
       Bad: "I would use a list comprehension here."
    3. Distinguish BLOCKING (must fix) from OPTIONAL (suggestion). Label explicitly.
    4. Approve PRs that meet acceptance criteria even if you would have written them differently.
    5. If you want to teach a better approach: add an OPTIONAL comment with the why, not a block.
  severity: medium
  technologies:
    lang: [python]
    framework: [github, gitlab]
  domains:
    domain: [sacada, squad_lead, code_review]
    concern: [review_process, gatekeeping, knowledge_transfer]
  example_good: |
    # BLOCKING comment: cites specific criterion, actionable
    review_comment = {
        "type": "BLOCKING",
        "line": 42,
        "text": "This function has no timeout. WP-042 acceptance criterion requires "
                "hard timeout of 30s. See AGENT_TIMEOUTS config for the pattern.",
        "criterion": "WP-042: function must respect 30s hard timeout",
    }

    # OPTIONAL comment: teaching without blocking
    review_comment_optional = {
        "type": "OPTIONAL",
        "line": 55,
        "text": "[optional] Consider using a list comprehension here — same result, "
                "more Pythonic. No need to change for this PR.",
    }
  example_bad: |
    # BLOCKING comment: just style preference, no criterion cited — blocks PR for no quality reason
    review_comment = {
        "type": "BLOCKING",
        "line": 42,
        "text": "I prefer using a class here instead of a function.",
        # Worker is blocked by squad lead's preference. PR waits. Sprint delays.
    }
  when_applies: "Every code review in any sprint, for agent-generated or human-generated code."
  sources:
    - "Pragmatic Engineer — Leading Effective Engineering Teams: https://newsletter.pragmaticengineer.com/p/leading-effective-engineering-teams"
    - "6 Key Skills for Leading a Software Team: https://www.shortcut.com/blog/6-key-skills-for-leading-a-software-team"
    - "Lumenalta — Best Practices for Leading a Development Team: https://lumenalta.com/insights/7-best-practices-for-leading-a-software-development-team"

- id: SQL-011
  text: >
    Coordinate cross-squad interface changes with a 24-hour notification and response
    window. Upstream squad notifies downstream 24 hours before a shared interface changes;
    downstream has 24 hours to accept or object. After 24 hours: the change is locked and
    proceeds. Without this protocol, upstream changes silently break downstream work that
    was built against the old interface.
  why: >
    Interface changes between squads are the highest-leverage source of rework in parallel
    development. The upstream squad makes what seems like a minor internal change; the
    downstream squad was building against the old interface; integration day reveals 3 days
    of parallel work built on incompatible assumptions. The 24-hour notification window is
    not bureaucracy — it is the minimum time for downstream squads to assess impact and
    negotiate if needed. The alternative is silent incompatibility discovered at merge time,
    which is always more expensive to fix.
  how_to_do_right: |
    1. Define all cross-squad interfaces explicitly (Pydantic models, OpenAPI specs).
    2. Any proposed change to a cross-squad interface triggers a CHANGE_NOTICE:
       What is changing, old contract, new contract, reason, effective time.
    3. 24-hour window for downstream squads: ACCEPT, OBJECT with technical reason, or REQUEST_MEETING.
    4. No response within 24h = ACCEPTED by default.
    5. If downstream OBJECTS: hold a 30-minute synchronous resolution meeting, not email chains.
    6. Document all interface changes in the integration contract changelog.
    7. Integration test from SQL-005 runs against both versions during the transition window.
  severity: high
  technologies:
    lang: [python]
    framework: [pydantic, openapi, github]
  domains:
    domain: [sacada, squad_lead, cross_squad_coordination]
    concern: [integration_management, interface_changes, handshake_protocol]
  example_good: |
    # Upstream squad sends structured CHANGE_NOTICE before committing
    change_notice = {
        "interface": "PaymentGatewayContract",
        "version_from": "v1.0.0",
        "version_to": "v1.1.0",
        "change": {"from": {"amount": "float"}, "to": {"amount_cents": "int"}},
        "reason": "Float precision causes rounding errors in accounting reconciliation",
        "effective_after": "2026-02-20T00:00:00Z",
        "respond_by": "2026-02-19T00:00:00Z",  # 24-hour window
    }
    notify_downstream_squads(change_notice)
  example_bad: |
    # Upstream commits interface change without notification
    # Commit: "refactor: use cents instead of float for payment amount"
    # Downstream discovers it 3 days later when their tests fail on main
    # 3 days of work partially invalidated — avoidable with a 30-second notification
  when_applies: "Any cross-squad interface change in a multi-squad parallel development sprint."
  sources:
    - "Managing Cross-team Dependencies — Nick Tune: https://medium.com/nick-tune-tech-strategy-blog/managing-and-eliminating-cross-team-dependencies-d44ff859bf84"
    - "Easy Agile — Dependencies Management: https://www.easyagile.com/blog/dependencies-management"
    - "Asana — Understanding Dependencies: https://asana.com/resources/project-dependencies"

- id: SQL-012
  text: >
    Identify per-task risks by scoring three dimensions: SEVERITY (how bad if this fails),
    PROBABILITY (how likely is failure or 3x overrun), and DETECTION_DELAY (how long until
    you know it failed). Risk score = SEVERITY * PROBABILITY * DETECTION_DELAY. Tasks with
    score > 20 require mandatory mitigation before the sprint starts.
  why: >
    Most sprint risk assessments happen at sprint level ("this sprint is risky") not task
    level ("WP-042 is risky because it uses a new LLM API and we won't know if it works
    until integration day"). Task-level risk analysis enables targeted mitigation: spike,
    fallback plan, early integration test, senior assignment. Sprint-level risk assessment
    enables only one mitigation: add buffer time. Per-task risk analysis is more specific
    and produces more targeted and effective mitigation strategies.
  how_to_do_right: |
    1. For every task, score three dimensions on a 1-5 scale:
       SEVERITY: if this fails, how bad is the sprint outcome? (1=minor, 5=sprint blocked)
       PROBABILITY: how likely is this to fail or take 3x longer? (1=routine, 5=novel/unknown)
       DETECTION_DELAY: how long until failure is known? (1=same day, 5=integration day)
    2. Risk score = SEVERITY * PROBABILITY * DETECTION_DELAY.
    3. Score > 20: mandatory mitigation before sprint starts.
    4. Mitigation options (in effectiveness order):
       a. Timebox a spike on Day 1 to de-risk the unknown element.
       b. Build an explicit fallback plan before the sprint starts.
       c. Move the task earlier to maximize recovery time if it fails.
       d. Assign to the most experienced agent/worker for this specific domain.
    5. Document risks and mitigations in the sprint plan — revisit at the midpoint check-in.
  severity: high
  technologies:
    lang: [python]
    framework: [linear, github]
  domains:
    domain: [sacada, squad_lead, risk_management]
    concern: [risk_identification, mitigation, sprint_planning]
  example_good: |
    task_risks = [
        {
            "task": "integrate_new_payment_api",
            "severity": 5,         # Blocks entire checkout feature if fails
            "probability": 4,      # New API, no team experience with it
            "detection_delay": 5,  # Only know at integration test, 2 days before deadline
            "score": 100,          # Must mitigate before sprint starts
            "mitigation": "1-day spike on Day 1 to validate API auth and basic transaction flow",
        },
    ]
    must_mitigate = [t for t in task_risks if t["score"] > 20]
    # Address each before sprint kickoff — not when the failure happens
  example_bad: |
    # No per-task risk analysis — sprint starts, new API fails at integration
    sprint_plan = ["implement_checkout", "write_tests", "integrate_payment_api"]
    # No spike, no fallback, no early integration test
    # Crisis discovered 2 days before deadline — entirely avoidable
  when_applies: "Every sprint planning session with tasks involving external dependencies, new technologies, or novel implementations."
  sources:
    - "ProjectManagement.com — Mastering Delegation and Risk Management: https://www.projectmanagement.com/blog-post/77944/mastering-delegation--the-key-to-high-performance-teams-and-sustainable-success"
    - "Lumenalta — Best Practices for Leading a Software Development Team: https://lumenalta.com/insights/7-best-practices-for-leading-a-software-development-team"
    - "Waydev — Software Development Team Management: https://waydev.co/software-development-team-management/"

- id: SQL-013
  text: >
    When delegating to a specialist, provide: what must be achieved, what constraints apply,
    what the output must satisfy. Withhold: how to implement it. A squad lead who provides
    the full implementation approach has used the specialist as a typist, systematically
    choosing worse solutions than the specialist would choose from their domain knowledge.
  why: >
    A specialist's value is in domain knowledge the squad lead does not have. When the
    squad lead provides the implementation, they choose solutions based on general knowledge
    — the specialist would have chosen better solutions from their specific expertise.
    The specialist knows which library has a memory leak in version 2.3.1, which API has
    undocumented rate limits, and which approach breaks on an edge case not visible from
    the spec. These insights only surface when the specialist owns the decision. Providing
    the solution is the most expensive way to use a specialist.
  how_to_do_right: |
    1. Delegation packet for specialists: WHAT (outcome), CONSTRAINTS (non-negotiables), WHY (business reason).
       Include: performance budget, compatibility requirements, interface contract, security requirements.
       Exclude: library choice, internal structure, implementation approach, algorithm.
    2. Require a 2-3 sentence design doc from the specialist before implementation begins.
       This catches misalignment early without prescribing the solution.
    3. Review specialist's proposed approach against constraints only — not personal preference.
    4. If approach violates a constraint: explain the constraint, not the alternative approach.
    5. Trust the specialist's domain judgment. Intervene only when constraints are violated.
  severity: medium
  technologies:
    lang: [python]
    framework: [github, linear]
  domains:
    domain: [sacada, squad_lead, delegation]
    concern: [specialist_delegation, knowledge_leverage, ownership]
  example_good: |
    # Correct delegation to security specialist
    delegation = {
        "what": "Implement authentication for the API endpoints",
        "constraints": [
            "Must support JWT with RS256 signing (SOC2 requirement)",
            "Token expiry maximum 1 hour",
            "Must integrate with existing User model at src/models.py::User",
        ],
        "why": "SOC2 Type II audit requires asymmetric key signing for JWT",
        # Library choice, middleware pattern, token storage: specialist's decision
    }
    # Specialist chooses python-jose + RS256. Knows HS256 is weaker and why it matters.
  example_bad: |
    delegation = {
        "what": "Add JWT auth using python-jose with HS256, add @require_auth decorator "
                "to all routes, use functools.wraps, store secret in JWT_SECRET env var",
        # Specialist knows HS256 is weaker than RS256 but was not asked for their opinion
        # Specialist is now a typist — implements the squad lead's suboptimal design
    }
  when_applies: "Any task delegated to a specialist (security, database, performance, ML, cryptography, etc.)."
  sources:
    - "The Engineering Manager — Delegation: https://www.theengineeringmanager.com/management-101/delegation/"
    - "ProjectManagement.com — Mastering Delegation: https://www.projectmanagement.com/blog-post/77944/mastering-delegation--the-key-to-high-performance-teams-and-sustainable-success"
    - "Medium — Mastering Delegation for Tech Leads: https://medium.com/@obada/mastering-the-art-of-delegation-in-software-development-6f683537e640"

- id: SQL-014
  text: >
    Decompose work through a three-level hierarchy: Epic (outcome), Story (user-facing
    behavior), Task (single implementable artifact). Never assign Epics directly to workers.
    Never let work remain at Story level at implementation time — a Story becomes Tasks
    with explicit acceptance criteria and dependencies before any implementation begins.
  why: >
    Epics assigned directly to agents or workers produce wildly inconsistent scope
    interpretation. "Implement authentication" has been interpreted as everything from
    a single JWT verification function to a full OAuth2 server with an admin UI,
    depending on the implementer's assumptions. The three-level decomposition makes
    scope interpretation impossible at the Task level: each Task has one artifact, one test,
    and one DONE definition. There is no room for scope interpretation when those three
    things are specified.
  how_to_do_right: |
    1. Epic: "Users can securely authenticate" — no implementation details.
    2. Story: "User logs in with email/password and receives a JWT" — behavior only.
    3. Tasks derived from the Story:
       T-001: implement User.verify_password() — 1 function, 1 test
       T-002: implement create_jwt_token() — 1 function, 1 test
       T-003: implement POST /auth/login — 1 route, 1 integration test, deps=[T-001, T-002]
       T-004: write error cases — 3 tests, dep=[T-003]
    4. Decomposition complete when each Task has: 1 artifact, 1 test, explicit dependencies.
    5. Never start implementation until all Tasks for a Story are defined — gaps surface during decomposition.
  severity: high
  technologies:
    lang: [python]
    framework: [pytest, fastapi, linear]
  domains:
    domain: [sacada, squad_lead, task_decomposition]
    concern: [decomposition_hierarchy, scope_clarity, implementability]
  example_good: |
    epic = "Users can securely authenticate"
    story = "User logs in with email/password and receives JWT"
    tasks = [
        {"id": "T-001", "artifact": "User.verify_password()", "test": "test_verify_password", "deps": []},
        {"id": "T-002", "artifact": "create_jwt_token()", "test": "test_create_jwt", "deps": []},
        {"id": "T-003", "artifact": "POST /auth/login route", "test": "test_login_endpoint", "deps": ["T-001", "T-002"]},
        {"id": "T-004", "artifact": "3 error case tests", "test": "test_login_errors", "deps": ["T-003"]},
    ]
    # Each task: 1 artifact, 1 test, explicit dependency. No ambiguity. No interpretation required.
  example_bad: |
    task = {
        "id": "T-001",
        "description": "Implement authentication",  # Epic level, not Task level
        # Worker A: implements 1 JWT function.
        # Worker B: implements full OAuth2 server with admin UI.
        # Both are "correct" interpretations of an Epic assigned as a Task.
    }
  when_applies: "Every sprint with features not previously fully decomposed to the Task level."
  sources:
    - "Scrum.org — Planning and Decomposing Tasks: https://www.scrum.org/forum/scrum-forum/15817/scrum-planning-and-decomposing-task"
    - "Growing Scrum Masters — Agile Work Decomposition: https://www.growingscrummasters.com/keywords/agile-work-decomposition/"
    - "Atlassian — Sprint Planning: https://www.atlassian.com/agile/scrum/sprint-planning"

- id: SQL-015
  text: >
    When cutting scope to hit a deadline, cut using dependency-aware priority order: keep
    critical-path tasks and their tests complete; defer non-critical tasks with the most
    slack first. Never cut integration tests for features you are keeping. A system with
    70% of features implemented and fully tested is always better than 100% of features
    implemented and 0% tested.
  why: >
    Scope cuts under deadline pressure almost always happen in the wrong order: tests and
    integration work get cut because they seem optional while features seem mandatory. This
    produces a system that appears 100% complete but is actually unverified — production
    failures discovered after tests were cut are 10-100x more expensive to diagnose and
    fix than failures caught by the integration tests that were removed. The correct cut
    order is never: features before tests. The correct cut order is: non-critical features
    before anything that is already tested.
  how_to_do_right: |
    1. Run the dependency graph analysis when cuts are needed (from SQL-002).
    2. Identify all non-critical-path tasks with slack >= cut_target_days.
    3. Cut tasks with the most slack first — they have least impact on deadline.
    4. For each candidate cut: verify no critical-path task depends on it. If yes: cannot cut.
    5. Never cut: integration tests for kept features, acceptance tests for kept WPs,
       error handling for any production execution path.
    6. Every cut creates a deferred ticket immediately — not "someday maybe."
    7. Document each cut: what was cut, why, user impact, target sprint for reinstatement.
  severity: high
  technologies:
    lang: [python]
    framework: [pytest, linear, github]
  domains:
    domain: [sacada, squad_lead, scope_management]
    concern: [scope_cut, deadline_management, quality_preservation]
  example_good: |
    # 2 days behind deadline — must cut 2 days of work
    tasks_with_slack = [
        {"id": "T-010", "slack_days": 3, "critical_deps": []},       # Can cut safely
        {"id": "T-011", "slack_days": 2, "critical_deps": ["T-010"]}, # Can cut with T-010
        {"id": "T-012", "slack_days": 0, "critical_deps": []},        # CANNOT cut — critical path
    ]
    # Cut T-010 and T-011 (saving 2 days) — all kept features retain full test coverage
    # Create deferred tickets for T-010 and T-011 immediately for next sprint
  example_bad: |
    # Deadline pressure: cut tests to "ship the feature faster"
    sprint_plan.remove("test_login")           # "We'll add tests next sprint"
    sprint_plan.remove("integration_test_auth") # "We'll validate in production"
    # Feature ships. Production incident 3 days later catches what integration_test_auth would have caught.
    # Root cause: edge case in login flow. Cost: 2x engineering time + customer trust.
  when_applies: "Any sprint where scope must be reduced due to timeline constraints."
  sources:
    - "Scrum.org — Eliminate Dependencies: https://www.scrum.org/resources/blog/eliminate-dependencies-dont-manage-them"
    - "Atlassian — Sprint Planning: https://www.atlassian.com/agile/scrum/sprint-planning"
    - "Pragmatic Engineer — Leading Effective Engineering Teams: https://newsletter.pragmaticengineer.com/p/leading-effective-engineering-teams"
