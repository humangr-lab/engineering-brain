layer: rules
technology: General
domain: code_quality
knowledge:
- id: CR-CQ-001
  text: Keep pull requests under 400 lines of changed code — smaller PRs get better reviews
  why: Research (SmartBear, Microsoft) shows review effectiveness drops sharply above 400 lines. Reviewers spend roughly the
    same amount of time on 100-line and 1000-line PRs — meaning large PRs get superficial reviews. Bugs in large PRs are 4x
    more likely to reach production. Small PRs also reduce merge conflict risk and simplify rollbacks.
  how_to_do_right: '1. Target 200-400 lines of changed code per PR (excluding generated files and tests).

    2. Split large features into stacked PRs: data model → business logic → API → UI.

    3. Use feature flags to merge incomplete features safely.

    4. If a PR exceeds 400 lines, ask: ''Can this be split without breaking the build?''

    5. Refactoring PRs should be separate from behavior-change PRs.

    6. Auto-generated code (migrations, snapshots) does not count toward the limit.

    '
  severity: high
  technologies:
    platform: [git, github, gitlab]
  domains:
    domain: [quality, operations, devops]
    concern: [code]
  example_good: '# Feature: User notification preferences

    # Split into 3 stacked PRs:


    # PR #1 (120 lines): Data model + migration

    # - Add notification_preferences table

    # - Add migration

    # - Add Pydantic model


    # PR #2 (180 lines): Business logic + tests

    # - NotificationPreferenceService

    # - Unit tests (80% coverage)


    # PR #3 (150 lines): API endpoints + integration tests

    # - GET/PUT /api/v1/users/me/notifications

    # - Integration tests


    # Each PR is independently reviewable and deployable

    '
  example_bad: '# PR #1 (2,400 lines): "Add notification preferences feature"

    # Contains: migration, models, service, API, UI components, tests, config changes

    # Reviewer comment at 11pm: "LGTM" (did not actually review 2,400 lines)

    # Bug ships to production because reviewer glazed over line 1,847

    '
  when_applies: Projects using Git, GitHub, or GitLab
  when_not_applies: local development only, throwaway experiments
  sources: ["https://smartbear.com/learn/code-review/best-practices-for-peer-code-review/"]
- id: CR-CQ-002
  text: Focus code review on logic, security, and edge cases — automate style enforcement
  why: 'Human attention in code review is expensive and limited. Spending review cycles on indentation, naming conventions,
    and import order wastes this scarce resource. Linters and formatters handle style perfectly and consistently. Reviewers
    should focus on what machines cannot check: correctness, security implications, architectural fit, and edge case handling.'
  how_to_do_right: '1. Automate style: Prettier/Black for formatting, ESLint/Ruff for linting, isort for imports.

    2. Run automated checks in CI — block merge on failures, not in review comments.

    3. Review checklist: Does the logic handle null/empty/error cases? Are there security implications? Is the error handling
    complete? Does it match the spec?

    4. Comments should be actionable: ''This query is vulnerable to N+1 — use join or DataLoader'' not ''consider optimizing''.

    5. Classify comments: Blocking (must fix), Suggestion (nice to have), Question (seeking understanding).

    6. Approve with suggestions when only non-blocking issues remain.

    '
  severity: high
  technologies:
    lang: [python]
    framework: [linting, eslint, prettier, ruff, black]
    platform: [git, github]
  domains:
    domain: [quality, security]
    concern: [code]
  example_good: '# Good review comment — focuses on logic and security

    # Reviewer on line 42:

    # [BLOCKING] This endpoint accepts user_id from the request body but

    # doesn''t verify the authenticated user owns this resource. An attacker

    # can modify any user''s preferences by changing the user_id.

    #

    # Suggestion:

    #   async def update_preferences(prefs: PrefsUpdate, user: User = Depends(get_current_user)):

    #       await service.update(user.id, prefs)  # use authenticated user''s ID


    # Good review comment — focuses on edge case

    # [SUGGESTION] What happens if the user has no existing preferences?

    # Line 58: `existing = await repo.get(user_id)` — if None, line 61

    # `existing.merge(new_prefs)` will raise AttributeError.

    '
  example_bad: '# Bad review — all style comments that linters should catch

    # Line 5: "Please add a blank line here"

    # Line 12: "Use double quotes not single quotes"

    # Line 23: "This import should be above the other one"

    # Line 45: "Add a trailing comma"

    # Line 67: "Rename to snake_case"

    # Result: 5 style comments, 0 logic/security/edge case comments

    # The actual bug on line 89 (missing null check) goes unnoticed

    '
  when_applies: Projects using Git, GitHub, ESLint, or Prettier
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities
  sources: ["https://google.github.io/eng-practices/review/reviewer/looking-for.html"]
- id: CR-CQ-003
  text: Authors must self-review their own PR before requesting reviews
  why: Self-review catches 30-50% of issues before other reviewers spend time on them. Reading your own diff as a reviewer
    — not as the author who wrote it — reveals obvious mistakes, missing tests, debug code left behind, and unclear naming.
    It is the highest-ROI quality practice and shows respect for reviewers' time.
  how_to_do_right: '1. Before clicking ''Request Review'', open the PR diff and read every line as if someone else wrote it.

    2. Check: no debug statements, no TODO/FIXME without tickets, no commented-out code.

    3. Check: PR description explains WHY, not just WHAT. Link to the ticket.

    4. Check: all tests pass locally, new code has tests, edge cases are covered.

    5. Add inline comments on your own PR to guide reviewers through complex sections.

    6. If you find issues during self-review, fix them before requesting review.

    '
  severity: medium
  technologies:
    platform: [git, github, gitlab]
  domains:
    domain: [quality]
    concern: [code]
  example_good: "# PR description after self-review:\n## Summary\nAdd rate limiting to the login endpoint to prevent brute\
    \ force attacks.\nImplements: TICKET-1234\n\n## Changes\n- Added `RateLimiter` middleware with sliding window algorithm\n\
    - Login endpoint: 5 attempts per 15 minutes per IP\n- Returns 429 with Retry-After header when rate limited\n\n## Self-review\
    \ notes\n- I considered using Redis for distributed rate limiting but our current\n  deployment is single-instance. Added\
    \ TODO(TICKET-1235) for Redis migration.\n- The sliding window uses `time.monotonic()` — not affected by clock drift.\n\
    - Edge case: I tested with IPv6 addresses and X-Forwarded-For chains.\n\n## Test plan\n- [x] Unit tests for RateLimiter\
    \ (window expiry, boundary, concurrent)\n- [x] Integration test for login endpoint rate limiting\n- [x] Manual test: verified\
    \ 429 response and Retry-After header\n"
  example_bad: '# PR description: "fix login"

    # No self-review performed

    # Diff includes:

    #   print("DEBUG: password =", password)  # debug statement left in

    #   # import pdb; pdb.set_trace()          # commented-out debugger

    #   TODO: add rate limiting                # unfiled TODO

    #   response = requests.get(url, verify=False)  # SSL verification disabled

    # Reviewer has to catch all of these

    '
  when_applies: Projects using Git, GitHub, or GitLab
  sources: ["https://google.github.io/eng-practices/review/developer/"]
- id: CR-CQ-004
  text: Use intention-revealing names — variable and function names should explain their purpose without comments
  why: Code is read 10x more than it is written. Cryptic names (d, tmp, data, x) force every reader to reverse-engineer the
    author's intent. Good names are the cheapest form of documentation and they never go stale. A well-named function needs
    no comment; a poorly named function needs a paragraph.
  how_to_do_right: '1. Variables: name reveals the content and type (user_count, is_active, retry_delay_seconds).

    2. Functions: name reveals the action and return type (calculate_total, is_eligible, fetch_user_by_email).

    3. Booleans: prefix with is_, has_, can_, should_ (is_valid, has_permission, can_retry).

    4. Collections: use plural or collection suffix (users, email_list, order_map).

    5. Avoid abbreviations unless universally understood (id, url, api — OK; usr, cnt, mgr — NOT OK).

    6. If you need a comment to explain a name, the name is wrong.

    '
  severity: high
  technologies:
    lang: [python, javascript, typescript, general]
  domains:
    domain: [quality]
    concern: [code]
  example_good: "# Names explain themselves — no comments needed\ndef calculate_shipping_cost(\n    package_weight_kg: float,\n\
    \    destination_country: str,\n    is_express_delivery: bool = False,\n) -> Decimal:\n    base_rate_per_kg = get_rate(destination_country)\n\
    \    express_multiplier = Decimal(\"1.5\") if is_express_delivery else Decimal(\"1.0\")\n    return (base_rate_per_kg\
    \ * Decimal(str(package_weight_kg)) * express_multiplier).quantize(Decimal(\"0.01\"))\n\n# Usage reads like English\n\
    shipping_cost = calculate_shipping_cost(\n    package_weight_kg=2.5,\n    destination_country=\"DE\",\n    is_express_delivery=True,\n\
    )\n"
  example_bad: "# What does any of this mean?\ndef calc(w, c, e=False):\n    r = get_r(c)\n    m = 1.5 if e else 1.0\n   \
    \ return r * w * m\n\n# Usage is cryptic\nx = calc(2.5, \"DE\", True)\n# Reader must read the function body to understand\
    \ every call site\n"
  when_applies: Projects using Python codebases, JavaScript/TypeScript projects, TypeScript projects with static typing, or
    General
  sources: ["https://martinfowler.com/bliki/TwoHardThings.html"]
- id: CR-CQ-005
  text: Each function should operate at a single level of abstraction
  why: Functions that mix high-level orchestration with low-level details are hard to understand, test, and modify. When you
    read a function, you should not have to switch between thinking about business logic and parsing SQL strings. Functions
    at a consistent abstraction level read like a story and each piece is independently testable.
  how_to_do_right: '1. If a function does A then B then C, each step should be a function call at the same abstraction level.

    2. Extract low-level operations into helper functions with descriptive names.

    3. Rule of thumb: if you cannot describe what a function does in one sentence, it operates at mixed levels.

    4. High-level functions orchestrate; low-level functions compute. Do not mix.

    5. Test each level independently — high-level tests mock the low-level functions.

    '
  severity: medium
  technologies:
    lang: [python, javascript, typescript, general]
  domains:
    domain: [quality]
    concern: [code]
  example_good: "# High-level function — one level of abstraction (orchestration)\nasync def process_order(order: Order) ->\
    \ OrderResult:\n    validated_order = validate_order(order)\n    payment_result = await charge_payment(validated_order)\n\
    \    inventory_result = await reserve_inventory(validated_order)\n    confirmation = await send_confirmation_email(validated_order,\
    \ payment_result)\n    return OrderResult(\n        order_id=validated_order.id,\n        payment_id=payment_result.id,\n\
    \        confirmation_sent=confirmation.success,\n    )\n\n# Low-level function — single responsibility\ndef validate_order(order:\
    \ Order) -> ValidatedOrder:\n    if not order.items:\n        raise ValidationError(\"Order must contain at least one\
    \ item\")\n    if order.total <= 0:\n        raise ValidationError(\"Order total must be positive\")\n    return ValidatedOrder(**order.dict(),\
    \ validated_at=utcnow())\n"
  example_bad: "# Mixed abstraction levels — orchestration + SQL + string formatting + error handling\nasync def process_order(order):\n\
    \    # Validate (low-level detail inline)\n    if len(order[\"items\"]) == 0:\n        return {\"error\": \"no items\"\
    }\n    total = sum(i[\"price\"] * i[\"qty\"] for i in order[\"items\"])\n\n    # Payment (low-level HTTP call inline)\n\
    \    resp = requests.post(\"https://pay.example.com/charge\", json={\"amount\": total})\n    if resp.status_code != 200:\n\
    \        return {\"error\": \"payment failed\"}\n\n    # Inventory (raw SQL inline)\n    for item in order[\"items\"]:\n\
    \        await db.execute(f\"UPDATE inventory SET stock = stock - {item['qty']} WHERE sku = '{item['sku']}'\")\n\n   \
    \ # Email (string formatting inline)\n    email_body = f\"Dear {order['name']},\\nYour order #{order['id']} for ${total:.2f}\
    \ is confirmed.\"\n    smtp.send(order[\"email\"], \"Order Confirmed\", email_body)\n"
  when_applies: Projects using Python codebases, JavaScript/TypeScript projects, TypeScript projects with static typing, or
    General
  sources: ["https://refactoring.guru/refactoring/techniques/composing-methods"]
- id: CR-CQ-006
  text: Delete dead code immediately — never comment it out 'just in case'
  why: 'Commented-out code is noise that confuses every future reader. They ask: ''Is this important? Should I uncomment it?
    Is it a TODO?'' Version control preserves every line ever written — there is zero risk of losing code by deleting it.
    Commented-out code also rots: it does not get updated when surrounding code changes, so it would not work even if uncommented.'
  how_to_do_right: '1. Delete, do not comment out. Git history preserves everything.

    2. If code might be needed in the future, create a ticket/issue referencing the commit hash.

    3. Remove unused imports, unreachable branches, and unused parameters.

    4. Set up dead code detection in CI (vulture for Python, ts-prune for TypeScript).

    5. During code review, flag any commented-out code as a blocking issue.

    6. Exception: temporary debugging code with a TODO(TICKET-XXX) and a specific removal date.

    '
  severity: medium
  technologies:
    lang: [python, javascript, typescript, general]
  domains:
    domain: [quality]
    concern: [code]
  example_good: "# Clean: only code that is actually used\ndef calculate_discount(price: Decimal, tier: CustomerTier) -> Decimal:\n\
    \    \"\"\"Apply tier-based discount.\"\"\"\n    discount_rates = {\n        CustomerTier.BRONZE: Decimal(\"0.05\"),\n\
    \        CustomerTier.SILVER: Decimal(\"0.10\"),\n        CustomerTier.GOLD: Decimal(\"0.15\"),\n    }\n    rate = discount_rates.get(tier,\
    \ Decimal(\"0\"))\n    return (price * rate).quantize(Decimal(\"0.01\"))\n\n# If the old algorithm is needed: git log\
    \ --all -S \"calculate_discount\" finds it\n"
  example_bad: "def calculate_discount(price, tier):\n    # OLD ALGORITHM - DO NOT DELETE (might need later)\n    # if tier\
    \ == \"gold\":\n    #     return price * 0.2\n    # elif tier == \"silver\":\n    #     return price * 0.1\n    # else:\n\
    \    #     return 0\n\n    # NEW ALGORITHM\n    # TODO: maybe switch back to old one?\n    discount_rates = {\"bronze\"\
    : 0.05, \"silver\": 0.10, \"gold\": 0.15}\n    # return price * discount_rates.get(tier, 0)\n    # ACTUALLY using this:\n\
    \    rate = discount_rates.get(tier, 0)\n    return price * rate\n    # NOTE: there was also a seasonal discount but we\
    \ removed it\n    # seasonal = get_seasonal_discount()\n    # return price * (rate + seasonal)\n"
  when_applies: Projects using Python codebases, JavaScript/TypeScript projects, TypeScript projects with static typing, or
    General
  sources: ["https://martinfowler.com/bliki/DeadCode.html"]
- id: CR-CQ-007
  text: Replace magic numbers and strings with named constants
  why: Magic values hide intent and create maintenance nightmares. When you see `if retries > 3`, you do not know if 3 is
    arbitrary, derived from SLA requirements, or a bug. When the business changes the limit to 5, you must find every occurrence
    of 3 (and distinguish retry limits from other uses of 3). Named constants centralize business rules and make them searchable.
  how_to_do_right: '1. Extract any literal value that has business or technical meaning into a named constant.

    2. Name constants to reveal the MEANING, not the value: MAX_LOGIN_ATTEMPTS, not THREE.

    3. Group related constants in a dedicated module or class.

    4. Use enums for values that represent distinct states or categories.

    5. Exception: 0, 1, -1 in obvious contexts (loop start, increment, sentinel) are acceptable.

    6. Configuration values that may change should be in config files, not even as constants.

    '
  severity: medium
  technologies:
    lang: [python, javascript, typescript, general]
  domains:
    domain: [quality]
    concern: [code]
  example_good: "# Constants reveal business rules\nMAX_LOGIN_ATTEMPTS = 5\nACCOUNT_LOCKOUT_DURATION_MINUTES = 15\nPASSWORD_MIN_LENGTH\
    \ = 8\nSESSION_TIMEOUT_SECONDS = 30 * 60  # 30 minutes\nMAX_UPLOAD_SIZE_MB = 10\n\nclass RateLimitTier(Enum):\n    FREE\
    \ = 100           # requests per hour\n    PROFESSIONAL = 1000\n    ENTERPRISE = 10000\n\ndef check_rate_limit(user: User,\
    \ request_count: int) -> bool:\n    limit = RateLimitTier[user.tier].value\n    return request_count < limit\n"
  example_bad: "# Magic numbers everywhere\ndef check_login(user, attempts):\n    if attempts > 5:                    # why\
    \ 5?\n        lock_account(user, 15)          # 15 what? minutes? seconds?\n        return False\n    if len(password)\
    \ < 8:               # why 8?\n        return False\n    if time.time() - last_login > 1800: # what is 1800?\n       \
    \ expire_session(user)\n    if request_count > 100:             # what tier? what limit?\n        return rate_limited()\n"
  when_applies: Projects using Python codebases, JavaScript/TypeScript projects, TypeScript projects with static typing, or
    General
  sources: ["https://refactoring.guru/refactoring/smells/dispensables/magic-number"]
- id: CR-CQ-008
  text: Apply the Boy Scout Rule — leave every file better than you found it
  why: 'Codebases degrade gradually, one small shortcut at a time. The Boy Scout Rule reverses entropy by making improvement
    a continuous habit rather than a dedicated (and never-scheduled) cleanup sprint. Small improvements compound: fixing a
    name, extracting a function, adding a missing type hint during normal work prevents the gradual descent into an unmaintainable
    codebase.'
  how_to_do_right: '1. When you touch a file, spend 5-10 minutes on ONE improvement: rename, extract, add types, add docstring.

    2. Keep improvements in scope — do not refactor an entire module when fixing a one-line bug.

    3. Separate improvement commits from feature commits for clean git history.

    4. If you notice something too large to fix now, create a ticket (do not just add a TODO).

    5. Never make things worse: if you cannot improve, at least do not degrade.

    6. Reviewers should acknowledge and encourage Scout Rule improvements.

    '
  severity: medium
  technologies:
    lang: [general]
  domains:
    domain: [quality]
    concern: [code]
  example_good: "# Before (touched this file to fix a bug on line 42):\ndef proc(d):\n    r = d.get(\"rate\")\n    if r:\n\
    \        return r * d.get(\"amt\", 0)\n    return 0\n\n# After (fixed bug + Scout Rule improvement):\ndef calculate_discounted_amount(order_data:\
    \ dict) -> Decimal:\n    \"\"\"Calculate the discounted amount for an order.\n\n    Returns Decimal(0) if no discount\
    \ rate is set.\n    \"\"\"\n    discount_rate = order_data.get(\"discount_rate\", Decimal(\"0\"))\n    amount = order_data.get(\"\
    amount\", Decimal(\"0\"))\n    return (discount_rate * amount).quantize(Decimal(\"0.01\"))\n\n# Bug fix: was using 0 (int)\
    \ instead of Decimal(\"0\") causing type mismatch\n# Scout Rule: renamed function, added types, added docstring, used\
    \ Decimal\n"
  example_bad: "# Touched this file to fix a bug, left everything else in a bad state:\ndef proc(d):\n    r = d.get(\"rate\"\
    )\n    if r:\n        return r * d.get(\"amt\", Decimal(\"0\"))  # fixed the bug\n    return Decimal(\"0\")  # fixed the\
    \ bug\n# Fixed the bug but left: cryptic name, no types, no docstring, single-letter vars\n"
  when_applies: Projects using General
  when_not_applies: projects not using General
  sources: ["https://martinfowler.com/bliki/OpportunisticRefactoring.html"]
- id: CR-CQ-009
  text: Use the Strangler Fig pattern for incremental replacement of legacy systems
  why: Big-bang rewrites fail 60-80% of the time (Joel Spolsky, 'Things You Should Never Do'). They take longer than estimated,
    introduce new bugs while losing battle-tested edge case handling, and cannot be incrementally tested or rolled back. The
    Strangler Fig pattern routes traffic gradually from old to new, allowing parallel operation and safe rollback.
  how_to_do_right: '1. Build the new implementation alongside the old one (do not modify the old code).

    2. Use a router/proxy/feature flag to direct traffic: old → new, one endpoint/feature at a time.

    3. Start with the simplest, lowest-risk endpoint for the first migration.

    4. Run old and new in parallel with output comparison (shadow mode) before switching.

    5. Monitor error rates and latency after each switch — rollback threshold defined in advance.

    6. Remove old code only after the new implementation has been stable for a defined period (e.g., 2 weeks).

    '
  severity: high
  technologies:
    lang: [python, javascript, general]
  domains:
    domain: [quality, architecture]
    concern: [code]
  example_good: "# Strangler Fig: gradually migrating from legacy to new cart service\nclass CartRouter:\n    \"\"\"Routes\
    \ cart operations to legacy or new implementation.\"\"\"\n\n    def __init__(self, feature_flags: FeatureFlags):\n   \
    \     self._legacy = LegacyCartService()\n        self._new = NewCartService()\n        self._flags = feature_flags\n\n\
    \    async def get_cart(self, user_id: str) -> Cart:\n        if self._flags.is_enabled(\"new_cart_read\", user_id):\n\
    \            try:\n                return await self._new.get_cart(user_id)\n            except Exception:\n         \
    \       logger.error(\"New cart service failed, falling back to legacy\")\n                return await self._legacy.get_cart(user_id)\n\
    \        return await self._legacy.get_cart(user_id)\n\n# Migration plan:\n# Week 1: 1% traffic to new service (shadow\
    \ mode, compare outputs)\n# Week 2: 10% traffic (monitor error rates)\n# Week 3: 50% traffic\n# Week 4: 100% traffic\n\
    # Week 6: Remove legacy code\n"
  example_bad: '# Big-bang rewrite approach

    # "We''ll rewrite the entire cart service in 3 months"

    # Month 1: New service handles basic CRUD

    # Month 2: "We forgot about the coupon edge cases, adding 2 weeks"

    # Month 3: "The tax calculation migration is more complex than expected"

    # Month 4: "We need to support the old API format for mobile v2.3"

    # Month 6: Launch with 47 bugs, rollback to legacy, rewrite abandoned

    '
  when_applies: Projects using Python codebases, JavaScript/TypeScript projects, or General
  when_not_applies: small scripts under 100 lines, single-purpose utilities
  sources: ["https://martinfowler.com/bliki/StranglerFigApplication.html"]
- id: CR-CQ-010
  text: Use feature flags for safe refactoring and decoupling deployment from release
  why: Feature flags make refactoring reversible. When a refactored code path has a bug, you flip the flag instead of emergency-deploying
    a revert. Flags also decouple deploy from release — code can be merged to main and deployed without being active, enabling
    continuous delivery even for incomplete features.
  how_to_do_right: '1. Wrap new code paths in feature flags, defaulting to the old behavior.

    2. Use a feature flag service (LaunchDarkly, Unleash, or simple config) — not hardcoded booleans.

    3. Flag naming convention: scope_feature_action (e.g., cart_new_pricing_enabled).

    4. Every flag has an owner and a removal date — flags are temporary, not permanent config.

    5. Clean up flags within 2 weeks of full rollout (flag debt is real).

    6. Test both flag states in CI to prevent flag-dependent bugs.

    '
  severity: medium
  technologies:
    lang: [python, javascript, general]
    library: [launchdarkly]
  domains:
    domain: [quality, operations, devops]
    concern: [code]
  example_good: "from feature_flags import is_enabled\n\nasync def calculate_shipping(order: Order, user_id: str) -> Decimal:\n\
    \    \"\"\"Calculate shipping with feature flag for new algorithm.\n\n    Flag: shipping_new_zone_pricing (owner: @logistics,\
    \ remove by: 2026-04-01)\n    \"\"\"\n    if is_enabled(\"shipping_new_zone_pricing\", user_id=user_id):\n        return\
    \ await _calculate_zone_based_shipping(order)\n    return await _calculate_flat_rate_shipping(order)\n\n# In tests: test\
    \ BOTH paths\n@pytest.mark.parametrize(\"flag_enabled\", [True, False])\nasync def test_calculate_shipping(flag_enabled,\
    \ mock_flags):\n    mock_flags.set(\"shipping_new_zone_pricing\", flag_enabled)\n    result = await calculate_shipping(order,\
    \ user_id=\"test\")\n    assert result > 0\n"
  example_bad: "# Hardcoded boolean \"feature flag\"\nUSE_NEW_SHIPPING = True  # TODO: remove after launch (added 6 months\
    \ ago)\n\nasync def calculate_shipping(order):\n    if USE_NEW_SHIPPING:\n        return new_shipping(order)\n    return\
    \ old_shipping(order)\n\n# Problems:\n# - Cannot toggle per-user or per-environment\n# - Requires code deploy to change\n\
    # - No cleanup date, no owner — boolean will live forever\n# - Old code path untested (never runs in CI)\n"
  when_applies: Projects using Python codebases, JavaScript/TypeScript projects, LaunchDarkly, or General
  when_not_applies: local development only, throwaway experiments
  sources: ["https://martinfowler.com/articles/feature-toggles.html"]
- id: CR-CQ-011
  text: Track technical debt in a register with business impact quantified — treat it like financial debt with interest
  why: 'Untracked tech debt accumulates silently until it causes outages, blocks feature development, or makes the codebase
    unmaintainable. The interest metaphor works: some debt costs you every sprint (high-interest: slow deploys, flaky tests)
    while some costs only occasionally (low-interest: outdated docs). Pay high-interest debt first.'
  how_to_do_right: '1. Maintain a tech debt register (spreadsheet, Jira epic, or dedicated tool).

    2. For each item: description, business impact (hours/week lost), interest rate (how fast it compounds).

    3. Categorize: deliberate/prudent (we know, we chose), reckless/inadvertent (we did not know).

    4. Allocate 15-20% of sprint capacity for debt reduction — non-negotiable.

    5. Prioritize by interest rate: items that slow the team every day are highest priority.

    6. Celebrate debt payoff — track velocity improvements after debt is resolved.

    '
  severity: high
  technologies:
    lang: [general]
  domains:
    domain: [quality, management]
    concern: [code, project]
  example_good: "# Tech Debt Register (structured for tracking)\ntech_debt:\n  - id: TD-042\n    title: \"Monolithic test\
    \ suite takes 45 minutes\"\n    category: \"deliberate/prudent\"  # we knew, accepted to ship faster\n    interest_rate:\
    \ high  # costs team 3+ hours/day in CI wait time\n    business_impact: |\n      - 8 developers x 20 min average wait\
    \ x 4 PRs/day = 10.6 hours/day lost\n      - Developers batch changes to avoid CI, leading to larger PRs and worse reviews\n\
    \    remediation: \"Split into 3 parallel test suites by domain (est. 3 days)\"\n    roi: \"10.6 hours/day saved = pays\
    \ back in <1 day\"\n    owner: \"@platform-team\"\n    created: \"2026-01-15\"\n    target_resolution: \"2026-02-28\"\n\
    \n  - id: TD-043\n    title: \"No database indexes on user_activity.created_at\"\n    category: \"inadvertent\"  # did\
    \ not know query patterns would grow\n    interest_rate: low  # only affects monthly reports\n    business_impact: \"\
    Monthly report takes 4 hours instead of 5 minutes\"\n    remediation: \"Add index + analyze query plan (est. 1 hour)\"\
    \n    roi: \"3.9 hours saved monthly\"\n"
  example_bad: '# No debt tracking — hidden costs compound silently

    # "We''ll clean it up later" (said 2 years ago)

    # Team velocity declining 5% per quarter

    # Nobody knows why features take longer and longer

    # New hires take 3 months to be productive because codebase is a maze

    '
  when_applies: Projects using General
  when_not_applies: projects not using General
  sources: ["https://martinfowler.com/bliki/TechnicalDebt.html"]
- id: CR-CQ-012
  text: Allocate 15-20% of engineering capacity to tech debt reduction — it is not optional, it is maintenance
  why: Teams that skip debt reduction to ship more features experience declining velocity. Studies (McKinsey, Stripe) show
    that engineers spend 33% of their time dealing with tech debt. A 15-20% investment in debt reduction typically increases
    overall feature velocity by 20-30% within one quarter.
  how_to_do_right: '1. Reserve 1 day per sprint (in a 2-week sprint) for debt reduction work.

    2. Debt work is planned, reviewed, and tracked just like feature work.

    3. Pick items from the debt register, prioritized by interest rate.

    4. Measure improvement: build times, test times, deploy frequency, incident rate.

    5. Protect the allocation: debt work is not bumped for feature requests.

    6. Report debt reduction outcomes to stakeholders (they care about velocity, not implementation details).

    '
  severity: high
  technologies:
    lang: [general]
  domains:
    domain: [quality, management]
    concern: [code, project]
  example_good: "# Sprint planning with debt allocation\nsprint_plan:\n  total_points: 40\n  feature_work: 32 points (80%)\n\
    \  debt_reduction: 8 points (20%)\n\n  debt_items:\n    - TD-042: \"Split test suite (5 points)\"\n      expected_outcome:\
    \ \"CI time 45min → 15min, saves 10.6 dev-hours/day\"\n    - TD-045: \"Extract payment module from monolith (3 points)\"\
    \n      expected_outcome: \"Payment changes deployable independently\"\n\n  # Sprint retro tracks debt metrics:\n  metrics:\n\
    \    ci_time_before: \"45 min\"\n    ci_time_after: \"14 min\"\n    dev_hours_saved_per_day: 10.6\n    sprint_velocity_change:\
    \ \"+15%\"\n"
  example_bad: '# "We don''t have time for tech debt this sprint"

    # (said every sprint for 18 months)

    # Sprint velocity trend: 40 → 38 → 35 → 32 → 28 → 25

    # Incident frequency: 1/month → 2/month → 1/week

    # CI pipeline: 5min → 15min → 45min → "just push and hope"

    # Developer satisfaction survey: declining quarterly

    '
  when_applies: Projects using General
  when_not_applies: projects not using General
  sources:
    - "https://martinfowler.com/bliki/TechnicalDebt.html"
    - "https://stripe.com/reports/developer-coefficient-2018"
- id: CR-CQ-013
  text: Automate code formatting and linting with pre-commit hooks — zero style debates in code review
  why: Style debates in code review waste time and create interpersonal friction. When formatting is automated, it is objective
    and consistent — no one argues with a machine. Pre-commit hooks catch issues before they reach CI, giving developers instant
    feedback. The tool enforces the style guide so reviewers can focus on logic.
  how_to_do_right: '1. Choose opinionated formatters (Black for Python, Prettier for JS/TS) — fewer config options = fewer
    debates.

    2. Install pre-commit hooks that run formatters and linters on staged files.

    3. Add the same checks to CI as a safety net (in case hooks are bypassed).

    4. Format the entire codebase in a single commit before enabling hooks (clean baseline).

    5. Team agrees on config once, commits it to repo, never discusses style again.

    6. Use auto-fix where possible: `ruff check --fix`, `eslint --fix`.

    '
  severity: medium
  technologies:
    lang: [python, javascript, typescript]
    platform: [git]
  domains:
    domain: [quality, operations, devops]
    concern: [code]
  example_good: "# .pre-commit-config.yaml\nrepos:\n  - repo: https://github.com/psf/black\n    rev: 24.1.0\n    hooks:\n\
    \      - id: black\n        language_version: python3.12\n\n  - repo: https://github.com/astral-sh/ruff-pre-commit\n \
    \   rev: v0.2.0\n    hooks:\n      - id: ruff\n        args: [--fix, --exit-non-zero-on-fix]\n\n  - repo: https://github.com/pre-commit/mirrors-prettier\n\
    \    rev: v4.0.0-alpha.8\n    hooks:\n      - id: prettier\n        types_or: [javascript, typescript, json, yaml, markdown]\n\
    \n# Setup: pre-commit install (one-time per developer)\n# Every commit automatically formats and lints staged files\n"
  example_bad: '# No pre-commit hooks, no CI checks

    # Code review conversation:

    # Alice: "Please use single quotes"

    # Bob: "I prefer double quotes"

    # Alice: "Our style guide says single quotes"

    # Bob: "Where is the style guide?"

    # Alice: "I think it''s in the wiki somewhere"

    # Bob: "I can''t find it"

    # ... 3 days later, still discussing quotes instead of reviewing logic

    '
  when_applies: Projects using Python codebases, JavaScript/TypeScript projects, TypeScript projects with static typing, or
    Git
  when_not_applies: local development only, throwaway experiments
  sources: ["https://pre-commit.com/"]
- id: CR-CQ-014
  text: Block merges on lint failures in CI — broken windows invite more broken windows
  why: 'If lint warnings are allowed to accumulate, they become noise that developers ignore. Once there are 500 warnings,
    adding one more is invisible. This is the broken windows theory applied to code: visible disorder invites more disorder.
    A zero-warning policy maintained by CI enforcement keeps the codebase clean.'
  how_to_do_right: '1. CI pipeline fails on ANY lint error — this is a required status check for merge.

    2. Distinguish errors (block merge) from warnings (track but do not block).

    3. If enabling linting on an existing codebase, fix all current violations first (single commit).

    4. Alternatively, use baseline files to grandfather existing violations and only block new ones.

    5. Track warning count over time — it should decrease, not increase.

    6. Update lint rules quarterly — adopt new rules as the team''s practices mature.

    '
  severity: medium
  technologies:
    lang: [python]
    framework: [linting, eslint, ruff]
    platform: [github_actions, gitlab_ci]
  domains:
    domain: [quality, operations, devops]
    concern: [code]
  example_good: "# GitHub Actions: lint check required for merge\nname: Code Quality\non: [pull_request]\njobs:\n  lint:\n\
    \    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v4\n      - uses: actions/setup-python@v5\n  \
    \      with:\n          python-version: \"3.12\"\n      - name: Install dependencies\n        run: pip install ruff mypy\n\
    \      - name: Ruff lint (zero tolerance)\n        run: ruff check src/ --output-format=github\n      - name: Ruff format\
    \ check\n        run: ruff format --check src/\n      - name: Type check\n        run: mypy src/ --strict\n\n# Branch\
    \ protection: \"lint\" job is a required status check\n# PRs cannot merge until all checks pass\n"
  example_bad: '# CI runs lint but doesn''t block merge

    # "We''ll fix the warnings later"

    # Warning count over time: 12 → 47 → 183 → 512 → "lint is broken, disable it"

    # Or: no CI lint at all — each developer has different IDE settings

    # Result: inconsistent code style, bugs hidden in warning noise

    '
  when_applies: Projects using GitHub Actions, GitLab CI, ESLint, or Ruff
  when_not_applies: local development only, throwaway experiments
  sources: ["https://docs.astral.sh/ruff/"]
- id: CR-CQ-015
  text: Every public function must have type hints and a docstring explaining what, why, and edge cases
  why: Type hints catch entire categories of bugs at development time (passing str where int expected, None where non-optional
    expected). Docstrings preserve the author's intent and edge case knowledge. Without them, every future developer must
    read the implementation to understand the contract. Modern tooling (mypy, Pyright) makes type hints a zero-cost bug catcher.
  how_to_do_right: '1. All public functions and methods: fully typed parameters and return type.

    2. Docstring format: one-line summary, then args, returns, raises, and any edge case notes.

    3. Use Optional[T] (or T | None) explicitly when None is a valid value.

    4. Complex types: use TypeAlias or NewType for readability.

    5. Run mypy --strict in CI to catch type errors before merge.

    6. Private functions: type hints still recommended, docstring optional.

    '
  severity: high
  technologies:
    lang: [python, typescript]
  domains:
    domain: [quality]
    concern: [code]
  example_good: "from decimal import Decimal\n\ndef calculate_tax(\n    subtotal: Decimal,\n    tax_rate: Decimal,\n    is_tax_exempt:\
    \ bool = False,\n) -> Decimal:\n    \"\"\"Calculate tax amount for an order subtotal.\n\n    Args:\n        subtotal:\
    \ Pre-tax order total. Must be >= 0.\n        tax_rate: Tax rate as decimal (e.g., 0.08 for 8%). Must be >= 0.\n     \
    \   is_tax_exempt: If True, returns Decimal(\"0\") regardless of rate.\n\n    Returns:\n        Tax amount rounded to\
    \ 2 decimal places.\n\n    Raises:\n        ValueError: If subtotal or tax_rate is negative.\n\n    Note:\n        For\
    \ orders with mixed tax jurisdictions, call once per jurisdiction\n        and sum the results.\n    \"\"\"\n    if subtotal\
    \ < 0 or tax_rate < 0:\n        raise ValueError(\"subtotal and tax_rate must be non-negative\")\n    if is_tax_exempt:\n\
    \        return Decimal(\"0\")\n    return (subtotal * tax_rate).quantize(Decimal(\"0.01\"))\n"
  example_bad: "def calc_tax(s, r, e=False):\n    if e:\n        return 0\n    return s * r\n# No types: what is s? r? e?\
    \ What type does it return?\n# No docstring: what if s is negative? What is the rounding behavior?\n# No validation: negative\
    \ values silently produce wrong results\n"
  when_applies: Projects using Python codebases or TypeScript projects with static typing
  when_not_applies: projects not using Python or TypeScript
  sources: ["https://mypy.readthedocs.io/en/stable/getting_started.html"]
- id: CR-CQ-016
  text: Extract method when a function exceeds 20-30 lines or when a code comment would describe a logical block
  why: Long functions are hard to understand, test, and debug. When you need a comment like '# Now validate the input' or
    '# Calculate the discount', that block should be a named function. The function name replaces the comment (and unlike
    comments, function names are maintained as code changes). Each extracted function is independently testable.
  how_to_do_right: '1. If you write a comment to describe what a code block does, extract it into a function with that description
    as the name.

    2. Target 5-15 lines per function (hard limit 30 for complex algorithms).

    3. Functions should have 0-3 parameters (more suggests the function does too much).

    4. Extract by abstraction level: keep the parent function''s abstraction consistent.

    5. Name the extracted function for WHAT it does (business concept), not HOW.

    6. Write a test for the extracted function immediately.

    '
  severity: medium
  technologies:
    lang: [python, javascript, typescript, general]
  domains:
    domain: [quality]
    concern: [code]
  example_good: "# Each logical block is a named, testable function\nasync def process_refund(order_id: str, reason: str)\
    \ -> RefundResult:\n    order = await fetch_and_validate_order(order_id)\n    refund_amount = calculate_refund_amount(order,\
    \ reason)\n    payment_reversal = await reverse_payment(order.payment_id, refund_amount)\n    await restore_inventory(order.items)\n\
    \    await notify_customer_of_refund(order.customer_email, refund_amount)\n    return RefundResult(order_id=order_id,\
    \ amount=refund_amount, reversal_id=payment_reversal.id)\n\ndef calculate_refund_amount(order: Order, reason: str) ->\
    \ Decimal:\n    \"\"\"Full refund for defective items, partial for buyer's remorse.\"\"\"\n    if reason in (\"defective\"\
    , \"wrong_item\", \"not_delivered\"):\n        return order.total\n    # Buyer's remorse: refund minus restocking fee\n\
    \    restocking_fee = (order.total * Decimal(\"0.15\")).quantize(Decimal(\"0.01\"))\n    return order.total - restocking_fee\n"
  example_bad: "# 80-line function with comments acting as section headers\nasync def process_refund(order_id, reason):\n\
    \    # Fetch order\n    order = await db.fetch_one(\"SELECT * FROM orders WHERE id = :id\", {\"id\": order_id})\n    if\
    \ not order:\n        raise NotFoundError(\"Order not found\")\n    if order[\"status\"] != \"completed\":\n        raise\
    \ ValidationError(\"Can only refund completed orders\")\n\n    # Calculate refund amount\n    if reason in (\"defective\"\
    , \"wrong_item\", \"not_delivered\"):\n        refund_amount = order[\"total\"]\n    else:\n        restocking_fee = order[\"\
    total\"] * 0.15\n        refund_amount = order[\"total\"] - restocking_fee\n\n    # Reverse payment\n    # ... 15 more\
    \ lines of payment API calls ...\n\n    # Restore inventory\n    # ... 10 more lines of inventory updates ...\n\n    #\
    \ Send notification\n    # ... 10 more lines of email sending ...\n\n    # Each \"section\" is a function screaming to\
    \ be extracted\n"
  when_applies: Projects using Python codebases, JavaScript/TypeScript projects, TypeScript projects with static typing, or
    General
  sources: ["https://refactoring.guru/refactoring/techniques/composing-methods/extract-method"]
