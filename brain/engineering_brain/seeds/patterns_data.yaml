  - id: PAT-CACHE-WRITE-THROUGH
    name: "Write-Through Cache Pattern"
    category: caching
    intent: "Synchronously update the cache on every write operation, ensuring the cache is always consistent with the database."
    when_to_use: >
      Apply write-through caching when read-after-write consistency is critical and you
      cannot tolerate stale cache entries even briefly. In this pattern, every write operation
      updates both the database and the cache atomically (or as close to atomically as
      possible). The cache is never stale because it is updated in the same code path as
      the write. This pattern is valuable for session stores, shopping carts, real-time
      leaderboards, and any data that is written and immediately re-read. It eliminates
      the cache-miss penalty on the first read after a write, which matters in latency-
      sensitive paths. Write-through also simplifies cache invalidation logic because you
      never need to explicitly invalidate — the cache is always current. Use it when writes
      are moderate in volume and the additional write latency (database + cache) is
      acceptable, and when reads vastly outnumber writes.
    when_not_to_use: >
      Avoid write-through for write-heavy workloads where the overhead of updating the
      cache on every write degrades throughput. It is wasteful when most written data is
      never subsequently read — you are paying to cache data nobody requests. Also avoid
      when the cache and database cannot be updated in a failure-safe manner (e.g., if the
      cache update fails after the DB commit, you have an inconsistent state).
    languages: [Python, TypeScript, Java]
    example_good: |
      class WriteThroughUserStore:
          def __init__(self, db, cache, ttl=600):
              self._db = db
              self._cache = cache
              self._ttl = ttl

          def get(self, user_id: int) -> dict | None:
              cached = self._cache.get(f"user:{user_id}")
              if cached:
                  return json.loads(cached)
              user = self._db.get_user(user_id)
              if user:
                  self._cache.setex(f"user:{user_id}", self._ttl, json.dumps(user))
              return user

          def save(self, user: dict) -> dict:
              # Write to DB first (source of truth)
              saved = self._db.save_user(user)
              # Then update cache synchronously — never stale
              self._cache.setex(
                  f"user:{saved['id']}", self._ttl, json.dumps(saved)
              )
              return saved

          def delete(self, user_id: int):
              self._db.delete_user(user_id)
              self._cache.delete(f"user:{user_id}")
    example_bad: |
      # Anti-pattern: write-behind with fire-and-forget cache update
      def save_user(user: dict):
          db.save_user(user)
          # Cache update in background thread — reads may see stale data
          threading.Thread(
              target=lambda: cache.set(f"user:{user['id']}", json.dumps(user))
          ).start()
          # Problems:
          # 1. Race condition: read arrives before background thread updates cache
          # 2. Thread fails silently — cache permanently stale
          # 3. No TTL — if background thread sets cache, it never expires
          # 4. No error handling — network failure to Redis is ignored
          return user
    text: "Write-Through Cache Pattern -- Synchronously update the cache on every write operation, ensuring the cache is always consistent with the database."
    why: "Synchronously update the cache on every write operation, ensuring the cache is always consistent with the database."
    how_to_do_right: |
      1. Identify where write-through cache pattern applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
    severity: high
    technologies:
      lang: [python, typescript, java]
    domains:
      domain: [caching, data]
      concern: [pattern, best_practice]
    when_applies: "Apply write-through caching when read-after-write consistency is critical and you cannot tolerate stale cache entries even briefly."

    related_principles: [P-CACHE-CONSISTENCY, P-CACHE-INVALIDATE, P-CONC-ATOMIC]
    sources: ["https://docs.aws.amazon.com/whitepapers/latest/database-caching-strategies-using-redis/write-through.html"]

  - id: PAT-CACHE-STAMPEDE-GUARD
    name: "Cache Stampede Prevention Pattern"
    category: caching
    intent: "Prevent thundering herd cache stampedes by ensuring only one process recomputes an expired cache entry while others serve stale data or wait."
    when_to_use: >
      Apply stampede prevention whenever a frequently-accessed cache key expires and the
      underlying computation is expensive (database query, API call, aggregation). When a
      popular key expires, hundreds of concurrent requests simultaneously discover the cache
      miss and all hit the database at once — this is the "thundering herd" or "cache
      stampede." It can overwhelm the database, causing cascading failures. Stampede
      prevention is critical for keys accessed more than 100 times per second, for keys
      whose recomputation takes more than 100ms, and for systems where a database overload
      triggers downstream failures. The two main strategies are: (1) probabilistic early
      recomputation (XFetch), where each request has an increasing probability of refreshing
      the cache before TTL expiry, and (2) locking, where the first request to discover a
      miss acquires a lock, recomputes the value, and other requests either wait or serve
      the stale value. Use probabilistic early refresh for high-traffic keys and locking
      for moderate-traffic keys with expensive recomputation.
    when_not_to_use: >
      Unnecessary for low-traffic keys where simultaneous misses are statistically
      improbable. Overkill when the recomputation is cheap (sub-millisecond) and the
      database can handle the burst. Also avoid the locking approach when stale data is
      unacceptable and all consumers must wait for the fresh value.
    languages: [Python, Go, Java]
    example_good: |
      import random, math, time, json, redis

      cache = redis.Redis(decode_responses=True)

      def get_with_xfetch(key: str, recompute_fn, ttl: int = 300, beta: float = 1.0):
          """XFetch: probabilistic early recomputation to prevent stampede."""
          raw = cache.get(key)
          if raw:
              entry = json.loads(raw)
              delta = entry.get("delta", 1.0)  # Time to recompute
              expiry = entry["expiry"]
              # Probabilistic early refresh: P(refresh) increases as expiry approaches
              gap = expiry - time.time()
              if gap > 0 and gap > delta * beta * math.log(random.random()) * -1:
                  return entry["value"]  # Not yet — serve cached value
              # Expired or probabilistically chosen to refresh

          start = time.time()
          value = recompute_fn()
          delta = time.time() - start

          entry = {
              "value": value,
              "delta": delta,
              "expiry": time.time() + ttl,
          }
          cache.setex(key, ttl + 60, json.dumps(entry))  # Extra 60s buffer
          return value

      # Usage
      user = get_with_xfetch(
          f"user:{user_id}",
          lambda: db.query("SELECT * FROM users WHERE id = %s", (user_id,)),
          ttl=300
      )
    example_bad: |
      # Anti-pattern: naive cache with no stampede protection
      def get_user(user_id: int):
          cached = cache.get(f"user:{user_id}")
          if cached:
              return json.loads(cached)

          # Key expired — ALL concurrent requests hit this path simultaneously
          user = db.query("SELECT * FROM users WHERE id = %s", (user_id,))
          # 500 requests arrive in the same millisecond, all execute this query
          # Database receives 500 identical queries at once
          # Database CPU spikes to 100%, connections exhausted
          # Other queries start timing out — cascading failure
          cache.setex(f"user:{user_id}", 300, json.dumps(user))
          # 500 requests all write the same value to cache — wasted work
          return user
    text: "Cache Stampede Prevention Pattern -- Prevent thundering herd cache stampedes by ensuring only one process recomputes an expired cache entry while others serve stale data or wait."
    why: "Prevent thundering herd cache stampedes by ensuring only one process recomputes an expired cache entry while others serve stale data or wait."
    how_to_do_right: |
      1. Identify where cache stampede prevention pattern applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
    severity: high
    technologies:
      lang: [python, go, java]
    domains:
      domain: [caching, data]
      concern: [pattern, best_practice]
    when_applies: "Apply stampede prevention whenever a frequently-accessed cache key expires and the underlying computation is expensive (database query, API call, aggregation)."

    related_principles: [P-CACHE-INVALIDATE, P-CACHE-ASIDE, P-PERF-MEASURE]
    sources: ["https://cseweb.ucsd.edu/~avattani/papers/cache_stampede.pdf"]

  # === Data Engineering Patterns ===
  - id: PAT-DATA-PIPELINE
    name: "ETL/ELT Pipeline Pattern"
    category: data_engineering
    intent: "Structure data movement as a directed acyclic graph of extract, transform, and load stages with clear contracts, idempotency, and observability at each step."
    when_to_use: >
      Use the ETL/ELT pipeline pattern whenever you need to move data between systems —
      database to data warehouse, API to analytics store, legacy system to modern platform.
      The pattern structures data movement into discrete stages: Extract (read from source
      without modification), Transform (clean, validate, enrich, reshape), and Load (write
      to destination). Each stage has a clear contract (input schema, output schema), is
      independently testable, and is idempotent (safe to re-run). Modern ELT flips the order:
      extract raw data into the warehouse first, then transform using SQL inside the warehouse
      engine. Apply this pattern when you have scheduled data synchronization jobs, when you
      need to combine data from multiple sources, when transformations are complex enough to
      warrant unit testing, and when you need observability into each stage (rows extracted,
      rows transformed, rows loaded, errors). Orchestrators like Airflow, Dagster, or Prefect
      manage dependencies between stages and provide retry, alerting, and backfill capabilities.
    when_not_to_use: >
      Avoid building custom ETL pipelines when a managed service (Fivetran, Airbyte, AWS
      Glue) handles your source-to-destination pair out of the box. Overkill for one-off
      data migrations where a simple script suffices. Also unnecessary for real-time
      streaming use cases — use Kafka Streams or Flink instead of batch ETL.
    languages: [Python, SQL, Java]
    example_good: |
      from dagster import asset, AssetExecutionContext
      from datetime import datetime, timedelta

      @asset(description="Extract raw orders from source database")
      def raw_orders(context: AssetExecutionContext) -> pd.DataFrame:
          cutoff = datetime.utcnow() - timedelta(days=1)
          df = pd.read_sql(
              "SELECT * FROM orders WHERE updated_at >= %s",
              source_db_engine, params=(cutoff,)
          )
          context.log.info(f"Extracted {len(df)} orders since {cutoff}")
          return df

      @asset(description="Clean and validate order data")
      def cleaned_orders(raw_orders: pd.DataFrame) -> pd.DataFrame:
          df = raw_orders.copy()
          df = df.dropna(subset=["order_id", "user_id", "total"])
          df["total"] = df["total"].clip(lower=0)  # No negative totals
          df["order_date"] = pd.to_datetime(df["order_date"], utc=True)
          return df

      @asset(description="Load cleaned orders into warehouse")
      def warehouse_orders(context: AssetExecutionContext, cleaned_orders: pd.DataFrame):
          cleaned_orders.to_sql(
              "orders", warehouse_engine, if_exists="append", index=False,
              method="multi", chunksize=5000
          )
          context.log.info(f"Loaded {len(cleaned_orders)} orders to warehouse")
    example_bad: |
      # Anti-pattern: monolithic script with no stages, no contracts, no idempotency
      def sync_orders():
          rows = source_db.execute("SELECT * FROM orders").fetchall()
          for row in rows:
              # Transform inline — not testable, not reusable
              total = float(row["total"]) if row["total"] else 0
              warehouse_db.execute(
                  "INSERT INTO orders VALUES (%s, %s, %s)",
                  (row["order_id"], row["user_id"], total)
              )
          # Problems:
          # 1. No incremental logic — re-inserts ALL orders every run (duplicates)
          # 2. One bad row kills the entire job (no error isolation)
          # 3. No logging — impossible to know how many rows processed
          # 4. Row-by-row inserts — 100x slower than bulk loading
          # 5. No schema validation — silently loads corrupt data
    text: "ETL/ELT Pipeline Pattern -- Structure data movement as a directed acyclic graph of extract, transform, and load stages with clear contracts, idempotency, and observability at each step."
    why: "Structure data movement as a directed acyclic graph of extract, transform, and load stages with clear contracts, idempotency, and observability at each step."
    how_to_do_right: |
      1. Identify where etl/elt pipeline pattern applies in your codebase
      2. Review existing implementations for consistency with the pattern
      3. Apply the pattern following the example_good template above
      4. Validate correctness with automated tests covering edge cases
      5. Document the pattern usage in architecture decision records
    severity: high
    technologies:
      lang: [python, sql, java]
    domains:
      domain: [data_engineering, data]
      concern: [pattern, best_practice]
    when_applies: "Use the ETL/ELT pipeline pattern whenever you need to move data between systems — database to data warehouse, API to analytics store, legacy system to modern platform."

    related_principles: [P-DATA-SCHEMA-EVOLUTION, P-DATA-PARTITION, P-API-IDEMPOTENT]
