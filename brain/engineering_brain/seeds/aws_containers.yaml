layer: rules
technology: AWS
domain: containers
knowledge:
- id: CR-AWS-ECS-001
  text: Define ECS task CPU and memory limits explicitly — never leave them unset or use oversized values.
  why: Without explicit CPU/memory limits, Fargate rejects the task definition (required fields), and EC2 launch type tasks
    can consume all host resources, starving other tasks on the same instance. Oversized limits waste money — a task requesting
    4 vCPU/8GB that actually uses 0.5 vCPU/512MB is paying 8x more than necessary. Fargate bills per second based on requested
    (not used) CPU/memory.
  how_to_do_right: Profile your application's actual CPU and memory usage using CloudWatch Container Insights or ECS Exec.
    Set task-level limits to the p99 usage + 20% headroom. Use the valid Fargate CPU/memory combinations (256 CPU = 512-2048
    MB, 512 CPU = 1024-4096 MB, etc.). Review and right-size quarterly.
  severity: high
  technologies:
    platform: [aws, ecs, fargate]
  domains:
    domain: [infrastructure, operations, performance]
    concern: [containers, cost]
  example_good: "resource \"aws_ecs_task_definition\" \"api\" {\n  family                   = \"api-service\"\n  requires_compatibilities\
    \ = [\"FARGATE\"]\n  network_mode             = \"awsvpc\"\n  cpu                      = \"512\"    # 0.5 vCPU — profiled\
    \ actual usage: 0.3 vCPU\n  memory                   = \"1024\"   # 1 GB — profiled actual usage: 600 MB\n\n  container_definitions\
    \ = jsonencode([{\n    name      = \"api\"\n    image     = \"${aws_ecr_repository.api.repository_url}:latest\"\n    cpu\
    \       = 384        # Container can use up to 384 of 512 task CPU\n    memory    = 768        # Hard limit — OOM kill\
    \ if exceeded\n    memoryReservation = 512 # Soft limit — for scheduling\n    essential = true\n    portMappings = [{\n\
    \      containerPort = 8080\n      protocol      = \"tcp\"\n    }]\n    logConfiguration = {\n      logDriver = \"awslogs\"\
    \n      options = {\n        \"awslogs-group\"         = \"/ecs/api-service\"\n        \"awslogs-region\"        = \"\
    us-east-1\"\n        \"awslogs-stream-prefix\" = \"api\"\n      }\n    }\n  }])\n}\n"
  example_bad: "resource \"aws_ecs_task_definition\" \"api\" {\n  family                   = \"api-service\"\n  requires_compatibilities\
    \ = [\"FARGATE\"]\n  network_mode             = \"awsvpc\"\n  cpu                      = \"4096\"   # 4 vCPU — actual\
    \ usage: 0.3 vCPU (13x overpay)\n  memory                   = \"8192\"   # 8 GB — actual usage: 600 MB (13x overpay)\n\
    \  # Fargate cost: $0.04048/hr/vCPU + $0.004445/hr/GB\n  # 4 vCPU + 8 GB = $0.197/hr = $144/month per task\n  # 0.5 vCPU\
    \ + 1 GB = $0.025/hr = $18/month per task\n  # 8 tasks = $1,152/month vs $144/month — saving $1,008/month\n}\n"
  when_applies: Projects using AWS cloud infrastructure, AWS ECS container service, or Fargate
  sources: ["https://docs.aws.amazon.com/AmazonECS/latest/developerguide/task_definition_parameters.html"]
- id: CR-AWS-ECS-002
  text: Choose Fargate for operational simplicity and EC2 launch type only when you need GPU, custom AMI, or cost optimization
    at scale.
  why: 'EC2 launch type requires managing EC2 instances — patching OS, scaling the cluster, handling instance drains, managing
    capacity providers, dealing with stranded capacity. Fargate eliminates all infrastructure management. The price premium
    (Fargate is ~20% more expensive per vCPU-hour) is offset by reduced operational overhead. EC2 only makes sense when: you
    need GPU instances, specific AMIs, or are running >100 tasks continuously where savings justify the ops burden.'
  how_to_do_right: 'Default to Fargate for all new services. Use Fargate Spot for fault-tolerant workloads (batch processing,
    workers) for 70% savings. Only use EC2 when you need: GPU (p3/p4/g5 instances), Windows containers, specific kernel configurations,
    or are running enough tasks that EC2 Reserved Instances + Savings Plans significantly beat Fargate pricing.'
  severity: medium
  technologies:
    platform: [aws, ecs, fargate, ec2]
  domains:
    domain: [infrastructure, operations]
    concern: [containers, cost]
  example_good: "# Fargate service — zero infrastructure management\nresource \"aws_ecs_service\" \"api\" {\n  name      \
    \      = \"api-service\"\n  cluster         = aws_ecs_cluster.main.id\n  task_definition = aws_ecs_task_definition.api.arn\n\
    \  desired_count   = 3\n  launch_type     = \"FARGATE\"\n\n  network_configuration {\n    subnets         = aws_subnet.private[*].id\n\
    \    security_groups = [aws_security_group.api.id]\n  }\n}\n\n# Fargate Spot for batch workers — 70% cheaper\nresource\
    \ \"aws_ecs_service\" \"worker\" {\n  name            = \"batch-worker\"\n  cluster         = aws_ecs_cluster.main.id\n\
    \  task_definition = aws_ecs_task_definition.worker.arn\n  desired_count   = 5\n\n  capacity_provider_strategy {\n   \
    \ capacity_provider = \"FARGATE_SPOT\"\n    weight            = 4   # 80% Spot\n    base              = 1   # At least\
    \ 1 on regular Fargate\n  }\n  capacity_provider_strategy {\n    capacity_provider = \"FARGATE\"\n    weight         \
    \   = 1   # 20% regular Fargate (baseline)\n  }\n}\n"
  example_bad: "# EC2 launch type for a simple web API — unnecessary ops burden\nresource \"aws_ecs_cluster\" \"main\" {\n\
    \  name = \"production\"\n}\nresource \"aws_autoscaling_group\" \"ecs\" {\n  # Must manage: AMI updates, OS patches, instance\
    \ drains,\n  # capacity scaling, stranded capacity, instance type selection\n  launch_template { id = aws_launch_template.ecs.id\
    \ }\n  min_size = 3\n  max_size = 10\n  # Also need: ECS container agent config, instance role,\n  # user data script,\
    \ health checks, scaling policies\n}\n"
  when_applies: Projects using AWS cloud infrastructure, AWS ECS container service, Fargate, or EC2
  sources: ["https://docs.aws.amazon.com/AmazonECS/latest/developerguide/service-auto-scaling.html"]
- id: CR-AWS-ECS-003
  text: Use ECS Service Connect or Cloud Map for service discovery — never hardcode service endpoints.
  why: Hardcoded endpoints (IP addresses, DNS names) break when services scale, redeploy, or move. ECS Service Connect provides
    automatic service mesh with load balancing, retry, and timeout configuration. Cloud Map provides DNS-based discovery.
    Without service discovery, every deployment risk is amplified because service URLs are scattered across environment variables,
    config files, and application code.
  how_to_do_right: Use ECS Service Connect (recommended for new services) for automatic service mesh. Use Cloud Map for DNS-based
    discovery with health checks. Register services during deployment and deregister on shutdown. Use service names (api.local,
    worker.local) not IP addresses in application configuration.
  severity: high
  technologies:
    library: [cloud map]
    platform: [aws, ecs]
  domains:
    domain: [infrastructure, architecture]
    concern: [containers, networking]
  example_good: "# Cloud Map namespace for service discovery\nresource \"aws_service_discovery_private_dns_namespace\" \"\
    main\" {\n  name = \"production.local\"\n  vpc  = aws_vpc.main.id\n}\nresource \"aws_service_discovery_service\" \"api\"\
    \ {\n  name = \"api\"\n  dns_config {\n    namespace_id = aws_service_discovery_private_dns_namespace.main.id\n    dns_records\
    \ {\n      ttl  = 10\n      type = \"A\"\n    }\n    routing_policy = \"MULTIVALUE\"  # Load balance across tasks\n  }\n\
    \  health_check_custom_config {\n    failure_threshold = 1\n  }\n}\nresource \"aws_ecs_service\" \"api\" {\n  name   \
    \         = \"api-service\"\n  service_registries {\n    registry_arn = aws_service_discovery_service.api.arn\n  }\n \
    \ # Other services connect to: api.production.local\n  # Automatically resolves to healthy task IPs\n}\n"
  example_bad: "# Hardcoded endpoints in environment variables\nresource \"aws_ecs_task_definition\" \"frontend\" {\n  container_definitions\
    \ = jsonencode([{\n    environment = [\n      { name = \"API_URL\", value = \"http://10.0.1.45:8080\" }\n      # IP changes\
    \ on every deployment\n      # No load balancing — all traffic to one task\n      # No health checking — might point to\
    \ dead task\n    ]\n  }])\n}\n"
  when_applies: Projects using AWS cloud infrastructure, AWS ECS container service, or Cloud Map
  when_not_applies: single-host applications, monoliths without service communication
  sources: ["https://docs.aws.amazon.com/AmazonECS/latest/bestpracticesguide/security-iam.html"]
- id: CR-AWS-ECS-004
  text: Enable deployment circuit breaker to automatically roll back failed ECS deployments.
  why: Without a circuit breaker, a broken deployment (crash loop, failing health checks, misconfigured env vars) continues
    rolling out, eventually replacing ALL healthy tasks with broken ones. The default behavior is to keep trying to start
    new tasks indefinitely, wasting resources and extending the outage. The circuit breaker detects the failure pattern and
    automatically rolls back to the last stable deployment.
  how_to_do_right: Enable deployment_circuit_breaker with rollback on all ECS services. Set health check grace period to allow
    enough time for application startup. Configure a proper ALB health check (not just TCP, use HTTP /health endpoint). Monitor
    deployment events via EventBridge for alerting.
  severity: high
  technologies:
    platform: [aws, ecs]
  domains:
    domain: [infrastructure, reliability, operations, deployment]
    concern: [containers]
  example_good: "resource \"aws_ecs_service\" \"api\" {\n  name            = \"api-service\"\n  cluster         = aws_ecs_cluster.main.id\n\
    \  task_definition = aws_ecs_task_definition.api.arn\n  desired_count   = 3\n\n  deployment_circuit_breaker {\n    enable\
    \   = true\n    rollback = true  # Auto-rollback on deployment failure\n  }\n\n  deployment_configuration {\n    maximum_percent\
    \         = 200  # Allow 2x tasks during rolling deploy\n    minimum_healthy_percent = 100  # Never drop below desired\
    \ count\n  }\n\n  health_check_grace_period_seconds = 60  # Wait 60s before checking health\n\n  load_balancer {\n   \
    \ target_group_arn = aws_lb_target_group.api.arn\n    container_name   = \"api\"\n    container_port   = 8080\n  }\n}\n\
    \n# ALB health check — HTTP, not just TCP\nresource \"aws_lb_target_group\" \"api\" {\n  port     = 8080\n  protocol =\
    \ \"HTTP\"\n  health_check {\n    path                = \"/health\"\n    healthy_threshold   = 2\n    unhealthy_threshold\
    \ = 3\n    interval            = 15\n    timeout             = 5\n    matcher             = \"200\"\n  }\n}\n"
  example_bad: "resource \"aws_ecs_service\" \"api\" {\n  name            = \"api-service\"\n  desired_count   = 3\n  # No\
    \ circuit breaker — broken deploy replaces all healthy tasks\n  # No health check grace period — tasks killed before startup\n\
    \  deployment_configuration {\n    minimum_healthy_percent = 0  # Can drop to 0 healthy tasks!\n  }\n  # Result: bad deploy\
    \ → all 3 tasks replaced → all crash → 100% outage\n}\n"
  when_applies: Projects using AWS cloud infrastructure or AWS ECS container service
  when_not_applies: projects not using AWS or ECS
  sources: ["https://docs.aws.amazon.com/AmazonECS/latest/developerguide/service-discovery.html"]
- id: CR-AWS-ECS-005
  text: Use ECS Exec for debugging running containers — never SSH into container hosts or add debug endpoints.
  why: SSH into ECS hosts requires managing SSH keys, opening port 22, and knowing which host a task is running on (impossible
    with Fargate). Debug HTTP endpoints (/debug, /env) expose sensitive information and get forgotten in production. ECS Exec
    provides secure, audited shell access to running containers through SSM — no SSH, no port opening, full CloudTrail audit
    trail.
  how_to_do_right: Enable execute_command on the ECS service. Ensure the task role has ssmmessages permissions. Use 'aws ecs
    execute-command' to get a shell. All commands are logged to CloudWatch Logs for audit. Disable in production unless actively
    debugging (or log to S3 for compliance).
  severity: medium
  technologies:
    library: [ssm]
    platform: [aws, ecs]
  domains:
    domain: [infrastructure, operations, security]
    concern: [containers]
  example_good: "resource \"aws_ecs_service\" \"api\" {\n  name                = \"api-service\"\n  enable_execute_command\
    \ = true  # Enable ECS Exec\n}\n\n# Task role needs SSM permissions\nresource \"aws_iam_role_policy\" \"ecs_exec\" {\n\
    \  role = aws_iam_role.ecs_task.name\n  policy = jsonencode({\n    Version = \"2012-10-17\"\n    Statement = [{\n    \
    \  Effect = \"Allow\"\n      Action = [\n        \"ssmmessages:CreateControlChannel\",\n        \"ssmmessages:CreateDataChannel\"\
    ,\n        \"ssmmessages:OpenControlChannel\",\n        \"ssmmessages:OpenDataChannel\"\n      ]\n      Resource = \"\
    *\"\n    }]\n  })\n}\n\n# Debug a running container\n# aws ecs execute-command \\\n#   --cluster production \\\n#   --task\
    \ abc123 \\\n#   --container api \\\n#   --interactive \\\n#   --command \"/bin/sh\"\n"
  example_bad: "# Debug endpoint left in production code\n@app.route(\"/debug/env\")\ndef debug_env():\n    return jsonify(dict(os.environ))\n\
    \    # Exposes: DB_PASSWORD, API_KEYS, AWS credentials\n    # Accessible to anyone who discovers the URL\n\n# SSH into\
    \ EC2 host — requires managing keys, opening ports\n# Security group: allow SSH from 0.0.0.0/0\n# No audit trail of commands\
    \ executed\n"
  when_applies: Projects using AWS cloud infrastructure, AWS ECS container service, or SSM
  sources: ["https://docs.aws.amazon.com/AmazonECS/latest/developerguide/deployment-types.html"]
- id: CR-AWS-EKS-001
  text: Use managed node groups or Fargate profiles for EKS worker nodes — avoid self-managed node groups unless absolutely
    necessary.
  why: Self-managed node groups require you to handle AMI updates, kubelet configuration, node draining, scaling, security
    patching, and instance lifecycle. Managed node groups automate all of this — AWS handles AMI updates, graceful draining,
    and integration with Cluster Autoscaler. Fargate profiles eliminate nodes entirely. Self-managed only makes sense for
    custom AMIs (GPU drivers, specific kernel modules).
  how_to_do_right: Default to managed node groups for general workloads. Use Fargate profiles for batch jobs, short-lived
    tasks, or workloads that benefit from per-pod isolation. Create separate node groups for different workload types (system,
    general, memory-intensive). Enable Cluster Autoscaler or Karpenter for dynamic scaling.
  severity: high
  technologies:
    platform: [aws, eks, kubernetes]
  domains:
    domain: [infrastructure, operations]
    concern: [containers]
  example_good: "resource \"aws_eks_node_group\" \"general\" {\n  cluster_name    = aws_eks_cluster.main.name\n  node_group_name\
    \ = \"general-workloads\"\n  node_role_arn   = aws_iam_role.node.arn\n  subnet_ids      = aws_subnet.private[*].id\n \
    \ instance_types  = [\"m6i.large\", \"m6a.large\", \"m5.large\"]  # Multiple types\n\n  scaling_config {\n    desired_size\
    \ = 3\n    min_size     = 2\n    max_size     = 10\n  }\n\n  update_config {\n    max_unavailable = 1  # Rolling update\
    \ — 1 node at a time\n  }\n\n  # Managed: AWS handles AMI updates, draining, patching\n  ami_type = \"AL2_x86_64\"  #\
    \ Amazon Linux 2 optimized for EKS\n}\n\n# Fargate profile for batch workloads — zero node management\nresource \"aws_eks_fargate_profile\"\
    \ \"batch\" {\n  cluster_name           = aws_eks_cluster.main.name\n  fargate_profile_name   = \"batch-jobs\"\n  pod_execution_role_arn\
    \ = aws_iam_role.fargate.arn\n  subnet_ids             = aws_subnet.private[*].id\n\n  selector {\n    namespace = \"\
    batch\"\n    labels    = { workload-type = \"batch\" }\n  }\n}\n"
  example_bad: "# Self-managed node group — all operational burden on you\nresource \"aws_autoscaling_group\" \"workers\"\
    \ {\n  launch_template {\n    id = aws_launch_template.worker.id\n    # Must build custom AMI with: kubelet, containerd,\
    \ CNI plugins\n    # Must handle: AMI updates every 2 weeks, security patches\n    # Must configure: kubelet flags, container\
    \ runtime, log rotation\n    # Must manage: node labels, taints, draining on termination\n  }\n  # When EKS upgrades:\
    \ must rebuild AMI, test, roll out to all nodes\n}\n"
  when_applies: Projects using AWS cloud infrastructure, AWS EKS managed Kubernetes, or Kubernetes-orchestrated deployments
  sources: ["https://docs.aws.amazon.com/eks/latest/userguide/managed-node-groups.html"]
- id: CR-AWS-EKS-002
  text: Use IRSA (IAM Roles for Service Accounts) for pod-level IAM permissions — never use node-level IAM roles for application
    access.
  why: Node-level IAM roles give EVERY pod on that node the same AWS permissions. If the node role has S3 and DynamoDB access,
    every pod (including compromised ones) can access both. IRSA assigns IAM roles to specific Kubernetes service accounts,
    giving each pod only the permissions it needs. A compromised API pod cannot access the payment service's DynamoDB table.
  how_to_do_right: Enable the OIDC provider for your EKS cluster. Create an IAM role with a trust policy scoped to the specific
    service account and namespace. Annotate the Kubernetes service account with the IAM role ARN. Use that service account
    in the pod spec. The AWS SDK automatically uses the IRSA credentials.
  severity: critical
  technologies:
    platform: [aws, eks, iam, kubernetes]
  domains:
    domain: [infrastructure, security]
    concern: [containers]
  example_good: "# OIDC provider for IRSA\ndata \"tls_certificate\" \"eks\" {\n  url = aws_eks_cluster.main.identity[0].oidc[0].issuer\n\
    }\nresource \"aws_iam_openid_connect_provider\" \"eks\" {\n  url             = aws_eks_cluster.main.identity[0].oidc[0].issuer\n\
    \  client_id_list  = [\"sts.amazonaws.com\"]\n  thumbprint_list = [data.tls_certificate.eks.certificates[0].sha1_fingerprint]\n\
    }\n\n# IAM role scoped to specific service account\nresource \"aws_iam_role\" \"api_pod\" {\n  name = \"api-pod-role\"\
    \n  assume_role_policy = jsonencode({\n    Version = \"2012-10-17\"\n    Statement = [{\n      Effect = \"Allow\"\n  \
    \    Principal = { Federated = aws_iam_openid_connect_provider.eks.arn }\n      Action = \"sts:AssumeRoleWithWebIdentity\"\
    \n      Condition = {\n        StringEquals = {\n          \"${replace(aws_eks_cluster.main.identity[0].oidc[0].issuer,\
    \ \"https://\", \"\")}:sub\" = \"system:serviceaccount:production:api-service\"\n        }\n      }\n    }]\n  })\n}\n\
    \n# Kubernetes service account with IAM annotation\n# apiVersion: v1\n# kind: ServiceAccount\n# metadata:\n#   name: api-service\n\
    #   namespace: production\n#   annotations:\n#     eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/api-pod-role\n"
  example_bad: "# Node-level IAM role — ALL pods get same permissions\nresource \"aws_iam_role\" \"node\" {\n  name = \"eks-node-role\"\
    \n}\nresource \"aws_iam_role_policy_attachment\" \"s3_full\" {\n  role       = aws_iam_role.node.name\n  policy_arn =\
    \ \"arn:aws:iam::aws:policy/AmazonS3FullAccess\"\n}\nresource \"aws_iam_role_policy_attachment\" \"dynamo_full\" {\n \
    \ role       = aws_iam_role.node.name\n  policy_arn = \"arn:aws:iam::aws:policy/AmazonDynamoDBFullAccess\"\n}\n# Every\
    \ pod on this node can read/write ALL S3 buckets and ALL DynamoDB tables\n# Compromised logging pod can access payment\
    \ data\n"
  when_applies: Any project using AWS cloud infrastructure, AWS EKS managed Kubernetes, IAM, or Kubernetes-orchestrated deployments
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities
  sources: ["https://docs.aws.amazon.com/eks/latest/userguide/iam-roles-for-service-accounts.html"]
- id: CR-AWS-EKS-003
  text: Enable EKS control plane logging for all log types — api, audit, authenticator, controllerManager, scheduler.
  why: 'Without control plane logs, you cannot: debug API server errors, investigate unauthorized access attempts, audit who
    created/deleted what resource, or diagnose scheduler/controller issues. The audit log is especially critical — it records
    every kubectl command, API call, and admission webhook decision. During security incidents, audit logs are the only record
    of cluster-level activity.'
  how_to_do_right: 'Enable all 5 log types in the EKS cluster configuration. Logs go to CloudWatch Logs group /aws/eks/{cluster}/cluster.
    Set retention to at least 90 days. Create CloudWatch alarms for: failed authentication attempts (authenticator log), denied
    API calls (audit log), and scheduler failures.'
  severity: high
  technologies:
    platform: [aws, eks, cloudwatch, kubernetes]
  domains:
    domain: [infrastructure, security, observability]
    concern: [containers]
  example_good: "resource \"aws_eks_cluster\" \"main\" {\n  name     = \"production\"\n  role_arn = aws_iam_role.cluster.arn\n\
    \n  enabled_cluster_log_types = [\n    \"api\",               # API server logs\n    \"audit\",             # Who did\
    \ what (kubectl, API calls)\n    \"authenticator\",     # IAM/OIDC auth attempts\n    \"controllerManager\", # Controller\
    \ operations\n    \"scheduler\"          # Pod scheduling decisions\n  ]\n\n  vpc_config {\n    subnet_ids           \
    \   = aws_subnet.private[*].id\n    endpoint_private_access = true\n    endpoint_public_access  = false  # Private cluster\n\
    \  }\n}\n\n# Retain control plane logs for 90 days\nresource \"aws_cloudwatch_log_group\" \"eks\" {\n  name          \
    \    = \"/aws/eks/production/cluster\"\n  retention_in_days = 90\n}\n"
  example_bad: "resource \"aws_eks_cluster\" \"main\" {\n  name     = \"production\"\n  role_arn = aws_iam_role.cluster.arn\n\
    \  # enabled_cluster_log_types not set — NO control plane logging\n  # kubectl delete namespace production → no audit\
    \ trail\n  # Failed auth attempts → invisible\n  # Scheduler failing → no way to diagnose\n}\n"
  when_applies: Projects using AWS cloud infrastructure, AWS EKS managed Kubernetes, CloudWatch, or Kubernetes-orchestrated
    deployments
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities
  sources: ["https://docs.aws.amazon.com/eks/latest/userguide/cluster-autoscaler.html"]
- id: CR-AWS-ECR-001
  text: Configure ECR lifecycle policies to automatically clean up old images — unmanaged repositories grow indefinitely and
    cost money.
  why: Every docker push creates a new image that is stored (and billed) forever unless explicitly deleted. A CI/CD pipeline
    pushing 5 images/day accumulates 1,825 images/year at ~500MB each = 912GB = $27/month in ECR storage alone. Lifecycle
    policies automatically delete images based on age, count, or tag status, keeping costs predictable. Untagged images (from
    failed builds) are pure waste.
  how_to_do_right: 'Create a lifecycle policy that: (1) deletes untagged images after 1 day, (2) keeps the last N tagged images
    (20-50), (3) deletes images older than 90 days. Apply the policy to every repository. Use immutable image tags in production
    to prevent overwriting.'
  severity: medium
  technologies:
    library: [ecr]
    platform: [aws]
  domains:
    domain: [infrastructure, operations]
    concern: [containers, cost]
  example_good: "resource \"aws_ecr_repository\" \"api\" {\n  name                 = \"api-service\"\n  image_tag_mutability\
    \ = \"IMMUTABLE\"  # Prevent tag overwrite in prod\n\n  image_scanning_configuration {\n    scan_on_push = true  # Scan\
    \ every image for vulnerabilities\n  }\n}\n\nresource \"aws_ecr_lifecycle_policy\" \"api\" {\n  repository = aws_ecr_repository.api.name\n\
    \  policy = jsonencode({\n    rules = [\n      {\n        rulePriority = 1\n        description  = \"Delete untagged images\
    \ after 1 day\"\n        selection = {\n          tagStatus   = \"untagged\"\n          countType   = \"sinceImagePushed\"\
    \n          countUnit   = \"days\"\n          countNumber = 1\n        }\n        action = { type = \"expire\" }\n   \
    \   },\n      {\n        rulePriority = 2\n        description  = \"Keep last 30 tagged images\"\n        selection =\
    \ {\n          tagStatus     = \"tagged\"\n          tagPrefixList = [\"v\"]\n          countType     = \"imageCountMoreThan\"\
    \n          countNumber   = 30\n        }\n        action = { type = \"expire\" }\n      },\n      {\n        rulePriority\
    \ = 3\n        description  = \"Delete any image older than 90 days\"\n        selection = {\n          tagStatus   =\
    \ \"any\"\n          countType   = \"sinceImagePushed\"\n          countUnit   = \"days\"\n          countNumber = 90\n\
    \        }\n        action = { type = \"expire\" }\n      }\n    ]\n  })\n}\n"
  example_bad: "resource \"aws_ecr_repository\" \"api\" {\n  name                 = \"api-service\"\n  image_tag_mutability\
    \ = \"MUTABLE\"  # Tags can be overwritten — \"latest\" is different every day\n  # No lifecycle policy — images accumulate\
    \ forever\n  # No scanning — vulnerabilities ship to production\n  # 2 years later: 3,650 images, 1.8TB storage, $54/month\
    \ for garbage\n}\n"
  when_applies: Projects using AWS cloud infrastructure or ECR
  when_not_applies: projects not using AWS or ECR
  sources: ["https://docs.aws.amazon.com/AmazonECR/latest/userguide/image-scanning.html"]
- id: CR-AWS-ECR-002
  text: Enable ECR image scanning and fail CI/CD pipelines on critical or high severity vulnerabilities.
  why: Container images inherit vulnerabilities from base images and installed packages. A single unpatched CVE (e.g., Log4Shell,
    Spring4Shell) in your base image exposes every deployment. ECR basic scanning uses Clair to check for CVEs. Enhanced scanning
    (Inspector) provides continuous monitoring and OS + language-level vulnerability detection. Without scanning, you deploy
    vulnerable images blindly.
  how_to_do_right: Enable scan_on_push for all repositories. Use enhanced scanning (Inspector) for production repositories.
    Add a CI/CD step that checks scan results and fails the pipeline on CRITICAL/HIGH findings. Set up EventBridge rules to
    notify on new vulnerabilities found in previously pushed images. Update base images monthly.
  severity: high
  technologies:
    library: [ecr, inspector]
    platform: [aws]
  domains:
    domain: [infrastructure, security]
    concern: [containers]
  example_good: "# Enhanced scanning with Inspector\nresource \"aws_ecr_registry_scanning_configuration\" \"main\" {\n  scan_type\
    \ = \"ENHANCED\"  # Inspector — continuous scanning\n\n  rule {\n    scan_frequency = \"CONTINUOUS_SCAN\"\n    repository_filter\
    \ {\n      filter      = \"*\"\n      filter_type = \"WILDCARD\"\n    }\n  }\n}\n\n# CI/CD: check scan results before\
    \ deploy\n# aws ecr describe-image-scan-findings \\\n#   --repository-name api-service \\\n#   --image-id imageTag=v1.2.3\
    \ \\\n#   --query 'imageScanFindings.findingSeverityCounts'\n#\n# If CRITICAL > 0 or HIGH > 5: FAIL pipeline\n# {\n# \
    \  \"CRITICAL\": 0,  ✓ Pass\n#   \"HIGH\": 2,      ✓ Pass (threshold: 5)\n#   \"MEDIUM\": 8,    ℹ Info\n#   \"LOW\": 15\
    \       ℹ Info\n# }\n"
  example_bad: "resource \"aws_ecr_repository\" \"api\" {\n  name = \"api-service\"\n  image_scanning_configuration {\n  \
    \  scan_on_push = false  # No scanning — vulnerabilities unknown\n  }\n  # Base image has 3 CRITICAL CVEs\n  # Deployed\
    \ to production for 6 months\n  # Found during penetration test — emergency patch required\n}\n"
  when_applies: Projects using AWS cloud infrastructure, ECR, or Inspector
  when_not_applies: purely internal tools with no external exposure, throwaway scripts, or local development utilities
  sources: ["https://docs.aws.amazon.com/AmazonECR/latest/userguide/LifecyclePolicies.html"]
- id: CR-AWS-CFN-001
  text: Always use change sets to preview CloudFormation changes before execution — never update stacks directly.
  why: CloudFormation updates can DELETE and RECREATE resources (replacement updates) — including databases, S3 buckets with
    data, and DNS records. A seemingly innocent property change (RDS instance class, DynamoDB table name, S3 bucket name)
    can trigger replacement, destroying data. Change sets show exactly what will be created, updated, or REPLACED before any
    changes occur.
  how_to_do_right: 'Always create a change set first with ''aws cloudformation create-change-set''. Review the changes — pay
    special attention to ''Replacement: True'' entries. Only execute if all replacements are expected and data is backed up.
    Use stack policies to protect critical resources from replacement. In CI/CD, auto-execute only for non-production stacks.'
  severity: critical
  technologies:
    platform: [aws, cloudformation]
  domains:
    domain: [infrastructure, operations, deployment]
    concern: [containers]
  example_good: "# Step 1: Create change set (preview only)\naws cloudformation create-change-set \\\n  --stack-name production-app\
    \ \\\n  --template-body file://template.yaml \\\n  --change-set-name update-$(date +%Y%m%d%H%M%S) \\\n  --parameters ParameterKey=InstanceType,ParameterValue=m6i.xlarge\n\
    \n# Step 2: Review changes — look for Replacement!\naws cloudformation describe-change-set \\\n  --stack-name production-app\
    \ \\\n  --change-set-name update-20260217120000\n# Output shows:\n# ResourceChange:\n#   Action: Modify\n#   LogicalResourceId:\
    \ Database\n#   Replacement: Conditional  ← WARNING: might delete and recreate!\n#   Details: [PropertyName: DBInstanceClass,\
    \ RequiresRecreation: Conditional]\n\n# Step 3: Only execute after human review\naws cloudformation execute-change-set\
    \ \\\n  --stack-name production-app \\\n  --change-set-name update-20260217120000\n"
  example_bad: "# Direct update — no preview of what will happen\naws cloudformation update-stack \\\n  --stack-name production-app\
    \ \\\n  --template-body file://template.yaml \\\n  --parameters ParameterKey=DBName,ParameterValue=new-db-name\n# DBName\
    \ change triggers RDS REPLACEMENT\n# Old database DELETED with all data\n# New empty database created\n# No warning, no\
    \ confirmation, data gone\n"
  when_applies: Any project using AWS cloud infrastructure or AWS CloudFormation stacks
  when_not_applies: projects not using AWS or CloudFormation
  sources: ["https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/best-practices.html"]
- id: CR-AWS-CFN-002
  text: Enable drift detection and stack policies to protect critical resources from uncontrolled changes.
  why: 'Manual console changes (someone modifying a security group rule, changing an S3 bucket policy) create drift between
    the CloudFormation template and the actual infrastructure. This drift causes: future stack updates to behave unexpectedly,
    inconsistency between environments, and loss of change tracking. Stack policies prevent CloudFormation itself from replacing
    or deleting protected resources.'
  how_to_do_right: Run drift detection weekly (automate with EventBridge + Lambda). Investigate all drifted resources — either
    update the template to match or revert the manual change. Apply stack policies to protect databases, S3 buckets, and other
    stateful resources from replacement or deletion.
  severity: high
  technologies:
    platform: [aws, cloudformation]
  domains:
    domain: [infrastructure, governance]
    concern: [containers]
  example_good: "# Stack policy protecting database from replacement/deletion\naws cloudformation set-stack-policy \\\n  --stack-name\
    \ production-app \\\n  --stack-policy-body '{\n    \"Statement\": [\n      {\n        \"Effect\": \"Deny\",\n        \"\
    Action\": [\"Update:Replace\", \"Update:Delete\"],\n        \"Principal\": \"*\",\n        \"Resource\": \"LogicalResourceId/ProductionDatabase\"\
    \n      },\n      {\n        \"Effect\": \"Allow\",\n        \"Action\": \"Update:*\",\n        \"Principal\": \"*\",\n\
    \        \"Resource\": \"*\"\n      }\n    ]\n  }'\n\n# Automated weekly drift detection\n# aws cloudformation detect-stack-drift\
    \ --stack-name production-app\n# aws cloudformation describe-stack-resource-drifts \\\n#   --stack-name production-app\
    \ \\\n#   --stack-resource-drift-status-filters MODIFIED DELETED\n"
  example_bad: '# No stack policy — CloudFormation can replace anything

    # Template change accidentally triggers database replacement:

    #   Before: DBInstanceIdentifier: "prod-db"

    #   After:  DBInstanceIdentifier: "production-database"

    # CloudFormation: DELETE prod-db, CREATE production-database

    # All data lost — no stack policy prevented this

    '
  when_applies: Projects using AWS cloud infrastructure or AWS CloudFormation stacks
  when_not_applies: projects not using AWS or CloudFormation
  sources: ["https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/using-cfn-rollback-triggers.html"]
- id: CR-AWS-CB-001
  text: Cache dependencies in CodeBuild to dramatically reduce build times — use S3 or local caching for node_modules, pip
    packages, and Docker layers.
  why: Without caching, every build downloads all dependencies from scratch. A Python project with 200 packages spends 2-5
    minutes just on 'pip install'. A Node project with node_modules runs 'npm install' for 3-8 minutes. Docker builds pull
    base images and rebuild every layer. With S3 caching, subsequent builds skip unchanged dependencies, reducing build times
    by 50-80%.
  how_to_do_right: 'Configure a cache section in buildspec.yml pointing to dependency directories. Use S3 cache for shared
    caching across builds (recommended for most cases). Use local cache for Docker layer caching. Cache: pip (.cache/pip),
    npm (node_modules), go (go/pkg/mod), Docker layers (/var/lib/docker). Set cache expiry based on lockfile changes.'
  severity: medium
  technologies:
    library: [codebuild, codepipeline]
    platform: [aws]
  domains:
    domain: [infrastructure, operations, performance]
    concern: [containers, ci_cd]
  example_good: "# buildspec.yml with dependency caching\nversion: 0.2\nphases:\n  install:\n    runtime-versions:\n     \
    \ python: 3.12\n    commands:\n      - pip install --cache-dir .pip-cache -r requirements.txt\n  build:\n    commands:\n\
    \      - pytest tests/ -v\n      - docker build -t $ECR_REPO:$CODEBUILD_RESOLVED_SOURCE_VERSION .\n  post_build:\n   \
    \ commands:\n      - docker push $ECR_REPO:$CODEBUILD_RESOLVED_SOURCE_VERSION\ncache:\n  paths:\n    - '.pip-cache/**/*'\
    \       # Python packages\n    - 'node_modules/**/*'     # Node packages (if applicable)\n    - '/root/.cache/go/**/*'\
    \  # Go modules\n\n# Terraform: CodeBuild project with S3 cache\nresource \"aws_codebuild_project\" \"build\" {\n  name\
    \ = \"app-build\"\n  cache {\n    type     = \"S3\"\n    location = \"${aws_s3_bucket.build_cache.id}/cache\"\n  }\n \
    \ # First build: 8 minutes (download everything)\n  # Subsequent: 2 minutes (cached dependencies)\n}\n"
  example_bad: "# buildspec.yml without caching\nversion: 0.2\nphases:\n  install:\n    commands:\n      - pip install -r\
    \ requirements.txt  # 4 min every time\n      - npm install                       # 5 min every time\n  build:\n    commands:\n\
    \      - pytest tests/\n# No cache section\n# Every build: 9+ minutes just for dependency installation\n# 20 builds/day\
    \ = 3 hours/day wasted on repeated downloads\n"
  when_applies: Projects using AWS cloud infrastructure, CodeBuild, or CodePipeline
  sources: ["https://docs.aws.amazon.com/codebuild/latest/userguide/welcome.html"]
- id: CR-AWS-CB-002
  text: Use cross-account IAM roles for CodePipeline deployments — never share credentials or use long-lived access keys.
  why: Deploying from a CI/CD account to production using shared access keys creates a permanent credential that can be leaked,
    is difficult to rotate, and cannot be scoped to the deployment pipeline context. Cross-account roles provide temporary
    credentials, can be restricted by source account/pipeline, and leave a complete CloudTrail audit trail. If the CI/CD account
    is compromised, you can immediately revoke the role trust.
  how_to_do_right: Create a deployment role in each target account with specific permissions (ecs:UpdateService, ecr:GetAuthorizationToken,
    etc.). Add a trust policy that only allows the CI/CD account's pipeline role to assume it. Use 'aws sts assume-role' in
    the buildspec. Set session duration to the minimum needed.
  severity: high
  technologies:
    library: [codepipeline, codebuild]
    platform: [aws, iam]
  domains:
    domain: [infrastructure, operations, security]
    concern: [containers, ci_cd]
  example_good: "# Deployment role in production account (111111111111)\nresource \"aws_iam_role\" \"deploy\" {\n  provider\
    \ = aws.production\n  name     = \"cicd-deploy-role\"\n  assume_role_policy = jsonencode({\n    Version = \"2012-10-17\"\
    \n    Statement = [{\n      Effect    = \"Allow\"\n      Principal = { AWS = \"arn:aws:iam::999999999999:role/codebuild-role\"\
    \ }\n      Action    = \"sts:AssumeRole\"\n      Condition = {\n        StringEquals = {\n          \"sts:ExternalId\"\
    \ = \"deploy-pipeline-2026\"\n        }\n      }\n    }]\n  })\n}\nresource \"aws_iam_role_policy\" \"deploy\" {\n  provider\
    \ = aws.production\n  role     = aws_iam_role.deploy.name\n  policy = jsonencode({\n    Version = \"2012-10-17\"\n   \
    \ Statement = [{\n      Effect = \"Allow\"\n      Action = [\n        \"ecs:UpdateService\",\n        \"ecs:DescribeServices\"\
    ,\n        \"ecr:GetAuthorizationToken\",\n        \"ecr:BatchCheckLayerAvailability\"\n      ]\n      Resource = \"*\"\
    \n    }]\n  })\n}\n\n# buildspec.yml — assume role for cross-account deploy\n# CREDENTIALS=$(aws sts assume-role \\\n\
    #   --role-arn arn:aws:iam::111111111111:role/cicd-deploy-role \\\n#   --role-session-name deploy-$(date +%s) \\\n#  \
    \ --external-id deploy-pipeline-2026 \\\n#   --duration-seconds 900)\n"
  example_bad: "# Hardcoded production access keys in CodeBuild environment\nresource \"aws_codebuild_project\" \"deploy\"\
    \ {\n  environment {\n    environment_variable {\n      name  = \"PROD_AWS_ACCESS_KEY_ID\"\n      value = \"AKIAIOSFODNN7PRODKEY\"\
    \  # Long-lived production credentials!\n    }\n    environment_variable {\n      name  = \"PROD_AWS_SECRET_ACCESS_KEY\"\
    \n      value = \"wJalrXUtnFEMI/PRODKEY\"  # In plaintext!\n    }\n  }\n  # Keys visible in: CloudFormation, Terraform\
    \ state, console, API\n  # No expiration — valid until manually rotated\n  # No audit trail of who used them\n}\n"
  when_applies: Projects using AWS cloud infrastructure, CodePipeline, CodeBuild, or IAM
  sources: ["https://docs.aws.amazon.com/codepipeline/latest/userguide/welcome.html"]
- id: CR-AWS-CFN-003
  text: Use CDK for new infrastructure projects — it provides type safety, IDE support, and reusable constructs over raw CloudFormation
    YAML/JSON.
  why: Raw CloudFormation templates are verbose (a simple ECS service is 200+ lines of YAML), error-prone (no type checking,
    typos discovered at deploy time), and difficult to reuse (copy-paste between stacks). CDK generates CloudFormation from
    TypeScript/Python/Go with full type safety, IDE autocomplete, and composable constructs. A CDK construct library lets
    you define patterns once (VPC + subnets + NAT) and reuse across all stacks.
  how_to_do_right: Use CDK for all new infrastructure. Organize into stacks by lifecycle (networking, data, compute). Create
    custom constructs for organizational patterns (standard VPC, standard ECS service, standard RDS). Use cdk diff (equivalent
    to change sets) before every deploy. Keep escape hatches (CfnResource) for features CDK doesn't support yet.
  severity: medium
  technologies:
    library: [cdk]
    platform: [aws, cloudformation]
  domains:
    domain: [infrastructure]
    concern: [containers]
  example_good: "# CDK (TypeScript): ECS Fargate service in 20 lines\nimport * as ecs from 'aws-cdk-lib/aws-ecs';\nimport\
    \ * as ecs_patterns from 'aws-cdk-lib/aws-ecs-patterns';\n\nconst service = new ecs_patterns.ApplicationLoadBalancedFargateService(this,\
    \ 'Api', {\n  cluster,\n  desiredCount: 3,\n  taskImageOptions: {\n    image: ecs.ContainerImage.fromEcrRepository(repo,\
    \ 'latest'),\n    containerPort: 8080,\n    environment: { NODE_ENV: 'production' },\n  },\n  memoryLimitMiB: 1024,\n\
    \  cpu: 512,\n  circuitBreaker: { rollback: true },\n  healthCheck: {\n    command: ['CMD-SHELL', 'curl -f http://localhost:8080/health\
    \ || exit 1'],\n  },\n});\n// Type-safe, IDE autocomplete, 20 lines vs 200 lines CloudFormation\n"
  example_bad: '# Raw CloudFormation: same ECS Fargate service requires:

    # - AWS::ECS::Cluster (15 lines)

    # - AWS::ECS::TaskDefinition (40 lines)

    # - AWS::ECS::Service (35 lines)

    # - AWS::ElasticLoadBalancingV2::LoadBalancer (20 lines)

    # - AWS::ElasticLoadBalancingV2::TargetGroup (25 lines)

    # - AWS::ElasticLoadBalancingV2::Listener (15 lines)

    # - AWS::IAM::Role x2 (30 lines each)

    # - AWS::EC2::SecurityGroup x2 (20 lines each)

    # Total: ~250 lines of YAML with zero type safety

    '
  when_applies: Projects using AWS cloud infrastructure, CDK, or AWS CloudFormation stacks
  sources: ["https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/aws-resource-cloudformation-stackset.html"]
- id: CR-AWS-ECS-006
  text: Configure ECS task logging to CloudWatch with proper log retention and structured JSON format.
  why: Without container logging, debugging production issues is impossible — you have no visibility into application errors,
    request traces, or crash reasons. Default log retention is 'never expire', which accumulates costs indefinitely. Unstructured
    logs are difficult to search and alert on. Structured JSON logs enable CloudWatch Insights queries for instant root cause
    analysis.
  how_to_do_right: Configure the awslogs log driver in every container definition. Set log retention to 30-90 days (not infinite).
    Use structured JSON logging in your application. Create CloudWatch Logs Insights saved queries for common debugging scenarios.
    Set up metric filters for error patterns that trigger CloudWatch alarms.
  severity: high
  technologies:
    platform: [aws, ecs, cloudwatch]
  domains:
    domain: [infrastructure, observability]
    concern: [containers]
  example_good: "resource \"aws_ecs_task_definition\" \"api\" {\n  container_definitions = jsonencode([{\n    name  = \"api\"\
    \n    image = \"${aws_ecr_repository.api.repository_url}:latest\"\n    logConfiguration = {\n      logDriver = \"awslogs\"\
    \n      options = {\n        \"awslogs-group\"         = \"/ecs/api-service\"\n        \"awslogs-region\"        = \"\
    us-east-1\"\n        \"awslogs-stream-prefix\" = \"api\"\n        \"awslogs-create-group\"  = \"true\"\n      }\n    }\n\
    \  }])\n}\nresource \"aws_cloudwatch_log_group\" \"api\" {\n  name              = \"/ecs/api-service\"\n  retention_in_days\
    \ = 30  # Auto-delete after 30 days\n}\n\n# Application: structured JSON logging\n# {\"timestamp\":\"2026-02-17T10:00:00Z\"\
    ,\"level\":\"ERROR\",\"request_id\":\"abc123\",\n#  \"message\":\"Database connection timeout\",\"duration_ms\":5000}\n\
    #\n# CloudWatch Insights query:\n# fields @timestamp, message, request_id\n# | filter level = \"ERROR\"\n# | stats count(*)\
    \ by bin(5m)\n"
  example_bad: "# No log configuration — container output goes nowhere\nresource \"aws_ecs_task_definition\" \"api\" {\n \
    \ container_definitions = jsonencode([{\n    name  = \"api\"\n    image = \"my-api:latest\"\n    # No logConfiguration\
    \ — stdout/stderr lost on container exit\n  }])\n}\n# Production error occurs → \"What happened?\" → \"No logs\"\n# Or:\
    \ infinite retention → $500/month in CloudWatch Logs storage\n"
  when_applies: Projects using AWS cloud infrastructure, AWS ECS container service, or CloudWatch
  when_not_applies: throwaway prototypes, local dev scripts
  sources: ["https://docs.aws.amazon.com/AmazonECS/latest/developerguide/ecs-exec.html"]
- id: CR-AWS-EKS-004
  text: Use Karpenter instead of Cluster Autoscaler for EKS node scaling — it provisions the right instance type for each
    workload in seconds, not minutes.
  why: Cluster Autoscaler works with fixed Auto Scaling Groups — it can only scale node groups you have pre-defined. Adding
    a GPU workload requires creating a new node group first. Karpenter provisions nodes directly from the EC2 fleet API, choosing
    the optimal instance type for pending pods in real-time. It scales from 0 in 30-60 seconds (vs 3-5 minutes for Cluster
    Autoscaler) and consolidates underutilized nodes automatically.
  how_to_do_right: Install Karpenter via Helm. Define NodePool and EC2NodeClass resources that specify constraints (instance
    families, AZs, capacity type). Karpenter automatically selects the cheapest instance type that fits pending pod requests.
    Use spot instances for fault-tolerant workloads. Enable consolidation to bin-pack nodes and reduce waste.
  severity: medium
  technologies:
    library: [karpenter]
    platform: [aws, eks, kubernetes]
  domains:
    domain: [infrastructure, operations, performance]
    concern: [containers, cost]
  example_good: "# Karpenter NodePool — Karpenter picks the optimal instance\napiVersion: karpenter.sh/v1beta1\nkind: NodePool\n\
    metadata:\n  name: default\nspec:\n  template:\n    spec:\n      requirements:\n        - key: karpenter.sh/capacity-type\n\
    \          operator: In\n          values: [\"spot\", \"on-demand\"]\n        - key: kubernetes.io/arch\n          operator:\
    \ In\n          values: [\"amd64\"]\n        - key: karpenter.k8s.aws/instance-family\n          operator: In\n      \
    \    values: [\"m6i\", \"m6a\", \"m5\", \"c6i\", \"c6a\", \"r6i\"]\n        - key: karpenter.k8s.aws/instance-size\n \
    \         operator: In\n          values: [\"large\", \"xlarge\", \"2xlarge\"]\n      nodeClassRef:\n        name: default\n\
    \  disruption:\n    consolidationPolicy: WhenUnderutilized  # Auto bin-packing\n  limits:\n    cpu: \"100\"\n    memory:\
    \ 400Gi\n# Pod requests 4 CPU, 16 GiB → Karpenter launches m6i.xlarge\n# Pod requests 1 CPU, 32 GiB → Karpenter launches\
    \ r6i.xlarge\n# All within 30-60 seconds of pod pending\n"
  example_bad: '# Cluster Autoscaler with fixed node groups

    # Must pre-define every instance type combination:

    resource "aws_eks_node_group" "general" { instance_types = ["m5.xlarge"] }

    resource "aws_eks_node_group" "memory" { instance_types = ["r5.xlarge"] }

    resource "aws_eks_node_group" "compute" { instance_types = ["c5.xlarge"] }

    resource "aws_eks_node_group" "gpu" { instance_types = ["p3.2xlarge"] }

    # Scale-up takes 3-5 minutes (ASG → EC2 → node ready → pods scheduled)

    # Underutilized nodes are NOT consolidated — 4 nodes at 20% = waste

    '
  when_applies: Projects using AWS cloud infrastructure, AWS EKS managed Kubernetes, Karpenter, or Kubernetes-orchestrated
    deployments
  sources: ["https://docs.aws.amazon.com/eks/latest/userguide/network-policies.html"]
- id: CR-AWS-AR-001
  text: Use App Runner for simple web services with automatic scaling and zero infrastructure management — but know its limitations.
  why: 'App Runner deploys containers directly from ECR or source code (GitHub) with automatic HTTPS, scaling, and load balancing.
    No VPC, ALB, ECS cluster, or capacity planning needed. However, it has limitations: no persistent storage, max 25 vCPU
    per service, no gRPC support, limited VPC connectivity (egress only via VPC Connector), and higher per-vCPU cost than
    ECS Fargate. Use it for simple APIs and web services; use ECS for complex microservices.'
  how_to_do_right: 'Use App Runner for: internal tools, simple REST APIs, static site backends, prototypes, and services that
    need quick deployment. Configure auto-scaling (min 1, max based on traffic). Use VPC Connector for private resource access
    (RDS, ElastiCache). Migrate to ECS Fargate when you need: gRPC, service mesh, task placement constraints, or granular
    cost control.'
  severity: low
  technologies:
    library: [app runner]
    platform: [aws]
  domains:
    domain: [infrastructure, architecture]
    concern: [containers, serverless]
  example_good: "resource \"aws_apprunner_service\" \"api\" {\n  service_name = \"internal-api\"\n\n  source_configuration\
    \ {\n    image_repository {\n      image_identifier      = \"${aws_ecr_repository.api.repository_url}:latest\"\n     \
    \ image_repository_type = \"ECR\"\n      image_configuration {\n        port = \"8080\"\n        runtime_environment_variables\
    \ = {\n          NODE_ENV = \"production\"\n        }\n      }\n    }\n    auto_deployments_enabled = true  # Deploy on\
    \ new image push\n    authentication_configuration {\n      access_role_arn = aws_iam_role.apprunner_ecr.arn\n    }\n\
    \  }\n\n  instance_configuration {\n    cpu    = \"1024\"   # 1 vCPU\n    memory = \"2048\"   # 2 GB\n  }\n\n  auto_scaling_configuration_arn\
    \ = aws_apprunner_auto_scaling_configuration_version.api.arn\n\n  network_configuration {\n    egress_configuration {\n\
    \      egress_type       = \"VPC\"\n      vpc_connector_arn = aws_apprunner_vpc_connector.main.arn\n    }\n  }\n}\n\n\
    resource \"aws_apprunner_auto_scaling_configuration_version\" \"api\" {\n  auto_scaling_configuration_name = \"api-scaling\"\
    \n  max_concurrency = 100\n  max_size        = 10\n  min_size        = 1\n}\n"
  example_bad: '# Using App Runner for a complex microservices system

    # Limitations hit:

    # - No gRPC between services → must use REST (latency penalty)

    # - No service mesh → no mTLS, no circuit breaking

    # - VPC Connector adds latency to every DB call

    # - Max 25 vCPU per service → cannot handle peak traffic

    # - No task placement constraints → cannot colocate related services

    # Should have used ECS Fargate from the start

    '
  when_applies: Projects using AWS cloud infrastructure or App Runner
  when_not_applies: projects not using AWS or App Runner
  sources: ["https://docs.aws.amazon.com/app-runner/latest/dg/what-is-apprunner.html"]
