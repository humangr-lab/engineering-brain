- id: CR-TS-PERF-003
  text: Use skip scan for efficient DISTINCT queries on low-cardinality columns — TimescaleDB's skip scan jumps between distinct
    values instead of scanning every row.
  why: Standard PostgreSQL DISTINCT on a column requires scanning all rows and deduplicating them — O(N). For finding all
    unique sensor IDs in a table with 1B rows, this scans 1B rows to return 1000 values. TimescaleDB's skip scan optimization
    uses the index to jump from one distinct value to the next — O(K * log N) where K is the number of distinct values. For
    1000 sensors in 1B rows, skip scan performs ~1000 index seeks instead of 1B row scans — a 1,000,000x improvement. This
    optimization activates automatically when the planner detects a DISTINCT or GROUP BY on an indexed column with low cardinality
    relative to the table size.
  how_to_do_right: Create an index on the column used in DISTINCT or GROUP BY. Ensure the column has significantly fewer distinct
    values than total rows (at least 100:1 ratio). Use EXPLAIN ANALYZE to verify 'Skip Scan' appears in the plan. Skip scan
    works with both B-tree and hypertable chunk-aware indexes. For compound DISTINCT (sensor_id, metric_name), create a composite
    index.
  severity: medium
  technologies:
    platform: [timescaledb, postgresql]
  domains:
    domain: [architecture, performance]
    concern: [data, database, time_series]
  example_good: '-- Create index for skip scan

    CREATE INDEX idx_sensor_id ON sensor_data (sensor_id);


    -- DISTINCT with skip scan — milliseconds on billion-row table

    EXPLAIN ANALYZE

    SELECT DISTINCT sensor_id FROM sensor_data;

    -- Skip Scan using idx_sensor_id

    -- actual time=0.1..12.5 rows=1000 loops=1

    -- 1000 index seeks instead of 1B row scans


    -- Compound DISTINCT with composite index

    CREATE INDEX idx_sensor_metric ON sensor_data (sensor_id, metric_name);

    SELECT DISTINCT sensor_id, metric_name FROM sensor_data;

    -- Skip Scan on composite index


    -- Combined with time filter for bounded scope

    SELECT DISTINCT sensor_id FROM sensor_data

    WHERE time > now() - INTERVAL ''7 days'';

    -- Chunk exclusion + skip scan = scans only 7 chunks with skip scan

    '
  example_bad: '-- No index — full sequential scan for DISTINCT

    SELECT DISTINCT sensor_id FROM sensor_data;

    -- Seq Scan: 1B rows examined to return 1000 distinct values

    -- Time: 45 seconds


    -- DISTINCT on high-cardinality column — skip scan not beneficial

    SELECT DISTINCT session_id FROM events;

    -- 50M distinct values — skip scan does 50M index seeks

    -- Not much better than sequential scan on this cardinality

    '
