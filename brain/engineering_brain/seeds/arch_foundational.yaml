layer: principles
technology: General
domain: architecture
knowledge:
- id: CR-ARCH-SRP-001
  text: Single Responsibility Principle — A module should have one, and only one, reason to change.
  why: When a file handles HTTP routing AND business logic AND database queries, a schema migration forces changes to the
    same file as a UI redesign. Every team member edits the same file, merge conflicts spike, and a bug fix in query logic
    accidentally breaks request parsing. In production, a team at Shopify traced 40% of their deployment rollbacks to multi-responsibility
    service files where an unrelated change caused a regression.
  how_to_do_right: '1. Identify the actors (stakeholders) who request changes to your module.

    2. If more than one actor drives changes, split the module along actor boundaries.

    3. Routes/controllers: parse HTTP, call service, return response. Zero business logic.

    4. Services: orchestrate domain logic, enforce invariants. Zero HTTP or SQL awareness.

    5. Repositories: encapsulate data access. Zero business rules.

    6. Litmus test: can you describe the module''s purpose in one sentence without using "and"?

    '
  severity: critical
  technologies:
    lang: [python, java, typescript, go]
  domains:
    domain: [architecture]
    concern: [design, maintainability]
  example_good: "# routes/orders.py — ONLY handles HTTP\n@router.post(\"/orders\")\ndef create_order(request: CreateOrderRequest):\n\
    \    result = order_service.create(request.customer_id, request.items)\n    return OrderResponse.from_domain(result),\
    \ 201\n\n# services/order_service.py — ONLY orchestrates business logic\nclass OrderService:\n    def __init__(self, repo:\
    \ OrderRepository, inventory: InventoryService):\n        self.repo = repo\n        self.inventory = inventory\n\n   \
    \ def create(self, customer_id: str, items: list[OrderItem]) -> Order:\n        self.inventory.reserve(items)\n      \
    \  order = Order.create(customer_id, items)\n        self.repo.save(order)\n        return order\n\n# repositories/order_repository.py\
    \ — ONLY handles persistence\nclass OrderRepository:\n    def save(self, order: Order) -> None:\n        self.session.add(OrderModel.from_domain(order))\n\
    \        self.session.commit()\n"
  example_bad: "# god_handler.py — handles HTTP, business logic, AND database queries\n@app.route(\"/orders\", methods=[\"\
    POST\"])\ndef create_order():\n    data = request.json\n    # HTTP parsing mixed with validation\n    if not data.get(\"\
    customer_id\"):\n        return jsonify({\"error\": \"missing customer\"}), 400\n    # Business logic embedded in route\n\
    \    for item in data[\"items\"]:\n        row = db.execute(\"SELECT stock FROM inventory WHERE sku = %s\", (item[\"sku\"\
    ],))\n        if row[\"stock\"] < item[\"qty\"]:\n            return jsonify({\"error\": f\"insufficient stock for {item['sku']}\"\
    }), 409\n    # Direct SQL in route handler\n    db.execute(\n        \"INSERT INTO orders (customer_id, total) VALUES\
    \ (%s, %s)\",\n        (data[\"customer_id\"], sum(i[\"price\"] * i[\"qty\"] for i in data[\"items\"]))\n    )\n    db.execute(\"\
    UPDATE inventory SET stock = stock - %s WHERE sku = %s\", ...)\n    return jsonify({\"status\": \"created\"}), 201\n"
  when_applies: Any system involving systems requiring structural design decisions, code undergoing design or refactoring
  when_not_applies: small scripts under 100 lines, single-purpose utilities
  sources: ["https://martinfowler.com/bliki/SingleResponsibilityPrinciple.html"]
- id: CR-ARCH-OCP-001
  text: Open-Closed Principle — Software entities should be open for extension but closed for modification.
  why: Every time you modify existing working code to add a new feature, you risk breaking existing functionality. In payment
    processing, adding a new payment method should not require editing the core checkout flow. A fintech company experienced
    a production outage when adding Apple Pay because the developer modified the shared payment switch-case and accidentally
    broke the Stripe integration path that was already tested and deployed.
  how_to_do_right: '1. Define a stable abstraction (Protocol/ABC/Interface) for the extension point.

    2. New behavior is added by creating a new implementation, not editing existing ones.

    3. Use a registry or plugin system to discover implementations at runtime.

    4. Strategy pattern for behavioral extension; decorator pattern for wrapping behavior.

    5. Configuration-driven extension: YAML/env selects which implementation to use.

    6. Test the abstraction contract, not individual implementations in the core.

    '
  severity: critical
  technologies:
    lang: [python, java, typescript, go]
  domains:
    domain: [architecture]
    concern: [design, extensibility]
  example_good: "# payment/base.py — stable abstraction (closed for modification)\nclass PaymentProcessor(Protocol):\n   \
    \ def charge(self, amount: Decimal, token: str) -> PaymentResult: ...\n    def refund(self, transaction_id: str) -> RefundResult:\
    \ ...\n\n# payment/stripe.py — extension (open for extension)\nclass StripeProcessor:\n    def charge(self, amount: Decimal,\
    \ token: str) -> PaymentResult:\n        return stripe.PaymentIntent.create(amount=int(amount * 100), ...)\n\n# payment/apple_pay.py\
    \ — NEW extension, zero changes to existing code\nclass ApplePayProcessor:\n    def charge(self, amount: Decimal, token:\
    \ str) -> PaymentResult:\n        return apple_pay_sdk.process(amount=amount, token=token)\n\n# payment/registry.py —\
    \ plugin discovery\nPROCESSORS: dict[str, type[PaymentProcessor]] = {}\n\ndef register(name: str):\n    def decorator(cls):\n\
    \        PROCESSORS[name] = cls\n        return cls\n    return decorator\n\ndef get_processor(name: str) -> PaymentProcessor:\n\
    \    return PROCESSORS[name]()\n"
  example_bad: "# payment.py — every new payment method requires modifying this file\ndef process_payment(method: str, amount:\
    \ Decimal, token: str):\n    if method == \"stripe\":\n        return stripe.PaymentIntent.create(amount=int(amount *\
    \ 100), ...)\n    elif method == \"paypal\":\n        return paypal.execute_payment(amount=str(amount), ...)\n    elif\
    \ method == \"apple_pay\":  # Added here — risk breaking stripe/paypal paths\n        return apple_pay_sdk.process(amount=amount,\
    \ token=token)\n    # Every new method = edit this function = risk regression\n    else:\n        raise ValueError(f\"\
    Unknown method: {method}\")\n"
  when_applies: Any system involving systems requiring structural design decisions, code undergoing design or refactoring
  when_not_applies: small scripts under 100 lines, single-purpose utilities
  sources: ["https://martinfowler.com/bliki/OpenClosedPrinciple.html"]
- id: CR-ARCH-LSP-001
  text: Liskov Substitution Principle — Subtypes must be substitutable for their base types without altering the correctness
    of the program.
  why: When a subclass violates the behavioral contract of its parent, any code using the parent type through polymorphism
    will silently produce wrong results. The classic Square-Rectangle violation causes area calculations to fail. In production,
    a ReadOnlyCache that extends Cache but throws on write() crashes code that legitimately calls write() on a Cache reference.
    The real danger is that LSP violations are silent — tests pass on the base type, fail only when the subtype is injected.
  how_to_do_right: '1. Preconditions cannot be strengthened in a subtype (accept at least what parent accepts).

    2. Postconditions cannot be weakened in a subtype (guarantee at least what parent guarantees).

    3. Invariants of the parent must be preserved by the subtype.

    4. If a subtype throws exceptions the parent does not, it violates LSP.

    5. Use composition instead of inheritance when behavioral contracts differ.

    6. Design by Contract: document what callers can assume from the base type.

    '
  severity: critical
  technologies:
    lang: [python, java, typescript, csharp]
  domains:
    domain: [architecture, quality]
    concern: [design, type_safety]
  example_good: "# Separate interfaces for separate capabilities\nclass Readable(Protocol):\n    def get(self, key: str) ->\
    \ bytes | None: ...\n\nclass Writable(Protocol):\n    def set(self, key: str, value: bytes, ttl: int = 0) -> None: ...\n\
    \nclass Cache(Readable, Writable):\n    \"\"\"Full read-write cache.\"\"\"\n    pass\n\nclass RedisCache(Cache):\n   \
    \ def get(self, key: str) -> bytes | None:\n        return self.client.get(key)\n    def set(self, key: str, value: bytes,\
    \ ttl: int = 0) -> None:\n        self.client.set(key, value, ex=ttl or None)\n\n# Read-only cache does NOT inherit from\
    \ Cache — no LSP violation\nclass CDNCache(Readable):\n    def get(self, key: str) -> bytes | None:\n        return self.cdn_client.fetch(key)\n\
    \n# Functions declare exactly what they need\ndef serve_request(cache: Readable) -> Response:  # works with both\n   \
    \ data = cache.get(\"page\")\n    return Response(data)\n"
  example_bad: "class Cache:\n    def get(self, key: str) -> bytes | None: ...\n    def set(self, key: str, value: bytes)\
    \ -> None: ...\n\nclass ReadOnlyCache(Cache):\n    def get(self, key: str) -> bytes | None:\n        return self.cdn.fetch(key)\n\
    \    def set(self, key: str, value: bytes) -> None:\n        raise NotImplementedError(\"Read-only cache cannot write\"\
    )\n        # LSP VIOLATION: callers of Cache.set() will crash at runtime\n\n# This code works with Cache but CRASHES with\
    \ ReadOnlyCache\ndef update_user_session(cache: Cache, session_id: str, data: bytes):\n    cache.set(session_id, data)\
    \  # NotImplementedError at runtime!\n"
  when_applies: Any system involving systems requiring structural design decisions, code undergoing design or refactoring
  when_not_applies: small scripts under 100 lines, single-purpose utilities
  sources: ["https://martinfowler.com/bliki/LiskovSubstitutionPrinciple.html"]
- id: CR-ARCH-ISP-001
  text: Interface Segregation Principle — Clients should not be forced to depend on methods they do not use.
  why: A fat interface forces every implementor to handle methods irrelevant to them. When UserRepository has find_by_email(),
    find_by_phone(), search_full_text(), and generate_report(), the SimpleFileUserStore must stub out search_full_text() and
    generate_report() with NotImplementedError. Every new method added to the interface forces changes to ALL implementations.
    In a microservices codebase, this means a search feature change requires redeploying the file-storage service even though
    it never uses search.
  how_to_do_right: '1. Define small, focused interfaces (Protocols in Python, interfaces in Java/TS).

    2. Each interface represents one client''s needs, not one implementor''s capabilities.

    3. Implementors compose multiple small interfaces, not one large one.

    4. Use Protocol/ABC per capability: Readable, Writable, Searchable, Exportable.

    5. Clients declare the minimal interface they require in their type hints.

    6. Rule of thumb: if an interface has >5 methods, it probably needs splitting.

    '
  severity: high
  technologies:
    lang: [python, java, typescript, go]
  domains:
    domain: [architecture]
    concern: [design, decoupling]
  example_good: "# Small, focused interfaces — each client depends only on what it uses\nclass UserReader(Protocol):\n   \
    \ def find_by_id(self, user_id: str) -> User | None: ...\n    def find_by_email(self, email: str) -> User | None: ...\n\
    \nclass UserWriter(Protocol):\n    def save(self, user: User) -> None: ...\n    def delete(self, user_id: str) -> None:\
    \ ...\n\nclass UserSearcher(Protocol):\n    def search(self, query: str, limit: int = 10) -> list[User]: ...\n\n# Auth\
    \ service only needs reading\nclass AuthService:\n    def __init__(self, users: UserReader): ...\n\n# Admin panel needs\
    \ reading + searching\nclass AdminPanel:\n    def __init__(self, users: UserReader, searcher: UserSearcher): ...\n\n#\
    \ PostgreSQL implements all three\nclass PostgresUserRepo(UserReader, UserWriter, UserSearcher):\n    def find_by_id(self,\
    \ user_id: str) -> User | None: ...\n    def save(self, user: User) -> None: ...\n    def search(self, query: str, limit:\
    \ int = 10) -> list[User]: ...\n"
  example_bad: "# Fat interface — every implementor must handle everything\nclass UserRepository(ABC):\n    @abstractmethod\n\
    \    def find_by_id(self, user_id: str) -> User | None: ...\n    @abstractmethod\n    def find_by_email(self, email: str)\
    \ -> User | None: ...\n    @abstractmethod\n    def save(self, user: User) -> None: ...\n    @abstractmethod\n    def\
    \ delete(self, user_id: str) -> None: ...\n    @abstractmethod\n    def search_full_text(self, query: str) -> list[User]:\
    \ ...\n    @abstractmethod\n    def generate_csv_report(self) -> bytes: ...\n    @abstractmethod\n    def sync_to_crm(self)\
    \ -> None: ...\n\n# Simple file store forced to implement search, reports, CRM sync\nclass FileUserStore(UserRepository):\n\
    \    def search_full_text(self, query: str) -> list[User]:\n        raise NotImplementedError(\"File store does not support\
    \ search\")\n    def generate_csv_report(self) -> bytes:\n        raise NotImplementedError()\n    def sync_to_crm(self)\
    \ -> None:\n        raise NotImplementedError()\n"
  when_applies: Any system involving systems requiring structural design decisions, code undergoing design or refactoring
  when_not_applies: small scripts under 100 lines, single-purpose utilities
  sources: ["https://martinfowler.com/bliki/InterfaceSegregationPrinciple.html"]
- id: CR-ARCH-DIP-001
  text: Dependency Inversion Principle — High-level policy modules should not depend on low-level detail modules. Both should
    depend on abstractions.
  why: When OrderService directly imports PostgresRepository, you cannot test OrderService without a running database. You
    cannot swap PostgreSQL for DynamoDB without rewriting the service. You cannot run the service in a different environment
    (Lambda vs container) without code changes. The business rules become hostage to infrastructure decisions. In production,
    this manifests as 45-minute CI pipelines because every test requires Docker containers for databases, caches, and message
    brokers.
  how_to_do_right: '1. High-level modules define the abstractions (interfaces/protocols) they need.

    2. Low-level modules implement those abstractions.

    3. A composition root (main.py, dependency injection container) wires implementations to abstractions.

    4. Constructor injection: pass dependencies as __init__ parameters, not global imports.

    5. Tests inject fakes/mocks that implement the same abstraction.

    6. The dependency arrow always points inward (toward the domain).

    '
  severity: critical
  technologies:
    lang: [python, java, typescript, go]
  domains:
    domain: [architecture]
    concern: [design, testability]
  example_good: "# domain/ports.py — abstraction defined by the domain\nclass OrderRepository(Protocol):\n    def save(self,\
    \ order: Order) -> None: ...\n    def find_by_id(self, order_id: str) -> Order | None: ...\n\nclass NotificationSender(Protocol):\n\
    \    def send(self, recipient: str, message: str) -> None: ...\n\n# domain/order_service.py — depends on abstractions,\
    \ not implementations\nclass OrderService:\n    def __init__(self, repo: OrderRepository, notifier: NotificationSender):\n\
    \        self.repo = repo\n        self.notifier = notifier\n\n    def place_order(self, customer_id: str, items: list)\
    \ -> Order:\n        order = Order.create(customer_id, items)\n        self.repo.save(order)\n        self.notifier.send(customer_id,\
    \ f\"Order {order.id} confirmed\")\n        return order\n\n# infrastructure/postgres_repo.py — implements the abstraction\n\
    class PostgresOrderRepo:\n    def save(self, order: Order) -> None: ...\n\n# main.py — composition root wires everything\n\
    repo = PostgresOrderRepo(db_session)\nnotifier = EmailNotifier(smtp_client)\nservice = OrderService(repo=repo, notifier=notifier)\n\
    \n# tests — inject fakes\nservice = OrderService(repo=FakeOrderRepo(), notifier=FakeNotifier())\n"
  example_bad: "# order_service.py — high-level module directly depends on low-level details\nfrom infrastructure.postgres\
    \ import get_db_session\nfrom infrastructure.smtp import send_email\nfrom infrastructure.stripe import charge_card\n\n\
    class OrderService:\n    def place_order(self, customer_id: str, items: list):\n        db = get_db_session()  # Cannot\
    \ test without PostgreSQL running\n        # Business logic tangled with infrastructure\n        db.execute(\"INSERT INTO\
    \ orders ...\")\n        send_email(customer_id, \"Order confirmed\")  # Cannot test without SMTP\n        charge_card(customer_id,\
    \ total)  # Cannot test without Stripe\n\n# Testing requires ALL infrastructure running — 45-minute CI pipeline\n"
  when_applies: Any system involving systems requiring structural design decisions, code undergoing design or refactoring
  when_not_applies: small scripts under 100 lines, single-purpose utilities
  sources: ["https://martinfowler.com/bliki/DependencyInjection.html"]
- id: CR-ARCH-GRS-001
  text: Information Expert — Assign responsibility to the class that has the information needed to fulfill it.
  why: When computation is separated from the data it operates on, you get feature envy — methods in class A that spend most
    of their time accessing data from class B. This causes tight coupling (A depends on B's internal structure), fragile code
    (changes to B's fields break A), and scattered logic (the same data is manipulated in multiple places). In e-commerce,
    calculating order totals outside the Order class means every caller reimplements discount logic differently.
  how_to_do_right: '1. Ask: which object has the data needed for this computation?

    2. Place the method on that object.

    3. If data is spread across objects, the one with the MOST data gets the method.

    4. The expert may delegate sub-computations to other experts.

    5. Watch for anemic domain models: if your objects are just getters/setters, logic is misplaced.

    '
  severity: high
  technologies:
    lang: [python, java, typescript]
  domains:
    domain: [architecture]
    concern: [design, ddd]
  example_good: "class Order:\n    items: list[OrderItem]\n    discount: Discount | None\n\n    def total(self) -> Decimal:\n\
    \        \"\"\"Order has items + discount — it is the information expert.\"\"\"\n        subtotal = sum(item.line_total()\
    \ for item in self.items)\n        if self.discount:\n            subtotal = self.discount.apply(subtotal)\n        return\
    \ subtotal\n\nclass OrderItem:\n    product: Product\n    quantity: int\n\n    def line_total(self) -> Decimal:\n    \
    \    \"\"\"OrderItem has product + quantity — it computes its own line total.\"\"\"\n        return self.product.price\
    \ * self.quantity\n"
  example_bad: "# OrderTotalCalculator — separate class reaching into Order's internals\nclass OrderTotalCalculator:\n   \
    \ def calculate(self, order: Order) -> Decimal:\n        total = Decimal(\"0\")\n        for item in order.items:    \
    \      # Reaching into Order\n            price = item.product.price     # Reaching into OrderItem\n            total\
    \ += price * item.quantity  # Reaching into OrderItem\n        if order.discount:                 # Reaching into Order\n\
    \            total = order.discount.apply(total)\n        return total\n# Feature envy: this method knows everything about\
    \ Order's internals\n# If Order.items changes to a dict, this class breaks\n"
  when_applies: Any system involving systems requiring structural design decisions, code undergoing design or refactoring
  when_not_applies: small scripts under 100 lines, single-purpose utilities
  sources: ["https://c2.com/cgi/wiki?GraspPatterns"]
- id: CR-ARCH-GRS-002
  text: Creator — Assign object creation responsibility to the class that has the initialization data or closely uses the
    created object.
  why: Scattering object creation across the codebase leads to inconsistent initialization. If an OrderItem requires validation
    (quantity > 0, valid product reference), creating it in 12 different places means the validation is either duplicated
    12 times or missing in 11. A centralized creator ensures consistent, valid object construction and serves as a single
    place to change creation logic.
  how_to_do_right: '1. B creates A when: B contains A, B aggregates A, B closely uses A, or B has the data to initialize A.

    2. Use factory methods for complex creation with validation.

    3. Use the Builder pattern when many optional parameters exist.

    4. Ensure invariants are enforced at creation time (fail fast).

    '
  severity: medium
  technologies:
    lang: [python, java, typescript]
  domains:
    domain: [architecture]
    concern: [design, ddd]
  example_good: "class Order:\n    \"\"\"Order creates OrderItems because it aggregates them and has the context.\"\"\"\n\
    \    def __init__(self):\n        self.items: list[OrderItem] = []\n\n    def add_item(self, product: Product, quantity:\
    \ int) -> OrderItem:\n        if quantity <= 0:\n            raise ValueError(\"Quantity must be positive\")\n       \
    \ if not product.is_available():\n            raise ValueError(f\"Product {product.sku} is out of stock\")\n        item\
    \ = OrderItem(product=product, quantity=quantity, order=self)\n        self.items.append(item)\n        return item\n\n\
    # Usage — creation is validated and consistent everywhere\norder = Order()\norder.add_item(product=laptop, quantity=2)\n"
  example_bad: '# OrderItem created all over the codebase with inconsistent validation

    # In routes/orders.py:

    item = OrderItem(product_id=data["pid"], quantity=data["qty"])

    order.items.append(item)


    # In services/cart.py (different validation):

    item = OrderItem(product_id=pid, quantity=max(1, qty))

    order.items.append(item)


    # In tests/test_orders.py (no validation at all):

    item = OrderItem(product_id="xxx", quantity=-5)  # Invalid but no error!

    '
  when_applies: Any system involving systems requiring structural design decisions, code undergoing design or refactoring
  when_not_applies: small scripts under 100 lines, single-purpose utilities
  sources: ["https://martinfowler.com/articles/injection.html"]
- id: CR-ARCH-GRS-003
  text: Controller — Use thin controllers that delegate to services. Controllers handle protocol translation, not business
    logic.
  why: Fat controllers accumulate business rules, validation, authorization, logging, and error handling into monolithic route
    handlers. They become untestable without spinning up the full HTTP stack, impossible to reuse in CLI or message-handler
    contexts, and grow to thousands of lines. When the same business logic is needed via REST, GraphQL, and CLI, fat controllers
    force duplication.
  how_to_do_right: '1. Controller responsibilities: parse input, validate format, call service, format output, handle HTTP
    status codes.

    2. Service responsibilities: enforce business rules, coordinate domain objects, enforce invariants.

    3. Controllers should be ~10-15 lines: parse, call, respond.

    4. Test business logic through services (fast, no HTTP). Test controllers for routing and serialization.

    '
  severity: high
  technologies:
    lang: [python, java, typescript, go]
  domains:
    domain: [architecture]
    concern: [design, web]
  example_good: "# Thin controller — protocol translation only\n@router.post(\"/orders\", status_code=201)\nasync def create_order(body:\
    \ CreateOrderRequest, service: OrderService = Depends()):\n    order = await service.create(\n        customer_id=body.customer_id,\n\
    \        items=[OrderItemInput(sku=i.sku, qty=i.quantity) for i in body.items],\n    )\n    return OrderResponse.from_domain(order)\n\
    \n# Same service works from CLI, tests, message handlers\n# No HTTP dependency in business logic\n"
  example_bad: "@app.route(\"/orders\", methods=[\"POST\"])\ndef create_order():\n    data = request.json\n    # Validation\
    \ in controller\n    if not data.get(\"customer_id\"):\n        return {\"error\": \"customer_id required\"}, 400\n  \
    \  # Business logic in controller\n    customer = db.query(Customer).get(data[\"customer_id\"])\n    if customer.is_suspended:\n\
    \        return {\"error\": \"suspended account\"}, 403\n    # Database queries in controller\n    for item in data[\"\
    items\"]:\n        product = db.query(Product).filter_by(sku=item[\"sku\"]).first()\n        if product.stock < item[\"\
    qty\"]:\n            return {\"error\": f\"insufficient stock\"}, 409\n        product.stock -= item[\"qty\"]\n    order\
    \ = Order(customer_id=data[\"customer_id\"])\n    db.add(order)\n    db.commit()\n    # 40+ lines of tangled logic — cannot\
    \ reuse from CLI or tests\n"
  when_applies: Any system involving systems requiring structural design decisions, code undergoing design or refactoring
  when_not_applies: small scripts under 100 lines, single-purpose utilities
  sources: ["https://refactoring.guru/design-patterns/observer"]
- id: CR-ARCH-GRS-004
  text: Low Coupling — Minimize dependencies between modules. Measure with Ca (afferent), Ce (efferent), and Instability =
    Ce/(Ca+Ce).
  why: 'High coupling means a change in module A forces changes in modules B, C, and D. This creates ripple effects where
    a simple bug fix requires modifying 15 files. The instability metric (Ce/(Ca+Ce)) quantifies this: a module with instability=1.0
    depends on everything but nothing depends on it (easy to change). A module with instability=0.0 is depended upon by everything
    (hard to change — it MUST be stable). The Stable Dependencies Principle says: depend in the direction of stability.'
  how_to_do_right: '1. Measure afferent coupling (Ca): how many modules depend on this module.

    2. Measure efferent coupling (Ce): how many modules this module depends on.

    3. Instability I = Ce/(Ca+Ce). Depend on modules with LOWER instability than yours.

    4. Stable modules (I close to 0) should be abstract (interfaces, protocols).

    5. Unstable modules (I close to 1) should be concrete (implementations).

    6. Maximum pain: concrete + stable (I=0, high Ca) = hard to change but forced to.

    '
  severity: high
  technologies:
    lang: [python, java, typescript, go]
  domains:
    domain: [architecture, observability]
    concern: [design, metrics]
  example_good: "# models/order.py — stable (many modules depend on it), abstract\n# Ca=8, Ce=1, I=0.11 — correctly stable\
    \ and abstract\nclass Order:\n    \"\"\"Pure domain model. No framework dependencies.\"\"\"\n    id: str\n    customer_id:\
    \ str\n    items: list[OrderItem]\n    status: OrderStatus\n\n# adapters/stripe_payment.py — unstable (nothing depends\
    \ on it), concrete\n# Ca=0, Ce=4, I=1.0 — correctly unstable and concrete\nclass StripePaymentAdapter:\n    \"\"\"Depends\
    \ on stripe SDK, domain models, config. Nothing depends on this.\"\"\"\n    def charge(self, order: Order) -> PaymentResult:\n\
    \        return stripe.PaymentIntent.create(...)\n"
  example_bad: "# utils.py — unstable (depends on everything) BUT stable (everything depends on it)\n# Ca=15, Ce=12, I=0.44\
    \ — THE ZONE OF PAIN\nimport stripe                    # Payment dependency\nimport boto3                     # AWS dependency\n\
    from models import Order, User   # Domain dependency\nfrom config import settings      # Config dependency\nimport smtplib\
    \                   # Email dependency\n\ndef process_and_notify(order_id: str):\n    \"\"\"Everyone imports utils.py,\
    \ but utils.py imports everything.\n    Changing ANY dependency breaks ALL callers.\"\"\"\n    order = db.query(Order).get(order_id)\n\
    \    stripe.PaymentIntent.create(...)\n    boto3.client(\"s3\").put_object(...)\n    smtplib.SMTP().send_message(...)\n"
  when_applies: Any system involving systems requiring structural design decisions, code undergoing design or refactoring
  when_not_applies: small scripts under 100 lines, single-purpose utilities
  sources: ["https://martinfowler.com/bliki/TellDontAsk.html"]
- id: CR-ARCH-GRS-005
  text: High Cohesion — Elements within a module should be strongly related. Functional cohesion (all elements contribute
    to a single well-defined task) is the ideal.
  why: 'Low cohesion means a module contains unrelated functionality — a UserService that handles user CRUD, email sending,
    PDF report generation, and CSV import. Changes to email templates affect the same module as changes to user validation.
    The module grows without bound, has too many dependencies, and no one can understand it in full. The cohesion spectrum
    from best to worst: Functional > Sequential > Communicational > Temporal > Logical > Coincidental.'
  how_to_do_right: '1. Functional cohesion: every element contributes to ONE well-defined task (best).

    2. If a class needs to import from 5+ unrelated domains, it lacks cohesion.

    3. Split by domain concern: UserAuthService, UserProfileService, UserExportService.

    4. LCOM4 metric: count connected components in method-field graph. LCOM4 > 1 = split needed.

    5. Symptoms of low cohesion: file >500 lines, >10 public methods, >8 constructor params.

    '
  severity: high
  technologies:
    lang: [python, java, typescript]
  domains:
    domain: [architecture]
    concern: [design, maintainability]
  example_good: "# High functional cohesion — each module does ONE thing well\nclass UserAuthService:\n    \"\"\"All elements\
    \ relate to authentication.\"\"\"\n    def register(self, email: str, password: str) -> User: ...\n    def login(self,\
    \ email: str, password: str) -> AuthToken: ...\n    def verify_token(self, token: str) -> User: ...\n    def reset_password(self,\
    \ email: str) -> None: ...\n\nclass UserProfileService:\n    \"\"\"All elements relate to profile management.\"\"\"\n\
    \    def update_profile(self, user_id: str, data: ProfileUpdate) -> User: ...\n    def upload_avatar(self, user_id: str,\
    \ image: bytes) -> str: ...\n    def get_profile(self, user_id: str) -> UserProfile: ...\n"
  example_bad: "# Coincidental cohesion — unrelated things dumped together\nclass UserService:\n    def register(self, email,\
    \ password): ...          # Auth\n    def login(self, email, password): ...             # Auth\n    def send_welcome_email(self,\
    \ user_id): ...        # Email\n    def generate_invoice_pdf(self, user_id): ...      # Billing\n    def export_users_csv(self):\
    \ ...                   # Export\n    def calculate_churn_rate(self): ...               # Analytics\n    def sync_to_mailchimp(self,\
    \ user_id): ...         # Marketing\n    def compress_avatar(self, image: bytes): ...      # Image processing\n    # 8\
    \ methods touching 6 different domains — zero cohesion\n"
  when_applies: Any system involving systems requiring structural design decisions, code undergoing design or refactoring
  when_not_applies: small scripts under 100 lines, single-purpose utilities
  sources: ["https://martinfowler.com/eaaCatalog/serviceLayer.html"]
- id: CR-ARCH-CNW-001
  text: Conway's Law — Organizations which design systems are constrained to produce designs which are copies of the communication
    structures of these organizations.
  why: If your frontend team, backend team, and database team are separate, you will get a three-tier architecture — regardless
    of whether that is optimal. If two teams cannot easily communicate, their systems will have a well-defined (often awkward)
    interface between them. The Inverse Conway Maneuver deliberately restructures teams to produce the desired architecture.
    Spotify's squad model was designed to produce loosely-coupled services. Amazon's two-pizza teams produce microservices.
    Monolithic teams produce monoliths.
  how_to_do_right: '1. Recognize that architecture follows team structure, not the other way around.

    2. Inverse Conway Maneuver: structure teams around desired architecture boundaries.

    3. Cross-functional teams (frontend + backend + DB) produce full-stack services.

    4. Platform teams produce shared infrastructure; product teams produce features.

    5. When team boundaries shift, expect the architecture to shift. Plan for it.

    6. If you want microservices, create small autonomous teams first.

    '
  severity: high
  technologies:
    lang: [general]
  domains:
    domain: [architecture, management]
    concern: [organization]
  example_good: '# Inverse Conway Maneuver — team structure mirrors desired architecture

    #

    # Desired: Microservices with domain boundaries

    # Team structure:

    #   Team "Orders" (2 FE + 2 BE + 1 DBA) → Orders Service

    #   Team "Payments" (1 FE + 2 BE + 1 DBA) → Payments Service

    #   Team "Platform" (3 SRE) → Shared infra (CI/CD, monitoring)

    #

    # Each team owns their service end-to-end:

    #   - Their own database

    #   - Their own deployment pipeline

    #   - Their own on-call rotation

    #   - Clear API contract with other teams

    '
  example_bad: '# Conway''s Law producing accidental architecture

    #

    # Org structure:

    #   "Frontend Team" (5 devs) → All UI code in one monolithic React app

    #   "Backend Team" (5 devs) → One giant Django monolith

    #   "DBA Team" (2 devs) → One shared database

    #

    # Result:

    #   - Three-tier architecture forced by team structure

    #   - Frontend team blocks on Backend team for every API change

    #   - DBA team is bottleneck for all schema changes

    #   - Cannot decompose into microservices without restructuring teams

    '
  when_applies: Any system involving systems requiring structural design decisions
  when_not_applies: small scripts under 100 lines, single-purpose utilities
  sources: ["https://martinfowler.com/bliki/ConwaysLaw.html"]
- id: CR-ARCH-LHM-001
  text: Lehman's Laws of Software Evolution — Programs that are used must change, and changing them increases their complexity
    unless work is done to reduce it.
  why: 'Law I (Continuing Change): software that is not adapted to its environment becomes progressively less useful. Law
    II (Increasing Complexity): as software evolves, its complexity increases UNLESS work is done to reduce it. Law VI (Conservation
    of Familiarity): the incremental change in each release must not exceed the team''s capacity to absorb it. Ignoring Law
    II is how codebases accumulate technical debt until they become unmaintainable. Ignoring Law VI is how releases get so
    large they are un-reviewable and full of bugs.'
  how_to_do_right: '1. Budget time for complexity reduction in every sprint (20% rule).

    2. Track cyclomatic complexity, cognitive complexity, and coupling metrics over time.

    3. If complexity trends upward for 3 consecutive releases, stop features and refactor.

    4. Keep releases small enough that every team member can understand the full diff.

    5. Refactoring is not a separate phase — it is continuous, like cleaning a kitchen.

    6. Architecture Decision Records (ADRs) explain WHY decisions were made, reducing re-learning.

    '
  severity: medium
  technologies:
    lang: [general]
  domains:
    domain: [architecture, management]
    concern: [evolution]
  example_good: "# Continuous complexity management\n# 1. Measure in CI pipeline\n# pyproject.toml\n[tool.radon]\ncc_min =\
    \ \"C\"  # Fail on complexity > C grade\nmi_min = \"B\"  # Fail on maintainability < B grade\n\n# 2. Track over time\n\
    # scripts/complexity_report.py\ndef track_complexity():\n    current = measure_complexity(\"src/\")\n    history = load_history(\"\
    metrics/complexity.json\")\n    history.append({\"date\": today(), \"avg_cc\": current.avg_cc})\n    if len(history) >=\
    \ 3 and all_increasing(history[-3:]):\n        alert(\"Complexity trending up for 3 releases — schedule refactoring\"\
    )\n\n# 3. Small, reviewable releases\n# Each PR: <400 lines changed, <10 files, one logical change\n"
  example_bad: '# Ignoring Lehman''s Laws

    # Release 1.0: clean, 5k lines, avg complexity 3.2

    # Release 2.0: 15k lines, avg complexity 5.1 (features only, no refactoring)

    # Release 3.0: 35k lines, avg complexity 8.7 (nobody understands the codebase)

    # Release 4.0: 60k lines, avg complexity 14.3 (3 critical bugs per release)

    # Release 5.0: "we need a rewrite" — $2M+ cost

    #

    # Root cause: zero investment in complexity reduction for 4 releases

    '
  when_applies: Any system involving systems requiring structural design decisions
  when_not_applies: small scripts under 100 lines, single-purpose utilities
  sources: ["https://martinfowler.com/bliki/CQRS.html"]
- id: CR-ARCH-LOD-001
  text: Law of Demeter (Principle of Least Knowledge) — A method should only talk to its immediate friends, not to strangers
    reached through friends.
  why: 'Method chains like order.getCustomer().getAddress().getCity() create hidden coupling to the entire object graph. If
    Address changes its structure, every caller that navigates through Customer to Address breaks. The coupling is transitive
    and invisible — the calling module does not import Address, but depends on its structure. In production, this manifests
    as shotgun surgery: a simple field rename requires changes in 40+ files that navigate to that field through chains.'
  how_to_do_right: '1. A method M of object O should only call methods on: O itself, M''s parameters, objects created by M,
    O''s direct components.

    2. Replace chains with delegation: order.shipping_city() instead of order.customer.address.city.

    3. Tell, Don''t Ask: instead of getting data and deciding, tell the object to do the work.

    4. Exception: fluent APIs (builder pattern) are OK because they return the same object.

    5. DTOs/data classes are exempt — they are data containers, not behavior containers.

    '
  severity: medium
  technologies:
    lang: [python, java, typescript]
  domains:
    domain: [architecture]
    concern: [design, coupling]
  example_good: "class Order:\n    def shipping_city(self) -> str:\n        \"\"\"Delegate — callers don't need to know the\
    \ object graph.\"\"\"\n        return self.customer.shipping_city()\n\n    def is_eligible_for_free_shipping(self) ->\
    \ bool:\n        \"\"\"Tell, don't ask — Order decides based on its own data.\"\"\"\n        return self.total() >= FREE_SHIPPING_THRESHOLD\n\
    \nclass Customer:\n    def shipping_city(self) -> str:\n        return self.address.city\n\n# Caller talks only to its\
    \ immediate friend\ndef generate_shipping_label(order: Order) -> Label:\n    city = order.shipping_city()  # One dot —\
    \ talks to friend\n    return Label(city=city, ...)\n"
  example_bad: "# Train wreck — reaching through the entire object graph\ndef generate_shipping_label(order: Order) -> Label:\n\
    \    city = order.customer.address.city        # 3 dots — stranger's stranger\n    zip_code = order.customer.address.zip_code\
    \  # Same violation\n    country = order.customer.address.country    # Same violation\n\n    # If Address is refactored\
    \ to AddressV2, this function breaks\n    # even though it never imports Address directly.\n    # Change Address.city\
    \ to Address.locality → 40 files break.\n"
  when_applies: Any system involving systems requiring structural design decisions, code undergoing design or refactoring
  when_not_applies: small scripts under 100 lines, single-purpose utilities
  sources: ["https://martinfowler.com/bliki/TellDontAsk.html"]
- id: CR-ARCH-PLA-001
  text: Principle of Least Astonishment — A component should behave in the way that most users will expect it to. It should
    not surprise.
  why: When a function named save() also sends an email notification, callers are surprised by the side effect. When delete()
    returns the deleted object in some methods but None in others, inconsistency breeds bugs. When a configuration file uses
    different units (seconds vs milliseconds) for different timeouts in the same file, operators misconfigure production.
    The cost of surprise is debugging time — developers waste hours understanding why something behaves differently than its
    name suggests.
  how_to_do_right: '1. Functions do what their name says — nothing more, nothing less.

    2. Side effects are explicit: save_and_notify() not save().

    3. Consistent return types: if find() returns Optional[T], ALL find methods do.

    4. Consistent parameter ordering across similar functions.

    5. Consistent units: all timeouts in seconds, all sizes in bytes.

    6. Follow language/framework conventions (PEP 8 for Python, Google style for Go).

    '
  severity: high
  technologies:
    lang: [python, java, typescript, go]
  domains:
    domain: [architecture]
    concern: [design, usability]
  example_good: "class UserRepository:\n    def find_by_id(self, user_id: str) -> User | None:\n        \"\"\"Returns None\
    \ if not found — consistent with 'find' semantics.\"\"\"\n        return self.session.get(User, user_id)\n\n    def get_by_id(self,\
    \ user_id: str) -> User:\n        \"\"\"Raises NotFoundError if not found — consistent with 'get' semantics.\"\"\"\n \
    \       user = self.session.get(User, user_id)\n        if not user:\n            raise NotFoundError(f\"User {user_id}\
    \ not found\")\n        return user\n\n# Convention: find = Optional (might not exist), get = required (raises if missing)\n\
    # Consistent across ALL repositories in the codebase\n"
  example_bad: "class UserRepository:\n    def find_by_id(self, user_id: str) -> User:\n        # SURPRISE 1: \"find\" raises\
    \ exception instead of returning None\n        user = self.session.get(User, user_id)\n        if not user:\n        \
    \    raise Exception(\"Not found\")\n        return user\n\n    def find_by_email(self, email: str) -> User | None:\n\
    \        # SURPRISE 2: same prefix \"find_\" but different return semantics!\n        return self.session.query(User).filter_by(email=email).first()\n\
    \n    def save(self, user: User) -> User:\n        self.session.add(user)\n        self.session.commit()\n        send_welcome_email(user)\
    \  # SURPRISE 3: save() sends email!\n        return user\n"
  when_applies: Any system involving systems requiring structural design decisions, code undergoing design or refactoring
  when_not_applies: small scripts under 100 lines, single-purpose utilities
  sources: ["https://martinfowler.com/bliki/PresentationDomainDataLayering.html"]
- id: CR-ARCH-COI-001
  text: Composition over Inheritance — Favor object composition over class inheritance for code reuse. Inherit for type identity,
    compose for behavior reuse.
  why: 'Inheritance creates tight coupling between parent and child. Changes to the parent class ripple to all descendants.
    Deep inheritance hierarchies (5+ levels) become impossible to understand — the ''yo-yo problem'' where you bounce between
    files to understand behavior. Multiple inheritance creates diamond problems. In Java/Python, you cannot change the parent
    class at runtime. With composition, you can swap strategies, mix behaviors, and test components in isolation. The Gang
    of Four said it in 1994: ''Favor composition over inheritance.'''
  how_to_do_right: '1. Use inheritance ONLY for genuine is-a relationships with Liskov substitutability.

    2. Use composition for has-a relationships and behavior reuse.

    3. Strategy pattern: inject behavior as a component.

    4. Mixin/Protocol for shared interfaces without implementation inheritance.

    5. Maximum inheritance depth: 2-3 levels. Beyond that, refactor to composition.

    6. If you inherit just to reuse 2 methods, extract those methods into a component.

    '
  severity: high
  technologies:
    lang: [python, java, typescript]
  domains:
    domain: [architecture]
    concern: [design, reusability]
  example_good: "# Composition — behaviors are pluggable components\nclass NotificationService:\n    def __init__(\n     \
    \   self,\n        sender: MessageSender,       # Email, SMS, or Push — pluggable\n        formatter: MessageFormatter,\
    \  # HTML, plain text — pluggable\n        rate_limiter: RateLimiter,    # Token bucket, sliding window — pluggable\n\
    \    ):\n        self.sender = sender\n        self.formatter = formatter\n        self.rate_limiter = rate_limiter\n\n\
    \    def notify(self, user: User, event: Event) -> None:\n        if not self.rate_limiter.allow(user.id):\n         \
    \   return\n        message = self.formatter.format(event)\n        self.sender.send(user.contact, message)\n\n# Mix and\
    \ match at runtime\nurgent = NotificationService(SmsSender(), PlainTextFormatter(), NoRateLimit())\nbulk = NotificationService(EmailSender(),\
    \ HtmlFormatter(), TokenBucket(10))\n"
  example_bad: "# Deep inheritance hierarchy — the yo-yo problem\nclass BaseNotification:\n    def send(self): ...\n\nclass\
    \ FormattedNotification(BaseNotification):\n    def format(self): ...\n\nclass RateLimitedNotification(FormattedNotification):\n\
    \    def check_rate(self): ...\n\nclass EmailNotification(RateLimitedNotification):\n    def send_email(self): ...\n\n\
    class UrgentEmailNotification(EmailNotification):\n    def prioritize(self): ...\n    # 5 levels deep — which send() is\
    \ called?\n    # Cannot swap email for SMS without new hierarchy branch\n    # Cannot have urgent + non-rate-limited (locked\
    \ into parent chain)\n"
  when_applies: Any system involving systems requiring structural design decisions, code undergoing design or refactoring
  when_not_applies: small scripts under 100 lines, single-purpose utilities
  sources: ["https://martinfowler.com/articles/injection.html"]
- id: CR-ARCH-YAGNI-001
  text: YAGNI (You Aren't Gonna Need It) — Do not add functionality until it is actually needed. Speculative generality is
    a code smell.
  why: 'Premature abstraction creates complexity without delivering value. An AbstractMessageBrokerFactory built to support
    Kafka, RabbitMQ, and NATS when you only use Redis costs weeks to build, weeks to maintain, and is never used. Studies
    show that 64% of software features are rarely or never used (Standish Group). Every speculative abstraction has a maintenance
    cost: tests, documentation, cognitive load, and upgrade burden. Build the simplest thing that works, then refactor when
    a real second use case appears.'
  how_to_do_right: '1. Build for the current requirement, not imagined future ones.

    2. The Rule of Three: abstract when you have 3 concrete examples, not 1.

    3. If a feature has no user story or ticket, do not build it.

    4. Speculative generality smells: unused parameters, abstract classes with one subclass, delegation to nowhere.

    5. Refactoring is cheap when code is well-tested. Over-engineering is expensive always.

    '
  severity: high
  technologies:
    lang: [general]
  domains:
    domain: [architecture]
    concern: [design, productivity]
  example_good: "# Need: send order confirmations via email\n# Build exactly that — no speculative abstraction\n\nclass EmailNotifier:\n\
    \    def __init__(self, smtp_client: SmtpClient):\n        self.smtp = smtp_client\n\n    def send_order_confirmation(self,\
    \ order: Order) -> None:\n        self.smtp.send(\n            to=order.customer_email,\n            subject=f\"Order\
    \ {order.id} confirmed\",\n            body=render_template(\"order_confirmation.html\", order=order),\n        )\n\n\
    # When SMS is ACTUALLY needed (not before):\n# 1. Extract Protocol: Notifier\n# 2. Create SmsNotifier implementing Notifier\n\
    # 3. Done — refactoring is cheap with good tests\n"
  example_bad: "# Speculative generality — built for imagined future requirements\nclass AbstractMessageBrokerFactory(ABC):\n\
    \    @abstractmethod\n    def create_producer(self, config: ProducerConfig) -> AbstractProducer: ...\n    @abstractmethod\n\
    \    def create_consumer(self, config: ConsumerConfig) -> AbstractConsumer: ...\n\nclass KafkaMessageBrokerFactory(AbstractMessageBrokerFactory):\
    \ ...\nclass RabbitMQMessageBrokerFactory(AbstractMessageBrokerFactory): ...\nclass NATSMessageBrokerFactory(AbstractMessageBrokerFactory):\
    \ ...  # Never used\n\n# Reality: only Redis is used. 3 implementations are dead code.\n# Cost: 2 weeks building, tests\
    \ for all 3, maintenance burden forever.\n# The abstraction layer itself has bugs nobody notices because\n# only one implementation\
    \ is exercised in production.\n"
  when_applies: Any system involving systems requiring structural design decisions, code undergoing design or refactoring
  when_not_applies: small scripts under 100 lines, single-purpose utilities
  sources: ["https://martinfowler.com/bliki/Yagni.html"]
- id: CR-ARCH-KISS-001
  text: KISS (Keep It Simple, Stupid) — The simplest solution that correctly solves the problem is the best solution. Complexity
    must be justified.
  why: 'Every layer of abstraction, every design pattern, every framework added to a system has a cost: learning curve, debugging
    difficulty, upgrade burden, and cognitive load. A microservices architecture for a 3-person team with 500 DAU is complexity
    that destroys velocity. A custom ORM when SQLAlchemy exists is months of work solving solved problems. Simplicity is not
    laziness — it is discipline. Einstein: ''Everything should be made as simple as possible, but not simpler.'''
  how_to_do_right: '1. Start with the simplest architecture (monolith, flat files, SQLite).

    2. Add complexity only when a specific, measurable problem demands it.

    3. Every abstraction layer must justify its existence with a concrete benefit.

    4. Prefer standard library solutions over third-party when capability is similar.

    5. Measure complexity: cyclomatic complexity, lines of code, number of dependencies.

    6. Code review question: "Is there a simpler way to achieve this?"

    '
  severity: high
  technologies:
    lang: [general]
  domains:
    domain: [architecture]
    concern: [design, productivity]
  example_good: "# Simple solution for a simple problem: user settings\n# Requirement: store user preferences (theme, language,\
    \ timezone)\n\nclass UserSettings:\n    \"\"\"Plain dict stored as JSONB in users table. No separate service needed.\"\
    \"\"\n    def __init__(self, user_id: str, db: Database):\n        self.user_id = user_id\n        self.db = db\n\n  \
    \  def get(self, key: str, default: Any = None) -> Any:\n        row = self.db.execute(\n            \"SELECT settings->>%s\
    \ FROM users WHERE id = %s\",\n            (key, self.user_id)\n        )\n        return row[0] if row else default\n\
    \n    def set(self, key: str, value: Any) -> None:\n        self.db.execute(\n            \"UPDATE users SET settings\
    \ = settings || %s WHERE id = %s\",\n            (json.dumps({key: value}), self.user_id)\n        )\n"
  example_bad: '# Over-engineered solution for the same simple problem

    # "UserPreferenceMicroservice" with its own database, API, and message queue


    # settings_service/models/preference.py

    # settings_service/models/preference_history.py

    # settings_service/models/preference_category.py

    # settings_service/api/v1/preferences.py

    # settings_service/api/v1/categories.py

    # settings_service/events/preference_changed.py

    # settings_service/consumers/preference_sync.py

    # settings_service/cache/preference_cache.py

    # docker-compose.yml (PostgreSQL + Redis + RabbitMQ for preferences)

    # kubernetes/settings-service-deployment.yaml

    #

    # 15 files, 3 infrastructure components, for storing theme="dark"

    '
  when_applies: Any system involving systems requiring structural design decisions, code undergoing design or refactoring
  when_not_applies: small scripts under 100 lines, single-purpose utilities
  sources: ["https://martinfowler.com/bliki/Yagni.html"]
- id: CR-ARCH-DRY-001
  text: DRY (Don't Repeat Yourself) — Every piece of knowledge must have a single, unambiguous, authoritative representation
    within a system.
  why: When a discount calculation appears in the cart service, the checkout service, and the invoice generator, fixing a
    rounding bug requires finding and updating all three. If you miss one, customers are charged differently depending on
    which code path they hit. DRY is not about eliminating textual duplication — it is about eliminating KNOWLEDGE duplication.
    Two functions with identical code but representing different business concepts should NOT be merged. Two functions with
    different code but representing the same business rule SHOULD be unified.
  how_to_do_right: '1. Identify duplicated KNOWLEDGE, not just duplicated code.

    2. Extract shared knowledge into a single authoritative source.

    3. Constants: one definition, imported everywhere.

    4. Business rules: one function/class, called from all contexts.

    5. Configuration: one file/source, read by all consumers.

    6. Do NOT merge coincidentally similar code — it may diverge for valid reasons.

    7. The Rule of Three: wait for 3 occurrences before extracting. Two may be coincidence.

    '
  severity: high
  technologies:
    lang: [general]
  domains:
    domain: [architecture]
    concern: [design, maintainability]
  example_good: "# Single source of truth for discount calculation\n# pricing/discounts.py — THE authoritative discount logic\n\
    class DiscountEngine:\n    def calculate(self, items: list[CartItem], promo: str | None) -> Decimal:\n        subtotal\
    \ = sum(item.price * item.quantity for item in items)\n        if promo and (discount := self.promo_registry.get(promo)):\n\
    \            subtotal = discount.apply(subtotal)\n        if subtotal >= BULK_THRESHOLD:\n            subtotal *= Decimal(\"\
    0.95\")  # 5% bulk discount\n        return subtotal\n\n# cart_service.py — delegates to DiscountEngine\ntotal = self.discount_engine.calculate(cart.items,\
    \ cart.promo_code)\n\n# checkout_service.py — same engine, same logic\ntotal = self.discount_engine.calculate(order.items,\
    \ order.promo_code)\n\n# invoice_generator.py — same engine, same logic\ntotal = self.discount_engine.calculate(invoice.items,\
    \ invoice.promo_code)\n"
  example_bad: "# cart_service.py — discount logic copy #1\ndef calculate_cart_total(items, promo):\n    total = sum(i.price\
    \ * i.qty for i in items)\n    if promo == \"SAVE10\":\n        total *= 0.9\n    return total\n\n# checkout_service.py\
    \ — discount logic copy #2 (slightly different!)\ndef calculate_checkout_total(items, promo):\n    total = sum(i.price\
    \ * i.quantity for i in items)  # .quantity not .qty\n    if promo == \"SAVE10\":\n        total *= 0.90\n    if total\
    \ > 100:\n        total *= 0.95  # Bulk discount — missing from cart!\n    return total\n\n# invoice_generator.py — discount\
    \ logic copy #3 (bug: wrong rounding)\ndef calculate_invoice_total(items, promo):\n    total = sum(i.price * i.qty for\
    \ i in items)\n    if promo == \"SAVE10\":\n        total = int(total * 0.9)  # int() truncates — rounding bug!\n    return\
    \ total\n"
  when_applies: Any system involving systems requiring structural design decisions, code undergoing design or refactoring
  when_not_applies: small scripts under 100 lines, single-purpose utilities
  sources: ["https://martinfowler.com/bliki/DontRepeatYourself.html"]
