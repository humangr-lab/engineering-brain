  example_bad: '# Manual log review — fails Req 10.4.1.1

    # Daily process: analyst opens terminal and runs:

    ssh admin@log-server

    grep "FAILED" /var/log/auth.log | tail -100

    # Reviews 100 lines out of 5 million events

    # Misses: lateral movement, slow brute force, data exfiltration

    # Analyst burned out after 15 minutes, marks ''reviewed'' checkbox

    '
  example_good: "# Wazuh SIEM — automated PCI log review rules\n# /var/ossec/etc/rules/pci_custom_rules.xml\n<group name=\"pci,authentication\">\n  <rule id=\"100100\" level=\"10\">\n    <if_matched_sid>5710</if_matched_sid>\n\
    \    <same_source_ip />\n    <frequency>5</frequency>\n    <timeframe>600</timeframe>\n    <description>PCI-10.4.1.1: 5+ failed logins same IP in 10min</description>\n    <group>pci_dss_10.2.4,pci_dss_10.4.1.1,</group>\n\
    \  </rule>\n  <rule id=\"100101\" level=\"12\">\n    <if_sid>5501</if_sid>\n    <time>18:00-06:00</time>\n    <description>PCI-10.4.1.1: Admin login outside business hours</description>\n    <group>pci_dss_10.2.2,pci_dss_10.4.1.1,</group>\n\
    \  </rule>\n</group>\n"
  how_to_do_right: '1. Deploy a SIEM (Splunk, Elastic SIEM, Sentinel, or Wazuh) to aggregate all in-scope logs. 2. Create correlation rules for PCI-relevant events: failed auth attempts, privilege escalation,
    CDE access anomalies, firewall denies. 3. Set alert thresholds: e.g., >5 failed logins in 10 minutes, any admin access outside business hours. 4. Automate daily summary reports for human review of flagged
    events (not all events). 5. Retain logs for minimum 12 months (3 months immediately accessible). 6. Test detection rules quarterly with simulated attack scenarios.'
  id: PCI4-006
  severity: high
  sources:
  - https://www.pcisecuritystandards.org/document_library/
  - https://documentation.wazuh.com/current/compliance/pci-dss/index.html
  technologies:
  - SIEM
  - Splunk
  - Elastic
  - Wazuh
  - Sentinel
  - Sumo Logic
  text: Implement automated log review mechanisms — Requirement 10.4.1.1 mandates automated tools for reviewing audit logs, replacing purely manual daily review.
  when_applies: All systems in PCI DSS scope that generate audit logs, including servers, firewalls, databases, applications, and network devices within or connected to the CDE.
  why: Manual log review at scale is physically impossible — a mid-size merchant generates 1-10 million log events per day. Human reviewers suffer alert fatigue after 20 minutes and miss subtle attack patterns.
    Requirement 10.4.1.1 specifically requires automated mechanisms (SIEM correlation, anomaly detection, automated alerting). Without automation, attackers dwell undetected for an average of 197 days (IBM
    Cost of a Data Breach 2024).
