  example_bad: "# Using Customized Approach to avoid implementing controls\napproach_decisions:\n  - requirement: \"8.3.6\"\n    approach: \"customized\"\n    reason: \"We don't want to deploy MFA\"  #\
    \ NOT a valid reason\n    controls_matrix: null  # Missing required documentation\n    targeted_risk_analysis: null\n    # QSA will reject — Customized requires MORE work, not less\n"
  example_good: "# Decision matrix for Customized vs Defined Approach\napproach_decisions:\n  - requirement: \"8.3.6\"\n    approach: \"defined\"\n    reason: \"Standard MFA via Okta — Defined Approach\
    \ is straightforward\"\n  - requirement: \"3.5.1.2\"\n    approach: \"defined\"\n    reason: \"Field-level AES-256-GCM — standard implementation\"\n  - requirement: \"11.5.1\"\n    approach: \"customized\"\
    \n    reason: \"Immutable infrastructure (containers rebuilt each deploy). FIM is meaningless on ephemeral containers. Custom control: image signing + admission controller + runtime immutability.\"\n\
    \    controls_matrix: \"docs/pci/customized/11.5.1-controls-matrix.pdf\"\n    targeted_risk_analysis: \"docs/pci/customized/11.5.1-tra.pdf\"\n    qsa_approved: true\n"
  how_to_do_right: '1. Default to Defined Approach for all requirements — simpler and faster for QSA validation. 2. Use Customized Approach only when: (a) the defined requirement is technically infeasible,
    or (b) you have a demonstrably superior control already in place. 3. For each customized requirement, prepare: controls matrix, targeted risk analysis, evidence of control effectiveness. 4. Engage your
    QSA early — they must design custom testing procedures. 5. Budget 3-5x the documentation effort compared to Defined Approach. 6. Maintain evidence of ongoing effectiveness, not just point-in-time compliance.'
  id: PCI4-009
  severity: medium
  sources:
  - https://www.pcisecuritystandards.org/document_library/
  - https://www.pcisecuritystandards.org/assessors_and_solutions/qualified_security_assessors
  technologies:
  - GRC tools
  - risk frameworks
  - compliance management
  text: Choose between Customized Approach and Defined Approach per requirement based on organizational maturity — the Customized Approach requires significantly more documentation and QSA scrutiny than
    Defined.
  when_applies: Organizations deciding their assessment methodology for PCI DSS 4.0.1 compliance, particularly those with non-standard architectures or existing controls that differ from defined requirements.
  why: 'PCI DSS 4.0.1 introduces the Customized Approach as an alternative to the Defined Approach. However, the Customized Approach requires: a controls matrix, a targeted risk analysis per customized
    requirement, testing procedures designed by the QSA, and evidence that the custom control meets the objective as effectively as the defined control. Organizations without mature security programs (dedicated
    GRC team, risk quantification capability, strong evidence management) will spend 3-5x more effort on Customized Approach documentation than simply implementing the Defined Approach.'
