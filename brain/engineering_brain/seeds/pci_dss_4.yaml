  example_bad: "# Unauthenticated scan — misses 40-60% of vulnerabilities\nscan_policy:\n  name: \"PCI-Internal-Quick\"\n  type: \"unauthenticated\"  # Violates Req 11.3.1.1\n  # Cannot see: installed software\
    \ versions, missing patches,\n  # file permissions, registry settings, service configs\n  targets: \"10.0.0.0/8\"\n  schedule: \"quarterly\"\n"
  example_good: "# Nessus authenticated scan policy\nscan_policy:\n  name: \"PCI-Internal-Authenticated-Quarterly\"\n  type: \"authenticated\"\n  credentials:\n    - type: \"ssh\"\n      username: \"nessus-scan\"\
    \n      auth_method: \"publickey\"\n      private_key_vault_path: \"secret/scan/nessus-ssh-key\"\n      privilege_escalation: \"sudo\"\n    - type: \"windows\"\n      username: \"DOMAIN\\\\nessus-scan\"\
    \n      auth_method: \"kerberos\"\n      credential_vault_path: \"secret/scan/nessus-windows\"\n    - type: \"snmpv3\"\n      username: \"nessus-snmp\"\n      auth_protocol: \"SHA256\"\n      priv_protocol:\
    \ \"AES256\"\n  targets: \"asset-group:cde-all-systems\"\n  schedule: \"quarterly\"\n  compliance_checks: [\"PCI DSS 4.0.1\", \"CIS Benchmarks\"]\n"
  how_to_do_right: '1. Configure scan credentials per OS type: domain admin for Windows, SSH key for Linux, SNMP v3 for network devices. 2. Use a dedicated scan service account with read-only access (no
    write/execute). 3. Store scan credentials in a vault, not in the scanner UI. 4. Run authenticated scans at least quarterly (more often per TRA). 5. Scan all in-scope assets: servers, workstations, network
    devices, containers. 6. Compare authenticated vs unauthenticated results to quantify coverage improvement.'
  id: PCI4-007
  severity: high
  sources:
  - https://www.pcisecuritystandards.org/document_library/
  - https://docs.tenable.com/nessus/Content/CredentialedChecksOverview.htm
  technologies:
  - Nessus
  - Qualys
  - Rapid7
  - OpenVAS
  - Tenable
  text: Perform authenticated internal vulnerability scans — Requirement 11.3.1.1 mandates that internal scans use credentials to detect vulnerabilities invisible to unauthenticated scanners.
  when_applies: All internal vulnerability scanning required by PCI DSS, covering all systems in the CDE and connected-to environments.
  why: Unauthenticated vulnerability scans miss 40-60% of vulnerabilities because they cannot inspect installed software versions, registry settings, file permissions, or patch levels. Requirement 11.3.1.1
    now requires authenticated scanning for internal scans. An unauthenticated scan only sees what the network exposes — it cannot detect missing OS patches, vulnerable libraries, misconfigurations in services,
    or weak file permissions.
