  example_good: "# Kubernetes NetworkPolicy — CDE micro-segmentation\napiVersion: networking.k8s.io/v1\nkind: NetworkPolicy\nmetadata:\n  name: cde-isolation\n  namespace: payment-processing\nspec:\n  podSelector:\
    \ {}\n  policyTypes: [Ingress, Egress]\n  ingress:\n    - from:\n        - namespaceSelector:\n            matchLabels:\n              zone: \"cde\"\n        - podSelector:\n            matchLabels:\n\
    \              role: \"payment-gateway\"\n      ports:\n        - protocol: TCP\n          port: 443\n  egress:\n    - to:\n        - namespaceSelector:\n            matchLabels:\n              zone:\
    \ \"cde\"\n      ports:\n        - protocol: TCP\n          port: 5432\n    - to:\n        - ipBlock:\n            cidr: 203.0.113.0/24  # Payment processor only\n      ports:\n        - protocol: TCP\n\
    \          port: 443\n"
  how_to_do_right: 1. Map all data flows involving cardholder data — identify every system that touches, stores, or transmits PANs. 2. Isolate CDE into dedicated network segments with firewall rules permitting
    only required traffic. 3. Deploy P2PE-validated terminals (PCI P2PE listed solution) for card-present transactions. 4. Validate segmentation controls with penetration testing (Req 11.4.5) — attempt
    to cross segment boundaries. 5. Implement micro-segmentation for cloud environments (security groups, network policies). 6. Document the scope reduction in the network diagram and validate with QSA.
