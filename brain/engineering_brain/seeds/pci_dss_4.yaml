  text: Reduce PCI scope through network segmentation and P2PE — isolate the CDE to the smallest possible set of systems and use point-to-point encryption to remove terminals from scope.
  when_applies: All PCI DSS environments, particularly organizations with large flat networks, card-present retail operations, and cloud-hosted payment applications.
  why: Without segmentation, every system on the network is in PCI scope — even a developer laptop that can ping the database server. A flat network means a compromised printer can pivot to the payment
    database. Network segmentation limits the CDE to only systems that truly need cardholder data access. P2PE encrypts card data at the terminal with keys managed by the P2PE provider — the merchant never
    sees plaintext PANs, removing terminals from scope. Combined, segmentation + P2PE can reduce scope by 80-95%.

