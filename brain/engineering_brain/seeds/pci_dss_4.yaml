  example_bad: "class PaymentService:\n    def store_card(self, pan: str):\n        # PAN stored in plaintext in application database\n        db.execute(\n            \"INSERT INTO user_cards (card_number)\
    \ VALUES (%s)\",\n            (pan,)  # '4111111111111111' in database\n        )\n        # This database, its backups, its replicas, the network,\n        # the admin interfaces — ALL in PCI scope\
    \ now\n"
  example_good: "class PaymentService:\n    def __init__(self, token_vault_client):\n        self.vault = token_vault_client\n\n    def store_card(self, pan: str) -> str:\n        # PAN sent directly to\
    \ token vault — never stored in app DB\n        token = self.vault.tokenize(pan)  # Returns \"tok_a1b2c3d4e5f6\"\n        db.execute(\n            \"INSERT INTO user_cards (token) VALUES (%s)\", (token,)\n\
    \        )\n        return token  # App DB is OUT of PCI scope\n\n    def charge_card(self, token: str, amount: int):\n        # Only the payment processor detokenizes\n        self.payment_processor.charge(token=token,\
    \ amount=amount)\n        # Application never sees or handles the real PAN\n"
  how_to_do_right: '1. Choose a tokenization approach: format-preserving (looks like a card number) or random (UUID/opaque). 2. The token vault (maps token to PAN) must be in a separate, hardened environment.
    3. Token vault access requires MFA, strong authentication, and logging (it IS the CDE). 4. Application systems receive only tokens — they are OUT of PCI scope. 5. Only the payment processing path needs
    real PANs; all other systems use tokens. 6. Implement detokenization only in the token vault; never expose the mapping to application systems.'
