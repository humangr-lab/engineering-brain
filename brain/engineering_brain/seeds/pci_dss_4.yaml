  example_bad: "# Relying solely on disk encryption — violates Req 3.5.1.2\nresource \"aws_ebs_volume\" \"card_data\" {\n  encrypted = true  # Disk encryption only\n}\n\n# PAN stored as plaintext in database\
    \ column\ndb.execute(\n    \"INSERT INTO cards (pan) VALUES (%s)\",\n    (\"4111111111111111\",)  # Plaintext PAN — readable by SQL injection\n)\n# EBS encryption does not help — OS transparently decrypts\n"
  example_good: "from cryptography.hazmat.primitives.ciphers.aead import AESGCM\nimport os\n\nclass PANEncryptor:\n    def __init__(self, key_provider):\n        # Key from HSM/Vault — never from config\n\
    \        self.key = key_provider.get_current_key(\"pan-encryption\")\n\n    def encrypt_pan(self, pan: str) -> bytes:\n        nonce = os.urandom(12)\n        aesgcm = AESGCM(self.key)\n        ciphertext\
    \ = aesgcm.encrypt(nonce, pan.encode(), None)\n        return nonce + ciphertext\n\n    def store_pan(self, pan: str, db):\n        encrypted = self.encrypt_pan(pan)\n        db.execute(\n         \
    \   \"INSERT INTO cards (encrypted_pan, pan_last4) VALUES (%s, %s)\",\n            (encrypted, pan[-4:])  # Last 4 for display\n        )\n"
  how_to_do_right: '1. Implement field-level encryption (AES-256-GCM) at the application layer before writing PAN to storage. 2. Or use tokenization: replace PAN with a non-reversible token, store mapping
    in a separate token vault. 3. Or truncate: store only first 6 and last 4 digits (BIN + last 4), which is not considered PAN. 4. Key management must use HSM or dedicated key management service (not application
    config files). 5. Encryption keys must be separate from encrypted data (different systems, different access controls). 6. Disk encryption remains a defense-in-depth layer but cannot be the sole protection.'
  id: PCI4-005
  severity: critical
  sources:
  - https://www.pcisecuritystandards.org/document_library/
  - https://csrc.nist.gov/publications/detail/sp/800-38d/final
  technologies:
  - AES-256-GCM
  - HSM
  - tokenization
  - Vault
  - AWS KMS
  - Azure Key Vault
  text: Disk-level encryption alone no longer satisfies Requirement 3.5.1.2 — stored PAN must be protected with field-level or column-level encryption, truncation, or tokenization.
  when_applies: Any system that stores Primary Account Numbers (PANs), including databases, flat files, logs, backups, and data warehouses.
  why: PCI DSS 4.0.1 Requirement 3.5.1.2 explicitly states that disk-level or partition-level encryption (e.g., BitLocker, LUKS, AWS EBS encryption) is not sufficient to render PAN unreadable. Disk encryption
    is transparent to the OS — once the system boots, any process with file access can read PANs in plaintext. A SQL injection or application vulnerability gives the attacker the same transparent decryption.
    This was a major change from 3.2.1 where disk encryption was sometimes accepted.
