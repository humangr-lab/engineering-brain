  example_bad: "# Still using PCI DSS 3.2.1 checklist after March 2025\ncompliance_matrix:\n  standard: \"PCI DSS 3.2.1\"  # OUTDATED — this standard is retired\n  # Missing all 64 future-dated requirements\n\
    \  # No tracking of Req 6.4.3 (client-side scripts)\n  # No tracking of Req 8.3.6 (MFA for CDE)\n  # QSA will issue automatic failure\n"
  example_good: "# PCI DSS 4.0.1 compliance tracking matrix\ncompliance_matrix:\n  standard: \"PCI DSS 4.0.1\"\n  assessment_date: \"2025-06-15\"\n  future_dated_requirements:\n    - req: \"6.4.3\"\n  \
    \    status: \"implemented\"\n      evidence: \"CSP headers deployed, SRI on all scripts\"\n      owner: \"security-team\"\n    - req: \"8.3.6\"\n      status: \"implemented\"\n      evidence: \"MFA\
    \ enforced for all CDE access via Okta\"\n      owner: \"identity-team\"\n    - req: \"3.5.1.2\"\n      status: \"implemented\"\n      evidence: \"Field-level AES-256-GCM, disk encryption removed as\
    \ sole control\"\n      owner: \"data-team\"\n  next_review: \"2025-12-15\"\n"
  how_to_do_right: '1. Conduct a gap assessment mapping all 64 future-dated requirements to current controls. 2. Prioritize gaps by risk: authentication (Req 8), script management (Req 6.4.3), and encryption
    (Req 3.5.1.2) first. 3. Update SAQ or ROC templates to PCI DSS 4.0.1 format. 4. Retrain internal security teams on customized approach documentation requirements. 5. Update ASV scanning contracts to
    include authenticated scanning (Req 11.3.1.1). 6. Engage QSA for interim assessment 90 days before annual validation deadline.'
  id: PCI4-001
  severity: critical
  sources:
  - https://www.pcisecuritystandards.org/document_library/
