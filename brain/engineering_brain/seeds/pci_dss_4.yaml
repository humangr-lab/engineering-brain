  example_bad: "# WAF in detection-only mode — does not satisfy Req 6.4.2\nresource \"aws_wafv2_web_acl\" \"payment_app\" {\n  name  = \"payment-app-waf\"\n  scope = \"REGIONAL\"\n  default_action { allow\
    \ {} }\n  rule {\n    name     = \"AWSManagedRulesCommonRuleSet\"\n    priority = 1\n    override_action { count {} }  # COUNT mode — attacks pass through!\n    # SQLi, XSS, path traversal all logged\
    \ but NOT blocked\n  }\n}\n"
  example_good: "# AWS WAF with managed rules — blocking mode\nresource \"aws_wafv2_web_acl\" \"payment_app\" {\n  name  = \"payment-app-waf\"\n  scope = \"REGIONAL\"\n  default_action { allow {} }\n\n\
    \  rule {\n    name     = \"AWSManagedRulesCommonRuleSet\"\n    priority = 1\n    override_action { none {} }  # BLOCKING mode\n    statement {\n      managed_rule_group_statement {\n        name  \
    \      = \"AWSManagedRulesCommonRuleSet\"\n        vendor_name = \"AWS\"\n      }\n    }\n    visibility_config {\n      sampled_requests_enabled   = true\n      cloudwatch_metrics_enabled = true\n\
    \      metric_name                = \"CommonRuleSet\"\n    }\n  }\n\n  rule {\n    name     = \"AWSManagedRulesSQLiRuleSet\"\n    priority = 2\n    override_action { none {} }  # BLOCKING mode\n   \
    \ statement {\n      managed_rule_group_statement {\n        name        = \"AWSManagedRulesSQLiRuleSet\"\n        vendor_name = \"AWS\"\n      }\n    }\n    visibility_config {\n      sampled_requests_enabled\
    \   = true\n      cloudwatch_metrics_enabled = true\n      metric_name                = \"SQLiRuleSet\"\n    }\n  }\n}\n"
  how_to_do_right: 1. Deploy a WAF in front of all public-facing web applications in PCI scope. 2. Enable blocking mode (not just detection/logging) for OWASP Top 10 attack categories. 3. Configure custom
    rules for application-specific attack patterns. 4. Implement rate limiting to prevent brute force and credential stuffing. 5. Enable bot detection and challenge mechanisms for automated attacks. 6.
    Review WAF logs weekly and tune false positives (do not disable rules to eliminate noise). 7. Consider RASP as defense-in-depth alongside WAF for critical applications.
  id: PCI4-008
  severity: critical
  sources:
  - https://www.pcisecuritystandards.org/document_library/
  - https://owasp.org/www-project-web-security-testing-guide/
  technologies:
  - WAF
  - RASP
  - ModSecurity
  - AWS WAF
  - Cloudflare
  - Akamai
  - Imperva
  text: Deploy WAF or RASP protection for all public-facing web applications — Requirement 6.4.2 mandates an automated technical solution that continuously detects and prevents web-based attacks in blocking
    mode.
  when_applies: All public-facing web applications in PCI DSS scope, including APIs, payment portals, customer dashboards, and any web interface accessible from the internet.
  why: Requirement 6.4.2 strengthens the web application protection requirement beyond 3.2.1's 'WAF or code review' option. A WAF/RASP must be deployed AND actively blocking attacks — detection-only mode
    does not satisfy the requirement. Web application attacks (SQLi, XSS, SSRF) account for 26% of breaches (Verizon DBIR 2024). Without WAF/RASP in blocking mode, every web vulnerability is directly exploitable.
