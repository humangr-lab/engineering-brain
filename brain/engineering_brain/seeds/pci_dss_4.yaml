  example_bad: '<!-- Payment page with no CSP, no SRI, uncontrolled scripts -->

    <script src="https://cdn.example.com/analytics.js"></script>

    <script src="https://tag-manager.example.com/gtm.js"></script>

    <script src="https://chat-widget.example.com/widget.js"></script>

    <!-- No Content-Security-Policy header -->

    <!-- No integrity attributes — any CDN compromise = card skimming -->

    <!-- No inventory of scripts — nobody knows what each one does -->

    '
  example_good: "# Nginx config — strict CSP for payment page\nlocation /checkout {\n    add_header Content-Security-Policy\n      \"default-src 'none';\n       script-src 'self' https://js.stripe.com\n\
    \         'sha384-oqVuAfXRKap7fdgcCY5uykM6+R9GqQ8K';\n       style-src 'self';\n       connect-src 'self' https://api.stripe.com;\n       frame-src https://js.stripe.com;\n       report-uri /csp-report-endpoint;\"\
    \n      always;\n}\n\n<!-- HTML with SRI -->\n<script src=\"https://js.stripe.com/v3/\"\n        integrity=\"sha384-oqVuAfXRKap7fdgcCY5uykM6+R9GqQ8K\"\n        crossorigin=\"anonymous\"></script>\n"
  how_to_do_right: 1. Inventory every script loaded on payment pages (inline, first-party, third-party). 2. Assign a business justification to each script; remove unjustified ones. 3. Deploy Content-Security-Policy
    header with script-src directive listing only approved sources. 4. Add integrity="sha384-..." attribute (SRI) to all external script tags. 5. Implement a monitoring tool (e.g., Jscrambler, Source Defense,
    or custom CSP report-uri) to detect violations. 6. Review and re-authorize scripts quarterly or after any change.
