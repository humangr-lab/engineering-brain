  - Duo
  text: Enforce multi-factor authentication for ALL access into the Cardholder Data Environment — Requirement 8.3.6 extends MFA beyond remote access to include all CDE entry points including local console
    access.
  when_applies: Any environment classified as CDE (Cardholder Data Environment) or connected-to systems, including jump hosts, bastion servers, admin consoles, and database management interfaces.
  why: 'PCI DSS 3.2.1 only required MFA for remote access. PCI DSS 4.0.1 Requirement 8.3.6 now mandates MFA for all access into the CDE, including console access from within the corporate network, service
    account interactive logins, and administrative access to in-scope systems. Credential stuffing and stolen passwords are the number one initial access vector in payment breaches (Verizon DBIR 2024: 49%
    involve stolen credentials). MFA blocks 99.9% of automated credential attacks.'
