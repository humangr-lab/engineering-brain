  example_bad: "# MFA only for VPN — internal CDE access has no MFA\nresource \"okta_policy_rule_signon\" \"cde_access\" {\n  policy_id          = okta_policy_signon.cde_access.id\n  name              \
    \ = \"CDE access\"\n  mfa_required       = false  # No MFA once on corporate network\n  network_connection = \"ON_NETWORK\"  # Trusts network location\n  # Violates Req 8.3.6 — ALL access must have\
    \ MFA\n  # Lateral movement from compromised workstation = full CDE access\n}\n"
  example_good: "# Okta policy — MFA required for ALL CDE access (Req 8.3.6)\nresource \"okta_policy_rule_signon\" \"cde_mfa\" {\n  policy_id          = okta_policy_signon.cde_access.id\n  name        \
    \       = \"Require MFA for CDE\"\n  status             = \"ACTIVE\"\n  access             = \"ALLOW\"\n  mfa_required       = true\n  mfa_prompt         = \"ALWAYS\"\n  mfa_lifetime       = 0   # Require\
    \ MFA every session\n  network_connection = \"ANYWHERE\"  # Not just remote — 8.3.6\n  session_idle       = 15  # Lock after 15 min idle\n\n  factor_sequence {\n    primary_criteria_factor_type = \"\
    token:hardware\"  # FIDO2 key\n    primary_criteria_provider    = \"FIDO\"\n  }\n}\n"
  how_to_do_right: '1. Map all access paths into the CDE: VPN, SSH, RDP, console, jump hosts, cloud admin portals. 2. Deploy MFA on every entry point — no exceptions for ''internal-only'' paths. 3. Use
    phishing-resistant MFA (FIDO2/WebAuthn) where possible; TOTP as minimum. 4. Disable SMS-based MFA — SIM-swap attacks bypass it trivially. 5. Implement MFA for service account interactive sessions (not
    API-to-API calls). 6. Log all MFA events and alert on MFA bypass attempts. 7. Test MFA enforcement quarterly by attempting access without second factor.'
  id: PCI4-003
  severity: critical
  sources:
  - https://www.pcisecuritystandards.org/document_library/
  - https://pages.nist.gov/800-63-3/sp800-63b.html
  technologies:
