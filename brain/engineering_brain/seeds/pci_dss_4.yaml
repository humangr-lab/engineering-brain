  text: PCI DSS 4.0.1 replaces 3.2.1 as the mandatory standard — all assessments after March 31, 2025 must validate against 4.0.1 requirements including 64 new future-dated requirements now in effect.
  when_applies: Any organization that stores, processes, or transmits cardholder data, or operates systems that could affect the security of cardholder data.
  why: Organizations still operating under 3.2.1 controls after the cutoff face automatic non-compliance findings from QSAs and potential card brand fines of $5K-$100K/month. The 64 future-dated requirements
    (previously best practices) became mandatory on March 31, 2025 — missing even one can result in a failed ROC. Acquirers may terminate processing agreements for non-compliant merchants.
