  text: Implement HSM-backed key management with DUKPT or AES key wrapping for all cryptographic operations — never store encryption keys alongside encrypted data or in application code.
  when_applies: Any system performing encryption of cardholder data, including at-rest encryption, in-transit terminal encryption, and key exchange for payment processing.
  why: 'Requirements 3.6 and 3.7 mandate strict key controls: generation in HSM, split knowledge for key custodians, secure key storage separate from data, defined rotation periods, and documented lifecycle.
    DUKPT (Derived Unique Key Per Transaction) provides unique keys for each transaction, so compromising one key exposes only one transaction. Without HSM-backed key management, a single server compromise
    reveals the master key AND all encrypted data simultaneously.'
