  text: Implement Content Security Policy headers and Subresource Integrity for all scripts on payment pages — Requirement 6.4.3 mandates an inventory and authorization mechanism for all client-side scripts.
  when_applies: Any web application with payment pages that handle cardholder data, including checkout flows, hosted payment forms, and any page where PANs or CVVs are entered.
  why: 'Magecart and formjacking attacks inject malicious JavaScript into payment pages to skim card numbers in real time. Requirement 6.4.3 specifically addresses this: you must maintain an inventory of
    all scripts, justify each one, and implement a mechanism to detect unauthorized changes. Without CSP+SRI, a compromised CDN or third-party tag manager can silently exfiltrate PANs. British Airways was
    fined 20M GBP for exactly this attack vector.'
