  example_bad: "# Generic annual risk assessment — no per-requirement analysis\nrisk_assessment:\n  type: \"annual\"\n  scope: \"everything\"  # Not targeted to specific requirements\n  frequency: \"once\
    \ per year\"\n  # No per-requirement frequency justification\n  # No threat modeling per control\n  # QSA finding: \"12.3.1 — targeted risk analysis not performed\"\n"
  example_good: "# Targeted Risk Analysis document structure\ntargeted_risk_analysis:\n  - tra_id: \"TRA-10.4.1.1\"\n    requirement: \"10.4.1.1 — Automated log review frequency\"\n    methodology: \"FAIR\
    \ quantitative\"\n    assets: [\"payment-gateway-logs\", \"firewall-logs\", \"auth-logs\"]\n    threat_scenarios:\n      - \"Unauthorized access attempts in auth logs\"\n      - \"Data exfiltration\
    \ via DNS tunneling in firewall logs\"\n    current_controls: [\"SIEM correlation\", \"automated alerting\", \"SOC\"]\n    residual_risk: \"medium\"\n    chosen_frequency: \"real-time automated + daily\
    \ human review\"\n    justification: \"High transaction volume (50K/day) requires real-time.\"\n    approved_by: \"CISO\"\n    review_date: \"2025-03-15\"\n    next_review: \"2026-03-15\"\n"
  how_to_do_right: '1. Identify all requirements with ''periodically'' or flexible frequency language. 2. For each requirement, document: assets in scope, threats, likelihood, impact, and chosen frequency.
    3. Use a consistent risk methodology (FAIR, NIST SP 800-30, or OCTAVE). 4. Review each TRA at least annually and after significant changes. 5. Store TRAs as versioned artifacts accessible to the QSA.
    6. Map each TRA to the specific sub-requirement (e.g., TRA-10.4.1.1 for log review frequency).'
  id: PCI4-004
  severity: high
  sources:
  - https://www.pcisecuritystandards.org/document_library/
  - https://csrc.nist.gov/publications/detail/sp/800-30/rev-1/final
  technologies:
  - GRC tools
  - risk frameworks
  - FAIR
  - NIST RMF
  text: Perform targeted risk analysis for each PCI DSS requirement that allows organizational flexibility — Requirement 12.3.1 replaces the one-size-fits-all annual risk assessment with per-requirement
    analysis.
  when_applies: All entities undergoing PCI DSS 4.0.1 assessment, particularly for requirements that allow organizational flexibility in determining control frequency.
  why: PCI DSS 4.0.1 introduces targeted risk analysis where organizations must document frequency and depth of controls for requirements that say 'periodically' (e.g., log reviews, vulnerability scans,
    password changes). Without targeted risk analysis, QSAs will assign default frequencies that may be more burdensome than necessary, or organizations may choose frequencies too lax for their threat model.
    Documented TRA is now a mandatory artifact in the ROC.
