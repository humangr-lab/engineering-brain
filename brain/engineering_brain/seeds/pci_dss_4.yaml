  text: Use tokenization to reduce PCI scope for PAN storage — replace real card numbers with non-reversible tokens that have no exploitable value if breached.
  when_applies: Any system that needs to reference card numbers for recurring charges, refunds, or card-on-file functionality, where the full PAN is not needed for day-to-day operations.
  why: 'Tokenization removes systems from PCI scope because they never touch real cardholder data. A tokenized database breach exposes worthless tokens — no card numbers, no financial impact, no breach
    notification for the tokenized systems. Scope reduction dramatically cuts compliance cost: a full CDE assessment costs $50K-$500K/year, while a tokenized environment may only need SAQ-A ($5K-$20K).
    The token vault remains in scope, but isolating it to a single well-protected system is far easier than protecting every system that needs card references.'
