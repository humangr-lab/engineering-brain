layer: principles
technology: General
domain: spec_writing
knowledge:
- id: CR-SPEC-001
  text: Functional requirements must specify WHAT the system does, not HOW — each requirement is a single testable behavior
  why: Requirements that mix what and how constrain the implementation prematurely and become obsolete when architecture changes.
    Untestable requirements ('the system should be fast') are meaningless — they pass every review and fail every audit. Each
    FR should map to exactly one acceptance test.
  how_to_do_right: '1. Use the pattern: ''The system SHALL [verb] [object] WHEN [condition].''

    2. Each requirement gets a unique ID (FR-001, FR-002) for traceability.

    3. Every FR must have at least one acceptance criterion that can be automated.

    4. Avoid implementation language: no ''using React'', ''via REST API'', ''in PostgreSQL''.

    5. Review FRs with the question: ''Can I write a test for this?'' If no, rewrite.

    6. Group FRs by feature/domain, not by technical layer.

    '
  severity: high
  technologies:
    lang: [general]
  domains:
    domain: [quality, management]
    concern: [spec_writing, project]
  example_good: "# Functional Requirements — User Authentication\nFR-AUTH-001: The system SHALL authenticate users via email\
    \ and password.\n  Acceptance: Given valid credentials, When user submits login form, Then a session token is returned\
    \ with HTTP 200.\n\nFR-AUTH-002: The system SHALL lock an account after 5 consecutive failed login attempts.\n  Acceptance:\
    \ Given 5 failed attempts, When the 6th attempt is made, Then the system returns HTTP 423 and sends an unlock email.\n\
    \nFR-AUTH-003: The system SHALL allow users to reset their password via email verification.\n  Acceptance: Given a valid\
    \ email, When password reset is requested, Then a reset link is sent that expires in 1 hour.\n"
  example_bad: '# Vague, untestable, implementation-coupled requirements

    FR-001: The system should have a nice login page using React and Material UI.

    FR-002: Authentication should be secure and fast.

    FR-003: Use JWT tokens stored in localStorage for session management.

    FR-004: The database should be PostgreSQL with bcrypt for passwords.

    # Problems: "nice", "secure", "fast" are untestable

    # Specifies React, Material UI, JWT, localStorage, PostgreSQL — all implementation details

    '
  when_applies: All software engineering decisions
  when_not_applies: throwaway prototypes, learning exercises, or spike investigations where speed trumps correctness
  sources: ["https://www.iiba.org/business-analysis-body-of-knowledge/"]
- id: CR-SPEC-002
  text: Non-functional requirements need measurable thresholds — performance, scalability, availability, and security
  why: Vague NFRs like 'the system should be performant' are impossible to validate and meaningless in production. Without
    concrete SLOs, there is no objective basis for architectural decisions, capacity planning, or incident escalation. Every
    NFR must have a number attached to it.
  how_to_do_right: '1. Define measurable targets: latency (p50, p95, p99), throughput (RPS), availability (99.9%).

    2. Specify measurement method: how and where to measure (client-side, server-side, synthetic).

    3. Include load context: ''under 1000 concurrent users'' or ''with 10M rows in database''.

    4. Separate targets by environment if needed (production vs staging).

    5. Link NFRs to monitoring dashboards and alerts.

    6. Review NFRs against real production data quarterly.

    '
  severity: high
  technologies:
    lang: [general]
  domains:
    domain: [quality, architecture, operations]
    concern: [spec_writing]
  example_good: "# Non-Functional Requirements\nNFR-PERF-001: API response time\n  - p50 latency: < 100ms\n  - p95 latency:\
    \ < 500ms\n  - p99 latency: < 2000ms\n  - Measured at: API gateway, under 500 concurrent users\n  - Load context: 5M users,\
    \ 50M records in database\n\nNFR-AVAIL-001: System availability\n  - Target: 99.9% uptime (< 8.77 hours downtime per year)\n\
    \  - Measured: monthly, excluding planned maintenance windows\n  - Escalation: page on-call if availability drops below\
    \ 99.5% in rolling 1-hour window\n\nNFR-SEC-001: Authentication\n  - Password hashing: bcrypt with cost factor >= 12\n\
    \  - Session timeout: 30 minutes of inactivity\n  - MFA: required for admin roles, optional for standard users\n"
  example_bad: '# Vague, unmeasurable NFRs

    NFR-001: The system should be fast.

    NFR-002: The system should be highly available.

    NFR-003: The system should be secure.

    NFR-004: The system should scale well.

    # No numbers, no measurement method, no load context

    # Impossible to test, impossible to alert on

    '
  when_applies: Any system involving systems requiring structural design decisions
  when_not_applies: small scripts under 100 lines, single-purpose utilities
  sources: ["https://sre.google/sre-book/service-level-objectives/"]
- id: CR-SPEC-003
  text: Write user stories in standard format with explicit acceptance criteria in Given/When/Then
  why: User stories without acceptance criteria are wishes, not requirements. The Given/When/Then format forces concrete thinking
    about preconditions, actions, and expected outcomes. It also translates directly to automated BDD tests (Cucumber, Behave),
    creating a living specification.
  how_to_do_right: '1. Story format: ''As a [role], I want [action], so that [benefit].''

    2. Every story has 2-5 acceptance criteria in Given/When/Then format.

    3. Include at least one negative/error scenario per story.

    4. Size stories to be completable in 1-3 days (split if larger).

    5. Include edge cases and boundary conditions in acceptance criteria.

    6. The ''so that'' clause must articulate genuine user/business value.

    '
  severity: medium
  technologies:
    lang: [general]
  domains:
    domain: [quality, management, testing]
    concern: [spec_writing, project]
  example_good: "# US-042: Shopping Cart Quantity Update\nAs a customer,\nI want to update item quantities in my cart,\nso\
    \ that I can adjust my order before checkout.\n\nAcceptance Criteria:\n  AC-1: Given an item in the cart with quantity\
    \ 1,\n        When I increase quantity to 3,\n        Then the cart total reflects 3x the item price\n        And the\
    \ inventory shows 3 units reserved.\n\n  AC-2: Given an item in the cart with quantity 3,\n        When I decrease quantity\
    \ to 0,\n        Then the item is removed from the cart.\n\n  AC-3: Given an item with only 2 units in stock,\n      \
    \  When I try to set quantity to 5,\n        Then the quantity is capped at 2\n        And I see a message: \"Only 2 available.\"\
    \n\n  AC-4: Given an empty cart,\n        When I view the cart page,\n        Then I see \"Your cart is empty\" with a\
    \ link to continue shopping.\n"
  example_bad: '# No acceptance criteria, vague benefit

    As a user, I want to manage my cart, so that it works well.


    # No Given/When/Then

    # No edge cases (out of stock, empty cart)

    # "works well" is not a testable outcome

    # Story is too large — "manage" could mean add, remove, update, clear

    '
  when_applies: Any system involving codebases with automated test suites
  when_not_applies: throwaway prototypes, learning exercises, or spike investigations where speed trumps correctness
  sources: ["https://cucumber.io/docs/gherkin/reference/"]
- id: CR-SPEC-004
  text: Document edge cases and boundary conditions explicitly — they cause the majority of production bugs
  why: Mainstream happy-path requirements are typically 20% of the spec but edge cases cause 80% of production incidents.
    Empty inputs, null values, concurrent access, timezone boundaries, Unicode characters, maximum lengths — these are where
    systems actually break. Undocumented edge cases become undiscovered bugs.
  how_to_do_right: '1. For every input field, document: empty, null, minimum, maximum, special characters, Unicode.

    2. For every numeric range, document: zero, negative, boundary values (off-by-one), overflow.

    3. For every time-based feature, document: timezone crossings, DST transitions, leap years.

    4. For every collection, document: empty list, single item, maximum size, duplicates.

    5. For every concurrent operation, document: race conditions, double-submit, stale reads.

    6. Create an edge case checklist template and apply it to every feature spec.

    '
  severity: high
  technologies:
    lang: [general]
  domains:
    domain: [quality, testing]
    concern: [spec_writing, code]
  example_good: '# Edge Cases for: User Registration (FR-REG-001)

    ## Input Boundaries

    - Email: max 254 chars (RFC 5321), Unicode local part, plus addressing (user+tag@domain)

    - Password: min 8 chars, max 128 chars, Unicode characters, common passwords rejected

    - Display name: min 1 char, max 50 chars, Unicode (CJK, Arabic, emoji), leading/trailing whitespace trimmed


    ## Error Scenarios

    - Duplicate email: return 409, not "email already registered" (prevents enumeration)

    - Invalid email format: return 422 with specific validation error

    - Network timeout during email verification: idempotent retry, verification link valid 24h

    - Concurrent registration with same email: database unique constraint, second request gets 409


    ## Temporal Edge Cases

    - Email verification link expires after 24 hours

    - Account created but not verified for 30 days: auto-delete + free up email

    - Registration during system maintenance: queue and process after maintenance window

    '
  example_bad: '# Edge cases not documented

    # Feature spec:

    FR-REG-001: Users can register with email and password.

    # That''s it. No boundaries, no error cases, no concurrent scenarios.

    # Production bugs discovered later:

    # - 500 error on emoji in display name

    # - Duplicate accounts from double-click

    # - Timezone confusion in verification link expiry

    '
  when_applies: Any system involving codebases with automated test suites
  when_not_applies: exploratory prototypes, one-off scripts, or spike investigations
  sources: ["https://martinfowler.com/articles/practical-test-pyramid.html"]
- id: CR-SPEC-005
  text: Start every technical spec with a clear problem statement explaining WHY this work is needed
  why: Without a problem statement, engineers solve the wrong problem or over-engineer solutions. The problem statement aligns
    the team on what success looks like before anyone writes code. It is the single most important section — if you cannot
    articulate the problem, you should not be writing a spec.
  how_to_do_right: '1. State the problem from the user''s/business''s perspective, not the technical one.

    2. Include quantified impact: ''X users affected'', ''Y dollars lost'', ''Z hours wasted per week''.

    3. Explain what happens if we do nothing (the cost of inaction).

    4. Keep it to 3-5 sentences — if you need more, you have multiple problems.

    5. Distinguish symptoms from root cause.

    6. Link to supporting data: error logs, user complaints, metrics dashboards.

    '
  severity: high
  technologies:
    lang: [general]
  domains:
    domain: [quality, architecture]
    concern: [spec_writing]
  example_good: '## Problem Statement


    ### What is happening

    Checkout page load time has degraded from 800ms (p95) to 4.2s (p95) over the last

    3 months, correlating with the product catalog growing from 50K to 500K SKUs.


    ### Who is affected

    All customers attempting checkout — approximately 12,000 sessions/day.


    ### Business impact

    Cart abandonment rate increased from 2.1% to 8.7% since the degradation began,

    representing approximately $340K/month in lost revenue (based on $45 average order value).


    ### Root cause

    The checkout page fetches the full product catalog to validate cart items. With 500K SKUs,

    this query takes 3.4s. The real need is to validate only the 1-15 items in the cart.


    ### Cost of inaction

    Revenue loss will compound as catalog grows. Black Friday (2 months away) with projected

    1M SKUs will push p95 above 10s, likely causing checkout failures.

    '
  example_bad: '## Problem Statement

    The checkout is slow and we need to make it faster.

    # No data, no impact, no root cause, no affected users

    # Engineers will guess at the cause and may optimize the wrong thing

    '
  when_applies: Any system involving systems requiring structural design decisions
  when_not_applies: small scripts under 100 lines, single-purpose utilities
  sources: ["https://www.joelonsoftware.com/2000/10/02/painless-functional-specifications-part-1-why-bother/"]
- id: CR-SPEC-006
  text: Document alternatives considered with clear rationale for why each was rejected
  why: Without documented alternatives, reviewers cannot evaluate whether the proposed solution is the best option. Future
    engineers will re-investigate the same alternatives you already evaluated. Documenting trade-offs shows rigorous thinking
    and prevents revisiting settled decisions during implementation.
  how_to_do_right: '1. List 2-4 genuine alternatives (not strawmen designed to fail).

    2. For each alternative, document: approach description, pros, cons, estimated effort.

    3. Use consistent evaluation criteria across all alternatives (cost, complexity, timeline, risk).

    4. Explicitly state why the chosen approach wins — what is the decisive factor?

    5. Note which alternatives could become viable if constraints change.

    6. Keep alternatives concise — one paragraph each, not full specs.

    '
  severity: medium
  technologies:
    lang: [general]
  domains:
    domain: [quality, architecture]
    concern: [spec_writing]
  example_good: "## Alternatives Considered\n\n### Option A: Database-level caching (Redis)\nAdd a Redis cache layer for checkout\
    \ product validation.\n- Pros: Fast reads (~1ms), well-understood pattern, no schema changes.\n- Cons: Cache invalidation\
    \ complexity, additional infrastructure, eventual consistency.\n- Effort: 2 weeks\n- Rejected: Cache invalidation for\
    \ 500K products is error-prone; stale prices during checkout\n  are unacceptable (users charged wrong amount).\n\n###\
    \ Option B: Pre-computed cart validation table (CHOSEN)\nMaintain a denormalized table with only fields needed for cart\
    \ validation (SKU, price, stock).\n- Pros: Consistent reads, simple queries, no cache invalidation, works with existing\
    \ infra.\n- Cons: Write amplification on product updates, additional storage (~50MB).\n- Effort: 1.5 weeks\n- Chosen:\
    \ Consistency is critical for checkout. Write amplification is negligible (product updates\n  are ~100/day vs 12,000 checkouts/day).\n\
    \n### Option C: GraphQL with DataLoader batching\nMigrate checkout to GraphQL with batched product queries.\n- Pros: Elegant,\
    \ only fetches needed fields, reusable across app.\n- Cons: Major refactor (3-6 weeks), new technology for team, learning\
    \ curve.\n- Effort: 4-6 weeks\n- Rejected: Timeline too long given Black Friday deadline. Viable for Q1 2027 checkout\
    \ rewrite.\n"
  example_bad: '## Alternatives

    We considered not doing it but decided to do it.

    We also considered rewriting everything in Rust but that seemed like too much work.

    # Strawman alternatives, no real evaluation criteria

    # No pros/cons, no effort estimates, no decisive factor

    '
  when_applies: Any system involving systems requiring structural design decisions
  when_not_applies: small scripts under 100 lines, single-purpose utilities
  sources: ["https://cognitect.com/blog/2011/11/15/documenting-architecture-decisions"]
- id: CR-SPEC-007
  text: Include a phased delivery plan with milestones — never propose a single big-bang release
  why: Big-bang releases have a near-100% failure rate for non-trivial features. Each milestone should deliver verifiable
    incremental value and serve as a checkpoint. Phased delivery de-risks the project, provides early feedback, and allows
    course correction before investing the full effort.
  how_to_do_right: '1. Phase 1 should deliver the minimum viable increment (usually 30-40% of total scope).

    2. Each phase has: deliverables, acceptance criteria, estimated timeline, dependencies.

    3. Phases are independently deployable — Phase 1 works in production without Phase 2.

    4. Include a ''Phase 0'' for spikes, prototypes, or infrastructure setup if needed.

    5. Flag decision points: ''After Phase 1, decide whether Phase 2 scope needs adjustment.''

    6. Total timeline should not exceed 2-3x the first phase (otherwise split into separate projects).

    '
  severity: medium
  technologies:
    lang: [general]
  domains:
    domain: [quality, management]
    concern: [spec_writing, project]
  example_good: '## Delivery Plan


    ### Phase 0: Spike (3 days)

    - Benchmark current checkout query performance

    - Prototype denormalized table with production data sample

    - Decision: confirm approach or pivot to alternative

    - Deliverable: Benchmark report with go/no-go recommendation


    ### Phase 1: Core validation table (1 week)

    - Create cart_validation table (sku, price, stock_count, updated_at)

    - Backfill from products table

    - Dual-read: checkout reads from new table, falls back to old query

    - Deliverable: Checkout p95 < 500ms with feature flag ON

    - Rollback: Feature flag OFF reverts to old query


    ### Phase 2: Write pipeline (3 days)

    - CDC trigger on products table updates cart_validation

    - Monitoring: alert if cart_validation staleness > 5 minutes

    - Remove dual-read fallback

    - Deliverable: Self-maintaining validation table, no manual backfills


    ### Phase 3: Cleanup (2 days)

    - Remove old checkout query code

    - Update documentation and runbooks

    - Performance report comparing before/after

    '
  example_bad: '## Plan

    We''ll build it all at once and deploy in 6 weeks.

    # No phases, no milestones, no checkpoints

    # No rollback strategy

    # No way to get early feedback

    # If something goes wrong at week 5, all 5 weeks are wasted

    '
  when_applies: All software engineering decisions
  when_not_applies: throwaway prototypes, learning exercises, or spike investigations where speed trumps correctness
  sources: ["https://martinfowler.com/bliki/FrequencyReducesDifficulty.html"]
- id: CR-SPEC-008
  text: Document risks with likelihood, impact, and specific mitigation actions
  why: 'Unacknowledged risks do not go away — they become surprises. Every significant technical decision carries risk: performance
    risk, security risk, timeline risk, adoption risk. Documenting risks with mitigations shows mature engineering judgment
    and prepares the team for contingencies.'
  how_to_do_right: '1. Identify 3-7 realistic risks (not theoretical, actually likely for this project).

    2. Rate each: likelihood (low/medium/high), impact (low/medium/high).

    3. For each risk, specify a concrete mitigation action with an owner.

    4. Include a ''trigger'' — the observable signal that the risk is materializing.

    5. Identify which risks are blockers vs manageable.

    6. Update the risk register as the project progresses.

    '
  severity: medium
  technologies:
    lang: [general]
  domains:
    domain: [quality, management]
    concern: [spec_writing, project]
  example_good: '## Risks


    | Risk | Likelihood | Impact | Trigger | Mitigation |

    |------|-----------|--------|---------|------------|

    | Cart validation table staleness > 5 min | Medium | High (wrong prices at checkout) | Monitoring alert: staleness > 3
    min | CDC with WAL-level replication, <1s propagation. Fallback: direct query if stale >5 min. Owner: @backend-team |

    | Migration takes longer than 1 week due to data inconsistencies | Low | Medium (delays Phase 2) | Backfill job finds
    >1% mismatches | Phase 0 spike validates data quality. Budget 2 days for data cleanup. Owner: @data-team |

    | Black Friday traffic exceeds projections (>2x) | Medium | High (checkout failures) | Load test shows degradation at
    1.5x | Pre-scale infrastructure 2 weeks before. Cart validation table is read-heavy and horizontally scalable. Owner:
    @infra-team |

    '
  example_bad: '## Risks

    Hopefully nothing goes wrong.

    # No risks identified

    # No mitigations planned

    # Team will be surprised when issues arise

    '
  when_applies: All software engineering decisions
  when_not_applies: throwaway prototypes, learning exercises, or spike investigations where speed trumps correctness
  sources: ["https://www.sei.cmu.edu/publications/sei-blog/2017/risk-management-for-software-projects/"]
- id: CR-SPEC-009
  text: Design APIs contract-first using OpenAPI/Swagger — generate code from the spec, not spec from code
  why: Code-first APIs drift from documentation, create breaking changes for consumers, and prevent parallel frontend/backend
    development. Contract-first development means the API spec IS the source of truth — frontend and backend can develop in
    parallel, and breaking changes are caught at the spec review level.
  how_to_do_right: '1. Write the OpenAPI spec BEFORE writing any implementation code.

    2. Review the spec with API consumers (frontend team, partner integrations) before building.

    3. Generate server stubs and client SDKs from the spec.

    4. Run contract tests in CI that validate implementation matches spec.

    5. Version the spec file in the repository alongside the code.

    6. Use tools: Stoplight Studio for design, Prism for mock server, Spectral for linting.

    '
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi, backend, express]
    library: [openapi]
    platform: [rest]
  domains:
    domain: [quality, architecture]
    concern: [spec_writing, backend, frontend]
  example_good: "# openapi.yaml — written BEFORE implementation\nopenapi: \"3.1.0\"\ninfo:\n  title: Cart Validation API\n\
    \  version: \"1.0.0\"\npaths:\n  /api/v1/cart/validate:\n    post:\n      summary: Validate cart items against current\
    \ inventory\n      operationId: validateCart\n      requestBody:\n        required: true\n        content:\n         \
    \ application/json:\n            schema:\n              $ref: \"#/components/schemas/CartValidationRequest\"\n       \
    \     example:\n              items:\n                - sku: \"WIDGET-001\"\n                  quantity: 2\n      responses:\n\
    \        \"200\":\n          description: Validation result\n          content:\n            application/json:\n     \
    \         schema:\n                $ref: \"#/components/schemas/CartValidationResponse\"\n        \"422\":\n         \
    \ description: Invalid request\n          content:\n            application/json:\n              schema:\n           \
    \     $ref: \"#/components/schemas/ErrorResponse\"\n"
  example_bad: "# No spec written — API \"documented\" after the fact\n@app.post(\"/validate\")  # no versioning\nasync def\
    \ validate(data: dict):  # untyped input\n    # Implementation first, \"we'll document later\" (never happens)\n    items\
    \ = data.get(\"items\", [])\n    # No schema validation\n    # No error response format\n    # Frontend team has to read\
    \ the code to understand the API\n"
  when_applies: Any system involving client-side rendering and browser-based UIs
  when_not_applies: throwaway prototypes, learning exercises, or spike investigations where speed trumps correctness
  sources: ["https://swagger.io/specification/"]
- id: CR-SPEC-010
  text: Document every error response with status code, error code, and human-readable message
  why: API consumers (frontend developers, partner integrations) spend more time handling errors than happy paths. Undocumented
    errors cause generic 'Something went wrong' messages in the UI, making debugging impossible for both users and developers.
    Each error should be actionable.
  how_to_do_right: '1. Define a consistent error response schema: { error_code, message, details, request_id }.

    2. Document ALL possible error responses for each endpoint (not just 200 and 500).

    3. Error codes should be machine-readable (CART_ITEM_OUT_OF_STOCK, not "error").

    4. Messages should be human-readable and suggest corrective action.

    5. Include a request_id in every error for support debugging.

    6. Group errors by category in API docs for discoverability.

    '
  severity: high
  technologies:
    lang: [python, graphql]
    framework: [fastapi, backend, express]
    platform: [rest]
  domains:
    domain: [quality, architecture]
    concern: [spec_writing, backend, frontend]
  example_good: "# Error responses documented per endpoint\nresponses:\n  \"200\":\n    description: Cart validated successfully\n\
    \  \"400\":\n    description: Invalid request format\n    content:\n      application/json:\n        schema:\n       \
    \   $ref: \"#/components/schemas/ErrorResponse\"\n        examples:\n          empty_cart:\n            value:\n     \
    \         error_code: \"CART_EMPTY\"\n              message: \"Cart must contain at least one item.\"\n              request_id:\
    \ \"req_abc123\"\n  \"409\":\n    description: Cart conflict\n    content:\n      application/json:\n        examples:\n\
    \          out_of_stock:\n            value:\n              error_code: \"ITEM_OUT_OF_STOCK\"\n              message:\
    \ \"WIDGET-001 has only 2 units available. Please reduce quantity.\"\n              details:\n                sku: \"\
    WIDGET-001\"\n                requested: 5\n                available: 2\n              request_id: \"req_abc123\"\n \
    \         price_changed:\n            value:\n              error_code: \"PRICE_CHANGED\"\n              message: \"Price\
    \ for WIDGET-001 changed from $10.00 to $12.00 since it was added to cart.\"\n              details:\n               \
    \ sku: \"WIDGET-001\"\n                cart_price: 10.00\n                current_price: 12.00\n              request_id:\
    \ \"req_abc123\"\n"
  example_bad: "# Only documents 200, everything else is a mystery\nresponses:\n  \"200\":\n    description: Success\n  #\
    \ What happens on invalid input? 400? 422?\n  # What happens if item is out of stock? 409? 200 with error flag?\n  # What\
    \ does the error body look like? Nobody knows.\n  # Frontend developer writes: catch(e) { alert(\"Something went wrong\"\
    ) }\n"
  when_applies: Any system involving client-side rendering and browser-based UIs
  when_not_applies: throwaway prototypes, learning exercises, or spike investigations where speed trumps correctness
  sources: ["https://swagger.io/specification/#responses-object"]
- id: CR-SPEC-011
  text: Define API versioning strategy upfront — URL path versioning for external, header versioning for internal
  why: 'APIs without versioning cannot evolve without breaking consumers. Adding versioning after the fact is a painful migration.
    URL path versioning (/v1/, /v2/) is most discoverable for external consumers; header versioning (Accept: application/vnd.api+json;version=2)
    is cleaner for internal services.'
  how_to_do_right: '1. Choose a strategy before the first endpoint is built: URL path or header.

    2. Start at v1 (not v0 — that signals instability to consumers).

    3. Define what constitutes a breaking change: removed field, type change, new required field.

    4. Non-breaking changes (new optional field, new endpoint) do NOT require version bump.

    5. Support N-1 version minimum — sunset with 6-month deprecation notice.

    6. Document the versioning policy in the API overview section.

    '
  severity: medium
  technologies:
    lang: [python]
    framework: [fastapi, backend, express]
    platform: [rest]
  domains:
    domain: [quality, architecture]
    concern: [spec_writing, backend]
  example_good: "# URL path versioning for external APIs\n# /api/v1/cart/validate — current version\n# /api/v2/cart/validate\
    \ — new version with breaking changes\n\n# Versioning policy documented in API overview\n## API Versioning Policy\n- Versions\
    \ are indicated by URL path prefix: `/api/v1/`, `/api/v2/`\n- Breaking changes require a new major version\n- Breaking\
    \ changes: field removal, type changes, new required fields, behavior changes\n- Non-breaking changes: new optional fields,\
    \ new endpoints (added to current version)\n- Deprecated versions: 6-month sunset notice via Deprecation header\n- Minimum\
    \ supported versions: current (v2) and previous (v1)\n\n# FastAPI implementation\nfrom fastapi import APIRouter\n\nv1_router\
    \ = APIRouter(prefix=\"/api/v1\")\nv2_router = APIRouter(prefix=\"/api/v2\")\n\n@v1_router.post(\"/cart/validate\")\n\
    async def validate_cart_v1(request: CartValidationRequestV1):\n    \"\"\"V1: Returns simple pass/fail.\"\"\"\n    ...\n\
    \n@v2_router.post(\"/cart/validate\")\nasync def validate_cart_v2(request: CartValidationRequestV2):\n    \"\"\"V2: Returns\
    \ per-item validation with suggested alternatives.\"\"\"\n    ...\n"
  example_bad: "# No versioning — breaking changes break all consumers\n@app.post(\"/cart/validate\")\nasync def validate_cart(request:\
    \ dict):\n    ...\n# 6 months later: \"We need to change the response format\"\n# Choice: break all consumers, or add\
    \ ugly if/else for old format\n# Neither option is good — versioning should have been there from day 1\n"
  when_applies: Any system involving systems requiring structural design decisions
  when_not_applies: throwaway prototypes, learning exercises, or spike investigations where speed trumps correctness
  sources: ["https://www.rfc-editor.org/rfc/rfc7231#section-6"]
- id: CR-SPEC-012
  text: Use Architecture Decision Records (ADRs) for every significant technical decision
  why: Without ADRs, teams lose the context behind technical decisions. New team members ask 'why did we choose X?' and nobody
    remembers. Decisions get revisited endlessly because the reasoning was never documented. ADRs are lightweight (1 page)
    and create an invaluable decision history.
  how_to_do_right: '1. Use a standard template: Title, Status, Context, Decision, Consequences.

    2. Write the ADR WHEN the decision is made, not retroactively.

    3. Keep ADRs immutable — supersede with a new ADR rather than editing old ones.

    4. Status lifecycle: Proposed → Accepted → Deprecated → Superseded.

    5. Store ADRs in the repository (docs/decisions/ or docs/adrs/).

    6. Number sequentially: ADR-0001, ADR-0002 for easy reference.

    '
  severity: medium
  technologies:
    lang: [general]
  domains:
    domain: [quality, architecture, governance]
    concern: [spec_writing]
  example_good: '# ADR-0042: Use PostgreSQL for cart validation cache


    ## Status

    Accepted (2026-02-01)


    ## Context

    Checkout latency increased to 4.2s (p95) due to full catalog query.

    We need a fast lookup for cart item validation (price, stock, SKU).

    See: SPEC-CHECKOUT-PERF for full problem statement.


    ## Decision

    Create a denormalized cart_validation table in PostgreSQL (not Redis)

    with CDC-based updates from the products table.


    ## Consequences

    ### Positive

    - Consistent reads (no cache invalidation bugs)

    - Uses existing infrastructure (no new Redis cluster)

    - Transactional with checkout (same database)


    ### Negative

    - Write amplification on product updates (~100 writes/day, negligible)

    - Additional 50MB storage

    - CDC pipeline is new infrastructure to maintain


    ### Risks

    - CDC lag > 5min during high-volume product imports → mitigated by direct-query fallback


    ## Alternatives Considered

    - ADR-0041-rejected: Redis cache (rejected: consistency concerns)

    - GraphQL batching (rejected: timeline)

    '
  example_bad: '# Team discussion in Slack:

    # "Should we use Redis or Postgres for this?"

    # "Postgres I guess"

    # "OK"

    # No record of why, no alternatives evaluated

    # 6 months later: "Why didn''t we use Redis? Let''s switch."

    # Re-evaluates the same trade-offs, wastes another week

    '
  when_applies: Any system involving systems requiring structural design decisions
  when_not_applies: small scripts under 100 lines, single-purpose utilities
  sources: ["https://cognitect.com/blog/2011/11/15/documenting-architecture-decisions", "https://adr.github.io/"]
- id: CR-SPEC-013
  text: Conduct time-boxed spikes before specifying complex or uncertain features
  why: Specifying a solution you have not prototyped leads to specs full of assumptions that collapse during implementation.
    A spike is a time-boxed investigation (1-3 days) that answers specific technical questions. The output is knowledge, not
    code — the prototype is thrown away, the learnings inform the spec.
  how_to_do_right: '1. Define the spike as 1-3 specific questions to answer (not ''explore technology X'').

    2. Time-box strictly: 1-3 days maximum. If you cannot answer in 3 days, scope is too broad.

    3. Output is a written summary with findings, not a prototype to keep.

    4. The spike informs the spec — it does not replace the spec.

    5. Include: what we tested, what we learned, what risks remain, recommendation.

    6. If the spike invalidates the approach, that is a successful spike.

    '
  severity: medium
  technologies:
    lang: [general]
  domains:
    domain: [quality, architecture, management]
    concern: [spec_writing, project]
  example_good: "# Spike: CDC Performance for Cart Validation Table\n## Questions to Answer (time-box: 2 days)\n1. Can PostgreSQL\
    \ logical replication deliver <5s latency for 100 product updates/minute?\n2. What is the storage overhead of the denormalized\
    \ cart_validation table at 500K products?\n3. Does CDC handle schema migrations gracefully?\n\n## Findings\n1. YES — measured\
    \ 200ms average propagation delay at 100 updates/min on staging.\n   At 1000 updates/min (10x projection): 1.2s average,\
    \ 4.8s p99. Acceptable.\n2. Storage: 47MB for 500K products (6 columns: sku, price, stock, name, updated_at, active).\n\
    \   Projected 94MB at 1M products. Negligible.\n3. PARTIAL — additive schema changes (new columns) propagate automatically.\n\
    \   Column type changes require re-initialization. Documented in runbook.\n\n## Recommendation\nProceed with CDC approach.\
    \ Risk of schema migration is manageable with documented runbook.\nKey finding: direct fallback query should remain available\
    \ for first 30 days.\n"
  example_bad: '# No spike, jump straight to implementation

    # Week 1: "Let''s use CDC for the validation table"

    # Week 2: "CDC latency is too high"

    # Week 3: "Switch to polling approach"

    # Week 4: "Polling missed updates, data is stale"

    # Wasted 3 weeks because nobody spent 2 days investigating first

    '
  when_applies: Any system involving systems requiring structural design decisions
  when_not_applies: small scripts under 100 lines, single-purpose utilities
  sources: ["https://www.agilealliance.org/glossary/spike/"]
- id: CR-SPEC-014
  text: Prototype high-risk UI/UX assumptions before writing the full feature spec
  why: UI specs based on assumptions about user behavior are frequently wrong. A clickable prototype (Figma, HTML mockup)
    tested with 3-5 users in 1-2 days reveals fundamental usability issues that would otherwise be discovered after weeks
    of development. The cost of changing a prototype is 1% of changing a shipped feature.
  how_to_do_right: '1. Identify the riskiest assumption in the feature (e.g., ''users will understand this workflow'').

    2. Create a low-fidelity clickable prototype in 1 day (Figma, Balsamiq, or HTML/CSS).

    3. Test with 3-5 representative users — observe, do not guide.

    4. Document findings: what worked, what confused users, what they expected instead.

    5. Update the spec based on findings before development begins.

    6. Key insight: 5 users find 85% of usability problems (Nielsen/Landauer).

    '
  severity: medium
  technologies:
    lang: [html, css, javascript]
    library: [figma]
  domains:
    domain: [quality, architecture]
    concern: [spec_writing, frontend, ux]
  example_good: "# Prototype Test Report: Cart Quantity Update\n## Prototype\n- Tool: Figma interactive prototype, 5 screens\n\
    - Time to build: 4 hours\n\n## Participants\n5 users matching target persona (online shoppers, age 25-45)\n\n## Key Findings\n\
    1. 4/5 users tried to type quantity directly (our design only had +/- buttons)\n   → ACTION: Add direct input field with\
    \ +/- buttons as secondary control\n2. 3/5 users expected \"Remove\" button (setting to 0 was not discoverable)\n   →\
    \ ACTION: Add explicit \"Remove\" link/button per item\n3. 5/5 users expected immediate price update (our prototype delayed\
    \ until \"Update Cart\")\n   → ACTION: Update totals in real-time on quantity change\n4. 2/5 users looked for \"Save for\
    \ later\" when reducing quantity\n   → DEFER: Nice-to-have, not in v1 scope\n\n## Spec Impact\n- FR-CART-003 updated:\
    \ support direct quantity input\n- FR-CART-004 added: explicit remove button per item\n- NFR-UX-001 updated: real-time\
    \ price calculation (no page reload)\n"
  example_bad: '# No prototype, no user testing

    # PM: "Let''s just build it and see"

    # 3 weeks of development

    # Launch: "Why are users confused by the cart?"

    # 2 more weeks to redesign and rebuild

    # Total: 5 weeks. With prototype: 3.5 weeks + better UX

    '
  when_applies: Any system involving client-side rendering and browser-based UIs
  when_not_applies: server-rendered pages, APIs, CLI tools
  sources: ["https://www.nngroup.com/articles/why-you-only-need-to-test-with-5-users/"]
