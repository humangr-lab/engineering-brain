layer: rules
domain: sacada
knowledge:
- id: PEI-001
  text: "Cross-file contract verification — every function call must match the callee's actual signature, not your assumption of it. Read the target file BEFORE writing the call."
  why: >
    In multi-file systems, the #1 source of integration bugs is calling a function with the wrong argument names,
    wrong types, or wrong order. This is especially insidious because the code looks correct in isolation — it only
    fails at runtime when the two files interact. In pipeline systems like LangGraph or CrewAI, a single mismatched
    key name can silently propagate None values through an entire execution chain, producing wrong results without
    any error. Static type checkers catch some of these, but not dict-based contracts or dynamic dispatch.
  how_to_do_right: >
    1. BEFORE writing any cross-file call, open the target file and read the function signature.

    2. Verify parameter names match EXACTLY (not just semantically — "user_id" != "userId" != "id").

    3. Verify parameter types match (str vs int, list vs tuple, Optional vs required).

    4. Verify return type matches what you expect to receive.

    5. If the contract is dict-based (e.g., LangGraph state), verify ALL expected keys exist in the dict.

    6. Add an integration test that exercises the actual call path across files.

    7. When modifying a function signature, grep for ALL callers and update them in the same commit.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, integration]
    concern: [meta_cognition]
  example_good: |
    # Before calling spec_node from workflow.py, read spec_node.py:
    # def spec_node(state: PipelineState) -> dict:
    #     sprint_id = state["sprint_id"]       # expects "sprint_id"
    #     context_pack = state["context_pack"]  # expects "context_pack"

    # In workflow.py — match EXACTLY:
    initial_state = {
        "sprint_id": "S00",          # matches state["sprint_id"]
        "context_pack": loaded_pack,  # matches state["context_pack"]
    }
    result = spec_node(initial_state)

    # Verify return contract too:
    assert "work_packages" in result, "spec_node must return work_packages"
  example_bad: |
    # Developer assumes the function takes "sprint" not "sprint_id":
    initial_state = {
        "sprint": "S00",            # WRONG KEY — spec_node reads state["sprint_id"]
        "context": loaded_pack,     # WRONG KEY — spec_node reads state["context_pack"]
    }
    result = spec_node(initial_state)
    # No error raised — just KeyError at runtime or worse, silent None propagation
  when_applies: Every time you write code that calls a function, method, or API defined in a different file. Especially critical in dict-based state passing (LangGraph, pipeline orchestrators).
  sources: ["https://martinfowler.com/articles/consumer-driven-contracts.html"]

- id: PEI-002
  text: "End-to-end request tracing — trace a request from entry point to final output BEFORE declaring a feature complete. Walk the code path manually."
  why: >
    Unit tests verify individual functions work. Integration tests verify pairs of functions work. But neither
    guarantees the full request path works end-to-end. In pipeline systems, a request passes through 5-15 stages,
    each transforming state. A bug in stage 7 might only manifest because stage 3 set an unexpected value. The only
    way to catch these is to trace a concrete request through every stage, verifying the state transformation at
    each step. Without this, you ship code where each piece works individually but the whole pipeline produces
    garbage.
  how_to_do_right: >
    1. Pick a concrete input (e.g., a specific sprint ID with a known context pack).

    2. Trace it through EVERY stage of the pipeline, writing down the state after each stage.

    3. At each stage, verify: (a) the input matches what the stage expects, (b) the output matches what the next stage expects.

    4. Pay special attention to type transformations (dict to object, object to dict, serialization boundaries).

    5. Check for data loss — does any stage drop a field that a later stage needs?

    6. Check for data corruption — does any stage modify a field in an unexpected way?

    7. Write at least ONE end-to-end test that exercises the full path with a real (not mocked) pipeline.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, integration]
    concern: [meta_cognition]
  example_good: |
    # End-to-end trace for sprint S00:
    # Stage 1: spec_node — input: {"sprint_id": "S00"} → output: {"work_packages": [...]}
    # Stage 2: exec_node — input: {"work_packages": [...]} → output: {"artifacts": [...]}
    # Stage 3: qa_node — input: {"artifacts": [...]} → output: {"findings": [...]}
    # Stage 4: gate_node — input: {"findings": [...]} → output: {"verdict": "PASS"}

    def test_e2e_sprint_s00():
        state = {"sprint_id": "S00", "context_pack": load_pack("S00")}
        state = spec_node(state)
        assert "work_packages" in state
        state = exec_node(state)
        assert "artifacts" in state
        state = qa_node(state)
        assert "findings" in state
        state = gate_node(state)
        assert state["verdict"] in ("PASS", "FAIL")
  example_bad: |
    # Developer writes spec_node, tests it in isolation, declares "done":
    def test_spec_node():
        result = spec_node({"sprint_id": "S00"})
        assert "work_packages" in result
        # DONE! Ship it!

    # But spec_node returns work_packages as a list of dicts,
    # while exec_node expects a list of WorkPackage objects.
    # This only fails in production when the full pipeline runs.
  when_applies: Before declaring any pipeline feature, API endpoint, or multi-stage workflow as complete. Mandatory for any change that touches more than one stage.
  sources: ["https://martinfowler.com/articles/practical-test-pyramid.html"]

- id: PEI-003
  text: "Key name mismatch detection — use constants or enums for shared state keys, never raw strings. A typo in a dict key is a silent bug that no linter catches."
  why: >
    Dict-based state passing is the standard pattern in LangGraph, CrewAI, and most pipeline systems. The problem
    is that dict keys are strings, and strings have no compile-time validation. If stage A writes state["sprint_id"]
    and stage B reads state["sprintId"], Python happily returns None or raises a KeyError deep in the stack.
    This class of bug is responsible for an estimated 15-20% of all pipeline integration failures. Constants or
    TypedDict solve this by making the keys inspectable and IDE-autocomplete-able.
  how_to_do_right: >
    1. Define ALL shared state keys as constants in a single file (e.g., state_keys.py).

    2. Use TypedDict or dataclass to define the state shape with type annotations.

    3. NEVER use raw string literals for state keys in pipeline code.

    4. In code review, flag any raw string dict access on pipeline state.

    5. Add a linting rule or test that verifies no raw string keys are used on state objects.

    6. When adding a new key, add it to the constants file FIRST, then use it everywhere.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, integration]
    concern: [meta_cognition]
  example_good: |
    # state_keys.py — single source of truth
    from typing import TypedDict, List, Optional

    class PipelineState(TypedDict):
        sprint_id: str
        context_pack: dict
        work_packages: List[dict]
        artifacts: Optional[List[str]]

    # In spec_node.py:
    from state_keys import PipelineState

    def spec_node(state: PipelineState) -> PipelineState:
        sprint_id = state["sprint_id"]  # IDE autocomplete, type-checked
        return {**state, "work_packages": generate_wps(sprint_id)}

    # In exec_node.py:
    from state_keys import PipelineState

    def exec_node(state: PipelineState) -> PipelineState:
        wps = state["work_packages"]  # Same key, guaranteed match
        return {**state, "artifacts": execute_wps(wps)}
  example_bad: |
    # In spec_node.py:
    def spec_node(state):
        return {**state, "work_packages": generate_wps(state["sprint_id"])}

    # In exec_node.py:
    def exec_node(state):
        wps = state["workPackages"]  # TYPO: camelCase vs snake_case
        # KeyError at runtime, or worse — None propagation if using .get()
  when_applies: Any codebase using dict-based state passing between components. Critical in LangGraph workflows, pipeline orchestrators, and event-driven systems.
  sources: ["https://docs.python.org/3/library/typing.html#typing.TypedDict"]

- id: PEI-004
  text: "Self-check protocol — after EVERY change, run compile, test, and verify in that order. Never batch changes without intermediate verification."
  why: >
    The cost of finding a bug grows exponentially with the distance from the change that introduced it. If you
    make 10 changes and then test, you have 10 possible causes for any failure. If you test after each change,
    you always know exactly which change broke things. In pipeline development, this is even more critical because
    changes propagate through stages — a bug introduced in change 3 might only manifest as a failure in change 8's
    test. The self-check protocol (compile, test, verify) after each change keeps the feedback loop tight and the
    debugging trivial.
  how_to_do_right: >
    1. After EVERY code change (even a one-liner), run: (a) compile/lint check, (b) relevant unit tests, (c) integration verify.

    2. If any step fails, FIX IT before making the next change. Never accumulate broken state.

    3. Use a script or makefile target that runs all three in sequence: `make check` or `./check.sh`.

    4. If tests are slow, run only the affected tests after each change, full suite before commit.

    5. For pipeline code, "verify" means running a smoke test through the actual pipeline, not just unit tests.

    6. Track how often you catch bugs at each stage — most should be caught at step (a), not step (c).
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, integration]
    concern: [meta_cognition]
  example_good: |
    # Change 1: Add new field to PipelineState
    # → ruff check src/ ✓
    # → pytest tests/test_state.py ✓
    # → python -m pipeline_v2.cli health ✓

    # Change 2: Use new field in spec_node
    # → ruff check src/ ✓
    # → pytest tests/test_spec_node.py ✓
    # → PYTHONPATH=src python -c "from pipeline_v2.langgraph.nodes import spec_node; print('OK')" ✓

    # Change 3: Consume new field in exec_node
    # → ruff check src/ ✓
    # → pytest tests/test_exec_node.py ✓
    # → PYTHONPATH=src pytest tests/test_e2e_synthetic_sprints.py -k test_basic ✓
  example_bad: |
    # Developer makes 8 changes across 5 files in one session
    # Then runs tests:
    # → 17 failures
    # → No idea which of the 8 changes caused which failure
    # → Spends 3 hours debugging
    # → Reverts everything and starts over
    # → Total waste: 5 hours
  when_applies: After every code change, no matter how small. The protocol is especially important during multi-file refactors and pipeline stage modifications.
  sources: ["https://martinfowler.com/bliki/ContinuousIntegration.html"]

- id: PEI-005
  text: "Import dependency ordering — when modifying shared modules, update in dependency order (leaves first, roots last). Never update a module before its dependencies are stable."
  why: >
    In a Python codebase with deep import chains, changing a module that is imported by 20 other modules can
    create a cascade of failures. If you change the root first and then update the leaves, you have a window
    where the entire codebase is broken. If you change the leaves first (or add backward-compatible changes to the
    root), you maintain a working codebase at every step. This is especially important in pipeline systems where
    circular imports and import-time side effects are common failure modes.
  how_to_do_right: >
    1. Before modifying a shared module, map its dependency graph: who imports it, and who does it import?

    2. Make changes in LEAF-FIRST order: update consumers before changing the provider's interface.

    3. If changing a provider's interface, use a deprecation pattern: add new interface, migrate consumers, remove old interface.

    4. NEVER rename a function or class in a shared module without grepping for all callers first.

    5. If adding a new import, verify it does not create a circular dependency (python -c "import module").

    6. Test imports in isolation: python -c "from module import thing" before running full tests.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, integration]
    concern: [meta_cognition]
  example_good: |
    # Goal: Rename PipelineState.sprint_id → PipelineState.sprint_identifier

    # Step 1: Add new field (backward compatible)
    class PipelineState(TypedDict):
        sprint_id: str  # deprecated, kept for compatibility
        sprint_identifier: str  # new canonical name

    # Step 2: Update all consumers (leaves) to use new name
    # grep -r "sprint_id" src/ → 47 files
    # Update each one to use sprint_identifier

    # Step 3: After ALL consumers are migrated, remove old field
    class PipelineState(TypedDict):
        sprint_identifier: str
  example_bad: |
    # Developer renames field in shared module FIRST:
    class PipelineState(TypedDict):
        sprint_identifier: str  # renamed from sprint_id

    # Now 47 files are broken immediately
    # Developer starts fixing them one by one
    # Meanwhile, CI is red, other developers are blocked
    # Takes 2 hours to fix all 47 files
  when_applies: Any time you modify a module that is imported by other modules. Especially critical for shared types, constants, utilities, and pipeline state definitions.
  sources: ["https://docs.python.org/3/library/importlib.html"]

- id: PEI-006
  text: "API response schema validation — validate API responses against a schema at the boundary, not deep inside business logic. Trust nothing from external services."
  why: >
    External APIs change without notice. A field that was a string becomes an int. A required field becomes
    optional. A list that was never empty suddenly is. If you pass raw API responses deep into your business logic,
    these changes cause cryptic failures far from the actual problem. By validating at the boundary (immediately
    after the HTTP call), you get a clear, actionable error message at the exact point of failure. Pydantic models
    are the standard way to do this in Python — they validate and coerce types automatically.
  how_to_do_right: >
    1. Define a Pydantic model for EVERY external API response you consume.

    2. Parse the response into the model IMMEDIATELY after the HTTP call, before any business logic.

    3. If parsing fails, raise a clear error with the raw response for debugging.

    4. Never access raw dict keys from API responses in business logic — always go through the model.

    5. Add a test that uses a recorded real response to verify the model still parses correctly.

    6. When the API changes, update the model FIRST, then update business logic.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, integration]
    concern: [meta_cognition]
  example_good: |
    from pydantic import BaseModel, Field
    from typing import List, Optional
    import httpx

    class LLMResponse(BaseModel):
        content: str
        model: str
        usage: dict
        finish_reason: Optional[str] = None

    async def call_llm(prompt: str) -> LLMResponse:
        response = await httpx.post(LLM_URL, json={"prompt": prompt})
        response.raise_for_status()
        return LLMResponse.model_validate(response.json())  # Validates HERE

    # Business logic receives typed, validated data:
    result = await call_llm("Generate a plan")
    print(result.content)  # IDE autocomplete, type-safe
  example_bad: |
    async def call_llm(prompt: str) -> dict:
        response = await httpx.post(LLM_URL, json={"prompt": prompt})
        return response.json()  # Raw dict, no validation

    # Deep in business logic, 3 files away:
    result = await call_llm("Generate a plan")
    text = result["choices"][0]["message"]["content"]  # KeyError if API changes
    # Error message: KeyError: 'choices' — WHERE? WHY? What was the raw response?
  when_applies: Every time you consume an external API, LLM response, webhook payload, or any data crossing a trust boundary. Also applies to reading files, database results, and message queue payloads.
  sources: ["https://docs.pydantic.dev/latest/concepts/validators/"]

- id: PEI-007
  text: "Database migration verification — every schema change must have a migration, every migration must be tested with real data, and rollback must be verified before deploy."
  why: >
    Database migrations are the riskiest part of any deployment. A failed migration can corrupt data, lock tables
    for minutes, or make rollback impossible. The three most common migration disasters are: (1) migration works on
    empty test DB but fails on production with millions of rows, (2) migration has no rollback and you are stuck
    with a broken schema, (3) migration drops a column that another service still reads. Each of these is
    preventable with verification before deploy.
  how_to_do_right: >
    1. Every schema change MUST have a migration file (never modify production schema manually).

    2. Test migration FORWARD on a copy of production data (not just empty test DB).

    3. Test migration BACKWARD (rollback) — verify the rollback script works.

    4. For large tables, estimate migration time: ALTER TABLE on 10M rows can take minutes and lock the table.

    5. Use expand-contract pattern for breaking changes: add new column, migrate data, remove old column.

    6. Never drop columns in the same release that removes the code reading them — deploy code first, drop column later.

    7. Verify all services that read from the affected table are compatible with the new schema.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, integration]
    concern: [meta_cognition]
  example_good: |
    # Alembic migration: add status column to claims table
    def upgrade():
        op.add_column('claims', sa.Column('status', sa.String(50), server_default='pending'))
        # Backfill existing rows:
        op.execute("UPDATE claims SET status = 'verified' WHERE verified = true")
        op.execute("UPDATE claims SET status = 'pending' WHERE verified = false")

    def downgrade():
        op.drop_column('claims', 'status')

    # Test with production-like data:
    # 1. pg_dump production → test DB
    # 2. alembic upgrade head → verify
    # 3. alembic downgrade -1 → verify rollback
    # 4. Estimate: 500K rows × 0.01ms/row = 5s (acceptable)
  example_bad: |
    # "Quick fix" — modify schema directly in production:
    # psql production -c "ALTER TABLE claims ADD COLUMN status VARCHAR(50)"
    # No migration file, no rollback plan, no data backfill
    # 3 months later: "Why do old claims have NULL status?"
    # 6 months later: migration tool is out of sync with actual schema
  when_applies: Every time a database schema changes, whether adding columns, modifying types, creating indexes, or dropping tables. Mandatory for any production deployment.
  sources: ["https://martinfowler.com/bliki/EvolutionaryDatabaseDesign.html"]

- id: PEI-008
  text: "Environment variable validation — validate ALL required env vars at startup, fail fast with a clear message listing EVERY missing variable, not just the first one."
  why: >
    A missing environment variable is a deployment bug that should be caught in the first second of startup, not
    30 minutes later when a user triggers the code path that reads it. The worst pattern is lazy env var access
    (os.getenv at call time) which means the app starts successfully but fails on the first request that needs
    the missing variable. The second worst pattern is checking one variable at a time — the developer fixes one,
    redeploys, finds another is missing, fixes it, redeploys again. Checking ALL at startup saves deployment cycles.
  how_to_do_right: >
    1. Create a settings/config module that reads ALL env vars at import time.

    2. Use Pydantic BaseSettings or a similar validation library.

    3. Check ALL required variables at once and report ALL missing ones in a single error.

    4. Provide sensible defaults for optional variables, document which are required.

    5. Validate types and formats (e.g., DATABASE_URL must start with postgresql://).

    6. Run the validation in CI with a .env.example file to catch missing vars before deploy.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, integration]
    concern: [meta_cognition]
  example_good: |
    from pydantic_settings import BaseSettings
    from pydantic import Field, field_validator

    class Settings(BaseSettings):
        database_url: str = Field(..., description="PostgreSQL connection string")
        redis_url: str = Field(default="redis://localhost:6379")
        llm_api_key: str = Field(..., description="Anthropic API key")
        log_level: str = Field(default="INFO")

        @field_validator("database_url")
        @classmethod
        def validate_db_url(cls, v):
            if not v.startswith(("postgresql://", "postgres://")):
                raise ValueError("DATABASE_URL must be a PostgreSQL connection string")
            return v

        class Config:
            env_file = ".env"

    # At startup — fails fast with ALL missing vars:
    settings = Settings()  # ValidationError: 2 errors: database_url, llm_api_key
  example_bad: |
    import os

    # Scattered throughout the codebase:
    def get_db():
        url = os.getenv("DATABASE_URL")  # Returns None if missing
        return create_engine(url)  # Crashes with cryptic error

    def call_llm():
        key = os.getenv("LLM_API_KEY")  # Returns None if missing
        # 401 Unauthorized — but WHY? Is the key wrong or missing?
  when_applies: At application startup in every service. Especially critical for containerized deployments where env vars are the primary configuration mechanism.
  sources: ["https://docs.pydantic.dev/latest/concepts/pydantic_settings/"]

- id: PEI-009
  text: "Configuration consistency — all configuration must come from a single source of truth. If a value is defined in two places, they WILL diverge."
  why: >
    Configuration drift is one of the most insidious bugs in distributed systems. When the same value (a timeout,
    a URL, a feature flag) is defined in two places, they will inevitably diverge. One gets updated and the other
    does not. The result is behavior that depends on which code path executes, making bugs non-reproducible and
    debugging a nightmare. The solution is a single source of truth for each configuration value, with all
    consumers reading from that source.
  how_to_do_right: >
    1. Define each configuration value in EXACTLY one place.

    2. Use a centralized config module that all code imports from.

    3. Never hardcode values that should be configurable (URLs, timeouts, thresholds).

    4. Never duplicate a config value — if two modules need the same value, both import from the config module.

    5. Use config validation to ensure consistency (e.g., client timeout < server timeout).

    6. Document where each config value comes from and what it controls.

    7. Audit for drift periodically: grep for hardcoded values that match config values.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, integration]
    concern: [meta_cognition]
  example_good: |
    # config.py — SINGLE source of truth
    from pydantic_settings import BaseSettings

    class Config(BaseSettings):
        llm_timeout: int = 30
        llm_max_retries: int = 3
        qdrant_host: str = "localhost"
        qdrant_port: int = 6333

    config = Config()

    # In llm_client.py:
    from config import config
    client = LLMClient(timeout=config.llm_timeout, retries=config.llm_max_retries)

    # In qdrant_client.py:
    from config import config
    client = QdrantClient(host=config.qdrant_host, port=config.qdrant_port)
  example_bad: |
    # In llm_client.py:
    client = LLMClient(timeout=30, retries=3)  # Hardcoded

    # In another_service.py:
    client = LLMClient(timeout=60, retries=5)  # Different values!

    # Which is correct? Nobody knows. They diverged 6 months ago.
    # One team updated their timeout, the other did not.
  when_applies: All configuration values in any application. Especially critical for values shared across services, timeout values, connection strings, and feature flags.
  sources: ["https://12factor.net/config"]

- id: PEI-010
  text: "Service dependency health checks — verify ALL downstream dependencies are healthy at startup and expose a /health endpoint that checks them. Do not serve traffic with broken dependencies."
  why: >
    A service that starts successfully but has a broken database connection, unreachable cache, or misconfigured
    LLM API key is worse than a service that fails to start. It will accept requests and then fail them, causing
    user-facing errors and making debugging harder (is the bug in my code or in the dependency?). Health checks
    at startup catch this immediately. A /health endpoint enables load balancers and orchestrators (Kubernetes) to
    route traffic away from unhealthy instances automatically.
  how_to_do_right: >
    1. At startup, verify connectivity to ALL dependencies: database, cache, message queue, external APIs.

    2. If ANY critical dependency is unreachable, fail startup with a clear error message.

    3. Expose a /health endpoint that checks all dependencies on each request.

    4. Distinguish between liveness (process is running) and readiness (can serve traffic).

    5. Set appropriate timeouts on health checks (1-2 seconds, not 30).

    6. Log dependency health status at startup for debugging.

    7. Include dependency versions in health response for debugging.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, integration]
    concern: [meta_cognition]
  example_good: |
    from fastapi import FastAPI
    import redis
    import asyncpg

    app = FastAPI()

    @app.on_event("startup")
    async def verify_dependencies():
        # Check database
        try:
            conn = await asyncpg.connect(settings.database_url)
            await conn.execute("SELECT 1")
            await conn.close()
        except Exception as e:
            raise RuntimeError(f"Database unreachable: {e}")

        # Check Redis
        try:
            r = redis.from_url(settings.redis_url)
            r.ping()
        except Exception as e:
            raise RuntimeError(f"Redis unreachable: {e}")

    @app.get("/health")
    async def health():
        checks = {}
        checks["db"] = await check_db()
        checks["redis"] = await check_redis()
        healthy = all(v["status"] == "ok" for v in checks.values())
        return {"status": "healthy" if healthy else "unhealthy", "checks": checks}
  example_bad: |
    app = FastAPI()

    @app.get("/users/{user_id}")
    async def get_user(user_id: str):
        # First request discovers database is unreachable:
        conn = await get_db()  # ConnectionRefusedError
        # User sees 500 Internal Server Error
        # No /health endpoint — Kubernetes keeps routing traffic here
  when_applies: Every service that has external dependencies. Mandatory for any service deployed to Kubernetes or behind a load balancer.
  sources: ["https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/"]

- id: PEI-011
  text: "Feature flag testing — test BOTH states of every feature flag. A feature flag that is never tested in the OFF state is a ticking time bomb."
  why: >
    Feature flags are meant to provide a safe rollback mechanism. But if the OFF state is never tested, turning
    off the flag in production might crash the application — the exact opposite of what feature flags are for.
    The most common failure mode is: code that runs when the flag is ON writes data in a new format, and code
    that runs when the flag is OFF cannot read that format. You need tests for both states AND for the transition
    between states.
  how_to_do_right: >
    1. For every feature flag, write tests for BOTH the ON and OFF states.

    2. Test the transition: what happens when the flag goes from ON to OFF with data created while it was ON?

    3. Feature flags must have a default value that is safe (usually OFF).

    4. Feature flags must be removable — after the feature is stable, remove the flag and the old code path.

    5. Audit feature flags periodically — stale flags are dead code that confuses developers.

    6. Document what each flag controls and what the expected behavior is in each state.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, integration]
    concern: [meta_cognition]
  example_good: |
    import pytest
    from unittest.mock import patch

    @pytest.mark.parametrize("flag_value", [True, False])
    def test_new_scoring_feature_flag(flag_value):
        with patch("config.ENABLE_NEW_SCORING", flag_value):
            result = score_claim(test_claim)
            assert result.score >= 0
            assert result.score <= 1
            # Both paths produce valid scores

    def test_flag_transition():
        """Data created with flag ON must be readable with flag OFF."""
        with patch("config.ENABLE_NEW_SCORING", True):
            claim = create_scored_claim(test_data)

        with patch("config.ENABLE_NEW_SCORING", False):
            loaded = load_claim(claim.id)
            assert loaded.score is not None  # Old code can read new format
  example_bad: |
    # Only tested with flag ON (the "happy path"):
    def test_new_scoring():
        config.ENABLE_NEW_SCORING = True
        result = score_claim(test_claim)
        assert result.score >= 0

    # Flag turned OFF in production due to a bug:
    # → crash: AttributeError: 'NoneType' has no attribute 'score'
    # → the OFF path was never tested
  when_applies: Every feature flag in the codebase. Especially critical for flags that control data format changes, API behavior changes, or algorithm switches.
  sources: ["https://martinfowler.com/bliki/FeatureToggle.html"]

- id: PEI-012
  text: "Error propagation verification — verify that errors propagate correctly through all layers. A swallowed exception in middleware is invisible to both the user and the developer."
  why: >
    In layered architectures (controller → service → repository → database), errors must propagate correctly
    through each layer. The most dangerous pattern is a bare except that logs and continues — the error is
    recorded in logs that nobody reads, while the user sees a successful response with wrong data. The second
    most dangerous pattern is wrapping errors so aggressively that the original error message is lost. Both make
    debugging in production nearly impossible.
  how_to_do_right: >
    1. Map the error propagation path for each type of error (validation, auth, business logic, infrastructure).

    2. Verify that infrastructure errors (DB down, timeout) result in 5xx responses, not 200 with empty data.

    3. Verify that validation errors result in 4xx responses with actionable messages.

    4. Never use bare except — always catch specific exceptions.

    5. When wrapping exceptions, preserve the original cause with "raise NewError from original_error".

    6. Write tests that inject errors at each layer and verify the correct HTTP status and message reach the client.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, integration]
    concern: [meta_cognition]
  example_good: |
    # Test error propagation at each layer:
    import pytest
    from unittest.mock import patch

    def test_db_error_returns_500():
        with patch("db.get_connection", side_effect=ConnectionError("DB down")):
            response = client.get("/users/123")
            assert response.status_code == 500
            assert "database" in response.json()["detail"].lower()

    def test_not_found_returns_404():
        with patch("services.get_user", return_value=None):
            response = client.get("/users/nonexistent")
            assert response.status_code == 404

    def test_validation_error_returns_422():
        response = client.post("/users", json={"email": "not-an-email"})
        assert response.status_code == 422
        assert "email" in str(response.json())
  example_bad: |
    async def get_user(user_id: str):
        try:
            user = await db.fetch_user(user_id)
            return user
        except Exception:
            logger.error("Something went wrong")  # Swallowed!
            return None  # Caller receives None, thinks user doesn't exist

    # User not found vs database error — both return None
    # Impossible to distinguish in the caller
  when_applies: All error handling code, especially in middleware, service layers, and API boundaries. Critical for any production service where debuggability matters.
  sources: ["https://docs.python.org/3/howto/logging.html"]

- id: PEI-013
  text: "Logging consistency — use structured logging with consistent field names across all services. A log that cannot be queried is a log that does not exist."
  why: >
    In distributed systems, logs are the primary debugging tool. But unstructured logs (print statements, f-strings)
    are nearly useless at scale because you cannot query them. If service A logs "user_id=123" and service B logs
    "userId: 123" and service C logs "User 123", correlating a request across services is manual and error-prone.
    Structured logging with consistent field names enables automated correlation, alerting, and dashboarding.
  how_to_do_right: >
    1. Use structlog or python-json-logger — never use print() for operational logging.

    2. Define a logging schema with standard field names: request_id, user_id, service_name, duration_ms.

    3. Always include a request_id/trace_id for cross-service correlation.

    4. Log at appropriate levels: ERROR for things that need attention, WARNING for degradation, INFO for operations, DEBUG for development.

    5. Never log sensitive data (passwords, tokens, PII).

    6. Include timing information for performance-sensitive operations.

    7. Configure log aggregation (ELK, Datadog, Langfuse) and verify logs appear correctly.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, integration]
    concern: [meta_cognition]
  example_good: |
    import structlog

    logger = structlog.get_logger()

    async def process_claim(claim_id: str, user_id: str):
        log = logger.bind(claim_id=claim_id, user_id=user_id, service="veritas")

        log.info("claim_processing_started")
        start = time.monotonic()

        try:
            result = await verify_claim(claim_id)
            duration_ms = (time.monotonic() - start) * 1000
            log.info("claim_processing_completed", duration_ms=duration_ms, verdict=result.verdict)
        except Exception as e:
            log.error("claim_processing_failed", error=str(e), error_type=type(e).__name__)
            raise
  example_bad: |
    async def process_claim(claim_id, user_id):
        print(f"Processing claim {claim_id}")  # Not structured, not queryable
        try:
            result = await verify_claim(claim_id)
            print(f"Done: {result}")  # What is "Done"? What fields?
        except Exception as e:
            print(f"ERROR: {e}")  # No context, no claim_id, no user_id
  when_applies: All logging in production services. Especially critical for pipeline stages, API endpoints, and background jobs where debugging requires log correlation.
  sources: ["https://www.structlog.org/en/stable/"]

- id: PEI-014
  text: "Metric instrumentation verification — every critical code path must emit metrics (latency, success/failure count, queue depth). If you cannot measure it, you cannot improve it."
  why: >
    Logs tell you what happened. Metrics tell you how the system is performing over time. Without metrics, you
    cannot detect gradual degradation (latency creeping up 5% per week), capacity issues (queue depth growing
    faster than consumption), or reliability trends (error rate increasing after a deploy). The most common
    failure mode is instrumenting the happy path but not the error path — you know how many requests succeed
    but not how many fail or how long failures take.
  how_to_do_right: >
    1. For every critical code path, emit at minimum: latency histogram, success counter, failure counter.

    2. For queues and buffers: emit depth/size gauge.

    3. Use consistent metric names: service_operation_metric_unit (e.g., veritas_claim_verify_duration_seconds).

    4. Add labels/tags for dimensionality: service, operation, status, error_type.

    5. Verify metrics appear in your dashboard BEFORE declaring the feature complete.

    6. Set up alerts on critical metrics: error rate > 1%, p99 latency > 5s, queue depth > 1000.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, integration]
    concern: [meta_cognition]
  example_good: |
    from prometheus_client import Histogram, Counter

    VERIFY_DURATION = Histogram(
        "veritas_claim_verify_duration_seconds",
        "Time to verify a claim",
        ["service", "verdict"],
    )
    VERIFY_TOTAL = Counter(
        "veritas_claim_verify_total",
        "Total claim verifications",
        ["service", "status"],
    )

    async def verify_claim(claim_id: str) -> VerifyResult:
        with VERIFY_DURATION.labels(service="veritas", verdict="pending").time():
            try:
                result = await _do_verify(claim_id)
                VERIFY_TOTAL.labels(service="veritas", status="success").inc()
                return result
            except Exception:
                VERIFY_TOTAL.labels(service="veritas", status="failure").inc()
                raise
  example_bad: |
    async def verify_claim(claim_id: str) -> VerifyResult:
        return await _do_verify(claim_id)
        # No metrics. Is this endpoint slow? How often does it fail?
        # "It feels slower lately" — but no data to confirm or deny
  when_applies: Every code path in production services, especially API endpoints, background jobs, queue consumers, and external API calls. Critical for any system that needs to maintain SLOs.
  sources: ["https://opentelemetry.io/docs/concepts/signals/metrics/"]

- id: PEI-015
  text: "Deployment artifact verification — verify the built artifact matches what was tested. A CI pipeline that tests code A and deploys code B is security theater."
  why: >
    The gap between "what was tested" and "what was deployed" is where production incidents hide. Common causes:
    (1) build cache serves stale artifacts, (2) dependencies updated between test and deploy steps, (3) environment
    variables differ between CI and production, (4) Docker image tagged as "latest" was overwritten by another build.
    The fix is deterministic builds with verified artifacts — the exact same bytes that passed tests are what gets
    deployed.
  how_to_do_right: >
    1. Pin ALL dependencies with exact versions (requirements.txt with ==, not >=).

    2. Use content-addressable artifact tags (git SHA, not "latest").

    3. Build the artifact ONCE, then test and deploy the SAME artifact.

    4. Verify artifact integrity with checksums: sha256sum of the Docker image or wheel file.

    5. Include a build manifest in the artifact: git SHA, build timestamp, dependency versions.

    6. In production, verify the running artifact matches what was deployed: expose /version endpoint.

    7. Never deploy from a developer's machine — always deploy from CI.
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [sacada, integration]
    concern: [meta_cognition]
  example_good: |
    # Dockerfile with pinned dependencies and build metadata:
    FROM python:3.11.7-slim  # Pinned version, not python:3.11

    COPY requirements.txt .
    RUN pip install --no-cache-dir -r requirements.txt  # All versions pinned with ==

    ARG GIT_SHA
    ARG BUILD_TIME
    ENV GIT_SHA=${GIT_SHA}
    ENV BUILD_TIME=${BUILD_TIME}

    COPY src/ src/

    # CI pipeline:
    # 1. docker build --build-arg GIT_SHA=$(git rev-parse HEAD) -t app:$(git rev-parse --short HEAD) .
    # 2. docker run app:abc1234 pytest  ← test THIS artifact
    # 3. docker push app:abc1234        ← push THIS artifact
    # 4. kubectl set image deploy/app app=app:abc1234  ← deploy THIS artifact
  example_bad: |
    # CI pipeline:
    # 1. pip install -r requirements.txt && pytest  ← test with latest deps
    # 2. docker build -t app:latest .                ← build with potentially different deps
    # 3. docker push app:latest                      ← overwrite previous "latest"
    # Tested != Deployed. Another build might have pushed "latest" between steps 2 and 3.
  when_applies: Every deployment pipeline. Especially critical for production deployments, but also important for staging and QA environments to ensure reproducibility.
  sources: ["https://reproducible-builds.org/"]
