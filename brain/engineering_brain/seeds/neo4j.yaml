layer: rules
technology: Neo4j
domain: database
knowledge:
- id: CR-N4J-MOD-001
  text: Model entities as nodes with labels and model connections as relationships with types — relationships are first-class
    citizens in Neo4j, not join tables, and traversal is O(1) per hop.
  why: In relational databases, a many-to-many relationship requires a join table and an O(N) lookup for each hop. In Neo4j,
    relationships are physical pointers between nodes — traversing from one node to its neighbor is a single pointer dereference,
    O(1) regardless of graph size. A query finding all friends-of-friends in a social graph with 1M users takes milliseconds
    in Neo4j but seconds in SQL (two self-joins on a 100M-row join table). This O(1) per hop property is the fundamental reason
    to choose a graph database. But you only get this benefit if you model connections as relationships, not as properties
    containing IDs.
  how_to_do_right: 'Create nodes for entities (people, products, locations). Create relationships for connections between
    entities (KNOWS, PURCHASED, LOCATED_IN). Add properties to both nodes and relationships (relationship properties: since,
    weight, role). Use labels for node categories (Person, Product). Use UPPERCASE verb phrases for relationship types (WORKS_AT,
    MANAGED_BY). Store relationship metadata as properties on the relationship, not in a separate node.'
  severity: critical
  technologies:
    platform: [neo4j]
  domains:
    domain: [architecture]
    concern: [data, database, schema_design, graph]
  example_good: '// Nodes with labels and properties

    CREATE (alice:Person {name: ''Alice'', email: ''alice@example.com''})

    CREATE (bob:Person {name: ''Bob'', email: ''bob@example.com''})

    CREATE (acme:Company {name: ''Acme Corp'', founded: 2015})


    // Relationships with properties — first-class connections

    CREATE (alice)-[:WORKS_AT {since: date(''2022-03-15''), role: ''Engineer''}]->(acme)

    CREATE (bob)-[:WORKS_AT {since: date(''2020-01-10''), role: ''Manager''}]->(acme)

    CREATE (alice)-[:REPORTS_TO {since: date(''2022-03-15'')}]->(bob)

    CREATE (alice)-[:KNOWS {since: date(''2019-06-01''), strength: 0.8}]->(bob)


    // Traversal: find Alice''s coworkers (O(1) per hop)

    MATCH (alice:Person {name: ''Alice''})-[:WORKS_AT]->(company)<-[:WORKS_AT]-(coworker)

    RETURN coworker.name, coworker.role


    // Multi-hop: friends of friends (2 hops, still O(1) per hop)

    MATCH (alice:Person {name: ''Alice''})-[:KNOWS*2]-(fof)

    WHERE fof <> alice

    RETURN DISTINCT fof.name

    '
  example_bad: '// Anti-pattern: storing relationship as property (loses graph traversal)

    CREATE (alice:Person {name: ''Alice'', company_id: 42, manager_id: 7})

    // Cannot traverse — must look up company_id separately

    // No relationship properties (role, since)

    // No O(1) traversal — just a document store with extra steps


    // Anti-pattern: modeling a relationship as a node (intermediate node)

    CREATE (alice:Person)-[:HAS_EMPLOYMENT]->(emp:Employment {role: ''Engineer''})

    CREATE (emp)-[:AT_COMPANY]->(acme:Company)

    // 2 hops instead of 1 for "where does Alice work?"

    // Only justified if Employment has its own relationships (e.g., to projects)

    '
  when_applies: Any project using Neo4j graph database
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using Neo4j
  sources: ["https://neo4j.com/docs/getting-started/data-modeling/guide-data-modeling/"]
- id: CR-N4J-MOD-002
  text: Always create relationships with explicit direction — Neo4j stores direction physically, and omitting it in queries
    (using - instead of -> or <-) traverses both directions at query time.
  why: Every relationship in Neo4j is stored with a start node and an end node. The direction is a physical property of the
    relationship, not optional metadata. When creating relationships, you must specify direction (->). When querying, you
    can choose to match direction (->/<-) or ignore it (-). Ignoring direction doubles the traversal work for each hop. For
    hierarchical relationships (REPORTS_TO, PARENT_OF, CONTAINS), direction carries semantic meaning — reversing it changes
    the meaning. For symmetric relationships (KNOWS, COWORKERS_WITH), direction does not matter semantically but is still
    stored physically.
  how_to_do_right: 'Always create relationships with direction: (a)-[:MANAGES]->(b). For hierarchical relationships, query
    with direction: (manager)-[:MANAGES]->(report). For symmetric relationships, create with any direction but query without
    direction: (a)-[:KNOWS]-(b). Use direction-agnostic queries only when the relationship is truly symmetric. For performance-critical
    traversals, always specify direction to halve the search space.'
  severity: high
  technologies:
    platform: [neo4j]
  domains:
    domain: [architecture]
    concern: [data, database, schema_design, graph]
  example_good: '// Hierarchical: direction carries meaning

    CREATE (ceo:Person {name: ''CEO''})-[:MANAGES]->(vp:Person {name: ''VP''})

    CREATE (vp)-[:MANAGES]->(manager:Person {name: ''Manager''})

    CREATE (manager)-[:MANAGES]->(engineer:Person {name: ''Engineer''})


    // Query with direction: find all direct reports

    MATCH (boss:Person {name: ''VP''})-[:MANAGES]->(report)

    RETURN report.name

    // Returns: Manager (not CEO — direction prevents upward traversal)


    // Query chain of command

    MATCH path = (ceo:Person {name: ''CEO''})-[:MANAGES*]->(employee)

    RETURN employee.name, length(path) AS depth


    // Symmetric relationship: create with direction, query without

    CREATE (alice)-[:KNOWS]->(bob)  // Direction stored but semantically irrelevant

    MATCH (person:Person)-[:KNOWS]-(friend)  // No arrow = both directions

    RETURN person.name, friend.name

    '
  example_bad: '// Querying hierarchical relationships without direction

    MATCH (person:Person {name: ''VP''})-[:MANAGES]-(other)

    RETURN other.name

    // Returns BOTH: Manager (report) AND CEO (boss)

    // "Who does the VP manage?" incorrectly includes the CEO


    // Creating duplicate symmetric relationships

    CREATE (alice)-[:KNOWS]->(bob)

    CREATE (bob)-[:KNOWS]->(alice)  // DUPLICATE — wastes storage

    // Now MATCH (alice)-[:KNOWS]->(bob) returns 1 result

    // But MATCH (alice)-[:KNOWS]-(bob) returns 2 results (confusing)

    '
  when_applies: Projects using Neo4j graph database
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using Neo4j
  sources: ["https://neo4j.com/docs/cypher-manual/current/patterns/concepts/"]
- id: CR-N4J-CYP-001
  text: Use MERGE for idempotent creates and MATCH for reads — CREATE always creates new nodes/relationships even if identical
    ones exist.
  why: 'CREATE in Cypher unconditionally creates new nodes and relationships. Running CREATE (p:Person {name: ''Alice''})
    twice creates two separate Alice nodes. This leads to duplicate data, incorrect query results, and graph corruption. MERGE
    is Cypher''s idempotent create: it matches existing elements or creates them if they do not exist. MERGE (p:Person {name:
    ''Alice''}) creates Alice only if she does not exist. For ETL pipelines, data imports, and any operation that might run
    multiple times, MERGE prevents duplicates. Always specify the minimum properties needed for identity in MERGE — additional
    properties go in ON CREATE SET.'
  how_to_do_right: Use MERGE with the minimal identifying properties (the 'business key'). Use ON CREATE SET for properties
    only set at creation time. Use ON MATCH SET for properties updated on every merge. For relationships, MERGE the nodes
    first, then MERGE the relationship. Never MERGE with all properties — only the identifying ones. Create unique constraints
    on MERGE-target properties for performance.
  severity: critical
  technologies:
    platform: [neo4j]
  domains:
    domain: [architecture]
    concern: [data, database, data-quality, graph]
  example_good: "// MERGE with minimal identity + ON CREATE/MATCH hooks\nMERGE (p:Person {email: 'alice@example.com'})\nON\
    \ CREATE SET\n  p.name = 'Alice',\n  p.created_at = datetime()\nON MATCH SET\n  p.last_seen = datetime(),\n  p.login_count\
    \ = coalesce(p.login_count, 0) + 1\nRETURN p\n\n// MERGE relationship (MERGE nodes first!)\nMERGE (alice:Person {email:\
    \ 'alice@example.com'})\nMERGE (acme:Company {name: 'Acme Corp'})\nMERGE (alice)-[r:WORKS_AT]->(acme)\nON CREATE SET r.since\
    \ = date('2022-03-15'), r.role = 'Engineer'\nRETURN r\n\n// Unique constraint for MERGE performance\nCREATE CONSTRAINT\
    \ person_email_unique FOR (p:Person)\nREQUIRE p.email IS UNIQUE;\n// MERGE now uses index lookup instead of full scan\n"
  example_bad: '// CREATE duplicates on re-run

    CREATE (p:Person {name: ''Alice'', email: ''alice@example.com''})

    // Run twice → TWO Alice nodes → graph corruption

    // Queries return duplicate results

    // Relationships split between the two Alice nodes


    // MERGE with too many properties — fails to match on partial update

    MERGE (p:Person {name: ''Alice'', email: ''alice@example.com'', age: 30, city: ''Portland''})

    // If Alice changes city, this creates a NEW node (city differs)

    // Should MERGE on email only, SET other properties separately

    '
  when_applies: Any project using Neo4j graph database
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using Neo4j
  sources: ["https://neo4j.com/docs/cypher-manual/current/clauses/merge/"]
- id: CR-N4J-CYP-002
  text: Use WITH to pipe results between query clauses — it controls cardinality, enables aggregation mid-query, and prevents
    Cartesian products in complex queries.
  why: 'Cypher processes queries as a pipeline: each clause transforms the current set of rows and passes them to the next
    clause. Without WITH, multiple MATCH clauses produce Cartesian products — MATCH (a) MATCH (b) returns N*M rows. WITH acts
    as a pipeline operator: it defines which variables pass to the next clause and can aggregate, filter, sort, or limit the
    intermediate result. This prevents memory blowup from Cartesian products and enables complex multi-step queries. WITH
    + COLLECT is especially powerful for grouping results before the next traversal step.'
  how_to_do_right: Use WITH between independent MATCH clauses to prevent Cartesian products. Use WITH + aggregation (COLLECT,
    COUNT, SUM) to reduce rows before the next step. Use WITH + ORDER BY + LIMIT for top-N intermediate results. Use WITH
    + UNWIND to transform lists back into rows. Think of WITH as a SQL subquery boundary.
  severity: high
  technologies:
    platform: [neo4j]
  domains:
    domain: [architecture]
    concern: [data, database, query-optimization, graph]
  example_good: '// WITH prevents Cartesian product — find mutual friends

    MATCH (alice:Person {name: ''Alice''})-[:KNOWS]->(friend)

    WITH alice, COLLECT(friend) AS alice_friends

    MATCH (bob:Person {name: ''Bob''})-[:KNOWS]->(friend)

    WHERE friend IN alice_friends

    RETURN friend.name AS mutual_friend


    // WITH for aggregation mid-query — find top departments

    MATCH (dept:Department)<-[:BELONGS_TO]-(employee:Person)

    WITH dept, COUNT(employee) AS emp_count

    WHERE emp_count > 10

    ORDER BY emp_count DESC

    LIMIT 5

    MATCH (dept)<-[:BELONGS_TO]-(employee)

    RETURN dept.name, emp_count, COLLECT(employee.name) AS members


    // WITH + UNWIND for batch processing

    WITH [''alice@ex.com'', ''bob@ex.com'', ''charlie@ex.com''] AS emails

    UNWIND emails AS email

    MERGE (p:Person {email: email})

    RETURN p.email

    '
  example_bad: '// No WITH — Cartesian product between independent MATCHes

    MATCH (alice:Person {name: ''Alice''})-[:KNOWS]->(friend1)

    MATCH (bob:Person {name: ''Bob''})-[:KNOWS]->(friend2)

    WHERE friend1 = friend2

    RETURN friend1.name

    // If Alice has 100 friends and Bob has 100 friends:

    // 100 × 100 = 10,000 rows computed, then filtered

    // With WITH + COLLECT: 100 + 100 = 200 rows

    '
  when_applies: Projects using Neo4j graph database
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using Neo4j
  sources: ["https://neo4j.com/docs/cypher-manual/current/clauses/with/"]
- id: CR-N4J-PERF-001
  text: Create indexes on properties used in MATCH WHERE and MERGE clauses — without indexes, Neo4j performs a full label
    scan for every starting point lookup.
  why: 'Neo4j stores nodes in a linked list per label. Without an index, MATCH (p:Person {email: ''alice@example.com''}) scans
    ALL Person nodes checking each email property — O(N). With an index, this is O(log N) or O(1). For 10M Person nodes, the
    difference is 10M property comparisons vs 1 index lookup. Every MERGE also starts with a lookup — without an index, each
    MERGE scans the entire label. A bulk import of 100K nodes with MERGE and no index performs 100K * 10M = 1 trillion comparisons.
    Create indexes on all properties used in WHERE equality checks and MERGE identity properties.'
  how_to_do_right: Create single-property indexes for frequently filtered properties. Create composite indexes for multi-property
    lookups. Create unique constraints (which include an index) for business keys used in MERGE. Create full-text indexes
    for text search. Use PROFILE (not EXPLAIN) to see actual db hits and verify index usage — look for 'NodeIndexSeek' instead
    of 'NodeByLabelScan'.
  severity: critical
  technologies:
    platform: [neo4j]
  domains:
    domain: [architecture, performance]
    concern: [data, database, graph]
  example_good: '// Unique constraint (includes index) for MERGE identity properties

    CREATE CONSTRAINT person_email FOR (p:Person)

    REQUIRE p.email IS UNIQUE;


    // Single-property index for WHERE filters

    CREATE INDEX person_name FOR (n:Person) ON (n.name);


    // Composite index for multi-property lookups

    CREATE INDEX order_status_date FOR (o:Order) ON (o.status, o.created_at);


    // Full-text index for text search

    CREATE FULLTEXT INDEX article_content FOR (a:Article) ON EACH [a.title, a.body];

    CALL db.index.fulltext.queryNodes(''article_content'', ''graph database'')

    YIELD node, score

    RETURN node.title, score ORDER BY score DESC LIMIT 10;


    // Verify index usage with PROFILE

    PROFILE MATCH (p:Person {email: ''alice@example.com''})

    RETURN p

    // Should show: NodeUniqueIndexSeek (1 db hit)

    '
  example_bad: '// No index on email — full label scan

    MATCH (p:Person {email: ''alice@example.com''}) RETURN p

    // PROFILE: NodeByLabelScan + Filter

    // db hits: 10,000,000 (scans every Person node)


    // MERGE without index — quadratic complexity on bulk import

    UNWIND $batch AS row

    MERGE (p:Person {email: row.email})

    SET p.name = row.name

    // For 100K rows × 10M existing nodes = 1 TRILLION comparisons

    // With index: 100K × O(1) = 100K operations

    '
  when_applies: Any project using Neo4j graph database
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using Neo4j
  sources: ["https://neo4j.com/docs/cypher-manual/current/indexes/search-performance-indexes/managing-indexes/"]
- id: CR-N4J-PERF-002
  text: Use PROFILE (not EXPLAIN) to analyze actual query execution — EXPLAIN shows the planned execution but not actual row
    counts, db hits, or time.
  why: 'EXPLAIN shows the query plan without executing the query — estimated rows and planned operators. These estimates can
    be wildly wrong. PROFILE executes the query and shows actual metrics: rows produced per operator, db hits (disk/cache
    reads), page cache hits/misses, and time per operator. The gap between estimated and actual rows reveals issues like missing
    indexes (NodeByLabelScan instead of NodeIndexSeek), Cartesian products (unexpected row multiplication), and eager operators
    (load entire result before proceeding). Without PROFILE data, you are optimizing based on guesses.'
  how_to_do_right: Use PROFILE before every query optimization. Compare actual rows between adjacent operators — a sudden
    row multiplication indicates a Cartesian product or fan-out. Check for NodeByLabelScan (missing index), Eager (materializes
    all results), and CartesianProduct (missing connection between patterns). The total db hits number is the most important
    metric — lower db hits = faster query regardless of plan shape.
  severity: high
  technologies:
    platform: [neo4j]
  domains:
    domain: [architecture, performance, quality]
    concern: [data, database, debugging]
  example_good: '// PROFILE shows actual execution metrics

    PROFILE

    MATCH (p:Person {name: ''Alice''})-[:KNOWS]->(friend)-[:WORKS_AT]->(company)

    WHERE company.industry = ''tech''

    RETURN friend.name, company.name


    // Analyze output:

    // +---------------------------+------+--------+------+

    // | Operator                  | Rows | DbHits | Est  |

    // +---------------------------+------+--------+------+

    // | ProduceResults            |    7 |      0 |    7 |

    // | Filter                    |    7 |     12 |   12 |

    // | Expand(All)               |   12 |     24 |   15 |  <- KNOWS → friends

    // | Expand(All)               |   12 |     14 |   15 |  <- WORKS_AT → companies

    // | NodeIndexSeek (Person)    |    1 |      2 |    1 |  <- Index on name

    // +---------------------------+------+--------+------+

    // Total db hits: 52 — efficient

    // NodeIndexSeek confirms index is used for starting node

    '
  example_bad: '// EXPLAIN only — no actual data

    EXPLAIN

    MATCH (p:Person {name: ''Alice''})-[:KNOWS]->(friend)

    RETURN friend

    // Shows "Estimated Rows: 15" — but actual might be 150,000

    // Shows "NodeByLabelScan" — but you might not notice without actual db hits


    // Not profiling at all — guessing at performance

    // "This query should be fast because it only has one MATCH clause"

    // Reality: MATCH (a)-[:KNOWS*1..5]-(b) can traverse millions of paths

    '
  when_applies: Projects using Neo4j graph database
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using Neo4j
  sources: ["https://neo4j.com/docs/cypher-manual/current/planning-and-tuning/execution-plans/"]
- id: CR-N4J-PAT-001
  text: Use shortestPath for finding the shortest connection between nodes — it uses a bidirectional BFS that is orders of
    magnitude faster than unrestricted variable-length path matching.
  why: An unrestricted variable-length path match like MATCH path = (a)-[*]-(b) explores ALL possible paths between two nodes
    — in a dense graph this is exponential. A social graph with 1M users and 50M relationships has billions of possible paths
    between any two users. shortestPath uses a bidirectional breadth-first search (BFS from both ends meeting in the middle)
    that finds the shortest path in O(b^(d/2)) instead of O(b^d) where b is branching factor and d is depth. For typical social
    graphs, this is the difference between milliseconds and hours.
  how_to_do_right: Use shortestPath((a)-[*..maxDepth]-(b)) with a maximum depth limit. Always set a max depth (e.g., *..6
    for social connections) to prevent runaway queries. Use allShortestPaths when you need all paths of the shortest length.
    For weighted shortest path, use the APOC library (apoc.algo.dijkstra) or the Graph Data Science library (gds.shortestPath.dijkstra).
    Filter relationship types in the path to control traversal.
  severity: high
  technologies:
    platform: [neo4j]
  domains:
    domain: [architecture]
    concern: [data, database, graph, algorithms]
  example_good: "// Shortest path between two people (bidirectional BFS)\nMATCH path = shortestPath(\n  (alice:Person {name:\
    \ 'Alice'})-[:KNOWS*..6]-(bob:Person {name: 'Bob'})\n)\nRETURN [n IN nodes(path) | n.name] AS connection_chain,\n    \
    \   length(path) AS degrees_of_separation\n\n// All shortest paths (same length, different routes)\nMATCH paths = allShortestPaths(\n\
    \  (alice:Person {name: 'Alice'})-[:KNOWS*..6]-(bob:Person {name: 'Bob'})\n)\nRETURN [n IN nodes(path) | n.name] AS chain,\
    \ length(path) AS hops\nORDER BY hops\n\n// Weighted shortest path (Dijkstra) with GDS library\nCALL gds.shortestPath.dijkstra.stream('social-graph',\
    \ {\n  sourceNode: alice,\n  targetNode: bob,\n  relationshipWeightProperty: 'distance'\n})\nYIELD nodeIds, costs, totalCost\n\
    RETURN [id IN nodeIds | gds.util.asNode(id).name] AS path, totalCost\n"
  example_bad: '// Unrestricted variable-length path — exponential explosion

    MATCH path = (alice:Person {name: ''Alice''})-[*]-(bob:Person {name: ''Bob''})

    RETURN path

    // No max depth — explores ALL possible paths

    // In a graph with 1M nodes: billions of paths, query never finishes

    // OutOfMemory or timeout after hours


    // Variable-length with high depth and no shortestPath

    MATCH path = (a:Person)-[:KNOWS*1..10]-(b:Person)

    WHERE a.name = ''Alice'' AND b.name = ''Bob''

    RETURN path

    // Explores ALL paths up to 10 hops — millions of paths

    // shortestPath finds the answer in milliseconds

    '
  when_applies: Projects using Neo4j graph database
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using Neo4j
  sources: ["https://neo4j.com/docs/cypher-manual/current/syntax/shortest-path/"]
- id: CR-N4J-PAT-002
  text: Use graph patterns for fraud detection — circular references, fan-out patterns, and temporal anomalies are natural
    graph queries that are nearly impossible in relational databases.
  why: 'Fraud detection relies on pattern matching across relationships: a person sharing a phone number with another person
    who shares an address with a third person who shares an SSN with the first person (identity ring). In SQL, this requires
    multiple self-joins on multiple tables with UNION — complex, slow, and hard to maintain. In Neo4j, this is a single pattern
    match that traverses the graph in milliseconds. Graph databases excel at detecting: circular references (money laundering
    rings), fan-out anomalies (one address linked to 100 accounts), temporal clusters (50 accounts created within 1 hour sharing
    attributes), and multi-hop connections that relational systems cannot efficiently query.'
  how_to_do_right: 'Model identifiers (phone, email, address, SSN, device) as nodes connected to people/accounts. Query for
    circular patterns: MATCH (a)-[:USES]->(id1)<-[:USES]-(b)-[:USES]->(id2)<-[:USES]-(a). Use variable-length paths for identity
    chains. Aggregate fan-out with COLLECT and COUNT. Use temporal filters to detect velocity (many entities created in short
    windows). Store risk scores as properties and propagate through relationships.'
  severity: medium
  technologies:
    platform: [neo4j]
  domains:
    domain: [architecture, security]
    concern: [data, database, graph, fraud-detection]
  example_good: "// Identity ring detection — shared identifiers form a loop\nMATCH (a:Account)-[:HAS_PHONE]->(phone)<-[:HAS_PHONE]-(b:Account),\n\
    \      (b)-[:HAS_ADDRESS]->(addr)<-[:HAS_ADDRESS]-(c:Account),\n      (c)-[:HAS_SSN]->(ssn)<-[:HAS_SSN]-(a)\nWHERE a <>\
    \ b AND b <> c AND a <> c\nRETURN a.name, b.name, c.name, phone.number, addr.street, ssn.number\n// In SQL: 6 self-joins\
    \ across 3 tables — complex and slow\n\n// Fan-out anomaly — one identifier linked to too many accounts\nMATCH (addr:Address)<-[:HAS_ADDRESS]-(account:Account)\n\
    WITH addr, COLLECT(account) AS accounts, COUNT(account) AS cnt\nWHERE cnt > 5\nRETURN addr.street, cnt, [a IN accounts\
    \ | a.name] AS account_names\nORDER BY cnt DESC\n\n// Temporal velocity — accounts created in burst with shared attributes\n\
    MATCH (device:Device)<-[:REGISTERED_FROM]-(account:Account)\nWHERE account.created_at > datetime() - duration('PT1H')\n\
    WITH device, COLLECT(account) AS recent_accounts\nWHERE SIZE(recent_accounts) > 10\nRETURN device.fingerprint, SIZE(recent_accounts)\
    \ AS burst_count\n"
  example_bad: '-- Same identity ring query in SQL — 6 joins, unmaintainable

    SELECT a.name, b.name, c.name

    FROM accounts a

    JOIN account_phones ap1 ON a.id = ap1.account_id

    JOIN account_phones ap2 ON ap1.phone_id = ap2.phone_id AND a.id <> ap2.account_id

    JOIN accounts b ON ap2.account_id = b.id

    JOIN account_addresses aa1 ON b.id = aa1.account_id

    JOIN account_addresses aa2 ON aa1.address_id = aa2.address_id AND b.id <> aa2.account_id

    JOIN accounts c ON aa2.account_id = c.id

    JOIN account_ssns as1 ON c.id = as1.account_id

    JOIN account_ssns as2 ON as1.ssn_id = as2.ssn_id AND c.id <> as2.account_id

    WHERE as2.account_id = a.id;

    -- 9 joins, near-impossible to extend to 4-hop or 5-hop patterns

    -- Execution time: minutes to hours on large datasets

    '
  when_applies: Projects using Neo4j graph database
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using Neo4j
  sources: ["https://neo4j.com/developer/guide-fraud-detection/"]
- id: CR-N4J-PAT-003
  text: Use graph-based recommendation engines for collaborative filtering — 'users who liked X also liked Y' is a natural
    2-hop traversal that outperforms SQL-based approaches.
  why: 'Collaborative filtering in SQL requires: (1) find all items rated by user A, (2) find all users who rated those same
    items, (3) find all OTHER items those users rated, (4) rank by frequency. This is 3 self-joins on a ratings table — O(N^2)
    for the user-item cross product. In Neo4j, this is a 2-hop traversal: (user)-[:RATED]->(item)<-[:RATED]-(similar_user)-[:RATED]->(recommendation).
    Each hop is O(1) pointer traversal. For a social commerce platform with 10M users and 500M ratings, the SQL approach takes
    30+ seconds while the graph traversal completes in <100ms. The graph model also naturally handles multi-signal recommendations
    (viewed + purchased + saved).'
  how_to_do_right: 'Model users and items as nodes, interactions as relationships (RATED, PURCHASED, VIEWED) with properties
    (score, timestamp). For basic collaborative filtering: traverse 2 hops excluding items the user already knows. Use COLLECT
    + SIZE for scoring (more connections = stronger recommendation). Filter by relationship age for recency. Use the Graph
    Data Science library (gds.nodeSimilarity, gds.knn) for production-scale similarity computation.'
  severity: medium
  technologies:
    platform: [neo4j]
  domains:
    domain: [architecture]
    concern: [data, database, graph, recommendation]
  example_good: "// Collaborative filtering: users who bought X also bought Y\nMATCH (user:User {id: \"u123\"})-[:PURCHASED]->(item)<-[:PURCHASED]-(other:User)\n\
    WHERE other <> user\nMATCH (other)-[:PURCHASED]->(rec:Product)\nWHERE NOT (user)-[:PURCHASED]->(rec)\nWITH rec, COUNT(DISTINCT\
    \ other) AS score\nRETURN rec.name, rec.category, score\nORDER BY score DESC\nLIMIT 10\n// \"42 other buyers of items\
    \ you purchased also bought these\"\n\n// Multi-signal recommendation (weighted by interaction type)\nMATCH (user:User\
    \ {id: \"u123\"})-[r1]->(item)<-[r2]-(other:User)\nWHERE type(r1) IN ['PURCHASED', 'VIEWED', 'SAVED']\n  AND type(r2)\
    \ IN ['PURCHASED', 'VIEWED', 'SAVED']\n  AND other <> user\nWITH other, sum(\n  CASE type(r2) WHEN 'PURCHASED' THEN 3\
    \ WHEN 'SAVED' THEN 2 ELSE 1 END\n) AS affinity\nORDER BY affinity DESC LIMIT 50\nMATCH (other)-[:PURCHASED]->(rec:Product)\n\
    WHERE NOT (user)-[:PURCHASED|VIEWED]->(rec)\nRETURN rec.name, COUNT(other) AS recommenders\nORDER BY recommenders DESC\
    \ LIMIT 10\n"
  example_bad: "-- Collaborative filtering in SQL — multiple self-joins\nSELECT p2.name, COUNT(DISTINCT r3.user_id) AS score\n\
    FROM ratings r1\nJOIN ratings r2 ON r1.item_id = r2.item_id AND r1.user_id != r2.user_id\nJOIN ratings r3 ON r2.user_id\
    \ = r3.user_id\nJOIN products p2 ON r3.item_id = p2.id\nWHERE r1.user_id = 123\n  AND r3.item_id NOT IN (SELECT item_id\
    \ FROM ratings WHERE user_id = 123)\nGROUP BY p2.name\nORDER BY score DESC\nLIMIT 10;\n-- 3 self-joins on 500M-row ratings\
    \ table\n-- Execution: 30-120 seconds\n-- Graph: <100ms\n"
  when_applies: Projects using Neo4j graph database
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using Neo4j
  sources: ["https://neo4j.com/developer/guide-build-a-recommendation-engine/"]
- id: CR-N4J-PAT-004
  text: Use graph-based access control for hierarchical permission systems — 'does user X have access to resource Y through
    any group/role chain?' is a natural variable-length path query.
  why: 'Role-based access control (RBAC) with inheritance creates a hierarchy: User belongs to Group, Group has Role, Role
    contains Permission, Permission grants access to Resource. In SQL, checking access requires recursive CTEs or multiple
    self-joins to traverse the hierarchy. Adding a new level of indirection (team → department → organization) requires rewriting
    all access queries. In Neo4j, the entire hierarchy is a graph: (user)-[:MEMBER_OF*]->(group)-[:HAS_ROLE]->(role)-[:GRANTS]->(permission)-[:ON]->(resource).
    Adding new hierarchy levels requires no query changes — the variable-length path (*) naturally handles any depth.'
  how_to_do_right: 'Model the permission hierarchy as a graph with typed relationships (MEMBER_OF, HAS_ROLE, GRANTS, ON).
    Use variable-length paths for group inheritance: (user)-[:MEMBER_OF*1..5]->(group). Cache frequently checked permissions
    as direct relationships (CACHED_ACCESS) and refresh periodically. For real-time checks, use shortestPath to stop as soon
    as one valid path is found.'
  severity: medium
  technologies:
    platform: [neo4j]
  domains:
    domain: [architecture, security]
    concern: [data, database, graph, access-control]
  example_good: "// Permission check: does Alice have 'write' on 'document-123'?\nMATCH path = shortestPath(\n  (user:User\
    \ {name: 'Alice'})-[:MEMBER_OF|HAS_ROLE|GRANTS|ON*1..10]->(resource:Resource {id: 'doc-123'})\n)\nWHERE any(r IN relationships(path)\
    \ WHERE\n  type(r) = 'GRANTS' AND r.permission = 'write'\n)\nRETURN count(path) > 0 AS has_access\n// Single query handles\
    \ any hierarchy depth\n// Adding new group levels requires no query changes\n\n// Find all resources Alice can access\n\
    MATCH (alice:User {name: 'Alice'})-[:MEMBER_OF*0..5]->(group)\nMATCH (group)-[:HAS_ROLE]->(role)-[grant:GRANTS]->(resource:Resource)\n\
    RETURN resource.id, resource.type, collect(DISTINCT grant.permission) AS permissions\n\n// Audit: who has access to sensitive\
    \ document?\nMATCH (resource:Resource {id: 'doc-123'})<-[g:GRANTS]-(role)<-[:HAS_ROLE]-(group)<-[:MEMBER_OF*0..5]-(user:User)\n\
    RETURN user.name, role.name, g.permission\nORDER BY user.name\n"
  example_bad: "-- SQL recursive CTE for permission check — complex and fragile\nWITH RECURSIVE group_hierarchy AS (\n  SELECT\
    \ group_id FROM user_groups WHERE user_id = 123\n  UNION ALL\n  SELECT g.parent_id FROM groups g\n  JOIN group_hierarchy\
    \ gh ON g.id = gh.group_id\n  WHERE g.parent_id IS NOT NULL\n)\nSELECT 1 FROM permissions p\nJOIN role_permissions rp\
    \ ON p.id = rp.permission_id\nJOIN group_roles gr ON rp.role_id = gr.role_id\nWHERE gr.group_id IN (SELECT group_id FROM\
    \ group_hierarchy)\n  AND p.resource_id = 'doc-123' AND p.type = 'write';\n-- Adding a new hierarchy level (team) requires\
    \ rewriting the CTE\n-- 5 joins + recursive CTE vs single graph traversal\n"
  when_applies: Projects using Neo4j graph database
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using Neo4j
  sources: ["https://neo4j.com/docs/cypher-manual/current/access-control/"]
- id: CR-N4J-OPS-001
  text: Use APOC and Graph Data Science (GDS) libraries for production graph algorithms — do not implement PageRank, community
    detection, or centrality in Cypher queries.
  why: Graph algorithms like PageRank, Louvain community detection, betweenness centrality, and similarity computation require
    iterative computation over the entire graph. Implementing them in Cypher produces queries that are orders of magnitude
    slower than the native GDS implementations (which use optimized in-memory graph projections). GDS projects the relevant
    subgraph into memory once, then runs multiple algorithms on the in-memory projection — avoiding repeated disk access.
    APOC provides utility functions (batch operations, data import/export, text processing) that would require dozens of lines
    of Cypher. These libraries are maintained by Neo4j and cover 95% of graph analytics needs.
  how_to_do_right: 'Install GDS and APOC as plugins. Create a graph projection with gds.graph.project (native projection for
    simple graphs, Cypher projection for filtered/transformed graphs). Run algorithms on the projection: gds.pageRank, gds.louvain,
    gds.betweenness, gds.nodeSimilarity. Write results back to the database with gds.*.write mode. Use APOC for batch operations:
    apoc.periodic.iterate for large updates, apoc.load.json for data import.'
  severity: high
  technologies:
    library: [gds, apoc]
    platform: [neo4j]
  domains:
    domain: [architecture]
    concern: [data, database, graph, analytics]
  example_good: "// Create in-memory graph projection for algorithms\nCALL gds.graph.project(\n  'social-graph',\n  'Person',\n\
    \  { KNOWS: { orientation: 'UNDIRECTED' } }\n)\n\n// Run PageRank — find most influential people\nCALL gds.pageRank.stream('social-graph')\n\
    YIELD nodeId, score\nRETURN gds.util.asNode(nodeId).name AS person, score\nORDER BY score DESC\nLIMIT 10\n\n// Community\
    \ detection — find clusters\nCALL gds.louvain.write('social-graph', {\n  writeProperty: 'community'\n})\n\n// After writing\
    \ community property:\nMATCH (p:Person)\nRETURN p.community, COUNT(*) AS size, COLLECT(p.name)[..5] AS sample\nORDER BY\
    \ size DESC\n\n// APOC for batch import\nCALL apoc.periodic.iterate(\n  \"UNWIND $batch AS row RETURN row\",\n  \"MERGE\
    \ (p:Person {email: row.email}) SET p.name = row.name\",\n  {batchSize: 5000, params: {batch: $data}}\n)\n"
  example_bad: '// PageRank in pure Cypher — exponentially slow

    MATCH (p:Person)-[:KNOWS]->(friend)

    WITH p, COUNT(friend) AS connections

    // This is degree centrality, NOT PageRank

    // Real PageRank requires iterative convergence over the entire graph

    // Pure Cypher cannot implement iterative algorithms efficiently

    // GDS PageRank on 1M nodes: 2 seconds

    // Cypher approximation: timeout or incorrect results

    '
  when_applies: Projects using Neo4j graph database, GDS, or APOC
  when_not_applies: stateless microservices with no data persistence, pure computation modules
  sources: ["https://neo4j.com/docs/graph-data-science/current/", "https://neo4j.com/docs/apoc/current/"]
- id: CR-N4J-OPS-002
  text: Use LOAD CSV and apoc.load.json for bulk data import — never use individual CREATE/MERGE statements for loading large
    datasets.
  why: Individual CREATE/MERGE statements process one node or relationship per transaction. Loading 1M nodes with individual
    MERGE statements means 1M transactions — each requiring Cypher parsing, planning, execution, and transaction commit. This
    takes hours. LOAD CSV reads the entire CSV file server-side and processes rows in batches with a single transaction plan.
    apoc.periodic.iterate splits large operations into configurable batch sizes. For 1M nodes, LOAD CSV completes in minutes
    instead of hours. The neo4j-admin database import tool is even faster (bypasses the transaction layer entirely) for initial
    bulk loads.
  how_to_do_right: 'For initial load: use neo4j-admin database import (fastest, offline). For online loading: use LOAD CSV
    with PERIODIC COMMIT (deprecated) or CALL { ... } IN TRANSACTIONS for Neo4j 4.4+. For JSON/API data: use apoc.load.json
    or apoc.periodic.iterate. Always create indexes/constraints BEFORE loading data. Use UNWIND for batch MERGE operations
    within a single transaction.'
  severity: high
  technologies:
    platform: [neo4j]
  domains:
    domain: [architecture, operations]
    concern: [data, database, data-import]
  example_good: "// LOAD CSV with batched transactions (Neo4j 4.4+)\n// Create constraint first for fast MERGE\nCREATE CONSTRAINT\
    \ person_email FOR (p:Person) REQUIRE p.email IS UNIQUE;\n\nLOAD CSV WITH HEADERS FROM 'file:///people.csv' AS row\nCALL\
    \ {\n  WITH row\n  MERGE (p:Person {email: row.email})\n  SET p.name = row.name, p.age = toInteger(row.age)\n} IN TRANSACTIONS\
    \ OF 5000 ROWS\n// 1M rows in ~2 minutes (5000-row batches, indexed MERGE)\n\n// UNWIND for batch operations from application\n\
    UNWIND $batch AS row\nMERGE (p:Person {email: row.email})\nSET p.name = row.name\n// Pass batch of 5000 rows per call\
    \ from application code\n\n// apoc.periodic.iterate for large transformations\nCALL apoc.periodic.iterate(\n  \"MATCH\
    \ (p:Person) WHERE p.normalized_name IS NULL RETURN p\",\n  \"SET p.normalized_name = toLower(trim(p.name))\",\n  {batchSize:\
    \ 10000}\n)\n"
  example_bad: "// Individual MERGE per row — 1M transactions\nfor person in data:\n    session.run(\"MERGE (p:Person {email:\
    \ $email}) SET p.name = $name\",\n                email=person[\"email\"], name=person[\"name\"])\n// 1M separate transactions:\
    \ ~4 hours\n// With UNWIND batch of 5000: ~2 minutes (120x faster)\n\n// No index before LOAD CSV — full label scan per\
    \ MERGE\nLOAD CSV WITH HEADERS FROM 'file:///people.csv' AS row\nMERGE (p:Person {email: row.email})\n// Without index:\
    \ each MERGE scans ALL Person nodes\n// 1M rows × 1M nodes = 1 TRILLION comparisons\n"
  when_applies: Projects using Neo4j graph database
  when_not_applies: stateless microservices with no data persistence, pure computation modules. projects not using Neo4j
  sources: ["https://neo4j.com/docs/cypher-manual/current/clauses/load-csv/"]
- id: CR-N4J-CLAIM-001
  text: Model claims as nodes with typed evidence relationships — claim→evidence→source forms a verifiable chain that enables
    graph-pattern contradiction detection and multi-hop provenance traversal.
  why: 'A flat claims table loses structural information about how claims relate to evidence and how evidence relates to sources.
    In a graph model, MATCH (c:Claim)-[:SUPPORTED_BY]->(e:Evidence)-[:CITED_IN]->(s:Source) enables: (1) provenance traversal
    to find all sources backing a claim in O(hops), (2) contradiction detection by finding claims sharing evidence that implies
    contradictory conclusions, (3) claim clustering by shared evidence nodes (claims citing the same study). A graph-based
    fact-checking system at scale can execute multi-hop queries that would require 5+ JOINs in SQL, but complete in milliseconds
    via pointer traversal.'
  how_to_do_right: 'Create distinct node labels: Claim, Evidence, Source, Entity (people, organizations). Use typed relationships:
    SUPPORTED_BY, CONTRADICTS, CITES, MENTIONS. Add confidence scores on SUPPORTED_BY relationships. Index claim.text (full-text
    index), claim.published_at, and source.domain. To find contradictions: MATCH (c1:Claim)-[:SUPPORTED_BY]->(e)<-[:SUPPORTED_BY]-(c2:Claim)
    WHERE c1.verdict <> c2.verdict RETURN c1, c2, e.'
  severity: high
  technologies:
    platform: [neo4j]
    lang: [python]
  domains:
    domain: [architecture, ai]
    concern: [data, database, fact_checking, graph]
  example_good: "// Graph schema for claim verification\nCREATE (c:Claim {\n  id: 'clm-001',\n  text: 'Global temperature rose\
    \ 1.5C since pre-industrial era',\n  verdict: 'TRUE',\n  confidence: 0.95,\n  published_at: datetime('2024-01-15')\n})\n\
    \nCREATE (e:Evidence {\n  id: 'evd-001',\n  type: 'scientific_study',\n  excerpt: 'Average global temperature has increased\
    \ by 1.1°C...'\n})\n\nCREATE (s:Source {\n  id: 'src-001',\n  domain: 'ipcc.ch',\n  credibility_score: 0.99\n})\n\nCREATE\
    \ (c)-[:SUPPORTED_BY {confidence: 0.95, annotated_by: 'human'}]->(e)\nCREATE (e)-[:CITES {page: 47}]->(s)\n\n// Find contradicting\
    \ claims sharing evidence\nMATCH (c1:Claim)-[:SUPPORTED_BY]->(e:Evidence)<-[:SUPPORTED_BY]-(c2:Claim)\nWHERE c1.verdict\
    \ = 'TRUE' AND c2.verdict = 'FALSE'\nAND c1 <> c2\nRETURN c1.text, c2.text, e.excerpt\nLIMIT 20\n"
  example_bad: "-- Flat relational schema — loses graph structure\nCREATE TABLE claims (id, text, verdict, evidence_ids TEXT[]);\n\
    CREATE TABLE evidence (id, source_url, excerpt);\n-- To find contradictions: 3 JOINs + subquery + full text scan\n-- To\
    \ get 3-hop provenance: 3 JOINs per hop = impractical\n"
  when_applies: Fact-checking systems, claim verification pipelines, any domain requiring provenance tracking in Neo4j
  when_not_applies: stateless microservices, projects not using Neo4j
  sources: ["https://neo4j.com/developer/graph-data-science/link-prediction/", "https://neo4j.com/docs/cypher-manual/current/patterns/"]
- id: CR-N4J-CONTRA-001
  text: Detect contradictions in knowledge graphs using Cypher pattern matching — two claims contradicting each other while
    sharing the same evidence node indicate either data error or genuine inconsistency requiring human review.
  why: 'In a fact-checking system, contradictions emerge when: (1) two claims share supporting evidence but reach opposite verdicts,
    (2) a claim''s entity properties contradict stored facts (a claim says Entity X was born in 1950 but the graph shows 1945),
    (3) temporal inconsistencies (event A caused event B, but A happened after B). Graph pattern matching finds these structural
    contradictions in a single query. Rule-based contradiction detection via APOC triggers can flag inconsistencies at write
    time, preventing corrupt knowledge from entering the graph.'
  how_to_do_right: 'Pattern 1 — evidence contradiction: MATCH (c1:Claim {verdict:"TRUE"})-[:SUPPORTED_BY]->(e)<-[:SUPPORTED_BY]-(c2:Claim
    {verdict:"FALSE"}) WHERE c1 <> c2. Pattern 2 — temporal inconsistency: MATCH (e1:Event)-[:CAUSED]->(e2:Event) WHERE e1.date
    > e2.date. Pattern 3 — attribute inconsistency: MATCH (p:Person {birth_year: 1950})<-[:MENTIONS]-(c:Claim {person_birth_year:
    1945}). Run contradiction scans as scheduled background jobs and store results in a ContradictionReport node.'
  severity: high
  technologies:
    platform: [neo4j]
    library: [apoc]
  domains:
    domain: [architecture, ai]
    concern: [data, database, fact_checking, graph, data-quality]
  example_good: "// Scheduled contradiction scan\nCALL apoc.periodic.repeat('contradiction-scan', '\n  MATCH (c1:Claim)-[:SUPPORTED_BY]->(e:Evidence)<-[:SUPPORTED_BY]-(c2:Claim)\n\
    \  WHERE c1.verdict = \"TRUE\" AND c2.verdict = \"FALSE\" AND c1 <> c2\n  WITH c1, c2, e\n  MERGE (r:ContradictionReport\
    \ {\n    claim1_id: c1.id, claim2_id: c2.id, evidence_id: e.id\n  })\n  ON CREATE SET r.detected_at = datetime(), r.status\
    \ = \"open\"\n  RETURN count(r) AS new_contradictions\n', 3600)  // Run every 3600 seconds\n\n// Query open contradictions\
    \ for review\nMATCH (r:ContradictionReport {status: 'open'})\nMATCH (c1:Claim {id: r.claim1_id})\nMATCH (c2:Claim {id:\
    \ r.claim2_id})\nMATCH (e:Evidence {id: r.evidence_id})\nRETURN c1.text, c2.text, e.excerpt, r.detected_at\nORDER BY\
    \ r.detected_at DESC\n"
  example_bad: "-- SQL contradiction check: full cross-join, slow at scale\nSELECT c1.text, c2.text\nFROM claims c1\nJOIN claim_evidence ce1 ON c1.id = ce1.claim_id\nJOIN evidence e ON ce1.evidence_id = e.id\nJOIN claim_evidence ce2 ON e.id = ce2.evidence_id\nJOIN claims c2 ON ce2.claim_id = c2.id\nWHERE c1.verdict = 'TRUE' AND c2.verdict = 'FALSE' AND c1.id != c2.id;\n\
    -- Full cross-join at 1M claims: impractical without graph structure\n"
  when_applies: Fact-checking systems, knowledge graphs, any Neo4j system requiring data integrity validation
  when_not_applies: stateless microservices, projects not using Neo4j
  sources: ["https://neo4j.com/docs/apoc/current/graph-updates/periodic-execution/", "https://neo4j.com/docs/cypher-manual/current/clauses/match/"]
- id: CR-N4J-APOC-001
  text: Use APOC's apoc.periodic.iterate for large batch updates — never issue mass updates in a single transaction, as it
    loads all rows into memory and risks OOM.
  why: 'A single MATCH (n:Claim) SET n.processed = true update on 10M claims loads all 10M nodes into the transaction''s write
    set before committing — consuming gigabytes of heap and potentially causing OutOfMemoryError on the broker. apoc.periodic.iterate
    splits the work into configurable batches (e.g., 10,000 nodes per batch), each committed as a separate transaction. This
    keeps memory usage O(batch_size) instead of O(total_nodes) and allows partial progress if the job fails.'
  how_to_do_right: 'Use apoc.periodic.iterate(''outer_query'', ''inner_query'', {batchSize: N, parallel: bool}). The outer
    query reads rows (must be read-only). The inner query mutates them. Set batchSize based on node weight: 10,000 for simple
    property updates, 1,000 for heavy relationship creation. For parallel=true, ensure inner_query operations are independent
    (no shared nodes). Monitor progress with apoc.periodic.list().'
  severity: high
  technologies:
    platform: [neo4j]
    library: [apoc]
  domains:
    domain: [architecture, operations]
    concern: [data, database, batch-processing]
  example_good: "// Batch update: normalize all Claim text (lowercase, trim)\n// 10M nodes — batchSize=10000 means 1000 transactions\
    \ instead of 1\nCALL apoc.periodic.iterate(\n  'MATCH (c:Claim) WHERE c.normalized_text IS NULL RETURN c',\n  'SET c.normalized_text\
    \ = toLower(trim(c.text))',\n  {batchSize: 10000, parallel: false}\n)\nYIELD batches, total, timeTaken, errorMessages\n\
    RETURN batches, total, timeTaken, errorMessages\n// Output: batches=1000, total=10000000, timeTaken=120, errorMessages=[]\n\
    \n// Check progress on long-running iterate\nCALL apoc.periodic.list()\nYIELD name, status, currentBatch, totalBatches\n\
    RETURN name, status, currentBatch + '/' + totalBatches AS progress\n"
  example_bad: "// DANGEROUS: single transaction on 10M nodes\nMATCH (c:Claim)\nSET c.normalized_text = toLower(trim(c.text))\n\
    // Loads all 10M nodes into write set\n// Heap usage: 10M * ~500B = 5GB minimum\n// If heap < 5GB: OutOfMemoryError\n\
    // If interrupted at node 7M: full rollback, 0 progress saved\n// With apoc.periodic.iterate: 10,000-node batches,\n//\
    \ partial progress preserved on failure\n"
  when_applies: Any Neo4j project requiring bulk data operations or migrations
  when_not_applies: stateless microservices, projects not using Neo4j or APOC
  sources: ["https://neo4j.com/docs/apoc/current/graph-updates/periodic-execution/"]
- id: CR-N4J-GDS-001
  text: Use Graph Data Science (GDS) for PageRank, Louvain community detection, and node similarity — project a named graph
    into memory once, run multiple algorithms, write results back as node properties.
  why: 'GDS projects the relevant subgraph into an optimized in-memory format (CSR sparse matrix), then runs algorithms without
    repeated disk I/O. Running PageRank on a 10M-node social graph: native GDS completes in 30 seconds. Pure Cypher approximation:
    hours or timeout. Community detection (Louvain) partitions a claim graph into thematic clusters — claims about climate,
    economics, health appear as separate communities. Node similarity identifies structurally similar nodes (two Claim nodes
    citing the same 10 sources have high similarity) without needing labeled training data.'
  how_to_do_right: 'Create a graph projection: CALL gds.graph.project(''claim-graph'', [''Claim'', ''Source''], [''CITES'']).
    Run algorithms in stream mode first to inspect results. Use write mode to persist results as node properties. Clean up
    projections when done: CALL gds.graph.drop(''claim-graph''). For large graphs, use native projections (faster); use Cypher
    projections only when complex filtering is needed.'
  severity: medium
  technologies:
    platform: [neo4j]
    library: [gds]
  domains:
    domain: [architecture, ai]
    concern: [data, database, graph, analytics]
  example_good: "// 1. Project claim-source bipartite graph\nCALL gds.graph.project(\n  'claim-source-graph',\n  ['Claim', 'Source'],\n\
    \  { CITES: { orientation: 'UNDIRECTED' } }\n)\n\n// 2. PageRank on sources — find most-cited authoritative sources\n\
    CALL gds.pageRank.stream('claim-source-graph', {\n  maxIterations: 20,\n  dampingFactor: 0.85\n})\nYIELD nodeId, score\n\
    WITH gds.util.asNode(nodeId) AS node, score\nWHERE 'Source' IN labels(node)\nRETURN node.domain, score\nORDER BY score\
    \ DESC LIMIT 10\n\n// 3. Community detection — cluster claims by topic\nCALL gds.louvain.write('claim-source-graph', {\n\
    \  writeProperty: 'community'\n})\n\n// 4. Node similarity — find structurally similar claims\nCALL gds.nodeSimilarity.stream('claim-source-graph',\
    \ {\n  similarityCutoff: 0.5,\n  topK: 10\n})\nYIELD node1, node2, similarity\nRETURN gds.util.asNode(node1).text, gds.util.asNode(node2).text,\
    \ similarity\nORDER BY similarity DESC\n"
  example_bad: "// Community detection in pure Cypher — impossible for large graphs\nMATCH (c1:Claim)-[:CITES]->(s:Source)<-[:CITES]-(c2:Claim)\n\
    WITH c1, c2, COUNT(s) AS shared_sources\nWHERE shared_sources > 5\n// This is degree-based grouping, NOT Louvain community\
    \ detection\n// GDS Louvain uses modularity optimization — fundamentally different\n// On 1M claims: query never finishes\n"
  when_applies: Neo4j projects requiring analytics, ranking, clustering, or similarity — especially knowledge graphs and fact-checking
  when_not_applies: stateless microservices, projects not using Neo4j or GDS
  sources: ["https://neo4j.com/docs/graph-data-science/current/", "https://neo4j.com/docs/graph-data-science/current/algorithms/louvain/"]
- id: CR-N4J-CYPH-OPT-001
  text: Use PROFILE to identify missing indexes and eager operators — these two issues cause 90% of Neo4j performance problems
    in production.
  why: 'PROFILE exposes two critical anti-patterns: (1) NodeByLabelScan means no index — for 10M nodes, every query scans
    the entire label. Adding an index drops from 10M db hits to 1-2. (2) Eager operators (EagerAggregation, NodeHashJoin,
    Sort) materialize entire result sets before proceeding — a query with Eager on 1M rows loads all 1M rows into memory at
    once. The PROFILE output''s ''db hits'' number is the ground truth metric — lower is always better. A query with 1 db
    hit vs 10M db hits is the difference between <1ms and 10 seconds.'
  how_to_do_right: 'Run PROFILE on every slow query in production. Look for: NodeByLabelScan (add index), Eager (rewrite query
    to avoid materialization), CartesianProduct (add WITH between independent MATCHes). Use index hints when the planner chooses
    the wrong index: MATCH (c:Claim) USING INDEX c:Claim(text) WHERE c.text CONTAINS ''temperature''. Track db hits per release
    — regression test query performance with PROFILE output in CI.'
  severity: high
  technologies:
    platform: [neo4j]
  domains:
    domain: [architecture, performance]
    concern: [data, database, query-optimization, debugging]
  example_good: "// PROFILE shows exactly which operators are expensive\nPROFILE\nMATCH (c:Claim {verdict: 'TRUE'})-[:SUPPORTED_BY]->(e:Evidence)-[:CITES]->(s:Source)\n\
    WHERE s.credibility_score > 0.8\nRETURN c.text, s.domain\nORDER BY s.credibility_score DESC\nLIMIT 10\n\n// Analyze output:\n\
    // +--------------------------------+------+--------+\n// | Operator                       | Rows | DbHits |\n// +--------------------------------+------+--------+\n\
    // | ProduceResults                 |   10 |      0 |\n// | Top (10)                       |   10 |      0 |\n// | Filter\
    \ (score > 0.8)          |   45 |     90 |\n// | Expand (CITES → Source)        |   50 |    100 |\n// | Expand (SUPPORTED_BY\
    → Evidence)|  100 |    200 |\n// | NodeIndexSeek(Claim.verdict)  |  500 |      4 |  <- Index used!\n// DbHits: 394 —\
    \ fast\n\n// Force index hint when planner chooses wrong index\nMATCH (c:Claim)\nUSING INDEX c:Claim(published_at)\nWHERE\
    \ c.published_at > date('2024-01-01') AND c.verdict = 'TRUE'\nRETURN c.text\n"
  example_bad: "// No PROFILE — guessing at performance\n// \"This should be fast, it's only one MATCH\"\nMATCH (c:Claim {verdict:\
    \ 'TRUE'})\n// PROFILE reveals: NodeByLabelScan scanning 10M Claim nodes\n// DbHits: 10,000,000 — every claim node scanned\n\
    // Fix: CREATE INDEX claim_verdict FOR (c:Claim) ON (c.verdict)\n"
  when_applies: Any Neo4j project with query performance concerns
  when_not_applies: stateless microservices, projects not using Neo4j
  sources: ["https://neo4j.com/docs/cypher-manual/current/planning-and-tuning/execution-plans/", "https://neo4j.com/docs/cypher-manual/current/indexes/"]
- id: CR-N4J-FTS-001
  text: Use Neo4j full-text indexes for fuzzy and substring claim searches — standard property indexes only support exact match
    or prefix queries, not contains or fuzzy matching.
  why: 'Standard Neo4j indexes (RANGE, POINT) support equality and range queries. They do NOT support substring search (CONTAINS),
    fuzzy matching (typos), or relevance scoring. Full-text indexes (backed by Apache Lucene) support: full-text search with
    relevance scoring, fuzzy matching (Levenshtein distance), phrase queries, and wildcard queries. For a fact-checking system
    where users search claims by topic, full-text search is essential — a standard index on claim.text cannot power a search
    box.'
  how_to_do_right: 'Create full-text index: CREATE FULLTEXT INDEX claims_text FOR (c:Claim) ON EACH [c.text, c.summary].
    Query with: CALL db.index.fulltext.queryNodes(''claims_text'', ''temperature~'') YIELD node, score. Use ~ for fuzzy matching
    (default Levenshtein distance 2). Use " " for phrase matching. Use * for wildcard. Combine with Cypher filters using WITH
    to filter results by other properties after the full-text search. Score is a Lucene TF-IDF relevance score.'
  severity: medium
  technologies:
    platform: [neo4j]
  domains:
    domain: [architecture]
    concern: [data, database, search, graph]
  example_good: "// Create full-text index on claim text + summary\nCREATE FULLTEXT INDEX claims_fulltext FOR (c:Claim) ON EACH\
    \ [c.text, c.summary];\n\n// Full-text search with relevance ranking\nCALL db.index.fulltext.queryNodes('claims_fulltext',\
    \ 'global temperature rise')\nYIELD node AS claim, score\nWHERE score > 0.5\nRETURN claim.text, claim.verdict, score\n\
    ORDER BY score DESC\nLIMIT 20\n\n// Fuzzy search (~ = Levenshtein 2)\nCALL db.index.fulltext.queryNodes('claims_fulltext',\
    \ 'temperture~')  // typo: 'temperture'\nYIELD node AS claim, score\nRETURN claim.text, score\n// Returns claims with 'temperature'\
    \ despite typo\n\n// Phrase search\nCALL db.index.fulltext.queryNodes('claims_fulltext', '\"global warming\"')\nYIELD node\
    \ AS claim, score\nRETURN claim.text, score\n"
  example_bad: "// Standard index — cannot do full-text search\nCREATE INDEX claim_text FOR (c:Claim) ON (c.text);\n\n// This\
    \ FAILS to use the index (CONTAINS queries don't use RANGE index)\nMATCH (c:Claim)\nWHERE c.text CONTAINS 'temperature'\n\
    RETURN c.text\n// PROFILE: NodeByLabelScan + Filter — scans ALL claims\n// For 10M claims: 10M db hits, full scan every\
    \ time\n// Full-text index: Lucene inverted index, sub-millisecond\n"
  when_applies: Neo4j projects with text search requirements (search boxes, claim lookup)
  when_not_applies: stateless microservices, projects not using Neo4j, exact-match-only queries
  sources: ["https://neo4j.com/docs/cypher-manual/current/indexes/full-text-search-indexes/"]
- id: CR-N4J-PROJ-001
  text: Use GDS named graph projections for analytics — never run GDS algorithms directly on the stored graph, as projections
    create optimized in-memory representations that are 10-100x faster.
  why: 'GDS''s native graph projections load nodes and relationships into a compressed sparse row (CSR) format optimized for
    graph algorithm traversal. Running PageRank on the stored Neo4j graph (disk-based, transaction overhead) vs. on a GDS projection
    (in-memory CSR) is typically 10-100x slower. Projections can also filter the graph: project only VERIFIED claims and CITES
    relationships for source ranking, excluding drafts and MENTIONS relationships. This scoping reduces algorithm runtime by
    reducing graph size.'
  how_to_do_right: 'Use native projections for simple subgraphs: gds.graph.project(name, nodeLabels, relTypes). Use Cypher
    projections for complex filtering: gds.graph.project.cypher(name, nodeQuery, relQuery). Drop projections when analysis
    is complete (they consume memory). Use gds.graph.list() to see existing projections and their memory usage. Set nodeProperties
    to pre-load node properties into the projection for algorithm use.'
  severity: medium
  technologies:
    platform: [neo4j]
    library: [gds]
  domains:
    domain: [architecture, performance]
    concern: [data, database, graph, analytics]
  example_good: "// Filtered Cypher projection — only verified claims and high-credibility sources\nCALL gds.graph.project.cypher(\n\
    \  'verified-claim-graph',\n  'MATCH (n) WHERE (n:Claim AND n.verdict = \"TRUE\") OR (n:Source AND n.credibility_score\
    \ > 0.7) RETURN id(n) AS id, labels(n) AS labels',\n  'MATCH (c:Claim {verdict: \"TRUE\"})-[:CITES]->(s:Source {credibility_score:\
    \ 0.7}) RETURN id(c) AS source, id(s) AS target',\n  { validateRelationships: false }\n)\n\n// Check projection memory\
    \ usage\nCALL gds.graph.list('verified-claim-graph')\nYIELD graphName, nodeCount, relationshipCount, memoryUsage\nRETURN\
    \ graphName, nodeCount, relationshipCount, memoryUsage\n\n// Run algorithm on filtered projection\nCALL gds.pageRank.write('verified-claim-graph',\
    \ {\n  writeProperty: 'authority_score',\n  maxIterations: 20,\n  dampingFactor: 0.85\n})\n\n// Drop projection when done\n\
    CALL gds.graph.drop('verified-claim-graph')\n"
  example_bad: "// Running algorithm directly on stored graph — no filtering, slower\n// There is no way to run GDS algorithms\
    \ directly on the stored graph.\n// You MUST create a projection. This anti-pattern is using a full,\n// unfiltered projection\
    \ when a filtered projection would be 10x faster.\nCALL gds.graph.project(\n  'all-nodes-graph',  // Includes UNVERIFIED\
    \ claims, low-credibility sources\n  '*',              // All node labels\n  '*'               // All relationship types\n\
    )\n// 10M nodes including drafts, test data, etc.\n// vs. filtered: 500K verified nodes — 20x smaller, 20x faster algorithm\n"
  when_applies: Neo4j projects using GDS for analytics, ranking, community detection, or similarity
  when_not_applies: stateless microservices, projects not using Neo4j or GDS
  sources: ["https://neo4j.com/docs/graph-data-science/current/management-ops/projections/", "https://neo4j.com/docs/graph-data-science/current/management-ops/graph-catalog-ops/"]
- id: CR-N4J-DRV-001
  text: Use the Neo4j Python driver with connection pooling and session management — never create a new Driver instance per
    request, as driver initialization is expensive and connection pools are shared.
  why: 'The neo4j.GraphDatabase.driver() call establishes a connection pool to the Neo4j cluster. Creating a new Driver per
    request means: (1) TCP handshake overhead for every request (~10ms), (2) no connection reuse, (3) no load balancing across
    cluster members. A properly initialized Driver instance (created once at app startup) maintains a pool of connections,
    routes reads to replicas and writes to the leader in a cluster, and reuses existing connections with ~1ms overhead. For
    a FastAPI service at 1000 req/s, new-Driver-per-request wastes 10 seconds of connection overhead per second.'
  how_to_do_right: 'Create driver at app startup: driver = GraphDatabase.driver(uri, auth=..., max_connection_pool_size=50).
    Inject via dependency injection (FastAPI Depends). Use context managers for sessions: with driver.session() as session.
    For async FastAPI, use AsyncGraphDatabase.driver(). Use routing to separate read/write: session(default_access_mode=READ)
    for read replicas. Close driver at app shutdown: driver.close().'
  severity: high
  technologies:
    platform: [neo4j]
    lang: [python]
    framework: [fastapi]
  domains:
    domain: [architecture, performance]
    concern: [data, database, backend]
  example_good: "from neo4j import AsyncGraphDatabase, AsyncDriver\nfrom fastapi import FastAPI, Depends\nfrom contextlib import\
    \ asynccontextmanager\n\n# Module-level driver — created once, reused across all requests\n_driver: AsyncDriver | None\
    \ = None\n\n@asynccontextmanager\nasync def lifespan(app: FastAPI):\n    global _driver\n    _driver = AsyncGraphDatabase.driver(\n\
    \        os.getenv('NEO4J_URI', 'bolt://localhost:7687'),\n        auth=(os.getenv('NEO4J_USER', 'neo4j'), os.getenv('NEO4J_PASSWORD')),\n\
    \        max_connection_pool_size=50,\n    )\n    yield\n    await _driver.close()  # Graceful shutdown\n\napp = FastAPI(lifespan=lifespan)\n\
    \nasync def get_driver() -> AsyncDriver:\n    return _driver\n\n@app.get('/claims/{claim_id}')\nasync def get_claim(claim_id:\
    \ str, driver: AsyncDriver = Depends(get_driver)):\n    async with driver.session() as session:\n        result = await\
    \ session.run(\n            'MATCH (c:Claim {id: $id}) RETURN c',\n            id=claim_id\n        )\n        record =\
    \ await result.single()\n        return record['c'] if record else None\n"
  example_bad: "# WRONG: New driver per request — 10ms TCP overhead per request\n@app.get('/claims/{claim_id}')\nasync def get_claim(claim_id:\
    \ str):\n    driver = AsyncGraphDatabase.driver(  # NEW driver every request!\n        'bolt://localhost:7687', auth=('neo4j',\
    \ 'password')\n    )\n    async with driver.session() as session:\n        result = await session.run('MATCH (c:Claim {id:\
    \ $id}) RETURN c', id=claim_id)\n        return await result.single()\n    await driver.close()  # Closed immediately\
    \ — no pooling benefit\n"
  when_applies: Any Python application using Neo4j with significant request volume
  when_not_applies: one-off scripts, single-threaded batch jobs, projects not using Neo4j
  sources: ["https://neo4j.com/docs/api/python-driver/current/", "https://neo4j.com/docs/python-manual/current/connect-advanced/"]
