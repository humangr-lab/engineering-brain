layer: rules
technology: SRE
domain: deployment
knowledge:
- id: CR-SRE-LAUNCH-001
  text: A launch checklist is mandatory for any change that affects production capacity, reliability, or security. The checklist
    must be completed BEFORE launch, not during. Launches without checklists are gambling with production stability.
  why: 'Google created Launch Coordination Engineering (LCE) after observing that product launches consistently caused outages.
    The pattern: a product team builds a feature, gets excited, launches it, and discovers (in production) that they didn''t
    consider capacity planning, monitoring, rollback procedures, or security review. Google''s launch checklist covers: capacity
    (can the infrastructure handle the expected traffic?), reliability (what happens when this feature fails?), security (has
    the feature been security reviewed?), observability (can we monitor the feature?), and rollback (can we turn it off?).
    The checklist is not optional — it is a gate that blocks launches until all items are addressed. This prevents the "move
    fast and break things" culture from breaking production.

    '
  how_to_do_right: '1. Create a launch checklist covering: capacity planning, monitoring/alerting, security review, rollback
    plan, load testing, documentation.

    2. Make the checklist a blocking gate: no launch proceeds without all items checked. No exceptions for "urgent" launches.

    3. Assign a launch coordinator (not the feature developer) who verifies checklist completeness independently.

    4. Include post-launch verification steps: "After launch, verify that latency < X, error rate < Y, capacity utilization
    < Z."

    5. Track launches that bypassed the checklist and caused incidents. Use this data to justify the process to skeptics.

    6. Review and update the checklist quarterly: remove items that never catch issues, add items for new risk categories.

    '
  example_good: "from dataclasses import dataclass, field\nfrom typing import List, Optional\nfrom datetime import datetime\n\n@dataclass\nclass LaunchChecklist:\n    feature_name: str\n    capacity_review: bool = False\n    monitoring_configured: bool = False\n    security_review: bool = False\n    rollback_plan_documented: bool = False\n    load_test_passed: bool = False\n    runbook_written: bool = False\n    reviewed_by: Optional[str] = None  # Independent reviewer\n    reviewed_at: Optional[datetime] = None\n\n    def is_ready(self) -> bool:\n        return all([\n            self.capacity_review,\n            self.monitoring_configured,\n            self.security_review,\n            self.rollback_plan_documented,\n            self.load_test_passed,\n            self.runbook_written,\n            self.reviewed_by is not None,\n        ])\n\ndef gate_launch(checklist: LaunchChecklist):\n    if not checklist.is_ready():\n        missing = [k for k, v in checklist.__dict__.items() if v is False]\n        raise RuntimeError(f'Launch blocked: missing checks: {missing}')\n    print(f'Launch approved by {checklist.reviewed_by}')\n"
  example_bad: "# 'Let's just ship it, we can fix issues in production'\ndef deploy_feature(feature_name: str):\n    # No checklist, no capacity review, no security review\n    # No rollback plan, no load test, no runbook\n    kubernetes_client.apply(f'deploy/{feature_name}.yaml')\n    print(f'{feature_name} deployed to production!')\n    # Hope for the best\n"
  when_applies: "Before any production deployment that changes capacity, reliability, or security posture of the system."
  severity: high
  technologies:
    lang: [general]
    platform: [deployment, kubernetes]
  domains:
    domain: [operations, deployment, reliability]
  sources:
  - url: https://sre.google/sre-book/reliable-product-launches/
    title: 'Google SRE Book — Chapter 27: Reliable Product Launches at Scale'
  validation_status: cross_checked
- id: CR-SRE-LAUNCH-002
  text: Gradual rollouts are non-negotiable — launch to 1% of users, then 5%, then 25%, then 100%. At each stage, verify metrics
    are healthy before expanding. A feature that works for 1% but crashes at 100% has a scaling bug that only gradual rollout
    catches.
  why: 'Google''s launch strategy is incrementally progressive because they learned that features that "work in testing" can
    fail catastrophically at production scale. Common failure modes caught by gradual rollout: memory leaks (1% traffic =
    manageable leak, 100% traffic = OOM), lock contention (1% = occasional conflict, 100% = deadlock), fan-out amplification
    (1% = moderate downstream load, 100% = downstream overload), and data skew (1% = even distribution, 100% = hot partitions).
    Each stage of the rollout is a mini-experiment: does the feature work at this scale? Are latency, error rate, and resource
    utilization within bounds? If yes, expand. If no, rollback from a position where only 1% of users are affected, not 100%.

    '
  how_to_do_right: '1. Rollout stages: 1% (canary) → 5% → 25% → 50% → 100%. Each stage requires monitoring verification before
    expansion.

    2. Define rollout success criteria: latency < P99 target, error rate < 0.1%, no increase in resource utilization beyond
    linear scaling.

    3. Each stage must soak for a minimum duration: canary (1 hour), 5% (4 hours), 25% (24 hours), 50% (24 hours).

    4. Automatic rollback if success criteria are violated at any stage. Do not wait for a human to notice.

    5. Gradual rollout must be PER-REGION, not global. 1% in one datacenter is safer than 1% across all datacenters.

    6. Feature flags enable gradual rollout without redeployment. The code is already deployed; the flag controls activation.

    '
  example_good: "import time\nfrom dataclasses import dataclass\n\n@dataclass\nclass RolloutStage:\n    percent: int\n    min_soak_seconds: int\n    latency_p99_max_ms: float\n    error_rate_max: float\n\nROLLOUT_STAGES = [\n    RolloutStage(percent=1,   min_soak_seconds=3600,  latency_p99_max_ms=500, error_rate_max=0.001),\n    RolloutStage(percent=5,   min_soak_seconds=14400, latency_p99_max_ms=500, error_rate_max=0.001),\n    RolloutStage(percent=25,  min_soak_seconds=86400, latency_p99_max_ms=500, error_rate_max=0.001),\n    RolloutStage(percent=50,  min_soak_seconds=86400, latency_p99_max_ms=500, error_rate_max=0.001),\n    RolloutStage(percent=100, min_soak_seconds=0,     latency_p99_max_ms=500, error_rate_max=0.001),\n]\n\ndef gradual_rollout(feature_flag: str, stages: list = ROLLOUT_STAGES):\n    for stage in stages:\n        set_rollout_percentage(feature_flag, stage.percent)\n        print(f'Rollout at {stage.percent}% — soaking for {stage.min_soak_seconds}s')\n        time.sleep(stage.min_soak_seconds)\n        metrics = get_canary_metrics(feature_flag)\n        if metrics.p99_latency > stage.latency_p99_max_ms or metrics.error_rate > stage.error_rate_max:\n            set_rollout_percentage(feature_flag, 0)\n            raise RuntimeError(f'Rollback: metrics violated at {stage.percent}%')\n    print(f'Rollout complete: {feature_flag} at 100%')\n"
  example_bad: "def deploy_feature(feature_name: str):\n    # Deploy to 100% immediately — no gradual rollout\n    kubernetes_client.set_replicas(feature_name, percent=100)\n    print(f'{feature_name} deployed to 100% of users')\n    # If there's a memory leak, all users are affected simultaneously\n    # If there's lock contention, 100% traffic hits it at once\n    # No soak time, no metric checks, no automatic rollback\n"
  when_applies: "When deploying any new feature or code change to production, especially changes that could have scale-dependent failure modes."
  severity: critical
  technologies:
    lang: [general]
    platform: [deployment, kubernetes]
  domains:
    domain: [operations, deployment, reliability]
  sources:
  - url: https://sre.google/sre-book/reliable-product-launches/
    title: 'Google SRE Book — Chapter 27: Reliable Product Launches at Scale'
  validation_status: cross_checked
- id: CR-SRE-LAUNCH-003
  text: Every launch must have an instant kill switch — a mechanism to completely disable the feature within seconds, without
    redeployment. If you cannot turn off a feature in under 1 minute, the feature is not ready for production.
  why: 'Google mandates kill switches because rollbacks take too long during critical incidents. A rollback requires: building
    the previous version, deploying it across the fleet, and waiting for the previous version to start serving — which can
    take 15-30 minutes even with good automation. A kill switch (feature flag set to "off") takes effect in seconds because
    the code is already deployed — only the flag changes. Google''s feature flag infrastructure propagates changes globally
    within 30 seconds. During a launch-related incident, the response is: flip the kill switch (seconds), verify the incident
    is resolved (minutes), then investigate root cause (hours). Without a kill switch, the response is: start a rollback (minutes),
    wait for deployment (15-30 minutes), verify (minutes) — during which users are impacted.

    '
  how_to_do_right: '1. Every new feature MUST have a feature flag that can be toggled to "off" without any code change or
    deployment.

    2. The feature flag must propagate to ALL instances within 60 seconds. Test this propagation time.

    3. When the flag is "off," the feature must be COMPLETELY disabled — no partial state, no background processing, no leaked
    side effects.

    4. Feature flags must be accessible to on-call engineers, not just feature developers. During an incident at 3 AM, the
    on-call must be able to flip any flag.

    5. Document each feature flag: what it controls, what happens when off, who owns it, when to remove it.

    6. Clean up feature flags after successful launch (30-90 days). Stale flags become permanent complexity.

    '
  example_good: "import time\nimport logging\n\nlogger = logging.getLogger(__name__)\n\nclass FeatureFlagManager:\n    \"\"\"Feature flag system with instant kill switch capability.\"\"\"\n\n    def __init__(self, config_store):\n        self.store = config_store  # Propagates globally in < 30s\n\n    def register_feature(self, name: str, owner: str, description: str):\n        self.store.set(f'feature:{name}', {\n            'enabled': False, 'owner': owner, 'description': description,\n            'kill_switch_doc': f'When OFF: completely disables {name}, no side effects',\n            'created_at': time.time(),\n        })\n\n    def kill(self, name: str, reason: str, killed_by: str):\n        \"\"\"Instant kill switch — takes effect in < 60 seconds.\"\"\"\n        logger.critical(f'KILL SWITCH: {name} disabled by {killed_by}: {reason}')\n        self.store.set(f'feature:{name}:enabled', False)\n        # Verify propagation\n        time.sleep(5)\n        assert not self.is_enabled(name), f'Kill switch failed to propagate for {name}'\n\n    def is_enabled(self, name: str) -> bool:\n        return self.store.get(f'feature:{name}:enabled', False)\n\n# Usage in application code\nflag_manager = FeatureFlagManager(config_store)\nif flag_manager.is_enabled('new_search_algorithm'):\n    result = new_search(query)\nelse:\n    result = legacy_search(query)\n"
  example_bad: "# No kill switch — rollback requires full redeployment\ndef search(query: str):\n    # New algorithm is always active after deployment\n    # To disable: revert commit, rebuild, redeploy (15-30 minutes)\n    return new_search_algorithm(query)\n    # During those 15-30 minutes, all users experience the bug\n    # At 3 AM, the on-call engineer has to find the right commit to revert\n"
  when_applies: "When launching any new feature to production — every feature must have a flag that can be toggled off within seconds without redeployment."
  severity: high
  technologies:
    lang: [general]
    platform: [deployment, kubernetes]
