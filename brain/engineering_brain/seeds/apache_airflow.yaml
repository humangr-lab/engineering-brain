- id: CR-AIRFLOW-011
  text: Set up SLA monitoring and alerting for critical DAGs — rely on SLA callbacks and task-level notifications, not manual
    UI checking.
  why: Without automated alerting, a failed critical DAG is discovered only when a stakeholder asks 'where is my report?'
    hours later. A DAG that succeeds but takes 3x longer than expected (data source degradation) goes unnoticed until downstream
    consumers complain. SLA misses indicate systemic issues (resource contention, upstream delays, data quality problems)
    that get worse if not addressed. Manual UI monitoring does not scale beyond 10 DAGs.
  how_to_do_right: 'Set sla on tasks for expected completion time. Configure sla_miss_callback for automated alerting (Slack,
    PagerDuty, email). Use on_failure_callback and on_retry_callback on the DAG for task-level alerts. Monitor in Grafana:
    task duration (p50, p95, p99), DAG run duration, scheduler heartbeat, task queue depth. Set up heartbeat monitoring for
    the scheduler itself.'
  severity: high
  technologies:
    lang: [python]
    library: [slack]
    platform: [airflow, pagerduty]
  domains:
    domain: [operations, observability, reliability]
    concern: [orchestration, monitoring]
  example_good: "from airflow.decorators import dag, task\nfrom datetime import datetime, timedelta\n\ndef alert_on_failure(context):\n\
    \    \"\"\"Send Slack alert on task failure.\"\"\"\n    task_instance = context['task_instance']\n    slack_webhook.send(\n\
    \        text=f\":red_circle: Task FAILED: {task_instance.dag_id}.{task_instance.task_id}\\n\"\n             f\"Execution\
    \ date: {context['ds']}\\n\"\n             f\"Log URL: {task_instance.log_url}\"\n    )\n\ndef alert_on_sla_miss(dag,\
    \ task_list, blocking_task_list, slas, blocking_tis):\n    \"\"\"Alert when task exceeds SLA.\"\"\"\n    for sla in slas:\n\
    \        slack_webhook.send(\n            text=f\":warning: SLA MISS: {sla.dag_id}.{sla.task_id} \"\n                \
    \ f\"exceeded {sla.timedelta}\"\n        )\n\n@dag(\n    schedule_interval=\"@daily\",\n    start_date=datetime(2026,\
    \ 1, 1),\n    sla_miss_callback=alert_on_sla_miss,\n    default_args={\n        'on_failure_callback': alert_on_failure,\n\
    \        'retries': 2,\n        'retry_delay': timedelta(minutes=5),\n        'sla': timedelta(hours=2),  # All tasks\
    \ must complete within 2 hours\n    },\n)\ndef critical_etl():\n    @task(sla=timedelta(minutes=30))  # Extract must finish\
    \ in 30 min\n    def extract(ds: str) -> str:\n        return fetch_data(ds)\n\n    @task(sla=timedelta(hours=1))    \
    \ # Transform must finish in 1 hour\n    def transform(data: str) -> str:\n        return process_data(data)\n\n    transform(extract())\n\
    \ncritical_etl()\n"
  example_bad: "@dag(schedule_interval=\"@daily\", start_date=datetime(2026, 1, 1))\ndef critical_etl():\n    # No SLA, no\
    \ failure callback, no monitoring\n    # Fails silently at 3am, discovered at 10am when CFO asks for report\n    @task\n\
    \    def extract(ds: str):\n        return fetch_data(ds)\n"
  when_applies: Projects using Apache Airflow DAG orchestration, Python codebases, Slack, or PagerDuty
  sources: ["https://airflow.apache.org/docs/apache-airflow/stable/core-concepts/dag-run.html#sla-miss"]
- id: CR-AIRFLOW-012
  text: Use Airflow Connections for service credentials and Variables for configuration — but access Variables inside tasks,
    not at DAG parse time.
  why: Airflow Variables are stored in the metadata database. Accessing Variable.get() at the top level of a DAG file (outside
    a task) queries the database on every scheduler heartbeat (every 30 seconds). With 100 DAGs each reading 3 variables,
    the scheduler makes 300 DB queries every 30 seconds (600/minute) just for variable lookups. This degrades scheduler performance
    and can cause task scheduling delays.
  how_to_do_right: Access Variables inside task callables, not at DAG parse time. For DAG-level configuration that must be
    available at parse time (schedule intervals, start dates), use a YAML config file or environment variables instead. If
    you must use Variables at parse time, use Variable.get() with deserialize_json=True and fetch one JSON variable containing
    all config, not multiple scalar variables.
  severity: medium
  technologies:
    lang: [python]
    platform: [airflow]
  domains:
    domain: [operations, performance]
    concern: [orchestration]
  example_good: "from airflow.decorators import dag, task\nfrom airflow.models import Variable\nfrom datetime import datetime\n\
    \n# DAG-level config from file (parsed once, no DB query)\nimport yaml\nwith open(\"/opt/airflow/config/pipeline.yaml\"\
    ) as f:\n    PIPELINE_CONFIG = yaml.safe_load(f)\n\n@dag(\n    schedule_interval=PIPELINE_CONFIG[\"schedule\"],  # From\
    \ file, not Variable\n    start_date=datetime(2026, 1, 1),\n)\ndef configurable_etl():\n\n    @task\n    def extract(ds:\
    \ str) -> str:\n        # Variable accessed INSIDE task — only queried when task runs\n        config = Variable.get(\"\
    extract_config\", deserialize_json=True)\n        source_url = config[\"source_url\"]\n        batch_size = config[\"\
    batch_size\"]\n        return fetch_data(source_url, batch_size, ds)\n\n    extract()\n\nconfigurable_etl()\n"
  example_bad: 'from airflow.models import Variable


    # Variables at parse time — DB query every 30 seconds

    SOURCE_URL = Variable.get("source_url")        # DB query per parse

    BATCH_SIZE = Variable.get("batch_size")         # DB query per parse

    API_KEY = Variable.get("api_key")               # DB query per parse (credentials in Variable!)

    TARGET_TABLE = Variable.get("target_table")     # DB query per parse

    # 4 queries × every 30 seconds = 480 queries/hour just from this DAG

    '
  when_applies: Projects using Apache Airflow DAG orchestration or Python codebases
  when_not_applies: low-traffic internal tools, admin dashboards, or batch jobs where latency is irrelevant. projects not
    using Airflow or Python
  sources: ["https://airflow.apache.org/docs/apache-airflow/stable/howto/variable.html"]
- id: CR-AIRFLOW-013
  text: Set catchup=False on DAGs unless you explicitly need historical backfill — catchup=True creates a run for every missed
    interval.
  why: With catchup=True (default), when a DAG is first enabled or after a pause, Airflow creates one DAG run for every missed
    schedule interval. A daily DAG with start_date=2025-01-01 enabled in February 2026 creates 400+ DAG runs simultaneously.
    This floods the scheduler, overwhelms worker pools, and can crash external APIs or databases with sudden load. Most production
    DAGs only need to process the latest interval.
  how_to_do_right: 'Set catchup=False on all DAGs that should only process the current/latest interval. When you need historical
    backfill, use the CLI: airflow dags backfill --start-date 2026-01-01 --end-date 2026-02-01 dag_id — this gives you explicit
    control over the date range and parallelism. Set max_active_runs=1 or 2 to prevent concurrent runs from overwhelming resources
    during backfill.'
  severity: high
  technologies:
    lang: [python]
    platform: [airflow]
  domains:
    domain: [operations]
    concern: [orchestration]
  example_good: "@dag(\n    schedule_interval=\"@daily\",\n    start_date=datetime(2026, 1, 1),\n    catchup=False,      \
    \  # Only run for the latest interval\n    max_active_runs=2,    # At most 2 concurrent runs\n)\ndef production_etl():\n\
    \    # Runs once per day, no historical backfill on deploy\n    pass\n\n# For explicit backfill (when needed):\n# airflow\
    \ dags backfill \\\n#   --start-date 2026-01-15 \\\n#   --end-date 2026-02-01 \\\n#   --reset-dagruns \\\n#   production_etl\n"
  example_bad: "@dag(\n    schedule_interval=\"@hourly\",\n    start_date=datetime(2025, 1, 1),  # 14 months ago\n    # catchup\
    \ defaults to True\n    # max_active_runs defaults to 16\n)\ndef production_etl():\n    pass\n\n# On first enable: 10,000+\
    \ DAG runs created simultaneously\n# Scheduler overwhelmed, workers saturated, external APIs rate-limited\n# \"Why is\
    \ my database getting 10,000 simultaneous connections?\"\n"
  when_applies: Projects using Apache Airflow DAG orchestration or Python codebases
  when_not_applies: projects not using Airflow or Python
  sources: ["https://airflow.apache.org/docs/apache-airflow/stable/core-concepts/dag-run.html#catchup"]
- id: CR-AIRFLOW-014
  text: Use trigger rules to control task execution in branching DAGs — the default all_success skips tasks after branches.
  why: When a BranchPythonOperator selects one branch, tasks in the other branch are marked as 'skipped'. The default trigger
    rule (all_success) requires all upstream tasks to succeed. A downstream join task with all_success trigger rule will be
    skipped because some upstream tasks were skipped (not succeeded). This silently prevents the rest of the DAG from running.
    The none_failed_min_one_success trigger rule handles this correctly by running if at least one upstream succeeded and
    none failed.
  how_to_do_right: Set trigger_rule='none_failed_min_one_success' on join tasks after branches. Use 'all_done' when the task
    should run regardless of upstream status (cleanup tasks). Use 'one_success' when any one upstream success is sufficient.
    Test branching DAGs with both branch paths to verify join tasks execute correctly. Visualize the DAG in the Airflow UI
    and trace the execution path.
  severity: medium
  technologies:
    lang: [python]
    platform: [airflow]
  domains:
    domain: [operations]
    concern: [orchestration, correctness]
  example_good: "from airflow.decorators import dag, task\nfrom airflow.operators.python import BranchPythonOperator\nfrom\
    \ airflow.utils.trigger_rule import TriggerRule\n\n@dag(schedule_interval=\"@daily\", start_date=datetime(2026, 1, 1))\n\
    def branching_dag():\n\n    @task.branch\n    def choose_path(ds: str) -> str:\n        if is_weekend(ds):\n         \
    \   return 'light_processing'\n        return 'full_processing'\n\n    @task\n    def light_processing(): ...\n\n    @task\n\
    \    def full_processing(): ...\n\n    @task(trigger_rule=TriggerRule.NONE_FAILED_MIN_ONE_SUCCESS)\n    def send_report():\n\
    \        \"\"\"Runs after whichever branch completed — not skipped.\"\"\"\n        notify_stakeholders()\n\n    branch\
    \ = choose_path()\n    [light_processing(), full_processing()] >> send_report()\n"
  example_bad: "@task  # Default trigger_rule='all_success'\ndef send_report():\n    \"\"\"SKIPPED when one branch is skipped\
    \ — DAG appears to succeed but report never sent.\"\"\"\n    notify_stakeholders()\n\n# BranchOperator → light_processing\
    \ (runs) + full_processing (skipped)\n# send_report trigger_rule=all_success → skipped (full_processing was skipped)\n\
    # No report sent, no error, no alert\n"
  when_applies: Projects using Apache Airflow DAG orchestration or Python codebases
  when_not_applies: projects not using Airflow or Python
  sources: ["https://airflow.apache.org/docs/apache-airflow/stable/core-concepts/dags.html#trigger-rules"]
- id: CR-AIRFLOW-015
  text: Use pool slots to limit concurrent access to shared resources — prevent resource exhaustion from parallel task execution.
  why: Airflow schedules tasks in parallel based on parallelism and concurrency settings. Without resource limits, 50 tasks
    can simultaneously open database connections, hit API rate limits, or overwhelm shared file systems. A production database
    with a 100-connection pool gets 50 connections from Airflow ETL + 50 connections from the application = connection exhaustion.
    Pools provide fine-grained concurrency control per shared resource.
  how_to_do_right: 'Create pools in the Airflow UI or CLI: airflow pools set database_pool 10 ''Max 10 concurrent DB tasks''.
    Assign tasks to pools: task.pool = ''database_pool''. Set priority_weight to control task ordering within the pool. Use
    pool_slots to consume multiple slots for heavy tasks. Create separate pools for each external resource (database_pool,
    api_pool, spark_cluster_pool). Monitor pool usage in the Airflow UI''s Pools page.'
  severity: medium
  technologies:
    lang: [python]
    platform: [airflow]
  domains:
    domain: [operations, performance, reliability]
    concern: [orchestration]
  example_good: "# Create pool via CLI (or UI)\n# airflow pools set warehouse_db 10 \"Max 10 concurrent warehouse queries\"\
    \n# airflow pools set payment_api 5 \"Max 5 concurrent API calls\"\n\n@task(pool='warehouse_db', pool_slots=1)\ndef load_to_warehouse(ds:\
    \ str):\n    \"\"\"Limited to 10 concurrent tasks across all DAGs.\"\"\"\n    upsert_data(ds)\n\n@task(pool='warehouse_db',\
    \ pool_slots=3)\ndef heavy_aggregation(ds: str):\n    \"\"\"Heavy query: consumes 3 pool slots (30% of pool capacity).\"\
    \"\"\n    run_heavy_aggregation(ds)\n\n@task(pool='payment_api', pool_slots=1, priority_weight=10)\ndef process_refund(ds:\
    \ str):\n    \"\"\"High priority: processed before lower-priority tasks in same pool.\"\"\"\n    refund_api.process(ds)\n"
  example_bad: "# No pools — 50 DAGs all query the warehouse simultaneously\n@task\ndef load_to_warehouse(ds: str):\n    upsert_data(ds)\n\
    # 50 concurrent connections → warehouse connection pool exhausted\n# Application users get \"too many connections\" errors\n\
    # All 50 tasks slow down due to resource contention\n"
  when_applies: Projects using Apache Airflow DAG orchestration or Python codebases
  when_not_applies: low-traffic internal tools, admin dashboards, or batch jobs where latency is irrelevant. projects not
    using Airflow or Python
  sources: ["https://airflow.apache.org/docs/apache-airflow/stable/administration-and-deployment/pools.html"]
