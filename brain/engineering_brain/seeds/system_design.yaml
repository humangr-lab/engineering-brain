  example_good: "# FastAPI with URL path versioning\nfrom fastapi import APIRouter\n\nv1_router = APIRouter(prefix=\"/api/v1\"\
    )\nv2_router = APIRouter(prefix=\"/api/v2\")\n\n@v1_router.get(\"/users/{user_id}\")\ndef get_user_v1(user_id: str):\n\
    \    \"\"\"V1: Returns flat user object.\"\"\"\n    user = user_service.get(user_id)\n    return {\"id\": user.id, \"\
    name\": user.name, \"email\": user.email}\n\n@v2_router.get(\"/users/{user_id}\")\ndef get_user_v2(user_id: str):\n  \
    \  \"\"\"V2: Returns nested user object with profile.\"\"\"\n    user = user_service.get(user_id)\n    return {\n    \
    \    \"id\": user.id,\n        \"profile\": {\"name\": user.name, \"email\": user.email, \"avatar\": user.avatar_url},\n\
    \        \"metadata\": {\"created_at\": user.created_at.isoformat()},\n    }\n\n# Both versions coexist — clients migrate\
    \ at their own pace\napp.include_router(v1_router)\napp.include_router(v2_router)\n"
