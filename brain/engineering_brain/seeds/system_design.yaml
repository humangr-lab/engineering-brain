    \ str):\n    user = user_service.get(user_id)\n    # V1: returned {\"name\": \"...\"} (string)\n    # V2: changed to {\"\
    name\": {\"first\": \"...\", \"last\": \"...\"}} (object)\n    # ALL clients parsing name as string break immediately\n\
    \    return {\"name\": {\"first\": user.first_name, \"last\": user.last_name}}\n"
  sources: ["https://stripe.com/docs/api/versioning"]
  when_applies: "When evolving API contracts without breaking existing clients"
- id: CR-SYS-PAGINATION-001
  text: Cursor-Based Pagination — Use cursor-based (keyset) pagination for real-time data with frequent inserts; use offset
    pagination only for static datasets.
  why: Offset pagination (LIMIT 20 OFFSET 1000) scans and discards 1000 rows before returning 20. At page 500, the database
    scans 10,000 rows and discards 9,980. Performance degrades linearly with page depth. Worse, if new rows are inserted between
    page requests, users see duplicate or missing items. Cursor-based pagination (WHERE id > :last_seen_id LIMIT 20) uses
    an indexed column as a bookmark, maintaining O(1) performance at any depth and stable results during inserts. Twitter,
    Stripe, and Slack all use cursor-based pagination for their APIs.
  how_to_do_right: '1. Cursor-based: use an indexed column (id, created_at) as the cursor. Return next_cursor in response.

    2. Encode cursors as opaque tokens (base64 of the value) so clients cannot guess or manipulate them.

    3. Support forward and backward pagination: after/before cursors.

    4. Return has_next_page and has_previous_page booleans for UI navigation.

    5. Offset pagination is OK for: admin dashboards, search results, static reports.

    6. Default page size: 20-50 items. Max page size: 100. Enforce server-side limits.

    '
  severity: high
  technologies:
    lang: [graphql, python]
    framework: [fastapi]
    platform: [postgresql, rest]
  domains:
    domain: [architecture, api, performance]
    concern: [system_design]
  example_good: "import base64\nfrom datetime import datetime\n\n@app.get(\"/api/v1/orders\")\ndef list_orders(after: str\
    \ | None = None, limit: int = 20):\n    limit = min(limit, 100)  # Server-side cap\n\n    query = db.query(Order).order_by(Order.created_at.desc())\n\
    \    if after:\n        cursor_value = base64.b64decode(after).decode()\n        cursor_time = datetime.fromisoformat(cursor_value)\n\
    \        query = query.filter(Order.created_at < cursor_time)\n\n    orders = query.limit(limit + 1).all()  # Fetch one\
    \ extra to check has_next\n    has_next = len(orders) > limit\n    orders = orders[:limit]\n\n    next_cursor = None\n\
    \    if has_next and orders:\n        next_cursor = base64.b64encode(\n            orders[-1].created_at.isoformat().encode()\n\
    \        ).decode()\n\n    return {\n        \"data\": [o.to_dict() for o in orders],\n        \"pagination\": {\"next_cursor\"\
    : next_cursor, \"has_next_page\": has_next},\n    }\n"
  example_bad: "@app.get(\"/api/v1/orders\")\ndef list_orders(page: int = 1, limit: int = 20):\n    offset = (page - 1) *\
    \ limit\n    # At page 500: SELECT * FROM orders OFFSET 10000 LIMIT 20\n    # Database scans 10,020 rows, discards 10,000\n\
    \    # Takes 2 seconds instead of 2 milliseconds\n    orders = db.query(Order).offset(offset).limit(limit).all()\n   \
    \ # If new orders are inserted between page 1 and page 2 requests,\n    # user sees duplicate orders or misses orders\
    \ entirely\n    return {\"data\": [o.to_dict() for o in orders], \"page\": page}\n"
  sources: ["https://www.postgresql.org/docs/current/queries-limit.html"]
  when_applies: "When designing APIs that return large result sets to clients"
- id: CR-SYS-IDEMPOTENT-001
  text: Idempotency Keys — Make non-idempotent operations (POST, payment charges) safe to retry by accepting a client-generated
    idempotency key.
  why: 'Networks are unreliable. A client sends a POST /charges request, the server processes it and charges the customer,
    but the response is lost due to a network timeout. The client retries, and without idempotency protection, the customer
    is charged twice. Stripe processes billions of dollars and requires idempotency keys on all charge requests. Without them,
    every network hiccup is a potential double-charge. The fix is simple: the server stores the result keyed by the idempotency
    key and returns the stored result on retry.'
  how_to_do_right: '1. Accept an Idempotency-Key header (UUID generated by the client).

    2. Before processing, check if the key already has a stored result.

    3. If found: return the stored result (same status code, same body). Do NOT reprocess.

    4. If not found: process the request, store the result with the key, return the result.

    5. Key storage: Redis with TTL (24-48 hours) or a database table.

    6. The key should be scoped per user/account to prevent cross-user collisions.

    '
  severity: critical
  technologies:
    lang: [python]
    framework: [fastapi, flask]
    platform: [rest, redis]
  domains:
    domain: [architecture, api, reliability]
    concern: [system_design]
  example_good: "@app.post(\"/api/v1/charges\")\nasync def create_charge(\n    body: ChargeRequest,\n    idempotency_key:\
    \ str = Header(..., alias=\"Idempotency-Key\"),\n    user: User = Depends(get_current_user),\n):\n    cache_key = f\"\
    idempotency:{user.id}:{idempotency_key}\"\n\n    # Check for existing result\n    existing = await redis.get(cache_key)\n\
    \    if existing:\n        stored = json.loads(existing)\n        return JSONResponse(\n            status_code=stored[\"\
    status_code\"],\n            content=stored[\"body\"],\n        )\n\n    # Process the charge\n    result = await payment_service.charge(user.id,\
    \ body.amount, body.currency)\n    response_body = {\"charge_id\": result.id, \"status\": result.status}\n\n    # Store\
    \ result for 24 hours\n    await redis.set(cache_key, json.dumps({\n        \"status_code\": 201,\n        \"body\": response_body,\n\
    \    }), ex=86400)\n\n    return JSONResponse(status_code=201, content=response_body)\n"
  example_bad: "@app.post(\"/api/v1/charges\")\nasync def create_charge(body: ChargeRequest, user: User = Depends(get_current_user)):\n\
    \    # No idempotency protection — every call creates a new charge\n    result = await payment_service.charge(user.id,\
    \ body.amount)\n    return {\"charge_id\": result.id, \"status\": result.status}\n    # Client timeout → retry → DOUBLE\
    \ CHARGE!\n    # 0.1% of requests fail due to network issues\n    # At 10K charges/day = 10 double charges per day = angry\
    \ customers\n"
  sources: ["https://stripe.com/docs/api/idempotent_requests"]
  when_applies: "When designing APIs where clients may retry requests due to network failures"
- id: CR-SYS-CAP-001
  text: CAP Theorem — In a distributed system experiencing a network partition, you must choose between consistency and availability.
    Design for your actual requirements, not theoretical ideals.
  why: 'CAP says during a network partition (P), you get either Consistency (C) — all nodes return the same data — or Availability
    (A) — all nodes respond to requests. You cannot have both during a partition. But partitions are rare, so the real question
    (PACELC) is: when there is no partition, do you prefer latency or consistency? A banking system must choose consistency
    (CP) — showing wrong balances is unacceptable. A social media feed can choose availability (AP) — showing a slightly stale
    feed is better than showing nothing. The mistake is treating all data the same: user passwords need strong consistency;
    ''like'' counts can be eventually consistent.'
  how_to_do_right: '1. Classify your data by consistency requirements. Not all data needs the same level.

    2. CP (consistency + partition tolerance): financial transactions, inventory counts, user auth.

    3. AP (availability + partition tolerance): social feeds, analytics, caches, read-heavy content.

    4. Use PACELC for non-partition scenarios: low-latency reads often prefer eventual consistency.

    5. Strong consistency tools: Raft-based databases (etcd, CockroachDB), PostgreSQL with synchronous replication.

    6. Eventual consistency tools: DynamoDB, Cassandra, Redis Cluster, most CDNs.

    '
  severity: high
  technologies:
    platform: [postgresql, dynamodb, cassandra, cockroachdb, redis]
  domains:
    domain: [architecture]
    concern: [system_design, distributed_systems, consistency]
  example_good: "# Mixed consistency model — different strategies for different data\nclass OrderSystem:\n    def __init__(self):\n\
    \        # CP: financial data — strong consistency, synchronous replication\n        self.order_db = PostgreSQL(replication=\"\
    synchronous\")\n\n        # AP: product views — eventual consistency, high availability\n        self.analytics_db = DynamoDB(consistency=\"\
    eventual\")\n\n        # AP: product catalog — cached, stale is OK\n        self.catalog_cache = Redis(cluster_mode=True)\n\
    \n    def place_order(self, order: Order):\n        # Strong consistency: both debit and credit must succeed together\n\
    \        with self.order_db.transaction():\n            self.order_db.debit_inventory(order.items)\n            self.order_db.create_order(order)\n\
    \        # Eventual consistency: analytics can lag\n        self.analytics_db.increment_async(\"orders_placed\", 1)\n\n\
    \    def get_product(self, product_id: str):\n        # Eventual consistency is fine: showing stale price for 5s is acceptable\n\
    \        return self.catalog_cache.get(f\"product:{product_id}\")\n"
  example_bad: "# Treating all data with the same consistency model\nclass OrderSystem:\n    def __init__(self):\n       \
    \ # Everything in eventually-consistent DynamoDB — including financial data\n        self.db = DynamoDB(consistency=\"\
    eventual\")\n\n    def place_order(self, order: Order):\n        self.db.put_item(\"orders\", order.to_dict())\n     \
    \   self.db.update_item(\"inventory\", decrement=order.quantity)\n        # PROBLEM: order is created but inventory decrement\
    \ hasn't propagated\n        # Another request reads stale inventory → overselling\n"
  sources: ["https://martinfowler.com/articles/patterns-of-distributed-systems/generation.html"]
  when_applies: "When choosing between consistency and availability for distributed data stores"
- id: CR-SYS-STORAGE-001
  text: Polyglot Persistence — Use the right storage technology for each data access pattern instead of forcing everything
    into one database.
  why: Relational databases excel at ACID transactions and complex queries but are slow at full-text search, graph traversals,
    and time-series aggregation. Forcing all data into PostgreSQL means building search with LIKE '%query%' (no relevance
    ranking), graph queries with recursive CTEs (slow beyond 3 hops), and time-series with GROUP BY date_trunc (no downsampling).
    A monitoring platform stored metrics in PostgreSQL — a 30-day dashboard query took 45 seconds. After moving metrics to
    TimescaleDB (same SQL, optimized for time-series), the same query ran in 200ms.
  how_to_do_right: '1. Relational (PostgreSQL/MySQL): transactions, foreign keys, complex joins, source of truth.

    2. Document (MongoDB/DynamoDB): flexible schemas, denormalized reads, JSON-heavy workloads.

    3. Key-Value (Redis/DynamoDB): caching, sessions, rate limiting, feature flags.

    4. Search (Elasticsearch/Meilisearch): full-text search with relevance, faceted filtering.

    5. Time-Series (TimescaleDB/InfluxDB): metrics, logs, IoT data, downsampling.

    6. Graph (Neo4j/FalkorDB): relationships, recommendations, fraud detection, social networks.

    7. Keep the relational DB as the source of truth. Other stores are projections updated via events.

    '
  severity: high
  technologies:
    platform: [postgresql, redis, elasticsearch, neo4j, timescaledb, mongodb]
  domains:
    domain: [architecture]
    concern: [system_design, data, database]
  example_good: "# Each data type in the optimal storage\nclass DataLayer:\n    # Source of truth: PostgreSQL (ACID, relations,\
    \ transactions)\n    orders_db: PostgreSQL      # Orders, customers, payments\n\n    # Search: Elasticsearch (full-text,\
    \ relevance ranking, facets)\n    product_search: Elasticsearch  # Product catalog search\n\n    # Cache: Redis (sub-ms\
    \ reads, TTL, atomic operations)\n    cache: Redis               # Session data, rate limits, hot product data\n\n   \
    \ # Time-series: TimescaleDB (continuous aggregates, retention policies)\n    metrics_db: TimescaleDB    # Request latency,\
    \ error rates, business metrics\n\n    # Graph: FalkorDB (relationship queries, recommendations)\n    graph_db: FalkorDB\
    \         # User→Product recommendations, fraud detection\n\n# Event-driven sync: PostgreSQL changes → event → update\
    \ search/cache/graph\n@on_event(\"product.updated\")\nasync def sync_product(event: ProductUpdated):\n    await product_search.index(event.product)\n\
    \    await cache.delete(f\"product:{event.product_id}\")\n    await graph_db.update_node(\"Product\", event.product_id,\
    \ event.properties)\n"
  example_bad: "# Everything in PostgreSQL — round peg in square hole\nclass DataLayer:\n    db: PostgreSQL\n\n    def search_products(self,\
    \ query: str):\n        # Full-text search with LIKE — no relevance ranking, no fuzzy matching\n        return db.execute(\n\
    \            \"SELECT * FROM products WHERE name ILIKE %s\", (f\"%{query}%\",)\n        )  # Scans entire table, returns\
    \ unranked results\n\n    def get_recommendations(self, user_id: str):\n        # Graph traversal with recursive CTE —\
    \ 10 seconds at 3 hops\n        return db.execute(\"\"\"\n            WITH RECURSIVE recs AS (\n                SELECT\
    \ product_id FROM purchases WHERE user_id = %s\n                UNION\n                SELECT p2.product_id FROM purchases\
    \ p2\n                JOIN recs ON p2.user_id IN (\n                    SELECT user_id FROM purchases WHERE product_id\
    \ = recs.product_id\n                )\n            ) SELECT * FROM recs LIMIT 10\n        \"\"\", (user_id,))  # Explodes\
    \ with data volume\n"
  sources: ["https://martinfowler.com/bliki/CQRS.html"]
  when_applies: "When selecting storage engines based on access patterns, consistency, and scale requirements"
- id: CR-SYS-RATELIMIT-001
  text: Token Bucket Rate Limiting — Use the token bucket algorithm for API rate limiting, allowing bursts while enforcing
    an average rate.
  why: 'Fixed window rate limiting (100 requests per minute) has a boundary problem: a client can send 100 requests at 0:59
    and 100 more at 1:01 — 200 requests in 2 seconds while technically staying within limits. Sliding window fixes the boundary
    but is memory-intensive. Token bucket is the best balance: it allows short bursts (good for user experience) while enforcing
    a steady average rate (protecting the server). AWS, Cloudflare, and Stripe all use token bucket. Without rate limiting,
    a single client can monopolize server resources or brute-force authentication.'
  how_to_do_right: '1. Token bucket: bucket holds N tokens (burst capacity), refills at R tokens/second (sustained rate).

    2. Each request consumes 1 token. If bucket is empty, request is rejected (429 Too Many Requests).

    3. Set different limits per endpoint: auth endpoints (5/min), read endpoints (100/min), write endpoints (20/min).

    4. Include rate limit headers: X-RateLimit-Limit, X-RateLimit-Remaining, X-RateLimit-Reset.

    5. Rate limit by: API key (for partners), user ID (for authenticated), IP (for anonymous).

    6. Use Redis for distributed rate limiting across multiple server instances.

    '
  severity: high
  technologies:
    lang: [python]
    framework: [fastapi, flask]
    platform: [redis, nginx]
  domains:
    domain: [architecture, api, security]
    concern: [system_design]
  example_good: "import time\nfrom redis import Redis\n\nclass TokenBucketRateLimiter:\n    def __init__(self, redis: Redis,\
    \ max_tokens: int, refill_rate: float):\n        self.redis = redis\n        self.max_tokens = max_tokens      # Burst\
    \ capacity\n        self.refill_rate = refill_rate    # Tokens per second\n\n    def allow_request(self, key: str) ->\
    \ tuple[bool, dict]:\n        now = time.time()\n        pipe = self.redis.pipeline()\n\n        # Atomic token bucket\
    \ with Lua script\n        lua = \"\"\"\n        local key = KEYS[1]\n        local max_tokens = tonumber(ARGV[1])\n \
    \       local refill_rate = tonumber(ARGV[2])\n        local now = tonumber(ARGV[3])\n\n        local bucket = redis.call('hmget',\
    \ key, 'tokens', 'last_refill')\n        local tokens = tonumber(bucket[1]) or max_tokens\n        local last_refill =\
    \ tonumber(bucket[2]) or now\n\n        local elapsed = now - last_refill\n        tokens = math.min(max_tokens, tokens\
    \ + elapsed * refill_rate)\n\n        local allowed = tokens >= 1\n        if allowed then tokens = tokens - 1 end\n\n\
    \        redis.call('hmset', key, 'tokens', tokens, 'last_refill', now)\n        redis.call('expire', key, math.ceil(max_tokens\
    \ / refill_rate) * 2)\n\n        return {allowed and 1 or 0, math.floor(tokens)}\n        \"\"\"\n        result = self.redis.eval(lua,\
    \ 1, key, self.max_tokens, self.refill_rate, now)\n        allowed, remaining = bool(result[0]), result[1]\n\n       \
    \ headers = {\n            \"X-RateLimit-Limit\": str(self.max_tokens),\n            \"X-RateLimit-Remaining\": str(remaining),\n\
    \            \"X-RateLimit-Reset\": str(int(now + (self.max_tokens - remaining) / self.refill_rate)),\n        }\n   \
    \     return allowed, headers\n"
  example_bad: "# Fixed window — boundary exploit: 200 requests in 2 seconds\nrequest_counts = {}  # In-memory — lost on restart,\
    \ not shared across instances\n\ndef check_rate_limit(user_id: str) -> bool:\n    minute = int(time.time() / 60)\n   \
    \ key = f\"{user_id}:{minute}\"\n    request_counts[key] = request_counts.get(key, 0) + 1\n    return request_counts[key]\
    \ <= 100\n    # Exploit: 100 requests at 0:59 + 100 at 1:00 = 200 in 1 second\n    # In-memory: each server has its own\
    \ counter — 3 servers = 300 effective limit\n    # No rate limit headers: clients can't back off gracefully\n"
  sources: ["https://cloud.google.com/architecture/rate-limiting-strategies-techniques"]
  when_applies: "When protecting APIs from abuse, overload, or ensuring fair usage across tenants"
