layer: rules
domain: operations
knowledge:
- id: FINOPS-001
  text: "FinOps must follow the Inform/Optimize/Operate lifecycle. Inform: cost visibility with tagging. Optimize: rightsize, reserve, eliminate waste. Operate: governance, budgets, continuous optimization."
  why: "A startup AWS bill grew from $20K to $180K/month. FinOps assessment revealed: 40% idle resources (Inform), 25% could be reserved (Optimize), 15% orphaned (Operate). Total savings: 60%."
  how_to_do_right: |
    1. INFORM: Tag 100% of resources (team, service, environment, cost-center)
    2. INFORM: Build cost dashboards per team with daily/weekly trends
    3. OPTIMIZE: Rightsize instances (< 40% avg CPU = overprovisioned)
    4. OPTIMIZE: Purchase Reserved Instances for stable workloads (40-60% savings)
    5. OPERATE: Set budgets with alerts at 80%, 90%, 100%
    6. OPERATE: Review costs weekly in standup, monthly in leadership
  severity: critical
  technologies:
    lang: [python, terraform]
    framework: [finops_framework]
    library: [aws_cost_explorer, kubecost, infracost]
  domains:
    domain: [operations, finance]
    concern: [cloud_cost, finops, governance]
  example_good: |
    # FinOps Inform — tagging enforcement via Terraform
    resource "aws_organizations_policy" "require_tags" {
      name = "require-cost-tags"
      content = jsonencode({
        Version = "2012-10-17"
        Statement = [{
          Sid = "RequireCostTags"
          Effect = "Deny"
          Action = ["ec2:RunInstances", "rds:CreateDBInstance"]
          Resource = "*"
          Condition = {"Null": {"aws:RequestTag/team": "true"}}
        }]
      })
    }
  example_bad: |
    # No FinOps — reactive panic mode
    # CEO: "Why is AWS $180K?" CTO asks engineering to "look into it"
    # Engineer kills biggest instance — production goes down
  when_applies: "Any organization spending > $10K/month on cloud infrastructure"
  sources:
    - "https://www.finops.org/framework/"
    - "https://docs.aws.amazon.com/cost-management/latest/userguide/what-is-costmanagement.html"

- id: FINOPS-002
  text: "Measure unit economics (cost per transaction, per user, per API call) rather than absolute cloud spend. $500K supporting $50M revenue is efficient; $50K supporting $100K revenue is a crisis."
  why: "A company celebrated reducing AWS from $200K to $150K. User base grew 3x in same period. Cost-per-user improved from $2.00 to $0.50. Meanwhile, a $30K microservice serving 100 users ($300/user) went unnoticed."
  how_to_do_right: |
    1. Define unit metrics: cost per transaction, per active user, per API call
    2. Calculate: total cost / total business units (monthly)
    3. Track trends: unit cost should decrease with scale
    4. Set targets: "cost per transaction < $0.005"
    5. Report unit economics alongside absolute cost to leadership
  severity: high
  technologies:
    lang: [python, sql]
    framework: [finops_framework]
    library: [aws_cost_explorer, datadog, grafana]
  domains:
    domain: [operations, finance]
    concern: [unit_economics, cost_efficiency]
  example_good: |
    def calculate_unit_economics(service, period_days=30):
        cost = get_aws_cost(service, period_days)
        transactions = get_transaction_count(service, period_days)
        return {
            "cost_per_transaction": cost / max(transactions, 1),
            "cost_per_active_user": cost / max(get_active_users(service), 1),
        }
  example_bad: |
    # Monthly report: "AWS spend: $200K (up 15%)"
    # Reality: user base grew 40%, cost per user decreased
    # Engineers waste 2 weeks on premature optimization
  when_applies: "Any organization tracking cloud costs where leadership needs cost-efficiency context"
  sources:
    - "https://www.finops.org/framework/capabilities/unit-economics/"
    - "https://aws.amazon.com/blogs/aws-cloud-financial-management/unit-metrics-in-practice/"

- id: FINOPS-003
  text: "Implement continuous rightsizing by analyzing CPU/memory utilization over 14+ days. Use Kubecost for Kubernetes or AWS Compute Optimizer for EC2. Rightsizing alone saves 30-40%."
  why: "200 m5.4xlarge instances at 8% CPU. Rightsized to m5.xlarge (4x reduction): saved $720K/year with zero performance impact. 60-70% of cloud instances are overprovisioned."
  how_to_do_right: |
    1. Collect utilization metrics for 14+ days
    2. Analyze P95 CPU and memory (not average)
    3. If P95 < 40%: downsize one instance class
    4. For Kubernetes: use Kubecost/Goldilocks for request recommendations
    5. Rightsize in staging first, monitor 48 hours
    6. Re-evaluate monthly
  severity: high
  technologies:
    lang: [python, bash]
    framework: [kubernetes]
    library: [kubecost, goldilocks, aws_compute_optimizer]
  domains:
    domain: [operations, infrastructure]
    concern: [rightsizing, resource_optimization]
  example_good: |
    import requests
    def get_rightsizing(namespace="production"):
        recs = requests.get("http://kubecost.internal/model/savings/requestSizing",
            params={"window": "14d", "targetCPUUtilization": 0.65}).json()
        return [{"pod": r["controllerName"],
                 "current_cpu": r["currentCPURequest"],
                 "recommended_cpu": r["recommendedCPURequest"],
                 "monthly_savings": r["monthlySavings"]}
                for r in recs if r["monthlySavings"] > 10]
  example_bad: |
    resources:
      requests: {cpu: "4000m", memory: "8Gi"}
    # Actual: 200m CPU (5%), 300Mi RAM (3.75%)
    # 50 replicas * $340/month wasted = $17K/month
  when_applies: "Any cloud workload running 14+ days without utilization-based sizing review"
  sources:
    - "https://www.kubecost.com/kubernetes-cost-optimization/kubernetes-rightsizing/"
    - "https://docs.aws.amazon.com/compute-optimizer/latest/ug/what-is-compute-optimizer.html"

- id: FINOPS-004
  text: "Use Reserved Instances/Savings Plans for stable baselines, Spot instances for fault-tolerant workloads. Use Karpenter for Kubernetes to automate instance selection and Spot management."
  why: "100 m5.xlarge on-demand: $175K/year. With 1-year RI: $112K (36% savings). With Spot for batch: additional 70% savings on 30% of fleet."
  how_to_do_right: |
    1. Categorize: stable baseline (RI), burstable (on-demand), fault-tolerant (Spot)
    2. RI/Savings Plans: 1-year minimum, cover 60-70% of stable baseline
    3. Spot: use for batch, CI/CD, ML training, stateless workers
    4. Karpenter: auto-selects cheapest instance, diversifies Spot pools
    5. Diversify across 10+ instance types for Spot availability
    6. Never Spot for: databases, single-instance services
  severity: high
  technologies:
    lang: [yaml, terraform]
    framework: [kubernetes, karpenter]
    library: [aws_savings_plans, spot_instances]
  domains:
    domain: [operations, infrastructure]
    concern: [reserved_instances, spot_instances]
  example_good: |
    # Karpenter NodePool
    apiVersion: karpenter.sh/v1beta1
    kind: NodePool
    spec:
      template:
        spec:
          requirements:
            - key: karpenter.sh/capacity-type
              operator: In
              values: ["spot", "on-demand"]
            - key: node.kubernetes.io/instance-type
              operator: In
              values: [m5.xlarge, m5a.xlarge, m6i.xlarge, c5.xlarge, c6i.xlarge]
      disruption:
        consolidationPolicy: WhenUnderutilized
  example_bad: |
    # All on-demand, no commitment
    # 100 instances 24/7 at on-demand = $175K/year
    # With RI: $112K. Savings left on table: $63K/year
  when_applies: "Any cloud workload running consistently that would benefit from reserved pricing"
  sources:
    - "https://karpenter.sh/docs/"
    - "https://aws.amazon.com/savingsplans/"

- id: FINOPS-005
  text: "Implement carbon-aware scheduling (GreenOps) for deferrable workloads. Use Electricity Maps API to time-shift and region-shift batch jobs to minimize carbon emissions at no additional cost."
  why: "Grid carbon varies 5-10x by time and region. ML training in US-East at 2pm: 500g CO2/kWh. Same job in EU-North at 3am: 50g CO2/kWh. Carbon-aware scheduling reduces emissions 30-50% at zero cost."
  how_to_do_right: |
    1. Classify: real-time (cannot defer), deferrable (can wait hours)
    2. Use Electricity Maps API for real-time grid carbon intensity
    3. Time-shift deferrable workloads to low-carbon periods
    4. Region-shift to cleanest available region
    5. Report carbon alongside cost metrics
  severity: medium
  technologies:
    lang: [python, yaml]
    framework: [kubernetes, keda]
    library: [carbon_aware_sdk, electricity_maps]
  domains:
    domain: [operations, sustainability]
    concern: [carbon_awareness, green_ops]
  example_good: |
    import requests, os
    def get_carbon_intensity(region):
        coords = {"us-west-2": (45.52, -122.67), "eu-north-1": (59.33, 18.07)}
        lat, lon = coords[region]
        r = requests.get("https://api.electricitymap.org/v3/carbon-intensity/latest",
            params={"lat": lat, "lon": lon},
            headers={"auth-token": os.getenv("ELECTRICITY_MAPS_TOKEN")})
        return r.json()["carbonIntensity"]
    def select_greenest_region():
        return min(["us-west-2", "eu-north-1"], key=get_carbon_intensity)
  example_bad: |
    # Always us-east-1 at 2pm: 420 gCO2/kWh
    # eu-north-1 same moment: 12 gCO2/kWh (35x less carbon)
  when_applies: "Any organization running deferrable workloads that can be time-shifted or region-shifted"
  sources:
    - "https://greensoftware.foundation/"
    - "https://app.electricitymap.org/"

- id: FINOPS-006
  text: "Implement showback before chargeback. Teams must understand costs (showback) before being held financially accountable (chargeback). Premature chargeback creates gaming behavior."
  why: "Enterprise implemented chargeback before cost literacy. Teams gamed: moved workloads to shared accounts, stopped running tests to save CI costs, requested budget increases instead of optimizing."
  how_to_do_right: |
    1. Showback phase (months 1-6): weekly cost reports, no consequences
    2. Educate: show spend, top drivers, how to reduce
    3. Track optimization actions during showback
    4. Chargeback phase (month 7+): allocate after cost literacy established
    5. Shared costs: allocate proportionally
  severity: medium
  technologies:
    lang: [python, sql]
    framework: [finops_framework]
    library: [aws_cost_categories, gcp_billing]
  domains:
    domain: [operations, finance]
    concern: [showback, chargeback, cost_allocation]
  example_good: |
    import boto3
    def generate_showback_report(period_days=7):
        ce = boto3.client("ce")
        response = ce.get_cost_and_usage(
            TimePeriod={"Start": start, "End": end},
            Granularity="DAILY",
            GroupBy=[{"Type": "TAG", "Key": "team"}],
            Metrics=["UnblendedCost"],
        )
        for team, cost in aggregate(response):
            print(f"Team {team}: ${cost:.2f}/week")
  example_bad: |
    # Chargeback without showback
    # Team A hides costs in shared account
    # Team B stops running tests to save CI costs
  when_applies: "Organizations transitioning to team-level cost accountability"
  sources:
    - "https://www.finops.org/framework/capabilities/chargeback/"
    - "https://cloud.google.com/billing/docs/how-to/display-billing-data"

- id: FINOPS-007
  text: "Adopt FOCUS (FinOps Open Cost and Usage Specification) standard for multi-cloud cost data normalization. FOCUS provides a unified schema eliminating provider-specific billing parsers."
  why: "Multi-cloud org spent 3 months normalizing billing data. AWS CUR has 100+ columns with different names than GCP billing export. FOCUS maps all providers to same columns: BilledCost, EffectiveCost, PricingCategory."
  how_to_do_right: |
    1. Enable FOCUS export in each cloud provider
    2. Ingest into data warehouse (BigQuery, Snowflake)
    3. Build dashboards on FOCUS columns
    4. Use PricingCategory to compare on-demand vs reserved across clouds
    5. Join with business metrics for cross-cloud unit economics
  severity: medium
  technologies:
    lang: [sql, python]
    framework: [finops_framework]
    library: [aws_data_exports, bigquery, snowflake]
  domains:
    domain: [operations, finance]
    concern: [cost_normalization, multi_cloud]
  example_good: |
    -- FOCUS unified query — works for AWS, GCP, Azure
    SELECT ProviderName, ServiceName, PricingCategory,
           SUM(BilledCost) as billed, SUM(EffectiveCost) as effective
    FROM focus_cost_data
    WHERE BillingPeriodStart >= DATE_TRUNC('month', CURRENT_DATE)
    GROUP BY 1, 2, 3
    -- "Reserved Instance" (AWS) = "Committed Use" (GCP) = PricingCategory: Commitment
  example_bad: |
    # 3 parsers for 3 providers
    def parse_aws(row): return row["lineItem/UnblendedCost"]
    def parse_gcp(row): return row["cost.amount"]
    # Every billing format change breaks a parser
  when_applies: "Any organization using multiple cloud providers needing standardized cost analytics"
  sources:
    - "https://focus.finops.org/"
    - "https://aws.amazon.com/blogs/aws-cloud-financial-management/introducing-focus-1-0/"

- id: FINOPS-008
  text: "Detect and terminate idle resources automatically. Orphaned load balancers, unattached volumes, idle databases, and forgotten dev environments typically represent 15-30% of cloud spend."
  why: "FinOps audit found: 47 unattached EBS ($2.8K/mo), 23 idle ALBs ($4.6K/mo), 12 forgotten dev environments ($18K/mo), 8 idle RDS ($9.6K/mo). Total waste: $37K/month ($448K/year)."
  how_to_do_right: |
    1. Scan weekly: unattached volumes, idle LBs, stopped instances, unattached EIPs
    2. Scan idle databases: 0 connections for 7 days
    3. Schedule dev environments: shut down 7pm, start 8am (save 60%)
    4. Auto-tag with idle-since date, alert owner after 7 days
    5. Auto-terminate after 21 days idle (with snapshot backup)
  severity: high
  technologies:
    lang: [python, bash]
    framework: [aws_lambda]
    library: [boto3, cloud_custodian, aws_trusted_advisor]
  domains:
    domain: [operations, infrastructure]
    concern: [idle_resources, waste_elimination]
  example_good: |
    # Cloud Custodian policy
    policies:
      - name: delete-unattached-ebs
        resource: ebs
        filters:
          - {type: value, key: State, value: available}
          - {type: value, key: "tag:idle-since", value_type: age, op: gt, value: 14}
        actions:
          - snapshot
          - delete
      - name: schedule-dev-environments
        resource: ec2
        filters:
          - "tag:environment": development
        actions:
          - type: offhours
            offhours: {weekdays: [0,1,2,3,4], hour: 19}
            onhours: {weekdays: [0,1,2,3,4], hour: 8}
  example_bad: |
    # No idle detection
    # Developer RDS for POC — runs 18 months ($12K)
    # 47 EBS from terminated instances — snapshot charges accumulating
    # Annual waste: $400K+ — discovered only during annual audit
  when_applies: "Any cloud environment where resources can be provisioned without lifecycle management"
  sources:
    - "https://cloudcustodian.io/docs/"
    - "https://docs.aws.amazon.com/awssupport/latest/user/cost-optimization-checks.html"

- id: FINOPS-009
  text: "Set budget alerts and anomaly detection with automated responses. Cost anomalies must be detected within hours, not on the monthly bill."
  why: "A misconfigured autoscaling group spun up GPU instances for 3 weeks: $45K. If detected day 1: $2K. AWS Cost Anomaly Detection uses ML to learn patterns and alert on deviations."
  how_to_do_right: |
    1. Set budgets per team/service with alerts at 80%, 90%, 100%, 120%
    2. Enable AWS Cost Anomaly Detection or GCP Budget Alerts
    3. Daily budget granularity (not monthly)
    4. Route alerts to Slack/PagerDuty (not just email)
    5. Auto-response at 120%: scale down non-critical resources
    6. 3-sigma rule for custom anomaly detection
  severity: high
  technologies:
    lang: [python, terraform]
    framework: [aws_lambda]
    library: [aws_cost_anomaly_detection, aws_budgets, pagerduty]
  domains:
    domain: [operations, finance]
    concern: [anomaly_detection, budget_management]
  example_good: |
    import numpy as np
    def detect_anomaly(daily_costs, today_cost):
        if len(daily_costs) < 14: return False
        mean = np.mean(daily_costs[-14:])
        std = np.std(daily_costs[-14:])
        threshold = mean + (3 * std)
        if today_cost > threshold:
            alert(f"ANOMALY: ${today_cost:.0f} vs expected ${mean:.0f}")
            return True
        return False
  example_bad: |
    # GPU autoscaling misconfigured — runs 3 weeks undetected
    # Day 1: $2K. Day 21: $45K. Discovered on monthly bill.
  when_applies: "Any cloud environment where unexpected cost increases need detection within hours"
  sources:
    - "https://docs.aws.amazon.com/cost-management/latest/userguide/manage-ad.html"
    - "https://cloud.google.com/billing/docs/how-to/budgets"

- id: FINOPS-010
  text: "Optimize LLM/AI inference costs with prompt caching (90% discount on cached tokens), model routing (simple queries to smaller models), batch API (50% discount), and response length limits."
  why: "GPT-4 for all 10M queries: $85K/month. 60% were simple classification (GPT-3.5 handles equally well, 90% cheaper). 25% had cacheable prompts. After optimization: $18K/month (79% reduction)."
  how_to_do_right: |
    1. Model routing: classify complexity, route to cheapest capable model
    2. Prompt caching: Anthropic cache_control for repeated system prompts (90% discount)
    3. Batch API: OpenAI Batch for non-real-time workloads (50% discount)
    4. Response limits: set max_tokens to prevent verbose responses
    5. Track cost per query/feature
  severity: high
  technologies:
    lang: [python]
    framework: [langchain, litellm]
    library: [anthropic, openai, tiktoken]
  domains:
    domain: [operations, ai_engineering]
    concern: [llm_cost, model_optimization]
  example_good: |
    from anthropic import Anthropic
    client = Anthropic()
    # Model routing
    def route(query):
        if len(query) < 100: return "claude-3-5-haiku-20241022"
        return "claude-sonnet-4-20250514"
    # Prompt caching (90% discount on cache hits)
    response = client.messages.create(
        model="claude-sonnet-4-20250514",
        max_tokens=500,
        system=[{"type": "text", "text": SYSTEM_PROMPT,
                 "cache_control": {"type": "ephemeral"}}],
        messages=[{"role": "user", "content": query}],
    )
  example_bad: |
    # GPT-4 for everything, no caching, no batching
    for q in all_queries:  # 10M/month
        openai.chat.completions.create(model="gpt-4", messages=[...])
    # $85K/month. With optimization: $18K (79% savings)
  when_applies: "Any application using LLM APIs where inference costs exceed $1K/month"
  sources:
    - "https://docs.anthropic.com/en/docs/build-with-claude/prompt-caching"
    - "https://platform.openai.com/docs/guides/batch"
