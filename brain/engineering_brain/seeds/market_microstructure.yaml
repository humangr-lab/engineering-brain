- id: FIN-MICRO-013
  text: "Prediction market microstructure differs from traditional markets due to bounded prices [0,1], thin liquidity, event-driven discontinuities, and binary/multi-outcome settlement. Thin books mean market impact is 10-100x higher per dollar traded. AMM-based markets (LMSR, CPMM) provide guaranteed liquidity but have different microstructure properties than order book markets."
  why: >
    Prediction markets have unique microstructure challenges that traditional finance
    models don't handle well. Polymarket's largest markets have ~$50K at best bid vs.
    NYSE's ~$5M for SPY. This means a $10,000 order on Polymarket moves prices 10-50x
    more than the same order on NYSE. Additionally, prediction market prices are bounded
    [0, 1], creating asymmetric impact near the boundaries (buying at 0.95 is much more
    expensive per probability unit than buying at 0.50). AMM-based markets solve the
    liquidity problem but introduce different slippage curves and don't have queue
    priority or cancellation dynamics. Models calibrated on equity data will dramatically
    underestimate prediction market impact costs.
  how_to_do_right: |
    1. Adjust impact models for bounded prices:
       - Transform to log-odds space: logit(p) = ln(p/(1-p))
       - Estimate impact in log-odds space where it's approximately symmetric
       - Impact in probability space: dp = p*(1-p) * d_logit (varies by price level)
    2. Account for thin liquidity:
       - Compute depth-weighted impact: walk the book for every order size
       - Don't use midpoint-based models (spread is too wide, midpoint is misleading)
    3. Handle event discontinuities:
       - At resolution: probability jumps to 0 or 1 discontinuously
       - Near resolution: spread widens dramatically (nobody wants to provide liquidity)
       - Implement time-to-event adjustments: multiply impact by 1/(T-t) as event approaches
    4. For AMM-based markets:
       - Impact is deterministic: compute exact cost from AMM formula before trading
       - LMSR: cost = b * ln(sum(exp(q_i/b))) after trade - before trade
       - No queue position — first-come first-served doesn't apply
    5. Monitor for manipulation:
       - Small markets are trivially manipulable (< $10K to move price 20%)
       - Track large position concentration (single address > 20% of open interest)
    6. Provide wider spreads than traditional markets (2-5% vs 0.01%)
  severity: high
  technologies:
    lang: [python]
    framework: [numpy, pandas]
  domains:
    domain: [prediction_markets, fintech]
    concern: [domain_specific]
  example_good: |
    import numpy as np

    class PredictionMarketMicrostructure:
        """Tools for prediction market-specific microstructure analysis."""

        @staticmethod
        def probability_to_logodds(p: float) -> float:
            """Transform bounded [0,1] to unbounded log-odds."""
            p = np.clip(p, 0.001, 0.999)
            return np.log(p / (1 - p))

        @staticmethod
        def logodds_to_probability(logit: float) -> float:
            """Inverse transform."""
            return 1 / (1 + np.exp(-logit))

        def impact_in_probability_space(
            self, current_prob: float, order_size_usd: float, market_depth_usd: float,
        ) -> float:
            """
            Estimate impact on probability given order size and depth.
            Uses log-odds transformation for symmetric impact estimation.
            """
            # Impact in log-odds space (approximately linear)
            logit_current = self.probability_to_logodds(current_prob)
            # Square-root impact in log-odds
            logit_impact = 0.5 * np.sqrt(order_size_usd / market_depth_usd)

            logit_new = logit_current + logit_impact
            new_prob = self.logodds_to_probability(logit_new)
            return round(new_prob - current_prob, 4)

        def depth_weighted_cost(self, book: list[tuple], quantity: float) -> dict:
            """
            Walk the order book to compute exact execution cost.
            book: [(price, quantity_available)] sorted by price (best first)
            """
            filled = 0.0
            total_cost = 0.0
            fills = []

            for price, qty_available in book:
                fill_qty = min(quantity - filled, qty_available)
                total_cost += fill_qty * price
                filled += fill_qty
                fills.append({"price": price, "quantity": fill_qty})
                if filled >= quantity:
                    break

            if filled < quantity:
                return {"error": f"Insufficient depth: only {filled:.2f} of {quantity:.2f} available"}

            avg_price = total_cost / filled
            best_price = book[0][0]
            slippage_bps = (avg_price - best_price) / best_price * 10_000

            return {
                "avg_price": round(avg_price, 4),
                "total_cost": round(total_cost, 2),
                "slippage_bps": round(slippage_bps, 2),
                "fills": fills,
            }

    # Example: thin prediction market book
    pm = PredictionMarketMicrostructure()

    # Buying YES shares at probability 0.60
    impact = pm.impact_in_probability_space(
        current_prob=0.60, order_size_usd=5000, market_depth_usd=20000
    )
    print(f"Impact: +{impact*100:.1f} percentage points")
    # Impact: ~+12.5pp (from 0.60 to 0.725) — massive compared to equity impact

    # Compare: same $5K order in equity with $5M depth
    impact_equity = pm.impact_in_probability_space(
        current_prob=0.60, order_size_usd=5000, market_depth_usd=5_000_000
    )
    print(f"Equity-like impact: +{impact_equity*100:.2f} pp")
    # Impact: ~+0.4pp — 30x less

    # Walking a thin book
    book = [(0.60, 200), (0.62, 300), (0.65, 500), (0.70, 1000)]
    result = pm.depth_weighted_cost(book, quantity=800)
    print(f"Avg price: {result['avg_price']}, Slippage: {result['slippage_bps']} bps")
  example_bad: |
    # WRONG: Using equity market impact models for prediction markets
    def equity_impact(order_usd, adv=1_000_000):
        # Assumes deep, continuous liquidity like NYSE
        return 0.3 * 0.02 * (order_usd / adv) ** 0.5  # ~0.1 bps for $5K order

    # In a prediction market with $20K depth:
    # This model says $5K order has ~0.1 bps impact
    # Reality: impact is 1000-5000 bps (10-50 percentage points!)
    # Trader expects to buy at 0.60, actually gets filled at 0.72 average
  when_applies: "Building or trading on prediction market platforms, implementing AMMs, or adapting traditional execution algorithms for thin, bounded-price markets."
  sources:
    - "https://en.wikipedia.org/wiki/Market_microstructure"
    - "https://arxiv.org/abs/0812.0530"

- id: FIN-MICRO-014
  text: "Liquidity provision incentives include maker rebates (exchange pays for passive orders), liquidity mining (token rewards for LP positions), and designated market maker (DMM) obligations. Rebate structures determine equilibrium spread width: higher rebates enable tighter spreads but can encourage phantom liquidity (orders placed to earn rebates with no intent to fill)."
  why: >
    Liquidity is not free — someone must be compensated for the risk of adverse selection.
    NYSE pays market makers $0.0020/share in rebates, which funds ~60% of the spread
    revenue. DeFi protocols use liquidity mining (UNI, SUSHI tokens) to bootstrap liquidity,
    but this creates mercenary capital that disappears when rewards end (SushiSwap's
    "vampire attack" on Uniswap showed $1B+ in liquidity leave in days). For prediction
    markets, insufficient liquidity incentives lead to wide spreads (10-20%), making the
    market useless for price discovery. The design of incentive structures determines
    whether your market has sustainable liquidity or boom-bust cycles.
  how_to_do_right: |
    1. Exchange rebate structure:
       - Maker rebate: pay -$0.0010 to -$0.0030/share for passive orders
       - Taker fee: charge +$0.0015 to +$0.0035/share for aggressive orders
       - Net must be positive (exchange revenue = taker_fee - maker_rebate)
    2. For prediction markets:
       - Rebate as % of spread earned: pay 20-50% of spread back to makers
       - Volume tiers: higher rebates for more volume (encourage commitment)
    3. Liquidity mining design:
       - Time-lock rewards: vest over 30-90 days to prevent mercenary capital
       - Concentrate rewards near mid-price (don't reward orders at 0.01 or 0.99)
       - Weight rewards by time-in-book, not just volume (penalize cancel-heavy behavior)
    4. Designated Market Maker (DMM) obligations:
       - Must maintain quotes within X% of fair value for Y% of trading time
       - In exchange: priority in queue, additional rebates, information advantages
    5. Monitor for phantom liquidity:
       - Track cancel/fill ratio: if > 20:1, likely phantom
       - Flash orders (posted and cancelled within 10ms) should not earn rebates
    6. Evaluate sustainability:
       - Calculate implied annual cost of incentives vs. trading fee revenue
       - If cost > revenue, incentive program will eventually end → prepare for liquidity exodus
  severity: high
  technologies:
    lang: [python]
    framework: [numpy, pandas]
  domains:
    domain: [fintech, prediction_markets, trading]
    concern: [domain_specific]
  example_good: |
    from dataclasses import dataclass
    from typing import Optional

    @dataclass
    class LiquidityIncentive:
        maker_rebate_bps: float      # rebate paid to passive orders
        taker_fee_bps: float         # fee charged to aggressive orders
        min_quote_time_pct: float    # minimum time with active quotes
        max_spread_bps: float        # maximum allowed spread for rebate eligibility
        cancel_fill_max_ratio: float # max cancel/fill to qualify

    class LiquidityProgram:
        """Manage liquidity provider incentives and monitor quality."""

        def __init__(self, incentive: LiquidityIncentive):
            self.incentive = incentive
            self.providers: dict[str, dict] = {}

        def register_provider(self, provider_id: str):
            self.providers[provider_id] = {
                "fills": 0, "cancels": 0, "volume": 0.0,
                "time_quoting_sec": 0.0, "total_time_sec": 0.0,
                "earned_rebates": 0.0, "spread_sum": 0.0, "spread_samples": 0,
            }

        def record_fill(self, provider_id: str, quantity: float, price: float):
            p = self.providers[provider_id]
            p["fills"] += 1
            p["volume"] += quantity * price
            # Rebate in dollars
            rebate = quantity * price * self.incentive.maker_rebate_bps / 10_000
            p["earned_rebates"] += rebate

        def record_cancel(self, provider_id: str):
            self.providers[provider_id]["cancels"] += 1

        def record_quote(self, provider_id: str, spread_bps: float, duration_sec: float):
            p = self.providers[provider_id]
            p["time_quoting_sec"] += duration_sec
            p["total_time_sec"] += duration_sec
            p["spread_sum"] += spread_bps * duration_sec
            p["spread_samples"] += 1

        def evaluate_provider(self, provider_id: str) -> dict:
            """Check if provider meets obligations and qualifies for rebates."""
            p = self.providers[provider_id]

            cancel_fill_ratio = p["cancels"] / max(p["fills"], 1)
            time_quoting_pct = p["time_quoting_sec"] / max(p["total_time_sec"], 1) * 100
            avg_spread = p["spread_sum"] / max(p["time_quoting_sec"], 1)

            qualifies = (
                cancel_fill_ratio <= self.incentive.cancel_fill_max_ratio
                and time_quoting_pct >= self.incentive.min_quote_time_pct
                and avg_spread <= self.incentive.max_spread_bps
            )

            return {
                "provider_id": provider_id,
                "qualifies_for_rebate": qualifies,
                "cancel_fill_ratio": round(cancel_fill_ratio, 1),
                "time_quoting_pct": round(time_quoting_pct, 1),
                "avg_spread_bps": round(avg_spread, 1),
                "earned_rebates_usd": round(p["earned_rebates"], 2),
                "violations": [] if qualifies else [
                    f"Cancel/fill: {cancel_fill_ratio:.1f} > {self.incentive.cancel_fill_max_ratio}"
                    if cancel_fill_ratio > self.incentive.cancel_fill_max_ratio else None,
                    f"Quoting time: {time_quoting_pct:.0f}% < {self.incentive.min_quote_time_pct}%"
                    if time_quoting_pct < self.incentive.min_quote_time_pct else None,
                ],
            }

    # Example
    incentive = LiquidityIncentive(
        maker_rebate_bps=2.0, taker_fee_bps=3.0,
        min_quote_time_pct=80.0, max_spread_bps=50.0,
        cancel_fill_max_ratio=20.0,
    )
    program = LiquidityProgram(incentive)
    program.register_provider("mm_alpha")
    program.record_fill("mm_alpha", quantity=100, price=0.65)
    program.record_fill("mm_alpha", quantity=200, price=0.63)
    program.record_quote("mm_alpha", spread_bps=30.0, duration_sec=3600)
    program.record_cancel("mm_alpha")
    result = program.evaluate_provider("mm_alpha")
    print(f"Qualifies: {result['qualifies_for_rebate']}, Earned: ${result['earned_rebates_usd']}")
  example_bad: |
    # WRONG: Flat rebate with no quality requirements — attracts phantom liquidity
    class BadIncentive:
        def pay_rebate(self, provider_id, volume):
            # Pays rebate regardless of cancel ratio, spread, or quote duration
            return volume * 0.001  # $1 per $1000 volume

    # Result: HFT firm places 1M orders at 50 ticks away from mid, cancels 999,990
    # Earns rebates on the 10 fills that happen only when price moves to their level
    # Provides ZERO useful liquidity (never at competitive prices)
    # Exchange pays $10K/day in rebates for phantom liquidity
  when_applies: "Designing exchange fee structures, building liquidity mining programs, evaluating LP incentives for prediction markets or DeFi protocols."
  sources:
    - "https://en.wikipedia.org/wiki/Market_microstructure"

- id: FIN-MICRO-015
  text: "Self-trade prevention (STP) detects and blocks wash trading where the same entity trades with itself to inflate volume, manipulate prices, or earn liquidity mining rewards. Implementation requires matching on account ID, IP, and behavioral patterns (timing, size, price clustering). CFTC Rule 534 explicitly prohibits wash trading."
  why: >
    Wash trading is the most common form of market manipulation, especially in crypto and
    prediction markets. Bitwise Asset Management estimated 95% of crypto exchange volume
    was wash traded in 2019. On prediction markets, wash trading inflates volume metrics
    (used for credibility), earns undeserved liquidity rebates, and can manipulate prices
    for correlated bets or insurance fraud. The CFTC fined Coinbase $6.5M in 2021 for
    allowing wash trades on GDAX. Without STP, your exchange volume numbers are
    meaningless, your liquidity incentive program is exploitable, and you face
    regulatory risk.
  how_to_do_right: |
    1. Account-level STP (basic):
       - Before matching: check if buy_account_id == sell_account_id
       - If match: cancel the later order (or both, depending on policy)
       - Support multiple STP modes: cancel_newest, cancel_oldest, cancel_both, decrement
    2. Entity-level STP (intermediate):
       - Link accounts by KYC entity, IP address, device fingerprint
       - Build entity graph: accounts connected by shared IPs/devices
       - STP applies to all accounts within an entity cluster
    3. Behavioral detection (advanced):
       - Timing: orders placed within 1ms of each other from "different" accounts
       - Size: matching order sizes (buyer and seller same quantity within 0.1%)
       - Price: orders at off-market prices (> 3 ticks from NBBO)
       - Pattern: regular interval wash trades (every 60 seconds, etc.)
    4. Volume discounting:
       - Flag wash-traded volume: don't count in official volume statistics
       - Report "genuine volume" separate from "total volume"
    5. Penalty structure:
       - First offense: warning + clawback of rebates from flagged trades
       - Repeat: suspend account + forfeiture of all earned rebates
    6. Monitoring dashboard:
       - STP trigger rate by account (>5% is suspicious)
       - Volume concentration (>30% of market from one entity)
  severity: critical
  technologies:
    lang: [python]
    framework: [pandas, networkx]
  domains:
    domain: [fintech, prediction_markets, trading]
    concern: [security, domain_specific]
  example_good: |
    from dataclasses import dataclass, field
    from collections import defaultdict
    from enum import Enum

    class STPMode(Enum):
        CANCEL_NEWEST = "cancel_newest"
        CANCEL_OLDEST = "cancel_oldest"
        CANCEL_BOTH = "cancel_both"

    @dataclass
    class Order:
        order_id: str
        account_id: str
        entity_id: str  # KYC-linked entity
        side: str       # "buy" or "sell"
        price: float
        quantity: float
        timestamp_ms: float
        ip_address: str = ""

    class SelfTradePreventor:
        """Multi-level wash trading detection and prevention."""

        def __init__(self, mode: STPMode = STPMode.CANCEL_NEWEST):
            self.mode = mode
            self.entity_map: dict[str, set[str]] = defaultdict(set)  # entity -> accounts
            self.ip_clusters: dict[str, set[str]] = defaultdict(set)  # IP -> accounts
            self.stp_events: list[dict] = []

        def register_account(self, account_id: str, entity_id: str, ip: str = ""):
            self.entity_map[entity_id].add(account_id)
            if ip:
                self.ip_clusters[ip].add(account_id)

        def check_self_trade(self, buy_order: Order, sell_order: Order) -> dict:
            """Check if two orders constitute a self-trade."""
            reasons = []

            # Level 1: Same account
            if buy_order.account_id == sell_order.account_id:
                reasons.append("same_account")

            # Level 2: Same entity (KYC-linked)
            if buy_order.entity_id == sell_order.entity_id:
                reasons.append("same_entity")

            # Level 3: Same IP cluster
            for ip, accounts in self.ip_clusters.items():
                if buy_order.account_id in accounts and sell_order.account_id in accounts:
                    reasons.append(f"shared_ip:{ip}")

            # Level 4: Behavioral (timing + size match)
            time_diff_ms = abs(buy_order.timestamp_ms - sell_order.timestamp_ms)
            size_ratio = min(buy_order.quantity, sell_order.quantity) / max(buy_order.quantity, sell_order.quantity)

            if time_diff_ms < 5 and size_ratio > 0.99:
                reasons.append("behavioral:timing_size_match")

            is_wash = len(reasons) > 0

            if is_wash:
                self.stp_events.append({
                    "buy_order": buy_order.order_id,
                    "sell_order": sell_order.order_id,
                    "reasons": reasons,
                })

            action = None
            if is_wash:
                if self.mode == STPMode.CANCEL_NEWEST:
                    action = "cancel_sell" if sell_order.timestamp_ms > buy_order.timestamp_ms else "cancel_buy"
                elif self.mode == STPMode.CANCEL_OLDEST:
                    action = "cancel_buy" if buy_order.timestamp_ms < sell_order.timestamp_ms else "cancel_sell"
                elif self.mode == STPMode.CANCEL_BOTH:
                    action = "cancel_both"

            return {"is_wash_trade": is_wash, "reasons": reasons, "action": action}

    # Example
    stp = SelfTradePreventor(mode=STPMode.CANCEL_NEWEST)
    stp.register_account("acc_1", entity_id="entity_A", ip="192.168.1.1")
    stp.register_account("acc_2", entity_id="entity_A", ip="192.168.1.1")

    buy = Order("o1", "acc_1", "entity_A", "buy", 0.65, 100, 1000.0, "192.168.1.1")
    sell = Order("o2", "acc_2", "entity_A", "sell", 0.65, 100, 1000.5, "192.168.1.1")
    result = stp.check_self_trade(buy, sell)
    print(f"Wash trade: {result['is_wash_trade']}, Reasons: {result['reasons']}")
    # Wash trade: True, Reasons: ['same_entity', 'shared_ip:192.168.1.1', 'behavioral:timing_size_match']
  example_bad: |
    # WRONG: Only checking account ID — trivially circumvented with multiple accounts
    def naive_stp(buy_account, sell_account):
        return buy_account == sell_account

    # Manipulator creates 10 accounts, washes trades between them
    # Inflates volume by $1M/day, earns $2K in fake liquidity rebates
    # All from the same IP, same entity — but passes this "check"
  when_applies: "Building exchange matching engines, prediction market platforms, or liquidity incentive programs that need to prevent manipulation."
  sources:
    - "https://en.wikipedia.org/wiki/Market_microstructure"

- id: FIN-MICRO-016
  text: "Order types define execution semantics: Market orders guarantee fill but not price. Limit orders guarantee price but not fill. Stop orders trigger at a price level (stop-loss, stop-limit). IOC (Immediate-or-Cancel) fills whatever is available and cancels the rest. FOK (Fill-or-Kill) fills the entire quantity or cancels. GTC (Good-till-Cancel) persists until filled or explicitly cancelled. Each type has different exposure to slippage, adverse selection, and partial fills."
  why: >
    Using the wrong order type is one of the most common and costly mistakes in trading
    systems. A market order during low liquidity can fill 10%+ away from the expected
    price (the 2010 Flash Crash saw market orders fill at $0.01 for stocks worth $40+).
    Conversely, limit-only strategies miss trades and suffer opportunity cost. FOK orders
    are essential for strategies that require atomic execution (arbitrage), while IOC is
    better for best-effort execution. For prediction markets, where liquidity is thin,
    using market orders is especially dangerous — a $5K market buy can move prices from
    0.50 to 0.80. Always use limit orders with price protection for prediction markets.
  how_to_do_right: |
    1. Market order: use ONLY for small orders in liquid markets
       - Add price protection: reject if fill price > mid + X%
       - Never use during circuit breakers, pre/post market, or low-liquidity hours
    2. Limit order: default choice for most strategies
       - Set limit = mid + slippage_tolerance for aggressive execution
       - Use IOC variant if you don't want to rest in the book
    3. Stop-loss: use stop-LIMIT, not stop-MARKET
       - Stop-market can cascade through the book during flash crashes
       - Stop-limit: trigger_price = 99.00, limit_price = 98.50 (gap protection)
    4. IOC (Immediate-or-Cancel):
       - Best for: sweeping available liquidity without resting
       - Partial fills expected — must handle in order management
    5. FOK (Fill-or-Kill):
       - Best for: atomic trades (arbitrage, hedging) where partial fill is worse than no fill
       - Lower fill rate — only use when atomicity is required
    6. GTC (Good-till-Cancel):
       - Add time limits: GTC with max 7-day lifetime to avoid forgotten orders
       - Always implement "cancel on disconnect" for automated systems
    7. For prediction markets:
       - Always use limit orders with probability bounds
       - max_price = 0.95 (never pay > 95% for a YES share)
       - min_price = 0.05 (never sell below 5%)
  severity: high
  technologies:
    lang: [python]
    framework: [pydantic]
  domains:
    domain: [fintech, prediction_markets, trading]
    concern: [domain_specific]
  example_good: |
    from enum import Enum
    from pydantic import BaseModel, field_validator
    from typing import Optional

    class OrderType(str, Enum):
        MARKET = "market"
        LIMIT = "limit"
        STOP_LIMIT = "stop_limit"
        IOC = "ioc"             # Immediate or Cancel
        FOK = "fok"             # Fill or Kill
        GTC = "gtc"             # Good till Cancel

    class Order(BaseModel):
        order_type: OrderType
        side: str               # "buy" or "sell"
        quantity: float
        limit_price: Optional[float] = None
        stop_price: Optional[float] = None
        price_protection_pct: float = 5.0  # max slippage for market orders
        max_lifetime_hours: float = 168.0   # 7 days max for GTC

        @field_validator("limit_price")
        @classmethod
        def validate_limit(cls, v, info):
            if info.data.get("order_type") in (OrderType.LIMIT, OrderType.IOC, OrderType.FOK, OrderType.GTC):
                if v is None:
                    raise ValueError(f"{info.data['order_type']} requires limit_price")
                if v <= 0:
                    raise ValueError("limit_price must be positive")
            return v

        @field_validator("stop_price")
        @classmethod
        def validate_stop(cls, v, info):
            if info.data.get("order_type") == OrderType.STOP_LIMIT:
                if v is None:
                    raise ValueError("stop_limit requires stop_price")
                if info.data.get("limit_price") is not None:
                    gap = abs(v - info.data["limit_price"]) / v
                    if gap > 0.05:
                        raise ValueError(
                            f"Stop-limit gap too wide: {gap*100:.1f}% (max 5%). "
                            "Order may never fill if price gaps through."
                        )
            return v

    class OrderMatcher:
        """Match orders with type-specific semantics."""

        def execute_order(self, order: Order, available_book: list[tuple]) -> dict:
            """
            available_book: [(price, quantity)] sorted best-first
            Returns fill report
            """
            if order.order_type == OrderType.MARKET:
                return self._fill_market(order, available_book)
            elif order.order_type == OrderType.IOC:
                return self._fill_ioc(order, available_book)
            elif order.order_type == OrderType.FOK:
                return self._fill_fok(order, available_book)
            elif order.order_type in (OrderType.LIMIT, OrderType.GTC):
                return self._fill_limit(order, available_book)
            elif order.order_type == OrderType.STOP_LIMIT:
                return {"status": "pending", "message": "Stop not triggered"}

        def _fill_market(self, order: Order, book: list[tuple]) -> dict:
            filled, cost = 0.0, 0.0
            mid = book[0][0] if book else 0
            for price, qty in book:
                # Price protection
                if abs(price - mid) / mid > order.price_protection_pct / 100:
                    break
                fill = min(order.quantity - filled, qty)
                cost += fill * price
                filled += fill
                if filled >= order.quantity:
                    break
            return {"filled": filled, "avg_price": cost / max(filled, 1e-10), "status": "filled" if filled >= order.quantity else "partial"}

        def _fill_ioc(self, order: Order, book: list[tuple]) -> dict:
            filled, cost = 0.0, 0.0
            for price, qty in book:
                if (order.side == "buy" and price > order.limit_price) or \
                   (order.side == "sell" and price < order.limit_price):
                    break
                fill = min(order.quantity - filled, qty)
                cost += fill * price
                filled += fill
                if filled >= order.quantity:
                    break
            # IOC: whatever we got is the fill, rest is cancelled
            return {"filled": filled, "cancelled": order.quantity - filled,
                    "avg_price": cost / max(filled, 1e-10), "status": "ioc_complete"}

        def _fill_fok(self, order: Order, book: list[tuple]) -> dict:
            available = sum(qty for price, qty in book
                          if (order.side == "buy" and price <= order.limit_price) or
                             (order.side == "sell" and price >= order.limit_price))
            if available >= order.quantity:
                return self._fill_ioc(order, book)  # fill fully
            return {"filled": 0, "status": "killed", "reason": f"Only {available} available, need {order.quantity}"}

        def _fill_limit(self, order: Order, book: list[tuple]) -> dict:
            return self._fill_ioc(order, book)  # same but unfilled portion rests in book

    # Example
    book = [(0.60, 200), (0.62, 300), (0.65, 500), (0.70, 1000)]

    # IOC: fill what's available at <= 0.63
    ioc_order = Order(order_type=OrderType.IOC, side="buy", quantity=400, limit_price=0.63)
    matcher = OrderMatcher()
    result = matcher.execute_order(ioc_order, book)
    print(f"IOC: filled {result['filled']}, cancelled {result['cancelled']}")
    # Filled 400 (200 at 0.60 + 200 at 0.62), cancelled 0

    # FOK: all-or-nothing for 600 at <= 0.63
    fok_order = Order(order_type=OrderType.FOK, side="buy", quantity=600, limit_price=0.63)
    result = matcher.execute_order(fok_order, book)
    print(f"FOK: {result['status']}")
    # killed — only 500 available at <= 0.63
  example_bad: |
    # WRONG: Using market orders in thin prediction markets
    def buy_prediction(market_id, amount_usd):
        exchange.send_order(
            type="MARKET",  # No price protection!
            side="BUY",
            quantity=amount_usd / current_price,
        )

    # Current price: 0.50, book: [(0.50, 100), (0.60, 100), (0.80, 100), (0.99, 500)]
    # Trying to buy $500 worth = 1000 shares at 0.50
    # Actual fills: 100@0.50, 100@0.60, 100@0.80, 700@0.99
    # Average price: 0.895 instead of expected 0.50 — 79% slippage!
    # With limit order at 0.65: would fill 200 shares, cancel 800 — much better outcome
  when_applies: "Implementing order management systems, exchange matching engines, or any trading interface where order type selection affects execution quality."
  sources:
    - "https://en.wikipedia.org/wiki/Market_microstructure"
