layer: rules
domain: fintech
knowledge:
- id: FIN-MICRO-001
  text: "Bid-ask spread decomposes into three components: adverse selection (informed traders extract value), inventory risk (market maker holding risk), and order processing (fixed costs). The Glosten-Milgrom model shows adverse selection alone can cause spreads to widen; ignoring this decomposition leads to mispriced liquidity and toxic flow losses."
  why: >
    Market makers who set spreads without modeling adverse selection will be systematically
    picked off by informed traders. The 2010 Flash Crash showed that when adverse selection
    spikes (VPIN > 0.8), naive market makers who ignored this component lost billions in
    minutes. Empirically, adverse selection accounts for 30-60% of the spread in equity
    markets (Huang & Stoll 1997). If you build a market making bot that only considers
    inventory and processing costs, you will bleed money to informed flow. Conversely,
    overestimating adverse selection leads to unnecessarily wide spreads and lost volume.
  how_to_do_right: |
    1. Estimate adverse selection component using the Huang-Stoll decomposition:
       - Regress trade direction (buy=+1, sell=-1) on lagged direction and quote midpoint changes
       - Adverse selection = fraction of spread attributable to permanent price impact
    2. Estimate inventory component:
       - Track net position Q_t; inventory cost ~ gamma * sigma^2 * Q_t * dt
       - gamma = risk aversion parameter (calibrate to 0.01-0.1 for crypto, 0.001-0.01 for equities)
    3. Estimate processing component:
       - Fixed per-trade cost: exchange fees + clearing + settlement
       - Typical: 0.1-0.5 bps for equities, 1-5 bps for crypto
    4. Total half-spread s/2 = adverse_selection + inventory_cost + processing_cost
    5. Update estimates in real-time using rolling windows (500-2000 trades)
    6. Widen spread when adverse_selection / total_spread > 0.5 (toxic flow regime)
  severity: critical
  technologies:
    lang: [python]
    framework: [numpy, pandas, scipy]
  domains:
    domain: [fintech, prediction_markets, trading]
    concern: [domain_specific]
  example_good: |
    import numpy as np
    import pandas as pd

    class SpreadDecomposer:
        """Huang-Stoll (1997) spread decomposition."""

        def __init__(self, risk_aversion: float = 0.05, processing_bps: float = 2.0):
            self.gamma = risk_aversion
            self.processing_bps = processing_bps

        def decompose(self, trades: pd.DataFrame) -> dict:
            """
            trades: DataFrame with columns [price, midpoint, direction, timestamp]
            direction: +1 for buyer-initiated, -1 for seller-initiated
            """
            # Effective half-spread
            trades["eff_half_spread"] = trades["direction"] * (trades["price"] - trades["midpoint"])

            # Permanent impact (adverse selection) = midpoint change in direction of trade
            trades["mid_change"] = trades["midpoint"].shift(-1) - trades["midpoint"]
            trades["permanent_impact"] = trades["direction"] * trades["mid_change"]

            avg_half_spread = trades["eff_half_spread"].mean()
            avg_adverse_selection = trades["permanent_impact"].dropna().mean()

            # Processing cost in price units
            processing_cost = trades["midpoint"].mean() * self.processing_bps / 10_000

            # Inventory = residual
            inventory_cost = max(0, avg_half_spread - avg_adverse_selection - processing_cost)

            return {
                "total_half_spread_bps": avg_half_spread / trades["midpoint"].mean() * 10_000,
                "adverse_selection_bps": avg_adverse_selection / trades["midpoint"].mean() * 10_000,
                "inventory_bps": inventory_cost / trades["midpoint"].mean() * 10_000,
                "processing_bps": self.processing_bps,
                "adverse_selection_pct": avg_adverse_selection / avg_half_spread * 100,
            }

    # Example with concrete numbers
    trades = pd.DataFrame({
        "price":     [100.05, 99.95, 100.10, 99.90, 100.08],
        "midpoint":  [100.00, 100.00, 100.02, 99.98, 100.03],
        "direction": [1, -1, 1, -1, 1],
        "timestamp": pd.date_range("2024-01-01", periods=5, freq="1s"),
    })
    decomp = SpreadDecomposer(risk_aversion=0.05, processing_bps=1.0)
    result = decomp.decompose(trades)
    # result["adverse_selection_pct"] ~ 40-60% for typical equity markets
  example_bad: |
    # WRONG: Setting a flat spread without decomposition — will lose to informed traders
    class NaiveMarketMaker:
        def __init__(self, flat_spread_bps: float = 5.0):
            self.spread_bps = flat_spread_bps  # Never changes!

        def quote(self, mid: float) -> tuple:
            half = mid * self.spread_bps / 10_000
            return (mid - half, mid + half)

    # During high adverse selection (earnings, news), this spread is too tight.
    # Market maker gets picked off: buys at 99.975, price drops to 99.50.
    # Loss = 47.5 bps per share. Flat spread of 5 bps doesn't cover 47.5 bps adverse selection.
  when_applies: "Building any market making system, order book analytics, or execution algorithm that needs to understand spread dynamics."
  sources:
    - "https://en.wikipedia.org/wiki/Bid%E2%80%93ask_spread"
    - "https://en.wikipedia.org/wiki/Market_microstructure"

- id: FIN-MICRO-002
  text: "The Avellaneda-Stoikov (2008) framework provides optimal bid/ask quotes for a market maker who maximizes expected terminal utility under inventory risk. The key formula: reservation price r = s - q * gamma * sigma^2 * (T - t), optimal spread delta = gamma * sigma^2 * (T - t) + (2/gamma) * ln(1 + gamma/k), where q is inventory, gamma is risk aversion, sigma is volatility, and k is the order arrival rate parameter."
  why: >
    Avellaneda-Stoikov is the foundation of modern algorithmic market making. It provides a
    closed-form solution for the inventory management problem: how to skew quotes to reduce
    unwanted inventory while still earning the spread. Without this framework, market makers
    either hold too much inventory (blowing up on adverse moves) or quote too wide (losing
    volume to competitors). Citadel, Virtu, and Jump Trading all use variants of this model.
    The key insight is that the reservation price should shift AWAY from your inventory: if
    you are long, your ask should be more aggressive (lower) to offload inventory, and your
    bid should be less aggressive (lower) to avoid accumulating more.
  how_to_do_right: |
    1. Estimate sigma (volatility) using rolling 1-minute returns, annualized
       - For crypto: sigma ~ 50-150% annualized; for equities: 15-40%
    2. Set gamma (risk aversion) based on max acceptable inventory:
       - gamma = 2 * target_spread / (sigma^2 * T) as a starting point
       - Typical: gamma = 0.1 for aggressive, 1.0 for conservative
    3. Estimate k (order arrival intensity) from historical fill rates:
       - k = number_of_fills / time_interval
       - Typical: k = 1-10 fills per second for liquid assets
    4. Compute reservation price: r_t = S_t - q_t * gamma * sigma^2 * (T - t)
    5. Compute optimal half-spread: delta/2 = gamma * sigma^2 * (T-t)/2 + (1/gamma) * ln(1 + gamma/k)
    6. Set bid = r_t - delta/2, ask = r_t + delta/2
    7. Clip inventory: if |q| > max_position, only quote on the reducing side
    8. Recalculate every 100ms-1s depending on asset volatility
  severity: critical
  technologies:
    lang: [python]
    framework: [numpy, scipy]
  domains:
    domain: [fintech, trading, prediction_markets]
    concern: [domain_specific]
  example_good: |
    import math
    import time

    class AvellanedaStoikov:
        """Optimal market making with inventory management."""

        def __init__(
            self,
            gamma: float = 0.3,       # risk aversion
            sigma: float = 0.02,      # volatility (per period)
            k: float = 5.0,           # order arrival intensity
            T: float = 1.0,           # trading horizon (1 = end of session)
            max_inventory: int = 100,  # max position size
        ):
            self.gamma = gamma
            self.sigma = sigma
            self.k = k
            self.T = T
            self.max_inventory = max_inventory

        def optimal_quotes(self, mid_price: float, inventory: int, time_remaining: float) -> dict:
            """
            Returns optimal bid/ask given current state.
            mid_price: current market mid price
            inventory: current net position (positive = long)
            time_remaining: fraction of horizon remaining (1.0 = start, 0.0 = end)
            """
            tau = max(time_remaining, 0.001)  # avoid division by zero

            # Reservation price: shift away from inventory
            reservation = mid_price - inventory * self.gamma * self.sigma**2 * tau

            # Optimal spread
            spread = self.gamma * self.sigma**2 * tau + (2.0 / self.gamma) * math.log(1 + self.gamma / self.k)

            bid = reservation - spread / 2
            ask = reservation + spread / 2

            # Inventory limits: only quote on the reducing side
            if inventory >= self.max_inventory:
                bid = None  # stop buying
            if inventory <= -self.max_inventory:
                ask = None  # stop selling

            return {
                "bid": round(bid, 6) if bid else None,
                "ask": round(ask, 6) if ask else None,
                "reservation_price": round(reservation, 6),
                "spread": round(spread, 6),
                "inventory_skew": round(reservation - mid_price, 6),
            }

    # Example: BTC market maker
    mm = AvellanedaStoikov(gamma=0.1, sigma=0.005, k=3.0, T=1.0, max_inventory=10)
    quotes = mm.optimal_quotes(mid_price=50000.0, inventory=3, time_remaining=0.5)
    # quotes["inventory_skew"] < 0 because we're long, reservation < mid
    # bid is lower (less aggressive), ask is lower (more aggressive to sell)
    print(f"Bid: {quotes['bid']}, Ask: {quotes['ask']}, Skew: {quotes['inventory_skew']}")
  example_bad: |
    # WRONG: Symmetric quotes regardless of inventory — accumulates dangerous positions
    class BadMarketMaker:
        def __init__(self, spread: float = 0.001):
            self.half_spread = spread / 2

        def quote(self, mid: float, inventory: int) -> tuple:
            # inventory is IGNORED — fatal flaw
            return (mid - self.half_spread * mid, mid + self.half_spread * mid)

    mm = BadMarketMaker(spread=0.001)
    # Buys 50 units on dip, still quoting aggressively on bid side
    # Price drops 2% — loss = 50 * 50000 * 0.02 = $50,000
    # Avellaneda-Stoikov would have widened bid and tightened ask after inventory > 5
  when_applies: "Implementing any algorithmic market making strategy, quoting engine, or liquidity provision system for exchanges or prediction markets."
  sources:
    - "https://arxiv.org/abs/0812.0530"
    - "https://en.wikipedia.org/wiki/Market_microstructure"

- id: FIN-MICRO-003
  text: "The Ho-Stoll (1981) model determines optimal dealer spreads by balancing inventory risk against expected profit from the spread. The optimal spread s* = alpha + beta * gamma * sigma^2 * Q + processing_cost, where alpha is the adverse selection component, gamma is risk aversion, sigma is price volatility, and Q is current inventory."
  why: >
    Ho-Stoll was the first rigorous model connecting spread to inventory risk and is still
    the foundation of how exchanges set minimum tick sizes and how regulators evaluate
    spread fairness. The model proves that spreads must increase with volatility (sigma^2)
    and inventory (Q). In the 2020 GameStop squeeze, market makers who didn't properly
    account for the sigma^2 term lost massively when volatility jumped 10x overnight.
    Ho-Stoll also shows why spreads widen at market close (inventory risk increases with
    overnight holding) and narrow at open (Q resets).
  how_to_do_right: |
    1. Estimate base adverse selection alpha from historical trade data:
       - alpha = average(|midpoint_change_after_trade|) / average(half_spread)
       - Typical: alpha = 0.3-0.6 for equities, 0.2-0.5 for crypto
    2. Estimate sigma from rolling intraday returns:
       - Use 5-minute or 1-minute realized volatility
       - Annualize: sigma_annual = sigma_1min * sqrt(252 * 390)
    3. Set risk aversion gamma:
       - gamma = max_acceptable_loss / (sigma^2 * max_position^2 * holding_period)
    4. Compute optimal half-spread:
       - half_spread = alpha/2 + beta * gamma * sigma^2 * |Q| / 2 + processing/2
    5. Apply asymmetry: bid_spread = half_spread + skew, ask_spread = half_spread - skew
       - skew > 0 when long (widen bid, tighten ask to reduce position)
    6. Floor the spread at exchange minimum tick size
    7. Recalibrate alpha and sigma every 5-15 minutes
  severity: high
  technologies:
    lang: [python]
    framework: [numpy, pandas]
  domains:
    domain: [fintech, trading]
    concern: [domain_specific]
  example_good: |
    import numpy as np

    class HoStollModel:
        """Ho-Stoll (1981) optimal spread determination."""

        def __init__(
            self,
            alpha: float = 0.4,           # adverse selection fraction
            gamma: float = 0.05,          # risk aversion
            processing_cost_bps: float = 1.0,  # fixed costs in bps
            beta: float = 1.0,            # inventory sensitivity
        ):
            self.alpha = alpha
            self.gamma = gamma
            self.processing_bps = processing_cost_bps
            self.beta = beta

        def optimal_spread(
            self,
            mid_price: float,
            sigma: float,       # per-period volatility (e.g., per minute)
            inventory: int,
        ) -> dict:
            """Compute optimal spread given current state."""
            # Adverse selection component (in price units)
            adverse_component = self.alpha * mid_price * 0.001  # scaled by typical spread

            # Inventory risk component
            inventory_component = self.beta * self.gamma * sigma**2 * abs(inventory)

            # Processing cost
            processing_component = mid_price * self.processing_bps / 10_000

            # Total optimal half-spread
            half_spread = adverse_component + inventory_component + processing_component

            # Inventory skew
            skew = 0.5 * self.gamma * sigma**2 * inventory  # negative when long

            bid = mid_price - half_spread + skew
            ask = mid_price + half_spread + skew

            return {
                "bid": round(bid, 4),
                "ask": round(ask, 4),
                "spread_bps": round((ask - bid) / mid_price * 10_000, 2),
                "adverse_pct": round(adverse_component / half_spread * 100, 1),
                "inventory_pct": round(inventory_component / half_spread * 100, 1),
            }

    model = HoStollModel(alpha=0.4, gamma=0.05, processing_cost_bps=1.0)
    result = model.optimal_spread(mid_price=150.0, sigma=0.003, inventory=20)
    print(f"Spread: {result['spread_bps']} bps, Adverse: {result['adverse_pct']}%")
    # Expected: spread widens with inventory, adverse selection ~ 40% of total
  example_bad: |
    # WRONG: Constant spread ignoring volatility regime changes
    def get_spread(price: float) -> float:
        return price * 0.001  # always 10 bps — disaster during vol spikes

    # When sigma jumps from 0.002 to 0.02 (earnings announcement):
    # Correct spread should be ~100x wider (sigma^2 term)
    # But this returns the same 10 bps
    # Loss: informed traders buy at 149.925 knowing fair value is 155.0 after news
  when_applies: "Designing spread-setting algorithms, evaluating market fairness, building market simulators, or calibrating market maker risk parameters."
  sources:
    - "https://en.wikipedia.org/wiki/Market_microstructure"
    - "https://papers.ssrn.com/sol3/papers.cfm?abstract_id=1695596"

- id: FIN-MICRO-004
  text: "Price discovery measures how efficiently new information is incorporated into prices. The Garbade-Silber (1983) model uses error correction to determine which venue leads price discovery, while Hasbrouck's Information Share (IS) measures each venue's contribution to the variance of the efficient price innovation. For N venues, information shares sum to 1.0."
  why: >
    Price discovery is critical for anyone operating across multiple venues (exchanges,
    prediction markets, dark pools). If you route orders to the wrong venue, you pay the
    informed trader's price instead of getting the informational benefit. Empirically,
    NYSE leads price discovery for 60-70% of S&P 500 stocks, while Nasdaq leads for
    tech stocks. In crypto, Binance leads BTC price discovery ~40% of the time, with
    CME futures contributing ~30%. If your execution algorithm doesn't weight venues by
    information share, you'll systematically buy high and sell low.
  how_to_do_right: |
    1. Collect synchronized mid-prices from N venues at fixed intervals (100ms-1s)
    2. Test for cointegration using Johansen test (critical: prices MUST be cointegrated)
    3. Estimate Vector Error Correction Model (VECM):
       - delta_p_t = alpha * (p_t-1 - beta * p_other_t-1) + lagged_deltas + epsilon_t
       - alpha = error correction speed (larger = faster to correct = follower)
    4. Compute Hasbrouck Information Shares:
       - Decompose Cholesky of residual covariance matrix Omega
       - IS_i = (sum of row i elements of Cholesky factor * sigma_i)^2 / total_variance
    5. Compute Gonzalo-Granger Component Shares as robustness check:
       - GG_i = alpha_perp_i / sum(alpha_perp)
    6. Venue with highest IS is the price leader — route passive orders there
    7. Recalibrate daily (IS shifts with time of day and asset)
  severity: high
  technologies:
    lang: [python]
    framework: [numpy, pandas, statsmodels]
  domains:
    domain: [fintech, trading, prediction_markets]
    concern: [domain_specific]
  example_good: |
    import numpy as np
    import pandas as pd
    from statsmodels.tsa.vector_ar.vecm import coint_johansen, VECM

    class PriceDiscovery:
        """Hasbrouck Information Share computation."""

        def __init__(self, freq: str = "1s"):
            self.freq = freq

        def compute_information_shares(self, prices: pd.DataFrame) -> dict:
            """
            prices: DataFrame with columns for each venue, index is timestamp.
            Example: prices.columns = ['binance', 'coinbase', 'kraken']
            """
            # Step 1: Cointegration test
            johansen = coint_johansen(prices, det_order=0, k_ar_diff=2)
            trace_stat = johansen.lr1[0]
            crit_95 = johansen.cvt[0, 1]

            if trace_stat < crit_95:
                raise ValueError(
                    f"Prices not cointegrated (trace={trace_stat:.2f} < crit={crit_95:.2f}). "
                    "Cannot compute information shares."
                )

            # Step 2: Fit VECM
            vecm = VECM(prices, k_ar_diff=2, coint_rank=1)
            result = vecm.fit()

            # Step 3: Compute Information Shares
            # Residual covariance matrix
            omega = np.cov(result.resid.T)

            # Cholesky decomposition
            L = np.linalg.cholesky(omega)

            # Long-run impact matrix (from VMA representation)
            # Simplified: use alpha_perp as proxy
            alpha = result.alpha
            alpha_perp = np.eye(len(prices.columns)) - alpha @ np.linalg.pinv(alpha)

            # Information shares (upper and lower bounds from Cholesky ordering)
            n = len(prices.columns)
            total_var = np.sum(omega)
            info_shares = {}

            for i, venue in enumerate(prices.columns):
                is_value = omega[i, i] / total_var  # simplified diagonal share
                info_shares[venue] = round(is_value, 4)

            # Normalize to sum to 1
            total = sum(info_shares.values())
            info_shares = {k: round(v / total, 4) for k, v in info_shares.items()}

            return {
                "information_shares": info_shares,
                "cointegration_stat": round(trace_stat, 2),
                "price_leader": max(info_shares, key=info_shares.get),
            }

    # Example with 3 crypto venues
    np.random.seed(42)
    n = 1000
    common_shock = np.cumsum(np.random.normal(0, 0.001, n))
    prices = pd.DataFrame({
        "binance":  50000 + common_shock + np.random.normal(0, 0.0003, n).cumsum(),
        "coinbase": 50000 + common_shock + np.random.normal(0, 0.0005, n).cumsum(),
        "kraken":   50000 + common_shock + np.random.normal(0, 0.0006, n).cumsum(),
    })
    pd_model = PriceDiscovery()
    # result = pd_model.compute_information_shares(prices)
    # result["price_leader"] typically "binance" (smallest idiosyncratic noise)
  example_bad: |
    # WRONG: Using simple correlation instead of information shares
    def naive_price_leader(prices: pd.DataFrame) -> str:
        corr = prices.corr()
        # Highest average correlation = leader? NO!
        avg_corr = corr.mean()
        return avg_corr.idxmax()

    # Correlation measures co-movement, NOT causation/leadership.
    # A venue that copies others with 500ms lag has correlation ~0.99 but IS ~ 0.
    # Must use VECM to distinguish leader from follower.
  when_applies: "Building smart order routing, cross-venue arbitrage, or analyzing which prediction market platform leads information discovery."
  sources:
    - "https://en.wikipedia.org/wiki/Market_microstructure"
    - "https://papers.ssrn.com/sol3/papers.cfm?abstract_id=1695596"

- id: FIN-MICRO-005
  text: "Kyle's lambda measures permanent price impact per unit of order flow: delta_p = lambda * signed_volume. Lambda is estimated via regression of price changes on signed volume. Higher lambda means less liquidity and more information asymmetry. Separate permanent impact (lambda) from temporary impact (eta) — permanent shifts the efficient price, temporary reverts."
  why: >
    Kyle's lambda is the single most important metric for execution quality. If lambda = 0.001
    $/share, then buying 10,000 shares permanently moves the price by $10. Ignoring this leads
    to massive slippage costs. Institutional traders lose an estimated 50-100 bps annually
    from underestimating permanent impact. Temporary impact (spread crossing, displacement)
    reverts within minutes, but permanent impact (information leakage) never reverts.
    Vanguard's internal studies show that separating permanent from temporary impact
    reduced their execution costs by 30%.
  how_to_do_right: |
    1. Aggregate trades into time bars (1min, 5min) with signed volume:
       - signed_volume = sum(trade_volume * trade_direction)
       - direction: Lee-Ready algorithm (compare to midpoint)
    2. Regress midpoint changes on signed volume:
       - delta_mid_t = lambda * signed_vol_t + epsilon_t
       - lambda = coefficient from OLS regression
    3. For permanent vs temporary decomposition:
       - Run: delta_mid_t+k = lambda_perm * signed_vol_t + epsilon (k = 5-30 min lag)
       - lambda_temp = lambda_total - lambda_perm
    4. Typical values:
       - Large-cap equity: lambda ~ 0.0001-0.001 $/share per 1000 shares
       - Small-cap: lambda ~ 0.001-0.01
       - Crypto (BTC): lambda ~ 0.00001-0.0001 per 1 BTC
    5. Use lambda to estimate execution cost BEFORE trading:
       - cost = lambda * total_volume * 0.5 (average over execution)
    6. Monitor lambda real-time: spike in lambda = information event, pause trading
  severity: critical
  technologies:
    lang: [python]
    framework: [numpy, pandas, statsmodels]
  domains:
    domain: [fintech, trading]
    concern: [domain_specific]
  example_good: |
    import numpy as np
    import pandas as pd
    from scipy import stats

    class KyleLambda:
        """Kyle's lambda: permanent price impact estimation."""

        def __init__(self, lag_periods: int = 5):
            self.lag_periods = lag_periods

        def estimate(self, trades: pd.DataFrame, bar_freq: str = "1min") -> dict:
            """
            trades: DataFrame with [timestamp, price, volume, direction]
            direction: +1 buyer-initiated, -1 seller-initiated (Lee-Ready)
            """
            trades = trades.set_index("timestamp")

            # Aggregate into time bars
            bars = trades.resample(bar_freq).agg({
                "price": "last",
                "volume": "sum",
                "direction": lambda x: (x * trades.loc[x.index, "volume"]).sum(),
            }).dropna()
            bars.rename(columns={"direction": "signed_volume"}, inplace=True)

            # Midpoint changes
            bars["mid_change"] = bars["price"].diff()
            bars = bars.dropna()

            # Total lambda (contemporaneous)
            slope_total, intercept, r_value, p_value, std_err = stats.linregress(
                bars["signed_volume"], bars["mid_change"]
            )

            # Permanent lambda (lagged impact that persists)
            bars["mid_change_lagged"] = bars["price"].shift(-self.lag_periods) - bars["price"]
            bars_lag = bars.dropna()

            slope_perm, _, _, p_perm, _ = stats.linregress(
                bars_lag["signed_volume"], bars_lag["mid_change_lagged"]
            )

            return {
                "lambda_total": round(slope_total, 8),
                "lambda_permanent": round(max(slope_perm, 0), 8),
                "lambda_temporary": round(slope_total - max(slope_perm, 0), 8),
                "r_squared": round(r_value**2, 4),
                "p_value": round(p_value, 6),
                "estimated_cost_10k_shares": round(slope_total * 10_000 * 0.5, 4),
            }

    # Synthetic example
    np.random.seed(42)
    n = 500
    signed_vol = np.random.normal(0, 1000, n)
    true_lambda = 0.0005
    mid_changes = true_lambda * signed_vol + np.random.normal(0, 0.01, n)

    trades = pd.DataFrame({
        "timestamp": pd.date_range("2024-01-01 09:30", periods=n, freq="1min"),
        "price": 100.0 + np.cumsum(mid_changes),
        "volume": np.abs(signed_vol),
        "direction": np.sign(signed_vol),
    })
    kl = KyleLambda(lag_periods=5)
    result = kl.estimate(trades, bar_freq="1min")
    print(f"Lambda: {result['lambda_total']:.6f}, Cost for 10K shares: ${result['estimated_cost_10k_shares']:.2f}")
  example_bad: |
    # WRONG: Using total volume instead of SIGNED volume
    def bad_impact(trades):
        # unsigned volume tells you nothing about direction!
        slope, _, _, _, _ = stats.linregress(
            trades["volume"],  # UNSIGNED — buys and sells cancel out directional info
            trades["price"].diff().dropna()
        )
        return slope  # This will be ~0, masking real impact

    # Also wrong: not separating permanent from temporary
    # A trader who thinks all impact is temporary will over-trade
    # believing the price will revert — it won't for the permanent component
  when_applies: "Building execution algorithms, measuring trade quality (TCA), estimating pre-trade costs, or calibrating market impact models."
  sources:
    - "https://en.wikipedia.org/wiki/Market_microstructure"
    - "https://papers.ssrn.com/sol3/papers.cfm?abstract_id=1695596"

- id: FIN-MICRO-006
  text: "TWAP (Time-Weighted Average Price) splits a parent order into equal-sized child orders at regular intervals. VWAP (Volume-Weighted Average Price) weights child orders by historical volume profile. TWAP is simpler but ignores volume patterns; VWAP tracks the market's natural rhythm but is predictable and susceptible to gaming."
  why: >
    TWAP and VWAP are the two most common execution benchmarks — together accounting for
    over 60% of institutional algo volume. TWAP works best for orders < 5% of daily volume
    in liquid markets where you want minimal market footprint. VWAP is better when you want
    to match the market's average price (minimizing tracking error). However, VWAP's
    predictability is a known weakness: predatory algorithms detect VWAP patterns and
    front-run the volume spikes. Academic studies show VWAP algos underperform by 2-5 bps
    due to this gaming. The choice between TWAP and VWAP depends on your benchmark and
    the order's information content.
  how_to_do_right: |
    1. TWAP implementation:
       - Divide total_quantity by number of time slices
       - child_qty = total_qty / num_slices
       - Send one child order every (duration / num_slices) seconds
       - Add randomization: +/- 20% on timing and +/- 10% on size to reduce detectability
    2. VWAP implementation:
       - Compute historical volume profile: vol_pct[i] = hist_volume[i] / sum(hist_volume)
       - child_qty[i] = total_qty * vol_pct[i]
       - Use 20-day average volume profile by minute or 5-minute bucket
       - Apply min/max limits: no child > 5% of slice volume
    3. VWAP anti-gaming:
       - Add noise to the profile: vol_pct[i] += uniform(-0.1*vol_pct[i], +0.1*vol_pct[i])
       - Random advance/delay: shift execution by +/- 30 seconds
    4. Both: Use limit orders (not market) with passive-to-aggressive escalation
    5. Both: Monitor participation rate — stay below 10% of real-time volume
    6. Track performance: slippage = (actual_avg_price - benchmark_price) / benchmark_price
  severity: high
  technologies:
    lang: [python]
    framework: [numpy, pandas]
  domains:
    domain: [fintech, trading]
    concern: [domain_specific]
  example_good: |
    import numpy as np
    from dataclasses import dataclass
    from typing import Optional

    @dataclass
    class ChildOrder:
        time_slice: int
        quantity: float
        limit_price: Optional[float] = None

    class TWAPAlgo:
        """Time-Weighted Average Price execution algorithm."""

        def __init__(self, total_qty: float, num_slices: int, randomize: bool = True):
            self.total_qty = total_qty
            self.num_slices = num_slices
            self.randomize = randomize

        def generate_schedule(self) -> list[ChildOrder]:
            base_qty = self.total_qty / self.num_slices
            orders = []
            remaining = self.total_qty

            for i in range(self.num_slices):
                if i == self.num_slices - 1:
                    qty = remaining  # last slice gets remainder
                else:
                    qty = base_qty
                    if self.randomize:
                        qty *= (1 + np.random.uniform(-0.1, 0.1))
                        qty = round(qty)
                remaining -= qty
                orders.append(ChildOrder(time_slice=i, quantity=qty))
            return orders

    class VWAPAlgo:
        """Volume-Weighted Average Price execution algorithm."""

        def __init__(self, total_qty: float, volume_profile: np.ndarray, anti_gaming: bool = True):
            self.total_qty = total_qty
            self.profile = volume_profile / volume_profile.sum()
            self.anti_gaming = anti_gaming

        def generate_schedule(self) -> list[ChildOrder]:
            profile = self.profile.copy()
            if self.anti_gaming:
                noise = np.random.uniform(-0.1, 0.1, len(profile)) * profile
                profile = profile + noise
                profile = np.maximum(profile, 0)
                profile /= profile.sum()

            orders = []
            remaining = self.total_qty
            for i, pct in enumerate(profile):
                if i == len(profile) - 1:
                    qty = remaining
                else:
                    qty = round(self.total_qty * pct)
                remaining -= qty
                orders.append(ChildOrder(time_slice=i, quantity=max(qty, 0)))
            return orders

    # Example: sell 10,000 shares over 60 minutes
    # TWAP
    twap = TWAPAlgo(total_qty=10_000, num_slices=60, randomize=True)
    twap_schedule = twap.generate_schedule()
    print(f"TWAP: {len(twap_schedule)} slices, total = {sum(o.quantity for o in twap_schedule)}")

    # VWAP with U-shaped volume profile (typical equity day)
    minutes = np.arange(60)
    volume_profile = 500 + 300 * np.exp(-0.1 * minutes) + 200 * np.exp(-0.1 * (60 - minutes))
    vwap = VWAPAlgo(total_qty=10_000, volume_profile=volume_profile, anti_gaming=True)
    vwap_schedule = vwap.generate_schedule()
    print(f"VWAP first slice: {vwap_schedule[0].quantity}, mid: {vwap_schedule[30].quantity}")
  example_bad: |
    # WRONG: VWAP without anti-gaming — trivially predictable
    class PredictableVWAP:
        def __init__(self, total_qty, profile):
            self.total_qty = total_qty
            self.profile = profile / profile.sum()  # No randomization

        def generate_schedule(self):
            return [round(self.total_qty * p) for p in self.profile]

    # Predatory HFT algo detects the exact VWAP profile after 5 slices
    # Front-runs each subsequent slice by buying 100ms before
    # Cost to VWAP trader: extra 3-5 bps slippage
  when_applies: "Building order execution systems, implementing algo trading strategies, or benchmarking execution quality against TWAP/VWAP."
  sources:
    - "https://en.wikipedia.org/wiki/Market_microstructure"

- id: FIN-MICRO-007
  text: "The Almgren-Chriss (2000) model finds the optimal execution trajectory that minimizes a linear combination of execution risk (variance of cost) and expected cost (market impact). The optimal trajectory is: x_k = X * sinh(kappa * (T-k*tau)) / sinh(kappa*T), where kappa = sqrt(lambda_risk * sigma^2 / eta), X is total quantity, eta is temporary impact, and lambda_risk is the risk aversion parameter."
  why: >
    Almgren-Chriss is THE standard model for optimal execution at institutional firms. It
    formalizes the trade-off: execute fast (low risk but high impact cost) vs. execute slow
    (low impact but high risk from price drift). The model predicts that risk-averse traders
    should front-load execution (sell more early), while risk-neutral traders should use
    TWAP. Goldman Sachs, Morgan Stanley, and every major broker's algo desk implements
    some variant. Empirical studies show Almgren-Chriss trajectories reduce execution
    costs by 15-40% compared to naive TWAP for large orders (> 10% of daily volume).
    The model also provides the efficient frontier of risk vs. cost, enabling portfolio
    managers to explicitly choose their risk tolerance.
  how_to_do_right: |
    1. Calibrate temporary impact parameter eta:
       - Regression: cost_per_share = eta * (volume / ADV) + epsilon
       - Typical: eta = 0.01-0.1 bps per 1% of ADV
    2. Calibrate permanent impact parameter gamma:
       - gamma = Kyle's lambda * participation_rate
    3. Estimate daily volatility sigma:
       - sigma = daily_return_std * price * sqrt(252)
    4. Set risk aversion lambda_risk:
       - lambda_risk = 0 for risk-neutral (TWAP-like)
       - lambda_risk = 1e-6 to 1e-4 for typical institutional
    5. Compute optimal kappa: kappa = sqrt(lambda_risk * sigma^2 / eta)
    6. Compute trajectory: x_k = X * sinh(kappa*(T-k*tau)) / sinh(kappa*T)
    7. Convert to trade list: trade_k = x_{k-1} - x_k (positive = sell)
    8. Compute expected cost: E[cost] = 0.5 * gamma * X^2 + eta * sum(trade_k^2 / tau)
    9. Compute cost variance: Var[cost] = sigma^2 * sum(x_k^2 * tau)
  severity: critical
  technologies:
    lang: [python]
    framework: [numpy, scipy]
  domains:
    domain: [fintech, trading]
    concern: [domain_specific]
  example_good: |
    import numpy as np
    from dataclasses import dataclass

    @dataclass
    class AlmgrenChrissResult:
        trajectory: np.ndarray       # shares remaining at each time step
        trades: np.ndarray           # shares to trade at each step
        expected_cost: float         # E[total cost] in dollars
        cost_variance: float         # Var[total cost]
        cost_std: float              # StdDev[total cost]

    class AlmgrenChriss:
        """Optimal execution with linear temporary and permanent impact."""

        def __init__(
            self,
            eta: float = 0.05,           # temporary impact ($/share per share/sec)
            gamma: float = 0.01,         # permanent impact ($/share per share)
            sigma: float = 0.30,         # annual volatility (fraction)
            lambda_risk: float = 1e-6,   # risk aversion
        ):
            self.eta = eta
            self.gamma = gamma
            self.sigma_daily = sigma / np.sqrt(252)  # daily vol
            self.lambda_risk = lambda_risk

        def optimal_trajectory(
            self,
            total_shares: float,
            num_periods: int,
            period_seconds: float = 60.0,
        ) -> AlmgrenChrissResult:
            """
            Compute optimal liquidation trajectory.
            total_shares: total position to liquidate (e.g., 50000)
            num_periods: number of trading intervals (e.g., 60 for hourly in 1-min slices)
            period_seconds: length of each interval in seconds
            """
            tau = period_seconds / (6.5 * 3600)  # fraction of trading day
            sigma_per_period = self.sigma_daily * np.sqrt(tau)

            # Kappa determines urgency: high kappa = front-load trades
            if self.lambda_risk > 0 and self.eta > 0:
                kappa = np.arccosh(
                    0.5 * (self.lambda_risk * sigma_per_period**2 / self.eta * tau + 2)
                ) if self.lambda_risk * sigma_per_period**2 * tau / self.eta < 100 else 5.0
            else:
                kappa = 0  # risk-neutral = TWAP

            # Optimal trajectory
            T = num_periods
            trajectory = np.zeros(T + 1)
            trajectory[0] = total_shares

            for k in range(1, T + 1):
                if kappa > 0:
                    trajectory[k] = total_shares * np.sinh(kappa * (T - k)) / np.sinh(kappa * T)
                else:
                    trajectory[k] = total_shares * (1 - k / T)  # TWAP fallback

            trajectory[-1] = 0  # must be fully liquidated

            # Trades per period
            trades = -np.diff(trajectory)  # positive = selling

            # Expected cost
            perm_cost = 0.5 * self.gamma * total_shares**2
            temp_cost = self.eta * np.sum(trades**2 / tau)
            expected_cost = perm_cost + temp_cost

            # Cost variance
            cost_var = self.lambda_risk * sigma_per_period**2 * np.sum(trajectory[1:]**2 * tau)

            return AlmgrenChrissResult(
                trajectory=np.round(trajectory, 0),
                trades=np.round(trades, 0),
                expected_cost=round(expected_cost, 2),
                cost_variance=round(cost_var, 2),
                cost_std=round(np.sqrt(cost_var), 2),
            )

    # Example: liquidate 50,000 shares of AAPL over 60 minutes
    ac = AlmgrenChriss(eta=0.001, gamma=0.0001, sigma=0.25, lambda_risk=1e-5)
    result = ac.optimal_trajectory(total_shares=50_000, num_periods=60, period_seconds=60)
    print(f"Expected cost: ${result.expected_cost:.2f}")
    print(f"Cost std dev: ${result.cost_std:.2f}")
    print(f"First 5 trades: {result.trades[:5]}")
    # Risk-averse: front-loaded, trades[0] > trades[-1]
  example_bad: |
    # WRONG: Naive TWAP for a large order in an illiquid stock
    def naive_liquidate(shares: int, periods: int) -> list:
        return [shares // periods] * periods  # Flat schedule, no impact modeling

    # For 50,000 shares in a stock with ADV=200,000:
    # This is 25% of daily volume — massive permanent impact
    # TWAP: spreads impact evenly but ignores that early trades are cheaper
    # Almgren-Chriss with lambda>0: front-loads to reduce variance
    # Savings: 15-40% of execution cost for orders > 10% ADV
  when_applies: "Executing large institutional orders, designing algo execution strategies, or building any system that needs to minimize the cost of trading large positions."
  sources:
    - "https://en.wikipedia.org/wiki/Market_microstructure"
    - "https://papers.ssrn.com/sol3/papers.cfm?abstract_id=1695596"

- id: FIN-MICRO-008
  text: "VPIN (Volume-Synchronized Probability of Informed Trading) measures order flow toxicity in real time. VPIN = |sum(V_buy) - sum(V_sell)| / total_V, computed over volume buckets (not time buckets). VPIN > 0.7-0.8 signals toxic flow and predicted the Flash Crash of 2010 hours before it happened. The classic PIN model uses MLE on daily buy/sell counts."
  why: >
    VPIN is a real-time toxicity indicator that warns market makers when informed traders
    dominate order flow. Easley, Lopez de Prado, and O'Hara showed VPIN reached 0.9
    two hours before the May 6, 2010 Flash Crash, while traditional metrics showed nothing.
    Market makers who monitored VPIN and pulled quotes early avoided $1B+ in losses.
    The older PIN (Probability of Informed Trading) model requires daily MLE estimation
    and cannot react in real-time. VPIN fixes this by using volume clocks instead of
    time clocks, making it computable tick-by-tick. CME Group adopted VPIN for their
    risk management system in 2012.
  how_to_do_right: |
    1. Choose volume bucket size V_bucket:
       - V_bucket = ADV / 50 (50 buckets per day is standard)
       - For BTC: if ADV = 30,000 BTC, V_bucket = 600 BTC
    2. Classify each trade as buy or sell:
       - Bulk Volume Classification (BVC): classify proportional to price change
       - V_buy = V * Z(delta_p / sigma), V_sell = V - V_buy
       - Z() is the standard normal CDF
    3. Fill volume buckets chronologically (not time-based):
       - When cumulative volume reaches V_bucket, close the bucket
    4. For each bucket: compute |V_buy - V_sell| / V_bucket
    5. VPIN = rolling average of last N buckets (N = 50 typical)
    6. Thresholds:
       - VPIN < 0.3: safe, normal two-sided flow
       - VPIN 0.3-0.6: elevated, consider widening spreads
       - VPIN > 0.6: toxic, widen spreads significantly or pull quotes
       - VPIN > 0.8: danger, consider pulling all quotes
    7. Update VPIN every time a new volume bucket completes
  severity: critical
  technologies:
    lang: [python]
    framework: [numpy, pandas, scipy]
  domains:
    domain: [fintech, trading, prediction_markets]
    concern: [domain_specific]
  example_good: |
    import numpy as np
    import pandas as pd
    from scipy.stats import norm

    class VPIN:
        """Volume-Synchronized Probability of Informed Trading."""

        def __init__(self, bucket_volume: float, n_buckets: int = 50):
            self.bucket_volume = bucket_volume
            self.n_buckets = n_buckets
            self.buckets: list[dict] = []
            self._current_buy = 0.0
            self._current_sell = 0.0
            self._current_vol = 0.0

        def _classify_bvc(self, volume: float, price_change: float, sigma: float) -> tuple:
            """Bulk Volume Classification."""
            z = price_change / sigma if sigma > 0 else 0
            buy_pct = norm.cdf(z)
            v_buy = volume * buy_pct
            v_sell = volume * (1 - buy_pct)
            return v_buy, v_sell

        def update(self, volume: float, price_change: float, sigma: float) -> float | None:
            """
            Process a new trade. Returns VPIN if a new bucket completed, else None.
            volume: trade volume
            price_change: price change since last trade
            sigma: recent price volatility (e.g., 1-min realized vol)
            """
            v_buy, v_sell = self._classify_bvc(volume, price_change, sigma)
            self._current_buy += v_buy
            self._current_sell += v_sell
            self._current_vol += volume

            if self._current_vol >= self.bucket_volume:
                self.buckets.append({
                    "v_buy": self._current_buy,
                    "v_sell": self._current_sell,
                    "imbalance": abs(self._current_buy - self._current_sell),
                })
                self._current_buy = 0.0
                self._current_sell = 0.0
                self._current_vol = 0.0

                if len(self.buckets) >= self.n_buckets:
                    recent = self.buckets[-self.n_buckets:]
                    total_imbalance = sum(b["imbalance"] for b in recent)
                    total_volume = self.n_buckets * self.bucket_volume
                    return round(total_imbalance / total_volume, 4)
            return None

    # Simulation: normal market, then toxic flow
    np.random.seed(42)
    vpin = VPIN(bucket_volume=100, n_buckets=20)

    # Normal trading: balanced flow
    for _ in range(2000):
        vol = np.random.exponential(5)
        dp = np.random.normal(0, 0.01)
        result = vpin.update(vol, dp, sigma=0.01)

    print(f"Normal VPIN: {result}")  # ~ 0.2-0.4

    # Toxic flow: informed buying
    for _ in range(500):
        vol = np.random.exponential(8)
        dp = abs(np.random.normal(0.005, 0.005))  # biased positive
        result = vpin.update(vol, dp, sigma=0.01)

    print(f"Toxic VPIN: {result}")  # ~ 0.6-0.9
  example_bad: |
    # WRONG: Using time-based buckets instead of volume-based
    def bad_vpin(trades, time_window="5min"):
        bars = trades.resample(time_window).agg({"volume": "sum", "direction": "sum"})
        # Time-based bars have VARIABLE volume — low-volume periods dominate VPIN
        # During lunch hour (low volume), a single large buy looks like 100% toxic flow
        # Volume buckets normalize this: every bucket has the same volume
        return abs(bars["direction"]).rolling(20).mean() / bars["volume"].rolling(20).mean()
  when_applies: "Real-time toxicity monitoring, market maker risk management, Flash Crash early warning, or evaluating order flow quality in prediction markets."
  sources:
    - "https://en.wikipedia.org/wiki/Market_microstructure"
    - "https://papers.ssrn.com/sol3/papers.cfm?abstract_id=1695596"

- id: FIN-MICRO-009
  text: "Market impact follows different functional forms depending on order size. Linear impact: delta_p = lambda * Q. Square-root impact (Barra model): delta_p = sigma * sqrt(Q/V). Concave impact (Almgren 2005): delta_p = eta * (Q/V)^alpha where alpha ~ 0.5-0.7. The square-root law is the most robust empirical finding in market microstructure — validated across equities, futures, FX, and crypto."
  why: >
    The functional form of market impact determines how you should split large orders.
    If impact is linear, splitting doesn't help (total cost is the same). But empirical
    evidence overwhelmingly shows impact is concave (alpha < 1): a 4x larger order has
    only 2x the impact (sqrt). This means splitting orders ALWAYS reduces cost when
    impact is concave. The square-root law was first documented by Barra (1997) and
    confirmed by Torre (1997), Almgren et al. (2005), and Toth et al. (2011) across
    40+ markets. Using linear impact models overestimates cost for large orders by 2-5x,
    leading to overly conservative execution and missed alpha.
  how_to_do_right: |
    1. Estimate impact exponent alpha:
       - Regress: log(|delta_p|/sigma) = alpha * log(Q/V) + constant
       - Typical result: alpha = 0.4-0.7, consensus ~ 0.5 (square root)
    2. Estimate scale parameter eta:
       - eta = median(|delta_p| / (sigma * (Q/V)^alpha))
       - Typical: eta = 0.1-0.5 for equities, 0.5-2.0 for small-cap/crypto
    3. Impact model: delta_p = eta * sigma_daily * (Q / ADV)^alpha
       - sigma_daily = daily volatility (fraction, e.g., 0.02 for 2%)
       - Q = shares traded, ADV = average daily volume
    4. Separate temporary from permanent:
       - Temporary: reverts in 10-30 minutes, use for cost estimation
       - Permanent: does not revert, use for alpha decay estimation
    5. For prediction markets with thin books:
       - Alpha may be closer to 0.8-1.0 (nearly linear) due to low participation
       - Recalibrate with market-specific data, don't use equity values
    6. Validate with out-of-sample testing before production use
  severity: high
  technologies:
    lang: [python]
    framework: [numpy, scipy, pandas]
  domains:
    domain: [fintech, trading, prediction_markets]
    concern: [domain_specific]
  example_good: |
    import numpy as np
    from scipy.optimize import curve_fit

    class MarketImpactModel:
        """Concave market impact with calibration."""

        def __init__(self, alpha: float = 0.5, eta: float = 0.3):
            self.alpha = alpha
            self.eta = eta

        def predict_impact(self, sigma_daily: float, quantity: float, adv: float) -> float:
            """Predict price impact in basis points."""
            participation = quantity / adv
            impact = self.eta * sigma_daily * participation**self.alpha
            return round(impact * 10_000, 2)  # in bps

        @classmethod
        def calibrate(cls, observations: list[dict]) -> "MarketImpactModel":
            """
            Calibrate from historical executions.
            observations: list of {quantity, adv, sigma, impact_bps}
            """
            x_data = np.array([(o["quantity"] / o["adv"]) for o in observations])
            y_data = np.array([o["impact_bps"] / 10_000 / o["sigma"] for o in observations])

            def model(x, eta, alpha):
                return eta * x**alpha

            popt, pcov = curve_fit(model, x_data, y_data, p0=[0.3, 0.5], bounds=([0, 0], [5, 1.5]))

            return cls(alpha=round(popt[1], 3), eta=round(popt[0], 3))

    # Example: calibrate from 5 historical trades
    historical = [
        {"quantity": 1_000,  "adv": 1_000_000, "sigma": 0.02, "impact_bps": 0.5},
        {"quantity": 5_000,  "adv": 1_000_000, "sigma": 0.02, "impact_bps": 1.1},
        {"quantity": 10_000, "adv": 1_000_000, "sigma": 0.02, "impact_bps": 1.5},
        {"quantity": 50_000, "adv": 1_000_000, "sigma": 0.02, "impact_bps": 3.2},
        {"quantity": 100_000,"adv": 1_000_000, "sigma": 0.02, "impact_bps": 4.5},
    ]
    model = MarketImpactModel.calibrate(historical)
    print(f"Calibrated: alpha={model.alpha}, eta={model.eta}")
    # alpha ~ 0.5 confirms square-root law

    # Predict impact for a new order
    impact = model.predict_impact(sigma_daily=0.02, quantity=25_000, adv=1_000_000)
    print(f"Predicted impact: {impact} bps")
  example_bad: |
    # WRONG: Assuming linear impact — massively overestimates large order costs
    def linear_impact(quantity, adv, lambda_param=0.001):
        return lambda_param * quantity / adv * 10_000  # bps

    # For Q=100K, ADV=1M: linear predicts 100 bps
    # Square-root model predicts: 0.3 * 0.02 * (0.1)^0.5 * 10000 = 19 bps
    # Linear is 5x too pessimistic — portfolio manager gives up on the trade
    # losing alpha that would have more than covered the 19 bps cost
  when_applies: "Pre-trade cost estimation, optimal execution planning, transaction cost analysis (TCA), or calibrating execution algorithms."
  sources:
    - "https://arxiv.org/abs/0812.0530"
    - "https://en.wikipedia.org/wiki/Market_microstructure"

- id: FIN-MICRO-010
  text: "Limit order book (LOB) dynamics are governed by queue position, cancellation rates, and fill probability. A limit order's fill probability decreases exponentially with distance from best price: P(fill) ~ exp(-alpha * ticks_from_best). Queue position within a price level matters: orders at position k in a queue of N have fill probability ~ (N-k)/N for the next trade at that level."
  why: >
    Understanding LOB dynamics is essential for any execution strategy using limit orders.
    A naive approach that places orders at the best bid/ask ignores that queue position
    determines whether you actually get filled. In liquid markets (SPY, BTC), the queue
    at the best bid can be 10,000+ shares — your 100-share order at position 9,500 has
    near-zero fill probability before the price moves. Empirical studies show that 50-70%
    of limit orders are cancelled before fill (Cont & Stoikov 2010). The optimal strategy
    often involves placing orders 1-3 ticks behind best to get better queue position on
    the next level. Understanding fill probability vs. price improvement is the core
    trade-off of limit order placement.
  how_to_do_right: |
    1. Model fill probability per tick level:
       - P(fill at tick k) = P(price reaches tick k) * P(filled given price reaches k)
       - P(price reaches k) ~ exp(-alpha * k) where alpha calibrated from data
       - P(filled | price reaches k) = min(1, volume_at_k / queue_ahead_of_us)
    2. Track queue position:
       - New order: position = current_queue_size + 1
       - Track cancellations ahead of you (reduce your position)
       - Track fills ahead of you (reduce your position)
    3. Compute expected cost per tick level:
       - E[cost at tick k] = P(fill) * (mid - price_at_k) + (1-P(fill)) * market_order_cost
    4. Optimal tick level = argmin(E[cost])
    5. Cancel-and-replace if queue position deteriorates:
       - If position / total_queue > 0.8, consider moving to next level
    6. Monitor cancellation rate:
       - If cancel_rate > 0.7 at your level, the level may be phantom liquidity
    7. Use Level 3 data (individual order IDs) if available for precise queue tracking
  severity: high
  technologies:
    lang: [python]
    framework: [numpy, pandas]
  domains:
    domain: [fintech, trading]
    concern: [domain_specific]
  example_good: |
    import numpy as np
    from dataclasses import dataclass

    @dataclass
    class LOBLevel:
        price: float
        total_quantity: float
        num_orders: int
        cancel_rate: float  # fraction of orders cancelled per minute

    class LimitOrderOptimizer:
        """Optimal limit order placement using fill probability model."""

        def __init__(self, fill_decay: float = 0.5, market_cross_cost_bps: float = 5.0):
            self.fill_decay = fill_decay  # alpha: fill prob decay per tick
            self.market_cost_bps = market_cross_cost_bps

        def optimal_placement(
            self,
            mid_price: float,
            tick_size: float,
            book_levels: list[LOBLevel],
            order_quantity: float,
            side: str = "buy",
        ) -> dict:
            """Find optimal tick level for a limit order."""
            results = []

            for i, level in enumerate(book_levels):
                ticks_from_best = i
                price = level.price

                # Fill probability decays with distance from mid
                p_reach = np.exp(-self.fill_decay * ticks_from_best)

                # Queue position: we'd be at the back
                queue_position = level.total_quantity
                if level.total_quantity > 0:
                    p_fill_given_reach = min(1.0, order_quantity / (queue_position + order_quantity))
                else:
                    p_fill_given_reach = 1.0

                # Adjust for cancellations (cancels ahead of us improve our position)
                p_fill_adjusted = p_reach * (p_fill_given_reach + level.cancel_rate * (1 - p_fill_given_reach))

                # Price improvement (in bps)
                if side == "buy":
                    improvement_bps = (mid_price - price) / mid_price * 10_000
                else:
                    improvement_bps = (price - mid_price) / mid_price * 10_000

                # Expected cost: weighted by fill probability
                e_cost = (p_fill_adjusted * (-improvement_bps) +
                          (1 - p_fill_adjusted) * self.market_cost_bps)

                results.append({
                    "tick_level": i,
                    "price": price,
                    "p_fill": round(p_fill_adjusted, 4),
                    "improvement_bps": round(improvement_bps, 2),
                    "expected_cost_bps": round(e_cost, 2),
                })

            # Find optimal level (minimum expected cost)
            optimal = min(results, key=lambda x: x["expected_cost_bps"])

            return {
                "optimal_level": optimal,
                "all_levels": results,
            }

    # Example: buy order in SPY
    book = [
        LOBLevel(price=450.01, total_quantity=5000, num_orders=50, cancel_rate=0.6),
        LOBLevel(price=450.00, total_quantity=3000, num_orders=30, cancel_rate=0.5),
        LOBLevel(price=449.99, total_quantity=1500, num_orders=15, cancel_rate=0.4),
        LOBLevel(price=449.98, total_quantity=800,  num_orders=8,  cancel_rate=0.3),
        LOBLevel(price=449.97, total_quantity=400,  num_orders=4,  cancel_rate=0.2),
    ]
    optimizer = LimitOrderOptimizer(fill_decay=0.5, market_cross_cost_bps=3.0)
    result = optimizer.optimal_placement(mid_price=450.015, tick_size=0.01,
                                          book_levels=book, order_quantity=100, side="buy")
    opt = result["optimal_level"]
    print(f"Optimal: tick {opt['tick_level']} at ${opt['price']}, P(fill)={opt['p_fill']}")
  example_bad: |
