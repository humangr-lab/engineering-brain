- id: FIN-MICRO-011
  text: "Flash crashes are extreme, rapid price dislocations (> 5% in < 5 minutes) caused by feedback loops between algorithmic trading, liquidity withdrawal, and stop-loss cascades. Circuit breakers (LULD bands, market-wide halts) are the primary defense. Kirilenko et al. (2017) showed the Flash Crash of 2010 was amplified by HFTs rapidly cycling inventory rather than providing genuine liquidity."
  why: >
    Flash crashes are existential risks for any automated trading system. The May 6, 2010
    Flash Crash erased $1 trillion in market value in 20 minutes. The Aug 24, 2015 crash
    saw ETFs trade 30-40% below NAV. If your system doesn't detect flash crashes and halt,
    it will execute at absurd prices. Key insight from Kirilenko: HFT firms did not cause
    the crash but amplified it by competing for the same exit, passing toxic inventory in
    a "hot potato" game. For prediction markets, flash crashes are especially dangerous
    because thin liquidity means even small orders can move prices 50%+ in seconds.
  how_to_do_right: |
    1. Implement price-based circuit breakers:
       - Per-instrument: halt if |price_change| > 5% in 5 minutes (LULD-style)
       - Market-wide: halt if broad index drops > 7% from open (Level 1), 13% (Level 2), 20% (Level 3)
    2. Implement volume-based circuit breakers:
       - Halt if volume > 10x rolling average in 1 minute
    3. Implement spread-based detection:
       - Alert if spread > 5x rolling average
    4. During flash crash detection:
       - Cancel all resting orders immediately
       - Do NOT send market orders (will fill at absurd prices)
       - Log all data for post-mortem analysis
    5. Recovery protocol:
       - Wait for circuit breaker to expire
       - Verify prices are within 2% of pre-crash level
       - Resume with 50% of normal position limits for 15 minutes
    6. For prediction markets:
       - Implement absolute price bounds (probability never > 0.99 or < 0.01)
       - Rate-limit single-user trading to prevent single-actor crashes
  severity: critical
  technologies:
    lang: [python]
    framework: [numpy, pandas]
  domains:
    domain: [fintech, trading, prediction_markets]
    concern: [domain_specific]
  example_good: |
    import time
    from collections import deque
    from dataclasses import dataclass, field

    @dataclass
    class CircuitBreakerState:
        triggered: bool = False
        trigger_time: float = 0.0
        trigger_reason: str = ""
        cooldown_seconds: float = 300.0  # 5-minute halt

    class FlashCrashDetector:
        """Multi-signal flash crash detection with circuit breakers."""

        def __init__(
            self,
            price_threshold_pct: float = 5.0,    # 5% price move
            price_window_sec: float = 300.0,       # in 5 minutes
            volume_multiplier: float = 10.0,       # 10x normal volume
            spread_multiplier: float = 5.0,        # 5x normal spread
        ):
            self.price_threshold = price_threshold_pct / 100
            self.price_window = price_window_sec
            self.vol_mult = volume_multiplier
            self.spread_mult = spread_multiplier
            self.price_history: deque = deque(maxlen=10000)
            self.volume_history: deque = deque(maxlen=1000)
            self.spread_history: deque = deque(maxlen=1000)
            self.state = CircuitBreakerState()

        def check(self, price: float, volume: float, spread: float, timestamp: float) -> CircuitBreakerState:
            """Check all flash crash signals. Returns circuit breaker state."""
            if self.state.triggered:
                if timestamp - self.state.trigger_time > self.state.cooldown_seconds:
                    self.state = CircuitBreakerState()  # reset
                return self.state

            self.price_history.append((timestamp, price))
            self.volume_history.append(volume)
            self.spread_history.append(spread)

            # Signal 1: Price dislocation
            window_start = timestamp - self.price_window
            old_prices = [p for t, p in self.price_history if t <= window_start]
            if old_prices:
                ref_price = old_prices[-1]
                price_change = abs(price - ref_price) / ref_price
                if price_change > self.price_threshold:
                    self.state = CircuitBreakerState(
                        triggered=True, trigger_time=timestamp,
                        trigger_reason=f"Price moved {price_change*100:.1f}% in {self.price_window}s"
                    )
                    return self.state

            # Signal 2: Volume spike
            if len(self.volume_history) > 100:
                avg_vol = sum(list(self.volume_history)[-100:-1]) / 99
                if avg_vol > 0 and volume > avg_vol * self.vol_mult:
                    self.state = CircuitBreakerState(
                        triggered=True, trigger_time=timestamp,
                        trigger_reason=f"Volume spike: {volume:.0f} vs avg {avg_vol:.0f}"
                    )
                    return self.state

            # Signal 3: Spread blowout
            if len(self.spread_history) > 100:
                avg_spread = sum(list(self.spread_history)[-100:-1]) / 99
                if avg_spread > 0 and spread > avg_spread * self.spread_mult:
                    self.state = CircuitBreakerState(
                        triggered=True, trigger_time=timestamp,
                        trigger_reason=f"Spread blowout: {spread:.4f} vs avg {avg_spread:.4f}"
                    )
                    return self.state

            return self.state

    # Example: detect flash crash
    detector = FlashCrashDetector(price_threshold_pct=5.0, price_window_sec=60)
    base_time = time.time()

    # Normal trading
    for i in range(100):
        state = detector.check(price=100.0 + 0.01 * i, volume=100, spread=0.02, timestamp=base_time + i)

    # Flash crash: price drops 8% in 10 seconds
    for i in range(10):
        state = detector.check(price=100.0 - 0.8 * i, volume=5000, spread=0.50, timestamp=base_time + 100 + i)
        if state.triggered:
            print(f"CIRCUIT BREAKER: {state.trigger_reason}")
            break
  example_bad: |
