  sources:
    - "https://en.wikipedia.org/wiki/Market_microstructure"
    - "https://papers.ssrn.com/sol3/papers.cfm?abstract_id=1695596"

- id: FIN-MICRO-012
  text: "High-frequency trading (HFT) strategies exploit microsecond-level speed advantages. Latency arbitrage captures stale quotes across venues (co-location reduces latency from ~1ms to ~1us). Maker-taker fee models pay rebates for passive (limit) orders and charge fees for aggressive (market) orders, creating incentives for HFT liquidity provision."
  why: >
    Understanding HFT is essential for anyone building trading systems because HFTs are
    your counterparties. HFTs provide ~50% of equity volume in the US and dominate the
    best bid/ask. If your system doesn't account for HFT behavior, you will experience
    adverse selection: HFTs snipe your stale quotes and you'll only fill when it's bad
    for you. The maker-taker model (NYSE: -0.20 cents/share rebate for making, +0.30
    cents/share fee for taking) means HFTs earn money by providing liquidity. For
    non-HFT systems: use IOC orders to avoid being picked off, route to venues with
    inverted fees (taker-maker) if you're primarily passive, and never use resting
    orders wider than 1-2 ticks from NBBO.
  how_to_do_right: |
    1. Protect against latency arbitrage:
       - Cancel stale quotes within 10ms of NBBO change (sub-ms if co-located)
       - Use "speed bumps" if operating an exchange (IEX model: 350us delay)
       - Never rest orders more than 2 ticks from current NBBO
    2. Understand maker-taker economics:
       - Maker (passive): earn rebate (-$0.0020/share on NYSE)
       - Taker (aggressive): pay fee (+$0.0030/share on NYSE)
       - Net: HFTs earn $0.0020/share providing liquidity
    3. Route orders intelligently:
       - If your strategy is primarily passive: route to venues with highest maker rebate
       - If primarily aggressive: route to inverted venues (BX, EDGA) for lowest taker fee
       - Use Smart Order Routing (SOR) that considers fees
    4. Detect HFT front-running:
       - Monitor fill rate: if fills only happen when price moves against you, you're being adversely selected
       - Track post-fill price movement: if price moves 2+ ticks against you within 100ms of fill, HFTs are sniping you
    5. For prediction markets:
       - HFT is less prevalent but growing (Polymarket saw latency competition in 2024)
       - Implement batch auctions (FBA) to neutralize speed advantages
  severity: high
  technologies:
    lang: [python]
    framework: [numpy, pandas]
  domains:
    domain: [fintech, trading]
    concern: [domain_specific]
  example_good: |
    from dataclasses import dataclass
    from collections import deque
    import time

    @dataclass
    class QuoteProtection:
        """Protect resting quotes from latency arbitrage."""
        max_stale_ms: float = 10.0        # cancel if NBBO changed > 10ms ago
        max_ticks_from_nbbo: int = 2      # never rest > 2 ticks away
        adverse_selection_threshold: float = 0.6  # 60% of fills move against us

    class AntiSniping:
        """Detect and mitigate HFT adverse selection."""

        def __init__(self, config: QuoteProtection = QuoteProtection()):
            self.config = config
            self.fills: deque = deque(maxlen=1000)
            self.nbbo_last_update: float = 0.0
            self.current_nbbo: tuple = (0.0, 0.0)

        def update_nbbo(self, bid: float, ask: float, timestamp_ms: float):
            self.current_nbbo = (bid, ask)
            self.nbbo_last_update = timestamp_ms

        def should_cancel_quote(self, our_bid: float, our_ask: float, now_ms: float) -> dict:
            """Check if our quotes should be cancelled."""
            reasons = []
            bid, ask = self.current_nbbo
            tick_size = 0.01

            # Check staleness
            staleness_ms = now_ms - self.nbbo_last_update
            if staleness_ms > self.config.max_stale_ms:
                reasons.append(f"NBBO stale by {staleness_ms:.1f}ms")

            # Check distance from NBBO
            bid_ticks = round((bid - our_bid) / tick_size)
            ask_ticks = round((our_ask - ask) / tick_size)
            if bid_ticks > self.config.max_ticks_from_nbbo:
                reasons.append(f"Bid {bid_ticks} ticks from NBBO")
            if ask_ticks > self.config.max_ticks_from_nbbo:
                reasons.append(f"Ask {ask_ticks} ticks from NBBO")

            return {"cancel": len(reasons) > 0, "reasons": reasons}

        def record_fill(self, fill_price: float, side: str, mid_price_after_100ms: float):
            """Record fill and post-fill mid price for adverse selection analysis."""
            if side == "buy":
                adverse = mid_price_after_100ms < fill_price
            else:
                adverse = mid_price_after_100ms > fill_price
            self.fills.append({"adverse": adverse, "slippage": abs(mid_price_after_100ms - fill_price)})

        def adverse_selection_rate(self) -> float:
            if not self.fills:
                return 0.0
            return sum(1 for f in self.fills if f["adverse"]) / len(self.fills)

    # Usage
    protector = AntiSniping(QuoteProtection(max_stale_ms=5.0, max_ticks_from_nbbo=2))
    protector.update_nbbo(bid=100.00, ask=100.02, timestamp_ms=1000.0)

    # Our quotes
    result = protector.should_cancel_quote(our_bid=99.98, our_ask=100.04, now_ms=1012.0)
    print(f"Cancel: {result['cancel']}, Reasons: {result['reasons']}")
    # Cancel: True, Reasons: ['NBBO stale by 12.0ms', 'Bid 2 ticks from NBBO']
  example_bad: |
