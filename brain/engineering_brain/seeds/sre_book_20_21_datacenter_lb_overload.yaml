layer: rules
technology: SRE
domain: load_balancing
knowledge:
- id: CR-SRE-DCLB-001
  text: Round-robin load balancing is almost always wrong for backend services. It ignores server health, capacity differences, and request cost. Use least-loaded or weighted algorithms that account for
    real-time server state.
  why: 'Google''s Chapter 20 explains why simple round-robin fails at scale. In theory, round-robin distributes requests evenly. In practice, servers differ: some are newer (faster CPUs), some are running
    background tasks (less available capacity), some have warm caches (faster for certain requests), and some are about to be drained for maintenance. Round-robin sends equal traffic to all, overloading
    slow servers while underutilizing fast ones. Google''s backend load balancing uses "least loaded" algorithms that consider current server utilization, pending request count, and recent error rates.
    The improvement is dramatic: least-loaded routing reduced P99 latency by 30-50% compared to round-robin in Google''s production measurements, because it stopped sending requests to servers that were
    already struggling.

    '
  how_to_do_right: '1. Use weighted round-robin at minimum — assign weights based on server capacity (CPU, memory, instance type).

    2. Better: use least-connections or least-loaded algorithms that consider real-time server state.

    3. Best: use a "power of two choices" algorithm — pick 2 random backends, send the request to the less loaded one. Near-optimal with minimal overhead.

    4. Include error rate in load balancing decisions: a server returning 50% errors should receive less traffic, not equal traffic.

    5. Support "subsetting" — each client connects to a subset of backends, not all backends. This reduces connection overhead at scale.

    6. Test load balancing under failure: when one backend dies, does traffic distribute cleanly to survivors or does it cascade?

    '
  example_good: "# Least-loaded backend selection with power-of-two-choices\nimport random\n\nclass SmartLoadBalancer:\n    def select_backend(self, backends: list[Backend]) -> Backend:\n        \"\"\"Power of two choices: near-optimal with minimal overhead.\"\"\"\n        healthy = [b for b in backends if b.is_healthy]\n        if len(healthy) < 2:\n            return healthy[0] if healthy else None\n        # Pick 2 random backends, choose the less loaded one\n        a, b = random.sample(healthy, 2)\n        if a.pending_requests <= b.pending_requests:\n            return a\n        return b\n\n    def should_include(self, backend: Backend) -> bool:\n        \"\"\"Include error rate in LB decisions.\"\"\"\n        if backend.error_rate > 0.50:\n            return False  # 50%+ errors → remove from pool\n        return True\n"
  example_bad: "# Simple round-robin ignoring server state\nclass RoundRobinLB:\n    def __init__(self, backends):\n        self.backends = backends\n        self.index = 0\n\n    def select_backend(self):\n        backend = self.backends[self.index % len(self.backends)]\n        self.index += 1\n        return backend\n        # Ignores: server health, capacity, load, error rate\n        # Sends equal traffic to a server with 95% CPU and one with 10% CPU\n        # P99 latency dominated by the slowest server\n"
  when_applies: When implementing backend load balancing for services where servers have different capacities, utilization levels, or health states that make round-robin distribution suboptimal.
  severity: high
  technologies:
    platform: [kubernetes, grpc, load_balancer]
  domains:
    domain: [architecture, performance, reliability]
    concern: [distributed_systems, scaling, horizontal]
  sources:
  - url: https://sre.google/sre-book/load-balancing-datacenter/
    title: 'Google SRE Book — Chapter 20: Load Balancing in the Datacenter'
  validation_status: cross_checked
- id: CR-SRE-DCLB-002
  text: Implement flow control between services — every client should track the health of each backend independently and avoid sending requests to backends that are failing. Client-side health tracking
    (not just load balancer health checks) catches failures faster.
  why: 'Google''s backend load balancing includes client-side health tracking because centralized health checks have a fundamental latency problem. A load balancer health check runs every 10 seconds. If
    a backend fails immediately after a health check, the load balancer won''t notice for 10 seconds — during which it sends hundreds of requests to a dead server. Client-side tracking is faster: each client
    observes the responses from each backend and independently detects failures within 1-2 requests. Google''s client libraries track per-backend error rates, latency, and pending request counts. When a
    backend''s metrics degrade, the client reduces traffic to that backend before the centralized health check even notices. This creates a two-layer defense: fast client-side detection plus authoritative
    load-balancer-side health checks.

    '
  how_to_do_right: '1. Client libraries should track per-backend: success rate, P99 latency, pending request count.

    2. When a backend''s error rate exceeds a threshold (e.g., > 50%), the client should stop sending new requests to it.

    3. Use circuit breaker pattern: after N consecutive failures, mark the backend as "open" (no traffic) for a cooldown period.

    4. Implement slow-start: when a backend recovers, send a trickle of traffic first, then gradually increase — don''t hammer it with full load immediately.

    5. Client-side tracking should be automatic (in the RPC framework), not manual. Engineers should not need to implement this per-service.

    6. Log circuit breaker events for debugging: "Backend X circuit opened at 12:34 due to 5 consecutive timeouts."

    '
  example_good: "# Client-side health tracking with circuit breaker\nclass ClientSideHealthTracker:\n    def __init__(self, backends: list[str]):\n        self.stats = {b: BackendStats() for b in backends}\n\n    def record_response(self, backend: str, latency_ms: float, success: bool):\n        stats = self.stats[backend]\n        stats.record(latency_ms, success)\n        if stats.error_rate > 0.50:\n            stats.circuit_state = \"OPEN\"  # Stop sending traffic\n            log.warning(f\"Circuit OPEN for {backend}: error_rate={stats.error_rate:.0%}\")\n\n    def select_backend(self) -> str:\n        healthy = [b for b, s in self.stats.items() if s.circuit_state != \"OPEN\"]\n        if not healthy:\n            # All circuits open — try half-open on least-bad backend\n            return min(self.stats, key=lambda b: self.stats[b].error_rate)\n        return min(healthy, key=lambda b: self.stats[b].pending_requests)\n\n    def try_half_open(self, backend: str):\n        \"\"\"After cooldown, send 1 request to check recovery.\"\"\"\n        self.stats[backend].circuit_state = \"HALF_OPEN\"\n"
  example_bad: "# No client-side health tracking — rely only on LB health checks\ndef call_backend(request):\n    backend = load_balancer.get_backend()  # LB checks every 10 seconds\n    response = http.post(backend, request)\n    # If backend failed right after LB health check:\n    # LB won't notice for 10 seconds\n    # Hundreds of requests sent to dead backend\n    # No circuit breaker, no per-backend tracking\n    return response\n"
  when_applies: When building client libraries or service meshes that need to detect backend failures faster than centralized load balancer health checks can provide.
  severity: high
  technologies:
    platform: [kubernetes, grpc, load_balancer, istio]
  domains:
    domain: [architecture, performance, reliability]
    concern: [distributed_systems, scaling, horizontal]
  sources:
  - url: https://sre.google/sre-book/load-balancing-datacenter/
    title: 'Google SRE Book — Chapter 20: Load Balancing in the Datacenter'
  validation_status: cross_checked
- id: CR-SRE-OVER-001
  text: When overloaded, return errors FAST rather than serving requests SLOWLY. A server that queues requests during overload consumes resources holding those requests in memory and eventually returns
    them late — when the client has already timed out and retried, doubling the load.
  why: 'Google''s Chapter 21 (Handling Overload) contains one of the most counterintuitive but critical principles in distributed systems. When a server is overloaded, the natural instinct is to accept
    all requests and process them as fast as possible. But this causes a catastrophic feedback loop: requests queue up, latency increases, clients time out, clients retry, the server now has 2x the load
    (original + retries), latency increases further, more timeouts, more retries, and the server collapses. The correct behavior is the opposite: when overloaded, REJECT excess requests immediately with
    an error (HTTP 503, gRPC RESOURCE_EXHAUSTED). The client receives a fast error, backs off, and the server maintains acceptable latency for the requests it does serve. A server at 80% capacity serving
    all requests with 100ms latency is far better than a server at 100% capacity where every request takes 10 seconds and 90% time out anyway.

    '
  how_to_do_right: '1. Set a maximum concurrent request limit per server. When reached, immediately return 503/RESOURCE_EXHAUSTED for new requests.

    2. Set a maximum queue depth. Requests waiting longer than the client''s timeout should be dropped — they will be retried anyway.

    3. Use admission control: when CPU > 80%, start rejecting low-priority requests while continuing to serve high-priority ones.

    4. Return errors with Retry-After header telling clients how long to wait before retrying.

    5. Monitor rejection rate as a key metric. If > 10%, you need more capacity, not better overload handling.

    6. Never buffer requests that will exceed the client''s timeout. The client will retry, and you''ll process the original AND the retry.

    '
  example_good: "# Fast rejection under overload — maintain latency for served requests\nfrom fastapi import FastAPI, HTTPException\nimport asyncio\n\napp = FastAPI()\nMAX_CONCURRENT = 100\nsemaphore = asyncio.Semaphore(MAX_CONCURRENT)\n\n@app.middleware(\"http\")\nasync def admission_control(request, call_next):\n    acquired = semaphore._value > 0  # Check without blocking\n    if not acquired:\n        # FAST rejection — don't queue, don't wait\n        raise HTTPException(\n            status_code=503,\n            detail=\"Server overloaded\",\n            headers={\"Retry-After\": \"5\"},\n        )\n    async with semaphore:\n        response = await call_next(request)\n        return response\n"
  example_bad: "# Accept all requests under overload — queue indefinitely\nfrom fastapi import FastAPI\n\napp = FastAPI()\n\n@app.post(\"/api/process\")\nasync def process(request):\n    # No admission control — accept everything\n    # Under overload: requests queue, latency grows to 30s\n    # Clients timeout at 10s and retry\n    # Server now has 2x load (original + retries)\n    # Latency grows to 60s, more timeouts, more retries\n    # Server collapses under Nx load\n    return await slow_processing(request)\n"
  when_applies: When a server approaches capacity and must choose between queuing requests (increasing latency for all) or rejecting excess requests (maintaining quality for served requests).
  severity: critical
  technologies:
    lang: [general]
    platform: [kubernetes, grpc, http, load_balancer]
  domains:
    domain: [architecture, performance, reliability]
    concern: [distributed_systems, scaling, horizontal, fault_tolerance]
