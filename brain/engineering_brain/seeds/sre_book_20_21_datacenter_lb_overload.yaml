- id: CR-SRE-OVER-002
  text: Client-side retry logic is the most dangerous code in a distributed system. Without jitter, backoff, and retry budgets, retries during an outage turn a partial failure into a total collapse by multiplying
    load on struggling servers.
  why: 'Google calls this the "retry storm" or "thundering herd" problem and considers it one of the most common causes of cascading failures. When a service becomes partially overloaded, some requests
    fail. Clients retry those requests. Now the service has 1.5x the load (original + retries). More requests fail. More retries. The service has 2x, then 3x, then Nx the load. Within minutes, a service
    that could handle 80% of traffic is receiving 500% of normal load from retries alone and serving 0%. Google''s solution is aggressive: per-request retry budgets (maximum 3 retries per request), per-client
    retry budgets (if > 10% of recent requests were retries, stop retrying), exponential backoff with jitter (don''t retry all at once), and server-side pushback (503 with Retry-After).

    '
  how_to_do_right: '1. Per-request retry budget: maximum 3 attempts (1 original + 2 retries). After that, return an error to the caller.

    2. Per-client retry budget: if > 10% of requests in the last minute were retries, stop retrying and fail fast. The backend is overloaded.

    3. Exponential backoff: retry after 100ms, then 200ms, then 400ms, then 800ms — not 100ms, 100ms, 100ms.

    4. Add jitter: randomize the backoff by +/- 25% so all clients don''t retry simultaneously.

    5. Respect Retry-After headers: if the server says "retry in 30 seconds," wait 30 seconds, not your default 100ms.

    6. Log all retries with context. If retries exceed 5% of traffic, investigate the root cause — retries are a symptom, not normal.

    '
  example_good: "# Safe retry with exponential backoff, jitter, and budgets\nimport random\nimport time\n\nclass RetryPolicy:\n    MAX_RETRIES = 2  # 1 original + 2 retries = 3 total\n    BASE_DELAY_MS = 100\n    JITTER_FACTOR = 0.25\n    CLIENT_RETRY_BUDGET = 0.10  # Max 10% of requests can be retries\n\n    def __init__(self):\n        self.total_requests = 0\n        self.retry_requests = 0\n\n    def execute_with_retry(self, fn, *args):\n        self.total_requests += 1\n        for attempt in range(self.MAX_RETRIES + 1):\n            try:\n                return fn(*args)\n            except RetryableError as e:\n                if attempt >= self.MAX_RETRIES:\n                    raise\n                # Check client retry budget\n                if self.retry_requests / max(self.total_requests, 1) > self.CLIENT_RETRY_BUDGET:\n                    raise OverloadError(\"Retry budget exhausted — backend is overloaded\")\n                self.retry_requests += 1\n                delay = self.BASE_DELAY_MS * (2 ** attempt)  # Exponential\n                jitter = delay * self.JITTER_FACTOR * random.uniform(-1, 1)\n                time.sleep((delay + jitter) / 1000)\n"
  example_bad: "# Retry immediately, no backoff, no budget — causes retry storms\ndef call_with_retry(fn, *args, max_retries=10):\n    for attempt in range(max_retries):\n        try:\n            return fn(*args)\n        except Exception:\n            time.sleep(0.1)  # Fixed 100ms delay, no backoff\n            # All clients retry at the same time (no jitter)\n            # 10 retries per request (no budget)\n            # Server at 80% → some failures → retries → 160% → more failures\n            # → more retries → 500% → complete collapse\n            continue\n    raise Exception(\"All retries failed\")\n"
  when_applies: When implementing client-side retry logic for distributed service calls, especially during partial outages where uncontrolled retries can turn a partial failure into a complete collapse.
  severity: critical
  technologies:
    lang: [general, go, java, python]
    platform: [grpc, http]
  domains:
    domain: [architecture, reliability]
    concern: [distributed_systems, fault_tolerance, resilience]
  sources:
  - url: https://sre.google/sre-book/handling-overload/
    title: 'Google SRE Book — Chapter 21: Handling Overload'
  validation_status: cross_checked
- id: CR-SRE-OVER-003
  text: Implement graceful degradation — serve degraded responses instead of no response. A search engine that returns cached results from 1 hour ago is better than one that returns a 503 error. Users prefer
    slow or stale over broken.
  why: 'Google''s approach to overload includes multiple degradation levels, not just "working" and "error." When Gmail is overloaded, it can: serve the full experience (normal), serve a basic HTML version
    (degraded), serve a cached read-only version (heavily degraded), or return an error page (failed). Each level reduces resource consumption while maintaining some user value. This is dramatically better
    than a binary system that works perfectly at 99% capacity and completely fails at 101%. Google designs degradation paths into every critical service: what can we turn off (less important features),
    what can we cache (expensive computations), what can we simplify (reduce response quality), before we return errors? The key insight: users tolerate degradation much better than failure. A page that
    loads in 5 seconds is annoying; a page that returns "Service Unavailable" is unacceptable.

    '
  how_to_do_right: '1. Define 3-4 degradation levels for each service: full, degraded, minimal, error. Document what each level looks like.

    2. Implement automatic degradation triggers: when CPU > 70%, enable caching. When CPU > 85%, disable non-essential features. When CPU > 95%, return errors for low-priority requests.

    3. Cache aggressively during overload: serve stale data rather than computing fresh data that you can''t afford.

    4. Prioritize requests: authenticated users > anonymous users, paid users > free users, critical paths > nice-to-have features.

    5. Test each degradation level. If you''ve never triggered "minimal mode" in production, it probably doesn''t work.

    6. Communicate degradation to users: "Some features are temporarily limited due to high demand" is better than silently broken features.

    '
  example_good: "# Graceful degradation with multiple levels\nclass DegradationManager:\n    def get_degradation_level(self, cpu_pct: float) -> str:\n        if cpu_pct < 70:\n            return \"FULL\"         # All features enabled\n        elif cpu_pct < 85:\n            return \"DEGRADED\"     # Disable non-essential features\n        elif cpu_pct < 95:\n            return \"MINIMAL\"      # Serve cached/stale responses\n        else:\n            return \"ERROR\"        # Reject low-priority requests\n\n    def serve_request(self, request, level: str):\n        if level == \"FULL\":\n            return self.full_response(request)\n        elif level == \"DEGRADED\":\n            return self.response_without_recommendations(request)\n        elif level == \"MINIMAL\":\n            return self.cached_response(request)  # Stale but fast\n        else:\n            if request.priority < Priority.CRITICAL:\n                raise HTTPException(503, \"Service under high load\")\n            return self.minimal_response(request)\n"
  example_bad: "# Binary: works perfectly or crashes completely\ndef serve_request(request):\n    # No degradation levels — 100% features or 503 error\n    recommendations = compute_recommendations(request)  # Expensive\n    analytics = compute_analytics(request)              # Expensive\n    personalization = compute_personalization(request)   # Expensive\n    # At 99% CPU: all three compute, latency = 10s, users see timeout\n    # At 101% CPU: server crashes, 503 for everyone\n    # Could have served cached recommendations and skipped analytics\n    return full_response(recommendations, analytics, personalization)\n"
  when_applies: When designing services that should maintain partial functionality under high load rather than failing completely, serving degraded but useful responses instead of errors.
  severity: high
  technologies:
    lang: [general]
    platform: [cloud, kubernetes]
  domains:
    domain: [architecture, reliability]
    concern: [distributed_systems, fault_tolerance, resilience]
  sources:
  - url: https://sre.google/sre-book/handling-overload/
    title: 'Google SRE Book — Chapter 21: Handling Overload'
  validation_status: cross_checked
- id: CR-SRE-OVER-004
  text: Criticality-based request handling — not all requests are equal. Tag every request with a priority level and shed low-priority requests first during overload. A background batch job should NEVER
    compete with a user-facing request for the same server resources.
  why: 'Google assigns criticality levels to every request, and the request processing pipeline respects these levels during overload. A user-facing search request is CRITICAL_PLUS. A background indexing
    job is SHEDDABLE. When the server is at capacity, SHEDDABLE requests are rejected first, then SHEDDABLE_PLUS, then CRITICAL, and only if the system is failing do CRITICAL_PLUS requests get rejected.
    This prevents a common anti-pattern: a background batch job (indexing, reporting, analytics) consumes all available capacity, and user-facing requests fail — even though the batch job could easily be
    delayed by hours without impact. Without explicit criticality, the server treats all requests equally, and the most important requests compete with the least important ones.

    '
  how_to_do_right: '1. Define criticality levels: CRITICAL_PLUS (user-facing, revenue-impacting), CRITICAL (user-facing, non-revenue), SHEDDABLE_PLUS (background, time-sensitive), SHEDDABLE (background,
    delay-tolerant).

    2. Tag EVERY request with criticality at the entry point. No untagged requests — untagged defaults to the lowest priority.

    3. Configure admission control to shed requests in priority order: SHEDDABLE first, CRITICAL_PLUS last.

    4. Separate capacity for different priorities: reserve 70% of capacity for CRITICAL+, allow SHEDDABLE to use only surplus capacity.

    5. Monitor shedding by priority level: if CRITICAL requests are being shed, the system needs more capacity urgently.

    6. Background jobs should be designed to tolerate rejection: queue with retry, not fail permanently.

    '
  example_good: "# Request criticality tagging with priority-based shedding\nfrom enum import IntEnum\n\nclass Criticality(IntEnum):\n    CRITICAL_PLUS = 4  # User-facing, revenue-impacting\n    CRITICAL = 3       # User-facing, non-revenue\n    SHEDDABLE_PLUS = 2 # Background, time-sensitive\n    SHEDDABLE = 1      # Background, delay-tolerant\n\nclass AdmissionController:\n    def should_admit(self, request, cpu_pct: float) -> bool:\n        criticality = request.metadata.get(\"criticality\", Criticality.SHEDDABLE)\n        if cpu_pct < 70:\n            return True  # Accept all\n        elif cpu_pct < 85:\n            return criticality >= Criticality.SHEDDABLE_PLUS\n        elif cpu_pct < 95:\n            return criticality >= Criticality.CRITICAL\n        else:\n            return criticality >= Criticality.CRITICAL_PLUS\n\n# Tag at entry point\ndef handle_user_request(request):\n    request.metadata[\"criticality\"] = Criticality.CRITICAL_PLUS\n\ndef handle_batch_job(request):\n    request.metadata[\"criticality\"] = Criticality.SHEDDABLE\n"
  example_bad: "# All requests treated equally — batch jobs compete with users\ndef process_request(request):\n    # Background indexing job and user checkout use same queue\n    # No priority, no criticality tags\n    queue.put(request)  # FIFO — batch job blocks user request\n    # During overload: batch jobs consume all capacity\n    # User-facing requests fail because indexing job is ahead in queue\n    # A job that could be delayed by hours blocks a user paying money\n"
  when_applies: When operating services that handle both user-facing and background requests, where load shedding during overload must prioritize user-facing traffic over batch processing.
  severity: high
  technologies:
    lang: [general]
    platform: [kubernetes, grpc, load_balancer]
  domains:
    domain: [architecture, reliability]
    concern: [distributed_systems, fault_tolerance]
