- id: CR-SRE-MON-011
  text: When paging volume is unsustainable, temporarily relax SLO targets to create breathing room for fixing root causes. It is better to briefly accept lower reliability than to burn out the team chasing
    symptoms forever.
  why: 'Google''s Bigtable team experienced this exact scenario — so many alerts firing that engineers spent all their time triaging and fighting fires, with zero time for the underlying infrastructure
    fixes that would prevent future fires. The SRE Book describes the deliberate decision to temporarily relax the SLO, disable noisy alerts, and redirect engineering effort to root cause fixes. This felt
    counterintuitive — "make the service less reliable to make it more reliable" — but it broke the death spiral. Within weeks, the fundamental fixes reduced the root cause incident rate, and the service
    achieved better sustained reliability than it had before the SLO relaxation. The alternative was continued alert fatigue, engineer burnout, and attrition — which would have made reliability WORSE long-term.

    '
  how_to_do_right: '1. If page volume exceeds 5 per shift for 2+ weeks, declare an operational overload situation.

    2. Temporarily relax the SLO target (e.g., 99.95% → 99.5%) with explicit leadership approval and a timeline.

    3. Disable or downgrade all non-critical alerts to tickets. Keep ONLY alerts for catastrophic user impact.

    4. Redirect 100% of freed engineering time to root cause fixes — not features, not new services.

    5. Set a deadline (2-4 weeks) after which the relaxed SLO reverts. Review progress weekly.

    6. After the crisis, conduct a retrospective: why did toil spiral? What systemic changes prevent recurrence?

    '
  severity: high
  technologies:
    lang: [general]
  domains:
    domain: [observability, operations, reliability]
    concern: [monitoring, on_call]
  example_good: "# Temporary SLO relaxation to break the alert death spiral\ndef declare_operational_overload(service: str, current_pages_per_shift: float):\n    if current_pages_per_shift > 5:\n        print(f'OPERATIONAL OVERLOAD: {service} at {current_pages_per_shift} pages/shift')\n        return {\n            'action': 'RELAX_SLO',\n            'original_slo': 0.9995,\n            'temporary_slo': 0.995,  # 99.5% — relax to create breathing room\n            'duration': '2-4 weeks',\n            'requirement': 'Redirect 100% of freed time to root cause fixes',\n            'deadline': '4 weeks to revert to original SLO',\n            'approval': 'VP-level explicit approval required',\n        }\n    return {'action': 'NORMAL'}\n# Counter-intuitive: 'less reliable temporarily to be more reliable permanently'\n"
  example_bad: "# Anti-pattern: fighting fires without addressing root causes\ndef handle_alert_overload():\n    while pages_per_shift > 5:\n        for alert in get_alerts():\n            triage(alert)           # 100% time on symptoms\n            # Zero time for root cause fixes\n        # Next shift: same alerts, same volume, same burnout\n    # Team never breaks the death spiral\n    # Engineers burn out and quit, making it worse\n"
  when_applies: "When on-call page volume is unsustainable (more than 5 pages per shift for 2+ weeks) and the team needs breathing room to fix root causes"
  sources:
  - url: https://sre.google/sre-book/monitoring-distributed-systems/
    title: 'Google SRE Book — Chapter 6: Monitoring Distributed Systems'
  validation_status: cross_checked
- id: CR-SRE-MON-012
  text: If an alert response is always the same rote action, automate the response — not the alert. A page that triggers a human to run a script is a waste of human attention. Auto-remediate and page only
    when auto-remediation fails.
  why: 'Google''s Gmail team discovered that a large percentage of their pages triggered the same response every time: "restart process X" or "drain traffic from machine Y" or "increase quota for service
    Z." Engineers were being paged to perform robotic actions — a waste of their expertise and attention. The team built auto-remediation for these known failure modes: the monitoring system detects the
    condition and executes the fix automatically. Humans are paged only when the auto-remediation fails or when the failure mode is novel. This reduced page volume by 60-80% while improving incident response
    time from "minutes until a human responds" to "seconds until the automation acts." The remaining pages were genuinely novel problems requiring human judgment — which is the correct use of human on-call
    time.

    '
  how_to_do_right: '1. For each alert in the last quarter, log the human action taken. If the same action was taken > 3 times, automate it.

    2. Build auto-remediation as: detect condition → execute fix → verify fix → alert only on verification failure.

    3. Common auto-remediations: restart crashed process, scale up on saturation, drain unhealthy instance, rollback bad config.

    4. Auto-remediation MUST have guardrails: max retries, blast radius limits, cooldown periods.

    5. Log all auto-remediation actions for audit and debugging. Include: what was detected, what action was taken, what the outcome was.

    6. Target: 80% of previously-manual incident responses auto-remediated within 6 months.

    '
  severity: high
  technologies:
    lang: [go, python]
    platform: [kubernetes, prometheus]
  domains:
    domain: [observability, operations, reliability]
    concern: [monitoring, maintenance, automation, on_call]
  example_good: "# Auto-remediation with guardrails\nimport logging\n\ndef auto_remediate(condition: str, action: str, max_retries: int = 3,\n                   cooldown_seconds: int = 300):\n    \"\"\"Detect → Act → Verify → Alert only on failure.\"\"\"\n    logging.info(f'Auto-remediation: detected={condition}, action={action}')\n    for attempt in range(max_retries):\n        execute_action(action)\n        if verify_health():\n            logging.info(f'Auto-remediation SUCCESS on attempt {attempt + 1}')\n            return True\n    # Only page human when automation fails\n    page_human(f'Auto-remediation FAILED after {max_retries} attempts: {condition}')\n    return False\n\n# Common auto-remediations:\n# - Restart crashed process\n# - Scale up on saturation\n# - Drain unhealthy instance\n# - Rollback bad config\n# Target: 80% of manual responses auto-remediated within 6 months\n"
  example_bad: "# Anti-pattern: paging humans for algorithmic responses\ndef on_service_crash():\n    page_oncall('Service X crashed')  # Human reads page\n    # Human SSHs in, runs: systemctl restart service-x\n    # Same response every single time — 50 times this quarter\n    # Human is a glorified button-presser\n    # Could be automated in 20 lines of code\n"
  when_applies: "When the same manual remediation is performed repeatedly for known failure modes, indicating an opportunity for auto-remediation"
  sources:
  - url: https://sre.google/sre-book/monitoring-distributed-systems/
    title: 'Google SRE Book — Chapter 6: Monitoring Distributed Systems'
  validation_status: cross_checked
