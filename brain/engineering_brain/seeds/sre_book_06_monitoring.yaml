  example_good: "# Simple, one-sentence alerting rules\nSIMPLE_RULES = [\n    {\n        'name': 'HighErrorRate',\n        'expr': 'error_rate > 0.01',\n        'for': '5m',\n        'description': 'Error rate exceeds 1% for 5 consecutive minutes',\n        'owner': 'team-backend',\n        'runbook': 'https://wiki/runbooks/high-error-rate',\n    },\n]\n# One sentence description\n# One condition (no AND/OR chains)\n# Clear owner and runbook link\n# Any engineer understands it in 30 seconds\n"
