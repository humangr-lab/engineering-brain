- id: CR-SRE-MON-010
  text: Choose measurement resolution based on what you need to detect, not on what you can collect. Sub-minute CPU metrics catch tail latency spikes. Once-per-minute health checks are sufficient for 99.9%
    availability. Over-collecting wastes storage; under-collecting misses incidents.
  why: 'Google found that different metrics need different collection frequencies and one-size-fits-all collection is wasteful. CPU load at 1-second resolution catches garbage collection pauses that cause
    p99 latency spikes — aggregating to 1-minute averages smooths out these spikes and makes them invisible. Disk space at 1-second resolution is pure waste — disk fills over hours, not seconds. Health
    check probes at 10-second intervals are sufficient for detecting outages affecting 99.9% availability (allowing ~8 hours of downtime per year). The SRE Book recommends recording metrics at high resolution
    internally (per-server, per-second) and aggregating externally (per-minute, per-cluster) for dashboards and alerting. This gives you high-resolution data for debugging while keeping storage costs manageable.

    '
  how_to_do_right: '1. High-frequency metrics (1-10s): CPU, memory, request latency, queue depth — anything that affects tail latency.

    2. Medium-frequency metrics (30-60s): error rates, throughput, connection pool usage — things that change gradually.

    3. Low-frequency metrics (5-60min): disk space, certificate expiration, configuration drift — slow-moving resources.

    4. Store high-resolution data for 24-48 hours (debugging), aggregate to 1-minute for 30 days, 1-hour for 1 year.

    5. Use histograms with exponential bucket boundaries for latency — they capture distribution at any aggregation level.

    6. Review storage costs quarterly. If monitoring storage grows faster than service traffic, collection is too aggressive.

    '
  severity: medium
  technologies:
    platform: [database, grafana, opentelemetry, prometheus]
  domains:
    domain: [observability, reliability]
    concern: [monitoring]
  example_good: "# Resolution-aware metric collection\nMETRIC_COLLECTION = {\n    'high_frequency_1s': ['cpu_usage', 'memory_usage', 'request_latency', 'queue_depth'],\n    'medium_frequency_30s': ['error_rate', 'throughput', 'connection_pool_usage'],\n    'low_frequency_5m': ['disk_space', 'cert_expiration', 'config_drift'],\n}\n\nRETENTION_POLICY = {\n    'raw_1s': '48h',      # High-res for debugging\n    'aggregated_1m': '30d', # Medium-res for dashboards\n    'aggregated_1h': '1y',  # Low-res for capacity planning\n}\n\n# CPU at 1s catches GC pauses that 1-minute averages smooth out\n# Disk space at 1s is waste — it changes over hours, not seconds\n"
  example_bad: "# Anti-pattern: one-size-fits-all collection frequency\nALL_METRICS_INTERVAL = 60  # 1 minute for everything\n\ndef collect_all():\n    collect('cpu')        # Misses 200ms GC pauses — smoothed to nothing at 1min\n    collect('disk_space')  # Wastes storage — disk changes over hours\n    collect('latency')     # Misses tail latency spikes between collection points\n    # Cannot debug p99 issues because 1-minute aggregation hides them\n"
  when_applies: "When configuring metric collection intervals and retention policies to balance debugging resolution against storage costs"
