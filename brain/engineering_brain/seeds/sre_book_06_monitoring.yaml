layer: rules
technology: SRE
domain: observability
knowledge:
- id: CR-SRE-MON-001
  text: Monitor the Four Golden Signals — Latency, Traffic, Errors, Saturation. If you can only measure four things about your user-facing system, measure these four. They catch the vast majority of real
    incidents.
  why: 'Google distilled decades of monitoring experience into these four signals because they cover the critical failure modes of any service. Latency tells you if the service is slow (user frustration).
    Traffic tells you if demand has changed (capacity issues). Errors tell you if the service is broken (functional failure). Saturation tells you if the service is about to break (predictive capacity).
    Teams that monitor only availability miss latency degradation. Teams that monitor only errors miss saturation-driven slowdowns. Teams that monitor only latency miss error spikes on fast-failing requests.
    The four signals together provide a complete picture of service health. Google''s monitoring systems are built around these four signals as the primary dashboard for every service.

    '
  how_to_do_right: '1. Latency: track p50, p95, p99 for BOTH successful and failed requests separately. A fast 500 error masks latency problems.

    2. Traffic: measure in domain-specific units — HTTP requests/sec for APIs, QPS for databases, messages/sec for queues.

    3. Errors: count explicit (5xx), implicit (200 with wrong content), and policy (violating SLO latency threshold) errors.

    4. Saturation: track the most constrained resource — CPU, memory, disk I/O, network, connection pool, thread pool.

    5. Dashboard all four on a single page per service. If you need to switch tabs to understand service health, you will miss correlations.

    6. Alert on symptoms (golden signals degraded), investigate with causes (internal metrics, logs, traces).

    '
  severity: critical
  technologies:
    platform: [datadog, grafana, opentelemetry, prometheus]
  domains:
    domain: [observability, reliability]
    concern: [monitoring]
  example_good: "# Four Golden Signals dashboard for every service\nfrom prometheus_client import Counter, Histogram, Gauge\n\n# 1. LATENCY — separate success vs error latency\nREQUEST_LATENCY = Histogram('http_request_duration_seconds',\n    'Request latency', ['method', 'status'], buckets=[.01, .05, .1, .25, .5, 1, 2.5, 5, 10])\n\n# 2. TRAFFIC — domain-specific units\nREQUESTS_TOTAL = Counter('http_requests_total', 'Total requests', ['method', 'endpoint'])\n\n# 3. ERRORS — explicit, implicit, and policy violations\nERRORS_TOTAL = Counter('http_errors_total', 'Errors', ['type'])  # 5xx, wrong_content, slow\n\n# 4. SATURATION — most constrained resource\nCONNECTION_POOL = Gauge('connection_pool_usage_ratio', 'Connection pool saturation')\nMEMORY_USAGE = Gauge('memory_usage_ratio', 'Memory saturation')\n# All four on ONE dashboard page per service\n"
  example_bad: "# Anti-pattern: monitoring only one or two golden signals\nALERTS = [\n    {'metric': 'error_rate', 'threshold': 0.01},  # Only errors\n]\n# Missing latency: service is slow but not erroring — undetected\n# Missing traffic: demand doubled, capacity issues coming — undetected\n# Missing saturation: connection pool at 95% — about to break — undetected\n# Need to switch tabs to understand health — correlations missed\n"
  when_applies: "When setting up monitoring for any user-facing service, or when an existing monitoring setup fails to catch real incidents"
  sources:
  - url: https://sre.google/sre-book/monitoring-distributed-systems/
    title: 'Google SRE Book — Chapter 6: Monitoring Distributed Systems'
  validation_status: cross_checked
- id: CR-SRE-MON-002
  text: Alert on symptoms, not causes. Pages should fire when users are impacted or about to be impacted — not when an internal metric looks unusual. A high CPU alert that does not affect users is noise;
    a latency spike that affects users is signal.
  why: 'Google learned through painful experience that cause-based alerting creates alert fatigue. A "CPU > 90%" alert fires 50 times a month. Of those, 48 times the service is fine because it is designed
    to use 90% CPU during normal operation. Engineers learn to ignore the alert. The 2 times it actually matters, they ignore it too — alert fatigue has trained them to dismiss it. Symptom-based alerting
    fixes this: "p99 latency > 500ms for 5 minutes" fires only when users are impacted. Engineers treat every such alert as real. The cause (CPU, memory, disk, bad deployment, upstream failure) is investigated
    AFTER the alert fires, not encoded in the alerting rule. This keeps alerting rules simple and page counts low, while maintaining high signal-to-noise ratio.

    '
  how_to_do_right: '1. Review every alerting rule: does it detect USER IMPACT or INTERNAL STATE? If internal state, convert to a dashboard metric instead.

    2. Good symptom alerts: "error rate > 1% for 5 min", "p99 latency > 2s for 10 min", "availability < SLO for rolling 1h window."

    3. Bad cause alerts: "CPU > 90%", "disk > 80%", "memory > 75%", "GC pause > 200ms" — these should be dashboard metrics, not pages.

    4. Exception: saturation alerts that predict imminent failure ARE valid pages — "disk full in 4 hours" is actionable and urgent.

    5. For every alert, ask: "If I get this page at 3 AM, will I need to take immediate action to protect users?" If no, it is not a page.

    6. Track alert-to-action ratio: what percentage of pages resulted in a meaningful human action? Target > 80%.

    '
  severity: critical
  technologies:
    platform: [grafana, pagerduty, prometheus]
  domains:
    domain: [observability, reliability]
    concern: [monitoring]
  example_good: "# Symptom-based alerting — alert on user impact\nALERT_RULES = [\n    {\n        'name': 'HighErrorRate',\n        'expr': 'rate(http_errors_total[5m]) / rate(http_requests_total[5m]) > 0.01',\n        'for': '5m',\n        'severity': 'page',\n        'summary': 'Error rate > 1% for 5 minutes — users impacted',\n    },\n    {\n        'name': 'HighLatency',\n        'expr': 'histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) > 2',\n        'for': '10m',\n        'severity': 'page',\n        'summary': 'p99 latency > 2s for 10 minutes — users experiencing slowness',\n    },\n]\n# Every alert answers: 'Are users impacted RIGHT NOW?'\n"
  example_bad: "# Anti-pattern: cause-based alerting creates noise\nALERT_RULES = [\n    {'name': 'HighCPU', 'expr': 'cpu_usage > 0.9', 'severity': 'page'},\n    {'name': 'HighMemory', 'expr': 'memory_usage > 0.75', 'severity': 'page'},\n    {'name': 'HighDisk', 'expr': 'disk_usage > 0.8', 'severity': 'page'},\n    {'name': 'GCPause', 'expr': 'gc_pause_ms > 200', 'severity': 'page'},\n]\n# Fires 50 times/month. 48 times service is fine (designed to use 90% CPU)\n# Engineers auto-archive these alerts — alert fatigue\n# The 2 real incidents are also ignored\n"
  when_applies: "When designing alerting rules, especially when existing cause-based alerts have a low signal-to-noise ratio"
  sources:
  - url: https://sre.google/sre-book/monitoring-distributed-systems/
    title: 'Google SRE Book — Chapter 6: Monitoring Distributed Systems'
  validation_status: cross_checked
- id: CR-SRE-MON-003
  text: Every page must be actionable, urgent, and require human intelligence. If a page can be handled by a script, automate it. If it is not urgent, make it a ticket. If it requires no intelligence, it
    should not interrupt a human.
  why: 'Google''s paging philosophy is that human attention is the most expensive resource in operations. Every page costs: the engineer''s focus is broken, context is lost on whatever they were working
    on, sleep is disrupted if it is off-hours, and the cognitive load of incident response consumes energy for hours. Therefore, pages must pass three tests: (1) Is it urgent? If it can wait until business
    hours, it is a ticket. (2) Is it actionable? If there is nothing the engineer can do, it is informational noise. (3) Does it require human judgment? If the response is always the same (restart service
    X), automate the response. Pages that fail any of these tests erode on-call morale, increase attrition, and paradoxically reduce reliability because fatigued engineers make worse decisions during real
    incidents.

    '
  how_to_do_right: '1. For each existing alert rule, answer all three questions: Urgent? Actionable? Requires intelligence?

    2. If not urgent → convert to ticket (queue for business hours).

    3. If not actionable → convert to dashboard metric or remove entirely.

    4. If actionable but algorithmic → automate the response, alert only on automation failure.

    5. Target: < 2 pages per on-call shift on average. If exceeding this, the service needs reliability investment or automation.

    6. Conduct quarterly "alert hygiene" reviews: delete alerts that fired but were ignored, merge duplicate alerts, tighten thresholds.

    '
  severity: critical
  technologies:
    lang: [general]
    platform: [pagerduty, prometheus]
  domains:
    domain: [observability, operations, reliability]
    concern: [monitoring, on_call]
  example_good: "# Three-test page qualification\ndef should_page(alert: dict) -> bool:\n    \"\"\"Every page must pass three tests.\"\"\"\n    is_urgent = alert.get('requires_immediate_action', False)\n    is_actionable = alert.get('has_remediation_steps', False)\n    requires_intelligence = alert.get('requires_human_judgment', False)\n\n    if not is_urgent:\n        create_ticket(alert)  # Queue for business hours\n        return False\n    if not is_actionable:\n        add_to_dashboard(alert)  # Informational only\n        return False\n    if not requires_intelligence:\n        auto_remediate(alert)  # Algorithmic response\n        return False\n    return True  # Genuine page — human needed NOW\n\n# Target: < 2 pages per on-call shift\n"
  example_bad: "# Anti-pattern: everything is a page\ndef on_alert(alert):\n    send_page(alert)  # Page for everything\n    # 'Disk at 82%' at 3 AM — not urgent, could wait\n    # 'Deployment complete' — not actionable, informational\n    # 'Service X restarted' — algorithmic, auto-remediate instead\n    # 15 pages per shift — engineer stops reading them all\n"
  when_applies: "When reviewing alerting rules to determine which should page an engineer versus creating a ticket or being a dashboard metric"
  sources:
  - url: https://sre.google/sre-book/monitoring-distributed-systems/
    title: 'Google SRE Book — Chapter 6: Monitoring Distributed Systems'
  validation_status: cross_checked
- id: CR-SRE-MON-004
  text: Combine black-box monitoring (external probes that see what users see) with white-box monitoring (internal metrics that predict problems). Black-box catches current failures; white-box catches imminent
    failures hidden by retries and caching.
  why: 'Google uses both because each has a critical blind spot. Black-box monitoring (synthetic requests, health check probes) detects problems that are actively affecting users right now — it is the ground
    truth of user experience. But it is reactive: by the time the probe fails, users are already impacted. White-box monitoring (application metrics, logs, internal state) detects problems that WILL affect
    users soon — a memory leak approaching OOM, a connection pool at 95% capacity, a disk filling up. But white-box can be misleading: internal metrics may look alarming but be harmless (CPU spike during
    GC is normal). The combination is powerful: white-box provides early warning, black-box provides confirmation. "A symptom-based page from black-box monitoring is your last line of defense; white-box
    monitoring should catch the problem before it becomes user-visible."

    '
  how_to_do_right: '1. Deploy black-box probes from OUTSIDE your infrastructure: different cloud provider, different region, different network.

    2. Black-box probes should mimic real user journeys: login → search → view result → checkout. Not just /health.

    3. White-box metrics should cover saturation (connection pools, thread pools, disk, memory) and error rates at every layer.

    4. Alert on black-box symptoms (user is impacted NOW), warn on white-box predictions (user WILL be impacted soon).

    5. When white-box and black-box disagree, trust black-box for current state and investigate the white-box discrepancy.

    6. Ensure black-box probes are not themselves a single point of failure — monitor the monitor.

    '
  severity: high
  technologies:
    platform: [datadog, grafana, opentelemetry, prometheus]
  domains:
    domain: [observability, reliability]
    concern: [monitoring]
  example_good: "# Black-box + white-box monitoring combination\nclass MonitoringStack:\n    def __init__(self, service: str):\n        self.service = service\n\n    def black_box_probe(self):\n        \"\"\"External probe — sees what users see (ground truth).\"\"\"\n        # Runs from OUTSIDE infrastructure (different cloud/region)\n        result = synthetic_request(f'https://{self.service}/checkout',\n                                   from_region='external')\n        return result.status_code == 200 and result.latency_ms < 3000\n\n    def white_box_check(self):\n        \"\"\"Internal metrics — predicts future problems.\"\"\"\n        return {\n            'connection_pool_pct': get_metric('conn_pool_usage'),  # 95% = imminent failure\n            'memory_trend': get_metric('memory_growth_rate'),       # Leak detection\n            'queue_depth': get_metric('queue_depth'),               # Backlog growing\n        }\n\n# White-box: early warning. Black-box: confirmation.\n# When they disagree, trust black-box for current state.\n"
  example_bad: "# Anti-pattern: only black-box OR only white-box\ndef monitor_service():\n    # Only black-box: reactive, catches problems after user impact\n    if health_check('/health') == 200:\n        return 'OK'\n    # Misses: memory leak at 95%, connection pool exhaustion imminent\n    # By the time black-box fails, users already impacted for minutes\n    # No early warning capability\n"
  when_applies: "When designing a comprehensive monitoring strategy that balances reactive user-impact detection with predictive internal metric tracking"
  sources:
  - url: https://sre.google/sre-book/monitoring-distributed-systems/
    title: 'Google SRE Book — Chapter 6: Monitoring Distributed Systems'
  validation_status: cross_checked
- id: CR-SRE-MON-005
  text: Distinguish latency of successful requests from latency of failed requests. A fast error (500 in 2ms) should not improve your latency statistics. A slow error (timeout in 30s) should not be hidden
    in the error count.
  why: 'Google found this distinction critical because fast-failing error responses artificially deflate latency metrics while slow-failing timeouts inflate them. Consider: a service returns 200 OK in 100ms
    for 99% of requests and 500 Internal Server Error in 1ms for 1%. Average latency shows 99ms — looks great. But the service is broken for 1% of users. If you only track latency of ALL requests, the fast
    errors make the metrics look better than reality. Conversely, if a downstream timeout causes 1% of requests to take 30 seconds before failing, the overall p99 spikes to 30s. But this is not a latency
    problem — it is an error problem that manifests as latency. Separating the two allows correct diagnosis: "latency is fine for successful requests, but error rate is high" vs "even successful requests
    are slow."

    '
  how_to_do_right: '1. Track latency histograms separately for successful (2xx) and failed (5xx, timeout) requests.

    2. SLO on latency should apply to SUCCESSFUL requests only — failed requests have their own SLO (error rate).

    3. Create separate dashboards or panels: "success latency p50/p95/p99" and "error latency p50/p95/p99."

    4. Alert on success latency degradation (service is slow) and on error latency increase (timeouts getting worse).

    5. When investigating latency spikes, first check if the spike is caused by an increase in slow errors — fix the errors, not the latency.

    6. Tag 4xx separately from 5xx: client errors (4xx) are not your service''s fault and should not count against your SLO.

    '
  severity: high
  technologies:
    lang: [general]
    platform: [grafana, opentelemetry, prometheus]
  domains:
    domain: [observability, performance, reliability]
    concern: [monitoring]
  example_good: "# Separate latency tracking for success vs failure responses\nfrom prometheus_client import Histogram\n\nSUCCESS_LATENCY = Histogram('http_success_latency_seconds',\n    'Latency for 2xx responses', buckets=[.01, .05, .1, .25, .5, 1, 2.5, 5])\n\nERROR_LATENCY = Histogram('http_error_latency_seconds',\n    'Latency for 5xx/timeout responses', buckets=[.1, .5, 1, 5, 10, 30])\n\ndef record_request(status: int, latency_s: float):\n    if 200 <= status < 300:\n        SUCCESS_LATENCY.observe(latency_s)\n    else:\n        ERROR_LATENCY.observe(latency_s)\n\n# SLO on success latency only — errors have their own SLO (error rate)\n# Diagnose: 'latency is fine for successful requests, but error rate is high'\n"
  example_bad: "# Anti-pattern: single latency metric for all responses\nLATENCY = Histogram('http_latency_seconds', 'All request latency')\n\ndef record_request(status: int, latency_s: float):\n    LATENCY.observe(latency_s)  # 500 in 1ms and 200 in 100ms mixed together\n    # Fast 500 errors (1ms) deflate the average — metrics look better than reality\n    # Slow timeouts (30s) inflate p99 — looks like latency problem, actually error problem\n    # Cannot distinguish 'service is slow' from 'service is broken'\n"
  when_applies: "When configuring latency monitoring and alerting, to avoid fast errors masking latency issues or slow timeouts inflating latency metrics"
  sources:
  - url: https://sre.google/sre-book/monitoring-distributed-systems/
    title: 'Google SRE Book — Chapter 6: Monitoring Distributed Systems'
  validation_status: cross_checked
- id: CR-SRE-MON-006
  text: Saturation monitoring must be predictive, not reactive. Alerting when disk is 95% full is too late — alert when the trend predicts disk full in 4 hours, giving time to act before impact.
  why: 'Google learned that threshold-based saturation alerts ("disk > 90%") fire too late for slow-filling resources and too early for bursty ones. A disk that fills 1% per day hitting 90% means you have
    10 days — plenty of time for a ticket, not a page. A disk that filled from 50% to 90% in 1 hour means you have ~40 minutes — that IS a page. The raw threshold cannot distinguish these cases. Predictive
    saturation monitoring uses linear regression on recent data points to extrapolate when the resource will be exhausted. "Disk full in 4 hours at current rate" is a much more actionable alert than "disk
    at 92%." Google applies this to all bounded resources: memory, connection pools, file descriptors, certificate expiration, license counts.

    '
  how_to_do_right: '1. For each saturation metric, calculate rate of change (derivative) and predict time to exhaustion.

    2. Alert at two levels: "exhaustion in < 4 hours" (page) and "exhaustion in < 7 days" (ticket).

    3. Apply to: disk space, memory (including swap), connection pool size, thread pool size, queue depth, certificate expiration.

    4. Use linear regression over a meaningful window (1 hour for fast-changing, 7 days for slow-changing resources).

    5. Account for periodic patterns: a database that fills during the day and compacts at night should not trigger nightly exhaustion predictions.

    6. Test prediction accuracy: were the "full in 4 hours" predictions correct? If they consistently over- or under-predict, adjust the model.

    '
  severity: high
  technologies:
    platform: [cloud, kubernetes, grafana, prometheus]
  domains:
    domain: [observability, reliability, planning]
    concern: [monitoring, capacity]
  example_good: "# Predictive saturation monitoring with time-to-exhaustion\nimport numpy as np\n\ndef predict_exhaustion(values: list[float], timestamps: list[float],\n                       capacity: float) -> dict:\n    \"\"\"Linear regression to predict when resource is exhausted.\"\"\"\n    if len(values) < 2:\n        return {'exhaustion_hours': float('inf')}\n    slope = np.polyfit(timestamps, values, 1)[0]  # Rate of change\n    if slope <= 0:\n        return {'exhaustion_hours': float('inf'), 'trend': 'stable_or_decreasing'}\n    remaining = capacity - values[-1]\n    hours_to_full = remaining / (slope * 3600)\n    severity = 'PAGE' if hours_to_full < 4 else 'TICKET' if hours_to_full < 168 else 'INFO'\n    return {'exhaustion_hours': hours_to_full, 'severity': severity}\n\n# 'Disk full in 4 hours at current rate' >> 'Disk at 92%'\n"
  example_bad: "# Anti-pattern: static threshold saturation alerts\nALERT_RULES = [\n    {'metric': 'disk_usage_pct', 'threshold': 90, 'severity': 'page'},\n]\n# Disk fills 1% per day hitting 90% = 10 days remaining — not a page!\n# Disk fills 40% per hour hitting 90% = 15 minutes remaining — definitely a page!\n# Static threshold cannot distinguish these cases\n"
  when_applies: "When configuring saturation alerts for bounded resources (disk, memory, connection pools, certificates) to provide predictive rather than reactive warnings"
  sources:
  - url: https://sre.google/sre-book/monitoring-distributed-systems/
    title: 'Google SRE Book — Chapter 6: Monitoring Distributed Systems'
  validation_status: cross_checked
- id: CR-SRE-MON-007
  text: Errors are not just HTTP 5xx. Track three types — explicit failures (5xx), implicit failures (200 OK but wrong content), and policy violations (correct response but too slow per SLO). Missing any
    category creates blind spots.
  why: 'Google found that teams monitoring only HTTP status codes miss two major failure categories. Implicit failures: the service returns 200 OK but the response body is wrong — empty, stale, truncated,
    or from the wrong user. This is often worse than a clean error because the user trusts the response and acts on wrong data. Policy violations: the response is correct and returns 200 OK but takes 5
    seconds. It technically "succeeded" but violated the user''s expectation (SLO). A payment system that returns the correct balance but takes 30 seconds is "correct" but functionally broken. Monitoring
    only explicit errors (5xx) would show green dashboards while users experience both wrong data and unacceptable performance.

    '
  how_to_do_right: '1. Explicit errors: track all 5xx responses, timeouts, and connection failures at the load balancer.

    2. Implicit errors: deploy end-to-end correctness probes — canary requests with known correct answers. Compare response to expected output.

    3. Policy violations: track SLO breaches — requests that succeeded but exceeded latency threshold. Count them as "soft errors."

    4. Dashboard all three types together as a unified "error rate" that represents total user-visible degradation.

    5. Alert on the unified rate, investigate by type: "error rate is 3% — breakdown: 1% 5xx, 1.5% slow responses, 0.5% wrong content."

    6. For APIs, add response validation at the client side: check schema conformance, required fields present, values in expected ranges.

    '
  severity: high
  technologies:
    lang: [general]
    platform: [opentelemetry, prometheus]
  domains:
    domain: [observability, reliability]
    concern: [monitoring]
  example_good: "# Three error types: explicit, implicit, and policy violations\nfrom prometheus_client import Counter\n\n# Type 1: Explicit errors (5xx, timeouts)\nEXPLICIT_ERRORS = Counter('errors_explicit_total', 'HTTP 5xx and timeouts')\n\n# Type 2: Implicit errors (200 OK but wrong content)\nIMPLICIT_ERRORS = Counter('errors_implicit_total', 'Correct status, wrong content')\n\n# Type 3: Policy violations (correct but too slow)\nPOLICY_ERRORS = Counter('errors_policy_total', 'SLO latency threshold exceeded')\n\ndef record_response(status: int, latency_ms: float, content_valid: bool):\n    if status >= 500:\n        EXPLICIT_ERRORS.inc()\n    elif not content_valid:\n        IMPLICIT_ERRORS.inc()  # 200 OK but wrong data — worse than clean error\n    elif latency_ms > 2000:  # SLO threshold\n        POLICY_ERRORS.inc()   # Correct but unacceptably slow\n\n# Dashboard: unified error rate = sum of all three types\n"
  example_bad: "# Anti-pattern: only tracking HTTP 5xx as errors\ndef count_errors(status: int):\n    if status >= 500:\n        errors_total.inc()\n    # Misses: 200 OK with empty body (implicit failure)\n    # Misses: 200 OK with wrong user's data (data corruption)\n    # Misses: 200 OK in 30 seconds (policy violation)\n    # Green dashboards while users get wrong data and slow responses\n"
  when_applies: "When defining what counts as an error for monitoring purposes, beyond just HTTP status codes"
  sources:
  - url: https://sre.google/sre-book/monitoring-distributed-systems/
    title: 'Google SRE Book — Chapter 6: Monitoring Distributed Systems'
  validation_status: cross_checked
- id: CR-SRE-MON-008
  text: Kill email alerts entirely. They are never read, never acted upon, and create a false sense of monitoring. If an alert is not worth a page or a ticket, it is not worth an alert.
  why: 'Google''s experience is unambiguous on this point: email alerts are the worst of all worlds. They are too noisy to be actionable (hundreds per day), too easy to filter/ignore (engineers create inbox
    rules to auto-archive them), and they create a false sense of security ("we have alerting" — but no one reads it). When an incident occurs and someone asks "why did we not catch this?", the answer is
    often "there was an email alert but it was filtered." Google eliminated email alerts in favor of a strict two-tier system: pages (urgent, interrupt the engineer) and tickets (non-urgent, queued for
    business hours). Everything else goes to dashboards where it can be reviewed proactively, not reactively. This simple change dramatically improved alert signal-to-noise ratio.

    '
  how_to_do_right: '1. Audit all email alerts: for each one, ask "Would someone take action within 24 hours of receiving this?" If no, delete it.

    2. If the alert is urgent and actionable → convert to a page.

    3. If the alert is important but not urgent → convert to a ticket in your queue.

    4. If the alert is informational → add it to a dashboard, delete the email alert.

    5. Never create new email alerts. The only valid notification tiers are: page (now), ticket (soon), dashboard (when you look).

    6. Track the volume of email alerts — if it exceeds 10/day, the team has lost the ability to act on any of them.

    '
  severity: high
  technologies:
    platform: [pagerduty, prometheus]
  domains:
    domain: [observability, operations, reliability]
    concern: [monitoring, on_call]
  example_good: "# Strict two-tier notification system: page or ticket\nfrom enum import Enum\n\nclass AlertTier(Enum):\n    PAGE = 'page'        # Urgent, interrupt engineer NOW\n    TICKET = 'ticket'    # Important, queue for business hours\n    DASHBOARD = 'dashboard'  # Informational, review proactively\n\ndef classify_alert(alert: dict) -> AlertTier:\n    if alert.get('user_impact_now'):\n        return AlertTier.PAGE\n    if alert.get('needs_action_24h'):\n        return AlertTier.TICKET\n    return AlertTier.DASHBOARD\n\n# NO EMAIL ALERTS — they are never read, never acted upon\n# If it is not worth a page or ticket, it is not worth an alert\n"
  example_bad: "# Anti-pattern: email alerts\ndef send_alert(alert):\n    send_email(team_list, alert)  # 200 emails/day\n    # Engineers create inbox filter: auto-archive all monitoring emails\n    # 'Why did we not catch this?' — 'There was an email but it was filtered'\n    # False sense of security: 'We have alerting' — but no one reads it\n"
  when_applies: "When reviewing notification channels and eliminating email-based alerting that creates false confidence in monitoring coverage"
  sources:
  - url: https://sre.google/sre-book/monitoring-distributed-systems/
    title: 'Google SRE Book — Chapter 6: Monitoring Distributed Systems'
  validation_status: cross_checked
- id: CR-SRE-MON-009
  text: Monitoring rules should be simple enough that anyone on the team can understand them in 30 seconds. Complex alerting logic with multiple conditions and exceptions becomes untestable, unmaintainable,
    and ultimately untrustworthy.
  why: 'Google found that monitoring rules accumulate complexity over time. Each incident adds a new condition, each false positive adds an exception, and eventually the alerting rule becomes a 20-line
    boolean expression that no one fully understands. When this rule fires at 3 AM, the on-call engineer spends 10 minutes understanding the alert before they can even begin understanding the incident.
    Worse, complex rules have their own bugs — they fire when they should not and miss when they should fire. The SRE Book recommends keeping rules simple and predictable: "If a rule detects a real incident
    only 50% of the time... it''s not worth having." Simple rules (error rate > X for Y minutes) are testable, explainable, and maintainable. Complexity should live in dashboards and investigation tools,
    not in alerting rules.

    '
  how_to_do_right: '1. Each alerting rule should be expressible in one sentence: "Error rate exceeds 1% for 5 consecutive minutes."

    2. If a rule has more than 2 conditions (AND/OR), split it into separate simpler rules or redesign.

    3. Avoid exceptions in alerting rules ("alert on X unless Y unless Z"). Exceptions create maintenance nightmares.

    4. Delete rules that fire less than once per quarter — they are testing edge cases that do not happen.

    5. Every rule should have a clear owner and a runbook link. Orphan alerts become zombie alerts.

    6. Test alerting rules: inject failures and verify the alert fires correctly. Rules you never test are rules you cannot trust.

    '
  severity: high
  technologies:
