layer: rules
technology: SRE
domain: incident_management
knowledge:
- id: CR-SRE-POST-001
  text: Postmortems MUST be blameless. "Everyone involved had good intentions and did the right thing with the information
    they had." A blame culture drives incidents underground — engineers hide mistakes instead of fixing systems.
  why: 'Google borrowed this principle from healthcare and aviation — two industries where blame culture literally kills people.
    In a blame culture, engineers learn to hide near-misses, avoid reporting incidents, and cover their tracks. This means
    the organization loses the signal it needs to improve. Google found that the most valuable postmortems came from engineers
    who honestly described their decision-making process, including mistakes. When an engineer says "I pushed the config change
    without canarying because I was under time pressure and believed it was low risk," the organization can fix the system
    (add canary enforcement) rather than punishing the person. A punitive response would mean the next engineer makes the
    same mistake but hides it. Google explicitly states: "An atmosphere of blame risks creating a culture in which incidents
    and issues are swept under the rug, leading to greater risk."

    '
  how_to_do_right: '1. Blame the SYSTEM, not the person. Every postmortem should conclude with system changes, not personnel
    actions.

    2. Use language that focuses on events, not actors: "The config was pushed without canary" not "John pushed without canary."

    3. Leadership must model blamelessness — if a VP asks "who did this?" in a postmortem review, blameless culture is dead.

    4. Celebrate engineers who write honest, self-critical postmortems. Public recognition reinforces the desired behavior.

    5. Ask "What systemic factors allowed this to happen?" not "Who made the mistake?"

    6. If you find yourself writing "Engineer X should have known better," stop. Redesign the system so the error is impossible.

    '
  example_good: "# Blameless postmortem focusing on systemic improvements\nclass BlamelessPostmortem:\n    def write_root_cause(self, incident: Incident) -> str:\n        # Focus on events and systems, not actors\n        return (\n            f\"The config change was deployed without canary validation. \"\n            f\"The deployment pipeline lacked canary enforcement for config changes. \"\n            f\"Action: Add automated canary gate for all config deployments.\"\n        )\n\n    def review(self, doc: PostmortemDoc):\n        for sentence in doc.sentences():\n            if self._blames_person(sentence):\n                raise BlamefulLanguageError(\n                    f\"Rewrite to focus on system: '{sentence}'\"\n                )\n\n    def _blames_person(self, sentence: str) -> bool:\n        blame_patterns = [\"should have known\", \"failed to\", \"forgot to\"]\n        return any(p in sentence.lower() for p in blame_patterns)\n"
  example_bad: "# Blame-focused postmortem that drives incidents underground\ndef write_postmortem(incident):\n    doc = f\"Root cause: John pushed the config change without testing.\\n\"\n    doc += f\"John should have known better.\\n\"\n    doc += f\"Action item: John will be more careful next time.\\n\"\n    # Result: next engineer hides their mistake instead of reporting it\n    # The system that allowed the error is never fixed\n    return doc\n"
  when_applies: When writing or reviewing postmortems after production incidents, especially when there is pressure to identify individuals rather than systemic causes.
  severity: critical
  technologies:
    lang: [general]
  domains:
    domain: [management, culture, operations, reliability]
    concern: [incident_response, postmortem]
  sources:
  - url: https://sre.google/sre-book/postmortem-culture/
    title: 'Google SRE Book — Chapter 15: Postmortem Culture: Learning from Failure'
  validation_status: cross_checked
- id: CR-SRE-POST-002
  text: Define postmortem triggers BEFORE incidents occur — not after. If the decision to write a postmortem is made post-hoc,
    politics and fatigue will ensure that the most important ones are never written.
  why: 'Google defines explicit criteria that automatically trigger a postmortem, removing human judgment from the decision.
    Their triggers include: user-visible downtime exceeding a threshold, any data loss, on-call engineer intervention required
    (rollbacks, traffic rerouting), resolution time exceeding acceptable limits, monitoring failure that required manual incident
    discovery, and any event where a stakeholder requests a review. The key insight is that the criteria are defined during
    calm planning time, not during the post-incident period when engineers are exhausted and want to move on. Without pre-defined
    triggers, teams consistently under-report: "It wasn''t that bad," "We already know what happened," "We''re too busy to
    write it up." These are exactly the incidents that produce the most valuable postmortems.

    '
  how_to_do_right: '1. Define triggers in writing and publish them team-wide. Examples: >5 min downtime, any data loss, any
    rollback, >1 hour to resolve.

    2. Make postmortem writing automatic when triggers are met — not a decision. "The trigger was hit, so we write one."

    3. Include "monitoring failure" as a trigger — incidents discovered by users (not alerts) are ALWAYS postmortem-worthy.

    4. Include "stakeholder request" as a trigger — any team member can request a postmortem without justification.

    5. Track postmortem completion rate: triggers hit / postmortems written. If < 90%, the process is broken.

    6. Write the postmortem within 48 hours. After 72 hours, critical details are lost.

    '
  example_good: "# Pre-defined postmortem triggers — no human judgment needed\nPOSTMORTEM_TRIGGERS = [\n    lambda i: i.downtime_minutes > 5,\n    lambda i: i.data_loss,\n    lambda i: i.required_rollback,\n    lambda i: i.resolution_minutes > 60,\n    lambda i: i.detected_by == \"user_report\",  # Monitoring failed\n    lambda i: i.stakeholder_requested,\n]\n\ndef check_postmortem_required(incident: Incident) -> bool:\n    \"\"\"Automatic check — no discretion, no politics.\"\"\"\n    triggered = any(t(incident) for t in POSTMORTEM_TRIGGERS)\n    if triggered:\n        log.info(f\"Postmortem REQUIRED for {incident.id} — trigger matched\")\n        create_postmortem_ticket(incident, deadline_hours=48)\n    return triggered\n"
  example_bad: "# Post-hoc decision whether to write a postmortem\ndef maybe_write_postmortem(incident):\n    # Team is exhausted after the incident\n    if input(\"Should we write a postmortem? (y/n): \") == \"n\":\n        pass  # \"It wasn't that bad\"\n    # The incidents that MOST need postmortems are the ones\n    # where exhausted engineers say \"let's skip it\"\n"
  when_applies: When establishing incident response processes and deciding which incidents warrant formal postmortem documentation.
  severity: high
  technologies:
    lang: [general]
  domains:
    domain: [operations, reliability]
    concern: [incident_response, postmortem]
  sources:
  - url: https://sre.google/sre-book/postmortem-culture/
    title: 'Google SRE Book — Chapter 15: Postmortem Culture: Learning from Failure'
  validation_status: cross_checked
- id: CR-SRE-POST-003
  text: A postmortem without action items is just storytelling. Every postmortem must produce concrete, prioritized, owned,
    and deadline-bound action items that prevent recurrence. If the same incident can happen again after the postmortem, the
    postmortem failed.
  why: 'Google requires senior engineer review of every postmortem specifically to verify that action items are concrete and
    sufficient. The review checklist includes: key incident data is preserved, impact is fully documented, root cause analysis
    is thorough, action items are appropriately prioritized, and stakeholders have been communicated with. The most common
    postmortem failure is vague action items: "improve monitoring," "be more careful with config changes," "add more tests."
    These feel productive but change nothing. Google''s standard: every action item must be specific enough that completion
    can be objectively verified. "Add latency SLO alert for service X at P99 > 200ms" is verifiable. "Improve monitoring"
    is not. Action items that languish unfinished are tracked and escalated — because an unfinished action item from a past
    postmortem is a guaranteed future incident.

    '
  how_to_do_right: '1. Every action item must be: specific (what exactly), owned (who), deadline-bound (by when), and verifiable
    (how to confirm done).

    2. BAD: "Improve monitoring." GOOD: "Add P99 latency alert for /api/checkout at >500ms threshold, owned by Alice, due
    March 15."

    3. Senior engineer review must verify action items are sufficient to prevent recurrence.

    4. Track action item completion rate. Items open > 30 days need escalation.

    5. Review outstanding action items from past postmortems quarterly. Unfinished items = active risk.

    6. Prioritize action items: P0 (prevents recurrence), P1 (reduces blast radius), P2 (improves detection).

    '
  example_good: "# Concrete, owned, deadline-bound, verifiable action items\nclass PostmortemActionItem:\n    def __init__(self, description: str, owner: str, deadline: date, verification: str, priority: str):\n        assert description, \"Description required\"\n        assert owner, \"Owner required\"\n        assert deadline, \"Deadline required\"\n        assert verification, \"Verification criteria required\"\n        self.description = description\n        self.owner = owner\n        self.deadline = deadline\n        self.verification = verification\n        self.priority = priority  # P0=prevent recurrence, P1=reduce blast, P2=improve detection\n\n# GOOD example:\nitem = PostmortemActionItem(\n    description=\"Add P99 latency alert for /api/checkout at >500ms threshold\",\n    owner=\"alice@company.com\",\n    deadline=date(2026, 3, 15),\n    verification=\"Alert fires when synthetic prober exceeds 500ms\",\n    priority=\"P0\",\n)\n"
  example_bad: "# Vague action items that change nothing\npostmortem_actions = [\n    \"Improve monitoring\",       # What monitoring? What improvement?\n    \"Be more careful\",          # Not actionable\n    \"Add more tests\",           # Which tests? For what?\n    \"Review the process\",       # No owner, no deadline\n]\n# 3 months later: none completed, same incident occurs\n"
  when_applies: When writing postmortem action items or reviewing existing postmortems to ensure action items are specific, owned, and verifiable enough to prevent incident recurrence.
  severity: high
  technologies:
    lang: [general]
  domains:
    domain: [operations, reliability]
    concern: [incident_response, postmortem]
  sources:
  - url: https://sre.google/sre-book/postmortem-culture/
