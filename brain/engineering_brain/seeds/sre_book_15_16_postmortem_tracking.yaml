- id: CR-SRE-POST-004
  text: Use the "Wheel of Misfortune" — simulate past outages as training exercises for new SREs. Reading postmortems teaches
    theory. Playing through an incident with real-time decisions teaches judgment.
  why: 'Google created the "Wheel of Misfortune" as an educational exercise where new SREs role-play through actual past incidents.
    A facilitator presents the scenario as it unfolded in real-time, and the trainee must make decisions with incomplete information
    — just like in a real incident. This is dramatically more effective than reading postmortems because it forces the engineer
    to experience the cognitive pressure, time constraints, and uncertainty of incident response. They learn that their first
    hypothesis is often wrong, that communication is harder than it seems, and that the "obvious" fix in the postmortem was
    not obvious in real-time. Google also uses postmortem reading clubs where teams discuss past incidents from other teams
    — building cross-team awareness of failure modes.

    '
  how_to_do_right: '1. Maintain a curated library of past incidents suitable for role-play (variety of severity, types, systems).

    2. Run "Wheel of Misfortune" sessions monthly. New SREs participate; senior SREs facilitate.

    3. The facilitator reveals information progressively, simulating real-time discovery. No spoilers.

    4. After the simulation, compare the trainee''s response with the actual incident timeline.

    5. Focus the debrief on decision-making, not technical trivia: "Why did you investigate X before Y?"

    6. Complement with postmortem reading clubs: monthly sessions where the team discusses a postmortem from another team.

    '
  example_good: "# Wheel of Misfortune — role-play past incidents\nclass WheelOfMisfortune:\n    def __init__(self, incident_library: list[PastIncident]):\n        self.incidents = incident_library\n\n    def run_session(self, trainee: SRE, facilitator: SRE):\n        incident = random.choice(self.incidents)\n        sim = IncidentSimulation(incident)\n        # Facilitator reveals info progressively — no spoilers\n        while not sim.resolved:\n            clue = sim.next_clue()\n            facilitator.present(clue)\n            action = trainee.decide()  # What would you do?\n            sim.apply_action(action)\n        # Debrief: compare trainee decisions with actual timeline\n        debrief = sim.compare_with_actual()\n        log.info(f\"Session complete — decision quality: {debrief.score}\")\n        return debrief\n"
  example_bad: "# Onboarding: just hand new SREs the postmortem docs\ndef onboard_new_sre(engineer):\n    # \"Here, read these 50 postmortems\"\n    docs = postmortem_db.get_all()\n    email(engineer, \"Please read these postmortems\", attachments=docs)\n    # No role-play, no simulation, no decision-making practice\n    # New SRE reads summaries but never experiences the pressure\n    # First real incident: freezes under pressure\n"
  when_applies: When onboarding new SREs, training incident response skills, or maintaining team readiness for production incidents through simulated exercises.
  severity: medium
  technologies:
    lang: [general]
  domains:
    domain: [management, culture, operations, reliability]
    concern: [incident_response]
  sources:
  - url: https://sre.google/sre-book/postmortem-culture/
    title: 'Google SRE Book — Chapter 15: Postmortem Culture: Learning from Failure'
  validation_status: cross_checked
- id: CR-SRE-TRACK-001
  text: Aggregate alerts into incidents, not individual notifications. A single network failure can trigger 50 alerts across
    20 services — an engineer must see 1 incident, not 50 alerts. Without aggregation, alert fatigue destroys the signal.
  why: 'Google''s Outalator system automatically groups multiple alerts from a single event into one "incident" entity. This
    is critical because infrastructure failures cascade: a network switch failure triggers alerts from every service behind
    that switch. A database failure triggers alerts from every application that depends on it. Without aggregation, the on-call
    engineer''s pager explodes with 50 notifications, each demanding attention. They spend 20 minutes triaging and grouping
    alerts instead of investigating the root cause. With aggregation, they see one incident: "Network switch X failed — affecting
    services A, B, C, D" — and can immediately focus on the switch. Google found that alert aggregation reduced mean time
    to diagnosis significantly because engineers started with the right scope instead of piecing together the picture from
    fragments.

    '
  how_to_do_right: '1. Group alerts by time window (alerts within 5 min of each other are likely the same incident) and dependency
    (alerts from services that share infrastructure).

    2. Show the aggregated incident as a single entity with all component alerts visible but collapsed.

    3. Track "alerts per incident" as a metric. If the average exceeds 3, improve your grouping.

    4. Use dependency maps to automatically associate alerts: if database X is down, suppress or associate all alerts from
    services that depend on X.

    5. Allow manual annotation: engineers can add context to incidents that automated grouping misses.

    6. Distinguish between actual incidents and false positives/test events — tag them differently.

    '
  example_good: "# Alert aggregation into incidents\nclass AlertAggregator:\n    TIME_WINDOW_SEC = 300  # 5-minute grouping window\n\n    def process_alert(self, alert: Alert) -> Incident:\n        # Check if alert belongs to existing incident\n        existing = self.find_related_incident(\n            alert,\n            time_window=self.TIME_WINDOW_SEC,\n            dependency_map=self.dep_map,\n        )\n        if existing:\n            existing.add_alert(alert)\n            log.info(f\"Alert grouped into incident {existing.id}\")\n            return existing\n        # New incident\n        incident = Incident(root_alert=alert)\n        # Auto-associate downstream alerts using dependency map\n        if alert.component in self.dep_map:\n            incident.suppress_downstream(self.dep_map[alert.component])\n        return incident\n"
  example_bad: "# Every alert is a separate notification — alert fatigue\ndef on_alert(alert):\n    # Network switch fails → 50 separate pages\n    pagerduty.page(on_call, alert.message)\n    # On-call spends 20 minutes grouping alerts manually\n    # Instead of investigating the root cause (the switch)\n    # Each alert looks equally urgent\n    # Signal is lost in noise\n"
  when_applies: When building or configuring alerting systems for distributed services where a single infrastructure failure can trigger cascading alerts from multiple dependent services.
  severity: high
  technologies:
    platform: [pagerduty, prometheus]
  domains:
    domain: [observability, operations, reliability]
    concern: [incident_response]
  sources:
  - url: https://sre.google/sre-book/tracking-outages/
    title: 'Google SRE Book — Chapter 16: Tracking Outages'
  validation_status: cross_checked
- id: CR-SRE-TRACK-002
  text: Improving reliability requires a known baseline and measurable progress. Track incidents per week, alerts per incident,
    MTTR, and team comparisons over time. Without these metrics, "we're getting better" is just a feeling, not a fact.
  why: 'Google''s outage tracking philosophy is that postmortems alone are insufficient because they only cover high-impact
    incidents, missing frequent but individually small issues that collectively degrade reliability. Systematic tracking enables
    pattern identification: which infrastructure components cause the most disruptions, which teams have the highest incident
    rates, which services need reliability investment. Google tracks incidents per week/month/quarter, alerts per incident,
    team/service comparisons, and infrastructure component failure rates. This data drives resource allocation: if network
    switch failures cause 40% of incidents, investing in network redundancy has 10x more impact than improving application
    error handling. Without a baseline, reliability improvements are invisible and unfunded.

    '
  how_to_do_right: '1. Track these minimum metrics: incidents/week, MTTD (detect), MTTR (resolve), alerts/incident, incidents
    by root cause category.

    2. Report metrics monthly to leadership. Trends matter more than absolute numbers.

    3. Use free-form tagging (e.g., "cause:network:switch") instead of rigid categories — flexibility produces more useful
    data.

    4. Compare metrics across teams and services to identify outliers (both good and bad).

    5. Identify systemic issues: if 3 different teams are affected by the same infrastructure component, that''s a cross-team
    problem.

    6. Set reliability improvement goals tied to metrics: "Reduce incidents/week from 5 to 3 by Q4."

    '
  example_good: "# Systematic reliability metrics tracking\nclass ReliabilityTracker:\n    def record_incident(self, incident: Incident):\n        self.metrics.increment(\"incidents_total\", tags={\n            \"service\": incident.service,\n            \"root_cause\": incident.root_cause_category,\n            \"severity\": incident.severity,\n        })\n        self.metrics.observe(\"mttd_seconds\", incident.time_to_detect.total_seconds())\n        self.metrics.observe(\"mttr_seconds\", incident.time_to_resolve.total_seconds())\n        self.metrics.observe(\"alerts_per_incident\", len(incident.alerts))\n\n    def monthly_report(self) -> ReliabilityReport:\n        return ReliabilityReport(\n            incidents_per_week=self.metrics.rate(\"incidents_total\", period=\"week\"),\n            avg_mttd=self.metrics.avg(\"mttd_seconds\"),\n            avg_mttr=self.metrics.avg(\"mttr_seconds\"),\n            top_root_causes=self.metrics.top_k(\"root_cause\", k=5),\n            trend=self.metrics.compare_with_previous_month(),\n        )\n"
  example_bad: "# No metrics — reliability improvement is just a feeling\ndef handle_incident(incident):\n    fix(incident)\n    # No tracking of MTTD, MTTR, or root cause category\n    # No comparison across teams or services\n    # \"Are we getting better?\" — \"I think so, feels like fewer pages\"\n    # No data to justify reliability investment to leadership\n    # Same root cause recurs because no one tracks patterns\n"
  when_applies: When establishing reliability baselines, justifying reliability investments, or comparing incident metrics across teams and services over time.
  severity: high
  technologies:
    lang: [general]
    platform: [grafana, prometheus]
