layer: rules
technology: SRE
domain: reliability
knowledge:
- id: CR-SRE-DEBUG-001
  text: In a major outage, triage FIRST — stabilize the system before investigating root cause. Your instinct to debug immediately
    is wrong. Divert traffic, reduce load, or freeze changes first, THEN investigate.
  why: 'Google explicitly warns against the natural instinct to immediately start debugging during an outage. The SRE Book
    states: "your first response in a major outage may be to start troubleshooting and try to find a root cause as quickly
    as possible. Ignore that instinct!" The reason is that debugging takes time, and every minute spent investigating is a
    minute where users are impacted. Emergency measures (traffic diversion to a healthy datacenter, rollback to last-known-good,
    load shedding, circuit breaker activation) can stabilize the system in minutes — even without understanding the root cause.
    Root cause analysis can happen AFTER the system is stable. Google saw many incidents where engineers spent 30 minutes
    debugging while users suffered, when a 2-minute rollback would have restored service immediately.

    '
  how_to_do_right: '1. First 5 minutes: assess blast radius (how many users affected?) and apply emergency measures (rollback,
    traffic shift, load shed).

    2. Do NOT start debugging until the system is stabilized or emergency measures are applied.

    3. Have pre-planned emergency actions for each service: "If service X is down, do Y" — documented in runbooks before the
    incident.

    4. Rollback is almost always the fastest mitigation. If the last deployment is < 24 hours old, rollback first, investigate
    second.

    5. Communicate to stakeholders: "We have stabilized the system, impact is reduced, and we are now investigating root cause."

    6. After stabilization, root cause analysis can proceed calmly — without the pressure of ongoing user impact.

    '
  severity: critical
  technologies:
    lang: [general]
    platform: [cloud, kubernetes]
  domains:
    domain: [operations, reliability]
    concern: [incident_response, detection]
  example_good: "# Triage first — stabilize before debugging\nimport time\n\ndef incident_response(service: str, severity: str):\n    \"\"\"First 5 minutes: stabilize. THEN investigate.\"\"\"\n    start = time.time()\n\n    # Phase 1: TRIAGE (first 5 minutes)\n    blast_radius = assess_blast_radius(service)\n    print(f'Blast radius: {blast_radius[\"affected_users_pct\"]}% of users')\n\n    # Apply emergency measures BEFORE debugging\n    if last_deploy_age_hours(service) < 24:\n        rollback(service)  # 2-minute fix — do not debug first\n        print('Rollback applied. Investigating root cause...')\n    elif blast_radius['affected_users_pct'] > 50:\n        shift_traffic_to_healthy_dc(service)\n\n    # Phase 2: ROOT CAUSE (only after stabilization)\n    elapsed = time.time() - start\n    print(f'System stabilized in {elapsed:.0f}s. Now investigating root cause.')\n    investigate_root_cause(service)\n"
  example_bad: "# Anti-pattern: debug first, stabilize later\ndef incident_response_wrong(service: str):\n    # Instinct: start debugging immediately\n    check_logs(service)         # 10 minutes\n    check_metrics(service)      # 10 minutes\n    review_recent_changes()     # 10 minutes\n    # 30 minutes spent debugging while users are impacted\n    # A 2-minute rollback would have restored service immediately\n    # Root cause analysis can happen AFTER stabilization\n"
  when_applies: "When responding to a major outage, to resist the instinct to debug immediately and instead stabilize the system first"
  sources:
  - url: https://sre.google/sre-book/effective-troubleshooting/
    title: 'Google SRE Book — Chapter 12: Effective Troubleshooting'
  validation_status: cross_checked
- id: CR-SRE-DEBUG-002
  text: Check recent changes first — they are the most likely cause. Deployments, config changes, dependency updates, and
    infrastructure modifications within the last 24-48 hours should be the first suspects in any investigation.
  why: 'Google''s experience is that the vast majority of production incidents are caused by recent changes, not by spontaneous
    system failures. A service that ran fine for 6 months does not randomly break — something changed. The most common change
    types that cause incidents: code deployments (new bugs), configuration changes (wrong values), dependency updates (incompatible
    versions), infrastructure changes (network, DNS, load balancer), and traffic pattern shifts (new client behavior). Google
    recommends a "what changed?" query as the FIRST diagnostic step. If nothing changed in the last 48 hours, the investigation
    shifts to external factors (upstream dependencies, infrastructure, traffic) and then to slow-building issues (memory leaks,
    disk filling, certificate expiration).

    '
  how_to_do_right: '1. Maintain a central change log that records ALL production changes: deploys, config changes, infra modifications,
    dependency updates.

    2. First diagnostic step: query the change log for the last 48 hours. Correlate change timestamps with symptom onset.

    3. If a deployment occurred within 1 hour of symptom onset, treat it as the probable cause and rollback before further
    investigation.

    4. Include automated changes (auto-scaling events, certificate rotations, cache invalidations) in the change log — they
    cause incidents too.

    5. Track "mean time to identify root cause" — most of this time is spent investigating the wrong hypothesis. Starting
    with recent changes shortens it.

    6. For recurring incidents, create an automated check: "Did anything change in the last N hours?" as the first runbook
    step.

    '
  severity: critical
  technologies:
    lang: [general]
    platform: [deployment, kubernetes]
  domains:
    domain: [operations, reliability]
    concern: [incident_response, detection]
  example_good: "# Check recent changes first — most likely cause\nfrom datetime import datetime, timedelta\n\ndef diagnose_incident(service: str) -> dict:\n    \"\"\"First diagnostic step: what changed recently?\"\"\"\n    cutoff = datetime.utcnow() - timedelta(hours=48)\n    changes = get_change_log(service, since=cutoff)\n\n    # Categorize changes by type\n    recent = {\n        'deployments': [c for c in changes if c['type'] == 'deploy'],\n        'config_changes': [c for c in changes if c['type'] == 'config'],\n        'dependency_updates': [c for c in changes if c['type'] == 'dependency'],\n        'infra_changes': [c for c in changes if c['type'] == 'infrastructure'],\n    }\n\n    # If deployment within 1 hour of symptoms: probable cause\n    for deploy in recent['deployments']:\n        if deploy['age_hours'] < 1:\n            return {'probable_cause': deploy, 'action': 'ROLLBACK_FIRST'}\n\n    return {'changes': recent, 'action': 'INVESTIGATE_FURTHER'}\n"
  example_bad: "# Anti-pattern: investigating random hypotheses without checking changes\ndef diagnose_wrong(service: str):\n    check_dns()           # Unlikely — nothing changed\n    check_cosmic_rays()   # Very unlikely\n    check_gc_pauses()     # Possible but unlikely\n    # 2 hours later: 'Oh, someone deployed 30 minutes before the incident'\n    # Should have been the FIRST thing checked\n    # Most incidents are caused by recent changes, not spontaneous failures\n"
  when_applies: "When beginning incident investigation, to prioritize checking recent changes (deployments, config, dependencies) before exploring other hypotheses"
  sources:
  - url: https://sre.google/sre-book/effective-troubleshooting/
    title: 'Google SRE Book — Chapter 12: Effective Troubleshooting'
  validation_status: cross_checked
- id: CR-SRE-DEBUG-003
  text: Correlation is not causation — especially in complex distributed systems. With enough metrics, spurious correlations
    are inevitable. Test your hypotheses with experiments, do not assume the first correlation you find is the cause.
  why: 'Google warns extensively about this trap because distributed systems generate enormous quantities of metrics, and
    with enough data, coincidental correlations always exist. The SRE Book cites an absurd example: PhD awards in Computer
    Science correlating with per capita cheese consumption at r²=0.9416. In a production incident, an engineer might notice
    that error rate increased at the same time as a spike in GC pauses — and conclude GC is the cause. But both might be caused
    by a third factor (traffic spike causing both more errors and more memory pressure). Or the GC spike might be completely
    unrelated (a periodic compaction job). Google''s approach: form a hypothesis, design a test with mutually exclusive outcomes,
    execute the test, and let the result confirm or refute the hypothesis. This is the scientific method applied to debugging.

    '
  how_to_do_right: '1. When you find a correlation: before acting on it, ask "What else could explain both of these symptoms?"

    2. Design a test that distinguishes causation from correlation: "If GC pauses are the cause, reducing heap size should
    worsen errors."

    3. Test the simplest hypothesis first (Occam''s Razor): "the most recent deployment broke something" before "a cosmic
    ray flipped a bit."

    4. Accept that systems can have multiple simultaneous problems — the first cause you find may not be the ONLY cause.

    5. Document all tested hypotheses (including failed ones) in the incident timeline — they prevent future investigators
    from repeating the same dead ends.

    6. When stuck, change NOTHING and just observe — passive observation often reveals patterns that active intervention obscures.

    '
  severity: high
  technologies:
    lang: [general]
  domains:
    domain: [operations, reliability]
    concern: [incident_response, detection]
  example_good: "# Test hypotheses with experiments, not assumptions\ndef test_hypothesis(hypothesis: str, test: str, expected_if_true: str,\n                    expected_if_false: str) -> dict:\n    \"\"\"Scientific method applied to debugging.\"\"\"\n    print(f'Hypothesis: {hypothesis}')\n    print(f'Test: {test}')\n    print(f'If true: {expected_if_true}')\n    print(f'If false: {expected_if_false}')\n\n    result = execute_test(test)\n    confirmed = result == expected_if_true\n    return {\n        'hypothesis': hypothesis,\n        'confirmed': confirmed,\n        'evidence': result,\n        'next_step': 'Act on it' if confirmed else 'Test next hypothesis',\n    }\n\n# Example: 'GC pauses cause latency spikes'\n# Test: reduce heap -> if latency worsens, GC is the cause\n# If latency unchanged -> GC is correlated, not causal\n# Document ALL tested hypotheses (including failed ones)\n"
  example_bad: "# Anti-pattern: acting on first correlation found\ndef debug_incident():\n    # Error rate spiked at same time as GC pauses\n    # Correlation! Must be GC causing errors!\n    tune_gc_parameters()  # 2 hours of work\n    # Errors persist — GC was coincidental, not causal\n    # Both were caused by a traffic spike (third factor)\n    # With enough metrics, spurious correlations are inevitable\n    # PhD CS awards correlate with cheese consumption at r²=0.94\n"
  when_applies: "When investigating production incidents where correlations between metrics may be coincidental rather than causal"
  sources:
  - url: https://sre.google/sre-book/effective-troubleshooting/
    title: 'Google SRE Book — Chapter 12: Effective Troubleshooting'
  validation_status: cross_checked
- id: CR-SRE-DEBUG-004
  text: Build observability INTO systems from the start — not bolted on after an incident. Unique request IDs across RPC chains,
    structured logging, variable verbosity, and exposed internal state are not luxuries. They are required infrastructure.
  why: 'Google''s troubleshooting effectiveness is directly proportional to system observability. The App Engine case study
    in the SRE Book illustrates this perfectly: a 250ms latency increase went undiagnosed because the tracing system only
    captured RPC calls, missing the 250ms spent in an untraced caching layer. Only after developers added instrumentation
    to that layer was the root cause discovered (security scanner creating thousands of spurious whitelist objects). The lesson:
    you cannot troubleshoot what you cannot see. Google mandates observability as a design requirement: every service must
    expose metrics, emit structured logs with request IDs, support distributed tracing, and have endpoints showing current
    configuration and internal state. Adding these after an incident is expensive, disruptive, and always incomplete.

    '
  how_to_do_right: '1. Every request must carry a unique trace ID from entry to exit — propagated through all RPC calls, database
    queries, and queue messages.

    2. Structured logging (JSON, not free text): every log line includes timestamp, trace ID, operation, duration, status,
    and relevant parameters.

    3. Support dynamic verbosity: ability to increase logging detail for specific requests, users, or code paths without restarting
    the service.

    4. Expose internal state endpoints: current configuration, recent RPCs with latencies, error rates, cache hit rates, connection
    pool usage.

    5. Design metrics with debugging in mind: if you cannot answer "why is latency high?" from metrics alone, you are missing
    a metric.

    6. Include observability requirements in design reviews and production readiness reviews — not as an afterthought.

    '
  severity: critical
  technologies:
    lang: [general]
    platform: [jaeger, opentelemetry, prometheus]
  domains:
    domain: [observability, operations, reliability]
    concern: [incident_response, detection]
  example_good: "# Built-in observability from the start\nimport structlog\nimport uuid\n\nlogger = structlog.get_logger()\n\ndef handle_request(request):\n    # Unique trace ID propagated through entire RPC chain\n    trace_id = request.headers.get('X-Trace-ID', str(uuid.uuid4()))\n\n    # Structured logging (JSON, not free text)\n    logger.info('request_received',\n                trace_id=trace_id,\n                method=request.method,\n                path=request.path,\n                user_id=request.user_id)\n\n    # Dynamic verbosity: increase detail for specific users/requests\n    if should_debug(request.user_id):\n        logger.debug('detailed_context', trace_id=trace_id,\n                     headers=dict(request.headers),\n                     query_params=dict(request.query_params))\n\n    # Internal state endpoint: /debug/state\n    # Shows: config, recent RPCs, cache hit rates, connection pool usage\n"
  example_bad: "# Anti-pattern: observability added after incident\ndef handle_request(request):\n    result = process(request)\n    return result\n    # No trace ID — cannot follow request across services\n    # No structured logging — free text parsed with regex\n    # No dynamic verbosity — restart service to increase logging\n    # No internal state endpoint — SSH and grep logs\n    # 250ms latency increase went undiagnosed for weeks\n    # because the caching layer had no instrumentation\n"
  when_applies: "When designing new services or retrofitting observability, to ensure distributed tracing, structured logging, and internal state exposure are built in from day one"
  sources:
  - url: https://sre.google/sre-book/effective-troubleshooting/
    title: 'Google SRE Book — Chapter 12: Effective Troubleshooting'
  validation_status: cross_checked
- id: CR-SRE-DEBUG-005
  text: Negative results are valuable — document what you tested and ruled out, not just what you found. Failed hypotheses
    prevent future engineers from repeating the same dead-end investigations during similar incidents.
  why: 'Google explicitly promotes publishing negative results because they save enormous amounts of time across the organization.
    If an engineer spends 3 hours investigating a theory that turns out to be wrong, that knowledge is wasted unless documented.
    The next time a similar incident occurs, another engineer will test the same theory and waste the same 3 hours. At Google''s
    scale, this redundancy is extremely costly. The SRE Book extends this to postmortems: documenting "we investigated X and
    ruled it out because Y" is as valuable as documenting the actual root cause. Google also applies this to engineering projects:
    failed designs, rejected architectures, and disproven performance assumptions should be documented — they represent real
    knowledge about what does NOT work.

    '
  how_to_do_right: '1. In incident timelines, log ALL hypotheses tested — including those that were wrong — with the evidence
    that ruled them out.

    2. In postmortems, include a "ruled out" section listing investigated-but-incorrect theories.

    3. Make incident logs searchable: when a new incident occurs, search for similar past incidents to see what was already
    investigated.

    4. For engineering projects: document architectural decisions you rejected and why (Architecture Decision Records - ADRs).

    5. Create a team knowledge base of "things that look like X but are actually Y" — common red herrings specific to your
    systems.

    6. Praise engineers who document negative results — it is invisible work that saves visible time.

    '
  severity: medium
  technologies:
    lang: [general]
  domains:
    domain: [management, culture, operations, reliability]
    concern: [incident_response, detection]
  example_good: "# Document negative results — what was tested and ruled out\nclass IncidentTimeline:\n    def __init__(self, incident_id: str):\n        self.incident_id = incident_id\n        self.hypotheses = []\n\n    def test_hypothesis(self, hypothesis: str, result: str, evidence: str):\n        self.hypotheses.append({\n            'hypothesis': hypothesis,\n            'result': result,  # 'CONFIRMED' or 'RULED_OUT'\n            'evidence': evidence,\n        })\n\n    def ruled_out_report(self) -> list:\n        return [h for h in self.hypotheses if h['result'] == 'RULED_OUT']\n\ntimeline = IncidentTimeline('INC-2026-042')\ntimeline.test_hypothesis('GC pauses causing latency', 'RULED_OUT',\n                          'Heap reduced 50% — latency unchanged')\ntimeline.test_hypothesis('DNS resolution slow', 'RULED_OUT',\n                          'Direct IP connection shows same latency')\n# Saves next engineer 6 hours of repeating these dead ends\n"
  example_bad: "# Anti-pattern: only documenting the root cause\ndef postmortem(incident_id: str):\n    return {\n        'root_cause': 'Bad config push at 14:32',\n        # What about the 5 hypotheses tested before finding this?\n        # Next incident: another engineer tests same wrong hypotheses\n        # 3 hours wasted repeating dead-end investigations\n        # Failed designs and rejected architectures also undocumented\n    }\n"
  when_applies: "When writing postmortems or incident timelines, to preserve knowledge about ruled-out hypotheses that prevent future wasted investigation"
  sources:
  - url: https://sre.google/sre-book/effective-troubleshooting/
    title: 'Google SRE Book — Chapter 12: Effective Troubleshooting'
  validation_status: cross_checked
- id: CR-SRE-DEBUG-006
  text: Use bisection to narrow the failure space in large systems. Instead of investigating all N components sequentially,
    divide the system in half and determine which half contains the failure — reducing investigation from O(n) to O(log n).
  why: 'Google applies binary search to debugging because distributed systems have too many components for sequential investigation.
    A request that traverses 20 services cannot be debugged by checking each service one by one — that takes 20 steps. Bisection
    takes 5: is the failure before or after the midpoint service? Before? Is it in the first quarter or second quarter? And
    so on. This technique works at every level: between services (is the failure in the frontend or backend?), within a service
    (is the failure in request parsing or response generation?), and across time (did the failure start before or after the
    last deployment?). Google''s distributed tracing (Dapper) enables this by showing the request path and latency at each
    hop — the engineer can quickly identify which hop introduced the failure.

    '
  how_to_do_right: '1. Start wide: "Is the problem in the client, the network, or the server?" Narrow to one area.

    2. Bisect within that area: "Is the problem in service A or service B?" (where the request traverses A then B).

    3. Use distributed tracing to visualize the request path and identify the first hop with abnormal behavior.

    4. For temporal bisection: "Was the problem present before the last deployment?" If yes, it is not the deployment. If
    no, it is.

    5. For data bisection: "Does the problem affect all users or a subset?" If a subset, what differentiates the affected
    group?

    6. Document the bisection path: it creates a decision tree that can be reused for similar future incidents.

    '
  severity: high
  technologies:
    lang: [general]
    platform: [jaeger, opentelemetry]
  domains:
    domain: [operations, reliability]
    concern: [incident_response, detection]
  example_good: "# Bisection to narrow failure space in O(log n)\ndef bisect_failure(services: list[str], request_trace: dict) -> str:\n    \"\"\"Binary search for the failing service in a distributed system.\"\"\"\n    if len(services) <= 1:\n        return services[0] if services else 'unknown'\n\n    mid = len(services) // 2\n    first_half = services[:mid]\n    second_half = services[mid:]\n\n    # Check: is the failure in the first half or second half?\n    midpoint_service = services[mid]\n    if is_healthy_at(midpoint_service, request_trace):\n        # Problem is AFTER the midpoint\n        return bisect_failure(second_half, request_trace)\n    else:\n        # Problem is BEFORE or AT the midpoint\n        return bisect_failure(first_half, request_trace)\n\n# 20 services: 5 checks instead of 20 (O(log n) vs O(n))\n# Works across services, within a service, and across time\n# Document the bisection path as a reusable decision tree\n"
  example_bad: "# Anti-pattern: sequential investigation of all components\ndef find_failure(services: list[str]):\n    for service in services:  # Check each one sequentially\n        if not is_healthy(service):\n            return service\n    # 20 services = 20 checks in worst case\n    # Each check takes 5 minutes = 100 minutes\n    # Bisection would take 5 checks = 25 minutes\n    # Under pressure, sequential search wastes critical time\n"
  when_applies: "When debugging failures in distributed systems with many components, to reduce investigation time from O(n) to O(log n)"
  sources:
  - url: https://sre.google/sre-book/effective-troubleshooting/
    title: 'Google SRE Book — Chapter 12: Effective Troubleshooting'
  validation_status: cross_checked
