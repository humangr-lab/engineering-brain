layer: rules
technology: SRE
domain: architecture
knowledge:
- id: CR-SRE-SIMP-001
  text: Software simplicity is a prerequisite to reliability. Complex systems have more failure modes, longer debugging times,
    and higher change failure rates. If you cannot understand the system, you cannot reliably operate it.
  why: 'The SRE Book states this as a first principle, not a preference. Complex systems resist stability because they have
    more interaction points between components, each of which can fail in unexpected ways. A simple system with 5 components
    and 10 interactions has a manageable failure space. A complex system with 50 components and 200 interactions has an exponential
    failure space that no team can fully reason about. When incidents occur in complex systems, mean time to recovery (MTTR)
    is longer because engineers must first understand which of the many components and interactions failed. Google observed
    that the simplest services consistently had the highest reliability — not because they were less important, but because
    they were easier to understand, test, monitor, and fix.

    '
  how_to_do_right: '1. Before adding any component, library, or abstraction, ask: "Does this make the system simpler or more
    complex to operate at 3 AM?"

    2. Measure complexity: count components, dependencies, configuration parameters, code paths. Track these over time.

    3. Establish "complexity budgets" per service — maximum number of dependencies, maximum lines of configuration, maximum
    API surface area.

    4. Every quarter, identify and remove the most complex component that provides the least value.

    5. Prefer boring, well-understood technology over novel, complex technology — unless the complexity is essential to the
    business.

    6. In design reviews, treat added complexity as a cost that must be justified by proportional benefit.

    '
  severity: critical
  technologies:
    lang: [general]
    platform: [cloud]
  domains:
    domain: [architecture, reliability]
    concern: [simplicity]
  example_good: "# Simple system with minimal components and measurable complexity\nclass ServiceComplexityBudget:\n    MAX_DEPENDENCIES = 10\n    MAX_CONFIG_PARAMS = 20\n    MAX_API_ENDPOINTS = 15\n\n    def __init__(self, service: str):\n        self.service = service\n        self.dependencies = []\n        self.config_params = []\n        self.api_endpoints = []\n\n    def add_dependency(self, dep: str):\n        if len(self.dependencies) >= self.MAX_DEPENDENCIES:\n            raise ComplexityBudgetExceeded(\n                f'{self.service}: max {self.MAX_DEPENDENCIES} deps. '\n                f'Remove one before adding {dep}.')\n        self.dependencies.append(dep)\n\n    def complexity_score(self) -> int:\n        return len(self.dependencies) * len(self.api_endpoints)  # Interaction points\n\n# 'Does this make the system simpler or more complex to operate at 3 AM?'\n"
  example_bad: "# Anti-pattern: unchecked complexity growth\nclass Service:\n    dependencies = []  # Currently 47 dependencies\n    config_params = {}  # 200+ config parameters\n    api_endpoints = []  # 85 endpoints\n    # No complexity budget — anyone can add anything\n    # Failure space: 47 * 85 = ~4000 interaction points\n    # No one understands the full system\n    # MTTR is 4 hours because debugging requires understanding everything\n    # Every change risks unexpected interactions\n"
  when_applies: "When evaluating whether to add a new component, library, or abstraction to a service, especially in design reviews"
  sources:
  - url: https://sre.google/sre-book/simplicity/
    title: 'Google SRE Book — Chapter 9: Simplicity'
  validation_status: cross_checked
- id: CR-SRE-SIMP-002
  text: Distinguish essential complexity from accidental complexity. Essential complexity is inherent to the problem — you
    cannot eliminate it. Accidental complexity is introduced by engineering choices — you MUST eliminate it.
  why: 'Fred Brooks identified this distinction in 1986, and Google applies it rigorously. Serving web pages quickly has essential
    complexity: network protocols, caching, load balancing. These cannot be removed without losing the capability. But using
    a particular language that adds garbage collection pauses, or a particular framework that adds configuration complexity,
    or a particular deployment process that adds manual steps — these are accidental complexity. They exist because of implementation
    choices, not because of the problem itself. Google''s SRE teams are trained to ask: "Is this complexity required by what
    we are trying to DO, or by HOW we chose to do it?" Accidental complexity is a tax that you pay every time you debug, deploy,
    or modify the system — and it compounds as the system grows.

    '
  how_to_do_right: '1. For every complex component, ask: "Would a different implementation approach eliminate this complexity
    while achieving the same outcome?"

    2. If yes, it is accidental complexity. Plan its removal.

    3. If no, it is essential complexity. Accept it, but ensure it is well-documented and well-tested.

    4. Common sources of accidental complexity: over-engineered abstractions, premature optimization, cargo-culted patterns,
    unnecessary microservice splits.

    5. When choosing between two approaches, prefer the one with less accidental complexity — even if it is less elegant or
    less "industry standard."

    6. Conduct annual "accidental complexity audits" — identify and remove the top 3 sources of unnecessary complexity.

    '
  severity: high
  technologies:
    lang: [general]
  domains:
    domain: [architecture, reliability]
    concern: [simplicity]
  example_good: "# Identify and plan removal of accidental complexity\ndef complexity_audit(component: str, complexity_type: str, reason: str) -> dict:\n    if complexity_type == 'essential':\n        return {'action': 'ACCEPT', 'reason': reason,\n                'note': 'Document well, test thoroughly'}\n    elif complexity_type == 'accidental':\n        return {'action': 'PLAN_REMOVAL', 'reason': reason,\n                'note': 'Different implementation could eliminate this'}\n    return {'action': 'INVESTIGATE'}\n\n# Essential: caching layer for performance (inherent to the problem)\ncomplexity_audit('redis_cache', 'essential', 'Sub-10ms latency requires caching')\n\n# Accidental: custom ORM because team did not know SQLAlchemy existed\ncomplexity_audit('custom_orm', 'accidental', 'SQLAlchemy does the same thing')\n\n# Annual audit: remove top 3 sources of accidental complexity\n"
  example_bad: "# Anti-pattern: accumulating accidental complexity\nclass UserService:\n    # Custom JSON parser (accidental — stdlib json works fine)\n    # Custom HTTP client (accidental — requests/httpx exist)\n    # Custom retry logic (accidental — tenacity exists)\n    # Custom config loader (accidental — pydantic-settings exists)\n    # 4000 lines of accidental complexity\n    # Each adds bugs, maintenance burden, learning curve\n    # 'But we need control!' — no, you need to stop reinventing wheels\n"
  when_applies: "When conducting complexity audits to distinguish between complexity inherent to the problem versus complexity from engineering choices"
  sources:
  - url: https://sre.google/sre-book/simplicity/
    title: 'Google SRE Book — Chapter 9: Simplicity'
  validation_status: cross_checked
- id: CR-SRE-SIMP-003
  text: Delete dead code aggressively. Every line of unused code is a liability — it confuses readers, complicates refactoring,
    and creates false confidence in test coverage. Negative lines of code is the most underrated productivity metric.
  why: 'Google''s SRE Book advocates for "negative lines of code" as a metric because dead code has real costs that most organizations
    ignore. Dead code clutters search results when debugging ("this function seems relevant... wait, it is never called").
    Dead code inflates test coverage metrics (covered but unused code counts toward percentage). Dead code complicates refactoring
    (engineers are afraid to change code that MIGHT be used somewhere). Dead code can be accidentally reactivated (someone
    enables a commented-out flag and the dead code runs — with 3-year-old bugs). Google engineers are encouraged to delete
    code rather than comment it out — version control preserves the history if you ever need it back. Features gated behind
    permanently-disabled flags should be deleted, not preserved "just in case."

    '
  how_to_do_right: '1. Never comment out code — delete it. Version control is your backup.

    2. Never gate unused features behind disabled flags — delete the feature. If you need it later, rewrite it (it will be
    better the second time).

    3. Use static analysis tools to find unreachable code, unused imports, and never-called functions. Delete them.

    4. Track "lines of code" over time. If it only grows, no one is deleting — this is a cultural problem.

    5. Celebrate code deletion in code reviews: "This PR removes 500 lines" should be praised, not questioned.

    6. Run code coverage with dead code detection — if code is covered by tests but never reached in production, it is dead
    and should be removed.

    '
  severity: high
  technologies:
    lang: [general, go, java, javascript, typescript, python]
  domains:
    domain: [architecture, quality, reliability]
    concern: [simplicity, code]
  example_good: "# Aggressively delete dead code\nimport ast\nimport os\n\ndef find_dead_code(source_dir: str) -> list[str]:\n    \"\"\"Find unreachable functions using static analysis.\"\"\"\n    all_functions = set()\n    called_functions = set()\n    for root, _, files in os.walk(source_dir):\n        for f in files:\n            if f.endswith('.py'):\n                tree = ast.parse(open(os.path.join(root, f)).read())\n                for node in ast.walk(tree):\n                    if isinstance(node, ast.FunctionDef):\n                        all_functions.add(node.name)\n                    if isinstance(node, ast.Call) and hasattr(node.func, 'id'):\n                        called_functions.add(node.func.id)\n    dead = all_functions - called_functions\n    return list(dead)  # DELETE these — version control is your backup\n\n# Celebrate: 'This PR removes 500 lines' > 'This PR adds 500 lines'\n"
  example_bad: "# Anti-pattern: keeping dead code 'just in case'\ndef legacy_feature_v1():  # Disabled 2 years ago\n    pass  # 'We might need this someday'\n\ndef old_migration_script():  # Ran once in 2023\n    pass  # 'What if we need to re-run?'\n\n# if False:  # Commented out, not deleted\n#     entire_feature_block()  # 200 lines nobody reads\n# Dead code clutters search results, inflates coverage metrics,\n# confuses new engineers, and can be accidentally reactivated\n"
  when_applies: "When codebase has grown through accumulation without deletion, leading to confusion during debugging and false confidence in test coverage"
  sources:
  - url: https://sre.google/sre-book/simplicity/
    title: 'Google SRE Book — Chapter 9: Simplicity'
  validation_status: cross_checked
- id: CR-SRE-SIMP-004
  text: Keep APIs minimal. Every public API method is a commitment — it must be maintained, documented, tested, and supported
    forever. A smaller API surface area means fewer bugs, fewer breaking changes, and easier understanding.
  why: 'Google found that API surface area is one of the strongest predictors of long-term maintenance cost. Each public endpoint,
    parameter, and response field becomes a contract with consumers. Once consumers depend on it, removing or changing it
    requires migration — which at Google''s scale can take years. A service with 10 endpoints is comprehensible and testable.
    A service with 100 endpoints is neither. The SRE Book recommends restricting functionality to essential methods and perfecting
    them, rather than building extensive APIs to cover every possible use case. This is especially important for internal
    services: internal APIs at Google are consumed by hundreds of other services, making every endpoint a long-term commitment.
    The best APIs do few things well, not many things poorly.

    '
  how_to_do_right: '1. For every new API endpoint, require a justification: who will use it, how often, and what happens if
    we do not build it?

    2. Start with the minimum viable API — add endpoints only when concrete demand exists, not when someone imagines future
    need.

    3. Use versioning (v1, v2) to allow API evolution without breaking existing consumers.

    4. Regularly audit API usage: endpoints with zero traffic in 90 days are candidates for deprecation.

    5. Prefer generic endpoints that can be parameterized over specific endpoints for each use case.

    6. Document every endpoint with: purpose, expected consumers, SLO, deprecation timeline. Undocumented APIs become zombie
    APIs.

    '
  severity: high
  technologies:
    lang: [general]
    platform: [grpc, http]
  domains:
    domain: [architecture, reliability]
    concern: [api_design, simplicity]
  example_good: "# Minimal API with usage tracking and deprecation policy\nfrom fastapi import FastAPI\n\napp = FastAPI()\n\n# Only 3 endpoints — each justified by concrete demand\n@app.get('/v1/users/{user_id}')\nasync def get_user(user_id: str):\n    \"\"\"Primary use case: user profile lookup. 10K calls/day.\"\"\"\n    pass\n\n@app.post('/v1/users')\nasync def create_user(user: dict):\n    \"\"\"User registration. 500 calls/day.\"\"\"\n    pass\n\n@app.get('/v1/users/{user_id}/settings')\nasync def get_settings(user_id: str):\n    \"\"\"User preferences. 2K calls/day.\"\"\"\n    pass\n\n# Quarterly audit: endpoints with 0 traffic in 90 days -> deprecate\n# Every endpoint: documented purpose, expected consumers, SLO\n"
  example_bad: "# Anti-pattern: extensive API covering every possible use case\n@app.get('/v1/users/{id}')               # Used\n@app.get('/v1/users/{id}/profile')        # Duplicate of above\n@app.get('/v1/users/{id}/profile/extended') # Never used\n@app.get('/v1/users/{id}/preferences')    # Used\n@app.get('/v1/users/{id}/preferences/v2') # Migration abandoned\n@app.get('/v1/users/search')              # 3 callers\n@app.get('/v1/users/search/advanced')     # 0 callers for 6 months\n@app.get('/v1/users/export')              # Used once in 2024\n# 100 endpoints = 100 contracts to maintain forever\n# Removing any one requires migration of unknown consumers\n"
  when_applies: "When designing new APIs or auditing existing API surface area to reduce long-term maintenance burden"
  sources:
  - url: https://sre.google/sre-book/simplicity/
    title: 'Google SRE Book — Chapter 9: Simplicity'
  validation_status: cross_checked
- id: CR-SRE-SIMP-005
  text: Small, focused releases with a single purpose are safer than batched releases with unrelated changes. When a focused
    release fails, you know exactly what broke. When a batched release fails, debugging is a guessing game.
  why: 'Google''s release simplicity principle follows directly from debugging economics. A release containing one feature
    change has one potential cause when it fails. A release containing 10 unrelated changes has 10 potential causes — and
    potentially 45 pairwise interactions between them. The debugging time is not linear in the number of changes — it is combinatorial.
    Additionally, rolling back a single-purpose release is clean: you lose one feature. Rolling back a batched release loses
    all 10 features, including the 9 that worked fine. This penalizes innocent features and creates pressure to debug rather
    than rollback, which extends incident duration. Google''s CI/CD practices favor small, frequent, independent releases
    over large, infrequent, batched ones.

    '
  how_to_do_right: '1. Each deployment should contain one logical change: one feature, one bug fix, or one configuration update.

    2. If multiple changes are ready, deploy them sequentially with monitoring between each, not simultaneously.

    3. Avoid "release trains" that batch unrelated changes on a fixed schedule — they incentivize bundling.

    4. Track "changes per deployment" as a metric. If the average exceeds 3, the release process is incentivizing batching.

    5. When a batched release fails, the first remediation step should be: unbundle the changes and deploy them individually
    to isolate the failure.

    6. Feature flags enable deploying code without activating it — deploy the code in one release, activate the feature in
    a separate config change.

    '
  severity: high
  technologies:
    lang: [general]
    platform: [deployment, kubernetes]
  domains:
    domain: [architecture, operations, deployment, reliability]
    concern: [simplicity]
  example_good: "# Single-purpose releases with monitoring between each\ndef deploy_changes(changes: list[dict]):\n    \"\"\"Deploy changes sequentially, not batched.\"\"\"\n    for change in changes:\n        print(f'Deploying: {change[\"description\"]}')\n        deploy(change['version'])\n        monitor(minutes=15)  # Verify between each deployment\n        if not healthy():\n            rollback(change['version'])\n            print(f'Isolated failure to: {change[\"description\"]}')\n            return\n\n# 1 change per deploy: when it fails, 1 possible cause\n# Rollback: lose 1 feature, not 10\n# Track: 'changes per deployment' metric — target <= 3\n"
  example_bad: "# Anti-pattern: batched releases with unrelated changes\ndef monthly_release():\n    deploy([\n        feature_a,     # New payment flow\n        bugfix_b,      # Fix login timeout\n        config_c,      # Update rate limits\n        migration_d,   # Schema change\n        refactor_e,    # Code cleanup\n    ])  # All in one big release\n    # When it breaks: 5 possible causes, 10 pairwise interactions\n    # Rollback loses all 5 changes (4 were fine)\n    # Pressure to debug instead of rollback → extended outage\n"
  when_applies: "When planning releases, to avoid batching unrelated changes that make debugging and rollback difficult"
  sources:
  - url: https://sre.google/sre-book/simplicity/
    title: 'Google SRE Book — Chapter 9: Simplicity'
  validation_status: cross_checked
- id: CR-SRE-SIMP-006
  text: Loose coupling between components is the most important architectural property for operational simplicity. Tightly
    coupled components must be deployed, scaled, and debugged together — which multiplies complexity at every stage.
  why: 'Google emphasizes modularity as an operational requirement, not just a design preference. Loosely coupled components
    can be deployed independently (one team ships without blocking others), scaled independently (add capacity where needed,
    not everywhere), debugged independently (isolate the failing component without understanding the entire system), and evolved
    independently (rewrite one component without touching others). Protocol Buffers are Google''s canonical example: they
    provide backward and forward compatibility, allowing different components to release at different cadences without breaking
    each other. The anti-pattern is "misc" or "util" modules that become implicit dependencies for everything — changing them
    requires understanding and testing every consumer.

    '
  how_to_do_right: '1. Components communicate via well-defined APIs (gRPC, REST, message queues) — never via shared databases,
    shared filesystems, or in-memory shared state.

    2. Each component should be deployable independently. If deploying A requires also deploying B, they are too coupled.

    3. Use backward-compatible wire formats (protobuf, Avro, JSON Schema with versioning) so producers and consumers can evolve
    independently.

    4. Avoid "util" or "common" packages that grow into god objects — split into focused, domain-specific packages.

    5. Test components in isolation (unit tests, contract tests) before testing them together (integration tests).

    6. Map component dependencies explicitly. If a component has > 10 direct dependencies, it is a coupling risk.

    '
  severity: high
  technologies:
    platform: [kubernetes, grpc]
  domains:
    domain: [architecture, reliability]
    concern: [simplicity]
  example_good: "# Loosely coupled components with well-defined interfaces\nfrom abc import ABC, abstractmethod\n\nclass PaymentGateway(ABC):\n    \"\"\"Interface — consumers depend on this, not the implementation.\"\"\"\n    @abstractmethod\n    def charge(self, amount: float, currency: str) -> dict:\n        pass\n\nclass StripeGateway(PaymentGateway):\n    def charge(self, amount: float, currency: str) -> dict:\n        return stripe.Charge.create(amount=amount, currency=currency)\n\nclass OrderService:\n    def __init__(self, payment: PaymentGateway):  # Depends on interface, not impl\n        self.payment = payment\n\n    def checkout(self, cart):\n        return self.payment.charge(cart.total, cart.currency)\n\n# Deploy independently. Scale independently. Debug independently.\n# Swap Stripe for Braintree without touching OrderService.\n"
  example_bad: "# Anti-pattern: tightly coupled components via shared database\nclass OrderService:\n    def checkout(self, cart):\n        # Directly reads from payment service's database table\n        db.execute('SELECT * FROM payment_service.accounts WHERE ...')\n        # Shared database = implicit coupling\n        # Cannot deploy payment changes without testing order service\n        # Cannot scale independently\n        # Schema change in payments breaks orders\n        # 'util' package imported by 30 services = god object\n"
  when_applies: "When designing service architectures or evaluating coupling between components that need to be deployed, scaled, or debugged independently"
  sources:
  - url: https://sre.google/sre-book/simplicity/
    title: 'Google SRE Book — Chapter 9: Simplicity'
  validation_status: cross_checked
