# Technology Implication Graph (TIG)
#
# Static mapping of technologies to implied knowledge domains.
# When a technology is detected in a task, these additional knowledge
# areas are automatically included in the knowledge query.
#
# Structure per technology:
#   always:       domains ALWAYS needed when this tech is used
#   if_<context>: domains needed only when context keywords are detected
#
# Used by: context_extractor.py apply_technology_implications()
# Cost: Zero (static YAML lookup, no LLM calls)

flask:
  always:
    - cors
    - error_handling
    - input_validation
    - http_status_codes
  if_routes:
    - auth_middleware
    - rate_limiting
    - path_traversal
  if_database:
    - sql_injection
    - orm_patterns
    - connection_pooling
  if_websocket:
    - websocket_auth
    - message_validation
    - connection_lifecycle
  if_template:
    - xss
    - template_injection
    - html_escaping

fastapi:
  always:
    - cors
    - input_validation
    - pydantic_validation
    - http_status_codes
  if_routes:
    - auth_middleware
    - dependency_injection
    - rate_limiting
  if_database:
    - sql_injection
    - async_db
    - connection_pooling

django:
  always:
    - cors
    - csrf_protection
    - input_validation
    - orm_patterns
  if_routes:
    - auth_middleware
    - rate_limiting
    - path_traversal
  if_template:
    - xss
    - template_injection
  if_database:
    - sql_injection
    - migrations

express:
  always:
    - cors
    - input_validation
    - error_handling
    - middleware
  if_routes:
    - auth_middleware
    - rate_limiting
    - path_traversal
  if_database:
    - sql_injection
    - connection_pooling

react:
  always:
    - state_management
    - component_lifecycle
    - xss_prevention
  if_forms:
    - input_validation
    - form_state
  if_api:
    - error_handling
    - loading_states

vue:
  always:
    - state_management
    - component_lifecycle
    - xss_prevention
  if_forms:
    - input_validation
    - form_state
  if_api:
    - error_handling
    - loading_states

subprocess:
  always:
    - command_injection
    - path_sanitization
    - timeout
    - shell_false

docker:
  always:
    - non_root_user
    - secrets_management
    - health_checks
  if_compose:
    - network_isolation
    - volume_permissions

websocket:
  always:
    - auth
    - message_validation
    - connection_lifecycle
    - reconnection

socketio:
  always:
    - websocket_auth
    - message_validation
    - connection_lifecycle
    - reconnection
    - event_naming

redis:
  always:
    - connection_pooling
    - key_expiry
    - serialization

postgresql:
  always:
    - sql_injection
    - connection_pooling
    - migrations
  if_orm:
    - orm_patterns
    - lazy_loading

mongodb:
  always:
    - nosql_injection
    - connection_pooling
    - schema_validation

graphql:
  always:
    - query_depth_limiting
    - input_validation
    - rate_limiting
    - introspection_control

kubernetes:
  always:
    - resource_limits
    - health_checks
    - secrets_management
    - network_policies

terraform:
  always:
    - state_management
    - secrets_management
    - least_privilege
