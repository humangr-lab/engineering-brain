id: "realtime-systems"
name: "Real-Time Systems Pack"
description: "Knowledge for building real-time systems including WebSocket management, event streaming, pub/sub patterns, and backpressure handling."
version: "1.0.0"

layers: ["L0", "L1", "L2", "L3"]
domains: ["realtime", "architecture"]
severities: ["critical", "high", "medium"]
min_confidence: 0.3
exclude_deprecated: true

required_layers: ["L1", "L2", "L3"]
min_nodes: 5
max_nodes: 80
min_quality: 0.2
prefer_high_severity: false

reasoning_template: "T-LINEAR-DEFAULT"

mcp_tools:
  - name: "get_websocket_patterns"
    description: "Retrieve WebSocket implementation patterns including connection lifecycle, heartbeats, reconnection, and multiplexing."
    input_schema:
      type: "object"
      properties:
        topic:
          type: "string"
          description: "WebSocket topic (connection, heartbeat, reconnection, auth, scaling)"
        framework:
          type: "string"
          description: "Framework context (fastapi, starlette, socketio)"
      required: ["topic"]
    handler_type: "query"
    handler_config:
      layers: ["L2", "L3"]

  - name: "get_event_streaming_rules"
    description: "Get event streaming rules and patterns for pub/sub, event sourcing, CQRS, and message ordering guarantees."
    input_schema:
      type: "object"
      properties:
        pattern:
          type: "string"
          description: "Streaming pattern (pubsub, event_sourcing, cqrs, fan_out)"
        backend:
          type: "string"
          description: "Backend technology (redis_streams, kafka, rabbitmq)"
      required: ["pattern"]
    handler_type: "query"
    handler_config:
      layers: ["L1", "L2", "L3"]

  - name: "get_backpressure_strategies"
    description: "Get backpressure and flow control strategies for real-time pipelines including buffering, throttling, and load shedding."
    input_schema:
      type: "object"
      properties:
        scenario:
          type: "string"
          description: "Scenario (burst_traffic, slow_consumer, cascade_failure)"
      required: ["scenario"]
    handler_type: "query"
    handler_config:
      layers: ["L2", "L3"]

tags: ["websocket", "streaming", "events", "pubsub"]
parameters:
  technologies: []
