id: "code-review"
name: "Code Review Pack"
description: "Knowledge for code review — patterns, anti-patterns, best practices across all technologies. Focuses on correctness, maintainability, and common pitfalls."
version: "1.0.0"

layers: ["L1", "L2", "L3"]
domains: ["general", "architecture", "testing", "error_handling"]
severities: ["critical", "high", "medium"]
min_confidence: 0.0
exclude_deprecated: true

required_layers: ["L1", "L2", "L3"]
min_nodes: 10
max_nodes: 80
min_quality: 0.3
prefer_high_severity: false

reasoning_template: "T-LINEAR-DEFAULT"

mcp_tools:
  - name: "check_pattern_violation"
    description: "Check if code violates known patterns or best practices."
    input_schema:
      type: "object"
      properties:
        code:
          type: "string"
          description: "Code to check for pattern violations"
        language:
          type: "string"
          description: "Programming language"
      required: ["code"]
    handler_type: "query"
    handler_config:
      boost_severity: true

  - name: "get_best_practice"
    description: "Get best practices for a specific topic or technology."
    input_schema:
      type: "object"
      properties:
        topic:
          type: "string"
          description: "Topic to get best practices for"
      required: ["topic"]
    handler_type: "query"
    handler_config:
      layers: ["L1", "L2", "L3"]

  - name: "suggest_improvement"
    description: "Suggest improvements based on known patterns for the given code or approach."
    input_schema:
      type: "object"
      properties:
        description:
          type: "string"
          description: "Description of the code or approach"
      required: ["description"]
    handler_type: "query"
    handler_config: {}

  - name: "list_patterns"
    description: "List all known patterns, optionally filtered by technology."
    input_schema:
      type: "object"
      properties:
        technology:
          type: "string"
          description: "Filter by technology"
      required: []
    handler_type: "filter"
    handler_config:
      layers: ["L2"]

  - name: "explain_rule"
    description: "Get detailed explanation of a specific rule — WHY it exists and HOW to follow it."
    input_schema:
      type: "object"
      properties:
        rule_id:
          type: "string"
          description: "Rule ID (e.g. 'CR-FLASK-001')"
      required: ["rule_id"]
    handler_type: "lookup"
    handler_config: {}

mcp_server_name: "code-review"
mcp_server_description: "Code review knowledge pack — patterns, anti-patterns, and best practices for code quality."

tags: ["code-review", "patterns", "best-practices", "quality", "refactoring"]
parameters:
  technologies: []
