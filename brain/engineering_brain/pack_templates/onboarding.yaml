id: "onboarding"
name: "Onboarding Pack"
description: "Knowledge for onboarding — explains concepts, conventions, and why things matter. Broad coverage across all domains with teaching focus."
version: "1.0.0"

layers: ["L0", "L1", "L2", "L3"]
domains: ["general", "architecture", "testing", "security", "api"]
min_confidence: 0.0
exclude_deprecated: true

required_layers: ["L1", "L2", "L3"]
min_nodes: 15
max_nodes: 80
min_quality: 0.2
prefer_high_severity: false

reasoning_template: "T-LINEAR-DEFAULT"

mcp_tools:
  - name: "explain_concept"
    description: "Explain a software engineering concept with WHY it matters and mental models."
    input_schema:
      type: "object"
      properties:
        concept:
          type: "string"
          description: "Concept to explain (e.g. 'dependency injection', 'SOLID principles')"
      required: ["concept"]
    handler_type: "aggregate"
    handler_config:
      layers: ["L0", "L1", "L2"]

  - name: "get_conventions"
    description: "Get coding conventions and best practices for a technology."
    input_schema:
      type: "object"
      properties:
        technology:
          type: "string"
          description: "Technology to get conventions for"
      required: ["technology"]
    handler_type: "filter"
    handler_config:
      layers: ["L2", "L3"]

  - name: "why_does_this_matter"
    description: "Explain WHY a specific rule or pattern matters — the deeper understanding."
    input_schema:
      type: "object"
      properties:
        topic:
          type: "string"
          description: "The rule or pattern to explain"
      required: ["topic"]
    handler_type: "traverse"
    handler_config: {}

  - name: "get_learning_path"
    description: "Get a structured learning path for a topic, from axioms to rules."
    input_schema:
      type: "object"
      properties:
        topic:
          type: "string"
          description: "Topic to learn about"
      required: ["topic"]
    handler_type: "aggregate"
    handler_config:
      layers: ["L0", "L1", "L2", "L3"]

  - name: "list_technologies"
    description: "List all technologies covered in the knowledge base."
    input_schema:
      type: "object"
      properties: {}
      required: []
    handler_type: "stats"
    handler_config: {}

mcp_server_name: "onboarding-guide"
mcp_server_description: "Onboarding knowledge pack — explains concepts, conventions, and learning paths."

tags: ["onboarding", "learning", "teaching", "concepts", "conventions"]
parameters:
  technologies: []
