id: "project-maintenance"
name: "Project Maintenance Pack"
description: "Knowledge for maintenance, hardening, scaling, and tech debt sprints. Covers toil reduction, runbook management, dependency upgrades, performance hardening, observability improvements, and systematic tech debt payoff strategies. Designed for sprints that improve existing systems without adding features."
version: "1.0.0"

layers: ["L1", "L2", "L3"]
domains: ["operations", "reliability"]
severities: ["critical", "high", "medium", "low"]
min_confidence: 0.3
exclude_deprecated: true

required_layers: ["L1", "L2", "L3"]
min_nodes: 5
max_nodes: 50
min_quality: 0.2
prefer_high_severity: false

reasoning_template: "T-LINEAR-DEFAULT"

mcp_tools:
  - name: "get_toil_reduction_patterns"
    description: "Get toil identification, measurement, and reduction patterns. Covers automation strategies, idempotent maintenance scripts, and toil budget enforcement."
    input_schema:
      type: "object"
      properties:
        toil_type:
          type: "string"
          description: "Type of toil to reduce (manual_deploys, repetitive_alerts, batch_jobs, database_maintenance, log_rotation)"
      required: ["toil_type"]
    handler_type: "query"
    handler_config:
      layers: ["L1", "L2"]

  - name: "get_runbook_patterns"
    description: "Get runbook design and management patterns for operational procedures, automated remediation, and runbook testing strategies."
    input_schema:
      type: "object"
      properties:
        runbook_type:
          type: "string"
          description: "Runbook type (incident_response, maintenance_window, scaling_operation, dependency_upgrade)"
      required: []
    handler_type: "query"
    handler_config:
      layers: ["L1", "L2"]
      domains: ["operations"]

  - name: "get_hardening_checklist"
    description: "Get hardening rules for an existing system — covering security defaults, input validation gaps, error handling improvements, and observability additions."
    input_schema:
      type: "object"
      properties:
        system_type:
          type: "string"
          description: "System type to harden (api_service, background_worker, data_pipeline, web_app)"
        focus_area:
          type: "string"
          description: "Hardening focus (security, reliability, performance, observability)"
      required: ["system_type"]
    handler_type: "aggregate"
    handler_config:
      layers: ["L1", "L2", "L3"]

  - name: "get_dependency_upgrade_rules"
    description: "Get dependency upgrade patterns covering safe update sequencing, lock file management, breaking change detection, and rollback strategies."
    input_schema:
      type: "object"
      properties:
        upgrade_type:
          type: "string"
          description: "Upgrade type (security_patch, minor_version, major_version, framework_upgrade)"
        ecosystem:
          type: "string"
          description: "Package ecosystem (python, node, java, go)"
      required: ["upgrade_type"]
    handler_type: "query"
    handler_config:
      layers: ["L2", "L3"]

  - name: "get_tech_debt_patterns"
    description: "Get systematic tech debt payoff patterns covering debt categorization, prioritization, and safe refactoring strategies."
    input_schema:
      type: "object"
      properties:
        debt_type:
          type: "string"
          description: "Type of tech debt (design_debt, code_debt, test_debt, documentation_debt, dependency_debt)"
      required: []
    handler_type: "filter"
    handler_config:
      layers: ["L1", "L2", "L3"]
      sort_by: "severity"

tags: ["maintenance", "hardening", "toil", "runbook", "tech-debt", "reliability", "scaling", "dependencies"]
parameters:
  technologies: []
  include_examples: true
