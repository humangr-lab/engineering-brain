id: "agent-orchestration"
name: "Agent Orchestration Pack"
description: "Knowledge for L0-L2 agents (run master, executives) on multi-agent coordination, pipeline management, agent lifecycle, delegation patterns, and conflict resolution. Covers SOTA orchestration patterns for LLM-based hierarchical agent systems."
version: "1.0.0"

layers: ["L0", "L1", "L2", "L3"]
domains: ["agent_orchestration", "architecture"]
severities: ["critical", "high", "medium"]
min_confidence: 0.3
exclude_deprecated: true

required_layers: ["L0", "L1", "L2"]
min_nodes: 5
max_nodes: 60
min_quality: 0.3
prefer_high_severity: true

reasoning_template: "T-LINEAR-DEFAULT"
default_profile: "orchestrator_agent"

mcp_tools:
  - name: "get_orchestration_patterns"
    description: "Retrieve multi-agent coordination patterns, delegation strategies, and pipeline management wisdom for a given orchestration challenge."
    input_schema:
      type: "object"
      properties:
        challenge:
          type: "string"
          description: "Orchestration challenge or scenario (e.g. 'agent deadlock', 'task delegation', 'result aggregation')"
        agent_tier:
          type: "string"
          description: "Agent tier context (L0, L1, L2, L3, L4)"
        framework:
          type: "string"
          description: "Agent framework in use (e.g. 'crewai', 'langgraph', 'letta')"
      required: ["challenge"]
    handler_type: "query"
    handler_config:
      layers: ["L1", "L2"]
      boost_severity: true

  - name: "get_delegation_rules"
    description: "Get rules for task delegation from orchestrator agents to subordinates. Returns patterns ordered by severity."
    input_schema:
      type: "object"
      properties:
        task_type:
          type: "string"
          description: "Type of task to delegate (e.g. 'spec', 'implementation', 'qa')"
        agent_hierarchy:
          type: "string"
          description: "Description of the agent hierarchy involved"
      required: ["task_type"]
    handler_type: "query"
    handler_config:
      layers: ["L2", "L3"]
      boost_severity: true

  - name: "check_agent_lifecycle"
    description: "Check agent lifecycle patterns for initialization, execution, and teardown. Returns known pitfalls and best practices."
    input_schema:
      type: "object"
      properties:
        lifecycle_phase:
          type: "string"
          description: "Phase to check (init, run, teardown, error_recovery)"
        framework:
          type: "string"
          description: "Framework context (crewai, langgraph, letta, dspy)"
      required: ["lifecycle_phase"]
    handler_type: "query"
    handler_config:
      layers: ["L2", "L3"]
      boost_severity: true

  - name: "get_conflict_resolution"
    description: "Get conflict resolution strategies when multiple agents produce contradictory outputs or compete for shared resources."
    input_schema:
      type: "object"
      properties:
        conflict_type:
          type: "string"
          description: "Type of conflict (output_contradiction, resource_contention, deadlock, priority_dispute)"
      required: ["conflict_type"]
    handler_type: "query"
    handler_config:
      layers: ["L1", "L2", "L3"]

  - name: "orchestration_assessment"
    description: "Multi-layer assessment of an orchestration design combining principles, patterns, and anti-patterns."
    input_schema:
      type: "object"
      properties:
        design:
          type: "string"
          description: "Description of the orchestration design or pipeline to assess"
      required: ["design"]
    handler_type: "aggregate"
    handler_config:
      layers: ["L1", "L2", "L3"]

tags: ["agent", "orchestration", "multi-agent", "delegation", "pipeline", "crewai", "langgraph", "letta"]
parameters:
  technologies: ["python", "crewai", "langgraph", "letta", "dspy"]
  include_examples: true
