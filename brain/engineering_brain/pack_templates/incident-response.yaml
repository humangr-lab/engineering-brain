id: "incident-response"
name: "Incident Response Pack"
description: "Knowledge for diagnosing and responding to production incidents — failure patterns, runbook steps, cascading failure detection, and monitoring rules."
version: "1.0.0"

layers: ["L1", "L2", "L3"]
domains: ["reliability", "observability", "error_handling", "performance"]
severities: ["critical", "high"]
min_confidence: 0.0
exclude_deprecated: true

required_layers: ["L1", "L2", "L3"]
min_nodes: 5
max_nodes: 50
min_quality: 0.3
prefer_high_severity: true

reasoning_template: "T-LINEAR-DEFAULT"

mcp_tools:
  - name: "diagnose_symptom"
    description: "Diagnose a production symptom using known failure patterns and rules."
    input_schema:
      type: "object"
      properties:
        symptom:
          type: "string"
          description: "Production symptom (e.g. 'high latency', 'connection timeouts', '500 errors')"
      required: ["symptom"]
    handler_type: "query"
    handler_config:
      boost_severity: true

  - name: "get_runbook_step"
    description: "Get the recommended next step for incident resolution."
    input_schema:
      type: "object"
      properties:
        incident_type:
          type: "string"
          description: "Type of incident (e.g. 'database timeout', 'memory leak', 'cascading failure')"
      required: ["incident_type"]
    handler_type: "query"
    handler_config:
      layers: ["L2", "L3"]

  - name: "check_cascading"
    description: "Check for potential cascading failure patterns."
    input_schema:
      type: "object"
      properties:
        component:
          type: "string"
          description: "Component that failed"
      required: ["component"]
    handler_type: "traverse"
    handler_config: {}

  - name: "get_monitoring_rules"
    description: "Get monitoring and alerting rules for a component or technology."
    input_schema:
      type: "object"
      properties:
        technology:
          type: "string"
          description: "Technology to get monitoring rules for"
      required: ["technology"]
    handler_type: "filter"
    handler_config:
      domains: ["observability"]

  - name: "list_failure_patterns"
    description: "List known failure patterns and their mitigations."
    input_schema:
      type: "object"
      properties: {}
      required: []
    handler_type: "filter"
    handler_config:
      layers: ["L2", "L3"]
      domains: ["reliability", "error_handling"]

mcp_server_name: "incident-response"
mcp_server_description: "Incident response knowledge pack — failure diagnosis, runbook steps, and cascading failure detection."

tags: ["incident", "reliability", "monitoring", "observability", "runbook", "sre"]
parameters:
  technologies: []
