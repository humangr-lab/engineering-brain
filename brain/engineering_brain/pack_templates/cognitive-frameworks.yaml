id: "cognitive-frameworks"
name: "Cognitive Frameworks Pack"
description: "Meta-reasoning frameworks for all agents. Covers decision heuristics, reasoning strategies, cognitive biases, and structured thinking templates."
version: "1.0.0"

layers: ["L0", "L1"]
domains: ["reasoning"]
severities: ["critical", "high", "medium"]
min_confidence: 0.3
exclude_deprecated: true

required_layers: ["L0", "L1"]
min_nodes: 5
max_nodes: 80
min_quality: 0.5
prefer_high_severity: false

reasoning_template: "T-LINEAR-DEFAULT"

mcp_tools:
  - name: "get_reasoning_framework"
    description: "Retrieve a structured reasoning framework for a given problem class. Returns axioms, principles, and step-by-step methodology."
    input_schema:
      type: "object"
      properties:
        problem_class:
          type: "string"
          description: "Problem class (decomposition, tradeoff_analysis, root_cause, planning, estimation)"
      required: ["problem_class"]
    handler_type: "query"
    handler_config:
      layers: ["L0", "L1"]

  - name: "get_decision_heuristic"
    description: "Get decision heuristics and cognitive tools for a specific decision type. Includes bias warnings and debiasing techniques."
    input_schema:
      type: "object"
      properties:
        decision_type:
          type: "string"
          description: "Decision type (prioritization, risk_assessment, resource_allocation, design_choice)"
        uncertainty:
          type: "string"
          description: "Level of uncertainty (low, medium, high, ambiguous)"
      required: ["decision_type"]
    handler_type: "query"
    handler_config:
      layers: ["L0", "L1"]

tags: ["reasoning", "cognition", "decision", "heuristics"]
parameters:
  technologies: []
