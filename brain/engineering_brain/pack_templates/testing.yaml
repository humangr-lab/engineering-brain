id: "testing"
name: "Testing Pack"
description: "Testing knowledge — test patterns, fixture composition, anti-patterns, coverage strategies, and deterministic testing practices."
version: "1.0.0"

layers: ["L1", "L2", "L3"]
domains: ["testing", "quality"]
min_confidence: 0.0
exclude_deprecated: true

required_layers: ["L1", "L2", "L3"]
min_nodes: 5
max_nodes: 50
min_quality: 0.3
prefer_high_severity: false

reasoning_template: "T-LINEAR-DEFAULT"

mcp_tools:
  - name: "get_test_patterns"
    description: "Get test patterns for a technology or testing concern."
    input_schema:
      type: "object"
      properties:
        topic:
          type: "string"
          description: "Testing topic (e.g. 'fixture composition', 'mocking', 'integration tests')"
      required: ["topic"]
    handler_type: "query"
    handler_config:
      layers: ["L2", "L3"]

  - name: "check_coverage_gaps"
    description: "Identify potential coverage gaps based on known testing patterns."
    input_schema:
      type: "object"
      properties:
        description:
          type: "string"
          description: "Description of the code or module being tested"
      required: ["description"]
    handler_type: "query"
    handler_config: {}

  - name: "get_fixture_rules"
    description: "Get fixture and test data management rules."
    input_schema:
      type: "object"
      properties: {}
      required: []
    handler_type: "filter"
    handler_config:
      domains: ["testing"]
      layers: ["L3"]

  - name: "list_antipatterns"
    description: "List known testing anti-patterns to avoid."
    input_schema:
      type: "object"
      properties: {}
      required: []
    handler_type: "filter"
    handler_config:
      layers: ["L3"]
      domains: ["testing"]

mcp_server_name: "testing-advisor"
mcp_server_description: "Testing knowledge pack — test patterns, fixture rules, and coverage strategies."

tags: ["testing", "quality", "fixtures", "coverage", "tdd"]
parameters:
  technologies: []
