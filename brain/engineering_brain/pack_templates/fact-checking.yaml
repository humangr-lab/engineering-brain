id: "fact-checking"
name: "Fact-Checking Pack"
description: "Veritas domain knowledge for claim verification, credibility assessment, and NLP-based evidence analysis."
version: "1.0.0"

layers: ["L0", "L1", "L2", "L3"]
domains: ["fact_checking"]
severities: ["critical", "high", "medium"]
min_confidence: 0.3
exclude_deprecated: true

required_layers: ["L1", "L2", "L3"]
min_nodes: 5
max_nodes: 80
min_quality: 0.2
prefer_high_severity: false

reasoning_template: "T-LINEAR-DEFAULT"

mcp_tools:
  - name: "get_verification_rules"
    description: "Retrieve verification rules and evidence standards for a claim type or domain."
    input_schema:
      type: "object"
      properties:
        claim_type:
          type: "string"
          description: "Type of claim (factual, statistical, causal, predictive)"
        domain:
          type: "string"
          description: "Domain of the claim (politics, science, finance, health)"
      required: ["claim_type"]
    handler_type: "query"
    handler_config:
      layers: ["L1", "L2", "L3"]

  - name: "get_credibility_patterns"
    description: "Get credibility assessment patterns for evaluating sources, evidence chains, and bias indicators."
    input_schema:
      type: "object"
      properties:
        source_type:
          type: "string"
          description: "Type of source (academic, news, social_media, official)"
      required: ["source_type"]
    handler_type: "query"
    handler_config:
      layers: ["L2", "L3"]

  - name: "get_nlp_patterns"
    description: "Get NLP-based patterns for detecting hedging, weasel words, logical fallacies, and rhetorical manipulation."
    input_schema:
      type: "object"
      properties:
        text:
          type: "string"
          description: "Text to analyze for NLP patterns"
      required: ["text"]
    handler_type: "query"
    handler_config:
      layers: ["L2", "L3"]

tags: ["veritas", "claims", "verification", "credibility"]
parameters:
  technologies: []
