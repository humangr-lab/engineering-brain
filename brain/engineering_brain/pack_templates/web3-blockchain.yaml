id: "web3-blockchain"
name: "Web3 & Blockchain Pack"
description: "Knowledge for blockchain, oracle, and on-chain sprints. Covers smart contract security, oracle design, on-chain vs off-chain data flow, reentrancy prevention, integer overflow, gas optimization, cross-chain bridge risks, and decentralized market settlement. Prioritizes security and correctness for irreversible on-chain operations."
version: "1.0.0"

layers: ["L0", "L1", "L2", "L3"]
domains: ["security", "fintech"]
severities: ["critical", "high", "medium"]
min_confidence: 0.4
exclude_deprecated: true

required_layers: ["L1", "L2", "L3"]
min_nodes: 8
max_nodes: 60
min_quality: 0.4
prefer_high_severity: true

reasoning_template: "T-LINEAR-DEFAULT"
default_profile: "blockchain_security_engineer"

mcp_tools:
  - name: "get_smart_contract_security"
    description: "Get smart contract security rules covering reentrancy, integer overflow/underflow, access control, front-running, and oracle manipulation. These are critical — on-chain bugs are irreversible."
    input_schema:
      type: "object"
      properties:
        vulnerability_type:
          type: "string"
          description: "Vulnerability type to get rules for (reentrancy, overflow, access_control, front_running, oracle_manipulation, flash_loan, price_oracle)"
        language:
          type: "string"
          description: "Smart contract language (solidity, vyper, rust_anchor)"
      required: []
    handler_type: "filter"
    handler_config:
      layers: ["L3"]
      boost_severity: true
      sort_by: "severity"

  - name: "get_oracle_design_patterns"
    description: "Get oracle design patterns for price feeds, resolution mechanisms, and manipulation resistance. Covers Chainlink integration, multi-source aggregation, circuit breakers, and dispute resolution."
    input_schema:
      type: "object"
      properties:
        oracle_type:
          type: "string"
          description: "Oracle type (price_feed, resolution_oracle, randomness, cross_chain)"
        concern:
          type: "string"
          description: "Design concern (manipulation_resistance, freshness, aggregation, dispute_resolution)"
      required: ["oracle_type"]
    handler_type: "query"
    handler_config:
      layers: ["L1", "L2", "L3"]

  - name: "check_onchain_patterns"
    description: "Check on-chain code or design patterns against known vulnerabilities and best practices. Returns findings ordered by severity with remediation steps."
    input_schema:
      type: "object"
      properties:
        code:
          type: "string"
          description: "Smart contract code or design pattern to check"
        protocol_type:
          type: "string"
          description: "Protocol type (amm, lending, prediction_market, bridge, staking)"
      required: ["code"]
    handler_type: "query"
    handler_config:
      layers: ["L3"]
      boost_severity: true

  - name: "get_settlement_rules"
    description: "Get on-chain settlement and resolution rules for prediction markets and financial protocols — covering oracle finality, dispute windows, and payout correctness."
    input_schema:
      type: "object"
      properties:
        settlement_phase:
          type: "string"
          description: "Settlement phase (resolution_trigger, dispute_period, payout, redemption)"
      required: []
    handler_type: "query"
    handler_config:
      layers: ["L1", "L2", "L3"]
      boost_severity: true

  - name: "blockchain_security_assessment"
    description: "Full security assessment for a blockchain component combining smart contract, oracle, and financial security rules."
    input_schema:
      type: "object"
      properties:
        component:
          type: "string"
          description: "Blockchain component to assess (e.g. 'market contract', 'oracle integration', 'bridge', 'liquidity pool')"
      required: ["component"]
    handler_type: "aggregate"
    handler_config:
      layers: ["L1", "L2", "L3"]

tags: ["blockchain", "web3", "smart-contracts", "oracle", "solidity", "defi", "security", "on-chain", "settlement"]
parameters:
  technologies: ["solidity", "python", "web3", "ethereum", "polygon"]
  include_examples: true
