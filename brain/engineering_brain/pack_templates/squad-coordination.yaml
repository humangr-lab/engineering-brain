id: "squad-coordination"
name: "Squad Coordination Pack"
description: "Knowledge for L4 squad leads on coordinating worker agents, managing intra-squad communication, tracking task completion, and maintaining code quality standards within a squad. Covers decomposition, progress tracking, and rework patterns."
version: "1.0.0"

layers: ["L1", "L2", "L3"]
domains: ["sacada", "code_quality"]
severities: ["critical", "high", "medium", "low"]
min_confidence: 0.3
exclude_deprecated: true

required_layers: ["L1", "L2", "L3"]
min_nodes: 5
max_nodes: 50
min_quality: 0.2
prefer_high_severity: false

reasoning_template: "T-LINEAR-DEFAULT"

mcp_tools:
  - name: "get_squad_patterns"
    description: "Retrieve squad coordination patterns for task assignment, progress tracking, and worker agent management."
    input_schema:
      type: "object"
      properties:
        scenario:
          type: "string"
          description: "Coordination scenario (e.g. 'task assignment', 'blocker resolution', 'parallel execution', 'rework loop')"
        squad_size:
          type: "string"
          description: "Number of worker agents in the squad"
      required: ["scenario"]
    handler_type: "query"
    handler_config:
      layers: ["L1", "L2"]

  - name: "get_rework_strategy"
    description: "Get strategies for instructing agents to rework failed tasks. Returns surgical rework patterns that minimize context waste."
    input_schema:
      type: "object"
      properties:
        failure_type:
          type: "string"
          description: "Type of failure requiring rework (gate_fail, qa_veto, invariant_violation, missing_deliverable)"
        context:
          type: "string"
          description: "Context about what was attempted and what failed"
      required: ["failure_type"]
    handler_type: "query"
    handler_config:
      layers: ["L2", "L3"]
      boost_severity: true

  - name: "check_decomposition_quality"
    description: "Validate a task decomposition for completeness, parallelism, and assignment clarity."
    input_schema:
      type: "object"
      properties:
        decomposition:
          type: "string"
          description: "Task decomposition description or structure to validate"
      required: ["decomposition"]
    handler_type: "query"
    handler_config:
      layers: ["L1", "L2", "L3"]

  - name: "get_code_quality_gates"
    description: "Get code quality gate rules and thresholds that squad leads must enforce before reporting completion."
    input_schema:
      type: "object"
      properties:
        domain:
          type: "string"
          description: "Domain of the code being reviewed (e.g. 'api', 'data_pipeline', 'frontend')"
      required: []
    handler_type: "filter"
    handler_config:
      layers: ["L3"]
      sort_by: "severity"
      domains: ["code_quality"]

tags: ["squad", "coordination", "lead", "rework", "decomposition", "code-quality"]
parameters:
  technologies: []
  include_examples: true
