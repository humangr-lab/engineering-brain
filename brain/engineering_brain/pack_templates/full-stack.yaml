id: "full-stack"
name: "Full Stack Pack"
description: "Comprehensive knowledge pack spanning all domains and layers. For general-purpose engineering assistance when you need the full breadth of the knowledge base."
version: "1.0.0"

layers: ["L0", "L1", "L2", "L3"]
domains: ["general", "architecture", "security", "testing", "api", "performance", "error_handling", "observability", "ui"]
min_confidence: 0.0
exclude_deprecated: true

required_layers: ["L0", "L1", "L2", "L3"]
min_nodes: 20
max_nodes: 80
min_quality: 0.2
prefer_high_severity: false

reasoning_template: "T-LINEAR-DEFAULT"
default_profile: "fullstack"

mcp_tools:
  - name: "search_knowledge"
    description: "Search the full knowledge base for any engineering topic."
    input_schema:
      type: "object"
      properties:
        query:
          type: "string"
          description: "What you need to know"
        technology:
          type: "string"
          description: "Optional technology filter"
      required: ["query"]
    handler_type: "query"
    handler_config: {}

  - name: "get_principles"
    description: "Get engineering principles for a domain."
    input_schema:
      type: "object"
      properties:
        domain:
          type: "string"
          description: "Domain to get principles for (e.g. 'security', 'architecture', 'testing')"
      required: []
    handler_type: "filter"
    handler_config:
      layers: ["L1"]

  - name: "query_rules"
    description: "Query specific rules by technology and domain."
    input_schema:
      type: "object"
      properties:
        technology:
          type: "string"
          description: "Technology to query"
        domain:
          type: "string"
          description: "Domain to query"
      required: []
    handler_type: "filter"
    handler_config:
      layers: ["L3"]

  - name: "reason_about"
    description: "Multi-layer reasoning about a topic — from axioms to rules."
    input_schema:
      type: "object"
      properties:
        topic:
          type: "string"
          description: "Topic to reason about"
      required: ["topic"]
    handler_type: "aggregate"
    handler_config:
      layers: ["L0", "L1", "L2", "L3"]

mcp_server_name: "full-stack-brain"
mcp_server_description: "Full stack engineering knowledge — principles, patterns, and rules across all domains."

tags: ["full-stack", "general", "comprehensive", "all-domains"]
parameters:
  technologies: []
