id: "frontend-ux"
name: "Frontend & UX Pack"
description: "Knowledge for UI/UX, frontend, and cockpit dashboard sprints. Covers React component architecture, TypeScript type safety, accessibility, performance optimization, SVG visualization, state management, and user journey design. Tailored for data-rich dashboard and cockpit interfaces."
version: "1.0.0"

layers: ["L1", "L2", "L3"]
domains: ["general", "architecture"]
severities: ["critical", "high", "medium", "low"]
min_confidence: 0.3
exclude_deprecated: true

required_layers: ["L1", "L2", "L3"]
min_nodes: 5
max_nodes: 60
min_quality: 0.2
prefer_high_severity: false

reasoning_template: "T-LINEAR-DEFAULT"

mcp_tools:
  - name: "get_react_patterns"
    description: "Retrieve React component patterns, hooks design, state management strategies, and performance optimization techniques for complex dashboards."
    input_schema:
      type: "object"
      properties:
        topic:
          type: "string"
          description: "React topic (component_design, hooks, state_management, rendering_optimization, data_fetching, error_boundaries)"
        component_type:
          type: "string"
          description: "Component type context (dashboard, form, chart, table, modal, list)"
      required: ["topic"]
    handler_type: "query"
    handler_config:
      layers: ["L1", "L2"]

  - name: "get_typescript_rules"
    description: "Get TypeScript type safety rules for frontend code — strict mode patterns, generic types, discriminated unions, and type narrowing."
    input_schema:
      type: "object"
      properties:
        concern:
          type: "string"
          description: "TypeScript concern (strict_mode, generics, discriminated_unions, type_guards, api_types, event_types)"
      required: []
    handler_type: "filter"
    handler_config:
      layers: ["L2", "L3"]
      sort_by: "severity"

  - name: "get_svg_visualization"
    description: "Get SVG and vanilla JavaScript visualization patterns for charts, graphs, and interactive cockpit components without heavy charting libraries."
    input_schema:
      type: "object"
      properties:
        viz_type:
          type: "string"
          description: "Visualization type (line_chart, bar_chart, candlestick, network_graph, heatmap, gauge, sparkline)"
        concern:
          type: "string"
          description: "Specific concern (performance, responsiveness, animation, accessibility, interactivity)"
      required: ["viz_type"]
    handler_type: "query"
    handler_config:
      layers: ["L2", "L3"]

  - name: "get_ux_patterns"
    description: "Get user journey and UX patterns for financial dashboards and cockpit interfaces covering loading states, error handling, empty states, and progressive disclosure."
    input_schema:
      type: "object"
      properties:
        pattern:
          type: "string"
          description: "UX pattern (loading_state, error_state, empty_state, optimistic_update, progressive_disclosure, data_refresh)"
      required: ["pattern"]
    handler_type: "query"
    handler_config:
      layers: ["L1", "L2"]

  - name: "check_performance"
    description: "Check frontend performance patterns — bundle size, lazy loading, virtualization, memo, and paint performance for data-heavy interfaces."
    input_schema:
      type: "object"
      properties:
        component:
          type: "string"
          description: "Frontend component or feature to check for performance issues"
      required: ["component"]
    handler_type: "query"
    handler_config:
      layers: ["L2", "L3"]
      boost_severity: true

tags: ["frontend", "react", "typescript", "ux", "svg", "dashboard", "cockpit", "visualization", "javascript"]
parameters:
  technologies: ["react", "typescript", "javascript", "css", "html", "svg"]
  include_examples: true
