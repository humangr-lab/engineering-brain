id: "architecture"
name: "Architecture Pack"
description: "Architectural principles, design patterns, and trade-off analysis. For system design decisions, component decomposition, and structural quality."
version: "1.0.0"

layers: ["L0", "L1", "L2", "L3"]
domains: ["architecture", "design", "infrastructure"]
min_confidence: 0.0
exclude_deprecated: true

required_layers: ["L0", "L1", "L2"]
min_nodes: 8
max_nodes: 60
min_quality: 0.3
prefer_high_severity: false

reasoning_template: "T-LINEAR-DEFAULT"

mcp_tools:
  - name: "evaluate_tradeoff"
    description: "Evaluate architectural trade-offs between approaches using principles and patterns."
    input_schema:
      type: "object"
      properties:
        options:
          type: "string"
          description: "Description of the architectural options to evaluate"
      required: ["options"]
    handler_type: "aggregate"
    handler_config:
      layers: ["L0", "L1", "L2"]

  - name: "get_principle"
    description: "Get a specific architectural principle with WHY and HOW."
    input_schema:
      type: "object"
      properties:
        topic:
          type: "string"
          description: "Principle topic (e.g. 'separation of concerns', 'single responsibility')"
      required: ["topic"]
    handler_type: "query"
    handler_config:
      layers: ["L1"]

  - name: "get_architecture_pattern"
    description: "Get architecture patterns for a specific concern."
    input_schema:
      type: "object"
      properties:
        concern:
          type: "string"
          description: "Architecture concern (e.g. 'event-driven', 'repository pattern')"
      required: ["concern"]
    handler_type: "query"
    handler_config:
      layers: ["L2"]

  - name: "check_consequences"
    description: "Check consequences of violating an architectural principle."
    input_schema:
      type: "object"
      properties:
        principle:
          type: "string"
          description: "The principle being considered for violation"
      required: ["principle"]
    handler_type: "traverse"
    handler_config: {}

  - name: "get_axioms"
    description: "Get foundational axioms — immutable truths of software engineering."
    input_schema:
      type: "object"
      properties: {}
      required: []
    handler_type: "filter"
    handler_config:
      layers: ["L0"]

mcp_server_name: "architecture-advisor"
mcp_server_description: "Architecture knowledge pack — principles, patterns, and trade-off analysis."

tags: ["architecture", "design", "system-design", "trade-offs", "principles"]
parameters:
  technologies: []
