id: "spec-analysis"
name: "Spec Analysis Pack"
description: "Knowledge for spec agents during requirement analysis. Covers decomposition principles, invariant enforcement, edge case detection, and specification quality."
version: "1.0.0"

layers: ["L0", "L1", "L2", "L3"]
domains: ["reasoning", "sacada", "code_quality"]
severities: ["critical", "high", "medium"]
min_confidence: 0.3
exclude_deprecated: true

required_layers: ["L1", "L2", "L3"]
min_nodes: 5
max_nodes: 80
min_quality: 0.2
prefer_high_severity: true

reasoning_template: "T-LINEAR-DEFAULT"

mcp_tools:
  - name: "get_spec_principles"
    description: "Retrieve specification principles and decomposition strategies for a given domain or feature area."
    input_schema:
      type: "object"
      properties:
        topic:
          type: "string"
          description: "Feature or domain to get spec principles for"
        granularity:
          type: "string"
          description: "Level of decomposition (coarse, medium, fine)"
      required: ["topic"]
    handler_type: "query"
    handler_config:
      layers: ["L1", "L2"]

  - name: "get_edge_case_patterns"
    description: "Get known edge case patterns and boundary conditions for a topic. Returns patterns ordered by severity."
    input_schema:
      type: "object"
      properties:
        topic:
          type: "string"
          description: "Topic to find edge case patterns for"
        technology:
          type: "string"
          description: "Technology context (e.g. 'python', 'fastapi', 'postgres')"
      required: ["topic"]
    handler_type: "query"
    handler_config:
      layers: ["L2", "L3"]
      boost_severity: true

  - name: "validate_requirement"
    description: "Validate a requirement against known specification anti-patterns and completeness criteria."
    input_schema:
      type: "object"
      properties:
        requirement:
          type: "string"
          description: "The requirement text to validate"
        context:
          type: "string"
          description: "Surrounding context or related requirements"
      required: ["requirement"]
    handler_type: "aggregate"
    handler_config:
      layers: ["L1", "L2", "L3"]

tags: ["spec", "requirements", "decomposition", "invariants"]
parameters:
  technologies: []
