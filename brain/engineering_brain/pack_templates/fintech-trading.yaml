id: "fintech-trading"
name: "Fintech Trading Pack"
description: "Knowledge for FK market/trading sprints. Covers prediction market mechanics, AMM implementation (LMSR/CPMM), order book design, financial calculation correctness, settlement logic, real-time trade execution, and manipulation detection. Prioritizes correctness above all else."
version: "1.0.0"

layers: ["L0", "L1", "L2", "L3"]
domains: ["prediction_markets", "fintech", "realtime"]
severities: ["critical", "high"]
min_confidence: 0.4
exclude_deprecated: true

required_layers: ["L1", "L2", "L3"]
min_nodes: 10
max_nodes: 80
min_quality: 0.4
prefer_high_severity: true

reasoning_template: "T-LINEAR-DEFAULT"
default_profile: "fintech_engineer"

mcp_tools:
  - name: "get_market_correctness_rules"
    description: "Get critical rules for financial calculation correctness in prediction markets and trading engines. Returns rules ordered by severity — use these before writing any financial logic."
    input_schema:
      type: "object"
      properties:
        topic:
          type: "string"
          description: "Financial topic (e.g. 'lmsr pricing', 'position settlement', 'pnl calculation', 'balance update')"
        market_type:
          type: "string"
          description: "Market type context (e.g. 'binary', 'categorical', 'scalar', 'order_book')"
      required: ["topic"]
    handler_type: "query"
    handler_config:
      layers: ["L1", "L2", "L3"]
      boost_severity: true

  - name: "check_financial_invariants"
    description: "Validate financial logic against known invariants (e.g. sum-to-one, balance conservation, no negative liquidity). Returns violations with severity."
    input_schema:
      type: "object"
      properties:
        code:
          type: "string"
          description: "Financial code or logic to validate against invariants"
        invariant_type:
          type: "string"
          description: "Type of invariant to check (balance_conservation, price_normalization, position_limits, settlement_correctness)"
      required: ["code"]
    handler_type: "query"
    handler_config:
      layers: ["L3"]
      boost_severity: true

  - name: "get_amm_patterns"
    description: "Get AMM implementation patterns for LMSR, CPMM, and hybrid market makers. Includes numerical stability, overflow prevention, and cost function implementation."
    input_schema:
      type: "object"
      properties:
        amm_type:
          type: "string"
          description: "AMM type (lmsr, cpmm, constant_sum, dynamic)"
        concern:
          type: "string"
          description: "Specific concern (overflow, precision, cost_function, liquidity_parameter)"
      required: ["amm_type"]
    handler_type: "query"
    handler_config:
      layers: ["L2", "L3"]

  - name: "get_realtime_trading_rules"
    description: "Get real-time trade execution rules covering latency, ordering guarantees, WebSocket reliability, and backpressure handling in trading systems."
    input_schema:
      type: "object"
      properties:
        concern:
          type: "string"
          description: "Real-time concern (latency, ordering, backpressure, reconnection, message_loss)"
      required: []
    handler_type: "filter"
    handler_config:
      layers: ["L2", "L3"]
      domains: ["realtime", "prediction_markets"]
      sort_by: "severity"

  - name: "get_manipulation_detection"
    description: "Get rules for detecting and preventing market manipulation, wash trading, and spoofing in trading systems."
    input_schema:
      type: "object"
      properties:
        manipulation_type:
          type: "string"
          description: "Type of manipulation to detect (wash_trading, spoofing, front_running, layering)"
      required: []
    handler_type: "query"
    handler_config:
      layers: ["L1", "L2", "L3"]
      boost_severity: true

  - name: "trading_assessment"
    description: "Full trading system assessment combining financial correctness, real-time properties, and security rules."
    input_schema:
      type: "object"
      properties:
        component:
          type: "string"
          description: "Trading component to assess (e.g. 'order matching engine', 'settlement service', 'price feed')"
      required: ["component"]
    handler_type: "aggregate"
    handler_config:
      layers: ["L1", "L2", "L3"]

tags: ["trading", "fintech", "prediction-markets", "amm", "lmsr", "cpmm", "order-book", "settlement", "realtime"]
parameters:
  technologies: ["python", "postgresql", "redis", "fastapi"]
  include_examples: true
