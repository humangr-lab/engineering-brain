id: "mathematical-foundations"
name: "Mathematical Foundations Pack"
description: "Mathematical knowledge for probability, Bayesian inference, hypothesis testing, and numerical methods. Essential for fact-checking calibration, prediction market pricing, and statistical validation."
version: "1.0.0"

layers: ["L0", "L1", "L2", "L3"]
domains: ["mathematics", "statistics", "data_science"]
severities: ["critical", "high", "medium"]
min_confidence: 0.3
exclude_deprecated: true

required_layers: ["L1", "L2", "L3"]
min_nodes: 5
max_nodes: 80
min_quality: 0.2
prefer_high_severity: false

reasoning_template: "T-LINEAR-DEFAULT"

mcp_tools:
  - name: "get_probability_rules"
    description: "Retrieve probability distribution rules and patterns. Covers when to use each distribution, parameter estimation, and common pitfalls."
    input_schema:
      type: "object"
      properties:
        distribution:
          type: "string"
          description: "Distribution type (normal, beta, binomial, poisson, lognormal, power_law)"
        concern:
          type: "string"
          description: "Specific concern (parameter_estimation, goodness_of_fit, convergence, numerical_stability)"
      required: ["distribution"]
    handler_type: "query"
    handler_config:
      layers: ["L1", "L2", "L3"]

  - name: "get_bayesian_patterns"
    description: "Get Bayesian inference patterns including prior selection, conjugate families, MCMC methods, and credible intervals."
    input_schema:
      type: "object"
      properties:
        technique:
          type: "string"
          description: "Bayesian technique (conjugate_priors, mcmc, bayesian_updating, model_comparison, thompson_sampling)"
        application:
          type: "string"
          description: "Application domain (calibration, ab_testing, credibility_scoring, prediction)"
      required: ["technique"]
    handler_type: "query"
    handler_config:
      layers: ["L1", "L2", "L3"]

  - name: "get_hypothesis_testing_rules"
    description: "Get hypothesis testing rules covering p-value interpretation, multiple testing correction, effect sizes, and common statistical errors."
    input_schema:
      type: "object"
      properties:
        test_type:
          type: "string"
          description: "Test type (t_test, chi_squared, anova, ab_test, multiple_testing)"
      required: ["test_type"]
    handler_type: "query"
    handler_config:
      layers: ["L2", "L3"]
      boost_severity: true

  - name: "get_numerical_methods"
    description: "Get numerical method rules for floating point, precision, stability, and financial calculations."
    input_schema:
      type: "object"
      properties:
        topic:
          type: "string"
          description: "Numerical topic (floating_point, kahan_summation, overflow, decimal_money, condition_number)"
      required: ["topic"]
    handler_type: "query"
    handler_config:
      layers: ["L2", "L3"]
      boost_severity: true

tags: ["math", "probability", "bayesian", "statistics", "numerical"]
parameters:
  technologies: ["python", "numpy", "scipy"]
