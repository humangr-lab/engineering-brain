id: "security-review"
name: "Security Review Pack"
description: "Curated security knowledge for vulnerability detection, authentication, authorization, and input validation. Prioritizes critical/high severity rules."
version: "1.0.0"

layers: ["L0", "L1", "L2", "L3"]
domains: ["security", "auth", "cors", "crypto"]
severities: ["critical", "high", "medium"]
min_confidence: 0.3
exclude_deprecated: true

required_layers: ["L1", "L2", "L3"]
min_nodes: 5
max_nodes: 60
min_quality: 0.3
prefer_high_severity: true

reasoning_template: "T-LINEAR-DEFAULT"
default_profile: "security_engineer"

mcp_tools:
  - name: "check_vulnerability"
    description: "Check if a code pattern has known security vulnerabilities. Provide the code or pattern description."
    input_schema:
      type: "object"
      properties:
        code:
          type: "string"
          description: "Code snippet or pattern to check for vulnerabilities"
        technology:
          type: "string"
          description: "Technology context (e.g. 'flask', 'django', 'express')"
      required: ["code"]
    handler_type: "query"
    handler_config:
      boost_severity: true
      layers: ["L3"]

  - name: "get_security_rules"
    description: "Get all security rules for a specific technology or domain. Returns rules ordered by severity."
    input_schema:
      type: "object"
      properties:
        technology:
          type: "string"
          description: "Technology to get rules for"
        domain:
          type: "string"
          description: "Security subdomain (auth, cors, crypto, input_validation)"
      required: []
    handler_type: "filter"
    handler_config:
      layers: ["L3"]
      sort_by: "severity"

  - name: "validate_cors"
    description: "Validate CORS configuration against security best practices."
    input_schema:
      type: "object"
      properties:
        config:
          type: "string"
          description: "CORS configuration to validate"
      required: ["config"]
    handler_type: "query"
    handler_config:
      domains: ["cors", "security"]

  - name: "security_assessment"
    description: "Multi-layer security assessment combining principles, patterns, and rules."
    input_schema:
      type: "object"
      properties:
        topic:
          type: "string"
          description: "Security topic to assess (e.g. 'authentication flow', 'API authorization')"
      required: ["topic"]
    handler_type: "aggregate"
    handler_config:
      layers: ["L1", "L2", "L3"]

  - name: "get_secure_example"
    description: "Get good and bad code examples for a security pattern."
    input_schema:
      type: "object"
      properties:
        pattern:
          type: "string"
          description: "Security pattern to get examples for"
      required: ["pattern"]
    handler_type: "lookup"
    handler_config:
      fields: ["example_good", "example_bad"]

  - name: "list_security_principles"
    description: "List all security principles with WHY they matter."
    input_schema:
      type: "object"
      properties: {}
      required: []
    handler_type: "filter"
    handler_config:
      layers: ["L1"]
      domains: ["security"]

mcp_server_name: "security-review"
mcp_server_description: "Security review knowledge pack — vulnerability detection, auth patterns, and input validation rules."

tags: ["security", "review", "audit", "vulnerability", "auth", "cors"]
parameters:
  technologies: []
  include_examples: true
