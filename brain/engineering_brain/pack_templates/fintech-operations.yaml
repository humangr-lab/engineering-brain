id: "fintech-operations"
name: "Fintech Operations Pack"
description: "Fintech operational knowledge covering payment processing, settlement cycles, ledger accounting, and PIX/banking integration patterns."
version: "1.0.0"

layers: ["L0", "L1", "L2", "L3"]
domains: ["fintech", "compliance"]
severities: ["critical", "high", "medium"]
min_confidence: 0.3
exclude_deprecated: true

required_layers: ["L1", "L2", "L3"]
min_nodes: 5
max_nodes: 80
min_quality: 0.2
prefer_high_severity: false

reasoning_template: "T-LINEAR-DEFAULT"

mcp_tools:
  - name: "get_payment_patterns"
    description: "Retrieve payment processing patterns including authorization flows, idempotency, retry logic, and gateway integration."
    input_schema:
      type: "object"
      properties:
        payment_method:
          type: "string"
          description: "Payment method (pix, credit_card, boleto, wire_transfer)"
        concern:
          type: "string"
          description: "Concern area (authorization, capture, refund, chargeback)"
      required: ["payment_method"]
    handler_type: "query"
    handler_config:
      layers: ["L2", "L3"]

  - name: "get_settlement_rules"
    description: "Get settlement rules and patterns including T+N cycles, netting, reconciliation, and finality guarantees."
    input_schema:
      type: "object"
      properties:
        settlement_type:
          type: "string"
          description: "Settlement type (instant, batch, net, gross)"
        instrument:
          type: "string"
          description: "Financial instrument context (prediction_market, spot, futures)"
      required: ["settlement_type"]
    handler_type: "query"
    handler_config:
      layers: ["L1", "L2", "L3"]

  - name: "get_ledger_patterns"
    description: "Get double-entry ledger patterns including journal entries, balance proofs, audit trails, and immutability guarantees."
    input_schema:
      type: "object"
      properties:
        operation:
          type: "string"
          description: "Ledger operation (debit, credit, transfer, reversal, reconciliation)"
      required: ["operation"]
    handler_type: "query"
    handler_config:
      layers: ["L1", "L2", "L3"]
      boost_severity: true

tags: ["payment", "settlement", "ledger", "pix"]
parameters:
  technologies: []
