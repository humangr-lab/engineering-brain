id: "api-design"
name: "API Design Pack"
description: "API design knowledge — REST conventions, pagination patterns, status codes, versioning, and contract-first design."
version: "1.0.0"

layers: ["L1", "L2", "L3"]
domains: ["api", "architecture"]
min_confidence: 0.0
exclude_deprecated: true

required_layers: ["L1", "L2", "L3"]
min_nodes: 5
max_nodes: 50
min_quality: 0.3
prefer_high_severity: false

reasoning_template: "T-LINEAR-DEFAULT"

mcp_tools:
  - name: "validate_endpoint"
    description: "Validate an API endpoint design against best practices."
    input_schema:
      type: "object"
      properties:
        endpoint:
          type: "string"
          description: "API endpoint description (method, path, behavior)"
      required: ["endpoint"]
    handler_type: "query"
    handler_config:
      domains: ["api"]

  - name: "get_pagination_patterns"
    description: "Get pagination patterns and best practices."
    input_schema:
      type: "object"
      properties: {}
      required: []
    handler_type: "query"
    handler_config:
      layers: ["L2", "L3"]
      domains: ["api"]

  - name: "check_status_codes"
    description: "Get HTTP status code rules and when to use each code."
    input_schema:
      type: "object"
      properties:
        scenario:
          type: "string"
          description: "API scenario to get status code guidance for"
      required: ["scenario"]
    handler_type: "query"
    handler_config:
      layers: ["L3"]

  - name: "get_api_rules"
    description: "Get API design rules for a technology."
    input_schema:
      type: "object"
      properties:
        technology:
          type: "string"
          description: "API technology (e.g. 'flask', 'fastapi', 'express')"
      required: ["technology"]
    handler_type: "filter"
    handler_config:
      layers: ["L3"]
      domains: ["api"]

mcp_server_name: "api-design"
mcp_server_description: "API design knowledge pack — REST patterns, status codes, pagination, and contract-first design."

tags: ["api", "rest", "design", "pagination", "status-codes"]
parameters:
  technologies: []
