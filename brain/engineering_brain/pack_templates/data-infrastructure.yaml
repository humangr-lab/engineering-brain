id: "data-infrastructure"
name: "Data Infrastructure Pack"
description: "Knowledge for data warehouse, ETL/ELT pipeline, backup/DR, and data platform sprints. Covers PostgreSQL backup strategies, PITR, ETL idempotency, data lineage, warehouse design, connector reliability, and data quality enforcement."
version: "1.0.0"

layers: ["L1", "L2", "L3"]
domains: ["databases", "data_engineering", "operations"]
severities: ["critical", "high", "medium"]
min_confidence: 0.3
exclude_deprecated: true

required_layers: ["L1", "L2", "L3"]
min_nodes: 5
max_nodes: 60
min_quality: 0.3
prefer_high_severity: false

reasoning_template: "T-LINEAR-DEFAULT"

mcp_tools:
  - name: "get_etl_patterns"
    description: "Retrieve ETL/ELT patterns for idempotency, checkpointing, data quality validation, and pipeline orchestration."
    input_schema:
      type: "object"
      properties:
        pattern_type:
          type: "string"
          description: "ETL pattern type (idempotency, checkpointing, validation, backfill, incremental, full_refresh)"
        source_type:
          type: "string"
          description: "Data source type (postgres, api, kafka, s3, file)"
      required: ["pattern_type"]
    handler_type: "query"
    handler_config:
      layers: ["L1", "L2"]

  - name: "get_backup_dr_rules"
    description: "Get backup and disaster recovery rules for PostgreSQL and data systems. Covers PITR configuration, WAL archiving, restore testing, RPO/RTO targets, and multi-region DR."
    input_schema:
      type: "object"
      properties:
        database:
          type: "string"
          description: "Database system (postgresql, redis, qdrant, mongodb)"
        concern:
          type: "string"
          description: "DR concern (pitr, wal_archiving, restore_testing, rpo_rto, replication)"
      required: []
    handler_type: "filter"
    handler_config:
      layers: ["L2", "L3"]
      domains: ["databases", "operations"]
      sort_by: "severity"

  - name: "get_warehouse_design"
    description: "Get data warehouse design patterns covering partitioning, materialized views, columnar storage, query optimization, and schema evolution strategies."
    input_schema:
      type: "object"
      properties:
        topic:
          type: "string"
          description: "Warehouse topic (partitioning, materialized_views, schema_evolution, query_optimization, dimensional_modeling)"
        technology:
          type: "string"
          description: "Warehouse technology (postgresql, bigquery, snowflake, redshift, duckdb)"
      required: ["topic"]
    handler_type: "query"
    handler_config:
      layers: ["L1", "L2", "L3"]

  - name: "check_data_quality"
    description: "Check data quality rules for a pipeline or dataset. Returns validation patterns, anomaly detection strategies, and freshness requirements."
    input_schema:
      type: "object"
      properties:
        pipeline:
          type: "string"
          description: "Pipeline or data flow to check for quality issues"
        data_domain:
          type: "string"
          description: "Business domain of the data (financial, user, market, event)"
      required: ["pipeline"]
    handler_type: "query"
    handler_config:
      layers: ["L2", "L3"]
      boost_severity: true

  - name: "get_lineage_patterns"
    description: "Get data lineage tracking patterns for understanding data provenance, impact analysis, and audit compliance."
    input_schema:
      type: "object"
      properties:
        lineage_type:
          type: "string"
          description: "Lineage type (column_level, table_level, pipeline_level, cross_system)"
      required: []
    handler_type: "query"
    handler_config:
      layers: ["L1", "L2"]

tags: ["data", "etl", "warehouse", "backup", "dr", "postgresql", "lineage", "pipeline"]
parameters:
  technologies: ["python", "postgresql", "redis", "sqlalchemy", "airflow", "dbt"]
  include_examples: true
