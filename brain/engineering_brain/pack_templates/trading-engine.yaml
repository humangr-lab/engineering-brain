id: "trading-engine"
name: "Trading Engine Pack"
description: "Low-level trading engine knowledge covering order book mechanics, matching algorithms, AMM execution, and latency-critical patterns."
version: "1.0.0"

layers: ["L0", "L1", "L2", "L3"]
domains: ["prediction_markets", "realtime"]
severities: ["critical", "high", "medium"]
min_confidence: 0.3
exclude_deprecated: true

required_layers: ["L1", "L2", "L3"]
min_nodes: 5
max_nodes: 80
min_quality: 0.2
prefer_high_severity: true

reasoning_template: "T-LINEAR-DEFAULT"

mcp_tools:
  - name: "get_orderbook_patterns"
    description: "Retrieve order book implementation patterns including matching algorithms, priority queues, and price-time priority rules."
    input_schema:
      type: "object"
      properties:
        topic:
          type: "string"
          description: "Order book topic (matching, priority, depth, snapshots, deltas)"
        order_type:
          type: "string"
          description: "Order type context (limit, market, stop, conditional)"
      required: ["topic"]
    handler_type: "query"
    handler_config:
      layers: ["L2", "L3"]
      boost_severity: true

  - name: "get_realtime_rules"
    description: "Get rules and invariants for real-time trading systems including latency budgets, consistency guarantees, and failure handling."
    input_schema:
      type: "object"
      properties:
        concern:
          type: "string"
          description: "Real-time concern (latency, consistency, failover, backpressure)"
      required: ["concern"]
    handler_type: "query"
    handler_config:
      layers: ["L1", "L2", "L3"]

  - name: "get_execution_invariants"
    description: "Get financial correctness invariants for trade execution: no double-spend, atomic settlement, balance consistency."
    input_schema:
      type: "object"
      properties:
        operation:
          type: "string"
          description: "Trading operation (execute, cancel, settle, rollback)"
      required: ["operation"]
    handler_type: "filter"
    handler_config:
      layers: ["L1", "L3"]
      sort_by: "severity"

tags: ["trading", "orderbook", "matching", "latency"]
parameters:
  technologies: []
