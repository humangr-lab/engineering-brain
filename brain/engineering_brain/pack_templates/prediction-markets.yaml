id: "prediction-markets"
name: "Prediction Markets Pack"
description: "Forekast domain knowledge covering prediction market theory, AMM mechanics, risk modeling, and market microstructure."
version: "1.0.0"

layers: ["L0", "L1", "L2", "L3"]
domains: ["prediction_markets", "fintech"]
severities: ["critical", "high", "medium"]
min_confidence: 0.3
exclude_deprecated: true

required_layers: ["L1", "L2", "L3"]
min_nodes: 5
max_nodes: 80
min_quality: 0.2
prefer_high_severity: false

reasoning_template: "T-LINEAR-DEFAULT"

mcp_tools:
  - name: "get_market_theory"
    description: "Retrieve prediction market theory, scoring rules, and mechanism design principles."
    input_schema:
      type: "object"
      properties:
        topic:
          type: "string"
          description: "Market theory topic (scoring_rules, liquidity, information_aggregation, resolution)"
      required: ["topic"]
    handler_type: "query"
    handler_config:
      layers: ["L1", "L2"]

  - name: "get_amm_rules"
    description: "Get AMM (Automated Market Maker) rules, invariants, and implementation patterns for prediction markets."
    input_schema:
      type: "object"
      properties:
        amm_type:
          type: "string"
          description: "AMM type (lmsr, cpmm, custom)"
        property:
          type: "string"
          description: "Specific property to query (pricing, liquidity, slippage, fees)"
      required: ["amm_type"]
    handler_type: "query"
    handler_config:
      layers: ["L2", "L3"]

  - name: "get_risk_patterns"
    description: "Get risk modeling patterns for prediction markets including exposure limits, hedging, and market manipulation detection."
    input_schema:
      type: "object"
      properties:
        risk_type:
          type: "string"
          description: "Type of risk (market, credit, operational, manipulation)"
      required: ["risk_type"]
    handler_type: "query"
    handler_config:
      layers: ["L2", "L3"]
      boost_severity: true

tags: ["forekast", "markets", "trading", "amm"]
parameters:
  technologies: []
