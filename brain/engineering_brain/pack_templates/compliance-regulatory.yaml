id: "compliance-regulatory"
name: "Compliance & Regulatory Pack"
description: "Knowledge for compliance, KYC, AML, and regulatory sprints. Covers Brazilian LGPD requirements, KYC/AML transaction monitoring, PEP/sanctions screening, GDPR obligations, data classification, audit trail design, and regulatory reporting patterns."
version: "1.0.0"

layers: ["L0", "L1", "L2", "L3"]
domains: ["compliance", "fintech", "security"]
severities: ["critical", "high"]
min_confidence: 0.4
exclude_deprecated: true

required_layers: ["L1", "L2", "L3"]
min_nodes: 8
max_nodes: 60
min_quality: 0.4
prefer_high_severity: true

reasoning_template: "T-LINEAR-DEFAULT"
default_profile: "compliance_engineer"

mcp_tools:
  - name: "get_kyc_aml_rules"
    description: "Get critical rules for KYC/AML implementation — customer due diligence, enhanced due diligence, PEP screening, sanctions screening, and transaction monitoring thresholds."
    input_schema:
      type: "object"
      properties:
        process:
          type: "string"
          description: "KYC/AML process to get rules for (cdd, edd, pep_screening, sanctions, transaction_monitoring)"
        jurisdiction:
          type: "string"
          description: "Jurisdiction context (brazil, eu, us, global)"
      required: ["process"]
    handler_type: "query"
    handler_config:
      layers: ["L1", "L2", "L3"]
      boost_severity: true

  - name: "get_lgpd_requirements"
    description: "Get Brazilian LGPD (Lei Geral de Proteção de Dados) compliance requirements for data collection, storage, consent, and subject rights. Mapped to GDPR equivalents where applicable."
    input_schema:
      type: "object"
      properties:
        area:
          type: "string"
          description: "LGPD area (consent, data_subject_rights, retention, breach_notification, dpo, data_mapping)"
      required: []
    handler_type: "filter"
    handler_config:
      layers: ["L1", "L2", "L3"]
      domains: ["compliance"]
      sort_by: "severity"

  - name: "check_audit_trail"
    description: "Validate audit trail design against compliance requirements. Returns gaps and required fields for regulatory audit logs."
    input_schema:
      type: "object"
      properties:
        audit_design:
          type: "string"
          description: "Audit trail design or implementation to validate"
        regulation:
          type: "string"
          description: "Target regulation (lgpd, gdpr, pci_dss, sox, bacen)"
      required: ["audit_design"]
    handler_type: "query"
    handler_config:
      layers: ["L2", "L3"]
      boost_severity: true

  - name: "get_data_classification_rules"
    description: "Get data classification rules for PII, sensitive financial data, and regulatory categories. Required before designing any data storage or processing system."
    input_schema:
      type: "object"
      properties:
        data_type:
          type: "string"
          description: "Type of data to classify (financial, personal, health, biometric, behavioral)"
      required: []
    handler_type: "filter"
    handler_config:
      layers: ["L2", "L3"]
      domains: ["security", "compliance"]

  - name: "compliance_assessment"
    description: "Multi-layer compliance assessment combining regulatory requirements, data security rules, and audit patterns."
    input_schema:
      type: "object"
      properties:
        feature:
          type: "string"
          description: "Feature or system to assess for compliance (e.g. 'user registration', 'payment processing', 'data export')"
        regulations:
          type: "string"
          description: "Comma-separated list of applicable regulations (lgpd, gdpr, pci_dss, bacen)"
      required: ["feature"]
    handler_type: "aggregate"
    handler_config:
      layers: ["L1", "L2", "L3"]

tags: ["compliance", "kyc", "aml", "lgpd", "gdpr", "pci-dss", "regulatory", "audit", "pep", "sanctions"]
parameters:
  technologies: ["python", "postgresql", "fastapi"]
  include_examples: true
