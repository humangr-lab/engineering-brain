id: "financial-mathematics"
name: "Financial Mathematics Pack"
description: "Financial mathematics for volatility modeling, option pricing, Monte Carlo simulation, risk metrics, Kelly criterion, market microstructure, and game theory. Critical for Forekast prediction market implementation and Veritas financial claim verification."
version: "1.0.0"

layers: ["L0", "L1", "L2", "L3"]
domains: ["fintech", "prediction_markets", "mathematics", "risk_management"]
severities: ["critical", "high", "medium"]
min_confidence: 0.3
exclude_deprecated: true

required_layers: ["L1", "L2", "L3"]
min_nodes: 10
max_nodes: 80
min_quality: 0.3
prefer_high_severity: true

reasoning_template: "T-LINEAR-DEFAULT"

mcp_tools:
  - name: "get_pricing_rules"
    description: "Get option pricing and prediction market pricing rules. Covers Black-Scholes, binomial trees, risk-neutral pricing, and binary option mapping for prediction markets."
    input_schema:
      type: "object"
      properties:
        model:
          type: "string"
          description: "Pricing model (black_scholes, binomial, risk_neutral, binary_option, put_call_parity)"
        greek:
          type: "string"
          description: "Greek sensitivity (delta, gamma, theta, vega, rho)"
      required: ["model"]
    handler_type: "query"
    handler_config:
      layers: ["L1", "L2", "L3"]
      boost_severity: true

  - name: "get_volatility_patterns"
    description: "Get volatility modeling patterns including GARCH, implied volatility, realized volatility, and volatility surface construction."
    input_schema:
      type: "object"
      properties:
        model:
          type: "string"
          description: "Volatility model (historical, implied, garch, ewma, realized, vix)"
        concern:
          type: "string"
          description: "Specific concern (estimation, forecasting, regime_detection, fat_tails)"
      required: ["model"]
    handler_type: "query"
    handler_config:
      layers: ["L1", "L2", "L3"]

  - name: "get_risk_metrics"
    description: "Get risk metric rules for VaR, CVaR, Kelly criterion, position sizing, drawdown analysis, and portfolio risk."
    input_schema:
      type: "object"
      properties:
        metric:
          type: "string"
          description: "Risk metric (var, cvar, kelly, drawdown, position_sizing, stress_test)"
        method:
          type: "string"
          description: "Calculation method (parametric, historical, monte_carlo, extreme_value)"
      required: ["metric"]
    handler_type: "query"
    handler_config:
      layers: ["L1", "L2", "L3"]
      boost_severity: true

  - name: "get_monte_carlo_patterns"
    description: "Get Monte Carlo simulation patterns for pricing, risk estimation, and scenario analysis. Covers variance reduction, convergence diagnostics, and parallelization."
    input_schema:
      type: "object"
      properties:
        application:
          type: "string"
          description: "MC application (pricing, var, scenario_analysis, probability_estimation)"
        technique:
          type: "string"
          description: "MC technique (antithetic, control_variate, importance_sampling, quasi_monte_carlo)"
      required: ["application"]
    handler_type: "query"
    handler_config:
      layers: ["L2", "L3"]

  - name: "get_market_microstructure"
    description: "Get market microstructure rules for order flow, market making, price discovery, and optimal execution in prediction markets."
    input_schema:
      type: "object"
      properties:
        topic:
          type: "string"
          description: "Microstructure topic (bid_ask_spread, market_making, price_discovery, optimal_execution, market_impact)"
      required: ["topic"]
    handler_type: "query"
    handler_config:
      layers: ["L2", "L3"]

  - name: "get_game_theory_patterns"
    description: "Get game theory and mechanism design patterns relevant to prediction markets, including scoring rules, auction theory, and oracle design."
    input_schema:
      type: "object"
      properties:
        topic:
          type: "string"
          description: "Game theory topic (nash_equilibrium, mechanism_design, scoring_rules, auction_theory, oracle_problem)"
      required: ["topic"]
    handler_type: "query"
    handler_config:
      layers: ["L1", "L2", "L3"]

tags: ["finance", "volatility", "options", "monte-carlo", "risk", "kelly", "microstructure", "game-theory"]
parameters:
  technologies: ["python", "numpy", "scipy", "pandas"]
  include_examples: true
