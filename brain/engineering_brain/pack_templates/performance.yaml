id: "performance"
name: "Performance Pack"
description: "Performance optimization knowledge — caching patterns, bottleneck detection, measurement-first approach, and optimization rules."
version: "1.0.0"

layers: ["L0", "L1", "L2", "L3"]
domains: ["performance", "reliability", "infrastructure"]
min_confidence: 0.0
exclude_deprecated: true

required_layers: ["L1", "L2", "L3"]
min_nodes: 5
max_nodes: 50
min_quality: 0.3
prefer_high_severity: false

reasoning_template: "T-LINEAR-DEFAULT"

mcp_tools:
  - name: "get_optimization_rules"
    description: "Get optimization rules for a technology or performance concern."
    input_schema:
      type: "object"
      properties:
        topic:
          type: "string"
          description: "Performance topic (e.g. 'database queries', 'API latency', 'memory usage')"
      required: ["topic"]
    handler_type: "query"
    handler_config:
      domains: ["performance"]

  - name: "check_bottleneck"
    description: "Check for potential performance bottlenecks based on known patterns."
    input_schema:
      type: "object"
      properties:
        description:
          type: "string"
          description: "Description of the system or code to check"
      required: ["description"]
    handler_type: "query"
    handler_config:
      boost_severity: true

  - name: "get_caching_patterns"
    description: "Get caching patterns and strategies."
    input_schema:
      type: "object"
      properties:
        technology:
          type: "string"
          description: "Technology context for caching (e.g. 'redis', 'cdn', 'browser')"
      required: []
    handler_type: "query"
    handler_config:
      layers: ["L2", "L3"]

mcp_server_name: "performance-advisor"
mcp_server_description: "Performance knowledge pack — optimization rules, bottleneck detection, and caching patterns."

tags: ["performance", "optimization", "caching", "latency", "bottleneck"]
parameters:
  technologies: []
