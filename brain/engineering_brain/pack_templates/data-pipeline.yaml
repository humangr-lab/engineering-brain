id: "data-pipeline"
name: "Data Pipeline Pack"
description: "Knowledge for data engineering — pipeline patterns, idempotency rules, schema validation, and data integrity best practices."
version: "1.0.0"

layers: ["L1", "L2", "L3"]
domains: ["data_engineering", "database", "reliability"]
min_confidence: 0.0
exclude_deprecated: true

required_layers: ["L1", "L2", "L3"]
min_nodes: 5
max_nodes: 50
min_quality: 0.3
prefer_high_severity: false

reasoning_template: "T-LINEAR-DEFAULT"
default_profile: "data_engineer"

mcp_tools:
  - name: "get_pipeline_patterns"
    description: "Get data pipeline patterns for a specific use case."
    input_schema:
      type: "object"
      properties:
        use_case:
          type: "string"
          description: "Pipeline use case (e.g. 'ETL', 'streaming', 'batch processing')"
      required: ["use_case"]
    handler_type: "query"
    handler_config:
      layers: ["L2", "L3"]

  - name: "validate_idempotency"
    description: "Check if a pipeline operation is idempotent."
    input_schema:
      type: "object"
      properties:
        operation:
          type: "string"
          description: "Description of the pipeline operation"
      required: ["operation"]
    handler_type: "query"
    handler_config:
      domains: ["data_engineering", "reliability"]

  - name: "get_data_rules"
    description: "Get data engineering rules for a technology."
    input_schema:
      type: "object"
      properties:
        technology:
          type: "string"
          description: "Data technology (e.g. 'kafka', 'postgres', 'redis')"
      required: ["technology"]
    handler_type: "filter"
    handler_config:
      layers: ["L3"]

  - name: "check_schema"
    description: "Get schema validation best practices."
    input_schema:
      type: "object"
      properties:
        topic:
          type: "string"
          description: "Schema concern (e.g. 'migration', 'backward compatibility')"
      required: ["topic"]
    handler_type: "query"
    handler_config: {}

mcp_server_name: "data-pipeline"
mcp_server_description: "Data pipeline knowledge pack — pipeline patterns, idempotency, and data integrity."

tags: ["data", "pipeline", "etl", "database", "schema", "idempotency"]
parameters:
  technologies: []
