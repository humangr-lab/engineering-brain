id: "llm-agent-pipeline"
name: "LLM Agent Pipeline Pack"
description: "Knowledge for LLM agent implementation sprints. Covers CrewAI hierarchy design, LangGraph state machines, Letta stateful memory patterns, DSPy structured prompting, prompt engineering, token budget management, context window strategy, and agent evaluation. Tailored for production-grade multi-agent LLM systems."
version: "1.0.0"

layers: ["L1", "L2", "L3"]
domains: ["agent_orchestration", "architecture"]
severities: ["critical", "high", "medium"]
min_confidence: 0.3
exclude_deprecated: true

required_layers: ["L1", "L2", "L3"]
min_nodes: 10
max_nodes: 80
min_quality: 0.3
prefer_high_severity: false

reasoning_template: "T-LINEAR-DEFAULT"

mcp_tools:
  - name: "get_crewai_patterns"
    description: "Get CrewAI implementation patterns for agent design, task definition, crew orchestration, and tool integration. Includes hierarchy design and delegation rules."
    input_schema:
      type: "object"
      properties:
        topic:
          type: "string"
          description: "CrewAI topic (agent_design, task_definition, crew_setup, tool_integration, hierarchy, delegation, memory)"
        concern:
          type: "string"
          description: "Specific concern (performance, reliability, token_efficiency, error_handling)"
      required: ["topic"]
    handler_type: "query"
    handler_config:
      layers: ["L1", "L2"]

  - name: "get_langgraph_patterns"
    description: "Get LangGraph state machine patterns for node design, edge conditions, checkpoint/resume, and workflow orchestration. Includes interrupt handling and human-in-the-loop patterns."
    input_schema:
      type: "object"
      properties:
        topic:
          type: "string"
          description: "LangGraph topic (state_design, node_patterns, edge_conditions, checkpointing, human_in_loop, subgraph, streaming)"
        concern:
          type: "string"
          description: "Specific concern (durability, correctness, performance, observability)"
      required: ["topic"]
    handler_type: "query"
    handler_config:
      layers: ["L1", "L2"]

  - name: "get_letta_patterns"
    description: "Get Letta stateful memory patterns for persistent agent state, in-context storage, archival memory, and recall memory. Includes sleep/wake lifecycle and long-running agent patterns."
    input_schema:
      type: "object"
      properties:
        memory_type:
          type: "string"
          description: "Letta memory type (in_context, archival, recall, working_memory, persona)"
        concern:
          type: "string"
          description: "Concern (persistence, retrieval, memory_pressure, context_limits)"
      required: []
    handler_type: "query"
    handler_config:
      layers: ["L1", "L2", "L3"]

  - name: "get_dspy_patterns"
    description: "Get DSPy structured prompting patterns for signature design, module composition, compilation, and optimization. Covers metric design and teleprompter selection."
    input_schema:
      type: "object"
      properties:
        topic:
          type: "string"
          description: "DSPy topic (signature_design, module_composition, compilation, teleprompter, metric_design, assertion)"
      required: ["topic"]
    handler_type: "query"
    handler_config:
      layers: ["L2", "L3"]

  - name: "get_token_budget_rules"
    description: "Get token budget management rules for context window strategy, prompt compression, and cost-aware agent design."
    input_schema:
      type: "object"
      properties:
        concern:
          type: "string"
          description: "Token budget concern (context_window, prompt_compression, response_length, multi_turn, retrieval_augmentation)"
      required: []
    handler_type: "filter"
    handler_config:
      layers: ["L2", "L3"]
      sort_by: "severity"

  - name: "check_prompt_antipatterns"
    description: "Check a prompt design against known anti-patterns — vague instructions, missing constraints, context pollution, and reliability issues."
    input_schema:
      type: "object"
      properties:
        prompt:
          type: "string"
          description: "Prompt or prompt template to check"
        agent_role:
          type: "string"
          description: "Role the agent will play (spec, implementation, qa, review)"
      required: ["prompt"]
    handler_type: "query"
    handler_config:
      layers: ["L2", "L3"]
      boost_severity: true

  - name: "llm_pipeline_assessment"
    description: "Full assessment of an LLM agent pipeline design combining orchestration, prompting, memory, and reliability rules."
    input_schema:
      type: "object"
      properties:
        pipeline_design:
          type: "string"
          description: "Description of the LLM agent pipeline to assess"
      required: ["pipeline_design"]
    handler_type: "aggregate"
    handler_config:
      layers: ["L1", "L2", "L3"]

tags: ["llm", "agents", "crewai", "langgraph", "letta", "dspy", "prompt-engineering", "token-budget", "multi-agent"]
parameters:
  technologies: ["python", "crewai", "langgraph", "letta", "dspy"]
  include_examples: true
