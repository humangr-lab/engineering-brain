id: "risk-compliance"
name: "Risk & Compliance Pack"
description: "Risk management and regulatory compliance knowledge covering KYC/AML rules, risk modeling, audit trails, and regulatory frameworks."
version: "1.0.0"

layers: ["L0", "L1", "L2", "L3"]
domains: ["fintech", "compliance"]
severities: ["critical", "high", "medium"]
min_confidence: 0.3
exclude_deprecated: true

required_layers: ["L1", "L2", "L3"]
min_nodes: 5
max_nodes: 80
min_quality: 0.2
prefer_high_severity: true

reasoning_template: "T-LINEAR-DEFAULT"

mcp_tools:
  - name: "get_compliance_rules"
    description: "Retrieve regulatory compliance rules for a jurisdiction or domain. Returns rules ordered by severity and enforcement priority."
    input_schema:
      type: "object"
      properties:
        regulation:
          type: "string"
          description: "Regulation or framework (cvm, bacen, lgpd, pld, mifid)"
        topic:
          type: "string"
          description: "Compliance topic (reporting, disclosure, limits, sanctions)"
      required: ["regulation"]
    handler_type: "query"
    handler_config:
      layers: ["L1", "L2", "L3"]
      boost_severity: true

  - name: "get_risk_patterns"
    description: "Get risk management patterns including exposure modeling, stress testing, and risk mitigation strategies."
    input_schema:
      type: "object"
      properties:
        risk_category:
          type: "string"
          description: "Risk category (market, credit, operational, liquidity, reputational)"
      required: ["risk_category"]
    handler_type: "query"
    handler_config:
      layers: ["L2", "L3"]

  - name: "get_kyc_rules"
    description: "Get KYC/AML rules and patterns for identity verification, transaction monitoring, and suspicious activity detection."
    input_schema:
      type: "object"
      properties:
        process:
          type: "string"
          description: "KYC process (onboarding, verification, monitoring, reporting)"
        tier:
          type: "string"
          description: "Customer tier (basic, enhanced, pep)"
      required: ["process"]
    handler_type: "query"
    handler_config:
      layers: ["L2", "L3"]
      boost_severity: true

tags: ["risk", "kyc", "aml", "compliance", "regulatory"]
parameters:
  technologies: []
