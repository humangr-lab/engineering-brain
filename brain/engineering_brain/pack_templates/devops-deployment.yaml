id: "devops-deployment"
name: "DevOps & Deployment Pack"
description: "Knowledge for CI/CD pipeline design, container deployment, Kubernetes orchestration, infrastructure-as-code, feature flag management, and migration patterns. Covers zero-downtime deployments, rollback strategies, and deployment safety gates."
version: "1.0.0"

layers: ["L1", "L2", "L3"]
domains: ["deployment", "infrastructure", "observability"]
severities: ["critical", "high", "medium"]
min_confidence: 0.3
exclude_deprecated: true

required_layers: ["L1", "L2", "L3"]
min_nodes: 5
max_nodes: 50
min_quality: 0.3
prefer_high_severity: false

reasoning_template: "T-LINEAR-DEFAULT"

mcp_tools:
  - name: "get_deployment_strategy"
    description: "Retrieve deployment strategy patterns for canary, blue-green, progressive rollout, and rolling deployments. Includes rollback triggers and safety gates."
    input_schema:
      type: "object"
      properties:
        strategy:
          type: "string"
          description: "Deployment strategy type (canary, blue_green, rolling, progressive, big_bang)"
        concern:
          type: "string"
          description: "Specific concern (rollback, database_migration, stateful_services, traffic_shifting)"
      required: ["strategy"]
    handler_type: "query"
    handler_config:
      layers: ["L1", "L2"]

  - name: "get_cicd_rules"
    description: "Get CI/CD pipeline rules covering stage design, artifact management, caching strategies, and pre-deploy validation. Returns rules ordered by severity."
    input_schema:
      type: "object"
      properties:
        stage:
          type: "string"
          description: "Pipeline stage (build, test, scan, deploy, validate)"
        technology:
          type: "string"
          description: "CI/CD platform (github_actions, gitlab_ci, jenkins, circle_ci)"
      required: []
    handler_type: "filter"
    handler_config:
      layers: ["L2", "L3"]
      domains: ["deployment"]
      sort_by: "severity"

  - name: "get_container_rules"
    description: "Get container security and optimization rules for Docker image design, layer caching, non-root execution, and minimal attack surface."
    input_schema:
      type: "object"
      properties:
        concern:
          type: "string"
          description: "Container concern (security, size, caching, multi_stage, tagging)"
      required: []
    handler_type: "query"
    handler_config:
      layers: ["L2", "L3"]
      boost_severity: true

  - name: "get_feature_flag_patterns"
    description: "Get feature flag lifecycle patterns covering creation, targeting, kill switches, and cleanup. Includes flag debt prevention strategies."
    input_schema:
      type: "object"
      properties:
        lifecycle_phase:
          type: "string"
          description: "Flag lifecycle phase (creation, targeting, gradual_rollout, kill_switch, cleanup)"
      required: []
    handler_type: "query"
    handler_config:
      layers: ["L1", "L2"]
      domains: ["deployment", "operations"]

  - name: "get_migration_patterns"
    description: "Get database and infrastructure migration patterns for zero-downtime schema changes, expand-contract, and backward-compatible migrations."
    input_schema:
      type: "object"
      properties:
        migration_type:
          type: "string"
          description: "Migration type (schema, data, infrastructure, service)"
        constraint:
          type: "string"
          description: "Key constraint (zero_downtime, backward_compatible, reversible)"
      required: ["migration_type"]
    handler_type: "query"
    handler_config:
      layers: ["L2", "L3"]

tags: ["devops", "cicd", "deployment", "kubernetes", "containers", "feature-flags", "migration", "infrastructure"]
parameters:
  technologies: ["docker", "kubernetes", "github-actions", "terraform", "python"]
  include_examples: true
