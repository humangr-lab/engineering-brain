id: "exec-implementation"
name: "Exec Implementation Pack"
description: "Knowledge for exec agents during coding. Covers implementation wisdom, integration patterns, anti-pattern detection, and code quality guidelines."
version: "1.0.0"

layers: ["L0", "L1", "L2", "L3"]
domains: ["sacada", "integration", "code_quality"]
severities: ["critical", "high", "medium"]
min_confidence: 0.3
exclude_deprecated: true

required_layers: ["L1", "L2", "L3"]
min_nodes: 5
max_nodes: 80
min_quality: 0.2
prefer_high_severity: false

reasoning_template: "T-LINEAR-DEFAULT"

mcp_tools:
  - name: "get_implementation_wisdom"
    description: "Retrieve implementation patterns, idioms, and best practices for a given technology or problem domain."
    input_schema:
      type: "object"
      properties:
        topic:
          type: "string"
          description: "Implementation topic or problem to get wisdom for"
        technology:
          type: "string"
          description: "Technology stack (e.g. 'python', 'fastapi', 'sqlalchemy')"
      required: ["topic"]
    handler_type: "query"
    handler_config:
      layers: ["L1", "L2", "L3"]

  - name: "get_integration_patterns"
    description: "Get known integration patterns and contract rules for connecting components or services."
    input_schema:
      type: "object"
      properties:
        source:
          type: "string"
          description: "Source component or service"
        target:
          type: "string"
          description: "Target component or service"
      required: ["source"]
    handler_type: "query"
    handler_config:
      layers: ["L2", "L3"]

  - name: "check_antipattern"
    description: "Check if a code snippet or design matches known anti-patterns. Returns matching anti-patterns with remediation."
    input_schema:
      type: "object"
      properties:
        code:
          type: "string"
          description: "Code snippet or design description to check"
        language:
          type: "string"
          description: "Programming language (e.g. 'python', 'typescript')"
      required: ["code"]
    handler_type: "query"
    handler_config:
      layers: ["L3"]
      boost_severity: true

tags: ["implementation", "coding", "integration", "patterns"]
parameters:
  technologies: []
