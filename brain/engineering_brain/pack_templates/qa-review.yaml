id: "qa-review"
name: "QA Review Pack"
description: "Knowledge for QA agents during code review. Covers bug patterns, test quality rules, finding classification, and review heuristics."
version: "1.0.0"

layers: ["L0", "L1", "L2", "L3"]
domains: ["sacada", "antipattern", "testing"]
severities: ["critical", "high", "medium"]
min_confidence: 0.3
exclude_deprecated: true

required_layers: ["L1", "L2", "L3"]
min_nodes: 5
max_nodes: 80
min_quality: 0.2
prefer_high_severity: true

reasoning_template: "T-LINEAR-DEFAULT"

mcp_tools:
  - name: "get_bug_patterns"
    description: "Retrieve known bug patterns and common defect categories for a technology or domain. Ordered by severity."
    input_schema:
      type: "object"
      properties:
        topic:
          type: "string"
          description: "Topic or area to get bug patterns for"
        technology:
          type: "string"
          description: "Technology context (e.g. 'python', 'async', 'database')"
      required: ["topic"]
    handler_type: "query"
    handler_config:
      layers: ["L2", "L3"]
      boost_severity: true

  - name: "get_test_quality_rules"
    description: "Get test quality rules and coverage expectations for a module or feature area."
    input_schema:
      type: "object"
      properties:
        module:
          type: "string"
          description: "Module or feature to get test quality rules for"
        test_type:
          type: "string"
          description: "Type of testing (unit, integration, e2e, mutation)"
      required: ["module"]
    handler_type: "filter"
    handler_config:
      layers: ["L1", "L2", "L3"]

  - name: "classify_finding"
    description: "Classify a QA finding by severity, category, and actionability. Returns structured classification."
    input_schema:
      type: "object"
      properties:
        finding:
          type: "string"
          description: "Description of the QA finding to classify"
        context:
          type: "string"
          description: "Code or design context where the finding was detected"
      required: ["finding"]
    handler_type: "aggregate"
    handler_config:
      layers: ["L1", "L2", "L3"]

tags: ["qa", "review", "bugs", "testing"]
parameters:
  technologies: []
