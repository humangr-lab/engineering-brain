id: T-DATA-PIPELINE
name: Data Pipeline Review
applicable_when:
  domains: [data_engineering, database]
  keywords: [kafka, etl, streaming, pipeline, consumer, producer, batch]
steps:
  - order: 1
    description: "Gather reliability principles"
    operation: activate
    node_filter:
      layer: "L1"
      domains: [reliability]
    max_nodes: 3
    edge_to_next: TRIGGERS
  - order: 2
    description: "Find data engineering patterns"
    operation: activate
    node_filter:
      layer: ["L2", "L3"]
      domains: [data_engineering]
      match_query_tech: true
    max_nodes: 10
    edge_to_next: DEEPENS
  - order: 3
    description: "Pull observability and monitoring rules"
    operation: activate
    node_filter:
      layer: "L3"
      domains: [observability]
    max_nodes: 5
    edge_to_next: COMPLEMENTS
  - order: 4
    description: "Final synthesis"
    operation: score
    node_filter: {}
    max_nodes: 0
