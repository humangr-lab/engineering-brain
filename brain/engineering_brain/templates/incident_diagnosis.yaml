id: T-INCIDENT-DIAG
name: Incident Diagnosis
applicable_when:
  domains: [reliability, observability]
  keywords: [incident, outage, failure, cascading, timeout, crash, debug, troubleshoot]
steps:
  - order: 1
    description: "Identify relevant SRE principles"
    operation: activate
    node_filter:
      layer: "L1"
      domains: [reliability]
    max_nodes: 3
    edge_to_next: TRIGGERS
  - order: 2
    description: "Find failure pattern knowledge"
    operation: activate
    node_filter:
      layer: ["L2", "L3"]
      domains: [reliability]
      match_query_tech: true
    max_nodes: 10
    edge_to_next: DEEPENS
  - order: 3
    description: "Gather observability and debugging rules"
    operation: activate
    node_filter:
      layer: "L3"
      domains: [observability]
    max_nodes: 5
    edge_to_next: COMPLEMENTS
  - order: 4
    description: "Final incident synthesis"
    operation: score
    node_filter: {}
    max_nodes: 0
