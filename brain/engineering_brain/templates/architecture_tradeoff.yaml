id: T-ARCH-TRADEOFF
name: Architecture Tradeoff Analysis
applicable_when:
  domains: [architecture]
  keywords: [tradeoff, microservice, monolith, cqrs, event-driven, saga, design]
steps:
  - order: 1
    description: "Gather architectural principles"
    operation: activate
    node_filter:
      layer: "L1"
      domains: [architecture]
    max_nodes: 3
    edge_to_next: TRIGGERS
  - order: 2
    description: "Find established architectural patterns"
    operation: activate
    node_filter:
      layer: "L2"
      match_query_tech: true
    max_nodes: 5
    edge_to_next: DEEPENS
  - order: 3
    description: "Gather specific rules and constraints"
    operation: activate
    node_filter:
      layer: "L3"
      match_query_tech: true
    max_nodes: 8
    edge_to_next: ALTERNATIVE
  - order: 4
    description: "Synthesize tradeoffs"
    operation: score
    node_filter: {}
    max_nodes: 0
