id: T-SEC-API-REVIEW
name: API Security Review
applicable_when:
  domains: [security, api]
  keywords: [auth, cors, csrf, xss, injection, owasp, vulnerability]
steps:
  - order: 1
    description: "Identify authentication/authorization principles"
    operation: activate
    node_filter:
      layer: "L1"
      domains: [security]
    max_nodes: 3
    edge_to_next: TRIGGERS
  - order: 2
    description: "Gather technology-specific security rules"
    operation: activate
    node_filter:
      layer: "L3"
      domains: [security]
      match_query_tech: true
    max_nodes: 10
    edge_to_next: DEEPENS
  - order: 3
    description: "Check for contradictions between security rules"
    operation: aggregate
    node_filter: {}
    max_nodes: 0
    edge_to_next: VALIDATES
  - order: 4
    description: "Pull resilience patterns (rate limiting, circuit breaker)"
    operation: activate
    node_filter:
      layer: ["L2", "L3"]
      domains: [reliability]
    max_nodes: 5
    edge_to_next: COMPLEMENTS
  - order: 5
    description: "Final epistemic synthesis"
    operation: score
    node_filter: {}
    max_nodes: 0
