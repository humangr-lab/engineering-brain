version: "1.0"
# Brain Strengths benchmark v1.0 — 20 specialized queries designed to test
# scenarios where the Engineering Brain's multi-signal scoring, graph traversal,
# cross-layer inference, and deep domain knowledge provide measurable advantages
# over simpler retrieval systems (Naive RAG, GraphRAG).
#
# Categories:
#   multi_hop_deep (5)  — Require traversal across 3-5 knowledge layers
#   domain_depth (5)    — Niche domain expertise requiring deep recall
#   contradiction (5)   — Opposing engineering tradeoffs requiring balanced retrieval
#   obsolescence (5)    — Deprecated patterns vs modern replacements

queries:
