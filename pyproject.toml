# Root pyproject.toml — shared tool configuration only (NOT a package)

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM"]

[tool.ruff.lint.isort]
known-first-party = ["engineering_brain"]

[tool.pytest.ini_options]
testpaths = ["brain/tests", "cockpit/tests"]
addopts = "-v --tb=short"

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
