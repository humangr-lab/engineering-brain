# Root pyproject.toml — shared tool configuration only (NOT a package)

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM"]
ignore = [
    "E501",   # line too long — handled by ruff format, not linter
    "E402",   # module-level import not at top — lazy imports by design
    "E741",   # ambiguous variable name — context makes intent clear
    "SIM102", # collapsible if — nested ifs sometimes more readable
    "SIM105", # use contextlib.suppress — try/except/pass is explicit
    "SIM113", # use enumerate — manual counter sometimes clearer
    "SIM115", # use context manager for open — acceptable in tests
    "SIM117", # nested with — sometimes more readable
    "B007",   # unused loop variable — false positives in comprehensions
    "B017",   # pytest.raises(Exception) — intentional in tests
    "B024",   # abstract base class without abstract methods — by design
    "B027",   # empty method in abstract class — interface stubs
    "F601",   # membership test with list — minor optimization
]

[tool.ruff.lint.isort]
known-first-party = ["engineering_brain"]

[tool.pytest.ini_options]
testpaths = ["brain/tests", "cockpit/tests"]
addopts = "-v --tb=short"

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
